      - "Set up Amazon Ads"
      - "Run Kindle Countdown Deal in first 90 days"

  phase_2:
    name: "Japan + English Global"
    timeline: "Month 3-4"
    actions:
      - "Translate Phase 1 titles to Japanese"
      - "Auto-available in UK, Canada, Australia, India"
      - "Launch Amazon Ads in Japan"
