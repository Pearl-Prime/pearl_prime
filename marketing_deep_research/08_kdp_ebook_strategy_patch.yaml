  temperature: 0.0
  prompt_id: "8"
  source_links:
    - "Web search 2026-03-23 (12 queries)"
    - "KDP documentation (kdp.amazon.com)"
    - "Kindlepreneur international selling guide"
    - "BookAutoAI KDP requirements guide"
    - "InkfluenceAI KDP AI disclosure 2026"
  confidence: "high — KDP documentation is authoritative"
  reviewer: "TBD"
  notes: "KDP-exclusive ebook strategy. Audiobooks stay multi-platform."

# ── Global KDP settings ───────────────────────────────────────

kdp_global:
  enrollment: "KDP Select"               # 90-day exclusive — enables KU, 70% global, promos
  royalty_option: "70%"                   # requires price $2.99–$9.99
  ai_disclosure: "AI-generated"           # honest disclosure per Amazon policy
  max_releases_per_week: 2               # avoid spam detection
  min_pages_per_title: 80                # quality floor — no thin content
  manuscript_format: "EPUB"              # recommended upload format
  cover_dimensions: "2560x1600"          # 1:1.6 ratio, JPEG or TIFF
  cover_min_dimensions: "625x1000"

# ── Marketplace-specific settings ─────────────────────────────

marketplaces:
  us:
    domain: "amazon.com"
    currency: "USD"
    royalty_70_eligible: true
    kdp_select_required_for_70: false
    kindle_unlimited: true
