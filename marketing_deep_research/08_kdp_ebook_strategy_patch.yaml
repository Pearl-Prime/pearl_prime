    titles: 5
    brands:
      - nervous_system_regulation
      - sleep_repair
      - burnout_recovery
      - adhd_systems
      - boundary_setting
    actions:
      - "Create EPUB manuscripts"
      - "Design KDP-format covers (2560x1600)"
