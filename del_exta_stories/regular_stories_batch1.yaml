atom_id: reg_STORY_gzp_selfworth_007
body: |
  Maya sends the application for the thing she told herself she wasn't ready for.
  She sends it badly. The cover letter has a typo she finds thirty seconds after hitting submit.
  She sits with the typo for ten minutes.
  Then she closes the laptop.
  She was not ready. She applied anyway.
  Those two things are both true and neither one cancels the other out.
band: 5
