atom_id: reg_STORY_hcr_burnout_006
body: |
  She submits her resignation letter on a Tuesday afternoon.
  Her hands are steady when she hits send.
  This is the part she did not expect: not the relief.
  The steadiness. Three years of holding everything tightly enough
  not to drop it, and now the hands that were gripping
  are just hands.
  She does not know what comes next. She knows what stops here.
band: 5
