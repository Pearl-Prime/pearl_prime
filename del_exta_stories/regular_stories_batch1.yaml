atom_id: reg_STORY_gzp_selfworth_005
body: |
  She deletes the first comment she writes on the senior colleague's post.
  Writes another. Shorter. Deletes it.
  Writes a third version. Posts it. Then reads it back
  and decides it sounded like she was trying too hard.
  The colleague likes it fourteen minutes later.
  She does not feel the like land the way she thought it would.
  She is already reading the comment again.
