## TECH_FINANCE_BURNOUT × ANXIETY

---

atom_id: reg_STORY_tfb_anxiety_001
body: |
  The Slack notification arrives at 11:47pm.
  Connor reads it. It does not require a response tonight.
  He knows this. He drafts a response anyway.
  Edits it. Decides it is too eager. Deletes it.
  Decides silence will read as avoidance. Drafts it again.
  Sends a shorter version at 11:59.
  His manager will see it in the morning.
  Connor will not sleep well between now and then.
band: 3
emotional_intensity_band: 3
role: pattern
story_origin: composite
story_type: character_study
misfire_tax: true

