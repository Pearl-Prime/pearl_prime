atom_id: reg_STORY_gzp_selfworth_006
body: |
  Quiet street. Late October. He walks home from the subway
  without headphones for the first time in months.
  The trees are doing what trees do in October.
  He is not trying to be present. He is just not avoiding anything.
  The absence of avoidance feels strange.
  He keeps walking anyway.
band: 1
