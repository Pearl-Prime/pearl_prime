atom_id: reg_STORY_hcr_burnout_003
body: |
  The charge nurse asks for a volunteer to cover an extra shift on Saturday.
  Dominic's hand goes up before he finishes the thought.
  His hand has been going up for three years.
  Not because he wants to. Because he cannot locate the part of himself
  that is allowed to say no in a room where someone else needs help.
  On Saturday he drives to the hospital with the specific tired
  that lives behind the eyes and does not go away with sleep.
band: 3
emotional_intensity_band: 3
role: pattern
story_origin: composite
story_type: character_study

