atom_id: reg_STORY_tfb_anxiety_002
body: |
  Before a presentation to the investment committee,
  Simone rehearses in the mirror, in the car, in the elevator.
  She knows the material. She has known it for two weeks.
  What she is rehearsing is not the material.
  She is rehearsing for the question she cannot predict.
  The one that will expose the thing she has not thought of.
  She has not thought of it yet. So she rehearses everything else
  harder, as if thoroughness will cover the gap
  that thoroughness cannot reach.
band: 4
emotional_intensity_band: 4
role: mechanism_proof
story_origin: composite
story_type: character_study

---

atom_id: reg_STORY_tfb_anxiety_003
body: |
  His chest is tight in the Monday standup.
  Not because anything is wrong. Nothing is wrong.
  The metrics are fine. His updates are prepared.
  His chest is tight because eighteen people are looking at him
  and tightness is what the body learned to do
  in rooms where things could go wrong
  even when they are not going wrong right now.
band: 2
emotional_intensity_band: 2
role: embodiment
story_origin: composite
story_type: character_study

