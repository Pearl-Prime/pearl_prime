atom_id: reg_STORY_hcr_burnout_004
body: |
  The unit is short two nurses this week. This is not unusual.
  What is unusual is that no one mentions it. Everyone adjusts.
  Caseloads absorb the gap. Documentation happens later.
  Breaks do not happen. This is called managing.
  What it actually is: a system that works only because
  the people in it absorb what the system cannot carry.
  The absorbing is invisible until the people stop being able to.
  By then it is called a crisis. But the crisis started much earlier.
band: 4
emotional_intensity_band: 4
role: mechanism_proof
story_origin: composite
story_type: direct_teaching

