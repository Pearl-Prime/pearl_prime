atom_id: reg_STORY_tfb_anxiety_006
body: |
  He asks his manager for a mental health day.
  His voice is level. His reasoning is prepared.
  The manager says of course, no problem.
  He hangs up and sits with the fact that he rehearsed that request
  for six days. Six days of a conversation that took forty seconds
  and resulted in: of course. He does not know what to do
  with the six days. The forty seconds did not give them back.
band: 5
emotional_intensity_band: 5
