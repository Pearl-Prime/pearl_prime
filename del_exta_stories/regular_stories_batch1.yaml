atom_id: reg_STORY_tfb_anxiety_004
body: |
  The high-performer anxiety loop works like this:
  performance stays high because the cost of it not staying high
  is intolerable. So the performer performs.
  And because the performance is working, no one asks about the cost.
  And because no one asks, the performer stops expecting to be asked.
  And because they stop expecting it, they stop knowing
  what they would say if someone did.
  The loop is not a failure of the system. It is the system working.
  Right up until the performer cannot perform and the gap
  in the system becomes suddenly, very publicly, visible.
band: 4
emotional_intensity_band: 4
role: mechanism_proof
story_origin: composite
story_type: direct_teaching

