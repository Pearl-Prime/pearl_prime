atom_id: reg_STORY_hcr_burnout_002
body: |
  She clocks out at 7:23am after a twelve-hour shift.
  In the parking garage she sits in her car with the engine off
  for twenty-two minutes. She does not call anyone. She does not check her phone.
  She sits. When a colleague knocks on her window she startles badly.
  The colleague asks if she is okay. She says yes.
  She does not know if that is true. She drives home.
