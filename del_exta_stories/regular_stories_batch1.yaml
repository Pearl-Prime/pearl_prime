## GEN_Z_PROFESSIONALS × SELF_WORTH

---

atom_id: reg_STORY_gzp_selfworth_001
body: |
  Zoe posts something she worked on for three days.
  By noon it has eleven likes. She refreshes at 12:30.
  Fourteen. She refreshes at 1pm. Still fourteen.
  By evening she has decided it was the wrong thing to post.
  By the next morning she is not sure she should post anything at all.
  The work took three days. The undoing took one afternoon.
band: 3
emotional_intensity_band: 3
role: pattern
story_origin: composite
story_type: character_study
misfire_tax: true

