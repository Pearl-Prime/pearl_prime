atom_id: reg_STORY_tfb_anxiety_005
body: |
  Eighth floor. Glass office. City below.
  Elena stands at the window between calls.
  Nothing is required of her for four minutes.
  She watches a cab move through an intersection.
  Stop. Go. Stop. The light cycles without asking for her input.
  Her shoulders are not where they were an hour ago.
  She does not know when they moved.
band: 1
emotional_intensity_band: 1
role: embodiment
story_origin: composite
