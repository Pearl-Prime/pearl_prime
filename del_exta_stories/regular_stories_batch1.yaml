atom_id: reg_STORY_hcr_burnout_005
body: |
  The corridor outside room fourteen is empty at 4am.
  Luz stands there for a moment after the handoff.
  The lights are dimmed for the night shift.
  She can hear the equipment. She can hear her own breathing.
  She does not have anywhere to be for forty seconds.
  Forty seconds is not enough to do anything with.
  And yet.
band: 1
emotional_intensity_band: 1
role: embodiment
story_origin: composite
