## HEALTHCARE_RNS × BURNOUT

---

atom_id: reg_STORY_hcr_burnout_001
body: |
  Priya has not eaten a full meal sitting down in eleven days.
  Not because there is no food. Because sitting down means stopping,
  and stopping means the next thing she has to do becomes visible.
  So she eats in the hallway, at the station, over the sink.
  The body keeps moving. The body has gotten very good at this.
  The body no longer signals hunger the way it used to.
  Now it signals collapse, and she works around that too.
band: 4
emotional_intensity_band: 4
role: embodiment
story_origin: composite
story_type: character_study
misfire_tax: false

