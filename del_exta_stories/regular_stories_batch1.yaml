atom_id: reg_STORY_gzp_selfworth_002
body: |
  He got the internship. The one he applied to sixteen times across two years.
  He tells his parents. They are happy. He is happy for a day.
  On day two he starts wondering if he actually deserved it
  or if it was a slow application season.
  He googles the acceptance rate. Finds a number.
  The number does not help. He starts wondering
  what they will find out about him once he starts.
band: 3
emotional_intensity_band: 3
role: recognition
story_origin: composite
story_type: character_study

---

atom_id: reg_STORY_gzp_selfworth_003
body: |
  The comparison is not with people she knows.
  It is with people she has never met who appear to be doing
  what she wishes she were doing with more success
  than she believes she is capable of.
  She knows this is constructed. She knows she is seeing
  the curated version. She knows all of this.
  The knowing does not stop the comparison from landing
  in her chest at 10pm like a small reliable failure.
band: 4
emotional_intensity_band: 4
role: mechanism_proof
story_origin: composite
story_type: direct_teaching

