atom_id: miki_STORY_102
body: |
  She wakes at 2am with a thought about something she said in 2019.
  Not a bad thing. A slightly wrong thing. A word that landed off.
  The person she said it to has not thought about it since.
  She knows this. The knowledge does not help.
  She lies in the dark and walks through the conversation again,
  edits it, walks through a better version, considers whether
  the better version would have changed anything.
  It would not have. She knows that too.
  By 3am she is still walking.
