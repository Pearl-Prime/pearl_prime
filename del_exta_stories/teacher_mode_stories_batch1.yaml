atom_id: miki_STORY_104
body: |
  Daisuke sends an email and immediately wonders if the tone was wrong.
  He reads it back. It was fine. He reads it again to be sure.
  Still fine. He checks if the recipient has opened it.
  They have not. He checks again in ten minutes.
  Still not. He starts a follow-up email and stops himself.
  He closes the tab. Opens it again.
  The original email was fine. He wrote a fine email.
  He will not know this for certain until they respond.
  He will check six more times before they do.
