  Rain on the window. 6am.
  Tomoko sits at the kitchen table before anyone else is awake.
  The cup is warm. Both hands around it.
  She is not planning anything. Not yet.
  For three minutes the only thing moving is the rain
  and the heat coming through the ceramic into her palms.
  The day has not started asking for anything.
  She stays until the cup cools.
