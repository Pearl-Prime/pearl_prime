atom_id: ahjan_STORY_104
body: |
  James has three alarms set for 6am. He wakes at 5:47 every morning
  in the dark, already counting. Meetings. Deliverables. The thing he said
  yesterday that landed wrong. He does not notice the counting. He notices
  only that he is already tired before the first alarm sounds.
  The body has been working since 3am. The mind caught up at 5:47.
  By the time he reaches the office he has already spent the day's first
  reserves on a day that has not yet started.
