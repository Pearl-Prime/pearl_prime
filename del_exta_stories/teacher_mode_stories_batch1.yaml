atom_id: maat_STORY_102
body: |
  There is a teaching that the principle of Ma'at does not ask
  whether you were productive. It asks whether you were true.
  Not true to your goals. Not true to your metrics.
  True to the weight of your own life as you actually lived it.
  Most people who are burning do not lack discipline.
  They lack permission to stop performing disciplines
  that are no longer theirs. The feather knows the difference.
  The question is whether you will sit still long enough to feel it.
