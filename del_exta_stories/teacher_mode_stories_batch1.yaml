## MAAT — self_worth, grief, burnout (principle teacher: parable/atmospheric/wisdom voice only)

---

atom_id: maat_STORY_101
body: |
  In the old teaching, Ma'at is not a reward for the good life.
  Ma'at is what remains when all that is false has been removed.
  The feather does not weigh the heart against virtue.
  It weighs the heart against itself. Against what it has been carrying
  that it was never meant to carry.
  The exhausted soul does not fail the weighing for being tired.
  It fails only if it has confused the weight of others' needs
  with its own true measure and forgotten the difference.
