atom_id: maat_STORY_104
body: |
  What weighs more: the thing you did not do, or the years you spent
  telling yourself you should have done it?
  In the framework of Ma'at, the wound itself is not the problem.
  The accumulated story about the wound is what fills the heart.
  The principle does not offer forgiveness as transaction.
  It offers the possibility that you were, at each moment,
  carrying what you knew how to carry. And that the weighing
  can begin again from here, with what you know now,
  if you are willing to set down the accounting.
