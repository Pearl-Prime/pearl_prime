# Pearl Prime — musician survey (canonical schema). Mirrors paste-ready operator survey.
survey_version: "1.0"
description: "Pearl Prime — Music Reflections (schema for Google Form / YAML capture)"

identity:
  display_name: { required: true }
  years_active: { required: false }
  primary_genre: { required: true }
  secondary_genres: { required: false, type: list }
  primary_instruments: { required: false, type: list }
  creative_phases: { required: false, type: list }

themes:
  primary_themes: { required: true, type: list, description: "3–5 themes" }
  avoided_themes: { required: false, type: list }
  listener_hope_one: { required: true }

voice_craft:
  voice_person: { enum: [first_person, observational, character_driven, mixed] }
  register: { enum: [plain_spoken, poetic, technical, mixed] }
  pacing: { enum: [short_clipped, long_flowing, varied] }
  signature_devices: { required: false, type: list }

material_for_reflection:
  touchstone_tracks: { required: true, type: list, description: "5–10 songs/albums" }
  key_collaborators: { required: false }
  citations_links: { required: false, type: list }

healing_intent:
  what_helps_heal: { required: true }
  listener_responses_to_amplify: { required: false }
  wellness_framing_rejects: { required: false }

output_preferences_with_lyrics:
  lyric_form: { enum: [free_verse, rhymed, verse_chorus] }
  lyric_length_note: { required: false }
  explicit_content_ok: { type: bool }
  companion_ai_song_consent: { type: bool }

output_preferences_no_lyrics:
  reflection_form: { enum: [essay, journal_entry, meditation, mixed] }
  reflection_perspective: { enum: [musician, listener, critic, mixed] }

consent_licensing:
  ai_reflections_consent: { required: true, type: bool }
  usage_restrictions: { required: false }
  followup_email: { required: true }
  submitted_date: { required: true }
  signature: { required: true }
