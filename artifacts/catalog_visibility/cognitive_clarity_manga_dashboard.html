<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manga catalog — cognitive_clarity (en)</title>
  <style>
    :root {
      --bg: #0f1216;
      --panel: #171b22;
      --border: #2a3140;
      --text: #e8ecf2;
      --muted: #9aa7b8;
      --accent: #5b8cff;
      --green: #2d6a4f;
      --amber: #b08900;
      --red: #9b2226;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header.kpi {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 12px 10px 212px;
      border-bottom: 1px solid var(--border);
      background: #12161d;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .pill {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: var(--panel);
    }
    .pill.green { background: #1b4332; border-color: #2d6a4f; }
    .pill.amber { background: #3d3000; border-color: var(--amber); color: #ffe08a; }
    .layout { display: flex; flex: 1; min-height: 0; }
    nav.rail {
      width: 200px;
      flex: 0 0 200px;
      border-right: 1px solid var(--border);
      padding: 12px;
      position: sticky;
      top: 0;
      align-self: flex-start;
      max-height: 100vh;
      overflow: auto;
      background: #12161d;
    }
    nav.rail h2 { font-size: 14px; margin: 0 0 8px; color: var(--muted); font-weight: 600; }
    nav.rail label { display: block; font-size: 12px; margin: 4px 0; cursor: pointer; color: var(--text); }
    nav.rail input[type="search"], nav.rail input[type="text"] {
      width: 100%; padding: 6px 8px; margin-bottom: 10px;
      border-radius: 6px; border: 1px solid var(--border); background: var(--panel); color: var(--text);
    }
    .reset { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: underline; display: inline-block; margin-top: 8px; }
    main { flex: 1; padding: 14px 16px 48px; overflow: auto; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
    .toolbar .views button {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .toolbar .views button.active { border-color: var(--accent); background: #1e2a44; }
    .count { color: var(--muted); font-size: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 420px;
    }
    .card .hero {
      height: 200px;
      background: #222831;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card .hero img { width: 100%; height: 100%; object-fit: cover; }
    .badge-missing {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.65);
      color: #ffb703;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .card .body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card h3 { margin: 0; font-size: 16px; }
    .logline { font-style: italic; font-size: 13px; color: var(--muted); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #222; border: 1px solid var(--border); color: var(--muted); }
    .warns { font-size: 11px; color: #ffb4a2; }
    .badges-row { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; }
    .mini { font-size: 11px; color: var(--muted); }
    .lp-p0 { background: #5c1014; color: #fff; padding: 2px 6px; border-radius: 4px; }
    .lp-p1 { background: #5c3b00; color: #ffe08a; padding: 2px 6px; border-radius: 4px; }
    .lp-p2 { background: #0d3b66; color: #caf0f8; padding: 2px 6px; border-radius: 4px; }
    .lp-unset { background: #333; color: #ccc; padding: 2px 6px; border-radius: 4px; }
    .expand { margin-top: auto; font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 0; text-align: left; }
    table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.data th, table.data td { border-bottom: 1px solid var(--border); padding: 8px 6px; text-align: left; }
    table.data th { cursor: pointer; user-select: none; color: var(--muted); font-weight: 600; }
    table.data tr:hover { background: #1a1f28; }
    .gap-section { margin-bottom: 18px; }
    .gap-section h4 { margin: 0 0 8px; font-size: 14px; color: #ffb703; }
    .gallery { columns: 4 200px; column-gap: 10px; }
    .gallery .tile { break-inside: avoid; margin-bottom: 10px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
    .gallery .tile .ph { height: 180px; background: #222831; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); }
    .gallery .tile img { width: 100%; display: block; }
    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 20; display: none;
    }
    .drawer-backdrop.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: 0; width: 400px; max-width: 100%; height: 100%;
      background: #141820; border-left: 1px solid var(--border); z-index: 21;
      transform: translateX(100%); transition: transform 0.2s ease; overflow: auto; padding: 14px;
    }
    .drawer.open { transform: translateX(0); }
    .drawer h3 { margin-top: 0; }
    .drawer dl { font-size: 13px; }
    .drawer dt { color: var(--muted); margin-top: 8px; }
    .drawer dd { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .drawer button.cmd {
      display: block; width: 100%; margin-top: 10px; padding: 8px;
      border-radius: 6px; border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer; font-size: 13px;
    }
    .drawer code.path { font-size: 11px; display: block; padding: 8px; background: #0b0d11; border-radius: 6px; border: 1px solid var(--border); word-break: break-all; }
  </style>
</head>
<body>

      <div id="content"></div>

  </div>

  <aside class="drawer" id="drawer"></aside>

  <script>
  (function () {
    const raw = document.getElementById("manga-data").textContent;
    const SERIES = JSON.parse(raw);

    const state = {
      q: "",
      genre: {},
      engine: {},
      promise: {},
      status: "all",
      launch: "all",
      image: "all",
      meta: "all",
      view: "card",
      sort: { key: "series_title", dir: 1 }
    };

    function statusBucket(s) {
      const v = (s || "").toLowerCase();
      if (/ship|live|publish/i.test(v)) return "shipped";
      if (/production|prod|active/.test(v)) return "in_production";
      return "in_plan";
    }

    function lpKey(p) {
      if (!p) return "unset";
      const u = String(p).toUpperCase();
      if (u.startsWith("P0")) return "P0";
      if (u.startsWith("P1")) return "P1";
      if (u.startsWith("P2")) return "P2";
      if (u.startsWith("P3")) return "P3";
      return "unset";
    }

    function marketingGaps(row) {
      const keys = ["reader_promise", "marketing_angle", "series_description", "launch_priority"];
      return keys.filter((k) => !row[k] || (typeof row[k] === "string" && !row[k].trim()));
    }

    function imgSrc(row) {
      const p = row.main_character_image_path;
      if (!p) return null;
      if (p.startsWith("http")) return p;
      return "../../" + p.replace(/^\.\//, "");
    }

    function passesFilters(row) {
      const hay = ((row.series_title || "") + " " + (row.series_id || "") + " " + (row.main_character_name || "")).toLowerCase();
      if (state.q && !hay.includes(state.q.toLowerCase())) return false;
      if (row.genre_family && state.genre[row.genre_family] === false) return false;
      if (row.emotional_engine && state.engine[row.emotional_engine] === false) return false;
      if (row.reader_promise && state.promise[row.reader_promise] === false) return false;
      if (state.status !== "all" && statusBucket(row.status) !== state.status) return false;
      if (state.launch !== "all") {
        const k = lpKey(row.launch_priority);
        if (state.launch === "unset" && k !== "unset") return false;
        if (state.launch !== "unset" && k !== state.launch) return false;
      }
      if (state.image === "has" && !row.main_character_image_path) return false;
      if (state.image === "missing" && row.main_character_image_path) return false;
      const mg = marketingGaps(row);
      if (state.meta === "complete" && mg.length) return false;
      if (state.meta === "gaps" && !mg.length) return false;
      return true;
    }

    function uniq(field) {
      const s = new Set();
      SERIES.forEach((r) => { if (r[field]) s.add(r[field]); });
      return Array.from(s).sort();
    }

    function buildRail() {
      const genres = uniq("genre_family");
      const engines = uniq("emotional_engine");
      const promises = uniq("reader_promise");
      let html = "<h2>Search</h2><input type=\"search\" id=\"q\" placeholder=\"Title / ID / character\" />";
      html += "<h2>Genre family</h2>";
      genres.forEach((g) => {
        html += "<label><input type=\"checkbox\" class=\"g\" data-v=\"" + escAttr(g) + "\" checked /> " + escHtml(g) + "</label>";
      });
      html += "<h2>Emotional engine</h2>";
      engines.forEach((g) => {
        html += "<label><input type=\"checkbox\" class=\"e\" data-v=\"" + escAttr(g) + "\" checked /> " + escHtml(g) + "</label>";
      });
      html += "<h2>Reader promise</h2>";
      promises.forEach((g) => {
        html += "<label><input type=\"checkbox\" class=\"p\" data-v=\"" + escAttr(g) + "\" checked /> " + escHtml(g) + "</label>";
      });
      html += "<h2>Status</h2>";
      ["all", "in_plan", "in_production", "shipped"].forEach((v) => {
        html += "<label><input type=\"radio\" name=\"st\" value=\"" + v + "\"" + (v === "all" ? " checked" : "") + "/> " + v.replace(/_/g, " ") + "</label>";
      });
      html += "<h2>Launch priority</h2>";
      ["all", "P0", "P1", "P2", "P3", "unset"].forEach((v) => {
        html += "<label><input type=\"radio\" name=\"lp\" value=\"" + v + "\"" + (v === "all" ? " checked" : "") + "/> " + v + "</label>";
      });
      html += "<h2>Image</h2>";
      ["all", "has", "missing"].forEach((v) => {
        const lab = v === "has" ? "Has image" : v === "missing" ? "Missing image" : "All";
        html += "<label><input type=\"radio\" name=\"im\" value=\"" + v + "\"" + (v === "all" ? " checked" : "") + "/> " + lab + "</label>";
      });
      html += "<h2>Metadata</h2>";
      ["all", "complete", "gaps"].forEach((v) => {
        const lab = v === "complete" ? "Complete" : v === "gaps" ? "Gaps" : "All";
        html += "<label><input type=\"radio\" name=\"md\" value=\"" + v + "\"" + (v === "all" ? " checked" : "") + "/> " + lab + "</label>";
      });
      html += "<div><span class=\"reset\" id=\"reset\">Reset filters</span></div>";
      document.getElementById("rail").innerHTML = html;
      wireRail();
    }

    function escHtml(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function escAttr(s) {
      return String(s).replace(/"/g, "&quot;");
    }

    function wireRail() {
      document.getElementById("q").addEventListener("input", (ev) => { state.q = ev.target.value; render(); });
      document.querySelectorAll(".g").forEach((el) => {
        state.genre[el.dataset.v] = el.checked;
        el.addEventListener("change", () => {
          document.querySelectorAll(".g").forEach((x) => { state.genre[x.dataset.v] = x.checked; });
          render();
        });
      });
      document.querySelectorAll(".e").forEach((el) => {
        state.engine[el.dataset.v] = el.checked;
        el.addEventListener("change", () => {
          document.querySelectorAll(".e").forEach((x) => { state.engine[x.dataset.v] = x.checked; });
          render();
        });
      });
      document.querySelectorAll(".p").forEach((el) => {
        state.promise[el.dataset.v] = el.checked;
        el.addEventListener("change", () => {
          document.querySelectorAll(".p").forEach((x) => { state.promise[x.dataset.v] = x.checked; });
          render();
        });
      });
      document.querySelectorAll("input[name=st]").forEach((el) => {
        el.addEventListener("change", () => { state.status = el.value; render(); });
      });
      document.querySelectorAll("input[name=lp]").forEach((el) => {
        el.addEventListener("change", () => { state.launch = el.value; render(); });
      });
      document.querySelectorAll("input[name=im]").forEach((el) => {
        el.addEventListener("change", () => { state.image = el.value; render(); });
      });
      document.querySelectorAll("input[name=md]").forEach((el) => {
        el.addEventListener("change", () => { state.meta = el.value; render(); });
      });
      document.getElementById("reset").addEventListener("click", () => {
        state.q = "";
        state.status = "all";
        state.launch = "all";
        state.image = "all";
        state.meta = "all";
        document.querySelectorAll(".g,.e,.p").forEach((x) => { x.checked = true; });
        document.querySelectorAll("input[name=st][value=all]").forEach((x) => { x.checked = true; });
        document.querySelectorAll("input[name=lp][value=all]").forEach((x) => { x.checked = true; });
        document.querySelectorAll("input[name=im][value=all]").forEach((x) => { x.checked = true; });
        document.querySelectorAll("input[name=md][value=all]").forEach((x) => { x.checked = true; });
        document.getElementById("q").value = "";
        SERIES.forEach((r) => {
          if (r.genre_family) state.genre[r.genre_family] = true;
          if (r.emotional_engine) state.engine[r.emotional_engine] = true;
          if (r.reader_promise) state.promise[r.reader_promise] = true;
        });
        render();
      });
    }

    function filtered() {
      return SERIES.filter(passesFilters);
    }

    function kpiHtml(rows) {
      const n = SERIES.length;
      const withImg = SERIES.filter((r) => r.main_character_image_path).length;
      const missImg = n - withImg;
      let fullM = 0;
      SERIES.forEach((r) => { if (!marketingGaps(r).length) fullM++; });
      const missM = n - fullM;
      const p0 = SERIES.filter((r) => lpKey(r.launch_priority) === "P0").length;
      return ""
        + "<span class=\"pill\">Total series: <b>" + n + "</b></span>"
        + "<span class=\"pill green\">With character image: " + withImg + "</span>"
        + "<span class=\"pill amber\">Missing image: " + missImg + "</span>"
        + "<span class=\"pill green\">Full marketing metadata: " + fullM + "</span>"
        + "<span class=\"pill amber\">Marketing gaps: " + missM + "</span>"
        + "<span class=\"pill\">P0 releases: " + p0 + "</span>";
    }

    function sortRows(rows) {
      const k = state.sort.key;
      const d = state.sort.dir;
      return rows.slice().sort((a, b) => {
        const va = (a[k] != null ? String(a[k]) : "").toLowerCase();
        const vb = (b[k] != null ? String(b[k]) : "").toLowerCase();
        if (va < vb) return -1 * d;
        if (va > vb) return 1 * d;
        return 0;
      });
    }

    function render() {
      const rows = filtered();
      document.getElementById("kpi").innerHTML = kpiHtml(rows);
      document.getElementById("countline").textContent = "Showing " + rows.length + " of " + SERIES.length + " series";
      const views = ["card", "table", "gap", "gallery"];
      let vh = "";
      views.forEach((v) => {
        vh += "<button type=\"button\" data-v=\"" + v + "\" class=\"" + (state.view === v ? "active" : "") + "\">" + v + "</button>";
      });
      document.getElementById("views").innerHTML = vh;
      document.querySelectorAll("#views button").forEach((b) => {
        b.addEventListener("click", () => { state.view = b.dataset.v; render(); });
      });
      if (state.view === "card") document.getElementById("content").innerHTML = cardView(rows);
      else if (state.view === "table") document.getElementById("content").innerHTML = tableView(sortRows(rows));
      else if (state.view === "gap") document.getElementById("content").innerHTML = gapView(rows);
      else document.getElementById("content").innerHTML = galleryView(rows);
      wireCards();
    }

    function inlineBadges(row) {
      const bits = [];
      if (!row.main_character_image_path) bits.push("🔴 Missing character image");
      if (!row.series_description) bits.push("🟡 Missing series description");
      if (!row.marketing_angle) bits.push("🟡 Missing marketing angle");
      if (!row.reader_promise) bits.push("🟡 Missing reader promise");
      if (!row.launch_priority) bits.push("🟡 Missing launch priority");
      return bits.length ? "<div class=\"warns\">" + bits.map(escHtml).join("<br/>") + "</div>" : "";
    }

    function lpClass(p) {
      const k = lpKey(p);
      if (k === "P0") return "lp-p0";
      if (k === "P1") return "lp-p1";
      if (k === "P2") return "lp-p2";
      return "lp-unset";
    }

    function cardView(rows) {
      let h = "<div class=\"grid\">";
      rows.forEach((row) => {
        const src = imgSrc(row);
        const title = escHtml(row.series_title || row.series_id || "");
        const logline = escHtml(row.series_logline || "");
        const angle = escHtml(row.marketing_angle || "");
        const comps = (row.comp_titles || []).map(escHtml).join(", ");
        const hero = src
          ? "<div class=\"hero\"><img src=\"" + escAttr(src) + "\" alt=\"\" /></div>"
          : "<div class=\"hero\"><span class=\"badge-missing\">Missing in plan</span></div>";
        h += "<article class=\"card\" data-id=\"" + escAttr(row.series_id) + "\">";
        h += hero;
        h += "<div class=\"body\">";
        h += "<h3>" + title + "</h3>";
        h += "<div class=\"logline\">" + logline + "</div>";
        h += "<div class=\"tags\">";
        if (row.genre_family) h += "<span class=\"tag\">" + escHtml(row.genre_family) + "</span>";
        if (row.emotional_engine) h += "<span class=\"tag\">" + escHtml(row.emotional_engine) + "</span>";
        if (row.reader_promise) h += "<span class=\"tag\">" + escHtml(row.reader_promise).slice(0, 40) + (row.reader_promise.length > 40 ? "…" : "") + "</span>";
        h += "</div>";
        h += "<div class=\"mini\">" + escHtml(angle).slice(0, 200) + "</div>";
        if (comps) h += "<div class=\"mini\">Comp: " + comps + "</div>";
        h += "<div class=\"badges-row\">";
        if (row.audience || row.market_demo) h += "<span class=\"tag\">" + escHtml(row.audience || row.market_demo) + "</span>";
        h += "<span class=\"" + lpClass(row.launch_priority) + "\">" + escHtml(lpKey(row.launch_priority)) + "</span>";
        h += "<span class=\"tag\">" + escHtml(statusBucket(row.status)) + "</span>";
        h += "</div>";
        h += inlineBadges(row);
        h += "<button type=\"button\" class=\"expand\" data-open=\"" + escAttr(row.series_id) + "\">Expand details →</button>";
        h += "</div></article>";
      });
      h += "</div>";
      return h;
    }

    function tableView(rows) {
      let h = "<table class=\"data\"><thead><tr>";
      ["series_title", "genre_family", "emotional_engine", "reader_promise", "launch_priority", "status", "img", "mkt", "plan"].forEach((col) => {
        h += "<th data-sort=\"" + escAttr(col) + "\">" + escHtml(col) + "</th>";
      });
      h += "</tr></thead><tbody>";
      rows.forEach((row) => {
        const mg = marketingGaps(row);
        h += "<tr data-open=\"" + escAttr(row.series_id) + "\">";
        h += "<td>" + escHtml(row.series_title || row.series_id) + "</td>";
        h += "<td>" + escHtml(row.genre_family || "") + "</td>";
        h += "<td>" + escHtml(row.emotional_engine || "") + "</td>";
        h += "<td>" + escHtml((row.reader_promise || "").slice(0, 40)) + "</td>";
        h += "<td>" + escHtml(lpKey(row.launch_priority)) + "</td>";
        h += "<td>" + escHtml(statusBucket(row.status)) + "</td>";
        h += "<td>" + (row.main_character_image_path ? "✓" : "✗") + "</td>";
        h += "<td>" + (mg.length ? "✗" : "✓") + "</td>";
        h += "<td><code style=\"font-size:11px\">" + escHtml(row.plan_source_path || "") + "</code></td>";
        h += "</tr>";
      });
      h += "</tbody></table>";
      return h;
    }

    function gapView(rows) {
      const fieldGroups = {};
      const fields = ["main_character_image_path", "series_description", "marketing_angle", "reader_promise", "launch_priority"];
      fields.forEach((f) => { fieldGroups[f] = []; });
      rows.forEach((row) => {
        fields.forEach((f) => {
          if (!row[f] || (typeof row[f] === "string" && !row[f].trim())) fieldGroups[f].push(row);
        });
      });
      let h = "";
      fields.forEach((f) => {
        const list = fieldGroups[f];
        if (!list.length) return;
        h += "<div class=\"gap-section\"><h4>Missing " + escHtml(f) + " (" + list.length + ")</h4><ul>";
        list.forEach((r) => { h += "<li>" + escHtml(r.series_title || r.series_id) + "</li>"; });
        h += "</ul></div>";
      });
      if (!h) h = "<p>No gaps in filtered set.</p>";
      return h;
    }

    function galleryView(rows) {
      let h = "<div class=\"gallery\">";
      rows.forEach((row) => {
        const src = imgSrc(row);
        h += "<div class=\"tile\" data-open=\"" + escAttr(row.series_id) + "\">";
        if (src) h += "<img src=\"" + escAttr(src) + "\" alt=\"\" />";
        else h += "<div class=\"ph\">Missing in plan<br/><span style=\"font-size:11px\">" + escHtml(row.series_id) + "</span></div>";
        h += "</div>";
      });
      h += "</div>";
      return h;
    }

    function drawerHtml(row) {
      let h = "<h3>" + escHtml(row.series_title || row.series_id) + "</h3>";
      h += "<code class=\"path\">" + escHtml(row.plan_source_path || "") + "</code>";
      h += "<dl>";
      Object.keys(row).sort().forEach((k) => {
        if (k === "hook_lines" || k === "comp_titles") return;
        h += "<dt>" + escHtml(k) + "</dt><dd>" + escHtml(row[k] == null ? "" : (typeof row[k] === "object" ? JSON.stringify(row[k], null, 0) : String(row[k]))) + "</dd>";
      });
      h += "<dt>hook_lines</dt><dd><ul>";
      (row.hook_lines || []).forEach((x) => { h += "<li>" + escHtml(x) + "</li>"; });
      if (!(row.hook_lines || []).length) h += "<li><i>(none)</i></li>";
      h += "</ul></dd>";
      h += "<dt>comp_titles</dt><dd>";
      (row.comp_titles || []).forEach((t) => { h += "<span class=\"tag\" style=\"display:inline-block;margin:2px\">" + escHtml(t) + "</span>"; });
      if (!(row.comp_titles || []).length) h += "<i>(none)</i>";
      h += "</dd></dl>";
      const prompt = [
        row.main_character_name || "protagonist",
        row.genre_family || "",
        row.visual_grammar || "",
        row.emotional_engine || ""
      ].filter(Boolean).join(", ");
      const cmd = "eval \"$(python3 scripts/ci/load_integration_env_from_keychain.py)\" && python3 scripts/catalog_visibility/generate_character_image.py --series-id "
        + shellQuote(row.series_id) + " --prompt " + shellQuote(prompt);
      if (!row.main_character_image_path) {
        h += "<button type=\"button\" class=\"cmd\" id=\"copyrc\">Copy RunComfy generate command</button>";
        h += "<p class=\"mini\">Static HTML cannot run local Python. Paste the copied command in your repo root shell after loading Keychain env.</p>";
        h += "<code class=\"path\" style=\"margin-top:8px\">" + escHtml(cmd) + "</code>";
      }
      h += "<button type=\"button\" class=\"cmd\" id=\"copyjson\">Copy series JSON</button>";
      return { html: h, cmd: cmd, row: row };
    }

    function shellQuote(s) {
      return "'" + String(s).replace(/'/g, "'\"'\"'") + "'";
    }

    function openDrawer(row) {
      const { html, cmd, row: r } = drawerHtml(row);
      const dr = document.getElementById("drawer");
      dr.innerHTML = html;
      dr.classList.add("open");
      document.getElementById("backdrop").classList.add("open");
      const cj = document.getElementById("copyjson");
      if (cj) cj.addEventListener("click", () => navigator.clipboard.writeText(JSON.stringify(r, null, 2)));
      const crc = document.getElementById("copyrc");
      if (crc) crc.addEventListener("click", () => navigator.clipboard.writeText(cmd));
    }

    function closeDrawer() {
      document.getElementById("drawer").classList.remove("open");
      document.getElementById("backdrop").classList.remove("open");
    }

    function wireCards() {
      document.querySelectorAll("[data-open]").forEach((el) => {
        el.addEventListener("click", () => {
          const id = el.getAttribute("data-open");
          const row = SERIES.find((r) => r.series_id === id);
          if (row) openDrawer(row);
        });
      });
      document.querySelectorAll("th[data-sort]").forEach((th) => {
        th.addEventListener("click", () => {
          const k = th.getAttribute("data-sort");
          if (k === "img" || k === "mkt" || k === "plan") return;
          if (state.sort.key === k) state.sort.dir *= -1;
          else { state.sort.key = k; state.sort.dir = 1; }
          render();
        });
      });
    }

    document.getElementById("backdrop").addEventListener("click", closeDrawer);

    buildRail();
    SERIES.forEach((r) => {
      if (r.genre_family) state.genre[r.genre_family] = true;
      if (r.emotional_engine) state.engine[r.emotional_engine] = true;
      if (r.reader_promise) state.promise[r.reader_promise] = true;
    });
    render();
  })();
  </script>
</body>
</html>
