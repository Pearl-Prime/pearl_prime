    statutory_basis_url: "https://en.wikipedia.org/wiki/Copyright_law_of_Japan"
    pd_horizon_anchors:
      - { mangaka: "Osamu Tezuka", died: 1989, jp_pd_year: "2060-01-01", license_tier: 🔴, note: "Still copyright; Tezuka Productions per-publication licensing the only path before 2060" }
      - { mangaka: "Shigeru Mizuki", died: 2015, jp_pd_year: "2086-01-01", license_tier: 🔴 }
      - { mangaka: "Mitsuteru Yokoyama", died: 2004, jp_pd_year: "2075-01-01", license_tier: 🔴 }
      - { mangaka: "Kitazawa Rakuten", died: 1955, jp_pd_year: "2026-01-01", license_tier: 🟢, note: "⭐ PD as of 2026-01-01; single most consequential new asset (50-year term applied at death; 2018 extension non-retroactive)" }
      - { mangaka: "Yumeji Takehisa", died: 1934, jp_pd_year: "~2005", license_tier: 🟢, note: "Solidly PD; pre-1999 PD entry" }
      - { mangaka: "Okamoto Ippei", died: 1948, jp_pd_year: "1999→2019", license_tier: 🟢, note: "PD; entered before 2018 extension cutoff" }
      - { mangaka: "Ishinomori Shotaro", died: 1998, jp_pd_year: "2069-01-01", license_tier: 🔴 }
      - { mangaka: "Akatsuka Fujio", died: 2008, jp_pd_year: "2079-01-01", license_tier: 🔴 }
      - { mangaka: "Fujiko F. Fujio", died: 1996, jp_pd_year: "2067-01-01", license_tier: 🔴 }

  creative_commons_licensed_manga:
    status: resolved_pr_b
    finding: "There is no canonical 2026 corpus of CC-licensed Japanese manga. Pepper&Carrot (David Revoy, CC-BY 4.0) is the only CC manga-styled work usable in shipped product."
    discovery_methodology_used: "Wikimedia Commons + Internet Archive + creator-hosted sites + Wikipedia 'Creative Commons-licensed comics' category audit (NB: at least 2 false positives in that category — Erma, Hyperbole and a Half are NOT actually CC)"
    one_load_bearing_title:
      title: "Pepper&Carrot"
      author: "David Revoy"
      url: "https://www.peppercarrot.com/"
      license: "CC-BY 4.0"
      license_tier: 🟢

  public_domain_reference_art:
    status: corpus_partial
    entries:
      - { title: "Hokusai's Manga (1814–1878)", artist: "Katsushika Hokusai", url: "https://en.wikipedia.org/wiki/Hokusai_Manga", license: "PD-Japan-PD-US", relevance: "line-economy reference; manga's etymological root" }
      - { title: "Ukiyo-e by Utagawa Kuniyoshi", artist: "Utagawa Kuniyoshi (1798–1861)", url: "https://en.wikipedia.org/wiki/Utagawa_Kuniyoshi", license: "PD", relevance: "shonen-action composition lineage" }
      - { title: "Yoshitoshi (1839–1892)", artist: "Tsukioka Yoshitoshi", url: "https://en.wikipedia.org/wiki/Tsukioka_Yoshitoshi", license: "PD", relevance: "horror/macabre register lineage; Maruo influence" }
      - { title: "Classical Japanese sumi-e", url: "https://en.wikipedia.org/wiki/Sumi-e", license: "PD-traditional", relevance: "line-economy reference; iyashikei + dark-fantasy brush-pole anchor" }

  publisher_sample_pages:
    status: resolved_pr_b
    finding: "No major Japanese manga publisher offers a public educational / press / fair-use allowance Phoenix can rely on without per-title licensing. All catalog use is 'commercial purpose' per MangaPlus Article 9 §1(12)."
    publishers_audited: [Shueisha (MangaPlus), Kodansha, Shogakukan (ShoPro), Kadokawa, Tezuka Productions]
    operative_posture: "Joint Cloudflare suit (Nov 2025) — aggressive enforcement, no presumption of fair use"
    only_workable_middle_ground: "Tezuka Productions per-publication clearance (https://tezuka.co.jp/en/contact/index.html)"
    license_tier: 🔴
    recommendation: "Skip publisher-copyrighted material entirely; rely on PD anchors + Phoenix-trained LoRAs"

  synthetic_reference:
    status: resolved_pr_b
    framework_note: |
      Generating small reference sets *from* trained Phoenix Omega LoRAs at lower
      res for QA / drift-detection. Legal posture per
      artifacts/research/synthetic_reference_legal_position_2026-05-03.md:
      - Internal-only QA gates: 🟢 OK
      - Embedded in shipped product: 🔴 HOLD pending Andersen v. Stability AI merits ruling
      Operator E1 default = conservative; matches the legal floor.
    operator_default: conservative_internal_only

  manga109_dataset:
    status: resolved_pr_b
    license_url: "https://huggingface.co/datasets/hal-utokyo/Manga109-s"
    paper_citation_url: "https://arxiv.org/abs/2005.04425"
    license_tier: 🟢_for_training_🔴_for_imagery_in_shipped_product
    phoenix_commercial_use_posture: |
      Manga109-s clause (5) explicitly authorises commercial use of "results... obtained
      from machine learning experiments." Trained LoRAs and their outputs ARE results.
      Clause (9) forbids treating "direct copies or modifications" as products.
      Clause (8) forbids selling Manga109-s images alongside results.
      Practical posture: USE FOR LORA TRAINING; DO NOT include Manga109-s imagery
      in any shipped artifact (cookbook, dashboard, marketing).
    deferred_subitem: "Cost estimate for separate negotiation tier covering the 22 non-s volumes — operator-outreach question to Aizawa Lab"

  clip_similarity_curation:
    status: framework_complete
    workflow: |
      Use CLIP embeddings to identify reference images Phoenix ALREADY has rights
      to (own previous outputs, brand-LoRA training sets) that exemplify a genre
      tradition. Steps:
      1. Compute CLIP embedding of all 624 PNGs in
         assets/manga_catalog/{brand}/{series}/main_character.png
      2. For each top-8 priority genre, define an anchor mangaka prompt
         (e.g., "Yokohama Kaidashi Kikou page in iyashikei register")
      3. Compute embedding-distance from Phoenix output to anchor prompt
      4. Top-N closest outputs become the genre's Phoenix-owned corpus

