    status: deferred_followup_pr
    framework_anchor: "MangaPlus free-first-three-chapters policy; publisher educational/promotional fair-use"
    publishers_to_research: [Shueisha, Kodansha, Shogakukan, Kadokawa]
    citation_pending: "publisher-policy URLs"

  synthetic_reference:
    status: corpus_complete  # framework-only entry
    framework_note: |
      Generating small reference sets *from* trained Phoenix Omega LoRAs at lower
      res for QA / drift-detection. Legal posture: derivative of model weights,
      not derivative of original training data. Suitable for QA harness reference
      embeddings; NOT for retraining.

  manga109_dataset:
    status: deferred_followup_pr
    framework_anchor: "Aizawa et al. paper; license_terms_pending"
    citation_pending: "Manga109 official site + license page"
    phoenix_commercial_use_posture: pending_legal_review

  clip_similarity_curation:
    status: framework_complete
    workflow: |
      Use CLIP embeddings to identify reference images Phoenix ALREADY has rights
      to (own previous outputs, brand-LoRA training sets) that exemplify a genre
      tradition. Steps:
      1. Compute CLIP embedding of all 624 PNGs in
         assets/manga_catalog/{brand}/{series}/main_character.png
      2. For each top-8 priority genre, define an anchor mangaka prompt
         (e.g., "Yokohama Kaidashi Kikou page in iyashikei register")
      3. Compute embedding-distance from Phoenix output to anchor prompt
      4. Top-N closest outputs become the genre's Phoenix-owned corpus

