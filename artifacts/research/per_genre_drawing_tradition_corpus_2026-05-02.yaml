    entries:
      - { title: "Hokusai's Manga (1814–1878)", artist: "Katsushika Hokusai", url: "https://en.wikipedia.org/wiki/Hokusai_Manga", license: "PD-Japan-PD-US", relevance: "line-economy reference; manga's etymological root" }
      - { title: "Ukiyo-e by Utagawa Kuniyoshi", artist: "Utagawa Kuniyoshi (1798–1861)", url: "https://en.wikipedia.org/wiki/Utagawa_Kuniyoshi", license: "PD", relevance: "shonen-action composition lineage" }
