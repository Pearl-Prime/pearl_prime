# ════════════════════════════════════════════════════════════════════════════
# MANGAKA WITH PHASE-TAGGED CAREER SHIFTS (operator I10+ scope)
# ════════════════════════════════════════════════════════════════════════════

phase_tagged_mangaka:

  inio_asano:
    primary_genre: romance
    secondary_genres: [slice_of_life, supernatural_everyday]
    url: "https://en.wikipedia.org/wiki/Inio_Asano"
    phases:
      - phase: solanin_pen_realism_with_comedic_faces
        era: "2005–2006"
        works: ["Solanin"]
        characteristic: "early phase: pen-led realism with exaggerated comedic faces in places"
      - phase: punpun_photo_traced_bg_with_bird_avatar
        era: "2007–2013"
        works: ["Goodnight Punpun", "Nijigahara Holograph"]
        characteristic: "mid phase: photo-traced backgrounds (B&W converted), cartoon-bird Punpun protagonist split"
      - phase: dededede_full_color_dense_tonework
        era: "2014–2022"
        works: ["Dead Dead Demon's Dededede Destruction"]
        characteristic: "late phase: full-color register, saturated pop palette over muted backgrounds"
    citations:
      - "https://www.animenewsnetwork.com/feature/2016-03-22/interview-inio-asano/.100079"
      - "https://www.animenewsnetwork.com/interview/2018-06-20/goodnight-punpun-creator-inio-asano/.133138"

  katsuhiro_otomo:
    primary_genre: mecha
    secondary_genres: [sci_fi_cyberpunk]
    url: "https://en.wikipedia.org/wiki/Katsuhiro_Otomo"
    phases:
      - phase: pre_akira_new_wave
        era: "1973–1981"
        works: ["Dōmu (1980–81)", "Fireball (1979)"]
        characteristic: "thinner lines, less mechanical density than Akira; New Wave economy"
      - phase: akira_peak_panel_manga
        era: "1982–1990"
        works: ["Akira (2000+ pages)"]
        characteristic: "the architectural mecha-cityscape gold standard"
      - phase: post_akira_film_illustration
        era: "1990–"
        works: ["Steamboy (2004)"]
        characteristic: "animation/illustration register, NOT panel-manga register"
    citations:
      - "http://paulgravett.com/articles/article/katsuhiro_otomo"
      - "http://www.scottmcd.net/artanalysis/?p=1355"

  osamu_tezuka:
    primary_genre: foundational_post_war
    secondary_genres: [cross_genre]
    url: "https://en.wikipedia.org/wiki/Osamu_Tezuka"
    phases:
      - phase: pre_1968_classical_storybook
        era: "1947–1968"
        works: ["Astro Boy (1952–68)", "Princess Knight (1953–56)", "Kimba (1950–54)"]
        characteristic: "round-classical Disney-influenced line; storybook page rhythm"
      - phase: post_1968_gekiga_turn
        era: "1968–1989"
        works: ["MW (1976–78)", "Buddha (1972–83)", "Phoenix late chapters", "Adolf (1983–85)"]
        characteristic: "gekiga turn: darker themes, more realistic line, mature ink density"
    citations:
      - "https://en.wikipedia.org/wiki/Gekiga"

  shigeru_mizuki:
    primary_genre: psychological_horror
    secondary_genres: [memoir, social_issue]
    url: "https://en.wikipedia.org/wiki/Shigeru_Mizuki"
    phases:
      - phase: kashibon_kamishibai_era
        era: "1950s–early 60s"
        works: ["Hakaba Kitarō (rental-comic original)"]
        characteristic: "rough rental-comic line, traveling-paper-drama framing"
      - phase: weekly_jump_kitarō_polish
        era: "1965–1969"
        works: ["GeGeGe no Kitarō serial"]
        characteristic: "polished commercial line for weekly-magazine pace"
      - phase: late_memoir_era
        era: "1988–2015"
        works: ["Showa: A History of Japan (1988–89)", "Onward Towards Our Noble Deaths (1973, late edition revisions)"]
        characteristic: "photo-traced realistic backgrounds beside cartoonish Mizuki figures (signature hybrid)"

  naoki_urasawa:
    primary_genre: procedural
    secondary_genres: [mystery, battle_internal]
    url: "https://en.wikipedia.org/wiki/Naoki_Urasawa"
    phases:
      - phase: pre_pluto_seinen_thriller
        era: "1986–2003"
        works: ["Yawara! (1986–93)", "Master Keaton (1988–94)", "Monster (1994–2001)", "20th Century Boys (1999–2006)"]
        characteristic: "naturalistic seinen line; cinematic shot-reverse-shot"
      - phase: pluto_through_billy_bat
        era: "2003–2016"
        works: ["Pluto (2003–09, with Tezuka Astro Boy adaptation)", "Billy Bat (2008–16)"]
        characteristic: "denser line work, more layered tonal grammar"
      - phase: post_billy_bat_essay_era
        era: "2016–"
        works: ["Mujirushi (2017–18)", "Asadora! (2018–)"]
        characteristic: "looser, more lyrical line; explicit nostalgia register"

  kentaro_miura:
    primary_genre: dark_fantasy
    secondary_genres: [fantasy_adventure]
    url: "https://en.wikipedia.org/wiki/Kentaro_Miura"
    phases:
      - phase: hand_hatched_pre_digital
        era: "1989–1997"
        works: ["Berserk vols 1–13"]
        characteristic: "hand-hatched, screentone-light, brush-heavy"
      - phase: digital_tone_assistant_pipeline
        era: "1998–2010"
        works: ["Berserk vols 14–35 (Conviction Arc through early Fantasia)"]
        characteristic: "digital tone introduction; same line philosophy at higher density"
      - phase: late_painted_inserts
        era: "2011–2021"
        works: ["Berserk vols 36–41", "Duranki (2019–20)"]
        characteristic: "more painted insert pages, color experimentation"

  takehiko_inoue:
    primary_genre: dark_fantasy
    secondary_genres: [sports, fantasy_adventure]
    url: "https://en.wikipedia.org/wiki/Takehiko_Inoue"
    phases:
      - phase: slam_dunk_sports_pen
        era: "1990–1996"
        works: ["Slam Dunk"]
        characteristic: "NOT dark-fantasy register; bright shonen line, speed-line vocabulary"
      - phase: vagabond_sumi_brush
        era: "1998–"
        works: ["Vagabond"]
        characteristic: "traditional Japanese ink-brush/sumi-e — washy, expressive; sumi-pole anchor for dark-fantasy"
      - phase: real_basketball_seinen
        era: "1999–"
        works: ["Real"]
        characteristic: "wheelchair-basketball josei-adjacent seinen; tighter line than Vagabond"

  akira_toriyama:
    primary_genre: fantasy_adventure
    secondary_genres: [battle, comedy]
    url: "https://en.wikipedia.org/wiki/Akira_Toriyama"
    phases:
      - phase: dr_slump_cartoon_domestic
        era: "1980–1984"
        works: ["Dr. Slump"]
        characteristic: "round-line gag-shonen, pre-square-line phase"
      - phase: dragon_ball_kinetic_shonen_fantasy
        era: "1984–1995"
        works: ["Dragon Ball / DBZ"]
        characteristic: "Tenkaichi-Frieza-Cell phase: square-line battle grammar codified"
      - phase: sand_land_refined_prestige
        era: "2000, 2024 revival"
        works: ["Sand Land"]
        characteristic: "more consistent than Dragon Ball; tankōbon-prestige register"

  tetsuo_hara:
    primary_genre: battle
    secondary_genres: [historical]
    url: "https://en.wikipedia.org/wiki/Tetsuo_Hara"
    phases:
      - phase: hokuto_no_ken
        era: "1983–1988"
        works: ["Fist of the North Star"]
        characteristic: "hyperrealist gekiga-influenced muscle anatomy; influences Mad Max + Frazetta + Otomo per Hara's cited references"
      - phase: post_fotns_keiji_cangs
        era: "1990–"
        works: ["Keiji (1990–93)", "Fist of the Blue Sky (2001–10)"]
        characteristic: "more historical-drama, less peak-hyperrealist anatomy"

  yusuke_murata:
    primary_genre: battle
    secondary_genres: [sports]
    url: "https://en.wikipedia.org/wiki/Yusuke_Murata"
    phases:
      - phase: eyeshield_21_sports_action
        era: "2002–2009"
        works: ["Eyeshield 21"]
        characteristic: "sports-action register; cleaner line, less environmental rendering than OPM"
      - phase: opm_cinematic_super_detailed
        era: "2012–"
        works: ["One-Punch Man"]
        characteristic: "cinematic super-detailed battle pages; frantic motion every panel"

  masamune_shirow:
    primary_genre: mecha
    secondary_genres: [sci_fi_cyberpunk]
    url: "https://en.wikipedia.org/wiki/Masamune_Shirow"
    phases:
      - phase: cyberpunk_mecha_pen
        era: "1985–1997"
        works: ["Appleseed (1985–89)", "Ghost in the Shell (1989–97)", "Dominion (1986)"]
        characteristic: "panel-manga line tradition, schematic density"
      - phase: post_1997_illustration_painted
        era: "1997–"
        works: ["Real Drive (2008)", "Ghost Hound (2007–08)"]
        characteristic: "less manga linework, more painted illustration — DON'T use as line-art reference"

  junji_ito:
    primary_genre: psychological_horror
    secondary_genres: [horror, dark_fantasy]
    url: "https://en.wikipedia.org/wiki/Junji_Ito"
    phases:
      - phase: early_tomie_shojo_horror_magazine
        era: "1987–2000s"
        works: ["Tomie (Monthly Halloween)"]
        characteristic: "sparser, cleaner shojo-adjacent line"
      - phase: post_2010_expansion
        era: "2010–"
        works: ["Tomie expansions, anthology series"]
        characteristic: "denser screentone use, fully developed cross-hatch dread vocabulary"

  kozue_amano:
    primary_genre: healing
    secondary_genres: [slice_of_life]
    url: "https://en.wikipedia.org/wiki/Kozue_Amano"
    phases:
      - phase: bright_watercolor_aria
        era: "2002–2008"
        works: ["ARIA"]
        characteristic: "ARIA register: lightest line, brightest gansai wash"
      - phase: amanchu_continuing
        era: "2008–2024"
        works: ["Amanchu!"]
        characteristic: "slightly bolder line, broader expression range"

  kiyohiko_azuma:
    primary_genre: slice_of_life
    secondary_genres: [comedy, family]
    url: "https://en.wikipedia.org/wiki/Kiyohiko_Azuma"
    phases:
      - phase: azumanga_yonkoma_experimental
        era: "1999–2002"
        works: ["Azumanga Daioh"]
        characteristic: "yonkoma-comedy, sharper experimental designs (10th-anniversary reissue redrawn in Yotsuba register)"
      - phase: yotsuba_documentary_realism
        era: "2003–"
        works: ["Yotsuba&!"]
        characteristic: "full-page documentary realism, rounded designs, expanded backgrounds"

  keiichi_arawi:
    primary_genre: comedy
    secondary_genres: [slice_of_life]
    url: "https://en.wikipedia.org/wiki/Nichijou"
    phases:
      - phase: nichijou_surrealist_explosion
        era: "2006–2015"
        works: ["Nichijou"]
        characteristic: "pushes deformation harder than City"
      - phase: city_urban_deadpan_calmer
        era: "2016–"
        works: ["City"]
        characteristic: "calmer than Nichijou; deadpan-comedy register"

  akiko_higashimura:
    primary_genre: romance
    secondary_genres: [comedy, workplace]
    url: "https://en.wikipedia.org/wiki/Akiko_Higashimura"
    phases:
      - phase: comedic_shojo_register
        era: "2008–2017"
        works: ["Princess Jellyfish / Kuragehime"]
        characteristic: "Eisner-shortlist; comedy-josei crossover"
      - phase: mature_josei_register
        era: "2014–2017"
        works: ["Tokyo Tarareba Girls"]
        characteristic: "sharper line economy, denser adult-anxiety thematic load"

  yaro_abe:
    primary_genre: food
    secondary_genres: [iyashikei, slice_of_life]
    url: "https://en.wikipedia.org/wiki/Shin%27ya_Shokud%C5%8D"
    phases:
      - phase: shinya_shokudo_early_intimate_register
        era: "2006–"
        works: ["Shinya Shokudō / Midnight Diner"]
        characteristic: "rough/intimate register; quiet-comedy boundary"

