# Bestseller benchmark — commercial target list + internal gate-distribution probe
#
# LEGAL / METHODOLOGY
# - The ten commercial titles below are the sprint corpus (metadata + public URLs).
#   First-chapter text for those titles was NOT committed: operator ingest is still
#   required (Kindle sample, library loan export, or publisher excerpt).
# - Gate scores under artifacts/research/bestseller_benchmark/scores/ were produced
#   from in-repo Phoenix manuscript chapters (deep_book_6h) plus one canary slice
#   (qa scratch standard_book ch1). Those files are NOT the copyrighted text of the
#   commercial titles. They quantify how the gate stack behaves on long-form Phoenix
#   prose while commercial chapters are sourced.
#
# Prior context: three-title anecdote (Bourne / Wilson / Breslin) referenced in sprint
# brief; extend with this N=10 distribution probe + N=1 canary — not a substitute
# for title-identified commercial chapters.

version: 1
session_id: bestseller-benchmark-gate-calibration-20260418
persona: gen_z_professionals

internal_calibration:
  description: >
    Ten consecutive first chapters from artifacts/qa/_scratch_pp_ahjan_genz_anxiety/
    deep_book_6h/book.txt (word counts 3.3k–6.5k each). Used only to measure gate
    variance and museum false-positive density on long Phoenix prose.
  sample_globs:
    - artifacts/research/bestseller_benchmark/samples/internal_deep6h_ch*.txt

canary:
  label: qa_scratch_standard_book_chapter_1
  path: artifacts/research/bestseller_benchmark/samples/_canary_standard_book_ch1.txt
  source_render: artifacts/qa/_scratch_pp_ahjan_genz_anxiety/standard_book/book.txt
  note: >
    This artifact matches the museum stress fixture opening ("soft daylight along the sill").
    It is useful as a worst-case canary for detectors, not as proof of shipping prose quality.

