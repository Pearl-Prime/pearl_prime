# Community LoRA Roster — Phoenix Omega manga genre coverage
#
# Phase 1 scope: 4 genres deep (3 failure-genres + 1 control). Phase 2
# territory: remaining 21 of 25 canonical genres.
#
# License tier convention:
#   🟢 commercial-clean — license + base model + dependencies all permit
#                          commercial use without per-case verification.
#   🟡 commercial-conditional — at least one of {license, base model,
#                                creator's Civitai flags} requires per-page
#                                verification or has caveats.
#   🔴 non-commercial-blocked — explicit NC tag, base model blocks commercial
#                                output, or unavoidable IP overlap.
#
# Authority scope: research artifact. Each LoRA listed must be license-
# verified per its source page before fork. The tier flags here are
# inferred from search-snippet evidence + targeted page fetches; final
# go/no-go on each LoRA requires manual click through the Civitai 6-flag
# permissions panel by Phoenix engineering.

schema_version: "1.0"
audit_date: "2026-04-29"
phase: 1
genres_covered: [mecha, dark_fantasy, fantasy_adventure, healing]
genres_deferred_phase_2:
  - battle
  - romance
  - workplace
  - mystery
  - horror
  - sports
  - essay
  - slice_of_life
  - food
  - family
  - procedural
  - historical
  - comedy
  - cultivation
  - sci_fi_cyberpunk
  - supernatural_everyday
  - school
  - memoir
  - social_issue
  - graphic_medicine
  - battle_internal

# ── Mecha ───────────────────────────────────────────────────────────────────
mecha:
  primary_recommendation:
    id: super-robot-diffusion-xl
    source_url: https://civitai.com/models/124747
    base_model: Illustrious-XL v0.1
    architecture: SDXL
    last_updated: "2024-10-26"
    version: v2.7.7_for_Illustrious-XL
    license_tier: 🟡
    license_caveat: |
      The LoRA file's distribution flags default permissive on Civitai,
      but the Illustrious-XL base model has commercial-output restrictions.
      Phoenix must cross-test on Animagine XL 4.0 (also SDXL) — the LoRA
      should partially transfer with quality variance. If the fork-test
      fails, build a Phoenix-native mecha LoRA on Animagine.
    trigger_words:
      - SRS  # Super Robot
      - MRS  # Military
      - RRS  # Real Robot
      - FRS  # Fantasy
      - RARS  # Ranger
      - NJRS  # Niji Journey
      - MECHA-BACK-UNIT
      - MECHA-HUGE-ARMS
      - MECHA-QUAD-LEGS
      - MECHA-TANK-LEGS
      - MECHA-WINGS
      - ROBOTANIMESTYLE
      - ROBOTARTSTYLE
    recommended_strength: 0.6-0.8
    cfg_scale: 10-15
    coverage: "Gundam / EVA / Armored Core / Battle Tech style mecha — multi-style"
    fork_action: "Cross-test on Animagine XL 4.0; document quality delta."
  alternatives:
    - id: gundam-personnel-mobile-suit-style
      source_url: https://civitai.com/models/256541
      base_model: SD 1.5
      license_tier: 🟡
      notes: "Older base; documented for completeness only."
    - id: zeon-pilot-pony-sdxl
      source_url: https://civitai.com/models/564031
      base_model: Pony Diffusion V6 XL
      license_tier: 🔴  # Pony commercial restriction
      notes: "Disqualified — Pony base blocks commercial use."
  non_commercial_alternatives: []
  build_path_if_fork_fails: |
    Train a Phoenix-native mecha LoRA on Animagine XL 4.0 using ai-toolkit.
    Reference dataset: scrape Gundam/EVA/Armored Core official-artwork
    style boards (license-cleared training data only — Phoenix should
    consult artifacts/research/integration_effort_estimates_2026-04-29.md
    for time + cost estimate).

