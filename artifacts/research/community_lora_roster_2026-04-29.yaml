# ── Per-LoRA license verification checklist ────────────────────────────────
# Engineering must complete this checklist before bundling any LoRA listed
# above into a Phoenix production workflow.
license_verification_checklist:
  required_per_lora:
    - "Open the Civitai/HF/ModelScope source page"
    - "Confirm 'Sell generated images' flag is ON (or equivalent commercial allowance)"
    - "Confirm 'Use on other generation services' flag is ON (Phoenix is a third-party service)"
    - "Confirm 'Use without crediting me' flag is ON OR plan attribution"
    - "Confirm 'Share Merges of this model' flag matches Phoenix's redistribution plans"
    - "Note the base model and verify the base model itself permits commercial use"
    - "Record last_updated date and creator handle for audit trail"
    - "If any flag is OFF, move LoRA to non_commercial_alternatives section"

