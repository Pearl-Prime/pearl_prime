# ── Fantasy Adventure ───────────────────────────────────────────────────────
fantasy_adventure:
  primary_recommendation:
    id: animagine-xl-4.0-base
    source_url: https://huggingface.co/cagliostrolab/animagine-xl-4.0
    base_model: SELF (this IS the base)
    license_tier: 🟢
    last_updated: "2025-02-13"  # 4.0 Opt
    notes: |
      Animagine 4.0's training corpus heavily covers shonen/shojo fantasy
      adventure register. The base model alone covers fantasy_adventure /
      isekai out of the box. This is the audit's "no LoRA needed" finding
      — fantasy_adventure is a wrap not a fork.
  alternatives:
    - id: anyanimagine-xl
      source_url: https://civitai.com/models/1190951/anyanimagine-xlfor-lora-training
      base_model: Animagine fork (LoRA training base)
      license_tier: 🟢
      notes: |
        Modified Animagine optimized for further LoRA training (less
        style baked in). Useful only if Phoenix wants to layer a custom
        fantasy LoRA. Optional, not recommended initially.
    - id: lineart-anime-redmond
      source_url: https://civitai.com/models/127018/lineaniredmond-linear-manga-style-for-sd-xl-anime-style
      license_tier: 🟡
      notes: "Pair as B&W manga register helper for print delivery."
  qwen_image_alternatives:
    # Surfaced by JP/CN subagent — Qwen-Image covers fantasy register too,
    # with first-class CJK text for any localized speech bubbles.
    - id: qwen-image-base
      source_url: https://github.com/QwenLM/Qwen-Image
      license_tier: 🟢
      notes: "Apache 2.0 base; fantasy register strong; CJK speech bubbles."

# ── Healing / Iyashikei (CONTROL GENRE) ─────────────────────────────────────
healing:
  primary_recommendation:
    id: animagine-xl-4.0-base
    source_url: https://huggingface.co/cagliostrolab/animagine-xl-4.0
    base_model: SELF
    license_tier: 🟢
    notes: |
      Iyashikei / healing register is naturally covered by the Animagine
      4.0 base model — soft anime aesthetic, warm palette, gentle posing
      all default. CONFIRMS THE AUDIT'S CENTRAL THESIS:
      for genres well-covered by anime base models, no LoRA is needed.
    finding_significance: |
      Phoenix's current healing outputs (jp_22, romance_us — inspected
      during grounding) work for the same reason — base model covers this
      lane. The reflex to "build a per-genre LoRA roster" for ALL 25
      canonical genres is over-engineering. Phase 2 should triage the
      remaining 21 genres by the same lens: does the base model cover the
      register? If yes, no LoRA. If no, then fork or build.
  non_commercial_alternatives:
    # 🔴 — documented for completeness, NOT recommended for production
    - id: studio-ghibli-redmond
      source_url: https://civitai.com/models/137562/studioghibliredmond-studio-ghibli-lora-for-sd-xl
      base_model: SDXL / Z-Image-Turbo / FLUX.Klein / QWEN-IMAGE (multi-variant)
      last_updated: "2026-02-19"
      license_tier: 🔴
      license_caveat: |
        Creator explicitly declares "non-commercial, fan-made creation,
        intended solely for entertainment purposes" + Studio Ghibli IP
        acknowledged. Disqualified for Phoenix commercial.
    - id: ghibli-style-xl
      source_url: https://civitai.com/models/359367
      base_model: SDXL
      license_tier: 🔴
      notes: |
        "Trained on a Ghibli Studio publicly available dataset" — same
        IP risk regardless of LoRA license. Document, do not recommend.
    - id: studioghibli-redmond-alt
      source_url: https://civitai.com/models/106712
      base_model: SDXL
      license_tier: 🔴

