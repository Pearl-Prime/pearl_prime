    surface_split_rationale: "Ebook-primary for long-form sense-making and ritual scripts; manga-primary beats use silent iyashikei walks and kitchen-table vignettes where vertical scroll carries emotion faster than exposition."
    locale_tonal_notes:
      en_US: "Plainspoken self-help register; anger and dark humor allowed in grief beats."
      ja_JP: "Honor kuuki and seasonal metaphors; avoid US-style instant closure. LINE Manga pacing favors short confession panels over essay density (PR #801 / japan_line_freebie_funnel_market_research §0–1 lineage)."
      zh_TW: "Traditional-Chinese emotional vocabulary; family-face and cohort shame surfaced gently."
      zh_CN: "Simplified register; public-life grief framed with stability and dignity; keep supernatural optional."
