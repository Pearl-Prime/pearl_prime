notes: |
  Per-brand × locale series theme anchors for the 25 Path X brands ratified V1.1 in PR #1037 TSV (priority_phase=V1.1_proposed).
  Each locale lists five series concepts (titles + arc_shape + emotional_throughline + surface_priority) for Conductor v3 routing;
  individual books/episodes are out of scope for this artifact.
series_depth: {series_per_locale: 5, books_per_series_default: 5, episodes_per_series_default: 5}
brands:
  healing_ground_healing:
    topic_anchor: "Josei readers hold ambiguous loss—death, divorce, identity rupture—through slow, body-aware arcs that refuse toxic positivity yet still reach livable hope."
