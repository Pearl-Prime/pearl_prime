#   confidence_core        -> confidence_core_romance   (exact root: shojo imposter syndrome/self-worth/identity)
#   mecha_identity         -> solar_return_isekai       (mapped: shonen self-worth/imposter under isekai framing — closest portal-identity canonical for mecha world-jump)
#   queer_identity_growth  -> creative_unfold_social    (mapped: shojo social-anxiety/creativity/courage — closest queer-creative identity register canonical)
#
# Genre allocation target for Cluster E (per v1_2_genre_allocation_constraint, school bumped to 2-3 ceiling):
#   healing:                6
#   slice_of_life:          5
#   supernatural_everyday:  4
#   mystery_cozy:           4
#   fantasy_adventure:      2
#   romance:                2
#   school:                 2   (within 2-3 bump range for this cluster)
#   TOTAL:                  25
#
# This cluster delivers exactly that distribution. Genre tally is documented in the
# summary file alongside this YAML.
#
# Voice register: My Hero Academia / Spy x Family / Heartstopper / Komi Can't Communicate.
# Earnest, identity-affirming, specific. Avoids TikTok-cringe register, performative
# wokeness, overly explained therapy. Gen Alpha is the first AI-native generation:
# AI companions, mascots, app-portals, character-jumps treated as ordinary furniture
# of adolescence, not as novelty.
#
# Persona allocation (target): ~40% Gen Alpha (13-17), ~40% Gen Z (18-26),
# ~15% Millennial (older sibling / young teacher / school counselor persona),
# ~5% none/cross. HEAVIEST GEN ALPHA OF ANY CLUSTER.
#
# Daily-life anchors that fit: school_commute, k_pop_fandom, gaming_streaming
# (school computer-lab gaming, after-school stream), parasocial_creator (teen
# creator), queer_identity, neurodivergent, ai_companion (Gen Alpha's first
# real friend can be an LLM), sustainability_climate (climate-anxious teens),
# thrift_vintage (Y2K teen revival), content_creation, late_night_economy
# (high-schooler studying at 1 a.m.).
#
# Portal mechanics that fit: app (school app, fitness app, language app),
# mascot (school mascot, app mascot), game_level (mecha video game world),
# character_jump (anime self-insertion), letter (passed in class), mirror
# (mirror reveals truer self), ritual (locker ritual, before-test ritual),
# object (charm, pin, badge).

