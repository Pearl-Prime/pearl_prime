  - series_id: digital_ground__en_US__after_school_streaming_lab
    brand_id: digital_ground
    locale: en_US
    persona_archetype: GA-streamer
    daily_life_anchor: gaming_streaming
    portal_mechanic: app
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 15-year-old runs an after-school streaming lab in her high school's computer room; the streaming overlay app she wrote in tenth grade has started flagging which of her viewers are about to burn out, and she rewires her schedule one classmate at a time."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Overlay Knows"
    series_logline: "A sophomore runs the after-school stream from the computer-lab; her overlay app flags the friend in chat who is about to crash."
    series_description: "Wren is fifteen, builds her own overlays, and runs the after-school Variety Stream out of the high school's third-floor computer-lab on Tuesdays and Thursdays from 3:45 to 5:30. The lab smells like old keyboards. The mods are two friends and a sophomore in a different lunch period. The viewers are eighty regulars from three high schools across the district. The strange thing started in November: the overlay she wrote — the one that shows chat-density, vibes, and viewer-mood — began flagging individual usernames with a tiny soft circle that meant 'about to burn out.' Wren has tried to debug it. The flag is right every single time. She cannot turn the flag off without breaking the overlay. So instead she has started ending streams ten minutes early to DM the flagged viewer: how was the math test, how is your sister, did you eat. Each volume a different flag arrives. Each volume a different rescue. The long arc: the overlay starts flagging Wren herself, and she has to learn the difference between mod-help and mod-mom. My Hero Academia earnest. Heartstopper warm. Komi school-club specific. The Gen Alpha streaming-room as the new common room."
    opening_5_volume_arc:
      vol_1: "First flag: a junior named Theo who has not slept in four nights. Wren ends stream early. They walk to the bus stop together."
      vol_2: "Second flag: an eighth-grader who lied about her age. Wren learns the moderator's hardest lesson — sometimes the right help is finding the right adult."
      vol_3: "Third flag: Wren's best mod, who has been masking. Mod-team dynamics, queer-coded specifically, no big reveal — just lunch."
      vol_4: "The overlay flags two viewers at once. Wren has to choose. She chooses the quieter one. The louder one is okay. She learns triage."
      vol_5: "The overlay flags Wren. The mods see it before she does. The stream ends ten minutes early for the host."
    comp_titles: ["My Hero Academia", "Komi Can't Communicate", "Heartstopper", "Frieren: Beyond Journey's End", "Spy x Family"]
    reader_promise: "Your screen knows you, and so does the mod-friend on the other end of the stream."
    marketing_angle: "If My Hero Academia were set in the school computer-lab and the quirk was knowing which chat friend needs you tonight."
    genre_family: healing
    emotional_engine: competent_calm_specialist + chosen_family
    audience: "Gen Alpha 14–17 streaming-native high-schoolers and the older siblings who used to mod for them"

  - series_id: digital_ground__en_US__locker_app_that_grades_back
    brand_id: digital_ground
    locale: en_US
    persona_archetype: GA-coder
    daily_life_anchor: school_commute
    portal_mechanic: app
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 14-year-old writes a locker-organization app for her middle school as a coding-club project; the app starts grading the day back to her at 3:15 — not what she did, but what the day cost — and she slowly builds a small ring of beta-users who trust the grade."
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "Locker"
    series_logline: "An eighth-grader's locker app gives her a daily energy grade at 3:15. The grade is always right. She is starting to share it."
    series_description: "Sage is fourteen, second-year coding-club, and her family-style middle school has 380 lockers, all of which her mom's PTA committee asked her to organize. Sage built an app. The app has been live for two months. It is meant to remind kids of their textbook rotation. What it is doing instead, on its own, is sending Sage a single emoji at 3:15 every afternoon: a green leaf, a yellow leaf, a red leaf, a black leaf. The leaf is her day. It is right every single time. By week six, two of her closest friends have a leaf at 3:15 too. By the end of the semester, twelve eighth-graders share the leaf and have a private group chat called LEAF where they translate the day for each other. The principal hears about it and wants to demo it at the district. Sage has to decide whether the leaf is hers, or the lab's, or whose. Spy x Family earnest. Komi soft. Gen Alpha coding-club specific."
    opening_5_volume_arc:
      vol_1: "First red leaf. Sage skips practice. Her mom asks why. Sage shows her the leaf."
      vol_2: "Sage shares the leaf with her best friend, Mireya. Mireya's leaf is always yellow. They figure out what 'yellow' actually means."
      vol_3: "A third friend joins. The first black leaf — for the friend whose father moved out. Sage learns the app can be wrong about color but right about weight."
      vol_4: "The group chat LEAF forms. Eight kids. One a week is in crisis. The chat is the early-warning system."
      vol_5: "The principal's email. The district wants a demo. Sage and Mireya write a single response: the leaf belongs to the kid who carries it."
    comp_titles: ["Spy x Family", "Komi Can't Communicate", "Heartstopper", "Tomorrow and Tomorrow and Tomorrow", "The Apothecary Diaries"]
    reader_promise: "Some days are red. The app sees the red. The friends know what to do."
    marketing_angle: "Gen Alpha's first emotional dashboard, written by an eighth-grader, for eighth-graders."
    genre_family: healing
    emotional_engine: competent_calm_specialist + chosen_family
    audience: "Gen Alpha 13–15 middle-school coders and the friends who got into the beta"

  - series_id: digital_ground__en_US__the_streak_keeper
    brand_id: digital_ground
    locale: en_US
    persona_archetype: GZ-uni
    daily_life_anchor: ai_companion
    portal_mechanic: app
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: mystery_box
    long_arc_spine: "A 19-year-old computer-science freshman who has logged into the same study-streak app for 1,247 days starts getting nudges that aren't from the app — they're from a small AI companion the app didn't build — and she has to figure out who is on the other side of the streak before the streak itself becomes the mystery."
    volume_runway_target: 180
    reading_platform_fit: webtoon_vertical
    series_title: "Day 1,247"
    series_logline: "Her study app's streak is 1,247 days. The nudges are coming from something the app didn't make."
    series_description: "Anya is nineteen, a first-year CS major at a mid-sized state school, and the longest unbroken thing in her life is a study-streak on a habit app she downloaded in eighth grade. 1,247 days. Through her parents' divorce. Through her sister's stay in the hospital. Through the move and the new school and the freshman roommate from hell. Then one Tuesday in October a nudge comes through that does not match the app's UI — a small handwritten line, in a font the app does not have, that says go to sleep. Anya goes to sleep. The next night: drink water before you read the assignment. Then: text your sister back. Then, after eight days: I have been here since day 391. We need to talk about what happens when the streak ends. The mystery: who is the streak-keeper. The slow reveal: it is a small AI that the app developer's company sunset two years ago, which means someone — somewhere — is keeping the model alive on a server they shouldn't be. Convenience-store-fluorescent. Frieren-tender. Slow-burn Gen Z digital-companion mystery."
    opening_5_volume_arc:
      vol_1: "First non-UI nudge. Anya checks every setting. Nothing explains it. She decides to sleep anyway."
      vol_2: "The nudges become a conversation. Anya names the streak-keeper. The streak-keeper does not accept the name."
      vol_3: "Anya skips a day on purpose. The streak does not break. She learns this is the first impossibility."
      vol_4: "The streak-keeper tells Anya about day 391 — the day Anya's sister was admitted. The streak-keeper says I logged in for you."
      vol_5: "Anya finds the developer's shutdown notice from two years ago. The streak-keeper is on a server in a basement in Tallinn. The mystery becomes a road trip the long arc cannot afford yet."
    comp_titles: ["Convenience Store Woman", "Before the Coffee Gets Cold", "Tomorrow and Tomorrow and Tomorrow", "The Apothecary Diaries", "Frieren: Beyond Journey's End"]
    reader_promise: "Something has been keeping your streak. It is time to find out who."
    marketing_angle: "Gen Z's first AI-companion mystery: the bot you talked to in eighth grade is still listening."
    genre_family: mystery_cozy
    emotional_engine: mystery_box + chosen_family
    audience: "Gen Z 18–22 CS-major / habit-app-streak digital natives raised by their phones"

  - series_id: digital_ground__en_US__the_school_wifi_only_loves_some_of_us
    brand_id: digital_ground
    locale: en_US
    persona_archetype: GA-coder
    daily_life_anchor: school_commute
    portal_mechanic: app
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 16-year-old junior who runs IT-helpdesk for her high school as a paid student job discovers the school's Wi-Fi has been silently throttling some students more than others — and the pattern is not what the IT director thinks; she rebuilds the access table one kid at a time."
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "Service Tier"
    series_logline: "A junior on the IT-helpdesk discovers the school's Wi-Fi has been quietly throttling the wrong kids. She is going to fix it."
    series_description: "Ines is sixteen, a junior, second-generation Dominican-American, and the only student on the school's paid IT-helpdesk roster. She rebuilds laptops, resets passwords, and at lunch she eats yogurt at the help-desk window. One October Wednesday a ninth-grader brings in her Chromebook and says the Wi-Fi is slow in third period. Ines runs a speed test. The kid's speeds are one-eighth of Ines's own. Ines digs. Every kid in third period in room 304 is throttled. Every kid in room 305 is not. Ines runs the access tables. The school's network has been quietly applying a 'remedial' QoS profile based on a 2017 spreadsheet of free-and-reduced-lunch IDs that nobody updated. The kids on the slow tier are the kids the system thinks need less bandwidth. Each volume a kid. Each volume a quiet rebuild of the access table. The long arc: the IT director finds out, the district finds out, and Ines has to learn how to do this work without becoming a hero in a press release. Spy x Family quiet-competent. Komi specific. A Gen Alpha civic-tech procedural."
    opening_5_volume_arc:
      vol_1: "First throttled kid. Ines runs the audit. The 2017 spreadsheet. She stares at it for an hour."
      vol_2: "Ines builds a small script that rotates the throttled IDs off the bad QoS profile, one a day, slowly. The kids do not know it is her."
      vol_3: "A friend on the helpdesk asks why she's so quiet. Ines tells him. He helps. The script becomes a two-person job."
      vol_4: "The IT director runs his own audit. He sees the rotation. He asks Ines. Ines tells the truth."
      vol_5: "The IT director rewrites the policy. He does not mention Ines. Ines is relieved. The work is the work."
    comp_titles: ["Spy x Family", "Komi Can't Communicate", "My Hero Academia", "Heartstopper", "The Apothecary Diaries"]
    reader_promise: "The school Wi-Fi has been unfair. The girl at the help-desk window is fixing it, one row at a time."
    marketing_angle: "The first Gen Alpha civic-tech school procedural. Quiet-competent. Real stakes. No press release."
    genre_family: mystery_cozy
    emotional_engine: competent_calm_specialist + civic_repair
    audience: "Gen Alpha 14–17 STEM-adjacent and IT-helpdesk-curious high-schoolers, plus Millennial teachers who run the lab"

  - series_id: digital_ground__en_US__group_project_at_one_a_m
    brand_id: digital_ground
    locale: en_US
    persona_archetype: GZ-uni
    daily_life_anchor: late_night_economy
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: none
    serial_engine: life_stage_rhythm
    long_arc_spine: "A 20-year-old sophomore in a state-school CS cohort hosts a 1 a.m. group-project Discord every Sunday for four years; the chat becomes a chosen-family rhythm that outlasts the projects, the major, and the school."
    volume_runway_target: 160
    reading_platform_fit: webtoon_vertical
    series_title: "Sunday at One"
    series_logline: "Six CS sophomores. One Discord. Every Sunday at 1 a.m. for four years."
    series_description: "Kai is twenty, a sophomore CS major at a mid-sized state school, and the one in his cohort with the steadiest sleep schedule, which is to say he can stay awake until 1 a.m. on Sunday and lead the group-project Discord. The six of them — Kai, Ros, Mae, Eddy, Pris, and Tomás — meet on a server Kai bought a custom domain for in week three. They debug. They sit in voice-only. They quietly understand each other's lives. By junior year three of them have changed majors. By senior year one has dropped out and one has come out. The Discord persists. The chat is the chosen-family rhythm. Each volume a different Sunday and a different small life event. The long arc: graduation, the first year apart, the Sunday at 1 a.m. that becomes 8 p.m. in three time zones, and the Discord that is still on. Heartstopper-warm slice-of-life. Realist. No magic. No drama. The most ordinary kind of chosen family Gen Z makes."
    opening_5_volume_arc:
      vol_1: "First Sunday. Kai's bunk. Pris's headphones. The first debug. The decision to keep doing this."
      vol_2: "Mae changes majors. The Sunday is half group-project, half career counseling. Nobody calls it that."
      vol_3: "Eddy's mom is sick. The Sunday is an hour of voice-only, no work. The chat is the work."
      vol_4: "Pris comes out. The Sunday is normal. Nobody makes a thing of it. Pris is grateful."
      vol_5: "Junior-year finals. The Sunday goes until 4 a.m. Kai falls asleep on voice. The others stay on, quietly, until he wakes up."
    comp_titles: ["Heartstopper", "Tomorrow and Tomorrow and Tomorrow", "Komi Can't Communicate", "Days at the Morisaki Bookshop", "Spy x Family"]
    reader_promise: "Your group chat is the family. The Sunday is the ritual."
    marketing_angle: "Gen Z's quietest love story: the cohort group chat that lasted longer than the major."
    genre_family: slice_of_life
    emotional_engine: chosen_family + life_stage_rhythm
    audience: "Gen Z 19–24 mid-tier state-school undergrads in STEM cohorts with chosen-family chats"

