  # BRAND 01 / 05 — digital_ground  (flagship · manhwa · burnout/digital identity)
  # Cluster E lead: Gen Alpha / younger Gen Z digital-native identity formation
  # primary_topic: burnout · secondary: imposter_syndrome, financial_anxiety, anxiety
