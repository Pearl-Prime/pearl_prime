  - series_id: calm_student_school__en_US__before_the_first_period_bell
    brand_id: calm_student_school
    locale: en_US
    persona_archetype: GA-quiet
    daily_life_anchor: school_commute
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: none
    serial_engine: life_stage_rhythm
    long_arc_spine: "A 14-year-old freshman arrives at her high school every morning forty minutes early to run a six-step grounding ritual at her locker before the first-period bell; by Thanksgiving five other students have learned the steps; by spring the ritual is a small, unsanctioned student club called Locker."
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "Locker, Bell, Breath"
    series_logline: "A freshman runs a six-step grounding ritual at her locker before first bell. By spring it is a club."
    series_description: "Hanna is fourteen, an only child of a single mother who works the night shift at the regional hospital, and the only thing that keeps her in her body between waking up and first period is a six-step ritual she learned from a school counselor over the summer. Locker. Bell. Breath. The ritual takes seven minutes. It is done in silence at her locker. By October a sophomore named Reign has watched her do it three days in a row and asks if she can stand near. By November there are four of them. By March there are nine. They call it Locker. The school does not know what to do with a club that meets in the hallway with no advisor and no name on the activity sheet. Each volume one new kid finds Locker. Each volume the ritual holds. The long arc: the principal asks them to make it official. Hanna and the original five have to decide what an unsanctioned ritual is allowed to become when adults find it. Heartstopper-warm. Komi-specific. Realist. No magic. The school hallway as the new sanctuary."
    opening_5_volume_arc:
      vol_1: "Day 1 of high school. Hanna's first locker ritual. The locker beside hers is empty. She breathes."
      vol_2: "Reign asks to stand near. Hanna shows her the six steps on a folded card."
      vol_3: "Locker is four kids. The custodian, Marisol, notices and quietly leaves the trash bin somewhere else."
      vol_4: "A teacher asks them to move. Marisol intervenes. The teacher backs off."
      vol_5: "Locker is nine kids. The principal's email arrives. Hanna does not answer it for three days."
    comp_titles: ["Heartstopper", "Komi Can't Communicate", "A Silent Voice", "Spy x Family", "March Comes In Like a Lion"]
    reader_promise: "There is a ritual that holds. There is a hallway that lets it."
    marketing_angle: "A Heartstopper-tender high-school grounding club, drawn from the locker out."
    genre_family: school
    emotional_engine: chosen_family + grounded_ritual
    audience: "Gen Alpha 13–16 high-school freshmen and sophomores with nervous-system literacy and a school counselor in their phone"

  - series_id: calm_student_school__en_US__the_substitute_who_taught_breath
    brand_id: calm_student_school
    locale: en_US
    persona_archetype: GA-quiet
    daily_life_anchor: school_commute
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: none
    serial_engine: case_of_the_week
    long_arc_spine: "A 26-year-old long-term substitute biology teacher at a Title-I middle school spends the first three minutes of every class teaching a different breath; each volume a different class; the long arc is the year she is asked to write the curriculum down."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "Three Minutes, Then Bio"
    series_logline: "A long-term sub teaches three minutes of breath, then biology. By April the kids ask for the breath first."
    series_description: "Lyra is twenty-six, a long-term substitute biology teacher at a Title-I middle school in Sacramento, and the first three minutes of every class she teaches a single breath: box breath, four-seven-eight, physiological sigh, alternate-nostril, hand-on-belly, hand-on-heart. Different breath each day, same six on rotation. The biology comes after. By Thanksgiving the seventh-graders have figured out the rotation and started requesting the breath before the do-now. By February the kids in her sixth-period class — the hardest period — start reminding each other in the hallway: 'Did you do the breath?' By April the principal asks Lyra to write it down for the rest of the staff. Each volume one student's life intersects the breath. Each volume Lyra learns something the breath does that the curriculum cannot. The long arc: the curriculum, the credentialing program, the question of whether Lyra should leave the sub roster and become the regular teacher this school's kids deserve. Heartstopper-tender. Realist. A teacher series for the Gen Alpha generation that needs one."
    opening_5_volume_arc:
      vol_1: "Box breath. Period one. The first kid who exhales on the four-count."
      vol_2: "Physiological sigh. Period four. The kid whose father just left."
      vol_3: "Hand-on-heart. Period six. The class that has eaten Lyra alive for three weeks. The class that finally lets her in."
      vol_4: "The hallway reminder. Lyra overhears it. She does not say anything. She writes a note to herself."
      vol_5: "The principal's email. The curriculum. Lyra opens a Google Doc and writes the first six lines."
    comp_titles: ["Heartstopper", "March Comes In Like a Lion", "Komi Can't Communicate", "Spy x Family", "A Silent Voice"]
    reader_promise: "There is a teacher who teaches the breath first. The biology is after."
    marketing_angle: "A teacher series the way Heartstopper is a school series: warm, slow, specific."
    genre_family: school
    emotional_engine: competent_calm_specialist + grounded_ritual
    audience: "Gen Alpha 12–15 Title-I middle-schoolers and the Millennial teachers who are quietly the bedrock of their lives"

  - series_id: calm_student_school__en_US__the_friend_who_walks_home_the_long_way
    brand_id: calm_student_school
    locale: en_US
    persona_archetype: GA-quiet
    daily_life_anchor: school_commute
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: none
    serial_engine: companion_roster
    long_arc_spine: "A 15-year-old sophomore who walks the long way home from school every day picks up one walking-buddy per semester; by senior year she has a quiet roster of six kids who learned that the long way home is the regulating way home, and the long arc is the day a freshman shows up at the bus stop and asks to join."
    volume_runway_target: 160
    reading_platform_fit: webtoon_vertical
    series_title: "The Long Way Home"
    series_logline: "A sophomore walks the long way home. By senior year, six other kids walk it too."
    series_description: "Eva is fifteen, a sophomore, an oldest daughter of three, and the only quiet hour she gets every day is the 2.4-mile walk home from her suburban high school. She passes the strip-mall taqueria, the elementary school's empty playground, and the small park where the city plants the same five tulip bulbs every spring. The walk is forty-five minutes. The walk is regulating. The first kid who asks to join is a freshman named Marisol, who Eva has never talked to, but who has noticed Eva walks and not bused. Marisol asks at the bus stop. Eva says yes. The second kid is a junior named Wes who has just come out at home. The third is a senior named Pris who has a college decision to make. By senior year Eva has six walking-buddies, each on a different day of the week, and the long arc is the freshman in October who asks if there is room on Mondays. Heartstopper-quiet. Frieren-tender. A school slice-of-life that happens after the bell."
    opening_5_volume_arc:
      vol_1: "Marisol at the bus stop. Eva says yes. The first Wednesday walk. The tulips."
      vol_2: "Wes joins on Thursdays. The walk talks about home. The taqueria knows them by sight."
      vol_3: "Pris joins on Fridays. The college decision. Eva does not give advice. She walks."
      vol_4: "A junior named Theo joins on Tuesdays. The walk is about a sibling. The strip-mall.\n"
      vol_5: "An October freshman asks about Mondays. Eva says yes. The roster is six. The long way home becomes the way home."
