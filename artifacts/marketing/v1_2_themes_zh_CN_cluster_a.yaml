    volume_runway_target: 180
    reading_platform_fit: webtoon_vertical
    series_title: "易筱最后一次惊恐发作"
    series_logline: "互联网公司运营每次惊恐发作,会被拉进一间没人的茶馆,老板娘替她沏茶、点出她这次怕的是什么——每集驯服一只小怪,五集集齐一整个童年。"
    series_description: "易筱在一家正在裁员的互联网公司做用户运营。第一次惊恐发作发生在工位上,她去茶水间,推开门——门后不是茶水间,是她小区楼下那间一直关着的茶馆,老板娘正给她沏一壶茉莉。『又怕了什么?』 老板娘问。从那以后,每次心跳过快、手发麻,易筱推开任何一扇门,都会落进同一个茶馆。老板娘从不评判,只让她说出今天怕的那一只小怪叫什么名字——『被裁员怕』、『回老家怕』、『让父母失望怕』。每说出一个名字,小怪就能被收进茶馆后院的一个小瓦罐里。五卷集齐一整个童年,易筱才发现:茶馆老板娘其实是 38 岁的自己。"
    opening_5_volume_arc:
      vol_1: "第一次推门,第一只小怪——『被裁员怕』。茉莉花茶。"
      vol_2: "『让父母失望怕』。普洱。老板娘第一次提她小时候的事。"
      vol_3: "『被前男友的现任比较怕』。乌龙。易筱在茶馆里第一次哭出声。"
      vol_4: "『一辈子就这样了怕』。白茶。老板娘的脸在镜子里有点眼熟。"
      vol_5: "最后一只:『不配被爱怕』。老板娘摘下围裙,正是 38 岁的易筱。她递给 25 岁的自己一把后院钥匙。"
    comp_titles: ["千与千寻 (中文版)", "解忧杂货店", "一人之下", "镖人", "罗小黑战记"]
    reader_promise: "每一次惊恐都有一扇门,门后有人替你给那只怪起一个名字。"
