#
# Genre allocation target for Cluster A (per binding constraint):
#   healing 6 / slice_of_life 5 / supernatural_everyday 4-5 / mystery_cozy 4 /
#   fantasy_adventure 3 / romance 1-2 / horror 1 / school 0-1 / other 0-1 = 25
# This cluster delivers (matching en_US tally):
#   healing 6, slice_of_life 5, supernatural_everyday 4, mystery_cozy 4,
#   fantasy_adventure 3, romance 1, horror 1, school 1 = 25  (within all ranges).
#
# Locale guidance:
#   - Mainland-natural Simplified Chinese only. No Traditional. No Taiwan phrasing.
#     视频 (not 視頻/影片), 软件 (not 軟體), 智能手机 (not 智慧型手機), 互联网 (not 網路),
#     地铁 (not 捷運), 出租车 (not 計程車).
#   - Reading-platform tilt: ~70% webtoon_vertical (Kuaikan / Bilibili Comics dominate mainland),
#     ~30% manga_traditional.
#   - Cultural anchors used: 外卖 / 小区 / 高铁 / 共享单车 / 直播 / 小红书 / 茶馆 /
#     京剧 / 汉服 / 早高峰 / 城中村 / 老破小 / 网课 / 高考 / 期中考 / 微信 / 抖音.
#   - Persona allocation: ~55% Gen Z, ~30% Gen Alpha, ~12% Millennial, ~3% Gen X
#     (matching constraint guidance for zh_CN tilt).
#   - Tone: 『一人之下』 grounded-supernatural + 『罗小黑战记』 contemporary-yokai +
#     『镖人』 emotional-restraint. Culturally rooted, not preachy.
#   - Content-compliance: no Taiwan/HK politics, no Tibet/Xinjiang, no national-leadership topics.
#     Magical-register framing keeps abstract emotional content within publishable bounds.
#
# Structural enum fields stay English (schema lock). Free-text Chinese fields:
#   long_arc_spine, series_title, series_logline, series_description, opening_5_volume_arc.*,
#   reader_promise, marketing_angle, audience.
# Structural / lookup fields stay English: series_id, brand_id, locale, persona_archetype,
