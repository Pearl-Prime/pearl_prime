    volume_runway_target: 140
    reading_platform_fit: webtoon_vertical
    series_title: "她看得见"
    series_logline: "Gen Z 北漂新人搬进朝阳合租房,新室友第一晚就把一杯热水放到她肩膀旁边那只看不见的小东西面前——『它也渴吧。』"
    series_description: "周予安从老家搬到北京,合租在一间朝北的次卧,顶楼,夏热冬冷。新室友是个比她大两岁的产品经理,叫沈梨。第一晚周予安在客厅刷手机,沈梨端着两杯水出来,一杯放在茶几上,一杯放在周予安肩膀外侧那块空气里。『它也渴吧。』周予安怔了三秒——她从没告诉过任何人,自己肩膀上从初中起就趴着一个谁也看不见的小东西。这不是恋爱故事,这是一个 23 岁的人慢慢练习『让别人看见』的故事。她们一起做饭、一起去人民公园相亲角看人、一起在春节她不想回家的时候找借口。每一卷,周予安让沈梨多看见她的一点,小东西也变小一点。"
    opening_5_volume_arc:
      vol_1: "第一杯热水。周予安第一次承认有人能看见。"
      vol_2: "公司年会。周予安发言前躲进厕所,沈梨端着热水站在隔间外。"
      vol_3: "春节。周予安不想回家。沈梨教她怎么跟妈妈说『我今年想在北京过年』。"
      vol_4: "沈梨自己肩上的小兽第一次现身。原来不是只有周予安一个人有。"
      vol_5: "合租到期。她们续约。小东西从两只变成一只,落在两人肩中间。"
    comp_titles: ["凪的新生活 (中文版)", "我们这一天 (中文版)", "罗小黑战记", "深夜食堂", "声音的形状"]
