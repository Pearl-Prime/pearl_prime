  - series_id: stillness_press__zh_CN__qi_dian_wan_ban_de_bian_li_dian
    brand_id: stillness_press
    locale: zh_CN
    persona_archetype: GZ-firstjob
    daily_life_anchor: retail_service
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "每个深夜走进 24 小时便利店的焦虑客人,肩头都驮着一只只有店员能看见的小荧光生物;她替他们挑货架上对的那一样,也悄悄塞一张写着一句话的纸条——慢慢看清这些小东西最初是谁的。"
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "凌晨三点的货架"
    series_logline: "上海郊区一家 24 小时便利店,Gen Z 夜班店员能看见每位焦虑客人肩头蹲着的小荧光兽,她把那一格货架理好,把那一句话塞进收银小票里。"
    series_description: "苗苗在小区门口那家亮到凌晨的便利店上夜班。日光灯嗡嗡地响,她已经听不见。今晚第一位客人是个加完班还睡不着的程序员,苗苗看得见他肩膀上趴着一只蛾子大小、扑棱不停的小东西。她替他扫了无咖啡因的咖啡、一颗薰衣草糖,顺手把一张折成方块的小纸条放进塑料袋——上面只写一句话,焦虑回来时可以对自己念。小东西没有走,人走了。接下来一夜又一夜,客人换,小荧光兽也换:房租焦虑、毕业论文焦虑、前任的新对象。苗苗不去赶它们,她只是替这位客人找到货架上对的那一格、口袋里对的那一句话,让他能稍微稳一点地把它带回家。安静、暖、便利店日光灯的色温。"
    opening_5_volume_arc:
      vol_1: "第一位客人:程序员,小东西是只扑棱的蛾子。无咖啡因咖啡。薰衣草糖。一句关于让身体先回家的话。"
      vol_2: "美院考研的女生,小东西要等她打开手机才显形——一只镜面材质的小兽,小红书比较焦虑的具象。"
      vol_3: "三甲医院夜班护士,小东西因为被抱得太久,已经在变暗。苗苗第一次发现自己也能为悲伤疲劳备货。"
      vol_4: "第一位回头客,程序员回来了。他肩上的小东西小了一圈。苗苗第一次在自己肩上也看见一只。"
      vol_5: "区域督导来盘点。苗苗被说理货太慢。便利店本身的小兽——加班文化具象——第一次被命名。苗苗决定留下。"
    comp_titles: ["一人之下", "罗小黑战记", "深夜食堂", "解忧杂货店 (东野圭吾·中文版)", "镖人"]
    reader_promise: "你的焦虑有形状,有人替你理好那一格货架。"
    marketing_angle: "如果『深夜食堂』里住着一只只温柔的小荧光兽——一格货架就能让今晚的你稳一点。"
    genre_family: healing
    emotional_engine: competent_calm_specialist + chosen_family
    audience: "23–27 岁一线/新一线城市初入职场 Gen Z,已被命名的焦虑/失眠人群"

  - series_id: stillness_press__zh_CN__kou_dai_li_de_xiao_zhang_ben
    brand_id: stillness_press
    locale: zh_CN
    persona_archetype: GZ-uni
    daily_life_anchor: content_creation
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: life_stage_rhythm
    long_arc_spine: "一本被前主人写满又被丢进二手书摊的小账本,在女大学生口袋里继续替她记账——它记的不是钱,是情绪;每翻一页,前主人的一段焦虑就要被这位新主人替她还掉一点。"
    volume_runway_target: 160
    reading_platform_fit: webtoon_vertical
    series_title: "口袋里的小账本"
    series_logline: "传媒大学女生在旧货市场买到一本写满字的小账本,从此她每发一次小红书,本子就替她记一笔——焦虑、嫉妒、孤独,标价、扣款、结余。"
    series_description: "林知夏在城中村的旧货摊上花八块钱买到一本巴掌大的牛皮小账本,扉页写着一行很小的字:『记下来,会好一点。』她原本只想拿来记开销,可一周后她发现:本子在自动记账。她在地铁里点开前室友的小红书、心里酸了一下,本子的新一页上就出现一行清秀的字——『嫉妒 ¥3,已记入。』 慢慢地她搞清楚,本子的前主人是个比她大三届的师姐,把整整两年的情绪都记进去之后,选择把账本留给下一个会需要它的人。每一卷,知夏要替前主人结清一笔旧账——不是还钱,是替她去说一句当年没说出口的话、去走一次当年绕开的路。"
    opening_5_volume_arc:
      vol_1: "第一笔『嫉妒 ¥3』。知夏发现账本会自己记,也会自己结。"
      vol_2: "『熬夜刷直播 ¥8』。本子要她下次提前关灯——交换条件是允许她在第二天看见前主人当年的那个直播间。"
      vol_3: "前主人留下的最大一笔账:『跟妈妈吵架 ¥120,未结。』知夏替师姐拨了那通电话。"
      vol_4: "本子开始空白页变多。知夏意识到自己也在被替别人结账——是谁?"
      vol_5: "毕业季,知夏把账本写满最后一页,放回旧货摊。她替本子写了新的扉页。"
    comp_titles: ["解忧杂货店 (中文版)", "罗小黑战记", "声音的形状", "你的名字 (中文版)", "镖人"]
    reader_promise: "你的每一次悄悄难过,都有人替你记下来,也会替你结清。"
    marketing_angle: "比『解忧杂货店』更安静的版本:你不写信,本子替你记。"
    genre_family: slice_of_life
    emotional_engine: ledger_atonement + chosen_family
