    series_logline: "曾经是三甲医院心内科医生的 30 岁女生辞职回小区开了一家只在周日开门的小药铺,卖的不是药,是替每位邻居配的『口袋小仪式』。"
    series_description: "陆听雨在三甲医院心内科做了五年,见过太多『其实不是心脏的问题』。她辞职回到自己长大的老小区,在楼下租了一间不到 15 平的小铺面,招牌只有两个字:『听雨』。每周日上午开门,营业到下午五点。来的人不是来开药的——她也开不了药——他们是来配一个口袋小仪式。卖菜的阿姨睡不着,陆听雨给她配:每晚关灯前用湿毛巾把灶台擦一遍,擦的时候在心里把今天的客人数一遍。带二胎的妈妈焦虑,她配:每天 17:30,在小区花坛旁站一分钟,什么也不做。一卷一邻居,五卷把一整个小区的睡前情绪配完——也把陆听雨自己从离开医院时带回家的那只小怪,慢慢配完。"
    opening_5_volume_arc:
      vol_1: "第一位邻居:楼下卖菜的张阿姨,失眠。湿毛巾擦灶台仪式。"
      vol_2: "二胎妈妈林姐,焦虑到喘不过气。花坛旁站一分钟仪式。"
      vol_3: "对门退休京剧票友,丧偶后第一次哭。每晚去厨房泡一壶他爱人爱喝的茶。"
      vol_4: "陆听雨自己的导师从医院找来。她替导师配第一份『不再为别人配药』的仪式。"
      vol_5: "小区拆迁通知。陆听雨决定带着药铺搬到新小区。所有邻居各自带走自己的小瓦罐。"
