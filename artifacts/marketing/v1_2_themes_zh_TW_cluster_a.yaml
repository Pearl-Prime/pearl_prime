    audience: "Z 世代大學生與剛出社會,在 IG/Threads 上經營自己作品、被比較焦慮纏住的創作型讀者"

  - series_id: stillness_press__zh_TW__kan_de_jian_jiao_lv_de_shi_you
    brand_id: stillness_press
    locale: zh_TW
    persona_archetype: GZ-queer
    daily_life_anchor: shared_housing
    portal_mechanic: relationship
    episodic_frame_per_volume: roommate
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "三位剛畢業的女生合租大安區一間老公寓;其中一位看得見另外兩位的焦慮『投影』——她們以為自己是一起住的室友,後來才發現是被同一隻溫柔的小獸選中、彼此守護的共同體。"
    volume_runway_target: 160
    reading_platform_fit: both
    series_title: "我室友身上的那隻"
    series_logline: "三女合租大安區老公寓,其中一位看得見另外兩位的焦慮投影——她們不只是室友,是被同一份溫柔挑中的人。"
    series_description: "阿諭剛從台南北上,在台北一家小型出版社當編輯助理。她和兩位陌生室友——做 UI 設計的小雨、在貓咖啡店打工的可可——一起合租大安區巷子裡的老公寓。某天她發現自己看得見其他兩位室友肩膀上的『焦慮投影』:小雨那隻像沒充飽電的手機殼、可可那隻像一隻不肯抬頭的橘貓。阿諭學會了不指出來,只在對的時刻把對的小動作放進共同生活——多買一條浴室地墊、把廚房日光燈換成黃光、提議週六去陽明山泡硫磺溫泉。三人慢慢從『室友』變成『家人』,而阿諭也終於看見自己肩上那隻,並讓另外兩位看見它。Queer-friendly,但不把出櫃當主線。"
    opening_5_volume_arc:
      vol_1: "搬家當晚,阿諭第一次看見小雨肩上的『手機殼』。她沒說。她做了一鍋粥。"
      vol_2: "可可帶回貓咖啡店的橘貓暫住。橘貓和可可的小獸對望。可可第一次睡了整夜。"
      vol_3: "小雨在 LINE 群組裡崩潰一次。三人決定改用更慢的傳訊節奏:照片優先、文字次之。"
      vol_4: "阿諭被原生家庭打電話催婚。她肩上的小獸第一次浮現。可可看見了,沒問,只遞了熱可可。"
      vol_5: "三人在陽明山溫泉煙霧裡互相說出對方的小獸長什麼樣。第一次,三隻都安靜了。"
    comp_titles: ["用九柑仔店", "可不可以,你也剛好喜歡我", "蟲師", "深夜食堂", "千年女優"]
    reader_promise: "你不是一個人住——你是被選中,和對的人一起變柔軟。"
    marketing_angle: "《可不可以,你也剛好喜歡我》如果有三位女主角,而她們是彼此的家人。"
