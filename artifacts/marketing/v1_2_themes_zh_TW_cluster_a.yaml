    long_arc_spine: "怡怡是淡水信義線上一位年輕的捷運站務員;她發現每一座 MRT 車站的某個角落,都住著一位過去曾在那裡崩潰過、後來『把那一次驚慌好好放下』的人留下的小獸——這些小獸會幫忙下一位即將崩潰的乘客。"
    volume_runway_target: 180
    reading_platform_fit: webtoon_vertical
    series_title: "捷運站的小獸"
    series_logline: "捷運站站務員怡怡看得見每一站角落住著的、上一位旅客留下的『焦慮小獸』——它們在等下一位需要被接住的人。"
    series_description: "怡怡是淡水信義線中山國中站的早班站務員。她從小就有焦慮症,大學畢業前剛經歷過一次嚴重的恐慌發作——就在這座站的女廁。她考上捷運公司之後,被分派回同一站,以為是命運的玩笑。某天她在月台盡頭看見一隻發光的小獸,蜷在牆角。她認得它——那是她自己崩潰那天留下的。她開始發現,每一座 MRT 車站都有這樣的小獸,是過去曾在那裡崩潰、後來把那次經歷『好好放下』的人留下的禮物。它們會在下一位乘客即將崩潰時,輕輕牽住對方的衣角。每集走訪一站、一位即將崩潰的乘客、一隻在等他的小獸。"
    opening_5_volume_arc:
      vol_1: "中山國中站。怡怡認出自己留下的小獸,它接住一位即將請婚假卻又退縮的女生。"
      vol_2: "古亭站。一位準備上台北書展簽書會的素人作者。小獸是上一個崩潰過的素人作者留下的。"
      vol_3: "公館站。台大研究生的口試前夜。小獸來自一位多年前的學長。"
      vol_4: "西門站。第一份打工失敗的高中生。小獸來自一位現在已經是樂團主唱的人。"
      vol_5: "象山站。怡怡帶著一群小獸去爬象山看日出。她明白:小獸不是要被消滅,是要被『傳下去』。"
    comp_titles: ["千年女優", "蟲師", "用九柑仔店", "解憂雜貨店", "夏目友人帳"]
    reader_promise: "你曾經崩潰的那個角落,正在等下一位崩潰的人——你留下的勇氣會接住他們。"
