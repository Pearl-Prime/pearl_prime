  - series_id: stillness_press__zh_TW__san_dian_de_quan_jia_bian_li_shang_dian
    brand_id: stillness_press
    locale: zh_TW
    persona_archetype: GZ-firstjob
    daily_life_anchor: retail_service
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "凌晨三點走進全家便利商店的每一位焦慮客人,肩上都馱著一隻只有店員看得見的螢光小獸;她不只把對的商品擺上架,也把對的口袋儀式遞出去,慢慢明白這些小獸從前曾屬於誰。"
    volume_runway_target: 200
    reading_platform_fit: both
    series_title: "凌晨三點的全家"
    series_logline: "一位 Z 世代的全家便利商店大夜店員,看得見每位焦慮客人肩上那隻發光的小生物;她把對的那一格貨架擺給他們。"
    series_description: "美芸在台北萬華區唯一通宵營業的全家上大夜班。日光燈的頻率她早已聽不見了。第一位客人是個睡不著的事務所助理,美芸看見他肩上停著一隻撲動翅膀的小東西。她幫他結帳:無咖啡因咖啡、薰衣草糖、再悄悄夾一張對折的便條紙,上頭只寫一句話——下次驚慌再來時,要對自己說的那句。小獸沒走,但他走了。每晚都有新的客人和新的小獸:房租焦慮、論文螺旋、前任的新對象。美芸不跟它們對抗,她找出能讓客人把它好好揣在口袋裡帶回家的那項商品、那個小儀式。A24 般的安靜,宮崎駿般的溫暖,便利商店日光燈的青白色。"
    opening_5_volume_arc:
      vol_1: "第一位客人:事務所助理。他的小獸像隻蛾,翅膀停不下來。無咖啡因咖啡、薰衣草糖、一句關於『讓身體先回家』的便條。"
      vol_2: "美術系研究生。她的小獸要等她滑開手機才看得見——比較焦慮化成一面小小的鏡子。"
      vol_3: "夜班護理師。她的小獸因為被緊握太久而開始發黑。美芸第一次明白,悲傷疲勞也有對應的貨架。"
      vol_4: "第一位回頭客。事務所助理回來了。他的小獸縮小了一圈。美芸第一次看見自己肩上也停著一隻。"
      vol_5: "區經理巡店,說她補貨太慢。整間店自己的小獸——『企業過勞妖』——終於被命名。美芸決定留下來。"
    comp_titles: ["用九柑仔店", "深夜食堂", "便利店人間(村田沙耶香)", "可不可以,你也剛好喜歡我", "送行者"]
    reader_promise: "你的焦慮有形狀,也有一個知道你那格貨架在哪裡的店員。"
    marketing_angle: "如果《便利店人間》裡藏著一則溫柔的養生鬼故事——而那隻鬼是善意的。"
    genre_family: healing
    emotional_engine: competent_calm_specialist + chosen_family
    audience: "Z 世代 23–27 歲,在台北/新北通勤的初階知識工作者,已能把焦慮命名出口"

  - series_id: stillness_press__zh_TW__shan_zhong_xiao_zhang_de_jiao_lv_zhang_ben
    brand_id: stillness_press
    locale: zh_TW
    persona_archetype: GZ-uni
    daily_life_anchor: content_creation
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "一位文青咖啡店的兼職大學生繼承了奶奶留下的一本舊牛皮紙『口袋帳本』;她把客人說不出口的焦慮一筆一筆寫進帳本,字跡會自己浮起來、轉成一個能放進口袋的小儀式——她漸漸發現,奶奶當年是同一間店的店員。"
    volume_runway_target: 180
    reading_platform_fit: webtoon_vertical
    series_title: "口袋裡的帳本"
    series_logline: "她在赤峰街的文青咖啡店打工,口袋裡裝著一本會把焦慮『翻譯』成儀式的舊帳本。"
    series_description: "小蓁在台北赤峰街一間只有 14 個位子的咖啡店打工。她唸視覺傳達系,自己也在 IG 上經營一個剛起步的插畫帳號——比較焦慮已經是她的日常背景音。某天店長翻倉庫,找出一本牛皮紙的舊帳本,說是上一代店主、也就是小蓁過世的奶奶留下的。帳本最後一頁寫著一行字:『把他們說不出口的那一句記下來,我幫你回答。』從那天起,客人放下飲料離開後,小蓁會把今天對方欲言又止的那半句焦慮寫進帳本,翌日翻開,奶奶的字跡會浮起來——回的不是建議,而是一個能折進口袋的小動作。徐徐展開的不是奇幻冒險,是兩個世代的店員,跨越時光輪流接住同一群焦慮的客人。"
    opening_5_volume_arc:
      vol_1: "店長把帳本交給小蓁,她寫下第一位客人的半句話。隔日字跡浮現:把這張紙條摺成小船,泡在熱水裡看它軟掉。"
      vol_2: "IG 演算法把小蓁的作品打進冷宮。她寫下自己的焦慮。奶奶回:『去後巷數三盆植物,哪一盆今天的葉子最歪。』"
      vol_3: "一位在補習街教國中數學的老師走進來。他焦慮的是自己對學生越來越不耐煩。儀式:把粉筆灰收一小撮放進信封,寫下『今天我想對誰更溫柔』。"
      vol_4: "店長告訴小蓁,奶奶當年也是大學生兼職、也經歷過同樣的『被演算法忽視』的初出茅廬期。"
      vol_5: "小蓁第一次自己寫出一個儀式,沒有依靠帳本。她把它寫進帳本,給下一代用。"
    comp_titles: ["用九柑仔店", "解憂雜貨店", "蟲師", "便利店人間", "可不可以,你也剛好喜歡我"]
    reader_promise: "每一句你說不出口的焦慮,都有人替你翻譯成一個你做得到的小動作。"
    marketing_angle: "《解憂雜貨店》的台北赤峰街版本——但回信的人是你阿嬤。"
    genre_family: slice_of_life
