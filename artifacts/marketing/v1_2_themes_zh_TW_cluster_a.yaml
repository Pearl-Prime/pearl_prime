    series_description: "若芸從台中北上,進入一間迪化街的老中藥鋪實習,鋪子只在週日下午一點到五點開門。第一天師傅就告訴她:『我們這裡不收熟客,不留電話,不開回頭單。』客人來,描述一種模糊的『不舒服』——失眠到第三天的緊繃、母親打來之後的喘不過氣、剛被裁員的那種透明的累——師傅不開藥方,只開一包草、一張折疊的紙、一個動作。若芸從一開始的困惑,慢慢辨認出二十四種焦慮對應的二十四種草本。最後她才明白:不收熟客,是因為這間店要的是『讓人不再需要回來』。"
