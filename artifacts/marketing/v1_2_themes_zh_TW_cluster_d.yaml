    magical_register: magical_realism
    serial_engine: life_stage_rhythm
    long_arc_spine: "一位二十五歲、住在新北永和的設計助理,每個禮拜天晚上七點都會在她租屋處的小餐桌上,辦同一場五個人的晚餐;桌上那本綠色筆記本——她外婆過世前留給她的——會在每次晚餐前自己寫上一句話,給其中一位朋友,字跡不是任何人的。"
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "禮拜天晚上七點"
    series_logline: "五個朋友、一張小餐桌、一本綠色筆記本——上面寫著這一週每個人最需要被告訴的那句話,而沒有人是寫的人。"
    series_description: "樂希二十五歲,平面設計助理,在新北永和租了一間有小客廳的雅房。她是這群朋友裡空間最大的一個,所以禮拜天晚上七點固定在她家吃飯。五個人——娜娜、貝貝、紀廷、米拉、樂希——輪著煮固定的菜單(義大利麵週、咖哩週、滷味週),搭一瓶超商七十九塊的紅酒,然後在桌上那本綠色筆記本上面隨意寫東西。那本筆記本是樂希外婆過世前留給她的。神奇的是:每個禮拜天晚餐開始之前,本子上會多出一句話,字跡誰都認不出來——而那句話總是這禮拜這群朋友裡某一個最需要被告訴的。她們學會不要去討論這件事。她們學會在對的時間讀對的句子。每一集這句話會屬於不同人;長期主線是某個禮拜日有個新人被帶到這張桌邊,而本子也替那個人寫了一句。SPY×FAMILY 的溫暖、海街diary 的安靜,加一點點魔幻寫實。"
    opening_5_volume_arc:
      vol_1: "娜娜剛被升副理但她拒絕了。本子寫:『禮拜二之前你都還可以改變心意。』她禮拜三才改。"
      vol_2: "貝貝媽媽生病。本子寫:『跟紀廷說。』紀廷的爸爸十年前是同一個診斷。"
      vol_3: "紀廷把交往三個月的男朋友帶來。本子替男朋友也寫了一句——樂希到下一集才把那句拿給他看。"
      vol_4: "男朋友讀到屬於他的那一句。決定留下來。本子從這禮拜開始替六個人寫。"
      vol_5: "米拉要去柏林讀書。本子替她寫最後一句。椅子留著。本子之後每週還是會替她寫——只是字會慢慢淡。"
    comp_titles: ["SPY×FAMILY", "海街diary", "解憂雜貨店", "用九柑仔店", "深夜食堂"]
    reader_promise: "你每週的小聚會其實有一份紀錄——它知道每個人這一週是為了什麼來的。"
    marketing_angle: "《SPY×FAMILY》的台灣 Z 世代版本——你那張週日小餐桌,是你這禮拜唯一撐住你的東西。"
