    long_arc_spine: "一位三十三歲、在台南老家整理已故母親遺物的女設計師,發現一個鐵盒裡裝著她國中時期 MSN 對話紀錄列印本。她和現在的高中同學群組一起重讀——而當年國二的他們,開始用同樣的字跡在這些列印紙的空白處『回信』。"
    volume_runway_target: 125
    reading_platform_fit: webtoon_vertical
    series_title: "國中 MSN 鐵盒"
    series_logline: "采君在台南老家找到她國二的 MSN 紀錄列印本;她的高中群組開始替十三歲的自己寫信——而十三歲的他們,真的回信了。"
    series_description: "采君三十三歲,在台北做包裝設計總監。她媽媽今年初過世,她回台南老家整理遺物時,在閣樓一個鐵盒裡找到一疊厚厚的列印紙——是她媽媽當年偷偷幫她備份的、二零零五到二零零七年她與三個國中死黨的 MSN 對話紀錄。她拍照丟到現在的高中群組(都是同一批人,後來高中又同班)。四個人在群組裡哭笑了三個鐘頭,然後采君靈感一來:把列印紙翻面,大家輪流替十三歲的自己『寫一封信』。隔天早上,采君把信掃描傳出去前,翻開來看——空白處多了一行字,是采君國二的字跡,寫:『姊姊你好,我有看到。』從那天開始,每一集這四個成年人替當年的自己寫一封信,而當年的自己——用同一張紙的反面——回信。長期主線:當年那段他們以為已經被遺忘的、國二某個夏天發生過的一件事,正在從信裡浮出來。"
    opening_5_volume_arc:
      vol_1: "采君寫給國二的自己:『妳媽媽很愛妳。』國二的采君回:『我知道,只是我那時候不敢說。』"
