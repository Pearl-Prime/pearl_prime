    long_arc_spine: "一位二十六歲、住在台北中正區巷子裡的女生,每個工作日傍晚七點到十一點都不鎖門——讓她那群『沒地方回家』的朋友隨時能走進來。她漸漸發現,那間老公寓本身在記住每一個曾在客廳沙發上睡過的人,並悄悄地把他們列入它自己的保護名單。"
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "門永遠開著"
    series_logline: "二十六歲的小昀每晚七點到十一點不鎖門,讓她的朋友群隨時能落腳——而那間老公寓開始一個一個記住他們是誰。"
    series_description: "小昀今年二十六歲,Z 世代,從南部上來台北念書後就一直住在中正區一條巷子裡的三十年老公寓。她的原生家庭在她二十一歲那年因為她出櫃而停止聯絡。她念大學那四年慢慢長出了一群『非血緣家人』——大學社團的學妹、打工認識的咖啡師、論文口試前一晚不睡陪她練稿的朋友。畢業後她對這群人說過一句話:『工作日傍晚七點到十一點,我家不鎖門,你們有事沒事都可以進來。』三年下來,這間老公寓開始有自己的反應:暖氣會在過敏的子睿走進來時自動降一格;廚房的小燈會在剛下大夜班的瑪莉開門時變得柔和;沙發會在阿哲爸爸來台北的那一晚多出一個靠枕。小昀沒有跟它對抗,她學著讀公寓的語法——那其實就是她自己神經系統的語法:誰可以進來、誰要保持距離、身體在門口願意允許什麼樣的靠近。每一集會有新的人想踏進來——失聯多年的弟弟、前任的新對象、葬禮後再也沒見的表姊——而公寓會自己慢慢決定,這個房間此刻能不能容納這份歡迎。葬送のフリーレン式的安靜、Heartstopper 式的溫柔、台北巷弄的老公寓骨架。"
    opening_5_volume_arc:
      vol_1: "子睿的過敏。瑪莉的大夜班。第一週公寓自己『運作』了起來。小昀開始把它叫做『這間房子』。"
      vol_2: "阿哲的爸爸從台中上來。沙發多了一個靠枕。小昀明白:這間房子會替她愛的人,也替他們各自的傷,留位子。"
      vol_3: "第一個陌生人——朋友的朋友處於危機。門花了九十秒才開。小昀學到:『安全』不是她決定的,是這間房子的判斷。"
      vol_4: "前任的新對象想進來。門沒有開。小昀坐在門內的地板上,給前任傳了一則溫柔但清楚的訊息。"
      vol_5: "失聯五年的親妹妹站在門口。暖氣沒有反應。小昀必須決定:是要讓這間房子學一個新人,還是相信房子是對的。"
