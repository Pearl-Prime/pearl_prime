    daily_life_anchor: dating
    portal_mechanic: ritual
    episodic_frame_per_volume: month
    magical_register: none
    serial_engine: life_stage_rhythm
    long_arc_spine: "兩個原本互不認識的二十多歲上班族,因為房租一起轉租了新北中和一間兩房公寓,簽下一年合約。十二個月裡他們發明了三十六種小儀式——介於室友、朋友、家人之間——但他們都不去定義關係。合約到期那一天,他們必須替這件事取一個名字。"
    volume_runway_target: 100
    reading_platform_fit: webtoon_vertical
    series_title: "轉租一年"
    series_logline: "兩個陌生人、一份一年合約、十二個月的小儀式——到了第六個月,他們需要替這件事取一個名字。"
    series_description: "亭安二十四歲,剛從四年戀情裡走出來;宥廷二十六歲,清大研究所剛畢業在新北科學園區上班。他們兩個都需要一個房間。591 上一間中和的轉租案:一年、平面兩房、共用廚房客廳、十六坪、月租兩萬四。第二個月開始他們發明了『禮拜三晚上義大利麵』的習慣、『禮拜天上午不講話』的默契、『誰買衛生紙』的不成文規定。第四個月他們在同一張沙發上各滑各的手機傳訊息給對方。第六個月誰都沒有在外面交往,他們之間也沒有定義成交往——他們正在做三十六件看起來像戀愛、感覺起來像友情、語言裡找不到名字的小事。每一集是一個月,系列共十二集。長期主線:合約到期那天他們要替這件事取什麼名字。慢熱式戀愛,身體距離保持得很乾淨。《用九柑仔店》式的人情味、《你的婚禮》式的克制。"
    opening_5_volume_arc:
      vol_1: "一月。簽合約。第一個禮拜三的義大利麵。宥廷不吃洋蔥;亭安禮拜二才知道。"
      vol_2: "二月。第一次吵架——誰要打電話給房東。他們發明『禮拜天上午不講話』。"
      vol_3: "三月。亭安前任傳訊息來。那個禮拜三宥廷自己煮義大利麵。亭安還是回家了。"
      vol_4: "四月。宥廷媽媽從台中上來。她問你們是不是在交往。兩個人都沒回答。媽媽請他們吃豐盛的早午餐。"
      vol_5: "五月。他們一起組了 IKEA 書櫃。書櫃上有兩個人的書。書櫃沒有一格叫『他們是什麼』。"
