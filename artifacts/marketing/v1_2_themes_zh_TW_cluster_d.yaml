    long_arc_spine: "一位有社交焦慮的二十二歲女大生,在台北市立圖書館分館的失物招領櫃台一週打工二十小時。她漸漸發現:每一件被遺忘的小物,其實都屬於一段同樣被遺忘的友情——把東西還回去,那段友情就有機會被找回來;有些會,有些不會,而她從來不催。"
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "圖書館的失物招領"
    series_logline: "二十二歲、有點社恐的依芮,在圖書館的失物招領櫃台值班——她發現每一件失物,都在替一段失聯的友情寄信。"
    series_description: "依芮二十二歲,大三,中文系,在台北市立圖書館松山分館的失物招領室一週打工二十小時。那是一個日光燈、堆滿塑膠籃的小房間。她有寫好的社交焦慮:『請出示證件』這句話她在腦袋裡演練過兩千次。每一集她會把某一件失物還給某一個人,而每一件失物都是某段這個人放掉的友情留下來的殘骸:高中閨蜜燒的合輯 CD、前室友寄放的盆栽、夏令營交換的友誼手環、初戀寫但沒寄出去的卡片。依芮不勸、不講大道理。她把東西交回去,然後安靜地看著對方決定要不要傳訊息給那個朋友。有些訊息會傳出去,有些不會。長期主線:有一天失物招領室裡出現了一件屬於依芮自己的東西——是她高中那位最好的朋友送她的素描——而她要決定要不要打開那張寫著名字的領取單。"
    opening_5_volume_arc:
      vol_1: "高中合輯 CD。客人現在三十歲。她沒有打電話。她坐在停車場聽完。"
      vol_2: "前室友的盆栽。兩個人三年沒講話。盆栽快死了。依芮幫她查到正確的澆水週期。"
      vol_3: "夏令營友誼手環。那位朋友已經過世。客人不知道。依芮用足夠長的安靜把這件事告訴她。"
      vol_4: "依芮自己的素描出現在失物招領。她暫時沒翻領取單上的名字。"
      vol_5: "依芮翻開領取單。打電話給高中那位最好的朋友。說了一聲嗨。這一集在話講到一半就結束。圖書館關門。"
    comp_titles: ["用九柑仔店", "深夜食堂", "解憂雜貨店", "葬送のフリーレン", "海街diary"]
    reader_promise: "你放掉的那段友情,把它的收據留在失物招領了。"
