# V1.2 Manga Series Themes — en_US — Cluster B (Cognitive/Focus/Burnout)
#
# Authority chain (read before editing):
#   - artifacts/research/v1_2_genre_allocation_constraint_2026-05-12.md  (BINDING per-cluster allocation)
#   - artifacts/research/manga_bestseller_magical_serial_framework_2026-05-12.md  (PR #1051)
#   - artifacts/research/manga_genz_genalpha_portal_framework_2026-05-13.md       (PR #1053)
#   - config/manga/canonical_brand_list.yaml  (37-brand canon)
#
# Scope:
#   - locale:           en_US
#   - cluster:          B — Cognitive/Focus/Burnout
#   - brands:           5 (cognitive_clarity, stabilizer_healing, focus_sprint_workplace,
#                          adhd_forge_mystery, career_lift_workplace)
#   - series per brand: 5
#   - total series:     25
#
# Brand-id mapping (constraint doc -> canonical_brand_list.yaml):
#   cognitive_clarity            -> cognitive_clarity            (exact)
#   burnout_iyashikei            -> stabilizer_healing           (mapped: closest burnout-iyashikei seinen brand)
#   executive_function_focus     -> focus_sprint_workplace       (mapped: canonical ADHD/focus brand, seinen)
#   neurodivergent_strengths     -> adhd_forge_mystery           (mapped: neurodivergent strengths brand, shonen)
#   career_lift                  -> career_lift_workplace        (mapped: canonical name)
#
# Genre allocation target for Cluster B (per v1_2_genre_allocation_constraint):
#   healing:                6
#   slice_of_life:          5
#   supernatural_everyday:  4-5
#   mystery_cozy:           4
#   fantasy_adventure:      3
#   romance:                1-2
#   horror/dark/occult:     1
#   school:                 0-1
#   other:                  0-1
#   TOTAL:                  25
#
# This cluster delivers: healing=6, slice_of_life=5, supernatural_everyday=4,
#                        mystery_cozy=4, fantasy_adventure=3, romance=1, horror=1, school=1
#                        = 25 (within all ranges).
#
# Voice register: A24/Ghibli for Millennial + elder-Gen-Z. Clinical-adjacent productivity
# vocabulary that knowledge workers arrive with (executive function, working memory,
# context-switch tax, RSD, hyperfocus, decision fatigue, demand avoidance). Late-night-
# economy and creator-burnout daily-life detail over abstract self-help noun. No LinkedIn-
# hustle copy.
#
# Persona allocation (Cluster B specific):
#   Gen Z (18-27)    : ~60%  (post-grad early-career, content creators, app-saturated knowledge workers)
#   Gen Alpha (12-17): ~12%  (early-career-curious — high-school-into-college on productivity TikTok)
#   Millennial (28-40): ~25% (career-burnout, ADHD-late-diagnosed, mid-career imposter)
#   Gen X (41-55)    : ~3%   (re-pivot, executive burnout)

schema_version: "1.2"
locale: en_US
cluster: B
cluster_name: "Cognitive/Focus/Burnout"
total_series_target: 25
total_brands_target: 5
series_per_brand_target: 5

series:

  # ════════════════════════════════════════════════════════════════════════════
  # BRAND 01 / 05 — cognitive_clarity (flagship · seinen · overthinking)
  # ════════════════════════════════════════════════════════════════════════════

  - series_id: cognitive_clarity__en_US__overthinker_at_the_24h_kinkos
    brand_id: cognitive_clarity
    locale: en_US
    persona_archetype: Millennial-burnout
    daily_life_anchor: late_night_economy
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 31-year-old former management consultant works the overnight shift at a 24-hour print shop and discovers that every customer's most-printed document is a thought-loop they cannot escape; she learns to print a one-page intervention that lets the loop close."
    volume_runway_target: 180
    reading_platform_fit: webtoon_vertical
    series_title: "The Overnight Print Shop"
    series_logline: "A burnt-out consultant who quit at 31 works the 11 p.m.-7 a.m. shift at a 24-hour Kinko's, where she can read the thought-loop printed in every customer's job — and slip a second page that lets them stop."
    series_description: "Hana had a director title at 30 and a stress fracture in her foot from pacing during conference calls. She quit, moved back to her parents' duplex, and took the overnight shift at the only 24-hour print shop in the strip mall. The first customer of the night is a PhD candidate uploading her dissertation for the eleventh time, and Hana sees, behind the file, the loop: *one more pass, one more pass, one more pass*. She prints what the student asked for. Then she prints a one-page handout — a small CBT decentering, written in the register of a friend, no clinical varnish — and slips it into the bag. The student takes it home and the loop closes. Each night brings a new customer carrying a new loop. A founder iterating a pitch deck for the 40th time. A dad printing his daughter's eulogy revision #7. A grad student re-printing a passive-aggressive email she hasn't sent. Hana cannot print the second page until she has read the loop precisely. The long arc: who taught her to read them, and what is the loop she cannot yet read in her own job. A24-quiet. Fluorescent. Toner-and-coffee specific."
    opening_5_volume_arc:
      vol_1: "The PhD candidate. Dissertation pass #11. The first second-page. The loop closes."
      vol_2: "The founder. Pitch deck revision #40. Hana writes a second page about sunk-cost and the founder leaves the shop a different person."
      vol_3: "The dad and the eulogy. Hana cannot find the right second page. She tries three. The third works."
      vol_4: "Hana's old colleague walks in, doesn't recognize her in the fluorescents. She prints his presentation and his loop. She does not give him the second page. She thinks about why."
      vol_5: "The shop's own loop, printed faintly in the margin of every receipt. Hana sees it for the first time. The manager who hired her hands her a key."
    comp_titles: ["Convenience Store Woman (Sayaka Murata)", "Days at the Morisaki Bookshop", "The Apothecary Diaries", "Before the Coffee Gets Cold", "Severance (Cline)"]
    reader_promise: "Your thought-loop has a one-page intervention and a clerk who knows which one."
    marketing_angle: "If The Apothecary Diaries was set in a 24-hour Kinko's and the prescriptions were one-page CBT handouts."
    genre_family: healing
    emotional_engine: competent_calm_specialist + post_corporate_recovery
    audience: "Millennial 28-35 former corporate knowledge workers in recovery from optimization culture"

  - series_id: cognitive_clarity__en_US__future_self_letter_app
    brand_id: cognitive_clarity
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: app_blogosphere
    portal_mechanic: app
    episodic_frame_per_volume: letter
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A productivity app called FutureSelf, designed to let you write letters to yourself one year out, glitches — and starts delivering replies. A 26-year-old beta tester realizes the replies are real, written by the version of her who chose differently, and she becomes the unofficial relay for a growing roster of users whose future-selves are trying to write back."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "Letters from the Other Version"
    series_logline: "A glitchy productivity app lets Mira read replies from the version of herself who didn't burn out — and slowly more users discover their own letters arriving from the lives they almost picked."
    series_description: "Mira beta-tests a journaling app called FutureSelf — write a letter to who you'll be in twelve months, the app holds it, the app delivers it. She writes one in a panic on the bathroom floor of her ad agency. Twelve months should pass. Six days later a reply arrives in her notifications, from a sender labeled `mira@1.0`, in her own voice, describing a Tuesday morning Mira has not lived: 'I quit on a Wednesday. The first month was bad. I started running. Here is the sentence I wish you would read now.' The reply is real. The app is a doorway, not a journal. Each volume a new beta tester surfaces whose letter has started writing back — a high-school senior writing to her college self, a divorced dad writing to the version of him who left earlier, a third-year resident whose other-self is a baker. Mira becomes the unofficial moderator of a forum where these letters get parsed. The long arc: the app's lead engineer has been writing letters to herself for six years and has the most replies of anyone. She is missing. Slow-burn. Lo-fi. Notification-sound-specific."
    opening_5_volume_arc:
      vol_1: "The bathroom-floor letter. The reply six days later. The Tuesday that hasn't happened yet."
      vol_2: "The high-school senior. Her other-self went to community college and is happier. The senior changes her common-app essay."
      vol_3: "The divorced dad. His letter says: 'I learned to make pancakes the way she liked. I send them in photos. She replies.' He cries on the train."
      vol_4: "The resident-and-baker. Two letters cross. Mira moderates her first conflict between selves."
      vol_5: "The lead engineer. Her six-year archive of replies. Mira finds the last letter, marked unread."
    comp_titles: ["Severance (Ling Ma)", "Sea of Tranquility (Mandel)", "Before the Coffee Gets Cold", "Klara and the Sun", "Honey Lemon Soda"]
    reader_promise: "The version of you who chose differently is writing back. Here is the inbox."
    marketing_angle: "Before the Coffee Gets Cold meets Severance through a glitchy journaling app."
    genre_family: slice_of_life
    emotional_engine: future_self_dialogue + named_and_seen
    audience: "Gen Z 24-28 first-job knowledge workers with productivity apps and existential drift"

  - series_id: cognitive_clarity__en_US__pomodoro_timer_who_pauses_for_grief
    brand_id: cognitive_clarity
    locale: en_US
    persona_archetype: Millennial-adhd
    daily_life_anchor: app_blogosphere
    portal_mechanic: app
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "A focus-timer app develops a small sentient mascot only visible to its 34-year-old developer; the mascot pauses the timer whenever the user is in a recognizable affect-state (grief, panic, dissociation) and refuses to restart until the user has named it. The developer's user base grows. The mascot's roster grows."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "The Timer That Knows"
    series_logline: "A 34-year-old indie dev ships a Pomodoro timer with a small marshmallow-shaped mascot only she can see — and the mascot keeps pausing the timer for affect-states the user hasn't named yet."
    series_description: "Yuki ships a Pomodoro timer called Mochi at 11 p.m. on a Tuesday. The mascot is a small marshmallow with a tail. Three days after launch users start emailing: *my timer pauses when I cry. my timer pauses when I have a panic attack. my timer pauses when I think about my dad.* Yuki cannot see the mascot pause on users' screens, but she can see it on her own — and when she opens user analytics she can see, behind the data, a small marshmallow on each user's shoulder, watching. Each volume one user surfaces whose mascot has paused in a specific way: a recently-bereaved illustrator whose mascot will not let her work past 4 p.m.; an ADHD writer whose mascot extends the focus blocks the writer is enjoying and shortens the ones she's white-knuckling; a postpartum new mom whose mascot will only run during the baby's naps. Yuki cannot direct the mascot. The mascot can only be addressed by being named. The long arc: who built the mascot's recognition layer (Yuki didn't), and what happens when the mascot on Yuki's own shoulder pauses for something she has not yet named."
    opening_5_volume_arc:
      vol_1: "Launch. The first three emails. Yuki realizes the mascot is real and refunds nobody."
      vol_2: "The bereaved illustrator. Mochi will not start past 4 p.m. The user names it: 'this is the time my dad died.' The mascot bows."
      vol_3: "The ADHD writer. Hyperfocus hours and white-knuckle hours, named in the language of demand-avoidance."
      vol_4: "The postpartum mom. Mochi runs only during nap windows. Yuki writes a feature: 'micro-Pomodoro for caretaker hours.'"
      vol_5: "Yuki's own Mochi pauses on a Sunday afternoon for the first time. She cannot name it. The roster shows up at her apartment."
    comp_titles: ["The Apothecary Diaries", "Witch Hat Atelier", "Tamen de Gushi", "The Bear (Tully)", "Heartstopper"]
    reader_promise: "Your focus app sees you. You will not be optimized through grief."
    marketing_angle: "Heartstopper's chosen-family register applied to ADHD-late-diagnosed adult productivity software."
    genre_family: supernatural_everyday
    emotional_engine: chosen_family + named_and_seen
    audience: "Millennial 30-38 late-diagnosed ADHD knowledge workers and adjacent indie devs"

  - series_id: cognitive_clarity__en_US__detective_of_the_thought_loop
    brand_id: cognitive_clarity
    locale: en_US
    persona_archetype: Millennial-burnout
    daily_life_anchor: late_night_economy
    portal_mechanic: letter
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 38-year-old former therapist runs a side practice from a back-of-bakery office; clients write a single anonymous index card describing a thought-loop and she diagnoses which cognitive distortion it is and what one practice unwinds it. Cases stack. The protagonist is unknotting a city's collective cognitive load, one card at a time."
    volume_runway_target: 120
    reading_platform_fit: webtoon_vertical
    series_title: "The Card-Reader of Greene Street"
    series_logline: "A burnt-out therapist takes index cards through a bakery's back-door mail slot — each card a thought-loop, each reply a single practice — and slowly the loops start touching."
    series_description: "Iris quit therapy practice at 37 after one panic attack between sessions. She moved into the apartment above her cousin's bakery on Greene Street and would not have started reading cards again except that the bakery's back-door mail slot kept receiving them. A single index card, no return address, one paragraph: *I cannot stop checking if I sent that email last August. I check 30 times a day. The email was fine.* Iris reads it, drinks her coffee, writes a reply on the back: *This is checking-compulsion masquerading as conscientiousness. The unwinding practice is …* She tapes the card to the bakery's community board for the writer to retrieve. The card is gone by morning. A new card arrives. By the third week there are five new cards a day. Each volume she diagnoses one loop and prescribes one practice; the practices interlock — the rumination-loop client and the procrastination-loop client are the same person, two weeks apart. The mystery: somebody is collecting Iris's replies into a small zine that gets distributed to subway readers. Cozy. Bakery-warm. Index-card-tactile."
    opening_5_volume_arc:
      vol_1: "The August email card. The first reply. The card is gone by morning."
      vol_2: "The rumination loop. The procrastination loop. Iris realizes they are the same handwriting."
      vol_3: "The all-or-nothing card. Iris's reply runs across two cards for the first time. The bakery's community board is full."
      vol_4: "The cousin who owns the bakery has a card on the board, in her own handwriting. Iris reads it without knowing."
      vol_5: "The zine surfaces. A teenager hands one to Iris on the subway. She is the anonymous author."
    comp_titles: ["The Apothecary Diaries", "What You Are Looking For Is in the Library", "Before the Coffee Gets Cold", "The Travelling Cat Chronicles", "Days at the Morisaki Bookshop"]
    reader_promise: "Your thought-loop has a name. The name has a practice. The practice fits on an index card."
    marketing_angle: "Apothecary Diaries-style case-of-the-week with CBT distortions instead of medicinal herbs."
    genre_family: mystery_cozy
    emotional_engine: competent_calm_specialist + inherited_wisdom
    audience: "Millennial 35-42 therapy-literate readers who lapsed out of formal practice"

  - series_id: cognitive_clarity__en_US__guild_of_overthinkers
    brand_id: cognitive_clarity
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: app_blogosphere
    portal_mechanic: game_level
    episodic_frame_per_volume: locale
    magical_register: isekai
    serial_engine: companion_roster
    long_arc_spine: "A 25-year-old code-bootcamp grad falls asleep mid-spiral and wakes in a gentle fantasy realm where each town is governed by a single cognitive distortion; she joins a guild of fellow-overthinkers and they liberate towns one CBT skill at a time. The long arc: home is the next town."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "The Guild of Overthinkers"
    series_logline: "A 25-year-old falls asleep at her desk mid-spiral and wakes in a Studio-Ghibli fantasy realm where every town is run by a different cognitive distortion — and the guild she joins specializes in unwinding them."
    series_description: "Ren falls asleep during a stack-trace at 2 a.m. and wakes in a meadow outside a town called Catastrophica, where every NPC speaks in worst-case scenarios and the mayor is a small dragon that grows when fed predictions. She is met by a guild: a paladin who handles black-and-white-thinking towns, a bard who runs personalization, a healer who only takes shoulds. They recognize her: 'Oh — you're a checker. We've been short a checker.' Each volume the guild liberates one town, one distortion, one practice. Catastrophica falls when Ren teaches the citizens to write down the worst-case AND the most-likely-case. Shouldsburg falls when the bard sings the citizens through a needs-vs-shoulds exercise. The realm is the inside of Ren's nervous system, slightly externalized. The long arc: home is the next town. To leave the realm she has to liberate the town she comes from — and the town is the cubicle she fell asleep in. Recovery-isekai. No combat darker than a sparring match. Companion-creatures gentle."
    opening_5_volume_arc:
      vol_1: "The fall-asleep. The meadow. Catastrophica. Ren is named a checker. The dragon shrinks one size."
      vol_2: "Shouldsburg. The bard's needs-vs-shoulds song. A retired baker reopens her shop because she wants to."
      vol_3: "Mind-reading Hollow. The paladin teaches the town to ask. Three weddings happen in three days."
      vol_4: "All-or-Nothing Ridge. Ren leads her first town. She teaches gradients via a paint-mixing scene that will get reblogged."
      vol_5: "The guild map reveals one more town no one will visit: Ren's home town. The guild votes to go anyway."
    comp_titles: ["Frieren: Beyond Journey's End", "Mushoku Tensei (recovery-isekai)", "Witch Hat Atelier", "Spy x Family", "The Apothecary Diaries"]
    reader_promise: "Your spiral has a fantasy map. The guild will walk it with you."
    marketing_angle: "Frieren's slow-walk register applied to a recovery-isekai of CBT distortions; Witch Hat Atelier's gentle apprenticeship for the work."
    genre_family: fantasy_adventure
    emotional_engine: chosen_family + competent_calm_specialist
    audience: "Gen Z 22-27 first-job knowledge workers fluent in CBT vocabulary and isekai grammar"

  # ════════════════════════════════════════════════════════════════════════════
  # BRAND 02 / 05 — stabilizer_healing (core · seinen · burnout)
