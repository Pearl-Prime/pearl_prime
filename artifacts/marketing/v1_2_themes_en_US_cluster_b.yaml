  - series_id: stabilizer_healing__en_US__sabbatical_inn
    brand_id: stabilizer_healing
    locale: en_US
    persona_archetype: Millennial-burnout
    daily_life_anchor: slow_living
    portal_mechanic: location
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 36-year-old former senior engineer inherits a small inn off the Pacific Coast Highway from an aunt she barely knew; the inn's six rooms each correspond to a stage of burnout recovery, and guests are quietly routed to the right room by the inn itself. Each volume a new guest stays one week."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Sabbatical Inn"
    series_logline: "A burnt-out engineer inherits a six-room inn that knows which room each guest needs — and learns to be the innkeeper her own collapse needed two years ago."
    series_description: "Naomi had a staff-engineer title at a hyperscaler and a quiet collapse on a Sunday afternoon she still cannot fully remember. Eighteen months later her aunt's lawyer calls: she has inherited a six-room inn on a fog-soaked stretch of coastal highway. She drives up to sell it. The inn is full when she arrives. The current guests are a divorce-recovery retreat she did not book. The first morning a man arrives without a reservation, looking like Naomi looked eighteen months ago, and the inn — somehow — opens Room 2 for him, which is the room with the heaviest blackout curtains and the largest bath. The inn knows. Each volume one guest stays one week and Naomi learns one room. Room 1 (Just Stopped): blackout curtains, tea, no questions. Room 2 (First Sleep): bath, weighted blanket, soup. Room 3 (Bodies Come Back): walk, swim, garden. Room 4 (Old Feelings Return): journal, fire, dog. Room 5 (First Idea): sketchbook, hot drink, view. Room 6 (Re-entry): suitcases, conversation, a returning-to-the-world meal. The long arc: who Naomi's aunt was, and which room Naomi herself slept in, eighteen months ago, without remembering. Slow-burn. Coastal. Wood-stove specific."
    opening_5_volume_arc:
      vol_1: "Naomi arrives. The unbooked man. Room 2 opens itself. The first soup."
      vol_2: "A teacher checks in. The inn opens Room 1. She sleeps for fourteen hours. Naomi learns the rule: do not knock."
      vol_3: "A founder checks in, restless. Room 3. He hates the walk on day one. He loves the swim on day four."
      vol_4: "A nurse checks in. Room 4. The old feelings. The dog is named. The nurse cries on a Wednesday."
      vol_5: "A returning guest — the man from vol_1 — comes back for Room 5. The inn rearranges itself. Naomi opens her aunt's letter."
    comp_titles: ["The Travelling Cat Chronicles", "Days at the Morisaki Bookshop", "Convenience Store Woman", "Before the Coffee Gets Cold", "What You Are Looking For Is in the Library"]
    reader_promise: "Burnout has six rooms and an inn that knows which one you need."
    marketing_angle: "Studio Ghibli's coastal-iyashikei register applied to American knowledge-worker burnout in six exact stages."
    genre_family: healing
    emotional_engine: competent_calm_specialist + inherited_wisdom
    audience: "Millennial 32-40 burnt-out senior individual contributors and managers on de-facto sabbatical"

  - series_id: stabilizer_healing__en_US__creator_in_the_off_season
    brand_id: stabilizer_healing
    locale: en_US
    persona_archetype: GZ-creator
    daily_life_anchor: parasocial_creator
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 27-year-old YouTuber with 1.2M subs takes a hard off-season after a public crashout; she ends up running a small mountain cabin AirBnB where other creators come to recover — and each guest's first day she can see the metric (subs, view-velocity, sponsor-anxiety) hovering above their head as a small lantern that dims as they unwind."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "The Off-Season"
    series_logline: "A YouTuber takes a hard off-season after a public meltdown and starts hosting other crashed-out creators at a cabin; she can see each guest's metric-lantern, and learns which practice dims which lantern."
    series_description: "Mei has 1.2M subs and a video pinned to the top of her channel that says 'I'm going dark for a year.' She isn't dark. She's running a five-cabin AirBnB compound in the foothills of the Catskills, and the only people she takes are other creators in collapse. The first guest is a beauty creator whose sponsorship-anxiety lantern is bright enough to read a book by. Mei serves dinner. The lantern dims one notch. Each volume a different creator-shape arrives — a gaming streamer whose lantern is view-velocity, an autofic novelist whose lantern is Goodreads star average, a TikTok dancer whose lantern is the algorithm itself. Mei learns: each lantern dims to a different practice. Some need a walk. Some need a hard deletion of an app. Some need a phone call to a parent. The long arc: Mei's own lantern is still on, visible only in mirrors, and she has been pretending not to see it. Cabin-quiet. Phone-off specific. Loamy."
    opening_5_volume_arc:
      vol_1: "The beauty creator arrives. The sponsor-anxiety lantern. Dinner. The first dim."
      vol_2: "The gaming streamer. View-velocity lantern. The hard rule: no phones at the fire."
      vol_3: "The novelist. Goodreads-star lantern. The practice is a long letter to her editor she never sends."
      vol_4: "The dancer. The algorithm-lantern. Mei has no practice for this one. She and the dancer co-write a manifesto."
      vol_5: "Mei's own lantern, visible at last in her bathroom mirror. The current guest names it for her over breakfast."
    comp_titles: ["Convenience Store Woman", "The Bear (Tully)", "Honey Lemon Soda", "Days at the Morisaki Bookshop", "Tokyo Ueno Station"]
    reader_promise: "Your metric has a shape. Here is the practice that dims it."
    marketing_angle: "A24's quiet retreat register applied to the post-creator-economy crashout, with a metric-as-lantern visual hook."
    genre_family: supernatural_everyday
    emotional_engine: chosen_family + competent_calm_specialist
    audience: "Gen Z 24-30 mid-tier creators in or near burnout; Millennial creator-adjacents"

  - series_id: stabilizer_healing__en_US__sourdough_after_quitting
    brand_id: stabilizer_healing
    locale: en_US
    persona_archetype: Millennial-burnout
    daily_life_anchor: slow_living
    portal_mechanic: object
    episodic_frame_per_volume: locale
    magical_register: none
    serial_engine: serial_diary
    long_arc_spine: "A 33-year-old who quit a marketing director job with no plan starts a sourdough practice on her parents' kitchen counter; the bread, slowly, teaches her to operate at a metabolism she has not lived in since college. No magic. One year. 52 loaves."
    volume_runway_target: 100
    reading_platform_fit: graphic_novel
    series_title: "Fifty-Two Loaves"
    series_logline: "After quitting at 33 with no plan, Aisha bakes one sourdough loaf a week for a year — and the bread, slowly, teaches her a metabolism she has not lived in since college."
    series_description: "Aisha quit on a Tuesday. The director-of-marketing email went out at 4:12 p.m. and she drove to her parents' house in central New Jersey with a duffel and her sourdough starter — a gift from a friend three years ago that she had kept barely alive on the back of her counter, refreshing it only in panic, like an oblique apology to the better life she meant to live. Week 1: the starter is barely alive. Week 2: the first loaf is dense and sad. By week 12 she is making decent country boules and reading three pages of a novel before bed. By week 26 she has started a small CSA-style bread route for four neighbors. By week 52 she has not gone back to a screen-job and is not sure she will. There is no magic. The series is a graphic-novel diary, 52 loaves, 52 weeks, an honest account of a Millennial's first real off-ramp from optimization culture. The bread is the unit. The bread is the metabolism. Slow. Specific. Floured."
    opening_5_volume_arc:
      vol_1: "Weeks 1-10. The starter wakes up. Loaves 1-10. The first decent crust. Aisha sleeps eight hours for the first time in years."
