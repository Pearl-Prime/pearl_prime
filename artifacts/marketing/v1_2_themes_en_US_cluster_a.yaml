    series_description: "Wen, 22, is a senior at a small liberal-arts college in Western Massachusetts who finds a leather logbook in the campus archive while doing work-study. It has been hand-passed for 117 years. Each entry is the same shape: name (initials only), date, presentation, intervention, outcome. The earliest entries are panic and 'the shakes' on factory floors in 1908; the latest is undated and in a hand Wen does not yet recognize. The instruction tucked inside is one sentence: 'You will know the next one when you see them.' Each volume Wen identifies one current case — a roommate's panic, a stranger on the campus green, a TA mid-crisis — and writes the next entry: the intervention that actually worked. The logbook helps. The mystery: each entry seems to be writing itself slightly back at her, in hands that change with each generation. Who keeps the logbook? The answer is hinted at slowly. The book-format companion edition is a fictional facsimile of the logbook itself — readable both ways."
