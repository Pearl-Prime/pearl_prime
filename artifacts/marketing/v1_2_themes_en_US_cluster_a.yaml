    brand_id: sleep_restoration_iyashikei
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: retail_service
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 24-hour kitchen open only 1 a.m. to 5 a.m. serves one bowl of warm grain to each insomniac who finds the door; each volume one customer's sleep is gently restored over one bowl."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Night Kitchen"
    series_logline: "Open 1 to 5. One bowl per customer. The bowl is warm. The customer sleeps. The cook does not."
    series_description: "Mei, 26, runs a tiny basement kitchen in a brownstone in Brooklyn — no sign, no Yelp page, finds you on the worst night via a referral you can't quite remember receiving. Open 1 a.m. to 5 a.m. One bowl per customer. The bowl is always warm grain — porridge, rice, oatmeal, congee — and one small additive Mei chooses based on a single question. Each volume one customer arrives with one sleeplessness pattern (rumination, grief, hypervigilance, screen-fried, anticipatory anxiety) and one bowl resolves it. The customer leaves and sleeps. They never return — sleep restored, no need. The long arc: Mei has not slept herself in 4 years. Each customer she serves she is also serving herself, indirectly. The 200th customer will be the one whose bowl, finally, is also her own."
    opening_5_volume_arc:
      vol_1: "First customer. Ruminator. Porridge with cardamom. Sleeps."
      vol_2: "Grief insomnia. Congee with ginger and salt. Sleeps."
      vol_3: "Hypervigilant new mom. Rice porridge with miso. Sleeps."
      vol_4: "Screen-fried teen. Oatmeal with cinnamon and dark honey. Sleeps."
      vol_5: "First customer who almost recognizes Mei. The kitchen flickers. The long arc opens."
    comp_titles: ["Midnight Diner: Tokyo Stories", "Sweet Bean Paste", "Days at the Morisaki Bookshop", "Before the Coffee Gets Cold", "What You Are Looking For Is in the Library"]
    reader_promise: "One bowl. One night. You will sleep."
    marketing_angle: "Midnight Diner for the insomnia generation — episodic, warm, devotional."
