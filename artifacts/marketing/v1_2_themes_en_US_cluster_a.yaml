  - series_id: sleep_restoration_iyashikei__en_US__sleep_influencer_podcast
    brand_id: sleep_restoration_iyashikei
    locale: en_US
    persona_archetype: GZ-uni
    daily_life_anchor: content_creation
    portal_mechanic: mascot
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 23-year-old sleep-podcast host's recurring sleep-spirit mascot starts visiting individual listeners in their dreams — each volume one listener's insomnia case is mapped and resolved."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Late-Night Podcast"
    series_logline: "Each Tuesday at 11 p.m. she records the podcast. Each Tuesday at 3 a.m. the sleep-spirit visits one of her listeners. They never meet her. They sleep."
    series_description: "Wren is 23, third-year journalism, runs a niche sleep-podcast (270 listeners, growing) where she reads slow-paced public-domain texts and the small grey sleep-spirit she has always seen perches on the mic. One Wednesday a listener emails: 'I dreamed about a small grey creature last night and slept for the first time in three weeks.' Wren realizes the spirit is leaving the recording. Each volume the spirit visits one listener — their insomnia story is mapped, the dream-visit is rendered, the listener sleeps. The listener never knows it was Wren. The long arc: the spirit is aging. Wren is learning to take care of it. There is a 271st listener whose story the spirit will not visit. Whose story is it?"
    opening_5_volume_arc:
      vol_1: "First listener-email. The med student's three-week insomnia. The spirit visits. He sleeps."
      vol_2: "The night-shift nurse. The spirit teaches Wren about shift-work circadian disruption."
      vol_3: "The high-schooler whose parents fight at night. The spirit's intervention is larger."
      vol_4: "The first listener who recognizes the spirit on the podcast. Their email is just one line: 'Thank you.'"
      vol_5: "The 271st listener. The story the spirit will not visit. The mystery opens."
    comp_titles: ["Mushishi", "Frieren", "The Apothecary Diaries", "Natsume's Book of Friends", "Sweet Bean Paste"]
    reader_promise: "Someone is helping you sleep. You will not know who."
    marketing_angle: "Mushishi for the podcast generation — quiet, episodic, devotional."
    genre_family: healing
    emotional_engine: anonymous_gift + companion_roster
    audience: "Gen Z 19–25 insomnia-named-and-claimed, podcast-listening"

  - series_id: sleep_restoration_iyashikei__en_US__moon_station_sleep_clinic
    brand_id: sleep_restoration_iyashikei
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: school_commute
    portal_mechanic: train_station
    episodic_frame_per_volume: locale
    magical_register: supernatural_everyday
    serial_engine: location_anthology
    long_arc_spine: "A spirit-world sleep clinic operates one stop further than the last subway station in every major city — the protagonist works the night shift, and each volume is one dream-zone visited and one sleeper restored."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Moon-Station Clinic"
    series_logline: "One stop further than the last station, in every city, there is a clinic. The dream-walker works the night shift. Each volume she restores one sleeper."
    series_description: "Imogen, 26, lost a year of sleep to a breakup-then-grief cycle and ended up one stop too far on the F train at 4 a.m. The moon-station clinic was waiting. They hired her. She is the night-shift dream-walker now — each shift one sleeper from any city in the world arrives in a dream-zone she has to visit, map, and gently restore. The dream-zones are locales: an underwater bus stop, a forest of clocks, a kitchen that is also a beach, a library where every book is the reader's own unfinished thought. Each volume one zone, one sleeper. The long arc: Imogen's own dream-zone has been closed for visitors since she started. It will not open until she's ready. She is not yet."
    opening_5_volume_arc:
      vol_1: "The underwater bus stop. A teenager with grief-insomnia. Restored."
      vol_2: "The forest of clocks. A new parent's sleep-cycle. Restored."
      vol_3: "The kitchen-beach. A senior nurse, shift-work. Restored."
      vol_4: "The library of unfinished thoughts. The protagonist's college roommate, by accident."
      vol_5: "Imogen's own zone, briefly visible at end-of-shift. The reader sees it once."
    comp_titles: ["Spirited Away", "The Midnight Library", "Mushishi", "Frieren", "Aria"]
    reader_promise: "Your sleep has a city, and someone is working the night shift there for you."
    marketing_angle: "Spirited Away for the insomnia generation — episodic, devotional, transit-mediated."
    genre_family: fantasy_adventure
    emotional_engine: competent_calm_specialist + anonymous_gift
    audience: "Gen Z 23–28 urban insomniacs, sleep-app users, transit-city"

