    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: app_blogosphere
    portal_mechanic: app
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A sleep-tracking app's premium tier is staffed by yokai who visit users' dreams — the protagonist is the only human moderator, and each volume she ratifies one yokai's intervention with one user."
    volume_runway_target: 100
    reading_platform_fit: webtoon_vertical
    series_title: "Premium Tier"
    series_logline: "The premium tier of the sleep-tracking app costs $4.99/month and includes one yokai. The yokai visits. The user sleeps. She is the moderator who keeps it humane."
    series_description: "Quinn, 25, took a contract role as a 'content moderator' for a sleep-tracking app and discovered on day three that the premium tier is staffed by sleep-yokai — small, professional, slightly bored — who visit users' dreams when invoked. Quinn's job is to review the visit logs and ratify or veto each intervention. Most are fine. Some are not. Each volume one case: a yokai that was a little too aggressive with a teenager's intrusive thoughts, a yokai that fell asleep on duty and the user dreamed of her instead, a yokai that became attached. Quinn is learning to manage them. The long arc: the company is going public. The yokai do not want to be on the S-1. Quinn has to choose."
    opening_5_volume_arc:
      vol_1: "First veto. The over-aggressive yokai. The teenager's case."
      vol_2: "The sleeping yokai. The user dreams of her. The HR conversation."
      vol_3: "The attached yokai. The user is a single dad. Quinn negotiates."
      vol_4: "The first IPO meeting. Quinn meets the CEO and his yokai (he has one)."
      vol_5: "Quinn drafts her resignation. Or her negotiation. The choice opens."
    comp_titles: ["Eden of the East", "The Apothecary Diaries", "Aggretsuko", "Wotakoi", "Recovery of an MMO Junkie"]
    reader_promise: "Your sleep app has employees you don't see. Someone makes sure they're kind."
    marketing_angle: "Aggretsuko's workplace iyashikei applied to the wellness-tech industry — humane labor inside the sleep-app boom."
    genre_family: mystery_cozy
