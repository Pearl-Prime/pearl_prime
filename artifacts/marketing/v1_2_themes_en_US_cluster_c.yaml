    series_description: "Wes is thirty-eight, a Marine veteran with three combat deployments and complicated grief from the loss of his best friend Hector in 2014. He moves to rural eastern Washington and takes the only job available: shop class at the local high school. He does not want it. He is bad at speeches and worse at feelings. He is, however, very good at hands. Each volume one student arrives — a girl whose father died in a logging accident, a boy whose mother left, a non-binary kid being harassed for the third year running, a senior who is failing every other class, a freshman who has not spoken to anyone since middle school. Wes does not counsel. He hands them a piece of wood, a square, a tool, and a plan. Each volume teaches one specific skill: a mortise-and-tenon joint, a hand-cut dovetail, a planed surface, a glue-up, a finish. The skill is the lesson. The register is realist, fully — no magic, no register-bending, only sawdust, school-day light, and a man with a grief he is, slowly, putting down. The arc is Wes's own woodworking project, started for Hector, never finished, in his garage."
