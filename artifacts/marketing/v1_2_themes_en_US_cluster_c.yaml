# V1.2 Manga Series Themes — en_US — Cluster C (Grief/Trauma/Healing)
#
# Authority chain (read before editing):
#   - artifacts/research/v1_2_genre_allocation_constraint_2026-05-12.md  (BINDING per-cluster allocation)
#   - artifacts/research/manga_bestseller_magical_serial_framework_2026-05-12.md  (PR #1051)
#   - artifacts/research/manga_genz_genalpha_portal_framework_2026-05-13.md       (PR #1053)
#   - config/manga/canonical_brand_list.yaml  (37-brand canon)
#
# Scope:
#   - locale:           en_US
#   - cluster:          C — Grief/Trauma/Healing
#   - brands:           5 (spiritual_ground_supernatural, trauma_path_healing,
#                          healing_ground_healing, warrior_calm_cultivation,
#                          stoic_edge_battle)
#   - series per brand: 5
#   - total series:     25
#
# Brand-id mapping (constraint doc -> canonical_brand_list.yaml):
#   grief_companion_iyashikei      -> spiritual_ground_supernatural  (mapped: closest canonical grief+companion, josei)
#   trauma_recovery_shojo          -> trauma_path_healing            (mapped: grief+trauma, josei)
#   healing_ground                 -> healing_ground_healing         (exact match)
#   ash_and_steel_warrior_calm     -> warrior_calm_cultivation       (mapped: warrior_calm canonical)
#   surrender_form_warrior_calm    -> stoic_edge_battle              (mapped: courage+grief, seinen warrior register)
#
# Genre allocation target for Cluster C (per v1_2_genre_allocation_constraint):
#   healing:                6  (HARD floor)
#   slice_of_life:          5
#   supernatural_everyday:  4-5
#   mystery_cozy:           4
#   fantasy_adventure:      3
#   romance:                1-2
#   horror/dark/occult:     1
#   school:                 0-1
#   other:                  0-1
#   TOTAL:                  25
#
# This cluster delivers: healing=6, slice_of_life=5, supernatural_everyday=5,
#                        mystery_cozy=4, fantasy_adventure=3, romance=1, horror=1
#                        = 25 (within all ranges).
#
# Voice register: A24/Ghibli + Frieren ("what is left when the journey ends").
# Skews Millennial + elder-Gen-Z (mid-20s to mid-30s): recently bereaved,
# post-trauma recovery, complicated grief. Loss is the engine, not the plot.
# Tender but not maudlin. No therapy-jargon, no preachy register.
# Persona allocation (target): ~55% Gen Z, ~10% Gen Alpha (early-bereavement),
# ~30% Millennial, ~5% Gen X.
# Daily-life anchors fit: alt_spirituality (grief rituals), thrift_vintage
# (inherited objects), late_night_economy (grief insomnia), neurodivergent
# (autistic grief literature gap), parasocial_creator (creator memorializing).
# Portal mechanics fit: letter (from the dead), mirror (carries the lost),
# ritual (annual grief rite), recipe (grandmother's), song (sung to the missing),
# door (where they last stood).

schema_version: "1.2"
locale: en_US
cluster: C
cluster_name: "Grief/Trauma/Healing"
total_series_target: 25
total_brands_target: 5
series_per_brand_target: 5

series:

  # ════════════════════════════════════════════════════════════════════════════
  # BRAND 01 / 05 — spiritual_ground_supernatural  (grief_companion_iyashikei)
  # tier: niche · demographic: josei · primary_topic: grief
  # ════════════════════════════════════════════════════════════════════════════

  - series_id: spiritual_ground_supernatural__en_US__letters_from_the_other_chair
    brand_id: spiritual_ground_supernatural
    locale: en_US
    persona_archetype: ML-bereaved
    daily_life_anchor: alt_spirituality
    portal_mechanic: letter
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 33-year-old widow inherits her late husband's grief-letter circle — a Sunday meeting where each member writes a letter to their dead and reads it aloud — and discovers the letters are being answered, one at a time, in handwriting only she can see."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Other Chair"
    series_logline: "Iris kept her husband's Sunday grief-letter circle alive after he died, and started receiving answers nobody else can see."
    series_description: "Iris is thirty-three and seven months a widow when she decides to keep her husband Daniel's Sunday grief-letter circle running out of their second-floor apartment in Cambridge. Six strangers come — a woman whose son drowned, a man whose mother is alive but unrecognizable, a divorced father whose ex still gets the holiday card. They each write one letter to whomever they have lost and read it aloud over weak coffee. Iris does the dishes after. The third Sunday she finds a sentence in Daniel's handwriting on the back of the woman's letter — a sentence the woman's son used to say. Nobody else can see the writing. Each episode a different member's letter is answered in a different hand. Iris does not tell them. She learns instead what each answer asks of her: keep this person coming back. Bring this kind of cookie. Move the lamp. The slow arc is the empty chair Daniel used to sit in, and the one Sunday it is not empty. A24-quiet, Frieren-tender, no afterlife metaphysics — just one chair and one hand."
    opening_5_volume_arc:
      vol_1: "Iris keeps the circle. First Sunday alone. The mother whose son drowned reads her letter. Daniel's handwriting appears on the back. Iris washes the cup he used to drink from."
      vol_2: "The man with the unrecognizable mother. The handwriting that answers is his mother's pre-diagnosis. Iris learns the answers come in the dead's own hand — except when the dead are not yet dead."
      vol_3: "The divorced father. The handwriting is his ex-wife's mother. Iris learns the circle's geography: every person you grieve has a hand."
      vol_4: "A new member arrives — a woman who lost a friend in a car crash. The hand that answers her is Iris's own husband's. Iris does not breathe for a page."
      vol_5: "Iris writes her own letter to Daniel for the first time. The page stays blank. Daniel's chair is empty. But the cookie tin moves one inch. The circle continues."
    comp_titles: ["Before the Coffee Gets Cold", "Frieren: Beyond Journey's End", "H is for Hawk (Helen Macdonald)", "Days at the Morisaki Bookshop", "What You Are Looking For Is in the Library"]
    reader_promise: "Your dead can answer you, just not in the room where you wrote."
    marketing_angle: "Before the Coffee Gets Cold for the chair your person used to sit in."
    genre_family: healing
    emotional_engine: vigil_for_the_lost + chosen_family
    audience: "Millennials 30–38 newly bereaved spouses and adult children, alt-spiritual without doctrine"

  - series_id: spiritual_ground_supernatural__en_US__grandmothers_recipe_box
    brand_id: spiritual_ground_supernatural
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: thrift_vintage
    portal_mechanic: recipe
    episodic_frame_per_volume: recipe
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 26-year-old inherits her grandmother's handwritten recipe box and discovers each card carries a specific memory — and that cooking the recipe lets the cook spend exactly one hour with the person who used to make it."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "Recipes for Borrowed Hours"
    series_logline: "Each of Grandma's recipe cards comes with one hour. Make the meal, sit at the table, and she is there."
    series_description: "Maya is twenty-six and a line cook in Providence when her grandmother dies and the only thing in the will addressed to her is a battered tin recipe box. The first time she makes the morning-after biscuits her grandmother is sitting at her own kitchen table — translucent, kind, fully present, and clear about the rules: one hour per recipe, the recipe must be made exactly as written, you do not get to choose when. Maya works through the box. Each volume is one recipe and one hour with one version of her grandmother — at twenty, at forty, at eighty. Some recipes have ingredients Maya cannot find. Some require company. Some are not her grandmother's — they are her grandmother's mother's, her grandmother's lover's, her grandmother's enemy's. The long arc is the last card at the bottom of the tin, in handwriting Maya does not know, that asks her to cook one meal for a person not yet born."
    opening_5_volume_arc:
      vol_1: "Morning-after biscuits. Grandmother at sixty. The rules are explained. Maya cries through the second batch."
      vol_2: "Tomato gravy with sausage. Grandmother at twenty, before she knew Maya's grandfather. A version Maya has never met."
      vol_3: "Lemon icebox cake. Grandmother at eighty, with dementia. The hour is the hour she was lucid for one afternoon in 2019."
      vol_4: "A recipe Maya cannot read — the handwriting is her great-grandmother's, in Polish. Maya finds the cousin who can translate."
      vol_5: "The blank card at the bottom. The instruction: cook for a child not yet born. Maya does not know whose child."
    comp_titles: ["Sweet Bean Paste", "Like Water for Chocolate", "Days at the Morisaki Bookshop", "The Travelling Cat Chronicles", "What You Are Looking For Is in the Library"]
    reader_promise: "Your grandmother is one biscuit away, for exactly one hour at a time."
    marketing_angle: "Like Water for Chocolate as iyashikei: one hour with the dead, per recipe."
    genre_family: healing
    emotional_engine: inherited_wisdom + vigil_for_the_lost
    audience: "Gen Z 25–29 grandchildren who outlived a grandparent and inherited the kitchen"

  - series_id: spiritual_ground_supernatural__en_US__pet_grief_after_midnight
    brand_id: spiritual_ground_supernatural
    locale: en_US
    persona_archetype: GZ-queer
    daily_life_anchor: late_night_economy
    portal_mechanic: door
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "A 27-year-old runs a 24-hour pet-grief hotline from her apartment; the dead pets call back, and slowly assemble themselves into a phantom roster that lives in her hallway."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "The Hallway of Small Animals"
    series_logline: "Wren answers a pet-loss hotline at night. The dead pets call back. They live in her hallway now."
    series_description: "Wren is twenty-seven, non-binary, and a hospice social worker by day. At night they volunteer for the pet-loss hotline because their own cat died two years ago and they needed something to do with the hours between midnight and four. The first dead pet they hear from is a chihuahua named Pierogi, who calls collect from the apartment's landline at 2:47 a.m. and says the caller earlier needs to know he forgave her. Wren delivers the message. Pierogi stays. Each volume a new dead pet calls and stays — a senior tortoise, a cockatiel, a hamster, a barn cat — and joins the small roster that now lives in Wren's narrow Brooklyn hallway. The cases vary: a guardian whose dog is still alive but failing, a teenager whose hamster was their only witness in a hard year, a man whose service dog saved his life and then did not save itself. The arc: Wren's own cat has not called. Wren does not understand why. The hallway keeps growing."
    opening_5_volume_arc:
      vol_1: "Pierogi calls. The first message gets delivered. The chihuahua stays in the hallway."
      vol_2: "The tortoise from a guardian whose mother is dying. The pet teaches Wren about anticipatory grief."
      vol_3: "The hamster who was the only witness. The teenager comes off the line laughing for the first time in eight months."
      vol_4: "The service dog. The man cries on the line. Wren's hallway is now five animals deep."
      vol_5: "Wren's own cat does not call. Wren reads the cat's old vet records. The hint that the cat has not called because the cat is waiting elsewhere."
    comp_titles: ["The Travelling Cat Chronicles", "She and Her Cat", "Heartstopper", "Days at the Morisaki Bookshop", "Frieren: Beyond Journey's End"]
    reader_promise: "Your dead pet is still here, just down the hall, waiting for the right call."
    marketing_angle: "The Travelling Cat Chronicles meets a queer late-night grief hotline."
    genre_family: slice_of_life
    emotional_engine: chosen_family + vigil_for_the_lost
    audience: "Gen Z 24–29 queer and neurodivergent urban pet-bereaved, on the hospice/social-work pipeline"

  - series_id: spiritual_ground_supernatural__en_US__second_funeral_society
    brand_id: spiritual_ground_supernatural
    locale: en_US
    persona_archetype: ML-bereaved
    daily_life_anchor: alt_spirituality
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 35-year-old funeral celebrant runs a small society that performs second funerals — the one the family didn't get to have — and each second funeral surfaces the person the first one was too small or too rushed to honor."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Second Funeral Society"
    series_logline: "First funerals are for the family. Second funerals are for the person who actually died. June officiates both."
    series_description: "June is thirty-five and a former hospice chaplain who left the church and started a one-person business: she performs second funerals, by appointment, at any location the bereaved chooses, for any person they feel was not properly mourned the first time. A father whose son died of overdose in 2003 and was given a sanitized funeral. A daughter whose mother was buried in the wrong dress. A husband whose wife's funeral was hijacked by an estranged sister. Each volume is one second funeral, planned and held. June does not bring religion; she brings a small black book, a candle, one prop the family supplies, and three sentences she will not say in advance. The dead, in this register, are not present — but the family is, finally, and one specific concrete thing about who they actually lost arrives. The long arc: June has never performed a second funeral for her own dead. She does not say who. The book has one blank page at the back, with a name only she can read."
    opening_5_volume_arc:
      vol_1: "The father whose son died of overdose. The first second funeral. The candle is lit in the boy's old bedroom. June reads one of his Spotify playlists aloud."
      vol_2: "The daughter whose mother was buried in the wrong dress. The funeral is held in the dress that fit. The mother's name is said in the way only the daughter said it."
      vol_3: "The hijacked funeral. The husband. The estranged sister is not invited. The wife's actual best friend reads the eulogy that was cut."
      vol_4: "A repeat client. The father from vol_1 returns for his other son. The second funeral becomes the start of a third reckoning."
      vol_5: "The blank page. The name June will not read. The first hint of who she is owes a second funeral to."
    comp_titles: ["Frieren: Beyond Journey's End", "The Order of the Good Death (Caitlin Doughty)", "Before the Coffee Gets Cold", "Days at the Morisaki Bookshop", "After the Quake (Murakami)"]
    reader_promise: "The funeral that was too small the first time can be held again."
    marketing_angle: "Frieren's vigil register applied to American funeral practice. Caitlin Doughty for fiction."
    genre_family: mystery_cozy
    emotional_engine: competent_calm_specialist + vigil_for_the_lost
    audience: "Millennials 32–40 bereaved adults whose first funeral did not fit"

  - series_id: spiritual_ground_supernatural__en_US__grief_doula_west_village
    brand_id: spiritual_ground_supernatural
    locale: en_US
    persona_archetype: ML-bereaved
    daily_life_anchor: alt_spirituality
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 32-year-old grief doula in the West Village holds one client at a time through the first year after a death; each volume is one client, one season, one small ritual that turns the grief from a haunting into a companion."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "First Year"
    series_logline: "Lila is a grief doula. She holds you for one year. The grief does not leave, but it becomes someone you can walk with."
    series_description: "Lila is thirty-two and trained as a death doula before pivoting — there is a smaller, less recognized profession that holds the bereaved through the first twelve months after the death. She has six clients at a time, one for each season-and-a-half. Each volume she takes one client through one quarter. A woman who lost her father in October. A trans man who lost his chosen mother in March. A teacher who lost a student in the worst way. A man whose adult son died in another country and the body was not returned. A daughter whose mother died of long-term mental illness and whose grief is, mostly, relief. Lila's tools are small: a candle, a calendar, a piece of clothing, a specific kind of walk. Each volume names one ritual the client invents, the only one for them. The arc: a new client signs up for a first-year contract whose 'who died' field is blank. Lila accepts."
    opening_5_volume_arc:
      vol_1: "Autumn. The woman whose father died in October. The first ritual: a daily walk past his last apartment, the wrong way around the block."
      vol_2: "Winter. The trans man who lost his chosen mother. The ritual: cook one of her recipes for one friend, every two weeks."
      vol_3: "Spring. The teacher who lost a student. The ritual: a single bulb planted, named, ignored."
      vol_4: "Summer. The father whose son died abroad. The ritual: a kite, every Sunday, in a park his son never visited."
      vol_5: "The new client. The blank 'who died' field. Lila accepts. The mystery of the unnamed dead opens."
    comp_titles: ["The Year of Magical Thinking (Joan Didion)", "H is for Hawk", "Before the Coffee Gets Cold", "Frieren: Beyond Journey's End", "What You Are Looking For Is in the Library"]
    reader_promise: "There is one ritual that fits your grief. Lila finds it."
    marketing_angle: "Year of Magical Thinking as iyashikei manga: one small daily practice per quarter, for twelve months."
    genre_family: slice_of_life
    emotional_engine: competent_calm_specialist + ritual_as_anchor
    audience: "Millennials 28–38 bereaved in the first year, alt-spiritual, urban, vocabulary-rich"

  # ════════════════════════════════════════════════════════════════════════════
  # BRAND 02 / 05 — trauma_path_healing  (trauma_recovery_shojo)
  # tier: niche · demographic: josei · primary_topic: grief (trauma_recovery sec.)
  # ════════════════════════════════════════════════════════════════════════════

  - series_id: trauma_path_healing__en_US__mirror_that_remembers_more
    brand_id: trauma_path_healing
    locale: en_US
    persona_archetype: GZ-uni
    daily_life_anchor: thrift_vintage
    portal_mechanic: mirror
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: mystery_box
    long_arc_spine: "A 24-year-old trauma survivor buys a thrift-store vanity mirror that reflects rooms she has never been in — rooms her body remembers but her conscious mind does not — and each volume she returns to one and reclaims one piece of herself from it."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "Rooms I Don't Remember"
    series_logline: "Halle's thrift-store mirror shows her rooms her body knows but her mind has forgotten. Each room gives her one thing back."
    series_description: "Halle is twenty-four, in her first year of trauma-focused therapy, and on a rainy Sunday she buys a tall oval vanity mirror at a Brooklyn thrift store because the frame is pretty. That night the mirror shows her not her bedroom but a kitchen with a yellow refrigerator she has never seen. The kitchen is hers — her body knows the floor — but she has no conscious memory of it. Each volume she returns to one room: the kitchen, the church basement, the backseat of a green car, the back porch of a house in summer. She does not relive the trauma. She brings a small object into the room — a candle, a song, an adult she trusts — and reclaims one specific thing: her own laugh, her ability to taste, her preference for a color, her willingness to be held. The volumes are slow, gentle, never voyeuristic. The mystery: the mirror's frame has a maker's mark, and the maker is still alive. The long arc is finding her."
    opening_5_volume_arc:
      vol_1: "The yellow refrigerator. The first room. Halle brings a candle. She reclaims her own laugh — she has not laughed without flinching in eight years."
      vol_2: "The church basement. A song. The kindness of singing badly. She reclaims her voice for ten seconds at a stoplight a week later."
      vol_3: "The backseat of the green car. Her current therapist's voice, on speaker. She reclaims the right to be held by a person she chose."
      vol_4: "The summer porch. She is small. She is allowed to be small. She reclaims tasting strawberries."
      vol_5: "The maker's mark on the frame. The first hint of where the mirror came from. Halle realizes someone made this mirror for someone like her."
    comp_titles: ["The Body Keeps the Score (van der Kolk)", "Witch Hat Atelier", "Before the Coffee Gets Cold", "Frieren: Beyond Journey's End", "What You Are Looking For Is in the Library"]
    reader_promise: "Your body remembers what your mind cannot, and your body is allowed to take back what is yours."
    marketing_angle: "Body Keeps the Score for a generation that buys thrift-store mirrors and goes to trauma therapy."
    genre_family: healing
    emotional_engine: somatic_reclamation + competent_calm_specialist
    audience: "Gen Z 22–28 trauma survivors in active therapy, body-literacy vocabulary"

  - series_id: trauma_path_healing__en_US__autistic_girl_who_kept_the_lights
    brand_id: trauma_path_healing
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: neurodivergent
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "An autistic 25-year-old runs a small lamp-restoration shop and discovers each restored lamp carries the specific kind of light its previous owner needed to survive — and her customers are mostly autistic adults grieving a parent who never learned to keep the lights on for them."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "Keeping the Lights"
    series_logline: "Tova restores old lamps. The lamps remember the light their last owner needed. Her customers are autistic adults who lost a parent who never learned to leave the light on."
    series_description: "Tova is twenty-five, autistic, and her hands know lamps. She runs a one-person restoration shop out of the basement of her aunt's house in Portland — rewiring, refelting, replacing shades, sourcing the exact bulb. Her customers find her by word of mouth. The third lamp she finishes — a green banker's lamp from 1962 — comes back two weeks later with a note: 'It glows like my mother used to forget to.' Tova realizes each lamp she restores carries a specific quality of light its previous owner needed but could not have. Her roster grows: a customer whose father refused to leave hall lights on. A customer whose mother used grief-fluorescent kitchen overheads as punishment. A customer who has not been in a fully-lit room since 1997. Each volume she restores one more lamp for one more autistic adult mourning a parent who did not — could not — learn how to be soft in light. The mystery: Tova's own mother is alive. Tova has not restored a lamp for herself. The aunt's basement is, in fact, very dimly lit."
    opening_5_volume_arc:
      vol_1: "The banker's lamp. The first note. Tova realizes what she has been doing."
      vol_2: "The hall-light customer. A wall sconce. The 7-watt bulb that her father refused for thirty-three years."
      vol_3: "The fluorescent-overhead customer. A small dome floor lamp. Warm and below eye level."
      vol_4: "The customer who has not been in a fully-lit room since 1997. A series of three small lamps, in increments. Tova learns about graded exposure to brightness."
      vol_5: "Tova's own basement. She replaces one bulb. Her mother calls. Tova does not pick up. The arc opens."
    comp_titles: ["Frieren: Beyond Journey's End", "Sweet Bean Paste", "Convenience Store Woman (Sayaka Murata)", "What You Are Looking For Is in the Library", "She and Her Cat"]
    reader_promise: "Your parent never learned to leave the light on. Someone else will."
    marketing_angle: "An autistic adult-grief literature gap, filled by an iyashikei lamp shop."
    genre_family: slice_of_life
    emotional_engine: competent_calm_specialist + reparenting
    audience: "Gen Z 23–29 autistic adults estranged or grieving a parent who could not regulate"

  - series_id: trauma_path_healing__en_US__archive_of_the_unsaid
    brand_id: trauma_path_healing
    locale: en_US
    persona_archetype: ML-bereaved
    daily_life_anchor: parasocial_creator
    portal_mechanic: song
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 30-year-old grief podcaster receives anonymous voicemails from people who never said the thing aloud; her show airs the voicemail and a single answering song — and each volume one anonymous caller is found, alive or remembered, and given back the thing they could not say."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Things Not Said"
    series_logline: "Margaux's grief podcast accepts one anonymous voicemail per week. Each week one song answers. Each volume one caller is found."
    series_description: "Margaux is thirty and runs a small grief-and-loss podcast out of a converted closet in Oakland. Her show has one segment: callers leave an anonymous 90-second voicemail with the thing they never said before their person died. Margaux does not respond. Instead her co-producer — a former music supervisor — finds one song that answers, and the song closes the episode. The show has 11,000 weekly listeners. In the season this volume covers, Margaux begins to receive answers back: a caller writes in, listened in the car, recognized themselves, and now wants to know if the song was right. Each volume Margaux meets one former caller and learns the thing not said, and the song that almost was. The cases vary — a son who could not say I forgive you, a mother who could not say I was wrong, a friend who could not say I loved you. The arc: Margaux has not left her own voicemail. Her producer is, gently, asking her to."
    opening_5_volume_arc:
      vol_1: "The son who could not say I forgive you. The song was Big Thief's 'Not.' He writes back. He is found. He tells Margaux the rest."
      vol_2: "The mother who could not say I was wrong. The song was Mitski's 'I Bet on Losing Dogs.' Margaux meets her at a diner."
      vol_3: "The friend who could not say I loved you. The friend is queer, the person was straight, the song was Phoebe Bridgers. The friend is fine, mostly, now."
      vol_4: "A caller who is found only in records — they died between the voicemail and Margaux's outreach. The song is sung at their funeral. The first time Margaux cries on air."
      vol_5: "Margaux's producer hands her the recording mic. Margaux does not leave the voicemail. The next episode airs without a voicemail. The download numbers double."
    comp_titles: ["S-Town (podcast)", "Frieren: Beyond Journey's End", "After Dark (Murakami)", "Days at the Morisaki Bookshop", "Before the Coffee Gets Cold"]
    reader_promise: "Every voicemail can be answered. Every song was almost the right song."
    marketing_angle: "S-Town meets Mitski, in manga, for a generation that learned to grieve through podcasts."
    genre_family: supernatural_everyday
    emotional_engine: vigil_for_the_lost + competent_calm_specialist
    audience: "Millennials 27–35 podcast-native grievers, music-literate"

  - series_id: trauma_path_healing__en_US__door_where_he_last_stood
    brand_id: trauma_path_healing
    locale: en_US
    persona_archetype: ML-bereaved
    daily_life_anchor: alt_spirituality
    portal_mechanic: door
    episodic_frame_per_volume: locale
