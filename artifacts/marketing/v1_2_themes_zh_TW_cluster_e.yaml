    series_description: "晨懷十五歲,高一,台北中正區某市立高中,九月加入校慶話劇社擔任候補。話劇社今年的主演是高三學姊嘉云,候補就是晨懷,主要工作是把所有台詞背起來、彩排時站旁邊、緊急時上場。十月某個禮拜五,晨懷在後台道具箱底翻到一本看起來有點舊的小日記本——上一任候補、現在已經畢業的學姊留下來的。日記從去年九月寫到今年五月,每一頁是學姊對當時主演的觀察:今天主演吃午餐的時候手在抖、今天主演跟導演吵架、今天主演哭了。可是晨懷翻到日記後半段(十一月之後),裡面的內容居然是還沒發生的事——『十一月五號禮拜二嘉云會在彩排哭』、『十二月三號禮拜三嘉云會吐』、『二月十四號禮拜五嘉云會撐不下去缺席校慶』。每一集會驗證一頁。每一集晨懷得決定:她要照著去做(去阻止)、還是讓事情自然發生、還是讓自己變成那位主演。長期主線是日記的最後一頁:『候補可能會變正取。她需要決定她是誰。』Komi-san 細節、那些年校園感、藥師少女般的安靜推理。"
