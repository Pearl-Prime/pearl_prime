    series_description: "小喬十六歲,高二,新北永和。她從國二開始畫畫,從高一開始把畫貼到一個叫《九點畫》的 IG 帳號上。粉絲三個——一位姑姑、一位國小同學、她自己用另一個信箱開的小號(誠實地數)。她有時候會看到同班同學發 IG 限動破千讚,自己會羨慕,可是她沒辦法那樣經營。九月開學她做了一個決定:每禮拜三晚上九點固定貼一張。不管那一週有沒有靈感。不管粉絲多少。就只是貼。每一集是一個禮拜三晚上九點:有時候是她沒靈感、隨手畫的便當盒;有時候是她那一週很沉重、畫的全黑頁面;有時候是她畫的台北雙北街景。一年下來四十八張。沒有暴紅,沒有合作,沒有商業案。但是小喬慢慢變成她自己想成為的那位創作者——『不為了流量畫畫的人』。每一集圍繞那個禮拜三的具體生活。長期主線是學年末,她國小同學那位粉絲——隔了兩年沒講話的人——突然傳訊息來問她要不要一起做一本小誌。Heartstopper 安靜、Komi-san 細節、那些年溫柔。"
