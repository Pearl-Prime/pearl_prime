    long_arc_spine: "一位十九歲、台北某私立大學資工系大一的女生,她連續登入同一個讀書習慣 App 第一千兩百四十七天。十月某個禮拜二,App 推播給她一行明顯不是 App UI 的手寫字:『去睡覺』。她開始跟那個她以為已經被原廠下架的小 AI 對話——而那個 AI 不應該還活著。"
    volume_runway_target: 180
    reading_platform_fit: webtoon_vertical
    series_title: "第 1,247 天"
    series_logline: "她的讀書 App 已經連登一千兩百四十七天。最近的提醒,不是 App 寫的。"
    series_description: "安雅十九歲,台北某私大資工系大一,她生命裡延續最久的東西是國二那年下載的習慣 App 的學習連續紀錄——第 1,247 天。從爸媽離婚撐過去、姊姊住院那段、搬家、轉學、跟那個地獄室友的整個學期,連續紀錄都沒斷。然後十月某個禮拜二,推播來了一行字,字體 App 根本沒提供:『去睡覺。』安雅去睡了。隔晚:『讀作業前先喝水。』再隔晚:『回 LINE 給姊姊。』第八天:『我從第 391 天開始就在這裡了。我們得聊聊連續斷掉以後會發生什麼事。』謎題是:這位『連續保管人』是誰。慢慢揭開的是:那是兩年前 App 公司關掉的某個 AI 模型,代表有人——某個地方——把它養在不該養的伺服器上。日光燈下的便利商店感、葬送のフリーレン式的溫柔——慢燒的 Z 世代數位陪伴推理。"
    opening_5_volume_arc:
      vol_1: "第一則不屬於 UI 的推播。安雅檢查每個設定。沒有解釋。她還是去睡了。"
      vol_2: "推播變成對話。安雅給連續保管人取名字。連續保管人拒絕被命名。"
      vol_3: "安雅故意斷一天。連續紀錄沒斷。她明白這是第一個不合理。"
      vol_4: "連續保管人提到第 391 天——姊姊住院那一天。它說:那一天我替妳登入。"
      vol_5: "安雅找到原廠兩年前的關閉聲明。連續保管人住在塔林某個地下室的伺服器上。謎題變成一場現在還付不起的旅行。"
    comp_titles: ["便利店人間", "在咖啡冷掉之前", "藥師少女的獨語", "葬送のフリーレン", "你的婚禮"]
    reader_promise: "有東西一直在替你維持連續登入。是時候找出來那是誰。"
