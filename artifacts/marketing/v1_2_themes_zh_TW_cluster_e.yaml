    long_arc_spine: "一位高一、十五歲的女生,在新北中和某高中的三樓電腦教室,每週二、四放學後從三點四十五到五點半開直播。她國二自己寫的那個直播 overlay,從十一月起開始用一個淡淡的小圓圈悄悄標記出聊天室裡『快要倦怠崩潰』的那一位觀眾——她把直播提早結束十分鐘,一個一個私訊去問。"
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "覆蓋層看得見"
    series_logline: "一位高一女生在學校電腦教室開直播,她自己寫的 overlay 標出聊天室裡那位『今晚快撐不住』的朋友。"
    series_description: "葦倫今年十五歲,新北中和某公立高中高一資訊社,星期二、四放學在三樓電腦教室開那個叫《變奏直播》的頻道。電腦教室有舊鍵盤的味道。版主是另外兩個社團的同學,加一個午餐分到別班的學妹。觀眾固定是新北三所高中加起來八十個人。怪事是十一月開始的:她國二寫好、自己慢慢加功能的那個 overlay——會顯示聊天密度、氣氛、觀眾情緒——突然開始在某幾位 ID 旁邊浮出一個淡淡的圓圈,意思是『快要倦怠崩潰』。葦倫除錯三次,結論都一樣:每一次都對,她沒辦法把那個圈關掉。她乾脆改規則:被點到的人,她直播就提早十分鐘結束,然後私訊問:今天數學考怎樣、妹妹好嗎、有沒有吃東西。每一集會點到一位不同的同學,每一集是一次小小的接住。長期主線是某天 overlay 開始在『葦倫』自己這個 ID 旁邊浮出那個圓圈,而版主比她自己更早看到。我的英雄學院的真誠、Heartstopper 的暖、Komi-san 的社團細節——Gen Alpha 把學校電腦教室當共同客廳的時代。"
    opening_5_volume_arc:
      vol_1: "第一個被點的是高二的修齊,連續四天沒睡。葦倫提早收播。兩個人走到福利社旁邊的公車站。"
      vol_2: "第二個是國三謊報年齡進來的妹妹。葦倫學到當版主最難的一課——有時候對的接住是去找對的大人。"
      vol_3: "第三個是葦倫最信任的版主自己,一直在硬撐。版主團的關係慢慢轉,沒有大爆發,就是一起吃午餐。"
      vol_4: "Overlay 同時點到兩個人。葦倫要選。她選了比較安靜的那位,另一位後來也沒事。她學會分流。"
      vol_5: "Overlay 點到葦倫自己。版主在她之前看到。這禮拜換版主提早十分鐘把直播結束。"
