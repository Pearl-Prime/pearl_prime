    series_description: "雨晴十六歲,高二,雙北某公立高中,半出櫃(媽媽知道,爸爸不知道,班上一半人模糊地知道)。九月開學第三週,她做了一本 A5 大小、手繪封面的酷兒小誌——裡面是她自己畫的台灣 LGBTQ 友善咖啡廳清單、她推薦的酷兒漫畫、她自己寫的一篇『我是怎麼跟自己出櫃的』。她沒辦法直接發送給任何人,於是她把小誌放在學校圖書館她常坐的那張桌子上——第三層書架旁、靠窗那張——上面用便條紙寫:『翻一翻沒關係。如果你願意,留一句話。』第二個禮拜,有人翻過了,但沒留話。第四個禮拜第一句話出現:『謝謝。』然後第六個禮拜第二句:『我也是。』第十週第三句:『我還沒準備好,但謝謝你準備好。』一個學期下來八句。雨晴從來沒在現場看到誰寫的,但她每天會翻來看看。每一集是一句話、一個身份故事。長期主線是學期末,圖書館主任注意到了這本小誌,把雨晴叫過去——不是要處理,而是想問她要不要做更多本。Heartstopper 溫柔、Komi-san 細節、台灣高中圖書館具體。"
