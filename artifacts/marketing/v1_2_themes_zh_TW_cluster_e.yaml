    series_description: "依奈十六歲,高二,在中和某高中的 IT 服務台一週打工十二小時——全校唯一一位學生員工。她重灌 Chromebook、重設密碼,午餐就在服務台窗口吃優格。十月某個禮拜三,一位高一妹妹拿 Chromebook 來說:『第三節在 304 教室上網超慢。』依奈跑速度測試,那個學生的速度只有依奈自己的八分之一。依奈往下挖:第三節 304 整班都被壓速,旁邊 305 沒有。她翻 QoS 設定:全校的 Wi-Fi 在套一個叫『輔助』的服務分級——根據一張二零一七年的清寒午餐補助 ID 清單,從來沒人更新過。系統認為這些孩子『需要的網速比較少』。每一集是一位學生。每一集是一次安靜地把名單翻新。長期主線是 IT 主任發現了、教育局發現了,而依奈得學:做這件事,不要把自己變成新聞稿裡的主角。SPY×FAMILY 安靜的能幹,Komi-san 的具體,Gen Alpha 的公民科技校園劇。"
    opening_5_volume_arc:
      vol_1: "第一個被壓速的孩子。依奈跑稽核。二零一七年的清單。她盯著那張清單看了一個小時。"
