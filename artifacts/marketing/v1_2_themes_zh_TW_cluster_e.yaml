    series_description: "晴禾二十歲,公館某國立大學資工系大二,北上念書,租在公館巷子裡的雅房。她大一上學期某個禮拜天凌晨一點,因為作業寫不完,在 Discord 開了一個叫《作業第四考》的群組——意思是『第一回考完之後的、第四次重來的那個版本』。十個人進來,八個沒退出。從那之後,每個禮拜天凌晨一點到五點,她固定上線。沒人強迫誰來,但十個人裡每週至少有六個會上。沒有大事發生。有人寫程式,有人趕報告,有人只是把麥克風開著吃宵夜。四年下來,《作業第四考》撐過了大一的轉系危機、大二的家裡出狀況、大三的實習選擇、大四的最後一份畢業專題。沒有戲劇,就是一個 Gen Z 共學節奏。每一集是一個禮拜天凌晨。長期主線是這個群組要怎麼活到畢業之後——大家進職場了,凌晨一點還上得了嗎。SPY×FAMILY 的安靜溫暖、那些年的台灣大學感。"
