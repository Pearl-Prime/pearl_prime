    series_description: "婉柔十四歲,國二,住台北大稻埕的老公寓四樓。她外婆三年前過世,留給她一塊小小的、有點泛黃的玉珮。媽媽說那是外婆十六歲那年她自己外婆給的——『傳了三代了,你別弄丟。』婉柔從國一開始戴,藏在制服裡。國二第一次段考後,她在自己房間裡盯著鏡子,正想對著鏡子說『妳真的很爛耶』——這句話她從國小六年級開始固定對自己說——玉珮在她的鎖骨那邊微微溫了一下。剛剛好夠她停下來。從那天開始她開始留意:每次她要進入那個自我罵的迴圈,玉珮就會熱一下。每一集是一個她要對自己『不夠好』的瞬間——段考成績、跟好朋友吵架、被媽媽嫌頭髮亂、暗戀的男生其實在跟另一個女生講話。玉珮每次都熱一下。她漸漸學會自己接話:『外婆現在會跟我說什麼?』長期主線是她外婆十六歲、二十歲、四十歲分別把這塊玉珮交給下一代之前,她們各自跟它說過的事——透過媽媽、阿姨、舅婆,婉柔慢慢拼出來。葬送のフリーレン的溫柔、海街diary 的家族感、大稻埕的具體場域。"
