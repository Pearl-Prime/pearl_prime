      vol_3: "服務台另一位學長問她最近怎麼這麼安靜。依奈告訴他。他來幫忙。腳本變成兩個人的工作。"
      vol_4: "IT 主任自己跑稽核。看到輪替。他來問依奈。依奈說實話。"
      vol_5: "IT 主任重寫政策。他沒提依奈。依奈鬆了一口氣。工作就是工作。"
