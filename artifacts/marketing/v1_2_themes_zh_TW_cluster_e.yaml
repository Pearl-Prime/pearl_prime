    series_logline: "國二的莎潔寫的置物櫃 App,每天三點十五傳給她一個葉子顏色。葉子從來沒錯過。她開始一個一個分享。"
    series_description: "莎潔十四歲,永和某公立國中國二、寫程式社第二年。她媽媽家長會委員,叫她幫整個國中三百八十個置物櫃寫一個 App。莎潔做出來了,已經上線兩個月。原本是用來提醒同學書本輪替的。可是這兩個月來,這個 App 開始不請自來地,在每天下午三點十五分傳給她一個 emoji:一片綠葉、一片黃葉、一片紅葉、一片黑葉。葉子是她那一天。葉子永遠對。第六週,她兩位最要好的朋友也開始在三點十五收到自己的葉子。學期末,十二位國二生在一個叫『LEAF』的私群組裡,彼此翻譯這葉子。校長聽說了,想拿到區裡示範。莎潔得決定:這葉子是她的、是社團的,還是它一直就屬於那個拿著它的孩子。SPY×FAMILY 的真誠,Komi-san 的安靜,Gen Alpha 寫程式社的細節。"
    opening_5_volume_arc:
      vol_1: "第一片紅葉。莎潔翹了補習班。媽媽問為什麼。莎潔把葉子給她看。"
      vol_2: "莎潔把葉子分享給最好的朋友美樂。美樂的葉子永遠是黃的。她們一起搞清楚『黃』到底是什麼意思。"
      vol_3: "第三個朋友加入。第一片黑葉——爸爸搬出去那位同學。莎潔學到:這 App 對顏色會錯,但對『重量』從來沒錯。"
      vol_4: "LEAF 群組成立。八個人。每週都有一個在崩潰邊緣。群組變成早期預警系統。"
      vol_5: "校長的 email。區裡要示範。莎潔跟美樂只回了一行:這片葉子,屬於今天捧著它的那個孩子。"
