    serial_engine: life_stage_rhythm
    long_arc_spine: "他人同士の二人が、一年間限定のシェアハウスに住み始める。月ごとに小さな儀式を発明していき、半年経った頃には、名前のない三十六項目の関係性ができあがっている。賃貸の終わりに、それを何と呼ぶかを決めなければならない。"
    volume_runway_target: 100
    reading_platform_fit: webtoon_vertical
    series_title: "一年の同居"
    series_logline: "他人同士の二人。一つの賃貸。十二か月の小さな儀式。六か月目には、それに名前が必要になる。"
    series_description: "結衣は二十四歳、四年付き合った恋人と別れたばかり。広夢は二十六歳、大学院を出たばかりで仕事を探している。二人とも、すぐに部屋が必要だった。SUUMO の一年限定転貸は、武蔵小杉駅から徒歩八分、二階建ての二部屋、共用キッチン。二か月目には、二人は水曜夜のパスタのプロトコルを発明している。日曜の静かな時間も。トイレットペーパーは結局どちらが買うのかという暗黙のルールも。四か月目には、同じソファから互いにメッセージを送り合っている。六か月目、二人とも誰とも付き合っていないし、互いとも付き合っていない——三十六の小さな儀式は、関係性に見えるし、友情に感じられるし、日本語に名前がない。各巻、一か月。シリーズは十二巻。長期の弧は、賃貸が終わるときにそれを何と呼ぶか。スロービルドのロマンス。名前を決めるまで、ベッドの場面はない。ホリミヤのぬくもりに、大人の家賃を載せたら。"
    opening_5_volume_arc:
      vol_1: "四月。賃貸契約。最初の水曜夜のパスタ。広夢は玉ねぎが食べられない。結衣は火曜にそれを知る。"
      vol_2: "五月。最初の口論——大家への連絡は誰の番か。日曜の静かな時間が発明される。"
      vol_3: "六月。結衣の元恋人から連絡。広夢はその水曜、一人でパスタを作る。結衣はそれでも帰ってくる。"
      vol_4: "七月。広夢の母が来訪。『付き合っているの?』と聞く。二人とも答えない。母は二人とも朝食に連れていく。"
      vol_5: "八月。本棚を一緒に組み立てる。二人の本が並ぶ。棚には、二人の関係性のカテゴリがない。"
    comp_titles: ["ホリミヤ", "君に届け", "ハチミツとクローバー", "海街diary", "違国日記"]
