  - series_id: relational_calm_iyashikei__ja_JP__juusan_sai_no_chat
    brand_id: relational_calm_iyashikei
    locale: ja_JP
    persona_archetype: ML-mid
    daily_life_anchor: parasocial_creator
    portal_mechanic: letter
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "三十三歳の図書館司書が実家の片付けで、中学校時代の前略プロフのログを母が印刷して保管していた箱を見つける。今の四人のグループチャットで読み返してみると、十三歳の自分たちが書き返してくる。"
    volume_runway_target: 125
    reading_platform_fit: manga_traditional
    series_title: "十三歳のチャット"
    series_logline: "杏里は中学のチャットログを実家で見つけた。今の友人四人で読み返したら、十三歳の自分たちが返事を書いてきた。"
    series_description: "杏里は三十三歳、横浜の市立図書館で働く司書。両親の家を片付けていて、母が二〇〇六年に印刷して保管していた前略プロフの全ログが入った段ボール箱を見つける。杏里はスキャンして、いまも続いている同じ四人のグループチャットに送る。四人で読み上げ、安いワインを飲む。それから不思議なことが起きる——印刷された一行に対して誰かが今のチャットで一文返信すると、次に開いた時には、その十三歳の本人から返事が書かれている。各巻は、一人の友人が自分の十三歳に向き合う回——四人それぞれの、十三歳のときにほどけなかった結び目。長期の弧は、十九歳で亡くなった五人目の友人——彼女の前略プロフのログも箱に入っていた——のこと。チャットは、彼女にも返事を許すのか。とても具体的なミレニアル世代の温度。"
    opening_5_volume_arc:
      vol_1: "響のログ。十三歳の響は吃音でいじめられていた。三十三歳の響は、当時の自分に必要だった一文を書く。"
      vol_2: "あいかのログ。十三歳のあいかは、いじめる側だった。三十三歳のあいかは謝る。十三歳のあいかは一週間返事を返さない。"
      vol_3: "杏里自身のログ。十三歳の杏里はクィアだったが言葉を知らなかった。三十三歳の杏里がその言葉を教える。"
      vol_4: "悠太のログ。十三歳の悠太はシェフになりたかった。三十三歳の悠太は税理士。二人は交渉する。"
      vol_5: "亡くなった友人のログが箱から出てくる。チャットは二日間止まる。響が最初の一文を打つ。返事は一週間かかって来る。"
    comp_titles: ["コーヒーが冷めないうちに", "君に届け", "ハチミツとクローバー", "海街diary", "ホリミヤ"]
    reader_promise: "あなたの十三歳の自分はまだチャットにいて、聞きたいことが一つ残っている。"
    marketing_angle: "コーヒーが冷めないうちに、を、二〇〇六年の前略プロフを保管していたミレニアル世代のグループチャットに置いたら。"
