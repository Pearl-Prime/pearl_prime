  - series_id: relational_calm_iyashikei__ja_JP__kagi_no_kakaranai_apaato
    brand_id: relational_calm_iyashikei
    locale: ja_JP
    persona_archetype: GZ-queer
    daily_life_anchor: queer_identity
    portal_mechanic: door
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "二十六歳の美術館アシスタントは、平日の夜七時から十一時まで自分のアパートの鍵を開けっぱなしにしている。三年前に決めた、選びとった家族のための約束。やがて部屋自体が、訪れた人の名前と気配を静かに覚え、誰を迎え入れるかを少しずつ選ぶようになる。"
    volume_runway_target: 200
    reading_platform_fit: manga_traditional
    series_title: "鍵のかからないアパート"
    series_logline: "そらは毎晩四時間、選びとった家族のために鍵を開けっぱなしにしている。部屋は、その中の誰を愛しているか、ちゃんと数えはじめている。"
    series_description: "そらは二十六歳、クィアで、京都の小さな美術館で働いている。二十一の年に実家との連絡が途絶えてから、大学で選びとった小さな仲間たちと、ひとつの約束をした——平日の夜七時から十一時まで、自分のアパートの鍵は開けっぱなし。誰でも来ていい。三年目に入って、部屋はもう常連を覚えている。ラジエーターはテオのアレルギーのときだけ控えめに鳴る。キッチンの灯りは、マリソルが嫌な勤務の帰りに入ってきた夜だけ柔らかく落ちる。ジュールの父が東京に出てきた週は、ソファのクッションが一つ増える。そらは抗わない。部屋の文法は、そらの神経系の文法と同じだ——誰を近くに置けるか、どの距離が安全か、玄関で身体は何を許せるか。各巻、新しい人が玄関に立つ——疎遠だった姉、元恋人の新しいパートナー、葬式以来会っていない従兄弟。部屋は、ゆっくりと丁寧に、どんな歓迎を抱えられるかを決めていく。フリーレンのような節度。SPY×FAMILY のあたたかさ。神経系の本を全部読んだ部屋。"
    opening_5_volume_arc:
      vol_1: "テオのアレルギーの夜。マリソルの最悪のシフト明け。部屋が自分で回りはじめた最初の週。そらはそれを『この部屋』と呼ぶ。"
      vol_2: "ジュールの父が東京に来ている。ソファのクッションが一つ増える。愛している人が自分の家族を喪う場所を、部屋が用意してくれることを、そらは知る。"
      vol_3: "初めての見知らぬ人。友人の友人が危機にある。玄関の扉は、いつもより九十秒ゆっくり開く。『安全』を決めるのは自分ではなく部屋だと、そらは学ぶ。"
      vol_4: "元恋人の新しいパートナーが入りたいと言う。扉は開かない。そらは内側の床に座り込み、元恋人にひと言だけ優しいメッセージを送る。"
      vol_5: "疎遠の妹が玄関に立つ。ラジエーターは鳴らない。部屋に新しい人を覚えさせるのか、それとも部屋の判断を信じるのか——そらが決めなければならない夜。"
    comp_titles: ["SPY×FAMILY", "ホリミヤ", "違国日記", "海街diary", "コーヒーが冷めないうちに"]
    reader_promise: "あなたの選びとった家族には行き先があって、その部屋はあなたの味方をする。"
    marketing_angle: "ホリミヤの関係性の機微を、選びとった家族を覚えていくアパートに置いたら。"
    genre_family: healing
    emotional_engine: chosen_family + boundaried_belonging
    audience: "都市部のZ世代二十代後半、クィアで選びとった家族をホストする層"

  - series_id: relational_calm_iyashikei__ja_JP__nichiyou_shichiji_no_kitchen
    brand_id: relational_calm_iyashikei
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: content_creation
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: life_stage_rhythm
    long_arc_spine: "二十五歳のブランドデザイナーは、四年前から毎週日曜の夜七時、同じ五人で自宅の台所に集まる。テーブルの真ん中に置かれた緑の手帳には、その日その人が言われる必要のある一文が、誰のものでもない筆跡で先に書かれている。"
    volume_runway_target: 175
    reading_platform_fit: manga_traditional
    series_title: "日曜七時のキッチン"
    series_logline: "五人の友達。一つのキッチン。それぞれが今日言われに来た一文を、ちゃんと知っている手帳。"
    series_description: "蓮は二十五歳、墨田区の小さなアパートに住む下級ブランドデザイナー。五人組のなかでいちばん広いキッチンを持っているという理由で、日曜の夜七時は蓮の家。レナ、めぐ、テオ、サニー、蓮。同じ持ち回りメニュー、同じいちばん安い飲める白ワイン、そしてテーブルの真ん中の小さな緑の手帳——蓮の祖母が亡くなる前に渡したもの。手帳はテーブルに置かれたまま。誰でも開ける。不思議なのは、その夜その人が言われる必要のある一文が、夕食前にもう書かれていること。誰の筆跡でもない。五人は、それを話題にしないことを覚えた。正しいタイミングで、書かれているものを読むことを覚えた。各巻、別の一文が別の友人に宛てて書かれる。長期の弧は、新しい人がテーブルに連れてこられた日曜と、その人にも手帳が一文を書いた回。SPY×FAMILY のような温度。ホリミヤの解像度。静かに祝福された日曜。"
    opening_5_volume_arc:
      vol_1: "レナの昇進、断った話。手帳は『火曜には気が変わってもいい』と書く。レナは水曜に変える。"
      vol_2: "めぐの母が病気。手帳は『テオに話せ』と書く。テオの父も同じ診断だった。"
      vol_3: "テオが新しい恋人を連れてくる。手帳はその恋人にも一文を書く。蓮は四巻まで見せない。"
      vol_4: "恋人がついに自分の一文を読む。残る決意をする。手帳の宛先は六人になる。"
      vol_5: "サニーがベルリンに移る。手帳は最後の一文を書く。椅子はそのまま残される。手帳はサニーへの一文を、向こうの時間で書き続ける。"
    comp_titles: ["SPY×FAMILY", "ホリミヤ", "コーヒーが冷めないうちに", "森崎書店の日々", "ツバキ文具店"]
    reader_promise: "あなたの毎週の集まりには、それぞれが今日言われに来た一文を覚えている記録がある。"
    marketing_angle: "SPY×FAMILY の家族の温度を、墨田区の日曜七時のキッチンに置いたら。"
    genre_family: slice_of_life
    emotional_engine: chosen_family + ritual_as_belonging
    audience: "Z世代二十代半ば、初職都市生活で週末の集まりが週を支える層"

  - series_id: relational_calm_iyashikei__ja_JP__toshokan_no_wasuremono
    brand_id: relational_calm_iyashikei
    locale: ja_JP
    persona_archetype: GZ-uni
    daily_life_anchor: retail_service
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "二十二歳の社会不安を抱える大学生は、区立図書館の遺失物カウンターでアルバイトをしている。落とし物はどれも、その持ち主が手放してしまった友情の残り香で、物を返すと友情も少しずつ、ぎこちなく、決して予定通りではなく戻りはじめる。"
    volume_runway_target: 175
    reading_platform_fit: manga_traditional
    series_title: "図書館の忘れもの"
    series_logline: "いずみは図書館の遺失物カウンター係。落とし物はどれも、置きっぱなしになった友情の領収書だった。"
    series_description: "いずみは二十二歳、文学部の三年生。世田谷区の区立図書館で週二十時間、カウンター裏の小さな蛍光灯の部屋にある遺失物コーナーを担当している。社会不安は教科書通りの形で——『身分証はお持ちですか』というひと言を、いずみは二千回練習した。各巻、いずみは一つの物を一人の客に返す。物はいつも、その客が手放してしまった友情の残り香だ。高校時代の親友のミックステープ。元同居人の植物。林間学校のお守りのミサンガ。いずみは説教しない。物を返す。客がその友人に連絡するか、しないかを、ただ見守る。連絡されるものもある。されないものもある。長期の弧は、いずみ自身の遺失物——高校時代の親友からもらった、サインの入った絵——がカウンターに届いた日、何をするか。静かで、不安で、優しい。ホリミヤを、いちばん仲が良かった友達のためにやり直したら。"
    opening_5_volume_arc:
      vol_1: "ミックステープ。客は今三十歳。彼女は友人に連絡しない。コインパーキングで一度だけ聴く。"
      vol_2: "同居人の植物。二人は三年口をきいていない。植物は枯れかけている。いずみは正しい水やりの間隔を見つける。"
      vol_3: "林間のミサンガ。友人はもう亡くなっている。客はそれを知らない。いずみは黙っていることで伝える。"
      vol_4: "いずみ自身のスケッチがカウンターに届く。いずみはまだ申請伝票の名前を見ない。"
      vol_5: "いずみが伝票を読む。元親友に電話する。『久しぶり』と言う。挿話はその一言の途中で終わる。図書館の閉館時刻。"
    comp_titles: ["森崎書店の日々", "ツバキ文具店", "ホリミヤ", "薬屋のひとりごと", "コーヒーが冷めないうちに"]
    reader_promise: "手放してしまった友情は、遺失物コーナーに領収書を残している。"
    marketing_angle: "ツバキ文具店を、社会不安を抱えた二十二歳の図書館カウンターでやり直したら。"
    genre_family: healing
    emotional_engine: rekindled_intimacy + competent_calm_specialist
    audience: "Z世代二十代前半の社会不安を抱える大学生、特定の一つの失われた友情を抱える層"

