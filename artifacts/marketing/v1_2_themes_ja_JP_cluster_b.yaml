    series_description: "渚は二十八歳、二十六歳でADHDの診断を受けた元プログラマー。退職後、商店街の元珈琲店の二階を借りて、ADHDの当事者向けの小さな塾を開いた。月謝は一回二千円。集まるのは小学校高学年から大学生まで六人ほど。塾には机が六つあり、中央には木製の砂時計が一つ。砂は二十分で落ちきる。授業はない。生徒は塾に来ると、まず『二十分で何をするか』を渚に向かって声に出して言う——『単語五十個書く』『プログラミングの章を一節読む』『将来の不安について三行書く』。渚は頷く。砂時計を反転する。二十分後、各生徒は『何ができたか』を口頭で報告する。できなかった日は、できなかったと言うだけでいい。渚は判定しない。各巻、別の生徒の物語が進む——RSDで宿題が手につかない中学生、過集中で逆に消耗する大学生、ワーキングメモリの不足で会議が辛い社会人。長期の伏線——砂時計は渚の祖父が彼女のために手作りした遺品で、祖父自身もADHD当事者だった。渚は祖父の遺した手紙を、毎週一通ずつ読んでいる。"
