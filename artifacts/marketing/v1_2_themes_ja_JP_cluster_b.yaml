    series_description: "なぎさは中学三年生、進路をまだ決められない。学校の進路指導は『将来の夢』と『偏差値』の二択を強要する。彼女の祖父は商店街の隅で和菓子屋を営んでいて、ある日彼女に言う——『学校で進路を決めるのは、菓子屋でラーメンを注文するようなものだ。商店街を歩いてこい』。なぎさは祖父の言葉を真に受けて、放課後の一年間、商店街の十二人の店主・職人を訪ねて回る。一人につき三回——一回目は自己紹介、二回目はその人の仕事の喜び、三回目はその人の仕事の辛さ。各巻、別の店主の人生哲学とその仕事のリアリズムが描かれる。魚屋の早朝、書店主の月末の不安、和菓子屋の季節感、コインランドリーの夜更けの客、税理士の二月、町工場の継承問題、美容師の指の疲労、地域カフェの収支、保育士の倫理、農家の自然との交渉、葬儀社の慎み、消防士の覚悟。長期の伏線——なぎさ自身がどの仕事を選ぶか、いや、彼女は十二人と出会った後、もう一年同じことを続けたくなる。Gen Alpha向け、進路選択の物語。"
