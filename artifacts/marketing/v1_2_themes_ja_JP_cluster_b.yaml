    series_description: "彩は二十六歳、本業はメーカー総務、副業はビジネス書のリサーチアシスタント。彼女は副業を二十二歳から続けていて、燃え尽きと再開のリズムを五年分蓄積している。三年前から、彼女は月に一度、平日の夜、東京の駅前の貸会議室を借りて『副業会』を主宰している。参加費は五百円。集まるのは八人前後の副業者——フリーランス志望、副業歴半年、副業歴五年、副業を一度諦めた、これから始める。会の作法は二つだけ——『今月、副業で何を試したか』『来月、副業で何を試すか』を、各自十分ずつで話す。アドバイスは禁止。質問は事実確認のみ。彩はファシリテーター役、自分も同じ作法で報告する。各巻、別の参加者の物語が進む。長期の伏線——彩は副業を本業にする日が来るのか、来ないことを選ぶのか。副業会の参加者は、長く続けるほどに、副業から得たいものが『お金』から『別の場所での自分』に変わっていく。"
