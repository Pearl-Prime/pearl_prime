    serial_engine: case_of_the_week
    long_arc_spine: "三十一歳でコンサル会社を辞めた女性が、二十四時間営業の印刷店で深夜シフトに入る。客が印刷を頼む書類の余白には、その人が何度も繰り返している思考のループが、彼女にだけ薄く印字されている。彼女は同じ用紙で、ループを一度閉じる一枚を黙って添える。"
    volume_runway_target: 180
    reading_platform_fit: manga_traditional
    series_title: "深夜のコピー機"
    series_logline: "三十一歳でコンサルを辞めた華は、駅前の二十四時間印刷店で深夜シフトに入っている。客の書類に薄く印字された思考ループを読み、もう一枚、静かに添える。"
    series_description: "華は三十歳で部長補佐の名刺を持ち、会議中に貧乏ゆすりをしすぎて足を疲労骨折した。辞表を出して実家の二階に戻り、駅前の二十四時間営業のコピー店で深夜シフトに入った。最初の客は博士論文を十一回目に再アップロードする院生で、彼女のファイルの背景に、華にだけ薄く印字されている——『もう一回。もう一回。もう一回』。華は頼まれた通りに印刷する。それから、自分の用紙にA4一枚——臨床的な装飾を抜いた、友人が書いたような短い認知再構成のメモを刷り、袋の底に滑り込ませる。院生は家に帰り、ループは閉じる。夜ごとに新しい客と新しいループ。四十回目のピッチデックを持ってきた起業家。娘の弔辞の改稿七稿を抱えた父親。送らない皮肉な返信メールを十二回印刷する女子。華は思考ループを正確に読まないと二枚目を選べない。長期の伏線——華に読み方を教えたのは誰で、彼女自身の仕事に潜むまだ読めないループはどれか。蛍光灯と紙とトナーの匂いの静かな話。"
    opening_5_volume_arc:
      vol_1: "博士課程の女性。論文十一回目。最初の二枚目。ループが閉じる。"
      vol_2: "四十回目のピッチデックを抱える起業家。サンクコストについての一枚。違う人になって店を出る。"
      vol_3: "弔辞改稿の父親。華は二枚目を選べない。三度試して、三枚目で届く。"
      vol_4: "前職の同僚が客として現れる。蛍光灯の下、華に気づかない。華は二枚目を渡さない。なぜかを夜通し考える。"
      vol_5: "店そのもののループが、レシートの隅に薄く印字されていることに華は初めて気づく。店長が黙って合鍵を差し出す。"
    comp_titles: ["薬屋のひとりごと", "コンビニ人間", "深夜食堂", "森崎書店の日々", "ハチミツとクローバー"]
    reader_promise: "あなたの思考ループには、A4一枚で閉じる方法があって、それを選んでくれる店員がいる。"
    marketing_angle: "『薬屋のひとりごと』の処方の確かさを、二十四時間印刷店の蛍光灯の下で発揮させたら。"
    genre_family: healing
