      vol_1: "祖父の和菓子屋。一回目の訪問。なぎさは『なぜ和菓子屋になったの』と聞く。祖父は『なぜなぎさは学校に行くの』と聞き返す。"
      vol_2: "魚屋の早朝。なぎさは午前四時に起きて、市場について行く。"
      vol_3: "書店主。月末の請求書とおすすめの一冊を、なぎさは同じ口で語る本屋の話を聞く。"
      vol_4: "町工場の継承問題。三代目の女性経営者。なぎさは初めて、自分が何かを継ぐ可能性について考える。"
      vol_5: "保育士。なぎさは保育士の倫理——子どもが嫌いになった日、どうするか——を聞く。彼女は答えに半年かかる。"
