    series_title: "社内恋愛ではありません"
    series_logline: "同じ部署の同期、男女二人。彼らは付き合っていない。約束しているのは『どちらかがここを辞めるまで、二人で潰れないでいる』ことだけ。"
    series_description: "和馬と里香は二十七歳、入社五年目、同じ営業二課。配属当初から仲がいいが、付き合ったことはないし、付き合う気もない。部署は完全な燃え尽きラインで、上司の暴言、過剰な営業ノルマ、終電帰宅が常態化している。入社三年目の夜、二人は飲み屋で約束した——『どちらかが本気で潰れそうになったら、もう一人が先に辞めて、その人を引っ張り出す』。これは恋愛ではない。共助の契約。二人は週に一度だけ昼休みに合流し、お互いの『今週の限界度』を一行で報告する——『七割』『八割五分』『今週は四割、楽だった』『十割。来週、辞表書く準備する』。各巻、二人の現場の物語と、約束の運用方法が描かれる。長期の伏線——どちらが先に辞めるのか、辞めた後、二人の関係はどう変わるのか、彼らは恋愛感情に転化するのか、しないのか。シリーズの大半は『しない』前提で、ロマンスではなく『関係性の革命』として描く。だが最後の数巻、可能性が静かに開かれる。"
    opening_5_volume_arc:
      vol_1: "約束の夜の回想。現在、五年目の春。和馬の今週は『七割五分』。里香は『六割』。お互い、もう少し持ちこたえる。"
      vol_2: "里香の上司からのセクハラ事案。彼女は和馬に報告する前に、人事に動く。約束の運用版が描かれる。"
      vol_3: "和馬の母親が倒れる。彼は介護のために辞めるか迷う。里香は『辞めていい。私の番じゃない』と言う。"
      vol_4: "里香の今週『十割』。和馬は約束を発動して、先に辞表を書く準備をする。"
      vol_5: "和馬の退職日。里香は送別会に来ない。代わりに、退社直後の和馬を駅前で待っている。二人は何も言わない。"
