  - series_id: cognitive_clarity__ja_JP__kioku_no_seiri_kan
    brand_id: cognitive_clarity
    locale: ja_JP
    persona_archetype: Mill-careerist
    daily_life_anchor: retail_service
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: mystery_box
    long_arc_spine: "三十二歳の元検索エンジン会社のPMが、亡き祖父の遺品整理を引き継いで『記憶の整理館』を継ぐ。客の頭の中で何度も再生される一つの記憶を聞き出し、それを文鎮ほどの小さな金属の塊に転写して棚に並べる。客の頭の中からその記憶が消えるわけではないが、強度が下がる。長期の謎——祖父が転写を断った一つの記憶が、地下室の引き出しに保管されている。"
    volume_runway_target: 200
    reading_platform_fit: manga_traditional
    series_title: "記憶の整理館"
    series_logline: "頭の中で何度も再生される一つの記憶を、文鎮にして棚に置く。整理館の主の三十二歳の女性は、祖父から店を継いだ。"
    series_description: "凜子は三十二歳。大手検索エンジン会社で六年プロダクト・マネージャーをして、年末年始に祖父の訃報で帰省した。葬式の三日後、町の弁護士から封筒を渡される——『記憶整理士の免状』。祖父は表向きは小さな金物屋の主だったが、裏では『記憶の整理館』を営んでいた。客は予約制で訪れ、頭の中で何度も再生される一つの記憶——後悔、別れの場面、言わなかった一言、見たくない自分の姿——を、凜子の聞き取りに従って言葉にする。凜子は聞き終わると、客の手の上に小さな金属の塊を置く。客はそれに記憶を映す。塊は文鎮ほどの重さになり、棚に並ぶ。客の頭の中から記憶が消えるわけではないが、再生される回数が劇的に減る。凜子は祖父の手帳と棚を見て、徐々に整理士の作法を学ぶ。長期の伏線——地下室に一つだけ、祖父が転写を最後まで断った客の記憶がある。誰の何の記憶か、なぜ祖父は断ったのか。"
    opening_5_volume_arc:
      vol_1: "最初の客。離婚から五年経つ五十代の男性。再生され続ける『あの夜の妻の表情』。凜子は最初の文鎮を作る。"
      vol_2: "二人目の客。受験で母にぶたれた瞬間を二十年再生している三十代女性。"
      vol_3: "凜子は自分の頭の中の一つの記憶——前職で部下を退職に追い込んだ日——に気づく。自分には作れないと祖父の手帳に書いてある。"
      vol_4: "客が文鎮を取り戻しに来る。整理館は返品も引き受ける。凜子はその意味をまだ知らない。"
