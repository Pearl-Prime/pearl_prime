    long_arc_spine: "三十四歳の元銀行員の女性が、退職金で小さな『離職の湖』を作る——湖というのは比喩で、実際は山あいの民宿を改装した二泊三日の『離職を整理する宿』。客は会社を辞めたばかりの人。スタッフは話を聞かない、ただ食事と布団と散歩道を用意する。"
