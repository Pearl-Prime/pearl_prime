    long_arc_spine: "二十七歳の同じ部署の男女二人が、互いに『この職場で潰れる前にどちらかが辞めること』を約束する。約束は契約のような関係で、二人は付き合っていない、付き合うつもりもない。各巻、二人が職場の困難をどう乗り切るか、どちらが先に辞めるか、その後の関係をどう保つかが描かれる。"
