    series_title: "離職の湖"
    series_logline: "三十四歳の凜は、退職金で長野の民宿を改装し、会社を辞めたばかりの人だけが泊まれる二泊三日の宿を始めた。"
    series_description: "凜は三十四歳、大手銀行を十二年勤めて、自分の心身の限界で退職した。退職金と祖母の遺してくれた長野の山あいの民宿を組み合わせて、『離職の湖』という二泊三日の宿を始めた。湖は比喩で、実際は山の中の小さな民宿。一回の宿泊三万円、ご飯と布団と散歩道つき。客は『会社を辞めて一ヶ月以内の人』に限定。凜とスタッフ二人は、客の話を聞かない。事情を尋ねない。チェックイン時に渡される一枚——『二泊三日、好きに過ごしてください。誰も話しかけません。三日目の朝、もし誰かと話したくなったら、玄関のベルを鳴らしてください』。客は朝食、夕食、温泉、山の散歩道、囲炉裏端、書庫を自由に使える。各巻、別の客の二泊三日が静かに描かれる——四十代でリストラされた男性、二十代で自己都合退職した女性、定年退職した六十代、就職して三ヶ月で辞めた新人。長期の伏線——凜自身、いつか客として、別の誰かの『湖』に泊まりに行く日が来るのか。"
    opening_5_volume_arc:
      vol_1: "湖の開業。最初の客は四十二歳のリストラ男性。三日目の朝、彼はベルを鳴らさない。静かに帰る。一週間後、礼状が届く。"
      vol_2: "二十六歳の女性。自己都合退職、理由は職場のハラスメント。彼女は二泊目の夜、布団の中で初めて泣いた。"
      vol_3: "六十五歳の定年退職者。彼は囲炉裏端で凜に『この湖は誰の発案か』と聞く。凜は祖母の名前を答える。"
      vol_4: "新人退職者——二十三歳の男性。三日目の朝、彼はベルを鳴らす。話したいことが、まだ言葉になっていない。凜は彼の隣に座って、湯を沸かす。"
      vol_5: "凜の元同期が客として来る。凜は驚かない。元同期も驚かない。二泊三日、二人は会話しない。"
