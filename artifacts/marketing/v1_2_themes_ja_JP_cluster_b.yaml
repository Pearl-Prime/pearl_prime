    audience: "二十代後半〜三十代前半の中間管理職、複数案件を同時並行で抱えるミレニアル知識労働者"

  - series_id: cognitive_clarity__ja_JP__shinrin_ofisu
    brand_id: cognitive_clarity
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: coworking
    portal_mechanic: location
    episodic_frame_per_volume: locale
    magical_register: supernatural_everyday
    serial_engine: location_anthology
    long_arc_spine: "三鷹の森にある古い洋館を改装したコワーキングは、利用者の集中力を一日二時間だけ預かってくれる。預ける条件は『今日その二時間で何を仕上げるか』を、館の中の樹に書きつけること。樹は約束を覚えていて、達成しなかった場合は静かに翌週まで集中を預からない。"
    volume_runway_target: 150
    reading_platform_fit: manga_traditional
    series_title: "森林オフィス"
    series_logline: "三鷹の森のコワーキングは、樹に約束した二時間だけ集中を貸してくれる。守れなかった人には、翌週、樹がそっと顔を背ける。"
    series_description: "雛は新卒一年目のフリーランス志望のWebライター、副業がそろそろ本業の収入を超えそうな段階。在宅では集中できず、ある日、三鷹の森にある『森林オフィス』を見つける。受付には誰もいない。古い洋館の中央に一本の大きなクスノキが伸びていて、机はその周囲にある。利用方法は壁の張り紙——『その日の二時間で仕上げることを、紙片に書いて樹に結ぶ。二時間、樹は雑念を預かる。終わったら、紙片を取り外す』。雛は最初は半信半疑だったが、二時間、本当に何も考えずに書けた。守れなかった次の週、樹はわずかに顔を背けたように見えた。森林オフィスには各巻、別のフリーランスや副業者が来る。漫画家の卵、税理士見習い、副業の翻訳者、独立準備中の会社員。各巻一人、樹との関係を結び直していく。長期の伏線——なぜ樹は約束を覚えているのか、館の元の主は誰だったのか。"
    opening_5_volume_arc:
      vol_1: "雛、最初の二時間。樹に結ぶ紙片。仕上がる。次の週、また通う。"
      vol_2: "漫画家の卵の青年。十回目の持ち込みで落ちた直後。樹は彼に三時間預けることを許す。例外。"
      vol_3: "雛が二時間で仕上げられず、翌週、樹は顔を背ける。雛は紙片の書き方を変える——『仕上げる』ではなく『書き始める』。"
      vol_4: "税理士見習いの女性。彼女の紙片には、確定申告ではなく『母に電話する』と書いてある。樹はそれも預かる。"
      vol_5: "雨の日。誰も来ない。雛は受付の引き出しに、館の元の主——三十年前の高名な児童文学作家の手紙を見つける。"
    comp_titles: ["森崎書店の日々", "葬送のフリーレン", "となりのトトロ", "蟲師", "コーヒーが冷めないうちに"]
    reader_promise: "二時間だけ、雑念を預けて集中を借りることができる場所がある。約束は樹が覚えている。"
    marketing_angle: "『蟲師』の自然との対話を、フリーランスのコワーキング・スペースに移植したら。"
