    audience: "三十代前半の元会社員女性、最適化文化からの回復過程にあるミレニアル知識労働者層"

  - series_id: cognitive_clarity__ja_JP__mirai_no_jibun_kara_no_tegami
    brand_id: cognitive_clarity
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: app_blogosphere
    portal_mechanic: app
    episodic_frame_per_volume: letter
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "二十四歳のUXデザイナーは、入社三ヶ月で『十年後の自分から手紙が届くアプリ』のプロトタイプ担当に配属される。テスト用の試作版に、彼女自身が書いた覚えのない、明らかに自分の筆跡の手紙が届きはじめる。"
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "未来の自分からの手紙"
    series_logline: "二十四歳の凛が試作中のアプリには、彼女自身が書いた覚えのない、十年後の自分からの手紙が届く。最初の手紙は『今日は早く帰っていい』だった。"
    series_description: "凛は新卒二年目のUXデザイナー。配属されたのは『未来の自分から、必要なときだけ手紙が届く』というメンタルケア・アプリの試作チーム。先輩エンジニアがふざけて『君のアカウントで本気テストして』と言ったその夜、最初の手紙が届く——『今日は早く帰っていい。あの企画はあなたの仕事じゃない』。凛は手紙の筆跡をスキャンする。十年分老けたが、確かに自分の字だった。手紙は週に一度だけ届く。仕事の判断、付き合っている人のこと、両親に言うべきこと、言わないでいいこと。手紙は答えではなく、決めるのは現在の凛だ。だが時々、手紙の末尾に小さな注意書きが付いている——『この件、私(未来)は後悔した』。長期の伏線——いつから手紙は届きはじめたのか、十年後の凛は何を後悔して、何を守ろうとしているのか。チームの誰が、本当にこの機能を実装したのか。アプリのUIスクリーンを差し挟みながら進む、現代日本のオフィスとアパートの物語。"
    opening_5_volume_arc:
      vol_1: "最初の手紙。『今日は早く帰っていい』。凛は試してみる。何も悪いことは起きない。"
      vol_2: "二通目。『あの企画はあなたの仕事じゃない』。引き受けない判断の練習。"
      vol_3: "恋人について書かれた手紙。注意書きは『私は別れた——遅かった』。凛は決断を保留する。"
      vol_4: "手紙が届かない週。凛は不安になる。十年後の自分は今、忙しいのかもしれない。"
      vol_5: "先輩エンジニアの画面に、凛宛ての手紙のコードが映る。彼は知らないと言う。本当に知らない。"
    comp_titles: ["コーヒーが冷めないうちに", "違国日記", "夜は短し歩けよ乙女", "君は月夜に光り輝く", "ハチミツとクローバー"]
    reader_promise: "未来の自分は、いま手紙を書く準備をしている。返事はあなたが書く。"
    marketing_angle: "『コーヒーが冷めないうちに』の時間飛ばしを、スマホアプリのプッシュ通知にしたら。"
    genre_family: healing
    emotional_engine: future_self_compassion + decision_clarity
    audience: "新卒二〜三年目のZ世代UI/UX関連職、自己決定に揺れる二十代前半"

  - series_id: cognitive_clarity__ja_JP__atama_no_naka_no_kissaten
    brand_id: cognitive_clarity
    locale: ja_JP
    persona_archetype: Mill-careerist
    daily_life_anchor: cafe_kissaten
    portal_mechanic: ritual
    episodic_frame_per_volume: recipe
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "二十九歳の中間管理職が、昔の同級生が営む昭和の喫茶店で、自分の頭の中の会議室を一つずつ閉店させていく。喫茶店の各席は、頭の中のずっと開きっぱなしの『未完の会議』に対応している。"
    volume_runway_target: 150
    reading_platform_fit: manga_traditional
    series_title: "頭の中の喫茶店"
    series_logline: "中間管理職の悠は、頭の中で同時に七つの会議が止まっていることに気づく。土曜の朝、昭和の喫茶店のカウンターで、同級生が一杯ずつ会議を閉じてくれる。"
    series_description: "悠は二十九歳、メーカー二年目の係長。月曜の朝礼で『先週の進捗を一言で』と振られて、頭の中で七つの会議が同時に喋り出した。退職した上司の声、母親の声、辞めた部下の声、自分自身の何年か前の声。土曜の朝、駅前の昭和の喫茶店『深呼吸』に入る。マスターは中学の同級生だった青年で、何も聞かずにカウンターの七つの席を指す。『どの会議から閉じる?』。彼の店では、客が頭の中で開きっぱなしの会議を、一杯ずつ言葉にしながら閉じていく。コーヒーは媒介で、本体は『この件は今日で議事録を書いて、終わりにする』という宣言だ。各巻ごとに一つの『未完の会議』が閉じる。長期の伏線——マスター自身が抱える、まだ閉じていない一つの会議は何か。悠は最後にそれを聞くのか。蛍光灯ではなく暖色の白熱灯、紙ナプキン、サイフォンの音、雨の日の通り。"
    opening_5_volume_arc:
      vol_1: "最初の会議——退職した上司の小言。悠はそれをマスターの前で言葉にする。会議が閉じる。月曜の朝礼で、最初の一言が出る。"
      vol_2: "二つ目——母親の『あなたは長女なのだから』。閉じ方は『私は反論を諦めた、今日で議事録に書く』。"
      vol_3: "三つ目——辞めた部下への謝罪。一杯では閉じない。次の土曜に持ち越す。"
      vol_4: "四つ目——昔の自分。二十二歳の悠が二十九歳の悠に言う『お前はもう私の言うことを聞かなくていい』。"
      vol_5: "マスターの席が一つだけ空いている。悠は座らない。マスターの会議を、まだ聞かない。"
    comp_titles: ["深夜食堂", "コーヒーが冷めないうちに", "森崎書店の日々", "薬屋のひとりごと", "ハチミツとクローバー"]
    reader_promise: "頭の中で開きっぱなしの会議は、一杯のコーヒーと一行の議事録で閉じることができる。"
    marketing_angle: "『深夜食堂』の店主の存在感を、思考のループを言葉にして閉じるための喫茶店に置き換えたら。"
