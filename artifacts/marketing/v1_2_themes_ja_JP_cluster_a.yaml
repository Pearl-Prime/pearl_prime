  - series_id: stillness_press__ja_JP__sangenjaya_konbini_yoru_no_tana
    brand_id: stillness_press
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: retail_service
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "三軒茶屋の深夜コンビニに来る不安を抱えたお客一人ひとりの肩に、店員にだけ見える小さな蛍光色の生き物が乗っている。彼女は商品と一緒に、ポケットに収まる小さな儀式を渡す。その生き物がもともと誰のものだったのかを、巻を重ねるごとに知っていく。"
    volume_runway_target: 200
    reading_platform_fit: manga_traditional
    series_title: "夜のコンビニ、三番目の棚"
    series_logline: "深夜のコンビニで、不安を抱えたお客の肩に乗る小さな生き物が見える店員。彼女はその人に合う棚を、ちゃんと知っている。"
    series_description: "美緒は三軒茶屋の二十四時間営業のコンビニで夜勤を務めている。蛍光灯のかすかな唸りは、いつの間にか耳に入らなくなった。最初のお客は、眠れない法律事務所勤めの男性。彼の肩には、小さなちらつく生き物がいる。美緒はディカフェのコーヒーとラベンダー味の飴を打ち、紙片を一枚そっと添える。そこには、パニックが戻ってきたとき自分にかける一言だけが書いてある。生き物は残る。客は帰る。夜ごとに新しい客と、新しい生き物。家賃の不安、論文の渦、別れた恋人の新しいパートナー。美緒は戦わない。お客がその生き物を少しだけ楽に抱えて帰れるよう、棚の商品と小さな儀式を選ぶ。蛍光灯のしんとした明かりの中、静かに進む話。"
    opening_5_volume_arc:
      vol_1: "最初の客。法律事務所の青年。肩の上の蛾のような生き物。ディカフェとラベンダーの飴、そして紙片一枚。"
      vol_2: "美大生の客。スマートフォンを開いた瞬間に現れる、鏡のように小さな比較の生き物。"
      vol_3: "夜勤明けの看護師。生き物は、抱きすぎて色が褪せかけている。美緒は喪のための棚も置けることを知る。"
      vol_4: "最初の常連客。法律事務所の青年が戻ってくる。肩の生き物はひと回り小さい。美緒は自分の肩にも生き物がいることに、初めて気づく。"
      vol_5: "本部のエリアマネージャー巡回。棚卸しが遅いと指摘される。店舗そのものに棲む生き物——企業の燃え尽き妖怪——に名前がつく日。美緒は残ることを選ぶ。"
    comp_titles: ["コンビニ人間", "薬屋のひとりごと", "深夜食堂", "夜は短し歩けよ乙女", "ホリミヤ"]
    reader_promise: "あなたの不安にはかたちがあって、それを知っている店員がいる。"
    marketing_angle: "『コンビニ人間』に小さな妖怪を一匹入れたら——そして、その妖怪が優しかったら。"
    genre_family: healing
    emotional_engine: competent_calm_specialist + chosen_family
    audience: "都市部で初職に就いた二十代前半の女性、自分の不安に名前をつけられる読者層"

  - series_id: stillness_press__ja_JP__sobo_no_techo
    brand_id: stillness_press
    locale: ja_JP
    persona_archetype: GZ-uni
    daily_life_anchor: content_creation
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "亡くなった祖母から受け継いだ小さな手帖は、触れた人のいちばん近くにいる誰かの恐れを書き写す。主人公は巻ごとに一つずつ、その恐れを返す作法を覚えていく。"
    volume_runway_target: 150
    reading_platform_fit: manga_traditional
    series_title: "祖母の手帖"
    series_logline: "大学生のいりすは、亡き祖母から手のひらほどの革の手帖を受け取る。手帖には、近くにいる人の不安が、祖母の字で書き写されていく。"
    series_description: "祖母の四十九日が明けて、いりすは形見の手帖を受け取った。トランプの箱ほどの大きさの、革表紙の手帖。添えられていた指示はただ一行——『いつもそばに。バスでは開かないこと』。最初にバスで開いたとき、隣に座っていた女子高生の翌日の化学の試験への怯えが、祖母の筆跡で書かれていた。いりすは書くのを止められないが、応えることはできる。一巻ごとに一つ、小さな作法を覚える——呼吸、五・四・三・二・一のグラウンディング、別の言葉での言い換え、自分への許可。声に出して言うと、ページは消え、不安は隣人の体から離れていく。手帖は埋まっては空き、また埋まる。最後のページだけは、いりすが生まれてからずっと白いまま。誰の名前が現れるのか。武蔵野の真夜中までやっている図書館、ポメラニアンの同居人、ゆっくり進む大学生活の物語。"
    opening_5_volume_arc:
      vol_1: "バスの少女。化学の試験。一呼吸。ページが消える。"
      vol_2: "バスの運転手。リストラに怯える三児の父。別の作法。手帖は満ち、また空く。"
      vol_3: "同居人のポメラニアン女子。手帖が開かないまま勝手に書き始める。RSDが可視化される。"
      vol_4: "顔の知らない人。書かれていたのは喪——まだ知らない誰かのためのもの。"
      vol_5: "祖母の筆跡が、少しだけ変わる。手帖がいりすに返事をしている、というかすかな兆し。"
    comp_titles: ["薬屋のひとりごと", "葬送のフリーレン", "コーヒーが冷めないうちに", "森崎書店の日々", "君は月夜に光り輝く"]
    reader_promise: "どんな不安にも、それに合う作法がある。作法は手帖一冊に収まる。"
    marketing_angle: "『コーヒーが冷めないうちに』の祖母の温度を、心理学リテラシーのある大学生世代に手渡したら。"
    genre_family: slice_of_life
    emotional_engine: inherited_wisdom + competent_calm_specialist
    audience: "メンタルヘルスの語彙を持ち、亡き祖母の記憶を抱える大学生世代"

  - series_id: stillness_press__ja_JP__doukyonin_wa_watashi_no_fuan_ga_mieru
    brand_id: stillness_press
    locale: ja_JP
    persona_archetype: GZ-queer
    daily_life_anchor: app_blogosphere
    portal_mechanic: mascot
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "二十四歳のクィアなイラストレーターの不安は、家に棲む小さな妖怪として現れる。それが見えるのは新しい同居人だけ——日常魔法の使い手で、似た事情を持つ友人たちを少しずつ紹介してくれる。"
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "同居人は私の不安が見える"
    series_logline: "ネット掲示板で見つけた同居人と暮らし始めたあしゃ。三日目の朝、シリアルの箱越しに同居人が小さな灰色の生き物に向かって『おはよう、ちびちゃん』と言った。"
    series_description: "あしゃは二十四歳のノンバイナリー・イラストレーター。高校生のころから、肩のあたりにいる小さな灰色の生き物を、ずっと一人で抱えてきた。風呂にも、バスにも、寝室にもついてくる。誰にも言ったことがなかった。新しい同居人のヌールはレバノン系日本人の編み物好きな経理職で、引っ越して三日目の朝、シリアルの箱越しに『おはよう、ちびちゃん』とこともなげに言った。一巻ごとにヌールは、同じように『生き物が見える』友人を紹介してくれる——蛸を背負ったトランスの男性バリスタ、髪に小さなカラスを宿す聴覚障がいの院生、三匹を連れたポリアモリーの多言語話者。仲間が増えるたび、生き物たちはやわらかくなる。長期の伏線——ヌールに見えるようになったきっかけは何で、なぜ彼女自身の生き物がいちばん大きいのか。クィア性、神経多様性、世代を越えた傷は、ここでは前提として置かれている。週ごとのテーマは『カミングアウト』ではなく、『カムイントゥ——自分に帰っていく』ことの方。"
    opening_5_volume_arc:
      vol_1: "引っ越しの日。シリアルの箱越しの一言。あしゃは恥ではなく安堵で、洗面所で泣く。"
      vol_2: "トランスのバリスタ。背中の蛸に名前がつく。下北沢のコーヒー店が、もう一つの居場所になる。"
      vol_3: "聴覚障がいの院生。髪のカラスは手話を話す。仲間は四人になる。"
      vol_4: "家族とのテレビ通話。画面の中で、あしゃの生き物が三倍に膨らむ。ヌールはフレームから外れない。"
      vol_5: "深夜二時の台所で、一度だけヌール自身の生き物が見える。ヌールよりも大きい。長い謎が、ここから始まる。"
    comp_titles: ["違国日記", "しまなみ誰そ彼", "とんがり帽子のアトリエ", "ホリミヤ", "私の少年"]
    reader_promise: "あなたの不安は本物で、かたちがあって、それを見たうえで一緒にいてくれる人がいる。"
    marketing_angle: "『違国日記』の選びとる家族のぬくもりを、メンタルヘルスを語彙にもつZ世代のクィアな日常に重ねたら。"
    genre_family: slice_of_life
    emotional_engine: chosen_family + named_and_seen
    audience: "クィアでネウロダイヴァージェントな都市部の二十代クリエイティブ層、メンタルヘルス・リテラシー高め"

  - series_id: stillness_press__ja_JP__hitotsu_saki_no_eki
    brand_id: stillness_press
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: school_commute
    portal_mechanic: train_station
    episodic_frame_per_volume: locale
    magical_register: supernatural_everyday
    serial_engine: location_anthology
    long_arc_spine: "二十六歳の女性が最後のパニック発作の夜に降りてしまった駅は、地図に載っていない一駅先の駅だった。誰かが発作のさなかにいるときだけ、その駅は開く。彼女は何度もその駅に戻り、降りた人を一人ずつ送り出していく。"
    volume_runway_target: 150
    reading_platform_fit: manga_traditional
    series_title: "ひとつ先の駅"
    series_logline: "井戸ゆいの最後のパニック発作は、終電の小田急線だった。そこで一駅多く乗ってしまい、地図にない駅で温かい麦茶を渡された。あの駅には、誰かのために戻れる。"
    series_description: "ゆいは二十六歳。大学で最初の発作、二十三で最悪の発作、二十六歳のあの夜の小田急線が、最後の発作だった。いつもの駅をひとつ過ぎてしまい、降り立った駅は色が違った——見たことのない深い緑のタイル、三日月のかたちの裸電球、紙コップに温かい麦茶を注いで『またいつでもおいで』と言った駅員。信じなかった。けれど、自分と同じ路線で誰かが目に見えて発作を起こした夜、降りずに過ぎ、もう一駅。月の駅は、開いた。各巻、別の都市の、終点のひとつ先にある駅を訪ねる——小田急、山手、地下鉄丸ノ内、京都の市電、大阪環状。それぞれの駅は、かつてそこで降りた誰かが、いま勤めている。一巻ごとに一人を、ホームへ送り出す。長期の謎は、この路線を最初に敷いたのは誰で、終点はどんな場所か。"
    opening_5_volume_arc:
      vol_1: "小田急線。最初の帰還。十代の少年がパニックの最中にいる。麦茶。最初の一言——『またいつでもおいで』。"
      vol_2: "山手線。日曜夜の電車に揺られるサラリーマン。駅にも名前がつく。あの夜の駅員と再会する。"
      vol_3: "京都の市電。修士論文の佳境にいる院生。降りた駅は『出口』でもあると、ゆいは知る。"
      vol_4: "大阪環状線。共同制作の打ち合わせで燃え尽きた若いクリエイター。初めての複数人ケース。"
      vol_5: "地下鉄丸ノ内。発作の最中にいるのは、ゆいの大学時代のルームメイト。彼女はゆいを見分ける。物語の核が、ここで動き出す。"
    comp_titles: ["千と千尋の神隠し", "コーヒーが冷めないうちに", "葬送のフリーレン", "アフターダーク", "夜は短し歩けよ乙女"]
    reader_promise: "いちばん辛かった夜には扉があって、別の誰かのために、もう一度くぐることができる。"
    marketing_angle: "『千と千尋』の駅を、パニックを名前で呼べる世代の通勤路線に置き換えたら。"
    genre_family: supernatural_everyday
    emotional_engine: paying_it_forward + competent_calm_specialist
    audience: "都市の通勤電車で働く二十代後半の知識労働者層、パニックや不安を言語化できる読者"

  - series_id: stillness_press__ja_JP__nichiyou_no_kogusuriya
    brand_id: stillness_press
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: retail_service
    portal_mechanic: ritual
    episodic_frame_per_volume: recipe
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "二十五歳の女性が祖母から受け継いだ日曜だけ開く小さな小薬屋。来る客一人ひとりに、ポケットに入る小さな儀式を一つ渡す。儀式はかつて別の誰かのものだった——主人公はその系譜を、巻を重ねるごとに辿っていく。"
    volume_runway_target: 200
    reading_platform_fit: manga_traditional
    series_title: "日曜の小薬屋"
    series_logline: "日曜だけ開く。お客一人につき一つの儀式。その儀式はかつて誰かのもので、いつかまた別の誰かのものになる。"
    series_description: "蓮はひとつの鍵と、ひとつの指示だけを祖母から受け継いだ——『日曜のみ、十一時から五時まで開けること』。下町の商店街の二階、四畳半ほどの店。並んでいるのは商品らしいものではない。瓶に入った折りたたまれた紙片、引き出しの中の燻した茶葉、結び目の入った絹糸の盆。それでも、客は店を見つけてやって来る。蓮は耳を傾け、一つだけ問いを返し、棚から一つを選んで手渡す。客は三十秒で、机の上でも電車の中でも、駅のトイレの個室でも実践できる小さな儀式を一つ、ポケットに入れて帰る。在庫が補充されるのは、客が戻ってきて、自分に効いた儀式を少しだけ変えて店に置いていったとき。長期の謎——祖母が最初の店主で、誰にも渡さなかった儀式が一つだけ、レジの引き出しの奥に畳まれて残っている。蓮はゆっくり、その一冊の『書』になっていく。"
    opening_5_volume_arc:
      vol_1: "店を開けた最初の日曜。五十代の女性。折りたたまれた紙片。一九八二年に父を落ち着かせた一文。"
      vol_2: "大学一年生。燻した茶葉。手順——湯を注ぐ、香りを嗅ぐ、飲まないこと。儀式は彼女と帰っていく。"
      vol_3: "避難訓練の翌週に来る高校教師。結び目の絹糸。糸に名前がつく。"
      vol_4: "最初の戻り客。一巻目の女性が、紙片を少し変えて返しに来る。在庫が増える。"
      vol_5: "閉店時、蓮はレジの引き出しを開ける。祖母の畳まれた紙片が、初めて目に入る。読みはしない。"
    comp_titles: ["薬屋のひとりごと", "深夜食堂", "猫を抱いて象と泳ぐ", "森崎書店の日々", "ツバキ文具店"]
    reader_promise: "毎週日曜、月曜に使える小さなものを一つ、ポケットに入れて持ち帰れる。"
    marketing_angle: "『薬屋のひとりごと』の職能の確かさを、現代の小さな商店街に下ろしたら。"
