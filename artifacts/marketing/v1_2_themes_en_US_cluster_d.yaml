      vol_2: "Priya's shift at the museum with all eleven kids. She learns each kid's name by lunch. She is exhausted but not alone."
      vol_3: "Naomi's solo Saturday. Her mother visits. Naomi tells her mother about the co-op. Her mother cries."
      vol_4: "Devi's shift. One of the kids has a seizure. The five other mothers arrive at the ER within forty minutes."
      vol_5: "A new woman, Adia, asks to join. The co-op debates. Liv says yes. They learn the co-op can grow."
