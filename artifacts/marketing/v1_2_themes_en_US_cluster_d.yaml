    series_description: "Liv is thirty-eight, a Chicago social worker with a four-year-old and an eight-year-old, and dead-tired. She posts in the neighborhood listserv asking if any other parents want to swap one Saturday afternoon a month. Five women answer. They meet at the corner playground. By the third Saturday the swap is a system: one woman takes all eleven of their kids to the children's museum, the other five rest. Each volume is one woman's Saturday — her shift, her rest, the small revelation about her own mother she works out while sitting in her apartment alone for the first time in three years. The arc is the seventh woman who asks to join, who is not from the neighborhood — and what the co-op decides about whether the trust scales. Slow, communal, Millennial-tender. No magical register. Pure realist family register. Heartstopper for mid-thirties exhausted parents."
