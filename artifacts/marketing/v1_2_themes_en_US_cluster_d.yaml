  # ════════════════════════════════════════════════════════════════════════════

  - series_id: relational_calm_iyashikei__en_US__the_unlocked_door_apartment
    brand_id: relational_calm_iyashikei
    locale: en_US
    persona_archetype: GZ-queer
    daily_life_anchor: queer_identity
    portal_mechanic: door
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "A 26-year-old keeps her apartment door unlocked from 7 to 11 every weeknight so her chosen-family group chat has somewhere to land; she slowly discovers the apartment itself is keeping a roster of who has slept on her couch and adding them to a quiet, growing protection."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "Doors Don't Lock Here"
    series_logline: "Sky keeps her door unlocked four hours a night for her chosen family; the apartment is starting to count the ones it loves."
    series_description: "Sky is twenty-six, queer, and a community-college academic advisor in Oakland. After her own family of origin went silent at twenty-one, she promised the small circle she built in college that her door would be unlocked from 7 to 11 every weeknight — anyone could land. By the third year, the apartment knows the regulars. The radiator clicks for Theo's allergies. The kitchen light goes soft when Marisol comes in after a bad shift. The couch gets one extra cushion the night Jules's father visits town. Sky doesn't fight it. She learns the apartment's grammar, which is the same grammar as her own nervous system: who is allowed close, what proximity is safe, what the body permits at the door. Each volume a new person tries to land — an estranged sibling, an ex's new partner, the bio-cousin who Sky hasn't seen since the funeral — and the apartment decides, slow and specific, what kind of welcome the room can hold. Frieren-tender. Heartstopper-warm. A door that has read every nervous-system theory Sky owns."
    opening_5_volume_arc:
      vol_1: "Theo's allergies. Marisol's bad shift. The first week the apartment runs itself. Sky names it 'the room.'"
      vol_2: "Jules's father in town. The couch grows one cushion. Sky learns the room makes a place for the people she loves to grieve their own people."
      vol_3: "The first stranger — a friend-of-a-friend in crisis. The door takes ninety seconds longer to open. Sky learns 'safe' is the room's decision, not hers."
      vol_4: "An ex's new partner asks to come in. The door does not open. Sky sits with the no on the inside floor and writes the ex a kind text."
      vol_5: "Sky's estranged younger sister at the door. The radiator does not click. Sky has to decide whether the room learns a new person, or whether the room is right."
    comp_titles: ["Heartstopper", "Spy x Family", "Days at the Morisaki Bookshop", "Tomorrow and Tomorrow and Tomorrow", "Before the Coffee Gets Cold"]
    reader_promise: "Your chosen family has somewhere to land, and the room is on your side."
    marketing_angle: "Heartstopper for the apartment that learns who you let in."
    genre_family: healing
    emotional_engine: chosen_family + boundaried_belonging
    audience: "Gen Z 24–29 queer urban chosen-family hosts with nervous-system literacy"

  - series_id: relational_calm_iyashikei__en_US__group_chat_at_the_kitchen_table
    brand_id: relational_calm_iyashikei
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: content_creation
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: life_stage_rhythm
    long_arc_spine: "A 25-year-old hosts the same five-person Sunday dinner group chat in person every week for four years; a small notebook on the table writes down, in nobody's handwriting, the one thing each person came to be told."
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "Sunday at Seven"
    series_logline: "Five friends. One kitchen table. A notebook that knows what each of them came to be told."
    series_description: "Lev is twenty-five, a junior brand designer in Brooklyn, and the one in the group chat with the biggest apartment, which means Sunday at seven is at Lev's. The five of them — Naya, Bea, Diego, Mira, and Lev — eat the same rotating menu and drink one bottle of the cheapest decent wine and write in a small green notebook that Lev's grandmother gave him before she died. The notebook lives on the table. Anyone can pick it up. The strange thing is that the sentence each person needs to hear that week is already written there before the dinner — in handwriting that belongs to none of them. They learn not to talk about it. They learn to read what is in the book at the right time. Each volume a different sentence belongs to a different friend, and the long arc is the Sunday someone new is brought to the table and the book writes them a sentence too. Spy x Family wholesome. Heartstopper specific. Quietly enchanted."
    opening_5_volume_arc:
      vol_1: "Naya's promotion she didn't take. The book says 'you can change your mind on Tuesday.' She changes it Wednesday."
      vol_2: "Bea's mother is sick. The book says 'tell Diego.' Diego's father had the same diagnosis."
      vol_3: "Diego brings his new boyfriend. The book writes a sentence for the boyfriend. Lev does not show it to him until vol 4."
      vol_4: "The boyfriend reads his sentence. Decides to stay in the group. The notebook now holds six."
      vol_5: "Mira moves to Berlin. The book writes her last sentence. The chair is kept anyway. The book keeps writing for her."
    comp_titles: ["Spy x Family", "Heartstopper", "Before the Coffee Gets Cold", "Days at the Morisaki Bookshop", "What You Are Looking For Is in the Library"]
    reader_promise: "Your weekly group has a record that knows what each of you came for."
    marketing_angle: "Spy x Family for the Sunday dinner that's the only thing holding your week."
    genre_family: slice_of_life
    emotional_engine: chosen_family + ritual_as_belonging
    audience: "Gen Z 24–28 first-job urban friend-group anchors"

  - series_id: relational_calm_iyashikei__en_US__the_quiet_friend_clinic
    brand_id: relational_calm_iyashikei
    locale: en_US
    persona_archetype: GZ-uni
    daily_life_anchor: retail_service
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A socially anxious 22-year-old works the lost-and-found counter at a community library; each lost object turns out to belong to a friendship that is also lost, and returning the object returns the friendship — slowly, awkwardly, never on schedule."
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "Found in the Library"
    series_logline: "Iris runs the library lost-and-found; the objects belong to friendships that misplaced themselves."
    series_description: "Iris is twenty-two, a junior at the state university, and works twenty hours a week at the public library lost-and-found, which is a fluorescent room behind the circulation desk. She is socially anxious in the textbook way: she has rehearsed the sentence 'do you have an ID' two thousand times. Each volume she returns one object to one person, and each object is the residue of a friendship that the person let go of. A high-school best friend's mixtape. A roommate's plant. A camp friendship bracelet. Iris does not lecture. She gives the object back. She watches the person decide whether to text the friend, or not. Some texts get sent. Some don't. The long arc is the object that ends up in the lost-and-found that is Iris's own — a sketch from a former best friend in high school — and what Iris decides to do with it. Quiet, anxious, tender. Heartstopper but for the friend you used to be inseparable from."
    opening_5_volume_arc:
      vol_1: "The mixtape. The customer is now thirty. She does not call the friend. She listens in the parking lot."
      vol_2: "The roommate's plant. The two roommates haven't spoken in three years. The plant is dying. Iris finds the right water schedule."
      vol_3: "The camp bracelet. The friend is dead. The customer does not know. Iris tells her by being quiet long enough."
      vol_4: "Iris's own sketch arrives in the lost-and-found. Iris does not check the name on the slip yet."
      vol_5: "Iris reads the slip. Calls the former best friend. Says hello. The episode ends mid-sentence. The library closes."
    comp_titles: ["Days at the Morisaki Bookshop", "What You Are Looking For Is in the Library", "Heartstopper", "The Apothecary Diaries", "Before the Coffee Gets Cold"]
    reader_promise: "The friendship you let go of left its receipt at the lost-and-found."
    marketing_angle: "What You Are Looking For Is in the Library, but the librarian is twenty-two and just as anxious as you are."
    genre_family: healing
    emotional_engine: rekindled_intimacy + competent_calm_specialist
    audience: "Gen Z 20–24 university socially anxious readers with one specific lost friendship"

  - series_id: relational_calm_iyashikei__en_US__roommate_with_a_lease_on_my_heart
    brand_id: relational_calm_iyashikei
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: dating
    portal_mechanic: ritual
    episodic_frame_per_volume: month
    magical_register: none
    serial_engine: life_stage_rhythm
    long_arc_spine: "Two ex-strangers move in together on a one-year sublease and accidentally invent a thirty-six-step relationship that has no name; the series tracks each month of the year, the small rituals they invent, and the question of what to call it when the lease ends."
    volume_runway_target: 100
    reading_platform_fit: webtoon_vertical
    series_title: "Year of the Sublease"
    series_logline: "Two strangers, one lease, twelve months of small rituals. By month six they need a name for it."
    series_description: "Tess is twenty-four and just out of a four-year relationship; Owen is twenty-six and just out of grad school. They both need a room. The Craigslist sublease is one year, ground-floor Somerville, two bedrooms, shared kitchen. By month two they have invented the Wednesday-night-pasta protocol and the Sunday-quiet-hour and the unspoken rule about which of them buys the toilet paper. By month four they are texting each other from the same couch. By month six neither of them is dating anyone, and they're not dating each other either — they are doing the thirty-six small rituals that look like a relationship and feel like a friendship and have no name in the language. Each volume is one month. The series is twelve. The long arc is what they call it when the lease ends. Romance in the slow-build register. No sex on page until they decide there's a name. Honey-lemon-soda warmth with grown-up rent."
    opening_5_volume_arc:
      vol_1: "January. The lease signs. The first Wednesday-night pasta. Owen does not eat onions; Tess learns this on Tuesday."
      vol_2: "February. The first argument — about whose turn it is to text the landlord. They invent the Sunday-quiet-hour."
      vol_3: "March. Tess's ex texts. Owen makes the pasta alone that Wednesday. Tess comes home anyway."
      vol_4: "April. Owen's mother visits. She asks if they're dating. Neither of them answers. The mother takes both of them to brunch."
      vol_5: "May. They build a bookshelf together. The shelf has both of their books. The shelf does not have a category for what they are."
    comp_titles: ["Honey Lemon Soda", "Heartstopper", "Spy x Family", "Tomorrow and Tomorrow and Tomorrow", "Normal People"]
    reader_promise: "The friendship-that-isn't has rituals that count, even before they have a name."
    marketing_angle: "Honey Lemon Soda meets the New York Times 36 Questions, on a Craigslist sublease."
    genre_family: romance
    emotional_engine: slow_proximity + ritual_as_belonging
    audience: "Gen Z + young-Mill 23–28 first-apartment urban roommates in slow-build adjacency"

  - series_id: relational_calm_iyashikei__en_US__the_we_were_all_thirteen_chat
    brand_id: relational_calm_iyashikei
    locale: en_US
    persona_archetype: ML-mid
    daily_life_anchor: parasocial_creator
    portal_mechanic: letter
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 33-year-old finds her old middle-school AIM chat logs printed out in a box at her parents' house; she re-reads them with her present-day group chat — and the past versions of her friends start writing back."
    volume_runway_target: 125
    reading_platform_fit: webtoon_vertical
    series_title: "The Box of AIMs"
    series_logline: "June found her seventh-grade chat logs. Her present-day friends start writing to their thirteen-year-old selves, and the thirteen-year-old selves write back."
    series_description: "June is thirty-three, a school librarian in Portland, and cleaning out her parents' house when she finds a box of printed-out AIM chat logs her mother saved from 2006. June scans them and sends them to the group chat that now contains the same four friends, twenty years older. They read them out loud over wine. Then the strange thing: when they each text a sentence in reply to one of the printed lines, the next time they open the chat, the seventh-grade version of the friend has answered. The series is each friend's correspondence with their younger self — each volume one friend, one specific knot they did not get to soothe at thirteen. The arc is the one friend in the chat who died at nineteen, whose seventh-grade logs are in the box too, and whether the chat lets her write back. Slow, very specific, Millennial-tender."
    opening_5_volume_arc:
      vol_1: "Brett's logs. Brett at thirteen was being bullied for his stutter. Brett at thirty-three writes him the sentence he needed."
      vol_2: "Layla's logs. Layla at thirteen was the bully. Layla at thirty-three apologizes. Layla at thirteen takes a week to reply."
      vol_3: "June's logs. June at thirteen was queer and didn't know the word. June at thirty-three teaches her the word."
      vol_4: "Devon's logs. Devon at thirteen wanted to be a chef. Devon at thirty-three is an accountant. They negotiate."
      vol_5: "The dead friend's logs surface. The chat goes silent for two days. Brett types the first sentence. The reply takes a week."
    comp_titles: ["Before the Coffee Gets Cold", "Tomorrow and Tomorrow and Tomorrow", "Heartstopper", "What You Are Looking For Is in the Library", "Days at the Morisaki Bookshop"]
    reader_promise: "Your thirteen-year-old self is still on AIM and they have one thing to ask you."
    marketing_angle: "Before the Coffee Gets Cold for the Millennial group chat that was originally a 2006 AIM thread."
    genre_family: supernatural_everyday
    emotional_engine: rekindled_intimacy + vigil_for_the_lost
    audience: "Millennials 30–38 with a saved chat-log box and a long friend-group"

