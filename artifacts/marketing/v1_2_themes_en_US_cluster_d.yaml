#   - artifacts/research/v1_2_genre_allocation_constraint_2026-05-12.md  (BINDING per-cluster allocation)
#   - artifacts/research/manga_bestseller_magical_serial_framework_2026-05-12.md  (PR #1051)
#   - artifacts/research/manga_genz_genalpha_portal_framework_2026-05-13.md       (PR #1053)
#   - config/manga/canonical_brand_list.yaml  (37-brand canon)
#
# Scope:
#   - locale:           en_US
#   - cluster:          D — Relational/Connection/Family
#   - brands:           5 (relational_calm_iyashikei, confidence_core_romance,
#                          bright_presence_tw_seinen, heart_balance_shojo,
#                          resilient_parent_social)
#   - series per brand: 5
#   - total series:     25
#
# Brand-id mapping (constraint doc -> canonical_brand_list.yaml):
#   relational_calm_iyashikei  -> relational_calm_iyashikei   (exact)
#   inner_security             -> confidence_core_romance     (mapped: shojo self-worth/inner-security; closest canonical for "inner_security")
#   bright_presence            -> bright_presence_tw_seinen   (exact root: seinen bright-presence)
#   found_family_shojo         -> heart_balance_shojo         (mapped: josei relational shojo register; found-family fit)
#   communal_warmth            -> resilient_parent_social     (mapped: josei communal/family; "communal_warmth" = family-of-origin + chosen-family register)
#
# Genre allocation target for Cluster D (per v1_2_genre_allocation_constraint):
#   healing:                6  (HARD floor)
#   slice_of_life:          5
#   supernatural_everyday:  4-5
#   mystery_cozy:           4
#   fantasy_adventure:      3
#   romance:                1-2  (Cluster D bumped to ceiling of 2 — found-family/chosen-family fit)
#   horror/dark/occult:     0-1
#   school:                 0-1
#   other:                  0-1
#   TOTAL:                  25
#
# This cluster delivers: healing=6, slice_of_life=5, supernatural_everyday=5,
#                        mystery_cozy=4, fantasy_adventure=3, romance=2
#                        = 25 (within all ranges).
#
# Voice register: Frieren / Spy x Family / Heartstopper — found-family warmth
# without being twee. Tender, communal, specific. No greeting-card prose. The
# emotional engine across the cluster: chosen family is built on small specific
# acts (a meal at the same time every week, a ritual no one else understands,
# a door always unlocked), not on declarations.
#
# Persona allocation (target): ~60% Gen Z, ~20% Gen Alpha (sibling/cousin
# bonds), ~18% Millennial, ~2% Gen X. Skews Gen Z chosen-family + Gen Alpha
# sibling-bond register — the operator's "Heartstopper grew up" demographic.
#
# Daily-life anchors that fit: queer_identity (chosen family), k_pop_fandom
# (parasocial -> real friendship), thrift_vintage (inherited relationships),
# dating, ai_companion (parasocial -> real), retail_service (workplace-as-family),
# late_night_economy (3 a.m. friends), content_creation (group-chat as family).
#
# Portal mechanics that fit: letter (between estranged family), recipe
# (passed down), song (family song), door (to a relative's interior life),
# ritual (chosen-family ritual), object (inherited talisman).

