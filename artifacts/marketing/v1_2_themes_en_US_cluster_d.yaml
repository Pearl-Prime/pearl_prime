  - series_id: confidence_core_romance__en_US__honey_in_the_groupchat
    brand_id: confidence_core_romance
    locale: en_US
    persona_archetype: GZ-uni
    daily_life_anchor: dating
    portal_mechanic: song
    episodic_frame_per_volume: month
    magical_register: none
    serial_engine: life_stage_rhythm
    long_arc_spine: "A 20-year-old college sophomore with severe imposter syndrome falls for a junior in her a cappella group; they invent a shared playlist that is the only place she can say how she feels — and slowly, song by song, builds the version of herself that can say it out loud."
    volume_runway_target: 100
    reading_platform_fit: webtoon_vertical
    series_title: "The Playlist We Share"
    series_logline: "Cami can't tell Jordan she likes her, but she can add the song. The playlist is up to forty-seven."
    series_description: "Cami is twenty, a Black queer second-year at a small liberal-arts college in upstate New York, and the newest member of the all-femmes a cappella group on campus. She is sure they made a mistake letting her in. Jordan is the alto she sits next to, a junior, easy-shouldered, kind. Cami cannot say a word to Jordan that does not get rehearsed in advance. The first week she adds a song to the shared 'rehearsal warmups' playlist that means 'I'm here because of you.' Jordan adds a song back. By month two the playlist is the relationship. The series is one school year. Each volume is one month and three songs and one small thing Cami learns to say out loud. The long arc is the spring concert where Cami has the solo — and whether she sings it to Jordan, or to herself, or to both. Shojo-tender. Honey Lemon Soda. Heartstopper at a women's college."
    opening_5_volume_arc:
      vol_1: "September. First rehearsal. The first song goes on the playlist. Jordan adds Solange. Cami does not breathe for a verse."
      vol_2: "October. The Halloween concert. Cami's costume is a disaster. Jordan fixes the seam. The playlist gets the song from the costume."
      vol_3: "November. Cami's family Thanksgiving. The playlist is the only home she has on a hard week. She adds a song. Jordan answers same day."
      vol_4: "December. The winter concert. Cami's mother comes. The solo audition is announced. Cami auditions out of spite and gets it."
      vol_5: "January. The new semester. Jordan asks Cami to coffee. The playlist freezes for a week. Then a song goes up that is not a code."
    comp_titles: ["Heartstopper", "Honey Lemon Soda", "Skip Beat!", "Normal People", "Daisy Jones and the Six"]
    reader_promise: "The playlist is saying it for you until you can say it yourself."
    marketing_angle: "Heartstopper at an a cappella group, in a shared playlist that becomes the relationship."
    genre_family: romance
    emotional_engine: slow_proximity + earned_voice
    audience: "Gen Z 19–23 queer college students with severe imposter-syndrome dating energy"

  - series_id: confidence_core_romance__en_US__interns_in_the_basement
    brand_id: confidence_core_romance
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: retail_service
    portal_mechanic: object
    episodic_frame_per_volume: month
    magical_register: none
    serial_engine: companion_roster
    long_arc_spine: "Six unpaid interns at a flailing nonprofit share one basement office, one printer, and the slow collective discovery that they are not the problem — the org is — and that they have already become each other's first real coworkers."
    volume_runway_target: 100
    reading_platform_fit: webtoon_vertical
    series_title: "Basement Floor, No Window"
    series_logline: "Six interns. One printer. Eleven months of figuring out the boss is the imposter, not them."
    series_description: "Anya is twenty-three and one of six unpaid interns at a small nonprofit in DC. They all share one basement office with one window that does not open. Each of them arrived ninety-percent sure they were the dumbest person hired. The series tracks the eleven-month internship: one volume per month, one new shared discovery per month, one shared protection the six of them build for each other. By month four they have a private group chat called THE PRINTER ROOM. By month seven they realize the executive director is gaslighting all six of them and have begun comparing notes. By month nine three of them have job offers and are reading each other's negotiation emails. By month eleven the unit they have become is the actual job. Found-family slow build. Workplace ensemble. No villain except the org chart. Heartstopper energy if Heartstopper had a Slack."
    opening_5_volume_arc:
      vol_1: "Day one. Six introductions. Anya assumes everyone else went to a better school. By Friday she learns three of them didn't go at all."
      vol_2: "The printer breaks. They solve it together. THE PRINTER ROOM group chat is named."
      vol_3: "The first 'are we doing this right?' moment — Mateo's manager yells at him for something his manager forgot. The six of them write the timeline together."
      vol_4: "The first 'we are being gaslit' moment. They compare what each was told the budget was. Three different numbers."
      vol_5: "Halftime check-in. Anya cries in the bathroom and Priya holds the door. Anya names the imposter feeling out loud."
    comp_titles: ["Heartstopper", "Spy x Family", "Severance", "The Office", "Skip Beat!"]
    reader_promise: "The basement coworkers are the first family who agrees you're not the problem."
    marketing_angle: "Heartstopper meets early-career Severance, in the basement of a flailing nonprofit."
    genre_family: slice_of_life
    emotional_engine: chosen_family + reality_check_camaraderie
    audience: "Gen Z 22–26 first-job interns with imposter syndrome and a group chat"

  - series_id: confidence_core_romance__en_US__shrine_for_the_first_no
    brand_id: confidence_core_romance
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: alt_spirituality
    portal_mechanic: ritual
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "A 24-year-old high-school art teacher inherits a tiny grandmother's shrine that grants strength to say one no per visit; she opens it to her students and chosen family — each episode is one person's first no — and slowly learns the shrine has a ledger she is also on."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "The Shrine of First No"
    series_logline: "Liana's grandmother left her a shrine. It gives you the courage for one specific no. The line outside is forming."
    series_description: "Liana is twenty-four, mixed Filipino-American, a first-year high-school art teacher in San Diego. Her grandmother, who raised her, dies in the spring and leaves her a small wooden shrine the size of a shoebox, which sat above the family kitchen for forty years. The shrine has one function: if you sit in front of it for ten quiet minutes and speak the no you cannot say, you walk out with the strength to say it once. Just once. Liana opens the shrine to anyone who knows about it. The first week it is two of her seniors. By month two it is half her chosen-family group chat. Each volume is one person's no — to a boss, a parent, a partner, a friend, a version of themselves. The long arc is Liana's own no, which the shrine has been waiting for since she inherited it. Heartstopper warmth. The Apothecary Diaries' competent-protagonist register. A small wooden box that does not lecture."
    opening_5_volume_arc:
      vol_1: "Maya the senior says no to her parents about pre-med. The shrine clicks once. Liana sits with her after."
      vol_2: "Pris from the group chat says no to her landlord. The shrine clicks twice. Pris is shaking. The chat throws her a pizza."
      vol_3: "Liana's vice principal asks her to teach an extra class without pay. The shrine clicks for Liana. She doesn't say her no yet."
      vol_4: "A stranger — Maya's mother — comes to the shrine. The shrine works for people Liana hasn't met. The mother says no to her own marriage."
      vol_5: "Liana finally says her own no — to the inheritance condition her grandmother left. The shrine closes. Liana opens it again."
    comp_titles: ["The Apothecary Diaries", "Heartstopper", "Skip Beat!", "Mushishi", "What You Are Looking For Is in the Library"]
    reader_promise: "Your one specific no is sitting in front of the shrine that has been waiting for you."
    marketing_angle: "Apothecary Diaries meets Heartstopper — the grandmother's shrine that gives Gen Z the strength to say no once."
    genre_family: healing
    emotional_engine: inherited_wisdom + earned_voice
    audience: "Gen Z 22–28 women and queer first-job teachers and caregivers with one specific no overdue"

