    long_arc_spine: "一个莫名其妙装在女生手机里、没人写过的小程序,每天凌晨给她推一条来自『三年后的自己』的语音;一开始她以为是 AI,后来她发现录音里背景音会一天天变——那是真的她,只是她现在还不知道是谁先开始发的。"
    volume_runway_target: 160
    reading_platform_fit: webtoon_vertical
    series_title: "未来的我的语音信箱"
    series_logline: "杭州一位刚入职的 Gen Z 文案,手机里突然多出一个没下载过的小程序,每天凌晨推送一条三年后的自己发来的 30 秒语音——背景音会变,她开始攒线索找未来。"
    series_description: "苏念是 2026 年刚毕业入职的内容运营。某个周三凌晨两点,她手机屏自己亮了:一个她没装过、图标是空白的小程序推送一条 30 秒语音。点开,是她自己的声音——但更稳、更慢:『今天你会因为提案被打回哭一次,没事,你三年后还在做这件事,只是不为这家公司。』第二天提案真的被打回了。从此每天凌晨两点一条。语音里背景音一天天变:键盘声、海风、地铁、婴儿哭。她开始攒、开始倒推、开始替未来的自己做小决定——退一份兼职、加一个朋友的微信、不回那条信息。每一卷,她在某个『关键夜』替未来的自己保住一个选择。"
    opening_5_volume_arc:
      vol_1: "第一条语音:提案被打回。苏念听完哭了一场,第二天没有改第八版。"
      vol_2: "第二周:语音里第一次有海风。她推断未来的自己离开了杭州。"
      vol_3: "她拒绝了一份月薪 +3k 的副业。语音那头说:『谢谢你,我现在睡得着觉了。』"
      vol_4: "她发现还有一个人也在收到这种语音——咖啡店常客,一个 35 岁的中年男。"
      vol_5: "小程序第一次发回了一条空的录音。苏念意识到:她现在要开始替三年后的自己录第一条了。"
    comp_titles: ["你的名字 (中文版)", "解忧杂货店 (中文版)", "一人之下", "未闻花名", "声音的形状"]
    reader_promise: "你现在做的每一个小决定,三年后的你正在替你谢你。"
    marketing_angle: "像『你的名字』,但只在凌晨两点,你和三年后的自己只能通过 30 秒语音换班。"
    genre_family: slice_of_life
