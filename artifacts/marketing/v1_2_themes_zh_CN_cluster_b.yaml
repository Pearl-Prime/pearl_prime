    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "凌晨四点还开着的连锁打印店,接住的每一份『熬到这个点还在改的文件』背后都有一个想得太多的人;夜班店员能看见每位客户脑子上方那团旋转不停的灰雾,她替他们把那一页打成清楚的稿,也替他们关掉那团雾里循环最久的那一句。"
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "凌晨四点的打印店"
    series_logline: "深圳科技园边上一家 24 小时连锁打印店,千禧一代店员能看见每位通宵改稿客户头顶那团灰色思维雾——她替他们把这一页改清楚,也替他们关掉雾里循环了三年的那一句。"
    series_description: "顾岚之前在大厂做产品经理,996 把她送进医院之后她辞了职,选了一份『不需要她想太多』的活——凌晨班的连锁打印店店员。可她发现自己能看见。每一位推门进来的客户头上方都顶着一团灰雾,雾里循环一句他们自己说给自己听了无数遍的话:『再改一版就好』『别人都觉得我装』『我妈说我没出息』。顾岚不能替他们想清楚,她只能替他们把这一页打成清楚的稿;但每一次她把纸递回去的时候,她会顺嘴说一句很普通的话——不是劝,只是把雾里那一句反着说一遍。客户走的时候雾还在,只是不转那么快了。慢慢地她发现这家打印店本身有一团更大的雾,是这条街所有加班人留下来的。"
    opening_5_volume_arc:
      vol_1: "第一位客户:凌晨四点改 PPT 的产品女经理。雾里循环『再改一版』。顾岚发现自己看得见。"
      vol_2: "考研第三年的男生,雾是父母的声音。顾岚替他打印『弃考申请』,只是没让他真的交。"
      vol_3: "外卖骑手用打印店当临时办公室。雾里循环的是他自己童年的一句话。顾岚第一次哭。"
      vol_4: "回头客:产品女经理回来了,她现在头上的雾小了一圈,但多了一个新句子。"
      vol_5: "店长查岗,顾岚被批纸张耗损过高。打印店本身的『大雾』第一次被她看见——是这条街的雾。她决定留下。"
    comp_titles: ["一人之下", "解忧杂货店 (中文版)", "深夜食堂", "罗小黑战记", "镖人"]
    reader_promise: "你脑子里那句循环了三年的话,有人替你打印成清楚的一页,然后替你把它放下。"
    marketing_angle: "如果『深夜食堂』开在 24 小时打印店——你改不完的那一版,有人替你想清楚。"
