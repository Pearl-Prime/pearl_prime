    series_logline: "上海某互联网公司一轮裁员,晚上 7 点公司清场——被裁员工交出工牌的那一刻,会被一只看不见的黑色大鱼短暂咬住肩膀;一位刚被裁的 40 岁 HR 选择留下,替每位同事帮这只鱼松口。"
    series_description: "项明月 40 岁,做了 12 年互联网 HR,这一轮她自己也在名单上。公司选择『集中清场』:晚上 7 点统一交工牌、统一收电脑、统一签协议。她交完自己的工牌之后,觉得肩膀一沉——她回头,看见一只半透明的黑色大鱼,咬着她的肩,鱼眼浑浊。鱼说话:『我不是来害你的,我是这件事的重量。』那一刻她明白:公司里所有今晚被裁的人,肩头此刻都咬着一只这样的鱼。鱼会跟着这位被裁的人回家、上床、起床、找下一份工作;它越久不松口,这个人下一份工作就越像在带病冲刺。她决定留下。每一卷她在一个被裁同事身上替他/她让鱼松口——方法是替对方完整说出『这件事不是因为我不够好』。这是这部作品里唯一的恐怖/黑暗元素：鱼不是抽象的，会咬，留印；但鱼也会松口。"
    opening_5_volume_arc:
      vol_1: "项明月自己肩头的鱼。她第一次面对它,说了一句话之后鱼松了一点点口。"
      vol_2: "第一位:32 岁男技术,他真正怕的不是失业,是回去告诉妻子。项明月替他陪练了一遍那段对话。"
      vol_3: "第二位:35 岁产品女经理,她在公司哭了一场——肩头的鱼第一次完全松口。"
      vol_4: "总监级别一位 44 岁男高管,他不承认有鱼。项明月没强行——她只留了一张纸条。一年后他来找她。"
      vol_5: "新一轮裁员名单。项明月已经不在公司编制里,但她回去——她带着一群同行业的『鱼松口者』。"
