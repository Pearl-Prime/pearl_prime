    reading_platform_fit: webtoon_vertical
    series_title: "思考者联盟的训练岛"
    series_logline: "广州一位过载到失眠的 Gen Z 文案,某晚在共享办公的安全门后面走进一座『想得太多的人才能进』的岛——这里的训练,是替自己把那把过于锋利的思维剑收进鞘里。"
    series_description: "余烟在某创业公司做文案,工作三个月体重掉八斤,主因是脑子停不下来。某晚加完班她去拉共享办公的消防门——门后不是楼道,是一片有海风的小岛。岸上立着一块牌子:『思考者联盟训练岛 · 仅限想得太多者』。岛上每位新人会发一把『思维剑』——剑刃长度对应反刍强度。她的剑出鞘四尺。训练员告诉她:在这里你不练剑更锋利,你练把它收回鞘里——一寸一寸。每一卷她解锁一种『收剑式』:命名情绪、暂停、问『这是事实还是想法』、给自己写信、放下。同伴是一支由各国想得太多的人组成的小队,每个人一种『过载心智』。"
    opening_5_volume_arc:
      vol_1: "余烟入岛,见自己的剑四尺出鞘。第一式:命名——她叫她的剑『再改一版』。"
      vol_2: "她遇见来自东京的同伴,他的剑是『家族期待』。两人对练第一次。"
      vol_3: "她学第二式:暂停。剑收回去三寸。回到现实后她第一次按时下班。"
      vol_4: "训练员第一次没出现。同伴们意识到训练员自己也是过来人,她的剑还没完全收回去。"
      vol_5: "余烟第三式:问『事实 vs 想法』。剑收回去一半。她开始在现实里替自己用这个问题。"
    comp_titles: ["神之塔", "全知读者视角", "一人之下", "葬送的芙莉莲", "鬼灭之刃"]
    reader_promise: "你脑子那把过于锋利的剑,可以一寸一寸地替自己收回鞘里——岛上有人教。"
