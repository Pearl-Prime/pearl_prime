    series_title: "闭乡客栈"
    series_logline: "云南山里一家『不接待没倦怠到底的人』的小客栈,前台是位前急诊护士,她替每位住客读一份只有她能看懂的『身体账本』——住到能起床、能哭、能要一份热饭为止。"
    series_description: "客栈在山脚,只有一条石板路通进去。老板娘姓姚,以前在三甲急诊干过十一年。她不卖民宿的标准 SPA 体验,她卖『停』。每位住客进门她先把脉,然后翻开一本只有她能看见字的账本——上面写的是这位客户身体欠下的『没睡过的觉』『没哭出的眼泪』『没吃完的饭』,用毛笔小楷一笔一笔写。她不会念出来,她只会替住客分房:你这个先睡七天;你这个先吃饭七天;你这个先什么都不干,看院子。每一卷一位住客,他/她到达时的『欠账』和离开时的『结清』不一样。客栈本身的院子里有一棵老梅树,是历代住客哭过的眼泪养的。"
    opening_5_volume_arc:
      vol_1: "第一位住客:互联网大厂裸辞的产品总监。账本上欠了 1,143 个小时的睡眠。先睡七天。"
      vol_2: "第二位:38 岁刚流产的女医生。账本上欠的是没哭出来的那一场。姚老板替她端来一碗醪糟。"
