    series_title: "三点钟停下的反刍小兽"
    series_logline: "成都一位 ADHD 自由职业插画师的桌上,一只番茄钟里住着只巴掌大的小兽,每当她开始反刍就替她按下暂停——慢慢小兽变成一群,每一只暂停一种情绪。"
    series_description: "陶七七是远程接稿的插画师,35 岁那年确诊 ADHD。她买了一只复古番茄钟,某天早上发现钟里趴着一只巴掌大的小兽,毛茸茸,只有她看得见。它在干一件她自己干不了的事——每当她开始反刍(比如想起客户三周前那句『再灵动一点』),小兽就用爪子按下番茄钟的暂停键。世界静音两秒。她回神。慢慢她发现不止一只:每一卷一只新的小兽到来,负责暂停一种情绪——比较、内疚、对儿时妈妈的怒、对自己拖延的羞耻。每只都需要她替它命名,然后小兽就稳下来。"
    opening_5_volume_arc:
      vol_1: "第一只小兽:暂停『再灵动一点』循环。陶七七第一次按时交稿。"
      vol_2: "第二只小兽:暂停和高中同学群里晒娃的比较反刍。"
      vol_3: "第三只小兽:暂停她对自己拖延的羞耻。这只最难命名。"
      vol_4: "番茄钟坏了一次。所有小兽都不见了。陶七七崩溃一晚,第二天发现是自己把它们装在了 to-do 清单里。"
      vol_5: "第四只小兽:暂停对妈妈那通电话的怒——这只来得最晚,也最大。"
    comp_titles: ["罗小黑战记", "一人之下", "夏目友人帐 (中文版)", "你的名字 (中文版)", "解忧杂货店 (中文版)"]
    reader_promise: "你脑子里那个停不下来的循环,有一只看不见的小东西替你按暂停。"
    marketing_angle: "如果『罗小黑战记』里的小妖怪们专门替你暂停反刍——一只一只,认识它们。"
