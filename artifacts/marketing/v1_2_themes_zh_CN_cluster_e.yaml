    series_description: "依依十六岁,高二二班,父母都在城郊开小餐馆;她是学校信息中心唯一的学生助理,负责重装系统、修打印机、重置密码,午休时在工位窗口边吃一盒酸奶。十月的一个周三,初一新生抱着平板来报修,说三班的网在第三节课特别慢。依依跑了几个速度测试,这个孩子的速度只有依依自己的八分之一。她查下去:三班所在的 305 教室,所有孩子都被限速;隔壁的 306 没有。依依翻校园网后台的接入表,发现两年前学校信息组用了一份 2018 年的『助学补助名单』来分宽带优先级——从来没人更新过。被限速的孩子,正是系统认为『不太需要网速』的那一群。每一卷一个孩子。每一卷一次悄悄重排接入表。长线:信息中心主任发现了,区电教馆发现了,依依必须学会:做这件事,不能因此变成宣传稿里的英雄。SPY×FAMILY 安静的能干,排球少年的同班细节。Gen Alpha 校园公民技术叙事。"
