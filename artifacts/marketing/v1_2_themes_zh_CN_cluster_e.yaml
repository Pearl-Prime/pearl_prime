  - series_id: digital_ground__zh_CN__chu_yi_xiao_cheng_xu_dui_wo_de_yi_tian_da_fen
    brand_id: digital_ground
    locale: zh_CN
    persona_archetype: GA-coder
    daily_life_anchor: school_commute
    portal_mechanic: app
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "十四岁的初二学生在编程社团的结课作业里,给班级写了一个储物柜整理小程序;小程序自己学会了在每天下午三点一刻给她发一片叶子——不是评价她做了什么,而是评价这一天对她的『代价』——她慢慢攒起一个只有同班好友的内测小群,大家信这片叶子。"
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "三点一刻的小叶子"
    series_logline: "初二学生写的小程序,每天放学前给她发一片叶子。叶子永远准。她开始悄悄分享。"
    series_description: "苏宁十四岁,初二二班,在校园编程社团第二年。班主任拜托社团做一个简单的『储物柜整理提醒』小程序,本来只是周二周四提醒大家换教材。上线两个月,小程序在自己学的事情上越走越远:每天下午三点一刻——课间操之后、晚自习之前——它会单独给苏宁推一个表情:绿叶、黄叶、红叶、黑叶。绿叶是『今天还行』,黄叶是『有点压』,红叶是『今晚要早睡』,黑叶很少出现。一周下来,她发现叶子永远准。第六周,苏宁开始把这件事告诉两个最近的朋友。她们的小程序也会发叶子。第十二周,十二个初二学生在一个秘密小群里——名字就叫『叶子』——每天互相翻译『今天这片黄叶是什么意思』。学校主任听说了,想把这个项目拿去区里做展示。苏宁要决定:这片叶子到底是她的,还是社团的,还是属于戴着它的那个同学。SPY×FAMILY 的赤诚,排球少年的同班细节,Gen Alpha 编程社团专属。"
    opening_5_volume_arc:
      vol_1: "第一片红叶。苏宁翘了一节兴趣班。妈妈问为什么,她把叶子给妈妈看。"
      vol_2: "苏宁把叶子分享给最好的朋友米娅。米娅的叶子总是黄的。两个人一起搞懂『黄』到底是什么。"
      vol_3: "第三个朋友加入。第一片黑叶——那个朋友的爸爸刚刚出差走得很远很久。苏宁明白:叶子的颜色可能不精确,但分量永远精确。"
      vol_4: "『叶子』小群成立。八个孩子。每周有一个人状态最差。小群是早期预警。"
      vol_5: "主任的邮件。区里想展示。苏宁和米娅一起写一句话回信:『叶子属于戴着它的那一个孩子。』"
    comp_titles: ["SPY×FAMILY", "排球少年", "葬送的芙莉莲", "罗小黑战记", "一人之下"]
    reader_promise: "有些日子是红的。小程序看见了红。朋友们知道该怎么办。"
    marketing_angle: "Gen Alpha 的第一个情绪仪表盘,一个初二学生写的,给所有初二学生。"
    genre_family: healing
    emotional_engine: competent_calm_specialist + chosen_family
    audience: "Gen Alpha 13-15 初中编程社团的孩子,以及拿到了内测邀请的朋友"

