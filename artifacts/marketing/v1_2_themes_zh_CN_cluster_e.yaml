    series_title: "弹幕里的小圆圈"
    series_logline: "高一女生在机房放学后直播。她写的弹幕软件,会标出那个快要撑不住的观众。"
    series_description: "温温十五岁,高一,自己会写一点前端,每周二周四放学后在学校三楼机房开两个半小时的直播,从下午三点四十五到六点十五。机房有一股旧键盘的味道。两个室友帮她当管理员,另一个朋友隔着一节课赶过来。粉丝是市里三所中学加起来固定的八十来个学生。怪事从十一月开始:她自己用业余时间写的那个弹幕分析软件——本来只是显示在线人数、弹幕密度和氛围值的——开始在某一个用户名旁边,贴一颗淡淡的小圆圈。她试过排查,圆圈永远是对的。她关不掉,关了直播间就崩溃。于是她改了规则:看到圆圈就提前十分钟下播,然后私信那个观众——今天月考怎么样,你妹妹好点没,你晚饭吃了没。每一卷一个圆圈,一次救援。长线:软件开始给温温自己贴圆圈,她要学会区分『管理员』和『要被照顾的人』。我的英雄学院的赤诚,排球少年的温度,罗小黑战记的现代妖怪感。Gen Alpha 的机房就是新的『班级活动室』。"
    opening_5_volume_arc:
      vol_1: "第一个小圆圈:高二男生小陶,四个晚上没睡。温温提前下播,陪他走到公交车站。"
      vol_2: "第二个圆圈:一个谎报年龄的初二女生。温温学到管理员最难的一课——有时候正确的帮助,是把她交给一个靠谱的大人。"
      vol_3: "第三个圆圈:温温自己最好的那个管理员。她一直在『装』。校园友谊的安静一刻——只是一顿食堂午饭。"
      vol_4: "软件同时给两个人贴了圆圈。温温必须选一个先帮。她选了更安静那个。她学到了分诊。"
      vol_5: "圆圈贴在温温自己头像上。两个管理员先发现的。这一次,直播间为主播提前十分钟下播。"
