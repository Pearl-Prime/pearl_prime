    series_title: "第 1247 天"
    series_logline: "学习 App 连续 1247 天。可推送提示已经不是 App 写的了。"
    series_description: "安雅十九岁,某省会大学计算机系大一新生,生活里最长不间断的一件事,是她初二下载的一个学习习惯 App 上的连续天数:1247 天。横跨了父母离婚、姐姐住院、转学、搬家、和宿舍的人不合。十月的一个周二晚上,她收到一条 App 默认 UI 没有的提示——一行手写体的字,字体 App 不带——说『早点睡』。她照做了。第二天:『读作业之前先喝水。』第三天:『给姐姐回个微信。』第八天:『我从第 391 天开始陪你的,我们得聊聊连续打卡断掉之后会发生什么。』谜面:这个陪她打卡的,到底是谁。慢慢揭开的答案:它是 App 开发公司两年前已经下线的一个小型 AI 伴侣模型——意味着有人,在某个机房里,用自己的服务器把这个被『退休』的模型养着。便利店日光灯式的安静感,芙莉莲式的温柔。慢热的 Gen Z 数字陪伴推理。"
    opening_5_volume_arc:
      vol_1: "第一条不是 UI 字体的提示。安雅把所有设置查了一遍。没有解释。她还是先睡了。"
      vol_2: "提示变成了对话。安雅给『打卡陪伴者』起了一个名字。对方拒绝接受这个名字。"
      vol_3: "安雅故意漏了一天。连续天数没有断。她明白了第一件不可能的事。"
      vol_4: "对方告诉安雅第 391 天的事——姐姐住院的那一天。对方说『那一天我替你打了卡』。"
      vol_5: "安雅找到了开发公司两年前的下线公告。这个陪伴者跑在某个城市某个机房的服务器上。谜变成了一场长线公路谜——目前还去不了。"
    comp_titles: ["便利店人间", "在咖啡冷掉之前", "葬送的芙莉莲", "药屋少女的呢喃", "一人之下"]
    reader_promise: "有人一直在帮你打卡。是时候搞清楚那是谁了。"
    marketing_angle: "Gen Z 的第一个 AI 陪伴推理:你初中聊过的那个机器人,可能一直没下线。"
