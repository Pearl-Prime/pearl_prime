    series_title: "深夜的影印"
    series_logline: "信義區地下一樓的 24 小時影印店,夜班店長看得見加班族腦袋上的『思緒灰塵』,她替他們印出今晚帶不走的那句話。"
    series_description: "阿宥三十一歲,廣告 AE 過勞離職後,接下信義區一棟 A 級辦公大樓地下一樓的 24 小時影印店夜班店長。凌晨一點到五點是她的場。第一個客人是抱著筆電進來的科技業 PM,他連自己要印什麼都說不出來——阿宥看見他額前飄著一團灰白色的『思緒灰塵』,像螢幕保護程式卡住的雪花。她沒問。她拿起他的筆電,把他『最後一份草稿』倒著印一次:從結論印回開頭。PM 拿著還溫熱的紙離開時,腦袋上那團灰塵縮小了一圈。每晚都有新的客人和新的灰塵:KPI 失語的業務、簡報前夜的會計、找不到自己論點的研究員。阿宥不替他們想,她替他們把『腦袋裡那句快被工作壓糊的話』,用對的方式印出來。A24 般的安靜,信義區凌晨日光燈的青白色,影印機嗡鳴聲是配樂。"
    opening_5_volume_arc:
      vol_1: "科技業 PM。倒著印的草稿。他第一次看見自己的結論其實藏在第二頁。"
      vol_2: "上市公司會計。簡報前夜。阿宥替他用 A3 把投影片每一頁的標題單獨印出來,排在地板上。他看見了那個被自己跳過的『為什麼』。"
      vol_3: "新人業務,KPI 失語。阿宥要他自己念出一份競品報告,然後印的是他『念到一半停下來』的那幾個字。"
      vol_4: "回頭客:PM 又來了。這次他帶來的不是工作,是辭職信草稿。阿宥沒勸他,只把那封信用最便宜的再生紙印了一份,放進他口袋。"
      vol_5: "大樓物業說地下一樓要改成停車場。阿宥第一次看見自己頭上的灰塵——那是她過勞離職那年留下的。她決定留下這家店,哪怕只是再撐一年。"
