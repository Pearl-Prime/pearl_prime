    series_description: "湘庭三十七歲,SOHO 平面設計師,有一個八歲的兒子。她在三十七歲那年被診斷 ADHD——和她兒子同一年。她長期的問題是『工作日不分白天黑夜、週末把家裡搞砸』。她在診所的諮商心理師給她一個極簡規則:每週三只做三件事,而且這三件事不准是工作。理由很簡單:你的腦袋需要一個固定的、低執行成本的、可以靠的『重置日』。湘庭開始記錄。第一個月她大部分週三都失敗——三件事她做了八件,因為她忍不住塞工作進去。第二個月她開始只塞兩件。第三個月她終於做到只三件。整本作品就是她接下來一年、52 個週三、52 份『今天的三件事』清單。沒有奇幻、純散文體、有清單視覺化頁面。"
