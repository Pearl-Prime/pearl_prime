    long_arc_spine: "一位剛畢業在新北板橋租屋的 Z 世代女生,每週三早上會收到一封『五年後的自己』寄回來的明信片——明信片上不寫人生大事,只寫一句話:『這週,把這件小事做完。』她照著做,五年後的自己也跟著改寫。"
    volume_runway_target: 180
    reading_platform_fit: webtoon_vertical
    series_title: "未來的我寄來的信"
    series_logline: "每週三早上,二十三歲的她收到三十歲的自己寄來的一張明信片,上面只寫一件小事——她的腦袋從此有了一個說話對象。"
    series_description: "婕安二十三歲,公館大學畢業後在新北板橋租了一間五坪雅房,在一間小型 SaaS 新創當客服。她有輕度 ADHD,從小被叫『分心鬼』。每個禮拜三早上,她信箱裡會出現一張沒有寄件人地址的明信片,郵戳是五年後的日期,字跡是她自己的——只是更穩。明信片上從來不寫人生大事(不會考公務員、不會結婚對象),只寫一件這禮拜該做完的小事:『把抽屜第二格清掉』、『打電話給高中那位生物老師』、『不要再追那個 podcast 了』。婕安開始照做。她發現:照做的那些禮拜,她的腦袋特別清楚。沒照做的那些禮拜,五年後的自己也好像跟著卡住——下一張明信片會晚一兩天才到。她漸漸明白:那位三十歲的自己,正在透過她,把過去自己沒做完的那些『一件小事』,一週一週幫忙補完。"
    opening_5_volume_arc:
      vol_1: "第一張明信片:『把抽屜第二格清掉』。婕安丟了五包過期的胃藥。她那週的腦袋出奇地清楚。"
      vol_2: "『打電話給高中那位生物老師』。老師現在在花蓮種有機米。三十分鐘的通話,婕安第一次明白自己討厭的不是『工作』,是『沒有意義感的工作』。"
      vol_3: "『不要再追那個 podcast 了』。那是她追了三年的職涯類播客。停聽的第三天,她終於想清楚自己其實想做的不是行銷。"
      vol_4: "一張明信片寫:『今天不要做任何事。』婕安違抗,加班到深夜。隔週三沒有明信片來。她哭了。"
      vol_5: "下下週,兩張明信片一起來。一張寫:『沒關係,我等你。』另一張寫:『現在,打開那個你三年沒打開的資料夾。』"
    comp_titles: ["解憂雜貨店", "用九柑仔店", "你的名字", "可不可以,你也剛好喜歡我", "未來的未來"]
    reader_promise: "你腦袋的混亂不需要被一次解決——只需要每週一件對的小事。"
    marketing_angle: "《解憂雜貨店》的 Z 世代板橋版本——但寫信的人是你自己。"
