    long_arc_spine: "新北汐止一間外商科技公司,九樓那層的會議室在每天下午三點過後會自動變成一片台灣低海拔森林——只有腦袋當機到一個程度的員工能看見它;新進的初階企劃妍希發現自己每次撐不下去,就會走進那座森林,在不同的會議室遇見不同的『森林居民』。"
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "九樓的森林"
    series_logline: "外商辦公樓九樓的會議室,下午三點過後會變成一片森林——只有快撐不下去的員工才能走進去。"
    series_description: "妍希二十四歲,中文系畢業,在新北汐止一間外商科技公司當初階企劃。她的主管是會議狂魔,妍希每天平均開七場視訊會。某個下午三點半,她偷溜進九樓的『日月潭會議室』想躲一下——推開門,迎面是一片低海拔濕地森林:筆筒蕨、姑婆芋、樹葉間漏下的午後光、遠處傳來的台灣藍鵲叫聲。她以為自己過勞幻覺。會議室外的同事說沒看見什麼森林。她開始試其他會議室:『太魯閣』裡是峽谷溪流、『阿里山』裡是雲海與紅檜、『陽明山』裡是芒草坡。每一間森林裡都有一位『居民』:可能是一隻黑長尾雉、一位戴斗笠的山林巡守員、一隻會說話的山羌。他們從不教她怎麼做,只陪她待半小時,然後她回到座位,腦袋的雜訊像被冷山泉洗過。"
    opening_5_volume_arc:
      vol_1: "日月潭會議室。黑長尾雉。妍希被罵簡報沒邏輯之後第一次進去。她坐在筆筒蕨旁邊,沒哭。"
      vol_2: "太魯閣會議室。山林巡守員。他只問:『你有沒有今天先喝水?』她沒喝。她去倒了一杯。"
      vol_3: "阿里山會議室。一位賞鳥的退休老師。他教她怎麼分辨綠繡眼和暗綠繡眼。她下班回家也分不清自己的焦慮種類了——但她不再執著要分清。"
      vol_4: "陽明山會議室。會說話的山羌。山羌說:『你不是不專心,你只是同時聽見太多。』妍希哭了。"
      vol_5: "公司宣布要把九樓全部改成 open space。妍希在『日月潭』裡待最後一個下午,她明白:森林一直在她腦袋裡,只是會議室借她一個入口。"
