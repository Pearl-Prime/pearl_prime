    series_description: "苑芹三十六歲,前精神科臨床心理師,離職後在台北中山區一條巷子裡開了一間只接預約的『記憶整理間』。她不開藥、不做諮商,她只用一面從她阿嬤手裡傳下來的舊鏡子,把客戶『自己藏起來』的那段記憶照回來。客戶都是高知識、高功能、卻被『我到底原本要做什麼』困住的中年人:離職想創業的工程師、想換跑道的會計師、家裡有特殊兒的全職媽媽。每一集,一位客人、一段被埋起來的記憶、一個被找回來的『原本』。但從第三集開始,苑芹發現:這禮拜的三位客人,被找回來的記憶裡都有同一條街——民生社區一條叫做『新中街』的小巷。第四集起,長期主線浮現:苑芹的阿嬤、她自己、她在新中街上失蹤過的某個下午,都在這條線索裡。"
    opening_5_volume_arc:
      vol_1: "離職想做手沖咖啡的工程師。鏡子照出他十二歲那年外婆教他磨咖啡豆的下午。"
      vol_2: "想換跑道的會計師。鏡子照出她國小作文比賽得獎那天,評審說的那句『你應該寫小說』。"
      vol_3: "全職媽媽。鏡子照出她大學畢業那年原本要去日本當交換生的那張機票——和她背後新中街的招牌。"
      vol_4: "苑芹開始私下走訪新中街。她遇見一位八十歲的舊書店老闆,認得她阿嬤。"
      vol_5: "舊書店老闆把一本筆記本交給苑芹。是她阿嬤年輕時的『記憶整理間』第一本登錄簿。第一個客人的名字——是苑芹自己十歲時的化名。"
