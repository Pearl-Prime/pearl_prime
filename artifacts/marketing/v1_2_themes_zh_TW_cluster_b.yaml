    series_description: "怡薇二十二歲,政大三年級,大二時被診斷 ADHD。她常覺得自己腦袋裡有一個別人看不見的『思想框架』——一個跳躍的、樹狀的、能同時看見三條線的思考方式——但每次學校要求她用『線性邏輯』寫作,她就崩潰。某天她在書院的圖書館書庫深處發現一道暗門,推開後是一個和現實台北平行的『腦島』:這裡的捷運是樹狀的、便利商店有五種同時開的入口、夜市的攤位以聯想跳躍排列。腦島只有 neurodivergent 能進入,居民都是 ADHD/自閉/讀寫障礙/高敏感型。每位居民腦袋裡都有一個獨特的『思想框架』,他們在這裡『鍛造』它,讓它變成可以拿出來對抗『標準化幽靈』——一群在台灣升學/職場無孔不入、想把所有人腦袋拉平成同一形狀的反派——的武器。怡薇從新手等級開始,每集解一個任務、認識一位框架鍛造者、升一級框架。Power escalation ladder 全套:框架等級、任務系統、本命同伴(她在腦島認識的一位自閉症少年木匠工坊主)、長期主線是『標準化幽靈的源頭』。"
    opening_5_volume_arc:
