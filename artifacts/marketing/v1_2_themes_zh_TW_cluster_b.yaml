    series_description: "羽彤二十五歲,大學中文系畢業,二十二歲被診斷出 ADHD。她離職後,在台北萬華區一條傳統商店街上租了一間五坪的舊診所改裝的小辦公室,掛上『不見的下一步偵探社』招牌。她的服務:NT$ 1500/件,接『一件事我突然開始不了』的委託——可能是寫不出論文最後一章、可能是寄不出對前公司主管的辭職信、可能是打不出去那通電話。她沒有福爾摩斯的演繹、沒有 Agatha Christie 的推理。她有的是 ADHD 那種看似散亂、其實能跳躍式抓出『卡住的真正點』的能力。每集一個委託、一個被找出來的真正卡點、一個小到不可思議的下一步動作。Mystery_cozy 的核心:案件本身是『下一步去哪了』,而每集都用偵探片節奏解開。"
    opening_5_volume_arc:
      vol_1: "委託:一位四十二歲的小說家寫不出第三章。羽彤一連問了八個亂跳的問題:你昨天午餐吃什麼?你媽媽姓什麼?你最後一次哭是因為什麼?——她抓出真正卡點:他怕主角像他爸。下一步:寫一頁主角『不像他爸』的小事。"
      vol_2: "委託:大學講師寄不出辭職信。羽彤問他:你上一次自己決定一件事是幾歲?他想到是七歲。下一步:把辭職信先念給七歲的自己聽。"
      vol_3: "委託:全職媽媽打不出去那通電話。羽彤問她:電話那頭是誰?是她跟自己媽媽斷絕關係十年的妹妹。下一步:不打電話,先寫一封不寄的信。"
      vol_4: "羽彤接到一個她解不了的案子——委託人是她自己的前主管,她當年逃離的那位。"
      vol_5: "羽彤發現:她每集解開的『下一步』,都和她自己小時候被卡住的點重疊。她決定開始為自己接一個長期委託。"
