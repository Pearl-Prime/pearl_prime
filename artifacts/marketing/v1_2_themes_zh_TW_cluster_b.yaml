    long_arc_spine: "一位三十四歲的女建築師,某天加班後在內湖科學園區附近一間招牌寫『請坐下,把你腦袋裡的咖啡店租給我們』的奇怪小店裡點了一杯黑咖啡——她發現店裡每張桌子坐著的『客人』,其實都是她腦袋裡同時在開會的不同自己;她開始把這間咖啡店當成內在心智的會議室。"
    volume_runway_target: 180
    reading_platform_fit: both
    series_title: "腦袋裡的咖啡店"
    series_logline: "三十四歲的女建築師在內湖某條巷子裡推開一扇門,發現裡面坐著的『客人』全都是她腦袋裡同時開會的不同自己。"
    series_description: "薇芸是一位三十四歲的執業建築師,內湖科學園區一家中型建築事務所的設計副理。她長期被『腦袋同時開五個會議』的內在喧鬧折磨。某個禮拜五加班到十一點,她推開巷口一扇從沒注意過的木門,發現是一間只有六張桌子的小咖啡店,招牌寫著:『請坐下,把你腦袋裡的咖啡店租給我們。』老闆是個臉模糊不清的中年女人。薇芸點了一杯黑咖啡。她環顧店裡:每張桌子坐著的『客人』,長得都像她自己——只是版本不同。一桌是『擔心媽媽身體』的薇芸、一桌是『想離職開個人工作室』的薇芸、一桌是『該不該結婚』的薇芸、一桌是『今晚的提案』的薇芸。她終於明白:腦袋裡那團混亂,不是她不夠專注,是她有太多個自己同時在說話。每一集,她和其中一桌坐下來,只跟那位自己對話。"
    opening_5_volume_arc:
      vol_1: "和『今晚的提案』的薇芸坐下。她說:你已經比業主想得清楚了,你只是怕被推翻。"
      vol_2: "和『擔心媽媽』的薇芸坐下。她說:那個檢查報告你還沒打開,因為你怕。打開它，今天。"
      vol_3: "和『想離職』的薇芸坐下。她說:不是要離職,是要把週六留給自己的作品集。"
      vol_4: "和『該不該結婚』的薇芸坐下。她說:你害怕的不是婚,是失去現在這個版本的自己。"
      vol_5: "她第一次看見『不太說話』那一桌的自己——是七歲那年,被罵『你怎麼又分心』的那個自己。她坐過去,沒說話,陪她。"
    comp_titles: ["解憂雜貨店", "腦內探險", "可不可以,你也剛好喜歡我", "千年女優", "用九柑仔店"]
    reader_promise: "你腦袋裡的吵不是缺陷——是你裡面有很多人,而他們都值得被一個一個坐下來聽。"
    marketing_angle: "《Inside Out》的台北內湖成年版本——把腦袋當成一間真的咖啡店來經營。"
