    series_description: "之婕大學畢業後本來要去台北做新媒體編輯。母親在她畢業前三個月走了。她照母親的意願,把骨灰帶回宜蘭壯圍——母親小時候住過的海邊小村。原本只是來一趟,結果村裡的小學缺一個代課老師,她沒打算留,但簽了一年。第一個清明,她帶班上小朋友去掃墓——有的小朋友家裡有兩座墓、有的根本沒人帶他去。她才發現,十二個孩子裡有九個經歷過失去:阿嬤、媽媽、爸爸、哥哥、剛出生就走的妹妹、爺爺、寵物狗、外婆、阿祖。她的代課合約一年一年續。每一巻是一個清明、一個孩子的故事、之婕自己的一次練習。海邊的風一直是鹹的。她媽媽在那片海裡。"
    opening_5_volume_arc:
      vol_1: "第一個清明。小敏帶班上去掃外婆的墓。之婕第一次去看自己媽媽的海。"
      vol_2: "夏天。轉學生阿翰從台北來,他的爸爸前年自殺。之婕教他怎麼在課本上畫一座『沒有墓碑的墓』。"
      vol_3: "颱風夜。小芸的阿祖一百零三歲走了。一整個村子辦喪。之婕第一次幫忙摺紙蓮花。"
      vol_4: "第二個清明。班上多了一個剛出生失去妹妹的女孩。之婕讓全班寫一封給『沒有名字的家人』的信。"
      vol_5: "代課合約到期。之婕決定不走了。她在海邊買了一間小屋,準備考正式教師。"
