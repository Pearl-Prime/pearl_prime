    series_title: "中元的紙錢店"
    series_logline: "鹿港老街上一間開了五十年的紙錢店,老闆娘今年七月才知道,她燒出去的庫銀會在客人夢裡變成一封回信。"
    series_description: "玉鳳阿嬤在鹿港老街上開紙錢店開了五十年。今年她六十二歲,本來打算頂讓給對面那家賣牛舌餅的。中元節前三週,孫女宥真從台北回來幫忙——念視覺傳達系剛畢業,正在跟自己賭氣要不要去日商。某天傍晚,熟客陳先生來訂庫銀:給三年前走的太太。玉鳳照單燒了。陳先生那天晚上做了一個夢,夢裡太太說了一句二十年前她想說沒說的話。陳先生隔週紅著眼回來,玉鳳才知道——她燒了五十年的紙錢,原來真的有人收到。她沒跟任何人說過,只想著怎麼把這件事告訴宥真,讓店留下來。可是宥真說:阿嬤,我不會做這個。一巻一個客人、一封中陰回信、一次祖孫之間遲遲說不出口的真話。"
    opening_5_volume_arc:
      vol_1: "陳先生與太太。第一次有人帶著夢回來。玉鳳第一次想:要不要告訴宥真。"
      vol_2: "做工的阿伯來燒給他父親。庫銀變成一句『阿爸從沒嫌過你愛喝酒』。"
      vol_3: "宥真自己接了一單。她不信,但還是照阿嬤的方法燒。客人三天後回來。"
      vol_4: "宥真在阿嬤的舊帳本後面看到自己媽媽——也就是阿嬤的女兒——的名字。媽媽走了二十年。"
      vol_5: "宥真決定燒一份庫銀給媽媽。她在夢裡收到回信。她決定留下來,但用自己的方式重新設計這間店。"
