    long_arc_spine: "二十五歲的女主角從外婆那兒繼承一本牛皮紙茶譜,每翻開一頁就會浮現出此刻全台北最思念外婆茶的人是誰;她照茶譜泡茶、騎著 125cc 機車送過去,慢慢拼湊出外婆從未告訴她的年輕時光。"
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "外婆的茶譜"
    series_logline: "二十五歲的她繼承了外婆留下的舊茶譜,翻開一頁就會浮出此刻最想念那一杯茶的人。她照著泡,騎機車送過去。"
    series_description: "盈方搬到新店租了一間有小陽台的套房後,在外婆的遺物紙箱底找到一本牛皮紙茶譜——封面寫『阿嬤的茶』。第一頁是青心烏龍。當天晚上她翻開,字底下浮出小小一行:『內湖區・李太太・今晚十一點』。盈方猶豫了二十分鐘,泡了一壺,裝進保溫瓶,跨上 125 機車。李太太是位獨居的退休護理師,茶到的時候哭了——她以前在外婆的茶行打工。盈方還來不及反應,李太太就說:『阿嬤泡這款茶的時候,水溫只用八十五度。』每一巻一杯茶、一個人。盈方一頁一頁翻,茶譜的背面有外婆細小的筆記:『水太燙、人就喝不久』、『泡給剛哭過的人,葉子要先沖一道水洗去澀』。外婆從沒告訴過盈方她年輕時的事,而台北的這些人正在替她說。"
    opening_5_volume_arc:
      vol_1: "青心烏龍。內湖李太太。八十五度的水溫。盈方第一次明白外婆是個有過去的人。"
      vol_2: "東方美人。永和的攝影師。茶譜的背面寫:『不要問他拍過誰』。盈方學會閉嘴。"
      vol_3: "鐵觀音。萬華的廟公。盈方知道外婆年輕時在艋舺賣過茶。"
      vol_4: "蜜香紅茶。基隆港邊的修船師傅。外婆原來有一個沒嫁的初戀。"
      vol_5: "包種茶。茶譜的最後一頁,寄件地址是盈方自己。外婆替二十五歲的孫女留了一杯。"
    comp_titles: ["用九柑仔店", "深夜食堂", "可不可以你也剛好喜歡我", "茶金", "海街日記"]
    reader_promise: "你以為自己什麼都不知道她的人生,可是她替你留了一本譜,一杯杯告訴你。"
