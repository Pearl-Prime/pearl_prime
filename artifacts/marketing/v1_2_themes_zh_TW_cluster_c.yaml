    volume_runway_target: 160
    reading_platform_fit: manga_traditional
    series_title: "七月的信箱"
    series_logline: "丈夫頭七過完那年的中元節,小靜在自家供桌上發現一個多出來的舊信箱;每七天會出現一封信,寄信人是這條巷子裡剛失去家人的某個人——而他們自己不知道有寄過。"
    series_description: "小靜三十六歲,住在大稻埕迪化街一棟三層樓的老房子。先生宥成走了一百天。七月十五那天傍晚,她照例把茶湯擺上供桌、燒一份庫銀;走回客廳時,看見供桌的紅木邊角多了一個從沒見過的鐵製舊信箱,大小約一塊磚頭。她打開,裡面是一封信:『家裡的鐵門我媽以前都是晚上九點半關。現在沒有人提醒我了。』沒有署名。她拿到巷尾的媽祖廟跟廟公低聲問,廟公點點頭:『七月的事情,有時候要寫回信。』小靜回家提筆。她不勸他別難過——她寫,鐵門可以由你自己關,只是現在你還沒準備好,先讓它開到十點半也沒有人會說你。她把信擺回信箱,信不見了。七天後,新的一封。一巻一封,巷子裡每個剛經歷喪事的人,他們自己沒寫過、卻被自己心裡最深的那一塊代寫的信,陸續送到小靜手上。死神的精準度+宮崎駿的溫度,在大稻埕的老巷裡。"
    opening_5_volume_arc:
      vol_1: "第一封。隔壁的阿嬤上個月走了,她兒子寫的——關於鐵門的時間。小靜把回信寫進茶湯的霧氣裡。"
      vol_2: "第二封。巷尾賣紅龜粿的阿伯走了,媳婦寫的——關於『公公以前都把粿留最後一塊給我』。小靜回信教她把那一塊粿留給自己。"
      vol_3: "第三封寄件人不在巷子裡,是宥成生前的同事。小靜第一次知道宥成在公司被叫做『會記得每個人生日的人』。"
      vol_4: "第四封來自一個八歲的小男孩。他媽媽剛走。字歪歪斜斜。小靜寫回信,改用注音。"
      vol_5: "第五封信寄件人——是小靜自己。是她自己沒寫過、卻被心裡最深處代寫的。她第一次坐下來,給自己回信。"
    comp_titles: ["用九柑仔店", "死神的精準度", "可不可以你也剛好喜歡我", "深夜食堂", "送行者"]
    reader_promise: "你心裡最深的那塊地方說不出口的話,有人會替你寫,也有人會替你寫回信。"
    marketing_angle: "如果《用九柑仔店》的雜貨店改成大稻埕老屋的供桌,信箱裡躺著的是你還沒能寫出口的那封信。"
