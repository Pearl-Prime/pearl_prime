    long_arc_spine: "東港燒王船祭典結束的隔天清晨,一位三十二歲的記者奉派回到自己出生的小鎮做後續報導;她發現王船灰燼之中,每年都會多出一些『沒人放上去』的祭品——是鎮上沒能正式告別的人們的遺物。她從一件件遺物追溯出鎮上那些被海洋、地震、車禍奪走的家庭故事。"
    volume_runway_target: 140
    reading_platform_fit: manga_traditional
    series_title: "燒王船的小鎮"
    series_logline: "東港王船祭結束隔天,記者回到出生的小鎮,發現灰燼裡每年都會多出沒人放過的遺物——是鎮上沒能好好告別的人們留下的。"
    series_description: "宛庭在台北做了八年地方版記者。今年王船祭,主編派她回東港跑後續。她沒提自己是東港人。祭典結束隔天清晨,海風還是鹹的,她跟著清掃志工去灰燼現場——按照習俗,王船燒過之後不撿、不留。可是宛庭看見一只小小的孩童雨鞋,黑底紅邊,完好無缺地立在灰裡。她拍了張照。回到台北一個禮拜後,她在母親留下的舊相簿裡看見同一雙雨鞋——那是她小學三年級的同學阿宏,後來被海帶走了。第二年她再回東港,灰燼裡又有一件東西。第三年又一件。一巻一件遺物、一個鎮上沒能好好說再見的家庭。宛庭發現自己其實一直在替小鎮做告別。"
    opening_5_volume_arc:
      vol_1: "黑底紅邊的雨鞋。阿宏。海。宛庭第一次回家。"
      vol_2: "一支斷掉的吉他絃。921 那年走的高中音樂老師。"
      vol_3: "一支沾了油漆的螺絲起子。鎮上修船廠的老師傅,前年中風走的。"
      vol_4: "一張燙金請帖。鎮上最後一場辦不成的婚禮——新娘前一天車禍。"
      vol_5: "宛庭自己的童年髮夾。她終於明白為什麼母親從來不准她回東港。"
    comp_titles: ["送行者", "陽光普照", "海街日記", "用九柑仔店", "返校"]
    reader_promise: "整個小鎮替你燒掉的,不只是王船,還有那些你沒有機會親口說的再見。"
