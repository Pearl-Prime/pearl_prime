    serial_engine: companion_roster
    long_arc_spine: "二十六岁的杭州姑娘把出租屋的门每周一到周五晚上七点到十一点不上锁,让她的小群聊朋友们随时可以来落脚。慢慢她发现这间老破小的房子自己在记录:谁在沙发上睡过,谁可以走得更近,谁这次不行。她学会读房子的语气,也学会读自己神经系统的语气。"
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "不上锁的出租屋"
    series_logline: "苏柠把门每天留四个小时不上锁,给她在杭州的几个朋友;房子开始替她数它疼的那几个人。"
    series_description: "苏柠二十六岁,在杭州一家社区大学做学生事务老师。二十一岁那年她和老家彻底安静下来后,她跟大学里凑出来的那几个朋友说过一句话——周一到周五晚上七点到十一点,门不上锁,谁累了都可以进来。三年下来,房子已经认得这几个常客了:暖气片在小陶过敏的那几天会自己咔嗒响一声;厨房灯在玛茜下了夜班回来的时候会自己变柔;沙发那一面靠垫,每次小俊她爸来杭州的那一夜会多出一个。苏柠不去较劲。她学会读这间房子的语法,跟她自己神经系统的语法是同一种——谁能靠近,什么距离是安全的,门口允许的是哪一种身体。每一卷有一个新的人来敲门:多年不联系的表姐、前任的新男友、奶奶过世后再没见过的亲堂弟。房子慢慢给出答复。罗小黑战记的温度,葬送的芙莉莲的耐性,一个读过所有神经系统书的不上锁的门。"
    opening_5_volume_arc:
      vol_1: "小陶的过敏,玛茜的夜班。第一周房子开始自己运转,苏柠给它取了个名字——叫『屋子』。"
      vol_2: "小俊她爸来杭州。沙发多了一个靠垫。苏柠学到,屋子愿意给她爱的人留出一块替他们悲伤的地方。"
      vol_3: "第一个陌生人——朋友的朋友,刚分手。门多走了九十秒才开。苏柠学到『安全』是屋子定的,不是她定的。"
      vol_4: "前任带新男友来敲门。门没开。苏柠在门里地上坐了一会儿,给前任发了一条很温和的微信。"
      vol_5: "多年没联系的亲堂妹来敲门。暖气片没有响。苏柠要决定:让屋子认识一个新的人,还是,屋子是对的。"
    comp_titles: ["一人之下", "罗小黑战记", "葬送的芙莉莲", "深夜食堂", "镖人"]
    reader_promise: "你的那几个朋友有地方落脚,屋子也站在你这一边。"
    marketing_angle: "把『罗小黑战记』搬进一间不上锁的杭州老破小——屋子会替你数它疼的那几个人。"
    genre_family: healing
    emotional_engine: chosen_family + boundaried_belonging
    audience: "24 至 29 岁、一线/新一线城市独居、有朋友群聊作为情感依靠的 Gen Z"

