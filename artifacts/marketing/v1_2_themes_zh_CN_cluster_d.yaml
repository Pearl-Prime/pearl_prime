    long_arc_spine: "三十三岁的女主在父母家收拾老物件时,翻出来一摞她初中 QQ 群里打印出来的聊天记录。她跟现在的朋友群一起重看——结果当年那几个十三岁的同学,开始在新的群聊里回话。"
