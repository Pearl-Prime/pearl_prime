    series_description: "苏念三十四岁,在上海做媒体。每年农历七月十五中元节,她妈坚持她一定要回武汉老家吃一顿饭——餐桌上一直多摆一副碗筷,妈妈说『给走了的人留个位置』。苏念小时候以为是个习俗。三十二岁那年的中元节,她坐在桌边突然感觉到那副多摆的碗筷那一边,空气是冷的——不是夏天的凉,是冬天的冷。一卷一年的中元节。一些她从来不知道的家事被妈妈和姑姑们慢慢说出来:那个空位是给苏念出生前夭折的一个哥哥的;另一年的空位是给爷爷自杀的那个朋友的;再另一年是给小姑年轻时打掉的孩子的。家里没人邪门,只是有几代人来不及说的话。苏念学会慢慢替家里把这些位置认下来。这部里的『冷』不是惊吓,是悲伤。一人之下的祖辈视角,镖人的克制,葬送的芙莉莲的耐性。不血腥,无恶灵,只有家族里没说完的话。"
