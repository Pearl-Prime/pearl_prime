    long_arc_spine: "二十二岁、社恐的大三学生在市图书馆失物招领处兼职。每一件失物背后,其实是一段被她主人也弄丢了的友谊。她把东西还回去,顺便把那段友谊还回去——慢一些,笨一些,从不准时。"
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "图书馆的失物招领处"
    series_logline: "苏屿在图书馆守失物招领处;那些被遗忘的东西,属于一段段也被遗忘的友情。"
    series_description: "苏屿二十二岁,武汉一所省属大学大三在读,每周二十小时在市图书馆失物招领处兼职——一个开着白炽灯、紧贴着借还书台后面的小屋。她社恐到那种课本式的程度:『请出示一下证件好吗』这句话,她在心里练过两千遍。每一卷她把一样东西还给一位失主,而每一样东西都是一段被这个人放下的友情留下的尾巴:高中最好的朋友送的歌单 U 盘、合租室友的一盆吊兰、夏令营换的那只编织手链。苏屿不讲大道理。她把东西还给对方,看对方决定要不要给那位朋友发微信。有的发了。有的没发。长线是:她自己十六岁时和最好的朋友画过的一张画,某一天也出现在失物招领处。一卷一个客人。社恐的、安静的、慢慢回温的。"
    opening_5_volume_arc:
      vol_1: "U 盘那张歌单。失主已经三十岁了,她没打电话,只是在地下车库里听完了。"
      vol_2: "室友的那盆吊兰。两位室友三年没说过话。吊兰快死了。苏屿摸出了正确的浇水周期。"
      vol_3: "夏令营手链。那位朋友已经过世了。失主还不知道。苏屿用够久的沉默替她讲了出来。"
      vol_4: "苏屿自己那张高中画出现在失物招领处。她没翻开背后的失物登记联。"
      vol_5: "她翻开登记联。给那位前最好的朋友发了一条微信。说『你还在吗』。本卷结束在那条对话框里。图书馆闭馆灯。"
    comp_titles: ["一人之下", "罗小黑战记", "解忧杂货店 (中文版)", "深夜食堂", "葬送的芙莉莲"]
    reader_promise: "那段你放下的友情,在失物招领处留了张小票。"
    marketing_angle: "把『解忧杂货店』搬进市图书馆失物招领处,值班的是一个跟你一样社恐的大三女生。"
