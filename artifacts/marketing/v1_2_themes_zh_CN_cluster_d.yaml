    long_arc_spine: "二十五岁的成都设计师跟五个朋友约定每个周日晚上七点在自己出租屋的小饭桌吃同样轮换的菜单。桌上有一只奶奶给的小绿本,每周聚会前,本子上会出现一句话——是今晚某个朋友最需要听到的那句。字迹谁都不认识。他们学会不张扬地读它。"
    volume_runway_target: 175
    reading_platform_fit: webtoon_vertical
    series_title: "周日七点的小绿本"
    series_logline: "五个朋友。一张小饭桌。一只奶奶留下的小绿本,每周替他们中的一个写好一句话。"
    series_description: "乐之二十五岁,在成都一家品牌设计工作室做初级设计师,是他们这个朋友群里出租屋最大的那一个,所以周日七点定在他这里。他们五个——娜娜、小贝、迪戈、米拉,加上乐之——吃一份轮换的家常菜,开一瓶最便宜的还能喝的酒,在桌上一只小绿本上轮流写几行字。这只本子是乐之的外婆走之前给他的。本子放在桌上,谁都可以翻。怪的是,每个周日吃饭之前,本子里已经写好了一句话——是当晚他们中的某一个最需要听到的那句,字迹谁都不像。他们学会了不张扬,学会了在合适的时候让一个人翻到那一页。一卷一个人轮到。长线是:某一个周日,有一个新的人被带到这张桌上,本子也替这个人写了一句。一人之下的踏实底色,深夜食堂的桌子,葬送的芙莉莲的耐性。"
    opening_5_volume_arc:
      vol_1: "娜娜本来要接的那个升职。本子里写:『周二还可以改主意』。她周三改的。"
      vol_2: "小贝她妈生病了。本子里写:『告诉迪戈』。迪戈他爸是同一个病。"
      vol_3: "迪戈带新男朋友来。本子替这位男朋友也写了一句。乐之到第四卷才给他看。"
      vol_4: "男朋友看到自己那一句,决定留在这个群里。本子从此替六个人写。"
      vol_5: "米拉要去深圳。本子替她写最后一句。椅子留着。本子继续替她写。"
    comp_titles: ["一人之下", "罗小黑战记", "深夜食堂", "解忧杂货店 (中文版)", "葬送的芙莉莲"]
    reader_promise: "你们每周的那顿饭,有一只本子记得每个人来这里要找的那一句。"
    marketing_angle: "把『深夜食堂』和『解忧杂货店』合成一只奶奶留下的小绿本——周日七点替你们写好那一句。"
