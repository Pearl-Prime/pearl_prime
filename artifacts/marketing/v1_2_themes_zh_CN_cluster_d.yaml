    series_title: "群聊里的西安"
    series_logline: "苏阮在父母家翻出来一摞初一 QQ 群打印出来的聊天记录;她现在的朋友群开始替自己的十三岁回话,而十三岁的那几个,也回了。"
    series_description: "苏阮三十三岁,在西安做新媒体内容主理人。回老家小寨那套老房子帮父母收拾的时候,她在床底纸箱里找出一摞 A4 打印纸——初一那年她和六个同学的 QQ 群,打了整整三百多页的群聊记录,她妈当年帮她打印下来留着。苏阮拍照发给她现在那几个三十多岁的朋友群,本来只是开玩笑。结果当晚,她现在那个群里出现了一条不是她们任何人发的消息,字迹和发言习惯完全是她十三岁的那一个同学:『你们后来怎么样了』。她们一开始以为是恶作剧。第二条出现的时候,所有人都安静下来。一卷一个十三岁的同学。她们替自己的十三岁,接起那一句没回完的话——一些十三岁的同学过得很好,一些没有。慢慢苏阮明白,她现在这个群,其实早就在替她那个初一群活着。"
    opening_5_volume_arc:
      vol_1: "第一句话出现。班上那个画画很好的女同学,她现在在哪儿。苏阮她们试着回了一句。第二天发现回话没显示,但她们群里多了一句新的——『画我没再画了』。"
      vol_2: "那个总是欺负苏阮的男生,他十三岁那时候过得也不好。苏阮成年的群替十三岁的苏阮回了一段长话。"
      vol_3: "数学课代表。她考上了西交大,后来没了消息。苏阮托现在那个群里在西安的朋友查到了她家。"
      vol_4: "苏阮自己十三岁的那一条出现在群里。她现在这个群替她回。"
      vol_5: "最后一个同学,谁都不记得她姓什么。苏阮的群替她拼回了她的名字。打印纸最后一页是她说的最后一句。"
