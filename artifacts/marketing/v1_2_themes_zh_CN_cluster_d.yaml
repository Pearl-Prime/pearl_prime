    series_title: "转租的一年期约"
    series_logline: "两个陌生人,一份合同,十二个月小默契。到第六个月的时候,他们已经需要给它起个名字了。"
    series_description: "苏野二十四岁,刚从一段四年的恋爱里走出来;陈愈二十六岁,刚念完研究生。两个人都需要一间能住的房子。豆瓣租房小组上那份转租合同正好——一年,北京双井,两室一厅,合用厨房。到第二个月,他们已经发明了周三晚上一起做意面的小习惯,周日晚上不打扰对方的安静时段,还有那条没说出口的规则——卫生纸归谁买。第四个月他们在同一张沙发上各自发自己的微信。第六个月两个人都没在跟谁谈恋爱,他们之间也没有在谈——他们在做三十六件像恋爱、又像友情、还没有名字的小事。每一卷一个月。一整套是十二卷。长线就是合同到期那天他们要不要给这件事起个名字。慢热的爱情线。不上肉,直到他们决定它有名字。Honey Lemon Soda 的温度,带着实打实的房租。"
    opening_5_volume_arc:
      vol_1: "一月。合同签下来。第一个周三的意面。陈愈不吃葱,苏野星期二才学到。"
      vol_2: "二月。第一次吵架——这次该谁给中介发消息。两个人发明了周日安静时段。"
      vol_3: "三月。苏野前任发微信。陈愈那个周三一个人做的意面。苏野还是回家了。"
      vol_4: "四月。陈愈他妈来北京。问他们俩是不是在一起。两个人都没接话。他妈请他们一起吃了顿涮羊肉。"
      vol_5: "五月。两个人合力装了一个宜家书架。架子上两人的书都有。架子上没有一个分类是写他们俩的。"
    comp_titles: ["一人之下", "罗小黑战记", "深夜食堂", "葬送的芙莉莲", "Honey Lemon Soda"]
