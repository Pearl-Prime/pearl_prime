    series_title: "The Subtraction Journal"
    series_logline: "Maya's bullet journal stopped letting her add to it. Each page lets her subtract one habit instead — and what's left turns out to be the actual person."
    series_description: "Maya, 22, is a bullet-journal-lifestyle creator with 240k followers and four years of color-coded productivity videos. The day she opens her new Leuchtturm1917, the first page is already written in her handwriting: a single instruction — 'subtract one.' She writes the habit she most wants to drop: doom-scroll before sleep. The page glows once and erases. The habit is gone. The next page: subtract one. Each volume she names one cognitive habit — checking email before breakfast, comparing in private, planning four steps ahead, narrating her life as content — and lets the journal take it. The followers notice. The content shifts. The long arc: what is the asymptotic minimum self? Is there a page she shouldn't turn? And whose handwriting was on page one?"
    opening_5_volume_arc:
      vol_1: "Page one. Doom-scroll. The journal erases. Maya sleeps."
      vol_2: "Email before breakfast. The journal erases. Maya tastes oatmeal for the first time in a year."
      vol_3: "Comparing in private. The journal erases. Maya posts the worst piece of content of her career, and it lands."
      vol_4: "Planning four steps ahead. The journal erases. The followers riot."
      vol_5: "Narrating her life as content. The journal erases. The creator is gone. The person remains."
    comp_titles: ["The Apothecary Diaries", "What You Are Looking For Is in the Library", "Minimal Mind (Marie Kondō's tonal cousin)", "Witch Hat Atelier", "The Library at Mount Char (atmosphere)"]
    reader_promise: "What's underneath the optimization? Find out one habit at a time."
    marketing_angle: "Marie Kondō meets Frieren — for the bullet-journal generation that is starting to suspect it has been performing."
