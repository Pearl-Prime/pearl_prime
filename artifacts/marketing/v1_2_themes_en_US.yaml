    series_description: "Reya is a 26-year-old product manager at a mid-stage Series B startup in Austin. She is good at her job because she can see what no one else can: each coworker mid-decision has a small grey yokai perched on the non-dominant shoulder, whispering every catastrophe outcome. Reya, in five-minute one-on-ones, names the catastrophe the yokai is whispering, lets the coworker hear it, and watches the coworker actually decide. The yokai do not leave when satisfied — they migrate to Reya's office and join a slowly-growing roster of advisors who help her see her own decisions. Volume eight: there are seven yokai in her office plant. Volume twelve: her CEO asks her into his office and his yokai is the size of a desk. The long arc: the yokai are mapping something. They are not just observers."
