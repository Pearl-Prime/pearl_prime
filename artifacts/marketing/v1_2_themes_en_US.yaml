      vol_1: "First five-minute meeting. The designer's yokai is named. The decision is made."
      vol_2: "The PM's yokai. A different shape. Same five-minute rhythm."
      vol_3: "Engineering manager. The yokai is large. The conversation runs over."
      vol_4: "The first yokai migrates to Reya's plant. The roster begins."
      vol_5: "The CEO's office. The desk-sized yokai. Reya's own five-minute clock starts."
