# V1.2 Manga Series Themes — en_US
#
# Authority: V1.2 framework = PR #1051 (magical_register + serial_engine + long_arc_spine
# + opening_5_volume_arc) AND PR #1053 (Gen Z / Gen Alpha portal-anchor pattern with
# persona_archetype + daily_life_anchor + portal_mechanic + episodic_frame_per_volume
# + volume_runway_target + reading_platform_fit).
#
# Source briefs (read both before editing this file):
#   - artifacts/research/manga_bestseller_magical_serial_framework_2026-05-12.md  (PR #1051)
#   - artifacts/research/manga_genz_genalpha_portal_framework_2026-05-13.md       (PR #1053)
#
# Scope (this file):
#   - locale:           en_US
#   - brands:           25  (V1.1 brand allocation per artifacts/qa/worldwide_catalog_37_brand_allocation_plan_2026-05-11.tsv)
#   - series per brand: 5
#   - total series:     125
#
# Sibling files (other locales authored separately):
#   - artifacts/marketing/v1_2_themes_ja_JP.yaml   (pending)
#   - artifacts/marketing/v1_2_themes_zh_TW.yaml   (pending)
#   - artifacts/marketing/v1_2_themes_zh_CN.yaml   (pending)
#
# Voice register: A24/Ghibli for Gen Z. Clinical-adjacent vocabulary that Gen Z arrives
# with (regulating, nervous system, RSD, executive function). Specific sensory daily-life
# detail over abstract wellness noun. Chosen-family, queerness, neurodivergence as default
# not theme. No TikTok lingo (rizz, no cap, fr fr) — dates within 18 months.
#
# Schema (per series, V1.2):
#   series_id, brand_id, locale, persona_archetype, daily_life_anchor, portal_mechanic,
#   episodic_frame_per_volume, magical_register, serial_engine, long_arc_spine,
#   volume_runway_target, reading_platform_fit, series_title, series_logline,
#   series_description, opening_5_volume_arc (vol_1..vol_5), comp_titles, reader_promise,
#   marketing_angle, genre_family, emotional_engine, audience.

schema_version: "1.2"
locale: en_US
total_series_target: 125
total_brands_target: 25
series_per_brand_target: 5

series:

  # ════════════════════════════════════════════════════════════════════════════
  # BRAND 01 / 25 — stillness_press (flagship · josei · anxiety)
  # ════════════════════════════════════════════════════════════════════════════

  - series_id: stillness_press__en_US__late_night_seven_eleven_quiet_things
    brand_id: stillness_press
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: F4_retail_service
    portal_mechanic: P_object
    episodic_frame_per_volume: E_customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "Each anxious customer who walks in at 3 a.m. carries a small fluorescent creature only the clerk can see; she stocks the right product AND the right pocket-ritual, and slowly learns whose creatures these were before they were anyone's."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The 3 A.M. Aisle"
    series_logline: "A Gen Z 7-Eleven clerk sees the small fluorescent creatures riding each anxious customer's shoulder; she stocks the shelf that fits."
    series_description: "Mio works the graveyard shift at the only 7-Eleven open in her neighborhood. The fluorescent lights buzz on a frequency she's stopped hearing. The first customer of the night is a paralegal who can't sleep, and Mio can see the small flickering thing perched on his shoulder. She rings up his decaf, his lavender candy, and slips him a folded square of paper with one sentence on it — the thing to say to himself when the panic comes back. The creature stays. He leaves. Each night brings a new customer and a new creature: rent-doom, dissertation-spiral, the ex's new partner. Mio doesn't fight them. She finds the shelf-item and the pocket-ritual that lets the customer go home carrying it a little better. A24-quiet. Ghibli-warm. Convenience-store-fluorescent."
    opening_5_volume_arc:
      vol_1: "First customer: the paralegal whose creature is the size of a moth and won't stop flapping. Decaf. Lavender. A sentence about the body coming home."
      vol_2: "The art student whose creature is invisible until she opens her phone — comparison-anxiety as a small mirrored thing."
      vol_3: "The night-shift nurse whose creature is going dark from being held too long. Mio learns she can stock for grief-fatigue too."
      vol_4: "The first repeat customer. The paralegal returns. His creature is smaller. Mio sees one perched on her own shoulder for the first time."
      vol_5: "The manager-on-call review. Mio is told she's too slow on inventory. The store's own creature — corporate-burnout-yokai — is named. Mio decides to stay."
    comp_titles: ["Convenience Store Woman (Sayaka Murata)", "The Apothecary Diaries", "After the Quake (Murakami)", "Tokyo Ueno Station", "Sweet Bean Paste"]
    reader_promise: "Your anxiety has a shape and a clerk who knows your shelf."
    marketing_angle: "If Convenience Store Woman had a wellness ghost story inside it — and the ghost was kind."
    genre_family: supernatural_everyday_wellness_episodic
    emotional_engine: competent_calm_specialist + chosen_family
    audience: "Gen Z 23–27 first-job urban knowledge workers with named-and-claimed anxiety"

  - series_id: stillness_press__en_US__girl_with_pocket_ledger
    brand_id: stillness_press
    locale: en_US
    persona_archetype: GZ-uni
    daily_life_anchor: F2_content_creator
    portal_mechanic: P_object
    episodic_frame_per_volume: E_song_recipe_case
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A pocket ledger inherited from a dead grandmother shows the anxious thought of any person it touches; each volume the protagonist learns one practice to give the thought back."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "The Pocket Ledger"
    series_logline: "A university student inherits a small leather notebook that writes down what the nearest person is afraid of — and slowly learns to give the fear back."
    series_description: "When Iris's grandmother dies she inherits a notebook the size of a deck of cards and a single instruction: keep it close, never read it on the bus. The first time she opens it on a bus she sees her seatmate's panic written in her grandmother's handwriting — a girl who is failing her chemistry exam tomorrow. Iris cannot stop the writing, but she can answer it. Each volume she learns one small practice — a breath, a 5-4-3-2-1 grounding, a re-frame, a permission — that, when said aloud, lets the page erase itself and the fear leave the seatmate's body. The ledger fills, then empties, then fills. The mystery: the ledger has a final page that has been blank Iris's whole life. Whose name is going to appear on it? Slow-burn campus iyashikei. Pomeranian roommate. A library that closes at midnight."
    opening_5_volume_arc:
      vol_1: "The girl on the bus. Chemistry exam. The breath. The page erases."
      vol_2: "The bus driver. A father-of-three terrified of being laid off. A different practice. The ledger fills, then empties."
      vol_3: "Iris's roommate, Pomeranian-loud. The ledger writes itself without being opened. RSD made visible."
      vol_4: "A stranger Iris cannot place. The fear is grief — for someone Iris doesn't know yet."
      vol_5: "The grandmother's handwriting changes. The first hint that the ledger has been writing back."
    comp_titles: ["The Apothecary Diaries", "Frieren: Beyond Journey's End", "The Bookbinder's Notebook (Sōsuke Natsukawa)", "Before the Coffee Gets Cold", "What You Are Looking For Is in the Library"]
    reader_promise: "Every fear has a practice. The practice fits in a notebook."
    marketing_angle: "A24-college slow-burn meets Frieren's grief-permission via a tiny inherited notebook."
    genre_family: magical_realism_wellness_episodic
    emotional_engine: inherited_wisdom + competent_calm_specialist
    audience: "Gen Z 18–22 university students with mental-health vocabulary and a dead grandmother"

  - series_id: stillness_press__en_US__roommate_who_can_see_my_anxiety
    brand_id: stillness_press
    locale: en_US
    persona_archetype: GZ-queer
    daily_life_anchor: F1_app_social
    portal_mechanic: P_mascot
    episodic_frame_per_volume: E_customer
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "A queer 24-year-old's anxiety manifests as a small house-yokai only her new roommate can see; the roommate is a witch-of-the-mundane who introduces the protagonist to a slowly-growing roster of similarly-yokai-burdened friends."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "The Roommate Who Can See My Anxiety"
    series_logline: "Asha moves in with a stranger from a Discord listing and discovers the stranger is a witch-of-the-mundane who can see the small grey creature Asha has lived with since age fourteen."
    series_description: "Asha is a 24-year-old non-binary illustrator who has been managing the small grey creature since high school. The creature follows them everywhere — into showers, onto buses, into bed. They have never told anyone. The new roommate, Nour, a queer Lebanese-American forensic accountant who knits, looks up from the cereal box on day three and says, casually, 'Hi, little friend.' Each volume Nour introduces Asha to one more friend whose creature she can also see — a transmasc barista with an octopus on his back, a deaf grad student with a tiny crow in her hair, a polyamorous polyglot with three small companions. The roster grows. The creatures soften. The long arc: who taught Nour to see them, and why is Nour's own creature the largest of all? Queerness, neurodivergence, and intergenerational trauma are baseline; the case-of-the-week is not coming-out but coming-into."
    opening_5_volume_arc:
      vol_1: "Move-in day. The cereal box conversation. Asha cries in the bathroom in relief, not shame."
      vol_2: "The transmasc barista. The octopus on his back is named. Coffee shop becomes a third-place."
      vol_3: "The deaf grad student. The crow in her hair speaks ASL. The roster is four."
      vol_4: "Asha's family Zoom call. The creature triples in size on screen. Nour stays in frame."
      vol_5: "Nour's own creature, glimpsed once at 2 a.m. in the kitchen, taller than Nour. The mystery opens."
    comp_titles: ["Heartstopper", "Our Dreams at Dusk (Shimanami Tasogare)", "I Think Our Son Is Gay", "The Bride Was a Boy", "Witch Hat Atelier"]
    reader_promise: "Your anxiety is real, it has a shape, and your people see it and stay."
    marketing_angle: "Heartstopper's chosen-family register applied to clinical-adjacent Gen Z anxiety, with a witch-of-the-mundane lead."
    genre_family: supernatural_everyday_queer_chosen_family
    emotional_engine: chosen_family + named_and_seen
    audience: "Gen Z 22–28 queer and neurodivergent urban creatives, mental-health-literate"

  - series_id: stillness_press__en_US__last_panic_attack_of_yui_ito
    brand_id: stillness_press
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: F3_transit_commute
    portal_mechanic: P_transit
    episodic_frame_per_volume: E_locale
    magical_register: supernatural_everyday
    serial_engine: location_anthology
    long_arc_spine: "A 26-year-old's last panic attack stranded her on a subway platform that runs one stop further than the map shows; each volume she finds a new station that exists only when someone on the line is mid-attack — and helps the person there step off."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "One Stop Further"
    series_logline: "Yui Ito had her last panic attack on the F train and discovered a station that isn't on any map — and that she can come back to it whenever someone else needs it."
    series_description: "Yui is 26 and had her first panic attack in college, her worst at 23, her last on the F train at 2:11 a.m. She got off one stop further than her usual exit and the station was wrong: tiled in a color she had never seen, lit by a moon-shaped bulb, manned by a clerk who handed her a paper cup of warm barley tea and said, 'You can come back here whenever.' She did not believe it. The next time someone on her line had a visible panic attack she rode past her stop and the moon-station opened. Each volume she finds a new in-between station on a new line in a new city — the F, the Yamanote, the London Northern, the Taipei Brown, the LA Metro Gold. Each station is staffed by someone who once stepped off there. Each volume she helps one person step off. The long arc is who built the line, and what the last station looks like."
    opening_5_volume_arc:
      vol_1: "The F train. The first return. A teenage boy mid-attack. Barley tea. The first sentence: 'You can come back here whenever.'"
      vol_2: "The Yamanote. A salaryman on the Sunday-night-train. The station is named. Yui meets the clerk who handed her the cup."
      vol_3: "The London Northern. A grad student mid-thesis. Yui learns the stations are also exits — you can stay if you want."
      vol_4: "The Taipei Brown. A creator influencer mid-collab-meltdown. Yui's first multi-person case."
      vol_5: "The LA Metro Gold. Yui's own old roommate, mid-attack, recognizes Yui. The personal stakes open."
    comp_titles: ["Spirited Away", "The Midnight Library", "Frieren", "Before the Coffee Gets Cold", "After Dark (Murakami)"]
    reader_promise: "The worst night had a door, and you can come back through it for someone else."
    marketing_angle: "Spirited Away on the subway, for the generation that names panic out loud."
    genre_family: supernatural_everyday_transit
    emotional_engine: paying_it_forward + competent_calm_specialist
    audience: "Gen Z 24–29 transit-city first-job knowledge workers"

  - series_id: stillness_press__en_US__sunday_apothecary_pocket_rituals
    brand_id: stillness_press
    locale: en_US
    persona_archetype: GZ-firstjob
    daily_life_anchor: F4_retail_service
    portal_mechanic: P_object
    episodic_frame_per_volume: E_song_recipe_case
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 25-year-old runs a Sunday-only apothecary shop where each anxious customer leaves with one tiny ritual — a folded note, a smoked tea, a knotted thread — and the protagonist slowly accumulates the master ritual that calmed her own grandmother fifty years ago."
    volume_runway_target: 200
    reading_platform_fit: webtoon_vertical
    series_title: "The Sunday Apothecary"
    series_logline: "Open Sundays only. Each customer leaves with one tiny ritual. Each ritual was once someone else's, and someday will be someone else's."
    series_description: "Reni inherited a single key and a single instruction: the shop opens Sundays only, between 11 and 5. The shop is the size of a walk-in closet, on the second floor of a converted brownstone in Brooklyn, and the inventory looks like nothing — a jar of folded notes, a small drawer of smoked tea leaves, a tray of knotted threads. The customers find their way. Each Sunday Reni listens, asks one question, and reaches for one item. The customer leaves with a pocket-ritual they can do in 30 seconds anywhere — at a desk, on a train, in a bathroom stall. The shop's stock replenishes only when a customer returns and donates back the ritual that worked, slightly altered. The long arc: Reni's grandmother — the original keeper — wrote down one ritual she never gave to anyone. It is folded in the back of the cash drawer. The book Reni is, slowly, becoming."
    opening_5_volume_arc:
      vol_1: "First Sunday open. A woman in her 50s. A folded note. The note that calmed her father in 1982."
      vol_2: "A college freshman. A smoked tea. The protocol: brew, smell, do not drink. The ritual leaves with her."
      vol_3: "A high-school teacher in a school shooting drill aftermath. A knotted thread. The thread is named."
      vol_4: "First return-customer. The woman from vol_1 brings back the note, altered. The shop's inventory grows."
      vol_5: "Reni opens the cash drawer for closing. The grandmother's folded note is visible for the first time, but not yet read."
    comp_titles: ["The Apothecary Diaries", "Sweet Bean Paste", "The Cat Who Saved Books", "Days at the Morisaki Bookshop", "The Travelling Cat Chronicles"]
    reader_promise: "Every Sunday, one small thing you can put in your pocket and use Monday."
    marketing_angle: "The Apothecary Diaries reframed for Gen Z urban wellness — one pocket-ritual at a time."
    genre_family: magical_realism_wellness_episodic
    emotional_engine: competent_calm_specialist + inherited_wisdom
    audience: "Gen Z 24–29 urban Gen Z wellness-curious first-job"

