  - series_id: cognitive_clarity__en_US__doom_scroll_rescue_agency
    brand_id: cognitive_clarity
    locale: en_US
    persona_archetype: GZ-uni
    daily_life_anchor: F1_app_social
    portal_mechanic: P_app
    episodic_frame_per_volume: E_customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "A 21-year-old CS major discovers an anti-doom-scroll app that costs her 12 minutes of her life every time she opens it for someone else — and each customer's thought-loop is named, mapped, and gently exited."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "Doom-Scroll Rescue Agency"
    series_logline: "Open the app, scroll once, and you'll see the actual thought your friend is stuck on. Helping costs you 12 minutes of your life. Use sparingly."
    series_description: "Vee is a junior CS major with an honors thesis and a 4 a.m. doom-scroll habit she has named and is failing to manage. She finds the app by accident — a notification with no source. The app shows one thing: the actual thought-loop the nearest friend is stuck on, rendered as a small visible animal that orbits their head. Vee can intervene. Each intervention costs her 12 minutes of her own life — measured, accurate, deducted from the back end. The first volume she pays it gladly. By volume three she is keeping a ledger. Each volume is one rescue: an art-school friend's comparison-loop (a small mirrored mouse), a roommate's catastrophizing-spiral (a snake that ties itself into knots), a TA's imposter-thought (a chameleon that turns the color of whoever she's standing next to). The long arc: the app was built by someone. The 12 minutes are going somewhere. Vee's own thought-loop has been growing this whole time."
    opening_5_volume_arc:
      vol_1: "The notification. The mirrored mouse. Vee's first 12 minutes."
      vol_2: "The snake. The roommate. Vee's ledger begins."
      vol_3: "The chameleon. The TA. Vee notices her own loop has grown."
      vol_4: "First repeat-customer. The art-school friend asks for it. Vee is asked to stop. She doesn't."
      vol_5: "The app's developer leaves a comment. The 12 minutes are going TO someone."
    comp_titles: ["Solo Leveling", "The Apothecary Diaries", "Death Note (early acts, structure)", "Eden of the East", "Sayonara Football"]
    reader_promise: "Your runaway thought has a shape, a name, and a way out."
    marketing_angle: "Death Note's escalating-cost structure applied to mental-health intervention — for the generation that names rumination out loud."
    genre_family: magical_realism_thriller_wellness
    emotional_engine: escalating_cost + competent_calm_specialist
    audience: "Gen Z 18–22 university overthinkers, CS / honors-track, mental-health-literate"

  - series_id: cognitive_clarity__en_US__animal_in_the_office
    brand_id: cognitive_clarity
    locale: en_US
    persona_archetype: GZ-neurodiv
    daily_life_anchor: F1_app_social
    portal_mechanic: P_mascot
    episodic_frame_per_volume: E_customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "An ADHD junior data scientist sees every distraction in her open-plan office as a small animal — a fox at the coffee machine, an octopus around her monitor — and each volume she befriends one until it stops interrupting."
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "The Animal in the Office"
    series_logline: "Kiri can see the small fox at the coffee machine, the octopus on her monitor, the magpie in the Slack channel — and she's learning to feed each one so it stops interrupting her."
    series_description: "Kiri is 25, two years post-undergrad, three months into a junior data-science role at a mid-sized company in Toronto. She has been ADHD-diagnosed since 19 and has tried four medications. The animals appeared in week two of the new job. They are not hallucinations — she can will herself to ignore them — but she can also see them clearly: a small red fox that lives at the coffee machine, a translucent octopus that wraps her monitor cables, a magpie that perches on the Slack icon. Each volume she befriends one. The trick, she discovers, is not to chase them off but to ask what they want, give it once, and watch them quiet down. Volume four: she discovers her CTO can also see them. The long arc: where did the animals come from, and why does Kiri's own animal — never named, never quite seen — get larger every time she ignores it?"
    opening_5_volume_arc:
      vol_1: "The fox at the coffee machine. Kiri brings it sugar. It quiets."
      vol_2: "The octopus on the monitor. Kiri unplugs one cable. It re-coils on her wrist, smaller."
      vol_3: "The magpie. Slack. Kiri mutes one channel. The magpie sleeps."
      vol_4: "The CTO. He has a wolf. He has been managing it for 30 years. Mentorship begins."
      vol_5: "Kiri glimpses her own animal in the bathroom mirror. It is the size of a deer. The name has not arrived."
    comp_titles: ["A Man and His Cat", "The Apothecary Diaries", "Skip and Loafer", "Recovery of an MMO Junkie", "Wotakoi: Love is Hard for Otaku"]
    reader_promise: "Your distraction is an animal, and animals can be befriended."
    marketing_angle: "ADHD-literate workplace iyashikei — Skip and Loafer for the diagnosed-and-claimed Gen Z."
    genre_family: magical_realism_workplace_neurodivergent
    emotional_engine: named_and_seen + competent_calm_specialist
    audience: "Gen Z 24–28 ADHD/neurodivergent first-job knowledge workers"

