    series_description: "霍未未三十岁,离异,带七岁女儿住广州海珠区一片城中村。她在城中村片区做京东末端配送员四年了。每年农历七月十五前后,她的派件单上会突然多出来一批奇怪的包裹:没有寄件人、没有上家面单、商品是日常的——一盒桂花酱、一双布鞋、一本旧相册、一张老演唱会的门票、一支水笔。收件地址在城中村某户,收件人名字却是早就过世的人。她第一年不敢送,送了发现:收件家属会愣一下,但会接下来。她慢慢明白这是城中村小区一种自发的祭祀方式——还在的家人,假装下单给已经走了的人。霍未未替双方多说一句话:『阿姨,这是阿叔生前最爱的桂花酱』。一卷一户,一卷一件。她自己的母亲三年前走了,她从来没下过单给母亲。最后一卷她下了第一单。"
    opening_5_volume_arc:
      vol_1: "桂花酱。失去丈夫五年的阿姨。霍未未替她接了一句话。"
