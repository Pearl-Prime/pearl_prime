    serial_engine: case_of_the_week
    long_arc_spine: "奶奶留下来的一只老樟木菜谱盒,每次打开都会递出一张菜谱——那是今天这座城里最想念奶奶的人最爱吃的一道。主人公一卷做一道,慢慢看清菜谱背面奶奶写的小字。"
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "奶奶的菜谱盒"
    series_logline: "整理奶奶遗物时翻出来的老樟木盒,搬进出租屋后会在不同的夜里自动递出不同的菜谱卡——那是这座城里另一个人,正在最想念她外婆的味道。"
    series_description: "二十四岁的林希在杭州一个人租住老破小,半年前奶奶走了。家里分遗物时,她拿到一只民国年间的樟木菜谱盒,里面五百多张毛边纸菜谱,边角都已经黄了。盒子在搬家纸箱里压了三个月,直到有一晚她突然打开。最上面一张是奶奶字迹的『春韭拌香干』——林希从没见过的菜。第二天她在小区便利店听到隔壁阿姨打电话:『我妈走了,她那道春韭拌香干没人会做了……』。林希做了一份,用油纸包好,放在那位阿姨小区单元门口的鞋柜上。盒子第二天又递出新的一张。一卷一道菜,一卷一个人。背面是奶奶用铅笔写的小字:『心里苦的人,盐放少一点』。"
    opening_5_volume_arc:
      vol_1: "春韭拌香干。隔壁单元的阿姨。菜谱背面第一行小字被林希看见。"
      vol_2: "红烧肉。失去妻子的中年男人,他不会做饭。林希第一次意识到『盐放少一点』是奶奶留给她的。"
      vol_3: "八宝饭。一个三岁孩子的生日,外公刚走。"
      vol_4: "蒸蛋的那一天。菜谱盒一整天没有递出新的。奶奶也有自己想念的人。"
      vol_5: "最后一张是奶奶的妈妈——林希没见过的太外婆——的一道糟带鱼。林希做出来,供在奶奶的相片前。"
    comp_titles: ["一人之下", "罗小黑战记", "深夜食堂", "葬送的芙莉莲", "镖人"]
    reader_promise: "失去一个人,是慢慢学会做她做过的那道菜。"
    marketing_angle: "把『深夜食堂』的菜谱和『解忧杂货店』的回信,装进奶奶的老樟木盒里。"
    genre_family: healing
    emotional_engine: inherited_wisdom + named_and_seen
    audience: "20 至 28 岁、刚开始一个人住、近期失去祖辈的 Gen Z 社畜"

