    series_logline: "二十五岁的非二元青年在二十四小时宠物殡仪馆值夜班,看得见家属脚边那只透明的、刚走的小家伙。"
    series_description: "苏星眠二十五岁,非二元身份,在成都郊区一家二十四小时宠物殡仪馆做夜班前台。半年前他的老猫『芒果』走了。复工第一晚,一对老夫妻抱着一只柴犬过来,苏星眠看见那只柴犬透明地站在老人脚边,抬头朝他摇了一下尾巴。他对老人说:『这位小家伙在朝你们摇尾巴呢』。阿姨眼泪当场掉下来。一卷一组家属——失去老猫的一对女同伴侣、十六年金毛走了的盲人爸爸、仓鼠走了的休学初二男生。火化时间是定的,苏星眠就在那短短的时间里,替小家伙把最后一次摇尾、最后一次哼哼,转述给家属。芒果他还看不见。一卷一卷,同事一个个变得能看见——前宠物医院护士的跨性别男生、聋哑的见习道士。"
    opening_5_volume_arc:
      vol_1: "第一组家属和柴犬。前台日光灯下的那一下尾巴。"
      vol_2: "女同伴侣和老猫。苏星眠第一次跟人提起芒果。"
      vol_3: "盲人爸爸和金毛,金毛把鼻尖蹭在他手心。"
      vol_4: "新人入职:跨性别男生。他看得见仓鼠。"
      vol_5: "凌晨三点,苏星眠自己脚边出现了芒果。芒果正在摇尾巴。"
    comp_titles: ["一人之下", "罗小黑战记", "镖人", "雏蜂", "深夜食堂"]
    reader_promise: "陪你那么久的小家伙,最后一下尾巴,有人替你看见。"
    marketing_angle: "把『罗小黑战记』的现代妖怪温度,放进二十四小时宠物殡仪馆的前台。"
    genre_family: slice_of_life
    emotional_engine: chosen_family + competent_calm_specialist
    audience: "20 至 28 岁、把宠物当家人的 Gen Z 群体,含 LGBTQ+ 友好读者"

