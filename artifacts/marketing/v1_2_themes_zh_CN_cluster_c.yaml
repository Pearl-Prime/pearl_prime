    serial_engine: case_of_the_week
    long_arc_spine: "丈夫头七刚过的三十六岁妻子,发现客厅灵堂前那把没人坐的椅子上,每周都会出现一封陌生笔迹的信。写信的不是亡夫,是同小区里刚失去亲人的人——他们自己并不知道写过。她一封一封,把回信送回去。"
    volume_runway_target: 160
    reading_platform_fit: manga_traditional
    series_title: "灵堂前的第二张椅子"
    series_logline: "丈夫头七一过,客厅灵堂前那把空椅上,第一封陌生笔迹的信压在牌位脚下。这是上海一栋老破小公房里,关于谁在替谁悲伤的故事。"
    series_description: "顾安宁三十六岁,丈夫陆远去世第七天的清晨,她在灵堂前那把藤椅上发现一封没贴邮票的信。信纸是从练字本上撕下来的,字迹不是陆远的:『我妈走了三个星期了,厨房灯还亮着,没人提醒我关』。落款没有名字。安宁去小区底楼那家二十四小时茶馆问老板,老板点头:『我们家也是,有时候桌上会多出来一杯没人点的茶』。她一户一户去找写信的人——本人都不记得自己写过,写信的是他们悲伤里最深的那一层。安宁开始回信,用自己这七天里学到的小事:几点关厨房灯、香一次烧一支就够、清明不一定要回老家祭拜也可以。每一卷一个人的丧。陆远不会回来,这是故事的前提,不是悬念。"
    opening_5_volume_arc:
      vol_1: "第一封信。失去母亲三周的中年女邻居,厨房灯的话。安宁把回信托给楼下茶馆老板。"
      vol_2: "第二封信。父亲走了的高三男生,父亲那双没人收的皮鞋。安宁写下收鞋这件事可以慢慢来。"
      vol_3: "第三封信来自一个还活着的人——查出晚期癌症的六十岁退休教师。在世的丧。安宁第一次写不下去。"
      vol_4: "第四封信的笔迹,被安宁认出是陆远生前同事的。陆远不为她所知的一面,隔着信封轻轻递回来。"
      vol_5: "藤椅上出现一封安宁自己的笔迹的信,她不记得写过。轮到她回自己的信了。"
    comp_titles: ["一人之下", "罗小黑战记", "深夜食堂", "解忧杂货店 (中文版)", "镖人"]
    reader_promise: "你不记得写过的那封信,会有人替你收下,也会替你写回信。"
    marketing_angle: "如果『深夜食堂』那盏灯换成灵堂前的一支香——头七后,有人替你接住没说完的话。"
