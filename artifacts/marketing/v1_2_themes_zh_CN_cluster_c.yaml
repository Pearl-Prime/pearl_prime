    long_arc_spine: "西郊一个老小区里,做『陪安人』的二十六岁姑娘上门陪伴刚失去亲人的家庭——不做仪式,只陪。她身边那只不被别人看见的旧布老虎,一卷一卷地告诉她,自己原本是哪家小孩的护身布偶。"
    volume_runway_target: 140
    reading_platform_fit: webtoon_vertical
    series_title: "西郊小区的陪安人"
    series_logline: "微信小程序刚上线一个新服务:『陪安人』——头七后上门坐两小时,不劝、不烧纸、不收红包。她包里那只旧布老虎,只有她自己看得见。"
    series_description: "余安二十六岁,辞了写字楼,在西安西郊一个老小区里做新职业『陪安人』。客户在微信小程序里下单:头七后上门两小时,陪坐、陪沉默、陪做一顿家常菜,不收红包、不烧纸钱。她包里始终带着一只老式手缝的布老虎,只有她自己看得见——那是她小时候奶奶替她缝的护身偶。一卷一户:刚失去爸爸的初一女孩、海葬完老伴的退休工程师、失独的母亲、留学回来发现祖父走了的小伙子。余安不安慰,她只是陪。布老虎在每户人家的客厅角落里,会发现一件别人留下来的小东西——一张旧船票、一支没写完的钢笔——而布老虎自己,其实是上世纪八十年代另一家小孩的护身偶。一卷一卷,这个家的故事慢慢补回来。"
    opening_5_volume_arc:
      vol_1: "初一女孩,失去爸爸三周。两小时,做了一锅西红柿鸡蛋面。布老虎在沙发下找到爸爸的旧钥匙串。"
      vol_2: "退休工程师,刚海葬完老伴。余安陪他第一次去菜市场。布老虎注意到阳台上一盆还没浇水的茉莉。"
      vol_3: "失独母亲,六年了。余安第一次只是陪坐着不说话两小时。"
      vol_4: "留学生回国,祖父走了三个月。布老虎在书房抽屉里找到当年祖父替它(布老虎)写的一张借条——它原本属于哪家?"
      vol_5: "余安去找布老虎最早的小主人。一位八十多岁的老人。布老虎第一次在别人面前显形。"
    comp_titles: ["一人之下", "罗小黑战记", "镖人", "深夜食堂", "葬送的芙莉莲"]
