    series_description: "三十六岁的沈理子接手外婆留下的茶馆『闲泊』。在交接账本里她看到一行规矩:每月最后一个周日下午三点至五点闭店做私场——『二次葬礼』。常来的老阿姨告诉她:头七那天大家都在张罗丧事,有些话来不及说;这是再说一次的机会。每月不同的人来。理子负责煮水、添茶、不评论。每人对着没来的那位说:『当时我其实想说……』。每一场结束,客人脚边总有一个谁家也没认领的透明客人。每月不同。一卷一卷,这位透明客人的身世慢慢揭开。最后一个谜底——外婆当年开第一场,是为了谁。"
