      vol_2: "エースをねらえ!。欄外『お蝶夫人とひろみの距離は、私が言葉にできなかった愛だ』。麻衣は祖母にそれとなく訊く。祖母は『そういう友達は私にもいた』と答える。"
      vol_3: "ガラスの仮面。欄外『マヤと亜弓の競い合いは、二人の恋だった』。麻衣は大学のゼミでこの読みを発表する。"
      vol_4: "風と木の詩。欄外『これがあれば、私は当時死ななかったかもしれない』。麻衣は本気で書き込みの主を探しはじめる。"
