    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "二十四歳のITサポート二年目の青年は、新宿駅南口のスタバの同じ二階窓際席で毎晩残業している。三か月目から、同じ席に座る他社の同世代エンジニアたちと、誰も話しかけないまま視線とノートPCの位置で『仲間』になっていく。"
    volume_runway_target: 125
    reading_platform_fit: manga_traditional
    series_title: "残業のスターバックス"
    series_logline: "蓮は新宿のスタバで毎晩残業する。同じ席の他社の同世代と、口をきかないまま仲間になっていく。"
    series_description: "蓮は二十四歳、千代田区のSIerでITサポート二年目、Z世代、社会不安と新人特有のインポスター症候群。残業のために会社のオフィスに残るのが怖く——『誰かに見られている』感覚——、新宿駅南口のスタバの二階の同じ窓際席に毎晩通う。三か月目、気づく——窓際の四席に毎晩同じ顔ぶれが座っている。広告代理店の女性、Web系スタートアップの男性、外資コンサルの長身の人、そして蓮。誰も話しかけない。けれど、コンセントは譲り合うし、誰かが昼食を抜いている日はサンドイッチが机に置かれている。各巻、一人の『同席者』の小さな仕事の山と、それを蓮が無言で支える方法。長期の弧は、四人のうちの一人が転職して来なくなった夜、残された三人がついに話しはじめる回。MHA の温度を、新宿のスタバの二階に置いたら。Komi-san の不器用さ。バーンアウトの初期のいやしけい。"
    opening_5_volume_arc:
      vol_1: "蓮の入社三か月目、初めて窓際席に座る。残業の罪悪感。コンセントが空いている。"
      vol_2: "広告代理店の女性が泣いている。蓮は紙ナプキンを六枚、机に置いて立ち上がる。"
      vol_3: "スタートアップの男性のノートPCがフリーズする。蓮は同期しているクラウドの復旧法を、付箋に書いて置く。"
      vol_4: "外資コンサルの長身の人が、コーヒー一杯で十時間粘っている。蓮はもう一杯おごる。レジで匿名で。"
      vol_5: "広告の女性が転職する。最後の夜、四人で初めて目を合わせる。スタートアップの男性が『お疲れさまでした』と言う。"
    comp_titles: ["僕のヒーローアカデミア", "ホリミヤ", "古見さんは、コミュ症です", "深夜食堂", "SPY×FAMILY"]
    reader_promise: "あなたの残業のスタバの同席者は、もうあなたの仲間。コーヒーを譲り合うことで証拠は十分。"
    marketing_angle: "MHA の温度を、新宿のスタバの二階で口をきかない四人の同世代エンジニアに置いたら。"
    genre_family: slice_of_life
    emotional_engine: chosen_family + quiet_stewardship
    audience: "Z世代二十三〜二十七、初職二年目で残業のために外のカフェに行く若手社会人層"

  - series_id: digital_ground__ja_JP__github_no_kohai
    brand_id: digital_ground
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: ai_companion
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: case_of_the_week
    long_arc_spine: "二十六歳のシニアジュニアエンジニアは、社内 GitHub の私物リポジトリで、誰かが自分のコードに静かにレビューコメントをつけはじめていることに気づく。レビュアーは、二年前に過労で休職した『先代の新人』——アカウントはまだ生きている。"
    volume_runway_target: 175
    reading_platform_fit: manga_traditional
    series_title: "GitHub の後輩"
    series_logline: "光は社内 GitHub で誰かに静かにレビューされている。アカウントは、二年前に倒れた先代の新人。"
    series_description: "光は二十六歳、品川区のフィンテックでバックエンドエンジニア四年目——自分でも『シニアジュニア』と呼ぶ中途半端な年次。後輩はまだ来ない。代わりに、社内 GitHub の自分のリポジトリに、ある月曜から『nakahara-r』というアカウントが、夜中の二時にレビューコメントをつけはじめる。中原は二年前に過労で休職した一年目エンジニア、いまも籍は残っている、メーリングリストには返事をしない、出社もしない、けれど社内システムからログアウトしていない。コメントは厳しくない。優しい。『この命名、夜中の三時の自分なら絶対通せたよ』。各巻、一つのレビューと、光が中原について少しずつ知っていく断片。長期の弧は、光が中原を実際に探し出すかどうか——、そして中原のアカウントが、もし光自身が将来同じ過労で倒れたとき、誰の名前で残るか。バーンアウトの早期警報レジスター。Komi-san の沈黙。蟲師の優しさ。"
    opening_5_volume_arc:
      vol_1: "初コメント、月曜午前二時三分。命名規則について。光は誰のアカウントか調べる。"
      vol_2: "光の人事の友人に聞く。『中原は休職中、退職してない』。光はメンションを返してみる。返事はない。"
      vol_3: "中原は十回連続でレビューをつける。光は付箋を貼って『助かってる』とコメントを書く。"
      vol_4: "光が金曜午前一時にPRを出す。中原のレビューが午前一時三分につく。光は『今夜は早く寝てください』とコメントを書く。レビューは止まる。"
      vol_5: "光が中原の住所を人事から教えてもらう。手紙を書く。中原は十週間後にコメントで返事をする——『ありがとう。次の月曜に出社します』。"
    comp_titles: ["蟲師", "古見さんは、コミュ症です", "ホリミヤ", "葬送のフリーレン", "ハチミツとクローバー"]
    reader_promise: "あなたが夜中に書くコードを、二年前に倒れた先輩が、まだ気にかけている。"
    marketing_angle: "蟲師を、社内 GitHub で休職中の先輩がレビューを書き続けているフィンテック四年目の物語に置いたら。"
