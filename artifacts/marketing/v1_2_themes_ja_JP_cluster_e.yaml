    series_description: "麻衣は二十二歳、京都の大学のジェンダー学専攻三年、クィア、自分の代名詞をまだ模索している。祖母の千代子さん(八十三歳、夫に先立たれて静かに生きている)から、夏休みに『うちの押し入れの段ボール、好きに見ていいよ』と言われた。中には一九六〇年代後半から七〇年代の少女漫画が四百冊——千代子さんが二十代で読んだもの。一冊目を開いた麻衣は、欄外の薄い鉛筆書きを見つける——『これは私だ』『私は男の子になりたかったんじゃない、女の子と恋がしたかった』『この主人公の友達は、私の初恋だ』。鉛筆書きは祖母のものではない、当時の別の読者のもの——古本屋で巡り合った、半世紀前のクィアな少女の。各巻、一冊の少女漫画と、欄外のメモと、麻衣がいまの自分のためにそれを読むこと。長期の弧は、麻衣がメモの主——いまも生きているならば八十歳前後の女性——を探し出すかどうか。柔らかいファンタジー——魔法は古本だけ。クィア・離散史のレジスター。"
