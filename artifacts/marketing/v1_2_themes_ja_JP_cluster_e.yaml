  - series_id: digital_ground__ja_JP__okujou_no_wifi
    brand_id: digital_ground
    locale: ja_JP
    persona_archetype: GA-tween
    daily_life_anchor: content_creation
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: supernatural_everyday
    serial_engine: companion_roster
    long_arc_spine: "中学二年生の少女は、校舎屋上の給水塔の影に届く校内Wi-Fiの『デッドゾーン』を見つける。そこで配信すると、校内の誰にも届かない代わりに、同じ屋上で過去十年に立った中二の先輩たちが視聴者になる。"
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "屋上のWi-Fi"
    series_logline: "杏は屋上のデッドゾーンで配信する。視聴者は今いる生徒じゃなくて、ここに立った先輩たち。"
    series_description: "杏は中学二年生、東京都江戸川区の区立中学、放課後はクラスの隅で誰とも話さずスマホを握っている。屋上の給水塔の影で校内Wi-Fiが切れる『デッドゾーン』を偶然見つけた水曜日、そこで試しに開いた配信アプリは、視聴者0のはずなのに、コメント欄が静かに動きはじめる——『中二の頃、私もここに座ってた』『部活辞めた次の日、ここで弁当食べた』。十年分の屋上の先輩たちが、デッドゾーンの向こうから配信を見ている。各巻、杏は一つの『今日の困りごと』——担任の進路相談、文化祭の班分け、保健室のあの一年生——を配信し、先輩の一人が自分の中二の話を返す。長期の弧は、十年前にこの屋上で写真部を立ち上げ、いまも卒業せず屋上に通い続けている『先輩0』が誰なのか。MHA の真っ直ぐな温度。Komi-san の静かな不器用さ。学校漫画の根っこ。アルファ世代の中二配信レジスター全開。"
    opening_5_volume_arc:
      vol_1: "デッドゾーン発見。最初のコメント。杏は声を出して泣くが、誰にも届かない——それが落ち着く理由。"
      vol_2: "先輩『二〇一七年・吹奏楽部』が話しかける。文化祭の班分けで一人になった話。杏は明日、自分から班に入る。"
      vol_3: "保健室の一年生が屋上に上がってくる。デッドゾーンを共有することを決める。視聴者が二倍になる。"
      vol_4: "担任が屋上に上がってくる。先輩のコメントが一斉に止まる。担任は何も言わずに降りていく。"
      vol_5: "『先輩0』が初コメント。十年前、屋上で写真部を立ち上げた。卒業アルバムに名前はない。杏は校史室で調べはじめる。"
    comp_titles: ["僕のヒーローアカデミア", "古見さんは、コミュ症です", "ホリミヤ", "夜のクラゲは泳げない", "彼方のアストラ"]
    reader_promise: "屋上のデッドゾーンで、十年分の中二の先輩たちが、あなたの今日を聞いている。"
    marketing_angle: "Komi-san を、屋上のWi-Fiデッドゾーンで先輩たちが視聴者になる中二の配信アプリに置いたら。"
    genre_family: school
    emotional_engine: inherited_wisdom + earned_voice
    audience: "アルファ世代十二〜十四、屋上に座って配信を開く中学生読者層"

  - series_id: digital_ground__ja_JP__bukatsu_no_log
    brand_id: digital_ground
    locale: ja_JP
    persona_archetype: GA-tween
    daily_life_anchor: content_creation
    portal_mechanic: object
    episodic_frame_per_volume: month
    magical_register: magical_realism
    serial_engine: life_stage_rhythm
    long_arc_spine: "中学一年生の少年は、漫研の部室に置かれた古いノートPCを起動する。十年分の歴代部員が部活終わりに書いた『今日のログ』が、自分のログを書いた後にだけ、一行ずつ返事を返してくる。"
    volume_runway_target: 125
    reading_platform_fit: webtoon_vertical
    series_title: "部活のログ"
    series_logline: "中一の蒼は、漫研のPCに今日のログを書く。歴代部員が一行ずつ返事を書く。"
    series_description: "蒼は中学一年生、千葉県松戸市の区立中学、漫研は部員四人、最下位の部室は校舎四階の理科準備室の隣。部活終わりに、共有のノートPC——画面の角がガムテで補修されている——のテキストエディタを開いて、その日の『今日のログ』を一行書くのが、十年前からの部の慣習らしい。蒼が初日に書いた『今日、誰とも話せなかった』に対して、翌日には『二〇一六年・三年・むらたゆうき』の名前で一行の返事——『俺もそうだった。三年で初めて声出せた』。先輩たちは生きている、ただPCの中だけで継続している。各巻、一か月、一つのログ、一人の先輩。シリーズは中一の一学年。長期の弧は、最初の部長——二〇一五年の創部時に書かれた最初のログの主——を蒼が探し出す回。アルファ世代中一の弱小部活レジスター。ハイキュー!! の温度を、漫画研究部に置いたら。"
    opening_5_volume_arc:
      vol_1: "四月。入部。最初のログ『誰とも話せなかった』。返事『俺もそうだった』。蒼は次の日も来る。"
      vol_2: "五月。新歓ライブの代わりに漫研は同人誌を作る。返事『俺の年は表紙が真っ白だった。それでも配った』。"
      vol_3: "六月。蒼が初めてキャラを描いて部室に置く。返事『うまい』。蒼は十二歳で初めて泣く。"
      vol_4: "七月。三年の先輩が引退ログを書く。歴代の返事が一斉に来る。蒼は感想を読み続ける。"
      vol_5: "九月。蒼は二〇一五年の創部メンバーを校史室で探す。一人だけ卒業アルバムに写真がない。"
    comp_titles: ["ハイキュー!!", "僕のヒーローアカデミア", "ホリミヤ", "げんしけん", "夜のクラゲは泳げない"]
    reader_promise: "あなたの部活のログには、十年分の先輩たちが返事を書きにくる。"
    marketing_angle: "ハイキュー!! を、最下位の漫研の共有PCで歴代部員が一行ずつ返事を返す物語に置いたら。"
    genre_family: healing
    emotional_engine: chosen_family + inherited_wisdom
    audience: "アルファ世代十一〜十三、弱小部活で居場所を探している中学生読者層"

  - series_id: digital_ground__ja_JP__zangyou_no_starbucks
    brand_id: digital_ground
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: content_creation
    portal_mechanic: ritual
