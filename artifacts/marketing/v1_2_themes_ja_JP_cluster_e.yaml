    series_description: "悠は中学三年生、埼玉県川口市の区立中学、レズビアン(本人だけ知っている)、文化祭の自由出展で『誰でも投稿OKの匿名ZINE』を企画として通した。題は『初恋のZINE』。投稿BOXは図書室の隅に置いた——図書司書の山中先生は見て見ぬふりをする(本人もクィア、二十年前に同じ学校の卒業生)。三週間で十二通の投稿が届く——どれも、同性への、あるいは性別がわからなかった人への、言えなかった初恋。文字、漫画、写真、いろんな形。各巻、一通の投稿と、悠がそれを匿名のままZINEに収めていく作業。長期の弧は、文化祭当日、ZINEは校長に止められるかどうか、そして悠自身の投稿が一通入っているかどうか。学校漫画と文化祭回。クィアアイデンティティ・成長レジスター。MHA の真面目な勇気。"
