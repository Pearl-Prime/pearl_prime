    audience: "Z世代二十四〜二十八、IT企業二〜五年目で同期の誰かが倒れたことのあるエンジニア層"

  - series_id: digital_ground__ja_JP__shinjin_kenshuu_no_himitsu_chat
    brand_id: digital_ground
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: content_creation
    portal_mechanic: ritual
