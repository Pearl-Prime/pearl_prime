    long_arc_spine: "大手SIerの新人研修に集められた二十三人の同期は、入社三日目に研修担当のいない秘密の Discord サーバーを立てる。十二か月の研修・配属・最初の現場——その全期間を、同期だけで生き延びる記録。"
    volume_runway_target: 100
    reading_platform_fit: webtoon_vertical
    series_title: "新人研修の秘密チャット"
    series_logline: "二十三人の新人。一つの Discord。十二か月で気づく——一番頼れる先輩は同期だった。"
    series_description: "二十三歳の航は、東京駅前の大手SIerの新人エンジニア二十三人のうちの一人。入社三日目、研修教室の昼休みに、誰かが『内緒の Discord 立てたんだけど』と回す。研修担当の主任、配属先のメンター、人事の窓口——全部別ルート。シリーズは十二か月の研修・本配属・最初の現場の全期間、一巻一か月。最初の月は緊張、二か月目で誰かが配属希望に落ちる、三か月目で本社配属の同期が地方プロジェクト送りの同期を心配する、半年で同期の一人が辞める、十か月で別の同期が誰にも言わずに病休に入る、十二か月で残った二十一人がそれぞれの現場から夜の Discord に戻ってくる。MHA のクラスメイト群像。SPY×FAMILY の選びとった家族の温度。バーンアウト直前の早期介入のレジスター。リアリズム——魔法は Discord だけ。"
    opening_5_volume_arc:
      vol_1: "四月。入社。三日目に Discord 設立。チャンネル名『社内通報チャンネル(冗談)』。"
      vol_2: "五月。最初の配属希望調査。海里が第一希望に落ちる。Discord で泣く。"
      vol_3: "六月。研修中の小テストでカンニング疑惑。同期は団結して『してない』と人事に伝える。"
      vol_4: "七月。同期の一人が辞める。アカウントは残す。残りの二十二人は退会させない。"
      vol_5: "八月。本配属発表。十二人が東京、八人が地方、二人が海外。Discord に新チャンネル八個。"
    comp_titles: ["僕のヒーローアカデミア", "SPY×FAMILY", "ホリミヤ", "セトウツミ", "夜のクラゲは泳げない"]
    reader_promise: "あなたの新人研修の Discord は、十二か月後にいちばん頼れる先輩になっている。"
