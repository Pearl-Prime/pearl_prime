    serial_engine: case_of_the_week
    long_arc_spine: "夫を亡くした三十八歳の女性は、仏壇の前に置かれたもう一つの椅子に、誰も座っていないはずなのに毎週手書きの便箋が置かれていることに気づく。書いているのは亡き夫ではない。同じ町で誰かを亡くしたばかりの人たちだ。その人たちは、自分が便箋を置いた覚えがない。彼女は一通ずつ、書いた人を探して返事を渡していく。"
    volume_runway_target: 160
    reading_platform_fit: manga_traditional
    series_title: "もう一つの椅子からの手紙"
    series_logline: "夫の四十九日が明けた朝、仏壇の前のもう一つの椅子に、見知らぬ筆跡の便箋が一通置かれていた。誰かが、自分でも知らないうちにここへ書きに来ている。"
    series_description: "杏奈は三十八歳。夫の透が逝って百日が過ぎた。仏壇の前にはいつも、夫が使っていた籐の椅子が置いてある。四十九日が明けた朝、その椅子の座面に、見覚えのない筆跡で書かれた便箋が一通置かれていた。『うちの母が亡くなって三週間です。台所の電気を消し忘れたままなのを、注意してくれる人がいません』。差出人の名前はない。杏奈は最寄りの茶屋で店主にだけそっと尋ねる。店主はうなずく。『うちの店にも、誰のものでもないお茶が一杯出ることがある』。杏奈は便箋を書いた人を、町の中から少しずつ見つけていく——本人は自分が書いた覚えがない。書いていたのは、その人の喪のいちばん奥にいる部分だった。杏奈は返事を書く。誰かを亡くしたばかりの人に、自分の経験から差し出せる小さなこと——電気を消す時刻を決めること、線香の本数を一本に減らしてもいいこと。一巻ごとに一人の喪に寄り添う。透は還ってこない。それは前提として置かれている。"
    opening_5_volume_arc:
      vol_1: "最初の便箋。母を亡くした近所の女性。台所の電気の話。杏奈は返事を、茶屋の店主に託す。"
      vol_2: "二通目。父を亡くした高校生の男の子。父の革靴がまだ玄関にあること。杏奈は靴のしまい方を、急かさずに書く。"
      vol_3: "三通目は、自分を亡くした人——余命宣告を受けた六十代の男性。生きているうちの喪。杏奈は初めて返事に詰まる。"
      vol_4: "四通目の差出人が、透の同僚だったことがわかる。透の知らない側面が一つ、便箋越しに杏奈に届く。"
      vol_5: "杏奈の椅子の上に、自分の筆跡の便箋が現れる。書いた覚えがない。自分の喪に、自分が返事を書く番。"
    comp_titles: ["コーヒーが冷めないうちに", "死神の精度", "つむぐと", "深夜食堂", "ツバキ文具店"]
    reader_promise: "あなたが書いた覚えのない手紙でも、誰かが受け取って、ちゃんと返事を書いてくれる。"
    marketing_angle: "『コーヒーが冷めないうちに』の文通の温度を、四十九日が明けた家の仏壇の前に置いたら。"
    genre_family: healing
    emotional_engine: chosen_family + inherited_wisdom
    audience: "三十代後半から五十代の、近しい人を亡くした経験のある読者層"

  - series_id: spiritual_ground_supernatural__ja_JP__sobo_no_recipe_bako
    brand_id: spiritual_ground_supernatural
    locale: ja_JP
    persona_archetype: GZ-firstjob
    daily_life_anchor: home_apartment
    portal_mechanic: object
    episodic_frame_per_volume: customer
    magical_register: magical_realism
    serial_engine: case_of_the_week
    long_arc_spine: "亡き祖母から受け継いだ木製のレシピ箱は、開くたびにその日いちばん祖母を恋しがっている人の好物のレシピを差し出す。主人公は巻ごとに一品ずつ作り、レシピ用紙の裏に書かれた祖母の覚え書きを少しずつ読み解いていく。"
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "祖母のレシピ箱"
    series_logline: "祖母の遺品整理で見つけた古いレシピ箱は、開くたびに違うカードを差し出してくる。今日この町で、いちばん祖母を恋しがっている誰かの、好きだった料理のカードを。"
    series_description: "二十四歳の希実は、初めての一人暮らしを始めて半年で祖母を亡くした。形見分けで受け取ったのは、戦後に祖父が作ったという桐のレシピ箱。中には五百枚ほどの和紙のレシピ用紙が、年月を経て茶色く色づいている。引っ越し荷物に紛れていた箱を、ある夜ふと開く。一番上に出てきたのは、祖母の字で書かれた『春菊と豆腐の白和え』。希実が知らないレシピだ。翌日コンビニで偶然耳にした会話——隣町のおばあさんが亡くなって、家族が『お母さんの白和えがもう食べられない』と話している。希実は作って、紙に包んで、置いてくる。レシピ箱は次のカードを出す。一巻ごとに一品、一巻ごとに一人。誰かが祖母を恋しがる気持ちと、希実が祖母を恋しがる気持ちが、台所で重なる。レシピ用紙の裏には、祖母の小さな覚え書きがある——『泣いている人には塩を少なめに』。"
    opening_5_volume_arc:
      vol_1: "白和えと隣町のおばあさん。台所と裏の覚え書き。"
      vol_2: "肉じゃがと、夫を亡くしたばかりの父親。希実は『塩を少なめに』を初めて意識する。"
      vol_3: "ちらし寿司と、祖父を亡くした男の子の三歳の誕生日。"
      vol_4: "茶碗蒸しの日。レシピ箱が一日だけ、何も差し出さない。祖母も誰かを恋しがる日があったらしい。"
      vol_5: "最後のカードは、祖母自身の母の料理だった——希実の知らない曾祖母の。希実はその一品を、自分の祖母に作って供える。"
    comp_titles: ["きのう何食べた?", "深夜食堂", "リトル・フォレスト", "ツバキ文具店", "コーヒーが冷めないうちに"]
    reader_promise: "誰かを失うとは、その人の作った料理を作れる人になることでもある。"
    marketing_angle: "『深夜食堂』のレシピと『コーヒーが冷めないうちに』の喪の文通を、祖母の桐箱に収めたら。"
