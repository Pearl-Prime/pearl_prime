  - series_id: spiritual_ground_supernatural__ja_JP__petto_no_yonaka_no_kuyou
    brand_id: spiritual_ground_supernatural
    locale: ja_JP
    persona_archetype: GZ-queer
    daily_life_anchor: home_apartment
    portal_mechanic: mascot
    episodic_frame_per_volume: customer
