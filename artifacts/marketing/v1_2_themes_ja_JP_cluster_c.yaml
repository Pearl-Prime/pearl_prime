    series_logline: "四十歳の海里は、依頼を受けて誰かの喪に寄り添う『グリーフ・ドゥーラ』。彼女が訪問する家には、必ず一度だけ、頼んでもいない季節の花が届く。"
    series_description: "海里はかつて看護師だった。母を亡くしたあと看護を離れ、二年前から『グリーフ・ドゥーラ』という肩書で個人事業を始めた。依頼内容は様々——お通夜の手続きを横で見守ること、四十九日の段取りを一緒に組むこと、遺品整理の業者を呼ぶ前に、いっしょに故人の引き出しを一段だけ開けること。海里は急かさない、判断しない、感情の動きに名前をつけてあげる。一回の訪問の途中で、必ず玄関のチャイムが鳴る。配達の少年が、頼んだ覚えのない花を一束、依頼主に届ける——必ず、亡くなった人がいちばん好きだった季節の花を。少年は何度尋ねても『手配伝票には、配送料無料としか書かれていません』と言う。海里は仕事を続けながら、その花を送り続けている誰かを少しずつ探す。一巻ごとに、海里自身の母の喪が、その追跡のなかで少しずつ動いていく。"
    opening_5_volume_arc:
      vol_1: "最初の依頼。父を亡くした娘の家。届いたのは菜の花。"
      vol_2: "二件目。妻を亡くした老夫。届いたのは秋桜。海里は配送少年の自転車の番号を控える。"
      vol_3: "三件目。流産を経験した若い母。届いたのは雪柳。海里は花屋を一軒ずつ回り始める。"
      vol_4: "四件目で初めて、依頼主が花の差出人を知っていた。亡き人本人が、生前に頼んでいた定期便だった——一件だけは。"
      vol_5: "海里自身の家のチャイムが、初めて鳴る。届いたのは、母がいちばん好きだった水仙。"
    comp_titles: ["薬屋のひとりごと", "ツバキ文具店", "コーヒーが冷めないうちに", "深夜食堂", "三十一日のクリスマス"]
