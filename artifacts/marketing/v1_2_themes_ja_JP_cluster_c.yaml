    serial_engine: companion_roster
    long_arc_spine: "深夜のペット火葬場の受付係である主人公には、火葬を待つ家族の足元に、いま亡くなったばかりのペットの透明な姿が見える。一巻ごとに一組の家族の喪に寄り添い、ペットの最後の一言を伝えていく。仲間が増えるたびに、主人公自身の喪が少しずつ動き出す。"
    volume_runway_target: 150
    reading_platform_fit: webtoon_vertical
    series_title: "ペットの夜中の供養"
    series_logline: "深夜営業のペット火葬場の受付に立つひかるには、家族の足元にいるペットの姿が見える——もう体のないはずの、その子の。"
    series_description: "ひかるは二十五歳のノンバイナリー、世田谷区の二十四時間営業のペット火葬場で夜勤を務めている。半年前、自分のシニア猫の桐を喪った。仕事に戻った最初の夜、受付に来た老夫婦の足元に、いま運ばれてきたばかりの柴犬の透明な姿が見えた。その犬はひかるを見上げて、しっぽを一度だけ振った。ひかるは老夫婦に『この子、しっぽを振ってますよ』と言う。妻のほうが泣き出す。一巻ごとに一組の家族と一匹のペット——シニア猫を亡くしたクィアのカップル、十六年連れ添ったゴールデンを失った視覚障がいのお父さん、ハムスターを亡くした不登校の中学生。火葬の時間は決まっている。ひかるはその短い時間に、ペットの最後のしっぽの振り方や、最後の鳴き声を家族に伝える。自分の桐は、まだ見えない。同じ夜勤の同僚たち——元動物看護師のトランス男性、聾の僧侶見習い——が、一巻ごとに見えてくる仲間として加わる。"
    opening_5_volume_arc:
      vol_1: "最初の家族と柴犬。受付の蛍光灯の下のしっぽの一振り。"
      vol_2: "クィアのカップルとシニア猫。ひかるは桐のことを少しだけ話す。"
      vol_3: "視覚障がいの父とゴールデン。ペットは父の手のひらに鼻先を当てる。"
      vol_4: "新人の同僚が入る。元動物看護師のトランス男性。彼にはハムスターが見える。"
      vol_5: "深夜三時、ひかる自身の足元に桐が見える。桐はちゃんとしっぽを振っている。"
    comp_titles: ["違国日記", "猫を抱いて象と泳ぐ", "しまなみ誰そ彼", "深夜食堂", "ツバキ文具店"]
    reader_promise: "家族でいたあの子の最後のしっぽの振り方は、ちゃんと誰かが見てくれている。"
    marketing_angle: "『違国日記』の選びとる家族と『深夜食堂』の夜の優しさを、ペット火葬場の受付に重ねたら。"
