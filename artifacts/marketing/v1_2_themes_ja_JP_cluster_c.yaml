    long_arc_spine: "祖母から受け継いだ古い喫茶店で、月に一度開かれる『二番目の葬列の会』。最初の葬式で言えなかったことを、もう一度だけ、参加者全員の前で言う会。参加者の足元には、いつも一人だけ、誰の家族でもない透明な人物がいる。一巻ごとに、その人物が誰なのかを店主は少しずつ知っていく。"
    volume_runway_target: 150
    reading_platform_fit: manga_traditional
    series_title: "二番目の葬列の会"
    series_logline: "祖母の遺した喫茶店で、月に一度だけ開かれる会。最初の葬式で言いそびれた一言を、もう一度だけ、人前で言うための会。"
    series_description: "三十六歳の理子は、祖母の喪が明けて喫茶店『はなれ』を継いだ。引き継いだ帳簿の中に、月の最終日曜の午後三時から五時まで店を閉めて貸し切りにする、と書いてあった——『二番目の葬列の会』。常連の老婦人が教えてくれる。誰かを亡くした人が、最初の葬式では喪服と段取りに追われて言えなかった一言だけを、もう一度この場で言うための会。参加者は毎月変わる。理子はコーヒーを淹れ、何も言わずに聞く。一人ずつ、亡き人に向けて『あのとき、本当はこう言いたかった』を口にする。会の終わりに、参加者の足元に必ず一人、誰の家族でもない透明な人物が立っている。それが誰なのかは、毎月違う。一巻ごとに、その人物の素性が少しずつ明かされる。最後の謎は——理子の祖母が、誰のために最初にこの会を開いたのか。"
    opening_5_volume_arc:
      vol_1: "最初の会。離婚した父が、亡き元妻に『再婚してごめん』と言う。透明な人物は誰だ。"
      vol_2: "二度目の会。中学生が亡き弟に『先に行かせてごめん』と言う。透明な人物の輪郭が少しずつ。"
      vol_3: "三度目。元教師が、自殺した教え子に『気づけなくてごめん』と。理子は祖母の帳簿の最初のページを読み返す。"
      vol_4: "四度目。透明な人物が、初めて理子と目を合わせる。それは祖母の親友だった人。"
      vol_5: "五度目。最初に祖母がこの会を開いた相手——理子の祖父——の名前が、初めて口に出される。"
    comp_titles: ["ツバキ文具店", "コーヒーが冷めないうちに", "深夜食堂", "三十一日のクリスマス", "森崎書店の日々"]
    reader_promise: "葬式で言えなかった一言には、もう一度だけ言う場所がある。"
