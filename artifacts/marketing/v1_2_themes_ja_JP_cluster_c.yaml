    long_arc_spine: "西麻布の小さなマンションで、依頼を受けて喪に寄り添う『グリーフ・ドゥーラ』として働く女性。彼女が訪問する家には、必ず一度だけ、亡くなった人の好きだった季節の花が、頼んでもいないのに玄関に届く。誰が届けているのか——その謎が、彼女自身の喪につながっていく。"
