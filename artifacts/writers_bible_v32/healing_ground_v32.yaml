chaos_slots:
  unexpected_metaphor: "Your chronic stress is like a car that runs all day without stopping—it doesn't need a longer rest at night, it needs resets throughout the day."
  pattern_break: "Standard stress management says 'relax in the evening, manage your workload.' But if you're activated all day, evening relaxation can't overcome the accumulated dysregulation."
  cultural_reference: "The most sustainable workers don't have more willpower or lighter workloads. They've learned to reset multiple times daily."
  voice_shift: "Physiological reality: continuous sympathetic activation creates allostatic load; brief parasympathetic resets throughout the day prevent cascade dysregulation."
