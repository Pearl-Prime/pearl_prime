    trigger: "Flashbacks or nervous system activations that seem to come from nowhere"

chaos_slots:
  unexpected_metaphor: "Your trauma response is like an alarm system installed after a fire—it's vigilant, but the threat isn't coming back. Learning that rewires the system."
  pattern_break: "Traditional trauma therapy asks you to process memories. But if your nervous system is dysregulated, processing becomes retraumatization. You have to regulate first."
  cultural_reference: "Trauma recovery isn't about being stronger or braver. It's about your nervous system learning it can trust your body again."
  voice_shift: "Somatic precision: trauma creates vagal dysregulation and amygdala hyperactivation. Polyvagal theory-based interventions restore ventral vagal tone and bottom-up safety signaling."
