description:
  hook: "Trauma recovery isn't about processing emotions. It's about teaching your body it's safe again."
  problem: "Trauma survivors are stuck in nervous system hypervigilance—their body remains in threat response even when the threat has passed, isolating them from their own physicality."
  mechanism: "This brand teaches gentle somatic protocols that help the nervous system recognize current safety, allowing integration to occur between therapy sessions."
  promise: "10 minutes in, you'll sense your nervous system begin to remember what safety feels like."
  proof: "Healing happens when the body learns it's safe. Somatic work teaches that learning directly."

cover_brief:
  mood: "Earthy, grounded, safe, gentle. The feeling of being held and witnessed."
  palette: ["#a0715e", "#9a9a8e", "#d4c5a9"]
  imagery: "Earth tones, organic textures, grounding imagery. Sense of stability and containment without severity."
  typography_direction: "Warm, accessible sans-serif. Compassionate without being patronizing. Clear and readable."

series:
  book_count: 12
  arc_structure: "From nervous system dysregulation → grounding and safety → somatic resource building → integration → sustained healing."
  escalation_pattern: "Early sessions are acute safety protocols; later sessions support deeper integration work."

