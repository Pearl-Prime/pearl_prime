brand_id: inner_security_tw
locale: zh_TW
version: "3.2"

title:
  main: "內在安全感"
  subtitle: "停止在關係中尋求確認"

eois:
  relief: 5
  urgency: 4
  identity_shift: 5
  total: 14

description:
  hook: "每個關係問題都是神經系統問題。"
  problem: "焦慮附著者在關係中不斷尋求外部確認，這創造了衝突和疏遠——他們需要內在安全感，但沒有工具來建立它。"
  mechanism: "本品牌教導身心技巧，幫助人們在內部建立安全感，轉變他們如何與合作夥伴附著，特別是在台灣文化期望脈絡中。"
  promise: "10分鐘內，你會感到更接地和更安全在內部。"
  proof: "關係改變當你的神經系統停止尋求確認時。"

cover_brief:
  mood: "接地、自信、溫暖。獨立但連接的感覺。"
  palette: ["#d4a5a5", "#a8d5ba", "#f5f0e8"]
  imagery: "溫暖色調與涼爽色調平衡，互聯形狀。夥伴關係與整體感。"
  typography_direction: "溫暖、有邊界的無襯線字體。有信心而非冷漠。清晰易讀。"

series:
  book_count: 12
  arc_structure: "從焦慮尋求→內在接地→安全建立→健康附著→穩定的自我感"
  escalation_pattern: "從焦慮減少到關係安全與親密重新定義。"

social:
  youtube_hooks:
    - "為什麼你在關係中求證"
    - "如何從內建立安全感"
    - "焦慮附著和神經系統"
    - "停止需要你的伴侶的確認"
    - "獨立關係：怎樣工作"
  pinterest_titles:
    - "焦慮附著恢復指南"
    - "在關係中建立內在安全"
    - "止焦慮行為在愛情中"
    - "健康依賴在台灣關係中"
    - "神經系統附著指南"
    - "從焦慮到安全的關係"
    - "伴侶驗證依賴的結束"
    - "自我安全感和關係健康"
    - "獨立但相連的愛"
    - "轉變你的關係模式"
  viral_phrases:
    - "焦慮附著不是愛，是神經系統失調"
    - "內在安全比伴侶確認更持久"
    - "你不需要他們讓你足夠。你已經足夠。"
    - "健康關係開始於健康的自我。"
  quote_cards:
    - "你在尋求別人中尋求的安全感必須先在內建立。"
    - "關係恐懼反映神經系統不安全，不是真實危險。"
    - "獨立和親密不是相反的。他們是互補的。"
    - "你的伴侶不能給你他們無法給予自己的東西。"
    - "最好的禮物是一個安全在自己身份中的伴侶。"

transformation_promise: "10分鐘內，焦慮的聲音會降低，你會感到更接地和更安全在內部。你的關係會從這個位置改變。"

listening_moments:
  - context: "衝突後，當焦慮和需要求證被觸發時"
    trigger: "恐懼伴侶會離開或不愛你的時刻"
  - context: "單獨時，當焦慮缺乏外部驗證時"
    trigger: "內部空白感和對確認的渴望"

chaos_slots:
  unexpected_metaphor: "焦慮附著就像一個饑餓的鳥尋求不斷的喂食，而安全附著就像一個知道食物會來的鳥，因此可以探索。"
  pattern_break: "關係建議說『溝通更多』或『嘗試更努力。』但如果你的神經系統處於焦慮附著狀態，溝通變成尋求確認，努力變成絕望。你首先需要內在安全。"
  cultural_reference: "在台灣，家庭期望和集體價值觀會加劇關係焦慮。但健康的自我認知可以持有這些期望而不被它們驅動。"
  voice_shift: "附著理論與多迷走神經：焦慮附著涉及腹側迷走神經過度啟動；建立背側迷走神經穩定性允許更安全的伴侶連接而無常數驗證尋求。"
