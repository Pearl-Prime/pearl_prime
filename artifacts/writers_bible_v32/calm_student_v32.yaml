  mood: "Bright, clear, supportive. The feeling of having your back covered."
  palette: ["#87ceeb", "#ffffff", "#f0f8ff"]
  imagery: "Bright clean design, sky blue accents, minimal and modern. Sense of clarity and openness."
  typography_direction: "Friendly, approachable sans-serif. Supportive without being condescending. Clear and readable."

