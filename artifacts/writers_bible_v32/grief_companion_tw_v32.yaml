brand_id: grief_companion_tw
locale: zh_TW
version: "3.2"

title:
  main: "悲傷陪伴"
  subtitle: "讓悲傷被見到，而非被修復"

eois:
  relief: 5
  urgency: 3
  identity_shift: 5
  total: 13

description:
  hook: "悲傷不需要被修復。它需要一個見證者。"
  problem: "失喪成人被告知要『走出來』或『繼續前進』，而他們的文化將悲傷視為應該被克服的弱點——導致孤立和未處理的痛苦。"
  mechanism: "本品牌提供陪伴和目睹，幫助人們在悲傷中找到自己的節奏，特別是在台灣孝道與集體悲傷脈絡中。"
  promise: "10分鐘內，你會感到被看見，而不是被判斷。"
  proof: "悲傷在被見證時會轉化。這裡是安全的空間。"

cover_brief:
  mood: "溫柔、目睹、神聖。被陪伴的感覺。"
  palette: ["#8b6b5e", "#d4c5a9", "#f5f0e8"]
  imagery: "地球色調、有機紋理、接地意象。穩定與承納感。"
  typography_direction: "溫暖、親切的無襯線字體。同情而非居高臨下。清晰可讀。"

series:
  book_count: 12
  arc_structure: "從孤立的悲傷→被見證的悲傷→整合失喪→活著哀悼者的身份→找到意義"
  escalation_pattern: "從急性悲傷向前移動到長期整合與意義製造。"

social:
  youtube_hooks:
    - "悲傷不需要被『解決』"
    - "失喪如何改變你（這是好的）"
    - "孝道與悲傷在台灣文化中"
    - "讓悲傷被見到"
    - "在失喪中找到你自己的節奏"
  pinterest_titles:
    - "悲傷陪伴與哀悼支持"
    - "失喪恢復：自己的節奏"
    - "深切悲傷的長期整合"
    - "父母亡故後的孝道與悲傷"
    - "在台灣文化中表達悲傷"
    - "失喪沒有時間表"
    - "哀悼者身份與意義製造"
    - "悲傷中的自我照顧和陪伴"
    - "從悲傷到感謝的轉變"
    - "讓悲傷有其空間"
  viral_phrases:
    - "悲傷說『我曾經愛過。』"
    - "讓它來。讓它有其節奏。"
    - "你沒有應該『度過』。你應該與它共處。"
    - "一個人在悲傷中不孤單。"
  quote_cards:
    - "悲傷是愛流向已逝者無處可去的地方。讓它流。"
    - "最深的悲傷是因為最深的愛。"
    - "你不必『勇敢』。你只需要現在。"
    - "失喪改變你。這不是壞事。這是轉變。"
    - "在台灣的孝道中，我們的悲傷是我們愛的表現。"

transformation_promise: "10分鐘內，你會感到被見到、被理解、被陪伴。你的悲傷會有空間。"

listening_moments:
  - context: "清明節前後，紀念死者時"
    trigger: "文化時刻，將悲傷帶到表面"
  - context: "深夜，當孤獨最深時"
    trigger: "思念和悲傷在靜默中最強烈"

chaos_slots:
  unexpected_metaphor: "你的悲傷就像一個想要被擁抱的孩子，而世界告訴它『停止哭泣。』我們說：哭吧。我們在這裡。"
  pattern_break: "悲傷文化說『繼續前進』或『他們想要你快樂。』但真實悲傷工作包括整合失喪進入你的身份，而非超越它。"
  cultural_reference: "台灣的祖先敬禮與孝道給了悲傷一個神聖的地方。你對已逝者的愛是有尊嚴的。不要將其藏起來。"
  voice_shift: "附著與失喪心理學：由於初級附著對象的喪失，持續的紐帶允許轉變性哀悼而非複雜悲傷；見證實踐支持這個過程。"
