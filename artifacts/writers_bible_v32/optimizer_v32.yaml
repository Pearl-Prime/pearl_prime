  unexpected_metaphor: "Your attention is like a muscle—but not in the way you think. It's not about willpower. It's about recovery, resource management, and dopamine load."
  pattern_break: "Everyone tells you to 'just focus harder.' That's like telling someone with poor sleep hygiene to 'just sleep more.' It misses the system entirely."
