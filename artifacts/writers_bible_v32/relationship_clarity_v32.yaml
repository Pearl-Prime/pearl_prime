description:
  hook: "Every relationship argument is actually a nervous system miscommunication."
  problem: "Couples repair after arguments but repeat the same patterns because they're addressing emotion rather than the nervous system dysregulation underneath."
  mechanism: "This brand teaches co-regulation frameworks that help partners calm each other's nervous systems, creating the safety needed for genuine reconnection."
  promise: "10 minutes after conflict, you'll both feel calmer and able to reconnect authentically."
  proof: "Relationship healing requires both partners' nervous systems to be regulated. Once they are, repair becomes possible."

