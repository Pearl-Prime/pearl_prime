    trigger: "The moment when you need to be steady but your system is activated"

chaos_slots:
  unexpected_metaphor: "Your executive composure is like an aircraft autopilot—it's not about removing the turbulence, it's about maintaining steady flight through it."
  pattern_break: "Most leadership advice says 'project confidence' or 'visualize success.' But if your nervous system is activated, projection becomes performance and visualization becomes anxiety."
  cultural_reference: "The most effective leaders aren't the most intelligent or charismatic. They're the most regulated under pressure."
  voice_shift: "Neurological specificity: high-stakes activation triggers sympathetic dominance; vagal resets restore prefrontal cortex access and parasympathetic baseline for optimal decision-making."
