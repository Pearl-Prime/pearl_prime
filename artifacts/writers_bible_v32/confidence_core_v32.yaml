chaos_slots:
  unexpected_metaphor: "Your social anxiety is like a smoke detector that goes off from cooking—the system is working, it's just miscalibrated."
  pattern_break: "Social anxiety advice says 'just expose yourself' or 'practice more.' But if your nervous system is threat-detecting, exposure without reframing deepens the pattern."
  cultural_reference: "The most socially confident people aren't necessarily extroverted. They've just learned to recalibrate their nervous system's social threat-detection."
  voice_shift: "Neurobiological precision: amygdala hyperresponsivity in social contexts requires polyvagal reframing; ventral vagal activation signals safety to nervous system."
