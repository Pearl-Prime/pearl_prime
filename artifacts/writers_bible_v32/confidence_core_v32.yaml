description:
  hook: "Social anxiety isn't about being shy. It's about threat-detection misfires in your nervous system."
  problem: "Socially anxious adults have genuine fears that keep them isolated—not because socializing is dangerous, but because their nervous system misinterprets social situations as threats."
  mechanism: "This brand teaches somatic reframing that helps the nervous system recognize social situations as safe, allowing people to show up authentically."
  promise: "10 minutes before an event, you'll feel calm enough to be yourself instead of performing self-protection."
  proof: "When your nervous system feels safe socially, authentic presence becomes possible."

cover_brief:
  mood: "Warm, welcoming, confident. The feeling of being seen and safe."
  palette: ["#f4e4e6", "#f5f0e8", "#ffffff"]
  imagery: "Soft pink gradient, warm cream, gentle shapes. Sense of safety and welcoming presence."
  typography_direction: "Warm, approachable sans-serif. Inviting and genuine. Clear and accessible."

