brand_id: gen_z_grounding_tw
locale: zh_TW
version: "3.2"

title:
  main: "Z世代落地"
  subtitle: "在社群媒體世界中找到自我"

eois:
  relief: 5
  urgency: 4
  identity_shift: 5
  total: 14

description:
  hook: "每個人都在假裝，沒有人感到足夠。讓我們改變這個。"
  problem: "Z世代在社群媒體比較文化和學業壓力之間迷失——他們的神經系統不知道何時感到安全足夠。"
  mechanism: "本品牌教導接地技巧與身份探索，幫助年輕人在雜訊中找到真實自我。"
  promise: "10分鐘內，比較的聲音會安靜，你會記得你自己。"
  proof: "當你的神經系統感到安全，真實自我可以出現。"

cover_brief:
  mood: "親切、真實、支持。被理解的感覺。"
  palette: ["#00d9d9", "#ff6b6b", "#4ecdc4"]
  imagery: "充滿活力的形狀、動態運動、非傳統佈局。大膽顏色和不對稱設計。"
  typography_direction: "現代、年輕化無襯線字體。平易近人和真實。沒有企業正式性。"

series:
  book_count: 12
  arc_structure: "從比較傷害→自我接納→身份建立→真實表達→穩定自我感"
  escalation_pattern: "從社群媒體傷害恢復到身份堅實性建立。"

social:
  youtube_hooks:
    - "為什麼你在社群媒體感到不夠"
    - "Z世代身份危機：真實故事"
    - "停止比較自己（這是怎樣）"
    - "你足夠，儘管看起來如何"
    - "在假裝文化中做真實的自己"
  pinterest_titles:
    - "Z世代自我接納指南"
    - "社群媒體比較對心理健康的影響"
    - "找到你的真實身份"
    - "年輕人自尊建立"
    - "社群媒體時代的身份發展"
    - "停止比較，開始愛自己"
    - "Z世代心理健康與自我價值"
    - "青少年焦慮：社群媒體影響"
    - "在充滿雜訊的世界中保持真實"
    - "年輕人身心健康指南"
  viral_phrases:
    - "你在IG上看到的不是現實"
    - "你足夠，儘管演算法想讓你相信"
    - "比較是真實自我的小偷"
    - "你的價值不在讚數中"
  quote_cards:
    - "沒有人像他們在社群媒體上看起來那樣。"
    - "你足夠。你一直都是。"
    - "比較會傷害，但真實會治癒。"
    - "你不必完美。你只需要是真實的。"
    - "最有趣的人是那些不試圖看起來有趣的人。"

transformation_promise: "10分鐘內，比較的聲音會安靜，你會記得在所有雜訊中你是誰。"

listening_moments:
  - context: "卷軸上滑超過一小時後，自尊感下降"
    trigger: "社群媒體讓你感到不足的時刻"
  - context: "睡前，當自我懷疑和比較最強烈時"
    trigger: "一天的網路曝露累積的焦慮"

chaos_slots:
  unexpected_metaphor: "社群媒體是一個鏡子，只反映人們想要展示的，不是他們真實的樣子。不要在虛假反射中比較你的真實自我。"
  pattern_break: "自尊心建議說『關注你的目標』或『受自己啟發』。但如果你的神經系統被比較傷害，這些動力短語就沒用。你首先需要治癒。"
  cultural_reference: "台灣的升學壓力和家庭期望加上社群媒體比較造成獨特的Z世代心理健康危機。你不孤單。很多人感到相同的東西。"
  voice_shift: "神經系統觀點：社群媒體觸發的慢性比較激活杏仁核和前額葉皮質衝突；中斷社群媒體回圈和在線身份安全設定協議立即幫助。"
