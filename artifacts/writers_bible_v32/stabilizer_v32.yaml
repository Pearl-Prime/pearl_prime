description:
  hook: "Your nervous system is stuck in overdrive, and no willpower will fix it."
  problem: "Burned-out professionals spend their evenings in a state of high alert—unable to relax, disconnecting from loved ones, and facing another sleepless night knowing tomorrow will be harder."
  mechanism: "This brand teaches somatic regulation techniques grounded in vagal science, offering practical protocols that work in under 15 minutes."
  promise: "After 10 minutes, your nervous system will shift from sympathetic dominance back to safety and rest."
  proof: "When you learn to regulate your vagus nerve, your body follows before your mind catches up. The physiology changes first; the psychology follows."

cover_brief:
  mood: "Calm, authoritative, grounded in earth tones. The feeling of returning to solid ground."
  palette: ["#4a6b6b", "#c9b8a0", "#f5f1e8"]
  imagery: "Geometric anchor shapes, muted blue-green, warm sand textures. Sense of stability and safety."
  typography_direction: "Clear, readable sans-serif. Authority with warmth. No script or decorative fonts."

series:
  book_count: 12
  arc_structure: "From acute dysregulation → chronic patterns → integration into daily life → long-term nervous system healing."
  escalation_pattern: "Early books address crisis moments; later books address lifestyle integration and prevention."

