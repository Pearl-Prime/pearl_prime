transformation_promise: "10 minutes after pressing play, your nervous system will shift from threat-detection mode into rest-and-digest. You'll feel your shoulders drop, your breathing deepen, and the constant low-level panic start to dissolve."

listening_moments:
  - context: "Evening, after work, when you realize you're still 'on'"
    trigger: "The moment you notice your body hasn't left the office even though you're home"
  - context: "Weekend mornings, before the dread of the week ahead kicks in"
    trigger: "The anticipatory anxiety that starts 36 hours before Monday"
  - context: "During a heated moment with a loved one, before you say something you'll regret"
    trigger: "Feeling the heat rise in your chest and your voice getting sharp"

chaos_slots:
  unexpected_metaphor: "Your nervous system is like a smoke detector that's too sensitive—not because the house is on fire, but because it learned the house caught fire once."
  pattern_break: "Here's what doesn't work: breathing exercises, meditation apps, positive affirmations. Here's what does: teaching your body it's safe by regulating the specific neural pathways that got dysregulated."
  cultural_reference: "Your nervous system is like a computer that's been running the same program for seven years—it's not broken, it just needs a reboot."
  voice_shift: "Get clinical for a moment: your dorsal vagal shutdown paired with sympathetic hyperarousal creates a dysregulated state that willpower cannot address. It requires somatic intervention."
