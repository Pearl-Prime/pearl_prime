chaos_slots:
  unexpected_metaphor: "你的失眠像一個在關燈時就警報的煙霧偵測器——不是因為有煙，而是因為它學過房子曾經著火。"
  pattern_break: "傳統睡眠建議說保持時間表、避免螢幕、不喝咖啡。但如果你的神經系統處於威脅模式，這些都沒用。你必須先處理失調。"
  cultural_reference: "你的神經系統認為夜間是捕食者狩獵時間。這就是為什麼它會激活。教導它其他方式需要身心工作，不是行為規則。"
  voice_shift: "臨床精確：延遲睡眠時相障礙中的過度警覺是由循環節律轉換期間的交感神經主導驅動。迷走神經激活協議直接解決這個問題。"
