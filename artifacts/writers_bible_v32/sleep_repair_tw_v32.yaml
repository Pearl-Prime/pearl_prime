  subtitle: "不靠藥物，自然入睡"

eois:
  relief: 5
  urgency: 4
  identity_shift: 3
  total: 12

description:
  hook: "失眠不是你太努力。是你的神經系統忘記了如何放鬆。"
  problem: "失眠症患者將夜晚視為敵人，心理恐懼與神經系統高度警戒交互作用，造成惡性循環。"
  mechanism: "本品牌教導特定於睡眠的身心技巧，重新調整神經系統對夜間觸發因素的反應。"
  promise: "按下播放後的10分鐘內，你的思緒會平靜，身體會記得如何入睡。"
  proof: "當你解決睡眠焦慮背後的神經系統失調時，失眠會自然解決。"

cover_brief:
  mood: "深沉、溫暖、安全。被黑暗擁抱而非威脅的感覺。"
  palette: ["#1a2633", "#2d3e50", "#3d5a6c"]
  imagery: "深色漸層，最小化形狀，暗示靜息與安全感。微妙的月光意象。"
  typography_direction: "柔和無襯線字體，溫暖且親切。高可讀性。"

