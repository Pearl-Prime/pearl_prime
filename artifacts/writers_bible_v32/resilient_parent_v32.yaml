description:
  hook: "Parental burnout isn't about loving your kids less. It's about your nervous system running at maximum capacity 24/7."
  problem: "Overwhelmed parents feel permanently fragmented—unable to be present with their kids or themselves, running on fumes by evening, disconnected from their own life."
  mechanism: "This brand teaches rapid nervous system reset techniques for parents, creating tiny pockets of regulation and identity reclamation even within an impossibly full day."
  promise: "10 minutes after pressing play, you'll feel like a person again instead of just a parent."
  proof: "Parents with regulated nervous systems parent differently. The regulation comes first; the patience follows."

cover_brief:
  mood: "Warm, grounded, safe. The feeling of being held and resourced."
  palette: ["#c9a877", "#a3d5d9", "#f5f0e8"]
  imagery: "Warm sand tones, soft blue, organic shapes. Sense of containment and safety without coldness."
  typography_direction: "Warm, approachable sans-serif. Maternal without being condescending. Clear and accessible."

series:
  book_count: 12
  arc_structure: "From overwhelm → nervous system reset → identity reclamation → sustainable parenting → modeling resilience to children."
  escalation_pattern: "Early sessions provide acute relief; later sessions build sustainable practices."

