transformation_promise: "10 minutes from now, you'll feel the weight lift slightly and reconnect with yourself. Your evening with your family will be different."

listening_moments:
  - context: "Post-bedtime, when kids finally sleep and the weight of the day hits"
    trigger: "That moment when you realize you haven't thought about yourself all day and don't know how to turn off"
  - context: "Pre-meltdown, in the moment when you feel rage building at something small"
    trigger: "Realizing your nervous system is about to explode over spilled milk"

chaos_slots:
  unexpected_metaphor: "Your parental burnout is like a phone running on 2% battery, trying to run 47 apps—the solution isn't a bigger phone, it's regulation."
  pattern_break: "Everyone tells parents 'take time for yourself' or 'ask for help.' But if your nervous system is dysregulated, you can't use either of those solutions effectively."
  cultural_reference: "Children raised by regulated parents develop better emotional regulation. Your nervous system work isn't selfish—it's the most important parenting you can do."
  voice_shift: "Neurobiological perspective: maternal (or parental) exhaustion creates dorsal vagal collapse, which manifests as emotional disconnection or sympathetic rage. Brief vagal resets restore baseline capacity."
