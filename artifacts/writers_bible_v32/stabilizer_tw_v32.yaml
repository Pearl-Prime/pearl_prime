description:
  hook: "你的神經系統卡在過度警戒，沒有意志力能修復它。"
  problem: "過勞的專業人士度過他們的晚上處於高度警戒狀態——無法放鬆，與親人疏遠，面對又一個無眠之夜，知道明天會更難。"
  mechanism: "本品牌教導以迷走神經科學為基礎的身心調節技巧，提供在15分鐘內有效的實用協議。"
  promise: "10分鐘後，你的神經系統會從交感主導回到安全與靜息。"
  proof: "當你學會調節迷走神經時，你的身體先跟隨，然後心理跟隨。生理先改變；心理後改變。"

cover_brief:
  mood: "平靜、權威、扎根。回到穩固地面的感覺。"
  palette: ["#4a6b6b", "#c9b8a0", "#f5f1e8"]
  imagery: "幾何錨點形狀，啞藍綠色，溫暖沙色紋理。穩定性與安全感。"
  typography_direction: "清晰、易讀的無襯線字體。權威帶著溫暖。沒有裝飾字體。"

series:
  book_count: 12
  arc_structure: "從急性失調→慢性模式→日常生活融合→長期神經系統癒合"
  escalation_pattern: "早期書籍涵蓋危機時刻；後期涵蓋生活方式整合與預防。"

