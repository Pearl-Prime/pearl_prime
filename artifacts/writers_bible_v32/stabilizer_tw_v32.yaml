chaos_slots:
  unexpected_metaphor: "你的神經系統就像一個太敏感的煙霧偵測器——不是因為房子著火，而是因為它學過房子曾經著火。"
  pattern_break: "以下什麼都不起作用：呼吸練習、冥想應用程式、積極肯定。以下什麼起作用：透過調節造成失調的特定神經通路來教導你的身體它是安全的。"
  cultural_reference: "你的神經系統就像一台運行了七年同一程式的電腦——它沒有壞，它只是需要重啟。"
  voice_shift: "獲得臨床視角：你的腹側迷走神經關閉結合交感神經過度警覺造成失調狀態，意志力無法解決。它需要身心介入。"
