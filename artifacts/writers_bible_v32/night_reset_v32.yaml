    trigger: "That moment of dread when you realize you need to try to sleep soon"
  - context: "2am, when you've been awake for an hour and the spiral begins"
    trigger: "The panic that comes with midnight wakefulness"

chaos_slots:
  unexpected_metaphor: "Your insomnia is like a smoke detector that keeps alarming when you turn off the lights—not because there's smoke, but because it learned the house burned down once."
  pattern_break: "Conventional sleep advice says 'keep a consistent schedule, no screens, avoid caffeine.' But if your nervous system is in threat mode, none of that matters. You have to address the dysregulation first."
  cultural_reference: "Your nervous system thinks nighttime is a predator hunting window. That's why it activates. Teaching it otherwise takes somatic work, not behavioral rules."
  voice_shift: "Clinical precision: the hyperarousal state in delayed sleep phase syndrome is driven by sympathetic dominance during the circadian rhythm shift. Vagal activation protocols address this directly."
