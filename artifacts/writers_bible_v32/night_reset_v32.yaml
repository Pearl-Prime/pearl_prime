description:
  hook: "Sleep anxiety isn't insomnia. It's a nervous system stuck in threat mode after dark."
  problem: "Insomniacs dread bedtime because their nervous system learned to activate when the lights go down—creating a vicious cycle of anticipatory anxiety that prevents sleep."
  mechanism: "This brand teaches sleep-specific somatic protocols that recalibrate the nervous system's response to nighttime triggers."
  promise: "10 minutes in, your racing thoughts slow, your breathing deepens, and your body remembers how to transition into sleep."
  proof: "When you address the nervous system dysregulation beneath sleep anxiety, the insomnia resolves naturally."

cover_brief:
  mood: "Dark, intimate, safe. The feeling of being held in darkness rather than threatened by it."
  palette: ["#1a2633", "#2d3e50", "#3d5a6c"]
  imagery: "Soft dark gradient, minimal shapes suggesting rest and containment. Subtle celestial elements without being whimsical."
  typography_direction: "Soft sans-serif, inviting and calm. High legibility even in low light."

series:
  book_count: 12
  arc_structure: "From sleep anxiety → racing thoughts → somatic quieting → sustained deep sleep."
  escalation_pattern: "Early books are acute interventions; later books address lifestyle factors that support sleep."

