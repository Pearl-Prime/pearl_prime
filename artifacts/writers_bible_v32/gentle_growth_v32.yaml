brand_id: gentle_growth
locale: en_US
version: "3.2"

title:
  main: "Gentle Growth"
  subtitle: "Explore Yourself With Compassion"

eois:
  relief: 5
  urgency: 2
  identity_shift: 5
  total: 12

description:
  hook: "Therapy beginners need safety first, insight second."
  problem: "People new to self-inquiry often hit their own resistance and shame spirals—the openness required for growth feels dangerous, not liberating."
  mechanism: "This brand teaches gentle somatic and journaling-based self-inquiry that creates safety for exploration, allowing growth to happen at the pace the nervous system can handle."
  promise: "10 minutes into your journaling practice, you'll feel safe exploring yourself without shame."
  proof: "Deep growth requires a nervous system that feels safe enough to be vulnerable. Gentleness creates that safety."

cover_brief:
  mood: "Soft, gentle, safe, welcoming. The feeling of being held through transformation."
  palette: ["#9fd9e8", "#d9b8d9", "#f5f0e8"]
  imagery: "Watercolor elements, soft blue and lavender, flowing organic shapes. Sense of gentleness and possibility."
  typography_direction: "Soft, warm sans-serif or hand-drawn elements. Gentle and inviting. Accessible and safe."

series:
  book_count: 12
  arc_structure: "From fear of self-inquiry → safe exploration → deeper self-understanding → compassionate growth → authentic transformation."
  escalation_pattern: "Progressively deeper and more courageous self-inquiry as safety deepens."

social:
  youtube_hooks:
    - "Self-discovery doesn't have to feel scary"
    - "Gentle journaling for therapy beginners"
    - "How to explore yourself without shame"
    - "Safe self-inquiry: the nervous system approach"
    - "Growth is possible. It can be gentle."
  pinterest_titles:
    - "Gentle Self-Discovery for Therapy Newcomers"
    - "Compassionate Journaling Guide for Growth"
    - "How to Explore Yourself Without Shame"
