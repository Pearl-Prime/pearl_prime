  mood: "Strong, grounded, unflinching. The feeling of inner steel."
  palette: ["#000000", "#ffffff", "#1a1a1a"]
  imagery: "Bold monochrome design, geometric strength, minimal and sharp. Uncompromising simplicity."
  typography_direction: "Bold, strong serif or sans-serif. Authoritative and unflinching. Pure signal, no decoration."

