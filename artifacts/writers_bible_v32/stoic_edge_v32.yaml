chaos_slots:
  unexpected_metaphor: "Your emotions are like weather patterns—you can't control the weather, but you can master how you respond to it."
  pattern_break: "Traditional toughness teaches emotional suppression. But suppressed emotions create brittle strength. True toughness integrates emotion through understanding."
  cultural_reference: "The strongest people aren't those who feel nothing. They're those who feel deeply and respond with precision."
