brand_id: career_lift
locale: en_US
version: "3.2"

title:
  main: "Career Lift"
  subtitle: "Move From Stalled to Unstuck"

eois:
  relief: 5
  urgency: 4
  identity_shift: 4
  total: 13

description:
  hook: "You're not stuck because you lack skills. You're stuck because you can't see the next move clearly."
  problem: "Mid-career professionals feel trapped—too established to start over, too frustrated to stay—but lack the framework to evaluate real options."
  mechanism: "This brand teaches decision-clarity frameworks that help you map your actual constraints and possibilities, not your fears."
  promise: "Within 10 minutes, you'll understand what's really holding you back and one concrete next step."
  proof: "Clarity comes from understanding your constraints, not from more motivation."

cover_brief:
  mood: "Professional, forward-focused, grounded. The feeling of solid ground beneath your feet."
  palette: ["#2c3e50", "#ecf0f1", "#34495e"]
  imagery: "Bold typography, upward directional elements, minimal and architectural. Clean lines suggesting clear paths."
  typography_direction: "Strong serif or bold sans-serif. Professional authority. Clean and unambiguous."

series:
  book_count: 12
  arc_structure: "From feeling trapped → clarifying constraints → evaluating options → choosing direction → building momentum."
  escalation_pattern: "Moves from internal clarity work into external action and opportunity evaluation."

social:
  youtube_hooks:
    - "Why you feel stuck (and it's not laziness)"
    - "The Sunday scaries decision framework"
    - "Is it time to change careers? Here's how to know"
    - "Trapped at mid-career? Here's the way out"
    - "Three frameworks for clarity when you're confused"
  pinterest_titles:
    - "Mid-Career Change Guide: From Stuck to Clear"
    - "Career Clarity Framework for Professionals"
    - "Feeling Trapped at Work? Here's What to Do"
    - "How to Know If It's Time for a Career Change"
    - "Mid-Career Transition Planning Guide"
    - "Overcome Career Stagnation with This Framework"
    - "Clear Your Career Confusion in 30 Days"
    - "The Career Clarity Decision Template"
    - "From Burnout to Breakthrough: Career Edition"
    - "Professional Reinvention at Mid-Career"
  viral_phrases:
    - "You're not stuck. You're just looking at it wrong."
    - "Clarity beats motivation every time"
    - "Your constraints are actually your compass"
    - "The best career move is the informed one"
  quote_cards:
    - "Being stuck is information, not a dead end."
    - "You don't need permission to change direction. You need clarity."
    - "Career stagnation ends when clarity begins."
    - "Your next move is hidden in your constraints, not your dreams."
    - "Mid-career isn't too late. It's exactly the right time."

transformation_promise: "10 minutes from now, you'll see one clear path forward and understand what's been blocking you. Sunday night will feel different."

listening_moments:
  - context: "Sunday evening, before the week ahead, when dread about work creeps in"
    trigger: "That sinking feeling when you think about Monday through Friday"
  - context: "During a performance review or feedback conversation, when you realize the role doesn't align"
    trigger: "External feedback that highlights the misalignment you've felt for months"

chaos_slots:
  unexpected_metaphor: "Your career stagnation is like a GPS with no destination entered—you're not lost, you just haven't defined where you're going."
  pattern_break: "Everyone tells you to 'follow your passion' or 'network more.' But if you can't see the next move clearly, passion and networking just create noise."
  cultural_reference: "Career decisions aren't made through inspiration. They're made through the accumulation of small, clear choice points."
  voice_shift: "Framework-focused: use a decision matrix to evaluate constraint type (external vs internal), opportunity cost, and psychological resistance separately."
