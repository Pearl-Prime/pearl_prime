brand_id: minimal_mind
locale: en_US
version: "3.2"

title:
  main: "Minimal Mind"
  subtitle: "Escape Digital Overload, Reclaim Presence"

eois:
  relief: 5
  urgency: 4
  identity_shift: 3
  total: 12

description:
  hook: "Digital overwhelm isn't a willpower problem. It's a nervous system problem."
  problem: "Constant doomscrolling and digital fragmentation leave people scattered—their nervous system in chronic low-level activation, their attention capacity depleted before they start."
  mechanism: "This brand teaches digital detox practices designed around nervous system reset rather than just stopping screen time—creating space for genuine attention recovery."
  promise: "10 minutes without screens, you'll feel your nervous system begin to reorganize and your mind begin to quiet."
  proof: "When you give your nervous system actual recovery from digital stimulation, attention naturally returns."

cover_brief:
  mood: "Stark, clean, focused. The feeling of clarity through simplicity."
  palette: ["#ffffff", "#d3d3d3", "#f0f0f0"]
  imagery: "Minimal white space, grey accents, stark and uncluttered. Sense of clarity and calm through absence."
  typography_direction: "Clean, simple sans-serif. Minimal and unadorned. Pure signal, no noise."

series:
  book_count: 12
  arc_structure: "From digital overwhelm → digital detox → attention recovery → intentional technology use → sustained presence."
  escalation_pattern: "Moves from crisis detox toward sustainable digital boundaries."

social:
  youtube_hooks:
    - "How doomscrolling fragments your nervous system"
    - "The 15-minute digital reset that works"
    - "Attention returns when you stop fragmenting it"
    - "Digital detox: the nervous system approach"
    - "Presence is possible. Here's how."
  pinterest_titles:
    - "Digital Detox for Nervous System Recovery"
    - "How to Escape the Doomscroll Cycle"
    - "Reclaim Your Attention in a Digital World"
    - "The Science Behind Digital Overwhelm"
    - "Presence Without the Guilt: Digital Boundaries"
    - "Smartphone Detox Protocol and Recovery"
    - "How to Reduce Digital Stimulation Naturally"
    - "Attention Restoration: A Digital Guide"
    - "From Scattered to Centered: Digital Wellness"
    - "Technology Use That Supports Your Nervous System"
  viral_phrases:
    - "Digital overwhelm is nervous system fragmentation"
    - "Your attention is under constant hijack. Here's the defense."
    - "Presence returns when fragmentation stops"
    - "Your nervous system doesn't need more content. It needs recovery."
  quote_cards:
    - "Digital stimulation is a form of nervous system dysregulation."
    - "You can't focus your attention while fragmenting it constantly."
    - "Presence isn't about discipline. It's about nervous system recovery."
    - "Your scattered mind is telling you it needs break from digital stimulation."
    - "Attention restoration starts with giving your nervous system actual recovery time."

transformation_promise: "10 minutes of genuine digital detox, you'll feel your mind begin to reorganize and your nervous system settle. Your presence will feel possible."

listening_moments:
  - context: "Evening, when the day's digital bombardment catches up"
    trigger: "That moment when you realize you haven't been present all day and you don't know how to stop scrolling"
  - context: "Morning, before digital chaos begins"
    trigger: "The intention to start the day differently, before notifications take over"

chaos_slots:
  unexpected_metaphor: "Your attention is like a nervous system being constantly startled by notifications—it never gets to settle into genuine focus."
  pattern_break: "Digital wellness advice usually says 'just use less' or 'get willpower.' But if your nervous system is fragmented by constant stimulation, willpower is irrelevant."
  cultural_reference: "The people with the most presence aren't luddites. They've just learned to build nervous system recovery into their technology use."
  voice_shift: "Neurobiological reality: continuous partial attention creates chronic amygdala engagement; actual recovery requires genuine stimulus withdrawal and vagal reactivation."
