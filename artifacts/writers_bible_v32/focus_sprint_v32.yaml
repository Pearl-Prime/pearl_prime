  total: 12

description:
  hook: "Founder burnout isn't about working too hard. It's about working without recovery built in."
  problem: "Startup founders operate in sustained urgency, sacrificing recovery cycles in pursuit of velocity—leading to nervous system dysregulation that paradoxically slows down shipping and decision-making."
  mechanism: "This brand teaches sprint-specific nervous system protocols that allow sustained high-output work without burning out the biological capacity that makes that work possible."
  promise: "10 minutes in, you'll feel your nervous system shift from panic-mode productivity into sustainable high-performance."
  proof: "The best founders ship consistently because they've learned to manage their nervous system alongside their product roadmap."

cover_brief:
  mood: "High-contrast, energetic, decisive. The feeling of momentum and clarity."
  palette: ["#000000", "#0052ff", "#ffffff"]
  imagery: "Bold geometric shapes, high contrast, minimal design suggesting clarity and movement. Upward momentum."
  typography_direction: "Bold, geometric sans-serif. Crisp and commanding. No decoration. Pure signal."

series:
  book_count: 12
  arc_structure: "From burnout-driven productivity → sustainable sprint cycles → recovery integration → long-term high performance."
  escalation_pattern: "Progressively longer sprints with integrated recovery protocols."

