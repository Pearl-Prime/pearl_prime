transformation_promise: "10 minutes from now, you'll see how recovery integrates into your sprint capacity rather than competes with it. Your next sprint will be different."

listening_moments:
  - context: "Late-night work session, when momentum is high but the nervous system is activated"
    trigger: "That moment when you realize you haven't stopped in 14 hours and your hands are shaking"
  - context: "Pre-sprint kickoff, when intensity is about to escalate"
    trigger: "Knowing you're about to enter high-output mode and wanting to maintain it sustainably"

chaos_slots:
  unexpected_metaphor: "Founder productivity is like a high-performance engine—it requires scheduled maintenance, high-quality fuel, and cooling cycles or it seizes up."
  pattern_break: "Founder culture celebrates pushing harder and longer. But the data is clear: dysregulated founders make worse decisions and ship slower than rested ones."
  cultural_reference: "The founders who remain effective long-term aren't the ones who push hardest. They're the ones who learned to regulate their nervous system during intense periods."
  voice_shift: "Neurobiological reality: sustained sympathetic activation impairs prefrontal cortex function, slowing decision-making and creative problem-solving. Brief recovery windows restore function."
