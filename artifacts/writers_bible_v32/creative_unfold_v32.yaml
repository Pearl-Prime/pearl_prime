chaos_slots:
  unexpected_metaphor: "Your creative block is like a clenched fist around a river—relaxing the fist doesn't create the river, it just lets it flow."
  pattern_break: "Everyone tells you 'just start,' or 'creativity is 10% inspiration 90% perspiration.' But if your nervous system is contracted in shame, showing up is impossible."
  cultural_reference: "The greatest artists aren't more talented. They've just learned to create from a place of self-acceptance rather than self-judgment."
  voice_shift: "Somatic precision: the amygdala-driven contraction that underlies creative blocks requires vagal activation and semantic memory rewiring, not just attitudinal change."
