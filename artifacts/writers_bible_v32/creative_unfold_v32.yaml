description:
  hook: "Creative blocks aren't about lack of ideas. They're about nervous system contraction around judgment."
  problem: "Artists and creative professionals feel their creative power shutting down when they sit down to work—paralyzed by internalized criticism and fear of failure."
  mechanism: "This brand teaches somatic techniques for releasing the nervous system contraction that underlies creative blocking."
  promise: "10 minutes in, your nervous system relaxes, your inner critic quiets, and creative flow becomes possible."
  proof: "Creativity flows from a regulated nervous system. When you address the somatic tension beneath the block, creation becomes natural."

cover_brief:
  mood: "Whimsical, curious, expansive. The feeling of possibility and creative flow."
  palette: ["#f5e6d3", "#8b6f47", "#e8b4b8"]
  imagery: "Soft watercolor elements, flowing shapes, organic illustrations. Sense of movement and possibility."
  typography_direction: "Hand-drawn or script elements balanced with readability. Warm, inviting, less corporate."

series:
  book_count: 12
  arc_structure: "From creative shutdown → nervous system release → reconnection with inner voice → confident creative expression."
  escalation_pattern: "Moves from unblocking toward sustainable creative practice and expression."

