brand_id: legacy_builder
locale: en_US
version: "3.2"

title:
  main: "Legacy Builder"
  subtitle: "Design Your Second Chapter With Purpose"

eois:
  relief: 4
  urgency: 3
  identity_shift: 5
  total: 12

description:
  hook: "Midlife isn't a crisis. It's a clarification point."
  problem: "People 45+ face life transitions that feel disorienting—old identity no longer fits, but new direction isn't clear—leaving them stuck between chapters."
  mechanism: "This brand teaches reflective frameworks for understanding what truly matters, allowing people to design their second chapter with genuine intention rather than default continuation."
  promise: "10 minutes of guided reflection, you'll see one authentic direction forward."
  proof: "Clarity about meaning and direction comes from deep reflection, not from external validation."

cover_brief:
  mood: "Elegant, reflective, authoritative. The feeling of wisdom and intentional direction."
  palette: ["#2c3e50", "#d4af37", "#f5f0e8"]
  imagery: "Elegant dark background, gold accents, sophisticated simplicity. Sense of mature wisdom and purposeful direction."
  typography_direction: "Elegant serif or strong sans-serif. Authoritative and wise. Refined and clear."

series:
  book_count: 12
  arc_structure: "From life transition disorientation → clarifying values → designing intentional next chapter → building momentum → sustaining legacy."
  escalation_pattern: "Moves from introspection toward external action and impact."

social:
  youtube_hooks:
    - "Midlife transition: from crisis to clarification"
    - "How to design your second chapter intentionally"
    - "What matters most? The clarity framework"
    - "Reinvention at 45+: it's your moment"
    - "Build the legacy you actually want"
  pinterest_titles:
    - "Midlife Transition Planning and Clarity Guide"
    - "Designing Your Second Chapter at 45+"
    - "Life Reinvention Framework for Professionals"
    - "How to Find Meaning in Your Next Chapter"
    - "Purpose-Driven Life Design for 45+ Adults"
    - "From Stuck to Intentional: The Transition Path"
    - "Legacy Building and Meaningful Midlife"
    - "Clarify Your Values, Design Your Life"
    - "Midlife as a Launching Point, Not an End"
    - "Intentional Reinvention: The 45+ Playbook"
  viral_phrases:
    - "Midlife isn't a crisis. It's a clarification point."
    - "Your second chapter can be designed, not defaulted."
    - "At 45+, you finally know what matters. Let's build on it."
    - "Legacy building starts with understanding your real values."
  quote_cards:
    - "Your midlife transition is an opportunity to get clear on what actually matters."
    - "You've lived enough to know what works. Use that wisdom to design what's next."
    - "Legacy isn't built from default. It's built from intention."
    - "Your second chapter doesn't have to be smaller. It can be different."
    - "The clarity you gain from living 45 years is your greatest asset for designing what's next."

transformation_promise: "10 minutes of guided reflection, you'll see your next chapter more clearly and have one authentic direction to move toward."

listening_moments:
  - context: "Life transition moment—relationship shift, career stall, or age awareness"
    trigger: "That moment when you realize the old identity no longer fits"
  - context: "Quiet reflection time, when you have space to think deeply about direction"
    trigger: "The longing to design intentionally rather than drift"

chaos_slots:
  unexpected_metaphor: "Your midlife transition is like a ship reaching a crossroads—you can keep sailing in the same direction by habit, or you can deliberately chart a new course."
  pattern_break: "Midlife culture says 'crisis' or 'get back on track.' But this is actually your moment to step back and design deliberately what the next chapter should be."
  cultural_reference: "The people who thrive at midlife aren't those who stay identical to their younger selves. They're those who intentionally design a second chapter aligned with who they've actually become."
  voice_shift: "Developmental psychology: midlife transitions offer unique access to values clarification and meaning-making; guided reflection optimizes this window."
