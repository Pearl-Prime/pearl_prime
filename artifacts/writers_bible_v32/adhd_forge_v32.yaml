chaos_slots:
  unexpected_metaphor: "Your ADHD brain is like a sports car with a diesel engine—it's not broken, you're just trying to drive it like a Camry."
  pattern_break: "Conventional ADHD advice says 'remove distractions and use willpower.' But if your nervous system can't sustain dopamine, removing distractions just creates a vacuum of stimulation that makes focus harder."
  cultural_reference: "ADHD brains built the internet, created most startups, and revolutionized industries. The issue isn't the brain. It's the environment."
  voice_shift: "Neurochemical specificity: ADHD involves dopamine dysregulation with hyperfocus capacity. Task-stacking, novelty integration, and external urgency leverage the hyperfocus state."
