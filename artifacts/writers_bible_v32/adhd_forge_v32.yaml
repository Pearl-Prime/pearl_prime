description:
  hook: "You're not broken. Your brain is wired for hyperfocus, not sustained focus. Stop fighting the wiring."
  problem: "ADHD brains don't lack focus—they lack sustained dopamine stability. Every productivity system designed for neurotypical brains fails because it fights your biology."
  mechanism: "This brand teaches dopamine-architecture specifically for ADHD nervous systems—how to build environments and protocols that work with your wiring, not against it."
  promise: "10 minutes in, you'll see how to leverage your hyperfocus capacity instead of fighting it."
  proof: "ADHD isn't a deficit. It's a different operating system. When you stop trying to use neurotypical software, everything changes."

