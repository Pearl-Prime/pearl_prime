description:
  hook: "你沒有死去。這是你的神經系統。以下是現在該做的事。"
  problem: "急性焦慮患者陷入恐慌發作，感覺像心臟病發作或死亡——實際上是他們的神經系統進入高度威脅反應。"
  mechanism: "本品牌教導具體的身心技巧，在5分鐘內停止恐慌發作症狀。"
  promise: "按下播放後，你的心率會下降，你的呼吸會正常化，恐慌會消退。"
  proof: "恐慌是神經系統反應，不是醫學緊急情況。當你告訴你的神經系統它是安全的，恐慌停止。"

