    text: Light pools on the cushion simple line boundaries are garden edges not cages that starve you and everyone asking at once.
    sensory_anchor: Leaf-rustle; warm tone in the room; fabric of the cushion under sit-bones
    mc_action: Spine lifts half an inch, then releases—testing where you brace

  - id: struggle
    start_s: 6
    end_s: 22
    text: Without clear edges, you overwater everyone else and wonder why your soil thins. Shoulders climb, jaw sets, breath goes shallow—your body mirroring a life lived over-open. Resentment masquerades as virtue until your hands start shaking around “yes.”
    embodied_dis_ease: Clenched jaw, shallow upper breath, heat at the throat when you imagine declining
    mc_action: Noticing the white-knuckle grip on your own knee; easing one finger at a time

  - id: release
    start_s: 22
    end_s: 30
    text: Place one honest limit like steadying scales mercy returns you show up full not hollow exhale the line before the next automatic yes.
    signature_practice: Name one need aloud on exhale; pair with hand on heart and belly to weight the decision
    mc_action: Draw a small line in the air at shoulder height—ritual “edge” before speaking

