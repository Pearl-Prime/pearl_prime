    text: Worth sleeps like buried seed doubt shovels metrics atop it before the mirror even warms spreadsheets lie about souls.
    sensory_anchor: Soft morning light on a mirror; breath fogging the glass edge
    mc_action: One palm to collarbone, feeling pulse under skin like proof of presence

