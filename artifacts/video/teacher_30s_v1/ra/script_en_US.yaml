    text: Lift it one breath worth is ground not trophy after the scoreboard blinks water the seed aloud with the sentence you give a tired friend once.
    signature_practice: Mirror micro-affirmation tied to exhale—name one non-negotiable strength, speak it once
    mc_action: Shoulders roll back on the out-breath; chin neutral; eyes meet reflection without flinching

