    text: You inventory flaws before breakfast and call it honesty. Rejections and missteps replay as verdicts, chest tight, inner voice loud. Comparison shoplifts your attention—titles, bodies, timelines—until your own life feels like a borrowed costume.
    embodied_dis_ease: Heat in the face, shallow breath, heavy sternum as if bracing for a grade
    mc_action: Catching a harsh thought mid-sentence and replacing it with a single observable fact

