    text: Cool air arrives, noisy mind faster—coffee steams while ribs stay high before the day opens.
    sensory_anchor: Cold floor under bare feet; bitter coffee steam that promises normal and fails
    mc_action: Palms flat on the table, noticing the mug’s warmth against one hand while the other stays clammy

  - id: struggle
    start_s: 6
    end_s: 22
    text: Pings rehearse doom; shoulders climb while you call it irrational. Hands stay clammy anyway—each buzz tightens a wire—and time sticks though traffic keeps flowing while plain tasks swell with dread.
    embodied_dis_ease: Jaw welded, shoulders climbing, heartbeat loud against your palm—a whole-body alarm script
    mc_action: Phone face-down after one breath that does not finish; thumbs hover, then retract

  - id: release
    start_s: 22
    end_s: 30
    text: One slow exhale, heels weighted, sternum dips a notch—not erasing proving the nerves still obey if you steer one breath kindly.
    signature_practice: Grounded exhale paired with weight shift—heel, then ball of foot—three slow passes
    mc_action: Eyes soft on a fixed point, shoulders roll back on the out-breath only

