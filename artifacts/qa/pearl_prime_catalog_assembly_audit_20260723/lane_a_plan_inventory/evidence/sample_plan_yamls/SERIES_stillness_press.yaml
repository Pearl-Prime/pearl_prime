reader_avatar:
  age: early thirties to mid-forties
  where_they_are: It's 9:40pm. The kids are finally down. You're standing at the kitchen
    counter with a cold cup of tea you forgot you made, and your shoulders are somewhere
    up near your ears even though nothing is wrong. The house is quiet for the first
    time all day, and your body still won't believe it.
  what_they_need: Permission to feel the thing the day never had room for — and a
    language for what the body is doing that doesn't ask them to perform calm, schedule
    it, or get it right.
  what_they_avoid: Hustle-culture fixes, mindset-optimization, just-breathe platitudes,
    and anything that turns rest into one more thing to do well between the meetings
    and the bath and the lunchboxes.
series_voice_markers:
  register: contemplative, spacious, grounded — an unhurried presence who has sat
    in this themselves and is in no hurry to fix you; never clinical, never a coach,
    never hustle
  sentence_rhythm: long settling sentences that exhale, then a short one that lands;
    pauses left open the way a breath leaves room; nothing rushed, nothing crammed
  metaphor_family: stillness and breath, settling water, open ground underfoot, light
    coming slow through a window, the pause between one thing and the next — never
    machinery, productivity, military, or biohacking
_needs_authoring: false
