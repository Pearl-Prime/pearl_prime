reader_promise_family: You will learn to feel what your body has been carrying, and
  to let it settle — not by fixing yourself, but by finally turning toward what's
  already there. No optimization. No becoming someone calmer. Just a slow, honest
  return to the body you've been living above.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational map of how the
  body holds what the mind tries to forget
- Burnout (Emily & Amelia Nagoski) — completing the stress cycle in a body that never
  gets to finish it
- How to Do the Work (Nicole LePera) — nervous-system-first healing written for people
  doing it in the cracks of a full life
