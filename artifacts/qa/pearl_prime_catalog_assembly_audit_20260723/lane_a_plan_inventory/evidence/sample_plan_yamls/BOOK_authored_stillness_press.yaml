title: Your Body Is Still Bracing
subtitle: For the working parent whose nervous system keeps scanning for a danger
  that already passed — and never quite stands down
cover_tagline: Nothing is wrong. Your body hasn't heard yet.
description:
  short_blurb: The kids are safe, the day is over, and your shoulders are still up
    by your ears. This is a book for the working parent whose body keeps sounding
    an alarm for something that isn't there — and a slow, kind way to let it finally
    stand down.
  long_description: 'You''re sitting in the quiet after the house has gone still,
    and your body is braced for something. You couldn''t say what. There''s no fire,
    no emergency, no child crying down the hall — and still your jaw is set, your
    breath is high and shallow, your stomach pulled tight around a threat that never
    arrives. You''ve been living this way so long it stopped feeling like a state
    and started feeling like you.


    This book is for the working parent whose alarm never fully switches off. The
    one who feels the surge before the phone even buzzes. Who lies down exhausted
    and finds the body wide awake, scanning, certain that letting go would mean missing
    the thing that finally goes wrong.


    Here you''ll come to recognize what your nervous system is actually doing — that
    the bracing was never a flaw, but an old protection that learned to fire early
    and never learned it could stop. You''ll feel, slowly, the difference between
    a real alarm and the echo of one. You''ll learn what it is in the body that keeps
    the alarm lit, and what it takes for it to believe, at last, that the danger has
    passed. Not by forcing calm. Not by talking yourself down one more time at 3am.
    By turning toward the sensation instead of away, and letting it move the way it
    always wanted to.


    This is not a book that will make the feeling stop on command. It won''t optimize
    your stress response or hand you a morning routine to perfect. There is nothing
    here to get right, and no calmer version of you to finally become. The alarm is
    not the enemy, and neither are you.


    What it offers instead is recognition — a language for what is happening inside
    you, that you can reach for the next time the surge comes, on a subway platform
    or between two meetings or in the dark with everyone else asleep. You''ll come
    to understand what your body is doing and why, after everything, it makes complete
    sense.


    Not fixed. Not finished. Just no longer alone with it, and no longer at war with
    the part of you that was only ever trying to keep you safe.


    Book 1 of the Stillness Press somatic healing series.'
