# SERIALIZATION PROOF — ep_002 (TEACHER-MODE). One mode only: TEACHER. No music.
# Continues "The Forest Beneath the Skin" (stillness_press / dark_fantasy / series02).
# Carries forward continuity state from config/manga/continuity/stillness_press__en_US__dark_fantasy__series02.yaml
# (last_episode_id: ep_001, next_episode_mandate for ep_002). This chapter does NOT re-run
# ep_001's wound->turn->clean-renewal shape: the Vigil's return is a RELAPSE under a harder
# context (storm), the settle that lands is partial and costly (not clean), and the episode
# closes on an UNRESOLVED institutional choice + an unexplored region glimpsed, not a cure.
# Volume 1 ("The Warden Who Would Not Sleep") per SERIAL_ENGINE_SPINES_5VOL.md §2 — this is
# chapter 2 of 10: the Iron Warden patrol's first contact (spine's stated volume-close pressure,
# introduced early and left OPEN, not resolved) and the first sighting of the Marsh of the
# Swallowed Voice (V2's setting, glimpsed not entered — map named, not solved).

schema_version: 1.0.0
artifact_type: chapter_script_writer_handoff
series_id: stillness_press__en_US__dark_fantasy__series02
catalog_title: "The Forest Beneath the Skin"
chapter_id: ep_002
title: "The Forest Beneath the Skin — Episode 2: The Storm Does Not Ask Permission"
mode: teacher                         # XOR — never music
manga_author: Hana Tidecalm           # teacher-archetype EI author (ahjan lineage) — carried from ep_001
teacher_id: ahjan
teacher_doctrine_anchor: body_first_not_mind
brand_id: stillness_press
genre: dark_fantasy
topic: somatic_healing                # interior — never named on the page
locale: en_US
available_locales: [en_US, ja_JP, zh_CN, zh_TW, ko_KR]

# Teacher-mode 3-beat skeleton — NOT a repeat of ep_001's wound/turn/renewal shape:
# wound here is RELAPSE (a lesson under a harder context, not its absence); turn is a
# PARTIAL, costly settle (never a clean re-teaching); renewal is an OPEN institutional
# and geographic hook, not a cure.
mode_beats:
  wound: page_1-2    (RELAPSE — a real storm, not a training scenario, and the Vigil returns changed; Rin's hand finds the hilt before thought can stop it)
  turn:  page_3-4    (the Keeper is absent; Rin must re-find the meeting alone, under worse conditions, and only partly succeeds — the wall groans instead of healing)
  renewal: page_5-6  (NOT a cure — the Iron Wardens arrive mid-breach and offer a stronger wall; the Marsh of the Swallowed Voice is sighted, unexplored; both are left open)

main_characters:
  - id: rin
    name: Rin
    role: >-
      protagonist — the Warden. Carried from ep_001: has met the Vigil once, in calm, after
      a storm had already passed. Believes — untested — that the meeting was a fix. This
      chapter tests that belief against a storm that has not yet passed.
    visual_anchor: bark-and-iron plate, less white-knuckled than ep_001 but still braced at the shoulders; the jade leaf from ep_001 still caught in the hair, now half-wilted.
  - id: keeper
    name: The Keeper
    role: >-
      the doctrine, as a character. Absent for most of this chapter (walking the far
      treeline, per ep_001's close) — carried forward per cross-lane rail: "the vessel may
      decline, fail, or be surpassed, but no motif ever carries an arc." He gives no advice
      speech this episode; the lesson must be re-found by Rin's own hands, not re-delivered.
    visual_anchor: moss-grey robe, a shape at the edge of two panels only — distant, unreachable in the storm.
  - id: the_vigil
    name: The Vigil
    role: >-
      carried from ep_001 (folded down to rest in the roots, "not gone, but resting").
      Returns changed by context: storm-scaled, its many eyes now lightning-silver instead
      of calm-dark. The same creature; a harder version of the same question.
  - id: warden_captain_ossa
    name: Warden-Captain Ossa
    role: >-
      NEW — leads an Iron Warden patrol; arrives at the breached wall-seam mid-storm.
      Magnificent, plated, unhurried, and utterly sincere: her order reinforces walls because
      reinforced walls have kept the realm's worst regions sealed for a generation. Not a
      villain — a rival doctrine with real evidence behind it.
    visual_anchor: dark iron plate chased with old campaign-scars, storm-slick and gleaming anyway; a lantern-spear that never gutters in the wet; the calm of someone who has never once needed to feel anything to do her job well.
  - id: the_marsh
    name: The Marsh of the Swallowed Voice
    role: >-
      NEW — sighted for the first time at the far edge of Rin's patrolled ground during the
      lightning: a low, restless swampland, mist a wrong color, a sound underneath the thunder
      that might be voices. Named on the map this chapter; entered by no one. (Seeds V2.)

scene_palette:
  primary: deep forest indigo + black bark, now storm-lashed
  secondary: cold mist grey-blue, boiling instead of resting (the difference from ep_001's held breath)
  accent: jade green, dimmer than ep_001 — the color of a lesson under strain, not confirmed
  turn_palette: lightning-silver flashes only (pages 2-4) — deliberately NOT the dawn-gold of ep_001; this chapter earns no gold

pages:
  # ── WOUND: relapse — the storm does not know she has already learned this ──
  - page_id: ep002_p01
    panels:
      - {panel_id: ep002_001, beat_type: establishing, intent: "the settled state under a HARDER context than the one that produced it (serialization law)",
         scene: "Wide. The forest-body realm under a real storm for the first time — rain hammering the ribbed canopy, lightning strobing the pale bark-veins white. The wall-seam Rin healed in ep_001 (branches budded, jade leaves knit) stands, but the flowers are pressed flat and dripping, straining at the joints."}
      - {panel_id: ep002_002, beat_type: character, intent: "the practiced calm, tested before it's proven",
         scene: "RIN patrols the seam in the downpour, hand resting NEAR the hilt rather than gripping it — visible progress since ep_001 — jaw tight against the thunder rolling closer."}
      - {panel_id: ep002_003, beat_type: arrival, intent: "the same creature, a harder version of the same question",
         scene: "From the roots where it slept, THE VIGIL rises at a thunderclap — larger than ep_001, storm-scaled, its many eyes snapping open all at once and flashing lightning-silver instead of calm-dark. It does not charge. It waits, the way it always has — but this time the wait itself feels like a test."}
  - page_id: ep002_p02
    panels:
      - {panel_id: ep002_004, beat_type: action, intent: "RELAPSE — the reflex arrives before the lesson can",
         scene: "Lightning strikes close; the crack is deafening. Rin's hand SNAPS to the hilt and half-draws before any thought catches up — pure reflex, faster than the meeting she learned. The Vigil's storm-lit eyes fix on the half-drawn blade."}
      - {panel_id: ep002_005, beat_type: collapse, intent: "escalation under the storm's own terms — bigger context, bigger cost, never a repeat of ep_001's nine",
         scene: "Where Rin's blade clears the scabbard an inch, the Vigil doesn't split into nine this time — it GROWS, mass pulling in off the storm itself, eyes multiplying across a wider flank. Bigger threat, same creature: the engine stressed under its own terms, not raised stakes-in-general."}
      - {panel_id: ep002_006, beat_type: quiet, intent: "growth shown honestly — she catches the reflex mid-motion, a full stage earlier than ep_001",
         scene: "CU: Rin's white-knuckled hand on the half-drawn hilt — trembling, but STOPPING. She notices the bracing THIS time, before the collapse, not after it (the honest, incremental difference ep_001 promised was possible). Rain sheets down her face. Small caption-free beat: she has not solved this. She has only gotten one step earlier at catching it."}

  # ── TURN: alone, under worse conditions, only a partial settle ─────────────
  - page_id: ep002_p03
    panels:
      - {panel_id: ep002_007, beat_type: character, intent: "the vessel absent — the lesson must be re-found, not re-delivered (cross-lane rail: no re-teaching)",
         scene: "Rin's eyes go to the ridge stone where the Keeper always sits. Empty, rain-slicked, moss undisturbed. He is a small shape far off at the edge of the panel, walking the distant treeline, not looking back. No dialogue. He offers nothing this chapter."}
      - {panel_id: ep002_008, beat_type: memory, intent: "the doctrine returns as IMAGE, not speech — a visual rhyme, never a repeated line",
         scene: "Silent panel, storm-blurred at the edges: a ghost-image bleed of ep_001's warm ground and Rin's bare hand on the pulsing roots — memory, not narration, no caption box, no Keeper voice-over."}
      - {panel_id: ep002_009, beat_type: choice, intent: "re-attempting the meeting under conditions the first success never had to survive",
         scene: "Rin drops to both knees in the storm-mud — not the dry calm roots of ep_001, but flooding, freezing runoff — and presses a bare hand flat against the ground anyway, rain driving sideways, the Vigil's storm-scaled bulk looming close enough to blot out the lightning."}
  - page_id: ep002_p04
    panels:
      - {panel_id: ep002_010, beat_type: turn, intent: "PARTIAL success — the honest cost of doing this alone, in a real storm, not a training case",
         scene: "The Vigil's nearest eyes soften, one by one, same as ep_001 — but slower, and not all of them; a ring of eyes along its far flank stays lightning-lit, wide open. It folds down, mostly, storm-heavy, still twitching. Not the clean rest of ep_001's ending."}
      - {panel_id: ep002_011, beat_type: cost, intent: "the settle held the creature but the wall pays for it — never a free win",
         scene: "Behind Rin, the healed wall-seam from ep_001 GROANS under the storm's weight where it should have held — a jade-flowered branch splits, water pouring through a fresh crack. Meeting calmed the Vigil; it did not armor the wall. The two are not the same fix."}
      - {panel_id: ep002_012, beat_type: arrival, intent: "the institutional rival — drawn by exactly this failure, arriving with real evidence on their side",
         scene: "Torchlight and a lantern-spear through the fresh crack: WARDEN-CAPTAIN OSSA and her patrol, plate gleaming storm-wet, stepping through the breach. They take in the scene fast and correctly: an unarmed Warden kneeling beside a half-settled, still-open-eyed monster, and a wall failing in real time."}

  # ── RENEWAL, reopened: doctrine clash, no cure, a new region sighted ───────
  - page_id: ep002_p05
    panels:
      - {panel_id: ep002_013, beat_type: dialogue, intent: "the rival doctrine, stated with real conviction — never a strawman",
         scene: "OSSA, not unkind, surveying the cracked seam: 'This breach has cost you a season's healing in one night. My order has held the worst regions of this realm shut for longer than you've been alive — because we build walls that don't ask the weather's permission.' She offers a hand up, lantern-spear steady. 'Let us finish what you started. Properly, this time.'"}
      - {panel_id: ep002_014, beat_type: choice, intent: "the temptation is REAL — not a false choice; this is what makes teacher-mode honest",
         scene: "CU Rin, soaked, shaking, the Vigil's half-open eyes still lit at the far flank — the offer of a stronger wall is not stupid; it is tempting for good reasons. No caption states the theme; her hand hovers between Ossa's gauntlet and the wet ground."}
      - {panel_id: ep002_015, beat_type: glimpse, intent: "V2 seeded — the map widens; a new unresolved region enters the story, unexplored",
         scene: "A long lightning flash lights the far edge of the realm past the breach: low restless swampland, mist the wrong color — sickly grey-green instead of storm-blue — and underneath the thunder, faint, something that could be voices, or could be wind through reeds. Neither Rin nor Ossa's patrol moves toward it. It is simply, suddenly, on the map."}
  - page_id: ep002_p06
    panels:
      - {panel_id: ep002_016, beat_type: quiet, intent: "no gold dawn this chapter — earned resolutions are not handed out on relapse chapters",
         scene: "Storm thinning to grey, not gold. The Vigil rests, storm-scaled and scarred-looking, most eyes closed, a ring still lit at the flank. The wall-seam stands patched crude and temporary — vines lashed fast, not grown. Ossa's patrol waits at the breach, unhurried, for an answer."}
      - {panel_id: ep002_017, beat_type: close, intent: "OPEN close — the choice undecided, the marsh unclaimed; propulsion, not renewal",
         scene: "Final panel. Rin has not answered Ossa. Her eyes are on the marsh at the world's edge instead, distant and wrong-colored under the thinning storm. No Keeper caption this time. Small hand-lettered detail in the corner: a wet, half-finished map, a new shape being inked in — MARSH — the ink still running in the rain."}

craft_notes: >-
  CONTINUITY (per config/manga/continuity/stillness_press__en_US__dark_fantasy__series02.yaml
  next_episode_mandate): must_rebreak satisfied — the Vigil returns in a NEW storm context and
  meeting does not carry cleanly (p1-2 relapse, p4 partial/costly settle, not a repeat of ep_001's
  full calm). must_plant satisfied — iron_wardens patrol visible with doctrine clash stated on-page
  (p4-5); map_page opens with the Marsh of the Swallowed Voice sighted, not entered (p5). Forbidden
  items avoided: no one-and-done cure (the settle costs the wall a season's healing; a ring of eyes
  stays open); the Keeper gives no advice speech (absent p1-4; his one appearance is silent and
  distant, p3).
  SERIALIZATION LAW: does not replay ep_001's wound->turn->clean-renewal shape. This chapter's
  wound is relapse (a lesson tested, not absent); its turn is partial and costly, never clean; its
  close is an open institutional choice + a new unexplored region, never a cure. Per
  SERIAL_ENGINE_SPINES_5VOL.md §2 shell law: dark fantasy escalates by depth and age, never raised
  stakes-in-general — this episode escalates by CONTEXT (storm vs. calm-after-storm) and by
  INSTITUTION (a rival doctrine with real evidence, not a monster).
  GENRE AUTHORITY: docs/research/manga_craft/dark_fantasy.md; pacing contract
  config/manga/manga_pacing_by_genre.yaml dark_fantasy (silent_panel_ratio 0.25-0.4, reaction_shot
  medium, page_turn_triggers used: cost_reveal p4, philosophical_provocation p5, environmental_breath
  p1/p6). Set-piece pleasures renewed in new form per §4 cross-lane rail: bestiary reveal (storm-
  scaled Vigil, same creature/new register), meeting-as-stillness-boss-fight (harder conditions),
  wall-fall/wall-crack (inverted this time — a cost, not a bloom), map page (first fill-in).
  SHELL TRACEABILITY: rival = Warden-Captain Ossa (Iron Wardens, per spine's stated pressure,
  introduced here rather than at volume-close, and left UNRESOLVED to sustain the volume rather
  than consumed in one chapter); pressure = the marsh (relationship/mystery debt, per spine's map);
  the Keeper's sealed region remains untouched, still active per continuity's unresolved_hooks.

wrapper_note: >-
  Teacher-mode only. No music, no song-motif, no Keeper advice-speech. The doctrine is re-earned
  through the same genre action as ep_001 (a hand on the ground) but under conditions the first
  success never had to survive — a real storm, no teacher, no clean creature. If this were music-
  mode it would carry the Vigil's return as a returning motif-state note rather than a monster;
  it is not — mode XOR holds. This episode intentionally denies the reader the gold-dawn turn-
  palette ep_001 earned: relapse chapters do not get the reward of resolution chapters.
