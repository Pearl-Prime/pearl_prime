# SERIALIZATION PROOF — ep_002 (TEACHER-MODE). One mode only: TEACHER. No music.
# Continues "The Mountain Does Not Move" (devotion_path_shonen / cultivation_martial / series01).
# Carries forward continuity state from
# config/manga/continuity/devotion_path_shonen__en_US__cultivation_martial__series01.yaml
# (last_episode_id: ep_001, next_episode_mandate for ep_002). This chapter does NOT let Yan win
# cleanly, and does NOT repeat ep_001's forcing->rupture->demotion shape: the failure here is a
# COST under real public stakes, not a rupture; the "renewal" is a resolve to keep practicing,
# never a victory. Wei Long collects his owed humiliation in a new context (an organic crowd,
# not a staged duel) and the Autumn Ascent roll acquires a concrete near-term date.

schema_version: 1.0.0
artifact_type: chapter_script_writer_handoff
series_id: devotion_path_shonen__en_US__cultivation_martial__series01
catalog_title: "The Mountain Does Not Move"
chapter_id: ep_002
title: "The Mountain Does Not Move — Episode 2: What the Ford Cannot Teach a Crowd"
mode: teacher                         # XOR — never music
manga_author: Brook Stillwater
teacher_id: ra                        # metadata only — never named in-story
teacher_doctrine_anchor: force_ruptures_settling_opens
brand_id: devotion_path_shonen
genre: cultivation_martial
topic: courage                        # interior — never named on the page
locale: en_US
available_locales: [en_US, ja_JP, ko_KR, zh_CN, zh_TW]

# Teacher-mode 3-beat skeleton — NOT a repeat of ep_001's forcing/rupture/demotion shape:
# wound is public re-bracing under provocation (not forcing-to-rupture); turn is a costly,
# incomplete stance-hold (not a demonstration by Ku); renewal is resolve without victory —
# the ladder gets longer, not shorter.
mode_beats:
  wound: page_1-2    (months of quiet progress meet a REAL crowd; Wei Long returns to collect the humiliation ep_001 owed him, in front of witnesses who are not staged)
  turn:  page_3-4    (Yan holds the stance at first — real growth shown honestly — until Wei Long strikes the old rupture point by name; the brace returns, the pain is real, and Yan loses the exchange in public)
  renewal: page_5-6  (no victory, no clean lesson spoken twice — Ku's one line is terse and costs nothing to the ladder; the Autumn Ascent acquires a date and Wei Long a title, and Yan goes back to the threshold bowl anyway)

main_characters:
  - id: shen_yan
    name: Shen Yan
    role: >-
      protagonist, 17. Carried from ep_001: struck from the roll, gate-duty at the First Gate,
      the threshold-bowl stance beginning to hold under routine. This chapter tests it under
      a REAL crowd and a rival who now knows exactly where the old wound is.
    visual_anchor: same scorched training robe (patched at the ribs now); two dark rings, one first ring humming faint and steady; stance settling back toward the heels by habit, still drifting forward when startled.
  - id: master_ku
    name: Master Ku
    role: >-
      carried from ep_001. Present for the duel and its aftermath but does not lecture; his one
      line this chapter is terse, craft-register, and costs the ladder nothing — no wellness
      cadence, no advice speech, no courtyard-sweeping metaphor.
    visual_anchor: same patched grey robe, single smooth iron ring; a waterskin instead of tea this chapter — the ford is louder than the stool.
  - id: wei_long
    name: Wei Long
    role: >-
      carried from ep_001 (five gates, pill-merchant heir). Returns escorting an inner-sect
      pilgrimage party across the ford — organic crowd, not staged — and collects the
      humiliation ep_001's "gibberish vow" owed him. Strikes precisely at Yan's rupture point
      by NAME, a new level of cruelty (informed, not generic).
    visual_anchor: same immaculate white robe, now six rings — one new since ep_001, a detail Yan clocks and no one explains; fan snapped shut this time, used as a pointer, not a prop.
  - id: elder_bai
    name: Elder Bai
    role: >-
      NEW APPEARANCE (carried per series-plan seed as arbiter of the Ascent). Arrives late,
      after the duel, to deliver the exhibition notice — not to judge the fight itself. The
      ladder embodied, indifferent to spectacle, only interested in the roll.
    visual_anchor: verdict scroll now bearing a fresh wax seal; the same brush that struck Yan's name, now inking a new notice.
  - id: pilgrims
    name: The Autumn Pilgrimage Party
    role: >-
      NEW — inner-sect disciples and lay pilgrims crossing the ford on a seasonal rite,
      escorted by Wei Long. The organic crowd whose presence turns Yan's practice into a
      public stake, per the continuity mandate ("public scrutiny," not a staged bout).

scene_palette:
  primary: cloud-swallowed mountain greys; the ford louder and higher with autumn rain-melt
  secondary: "qi-glow — jade-green when flowing, furnace-red when forced, now flickering between the two under strain (new color state: strain-flicker)"
  accent: dark iron gate-rings; Wei Long's new sixth ring, deliberately unexplained this chapter
  turn_palette: none earned this chapter — the river stays grey, not silver; the reward palette is withheld, matching the incomplete turn

pages:
  # ── WOUND: quiet progress meets a real crowd ────────────────────────────────
  - page_id: ep002_p01
    panels:
      - {panel_id: ep002_001, beat_type: establishing, intent: "months compressed honestly — real but incomplete progress, never a montage of full mastery",
         scene: "Autumn morning, weeks compressed in a tight strip: Yan opening the gate at dawn, closing it at dusk, feet settling into the threshold bowl a little more naturally each time. First Ring hums low and steady now, background, easy. Narration box: 'Forty mornings. The bowl had stopped feeling like a punishment and started feeling like a place he stood.'"}
      - {panel_id: ep002_002, beat_type: cost, intent: "the honest tell that this is not a cure — startled reflex still forces qi",
         scene: "A cart-mule bolts at a hawk's shadow; Yan's hand snaps out to catch the bridle and qi FLOODS the grip out of old habit — furnace-red flicker at his knuckles before he catches it and lets it settle back to jade. Small, private, no one sees. Narration box: 'Nobody saw that one. He counted himself lucky the mule had.'"}
      - {panel_id: ep002_003, beat_type: arrival, intent: "the crowd arrives ORGANICALLY — not a staged challenge; this is what raises real stakes",
         scene: "Bell-hung banners approach along the river road: an inner-sect PILGRIMAGE PARTY crossing at the ford for the autumn rite, two dozen disciples and lay pilgrims in procession — and at their head, escorting, WEI LONG, six dark rings now instead of five, fan snapped shut."}
  - page_id: ep002_p02
    panels:
      - {panel_id: ep002_004, beat_type: rival, intent: "collecting the owed humiliation — informed cruelty, not generic taunting",
         scene: "Wei Long peels off from the procession, unhurried, the crowd slowing to watch out of simple curiosity. Wei Long, to the pilgrims, pleasant and carrying: 'This is the one who vowed to climb the whole ladder without leaving the first gate. Still here. Still first gate.' Beat, to Yan directly: 'Show them the vow, then. Show them what standing still is worth.'"}
      - {panel_id: ep002_005, beat_type: dialogue, intent: "the challenge framed as a public demonstration — the ladder is watching again",
         scene: "A pilgrim, curious rather than cruel, asks Wei Long what he means. Wei Long, to the crowd: 'A strike, one each. If the gatekeeper's boy is standing on something real, he'll still be standing after mine.' Murmurs; the crowd forms a rough circle without meaning to — an audience assembled by simple momentum, not by anyone's design."}
      - {panel_id: ep002_006, beat_type: quiet, intent: "Yan's choice — he does not refuse; the vow was made in public and must be paid in public",
         scene: "Yan sets down the gate-bar, steps to the threshold bowl — his own ground, at least — and settles his heels into it without being told. CU his face: not confident, not afraid either. Steady, which is new. Master Ku, watching from the stool, sets down his waterskin and says nothing yet."}

  # ── TURN: real growth shown honestly, then the precise strike that undoes it ─
  - page_id: ep002_p03
    panels:
      - {panel_id: ep002_007, beat_type: action, intent: "growth shown HONESTLY — not a montage claim, a demonstrated one",
         scene: "Wei Long's first strike comes fast, contemptuous — a palm aimed to test, not to injure. Yan does NOT brace forward this time. He holds the bowl-stance; the strike lands and rolls off through his rooted weight the way the river rolled off Ku at the ford in ep_001. Crowd reaction: a genuine gasp — this is real, not staged."}
      - {panel_id: ep002_008, beat_type: reaction, intent: "the crowd's read of the moment matters — public stakes made visible",
         scene: "Stacked reaction panels: a pilgrim murmuring 'he didn't even move—'; another disciple, impressed despite themselves. Wei Long's smile doesn't waver, but his eyes sharpen — recalculating, the way they did at the ford, except this time in front of witnesses he cannot afford to lose in front of."}
      - {panel_id: ep002_009, beat_type: rival, intent: "the precise, informed cruelty — Wei Long strikes the WOUND, not the stance",
         scene: "Wei Long steps back, fan snapping open now, and instead of a second strike, speaks — quiet, only for Yan, pitched to carry anyway: 'The healers sealed the rupture. They didn't ask if it forgave you.' He taps his own ribs, exactly where Yan's old channel-burn sits. 'Does it still catch, when you're startled? Truly?'"}
  - page_id: ep002_p04
    panels:
      - {panel_id: ep002_010, beat_type: collapse, intent: "THE RELAPSE — public humiliation redux, informed and costly, not a repeat of ep_001's rupture",
         scene: "The words land where the strike couldn't. Inner-vision inset: the healed channel-scar flares old-pain, jade light stuttering to furnace-red at the edges — not a rupture this time, just the old fear, resurfacing exactly where it was pressed. Yan's weight lurches forward off his heels — the half-step-too-far stance, back, uninvited."}
      - {panel_id: ep002_011, beat_type: action, intent: "the cost, made physical — he loses, honestly, in front of the crowd",
         scene: "Wei Long's second strike — same contemptuous test-palm as the first — catches Yan mid-lurch and sends him down onto one knee in the threshold bowl, breath knocked out, the crowd's murmur turning to something closer to pity. Not a rupture. Just a loss."}
      - {panel_id: ep002_012, beat_type: reaction, intent: "public cost made visible — reputation, not meridians, this time",
         scene: "Wei Long, not even smiling now, addresses the crowd rather than Yan: 'Standing still is easy when nobody's watching for the crack.' He refolds the fan. The pilgrims move on, murmuring; a few glance back at Yan, kneeling in the bowl he'd been so sure of a page ago."}

  # ── RENEWAL, reopened: no victory, one terse line, a date on the calendar ──
  - page_id: ep002_p05
    panels:
      - {panel_id: ep002_013, beat_type: quiet, intent: "the vessel's one line — craft-register, costs the ladder nothing, no wellness cadence",
         scene: "Ku crosses to Yan once the ford clears, offers a hand up — doesn't take it back when Yan hesitates. Ku, flat: 'Pain doesn't ask if you meant to brace. It only asks if you did.' He lets that sit exactly once, no elaboration, and turns back to the gate-ledger."}
      - {panel_id: ep002_014, beat_type: dialogue, intent: "Elder Bai arrives — not for the fight, for the roll; the ladder is indifferent to spectacle",
         scene: "ELDER BAI arrives with the tail end of the pilgrimage, uninterested in what she clearly already knows happened. She unrolls a notice at the gate-post instead. Elder Bai, toneless: 'Winter exhibition. Disqualified disciples may petition reinstatement by demonstration. Forty days.' She seals it to the post and departs without waiting for a reaction."}
      - {panel_id: ep002_015, beat_type: rival, intent: "Wei Long's title made concrete — the pressure gets a name and a role, not just a sneer",
         scene: "From down the road, without turning, Wei Long calls back: 'I've asked to stand as the sect's representative challenger. Someone has to keep the roll honest.' A pilgrim's voice, admiring, drifting back: '—six gates before twenty, and now this—' Yan, still kneeling, hears both."}
  - page_id: ep002_p06
    panels:
      - {panel_id: ep002_016, beat_type: quiet, intent: "the cost paid, the practice resumed anyway — resolve without victory, the honest renewal",
         scene: "Dusk. Yan alone at the threshold bowl, ribs aching, pride worse. He does not go find Wei Long. He does not train through the pain by forcing it, either — old habit checked. He simply steps back into the bowl, settles his heels, and stands the way he had before the crowd came. Narration box: 'The bowl didn't care that he'd lost in front of people. It never had.'"}
      - {panel_id: ep002_017, beat_type: revelation, intent: "small, honest progress tick — never a clean reward for the loss",
         scene: "Inner-vision inset, small: the first ring's hum steadies again, low, after the day's strain — not stronger for the humiliation, just present, unbroken by it. Insert CU: the forty-day notice on the gate-post, wax seal catching the last light."}
      - {panel_id: ep002_018, beat_type: close, intent: "OPEN close — the ladder longer, not shorter; propulsion into ep_003, never a cure",
         scene: "Final wide panel: the ten-thousand-step stair above, cloud-capped, unchanged; the First Gate below, Yan back in the bowl at dusk, sash still two rings dark and one humming. Narration box, terse: 'Forty days. He had lost in front of a crowd once already. He had forty days to make sure it only happened the once.'"}

craft_notes: >-
  CONTINUITY (per
  config/manga/continuity/devotion_path_shonen__en_US__cultivation_martial__series01.yaml
  next_episode_mandate): must_rebreak satisfied — Yan's settling fails under crowd/stakes in a NEW
  context (an organic pilgrimage crowd, not a repeat of the Autumn Ascent stair) via a targeted,
  informed provocation rather than a serene wellness-cadence repeat (p3-4). must_plant satisfied —
  wei_long collects the owed humiliation and forces a public brace (p2-4); autumn_ascent_roll
  acquires concrete terms — a forty-day winter exhibition with Wei Long confirmed as
  representative challenger (p5). Forbidden items avoided: no courtyard-sweeping wellness
  metaphor anywhere on the page; Yan does NOT win cleanly — he loses the exchange in front of
  witnesses and pays a public, not just physical, cost.
  SERIALIZATION LAW: does not replay ep_001's forcing->rupture->demotion shape. This chapter's
  wound is a public re-brace under precise provocation, not a rupture; its turn shows honest,
  incomplete growth (the first strike is absorbed cleanly) before the informed strike undoes it;
  its close is resolve without victory — the practice resumes, the ladder gets a harder deadline,
  nothing is cured. Per SERIAL_ENGINE_SPINES_5VOL.md §4 shell law: battle escalates classically
  (ladder, rival, tournament clock) while inverting the shonen power curve — Yan gives up the
  comfort of an easy win, not a possession.
  GENRE AUTHORITY: cultivation_bestseller_research_2026-05-13.md (no dedicated craft bible per
  teacher_apparatus_per_genre.md, cultivation row — carried forward from ep_001's authority note).
  PACING CONTRACT: config/manga/manga_pacing_by_genre.yaml cultivation_martial (reaction_shot
  frequency high — p2/p3/p4; silent ratio low, kinetic pages dominate; sfx heavy_kinetic;
  page_turn_triggers used: rival_challenge p2, sect_revelation p5, inner_realm_descent p2/p4/p6).
  Register: classical_xianxia, carried from ep_001. Turn-palette deliberately withheld this
  chapter (no river-mist silver, no dawn) — the reward visual is not earned on a loss.
  SHELL TRACEABILITY: rival state escalated per spine cross-lane rail #1 (Wei Long converts from
  strolling taunt to informed, targeted cruelty — a body paying interest, now with witnesses);
  system pressure (autumn_ascent_roll) converts from vague sect gossip to a dated, named
  exhibition — the institution given teeth, not just a rumor.

wrapper_note: >-
  Teacher-mode only. Master Ku's doctrine (force ruptures, settling opens) is never a self-help
  line and appears exactly once, in craft-register, after the cost has already landed (p5) — not
  before it, not to soften it. No musician, no song, no sound-motif. If this were music-mode it
  would carry the crowd's turn against Yan via a scored silence rather than Ku's spoken line —
  it is not; mode XOR holds. Interior topic (courage) never named on the page — it is felt as the
  gap between the stance that held once and the stance that broke once someone named the wound.
