# SERIALIZATION PROOF — ep_002 (TEACHER-MODE). One mode only: TEACHER. No music.
# Continues "The Blade That Stopped Trying" (stillness_press / action_battle / series01).
# Carries forward continuity state from
# config/manga/continuity/stillness_press__en_US__action_battle__series01.yaml
# (last_episode_id: ep_001, next_episode_mandate for ep_002). This chapter does NOT repeat the
# ep_001 home-dojo win: the settled strike shatters under a real audience and public stakes, Jun
# loses the exchange honestly, the Sensei gives no doctrine speech, and Kazu / Tessen-ryū remain a
# distant seed only, per the mandate's guardrail against inventing what the spine reserves for V1's
# close.

schema_version: 1.0.0
artifact_type: chapter_script_writer_handoff
series_id: stillness_press__en_US__action_battle__series01
chapter_id: ep_002
catalog_title: "The Blade That Stopped Trying"
title: "The Blade That Stopped Trying — Episode 2: The Strike Someone Is Watching"
mode: teacher                         # XOR — never music
manga_author: Kaito Stillwater
teacher_id: ahjan                     # metadata only — never named in-story
teacher_doctrine_anchor: body_first_not_mind
brand_id: stillness_press
genre: action_battle
topic: courage                        # interior — never named on the page
locale: en_US
available_locales: [en_US, ja_JP, zh_CN, zh_TW, ko_KR]

# Teacher-mode 3-beat skeleton — NOT a repeat of ep_001's private-circle wound/turn/renewal shape:
# wound is the settled strike meeting a REAL audience for the first time; turn is the brace
# returning mid-bout under that audience's weight, read and exploited by a stranger opponent;
# renewal is resolve without a clean win — qualifiers now have a date, Kazu a distant name.
mode_beats:
  wound: page_1-2    (a qualifier-signup notice goes up at the dojo and a stranger from another school walks in to test the "settled" rumor in front of a gathering crowd — the first REAL audience the strike has ever faced)
  turn:  page_3-4    (the bout opens settled and true, then the crowd's murmur about the qualifiers spikes Jun's nerves mid-exchange; the brace returns, the challenger reads it aloud, and lands the hit that beats her)
  renewal: page_5-6  (no pep-talk, no clean win — the Sensei says one line and lets it cost nothing; Jun returns to the empty circle at dusk to practice settling WITH witnesses imagined, and the qualifiers get a date while Kazu's name arrives as a rumor only)

main_characters:
  - id: jun
    name: Jun
    role: >-
      protagonist. Carried from ep_001: one unforced strike landed on the Sensei, alone, at dawn,
      in the home circle. This chapter tests whether that settling survives being WATCHED — the
      first time anyone but the Sensei has seen her fight.
    visual_anchor: same wiry frame, less coiled than ep_001 but not loose; notched practice blade now gripped with visible effort to keep it soft; a fresh dojo roster taped to the wall behind her reads clearer than her own face.
  - id: sensei
    name: The Sensei
    role: >-
      carried from ep_001. Present for the bout and its aftermath. Gives no pep-talk and no
      doctrine speech naming the technique — his one line this chapter is terse, costs the
      circle nothing, and arrives only after the bout is already lost.
    visual_anchor: same plain grey gi, same loose stance; this chapter he stands at the circle's edge rather than in it — a spectator for once, not the opponent.
  - id: circle_challenger
    name: The Traveling Challenger
    role: >-
      NEW APPEARANCE (carried per continuity as "circle_challenger" — entered_dawn_circle at
      ep_001 close, unnamed). A visiting fighter from a neighboring school, drawn by dojo gossip
      about "the girl who beat the old man without forcing it." Reads bodies as fast as the
      Sensei does, but uses the read to WIN, not to teach.
    visual_anchor: patched brown gi from a traveling school, wrapped forearms, a habit of watching hands and shoulders before faces; unhurried the way the Sensei is, but with an edge the Sensei's stillness never had.
  - id: qualifier_notice
    name: The Prefectural Qualifiers Notice
    role: >-
      NEW — a signup sheet and poster tacked to the dojo entrance, making the qualifiers a
      concrete, visible, dated pressure for the first time (per continuity must_plant).
  - id: onlookers
    name: The Gathered Crowd
    role: >-
      NEW — dojo regulars, a few parents, and passersby who stop when word spreads that a
      challenge is happening. The first real audience the settled strike has ever had; their
      presence, not the challenger's skill, is what re-braces Jun.

scene_palette:
  primary: midday dojo — door thrown open, ordinary daylight instead of dawn's private shafts
  secondary: hot red-orange (the brace returning, now under a crowd's eyes instead of her own effort)
  accent: cool steel-blue + white (the settled strike, briefly held, then lost)
  turn_palette: none earned this chapter — the light stays plain midday flat, not the dawn-gold of ep_001's win; the reward palette is withheld, matching the incomplete turn

pages:
  # ── WOUND: a real audience arrives for the first time ───────────────────────
  - page_id: ep002_p01
    panels:
      - {panel_id: ep002_001, beat_type: establishing, intent: "the ordinary dojo, now with a notice that makes the world bigger",
         scene: "Midday, dojo door open to the street. A PREFECTURAL QUALIFIERS signup sheet is tacked to the entrance post, half-filled with names, Jun's own name already on it in someone else's handwriting — the Sensei's. She stares at her name on a public list like it's a stranger's."}
      - {panel_id: ep002_002, beat_type: cost, intent: "the honest tell that the settling is still fragile — small, private, unremarked",
         scene: "A junior student yelps, tripping over a floor mat; Jun's hand shoots out to catch him and her grip SLAMS tight from old habit — a hot flicker at her knuckles before she catches it and lets it go soft again. No one but her notices. She exhales, unsettled by how close that was."}
      - {panel_id: ep002_003, beat_type: arrival, intent: "the challenger arrives ORGANICALLY — drawn by rumor, not staged",
         scene: "A stranger in a patched brown gi steps through the open door — THE CIRCLE CHALLENGER, wrapped forearms, watching the room's hands before its faces. Behind him, a few passersby who'd overheard gossip in the street drift in after him, curious. A crowd assembles by simple momentum."}
  - page_id: ep002_p02
    panels:
      - {panel_id: ep002_004, beat_type: rival, intent: "the challenge framed as a public test of the rumor — not staged, but not private either",
         scene: "The Challenger, easy and unhurried, to the room at large: 'Word's out there's a girl here who beats her teacher without trying. I came to see if that's true, or if the old man's just gotten slow.' A few onlookers laugh; more drift closer. Jun feels every eye land on her at once."}
      - {panel_id: ep002_005, beat_type: dialogue, intent: "Jun's choice — she doesn't refuse; the vow was public the moment her name went on the sheet",
         scene: "Jun sets down the broom she was holding, steps into the circle without being asked twice. She settles her shoulders down out of habit now — a small, real win already, before the bout even starts. The Sensei, at the circle's edge this time, says nothing, only steps back to let it be hers."}
      - {panel_id: ep002_006, beat_type: quiet, intent: "the crowd settles into a rough ring — an audience assembled, not arranged",
         scene: "The onlookers form a loose circle around the sparring ring without anyone directing them — parents, a couple of dojo regulars, one holding a child up to see. The room that was private at dawn is suddenly, irreversibly, public."}

  # ── TURN: settled and true, then the crowd's weight re-braces her ───────────
  - page_id: ep002_p03
    panels:
      - {panel_id: ep002_007, beat_type: action, intent: "growth shown HONESTLY — the settling holds against a real stranger, not the Sensei's patient rhythm",
         scene: "First exchange. The Challenger tests her fast, unhurried on his own terms — and Jun does NOT lock up. Shoulders down, grip soft, she reads his committed strike and slips it clean, the way she landed her first true hit in ep_001. A genuine gasp from the crowd — this works on someone new."}
      - {panel_id: ep002_008, beat_type: reaction, intent: "the crowd's read of the moment matters — public stakes made visible in real time",
         scene: "Stacked reaction panels: a parent murmuring 'she didn't even flinch—'; a dojo junior grinning, already bragging to a neighbor. The Challenger's easy smile doesn't move, but his eyes sharpen, recalculating — the way a fighter does when the first read fails."}
      - {panel_id: ep002_009, beat_type: rival, intent: "the challenger reads the ROOM, not just Jun — and finds the actual lever",
         scene: "The Challenger doesn't press the attack again. He steps back, glancing once at the crowd, then at the qualifiers sheet still visible through the open door. To Jun, quiet, pitched to carry: 'That's a nice trick for an empty room. Everyone's watching now, though. Bet that's new.'"}
  - page_id: ep002_p04
    panels:
      - {panel_id: ep002_010, beat_type: collapse, intent: "THE RE-BRACE — the crowd's weight does what the challenger's strikes couldn't",
         scene: "The words land where the strikes hadn't. Jun's eyes flick, just once, to the crowd — a parent's phone half-raised, a child's stare, her own name still wet-ink fresh on the sheet by the door. Her shoulders climb. Her grip locks. The settling she'd held all morning evaporates in half a breath."}
      - {panel_id: ep002_011, beat_type: rival, intent: "the tell, read aloud and exploited — brace_tell satisfied on the page",
         scene: "The Challenger sees it instantly — shoulders up, jaw set, weight forward on her toes. He doesn't gloat; he simply says it, flat, so the whole circle hears: 'There it is. Your shoulders climbed the second the crowd got loud.' Then he closes the distance while she's still braced."}
      - {panel_id: ep002_012, beat_type: action, intent: "the cost, made physical and public — she loses the exchange, honestly",
         scene: "Braced and a half-beat late, Jun overcommits trying to force a counter — the exact forcing that lost her every bout in ep_001. The Challenger's palm catches her sternum and sits her down hard on the mat, more surprised than hurt. The crowd's murmur turns sympathetic, not mocking, which is somehow worse."}

  # ── RENEWAL, reopened: no victory, one terse line, a date and a name arrive ──
  - page_id: ep002_p05
    panels:
      - {panel_id: ep002_013, beat_type: quiet, intent: "the Sensei's one line — craft-register, costs the circle nothing, no technique named",
         scene: "The Challenger offers a hand up to the crowd's applause; Jun ignores it, gets up on her own. The Sensei crosses only once the ring empties, doesn't help her up either, just says, flat: 'You forgot the room existed before you forgot to breathe. Wrong order.' He turns back to sweeping before she can answer."}
      - {panel_id: ep002_014, beat_type: dialogue, intent: "the qualifiers acquire a real date — must_plant satisfied concretely, not as gossip",
         scene: "A dojo elder tacks a second notice beside the signup sheet: PREFECTURAL QUALIFIERS — SIX WEEKS. The Challenger, already at the door, glances at it, then back at Jun: 'Six weeks. Get that trick to survive a real crowd by then, or don't bother showing up.'"}
      - {panel_id: ep002_015, beat_type: rival, intent: "Kazu arrives as a DISTANT SEED only — a name in someone else's mouth, nothing more",
         scene: "A dojo junior, still buzzing from the bout, asks the departing Challenger if he's entering the qualifiers too. The Challenger, already walking: 'Not against Tessen-ryū's crowd. Kazu's entering this year. I'd rather lose to a girl who's still learning than to that.' He's gone before anyone can ask who Kazu is."}
  - page_id: ep002_p06
    panels:
      - {panel_id: ep002_016, beat_type: quiet, intent: "the cost paid, the practice resumed anyway — resolve without victory, the honest renewal",
         scene: "Dusk. The dojo empty again, crowd long gone, the two notices still taped by the door. Jun steps into the circle alone, settles her heels the way she had at dawn — but this time, before she drops her shoulders, she pictures the crowd that isn't there. She breathes through the imagined weight of being watched and settles anyway."}
      - {panel_id: ep002_017, beat_type: revelation, intent: "small, honest progress tick — never a clean reward for the loss",
         scene: "Close on her hands: the grip stays soft this time, even with the memory of the crowd fresh. Not stronger for the humiliation — just present, tested once, and holding a second time in the empty room. Insert: the qualifiers notice catching the day's last light through the doorway."}
      - {panel_id: ep002_018, beat_type: close, intent: "OPEN close — the ladder longer, not shorter; propulsion into ep_003, never a cure",
         scene: "Final wide panel: Jun alone in the dusk-lit circle, notched blade settled loose in her hand, the six-week notice and an unfamiliar name — Kazu — both waiting outside the door she hasn't walked through yet. Narration box, small: 'She'd lost once in front of people already. Six weeks to make sure it only happened the once.'"}

craft_notes: >-
  CONTINUITY (per config/manga/continuity/stillness_press__en_US__action_battle__series01.yaml
  next_episode_mandate): must_rebreak satisfied — Jun's settling shatters in a NEW context (a real,
  organically-gathered audience triggered by the qualifiers sheet, not a serene repeat of the
  home-dojo Sensei win) via the crowd's weight and the challenger's read, not a staged re-run of
  ep_001's duel (p3-4). must_plant satisfied — prefectural_qualifiers becomes concrete and dated
  (six weeks, p5) rather than gossip; brace_tell is read aloud on the page by the challenger (p4);
  kazu arrives strictly as a distant seed — a name in the departing challenger's mouth, never seen
  or confirmed beyond rumor (p5), per the mandate's "distant seed only" constraint. Forbidden items
  avoided: no second clean home-dojo-style win without cost — this bout is lost, publicly, and the
  cost (public embarrassment, not injury) is paid on the page; no Sensei pep-talk or doctrine
  speech naming the "settled strike" as a technique — his one line (p5) is terse, sequencing-only,
  and never names the method; Jun does not win by forcing harder or bracing through the bout — she
  loses the exchange while braced and the chapter's only reward is a held breath in an EMPTY room
  at the close, not a rematch victory.
  SERIALIZATION LAW: does not replay ep_001's wound(forcing)->turn(Sensei demo)->renewal(private
  win) shape. This chapter's wound is public exposure of a private win, not private forcing; its
  turn is a genuine loss under crowd pressure, not a demonstration by a teacher; its close is
  resolve without victory — the qualifiers get a harder deadline and a rival's name enters the air,
  nothing is cured. Per SERIAL_ENGINE_SPINES_5VOL.md §4 shell law: battle escalates classically
  (qualifier clock, named-but-unseen rival) while the unbracing power system stays the same
  currency — she gives up a clean win, not a possession.
  GENRE AUTHORITY: per specs/MANGA_GENRE_AGENT_SPEC.md action_battle conventions; wrapper per
  MANGA_MODE_WRAPPER_DESIGN.md / GENRE_VESSEL_SKETCHES.md, carried forward from ep_001.
  PACING CONTRACT: config/manga/manga_pacing_by_genre.yaml battle family (words_per_page 80-120,
  words_per_balloon_max 18, silent_panel_ratio 0.10-0.25, reaction_shot_frequency high — p3/p4,
  sfx_usage heavy on the bout panels p3-4, narration_tolerance minimal — narration boxes used only
  at open/close per ep_001's precedent, page_turn_triggers used: new_rival p1/p3, cliffhanger_action
  p4, vow-echo p6).
  SHELL TRACEABILITY: rival state escalated per continuity rail — circle_challenger converts from
  an unnamed ep_001-close arrival to a named-function rival with a demonstrated read-and-exploit
  method; kazu converts from spine-only mention to an in-story rumor, still unseen, exactly as the
  mandate specifies (distant seed, not an appearance).

wrapper_note: >-
  Teacher-mode only. The doctrine (the settled body strikes truer than the braced one; lose by
  forcing, win by flowing) is never a self-help line and is not spoken by the Sensei this chapter
  beyond one terse, sequencing-only remark after the loss has already landed (p5) — never before it,
  never softening it. No musician, no song, no sound-motif. If this were music-mode it would carry
  the crowd's weight re-bracing Jun via a scored silence breaking into noise rather than the
  challenger's spoken read — it is not; mode XOR holds. Interior topic (courage / bracing mistaken
  for strength) never named on the page — it is felt as the gap between the strike that worked
  alone and the strike that failed the moment someone was watching.
