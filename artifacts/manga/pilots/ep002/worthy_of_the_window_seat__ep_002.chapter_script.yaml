# Music-mode 3-beat skeleton — NOT a repeat of ep_001's opening/mid/closing shape:
# opening_motif here is the clock tightening, not a new tune; mid_recurrence is the shared song
# played correctly by a stranger, which is worse than not being heard; closing is cost, not
# confession — the ALMOST from ep_001 is not resolved, it is complicated by a second person.
mode_beats:
  opening_motif: page_1     (Thursday arrives per ep_001's "my move" — but the premiere clock has moved up, and Ren brings a professional arranger before Mio can act on anything)
  mid_recurrence: page_2-4  (the arranger sight-reads the whole shared song — including Mio's margin bars — cold and correct; correct is not the same as heard; Mio's one attempt to defend her bars costs her visibly, in front of Ren and Saki)
  closing_resolution: page_5-8 (no confession, no caption naming her worth; the premiere locks in the arranger's "safe" version, Mio is sidelined, and the only hope left is a half-noticed hum that isn't followed up)

main_characters:
  - id: mio
    name: Mio Tachibana
    role: >-
      protagonist, carried from ep_001. Took the window seat and hummed the shared song aloud,
      unhidden, for the first time. This chapter tests what "unhidden" costs when the audience
      is not a rainy empty shop but a producer's timeline.
    visual_anchor: same cardigan, pencil behind the ear — carried into this chapter until it is, pointedly, taken from her by circumstance rather than surrendered by choice (p4).
  - id: ren
    name: Ren Kuroda
    role: >-
      carried from ep_001. Genuinely grateful to "the courier," genuinely oblivious, and now
      genuinely under pressure — the moved premiere date is not his fault and he is not cruel,
      only stretched thin enough to default to whoever is credentialed in the room.
    visual_anchor: same good coat worn wrong, now with a rehearsal folder crushed under one arm; fountain pen capped and forgotten in a breast pocket, untouched all chapter — he has stopped being the one who writes by hand today.
  - id: saki
    name: Saki
    role: >-
      carried from ep_001. This chapter she is not comic relief only — she is the one who has to
      smooth over the arranger's complaint to keep Marginalia's standing with the venue/label
      foot traffic intact, making the cost land somewhere real (the shop, not just Mio's pride).
    visual_anchor: same reading glasses in aggressive curls, feather duster set down and not picked up again after p5 — the first time this chapter she is not performing for comic effect.
  - id: tomo_serizawa
    name: Tomo Serizawa
    role: >-
      NEW — a staff arranger from Ren's production house, sent to make the manuscript
      rehearsal-ready under the moved deadline. Not a villain: capable, polite, correct, and
      utterly without the shared history that makes the margin bars work. Plays the phrase
      perfectly and flattens it in the same motion.
    visual_anchor: crisp collar, tablet instead of paper, reading glasses pushed up (a deliberate visual rhyme with Saki's — professional competence without the shop's warmth); plays with excellent, characterless technique.
  - id: the_window_seat
    name: The Window Seat
    role: >-
      carried from ep_001. This chapter it stops being a prize and becomes, briefly, a place
      Mio is asked to vacate for the "professionals" to work — the exact reversal the series
      must risk to prove it is not a one-shot.

scene_palette:
  primary: rain-grey street light through the bay window — carried from ep_001, but harsher, whiter (rehearsal-room fluorescents brought in with Tomo's setup)
  secondary: after-closing blue dark — used only once this chapter (p7), and this time it does not feel safe
  accent: soft pencil-grey against ink-black, now joined by a THIRD register — Tomo's clean printed notation, professional and voiceless
  resolution_palette: none earned this chapter — no streetlamp-gold closing image; the palette stays fluorescent-white to the last page, deliberately withholding ep_001's warmth

pages:
  # ── OPENING MOTIF: the clock moves before she can ───────────────────────────
  - page_id: ep002_p01
    panels:
      - {panel_id: ep002_001, beat_type: proximity_setup, intent: "the premiere clock TIGHTENS — carried continuity pressure made concrete",
         scene: "Thursday, per ep_001's close — but Ren arrives at a run, coat worse than usual, rehearsal folder crushed to his chest. Bell over the door instead of his usual unhurried entrance. Ren, breathless: 'They moved it. Three weeks became eleven days. The hall had a cancellation.' Mio, still mid-step toward the window seat she claimed last chapter, stops."}
      - {panel_id: ep002_002, beat_type: interior_caption, intent: "her private law tested before she can even try the new one",
         scene: "Interior caption (Mio): 'Eleven days. I had a whole speech ready for three weeks.' She'd taken the window seat on faith last Thursday; the seat is still warm from no one, because Ren hasn't sat down yet — he's checking his phone instead."}
      - {panel_id: ep002_003, beat_type: proximity_setup, intent: "the NEW pressure enters, organically, not as a villain's arrival",
         scene: "The bell again. TOMO SERIZAWA enters, tablet under one arm, entirely reasonable and entirely unwelcome: 'Kuroda-san, the house sent me. Eleven days doesn't leave room for a manuscript that's half penciled margin notes.' Beat, professionally kind: 'We need a clean, credited score by tomorrow if we're printing programs Friday.'"}

  # ── MID-RECURRENCE, corrupted: correct is not the same as heard ────────────
  - page_id: ep002_p02
    panels:
      - {panel_id: ep002_004, beat_type: emotional_peak, intent: "the shared song, played by a stranger, technically perfect and hollow — the mid-recurrence FAILS",
         scene: "Tomo sits at the old upright without asking whose it is, sight-reads the whole manuscript — Ren's ink AND Mio's pencil margins — in one clean, correct pass. It is, note for note, the same music that flooded the dark shop in ep_001. It sounds like a recording of it instead of the thing itself. Ren, watching, relieved rather than moved: 'That's — yes. That's playable.'"}
      - {panel_id: ep002_005, beat_type: interior_caption, intent: "the asymmetry made unbearable — heard correctly for the first time, and it is worse",
         scene: "CU Mio at the shelves, close enough to have heard everything. Interior caption: 'He heard it whole once and looked for me. Now it's whole again and nobody's looking for anyone.' Her hand goes, automatic, to the pencil behind her ear."}
      - {panel_id: ep002_006, beat_type: dialogue, intent: "the erasure begins politely — professional correction, not cruelty",
         scene: "Tomo, tablet out, marking up the printed transcription: 'These four bars in the margin — nice instinct, but the voicing under-supports the melody here. I'll tighten it for the players.' She starts amending, pleasant, certain, already three notes into changing what Mio wrote three weeks ago in the dark."}
  - page_id: ep002_p03
    panels:
      - {panel_id: ep002_007, beat_type: chibi_release, intent: "the comic pressure-valve, but its target has shifted — the threat is now real enough that the joke lands harder",
         scene: "Chibi panel: tiny Saki vibrating behind the register, feather duster gripped like a weapon she is not allowed to use — 'SHE'S TIGHTENING THE HAUNTED MUSIC BOX BARS' — while tiny Mio, sprouting sweat-drops, mouths 'don't. don't say anything. don't—'"}
      - {panel_id: ep002_008, beat_type: almost_touch, intent: "THE ALMOST-CLAIM — she tries, in the only legal music-mode way: by playing, not saying",
         scene: "Mio crosses the shop before she can stop herself, sits at the bench beside Tomo (proximity echo of ep_001's bench scene, corrupted) and plays the ORIGINAL four bars over Tomo's amendment — not a word said, the correction made in sound, the way the whole series has always spoken."}
      - {panel_id: ep002_009, beat_type: eye_lock, intent: "the room notices — and the cost starts here, not after",
         scene: "Ren's head comes up sharp. Tomo's hands still on the keys, genuinely startled — this is the first time all chapter anyone has played anything that wasn't credentialed. Beat panel: Ren staring at Mio's hands on the keys the way he stared at the empty doorway in ep_001. He almost says something. He does not get there first."}

  # ── The cost lands: visible, structural, not just emotional ────────────────
  - page_id: ep002_p04
    panels:
      - {panel_id: ep002_010, beat_type: interior_caption, intent: "the cost — professional, not just personal; the mandate's 'visible cost' made concrete",
         scene: "Tomo, recovering fast, professionally cool rather than cruel: 'I appreciate the ear, but I can't build a printable score around an unpaid shop clerk's improvisation eleven days from a premiere.' To Ren: 'If the label asks who touched this, I need a name I can put on a contract. Can you give me one?' Silence. Ren looks at Mio and — genuinely, helplessly — doesn't have the word 'courier' ready as an answer that means anything on paper."}
      - {panel_id: ep002_011, beat_type: delayed_beat, intent: "the moment she could claim it — and the door that closes on it, structurally, not emotionally",
         scene: "Mio opens her mouth — this is it, the three words from ep_001's held caption — and Saki, phone already buzzing in her apron, cuts across the room first: 'Mio. The distributor's on line two about the Kuroda display order. Now, please.' Not unkind — real, ordinary shop business, arriving at the worst possible second. Mio's mouth closes around nothing."}
      - {panel_id: ep002_012, beat_type: interior_caption, intent: "the visible cost — job standing, not just pride, exactly as the mandate requires",
         scene: "Back room, Mio on the phone with the distributor, hearing Saki's voice through the wall placating Tomo: 'She's staff, she wasn't authorized to touch the instrument during a session, it won't happen again—' Interior caption, small and flat: 'Not authorized. Right. I forgot I worked here for a second.' Beat. 'So did they.'"}

  # ── CLOSING, withheld: no confession, no printed name, one small hope ──────
  - page_id: ep002_p05
    panels:
      - {panel_id: ep002_013, beat_type: interior_caption, intent: "the sidelining made final — the arranger's version wins, structurally, by default of time",
         scene: "Evening. Tomo packs the tablet, satisfied: 'I'll have the clean parts to the copyist tonight. Rehearsal's booked for Monday with this version.' Ren, exhausted, grateful in the wrong direction: 'Thank you — genuinely. I don't know what I'd have done with eleven days and half a manuscript.' Neither of them looks at Mio when he says it."}
      - {panel_id: ep002_014, beat_type: delayed_beat, intent: "Ren does NOT confess cleanly — forbidden per mandate; he stays exactly as oblivious as ep_001, now with a second layer of static in the way",
         scene: "On his way out, Ren pauses at the window seat — for one beat, unreadable — then just nods to Mio, still generic, still warm, still not landing anywhere specific: 'Thanks again. For — all of it.' He doesn't ask who wrote the four bars. He doesn't ask why she was at the piano. He is simply too tired and too grateful in the wrong direction to ask the one question that would change anything."}
      - {panel_id: ep002_015, beat_type: quiet, intent: "Saki, no joke this chapter — the friendship carrying the cost instead of laughing it off",
         scene: "Saki, closing up, sets the feather duster down without flourish for once. Saki, quiet: 'I smoothed it. This time.' Beat, not scolding: 'You've got eleven days and a rehearsal you're not booked into. I don't know what you do with that. I know what I'd want to.' She doesn't finish the sentence."}
  - page_id: ep002_p06
    panels:
      - {panel_id: ep002_016, beat_type: proximity_setup, intent: "the window seat reversed — the prize becomes, briefly, a place she's displaced from",
         scene: "Empty shop, after hours. The window seat — hers, since ep_001's close — currently buried under Tomo's abandoned tablet charger cord and a stack of 'clean' printed parts. Mio moves them off, slowly, and sits anyway, but the gesture doesn't have last week's triumph in it. Interior caption: 'I sat here on faith last week. Faith doesn't print a program.'"}
      - {panel_id: ep002_017, beat_type: interior_caption, intent: "no caption tells her she is worthy — forbidden per mandate; she is left with the work, not a verdict",
         scene: "Mio takes her own original pencil manuscript — the four bars, unamended, folded and kept, not thrown away — out of her cardigan pocket. She doesn't play it. She doesn't decide anything grand. She just keeps it, the way she's kept things quietly her whole life. Interior caption, small: 'It's still mine whether or not it's on the program.' Beat, honest, not triumphant: 'I don't know if that's enough.'"}

  # ── PROPULSION: the half-noticed hum, unfollowed — into ep_003 ────────────
  - page_id: ep002_p07
    panels:
      - {panel_id: ep002_018, beat_type: eye_lock, intent: "the one hope — Ren's ear still prefers her voice, unconsciously, unresolved",
         scene: "Cut to: Ren, walking home in the rain, rehearsal folder under his arm, Tomo's clean printed version tucked inside it. He's humming under his breath — and it is NOT Tomo's tightened voicing. It is Mio's original four bars, note for note, the ones the copyist is about to erase. He doesn't notice he's doing it."}
      - {panel_id: ep002_019, beat_type: delayed_beat, intent: "unresolved on purpose — no one connects the dots this chapter; that is the propulsion",
         scene: "Ren stops walking for one beat, mid-hum, frowning slightly at nothing — a flicker of almost-noticing, immediately lost to the rain and the folder and the eleven days ahead. He keeps walking. The panel does not explain the flicker; it just shows it."}
  - page_id: ep002_p08
    panels:
      - {panel_id: ep002_020, beat_type: interior_caption, intent: "closing propulsion — the clock keeps running, the version is locked, nothing is cured",
         scene: "Final panel. Marginalia, dark, fluorescent glow from the street replacing last chapter's warm streetlamp gold. The window seat, empty again, Mio's folded pencil manuscript resting on the sill where the reader can see it and no character does. Narration caption, small, flat, no resolution in it: 'Rehearsal: Monday. Programs print Friday. Eleven days, now nine.' No hum. No caption naming what she's worth. Just the clock, and the folded page, and the shop going dark."}

craft_notes: >-
  CONTINUITY (per
  config/manga/continuity/heart_balance_shojo__en_US__romance_josei_drama__series01.yaml
  next_episode_mandate): must_rebreak satisfied — the shared song fails in a NEW context
  (professional/production scrutiny, not private shyness) and Mio's open hum from ep_001 costs
  her something visible: sidelined from the credited score (p4), a job-standing bruise Saki has
  to absorb (p4-5), and displacement from the window seat itself (p6). must_plant satisfied —
  rival_arranger (Tomo Serizawa) plays Ren's phrase perfectly without margin history and begins
  overwriting it (p2-3); premiere_clock tightens from three weeks to eleven days, then nine by
  the close (p1, p8). Forbidden items avoided: no wound->turn->renewal therapeutic cadence to a
  named resolution — the chapter ends on an unresolved cost, not a cure; Ren does NOT confess
  cleanly (p5, p7 — he stays warmly, structurally oblivious); no caption ever tells Mio she is
  worthy (p6 states the opposite: uncertainty, not a verdict).
  SERIALIZATION LAW: does not replay ep_001's opening/mid/closing shape (hum alone -> answered in
  secret -> played whole -> passed hand to hand -> played whole, overheard -> hummed unhidden).
  This chapter's "mid-recurrence" is a corruption, not a milestone: the song IS heard whole again,
  by someone with the right credentials and none of the history, and that is worse than not being
  heard at all. The closing beat withholds resolution entirely — no gold streetlamp palette, no
  confession, no claimed credit — ending on cost and a clock, not a renewal.
  GENRE AUTHORITY: docs/research/manga_craft/shojo_romance.md — engine compliance carried from
  ep_001 (delay engine, ALMOST convention, interior-caption heroine voice, chibi release, heroine
  with a life beyond the romance — this chapter uses that life, the shop, as the site of the cost).
  PACING CONTRACT: config/manga/manga_pacing_by_genre.yaml romance (silent_panel_ratio 0.25-0.45;
  reaction_shot frequency high p2-3; page_turn_triggers used: misread_signal p5/p7, ambiguous_line
  p7, emotional_rupture p4).
  SHELL TRACEABILITY: rival converts per cross-lane rail #1 — not a romantic rival, a credentialing
  rival (Tomo), the shell-correct form of asymmetry for a josei music-shop romance (who gets to be
  named on a program, not who gets the guy); pressure = premiere_clock intensified from a date to
  a countdown; escalation = the engine (margin duet) stressed under its own terms — the duet is
  heard correctly by the wrong person, which is a harder problem than not being heard at all.

wrapper_note: >-
  Music-mode only. No teacher, no doctrine line, no advice-speech from any character. The shared
  song this chapter is corrupted rather than completed: Tomo's clean version is, note for note,
  the same music — proof that "correct" and "heard" are different things, carried entirely through
  performance and reaction shots, never through a caption naming the difference. If this were
  teacher-mode it would need a beloved-who-models vessel to say the lesson aloud; it does not, and
  none appears. Interior topic (self-worth) never appears on the page — it is felt as the gap
  between "I don't know if that's enough" (p6, her own words, not a verdict) and Ren's unconscious
  hum of her bars in the rain (p7), which nobody in the story notices yet.
