# PILOT (wave1) — MUSIC-MODE manga (Tier-1 authored). One mode only: MUSIC. No teacher, no doctrine.
# Genre: school_coming_of_age. Wrapper (per MANGA_MODE_WRAPPER_DESIGN.md / GENRE_VESSEL_SKETCHES.md):
# music-vessel = THE SONG THE YEAR IS SET TO. One club tune, picked up in spring, mastered by winter;
# growing up is FELT as the song maturing in the characters' hands. The reader is made to FEEL, never
# taught. Nothing is explained. (Render gated.)

schema_version: 1.0.0
