# PILOT (wave1) — MUSIC-MODE manga (Tier-1 authored). One mode only: MUSIC. No teacher, no doctrine.
# Genre: sci_fi_cyberpunk. Wrapper (per MANGA_MODE_WRAPPER_DESIGN.md / GENRE_VESSEL_SKETCHES.md):
# music-vessel = THE PIRATE FREQUENCY, THE SOUL IN THE HUM. A filtered-out signal the city scrubbed;
# re-finding it is re-finding the body the upgrades muted. The settling is FELT as the static parting
# to let one warm analog tone through. The reader is made to FEEL, never taught. Nothing is explained.
# (Render gated.)

