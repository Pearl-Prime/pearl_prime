# PILOT (wave2) — MUSIC-MODE manga (Tier-1 authored). One mode only: MUSIC. No teacher, no doctrine.
# Genre: romance_josei_drama. Wrapper (per MANGA_MODE_WRAPPER_DESIGN.md / manga_mode_vessels.yaml):
# romance music-vessel = THE SHARED SONG. One tune passes between two people; who hums it, and when,
# charts the whole romance. Nothing is taught, nothing is explained — the reader is made to FEEL the
# walls come down. NEW genre×mode combo: wave1 romance was teacher-mode; this is romance×music.
# Shell engine is ROMANCE-NATIVE: delay, gaze, proximity, relational asymmetry, confession pressure.
# (Render gated, exactly like wave1.)

