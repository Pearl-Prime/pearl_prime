# PILOT (wave2) — TEACHER-MODE manga (Tier-1 authored). One mode only: TEACHER. No music.
# Genre: historical_period. Wrapper (per MANGA_MODE_WRAPPER_DESIGN.md / manga_mode_vessels.yaml):
# historical teacher-vessel = THE WORKSHOP HANDS THAT REFUSE HURRY (M4 C-grade upgrade — period
# craftsperson: here, a public letter-writer / calligrapher in a Meiji garrison town). The hands
# stop when the apprentice forces; the doctrine is the pause the material demands — never a speech.
# NEW genre×mode combo (historical×teacher had no written output before this).
# Shell engine is HISTORICAL-NATIVE: era-force before personal arc, rank and paper machinery of a
# real war, grief across time, honor/duty register, retrospective narration. (Render gated.)

schema_version: 1.0.0
artifact_type: chapter_script_writer_handoff
series_id: legacy_builder_memoir__en_US__historical_period__series01
catalog_title: "The Last Letter Home"
chapter_id: ep_001
title: "The Last Letter Home — Episode 1: The Character for Return"
mode: teacher                         # XOR — never music
manga_author: Hana Softwind           # EI author per series plan SSOT
teacher_id: brand_teacher_unresolved  # metadata only (M3 convention); legacy_builder has no brand-teacher assignment; the teacher is NEVER named in-story
teacher_doctrine_anchor: the_pause_the_material_demands
brand_id: legacy_builder_memoir
genre: historical_period
