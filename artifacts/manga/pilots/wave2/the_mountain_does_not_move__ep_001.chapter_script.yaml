# PILOT (wave2) — TEACHER-MODE manga (Tier-1 authored). One mode only: TEACHER. No music.
# Genre: cultivation_martial. Wrapper (per MANGA_MODE_WRAPPER_DESIGN.md / manga_mode_vessels.yaml):
# cultivation teacher-vessel = THE MASTER OF THE LOWER GATE. Cultivation IS body-first — the
# dantian (the lower gate) opens by settling; force ruptures. Here the vessel is made doubly
# diegetic: the sect's LOWEST physical gate on the mountain stair is a cultivation seat everyone
# mistakes for a punishment post. NEW genre×mode combo (cultivation had zero written output).
# Shell engine is CULTIVATION-NATIVE: a visible nine-tier ladder, rival humiliation, breakthrough
# logic, qi-deviation stakes, sect rank politics, tournament clock, a vow. (Render gated.)

schema_version: 1.0.0
artifact_type: chapter_script_writer_handoff
series_id: devotion_path_shonen__en_US__cultivation_martial__series01
catalog_title: "The Mountain Does Not Move"
chapter_id: ep_001
title: "The Mountain Does Not Move — Episode 1: Struck From the Roll"
mode: teacher                         # XOR — never music
manga_author: Brook Stillwater        # EI author per series plan SSOT
teacher_id: ra                        # per series plan SSOT — metadata only; the teacher is NEVER named in-story
teacher_doctrine_anchor: force_ruptures_settling_opens
brand_id: devotion_path_shonen
