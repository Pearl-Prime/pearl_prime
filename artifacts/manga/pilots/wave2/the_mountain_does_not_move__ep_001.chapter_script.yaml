# Teacher-mode 3-beat skeleton (doctrine earned through the genre's own breakthrough logic):
mode_beats:
  wound: page_1-3     (the doctrine's ABSENCE — Shen Yan forces the Breath Gate mid-Ascent, ruptures his meridians in front of the whole sect, and is demoted to the mountain's lowest gate)
  turn:  page_5-7     (the master of the lower gate — force fails at the ford where rooting succeeds; standing the threshold, Yan stops bracing for one breath and the gate he skipped answers)
  renewal: page_8     (struck from the tournament roll, Yan bows and takes the vow — he will climb without leaving the first gate)

main_characters:
  - id: shen_yan
    name: Shen Yan
    role: >-
      protagonist, 17 — outer disciple of the Ninefold Gate Sect, the largest raw qi reservoir
      the testing elders have measured in a generation, and the fastest-rising name on the roll —
      by force. Every gate he has opened, he has BATTERED open. (Unstated, never named on the
      page: he attacks first so no one sees him afraid; the bracing is the fear. Carried entirely
      by stance, strike and rupture — never by a caption.)
    visual_anchor: training robe scorched at the left ribs; two dark iron gate-rings on his sash cord and seven pale ones; knuckles split from stone drills; stance always a half-step too far forward.
  - id: master_ku
    name: Master Ku                   # cultivation TEACHER-VESSEL — the master of the lower gate
    role: >-
      gatekeeper of the First Gate at the mountain's foot, age unguessable. The sect's outer
      disciples believe he is a demoted janitor with a token-ledger. The inner elders bow to him
      from a distance and do not explain why. He checks travel tokens, keeps the ford, and has
      not been seen to hurry, strike, or step backward in living memory.
    visual_anchor: patched grey robe; a single iron gate-ring worn smooth as river stone; feet that seem poured into the ground; he is always exactly where he was already standing.
  - id: wei_long
    name: Wei Long
    role: >-
      the rival — senior outer disciple, five gates open, heir of a pill-merchant clan. Effortless
      where Yan is desperate, and cruel in the way of people who have never once been losing.
      Climbs the Ascent like a man strolling to collect something owed.
    visual_anchor: immaculate white robe, five dark rings arranged to be seen; a folding fan he does not need at altitude; the smile of a finished ledger.
  - id: elder_bai
    name: Elder Bai
    role: >-
      arbiter of the Autumn Ascent and keeper of the tournament roll. Reads verdicts like weather
      reports. Not cruel; simply the ladder, embodied — rank is the only sentence structure she has.
    visual_anchor: verdict scroll at her belt; nine dark rings; a brush that writes names on and off the roll.
  - id: the_first_ring
    name: The First Ring
    role: >-
      the recurring object — the gate-ring every disciple darkens in their first year and never
      thinks about again. The ladder everyone climbs stands on the rung everyone skipped.

scene_palette:
  primary: cloud-swallowed mountain greys; the ten-thousand-step stair cutting white through pine
  secondary: qi-glow — channel-lines of light along limbs; jade-green when flowing, furnace-red when forced
  accent: dark iron (the gate-rings; rank made visible at a glance)
  turn_palette: river-mist silver at the First Gate; dawn through the ford (pages 6-7)

pages:
  # ── WOUND: the ladder, the rival, the rupture (all sect eyes watching) ─────
  - page_id: ep001_p01
    panels:
      - {panel_id: ep001_001, beat_type: establishing, intent: "GENRE SHELL — the ladder made visible; spectacle first (dossier §3: progression is the pleasure)",
         scene: "SPREAD-SCALE opening: the AUTUMN ASCENT. A ten-thousand-step stair vanishing up into cloud, pine and granite, watch-platforms crowded with the whole Ninefold Gate Sect. Dozens of outer disciples race the steps, qi flaring jade along their limbs. Banners: the nine-ring sigil. Narration box, terse: 'Nine gates in the body. Nine gates on the mountain. Open one to climb past the other. That is the whole sect, and the whole world.'"}
      - {panel_id: ep001_002, beat_type: character, intent: "system legibility — rings = rank, at a glance",
         scene: "Mid-climb. CU sash cords streaming as disciples pass: three dark rings, four dark rings. Then SHEN YAN surging up through the pack, robe scorched at the ribs, TWO dark rings — and climbing like the stair insulted his family. Qi-glow along his legs burning furnace-red at the edges, not jade. Spectator disciple, awed and appalled: 'Two rings and he's in the front third—' Second spectator: 'Look at the color. He's burning trunk-qi on STAIRS.'"}
      - {panel_id: ep001_003, beat_type: rival, intent: "the rival — effortless asymmetry; the taunt that sets the wound",
         scene: "WEI LONG draws level — WALKING. Five dark rings arranged on white silk, fan open, not one hair disturbed. He matches Yan's sprint at a stroll, leans in as he passes. Wei Long, pleasant as poison: 'Still hammering, Shen Yan? The Breath Gate isn't a door you break.' Beat, over his shoulder: 'It's a door you're afraid of.' Reaction CU: Yan's eyes — the flinch behind the fury, one panel, unmistakable, unnamed."}
  - page_id: ep001_p02
    panels:
      - {panel_id: ep001_004, beat_type: action, intent: "the forcing — cultivation logic stated in-genre before it is broken",
         scene: "Yan plants on a landing, slams a palm to his own navel — the seat of the lower dantian — and FLOODS it. Inner-vision inset panel (genre furniture): his channel-map as a mountain path, the third gate — BREATH — barred; his qi ramming it like a battering ram, jade light going red. SFX: GRRRRND. Narration box, dry: 'The manuals say: the third gate opens for the breath that does not beg. Shen Yan had always read that as: hit it harder.'"}
      - {panel_id: ep001_005, beat_type: collapse, intent: "QI-DEVIATION — the genre's own name for what forcing costs",
         scene: "RUPTURE. Full-width kinetic panel: the barred gate in the inner-vision SPLINTERS wrong — backlash tearing up the channel-map like a flooded river bursting terraces. Exterior: Yan mid-stride as the red light inverts, veins standing black along his forearm, blood at the corner of his mouth. He goes down on the ancient steps HARD, tumbling, scattering lesser disciples. SFX: KRAK — down the panel edge."}
      - {panel_id: ep001_006, beat_type: reaction, intent: "public humiliation — the ladder watches (reaction density per pacing contract)",
         scene: "Stacked reaction shots, brutal: the watch-platforms falling silent tier by tier; a healer-disciple already running; Wei Long pausing eleven steps above, looking down past his fan — not even triumphant; INVENTORYING him — then climbing on. At the summit, distant, a bell notes the leader crossing the ninth landing. Yan, on his knees on the stair, scorched sash smoking, hearing the bell through blood in his ears."}
  - page_id: ep001_p03
    panels:
      - {panel_id: ep001_007, beat_type: judgment, intent: "sect politics — the verdict; the ladder speaks",
         scene: "Sect court, evening, lanterns. Yan kneeling, arm bound in salve-wrappings, meridian-burn chart displayed beside him like evidence (inner-map inset: two channels blackened). ELDER BAI reads from the verdict scroll, tonelessly: 'Meridian rupture, second degree, self-inflicted by forced ascension. Cultivation suspended until the channels close.' Beat. 'Shen Yan is assigned to the First Gate. Gatekeeper's assistant. Effective tonight.' A murmur crosses the court like wind through millet."}
      - {panel_id: ep001_008, beat_type: reaction, intent: "the demotion decoded — the bottom of the ladder, in every sense",
         scene: "Outer-disciple dormitory walkway. Two disciples watching Yan descend the ten thousand steps alone in the dusk, bedroll on his back. First: 'The FIRST Gate? That's not a posting, that's an exile. Old Ku checks donkey-cart tokens down there.' Second: 'From front-third of the Ascent to the bottom of the mountain in one day.' Below, small in frame, Yan descends — each step down a step OFF the ladder. His two dark rings catch the last light."}
      - {panel_id: ep001_009, beat_type: quiet, intent: "arrival at the lower gate — the vessel, first sight; deliberately unimpressive",
         scene: "Night. The FIRST GATE: a weathered wooden gate at the mountain's foot where the stair meets the river road, one lantern, mist off the ford. MASTER KU sits on a stool beside a token ledger, mending a sandal strap, single iron ring worn smooth on his cord. He does not look up. Ku: 'Bedroll under the eave. Gate opens at dawn.' Yan, bowing exactly as little as protocol allows: 'I was told to report—' Ku: 'You were told. Dawn.' SILENT final beat: Yan glaring up at the lantern-dotted summit, ten thousand steps above."}

  # ── The lower gate: duty without doctrine ──────────────────────────────────
  - page_id: ep001_p04
    panels:
      - {panel_id: ep001_010, beat_type: action, intent: "the duty — insultingly small; the rebellion — training in secret",
         scene: "Dawn montage strip: Yan hauling the gate-bar; checking a charcoal-seller's token; sweeping frost off the threshold stone — a broad slab worn into a shallow bowl by centuries of feet. Ku drinks tea and watches the ford. Then NIGHT: Yan behind the woodshed, jaw set, forcing qi into his ruined channels again — inner-vision inset: the blackened paths flaring red — and doubling over, coughing, fist against the wall. Narration box: 'The healers said the channels needed stillness to close. Shen Yan heard: you are falling behind.'"}
      - {panel_id: ep001_011, beat_type: dialogue, intent: "the demand — and the vessel's refusal to lecture",
         scene: "Morning. Yan plants himself in front of Ku's stool, bows low this time — desperation makes courtesy. Yan: 'Master Ku. The Autumn rolls close in forty days. Teach me — anything. Footwork, breath-sets, I'll haul water up the whole stair if—' Ku, stamping a merchant's token, not unkind: 'The duty is the gate. Open it at dawn. Close it at dusk. Stand it between.' Yan, through teeth: 'Standing isn't TRAINING.' Ku looks at him for the first time — one long unhurried look, from feet to crown. Ku: 'No. Not the way you stand.'"}
      - {panel_id: ep001_012, beat_type: rival, intent: "salt in the wound — the rival's shadow keeps the clock ticking",
         scene: "A supply cart from the summit rattles through the gate. The carter, chatty: 'Big autumn coming. They say Wei Long's a lock for inner-sect elevation — five gates at nineteen, the clans are already sending gifts.' CU Yan's split knuckles whitening on the gate-bar. Insert, small and far: the summit in cloud. SFX under the panel: the token stamp — THOK — like a countdown."}

  # ── TURN, part 1: the ford — force fails where rooting succeeds ───────────
  - page_id: ep001_p05
    panels:
      - {panel_id: ep001_013, beat_type: action, intent: "the crisis the genre respects — a real load, a real current",
         scene: "Grey afternoon, river high with cold rain. At the ford: a grain cart sunk to the axle, mule screaming, the carter's boy waist-deep and slipping. YAN goes in without hesitating — this is his one language — plants, hauls, FLOODS his limbs jade-red. The cart lurches, the riverbed rolls under him, the current takes his stance apart. Full kinetic panel: Yan underwater a heartbeat, cart settling deeper. SFX: RUSH."}
      - {panel_id: ep001_014, beat_type: turn, intent: "the demonstration — the vessel acts; doctrine as physics, zero speech",
         scene: "MASTER KU walks into the river. Not fast. The current hits him and — nothing happens. It divides. Wide panel, the money shot: the old man mid-ford like a standing stone, water breaking white around his shins, ONE hand settling on the cart's rail. He does not pull. He sinks HALF AN INCH — rooting — waits one full breath (the panel holds it) — and the cart comes free on the river's own surge, rolling up the far bank as if it had merely been waiting for permission. SILENT except the water."}
      - {panel_id: ep001_015, beat_type: reaction, intent: "the question every cultivation reader is now asking, asked in-genre",
         scene: "Yan, soaked, hauling the boy up the bank, staring. Yan: 'What gate was THAT? What TIER—' Ku wrings out one sleeve, ancient and bored. Ku: 'The first.' He taps the smooth iron ring on his cord, then — pointedly — the two dark rings on Yan's. Ku: 'You opened yours in a year. I've stood in mine for sixty.' He walks back to his stool. Yan looks down at his first ring — the rung he darkened at twelve and never thought about again."}

  # ── TURN, part 2: standing the threshold — the gate he skipped answers ─────
  - page_id: ep001_p06
    panels:
      - {panel_id: ep001_016, beat_type: training, intent: "the practice — insultingly simple, suddenly credible (foundation-reforging: a trope the genre reader KNOWS)",
         scene: "Dawn. Ku points at the threshold stone — the slab worn into a bowl by centuries of standing feet. Ku: 'Gate duty. Feet in the bowl. Open it, close it, and between — stand the way the stone taught the others.' Insert CU: the bowl-shaped hollow, polished by generations. Yan steps in. His heels rock — his stance has ALWAYS been a half-step forward, weight on the balls of his feet, ready to lunge. In the bowl, that stance has nowhere to go. Narration box: 'The hollow fit no one who leaned.'"}
      - {panel_id: ep001_017, beat_type: quiet, intent: "the fight against nothing — bracing made visible as effort",
         scene: "Sequence strip, hours compressing: morning — Yan in the bowl, jaw tight, qi cycling in guarded loops around his wounded channels (inner-inset: jade light standing in defensive rings, like a fist perpetually cocked); midday — travelers pass, he stamps tokens WITHOUT leaving the stance; dusk — legs shaking, not from the standing. From the holding. Ku, passing with the lantern: 'You guard the burn like it owes you money. It closed an hour ago. You're the only thing still pressing on it.'"}
      - {panel_id: ep001_018, beat_type: turn, intent: "TURN LANDS — one breath without bracing; the lower gate answers (breakthrough logic honored: settling, not forcing)",
         scene: "Full-page-weight panel. Last light. Yan, spent past pretending, exhales — and for exactly ONE breath forgets to be ready. His weight drops into the bowl. His heels take the mountain. Inner-vision inset: the guarded jade rings... unclench — and qi settles DOWN, pooling into the lower dantian like water finding the valley floor — and the FIRST GATE on his channel-map, the one drawn as long-open, actually MOVES: swings wide for the first time. Exterior CU: his first iron ring gives a single low hum. SFX, small: mmn. Ku's eyes, across the yard, open all the way."}
  - page_id: ep001_p07
    panels:
      - {panel_id: ep001_019, beat_type: revelation, intent: "visible progression tick — honest scale (a stir, not a tier); the ladder re-read",
         scene: "Night meditation at the threshold, unforced now. Inner-vision: qi circulating the FULL foundation loop for the first time — and where it passes the two blackened channels, the burn-scars knit visibly, jade light threading the cracks. Then, faint, far up the path-map: the barred THIRD gate — Breath, the one that ruptured him — shivers on its hinges. Not opening. Acknowledging. CU Yan's face: the expression of a boy who has just heard a locked door say his name. Narration box: 'Every manual said the road up begins at the first gate. He had thought that was a proverb.'"}
      - {panel_id: ep001_020, beat_type: quiet, intent: "the vessel, once, in words — craft-register, after the body already did it",
         scene: "Ku sets a second tea bowl on the gate-ledger, first time. Steam. The old man watches the dark summit rather than the boy. Ku: 'Force is a fine tool. It opens everything except gates.' Beat; he drinks. Ku: 'The mountain under you is the same mountain they're all climbing. You're just the only one standing on it.' That is the entire lesson; he goes back to his tea. Yan drinks, both heels — for the first time in the chapter — flat on the ground."}

  # ── RENEWAL + VOW: struck from the roll ────────────────────────────────────
  - page_id: ep001_p08
    panels:
      - {panel_id: ep001_021, beat_type: rival, intent: "the rival descends — the sneer meets something new",
         scene: "Morning mist. WEI LONG at the First Gate with an official retinue, immaculate, bearing a sealed notice with the nine-ring sigil. Wei Long, savoring each word: 'Elder Bai's compliments. Ruptured meridians disqualify. Shen Yan is struck from the Autumn roll.' He unfolds the fan; delivers the knife: 'A year at a token booth. Try not to lose the ledger too.' Beat panel: Yan... does not lunge. He stands in the threshold bowl, heels down, and the taunt lands on him the way current lands on a standing stone. Reaction CU — WEI LONG's smile flickering: something in the arithmetic has changed and he cannot find the error."}
      - {panel_id: ep001_022, beat_type: vow, intent: "the VOW — the genre's engine beat, in the protagonist's new grammar",
         scene: "Yan bows — correct, unhurried, infuriating. Yan: 'Strike it.' He straightens; his first ring hums once, low, audible in the mist. Yan: 'Next autumn I'll climb your whole ladder—' CU, eyes level, weight utterly still: '—without leaving the first gate.' Wei Long, to whom this is gibberish, sneers and departs. Behind the retinue, unnoticed: Master Ku stamps their travel token — THOK — like a seal on the vow."}
      - {panel_id: ep001_023, beat_type: close, intent: "TEACHER close — the ladder above, the mountain below; next-arc engine set",
         scene: "Final wide panel, dawn breaking: the ten-thousand-step stair climbing out of mist into cloud, summit lanterns paling — and at the very bottom, small and rooted in the threshold bowl, Shen Yan opens the First Gate for a farmer's cart, qi settled jade to the ground. Insert CU: his sash — two rings dark, one now humming faintly, seven waiting. Narration box, terse close: 'Autumn was a year away. The mountain, it turned out, had been under him the whole time.'"}

craft_notes: >-
  VESSEL (teacher-mode): THE MASTER OF THE LOWER GATE — cited from
  config/manga/manga_mode_vessels.yaml cultivation_martial.teacher ('the dantian knows before the
  mind; force ruptures, settling opens'). Vessel made doubly diegetic: lower gate = lowest
  physical gate on the sect mountain AND the lower dantian; the demotion IS the curriculum.
  Doctrine acted (ford demonstration p5, threshold breath p6) a full two pages before the only
  spoken lesson (p7, craft-register, post-hoc). Teacher (ra) NEVER named in-story; teacher_id is
  metadata per series plan SSOT. Wound→turn→renewal beats mapped in mode_beats.
  GENRE AUTHORITY: no dedicated craft bible exists for this shell (per
  docs/research/manga_craft/teacher_apparatus_per_genre.md, cultivation row) — primary authority is
  artifacts/research/genre_bestseller_dossiers/cultivation_bestseller_research_2026-05-13.md.
  Dossier compliance: Power Escalation Ladder as dominant engine (§3 — nine gates, iron rings =
  rank at a glance); compressed 5-beat opening arc (§3: system taught through protagonist p1-2,
  rival humiliation p1-3, qi-deviation crisis §7 p2, demotion-to-backwater p3, breakthrough-tease
  p6-7); therapeutic-embed landing moments used are the dossier's QI-DEVIATION CRISIS and
  post-breakthrough stillness (§7) — NOT the courtyard-sweeping operator example (§8), which is
  deliberately not copied (stance/threshold practice instead of broom). Register:
  classical_xianxia (§2). Mystery-box layer seeded: why elders bow to a token-checker; what Ku's
  single smooth ring means.
  PACING CONTRACT: config/manga/manga_pacing_by_genre.yaml cultivation_martial — reaction_shot
  frequency high (p2, p6, p8), silent ratio kept low per contract (kinetic pages dominate),
  sfx heavy_kinetic (KRAK / RUSH / THOK / GRRRRND), page_turn_triggers used:
  cultivation_breakthrough (p6), rival_challenge (p1, p8), sect_revelation (p3, p5),
  inner_realm_descent (inner-vision channel-map insets p2/p4/p6/p7).
  SHELL TRACEABILITY: reader fantasy = visible, earned progression on a ladder the world
  acknowledges (rings, rolls, tiers); escalation engine = breakthrough logic + rank politics on a
  tournament clock (struck from the roll → next Autumn Ascent); protagonist hook = strongest raw
  talent in a generation whose own method is the obstacle; scene pleasures = channel-map
  inner-vision, qi-glow color grammar (jade vs furnace-red), the ford demonstration, the ring-hum
  progression tick, the vow. GENERIC FAILURE MODE AVOIDED: no therapeutic monologue, no serene
  wellness cadence — stillness here is a POWER MECHANIC with visible ladder consequences (ring
  hums, channels knit, a locked gate shivers), never a mood; the rival, verdicts and tournament
  clock keep shonen-grade tension every page. Remove the topic label and this is still a
  foundation-reforging xianxia underdog story. Cold-read gate: the rupture and the ford land as
  spectacle beats long before any reader could name a theme; courage is never mentioned — only a
  boy who stops flinching forward.

wrapper_note: >-
  Teacher-mode only. The doctrine (force ruptures, settling opens; the first gate is the whole
  mountain) is never a self-help line — it is the shell's own breakthrough logic, dramatized:
  a public qi-deviation rupture (forcing), a cart freed by rooting where flooding failed, one
  unbraced breath that opens the gate everyone skips, and a vow phrased entirely in ladder-grammar.
  No musician, no song, no sound-motif (the ring's hum is a rank signal, not a score). If this
  were music-mode it would carry the arc via the sound-sect's flute vessel and NO Master Ku.
  Interior topic (courage) never named on the page — it is felt as the migration of Shen Yan's
  weight from the balls of his feet to his heels.
