title: 'The Platform Has No Record of This Face — Episode 4: Two Countdowns'
logline: A coworker's ordinary LINE chat remark gets filed as evidence while a supervisor's hard two-week
  deadline turns Yaqing's overtime into an auditable institutional record.
stakes_now: Yaqing has two weeks to produce conclusive proof, or the case closes without her agreement.
stakes_end: The manager's countdown is now running alongside Yaqing's own, her overtime is on record,
  and a second ordinary remark has just been misread as evidence in front of Zhou.
