title: 'The Platform Has No Record of This Face — Episode 6: Forty Minutes'
logline: An off-duty night-market stakeout at the fourth station makes Yaqing miss a promised niece pickup,
  and her sister names the pattern outright for the first time.
stakes_now: Yaqing has to choose between a five-minute-old promise to her family and a figure she may
  lose in the crowd.
stakes_end: The case has won the choice outright — Yaqing rides back toward the fourth station instead
  of home, leaving a named, concrete break in her sister's trust behind her.
