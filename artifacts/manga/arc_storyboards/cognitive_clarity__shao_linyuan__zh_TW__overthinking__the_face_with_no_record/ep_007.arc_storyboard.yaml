title: 'The Platform Has No Record of This Face — Episode 7: An Ordinary Answer'
logline: A lost-and-found EasyCard theory finally gives Yaqing the gentle, ordinary explanation she wants,
  while Zhou independently uncovers an old note of his own that quietly contradicts it.
stakes_now: Yaqing's relief depends on not reading the one ledger annotation that could undo her new theory.
stakes_end: Yaqing has closed her notebook and repaired ground with her sister, but Zhou now holds contradicting
  evidence of his own that she does not yet know exists.
