  information_delta: Reader gets concrete visual proof of how long Yaqing has overrun her shift.
  beat_role: somatic_onset
  action_intensity: 1
  silence: false
  dialogue_allowed: false
- panel_id: ep002_008
  page_id: ep_002_p01
  story_function: anchor_names_overrun
  story_move: Zhou directly asks why she is still at her desk after shift end.
  visual_proof: Medium two-shot, Zhou's posture shifting from casual to genuinely asking.
  information_delta: Reader sees the anchor beginning to register concern, not just routine banter.
