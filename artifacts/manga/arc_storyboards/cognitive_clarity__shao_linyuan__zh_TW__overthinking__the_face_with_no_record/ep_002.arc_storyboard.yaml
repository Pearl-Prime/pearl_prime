  information_delta: Reader hears an ordinary complaint that has nothing to do with the case.
  beat_role: deflection
  action_intensity: 0
  silence: false
  dialogue_allowed: true
- panel_id: ep002_005
  page_id: ep_002_p01
  story_function: misfiled_as_clue
  story_move: Yaqing seizes on the word 'late' and folds it into her own timeline calculation.
  visual_proof: Close insert on Yaqing's face snapping up, sudden focus replacing fatigue.
  information_delta: Reader recognizes Zhou's ordinary remark being misread as evidence — the reader sees
