  story_move: Yaqing, still on shift past dawn, replays both flagged clips instead of clocking out.
  visual_proof: Wide control-room shot at first light, Yaqing at her console, visible fatigue.
  information_delta: Reader learns Yaqing has stayed well past her shift to keep working the case.
