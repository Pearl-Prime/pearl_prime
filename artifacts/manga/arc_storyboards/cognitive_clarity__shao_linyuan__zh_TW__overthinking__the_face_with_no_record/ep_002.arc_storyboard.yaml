title: 'The Platform Has No Record of This Face — Episode 2: The Prank Theory That Doesn''t Hold'
logline: Cross-referencing a second station's archived footage, Yaqing proposes a coordinated-prank theory
  that starts collapsing the same night, as Zhou's offhand complaint gets folded into her file.
stakes_now: Yaqing's second confident theory is the only thing keeping the case from feeling truly wrong.
stakes_end: The prank theory has quietly failed, a formal footage request has entered the institutional
  record, and the case has followed Yaqing home into her own unpaid time.
