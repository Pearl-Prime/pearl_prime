title: 'The Platform Has No Record of This Face — Episode 3: Almost There'
logline: A third station's timeline goes up on Yaqing's wall as a deliberate-evasion theory forms; her
  sister and her supervisor both name a cost the case is charging in the same day.
stakes_now: Yaqing's case has spread from work hours into her apartment, her drink orders, and her family
  time.
stakes_end: Yaqing has a hard institutional deadline for proof, an openly named cost to her sister, and
  a companion who now reads her body's strain even when she says nothing.
