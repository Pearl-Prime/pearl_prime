  page_id: ep_003_p01
  story_function: deliberate_theory_forms
  story_move: 'Yaqing forms a darker theory: the pattern is deliberate, engineered to evade detection.'
  visual_proof: Close insert on Yaqing's face, focus tightening to the edge of tunnel vision.
  information_delta: Reader hears the third and darkest theory yet, now naming intent rather than accident.
