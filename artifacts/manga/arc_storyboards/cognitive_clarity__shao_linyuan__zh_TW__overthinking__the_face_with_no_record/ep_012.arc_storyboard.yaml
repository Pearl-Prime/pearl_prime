title: 'The Platform Has No Record of This Face — Episode 12: The One Who Looks Back'
logline: A clearer frame finally reveals half a face and six legitimately registered EasyCards, collapsing
  every prior theory, while Yaqing's promised safety-net call to Zhou fails to connect, leaving her alone
  with a threat that may reach inside her own workplace.
stakes_now: Yaqing must decide whether to face what six real identities and one unreachable ally actually
  mean.
stakes_end: 'Arc one closes not on resolution but on reversal: the watched figure appears to watch back,
  a possible internal connection is glimpsed but unconfirmed, and Yaqing takes up the eight-year notebook
  herself rather than waiting for help that isn''t there.'
