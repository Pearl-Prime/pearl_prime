title: 'The Platform Has No Record of This Face — Episode 5: Twenty-One Days'
logline: A fourth matching station surfaces the same night Zhou's retirement countdown forces him to name
  the cost of the case directly instead of watching in silence.
stakes_now: Yaqing's pattern has grown to four stations, and the one person who notices her cost has a
  deadline of his own.
stakes_end: The cost has been named aloud and honestly acknowledged, but Yaqing's hand never leaves the
  keyboard — nothing about her behavior has actually changed.
