  page_id: ep_005_p02
  story_function: vessel_restraint_no_lecture
  story_move: Zhou does not press further, offering a small nod instead of an escalating argument.
  visual_proof: Medium shot, Zhou's single nod, expression accepting rather than pushing.
  information_delta: 'Reader sees the vessel''s doctrinal restraint: no lecture, no ultimatum.'
  beat_role: teaching_recall
  action_intensity: 0
  silence: true
  dialogue_allowed: false
