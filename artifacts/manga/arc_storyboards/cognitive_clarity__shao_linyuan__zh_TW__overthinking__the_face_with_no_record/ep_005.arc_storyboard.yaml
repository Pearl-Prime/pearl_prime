  story_function: vessel_states_the_cost_directly
  story_move: Zhou states plainly, for the first time, that he can see what the case is doing to her.
  visual_proof: Close two-shot, Zhou's direct, level expression as he speaks without softening the line.
  information_delta: Reader hears the episode's central acknowledgment stated once, without lecture framing.
  beat_role: anchor_cost
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep005_013
  page_id: ep_005_p02
  story_function: yaqing_caught_off_guard
  story_move: Yaqing is caught off guard by his directness and does not answer immediately.
  visual_proof: Close insert on Yaqing's face, composure briefly cracking before she can respond.
  information_delta: Reader sees the line land — Yaqing has no ready deflection prepared for this.
  beat_role: anchor_cost
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep005_014
  page_id: ep_005_p02
  story_function: vessel_names_his_own_deadline
  story_move: Zhou names his own retirement countdown as the reason he is speaking now instead of waiting.
  visual_proof: Medium shot, Zhou's calm, unhurried delivery, not raising his voice.
  information_delta: 'Reader learns Zhou''s own stakes for intervening: he will not be here to keep watching.'
  beat_role: anchor_cost
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep005_015
  page_id: ep_005_p02
  story_function: yaqing_honest_acknowledgment
  story_move: Yaqing quietly admits she already knows, without minimizing or arguing the point.
  visual_proof: Close insert on Yaqing's face, small and honest, no performance of composure left.
  information_delta: Reader hears Yaqing's first fully honest acknowledgment of the case's toll on her.
  beat_role: anchor_cost
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep005_016
  page_id: ep_005_p02
  story_function: acknowledgment_without_change
  story_move: Her hand stays on the keyboard, moving toward neither closing the case nor stopping.
  visual_proof: Close insert on Yaqing's hand resting on the keyboard, motionless, decision unmade.
  information_delta: 'Reader sees the genre''s core mechanic: honest acknowledgment that changes nothing
