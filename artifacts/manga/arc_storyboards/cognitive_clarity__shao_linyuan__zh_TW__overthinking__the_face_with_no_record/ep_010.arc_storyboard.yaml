title: 'The Platform Has No Record of This Face — Episode 10: What Was I Even Looking For'
logline: Overriding an authorization warning for the first time on purpose, Yaqing stakes out station
  five off-duty and publicly confronts the wrong stranger, the moment recorded by bystanders.
stakes_now: Yaqing's certainty about the pattern is about to meet a real stranger who has no part in it.
stakes_end: A public mistake, a recorded clip, and an unresolved authorization warning leave Yaqing looking
  at her own evidence wall with real doubt for the first time this arc.
