title: 'The Platform Has No Record of This Face — Episode 9: Six Seconds'
logline: Absorbed in her private case diagram, Yaqing misses a real platform emergency for six seconds
  until Zhou catches it, and the institutional fallout cuts off her main access to the case.
stakes_now: A collapsed passenger's safety depends on Yaqing noticing the alarm before it's too late.
stakes_end: The passenger is safe, but Yaqing is now formally reassigned off live-monitoring duty, and
  even the clearest cost yet cannot make her fully close the notebook.
