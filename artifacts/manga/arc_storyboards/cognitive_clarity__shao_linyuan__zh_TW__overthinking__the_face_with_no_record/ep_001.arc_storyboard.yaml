genre_id: psychological_thriller
title: 'The Platform Has No Record of This Face — Episode 1: The Gate Log Doesn''t Agree'
logline: An anomalous EasyCard tap-out with no matching entry pulls night-shift analyst Yaqing into cross-referencing
  a second matching incident before her own shift ends.
stakes_now: Yaqing's confident 'sensor error' closure is the only thing standing between her and a quiet
  end to the shift.
stakes_end: The case remains open, her own cross-reference has already contradicted her closed verdict,
  and she has spent unaccounted time and unauthorized scope on it.
