notes: 'Episode 9 of 12 in arc 1 (''obsession seed''). Realizes strategy_05''s beat 5 (the deepest
  entry — closer to the pattern than to any person, every obligation deprioritized one quiet sacrifice
  at a time) through a deliberately, actively silenced call rather than a passive missed one. Setting:
  the transit station from the strategy bank''s setting_pool, reused from episode 4, with the missed-train
  cost beat now inverted onto Ren himself. This is the arc''s deepest point before the reckoning begins
  in ep_010-012 — the physical corkboard wall is the clearest single image of scale in the series so
  far.'
