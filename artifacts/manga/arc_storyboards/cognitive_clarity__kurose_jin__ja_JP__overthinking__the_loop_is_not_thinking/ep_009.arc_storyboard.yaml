title: The Voicemail on the Last Train — Episode 9 (English gloss)
logline: On the last train home, Ren is too deep inside his sprawling case notes to answer a call from
  Shizuku, letting it ring out into an unheard voicemail until he is already home and standing in front
  of a wall now fully covered in threads and margins.
stakes_now: Shizuku has been trying to reach Ren repeatedly since the postponed visit in episode six, and
  this is the first time the reader sees Ren actively choose the case over her call in real time rather
  than after the fact.
stakes_end: The voicemail is heard too late to matter tonight, tomorrow's callback is promised and not
  kept on-page, and the apartment wall now holds the case fully externalized — the clearest sign yet that
  the pattern has become closer to Ren than any person in his life.
