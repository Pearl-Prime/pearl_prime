notes: 'Episode 8 of 12 in arc 1 (''obsession seed''). Realizes strategy_05 beats 2-3 (a genuine,
  accurate read immediately shadowed by the same logic producing a wrong one) through the registry
  clerk''s confirm-and-deny answer and the misread photograph. Setting: the fog-bound coastal town from
  the strategy bank''s setting_pool, first and only use in this arc, chosen for its built-in
  mutual-visibility structure that seeds the ep_011-012 watcher/watched reversal. This episode also
  introduces the arc''s first outright institutional lie (a fabricated sick day) layered with a second,
  interpersonal lie to Saeki, compounding the deception pattern established in ep_002.'
