title: The Registry in the Fog Town — Episode 8 (English gloss)
logline: Ren lies about being sick and takes the ferry to a fog-bound coastal town tied to the anomalous
  name, where a registry clerk confirms one detail and flatly denies another, leaving him with a real
  answer and a wrong one that look identical from the same page.
stakes_now: Ren has just promised his manager a month of clean behavior, and this episode opens with him
  breaking that promise immediately by lying about illness to leave the city entirely.
stakes_end: The trip yields a genuine historical connection and a mistaken assumption in the same
  breath, resolves nothing, and ends with Ren already planning a return — the case has gained a second
  geography.
