notes: 'Episode 4 of 12 in arc 1 (''obsession seed''). Combines strategy_01 beat 4 (the spiral''s
  branching annotations, translated here into the encroaching announcement-text grammar) with
  strategy_05 beats 2-3 (the genuine pleasure of a pattern confirming itself, immediately shadowed by
  the same logic''s risk of misfiring on an uninvolved stranger). Setting: the 24-hour transit station
  from the strategy bank''s setting_pool, first use in this series. This is the arc''s clearest
  generalization beat — the reading compulsion spreads to someone with no relationship to Ren at all,
  while the story keeps the antagonist internal per the craft bible''s failure-mode 2/5 guardrails (Ren
  watches; he does not pursue).'
