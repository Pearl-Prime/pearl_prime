page_turn_promises:
- page_id: ep_004_p01
  promise: Will Ren step back from the platform edge once the stranger's train departs, or does the
    unconfirmed hypothesis keep him rooted in place as his own train approaches?
- page_id: ep_004_p02
  promise: Now that the pattern reading has cost him a train and a call, does Ren treat either loss as a
    warning, or does he file them both away as more evidence for the case?
panels:
- panel_id: ep004_001
  page_id: ep_004_p01
  story_function: station_established_looping_announcement
  story_move: Establishes the transit station as a new pressured setting and introduces the looping
    announcement that will become the episode's recurring sonic motif.
  visual_proof: Wide shot of a crowded transfer station at evening rush, the same automated announcement
    visibly repeating on signage and speakers.
  information_delta: Reader learns the story has moved to a third distinct location with its own
    built-in repetition grammar.
  beat_role: pre_trigger_calm
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep004_002
  page_id: ep_004_p01
  story_function: ad_board_echo_projected_onto_coincidence
  story_move: Ren projects the anomalous name onto an unrelated advertisement's scrolling copy, showing
    the pattern-reading has begun manufacturing its own evidence from noise.
  visual_proof: Close insert on a digital departure board's ad copy, with Ren's eyes locked on it a beat
    too long for an ordinary glance.
  information_delta: Reader learns Ren is now finding confirmation in places that were never evidence
    to begin with.
  beat_role: trigger_onset
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep004_003
  page_id: ep_004_p01
  story_function: reading_generalizes_to_a_stranger
  story_move: The reading compulsion generalizes for the first time onto a total stranger, a genuine
    escalation beyond coworkers and family.
  visual_proof: Medium shot of Ren's gaze fixing on an unnamed commuter on the platform after a glimpse
    of her transit pass.
  information_delta: Reader learns the compulsion's object has widened to include someone with no
    relationship to Ren at all.
  beat_role: somatic_onset
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep004_004
  page_id: ep_004_p01
  story_function: private_hypothesis_built_on_transit_app
  story_move: Ren opens a transit timetable app and constructs a private hypothesis about the stranger's
    routine, turning public transit data into personal surveillance.
  visual_proof: Close insert on Ren's phone screen showing a transit app timetable open beside his own
    handwritten annotation.
  information_delta: Reader sees the specific mechanism of this episode's obsession — a public schedule
    repurposed as a private tracking tool.
  beat_role: somatic_onset
  action_intensity: 2
  silence: false
  dialogue_allowed: true
- panel_id: ep004_005
  page_id: ep_004_p01
  story_function: verification_compulsion_visualized
  story_move: Ren repeatedly checks his watch against the app, visualizing the compulsive verification
    loop the craft bible warns must be shown, not summarized.
  visual_proof: Insert on Ren's hand comparing a wristwatch to the phone's timestamp multiple times in
    quick succession.
  information_delta: Reader sees the mechanical repetition of the compulsion rendered as action, not
    told as narration.
  beat_role: somatic_onset
  action_intensity: 2
  silence: true
  dialogue_allowed: false
- panel_id: ep004_006
  page_id: ep_004_p01
  story_function: loop_visualized_as_encroaching_repetition
  story_move: The looping station announcement's text is drawn encroaching into the panel margins,
    externalizing the spiral described in the strategy bank's beat four.
  visual_proof: Panel with the announcement's repeated phrase visually crowding the border, echoing the
    branching-annotation grammar from the strategy bank.
  information_delta: Reader receives a pure visual translation of the internal spiral without any
    caption naming it.
  beat_role: spiral_peak
  action_intensity: 2
  silence: true
  dialogue_allowed: false
- panel_id: ep004_007
  page_id: ep_004_p01
  story_function: rush_hour_pressure_builds
  story_move: The rush-hour crowd surges around Ren while he alone remains still, visually isolating his
    stillness against the crowd's motion.
  visual_proof: Wide shot of a dense rush-hour crowd flowing past a motionless Ren at the platform edge.
  information_delta: Reader feels the social pressure of the ordinary commute intensifying around Ren's
    abnormal stillness.
  beat_role: spiral_peak
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep004_008
  page_id: ep_004_p01
  story_function: stranger_departs_ren_stays_fixed
  story_move: The stranger boards her train and departs while Ren makes the active choice to keep
    watching instead of stepping back, the episode's key boundary-adjacent decision.
  visual_proof: Medium shot of the stranger's train doors closing while Ren remains rooted at the
    platform edge, not following, only watching.
  information_delta: Reader learns Ren's choice tonight is fixation, not pursuit — an important
    distinction the craft bible requires to keep the antagonist internal, not external.
  beat_role: recognition
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep004_009
  page_id: ep_004_p01
  story_function: pressure_peak_train_leaves_without_him
  story_move: The page-one pressure peaks in a wide beat combining the departing train and Ren's fixed
    stillness, with the announcement repeating over it.
  visual_proof: Wide shot of the departing train and Ren standing motionless on the platform as the loop
    announcement plays again overhead.
  information_delta: Reader feels the full weight of the choice Ren has just made, just before the page
    turn.
  beat_role: spiral_peak
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep004_010
  page_id: ep_004_p02
  story_function: watching_without_pursuit_continues
  story_move: Ren continues staring down the platform after the stranger is long gone, an ambiguous
    boundary-adjacent beat between fixation and restraint.
  visual_proof: Medium shot of Ren still facing the direction the departed train went, the platform now
    emptier around him.
  information_delta: Reader sees the fixation outlasting any practical purpose it could have served.
  beat_role: somatic_onset
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep004_011
  page_id: ep_004_p02
  story_function: concrete_cost_own_train_missed
  story_move: The departure board reveals Ren's own train has already left without him, the episode's
    first hard, unambiguous cost.
  visual_proof: Close insert on the departure board flipping his train's listing to departed status.
  information_delta: Reader receives concrete proof that the fixation has now cost Ren something of his
    own, not just the stranger's privacy.
  beat_role: honest_landing
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep004_012
  page_id: ep_004_p02
  story_function: correct_pattern_pleasure_foreshadows_risk
  story_move: A flicker of satisfaction crosses Ren's face before worry does — the pleasure of feeling
    the pattern confirmed, foreshadowing the craft bible's warning about skill and distortion sharing
    machinery.
  visual_proof: Close on Ren's face showing a brief, unsettling satisfaction rather than alarm at
    missing his train.
  information_delta: Reader learns the obsession is starting to reward itself independent of any actual
    payoff.
  beat_role: recognition
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep004_013
  page_id: ep_004_p02
  story_function: loop_syncs_with_breath
  story_move: The looping announcement plays again, now visually synchronized with Ren's own breathing
    rhythm, deepening the loop-as-internal-state grammar.
  visual_proof: Panel pairing the repeating announcement text with a visible rise and fall in Ren's
    chest, timed together.
  information_delta: Reader sees the external loop and Ren's internal state visually merge for the
    first time in the episode.
  beat_role: somatic_onset
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep004_014
  page_id: ep_004_p02
  story_function: late_return_home_empty_apartment
  story_move: A time cut to Ren's very late return home shows the concrete consequence of the platform
    fixation in his own domestic space.
  visual_proof: Wide shot of Ren entering his dark, quiet apartment much later than usual, no one
    waiting.
  information_delta: Reader confirms how much of the evening the platform fixation actually consumed.
  beat_role: honest_landing
  action_intensity: 1
  silence: false
  dialogue_allowed: false
- panel_id: ep004_015
  page_id: ep_004_p02
  story_function: unanswered_call_cost_surfaces
  story_move: A missed call from Saeki surfaces as a second concrete cost, showing the fixation also cut
    him off from the one person checking on him.
  visual_proof: Close insert on Ren's phone screen showing one missed call from Saeki, no message left.
  information_delta: Reader learns the vessel tried to reach him and could not, adding a relational cost
    to the earlier logistical one.
  beat_role: honest_landing
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep004_016
  page_id: ep_004_p02
  story_function: mirror_motif_too_tired_to_register
  story_move: The recurring hallway mirror motif from episode two reappears, but Ren is now too
    exhausted to even glance at it properly, showing the compulsion is consuming his capacity for
    self-observation.
  visual_proof: Quick medium shot of Ren passing the hallway mirror with barely a glance, visibly
    depleted.
  information_delta: Reader notices the motif's continuity eroding — even the noticing habit is showing
    wear.
  beat_role: recognition
  action_intensity: 0
  silence: true
  dialogue_allowed: false
- panel_id: ep004_017
  page_id: ep_004_p02
  story_function: normalization_missed_train_filed_as_data
  story_move: Ren adds tonight's missed train and stranger sighting directly into the case file's
    margins, treating his own ordinary losses as more evidence rather than as warnings.
  visual_proof: Close insert on Ren's notebook with tonight's missed train logged in the same margin as
    the original anomaly notes.
  information_delta: Reader sees the clearest sign yet that Ren's ordinary life is being absorbed into
    the case rather than protected from it.
  beat_role: honest_landing
  action_intensity: 1
  silence: false
  dialogue_allowed: false
- panel_id: ep004_018
  page_id: ep_004_p02
  story_function: episode_card
  story_move: The episode card closes the chapter and names it, marking the end of this cycle before the
