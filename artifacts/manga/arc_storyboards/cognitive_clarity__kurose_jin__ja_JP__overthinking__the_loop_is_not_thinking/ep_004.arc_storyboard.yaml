title: The Same Departure Board, Again — Episode 4 (English gloss)
logline: A departure board's ad copy echoes the anomalous name from Ren's file, and he builds a private
  timetable hypothesis around a stranger on the platform, costing him his own train home while he waits
  to confirm a pattern that was never about her.
stakes_now: Ren has, until now, only ever read data that belonged to his own case — this episode is the
  first time his reading spreads onto a total stranger who never consented to being anyone's evidence.
stakes_end: The stranger's identity is never confirmed and the case is not advanced — Ren has only
  proven he can miss his own train, miss a call from Saeki, and file both losses as data instead of cost.
