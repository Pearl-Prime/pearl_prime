  beat_role: teaching_recall
  action_intensity: 0
  silence: false
  dialogue_allowed: true
- panel_id: ep007_015
  page_id: ep_007_p02
  story_function: first_fear_of_self_not_denial
  story_move: For the first time in the arc, Ren's reaction is fear of himself rather than denial or
    deflection, a genuine emotional turn even though it does not yet change his behavior.
  visual_proof: Close on Ren's face showing visible unsettlement rather than his usual composed
    deflection.
  information_delta: Reader sees Ren's relationship to his own compulsion shift from confidence to
