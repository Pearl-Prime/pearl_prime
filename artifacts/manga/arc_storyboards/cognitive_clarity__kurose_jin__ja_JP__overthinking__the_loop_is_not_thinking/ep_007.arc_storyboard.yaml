  beat_role: interrupt
  action_intensity: 0
  silence: true
  dialogue_allowed: false
- panel_id: ep007_014
  page_id: ep_007_p02
  story_function: vessel_names_new_line_crossed
  story_move: Saeki names this specific new behavior as a line Ren should not have crossed, her most
    direct statement in the series so far, still delivered as fact rather than lecture.
  visual_proof: Medium two-shot of Saeki speaking bluntly, closer to Ren than her usual measured
    distance.
  information_delta: Reader hears the vessel's sharpest warning yet, calibrated to the severity of this
