  beat_role: honest_landing
  action_intensity: 1
  silence: false
  dialogue_allowed: false
- panel_id: ep007_018
  page_id: ep_007_p02
  story_function: review_absorbed_into_case_file
  story_move: Ren writes today's review into the margins of his home case file, formally merging the
