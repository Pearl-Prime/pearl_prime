page_turn_promises:
- page_id: ep_007_p01
  promise: Will Ren's fluent explanation actually satisfy the manager, or does the month's reprieve only
    delay a reckoning that badge logs and late reports have already begun writing?
- page_id: ep_007_p02
  promise: Now that the review is over, does Ren let it go, or does the compulsion find a new, more
    dangerous object in the review itself?
panels:
- panel_id: ep007_001
  page_id: ep_007_p01
  story_function: calendar_memo_signals_unscheduled_summons
  story_move: An unusual calendar app memo announces an unscheduled performance review, establishing
    institutional pressure as a concrete, dated event rather than vague anxiety.
  visual_proof: Close insert on a calendar app notification reading an unscheduled review request from
    the manager.
  information_delta: Reader learns institutional attention has arrived as a specific, unavoidable
