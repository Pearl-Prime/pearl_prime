- panel_id: ep007_012
  page_id: ep_007_p02
  story_function: review_itself_transcribed_as_data
  story_move: Instead of relief, Ren opens his notebook and transcribes the manager's exact words,
    formally converting the institutional review into new case material.
  visual_proof: Close insert on Ren's notebook, the manager's quoted phrase being written out word for
    word.
  information_delta: Reader sees the episode's key escalation happen as concrete action — the review has
    become the newest text under analysis.
  beat_role: somatic_onset
  action_intensity: 2
  silence: false
  dialogue_allowed: true
- panel_id: ep007_013
  page_id: ep_007_p02
  story_function: vessel_witnesses_new_transference
  story_move: Saeki discovers Ren transcribing the review meeting, witnessing the compulsion's newest and
    most concerning object firsthand.
  visual_proof: Medium shot of Saeki pausing in the doorway, watching Ren write.
  information_delta: Reader confirms the vessel now has direct evidence of the escalation, not just
