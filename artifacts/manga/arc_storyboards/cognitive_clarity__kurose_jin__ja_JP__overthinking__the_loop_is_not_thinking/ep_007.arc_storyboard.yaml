  action_intensity: 0
  silence: false
  dialogue_allowed: false
- panel_id: ep007_008
  page_id: ep_007_p01
  story_function: badge_log_confronted_directly
  story_move: The manager directly points to the badge log entries, forcing Ren to account for the
    specific behavior established in episode five.
  visual_proof: Close insert on the manager's finger indicating specific late-night badge log lines on
