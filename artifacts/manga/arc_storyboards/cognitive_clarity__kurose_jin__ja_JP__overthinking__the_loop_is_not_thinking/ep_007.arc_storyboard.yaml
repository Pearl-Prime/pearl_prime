  visual_proof: Insert on Ren's eyes narrowing slightly at the manager's phrasing, caption overlapping
    the panel.
  information_delta: Reader gets early warning that Ren's attention has already moved from defending
    himself to analyzing his interrogator.
  beat_role: recognition
  action_intensity: 1
  silence: false
  dialogue_allowed: false
