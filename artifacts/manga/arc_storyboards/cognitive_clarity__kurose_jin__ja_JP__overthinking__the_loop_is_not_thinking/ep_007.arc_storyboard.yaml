title: The Margin of the Review — Episode 7 (English gloss)
logline: A calendar app memo books Ren into an unscheduled performance check-in over his late reports and
  badge irregularities, and instead of relief once it ends, he turns his method on the review itself,
  transcribing his manager's words for hidden meaning.
stakes_now: Ren's late reports and irregular badge hours have finally been noticed institutionally for
  the first time — a formal, named professional threat rather than a coworker's passing remark.
stakes_end: The review buys Ren a month, but he spends the relief transcribing the meeting itself into
  his case notes, absorbing the institution's oversight into the very compulsion it was meant to check.
