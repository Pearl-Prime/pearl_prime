  silence: false
  dialogue_allowed: true
- panel_id: ep007_004
  page_id: ep_007_p01
  story_function: fluent_rehearsed_explanation
  story_move: Ren delivers a composed, plausible explanation, demonstrating the same fluent
    justification skill the craft bible warns is dangerous precisely because it works.
  visual_proof: Close on Ren answering with level, controlled body language, no visible panic.
  information_delta: Reader confirms Ren can talk his way past institutional scrutiny, at least once.
