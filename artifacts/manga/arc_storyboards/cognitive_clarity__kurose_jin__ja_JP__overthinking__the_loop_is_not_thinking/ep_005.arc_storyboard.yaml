title: Outside the Clearance Line — Episode 5 (English gloss)
logline: Ren's badge still opens the basement records vault long after hours, and he uses it to pull and
  photograph an old personnel folder he was never cleared to copy, until Saeki finds him among the
  stacks and names the pattern he has not stopped to name himself.
stakes_now: Ren's access to the vault has never been questioned because he has never abused it before —
  tonight is the first time he crosses from reading data to actively copying material outside his
  clearance, a line that cannot be uncrossed once photographed.
stakes_end: The folder goes back on the shelf, but the photograph does not — Saeki's clearest warning yet
  changes nothing about what Ren keeps, only where he keeps it.
