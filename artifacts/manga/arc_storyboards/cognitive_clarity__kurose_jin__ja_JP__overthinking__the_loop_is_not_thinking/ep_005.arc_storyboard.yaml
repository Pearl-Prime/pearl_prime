notes: 'Episode 5 of 12 in arc 1 (''obsession seed''). Realizes strategy_05''s beat 4 (the vessel names
  what the pattern is doing to Ren; he answers honestly and threads the next connection anyway) inside
  the basement records vault from the strategy bank''s setting_pool. This is the arc''s clearest
  professional-risk escalation — an unauthorized photograph, not just an unauthorized search — and the
  first time the vessel names the compulsion pattern in plain language, carefully kept as an outside
  observation rather than the protagonist''s own self-diagnosis, per the craft bible''s unreliable-narrator
  convention (failure mode 1).'
