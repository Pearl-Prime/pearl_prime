notes: 'Episode 11 of 12 in arc 1 (''obsession seed''). Pays off the badge-log seed planted across
  episodes three, five, and seven by formalizing it into a security compliance case, and introduces
  strategy_02''s (Someone Has Been Reading Over My Shoulder) core theme directly through Saeki''s closing
  line, functioning as the explicit bridge from arc 1 into arc 2''s spiral. Setting: the analytics office,
  reused from ep_001/003/007 at its highest institutional-stakes register in the arc. The episode
  deliberately withholds any claim of resolution: Ren''s laptop-closing and badge-setting-down gestures
  are framed as small, honest distance, not a cure, and the Shizuku rupture from ep_010 remains explicitly
  unrepaired.'
notes_craft: 'ACCEPTANCE LAYER: authored_candidate. Board describes the shipped ja_JP script''s
  already-demonstrated story_move per panel; does not claim system_working or proven_at_bar.'
