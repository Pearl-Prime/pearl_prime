title: The One Now Being Analyzed — Episode 11 (English gloss)
logline: An automated security system has compiled Ren's own badge and terminal logs into a formal
  irregular-access report, and a compliance officer questions him using the exact analytical vocabulary
  Ren has used on others for ten episodes, while Saeki admits she has been quietly shielding him.
stakes_now: The badge access trail seeded across episodes three, five, and seven has, until now, only
  ever threatened Ren informally — this episode is the first time it becomes a formal security
  compliance matter with its own report and disciplinary process.
stakes_end: A formal disciplinary review is now scheduled, Saeki's shielding has run out, and Ren makes
  one small, ambiguous gesture of distance — setting his badge down instead of carrying it — without any
  claim that the pattern has been solved or stopped.
