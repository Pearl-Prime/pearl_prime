title: The Sheet Pulled Back — Episode 10 (English gloss)
logline: Shizuku arrives unannounced after days of unanswered calls and pulls back the sheet Ren threw
  over his wall of notes, discovering fragments of her own words tracked alongside the anomaly — and for
  the first time, Ren's fluent explanations fail him completely.
stakes_now: Shizuku has never shown up in person before — every prior contact has been a call or a
  video chat — and her decision to come anyway signals the relationship has reached a point words alone
  can no longer manage.
stakes_end: Shizuku leaves needing distance, the relationship's heaviest cost paid in full on-page, and
  Ren is left alone seeing his own reflection clearly against the wall for the first time — recognition,
  not a cure.
