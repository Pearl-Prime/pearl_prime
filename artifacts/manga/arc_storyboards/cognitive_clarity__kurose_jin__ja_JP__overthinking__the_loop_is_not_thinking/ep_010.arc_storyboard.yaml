notes: 'Episode 10 of 12 in arc 1 (''obsession seed''). Realizes strategy_01''s beat 5 (the cost lands
  on the anchor) at its highest intensity in the arc, converting the relationship cost implied since
  episode two into an on-page rupture. Setting: the apartment from the strategy bank''s setting_pool,
  reused from episodes 2 and 6, chosen so the mirror motif and the wall of notes (introduced in episode
  9) can visually merge in the closing beat. This episode explicitly ends on recognition, not resolution
  or cure, per this program''s acceptance-layer doctrine and the craft bible''s failure-mode 1 (never let
  the protagonist become reliable about their own unreliability in caption) — the recognition is shown
  through composition, not narrated as insight.'
