page_turn_promises:
- page_id: ep_012_p01
  promise: Will the disciplinary review's explanation for the anomaly bring Ren any real relief, or does
    solving the data only expose that his own behavior — and now Saeki's — was the real, unresolved
    case all along?
- page_id: ep_012_p02
  promise: Now that Saeki's own conduct is under review because of him, can anything Ren says actually
    repair what his reading habit has cost her, or do they part with the future genuinely unresolved?
- page_id: ep_012_p03
  promise: Does taking one sheet off the wall and finally calling Shizuku mean arc one closes on any kind
    of relief, or does the new message from the coastal town prove the case was never actually finished?
