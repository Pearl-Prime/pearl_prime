title: The Seed — Episode 12, Arc 1 Finale (English gloss)
logline: The disciplinary review reveals the anomaly was only a misrouted internal audit test record all
  along, an ordinary explanation that solves nothing, because the real unresolved case is what nine
  months of reading has cost Ren, Saeki, and Shizuku — and a new message reopens it at a larger scale.
stakes_now: The disciplinary review scheduled in episode eleven has arrived, and for the first time the
  anomaly that has driven the entire arc is about to be explained — the question is whether an answer
  can undo any of the cost already paid.
stakes_end: The anomaly is closed administratively, Saeki's own conduct is now under review because of
  him, Shizuku still has not answered his voicemail, and a message from ep_008's coastal town proves the
  case is not over — it is only entering a larger phase arc 2 will inherit.
