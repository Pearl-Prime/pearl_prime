notes: 'Episode 12 of 12 — arc 1 (''obsession seed'') finale. Realizes strategy_01''s closing beat
  (one reading left unrevised, not because it was proven but because it was left alone — the single
  sheet removed from the wall) fused with strategy_02''s full theme (the watcher''s vantage rhymes with
  their own — realized here through Saeki naming her own reversal, not only Ren''s). Deliberately
  resolves the surface mystery (the anomaly) with an anti-climactic, mundane explanation per the craft
  bible''s failure-mode warning against clean resolutions, while leaving every human cost — Ren''s
  reputation, Saeki''s now-reviewed conduct, and the still-unanswered Shizuku rupture — genuinely open.
  Ends on a hard reversal (the coastal-town message from ep_008) that launches arc 2''s spiral rather
  than concluding anything. Per program doctrine, this episode never claims Ren is cured, recovered, or
  that the pattern has stopped — only that one honest, small gesture and one honest voicemail were made.'
notes_craft: 'ACCEPTANCE LAYER: authored_candidate. Board describes the shipped ja_JP script''s
  already-demonstrated story_move per panel; does not claim system_working or proven_at_bar. This is the
  arc''s closing episode and explicitly does not claim bestseller, cure, or resolution — see
  BESTSELLER_DRIFT_ROOT_CAUSE_2026-07-02.md doctrine.'
