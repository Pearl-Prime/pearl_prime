title: My Sister, Through a Screen — Episode 6 (English gloss)
logline: Ren's sister Shizuku video-calls to confirm their weekend plans, and while she talks he keeps a
  second screen open beneath the frame, scrolling case notes with the hand she cannot see, until the
  plan itself becomes the first relationship cost paid in full.
stakes_now: Ren and Shizuku have a real, if distant, weekend plan together — visiting their mother's
  grave — and this call is the first time the pattern-reading habit is tested against an obligation to a
  person he actually loves, not just a coworker or a stranger.
stakes_end: The visit is postponed, Shizuku's hurt is visible even through her composure, and Ren's hand
  returns to the case notes before he has time to feel what the postponement cost — the arc's first
  relationship price paid in full, not just implied.
