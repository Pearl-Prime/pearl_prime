notes: 'Episode 3 of 12 in arc 1 (''obsession seed''). Extends strategy_01 beats 4-5 (the accelerating
  spiral of corrections, and the vessel''s direct-but-short cost line) as the office day following
  episode 2''s home escalation. Deliberately does NOT grant Ren an update this episode — his body eases
  but his hands do not stop, an honest craft-bible-compliant reversal of episode one''s small victory,
  matching failure-mode warning 7 (a correct read/update must not become power-fantasy repetition).
  Setting: the glass-walled analytics office from the strategy bank''s setting_pool, reused from ep_001
  at a later, higher-stakes hour.'
