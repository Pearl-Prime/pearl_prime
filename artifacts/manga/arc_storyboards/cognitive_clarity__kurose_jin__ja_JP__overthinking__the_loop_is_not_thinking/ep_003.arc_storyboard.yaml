title: The Search Before Clock-In — Episode 3 (English gloss)
logline: Ren arrives before his team to keep digging through company records for the name that echoes
  his sister's, unaware his own badge log is quietly building a pattern that will one day be read back
  to him.
stakes_now: Ren's professional reputation has been spotless until today — no late report, no missed
  meal, no visible crack — and this episode is the first time the compulsion costs him something a
  coworker can see and name out loud.
stakes_end: The search is not resolved and Ren has not stopped — Saeki's hand on his desk eased his
  shoulders for a moment, but his fingers returned to the keyboard, and the report stays late.
