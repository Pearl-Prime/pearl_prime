  beat_role: companion_entry
  action_intensity: 2
  silence: false
  dialogue_allowed: true
- panel_id: ep001_024
  page_id: ep_001_p02
  story_function: companion_turn
  story_move: Priya states the episode's turn directly — stop arguing, let it stand at the threshold unanswered
