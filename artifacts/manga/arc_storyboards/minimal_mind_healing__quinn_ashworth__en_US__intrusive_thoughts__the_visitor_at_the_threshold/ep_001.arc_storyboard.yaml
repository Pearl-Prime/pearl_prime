  beat_role: verdict_stated
  action_intensity: 3
  silence: false
  dialogue_allowed: false
- panel_id: ep001_015
  page_id: ep_001_p02
  story_function: argument_feeds_it
  story_move: The recurring visual through-line changes state for the first time — the rhythm compresses
