  beat_role: argument_engaged
  action_intensity: 3
  silence: false
  dialogue_allowed: true
- panel_id: ep001_014
  page_id: ep_001_p02
  story_function: argument_feeds_it
  story_move: The visitor answers before Sora's own message finishes sending and sharpens its claim with
    a specific, correct detail, proving the argument is making it stronger, not weaker.
  visual_proof: Send animation still mid-transit on Sora's outgoing bubble while a reply bubble already
