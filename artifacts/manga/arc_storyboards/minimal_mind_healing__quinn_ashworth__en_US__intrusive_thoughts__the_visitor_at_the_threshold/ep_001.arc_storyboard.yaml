- panel_id: ep001_018
  page_id: ep_001_p02
  story_function: synchronized_dread
  story_move: The visitor crosses from screen and light into a physical knock at the door, synchronizing
    all three channels into one rhythm and forcing a confrontation Sora cannot delete or block.
  visual_proof: Apartment door in frame, three knock-impact indicators drawn at whisper intensity (no
