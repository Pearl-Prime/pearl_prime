chapter_id: ep_001
genre_id: psychological_horror
title: 'The Visitor at the Threshold — Episode 1: Three Knocks'
logline: An uninvited presence answers every lock and every deleted message with three knocks, insisting
  it already lives inside Sora's phone and her own front door, and grows stronger every time she argues
  back.
stakes_now: Sora's phone and front door are the only boundaries she has ever needed; tonight both fail
  to keep an unnamed sender out, and every refusal she tries — delete, block, argue, lock — makes it more
  specific and more her.
stakes_end: The visitor is not banished and the thread is not deleted — Sora has one lived instance of
  not arguing with it, on Priya's voice alone, and the hallway bulb holds steady for the length of one
  dawn, not forever.
genre_cadence:
- wound_refusal
- argument_feeds_it
- escalation_signal
- synchronized_dread
- companion_turn
- non_engagement
- thing_shrinks
- cost
- ambiguous_close
page_turn_promises:
- page_id: ep_001_p01
  promise: Will deleting and blocking the message actually make it stop, or does every refusal only prove
    the sender's opening sentence right?
- page_id: ep_001_p02
  promise: Will barring every door and window hold the visitor out, or does Sora have to stop arguing
    with it entirely to survive the night?
