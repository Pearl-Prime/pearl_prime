  action_intensity: 4
  silence: false
  dialogue_allowed: false
- panel_id: ep001_019
  page_id: ep_001_p02
  story_function: synchronized_dread
  story_move: Looking through the peephole disproves the physical presence at the door without disproving
    the knock, confirming the threat cannot be resolved by simply checking.
  visual_proof: Peephole-framed circular view of an empty, flickering hallway, phone visible buzzing on
    the desk behind Sora in the same frame.
  information_delta: Reader learns checking does not work here either — the door is not lying, but neither
    is the knock; both are true at once.
  beat_role: dread_confirmed
  action_intensity: 4
  silence: true
  dialogue_allowed: false
- panel_id: ep001_020
  page_id: ep_001_p02
  story_function: synchronized_dread
  story_move: The visitor escalates from a borrowed name to a borrowed face, calling from what appears
    to be Sora's own contact card, collapsing the last distance between her and it.
  visual_proof: Phone screen mid-ring, caller ID photo and name matching Sora's own profile exactly, call
