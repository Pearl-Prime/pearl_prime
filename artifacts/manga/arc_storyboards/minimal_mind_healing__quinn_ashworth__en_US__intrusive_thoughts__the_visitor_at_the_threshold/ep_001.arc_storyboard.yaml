  information_delta: 'Reader now has the explicit reframe: the fight was never winnable by argument, only
    survivable by not feeding it.'
  beat_role: turn_instruction
  action_intensity: 2
  silence: false
  dialogue_allowed: true
- panel_id: ep001_025
  page_id: ep_001_p02
  story_function: non_engagement
  story_move: Sora physically enacts the turn — releasing the lock and sitting rather than checking or
