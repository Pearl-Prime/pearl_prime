  beat_role: threshold_arrival
  action_intensity: 4
  silence: false
  dialogue_allowed: false
- panel_id: ep001_021
  page_id: ep_001_p02
  story_function: synchronized_dread
  story_move: Sora's body locks mid-action between fleeing and confronting, the heartbeat SFX carrying
