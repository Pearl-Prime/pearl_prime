  beat_role: companion_entry
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep001_023
  page_id: ep_001_p02
  story_function: companion_turn
  story_move: Priya names the pattern from outside it — the sleeplessness, the breathing, the lock-checking
