  visual_proof: Sora's hand releasing the deadbolt, her body sliding down to sit on the floor with her
    back against the door, phone still held to her ear.
  information_delta: Reader sees the reframe has become a body posture, not just a sentence — the first
    proof the turn is real, not just spoken.
  beat_role: turn_enacted
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep001_026
  page_id: ep_001_p02
  story_function: non_engagement
  story_move: The episode holds on the unresolved knock without cutting away or resolving it, giving the
    reader the same discomfort of not-checking that Sora is now sitting inside.
  visual_proof: Wide shot, Sora seated against the door, faint knock rhythm marks continuing at the door's
    edge, deliberate empty space, no new text.
  information_delta: Reader is given a held moment with no new plot information — the endurance of not-checking
    is the content of the panel.
  beat_role: decompression
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep001_027
  page_id: ep_001_p02
  story_function: thing_shrinks
  story_move: The visitor's physical channel loses urgency in direct response to being left unanswered,
    the first evidence that non-engagement is working.
  visual_proof: Same door and hallway framing as panel twenty-six, knock-rhythm marks now sparser and
    softer, no longer synchronized to a driving beat.
  information_delta: Reader learns the presence's intensity is conditional on being fought, not fixed
    — it is shrinking now that no one is arguing with it.
  beat_role: cost_paid
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep001_028
  page_id: ep_001_p02
  story_function: thing_shrinks
  story_move: The visitor's borrowed voice on the phone fails to complete a sentence for the first time
    all episode, proving it has lost the argument-fuel it was running on.
  visual_proof: Lit phone screen on the floor, three-dot typing indicator blinking without ever producing
    a delivered message, thread otherwise unchanged.
  information_delta: Reader learns the visitor lost its borrowed voice once nobody argued back — the mechanism
    from panel sixteen now runs in reverse.
  beat_role: cost_paid
  action_intensity: 1
  silence: false
  dialogue_allowed: false
- panel_id: ep001_029
  page_id: ep_001_p02
  story_function: cost
  story_move: Priya asks the question that names the real toll of the night — not the visitor, but how
    long Sora has been carrying it alone — and Sora's silence is left to answer instead of a reply panel.
  visual_proof: Sora seated on the floor, phone at her ear, mouth closed, no reply bubble drawn, panel
    holding on her stillness after the question.
  information_delta: Reader learns the true cost of the episode was never a single night — the visitor
    has been testing this door for longer than tonight, and Sora's silence confirms it.
  beat_role: cost_named
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep001_030
  page_id: ep_001_p02
  story_function: cost
  story_move: The recurring visual through-line resolves to a steady state rather than a cured one, paying
    off the episode's opening image without claiming the danger is gone for good.
  visual_proof: Wide hallway shot, dawn light entering from an unseen window, the bulb glowing without
    flicker for the first time in the episode.
  information_delta: 'Reader is shown the through-line''s honest endpoint: steady, not fixed — the episode
    refuses to claim a cure.'
  beat_role: honest_landing
  action_intensity: 0
  silence: false
  dialogue_allowed: false
- panel_id: ep001_031
  page_id: ep_001_p02
  story_function: ambiguous_close
  story_move: The episode ends on the thread left visibly unresolved — not deleted, not answered — refusing
    a cure ending while stating the reframe that the visitor's goal was never entry but engagement.
  visual_proof: Close on Sora's unbolted hand flat against the door, phone on the floor beside it still
    showing the un-deleted Unknown thread.
  information_delta: 'Reader receives the episode''s honest thesis in one line: the visitor was never
    trying to get in, and nothing that happened tonight required it to be defeated, only not fed.'
  beat_role: honest_landing
  action_intensity: 0
  silence: false
  dialogue_allowed: false
- panel_id: ep001_032
  page_id: ep_001_p02
  story_function: ambiguous_close
  story_move: The episode card closes the chapter and names it, marking the end of this specific night
    before any future return of the visitor.
  visual_proof: Typographic episode-card panel, title text centered on a dark quiet background, no other
    imagery.
  information_delta: Reader is given a clean structural close to the episode.
  beat_role: episode_card
  action_intensity: 0
  silence: false
  dialogue_allowed: false
