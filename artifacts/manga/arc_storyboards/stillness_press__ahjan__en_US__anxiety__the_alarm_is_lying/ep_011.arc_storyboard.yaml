title: 'The Alarm Is Lying — Episode 11: The Room Is Bigger'
logline: A calendar notification silently triples the size of Mira's Thursday
  presentation, forcing her to test six episodes of private practice in front
  of a room she never agreed to prepare for.
stakes_now: Mira has only ever practiced noticing her alarm alone, at a distance
  from colleagues, or in front of family — never inside a real, public,
  professionally consequential room.
stakes_end: The presentation was imperfect, not catastrophic; a colleague,
  Devon, witnessed the private gesture for the first time, opening a thread
  that did not exist before this episode.
genre_cadence:
- established_calm_desk_opening
- escalated_activation_trigger
- body_register_amplified
- new_character_introduction
- mirrored_activation_in_transit
- scale_reveal
- proceed_despite_unresolved_activation
- public_stumble_and_recovery
- reality_check_reversal
- delayed_activation_release
- gesture_witnessed_turn
- closing_return
page_turn_promises:
- page_id: ep_011_p01
  promise: Will the meeting Mira prepared for still be the meeting she has to
    give?
- page_id: ep_011_p02
  promise: Can the private practice hold up inside a room this size, in front
    of people who are actually watching?
panels:
