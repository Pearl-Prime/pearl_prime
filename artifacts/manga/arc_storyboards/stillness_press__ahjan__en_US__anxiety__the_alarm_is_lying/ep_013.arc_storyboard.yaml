  and the breakroom kettle makes two cups before anyone decides it should.
stakes_now: Arc one closed with one articulated coffee; nothing yet proves the invitation survives
  a second week.
stakes_end: 'Friday begins to look standing: two cups, no reteaching, an unspoken mug placement claiming
  next week.'
