genre_id: iyashikei
title: 'The Alarm Is Lying — Episode 1: Tuesday, 6:47 AM'
logline: A Tuesday-morning work notification fires Mira's body into a catastrophizing spiral before she
  has even finished her tea, and the episode has to prove the alarm can be witnessed without being obeyed.
stakes_now: Mira's nervous system is already primed to read any notification as danger; one email subject
  line can hijack a whole morning.
stakes_end: The alarm still fires — the smoke detector is still on the ceiling — but Mira has one lived
  instance of noticing the false alarm without being run by it, not a cure.
genre_cadence:
- establishing_calm_ritual
- sensory_anchor_tea_beat
- activation_trigger
- body_register_escalation
- mind_racing_spiral
- anchor_object_discovery
- memory_pendulation_flashback
- present_return
- teaching_insight_landing
- long_drop_decompression
- closing_return
page_turn_promises:
- page_id: ep_001_p01
  promise: Will the quiet morning stay quiet once the phone lights up?
- page_id: ep_001_p02
  promise: Will the catastrophizing spiral run unchecked, or does something in the ordinary world interrupt
    it before the meeting?
notes: Backfilled per docs/agent_prompt_packs/manga_arc_storyboard_planner.md mandatory sequence — ep_001
  was authored (M3 Wave 1) before the storyboard-first process existed. This plan describes the story_move
  already present in the shipped script; it does not add new panels. No config/manga/genre_scene_templates/iyashikei.yaml
  exists yet (only mecha.yaml is populated) — genre_cadence above is derived from the episode's own already-demonstrated
  genre-native structural beats (TEA BEAT, DAPPLED LIGHT HAND, ANCHOR PANEL, BREATH BRACKET, LONG DROP)
  rather than a formal scene-template file; flagging this as a real gap for the genre-template backlog.
panels:
