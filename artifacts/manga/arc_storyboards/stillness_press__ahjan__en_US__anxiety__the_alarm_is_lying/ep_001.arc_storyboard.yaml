  information_delta: Reader knows this is a calm ordinary morning, time-stamped, before anything has happened.
  beat_role: pre_trigger_calm
  action_intensity: 0
  silence: true
  dialogue_allowed: false
- panel_id: ep001_002
  page_id: ep_001_p01
  story_function: sensory_anchor_tea_beat
