  visual_proof: Close-up, steady hand wrapping a ceramic cup, steam curling, hand still.
  information_delta: Reader learns tea is Mira's ritual object before it is ever named as one.
  beat_role: ritual_anchor
  action_intensity: 0
  silence: false
  dialogue_allowed: false
- panel_id: ep001_003
  page_id: ep_001_p01
