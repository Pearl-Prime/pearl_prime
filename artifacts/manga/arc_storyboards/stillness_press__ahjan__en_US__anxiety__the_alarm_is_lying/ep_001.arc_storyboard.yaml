  visual_proof: Close on Mira's face, eyes widened slightly, lips closed, alerted but not yet afraid.
  information_delta: Reader confirms the trigger has landed — Mira has noticed her own activation.
  beat_role: somatic_onset
  action_intensity: 2
  silence: false
  dialogue_allowed: true
