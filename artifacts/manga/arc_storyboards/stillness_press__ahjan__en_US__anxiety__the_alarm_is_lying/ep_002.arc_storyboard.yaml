page_turn_promises:
- page_id: ep_002_p01
  promise: Will the small, steadier activation Mira notices on her walk to the office hold, or
    will it grow the way yesterday's spiral did once she reaches the building?
- page_id: ep_002_p02
  promise: Will Mira's applied reframe survive contact with the actual review meeting and Dr.
    Morimoto, or does the old alarm run the room once the stakes are real?
notes: Backfilled per docs/agent_prompt_packs/manga_arc_storyboard_planner.md mandatory sequence,
  same pattern as ep_001 (PR#135) — ep_002 was authored (M3 Wave 1) before the storyboard-first
  process existed. This plan describes the story_move already present in the shipped script; it
  does not add new panels or change panel order. ep_002.yaml originally shipped with a single
  pages[] entry containing all 32 panels; it has been split here into two pages[] entries (panels
  1-10 / 11-32, split point after the lobby-plant anchor discovery completes) to satisfy the
  MANGA.STORY.PAGE_ONE_HOOK page-two-exists requirement — panel content, order, and text were not
  changed, only which page_id groups which panels. No config/manga/genre_scene_templates/iyashikei.yaml
  exists yet (only mecha.yaml is populated), same gap ep_001's plan flagged — genre_cadence above is
  derived from the episode's own already-demonstrated genre-native structural beats (TEA BEAT,
  ANCHOR PANEL, BREATH BRACKET, AWE-PULLBACK, LONG DROP) rather than a formal scene-template file.
