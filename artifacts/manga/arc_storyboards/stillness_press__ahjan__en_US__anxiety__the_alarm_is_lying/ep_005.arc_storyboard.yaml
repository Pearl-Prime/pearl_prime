title: 'The Alarm Is Lying — Episode 5: Friday, 12:08 PM'
logline: A lunch invitation from a coworker, Yara, pulls Mira's private regulation
  practice into view for the first time, testing whether it can be witnessed by
  another person without turning into an explanation.
stakes_now: Mira has kept her nervous-system practice private; if Yara notices and
  asks about it, Mira risks either deflecting a friend or having to explain something
  she does not yet have words for.
stakes_end: The practice survived being witnessed — Yara noticed, Mira admitted a
  sliver, and Yara disclosed two years of her own bathroom panic attacks in return
  — but neither woman's underlying anxiety was cured, only made less lonely.
genre_cadence:
- establishing_calm_ritual
- activation_trigger
- body_register_escalation
- pendulation_anchor_return
- relational_activation
- location_transition
- awe_pullback
- witness_disclosure
- long_drop_decompression
- closing_return
page_turn_promises:
- page_id: ep_005_p01
  promise: Will the ordinary Friday desk rhythm hold, or will meeting Yara for lunch
    stir the same old activation?
- page_id: ep_005_p02
  promise: Will Yara's noticing force Mira to explain herself, or can the practice
    be witnessed without becoming a lesson — and will Yara's own hidden struggle
    surface too?
