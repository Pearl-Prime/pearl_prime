title: 'The Alarm Is Lying — Episode 4: Wednesday, 11:42 PM'
logline: A body alarm fires at 11:42 PM with no notification, meeting, or person to blame, and Mira has
  to find out whether the practice she trusts by day still holds when there is nothing outside her to
  point at.
stakes_now: Mira's sleep and her trust in the practice are both on the line the first time the alarm fires
  with no external trigger to explain or blame it.
stakes_end: The alarm still fired for no reason and nothing outside her changed, but Mira slept, woke
  rested, and chose to put the pendant back on rather than needing it.
genre_cadence:
- safety_opening_no_trigger
- activation_without_stimulus
- body_register_escalation
- pendulation_anchor_lamp
- anchor_refusal_no_prop
- ramp_continues_realistic
- sensory_anchor_water
- settle_new_container
- silent_caption_no_external_cause
- awe_pullback_night_city
- peak_activation_no_cause
- ground_touch_presence
- pendant_as_companion
- long_drop_sleep_surrender
- pre_dawn_time_jump
- completion_kettle_bookend
- closing_pendant_return
page_turn_promises:
- page_id: ep_004_p01
  promise: Will the practice that worked in daylight hold when the alarm fires in the dark with nothing
    external causing it?
- page_id: ep_004_p02
  promise: Once the first ground attempt fails and Mira leaves the bed, does the night resolve into rest,
    or does the alarm win until morning?
panels:
- panel_id: ep004_001
  page_id: ep_004_p01
  story_function: safety_opening_no_trigger
  story_move: Episode opens on a single warm light source before Mira appears, establishing that safety
    exists even in full dark, without her yet on-page.
  visual_proof: Bedside lamp glowing amber against navy dark, succulent silhouette caught in its halo,
    no figure yet.
  information_delta: Reader knows this is night, and that a steady warm anchor already exists in the room.
  silence: true
- panel_id: ep004_002
  page_id: ep_004_p01
  story_function: safety_opening_no_trigger
  story_move: Mira is placed in the room at an exact timestamp, awake and reading, establishing the ordinary
    baseline the alarm will interrupt.
  visual_proof: Mira upright against the headboard with an open paperback, bedside clock reading 11:42
    PM.
  information_delta: Reader gets the exact time and confirms Mira is not yet activated.
- panel_id: ep004_003
  page_id: ep_004_p01
  story_function: activation_without_stimulus
  story_move: Mira's attention silently disengages from the book, showing the body registering something
    before she consciously names it.
  visual_proof: Mira's hand turning a page while her eyes stay fixed, not tracking the text.
  information_delta: Reader learns the activation is starting pre-verbally, before any external cue has
    appeared.
- panel_id: ep004_004
  page_id: ep_004_p01
  story_function: activation_without_stimulus
  story_move: The nervous system fires without any object, message, or person on-page to blame, proving
    this episode's alarm has no external trigger.
  visual_proof: Tight framing on the pajama fabric over Mira's chest showing shallow, tense breathing
    plus a thudding heartbeat sound cue.
  information_delta: Reader confirms activation is purely somatic; there is nothing external causing it.
- panel_id: ep004_005
  page_id: ep_004_p01
  story_function: activation_without_stimulus
  story_move: Mira sets the book down and voices that she cannot name a cause, marking the moment she
    stops pretending to read and faces the activation directly.
  visual_proof: Mira closing and setting aside the paperback, lamp-lit face against the dim room, thought
    bubble asking what triggered this.
  information_delta: Reader learns Mira herself cannot identify an external cause; this is confirmed as
    the no-cue case.
- panel_id: ep004_006
  page_id: ep_004_p01
  story_function: body_register_escalation
  story_move: Mira lies back as her mind begins listing worries, the moving light patterns visually tracking
    the mind's unrolling activity.
  visual_proof: Mira supine, eyes open, passing-car light sliding across the ceiling in shifting patterns.
  information_delta: Reader sees the ramp continuing into mental spiraling, not just bodily sensation.
- panel_id: ep004_007
  page_id: ep_004_p01
  story_function: pendulation_anchor_lamp
  story_move: Mira deliberately redirects her attention to the one fixed warm object in the room, the
    first ground move of the episode.
  visual_proof: Mira's eyes settling on the steady bedside lamp glow, distinct from the shifting car-light
    patterns of the prior panel.
  information_delta: Reader sees Mira has a reflex to reach for a fixed sensory anchor when activated.
- panel_id: ep004_008
  page_id: ep_004_p01
  story_function: anchor_refusal_no_prop
  story_move: Mira touches the pendant without putting it on, establishing that tonight the practice must
    work without the usual worn anchor.
  visual_proof: Mira's fingers resting on the jade pendant on the nightstand while it stays off her neck.
  information_delta: Reader learns the pendant, worn in prior episodes, is deliberately not being used
    the same way tonight.
- panel_id: ep004_009
  page_id: ep_004_p01
  story_function: anchor_refusal_no_prop
  story_move: Mira closes her eyes and slows her breath without any external prop, the first full breath
    cycle attempted with nothing but the body itself.
  visual_proof: Mira's eyelids lowering as a slow inhale is visible in her posture, no pendant or lamp
    touch involved this beat.
  information_delta: Reader registers the first bare-breath regulation attempt of the night.
- panel_id: ep004_010
  page_id: ep_004_p02
  story_function: ramp_continues_realistic
  story_move: Mira gets out of bed as the first ground attempt fails to hold, the clock advancing to prove
    real time has passed without resolution.
  visual_proof: Mira pushing the blanket off and sitting up, bedside clock now reading 12:18 AM.
  information_delta: Reader learns the breath-and-lamp anchor alone was not enough; the episode's ramp
    continues rather than resolving in one beat.
- panel_id: ep004_011
  page_id: ep_004_p02
  story_function: ramp_continues_realistic
  story_move: Mira chooses to move toward sensation rather than stay frozen under the covers, turning
    activation into a physical action instead of avoidance.
  visual_proof: Mira's bare feet meeting the cool floor, contrasted against the warm blanket she is leaving
    behind.
  information_delta: Reader sees Mira actively choosing grounding-via-sensation over staying still and
    spiraling.
- panel_id: ep004_012
  page_id: ep_004_p02
  story_function: ramp_continues_realistic
  story_move: Mira leaves the bedroom entirely, moving the whole scene to the kitchen and proving the
    practice can travel with her through the apartment.
  visual_proof: Mira walking down the dim hallway, bedroom lamplight behind her and kitchen moonlight
    ahead.
  information_delta: Reader learns the setting is expanding beyond the bedroom, tracking a real change
    of location at nearly midnight.
- panel_id: ep004_013
  page_id: ep_004_p02
  story_function: sensory_anchor_water
  story_move: Mira fills a glass of water at the sink, giving herself a concrete task in the new space
    rather than only waiting out the activation.
  visual_proof: Mira at the kitchen sink under cool moonlight, filling a glass of water, succulent silhouette
    beside her.
  information_delta: Reader gets a new, wider setting (kitchen) and a concrete midnight ritual object,
    the water glass.
- panel_id: ep004_014
  page_id: ep_004_p02
  story_function: sensory_anchor_water
  story_move: Mira drinks the cool water with her eyes closed, converting the abstract activation into
    one specific bodily sensation she can track.
  visual_proof: Mira's mouth at the glass rim, cool water, eyes shut in concentration on the sensation.
  information_delta: Reader is given a second, distinct sensory anchor, cold water, alongside the earlier
    warm lamp.
- panel_id: ep004_015
  page_id: ep_004_p02
  story_function: settle_new_container
  story_move: Mira settles into a third distinct container, neither bed nor kitchen counter, establishing
    a new physical position for the rest of the night.
  visual_proof: Mira folded into the armchair by the cracked-open window, cool air moving a loose strand
    of hair.
  information_delta: Reader learns Mira has chosen a specific new resting position rather than pacing
    indefinitely.
- panel_id: ep004_016
  page_id: ep_004_p02
  story_function: settle_new_container
  story_move: Mira's hands settle around the empty glass as the bedroom's lamp becomes a distant, barely
    visible point, marking distance from the original anchor.
  visual_proof: Mira's thumbs pressed to the rim of the now-empty glass, the bedroom lamp reduced to a
    faint glow far down the hallway.
  information_delta: Reader tracks how far Mira has physically moved from the original safety cue of panel
    one.
- panel_id: ep004_017
  page_id: ep_004_p02
  story_function: silent_caption_no_external_cause
  story_move: The narration states directly that there is no external circumstance to blame this time,
    closing off any possibility of an outside cause.
  visual_proof: A near-black panel with only a thin edge of light and a caption naming the absence of
    any external trigger.
  information_delta: Reader gets explicit confirmation that, unlike prior episodes, no meeting or family
    conflict is driving tonight's alarm.
  silence: true
- panel_id: ep004_018
  page_id: ep_004_p02
  story_function: awe_pullback_night_city
  story_move: The frame pulls back to show the sleeping city holding Mira in its scale, shifting the episode's
    register from her interior alarm to the larger, quiet world she is part of.
  visual_proof: A wide pullback through the window onto the dim 1 AM cityscape with Mira small in the
    corner of the frame.
  information_delta: Reader is shown Mira is small within a much larger sleeping world, not isolated within
    her own head.
  silence: true
- panel_id: ep004_019
  page_id: ep_004_p02
  story_function: peak_activation_no_cause
  story_move: The activation reaches its peak with the mind unable to attach it to any story or cause,
    proving the episode's hardest case in full.
  visual_proof: Mira's open eyes in the dim light paired with a loud triple heartbeat sound cue at its
    most intense point of the night.
  information_delta: Reader confirms the activation has peaked and still has no external object to point
    at.
- panel_id: ep004_020
  page_id: ep_004_p02
  story_function: peak_activation_no_cause
  story_move: Mira's breathing is visibly outpaced by her racing pulse, showing the alarm is temporarily
    louder than her regulation attempts.
  visual_proof: The pajama fabric over Mira's chest rising and falling faster than a calm breath rate
    would explain.
  information_delta: Reader sees the activation is still winning at this point in the night, not yet resolving.
- panel_id: ep004_021
  page_id: ep_004_p02
  story_function: ground_touch_presence
  story_move: Mira places both hands on her own chest and names the activation as alarm rather than danger,
    the episode's central reframe stated at its hardest moment.
  visual_proof: Mira in the armchair with both hands stacked flat on her chest, eyes closed, alongside
    the whispered thought reframing the sensation.
  information_delta: Reader gets the episode's thesis stated in the exact moment it is hardest to believe.
- panel_id: ep004_022
  page_id: ep_004_p02
  story_function: ground_touch_presence
  story_move: Mira's shoulders visibly drop for the first time since the peak, marking the first physical
    evidence the nervous system is turning.
  visual_proof: A visible half-degree settle in Mira's shoulders alongside one long exhale.
  information_delta: Reader sees the first concrete sign of down-regulation after the peak.
- panel_id: ep004_023
  page_id: ep_004_p02
  story_function: pendant_as_companion
  story_move: Mira has carried the pendant with her from the bedroom without wearing it, touching it as
    company rather than putting it on as a fix.
  visual_proof: Mira's hand leaving her chest to rest briefly on the jade pendant now sitting on the side
    table beside the armchair.
  information_delta: Reader learns Mira brought the pendant along even while continuing to choose not
    to wear it, presence without dependence.
- panel_id: ep004_024
  page_id: ep_004_p02
  story_function: long_drop_sleep_surrender
  story_move: Mira's body finally surrenders into sleep in the chair, the night's activation resolving
    into unforced rest rather than a decision or insight.
  visual_proof: Mira folded asleep into the armchair, head against the window frame, blanket pulled over
    her, deliberate empty space above and no text anywhere in the panel.
  information_delta: 'Reader is given the episode''s central proof: rest arrived without the alarm ever
    being explained or fixed.'
  silence: true
- panel_id: ep004_025
  page_id: ep_004_p02
  story_function: pre_dawn_time_jump
  story_move: Mira's hand shows physical marks of the hours spent asleep in the chair, confirming real
    time and real rest passed, not just a single calming breath.
  visual_proof: Mira's loosely open hand on the blanket with faint sleep-marks pressed into the wrist
    from the chair arm.
  information_delta: Reader gets physical proof that substantial time has passed and the body actually
    rested.
- panel_id: ep004_026
  page_id: ep_004_p02
  story_function: pre_dawn_time_jump
  story_move: The sky outside shifts to pre-dawn color, marking a real time jump forward from the 1 AM
    peak to the edge of morning.
  visual_proof: The kitchen window now showing pale rose pre-dawn light over the city skyline, with the
    bedroom lamp confirmed off offscreen.
  information_delta: Reader tracks the passage of several hours purely through changing light, without
    any new dialogue.
- panel_id: ep004_027
  page_id: ep_004_p02
  story_function: pre_dawn_time_jump
  story_move: Mira wakes on her own in the chair as the first daylight reaches the room, choosing not
    to move yet rather than immediately resuming her routine.
  visual_proof: Mira's eyes opening slowly in the armchair as the first pre-dawn light catches the succulent
    on the windowsill.
  information_delta: Reader confirms Mira woke naturally, without alarm or urgency, after the night fully
    passed.
- panel_id: ep004_028
  page_id: ep_004_p02
  story_function: completion_kettle_bookend
  story_move: Mira moves from the chair to the stove and starts the kettle, the episode's first deliberate
    morning action after the long night.
  visual_proof: Mira at the stove lighting the kettle, still in pajamas, pre-dawn light filling the window
    behind her.
  information_delta: Reader sees the scene shift again, from chair to stove, marking the start of the
    completion sequence.
- panel_id: ep004_029
  page_id: ep_004_p02
  story_function: completion_kettle_bookend
  story_move: The kettle begins to steam, visually rhyming this episode's ending with the tea rituals
    of every prior episode in the series.
  visual_proof: The same kettle from earlier episodes starting to steam with a soft hiss sound cue.
  information_delta: Reader recognizes the recurring kettle object bookending the series' morning rituals,
    now used after an insomnia night rather than a calm one.
- panel_id: ep004_030
  page_id: ep_004_p02
  story_function: closing_pendant_return
  story_move: Mira sits with tea made and the pendant still off her neck, holding the choice of whether
    to wear it open a beat longer.
  visual_proof: Mira at the table with a fresh cup of tea and the jade pendant resting beside it, unworn,
    as she looks toward the dawn light.
  information_delta: Reader sees the pendant decision has not yet been resolved, keeping the choice visible
    rather than assumed.
- panel_id: ep004_031
  page_id: ep_004_p02
  story_function: closing_pendant_return
  story_move: Mira chooses to put the pendant back on, converting it from an unused prop into a deliberate,
    freely chosen action.
  visual_proof: Mira's fingers slowly fastening the pendant clasp behind her neck.
  information_delta: Reader sees the pendant return not as necessity but as Mira's own decision, made
    after proving she did not need it.
- panel_id: ep004_032
  page_id: ep_004_p02
  story_function: closing_pendant_return
  story_move: The episode closes on Mira at rest with every recurring object present at once, and the
    caption states plainly that the practice held even with no cause to name.
  visual_proof: Mira at the table with tea, pendant at her neck, and the succulent in the window together,
    alongside the closing caption.
  information_delta: 'Reader receives the episode''s final takeaway: the breath-based practice works even
    without an identifiable trigger.'
