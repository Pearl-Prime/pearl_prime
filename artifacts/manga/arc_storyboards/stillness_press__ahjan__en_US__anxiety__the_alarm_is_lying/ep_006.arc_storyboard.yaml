page_turn_promises:
- page_id: ep_006_p01
  promise: Will the easy Sunday call with Mom stay easy, or is her sudden quiet about to name the
    worry she's carried for years?
- page_id: ep_006_p02
  promise: Now that Mom has spoken the old worry aloud, will Mira retreat into the usual
    defend-and-reassure script, or let this call end in something more honest than either of them
    expected?
