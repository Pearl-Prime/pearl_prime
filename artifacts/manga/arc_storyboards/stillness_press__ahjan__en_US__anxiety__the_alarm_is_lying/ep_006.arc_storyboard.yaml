title: 'The Alarm Is Lying — Episode 6: Sunday, 3:47 PM'
logline: A Sunday phone call from Mira's mother reopens the oldest anxious pattern in the family
  — years of quiet parental worry meeting Mira's old reflex to defend or perform fine — and asks
  whether the practice she has built can hold under it.
stakes_now: Mira's afternoon quiet holds only until the phone rings; her mother's years-long worry
  is the one pressure Mira has never met without armor.
stakes_end: The old family pattern is not resolved and the mother's worry has not vanished, but
  Mira has one lived instance of answering honestly instead of defending, and her mother received
  it without pushing to fix her.
