title: "The Alarm Is Lying — Episode 3: Saturday, 11:14 AM"
logline: A visiting mother's Saturday text and a coffee-shop question about Mira's late father reactivate the same alarm reflex the workplace triggered in Episode 1, and the episode must prove the noticing generalizes beyond the office.
stakes_now: Mira's regulation skill has only been tested against work triggers so far; a family visit carrying grief about her father risks proving the technique does not generalize past the office.
stakes_end: Mira applies the same noticing to a relational and grief activation for the first time and it holds, though the loss itself stays unresolved — proof of generalization, not a cure.
