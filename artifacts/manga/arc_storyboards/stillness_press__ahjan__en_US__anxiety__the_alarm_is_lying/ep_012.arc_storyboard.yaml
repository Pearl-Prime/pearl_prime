title: 'The Alarm Is Lying — Episode 12: Passing It Along'
logline: A Friday text from Devon asking to still meet for coffee forces Mira to
  put six episodes of private practice into her own words for another person for
  the first time, closing arc one on a shared rather than solitary ritual.
stakes_now: The practice has been private for eleven episodes; Devon witnessed
  the gesture in ep_011 but has not yet been given any explanation for it.
stakes_end: Mira translates the teaching into her own language rather than
  borrowing it, Devon receives it imperfectly and without full resolution, and
  the series' central tea ritual becomes shared for the first time.
genre_cadence:
- small_articulation_pressure_trigger
- resistance_to_borrowed_language
- scene_transition_shared_ritual
- teaching_offered_in_own_words
- teaching_received_imperfectly
- shared_long_drop
- closing_return
page_turn_promises:
- page_id: ep_012_p01
  promise: Can Mira find her own words for a practice she has only ever done
    silently?
- page_id: ep_012_p02
  promise: What does it look like when the practice is offered to someone else
    instead of only practiced alone?
