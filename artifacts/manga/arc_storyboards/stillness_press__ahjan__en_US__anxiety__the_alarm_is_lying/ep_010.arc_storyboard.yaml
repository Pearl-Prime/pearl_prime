title: 'The Alarm Is Lying — Episode 10: Tuesday, 6:47 AM (Six Weeks Later)'
logline: A recurring Q-review work notification returns on the exact bedside phone from episode one, testing
  six weeks of practice against the same trigger that once hijacked Mira's whole morning.
stakes_now: The same category of work notification that hijacked Mira's very first morning fires again on
  the identical bedside phone, and the episode has to prove whether six weeks of practice actually changed
  her body's response or only her mood on that one earlier day.
stakes_end: Across all ten episodes the alarm itself is never fixed — the same notification and the same
  smoke detector still fire on this final morning — but Mira's recovery has compressed from a multi-page
  spiral in episode one to a single fast exhale here, closing the arc's first block on a practice that
  measurably compounds without ever curing her.
