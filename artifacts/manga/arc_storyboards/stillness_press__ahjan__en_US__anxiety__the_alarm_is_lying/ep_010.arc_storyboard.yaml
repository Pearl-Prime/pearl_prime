page_turn_promises:
- page_id: ep_010_p01
  promise: Will the identical Q-review notification hit Mira the same way it did on her very first morning,
    or has something in her body actually changed after six weeks?
- page_id: ep_010_p02
  promise: Having settled fast inside, will Mira take the practice out into the world today, or stay safely
    at the kitchen table the way she always has?
notes: Backfilled per docs/agent_prompt_packs/manga_arc_storyboard_planner.md mandatory sequence, mirroring
  the ep_001 backfill pattern from merged PR 135 — ep_010 was authored (M3 Wave 1, series finale) before the
  storyboard-first process existed. This plan describes the story_move already present in the shipped
  script; it does not add new panels. The single original top-level pages list (all 30 panels grouped under
  ep_010_p01) has been split into ep_010_p01 (panels 1-13, the mirrored bedroom-to-kitchen opening) and
  ep_010_p02 (panels 14-30, the decision to walk outside through the closing bookend) to satisfy the
  page-one-hook / page-two-turn contract, matching the ep_001 precedent — panel order and content are
  unchanged, only page grouping. As with ep_001, no config/manga/genre_scene_templates/iyashikei.yaml exists
  yet, so genre_cadence
  above is derived from the episode's own already-demonstrated structural beats rather than a formal
  scene-template file. This is the last episode of the arc's first block (ep_001-010); stakes_end reflects
  the ten-episode arc position, not only this episode's own micro-arc.
