title: "The Alarm Is Lying — Episode 8: Thursday, 7:23 PM"
logline: "A first date with a near-stranger forces Mira to choose between performing ease and letting Kenji see one honest, unpolished thing about her week."
stakes_now: "Mira has only practiced noticing her body's alarm alone and with people who already know her history; tonight a new person, Kenji, tests whether the practice holds with someone who has none of that context."
stakes_end: "Mira chooses honesty over performance at the table, and Kenji receives it without fixing or escalating it — one evening where being truly seen did not cost her the connection, though nothing about her life is resolved."
