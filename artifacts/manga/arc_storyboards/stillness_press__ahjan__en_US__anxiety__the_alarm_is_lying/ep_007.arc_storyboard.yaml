  register, five oscillation cycles, pendant-as-fidget doctrinal turn, cold-water sensory reset, bathroom
  Long Drop). No config/manga/genre_scene_templates/iyashikei.yaml exists yet (only mecha.yaml is populated)
  — genre_cadence above is derived from the episode's own already-demonstrated genre-native structural
  beats rather than a formal scene-template file, same real gap flagged in ep_001's plan.
panels:
