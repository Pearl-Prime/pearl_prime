  information_delta: Reader sees the practice is not limited to stillness — it can interrupt activation
    mid-errand, a new capability shown for the first time this episode.
  beat_role: pendulation_return
  action_intensity: 1
  silence: false
  dialogue_allowed: false
- panel_id: ep007_007
  page_id: ep_007_p01
  story_function: pendulation_ground_return
  story_move: The elevator doors open onto the lobby and Mira is already walking forward — the small ground
    holds just long enough to carry her out the door.
  visual_proof: Elevator doors opening onto the building lobby, Mira mid-stride, already leaving frame.
