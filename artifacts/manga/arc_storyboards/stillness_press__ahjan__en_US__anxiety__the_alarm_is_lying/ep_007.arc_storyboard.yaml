  visual_proof: Close on the kettle mid-steam in warm Monday light, the untouched succulent on the sill,
    no figure yet in frame.
  information_delta: Reader recognizes the returning ritual object (kettle, succulent) and registers its
    pace as subtly quickened versus prior episodes.
  beat_role: pre_trigger_ritual
  action_intensity: 0
  silence: true
  dialogue_allowed: false
