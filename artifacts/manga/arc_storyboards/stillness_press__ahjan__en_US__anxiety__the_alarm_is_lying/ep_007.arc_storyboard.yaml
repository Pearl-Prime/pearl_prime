page_turn_promises:
- page_id: ep_007_p01
  promise: Will Mira make it out the door before four minutes late becomes a bigger problem, or does the
    rushed ritual already carry a cost the practice can't cover?
- page_id: ep_007_p02
  promise: Once the spiral catches her on the subway, does the practice actually hold this time, or does
    Monday prove the alarm just keeps firing regardless?
notes: Backfill per docs/agent_prompt_packs/manga_arc_storyboard_planner.md mandatory sequence, matching
