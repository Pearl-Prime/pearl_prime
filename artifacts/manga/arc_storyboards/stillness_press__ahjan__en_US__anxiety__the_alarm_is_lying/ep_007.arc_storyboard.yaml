  visual_proof: Wider kitchen counter shot — cream sweater, jacket on a chair, hair clipped back quickly,
    tea pouring into a travel mug, wall clock reading 8:14 AM.
  information_delta: Reader learns the exact time pressure driving the episode (four minutes late) and
    that the ritual is being rushed, not skipped.
