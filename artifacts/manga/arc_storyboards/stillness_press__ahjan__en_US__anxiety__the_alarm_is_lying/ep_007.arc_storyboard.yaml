  story_function: pendulation_ground_return
  story_move: Mid-elevator-ride, Mira's hand goes briefly to the pendant and her shoulders settle half a
    degree — the practice fires on its own, even while she is still in motion toward the day.
  visual_proof: Tight framing on Mira's chest and hand at the pendant, a slow exhale visible in the shoulders
