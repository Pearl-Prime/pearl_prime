title: 'The Alarm Is Lying — Episode 7: Monday, 8:14 AM'
logline: A four-minutes-late morning and an unanswered Friday-night work email launch Mira's subway commute
  into a catastrophizing spiral that the practice only partly catches, proving the alarm is a returning,
  not a cure.
stakes_now: Mira is already running late and carrying an unanswered Friday-night email; her nervous system
  is primed to read the ordinary commute itself as something to manage.
stakes_end: The practice does not stop the spiral from firing twice in one morning — it only lets Mira catch
  herself, late and imperfectly, and land back at her desk still mid-process, not fixed.
