  story_function: activation_trigger_time_pressure
  story_move: Mira moves quickly down the apartment hallway toward the elevator, a visible pace contrast
    to prior calm-Saturday episodes, with the jade pendant now bouncing rather than resting still.
  visual_proof: Wide hallway shot of Mira walking briskly toward the elevator, jade pendant bouncing at
