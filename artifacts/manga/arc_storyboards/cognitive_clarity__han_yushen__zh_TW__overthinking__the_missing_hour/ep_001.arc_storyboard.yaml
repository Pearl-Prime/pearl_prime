series_id: cognitive_clarity__han_yushen__zh_TW__overthinking__the_missing_hour
chapter_id: ep_001
genre_id: psychological_thriller
title: "不在場證明——第一話：那張發票（English gloss: Alibi — Episode 1: The Receipt）"
logline: A risk-control analyst who audits other people's anomalies for a living finds an ibon receipt in her
  own bag for an hour she is certain she did not live, and turns her own night into a case file until a
  colleague who reads bodies instead of reports teaches her, wordlessly, that some files can stay open.
stakes_now: Zhiwei's whole professional identity rests on trusting her own read of a timeline; a receipt that
  contradicts her own memory is the one anomaly her method cannot safely flag and close.
stakes_end: The missing hour is still unexplained and Zhiwei has not solved it — she has only proven, once,
  that she can let a file stay open overnight without it costing her the version of herself she is trying to
  protect.
