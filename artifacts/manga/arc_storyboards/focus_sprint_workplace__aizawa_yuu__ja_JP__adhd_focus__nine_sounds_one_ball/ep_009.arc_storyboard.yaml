title: '「静寂のフリースロー」 第9話「既読、それだけ」'
title_en_gloss: 'Nine Sounds, One Ball — Episode 9: Read, Not Answered'
logline: The morning after Shinonome's first qualifier loss, the team's LINE
  group chat stays conspicuously silent, and that silence turns out to say
  more than any message would have — until Hayato overhears, in person, the
  doubt the chat never typed out loud.
stakes_now: The loss in ep_007 was unmistakably Hayato's mistake, in front of
  the whole gym and now the whole team's group chat, which has gone quiet for
  the first time anyone can remember.
stakes_end: Nothing is resolved. Aya has defended Hayato's spot out loud, but
  no one seconded her, and Hayato now knows exactly what his teammates are
  privately unsure of. He stays behind alone, still unresolved, with the same
  silence waiting in his pocket.
