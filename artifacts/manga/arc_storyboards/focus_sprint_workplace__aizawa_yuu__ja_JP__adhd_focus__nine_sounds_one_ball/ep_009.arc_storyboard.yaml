notes: |
  Episode 9 of 12 — arc 1's post-loss fallout beat per the series bible's
  per-episode assignment and the catalyst 'the_group_chat_gone_quiet' in
  story_architecture_handoff.json. Deliberately does not resolve the team
  friction — Aya's defense of Hayato lands but is not seconded by anyone,
  and Hayato ends the episode alone with the same unanswered silence in his
  pocket. Introduces one new minor character, Matsuo Yousuke, specifically
  so the overheard doubt is plural (per bible: "doubt from teammates"), not
  a single antagonist line from Endou alone. Kuroda remains fully wordless
  this episode, consistent with his established silence pattern in
  ep_002/ep_003 — his first real language lands in ep_010, not here.
  scripts/ci/check_manga_arc_storyboard.py does not exist in this repo
  checkout; this file was authored to the established shape anyway per the
  brief, and that gate was not run.
