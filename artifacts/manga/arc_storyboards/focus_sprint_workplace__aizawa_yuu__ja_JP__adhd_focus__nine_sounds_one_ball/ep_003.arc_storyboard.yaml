notes: Episode 3 of 12, arc 1's first Kuroda beat per ASSIGNMENT_MATRIX.tsv.
  Authored from the bible's beat description and the story_architecture_handoff
  catalyst (the_shoe_locker_left_open); ep_002 was not present on disk at
  authoring time, so continuity assumes ep_002's beat description only (near-quit
  after a botched first practice). Kuroda's spoken dialogue is capped at exactly
  one line, two words, per the arc doctrine against the mentor explaining the
  lesson aloud. scripts/ci/check_manga_arc_storyboard.py does not exist in this
  checkout; this file is written to the required shape for continuity but was not
  gated against that script.
