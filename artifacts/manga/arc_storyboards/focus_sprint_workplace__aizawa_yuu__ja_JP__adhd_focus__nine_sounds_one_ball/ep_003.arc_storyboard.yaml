series_id: focus_sprint_workplace__aizawa_yuu__ja_JP__adhd_focus__nine_sounds_one_ball
chapter_id: ep_003
genre_id: sports_competition
title: '静寂のフリースロー——第3話「忘れ物」'
logline: Returning alone after hours under the excuse of forgotten shoes, Hayato
  finds Kuroda already in the gym, and receives not a lecture but a single
  wordless demonstration at the free-throw line.
stakes_now: Hayato has only ever seen Kuroda as background texture, sweeping and
  racking balls; after nearly quitting before ep_002's practice was even over, this
  is the first time he is alone with the team's silent gatekeeper, with no
  teammates around to absorb the awkwardness.
stakes_end: Nothing is fixed and no lesson is spoken aloud. Hayato has watched one
  deliberate bounce and one clean release, been given exactly two words by a man
  who otherwise says nothing, and made one small private choice afterward, to
  leave his shoes by the door instead of hiding them in a drawer.
genre_cadence:
