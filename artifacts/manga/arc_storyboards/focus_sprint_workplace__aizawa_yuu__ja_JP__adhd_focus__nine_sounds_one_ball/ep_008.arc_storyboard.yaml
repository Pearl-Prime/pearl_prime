notes: |
  Freshly authored as arc 1's rival-introduction episode (ep_008 of 12),
  following directly from ep_007's first qualifier loss. No match is played
  this chapter — it is a pure scouting/observation beat, deliberately quiet
  after ep_007's crowd-and-scoreboard overload. Introduces Kiryuu Ren as a
  mirror-rival (control without feeling vs. Hayato's feeling without control)
  per the sports_competition craft bible's rival-humanization requirement;
  the required single humanizing beat (panels 15-17) is delivered entirely
  through gesture and a supporting character's aside, never through Ren's
  own interior monologue. Follows the same storyboard-first sequence used
  for the stillness_press ep_001-012 backfill. NOTE per repo state at time
  of authoring: scripts/ci/check_manga_arc_storyboard.py does not exist in
  this checkout and could not be run against this file; the file is written
  to the established shape (matching
  stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_011.arc_storyboard.yaml)
  for continuity and future-proofing regardless.
