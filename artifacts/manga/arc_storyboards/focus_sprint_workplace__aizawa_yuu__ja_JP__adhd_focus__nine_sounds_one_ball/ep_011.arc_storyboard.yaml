notes: Freshly authored as arc 1's live-game carrier-beat episode for strategy_01 ("The
  One Ball at the Line"). The carrier beat (panels 016-017) is deliberately isolated
  from the shot's outcome (018-020) and further isolated from the game's actual result,
  which is handed to Endou's defensive stop (022-024), not to any basket of Hayato's —
  per the strategy bank's anti_pattern_rules, the psychological turn must land before
  and independent of the scoreboard. scripts/ci/check_manga_arc_storyboard.py does not
  exist in this checkout (known gap per bible); this file is authored to the
  stillness_press ep_011 template shape for continuity regardless.
