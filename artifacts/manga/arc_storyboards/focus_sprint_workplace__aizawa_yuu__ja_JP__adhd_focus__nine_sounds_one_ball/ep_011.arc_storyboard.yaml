page_turn_promises:
- page_id: ep_011_p01
  promise: Can Hayato even hear his own routine underneath a crowd this size, in front
    of the team that broke his season the first time?
- page_id: ep_011_p02
  promise: Does forcing the noise to stop work any better the second time, or does
    something else have to give first?
- page_id: ep_011_p03
  promise: Does the stillness at the line actually survive contact with the shot — and
    does the game's outcome even wait for the answer?
- page_id: ep_011_p04
  promise: What does Hayato do with a win that no one is asking him to prove anything with?
panels:
- panel_id: ep011_001
  page_id: ep_011_p01
  story_function: pre_trigger_scale
  story_move: Establishes the tied score, the clock, and the largest, most public crowd
    of the tournament before any character acts.
  visual_proof: Wide gymnasium shot — scoreboard tied 58-58, clock at 0:47, stands packed
    beyond capacity, a hand-lettered Shinonome coworkers' banner visible in the crowd.
  information_delta: Reader confirms this is the biggest, most exposed stage the series
    has staged a game on so far.
  beat_role: pre_trigger_calm
  action_intensity: 0
  silence: false
  dialogue_allowed: false
- panel_id: ep011_002
  page_id: ep_011_p01
  story_function: foul_call_trigger
  story_move: Hayato is fouled driving to the basket; the whistle stops the clock and
    the ball rolls to a stop at his feet, the one static object in a suddenly frozen
    gym.
  visual_proof: Contact on the drive, whistle, referee's shooting-foul signal, the
    basketball settling alone on the hardwood.
  information_delta: Reader learns the exact mechanic that sends Hayato to the line —
    a shooting foul, not a set play.
  beat_role: trigger_onset
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep011_003
  page_id: ep_011_p01
  story_function: crowd_noise_arrival
  story_move: The crowd's reaction arrives as a wall of sound the instant the whistle
    lands, establishing the noise the free throw will have to be attempted inside.
  visual_proof: Crowd surge from both fanbases, protest and relief overlapping, no
    single voice distinguishable.
  information_delta: Reader feels the scale of noise Hayato is about to walk into
    before he takes a single step toward the line.
  beat_role: somatic_onset
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep011_004
  page_id: ep_011_p01
  story_function: memory_light_flicker
  story_move: An unnarrated, purely visual flicker of the high-school turnover intrudes
    for a single beat — same angle of gym light, no caption, no explanation — then is
    gone.
  visual_proof: A half-panel bleed of remembered gym light at the same angle as the
    present gym, gone the instant it appears.
  information_delta: Reader connects this line to the series' founding wound without
    a single word of narration doing it for them.
  beat_role: memory_intrusion
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep011_005
  page_id: ep_011_p01
  story_function: rival_taunt_at_the_line
  story_move: Daiei Bussan's captain, Miura, needles Hayato quietly at the lane line,
    naming the exact failure everyone in the building already knows about.
  visual_proof: Miura close beside the lane, low voice, eyes forward — a rival's
    pressure applied without raising his voice.
  information_delta: Reader learns the opposing team knows Hayato's history and is
    using it on purpose.
  beat_role: rival_pressure
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep011_006
  page_id: ep_011_p01
  story_function: line_overload_scan
  story_move: At the line, Hayato's eyes dart across every competing input at once —
    scoreboard, banner, ball, crowd — while his interior voice names the overload
    honestly.
  visual_proof: Tight face shot, eyes cutting between scoreboard, crowd sign, and the
    ball held out by the referee.
  information_delta: Reader gets the episode's clearest statement of the flaw in
    Hayato's own words, before any attempt to fix it.
  beat_role: interior_focus
  action_intensity: 2
  silence: false
  dialogue_allowed: true
- panel_id: ep011_007
  page_id: ep_011_p01
  story_function: first_shot_count_lost
  story_move: The bounce routine that should be automatic goes slippery under
    pressure — Hayato loses count mid-dribble.
  visual_proof: Close on the dribble, uncertain rhythm, two bounces bleeding toward a
    third that may or may not belong.
  information_delta: Reader sees the trained routine itself destabilize, not just
    Hayato's mood.
  beat_role: interior_focus
  action_intensity: 2
  silence: true
  dialogue_allowed: false
- panel_id: ep011_008
  page_id: ep_011_p02
  story_function: first_shot_forced_miss
  story_move: The rushed shot clangs off the front iron — a real, earned miss, not a
    near thing.
  visual_proof: Ball striking the front rim hard, bouncing away, no ambiguity about
    whether it was close.
  information_delta: Reader confirms the practice fails honestly under public pressure,
    consistent with the series' no-cure stance.
  beat_role: forced_miss
  action_intensity: 3
  silence: false
  dialogue_allowed: false
- panel_id: ep011_009
  page_id: ep_011_p02
  story_function: team_reaction_practical_call
  story_move: Endou's face tightens; Aya calls out a short, practical line from the
    bench rather than a locker-room speech.
  visual_proof: Endou's reaction, Aya leaning forward at the sideline, voice pitched to
    carry over the crowd.
  information_delta: Reader sees the team respond with tactical shorthand, not
    moralizing — captain register per the genre's dialogue rules.
  beat_role: team_response
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep011_010
  page_id: ep_011_p02
  story_function: private_object_established
  story_move: Hayato's fingers find the folded conbini receipt tucked inside his
    wristband — the private object carried since ep_010, unseen by anyone in the
    building.
  visual_proof: Close on fingers at the wristband, a small folded paper edge just
    visible, nothing else in frame acknowledging it.
  information_delta: Reader learns the ep_010 lesson has become a private, physical
    habit rather than a stated belief.
  beat_role: anchor_established
  action_intensity: 0
  silence: false
  dialogue_allowed: false
- panel_id: ep011_011
  page_id: ep_011_p02
  story_function: forcing_attempt_fails
  story_move: On the second shot, Hayato tries to will the crowd silent by sheer
    tension — and it does not work.
  visual_proof: Jaw clenched, shoulders locked, a body straining against noise instead
    of releasing.
  information_delta: Reader sees the failed strategy (force) before the real one
    (choice) — required beat per the strategy bank's non-carrier step.
  beat_role: forcing_fails
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep011_012
  page_id: ep_011_p02
  story_function: noise_amplifies_under_force
  story_move: The harder Hayato fights the noise, the more crowded and chaotic it
    reads on the page.
  visual_proof: Crowd/signage/phone-flash chaos intensifying around a static figure at
    the line.
  information_delta: Reader feels the trap of the forcing strategy — fighting the roar
    is one more task layered onto an already full attention.
  beat_role: noise_escalation
  action_intensity: 3
  silence: true
  dialogue_allowed: false
- panel_id: ep011_013
  page_id: ep_011_p02
  story_function: private_object_recalled
  story_move: His fingers find the receipt's fold again, this time on purpose. The jaw
    unclenches.
  visual_proof: Close on fingers deliberately returning to the wristband; shoulders
    dropping a fraction.
  information_delta: Reader sees the private object used consciously as an anchor,
    not a nervous tic.
  beat_role: anchor_recalled
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep011_014
  page_id: ep_011_p02
  story_function: narrowing_to_the_ball
  story_move: Hayato lowers his eyes from the rim and the crowd to the one object left
