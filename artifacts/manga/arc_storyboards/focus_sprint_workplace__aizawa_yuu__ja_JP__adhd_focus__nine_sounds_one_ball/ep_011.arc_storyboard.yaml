  beat_role: one_bounce
  action_intensity: 1
  silence: true
  dialogue_allowed: false
- panel_id: ep011_016
  page_id: ep_011_p03
  story_function: held_stillness_carrier
  story_move: THE CARRIER BEAT. A silent, extreme-close panel on both hands and the
    ball only — clock, crowd, and scoreboard are excluded from the frame entirely.
  visual_proof: Macro close on hands and ball, empty of all other visual information.
  information_delta: Reader receives the episode's actual psychological turn here —
    before the shot, independent of its outcome.
  beat_role: carrier_stillness
  action_intensity: 0
  silence: true
  dialogue_allowed: false
- panel_id: ep011_017
  page_id: ep_011_p03
  story_function: held_stillness_breath
  story_move: The held beat extends one panel further — a single slow exhale, the
    crowd noise present but distant rather than gone.
  visual_proof: Same macro framing, a breath visibly leaving him, no other change.
  information_delta: Reader confirms the noise was never silenced, only relocated
