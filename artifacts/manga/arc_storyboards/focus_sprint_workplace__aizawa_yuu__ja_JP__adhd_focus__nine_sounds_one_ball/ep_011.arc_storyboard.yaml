  information_delta: Reader sees the technique generalize into live play, not just
    hold for one static shot.
  beat_role: flow_anchored
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep011_022
  page_id: ep_011_p03
  story_function: possession_transferred_to_team
  story_move: With twelve seconds left, the ball is deliberately not in Hayato's
    hands — the deciding possession belongs to the team, not to him.
  visual_proof: Daiei Bussan working the ball to Miura; Shinonome's zone set, Hayato
    positioned off the ball.
  information_delta: Reader registers that the game's outcome is structurally
    separated from Hayato's own stillness beat.
  beat_role: possession_transfer
  action_intensity: 2
  silence: false
  dialogue_allowed: false
- panel_id: ep011_023
  page_id: ep_011_p03
  story_function: teammate_physical_cost
  story_move: Endou, legs nearly spent after a full fourth quarter, plants his body in
    front of the shot anyway.
  visual_proof: Endou's strained stance, sweat, a short gruff call for the ball.
  information_delta: Reader sees visible physical cost on a teammate, keeping the
    climax a team-sport event rather than a solo one.
  beat_role: physical_cost
  action_intensity: 3
  silence: false
  dialogue_allowed: true
- panel_id: ep011_024
  page_id: ep_011_p04
  story_function: decisive_stop
  story_move: Miura's shot deflects off Endou's contest into a loose ball; Endou dives
    and secures it as the horn sounds. The game is decided by a stop, not a basket.
  visual_proof: Contested shot, deflection, floor scramble, horn sounding over the
    scrum.
  information_delta: Reader sees the actual game-deciding action credited to a
    teammate's defense, not to any shot at all.
  beat_role: decisive_stop
  action_intensity: 4
  silence: false
  dialogue_allowed: false
- panel_id: ep011_025
  page_id: ep_011_p04
  story_function: narrow_final_score
  story_move: Final score 59-58. No one has the breath left to celebrate; the margin
    is as narrow as the game allows.
  visual_proof: Scoreboard held on 59-58; players bent over, hands on knees, one
    sitting on the floor.
  information_delta: Reader confirms the win is narrow and physically costly, not a
    clean or triumphant sweep.
  beat_role: narrow_score
  action_intensity: 1
  silence: false
  dialogue_allowed: false
- panel_id: ep011_026
  page_id: ep_011_p04
  story_function: handshake_line
  story_move: A near-wordless handshake line between both exhausted teams.
  visual_proof: Handshake line, minimal eye contact exchanged, both benches visibly
    spent.
  information_delta: Reader gets the genre's post-game silence beat before any
    dialogue resumes.
  beat_role: aftermath_wordless
  action_intensity: 0
  silence: true
  dialogue_allowed: false
- panel_id: ep011_027
  page_id: ep_011_p04
  story_function: rival_quiet_witness
  story_move: In the thinning stands, Kiryuu Ren stands alone, arms crossed, watching.
    Only Hayato notices him for a single beat.
  visual_proof: Kiryuu isolated in a background row of the emptying gym, unaddressed by
    anyone.
  information_delta: Reader receives a seed for ep_012's next-opponent reveal without
    the episode naming or resolving it.
  beat_role: rival_seed
  action_intensity: 0
  silence: false
  dialogue_allowed: false
- panel_id: ep011_028
  page_id: ep_011_p04
  story_function: private_object_closing
  story_move: Alone at the bench, Hayato checks the receipt once, confirms it, and
    tucks it back — a private, repeated gesture, not a triumphant one.
  visual_proof: Close on the receipt drawn briefly from the wristband and returned,
    no one else in frame.
  information_delta: Reader sees the private object closed out as habit, not as a
    trophy or a lesson stated aloud.
  beat_role: anchor_closing
  action_intensity: 0
  silence: true
  dialogue_allowed: false
- panel_id: ep011_029
  page_id: ep_011_p04
  story_function: honest_landing_image
  story_move: Closing wide on the emptying gym — a single ball left near the bench,
    the scoreboard still lit on the narrow final score.
  visual_proof: Wide shot, emptying stands, one basketball on the floor, scoreboard
    still reading 59-58.
  information_delta: Reader receives the episode's closing image — the score changed,
    the object in his hands did not — without a stated moral.
  beat_role: honest_landing
  action_intensity: 0
  silence: false
  dialogue_allowed: false
