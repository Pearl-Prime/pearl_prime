title: "Nine Sounds, One Ball — Episode 11: The Thing Beneath the Sound (English gloss)"
logline: In the loser's-bracket rematch against the exact team that ended their first
  qualifier, Hayato is fouled with the score tied and seconds left — and finds, at the
  line, not a way to silence the noise, but the one thing worth hearing inside it.
stakes_now: Shinonome has been pushed to the loser's bracket by the team that beat them
  once already; Hayato has never had to hold Kuroda's wordless technique under a crowd
  this large, this loud, or this personally loaded, with the opposing captain needling
  him about the exact play that ended his season before.
stakes_end: The team survives by a single point, decided by a defensive stop that belongs
  to Endou, not Hayato. The free throw that actually mattered was never about whether it
  dropped — the stillness at the line landed before the shot and stays true regardless of
  the final score, which proves nothing about whether Hayato is fixed.
