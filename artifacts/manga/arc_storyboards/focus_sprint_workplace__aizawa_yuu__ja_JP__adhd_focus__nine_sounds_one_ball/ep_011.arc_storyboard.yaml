  beat_role: carrier_stillness
  action_intensity: 0
  silence: true
  dialogue_allowed: false
- panel_id: ep011_018
  page_id: ep_011_p03
  story_function: clean_release_form
  story_move: The shooting form itself — wrist and follow-through only, no anticipation
