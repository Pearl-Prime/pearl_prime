  beat_role: narrowing
  action_intensity: 1
  silence: false
  dialogue_allowed: true
- panel_id: ep011_015
  page_id: ep_011_p02
  story_function: one_deliberate_bounce
  story_move: One clean, deliberate bounce — the device Kuroda taught wordlessly back
    in ep_003, now self-administered.
  visual_proof: Isolated close on ball-to-floor contact, sound rendered alone on the
    page.
  information_delta: Reader connects this bounce directly to the ep_003 wordless
