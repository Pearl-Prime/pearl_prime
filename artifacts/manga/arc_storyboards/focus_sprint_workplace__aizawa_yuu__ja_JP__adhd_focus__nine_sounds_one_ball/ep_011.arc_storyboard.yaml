  beat_role: result_understated
  action_intensity: 1
  silence: false
  dialogue_allowed: false
- panel_id: ep011_021
  page_id: ep_011_p03
  story_function: flow_resumed_anchored
  story_move: Play resumes at full crowd volume; Hayato moves through pass, slide, and
