  information_delta: Reader sees the physical proof of the stillness beat in the
    body's mechanics, not in narration.
  beat_role: release_form
  action_intensity: 2
  silence: true
  dialogue_allowed: false
- panel_id: ep011_019
  page_id: ep_011_p03
  story_function: arc_of_the_shot
  story_move: A brief, undramatized panel of the ball's arc — deliberately small, not
    lingered on.
  visual_proof: Small inset panel, ball mid-flight, minimal SFX.
  information_delta: Reader is denied a lingering triumphant arc shot on purpose — the
