  beat_role: shot_arc
  action_intensity: 2
  silence: true
  dialogue_allowed: false
- panel_id: ep011_020
  page_id: ep_011_p03
  story_function: understated_result
  story_move: The shot drops; Hayato is already turning toward defense before it
    finishes falling — the make is real but deliberately not celebrated.
  visual_proof: Net motion, Hayato's body already rotating away from the basket.
  information_delta: Reader sees that his own attention has already moved on from the
