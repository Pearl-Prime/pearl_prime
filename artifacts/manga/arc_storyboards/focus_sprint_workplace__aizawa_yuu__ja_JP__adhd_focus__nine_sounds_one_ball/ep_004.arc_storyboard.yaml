title: '「静寂のフリースロー」 第4話「一つのポゼッション」'
title_en_gloss: 'Nine Sounds, One Ball — Episode 4: One Possession'
logline: During a Saturday three-on-three scrimmage narrated live into the team's
  LINE group chat for the one member who couldn't come, Hayato's early mistakes
  go out to the whole roster in real time before he holds one clean defensive
  possession against Endou and, on the free throw that follows, quietly repeats
  the single bounce Kuroda showed him after hours in ep_003.
stakes_now: Hayato has been publicly humiliated once in front of the team
  (ep_002) and given one silent, wordless lesson by Kuroda in an empty gym
  (ep_003) — but he has never had to test whether any of it holds while people
  are actually watching, keeping score, and typing what they see.
stakes_end: For one defensive possession and one ordinary free throw, the
  lesson holds. Nobody declares a breakthrough — Endou allows three flat words,
  the group chat moves straight on to the final score, and even Hayato cannot
  say whether it will happen again.
