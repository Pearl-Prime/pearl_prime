notes: 'Episode 4 of 12, arc 1 ("recruit" phase), authored per the series bible''s
  beat assignment: the first small, modest win in a scrimmage. Uses catalyst
  "the_scrimmage_score_in_the_group_chat" from story_architecture_handoff.json
  chapter_number 4 verbatim. Continuity: assumes ep_003''s wordless free-throw
  bounce lesson from Kuroda (per the assignment brief''s continuity note; ep_003
  may not exist on disk yet from a parallel agent) and pays it off in miniature
  at panel 23 — a single, unexplained, unwitnessed echo of the same gesture,
  reached organically through a foul drawn off the episode''s real carrier beat
  (the defensive stop at panel 20). Per
  config/source_of_truth/manga_story_strategies/sports_competition_strategies.yaml
  anti_pattern_rules, no character narrates or names the psychology at any
  point — Aya''s panel 27 observation stays strictly concrete (where he was
  looking), Endou''s panel 25 line is three words, and Kuroda never speaks this
  episode at all. The win is deliberately scaled down per the assignment: one
  defensive stop plus one ordinary free throw, no scoreboard resolution, no
  team celebration, immediate honest uncertainty from Hayato himself in panel
  28. NOTE: scripts/ci/check_manga_arc_storyboard.py does not exist in this
  repo checkout and could not be run against this file; it was authored to
  this established shape anyway for continuity with the storyboard-first
  sequence (see stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_011.arc_storyboard.yaml
  and this series'' own ep_002.arc_storyboard.yaml / ep_006.arc_storyboard.yaml).'
