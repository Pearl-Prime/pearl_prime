series_id: focus_sprint_workplace__aizawa_yuu__ja_JP__adhd_focus__nine_sounds_one_ball
chapter_id: ep_001
genre_id: sports_competition
title: '「静寂のフリースロー」 第1話「屋上のシュート」'
logline: A suffocating strategy meeting sends new-hire Hayato fleeing to his
  company's rooftop break area, where a stray basketball and a wordless
  flashback to his high-school turnover collide — and a senpai he has never
  spoken to watches his one instinctive shot land clean.
stakes_now: Hayato has no team, no roster spot, and has not touched a
  basketball competitively since the turnover that ended his high-school
  career — the only proof his body still remembers the game is about to
  happen entirely by accident, unwitnessed until it isn't.
stakes_end: Hayato has been seen — one clean shot, one open invitation from
  Aya to "just come look" at practice — and has answered with neither a yes
  nor a no.
genre_cadence:
- cold_open_body_before_mind
- commuter_tell_established
- threshold_and_anchor
- meeting_pressure_established
- notebook_scatter_object
- attention_fragments
