chapter_script_ref: artifacts/manga/chapter_scripts/focus_sprint_workplace__aizawa_yuu__ja_JP__adhd_focus__nine_sounds_one_ball/ep_001.yaml
notes: 'Episode 1 of 12, arc 1 ("recruit" phase). Per the assignment matrix''s
  beat purpose for ep_001: establishes Hayato''s flaw via a brief, wordless
  visual flashback fragment to the high-school turnover (panels 15-17), has
  Aya witness his one instinctive rooftop shot (panels 19-24), and ends on
  her invitation to "just come look" at practice — not on acceptance (panels
  27-30). Per the sports_competition craft bible and the anti-pattern rules
  in config/source_of_truth/manga_story_strategies/sports_competition_strategies.yaml,
  no character narrates or explains the psychology at any point; the flaw and
  its cost are carried entirely by objects (the meeting notebook, the desk
  drawer with the old sneakers, the netless rooftop rim) and by the eyes-dart
  device that recurs unmodified from the flashback into the present. The
  desk-drawer sneakers (panel 4) are a deliberate continuity plant for
  ep_002''s already-authored cold open (its sneakers are "actually on his
  feet" — meaning this episode must NOT show him accepting or lacing them).
  NOTE: scripts/ci/check_manga_arc_storyboard.py does not exist in this repo
  checkout and could not be run against this file; it was authored to this
  established shape anyway for continuity with the storyboard-first sequence
  (see stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_011.arc_storyboard.yaml
  and this series'' own ep_002.arc_storyboard.yaml, which already exists on
  disk and was read in full before writing this file for cast/continuity
  precedent — the Japanese series title 「静寂のフリースロー」 used here is
  carried over verbatim from that file, not invented independently).'
