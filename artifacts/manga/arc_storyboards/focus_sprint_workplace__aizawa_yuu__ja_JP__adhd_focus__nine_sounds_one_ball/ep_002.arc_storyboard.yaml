notes: 'Episode 2 of 12, arc 1 ("recruit" phase). Follows ep_001''s rooftop
  invitation with Hayato''s actual first practice. Per the sports_competition
  craft bible and the anti-pattern rules in
  config/source_of_truth/manga_story_strategies/sports_competition_strategies.yaml,
  Kuroda stays silent and background-only this episode (his wordless lesson is
  reserved for ep_003) and no character narrates or explains the overload as
  psychology — it is rendered through overlapping drills, a mistimed play
  call, a turnover, and a blank roster pinny. Ends on the beat the bible
  specifies: Hayato nearly quitting before he has started, unresolved. NOTE:
  scripts/ci/check_manga_arc_storyboard.py does not exist in this repo
  checkout and could not be run against this file; it was authored to this
  established shape anyway for continuity with the storyboard-first sequence
  (see stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_011.arc_storyboard.yaml).
  ep_001 for this series has not yet landed on disk at authoring time (parallel
  agent); this episode was written directly from the series bible''s beat
  description per the assignment instructions.'
