title: 'Nine Sounds, One Ball — Episode 12: Two Deadlines'
logline: Shinonome advances by the narrowest possible margin, and the same evening
  reveals two collisions at once -- an undefeated rival now waiting in the bracket,
  and a probation review now confirmed on Hayato's own calendar.
stakes_now: The team has just won a decisive rematch by two points; nothing about
  the season's precariousness -- Hayato's spot on the team, the club's underdog
  status, his own workplace probation -- has actually been resolved by that win.
stakes_end: The bracket names an undefeated defending champion (Kiryuu Pharma) as
  the team's next opponent, Hayato's job-probation review is now dated exactly one
  week out, and he chooses to stand alone at the free-throw line without shooting
  -- arc one closes on two live countdowns, not a victory.
