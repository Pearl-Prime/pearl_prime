notes: Freshly authored as arc 1's closing episode (ep_012 of 12), following the
  bible's exact beat assignment -- narrowest-margin advancement, bracket reveal of
  an undefeated Kiryuu Pharma (reusing the ep_008 rival rather than a fresh
  opponent), same-evening probation-review notification, and a closing empty-gym
  stillness beat that explicitly withholds a replayed free-throw shot. This is a
  TURN into arc 2 (the "losing streak" phase per ASSIGNMENT_MATRIX.tsv
  arc_shape_hint), not a resolution; both the tournament and job countdowns are
  still live when the episode ends. scripts/ci/check_manga_arc_storyboard.py does
  not exist in this repo checkout and was not run, per the bible's noted gap; this
  file was still authored to the established storyboard-first shape for
  continuity with the stillness_press ep_011/ep_012 template.
