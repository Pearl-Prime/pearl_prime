title: '静寂のフリースロー——第六話:締め切りは待たない'
title_en_gloss: 'Nine Sounds, One Ball — Episode 6: The Deadline Won''t Wait'
logline: The Tokyo Corporate League qualifier entry form is due Friday at five with
  a minimum-roster requirement Shinonome barely meets, and the same trading-company
  bureaucracy Hayato fights all day at his desk turns out to be the thing that
  could end the team before its first game.
stakes_now: The team has quietly operated as a loose, half-practiced group of
  seven since ep_005; nobody has formally registered for anything, and Hayato has
  never signed his name to the club as more than a guest.
stakes_end: The entry form is filed with minutes to spare at the exact legal
  minimum of eight registered players — Hayato's name now permanently on the
  roster — but Endou's flat warning makes clear that barely qualifying is not
  the same as being ready, and the fragile margin (zero backups, one jammed fax
  machine from disaster) is now the team's whole season resting on paper.
