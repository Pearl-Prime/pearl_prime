notes: Episode 6 of 12 — arc 1's tournament-entry beat per the series bible's
  per-episode assignment. Escalates team-wide stakes for the first time via a
  concrete, workplace-textured bureaucratic obstacle (roster minimum, company
  seal, fax deadline) rather than narrative flavor, per the catalyst
  'the_tournament_entry_form_deadline' in story_architecture_handoff.json. Does
  not touch the 'One Ball at the Line' focus-strategy carrier beats directly
  (those are seeded across ep_003/ep_010/ep_011); this episode's job is plot
  escalation and Hayato's formal roster commitment, with the team's own
  attention-scatter under pressure (panel 18) used as a light structural echo
  of the ADHD engine rather than the carrier beat itself.
  scripts/ci/check_manga_arc_storyboard.py does not exist in this repo
  checkout — this file was authored to the established shape anyway per the
  brief, and that gate was not run.
