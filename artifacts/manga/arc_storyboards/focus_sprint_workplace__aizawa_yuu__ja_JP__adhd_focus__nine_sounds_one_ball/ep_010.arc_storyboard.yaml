title: '22:14 — Episode 10'
logline: After a practice thinned by lingering doubt, Kuroda breaks nine episodes
  of gym-only silence to take Hayato to a conbini, where a receipt timestamped
  22:14 becomes the object that finally carries the lesson he has never once
  said aloud.
stakes_now: Hayato's free-throw ritual is still unreliable under pressure, and
  the team's post-loss doubt from ep_009 remains unresolved and unspoken
  between him and Kuroda.
stakes_end: Nothing about the team's doubt or the tournament gets resolved by
  the conversation; Hayato leaves with only a folded receipt and, for the
  first time, re-performs the gesture himself, unprompted.
