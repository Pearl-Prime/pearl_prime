title: '静寂のフリースロー——第七話「九つの音」'
logline: In Shinonome's first qualifier match, the gymnasium scoreboard and a
  small but loud rival-company crowd overload Hayato's attention exactly when
  the game is tightest, and the team's first real loss lands on a mistake
  that is unmistakably his.
stakes_now: Shinonome enters its first live qualifier match carrying only the
  paper-thin eight-player roster secured under deadline pressure in ep_006 —
  no proof yet that a company recreational team can hold together in a real,
  refereed, spectated game against opponents who play every week.
stakes_end: The team's first qualifier ends in a real, unsoftened loss — a
  turnover and a twisted ankle that are unmistakably Hayato's — dropping
  Shinonome into the tournament's loser's bracket. No cure is offered, no
  lesson is spoken aloud, and the body cost (scraped forearm, taped ankle)
  carries forward into the episodes that follow.
