notes: Episode 7 of 12 — arc 1's first live qualifier match and the arc's real
  sting, per the series bible's per-episode beat assignment. Follows directly
  from ep_006's roster registration under deadline pressure. The team's first
  formal, refereed, spectated game ends in a genuine, unsoftened loss on a
  turnover that is unmistakably Hayato's — a double-team he never sees because
  his narrowed attention has locked onto the scoreboard clock instead of the
  floor, an ironic pre-echo of the "one ball at the line" technique he has not
  yet been taught (paced to land properly in ep_010/ep_011 per the throughline).
  Kuroda does not appear in this episode — the away venue is outside his
  established domain (company-building facilities caretaker, not a traveling
  coach) — keeping the vessel silent by absence rather than staged restraint
  this time. The loss produces the physical continuity objects (a scraped
  forearm, a wrong-angle ankle plant) that ep_008 and ep_009 both reference as
  carried-forward body cost, and drops the team into the loser's-bracket path
  ep_008 opens on. scripts/ci/check_manga_arc_storyboard.py does not exist in
  this repo checkout and could not be run against this file; it was still
  authored to the established shape for continuity and future-proofing, per
  the dispatch brief.
