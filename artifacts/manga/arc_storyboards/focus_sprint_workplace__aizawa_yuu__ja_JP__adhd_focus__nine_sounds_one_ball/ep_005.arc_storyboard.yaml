  promise: Will the small, hard-won win from last episode survive now that
    something else wants the same attention it took him nine episodes to
    build?
- page_id: ep_005_p02
  promise: Which identity does he choose when both are asking for him inside
    the same ten seconds — and who else in the room already knows exactly
    what that costs?
- page_id: ep_005_p03
  promise: Even after the gym choice is made, does anything at the office
    actually get easier — or does he just carry both bags out the door at
    once?
