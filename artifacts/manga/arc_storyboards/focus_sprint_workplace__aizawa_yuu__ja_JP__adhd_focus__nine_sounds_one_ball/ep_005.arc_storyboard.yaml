title: '静寂のフリースロー — 第5話: 鳴るのはボールだけじゃない'
title_en_gloss: 'The Silence at the Line — Episode 5: It''s Not Just the Ball That Rings'
logline: A section chief's overtime-request notification lights Hayato's forgotten
  phone mid free-throw drill, and for the first time his two lives don't just
  coexist after hours — they physically collide inside the same rep, in front of
  the one teammate who already knows exactly what's lit up on that screen.
stakes_now: Hayato has only ever had to hold his attention against gym noise —
  the whistle, the play call, the group chat narrating a scrimmage. Tonight the
  noise is his own probationary job, arriving uninvited inside the one place
  that had started to feel separate from it.
stakes_end: Nothing at work is resolved — the estimate is still unfinished, the
  deadline still live, the overtime form still unsubmitted — but for one rep he
  chose the ball over the phone. Aya's composed reply back to him carries the
  first visible crack of a doubt entirely her own, about whether a team nobody
  quite respects is real enough to matter.
