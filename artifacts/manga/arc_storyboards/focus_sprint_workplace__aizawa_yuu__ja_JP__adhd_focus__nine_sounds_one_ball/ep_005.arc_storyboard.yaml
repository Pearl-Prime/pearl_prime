notes: 'Episode 5 of 12, arc 1 (recruit phase). Assumes ep_004''s modest scrimmage
  win as established continuity per the series bible even though ep_001-004 do
  not yet exist on disk in this checkout (parallel-authored); nothing here
  depends on their literal file content, only on the beat description given.
  First episode where the workplace and basketball identities actively collide
  rather than merely coexist after hours — the phone intrudes into gym space,
  and Aya (who alone straddles both contexts as senpai + captain) is the one
  who registers the full weight of it. Seeds two secondary threads per the
  bible: Hayato''s imposter syndrome (panel 013, both jobs) and Aya''s own
  unresolved doubt about the team''s legitimacy (panel 026) — both left
  unresolved on purpose, not this arc''s job to close. No coach lecture, no
  narrated psychology: Kuroda''s entire intervention is placing the phone in
  the same physical row as the balls (panel 019) plus a three-word line
  (panel 020). No scoreboard, no trophy, no buzzer-beater — this is a practice
  rep, not a match, and the made shot in panel 023 is deliberately unglamorous
  per the throughline''s anti-pattern rules. scripts/ci/check_manga_arc_storyboard.py
  and its schema do not exist in this repo checkout and could not be run;
  this file was still authored to the established ep_011 shape for continuity
  with the storyboard-first sequence, per the assignment brief.'
