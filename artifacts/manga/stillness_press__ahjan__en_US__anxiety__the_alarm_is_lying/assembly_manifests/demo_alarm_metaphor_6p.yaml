# Layered-assembly demo manifest — "The Alarm Is Lying" core metaphor scene
# (ep_001 beats 023→032, real Tier-1 script text, real bank layers).
#
# Schema: schemas/manga/assembly_manifest.schema.json
# Assembler: scripts/manga/assemble_from_bank.py
# Spec: MANGA_LAYER_RENDER_CONTRACT_SPEC.md §4 (taxonomy/z-order) + §10 (math)
#
# Provenance summary:
#   REAL    — L0 kitchen plates + L2 Mira cutouts from the committed April
#             v4_render_cache (byte-verified LFS, 1.7–2.3 MB each)
#   INTERIM — L3 kettle + L1 wall-alarm sprites (rembg-cut from REAL
#             composed_v3 panels; proper L3 renders not yet enqueued) and the
#             procedural L4 steam wisp. See *.provenance.json sidecars for
#             the exact pscli replacement commands.
schema_version: "1.0.0"
series_id: stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
episode_id: ep_001
manifest_id: demo_alarm_metaphor_6p
notes: >
  Six-panel proof of deterministic bank assembly: background plates +
  consistency-locked character + scaled/placed object sprites + atmospheric
  overlay + lettering, zero GPU work. Teacher vessel (therapist, never named)
  carried by the real script captions.
canvas:
  width: 1080
  height: 1920
  background_hex: "#FFFFFF"

panels:
  # ── P1: seated at table, therapist memory begins (script beat 023) ──────
  - panel_id: demo_p1_therapist_memory
    archetype: character_at_table_medium
    layers:
      - layer_class: L0
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L0/L0_2b9283d4c387.png
        provenance: REAL
      - layer_class: L1
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/image_bank_sprites/wall_alarm_green_idle_INTERIM.png
        bbox_pct: [64, 7, 14, 8]
        provenance: INTERIM
        provenance_note: rembg isnet cut from REAL composed_v3 ep_001_seg_025; replace via L1 render per object_inventory
      - layer_class: L2
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L2/L2_3210c57437fb_alpha.png
        bbox_pct: [24, 28, 56, 66]
        provenance: REAL
    narrator_caption: "Once, my therapist said something I didn't believe."

  # ── P2: gaze up toward the wall alarm (beat 024) ────────────────────────
  - panel_id: demo_p2_alarm_gaze
    archetype: character_quiet_face
    layers:
      - layer_class: L0
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L0/L0_f3bc5f4cc41f.png
        provenance: REAL
      - layer_class: L1
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/image_bank_sprites/wall_alarm_green_idle_INTERIM.png
        bbox_pct: [18, 5, 20, 11]
        provenance: INTERIM
        provenance_note: same INTERIM sprite, re-placed at a different scale — the bank-reuse demonstration
      - layer_class: L2
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L2/L2_aaaf0385e52e_alpha.png
        bbox_pct: [26, 24, 54, 72]
        provenance: REAL
    narrator_caption: "He said the body's alarm system is older than the body's wisdom."

  # ── P3: kettle macro + steam — the metaphor made visible (beat 026) ─────
  - panel_id: demo_p3_kettle_macro
    archetype: kettle_steam_macro
    layers:
      - layer_class: L0
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L0/L0_f5f1f916e1bb.png
        provenance: REAL
      - layer_class: L3
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/image_bank_sprites/kettle_on_burner_boiling_INTERIM.png
        bbox_pct: [30, 42, 44, 40]
        z_order: above_L2
        provenance: INTERIM
        provenance_note: rembg isnet cut from REAL composed_v3 ep_001_seg_027; replace per object_inventory kettle/on_burner_boiling
      - layer_class: L4
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/image_bank_sprites/steam_wisp_procedural_INTERIM.png
        blend: screen
        opacity: 0.85
        provenance: INTERIM
        provenance_note: procedural PIL wisp; replace with §4.5 black-backdrop L4 render
    narrator_caption: "It can't tell smoke from steam."

  # ── P4: Mira watches the kettle (beat 027 visual rhyme) ─────────────────
  - panel_id: demo_p4_watching_kettle
    archetype: shared_scene_medium
    layers:
      - layer_class: L0
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L0/L0_2b9283d4c387.png
        provenance: REAL
      - layer_class: L2
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L2/L2_6003bcacf3a5_alpha.png
        bbox_pct: [8, 26, 52, 70]
        provenance: REAL
      - layer_class: L3
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/image_bank_sprites/kettle_on_burner_boiling_INTERIM.png
        bbox_pct: [62, 55, 30, 26]
        z_order: above_L2
        flip_h: true
        provenance: INTERIM
        provenance_note: same kettle sprite, mirrored + rescaled — object reuse across panels
      - layer_class: L4
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/image_bank_sprites/steam_wisp_procedural_INTERIM.png
        blend: screen
        opacity: 0.55
        provenance: INTERIM
    sfx: ["shhhh"]

  # ── P5: eyes closed, the noticing (beat 028) ────────────────────────────
  - panel_id: demo_p5_noticing
    archetype: character_quiet_face
    layers:
      - layer_class: L0
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L0/L0_f3bc5f4cc41f.png
        provenance: REAL
      - layer_class: L2
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L2/L2_2fb7ddd5e1a3_alpha.png
        bbox_pct: [22, 22, 58, 74]
        provenance: REAL
    dialogue:
      - text: "Oh."
        speaker: mira_internal
        bubble_style: cloud_thought
        intensity: whisper
        position_hint: top_right

  # ── P6: resolution (beat 032) ───────────────────────────────────────────
  - panel_id: demo_p6_resolution
    archetype: character_at_table_medium
    layers:
      - layer_class: L0
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L0/L0_2b9283d4c387.png
        provenance: REAL
      - layer_class: L1
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/image_bank_sprites/wall_alarm_green_idle_INTERIM.png
        bbox_pct: [70, 8, 10, 6]
        provenance: INTERIM
      - layer_class: L2
        asset: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/v4_render_cache/ep_001/L2/L2_ebbbf9da6966_alpha.png
        bbox_pct: [24, 28, 56, 68]
        provenance: REAL
    narrator_caption: "I don't have to believe it yet. I just have to notice it once."
