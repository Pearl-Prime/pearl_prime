# Extracted beatsheet — ep_001 "Tuesday, 6:47 AM"
#
# This file is the OPERATOR-AUTHORED input contract that the continuity_state
# generator consumes to produce the 35 panel YAMLs in this directory.
#
# Authoring source: bottom-up reverse-extraction from the 35 ground-truth
# YAMLs (ep001_001.yaml .. ep001_035.yaml) per Milestone C Step 0
# (OPD-140, 2026-05-22). NOT designed from theory.
#
# Schema authority: docs/specs/MANGA_BEATSHEET_SCHEMA.yaml
# Design rationale: docs/PEARL_AUTHOR_BEATSHEET_DESIGN_NOTES.md
#
# How to read this file:
#   - Header block: series-level identity that hoists out of every panel YAML.
#   - defaults: starting state inherited by beat 1; later beats only declare DELTAS.
#   - beats: ordered list, 1:1 with rendered panels. Each beat declares only
#     what the generator cannot infer from (defaults + previous beat + archetype
#     dispatch + scene_inventory + style_state + character_design).
#   - Empty fields in a beat mean "inherit from previous beat" (the same sticky-
#     inheritance pattern the panel YAMLs use via `inherits_from`).
#
# Beat → panel mapping: 1:1 for ep_001 (35 beats → 35 panels). The generator
# does NOT auto-multiply one beat into many panels in V1. Per-archetype panel
# multipliers are deferred (see PEARL_AUTHOR_BEATSHEET_DESIGN_NOTES.md §4.2).
#
# Empirical reduction: 35 panel YAMLs (~1090 lines, ~40 fields/panel including
# inherited values) collapse to ~35 beats × ~3-5 explicit fields = ~150
# operator-authored values. ~7x reduction, achieved entirely via inheritance
# + archetype dispatch + scene_inventory lookup. No semantic loss — the
# round-trip test (regenerate the 35 YAMLs from this file) is the proof.

schema_version: "1.0.0"
beatsheet_type: episode
authority_schema: docs/specs/MANGA_BEATSHEET_SCHEMA.yaml

# ── Header (series + episode identity) ───────────────────────────────────────
series_id: stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
series_profile_path: config/source_of_truth/manga_profiles/series/stillness_en_01.yaml
scene_inventory_path: config/source_of_truth/manga_profiles/series/stillness_en_01.scene_inventory.yaml
style_state_path:     config/source_of_truth/manga_profiles/series/stillness_en_01.style_state.yaml
panel_template_path:  config/manga/panel_templates/iyashikei.yaml
light_rig_library:    config/manga/light_rigs/iyashikei.yaml

episode_id: ep_001
chapter_script_path: artifacts/manga/chapter_scripts/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_001.yaml

# Single-character episode. relational_field.implied_partner_position == null
# for every beat; generator omits the field rather than echoing null.
stage_characters:
  - mira_aoki

# ── Defaults inherited by beat 1 (the implicit "beat 0" state) ───────────────
# Subsequent beats only declare DELTAS to these. Generator carries values
# forward via sticky inheritance per V4 spec §6.8 Strategy 3.
defaults:
  scene_id: bedroom_aoki      # opens here; transitions explicitly later
  temporal: dawn              # 6:47 AM per chapter_script title
  # light_rig_id derived: scene_inventory[bedroom_aoki].light_rigs intersect
  # iyashikei.yaml light_rigs for temporal=dawn → K01_dawn_window_warm.
  # No operator override needed at beat 1.

  prop_state:                 # series-level baseline; every beat inherits + appends
    phone: face_down
    succulent_in_clay_pot: normal

  weather_anchor: soft_clouded_light    # only emitted on beat 1 per ground truth

# ── Beat list (1:1 with panels) ──────────────────────────────────────────────
#
# Each beat may carry these fields (all optional; generator infers / inherits
# the rest):
#
#   archetype          (B-cat: REQUIRED — operator picks per beat)
#   beat_type          (B-cat: optional, defaults to archetype's primary beat_type)
#   scene:             (block of B-cat overrides; omit unless transitioning)
#     id:                  scene_id from scene_inventory
#     temporal:            dawn|morning|midday|... (advances per scene_inventory cycle)
#     light_rig_id:        explicit override; else derived from (scene_id, temporal)
#   character:         (block; per stage_character; omit when empty/inherited)
#     <char_id>:
#       on_frame:          (C-cat: defaults to true unless archetype has no L2)
#       pose_id:           (B-cat: operator; defaults from archetype)
#       expression_dial:   (B-cat: 0.0..1.0; generator enforces |Δ|≤0.3 on micro)
#       emotional:         (B-cat: enum from MANGA_CONTINUITY_STATE_SPEC §2)
#       gaze:              (C-cat default from shared_attention_anchor; B-cat override)
#       hand_state:        (D-cat default from archetype; B-cat override)
#       breath_phase:      (D-cat: only valid for chest_breath_micro)
#   props:             (additive — declare introductions + state transitions)
#     <prop_id>: <state>  (e.g., cup: full, phone: face_up_dark)
#   shared_attention_anchor: (B-cat: prop_id or character_id or null)
#   intent:            (B-cat operator commentary; copied verbatim from chapter_script
#                       `intent` field when present; generator may emit into continuity_invariants)
#   notes:             (B-cat free-form operator notes; emitted into continuity_invariants)
#
# The beat ORDER == the panel order. panel_id and inherits_from are generated.

beats:

  # ── Act I: empty bedroom → kitchen anchor (panels 1-3) ────────────────────

  - beat_id: b01
    archetype: sparse_establishing_wide
    beat_type: spatial                       # operator override: chapter_script has beat_type=null
    intent: "DAPPLED LIGHT HAND — establish safety palette, regulating cue"
    notes: "no characters on stage; bedroom established empty"
    character:                               # explicit no-stage to suppress mira_aoki block
      mira_aoki:
        on_frame: false
        role: implied_listener

  - beat_id: b02
    archetype: tea_beat_close_up
    beat_type: standard                      # operator-promoted (scene jump bedroom→kitchen on spatial beat)
    intent: "TEA BEAT — first sensory anchor"
    scene:
      id: kitchen_table_aoki                 # SCENE TRANSITION (allowed on spatial+ beats)
    character:
      mira_aoki:
        pose_id: hands_wrapping_cup
        expression_dial: 0.2
        emotional: calm
    props:
      cup: full                              # NEW prop introduced
    shared_attention_anchor: cup
    notes: "cup is first introduced in this panel; no prev to compare"

  - beat_id: b03
    archetype: character_quiet_face
    character:
      mira_aoki:
        pose_id: front_portrait_seated_calm
        gaze: at_named_object_cup            # explicit (shared_attention_anchor inherits → cup)
    # No deltas — expression_dial=0.2, emotional=calm inherited.

  # ── Act II: activation onset, phone interrupts (panels 4-6) ────────────────

  - beat_id: b04
    archetype: hand_table_micro
    beat_type: spatial                       # operator override (chapter_script: spatial)
    intent: "Activation onset — quiet trigger"
    character:
      mira_aoki:
        pose_id: hand_only_table
        expression_dial: 0.3                 # +0.1 from prev
        emotional: calm_with_subtle_unease
        hand_state: relaxed_open             # override archetype default (hands no longer wrapping)
    props:
      phone: face_up_dark                    # adjacent-enum transition face_down → face_up_dark
    shared_attention_anchor: phone
    notes: "POV shift (spatial beat) — scene anchor unchanged; notification glow lands in next panel"

  - beat_id: b05
    archetype: chest_breath_micro
    intent: "Body register — sympathetic activation cue"
    character:
      mira_aoki:
        expression_dial: 0.4                 # +0.1 (micro bound 0.3 OK)
        emotional: anxious
        gaze: off_frame_down                 # explicit override (anchor=phone but gaze averts)
        hand_state: tucked_self_soothing
        breath_phase: quickening             # D-cat: chest_breath_micro archetype-only
    props:
      phone: face_up_notification            # adjacent-enum
    shared_attention_anchor: phone

  - beat_id: b06
    archetype: character_face_micro_tension
    character:
      mira_aoki:
        pose_id: front_portrait_seated_tense
        expression_dial: 0.5                 # +0.1
        gaze: off_frame_down
    shared_attention_anchor: null            # anchor cleared
    notes: "expression_dial peak of phone-trigger micro-sequence"

  # ── Act III: pendulation back to ground (panels 7-9) ──────────────────────

  - beat_id: b07
    archetype: tea_beat_close_up
    beat_type: spatial
    intent: "TEA BEAT — pendulation back to ground"
    character:
      mira_aoki:
        expression_dial: 0.4                 # -0.1
        emotional: anxious_diminishing       # iyashikei pendulation
    shared_attention_anchor: cup

  - beat_id: b08
    archetype: dappled_light_hand
    beat_type: spatial
    intent: "DAPPLED LIGHT HAND — recurring safety motif"
    character:
      mira_aoki:
        pose_id: hand_only_table             # archetype dispatches hand-only framing
        hand_state: wrapping_cup
    shared_attention_anchor: cup             # hand on cup; visual anchor retained

  - beat_id: b09
    archetype: tea_beat_close_up
    # No deltas; this is the silent-rest beat between activation and laptop introduction.

  # ── Act IV: laptop calendar → catastrophizing peak (panels 10-12) ─────────

  - beat_id: b10
    archetype: hand_table_micro
    beat_type: spatial
    character:
      mira_aoki:
        pose_id: hand_only_reaching
        expression_dial: 0.5
        emotional: anxious
        hand_state: reaching_for_laptop
    props:
      laptop: open_to_calendar               # NEW prop
    shared_attention_anchor: laptop

  - beat_id: b11
    archetype: character_face_micro_tension
    intent: "Mind-racing — overlapping cloud_thought bubbles (rendered as lettering, not continuity)"
    character:
      mira_aoki:
        pose_id: front_portrait_seated_tense
        expression_dial: 0.7                 # +0.2 (within micro bound 0.3)
        gaze: middle_distance                # iyashikei thousand-yard-stare
        hand_state: tucked_self_soothing
    shared_attention_anchor: null

  - beat_id: b12
    archetype: hand_table_micro
    intent: "Body register — visible activation but small"
    character:
      mira_aoki:
        hand_state: tucked_self_soothing     # holds peak; hand still on table

  # ── Act V: bird-at-window — present-moment anchor (panels 13-15) ──────────

  - beat_id: b13
    archetype: sparse_establishing_wide
    beat_type: spatial
    intent: "ANCHOR PANEL setup — finch lands on windowsill"
    scene:
      temporal: morning                      # TEMPORAL transition (dawn → morning, next-in-cycle)
      # light_rig_id derived: scene_inventory[kitchen_table_aoki].light_rigs ∩ temporal=morning
      # → K02_morning_window_neutral. No operator override.
    character:
      mira_aoki:
        pose_id: full_figure_standing_at_window
        expression_dial: 0.5
        emotional: anxious_diminishing
        gaze: at_named_object_finch
        hand_state: relaxed_open
    props:
      finch: perched_on_windowsill           # NEW prop
    shared_attention_anchor: finch

  - beat_id: b14
    archetype: pet_companion_micro
    intent: "ANCHOR PANEL — bird as present-moment companion"
    character:
      mira_aoki:
        on_frame: false                      # pet_companion archetype: human implied not shown
        pose_id: front_portrait_seated_calm  # implied off-frame seated pose
        expression_dial: 0.3                 # -0.2 (exact micro bound; documented in v4_spec)
        emotional: present
        gaze: at_named_object_finch
        role: implied_listener

  - beat_id: b15
    archetype: character_quiet_face
    character:
      mira_aoki:
        expression_dial: 0.2

  # ── Act VI: flashback (panels 16-17) ──────────────────────────────────────

  - beat_id: b16
    archetype: sparse_establishing_wide
    beat_type: standard                      # scene transition needs standard+ beat
    intent: "Pendulation — past failure register"
    scene:
      id: conference_room_flashback          # NEW scene
      temporal: midday
      light_rig_id: K_flashback_cool_grey_blue   # operator override (not derived; flashback rig)
    character:
      mira_aoki:
        on_frame: true                       # contradiction in ground truth: character_state={}
                                             # but relational_field.on_frame=true. See OPEN-1 in design notes.
        # No character_state block emitted (ground truth has {}); generator suppresses block
    props_reset: true                        # scene change: kitchen props out of stage
    props:
      conference_table: present
    notes: "FLASHBACK PALETTE: desaturated cool grey-blue; scene_id not yet in scene_inventory (operator backfill needed)"

  - beat_id: b17
    archetype: chest_breath_micro
    intent: "Under-table tension peak"
    character:
      mira_aoki:
        pose_id: chest_breath_micro
        expression_dial: 0.9                 # peak (ground-truth comment cites 0.8→0.9 — see OPEN-2)
        emotional: anxious
        gaze: off_frame_down
        hand_state: tucked_self_soothing
        breath_phase: quickening
    shared_attention_anchor: null

  # ── Act VII: back to present, breath bracket (panels 18-21) ───────────────

  - beat_id: b18
    archetype: hand_table_micro
    beat_type: standard                      # scene transition back to kitchen requires standard+
    scene:
      id: kitchen_table_aoki                 # return to present
      temporal: morning                      # explicit (operator: do not regress to dawn)
    character:
      mira_aoki:
        pose_id: hand_only_table
        expression_dial: 0.5
        emotional: anxious_diminishing
        hand_state: relaxed_open
    props_restore_from_scene_exit: true      # restore kitchen prop_state held at b15
                                             # (cup, phone, succulent, laptop, finch)
    shared_attention_anchor: null

  - beat_id: b19
    archetype: tea_beat_close_up
    beat_type: spatial
    intent: "TEA BEAT — third instance"
    character:
      mira_aoki:
        expression_dial: 0.4
    props:
      cup: half                              # state transition full → half (sip taken)
    shared_attention_anchor: cup

  - beat_id: b20
    archetype: chest_breath_micro
    intent: "BREATH BRACKET — inhale"
    character:
      mira_aoki:
        expression_dial: 0.3
        gaze: eyes_closed
        breath_phase: inhale
    shared_attention_anchor: null

  - beat_id: b21
    archetype: chest_breath_micro
    intent: "BREATH BRACKET — exhale"
    character:
      mira_aoki:
        expression_dial: 0.2                 # -0.1
        emotional: present                   # iyashikei "yes" moment
        breath_phase: exhale_settling

  # ── Act VIII: alarm = smoke detector recognition (panels 22-28) ───────────

  - beat_id: b22
    archetype: sparse_establishing_wide
    beat_type: spatial
    intent: "Visual introduction of the central image (smoke-detector alarm)"
    character:
      mira_aoki:
        on_frame: false
        role: implied_listener
        pose_id: front_portrait_seated_calm  # off-frame seated
        gaze: off_frame_up
    props:
      smoke_detector: steady_green           # NEW prop
    notes: "POV from Mira's angle; Mira not in frame; ceiling/smoke_detector visible"

  - beat_id: b23
    archetype: character_quiet_face
    character:
      mira_aoki: {}                          # no deltas (inherit all from b22 + bring on_frame back to true)

  - beat_id: b24
    archetype: sparse_establishing_wide
    character:
      mira_aoki:
        pose_id: full_figure_standing_at_window

  - beat_id: b25
    archetype: seasonal_anchor_object
    intent: "Series-specific seasonal_anchor variant: smoke-detector LED motif"
    character:
      mira_aoki:
        on_frame: false
        role: implied_listener
    notes: "object-only panel; no L2 cutout needed"

  - beat_id: b26
    archetype: character_face_micro_tension
    character:
      mira_aoki:
        pose_id: front_portrait_seated_tense
        expression_dial: 0.3                 # +0.1 from b25's inherited 0.2
        gaze: middle_distance

  - beat_id: b27
    archetype: kettle_steam_macro
    beat_type: spatial
    intent: "Visual rhyme — steam = the false-alarm input"
    character:
      mira_aoki:
        on_frame: false
        role: implied_listener
        gaze: at_named_object_kettle
    props:
      kettle: on_burner_boiling              # NEW prop
    shared_attention_anchor: kettle
    notes: "kettle introduced this panel; visual rhyme: steam = false alarm input"

  - beat_id: b28
    archetype: character_quiet_face
    character:
      mira_aoki:
        expression_dial: 0.2

  # ── Act IX: long-drop decompression + closing (panels 29-35) ──────────────

  - beat_id: b29
    archetype: long_drop_decompression
    beat_type: long_drop                     # the rare beat_type — explicit
    intent: "LONG DROP — therapeutic decompression. Reader exhales here."
    character:
      mira_aoki:
        pose_id: full_figure_standing_at_window
        gaze: middle_distance
    shared_attention_anchor: null

  - beat_id: b30
    archetype: tea_beat_close_up
    beat_type: spatial
    intent: "TEA BEAT — final return, intentional bookend with b02"
    character:
      mira_aoki:
        pose_id: hands_wrapping_cup
        hand_state: wrapping_cup
    props:
      kettle: off_burner_residual_steam      # adjacent-enum transition
    shared_attention_anchor: cup

  - beat_id: b31
    archetype: character_quiet_face
    character:
      mira_aoki:
        expression_dial: 0.3
        emotional: joyful_quiet              # heuristic emotional transition present → joyful_quiet
        gaze: middle_distance
        hand_state: relaxed_open
    notes: "dial +0.1 within micro bound; emotional transition flagged for heuristic check"

  - beat_id: b32
    archetype: sparse_establishing_wide
    intent: "Caption space — empty wall, light moving across it"
    character:
      mira_aoki:
        on_frame: false
        role: implied_listener
        expression_dial: 0.2
        emotional: present
    notes: "caption space; no character"

  - beat_id: b33
    archetype: pendulation_pair_visual_rhyme
    intent: "Visual rhyme partner of b25 (smoke detector recurrence — same alarm, different relationship)"
    rhyme_partner_beat: b25                  # generator may use to copy composition
    character:
      mira_aoki:
        on_frame: false
        role: implied_listener
        gaze: off_frame_up
    shared_attention_anchor: smoke_detector

  - beat_id: b34
    archetype: sparse_establishing_wide
    beat_type: spatial
    intent: "DAPPLED LIGHT HAND — closing return"
    character:
      mira_aoki:
        pose_id: full_figure_standing_at_window
        gaze: middle_distance
    shared_attention_anchor: finch           # operator: "the bird is gone — that's fine"
                                             # but ground-truth panel 34 carries anchor=finch as nostalgic reference

  - beat_id: b35
    archetype: sparse_establishing_wide      # placeholder; archetype="typographic outro" not in iyashikei.yaml
    beat_type: standard
    intent: "Episode card — typographic only on soft cream background"
    character:
      mira_aoki: null                        # explicit null → suppresses character_state entirely
    props_clear: true                        # suppresses prop_state entirely (ground truth: prop_state={})
    notes: "typographic outro on soft cream; no scene render; archetype placeholder"
