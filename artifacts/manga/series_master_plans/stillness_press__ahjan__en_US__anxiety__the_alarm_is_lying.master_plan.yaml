# healing family: first_major_shift_by is null — no status-quo-shift convention;
# the loop is the product. Cyclical segmentation; no forced shift anywhere below.
first_major_shift: null
season_wheels:
  - wheel_id: wheel_01_the_private_practice
    episode_start: 1
    episode_end: 12
    drift: >-
      A six-week late-summer micro-wheel. The regulation practice moves from
      solitary (kitchen table) to witnessed (Yara, the mother, Kenji) to, in
      the final beat, asked about by a junior colleague for the first time.
  - wheel_id: wheel_02_the_year_of_two_cups
    episode_start: 13
    episode_end: 48
    drift: >-
      Autumn through the following summer, one full calendar year. The kettle
      that bookends Mira's evenings starts making two cups, then four; a
      succulent cutting roots on her own sill; Kenji stops needing an
      introduction. Nothing escalates; things accumulate.
  - wheel_id: wheel_03_the_table_that_fills
    episode_start: 49
    episode_end: 76
    drift: >-
      Year two, autumn into spring. Demographic drift, not plot: the small
      table gains and loses regulars with the seasons, Devon starts giving
      away what he was given, and Mira's practice recedes toward invisibility.
  - wheel_id: wheel_04_the_kettle_passes
    episode_start: 77
    episode_end: 100
    drift: >-
      Year two's summer into year three. The ritual increasingly belongs to
      whoever is holding the kettle that day; recovery from ordinary alarms is
      near-invisible on the page; hosting is simply a thing that happens.
