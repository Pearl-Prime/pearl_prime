episode_unit: monthly_chapter
episode_unit_mapping_note: >-
  1 episode = 1 monthly slice-of-life chapter (healing family convention,
  season_unit 8 chapters/volume). All arc_cadence counts are in this unit;
  not 1:1 comparable with weekly-action units at equal story mass.
episode_horizon: 100
plan_frame: serialized_episode
