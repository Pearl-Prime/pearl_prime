arcs:
  # ── wheel 01 — authored window (eps 1-12): full episode-plan pass ──────
  - arc_id: cycle_01_the_alarm_in_four_rooms
    episode_start: 1
    episode_end: 4
    detail_level: detailed
    season_wheel: wheel_01_the_private_practice
    source_arc_ref: artifacts/manga/arc_storyboards/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_001.arc_storyboard.yaml
    arc_premise: >-
      The same body alarm fires in four different rooms — kitchen, review
      meeting, coffee shop, bedroom at midnight — and each room asks whether
      it can be witnessed without being obeyed.
    arc_promise: >-
      The reader learns the shape of the practice by watching it meet work,
      family, grief, and the dark, one ordinary room at a time.
    status_quo_shift: null
    mc_change_vector:
      from_state: Mira obeys every alarm her body fires and calls that being responsible.
      to_state: Mira can watch an alarm arrive, name it, and let the room stay ordinary around it.
      endurance_checklist_refs:
        - "mc_endurance_study#healing/endurance"
        - "mc_endurance_study#healing/wellness"
    self_help_topic: anxiety
    mode_arc:
      mode: none
    episodes:
      - episode: 1
        logline: >-
          A Tuesday-morning work notification fires Mira's body into a
          catastrophizing spiral before she has even finished her tea, and the
          episode has to prove the alarm can be witnessed without being obeyed.
        genre_pleasure_beat: >-
          The kettle, the jade pendant, dawn light on an ordinary kitchen —
          calm rendered in objects before any word is spoken.
        self_help_topic_beat: >-
          The false-alarm reframe arrives as a body observation (the spiral is
          loud, the kitchen is quiet), never as a caption lesson.
        hook:
          position: closing_panel
          promise: >-
            Will the spiral run unchecked, or does something in the ordinary
            world interrupt it before the meeting?
        checklist_refs:
          - "mc_endurance_study#healing/traits"
      - episode: 2
        logline: >-
          The Q3 review meeting Mira has been dreading arrives on schedule and
          forces her to test yesterday's alarm-system reframe under real
          professional stakes, not only alone at her own kitchen table.
        genre_pleasure_beat: >-
          Office texture held at iyashikei tempo — the meeting room is allowed
          to be a room, not an arena.
        self_help_topic_beat: >-
          The practice survives contact with authority by staying physical: a
          hand below the table, one slow exhale between agenda items.
        hook:
          position: closing_panel
          promise: >-
            Does the reframe survive the actual review room, or does the old
            alarm run it once the stakes are real?
        checklist_refs:
          - "mc_endurance_study#healing/endurance"
      - episode: 3
        logline: >-
          A visiting mother's Saturday text and a coffee-shop question about
          Mira's late father reactivate the same alarm reflex the workplace
          triggered, and the episode must prove the noticing generalizes
          beyond the office.
        genre_pleasure_beat: >-
          Weekend light, cafe steam, a conversation that is allowed to pause —
          grief handled at the pace of a refill.
        self_help_topic_beat: >-
          Grief and anxiety share one nervous system; the same noticing that
          held at work holds, barely, under a harder feeling.
        hook:
          position: closing_panel
          promise: >-
            Does the conversation about her father overwhelm Mira, or does the
            noticing hold under grief too?
        checklist_refs:
          - "mc_endurance_study#healing/bond"
      - episode: 4
        logline: >-
          A body alarm fires at 11:42 PM with no notification, meeting, or
          person to blame, and Mira has to find out whether the practice she
          trusts by day still holds when there is nothing outside her to point at.
        genre_pleasure_beat: >-
          Night-apartment quiet — streetlight through blinds, a kettle heated
          at midnight, the specific loneliness of 11:42 PM made habitable.
        self_help_topic_beat: >-
          An alarm with no external cause is the purest false alarm; the
          episode lets the body settle before the mind agrees.
        hook:
          position: closing_panel
          promise: >-
            After the first ground attempt fails, does the night resolve into
            rest, or does the alarm win until morning?
        checklist_refs:
          - "mc_endurance_study#healing/wellness"

  - arc_id: cycle_02_the_practice_witnessed
    episode_start: 5
    episode_end: 8
    detail_level: detailed
    season_wheel: wheel_01_the_private_practice
    source_arc_ref: artifacts/manga/arc_storyboards/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_005.arc_storyboard.yaml
    arc_premise: >-
      Other people enter the frame — a coworker at lunch, a mother on the
      Sunday phone, a Monday subway crowd, a first date — and the private
      practice has to survive being seen without turning into a lecture.
    arc_promise: >-
      Each witness gets a different answer to the same question: can the
      practice stay a practice when someone else is watching?
    status_quo_shift: null
    mc_change_vector:
      from_state: The practice only works when nobody can see Mira doing it.
      to_state: The practice can be witnessed, imperfectly, without becoming a performance or a lesson.
      endurance_checklist_refs:
        - "mc_endurance_study#healing/bond"
    self_help_topic: anxiety
    mode_arc:
      mode: none
    episodes:
      - episode: 5
        logline: >-
          A lunch invitation from a coworker, Yara, pulls Mira's private
          regulation practice into view for the first time, testing whether it
          can be witnessed by another person without turning into an explanation.
        genre_pleasure_beat: >-
          Lunch-counter warmth, two trays, the small comedy of eating with a
          colleague you only know vertically.
        self_help_topic_beat: >-
          Being seen mid-practice and not explaining it — the topic advances by
          what Mira does not say.
        hook:
          position: closing_panel
          promise: >-
            Can the practice be witnessed without becoming a lesson — and will
            Yara's own hidden struggle surface too?
        checklist_refs:
          - "mc_endurance_study#healing/bond"
      - episode: 6
        logline: >-
          A Sunday phone call from Mira's mother reopens the oldest anxious
          pattern in the family — years of quiet parental worry meeting Mira's
          old reflex to defend or perform fine — and asks whether the practice
          can hold under it.
        genre_pleasure_beat: >-
          A whole episode inside one phone call and one apartment; tea going
          cold and being remade as the conversation turns.
        self_help_topic_beat: >-
          Family systems fire the oldest alarms; honesty lands as a smaller,
          truer sentence than reassurance.
        hook:
          position: closing_panel
          promise: >-
            With the old worry spoken aloud, does this call end in the usual
            script or in something more honest than either of them expected?
        checklist_refs:
          - "mc_endurance_study#healing/anti"
      - episode: 7
        logline: >-
          A four-minutes-late morning and an unanswered Friday-night work email
          launch Mira's subway commute into a catastrophizing spiral that the
          practice only partly catches, proving the alarm is a returning, not a cure.
        genre_pleasure_beat: >-
          Rush-hour choreography rendered gently — straps, shoulders, tunnel
          light — a crowded train made almost companionable.
        self_help_topic_beat: >-
          Partial success is the honest arc of practice; the episode refuses
          the cure narrative on the page.
        hook:
          position: closing_panel
          promise: >-
            Does the practice actually hold this time, or does Monday prove
            the alarm just keeps firing regardless?
        checklist_refs:
          - "mc_endurance_study#healing/anti"
      - episode: 8
        logline: >-
          A first date with a near-stranger forces Mira to choose between
          performing ease and letting Kenji see one honest, unpolished thing
          about her week.
        genre_pleasure_beat: >-
          Wine-bar half-light and first-date awkwardness allowed to be sweet
          instead of mortifying.
        self_help_topic_beat: >-
          Choosing the true version of her week over the safe one is the
          practice applied to intimacy.
        hook:
          position: closing_panel
          promise: >-
            Does Kenji's ordinary question pull the safe version of her week
            or the true one — and can a near-stranger hold it?
        checklist_refs:
          - "mc_endurance_study#healing/bond"

  - arc_id: cycle_03_the_practice_goes_quiet
    episode_start: 9
    episode_end: 12
    detail_level: detailed
    season_wheel: wheel_01_the_private_practice
    source_arc_ref: artifacts/manga/arc_storyboards/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_009.arc_storyboard.yaml
    arc_premise: >-
      The practice starts disappearing into ordinary life — a deadline thought
      passes through a Saturday unmanaged, the episode-one notification
      returns to the same bedside phone, a tripled presentation room and a
      Friday coffee ask what six weeks have actually built.
    arc_promise: >-
      The wheel closes where it opened — same phone, same kitchen — and the
      difference is measured in panels, not proclamations; then the practice
      is offered outward for the first time.
    status_quo_shift: null
    mc_change_vector:
      from_state: The practice is a deliberate act Mira must remember to perform.
      to_state: The practice runs quietly beneath ordinary days and can be put into her own words for someone else.
      endurance_checklist_refs:
        - "mc_endurance_study#healing/endurance"
    self_help_topic: anxiety
    mode_arc:
      mode: none
    episodes:
      - episode: 9
        logline: >-
          A stray thought about a work deadline surfaces during ordinary
          Saturday chores and passes through Mira's body without needing to be
          managed, proving the practice has become invisible even to her.
        genre_pleasure_beat: >-
          Laundry steam, market errands, the deep iyashikei pleasure of a day
          in which nothing is wrong.
        self_help_topic_beat: >-
          Recovery measured by what does not happen — a spiral that simply
          fails to start.
        hook:
          position: none
          promise: >-
            The quiet-close convention: an ordinary walk, and whatever the old
            alarm would have caught, uncaught.
        checklist_refs:
          - "mc_endurance_study#healing/wellness"
      - episode: 10
        logline: >-
          A recurring Q-review work notification returns on the exact bedside
          phone from episode one, testing six weeks of practice against the
          same trigger that once hijacked Mira's whole morning.
        genre_pleasure_beat: >-
          A shot-for-shot rhyme with episode one — same dawn, same kettle —
          where the reader sees the difference before Mira names it.
        self_help_topic_beat: >-
          Same trigger, changed nervous system: the comparison is the teaching
          and it stays wordless.
        hook:
          position: closing_panel
          promise: >-
            Settled fast inside, will Mira take the practice out into the
            world today, or stay safely at the kitchen table?
        checklist_refs:
          - "mc_endurance_study#healing/endurance"
      - episode: 11
        logline: >-
          A calendar notification silently triples the size of Mira's Thursday
          presentation, forcing her to test six episodes of private practice
          in front of a room she never agreed to prepare for.
        genre_pleasure_beat: >-
          The big room rendered survivable — carpet seams, water glasses, a
          slide clicker's small weight — scale without spectacle.
        self_help_topic_beat: >-
          Public stakes meet the private floor the practice built; the body
          goes first and the voice follows.
        hook:
          position: closing_panel
          promise: >-
            Can the private practice hold up inside a room this size, in front
            of people who are actually watching?
        checklist_refs:
          - "mc_endurance_study#healing/endurance"
      - episode: 12
        logline: >-
          A Friday text from Devon asking to still meet for coffee forces Mira
          to put six episodes of private practice into her own words for
          another person for the first time, closing the wheel on a shared
          rather than solitary ritual.
        genre_pleasure_beat: >-
          Breakroom coffee as ceremony — two cups, one question asked
          honestly, and the season's first cool air through a propped door.
        self_help_topic_beat: >-
          Passing the practice along without turning teacher: an answer
          offered as a story about her own week, not instructions.
        hook:
          position: closing_panel
          promise: >-
            What does the practice look like when it is offered to someone
            else instead of only practiced alone?
        checklist_refs:
          - "mc_endurance_study#healing/bond"

