# ═══════════════════════════════════════════════════════════════════════════
# PAGES (32 panels — slightly longer than ep_003 to hold the night-arc weight)
# ═══════════════════════════════════════════════════════════════════════════

pages:
  - page_id: ep_004_p01
    panels:

      # ── OPENING — bedroom, lamp on, the safety cue must work at NIGHT ──
      - panel_id: ep004_001
        scene: |
          Close-up — bedside lamp glowing warm amber against deep navy
          darkness. The lamp's halo just catches the silhouette of the
          succulent on the windowsill nearby. Warm + dark contrast: the
          point is SAFETY in low light.
        beat_type: ~
        intent: "ANCHOR PANEL reference + SAFETY CUE in night register"
        silence_confirmed: true

      - panel_id: ep004_002
        scene: |
          Wider — Mira's bedroom. She's in cream-and-grey cotton pajamas,
          sitting up against the headboard, a paperback open on her lap.
          The clock on the bedside table reads 11:42 PM. Apartment quiet.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "Wednesday. Eleven forty-two."

      - panel_id: ep004_003
        scene: |
          Close — Mira's hand turns a page. Her eyes have stopped reading.
          The same paragraph twice. She knows.
        beat_type: micro
        intent: "Pre-activation — the body has registered something before the mind"

      # ── RAMP — the body knows before the mind ─────────────────────────
      - panel_id: ep004_004
        scene: |
          Close — Mira's chest area through the pajama top. Slight tension.
          Her breath visibly shallow.
        beat_type: micro
        intent: "Activation 1 — onset without external trigger"
        sfx_by_locale:
          en_US: ["thud-thud..."]

      - panel_id: ep004_005
        scene: |
          Mira closes the book. Sets it aside. The lamp halo on her face,
          the rest of the room dim.
        beat_type: spatial
        dialogue_lines:
          - speaker: mira_internal
            text_by_locale:
              en_US: "What is it tonight."
            intensity: whisper
            bubble_style: cloud_thought
            tail_style: dotless
            position_hint: top_right

      - panel_id: ep004_006
        scene: |
          Mid-shot — Mira lying back, eyes open in the dim. The ceiling
          patterned with faint light from a passing car outside. The
          patterns slide across.
        beat_type: spatial
        intent: "Activation 2 — the mind starts unrolling lists"

      # ── GROUND 1 — pendulation: the lamp halo ─────────────────────────
      - panel_id: ep004_007
        scene: |
          Mira's gaze finds the lamp again. Just the lamp. Warm, steady,
          unchanging.
        beat_type: micro
        intent: "Pendulation — pull attention to a fixed warm source"

      - panel_id: ep004_008
        scene: |
          Close — Mira's hand on the bedside table, two fingers touching
          the jade pendant where it rests, not around her neck. She does
          not put it on.
        beat_type: micro
        intent: "Anchor REFUSAL — the practice generalizes WITHOUT external prop"

      - panel_id: ep004_009
        scene: |
          Tight close on Mira's face — eyes closing. A slow breath.
        beat_type: micro
        intent: "BREATH BRACKET — no pendant, no plant, just the breath"

  - page_id: ep_004_p02
    panels:

      # ── RAMP 2 — but the alarm doesn't stop ───────────────────────────
      - panel_id: ep004_010
        scene: |
          Wider — Mira sits up, pushes the blanket off her legs. The clock
          reads 12:18 AM now. The lamp the only warm light.
        beat_type: spatial
        intent: "Realistic — first ground move not enough; ramp continues"

      - panel_id: ep004_011
        scene: |
          Close — Mira's feet finding the cool floor. Bare. The contrast
          (warm covers above, cool floor below) is grounding-via-sensation.
        beat_type: micro
        intent: "Activation 3 — but she chooses sensation, not avoidance"
        sfx_by_locale:
          en_US: ["..."]

      # ── KITCHEN MIDNIGHT — small ritual ───────────────────────────────
      - panel_id: ep004_012
        scene: |
          Mira walking down the dim hallway toward the kitchen. The
          lamplight behind her, kitchen's window-light ahead (moonlight).
          Apartment is silent.
        beat_type: standard
        intent: "Scene transition — bedroom → kitchen"

      - panel_id: ep004_013
        scene: |
          Kitchen at midnight. Window full of cool moonlight. Mira
          standing at the sink, filling a glass of water. The succulent
          a small silhouette to her left.
        beat_type: spatial

      - panel_id: ep004_014
        scene: |
          Close — Mira's mouth on the rim of the glass. Cool water. Eyes
          closed.
        beat_type: micro
        intent: "Sensory anchor — water at midnight"

      # ── GROUND 2 — the chair by the window ────────────────────────────
      - panel_id: ep004_015
        scene: |
          Mira sitting in a small armchair by the kitchen window, knees
          drawn up. The window cracked open an inch. Cool air moves the
          edge of her hair.
        beat_type: spatial
        intent: "Settle position — neither bed nor bedroom; new container"

      - panel_id: ep004_016
        scene: |
          Close on Mira's hands cupping the empty glass. Both thumbs against
          the rim. The lamp halo from the bedroom barely visible, far away.
        beat_type: micro

      - panel_id: ep004_017
        scene: |
          Black panel — almost black, very thin frame of light at the edges.
          Caption strip across the middle.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "There is no meeting tomorrow. There is no mother to call."
        silence_confirmed: true

      # ── AWE-PULLBACK — the city at 1 AM ────────────────────────────────
      - panel_id: ep004_018
        scene: |
          Wide pullback through the kitchen window. The city sprawl at
          1 AM — most lights out, a few apartment windows still glowing
          warm in the dark. The sky deep navy with stars muted by city
          glow. Mira small in the corner of the frame, knees up.
          Intentional excess of darkness.
        beat_type: miyazaki_ma
        intent: "AWE-PULLBACK — the night holds her; she is small but not alone"
        silence_confirmed: true

      # ── ACTIVATION 4 — peak alarm without cause ────────────────────────
      - panel_id: ep004_019
        scene: |
          Close on Mira's face — eyes open in the dim. The body is at
          peak now. No external cause; the mind cannot point at anything.
        beat_type: micro
        intent: "Peak activation — pure body, no narrative attached"
        sfx_by_locale:
          en_US: ["thud-thud-thud..."]

      - panel_id: ep004_020
        scene: |
          Close — Mira's chest. The shirt fabric rises and falls visibly.
          Faster than her breathing. The alarm is louder than the breath.
        beat_type: micro

      - panel_id: ep004_021
        scene: |
          Wider — Mira in the chair, but now she has placed both hands flat
          on her own chest, one over the other. Eyes closed. Not panicking.
          Just present.
        beat_type: spatial
        intent: "GROUND 3 — touch + presence, no external anchor"
        dialogue_lines:
          - speaker: mira_internal
            text_by_locale:
              en_US: "It is not danger. It is just the alarm."
            intensity: whisper
            bubble_style: cloud_thought
            tail_style: dotless
            position_hint: top_right

      # ── GROUND 3 — the breath finds the rhythm ────────────────────────
      - panel_id: ep004_022
        scene: |
          Close on Mira's face. Eyes still closed. The shoulders settle
          half a degree. A first long exhale.
        beat_type: micro
        intent: "First sign of nervous-system shift"

      - panel_id: ep004_023
        scene: |
          Close on her hand sliding off her chest to her side. The other
          hand briefly touching the jade pendant on the side table beside
          the chair — she has brought it with her. She does not put it
          on. Just touches it.
        beat_type: micro
        intent: "Pendant as friend, not as crutch"

      # ── LONG DROP — window seat, silent ───────────────────────────────
      - panel_id: ep004_024
        scene: |
          Wide silent panel. Mira asleep — or nearly asleep — folded into
          the armchair, head against the window frame, blanket pulled
          from the back of the chair. The succulent visible on the
          windowsill, silhouetted against the moonlight. The city beyond,
          dim. NO TEXT, NO CAPTION, NO SFX. Deliberate empty sky above.
        beat_type: long_drop
        intent: "LONG DROP — the body has surrendered to rest. Reader exhales."
        silence_confirmed: true
        dialogue_lines: []

      # ── PRE-DAWN — the practice held; she rests ────────────────────────
      - panel_id: ep004_025
        scene: |
          Close — Mira's hand on the blanket, fingers loose. The wrist
          relaxed. Sleep marks on the wrist from the chair arm.
        beat_type: micro

      - panel_id: ep004_026
        scene: |
          The window. Pre-dawn now — pale rose tints in the sky beyond
          the city skyline. The lamp behind in the bedroom long since
          turned off (offscreen).
        beat_type: spatial
        intent: "Time-jump — pre-dawn marker"

      - panel_id: ep004_027
        scene: |
          Wider — Mira still in the chair, eyes opening slowly. The first
          light catching the succulent on the sill. She does not move yet.
        beat_type: micro

      # ── COMPLETION — dawn kitchen, kettle, the bookend ────────────────
      - panel_id: ep004_028
        scene: |
          Mira at the stove. The kettle on the burner, beginning to warm.
          She is still in pajamas. The window full of pre-dawn pale-rose
          light now. Her hair loose, face soft, eyes a little sleep-marked.
        beat_type: standard
        intent: "Scene transition — chair → kettle"

      - panel_id: ep004_029
        scene: |
          Close on the kettle, starting to steam. Same kettle as ep_001-003.
          The visual rhyme holds.
        beat_type: spatial
        sfx_by_locale:
          en_US: ["hsss..."]

      - panel_id: ep004_030
        scene: |
          Mira sitting at the table. Fresh tea. The jade pendant placed
          on the table beside the cup, not yet around her neck. She is
          looking out at the dawn light.
        beat_type: micro

      - panel_id: ep004_031
        scene: |
          Close — her fingers picking up the pendant slowly, fastening
          it. The slight ritual of returning it to her neckline.
        beat_type: micro
        intent: "Pendant returns — not as crutch this time, as companion"

      - panel_id: ep004_032
        scene: |
          Final panel — Mira at the table, tea in front of her, the
          pendant at her neck, the succulent in the window behind her,
          the sky pale rose. Eyes peaceful. Caption strip below.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "No cue. No cause. The breath still works."
        dialogue_lines: []

