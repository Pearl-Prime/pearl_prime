# WRITER NOTES
# ═══════════════════════════════════════════════════════════════════════════
notes:
  arc_position: |
    Episode 4 of 10. The hardest test case in the series so far: the alarm
    fires without external stimulus. Mira applies the practice in the dark,
    alone, without the pendant on, without a meeting to walk into, without
    a parent to talk to. The teaching reduces to: notice. That's it. The
    completion is sleep + dawn + the small ritual of putting the pendant
    BACK ON in the morning, not as crutch but as choice.
  pacing_vs_prior: |
    32 panels — back up from ep_003's 30 because the night register needs
    more breathing space. Lots of micro / spatial beats, fewer standard.
    The slow time-passage (11:42 PM → 12:18 AM → 1 AM → pre-dawn → dawn)
    is the texture.
  continuity_callbacks: |
    - Kettle bookend (panel 29, 30) — same kettle as ep_001-003
    - Jade pendant — OFF Mira's neck the entire episode; returns at the
      very last act of putting it back on at dawn (panel 31)
    - Succulent on windowsill (panel 1, 24, 27, 32) — silhouetted at night,
      catching first dawn light at end; full visual through-line
    - Smoke detector — DOES NOT appear. The caption "It is not danger.
      It is just the alarm." (panel 21) is now both internal AND silent
      (whispered thought), not displayed as caption strip. Further
      graduation.
    - Cream + grey palette (instead of cream sweater) — same character
      lock-in via pajama color family
  craft_notes: |
    The "no external trigger" episode is doctrinally important. Earlier
    episodes had cues: work review, mother visiting. Insomnia onset is
    pure body. The episode validates that the practice survives WITHOUT
    a story to attach to. Iyashikei convention: this is shown via small
    body actions (hands on chest, choosing the chair, opening the
    window an inch) — not via a Big Revelation. The reader leaves
    knowing the body found rest, without Mira "solving" anything.
  long_drop_position: |
    Panel 24 — the window seat. The Long Drop here doubles as sleep
    onset; the silence is not just compositional, it's the body
    surrendering. Different in feeling from ep_001's kitchen Long
    Drop and ep_002's rooftop and ep_003's park bench. Setting variety
    is critical to keep readers in the iyashikei register without
    formulaic fatigue.
  translation_handoff: |
    Same as ep_001-003 — text_by_locale dicts populated for en_US only.
    Locked terminology in iyashikei_glossary.py covers the new "No cue.
    No cause. The breath still works." + "It is not danger. It is just
    the alarm." callbacks.

