# ═══════════════════════════════════════════════════════════════════════════
# CHAPTER SCRIPT — The Alarm Is Lying — Episode 4
# ═══════════════════════════════════════════════════════════════════════════
# Series:        stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
# Episode:       ep_004 — "Wednesday, 11:42 PM"
# Author (EI):   Hana Tidecalm
# Teacher:       ahjan (Buddhist contemporary; alarm-systems / pause)
# Engine:        false_alarm
# Genre:         iyashikei
# Style:         cozy_iyashikei
#
# Continuity from ep_003:
#   Four days later. Same Mira Aoki. The practice has been holding for
#   waking hours. Tonight the alarm fires WITHOUT external trigger —
#   the insomnia variant. The teaching applied in the dark, alone.
#
# Episode arc — the alarm without a cue:
#   safety opening (dark apartment, soft lamp) → ramp (cannot sleep,
#   mind unrolling) → climax (3 AM peak — the body insists something
#   is wrong) → ground (the practice in low light) → Long Drop
#   (sitting by the open window) → completion (dawn, kettle, sleeping
#   on the couch finally)
#
# SCROLL THERAPEUTIC TEST:
#   1. Safety cue inside first 800 px ........ ✓ panel 1 (warm bedside lamp + succulent shadow)
#   2. ≥3 oscillations activation/ground ...... ✓ 4 oscillations
#   3. Activation:Ground ≤ 1:2.5 .............. ✓ ~10 activation / ~22 ground panels
#   4. Closes with completion ................. ✓ panels 30-32 settle
#   5. HRV-style end-state delta .............. (Phase 2)
#
# CRAFT FORMULAS (different mix — night register):
#   Tea Beat (panels 31-32 closing; absent at open — night doesn't open on tea)
#   Anchor Panel — the succulent (panel 1 silhouette, panel 24 dawn-lit)
#   Awe-Pullback (panel 18 — bedroom window onto sleeping city at 3 AM)
#   Pendulation Pair (4-6 ↔ 7-9, 11-14 ↔ 15-17, 19-21 ↔ 22-25)
#   Long Drop (panel 27 — window seat wide silent, pre-dawn)
#   Continuity callback: jade pendant ON the bedside table (panel 8, 23) —
#   off her neck for the first time, which is the point: she has to use
#   the breath without the external anchor
#
# DOCTRINAL ANCHOR:
#   The alarm without a stimulus is the hardest case — no external thing
#   to point at, no work meeting, no parent's words. Just the body
#   running its program. The teaching: you do not have to identify a
#   cause. You can notice the activation as activation, full stop.
#
# ═══════════════════════════════════════════════════════════════════════════

