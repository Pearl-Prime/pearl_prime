# ═══════════════════════════════════════════════════════════════════════════
# PAGES (26 panels — the lightest episode by count; pacing is the message)
# ═══════════════════════════════════════════════════════════════════════════

pages:
  - page_id: ep_009_p01
    panels:

      # ── OPENING — laundry, sun ─────────────────────────────────────────
      - panel_id: ep009_001
        scene: |
          Close-up — a small folded stack of cream sweaters on a wooden
          floor (laundry just sorted), a bar of afternoon sunlight
          falling diagonally across them. Dust motes visible in the
          beam. The succulent on the kitchen sill caught in the corner
          of the frame, soft focus.
        beat_type: ~
        intent: "SAFETY CUE first 800 px — laundry + sun; pure ground opener"
        silence_confirmed: true

      - panel_id: ep009_002
        scene: |
          Wider — Mira sitting cross-legged on her apartment floor near
          the laundry pile. Cream sweater, black leggings. Hair loose.
          Hand smoothing a wrinkle on a folded shirt.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "Saturday. Two thirty-eight."

      - panel_id: ep009_003
        scene: |
          Close — Mira's hand picking up a folded sweater, walking it to
          a drawer. The drawer is half-open already.
        beat_type: micro
        intent: "Ordinary task — nothing to perform"

      - panel_id: ep009_004
        scene: |
          The drawer sliding shut with a soft thump. The apartment quiet.
        beat_type: spatial
        sfx_by_locale:
          en_US: ["clm..."]

      # ── ACTIVATION 1 — tiny, met without effort ────────────────────────
      - panel_id: ep009_005
        scene: |
          Mira at the kitchen sink, rinsing a single cup. A small thought
          arrives — something about a project deadline. The body registers
          for a flicker.
        beat_type: micro
        intent: "Activation 1 — minimum; the episode's only real spike"
        sfx_by_locale:
          en_US: ["..."]

      - panel_id: ep009_006
        scene: |
          Close on Mira's face — eyes a little distant, then back. The
          thought has passed. She sets the cup on the drying rack.
        beat_type: micro
        intent: "Met without effort — no pendant touch, no breath ritual"

      # ── GROUND 1 — the cup in the rack ─────────────────────────────────
      - panel_id: ep009_007
        scene: |
          Close on the cup, water still beaded on it. The afternoon
          light catches a single drop.
        beat_type: micro

      - panel_id: ep009_008
        scene: |
          Mid-shot — Mira drying her hands on a towel by the sink. She is
          looking out the window. Nothing in particular. Just looking.
        beat_type: spatial
        intent: "GROUND — the looking itself"
        silence_confirmed: true

  - page_id: ep_009_p02
    panels:

      # ── DECISION — walk to the store ────────────────────────────────────
      - panel_id: ep009_009
        scene: |
          Mira at the front door of her apartment, slipping on canvas
          shoes. A small canvas tote bag on her shoulder.
        beat_type: spatial
        intent: "Scene transition — apartment → outside"

      - panel_id: ep009_010
        scene: |
          Wide — Mira on the sidewalk outside her building. Late-spring
          Saturday, soft cobalt sky, the trees in leaf. A woman walking
          a small dog passes by. The light is golden.
        beat_type: standard

      - panel_id: ep009_011
        scene: |
          Close on Mira's feet walking. Sneakers on warm concrete. A
          fallen petal on the sidewalk that she steps around without
          thinking about it.
        beat_type: micro

      - panel_id: ep009_012
        scene: |
          Mira at a small corner store. Picking up a single lemon, a
          bunch of basil, a small bottle of milk. The cashier nods. She
          nods back. No words.
        beat_type: standard
        silence_confirmed: true

      # ── AWE-PULLBACK — the street ──────────────────────────────────────
      - panel_id: ep009_013
        scene: |
          Wide pullback. The neighborhood street from above-shoulder
          angle. Late afternoon. A few pedestrians, parked cars, leafy
          trees, an awning. Mira walking with the canvas tote, small in
          the frame. Intentionally over-wide. No drama, just dimension.
        beat_type: miyazaki_ma
        intent: "AWE-PULLBACK — the ordinary held in light"

      # ── A SMALL DETOUR — the park ──────────────────────────────────────
      - panel_id: ep009_014
        scene: |
          Mira at a small intersection. She glances right — a small
          neighborhood park visible, half a block down. She turns toward
          it.
        beat_type: micro
        intent: "Choice — unscheduled, low-stakes"

      - panel_id: ep009_015
        scene: |
          Wide — the small park: a fountain (off), a single wooden bench
          under a tree, a few people on the grass. Mira walks toward the
          bench.
        beat_type: standard

      - panel_id: ep009_016
        scene: |
          Close — Mira sitting on the bench, the canvas tote beside her.
          She is not on her phone. Just sitting.
        beat_type: micro

      - panel_id: ep009_017
        scene: |
          Close — Mira's hand on the bench's wooden slat. Sun-warmed.
          She feels the grain.
        beat_type: micro
        intent: "Sensory anchor — but without the meta-noticing"

      # ── LONG DROP — the bench, daytime ─────────────────────────────────
      - panel_id: ep009_018
        scene: |
          Wide silent panel. Mira on the bench, head tipped back slightly,
          eyes closed. The afternoon sun on her face. A small fern beside
          the bench, jade-green. A child laughing somewhere in the
          distance, but the panel itself is composed silent — NO TEXT,
          NO CAPTION, NO SFX. Deliberate empty sky.
        beat_type: long_drop
        intent: "LONG DROP — daytime, no precipitating event. Just the bench."
        silence_confirmed: true
        dialogue_lines: []

      - panel_id: ep009_019
        scene: |
          Close — the small fern beside the bench. Jade-green, slightly
          translucent in the sun. The visual rhyme catches Mira's eye as
          she opens hers and stands.
        beat_type: micro
        intent: "ANCHOR — the practice is visible to her without effort"

      # ── WALK HOME ──────────────────────────────────────────────────────
      - panel_id: ep009_020
        scene: |
          Mira walking back, canvas tote with the lemon and basil and
          milk. Soft afternoon light. She passes the same fallen petal
          on the sidewalk — a small smile she does not perform.
        beat_type: spatial
        intent: "Continuity — the small returning"

      - panel_id: ep009_021
        scene: |
          Mira at the door of her apartment building. The lobby light
          warm. She is humming faintly — the reader sees the wave of her
          mouth, no SFX.
        beat_type: micro
        intent: "Subtle joy — not articulated"

      # ── COMPLETION — apartment, evening light ─────────────────────────
      - panel_id: ep009_022
        scene: |
          Mira in her kitchen, unpacking the tote bag onto the counter.
          The lemon, the basil, the milk. The succulent on the sill
          visible behind, the late afternoon light fading toward evening.
        beat_type: standard

      - panel_id: ep009_023
        scene: |
          Close — Mira's hand setting the basil into a small glass of
          water by the windowsill, next to the succulent. The two greens
          beside each other.
        beat_type: micro
        intent: "ANCHOR — the visual rhyme is now a habit of placement"

      - panel_id: ep009_024
        scene: |
          Cut to early evening. Mira on the couch, the paperback from
          ep_006 in her lap, reading. The candle on the side table lit.
          Soft cream-gold light.
        beat_type: spatial
        intent: "Bookend nod to ep_006 — the apartment in evening register"

      # ── COMPLETION — kettle, the bookend ───────────────────────────────
      - panel_id: ep009_025
        scene: |
          The kettle on the stove, just beginning to steam. Same kettle.
          The evening sky purple-blue through the kitchen window beyond.
        beat_type: spatial
        sfx_by_locale:
          en_US: ["hsss..."]

      - panel_id: ep009_026
        scene: |
          Final panel — Mira at the kitchen table with the cup of tea.
          The basil in the glass and the succulent in the pot side by
          side on the windowsill behind her. Jade pendant at her neck.
          Eyes peaceful. Caption strip below.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "Nothing happened today. That is the practice."
        dialogue_lines: []

