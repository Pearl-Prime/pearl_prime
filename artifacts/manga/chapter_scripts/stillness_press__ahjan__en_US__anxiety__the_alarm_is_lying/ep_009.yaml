# WRITER NOTES
# ═══════════════════════════════════════════════════════════════════════════
notes:
  arc_position: |
    Episode 9 of 10. The hardest iyashikei beat in the series to write:
    NOTHING happens. The doctrinal point is that the practice has become
    invisible to Mira (she does not touch the pendant once the entire
    episode — the only episode where this is true) but visible to the
    reader (the small fern beside the bench catches her eye, the basil
    placed beside the succulent, the small smile at the same petal on
    the sidewalk). The practice is now part of seeing, not a separate
    technique. The closing caption "Nothing happened today. That is the
    practice." names this directly — the most direct doctrinal naming
    of the series after ep_007's caption.
  pacing_vs_prior: |
    26 panels — lightest of the series. Most extreme activation:ground
    ratio so far (4:22 — well below 1:2.5 cap). The episode is mostly
    GROUND. No phone calls, no people-conversations, no work, no
    family. The activation at panel 5 is the only spike and it is met
    without ritual.
  continuity_callbacks: |
    - Kettle bookend (panel 25-26)
    - Succulent on the kitchen sill (panel 1, 22, 23, 26) — present in
      4 panels, more visible than usual; the visual rhyme is the episode's
      theme
    - Jade pendant — worn from waking (panel 1 implicit, panel 26 explicit)
      but NEVER TOUCHED across the entire episode. The first and only
      episode this is true. Doctrinally important: the practice has
      moved below the level of the anchor gesture.
    - Basil — NEW prop introduced this episode (callback to ep_006's
      mother's basil + window box). Placed beside the succulent at
      panel 23 — visual rhyme to home and to mother both
    - Park bench — second time the series visits a park bench (ep_003
      was the first). Different bench, different park, different time
      of day. Visual variety preserved.
    - Cream sweater + leggings — same character lock-in
    - Smoke detector image — absent
    - "It is not danger" caption — absent
  craft_notes: |
    The challenge of this episode is keeping the reader engaged through
    sustained quiet. The Awe-Pullback at panel 13 and the Long Drop at
    panel 18 provide compositional scale-resets. The micro/spatial beat
    ratio is heavy (panels 1, 3-9, 11-12, 15-17, 19-21, 23 = ~16 micro/
    spatial beats out of 26 total). The reader's engagement is held by
    the visual rhyme system (sun stripe → cup → fern → basil → window
    light) — the practice as visible-to-reader-not-to-Mira.
  long_drop_position: |
    Panel 18 — daytime park bench. Ninth Long Drop. Departs from the
    convention of Long Drop following hard interaction — this one
    follows nothing in particular, which is the point. The day permits
    the bench. Iyashikei doctrinal claim: ordinary moments can hold
    long-drop weight when the body has the practice.
  closing_caption: |
    "Nothing happened today. That is the practice." Two sentences.
    The most direct doctrinal naming in the series. Justified by this
    being the doctrinal pivot — the episode that establishes mastery
    is invisible. Without this caption, the reader could miss the
    point and feel the episode is "boring" rather than "the achievement."
  translation_handoff: |
    Same as prior episodes. New locked phrase: "Nothing happened today.
    That is the practice." (panel 26).

