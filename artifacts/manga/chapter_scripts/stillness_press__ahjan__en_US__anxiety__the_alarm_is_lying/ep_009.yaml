# ═══════════════════════════════════════════════════════════════════════════
# CHAPTER SCRIPT — The Alarm Is Lying — Episode 9
# ═══════════════════════════════════════════════════════════════════════════
# Series:        stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
# Episode:       ep_009 — "Saturday, 2:38 PM"
# Author (EI):   Hana Tidecalm
# Teacher:       ahjan
# Engine:        false_alarm
# Genre:         iyashikei
# Style:         cozy_iyashikei
#
# Continuity from ep_008:
#   Two weeks later. The hardest iyashikei episode to write: nothing
#   dramatic happens. Mira does the laundry, walks to the corner store,
#   sits on a bench in the late-spring sun, comes home. The practice
#   has become so settled she no longer reaches for it. The episode's
#   doctrinal contribution: this is what mastery looks like — invisible,
#   unceremonious, an ordinary afternoon.
#
# Episode arc — the practice as invisible:
#   safety opening (folding laundry, sunlight) → no climax (one tiny
#   moment of activation, met without effort) → continued ground (walking,
#   sitting, watching) → Long Drop (the bench in the small park) →
#   completion (back home, the apartment, evening)
#
# SCROLL THERAPEUTIC TEST:
#   1. Safety cue inside first 800 px ........ ✓ panel 1 (folded laundry + sun stripe)
#   2. ≥3 oscillations activation/ground ...... ✓ 3 oscillations (minimum; the episode IS ground)
#   3. Activation:Ground ≤ 1:2.5 .............. ✓ ~4 activation / ~22 ground panels — most extreme ratio
#   4. Closes with completion ................. ✓ panels 24-26 settle (already settled all episode)
#   5. HRV-style end-state delta .............. (Phase 2)
#
# CRAFT FORMULAS (the most subtractive episode):
#   Tea Beat (panel 26 closing only — Saturday afternoon opens on laundry)
#   Anchor Panel — apartment succulent (panel 1) and a different bench
#     park-plant the practice catches on the way home (panel 19)
#   Awe-Pullback (panel 13 — small neighborhood street wide, no people)
#   Pendulation Pair (MINIMAL — only 7-8 and 12-13; the episode is mostly
#     all ground)
#   Long Drop (panel 18 — park bench, this time during the day, not after
#     a hard interaction; just the bench as Saturday afternoon allows)
#   Continuity callback: jade pendant present (panel 1 = on her neck
#     waking up; panel 26 = still on; she does not touch it once the
#     whole episode. The practice is below the level of needing the
#     anchor.)
#
# DOCTRINAL ANCHOR:
#   This is the hardest doctrinal claim of the series: the practice
#   eventually becomes invisible to the practitioner. Not gone —
#   functioning. The reader sees what Mira no longer sees: the small
#   moments where the practice would have caught her, except the practice
#   has so settled into background presence that there is nothing to
#   catch. This is iyashikei's truest expression: the work is to disappear.
#
# ═══════════════════════════════════════════════════════════════════════════

