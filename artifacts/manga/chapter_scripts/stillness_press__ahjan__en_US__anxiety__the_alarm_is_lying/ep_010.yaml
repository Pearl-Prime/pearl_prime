# WRITER NOTES
# ═══════════════════════════════════════════════════════════════════════════
notes:
  arc_position: |
    Episode 10 of 10 — series finale. Structurally a mirror of ep_001:
    same time of day (Tuesday 6:47 AM), same bedroom, same bedside
    table, same kind of phone notification (Q-review). The differences
    are entirely in the body and in the small added elements (succulent
    on the bedside table now; the basil; the river walk; the notebook).
    The series closes on the SAME composition it opened on — a window,
    the green of plants, the dawn light — with the closing caption
    paying off the title.
  pacing_vs_prior: |
    30 panels — matches ep_001's panel count exactly (mirror structure).
    Activation:Ground roughly 6:24, the steadiest ratio of the series.
    The river walk panels (16-22) take up the middle third, providing
    the broadest spatial register of the whole series — the AWE-PULLBACK
    at panel 19 is series-broadest, deliberately.
  continuity_callbacks: |
    - Tea kettle (panel 13, 24, 26) — same kettle, full bookend with ep_001
    - Succulent — now on the BEDSIDE table (panel 1, 4, 9) AND on the
      kitchen sill (panel 12, 23, 30). Two of them. The practice has
      multiplied without being noticed.
    - Basil (panel 12, 23, 30) — callback to ep_006's mother's basil +
      ep_009's window placement; still alive after weeks
    - Jade pendant — on the bedside table at open (panel 4), held but
      not worn for the river walk, BACK ON the neck for the kitchen
      morning ritual at panel 25
    - Smoke detector image — RETURNS at panel 11 as a brief visual
      callback. Mira sees it and smiles. The teaching image is now
      part of the apartment furniture; it does not anchor anything,
      it is just an old friend in the corner of the frame.
    - Q-review notification — direct mirror of ep_001 panel 4's
      phone notification. Same kind of trigger; the difference is in
      Mira, not in the world.
    - Cream sweater (pajama-top register) — same character lock-in
    - River — NEW location not used in any prior episode. The series-
      broadest spatial register is reserved for the closing.
  craft_notes: |
    The mirror-structure with ep_001 is the entire reason the series can
    close. The reader carries ep_001's composition in their body from
    panel 1; ep_010's opening hits the same composition and the reader
    immediately registers SAME-but-DIFFERENT. The body recognition
    happens at the visual level before the narrative explains it. By
    panel 11 (the smoke detector callback) the reader knows: this is
    the same room, this is the same kind of morning, and the woman in
    it has changed without becoming someone else.
  long_drop_position: |
    Panel 22 — river walk silent. Tenth Long Drop, tenth distinct
    location. The series closes on Mira IN MOTION (walking forward
    into the dawn light) rather than seated. Doctrinal choice: the
    practice is not stillness, it is the returning-while-moving.
  closing_caption: |
    "The alarm will go off. I will come back. The alarm is lying about
    which one of us is steady." Three sentences. Names the title for
    the first time in the series (no prior episode uses "the alarm is
    lying" verbatim). The caption pays off the entire 10-episode arc:
    the alarm is the body's response, real and recurrent; the steady
    one is Mira, present beneath the noise. The reader closes the
    series carrying that frame.
  series_doctrinal_summary: |
    The series articulates ahjan's framework across ten ordinary moments:
    morning (1), work review (2), family (3), insomnia (4), peer
    disclosure (5), parent honesty (6), imperfect practice (7),
    vulnerability with a stranger (8), invisible practice (9), full
    bookend (10). Each episode demonstrates the practice in a different
    register without resolving anxiety. The closing position: anxiety
    is recurrent; the practice is reliable; the body that practices
    is the steady one. Iyashikei convention preserved throughout: no
    mastery, no healing-as-state, no salvation arc. Just one woman
    learning to come back.
  translation_handoff: |
    Same as prior episodes. Final closing caption locked phrase: "The
    alarm will go off. I will come back. The alarm is lying about
    which one of us is steady." All ten episodes ready for batch
    translation via scripts/manga/translate_chapter_script.py.

