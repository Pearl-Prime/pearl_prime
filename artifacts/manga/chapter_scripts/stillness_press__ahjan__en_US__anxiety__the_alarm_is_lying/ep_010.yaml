# ═══════════════════════════════════════════════════════════════════════════
# PAGES (30 panels — matches ep_001's count; mirror structure)
# ═══════════════════════════════════════════════════════════════════════════

pages:
  - page_id: ep_010_p01
    panels:

      # ── OPENING — bedroom at dawn, MIRRORS ep_001 panel 1 ──────────────
      - panel_id: ep010_001
        scene: |
          Close-up — same bedside table as ep_001. The lamp off. The
          phone face-down. The clock showing 6:47. The succulent in
          a small pot on the nightstand (NEW position — moved here
          from the windowsill weeks ago). Soft dawn light coming
          through gauze curtains. Same dappled-tree-shadow on the
          opposite wall as ep_001.
        beat_type: ~
        intent: "MIRROR of ep_001 panel 1 — same composition, with the addition of the succulent"
        silence_confirmed: true

      - panel_id: ep010_002
        scene: |
          Wider — the bedroom. Mira asleep in the bed, hair loose, soft
          black bottoms + cream sweater pajama-top. The dawn light same
          as ep_001. Bedsheets rumpled. She is breathing slow.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "Tuesday. Six forty-seven."

      - panel_id: ep010_003
        scene: |
          Close — Mira's eyes opening naturally. Slow. No alarm. She has
          woken before the phone could.
        beat_type: micro
        intent: "Difference from ep_001 — body knows the rhythm now"

      - panel_id: ep010_004
        scene: |
          Mira's hand reaching out, picking up the jade pendant from the
          bedside table beside the succulent. Soft motion. She does not
          put it on yet.
        beat_type: micro
        intent: "Morning ritual — present-tense, unhurried"

      # ── RAMP — the phone, the same notification kind ───────────────────
      - panel_id: ep010_005
        scene: |
          The phone face-down on the bedside table lights up briefly,
          edge-glow visible. Quiet vibration.
        beat_type: spatial
        intent: "MIRROR of ep_001 panel 4 — same compositional language"
        sfx_by_locale:
          en_US: ["brr..."]

      - panel_id: ep010_006
        scene: |
          Mira picking up the phone. The notification: "Q-review prep —
          Thursday 10am". She reads it. Sets the phone screen-down again.
          A small breath.
        beat_type: micro
        intent: "Activation 1 — same kind of trigger as ep_001; smaller body response"
        sfx_by_locale:
          en_US: ["..."]

      # ── GROUND 1 — fast settle ─────────────────────────────────────────
      - panel_id: ep010_007
        scene: |
          Close on Mira's chest. Slight tightening, then visible exhale.
          The shoulders settle within the same panel-beat. Fast.
        beat_type: micro
        intent: "MIRROR of ep_001 panel 5 — same physiology, faster recovery"

      - panel_id: ep010_008
        scene: |
          Mira sitting up against the headboard now. Hair loose. She is
          looking at the succulent on the bedside table.
        beat_type: spatial
        intent: "Pendulation — the anchor is right there"

      - panel_id: ep010_009
        scene: |
          Close on the succulent. The same jade green. A new tiny growth
          at the center of the rosette — six weeks of growth visible.
        beat_type: micro
        intent: "ANCHOR — and a visible record of time passed"

      # ── A QUIET BEAT — the body checks itself ──────────────────────────
      - panel_id: ep010_010
        scene: |
          Mira's hand at her own chest, lightly. A confirming touch. Not
          the pendant — just the body.
        beat_type: micro
        intent: "Practice without the prop — body to body"

      # ── A CALLBACK — the smoke detector returns, briefly ───────────────
      - panel_id: ep010_011
        scene: |
          Mid-shot — Mira up now, walking to the kitchen. Through the
          doorway, a small smoke detector on the ceiling visible in the
          corner of the frame. She glances at it. A small acknowledging
          smile. Walks on.
        beat_type: micro
        intent: "DOCTRINAL CALLBACK — the original teaching image, now an old friend"

      # ── KITCHEN — morning ritual ───────────────────────────────────────
      - panel_id: ep010_012
        scene: |
          Wide — the kitchen at dawn. Window full of pale dawn light. The
          original succulent on the sill (the parent of the bedside one)
          + the basil in its glass beside it. Mira at the counter, filling
          the kettle.
        beat_type: standard

      - panel_id: ep010_013
        scene: |
          Close on the kettle going onto the burner. Same kettle. Same
          gesture. The motion is sure.
        beat_type: micro
        sfx_by_locale:
          en_US: ["hsss..."]

  - page_id: ep_010_p02
    panels:

      # ── DECISION — walk to the river before work ───────────────────────
      - panel_id: ep010_014
        scene: |
          Mira at the counter, looking out the window. A small choice
          forming. She turns toward the door.
        beat_type: micro
        intent: "Choice — pre-work walk, an act of practice"

      - panel_id: ep010_015
        scene: |
          Mira at the door. The kettle whistling softly behind her — she
          turns it off (the tea will wait). Pulling on a long cardigan
          over the pajama-top. Sneakers, no socks.
        beat_type: spatial
        intent: "Trust — the morning will hold; the river is the priority"

      # ── RIVER WALK — morning light ─────────────────────────────────────
      - panel_id: ep010_016
        scene: |
          Cut to a river path. Pale rose-gold sunrise behind the city
          skyline across the water. Cool morning air visible in Mira's
          breath. A few joggers in the distance. She is walking slowly,
          hands in cardigan pockets.
        beat_type: standard
        intent: "BROADEST scene of the series — air and sky"

      - panel_id: ep010_017
        scene: |
          Close — Mira's face, looking out across the water. Hair lifted
          slightly by the dawn breeze. Eyes peaceful, awake.
        beat_type: micro

      - panel_id: ep010_018
        scene: |
          Close on a small leaf on the river path beside Mira's foot.
          Jade green, dew-bright. The visual rhyme catches her without
          her reaching for it.
        beat_type: micro
        intent: "ANCHOR — the practice has become a way of seeing"

      # ── AWE-PULLBACK — river wide ──────────────────────────────────────
      - panel_id: ep010_019
        scene: |
          Wide pullback. The river path along the water at sunrise. The
          city skyline far in the back, pale dawn rose-gold. Mira small
          in the foreground, cardigan over pajamas, hair loose. A few
          birds crossing the sky. The widest panel of the entire series.
          Intentionally over-wide.
        beat_type: miyazaki_ma
        intent: "AWE-PULLBACK — series-broadest. The world is large; Mira is held."
        silence_confirmed: true

      # ── A SMALL HUMAN — passing acknowledgment ─────────────────────────
      - panel_id: ep010_020
        scene: |
          Mira passing an older woman walking a small dog on the path.
          They nod at each other in the dawn quiet. The dog briefly
          sniffs at Mira's shoe. The woman smiles.
        beat_type: micro
        intent: "Quiet sociality — the practice in the world among others"

      - panel_id: ep010_021
        scene: |
          Mid-shot — Mira at a bench by the river. She does not sit
          down. Just rests her hand briefly on the back of it. Then
          continues walking.
        beat_type: micro
        intent: "Pre-LONG-DROP beat — she does not need to stop"

      # ── LONG DROP — river walk silent ──────────────────────────────────
      - panel_id: ep010_022
        scene: |
          Wide silent panel. Mira walking along the river path, away from
          the camera, into the rose-gold dawn light. The city skyline
          on the right. Trees on the left. The path stretches ahead.
          NO TEXT, NO CAPTION, NO SFX. The Long Drop is the act of
          continuing, not stopping.
        beat_type: long_drop
        intent: "LONG DROP — series-final; the practice as forward motion"
        silence_confirmed: true
        dialogue_lines: []

      # ── HOME — the kitchen, full morning now ───────────────────────────
      - panel_id: ep010_023
        scene: |
          Cut to Mira back in the apartment, full morning sun now through
          the kitchen window. The cardigan over the back of a chair. She
          is at the counter, filling the kettle again. The succulent + basil
          in the window catching the morning light.
        beat_type: standard
        intent: "Return — the morning resumes"

      - panel_id: ep010_024
        scene: |
          Close on the kettle on the burner — same kettle as every
          episode. The flame just starting under it.
        beat_type: spatial
        sfx_by_locale:
          en_US: ["click..."]

      - panel_id: ep010_025
        scene: |
          Mira fastening the jade pendant around her neck now. The morning
          ritual completing. The kitchen window full of light behind her.
        beat_type: micro
        intent: "Pendant ON — completion of the morning practice"

      - panel_id: ep010_026
        scene: |
          The kettle steaming. The succulent in the window. The basil
          beside it.
        beat_type: spatial
        sfx_by_locale:
          en_US: ["hsss..."]

      # ── COMPLETION — table, tea, the closing ──────────────────────────
      - panel_id: ep010_027
        scene: |
          Mira at the kitchen table. Fresh tea in the same kind of clay
          mug from ep_001. She has settled in. A small open notebook
          beside the mug — she is writing something briefly.
        beat_type: standard

      - panel_id: ep010_028
        scene: |
          Close — Mira's hand writing in the notebook. The line visible:
          "Q-review Thursday — bring the user data printouts. Plant water
          tonight."
        beat_type: micro
        intent: "Ordinary list — the practice is the day continuing"

      - panel_id: ep010_029
        scene: |
          Mid-shot — Mira sipping her tea, looking out the kitchen window
          at the full morning. Her face soft, present. Hair still loose
          from sleep. Pendant at her neck.
        beat_type: micro

      # ── SERIES CLOSING PANEL ──────────────────────────────────────────
      - panel_id: ep010_030
        scene: |
          Final panel of the series — close on the kitchen window. The
          succulent + basil side by side. Beyond them, a slice of dawn-
          gold city. Mira's reflection faintly visible in the glass —
          she is at the table behind, blurred by depth. Caption strip
          below.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "The alarm will go off. I will come back. The alarm is lying about which one of us is steady."
        dialogue_lines: []

