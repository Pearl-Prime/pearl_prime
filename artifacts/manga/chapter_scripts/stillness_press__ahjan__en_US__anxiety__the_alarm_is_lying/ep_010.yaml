# ═══════════════════════════════════════════════════════════════════════════
# CHAPTER SCRIPT — The Alarm Is Lying — Episode 10 (FINALE)
# ═══════════════════════════════════════════════════════════════════════════
# Series:        stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
# Episode:       ep_010 — "Tuesday, 6:47 AM" (SIX WEEKS LATER)
# Author (EI):   Hana Tidecalm
# Teacher:       ahjan
# Engine:        false_alarm
# Genre:         iyashikei
# Style:         cozy_iyashikei
#
# Continuity from ep_009 + bookend to ep_001:
#   Six weeks after the original Tuesday morning. SAME TIME OF DAY,
#   SAME BEDROOM, SAME BEDSIDE TABLE, similar context (another Q-review
#   in two days). The body responds. The body settles. The practice is
#   fully integrated. The episode is structurally a mirror of ep_001 —
#   same beats, same setting, but the relationship to the alarm has
#   changed. The series CLOSES on the same composition it OPENED on,
#   with one new element.
#
# Episode arc — the bookend:
#   safety opening (bedroom dawn — same composition as ep_001) → small
#   ramp (the phone notification arrives — same one shape) → ground
#   (Mira's response is faster, smaller, no fanfare) → climax (Mira
#   sees herself in the bedside mirror briefly — the visual completion
#   beat) → Long Drop (morning walk by the river, sunrise) → completion
#   (kettle, kitchen, tea — the bookend with ep_001 + closing line of
#   the series)
#
# SCROLL THERAPEUTIC TEST:
#   1. Safety cue inside first 800 px ........ ✓ panel 1 (bedside lamp halo on succulent)
#   2. ≥3 oscillations activation/ground ...... ✓ 3 oscillations
#   3. Activation:Ground ≤ 1:2.5 .............. ✓ ~6 activation / ~24 ground panels
#   4. Closes with completion ................. ✓ panels 28-30 settle (full series close)
#   5. HRV-style end-state delta .............. (Phase 2)
#
# CRAFT FORMULAS:
#   Tea Beat (panels 1-2 morning beat + 30 closing — full bookend with ep_001)
#   Anchor Panel — the bedside succulent (panel 1, 4, 30) — the original
#     ep_001 anchor returns; the closing rhyme of the series
#   Awe-Pullback (panel 19 — river path wide at sunrise — broadest of the series)
#   Pendulation Pair (5-7 ↔ 8-10, 13-15 ↔ 16-18)
#   Long Drop (panel 22 — river walk, silent, sunrise)
#   Continuity callback: jade pendant + succulent + kettle (all returning);
#   smoke detector image RETURNS at panel 11 (briefly, as a visual call-
#   back, no longer functioning as anchor; Mira sees it without needing it)
#
# DOCTRINAL ANCHOR:
#   The series closes on the same body, same room, same kind of morning
#   as ep_001 — but the practice has remade what those mean. The reader's
#   last impression: this is not a story of a woman who got fixed. This
#   is a story of a woman who learned to come back. The closing line
#   pays off the title.
#
# ═══════════════════════════════════════════════════════════════════════════

