# ═══════════════════════════════════════════════════════════════════════════
# CHAPTER SCRIPT — The Alarm Is Lying — Episode 8
# ═══════════════════════════════════════════════════════════════════════════
# Series:        stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
# Episode:       ep_008 — "Thursday, 7:23 PM"
# Author (EI):   Hana Tidecalm
# Teacher:       ahjan
# Engine:        false_alarm
# Genre:         iyashikei
# Style:         cozy_iyashikei
#
# Continuity from ep_007:
#   Three days later. The practice as returning, not destination, has
#   settled. Tonight: first date with Kenji — someone Mira met through
#   a friend last month. Different relational stakes than mother / Yara /
#   coworkers. New activation: vulnerability with someone new.
#
# Episode arc — vulnerability with a stranger:
#   safety opening (apartment, getting ready, slow) → ramp (walking
#   to the wine bar) → ground (arrival, eye contact) → climax (Mira
#   shares something true about her week — small honesty, not big
#   confession) → ground (Kenji's response steady, not heroic) →
#   Long Drop (walking home alone, late evening) → completion (kitchen,
#   tea, "I let him see me. He stayed.")
#
# SCROLL THERAPEUTIC TEST:
#   1. Safety cue inside first 800 px ........ ✓ panel 1 (mirror + warm bathroom light)
#   2. ≥3 oscillations activation/ground ...... ✓ 3 oscillations
#   3. Activation:Ground ≤ 1:2.5 .............. ✓ ~7 activation / ~22 ground panels
#   4. Closes with completion ................. ✓ panels 27-29 settle
#   5. HRV-style end-state delta .............. (Phase 2)
#
# CRAFT FORMULAS:
#   Tea Beat (panel 28 closing — kettle bookend returns after absence in ep_007)
#   Anchor Panel — wine bar window plant (panel 11) + apartment succulent
#     (panels 1, 29) — anchor migrates
#   Awe-Pullback (panel 14 — wine bar interior wide, candle-lit)
#   Pendulation Pair (4-6 ↔ 7-9, 13-15 ↔ 16-18, 19-21 ↔ 22-23)
#   Long Drop (panel 24 — walking-home silent solo, dark streets + windows)
#   Continuity callback: jade pendant (panels 7, 17 — both as ground, not
#   fidget — practice settled back after ep_007's nuance lesson)
#
# DOCTRINAL ANCHOR:
#   Vulnerability with a stranger is the next-level test. Kenji is not
#   an old pattern (like mother), not a peer with shared context (like
#   Yara), not a colleague (like Dr. Morimoto). He is a new person. The
#   practice: choose to be seen, without explaining yourself first. The
#   reader leaves knowing Mira allowed real contact.
#
# ═══════════════════════════════════════════════════════════════════════════

