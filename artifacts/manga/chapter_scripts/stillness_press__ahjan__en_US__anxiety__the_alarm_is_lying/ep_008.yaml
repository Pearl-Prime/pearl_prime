# WRITER NOTES
# ═══════════════════════════════════════════════════════════════════════════
notes:
  arc_position: |
    Episode 8 of 10. The vulnerability-with-a-stranger episode. Critical
    placement: it follows ep_007's "practice is not a state" so that
    the reader does NOT mistake this for "Mira is now fully healed and
    ready for love." She is just present enough to let one honest
    sentence land. Kenji is a possibility, not a resolution. Iyashikei
    convention: no kiss, no romantic crescendo, no "happily ever after"
    — just one shared evening that did not pretend.
  pacing_vs_prior: |
    29 panels. Roughly 7 activation / 22 ground (well within 1:2.5).
    The wine bar scene is the longest sustained mid-distance setting
    in the series so far (panels 10-23 = 14 panels in one venue). The
    Long Drop at panel 24 is brief but tonally necessary.
  continuity_callbacks: |
    - Kettle bookend RETURNS (panel 28) after intentional absence in
      ep_007's closing. The kettle is a marker of the evening register
      finding its way back.
    - Jade pendant as ground (panel 7, 17, 25) — explicitly ground,
      not fidget. The series has now distinguished the two and ep_008
      shows the practice settled back to its ground-meaning.
    - Succulent on the kitchen sill (panel 1, 27, 29) — full visual
      bracket on the episode
    - Wine bar pothos plant (panel 11) — the green motif migrates into
      the date-setting; the practice goes everywhere
    - Smoke detector image — absent
    - "It is not danger" caption — absent
    - Cream silk blouse — date-register variation of cream sweater; same
      color family character lock-in
  kenji_handling: |
    Six lines total. Kenji is fully a person, not a romantic device.
    His response at panel 20 — "the kind of thing that takes a year
    to recover from. Or maybe a year to feel grateful for. I don't
    know which yet." — is doctrinally important: he does NOT fix,
    he does NOT minimize, he does NOT escalate the emotional register.
    He acknowledges the size of what Mira shared without making it
    larger than she made it. This is iyashikei + literary fiction
    convention: the right witness for the moment.
  craft_notes: |
    The choice at panel 15 (small-talk version vs honest version) is
    the doctrinal pivot of the episode. Mira has the practice to
    notice the pre-disclosure activation and STILL choose disclosure.
    The teaching reaches its mid-stage maturity: it is not for
    PROTECTING her from contact, it is for ALLOWING her into contact.
  long_drop_position: |
    Panel 24 — solo walk home, late evening. Eighth Long Drop,
    eighth distinct location across the series (kitchen, rooftop,
    park bench, window seat, shared walk, balcony, bathroom mirror,
    solo nighttime walk). Variety holding.
  closing_caption: |
    "I let him see me. He stayed." Two sentences. The simplest
    closing caption in the series so far. Justified by the episode's
    weight being carried in the prose; the caption only names the
    quiet outcome.
  translation_handoff: |
    Same as prior episodes — text_by_locale dicts populated for en_US
    only. New locked phrases: "I let him see me. He stayed." (panel 29);
    Kenji's "the kind of thing that takes a year to recover from"
    (panel 20).

