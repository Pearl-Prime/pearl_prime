    culture, comic shop/community, and phone-native life without sounding like an
    ad for platforms.
  market_touchpoints:
  - group_chat
  - discord_server
  - short_video_clip
  - school_bus_or_subway
  - comic_shop
  - mall_food_court
  - campus_library
  - delivery_app
  - controller
  - streaming_queue
  market_guardrails:
  - avoid_fake_japanese_surface_for_us_scene
  - make_city_transport_specific_if_used
  - do_not_overexplain_anime_fandom
  audience_story_rule: Treat online identity, economic pressure, burnout, social
