  catalyst:
    id: counting_down_to_the_review_meeting
    logline: The Q3 review meeting Mira has been dreading all episode arrives on
      schedule, and the ceiling smoke detector's image returns inside the meeting
      room itself to test whether yesterday's reframe holds under real professional
      stakes, not only at her own kitchen table.
    ordinary_world_objects:
    - elevator
    - meeting_room
    - smoke_detector
    - jade_pendant
    genre_transmutation: The scheduled work review becomes the live-fire test of
      the alarm-system reframe; the smoke detector image returning on the meeting-room
      ceiling proves the same false alarm fires under real stakes, and can still
      be witnessed rather than obeyed, even imperfectly.
    avoid:
    - instant_cure
    - influencer_wellness_lecture
  quality_rubric:
