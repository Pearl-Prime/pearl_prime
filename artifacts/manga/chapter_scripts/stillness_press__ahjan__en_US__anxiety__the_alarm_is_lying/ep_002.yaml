# ═══════════════════════════════════════════════════════════════════════════
# CHAPTER SCRIPT — The Alarm Is Lying — Episode 2
# ═══════════════════════════════════════════════════════════════════════════
# Series:        stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
# Episode:       ep_002 — "The Same Tuesday, 9:48 AM"
# Author (EI):   Hana Tidecalm
# Teacher:       ahjan (Buddhist contemporary; alarm-systems / pause)
# Engine:        false_alarm
# Genre:         iyashikei
# Style:         cozy_iyashikei
#
# Continuity from ep_001:
#   Same Tuesday. Same Mira Aoki. Same cream sweater (slightly different
#   moment — work jacket over it now). The teaching landed quietly at
#   home. Q3 review is in 12 minutes.
#
# Episode arc — applying the teaching live:
#   activation (real, persistent) → ground (smaller, steadier this time)
#   → climax (the review actually happens, partial application, not perfect)
#   → Long Drop (post-meeting decompression on the rooftop)
#   → completion (home, kettle bookend, "I noticed it once. That's enough.")
#
# SCROLL THERAPEUTIC TEST (PR #631 Decision 6):
#   1. Safety cue inside first 800 px ........ ✓ panel 1 (warm sunlight + tea cup memory beat)
#   2. ≥3 oscillations activation/ground ...... ✓ 4 oscillations
#   3. Activation:Ground ≤ 1:2.5 .............. ✓ ~10 activation / ~22 ground panels
#   4. Closes with completion ................. ✓ panels 30-32 settle
#   5. HRV-style end-state delta .............. (Phase 2)
#
# CRAFT FORMULAS (different mix from ep_001 — avoid repetition):
#   Tea Beat (panels 1-2 callback, 32 closing)
#   Anchor Panel — NEW anchor (lobby plant, panels 9-10)
#   Awe-Pullback (panel 14 — office window city skyline, once-per-arc cousin)
#   Pendulation Pair (5-7 ↔ 8-11, 12-15 ↔ 16-19, 20-22 ↔ 23-25)
#   Long Drop (panel 29 — rooftop wide silent)
#   Continuity callback: smoke detector image returns once (panel 18)
#
# ═══════════════════════════════════════════════════════════════════════════

