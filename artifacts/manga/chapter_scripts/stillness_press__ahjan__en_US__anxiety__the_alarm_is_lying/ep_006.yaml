# ═══════════════════════════════════════════════════════════════════════════
# PAGES (28 panels)
# ═══════════════════════════════════════════════════════════════════════════

pages:
  - page_id: ep_006_p01
    panels:

      # ── OPENING — Sunday couch, slow afternoon ─────────────────────────
      - panel_id: ep006_001
        scene: |
          Close-up — the corner of a soft couch, warm afternoon light from
          a window pooling on a cream-colored throw blanket. A paperback
          book face-down on the cushion. A small clay mug of cold tea
          nearby, half-empty.
        beat_type: ~
        intent: "SAFETY CUE first 800 px — Sunday afternoon at-home register"
        silence_confirmed: true

      - panel_id: ep006_002
        scene: |
          Wider — Mira on the couch, knees up, hair loose, in cream
          sweater + soft black leggings. She's reading, or has been —
          eyes half-lidded with the afternoon. Apartment quiet.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "Sunday. Three forty-seven."

      # ── RAMP — the phone ────────────────────────────────────────────────
      - panel_id: ep006_003
        scene: |
          The phone on the side table lights up. Screen: "Mom — incoming".
          A small heart icon next to her name.
        beat_type: spatial
        intent: "Trigger — known, warm, but loaded by ep_003 history"

      - panel_id: ep006_004
        scene: |
          Close on Mira — book lowered, eyes on the phone. Her hand briefly
          finds the jade pendant. A small exhale before she picks up.
        beat_type: micro
        intent: "Pre-emptive ground — practice fires before activation peaks"

      - panel_id: ep006_005
        scene: |
          Mira lifting the phone to her ear, settling back against the
          couch arm. Knees still up. Voice gentle.
        beat_type: micro
        dialogue_lines:
          - speaker: mira
            text_by_locale:
              en_US: "Hi, Mom."
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: bottom_left

      # ── GROUND 1 — small-talk warmth ────────────────────────────────────
      - panel_id: ep006_006
        scene: |
          Mid-shot — Mira on the couch, phone to her ear, faint smile. The
          apartment's afternoon light unchanged.
        beat_type: spatial
        dialogue_lines:
          - speaker: mother
            text_by_locale:
              en_US: "I was just thinking about you. The garden's finally turning."
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: top_right

      - panel_id: ep006_007
        scene: |
          Small inset panel (top-right corner) — mother in her kitchen,
          one hand on a phone, the other on a window box of small herbs.
          Soft suburban afternoon light.
        beat_type: micro
        intent: "Voice-companion image — situating the mother visually for a beat"

      - panel_id: ep006_008
        scene: |
          Back to Mira — laughing softly at something her mother said.
          Hand absently smoothing the blanket.
        beat_type: micro
        dialogue_lines:
          - speaker: mira
            text_by_locale:
              en_US: "Tell the basil I said hi."
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: bottom_right

      # ── ACTIVATION 1 — the topic shifts ─────────────────────────────────
      - panel_id: ep006_009
        scene: |
          Close — Mira's face. Tone of the call has changed. Eyes drift
          to the window, jaw setting slightly. The body knows before
          the mind catches up.
        beat_type: micro
        intent: "Activation 1 — relational shift; old pattern incoming"
        sfx_by_locale:
          en_US: ["..."]

  - page_id: ep_006_p02
    panels:

      # ── ESCALATION — the worry is named ─────────────────────────────────
      - panel_id: ep006_010
        scene: |
          Small inset (top-left) — mother's face, soft mauve cardigan,
          looking at her own window. Worry-lines around the eyes, but
          gentle. She is choosing her words.
        beat_type: micro
        dialogue_lines:
          - speaker: mother
            text_by_locale:
              en_US: "Sweetheart. I worry about you sometimes. I have for a while."
            intensity: tender
            bubble_style: round_normal
            tail_style: pointer
            position_hint: top_left

      # ── PEAK ACTIVATION — old reflex rises ──────────────────────────────
      - panel_id: ep006_011
        scene: |
          Close on Mira's hand gripping the phone slightly tighter. The
          knuckles a fraction paler. The old reflex (defend / reassure /
          deflect) is rising fast.
        beat_type: micro
        intent: "Activation 2 — peak; the old armor wants to deploy"
        sfx_by_locale:
          en_US: ["thud-thud..."]

      - panel_id: ep006_012
        scene: |
          Close on Mira's other hand finding the jade pendant. Three
          fingers this time, holding. Eyes closing briefly.
        beat_type: micro
        intent: "Pendulation — the practice fires before the deflection can"

      - panel_id: ep006_013
        scene: |
          Mira's face — eyes open again, settled. The shoulders have not
          dropped (this is hard), but they have stopped rising.
        beat_type: micro

      # ── GROUND 2 — Mira answers honestly ────────────────────────────────
      - panel_id: ep006_014
        scene: |
          Wider — Mira on the couch, light unchanged, phone still to ear.
          The room is warm and held.
        beat_type: spatial
        dialogue_lines:
          - speaker: mira
            text_by_locale:
              en_US: "I know. I have been — anxious. For a long time. I am working on it."
            intensity: tender
            bubble_style: round_normal
            tail_style: pointer
            position_hint: bottom_left

      - panel_id: ep006_015
        scene: |
          Close on Mira — small breath after the sentence. The relief of
          NOT defending. The body registers something unfamiliar: honest.
        beat_type: micro
        intent: "First-time-honest beat — the practice meets old armor and softens it"

      # ── AWE-PULLBACK — apartment window ─────────────────────────────────
      - panel_id: ep006_016
        scene: |
          Wide pullback through the apartment window. From outside-looking-in:
          the warm light of the living room, Mira small on the couch with
          the phone, the succulent visible on the kitchen sill beyond.
          Outside: the small block, late golden hour, a tree, a corner of
          sky. Intentionally over-wide.
        beat_type: miyazaki_ma
        intent: "AWE-PULLBACK — the conversation held inside the apartment's container"

      # ── GROUND 3 — mother receives, doesn't fix ─────────────────────────
      - panel_id: ep006_017
        scene: |
          Small inset (center-top) — mother's face. The crinkle around her
          eyes deepens. Listening. A long quiet on her side of the line.
        beat_type: micro
        intent: "Witness — mother receives without trying to fix"

      - panel_id: ep006_018
        scene: |
          Close on Mira — soft smile, eyes wet but not spilling. Phone
          still to ear. The silence on both ends is held, not awkward.
        beat_type: micro
        intent: "Shared silence — same beat-shape as ep_005 panel 23 but in phone-register"
        silence_confirmed: true

      - panel_id: ep006_019
        scene: |
          Small inset (top-right) — mother, finally speaking. Her own
          voice steady.
        beat_type: micro
        dialogue_lines:
          - speaker: mother
            text_by_locale:
              en_US: "Thank you for telling me."
            intensity: tender
            bubble_style: round_normal
            tail_style: pointer
            position_hint: top_right

      # ── COMPLETION-WITHIN — the call winds down ────────────────────────
      - panel_id: ep006_020
        scene: |
          Mid-shot — Mira on the couch, eyes closed for a second. A long
          exhale. The afternoon light a fraction warmer now (time passing).
        beat_type: spatial

      - panel_id: ep006_021
        scene: |
          Close — Mira's mouth, gentle smile.
        beat_type: micro
        dialogue_lines:
          - speaker: mira
            text_by_locale:
              en_US: "I love you, Mom."
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: bottom_right

      - panel_id: ep006_022
        scene: |
          Phone setting back down on the side table. Mira's hand still
          near it, fingers loose.
        beat_type: micro

      # ── LONG DROP — balcony, sky, silent ──────────────────────────────
      - panel_id: ep006_023
        scene: |
          Wide silent panel. Mira on a small balcony (sliding door behind
          her, still in cream sweater). Hands on the railing. The
          neighborhood low-rise below, late golden hour, soft Sunday
          quiet. A bird crossing the sky. NO TEXT, NO CAPTION, NO SFX.
          Deliberate empty sky above.
        beat_type: long_drop
        intent: "LONG DROP — post-call decompression. Reader exhales."
        silence_confirmed: true
        dialogue_lines: []

      - panel_id: ep006_024
        scene: |
          Close — Mira's hand on the balcony railing, the jade pendant
          catching the last light of the sun. A small smile she doesn't
          know she's making.
        beat_type: micro

      # ── COMPLETION — kitchen, kettle, the practice has roots ──────────
      - panel_id: ep006_025
        scene: |
          Cut to early evening. Mira's kitchen, warm light on, dusk
          rose-blue in the window beyond. She is at the stove, setting
          the kettle on. Cream sweater unchanged.
        beat_type: standard
        intent: "Scene transition — balcony → kitchen"

      - panel_id: ep006_026
        scene: |
          Close on the kettle, beginning to steam. Same kettle as ep_001-004.
        beat_type: spatial
        sfx_by_locale:
          en_US: ["hsss..."]

      - panel_id: ep006_027
        scene: |
          Wider — Mira at the kitchen table with a fresh cup. The succulent
          on the sill catching the last light. Outside, the dusk has
          fully arrived. Her expression unguarded.
        beat_type: micro

      - panel_id: ep006_028
        scene: |
          Final panel — Mira's hand on the table near the cup, the other
          hand briefly at the jade pendant. Eyes peaceful. Caption strip
          below.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "Old pattern. Same self. Honest now."
        dialogue_lines: []

