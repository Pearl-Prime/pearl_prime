# ═══════════════════════════════════════════════════════════════════════════
# CHAPTER SCRIPT — The Alarm Is Lying — Episode 6
# ═══════════════════════════════════════════════════════════════════════════
# Series:        stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
# Episode:       ep_006 — "Sunday, 3:47 PM"
# Author (EI):   Hana Tidecalm
# Teacher:       ahjan
# Engine:        false_alarm
# Genre:         iyashikei
# Style:         cozy_iyashikei
#
# Continuity from ep_005:
#   Two days after the Yara lunch. Mira's mother calls. The conversation
#   goes longer than usual — old family pattern surfaces (mother's own
#   anxious watching of Mira). Mira meets it without the old armor.
#
# Episode arc — old pattern meets new practice:
#   safety opening (Sunday couch, paperback, late light) → ramp (phone
#   rings — "Mom") → climax (mother voices worry that has been there
#   for years, but kindly) → ground (Mira does not collapse, does not
#   defend, just answers honestly) → Long Drop (after the call, on
#   the balcony) → completion (kitchen, tea, the practice has roots)
#
# SCROLL THERAPEUTIC TEST:
#   1. Safety cue inside first 800 px ........ ✓ panel 1 (couch corner + late Sunday light)
#   2. ≥3 oscillations activation/ground ...... ✓ 3 oscillations
#   3. Activation:Ground ≤ 1:2.5 .............. ✓ ~7 activation / ~20 ground panels
#   4. Closes with completion ................. ✓ panels 26-28 settle
#   5. HRV-style end-state delta .............. (Phase 2)
#
# CRAFT FORMULAS:
#   Tea Beat (panels 27-28 closing only — Sunday afternoon doesn't open on tea)
#   Anchor Panel — the couch corner light (panels 1, 14, 28)
#   Awe-Pullback (panel 16 — balcony onto neighborhood at golden hour)
#   Pendulation Pair (3-5 ↔ 6-8, 10-12 ↔ 13-15, 17-19 ↔ 20-22)
#   Long Drop (panel 23 — balcony silent, sky)
#   Continuity callback: jade pendant (panels 4, 12); succulent on the
#   kitchen sill (panel 27) — episode-specific cubicle cutting absent
#   (Mira is at home; the original plant on the windowsill is the anchor)
#
# DOCTRINAL ANCHOR:
#   The hardest test of the practice is family pattern. The mother who
#   loves Mira but also watches her with old worry. Mira's old reflex:
#   defend, withdraw, or smile-through. New posture: answer honestly,
#   without armor, without explanation. The teaching: you can stay
#   present in old patterns without becoming them.
#
# ═══════════════════════════════════════════════════════════════════════════

