# WRITER NOTES
# ═══════════════════════════════════════════════════════════════════════════
notes:
  arc_position: |
    Episode 6 of 10. The hardest interpersonal test so far: the parent
    who has been worrying for years. Mira does not collapse into the old
    armor (defend / reassure / deflect). She answers honestly. The
    mother receives without fixing. Both shift slightly. Iyashikei
    convention: this is not a "breakthrough conversation." It is one
    honest exchange in one Sunday afternoon. The pattern is not
    resolved. The relationship is slightly different.
  pacing_vs_prior: |
    28 panels (tighter than ep_004's 32 and ep_005's 30). The phone-call
    format permits compression — fewer setting changes, more close-ups,
    use of small inset panels for the mother's voice-companion image.
    The Long Drop on the balcony at panel 23 is the visual exhale point.
  continuity_callbacks: |
    - Jade pendant (panel 4, 12, 24) — touch sequence as practice marker
    - Succulent on the kitchen sill (panel 27) — the original ep_003
      windowsill plant; the office cutting from ep_005 is offscreen
    - Kettle bookend (panel 26, 28) — same kettle, episodes 1+2+3+4+6
    - Mother's herbs (panel 7) — visual echo of plant motif, suburban
      register
    - Cream sweater — character lock-in
    - Smoke detector image — absent. The practice is fully internalized;
      no external referent needed.
  mother_handling: |
    Seven lines total. Phone-only (no in-person scene this episode).
    Two small inset panels show her face (panels 7, 10, 17, 19) — the
    composition choice keeps the call FELT but not visually dominated
    by the mother. The mother's worry is fully real; she has been
    holding it for years. Her line "Thank you for telling me" (panel
    19) is the iyashikei convention of small mutual shift, not big
    repair.
  craft_notes: |
    The "first-time-honest beat" at panel 15 is the doctrinal heart of
    this episode. The practice has been carried through work review
    (ep_002), grief conversation with mother (ep_003), insomnia (ep_004),
    and Yara's disclosure (ep_005). In ep_006 the practice meets the
    OLDEST pattern (parent's chronic worry) and the body chooses honesty
    over armor. Not catharsis — just one honest sentence held in light.
  long_drop_position: |
    Panel 23 — balcony. Different from kitchen (ep_001), rooftop (ep_002),
    park bench (ep_003), window seat (ep_004), and shared walk (ep_005).
    Six episodes, six distinct Long Drop locations — the visual variety
    is structurally required to keep iyashikei from becoming formulaic.
  doctrinal_anchor_ahjan: |
    "Old pattern. Same self. Honest now." (panel 28 caption) is the
    final-line shape pattern of the series: a three-beat closing that
    states the position WITHOUT claiming victory. Each episode's final
    caption follows this shape but lands different content. ep_006's
    contribution: honesty as a practice, distinct from confession or
    explanation.
  translation_handoff: |
    Same as prior episodes — text_by_locale dicts populated for en_US
    only. New locked phrases: "Tell the basil I said hi." (panel 8),
    "Old pattern. Same self. Honest now." (panel 28).

