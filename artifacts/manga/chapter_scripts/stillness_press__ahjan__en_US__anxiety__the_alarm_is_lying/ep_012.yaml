schema_authority: schemas/manga/chapter_script_writer_handoff.schema.json

series_id: stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
chapter_id: ep_012
arc_storyboard_ref: artifacts/manga/arc_storyboards/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/ep_012.arc_storyboard.yaml
title: 'The Alarm Is Lying — Episode 12: Passing It Along'
manga_author: Hana Tidecalm
teacher_id: ahjan
brand_id: stillness_press
engine: false_alarm
locale: en_US
default_locale: en_US
available_locales: [en_US]

modern_reader_context:
  schema_version: "1.0.0"
  target_market: en_US
  target_audience: gen_z
  genre_id: healing
  strategy_genre: healing
  relevance_genre: healing
  market_surface_rule: Use social discovery, school/work pressure, gaming, creator
    culture, comic shop/community, and phone-native life without sounding like an
    ad for platforms.
  market_touchpoints:
  - group_chat
  - discord_server
  - short_video_clip
  - school_bus_or_subway
  - comic_shop
  - mall_food_court
  - campus_library
  - delivery_app
  - controller
  - streaming_queue
  market_guardrails:
  - avoid_fake_japanese_surface_for_us_scene
  - make_city_transport_specific_if_used
  - do_not_overexplain_anime_fandom
  audience_story_rule: Treat online identity, economic pressure, burnout, social
    performance, fandom, romance boundaries, and self-definition as ordinary life
    texture.
  audience_touchpoints:
  - phone_as_social_pressure
  - group_chat_status
  - creator_or_streaming_identity
  - gig_or_work_pressure
  - transit_between_roles
  - online_offline_self_gap
  genre_relevance_rule: 'Modern healing must receive everyday overstimulation gently:
    notifications, transit noise, school/work fatigue, convenience rituals, and
    weather.'
  catalyst:
    id: devons_friday_text_asking_to_still_meet
    logline: A short Friday-morning text from Devon ("still on for coffee?") turns
      an easy-to-forget offer into a real appointment Mira has to keep, and the
      breakroom's own steaming kettle becomes the place where a private six-episode
      practice gets put into words for someone else for the first time.
    ordinary_world_objects:
    - phone
    - text
    - breakroom
    - kettle
    genre_transmutation: A colleague's follow-up text becomes the activation
      trigger — not dread this time, but the mild pressure of being asked to
      explain something she has only ever done privately; the office breakroom
      kettle becomes the visual rhyme completing the series' tea-and-steam
      through-line in a shared, not solitary, register.
    avoid:
    - instant_cure
    - influencer_wellness_lecture
  quality_rubric:
    great_story_requires:
    - high_concept_collision
    - concrete_reader_world_anchor
    - genre_engine_not_replaced_by_trend
    - protagonist_desire_visible_in_scene
    - social_or_system_pressure
    - reversal_or_discovery_by_page_two
    - market_localized_touchpoint
    - no_generic_therapy_summary
    flat_story_failure_modes:
    - classic_genre_without_modern_entrypoint
    - modern_object_as_name_drop_only
    - protagonist_waits_for_lesson
    - no_personal_stakes_before_lore
    - no_social_cost
    - no_specific_place_or_object
    - genre_strategy_hidden_in_metadata_only
  craft_directive: Fuse the genre engine with a contemporary reader-world entrypoint.
    Market=en_US; audience=gen_z. Use catalyst 'devons_friday_text_asking_to_still_meet'.
    Market surface rule per config/manga/modern_reader_story_doctrine.yaml en_US.
    Use concrete objects and social pressure on page one; do not name-drop trends.

main_characters:
  - id: mira
    name: Mira Aoki
    age: 33
    role: protagonist (UX researcher; mid-career; quietly anxious)
    visual_anchor: long brown hair, cream sweater, jade pendant visible at neckline
  - id: devon
    name: Devon Reyes
    age: 26
    role: junior colleague, introduced ep_011; asking Mira to explain the pendant
      gesture she used under real pressure
    visual_anchor: short dark curls, wire-frame glasses, pen-cap-clicking habit
      — visibly stiller today than in ep_011, a small sign of the episode's own
      small arc

scene_palette:
  primary: warm office breakroom amber + Friday-afternoon light
  secondary: muted sage (echoing the original apartment palette, deliberately)
  accent: jade green (pendant continuity) + steam-white (kettle through-line)

pages:
  - page_id: ep_012_p01
    panels:
      - panel_id: ep012_001
        scene: |
          Close-up — Mira's phone on her desk, Friday morning. A text
          notification: "Devon: still on for coffee? no pressure if not."
        beat_type: spatial
        intent: "Activation trigger — same phone/notification mechanic as
          the whole series, now carrying a request instead of a threat"

      - panel_id: ep012_002
        scene: |
          Mira's face, reading it. Not dread this time — something closer
          to a mild, specific nervousness. A small breath.
        beat_type: micro
        dialogue_lines:
          - speaker: mira_internal
            text_by_locale:
              en_US: "Right. I said Friday."
            intensity: internal
            bubble_style: cloud_thought
            tail_style: dotless
            position_hint: top_right
            font_override_by_locale:
              en_US: italic_internal

      - panel_id: ep012_003
        scene: |
          Close on Mira's hand, typing a reply. No trembling this time —
          just an ordinary hand typing an ordinary text.
        beat_type: micro
        intent: "Deliberate contrast to prior episodes' trembling-hand
          motif — the activation register here is genuinely smaller"
        dialogue_lines:
          - speaker: mira
            text_by_locale:
              en_US: "Still on. 3pm, breakroom?"
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: bottom_right

      - panel_id: ep012_004
        scene: |
          Wide — Mira at her desk, the jade succulent beside the monitor
          (continuity from ep_011). She sits with the coming conversation
          for a moment before returning to work.
        beat_type: standard
        intent: "Anchor reference without an active trigger — the plant is
          simply present, not being reached for out of urgency"
        silence_confirmed: true

      - panel_id: ep012_005
        scene: |
          A new, small activation — Mira pauses mid-task, hand still on
          the keyboard. Not fear. Something more like: how do I say this
          out loud.
        beat_type: micro
        intent: "New kind of activation — the pressure of articulation,
          distinct from the series' usual dread-register triggers"

      - panel_id: ep012_006
        scene: |
          Close on Mira's face — she almost reaches for her phone to text
          someone (a therapist, unnamed, never shown) for the right words,
          then doesn't. Her hand returns to the keyboard instead.
        beat_type: micro
        intent: "Doctrinal beat — resisting the urge to borrow language
          from the source teaching; she'll have to find her own words"

      - panel_id: ep012_007
        scene: |
          Cut — 3pm. The office breakroom. Small, ordinary — a counter, a
          window, an electric kettle already plugged in. Devon already
          there, two mugs set out, pen cap still for once.
        beat_type: standard
        intent: "Scene transition — desk to breakroom; kettle introduced
          into frame before either character speaks, visual rhyme seeded
          early"

      - panel_id: ep012_008
        scene: |
          Devon, a little more direct than his ep_011 self.
        beat_type: micro
        dialogue_lines:
          - speaker: devon
            text_by_locale:
              en_US: "I looked it up. Grounding techniques. There's like
                forty of them. I didn't know which one you were doing."
            intensity: normal
            bubble_style: round_normal
            tail_style: pointer
            position_hint: top_left

  - page_id: ep_012_p02
    panels:
      - panel_id: ep012_009
        scene: |
          Mira, half-laughing, half-caught. She reaches for the kettle
          instead of answering immediately — the same reflexive tea-ritual
          gesture from every prior episode, now performed for two people
          instead of one.
        beat_type: micro
        intent: "TEA BEAT — the series' central ritual made social for the
          first time"

      - panel_id: ep012_010
        scene: |
          Close on the kettle, steam beginning to rise. Same visual
          language as every episode's tea beat — the shot composed almost
          identically to ep_001's panel 2, deliberate full-series bookend.
        beat_type: spatial
        intent: "Direct visual rhyme to ep_001 — the series' opening image,
          now shared"
        sfx_by_locale:
          en_US: ["hsss..."]

      - panel_id: ep012_011
        scene: |
          Mira pouring two cups. She doesn't start with a technique name.
        beat_type: micro
        dialogue_lines:
          - speaker: mira
            text_by_locale:
              en_US: "It's not really a technique. It's just — noticing.
                The alarm goes off, and I ask if it's actually smoke, or
                just steam."
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: bottom_left

      - panel_id: ep012_012
        scene: |
          Devon, turning the phrase over, looking honestly a little
          unconvinced.
        beat_type: micro
        dialogue_lines:
          - speaker: devon
            text_by_locale:
              en_US: "That's it? That's the whole thing?"
            intensity: normal
            bubble_style: round_normal
            tail_style: pointer
            position_hint: top_right

      - panel_id: ep012_013
        scene: |
          Mira, honest rather than reassuring — no oversell.
        beat_type: micro
        dialogue_lines:
          - speaker: mira
            text_by_locale:
              en_US: "It's not fast. It's not even always right. It's just
                — repeatable."
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: bottom_right

      - panel_id: ep012_014
        scene: |
          Devon looks down at his own mug, steam rising in front of his
          face, a small private moment of testing the idea against
          himself.
        beat_type: micro
        intent: "Devon receiving the teaching without immediate resolution
          — the practice is offered, not proven, in one scene"
        silence_confirmed: true

      - panel_id: ep012_015
        scene: |
          Devon's hand, unconsciously, touches the collar of his shirt —
          not a pendant, he doesn't have one, just an echo of the gesture
          he watched Mira make under the conference table.
        beat_type: micro
        intent: "The gesture beginning to transmit, imperfectly and
          without instruction, exactly as it was received rather than
          copied precisely"

      - panel_id: ep012_016
        scene: |
          Mira notices the small gesture. Doesn't comment on it. A quiet
          exchange of understanding passes between them, unstated.
        beat_type: micro
        silence_confirmed: true

      - panel_id: ep012_017
        scene: |
          Devon, small, genuine.
        beat_type: micro
        dialogue_lines:
          - speaker: devon
            text_by_locale:
              en_US: "Thanks. For Thursday, too."
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: bottom_left

      - panel_id: ep012_018
        scene: |
          Mira, mug in both hands, steam still rising.
        beat_type: micro
        dialogue_lines:
          - speaker: mira
            text_by_locale:
              en_US: "Same alarm system. We're all just carrying an old one."
            intensity: warm
            bubble_style: round_normal
            tail_style: pointer
            position_hint: top_right

      - panel_id: ep012_019
        scene: |
          Wide, held panel — both at the breakroom counter, window light,
          steam from both mugs rising and mingling in the same shaft of
          afternoon sun. No further dialogue.
        beat_type: long_drop
        intent: "LONG DROP — the arc's closing decompression beat, shared
          rather than solitary for the first time in the series"
        silence_confirmed: true
        dialogue_lines: []

      - panel_id: ep012_020
        scene: |
          Cut — evening. Mira's kitchen. The kettle again — the third
          kettle image of the episode, the series' oldest visual motif
          closing on itself. The jade succulent on the sill.
        beat_type: spatial
        intent: "TEA BEAT bookend — full-series closing return"

      - panel_id: ep012_021
        scene: |
          Close on Mira's hand around the cup, jade pendant visible at her
          collar, steady.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "I didn't fix it. I just got better at not being the only
            one holding it."
        dialogue_lines: []

      - panel_id: ep012_022
        scene: |
          Mira's face — settled, tired in the good way, not transformed,
          not cured. The same face the series opened on, three months and
          twelve alarms later.
        beat_type: micro

      - panel_id: ep012_023
        scene: |
          Wide pull — the whole kitchen, the same composition the series
          has returned to eleven times, evening light instead of dawn.
          Nothing dramatic. The ordinary room, held.
        beat_type: spatial
        intent: "Closing wide — arc 1's final image deliberately mirrors
          ep_001's opening image structure, not its light"

      - panel_id: ep012_024
        scene: |
          Final small panel — typographic only, cream background, arc
          marker.
        beat_type: standard
        narrator_caption_by_locale:
          en_US: "End of Episode 12 — Arc One: The Alarm Is Lying"
        dialogue_lines: []

notes:
  arc_position: |
    Episode 12 of 12 — arc 1 close. The practice that opened privately in
    ep_001 (noticing a false alarm alone, in a kitchen) closes having been
    witnessed (ep_011) and, for the first time, articulated to someone
    else (this episode). This is the honest ceiling for arc 1: Mira is
    not a teacher, has not mastered anything, and explicitly says the
    technique "isn't even always right." The shift across twelve episodes
    is from solitary regulation to a repeatable practice she can name out
    loud, imperfectly, once.
  pacing_vs_prior: |
    24 panels — shortest of the arc, deliberately quieter than ep_011's
    escalation, closing the arc on a held two-person LONG DROP (panel 19)
    rather than a solitary one, the one structural first the whole arc
    has been building toward.
  continuity_callbacks: |
    - Kettle/tea beat (panels 9, 10, 20) — three instances in one episode,
      the highest density in the series, deliberate full-arc bookend; the
      shot in panel 10 is composed to visually rhyme with ep_001 panel 2
    - Jade pendant (panel 21) — closing image, now paired with Devon's
      echoed collar-touch gesture (panel 15) rather than shown alone
    - Succulent (panels 4, 20) — present at both office and home, unforced
    - "Same alarm system" line (panel 18) generalizes ep_001's private
      "the body's alarm system is older than the body's wisdom" line into
      a shared, spoken statement — the arc's actual thesis stated once,
      out loud, to another person
  devon_handling: |
    Devon does not become "fixed" either — his gesture in panel 15 is
    tentative and unexplained by him, not a triumphant adoption. He is
    a person receiving something imperfectly passed along, per iyashikei
    convention: small shifts only, no one is cured, the reader leaves
    regulated rather than told a lesson was learned.
  doctrinal_anchor_ahjan: |
    The doctrine generalizes one level further than ep_003's "the
    practice generalizes across contexts": here it generalizes across
    PEOPLE. Mira never once repeats the teacher's original language
    (panel 6, she explicitly resists reaching for someone else's exact
    words) — she translates it into her own phrasing before offering it,
    which is the actual doctrinal claim of this closing episode: the
    teaching is only truly learned once it can survive being retold in
    the learner's own words, imperfectly, without the source.
  translation_handoff: |
    text_by_locale dicts populated for en_US only, matching ep_001-011's
    pattern.
