# ═══════════════════════════════════════════════════════════════════════════
# CHAPTER SCRIPT — The Alarm Is Lying — Episode 5
# ═══════════════════════════════════════════════════════════════════════════
# Series:        stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying
# Episode:       ep_005 — "Friday, 12:08 PM"
# Author (EI):   Hana Tidecalm
# Teacher:       ahjan (Buddhist contemporary; alarm-systems / pause)
# Engine:        false_alarm
# Genre:         iyashikei
# Style:         cozy_iyashikei
#
# Continuity from ep_004:
#   One week since the insomnia night. The practice has settled into the
#   background. Today Mira has lunch with a coworker (Yara) who notices
#   something has shifted in her. New angle: the practice becomes
#   VISIBLE to someone else without Mira advertising it.
#
# Episode arc — the practice becomes social:
#   safety opening (office kitchenette, ritual lunch prep) → small ramp
#   (Yara arrives, "you seem different") → ground (Mira deflects, then
#   admits a sliver) → climax (Yara shares her own anxiety; Mira holds
#   space without fixing) → Long Drop (walk back to desk together,
#   shared silence) → completion (Mira at her desk, the practice
#   continues, no fanfare)
#
# SCROLL THERAPEUTIC TEST:
#   1. Safety cue inside first 800 px ........ ✓ panel 1 (office plant + warm Friday light)
#   2. ≥3 oscillations activation/ground ...... ✓ 4 oscillations
#   3. Activation:Ground ≤ 1:2.5 .............. ✓ ~8 activation / ~22 ground panels
#   4. Closes with completion ................. ✓ panels 28-30 settle
#   5. HRV-style end-state delta .............. (Phase 2)
#
# CRAFT FORMULAS (NEW: relational beat focus):
#   Tea Beat absent at open (Friday lunch, not tea ritual)
#   Anchor Panel — office windowsill plant (panels 1, 6, 30 — NEW recurring object)
#   Awe-Pullback (panel 15 — restaurant window onto street, similar but tighter than ep_003's pullback)
#   Pendulation Pair (4-6 ↔ 7-8, 11-13 ↔ 14-16, 18-20 ↔ 21-23)
#   Long Drop (panel 25 — walking-back wide silent, two-person)
#   Continuity callback: jade pendant touch (panel 12); succulent now in
#   Mira's office cubicle (panel 1, 30) — she brought a cutting from home
#
# DOCTRINAL ANCHOR:
#   The practice becomes social — and Mira does not preach. She holds
#   space when Yara opens up. The teaching survives contact with another
#   human without becoming explanation. This is iyashikei + contemplative
#   convention: the practice transmits through presence, not instruction.
#
# ═══════════════════════════════════════════════════════════════════════════

