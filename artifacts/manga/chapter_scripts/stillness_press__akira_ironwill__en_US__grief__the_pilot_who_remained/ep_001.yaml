# ═══════════════════════════════════════════════════════════════════════════
# CHAPTER SCRIPT — The Pilot Who Remained — Episode 1
# ═══════════════════════════════════════════════════════════════════════════
# Series:        stillness_press__akira_ironwill__en_US__grief__the_pilot_who_remained
# Episode:       ep_001 — "Hangar 7"
# Author (EI):   Akira Ironwill
# Teacher:       akira_ironwill (mecha + grief; armor as metaphor for inner-defense)
# Engine:        empty_cockpit
# Genre:         mecha
# Style:         industrial_seinen_mecha
#
# Premise:
#   Lt. Rei Tachibana, 24, mech pilot. Six months after the engagement at
#   the Sasayama line. Her co-pilot and elder sister, Captain Aiko
#   Tachibana, did not eject. Rei did. Now Rei has been ordered back to
#   active duty. She returns to Hangar 7 alone, to her mech — which still
#   has Aiko's pilot patch stitched inside the cockpit — and chooses
#   whether to climb in.
#
# Episode arc — grief as armor:
#   approach (hangar empty) → ritual (the pre-flight checks Aiko taught)
#   → encounter (the patch) → grief surge (the climb stalled) → choice
#   (she climbs anyway, alone)
#
# CRAFT FORMULAS (mecha + grief register):
#   Scale Contrast — pilot tiny against the mech (recurring through-line)
#   Tactile Beats — close-ups on metal, gloved hands, latches (grounding)
#   Empty Cockpit — Aiko's pilot patch as visual through-line
#   Industrial Quiet — the only sound is mech servos / hangar lights buzzing
#   Wide Silent — the climb panel as silent two-shot of pilot + machine
#
# ═══════════════════════════════════════════════════════════════════════════

schema_version: "1.0.0"
artifact_type: chapter_script_writer_handoff
schema_authority: schemas/manga/chapter_script_writer_handoff.schema.json

series_id: stillness_press__akira_ironwill__en_US__grief__the_pilot_who_remained
chapter_id: ep_001
title: "The Pilot Who Remained — Episode 1: Hangar 7"
manga_author: Akira Ironwill
teacher_id: akira_ironwill
brand_id: stillness_press
engine: empty_cockpit
locale: en_US
default_locale: en_US
available_locales: [en_US]

main_characters:
  - id: rei
    name: Lt. Rei Tachibana
    age: 24
    role: protagonist (mech pilot, recently lost her elder sister and co-pilot)
    visual_anchor: "short black hair, military pilot suit with worn patches, slim build, a small jade green ribbon tied to her left shoulder strap (her sister's gift), pilot helmet held under her right arm"
  - id: aiko
    name: Capt. Aiko Tachibana
    role: "Rei's elder sister, deceased pilot — never visible in this episode; only via her pilot patch (a small red-and-white flame embroidery) sewn inside the mech cockpit"
    visual_anchor: "ABSENT — appears only as: (1) the embroidered pilot patch inside the cockpit, (2) a thin red ribbon visible in a photograph in panel 3"

scene_palette:
  primary: industrial steel grey + concrete hangar floor + harsh sodium overhead lights
  secondary: deep blue cockpit interior + soft amber instrument glow
  accent: red — Aiko's pilot patch + her ribbon — the only saturated color
  exterior_palette: pale morning grey through the hangar's high windows
  cockpit_palette: deep blue + amber + a single red embroidered flame

# ═══════════════════════════════════════════════════════════════════════════
# PAGES (12 panels)
# ═══════════════════════════════════════════════════════════════════════════

pages:
  - page_id: ep_001_p01
    panels:

      # ── OPENING — the empty hangar ────────────────────────────────────
      - panel_id: ep001_001
        scene: |
          Wide establishing — Hangar 7 from the floor. Concrete floor
          stretching back. Overhead: rows of harsh sodium lamps. At the
          far end, towering 12 meters tall, the silhouette of a heavy
          mech — wedge-shaped torso, broad shoulders, exposed power
          coupling at the hip. No movement. A single high window lets in
          a pale morning grey. The scale is overwhelming — the mech
          dwarfs everything.
        beat_type: ~
        intent: "SCALE CONTRAST 1 — establish the mech's mass"
        silence_confirmed: true

      - panel_id: ep001_002
        scene: |
          Medium — Rei walking across the hangar floor, seen from
          behind. Pilot suit, helmet under her arm, jade green ribbon at
          her shoulder. Her stride steady but not fast. The mech ahead
          of her is still mostly silhouette.
        beat_type: standard
        narrator_caption_by_locale:
          en_US: "Hangar 7. 0524 hours. Six months and one day."

      - panel_id: ep001_003
        scene: |
          Medium — Rei pauses at the foot of the boarding ladder that
          climbs the mech's side. She pulls a small folded photograph
          from her chest pocket — visible: two pilots in matching suits,
          older one's arm around younger one's shoulder. The older
          pilot wears a thin red ribbon at her collar. Rei looks at it,
          then tucks it back.
        beat_type: spatial
        intent: "Aiko introduced via photograph, never living"
        dialogue_lines:
          - speaker: rei_internal
            text_by_locale:
              en_US: "Pre-flight. Like you taught."
            intensity: whisper
            bubble_style: cloud_thought
            tail_style: dotless
            position_hint: top_right
            font_override_by_locale:
              en_US: italic_internal

      # ── RITUAL — the pre-flight checks ────────────────────────────────
      - panel_id: ep001_004
        scene: |
          Close — Rei's gloved hand on the cold steel of the boarding
          ladder. Industrial texture: rivets, paint slightly chipped.
          Her grip is sure but slow.
        beat_type: micro
        intent: "TACTILE BEAT — grounding via metal"
        sfx_by_locale:
          en_US: ["clank"]

      - panel_id: ep001_005
        scene: |
          Mid-distance — Rei climbs the ladder, mid-ascent. Behind her
          the hangar opens out vast. The scale contrast is sharp: she
          is small against the mech's hip-armor mass.
        beat_type: spatial
        intent: "SCALE CONTRAST 2 — pilot tiny against the machine"

      - panel_id: ep001_006
        scene: |
          Tighter — Rei at the cockpit hatch. She enters a familiar
          sequence on the side panel — gloved fingertips on five worn
          buttons. The hatch hisses open ahead of her — soft amber
          light spills out from inside the cockpit.
        beat_type: micro
        sfx_by_locale:
          en_US: ["hiss-clack"]

      # ── ENCOUNTER — the cockpit interior + the patch ──────────────────
      - panel_id: ep001_007
        scene: |
          Interior wide — the cockpit. Two pilot seats side by side: the
          pilot seat (left, Rei's) and the gunner seat (right, Aiko's).
          The gunner seat is empty. On the seat's headrest, sewn into
          the lining: a small embroidered patch — red and white flame
          motif. This is Aiko's pilot patch. The amber instrument glow
          gives everything a deep blue + amber palette.
        beat_type: standard
        intent: "EMPTY COCKPIT — the patch enters the frame"

      - panel_id: ep001_008
        scene: |
          Close on the embroidered pilot patch — the only saturated red
          in the panel. Threads slightly worn at the edges. A few
          frayed strands. Behind it, the deep blue of the seat lining.
        beat_type: micro
        intent: "Aiko's presence, made of cloth"
        silence_confirmed: true

      # ── GRIEF SURGE — the climb stalls ────────────────────────────────
      - panel_id: ep001_009
        scene: |
          Medium — Rei in the cockpit doorway, one boot on the threshold,
          one still on the ladder. She has stopped moving. Her gaze is
          on the patch. Her jaw is tight but her shoulders haven't
          dropped — the breath is held.
        beat_type: micro
        intent: "GRIEF SURGE — the body's pause"
        dialogue_lines:
          - speaker: rei_internal
            text_by_locale:
              en_US: "I can leave. I have not failed if I leave."
            intensity: whisper
            bubble_style: cloud_thought
            tail_style: dotless
            position_hint: top_left
            font_override_by_locale:
              en_US: italic_internal

      - panel_id: ep001_010
        scene: |
          Closer — Rei's eyes. Wet but not crying. Steady. She is
          looking at the patch, not at the controls. One slow breath.
          The amber light catches her face.
        beat_type: micro
        narrator_caption_by_locale:
          en_US: "The hangar doesn't know if I stay."

      # ── CHOICE — the climb in ─────────────────────────────────────────
      - panel_id: ep001_011
        scene: |
          Wide silent — Rei has slid fully into the pilot seat. The
          hatch above her is still open. The empty gunner seat to her
          right, the embroidered patch visible at its headrest. Her
          gloved hands are on the controls. She is looking forward, not
          at the empty seat. The mech's instruments glow amber around
          her.
        beat_type: long_drop
        intent: "CHOICE — silent two-shot, pilot + machine"
        silence_confirmed: true
        dialogue_lines: []

      # ── COMPLETION — hatch closes ─────────────────────────────────────
      - panel_id: ep001_012
        scene: |
          Exterior — the cockpit hatch sealing closed from the outside,
          seen from below at a slight angle. Rei is no longer visible.
          The hangar lights glint off the closing seam. The mech still
          hasn't moved — but the cockpit is no longer empty. End of episode.
        beat_type: long_drop
        intent: "COMPLETION — not the launch, the closing of the hatch"
        silence_confirmed: true
        narrator_caption_by_locale:
          en_US: "I climb in with her. Not for her."

# ═══════════════════════════════════════════════════════════════════════════
# WRITER NOTES
# ═══════════════════════════════════════════════════════════════════════════
notes:
  arc_position: |
    Episode 1 of N (planned 8-10). The teaching: grief isn't a state to
    overcome — it's something you carry into the cockpit. The mech
    motif: armor is supposed to protect you, but it can't protect you
    from the loss inside it. The choice isn't to drop the armor — it's
    to climb in anyway, with the loss as a passenger.
  pacing_register: |
    Mecha + grief works through SCALE CONTRAST (pilot vs machine, the
    grief vs the work) and TACTILE BEATS (the hand on the metal, the
    five-button sequence, the seat threshold). The Long Drop panels
    (11, 12) carry the choice and the closure — silent, slow.
  akira_ironwill_signature: |
    Akira writes mecha where the machine never solves the problem. The
    mech is always the surrounding environment, never the agent. The
    pilot's interior life is the real arc; the machine is the
    audience. No combat in this episode (and possibly none in the
    series — TBD).
  translation_handoff: |
    text_by_locale dicts populated for en_US. Run translate_chapter_script.py
    for ja_JP / zh_TW / zh_CN. Military register translates with
    formal-soft Japanese (です/ます with omitted subject for internal
    monologue).
