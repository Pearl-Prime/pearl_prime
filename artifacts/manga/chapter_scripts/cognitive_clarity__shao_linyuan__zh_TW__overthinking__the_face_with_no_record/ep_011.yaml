main_characters:
- id: su
  name: 蘇雅晴
  name_romaji: Su Yaqing (Iris)
  age: 31
  role: 主人公——台北捷運行控中心異常事件分析員
  visual_anchor: 直短髮別在耳後、深藍色行控值班制服、右手習慣性轉動一枝原子筆
- id: zhou
  name: 周德昌
  name_romaji: Zhou Dechang
  age: 58
  role: 資深值班控制員，即將退休——器（讀懂身體的偵探）
  visual_anchor: 灰白平頭、袖口捲起、桌上一個用了二十年的舊保溫瓶
- id: lin
  name: 林組長
  name_romaji: Team Lead Lin
  age: 45
  role: 值班主管——制度壓力來源
  visual_anchor: 俐落套裝、手上永遠夾著一份待簽的報表夾
scene_palette:
  primary: 行控中心的冷白螢幕光 + 深夜捷運藍
  secondary: 月台霓虹的濕冷灰藍（雨夜反光）
  accent: 一枝始終未關的琥珀色警示燈——全劇唯一反覆出現的暖色
pages:
- page_id: ep_011_p01
  panels:
  - panel_id: ep011_001
    scene: 休息室,白天。周德昌退休前的最後一個值班日,同事們在他桌上放了一個簡單的紙箱和一張卡片,卡片裡夾著一張City Cafe禮物卡。
    beat_type: standard
    narrator_caption_by_locale:
      en_US: A city cafe counter gift card is tucked inside the card — the smallest, most ordinary kind
        of goodbye.
  - panel_id: ep011_002
    scene: 插入畫面——值班表公告欄,周德昌的名字這一格被劃上最後一條線,旁邊寫著「退休」兩個字。
    beat_type: micro
    narrator_caption_by_locale:
      en_US: The duty roster shows his name crossed out for the last time — a deadline that finally cannot
        be postponed.
  - panel_id: ep011_003
    scene: 雅晴幫忙整理紙箱裡的東西,想把一疊舊文件放進去,卻在其中翻到一份她從沒見過的手寫筆記副本。
    beat_type: micro
  - panel_id: ep011_004
    scene: 特寫——那份筆記的標題寫著「異常事件:非官方觀察記錄,近八年」,裡面有好幾個她認得的站名,和好幾個她不認得的。
    beat_type: micro
    intent: 揭露的鋪陳——器一直保留部分資訊
    narrator_caption_by_locale:
      en_US: Eight years of evidence no one ever opened as a real case.
  - panel_id: ep011_005
    scene: 雅晴抬頭看向周德昌,眼神裡有一種混合了震驚與被背叛的感覺。
    beat_type: micro
  - panel_id: ep011_006
    scene: 雅晴,聲音壓得很低,但很直接。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 你記了八年?為什麼從來沒有全部告訴我?
        en_US: Eight years of this — why didn't you ever tell me all of it?
      intensity: sharp
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep011_007
    scene: 周德昌沒有立刻回答,拉了張椅子在她對面坐下——這是全季第一次,他主動坐下來準備一次完整的對話,而不是遞茶或路過。
    beat_type: micro
    intent: 器姿態的轉變——從旁觀轉為正面對話
  - panel_id: ep011_008
    scene: 周德昌,語氣很慢,像是在整理八年份的話。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 因為每次我開始說,我就看見妳現在這個樣子。
        en_US: Because every time I started, I could already see exactly what you'd become.
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep011_009
    scene: 雅晴,聲音顫抖但沒有退縮。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 所以你選擇不說,看著我自己一步一步走到這裡?
        en_US: So you chose silence — and watched me walk here on my own instead?
      intensity: sharp
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep011_010
    scene: 周德昌,終於承認,語氣裡有真正的愧疚。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 是。這是我的判斷失誤,不是妳的。
        en_US: Yes. That's my failure of judgment — not yours.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep011_011
    scene: 沉默格——兩人之間第一次沒有保溫瓶,沒有客套,只有那疊筆記攤在桌上。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep011_012
    scene: 大場景拉開——休息室的其他同事識趣地離開,留下兩人和那疊八年份的紀錄。頁末懸念。
    beat_type: long_drop
- page_id: ep_011_p02
  panels:
  - panel_id: ep011_013
    scene: 周德昌翻開筆記的第一頁,開始把八年來零散的觀察,第一次完整地說給雅晴聽。
    beat_type: standard
  - panel_id: ep011_014
    scene: 周德昌,語氣平靜,像是終於卸下一個扛了很久的東西。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 不是每年都有,但每隔一段時間,總有一兩起這樣的紀錄——從來沒人正式立案。
        en_US: It doesn't happen every year, but every so often — one or two records like this. Never
          formally opened as a case.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep011_015
    scene: 雅晴一邊聽,一邊快速在腦中把這些舊紀錄和自己的五站關聯圖比對——但她刻意讓手停在桌下,沒有立刻去拿筆記本。
    beat_type: micro
    intent: 策略核心拍點的鋪陳——誠實承認衝動,但延遲行動
  - panel_id: ep011_016
    scene: 周德昌看出她的衝動,停下來,直視著她。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 妳現在,是想理解,還是又想解決?
        en_US: Right now — are you trying to understand this, or trying to solve it again?
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep011_017
    scene: 雅晴愣住,這個問題像是精確地打在她從沒被問過的地方。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep011_018
    scene: 雅晴,聲音很誠實,誠實到她自己都有點意外。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 我不知道。可能兩個都是。
        en_US: I don't know. Maybe both.
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep011_019
    scene: 周德昌,沒有評價這個答案,只是點點頭——他的節制延續到最後一天值班。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep011_020
    scene: 周德昌,把整本筆記推到她面前,做出他八年來第一次真正的決定。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 這本,給妳。但我要妳答應我一件事。
        en_US: This is yours now. But I need you to promise me one thing.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep011_021
    scene: 雅晴,看著那本筆記,沒有立刻伸手去拿。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 什麼事?
        en_US: What is it?
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep011_022
    scene: 周德昌,語氣鄭重,這是他這八年觀察後唯一的請求。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 下一次妳覺得快要看清楚的時候,先打給我。不是要妳停下來,是不要一個人。
        en_US: Next time you think you're about to see it clearly — call me first. Not to stop you. Just
          so you're not alone.
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep011_023
    scene: 雅晴,終於伸手接過筆記本,聲音很輕。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 好。我答應你。
        en_US: Okay. I promise.
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep011_024
    scene: 插入畫面——周德昌的保溫瓶,第一次被留在桌上,他沒有帶走——一個留給她的、無聲的物件。
    beat_type: micro
    intent: 器的告別手勢——物件的傳承取代言語的教導
  - panel_id: ep011_025
    scene: 大場景——周德昌起身,走向出口,回頭看了雅晴最後一眼,沒有再多說什麼。
    beat_type: standard
  - panel_id: ep011_026
    scene: 大遠景拉開——雅晴獨自留在休息室,桌上是那本八年筆記和一個舊保溫瓶,窗外周德昌的身影正走出行控中心大門。
    beat_type: long_drop
    narrator_caption_by_locale:
      zh_TW: 他走了。筆記留下了。
      en_US: He's gone. The notebook stayed. She made a promise she has never once needed to keep — until
        now.
notes:
  arc_position: 第十一話——策略核心拍點的完整重現：誠實承認（『我不知道，可能兩個都是』）與行為選擇並置，但這次多了一個新元素——雅晴主動承諾『下次先打給他』，為第二部的轉折預先埋下具體的、可被檢驗的伏筆。周德昌以退休告別、以物件（筆記＋保溫瓶）傳承取代教導式收尾。
  pacing_vs_prior: 二十六格，兩頁，全季至此最長的單一對話場景，刻意放慢節奏對照第十話的公開衝突高潮。
  continuity_callbacks: 保溫瓶（貫穿全季的器物）首次被『留下』而非『遞出』；筆記本作為物件的意義從『雅晴的執念』擴展為『周德昌的八年觀察』，兩條筆記本敘事線在此交會。
  language: zh_TW為權威語言，en_US僅為操作用註解，非翻譯。
  translation_pipeline_handoff: en_US為審閱用註解草稿；其餘CJK語系另案處理。
craft_notes: 'VESSEL: 讀懂身體的偵探——周德昌在最後一話完成從『觀察者』到『傳承者』的轉變，保溫瓶的物件轉移取代任何言語教導，符合doctrine『器從不說教』的核心規範。GENRE
  BIBLE: docs/research/manga_craft/psychological_thriller.md


  GENRE-FIRST（zh_TW）: panel 16『妳現在,是想理解,還是又想解決?』是全劇最接近『點破』的台詞，但刻意維持疑問句而非結論句，且雅晴的回答『我不知道，可能兩個都是』刻意不構成自我頓悟（嚴格遵守strategy庫anti_pattern_rules：禁止『我意識到自己在鑽牛角尖』式台詞）。


  ARC: 揭露的攤牌→誠實但未改變的核心拍點→具體、可檢驗的新承諾（下次先打電話），為第二部『螺旋』埋下明確的伏筆與可能被打破的張力。


  NATIVE: 台灣繁體中文原創。


  ACCEPTANCE: authored_candidate。'
