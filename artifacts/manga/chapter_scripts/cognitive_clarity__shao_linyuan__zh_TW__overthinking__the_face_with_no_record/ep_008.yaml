genre: psychological_thriller
mode: teacher
vessel: 讀懂身體的偵探
main_characters:
- id: su
  name: 蘇雅晴
  name_romaji: Su Yaqing (Iris)
  age: 31
  role: 主人公——台北捷運行控中心異常事件分析員
  visual_anchor: 直短髮別在耳後、深藍色行控值班制服、右手習慣性轉動一枝原子筆
- id: zhou
  name: 周德昌
  name_romaji: Zhou Dechang
  age: 58
  role: 資深值班控制員，即將退休——器（讀懂身體的偵探）
  visual_anchor: 灰白平頭、袖口捲起、桌上一個用了二十年的舊保溫瓶
- id: lin
  name: 林組長
  name_romaji: Team Lead Lin
  age: 45
  role: 值班主管——制度壓力來源
  visual_anchor: 俐落套裝、手上永遠夾著一份待簽的報表夾
scene_palette:
  primary: 行控中心的冷白螢幕光 + 深夜捷運藍
  secondary: 月台霓虹的濕冷灰藍（雨夜反光）
  accent: 一枝始終未關的琥珀色警示燈——全劇唯一反覆出現的暖色
pages:
- page_id: ep_008_p01
  panels:
  - panel_id: ep008_001
    scene: 隔天,休息室。周德昌把手機推到雅晴面前,螢幕停在他那頁舊筆記的照片。
    beat_type: standard
  - panel_id: ep008_002
    scene: 雅晴的笑容還沒完全收起,帶著疑惑接過手機。
    beat_type: micro
  - panel_id: ep008_003
    scene: 周德昌,語氣少見地嚴肅。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 同一張卡號,五年前我在另一個站,也記過一次。
        en_US: The same card number — I logged it at a different gate, five years ago. That's evidence,
          not a coincidence.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep008_004
    scene: 雅晴的笑容徹底消失,她的手指開始發抖地滑動手機裡的照片。
    beat_type: micro
  - panel_id: ep008_005
    scene: 插入畫面——她把兩筆時間並排計算,間隔精確到分鐘,不是隨機的、街友借用的模式。
    beat_type: micro
    narrator_caption_by_locale:
      zh_TW: 分鐘級的精確。這不是撿到卡的人隨便亂用。
      en_US: Precise to the minute. That's not a lost card reused at random — that's someone who knows
        exactly how to stay just under the rule the system checks.
  - panel_id: ep008_006
    scene: 雅晴的『遺失物』理論在她自己腦中徹底崩潰,取而代之的是比之前所有猜測都更冷、更確定的東西。
    beat_type: micro
    intent: 假性寬慰崩潰——依doctrine須於本話立即發生
  - panel_id: ep008_007
    scene: 周德昌看著她臉色的變化,語氣放軟了一點,但沒有收回剛剛的話。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 我不是要嚇妳,只是妳應該知道。
        en_US: I'm not trying to scare you — you just needed to know before the case closed on the wrong
          answer.
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep008_008
    scene: 雅晴,聲音很輕,像是在對自己說。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 五個站了。
        en_US: Five stations now.
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep008_009
    scene: 插入畫面——她的手機通知跳出一則她原本追蹤的webtoon閱讀app留言,一位讀者隨口提到「這站最近也怪怪的」,座標恰好是第五站。
    beat_type: micro
    narrator_caption_by_locale:
      en_US: A comment on her webtoon reading app, from someone else, names the same wrong feeling about
        the same platform.
  - panel_id: ep008_010
    scene: 大場景拉開——雅晴重新打開筆記本,螺旋在一天之內從暫停恢復到全速運轉,線條比之前更密、更用力。頁末懸念。
    beat_type: long_drop
- page_id: ep_008_p02
  panels:
  - panel_id: ep008_011
    scene: 夜晚,控制室。雅晴重新調出所有已結案的紀錄,這次不只是被標紅的,而是全部——工作範圍再一次全面擴大。
    beat_type: standard
  - panel_id: ep008_012
    scene: 插入畫面——她的螢幕上,五個站的資料連成一張精確的網,間隔誤差不超過三分鐘。
    beat_type: micro
  - panel_id: ep008_013
    scene: 扭曲特寫——監視器牆的燈光在她眼裡再次變得冷白刺眼,溫暖的月台燈光記憶像是從沒發生過。
    beat_type: micro
    intent: 假性寬慰的視覺暖色徹底逆轉——類型扭曲特寫
  - panel_id: ep008_014
    scene: 她填寫一份正式的『事件升級』報告,準備遞交給林組長,這是她第一次主動要求擴大調查層級。
    beat_type: micro
    narrator_caption_by_locale:
      en_US: She needs to file this before the shift ends, or the pattern stays only hers to carry.
  - panel_id: ep008_015
    scene: 周德昌站在她身後,看著這份報告,神情複雜——他提供的資訊,反而把她推得更深了。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep008_016
    scene: 周德昌,語氣裡有一絲他自己也沒預料到的懊悔。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 我把資料給妳,是想讓妳看清楚——不是要妳再往裡跳。
        en_US: I gave you the record to make things clearer — not to send you deeper in.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep008_017
    scene: 雅晴,眼睛沒有離開螢幕,語氣裡是一種近乎冷靜的堅決。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 五個站,不是巧合能解釋的。我不能假裝沒看到。
        en_US: Five stations isn't a coincidence anymore. I can't unsee it now.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep008_018
    scene: 插入畫面——她的手指懸在『送出』鍵上方,這份報告一旦送出,案件就會正式升級,不再只是她一個人的執念。
    beat_type: micro
    intent: 選擇的張力——制度化的臨界點
  - panel_id: ep008_019
    scene: 沉默格——周德昌沒有再說什麼,只是留在她身邊,沒有離開。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep008_020
    scene: 特寫——雅晴按下送出鍵。
    beat_type: micro
  - panel_id: ep008_021
    scene: 大遠景拉開——控制室的燈光,五個站的資料圖釘在虛擬看板上,案件正式從『雅晴的執念』變成『行控中心的事件』。
    beat_type: spatial
  - panel_id: ep008_022
    scene: 插入畫面——遠處,月台上一個撐傘的身影再次出現,這次直視鏡頭的方向站了整整三秒,才轉身消失。監視器這次拍到了一半的臉。
    beat_type: micro
    intent: 類型張力升級——首次半張臉的畫面,尚未被任何人看見
  - panel_id: ep008_023
    scene: 大場景收尾——控制室裡沒有人注意到那個畫面,系統的自動存檔進度條靜靜地跑著。第八話收尾,螺旋恢復全速。
    beat_type: long_drop
    narrator_caption_by_locale:
      zh_TW: 不是巧合了。
      en_US: It was never a coincidence. But no one in the room has seen the one frame that just changed
        everything.
notes:
  arc_position: 第八話——假性寬慰依doctrine於本話立即崩潰（strategy庫規範：false_relief後兩格內須被打破）。螺旋在一天內恢復並超越先前強度；案件首次正式升級為行控中心事件而非個人執念。
  pacing_vs_prior: 二十四格，兩頁，全季至此最長篇幅，反映崩潰後螺旋強度的躍升。
  continuity_callbacks: webtoon閱讀app（首次引入，呼應doctrine touchpoint）；月台燈光暖色（ep_007）在panel 13被直接逆轉；周德昌的獨立筆記（ep_007伏筆）在此話交會。
  language: zh_TW為權威語言，en_US僅為操作用註解，非翻譯。
  translation_pipeline_handoff: en_US為審閱用註解草稿；其餘CJK語系另案處理。
craft_notes: 'VESSEL: 讀懂身體的偵探——周德昌本話首次表達懊悔（panel 16），顯示器本身也會犯錯、也會承擔後果，非全知全能的教導者。GENRE BIBLE: docs/research/manga_craft/psychological_thriller.md


  GENRE-FIRST（zh_TW）: panel 22『半張臉』畫面是全季首次真正的視覺線索突破，刻意不透過任何角色的觀點揭露給讀者，保留不可靠敘事張力至第二部。


  ARC: 假性寬慰崩潰→制度升級（送出報告）→讀者特權的新伏筆（半張臉）尚未交給任何角色。


  NATIVE: 台灣繁體中文原創。


  ACCEPTANCE: authored_candidate。'
