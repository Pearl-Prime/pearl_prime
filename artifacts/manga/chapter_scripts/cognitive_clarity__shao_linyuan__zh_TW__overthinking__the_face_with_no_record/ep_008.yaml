  catalyst:
    id: third_station_precise_interval_breaks_the_theory
    logline: 周德昌把他找到的舊筆記交給雅晴——同一個編號的悠遊卡，早在遺失物招領之前，就已經在完全不同的第五個站被使用過，時間間隔精確到分鐘，不可能是巧合的重複使用。
    ordinary_world_objects:
    - webtoon_reading_app
    - incident_report_form
    - mrt_fare_gate
    - printed_timestamp_stills
    genre_transmutation: 周德昌隨手打開的webtoon閱讀app裡一則讀者留言，意外提到同一站附近的異常，把雅晴溫和的『遺失物』解釋徹底打碎，逼她面對比原本設想更精確、更刻意的規律。
    avoid:
    - instant_cure
    - therapy_lecture
