genre: psychological_thriller
mode: teacher
vessel: 讀懂身體的偵探
main_characters:
- id: su
  name: 蘇雅晴
  name_romaji: Su Yaqing (Iris)
  age: 31
  role: 主人公——台北捷運行控中心異常事件分析員
  visual_anchor: 直短髮別在耳後、深藍色行控值班制服、右手習慣性轉動一枝原子筆
- id: zhou
  name: 周德昌
  name_romaji: Zhou Dechang
  age: 58
  role: 資深值班控制員，即將退休——器（讀懂身體的偵探）
  visual_anchor: 灰白平頭、袖口捲起、桌上一個用了二十年的舊保溫瓶
- id: lin
  name: 林組長
  name_romaji: Team Lead Lin
  age: 45
  role: 值班主管——制度壓力來源
  visual_anchor: 俐落套裝、手上永遠夾著一份待簽的報表夾
scene_palette:
  primary: 行控中心的冷白螢幕光 + 深夜捷運藍
  secondary: 月台霓虹的濕冷灰藍（雨夜反光）
  accent: 一枝始終未關的琥珀色警示燈——全劇唯一反覆出現的暖色
pages:
- page_id: ep_003_p01
  panels:
  - panel_id: ep003_001
    scene: 雅晴的租屋處,白天。牆上開始出現紅線與列印紙——第三個異常事件的時間軸剛被貼上,連成一張簡陋的關聯圖。
    beat_type: standard
  - panel_id: ep003_002
    scene: 插入畫面——巷口的7-11,iBon機台正在列印一張報表,收據緩緩吐出,普通的日常小事。
    beat_type: spatial
    intent: 台灣場景質地——iBon列印
    narrator_caption_by_locale:
      en_US: The 7-Eleven iBon kiosk finishes the printout — an ordinary errand, nothing more.
  - panel_id: ep003_003
    scene: 雅晴把第三張列印紙釘上牆,三個站點、三個時間點,間隔幾乎呈現一個完美的規律。
    beat_type: micro
  - panel_id: ep003_004
    scene: 她的手機震動——手搖飲app通知「您的去冰半糖已完成」,她這才發現自己已經連續第七天沒改過設定,甚至不記得點過。
    beat_type: micro
    intent: 自動導航式的耗竭徵兆
  - panel_id: ep003_005
    scene: 雅晴的臉,專注到近乎失焦——新的、更深的理論正在成形。
    beat_type: micro
    narrator_caption_by_locale:
      zh_TW: 這不是巧合,也不是整人遊戲。這是刻意的。有人在算好間隔,故意讓系統抓不到。
      en_US: This isn't a coincidence, and it isn't a prank — it's deliberate. Isn't it? That's the clue
        no manager will believe.
  - panel_id: ep003_006
    scene: 場景轉換——City Cafe的座位區,雅晴與妹妹蘇雅葳約好見面,但她的筆電就攤在桌上,螢幕還是同一份時間軸。
    beat_type: standard
  - panel_id: ep003_007
    scene: 蘇雅葳看著姊姊心不在焉的樣子,語氣裡有點無奈。
    beat_type: micro
    dialogue_lines:
    - speaker: su_wei
      text_by_locale:
        zh_TW: 姊,妳今天到底有沒有在聽我說話?
        en_US: Are you even listening to me today?
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep003_008
    scene: 雅晴心不在焉地道歉,眼睛卻又飄回手機上的筆記畫面。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 抱歉抱歉,妳說。
        en_US: Sorry — go on, I'm listening.
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep003_009
    scene: 特寫——蘇雅葳的表情,受傷但沒有說破,只是安靜地收起原本想聊的話題。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep003_010
    scene: 大場景——雅葳提前離開了,雅晴獨自坐在City Cafe的座位上,面前是喝到一半的咖啡與攤開的筆電。
    beat_type: long_drop
- page_id: ep_003_p02
  panels:
  - panel_id: ep003_011
    scene: 夜晚,行控中心。林組長把雅晴叫到會議角落,手上夾著報表夾。
    beat_type: standard
  - panel_id: ep003_012
    scene: 林組長,語氣公事公辦但不算不友善。
    beat_type: micro
    dialogue_lines:
    - speaker: lin
      text_by_locale:
        zh_TW: 月底稽核前,這兩件都要結案。系統上顯示已結案,妳為什麼還在查?
        en_US: The manager needs both incidents closed before the audit — the system already marked them
          resolved.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep003_013
    scene: 雅晴,努力維持專業語氣,但聲音裡有一絲少見的堅持。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 紀錄對不上,不能就這樣結案。
        en_US: The records don't match — I can't sign off on this as closed.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep003_014
    scene: 林組長,收起報表夾,語氣沒有變嚴厲,但立場很清楚。
    beat_type: micro
    dialogue_lines:
    - speaker: lin
      text_by_locale:
        zh_TW: 那就拿出結論,不是直覺。
        en_US: Then bring me something conclusive — not a hunch.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
  - panel_id: ep003_015
    scene: 特寫——雅晴的手放在鍵盤上,「結案」與「保持開啟」兩個選項之間的猶豫。
    beat_type: micro
    intent: 選擇的張力
  - panel_id: ep003_016
    scene: 扭曲特寫——監視器牆的網格線在她的視角裡微微魚眼變形,像整個房間都在向她的焦點收縮。
    beat_type: micro
    intent: 類型規範的扭曲特寫（distortion-CU）
  - panel_id: ep003_017
    scene: 周德昌站在稍遠處,看見她下顎緊繃的樣子——身體先於言語的徵兆,他注意到了。
    beat_type: micro
    silence_confirmed: true
    intent: 器的能力：讀身體而非讀螢幕
  - panel_id: ep003_018
    scene: 周德昌走近,聲音比平常短、比平常直接。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 妳的下巴,又緊了。
        en_US: Your jaw's doing that thing again.
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep003_019
    scene: 雅晴沒有回答,視線只是重新回到螢幕上,沉默格。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep003_020
    scene: 大遠景拉開——租屋處牆上的關聯圖,一個新的、還空著的位置已經被貼上了膠帶,等著第四張時間軸。
    beat_type: long_drop
    narrator_caption_by_locale:
      zh_TW: 還差一點。
      en_US: Almost there. But the deadline the manager gave her is shorter than the one she's giving
        herself.
notes:
  arc_position: 第三話——螺旋首次明顯加速。私人時間全面被案件佔據，人際代價第一次外顯（妹妹）；主管首次正式施壓（結案期限）。
  pacing_vs_prior: 二十格，兩頁。場景從控制室擴展到租屋處、City Cafe，範圍比前兩話更廣，反映執念溢出的幅度加大。
  continuity_callbacks: 轉筆／劃線／圈時間戳記的身體徵兆延續為「下巴緊繃」的新徵兆，由周德昌第一次直接點出。
  language: zh_TW為權威語言，en_US僅為操作用註解，非翻譯。
  translation_pipeline_handoff: en_US為審閱用註解草稿；其餘CJK語系另案處理。
craft_notes: 'VESSEL: 讀懂身體的偵探——本話周德昌第一次直接說出他讀到的身體徵兆（panel 18），但仍是觀察式的一句話，非教學演說。GENRE BIBLE: docs/research/manga_craft/psychological_thriller.md


  GENRE-FIRST（zh_TW）: distortion-CU（panel 16）依照類型聖經§2視覺規範首次使用。


  ARC: 螺旋加速→人際代價外顯（妹妹）→制度壓力首次正式化（主管）。


  NATIVE: 台灣繁體中文原創。


  ACCEPTANCE: authored_candidate。'
