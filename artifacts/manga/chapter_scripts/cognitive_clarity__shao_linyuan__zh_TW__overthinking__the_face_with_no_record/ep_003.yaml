  - mrt_fare_gate
  - easycard_tap
  - scooter_commute
  - night_market_stall
  - bubble_tea_app
  - buxiban_classroom
  - line_chat_group
  - ibon_kiosk
  - city_cafe_counter
  - webtoon_reading_app
  market_guardrails:
  - avoid_japan_conbini_default_use_taiwan_7_eleven_ibon_and_city_cafe_instead
  - prefer_atmospheric_literary_register_over_clinical_cbt_framing
  - distinguish_scooter_and_mrt_mobility_from_zh_cn_metro_super_app_framing
  audience_story_rule: Treat online identity, economic pressure, burnout, social performance, fandom,
    romance boundaries, and self-definition as ordinary life texture.
  audience_touchpoints:
  - phone_as_social_pressure
  - group_chat_status
  - creator_or_streaming_identity
  - gig_or_work_pressure
  - transit_between_roles
  - online_offline_self_gap
  genre_relevance_rule: Modern mystery must turn screenshots, transit records, edits, logs, or platform
    behavior into evidence without becoming a tech explainer.
  catalyst:
    id: ibon_printout_timeline_wall
    logline: 雅晴用住處附近7-11的iBon列印出三個異常事件的時間軸,貼上租屋處的牆；手搖飲app在她沒注意的情況下自動幫她點了連續第七天一樣的「去冰半糖」,而值班主管開始要求她在稽核前提出結論。
    ordinary_world_objects:
    - ibon_kiosk
    - bubble_tea_app
    - city_cafe_counter
    - personal_notebook
    genre_transmutation: iBon列印出的時間軸,把她私人的執念第一次變成貼在牆上、看得見的物證；手搖飲app的自動下單,暴露出她連續多日沒有真正做過一個清醒的選擇。
    avoid:
    - instant_cure
    - therapy_lecture
  quality_rubric:
