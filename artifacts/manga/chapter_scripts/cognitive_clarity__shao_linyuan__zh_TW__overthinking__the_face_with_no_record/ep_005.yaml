  catalyst:
    id: retirement_countdown_calendar_forces_the_line
    logline: 休息室牆上的退休倒數月曆翻到只剩二十一天,讓周德昌第一次把他觀察到的身體徵兆說成一句直接的話,而不是繼續沉默地續杯；值班表上,她被排進了更多的夜班。
    ordinary_world_objects:
    - retirement_countdown_calendar
    - duty_roster
    - thermos
    - overtime_log
    genre_transmutation: 退休倒數月曆,把周德昌的沉默守望變成一句有時限的直接勸告；值班表上新增的夜班,把制度壓力和她的執念綁在同一張紙上。
    avoid:
    - instant_cure
    - therapy_lecture
