    Use catalyst 'live_emergency_alarm_missed_by_a_beat'. Market surface rule per config/manga/modern_reader_story_doctrine.yaml
    zh_TW. Use concrete Taiwan objects and social/system pressure on page one; do not name-drop trends.
genre: psychological_thriller
mode: teacher
vessel: 讀懂身體的偵探
main_characters:
- id: su
  name: 蘇雅晴
  name_romaji: Su Yaqing (Iris)
  age: 31
  role: 主人公——台北捷運行控中心異常事件分析員
  visual_anchor: 直短髮別在耳後、深藍色行控值班制服、右手習慣性轉動一枝原子筆
- id: zhou
  name: 周德昌
  name_romaji: Zhou Dechang
  age: 58
  role: 資深值班控制員，即將退休——器（讀懂身體的偵探）
  visual_anchor: 灰白平頭、袖口捲起、桌上一個用了二十年的舊保溫瓶
- id: lin
  name: 林組長
  name_romaji: Team Lead Lin
  age: 45
  role: 值班主管——制度壓力來源
  visual_anchor: 俐落套裝、手上永遠夾著一份待簽的報表夾
scene_palette:
  primary: 行控中心的冷白螢幕光 + 深夜捷運藍
  secondary: 月台霓虹的濕冷灰藍（雨夜反光）
  accent: 一枝始終未關的琥珀色警示燈——全劇唯一反覆出現的暖色
pages:
- page_id: ep_009_p01
  panels:
  - panel_id: ep009_001
    scene: 控制室,平常的夜班。雅晴的副螢幕上是她私人的五站關聯圖,主螢幕的即時畫面牆在她視野邊緣運作著。
    beat_type: standard
    narrator_caption_by_locale:
      en_US: The MRT fare gate live feed sits quiet at the edge of the wall, waiting its turn for her
        attention.
  - panel_id: ep009_002
    scene: 插入畫面——副螢幕特寫,五個站的連線圖,她的注意力完全黏在上面,手指在圖上移動。
    beat_type: micro
  - panel_id: ep009_003
    scene: 主螢幕的角落,一盞緊急通報燈開始閃爍——月台上有乘客暈倒。雅晴沒有反應。
    beat_type: micro
    intent: 威脅性沉默——真實危機未被注意
  - panel_id: ep009_004
    scene: 時間流逝——通報燈持續閃爍,一秒、兩秒、三秒,雅晴的視線仍停在自己的私人案件上。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep009_005
    scene: 周德昌的視線先掃過主螢幕,注意到那盞燈——身體先於言語的反應。
    beat_type: micro
    intent: 器的能力在此展現於真實危機,而非僅止於讀雅晴的身體
  - panel_id: ep009_006
    scene: 周德昌大喊出聲,語氣裡少見的急切。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 雅晴!三號警示燈!
        en_US: Yaqing! Alarm three — now!
      intensity: sharp
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep009_007
    scene: 雅晴猛地回神,視線轉向主螢幕,臉色瞬間發白——通報燈已經閃了六秒。
    beat_type: micro
  - panel_id: ep009_008
    scene: 她的手立刻抓起對講機,聲音努力保持專業,但手在抖。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 西門站月台,乘客暈倒,請站務人員立即前往三號閘門!
        en_US: Ximen platform — passenger down, staff to gate three now!
      intensity: sharp
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep009_009
    scene: 插入畫面——監視器畫面裡,站務人員與救護人員抵達月台,乘客意識恢復,情況沒有惡化。
    beat_type: micro
    narrator_caption_by_locale:
      en_US: Staff reach the platform in time. This time, the cost stayed just short of the worst answer.
  - panel_id: ep009_010
    scene: 特寫——雅晴放下對講機,手還在抖,腎上腺素退去後只剩下後怕。
    beat_type: micro
  - panel_id: ep009_011
    scene: 周德昌看著她,表情凝重——不是生氣,是真正被嚇到了,他很清楚剛剛有多接近失控。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep009_012
    scene: 沉默格——兩人都沒有說話,只有系統警報解除後的靜音提示音還在空氣裡迴盪。頁末懸念。
    beat_type: long_drop
    silence_confirmed: true
    narrator_caption_by_locale:
      en_US: No one names it yet. But the delay is evidence enough, and Zhou is the only witness who saw
        it happen in real time.
- page_id: ep_009_p02
  panels:
  - panel_id: ep009_013
    scene: 隔天,林組長的辦公桌前。系統自動生成的事件報告攤開著,上面清楚標記了「反應延遲:六秒」。
    beat_type: standard
  - panel_id: ep009_014
    scene: 林組長,語氣專業但明顯多了一份嚴肅,和先前討論結案期限時的語氣完全不同。
    beat_type: micro
    dialogue_lines:
    - speaker: lin
      text_by_locale:
        zh_TW: 六秒。妳知道六秒對一個暈倒的乘客代表什麼嗎?
        en_US: Six seconds. Do you know what six seconds means for a passenger who's down?
      intensity: sharp
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep009_015
    scene: 雅晴,難得沒有為自己辯解,誠實地承認。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 我在看別的東西。我的錯。
        en_US: I was looking at something else. That's on me.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep009_016
    scene: 林組長的表情沉了下來——這已經不只是加班或結案期限的問題,而是真正的安全事故。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep009_017
    scene: 林組長,宣布決定,語氣公事公辦但沒有惡意。
    beat_type: micro
    dialogue_lines:
    - speaker: lin
      text_by_locale:
        zh_TW: 在覆核結束前,妳暫時調離主控即時監看的班。
        en_US: Until the review closes, you must step back from live-monitoring duty — this isn't a punishment,
          it's a rule.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
  - panel_id: ep009_018
    scene: 特寫——雅晴愣住。這個決定意味著她會失去接觸即時畫面與異常紀錄的權限——她追查案件最主要的管道。
    beat_type: micro
    intent: 選擇的代價——制度後果第一次直接威脅到執念本身
  - panel_id: ep009_019
    scene: 場景轉換——休息室,周德昌安靜地坐在雅晴對面,兩人之間沒有保溫瓶,也沒有笑容。
    beat_type: standard
  - panel_id: ep009_020
    scene: 周德昌,語氣平靜但每一個字都很重。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 今天,這件事差點不只是花掉妳的時間,而是花掉一條命。
        en_US: Today this almost cost more than your sleep — it almost cost a life. That's the real threat
          here, not the pattern.
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep009_021
    scene: 雅晴,低著頭,沒有反駁,也沒有為自己找理由。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep009_022
    scene: 插入畫面——她的筆記本攤在桌上,紅色的連線圖第一次在她眼裡看起來不像洞見,而像一道傷口。
    beat_type: micro
    intent: 視覺意義翻轉——執念的物件從『成就』變成『代價』的象徵
  - panel_id: ep009_023
    scene: 她的手伸向筆記本,想闔上它,卻在闔到一半時停住,沒有真正閤上。
    beat_type: micro
    intent: 無法停止的核心——即使代價已經清楚呈現
  - panel_id: ep009_024
    scene: 大遠景——雅晴拿著暫時調離主控班的通知單,走出行控中心。身後,控制室的燈光照常運作,少了她的位置也照常運轉。
    beat_type: long_drop
    narrator_caption_by_locale:
      zh_TW: 他們不需要我,也能運作。
      en_US: The room doesn't need her to keep running. But she still can't put the notebook down.
notes:
  arc_position: 第九話——執念首次直接威脅到真實的人命安全，而非僅止於人際或制度代價。制度後果（暫時調離）首次直接切斷她追查案件的管道。
  pacing_vs_prior: 二十四格，兩頁。前半段（page1）刻意壓縮時間感（六秒的延遲），後半段轉為較長的對話場景，呈現代價從『事件』到『後果』的完整過程。
  continuity_callbacks: 筆記本的視覺意義首次翻轉（延續ep_002-008的螺旋視覺化脈絡）；周德昌的『器』能力首次用於真實危機而非僅讀雅晴的身體。
  language: zh_TW為權威語言，en_US僅為操作用註解，非翻譯。
  translation_pipeline_handoff: en_US為審閱用註解草稿；其餘CJK語系另案處理。
craft_notes: 'VESSEL: 讀懂身體的偵探——周德昌本話的『讀』從雅晴的身體徵兆，擴展為讀懂螢幕上的真實危機，證明器的能力並非僅服務於主角的執念，而是服務於整個控制室的責任。GENRE BIBLE:
  docs/research/manga_craft/psychological_thriller.md §6失敗模式8：『代價須在第三卷前累積到位』——本話是全季代價累積的關鍵節點。


  GENRE-FIRST（zh_TW）: 真實安全事故作為類型引擎的具體代價，人類/制度性威脅，非超自然（符合strategy庫anti_pattern_rules）。


  ARC: 危機發生→制度後果（調離）→無法停止（闔不上的筆記本）。


  NATIVE: 台灣繁體中文原創。


  ACCEPTANCE: authored_candidate。'
