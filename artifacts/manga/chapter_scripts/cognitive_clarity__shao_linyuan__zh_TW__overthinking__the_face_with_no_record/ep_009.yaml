  catalyst:
    id: live_emergency_alarm_missed_by_a_beat
    logline: 一名乘客在月台暈倒的緊急通報燈,在雅晴的主控台上閃爍了整整六秒才被注意到——因為她的注意力全部黏在自己案件的五站關聯圖上,而不是眼前正在發生的真實事件。
    ordinary_world_objects:
    - live_emergency_alarm
    - platform_help_point
    - dispatch_radio
    - personal_notebook
    genre_transmutation: 原本用來監控真實乘客安全的通報系統,被她的執念延遲了六秒才回應；這六秒鐘,把她的私人執念第一次和真實的人命安全直接綁在一起。
    avoid:
    - instant_cure
    - therapy_lecture
  quality_rubric:
