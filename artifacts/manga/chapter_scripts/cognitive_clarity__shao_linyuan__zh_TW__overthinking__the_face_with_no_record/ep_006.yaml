  catalyst:
    id: night_market_stakeout_misses_the_buxiban_pickup
    logline: 雅晴騎機車在非值班時間繞去第四個站附近的夜市蹲點，錯過了答應妹妹要去接姪女下補習班的時間，手搖飲app的常態訂單第一次被她自己取消——因為她根本沒空喝。
    ordinary_world_objects:
    - scooter_commute
    - night_market_stall
    - buxiban_classroom
    - bubble_tea_app
    genre_transmutation: 夜市的日常喧鬧，被她重新讀成監視第四個站的最佳掩護；錯過姪女補習班接送的訊息通知，把她的執念第一次量化成一個具體的、被辜負的承諾。
    avoid:
    - instant_cure
    - therapy_lecture
