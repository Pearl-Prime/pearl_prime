  catalyst:
    id: off_duty_confrontation_wrong_umbrella
    logline: 失去即時監看權限的雅晴,利用自己的悠遊卡歷史查詢權限（超出授權範圍）調出第五站的乘客資料，並在下班後守在站外，攔下一個撐傘的陌生人——結果認錯了人，在月台出口造成一場公開的難堪。
    ordinary_world_objects:
    - easycard_tap
    - mrt_fare_gate
    - personal_notebook
    - incident_report_form
    genre_transmutation: 她用來守護月台安全的查詢權限，第一次被用在授權範圍以外的地方；一把再普通不過的雨傘，讓她在眾目睽睽之下認錯了人，把私人執念變成公開的失態。
    avoid:
    - instant_cure
    - therapy_lecture
