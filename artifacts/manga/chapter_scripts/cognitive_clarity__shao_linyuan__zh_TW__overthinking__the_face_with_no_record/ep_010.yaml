genre: psychological_thriller
mode: teacher
vessel: 讀懂身體的偵探
main_characters:
- id: su
  name: 蘇雅晴
  name_romaji: Su Yaqing (Iris)
  age: 31
  role: 主人公——台北捷運行控中心異常事件分析員
  visual_anchor: 直短髮別在耳後、深藍色行控值班制服、右手習慣性轉動一枝原子筆
- id: zhou
  name: 周德昌
  name_romaji: Zhou Dechang
  age: 58
  role: 資深值班控制員，即將退休——器（讀懂身體的偵探）
  visual_anchor: 灰白平頭、袖口捲起、桌上一個用了二十年的舊保溫瓶
- id: lin
  name: 林組長
  name_romaji: Team Lead Lin
  age: 45
  role: 值班主管——制度壓力來源
  visual_anchor: 俐落套裝、手上永遠夾著一份待簽的報表夾
scene_palette:
  primary: 行控中心的冷白螢幕光 + 深夜捷運藍
  secondary: 月台霓虹的濕冷灰藍（雨夜反光）
  accent: 一枝始終未關的琥珀色警示燈——全劇唯一反覆出現的暖色
pages:
- page_id: ep_010_p01
  panels:
  - panel_id: ep010_001
    scene: 雅晴的租屋處。被調離即時監看班之後,她第一次不是靠職務,而是靠自己的悠遊卡歷史查詢權限,登入系統。
    beat_type: standard
  - panel_id: ep010_002
    scene: 插入畫面——螢幕上跳出一則系統警告:「此查詢超出目前職務授權範圍,是否繼續?」她的手指停在「繼續」上方。
    beat_type: micro
    intent: 選擇的張力——授權界線
    narrator_caption_by_locale:
      en_US: 'A system warning: this query is outside her current authorization. That''s the rule she''s
        about to break.'
  - panel_id: ep010_003
    scene: 她按下了「繼續」——這是全季第一次,她主動跨越一條明確畫出的線,而不是被案件無意間拖過去。
    beat_type: micro
    narrator_caption_by_locale:
      zh_TW: 就這一次。
      en_US: Just this once. That's the promise she keeps not keeping — this time it's a rule, not just
        a habit.
  - panel_id: ep010_004
    scene: 調出的資料裡,第五站的某個時段有一小群乘客的悠遊卡歷史看起來略微異常——但異常的定義,已經完全由她一個人決定。
    beat_type: micro
    narrator_caption_by_locale:
      en_US: The easycard tap history looks strange only because she's the one deciding what strange means
        now.
  - panel_id: ep010_005
    scene: 場景轉換——傍晚,第五站出口。雅晴穿著便服,不是值班身分,站在閘門外守著。
    beat_type: standard
  - panel_id: ep010_006
    scene: 人群中,一個撐著黑傘的身影從閘門走出——體型、步態,都與她記憶裡的畫面吻合。
    beat_type: micro
  - panel_id: ep010_007
    scene: 雅晴的心跳加速,她快步上前,伸手攔住那個人。
    beat_type: micro
  - panel_id: ep010_008
    scene: 雅晴,聲音因為緊張而有點大聲。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 等一下,我需要跟你確認幾件事。
        en_US: Wait — I need to ask you a few things.
      intensity: sharp
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep010_009
    scene: 那個人轉過身——是一位驚訝的中年男子,傘下的臉完全陌生,和雅晴腦中想像的畫面毫無關聯。
    beat_type: micro
    intent: 認錯人——執念的具體崩潰
  - panel_id: ep010_010
    scene: 陌生男子,語氣困惑又有點警戒。
    beat_type: micro
    dialogue_lines:
    - speaker: stranger
      text_by_locale:
        zh_TW: 小姐,妳是哪位?我不認識妳。
        en_US: I'm sorry — do I know you? I don't understand.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep010_011
    scene: 周圍的乘客開始注意到這場騷動,有人拿出手機,鏡頭對準了雅晴。
    beat_type: micro
    intent: 公開難堪的具體化——手機鏡頭
    narrator_caption_by_locale:
      en_US: A dozen strangers are suddenly a witness to something she can't explain.
  - panel_id: ep010_012
    scene: 大場景拉開——雅晴站在人群中央,手還懸在半空,那個陌生男子已經一臉戒備地退開。頁末懸念。
    beat_type: long_drop
- page_id: ep_010_p02
  panels:
  - panel_id: ep010_013
    scene: 雅晴慌亂地道歉,聲音發抖,周圍的視線讓她第一次真正意識到自己在做什麼。
    beat_type: micro
    dialogue_lines:
    - speaker: su
      text_by_locale:
        zh_TW: 對不起,我認錯人了,真的很抱歉。
        en_US: I'm sorry — I mistook you for someone else. I'm really sorry.
      intensity: sharp
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep010_014
    scene: 陌生男子搖搖頭,快步離開,沒有再多說什麼,但那種被冒犯的表情留在雅晴腦海裡揮之不去。
    beat_type: micro
  - panel_id: ep010_015
    scene: 插入畫面——有人的手機畫面上,雅晴攔人的那一刻已經被錄下,標題寫著「捷運站外怪女子攔人」。
    beat_type: micro
    intent: 公開紀錄——社群平台的代價
    narrator_caption_by_locale:
      en_US: Someone's phone already has the clip — a stranger's clue turned into a public record before
        she could stop it.
  - panel_id: ep010_016
    scene: 雅晴獨自站在原地,人群漸漸散去,她的手還在抖,這次不是因為線索,而是因為羞愧。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep010_017
    scene: 她的手機震動——是周德昌,不知道從哪裡得知了消息。
    beat_type: micro
  - panel_id: ep010_018
    scene: 周德昌的訊息很短。
    beat_type: micro
    dialogue_lines:
    - speaker: zhou
      text_by_locale:
        zh_TW: 我聽說了。妳現在在哪裡?
        en_US: I heard. Where are you right now?
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
  - panel_id: ep010_019
    scene: 雅晴看著訊息,一時不知道該怎麼回答——她不知道該說自己在哪裡,還是該說自己變成了什麼樣子。
    beat_type: micro
  - panel_id: ep010_020
    scene: 場景轉換——她的租屋處,深夜。她坐在牆邊的關聯圖前,第一次真正看清楚這面牆——紅線、便條、時間軸,像是別人的房間。
    beat_type: standard
    intent: 視角翻轉——首次以旁觀者的眼光看見自己的執念
  - panel_id: ep010_021
    scene: 特寫——她的手撫過牆上的紅線,第一次帶著遲疑,而不是專注。
    beat_type: micro
  - panel_id: ep010_022
    scene: 插入畫面——手機裡那則調閱查詢的系統警告訊息還開著,「此查詢超出授權範圍」幾個字還亮著。
    beat_type: micro
  - panel_id: ep010_023
    scene: 沉默格——雅晴坐在牆前,沒有拆下任何一張便條,也沒有再新增任何一條線。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep010_024
    scene: 大遠景拉開——她獨自坐在關聯圖前,窗外的夜色與夜市燈光透進來,她的表情第一次混雜了執念與清醒,兩者同時存在。
    beat_type: long_drop
    narrator_caption_by_locale:
      zh_TW: 我到底在找什麼?
      en_US: What was she even looking for? For the first time, the question sounds like a real one —
        not rhetorical, not resolved.
notes:
  arc_position: 第十話——執念首次造成無可挽回的公開代價（社群平台紀錄），也是雅晴首次以旁觀者視角看見自己的行為。尚未停止，但認知出現真正的裂縫。
  pacing_vs_prior: 二十四格，兩頁。前半段節奏加快（攔錯人的衝突場景），後半段刻意放慢至沉默與凝視，對照全話情緒轉折。
  continuity_callbacks: 牆上關聯圖（延續ep_003首次出現）在本話首次被『旁觀者視角』重新框架；周德昌的簡短訊息延續ep_005『代價直接落地』的語言風格。
  language: zh_TW為權威語言，en_US僅為操作用註解，非翻譯。
  translation_pipeline_handoff: en_US為審閱用註解草稿；其餘CJK語系另案處理。
craft_notes: 'VESSEL: 讀懂身體的偵探——本話周德昌不在場，但他的簡訊延續器一貫的節制風格：不說教、只確認在場。GENRE BIBLE: docs/research/manga_craft/psychological_thriller.md
  §6失敗模式1：嚴禁『我意識到自己在鑽牛角尖』式的自我點破台詞——panel 24的提問刻意保持疑問句、非結論句，避免違反此規範。


  GENRE-FIRST（zh_TW）: 認錯人的公開難堪，是威脅『擴散且可能來自內部』的類型核心——威脅不再只是外部的謎，而是雅晴自己的判斷力本身。


  ARC: 主動越界（授權查詢）→具體公開代價（認錯人、被錄影）→旁觀者視角的第一次真正凝視。


  NATIVE: 台灣繁體中文原創。


  ACCEPTANCE: authored_candidate。'
