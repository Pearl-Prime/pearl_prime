title: The Forest Keeps Their Names — Episode 1
manga_author: Rowan Vale
teacher_id: brand_teacher_unresolved
brand_id: healing_ground_healing
engine: GRIEF
locale: en_US
default_locale: en_US
available_locales:
- en_US
- ja_JP
- zh_CN
- zh_TW
genre: dark_fantasy
mode: teacher
vessel: the Keeper / the living land
main_characters:
- id: ash
  name: Ash Keller
  age: 31
  role: protagonist (warden of a living wood — still hears a voice the trees won't
    release)
  visual_anchor: travel cloak, ash-smudged gloves, a ribbon tied to the staff that
    isn't theirs
- id: keeper
  name: Keeper
  age: unspecified
  role: vessel presence — doctrine as observation, never advice; never a named brand
    teacher
  visual_anchor: genre-native; face optional; hands and posture carry doctrine
scene_palette:
  primary: genre-led; see craft_notes
  secondary: warm accent for renewal beats
  accent: one recurring visual through-line
pages:
- page_id: ep_001_p01
  panels:
  - panel_id: ep001_001
    scene: Mist at the edge of a living wood. Ash Keller stands where the path thins.
      The land is watching without eyes.
    beat_type: micro
    intent: Establish genre world
    silence_confirmed: true
  - panel_id: ep001_002
    scene: Close on a token or blade Ash Keller carries. It is quiet when it should
      answer. That silence is the wound.
    beat_type: micro
    intent: Body before mind
    silence_confirmed: true
  - panel_id: ep001_003
    scene: Something in the trees shifts — not an attack, a refusal. The land will
      not be forced.
    beat_type: micro
    narrator_caption_by_locale:
      en_US: The day has a shape. The body already knows it.
      ja_JP: '[ja_JP] The day has a shape. The body already knows it.'
      zh_TW: '[zh_TW] The day has a shape. The body already knows it.'
      zh_CN: '[zh_CN] The day has a shape. The body already knows it.'
  - panel_id: ep001_004
    scene: Medium on Ash Keller's face. Alert, not yet broken. Age 31. travel cloak.
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_005
    scene: Ash Keller pushes through — the competent move. Genre action continues.
      Inside, the topic-weather (grief) is only posture and breath, never named.
    beat_type: micro
    dialogue_lines:
    - speaker: ash
      text_by_locale:
        en_US: I've got it.
        ja_JP: '[ja_JP] I''ve got it.'
        zh_TW: '[zh_TW] I''ve got it.'
        zh_CN: '[zh_CN] I''ve got it.'
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
  - panel_id: ep001_006
    scene: 'Cost lands in the body: jaw, hands, a held breath. The genre world does
      not pause for it.'
    beat_type: micro
    intent: Wound — body cost
    sfx_by_locale:
      en_US: …
      ja_JP: '[ja_JP] …'
      zh_TW: '[zh_TW] …'
      zh_CN: '[zh_CN] …'
  - panel_id: ep001_007
    scene: Ash Keller doubles down. More force, more performance, more pattern. The
      vessel has not entered yet.
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_008
    scene: 'Wide: the genre pressure peaks — a clash, a meeting, a cold room, a feed
      spike, a bell. Still no lecture. Only weather.'
    beat_type: micro
    intent: Peak pressure
  - panel_id: ep001_009
    scene: 'Enter the vessel: a keeper who speaks only by placing a palm on warm ground.
      No name from any teaching lineage. Only presence. (the Keeper / the living land:
      doctrine as observation, never advice)'
    beat_type: micro
    intent: Vessel enters — teacher never named
    silence_confirmed: true
  - panel_id: ep001_010
    scene: The vessel does one small genre-native act — hands on a ritual, palm on
      ground, a chair pulled out, a foot placement corrected, a frequency trusted.
      No advice speech.
    beat_type: micro
    intent: Turn begins
    silence_confirmed: true
  - panel_id: ep001_011
    scene: Ash Keller watches. The body settles a half-second before the mind agrees.
    beat_type: micro
    narrator_caption_by_locale:
      en_US: It knew first.
      ja_JP: '[ja_JP] It knew first.'
      zh_TW: '[zh_TW] It knew first.'
      zh_CN: '[zh_CN] It knew first.'
  - panel_id: ep001_012
    scene: Optional vessel line — practical, not doctrinal.
    beat_type: micro
    dialogue_lines:
    - speaker: keeper
      text_by_locale:
        en_US: Don't override. Settle.
        ja_JP: '[ja_JP] Don''t override. Settle.'
        zh_TW: '[zh_TW] Don''t override. Settle.'
        zh_CN: '[zh_CN] Don''t override. Settle.'
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
  - panel_id: ep001_013
    scene: Ash Keller tries the smaller move once. Genre action continues, but from
      a different body.
    beat_type: micro
    intent: Renewal attempt
  - panel_id: ep001_014
    scene: The world answers slightly — telemetry eases, land warms, room quiets,
      second lap cleans, feed dims. Not victory. Permission.
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_015
    scene: Closing wide. Ash Keller keeps one small act on purpose. The topic is still
      present as weather. No mastery. No cure. A first tool.
    beat_type: micro
    narrator_caption_by_locale:
      en_US: I don't have to finish it. I have to notice it once.
      ja_JP: '[ja_JP] I don''t have to finish it. I have to notice it once.'
      zh_TW: '[zh_TW] I don''t have to finish it. I have to notice it once.'
      zh_CN: '[zh_CN] I don''t have to finish it. I have to notice it once.'
  - panel_id: ep001_016
    scene: Typographic end card on a quiet field of color.
    beat_type: micro
    narrator_caption_by_locale:
      en_US: End of Episode 1 — The Forest Keeps Their Names
      ja_JP: '[ja_JP] End of Episode 1 — The Forest Keeps Their Names'
      zh_TW: '[zh_TW] End of Episode 1 — The Forest Keeps Their Names'
      zh_CN: '[zh_CN] End of Episode 1 — The Forest Keeps Their Names'
notes:
  pacing: Sixteen panels — entry-floor clear, webtoon-breathing. Silence does work;
    dialogue only at inflection. Genre story on the surface; topic as body weather
    only.
  bubble_style_register: 'Protagonist dialogue: round_normal, often whisper. Vessel
    lines: soft, practical, never lecture.'
  sfx_policy: Minimal. Whisper-register only. No BANG-register for therapeutic brands.
  translation_pipeline_handoff: text_by_locale populated for en_US; CJK placeholders
    for Phase translate_chapter_script.py.
craft_notes: 'VESSEL: the Keeper / the living land — doctrine as observation, never
  advice. Cited from config/manga/manga_mode_vessels.yaml. Teacher is NEVER named
  in-story (teacher_id=''brand_teacher_unresolved'' is metadata only).

  GENRE BIBLE: docs/research/manga_craft/dark_fantasy.md

  GENRE-FIRST: surface plot is a dark fantasy story; topic (grief) is the protagonist''s
  interior weather — posture, breath, cost — never the title card.

  ARC: wound (force/perform/flee) → turn (vessel models settle) → renewal (one kept
  act).

  ACCEPTANCE LAYER: authored + gate-floor + craft-reviewed — NOT claimed bestseller
  (M6 bar).'
