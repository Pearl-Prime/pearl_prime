pages:
- page_id: ep_001_p01
  panels:
  - panel_id: ep001_001
    scene: School corridor, fluorescent weather. Lockers, posters, the smell of floor
      wax. Yuki Tan moves like the bell is a verdict.
    beat_type: micro
    intent: Establish genre world
    silence_confirmed: true
  - panel_id: ep001_002
    scene: Close on a pencil case organized like armor. Hands steady only when busy.
    beat_type: micro
    intent: Body before mind
    silence_confirmed: true
  - panel_id: ep001_003
    scene: The bell. Bodies flood. Yuki Tan's throat tightens on schedule.
    beat_type: micro
    narrator_caption_by_locale:
      en_US: The day has a shape. The body already knows it.
      ja_JP: '[ja_JP] The day has a shape. The body already knows it.'
      zh_TW: '[zh_TW] The day has a shape. The body already knows it.'
      zh_CN: '[zh_CN] The day has a shape. The body already knows it.'
  - panel_id: ep001_004
    scene: Medium on Yuki Tan's face. Alert, not yet broken. Age 16. uniform slightly
      large.
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_005
    scene: Yuki Tan pushes through — the competent move. Genre action continues. Inside,
      the topic-weather (anxiety) is only posture and breath, never named.
    beat_type: micro
    dialogue_lines:
    - speaker: yuki
      text_by_locale:
        en_US: I've got it.
        ja_JP: '[ja_JP] I''ve got it.'
        zh_TW: '[zh_TW] I''ve got it.'
        zh_CN: '[zh_CN] I''ve got it.'
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
  - panel_id: ep001_006
    scene: 'Cost lands in the body: jaw, hands, a held breath. The genre world does
      not pause for it.'
    beat_type: micro
    intent: Wound — body cost
    sfx_by_locale:
      en_US: …
      ja_JP: '[ja_JP] …'
      zh_TW: '[zh_TW] …'
      zh_CN: '[zh_CN] …'
  - panel_id: ep001_007
    scene: Yuki Tan doubles down. More force, more performance, more pattern. The
      vessel has not entered yet.
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_008
    scene: 'Wide: the genre pressure peaks — a clash, a meeting, a cold room, a feed
      spike, a bell. Still no lecture. Only weather.'
    beat_type: micro
    intent: Peak pressure
  - panel_id: ep001_009
    scene: 'Enter the vessel: an upperclassman who keeps the club room clock wrong
      on purpose. No name from any teaching lineage. Only presence. (the club room
      ritual: a different clock than the bell)'
    beat_type: micro
    intent: Vessel enters — teacher never named
    silence_confirmed: true
  - panel_id: ep001_010
    scene: The vessel does one small genre-native act — hands on a ritual, palm on
      ground, a chair pulled out, a foot placement corrected, a frequency trusted.
      No advice speech.
    beat_type: micro
    intent: Turn begins
    silence_confirmed: true
  - panel_id: ep001_011
    scene: Yuki Tan watches. The body settles a half-second before the mind agrees.
    beat_type: micro
    narrator_caption_by_locale:
      en_US: It knew first.
      ja_JP: '[ja_JP] It knew first.'
      zh_TW: '[zh_TW] It knew first.'
      zh_CN: '[zh_CN] It knew first.'
  - panel_id: ep001_012
    scene: Optional vessel line — practical, not doctrinal.
    beat_type: micro
    dialogue_lines:
    - speaker: upperclassman
      text_by_locale:
        en_US: Don't override. Settle.
        ja_JP: '[ja_JP] Don''t override. Settle.'
        zh_TW: '[zh_TW] Don''t override. Settle.'
        zh_CN: '[zh_CN] Don''t override. Settle.'
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
  - panel_id: ep001_013
    scene: Yuki Tan tries the smaller move once. Genre action continues, but from
      a different body.
    beat_type: micro
    intent: Renewal attempt
  - panel_id: ep001_014
    scene: The world answers slightly — telemetry eases, land warms, room quiets,
      second lap cleans, feed dims. Not victory. Permission.
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_015
    scene: Closing wide. Yuki Tan keeps one small act on purpose. The topic is still
      present as weather. No mastery. No cure. A first tool.
    beat_type: micro
    narrator_caption_by_locale:
      en_US: I don't have to finish it. I have to notice it once.
      ja_JP: '[ja_JP] I don''t have to finish it. I have to notice it once.'
      zh_TW: '[zh_TW] I don''t have to finish it. I have to notice it once.'
      zh_CN: '[zh_CN] I don''t have to finish it. I have to notice it once.'
