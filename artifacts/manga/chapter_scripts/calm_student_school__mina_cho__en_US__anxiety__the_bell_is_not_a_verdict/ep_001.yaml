    scene: Typographic end card on a quiet field of color.
    beat_type: micro
    narrator_caption_by_locale:
      en_US: End of Episode 1 — The Bell Is Not a Verdict
      ja_JP: '[ja_JP] End of Episode 1 — The Bell Is Not a Verdict'
