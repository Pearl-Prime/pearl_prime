    scene: Medium on Niko Alvarez's face. Alert, not yet broken. Age 19. team singlet.
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_005
    scene: Niko Alvarez pushes through — the competent move. Genre action continues.
      Inside, the topic-weather (burnout) is only posture and breath, never named.
    beat_type: micro
    dialogue_lines:
    - speaker: niko
      text_by_locale:
        en_US: I've got it.
        ja_JP: '[ja_JP] I''ve got it.'
