    beat_type: micro
    intent: Establish genre world
    silence_confirmed: true
  - panel_id: ep001_002
    scene: Close on feet in spikes or shoes. The start is a story the body tells.
    beat_type: micro
    intent: Body before mind
    silence_confirmed: true
  - panel_id: ep001_003
    scene: Whistle or starter. First effort is for the watchers.
    beat_type: micro
    narrator_caption_by_locale:
