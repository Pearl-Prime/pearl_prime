notes:
  arc_position: |
    Episode 12 of 12 — arc 1's close (the "recruit" phase per ASSIGNMENT_MATRIX.tsv
    arc_shape_hint: recruit -> losing streak -> breakthrough -> championship). Per
    the bible's explicit instruction, this is a TURN into arc 2, not a resolution:
    Shinonome advances by the narrowest possible margin off-panel (61-59, shown only
    as an aftermath scoreboard), the tournament bracket immediately names an
    undefeated defending champion (Kiryuu Pharma, reusing ep_008's established
    rival rather than introducing a generic new opponent) as the next match, and a
    calendar notification confirms Hayato's probation review exactly one week out.
    Both countdowns are live and unresolved when the episode ends. acceptance_layer
    is authored_candidate only; nothing here claims a cure, a win-as-healed beat, or
    a trophy proving growth.
  pacing_vs_prior: |
    29 panels across four pages — denser than a single escalation page because two
    separate collisions (tournament bracket + workplace calendar) each need their
    own concrete object and room to land in the same evening without either being
    compressed into an aside. The actual decisive shot from ep_011 is deliberately
    NOT restaged or replayed here; the episode opens already past the buzzer, on
    the scoreboard and the breathing, per the strategy bank's rule that the
    buzzer-beater must never be the carrier beat.
  continuity_callbacks: |
    - Old sneakers "just in case" (ep_001 visual anchor) — referenced again in the
      locker corridor (panel 005) and the shoe locker beat (panel 015).
    - Kuroda's silent ball-rack reset (established ep_003) — returns at panels 023
      and 026, still wordless, still no lecture.
    - The conbini receipt device (ep_010's vessel for Kuroda's wisdom) returns at
      panel 021, but this time it only marks how late the hour is — it is not
      reused as a teaching object, so the device does not repeat its function.
    - The company ID badge / rooftop-adjacent building object (seeded in ep_001's
      catalyst) returns at panel 022 as the concrete reason Hayato is able to walk
      back into the gym after hours instead of going straight home.
    - The free-throw line and the single basketball (the strategy bank's signature
      device, fully executed in ep_011) return at panel 027, but Hayato does not
      shoot. He turns the ball over once and stops. This is a deliberate departure
      from beat 9 of strategy_01's plot skeleton (which has the protagonist
      shooting again at the empty gym) — repeating the shot here would read as a
      second "technique lands" triumph beat stacked on top of the game's own win,
      violating the anti-pattern rule against letting the arc resolve on the
      object performing correctly. Stillness without the shot is the chosen
      substitute beat for this closing episode specifically.
  vessel_handling: |
    Kuroda speaks exactly two total words of dialogue this episode ("残業か。" —
    three morae, effectively one dry question) and never comments on the bracket,
    never comments on Hayato's face, never explains why staying might help. His
    only actions are the wordless rack-reset and killing the lights on his way
    out. No coach-explains-the-lesson violation; the vessel doctrine ("the coach
    of the unclenched") is carried entirely by what he does NOT say.
  translation_handoff: |
    text_by_locale populated for ja_JP (authoritative, natively authored — not a
    translation of an English draft) and en_US (real operator-facing translation,
    not a gloss placeholder). zh_TW and zh_CN carry bracket placeholders
    ('[zh_TW] <en_US line>' / '[zh_CN] <en_US line>') pending a dedicated
    localization pass, matching the convention established in
    heart_balance_shojo__tsukimura_yui__ja_JP__social_anxiety__two_cups_on_the_counter/ep_001.yaml.
  genre_taxonomy_normalization: |
    The modern_reader_context object above is copied verbatim from
    story_architecture_handoff.json's chapters[11].story_craft entry for this
    chapter (same catalyst id, logline, ordinary_world_objects,
    genre_transmutation, avoid list, market/audience blocks, quality rubric, and
    craft_directive — nothing in the catalyst itself was changed), with one
    deliberate, documented exception matching the fix already applied by the
    parallel agents on this same series' ep_001 (and siblings): the source
    JSON's genre_id and relevance_genre fields both read "sports_competition",
    which is not itself a row in config/manga/canonical_genre_list.yaml or
    config/manga/modern_reader_story_doctrine.yaml (only "sports" is;
    "sports_competition" is listed only as an inbound ALIAS of "sports", and
    separately as an allowed strategy_genre under the canonical "sports" row in
    config/manga/story_genre_alias_coherence.yaml). Using the literal source
    value verbatim makes scripts/manga/validate_story_excellence.py hard-fail on
    both MANGA.STORY.RESEARCH_DOCTRINE_COVERAGE (relevance_genre not in the
    canonical 25) and MANGA.STORY.ALIAS_COHERENCE (no alias row matches). This
    episode therefore sets genre_id: sports and relevance_genre: sports (both
    canonical) while keeping strategy_genre: sports_competition unchanged (an
    explicitly allowed strategy_genre for the "sports" canonical row) — a
    taxonomy-identifier fix, not a catalyst change.
