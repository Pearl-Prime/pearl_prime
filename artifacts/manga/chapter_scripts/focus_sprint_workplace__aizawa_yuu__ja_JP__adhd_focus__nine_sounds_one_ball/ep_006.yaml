notes:
  arc_position: |
    Episode 6 of 12 — the tournament-arc opening beat per the series bible's
    per-episode assignment. Episodes 1-5 established the recruitment, first
    practice, Kuroda's wordless first lesson, the first small win, and the
    workplace/basketball identity collision. This episode raises stakes from
    Hayato's individual struggle to the whole team's survival, via a
    bureaucratic deadline rather than a game. It does not touch the "One Ball
    at the Line" strategy's carrier beats directly (those are paced across
    ep_003 / ep_010 / ep_011 per the throughline); this episode's job is pure
    plot escalation plus Hayato's first formal, binding commitment to the team.
  pacing_vs_prior: |
    28 panels across five page groups — denser than the series' quieter
    character episodes, matching the genre bible's higher panel count for a
    tension/deadline chapter. Splits attention between two locations
    (workplace floors and gym) more aggressively than any prior episode,
    mirroring the episode's own theme of divided attention under pressure.
  continuity_callbacks: |
    - The rooftop (panels 4-8) returns from ep_001, now carrying dread instead
      of invitation — the same space repurposed by escalated stakes.
    - Hayato's knuckle-tapping pen (established in the cast bible) is the same
      pen he uses to sign the roster in panel 12 — the overload tic
      repurposed as the commitment gesture.
    - Kuroda appears wordlessly in the practice intercut (panel 19), unbroken
      from his established pattern of silent presence rather than commentary,
      continuing without advancing the mentor thread this episode.
    - The ep_005 workplace/basketball collision is escalated from an
      interruption (a notification mid-drill) into active cooperation — this
      is the first episode where Hayato's day-job competence directly rescues
      the team, not just distracts him from it.
  doctrinal_anchor_vessel_handling: |
    Kuroda (vessel: "the coach of the unclenched") is kept strictly wordless
    this episode, per the arc-1 assignment — his only appearance is the
    silent ball-rack reset in panel 19, continuing the established pattern
    without adding dialogue or advancing the focus-strategy carrier beat,
    which belongs to later episodes. No character explains the ADHD engine
    aloud; the team's own scattered practice under paperwork pressure
    (panel 18) is used only as a light structural echo, not a lecture, and is
    corrected by Endou's ordinary coaching bark, not by any stated insight
    about focus. No trophy, scoreboard, or game result appears in this
    episode; the "win" (a form filed on time) is explicitly undercut by
    Endou's flat warning in panel 26, keeping the arc's no-triumph doctrine
    intact even at a minor procedural victory.
  translation_handoff: |
    text_by_locale dicts populated for ja_JP (authoritative, native-authored)
    and en_US (real operator-review gloss, not a literal back-translation).
    zh_TW and zh_CN carry bracket-placeholder stand-ins matching the en_US
    line, per the heart_balance_shojo ep_001 bilingual-field convention,
    pending the separate CJK translation-quality lane.
