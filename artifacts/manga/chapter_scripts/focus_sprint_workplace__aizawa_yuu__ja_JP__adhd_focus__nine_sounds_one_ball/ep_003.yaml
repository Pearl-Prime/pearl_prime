main_characters:
- id: hayato
  name: 神崎 隼人
  name_romaji: Kanzaki Hayato
  age: 23
  role: 主人公。東雲商事・営業支援部の新入社員。元高校バスケ部ポイントガード。
  visual_anchor: 半分崩れたシャツの裾、緩めたネクタイ、過負荷になると拳にペンを打ちつける癖、机の引き出しに"念のため"のスニーカー。
- id: kuroda
  name: 黒田
  name_romaji: Kuroda
  age: 60代
  role: 器の存在。元セミプロ選手、怪我でB2相当のチームを離れ、今は会社の設備・施設管理員として、夜間の体育館を静かに開けている。ブランド教師の名は決して使わない。
  visual_anchor: 白髪頭、丸まった背中、無駄のない手の動き。合図はいつもボールラックを黙って直すこと。台詞は一話につき数語まで。

scene_palette:
  primary: 蛍光灯の白青いオフィスから、体育館の乾いたアンバーへの移行
  secondary: 深夜の通勤電車の冷たい青、玄関先の暖色
  accent: バスケットボール一つ分のオレンジ——この話で確立される反復的な視覚スルーライン

pages:
- page_id: ep_003_p01
  panels:
  - panel_id: ep003_001
    scene: |
      ワイド。東雲商事、営業支援部のフロア。夜九時を過ぎ、蛍光灯は半分落とされている。
      隼人の机だけが、ノートパソコンの青白い光で浮かんでいる。ネクタイは緩み、シャツの
      裾は半分外に出たまま。
    beat_type: standard
    intent: 職場の基準線を確立する——半分崩れたシャツという視覚アンカーの再確認
    silence_confirmed: true
  - panel_id: ep003_002
    scene: |
      隼人のスマホ画面のクローズアップ。LINEの「東雲バスケ部」グループに未読が三件。
      彩からの短いメッセージだけが表示されている。
    beat_type: micro
    narrator_caption_by_locale:
      ja_JP: チームのLINEは、既読がつかないまま残っている。
      en_US: The team's line chat sits unread.
      zh_TW: '[zh_TW] The team''s line chat sits unread.'
      zh_CN: '[zh_CN] The team''s line chat sits unread.'
    dialogue_lines:
    - speaker: aya_message
      text_by_locale:
        ja_JP: 明日も、来る?
        en_US: 'Are you coming tomorrow?'
        zh_TW: '[zh_TW] Are you coming tomorrow?'
        zh_CN: '[zh_CN] Are you coming tomorrow?'
      intensity: normal
      bubble_style: notification_chip
      tail_style: dotless
      position_hint: top_right
  - panel_id: ep003_003
    scene: |
