notes:
  arc_position: |
    Episode 3 of 12, arc 1's "recruit" phase. Per the beat matrix, this is
    Kuroda's first wordless lesson: after-hours gym, forgotten shoes, at most
    two to three words of dialogue from Kuroda across the whole episode. Ep_002
    (first practice, sensory overload, near-quit) was not present on disk at
    authoring time; this episode proceeds from the bible's beat description of
    it only, treating it as a recent, raw prior event referenced but not shown.
  pacing_vs_prior: |
    30 panels across two pages, off-game and two-hander in cast (only Hayato
    and Kuroda appear on panel; Aya is present only as an unread notification).
    Deliberately slower and quieter than a practice or match chapter would be,
    matching the craft bible's off-game chapter-ending convention: this
    episode closes on a single image of a private choice continuing after
    dark, not on a game outcome.
  continuity_callbacks: |
    - Desk-drawer "just in case" sneakers (panel 4) established per the series
      bible's Hayato visual anchor, explicitly distinguished from the real
      practice shoes he actually needs.
    - Ep_002's abandoned shoes (panel 5) recalled as a brief, wordless visual
      flash, never narrated.
    - Kuroda's signature gesture, silently resetting the ball rack, is on
      panel in six separate beats (11, 13, 15, 17, 18, 26), established as his
      default state rather than a one-off action.
    - The desk-drawer sneakers and the genkan placement (panel 30) form a
      matched pair across the episode: shoes hidden away at the start, shoes
      left ready at the end, with no line of dialogue stating the change.
  doctrinal_anchor_vessel_handling: |
    Kuroda never explains the lesson and is never named as a coach or teacher
    in the text. His entire spoken dialogue budget for the episode is one
    line, two words ("also asahi na" / "Tomorrow, then."), delivered without
    turning to face Hayato. The free-throw demonstration (panels 18-24) is
    staged as pure physical action: one deliberate bounce, a held silent beat,
    a clean release, and Kuroda visibly not watching whether the shot went in,
    a small-scale rehearsal of the arc-wide anti-pattern rule that the
    scoreboard must never resolve or prove anything. Hayato's own registration
    of the technique (panel 25) is described strictly as an observed physical
    detail, what Kuroda's eyes were doing, never as a stated insight or named
    lesson, per the strategy bank's rule that the turn must be externalized in
    the sport's object and never spoken aloud by the mentor or the narration.
  translation_handoff: |
    text_by_locale populated for ja_JP (authoritative, native-authored) and
    en_US (real operator-review gloss, not a literal translation) on every
