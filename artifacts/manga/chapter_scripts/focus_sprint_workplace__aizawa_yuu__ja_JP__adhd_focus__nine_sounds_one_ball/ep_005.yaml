  doctrinal_anchor_vessel_handling: |
    Kuroda never states the lesson. His entire intervention is nonverbal
    action (picking the phone off the floor, panel 018; placing it in the
    same row as the balls, panel 019) plus a single three-word practical
    line (panel 020, "先に、一本。" / "One first.") that is an instruction
    about sequence, not an interpretation of Hayato's psychology. No
    narrator caption states "focus means choosing," per the throughline's
    anti-pattern rule against voiceover stating the psychology — the closing
    caption (panel 027) stays in concrete objects (two bags, neither
    closed) rather than naming the insight. No scoreboard, no trophy, no
    buzzer-beater: this is a practice rep inside a regular evening, and the
    made shot in panel 023 is deliberately unglamorous (front rim, back
    rim, a wobble) so that no one mistakes it for the arc's turn being
    complete. The workplace deadline is explicitly NOT resolved by episode's
    end (panel 024) — the technique protects the rep, not the job.
