title: '「静寂のフリースロー」 第2話「聞こえない合図」'
title_en_gloss: 'Nine Sounds, One Ball — Episode 2: The Signal I Couldn''t Hear'
manga_author: 藍沢 優
teacher_id: brand_teacher_unresolved
