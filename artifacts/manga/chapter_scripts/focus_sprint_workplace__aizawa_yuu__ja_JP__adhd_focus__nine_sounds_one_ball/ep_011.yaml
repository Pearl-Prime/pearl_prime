notes:
  arc_position: |
    Episode 11 of 12 — arc 1's decisive rematch, and the live-game payoff of the
    "One Ball at the Line" throughline seeded in ep_003 (Kuroda's wordless one-bounce
    lesson) and internalized in ep_010 (the conbini receipt). Shinonome faces the
    exact team, Daiei Bussan, that ended their first qualifier in ep_007 — this is
    the rematch the ep_009 group-chat doubt was about. Kuroda does not appear on the
    page this episode; his absence is deliberate, since the technique now has to work
    without him standing behind it.
  pacing_vs_prior: |
    29 panels across 4 pages — the arc's longest and most action-dense episode,
    matching the sports_competition craft bible's climactic-match chapter allowance
    (24-28pp equivalent density). The carrier beat (panels 016-017) is held on its
    own silent macro framing before the shot is shown at all, and the shot's result
    (panel 020) is deliberately undersold relative to the stillness that preceded it.
  continuity_callbacks: |
    - The one-bounce device (panel 015) is the same physical action Kuroda first
      demonstrated wordlessly in ep_003, now self-administered without him present.
    - The conbini receipt (panels 010, 013, 028) is the concrete object from ep_010's
      wordless lesson, now carried as a private in-game habit — established, recalled
      under pressure, and closed out at the end, never explained in dialogue.
    - Daiei Bussan and their captain Miura are the direct antagonist callback to the
      ep_007 loss; the taunt in panel 005 references that game specifically.
    - Kiryuu Ren's background cameo (panel 027) is a silent seed for ep_012's bracket
      reveal — unaddressed, unresolved, not commented on by any character.
    - The high-school turnover flashback (panel 004) is visual-only, matching the
      series' established convention (ep_001) of never narrating that memory.
  doctrinal_anchor_vessel_handling: |
    Per the strategy bank's anti_pattern_rules for sports_competition: (1) no coach
    or mentor explains the lesson aloud this episode — Kuroda is absent entirely, and
    Aya's and Endou's lines are practical/tactical, not interpretive; (2) the
    scoreboard does not resolve the arc — the carrier beat (panels 016-017) is framed
    to exclude the clock and scoreboard entirely, the shot's result is undersold
    (panel 020), and the actual game-deciding action is reassigned to Endou's
    defensive stop (panels 023-024), not to any shot Hayato takes. The final margin
    is a single point (59-58), and the team's exhaustion (panel 025) rather than
    celebration is what the aftermath dwells on. Nothing in the episode claims Hayato
    is fixed, cured, or done growing — acceptance_layer stays authored_candidate.
  translation_handoff: |
    text_by_locale dicts populated for ja_JP (authoritative, native-authored) and
    en_US (real operator-facing gloss, not a literal translation). zh_TW/zh_CN carry
    bracket placeholders per the established convention, pending the dedicated
    localization lane.

