modern_reader_context:
  schema_version: "1.0.0"
  target_market: ja_JP
  target_audience: gen_z
  genre_id: sports
  strategy_genre: sports_competition
  relevance_genre: sports
  market_surface_rule: Use train commute, station platform, conbini, cram
    school, club room, LINE-style chat, digital manga apps, capsule
    machines, and quiet public etiquette.
  market_touchpoints:
  - train_platform
  - commuter_car
  - conbini_receipt
  - bento_shelf
  - club_room
  - shoe_locker
  - line_chat
  - vending_machine
  - manga_app
  market_guardrails:
  - avoid_tourist_japan
  - avoid_samurai_default_for_modern_scenes
