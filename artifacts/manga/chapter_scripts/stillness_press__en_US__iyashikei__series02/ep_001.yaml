schema_version: 1.0.0
artifact_type: chapter_script_writer_handoff
schema_authority: schemas/manga/chapter_script_writer_handoff.schema.json
series_id: stillness_press__en_US__iyashikei__series02
chapter_id: ep_001
title: 'The Warmth of Small Rooms — Episode 1: First Frost'
manga_author: Dove Softwind
teacher_id: ahjan
brand_id: stillness_press
engine: somatic_healing
locale: en_US
default_locale: en_US
available_locales:
- en_US
- ja_JP
- zh_CN
- zh_TW
main_characters:
- id: hana
  name: Hana Mori
  age: 36
  role: protagonist (tenant of a narrow second-floor apartment above a closed dye shop; part-time mender of textiles; lives quietly with a body that holds tension she never names aloud)
  visual_anchor: shoulder-length hair often pinned with a wooden clip, oatmeal cardigan, bare feet indoors; a small brass thimble on a cord at her wrist
scene_palette:
  primary: warm oatmeal + late-autumn amber
  secondary: rain-grey window light + faded indigo (shop sign below)
  accent: steam from kettle + brass thimble catching light
  outdoor_palette: desaturated blue-grey (panels 1, 18, 26 only)
pages:
- page_id: ep_001_p01
  panels:
  - panel_id: ep001_001
    scene: 'Wide establishing — apartment window from outside in light rain. First frost on the sill. City sound implied by rain streaks, not captions.'
    beat_type: null
    intent: WEATHER-FIRST HOOK — invitation to mood, not question
    silence_confirmed: true
  - panel_id: ep001_002
    scene: 'Interior — narrow room. Low table, single burner, kettle not yet whistling. Hana kneeling to light the stove. Socks, bare floorboards.'
    beat_type: spatial
    intent: Small room warmth — genre contract
  - panel_id: ep001_003
    scene: 'Close on match strike. Flame small. Her hand steady.'
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_004
    scene: 'Kettle beginning to tremble. Steam not yet visible.'
    beat_type: micro
    sfx_by_locale:
      en_US:
      - tick...
  - panel_id: ep001_005
    scene: 'Hana''s shoulders — cardigan knit texture, slight rise at the trapezius. She does not roll them back. She simply notices the stove.'
    beat_type: micro
    intent: Somatic shown as posture, not labeled
  - panel_id: ep001_006
    scene: 'She sets out one cup. Then, after a beat, a second cup — smaller, chipped at the rim. Empty across from hers.'
    beat_type: spatial
    intent: Environmental correlative — unnamed feeling via object
    silence_confirmed: true
  - panel_id: ep001_007
    scene: 'Rain on glass. A bus passes far below — blur of headlights.'
    beat_type: spatial
    narrator_caption_by_locale:
      en_US: November rain. The kind that lasts all afternoon.
  - panel_id: ep001_008
    scene: 'Hana pours hot water. Steam rises between the two cups. She does not drink yet.'
    beat_type: micro
    intent: TEA BEAT — regulating anchor
  - panel_id: ep001_009
    scene: 'Hands mending a torn linen cuff — needle, thimble, small precise motion.'
    beat_type: spatial
    silence_confirmed: true
  - panel_id: ep001_010
    scene: 'Window ledge — a pigeon shakes rain from one wing and settles.'
    beat_type: micro
    intent: Environmental reaction shot (iyashikei grammar)
  - panel_id: ep001_011
    scene: 'Hana glances toward the second cup. Steam thinning.'
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_012
    scene: 'Flash of memory — desaturated panel. Two hands passing the same chipped cup. No faces shown. Edge of a doorway.'
    beat_type: spatial
    intent: Grief/somatic memory without exposition
  - panel_id: ep001_013
    scene: 'Return to present color. Hana pours the cooled tea from the second cup back into the kettle. One cup now.'
    beat_type: micro
    intent: Quiet adjustment — not resolution, baseline shift
  - panel_id: ep001_014
    scene: 'She drinks. Steam on her face. Shoulders drop almost imperceptibly.'
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_015
    scene: 'Wide — whole room. Low table, mending basket, window rain. Hana small in frame.'
    beat_type: long_drop
    intent: Reader exhale panel — no text
    silence_confirmed: true
  - panel_id: ep001_016
    scene: 'Door buzzer — small red light. Unexpected but not alarming.'
    beat_type: spatial
  - panel_id: ep001_017
    scene: 'Hana at intercom. Listens. Opens door.'
    beat_type: micro
    dialogue_lines:
    - speaker: neighbor
      text_by_locale:
        en_US: Parcel was left downstairs. Thought you were home.
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: off_panel
  - panel_id: ep001_018
    scene: 'Stairwell — elderly neighbor in rain scarf, holding a small box. Hana in doorway light.'
    beat_type: spatial
    dialogue_lines:
    - speaker: hana
      text_by_locale:
        en_US: Thank you.
      intensity: quiet
      bubble_style: round_normal
      tail_style: pointer
      position_hint: left
  - panel_id: ep001_019
    scene: 'Neighbor leaves. Hana alone with box on the low table. Plain shipping label — no drama typography.'
    beat_type: spatial
  - panel_id: ep001_020
    scene: 'Inside the box — folded indigo cloth, same dye family as the shop sign below. Note card, short handwriting: "Found this in the back room. —S."'
    beat_type: micro
    intent: Gentle disruption — seasonal bouquet thread
  - panel_id: ep001_021
    scene: 'Hana holds cloth to her cheek. Eyes closed. No caption naming emotion.'
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_022
    scene: 'She drapes the cloth over her shoulders like a shawl. Returns to mending.'
    beat_type: spatial
    intent: Somatic healing as textile weight — topic embedded in gesture
  - panel_id: ep001_023
    scene: 'Close — needle through linen. Brass thimble flash.'
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep001_024
    scene: 'Window again. Rain easing. Pigeon gone. Light warmer.'
    beat_type: spatial
  - panel_id: ep001_025
    scene: 'Hana''s feet on floorboards. Toes flex once, slow.'
    beat_type: micro
    intent: Body arriving in room — somatic without vocabulary
  - panel_id: ep001_026
    scene: 'Final wide — exterior window again. Frost melting at one corner. Amber inside.'
    beat_type: spatial
    intent: Reflective silence ending — return toward baseline, not cliffhanger
    narrator_caption_by_locale:
      en_US: The room is still small. It is enough for tonight.
notes:
  genre_first_bar: 'Iyashikei contract — weather hook, high silence ratio, no emotional labeling, no cliffhanger. Somatic healing via shoulders, cloth weight, second cup.'
  failure_modes_avoided: 'No "she felt lonely"; no raised stakes; no therapy vocabulary; sfx minimal (one tick).'
  bubble_style_register: 'Sparse dialogue — neighbor exchange only. Captions short, observational.'
