  genre_relevance_rule: Modern mystery must turn screenshots, transit records, edits, logs, or platform
    behavior into evidence without becoming a tech explainer.
  catalyst:
    id: vault_badge_access_outside_clearance
    logline: Ren's badge still opens the basement records vault long after his clearance should have
      been questioned, and he uses it after hours to pull an old personnel folder tied to the anomaly —
      photographing pages he was never authorized to copy.
    ordinary_world_objects:
    - badge
    - folder
    - flashlight
    - dust
    genre_transmutation: A basement archive's badge log becomes a second, quieter witness to Ren's
      pattern; a coworker's flat, specific warning becomes the closest thing to a confession the story
      allows without naming the feeling outright.
    avoid:
    - instant_cure
    - therapy_lecture
