  craft_directive: Fuse the genre engine with a contemporary reader-world entrypoint. Market=ja_JP;
    audience=gen_z. Use catalyst 'after_hours_query_flagged_by_the_system'. The compulsion now returns
    to the office carrying the personal thread from ep_002, and the vessel Saeki witnesses it in person
    for the first time since ep_001. en_US fields on select panels are operator glosses only, extended
    minimally for gate-lexicon coverage (clue/witness/deadline/app) without altering ja_JP text.
genre: psychological_thriller
mode: teacher
vessel: 身体を読む探偵
main_characters:
- id: ren
  name: 蓮
  name_romaji: Ren
  age: 38
  role: 主人公（分析官・パターンが自分を読む）
  visual_anchor: ワイシャツの袖、クリックするペン
- id: saeki
  name: 佐伯
  age: 不詳
  role: 器の存在（同僚）——口より先に身体が告白する；ブランド教師の名は決して使わない
  visual_anchor: 姿勢を読む目、静かな手、実務的な口調
- id: colleague
  name: 同僚（名は明かされない）
  age: 不詳
  role: 蓮の変化に最初に気づく脇役——評判の代償を運ぶ
  visual_anchor: 週報のファイル、時計を気にする仕草
scene_palette:
  primary: ガラス張りの分析オフィス、始業前の青白い光
  secondary: 昼休みの空いた席、冷めたコーヒー
  accent: 壁の大きな掛け時計（締め切りのモチーフ）
pages:
- page_id: ep_003_p01
  panels:
  - panel_id: ep003_001
    scene: 始業前のオフィス。誰もいない。蓮だけが端末の前に座っている。バッジのログイン記録が画面の隅に小さく表示されている。
    beat_type: standard
    silence_confirmed: true
    intent: 職場への回帰——習慣の持ち込み
  - panel_id: ep003_002
    scene: バッジの入退室記録のクローズアップ。昨夜も、一昨日も、深夜の記録が続いている。誰にもまだ指摘されていない。
    beat_type: micro
    narrator_caption_by_locale:
      ja_JP: 記録は残る。誰も見ていないだけだ。
      en_US: 'The badge log keeps every record. No witness has read it yet — but a clock is still a clock.'
      zh_TW: '[zh_TW] The badge log keeps every record.'
      zh_CN: '[zh_CN] The badge log keeps every record.'
    intent: 伏線——第十一話への種
  - panel_id: ep003_003
    scene: 蓮は社内の人事・顧客データベースに、妹の名に似た文字列を検索窓へ打ち込む。仕事の範囲を明らかに超えている。
    beat_type: micro
    dialogue_lines:
    - speaker: ren
      text_by_locale:
        ja_JP: これは規則の外だ。分かっている。それでも。
        en_US: 'This is outside the rule. He knows that. He searches anyway — one more clue he cannot refuse to chase.'
        zh_TW: '[zh_TW] This is outside the rule.'
        zh_CN: '[zh_CN] This is outside the rule.'
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
    intent: プロトコル違反の深化——職場での越境
  - panel_id: ep003_004
    scene: 佐伯が出勤し、通りすがりに蓮の画面を見てしまう。一瞬、足が止まる。
    beat_type: micro
    silence_confirmed: true
    intent: 器の再登場——対面での目撃
  - panel_id: ep003_005
    scene: 佐伯、実務的な声で。
    beat_type: standard
    dialogue_lines:
    - speaker: saeki
      text_by_locale:
        ja_JP: それ、今日のタスクに入ってる？
        en_US: 'Is that on today''s task list? A plain question, not an accusation — but she is a witness now.'
        zh_TW: '[zh_TW] Is that on today''s task list?'
        zh_CN: '[zh_CN] Is that on today''s task list?'
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
  - panel_id: ep003_006
    scene: 蓮、画面を半分だけ閉じながら。
    beat_type: micro
    dialogue_lines:
    - speaker: ren
      text_by_locale:
        ja_JP: 週報の下調べです。
        en_US: 'Background for the weekly report. A cover story, told fluently.'
        zh_TW: '[zh_TW] Background for the weekly report.'
        zh_CN: '[zh_CN] Background for the weekly report.'
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_left
  - panel_id: ep003_007
    scene: 冷めたコーヒーのクローズアップ。湯気はもう立っていない。
    beat_type: micro
    intent: 身体の代償の予告
  - panel_id: ep003_008
    scene: ワイド：オフィスの壁の大きな時計。始業のチャイムと共に、同僚たちが次々に席へ着いていく。
    beat_type: standard
    intent: 圧力の蓄積——時計のモチーフ導入
  - panel_id: ep003_009
    scene: 蓮のカレンダーアプリに昼食会議の通知が表示されるが、彼はそれを一瞥しただけで検索窓へ戻る。
    beat_type: micro
    dialogue_lines:
    - speaker: ren
      text_by_locale:
        ja_JP: 後で。あと少しだけ。
        en_US: 'Later. Just a little more — the calendar app reminder dismissed before it finishes loading.'
        zh_TW: '[zh_TW] Later. Just a little more.'
        zh_CN: '[zh_CN] Later. Just a little more.'
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
    intent: ページ1の転——約束の無視
- page_id: ep_003_p02
  panels:
  - panel_id: ep003_010
    scene: 時間経過。昼休みが過ぎても、蓮の席は空いていない。食べていない弁当が脇に置かれたままだ。
    beat_type: standard
    intent: 代償——欠食
  - panel_id: ep003_011
    scene: 同僚が通りすがりに声をかける。
    beat_type: micro
    dialogue_lines:
    - speaker: colleague
      text_by_locale:
        ja_JP: 週報、まだ？　蓮さんが遅れるの、珍しいね。
        en_US: 'The weekly report — still? First time it''s ever been late from you. A small public cost, spoken plainly.'
        zh_TW: '[zh_TW] The weekly report — still?'
        zh_CN: '[zh_CN] The weekly report — still?'
      intensity: normal
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
    intent: 評判の代償が初めて言語化される
  - panel_id: ep003_012
    scene: 蓮、顔を上げずに短く応じる。焦点は検索窓から動かない。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep003_013
    scene: 佐伯が戻ってきて、隣の椅子を引き寄せ、蓮の机の端に手のひらを静かに置く——助言の演説はない、所作だけ。
    beat_type: micro
    silence_confirmed: true
    intent: 器の所作——講義ではなく身体
  - panel_id: ep003_014
    scene: 蓮はその手に一瞬だけ気づくが、指はまだキーボードの上にある。
    beat_type: micro
    intent: 気づきと継続の同居
  - panel_id: ep003_015
    scene: 佐伯、短く、いつもより直接的に。
    beat_type: standard
    dialogue_lines:
    - speaker: saeki
      text_by_locale:
        ja_JP: それ、今夜も家に持ち帰る気？
        en_US: 'Taking that home again tonight? Shorter than before, and more direct — a warning without a lecture.'
        zh_TW: '[zh_TW] Taking that home again tonight?'
        zh_CN: '[zh_CN] Taking that home again tonight?'
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_right
  - panel_id: ep003_016
    scene: 蓮の肩が一瞬、意識より先にわずかに緩む——だが指はキーボードへ戻り、検索は続く。
    beat_type: micro
    narrator_caption_by_locale:
      ja_JP: 身体は先に緩んだ。指はまだ止まらない。
      en_US: 'The body eased first. The hands do not stop — the same gap ep_001 named, now costing more.'
      zh_TW: '[zh_TW] The body eased first. The hands do not stop.'
      zh_CN: '[zh_CN] The body eased first. The hands do not stop.'
    intent: テーゼの反復と裏切り——今回は更新されない
  - panel_id: ep003_017
    scene: 静かな色面の上のタイポグラフィックなエンドカード。
    beat_type: micro
    narrator_caption_by_locale:
      ja_JP: 第三話・了——始業前の検索
      en_US: 'End of Episode 3 — The Search Before Clock-In'
      zh_TW: '[zh_TW] End of Episode 3 — The Search Before Clock-In'
      zh_CN: '[zh_CN] End of Episode 3 — The Search Before Clock-In'
notes:
  pacing: 十七コマ。始めて評判への具体的な代償（週報の遅れ、欠食）が言語化される。器の所作は繰り返されるが、今回は更新に至らない——アークの上昇を裏切らないための意図的な後退。
  bubble_style_register: 主人公の台詞：round_normal、多くはwhisper。佐伯の台詞：normal/soft、実務的。同僚の台詞：normal、軽い社会的圧力。
  sfx_policy: 最小限。囁きレジスタのみ。
  language: ja_JPが権威。en_USはオペレータ用グロスのみ。翻訳ではなくネイティブ原作。
  translation_pipeline_handoff: en_USグロスはレビュー用。CJK他言語は別レーン。
  arc_position: 全12話中の第3話。第2話の家庭内越境が、第3話で職場へ逆流する。器（佐伯）の所作は繰り返されるが、蓮は今回「更新」せず、覚えた上で続ける——obsession seedアークの意図的な後退ビート。
craft_notes: 'VESSEL: 身体を読む探偵（佐伯）。教師は物語内で決して名指ししない。

  GENRE BIBLE: docs/research/manga_craft/psychological_thriller.md

  STRATEGY: strategy_01の第4-5ビート（訂正が訂正を呼ぶ加速／器の直接的な一言）を職場の一日として引き延ばした。

  ARC: 越境の深化（社内データベース）→評判の代償（週報・欠食）→未更新の所作（緩むが止まらない）。

  NATIVE: 英語からの翻訳ではない。JP市場のジャンル検索向け原作。

  ACCEPTANCE: native-authored + gate-floor + JP-craft-reviewed — NOT claimed bestseller (M6 bar).'
