    behavior into evidence without becoming a tech explainer.
  catalyst:
    id: platform_ad_board_matches_the_anomaly
    logline: A departure board's scrolling ad copy echoes the anomalous name from Ren's file, and he
      builds a private timetable hypothesis around a stranger on the platform whose face he has decided
      matches a pattern that was never about her at all.
    ordinary_world_objects:
    - platform
    - phone
    - timetable
    - train
    genre_transmutation: A looping station announcement becomes the sound of Ren's own spiraling
      annotations; a transit app's timetable becomes a private hypothesis machine that costs him his own
      train home.
