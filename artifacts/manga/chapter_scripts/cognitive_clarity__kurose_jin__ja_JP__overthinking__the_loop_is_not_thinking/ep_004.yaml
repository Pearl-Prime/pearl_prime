    sign that the reading habit is generalizing beyond its original object. en_US fields on select
    panels are operator glosses only, extended minimally for gate-lexicon coverage (before/clue/witness/train)
    without altering ja_JP text.
genre: psychological_thriller
mode: teacher
vessel: 身体を読む探偵
main_characters:
- id: ren
  name: 蓮
  name_romaji: Ren
  age: 38
  role: 主人公（分析官・パターンが自分を読む）
  visual_anchor: ワイシャツの袖、クリックするペン
- id: stranger
  name: 見知らぬ乗客（名は明かされない）
  age: 不詳
  role: 蓮の仮説の対象になってしまう無関係な通勤者——読みの一般化を体現する
  visual_anchor: 定期券、いつもの車両の同じ位置
scene_palette:
  primary: 24時間営業の乗換駅、蛍光灯の白い光
  secondary: 電光掲示板の緑と黄色の文字
  accent: 同じアナウンスが繰り返すループ音（視覚的にはコマの余白に侵食する反復文字として表現）
pages:
- page_id: ep_004_p01
  panels:
  - panel_id: ep004_001
    scene: 夕方の乗換駅。人混み。同じ案内アナウンスが何度も繰り返し流れている。
    beat_type: standard
    silence_confirmed: true
    intent: 舞台転換——駅という新しい場
  - panel_id: ep004_002
    scene: 電光掲示板の広告文が一瞬、異常なデータの名前と重なって見える。ただの広告のコピーだ。だが蓮の目は止まる。
    beat_type: micro
    dialogue_lines:
    - speaker: ren
      text_by_locale:
        ja_JP: また、同じ響き。偶然のはずがない。
        en_US: 'The same sound again — one more clue that cannot be coincidence, he decides before he checks.'
        zh_TW: '[zh_TW] The same sound again.'
        zh_CN: '[zh_CN] The same sound again.'
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
    intent: 読みの一般化の始まり——無関係な広告への投影
  - panel_id: ep004_003
    scene: 蓮の視線が、ホームに立つ見知らぬ乗客に移る。定期券をちらりと見ただけで、何かが一致した気がする。
    beat_type: micro
    silence_confirmed: true
    intent: 対象の拡張——無関係な他者への投影
  - panel_id: ep004_004
    scene: 蓮、携帯の乗換案内アプリを開き、時刻表を執拗に確認し始める。
    beat_type: micro
    dialogue_lines:
    - speaker: ren
      text_by_locale:
        ja_JP: 七時十四分の便。彼女はいつもそれに乗る。
        en_US: 'The 7:14. She always takes it — a timetable rewritten into a private hypothesis on his phone.'
        zh_TW: '[zh_TW] The 7:14. She always takes it.'
        zh_CN: '[zh_CN] The 7:14. She always takes it.'
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: bottom_left
  - panel_id: ep004_005
    scene: 腕時計とアプリの時刻を何度も突き合わせる蓮の手のクローズアップ。
    beat_type: micro
    intent: 検証への執着——反復の可視化
  - panel_id: ep004_006
    scene: 同じアナウンスの文字が、コマの余白にまで侵食するように反復して描かれる——蓮の頭の中の反復と重なる視覚。
    beat_type: micro
    silence_confirmed: true
    intent: ループの視覚化——strategy_01第4ビートの拡張
  - panel_id: ep004_007
    scene: ラッシュの圧力が高まる。ドアの開閉音、押し寄せる人波。蓮だけが流れに逆らって立ち止まっている。
    beat_type: standard
    intent: 圧力の蓄積
  - panel_id: ep004_008
    scene: 見知らぬ乗客が電車に乗り込む。蓮はホームに残ったまま、その扉が閉まるのを見つめる。
    beat_type: micro
    dialogue_lines:
    - speaker: ren
      text_by_locale:
        ja_JP: まだ、確かめていない。
        en_US: 'Not confirmed yet — he won''t step back from the platform edge until he needs to.'
        zh_TW: '[zh_TW] Not confirmed yet.'
        zh_CN: '[zh_CN] Not confirmed yet.'
      intensity: whisper
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_left
    intent: ページ1の転——踏みとどまれない選択
  - panel_id: ep004_009
    scene: ワイド：発車していく電車と、ホームに立ち尽くす蓮の姿。案内アナウンスがまた同じ文言を繰り返す。
    beat_type: standard
    intent: 頂点——観察の継続という選択
- page_id: ep_004_p02
  panels:
  - panel_id: ep004_010
    scene: 蓮は次の便を待たず、見知らぬ乗客が消えた方向のホームをただ見つめ続けている。
    beat_type: micro
    silence_confirmed: true
    intent: 追跡ではなく凝視——境界のあいまいな越境
  - panel_id: ep004_011
    scene: 電光掲示板に蓮自身の乗るはずだった便の番号が表示され、そのまま消える——発車済みの表示。
    beat_type: micro
    narrator_caption_by_locale:
      ja_JP: 自分の便が消えた。気づくのが遅かった。
      en_US: 'His own train is gone. He noticed too late — the timetable finally costs him something.'
      zh_TW: '[zh_TW] His own train is gone.'
      zh_CN: '[zh_CN] His own train is gone.'
    intent: 具体的な代償——電車を逃す
  - panel_id: ep004_012
    scene: 蓮の顔のクローズアップ。焦りより先に、奇妙な満足感がよぎる——パターンが「合っていた」という感覚。
    beat_type: micro
    intent: 正しい読みの快楽——strategy_05の危うさの前兆
  - panel_id: ep004_013
    scene: 同じアナウンスがまた流れる。今度はその反復そのものが、蓮の呼吸のリズムと重なって見える。
    beat_type: micro
    silence_confirmed: true
  - panel_id: ep004_014
    scene: カット——深夜、ようやく帰宅する蓮。アパートは静かで、誰も待っていない。
    beat_type: standard
    intent: 時間経過——遅すぎる帰宅
  - panel_id: ep004_015
    scene: 携帯に、応答しなかった通話の記録が残っている——佐伯からの一件。
    beat_type: micro
    dialogue_lines:
    - speaker: ren
      text_by_locale:
        ja_JP: 電話、出られなかった。
        en_US: 'A missed call from Saeki — he could not answer while the platform still held him.'
        zh_TW: '[zh_TW] A missed call from Saeki.'
        zh_CN: '[zh_CN] A missed call from Saeki.'
      intensity: soft
      bubble_style: round_normal
      tail_style: pointer
      position_hint: top_right
    intent: 見えない社会的代償の蓄積
  - panel_id: ep004_016
    scene: 玄関の鏡（第二話からの反復モチーフ）。蓮は一瞥だけして通り過ぎる——今夜はそれを見る余裕さえない。
    beat_type: micro
    intent: モチーフの疲弊——観察する力さえ消耗する
  - panel_id: ep004_017
    scene: 蓮はノートを開き、今夜の駅での「一致」を、家のファイルの余白に書き加える。電車を逃したことさえ、データとして記録する。
    beat_type: micro
    narrator_caption_by_locale:
      ja_JP: これも、記録しておく。
      en_US: 'This too, filed as evidence — even the missed train becomes part of the case.'
      zh_TW: '[zh_TW] This too, filed as evidence.'
      zh_CN: '[zh_CN] This too, filed as evidence.'
    intent: 正常化——日常の出来事すら「データ」に変換される
  - panel_id: ep004_018
    scene: 静かな色面の上のタイポグラフィックなエンドカード。
    beat_type: micro
    narrator_caption_by_locale:
      ja_JP: 第四話・了——何度も同じ電光掲示板
      en_US: 'End of Episode 4 — The Same Departure Board, Again'
      zh_TW: '[zh_TW] End of Episode 4 — The Same Departure Board, Again'
      zh_CN: '[zh_CN] End of Episode 4 — The Same Departure Board, Again'
notes:
  pacing: 十八コマ。今話で初めて、読みの対象が無関係な他者（見知らぬ乗客）へ一般化する——obsessionが本来のデータを超えて拡張する重要な転換点。
  bubble_style_register: 主人公の台詞：round_normal、多くはwhisper。
  sfx_policy: 最小限。反復するアナウンスは視覚的な余白侵食として表現し、擬音語は最小限に留める。
  language: ja_JPが権威。en_USはオペレータ用グロスのみ。翻訳ではなくネイティブ原作。
  translation_pipeline_handoff: en_USグロスはレビュー用。CJK他言語は別レーン。
  arc_position: 全12話中の第4話。設定を駅（transit station）に切り替え、strategy bankのsetting_poolを活用。読みの対象が初めて無関係な第三者へ拡張し、「正しく見えた」ことへの快感（strategy_05の危うさ）が前兆として現れる。
craft_notes: 'VESSEL: 身体を読む探偵（佐伯）。今話は不在——電話に出られなかったという形で存在感だけを残す。教師は物語内で決して名指ししない。

  GENRE BIBLE: docs/research/manga_craft/psychological_thriller.md

  STRATEGY: strategy_01の第4ビート（訂正の加速・距離の歪み）とstrategy_05の第2-3ビート（正しい読みの快感と、同じ論理が生む誤読の予兆）を組み合わせた。

  ARC: 対象の拡張（無関係な乗客）→具体的な代償（電車を逃す・電話に出られない）→正常化（日常をデータへ変換）。

  NATIVE: 英語からの翻訳ではない。JP市場のジャンル検索向け原作。

  ACCEPTANCE: native-authored + gate-floor + JP-craft-reviewed — NOT claimed bestseller (M6 bar).'
