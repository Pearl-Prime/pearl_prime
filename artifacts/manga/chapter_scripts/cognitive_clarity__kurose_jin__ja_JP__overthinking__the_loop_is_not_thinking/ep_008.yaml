  catalyst:
    id: coastal_registry_office_partial_answer
    logline: Ren calls in sick to work and takes the ferry to a fog-bound coastal town tied to the
      anomalous name, where a town registry clerk confirms one detail and flatly denies another, leaving
      him with a real answer and a wrong one that look identical.
    ordinary_world_objects:
    - ferry
    - registry
    - photograph
    - wind
    genre_transmutation: A sick-day lie sent by phone becomes the trip's first concrete deception; an
      old town registry becomes the mystery's most dangerous evidence yet, because half of what it
      confirms is genuinely true.
    avoid:
    - instant_cure
    - therapy_lecture
