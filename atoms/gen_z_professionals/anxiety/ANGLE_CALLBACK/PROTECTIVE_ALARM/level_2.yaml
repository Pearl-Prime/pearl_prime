body: |
  Earlier I said the alarm is not broken — it is misfiring — and that the witness can notice the tightening before reacting. Here is what was hidden in that.

  The alarm has a shape. It is not random. It follows the same four-step loop every time, in every situation, in every chest tightening you have had for the last decade. Once you learn the shape, you cannot un-see it.

  Step one: scan. Attention sweeps the environment for threat — a manager's tone, a missing reply, a coworker promoted ahead of you, the small flatness in a sentence someone said this morning. The scan runs whether you ask it to or not.

  Step two: predict. The mind takes the scan data and builds a small simulation of the future. Usually a bad one. The unanswered message is a fired email being drafted. The simulation feels like memory because the body cannot tell the difference between vivid prediction and remembered fact.

  Step three: brace. The chest tightens. The shoulders lift. The breath shifts into the upper lungs. The body prepares for the predicted disaster — a disaster that lives entirely inside step two and has never actually happened.

  Step four: recover incomplete. The threat passes — the message arrives, the meeting ends — but the brace does not fully release. A small residue of activation stays in the tissue. Then a new trigger arrives, and the next loop begins from a slightly more activated baseline than the last one.

  This is the loop. The alarm follows the same shape every time.
