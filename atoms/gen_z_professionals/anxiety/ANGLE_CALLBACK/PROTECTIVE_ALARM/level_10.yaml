angle_id: PROTECTIVE_ALARM
layer: 10
phase: transcendence_reintegration
chapter_range: [11, 11]
body: |
  New data, not old doom — that is what a returning alarm is. And some days the data arrives at full volume: heart loud in a meeting, hands cold, the room tilting while everyone else takes notes.

  This is the hour the whole book has been training for, and the training is not what you think. You were never learning to prevent this. You were learning what to do inside it.

  So do less than the moment seems to demand. Feet on the floor — actually feel them. One exhale longer than the inhale, then another; you are not chasing calm, you are interrupting escalation. Name it silently, in four words: this is the alarm. Then take the next competent action at half speed. Say the sentence you prepared. Type the reply. Ask for two minutes if you need two minutes — a body in alarm is still allowed to make requests.

  Because here is what the panic never tells you: activation and competence can coexist. You have already done hard things with a pounding chest — every interview, every first day. The pounding was not the obstacle. Believing you had to wait for it to stop — that was the obstacle. You can be loud inside and precise outside. That is skill, not pretending.
