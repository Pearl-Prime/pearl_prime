body: |
  The last thing I told you was that the brace is a budget — chemistry spent before the mind gets a vote. Hidden inside that: the budget has no ownership column.

  Watch what your chest does when a thread catches fire and none of the messages carry your name. The scan does not ask whose emergency this is. It reads velocity, red badges, a clipped tone aimed at someone else — and it spends. Which means your body funds the outage you cannot fix, the reorg two teams over, the deadline of a person you have met twice. Every open channel is a request line straight into your adrenals, and the scan approves every request.

  This is the real cost of living on alert. Not the dramatic moments — the tax. Cold tea, an untouched task list, a shift worked in a war room nobody assigned you to. By Friday you are exhausted by work you never did.

  So before the spend, one question, asked in the body rather than argued in the head: is this mine? Not "is it important" — the scan wins that one every time. Mine. If the answer is no, you are allowed to witness the fire without buying it fuel.
