body: |
  Earlier I said confusing the alarm for identity is the trap. Here is what was hidden in that.

  The modern workplace was built for alarms. Always-on channels. Visible metrics. Performance records that update in real time. The tools were designed to keep teams coordinated — not to ruin Sundays — but a nervous system trained for scarcity reads every shared doc as a ledger of worth.

  You did not choose this architecture. You were handed it in week one and shown how to log in. The alarm is doing exactly what it was designed to do inside an environment that keeps supplying triggers faster than any body can complete step four.

  This is not a personal failure. It is a mismatch between an ancient protection system and a civilization that monetizes attention. Naming that mismatch does not fix the Slack ping. It removes the second layer — the shame that says you should be able to handle a tool everyone else seems to handle.

  The alarm is loyal. It is also outdated. Both can be true without either being an indictment of you.
