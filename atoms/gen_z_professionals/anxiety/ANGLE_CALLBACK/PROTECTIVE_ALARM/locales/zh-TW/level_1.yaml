body: |
  第一章提出了一個單一的主張，並要求你記住它：警報正在盡它的職責。而這份職責說明裡，藏著一件事。

  警報沒有故障。它只是誤判了。當危險只是社交性的、只是想像出來的，或者只是一封放了十二小時的Slack訊息，身體依然會啟動同一套掃描。它不總能分辨老虎和一則已讀通知的差別。這個錯配，才是問題的全部——而這不是你的錯。

  多數人從未做出這個區分。他們在響著的警報裡度過了太多年，久到警報的聲音，成了他們記憶中唯一的「自己」。一則通知傳來，胸口收緊，「我應該更快回覆」的念頭浮現，這三件事感覺像同一個持續發生的你。但它們不是一件事，是三件：一個觸發點，一個警報，還有一個見證者。

  那個見證者還不強壯。它只需要在場。每一次你在做出反應之前，注意到那股收緊——哪怕只早了半秒——見證者就得到了一點點練習。警報不會停止，但警報與自我之間的距離，開始出現了。

  那不是你。那是警報，在做它被訓練去做的事。
