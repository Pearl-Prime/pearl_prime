body: |
  忠誠而過時，不是指控——這是前面的主張。這句話裡，藏著一個更難接受的事實：那個讓警報超載的市場，同時也在販售解藥，而且它用的，正是警報自己的語法。

  看看那個在你吃早餐前，就先讓你感到愧疚的App。一個連續打卡計數器，就是一個掃描目標。一則「你錯過了一天」的通知，就是主管那句冷淡語氣，換上了一個更友善的字體。被做成一個指標的冥想，把休息，變成了另一個你可能落後的地方。這個工具本來承諾要幫你調節，結果卻又送來一張新的計分板——所以你放棄了它，然後把這次放棄，歸檔成更多不利於自己的證據。

  問題，從來就不是你的自律。渴望是一種心情，而心情，每一次都會輸給化學反應。真正能在一個糟糕的星期裡存活下來的，是基礎設施：那個寫在日曆上、警報必須關閉的一小時，那支睡在廚房裡的手機，那段被牢牢釘在午餐時間裡的散步。基礎設施不需要你感到有動力。這正是它存在的全部意義。

  如果一項練習會在你錯過它時讓你感到羞愧，那它就不是一項練習。它是穿著養生外衣的警報。改建造那種無聊的東西——那種在你連自己都撐不住的日子裡，還能撐住你的東西。
