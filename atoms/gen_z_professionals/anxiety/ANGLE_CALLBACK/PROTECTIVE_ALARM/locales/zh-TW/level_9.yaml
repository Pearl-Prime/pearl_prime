body: |
  我說過，渴望是一種心情——真正能撐過一個糟糕星期的，是基礎設施。然後你換了工作，而那個星期，把基礎設施一起帶走了。

  新的識別證，新的工作空間——而那些悄悄替你調節了神經系統的日曆提醒，隨著你的舊帳號，在五點整被停用了。那套架構是真實的。但它也是租來的。你未來會工作過的每一個環境，終究都會被刪除，而警報不會留在那組舊的登入資訊裡。它會通勤。同一套掃描，新的陌生人，更高的風險——因為一個沒有地圖的神經系統，會把每一個未讀的名字，都當成重要的事。

  而這裡，是那份重新響起的噪音，真正的意思。不是復發。不是在證明過去這兩年都是假的。一個在陌生建築裡響起的警報，遞給你的，是新的資料，不是舊的厄運：它正在告訴你，哪些支撐曾經存在於身體之外，如今需要在這個新的環境裡，重新建造一次。

  所以，把那些承重的部件，放進唯一一件能撐過每一次轉換的行李裡——身體本身。在任何一棟大樓的任何一層樓，你都擁有一次屬於自己的吐氣。一個不需要任何許可的問題——是我的嗎？雇主會核發筆記型電腦。沒有人會替你核發你的神經系統。要在它裡面建造，不只是繞著它建造。
