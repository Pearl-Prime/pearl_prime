body: |
  前面我說過，警報沒有故障——它只是誤判——而見證者可以在你做出反應之前，先注意到那股收緊。這句話裡，藏著另一件事。

  警報有一個固定的形狀。過去十年裡，每一次胸口收緊，它都遵循同一套四步驟循環。一旦你認出這個形狀，你就再也無法對它視而不見。

  第一步：掃描。注意力掃過整個環境，尋找威脅——主管的語氣，一則沒有回覆的訊息，某人今天早上說的一句話裡，那股微妙的冷淡。不管你有沒有要求，掃描都在運作。

  第二步：預測。心智拿著掃描到的資料，建構出一個小小的未來模擬——通常是壞的那種。那則沒人回覆的訊息，變成了一封正在被草擬的解僱信。這個模擬感覺起來像記憶，因為身體無法分辨「生動的預測」和「記得的事實」的差別。

  第三步：預備。胸口收緊，肩膀上提，呼吸轉移到上肺葉。身體正在為那個被預測出來的災難做準備——而那個災難，完全只存在於第二步之中。

  第四步：不完全的恢復。威脅過去了，但預備狀態沒有完全鬆開。一小部分的活化殘留在組織裡，於是下一次循環，會從一個稍微更活化的基準點開始。

  這就是這個循環。警報，每一次都遵循同一個形狀。
