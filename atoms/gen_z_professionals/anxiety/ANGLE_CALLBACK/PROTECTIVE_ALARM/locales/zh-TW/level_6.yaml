body: |
  我說過，身分不是敵人——把警報誤認成身分，才是。而這個誤認裡，有一個部分，幾乎沒有人抓得到：那個災難場景，正是這個誤認拿來排練的地方。

  一封語氣中立的信件送到，你的心智已經草擬好隨之而來的解僱信。那份草稿感覺像是預見。其實不是。那是一場排練——焦慮的身分，正在上演它最喜歡的那一幕：提前把自己搞垮，被算成是有備而來。這場排練，生動、具體、卡司齊全。而真正的事件到來時，幾乎從來不會訂到同一個房間。你已經活過了上百場災難，而其中幾乎每一場，都只是一個只有你一個人觀眾的表演。

  留意一下，這場排練買到了什麼。如果你已經事先，用想像的方式，把災難承受過一遍，那你就是勤勉的。小心的。從不會被打個措手不及。這種「提前受苦」，感覺像是為安全付了一筆訂金。但那其實是在為一棟根本不存在的建築付租金。

  你無法靠跟劇本爭辯來取消這場排練。你取消它的方式，是認出這個舞台：這是排練，不是正式演出。事件真正到來時，才值得你的注意力。而座位空著的排練，會提早收場。
