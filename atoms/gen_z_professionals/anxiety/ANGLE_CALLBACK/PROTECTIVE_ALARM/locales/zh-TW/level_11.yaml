body: |
  前面我說過，活化與能力，可以並存——你可以內在喧囂，外在精準。這句話裡藏著的是：

  你不需要讓警報安靜下來，才能與它共處。你需要改變的，是你和它之間的關係。警報可以響著，而你依然可以送出那則訊息，依然可以入睡，依然可以現身，而不必把每一次響起，都當成一份對「你是誰」的判決。

  整合，不是永遠的平靜。整合，是聽見那聲響起，為它命名——「這是警報，不是真相」——然後依然選擇下一個微小的行動。一則通知和一則回覆之間的一口呼吸。一個星期天，讓那份文件一直關到星期一。一場會議，在這句話說完之前，你的肩膀已經先鬆了下來。

  你一路以來練習著的那個見證者，不是一個分離出來的自我。它是你之中，能夠感謝警報的服務、卻拒絕接受它的預測的那個部分。而每一次你沒有把「音量」誤認成「準確度」，那個部分，就會變得更強壯一點。

  這本書，結束在它開始的地方：不是以一個安靜下來的身體結束，而是以一個能夠分辨「警報」與「資訊」的身體結束——並且，能從那份差異裡，採取行動。
