body: |
  前面我說過，你一直在經歷的那個災難，是排練，不是正式演出。這句話裡藏著的是：有人蓋了這座舞台。

  現代職場，是為警報而建造的。永遠開著的頻道。看得見的績效指標。即時更新的表現紀錄。這些工具本來的設計目的，是讓團隊保持協調——不是為了毀掉你的星期天——但一個被訓練成活在稀缺裡的神經系統，會把每一份共用文件，都讀成一本記錄你價值的帳本。

  你沒有選擇這套架構。它在你上班第一週就被交到你手上，還有人示範給你看該怎麼登入。警報，正在一個持續供應觸發點、速度快到任何身體都無法完成第四步的環境裡，精確地做著它被設計去做的事。

  這不是個人的失敗。這是一套古老的保護系統，和一個把注意力變現的文明之間的錯配。指出這個錯配，並不會讓那則Slack通知消失。但它會移除第二層——那個說「別人似乎都應付得來，你應該也要能應付這個工具」的羞愧。

  警報是忠誠的。它也是過時的。這兩件事可以同時為真，而其中任何一件，都不是在指控你。
