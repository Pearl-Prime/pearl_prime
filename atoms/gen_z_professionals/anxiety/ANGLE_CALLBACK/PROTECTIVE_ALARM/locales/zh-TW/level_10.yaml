body: |
  新的資料，不是舊的厄運——這就是一個重新響起的警報。有些日子，這份資料會用最大的音量抵達：心跳在會議裡大聲敲著，雙手發冷，整個房間都在傾斜，而其他每個人都還在做筆記。

  這正是整本書一直在為你訓練的那個時刻，而這場訓練，不是你以為的那樣。你從來不是在學習如何預防它發生。你是在學習，當它發生時，該怎麼做。

  所以，做得比這一刻看起來所要求的更少。雙腳踩在地上——真正地去感受它們。一次比吸氣更長的吐氣，然後再一次；你不是在追逐平靜，你是在打斷升溫。在心裡默默地，用四個字命名它：這是警報。然後，用一半的速度，採取下一個稱職的行動。說出你準備好的那句話。打出那則回覆。如果你需要兩分鐘，就開口要兩分鐘——一個處於警報中的身體，依然有資格提出請求。

  因為這是恐慌從來不會告訴你的事：活化與能力，是可以並存的。你已經帶著狂跳的心，完成過許多困難的事——每一場面試，每一個第一天。狂跳，從來不是那個障礙。「相信自己必須等它停下來才能行動」，那才是障礙。你可以內在喧囂，外在精準。那是一種技能，不是在裝出來的。
