body: |
  前面我說過，掃描系統從不檢查歸屬——它會把你的身體，花在從來就不屬於你的緊急事件上。這句話裡藏著的是：

  當這個循環運轉的次數夠多，它就不再感覺像一個過程，而開始感覺像一個自我。你不是「一個偶爾會焦慮的人」。你是「一個焦慮的人」。警報運轉了太久，久到「運轉」本身成了身分——成了你細心、負責、比別人更早看見問題的證明。

  這個身分，代價高昂。每一次沒有被釋放完的循環，都會在你的基準線上，疊加一層薄薄的警戒。六個月不完全的恢復之後，你的休息狀態，變成了過去的緊繃狀態。你稱它為性格。身體稱它為新的預設值。

  警報會利用身分來保護自己。如果這個循環就是你，那麼質疑這個循環，就感覺像是背叛自己。但如果這個循環只是一個被訓練出來的反應，那麼質疑它，就只是維護——就像替一套為某個你已經不再居住的房間所寫的軟體，做一次更新。

  這兩件事可以同時為真：警報學到了某件真實的事，而這份學習，如今付出的代價，已經超過了它帶來的收益。身分不是敵人。把警報誤認成身分，才是。
