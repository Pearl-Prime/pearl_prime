body: |
  上一章的結尾提出了一個主張：掃描、預測、預備、不完全的恢復——每一次都是同樣的四步驟。那句話藏起來的，是這些步驟真正發生的地方。不在你的念頭裡，在你的組織裡。

  預備，是化學反應。在一場報告開始前四十分鐘，你的腎上腺就已經在消費了。皮質醇告訴肝臟釋放糖分，為一場衝刺做準備——而那場衝刺，其實只是一份投影片。呼吸爬到又高又淺的地方，對安定任何事都毫無用處。消化系統被暫時解僱——血液離開了腸道，這也是為什麼緊張總是住在你的胃裡。這一切都不是比喻。這是一份預算，而每一個被預測出來的災難，都是一次提款。

  這就是為什麼，在警報高峰的當下，你無法靠思考走出來。推理，會抵達一條已經被淹沒的電路。身體在心智投下一票之前，就已經把資源撥出去了，而它不會因為你判定這份恐懼不合理，就把資源退回來。

  你能做的，是停止下新的訂單。拉長一次吐氣，迷走神經會把它讀成一個「解除警戒」的訊號——不是平靜，只是下一次提款變得小了一點。你不再是在跟警報爭辯，你是在用它唯一聽得懂的語言，跟它說話：身體的語言。
