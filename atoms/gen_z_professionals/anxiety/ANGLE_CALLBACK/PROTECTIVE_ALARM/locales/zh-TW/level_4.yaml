body: |
  我剛才告訴你，預備是一份預算——化學反應，在心智投票之前就已經花掉了。而這句話裡藏著的是：這份預算，沒有歸屬欄位。

  觀察一下，當一串訊息突然炸開，而沒有一則訊息上寫著你的名字時，你的胸口會怎麼樣。掃描系統從不問「這是誰的緊急事件」。它只讀取速度、紅色的未讀標記、對著別人說出的一句冷淡的話——然後它花錢了。這意味著，你的身體正在資助一場你根本修不了的當機、隔壁兩個團隊的組織重整、一個你只見過兩次面的人的截止期限。每一個開著的頻道，都是一條直通你腎上腺的請求線，而掃描系統，對每一個請求都會批准。

  這才是活在警戒狀態裡真正的代價。不是那些戲劇性的時刻——是這份稅。冷掉的茶，動不了的待辦清單，一場沒有人指派給你、你卻在裡面值了整班的作戰室。到了星期五，你已經被自己從未真正做過的工作，累得筋疲力竭。

  所以，在花錢之前，先問一個問題——用身體問，而不是用腦子爭辯：這是我的嗎？不是「這重要嗎」——掃描系統每一次都會在那個問題上贏。是我的嗎。如果答案是不是，你就有資格，見證這場火，卻不必為它添加燃料。
