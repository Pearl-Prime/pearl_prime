chapter_range: [10, 10]
body: |
  Aspiration is a mood, I said — what survives a bad week is infrastructure. Then you change jobs, and the week takes the infrastructure with it.

  New badge, new workspace — and the calendar holds that quietly ran your regulation were deactivated at five o'clock with your old account. The architecture was real. It was also rented. Every environment you will ever work in gets deleted eventually, and the alarm does not stay behind with the login. It commutes. Same scan, new strangers, higher stakes — because a nervous system with no map treats every unread name as important.

  Here is what the returning noise actually means. Not relapse. Not proof the last two years were fake. An alarm ringing in an unmapped building is handing you new data, not old doom: it is showing you which supports existed outside your body and now need rebuilding inside the new one.

  So carry the load-bearing pieces in the only luggage that survives every transition — the body itself. One exhale you own on any floor of any building. One question — mine? — that needs no permissions. The employer issues the laptop. Nobody issues your nervous system. Build in it, not just around it.
