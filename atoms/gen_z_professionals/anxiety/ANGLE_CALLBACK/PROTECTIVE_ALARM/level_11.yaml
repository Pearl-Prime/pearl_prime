body: |
  Earlier I said activation and competence can coexist — that you can be loud inside and precise outside. Here is what was hidden in that.

  You do not have to silence the alarm to live with it. You have to change your relationship to it. The alarm can ring and you can still send the message, still sleep, still show up without treating every ring as a verdict on who you are.

  Integration is not calm forever. Integration is hearing the ring, naming it — "that is the alarm, not the truth" — and choosing the next small action anyway. One breath between ping and reply. One Sunday where the doc stays closed until Monday. One meeting where your shoulders drop before the sentence ends.

  The witness you have been practicing all along is not a separate self. It is the part of you that can thank the alarm for its service and decline its forecast. That part gets stronger each time you do not confuse volume with accuracy.

  The book ends where it began: not with a silent body, but with a body that can tell alarm from information — and act from the difference.
