angle_id: PROTECTIVE_ALARM
layer: 5
phase: identity_implications
chapter_range: [6, 6]
body: |
  Earlier I said the scan never checks ownership — that it spends your body on emergencies that were never yours. Here is what was hidden in that.

  When the loop runs often enough, it stops feeling like a process and starts feeling like a self. You are not "someone who gets anxious sometimes." You are "an anxious person." The alarm has been running so long that running has become identity — proof that you are careful, responsible, the one who sees problems before others do.

  That identity is expensive. Every loop that completes without release adds a thin layer of vigilance to your baseline. Six months of incomplete recoveries and your resting state is what used to be your stressed state. You call it personality. The body calls it a new default.

  The alarm uses identity to protect itself. If the loop is you, then questioning the loop feels like self-betrayal. If the loop is a trained response, questioning it is just maintenance — like updating software that was written for a room you no longer live in.

  Both truths can stay true at once: the alarm learned something real, and the learning is now costing more than it saves. Identity is not the enemy. Confusing the alarm for identity is.
