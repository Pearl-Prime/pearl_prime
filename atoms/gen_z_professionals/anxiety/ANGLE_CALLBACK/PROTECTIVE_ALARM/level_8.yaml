body: |
  Loyal and outdated, no indictment — that was the last claim. Hidden inside it is a harder one: the marketplace that overloads the alarm also sells the cure, and it sells it in the alarm's own grammar.

  Look at the app that just guilted you before breakfast. A streak counter is a scan target. A missed-day notification is a manager's clipped tone in a friendlier font. Meditation delivered as a metric turns rest into one more place you can fall behind. The tool promised regulation and shipped another scoreboard — so you abandoned it, then filed the abandonment as more evidence against yourself.

  The problem was never your discipline. Aspiration is a mood, and moods lose to chemistry every time. What survives contact with a bad week is infrastructure: the alarm-off hour that lives on the calendar, the phone that sleeps in the kitchen, the walk bolted to lunch. Infrastructure does not need you to feel motivated. That is the whole point of it.

  If a practice shames you for skipping it, it is not a practice. It is the alarm in a wellness costume. Build the boring kind instead — the kind that holds you on the days you cannot hold yourself.
