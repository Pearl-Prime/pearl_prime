body: |
  Earlier I said The Mechanism is a process, and that the observer in you can begin to notice it. Here is what was hidden in that.

  The process has a shape. It is not random. The Mechanism follows the same four-step shape every time, in every situation, in every chest tightening you have had for the last decade. Once you learn the shape, you cannot un-see it.

  Step one: scan. Attention sweeps the environment for threat — a manager's tone, a missing reply, a coworker promoted ahead of you, the small flatness in a sentence your roommate said this morning. The scan runs whether you ask it to or not, before your feet hit the floor.

  Step two: predict. The mind takes the scan data and builds a small simulation of the future. Usually a bad one. The unanswered Slack message is a fired email being drafted. The standup question you flubbed is being talked about in the room you cannot see. The simulation feels like memory because the body cannot tell the difference between vivid prediction and remembered fact.

  Step three: brace. The chest tightens. The shoulders lift one inch. The breath shifts into the upper lungs. The jaw locks. The body prepares for the predicted disaster — a disaster that lives entirely inside step two and has never actually happened.

  Step four: recover incomplete. The threat passes — the message arrives, the meeting ends, the coworker says good job — but the brace does not fully release. The shoulders come down halfway. A small residue of activation stays in the tissue. Then a new trigger arrives, and the next loop begins from a slightly more activated baseline than the last one. Six months of that and your resting state is what used to be your stressed state.

  This is the loop. Once. Twice. Two hundred times a day.

  The Mechanism follows the same shape every time.
