body: |
  Earlier I said The Mechanism follows a four-step shape: scan, predict, brace, recover incomplete. Here is what was hidden in that.

  The scan was useful once. The prediction was useful once. The brace was useful once. Somewhere — in a kitchen at thirteen, in a classroom at nine, in a group chat at sixteen, in a parent's mood at six — something happened that the body decided required permanent vigilance. The vigilance worked. You got through it. You read the room. You went still at the right moment. The Mechanism was, in the deepest sense, the survival move of a person who was paying attention.

  But the room you survived is no longer the room you live in. The kitchen is closed. The classroom emptied out a decade ago. The parent has aged into a different person, or has died, or has been blocked. The Mechanism does not know that. It keeps running the protocol designed for the old room inside the new room. The standup becomes the kitchen. The Slack message becomes the footsteps in the hallway. The OKR doc becomes the report card. Everything that was once a real threat now lives inside a metaphor your body cannot recognize as a metaphor.

  This is the hardest part of seeing The Mechanism clearly. What protected you once may now be imprisoning you. The same vigilance that kept you safe at eleven now makes you re-read every Slack message four times. The same scanning that let you survive a volatile household now makes a small product critique feel like a verdict on your worth. Adaptation became identity. The lifeboat became the life.

  This is not a betrayal. This is what bodies do. They optimize for survival and then keep running the optimization long after the threat is gone. There is no shame in this. There is also no liberation in pretending it is not happening.

  What protected you once may now be imprisoning you. Both things are true.
