body: |
  Earlier I said anxiety is not an emotion but a process — The Mechanism — and that it survives by getting you to believe it is you. Here is what was hidden in that.

  When you scrolled through Slack at 11:14 last night and your chest did the small tightening it always does — that was not "you, being anxious." That was the motor running. And the part of you noticing the tightening, the part of you reading this sentence and feeling a small recognition, that part is something different. That part is the observer. The observer is not the motor. The observer was here before the motor turned on, and the observer will still be here when the motor finally idles down.

  Most people never make this distinction. They have spent so many years inside the running motor that the motor has become the only voice they remember being. The Slack ping arrives, the chest tightens, the thought "I should have responded faster" appears, and all three feel like the same thing — like one continuous you. They are not one thing. They are three. A trigger. A process. And a witness.

  The witness is not strong yet. It does not need to be strong yet. It only needs to be present. Each time you notice the tightening before you react to it — even by half a second — the witness gets a small bit of practice. The motor does not stop. But the gap between the motor and the self begins to open. A millimeter, then two, then five. The whole book is about widening that gap.

  This is the first separation. The first quiet refusal. The first time the sentence comes out the other way around.

  It is not you. It is The Mechanism.
