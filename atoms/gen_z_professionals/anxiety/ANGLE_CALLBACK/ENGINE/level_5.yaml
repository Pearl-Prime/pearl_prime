body: |
  Earlier I said The Mechanism runs in systems, and that naming the systemic shape changes what you carry. Here is what was hidden in that.

  The Mechanism is not pathology. The Mechanism is unconsciousness itself — what happens whenever a process runs without a witness. The same shape that makes your chest tighten at the standup is the shape that makes a couple argue about the dishwasher for the fortieth time. Wherever something runs and no one is watching, The Mechanism gets to write the story.

  The moment you can observe it, you are already larger than it. This is not a metaphor. The observer is a different order of thing than the process being observed. A river cannot watch itself. The bank watches the river. The mind that notices the scan-predict-brace loop is, in the moment of noticing, on the bank. Not always. Not for long. But for that moment — that one Tuesday afternoon when you felt the tightening start and saw it, even briefly, without becoming it — you were on the bank.

  This is what contemplative traditions have been pointing at for three thousand years. Not perfection. Not the end of pain. Not the absence of the loop. The simple, repeatable return to the bank. The shoulder drop after the breath. The half-second pause before the reply. The small inner sentence — "the motor is running again" — that does not make the motor stop but does, every single time, change who is the one listening to it.

  The Mechanism depends on being mistaken for the self. The doorway opens the moment that mistake is corrected. Not permanently. Permanently is not on offer. The doorway opens, the doorway closes, the doorway opens again. The work is not to find the door once. The work is to remember, again and again, across the rest of a long life, that the door is there and that observation is the key.

  The moment you can observe The Mechanism, you are already larger than it.
