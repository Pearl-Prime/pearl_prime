body: |
  Earlier I said adaptation became identity — the protective process built for an old room became the person living in the new one. Here is what was hidden in that.

  The Mechanism does not only run inside you. It runs inside the systems you work in. It runs inside the platforms you scroll through. A depleted, vigilant, perpetually-bracing workforce is profitable. A workforce that cannot rest, cannot sleep through the night, cannot stop checking the phone at 11:47pm, produces more in the short term and burns out predictably in the long term. The burnout is then sold back as a wellness app subscription.

  Look at the architecture. Notifications by default. Read receipts by default. Always-on Slack with green dots and yellow dots and "away" statuses that everyone reads as judgment. Productivity dashboards. Public commit histories. Public LinkedIn ladders. A whole layer of soft surveillance that does not need to coerce, because it has trained the scan-predict-brace loop to do the coercion for free, in your own voice, inside your own chest, all night long.

  This is The Mechanism scaled up. The same process that runs in your sternum runs in the building. The same loop that runs in the building runs in the platform. When a million gen-z professionals open their laptops at 9:02am with the same tightening in the chest, that is not a coincidence and it is not a personal failing. That is a process engineered, accidentally or otherwise, into the conditions you are asked to live and work inside.

  Naming this does not make it disappear. The Slack is still open tomorrow. The OKRs are still due. But naming this changes what you carry. The exhaustion stops being a private verdict on your character. It becomes a shared signal that the conditions are not normal, and that the response — your response — is a sane reaction to insane conditions, not a defect in the responder.

  The Mechanism does not only run in you. It runs in systems.
