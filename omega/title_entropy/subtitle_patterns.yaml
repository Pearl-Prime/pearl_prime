# Authority: SYSTEMS_DOCUMENTATION §29.2.5, EXPERIENCE_LAYER_ANTI_SPAM_SPEC §16
# Title/subtitle structural templates. Variables: PrimaryKeyword, ScenarioPhrase,
# PersonaDescription, PromiseClause, DistressVerb, OutcomeVerb, N, FormatUnit,
# EngineAngle (new: human-readable phrase from engine_title_angles.yaml).
#
# ANTI-SPAM DESIGN: 8 title templates across 4 grammar families.
# Each brand uses a DIFFERENT family mix so the same topic produces
# structurally different titles under different brands.
# Reference: New Harbinger (scientific/workbook), Hay House (reader-addressed),
# Sounds True (evocative/journey), Shambhala (philosophical/contemplative).

title_templates:
  # --- Grammar Family A: Direct statement (New Harbinger style) ---
  scenario_direct: "{PrimaryKeyword}"
  scenario_promise: "{PrimaryKeyword}: {PromiseClause}"

  # --- Grammar Family B: Reader-addressed (Hay House style) ---
  persona_targeted: "{PrimaryKeyword} for {PersonaDescription}"
  outcome_focused: "How to {OutcomeVerb} and Take Back Your Mind"

  # --- Grammar Family C: Metaphorical / evocative (Sounds True style) ---
  metaphor_title: "{EngineAngle}"
  journey_title: "{EngineAngle}: {PromiseClause}"
  # Topic-anchored evocative: the curated series title (or topic keyword) LEADS so
  # the book is never off-topic, with the engine angle as the rotating creative half.
  series_metaphor: "{SeriesTitle}: {EngineAngle}"
  topic_metaphor: "{PrimaryKeyword}: {EngineAngle}"
  # Formula 4 (research): hook first (no keyword), keyword in descriptive half after colon.
  formula4_hook: "{EngineAngle}: {PrimaryKeyword}"
  formula4_series: "{SeriesTitle}: {PrimaryKeyword}"
  formula4_guide: "{EngineAngle}: A Guide to {PrimaryKeyword}"

  # --- Grammar Family D: Scientific / method (workbook style) ---
  method_title: "The {PrimaryKeyword} Method"
  guide_title: "A Practical Guide to {OutcomeVerb}"

# ─── SUBTITLE TEMPLATES ──────────────────────────────────────────────────
# Three lengths: none (no subtitle), short (tagline, <8 words), long (full sentence).
# Each template is tagged with its length class. The generator picks based on
# brand subtitle_strategy weights, then fills from the matching pool.
#
# Content tags: persona_direct (names persona), topic_direct (names topic keyword),
# metaphor (pure evocative), location (includes {Location} variable when present).
# Brand content_mix weights control the % of each tag in the candidate set.

subtitle_templates:

  # ─── SHORT subtitles (tagline / colon-join style, <8 words) ───
  # These join into the title as "Title: Tagline" in the plan output.
  short_gentle:       { text: "A Path Back to Stillness", length: short, content: metaphor }
  short_permission:   { text: "You Were Never Broken", length: short, content: metaphor }
  short_body:         { text: "A Nervous System Reset", length: short, content: topic_direct }
  short_method:       { text: "A Practical System for {PrimaryKeyword}", length: short, content: topic_direct }
  short_persona:      { text: "For {PersonaDescription}", length: short, content: persona_direct }
  short_location:     { text: "Voices from {Location}", length: short, content: location }
  short_promise:      { text: "{PromiseClause}", length: short, content: metaphor }
  short_mechanism:    { text: "What Your Body Already Knows", length: short, content: metaphor }

  # ─── LONG subtitles (full sentence, 10-20 words) ───
  three_part:         { text: "How to {OutcomeVerb}, {Action1}, and {Action2}", length: long, content: topic_direct }
  how_to_stack:       { text: "How to {Action1}, {Action2}, and {Action3}", length: long, content: topic_direct }
  micro_promise:      { text: "A Proven Path to {OutcomeVerb} and Find Lasting Calm", length: long, content: metaphor }
  numbered_steps:     { text: "{N} {FormatUnit} to {OutcomeVerb} and Reclaim Your Peace of Mind", length: long, content: topic_direct }
  practical_tools:    { text: "Practical Tools for {PersonaDescription} Who {DistressVerb} Under Pressure", length: long, content: persona_direct }
  gentle_promise:     { text: "A Gentle Approach to {PrimaryKeyword} That Meets You Where You Are", length: long, content: topic_direct }
  science_backed:     { text: "Evidence-Based Strategies to {OutcomeVerb} and Build Lasting Change", length: long, content: topic_direct }
  body_first:         { text: "Body-Based Practices for {PrimaryKeyword} and Nervous System Reset", length: long, content: topic_direct }
  identity_shift:     { text: "How {PersonaDescription} Are Rewriting the Rules of {PrimaryKeyword}", length: long, content: persona_direct }
  permission_grant:   { text: "You Do Not Have to {DistressVerb} Anymore — A Path to {OutcomeVerb}", length: long, content: metaphor }
  invisible_script:   { text: "The Hidden Pattern Behind Your {PrimaryKeyword} — and How to Break It", length: long, content: topic_direct }
  mechanism_reveal:   { text: "What Your {PrimaryKeyword} Is Really Telling You — and What to Do About It", length: long, content: topic_direct }
  somatic_anchor:     { text: "A Nervous System Approach to {OutcomeVerb} and Feeling Safe in Your Body", length: long, content: metaphor }
  daily_ritual:       { text: "{N} Minutes a Day to {OutcomeVerb} and Build Lasting Resilience", length: long, content: topic_direct }
  profession_specific: { text: "A Field Guide for {PersonaDescription} Navigating {PrimaryKeyword}", length: long, content: persona_direct }
  generation_voice:   { text: "A Real Talk Guide to {PrimaryKeyword} for {PersonaDescription}", length: long, content: persona_direct }
  location_grounded:  { text: "A Guide for {PersonaDescription} in {Location} Navigating {PrimaryKeyword}", length: long, content: location }
  engine_hook:        { text: "{EngineSubtitleHook}", length: long, content: metaphor }

  # ─── Engine-bearing subtitles (Waystream + distinctness regen) ───
  # Each template injects {EngineSubtitleHook} and/or {EngineShortPhrase} so
  # books sharing persona×topic×format but differing by engine get unique subs.
  engine_persona_hook:  { text: "{EngineSubtitleHook} for {PersonaDescription}", length: long, content: persona_direct }
  engine_topic_persona: { text: "{EngineShortPhrase} — {PrimaryKeyword} for {PersonaDescription}", length: long, content: persona_direct }
  engine_voice:         { text: "A Real Talk Guide to {PrimaryKeyword}: {EngineSubtitleHook}", length: long, content: persona_direct }
  engine_field_guide:   { text: "A Field Guide to {EngineShortPhrase} for {PersonaDescription}", length: long, content: persona_direct }
  engine_reset:         { text: "A {FormatUnit} Reset Through {EngineShortPhrase} for {PersonaDescription}", length: long, content: persona_direct }

# ─── BRAND PREFERENCES ────────────────────────────────────────────────────
# Each brand has:
#   title: preferred title template IDs
#   subtitle: preferred subtitle template IDs (from any length class)
#   subtitle_strategy:
#     none_pct:  % of books with NO subtitle (punchy standalone title)
#     short_pct: % with SHORT subtitle (colon-joined tagline)
#     long_pct:  % with LONG subtitle (full separate sentence)
#     Must sum to ~1.0. Generator uses seeded roll to pick mode per book.
#   content_mix:
#     persona_direct: weight for naming persona in subtitle
#     topic_direct:   weight for naming topic keyword in subtitle
#     metaphor:       weight for pure evocative/metaphorical subtitle
#     location:       weight for including location name (when location in book)
#     Weights are relative; generator normalizes. Higher = more likely.
#
# ANTI-SPAM: No two brands share the same (subtitle_strategy + content_mix) profile.

