# Bridge templates: transition the reader from narrative/teaching into exercise mode.
# Keyed by exercise_type (from exercises_v4 registry).
# Each type has full (2-3 sentences), lean (1 sentence), and gentle (post-emotional) variants.
# The bridge prepares the reader mentally so the exercise doesn't feel abrupt.

version: 1

templates:
  _default:
    full: >-
      Before you keep reading, there is something worth trying here.
      It will take less than two minutes and it does not require you to
      believe anything first. Just follow the steps and notice what happens.
    lean: >-
      Try this before you move on.
    gentle: >-
      You have been sitting with something heavy. Before we go further,
      there is a small practice that might help your body catch up with
      what you just read. Nothing to fix. Just a place to land for a moment.

  00_breath_regulation:
    full: >-
      Before you keep reading, try something with your breath.
      Not to fix anything. Just to give your nervous system a different
      input for the next sixty seconds. Follow the rhythm and notice
      what shifts.
    lean: >-
      Try this with your breath before you move on.
    gentle: >-
      That was a lot to sit with. Before we continue, let your breath
      do something simple. Not to make the feeling go away, but to give
      your body a moment to register where it actually is right now.

  01_grounding_orientation:
    full: >-
      Before you keep reading, land your body where it actually is.
      Your thoughts may still be with the last section. This practice
      uses your senses to bring you back to the room, the chair, the
      present moment. It takes less than a minute.
    lean: >-
      Come back to the room for a moment before you continue.
    gentle: >-
      You have been somewhere difficult. Before we move on, let your
      senses bring you back to where you are sitting right now. Not
      to leave the feeling behind, but to feel the ground under it.

  02_body_awareness_scan:
    full: >-
      Before you keep reading, check in with your body. Not to diagnose
      anything, but to notice what is already there. A scan takes less than
      two minutes and it often reveals tension you did not know you were holding.
    lean: >-
      Check in with your body before you continue.
    gentle: >-
      Something landed in you during that section. Before we continue,
      travel your attention through your body slowly. Not to fix what
      you find, but to acknowledge where the chapter left its weight.

  03_somatic_release_discharge:
    full: >-
      Before you keep reading, let your body move. The last section may
      have activated something that words cannot discharge. A few seconds
      of deliberate movement can help your nervous system complete what
      it started.
    lean: >-
      Let your body move before you continue.
    gentle: >-
      Your body may be holding something it could not say during that
      section. Before we go on, give it permission to move. Not
      performance. Just whatever motion wants to happen next.

  04_nervous_system_downregulation:
    full: >-
      Before you keep reading, let your nervous system settle one degree.
      This is not relaxation. It is a deliberate downshift so you can
      absorb the next section from a steadier baseline.
    lean: >-
      Settle your nervous system one degree before you continue.
    gentle: >-
      That section asked a lot of your system. Before we continue,
      give your body permission to soften. Not to forget what you
      read, but to hold it from a place that is one degree calmer.

  05_nervous_system_upregulation:
    full: >-
      Before you keep reading, wake your body up a little. The next
      section benefits from presence, and a few seconds of deliberate
      activation can sharpen your attention without adding stress.
    lean: >-
      Bring some energy into your body before you continue.
    gentle: >-
      You may feel heavy after that section. Before we move on,
      let your body find a small spark of aliveness. Not forced
      brightness, just enough energy to stay present for what comes next.

  06_vagal_stimulation_sound:
    full: >-
      Before you keep reading, try making a sound. It will feel strange.
      That is fine. Sound vibration stimulates a nerve that runs from your
      brain to your gut, and the effect is faster than any thought exercise.
    lean: >-
      Try making a sound before you continue. Trust the strangeness.
    gentle: >-
      After what you just read, your throat may feel tight or your
      chest may feel compressed. Before we go on, a simple hum or
      tone can help your body release what it is holding.

  07_self_contact_touch:
    full: >-
      Before you keep reading, place a hand somewhere on your body.
      This is not a gesture. It is a signal. When the hand touches
      and you feel the touch from both sides, your nervous system
      registers safety in a way that thinking cannot replicate.
    lean: >-
      Place a hand on your body before you continue.
    gentle: >-
      After sitting with that, your body may need to feel held.
      Before we continue, place a hand on your chest or your arm.
      Not to comfort yourself with words, but to let your skin
      register that you are still here and still safe.

  08_emotional_processing_completion:
    full: >-
      Before you keep reading, stay with what came up. Not the story
      of it, but the sensation. This practice helps emotions complete
      their cycle instead of getting stuck halfway through.
    lean: >-
      Stay with the sensation for a moment before you continue.
    gentle: >-
      Something moved in you during that section. Before we go on,
      give it space to finish. Not to resolve it, but to let the
      feeling reach its natural landing instead of being interrupted
      by the next page.

  09_embodied_intention_direction:
    full: >-
      Before you keep reading, ask yourself one question and listen
      with your body, not your mind. The answer will not come as a
      thought. It will come as a pull, a lean, a tightening, or a release.
    lean: >-
      Ask your body what matters right now before you continue.
    gentle: >-
      After everything you just read, your mind may have opinions.
      Before we continue, set those aside for a moment and ask your
      body what it needs. The body answers differently than the mind.

  10_integration_return_to_baseline:
    full: >-
      Before you keep reading, take a moment to land. Not to summarize
      what you learned, but to feel what shifted. Integration is not
      understanding. It is the body registering that something changed.
    lean: >-
      Land for a moment before you continue.
    gentle: >-
      You have been through something in this section. Before we
      move on, let your body acknowledge what shifted. Not a
      conclusion. Not a lesson. Just a quiet registration of
      what is different now.
