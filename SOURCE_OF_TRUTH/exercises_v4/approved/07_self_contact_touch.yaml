# Type: 07_self_contact_touch — Touch / self-contact (grounding).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 07_self_contact_touch
id: ex_self_contact_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 120
  modalities: [touch, self_contact]
content:
  intro: |
    Touch is the first sense the nervous system develops, and it remains one of the most direct ways to signal safety. When you place your own hand on your body with intention, the brain registers both the giving and the receiving of contact. This dual registration creates a loop—your hand feels your body, your body feels your hand. The loop tells the nervous system: you are here, you are contained, you are held. Not by someone else. By yourself.
  guided_practice: |
    Place one hand on your chest, over the center of your sternum. Don't press hard—just rest it there with enough contact to feel warmth. Notice the breath moving under your hand. The rise and fall. The warmth building between your palm and your chest. Stay with this for a few breaths. Now, if it feels right, place your other hand over the first. The double contact increases the signal. The nervous system reads the layered pressure as containment. If the chest doesn't feel right, you can place a hand on your belly, your opposite shoulder, or the side of your neck. The location matters less than the intention: this is a gesture of presence, not comfort. You're not trying to soothe yourself. You're placing your attention and your touch in the same location. Stay with the contact for thirty seconds. Feel the warmth. Feel the breath moving underneath. Feel the weight of your own hand.
  aha_noticing: |
    Now, notice what the contact produced. You might notice that your breathing slowed or deepened under the weight of your hand. You might notice that your shoulders softened, or that the muscles in your chest released slightly. The warmth between your palm and your body may have spread. This is the nervous system responding to safe touch—even when the touch comes from yourself. The body doesn't fully distinguish between self-contact and contact from a trusted other. Both activate the same calming pathways. Whatever you feel in your chest right now—the warmth, the rhythm of the breath, the slight settling—that's your nervous system responding to being held by your own hands.
  integration: |
    Now, before you move on, notice that this contact is available to you in any moment. A hand on the chest during a difficult phone call. A palm on the belly during a sleepless hour. A hand on the opposite shoulder when the news is too much. These gestures don't require explanation or visibility. They're small, private acts of self-regulation that the nervous system recognizes instantly. You've felt the recognition just now. Let your hands return to wherever they naturally rest, and carry the knowledge that safe touch starts with your own hands.
