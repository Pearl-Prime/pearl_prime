# Type: 02_body_awareness_scan — Body scan / interoceptive awareness (grounding).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 02_body_awareness_scan
id: ex_body_awareness_scan_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 150
  modalities: [body_scan, awareness]
content:
  intro: |
    Your body has been responding to everything you've taken in—every story, every recognition, every moment that landed. It responds whether or not you notice. This practice is about noticing. Not changing what's there, not fixing it, not interpreting it. Just developing the ability to sense what's already happening inside your own body.
  guided_practice: |
    Start at the top of your head. You don't need to feel anything specific—just bring your attention there and notice whatever is present. Warmth, pressure, nothing at all. All of those are valid. Move slowly down to your forehead, your eyes, your jaw. The jaw often holds tension that the mind doesn't register. Notice if your teeth are clenched or if there's space between them. Move to your throat. Then your shoulders. The shoulders carry what the mind delegates—they tighten when the mind is working hard. Don't try to relax them. Just notice their position. Move to your chest. Notice the breath moving there. Notice if the chest feels open or constricted, warm or cool. Move to your belly. The belly often holds what the chest won't show. Notice whatever is there. Move to your hips, your legs, your feet. By the time you reach your feet, you've traveled the full length of your body with attention. The traveling is the practice.
  aha_noticing: |
    Now, take a moment to notice what you found. Not all areas felt the same. Some had sensation—tension, warmth, movement. Others felt blank or distant. Both responses carry information. You might notice that your shoulders held more than you expected, or that your jaw was tighter than you realized, or that your chest had a quality you can't quite name. This is interoceptive awareness—the ability to sense the body from inside. The body has been sending these signals continuously. The scan doesn't create the signals. It tunes your attention to what's already broadcasting. Whatever you noticed in your breath, your chest, your belly—that's your body's current report.
  integration: |
    Now, before you move on, recognize that you don't need to do a full scan to access this awareness. A single check-in—shoulders, jaw, belly—takes seconds. The information is always available. The practice builds the habit of asking. Over the next hour, you might pause once and notice one area of your body. Not to change it. Not to diagnose it. Just to register what's there. The registration is enough. Let your attention return to the room now, and carry the awareness gently—like something you noticed but don't need to act on yet.
approval:
  status: candidate
