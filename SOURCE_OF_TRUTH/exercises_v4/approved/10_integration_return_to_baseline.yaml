# Type: 10_integration_return_to_baseline — Integration / return (integration).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 10_integration_return_to_baseline
id: ex_integration_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 120
  modalities: [integration]
content:
  intro: |
    You've been doing inner work—reading, recognizing, feeling. The nervous system has been activated in ways that are useful but also demanding. Before you return to the rest of your day, this practice gives the body a chance to integrate what happened and return to a baseline that can hold it. Not back to where you started. To a new baseline that includes what you just experienced.
  guided_practice: |
    Start by noticing the room around you. The light, the temperature, the sounds. Let your senses confirm that you're in a safe, ordinary place. The ordinariness is the medicine here—after inner work, the nervous system benefits from contact with the mundane. Feel your feet on the floor. Feel the surface supporting your body. Take one breath that's slightly deeper than normal—not forced, just intentional. One breath that says: I'm transitioning now. Now scan your body briefly. Not a full scan—just a quick check. How does your chest feel? Your belly? Your shoulders? Whatever you find, let it be there. The integration doesn't require resolution. It requires acknowledgment. What you read, what you felt, what you recognized—it's now part of you. You don't need to hold it tightly. You don't need to do anything with it right now. Let it settle the way sediment settles in still water—gradually, without force, in its own time.
  aha_noticing: |
    Now, take a moment to notice the difference between where you started and where you are now. You might notice that your breathing sits differently in your body—perhaps lower, perhaps steadier. You might notice that your shoulders carry less than they did at the beginning, or that your jaw holds less tension. You might notice a quality that's hard to name—something between tiredness and openness, between heaviness and relief. This is the body after processing. It doesn't feel resolved because resolution isn't the goal. The goal is integration—taking in what happened and letting the body reorganize around it. Whatever you notice in your chest, your breath, your overall state right now, that's integration happening in real time.
  integration: |
    Now, as you return to your day, carry one thing with you. Not everything—one thing. One recognition, one sensation, one moment that landed. The body can integrate one thing at a time. If you try to carry everything, the nervous system treats it as overload and files it away unprocessed. One thing, held lightly, integrates naturally over hours. Let that one thing choose itself—whatever comes to mind first is usually what the body prioritized. Stand or shift your posture when you're ready. Let the transition be gentle. The work continues in the background whether or not you attend to it. Your body knows how to do this part.
approval:
