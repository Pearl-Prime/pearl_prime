# Type: 04_nervous_system_downregulation — Parasympathetic settling (grounding).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 04_nervous_system_downregulation
id: ex_downregulation_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 120
  modalities: [parasympathetic]
content:
  intro: |
    It makes sense that your system has been running on alert. The material you've been engaging with asks the nervous system to stay activated—to recognize, to process, to hold difficult things. This practice isn't about forcing calm. It's about giving your system a signal that, right now, in this moment, the emergency level can lower. Not because the difficulty is resolved. Because you're safe enough to let the guard down slightly.
  guided_practice: |
    Start with your exhale. You don't need to change the inhale—just let the exhale extend slightly longer than it naturally wants to. The exhale activates the parasympathetic branch of the nervous system. It's the body's built-in signal for settling. Three breaths with a longer exhale. Not forced—just gently extended. Now notice your posture. If your shoulders are raised, let them drop one millimeter. Not a dramatic release—just a small permission. If your jaw is clenched, let your lips part slightly. If your hands are gripped, let the fingers soften. Each of these micro-adjustments sends a message to the brain: the threat level is lowering. The brain reads posture as data. Relaxed posture tells the brain the environment is safe enough to settle. Sit with this for a moment. Let the settling happen at the body's pace, not the mind's.
  aha_noticing: |
    Now, notice what your body did with that permission. You might notice that your breathing rhythm changed—perhaps slower, perhaps deeper in the belly rather than high in the chest. You might notice that your shoulders are sitting lower than they were a minute ago, or that the tension in your jaw softened without you directing it. The nervous system doesn't need a long intervention to begin shifting. It needs a clear signal. The extended exhale was a signal. The softened posture was a signal. Your body read both and responded. Whatever settling you notice right now—in your chest, your belly, your breath—that's your parasympathetic system doing what it's designed to do when given room.
  integration: |
    Now, before you move on, notice that downregulation doesn't require stopping everything. One extended exhale at a traffic light. A softened jaw between emails. Shoulders dropping one millimeter during a meeting. These micro-signals accumulate. The nervous system doesn't need a meditation retreat to begin settling. It needs small, repeated permissions throughout the day. You've practiced the signal. Your body recognized it. The recognition is the foundation. Let your breathing return to its natural rhythm now, and carry the permission with you—not as an obligation, but as an option that's always available.
approval:
  status: candidate
