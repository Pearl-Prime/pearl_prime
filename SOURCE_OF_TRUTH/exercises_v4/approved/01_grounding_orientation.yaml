# Type: 01_grounding_orientation — Sensory orientation (grounding).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 01_grounding_orientation
id: ex_grounding_orientation_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 120
  modalities: [senses, orientation]
content:
  intro: |
    Before going further, let your attention arrive where your body actually is. Not where your thoughts are—your thoughts may be in the past, the future, or circling something that just surfaced. Your body is here. In a room, in a chair, in a specific place. This practice is about landing in that specific place, using what your senses can already detect.
  guided_practice: |
    Start with what you can see. Pick one object in your environment and look at it as though you've never seen it before. Notice its color, its edges, the way light hits it. Stay with it for a few seconds. Now shift to what you can hear. Not the loudest sound—the quietest one. The hum of a machine, the sound of your own breathing, ambient noise you usually filter out. Let that sound exist without labeling it as good or bad. Now notice one point of contact between your body and a surface. Your feet on the floor, your back against a chair, your hands resting somewhere. Feel the pressure, the temperature, the texture. You're not searching for calm. You're arriving in the sensory present—the place your body never left.
  aha_noticing: |
    Now, notice what happened when you moved through those three channels—sight, sound, touch. You might notice that your breathing slowed without being told to. You might notice that the tension in your shoulders shifted, or that your chest feels slightly different than it did a minute ago. The shift isn't dramatic. It's the nervous system registering that you're oriented—that you know where you are. When the body confirms its location through the senses, the threat-scanning system eases. Not because the threat is gone, but because the body has current data. The current data is: you are here, in this room, in this moment.
  integration: |
    Now, before you move on, notice that orientation is available to you at any moment. It doesn't require a quiet room or closed eyes. It requires one sense, one object, one point of contact. The next time your mind pulls you somewhere your body isn't, you can use any single sensory channel to return. One thing you can see. One thing you can hear. One point where your body meets the world. That's enough to land. Let your attention soften now and carry this with you—not as a task, but as a capacity your senses already have.
approval:
  status: candidate
