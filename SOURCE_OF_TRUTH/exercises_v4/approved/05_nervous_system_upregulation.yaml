# Type: 05_nervous_system_upregulation — Activation / mobilization (activation).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 05_nervous_system_upregulation
id: ex_upregulation_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 120
  modalities: [activation, mobilization]
content:
  intro: |
    Sometimes the body doesn't need to calm down. Sometimes it needs to wake up. Low energy, flatness, a sense of being muted or distant—these can be the nervous system's way of protecting you from something it decided was too much. The protection is real. But if the flatness has overstayed its usefulness, gentle activation can remind the system that engagement is safe. This isn't about forcing energy. It's about inviting the body back online.
  guided_practice: |
    Start by pressing your feet firmly into the floor. Not stomping—just pressing. Feel the ground push back. That pushback is proprioceptive input, and it tells the nervous system you're connected to something solid. Hold the press for five seconds, then release. Do it again. Now bring your hands together and rub your palms briskly for ten seconds. Feel the warmth that builds. The warmth is friction, and friction generates sensation the nervous system can use to orient. Place your warm palms over your eyes for a moment—the warmth on the face activates cranial nerves connected to the social engagement system. Now gently tap your collarbone area with your fingertips, alternating hands. Light, rhythmic tapping. The rhythm gives the nervous system a pattern to organize around. Continue for fifteen seconds. Then stop and sit with whatever arrived.
  aha_noticing: |
    Now, take a moment to notice what shifted. You might notice that your hands feel more present—warmer, tingling slightly. You might notice that your breath has more movement in it than before, or that your chest feels less constricted. The flatness may not be gone, but something underneath it may have stirred. Upregulation isn't about going from zero to ten. It's about going from zero to two—from flat to present, from muted to sensing. Whatever activation you notice in your body right now, even if it's subtle—warmth in the palms, pressure in the feet, a slight quickening of the breath—that's your nervous system responding to an invitation. The invitation was physical, and the response is physical.
  integration: |
    Now, before you move on, recognize that activation lives in small physical actions. A firm press of the feet under a desk. A brisk hand rub between tasks. A few taps on the collarbone when the flatness sets in. These aren't dramatic gestures. They're the nervous system's language for waking up—proprioception, warmth, rhythm. You've spoken that language just now. Your body registered it. The next time you notice the muting or the distance, you have a physical vocabulary for re-engagement. Let your body settle into whatever energy level it's at now, and move forward from there.
