# Type: 00_breath_regulation — Breath-based regulation (grounding).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 00_breath_regulation
id: ex_breath_regulation_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 120
  modalities: [breath]
content:
  intro: |
    Take a moment to notice where you are right now. You don't need to change anything about how you're breathing. You don't need to breathe deeper, slower, or more deliberately. The breath is already happening. It has been happening all along—through everything you just read, through every reaction your body had to it. The only shift here is attention. You're turning toward something that's already in motion.
  guided_practice: |
    Let your attention rest on the breath without directing it. Notice where you feel it most—maybe the nostrils, maybe the chest, maybe the belly. Wherever you find it, stay there. If the breath is shallow, let it be shallow. If it's uneven, let it be uneven. The practice is not to improve the breath. The practice is to be with it as it is. After a few cycles, you might notice a slight lengthening on the exhale. You didn't cause this. The nervous system adjusts when it's observed without pressure. Let three more breaths happen at whatever pace they choose. If your attention drifts, return it to the physical sensation—the air moving, the ribs expanding, the pause between exhale and inhale. That pause is where the nervous system recalibrates. You don't need to extend it. Just notice it exists.
  aha_noticing: |
    Now, take a moment to notice what shifted. You didn't force your breathing to change, but something may have changed anyway. Your shoulders might have dropped slightly. Your jaw might have loosened. The rhythm of your breath might feel different than it did two minutes ago—not better, just different. This is your nervous system responding to attention rather than instruction. The body doesn't need to be told how to regulate. It needs to be noticed while it regulates. Whatever you're feeling in your chest or belly right now—that's the breath doing what it already knows how to do, with you paying attention.
  integration: |
    Now, before you move on, notice that you can return to this at any point. Not as a technique. Not as a breathing exercise you have to remember correctly. Just as a moment of turning toward what's already happening. The next time you feel activation—tension rising, thoughts accelerating, the body bracing—you can place your attention on the breath without trying to change it. The attention itself is the practice. One breath, noticed. That's the whole thing. Let the breath return to the background now, and carry the noticing forward.
approval:
  status: candidate
