# Introduction templates: the explicit "Now we're going to do an exercise" marker.
# Keyed by exercise_type (from exercises_v4 registry).
#
# OPD-113 (2026-05-20): operator observation that 6h books lost the clear
# "this is an exercise. We're gonna do an exercise now" cue that 15min/30min
# books had via explicit "PRACTICE N: NAME" prose headers. This file restores
# that cue in template form for long-form runtimes (and applies to all
# runtimes for consistency).
#
# This is Part 1 of the operator's required 5-part exercise structure:
#   1. INTRODUCTION  ← this file
#   2. description   (intro_templates.yaml: "This is a X practice...")
#   3. guidance      (the atom text itself)
#   4. aha           (aha_noticing_phoenix_standard.yaml)
#   5. integration   (integration_phoenix_standard.yaml)
#
# Each type has a `full` (used in long-form: deep_book_4h, deep_book_6h)
# and `lean` (short-form, when present, otherwise empty).
# Empty strings are valid — caller treats empty as SKIP.

version: 1

templates:
  _default:
    full: "Now we're going to do a practice."
    lean: "Now, a practice."

  00_breath_regulation:
    full: "Now we're going to do a breath practice."
    lean: "Now, a breath practice."

  01_grounding_orientation:
    full: "Now we're going to do a grounding practice."
    lean: "Now, a grounding practice."

  02_body_awareness_scan:
    full: "Now we're going to do a body scan."
    lean: "Now, a body scan."

  03_somatic_release_discharge:
    full: "Now we're going to do a movement practice."
    lean: "Now, a movement practice."

  04_nervous_system_downregulation:
    full: "Now we're going to do a settling practice."
    lean: "Now, a settling practice."

  05_nervous_system_upregulation:
    full: "Now we're going to do an activation practice."
    lean: "Now, an activation practice."

  06_vagal_stimulation_sound:
    full: "Now we're going to do a sound practice."
    lean: "Now, a sound practice."

  07_self_contact_touch:
    full: "Now we're going to do a touch practice."
    lean: "Now, a touch practice."

  08_emotional_processing_completion:
    full: "Now we're going to do an emotional processing practice."
    lean: "Now, an emotional processing practice."

  09_embodied_intention_direction:
    full: "Now we're going to do an intention practice."
    lean: "Now, an intention practice."

  10_integration_return_to_baseline:
    full: "Now we're going to do an integration practice."
    lean: "Now, an integration practice."
