# Intro templates: orient the reader on what this exercise is and why it matters here.
# Keyed by exercise_type (from exercises_v4 registry).
# Each type has full (3-5 sentences) and lean (1-2 sentences) variants.
# The intro sets expectations so the reader knows what they're about to do.

version: 1

templates:
  _default:
    full: >-
      This is a short practice you can do right where you are. You do not
      need to close your eyes or change your position. Just follow the
      steps as they come. The goal is not to feel different. The goal is
      to notice what is already happening in your body and give your
      nervous system a slightly different input. Most people feel a shift
      within thirty seconds.
    lean: >-
      This is a short practice you can do right where you are. Follow the
      steps and notice what happens.

  00_breath_regulation:
    full: >-
      This is a breath-based practice. You are not trying to breathe
      perfectly or deeply. You are giving your nervous system a rhythm
      it can follow. When the breath has a predictable pattern, the
      system that manages your stress response starts to ease. You
      do not have to believe this. Just follow the count and notice
      what your body does with it.
    lean: >-
      This is a breath practice. Follow the rhythm and let your
      nervous system respond on its own.

  01_grounding_orientation:
    full: >-
      This is a sensory orientation practice. You are going to use
      your eyes, ears, and sense of touch to land your body in the
      present moment. When your nervous system can confirm where you
      are through your senses, the part of you that scans for threat
      starts to quiet. It takes about sixty seconds and you do not
      have to move.
    lean: >-
      This is a grounding practice. Use your senses to confirm where
      your body actually is right now.

  02_body_awareness_scan:
    full: >-
      This is a body scan. You are going to travel your attention
      from your head to your feet, not looking for problems but
      noticing what is there. Tension, temperature, weight, movement.
      Most of what your body is doing right now is happening outside
      your awareness. This practice brings some of it into view. You
      do not need to fix anything you find.
    lean: >-
      This is a body scan. Travel your attention through your body
      and notice what you find without fixing it.

  03_somatic_release_discharge:
    full: >-
      This is a movement practice. When your nervous system activates
      in response to stress, it prepares your body to move. If you
      do not move, that activation stays trapped. This practice gives
      your body permission to discharge the energy that built up during
      the last section. The movements are small and you control the pace.
    lean: >-
      This is a movement practice. Let your body discharge the
      activation that built up. Small movements, your pace.

  04_nervous_system_downregulation:
    full: >-
      This is a settling practice. You are going to use your breath
      and posture to send a specific signal to your nervous system:
      slow down. Not collapse, not sleep. Just one degree calmer
      than where you are now. The shift is usually felt in the
      shoulders, jaw, or the space behind the eyes.
    lean: >-
      This is a settling practice. Use breath and posture to bring
      your system down one degree.

  05_nervous_system_upregulation:
    full: >-
      This is an activation practice. Sometimes the body needs more
      energy, not less. You are going to use physical contact and
      movement to bring your alertness up without triggering stress.
      Think of it as waking up a room by opening a window, not by
      turning on an alarm.
    lean: >-
      This is an activation practice. Bring your alertness up
      without adding stress.

  06_vagal_stimulation_sound:
    full: >-
      This is a sound practice. You are going to hum or make a tone.
      The vibration from your voice stimulates the vagus nerve, which
      runs from your brainstem to your gut and controls your rest-and-
      digest response. The effect is measurable and faster than most
      cognitive techniques. It may feel odd. That is expected.
    lean: >-
      This is a humming practice. The vibration stimulates your
      vagus nerve and calms your system faster than thinking can.

  07_self_contact_touch:
    full: >-
      This is a touch practice. You are going to place your hand on
      your own body. When skin touches skin and you feel the contact
      from both sides, your nervous system receives a safety signal
      that thinking alone cannot produce. You do not need to feel
      soothed. The signal works whether you notice it or not.
    lean: >-
      This is a self-contact practice. Place your hand on your body
      and feel the touch from both sides.

  08_emotional_processing_completion:
    full: >-
      This is an emotional completion practice. Emotions are designed
      to move through the body in waves. When they get interrupted,
      they stall midway and become chronic tension. This practice
      helps the wave finish. You are going to locate the emotion in
      your body and stay with the sensation, not the story, until
      it shifts on its own.
    lean: >-
      This is an emotional processing practice. Locate the feeling
      in your body and stay with the sensation until it moves.

  09_embodied_intention_direction:
    full: >-
      This is an intention practice. You are going to ask yourself
      a question and let your body answer. The body does not respond
      in words. It responds in direction: a lean, a pull, a settling,
      a tightening. This is not intuition in the mystical sense. It
      is your nervous system reporting what it already knows before
      your thinking mind has finished deliberating.
    lean: >-
      This is an intention practice. Ask a question and let your
      body answer through sensation, not thought.

  10_integration_return_to_baseline:
    full: >-
      This is an integration practice. You have just been through
      something. Before the next section arrives, your body needs a
      moment to register what changed. Integration is not understanding
      or summarizing. It is the quiet moment when the system updates
      its map. You are going to sit with what shifted and let it settle
      before you move on.
    lean: >-
      This is an integration practice. Let your body register what
      just changed before you move on.
