# Phoenix-standard integration blocks. Same keys as aha_noticing_phoenix_standard.yaml.
# Structure: carry-forward cue + boundary clause + re-entry. 40-150 words.
# Required opener: one of registry integration must_start_with_one_of.

_default: |
  The win here is not calm. The win is noticing the alarm before it chooses for you.
  You do not need to feel different yet. Only notice which part of you is still running.
  As you return to reading or to your day, keep what you observed. It does not require homework to be useful.

cyclic_sighing: |
  Before you return to the screen, take one breath with a longer exhale than what came in.
  Nothing has to slow all the way down. If the exhale is only slightly longer, that is still a signal sent.
  As you continue, carry the exhale with you. The nervous system registers the ratio even when you forget to track it.

box_breathing: |
  As you return, you can use a single four-count hold the next time something feels rushed.
  The pause does not need to be performed. If it does not appear today, that is information too.
  Go back to your day. The capacity for a pause stays available whether or not you used it just now.

breath_regulation: |
  Let the practice land without grading it. Your body is processing something whether the breathing felt smooth or not.
  If the shift was subtle, that is still the practice working. Subtle is how the nervous system tends to move.
  Carry one observation forward. Even a single honest sentence about what you felt is the whole point.

body_awareness: |
  Before you keep moving, name one thing you noticed in your body during that practice. Just one.
  You do not need to explain it or fix it. Naming is its own form of signal.
  As you return, the body you just checked in with is the same one that carries everything else forward.

grounding: |
  Take one look at the room you are in. One concrete object. Its color, its edge, its distance.
  You do not need the room to mean anything. You just need to know it is there.
  From there, return. What you practiced holds even when the environment does not cooperate.

somatic_release: |
  Let the discharge be whatever it was — a shoulder drop, a jaw release, a long exhale.
  You do not need to manufacture more of it. What moved, moved. What stayed, stays.
  As you return, your nervous system has a slightly different entry point than it had before you started.
