# Type: 03_somatic_release_discharge — Movement / discharge (release).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 03_somatic_release_discharge
id: ex_somatic_release_discharge_001
metadata:
  persona: any
  topic: any
  intensity: medium
  duration_seconds: 150
  modalities: [movement, discharge]
content:
  intro: |
    Sometimes the body holds energy that belongs to a response that never completed. A fight that didn't happen. A run that never started. A reaction that was suppressed because the situation demanded composure. That energy doesn't disappear when the moment passes. It stays in the muscles, the limbs, the nervous system. This practice gives the body permission to move what it's been holding.
  guided_practice: |
    Start by noticing where in your body you feel the most activation right now. It might be your hands, your legs, your shoulders, your chest. Wherever it is, bring your attention there. Now, let that area move. Not a prescribed movement—whatever the body wants. It might be shaking your hands. It might be pressing your feet into the floor. It might be rolling your shoulders or rocking slightly. Let the movement be small at first. The nervous system responds better to permission than instruction. If the movement wants to get bigger, let it. If it wants to stay small, let it stay small. The body knows the dose. You might feel warmth spreading, or tingling, or a tremor. These are signs of discharge—stored energy completing its cycle. Stay with the movement for thirty seconds to a minute. When the body slows on its own, let it slow. Don't push past what the body offers.
  aha_noticing: |
    Now, pause and notice what changed. The area that held activation may feel different now—lighter, warmer, softer, or simply less charged. You might notice that your breathing deepened on its own, or that your shoulders dropped, or that tension in your jaw or chest released without your directing it. Discharge doesn't look dramatic from the outside. A hand shake, a foot press, a shoulder roll. But the nervous system registers the completion. What was held is now in motion. What was in motion is settling. Notice the settling happening in your body right now—the rhythm of it, the pace. The pace belongs to your system, not to any external timeline.
  integration: |
    Now, before you move on, notice that movement is always available as a release channel. You don't need a dedicated practice space or a specific routine. A thirty-second shake of the hands between meetings, a press of the feet into the floor during a difficult conversation, a shoulder roll after reading something that landed hard—these micro-movements give the nervous system permission to complete what it started. Let your body settle into stillness now, at whatever pace it chooses. Carry the permission forward—not as a technique to remember, but as a relationship with your body's need to move.
approval:
