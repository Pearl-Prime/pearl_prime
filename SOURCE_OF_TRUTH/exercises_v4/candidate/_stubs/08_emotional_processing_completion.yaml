# Type: 08_emotional_processing_completion — Emotion / completion (release).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 08_emotional_processing_completion
id: ex_emotional_processing_001
metadata:
  persona: any
  topic: any
  intensity: medium
  duration_seconds: 150
  modalities: [emotion, completion]
content:
  intro: |
    Emotions have a natural cycle. They rise, they peak, they subside. But that cycle often gets interrupted—by distraction, by duty, by the habit of managing what we feel instead of feeling it. When the cycle is interrupted repeatedly, the emotion doesn't vanish. It stalls. It waits. This practice creates a brief window for an emotion to complete its movement through the body—not by analyzing it, not by narrating a story about it, but by letting it move as sensation.
  guided_practice: |
    Bring your attention to whatever emotion is present right now. You don't need to name it precisely. You might feel something heavy, or tight, or restless, or hollow. Whatever it is, locate it in your body. Where does this emotion live? It might be in your chest, your throat, your belly, your hands. Once you've found it, stay with the physical sensation. Not the story—the sensation. What is its temperature? Its weight? Its shape? Does it move or stay still? Breathe toward it. Not to change it—to accompany it. The breath is company, not instruction. Stay with the sensation for thirty seconds to a minute. If the emotion intensifies, that's the cycle moving. If it softens, that's the cycle moving too. If nothing seems to change, that's also valid—sometimes the emotion needs more time than one sitting can provide. Whatever happens, you're giving the cycle permission to proceed. The permission is the practice.
  aha_noticing: |
    Now, pause and notice what the emotion did when given space. You might notice that the sensation shifted—changed location, changed intensity, changed quality. Something that felt like pressure in the chest might now feel like warmth. Something that felt tight in the throat might have loosened. You might notice that your breathing changed, or that tears arrived, or that the emotion simply moved through without drama. The body processes emotion the way it processes anything physical—through movement and time. Whatever you notice in your chest, your belly, your jaw right now is the emotion at a different point in its cycle than where it started. The cycle is the body's natural resolution. You didn't force it. You let it happen.
  integration: |
    Now, before you move on, recognize that emotional completion doesn't require a long practice or a perfect environment. It requires a pause and a willingness to feel what's there without redirecting it. Thirty seconds of attention to the sensation—not the story—can move an emotion forward in its cycle. You practiced that just now. The next time you feel something stalling—a tightness that won't release, a heaviness that lingers—you can offer it the same attention. Locate it in the body. Breathe toward it. Let it move. That's enough. Let whatever remains settle at its own pace.
