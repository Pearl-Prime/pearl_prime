# Type: 09_embodied_intention_direction — Intention / orientation (integration).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 09_embodied_intention_direction
id: ex_embodied_intention_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 120
  modalities: [intention, orientation]
content:
  intro: |
    Direction doesn't always come from the mind. Sometimes the body knows before the thoughts arrive—a leaning toward something, a pulling away from something else, a quiet sense of what matters next. This practice isn't goal-setting. It's not about deciding what to do. It's about sensing what the body already knows about where you're oriented, and letting that sensing inform what comes next.
  guided_practice: |
    Sit for a moment with the question: What matters to me right now? Don't answer with your mind. Let the question land in your body. Notice where your attention goes. It might go to a relationship, a task, a feeling, a need. Whatever arrives, notice how your body responds to it. Is there a leaning forward? A settling back? A tightening? An opening? The body responds to what matters with physical signals—engagement produces a forward quality, avoidance produces a pulling back, overwhelm produces a bracing. None of these are wrong. They're information. Stay with whatever arrived for a few breaths. If multiple things compete for attention, notice which one produces the most physical response. Not the loudest thought—the strongest sensation. The body prioritizes differently than the mind. Let the body's priority sit with you for a moment without making it into a plan.
  aha_noticing: |
    Now, notice what your body told you. You might notice that one thing produced a subtle leaning or opening in the chest—a felt sense of importance that the mind might not have prioritized. You might notice tension in your shoulders around something you've been avoiding, or a softening in your belly around something you need. The body's sense of direction doesn't come with reasons or justifications. It comes with sensation. Whatever you noticed—the leaning, the opening, the tension, the breath changing around a particular thought—that's your body's compass reading. It may not match your to-do list. It often doesn't. The mismatch itself is useful information.
  integration: |
    Now, before you move on, recognize that this body-level sensing is available any time you face a choice, a direction, or a moment of uncertainty. You don't need to sit in stillness for minutes. You can ask the question—what matters right now?—and notice the body's first physical response in three seconds. The first response, before the mind edits it, often carries the most accurate information. Let your attention expand back to the room now. Carry whatever the body revealed—not as an assignment, but as a direction that's yours to follow or simply to notice.
approval:
  status: candidate
