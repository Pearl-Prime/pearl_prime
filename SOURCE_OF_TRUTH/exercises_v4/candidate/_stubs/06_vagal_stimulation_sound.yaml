# Type: 06_vagal_stimulation_sound — Sound / vibration (grounding).
# Authority: registry.yaml, exercise_yaml_helper.txt
exercise_type: 06_vagal_stimulation_sound
id: ex_vagal_sound_001
metadata:
  persona: any
  topic: any
  intensity: gentle
  duration_seconds: 120
  modalities: [sound, vibration]
content:
  intro: |
    Sound moves through the body differently than thought. A thought stays in the head. A sound—especially one you make yourself—vibrates through the throat, the chest, the bones. The vagus nerve runs from the brainstem through the throat and into the organs. When you use your voice, the vibration stimulates this nerve directly. This isn't about singing well or sounding good. It's about letting vibration reach places that thought can't access.
  guided_practice: |
    Close your mouth and hum a low, comfortable note. Not a melody—just a single, sustained tone. Feel where the vibration lands. It might be in your lips, your nose, your throat, your chest. Let the hum last for the full length of one exhale. When you run out of breath, inhale naturally and hum again. Three hums, each on a single exhale. On the second hum, place one hand on your chest. Feel the vibration through your hand. The vibration is traveling through tissue, through bone, through the vagus nerve that connects your throat to your heart to your gut. On the third hum, let the note be slightly lower. A lower pitch produces a deeper vibration. Feel it settle lower in the chest. When the third hum ends, sit in the silence that follows. The silence after vibration is different from the silence before it. The body is still resonating.
  aha_noticing: |
    Now, notice what the vibration left behind. You might notice that your throat feels more open, or that your chest has a warmth that wasn't there before. You might notice that your breathing is deeper, moving lower into the belly. The jaw may have softened. The shoulders may have settled. These are the vagus nerve's downstream effects—when stimulated through vibration, it sends calming signals to the heart, the lungs, the digestive system. You didn't think your way into this shift. The sound did it. The body responded to vibration the way it responds to any physical input—directly, without needing the mind's permission. Whatever you feel in your chest and throat right now, that's resonance still settling.
  integration: |
    Now, before you move on, notice that your voice is a regulation tool you carry everywhere. A quiet hum in the car. A low tone in the shower. Even a sigh with sound—an audible exhale—stimulates the same nerve pathway. You don't need silence or privacy to access this, though both help. The vibration works whether anyone hears it or not. Your body just demonstrated that. Let the resonance settle at its own pace, and carry the knowledge that sound is a doorway your nervous system already knows how to walk through.
approval:
