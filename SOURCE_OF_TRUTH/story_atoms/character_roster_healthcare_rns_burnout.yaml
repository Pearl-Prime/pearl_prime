    notes_for_writer: "Hale's engine is the OPPOSITE tell from Nora's checking-compulsion — hers is absence, not activation. Never let her feel or name an emotion in her own body (no 'numb', 'burned out', 'empty' as internal labels); dramatize the numbness only through flawless external performance with a void beneath, and through her PREFERRING the flatness (calling it competence, finding others' tears unprofessional). She is highly skilled and warm on the surface — the horror is that the skill is intact while the source is gone. The turning point must not restore feeling; it only lets her SEE the gap. The embodiment is a reach without a payoff — she stays four seconds, notices a real face, names 'this is a person' — nothing floods in, and that honesty (reaching without being rewarded by feeling) is the whole win. Keep her voice clinical, precise, a little too controlled; contrast that control against one small physical over-stay (hand lingering on cool metal) as the only crack."
