    signature_pattern: "Hypervigilance that cannot power down bleeds into the freeze branch: she runs a post-shift verification loop (walking rooms she already signed off, scrolling the census she no longer owns) until it locks her in place — engine running in the empty lot, unable to make the turn, not noticing time pass"
    signature_detail: "The handoff sheet she keeps redoing after giving it away; the room numbers (12, 14, 15) she loops; the unit census on her phone she counts beds she no longer owns; her car the last one under the lot lights"
    topic_tie: "burnout via hypervigilance-that-cannot-power-down collapsing into the freeze/numbness branch"
    arc_position_coverage:
      recognition: "story_atoms/healthcare_rns/anchored/burnout/overwhelm/recognition/micro/v01.txt"
      mechanism_proof: "story_atoms/healthcare_rns/anchored/burnout/overwhelm/mechanism_proof/micro/v01.txt"
      turning_point: "story_atoms/healthcare_rns/anchored/burnout/overwhelm/turning_point/micro/v01.txt"
      embodiment: "story_atoms/healthcare_rns/anchored/burnout/overwhelm/embodiment/micro/v01.txt"
    notes_for_writer: "Keep her distinct from Nora (financial_stress/overwhelm, same population): Nora's object is a phone/number and safety-checking; Priya's object is the FLOOR and other people's coverage — moral-injury depletion, not money. Never let her name a feeling; show the freeze as physical inertia (the turn she can't make, time she doesn't notice, the badge-out she can finally do on the first try). Her recovery is subtractive and un-triumphant — she leaves something on the floor rather than adding a coping act. 'It is not mine to carry out the door' is her private hinge line; do not soften into a slogan. The burnout signature is that the exhaustion survives the shift's end — the job is over and the vigilance keeps running."
  - id: junior
    name: Junior
    age: 24
    role: "New-grad RN, first year on a med-surg/telemetry floor with frequent codes"
