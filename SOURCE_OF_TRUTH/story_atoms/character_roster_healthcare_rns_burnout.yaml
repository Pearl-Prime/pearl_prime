    notes_for_writer: "Suz is the two-jobs-one-paycheck end of the healthcare_rns/burnout cell — a bedside RN with an educator/preceptor role stacked on for no extra pay, so her burnout is DOUBLE-ROLE depletion, not a single floor's exhaustion. Her engine is overwhelm on both branches at once: the can't-power-down hypervigilance of the always-due module + only-educator load, AND the numbness/freeze branch (moral injury) — she teaches and precepts competently while the felt sense is switched off. This is the exact hazard: 'you did not burn out, you were burned out' (see atoms/healthcare_rns/burnout INTEGRATION register). NEVER label emotion — no 'felt burned out/numb/exhausted/depleted'; the two 'feel' usages are load-bearing and physical: 'feels nothing under it' = the numb branch rendered as ABSENCE of sensation (immediately grounded in the hand-on-cold-countertop simile), and 'feels the floor under her feet' = literal proprioception, the embodiment ground. Keep her DISTINCT from the whole financial_stress cell (Nora/Dev/Renata/Marcus/Yesenia/Colleen/Amara/Thanh/Grace/Beau/Priyanka/Sam): NO money-scanning, NO bank app, NO shift-swap-as-budget, NO paycheck math — her stakes are the ROLE and the felt-sense cost, not a number. Also distinct from the burnout extended-block names Devon/Aiko/Kenji. Recurring signature objects to vary (never repeat verbatim): the single badge/lanyard for both jobs, the empty LMS objective field, the module due after the twelve, the answer that comes out clean with nothing under it, the copier/granola bar. The precepting is what she used to love — that loss IS the moral injury and must stay UNSAID by Suz as insight; render it only through body and behavior. Recognition and mechanism_proof carry NO insight (recognition ends on the un-noticed freeze; mechanism ends on 'means don't ask for more'). The insight-pivot belongs ONLY to turning_point (the veteran's reframe + the involuntary easing-off-the-gas, mirroring the Nora steering-wheel bar) and embodiment (saying the smaller true thing, 'let's look it up together,' leaving the lookup open). Embodiment must stay un-triumphant and unresolved — explicitly 'Nothing is fixed. The module is still due, the two jobs still one paycheck' — one reach met a single breath early, not a changed life. All atoms 60-95 words, 3rd-person present, topic unmistakable from sentence one."
