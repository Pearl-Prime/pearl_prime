    signature_detail: "Hands pushing wrist-over-wrist into the wheel on the drilled metronome beat (a hundred and ten a minute); the red temp light read as a rhythm; counting 'and-two-and-three' at red lights against the crosswalk timer 'like a code clock'; the engine-off garage sit (eleven minutes → one)."
    topic_tie: "burnout via hypervigilance that cannot power down — the code keeps running in his body after the shift, then flips to the freeze/numbness branch (can't cry, can't name what he did)"
    arc_position_coverage:
      recognition: "story_atoms/healthcare_rns/anchored/burnout/overwhelm/recognition/micro/v02.txt"
      mechanism_proof: "story_atoms/healthcare_rns/anchored/burnout/overwhelm/mechanism_proof/micro/v02.txt"
      turning_point: "story_atoms/healthcare_rns/anchored/burnout/overwhelm/turning_point/micro/v02.txt"
      embodiment: "story_atoms/healthcare_rns/anchored/burnout/overwhelm/embodiment/micro/v02.txt"
    notes_for_writer: "Junior is the newest voice in the burnout/overwhelm cell — pair him against a depleted veteran for contrast (his overwhelm is hypervigilant RE-RUNNING; a veteran's is flat moral injury). NEVER let him cry as catharsis — the mechanism_proof point is that he has lost access to it (freeze branch). The embodiment shift is NAMING the patient as a person (Mr. Adigwe, 73, 'I did everything right and he still died') instead of numbering the room — that is the whole move; keep it un-triumphant (he is 'not okay,' sits one minute not eleven). Distinct from Nora (banking-app refresh compulsion) and Carmen/the watcher (self-surveillance logger): Junior's engine is the somatic code-replay, the hands and the count. Keep his diction plain and young; he under-reports ('he's fine,' 'decompressing,' 'tells no one')."
