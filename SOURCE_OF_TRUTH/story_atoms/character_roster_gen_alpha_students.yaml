# Authority: story_atom_tier_templates.yaml
#
# PURPOSE: Naming pool for the Wave-1 CHARACTER_STUDY_UNNAMED individuation pass
# (docs/HIGH_IMPACT_STORY_ATOM_UPGRADE_RUBRIC.md rubric; phoenix_v4/quality/story_atom_lint.py
# CHARACTER_STUDY_UNNAMED check). Precedent: PR #4602 (gen_z_professionals/anxiety +
# working_parents/anxiety), extended here to gen_alpha_students across all 16 STORY pools.
#
# Demographic: Gen Alpha students (born ~2010+; school-age, upper-elementary through
# high-school framing per this pool's existing "school pressure" / "group chat" /
# "screen time" vocabulary) — a DISTINCT, notably younger naming convention from
# entrepreneurs (see character_roster_entrepreneurs.yaml). Names below are drawn from
# common 2010s-2020s US birth-name data (short, contemporary, generation-appropriate —
# e.g. Aiden/Nova/Kai rather than founder-generation names like Marcus/Elena), gender-
# balanced, and reused across the 16 topic pools.
#
# CONTINUITY RULE: within one pool, the same name is reused across same-arc-progression
# variants only when the block is a direct continuation of the same character (rare in
# this flat v01-v20 STORY format — most v-slots are independent vignettes and get
# distinct names). Gender-matched to each block's pronouns.
#
# NOTE: a handful of template blocks (inherited from the shared 20-variant STORY
# skeleton — see docs/PEARL_ARCHITECT_STATE.md PR #178 lineage) carry adult-coded scene
# furniture ("his daughter asked why his hands shook at dinner") left over from the
# adult-persona template this skeleton was cloned from. Per mission scope (minimal edit:
# name + one light individuating detail; preserve scene/stakes/metadata verbatim), these
# are named but NOT rewritten in this pass — the scene-furniture mismatch is a separate,
# larger authoring gap tracked outside this individuation task.

