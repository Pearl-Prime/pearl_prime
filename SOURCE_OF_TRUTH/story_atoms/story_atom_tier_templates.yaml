# Story Atom Tier Templates
# Authority: specs/PHOENIX_V4_5_WRITER_SPEC.md §4.3 + GOLDEN_PHOENIX_ATOM_UPGRADE_GUIDE.md
# Purpose: 5 structural templates for story atom generation. Less writing, more variety.
#
# KEY RULES (from user + writer spec):
#  1. Stories are 3rd-person present tense. Named character.
#  2. Every story MUST tie clearly to the topic. Reader must know what topic they're in.
#  3. Stories must include SPECIFIC triggering details the reader recognizes and feels.
#     WRONG: "Tom had an argument and felt bad."
#     RIGHT: "Tom's manager moved the deadline forward two weeks with no explanation.
#             Tom said 'understood' in the Slack thread and spent the next hour staring
#             at the project board without touching it."
#  4. No emotion labels ("felt anxious", "felt overwhelmed"). Show it. Don't name it.
#  5. No resolution. End in the stuck moment or the cost.
#  6. Emotional intensity band required: 1=mild discomfort, 2=tension, 3=strain, 4=breaking, 5=crisis
#
# SHARING: Embodiment atoms CAN be shared across books if the character + situation
# are different enough. Recognition atoms are most specific to topic/phase — don't share.
# Turning_point atoms are semi-portable: same mechanism, different character names.
#
# TIER DESIGN PRINCIPLE: Each tier varies STRUCTURE (what the story focuses on),
# not just word choice. A character can appear in multiple tiers across their arc.
#
# HOW TO USE WITH PEARL_WRITER:
#  1. Pick a tier
#  2. Pick a character from character_roster.yaml
#  3. Fill [SLOTS] with topic-specific details from the fills table for that topic
#  4. Pearl_Writer writes a 80-150 word atom following the structure + fills
#  5. Validate: does the reader know what topic they're in? Is the trigger specific?

meta:
  version: "1.0"
  topics_covered: [anxiety, burnout, grief, social_anxiety, imposter_syndrome]
  arc_positions: [recognition, mechanism_proof, turning_point, embodiment]
  engine_examples: [overwhelm, shame, spiral, comparison, false_alarm]

# ─────────────────────────────────────────────────────────────────────────────
# THE 5 TIERS
# ─────────────────────────────────────────────────────────────────────────────

tiers:

  # ── TIER A: THE INBOX MOMENT ──────────────────────────────────────────────
  # Digital signal arrives. Character delays or avoids. Body holds it.
  # Best arc positions: recognition, mechanism_proof
  # Best for: anxiety (workplace), overwhelm, false_alarm
  # Length: 60-100 words
  # Structure: [TRIGGER_ARRIVES] → [DELAY_OR_AVOIDANCE] → [BODY_SIGNAL] → [STUCK]

  - tier_id: A
    tier_name: "The Inbox Moment"
    arc_positions_best: [recognition, mechanism_proof]
    engines_best: [overwhelm, false_alarm, spiral]
    length_range: [60, 100]
    emotional_intensity_range: [1, 3]
    structure: |
      [CHARACTER] receives [SPECIFIC_DIGITAL_TRIGGER].
      [DELAY_BEHAVIOR: what they do instead of responding].
      [BODY_SIGNAL: physical, no emotion labels].
      [STUCK: they have not responded / the thing is still there].
    example_anxiety_overwhelm_recognition:
      character: Priya
      text: |
        Priya's manager sends a Slack at 9:47pm. The preview says "quick question."
        She reads it and puts her phone face-down. She picks it up twice before midnight
        to check if anyone else responded to the thread. No one has. The message is
        still unread. She will read it in the morning. She has decided this three times.
      emotional_intensity_band: 2
      topic_tie: overwhelm via digital availability signal, can't stop checking
    variation_fills:
      anxiety:
        SPECIFIC_DIGITAL_TRIGGER:
          - "Slack message from her manager at 9:47pm that says 'quick question'"
          - "calendar invite with no subject line, 4pm Thursday, attendees: him, his manager, and HR"
          - "email with 'follow-up' in the subject line from a thread she thought was closed"
          - "group channel goes quiet for four hours after her post"
          - "peer's promotion announcement in the #wins channel"
          - "performance review form opens in her email with a due date of Friday"
          - "her name is CC'd on a thread she did not start and cannot tell why"
        DELAY_BEHAVIOR:
          - "She reads it and puts her phone face-down"
          - "He closes the tab and opens it again three times without replying"
          - "She marks it unread so it feels like something she hasn't done yet"
          - "He opens a different application to avoid looking at it"
        BODY_SIGNAL:
          - "Her jaw is still carrying it an hour later"
          - "His shoulders are two inches higher than they were before the notification"
          - "She is aware of her hands but cannot tell you what they are doing"
          - "Something in his chest has been waiting since the preview appeared"
        STUCK:
          - "The message is still there. She has decided to read it in the morning four times."
          - "He has not replied. The cursor is in the text box."
          - "She refreshes every twelve minutes without meaning to."

  # ── TIER B: THE PERFORMANCE LOOP ─────────────────────────────────────────
  # Character does something → checks for validation → doesn't get it → repeats.
  # Shows the mechanism through compulsive behavior, not feelings.
  # Best arc positions: mechanism_proof, recognition (deeper band)
  # Best for: anxiety, imposter_syndrome, overwhelm
  # Length: 80-130 words
  # Structure: [ACTION] → [SUBMIT/SEND/DO] → [CHECK_FOR_SIGNAL] → [REPEAT]

  - tier_id: B
    tier_name: "The Performance Loop"
    arc_positions_best: [mechanism_proof, recognition]
    engines_best: [overwhelm, shame, comparison]
    length_range: [80, 130]
    emotional_intensity_range: [2, 4]
    structure: |
      [CHARACTER] [COMPLETES_TASK: work product or action they've put care into].
      [SUBMIT: sends it / does the thing].
      [CHECK_SEQUENCE: checks for validation signal, none comes].
      [REPEAT: same check, different form].
      [ESCALATION: starts reviewing their own work for what's wrong].
    example_anxiety_overwhelm_mechanism_proof:
      character: Marcus
      text: |
        Marcus submits the deck at 6:04am, before anyone is in the office.
        He refreshes his email twice in the next half hour. By 10am he opens
        the file to look for what he might have missed. The slide with his forecast
        numbers has a decimal point he is now unsure about. He did not need to know
        this at 10am. He checks the source data. The decimal is correct. He closes
        the file and opens it again forty minutes later.
      emotional_intensity_band: 3
      topic_tie: overwhelm via hypervigilance loop, performance anxiety mechanism
    variation_fills:
      anxiety:
        COMPLETES_TASK:
          - "submits the deck at 6am before anyone is in the office"
          - "sends the project update at 11:47pm with three attachments"
          - "puts in the request for PTO coverage before the team meeting"
          - "responds to every action item in the thread within the hour"
          - "completes the self-evaluation section of her performance review"
        CHECK_SEQUENCE:
          - "refreshes email twice in the next thirty minutes, then three more times by noon"
          - "opens the sent folder to confirm it went through"
          - "checks if anyone has opened the shared doc using the activity panel"
          - "looks at the Slack thread to see if the typing indicator appears"
        ESCALATION:
          - "opens the file to check if she missed something"
          - "re-reads the email he sent looking for the thing that will get him in trouble"
          - "reads the self-evaluation again and changes a word that was fine"

  # ── TIER C: THE SOCIAL COST ───────────────────────────────────────────────
  # Character withholds something (opinion, need, boundary) → visible social cost.
  # Includes the "misfire_tax": something different happens because of the anxiety.
  # Best arc positions: mechanism_proof, turning_point
  # Best for: anxiety, social_anxiety, shame, spiral
  # Length: 100-150 words
  # Structure: [SETUP: situation where something is asked or available] →
  #            [WITHHOLD: character doesn't say/do the real thing] →
  #            [VISIBLE_COST: specific social consequence, not internal] →
  #            [AFTERMATH: no resolution, character notes the gap]

  - tier_id: C
    tier_name: "The Social Cost"
    arc_positions_best: [mechanism_proof, turning_point]
    engines_best: [spiral, shame, comparison, overwhelm]
    length_range: [100, 150]
    emotional_intensity_range: [2, 4]
    structure: |
      [SETUP: the situation and what was available to do].
      [WITHHOLD: what the character did not say or do, with specific reason].
      [VISIBLE_COST: what the room did or didn't do because of the withhold].
      [AFTERMATH: character is alone with the gap, no resolution].
    example_anxiety_spiral_mechanism_proof:
      character: Aisha
      text: |
        The director asks if anyone has concerns about the timeline. Aisha has three.
        She has written them down in her notebook, with estimated risks and dates.
        She does not raise her hand. The director closes the laptop and says "great,
        we're aligned." Aisha's notebook is open to the page with the concerns. The
        meeting ends. She sends a follow-up email with one of the three concerns,
        reworded as a question. The director replies: "Good flag. We'll monitor."
        The other two concerns are still in the notebook. They were the larger ones.
      emotional_intensity_band: 3
      topic_tie: anxiety via spiral — withheld voice, visible cost, self-erasure mechanism
      misfire_tax: true
    variation_fills:
      anxiety:
        WITHHOLD:
          - "does not raise her hand when the director asks for concerns"
          - "says 'sounds good' when his manager changes the scope without explaining why"
          - "does not push back on the deadline, though she knows it is not feasible"
          - "smiles and says 'of course' when asked to take on the extra deliverable"
          - "agrees to be on the 7am call from a different time zone without saying it costs her"
        VISIBLE_COST:
          - "the meeting ends. The concern is still in her notebook."
          - "the project launches with the gap she saw. She is the one who flags it afterward."
          - "she gets the credit for adapting but not the recognition for knowing in advance"
          - "the team celebrates. She went home early because there was nothing left to say."

  # ── TIER D: THE QUIET PORTRAIT ────────────────────────────────────────────
  # No dramatic moment. Environmental detail reveals everything.
  # "Show me the room and I'll tell you the person."
  # Best arc positions: recognition, embodiment
  # Best for: any engine. Most shareable across books.
  # Length: 80-120 words
  # Structure: [OBJECT_OR_ENVIRONMENT] → [WHAT_REMAINS_UNDONE] →
  #            [CONTRAST_WITH_EXPECTATION] → [CHARACTER_IN_IT]

  - tier_id: D
    tier_name: "The Quiet Portrait"
    arc_positions_best: [recognition, embodiment]
    engines_best: [overwhelm, watcher, grief, false_alarm]
    length_range: [80, 120]
    emotional_intensity_range: [1, 2]
    structure: |
      [ENVIRONMENT: specific objects in character's space, not "cluttered desk" but specific items].
      [WHAT_REMAINS_UNDONE: something that has been waiting too long].
      [CONTRAST: what someone without anxiety would have done already].
      [CHARACTER: where are they in it, what are they not doing].
    example_anxiety_overwhelm_recognition:
      character: Jordan
      text: |
        Jordan's laptop has seventeen browser tabs open. Three of them are the same article
        about burnout that she opened in different weeks. The article is about recognizing
        when you need rest. She has not read past the third paragraph on any of the three
        occasions she opened it. Her water bottle from Tuesday is on the desk. It is still
        full. She keeps meaning to refill it after she finishes the thing she is currently
        working on.
      emotional_intensity_band: 1
      topic_tie: overwhelm via environmental self-neglect signal, burnout adjacent
    variation_fills:
      anxiety:
        ENVIRONMENT:
          - "seventeen browser tabs, three of them the same burnout article opened in different weeks"
          - "four half-written draft emails in the folder she uses as a to-do list"
          - "the same Spotify playlist on repeat for four days because she hasn't had the bandwidth to change it"
          - "her lunch from Tuesday still in the work fridge with her name on the bag"
          - "three notebooks with different versions of the same priority list, none of them finished"
        WHAT_REMAINS_UNDONE:
          - "she has not read past the third paragraph on any of the three times she opened it"
          - "the draft has been sitting there since last Wednesday"
          - "the voicemail from her doctor has been marked as 'to call back' for eleven days"
        CONTRAST:
          - "people who sleep well do not open the same article three times"
          - "she knows this is not what it looks like from the outside"

  # ── TIER E: THE DIALOGUE GAP ─────────────────────────────────────────────
  # Short exchange. What's said vs what's felt. Never_know ending optional.
  # Best arc positions: turning_point, mechanism_proof, embodiment
  # Best for: social_anxiety, spiral, overwhelm (relational version)
  # Length: 80-120 words (dialogue + aftermath beats)
  # Structure: [CONTEXT: who and where] → [EXCHANGE: 2-4 lines of dialogue] →
  #            [GAP: character's internal vs external] → [AFTERMATH: alone with it]

  - tier_id: E
    tier_name: "The Dialogue Gap"
    arc_positions_best: [turning_point, mechanism_proof]
    engines_best: [spiral, comparison, shame]
    length_range: [80, 120]
    emotional_intensity_range: [2, 4]
    structure: |
      [CONTEXT: physical location, who is there, what the situation is].
      [DIALOGUE: short exchange, 2-4 lines. TTS-friendly. One action per speaker].
      [GAP: specific detail of what character said vs what was true].
      [AFTERMATH: the room after, alone with the cost].
    example_anxiety_spiral_turning_point:
      character: Maya
      text: |
        "How's everything going?" her manager asks. The door to his office is open.
        "Really good," Maya says. "Busy but good."
        Her manager nods and looks back at his screen.
        Maya has not started the report due Thursday. She has opened the document
        four times. She closes it when the introduction paragraph feels impossible.
        She walks back to her desk. The hallway is long enough that she has time
        to decide she will start it after lunch. She decides this at 2pm again.
        She does not write the introduction.
      emotional_intensity_band: 3
      topic_tie: anxiety via performance spiral, avoidance mechanism shown through specific behavior
      never_know: true
    variation_fills:
      anxiety:
        CONTEXT:
          - "hallway outside his manager's office, door open"
          - "kitchen, two people getting coffee at the same time"
          - "end of a video call, the screen is about to go blank"
          - "standup, thirty seconds after she gives her update"
        EXCHANGE_TOPICS:
          - "'How's it going?' / 'Really good. Busy but good.'"
          - "'Need anything from me?' / 'No, I'm good. I'll flag if anything comes up.'"
          - "'You seem a little quiet today.' / 'Just focused.'"
          - "'Are you okay with the new timeline?' / 'Totally fine.'"
        GAP:
          - "she has not started the report. the document has been open and closed four times."
          - "he has flagged nothing. the list of things he has not flagged is three items long."
          - "she is not focused. she has been in the same paragraph for forty minutes."

# ─────────────────────────────────────────────────────────────────────────────
# TOPIC-SPECIFIC TRIGGER BANKS
# ─────────────────────────────────────────────────────────────────────────────
# What makes the topic VISIBLE in the story. If you can't tell which topic
# this story is for, it fails. Use these fills to make it unmistakable.

topic_trigger_banks:

  anxiety:
    arc_recognition:
      - "Slack message from manager at 9pm: 'quick question'"
      - "calendar invite with no subject line, 4pm Thursday"
      - "group channel quiet after her post for four hours"
      - "performance review uses 'meeting expectations' instead of 'strong'"
      - "deadline moved forward two weeks with no explanation in the Slack message"
      - "peer promoted to the same level she was told was 'next year' for her"
      - "her name missing from the email thread it should be on"
      - "standup question she didn't have an answer to and improvised"
      - "the 1:1 got rescheduled with no explanation, third time in six weeks"
    arc_mechanism_proof:
      - "refreshes email every twelve minutes without deciding to"
      - "rewrites the same email draft four times before sending the first version"
      - "arrives thirty minutes early so she is never the last person in the room"
      - "says yes to every request in the week before her review"
      - "checks whether the shared doc has been opened using the activity panel"
      - "leaves a message unread so it still counts as something she hasn't dealt with"
      - "turns his camera off in a meeting he has attended a hundred times"
      - "preemptively apologizes in the email subject line"
    arc_turning_point:
      - "therapist asks her to notice when she stops breathing"
      - "a friend says 'you don't have to explain why you need a day off'"
      - "reads something that names what she's been doing for three years"
      - "cancels plans and does not feel guilty, just tired"
      - "says 'I'm not available for that' and the world does not end"
      - "tells someone the real number when they ask how she's doing"
    arc_embodiment:
      - "checks Slack and puts the phone down without refreshing"
      - "sends the email on the first draft"
      - "says 'I have bandwidth questions about this' in the meeting"
      - "takes a sick day without drafting a coverage plan first"
      - "does not rehearse the conversation before it happens"
      - "the Sunday anxiety has a different shape this week — still there, less loud"

  burnout:
    arc_recognition:
      - "hasn't taken a real day off in four months and doesn't think of it as unusual"
      - "her vacation days are accruing because she doesn't know what she'd do with them"
      - "optimizes his commute playlist because it's the only time he has control"
      - "the project that used to feel meaningful now just feels like tasks to close"
    arc_mechanism_proof:
      - "works through lunch because stopping would mean acknowledging how far behind she is"
      - "the excitement about the promotion lasted three weeks"
      - "books the vacation, cancels it, books it again — it's been eight months"
      - "answers messages from bed without acknowledging that's what he's doing"
    arc_turning_point:
      - "gets sick. actually sick. and can't perform recovery."
      - "someone younger on the team asks how she keeps everything moving and she doesn't know what to say"
      - "skips the offsite and nothing falls apart, and that's somehow worse to think about"
    arc_embodiment:
      - "blocks two hours on her calendar and doesn't fill them"
      - "leaves at 5:30 and doesn't check messages until morning, five times in a row"
      - "asks for help without packaging it as a collaboration opportunity"

  imposter_syndrome:
    arc_recognition:
      - "her title says Senior. She looks it up again to make sure that's what it says."
      - "gets credit for the project and spends the next hour waiting to be found out"
      - "reads his own performance review looking for what they really meant"
      - "prepares for a meeting with seven times the material she'll actually use"
    arc_mechanism_proof:
      - "knows more than the person presenting but asks a clarifying question instead of correcting"
      - "attributes the win to luck in the debrief"
      - "overprepares so that if she fails, at least no one can say she didn't try"
      - "adds qualifiers to every opinion — 'I might be wrong, but...', 'Just my perspective...'"
    arc_turning_point:
      - "younger colleague makes the same mistake she still feels guilty about from two years ago — and nothing happened"
      - "mentor tells her she was chosen, not placed"
      - "admits she doesn't know something and the room does not change"
    arc_embodiment:
      - "sends the proposal without a second round of edits"
      - "says 'I know this' in a meeting without the hedge"
      - "takes the credit without explaining why it happened to work out"

# ─────────────────────────────────────────────────────────────────────────────
# SHARED EMBODIMENT GUIDANCE
# ─────────────────────────────────────────────────────────────────────────────
# Embodiment atoms are the most shareable across books because they show
# RESOLUTION PATTERNS, not anxiety triggers. A reader in book 1 and book 500
# can both encounter "Priya sends the email on the first draft" without
# it feeling repetitive — the character is different, the pattern is the same.
#
# Sharing is OK when:
#  - Different character name
#  - Different specific action (don't reuse "sends the email on the first draft" twice)
#  - Same general resolution pattern is fine (putting phone down, not over-explaining, etc.)
#
# Sharing is NOT OK when:
#  - Same character name in same reader's book
#  - Same micro-stake + same outcome
#  - Same opening sentence structure in same book

shared_embodiment_patterns:
  - "character does the thing without the preparation ritual"
  - "character says the real answer instead of the managed one"
  - "character allows the discomfort without trying to make it go away"
  - "character notices the old pattern and does not follow it"
  - "character sets the limit and it costs less than expected"

# ─────────────────────────────────────────────────────────────────────────────
# GENERATION INSTRUCTIONS FOR PEARL_WRITER
# ─────────────────────────────────────────────────────────────────────────────
pearl_writer_instructions:
  voice: "specs/PHOENIX_V4_5_WRITER_SPEC.md §4.3 STORY section"
  tts_rules:
    - "Third-person present tense throughout"
    - "No emotion labels: not 'felt anxious', 'felt overwhelmed', 'felt bad'"
    - "Max 15 words per sentence in emotional beats"
    - "Use dialogue for volatile/cost moments (Tier E)"
    - "One action per sentence"
    - "Paragraph breaks every 50-70 words"
  specificity_rules:
    - "Topic must be unmistakable from the first sentence. Reader must know what topic they're in."
    - "Trigger must be specific: not 'a stressful email' but 'manager Slack at 9pm: quick question'"
    - "Body signal must be physical, not emotional: not 'felt tense' but 'jaw is still carrying it'"
    - "Include at least one object/artifact specific to the persona's environment"
    - "Character's compulsive behavior must be described precisely, not summarized"
  length: "80-150 words per atom. Micro-atoms (50-80w) acceptable for recognition/hook only."
  required_metadata:
    - emotional_intensity_band: "integer 1-5"
    - arc_position: "recognition|mechanism_proof|turning_point|embodiment"
    - tier: "A|B|C|D|E"
    - topic: "anxiety|burnout|imposter_syndrome|etc."
    - engine: "overwhelm|shame|spiral|etc."
    - persona: "gen_z_professionals|etc."
    - character: "character name"
    - misfire_tax: "true if there is a visible social consequence"
    - never_know: "true if ending is unresolved/ambiguous"
