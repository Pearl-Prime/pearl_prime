# Character Roster — story_atoms generation
# Persona: millennial_women_professionals / Topic: anxiety
# Authority: story_atom_tier_templates.yaml
#
# PURPOSE: Per-character profiles authored to match the engine bank's existing
# canonical characters at atoms/millennial_women_professionals/anxiety/overwhelm/CANONICAL.txt.
# This enables build_story_schedule (phoenix_v4/planning/story_planner.py:353) to thread
# the SAME named character through sec 2 (recognition) → sec 5 (mechanism_proof) →
# sec 9 (turning_point) within each chapter (CALLBACK_ID continuity).
#
# Phase 1 of 14-persona Move 5 rolling enhancement; engine bank already delivers named
# characters at sec 2/5/9 today via PR #670 (registry_resolver engine-bank-first selection),
# but selection is seeded-pseudorandom so different characters may appear at sec 2 vs 5 vs 9.
# story_atoms/anchored adds the through-book continuity layer.

version: "1.0"
topic: anxiety
persona: millennial_women_professionals
engine: overwhelm  # primary engine; characters can have atoms for other engines too

characters:

  - id: carmen
    name: Carmen
    age: 34
    role: "strategy consultant / framework designer at a mid-size firm"
    location: "Chicago"
    signature_trigger: "ships polished frameworks into the team channel; refreshes for reactions that don't come"
    signature_pattern: "designs the operating model, watches a colleague present it; the credit lands elsewhere"
    signature_detail: "framework dropped at 6:42pm Thursday; one director thumbs-up by 8pm; nothing else"
    topic_tie: "overwhelm via invisibility-tax — competence ships, recognition doesn't; the body knows the gap"
    arc_position_coverage:
      recognition: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/recognition/micro/v01.txt"
      mechanism_proof: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/mechanism_proof/micro/v01.txt"
      turning_point: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/turning_point/micro/v01.txt"
      embodiment: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/embodiment/micro/v01.txt"
    turning_point_brief: |
      Carmen's turning_point: she books fifteen minutes with her boss and says "I designed the
      framework — I want my name on the next deck." She doesn't apologize for asking. The boss
      agrees. The shoulders drop. Not resolution — just one small visible action she didn't
      make herself earn first.
    notes_for_writer: "Carmen's anxiety is identity-cost shaped — work that gets adopted without naming her. Body: stomach drops a half-inch, hands cold, chest tight. Avoid 'felt invisible'; show the colleague's name on the deck instead."

  - id: elena
    name: Elena
    age: 41
    role: "HR director at a healthcare org; mother of two teenagers"
    location: "Boston"
    signature_trigger: "her daughter texts mid-Q3-call; she nods through slides she won't remember"
    signature_pattern: "fragments attention across work + home until neither is fully present"
    signature_detail: "band-trip permission form text mid-staffing-review; types 'love you' in 11 seconds"
    topic_tie: "overwhelm via divided-attention — two perfections that can't coexist; the throat knows"
    arc_position_coverage:
      recognition: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/recognition/micro/v02.txt"
      mechanism_proof: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/mechanism_proof/micro/v02.txt"
      turning_point: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/turning_point/micro/v02.txt"
      embodiment: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/embodiment/micro/v02.txt"
    turning_point_brief: |
      Elena's turning_point: blocks "core hours 9-3" on the calendar; doesn't reply to a 4pm
      non-urgent ping until 9:04 the next morning. The team adapts. She picks her daughter up
      at 3:42. The afternoon feels long again. Not fixed — just visible.
    notes_for_writer: "Elena's anxiety is divided-attention shaped. Body: hands cold, shoulders tense, throat closes a quarter inch. Show the daughter's text + the staffing slide in the same breath, not as competing internal monologue."

  - id: sarah
    name: Sarah
    age: 32
    role: "operations lead promoted to senior director; manages three reports"
    location: "Austin"
    signature_trigger: "auto-yes to the Friday-deck favor before reading the second paragraph"
    signature_pattern: "promotion multiplies expectations without removing tactical work; she delivers anyway"
    signature_detail: "Senior Director announcement lists no removals; she still owns the budget she owned before"
    topic_tie: "overwhelm via chronic overcommit — drowning while delivering; the chest knows it first"
    arc_position_coverage:
      recognition: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/recognition/micro/v03.txt"
      mechanism_proof: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/mechanism_proof/micro/v03.txt"
      turning_point: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/turning_point/micro/v03.txt"
      embodiment: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/embodiment/micro/v03.txt"
    turning_point_brief: |
      Sarah's turning_point: declines a "pick-your-brain coffee" by quoting $400/hour and a
      four-week wait. The asker balks. She doesn't soften it. Sends a Monday email handing four
      projects to her three reports. Eats a sandwich at the counter without checking her phone.
    notes_for_writer: "Sarah's anxiety is social-cost shaped — saying yes faster than reading. Body: chest tightens, shoulders hunch forward, throat closes, hands cold. Show the Slack auto-yes BEFORE the second paragraph; the cost arrives later."

  - id: mia
    name: Mia
    age: 29
    role: "product engineer / informal product owner; builds features she isn't credited for"
    location: "Seattle"
    signature_trigger: "launch announcement lists four names — not hers; the calendar is color-coded for everything but authorship"
    signature_pattern: "designs features, writes specs, ships code; the launch retro thanks every function except product"
    signature_detail: "color-coded calendar (blue/green/red) for products, meetings about products, meetings about the meetings"
    topic_tie: "overwhelm via invisible authorship — the work ships, the name doesn't; the jaw knows"
    arc_position_coverage:
      recognition: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/recognition/micro/v04.txt"
      mechanism_proof: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/mechanism_proof/micro/v04.txt"
      turning_point: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/turning_point/micro/v04.txt"
      embodiment: "story_atoms/millennial_women_professionals/anchored/anxiety/overwhelm/embodiment/micro/v04.txt"
    turning_point_brief: |
      Mia's turning_point: sends a one-page authorship memo Sunday night documenting who designed
      what. Public follow-up by 1pm Monday. At the second-feature launch event, she runs the demo
      herself and doesn't refresh her email at the snack table.
    notes_for_writer: "Mia's anxiety is invisible-authorship shaped. Body: stomach twists, jaw clenches, chest tight, hands feel separate. Show the calendar color codes + the launch announcement that names every function except product."

