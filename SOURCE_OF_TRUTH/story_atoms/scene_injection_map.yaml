# Scene Injection Map
# Where [SCENE_INJECTION_POINT] and [INTEGRATION_SCENE_POINT] go in the chapter template
#
# DISTINCTION (critical):
#   STORY  = 3rd-person, named character, reader watches someone else, identifies with them
#   SCENE  = 2nd-person "you", reader IS the person, no name, pure situational recognition
#
# Example STORY: "Priya's manager sends a Slack at 9:47pm. She reads it and puts her phone face-down."
# Example SCENE: "You opened the message, read it twice, and closed it. Your jaw is still tight."
#
# Both show the same anxiety. STORY creates narrative distance + identification.
# SCENE removes distance entirely — "that's me right now."

injection_markers:
  SCENE_INJECTION_POINT:
    resolves_to: "2nd-person recognition scene from anxiety_genz_scene_recognition_bank.yaml"
    length: "20-50 words"
    person: "second-person present"
    purpose: "reader sees themselves in the situation — no teaching, no character, just recognition"
    when_to_use:
      - "Beginning of sec1 (HOOK) — orients reader into the emotional world before the template hook"
      - "Beginning of any SCENE slot — primes body recognition before the named-character story"
      - "Beginning of REFLECTION slots — grounds reader in their experience before the mechanism explanation"

  INTEGRATION_SCENE_POINT:
    resolves_to: "neutral body anchor from global_scene_anchor_bank.yaml"
    length: "15-35 words"
    person: "third-person situational (impersonal — 'the bag strap slides')"
    purpose: "post-exercise integration moment — brief sensory pause after the exercise, before continuation"
    when_to_use:
      - "Immediately AFTER sec4 (EXERCISE) content — the body anchor after the practice"
      - "Immediately AFTER sec8 (EXERCISE) content — same placement in the second exercise"
      - "The integration_scene_point helps the reader land before the section continues"

# ─── CHAPTER STRUCTURE WITH INJECTION POINTS ────────────────────────────────
# Standard 10-slot chapter structure showing where injections go.
# Markers can be added directly to template YAML text.

chapter_injection_plan:
  sec1_HOOK:
    template_injection: "[SCENE_INJECTION_POINT]"
    placement: "before the template hook text"
    effect: "reader is in the body experience before the hook lands"
    example: |
      [SCENE_INJECTION_POINT]

      Everything any book has ever told you about this was a lie. Not because
      the books were wrong. Because you weren't ready to hear it yet.

  sec2_SCENE:
    template_injection: none  # sec2 already gets [STORY_INJECTION_POINT] from template
    note: "STORY injection handles sec2. No additional scene needed."

  sec3_REFLECTION:
    template_injection: "[SCENE_INJECTION_POINT]"
    placement: "before the reflection text, as a brief grounding moment"
    effect: "anchors reader before the mechanism explanation"

  sec4_EXERCISE:
    template_injection: "[INTEGRATION_SCENE_POINT]"
    placement: "AFTER the exercise block — the brief pause before moving on"
    effect: "gives the body a moment to land after the practice"
    example: |
      [EXERCISE_INJECTION_POINT]

      [INTEGRATION_SCENE_POINT]

      The next thing you bring to this isn't certainty. It's just the next breath.

  sec5_SCENE:
    template_injection: none  # sec5 gets [STORY_INJECTION_POINT]

  sec6_TEACHERDOCTRINE:
    template_injection: none  # teacher's voice — no scene overlay

  sec7_REFLECTION:
    template_injection: "[SCENE_INJECTION_POINT]"
    placement: "before the reflection — second grounding beat of the chapter"

  sec8_EXERCISE:
    template_injection: "[INTEGRATION_SCENE_POINT]"
    placement: "AFTER the exercise block — integration pause before sec9"
    example: |
      [EXERCISE_INJECTION_POINT]

      [INTEGRATION_SCENE_POINT]

  sec9_SCENE:
    template_injection: none  # sec9 gets [STORY_INJECTION_POINT] with embodiment arc

  sec10_INTEGRATION:
    template_injection: none  # TAKEAWAY handles this via compression atom

# ─── FOR 1,000 BOOKS ────────────────────────────────────────────────────────
# Scene banks scale because:
#   1. anxiety_genz_scene_recognition_bank.yaml — currently ~40 variants, can expand to 200+
#   2. global_scene_anchor_bank.yaml — 24 neutral anchors, topic-agnostic, reuse is OK
#   3. SCENE atoms are short (20-50 words) — Pearl_Writer can generate 10 per session
#   4. Variant selection is seed-based and deterministic — same reader always gets same scene
#      in their book, different reader with different seed gets different scene
#
# Story atoms need MORE work for 1,000 books:
#   - Target: 20 characters × 4 arc positions × 5 tiers = 400 total story atoms
#   - Shared embodiment OK across books (different character, same pattern)
#   - Recognition atoms are most topic-specific — DO NOT share across topics
#   - Turning_point atoms semi-portable — same mechanism, different character OK
#
# Generation priority (from character_roster.yaml coverage summary):
#   1. Write missing arc positions for Priya, Marcus, Maya, Aisha, Jordan
#      (these 5 characters + 3-4 arc positions each = ~15 atoms to write)
#   2. Write all 4 arc positions for Tariq, Nadia, Zoë, Chris, Leo, Amara, Zara, Suki, Marco
#      (9 characters × 4 arc positions = 36 atoms)
#   3. Expand to 5 tiers per arc position × top 10 characters = 200 atoms
#   4. Add new topic (burnout, grief) with its own scene bank + character roster
