# Character Roster — story_atoms generation
# Persona: corporate_managers / Topic: cross-topic (anchored, anxiety, boundaries,
# burnout, compassion_fatigue, courage, depression, financial_anxiety,
# financial_stress, grief, imposter_syndrome, overthinking, self_worth,
# sleep_anxiety, social_anxiety, somatic_healing)
# Authority: story_atom_tier_templates.yaml
#
# PURPOSE: Naming roster for the Wave-1 CHARACTER_STUDY_UNNAMED individuation pass
# (phoenix_v4/quality/story_atom_lint.py). corporate_managers/{topic}/STORY/CANONICAL.txt
# is a fixed 20-block (23 for burnout) template shared verbatim across all 16 topics
# (only the workplace-noun substitutions differ: quarterly review, KPI, stakeholders,
# deliverable, direct reports, slide deck, inbox, calendar). Each topic file gets the
# SAME name-per-slot mapping below, so a given version number (v01, v02, ...) carries
# the same character across every topic in this persona — consistent with the
# gen_z_professionals / working_parents precedent (PR #4602) where names are assigned
# per template slot, not re-invented per file.
#
# Demographic: mid-career corporate people-managers (30s-50s), gender-matched to the
# block's existing pronouns (She/He) as authored. Names avoid overlap with
# gen_z_professionals (Maya/Jordan/Priya/Tariq/Nadia/Sam/Zoe/Daniel/Chris/Leo/Amara/
# Marco/Nia/Alex/Tomas/Keara/Devyn/Zara/Suki/Priyanka/Aisha/Elena/Naomi/Ravi) and
# working_parents (Tara/Greg/Nina/Kira) rosters per the "own roster per persona" rule.

