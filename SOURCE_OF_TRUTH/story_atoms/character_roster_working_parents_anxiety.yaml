version: "1.0"
topic: anxiety
persona: working_parents
engine: overwhelm

characters:

  - id: tara
    name: Tara
    age: 38
    role: "single parent / mid-level operations manager"
    location: "Suburban — school-pickup zone"
    signature_trigger: "quarterly review email sits unfinished while she crawls through traffic to school pickup"
    signature_pattern: "promises work she can't keep, cuts meetings short, watches her daughter's soccer game on phone between work pings"
    signature_detail: "school pickup at 3:15; Tara arrives 3:47; teacher's expression flashes something"
    topic_tie: "overwhelm via guilt-arithmetic — she runs the math between work and parenting and the math never balances"
    arc_position_coverage:
      recognition: "story_atoms/working_parents/anchored/anxiety/overwhelm/recognition/micro/v01.txt"
      mechanism_proof: "story_atoms/working_parents/anchored/anxiety/overwhelm/mechanism_proof/micro/v01.txt"
      turning_point: "story_atoms/working_parents/anchored/anxiety/overwhelm/turning_point/micro/v01.txt"
      embodiment: "story_atoms/working_parents/anchored/anxiety/overwhelm/embodiment/micro/v01.txt"
    turning_point_brief: |
      Tara leaves her phone in the car for one soccer game — 90 minutes. She sees the goal
      live. Walking back to the car after, she realizes the cost of presence is availability
      to work. Her jaw clenches at the email situation she didn't manage. But the memory of
      her daughter's face is there too. Not fixed — just measured.
    notes_for_writer: "Tara's anxiety is guilt-arithmetic shaped. Body: chest tightens, palms sweat against steering wheel, throat closed, hands shake. Avoid 'felt guilty'; show the time on the dashboard + the unfinished email subject line."

  - id: greg
    name: Greg
    age: 42
    role: "engineering lead / father of teenager"
    location: "Open-plan kitchen + Slack-equipped"
    signature_trigger: "Slack tagged-message at 8pm during family dinner; teen daughter watching"
    signature_pattern: "answers Slack 'just one more thing' until family time has dissolved into work-adjacent presence"
    signature_detail: "11:14pm laptop, daughter's breathing monitor green and steady on the counter, three Slack pings tagged with his name"
    topic_tie: "overwhelm via trained-urgency — the work urgency is fabricated but his body has been trained to treat it as real"
    arc_position_coverage:
      recognition: "story_atoms/working_parents/anchored/anxiety/overwhelm/recognition/micro/v02.txt"
      mechanism_proof: "story_atoms/working_parents/anchored/anxiety/overwhelm/mechanism_proof/micro/v02.txt"
      turning_point: "story_atoms/working_parents/anchored/anxiety/overwhelm/turning_point/micro/v02.txt"
      embodiment: "story_atoms/working_parents/anchored/anxiety/overwhelm/embodiment/micro/v02.txt"
    turning_point_brief: |
      Greg posts "I'm unreachable until 8:30. Family dinner time." Turns off notifications.
      For seven minutes his chest feels exposed, waiting for catastrophe. It doesn't come.
      By 8:32 there are 73 messages. The catastrophe was fabricated. The urgency was
      trained into him, not real. He looks at his daughter. Something shifts.
    notes_for_writer: "Greg's anxiety is trained-urgency shaped. Body: jaw clenched in molars, stomach hollow, hands cold despite warm kitchen, chest exposed when notifications go off. Show the breathing monitor + the cursor in the reply box."

  - id: nina
    name: Nina
    age: 33
    role: "ICU nurse with a newborn; Saturday-shift pressure"
    location: "Daycare parking lot + hospital scheduling app"
    signature_trigger: "manager pings for a Saturday shift; she types yes/no/yes; the dread arrives in three seconds"
    signature_pattern: "covers daycare-pickup math against project deadlines + extra-shift requests; calendar pump-time written in italics like an apology"
    signature_detail: "shoulders at her ears in the daycare lot doing impossible math"
    topic_tie: "overwhelm via small-yes accumulation — every small yes to work is a small no to her newborn; she can't see the no until it's already happened"
    arc_position_coverage:
      recognition: "story_atoms/working_parents/anchored/anxiety/overwhelm/recognition/micro/v03.txt"
      mechanism_proof: "story_atoms/working_parents/anchored/anxiety/overwhelm/mechanism_proof/micro/v03.txt"
      turning_point: "story_atoms/working_parents/anchored/anxiety/overwhelm/turning_point/micro/v03.txt"
      embodiment: "story_atoms/working_parents/anchored/anxiety/overwhelm/embodiment/micro/v03.txt"
    turning_point_brief: |
      Nina puts pump-time on the calendar without italics or apology. Holds the block
      because it's hers. Texts her manager: "I can't take Saturday — I'm out for family."
      Doesn't soften the period. Takes the baby to the park. Hands warm on the stroller.
    notes_for_writer: "Nina's anxiety is small-yes-accumulation shaped. Body: shoulders rising to ears, chest compressed, throat tight, dread arrives in three seconds. Show the daycare pickup time + the Saturday shift ping."

  - id: kira
    name: Kira
    age: 36
    role: "social worker / mother of kindergartner + preschooler"
    location: "Office bathroom + school auditorium"
    signature_trigger: "9am case-review meeting + 9:30am kindergarten concert collision she's known about for nine days"
    signature_pattern: "chooses the meeting; watches the 43-second concert clip in the office bathroom; kindergartner notices"
    signature_detail: "ribs feel small; breath shallow; hands cold and then warm"
    topic_tie: "overwhelm via missed-moment math — small moments compound; the kindergartner remembers every one"
    arc_position_coverage:
      recognition: "story_atoms/working_parents/anchored/anxiety/overwhelm/recognition/micro/v04.txt"
      mechanism_proof: "story_atoms/working_parents/anchored/anxiety/overwhelm/mechanism_proof/micro/v04.txt"
      turning_point: "story_atoms/working_parents/anchored/anxiety/overwhelm/turning_point/micro/v04.txt"
      embodiment: "story_atoms/working_parents/anchored/anxiety/overwhelm/embodiment/micro/v04.txt"
    turning_point_brief: |
      Kira moves the next conflict in eight minutes. Sits with how small the actual
      conversation was — the one she couldn't have because she was choosing the meeting.
      The cost was visible only after she stopped paying it once. Blocks all school events
      at the start of the term. Sits in the second row with both kids' jackets in her lap.
    notes_for_writer: "Kira's anxiety is missed-moment-math shaped. Body: shallow breath, ribs small, hands cold then warm. Show the calendar collision + the bathroom phone clip."

