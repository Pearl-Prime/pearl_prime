# Character Roster — story_atoms generation
# Persona: healthcare_rns / Topic: cross-topic (anchored, anxiety, boundaries,
# burnout, compassion_fatigue, courage, depression, financial_anxiety,
# financial_stress, grief, imposter_syndrome, overthinking, self_worth,
# sleep_anxiety, social_anxiety, somatic_healing)
# Authority: story_atom_tier_templates.yaml
#
# PURPOSE: Naming roster for the Wave-1 CHARACTER_STUDY_UNNAMED individuation pass
# (phoenix_v4/quality/story_atom_lint.py). healthcare_rns/{topic}/STORY/CANONICAL.txt
# is a fixed 20-block template shared verbatim across all 16 topics (workplace-noun
# substitutions: 12-hour shift, break room, charting, patient, scrubs, staffing ratio,
# call light, unit). Each topic file gets the SAME name-per-slot mapping below, so a
# given version number (v01, v02, ...) carries the same character across every topic
# in this persona. anxiety/burnout/overthinking additionally carry 3 deep-authored
# blocks (v21-v23) that are NOT part of the shared template — each has its own
# distinct register/story and gets a per-file name (listed below under
# extended_blocks), matching the working_parents precedent of not forcing template
# names onto non-template prose.
#
# Demographic: registered nurses (hospital/unit setting, 20s-50s), gender-matched to
# the block's existing pronouns (She/He) as authored. Names avoid overlap with
# gen_z_professionals, working_parents, and corporate_managers rosters per the
# "own roster per persona" rule, and lean toward names common among US nursing-
# workforce demographics (many first- or second-generation, per BLS/NCSBN nursing
# workforce composition).

