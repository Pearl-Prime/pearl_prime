notes_for_writer: |
  Minimal edit per block: insert the slot name performing a person-verb action
  (matches story_atom_lint.py's Name+person-verb naming regex — "Marisol sat",
  "Dominic told himself", "Fatima moved through" — not just a name token dropped
  into the sentence). Preserve scene/stakes/open-ending/word-count/metadata
  verbatim. v17 (and each topic's other atmospheric-typed slot, when present) is
  NOT a character_study atom and does not require a name.
