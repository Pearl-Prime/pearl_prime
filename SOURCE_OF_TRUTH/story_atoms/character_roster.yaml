# Character Roster — story_atoms generation
# Persona: gen_z_professionals / Topic: anxiety
# Authority: story_atom_tier_templates.yaml
#
# PURPOSE: 20 character profiles. Pearl_Writer uses these to write story atoms
# that feel like real people, not archetypes. Each character has:
#  - name + role (what job, what context)
#  - signature_trigger (the specific anxiety thing they do)
#  - signature_pattern (their behavioral loop — what makes THEM recognizable)
#  - signature_detail (one concrete thing: object, habit, location)
#  - arc_position_coverage: which arc positions have atoms written (track progress)
#
# SHARING RULE: Any character can appear in multiple books. The reader of book 1
# meets Maya; the reader of book 500 also meets Maya. That's fine — it's a different
# reader. But within ONE BOOK, no character name appears more than once per phase.
# The story_planner.py cross-phase dedup enforces this.
#
# ARC POSITIONS FOR EACH CHARACTER:
#  recognition: the first moment of noticing the pattern (they don't know it yet)
#  mechanism_proof: the mechanism at work, cost escalating, still no insight
#  turning_point: something cracks it open — not fixed, but something shifts
#  embodiment: a small, specific act that shows new ground (not triumphant, just different)

version: "1.0"
topic: anxiety
persona: gen_z_professionals
engine: overwhelm  # primary engine; characters can have atoms for other engines too

characters:

