      mechanism_proof: |
        Suki mechanism_proof: she has a preparation ritual. Green tea, slides reviewed once, ten
        minutes of silence, hallway. She added the hallway after the third talk when the tea wasn't
        working. She knows the ritual doesn't fix the before. She does it anyway because not doing
        it would feel worse. She does not know what "worse" would look like. She cannot test it.
