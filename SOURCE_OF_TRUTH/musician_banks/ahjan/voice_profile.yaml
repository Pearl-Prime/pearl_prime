# Ahjan music-mode bank — voice_profile.yaml (REFERENCE kit, V1).
# Shape matches survey_derivation.survey_to_voice_yaml() over ../../survey/ahjan_survey.yaml.
# Mirrors test_artist_alpha/voice_profile.yaml with REAL Ahjan corpus content.
#
# Envelope is LOCKED to Ahjan's existing teacher signature_vibe.yaml + doctrine.yaml so the music
# kit speaks in the SAME voice as the teacher corpus (reuse-not-greenfield — extend, don't reinvent):
#   - voice_instruction: clear, observational; show rather than tell; NO motivational language
#   - tone_words: quiet, precise, observational   (anti: devotional, inspirational, urgent)
#   - forbidden_words: manifest, guaranteed, breakthrough, amazing
#   - forbidden patterns: exclamation marks; rhetorical questions for emphasis
#   - emotional_register allowed: calm_observation, matter_of_fact (NOT catharsis/triumph/devotional)
voice_person: observational
register: plain_spoken
pacing: varied
signature_devices:
  - naming the body part where the feeling sits (chest, jaw, shoulders, breath)
  - the half-second of noticing — "oh. there is the tightness. hello."
  - standing-down imagery (dropping the shield, the watch that finally ends)
  - homecoming / returning to what was never missing (the breath already moving)
  - music from a place of power (the sound carries the sacred site, not the self)
# Authoring guardrails carried from the teacher bank (consumed by Pearl_Writer when drafting atoms;
# NOT enforced enums — authoring hints, same spirit as song_kit_topic_families register hints).
authoring_guardrails:
  forbidden_words: [manifest, guaranteed, breakthrough, amazing]
  forbidden_patterns: [exclamation_marks, rhetorical_questions_for_emphasis]
  emotional_register_forbidden: [catharsis, triumph, devotional_reverence]
  sentence_length_words: [8, 35]
  source: SOURCE_OF_TRUTH/teacher_banks/ahjan/doctrine/signature_vibe.yaml
