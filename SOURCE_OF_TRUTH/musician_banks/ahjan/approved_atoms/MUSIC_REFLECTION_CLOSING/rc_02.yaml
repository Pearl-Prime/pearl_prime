atom_id: ahjan_MUSIC_REFLECTION_CLOSING_02
variants:
  - body: "{{musician_name}} closes by letting the body stand down for one breath. The room is quiet. The deadline is real but ordinary. For {{persona_anchor}} shoulders, that single breath of believing the war is over is enough for today."
    musicgen_mood_instruction: "drone thinning to near-silence, breath sample on the exhale, the felt release of dropping a shield, grounded and tender, no swell"
  - body: "Treat {{topic_anchor}} as if it is on your side, {{musician_name}} says, because it is. The nervous system that fired the alarm is the same one that has protected you since birth. Close this {{genre}} reflection by thanking it, not fighting it."
    musicgen_mood_instruction: "warm low strings settling, slow and reconciled, the sound of being received rather than corrected, quiet gratitude without sentimentality"
  - body: "If you measure worth by throughput, {{musician_name}} offers a closing permission: rest is not betrayal. Let the final {{theme}} you encountered remind {{persona_anchor}} bodies that healing can sound like understatement."
    musicgen_mood_instruction: "minimal piano with long pauses between notes, spacious and slow, plainspoken calm, no climax, the dignity of stopping"
