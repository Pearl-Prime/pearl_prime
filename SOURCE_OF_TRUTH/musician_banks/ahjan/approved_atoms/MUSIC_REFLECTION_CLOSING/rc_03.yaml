atom_id: ahjan_MUSIC_REFLECTION_CLOSING_03
variants:
  - body: "{{musician_name}} ends where the breath returns. You are not behind; you are at the beginning, and the beginning is where the practice lives. Let {{persona_anchor}} {{topic_anchor}} be set down and begun again tomorrow."
    musicgen_mood_instruction: "circular two-note motif coming to rest, soft drone, the feeling of beginning again without strain, patient and unhurried, neutral warmth"
  - body: "The sound returns to the place of light it came from. {{musician_name}} closes the {{genre}} line and lets {{theme}} rest — not transcended, not performed, simply seen and left in peace."
    musicgen_mood_instruction: "reverberant drone receding into distance, like a sound returning to its source, vast and still, reverent but not devotional, slow fade"
  - body: "Keep {{musician_name}}'s skepticism of hurry. Keep your right to heal unevenly. If one passage of sound became a hand on {{persona_anchor}} shoulder during {{topic_anchor}}, let that be enough, and come back when the world gets loud again."
    musicgen_mood_instruction: "soft sustained pad with a single grounding bass note, intimate and steady, the sense of a hand on the shoulder, calm and matter-of-fact"
