atom_id: ahjan_MUSIC_REFLECTION_CLOSING_01
variants:
  - body: "{{musician_name}} closes the chapter without a verdict. {{theme}} stays available, not urgent, for {{persona_anchor}} readers. You did not have to solve {{topic_anchor}}; you noticed it once, and the noticing was the practice."
    musicgen_mood_instruction: "drone resolving to a single low tone, decay into silence, unhurried release, the sound of a watch finally ending, calm and matter-of-fact"
  - body: "Carry it the way {{musician_name}} does in {{genre}} form: small honest returns, fewer performances of okay-ness. If your body is tired from trying, {{theme}} is permission to stop auditioning for calm."
    musicgen_mood_instruction: "soft sustained pad fading slowly, one last singing-bowl strike, restful and plain, no triumphant lift, room to exhale"
  - body: "The last page is not a finish line. {{musician_name}} would call that mercy. Return to any chapter when the week narrows; the sound is here to widen the room again around {{topic_anchor}}."
    musicgen_mood_instruction: "gentle open-ended drone, no final cadence, leaves the door cracked, quiet and welcoming, suitable for returning to"
