atom_id: ahjan_MUSIC_REFLECTION_CLOSING_04
variants:
- body: '{{musician_name}} closes without asking {{theme}} to resolve — the verdict
    can stay unsigned, that is the practice, not the failure of it.'
- body: Carry {{topic_anchor}} home without a final ruling; {{musician_name}}'s way
    favors return visits, not one-song verdicts.
- body: If the body is tired of being the evidence, {{musician_name}} names that as
    enough reason to rest, no further proof required.
