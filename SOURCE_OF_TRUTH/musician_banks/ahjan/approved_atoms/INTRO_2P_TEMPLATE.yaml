atom_id: ahjan_INTRO_2P
variants:
  - body: |
      You found {{musician_name}} on the kind of day where the mind runs ahead of the body. I want
      to tell you plainly how the pages ahead work. They braid somatic practice with {{musician_name}}'s
      {{genre}} sound on {{theme}} — not as decoration, but as a second presence beside yours while you
      learn to stay where you already are. {{musician_name}} was trained in a forest tradition that
      begins not with the mind but with the body: by the time you are thinking about {{topic_anchor}},
      the chest has already tightened and the breath has already shortened. So the first question here
      is small and ordinary — what is the body doing right now. For {{persona_anchor}} readers carrying
      this like static in the ears, the music asks nothing except the next breath. When a passage of
      sound lands, let it be permission to notice without correcting. You are not late to your own
      practice. You are simply beginning, in plain sight, the way beginning always looks.
  - body: |
      I came to this work after I stopped pretending {{topic_anchor}} was only stress I could schedule
      away. What I want {{persona_anchor}} readers to know is that the sound referenced here is an
      anchor, not an instruction. {{musician_name}} composes in a {{genre}} register about {{theme}},
      and the exercises invite the nervous system to answer without performing insight. {{musician_name}}
      would put it this way: you keep adjusting the candle instead of seeing it. Put the hands down.
      Let the sensation finish its sentence. This pairing is for people who are tired of being brave on
      empty — the music meets you where the bracing lives, and the somatic beats give you something to
      do with the jaw, the shoulders, the breath while the body tells you, accurately, what it has been
      holding. Stay curious about small shifts. A half-degree of unclench counts.
  - body: |
      Before Chapter 1, I want you to hear why {{musician_name}} sits next to you in this {{topic_anchor}}
      journey. {{musician_name}} composes meditation music from places of power — a canyon, a sacred site —
      so the sound carries something larger than the self, the way Milarepa sang the teaching instead of
      only speaking it. That matches how this book treats {{theme}} for {{persona_anchor}} readers: as
      information, not a verdict; as signal, not a character flaw. You will meet lyrics and reflections as
      doorways — enter when you want, skip when you need silence. Nothing here replaces the care of trusted
      people and professionals. It adds a rhythm so the body can follow a gentler argument than the one the
      mind rehearses at 2 a.m. {{musician_name}} is suspicious of hurry, and so is this book.
