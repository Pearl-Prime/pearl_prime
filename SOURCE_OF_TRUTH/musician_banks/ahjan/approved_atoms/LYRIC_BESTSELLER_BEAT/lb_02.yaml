atom_id: ahjan_LYRIC_BESTSELLER_BEAT_02
variants:
  - body: "The war is not happening — say it at the hinge;\n{{musician_name}} holds {{theme}} steady while {{persona_anchor}} body decides whether to believe it."
  - body: "You keep adjusting the candle instead of seeing it;\n{{musician_name}} sets {{topic_anchor}} down mid-{{genre}} and just looks, hands open."
  - body: "Here the sound carries the sacred site, not the self;\n{{musician_name}} lets {{theme}} arrive as room, the way a flute empties a hall."
