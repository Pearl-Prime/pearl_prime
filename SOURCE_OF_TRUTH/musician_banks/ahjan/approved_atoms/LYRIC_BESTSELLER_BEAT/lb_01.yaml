variants:
  - body: "Here is the hinge — {{musician_name}} leans in:\nwhat is the body doing right now, while {{topic_anchor}} talks over {{persona_anchor}} chest?"
  - body: "Mid-chapter, the bracing thickens;\n{{musician_name}} offers {{genre}} air and the small word — notice — and lets {{theme}} complete."
  - body: "Not the deliverance you were promised, just a witness:\n{{musician_name}} tunes the half-second until your jaw remembers it can drop."
