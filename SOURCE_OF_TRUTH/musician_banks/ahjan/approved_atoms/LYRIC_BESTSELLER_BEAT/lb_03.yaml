atom_id: ahjan_LYRIC_BESTSELLER_BEAT_03
variants:
  - body: "Mid-book weather: {{topic_anchor}} returns, as doubt does —\n{{musician_name}} meets it again, because beginning again is the practice, not the failure."
  - body: "The chest reported first; the mind walked in late —\n{{musician_name}} gives {{persona_anchor}} {{theme}} back to the body that already knew."
  - body: "Dharma, not karma, at the turn —\n{{musician_name}} refuses the {{genre}} catharsis and offers the quieter, truer note instead."
