atom_id: ahjan_MUSIC_REFLECTION_OPENING_01
# No-lyrics fork: `musicgen_mood_instruction` is MusicGen mood-instruction TEXT only (V1 renders
# NO audio — §1.4). instrumental_mood_hint seed = presence_and_stillness family.
variants:
  - body: "{{musician_name}} opens {{topic_anchor}} the way the forest tradition does: not with calm, with noticing. Before the chapter runs, ask one plain question — what is the body doing right now. Where is the tightness. Where is the breath sitting. {{theme}} is not a problem to solve here; it is information to receive."
    musicgen_mood_instruction: "slow ambient drone, single sustained low pad, sparse singing-bowl strikes with long decay, no percussion, room to breathe, neutral and observational — not uplifting, not sad"
  - body: "Listen for {{musician_name}}'s restraint. The {{genre}} texture is doing one thing: carrying {{persona_anchor}} attention past the busy mind into listening, the way a single song quiets a hall. Let this reflection widen the chapter without rushing the body that is already here."
    musicgen_mood_instruction: "minimal flute over a soft drone, wide stereo space, very slow tempo, breath-like phrasing, contemplative and grounded, sacred-site stillness"
  - body: "A pause before the chapter begins. {{musician_name}} would call this homecoming, not effort — the breath was moving the whole time; you only stopped writing to it. {{healing_intent}} can sound like understatement, and that is the point."
    musicgen_mood_instruction: "warm keyboard texture, long held tones, no melodic resolution, quiet and matter-of-fact, the feeling of returning to a familiar room"
