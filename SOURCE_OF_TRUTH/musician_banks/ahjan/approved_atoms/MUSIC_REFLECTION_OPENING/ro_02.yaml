atom_id: ahjan_MUSIC_REFLECTION_OPENING_02
variants:
  - body: "{{musician_name}} begins where the signal actually is. By the time you are thinking about {{topic_anchor}}, the chest has already tightened, the jaw has already locked. The mind walked in late. This reflection invites {{persona_anchor}} attention back down to where the data has been waiting."
    musicgen_mood_instruction: "low cello drone with subtle breath samples, no beat, dark but not heavy, the sound of a body settling, observational not dramatic"
  - body: "Mindfulness is not calm; it is noticing, and you are not trying to change what you find. {{musician_name}} opens {{theme}} as a candle you put your hands down beside. Let the {{genre}} sound hold the room while you simply look."
    musicgen_mood_instruction: "single sustained pad, one soft bell every few bars, vast quiet space, candle-still, neutral feeling-tone, no swell to climax"
  - body: "The cost of bracing is invisible from the outside. {{musician_name}} opens this {{topic_anchor}} chapter by naming it plainly for {{persona_anchor}} bodies: the shoulders up, the breath shallow, a war that is not happening. The music asks nothing except the next breath."
    musicgen_mood_instruction: "ambient drone that gradually thins, releasing tension, sparse and slow, the felt sense of shoulders dropping, grounded and unhurried"
