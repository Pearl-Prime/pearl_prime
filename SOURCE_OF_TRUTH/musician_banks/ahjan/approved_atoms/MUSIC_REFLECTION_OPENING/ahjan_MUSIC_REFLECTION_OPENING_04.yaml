atom_id: ahjan_MUSIC_REFLECTION_OPENING_04
variants:
- body: '{{musician_name}} opens {{topic_anchor}} the observational way: notice the
    verdict arriving, then notice that it is only arriving, not arriving as truth.'
- body: Before the chapter continues, {{musician_name}} asks you to find where shame
    sits in the body right now — chest, jaw, stomach — and just say hello to it.
- body: This reflection doesn't ask you to feel better about {{theme}}; it asks you
    to notice the noticing, which is already a different relationship to it.
