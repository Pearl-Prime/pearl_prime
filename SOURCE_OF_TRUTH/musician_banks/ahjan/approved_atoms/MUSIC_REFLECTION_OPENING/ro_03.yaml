atom_id: ahjan_MUSIC_REFLECTION_OPENING_03
variants:
  - body: "You are not late to your own practice. {{musician_name}} opens {{topic_anchor}} as a beginning, because beginning again is where the practice lives, not the obstacle to it. Let {{persona_anchor}} attention arrive without performing insight."
    musicgen_mood_instruction: "gentle repeating two-note motif on flute, soft drone underneath, patient and circular, the feeling of starting over without strain"
  - body: "{{musician_name}} composes from places of power — a canyon, a sacred site — so the sound carries something larger than the self. As this {{genre}} reflection opens {{theme}}, let it move {{persona_anchor}} attention past the noise of the day into a wider room."
    musicgen_mood_instruction: "expansive reverberant drone, distant wind texture, wide and open like a canyon, awe held quietly, no melody pushing forward"
  - body: "Before Chapter weather sets in, {{musician_name}} sits next to you. Nothing here replaces the care of trusted people. The reflection only adds a rhythm so the body can follow a gentler argument than the one the mind rehearses at 2 a.m. about {{topic_anchor}}."
    musicgen_mood_instruction: "very soft nocturne pad, slow heartbeat-like pulse on a muted low tone, intimate and calm, suitable for late-night listening, observational warmth"
