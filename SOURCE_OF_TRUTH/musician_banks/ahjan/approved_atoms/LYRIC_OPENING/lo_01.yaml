atom_id: ahjan_LYRIC_OPENING_01
variants:
  - body: "Before the thought arrives, the chest already knows —\n{{musician_name}} names {{topic_anchor}} where it sits, not where it explains itself."
  - body: "The shoulders climbed an hour ago;\n{{musician_name}} lets the {{genre}} drone find {{persona_anchor}} jaw and say: stand down, just here."
  - body: "{{theme}} is not the enemy in the room —\n{{musician_name}} opens with breath, the one that was moving the whole time."
