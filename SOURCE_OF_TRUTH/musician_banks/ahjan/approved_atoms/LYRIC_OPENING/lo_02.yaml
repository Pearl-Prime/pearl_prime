variants:
  - body: "You came in bracing for an impact that is not coming;\n{{musician_name}} sets {{theme}} down like a shield by the door."
  - body: "The mind runs ahead, blah blah blah —\nthen {{musician_name}} plays one note and {{persona_anchor}} listening begins."
  - body: "{{topic_anchor}} on a {{genre}} morning;\n{{musician_name}} asks only what the body is doing right now."
