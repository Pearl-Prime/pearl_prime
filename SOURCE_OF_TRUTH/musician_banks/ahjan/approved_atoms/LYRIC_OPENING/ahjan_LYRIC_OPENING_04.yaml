atom_id: ahjan_LYRIC_OPENING_04
variants:
- body: 'The inner verdict reads itself out loud again — {{musician_name}} just names
    it: a voice, not a fact, sitting in {{topic_anchor}}.'
- body: '{{musician_name}} finds the tightness where shame keeps its office — chest,
    jaw, the place that flinches before the mind catches up.'
- body: You brought the whole file of old verdicts in with you; {{musician_name}}
    sets it on the floor, not on the body, for {{persona_anchor}} to see.
