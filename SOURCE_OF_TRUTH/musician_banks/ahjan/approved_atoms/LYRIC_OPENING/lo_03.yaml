atom_id: ahjan_LYRIC_OPENING_03
variants:
  - body: "Nothing here needs fixing yet —\n{{musician_name}} lets {{theme}} be seen, full stop, the way you'd watch a candle without touching it."
  - body: "The sound comes from a place of power, not from the self;\n{{musician_name}} carries {{persona_anchor}} past the noise into {{topic_anchor}} hush."
  - body: "Begin again, the breath is new —\n{{musician_name}} opens the {{genre}} room you have been pacing inside all along."
