variants:
  - body: "Bestseller beat: {{musician_name}} steadies {{theme}} while {{topic_anchor}} tries to speed-read {{persona_anchor}} nervous system. Stay with the question the forest tradition keeps returning to — what is the body doing right now — and let the answer be plain."
    musicgen_mood_instruction: "drone holding steady against rising tension, one grounding low note repeated, the felt sense of staying put, observational and firm, no dramatic build"
  - body: "Here {{genre}} craft meets {{persona_anchor}} reality. {{musician_name}} asks you to notice one bodily shift worth keeping — a half-degree of unclench in the jaw, a single breath that went lower. That half-second of noticing counts as the practice."
    musicgen_mood_instruction: "subtle texture that opens slightly, a small release in the mid-range, the sound of one muscle letting go, quiet and precise, matter-of-fact"
  - body: "{{healing_intent}} — repeated on purpose at the hinge, because {{musician_name}} knows doubt returns mid-chapter, the way {{topic_anchor}} always does. Beginning again here is not failure; it is the whole of the path."
    musicgen_mood_instruction: "circular motif returning to its start, soft drone, patient repetition without resolution, the feeling of beginning again, calm and grounded"
