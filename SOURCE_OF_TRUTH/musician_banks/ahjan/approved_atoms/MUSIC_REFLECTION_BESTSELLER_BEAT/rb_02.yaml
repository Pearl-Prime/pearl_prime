atom_id: ahjan_MUSIC_REFLECTION_BESTSELLER_BEAT_02
variants:
  - body: "At the hinge, {{musician_name}} says it plainly: the war is not happening right now. {{theme}} braced {{persona_anchor}} body for an impact that is not coming. Let the {{genre}} sound hold the room while the shoulders test whether they can drop."
    musicgen_mood_instruction: "drone that gradually releases, tension dissolving without a climax, the sound of standing down, spacious and unhurried, grounded relief"
  - body: "You keep adjusting the candle instead of seeing it. {{musician_name}} interrupts the managing of {{topic_anchor}} mid-chapter and offers the harder thing: put the hands down, let the sensation finish its sentence, and simply look."
    musicgen_mood_instruction: "single sustained tone, no manipulation or movement, utterly still, candle-quiet, neutral feeling-tone, the discipline of not interfering"
  - body: "Suffering is information, not punishment. {{musician_name}} steadies {{persona_anchor}} attention here so {{topic_anchor}} can finish reporting what it came to say. Once a body is listened to, it tends to quiet — not suppressed, received."
    musicgen_mood_instruction: "low warm pad that softens as it goes, the sound of being heard rather than fixed, reconciled and calm, no triumph, observational tenderness"
