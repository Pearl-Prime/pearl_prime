atom_id: ahjan_MUSIC_REFLECTION_BESTSELLER_BEAT_03
variants:
  - body: "Mid-book, {{musician_name}} refuses the easy catharsis. This is Dharma, not karma: the {{genre}} line does not build {{topic_anchor}} into a climax for {{persona_anchor}} to consume. It offers the quieter, truer frequency instead, and asks the body to listen."
    musicgen_mood_instruction: "deliberately un-cathartic drone, refusing to resolve or swell, plain and honest, the sound that does not perform, steady low presence"
  - body: "The mind walked in late again, trying to take credit. {{musician_name}} hands {{theme}} back to the body that registered {{topic_anchor}} first — the chest that tightened before the thought, the breath that shortened before the worry was named."
    musicgen_mood_instruction: "breath-paced texture, a low tone that arrives before any melody, the sense of the body knowing first, observational and unforced, grounded"
  - body: "Here at the hinge, {{musician_name}} composes from a place of power so the sound carries something larger than {{persona_anchor}} fear. {{theme}} arrives as room, the way Milarepa sang the teaching instead of only speaking it — the body hears what the page alone could not deliver."
    musicgen_mood_instruction: "expansive reverberant drone with a distant sung overtone, vast and elevating without being devotional, sacred-site spaciousness, quiet awe"
