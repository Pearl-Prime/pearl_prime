atom_id: ahjan_LYRIC_CLOSING_02
variants:
  - body: "Stand down. The room is quiet. The deadline is ordinary —\n{{musician_name}} lets {{persona_anchor}} jaw unset one degree and calls that enough."
  - body: "{{theme}} was information, not a verdict;\n{{musician_name}} thanks it, the way you thank a loyal servant who finally heard the war was over."
  - body: "No climax, only a clearer frequency —\n{{musician_name}} ends {{topic_anchor}} in {{genre}} hush, hands down, candle untouched."
