atom_id: ahjan_LYRIC_CLOSING_03
variants:
  - body: "You are not behind; you are at the beginning —\n{{musician_name}} closes where {{theme}} begins again, gentle as a returning note."
  - body: "Leave the door cracked for the breath to come back;\n{{musician_name}} already set {{persona_anchor}} {{topic_anchor}} down without a jury."
  - body: "The sound returns to the place of light it came from;\n{{musician_name}} lets the {{genre}} line rest, the watch over for tonight."
