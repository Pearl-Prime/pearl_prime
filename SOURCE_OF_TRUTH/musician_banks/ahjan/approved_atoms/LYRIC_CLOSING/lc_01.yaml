atom_id: ahjan_LYRIC_CLOSING_01
variants:
  - body: "The watch can end for one breath —\n{{musician_name}} leaves {{theme}} on the sill, not solved, just seen, for {{persona_anchor}} shoulders."
  - body: "You did not transcend {{topic_anchor}}; you noticed it once —\n{{musician_name}} marks the half-second, quiet as a bowl going still."
  - body: "Tomorrow keeps its own time;\n{{musician_name}} closes the {{genre}} drone where the breath was always moving."
