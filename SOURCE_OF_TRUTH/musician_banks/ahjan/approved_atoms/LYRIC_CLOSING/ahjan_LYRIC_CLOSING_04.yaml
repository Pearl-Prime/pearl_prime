atom_id: ahjan_LYRIC_CLOSING_04
variants:
- body: '{{musician_name}} leaves the verdict unsigned — {{theme}} stays open for
    revision, the way it always was.'
- body: No breakthrough tonight; {{musician_name}} just stopped agreeing with the
    old voice for the length of one song.
- body: The shame can stay in the room; {{musician_name}} isn't asking {{persona_anchor}}
    to throw it out, only to stop serving it tea.
