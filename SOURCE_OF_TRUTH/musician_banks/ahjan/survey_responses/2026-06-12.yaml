# Ahjan musician survey — ZEROTH / REFERENCE song-kit (V1).
#
# Authority chain:
#   - Cap entry (governing):    MUSIC-ONBOARDING-SONG-KIT-V1-01 in docs/PEARL_ARCHITECT_STATE.md
#   - Spec (governing):         docs/specs/MUSIC_ONBOARDING_SONG_KIT_V1_SPEC.md (esp. §4 Ahjan first/reference kit)
#   - Schema (conforms to):     artifacts/musician_survey/SURVEY_TEMPLATE.yaml (V1; consumed verbatim — NO new fields)
#   - Derivation consumer:      phoenix_v4/musician/survey_derivation.py
#                               (survey_to_profile_dict / survey_to_themes_yaml / survey_to_voice_yaml)
#   - Registry join key:        config/music/music_brand_registry.yaml  brand_id=ahjan_music
#                               survey_yaml_pointer -> THIS file (no silent-mint)
#
# WHAT THIS IS
#   The persisted survey response for Ahjan as the music-mode ZEROTH/REFERENCE kit. Unlike
#   test_artist_alpha (synthetic CI seed), this survey is filled from Ahjan's REAL teaching
#   corpus under SOURCE_OF_TRUTH/teacher_banks/ahjan/ (Dharma-talk transcripts + approved
#   doctrine atoms), NOT invented.
#
#   Primary corpus seeds (source_refs for traceability — reuse-not-greenfield, Ahjan's voice
#   already has a documented corpus; this extends it into the music_mode bank shape):
#     - teachers/ahjan/intake/Dharma Talks/2019-06 SpiritualMusic_Budapest_Jul2019.txt
#         (Ahjan's own music doctrine: "music is like magic"; music carries you beyond self;
#          music from sacred places of power; Dharma not karma; structure/timing as anchor;
#          music-yoga — he co-creates meditation music with yogis and writes some himself)
#     - SOURCE_OF_TRUTH/teacher_banks/ahjan/approved_atoms/COMPRESSION/ahjan_TEACHER_DOCTRINE_000..009.yaml
#         (body-first-not-mind; noticing-without-correction; cost-of-bracing / "a war that is
#          not happening"; awareness-as-homecoming; meditation-as-showing-up; beginner-mind;
#          suffering-as-information; the half-second of noticing)
#     - SOURCE_OF_TRUTH/teacher_banks/ahjan/doctrine/doctrine.yaml + signature_vibe.yaml
#         (voice envelope: clear, observational, show-don't-tell; quiet/precise; NO motivational
#          language; forbidden words manifest/guaranteed/breakthrough; emotional register
#          calm_observation / matter_of_fact — NOT catharsis/triumph/devotional)
#
#   IMPORTANT — this is NOT V2's open "first real external musician" question. Per spec §4.3 +
#   Q-MSK-AHJAN-VS-V2-FIRST-01 (FLAGGED, operator-only): Ahjan = internal gold reference seeded
#   from the operator's own corpus; Q-MM-V2-FIRST-REAL-MUSICIAN-01 stays OPEN for the operator.
#   This survey does NOT collapse it.

survey_version: "1.0"

# Real corpus, not a synthetic CI seed. survey_derivation.survey_to_profile_dict() reads this
# into profile.synthetic; the reference bank is therefore synthetic: false.
synthetic: false
submitted_date: "2026-06-12"

# Provenance block (additive metadata; SURVEY_TEMPLATE does not forbid extra top-level keys, and
# the derivation reads only the named blocks below). Kept for human traceability of corpus seeds.
corpus_provenance:
  seed_kind: reference_kit_from_teacher_corpus
  teacher_id: ahjan
  derived_by: Pearl_Writer (Claude subagent, Tier-1 operator-present — CLAUDE.md LLM Tier policy §1)
  note: |
    Filled from Ahjan's existing Dharma-talk + doctrine corpus (see header source_refs). No paid
    LLM API used (English prose = Pearl_Writer = Claude subagent per feedback_qwen_vs_pearl_writer).

identity:
  display_name: "Ahjan"
  years_active: "30+ (forest-tradition training onward; also known as Samvara / BD — same teacher)"
  primary_genre: "meditative / ambient devotional (sacred-place soundscapes)"
  secondary_genres:
    - "mantra & chant"
    - "spoken-reflection over drone"
    - "new-age contemplative"
  primary_instruments:
    - "voice (spoken reflection, mantra)"
    - "flute"
    - "singing bowls / drone"
    - "keyboard textures"
  creative_phases:
    - "forest-tradition silence (sound as absence)"
    - "music-yoga with yogis (composing from sacred sites — Grand Canyon, places of power)"
    - "current: Western contemplative sound as a new expression of the same awareness"

themes:
  # 3–5 themes (required). These map onto song_kit_topic_families.yaml: presence_and_stillness,
  # recovery_and_repair, quiet_courage, hope_and_renewal.
  primary_themes:
    - "presence (returning to the body that is already here)"
    - "the cost of bracing (a war that is not happening)"
    - "noticing without correcting"
    - "beginning again (beginner-mind is not failure)"
    - "suffering as information, not punishment"
  avoided_themes:
    - "spiritual triumph / catharsis as the goal"
    - "manifesting outcomes / guaranteed results"
    - "music as karma-fuel (love-loss, rage, conquest) — Dharma not karma"
    - "devotional dogma without lived practice"
  listener_hope_one: "That you can stand down for one breath — the war is not happening right now."

voice_craft:
  # Enums per SURVEY_TEMPLATE. Chosen to match Ahjan's signature_vibe.yaml exactly:
  # observational, plain/precise, show-don't-tell, varied pacing across short and long lines.
  voice_person: observational
  register: plain_spoken
  pacing: varied
  signature_devices:
    - "naming the body part where the feeling sits (chest, jaw, shoulders, breath)"
    - "the half-second of noticing — 'oh. there is the tightness. hello.'"
    - "standing-down imagery (dropping the shield, the watch that finally ends)"
    - "homecoming / returning to what was never missing (the breath already moving)"
    - "music from a place of power (the sound carries the sacred site, not the self)"

material_for_reflection:
  # 5–10 songs/albums (required). Ahjan composes meditation music FROM sacred places and ABOUT
  # great masters (his words, Budapest talk) — these are touchstone forms, not commercial tracks.
  touchstone_tracks:
    - "Grand Canyon meditation (music from a place of power)"
    - "third-eye drone (one song / one needle — structure and timing as anchor)"
    - "Milarepa's thousand songs (enlightenment sung, not only read)"
    - "Krishna's flute (sound that carries the room beyond self)"
    - "shakuhachi with the bucket (the flute as meditation)"
    - "mantra over keyboard texture (a new expression of the same awareness)"
    - "Dharma sung, not karma (Buddha's instruction to sing the sutras)"
  key_collaborators: "yogis of the music-yoga school (professional + aspirational musicians composing meditation music together)"
  citations_links:
    - "teachers/ahjan/intake/Dharma Talks/2019-06 SpiritualMusic_Budapest_Jul2019.txt"
    - "SOURCE_OF_TRUTH/teacher_banks/ahjan/doctrine/doctrine.yaml"

healing_intent:
  what_helps_heal: |
    Returning attention to the body, which has already registered what is happening before any
    thought arrived. Noticing the tightness without trying to fix it; letting a sensation finish
    its sentence instead of cutting it off. Standing down from the bracing — for one breath, the
    war is not happening. Music helps because it carries you past the small group of teenage girls
    in the mind ("blah blah blah") into listening; it gives structure and timing the anxious mind
    cannot give itself.
  listener_responses_to_amplify:
    - "people said the quiet let them stop performing okay-ness"
    - "the half-second of noticing was enough to count as practice"
    - "the sound gave the body somewhere to stand down"
  wellness_framing_rejects:
    - "that suffering is a verdict on your life or a personal failure"
    - "that you must transcend or breakthrough to be doing it right"
    - "that music must build to catharsis to be healing"

output_preferences_with_lyrics:
  # Ahjan writes/co-creates lyric+mantra content himself; he consents to the lyrical branch for the
  # reference kit. lyric_form=free_verse matches his plain observational lines (no forced rhyme,
  # no verse-chorus pop scaffolding).
  lyric_form: free_verse
  lyric_length_note: "short observational lines, 8–35 words/line per signature_vibe; 8–14 lines/block"
  explicit_content_ok: false
  companion_ai_song_consent: true

output_preferences_no_lyrics:
  # The no-lyrics fork emits MusicGen mood-instruction TEXT only in V1 (no audio render — §1.4).
  reflection_form: meditation
  reflection_perspective: musician

consent_licensing:
  ai_reflections_consent: true
  usage_restrictions: |
    Internal gold-reference / exemplar kit seeded from the operator's own teaching corpus. Not an
    external commercial release. Distinct from V2's open Q-MM-V2-FIRST-REAL-MUSICIAN-01.
  followup_email: "ops@phoenix.local"
  submitted_date: "2026-06-12"
  signature: "Ahjan (Samvara / BD) — reference kit, operator-seeded"
