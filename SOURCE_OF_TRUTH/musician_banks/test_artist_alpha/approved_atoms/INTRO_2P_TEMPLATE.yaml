variants:
  - body: |
      You found {{musician_name}} on a tired Tuesday, the kind where your mind runs ahead of your body.
      I am writing to you as someone who needed {{topic_anchor}} to stop feeling like a verdict about my future.
      The pages ahead braid somatic practice with {{musician_name}}'s {{genre}} work on {{theme}} — not as decoration,
      but as a second voice beside yours while you practice staying present. For {{persona_anchor}} readers carrying
      anxiety like static in the ears, this book is meant to be slow: small experiments, honest language, and music
      that asks nothing of you except the next breath. When a line from {{musician_name}} lands, let it be permission
      to feel without narrating yourself into a corner. You are not late to your own healing; you are simply trying
      something careful, in plain sight.
  - body: |
      I came to {{musician_name}} after I stopped pretending {{topic_anchor}} was only stress I could schedule away.
      What I want you to know, as a reader moving through this book, is that the songs referenced here are anchors —
      not instructions. {{musician_name}} writes in a {{genre}} register about {{theme}}, and the exercises invite your
      nervous system to answer without performing insight. This pairing is for {{persona_anchor}} humans who are tired
      of being brave on empty: the music meets you where apology-habits live, and the somatic beats give you something
      to do with your hands, jaw, and breath while truth arrives quietly. Stay curious about small shifts; they count.
  - body: |
      Before Chapter 1 begins, I want you to hear why {{musician_name}} sits next to you in this {{topic_anchor}} journey.
      I kept returning to {{musician_name}}'s work because it refuses easy catharsis; the {{genre}} textures hold {{theme}}
      without rushing closure. That matches how this book treats anxiety for {{persona_anchor}} readers — as signal, not
      character flaw. You will see lyrics and reflections as doorways: enter when you want, skip when you need silence.
      Nothing here replaces care you get from trusted people and professionals; it adds a rhythm so your body can follow
      a gentler argument than the one your mind rehearses at 2 a.m.
