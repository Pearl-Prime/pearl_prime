atom_id: test_artist_alpha_CONCLUSION_2P
variants:
  - body: |
      When you close this book, I hope {{musician_name}}'s voice stays as a quiet ally — not a demand, not a brand promise.
      You practiced {{topic_anchor}} with {{persona_anchor}} specificity: breath, boundaries, and the courage to name fear
      without fusing to it. Carry {{theme}} forward the way {{musician_name}} does in {{genre}} form: small honest returns,
      fewer performances of okay-ness. If one lyric became a hand on your shoulder, let that be enough for today.
      Keep the somatic tools nearby; keep {{musician_name}}'s skepticism of hurry; keep your right to heal unevenly.
  - body: |
      The last page is not a finish line. {{musician_name}} would call that mercy. You walked {{topic_anchor}} with tools
      that respect {{persona_anchor}} realities — deadlines, rent, group chats that spike your pulse. Return to any chapter
      when the week narrows; the music blocks are there to widen the room again. Trust the slow evidence: sleep a little
      closer, jaw a little softer, {{theme}} named without a jury. Thank yourself for reading with your body involved,
      not only your intellect. That is the kind of {{genre}} attention {{musician_name}} models, and it can stay yours.
  - body: |
      I am glad you stayed. This book was built so {{musician_name}}'s {{genre}} sensibility could keep whispering {{theme}}
      while you practiced relief from {{topic_anchor}}. If you are {{persona_anchor}} and used to measuring worth by
      throughput, consider this closing permission: rest is not betrayal. Let the final songs you encountered be reminders
      that healing can sound like understatement. Share what helped; hide what is private; come back when the world gets
      loud again. You already proved you can read with your breath involved — that matters more than any single chapter score.
