body: "You've been given a lot of signals that your value is conditional on performance. Conditional value produces constant monitoring. You monitor to see if you're still meeting the condition. The overthinking is partly that monitoring, running in the background, checking whether you're still okay. What changes it isn't performing better. It's slowly, imperfectly, starting to believe the value might not be that conditional."
