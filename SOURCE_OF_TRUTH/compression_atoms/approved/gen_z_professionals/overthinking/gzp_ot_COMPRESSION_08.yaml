body: "The shame about overthinking is its own layer. You're ashamed of the loop, so you think about the shame, and now there are two loops. Letting go of the shame doesn't mean the overthinking stops. It means you stop wasting energy fighting yourself on top of the overthinking. One loop is more workable than two. Start by removing the judgment."
