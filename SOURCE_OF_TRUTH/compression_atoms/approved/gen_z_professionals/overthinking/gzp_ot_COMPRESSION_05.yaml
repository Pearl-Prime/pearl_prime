body: "The spiral has momentum because each thought generates the next one. There's no natural stopping point built into the system. What creates a stopping point is not willpower. Willpower is just more thinking. What creates a stopping point is a different kind of input entirely, something physical, sensory, relational, that asks the nervous system to shift registers rather than push harder in the same direction."
