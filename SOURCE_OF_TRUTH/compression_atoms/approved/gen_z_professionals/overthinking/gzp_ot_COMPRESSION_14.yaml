body: "The grief in the loop is real. Something is being mourned. The certainty you were supposed to have by now, the clarity, the direction that was supposed to feel clear at this stage. The overthinking is partly trying to reconstruct that certainty through analysis. It won't work that way. But naming the grief is different from staying in the loop about it."
