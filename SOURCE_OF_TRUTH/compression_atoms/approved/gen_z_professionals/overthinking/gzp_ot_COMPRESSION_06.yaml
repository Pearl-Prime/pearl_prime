body: "Your awareness of systemic problems is not the cause of your overthinking. But it does raise the stakes of every decision, which raises the volume of every loop. When you understand that the world is complicated and unfair, it makes simple choices feel like moral weight-bearing events. Some of that weight is real. But not all of it. The overthinking can't always tell the difference."
