body: "Overthinking feels like preparation. It has the texture of being responsible. That's the trap. Real preparation has an endpoint. Real preparation produces something usable. When the thinking goes past usable and into runaway, it stopped being preparation and became a way of tolerating anxiety without acknowledging that anxiety is what this is."
