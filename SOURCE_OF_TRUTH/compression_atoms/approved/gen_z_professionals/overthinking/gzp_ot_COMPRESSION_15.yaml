body: "Healing doesn't announce itself. It shows up as slightly longer gaps between loops. As catching yourself earlier in the spiral. As one morning where the first thought wasn't anxious. These are small and easy to dismiss as coincidence. They're not coincidence. They're evidence that something is shifting. The work doesn't always produce dramatic change. Sometimes it just produces less noise, and that counts."
