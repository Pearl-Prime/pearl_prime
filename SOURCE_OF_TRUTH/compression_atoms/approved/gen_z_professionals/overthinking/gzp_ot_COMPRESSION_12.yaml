body: "The anxiety about the future is often louder than the future itself, when it arrives, turns out to be. The overthinking projects forward into a version of the future that is maximally difficult. The actual future tends to be more ordinary. This doesn't stop the projection. But it's worth noting that the real version has been more survivable than the imagined one."
