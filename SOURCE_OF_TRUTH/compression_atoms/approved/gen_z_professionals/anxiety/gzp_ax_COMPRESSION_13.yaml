body: "Your body was in this before your mind knew what was happening. The shoulders tightened. The breath got shallow. The jaw held. These were the first signals. The overthinking came after, as an explanation for sensations that were already there. Starting from the body isn't a workaround. It's getting to the source earlier in the sequence, before the mind builds a whole story around it."
