body: "There is a difference between thinking about a problem and being stuck in a loop about a problem. Thinking moves. It builds on itself toward something new. The loop returns to the same material repeatedly without building. If you've thought about something ten times and arrived at the same place ten times, it's a loop. Loops don't need more thinking. They need something else."
