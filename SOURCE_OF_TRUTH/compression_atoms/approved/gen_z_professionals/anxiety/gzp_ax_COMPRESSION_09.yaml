body: "Rest doesn't register as productive, so you don't do it, so you run on less sleep and lower cognitive reserve, so the overthinking has more room to run. The solution your overthinking is looking for might not be a better argument. It might be six hours of uninterrupted sleep and nothing you need to figure out for forty minutes."
