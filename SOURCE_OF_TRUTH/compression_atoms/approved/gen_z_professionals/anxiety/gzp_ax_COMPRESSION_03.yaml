body: "You can't think your way to a feeling of safety. Thinking and safety use different systems. Safety lives in the body, in patterns of breath and muscle and rhythm that the analytical mind doesn't control. You can think about safety all day and not arrive there. You have to come through a different door. That door is slower and less familiar."
