atom_id: junko_PERMISSION_007
band: 2
body: あなたは自分の思考や感情を他人に明かす必要はありません。それらはあなたと自分自身との間のものなのです。他者に開示するかどうかはあなたの判断次第です。他の誰にも任せないでください。
