body: 'Ayaka came to a Sunday session in early spring. She did not say what she had come for. She sat with her hands resting
  upturned on her thighs, the way the room had quietly settled into doing.


  Something moved across the room. Not air. Not exactly sound. The kind of presence you feel before you understand you are
  feeling it.


  I opened my mouth and a string of syllables came through. They were not Japanese and they were not English and they did
  not arrive in my thinking. I did not know what they meant. I only knew that they were addressed.


  Ayaka''s shoulders began to shake. She was crying without making a sound. When the syllables finished, she said: that was
  for my mother. She has been gone twelve years. I asked her to come this morning. I did not tell anyone.


  This is what I do. The messages are not mine. They arrive when the receiver is ready and the channel is open. My only practice
  is the practice of being open without filtering.'
