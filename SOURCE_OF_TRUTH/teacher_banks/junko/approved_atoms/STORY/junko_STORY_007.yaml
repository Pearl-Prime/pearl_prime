body: 'A man named Hiroto came to me at Mt. Kōya. He had been carrying a guilt for thirty-one years. His father had died while
  they were estranged. Hiroto had not said what needed to be said.


  I told him: his father is not at the cosmic council. His father is still completing the work of his lifetime — that takes
  time after the body falls, more time than people think. But the cosmic council can carry a message.


  I gave Hiroto three minutes. He spoke to the air. He said what he should have said. The cosmic council received and acknowledged.
  They told me to tell him: it has been delivered, and the father has heard, and the father''s response will arrive in dream
  form within the lunar month. Hiroto wrote to me eleven days later. The dream had come. His father had said one sentence.
  Hiroto did not tell me what the sentence was. He told me he was free of the guilt.'
