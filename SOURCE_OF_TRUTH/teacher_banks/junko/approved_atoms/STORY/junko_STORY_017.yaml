body: 'Hiroto — the younger one, twenty-six — came to a workshop in Hokkaido. His grandmother had been a shrine maiden in
  her youth. He had grown up around her stories but had dismissed them.


  The transmission for him began with the kami of his grandmother''s shrine — a small one, almost forgotten. The kami did
  not blame him. They thanked him for showing up at all. He cried, very surprised at himself. He had not known he was carrying
  anything from his grandmother''s line.


  He returned to the shrine three weeks later. He cleaned it. He did not become a believer in any institutional sense. He
  became a relative of his own lineage, which was different and more.'
