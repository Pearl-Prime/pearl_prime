body: 'Kaoru was thirty-six and had been told she could not have children. The medical reasons were specific. She had not
  come to me to ask about this. She had come about her work — she felt she was supposed to be doing something else, something
  larger, and she did not know what.


  The cosmic council answered her about her work. They also, unprompted, addressed the question she had not asked. They said
  the child was not in this lifetime. They said this very plainly, not as cruelty, as fact. They said the larger thing she
  was here to do was the mothering she would do for many people who were not her biological children. She heard this and stopped
  crying about the medical news that day.


  Two years later she opened a school. Forty-seven children passed through it in its first year. She wrote to tell me the
  cosmic council had been right about her work. The other matter, she said, she had also made peace with.'
