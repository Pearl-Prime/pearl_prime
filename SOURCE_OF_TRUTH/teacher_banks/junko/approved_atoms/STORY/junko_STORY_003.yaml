body: 'Shiori had been adopted. She did not know who her birth mother was. She came to a session in Yokohama, ostensibly about
  anxiety. The anxiety was the surface.


  I did not ask about her birth mother. The information was not mine to ask about. But when the transmission began, two presences
  were in the room — one her birth mother in this lifetime, and one her soul-mother across many lifetimes.


  The soul-mother had a frequency Shiori recognized immediately. She was sobbing before I had translated anything. There was
  nothing to translate. The recognition had happened in the body, the way recognition does.


  Shiori later found her birth mother through ordinary means — a registry, a phone call, a journey. But the cosmic recognition
  had already happened. The earthly meeting was confirmation, not discovery.'
