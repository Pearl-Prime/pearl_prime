body: 'Daichi was a programmer in Osaka. He had a recurring dream of being on a ship in a storm — not a modern ship, an old
  one, with wooden masts. The dream had come every six weeks for fourteen years.


  In the session, I did not ask him to describe the dream. I asked him to close his eyes. Within a minute, the ship was in
  the room. He could feel the wood of the deck under his feet. Light Language arrived and named the captain — a man who had
  died in a storm off Cape Horn in 1847.


  Daichi was the captain. He had not finished the voyage. The cosmic council had been waiting for him to be ready to receive
  this, and his body had been waiting longer.


  After the session, the dream stopped. He never had it again. He told me this two years later, by email.'
