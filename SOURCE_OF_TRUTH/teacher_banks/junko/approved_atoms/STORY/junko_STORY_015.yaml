body: 'The retreat at Yakushima. The cedars there are between two and three thousand years old. The trees themselves are nodes
  in the cosmic council. They do not transmit through me; they transmit through the receivers directly. I am incidental at
  Yakushima.


  A woman named Sayuri came up to me after a morning sitting. She said the oldest cedar had told her that her work in this
  lifetime was almost finished, and that she should rest into the finishing rather than try to extend it. She was forty-seven
  and healthy. She said she did not know what the cedar meant. I told her: the cedars are not always literal. Sometimes the
  finishing they speak of is the finishing of a chapter, and a new one begins.


  A year later she left her work and began another. She said the cedar had been correct, and that the rest had been necessary.'
