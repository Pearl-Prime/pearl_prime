body: 'A retreat at Hakone, in the autumn. The hot springs were busy. We held the workshop in the small annex of an old inn.
  The transmissions were specific that weekend. They were preparing the receivers for what they called "the next descent of
  energy" — a phrase I do not always understand when I transmit it.


  A woman named Mai — late forties, a graphic designer — received the strongest transmission I had ever passed. Her body shook
  for nine minutes. She afterward described it as feeling like a circuit board being installed. She said she could feel the
  soldering. The cosmic council had upgraded her, she said, and used the word upgrade as a literal description, which is what
  it is.'
