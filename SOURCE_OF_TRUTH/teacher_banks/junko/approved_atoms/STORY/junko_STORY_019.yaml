body: 'A man named Reuben — Argentinian, fifty-four — came to a workshop in Patagonia. He was an academic. He had been mocking
  spirituality for thirty years and had also been afraid of it for thirty years.


  The cosmic council did not mock him in return. They were direct. They said: you have spent thirty years building defenses
  against what you most want. The defenses are tired. You may put them down.


  He put them down in the workshop. He wept, then laughed, then could not speak. He had not known he could feel this much.
  He returned the next year. He had become a more honest scholar in the interim. The honesty came from receiving, not from
  arguing.'
