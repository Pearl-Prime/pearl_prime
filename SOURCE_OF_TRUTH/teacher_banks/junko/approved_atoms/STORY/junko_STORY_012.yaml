body: 'A workshop near Lake Biwa. The water was still. A man named Toshi sat near the back. He was a doctor. He had come because
  his patients were dying differently than they had ten years ago — quieter, more aware, less afraid.


  The cosmic council told me: the Age of Air has begun. The dying is changing because the souls are remembering. The doctors
  are witnesses to a transition the medical schools have not taught. Toshi did not write any of this down. He stopped pretending
  he did not see what he was seeing. That was enough.'
