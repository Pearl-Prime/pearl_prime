body: 'Nanami''s mother — a woman named Setsuko — came to me a year after her daughter had. She was seventy-one. She had outlived
  her husband. She had loved him and not always liked him. She came carrying both.


  The cosmic council was efficient. They had her husband appear briefly. He apologized for one specific thing he had not apologized
  for in life. Setsuko was the only one who knew what it was. She nodded. Tears arrived without sobbing.


  The council told me to tell her: the work of this lifetime is almost finished, but the finishing should not be rushed. The
  work of being at peace is the work now. Setsuko stayed at peace from that day forward. She told her daughter, who told me,
  eighteen months later.'
