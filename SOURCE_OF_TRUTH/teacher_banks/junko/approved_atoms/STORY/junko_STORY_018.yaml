body: |
  Sora walks the long corridor between conference rooms. Kinhin, though she doesn't call it that. Just walking because she needs to not be sitting.

  Her father called this morning. The same call it always is. She said yes to something she won't do. Her stomach holds the lie like a stone.

  She slows her steps. Feels the floor through her shoes. Left foot. Right foot. The stone in her stomach stays.

  A colleague passes and nods. Sora nods back. She doesn't smile. Doesn't perform okayness.

  At the end of the corridor she stops. The stone is still there. She doesn't dissolve it. Doesn't plan the conversation she'll never have with her father. Just stands at the window, the stone exactly where it is, the light doing what light does.

  Nothing is fixed. She already knew that. But for a moment she stops asking the stone to leave.
