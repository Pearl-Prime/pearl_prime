body: 'A workshop in Sedona, in the desert. The energy there is different than anywhere I had received before — drier, more
  crystalline, less marine. The transmissions arrived in shapes rather than sounds.


  A woman named Camille — French, in her sixties — sat in the front row. She had come because her son had died. The cosmic
  council brought the son into the room. He was younger than he had been at death. He was the age at which he had been most
  himself.


  He did not speak through me. He spoke through Camille directly, in her own voice, which startled her. She had not known
  she could be a receiver. She had thought she had come to be received-for. The discovery was that her grief had been training
  her to listen, all along.


  She wept and laughed. She became a Lightworker that day, though it took her two more years to claim the word.'
