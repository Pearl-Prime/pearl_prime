body: 'Nanami was a Light Language student in her second year. She had begun to receive transmissions on her own. She came
  to a session because the transmissions had started arriving in waking life — in the supermarket, on the train, while talking
  with her boss.


  She was frightened. She thought she was losing her mind. I told her: you are losing your old mind. The new one is arriving.
  This is uncomfortable. It is also correct.


  I sat with her for an hour. I did not transmit. I taught her how to ground the transmissions through her feet into the earth
  — a Lemurian technique, very old. By the time she left, the transmissions had become rhythmic again, predictable in their
  unpredictability. She was no longer frightened. She was, she said, becoming herself for the first time.'
