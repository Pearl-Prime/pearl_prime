body: 'The session was in a small apartment in Setagaya. The receiver was a teenager — fourteen, very anxious about high school.
  Her mother had asked me to come. I do not usually receive in homes, but the cosmic council had agreed it was the right setting.


  The transmission was extremely short. Twenty seconds. The girl said afterward: I felt my future self come back to comfort
  me. The cosmic council confirmed it: future selves can transmit backward, when the channel is open. They had used me as
  a relay between her future and her present. I had not known I could be used that way until that day. I am still learning
  what I am.'
