body: 'Daichi — a younger Daichi, sixteen — came with his mother. He had not slept well in two years. He had been called for
  the second time in his life, but he was too young to know what calling meant.


  The cosmic council was patient. They do not rush a sixteen-year-old. They told me to tell him only this: you are not broken.
  You are arriving. The arriving takes longer than you think. The sleep will return when the channel is set. The channel will
  be set in your nineteenth year. Until then, you have permission to rest with the work that is unfinished.


  He took this in as if he had been waiting to hear it. He slept through that night, his mother told me. He did not sleep
  through every night after, but he understood what the sleeplessness was about, which was what he had needed.'
