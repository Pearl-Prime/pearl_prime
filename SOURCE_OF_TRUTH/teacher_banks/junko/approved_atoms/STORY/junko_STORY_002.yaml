body: 'Maki had been a corporate executive in Tokyo for eighteen years. She came to a retreat in Miyajima because her body
  had started refusing — waking at three, refusing food at the dinners she was supposed to attend, refusing the words her
  colleagues required of her.


  The first morning, she sat at the back of the hall. I did not address her directly. I addressed the air above her left shoulder,
  because that is where her grandmother was standing.


  Her grandmother had been a kami-medium in the small village they came from. Maki had not known this. Her mother had not
  told her. The cosmic council asked me to tell her, so I told her.


  By the third day, Maki was speaking to the air above her own left shoulder. The transmissions arrived for her in her native
  voice. She did not need a translator. She had been waiting forty-three years to remember.'
