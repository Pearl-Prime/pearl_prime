body: 'Ayaka — a different Ayaka, the one from Hokkaido — came to the workshop with a cancer diagnosis. Stage three. She did
  not want me to heal her. She wanted to know what her soul was using this for.


  The cosmic council was gentle. They said: the body is finishing a contract. The soul is not finishing. The work continues
  after the body. They said: she has time enough to do the thing she came here to do, and the body is helping her see what
  the thing is. They told her what the thing was. It was very small and very specific — a conversation she had been avoiding
  with one person.


  She had the conversation. She lived nine more months. The conversation took the first of those nine months. The other eight
  she used to be at peace. She wrote to me a week before she died, to thank me. I do not heal anyone. I only carry the message.
  The healing or not-healing is between the soul and the council.'
