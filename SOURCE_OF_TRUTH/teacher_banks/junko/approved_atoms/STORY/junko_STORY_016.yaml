body: 'Kaoru — a different Kaoru, the architect — came to a session in Tokyo. She was thirty-nine. She had recently bought
  an old house in Kamakura. She had not told anyone, but the house spoke to her at night.


  The cosmic council confirmed: the house has memory, and the memory wants to be acknowledged. I gave her a practice — to
  sit in each room for fifteen minutes, asking nothing, only listening.


  She did this for three months. The dreams that had been agitated became coherent. The previous owner, a woman who had died
  in the house, was thanking her for caring for it. Kaoru had not believed in ghosts. She did not have to believe. She only
  had to listen. The listening was the entire practice.'
