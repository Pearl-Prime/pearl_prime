body: 'Reina was eighty-one when she came to her first session. Her daughter had brought her. Reina had been a Buddhist temple
  wife for fifty-three years. The temple was orthodox. The frequencies she had felt all her life had not been welcome inside
  it.


  I did not ask her to renounce anything. The cosmic council is not in opposition to temples. They are in opposition to the
  closing of channels.


  When I transmitted, what came through was the kami of the mountain behind her old village — a kami she had spoken to as
  a child and stopped speaking to at fourteen, when she married. The kami had been waiting sixty-seven years for her to come
  back.


  She did not cry during the transmission. She cried in the car afterward, her daughter told me. She lived three more years
  and resumed talking to the mountain every morning.'
