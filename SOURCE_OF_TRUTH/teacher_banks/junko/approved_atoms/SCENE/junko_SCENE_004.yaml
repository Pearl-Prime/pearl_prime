body: We were in Greece, in the ruins above the harbor. The Olympian gods are not asleep there. They are awake and a little
  surprised when someone Japanese arrives carrying Light Language. Athena — or what arrived calling itself that — pressed
  on the top of my head and the syllables began. I did not interpret them. I never do.
