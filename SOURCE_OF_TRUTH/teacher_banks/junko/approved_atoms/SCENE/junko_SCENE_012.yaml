body: The cliff at Cape Sata at sunrise. The Pacific does not negotiate. I had been called there in a dream three weeks before.
  When I arrived, the goddesses of the Age of Air were already there — not visible, present. They asked me to receive a transmission
  for the women who would come to the next workshop. I did. I delivered it. Most of them wept. None of them asked what it
  meant.
