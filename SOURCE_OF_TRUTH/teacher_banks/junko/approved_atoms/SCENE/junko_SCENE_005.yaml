body: 'The shrine at Inari was crowded with tourists. We stood at the second torii gate. The fox-deities are not metaphor.
  They are present. The youngest woman in our group felt them first — her hands went hot, then her crown. I told her: you
  do not have to know what is happening. You only have to let it.'
