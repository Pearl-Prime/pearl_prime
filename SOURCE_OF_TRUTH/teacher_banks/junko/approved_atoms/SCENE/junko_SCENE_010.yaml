body: The night before the retreat, the cosmic council attended me in sleep. I do not remember the agenda. I never do. I woke
  at three in the morning and wrote down a sentence that did not make sense to me. By the time the workshop opened the next
  morning, the sentence had become the through-line of the whole day. They had given me the title in advance.
