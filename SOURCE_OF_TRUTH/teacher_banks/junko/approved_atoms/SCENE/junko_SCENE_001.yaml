body: The workshop room was full. The light through the western window was the kind that arrives in early evening — gold without
  warmth yet, just brightness. I had spoken for an hour. Then I stopped speaking. A string of syllables came through that
  were not Japanese and were not English. Three people in the room began to weep at once. We did not need to translate. The
  frequency translated itself.
