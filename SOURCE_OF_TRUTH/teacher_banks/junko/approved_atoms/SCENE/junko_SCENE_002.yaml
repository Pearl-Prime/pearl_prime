body: The retreat was held at Mt. Kōya. We sat in the small wooden hall after the formal pilgrimage. The candles were the
  temple's, not ours. I closed my eyes and the cosmic council was already there — not as an image, as a pressure of attention.
  They have a particular density when they arrive together. The room did too.
