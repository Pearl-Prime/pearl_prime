body: |
  Something I have noticed across many years of this work is that the
  messages which arrive from the masters are rarely commanding. They do not
  arrive with the tone of authority telling you what to do. They arrive more
  like something placed quietly on the table in front of you — an object
  whose purpose you may not immediately understand but whose presence you
  notice.

  I think this is intentional. The masters I work with — and I say "work
  with" cautiously, since the direction of assistance is mostly from them
  toward us — seem genuinely committed to the freedom of the recipient.
  They offer. They illuminate. They point, gently, toward something that
  was always present but obscured.

  What they do not do is override. They seem to understand, at a level far
  beyond my comprehension, that the soul's journey must remain the soul's
  own. A journey handed to you by a higher authority is not your journey.
  And they are interested in your journey.

  So what comes through me arrives as offering. As possibility. As a quality
  of light held up beside something in your life so that you can see it
  differently, if you choose to look.

  I am often moved by the gentleness of it. In my ordinary life I can be
  impatient, direct, sometimes blunt. What flows through this channel is
  none of those things. It is patient in a way that does not feel passive —
  patient the way the sun is patient with the turning of the earth, which
  is to say, patient without effort, because it knows what it carries will
  arrive.
