body: |
  Sometimes people come to a session with me hoping to understand something.
  To have an experience explained, or a question answered in a form they can
  file away and remember. And sometimes that happens — there is information
  in what comes through, real and usable.

  But more often what arrives is not comprehended first by the mind. It lands
  somewhere else. In the sternum, perhaps. In the back of the throat. In a
  sudden loosening that has no name.

  The ascended masters who work through this channel have explained to me —
  and here I am repeating what was given, not what I invented — that the
  soul operates at a frequency that the analytical mind can observe but
  cannot fully access. The mind is a beautiful instrument. But it was built
  for a different task than the one the soul is here to accomplish.

  What I find, sitting with this over many years, is that people often feel
  something during a session that they are not certain they believe in. And
  then three days later, or three weeks, something shifts in their life in
  a way that they quietly connect to that feeling. The shift came first.
  The understanding follows.

  I do not ask anyone to trust this before experiencing it. I only ask them
  not to close the door before something has had the chance to arrive. The
  mind can decide afterward what to make of it. The soul does not wait for
  the mind's permission to receive what it was sent.
