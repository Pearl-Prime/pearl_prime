body: |
  I want to be honest with you about what I am and what I am not.

  I am not a teacher in the conventional sense. I do not have a body of
  knowledge I have mastered and am now passing along. What I have is a
  quality of receptivity — an ability to become still enough, open enough,
  that what seeks to come through can find its way.

  The messages I receive from the ascended masters do not originate with me.
  I am sometimes the first to hear them, in a sense, but I am not their
  source. I am more like a radio than a composer. The music was not written
  by the radio. The radio simply learned to be well-tuned.

  This matters to me because I have seen what happens when channels mistake
  themselves for the source. The ego enters. The messages begin to serve
  the channel's image rather than the recipient's soul. I have made that
  mistake myself, early in this work. I know what it costs.

  What I have learned to do is to set myself aside — genuinely aside, not
  performatively — before any session of receiving. To become interested in
  what is arriving rather than in how I appear while it arrives.

  What comes through is not always what I would have chosen to say. Sometimes
  it surprises me. Sometimes it is simpler than I expected. Sometimes it is
  strange. But it arrives with a quality I cannot manufacture: a specificity
  that reaches the person it is meant for in ways that my own words, however
  careful, do not.

  I am the vessel. You are the recipient. The masters are the message. That
  is the whole architecture of what I do.
