body: |
  The first time light language came through me, I did not know what was
  happening. Sounds emerged that were not from any language I knew. Tones,
  cadences, something like syllables but not built from any alphabet. I was
  frightened, briefly. Then I felt what the sounds were carrying, and the
  fear dissolved.

  Light language, as I understand it now — and I hold this understanding
  lightly, because it arrives piece by piece — is a form of transmission
  that bypasses the translation layer. Human language encodes experience into
  symbols that the listener must then decode. Something is always lost in
  both directions.

  What comes through in light language does not ask to be decoded. It acts
  directly on the field of the person receiving it. I sometimes describe it
  as a tuning — the way a skilled hand adjusts the frequencies of a
  stringed instrument not by explaining music theory but by listening and
  turning the peg until the note rings true.

  I do not control what sounds come through or when. I am sometimes as
  surprised as the person sitting across from me. What I have noticed is
  that there is a quality of precision to it — specific sounds seem to
  correspond to specific places in specific people, though I could not tell
  you how I know this while it is happening.

  I wonder at this every time. I find that wondering is the right response.
  The moment I believe I fully understand it, I have probably stopped
  receiving it.
