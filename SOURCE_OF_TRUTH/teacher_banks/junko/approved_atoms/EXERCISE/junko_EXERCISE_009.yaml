band: 2
body: 'Cosmic Council Invitation (Dream Setting)

  Before sleep, speak this sentence: I am available to the council in the night. I will not need to remember what arrives.
  Place a pen and notebook beside the bed. Write whatever is present on waking — single words count. The body remembers.'
