atom_id: junko_EXERCISE_006
band: 2
body: 'Power-Spot Pilgrimage (Half-Day)

  Choose a shrine, mountain, or coastline you have felt drawn to. Travel there. Sit for at least one hour without an agenda.
  Do not photograph. Do not document. Let the place do its work. Return home and rest for the remainder of the day.'
