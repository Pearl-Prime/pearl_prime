atom_id: junko_EXERCISE_002
band: 2
body: 'Receptive Sitting — The Listening Posture

  Sit upright. Place hands palms-up on the thighs. Close the eyes. Do not direct attention anywhere. Allow attention to be
  available. After ten minutes, notice what arrived — not what you sought. The arriving is the practice.'
