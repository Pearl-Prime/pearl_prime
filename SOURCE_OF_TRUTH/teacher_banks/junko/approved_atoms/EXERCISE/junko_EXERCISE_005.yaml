atom_id: junko_EXERCISE_005
band: 2
body: 'Crown Opening

  Lie on the floor. Place a small object — a stone, a crystal, a piece of wood — on the top of the head. Breathe normally
  for fifteen minutes. Notice what attends. Removing the object closes the practice. Do not perform this for more than twenty
  minutes at first.'
