atom_id: junko_EXERCISE_001
band: 2
body: 'Light Language Opening — Tone Without Meaning

  For ten minutes, allow a single tone to come out of your mouth. Do not assign meaning. Do not shape the tone with intent.
  Let the tone be whatever wants to arrive. The body of a Light Language channel is built by allowing tone before language.'
