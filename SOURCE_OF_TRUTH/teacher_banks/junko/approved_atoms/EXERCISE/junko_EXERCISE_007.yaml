atom_id: junko_EXERCISE_007
band: 2
body: 'Ancestor Greeting (Three-Generation Reach)

  Sit at the home altar (if you have one) or at a simple cleared surface. Light a single candle. Speak the names of three
  generations of women on your mother''s side. After each name, pause for thirty seconds. The pause is the reception.'
