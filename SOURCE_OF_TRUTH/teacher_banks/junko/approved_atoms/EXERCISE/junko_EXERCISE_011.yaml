atom_id: junko_EXERCISE_011
band: 2
body: 'Resonance Locating (Two Hands)

  Place one hand on the chest, one on the belly. Breathe. Notice which hand feels a resonance first. That hand is the current
  channel-point of the day. Sit with it for ten minutes. The channel-point shifts day to day. The locating is part of the
  practice.'
