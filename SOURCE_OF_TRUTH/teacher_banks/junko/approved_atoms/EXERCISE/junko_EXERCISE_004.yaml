atom_id: junko_EXERCISE_004
band: 2
body: 'Frequency Walk

  Walk for thirty minutes in a place that has natural water — river, ocean, lake. Do not listen to music. Do not phone. Let
  the water''s frequency entrain your breathing. The body returns to source-frequency. The mind comes along.'
