atom_id: junko_EXERCISE_010
band: 2
body: 'Sky-Looking Practice

  At dusk or dawn, look at the sky for fifteen minutes without moving. The sky is older than every receiving you have done.
  Letting it work on you is one of the oldest practices, older than language.'
