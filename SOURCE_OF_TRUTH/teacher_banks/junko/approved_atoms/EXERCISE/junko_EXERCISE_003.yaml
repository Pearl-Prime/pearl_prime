atom_id: junko_EXERCISE_003
band: 2
body: 'Gohōgō Breath (Transmission Anchor, Not Buddhist Ritual)

  Breathe in for six counts; hold for two; release for eight. Repeat for ten cycles. On the release, allow a syllable to leave
  the body without choosing it. This is a transmission anchor, not a Shingon initiation; the form is borrowed, the intent
  is reception.'
