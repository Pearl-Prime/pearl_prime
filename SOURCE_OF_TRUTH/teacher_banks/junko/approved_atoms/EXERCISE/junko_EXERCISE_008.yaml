atom_id: junko_EXERCISE_008
band: 2
body: 'Light Language Breathing (Group of Two)

  Sit facing a partner. Close eyes. For ten minutes, allow whatever sound wants to emerge — humming, syllables, silences.
  The other person witnesses without responding. Switch and repeat. The witnessed practice strengthens the channel of both.'
