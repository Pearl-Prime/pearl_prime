atom_id: junko_EXERCISE_012
band: 2
body: 'Shrine Sound Receiving

  Visit a Shinto shrine. Listen — not to the human sounds, the bell-rope and the clap, but to whatever is underneath. After
  the formal worship, sit on a stone or bench for ten minutes. Some places transmit through sound at a frequency below human
  voice. The receiving is the practice.'
