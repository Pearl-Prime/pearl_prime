body: |
  There are those who come to me who feel, from very early in their lives,
  that they do not quite belong to the ordinary world. Not in the sense of
  suffering or rejection — though sometimes that too. But in a quieter,
  stranger way. As though they arrived carrying something from a great
  distance, and the earth beneath their feet, though beloved, is not the
  only home they have ever known.

  I recognize this. The tradition I carry holds that some souls carry a
  cosmic origin — a resonance that predates this incarnation, this planet,
  this spiral of time. The ascended masters and light presences who move
  through the lineage of Kurama-yama are themselves of this nature.

  When someone like this comes to sit with me, something happens that is
  difficult to name in ordinary language. It is like a tuning fork responding
  to the note it was built to receive. The cosmic resonance in them stirs.
  It was not absent before. It was waiting for a frequency it could trust.

  I do not ask anyone to believe this. Belief is not required. What I invite
  is simply openness — the willingness to notice what arises when two fields
  meet. The noticing itself is the beginning. And often, very gently, what
  arises is a recognition: I have been here before. Something in me knows
  this light.

  That knowing is the homecoming. Nothing else is needed.
