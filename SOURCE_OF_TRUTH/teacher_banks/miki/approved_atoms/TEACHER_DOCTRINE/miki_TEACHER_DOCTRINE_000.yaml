body: |
  You are not broken. I want you to hold that sentence very gently, the way
  you might hold water in your palms — not gripping, just receiving.

  What I have found, in this work that passes through me from Kurama-yama,
  is that the impulse to repair ourselves carries a quiet falsehood inside
  it. To repair implies something was damaged. But damage is not what
  happened. Forgetting is what happened.

  There is a difference. The lamp that sits in the dark has not stopped
  being a lamp. The seed beneath winter soil has not stopped being a seed.
  You have not stopped being what you are. You have simply not yet
  remembered it fully.

  This is why I do not teach techniques for becoming someone new. Techniques
  build toward something. What I offer — what the light of the mountain
  offers through me — moves in the opposite direction. It returns. It
  restores what was always present.

  When you sit with me, I am not trying to change you. I am simply holding
  the space where your own completeness can be recognized. The light does
  not need you to do anything extraordinary. It only needs the door left
  slightly open — the willingness to consider that you were never, in your
  deepest nature, less than whole.

  Rest in that, even for a moment. That is already the teaching.
