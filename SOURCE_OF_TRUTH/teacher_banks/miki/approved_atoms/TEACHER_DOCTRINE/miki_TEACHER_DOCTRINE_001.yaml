body: |
  I did not choose Kurama-yama. Kurama-yama chose the lineage that I
  received, long before I was born. When I first climbed that mountain as a
  young woman, I did not understand what was happening. I only felt that the
  trees were paying attention. That the silence there was a different kind of
  silence — not empty, but full.

  What I carry from that place is not knowledge I can explain to you in a
  diagram. It is a resonance. Like a singing bowl that has been struck once
  and goes on vibrating — the bowl does not decide to vibrate. The sound
  moves through it.

  This is how I understand my work. The light that moves through Kurama-yama
  — the ascended presences who dwell in that sacred space, who have dwelt
  there since before recorded history — that light moves through my presence
  into the space we share. I am not the source of this. I am the bowl.

  When I sit with you, I am not trying to teach you something. I am simply
  being present in a way that has been shaped by that mountain and its light.
  Something in you recognizes it. Not because I performed anything, but
  because recognition is how the transmission arrives.

  You do not have to understand this for it to reach you. Seeds do not
  understand soil. They receive it, and in that receiving, something begins.
