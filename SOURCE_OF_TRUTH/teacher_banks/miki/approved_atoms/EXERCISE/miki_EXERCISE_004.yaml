atom_id: miki_EXERCISE_004
body: 'Lie down if you can. Let the floor or the bed receive your weight completely.
  You do not need to arrange your body. You do not need to relax in any particular
  way. Just let the surface beneath you hold everything you are carrying right now.
  This is not a relaxation technique. It is a small act of trust — that something
  will hold you without you having to hold yourself.'
