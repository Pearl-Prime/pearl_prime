atom_id: miki_EXERCISE_002
body: 'Go outside, or open a window. Let your attention rest on something living —
  a tree, a plant, the sky, a bird. You are not observing it analytically. You are
  simply allowing yourself to be in the same space as something that is nature. Your
  body is also nature. The two already know each other. Stay as long as feels right.
  There is nothing to do here. Only something to receive.'
