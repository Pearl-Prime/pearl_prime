atom_id: miki_EXERCISE_002
body: |
  If you can be outside, walk slowly through a natural space. If not, you can do this indoors.
  
  The pace: slow enough that you can notice details. Trees, stones, sky, light. The texture of a leaf.
  
  No destination. No performance. Just walking and seeing.
  
  When your mind pulls toward worry or tasks, gently return to what's right in front of you. The moss. The lichen. The way light falls.
  
  Ten to twenty minutes. This is shinrin-yoku in its simplest form: attention given to the natural world as a gift to yourself.
