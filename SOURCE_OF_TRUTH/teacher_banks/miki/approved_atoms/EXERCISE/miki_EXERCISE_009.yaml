atom_id: miki_EXERCISE_009
body: 'Place one hand over your heart and say to yourself, very quietly, the words:
  I am not broken. I have temporarily forgotten something that is still here. You
  do not have to believe this fully. You only have to offer it. Say it slowly, once
  or twice, and let your body respond to the sound of it before your mind decides
  what to do with it.'
