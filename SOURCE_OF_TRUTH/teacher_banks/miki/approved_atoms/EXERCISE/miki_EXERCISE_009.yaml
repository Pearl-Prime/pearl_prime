atom_id: miki_EXERCISE_009
body: |
  Sit somewhere quiet. Bring to mind a moment of feeling overwhelmed or anxious. Notice where this lives in your body.
  
  Now, shift your attention to nature. Something you've seen recently—a tree, the sky, water, a bird.
  
  Notice the quality of presence in that natural thing. The tree doesn't worry. The water doesn't question.
  
  Can you borrow a little of that quality? Not by forcing it, but by letting nature teach your nervous system about what presence actually feels like.
  
  Pendulate between the difficulty and the nature. Ten minutes.
