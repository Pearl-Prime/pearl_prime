atom_id: miki_EXERCISE_001
body: |
  Sit somewhere you can be still. This practice is about sensation.
  
  Bring attention to your skin. The place where your body meets the air. Feel the temperature. The texture of fabric if you're clothed.
  
  Move your awareness slowly: your hands, your arms, your face, your neck. Not moving your body. Just noticing sensation.
  
  When you find a place of tension or discomfort, don't try to fix it. Just acknowledge it: *here is sensation*. Warm or cool, tight or loose.
  
  Let your attention be gentle, like a light breeze across your skin. Ten minutes of simply noticing what your body is telling you.
