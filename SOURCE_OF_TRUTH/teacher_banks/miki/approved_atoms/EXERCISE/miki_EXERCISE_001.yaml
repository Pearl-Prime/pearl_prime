atom_id: miki_EXERCISE_001
body: 'Place one hand on your heart. Do nothing else. You are not trying to feel something,
  or to breathe in a particular way, or to achieve any state. You are simply resting
  your hand there, the way you might rest your hand on the shoulder of someone you
  love. Stay for three to five minutes. This is not a technique. It is a way of offering
  the body your attention without agenda. Something in the body often responds to
  this kind of presence. You do not need to understand what happens. You only need
  to receive it.'
