atom_id: miki_EXERCISE_007
body: |
  When you're feeling overwhelmed, step outside if you can. Or open a window.
  
  Notice the quality of light. The air temperature. Any sound.
  
  This is a sensory grounding exercise. You're not trying to calm yourself through willpower. You're simply giving your nervous system access to the natural world.
  
  Feel the ground beneath your feet. The air on your skin. The light in your eyes.
  
  Five minutes of sensory presence with nature. This small boundary between overwhelm and presence can reset something.
