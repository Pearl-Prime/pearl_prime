atom_id: miki_EXERCISE_007
body: 'Think of something in your life you have been trying very hard to fix or change.
  For the next three minutes, allow yourself to stop trying. Not forever — just for
  these three minutes. Let whatever is there simply be there. Notice what your body
  does when you stop fighting. This is not giving up. This is making space for something
  other than effort.'
