atom_id: miki_EXERCISE_010
body: 'At some point today, simply stop what you are doing for two minutes. Sit or
  stand. Let your body be still. You are not meditating. You are not clearing your
  mind. You are simply pausing in the middle of your ordinary life, the way a person
  pauses at the threshold of a door. Something is already present in that pause.
  You do not have to name it. You only have to let it be there.'
