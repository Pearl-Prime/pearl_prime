atom_id: miki_EXERCISE_010
body: |
  Walk barefoot on natural ground if you can—earth, grass, sand. If not, you can imagine this.
  
  Feel the contact. The texture. The temperature. The solidity of the earth supporting you.
  
  This is a grounding practice. Not in the sense of punishment, but in the sense of *connection*. You are part of nature. Your feet know this.
  
  As you walk, let your nervous system register: I am held. I am supported. I am part of something larger.
  
  Ten minutes. Your whole body will register the safety that comes from connection to earth.
