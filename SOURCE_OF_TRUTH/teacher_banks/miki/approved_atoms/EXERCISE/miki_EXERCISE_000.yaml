atom_id: miki_EXERCISE_000
body: |
  Find a place outside, or if indoors, somewhere near a window.
  
  Sit comfortably. Close your eyes for a moment, then open them softly.
  
  Notice one thing: a plant, a stone, a tree, the sky. Not analyzing it. Just watching.
  
  What color is it? What texture? Is there movement—wind, light, shadow?
  
  Spend five minutes with just this one thing. Let your attention rest on it like water finding its level. When your mind wanders to tasks and worries, gently return to what you're seeing.
  
  This is shinrin-yoku—not "bathing" in any strenuous way. Just presence. Seeing what's already here.
