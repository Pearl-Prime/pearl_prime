atom_id: miki_EXERCISE_011
body: 'Hold something warm — a cup of tea, a warm cloth, your own hands folded together.
  Let the warmth arrive in your palms. You are not doing anything with it. You are
  only receiving it. Warmth is a transmission. Your body knows how to receive warmth.
  It has known this since before you had language. Let yourself be held by something
  as simple as heat.'
