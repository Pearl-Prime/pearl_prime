atom_id: miki_EXERCISE_011
body: |
  Sit outside if possible. Notice the rhythm of nature around you. Wind. Light. Sound. The movement of living things.
  
  These are not trying to be anything other than what they are. They're not performing.
  
  Let your nervous system absorb this. The permission to simply be.
  
  When thoughts about what you should be doing arise, return to the natural world around you. Trees don't apologize. Water doesn't explain itself.
  
  Fifteen minutes of learning that just existing is enough.
