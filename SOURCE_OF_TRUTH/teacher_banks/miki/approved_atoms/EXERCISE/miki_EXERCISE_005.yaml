atom_id: miki_EXERCISE_005
body: 'Before you sleep tonight, place both hands lightly on your belly. You are not
  doing anything to your breath. You are not trying to slow it or deepen it. You
  are simply placing your hands there as a way of saying to your body: I am here.
  I am not asking anything from you right now. Rest in that contact for as long as
  feels natural. Your body already knows how to sleep. This is just a way of reminding
  it that you are not in the way.'
