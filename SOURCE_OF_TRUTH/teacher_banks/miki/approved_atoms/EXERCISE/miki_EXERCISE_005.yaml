atom_id: miki_EXERCISE_005
body: |
  Go outside or stand by a window. Notice the space between things.
  
  This is ma—the meaningful emptiness. The space between trees. The silence between bird calls. The gap between thoughts.
  
  Bring attention to these spaces. The negative space is as real as the objects themselves.
  
  In your own life, where might there be ma that you're not seeing? Gaps. Pauses. Emptiness. These are not failures. They're part of the whole.
  
  Spend ten minutes noticing what's not there, as carefully as you notice what is.
