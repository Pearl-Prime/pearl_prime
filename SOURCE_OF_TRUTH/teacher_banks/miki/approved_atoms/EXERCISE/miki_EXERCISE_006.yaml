atom_id: miki_EXERCISE_006
body: 'Wherever you are, let your feet feel the ground beneath them. Not a technique —
  just a noticing. The floor or earth beneath you has been holding your weight this
  entire time without requiring anything. Let yourself notice that. You do not have
  to do anything with this awareness. Just let it arrive.'
