atom_id: miki_EXERCISE_006
body: |
  Sit comfortably and bring attention to your breath. Specifically, the natural pause.
  
  Notice the moment when the inhale finishes and before the exhale begins. That gap. That stillness.
  
  There's no need to extend it or control it. Just notice the natural pause that's already there.
  
  This is ma in your own body. The emptiness that's essential. Not something to be filled, but something to be honored.
  
  Spend eight to ten minutes simply resting in the natural pauses of your breath.
