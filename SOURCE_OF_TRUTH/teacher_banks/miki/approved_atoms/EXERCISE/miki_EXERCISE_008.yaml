atom_id: miki_EXERCISE_008
body: 'Sit in natural light if you can, or near a window. Soften your gaze — not
  closing your eyes, just letting your eyes rest without focusing on anything in particular.
  Allow the light in the room to simply be in the room with you. You are not doing
  anything. You are simply present with light. Even this is a form of receiving. Your
  cells are already responding. You do not have to help them.'
