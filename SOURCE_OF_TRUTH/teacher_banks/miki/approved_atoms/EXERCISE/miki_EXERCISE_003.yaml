atom_id: miki_EXERCISE_003
body: |
  Sit near water if possible—a river, a lake, even a fountain. If not possible, imagining water is okay.
  
  Watch the water. How it moves. How it catches light. How it finds its own path, following gravity and contour.
  
  The water doesn't hurry. It doesn't judge itself. It simply flows.
  
  Bring this quality of "flowing without resistance" into your awareness. Where are you holding tension? Where might you soften?
  
  Spend ten minutes just watching water and sensing into your own capacity for softness.
