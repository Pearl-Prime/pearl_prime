atom_id: miki_EXERCISE_003
body: 'Sit quietly and allow yourself to imagine, very softly, that you are receiving
  light — not dramatic light, just a gentle quality of illumination, the way sunlight
  comes through paper shoji screens. You do not have to generate this. You do not
  have to try. Simply be available to the possibility that something is already arriving.
  Rest there for a few minutes. Notice whatever you notice. Then return to your day.'
