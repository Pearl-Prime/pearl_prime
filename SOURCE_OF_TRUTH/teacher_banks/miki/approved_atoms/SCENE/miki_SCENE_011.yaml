body: You have been depleted for so long that you have forgotten what it feels like to be full. During this session you feel, for a moment, something that might be fullness — not overwhelming, just a warmth, like a room filling with afternoon light. You recognize it from somewhere. Then the moment passes, but you know now that it is possible. That knowing is the seed.
