body: You are reading Miki's book — 光の癒し — at a table somewhere ordinary. The apartment is the same. The noise outside is the same. But something in the words has reached somewhere in you that ordinary words do not reach, and the table, the apartment, the noise outside — they feel slightly different now, like a room after a window has been opened.
