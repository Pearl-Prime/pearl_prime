body: The grief is with you, as it has been for months. You sit with Miki and she does not try to move it. She simply lets it be present alongside you both, held in the same light. You feel, for the first time, that the grief is not a problem to be solved. It is a testament. Something in you settles into that understanding like a body settling into warm water.
