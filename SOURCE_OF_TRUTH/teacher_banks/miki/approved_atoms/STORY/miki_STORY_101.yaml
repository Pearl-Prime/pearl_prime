atom_id: miki_STORY_101
body: |
  The meeting is tomorrow at 10am. It is now 11pm.
  Riko has rehearsed the opening three times. Changed it twice.
  She is now rehearsing what she will say if she forgets what to say.
  This is not preparation. This is the mind running laps
  on a track it has already memorized, unable to stop
  because stopping feels more dangerous than continuing.
  Miki calls this the loop that protects itself:
  the thinking that convinces you it is useful
  because the alternative is not knowing.
