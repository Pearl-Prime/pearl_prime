body: |
  Fumi carries shame about her body. She's never felt at home in it. She hides it, moves through the world trying to take up less space. Her shoulders curve inward.

  One summer evening she wades into a cool river. The water holds her. Her body floats. She's still herself—still in her body—but the water makes it easier somehow.

  She realizes something simple: her body is not separate from nature. It's part of it. Made of similar things. Subject to similar laws.

  The shame doesn't vanish. But there's a shift. Her body isn't an object to be judged. It's a creature. Like any other creature in the river, just existing.

  She floats longer.
