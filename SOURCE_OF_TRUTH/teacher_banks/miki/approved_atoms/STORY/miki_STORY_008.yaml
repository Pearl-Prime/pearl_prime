body: 'David had not slept properly in four months. He was forty-four, a secondary
  school principal in Manchester, and the sleep anxiety had taken on its own logic —
  the dread of lying awake produced the lying awake, and the lying awake produced
  more dread. He had tried everything his GP suggested. He had a weighted blanket,
  a white noise machine, a strict sleep hygiene protocol. He lay awake anyway, his
  mind rehearsing tomorrow''s problems.

  He found Miki through Ahjan''s podcast. What he heard was unexpected: Miki speaking
  about the body''s cellular intelligence — the way the body knows how to rest, how
  to restore, how to return to itself if the mind will allow it. She said: your body
  has not forgotten how to sleep. It is waiting for permission to remember.

  David had never thought of it that way. He had been treating sleep as a problem
  to be solved by the right technique. The idea that his body already knew — that it
  was carrying the memory of rest — offered something technique had not. That night
  he lay down without trying to sleep. He simply offered his body permission to remember
  what it knew. He did not expect anything. He was asleep in twenty minutes.'
