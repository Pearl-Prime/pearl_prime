body: 'Lena was thirty-nine and had been at war with her body for as long as she could
  remember — not the dramatic war of an eating disorder, but the low-grade, constant
  war of someone who has never quite made peace with how she inhabited physical space.
  She lived in Stockholm, worked in publishing, and carried a low-level bodily shame
  that she had tried to address with exercise, with nutrition, with therapy.

  A friend told her about Miki''s light healing work — specifically the somatic dimension,
  the way Miki spoke about the body''s innate intelligence, the cellular memory of
  wholeness. Lena was not expecting anything. She sat with a recorded transmission
  one afternoon, eyes closed.

  Miki spoke about the body being nature — not a project, not a performance, but a
  living system that already knows how to be itself. She said: your body carries a
  memory of ease that predates everything you have been taught to think about it.
  Something in Lena went very quiet. Not healed. Not transformed. But something deep
  in her had received a different signal — and the body, she would later say, seemed
  to remember something it had been trying to forget it knew.'
