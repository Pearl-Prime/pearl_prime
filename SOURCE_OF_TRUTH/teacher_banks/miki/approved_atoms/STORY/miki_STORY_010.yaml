body: 'Roberto was fifty-eight when the business he had built for twenty years began
  to fail. He lived in Mexico City. The financial stress had a particular quality —
  not just the practical terror of losing the business, but the deeper fear that without
  it, he did not know who he was. He had built his identity around the thing that
  was dissolving.

  He came to Miki''s work by chance — his daughter had sent him something she thought
  was interesting, not even intending it as a recommendation. He almost didn''t read
  it. He read it at three in the morning when he couldn''t sleep.

  Miki wrote about how the soul''s worth is not lodged in what it has built, but in
  what it is. That worth cannot be dissolved because it is not a construction. It
  is an original fact. Roberto felt something shift when he read that — not comfort,
  exactly, but a different quality of ground beneath his fear. The fear was still
  there. The business was still in trouble. But he was standing on something beneath
  the fear now, something that the financial loss could not reach. He did not have
  a word for it. He trusted it anyway.'
