body: |
  Tomo is anxious about the future. What if she fails? What if she makes the wrong choice? The anxiety loops and loops.

  She takes a walk in a forest and finds herself watching how trees grow. Asymmetrical. Some branches short, some long. Some bent by wind and never straightening. None of them apologizing for it.

  The trees don't know the future either. They just grow in response to what's here—sun, rain, wind, lightning. They adapt as they go. They become crooked and then they keep living.

  Tomo realizes her anxiety is asking her to know something unknowable. But maybe she can be like the tree—responding to what's actually present, not trying to predict the whole course.

  The anxiety doesn't disappear. But it loses its urgency. She can walk without solving it.
