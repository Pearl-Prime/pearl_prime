body: 'Thomas had spent seven years building toward a partnership at the law firm and
  had not gotten it. He was forty-one, based in New York, and the failure had cracked
  something in him that he had not known was load-bearing. He had believed, at some
  level, that the achievement would confirm something about his worth. Now he did
  not know what his worth was built on.

  He was not the kind of person who sought healing. But he had a friend who worked
  with Ahjan, who mentioned Miki, who suggested Thomas just listen to something without
  expecting anything. He listened on the train home.

  What struck him was Miki''s clarity about worth not being lodged in achievement.
  She said it gently, without making him feel foolish for having organized his life
  around the other belief. She spoke about the soul''s original completeness as something
  that predates and survives every professional judgment. Thomas did not believe this,
  exactly. But something in his body responded as if it recognized the truth of it
  before his mind had caught up. He sat on the train and felt something in his chest
  loosen very slightly. The seed was planted. He did not know yet what it would grow.'
