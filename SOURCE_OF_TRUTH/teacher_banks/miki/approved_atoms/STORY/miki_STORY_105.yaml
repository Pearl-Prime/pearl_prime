atom_id: miki_STORY_105
body: |
  The mind that cannot stop is not broken. It is doing its job.
  The job is: find the threat. Neutralize it. Confirm it is gone.
  The problem is that the mind Miki describes does not know
  how to confirm something is gone. Gone is not a state
  the nervous system can verify. So it keeps checking.
  The checking is not anxiety. The checking is the solution
  the nervous system arrived at a long time ago
  when checking actually helped. It helped then.
  Now it runs on its own, solving for a threat
  that has already passed or may never arrive.
