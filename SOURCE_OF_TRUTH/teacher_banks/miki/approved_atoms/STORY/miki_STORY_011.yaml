body: 'Nadia had not felt comfortable in a room full of people since she could remember.
  She was twenty-three, a graduate student in Amsterdam, and the social anxiety was
  something she had learned to work around rather than address — arriving early, leaving
  early, choosing corners, preparing things to say. It was functional but exhausting.
  She was always performing the appearance of ease.

  She discovered Miki through a university wellness program that partnered with Ahjan''s
  platform. She was skeptical of everything described as "healing" — it felt like
  a word for people more broken than she was. But she was tired enough to try.

  What moved her was Miki speaking about the starseed tradition — the idea that certain
  souls carry an innate memory of belonging that the current life has temporarily
  obscured. Nadia did not know if she believed in starseeds. But she recognized the
  feeling Miki described: the sense of being fundamentally foreign in ordinary social
  space. And Miki''s response to it was not a technique for fitting in better. It
  was a transmission of the original belonging that was already hers. Something in
  Nadia''s chest opened quietly, like a door in a house she had forgotten she owned.'
