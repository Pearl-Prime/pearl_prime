body: |
  Attention is the first gift you give yourself. Not self-love. Not forgiveness. Just the simple act of noticing what's actually here.

  When you're anxious, pay attention to your breath. Not to fix it. Just to know: you are breathing. Your body is working.

  When you're ashamed, pay attention to the sensation. Where do you feel it? Your throat? Your chest? Your hands? Not to judge it. Just to know: this is what shame feels like in this particular body.

  When you're burning out, pay attention to one thing that's still beautiful. A tree. A cup of tea. A moment of rain.

  Attention means you stop fighting what's happening and start being present with it. That simple shift changes everything.
