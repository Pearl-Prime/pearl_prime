body: 'Sofia had a list of people she needed to apologize to, people she had let down
  in the years when she had been too depleted to give anything more than the bare
  minimum. She was forty-six, a social worker in São Paulo, and compassion fatigue
  had taken more from her than she had known she possessed. She had left the profession
  briefly. She had come back. She did not know if she had made the right choice.

  When she first heard Miki speak, what stopped her was this: Miki said that a person
  who has given until empty has not failed. They have demonstrated the full depth of
  their capacity to love. The restoration is not a repair. It is a refilling.

  Sofia sat with that for a long time. She had been treating her depletion as evidence
  of weakness, of insufficient professional boundaries, of something she had done
  wrong. The idea that it might be evidence of genuine love — love that had been given
  without restraint — reoriented something in her. She did not stop needing to rest.
  But she stopped adding shame to the exhaustion. That, by itself, changed the weight
  of what she was carrying.'
