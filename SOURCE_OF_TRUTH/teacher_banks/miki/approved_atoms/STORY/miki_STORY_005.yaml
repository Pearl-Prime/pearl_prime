body: |
  Suki is anxious. Always has been. She's looking for a practice that will fix it, make her calm and stable.

  Someone invites her on a hike. It's not meditation. Just walking through forest.

  As she walks, the anxiety doesn't disappear. But something shifts. Her breath finds a rhythm with her steps. The sound of leaves under her feet. The texture of bark on trees. Her hand touches one as she passes.

  She's still anxious. But she's also here. Both things at once.

  The hike ends. The anxiety remains. But she's learned that being anxious and being alive in a beautiful place aren't mutually exclusive. Her nervous system knows something new.
