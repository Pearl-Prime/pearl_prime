body: 'Olu had been depressed in the years after his divorce — not dramatically, but
  in the slow, sustaining way that made everything slightly more effortful than it
  should be. He was forty-eight, a civil engineer in Accra, and he had managed the
  depression the way he managed most problems: with structure, with routine, with
  discipline. It helped and it was not enough.

  He attended a session of Miki''s that a colleague had recommended, mainly to have
  something to say if the colleague asked. He expected an hour of gentle advice that
  he would not follow.

  What happened was different. Miki worked in silence for part of the session, what
  she called light transmission — simply being present with the transmission of healing
  at the cellular level. Olu did not know what to make of this. He sat with it. Somewhere
  in the middle of the silence he felt something in his chest open, not dramatically,
  just a small, surprising loosening. Like a room he had been living in for years
  suddenly had a window.

  He left the session and went home and cooked a meal and ate it slowly, noticing
  the taste. He had not done that in a long time. Nothing had changed in his circumstances.
  Something had changed in him, quietly, beneath what he could explain.'
