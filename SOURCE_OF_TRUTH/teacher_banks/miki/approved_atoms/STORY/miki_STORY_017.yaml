body: |
  Kenji retires on a Friday. He expects to feel relief. Instead, Monday morning arrives and his chest holds a strange hollowness, like a room with the furniture removed.

  He drives to a forest trail he has not visited in thirty years. The path is narrow. Cedar trees rise on both sides, their bark rough and dark with moisture.

  He walks slowly. His feet find the uneven ground. A root. A patch of mud. He stops where a shaft of light crosses the path and stands inside it.

  The cedars have been here longer than his career. They did not rush. They simply grew, season by season, adding rings no one counted.

  The hollowness in his chest does not fill. But it stops feeling like damage. It feels like ma—a space between one thing and the next. Not empty. Open.

  He breathes out. The forest breathes with him, or perhaps it breathed first.
