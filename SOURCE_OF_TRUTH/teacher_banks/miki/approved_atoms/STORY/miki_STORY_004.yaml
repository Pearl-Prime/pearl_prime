body: 'Marcus had been telling himself he was fine for so long that he had almost believed
  it. He was twenty-nine, a software engineer in Berlin, and he was, by most measures,
  doing well — good salary, good flat, good friends. The depression was quiet and
  clinical, the kind that does not announce itself. Just a gray quality to everything,
  a sense of watching his own life through slightly fogged glass.

  He had found Miki through Ahjan''s introduction — Ahjan describing her work as
  something that did not ask you to feel better, only to receive. Marcus was suspicious
  of anything that promised healing. He had tried therapy, medication, exercise. He
  was tired of trying.

  What struck him in Miki''s first session was the absence of effort she required.
  She said: you do not have to meet the light halfway. It travels the whole distance.
  He had not expected to feel anything. He felt a warmth in his sternum that he could
  not explain. He dismissed it. It returned. Slowly, over weeks, the fog began to
  thin — not dramatically, not in a way he could point to — but something in his
  cells was responding to something, and he had the sense that this was older than
  any technique he had been asked to try.'
