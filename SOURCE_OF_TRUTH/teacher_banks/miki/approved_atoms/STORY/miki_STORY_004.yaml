body: |
  Daiki has low self-worth. He's never felt like he measured up—at school, at work, in relationships. Everything feels insufficient.

  He's sitting outside a cafe watching a child watch pigeons. The child is completely absorbed. Not thinking about whether he's doing it right. Not comparing himself to other bird-watchers.

  Just watching the birds.

  Daiki feels something shift. He's been performing his life for an audience that doesn't exist. Measuring himself against standards that were never real.

  What would happen if he just lived? Not perfectly. Not successfully. Just present, like the child watching birds?

  He sits longer, watching the child watch the birds.
