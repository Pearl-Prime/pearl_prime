body: |
  Sora's mother calls again. The same conversation—why doesn't Sora visit more, why is she so distant, why, why. Sora hangs up and her jaw aches from holding it still.

  She goes outside without a coat. The cold air hits her forearms and she stops on the back step.

  The garden is November-bare. The hydrangea stalks stand dry and brown, the blooms long gone. She used to cut them down in October. This year she left them.

  She walks to the nearest stalk and touches the papery remains of a flower head. It crumbles slightly at the edges. Still there. Still holding a shape, even spent.

  Wabi-sabi, she thinks, without meaning to think it. Beauty in what has already given everything it had.

  Her jaw releases. She is not a bad daughter. She is a person with limits, like a plant with a season. The cold settles against her skin and she lets it.

  She goes back inside and does not call her mother back tonight. That is the cost. She pays it with both hands open.
