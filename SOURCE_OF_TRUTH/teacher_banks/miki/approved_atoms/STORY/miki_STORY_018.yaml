body: 'Hannah was forty-seven and had spent the last three years in a financial crisis
  that had come from nowhere — a series of compounding events, none of which she
  could have predicted, all of which had left her in a position that felt impossible.
  She lived alone in Edinburgh, worked freelance in communications, and the financial
  anxiety had colonized her inner life so thoroughly that she could no longer think
  about anything else.

  She came to Miki through Ahjan''s work — Ahjan writing about Miki in terms that
  struck Hannah as different from the usual wellness framing: not self-improvement,
  but remembering.

  Miki''s session did not address her finances. Miki spoke about the inner resource
  — the part of a person that has never been compromised by external circumstance,
  the original wholeness that financial crisis cannot reach because it is not financial.
  Hannah found herself crying during the session, not from despair but from something
  closer to relief. She had forgotten that there was a part of her the crisis had
  not touched. The session planted a reminder of that place. She returned to it, in
  subsequent months, the way you return to a spring in dry season — because you know
  the water is there, because it has held through worse.'
