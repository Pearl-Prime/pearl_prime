body: |
  In the Japanese tradition, there is the concept of ma—the space between. Not emptiness. The space that makes things possible. The silence between notes in music. The white space on a page that makes the writing readable.

  A master showed her student a room with one object in it—a single stone.

  "Which is more important?" the master asked. "The stone or the space around it?"

  The student looked for a long time.

  The space is what lets the stone be a stone.
