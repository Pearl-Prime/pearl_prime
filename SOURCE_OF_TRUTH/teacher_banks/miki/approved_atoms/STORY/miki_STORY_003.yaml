body: 'Priya''s mother had died in November, and by February Priya still could not
  go into the kitchen without feeling the absence there like a physical weight. Her
  mother had loved to cook. The kitchen had been hers. Priya was forty-two, a secondary
  school teacher in Chennai, and she had thought she understood grief. She had not
  understood this particular grief.

  A friend sent her a written transmission from Miki — a short paragraph about how
  grief is the soul''s way of honoring the fullness of what was given. Not a wound
  to be healed. An acknowledgment of real love. Priya read it and wept in a way she
  had not yet allowed herself to weep — not the tight, controlled weeping of the first
  weeks, but something that moved through her like water through an open field.

  She did not feel better after. She felt emptied, in the way a vessel is emptied
  before it can be filled again. She went into the kitchen. She made her mother''s
  dal. She did not know why. She sat and ate it alone, and something in the room was
  not empty. Something had been planted in that hour that she did not have words for.'
