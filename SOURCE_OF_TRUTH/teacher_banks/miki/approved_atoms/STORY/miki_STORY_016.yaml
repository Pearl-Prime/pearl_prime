body: 'Haruto was seventeen when he first encountered Miki''s teachings — not through
  any formal channel, but because his mother attended a workshop and left a book on
  the kitchen table. He picked it up out of boredom on a Sunday afternoon. He put
  it down three hours later with the strange feeling that something had been confirmed
  in him rather than taught.

  He was a quiet teenager in Kyoto, thoughtful beyond his years, and he had always
  carried a sense that he was somehow not quite the right shape for the world he
  had been born into. The starseed teaching gave that feeling a different frame: not
  wrongness, but a particular kind of soul-memory that did not always fit easily into
  ordinary life. He found this strangely comforting.

  He did not tell anyone about this. He carried it quietly, the way you carry a seed
  in your pocket before you know where you will plant it. He returned to the book
  periodically over the following years, and each time he returned, something in it
  had grown — not the words, but his capacity to receive them. The teaching had been
  planted. It grew on its own schedule.'
