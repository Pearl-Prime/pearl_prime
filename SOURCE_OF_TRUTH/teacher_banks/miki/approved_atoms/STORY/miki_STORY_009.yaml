body: 'Yuki was twenty-six and had been overthinking her life so thoroughly that she
  could barely make small decisions without running them through a full internal tribunal.
  She lived in Osaka and worked in design. She was gifted and exhausted and spent
  as much time analyzing what she should do as she did doing anything. She had read
  every productivity system. None of them helped. They gave her more things to analyze.

  She attended one of Miki''s retreats at Kurama-yama — two days, mostly silence,
  some transmission work, some time sitting on the mountain. She had expected information,
  a framework, a method. Miki offered none of these. She offered presence. And at
  one point, sitting on the mountain path in the late afternoon, Yuki felt something
  simply stop — the internal tribunal went quiet, not because she had silenced it,
  but because she had stopped feeding it with urgency.

  It didn''t last. The thinking returned. But she had felt what it was like to exist
  without it, and that felt like a seed. Something had been planted in her. She could
  feel it there even on the worst overthinking days — a small, quiet memory of the
  stillness that was also hers.'
