body: |
  In Japanese wabi-sabi tradition, there is beauty in imperfection. A ceramic bowl with an irregular glaze. A stone worn smooth and asymmetrical by a thousand years of water.

  A student once asked: "Why is imperfection beautiful?"

  The master said: "Because it is honest. The perfect bowl is a lie. Everything in nature is crooked and asymmetrical. The crooked bowl tells the truth."

  The student looked at his own hands. Crooked fingers. A scar. The specific marks of living.

  And he stopped trying to be smooth.
