body: 'Valentina was thirty-two and had been comparing herself to others so long that
  she had stopped knowing what she herself actually wanted. She was a graphic designer
  in Buenos Aires — talented, recognized — but the self-worth had never caught up
  to the external recognition. Each achievement had a small, private ceiling, and
  above the ceiling was the always-there voice that said: not quite, not really, not
  enough.

  She attended a weekend with Miki in Kyoto — a small group, mostly silence, some
  time on Kurama-yama. She had not been to Japan before. The mountain did something
  to her she could not explain. She said later it was as if the mountain knew something
  about her that she had not told anyone.

  On the last afternoon, sitting in stillness, something shifted in her relationship
  to the not-enough voice. It did not go away. But it became clearly recognizable
  as a story — not the truth of who she was, but a story she had been hosting. The
  truth of who she was was something quieter, something underneath the story, something
  Kurama-yama seemed to be simply confirming. She came home with that confirmation
  planted somewhere she could find it again.'
