body: |
  Tomoko has practiced mindfulness for three years. She reads the books, attends the sessions, tracks her breath. But sitting on her cushion this morning, she notices something: she performs the practice the way she performs everything else—perfectly, efficiently, with one eye on the outcome.

  She closes the app. She puts on her shoes and walks to the small river two streets from her apartment.

  She sits on the bank. The water moves over stones, indifferent to her presence. A leaf enters the current upstream and travels past her without stopping.

  She does not follow the leaf with her eyes as an exercise. She follows it because it is interesting. Because it disappears around the bend and she wonders where it goes.

  Her ki shifts—something loosens in her sternum, a held quality she did not know she held.

  The river does not practice flowing. It flows. The difference lands in her body before it lands in her mind.

  She stays until her feet go cold. No timer. No notation in any journal. Just the sound of water, and the mono no aware of a leaf already gone.
