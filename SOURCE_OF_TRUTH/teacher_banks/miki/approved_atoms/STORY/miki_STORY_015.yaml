body: 'Isabela was thirty-five and had been in debt since she was twenty-two. She
  lived in Rio de Janeiro and worked in event management. The financial anxiety had
  a specific texture — not just the practical stress of numbers, but a deep, inherited
  shame about money, a story that poverty meant something about who she was. She had
  worked hard for years without the gap closing, and the working hard had not changed
  the story.

  She found Miki''s work through a Spanish-language community that shared Ahjan''s
  translations of Miki''s teachings. She was not looking for financial advice. She
  was looking for something that could address the shame beneath the numbers.

  Miki spoke about the difference between circumstance and worth — that circumstances
  could be extreme without touching the original completeness of the soul. Isabela
  had heard this kind of thing before and usually dismissed it. This time it arrived
  differently — not as consolation, but as cellular fact. Something in her body recognized
  it as true before she could argue with it. She still had the debt. But the shame
  began to loosen its hold on the story of who she was. That, she found, changed
  what she was able to do.'
