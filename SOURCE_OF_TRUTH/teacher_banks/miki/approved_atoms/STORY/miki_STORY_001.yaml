body: |-
  Amara had been anxious for so long that she had forgotten what it felt like not to be. She was thirty-four, a nurse in Lagos, and the anxiety had become a kind of weather — always there, varying only in intensity. A colleague told her about Miki. Amara was skeptical. She did not believe in light healers.

  She attended one session online, not telling anyone. Miki spoke quietly, in the way someone speaks when they are not trying to convince you of anything. She said something about original completeness — that the anxiety was not evidence of damage but of a person who had been carrying too much without anyone to help carry it. Something in Amara's chest went very still.

  She did not feel healed afterward. She still felt anxious the next morning. But something had shifted beneath the anxiety — the way the quality of light shifts when clouds thin, before you can tell if the sun will come through. Two weeks later she noticed she had slept three nights in a row without waking at three a.m. She did not know what to make of it. She let it rest.

