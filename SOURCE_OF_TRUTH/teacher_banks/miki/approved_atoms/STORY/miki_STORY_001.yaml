body: |
  Haru works in a high-pressure environment. She's burned out, but there's no time to be burned out. Deadlines. She hasn't rested in months.

  One morning she takes a different route to work, walks through a park. Rain is falling lightly. She stops walking and just stands.

  The smell of wet earth hits her. Cool air on her skin. Water dripping from the leaves of the maple trees. Seven minutes.

  At the office, the burnout is still there. But something in her has registered a fact: *I can still feel the world. I'm still alive.*

  She texts a friend about taking this walk once a week. A small boundary against the machinery.
