body: 'Fatima had been applying for positions at the same level for two years. She
  was thirty-one, a data scientist in Toronto, and every interview she performed well
  and every offer that came back was for something smaller than what she had applied
  for. The imposter syndrome had taken on a texture she recognized — that particular
  flavor of believing everyone else knew something she didn''t, that her competence
  was a performance that would eventually be exposed.

  A colleague pointed her to Miki''s work. Fatima was not interested in spiritual
  wellness, but she was desperate enough to try something outside her usual vocabulary.

  Miki spoke about the soul remembering something larger than the story currently
  available to it. Fatima did not know what that meant, exactly. But something about
  the phrase "larger than the story" lodged in her. She had been living inside the
  imposter story so completely that she had forgotten it was a story. Something in
  her had access to a different account of who she was. She did not suddenly feel
  confident. But a small distance opened between her and the story, and in that distance,
  something began to breathe.'
