body: |
  Masa is overwhelmed. Too much to do, too many demands, no space for breath.

  Someone suggests he just sit outside for ten minutes. No meditation, no practice. Just outside.

  He sits on a bench. At first his mind is racing—all the things he should be doing. The list has no end.

  But then he notices the light on the trees. The way shadows move as clouds pass. The bench is cold under him. A bird calls. He doesn't know what kind.

  Ten minutes of just being outside, paying attention to something other than the list. Not a cure. But something settles in his chest.

  He starts doing this daily. Not as practice. As breath.
