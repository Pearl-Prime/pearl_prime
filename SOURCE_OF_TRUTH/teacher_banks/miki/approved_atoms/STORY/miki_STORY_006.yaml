body: |
  Rei has no boundaries. She's always available, always helping, always accommodating. She doesn't know where she ends and others begin.

  One day she's in a coffee shop and notices something: the barista says no to a customer's request. Not mean about it. Just clear. "We don't have that." The customer accepts it.

  *That's how easy it can be*, Rei thinks. *Just a boundary. Not a conflict. Just a limit.*

  She starts small. When a friend asks for help, she says: "Let me think about it." Not an automatic yes.

  The boundary-setting is clumsy. She stumbles over the words. But something in her nervous system begins to understand: taking space isn't selfish. It's just honest.
