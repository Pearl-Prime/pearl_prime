body: 'Jin-ho was the kind of person who said yes when he meant no, who absorbed other
  people''s urgency as if it were his own, who felt vaguely responsible for everyone''s
  comfort in every room he entered. He was thirty-seven, an architect in Seoul, and
  he had spent so long maintaining the peace that he had lost track of where the peace
  ended and he began.

  He came to Miki''s work through a workshop Ahjan facilitated — Ahjan describing
  Miki as someone who plants seeds rather than issues instructions. Jin-ho appreciated
  that framing. He was tired of being instructed.

  What Miki offered him was not a boundary-setting framework. She spoke about original
  wholeness — about how a person who knows themselves as complete does not need to
  prove their worth through accommodation. He could feel something in his body respond
  to this before his mind caught up. It was not a transformation. But something had
  been planted in him, something quiet, and over the months that followed he began
  to notice — very gradually — that he was saying no to small things. Not dramatically.
  Just quietly, the way a plant grows, following its nature toward light.'
