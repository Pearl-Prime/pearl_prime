body: |
  Rain on the window. Nana sits with her coffee, watching the drops slide down the glass. Her shoulders are tight—job insecurity, money worry. Her mind won't stop making plans.

  But the rain doesn't plan its trajectory. Water finds channels, pools, runs where gravity allows. The rain doesn't solve itself. It just falls.

  She feels her breath slow. The problem is still real. But it's separate from this moment, this window, this specific rain hitting the glass at this angle in March.

  Something in her drops. Not because the worry is solved. Because she's stopped holding it as a betrayal.
