body: 'Ravi was fifty-five and had spent thirty years in medicine. He was a cardiologist
  in Mumbai who had given enormous amounts of himself to his patients and his work,
  and the burnout had arrived, as burnout often does, not in a crisis but in the
  gradual disappearance of the thing that had made the work meaningful. He still
  performed well. He no longer felt anything.

  His wife suggested Miki''s work. He was politely dismissive. He attended anyway,
  at her gentle insistence.

  Miki spoke in the session about the difference between emptiness as depletion and
  emptiness as openness — that certain kinds of burnout were the soul''s way of clearing
  out what had accumulated, making space for the original frequency to return. This
  was not the framing Ravi had available to him. He was trained in pathology, not
  metaphysics. But something in the cellular-level language caught him — Miki speaking
  about light transmission reaching the body''s own intelligence, restoring the capacity
  to care from depth rather than effort.

  He left the session no different. Over the following weeks he began to feel, occasionally
  and briefly, the thing that had brought him to medicine in the first place. Not
  always. But enough. The seed had done something. He did not fully understand what.
  He trusted it.'
