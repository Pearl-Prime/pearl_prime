body: |
  Yoko is dealing with deep shame. Something she did years ago. She thought she'd moved on, but the shame sits under everything, coloring how she sees herself.

  She's at a friend's house near a garden. Without thinking much about it, she kneels down and touches the soil. Feels the texture between her fingers. Looks at the small insects moving through it. A beetle disappears under a leaf.

  Here is the earth. Here are the creatures living their lives. They're not ashamed of being creatures. They just are.

  The insight isn't profound. But something in her body relaxes. Shame is a story she carries. But under it, there's just a person. A body. A life. Like everything else.
