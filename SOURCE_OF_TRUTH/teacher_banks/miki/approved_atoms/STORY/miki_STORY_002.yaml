body: 'Kenji was fifty-one and burned out in the way that Japanese salarymen sometimes
  burn out — not in a dramatic collapse but in a slow, invisible erosion, until one
  morning he realized he felt nothing at all when he poured his tea. He had been a
  department head for eleven years. He had not taken a full vacation in six.

  His wife showed him a recording of Miki speaking from Kurama-yama. He watched it
  with the polite disinterest he applied to most things now. But somewhere in the
  middle, Miki said: the body remembers being alive even when the mind has forgotten
  what that felt like. He watched that part three times.

  He did not attend a session. He did not make any changes. But over the following
  month, something in him began to warm, the way ground warms in early spring when
  the sun has been at work beneath the surface for weeks. He started leaving the office
  at six. He started tasting his food again. He did not tell anyone. He understood
  this was his own business — his body remembering something it had set aside.'
