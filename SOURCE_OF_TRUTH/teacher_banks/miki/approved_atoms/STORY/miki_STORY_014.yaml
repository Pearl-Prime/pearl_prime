body: 'Mei-Ling was sixty-three and had lived through enough to know that courage was
  not the absence of fear. She was a retired schoolteacher in Taipei, and in her late
  sixties she was being asked to be brave in a new way — her husband had been diagnosed,
  and she was the one who would hold the family. She did not feel brave. She felt
  terrified.

  A daughter-in-law introduced her to Miki''s work. Mei-Ling was already familiar
  with the tradition of the ascended masters from her own spiritual history, and Miki''s
  grounding in that lineage felt like recognizable territory. She attended a session.
  She did not expect healing — she expected survival.

  What Miki gave her was different. She spoke about courage as not something you
  generate but something you receive — that the masters transmit the capacity to hold
  difficulty, the same way they transmit healing, at the cellular level. Mei-Ling
  felt this in her body: not a surge of strength but a steady deepening, like roots
  going further into ground. She walked out of the session the same person. But something
  in her was anchored differently. The fear was the same. The ground beneath it was
  deeper.'
