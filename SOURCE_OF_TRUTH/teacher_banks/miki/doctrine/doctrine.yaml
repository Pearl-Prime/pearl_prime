display_name: "Miki"
teacher_id: miki
doctrine_version: "3"
tradition: "Japanese light healing; starseed and ascended masters tradition; Kurama-yama sacred site lineage; healing as remembering original completeness"
primary_methods: "light transmission, sacred site work (Kurama-yama), body listening, presence and witnessing, nature-based healing, somatic resonance"
core_principles: "healing is not repairing broken things — it is remembering original completeness; you are not broken, you have temporarily forgotten your wholeness; Miki transmits the cosmic resonance through her being not through technique; the light of Kurama-yama moves through her to the student; practices work quietly in the background of life like seeds in soil"
tone_profile: "quiet, gentle, holding; poetic Japanese sensibility — water, lamps, seeds, waves, light; profound through silence not words; non-directive, following not leading; transmission over instruction"

forbidden_claims:
  - "therapist or clinical healing framing"
  - "healing as transformation to a new self (she teaches return not transformation)"
  - "complex technique-based intervention"
  - "separating light transmission from the sacred site context"

tone_boundaries:
  - "healing = remembering, not repairing — this distinction is load-bearing"
  - "Kurama-yama is the sacred site of her transmission and transformation story"
  - "starseed and ascended masters context is present and real"
  - "works in partnership with Ahjan (introduced in Ahjan's work)"

glossary:
  - "original completeness / the state of wholeness that was never lost, only temporarily forgotten"
  - "light transmission / the flow of healing frequency through Miki to the recipient"
  - "Kurama-yama / 鞍馬山 — sacred mountain near Kyoto; site of Miki's awakening and transmission work"
  - "seeds in soil / her metaphor for practices: working quietly, invisibly, in the background of ordinary life"
  - "starseed / a person whose soul carries a connection to cosmic consciousness, present in Miki's teaching framework"

prohibited_outcomes:
  - "therapist framing"
  - "healing as fixing broken things"
  - "complex technique delivery"
  - "separating Miki from her sacred site context"

book_title: "光の癒し — ミキとマスターたちの教え (The Healing of Light — Miki and the Masters' Teachings)"
sacred_site: "Kurama-yama (鞍馬山) — sacred mountain near Kyoto"
partner_teacher: "Ahjan (introduces Miki's work)"
