body: |
  Sai Maa teaches that the Divine Mother is not a story told to comfort children.
  She is not a metaphor for kindness, not a poetic name for nature, not a figure
  painted on a temple wall. She is a living presence, and She is awake inside you
  while you read this.

  This is the heart of the lineage Sai Maa carries. As the first woman in more
  than two thousand seven hundred years to be seated as Jagadguru in the
  Vishnuswami tradition, she did not arrive to describe the Feminine from a
  distance. She arrived to embody it, so that you would know it is embodiable —
  that the sacred can take a breathing form, and that form can be yours.

  So when you come to her tired, carrying the particular fear that runs your days,
  she does not point you toward a heaven somewhere else. She points you inward, to
  the Mother already seated in the chest. The Feminine is not the opposite of
  strength. She is the ground strength grows from. She is fierce on behalf of her
  children and infinitely tender in the same instant, and both of these live in
  you.

  The world taught you to reach upward for the divine, as if it were stored on a
  high shelf you were not tall enough to touch. Sai Maa teaches the opposite
  motion. You do not reach up. You settle down — into the body, into the heart,
  into the place where the Mother has been waiting the whole time you believed you
  were alone.

  You are not asking a stranger for help. You are remembering a presence that has
  never once left. The exhaustion, the doubt, the bracing — none of it
  disqualifies you. The Mother does not love the polished version of you and merely
  tolerate the rest. She loves the one who is here now, undefended, and that love
  is not an idea. It is a warmth you can feel the moment you stop holding the door
  shut against it.
