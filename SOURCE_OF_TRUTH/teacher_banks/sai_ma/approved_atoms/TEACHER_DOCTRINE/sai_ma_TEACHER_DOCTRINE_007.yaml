body: |
  Sai Maa teaches that East and West are not two rivers but one — and she will not
  permit the separation many assume must exist between the traditions. In her own
  realization, the Vishnuswami lineage and the figures of the West arrived together.
  She has spoken of visitations from Jesus, from St. Germain, from Archangel Michael,
  standing in no contradiction to the Hindu lineage she carries as Jagadguru. To her,
  this is not eclecticism. It is simply what is true when the divide is seen for the
  human drawing it always was.

  This frees you from a quiet obstacle you may not know you carry. Part of you may
  believe that to touch the sacred you would have to leave your world — adopt a
  foreign vocabulary, renounce where you came from, become someone other than the
  person living your actual life. That belief becomes one more reason to keep the door
  shut: the sacred is over there, and you are over here, and the distance is too far
  to cross while this tired.

  Sai Maa removes the distance. The light does not belong to one hemisphere. The
  Mother is not the property of one language. Whatever names you were given as a
  child, whatever names you have since abandoned, the presence underneath them is the
  same presence, and it does not require you to convert in order to come home.

  So bring your whole inheritance with you. Bring the prayers you half-remember and
  the ones you never believed. Bring your skepticism; it is welcome too. Sai Maa
  teaches from a seat where the streams have already met, and she invites you to drink
  without first deciding which tradition owns the well.

  The fear that runs your days does not speak Sanskrit or English. It is human, and
  it answers to light in any tongue. You do not have to become exotic to yourself to
  be healed. You have to let the one light — which the East named and the West named
  and which precedes every name — reach the place in you that has been waiting, in
  whatever language your heart still remembers how to open.
