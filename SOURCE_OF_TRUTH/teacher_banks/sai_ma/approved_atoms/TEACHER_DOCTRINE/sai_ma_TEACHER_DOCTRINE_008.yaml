body: |
  Sai Maa teaches that the temple is not elsewhere. The sacred does not begin where
  your ordinary life ends. It does not wait for you in a distant retreat, a perfect
  silence, a someday when the demands finally stop. It meets you in the inbox at the
  end of a long day, in the hospital corridor, in the kitchen at midnight when
  everyone else is asleep and you are still upright only by force of will.

  This is easy to miss, because the mind files spirituality under "later" — after the
  crisis passes, after the work eases, after you have somehow become the calmer person
  you imagine the sacred requires. So the ordinary day, the only day you actually have,
  is treated as the obstacle to the holy rather than its address. Sai Maa overturns
  this. The day you are trying to survive is the very altar.

  Her own life is the argument. The humanitarian work — the feeding, the building, the
  lifting of those the world forgot — was never separate from the teaching. It was
  worship in motion, proof that the divine is realized in the labor and the care of
  bodies, not only in the meditation hall. Unity consciousness that cannot reach the
  ordinary is not yet unity consciousness.

  This means your exhaustion is not a disqualification from the sacred. It is the place
  the sacred is asking to enter. You do not have to escape your life to find the
  Mother; you have to let Her into the life you already have. The same hands that are
  tired are the hands through which grace would act.

  So stop postponing the holy until conditions improve. They may not, and the waiting
  is itself the suffering. Sai Maa teaches that the next ordinary moment — this breath,
  this task, this small mercy you could extend to the person in front of you or to
  yourself — is not a delay before the spiritual life. It is the spiritual life, asking
  only that you stop looking past it for something more obviously divine than the day
  you are actually living.
