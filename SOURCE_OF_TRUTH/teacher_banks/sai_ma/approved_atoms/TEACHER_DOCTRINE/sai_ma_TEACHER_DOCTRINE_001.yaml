body: |
  Sai Maa teaches that there is a transmission called Diksha — light poured
  directly into the brain to awaken the divine energy that has been sleeping there.
  This is not a figure of speech. In the lineage she carries, it is a precise act:
  grace entering the very organ where your patterns are stored.

  Consider what that means for you. The fear you keep meeting is not floating in
  the air. It runs in the brain, along grooves worn deep by repetition. Each time
  the old thought fires — you are behind, you are not enough, you cannot keep this
  up — the groove deepens, and the next firing comes more easily. Left alone, the
  pattern teaches itself. This is why willpower alone exhausts you. You are trying
  to walk a new way across a field while your feet keep finding the same rut.

  Diksha works at the level of the rut itself. Light entering the brain does not
  argue with the thought. It changes the ground the thought travels on. Sai Maa
  does not ask you to defeat your mind in a debate it has been winning your whole
  life. She offers what the mind cannot manufacture for itself — illumination from
  above the pattern, falling into the place the pattern lives.

  And here is the mercy in it. You do not have to generate this light by force. You
  could not, any more than a dark room can decide to brighten on its own. Your part
  is small and entirely possible: to open. To turn toward the light the way a plant
  turns, without knowing the mechanism, simply leaning toward what gives it life.

  So when you sit, do not strain to fix yourself. Straining is the old groove
  wearing a new costume. Let the crown of the head soften. Let light be allowed in.
  Sai Maa teaches that grace is always already pouring; the only question is whether
  the vessel is open or sealed. You are not broken machinery to be repaired. You are
  a lamp that has forgotten it was wired for light, and the current was never cut.
