body: |
  Sai Maa teaches with a sentence that overturns most of what spiritual life is
  assumed to be: she did not come to gather followers. She came to make masters.

  Hold this against the picture you may carry of a teacher — the figure on the high
  seat, the crowd kept small and grateful below, the wisdom held just out of reach
  so that you must keep returning to be fed. Sai Maa refuses this entirely. A teacher
  who creates dependence has, in her view, failed. The whole purpose of the
  transmission is to wake in you the very mastery you came looking for in someone
  else.

  This changes who you are in your own struggle. You have perhaps been treating
  yourself as a problem to be managed — a person who is behind, who must be carried,
  who needs the right method finally applied by the right authority. Sai Maa looks
  at the same person and sees a master who has fallen asleep. Not a beginner. Not a
  broken case. A sovereign being who has forgotten the throne is already theirs.

  This is not flattery, and it is not a demand that you perform strength you do not
  feel. It is a correction of vision. The exhaustion is real. The fear is real. But
  they are weather, not identity. Beneath the weather is the one who can witness it,
  and that witness, Sai Maa teaches, is not small, not provisional, not waiting for
  permission. It is the divine in you, fully present even on the day you feel least
  divine.

  So receive the teaching, but do not lean your whole weight on the teacher. That is
  the instruction itself. Take the light and let it reveal your own light. The
  measure of this path is not how devoted you become to Sai Maa. It is how
  unmistakably you come to stand in your own mastery — until the help you reached for
  outside is recognized as a homecoming to what was always inside.
