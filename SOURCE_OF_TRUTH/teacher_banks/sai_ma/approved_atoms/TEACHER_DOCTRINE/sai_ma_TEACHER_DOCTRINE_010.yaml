body: |
  Sai Maa teaches that the heart is an organ of knowing, not only of feeling. The
  world trained you to consult the mind first for every question — to analyze, to
  weigh, to reason your way to safety. But the mind, for all its speed, is the place
  the patterns run. Asking the frightened mind whether you are safe is asking the fire
  whether the house is burning.

  The heart knows differently. It does not arrive at truth by argument; it recognizes
  it directly, the way you know a face without listing its features. In the lineage
  Sai Maa carries, the heart is the seat where the Mother is met, the chamber where
  divine energy is received once the noise of the analyzing mind quiets enough to let
  another knowing speak.

  You can feel which one is running you. The mind's knowing is fast, tight, and never
  finished — it solves the same fear a hundred times and the fear is never solved,
  because solving is how it keeps itself employed. The heart's knowing is slower,
  wider, and strangely settled, even when the situation is unresolved. The mind asks,
  what if everything goes wrong. The heart answers, and even then, you are held. Both
  speak. Sai Maa teaches you which to believe.

  This is not a rejection of the mind. The mind is a fine servant and a cruel master,
  and the whole art is to return it to its proper place — beneath the heart, in service
  to it, rather than enthroned above it generating verdicts you mistake for truth. The
  drop from head to heart is not a long journey in distance. It is the shortest journey
  there is, and the hardest, because the mind insists it must stay in charge or all is
  lost.

  So when the spiral starts, do not try to out-think it. You cannot; it is faster than
  you and it never tires. Instead, drop. Place attention in the chest. Ask the heart
  what it knows, and then be still long enough to receive an answer that does not come
  in words. Sai Maa teaches that the knowing you have been straining for was never
  going to come from the mind. It was waiting one level down, where it has always been.
