body: |
  Amara sits on the bathroom floor. The tile is cold through her jeans. Her sister's wedding is in four hours and the dress hangs on the door, waiting.

  Three days ago her mother said: you are the difficult one. You have always been the difficult one. The words landed in Amara's sternum like a stone dropped into still water. She has not eaten a full meal since.

  Now her hands press flat against the cold tile. She breathes. The breath is shallow. Her chest holds something tight and unnamed.

  She closes her eyes. Not to escape. To find something.

  She learned this practice from a teacher who said: the heart-space is always home. Even now. Even here on the bathroom floor. She places one hand on her chest and feels the warmth there. The warmth is real. It does not care about the argument. It does not care about the dress or the wedding or the word difficult.

  The tightness does not leave. But something else arrives alongside it. A tenderness. Not hers exactly. Something that meets her.

  She breathes into the warmth. Her jaw unclenches by one degree.

  She does not stand up healed. She stands up because the floor is cold and the wedding is real and her sister loves her. She takes the dress off the hanger. Her hands are steadier than they were.

  She carries the tightness with her. She also carries the warmth. Both are true. She walks out of the bathroom holding both.
