body: |
  Kavitha has not cried in eleven years. She knows this because the last time was her father's funeral. She stood at the grave and felt something seal shut behind her sternum like a door pulled closed.

  Now her therapist says: you are dissociated from your own grief. Kavitha nods. She understands this intellectually. She goes home and makes dinner and watches television and goes to sleep.

  On a Tuesday in March she attends a kirtan. Her colleague invited her three times. She came only to stop being asked.

  The room is small. Candles. The smell of sandalwood. A woman at the front begins to sing. The melody is simple. It repeats. It asks nothing of Kavitha except to be in the room.

  Twenty minutes pass. Kavitha sits with her arms crossed. Her jaw is set. She is waiting for it to be over.

  Then something happens in her chest. Not a thought. Not an insight. A physical event. A loosening, sudden and involuntary, like a knot pulled free.

  Her eyes fill. She does not know why. She does not have a reason. The song is still repeating. The candles are still burning. Nothing has changed except that the door behind her sternum swings open.

  She does not sob. One tear moves down her face. Then another.

  She keeps her arms crossed. She lets the tears come. She does not understand what is happening. She does not need to understand. The Shakti in the room does not require her understanding. It only requires her presence.

  She stays until the singing ends. She drives home in silence. Her chest aches. The ache is different from the sealed feeling. The ache means something is alive in there.

  She calls her colleague the next morning. She says: I want to go back.
