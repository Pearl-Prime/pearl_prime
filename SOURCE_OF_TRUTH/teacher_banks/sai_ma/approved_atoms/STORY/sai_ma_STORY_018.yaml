body: |
  Tomás is seventeen and does not believe in anything. He says this at dinner when his grandmother mentions her prayers. He says it with the flat certainty of someone who has decided certainty is strength.

  His grandmother does not argue. She says: come help me in the garden.

  They work in silence. She shows him how to press seeds into soil. She says: you do not have to believe in the seed. The seed does not need your belief. You only need to put it in the ground and water it.

  Tomás rolls his eyes. But his hands keep working. The soil is cool and dark. The smell of it is something he has no word for. Something old.

  His grandmother hums while she works. The sound is low and continuous. It does not demand his attention. It simply fills the air.

  After an hour his shoulders have dropped. His jaw has unclenched. He does not notice this. He is thinking about the seeds. He is thinking about how they will grow whether or not he comes back to see them.

  He asks: do you talk to them. She says: I talk to everything. Everything listens.

  He does not say he believes this. He does not say he disbelieves it. He presses another seed into the dark soil. His hands know something his certainty does not.

  He comes back the following Saturday without being asked.
