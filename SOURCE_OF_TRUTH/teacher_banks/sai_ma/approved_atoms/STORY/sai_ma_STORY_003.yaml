body: |
  Ananya has dimmed her light so thoroughly that she no longer knows it exists. She is intelligent, capable, powerful. But somewhere in her childhood, she learned that these things were dangerous. That her power threatened her mother. That her ambition made her selfish. That her voice was too loud.

  So she has made herself small. She speaks quietly. She defers in meetings. She does not apply for promotions. When people praise her, she deflects. She creates obstacles to her own success because being successful feels like it is hurting others.

  The cost is quiet but relentless. She is chronically anxious. She cannot understand why she feels so exhausted when she is not working that hard. She feels invisible. Even in crowds, she is alone. Even in relationships, she is holding back.

  One day a colleague says to her: you would be great leading this team. I think you should apply.

  Ananya feels the familiar response: No. I am not ready. Someone else deserves it more. I would probably mess it up.

  But this time, something in her hears a different voice. A voice that says: what if you are not here to apologize for your power? What if your light is not dangerous?

  She does not apply. She is not ready for that yet. But for the first time, she does not close the conversation. She sits with the possibility. She lets it be present without judgment. And in the sitting with it, something begins to move. Not confidence. But a tiny crack in the story she has been told about herself.

  She does not know if it will lead to anything. She does not know if she is brave enough to change. But she knows, for the first time in decades, that the story is a story. And that means it can be rewritten.
