body: |
  Deepa has been kind her entire life. She was raised to be kind. Kindness is the shape her identity takes. When someone is cruel to her, she finds a reason to forgive them before she has finished being hurt.

  Her teacher says: loving awareness includes the self. You cannot love others into wholeness while leaving yourself outside the circle.

  Deepa hears this and nods. She believes she understands it. She does not understand it yet.

  The understanding comes on an ordinary afternoon. Her coworker takes credit for Deepa's project in a meeting. Deepa watches it happen. Her stomach drops. Her face stays composed.

  Afterward, alone in the stairwell, she notices her hands are shaking. She notices her throat is tight. She notices she is already constructing reasons why her coworker did not mean it. Why it is understandable. Why Deepa should let it go.

  She stops constructing.

  She places her hand on her sternum. She says, inside, not aloud: that hurt. That was wrong. You are allowed to know that.

  The shaking in her hands does not stop. But something shifts in her chest. A small fierce warmth. Not anger exactly. Something more like dignity.

  She walks back into the office. She does not confront her coworker today. But she saves the project files with her name on every document. She sends the original draft to her manager with a quiet note.

  She does this not from spite. From the small fierce warmth. From the knowledge that loving awareness holds her too.
