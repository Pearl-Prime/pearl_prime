body: |
  The voice that says you are not worthy is not truth. It is a memory. It is a story your nervous system learned a long time ago from people who did not know how to love themselves.

  The teaching is: shame is not information. Shame is a lie wearing the clothes of truth.

  When shame arises, ask it: where did you come from? And if you are willing to look, you will find: this is not my voice. This is my mother's fear. This is my father's criticism. This is the world saying: you are too much. And you believed it.

  But the heart knows something different. The heart knows: I am not too much. I am exactly enough. I am worthy not because I earned it. But because existence itself is worthy. Because love is the ground. Because grace is always available.

  Place your hand on your heart. Feel it beating. This heart has been loving you since before you were born. This heart does not judge you. This heart does not need you to earn your place. This heart already loves you completely.

  When shame speaks, let your heart speak louder. Your heart says: I know who you are. You are loved. You are worthy. You were always worthy. Even in the mistake. Even in the failure. Even in the shame.

  This is not bypassing the pain. This is knowing that beneath the pain is something that cannot be harmed. Beneath the shame is a love that is not personal but that is yours to rest in. Your job is to let it in. To say yes to your own worthiness. To come home.
