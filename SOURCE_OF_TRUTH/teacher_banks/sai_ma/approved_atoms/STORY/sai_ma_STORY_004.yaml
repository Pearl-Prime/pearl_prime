body: |
  A room lit only by candlelight. Someone sits alone on a cushion. Their hands are at rest in their lap. Their breath is slow. In the flickering light, the walls seem to breathe.

  There is no music. There is only the sound of breath and the occasional crackle from the candle. The person's chest expands and contracts. With each exhale, they release something. Not thinking about what. Just allowing the breath to carry it out.

  The light catches the edge of their face. There is a softness there. A quality of receiving rather than striving. The shoulders have descended. The jaw has relaxed. The eyes are soft, looking at nothing in particular.

  This is what tenderness feels like in the body. Not weakness. A kind of strength that does not need to prove itself. A presence that simply is. The person sits this way for ten minutes. Then fifteen. There is nowhere to be. There is nothing to fix.

  When they open their eyes, the room is the same. The candle is lower. But they are different. They have remembered the warmth that lives inside, independent of circumstance. They have remembered: I am loved. Not because I earned it. But because love is my nature.

  They extinguish the candle and sit in darkness. Still warm.
