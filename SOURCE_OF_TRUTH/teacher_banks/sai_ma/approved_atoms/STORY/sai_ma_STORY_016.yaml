body: |
  Solomon has spent forty years being useful. He fixes things. He solves problems. He arrives early and stays late. When someone cries at a family gathering, he goes to the kitchen and refills glasses.

  His daughter says: Dad, you never let anyone take care of you. He hears this as a compliment. He says: I'm fine.

  At sixty-two his doctor tells him his blood pressure is high. His doctor says: you need to rest. Solomon nods and books his next three work trips.

  At a retreat his daughter dragged him to, a teacher speaks about the heart-space. She says: the heart receives as well as gives. When you refuse to receive, you starve the heart.

  Solomon sits in the back row. His arms are crossed. He is making a list of emails he needs to answer.

  But the word starve lands somewhere. His chest tightens around it.

  He thinks of his own father, who worked until he died. Who never once asked for help. Who Solomon found one morning on the kitchen floor, alone.

  His eyes sting. He does not blink the feeling away. He lets it stay. His arms uncross. His hands rest open on his thighs. This is a small thing. No one in the room notices.

  But Solomon notices. His palms face up. He breathes. Something in him, old and tired, recognizes this posture as permission.

  He does not know what he is receiving. He stays open anyway.
