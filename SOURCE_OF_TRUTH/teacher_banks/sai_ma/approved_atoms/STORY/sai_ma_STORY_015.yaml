body: |
  There is a teaching about fire. In the devotional tradition, fire is not destruction first. Fire is purification. Fire is the presence of the divine feminine made visible. When you light a candle in practice, you are not creating light. You are acknowledging the light that already exists.

  Nadia lights a candle every morning. She does this even when she does not want to. Especially when she does not want to.

  Her teacher told her: the practice is the showing up. Not the feeling. Not the result. The act of lighting the candle says: I am here. I am willing. That willingness is the beginning of everything.

  Some mornings Nadia lights the candle and feels nothing. The flame burns. Her mind lists the day's obligations. She sits for five minutes and then gets up and makes coffee.

  Other mornings something shifts. The flame catches her full attention. Her breathing slows. The heart-space opens like a room she forgot she lived in.

  She cannot predict which morning will bring which experience. She does not try to predict. She lights the candle. She sits. She offers her willingness.

  This is the teaching: grace is not earned through perfect practice. Grace meets effort. Any effort. Even the small effort of a woman who lights a candle when she does not feel like it. The inner light does not require elaborate conditions. It requires only that the door be left open.

  Nadia leaves the door open every morning. That is enough.
