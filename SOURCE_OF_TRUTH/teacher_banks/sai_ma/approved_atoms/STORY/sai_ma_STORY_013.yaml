body: |
  Reuben teaches third grade. Every morning before the children arrive he stands at the window and watches the parking lot fill.

  He does not call this prayer. He does not have a word for it. He just knows that if he skips this five minutes, the day goes differently. His shoulders ride up near his ears. His voice gets tight when a child misbehaves.

  This morning he stands at the window. The light comes in low and gold. A sparrow lands on the chain-link fence and stays.

  Something in his chest opens. He does not do anything to make this happen. He just notices the bird. He notices the light. He notices that his breathing has slowed without his permission.

  His teacher once described this as grace meeting effort. You show up. You stand at the window. Grace does the rest.

  Reuben does not think about grace. He thinks about Marcus, who cried yesterday because no one picked him for a team. He thinks about how he will make sure Marcus gets chosen first today. Not from obligation. From something warmer than obligation.

  The sparrow flies away. The light shifts. He hears the first bus pulling in.

  He turns from the window. His shoulders are down. His chest is open. He is ready.
