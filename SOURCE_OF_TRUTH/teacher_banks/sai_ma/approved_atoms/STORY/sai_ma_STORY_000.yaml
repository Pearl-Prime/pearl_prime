body: |
  Priya arrives at work carrying a shame she cannot name. Three weeks ago her family found out she is dating someone outside their religion. Her mother has not spoken to her since. Her father said: this is not who we raised you to be.

  Now at her desk, she cannot look her coworkers in the eye. When someone praises her work, she hears: they would not praise you if they knew. When she laughs, she thinks: I have no right to joy. Her hands shake when she types. She can feel the judgment not as something external but as something living in her chest.

  At lunch she sits alone and scrolls her phone. She finds a quote: shame dissolves in loving awareness. You are already worthy. She stops. Reads it again. Tears come without warning.

  She does not believe it. Her mind knows the quote is meant to be comforting. But the shame says: that is not true. That is not true for someone like you. That is not true for someone who has disappointed her family.

  She sits with both truths at once. The shame is there. The possibility of worthiness is also there. She does not resolve this. She just sits in the middle of it. In her chest, something very small cracks open. Not healing. Not yet. But the smallest possibility that maybe the shame is not the last word.

  When she returns to her desk, she does not feel better. But she feels witnessed by something other than judgment. She feels witnessed by a tenderness that is not hers—not yet—but that exists somewhere, waiting.
