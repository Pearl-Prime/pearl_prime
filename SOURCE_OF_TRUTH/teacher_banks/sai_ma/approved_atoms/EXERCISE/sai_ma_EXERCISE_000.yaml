atom_id: sai_ma_EXERCISE_000
body: 'Sit comfortably and place both hands on your heart center. Close your eyes. Begin to breathe naturally. With each breath, imagine that you are breathing love directly into your own heart. Not from outside, but from your deepest self to your heart. Say silently: I am worthy of my own love. I am deserving of tenderness. Repeat this for five to ten minutes. This is a foundational devotional practice that heals shame and grounds you in your own inherent worthiness.'
