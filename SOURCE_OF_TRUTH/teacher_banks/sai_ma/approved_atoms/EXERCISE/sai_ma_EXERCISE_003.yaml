atom_id: sai_ma_EXERCISE_003
body: 'Sit comfortably. Place your right hand on your heart and your left hand on your belly. Breathe in slowly for a count of four. Hold for a count of four. Breathe out slowly for a count of four. With each breath, say: I am loved. I am safe. I am home in my own heart. Continue this for seven to ten minutes. This practice creates a bridge between the heart and belly, healing the fragmentation that comes from shame and opening you to loving awareness of yourself.'
