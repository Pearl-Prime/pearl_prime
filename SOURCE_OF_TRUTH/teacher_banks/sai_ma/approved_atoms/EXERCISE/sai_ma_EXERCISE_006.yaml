atom_id: sai_ma_EXERCISE_006
body: 'Sit comfortably with your hands resting on your thighs, palms up. This palm-up position is the position of receiving. Begin to breathe slowly and deeply. With each breath, imagine that you are receiving love, grace, and tenderness from the universe. You do not have to earn it. You do not have to deserve it. Grace flows toward you simply because you exist. Repeat silently: I am open to receiving. I am worthy of grace. I allow myself to be held. Continue for five to eight minutes.'
