atom_id: sai_ma_EXERCISE_008
body: 'Sit with your spine upright and practice a heart-centered breathing practice. Imagine that you are breathing directly into and out of your heart center. As you inhale, imagine the heart expanding. As you exhale, imagine it remaining open and spacious. The breath is slow and gentle. There is no force. With each cycle, imagine that your heart is becoming more and more radiant. Do this for five to seven minutes. This practice opens the heart to loving awareness and dissolves the contraction that comes from fear and shame.'
