atom_id: sai_ma_EXERCISE_002
body: 'Lie on your back with your knees bent and feet flat on the floor. Place your hands anywhere on your body that holds pain or shame. Breathe deeply and place your attention on those hands. With each breath, imagine that you are sending love, gentle light, and permission to that part of your body. You might speak silently: I see you. I hold you with love. You are safe. Continue for five to ten minutes. This practice is trauma-sensitive and deeply healing for shame held in the body.'
