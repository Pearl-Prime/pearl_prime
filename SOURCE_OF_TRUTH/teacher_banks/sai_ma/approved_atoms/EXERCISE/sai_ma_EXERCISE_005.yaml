atom_id: sai_ma_EXERCISE_005
body: 'Stand or sit comfortably. Bring your hands to prayer position at your heart. Take a deep breath in. As you exhale, gently bow your head toward your heart—a gesture of honor and devotion to your own sacred self. Repeat this bow with each breath, eight to twelve times. As you bow, say silently: I honor my own heart. I bow to the divine feminine in me. I am worthy of my own reverence. This is a simple but profound practice that shifts your relationship to yourself from judgment to devotion.'
