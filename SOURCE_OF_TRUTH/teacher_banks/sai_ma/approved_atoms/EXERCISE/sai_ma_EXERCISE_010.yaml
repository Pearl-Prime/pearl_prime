atom_id: sai_ma_EXERCISE_010
body: 'This is a compassionate boundary practice. Sit comfortably and place your hands in front of you, palms facing outward. This is the gesture of healthy boundaries. Breathe and say silently: I am kind and I am clear. I protect my own heart. I say no with love. I honor myself with clear boundaries. I can love others and still protect my own wholeness. Hold this gesture and repeat for five to seven minutes. This practice reconnects you with the power to honor both love and boundaries simultaneously.'
