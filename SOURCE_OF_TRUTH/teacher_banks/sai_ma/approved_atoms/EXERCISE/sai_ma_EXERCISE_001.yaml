atom_id: sai_ma_EXERCISE_001
body: 'Stand with your feet hip-width apart. Place one hand on your heart and one hand on your belly. Begin to sway gently side to side, rocking your hips slightly. As you move, imagine that you are dancing with the divine feminine, with Shakti itself. You are not performing. You are simply allowing your body to move in the way it wants to move. Let this continue for five to seven minutes. This practice reconnects you with the sacredness of your own body and dissolves shame held in the hips and belly.'
