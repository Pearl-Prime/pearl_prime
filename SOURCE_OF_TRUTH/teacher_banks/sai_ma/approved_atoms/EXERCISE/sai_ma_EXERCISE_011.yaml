atom_id: sai_ma_EXERCISE_011
body: 'Lie on your back with your knees bent and feet hip-width apart. Place your hands on your belly. Begin to breathe deeply and slowly, imagining that you are breathing into the very cells of your body and offering them love and gratitude. Silently say: Thank you to my heart for beating. Thank you to my body for carrying me. Thank you to my spirit for persisting. I am enough. I am worthy. I am loved. Continue for seven to ten minutes. This practice of somatic gratitude transforms your relationship to your own body and is deeply healing for shame and anxiety.'
