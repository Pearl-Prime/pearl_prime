atom_id: sai_ma_EXERCISE_004
body: 'This is a loving awareness meditation. Sit with your spine upright. Close your eyes. Imagine a light at the center of your chest—the seat of your heart. This light is always present, always luminous. Begin to expand this light with each breath, allowing it to fill your entire body. With each expansion, say: I am the light that cannot be diminished. I am Shakti. I am worthy. I am sacred. Continue for seven to ten minutes. This practice directly counters shame and anxiety by reconnecting you with your inner luminosity.'
