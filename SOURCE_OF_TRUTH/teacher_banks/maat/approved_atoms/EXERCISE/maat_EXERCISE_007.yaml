atom_id: maat_EXERCISE_007
body: 'Take a slow twenty-minute walk with no phone, no earbuds, no destination. As
  you walk, silently or softly repeat one word with each step — "Love," "Beloved,"
  "Present," or whatever calls to you. Let your feet and your word be one rhythm. This
  is walking dhikr, practiced by Sufis for centuries. It does not require belief — only
  willingness. Notice what quiets in you by the time you return.'
