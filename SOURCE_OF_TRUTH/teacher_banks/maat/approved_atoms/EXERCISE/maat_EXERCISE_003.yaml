atom_id: maat_EXERCISE_003
body: 'Find a piece of music that moves you deeply — sacred, classical, or whatever
  opens your chest. This is sama: sacred listening. Sit with eyes closed. Do not analyze
  the music. Let it pass through you like water. Notice what rises — grief, joy, longing,
  relief. Do not chase it. Do not stop it. This is how the Sufi opens: through sound,
  not through trying.'
