atom_id: maat_EXERCISE_012
body: 'Take out a piece of paper. Write down the financial fear in one sentence — raw,
  honest. Then below it, write: "And what do I actually need right now to feel safe?"
  Below that: "What is one true thing I can do today?" The Sufi path is not about bypassing
  the practical — it is about meeting the practical from a grounded heart rather than
  a panicking nafs. Ground first. Then act.'
