atom_id: maat_EXERCISE_001
body: 'Find a quiet place and sit comfortably. Close your eyes. Begin to breathe slowly.
  On each exhale, whisper or silently repeat "Ya Allah" or simply "Beloved." Let the
  word be a return — not an effort but a falling back into what was always there. Do
  this for five to ten minutes. This is a simplified form of dhikr — remembrance. You
  do not need to be Muslim or religious to practice this. You only need the longing.'
