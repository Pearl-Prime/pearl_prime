body: |
  Balance Inquiry: Bring to mind an area of your life where you feel anxious or burnt out. Ask: "What would be in balance here?" Not perfection, not happiness — balance. "If I honored all parts of this equally — my needs and theirs, my rest and my activity, my truth and their comfort — what would shift?" Write down what you notice. Often anxiety comes from imbalance: giving too much, taking too little, performing rather than being. The feather of truth measures whether your life is in alignment with what is actually true about you.
