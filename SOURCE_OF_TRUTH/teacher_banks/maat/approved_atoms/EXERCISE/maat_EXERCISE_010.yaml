body: |
  Distinguishing Truth from Story: When anxiety or shame speaks, pause. Ask: "Is this a story my mind is telling, or is this actually true?" A story: "Everyone will abandon me." Truth: "I am vulnerable in relationships." Truth is specific, immediate, and grounded. Story is abstract, predictive, and defended. Learning to distinguish these trains your nervous system to trust what is real rather than what is feared.
