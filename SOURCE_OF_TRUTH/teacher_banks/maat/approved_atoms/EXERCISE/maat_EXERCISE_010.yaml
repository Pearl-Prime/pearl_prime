atom_id: maat_EXERCISE_010
body: 'When social anxiety rises before you enter a room, pause just outside the door.
  Place one hand on your heart. Take one slow breath. Silently say: "I am a soul.
  They are souls. The Beloved is present." This is not a technique — it is a remembrance.
  You are reminding yourself of the deepest truth about everyone in that room. Enter
  from that ground. Notice how the room feels different.'
