atom_id: maat_EXERCISE_004
body: 'Write a letter to the Beloved — not as a prayer asking for something, but as
  a love letter. Tell the Beloved what you have been carrying. Tell the Beloved what
  you are afraid of. Tell the Beloved what you are longing for. You do not need to
  believe in God for this to work. You only need to write honestly. When you finish,
  read it aloud once — slowly. Let your own words land in your own ears.'
