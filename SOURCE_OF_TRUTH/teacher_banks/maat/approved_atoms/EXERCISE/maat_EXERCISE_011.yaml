atom_id: maat_EXERCISE_011
body: 'Scan your body slowly from feet to crown. Where is there tension, numbness, or
  holding? Place your hand there. Breathe into it — not to fix it, but to say "I see
  you." The Sufi body is not a vessel to be conquered; it is where the soul lives.
  Your somatic symptoms are not noise — they are the soul asking to be included. Spend
  five minutes in this gentle acknowledgment.'
