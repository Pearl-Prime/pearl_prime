body: |
  Returning to What Is: Throughout your day, pause and ask: "What is actually true right now?" Not what you fear. Not what you should be doing. What is the truth? "I am sitting." "I am breathing." "My heart is full of grief and also hope." "I am scared and I am here." The feather of Ma'at measures the heart's alignment with what is. The more you return to what is actually true, the less the mind's predictions have power over you.
