atom_id: maat_EXERCISE_006
body: 'Before sleep tonight, lie on your back with arms slightly open. Breathe naturally.
  On each exhale, silently say "Huuu" — the Sufi breath of the Divine Name. Let it
  be barely audible, more vibration than sound. Feel it in your chest. You are not
  trying to achieve anything. You are letting the Beloved breathe you. Do this for
  five minutes. Sleep is a small fanaa — a nightly practice of letting go.'
