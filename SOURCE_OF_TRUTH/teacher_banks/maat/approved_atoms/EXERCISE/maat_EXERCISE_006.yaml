body: |
  Right Relationship with Your Limits: Examine an area where you give too much or stretch yourself too thin. What would right relationship look like? Right relationship is not selfish, but it includes your own sustainability. Notice the shame that arises when you even consider setting a limit. This shame is conditioned, not true. Your limits are not failures — they are your honest boundaries. Ma'at teaches balance. A boundary is a truth-telling act. Practice setting one small boundary and notice what shifts in your body.
