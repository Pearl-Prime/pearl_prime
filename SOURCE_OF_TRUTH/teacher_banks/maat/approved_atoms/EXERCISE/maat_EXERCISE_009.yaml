atom_id: maat_EXERCISE_009
body: 'Sit with your grief for ten minutes — not to fix it, not to process it, but to
  keep it company. Light a candle if you like. Say aloud: "I am here with you." Let
  yourself cry if it comes. The Sufi tradition holds that tears are sacred — they are
  the heart dissolving, making room. Do not rush to be okay. Let the grief be what
  it is: love that has not yet found its full address.'
