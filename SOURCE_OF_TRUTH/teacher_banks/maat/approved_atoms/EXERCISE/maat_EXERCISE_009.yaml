body: |
  The Field of Belonging: When you feel isolated by shame, remember: you are part of a larger field. The field of Ma'at holds all beings — broken, grieving, struggling, hidden. You are not separate. Sit quietly and imagine yourself as part of this larger awareness. Your truth is not separate from the truth. Your grief is not alien to the cosmos. You belong. This is not metaphor but fundamental reality. Let this sink into your nervous system. You are never truly alone.
