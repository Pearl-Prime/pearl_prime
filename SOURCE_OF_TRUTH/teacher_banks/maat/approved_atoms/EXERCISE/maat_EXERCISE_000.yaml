body: |
  The Feather of Truth: Bring to mind something you are hiding or ashamed to speak. Sit with it for a moment. Now ask yourself: "If I spoke this truth aloud to someone safe, what would happen?" The mind will predict catastrophe. But Ma'at teaches that truth does not cause harm — hiding causes harm. Speaking truth is grounding, like placing weight on solid earth. You need not speak to everyone, but find one person, one safe witness, and speak your truth plainly. Notice what happens to your body, your nervous system, when truth is witnessed instead of hidden.
