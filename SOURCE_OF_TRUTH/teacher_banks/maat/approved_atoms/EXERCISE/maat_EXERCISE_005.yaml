body: |
  Truth-Speaking Practice: Take something you normally hide or soften when speaking to others. Practice stating it plainly, without apology or over-explanation. "I'm tired." "I don't know." "I'm struggling." "I don't agree." Notice the difference between this plain truth and your usual softened version. Plain truth is grounding. It doesn't require defense because it is simply what is. Over time, truth-speaking becomes easier, and shame around having needs or limits begins to dissolve.
