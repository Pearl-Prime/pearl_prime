atom_id: maat_EXERCISE_005
body: 'Stand barefoot if possible. Close your eyes. Take three slow breaths. On each
  exhale, consciously drop the weight you are carrying — shoulders down, jaw unclenched,
  chest open. Say aloud: "I give this back." Do not specify what. Let your body know.
  This is a simplified fanaa practice — releasing the grip of the nafs, even for a
  moment, so the Beloved can fill the space. Repeat three times.'
