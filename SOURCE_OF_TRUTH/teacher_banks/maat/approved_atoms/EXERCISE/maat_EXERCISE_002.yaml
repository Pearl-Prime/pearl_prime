atom_id: maat_EXERCISE_002
body: 'Place one hand on your chest over your heart. Breathe slowly. With each inhale,
  silently say "I am here." With each exhale, say "You are here." Continue for five
  minutes. This is heart dhikr — acknowledging both your presence and the Beloved''s
  presence in the same breath. The anxiety in your chest is not your enemy; it is the
  pressure of the heart wanting to open.'
