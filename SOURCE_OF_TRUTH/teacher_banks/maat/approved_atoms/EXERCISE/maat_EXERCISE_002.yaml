body: |
  Grounding in What Is: When anxiety or shame arises, pause. Feel your feet on the ground. Feel the weight of your body being held by the earth. Notice what is actually happening right now, in this moment, that is true. Not what you fear might happen. Not what you think you should be. Just what is. The field of Ma'at is always supporting you. You are held. Breathe into that reality. Let your nervous system recalibrate to what is actually present rather than what the mind predicts.
