atom_id: maat_EXERCISE_008
body: 'Sit quietly. Bring to mind someone you have been giving to until you feel empty —
  a parent, a colleague, a partner, a cause. Now imagine a source of light above your
  head — not your energy, but the Beloved''s. Let it pour through you, through your
  heart, and outward to them. You are the channel, not the source. Practice breathing
  this way for five minutes. Compassion fatigue cannot survive this shift in source.'
