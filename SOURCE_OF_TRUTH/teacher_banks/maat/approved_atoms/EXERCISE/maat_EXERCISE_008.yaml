body: |
  Standing in Your Own Truth: Place your feet on the ground. Feel the earth supporting you. Imagine a plumb line running down the center of your body into the earth. This is your alignment with what is true about you. From this standing, ask: "What is actually true about me, separate from what others believe or want?" Not in rebellion, but in simple fact. "I am learning." "I have limits." "I matter." Feel these truths as grounding. Your own truth is your right relationship with reality.
