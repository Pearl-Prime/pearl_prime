body: |
  When I teach dhikr, the first thing I have to undo is what the word "practice"
  has already done to your imagination. You picture a timer. A cushion. A technique
  to execute correctly. And I understand why — that is the grammar of the world you
  live in. But dhikr is not a technique. It is a return.

  Remembrance means you forgot. Not permanently. Not because something is wrong with
  you. Simply because the world is very loud and very insistent, and the Beloved
  speaks in a register quieter than most of what fills a day. Dhikr is the act of
  turning your attention back — in the breath, in the pause between words, in the
  moment between sleeping and waking when the constructed self has not yet fully
  assembled itself for the day.

  The Naqshbandi way carries a particular gift here: silent dhikr. Not the outer
  repetition of a name, but the remembrance held in the heart-chamber itself, below
  the level of language. The Beloved is not discovered by saying the right words.
  The Beloved is discovered by becoming quieter than the words.

  Ma'rifa — experiential mystical knowing — is what dhikr opens toward. Not
  information about God. Not a better theological framework. The actual taste of
  divine presence, which once tasted cannot be forgotten. Dhikr is not an
  obligation you fulfill. It is an invitation you accept, breath by breath, back
  to the one relationship that was never broken.
