body: |
  The wound you keep trying to fix might be the door you keep trying to shut.

  This is not a comfortable teaching. But the Sufi path has never been comfortable
  in the way the self-improvement world uses that word. It is comfortable the way a
  fire is comfortable: you want to be closer even though it changes you, and you
  cannot quite explain why.

  Longing — the ache, the feeling of being almost-there, the reaching that never
  quite grasps what it reaches for — this is not a problem to be solved. In the
  Sufi understanding, longing is the breath of the Beloved moving through you.
  The lover aches for the Beloved because the Beloved is already present in the
  aching. This is the paradox that cannot be reasoned into; it can only be lived.

  Ibn Arabi wrote that the Beloved is simultaneously hidden and manifest — that
  the veil and the face are made of the same light. The longing you experience is
  not evidence that God is far. It is evidence that God is close enough to pull.

  When I work with people who are in genuine grief — loss, failure, the slow
  erosion of a life that did not become what was hoped — I do not hurry them
  toward resolution. The grief is the call. The wound is the opening. The Sufis
  have always known that a broken heart is not a damaged heart. It is a heart
  broken open. And a heart broken open is a heart the Beloved can finally enter
  without being held at the door.
