body: |
  People come to me having heard the word Sufi and they arrive already apologizing.
  "I'm not Muslim." "I'm not religious." "I don't know if this is for me." And
  I have to stop them there, at the door, before the apology finishes, because the
  apology itself is the very thing the tariqa exists to dissolve.

  The inner way does not ask for your credentials. It asks for your longing.

  Hazrat Inayat Khan brought this lineage to the West with a specific intention:
  that the heart-path of Sufism was never the exclusive property of any religion,
  any culture, any set of outward forms. The Beloved does not check passports. The
  Beloved receives whoever arrives with love.

  What I have learned, carrying both the Naqshbandi transmission and the years I
  spent as a Buddhist monk, is that the mystic currents beneath every tradition
  converge. They converge because they are pointing at the same thing. The names
  differ. The forms of dhikr differ. The songs change. But the fire is the same fire.

  When you sit in our circle, you are not joining a religion. You are joining a
  lineage of longing — lovers who found that the heart has a direction, and that
  direction is toward the Beloved. Whatever name you have been calling God, whatever
  name you stopped calling because the word felt hollow — bring it. Or bring the
  silence where the name used to be. The tariqa meets you there. The door is not
  narrow. It has never been narrow. It is only love.
