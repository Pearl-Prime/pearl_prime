body: |
  Rumi taught from a place that the mind cannot fully map. He taught that music —
  the reed flute's cry, the turning of the dervish, the poetry that breaks the
  listener open — was not entertainment for the spiritual life. It was the door.

  Sama is the practice of sacred listening, and when I teach it, I am asking
  something radical of you: stop consuming the sound and let the sound do
  something to you. There is a difference. The first keeps you as the manager.
  The second allows you to become the one being managed by grace.

  I have watched engineers weep in sama who had not wept in twenty years. Not
  because the music manipulated their emotions — but because for the first time
  they were not standing behind glass watching their own experience. The sound
  found a crack in the defended self, and through that crack the Beloved entered.

  The heart is a chamber. This is not a metaphor I chose for its beauty. It is
  reported experience, across fourteen centuries of Sufi practice: there is a
  place in the chest that knows things the mind has not yet been told. Sama opens
  that chamber. It does not teach you about divine love. It delivers you into it.

  You do not have to understand why music does this. You do not have to believe
  it will work before it works. You only have to show up and actually listen — not
  listen for something, not listen at the sound, but listen as the sound moves
  through you. The rest is the Beloved's work.
