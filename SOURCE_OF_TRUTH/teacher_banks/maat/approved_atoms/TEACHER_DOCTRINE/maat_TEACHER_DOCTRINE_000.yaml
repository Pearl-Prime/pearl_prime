body: |
  There is a teaching that runs like fire through the Sufi tradition — one that
  modern seekers often misunderstand the moment they encounter it. Fanaa. The word
  means dissolution, and the mind translates it as retreat. As emptying. As
  withdrawal from the world into some pale stillness.

  This is the opposite of what the Beloved asks of you.

  Fanaa is not detachment. It is not the careful backing away from what you love in
  order to stay safe from longing. It is the complete burning away of the part of
  you that believed it could remain separate from Love. The moth does not withdraw
  from the flame to find peace. The moth gives itself entirely, and in that giving,
  discovers there is no longer a moth and a flame — there is only light.

  What dissolves in fanaa is the nafs — the grasping, performing, defending self
  that has spent years insisting it is real. What remains is not nothingness.
  What remains is the Beloved. What remains is exactly what you have been searching
  for since the first moment longing was born in your chest.

  The tariqa — the inner path — does not lead you away from feeling. It leads you
  into feeling so completely that the one who feels disappears. If your practice
  makes you colder, more protected, more guarded against love, look again. The
  Beloved is not calling you to safety. The Beloved is calling you home.
