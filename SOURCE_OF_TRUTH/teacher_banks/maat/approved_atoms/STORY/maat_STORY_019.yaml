body: |
  Priya marks the last answer on her student's exam and puts the red pen down.

  The mark is a failing grade. She has checked it twice. The arithmetic does not change.

  Her student, Deon, told her last week that his scholarship requires a passing score. He told her with his chin lifted and his hands still at his sides, the way people speak when they refuse to beg.

  Priya looks at the exam. She looks at the blank space beside the grade.

  Her hand moves toward the pen.

  She stops.

  Her stomach contracts. She knows what she almost did. She has done it before, for other students, in other years, and called it compassion. She knows now what it actually was.

  It was her own discomfort she was trying to relieve. Not his.

  She sits back. Her spine straightens against the chair.

  The truth of the exam is the truth of the exam. Deon answered seventeen questions. He answered twelve correctly. The feather of truth does not adjust itself for good intentions or difficult circumstances.

  What she can do is offer him her full attention next week. Extra hours. Honest feedback about where his understanding breaks. That is the help that respects him.

  She writes the grade in the box. Her hand is steady.

  She adds a note at the bottom of the page: "Come find me Monday. We have work to do."

  This is not cruelty. This is right relationship with what is true.

  She seals the exam in its envelope and sets it in the return pile.

  Her stomach unclenches. The discomfort does not disappear, but it settles into something she recognizes as integrity.
