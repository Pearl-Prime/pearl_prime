body: 'Benedicta was sixty-seven when she lost everything she thought defined her worth:
  the house sold to pay debts after her husband''s illness, the savings depleted, the
  retirement plan in tatters. She had grown up in a family that equated financial
  security with dignity, and now the security was gone and she was in a small rented
  apartment learning to use public transportation for the first time in thirty years.

  The shame was enormous. She could not speak about it, not even to her closest friends.
  The shame said: you see who you really are now. You are less than you appeared to be.

  Her granddaughter, who practiced Sufism, called her every Sunday. One Sunday she
  said: "Grandma, did you know that in the Sufi tradition, being stripped of worldly
  things is sometimes called a gift? Not because poverty is good, but because the
  stripping shows you what was always real and what was decoration?"

  Benedicta was silent for a long time. Then she said: "I don''t know what''s real
  anymore."

  Her granddaughter said: "You called me every week through my depression. You sat
  with me on that bathroom floor. That was real. That is still here."

  Benedicta put the phone down and sat in her small apartment and looked around her —
  at what was left, what had survived the stripping — and for the first time she saw
  it was not nothing. It was not the life she had built. But it was, perhaps, closer
  to the life she had actually been.'
