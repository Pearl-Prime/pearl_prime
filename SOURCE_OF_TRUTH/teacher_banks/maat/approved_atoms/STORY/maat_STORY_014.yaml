body: 'Kwame was thirty-three and had a pain in his chest that three different doctors
  had cleared. Scans, bloodwork, a stress test — all normal. The pain persisted. It
  was not sharp enough to be alarming, just present enough to be impossible to ignore:
  a tightness, a pressure, as if something inside him was clenched and had been clenched
  for a long time.

  His therapist asked him about his childhood. He talked about it. The pain did not
  change. A bodyworker told him it was stored tension in the fascia. That helped slightly.
  A breath coach taught him how to breathe into his diaphragm. That helped slightly.
  Nothing resolved the root thing.

  At a friend''s suggestion he attended a somatic healing workshop led by a Sufi teacher
  who was also a trained trauma therapist. The teacher asked everyone to place a hand
  on the part of their body that was holding something. Kwame''s hand went immediately
  to his chest.

  "That is not muscle tension," the teacher said, not specifically to him but as if
  to him. "That is the heart saying it has been carrying something it was not meant
  to carry alone."

  Kwame felt something shift — not resolve, but shift. He began to weep quietly, which
  surprised him. He had not wept in years. The pain in his chest moved, as if it had
  been waiting for permission to move. He understood, somewhere below words, that
  the body had been faithful: it had been keeping the record of everything the mind
  had refused to feel.'
