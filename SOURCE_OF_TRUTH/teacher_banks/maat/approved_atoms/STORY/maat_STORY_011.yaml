body: |
  Oya lies awake, her mind spiraling about the boundary she set today.
  
  The shame is thick. The story is loud: "You are selfish. You broke something. You hurt them."
  
  But something moves in her. A question: "What is actually true about what I did?"
  
  She spoke a limit. She said no to something that would deplete her. She chose to remain whole rather than shatter herself for someone else's comfort.
  
  This is not cruelty. This is Ma'at.
  
  She feels her heart rate slow. Her body begins to settle. The shame is still present, but something underneath it is solid now.
  
  The feather of truth—what she actually did—is lighter than the story of selfishness she was carrying.
  
  She breathes. She feels her ground. And for the first time, the boundary and kindness feel like they can exist together.
