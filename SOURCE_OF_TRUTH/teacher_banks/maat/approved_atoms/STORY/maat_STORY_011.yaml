body: 'David had been told his whole life that he was good with money. He had a spreadsheet
  for everything. He tracked expenses meticulously, saved diligently, planned years
  ahead. And yet money remained the source of a deep, persistent terror that no amount
  of spreadsheet mastery had been able to dissolve.

  When his business failed at forty-six — genuinely failed, not a setback but a collapse —
  the terror became total. For three months he barely left the house. Not because
  he was unable to work, but because the collapse had confirmed something he had always
  suspected and spent decades trying to disprove: that he was not enough, and that
  not-enough-ness would eventually be exposed.

  He found his way to a therapist and, through the therapist, to a spiritual direction
  session with a Sufi teacher. He expected something mystical and impractical. Instead
  the teacher asked him a question that stopped him cold: "What is it that you think
  money is actually protecting you from?"

  He had never asked himself that. He had been managing money; he had never looked
  at what was underneath it. He answered slowly: from being invisible. From mattering
  to no one. From the truth that he was alone.

  "That fear," the teacher said, "is not a financial problem. It is a soul problem.
  And the Beloved has an answer for it that no amount of money can provide." David
  cried, which he had not done since his father''s funeral. Something that had been
  locked for a long time began, cautiously, to open.'
