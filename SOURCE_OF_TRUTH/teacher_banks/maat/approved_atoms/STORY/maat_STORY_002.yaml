body: |
  The Nile overflows each year. It brings water. It brings silt. It brings fertility.
  
  Then it recedes. The soil is left changed. Life grows.
  
  The ancient Egyptians understood something: the overflow is not punishment. The recession is not abandonment. This is Ma'at—balance, rhythm, the principle of order itself.
  
  Grief is like the Nile. It overflows. It brings the waters of emotion. It deposits silt—the weight of loss, the evidence of what mattered.
  
  Then it recedes. The person is left changed. And on that changed ground, new life can grow.
  
  But we resist the overflow. We try to dam it. We try to speed the recession. We add shame on top of grief—feeling bad that we still grieve.
  
  The teaching of Ma'at is this: let the grief overflow. Let it do its work. The recession will come. The balance will return. But only if you allow the cycle.
