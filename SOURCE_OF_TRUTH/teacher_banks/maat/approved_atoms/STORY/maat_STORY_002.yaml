body: 'Marcus had been grieving his father for two years without knowing that was what
  he was doing. He thought he was just stressed, just busy, just not sleeping well.
  His father had died on a Tuesday in November and Marcus had organized the funeral,
  handled the estate, supported his mother, and gone back to work the following Monday.
  There had not been time to grieve. And then there had been time, and he did not
  know how.

  A colleague mentioned a grief circle that met at a mosque community center — open
  to all faiths, she said, run by a woman who taught Sufism. Marcus almost said no.
  He was not spiritual. But he was also desperate, in the quiet way that people become
  desperate when they have been managing everything for too long.

  In the circle, the teacher did not ask him to believe anything. She asked him to
  place his hand on his heart and simply say his father''s name aloud. Marcus said
  "Joseph." His voice broke on the second syllable. He had not spoken his father''s
  name since the funeral.

  "Grief is love in motion," the teacher said. "Let it move."

  For the first time in two years, Marcus let it move. He sat in a room full of strangers
  and he wept, and it was not embarrassing, it was sacred — and he felt his father
  close, not gone, just elsewhere in the same love.'
