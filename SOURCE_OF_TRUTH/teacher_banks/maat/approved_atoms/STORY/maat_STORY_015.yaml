body: 'Sasha was twenty-four and had taken out loans to cover rent three times in the
  past year. She was a freelance illustrator and the income was real but unpredictable,
  and the unpredictability had become its own chronic stressor — not about any specific
  number but about not knowing. Every week felt like it might be the week the floor
  gave way.

  She had tried budgeting apps, had tried a side hustle, had tried ignoring the anxiety
  and had tried facing it directly. Nothing touched the root thing: a deep, animal
  terror of not being okay that no amount of planning could fully soothe.

  Her older sister, who had been practicing Sufism for years, sat with her one Sunday
  morning and did not offer advice. She offered a question: "What is the worst thing
  you imagine happening — not in money terms, but in human terms?"

  Sasha thought for a while. Then: "That I will be alone and no one will care."

  Her sister was quiet. Then: "And is that actually true? Is there anyone in your life
  right now who would let you fall without helping?"

  Sasha named four people immediately. Her sister said: "The Beloved gives provision
  in forms we do not always recognize. Sometimes it comes as money. Sometimes it comes
  as people. You are better provided for than your fear will allow you to see."

  Sasha cried a little. The fear did not vanish. But it became more accurately sized — and
  a more accurately sized fear was far easier to live with.'
