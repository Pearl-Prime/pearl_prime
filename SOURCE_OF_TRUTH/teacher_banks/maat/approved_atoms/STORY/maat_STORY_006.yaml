body: 'Jin-woo was forty-four and had been worrying about money for as long as he could
  remember — first as a child watching his parents argue over bills, then as a young
  man scraping through graduate school, then as a middle-aged father who earned more
  than his parents ever had and still woke at 4 a.m. calculating.

  The anxiety was not about the numbers anymore. He knew that. The numbers were fine —
  not luxurious, but stable. The anxiety was a habit of the nervous system, a groove
  worn deep by decades of vigilance. He could not stop scanning for threat because
  his body did not know the threat had passed.

  His therapist had helped. But something was still missing — something the therapy
  could explain but not touch. He needed something below the level of explanation.

  A friend brought him to a Sufi gathering. He sat in the back, skeptical. The teacher
  spoke about tawakkul — trust. Not naive trust, not the denial of difficulty, but
  the trust of the person who has placed their hand in a larger hand and knows they
  are not walking alone. "Vigilance exhausts the one who must do it alone," the teacher
  said. "Trust distributes the weight."

  Jin-woo felt something he could only describe as a loosening — as if someone had
  removed a coat he had been wearing so long he had forgotten it was not his skin.
  He was not transformed. But he was, for the first time in decades, not alone with
  the fear.'
