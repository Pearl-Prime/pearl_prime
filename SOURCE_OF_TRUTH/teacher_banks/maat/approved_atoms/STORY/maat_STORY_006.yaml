body: |
  In the Egyptian teaching, there are two feathers of Ma'at—not one.
  
  One feather weighs truth. The other weighs the heart's alignment with what is true.
  
  You can speak truth and still be out of balance if you speak it harshly, without witnessing the other. You can silence truth and claim kindness, but you are still out of balance.
  
  Right relationship—what the Egyptians called Ma'at—is when truth and compassion balance together. When what you say aligns with what is actually real, AND when you speak with regard for the other's capacity to receive.
  
  This is not compromise. This is integrity.
  
  The scales that do not lie show: truth spoken with contempt tips toward cruelty. Kindness that hides truth tips toward deception. But truth held with genuine care for the other—that balances perfectly.
  
  This is what rightness feels like in the body. The integration of what is true and how you move it into the world.
