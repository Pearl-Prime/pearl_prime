body: 'Darius was twenty-nine and had never thought of himself as a spiritual person.
  He was a data analyst. He believed in what he could measure. He had started having
  panic attacks six months before — the first one in a grocery store, the second at
  work, the third in his own bed at 2 a.m. — and the attacks had no clear trigger and
  no clear logic and this made them worse, because he could not analyze his way out.

  His therapist was helping. But the therapy addressed the panic as a problem to be
  solved, and somewhere in him he sensed that the panic was not purely a malfunction.
  It was also a message. He just did not know how to read it.

  At a corporate wellness event — of all places — a speaker mentioned a concept he
  had never heard: that in the Sufi tradition, states of extreme disorientation are
  sometimes understood as the soul breaking out of a too-small container. The panic
  is the container cracking.

  He looked up the speaker afterward and found her essays. He read them at 2 a.m.
  when the next panic came. One line caught him: "You are not broken. You are outgrowing
  something. The Beloved does not send these openings to destroy you — they come to
  make you larger."

  Darius did not become a mystic. But he began to sit with the panic differently —
  not as malfunction but as information, not as threat but as threshold. The attacks
  decreased. He started meditating. He told no one at work. But something in him that
  had been very small and very frightened began, slowly, to have more room.'
