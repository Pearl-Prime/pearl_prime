body: 'Amara was twenty-seven and had been saying yes to everything since she was nine
  years old. Yes to staying late. Yes to taking on more. Yes to the extra project,
  the extra shift, the extra responsibility. She had learned early that yes kept things
  smooth, that yes was safe, that saying no made people angry or disappointed and
  that their disappointment was somehow her fault.

  She came to the boundary workshop not because she wanted to learn to say no, but
  because her body had started saying it for her. Migraines. A rash that appeared
  every Sunday night. A jaw so tight the dentist had fitted her for a night guard.

  The teacher opened with a question: "What are you protecting when you refuse to
  set a limit?" Amara thought the answer was other people''s feelings. Then she thought
  longer and realized: she was protecting the illusion that she was indispensable.
  The nafs needs to be needed.

  "A boundary," the teacher said, "is not a wall against love. It is the container
  that makes real love possible. Without it, you are not giving — you are bleeding."

  Amara thought of the rash. She thought of the migraines. She thought of how she
  had been bleeding for eighteen years and calling it generosity.

  She did not transform overnight. But she said no to one thing the following week —
  a small thing, a favor that would have cost her a full Saturday. The migraine that
  Sunday did not come.'
