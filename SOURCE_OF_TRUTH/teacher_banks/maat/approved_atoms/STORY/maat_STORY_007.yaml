body: |
  The scales of Ma'at are not about judgment. They are about physics.
  
  When a thing is in balance, it is stable. A balanced wheel turns. An unbalanced wheel wobbles and eventually fails.
  
  A life that is all giving and no receiving is unbalanced. The person collapses.
  
  A life that is all receiving and no giving is also unbalanced. The person becomes isolated.
  
  Ma'at is the principle that invites you to notice: Where am I out of balance?
  
  Not as a moral failure. But as a practical reality. If you are burning out, you are giving more than you can sustain. If you are resentful, you are giving what you don't have to give.
  
  The teaching is not to become selfish. The teaching is to find the balance where you can give sustainably, from a place of genuine capacity.
  
  When you are in balance, you are at peace. Not because everything is resolved, but because your system is stable. You are not betraying yourself. You are not depleting yourself.
  
  The scales return. And in that return, life becomes livable again.
