body: 'Lena was sixty-one, recently retired, and deeply adrift. She had defined herself
  by her work for thirty years — first as a teacher, then as a school principal, then
  as an education policy advisor. She had been good at all of it. She had mattered.
  And now she sat in a house that was quiet in a way that felt not peaceful but vacant,
  and wondered who she was without the role.

  Her daughter had gently suggested she might be experiencing something like an identity
  crisis. Lena found the phrase both accurate and humiliating. At sixty-one she was
  supposed to know who she was.

  A friend brought her to a Sufi women''s circle. The women ranged in age from twenty
  to eighty. The teacher — a woman who was also an engineer and spoke precisely and
  warmly — said: "The role is what you did. The soul is what you are. Most of us never
  distinguish between these until the role is taken away."

  Lena felt something inside her bristle, then soften. She had spent thirty years
  pouring herself into a role. She had been magnificent. But beneath the role was something
  she had not tended — something older, quieter, and, the teacher suggested, what
  the Beloved had always been in love with: not the work, but the one who did the
  work.

  She did not feel the relief immediately. But she began to wonder, for the first time
  in years, who that one was. The wondering itself felt like the beginning of something.'
