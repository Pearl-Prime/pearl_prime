body: |
  Kesi sits in silence, eyes closed. The ground beneath her. The breath moving.
  
  She is in the presence of someone who knows her completely. All the shameful parts. All the ambitious parts. All the parts she hides from the world.
  
  And she is received. Not forgiven. Not advised. Received.
  
  In this witnessing, something settles. The weight she has been carrying begins to lighten.
  
  Not because the truth of her actions changes. But because the truth of her belonging becomes visible.
  
  The field that holds all beings holds her too. The cosmic order that includes light and shadow, victory and failure, includes her exactly as she is.
  
  She is not special. She is not singled out. She simply belongs to what is.
  
  And that belonging—that witnessing—changes everything.
