body: 'Kezia was fifty-two and had built three companies. She was known for her decisiveness,
  her strategic clarity, her ability to walk into a room and own it. None of her colleagues
  knew that before every significant meeting she stood in a bathroom stall practicing
  breathing, waiting for the cold wave of dread to pass.

  Social anxiety, she had finally admitted to herself, was the wrong name for what
  she experienced. It was more like the constant awareness of being watched and judged —
  not by the people in the room, but by some internal auditor who found her wanting
  before she had even spoken.

  A friend gave her a book by Hazrat Inayat Khan. She read it on a long flight and
  found herself underlining sentences she could not fully explain. One passage stayed:
  "When you know that the Beloved is watching, the gaze of every other is only a
  reflection — and a reflection cannot judge the original."

  She held that for the rest of the flight. If the only real gaze was the Beloved''s
  gaze — and if that gaze was love — then what was the auditor in her head? Just the
  nafs, performing its ancient performance. Not truth. Not God. Just fear wearing
  the costume of judgment.

  She did not stop being nervous before big meetings. But she began to recognize the
  auditor for what it was: a frightened version of herself trying to protect her by
  pre-emptively finding her lacking. She started saying, silently: "Thank you. I''ve
  got this." The auditor quieted. Not gone — quieted.'
