atom_id: maat_STORY_103
body: |
  The river at dawn holds the same water it held at midnight.
  Nothing is added. Nothing taken. And yet the light changes everything.
  The principle of Ma'at moves through the world this way:
  not as intervention but as what becomes visible when you stop moving
  long enough for the light to find the surface.
  Grief does not need to be resolved to be honored.
  It needs only to be held still long enough to be seen.
