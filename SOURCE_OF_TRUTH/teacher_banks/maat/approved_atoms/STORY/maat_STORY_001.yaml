body: 'Priya had been working fourteen-hour days for eleven months. She was a software
  engineer at a company she believed in, and she genuinely loved the work — or she
  had. Somewhere around month nine, the love had gone quiet. She kept going anyway,
  because stopping felt like failing.

  The night she sat on the bathroom floor at 11 p.m. too tired to move, she did not
  recognize it as a turning point. She thought it was just another Tuesday. But something
  made her put her hand on her chest. Her heart was beating very fast and very alone.
  She whispered, without planning to: "I need help."

  She did not know who she was speaking to. She was not religious. But the words came
  out, and something in the room shifted — or something in her did. A small warmth
  behind her sternum. Not a solution. Not a sign. Just: presence.

  Later, in a Sufi circle she attended on a friend''s invitation, she would hear the
  teacher speak about the difference between giving from a full cup and giving from
  the Beloved''s inexhaustible ocean. She would start to cry before she understood
  why. She had been the source. She had never been meant to be the source. The relief
  of that — after eleven months of trying to be enough on her own — was so profound
  it took weeks to fully land.'
