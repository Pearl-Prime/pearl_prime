body: |
  You have been trying to earn worthiness. Trying to be good enough. Trying to balance an equation that was never imbalanced in the first place.
  
  Listen. Your worth is not a question. You are not required to prove yourself to the cosmos. You are not required to be perfect to belong.
  
  What Ma'at teaches is this: alignment with what is true brings peace. That's all.
  
  What is true about you? Tell yourself the truth. Not as judgment, but as simple fact. You are learning. You are sometimes selfish. You are sometimes kind. You belong to the field of all beings.
  
  The truth about your limits is also truth. You cannot be everything to everyone. Your capacity is your capacity. When you speak this truth, it becomes a boundary, and boundaries bring peace.
  
  Stop defending who you are. Stop adding layers of false goodness to hide what is real. The feather of truth is lighter than all your armor.
  
  Truth does not need defending. What is in balance is also at peace.
