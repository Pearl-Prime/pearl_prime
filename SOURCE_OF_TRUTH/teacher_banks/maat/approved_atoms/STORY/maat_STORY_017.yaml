body: |
  Amara sets the letter on the kitchen table and does not open it.

  Her shoulders draw toward her ears. Her jaw locks. The return address belongs to her mother, and Amara knows what the letter contains before she reads a single word. An apology that is not an apology. A request dressed as love.

  She stands at the window. The street below moves without her.

  Her hands press flat against the glass. The cold travels up her wrists.

  This is the question she carries: what is actually true here. Not what she wishes were true. Not what her mother insists is true. What is true.

  Her mother causes harm. That is true. Her mother also suffers. That is true. These two things sit in the field together, and Amara has spent years trying to collapse one to save the other.

  She picks up the letter. She opens it.

  She reads it once, straight through, without flinching.

  The apology arrives in the third paragraph. It pivots, by the fourth, into a list of Amara's failures. She recognizes the architecture. She has lived inside it.

  She sets the letter down.

  Her breath moves through her chest, slow and deliberate. Her feet find the floor.

  This is witnessing. Not rage. Not forgiveness. Simply seeing what is here without adding anything to it or taking anything away.

  The letter is what it is. Her mother is who she is. And Amara, for the first time in forty-one years, does not reach for a story that makes this easier to hold.

  She picks up a pen. She writes three sentences in reply. All of them true.

  She seals the envelope before she can revise them into something safer.
