body: 'Omar was fifty-five when his marriage ended. He had not seen it coming, which
  was itself a kind of data about how far away from himself he had traveled. His wife
  said she had been trying to tell him for three years that she felt alone. He had
  not heard her. He had been managing, strategizing, planning, providing — and none
  of it had added up to presence.

  After the divorce was final he went through six months that he described to his
  brother as feeling like "living in a grey room." Not suicidal, not dramatic — just
  dulled. Disconnected. Moving through his days like a figure going through motions.

  His brother, who had been attending a Sufi circle for years, finally convinced him
  to come. Omar sat in the circle and felt nothing for the first two sessions. The
  third session, the teacher spoke about depression as the soul going on strike —
  refusing to animate a life that had become disconnected from its source. "When the
  self is cut off from the Beloved," she said, "it goes quiet. It is not punishing
  you. It is waiting."

  Omar felt the word "waiting" land somewhere. He had been grieving. He had been managing.
  He had not been waiting — which meant he had not been leaving space for anything
  new to arrive. He began, very slowly, to leave space. To sit with the quiet instead
  of filling it. In the quiet, something very small and very old — something he recognized
  as himself — began to stir.'
