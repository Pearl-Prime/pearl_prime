atom_id: maat_STORY_105
body: |
  The tradition teaches that Ma'at is not achieved. It is restored.
  This is the distinction that matters for those who are exhausted
  by their own standards: you are not building toward something.
  You are clearing away what accumulated while you were not looking.
  The self-worth that was always there is not the reward at the end.
  It is what you find when the weight of the proving
  has been set down long enough for you to feel the ground underneath.
