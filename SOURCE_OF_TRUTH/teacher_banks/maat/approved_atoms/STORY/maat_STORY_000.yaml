body: |
  In the Egyptian mystery schools, there is a teaching about Ma'at, the principle of truth and cosmic order. The practice was this: when a soul approaches judgment, the heart is weighed against the feather of truth.
  
  If the heart is heavy with dishonesty—with small lies, with self-deception, with the weight of what was hidden—the feather outweighs it.
  
  If the heart is aligned with truth, the feather and the heart balance. They are equal. And in that balance, the soul is at peace.
  
  This is not a judgment about morality. This is physics. Truth has a particular weight. Deception has another. When they balance, the system is in harmony.
  
  This is why shame—which is secrecy—feels so heavy. The hidden thing adds mass to the heart.
  
  But truth spoken aloud, even hard truth, lightens the load. Because truth aligns you with the cosmic order itself. And that alignment brings peace, not punishment.
