body: |
  Truth, like water, does not need defending. Water does not convince you it is water. It simply is.
  
  A river flows over stone. Does the river argue with the stone? No. It simply carves, slowly, with the weight of its own consistency.
  
  This is how truth works in the human heart. It doesn't argue. It doesn't demand belief. It carves slowly, through the stone of our defenses, simply by returning again and again.
  
  When you tell the truth—even small truths, even truths that feel risky—you set something in motion. The river begins its work. The stone begins to transform.
  
  You don't have to convince anyone of the truth. You don't have to defend it. You simply have to speak it, and let its weight do the work.
  
  Over time, the channel opens. And then the river runs more freely. This is Ma'at—not force, but the patient power of what is actually real.
