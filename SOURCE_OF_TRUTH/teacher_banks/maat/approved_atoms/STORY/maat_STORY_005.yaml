body: 'Nadia was a hospice nurse, and she was very good at her work. She had a gift
  for sitting with the dying — for not flinching, for being present in the rooms where
  most people needed to look away. She had chosen this work deliberately. She believed
  in it.

  What she had not anticipated was that after eight years, her gift would begin to
  hollow her out. She started to feel nothing during what should have been the most
  tender moments. A patient would hold her hand and she would feel the physical warmth
  and nothing else. She went home and could not be present for her own children. She
  laughed at things that were not funny because she had forgotten what actually moved
  her.

  Her supervisor called it compassion fatigue and offered time off. Nadia took a week
  and spent most of it staring at her garden, unsure what she was waiting for.

  What helped — unexpectedly — was a Sufi teaching she found in a book a patient had
  gifted her years before and she had never opened. The passage said: "The one who
  gives from their own reserves will be depleted. The one who has learned that they
  are a channel for the Beloved''s love will find the love inexhaustible."

  She sat with the word "channel" for a long time. She had been trying to generate
  compassion from herself. She had never considered that it could pass through her
  from somewhere else. That shift — from source to channel — did not fix everything,
  but it opened something that had been sealed for years.'
