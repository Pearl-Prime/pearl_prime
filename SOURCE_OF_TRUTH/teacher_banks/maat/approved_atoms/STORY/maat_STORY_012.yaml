body: 'Yuki had been overthinking since she was eleven years old. She had a beautiful
  mind — her teachers said so, her parents said so — and what they meant was that
  she analyzed everything with extraordinary thoroughness. What they did not say, and
  perhaps did not notice, was that the thoroughness never stopped. It ran through the
  night. It ran through meals and conversations. It ran while she was trying to enjoy
  things she loved.

  At thirty-five she was a neuroscientist, which meant she understood exactly what
  her brain was doing when it looped and looped on the same material. Understanding
  it had not made it stop.

  A colleague who meditated brought her to a Sufi evening talk on a whim. Yuki sat
  through it with her scientist''s skepticism intact until the teacher said something
  she had not encountered before: "The mind loops because it has not yet learned to
  trust the heart. Dhikr does not stop the mind by force — it gives the heart a rhythm
  so compelling that the mind, finally, begins to follow."

  Yuki''s neuroscience brain said: entrainment. The heart provides a dominant frequency
  and the mind synchronizes.

  But her other self — the self she had been neglecting for thirty-five years — said
  something simpler: I have been living entirely in my head, and I am exhausted. She
  tried the dhikr that night, tentatively. The loop slowed. For twelve minutes, she
  was simply present. She called her colleague afterward and said: "I think I need
  to come back."'
