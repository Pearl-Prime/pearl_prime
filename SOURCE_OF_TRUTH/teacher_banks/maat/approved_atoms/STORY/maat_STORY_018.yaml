body: |
  Kofi sits in the hospital chapel at two in the morning. The room smells of wax and recycled air.

  His son is upstairs. The machines breathe for him now.

  Kofi's hands hang between his knees. His chest holds a pressure he cannot name. He does not pray. He does not bargain. He has spent three weeks bargaining and the bargaining has not moved anything.

  A woman enters the chapel and sits two rows behind him. She does not speak.

  The silence between them is not empty. It has weight.

  Kofi's throat tightens. His eyes burn but do not release. He has held this for three weeks and the holding has become its own kind of violence against himself.

  He says aloud, to no one in particular: "I don't know how to do this."

  The words leave his mouth and land in the room.

  The woman behind him does not answer. She does not offer comfort. She simply remains.

  Kofi's chest cracks open. The tears come without sound at first, then with sound, then with his whole body shaking in the plastic chair.

  He does not try to stop it.

  The grief overflows. It does what grief does when it is finally allowed to move.

  When it recedes, Kofi sits in the changed air of the room. His hands still hang between his knees. His son is still upstairs. None of the facts have shifted.

  But the weight on his heart has changed its quality. It is no longer the weight of resistance. It is the weight of what is real, and real things can be carried differently than imagined ones.

  He breathes. The breath goes all the way down.

  He does not know what comes next. He knows only that he is in right relationship with this moment, and that is the only ground available.
