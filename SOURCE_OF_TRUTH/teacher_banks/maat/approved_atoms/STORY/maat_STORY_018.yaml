body: 'Ingrid was forty-two, a pediatric occupational therapist, and she was what her
  supervisor called "a natural empath." This was a compliment. It was also a description
  of the mechanism by which, over fourteen years of work, she had been slowly drained.

  She could feel the distress of the children she worked with. She could feel the
  desperation of their parents. She absorbed it without meaning to, carried it home,
  set it down with difficulty, and picked it up again in the morning. By forty-two
  she had started having dreams about her clients'' faces. She woke already tired.

  At a professional development workshop on practitioner wellbeing, a presenter offered
  a framework she had not heard before. Not "protect yourself from feeling" but "practice
  feeling from a different location." She used Sufi language: "The mystics say the
  heart is a chamber where God whispers to God. When you let your clients'' pain move
  through your heart and out toward the Beloved, rather than stopping and lodging
  in you, the compassion remains but the accumulation does not happen."

  Ingrid was skeptical and also desperate enough to try anything. She began to practice,
  before and after each client session, a simple breath: receiving the person''s reality
  on the inhale, offering it upward on the exhale — not away, but to something larger
  that could hold it. The dreams slowed. The heaviness in her chest when she drove
  home began to lift. She was still moved by the children. She was moved through, not
  stuck.'
