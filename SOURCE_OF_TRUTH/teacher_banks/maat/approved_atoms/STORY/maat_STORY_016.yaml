body: 'Martina was forty-eight and had been described her entire life as "the strong
  one." She was the person people called in crisis. The one who showed up. The one
  who knew what to do. She wore this identity with genuine love — she did not resent
  the role, she had chosen it — but at forty-eight she noticed that she had no idea
  who she was when she was not being strong for someone else.

  After her sister''s cancer diagnosis, the strength that had always been available
  simply was not there. She sat in her car outside the hospital and felt nothing but
  a flat, white terror. She could not be strong now. She did not know what to do with
  that.

  A hospital chaplain — an unusual woman who mentioned she was a Sufi — sat with her
  for forty-five minutes. She did not offer comfort in the form of reassurance. She
  offered something different: "Courage is not the absence of fear. It is the willingness
  to let something larger than yourself carry you through what you cannot carry alone.
  That is what the mystics call reliance on the Beloved — not that things will be
  fine, but that you will not be left to face them unaided."

  Martina sat with that. She had been carrying alone her whole life. The possibility
  that there was something she could lean into — not a person, not a plan, but a
  Presence — broke something open in her that needed to be broken. She went back into
  the hospital. She was still afraid. But she was no longer the only one in the room.'
