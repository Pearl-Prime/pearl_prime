body: |
  You are carrying boundaries, and shame is rising. The story says: "Setting limits is selfish. If you protect yourself, you are unkind. If you say no, you will hurt them."
  
  I want to teach you what Ma'at teaches: right relationship includes your own truth.
  
  Ask yourself: "What is actually balanced here?"
  
  If you give everything, what is the cost? Notice—in your body—the resentment. The depletion. The abandonment of yourself.
  
  These are signals. Ma'at sends signals. The scales are tipping. You are out of balance.
  
  Setting a boundary is not an act of selfishness. Setting a boundary is a return to truth. It says: "I am part of this equation too. My capacity matters. My limits are real."
  
  When you honor your own ground, you are not abandoning the other. You are simply refusing to collapse yourself to accommodate them.
  
  This is right relationship. This is Ma'at. And in that return to balance, the shame dissolves.
