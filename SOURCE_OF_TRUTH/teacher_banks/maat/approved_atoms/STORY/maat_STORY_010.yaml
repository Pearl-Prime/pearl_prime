body: 'Fatou was nineteen and had been anxious for as long as she could remember, though
  in her family it was not called anxiety — it was called "being careful." She had
  grown up in Dakar, moved to London for university, and the anxiety that had been
  manageable in familiar surroundings had expanded to fill the new, unfamiliar space
  of her life.

  Everything felt too large. The city, the campus, the choices, the future. She lay
  awake making lists of things she had not done and could not do and might fail to
  do, and in the morning the lists were still there, only longer.

  Her neighbor at the dormitory was a Pakistani girl named Sana who prayed five times
  a day and seemed, Fatou thought, genuinely at peace. One evening she asked her about
  it. Sana laughed. "I''m not always at peace. But I have somewhere to put the fear."

  Sana taught her a simple dhikr — just the word "hasbunallah," meaning "God is enough
  for us." Not a statement she had to believe right away. Just something to repeat
  when the lists started. Something to interrupt the spiral.

  Fatou was not Muslim but she tried it, once, at three in the morning when the ceiling
  felt like it was pressing down. She whispered it softly: hasbunallah. Hasbunallah.
  The spiral slowed. The ceiling lifted. She did not sleep right away, but she was
  no longer alone with the fear. The fear had company, and company changed everything.'
