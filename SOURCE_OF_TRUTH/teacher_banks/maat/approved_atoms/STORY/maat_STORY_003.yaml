body: 'Asel was thirty-one, a management consultant, and she had been performing confidence
  for so long that she had lost track of where performance ended and she began. Every
  morning she put on her armor — the right suit, the right tone, the right certainty —
  and walked into rooms where she convinced herself she did not belong.

  Imposter syndrome, she had learned to call it. She had read three books about it.
  None of them had helped. The books kept telling her to remember her credentials.
  Her credentials were not the problem. Her credentials were excellent. The problem
  was something older and wordless that lived below her credentials and whispered:
  you are not what they think you are.

  At a weekend retreat she attended mostly to network, a teacher spoke about the nafs —
  the lower self, the part that performs, compares, and grasps for validation. "The
  nafs is afraid," the teacher said, "because it has built an identity that it must
  constantly defend. Ma''rifa — direct knowing — requires that we stop defending and
  simply be."

  Asel sat very still. She had been defending for a decade.

  That evening she sat alone by a window and tried, for ten minutes, to simply be —
  not consultant Asel, not high-achieving Asel, just Asel, just the breath, just whatever
  she was before the performance started. It was uncomfortable and then, very briefly,
  it was relief. She carried that relief like a small coal for weeks afterward.'
