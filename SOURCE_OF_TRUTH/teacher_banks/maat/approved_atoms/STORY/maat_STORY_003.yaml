body: |
  You come to me carrying shame. You believe there is something about you that is wrong.
  
  I want to offer you a practice. Not to fix yourself, but to see truly.
  
  Ask yourself: "What is actually true about me?"
  
  Not what you think you should be. Not what others have said. What is actually true?
  
  You are learning. You are sometimes afraid. You are sometimes brave. You make mistakes. You care about some things deeply. You turn away from others.
  
  This is truth. It is not shameful. It is simply what is.
  
  Now ask: "What is true about my capacity?"
  
  You cannot be everything to everyone. This is not failure—this is reality. When you name your true capacity, you stop overpromising. You stop exhausting yourself. You stop resenting the people you cannot help.
  
  This is Ma'at—alignment with what is actually real. And in that alignment, you find peace.
  
  Shame collapses when brought into true witnessing. Not because the truth is forgiven, but because truth itself is lighter than the weight of hiding.
