body: |
  Amara sits across from her witness. The room is very quiet.
  
  She speaks the truth aloud. The thing she has hidden for years. The secret that felt heavier than the original wound.
  
  Her hands shake. Her voice is thin.
  
  The witness does not turn away. Does not judge. Does not try to fix.
  
  The witness simply receives.
  
  What happens is unexpected. The shame begins to collapse. Not because the act was suddenly forgiven, but because truth itself is a different frequency than hiding.
  
  In being witnessed without judgment, Amara feels something shift. The feather of truth balances against her heart.
  
  The act was real. The responsibility is real. The consequence is real.
  
  But the isolation that shame created—that was an illusion. In speaking the truth and being received, she belongs to the field again.
  
  She is broken. And she is whole. Both are true at once.
