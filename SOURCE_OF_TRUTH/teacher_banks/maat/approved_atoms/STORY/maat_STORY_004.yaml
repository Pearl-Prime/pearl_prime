body: 'Tomás had not slept through the night in four months. He would fall asleep easily
  enough, but something would wake him at 2 or 3 a.m. — not a nightmare, just his
  own mind, already running. Inventory of everything that could go wrong. The mortgage.
  His mother''s health. The project at work. His son''s school situation. The mind
  would circle and circle, and the ceiling would stay dark, and morning would arrive
  like a small defeat.

  His doctor had suggested meditation. He had tried an app. The cheerful voice telling
  him to "let thoughts pass like clouds" made him feel worse, not better — the thoughts
  did not pass, they accumulated, and the instruction to watch them neutrally felt
  like being told to smile while drowning.

  A friend texted him a recording of a Sufi teacher speaking about sleep. "Sleep is
  a nightly fanaa," the teacher said. "A small dissolution. Every night the Beloved
  asks you to let go of yourself for a few hours. The mind that will not sleep is
  the nafs that will not surrender."

  Tomás listened to it three times. Not because he understood it fully, but because
  the voice was warm and did not demand that he try harder. That night he placed his
  hand on his chest and whispered: "I give this back for now." He was asleep within
  minutes. He did not know why. He did not need to know why.'
