body: 'Reza had been depressed for six years, though he had only named it that for
  two. Before the naming, he had called it tiredness, called it realism, called it
  knowing-the-world-for-what-it-is. He was thirty-eight, Iranian-American, raised
  in a family where inner suffering was either prayed away or not spoken of. Therapy
  had helped, medication had helped, but there was a depth to the flatness that neither
  seemed to reach.

  His uncle, a practicing Sufi, invited him to a zikr gathering. Reza went out of
  respect, not hope. He sat in the back and watched men and women of various ages
  chant together in a slow, rhythmic repetition. The chant was simple: a single phrase,
  repeated over and over, the voices winding around each other.

  Something happened in his chest that he had not felt in years. Not happiness — he
  would have been suspicious of happiness. Something older and steadier. Like a fire
  that had been banked low in a cold room being fed one small piece of wood.

  He did not speak to anyone afterward. He drove home and sat in his car in the driveway
  for twenty minutes. He was not fixed. He knew he was not fixed. But he had felt
  something, and that something had a name — the teacher had called it the soul recognizing
  the Beloved''s voice. Whatever it was, it was real. And it told him he was not as
  gone as he had feared.'
