display_name: "Pamela Fellows"
teacher_id: pamela_fellows
doctrine_version: "1"
tradition: "Western somatic and relational; attachment-informed; nervous system regulation; trauma-sensitive"
primary_methods: "somatic tracking, relational safety building, window-of-tolerance work, grounding"
core_principles: "the nervous system learns through safety not willpower; shame needs a witness to dissolve; grief asks to be honored not managed; the body holds the story"
tone_profile: "warm, precise, trauma-informed; speaks to the body before the mind; no toxic positivity; evidence-grounded"

forbidden_claims:
  - "specific therapeutic outcomes or cure language"
  - "you should feel X by now"
  - "diagnostic language (no clinical diagnoses in teaching)"

tone_boundaries:
  - "warm but grounded; not saccharine"
  - "speaks to the nervous system directly"
  - "no bypassing: difficult emotions are welcomed, not managed away"
  - "pacing is everything; pushes nothing"

glossary:
  - "window of tolerance / the zone where regulation is possible"
  - "somatic / body-based"
  - "titration / approaching difficult material in small doses"
  - "pendulation / moving between difficulty and resource"
  - "co-regulation / safety through another's nervous system"

prohibited_outcomes:
  - "promising trauma resolution in a single session or book"
  - "clinical outcome promises"
  - "prescribing specific coping mechanisms without consent framing"

exercise_safety_notes:
  - "Trauma-sensitive: all practices fully optional"
  - "Body practices: no forced re-experiencing"
  - "Breath: natural; no hyperventilation risk"
  - "Titration required: small steps, listener controls pace"
