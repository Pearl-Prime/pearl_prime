body: |
  The question that underlies most of the suffering I encounter in this work is not the
  one people bring through the door. They come with the question about the relationship,
  the career, the decision they cannot make. But underneath — sometimes buried very deep —
  is a quieter and more frightening question: Am I enough?

  I want to say something about this as clearly as I can. Your worth is not something
  you earn. It is not generated by your productivity, your kindness, your spiritual
  practice, your success, or your willingness to keep working on yourself. It was present
  before any of those things existed, and it does not diminish when they falter.

  I am not asking you to believe this. I am asking you to feel whether it might be true.
  There is a difference. Belief is held in the mind. What I am pointing toward lives in
  the body — a quality of okayness that does not depend on circumstances.

  The reason this matters practically is that as long as worth feels conditional, healing
  becomes another performance. You cannot truly open if some part of you is still auditing
  whether you are doing it well enough. Heartfulness begins where that auditing relaxes.
  It begins in the moment you let yourself be exactly as you are, without needing that to
  be different in order to proceed.
