body: |
  Priya opens her journal and writes one line: "I don't know who I am without the anxiety."

  She stares at it. Her pen rests against the page.

  For thirty-one years her nervous system ran on high alert. She organized her life around that hum—the jobs she chose, the relationships she kept at distance, the sleep she sacrificed.

  Now, eight months into somatic work, the hum has quieted on some days. And those days feel wrong in a way she did not anticipate.

  Her therapist said: the nervous system can grieve its own old patterns. Even the ones that hurt. Because they were familiar. Familiar is not the same as safe, but the body treats them alike.

  Priya writes a second line: "The quiet is unfamiliar. That's all it is."

  She closes the journal. She sits with her feet on the floor. She notices: her shoulders are low. Her jaw is loose. Her breath moves without effort.

  She does not call this peace yet. She calls it unfamiliar. She lets unfamiliar be enough.
