body: |
  You have been taught that feeling your grief means drowning in it. That if you let yourself cry, you will never stop. But your body knows something different. Your body knows titration. It knows how to approach what is hard in doses you can manage.
  
  This is what we practice together: five minutes of conscious grieving. Then we ground—feet on the floor, your hands on your thighs, the actual weight of what's real around you. Then five minutes again. Then resource. 
  
  This is not avoidance. This is honoring both the grief and your capacity. Your nervous system learns: I can be with this. It doesn't destroy me. And I can return to ground.
  
  The grief doesn't disappear. But pendulation teaches your body: difficult feeling and safety can exist in the same moment. You are not choosing between drowning and feeling nothing. There is a third option—feeling it fully, in steps your body can manage.
