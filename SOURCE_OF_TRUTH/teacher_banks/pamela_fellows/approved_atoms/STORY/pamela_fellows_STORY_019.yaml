body: |
  Calvin's son falls asleep on his chest. Seven years old. All weight and trust.

  Calvin holds very still. His eyes go wet.

  He grew up in a house where men did not cry, did not hold, did not stay. His father's body was always angled toward the door.

  Calvin's therapist asked him once: "What did your nervous system learn about closeness?" He said he didn't know. She said: "Your body knows. We'll ask it."

  Now his son's breath rises and falls. Calvin's chest rises with it.

  Something in him wants to shift, to break the contact before it becomes too much. He recognizes this. The old move. The lean toward the door.

  He stays. He presses one hand to his son's back. He tracks the warmth there.

  His eyes overflow. He makes no sound.

  This is the work—not the sessions, not the language, not the insight. This moment. His body learning that closeness does not end in abandonment.

  He stays until his son wakes on his own.
