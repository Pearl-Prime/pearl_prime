body: |
  In a river, there is a stone that has been smooth for a thousand years. The water never stopped moving against it, and the stone never resisted. The water did not soften the stone through force. It simply kept returning. The river teaches us: safety is not the absence of water. It is what happens when you stop bracing against it. The nervous system is like that stone. We can spend years trying to harden ourselves against fear. Or we can learn what it means to let the difficult material move through us, knowing we will remain whole. The stone is still stone. The water is still water. But they have learned to be together.
