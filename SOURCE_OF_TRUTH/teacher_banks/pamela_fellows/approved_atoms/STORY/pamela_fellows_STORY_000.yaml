body: |
  Sarah sits in her kitchen at 6 AM. Her chest is tight. Coffee grows cold in her hands.
  
  For three months, her nervous system has been in constant alert. She startles at sounds. Her shoulders live near her ears. Sleep fragments. Her therapist's words return: "Your nervous system learned something is dangerous. We can't think our way out of this."
  
  She's tried everything—breathing apps, yoga, positive self-talk. None of it lands because the learning isn't in her mind. It's in her body.
  
  Last session, her therapist asked something different: "Where do you feel safety?" Sarah couldn't answer. Safety feels like a foreign language.
  
  But today, something shifts. She notices—just notices—that in this moment, the kitchen is quiet. Sunlight moves across the counter. Her friend's text from yesterday still visible on her phone. Three small things that don't feel threatening.
  
  She doesn't feel "better." But her body registers: this breath is okay. This second is not an emergency.
  
  She marks it down in the notebook her therapist gave her. A map of safety. Islands in the storm.
