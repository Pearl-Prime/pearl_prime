body: |
  Tomás lies in the grass behind his house. The sun presses warm against his sternum.

  He has been in therapy for six months. Today is not a hard day. He notices that—actually notices it—which is new.

  A bird moves through the oak tree above him. His shoulders rest against the earth without effort.

  He used to distrust quiet days. His body braced inside them, waiting for the next rupture. His therapist called it a nervous system that learned to expect danger even during peace.

  Now he lets the warmth stay on his chest. He tracks it: heat, weight, the slight give of the ground beneath him.

  He does not try to make this moment mean something large. He lets it be small and sufficient.

  His dog settles beside him. Warm flank against his arm. Two nervous systems, both at rest.

  He stays there until the light shifts.
