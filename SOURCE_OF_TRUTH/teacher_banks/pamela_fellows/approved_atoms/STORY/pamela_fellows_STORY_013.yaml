body: |
  Diane's hands shake as she holds the letter. Her daughter's handwriting. An apology, finally, after four years.

  She stands in the hallway. She cannot move forward or back. Her throat closes. Her vision narrows at the edges.

  This is what her body does with too much. Her therapist named it: outside the window of tolerance. The place where nothing can be processed.

  She slides down the wall until she sits on the floor. She presses her back against the plaster. Solid. Real.

  She does not read past the first paragraph. Her therapist's voice comes to her: titration. A little at a time. The body cannot metabolize a flood.

  She folds the letter. She sets it on the hallway table. She breathes. Her back against the wall. Her hands on her knees.

  The letter stays there for three days. Each morning she touches the envelope. Each morning she decides how much she can hold.

  On the fourth day, she calls her therapist before she reads further. She does not go in alone.
