body: |
  Marcus sits on the edge of the bathtub. The tiles are cold through his socks. He presses one foot flat against the floor.

  His therapist called it grounding. He called it ridiculous. That was eight weeks ago.

  Tonight his sister said something small at dinner—nothing cruel, just a tone—and his whole chest locked. He excused himself before his voice could betray him.

  Now he presses both feet down. He counts the grout lines. Seven across. His breath is shallow but it moves.

  He does not tell himself to calm down. His therapist was clear: the nervous system doesn't respond to commands. It responds to cues. The cold tile is a cue. The counted lines are a cue.

  His jaw unclenches by a fraction.

  He doesn't know what happened at that dinner table, not yet. But his body has found the floor again. That is enough to work with.

  He stands. He splashes water on his face. He returns to the table.
