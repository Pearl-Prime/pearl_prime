body: |
  Tomas sits in his therapist's office. He wants to talk about his anxiety, but what comes out is shame. Deep, wordless shame.
  
  His therapist doesn't move into fixing mode. She simply asks: "What is your body wanting to do right now?"
  
  "Hide," Tomas says. "Disappear."
  
  "Can you feel that impulse without acting on it? Just stay present with your body?"
  
  He does. His chest is tight. His face is hot. The impulse to collapse is enormous.
  
  But he stays. And his therapist stays. For what feels like forever but is probably only five minutes.
  
  Then his therapist says: "You're still here. You didn't have to hide. And nothing bad happened."
  
  This lands differently than any reassurance. Because it's not a thought. It's a visceral learning. His nervous system has just learned: shame is present, and I can still exist. I can still be seen.
  
  He won't be "fixed" in this moment. But his body has received something—a small download of safety—that will reshape how he relates to shame.
