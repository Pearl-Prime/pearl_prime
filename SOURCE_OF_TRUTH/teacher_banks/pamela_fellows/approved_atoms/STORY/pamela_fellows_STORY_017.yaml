body: |
  Adaeze stands in the parking lot after the group session. She cannot get in her car.

  Inside, she told the group something she has never said aloud. Her voice stayed level. Her body went somewhere else entirely.

  Now her legs are hollow. The keys hang from her hand. The streetlight buzzes above her.

  She knows this state. Her therapist named it: the freeze response. The nervous system's last resort when fight and flight both fail.

  She does not force herself into the car. She sets her keys on the hood. She presses both palms flat against the cold metal.

  The cold is real. The metal is real. She presses harder.

  A woman from the group walks out. Stops. "You okay?"

  Adaeze shakes her head once. Honest.

  The woman stands beside her without speaking. Two bodies in the parking lot under the buzzing light.

  Adaeze's legs return to her slowly. Not because she willed them back. Because she was not alone.

  She picks up her keys. "Thank you," she says. The woman nods. Nothing more is needed.
