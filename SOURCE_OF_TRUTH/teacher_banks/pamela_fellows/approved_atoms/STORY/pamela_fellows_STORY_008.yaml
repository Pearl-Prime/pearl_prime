body: |
  You are probably familiar with shame. The feeling that you are too much, not enough, fundamentally flawed. That there is something wrong with you that others must never see.
  
  Shame happens in the body before it happens in the mind. It contracts you. It makes you want to disappear.
  
  One of the most profound things that can happen is this: someone sees you—really sees you—in that contracted place, and doesn't turn away. They don't try to fix it. They don't say "don't feel that." They just stay present.
  
  In that witnessing, something begins to shift. Not because the shame was magically cured. But because shame requires secrecy to survive. Shame requires that you remain small and hidden.
  
  When you are witnessed—when someone says "I see you, and you're still worthy"—the shame loses its power. Not immediately. But gradually. Your nervous system learns: I don't have to hide. I can be seen and still belong.
  
  This is why having a witness matters more than having all the right thoughts.
