body: |
  Elena lies on the therapist's couch with her eyes closed. They're practicing something called somatic tracking—noticing where anxiety lives in her body, not fighting it.
  
  The anxiety is in her chest. Tight. Like a fist that won't release.
  
  Her therapist asks: "What happens if you just notice it? Not fix it, not make it go away—just say hello to it?"
  
  Elena notices. Her chest remains tight. But something shifts. The tightness is not her enemy. It's information. It's telling her: you are trying to hold something that was too big.
  
  "When did this start?" the therapist asks.
  
  Elena's breath catches. She knows the moment. She's been running from it for two years.
  
  "Can you stay with it?"
  
  Elena's hands grip the cushion. But she doesn't leave. She feels her therapist's steady presence—the proof that her body can hold this hard thing and remain safe.
  
  The fist in her chest doesn't open fully. But it releases just enough for her to breathe. That's how the body heals—not in grand gestures, but in small permissions to be present with what's true.
