body: |
  The office is very quiet. Two chairs. A box of tissues. Light from the window falls in a particular way across the floor.
  
  Kenji sits with his body tense, arms crossed. His therapist sits across from him with her shoulders relaxed. There is no hurry in her posture. She has done this many times.
  
  Something about the pace—the way she breathes, the way she waits—begins to affect him. His nervous system borrows her regulation. Not through words. Just through presence.
  
  Gradually, his shoulders drop a fraction of an inch. His breath deepens. He is not trying to relax. He is simply in a room with someone whose body is not on alert. And his body remembers: I can rest.
  
  This is co-regulation. Wordless. His nervous system learning from hers through proximity. His heartbeat slowing to match a nervous system that knows: this moment is safe.
