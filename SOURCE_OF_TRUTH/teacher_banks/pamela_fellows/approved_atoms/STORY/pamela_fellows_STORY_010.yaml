body: |
  Rachel has never said no in her life. Her body carries this as a constant ache—in her shoulders, her jaw, her chest.
  
  She enters therapy because she's exhausted. Bone tired. She has given so much that she doesn't know where her own edges are anymore.
  
  Her therapist asks: "What happens in your body when you think about saying no?"
  
  Rachel feels it immediately. Panic. The sensation of falling. Rejection.
  
  "That's your nervous system predicting catastrophe based on old learning," her therapist explains. "But saying no doesn't cause catastrophe. Saying no causes boundaries. And boundaries protect you."
  
  They practice in session. "I can't do that." Rachel's hands grip the armrest. Her face flushes. Her nervous system floods with fear.
  
  But her therapist remains steady. "You're safe. I'm here. Your no is allowed."
  
  Over months, something shifts. Rachel's body slowly learns that saying no is not abandonment. It's self-preservation. When she finally says no to something real—a request at work, an obligation to family—her nervous system still activates. But underneath the fear, there's something solid: the knowledge that her therapist has stayed with her through this exact sensation.
  
  She is not destroyed by her own boundary.
