body: |
  Renata sits across from her mother for the first time in two years. The restaurant was her therapist's idea. Neutral ground.

  Her mother reaches across the table and touches her hand. Renata's arm goes rigid.

  She does not pull away. She does not lean in. Her body freezes between those two choices.

  She tracks what she can: the tablecloth under her other hand. The smell of bread from the kitchen. Her own heartbeat, too fast, in her throat.

  Her mother is talking. Renata hears syllables. Her nervous system has narrowed its attention to survival, not language.

  She excuses herself. She walks to the bathroom. She locks the stall door and presses her back against it.

  She breathes out longer than she breathes in. Her therapist taught her: the exhale activates the brake. She does it four times.

  Her heartbeat descends one notch. Just one. Enough.

  She returns to the table. She does not pretend the moment was easy. She picks up her water glass and drinks.

  Her mother watches her. Something in her mother's face softens. Neither of them names what just happened. But the meal continues.
