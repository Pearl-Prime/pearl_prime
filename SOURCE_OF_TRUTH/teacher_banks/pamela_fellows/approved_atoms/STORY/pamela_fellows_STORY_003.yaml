body: |
  Marcus sits in the waiting room before his first therapy appointment. His hands are fists in his lap.
  
  He was told his entire childhood that anger is dangerous—that it means he will become like his father. So he learned to swallow it. Swallow, swallow, swallow. For thirty years.
  
  The cost shows now. He has no boundaries. He abandons himself constantly to keep people comfortable. His therapist can see it in his shoulders—the held breath, the readiness to disappear.
  
  Today she says something that lands like a key: "Your anger is not dangerous. It's information. It's telling you something matters."
  
  Marcus feels something crack inside him. His chest tightens. His eyes water.
  
  "If I let it out," he whispers, "I won't be able to stop."
  
  "Let's find out together," she says. And stays present.
  
  He doesn't have an outburst. He cries—deep, shaking cries—because someone finally said: your rage is not your father's rage. Your rage is your own signal that something is precious enough to protect.
