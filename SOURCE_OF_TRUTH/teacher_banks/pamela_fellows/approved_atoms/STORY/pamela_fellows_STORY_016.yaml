body: |
  Joel sits in his therapist's office and says nothing for four minutes.

  His therapist does not fill the silence. She sits with her feet on the floor and her hands open in her lap. Her breathing is audible and slow.

  Joel's chest, which arrived tight, begins to shift. He does not decide this. It happens.

  This is the part he cannot explain to his friends—that someone else's calm body changes his. His therapist called it co-regulation. He thought it was a metaphor. It is not a metaphor.

  He finally speaks. "I don't know why I'm so angry at him."

  His therapist nods. "Where do you feel the anger right now?"

  He presses a fist against his solar plexus. "Here."

  "Stay with that for a moment. Don't explain it yet."

  He stays. The tightness is specific. It has a shape. He has never let himself notice that before—he always moved straight to the story.

  The anger does not leave. But it becomes something he is holding rather than something holding him.
