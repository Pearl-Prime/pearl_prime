body: |
  The office air is still. A lamp. Two chairs arranged at angles.
  
  Dmitri sits with his hands trembling. His therapist sits quietly, her own body at rest.
  
  He cannot speak. The words are stuck. But her lack of urgency is itself a communication. This moment is not an emergency.
  
  His breathing gradually slows. Not forced. Just borrowing the calm of her regulated nervous system.
  
  He feels his feet on the floor. The chair beneath him. The steady presence across from him who is not alarmed by his trembling.
  
  This is co-regulation. His body learning, through proximity, that it is safe to be less vigilant.
  
  When he leaves, he carries this texture in his nervous system—the memory of a room where his alarm could exist and not be met with more alarm.
