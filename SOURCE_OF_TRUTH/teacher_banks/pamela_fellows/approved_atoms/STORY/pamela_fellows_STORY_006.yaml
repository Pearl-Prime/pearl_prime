body: |
  The therapy room has natural light. A window. Plants.
  
  Priya sits rigid. Her nervous system is in constant activation. Her window of tolerance is very narrow.
  
  Her therapist begins to teach titration—small approaches to what's difficult, followed by grounding.
  
  Five minutes sitting with the worry. Then: "Feel your feet on the floor. Feel your hands in your lap. Feel the air on your skin."
  
  Priya's shoulders drop just slightly. The activation is still there, but her awareness of ground arrives alongside it.
  
  They repeat. Worry. Ground. Worry. Ground.
  
  Slowly, her nervous system learns a rhythm. Not the absence of difficulty, but the capacity to be with it while simultaneously connected to what is real and present.
  
  Her window begins to widen. Not because the triggers disappeared, but because her capacity expanded.
