atom_id: pamela_fellows_EXERCISE_002
body: |
  This is a somatic tracking practice. You're learning to listen to what your body is telling you.
  
  Bring to mind something slightly difficult—not the most traumatic thing, but something that creates some activation.
  
  As you think about it, notice: what happens in your body? Does your chest tighten? Your stomach drop? Your jaw clench?
  
  Don't try to change it. Just observe. Your body is communicating.
  
  Notice the sensation: where is it? What's the texture? Temperature? Does it have a color?
  
  This is titration in action. You're approaching something difficult while staying connected to your body.
  
  If it becomes overwhelming, open your eyes and notice your surroundings. Ground yourself.
  
  Five to ten minutes.
