atom_id: pamela_fellows_EXERCISE_007
body: |
  This is a grief-aware practice. Grief needs to be felt and honored, not managed away.
  
  If you're willing, bring to mind something you've lost or are losing. Let the grief be present for a moment.
  
  Notice where you feel it. In your chest? Your throat? Your belly?
  
  You don't need to cry or do anything. Just acknowledge: yes, this loss matters to me.
  
  Then pause. And notice something true right now: you are here. You are breathing. You survived this moment so far.
  
  Alternate: grief, then grounding. Grief, then safety. This is titration for grief.
  
  Grief is not something to overcome. It's something to be present with, in small doses, with resources nearby.
  
  Ten to fifteen minutes.
