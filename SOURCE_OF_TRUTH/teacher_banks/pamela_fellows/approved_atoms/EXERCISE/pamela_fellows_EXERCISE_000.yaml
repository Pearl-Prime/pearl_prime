atom_id: pamela_fellows_EXERCISE_000
body: |
  This is a window of tolerance practice. You'll notice where your nervous system is right now.
  
  Sit comfortably. Bring attention to your body. Are you activated (agitated, racing heart, tense)? Collapsed (numb, heavy, shut down)? Or regulated (alert but calm)?
  
  Your window of tolerance is the zone where you can think, feel, and respond. You're not trying to force yourself into it. You're just noticing where you are.
  
  If you're outside your window, that's completely okay. Just observe. No judgment.
  
  Name it: "I'm activated right now" or "I'm collapsed" or "I'm in my window."
  
  This naming itself begins to regulate your nervous system. Five minutes.
