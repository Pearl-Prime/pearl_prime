atom_id: pamela_fellows_EXERCISE_001
body: |
  This is a grounding practice. You're helping your nervous system feel present and safe through sensation.
  
  Notice five things you can see. Just look. Name them in your mind or aloud.
  
  Then four things you can physically feel. The temperature of the air. The pressure of your feet. Texture of fabric.
  
  Then three things you can hear.
  
  Then two things you can smell (or imagine).
  
  Then one thing you can taste.
  
  This practice anchors you in this moment. Your nervous system learns: right now, I am safe. I can sense the world. I am present.
  
  Do this whenever you feel activated or disconnected.
