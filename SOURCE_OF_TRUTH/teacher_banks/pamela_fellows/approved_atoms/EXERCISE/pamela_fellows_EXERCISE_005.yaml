atom_id: pamela_fellows_EXERCISE_005
body: |
  This is a trauma-sensitive grounding practice. Use this when you feel triggered or activated.
  
  Feel your feet on the floor. Press them down. Feel the solidity. The earth holding you.
  
  Feel your sitting bones or back against the surface you're on. You are being held.
  
  Place your hands on your lap or heart. Feel the warmth. This is your body offering comfort to itself.
  
  Notice your breath. You don't need to change it. Just notice you're breathing.
  
  You're safe in this moment. Not all moments. But this one. Right now, you are here, and you are safe.
  
  Five to ten minutes. Optional: soft eyes open, looking at safe things.
