atom_id: pamela_fellows_EXERCISE_009
body: |
  This is boundary awareness in the body. Boundaries start somatically, not cognitively.
  
  Sit with someone you trust, or imagine someone. Notice where you feel safe and where you feel your edge.
  
  Is there a distance that feels right? Too close feels unsafe. Too far feels lonely.
  
  Your nervous system knows the right distance. Learn to recognize that knowledge in your body.
  
  This is sensing your boundary through sensation, not thinking about it.
  
  Bring this awareness to real relationships. Your body will tell you when someone is too close. Trust that information.
  
  Ten minutes of somatic boundary awareness.
