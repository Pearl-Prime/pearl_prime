atom_id: pamela_fellows_EXERCISE_008
body: |
  This is a nervous system reset practice. Use when you're activated and need to come back to regulation.
  
  Notice your feet or sitting bones. Feel the pressure. The support.
  
  Draw your shoulders up to your ears and then drop them. Do this three times. Your nervous system recognizes release.
  
  Make a sound—sigh, hum, anything. Vocalization signals the vagus nerve that you're safe.
  
  Feel your chest. Place your hands there if it helps. Feel the rhythm of your heart. It's been working hard. Thank it.
  
  You don't have to be calm. But you're telling your nervous system: I'm here. I survived this. We made it.
  
  Five to ten minutes.
