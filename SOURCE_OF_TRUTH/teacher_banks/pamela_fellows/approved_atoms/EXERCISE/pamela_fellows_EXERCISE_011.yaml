atom_id: pamela_fellows_EXERCISE_011
body: |
  This is a capacity-building practice. You're learning your nervous system can handle more than you think.
  
  Bring to mind a slightly difficult situation. Not the worst thing. Something manageable.
  
  Approach it for thirty seconds. Feel the activation.
  
  Then immediately switch to something calming. Your favorite place. A sensation you love.
  
  Stay there for one minute.
  
  Notice: your nervous system can go up and come back down. It's resilient.
  
  Repeat two more times, with the difficult thing lasting a little longer each time.
  
  This teaches your nervous system: I have capacity. I can approach hard things. I can recover.
  
  Ten to fifteen minutes. You're building your window of tolerance.
