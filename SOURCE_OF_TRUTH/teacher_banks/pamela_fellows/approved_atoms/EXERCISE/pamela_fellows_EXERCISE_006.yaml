atom_id: pamela_fellows_EXERCISE_006
body: |
  This is a shame-aware practice. Shame lives in the body as hiding.
  
  If you're willing, bring to mind something you feel ashamed about. Just for a moment. Notice what your body does.
  
  Does it collapse? Shrink? Hide?
  
  Now, as an experiment: straighten your spine just slightly. Not aggressively. Gently. Notice if your chest can open just a little.
  
  The shame might still be there. But you're not collapsing into it. You're making yourself a little bigger.
  
  This small postural shift can interrupt the shame response. You're telling your nervous system: I can feel this and still be here. I don't have to disappear.
  
  Optional: Do this whenever shame activation happens.
