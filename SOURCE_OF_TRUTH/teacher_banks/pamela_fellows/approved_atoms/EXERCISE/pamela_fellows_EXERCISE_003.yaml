atom_id: pamela_fellows_EXERCISE_003
body: |
  This is a pendulation practice. You're learning to move between difficulty and resource.
  
  Sit with a resource: something that makes you feel safe or calm. A memory. A person. A sensation.
  
  Feel that resource fully. Let your nervous system register it. One to two minutes.
  
  Then, gently bring to mind something slightly difficult. Stay with it for one minute only. Feel where it lives in your body.
  
  Then back to the resource. Let the nervous system settle again.
  
  Then to the difficulty again, but different: a slight bit easier version.
  
  Then back to resource.
  
  This alternation teaches your nervous system: I can approach difficult things and still come back to safety. I can hold both.
  
  Ten to fifteen minutes total.
