atom_id: pamela_fellows_EXERCISE_010
body: |
  This is a co-regulation practice. You can do this with someone you trust, or imagine their presence.
  
  If with someone: sit across from them. You don't need to talk. Just be in each other's presence.
  
  Notice their breathing. Notice their calm. Let your nervous system borrow it.
  
  This is not a technique. It's a relationship. In the presence of someone regulated, your own nervous system learns regulation.
  
  If alone: imagine someone who makes you feel safe. Picture their face. Feel their presence.
  
  Your nervous system doesn't distinguish between actual and imagined presence. It learns safety.
  
  Fifteen minutes of being with someone's calm.
