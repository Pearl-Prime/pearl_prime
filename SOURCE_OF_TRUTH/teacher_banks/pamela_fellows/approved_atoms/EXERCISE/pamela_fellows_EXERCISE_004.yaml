atom_id: pamela_fellows_EXERCISE_004
body: |
  This is body reconnection. You're learning to inhabit your body as a safe home.
  
  Lie down or sit comfortably. Begin at the top of your head and slowly bring attention down through your body.
  
  Your forehead. Your eyes. Your cheeks. Your jaw (notice if it's clenched).
  
  Your neck. Your shoulders (often where we hold tension).
  
  Your chest. Your heart area. Your belly. Your low back.
  
  Your pelvis. Your legs. Your feet.
  
  You're not trying to relax. You're noticing. Acknowledging. "This is my body. It's here. It's real."
  
  This is titration for disconnection. Gentle reconnection, part by part.
  
  Fifteen to twenty minutes.
