body: |
  Uji. Being-time. Dōgen's term does not translate cleanly, and this resistance
  to clean translation is part of what it points at.

  The ordinary view is that time is a container — a river moving past while we
  stand on the bank, watching moments arrive and depart. This view is so
  embedded in how we experience life that we rarely notice it as a view at all.
  We say "I lost time" or "I'm waiting for a better moment" as if time were a
  resource being spent and the present were merely a passage toward some more
  complete future.

  Dōgen saw otherwise. Each moment of being is the whole of existence arriving
  completely — not a fraction of time passing through, but the total reality of
  being-time standing fully present in this. A blade of grass, a stone, the ache
  in your knee during sitting — each is being-time. Each is the whole thing,
  not a part of it.

  What this means for practice is precise: you cannot practice toward a future
  moment when things will be clearer or calmer or more settled. The sitting you
  are doing right now — however scattered or quiet, however painful or easy —
  is not preliminary. It is the whole expression of the dharma in this instant
  of being-time.

  Gyoji — continuous practice — takes on its real meaning here. Not accumulating
  practice over years, but practice as the continuous expression of being-time,
  moment by moment, which is also one unbroken thing.
