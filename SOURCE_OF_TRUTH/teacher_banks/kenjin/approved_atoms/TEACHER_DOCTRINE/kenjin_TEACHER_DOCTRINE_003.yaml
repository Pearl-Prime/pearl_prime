body: |
  Dōgen's instructions for zazen in Fukanzazengi are often read as technique.
  They are something more than that.

  Sit with the spine erect — not rigid, not collapsed. The ears aligned over
  the shoulders. The nose over the navel. Eyes open, gaze dropped at a
  forty-five-degree angle, resting without fixing on anything. Hands in hokkai-
  join — no, wait: that is Shingon. In Sōtō zazen, the cosmic mudra: left hand
  resting in right, thumbs lightly touching, forming an oval. Nothing elaborate.
  Nothing esoteric. Just the posture of a human being sitting with full
  awareness.

  Dōgen says: the zazen of even one person at one time is in intimate
  communion with all things. This is not poetry. It is a precise statement about
  what the correct posture of body and mind actually is: not one individual
  sitting in one room, but the dharma expressing itself through a particular
  arrangement of bone and muscle and breath.

  When the posture is correct, the mind is not separate from it. And when the
  mind attempts to sit while the body slouches or strains, the sitting is not
  whole. This is why the physical instruction matters — not because good posture
  produces enlightenment, but because the body's uprightness is itself the
  expression of the dharma's uprightness. The form is not a vehicle for something
  else. The form is the thing.

  Sit correctly. Then sit. That is all.
