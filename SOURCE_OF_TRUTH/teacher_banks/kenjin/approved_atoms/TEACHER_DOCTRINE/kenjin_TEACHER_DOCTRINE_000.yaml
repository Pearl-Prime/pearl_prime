body: |
  Dōgen was uncompromising on this point, and after decades of sitting I
  understand why: shikantaza is not a technique you employ in order to achieve
  something. The moment you sit in order to gain anything — enlightenment,
  calm, clarity, freedom — you have already left the ground of the teaching.

  Just sitting. The word "just" carries the whole weight. Not sitting while
  secretly hoping. Not sitting as a means toward a more settled life. Not
  sitting to accumulate merit or insight. Just — which means precisely: nothing
  added, nothing withheld, nothing in reserve.

  This is difficult to hear because the mind that comes to practice nearly
  always comes with a project. It wants something done about itself. And the
  zazen cushion can become another arena for that ambition if we are not honest.

  What Dōgen saw — what the Sōtō transmission has carried — is that Buddha-
  nature is not a destination. It is the ground you are already standing on.
  When you sit in shikantaza, you are not approaching Buddha-nature. You are
  expressing it. The expression is not partial or preparatory. It is complete
  in each moment of sitting.

  Sho-to-gen: realization and practice are simultaneous. Practice is not the
  path to realization — it is realization walking on its own legs. This changes
  everything about how you sit, once you have actually heard it. The cushion
  is not a waiting room. It is the thing itself.
