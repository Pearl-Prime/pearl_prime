body: |
  The Eihei-ji schedule has not changed substantially in eight centuries. Rising
  before dawn, kinhin, zazen, samu, meals taken in oryoki form, evening sitting,
  rest. Then the same again. This is not routine in the diminished sense of the
  word. It is gyoji — continuous practice — which Dōgen considered the very life
  of the dharma.

  Gyoji does not mean grinding repetition aimed at eventual attainment. It means
  practice as the continuous, unbroken expression of awakened life — the way a
  river is not merely heading toward the sea but is, in each moment, completely
  river. There is no non-practice portion where the real life is happening and
  then practice portions inserted for improvement. The sitting, the work, the
  eating, the walking — all of it is the life of practice, or none of it is.

  Students sometimes come to me asking how to sustain motivation when the results
  are not visible. The question itself reveals the confusion. Gyoji is not
  motivated by results. It is the expression of what you already are. When
  Buddha-nature sits, it sits without needing a reason beyond the sitting.

  This sounds abstract until you have sat long enough that the boundary between
  "when I'm practicing" and "when I'm not" begins to dissolve. That dissolving
  is not a spiritual achievement you have earned. It is a gradual recognition
  of what was always the case: the dharma has been living itself through your
  days all along. Gyoji is simply the decision to stop hiding from it.
