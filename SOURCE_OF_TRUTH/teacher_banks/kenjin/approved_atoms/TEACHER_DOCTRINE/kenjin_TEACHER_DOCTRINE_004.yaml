body: |
  The question students ask most persistently is: how will I know when I have
  arrived? They want a marker, a before and after, a moment they can point to
  and say: there, that was it. Sōtō has a careful answer to this question, and
  it is not the answer they are hoping for.

  Sho-to-gen: realization and practice are not sequential. The common model
  treats them as two things — you practice, and then at some point realization
  occurs, and then perhaps you practice differently because of what you have
  realized. Dōgen saw this as a fundamental confusion about the nature of
  practice.

  In Bendōwa, he is direct: to think that practice and enlightenment are two
  separate things is a heretical view. The sitting itself — when it is genuine
  shikantaza — is the complete expression of Buddha-nature. Not a step toward
  it. Not a rehearsal for it. The expression of it.

  This does not mean that nothing changes over years of practice. Things do
  change. The mind becomes less turbulent, not because you have conquered
  turbulence but because you have stopped treating turbulence as a problem that
  interrupts practice. The relationship to difficulty shifts. Kenshō may arise —
  though in Sōtō we do not chase it, and we do not mistake it for the endpoint.

  What does not change is the ground: Buddha-nature was never absent. Practice
  was never a path toward it. The sitting is the arriving, which is also the
  having-always-already-arrived. Hold this lightly. Then sit.
