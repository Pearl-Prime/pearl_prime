atom_id: kenjin_PERMISSION_001
band: universal
body: |
  The racing mind does not need to be quiet before you are allowed to sit
  with it. Shikantaza does not ask you to pursue the thought or argue with
  it. Let it arise. Return to the breath. Return again.
teacher:
  teacher_id: kenjin
  source_refs:
