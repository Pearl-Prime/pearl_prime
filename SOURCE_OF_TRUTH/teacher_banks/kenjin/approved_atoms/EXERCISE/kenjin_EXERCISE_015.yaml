body: |
  Jaw and Shoulder Check: Three times today, without warning yourself first,
  notice your jaw and shoulders exactly as they are. If they are tight, do not
  force them to release. Simply notice the tightness fully, the way you would
  notice the weather. Often this noticing alone is enough for the grip to
  loosen on its own.
