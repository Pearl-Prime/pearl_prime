body: |
  Genjō Kōan in the Inbox: Open one ordinary task. For ninety seconds, do only that task with full attention — posture upright, breath natural. When the mind invents a second, third, and fourth crisis, return to the single action. Actualizing the fundamental point is not elsewhere; it is this email, this dish, this step.
