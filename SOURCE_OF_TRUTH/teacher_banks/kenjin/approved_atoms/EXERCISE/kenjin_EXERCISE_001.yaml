body: |
  Shinjin-datsuraku Softening: Bring to mind a tight self-story ("I must hold everything together"). Feel where the body braces. On the next exhale, soften the brace without arguing with the story. Dropping off body and mind is not dramatic — it is this small release of grasping. Rest one minute in the softened posture.
