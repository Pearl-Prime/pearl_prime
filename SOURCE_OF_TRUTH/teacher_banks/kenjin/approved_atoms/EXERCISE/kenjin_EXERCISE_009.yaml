body: |
  Buji Warning Practice: Notice an urge to "do Zen correctly." Smile at the urge. Then sit two minutes with ordinary posture — not special, not spiritual theater. Seamless everyday practice is the form; performance of emptiness is the trap. End by standing and doing one household task without commentary.
