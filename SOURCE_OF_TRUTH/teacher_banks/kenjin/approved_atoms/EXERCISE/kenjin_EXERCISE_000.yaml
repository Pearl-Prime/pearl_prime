body: |
  Just Sitting Return: Sit upright for five minutes. Do not chase a calm state. When a story about burnout or failure arises, notice it, and return to the upright body and the breath. Shikantaza is not a technique for getting somewhere — the return itself is the practice. Count nothing. Fix nothing. Just sit, and return.
