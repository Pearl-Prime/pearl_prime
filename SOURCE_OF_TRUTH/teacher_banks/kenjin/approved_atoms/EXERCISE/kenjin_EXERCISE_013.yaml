body: |
  Rehearsal Interruption: The next time you notice you are rehearsing a
  difficult conversation that has not happened, stop mid-sentence — even
  mid-word. Say silently: "Not yet real." Return to the upright posture and
  one full breath. Repeat each time the rehearsal restarts. This is not
  suppression. It is simply declining to attend a meeting that is not
  occurring.
