body: |
  Kinhin Between Tasks: Stand. Take ten half-steps, matching one half-step to one breath. Let the mind's rush about unfinished work walk beside you without steering. When the ten steps end, pause. Notice: the body arrived; the story about being behind may still chatter. You do not have to obey it to take the next ordinary action.
