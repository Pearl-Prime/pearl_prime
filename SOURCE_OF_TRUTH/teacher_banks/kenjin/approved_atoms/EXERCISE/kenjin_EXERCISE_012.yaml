body: |
  Inbox Return: Before opening your inbox, sit for one minute with both feet
  flat on the floor. Notice the urge to check before the minute is finished.
  Do not act on it. When the minute ends, open the inbox once, read what is
  there once, and close it. The urge to re-check is not a signal — it is
  mu-shotoku's opposite, the gaining mind. Return to the floor under your
  feet instead.
