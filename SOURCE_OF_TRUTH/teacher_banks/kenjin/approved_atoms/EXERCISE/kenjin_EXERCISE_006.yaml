body: |
  Oryoki One Bite: At the next meal, take five bites in silence. Taste. Chew. Swallow. Between bites, rest the utensils. If the mind rehearses the afternoon, return to flavor and posture. Formal oryoki scaled for lay life: one meal-slice of undivided attention.
