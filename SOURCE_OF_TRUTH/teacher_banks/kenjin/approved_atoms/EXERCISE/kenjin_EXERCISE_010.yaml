body: |
  Breath Bridge After Spiral: After a worry spiral, place both feet on the floor. Three breaths: (1) locate tension, (2) name the story in one short phrase, (3) let the breath move without fixing. Then resume the next needed action. The bridge is enough; enlightenment is not required before lunch.
