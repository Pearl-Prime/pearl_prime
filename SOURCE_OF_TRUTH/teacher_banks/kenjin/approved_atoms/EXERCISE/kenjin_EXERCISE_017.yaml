body: |
  Comparison Bell: Each time today you catch yourself comparing your career to
  someone else's, treat the noticing itself as a bell — a small sound marking
  a return. Do not punish yourself for the comparison. Simply return, at the
  sound of the bell, to your own two feet on your own floor.
