body: |
  Kōan for the Overworked Mind: Hold this question without answering it
  intellectually: "Who is afraid, when the fear has no hands?" Do not solve it
  at your desk. Carry it through one ordinary task — filling a glass of
  water, closing a laptop — and let the body sit with the question instead of
  the head.
