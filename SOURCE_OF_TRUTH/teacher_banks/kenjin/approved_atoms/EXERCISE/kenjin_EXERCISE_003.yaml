body: |
  Mu Shotoku Check: Before a "self-improvement" impulse (fix the anxiety, optimize the day), ask: "Am I practicing to gain something, or to meet what is already here?" Without-gaining does not mean neglect. It means stop treating this moment as a ladder. Sit three breaths with no project.
