body: |
  Five-Minute Undefended Sitting: Sit for five minutes before a task you are
  dreading. Do not use the five minutes to plan, to calm yourself, or to
  rehearse. Just sit, upright, breathing. When the five minutes end, begin the
  task exactly as you are — undefended, unprepared in the way you feared, and
  still capable of the next motion.
