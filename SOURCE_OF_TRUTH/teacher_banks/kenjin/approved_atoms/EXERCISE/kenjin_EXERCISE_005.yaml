body: |
  Cloud and Sky Zazen: When shame or panic arises, label gently: "thinking." Do not clear the weather. Feel the upright spine as the space that holds weather. Sit two minutes allowing the cloud to move without chasing or suppressing. You are not the cloud's argument.
