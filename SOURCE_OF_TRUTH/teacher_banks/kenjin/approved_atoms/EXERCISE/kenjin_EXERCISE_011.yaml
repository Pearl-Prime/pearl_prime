body: |
  Face-to-Face Honesty: Write one sentence you have been performing for others. Read it aloud once. Ask: "Is this true in the body right now, or only in the resume of the self?" Sit one minute with whatever answer arrives. Kenjin's transmission is face-to-face — start with facing yourself without costume.
