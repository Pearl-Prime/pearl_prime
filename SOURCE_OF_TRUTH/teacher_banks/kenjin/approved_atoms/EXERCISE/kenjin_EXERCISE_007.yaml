body: |
  Kōan Held in the Body: Hold the question "Who is exhausted?" not as a puzzle to solve, but as a sensation in the chest and belly. Sit five minutes. Each time the intellect answers, bow to the answer and return to the bodily question. Sōtō uses kōan lightly — as interruption of conceptual grip, not as trophy insight.
