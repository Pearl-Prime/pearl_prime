body: |
  Asking Practice: Choose one thing today you have been avoiding asking for
  help with out of fear of appearing incompetent. Ask for it in the plainest
  possible sentence, with no cushioning apology attached. Notice what actually
  happens, as distinct from what you predicted would happen.
