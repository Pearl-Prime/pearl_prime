body: |
  Starting tomorrow morning, before you open your laptop, sit upright for one
  minute with both feet on the floor. This is not preparation for the day. It
  is the first return of many. Each time the inbox pulls you forward into
  imagined outcomes, come back to this same posture, the same feet, the same
  floor.
