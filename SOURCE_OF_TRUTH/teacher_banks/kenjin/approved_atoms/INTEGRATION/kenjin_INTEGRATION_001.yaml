body: |
  Choose one recurring anxious moment in your week — the Sunday-night dread,
  the pre-standup tightness, the post-meeting replay. Each time it arrives,
  do not try to eliminate it. Simply name it once, silently: "This again."
  Naming is the practice. Elimination was never the goal.
