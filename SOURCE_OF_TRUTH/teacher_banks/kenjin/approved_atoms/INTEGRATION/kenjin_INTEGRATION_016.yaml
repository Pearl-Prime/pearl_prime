body: |
  When the Sunday-night dread arrives, do not fight it into calm. Sit with it
  for five minutes, upright, breathing, doing nothing about it. Genjōkōan:
  this dread, fully met without resistance, is itself the complete moment —
  nothing missing, nothing to fix first.
