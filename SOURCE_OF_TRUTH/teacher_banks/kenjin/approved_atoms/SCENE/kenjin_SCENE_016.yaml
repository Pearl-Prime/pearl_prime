body: |
  Your friend from college posts about her new title. You feel the familiar
  drop in your stomach, and this time you name it out loud, alone in your
  apartment: "That is comparison, arriving on schedule." Naming it does not
  end it. It simply stops you from mistaking it for information about your
  own worth.
