body: |
  You watch a junior colleague make the exact mistake you made in your first
  year, the one you still privately flinch about. He shrugs, fixes it, moves
  on within the hour. You realize the flinch was never required by the
  mistake. You added it yourself, and kept paying for it long after the debt
  was settled.
