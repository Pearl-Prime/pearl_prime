body: |
  The manager's calendar invite arrives with no agenda line, just "quick
  sync." For six hours you carry it like a stone in your coat pocket, reaching
  in every few minutes to check that it is still there, still cold, still the
  same size. At the sync, she asks if you can help train the new hire. That is
  all it was. The stone is gone before you notice putting it down.
