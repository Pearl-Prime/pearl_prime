body: |
  Your coworker's terse one-word reply — "Noted." — sits in your inbox all
  afternoon, a small dark object you keep circling back to touch. At 5 p.m.
  you finally ask her directly what she meant. She says she was on a call and
  typed fast. The dark object was never anything but your own hand closing
  around it.
