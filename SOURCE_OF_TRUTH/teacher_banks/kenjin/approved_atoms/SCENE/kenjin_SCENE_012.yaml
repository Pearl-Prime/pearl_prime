body: |
  Lying awake at 1 a.m. rehearsing tomorrow's presentation for the ninth time,
  you notice the ceiling has not moved, the room has not moved, only the
  rehearsal keeps looping. You put a hand flat on your own chest and feel it
  rise and fall. This is the actual event occurring in this actual room.
