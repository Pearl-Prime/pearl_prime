body: |
  You are at your desk at 11:47 p.m., the blue light of the laptop the only
  light in the room, rereading an email you already sent. Your finger hovers
  near the trackpad as if you could still stop it. You cannot. You sit back.
  The chair holds your weight the same way it held it an hour ago, before the
  send button, before any of this. Nothing in the chair has changed.
