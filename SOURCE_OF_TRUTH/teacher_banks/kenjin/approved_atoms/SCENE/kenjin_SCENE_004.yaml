body: |
  Three hours into a spiral about the layoffs at a competitor company, you
  stand up to get water and your hand finds the edge of the counter, cool and
  solid. For one second there is only the counter. Then the spiral resumes.
  But you noticed the counter. That is where you come back to, again and
  again, not because it solves anything, but because it is real.
