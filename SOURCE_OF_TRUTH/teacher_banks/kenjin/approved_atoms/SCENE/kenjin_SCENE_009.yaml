body: |
  Between two back-to-back calls you have four unclaimed minutes. You spend
  them checking whether anyone has reacted to your message in the team
  channel. No one has. You check again ninety seconds later. Still no one.
  The four minutes pass exactly as they would have if you had simply
  breathed.
