body: |
  On the train platform, waiting for the delayed 8:14, you catch yourself
  composing the apology you will give if you're late — to a meeting that does
  not start for forty minutes, to people who have not yet noticed you are not
  there. You watch yourself do this. Watching is enough. The apology
  dissolves; the platform is still just a platform.
