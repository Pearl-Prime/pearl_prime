body: |
  You draft the difficult message to your manager four separate times,
  softening a word here, sharpening one there, as if the fifth draft will
  finally be safe. On the fifth attempt you stop mid-sentence and simply write
  what happened. It takes ninety seconds. The other four drafts took an hour.
