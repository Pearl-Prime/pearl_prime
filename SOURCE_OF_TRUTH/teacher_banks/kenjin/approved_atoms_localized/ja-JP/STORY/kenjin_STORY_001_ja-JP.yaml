body: '古い禅の故事があります。ある生徒が先生にこう言って訪れました。「私の考えを止めることができません。頭の中は混乱しています。私は壊れています。」


  先生は水を入れたグラスを取り、生徒にインクを落とすよう言いました。


  生徒はそれをしました。水はすぐに黒くなりました。


  「今、見ていてください」と先生が言います。


  彼らは待つことにします。ゆっくりと、インクが沈殿していきます。水はクリアになります。インクは底にたまります。


  「あなたの心はこれと同じです」と先生は言いました。「考えはインクのようなものです——初めて現れたときにはすべてを曇らせますが、心そのもの——それらが現れる空間——は変わりません。動きの下には常にクリアさがありました。」


  生徒は尋ねました。「では、どのようにして私の思考をクリアにしますか？」


  「それをクリアにする必要はありません。ただ沈殿させます。そして覚えておいてください：あなたはインクではありません。あなたは水です。あなたはインクが動く空間です。」


  これが戻ることです。思考から自由になることではなく、思考の下にある自分自身を思い出すことなのです。'
