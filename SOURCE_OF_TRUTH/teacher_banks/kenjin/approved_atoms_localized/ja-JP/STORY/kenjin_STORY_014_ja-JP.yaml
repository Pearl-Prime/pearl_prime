body: 'ある禅の故事があります。一年間、毎週先生のもとを訪ねてきて同じ悩みを持っていた生徒のケンジがいました。


  「教えは理解しています」とケンジは言いました。「物語が現実ではないことも理解しています。でもなぜかその思い込みから抜け出せません。理解したことが何の変化ももたらさないのはどうしてですか？」


  先生は彼に石を手渡しました。「それを握ってください」


  ケンジは石を持ちました。


  「それがあなたにとって重いことを理解してください」


  「それがわかります」とケンジは言いました。


  「腕が軽くなることはありませんか？」


  ケンジは何も答えませんでした。


  「理解することではないのです。戻ることこそが実践なのです。一度だけではなく、二度だけでもなく、腕が疲れたらそれを何度も繰り返すのです。腕が疲れたと気づいて石を置き、その後心がまたそれをつかみ、再び気づいて石を置く。そしてまた同じことを繰り返します」


  「何度繰り返せばいいんですか？」


  「腕がどれだけ疲れるまでですか？」


  ケンジはもう少し石を持った後、テーブルに置きました。それからまた石を手に取り、直接見つめ、再びそれを置きました。


  先生は何も言いませんでした。その沈黙こそが確認でした。


  これがマスターではないのです。これは実践です。落とすことが道であり、目的地ではありません。'
