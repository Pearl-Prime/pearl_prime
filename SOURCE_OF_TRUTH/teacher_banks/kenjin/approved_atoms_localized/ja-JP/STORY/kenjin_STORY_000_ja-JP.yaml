body: 'ある禅の教えがあります。弟子が大変な思いで先生のもとを訪ねました。


  「師匠、私はとても心配しています。私の心はいつも失敗についての物語を作り出します。そしてその物語が本当だと思っています。どうすればいいでしょうか？」


  先生は鏡を彼に渡して言いました。「見てみなさい。」


  弟子は自分の姿を見ました。「自分を見てます」と言いました。


  「そうだね」と先生は言いました。「では、教えてみてください——鏡を見たとき、あなたは鏡自体を見るのか、それとも鏡の中に現れるものを見るのか？」


  「鏡に現れるものを見ています」と弟子は答えました。


  「そしてその現れるものは変わることもありますよね。時々笑顔で、時々眉間にしわが寄ります。時々悲しそうで、時々満足そうになりますね。」


  「そうです」と弟子は言いました。


  「しかし鏡自体は変わりません。常に映し出します。現れるものが何であれ動じることはありません。」


  弟子は黙り込みました。そして理解しました。物語は反射のように現れて消えていきます。しかし、それらを映す意識そのものは変わることがないのです。


  これが帰るということです。反射を止めるのではなく、覚えておくこと——私は鏡であり、像ではない。'
