body: '禅の伝統では、雲と空という教えがあります。


  雲が空を横切ります。それは暗く、重く、すべてを覆っているように見えます。


  空について知らない人は、「空が暗くなった。空が雲になった」と思うかもしれません。そして苦しむでしょう。空が変わったと思い込んでしまうからです。


  しかし、空は変わりません。空は雲を受け入れています。嵐も十分に収容できるほど広大です。


  これがあなたの恥辱です。これがあなたの価値のなさです。これがあなたの不安——あなたの中の心の天気を覆う雲です。


  雲は現実で、重みがあります。太陽を隠します。


  しかし、その下にある空は変わりません。あなたの純粋な心——自覚そのものは、天候に影響されることはありません。


  修行は雲を取り除くことではありません。修行はこれを思い出すことなのです：私は空だ。雲ではない。空。


  これが分かれば、雲はまだやってきますが、あなたは恐怖を感じなくなります。自分の本質を知っているからです。'
