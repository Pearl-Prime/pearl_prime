body: |
  午前九時のスタンドアップミーティング以来、あなたの肩は耳の近くまで上がったままだ。
  この先を読み進める前に、そのことに気づき、肩を一センチほど下げてみてほしい。私が
  そう言ったからではない。その肩は、もともとそこにいるよう頼まれてなどいなかったか
  らだ。
