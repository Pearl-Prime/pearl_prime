body: |
  You are standing in a group and someone criticizes you. The familiar fear rises: "They think I am less than. I should defend myself." But you recognize the pattern. And in that recognition, something shifts. You can feel the criticism, you can hear the words, but the arrow does not stick. Not because you have become thick-skinned, but because you are no longer at the location where the arrow lands. The witness cannot be wounded.
