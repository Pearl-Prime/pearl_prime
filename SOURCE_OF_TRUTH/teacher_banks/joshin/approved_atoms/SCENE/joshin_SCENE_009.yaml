body: |
  You are trying to meditate, and the hardest things arise: memories you would rather forget, feelings you would rather not face. In the old way, you would call this failure. Now you see: the depth appearing is not failure, it is exactly what this practice does. It brings the hidden into the light. And the light itself is not your effort—it is the clarity that is always there, finally allowed to touch what had been in darkness.
