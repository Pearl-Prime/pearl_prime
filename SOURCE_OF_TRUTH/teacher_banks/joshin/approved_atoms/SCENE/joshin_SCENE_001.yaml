body: |
  You are sitting in the early morning. The house is still. Your mind is not still—it circles, plans, doubts. You watch the breath enter and leave. A story arises: "I am not meditating correctly. This is not working." Instead of pushing the story away, you turn and ask it directly: "Who is telling this story?" The mind pauses. In that pause, something settles. Not because you succeeded, but because for one moment, you were no longer identified with the voice.
