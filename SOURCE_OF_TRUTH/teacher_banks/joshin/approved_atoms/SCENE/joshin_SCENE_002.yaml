body: |
  You are at work. A colleague says something small that triggers a familiar sting. Your mind immediately constructs a narrative: "I am not respected. I am failing. Everyone sees it." You feel the story pulling your attention like water down a drain. But this time you notice: the story is not the reality. The reality is that your colleague said a few words. Everything else is your mind's addition. This distinction—once seen—cannot be unseen.
