body: |
  You are arguing with someone you love. The old pattern rises: blame, defense, certainty that you are right. But something has shifted in you. You can feel the story being constructed in real-time. And you realize: if you can feel it being constructed, you are not it. This understanding does not end the conversation. But it ends your identification with being right.
