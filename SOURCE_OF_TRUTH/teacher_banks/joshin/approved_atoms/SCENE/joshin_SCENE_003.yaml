body: |
  You wake in the night with anxiety gripping your chest. Your mind generates a hundred worries, each one feeling absolutely true. You lie there, watching. And then something strange happens: you notice the thoughts are changing. One worry is replaced by another. If they were absolutely true, they wouldn't change so easily. This recognition—that your mind is creating the worry, not finding it—creates a crack in the certainty.
