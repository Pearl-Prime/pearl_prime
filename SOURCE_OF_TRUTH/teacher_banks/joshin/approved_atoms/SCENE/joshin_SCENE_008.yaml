body: |
  You notice how the shame story works: something happens, and your mind immediately interprets it as evidence of a fundamental flaw in you. But when you look closely at the chain, you see: event, then interpretation, then feeling. The event itself has no meaning. The meaning is installed by your mind. Once you see this mechanism operating, you are no longer its prisoner.
