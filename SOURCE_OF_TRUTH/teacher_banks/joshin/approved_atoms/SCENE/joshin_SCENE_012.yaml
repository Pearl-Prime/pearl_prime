body: |
  You have been struggling with anxiety for so long that you have forgotten what it feels like to simply be. Then, in a quiet moment, you touch it: that ground beneath all the stories, still present, untouched by anything that has happened. It was never lost. The struggle was always about forgetting to check if it was still there.
