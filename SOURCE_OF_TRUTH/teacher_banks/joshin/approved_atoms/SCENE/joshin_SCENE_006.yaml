body: |
  You are walking alone. A fear rises and you do not push it away. You turn toward it and ask: "What are you protecting me from?" The fear does not answer with words. Instead, you sense something beneath it—a care, a part of you trying to keep you safe. The fear becomes visible as loyalty, not enemy. This changes everything about how you can work with it.
