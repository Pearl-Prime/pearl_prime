body: |
  Rafael sits in the hospital corridor. His father's surgery began four hours ago.

  The plastic chair cuts into the backs of his thighs. He does not move. Movement requires deciding something.

  His hands press flat against his knees. He stares at the linoleum floor. The pattern of the floor is meaningless and he stares at it anyway.

  The story in his mind runs on a loop: "I should have called more. I should have visited last summer. I chose work. I chose convenience. I chose everything except this."

  The story is merciless. It has no counterargument. It simply repeats.

  His breath comes in shallow, high in the chest. His throat holds a locked sensation, something between grief and refusal.

  A nurse passes. A cart wheels by. The corridor continues its indifferent business.

  Rafael notices his hands pressing into his knees. He notices the pressure. He follows the pressure down into the floor. He follows the floor into the breath.

  The story does not stop. The story is still running when he returns to his breath. But there is now a small space between Rafael and the story. A gap no wider than a single breath.

  In that gap, something he cannot name remains untouched. Not numb. Not resigned. Present.

  His father is in surgery. That is the dharma of this moment. Rafael breathes. He does not look away from it.
