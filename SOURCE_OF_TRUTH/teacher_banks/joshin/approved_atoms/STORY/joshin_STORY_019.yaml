body: |
  Elias sits across from his therapist in the last session before she retires.

  He has rehearsed what to say. He planned gratitude. He planned summary. He planned to demonstrate how much he has learned.

  Instead, he finds his throat tight and his hands gripped together in his lap.

  The therapist waits. She has always been good at waiting.

  "I'm afraid," Elias says, "that I only got better because of you. That without you I'll go back."

  The therapist nods. She does not rush to reassure him.

  "What does going back mean, exactly?" she asks.

  Elias unclenches his hands. He breathes. He looks at the question honestly instead of the fear.

  "Believing the story again," he says slowly. "The one that says I'm fundamentally not okay."

  "And who taught you to call it a story?" she asks.

  He sees it then. The capacity is not hers. It was never hers. She pointed. He looked. The looking belongs to him.

  His throat loosens. His hands open on his knees.

  The story about dependency was also a story. He sees this with a quiet, unspectacular clarity—the kind that does not announce itself or ask for applause.

  He thanks her. He means it fully. He stands. He walks out into the ordinary afternoon and breathes the air without waiting for permission.
