body: |
  Kenji sits by the window. Morning light. Breath coming and going.
  
  No one watching. No judgment. Just the simple fact of breathing.
  
  The mind tries to find a problem. Tries to improve. Tries to become enlightened.
  
  But he lets the trying dissolve. Returns to the breath. Natural. Not forced.
  
  The light moves across the floor. A bird lands on the fence. These things are their own perfection.
  
  This is returning. Not a special state. Just what is here when the constant effort pauses.
  
  He doesn't need to become anything. He just needs to remember: I am already here.
