body: |
  Thomas walks the same path through the park he has walked every morning for eleven years.

  The light comes through the trees at a low angle. His shoes are wet from the grass. A dog barks somewhere to the left and then stops.

  He is not in crisis this morning. There is no emergency. His mind is simply doing what minds do: rehearsing the day, cataloguing the undone, running its familiar commentary.

  He notices the commentary. He does not fight it. He returns his attention to the soles of his feet against the path.

  Left. Right. Left.

  The mind resumes its commentary. He returns again. Feet. Path. Wet grass smell.

  This is not dramatic. This is not a breakthrough. This is the practice as it actually exists on ordinary mornings—small, repetitive, unremarkable.

  The pure heart does not announce itself. It does not require a crisis to appear. It is present in the wet shoes and the low light and the breath moving without instruction.

  Thomas reaches the bench at the far end of the path. He sits for three minutes. He watches the light change on the water. He returns to his breath when the mind wanders.

  He stands. He walks back. The day begins.
