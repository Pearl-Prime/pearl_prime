body: |
  Miriam sits at the kitchen table at two in the morning. The house is quiet. Her hands wrap around a cold mug.

  The argument with her daughter ended three hours ago. The door slammed. The silence after the slam still rings in the walls.

  Miriam's chest holds a tight, compressed pressure, like something folded too small for its space. Her jaw aches from clenching.

  The story starts immediately. "I have ruined her. I have repeated every mistake my own mother made. She will carry this for the rest of her life."

  The story is fluent. It knows all the evidence. It cites specific dates.

  Miriam breathes. Not because she remembers to practice—because her body demands it, a single involuntary inhale that opens her ribs slightly.

  In that small opening, something shifts.

  She does not stop the story. She watches it run. She notices: the story is very busy. The story is working very hard.

  She asks herself, quietly, without drama: "Who is watching this story run?"

  The question does not answer itself. It opens instead. A stillness arrives underneath the noise.

  The pressure in her chest does not vanish. But it becomes workable. She sits inside it rather than being swallowed by it.

  This is not resolution. This is returning. She picks up the cold mug and holds it. She breathes. She waits for morning.
