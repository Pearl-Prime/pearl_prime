body: |
  Nadia reads the email a fourth time. The words do not change.

  Her grant application—three years of work compressed into forty pages—receives a single paragraph of rejection. The paragraph is polite. It is also final.

  Her face goes still. Her hands place the phone face-down on the desk with precise, deliberate care.

  The stillness in her body is not calm. It is the stillness before a system crashes. Her throat closes. Her eyes burn without releasing.

  The story begins building its case immediately. "This confirms it. The work is not serious. You are not serious. You spent three years on something that does not matter and neither do you."

  The story is efficient. It wastes no time.

  Nadia breathes. Her chest resists the breath, then accepts it.

  She does not tell herself the story is wrong. She does not reach for consolation. She sits with the actual weight of the loss—the real loss, the genuine difficulty—without adding the story's verdict on top of it.

  The grant is gone. That is true. The work was real. That is also true. The story's conclusion—that she is confirmed as worthless—that is the part she brings into inquiry.

  "Is this true?" she asks the story. Not aggressively. The way you ask a question you genuinely want answered.

  The story repeats itself. It does not answer. It only repeats.

  She notices this. She breathes again. She opens a new document. She begins to write.
