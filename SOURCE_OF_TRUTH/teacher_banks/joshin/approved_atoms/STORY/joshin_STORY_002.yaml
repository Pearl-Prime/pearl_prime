atom_id: joshin_STORY_002
story_origin: composite
story_type: direct_teaching
emotional_intensity_band: 2
body: |
  You carry a story about yourself. Perhaps it has been with you so long you've forgotten you're carrying it.
  
  The story might be: "I am not good enough. I am broken. I will be discovered and rejected."
  
  Here is what I want to offer you: inquiry into this story, not to defeat it, but to see it clearly.
  
  What inquiry reveals is simple but transformative. The story is not about you. The story is what the mind generates when it's trying to protect you from imagined catastrophe.
  
  The pure heart underneath—your essential nature—was never touched by the story. It remains whole, present, capable.
  
  Your practice is this: notice when the story is active. Don't fight it. Don't believe it. Just see: "This is the conditioned mind doing what it does. And I am the one aware of it."
  
  In that seeing, something shifts. You begin to return to what you are beneath the story. This is the practice. This is how returning heals what was never actually broken.
