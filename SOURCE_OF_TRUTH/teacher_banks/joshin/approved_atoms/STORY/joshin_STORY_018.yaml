body: |
  A student named Priya came to her teacher with a question she had carried for two years.

  "I have done something I cannot forgive myself for," she said. "I have tried to let it go. I have tried to accept it. Nothing works. The shame returns every time."

  The teacher looked at her directly. "Tell me what shame feels like in your body right now."

  Priya was surprised by the question. "It feels like a stone in the center of my chest," she said. "Heavy. Permanent."

  "And when you say you cannot forgive yourself," the teacher said, "who is the self that cannot forgive, and who is the self that requires forgiving?"

  Priya opened her mouth. Nothing came.

  "Sit with that," the teacher said. Not unkindly.

  Priya sat. The stone in her chest remained. But the question opened something around it. A space she had not noticed before.

  After a long silence she said: "I don't know which one is me."

  "That not-knowing," the teacher said, "is closer to the truth than any answer the story provides."

  Priya breathed. The stone did not dissolve. But it no longer filled the entire room.

  She understood then that shame is not a verdict. Shame is a story that mistakes one cloud for the whole sky. The sky itself—her joshin—had never been stained.

  She bowed. She left. She carried the question home instead of the verdict.
