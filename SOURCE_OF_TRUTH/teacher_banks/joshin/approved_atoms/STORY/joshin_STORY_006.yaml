body: |
  Riku sits in the quiet of early morning. No one watching. No comparisons yet.
  
  His breath moves. His body settles into the simple fact of being alive.
  
  For a moment, before the mind wakes fully, there is no story about inadequacy. No comparison. Just the weight of his body in the chair. The light changing outside.
  
  The mind will wake soon. The comparing will begin again. But this moment—this pause—contains something. A reminder that underneath all the stories about being not enough, there is something solid.
  
  He doesn't need to become better. He just needs to remember, again and again, that this ground is always here.
