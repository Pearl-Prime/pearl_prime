body: |
  Daria stands in front of the bathroom mirror. She has been standing here for seven minutes.

  The promotion announcement goes out in one hour. Her name is on it. Her manager called yesterday and told her directly. She said thank you and hung up and immediately began to dismantle it.

  The story in her chest says: "They made a mistake. They do not know you the way you know yourself. When they find out, the fall will be longer now."

  Her face in the mirror looks ordinary. Tired. Unremarkable. The story uses this as evidence.

  Her shoulders hold high and tight, almost at her ears. Her stomach contracts around a cold, hollow center.

  She notices the shoulders. She exhales. The shoulders drop two centimeters.

  She looks at her reflection and asks, not unkindly: "Who is telling this story?"

  The mind offers candidates. Childhood. Her first supervisor. The voice of her father on a specific Tuesday in 1994.

  She does not argue with any of them. She sees them. She names them silently: "This is the conditioned mind. This is the story. This is not the dharma of this moment."

  The dharma of this moment is: she is standing in a bathroom. She has a job to do. Her joshin—her pure heart—does not require the promotion to be deserved. It simply is.

  She straightens. She breathes once, fully. She walks out of the bathroom.
