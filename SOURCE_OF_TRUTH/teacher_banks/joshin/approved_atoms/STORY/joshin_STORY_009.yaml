body: |
  You are anxious. You believe the anxiety is the problem. That if you could just eliminate it, you would be whole.
  
  But here is what the Buddha discovered, what every returning contemplative finds: the anxiety is not the problem. The belief that anxiety means something is wrong with you—that is the problem.
  
  The anxiety arises. Your body responds. This is natural. This is how nervous systems work.
  
  But then the mind adds a story: "I shouldn't be anxious. My anxiety proves I'm broken. I need to fix myself."
  
  In that story, you've now added suffering on top of the natural response.
  
  The practice is this: when anxiety rises, feel it fully. Don't suppress it. Don't fight it. But also don't believe the story about what it means.
  
  Let the anxiety exist. Let your body have its response. And underneath it all, remember: the pure heart is not anxious. The awareness observing the anxiety is not disturbed.
  
  You are the one aware of the anxiety, not the anxiety itself.
  
  In this simple seeing, something releases. The anxiety becomes just weather. And you become the sky again.
