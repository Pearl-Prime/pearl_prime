body: |
  You carry shame. You know this. It lives in you as a story about who you are.
  
  This story might say: "I am not worthy. I am broken. I am fundamentally flawed in a way others don't see."
  
  This story has convinced you it is truth. But here is what inquiry reveals: shame is not about truth. Shame is about a story that mistakes the cloud for the sky.
  
  The cloud—the shame, the anxiety, the sense of unworthiness—moves across the sky of your being. The cloud is real. But the cloud is not the sky.
  
  Your pure heart is the sky. It doesn't change when clouds pass. It doesn't become different when storms arrive.
  
  The practice is not to eliminate clouds. The practice is to remember what you are beneath them. To trust that the sky is still sky even when completely covered.
  
  When you believe you are only the cloud, shame has power. When you remember you are the sky, the cloud is just weather.
