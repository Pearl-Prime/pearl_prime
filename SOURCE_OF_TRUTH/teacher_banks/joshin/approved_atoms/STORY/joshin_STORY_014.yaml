body: |
  There is a Zen story about a student named Kenji who came to his teacher every week for a year, always with the same complaint.

  "I understand the teaching," Kenji said. "I understand that the story is not real. But I keep believing it anyway. Why does understanding not change anything?"

  The teacher handed him a stone. "Hold this."

  Kenji held it.

  "Now understand that it is heavy."

  "I understand it," Kenji said.

  "Does your arm feel lighter?"

  Kenji said nothing.

  "Understanding is not the practice," the teacher said. "Returning is the practice. Not once. Not twice. Every time the arm tires, you notice, and you set the stone down. Then the mind picks it up again. Then you notice again. Then you set it down again."

  "How many times?" Kenji asked.

  "How many times does the arm tire?"

  Kenji held the stone a moment longer. Then he set it on the table. Then he picked it up again, looked at it directly, and set it down once more.

  The teacher said nothing. The silence was the confirmation.

  This is not mastery. This is practice. The dropping is the path, not the destination.
