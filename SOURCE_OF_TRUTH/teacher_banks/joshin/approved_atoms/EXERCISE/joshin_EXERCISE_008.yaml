body: |
  Noticing the Mechanism: When shame or self-doubt arises, pause and observe: What is the proof the mind is using? What evidence does it gather? Often you'll notice the mind is not being neutral — it's a defense attorney arguing a fixed case. "See? This proves I'm not good enough." But the selection of evidence is always confirming what was already believed. In noticing this mechanism, you've stepped outside it. The story can keep running, but you see that it's a mechanism, not the truth.
