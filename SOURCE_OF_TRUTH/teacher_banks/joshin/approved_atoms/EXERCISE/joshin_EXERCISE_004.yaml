body: |
  Return to Presence: Whenever you catch yourself lost in worry about the future or shame about the past, pause. Bring your attention to the five senses: What do you see right now? What do you hear? What do you feel on your skin? The present moment is always free of the story. It's always complete. The mind lives in narrative time — past and future. But you are here, now. This return to presence is the practice. Do it many times throughout your day. Each return is a small liberation.
