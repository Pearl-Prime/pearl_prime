body: |
  Direct Seeing Practice: Choose a moment of anxiety or shame you're experiencing. Don't try to change it. Instead, look directly at it as you would look at a cloud. What is the actual sensation? Where do you feel it in your body? Now — what is the story attached to the sensation? The sensation might be a tightness in your chest. The story is: "This means I'm failing." Can you feel the distinction? The tightness is here. The meaning is being added by the mind. This is direct seeing: the difference between what is actually present and the narrative the mind wraps around it. No judgment. Just clarity. In that clarity, something in you is already free.
