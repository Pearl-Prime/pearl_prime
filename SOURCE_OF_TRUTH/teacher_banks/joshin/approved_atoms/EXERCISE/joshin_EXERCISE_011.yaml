body: |
  Dharma Inquiry: Bring to mind something that feels like a fact about yourself or the world. "I'm bad at relationships." "People don't like me." "I always fail." Now inquire gently: "Is this the way things actually are, or is this a story my conditioning tells me?" The dharma — the way things actually are — is often much simpler and kinder than what the mind narrates. In inquiry, you're not trying to convince yourself of something positive. You're just asking: what is actually true versus what is story? In that distinction, freedom begins.
