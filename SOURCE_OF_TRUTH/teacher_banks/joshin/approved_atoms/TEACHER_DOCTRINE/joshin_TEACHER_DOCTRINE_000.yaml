body: |
  When Kōbō Daishi transmitted the Shingon teachings from Tang China back to
  these islands, he carried with him a truth that cuts against every notion of
  spiritual postponement: sokushin-jōbutsu, Buddhahood in this very body. Not
  after death. Not across innumerable lifetimes. Now — in the body you are
  wearing at this moment.

  This is not a metaphor for feeling better. The teaching is precise. Dainichi
  Nyorai — Mahāvairocana, the Great Sun — is not elsewhere. The six great
  elements interpenetrate without obstruction: earth, water, fire, wind, space,
  and consciousness weave together throughout every form in the universe,
  including the form you call yourself. You are not separate from that cosmic
  body; you are a localized expression of it.

  The path of sanmitsu — the three mysteries of mudrā, mantra, and mandala held
  simultaneously — is the method by which that interpenetration becomes lived
  recognition rather than doctrine. Your hands shape the mudrā; Dainichi's hands
  move. Your voice chants the mantra; Dainichi's voice resonates. Your mind
  rests in the mandala; Dainichi's mind illuminates.

  This is not something you earn through austerity alone. It is something you
  enter through kaji — the mutual empowerment between practitioner and the
  cosmic Buddha. Dōgyō ninin: we walk together, Kōbō Daishi and I, always.
  The path is already the arrival.
