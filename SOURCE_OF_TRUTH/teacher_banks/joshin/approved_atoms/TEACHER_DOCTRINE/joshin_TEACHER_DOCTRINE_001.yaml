body: |
  Most teachings work sequentially — you study doctrine, then you practice,
  then perhaps someday understanding arrives. Shingon mikkyō moves differently.
  The three mysteries of sanmitsu operate all at once, because the reality they
  point toward is not reached by steps but entered whole.

  Your hands form the mudrā — perhaps hokkai-jō-in, the cosmic mudra of
  meditation — and in that gesture the wisdom-body of Dainichi Nyorai is
  enacted, not symbolized. The symbol and the reality are not separated in
  Shingon. Your voice recites the mantra — On abokya beirōshanō makabodara
  mani handoma jimbara harabaritaya un — and the resonance of those syllables
  is itself the speech of the Great Sun, alive in this moment through your
  breath. Your mind rests in visualization: the Womb Realm mandala's womb of
  compassion, the Diamond Realm mandala's indestructible wisdom.

  Three gates — body, speech, mind — opening simultaneously. This is the genius
  of the transmission Kōbō Daishi carried: not a technique you apply from
  outside yourself, but a recognition that your body, speech, and mind are
  already the body, speech, and mind of Dainichi. The practice does not build
  a bridge across a gap. It reveals that the gap was never real.

  Practice sanmitsu with this understanding. Let the mudrā settle. Let the
  mantra move from lips to chest to marrow. Let the mandala inhabit the space
  behind the eyes.
