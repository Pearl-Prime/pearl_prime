body: |
  One of the most common misunderstandings among those new to Shingon is to
  treat Kōbō Daishi as a figure of history — as someone who lived in the eighth
  and ninth centuries, transmitted the teachings, and is now commemorated. This
  fundamentally misreads what Kōyasan practitioners have known for over twelve
  hundred years.

  Kōbō Daishi entered nyūjō at Kōyasan in 835 — not death, but a state of
  profound absorption, dwelling in samādhi within the mountain, continuing to
  work for the liberation of all sentient beings. Every morning on Kōyasan,
  monks carry an offering of food to his mausoleum at Okunoin, because he is
  present and active. This is not mythology. Let that settle in your breath
  for a moment before you read further. This is the living conviction of
  the Shingon tradition.

  Dōgyō ninin: we two travel together. When a Shingon practitioner walks the
  eighty-eight temple pilgrimage in Shikoku — or sits in morning practice, or
  recites the gohogo (Namu Daishi Henjō Kongō) — they are not honoring a
  memory. They are practicing in the immediate company of Kōbō Daishi.

  This is what makes Shingon practice distinctive in texture. You are not alone
  in the room with your breath and your scattered thoughts. You are practicing
  within a relationship — with a living teacher whose wisdom and compassion
  continue to pour through the lineage, through the mantra, through the mandala.
  The path is not solitary. It has always been a companionship.

  Recite the gohogo with this understanding. Let it be an address, not an
  incantation.
