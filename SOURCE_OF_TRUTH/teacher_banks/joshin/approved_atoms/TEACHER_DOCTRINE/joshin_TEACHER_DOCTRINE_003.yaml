body: |
  The two mandalas at the center of Shingon practice are not decorations to hang
  on a wall. They are maps of reality — and together they describe a single truth
  from two directions.

  The Womb Realm mandala, Taizokai, unfolds from the compassion of Dainichi
  Nyorai: the universe as the womb of enlightened care, nurturing all beings
  toward awakening. It is the aspect of the Great Sun that holds — that embraces
  even ignorance and suffering within its warmth, because nothing lies outside
  the scope of great compassion. When we enter the Taizokai in visualization or
  ritual, we are touching that boundless inclusion.

  The Diamond Realm mandala, Kongōkai, expresses the wisdom of Dainichi Nyorai:
  indestructible, luminous, penetrating all phenomena without being stained by
  any. Diamond because nothing can scratch it. Realm because it extends
  everywhere, always. Where Taizokai is the receptive warmth of compassion,
  Kongōkai is the precise clarity of wisdom that sees things as they are.

  These two are not opposites in conflict. They are two faces of the same
  Dainichi — the way warmth and light are both present in the sun without one
  diminishing the other. The practitioner stands between and within both
  mandalas simultaneously, receiving kaji — the empowering grace — from each.

  Our practice is not to choose between compassion and wisdom, between warmth
  and clarity. It is to let both ripen together in the vessel of this body,
  until we recognize that they were never two to begin with.
