body: |
  At the heart of Shingon meditation practice stands Ajikan — the contemplation
  of the Siddham letter A. This is not a concentration exercise in the ordinary
  sense. It is an encounter with the unborn.

  The practice is precise in its imagery. You visualize a full moon — the pure
  radiant mind of original awakening. On its surface, a lotus opens. At the
  center of the lotus, the Siddham letter A appears: the first sound, the
  syllable that underlies all speech, the resonance of Dainichi Nyorai's own
  nature. In Sanskrit grammar, the letter A prefixes every word to negate it —
  A-nitya, impermanent; A-vidyā, ignorance — and so in Shingon, A is the
  syllable of the unborn, the primordial ground that precedes all arising and
  ceasing.

  As you rest in the visualization, the letter A is not an object you observe
  from a distance. It is your own nature recognized. Dainichi Nyorai taught that
  A is the beginning, the middle, and the end of all things. To sit with the
  letter A is to sit within the cosmic body of the Great Sun itself.

  Kōbō Daishi brought this practice back from his Chinese master Huiguo as a
  living transmission — not a technique to be read from a scroll but a flame
  passed from lamp to lamp. When you practice Ajikan, you are held within that
  lineage. The moon, the lotus, the letter: let them breathe with you. Let the
  boundary between meditator and Dainichi slowly loosen.
