body: |
  When you feel pulled back into the old pattern—the shame, the worry, the certainty that something is wrong with you—this is your moment to return. Not to fix it, but to ask one question: "Who is aware of this?" That question is a doorway. It does not require an answer. Just ask it, and see what shifts.
