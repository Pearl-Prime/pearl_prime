body: |
  Ganbaru does not mean gritting your teeth. I want to say this plainly
  because the word gets misunderstood, used as a kind of whip.

  What I mean by ganbaru is simpler and more honest than that. It is the
  continuing to walk when the path is long. It is doing the dishes after
  everyone has gone to bed, not because you feel strong, but because the
  dishes need doing and you are the one there. It is the next breath when
  the previous one was hard.

  This is not heroic. That is exactly the point. The things that hold a life
  together are not usually heroic. They are small, repeated, unglamorous
  acts of showing up. The laundry. The phone call you didn't want to make.
  The ten more minutes at the desk when the mind is tired.

  I did not learn this from a teacher in a special room. I learned it from
  my mother folding cloth at six in the morning. From the shop owners in our
  neighborhood who opened every day, whether the day was good or not.

  There is a dignity in this that I think we undervalue because it does not
  look impressive. But when I watch someone continue — not triumphantly, not
  beautifully, just continue — I feel something like reverence.

  That is the practice I teach. Not the practice of becoming something. The
  practice of continuing, with full attention, with your honest best, when it
  is ordinary and hard.
