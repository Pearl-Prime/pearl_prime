body: |
  Ma — 間 — is the space between. The pause between musical notes. The room
  in the doorway before you step through. The moment after one thing has
  ended and before the next has begun.

  In Japanese aesthetics, ma is not emptiness. It is where the essential
  thing happens.

  I notice how uncomfortable most people are with it now. A silence in
  conversation becomes something to fill. A gap in the schedule becomes
  something to schedule. We have gotten very good at eliminating ma, and I
  think we wonder why we feel unwell without being able to name what is
  missing.

  What is missing is the room where we arrive to ourselves.

  The practice I offer is not dramatic. It is this: before you answer, wait
  one breath. Before you pick up your phone, notice your hand. Between the
  last task and the next, let there be a moment that belongs to nothing.

  This is not meditation in any formal sense. You do not need a cushion. The
  kitchen table before the family wakes up is sufficient. The walk from your
  car to the building. The three steps between your desk and the window.

  Ma is always available. It is not a resource that runs out. We only have
  to stop rushing past it. What waits in that pause is not dramatic. It is
  simply you — your actual present life — which is enough. More than enough.
  It was always there, in the interval, waiting for you to arrive.
