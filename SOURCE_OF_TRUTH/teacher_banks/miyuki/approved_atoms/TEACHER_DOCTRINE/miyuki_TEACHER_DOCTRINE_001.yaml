body: |
  There is a Japanese phrase I return to often: mono no aware. It is usually
  translated as "the pathos of things," which is close but not quite right
  for the way I experience it.

  What it points to is this: beauty and impermanence are not two different
  things. They are the same phenomenon, seen from slightly different angles.
  The cherry blossom is not beautiful despite falling. It is beautiful
  because it falls, and because you know it while it is still there.

  I am not saying this to console you for loss. I am saying it because I
  think we often try to hold on to what moves us — to freeze the meal, the
  conversation, the afternoon light — as though keeping it would preserve
  the feeling. But the feeling was never separate from the passing. The
  catching of the throat is the beauty. They arrive together.

  This is something the body knows before the mind agrees. You feel it when
  you watch your child sleep, when you hear a song from a particular year,
  when you say goodbye at a train station. Something tightens and opens at
  the same moment.

  I ask people to sit with that — not to resolve it, not to find the lesson
  in it. Just to let both things be true: this is beautiful, and this will
  not last. Those two sentences, held together, are the practice. They
  require no special posture. They only require honesty.
