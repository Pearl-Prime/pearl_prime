body: |
  The body knows things the mind hasn't decided yet. I have come to trust
  this as one of the most reliable facts I have encountered.

  You have experienced this. The tightening in your chest before you
  understood you were afraid. The way your shoulders drop when you walk
  through a door and feel safe. The stomach that knew the relationship was
  over six months before the words were spoken. The body is not slower than
  the mind. It is often ahead.

  What I teach — if I can call it teaching — is the practice of listening
  downward. Not into concepts or analysis, but into sensation, weight,
  temperature, the particular way your throat feels right now. These are not
  symbols to be interpreted. They are the thing itself, speaking in the
  language it has always used.

  This requires nothing special. No altered state, no years of preparation.
  It requires only that you stop talking to yourself long enough to notice
  what is already being said.

  I sometimes ask people: where do you feel this question in your body? Not
  what do you think about it. Where is it, right now, in flesh? That question
  changes everything about the conversation that follows. The abstract becomes
  located. The located becomes workable.

  You were given a body that has been paying attention your entire life.
  It has been keeping records. The practice is simply learning, slowly and
  without judgment, to read them.
