body: |
  Riku has meditated for eleven years. He knows the terminology. He teaches it to others on Sunday mornings.

  Then his wife says she's been lonely inside their marriage for most of it. She says this quietly, at dinner, without anger.

  Riku sits with that sentence for three days. His zazen becomes performance review. He checks his posture. Adjusts his breath. Searches for the correct response inside himself like a man patting his pockets for keys he knows aren't there.

  On the fourth morning he stops correcting his posture. His back rounds. His chin drops. He breathes badly.

  Something in his chest cracks open—not metaphor. An actual physical release, like a knuckle popped. His eyes water. He doesn't wipe them.

  He has spent eleven years learning to sit. He has no idea how to be looked at. The cushion holds him anyway. The breath continues without his help.

  Shoshin, a teacher once told him, means you don't already know. He thought he understood that. He sits now in the not-understanding. It is nothing like what he taught.
