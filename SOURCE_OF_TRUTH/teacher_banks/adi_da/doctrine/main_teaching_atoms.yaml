# Adi Da — Main Teaching Atoms (MTA)
# Authority: doctrine/doctrine.yaml
# Purpose: Core concepts for MTA-linked coverage checks
# (check_teacher_readiness.py --min-mta-story-coverage / --min-mta-exercise-coverage)

main_teaching_atoms:
  - concept_id: the_bright
    label: "The Bright / Prior Freedom"
    description: "What you are before all seeking; your fundamental luminous nature that is already present"

  - concept_id: contraction
    label: "Self-Contraction"
    description: "The fundamental holding pattern of the separate self; the activity that creates all suffering"

  - concept_id: recognition
    label: "Recognition vs Seeking"
    description: "Stopping the search and recognizing what is already so; not achievement but seeing"

  - concept_id: relationship_mirror
    label: "Relationship as Mirror"
    description: "The other reflects your own state of contraction; relationship as the perfect teaching ground"

  - concept_id: conscious_process
    label: "The Conscious Process"
    description: "Attention to Reality; the practice of becoming aware of the activity of the separate self"

  - concept_id: conductivity
    label: "Conductivity / Life-Practices"
    description: "Natural energy flow when contraction is not blocking; meditation, study, service, health"

  - concept_id: understanding
    label: "Penetrating Understanding"
    description: "Seeing that moves beyond conceptual knowledge; the body relaxing into what the mind already knew"
