body: |
  Adi Da treats relationship as the most honest teacher a person will ever have.
  Not because the other person is wise. Because the other person is a mirror,
  and a mirror does not flatter. Whatever is contracted in you will show up,
  reliably, in how you meet the one in front of you.

  The ordinary view of relationship is that the other is the cause. They did
  this, they failed to do that, and your reaction is the natural result. Adi Da
  does not deny that others act. He denies that their action is the source of
  your contraction. The contraction was already in you, a standing readiness to
  recoil. The other simply walked into its line of sight and gave it a face.

  This is the part of the teaching that must be handled with care, and Adi Da is
  explicit about the danger. To say relationship is a mirror is never to say the
  other person is the problem. It is the exact opposite. The mirror points the
  attention back, away from blame, toward the activity of contraction in
  oneself. Used wrongly — as a tool to diagnose the other — it becomes one more
  form of seeking, one more way of locating the issue anywhere but here.

  He is also clear that this is not a license to tolerate harm. Relationship as
  practice does not mean staying in a situation that is actively dangerous.
  Safety comes before practice. The mirror is for the ordinary friction of
  contact — the irritation, the defensiveness, the subtle withdrawal — not for
  excusing what genuinely wounds.

  Used rightly, the mirror is extraordinary. The moment you feel yourself
  bracing against another person, you have been handed a perfect, living display
  of your own contraction, in real time, with full intensity. You do not have to
  go looking for the clench in meditation. It is right here, activated, visible.
  And what is visible can be recognized rather than acted out.

  So Adi Da says: let the other show you yourself. Not the version of yourself
  you prefer. The contracted one, the reactive one, the one who recoils. Meet
  that one with recognition instead of blame, and the relationship becomes what
  he says it always was — the perfect ground of practice, the place where what
  is held in you finally comes into the light to be seen.
