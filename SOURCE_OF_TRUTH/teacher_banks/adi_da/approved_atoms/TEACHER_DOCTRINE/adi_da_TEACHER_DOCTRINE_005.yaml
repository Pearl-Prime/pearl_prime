body: |
  Adi Da speaks of conductivity, and what he means is simple enough to feel in
  the body. Life carries an energy. When you are not contracted against it, that
  energy moves through you freely. When you are contracted, it backs up,
  pressurizes, and turns into tension, fatigue, and the dull sense of being
  blocked. Conductivity is just the natural flow that is already trying to
  happen, the moment the clenching stops obstructing it.

  This corrects a common misunderstanding about practice. People imagine they
  must generate energy, cultivate states, build something up through effort. Adi
  Da turns it around again. You do not need to produce the flow. The flow is
  native. You need only stop damming it. The contraction is the dam. Recognition
  of the contraction is the opening of the gate.

  He grounds this in ordinary life rather than exotic experience. Conductivity
  is supported by plain conditions — adequate rest, honest movement, simple
  food, meaningful study, real service to others. These are not spiritual
  achievements. They are the basic hygiene of a body through which energy is
  meant to move. When they are neglected, the channel narrows. When they are
  honored, the channel clears. The practice is not separate from how you live; it
  is how you live.

  Adi Da is careful not to promise that conductivity removes difficulty. Energy
  flowing well does not mean a life without pain. It means a life that is no
  longer fighting itself on top of whatever pain arrives. The difference is felt
  as ease, not as the absence of hardship — the ease of a system that is not
  also strangling its own current.

  There is a quiet test he offers. Notice, right now, where you are bracing.
  Notice the held breath, the locked jaw, the tightened belly. That bracing is
  the dam. You do not have to force it open. You only have to see it, and let it
  be seen, and very often the held thing softens a degree on its own, and a
  little more of the native energy resumes its movement.

  So Adi Da points, again, to the same prior fact from a new angle. The flow is
  already here, wanting to move. Your only work is to stop the activity that
  blocks it — and that work is not addition but release, not building but
  letting be.
