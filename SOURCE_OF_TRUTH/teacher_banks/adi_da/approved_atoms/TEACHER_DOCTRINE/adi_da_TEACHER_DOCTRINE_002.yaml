body: |
  Adi Da draws a hard line between two motions that look similar from the
  outside and are opposite at the root. Seeking and recognition. Almost all
  spiritual effort is seeking. Almost none of it is recognition. And the
  difference decides everything.

  Seeking begins with a premise: what I need is not here. From that premise
  every method follows. Practice to get there. Strive to become. Improve until
  you arrive. The premise is never examined, only acted on, which is why seekers
  can practice for decades and remain seekers — they have refined the search
  without ever questioning the assumption underneath it.

  Recognition begins differently. It begins with stopping. Not stopping as
  another technique, but stopping the search itself, long enough to look at what
  is already the case. Adi Da uses the word recognition deliberately. To
  recognize is to know again something you already knew. You are not acquiring
  the truth. You are catching sight of what was here the whole time, obscured
  only by the motion of looking elsewhere.

  He gives the example of a person who searches the house for the glasses that
  are on their face. The searching is real. The effort is real. The frustration
  is real. And every bit of it is unnecessary, because the thing sought is doing
  the seeking. No method will find the glasses. Only the cessation of the search
  and a moment of recognition will.

  This is why Adi Da does not promise that recognition makes difficulty
  disappear. Recognition is not a result. It is not the prize at the end of a
  successful seek. It is what becomes available the instant seeking is set down.
  The contraction may still be present. The ache may still be present. But the
  one who is present to them is already free in a way no achievement could
  produce, because that freedom was never produced. It was recognized.

  So Adi Da does not say: seek better. He says: notice that you are seeking, and
  in the noticing, stop. Then look — not ahead, not later, not toward a better
  version of yourself — but here, at what is already so. That looking is
  recognition. And recognition asks nothing of the future. It only asks that you
  stop overlooking the present.
