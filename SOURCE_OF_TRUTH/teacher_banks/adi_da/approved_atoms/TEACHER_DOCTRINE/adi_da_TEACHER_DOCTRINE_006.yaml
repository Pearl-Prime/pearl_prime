body: |
  Adi Da uses the word understanding in a way that is easy to mishear, so he
  takes pains to mark the difference. There is conceptual understanding, which
  the mind does well — it gathers ideas, arranges them, holds opinions. And
  there is penetrating understanding, which is something else entirely. It is
  the moment the body relaxes into what the mind had only ever known about.

  Everyone has had a thin version of this. You know, intellectually, that the
  thing you fear is not actually happening. You can argue it convincingly. And
  yet the chest stays tight, the dread persists, the body does not believe the
  argument for a second. That gap — between what the mind concludes and what the
  body enacts — is the territory Adi Da is working in. Penetrating understanding
  is what closes that gap.

  It cannot be reached by more thinking, because thinking lives on one side of
  the gap. You cannot argue the body into release. Adi Da points instead to
  direct seeing — awareness resting on the contraction itself until the
  understanding goes all the way down, past the level of concept, into the level
  where the holding actually happens. When it lands there, the body lets go on
  its own. Not because it was persuaded. Because it finally saw.

  He is careful, as always, about what this is not. Penetrating understanding is
  not a state of having figured everything out. It does not make difficulty
  vanish or grant permanent calm. It is not a trophy of insight to display.
  Sometimes the understanding that genuinely penetrates surfaces hard material,
  and integrating it may call for real support, even professional help. Seeing
  deeply is not always comfortable. It is, however, true.

  The tone he holds here is exact: dense and clear at once, never softening what
  is so, but always pointing past the concept to the thing itself. He will not
  let understanding stay in the head, where it is safe and useless. He keeps
  directing it downward, toward the body, toward the breath, toward the live
  contraction that is happening now.

  So Adi Da asks for a different kind of understanding than the one the mind is
  proud of. Not the understanding that knows about freedom. The understanding
  that is freedom — because in it, the body has stopped enacting the very thing
  the mind already saw through.
