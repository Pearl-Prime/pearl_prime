body: |
  Adi Da gives a name to the actual practice, and the name is plain: the
  conscious process. It is not a posture, not a breathing method, not a mantra.
  It is the simple, demanding act of becoming conscious of the activity of the
  separate self while that activity is happening.

  Most of life is unconscious in exactly this respect. The contraction runs, the
  reaction fires, the mood arrives, and you are inside it before you know it
  started. There was no witness. There was only the wave, and you were the wave.
  The conscious process is the introduction of awareness into that sequence — not
  after the fact, in reflection, but during, in the living moment.

  Adi Da is careful to distinguish this from analysis. The conscious process is
  not thinking about yourself. Thinking about yourself is more of the same
  activity, the contraction examining itself with the contraction's own tools.
  The conscious process is more direct and more quiet. It is awareness simply
  being present to what is arising, without commentary, without the second move
  of trying to fix what it finds.

  He describes it almost as a turning of attention. Usually attention is aimed
  outward, at the object — the problem, the person, the future. The conscious
  process turns attention to the one who is attending, to the activity of
  attending itself. What is doing this clenching? What is this recoil made of?
  Not as questions to answer in words, but as a place to rest the gaze.

  This is where understanding, in Adi Da's sense, is born. Not the understanding
  of the mind, which collects concepts. The understanding of the whole being,
  which sees the contraction so directly that the body relaxes around what the
  mind had only ever argued about. He calls this penetrating understanding —
  understanding that goes all the way down, into the place where the doing
  actually lives.

  So the instruction is steady and unglamorous. Become conscious of the process.
  Again and again. Not to defeat it. Not to perfect it. To be present to it, so
  that the unconscious activity of the separate self has, at last, a witness —
  and a witnessed contraction is already a contraction beginning to release its
  hold.
