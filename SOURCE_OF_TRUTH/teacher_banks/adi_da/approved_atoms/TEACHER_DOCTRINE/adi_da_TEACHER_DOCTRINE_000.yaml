body: |
  The first thing Adi Da points to is the one thing almost no one looks at,
  because it is too close. He calls it the Bright. Not a state you enter. Not
  a level you climb to. Not a reward at the end of practice. The Bright is what
  is already the case, prior to every effort you have ever made to get free.

  This is the radical reversal at the center of the teaching. Most spiritual
  life is organized around seeking — the assumption that what you need is
  somewhere ahead of you, and that if you practice correctly you will arrive.
  Adi Da turns the whole picture around. He says the freedom you are seeking is
  not in the future. It is prior. It is the condition you are standing on while
  you look everywhere else for it.

  Consider what this means about effort. If freedom is prior, then the search
  itself is the obstacle. Every reach toward a better state confirms the
  premise that the present state is not it. The seeking keeps the goal at arm's
  length by the very act of reaching. Adi Da does not ask you to seek harder.
  He asks you to notice what is already the case before the seeking begins.

  He is careful here, and so should we be. This is not a promise that practice
  will free you from difficulty. Difficulty remains. Contraction remains. The
  Bright is not a technique for making hard things disappear. It is prior to the
  whole drama of hard and easy. It is what you are, underneath the one who is
  having the hard time.

  The instruction is almost embarrassingly simple, which is why people miss it.
  Stop, for one moment, reaching. Not forever. For one moment. In that moment,
  notice that awareness is already here, already bright, already unbroken — not
  because you produced it, but because it was never absent. You did not make the
  Bright. You cannot lose it. You can only overlook it, which is what the search
  has been doing all along.

  Adi Da keeps returning the listener to this prior ground. Not as a belief to
  hold. As a fact to verify, directly, in the only place it can be verified:
  here, before the next reach.
