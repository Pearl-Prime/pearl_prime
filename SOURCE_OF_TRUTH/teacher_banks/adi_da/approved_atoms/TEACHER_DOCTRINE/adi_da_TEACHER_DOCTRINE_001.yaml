body: |
  When Adi Da names the fundamental problem, he does not name a flaw in you. He
  names an activity. He calls it the self-contraction. And the word activity
  matters more than almost anything else in the teaching, so it is worth slowing
  down on.

  A thing is something you have. An activity is something you are doing. If your
  suffering were a thing — a wound, a defect, a missing piece — then the work
  would be to repair it, fill it, fix it. But Adi Da says it is not a thing. It
  is a doing. A continuous, mostly unconscious doing. A clench. A recoil. A
  pulling-in of attention and energy around a center that feels separate and
  under threat.

  You can almost feel it if you look. There is a tightening that happens before
  any particular fear. A bracing against life as such, a faint refusal of what
  is, a holding back from full contact. That holding is the contraction. It is
  not caused by your circumstances. Your circumstances merely give it something
  to point at. The contraction was running before the circumstance arrived and
  will look for a new object the moment this one resolves.

  Here is why this reframe is liberating rather than discouraging. You cannot
  stop being a flawed thing — there is nothing to do with a thing except endure
  it or repair it. But an activity can be seen. And an activity that is seen
  clearly, in the moment of its doing, begins to relax, because it was being
  sustained by inattention. The contraction lives in the dark. Bring even a
  little light and it loses some of its grip.

  Adi Da is precise about what this does not mean. It does not mean the other
  person is the problem. It does not mean you can think your way out of the
  contraction by deciding it is only an activity. The seeing he points to is not
  a conclusion. It is a direct noticing of the clench while it is happening, in
  the body, in the breath, in the subtle refusal of the present moment.

  So the question he hands you is not "what is wrong with me." The question is
  "what am I doing, right now, that I could simply notice instead." The wrongness
  was never the truth. The doing is the truth. And the doing, observed, is
  already loosening.
