atom_id: adi_da_INTEGRATION_006
integration_mode: still_here
body: The Bright remains. The contraction is visible. What was avoided can now be
  seen. Stay here with what you notice in your chest and throat. The separate self
  becomes audible in its refusal to open. The tightening is not about the other person.
  It reveals where identity seeks to protect itself. Notice how the body holds this
  gesture. The Bright is prior to this. Seek nothing further. Just sit with what is
  visible now. Your shoulders know the truth. Your jaw clenches with the knowledge.
  This is the moment where the gesture becomes conscious. The Bright doesn't judge
  what you see. It simply illuminates what was always operating in the background
  of your being.
