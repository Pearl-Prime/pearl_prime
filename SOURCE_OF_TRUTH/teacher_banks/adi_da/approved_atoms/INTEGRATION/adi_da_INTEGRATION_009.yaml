atom_id: adi_da_INTEGRATION_009
integration_mode: still_here
body: The brightness has not moved. You have simply stopped covering it temporarily.
  The contraction you feel is real. It lives in your body. The distinction is becoming
  visible between the gesture of self-protection and the openness that was never absent.
  Feel your feet on the ground. Feel your spine. What was hidden becomes obvious when
  you stop the internal resistance. The body is the messenger. Listen to what it's
  telling you about the separation you've maintained. Your heart knows the truth.
  Your bones carry the knowledge of what was always real underneath the contracted
  gesture.
