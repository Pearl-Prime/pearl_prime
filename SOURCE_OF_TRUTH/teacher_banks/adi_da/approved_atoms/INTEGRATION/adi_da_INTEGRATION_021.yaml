body: Carry this with you today. When the seeking starts—and it will start—notice it
  without following it. The noticing is the practice. Not the stopping. The separate
  self cannot stop itself. But awareness can see the self in motion. That seeing is
  recognition. That recognition is prior freedom showing itself through you.
