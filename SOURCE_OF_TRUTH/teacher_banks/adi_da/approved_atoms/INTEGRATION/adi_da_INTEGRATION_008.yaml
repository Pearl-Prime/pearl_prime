atom_id: adi_da_INTEGRATION_008
integration_mode: still_here
body: You can see now where you turn away. The place in your chest where you say no.
  The Bright doesn't judge this movement. It simply illuminates it. Your nervous system
  is recording this moment. What you avoided is now available to conscious relationship.
  Feel this in your belly. The separate self's gesture becomes transparent when you
  stop defending it. Your hands know what your mind is still protecting. This seeing
  is the completion. Just be here with it. The contraction has shown you its face.
  Your breath participates in this revelation. The body speaks what the mind still
  refuses to acknowledge.
