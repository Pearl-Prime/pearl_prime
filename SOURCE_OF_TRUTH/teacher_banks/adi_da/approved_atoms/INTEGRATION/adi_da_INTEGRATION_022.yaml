body: Something opened in this reading. Perhaps small, perhaps barely noticeable. The
  mind may already be reaching to categorize it or file it away. Let it be uncategorized.
  Let it remain raw. The Bright does not need a label. It needs only your willingness
  to not turn it into another possession of the self.
