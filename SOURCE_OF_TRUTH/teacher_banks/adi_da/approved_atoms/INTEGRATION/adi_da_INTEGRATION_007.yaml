integration_mode: still_here
body: The gesture of separation still operates. Your shoulders know it. Your jaw knows
  it. The body is the honest witness to what the mind tries to hide. What you've been
  running from has become visible in how you inhabit space. The contraction itself
  is the teaching. Feel it. Stay with it. Your spine holds the knowledge. Your breath
  knows where the tightness lives. The Bright remains unchanged beneath this movement.
  Nothing is broken. Nothing needs fixing. The separate self's gesture became audible
  the moment you stopped defending it. Your hands can feel what your mind is still
  protecting. The visibility of this gesture is itself the completion you've been
  seeking.
