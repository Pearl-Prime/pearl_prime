integration_mode: cost_visible
body: The gesture of protection has consequences you can locate. Your stomach holds
  tension. Your solar plexus is guarded. The Bright shows that avoidance is not free.
  It extracts a toll in your nervous system. The separated self must work constantly
  to maintain its separation. That work is visible in how you inhabit your body right
  now. The cost is the teaching. Your feet carry weight you've been bearing alone.
  Your pelvis braces against what it perceives as threat. Every protection carries
  a price that your body is paying moment by moment.
