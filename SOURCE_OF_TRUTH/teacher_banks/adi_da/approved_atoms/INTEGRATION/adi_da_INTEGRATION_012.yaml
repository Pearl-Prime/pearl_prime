atom_id: adi_da_INTEGRATION_012
integration_mode: cost_visible
body: Evasion demanded constant vigilance. That vigilance lives in your jaw, your
  shoulders, the base of your skull. The Bright reveals the price without redemption.
  You have paid with your ease, your availability, your breath capacity. The separate
  self's defense operation is expensive. Your body knows what it cost to maintain
  it. Feel this in your legs. Feel the heaviness. The price is now visible. You feel
  it concretely in every cell. Your nervous system has been working overtime to maintain
  the separation. The toll appears in your posture, in how you move, in the exhaustion
  that marks your presence.
