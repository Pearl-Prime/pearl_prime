body: Nothing has been achieved here. Nothing needs to be. Achievement is the language
  of the separate self. What happened—if anything happened—is that the contraction
  became a little more visible. Visibility is not a prize. It is the natural state
  of awareness when it stops contracting against itself. Rest in that.
