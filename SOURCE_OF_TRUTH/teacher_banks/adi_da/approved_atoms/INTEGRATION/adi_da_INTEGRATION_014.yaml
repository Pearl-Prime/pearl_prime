atom_id: adi_da_INTEGRATION_014
integration_mode: question_open
body: What becomes possible when you stop the contraction. The Bright remains. What
  would relationship feel like if you released the gesture of protection. Your heart
  is asking this question now. The separate self has shown you what its gesture costs.
  What else might be available. The tightness in your chest, does it want to release.
  Feel into your shoulders. The question itself is the opening. What is waiting on
  the other side of this refusal to connect. Your nervous system is asking if it must
  remain defended forever. The body knows that another way is possible if you're willing
  to feel what comes.
