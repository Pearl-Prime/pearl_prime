integration_mode: ground_return
body: Return your attention to where your body touches the ground. The Bright remains.
  The contraction exists. So does the solid earth beneath you. Feel your sitting bones.
  Notice the place where your back meets the chair. Feel this support. The gesture
  of avoidance is real and your body has a ground. Both are true. Return here. The
  ground doesn't require anything from you. Your feet can rest. Your weight is held
  by something more reliable than your own effort. The earth receives you exactly
  as you are with your contraction intact. This support is always here.
