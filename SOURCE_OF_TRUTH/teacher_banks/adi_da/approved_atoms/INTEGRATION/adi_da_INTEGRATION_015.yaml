atom_id: adi_da_INTEGRATION_015
integration_mode: question_open
body: Can you stay with what emerges when the turned-away gesture relaxes. The Bright
  hasn't moved. The contraction is showing you something. What does your body want
  to say now that you're not in full resistance. Your breath has something to tell
  you. Feel it in your spine. The nervous system is asking whether it must remain
  defended. Can you be here without covering yourself. What wants to shift when the
  gesture finally softens. Your hands are beginning to release. Your jaw is considering
  what it would mean to unclench. The question is not whether you can afford to open,
  but what you'll discover when you do.
