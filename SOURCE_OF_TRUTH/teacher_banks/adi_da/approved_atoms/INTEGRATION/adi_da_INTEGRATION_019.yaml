integration_mode: ground_return
body: Come back to your bones. The contraction is visible but your skeleton is holding
  you. Your pelvis. Your spine. The ground receives your weight. The Bright illuminates
  both the gesture and the container it lives in. The body has a stability beyond
  the self's movements. Feel your feet. Return to this. Feel it. The ground is always
  here. Your bones are always here. The Bright is always here. The contraction is
  here too. All of it is held in this moment.
