integration_mode: cost_visible
body: The turned-away gesture has consequences in your body. Your breath knows it.
  The way you hold your ribs, the tension behind your eyes, this is what resistance
  costs. The Bright shows the price without softness. You cannot unsee it now. The
  contraction has marked you visibly. The separation created real friction in your
  nervous system. Feel where this friction lives. Your chest is compressed. Your throat
  is tight. This is not punishment. This is truth becoming apparent in your tissue.
  Your eyes are tired from the vigilance required to maintain the gesture. Your whole
  being is marked by what the contraction demanded.
