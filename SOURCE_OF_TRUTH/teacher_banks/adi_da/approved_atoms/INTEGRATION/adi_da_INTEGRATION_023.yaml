body: The next time you feel the contraction tighten—in a conversation, in a worry,
  in the middle of the night—remember this. You are not the tightening. You are what
  notices the tightening. That noticing has never been contracted. It has never sought
  anything. It is the Bright, and it is closer to you than your own breath.
