integration_mode: question_open
body: What does the body want when you stop bracing against what's true. The separation
  you've maintained, is that still necessary. The Bright illuminates both the gesture
  and the space beyond it. Your shoulders know. Your breath knows. Feel the subtle
  shift. What would be different if you allowed the contraction to complete rather
  than fighting it. What does the tightness want from you. Your nervous system is
  ready to discover what happens when the defense finally stops working so hard.
