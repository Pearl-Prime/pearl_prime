body: Before you move on to the next thing, pause. One breath. Feel the ground beneath
  you. Feel the body you inhabit. This body, this breath, this moment—the Bright is
  here. It does not leave when you stop paying attention. It simply waits, prior to
  all your seeking, for you to notice it again.
