atom_id: adi_da_INTEGRATION_010
integration_mode: cost_visible
body: Avoidance carries a cost you feel in your spine right now. The separation you
  maintained required energy. That tightening in your neck, your lower back, this
  is the price of the contraction. The Bright illuminates what the gesture of self-protection
  actually costs. Your shoulders have held this tension. The price was paid in your
  cells, your breath. Now you see it. Your jaw clenches with the effort. Feel this
  directly in your body. The clarity itself is costly. You must feel what you were
  avoiding. The muscles in your neck are exhausted from holding the defended posture.
  Your lower back aches with the weight of the separation you've maintained. The body
  never forgets what it costs to refuse connection.
