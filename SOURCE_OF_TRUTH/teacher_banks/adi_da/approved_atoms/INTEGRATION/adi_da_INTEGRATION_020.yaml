body: The contraction was seen. Not fixed. Not dissolved. Seen. That seeing is enough.
  You do not need to do anything with what you noticed. The Bright does not require
  your effort. It requires your honesty. Stay with what is visible now. Let the rest
  unfold on its own schedule.
