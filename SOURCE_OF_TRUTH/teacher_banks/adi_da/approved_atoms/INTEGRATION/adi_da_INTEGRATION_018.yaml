body: Your feet are on the floor. Your hands rest somewhere. The Bright doesn't ask
  you to fix the contraction. Feel what's underneath the tightness. The stable pressure
  of the earth. Your spine has vertebrae. Each one is supported. Feel this support.
  The separate self's gesture exists within a body that has gravity and ground. Return
  here repeatedly. Your bones know this. The ground is constant. The solidity beneath
  you doesn't depend on whether the contraction releases. This foundation is permanently
  available to you.
