atom_id: adi_da_THREAD_002
band: universal
body: Remember the moment of recognition from earlier. The self tried to capture it
  and turn it into a possession. Notice whether that capture has happened. If it has,
  see the capture itself as contraction. Recognition is not something you keep. It is
  something you are.
