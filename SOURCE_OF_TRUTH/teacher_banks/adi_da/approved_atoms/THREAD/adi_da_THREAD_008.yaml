atom_id: adi_da_THREAD_008
band: universal
body: Earlier you saw the contraction in one context. Now you are seeing it in another.
  The contexts change. The contraction does not. This consistency is not discouraging.
  It is clarifying. There is one thing to see, and you are seeing it more clearly each
  time.
