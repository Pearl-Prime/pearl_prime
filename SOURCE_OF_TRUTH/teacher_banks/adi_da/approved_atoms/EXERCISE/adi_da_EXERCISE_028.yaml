atom_id: adi_da_EXERCISE_028
band: universal
body: 'Health as conductivity. Choose one physical practice today—a walk, stretching,
  swimming, any movement the body enjoys. As you move, feel the energy moving through
  the body. Do not exercise to achieve a goal. Move as an expression of the body''s
  natural vitality. When the mind turns the movement into a project—counting reps,
  measuring progress, comparing to yesterday—notice that as contraction. Return to the
  simple feeling of the body in motion. Conductivity is life-energy flowing without
  the self managing it.'
