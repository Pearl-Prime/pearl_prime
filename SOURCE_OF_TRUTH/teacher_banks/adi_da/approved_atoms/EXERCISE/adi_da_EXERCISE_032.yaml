atom_id: adi_da_EXERCISE_032
band: universal
body: 'Body scan for contraction. Lie down or sit comfortably. Starting from the top
  of the head, slowly move your attention downward through the body. At each area—forehead,
  jaw, throat, shoulders, chest, belly, hips, legs, feet—pause and ask: is there holding
  here? Do not try to release what you find. Simply catalog it. By the time you reach
  the feet, you will have a map of your current contraction pattern. This map is the
  Conscious Process made tangible.'
