atom_id: adi_da_EXERCISE_038
band: universal
body: 'Compassion scan. Sit quietly and think of three people: someone you love, someone
  neutral, and someone difficult. For each person, notice the body''s response. With
  the loved one, the body may open. With the neutral person, it may be indifferent.
  With the difficult person, it may contract. The opening, the indifference, and the
  contraction are all the self''s strategies. Can you extend the same quality of attention
  to all three? Not forced love. Honest seeing. The Bright does not rank people. Only
  the contraction does.'
