atom_id: adi_da_EXERCISE_024
band: universal
body: 'Walking meditation. Walk slowly for ten minutes. With each step, feel the foot
  making contact with the ground. Do not walk toward a destination. Walk as an act of
  being present where you are. Notice the moment when the mind projects forward—thinking
  about arrival, about what comes next. That projection is seeking. Gently return to
  the foot on the ground. The Bright is in the contact, not in the destination.'
