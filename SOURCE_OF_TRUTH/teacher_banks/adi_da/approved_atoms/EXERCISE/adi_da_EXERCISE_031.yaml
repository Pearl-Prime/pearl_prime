atom_id: adi_da_EXERCISE_031
band: universal
body: 'Open eyes meditation. Sit for five minutes with eyes open, gaze soft. Do not
  focus on any object. Let the visual field exist without your organizing it. The mind
  wants to label, categorize, prioritize. Each of these is a micro-contraction—the
  self managing reality. When you let the visual field be without managing it, you are
  practicing what recognition feels like: reality as it is, without the self''s editorial
  overlay.'
