atom_id: adi_da_EXERCISE_004
band: universal
body: 'Sit with eyes closed. Silently ask: what am I before I try to be someone? Do
  not answer with concepts. For five minutes, rest in the gap after the question—no
  effort to grasp an answer. Understanding here is penetrating attention, not a slogan.'
