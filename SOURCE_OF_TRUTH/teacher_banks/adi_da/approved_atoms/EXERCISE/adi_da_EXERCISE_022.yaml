atom_id: adi_da_EXERCISE_022
band: universal
body: 'Relational attention. During your next conversation with someone close to you,
  practice this: listen without preparing your response. When you notice the mind composing
  a reply while they are still speaking, gently return attention to their words and
  their face. The composing is contraction—the self preparing its next move. Listening
  without composing is responsive presence. Notice how different the conversation feels
  when you are actually here for it.'
