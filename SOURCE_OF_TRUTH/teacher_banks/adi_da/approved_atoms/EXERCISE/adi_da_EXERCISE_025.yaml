atom_id: adi_da_EXERCISE_025
band: universal
body: 'The Name practice. Choose a word or phrase that points to what is prior—the
  Bright, freedom, awareness, or any word that resonates. Throughout the day, return
  to this word silently when you notice the self contracting. The word is not a mantra
  for achieving a state. It is a reminder to recognize what is already here. The Name
  interrupts the automaticity of contraction. It creates a gap where seeing can happen.'
