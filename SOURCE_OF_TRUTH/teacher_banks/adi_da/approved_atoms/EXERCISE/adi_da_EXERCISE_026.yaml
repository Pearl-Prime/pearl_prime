atom_id: adi_da_EXERCISE_026
band: universal
body: 'Conscious eating. During one meal today, eat in silence. Before the first bite,
  pause. Notice the impulse to consume. Not hunger—the impulse. The reaching. Eat slowly
  and notice when the eating becomes mechanical, when attention drifts to the next thing.
  The mechanicalness is the self resuming its autopilot. Each time you notice the drift,
  you are practicing the Conscious Process in the most ordinary of settings.'
