atom_id: adi_da_EXERCISE_010
band: universal
body: 'In conversation today, listen for one interval before responding—half a breath.
  Notice the pull to secure position or approval. Do not force silence; simply allow
  a gap where responsive presence can appear instead of reactive contraction.'
