atom_id: adi_da_EXERCISE_019
band: universal
body: 'Service as practice. Choose one act of service today—not grand, not performative.
  Hold a door. Listen to someone without preparing your response. Complete a task that
  benefits another person with no expectation of recognition. Notice what happens in
  the body when the self is not the center of the activity. Service bypasses the contraction
  because the separate self has nothing to gain from it. In that gap, the Bright moves
  through you without obstruction. This is conductivity in action: life-energy flowing
  freely because the self has stepped aside.'
