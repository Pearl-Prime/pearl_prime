atom_id: adi_da_EXERCISE_016
band: universal
body: 'Recognition pause. Three times today, stop whatever you are doing for sixty
  seconds. Do not meditate. Do not breathe in a special way. Simply stop seeking anything
  at all. Notice what is here when you are not reaching for the next moment. The Bright
  does not arrive in these pauses. It becomes noticeable because the seeking that obscured
  it has temporarily stopped. Each pause is a micro-recognition: what you are looking
  for is already the ground you stand on.'
