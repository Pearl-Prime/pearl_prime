atom_id: adi_da_EXERCISE_009
band: universal
body: 'Recall a recent moment you defended an image of yourself. Write one sentence
  describing the fear beneath the defense. Then sit three minutes without rewriting
  your story—only feel the vulnerability. Recognition begins where the performance
  ends.'
