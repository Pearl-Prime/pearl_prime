atom_id: adi_da_EXERCISE_017
band: universal
body: 'Responsive presence practice. Choose one interaction today where you normally
  operate on autopilot—a greeting, a transaction, a brief exchange with a colleague.
  In that moment, drop the script. Be present without anticipation. Notice the other
  person as they actually are, not as your concept of them. Notice your own body. Notice
  the impulse to perform, protect, or withdraw. This is contraction observation in
  real time, in the context of relationship. The practice is not to be different. The
  practice is to see what you are already doing.'
