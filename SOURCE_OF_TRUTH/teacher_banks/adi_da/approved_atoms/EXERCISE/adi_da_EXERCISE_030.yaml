atom_id: adi_da_EXERCISE_030
band: universal
body: 'Gratitude as seeing. Before sleep, name three things you are grateful for. But
  do not stop at the naming. For each one, notice who is grateful. Feel the gratitude
  in the body. Gratitude is the self momentarily releasing its grip on lack. In that
  release, the Bright is present. This exercise is not about cultivating positive thinking.
  It is about noticing the moments when contraction naturally pauses.'
