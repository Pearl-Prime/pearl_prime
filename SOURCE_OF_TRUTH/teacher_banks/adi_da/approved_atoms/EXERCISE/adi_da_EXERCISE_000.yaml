atom_id: adi_da_EXERCISE_000
band: universal
body: 'Sit upright. Close your eyes or soften your gaze. For five minutes, do nothing
  to improve yourself. Notice the impulse to seek a better state—and do not follow
  it. Rest as the awareness in which seeking appears. This is recognition: not achievement,
  but what is already prior to the search.'
