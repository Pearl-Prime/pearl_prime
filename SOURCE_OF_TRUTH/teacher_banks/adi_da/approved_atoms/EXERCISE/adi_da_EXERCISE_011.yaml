atom_id: adi_da_EXERCISE_011
band: universal
body: 'End the day with five minutes of stillness. Do not review spiritual progress.
  Do not plan tomorrow''s practice. Rest as what is aware of the one who reviews.
  If sleepiness or distraction dominates, that too is noticed—without making a problem.
  Prior freedom is not a state you reach at the end of the day; it is what is already
  looking.'
