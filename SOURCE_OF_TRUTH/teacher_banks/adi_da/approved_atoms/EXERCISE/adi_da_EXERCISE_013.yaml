atom_id: adi_da_EXERCISE_013
band: universal
body: 'The mirror exercise. Think of someone who irritates or frustrates you. Notice
  the specific quality that disturbs you—their selfishness, their neediness, their
  rigidity. Now ask honestly: where does this same quality live in me? Not as self-criticism
  but as genuine inquiry. Relationship is a mirror. What disturbs you in the other
  reflects where your own contraction operates. Sit with whatever you find for five
  minutes without judgment.'
