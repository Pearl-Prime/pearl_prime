atom_id: adi_da_EXERCISE_023
band: universal
body: 'Study as practice. Read one page of a text that challenges your current understanding.
  Not to accumulate knowledge but to notice where the self resists what it reads. The
  resistance is not intellectual disagreement. It is the contraction defending its existing
  shape. Study in this tradition is not about learning more. It is about softening
  the self that refuses to learn.'
