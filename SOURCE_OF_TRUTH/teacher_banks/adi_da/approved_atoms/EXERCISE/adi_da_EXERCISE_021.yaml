atom_id: adi_da_EXERCISE_021
band: universal
body: 'Breath and recognition. Sit for ten minutes. Breathe naturally. On each exhale,
  silently say: I am not seeking anything right now. Notice what happens in the body
  when seeking stops, even for one breath. The body may relax. The mind may protest.
  Both responses are information. The relaxation shows you what life feels like without
  contraction. The protest shows you how invested the self is in seeking.'
