atom_id: adi_da_EXERCISE_029
band: universal
body: 'Trigger tracking. Identify one recurring trigger—a type of email, a particular
  topic, a person''s tone. The next time the trigger occurs, do not react. Instead,
  pause for three breaths. In those three breaths, locate the contraction in the body.
  Name its location and quality silently: tight chest, shallow breath, clenched hands.
  The naming is not analysis. It is the Conscious Process making the invisible visible.
  After naming, respond as you choose. The difference is that now the response is chosen,
  not automatic.'
