atom_id: adi_da_EXERCISE_008
band: universal
body: 'Sit facing a wall or open space. For five minutes, observe the difference between
  (a) trying to feel free and (b) noticing that awareness is already here. Drop effort
  toward a result. If frustration arises, treat it as contraction to be felt, not
  proof you are failing.'
