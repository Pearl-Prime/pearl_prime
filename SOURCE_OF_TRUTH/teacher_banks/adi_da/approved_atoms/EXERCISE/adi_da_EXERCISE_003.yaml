atom_id: adi_da_EXERCISE_003
band: universal
body: 'Walk slowly indoors or outdoors for ten minutes. Let each step be ordinary—no
  spiritual goal. When the mind narrates or seeks significance, notice that movement
  and return to simple sensation of feet and breath. Prior freedom is not an experience
  you earn; it is what remains when seeking relaxes.'
