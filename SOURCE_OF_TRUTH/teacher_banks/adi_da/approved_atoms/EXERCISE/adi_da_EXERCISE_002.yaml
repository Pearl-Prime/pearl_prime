atom_id: adi_da_EXERCISE_002
band: universal
body: 'Stand or sit. Bring to mind one relationship that triggers reactivity. For
  five minutes, do not analyze the other person. Notice only your own contraction—blame,
  fear, demand. Say internally: this is my pattern showing itself. The other is mirror;
  the work is seeing your own holding.'
