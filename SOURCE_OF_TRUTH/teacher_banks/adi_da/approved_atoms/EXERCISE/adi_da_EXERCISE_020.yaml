atom_id: adi_da_EXERCISE_020
band: universal
body: 'Contraction journal. For three days, carry a small notebook. Each time you notice
  your body tightening—in a conversation, while reading news, during a commute—write
  one line: what happened, where the body tightened, and what the self seemed to be
  protecting. At the end of three days, read the entries. Notice the pattern. The specifics
  change. The contraction does not.'
