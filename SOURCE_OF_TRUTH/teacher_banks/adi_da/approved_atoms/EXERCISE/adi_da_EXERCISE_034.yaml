atom_id: adi_da_EXERCISE_034
band: universal
body: 'Silence practice. Choose thirty minutes today to be in complete silence. No
  speaking, no texting, no writing. Let the silence press against the self that normally
  fills space with words. Notice the discomfort. The discomfort is the contraction
  realizing it cannot maintain itself through verbal activity. In the silence, the self
  has fewer tools. In having fewer tools, it becomes more visible. That visibility is
  the point.'
