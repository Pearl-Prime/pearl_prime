atom_id: adi_da_EXERCISE_014
band: universal
body: 'Seeking inventory. Take a piece of paper. Write down everything you are currently
  seeking—peace, approval, security, love, success, health, answers. Look at the list.
  For each item, ask: what do I believe will happen when I find this? Notice the assumption
  beneath each seeking: that arrival will end the restlessness. Now sit with the restlessness
  itself for five minutes, without seeking to end it. The restlessness is the contraction.
  Freedom is what is present when you stop running from it.'
