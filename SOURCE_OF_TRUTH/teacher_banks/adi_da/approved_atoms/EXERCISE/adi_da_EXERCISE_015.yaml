atom_id: adi_da_EXERCISE_015
band: universal
body: 'Conductivity breath. Sit with spine upright. Breathe naturally. On the inhale,
  feel the breath as energy rising from the base of the body to the crown. On the exhale,
  feel the energy descending from the crown through the front of the body to the base.
  This circular movement is conductivity—the natural flow of life-energy when contraction
  is not blocking it. Do not force the sensation. Simply intend the direction and notice
  what happens. Practice for seven minutes. If the flow feels blocked anywhere, that
  is where contraction lives. Simply notice it.'
