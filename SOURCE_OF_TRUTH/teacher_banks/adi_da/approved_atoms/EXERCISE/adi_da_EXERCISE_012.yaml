atom_id: adi_da_EXERCISE_012
band: universal
body: 'Contraction mapping. Sit quietly and bring to mind a recent moment of difficulty—an
  argument, a worry, a disappointment. Do not analyze the content. Instead, notice
  where the body tightens in response. Jaw, shoulders, belly, chest, throat. Place
  your hand on the area of greatest tension. Breathe into it without trying to change
  it. Simply notice: this is the contraction. This is the gesture of the separate self.
  Stay with the noticing for five minutes. The goal is not release. The goal is visibility.'
