atom_id: adi_da_EXERCISE_006
band: universal
body: 'Lie down or sit. Scan the body once slowly. Where you find numbness or agitation,
  do not manipulate—breathe as you already are and allow sensation to be known. For
  seven minutes. The Bright is the knowing; contraction is what appears within it.'
