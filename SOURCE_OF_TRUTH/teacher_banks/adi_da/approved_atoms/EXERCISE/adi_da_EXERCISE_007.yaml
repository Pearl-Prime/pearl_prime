atom_id: adi_da_EXERCISE_007
band: universal
body: 'Choose one ordinary activity today—washing hands, drinking water—and perform
  it with full attention to sensation only. No improvement agenda. If seeking returns
  ("am I doing this right?"), notice it and continue. Radical devotion is attention
  without the extra.'
