atom_id: adi_da_EXERCISE_033
band: universal
body: 'Desire tracking. For one hour, notice every desire that arises—for coffee, for
  distraction, for approval, for comfort, for information. Do not judge the desires
  and do not suppress them. Simply notice: there is a reaching. Each reaching is the
  self in motion, seeking something to complete itself. You are not trying to stop desiring.
  You are practicing seeing the mechanism that drives it. The seeing is the practice.'
