atom_id: adi_da_EXERCISE_027
band: universal
body: 'Mirror gaze. Stand before a mirror and look into your own eyes for five minutes.
  Do not analyze your appearance. Do not adjust your expression. Simply meet yourself.
  The self will resist this. It will try to look away, to laugh, to perform. Each resistance
  is contraction. Stay with the gaze. What looks back at you from behind the performance
  is closer to what you are than anything you have ever been told about yourself.'
