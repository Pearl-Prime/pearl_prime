atom_id: adi_da_EXERCISE_005
band: universal
body: 'When anxiety or urgency arises, pause. Feel the body without changing the breath
  on purpose. Name nothing. For two minutes, remain responsively present—neither fighting
  the sensation nor fusing with the story about it. This is practice with contraction
  as it is.'
