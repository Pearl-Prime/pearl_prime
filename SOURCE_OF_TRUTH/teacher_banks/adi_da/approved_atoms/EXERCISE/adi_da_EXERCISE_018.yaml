atom_id: adi_da_EXERCISE_018
band: universal
body: 'Self-contraction study. Before sleep tonight, review your day. Do not review
  events. Review contractions. Where did the body tighten? Where did you defend, avoid,
  perform, or seek? Name each contraction without judgment: there was a tightening when
  my idea was dismissed; there was a holding when I entered the room full of strangers;
  there was a reaching when I checked my phone for the tenth time. The study is not
  self-criticism. It is the Conscious Process—becoming aware of the activity of the
  separate self so it can no longer operate invisibly.'
