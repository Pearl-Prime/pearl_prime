atom_id: adi_da_EXERCISE_001
band: universal
body: 'Place attention in the chest or belly. Without naming it, feel contraction—tightening,
  bracing, withdrawal. Do not fix it. For three to five minutes, let contraction
  be fully felt without story. The Bright is not elsewhere; it is the openness that
  can notice contraction without war.'
