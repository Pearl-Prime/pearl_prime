atom_id: adi_da_EXERCISE_037
band: universal
body: 'The gap practice. Throughout the day, notice the gap between events. The moment
  after you end a phone call and before you start the next task. The pause after you
  park the car and before you open the door. These gaps are moments where the self is
  briefly without a project. Feel what is present in the gap. It is often uncomfortable
  because the self has nothing to do. That discomfort is the contraction. The gap itself
  is freedom.'
