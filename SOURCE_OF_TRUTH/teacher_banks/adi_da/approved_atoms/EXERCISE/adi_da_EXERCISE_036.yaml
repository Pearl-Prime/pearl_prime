atom_id: adi_da_EXERCISE_036
band: universal
body: 'Ordinary moment recognition. Choose three ordinary moments today—washing dishes,
  waiting in line, riding in a car. In each moment, ask: what is here right now that
  I am overlooking because I am reaching for the next thing? The Bright does not live
  in peak experiences. It is present in every moment, including the ones the self dismisses
  as unimportant. This exercise trains the capacity to recognize freedom in the ordinary.'
