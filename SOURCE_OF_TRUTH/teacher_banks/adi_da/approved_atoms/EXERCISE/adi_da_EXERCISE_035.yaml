atom_id: adi_da_EXERCISE_035
band: universal
body: 'Forgiveness body practice. Bring to mind someone you have not forgiven. Do not
  think about the story of what happened. Instead, feel the body''s response to this
  person. Where does the contraction live? Chest, stomach, throat, jaw? Place your
  hand there. Breathe into the area without trying to release it. You are not forgiving
  through effort. You are witnessing the contraction that unforgiveness maintains. The
  witnessing, over time, allows the body to release what the mind cannot force.'
