body: You watch someone struggle and feel the urge to fix it for them. The helping
  impulse is sincere but underneath it lives a contraction—the need to be needed, the
  self that gains its shape from rescuing. Real relationship does not require you to
  disappear into the other person's difficulty. It asks you to remain present without
  contracting into a role.
