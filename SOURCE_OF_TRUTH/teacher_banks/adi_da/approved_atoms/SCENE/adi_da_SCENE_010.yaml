body: You are walking alone. The trees, the pavement, the sky. Something in you relaxes
  because no one is watching. The performance drops. In that dropping, you feel closer
  to yourself than you have all day. What dropped was not a mask. It was the contraction
  of maintaining a separate self for the benefit of an audience.
