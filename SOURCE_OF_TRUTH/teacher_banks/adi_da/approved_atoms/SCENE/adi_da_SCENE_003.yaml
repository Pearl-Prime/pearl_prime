body: You catch yourself rehearsing what you will say in an argument that has not happened
  yet. The body is already braced. Jaw set, shoulders drawn in. The separate self is
  preparing its defense against a threat that exists only in anticipation. Notice how
  real the contraction feels even though the moment has not arrived.
