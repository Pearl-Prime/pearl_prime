body: The morning is ordinary. Coffee, light through a window, the sound of traffic.
  For one breath, you forget to seek anything at all. Something luminous is simply
  here. Then the mind reaches for the next task, and the Bright seems to vanish. But
  it was the reaching that moved, not the light.
