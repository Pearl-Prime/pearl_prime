body: You sit in meditation and nothing happens. The mind is loud, the body restless.
  You feel like a failure at the one practice that was supposed to bring peace. But
  the failure is itself the teaching. You were seeking a state. Recognition is not a
  state. It is what remains when you stop producing states.
