body: You are laughing with a friend. For a few seconds there is no self-consciousness.
  The laughter moves through you without a center. Then you notice it and the noticing
  creates a watcher. The watcher is not the Bright. The watcher is the contraction
  reassembling itself around the experience of freedom.
