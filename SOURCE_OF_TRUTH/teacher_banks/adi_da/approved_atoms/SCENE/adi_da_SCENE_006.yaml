body: You are in a meeting and someone says something that dismisses your contribution.
  Heat rises in your face. The impulse is to fight or withdraw. Both are contraction.
  Between the stimulus and the reaction there is a gap where prior freedom is still
  available. Most of the time, you do not notice the gap.
