body: Someone apologizes to you. You say the words of forgiveness but the body holds
  its guard. The words and the contraction do not match. This is the gap between understanding
  and recognition. Understanding is conceptual. Recognition is the body actually releasing
  what it has been holding. One can happen without the other.
