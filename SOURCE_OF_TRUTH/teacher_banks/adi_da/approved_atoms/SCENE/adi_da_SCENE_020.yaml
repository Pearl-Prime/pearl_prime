body: You hold someone's hand in silence. Nothing needs to be said. For a moment the
  boundary between you and the other dissolves. This is not merging. It is the recognition
  that the boundary was imagined in the first place. Relationship at its deepest is
  not two selves connecting. It is the Bright recognizing itself in the mirror of the
  other.
