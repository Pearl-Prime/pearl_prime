body: You are crying and you do not know why. The grief has no story attached to it.
  It is older than any event you can remember. This is the grief of separation itself—the
  moment awareness contracted into a point and called itself a self. The tears are not
  weakness. They are the body remembering what it lost when it learned to hold.
