atom_id: adi_da_HOOK_035
band: universal
body: There is a version of you that you show the world and a version that lives underneath.
  The gap between them is exhausting to maintain. Not because you are dishonest. Because
  the effort of holding yourself together in a particular shape takes more energy than
  you realize.
