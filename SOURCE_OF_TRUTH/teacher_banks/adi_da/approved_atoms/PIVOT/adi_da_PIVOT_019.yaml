atom_id: adi_da_PIVOT_019
band: universal
body: This is the turning point. Not a dramatic revelation. A quiet noticing. The contraction
  has been here all along, operating beneath everything you think and do. Now you have
  seen it. It cannot go back to being invisible. That is the pivot. Not the end of
  contraction. The end of its invisibility.
