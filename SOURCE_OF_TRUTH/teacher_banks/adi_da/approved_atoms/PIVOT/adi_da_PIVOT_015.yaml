atom_id: adi_da_PIVOT_015
band: universal
body: What you call anxiety is the self's anticipation of its own dissolution. It is
  not about the future event you are worried about. It is about the self sensing that
  it cannot guarantee its continuity. When you recognize this, the anxiety does not
  vanish but it becomes honest. And honesty is the beginning of freedom.
