atom_id: adi_da_PIVOT_004
band: universal
body: Notice this. The one who has been struggling is also the one who has been maintaining
  the struggle. Not because you want to suffer. Because the separate self needs activity
  to survive. Even suffering is activity. The pivot is seeing this without condemning
  yourself for it.
