atom_id: adi_da_PIVOT_010
band: universal
body: The pattern you keep repeating is not your enemy. It is the self's most honest
  communication. It is showing you where it contracts. Every repetition is another invitation
  to see. The pivot is not breaking the pattern. It is finally seeing it clearly enough
  that it can no longer operate unconsciously.
