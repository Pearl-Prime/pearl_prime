atom_id: adi_da_PIVOT_018
band: universal
body: You have been trying to love better. To be more open, more generous, more present.
  But the trying is the contraction. Love is what happens when the effort to love stops
  and the self gets out of the way. You do not produce love. You obstruct it. Recognition
  removes the obstruction.
