atom_id: adi_da_PIVOT_013
band: universal
body: You are not your story. The story is the contraction's autobiography. It is compelling
  and detailed and it feels like the absolute truth. But the one who is aware of the
  story is not in the story. That awareness is prior to everything the story contains.
