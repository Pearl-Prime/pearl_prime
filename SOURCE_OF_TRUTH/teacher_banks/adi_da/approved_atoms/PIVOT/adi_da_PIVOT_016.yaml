atom_id: adi_da_PIVOT_016
band: universal
body: Forgiveness is not something you do for the other person. It is the moment you
  stop contracting against what happened. The event does not change. Your relationship
  to the event changes. The contraction releases its hold and what remains is not approval
  of what happened. It is freedom from the grip it had on your body.
