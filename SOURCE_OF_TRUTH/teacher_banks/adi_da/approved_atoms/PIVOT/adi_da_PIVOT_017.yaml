atom_id: adi_da_PIVOT_017
band: universal
body: The exhaustion you feel is not from doing too much. It is from holding too tightly.
  The self's effort to maintain itself is the most exhausting activity there is. When
  the holding relaxes even slightly, energy returns. Not because you found more energy.
  Because you stopped wasting it on the contraction.
