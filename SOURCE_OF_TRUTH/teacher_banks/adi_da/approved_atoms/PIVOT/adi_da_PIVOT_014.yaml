atom_id: adi_da_PIVOT_014
band: universal
body: The pain you have been carrying is real. But the one who carries it is a construction.
  This does not diminish the pain. It locates it accurately. The pain lives in the body.
  The carrying lives in the self. When the self releases its grip, the pain can finally
  be felt and then move on.
