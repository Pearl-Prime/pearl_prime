atom_id: adi_da_PIVOT_001
band: universal
body: What if the problem was never the feeling but the refusal to feel it? The contraction
  is not the emotion. The contraction is the tightening around the emotion. When you
  stop tightening, the emotion moves through. What remains is the Bright.
