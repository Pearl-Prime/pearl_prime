atom_id: adi_da_PIVOT_012
band: universal
body: There is a moment just before the old reaction fires where a choice exists. Not
  a choice to be different. A choice to see. Most of the time you miss the moment because
  the contraction is faster than your attention. But the gap is always there. Practice
  widens the gap.
