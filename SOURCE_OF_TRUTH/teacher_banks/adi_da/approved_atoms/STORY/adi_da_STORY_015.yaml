body: 'Two siblings had not spoken in five years. The original cause of the rift was
  small—a misunderstanding about an inheritance. But the silence had calcified into
  an identity. Each sibling had built a version of themselves that did not include
  the other.


  The contraction was not the conflict. The contraction was the identity that formed
  around the conflict. To reach out would mean dismantling part of who they had become.
  The separate self would rather maintain its shape than risk the vulnerability of
  reconciliation.


  When one of them was diagnosed with a serious illness, the architecture shifted.
  Not because the illness created urgency. Because it revealed how much energy was
  being spent maintaining a boundary that served no one.


  The phone call that broke the silence was three words long. The three words were
  not important. What was important was that one self chose to contract less.

  '
