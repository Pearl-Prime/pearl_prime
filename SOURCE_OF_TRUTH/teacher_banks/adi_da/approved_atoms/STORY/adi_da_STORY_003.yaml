body: 'Two friends had a falling out. For months they avoided each other. Each waited
  for the other to apologize. Each was certain the other was wrong.


  What neither of them saw was that the conflict was not really about the words that
  were spoken. It was about two separate selves defending their boundaries. The argument
  was the surface. Underneath, each person was contracting against the vulnerability
  of being seen by someone who knew them well.


  When they finally spoke, what broke the impasse was not an apology. It was one of
  them saying: I notice that I am holding something tight and I do not know how to
  let go of it. The honesty was not about the conflict. It was about the contraction.


  Relationship is the mirror that shows you where you are holding. When the mirror
  shows something uncomfortable, the impulse is to break the mirror. But the mirror
  is not the problem. The holding is.

  '
