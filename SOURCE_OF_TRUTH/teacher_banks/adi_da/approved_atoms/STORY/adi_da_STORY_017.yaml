body: 'A man believed he was not good enough. This belief was not something he thought
  about consciously. It lived in his body—in the way he entered rooms, in the way
  he spoke slightly too quickly, in the way he over-prepared for everything.


  He tried to overcome the belief through achievement. Degrees, promotions, recognition.
  Each accomplishment provided a brief respite and then the not-enough feeling returned.
  The seeking was endless because the belief was not a thought. It was a contraction.


  The contraction said: I am separate and therefore I must prove my worth. No amount
  of proof can satisfy a contraction because the contraction does not actually want
  proof. It wants to maintain itself. The feeling of not-enough is how the separate
  self stays in business.


  What began to change was not his circumstances. It was his willingness to sit with
  the feeling of not-enough without trying to fix it. In the sitting, he discovered
  that the feeling had a texture, a location in the body, a rhythm. And that he was
  not the feeling. He was what noticed the feeling. What notices is already whole.

  '
