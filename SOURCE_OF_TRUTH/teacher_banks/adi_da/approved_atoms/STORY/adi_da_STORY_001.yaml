body: 'There was a woman who meditated every morning for twenty years. She sat perfectly
  still. Her practice was disciplined. Her mind was trained. And yet she remained
  unhappy.


  She was not unhappy because the practice failed. She was unhappy because the practice
  succeeded at the wrong thing. She had become very good at seeking. Every morning
  she sat down and sought peace. She sought clarity. She sought the moment when the
  mind would finally be quiet and she could rest.


  What she did not see was that the seeking itself was the disturbance. The one who
  sat down to find peace was the very activity that prevented peace from being obvious.
  Peace was not absent. It was obscured by the effort to find it.


  One day she simply stopped. Not out of frustration. Not out of giving up. She stopped
  because she saw, for the first time, that what she had been looking for was already
  the ground she was sitting on.


  The practice did not change. She still sat every morning. But she was no longer
  seeking. She was recognizing. And that made all the difference.

  '
