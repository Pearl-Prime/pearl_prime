body: 'A couple argued about the same thing for years. The topic changed but the pattern
  did not. One would pursue, the other would withdraw. The pursuer felt abandoned.
  The withdrawer felt invaded. Both were convinced the other needed to change.


  Neither of them saw that they were not actually arguing with each other. They were
  arguing with their own contractions. The pursuer was contracting against the fear
  of abandonment by seeking reassurance. The withdrawer was contracting against the
  fear of engulfment by creating distance. Each person''s strategy triggered the other''s
  wound.


  The cycle broke when they stopped looking at each other''s behavior and started
  looking at their own contraction. Not fixing it. Not explaining it. Just seeing
  it happen in real time. The pursuer noticed the grab. The withdrawer noticed the
  pull-away. And in that mutual noticing, the pattern lost its invisibility. What
  is seen cannot operate in the same way as what is unseen.

  '
