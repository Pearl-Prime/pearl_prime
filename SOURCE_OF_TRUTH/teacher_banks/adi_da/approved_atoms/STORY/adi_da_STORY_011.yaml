body: 'A nurse worked night shifts in an emergency room for fifteen years. She was
  excellent at her job. She saved lives. She also stopped feeling anything.


  She did not notice the numbing as it happened. It was gradual. A necessary adaptation.
  The separate self learned to contract against the intensity of suffering by closing
  the channel between the body and the heart.


  She thought she was being professional. She was being contracted. The difference
  is that a professional can feel everything and still act. A contracted person acts
  without feeling and calls it strength.


  When the numbness finally cracked, it was not during a crisis. It was during a quiet
  moment when a patient held her hand and said thank you. The simplicity of the contact
  bypassed the self''s defenses. She felt everything she had been holding for fifteen
  years.


  The feeling did not incapacitate her. It restored her. What she had called strength
  was actually a prison. What she had avoided was the very aliveness that made her
  work meaningful.

  '
