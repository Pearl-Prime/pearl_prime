body: 'A couple came to a counselor because they could no longer communicate. Each
  complained that the other did not listen. Each felt unseen.


  The counselor asked them to sit facing each other in silence for five minutes. No
  talking. Just looking.


  Within the first minute, both were in tears. Not from sadness. From the shock of
  actually being seen without the buffer of words and strategies. The separate self
  uses communication as a shield. It talks to avoid being exposed. It listens selectively
  to maintain its position.


  In the silence there was nowhere to hide. The contraction became visible to both
  of them simultaneously. And in that mutual visibility, something relaxed that years
  of talking had not touched.


  The problem was never communication. The problem was that both selves were using
  communication to avoid the vulnerability that relationship actually requires.

  '
