body: 'An elderly woman was asked what she had learned in eighty years. She thought
  for a long time and said: I learned that everything I spent my life building was
  an attempt to feel safe. And the safety I was looking for was already here before
  I started building.


  She described her life not as a failure but as a long detour. The career, the family,
  the house, the reputation—each was valuable on its own terms. But underneath each
  accomplishment was a seeking that no accomplishment could satisfy.


  She said: I am not sorry for the detour. But I wish someone had told me earlier
  that the destination was the starting point. You do not arrive at freedom. You recognize
  that you never left it. The contraction convinced me I was far away from home. But
  I was always home. I was just too busy seeking to notice.

  '
