body: 'A father noticed that every time his teenage daughter pushed back against him,
  his body tightened. His voice became clipped. His responses became lectures.


  He thought he was being a good parent—firm, consistent, authoritative. But what
  he was actually doing was contracting against the threat of losing control. His
  daughter was not the problem. His relationship to authority was the contraction.


  When he began to notice the tightening before he spoke, something changed. He did
  not become permissive. He did not abandon his role. But he stopped using his role
  as armor. The boundary between father and daughter became a place of meeting rather
  than a fortification.


  His daughter noticed the change before he did. She said: You seem different. Like
  you are actually here instead of performing being here.

  '
