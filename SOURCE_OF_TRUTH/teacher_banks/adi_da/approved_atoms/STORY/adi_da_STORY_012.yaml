body: 'A student asked: How do I know when I am contracting?


  The answer: You are always contracting. The question is whether you can see it.


  The student said: But sometimes I feel open and free.


  The answer: Notice what happens in the moment after you feel open. The self immediately
  tries to hold the openness, to make it a possession. That holding is contraction.
  Freedom is not a state you achieve and keep. It is what is prior to the one who
  is trying to keep anything.


  The student said: Then what is the point of practice?


  The answer: Practice is not the point. Recognition is the point. Practice creates
  the conditions where recognition can occur. But if practice becomes another form
  of seeking, it reinforces the very pattern it was meant to illuminate. Sit not to
  achieve. Sit to see what is already here.

  '
