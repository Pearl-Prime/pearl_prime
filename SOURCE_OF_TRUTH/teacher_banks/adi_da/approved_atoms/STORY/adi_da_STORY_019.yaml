body: 'A young man sat in a room full of people talking about their spiritual experiences.
  One had seen visions. Another had felt energy moving through the body. A third described
  a state of boundless love that lasted for three days.


  He had experienced none of these things. He felt inadequate. The separate self was
  comparing its spiritual inventory to everyone else''s and finding itself lacking.


  Then someone in the room said something simple: The experience is not the point.
  The one who is collecting experiences is the point. The one who feels inadequate
  because the experiences are not impressive enough—that is the contraction.


  He realized that he had turned spirituality into another arena for the self to seek
  and compare. The Bright is not an experience. It is what is present before, during,
  and after all experiences. Including the experience of feeling spiritually inadequate.

  '
