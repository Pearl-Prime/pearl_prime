body: 'A woman had a panic attack in a grocery store. Nothing triggered it. The fluorescent
  lights, the ordinary aisles, the normal sounds of commerce. And suddenly the floor
  dropped out from under her sense of self.


  In the aftermath she searched for causes. Stress. Diet. Sleep. She found explanations
  but none of them explained the core of the experience: the self losing its grip
  on its own continuity.


  What she could not see at the time was that the panic was not a malfunction. It
  was the separate self confronting the fact that it is a construction. The self maintains
  itself through constant effort. When the effort briefly fails, the result feels
  like annihilation. But it is not annihilation. It is a glimpse of what exists prior
  to the construction.


  The panic did not mean she was broken. It meant the architecture of separation had
  briefly become visible. The terror was the self''s response to seeing its own groundlessness.
  What is actually groundless is free.

  '
