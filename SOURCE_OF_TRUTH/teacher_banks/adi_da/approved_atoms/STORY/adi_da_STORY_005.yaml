body: 'A man lost his wife. The grief was total. For months he could not eat, could
  not sleep, could not find a reason to continue.


  Well-meaning people told him to be strong. To remember the good times. To know that
  she was in a better place. Each piece of advice was a form of seeking—seeking to
  escape the grief, to move past it, to arrive at a place where the pain was behind
  him.


  What he discovered was that the grief was not the problem. The problem was his resistance
  to the grief. The contraction around the loss was more painful than the loss itself.
  The self was trying to maintain its shape in the face of something that had dissolved
  a fundamental boundary.


  When he stopped resisting the grief and allowed it to move through him completely,
  something unexpected happened. The grief did not destroy him. It opened him. In
  the openness he found that his love for her was not dependent on her presence. It
  was the Bright itself, shining through the form of their relationship and now shining
  through the formlessness of her absence.

  '
