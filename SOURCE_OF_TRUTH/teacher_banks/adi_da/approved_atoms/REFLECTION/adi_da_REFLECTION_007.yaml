atom_id: adi_da_REFLECTION_007
band: universal
body: The separate self is not a thing but an activity. Contraction is how separation
  pretends to exist. You can feel it in the body's holding. Breath narrows, muscles
  grip, heart withdraws. This is not failure. This is information. The activity of
  contraction shows where avoidance is practiced. To see the contraction without judgment
  is to begin understanding the self's mechanics.
