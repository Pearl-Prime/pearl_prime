atom_id: adi_da_REFLECTION_022
band: universal
body: You sit across from someone you love. Their eyes meet yours, and you feel the
  familiar tightening in your chest. The self activates. It contracts. In that contraction,
  the teaching is present. The Bright shines unchanged, prior to this gesture of avoidance.
  You notice the tightening. That noticing is already freedom. You do not have to
  change it. You only have to see it. And in seeing, you meet the Bright prior to
  the self's defense.
