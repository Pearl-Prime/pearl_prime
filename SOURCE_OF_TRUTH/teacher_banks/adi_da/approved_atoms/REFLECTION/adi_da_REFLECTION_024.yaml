atom_id: adi_da_REFLECTION_024
band: universal
body: The self's activity is visible in the body. Watch how you hold your shoulders
  when another person's independence threatens you. That holding is the self protecting
  itself. The self is the contraction. Relationship shows this. In the gaze of the
  other, you cannot hide. You can only see your own activity and choose not to reinforce
  it. This choice is the teaching.
