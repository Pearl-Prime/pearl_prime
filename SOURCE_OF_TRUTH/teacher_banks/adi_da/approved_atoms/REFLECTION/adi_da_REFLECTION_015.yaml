atom_id: adi_da_REFLECTION_015
band: universal
body: In the moment before you reach out to someone, what happens in your body? Is
  there a quality of holding back? What would happen if you released that holding?
  Would you still exist, or only the separate self would dissolve? Can you distinguish
  between the two?
