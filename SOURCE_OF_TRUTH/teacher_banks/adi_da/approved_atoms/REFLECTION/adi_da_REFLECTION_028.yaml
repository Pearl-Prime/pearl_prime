atom_id: adi_da_REFLECTION_028
band: universal
body: The separate self is a gesture, not a thing. It arises in each moment as contraction.
  In relationship, you feel the moment when it activates. Someone does not respond
  as you hoped, and contraction comes. The self emerges. If you do not reinforce that
  emergence, it dissipates. Relationship is the crucible where you learn to see the
  self's activity in real time. This seeing is the beginning of freedom.
