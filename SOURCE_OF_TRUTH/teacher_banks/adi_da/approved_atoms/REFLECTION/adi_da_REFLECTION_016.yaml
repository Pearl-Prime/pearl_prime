atom_id: adi_da_REFLECTION_016
band: universal
body: When you sit quietly and the mind becomes still, does the Bright appear? Or
  is it already here, prior to the mind's movements? What is seeking, then? What is
  it trying to find that is already present? Can you notice the moment when seeking
  begins?
