atom_id: adi_da_REFLECTION_008
band: universal
body: Before seeking comes the Bright. Seeking arises when the Bright is forgotten.
  The separate self seeks because it assumes the Bright is elsewhere. But seeking
  itself creates the false distance. Relationship reveals this. In the presence of
  another, seeking becomes obvious. You contract toward familiarity because the familiar
  feels like proof of existence.
