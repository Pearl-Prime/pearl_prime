atom_id: adi_da_REFLECTION_013
band: universal
body: To live as the separate self is to live in perpetual contraction. You contract
  against loss, against the other's independence, against your own insignificance.
  Relationship makes this visible. In the gaze of the beloved, you cannot hide the
  contraction. This is why relationship is the ultimate teaching. It shows the self
  to itself. This showing is the grace of intimacy.
