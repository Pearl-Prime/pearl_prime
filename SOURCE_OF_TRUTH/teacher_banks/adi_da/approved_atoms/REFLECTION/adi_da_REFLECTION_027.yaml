atom_id: adi_da_REFLECTION_027
band: universal
body: You search for the Bright in meditation, in philosophy, in the eyes of another.
  But the searching itself is what obscures it. The Bright is prior to your search.
  It is prior to yourself. In relationship, when you finally stop searching for confirmation,
  the Bright becomes obvious. It was always the background of the searching. It was
  always prior.
