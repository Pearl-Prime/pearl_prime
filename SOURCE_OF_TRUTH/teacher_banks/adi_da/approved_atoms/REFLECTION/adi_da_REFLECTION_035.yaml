atom_id: adi_da_REFLECTION_035
band: universal
reflection_type: inquiry
body: Think about a moment when you felt truly free. Not happy. Not relieved. Free.
  Now notice what was absent in that moment. Most likely, the seeking was absent. The
  self-management was absent. The contraction was briefly quiet. Freedom is not the
  presence of something special. It is the absence of the one thing that obscures everything.
