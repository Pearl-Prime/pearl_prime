atom_id: adi_da_REFLECTION_020
band: universal
body: In relationship, when the other person truly sees you, what happens to the separate
  self? Does it feel threatened? What is it afraid of being seen? Is that fear the
  self, or is it the recognition of the self's unreality? Can you sit with both?
