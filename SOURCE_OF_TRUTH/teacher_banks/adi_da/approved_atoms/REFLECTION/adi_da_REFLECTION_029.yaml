atom_id: adi_da_REFLECTION_029
band: universal
body: 'A teaching arrives: what you avoid in relationship is what the self most protects.
  If you avoid vulnerability, the self is protecting an image of strength. If you
  avoid independence, the self is protecting an image of connection. The other person,
  by simply being themselves, reveals these images. This is their gift. This is how
  they teach you the unreality of the separate self.'
