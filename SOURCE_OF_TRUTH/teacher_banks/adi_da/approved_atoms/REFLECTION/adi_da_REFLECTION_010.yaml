atom_id: adi_da_REFLECTION_010
band: universal
body: The Bright is not something to attain. It is prior to the separate self's activity.
  Contraction occurs in the presence of the Bright. The self senses its own falsity
  and tightens. This tightening is not pathology. It is the sign of recognition. The
  Bright is always prior. The self's defense against that recognition is what you
  experience as suffering.
