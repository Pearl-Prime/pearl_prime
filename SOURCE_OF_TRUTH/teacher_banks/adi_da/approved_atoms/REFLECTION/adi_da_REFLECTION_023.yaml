atom_id: adi_da_REFLECTION_023
band: universal
body: A moment arrives when the mind stops seeking. Seeking has exhausted itself.
  In that emptiness, something prior reveals itself. Not a thing to grasp. Not a state
  to attain. The Bright is here, untouched by the self's endless reaching. In relationship,
  this happens when you finally stop trying to make the other confirm you. When you
  stop performing, the Bright becomes obvious.
