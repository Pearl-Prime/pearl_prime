atom_id: adi_da_REFLECTION_031
band: universal
reflection_type: inquiry
body: Consider the person you find most difficult. What is it about them that tightens
  you? Now ask a harder question. Is the tightening about who they are? Or is it about
  who you become in their presence? The mirror does not create what it reflects.
