atom_id: adi_da_REFLECTION_009
band: universal
body: Avoidance is not cowardice. It is the self's protective strategy. In relationship,
  avoidance becomes visible. You avoid the gaze, the vulnerability, the unknown response.
  This avoidance maps the self's edges. Where you consistently turn away, the self
  reinforces its boundary. Awareness of avoidance is the first opening. Once you see
  where you habitually contract, choice becomes possible.
