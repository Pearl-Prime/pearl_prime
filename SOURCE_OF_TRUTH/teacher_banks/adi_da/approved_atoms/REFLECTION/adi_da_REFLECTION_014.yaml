atom_id: adi_da_REFLECTION_014
band: universal
body: Where do you feel the tightening when another person does not respond as you
  expected? What assumption about yourself lies beneath that contraction? Can you
  name it without judgment? Is that assumption true, or is it the self's story? What
  would happen if you could see the contraction without reinforcing it?
