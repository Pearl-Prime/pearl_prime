atom_id: adi_da_REFLECTION_011
band: universal
body: Relationship becomes teaching when you stop trying to fix the other. Instead,
  observe your contraction. Where does it arise? In their independence? Their demand?
  Their gaze? Each point of contraction reveals a hidden assumption about yourself.
  The relationship is not the problem. The problem is what the self assumes about
  being separate. The other person is showing you your own mechanism.
