atom_id: adi_da_REFLECTION_006
band: universal
body: Contraction operates as the self's primary gesture. When relating fails, look
  to the place where you tighten. The separate self becomes audible in its refusal
  to open. The Bright is prior to this gesture. Seeking itself becomes the barrier.
  In relationships, avoidance reveals where contraction lives. The tightening is not
  about the other person. It is about the self protecting its separate identity.
