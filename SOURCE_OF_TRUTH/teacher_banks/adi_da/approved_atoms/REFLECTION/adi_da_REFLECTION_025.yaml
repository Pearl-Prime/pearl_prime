atom_id: adi_da_REFLECTION_025
band: universal
body: Avoidance is a sign of recognition. Some quality in the other person reveals
  something you cannot bear to see about yourself. So you turn away. In that turning
  away, the self becomes solid. But if you stayed present with that revelation, what
  would dissolve? The self, yes. But what is left is the Bright, already here. The
  Bright never needed the self's protection.
