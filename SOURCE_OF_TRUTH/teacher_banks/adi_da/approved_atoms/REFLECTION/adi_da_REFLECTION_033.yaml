atom_id: adi_da_REFLECTION_033
band: universal
reflection_type: inquiry
body: You have spent years building a life. A career, a home, relationships, a reputation.
  How much of what you built was an expression of freedom? And how much was a fortress
  against the fear that without it, you would be nothing? The building is not the problem.
  The fear underneath it is worth seeing.
