atom_id: adi_da_REFLECTION_032
band: universal
reflection_type: inquiry
body: When was the last time you did nothing? Not resting in order to be productive
  later. Not recovering so you could return to seeking. Actually nothing. If the answer
  is never or rarely, notice what that reveals about the self that cannot stop.
