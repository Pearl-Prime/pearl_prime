atom_id: adi_da_REFLECTION_012
band: universal
body: The self's activity is relentless. Even in silence, contraction continues. Even
  in meditation, seeking persists. This persistence is not failure. It shows the depth
  of the self's commitment to separation. Wisdom is not stopping this activity. It
  is seeing it clearly without judgment. Then, in that clarity, the Bright is already
  evident. Acceptance of the activity is the doorway.
