atom_id: adi_da_REFLECTION_034
band: universal
reflection_type: inquiry
body: If the Bright is already present, why do you not feel it? This question itself
  is the contraction speaking. It assumes something is missing. What if the feeling
  of absence is the last move of the separate self—the seeking that masks what is already
  here by insisting it should feel like something other than what it feels like right
  now?
