atom_id: adi_da_REFLECTION_026
band: universal
body: The heart knows something the mind denies. In relationships that matter, the
  heart contracts against the self's strategies. This contraction is not suffering.
  It is the sign of recognition. The Bright is pressing against the self's walls.
  The self tightens. This tightening is the teaching. To see it is to begin releasing
  it. To release it is to meet the Bright.
