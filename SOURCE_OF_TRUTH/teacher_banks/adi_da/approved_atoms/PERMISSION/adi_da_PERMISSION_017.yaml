atom_id: adi_da_PERMISSION_017
band: universal
body: If your life is difficult right now, that difficulty is not a barrier to recognition.
  It is the very place where recognition has the most to offer. The Bright is most
  visible not when everything is easy but when the contraction is most intense and you
  choose to see it anyway.
