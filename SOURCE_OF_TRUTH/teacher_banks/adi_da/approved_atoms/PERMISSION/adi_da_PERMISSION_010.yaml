atom_id: adi_da_PERMISSION_010
band: universal
body: If you are in pain right now—physical or emotional—you do not need to set the
  pain aside to engage with this. The Bright is not separate from your pain. It is the
  awareness in which the pain is held. You can be in pain and still be free. These are
  not contradictory.
