atom_id: adi_da_PERMISSION_013
band: universal
body: If you feel resistance to what you are reading, the resistance is information.
  It is the contraction protecting its territory. You do not need to overcome the resistance.
  Just notice it. The noticing is the practice. The resistance will take care of itself.
