atom_id: adi_da_PERMISSION_011
band: universal
body: You may be reading this in a state of exhaustion. The self is tired of holding
  itself together. That exhaustion is not weakness. It is the body telling you the truth
  about the cost of contraction. Rest is not quitting. Rest is the self releasing its
  grip long enough for the Bright to be felt.
