atom_id: adi_da_PERMISSION_009
band: universal
body: You have permission to be exactly as contracted as you are right now. The teaching
  does not ask you to pretend to be open. It asks you to see the closing. Pretending
  to be open is another contraction. Seeing the closing is the beginning of actual
  openness.
