atom_id: adi_da_PERMISSION_019
band: universal
body: Whatever you are carrying into this moment is welcome. The weight of it, the
  shape of it, the way it presses on your chest. The teaching does not ask you to set
  it down before you enter. It asks you to enter with it and see what happens when you
  stop pretending it is not there.
