atom_id: adi_da_PERMISSION_014
band: universal
body: You may have tried this before and felt like it did not work. That is the self
  evaluating recognition by the standards of seeking—did I get somewhere? Recognition
  is not getting somewhere. It is being where you already are. If it felt like nothing
  happened, perhaps you were closer than you knew.
