atom_id: adi_da_PERMISSION_005
band: universal
body: You are allowed to feel angry, sad, afraid, or lost while engaging with this
  teaching. The teaching does not require you to transcend your feelings. It asks you
  to see the contraction around your feelings. The feelings themselves are not the problem.
