atom_id: adi_da_PERMISSION_000
band: universal
body: You are still touching your own Bright, even when it does not feel that way.
  The struggle you are in right now, the fatigue, the sense of not yet there—that is
  not failure. It is the contraction becoming visible. Stay where you are. Not where
  you think you should be.
