body: "一位学生走近阿迪·达，说道：“我已修行多年，却感觉不到任何变化。”  \n阿迪·达目光沉静。“你早已在感受变化。光明已然在作用。你所称的‘修行’，并非朝向某种缺失之物的努力；而是你本已具足的、与神圣的合一，正逐渐清晰显现。你所感受到的收缩，并非失败，而是自我正认出自身的局限。”"
