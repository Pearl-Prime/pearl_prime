body: "丹尼尔对儿子说话时，忽然听见自己正重复着父亲当年的话语——  \n语调一模一样，  \n那种欲言又止的拉扯感也分毫不差。  \n这模式如附体般穿过他。\
  \  \n他第一次意识到：  \n这并非他的本性，  \n而是代代相传的紧缩反应。  \n\n“光明”向他呈现那个临界时刻：  \n他能真切感受到退缩的冲动，\
  \  \n却也能选择不同的回应。  \n这不是靠意志力强行改变，  \n而是源于清晰的看见。  \n\n“光明”并不替他做事，  \n它只是映照出：  \n当你不再紧缩于自己的家族印记，\
  \  \n另一种可能，就此浮现。"
