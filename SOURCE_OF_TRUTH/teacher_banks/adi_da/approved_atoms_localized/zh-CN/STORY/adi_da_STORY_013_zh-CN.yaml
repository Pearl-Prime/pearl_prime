body: "索菲亚全然投入虔敬之时，双肩自然垂落。  \n并非因为有人告诉她要放松。  \n身体自知：强求的松弛，与真正释放后的自在，截然不同。  \n她的呼吸随之加深。\
  \  \n双手在膝上缓缓松软。  \n光明本不需她紧绷用力。  \n放下，即是修行。  \n她真切感受到：自己曾耗费多少能量，去对抗宇宙的流动。  \n而停止对抗，竟如此简单。"
