body: "莱拉注意到，自己会因成就而紧绷，紧紧抓住它们，仿佛那是自身价值的证明。  \n光明并不需要她的成就，甚至根本不需要她。  \n这一觉察，悄然裂开了一道缝隙。\
  \  \n她一直忙于成为“重要的人”，却忘了自己本就重要——  \n不是因为所做之事，而是因为本来如此。  \n那围绕“成为”的紧绷，终于可以放下了。"
