body: "薇薇安意识到，自己总在控制欲周围收紧身体。  \n反复检查。  \n重新整理。  \n严密监控一切，生怕局面失控。  \n她的思绪飞速运转。  \n\
  下颌不自觉地紧绷。  \n“光明”让她看清：这并非谨慎，而是恐惧。  \n而她越想掌控，恐惧就攥得越紧。  \n某一天，她忽然明白：“光明”一直稳稳托住一切。\
  \  \n她的努力毫无增益，  \n只徒然耗损内心的安宁。  \n她开始练习一种彻底的释放——松开紧握的手。"
