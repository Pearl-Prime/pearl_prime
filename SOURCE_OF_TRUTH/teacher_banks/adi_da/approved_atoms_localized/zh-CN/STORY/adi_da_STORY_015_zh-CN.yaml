body: "埃琳娜深爱着她的伴侣，但爱意一生起，她便立刻感受到身体的收缩——那种紧握、那种依附，却伪装成关怀。她看着自己表演着虔诚，却始终将最深的部分藏在身后。\
  \  \n“光明”告诉她：这并非失败。  \n这种收缩，正是她此行要直面的真相。  \n毫无保留的爱，意味着向那个恐惧消亡的“自我”彻底告别。  \n当她站在这个临界点上，心不由自主地收紧。\
  \  \n而这收紧，正是她迈向自由的悬崖边缘。"
