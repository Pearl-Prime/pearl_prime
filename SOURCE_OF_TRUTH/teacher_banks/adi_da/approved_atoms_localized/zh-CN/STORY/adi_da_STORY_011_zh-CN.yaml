body: "一位学生问道：“我该如何持续安住于那种联结的状态？”  \n阿迪·达告诉他：“你无法做到。这正是误解所在。联结的状态并非一个你可以抵达并停留的地点，它就是你本来的样子。\
  \  \n只要你一试图抓住它，收缩便再次生起。  \n但请注意：你觉察到收缩的速度正在变快；主体性正变得愈发敏锐；你从收缩中回归的速度也在加快。  \n这才是真正的成长——不是达成某种成就，而是更清晰地认出实相。”"
