body: "一位学生静坐默然，忽然感受到那光明、广袤、恒常不变、不受他追寻所扰的存在。  \n他将此感受告诉阿迪·达，老师点点头：“这正是你本然的状态。你并未‘达成’它，只是停止了对它的干扰。\
  \  \n那一刻你所感受到的能动性，并非源于你自身，而是光明的能动性自然流现。  \n这就是初露的微光。莫将它当作目标去追求；若刻意抓取，紧缩感便会重现。  \n\
  只需安住于当下本已存在的实相。”"
