body: "一位学生坦白道：“我的追寻从未停止。我从一位老师转向另一位老师，从一种修习转向另一种修习。”  \n阿迪·达点点头：“这追寻本身，就是收缩。你正在逃离那本已存在的光明。本初合一并非需要达成的目标，它正是当下这份觉知的根基。停止朝向那个并不存在的上帝追寻吧。安住于那早已遍在一切的光明之中。”"
