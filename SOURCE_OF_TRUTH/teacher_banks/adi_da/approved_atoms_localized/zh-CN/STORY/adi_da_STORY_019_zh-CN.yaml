body: "雪纪觉察到自己追寻的模式。  \n她从一种练习换到另一种，从一位老师转向另一位，  \n始终在寻找那个能带来真正转变的“唯一”。  \n\n每次接触新练习，身体又多一次紧缩。\
  \  \n“光明”让她看见：一切追寻，都是同一个结。  \n她并非生来就在追寻。  \n是创伤，将她推入追寻。  \n创伤紧紧缠绕着它所失去的东西。  \n\n\
  只要她还在追寻“光明”，  \n就无法真正遇见它。  \n她的安住，本身就成了修行。"
