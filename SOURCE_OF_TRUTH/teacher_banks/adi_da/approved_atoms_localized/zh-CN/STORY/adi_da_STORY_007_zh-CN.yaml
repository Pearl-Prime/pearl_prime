body: 一名学生感到被自己心智的运作机制困住了。阿迪·达观察道：“你现在看见这个机制了。这是进步。自我是一套机械系统，只会依其程序作出反应。而这个程序，正是你每一次感到不安全、不被看见、被抛弃时，所累积起来的收缩反应。这身心之身，正是这种收缩的明证。但你并非这个机制本身。你是那光明的觉知，是那个观照它的主体。这个机制无法靠强力停止，唯有透过临在，它才会自然转变。”
