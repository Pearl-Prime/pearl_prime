body: 一位学生在人际关系中难以应对突然升起的愤怒。阿迪·达说：“这愤怒，源于对被抛弃的恐惧。请留意对方将注意力从你身上移开的那一瞬——你的身体随之紧缩，而暴怒则掩盖了这紧缩所留下的空隙。你正向同样处于紧缩状态的人索求联结。这并非对方的失败，也非你的过错。光明，恰恰在彼此紧缩所形成的间隙中流动。愤怒，只是紧缩发出的声音，而非真正的回应。”
