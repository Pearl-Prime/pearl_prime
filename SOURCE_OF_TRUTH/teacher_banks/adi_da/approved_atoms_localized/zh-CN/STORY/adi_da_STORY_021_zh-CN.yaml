body: "阿玛拉告别了她曾以为的自己。  \n就在觉知升起的刹那，她的整个身份认同骤然收束。  \n所有建立在“孤立自我”流沙之上的东西，此刻尽数显露。  \n\
  她感受到那光明——不在其下，而是作为一切的根基。  \n她曾用多年时间，努力成为某个人；  \n如今，她成为“无名之人”。  \n这种消融，既是恐惧，也是自由。\
  \  \n她的双手微微颤抖，  \n心扉却敞开到超越极限。  \n此刻，光明正以光明本身的方式运作——  \n无需中介，也无需“她”居中阻挡。"
