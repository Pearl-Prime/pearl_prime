body: "克莱尔感受到自己的防御机制。  \n被批评时，她的面部会变得僵硬；  \n当别人不理解她时，她的胸口会收紧。  \n这些防御曾经是必要的，  \n如今却遮蔽了光明。\
  \  \n她无需用蛮力去除它们，  \n只需看见它们即可。  \n看见这种收缩耗费了多少能量。  \n在看见的那一刻，疲惫便显露出来。  \n有时，就在这清晰的觉察中，\
  \  \n会有一丝松动悄然发生。"
