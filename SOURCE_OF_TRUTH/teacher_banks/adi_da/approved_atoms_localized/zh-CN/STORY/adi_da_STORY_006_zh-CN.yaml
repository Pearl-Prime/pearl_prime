body: "一位学生害怕死亡。阿迪·达对他说：“你时刻都在死去。每一次呼吸，都是死亡。  \n每一刻，那个曾经的你都已消逝。  \n这是你无法逃脱的规律：自我不断被释放，又不断新生。\
  \  \n你紧抓着形相不放，但光明本身无形无相。  \n它先于身体而存在，也将在身体消亡后继续存在。  \n死亡并非你所恐惧的中断，  \n而是你一生都在收缩、紧缩的最终释放。”"
