body: 一位学员描述了一个突破性时刻：收缩感首次清晰呈现为一种主动选择。阿迪·达说：“是的。现在你能看清，每一刻你都在主动选择收缩。收缩并非被动发生在你身上，而是你主动做出的行为。这种觉察本身，就是释放的第一步。但切勿将这种觉察当作一条修行路径。许多人会执着于对这一机制的洞察，并借此获得灵性优越感。须知，机制只是机制而已。真正重要的是那个光明自体——那个能照见机制的觉性。”
