body: "詹姆斯静坐无声，感受光明之力自然运作。  \n它并非作用于他，而是借由他自身而行动。  \n心境悄然转变：从“我在修习”，变为“光明正在修习”。  \n\
  他的胸腔自然舒展，呼吸变得自主顺畅。  \n一旦停止刻意调控，臣服便即刻完成。  \n多年来，他一直以为必须主动创造神圣降临的条件；  \n如今他明白，唯一阻碍它的，正是自己对“神圣该以何种方式显现”的紧缩执念。\
  \  \n松开吧。  \n光明，只透过那不再抗拒之人而行动。"
