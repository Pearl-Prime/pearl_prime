body: "加布里埃尔感受到自己的愤怒，却看见它被爱包裹着。  \n他因害怕失去心爱之人，而本能地收紧身心。  \n这愤怒，正是收紧时发出的声音。  \n\n当他看清这一点，内在悄然转变。\
  \  \n“光明”向他显现：本就一体不二，何来失去？  \n恐惧真实存在，  \n但分离从未真实。  \n\n他的胸口舒展开来。  \n愤怒自然消散——  \n\
  并非压抑，而是被照见：  \n它只是多余的防护，  \n用来抵御一种在“光明”境界中根本不可能发生的失去。"
