body: "托马斯注视着自己的念头，如同注视天上的云朵。  \n有人告诉他，他应该改变这些念头。  \n但“光明”并不要求念头被改变，  \n只要求他认出：自己并非这些念头。\
  \  \n\n他的整个身体一直紧绷着，  \n仿佛只要管住头脑，就能得救。  \n\n当他看清“我并非念头”时，  \n中间便自然出现一道空隙。  \n在这空隙里，紧缩悄然松开。\
  \  \n他一直攥得太紧了。  \n那么，如果只是静静地看着呢？"
