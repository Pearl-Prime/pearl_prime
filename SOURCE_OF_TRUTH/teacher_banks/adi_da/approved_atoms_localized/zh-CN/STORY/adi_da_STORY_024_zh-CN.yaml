body: "尼古拉斯觉察到自己的表现型模式。  \n他习惯性地收紧身体，只为显得有用，只为被人需要。  \n一旦停止表现，他就觉得自己一无是处。  \n“光明”让他看清：这并非爱，而是一种生存策略。\
  \  \n他早年所体验的爱，是有条件的。  \n于是他学会用努力去换取爱。  \n如今，他的整个身体都紧绷着，只为成为非凡之人。  \n看见这一模式，便是第一个松动的契机。\
  \  \n这种紧缩不再主宰他。  \n他能感受到它，并选择别的可能。"
