body: "当阿德琳放下“必须正确”的执念，双肩便自然放松下来。  \n她长久以来紧绷着身体，仿佛自己的观点维系着生命。  \n犯错，对她而言就像坠落。  \n\
  但真正托住她的，是那光明。  \n当她松开对“正确”的紧抓，光明便清晰显现。  \n双手舒展，呼吸加深。  \n此刻她终于明白：“正确”不过是盔甲。  \n而光明无需盔甲——\
  \  \n它需要的，是一具懂得放手的身体。"
