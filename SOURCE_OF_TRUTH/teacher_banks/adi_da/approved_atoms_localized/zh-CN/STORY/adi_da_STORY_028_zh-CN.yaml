body: "马特奥祈祷时，整个身体都会发生变化。  \n他肩头、脖颈和下背部长久以来的紧绷感，渐渐松开了。  \n这并非因为祈祷能“修复”什么，  \n而是因为在虔敬的姿态中，他停止了收缩。\
  \  \n他允许自己去承接。  \n双手自然张开，呼吸变得悠长，腹部逐渐柔软。  \n光明并不需要一个完美的身体，  \n它只需要一个愿意舒展的身体——  \n\
  向着神性的方向，徐徐舒展。"
