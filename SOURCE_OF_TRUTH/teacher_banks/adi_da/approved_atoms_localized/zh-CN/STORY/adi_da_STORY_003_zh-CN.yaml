body: "一名学生静坐冥想，却只感到麻木。  \n他将此告诉阿迪·达，老师说：  \n“这种麻木是一种应对策略。你的身体曾学会通过关闭感知来保护你，免受难以承受的感受侵袭。这是生命体的智慧。\
  \  \n但如今，这份保护已变成牢笼。  \n请允许自己去感受身体对光明的反应。  \n感受，是认知的第一道门槛。”"
