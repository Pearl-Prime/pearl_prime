body: '一位学生陷入绝望：“我试过一切方法，却毫无效果。紧缩感反而越来越深。”


  阿迪·达的面容柔和下来：“你已抵达机制自我显现之处。‘尝试’本身，就是这机制。努力只会加深分离。这恰恰是完美的——此刻你终于看清：‘自我’无法解决‘自我’。光明并非那个紧缩的‘自我’所能抓取之物；它正是在抓取停止时，所剩下的那个本然。绝望，正是
  surrender 的入口。你已站在门槛之上，请勿退转。”'
