body: "当拉斐尔向光明敞开时，他的下颌放松了。  \n小腹自然舒展。  \n自童年起便盘踞在太阳神经丛的紧绷感，开始消融。  \n不是靠更用力地坚持，而是通过松放。\
  \  \n他的整个身体，曾是一个盛满虔诚的容器——紧得成了牢笼。  \n臣服，意味着让高墙倾塌。  \n意味着真切感受自己的渺小，与光明的浩瀚。  \n他的神经系统渐渐明白：它一直紧握的东西，此刻可以安然松开了。"
