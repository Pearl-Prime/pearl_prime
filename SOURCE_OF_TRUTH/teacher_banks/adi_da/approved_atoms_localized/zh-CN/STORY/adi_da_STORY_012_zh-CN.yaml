body: "马库斯注视着镜中的自己，注意到嘴角的紧绷。  \n有人曾告诉他：要多微笑，要保持积极。  \n但“光明”并不需要表面的光鲜亮丽。  \n那紧绷本身，就是讯息。\
  \  \n他的面容，承载着每一次为迎合他人期待而压抑自我的故事。  \n“光明”看见了这份压抑。  \n这份看见，便是开始。"
