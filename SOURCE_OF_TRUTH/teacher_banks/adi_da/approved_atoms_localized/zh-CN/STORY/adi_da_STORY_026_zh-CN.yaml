body: "以撒步入自己内心的神殿，  \n发现它一直空着。  \n并非没有光明，  \n而是他始终站在门前。  \n\n他的整个身体开始移动，  \n向旁退开。\
  \  \n涌入的，并非出自他的作为，  \n而是光明奔涌而入。  \n\n他的神经系统在刹那间领悟了——  \n多年修行也未能教会它的真相：  \n那长久束缚他的紧缩，\
  \  \n本无必要，甚至并不真实。  \n它就此消融。  \n\n他立于澄明之中，  \n成为光明透射而出的透明本身。"
