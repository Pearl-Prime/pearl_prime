atom_id: adi_da_SCENE_03
body: "食物摆在你的餐盘上。  \n周围人声隐约传来。  \n你身处人群之中。  \n身体此刻就在这里。  \n而另一些东西，却不在这里。  \n你拿起叉子。\
  \  \n食物尝起来索然无味。  \n你咀嚼，然后咽下。  \n附近有人笑了。  \n你却听不见。  \n你安静地吃着。  \n继续缓慢进食。  \n你始终高度临在。\
  \  \n这顿饭渐渐沉淀下来。  \n房间一片宁静。  \n你的胸口缓缓打开。"
