atom_id: adi_da_SCENE_06
body: "夜色弥漫整个房间。  \n你静卧于黑暗之中。  \n天花板隐没不见。  \n身体一动不动。  \n思绪却永不停歇。  \n时间缓缓流逝。  \n黎明迟迟未至。\
  \  \n你依然静卧不动。  \n黑暗浓重而彻底。  \n你缓慢呼吸。  \n等待清晨来临。  \n可晨光始终不现。  \n你继续留在黑暗里。  \n心悄然敞开。\
  \  \n夜色愈发深沉。  \n心神归于宁静。  \n你完整地呼吸。"
