atom_id: adi_da_SCENE_04
body: "你坐在坐垫上。  \n大厅非常安静。  \n其他人围坐在你身边。  \n呼吸自然进出。  \n内心却喧闹不已。  \n身体姿态渐渐内缩、塌陷。  \n\
  你重新挺直脊背。  \n它又再次塌陷。  \n钟声尚未响起。  \n你全然安住于此。  \n不离开。  \n默然静坐。  \n呼吸缓缓。  \n心渐渐沉静下来。\
  \  \n寂静愈发深邃。"
