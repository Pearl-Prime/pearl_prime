atom_id: adi_da_EXERCISE_010
body: "留意此刻你正在拒绝什么。  \n你是否在拒绝感受？  \n拒绝另一个人？  \n拒绝自己的界限？  \n将觉知带入这份拒绝。  \n不必强迫自己接纳。\
  \  \n去感受“拒绝”本身。  \n这是身体做出的一种姿态。  \n去理解它。"
