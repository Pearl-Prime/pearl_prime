atom_id: adi_da_EXERCISE_000
body: "端坐，保持脊柱挺直。  \n自然呼吸。  \n留意身体哪些部位正在收紧——胸口、喉咙、腹部。  \n不要调整呼吸。  \n只是如实地观察这种收紧，不抗拒、不干预。\
  \  \n这是“光明”在觉察它自身。  \n持续练习五分钟。  \n当身体准备好了，收紧感会自然转变。"
