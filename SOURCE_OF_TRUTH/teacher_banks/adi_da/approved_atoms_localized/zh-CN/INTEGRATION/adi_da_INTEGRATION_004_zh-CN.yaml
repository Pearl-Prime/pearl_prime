atom_id: adi_da_INTEGRATION_004
integration_mode: someone_else
body: "你的界限崩塌了，  \n因为你相信对方的感受比你自身的紧缩更真实。  \n你感受到他们身体绷紧，  \n便主动放松自己，去承接那份冲击。  \n这并非爱，\
  \  \n而是融合，  \n是消融。  \n\n真正的关系，  \n要求你内在的“光明”保持稳定，  \n也要求对方内在的“光明”同样稳定。  \n两个源头，而非一个。\
  \  \n\n当你放弃自己的紧缩，只为抚平他们的不适，  \n你就在教他们：  \n他们的感受可以抹去你。  \n你也同时在告诉自己：  \n你的现实，不如他们的真切。\
  \  \n\n界限，  \n就是你持续安住于自己与“光明”的关系之中——  \n不僵硬，  \n不冷漠，  \n却清晰分明。  \n\n对方，也安住于他们自己的关系之中。\
  \  \n两种独立的觉知相遇，  \n彼此映照，却不相融。"
