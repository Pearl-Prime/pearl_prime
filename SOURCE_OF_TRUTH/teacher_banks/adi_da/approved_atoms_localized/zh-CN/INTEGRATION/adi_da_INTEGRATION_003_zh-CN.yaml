body: "悲伤，是身体对真实之爱的记忆——  \n当关系未能存续于你的退缩之中。  \n\n你曾深爱。  \n光明本性始终流动不息。  \n但你收回了自己， \
  \ \n你自我保护，  \n你关闭心门。  \n\n爱并未终结，  \n只是你撤回了对爱的允许。  \n这，就是悲伤。  \n它并非失去对方，  \n而是失去你亲手收回的那份允许。\
  \  \n\n此刻真正的课题，  \n不是你是否还能再次去爱——  \n光明本性从不停止去爱；  \n真正的课题是：  \n当恐惧升起时，你能否依然敞开？  \n\
  当身体颤抖时，你能否仍留在关系之中？  \n\n悲伤一遍又一遍地教你这个功课。  \n悲伤，正是你的老师。  \n\n你可以保持敞开。  \n你可以允许自己被爱。\
  \  \n爱本身从未改变，  \n改变的，是你对爱的敞开程度。"
