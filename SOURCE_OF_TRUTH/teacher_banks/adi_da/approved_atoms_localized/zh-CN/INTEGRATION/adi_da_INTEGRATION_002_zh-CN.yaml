integration_mode: body_landed
body: "倦怠，是身体向你发出的报告：你已长久地试图凭一己之力创造自我。  \n这种耗竭并非软弱，而是准确的信号。  \n生命体无法持续承担“自我创造”的重负——它本就不是为此而设计的。\
  \  \n\n“光明”不会倦怠，因为它从不试图成为任何东西。  \n而你一直在努力成为。  \n这努力本身，就是全部的工作；  \n也正是这唯一的工作，让你精疲力竭。\
  \  \n\n不是要少做些事，  \n而是彻底停止这种“努力”。  \n松开那个根深蒂固的信念：你必须靠自己来生成自己。  \n\n当双肩自然垂落，  \n当下颌渐渐放松，\
  \  \n当呼吸重新沉入腹部——  \n那一刻，身体便认出了它本来的真相。  \n\n“光明”早已在此，自在流动，  \n无需你付出丝毫 effort。"
