atom_id: adi_da_INTEGRATION_005
integration_mode: still_here
body: "抑郁，是心灵向自身关闭的状态。  \n不是悲伤，也不是失去。  \n而是真正的关闭，  \n真正的封锁。  \n\n光明无法经由你抵达自身，  \n\
  因为你已说服身体持续紧缩。  \n这种紧缩本意是自我保护，  \n却最终成了牢笼。  \n\n你所感受到的黑暗，  \n并非光明的缺席，  \n而是你尚未允许光明流经自身。\
  \  \n这份许可，存在于身体之中，  \n存在于呼吸之间，  \n存在于你愿让光明再次搏动的意愿里。  \n\n你本就身在光明之中。  \n唯一需要做的， \
  \ \n只是松开双臂，  \n让光明穿过。  \n感受肋骨舒展，  \n迎接崭新的可能。  \n让光明毫无阻碍地流经你的存在。"
