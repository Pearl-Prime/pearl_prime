atom_id: adi_da_INTEGRATION_001
integration_mode: cost_visible
body: "当你相信自己与光明分离时，自我价值便崩塌了。  \n这就是代价——不是比喻，而是真实的耗损。  \n当身体以为自己孤身一人，它就必须凭空创造自身价值。\
  \  \n这份努力巨大无比，失败却注定发生。  \n分离，正是“不值得感”运作的机制。  \n今天，你已觉察到这种信念在胸口收紧。  \n“不值得感”并非需要解决的问题，而是一则讯息。\
  \  \n它清楚告诉你：你内心仍确信自己未与终极实相相连。  \n正是这份确信，驱动着你全身的紧缩。  \n请清晰看见这份代价。  \n请看清：不知自己被万物本源所爱，究竟付出了什么。\
  \  \n这“不值得感”，正披着一副你的身体早已熟稔于心的形貌。"
