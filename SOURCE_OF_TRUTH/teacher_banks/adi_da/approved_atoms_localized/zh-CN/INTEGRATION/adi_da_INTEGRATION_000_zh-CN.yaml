body: "此刻，收缩清晰可见。  \n它并非失败，而是你过往关系模式的印记。  \n身体收紧，是因为它学会了抵御冲击。  \n每次你向他人靠近，真实的相遇却始终未能发生。\
  \  \n于是身体收缩，以避免“未抵达”带来的冲击。  \n这一模式由来已久，真实存在。  \n你此刻觉察到的，正是收缩所驻留的确切位置。  \n光明本身并未收缩。\
  \  \n你正置身其中。  \n收缩存在于你与他人之间的场域之中。  \n那里，正是需要工作的所在。  \n那里，也正是你已然身处之地。  \n那里，正是你可以重新开始的确切位置。\
  \  \n光明就在此处，穿透收缩，当下显现。"
