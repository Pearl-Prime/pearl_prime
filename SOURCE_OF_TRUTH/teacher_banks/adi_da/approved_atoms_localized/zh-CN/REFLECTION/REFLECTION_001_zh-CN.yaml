atom_id: adi_da_REFLECTION_001
body: "自我价值并非源于你的思虑，  \n而源于你对超越自身之物的虔诚奉献。  \n请用心去感受它——不是概念，而是真实给予时的内在触感。\n\n你曾被教导：你的价值来自成就与表现；\
  \  \n你曾被教导：爱必须通过足够的付出、卓越的表现、充分的证明才能赢得。  \n这种教导如一道伤口渗入你生命，继而演变为一种生存方式。  \n你不断追逐更多、更好、更快，\
  \  \n以为每一次成功终将平息那个根本疑问：我是否真的重要？\n\n光明在你尚未行动之前，便已认出你。  \n你无法“赢得”这份认出，  \n因为你本就拥有它。\
  \  \n你能做的，是停下那些阻碍你感知它的奔忙；  \n你能做的，是觉察自己躲藏之处——  \n为何回避自身的光芒？因为光芒让你感到危险、暴露、孤独。\n\n\
  当你真正安住于对超越之物的虔诚中，  \n你的价值，便不再取决于你生产了什么。"
