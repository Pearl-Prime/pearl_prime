atom_id: adi_da_REFLECTION_005
body: "抑郁不是悲伤。  \n抑郁是神经系统对长期无力感的反应。  \n留意你四肢的沉重与空乏，  \n留意前行仿佛变得不可能。\n\n你很早就学会了：  \n\
  你的偏好无关紧要，  \n你的声音无人听见，  \n反抗只会招致更多伤害。  \n于是，你的神经系统将“收缩”习以为常——  \n当成面对无法靠外在行动改变结果的情境时，\
  \  \n最“恰当”的回应。  \n即便环境已然改变，这种收缩仍持续存在。  \n这套神经架构，早已超出了它本该停摆的时刻。\n\n我见过太多这样的模式：  \n\
  生命停止尝试，因为尝试曾一次次落空；  \n而“徒劳”的神经通路，如今已自动激活。  \n这种收缩，渐渐变成了一种恍惚状态。\n\n光明本身，并不要求你付出努力去证明自己的价值，\
  \  \n也不要求你改变自己存在的根本意义。  \n但它确会悄然转向更新——  \n当你通过微小却真实的行动，  \n一点点重建对自己能动性的感知；  \n当你用这些行动，向自己的神经系统反复证明：\
  \  \n你的举动，依然重要。"
