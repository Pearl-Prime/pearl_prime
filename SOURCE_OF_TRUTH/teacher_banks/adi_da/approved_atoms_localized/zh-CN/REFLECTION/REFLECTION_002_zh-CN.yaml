atom_id: adi_da_REFLECTION_002
body: "倦怠不是疲劳。  \n倦怠是身体拒绝再继续说谎。  \n你的疲惫，正用清晰的语言诉说：你亲手搭建的生命结构，已不再适配你此刻真实的生活。\n\n留意你仍在何处对抗能量与休息的自然节律；\
  \  \n留意你何时嘴上说着“好”，而身体早已在说“不”；  \n留意你何时为了想象中的责任，牺牲了眼前真实的需求。  \n这些并非个人的失败，  \n而是特定条件下形成的习惯模式——而那些条件，或许早已不复存在。\n\
  \n我见过太多人，耗尽自己，只为服务一个内化已久的指令；  \n那指令早已脱离真实的外界需求，  \n它变得自主运行，自我延续。  \n你还在追逐那些可能早已沉默的声音所给予的认可。\n\
  \n光明召唤你回归修复——  \n这修复，不单靠休息，  \n更需一种彻底的诚实：  \n诚实地分辨——  \n你此生真正要做的事，  \n与你脑海中回荡不息、强加于你的“必须做的事”，\
  \  \n究竟有何不同。"
