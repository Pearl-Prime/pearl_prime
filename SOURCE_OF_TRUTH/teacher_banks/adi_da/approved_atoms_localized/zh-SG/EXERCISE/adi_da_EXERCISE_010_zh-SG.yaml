atom_id: adi_da_EXERCISE_010
body: "留意此刻你正在拒絕什麼。  \n你是否在拒絕感受？  \n拒絕他人？  \n還是拒絕自己的界限？  \n將覺知帶到這份拒絕上。  \n不必強迫自己接受。\
  \  \n去感受「拒絕」本身。  \n這是身體的一種自然反應。  \n理解它。"
