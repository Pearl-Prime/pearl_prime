body: "你的焦慮存在於收縮之中。  \n我觀察到它出現在肩膀、停留在肺部頂端的呼吸，以及腹部緊握的拳頭。  \n請留意，此刻你的身體在哪裡緊繃。\n\n這種收縮不是錯誤。\
  \  \n它是你最深層的智慧，試圖在面對瓦解時，將自己維繫完整。  \n你曾學到：放鬆，就等於崩解。  \n你也曾學到：保持警覺，才能保全自己。\n\n我見過成千上萬人，都帶著同樣的身體架構。\
  \  \n這模式說：「只要我夠緊繃，就不會有意外衝破防線；只要我持續監控，就能掌控一切。」  \n但緊繃本身，就是一種瓦解。  \n持續監控，終將耗盡那監控的力量。\n\
  \n在你焦慮背後的光明，始終朝向你而來。  \n它不叫你放鬆。  \n它邀請你去覺察：你正在防護什麼？  \n而這份防護，是否仍契合你此刻真實的生活條件？"
