atom_id: adi_da_REFLECTION_002
body: "倦怠不是疲勞。  \n倦怠是身體拒絕再說謊。  \n你的耗竭，正用清晰的語言說話：你過去搭建的生命架構，已不再契合你當下的生活。\n\n留意你仍在哪裡違背能量與休息的自然節奏。\
  \  \n留意你何時嘴上說「好」，身體卻在說「不」。  \n留意你何時為想像中的責任，犧牲了真實的需要。  \n這些不是個人的失敗，  \n而是特定條件下形成的習慣模式——而那些條件，或許早已不復存在。\n\
  \n我見過許多人，耗盡自己，只為服從內化於心的一種要求；  \n那要求，早已脫離現實的外在必要性。  \n它變得自主運作，自我驅動。  \n你仍在追逐那些可能早已沉默的聲音所給予的認可。\n\
  \n「光明」召喚你走向修復——  \n這修復，不僅靠休息，更需徹底誠實：  \n誠實面對你此生真正要做的事，  \n而非你腦中迴響不斷、強迫你必須做的事。"
