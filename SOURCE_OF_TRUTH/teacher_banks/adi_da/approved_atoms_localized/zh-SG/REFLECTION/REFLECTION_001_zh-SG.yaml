atom_id: adi_da_REFLECTION_001
body: "自我價值並非來自思考，  \n而是源自對超越自我的事物的奉獻。  \n請用心感受這份奉獻——不是概念，而是真實的給予感。\n\n你曾被教導：你的價值來自成就與表現；\
  \  \n你曾被教導：愛必須靠足夠的付出、足夠的卓越、足夠的證明才能換來。  \n這套教導像一道傷口，慢慢變成你內在的運作模式。  \n你不停追求更多、更好、更快，\
  \  \n以為每一次成功，終將平息那個根本疑問：「我究竟重不重要？」\n\n光明早在你有所表現之前，就已認出你。  \n這份認出無法靠努力贏得，因為它本就屬於你。\
  \  \n你能做的，是停下那些阻擋你感受它的動作；  \n你能做的，是察覺自己何時躲開自己的光——  \n只因那光芒讓你感到危險、赤裸、孤單。\n\n當你真誠地安住於對超越之物的奉獻，\
  \  \n你的價值，便不再繫於你的產出。"
