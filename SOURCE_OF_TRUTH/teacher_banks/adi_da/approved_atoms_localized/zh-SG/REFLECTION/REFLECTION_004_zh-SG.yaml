atom_id: adi_da_REFLECTION_004
body: "你在爱面前，界线消融了。  \n你曾以为说“不”，就可能被抛弃，  \n于是你成了那个不断弯折、承受、迁就的人。  \n感受一下，做出这个选择时，身体的肌肉如何紧绷。\n\
  \n界线不是高墙。  \n界线是让真实相遇成为可能的结构。  \n界线在说：“我在这里，而我不是你。”  \n界线在说：“我的能量流到此处，也止于彼处。”  \n\
  若失去这份清晰，你所称的“爱”，便渐渐变成义务与怨气。\n\n我所观察到的、缺乏界线之人的收缩感，  \n不同于焦虑。  \n那是持续用力维系一个已变得多孔、模糊的自我——\
  \  \n一种永不停歇的耗竭。  \n光明，只认得清晰的分别；  \n清晰，正是它的本性。\n\n你的界线，从来不是自私。  \n你的清晰，让他人得以真正遇见真实的你，\
  \  \n而非你为逃避被抛弃而筑起的那套防御机制。"
