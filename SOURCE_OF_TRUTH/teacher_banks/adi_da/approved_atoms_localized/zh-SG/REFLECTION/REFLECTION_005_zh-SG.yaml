atom_id: adi_da_REFLECTION_005
body: "抑郁不是悲伤。  \n抑郁是神经系统对长期无力感的反应。  \n留意你四肢的沉重与空虚，  \n留意向前行动时那种无法动弹的感觉。\n\n你很早就学会：\
  \  \n你的偏好不重要，  \n你的声音无人听见，  \n反抗只会让伤害加剧。  \n于是，你的神经系统学会——  \n当外在行动无法改变结果时，  \n收缩，才是“恰当”的回应。\
  \  \n即使处境已改变，这种收缩仍持续着。  \n这套神经机制，早已超出它原本需要运作的时刻。\n\n我见过这个模式无数次。  \n生命体停止尝试，  \n\
  因为尝试曾变得徒劳；  \n而“徒劳”的神经通路，如今已自动启动。  \n这种收缩，渐渐变成一种恍惚状态。\n\n光明本身，  \n不需要你费力去证明自己的价值，\
  \  \n也不需要你改变自己存在的根本意义。  \n但当你透过微小的行动，  \n逐步重建“我能影响现实”的感受，  \n你的神经系统便会重新确认：  \n你的行动，依然重要。\
  \  \n此时，光明便自然朝向更新与复苏。"
