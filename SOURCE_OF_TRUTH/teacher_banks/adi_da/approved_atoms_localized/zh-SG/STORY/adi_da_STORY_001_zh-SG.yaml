body: "一名學生坦承：「我的尋求從不停止。我從一位老師轉向另一位老師，從一種修習轉向另一種修習。」  \n阿迪達點頭說：「這尋求本身，就是收縮。你正逃避那本已存在的光明。\
  \  \n本初合一，不是待你達成的目標；它正是此刻覺知所立足的根本。  \n停止朝向一個缺席的神而尋求。安住於那早已遍滿一切的光明之中。」"
