body: "一名学生害怕死亡。阿迪·达告诉他：“你时刻都在死亡。每一次呼吸，都是一次死亡。  \n每一刻，过去的你都已消逝。这是你无法逃脱的规律：自我不断被释放，也不断在变化。\
  \  \n你紧抓着形相不放，但光明本身却无形无相。它先于身体而存在，也不依赖身体而延续。  \n死亡并非你所恐惧的中断，而是你一生以来所有收缩状态的最终释放。”"
