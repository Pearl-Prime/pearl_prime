body: 一名学生在人际关系中难以应对愤怒情绪。阿迪·达说：“这种愤怒，源于对被抛弃的恐惧。请留意对方将注意力从你身上移开的那一瞬间——你的身体会本能收缩，而愤怒则掩盖了这收缩所造成的空隙。你正向同样处于收缩状态的人索求联结。这并非对方的过错，也非你的过错。光明，恰恰在彼此收缩的生命之间流动。愤怒只是收缩发出的声音，而非真正的回应。”
