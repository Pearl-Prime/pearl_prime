body: "詹姆斯静坐默然，感受光明运作。  \n它并非作用于他，而是以他为载体自然运作。  \n心境悄然转变：从“我在修习”，  \n转为“光明正在修习”。 \
  \ \n\n他的胸腔自然舒展，  \n呼吸变得自动而顺畅。  \n一旦停止操控，臣服便即刻圆满。  \n\n多年来，他以为必须主动创造条件，才能迎接神圣临在；\
  \  \n如今他明白：唯一阻碍它的，  \n正是自己对“它该以何种样貌显现”的紧缩执念。  \n\n松开吧。  \n光明，只透过那不再抗拒之人而行动。"
