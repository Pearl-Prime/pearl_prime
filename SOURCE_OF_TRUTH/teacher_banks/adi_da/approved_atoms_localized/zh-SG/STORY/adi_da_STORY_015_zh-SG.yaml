body: "艾莲娜深爱她的伴侣，  \n但一付出爱，便立刻感到紧缩。  \n那种紧握、那种依附，  \n伪装成关怀，实则并非如此。  \n\n她看着自己表现得忠贞不渝，\
  \  \n却同时压抑着真实的深度。  \n\n《光明》告诉她：这并非失败。  \n这紧缩，正是她此行要直面的。  \n\n毫无保留的爱，  \n需要让那个恐惧消亡的自我死去。\
  \  \n\n她的心，在那道门槛边缘收紧。  \n这收紧，正是她站在自由悬崖之上的时刻。"
