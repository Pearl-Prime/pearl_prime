body: "一名學生靜坐冥想，卻只感到麻木。  \n他向阿迪達老師提起這感受，老師說：  \n「這麻木是一種自我保護的策略。  \n你的身體學會了關閉感知，以躲避難以承受的感受。\
  \  \n這是身體本能的智慧。  \n但如今，這保護已變成牢籠。  \n請允許自己去感受身體對光明的反應。  \n感受，是認知的第一道門檻。」"
