body: "托马斯静静观察自己的念头，就像看着天上的云朵。  \n有人告诉他，他该改变这些念头。  \n但“光明”并不需要念头被改变，  \n它只需要他明白：他并不是自己的念头。\
  \  \n\n他的整个身体一直紧绷着，  \n仿佛只要管住头脑，就能救自己。  \n\n当他看清“我并非念头”这一刻，  \n中间便自然出现一道空隙。  \n\
  在这空隙里，紧缩感松开了。  \n他一直绷得太紧了。  \n如果，他只是单纯地看呢？"
