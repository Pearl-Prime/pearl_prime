body: "当拉斐尔向光明敞开时，他的下颌放松了。  \n腹部自然舒展。  \n自童年起便盘踞在他太阳神经丛的紧绷感，开始消融。  \n不是靠更用力地坚持，而是透过松放。\
  \  \n他的整个身体，曾是一个盛载虔诚的容器——紧到成了牢笼。  \n臣服，是让高墙倾塌。  \n是感受自己多么渺小，而光明又多么浩瀚。  \n他的神经系统渐渐明白：它一直紧抓不放的东西，现在可以安全地放下了。"
