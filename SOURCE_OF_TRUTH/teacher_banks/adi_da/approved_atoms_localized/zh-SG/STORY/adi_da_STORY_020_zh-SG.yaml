body: "加布里埃尔感受到自己的愤怒，却看见这愤怒被爱包裹着。  \n他因害怕失去心爱的人，而本能地收紧自己。  \n愤怒，正是这收紧发出的声音。  \n当他看清这一点，内在便悄然转变。\
  \  \n光明向他揭示：本就一体不二，何来失去？  \n恐惧是真实的，  \n但分离从未真实存在。  \n他的胸口缓缓舒展，  \n愤怒自然消散——  \n并非压抑，而是被照见：\
  \  \n原来这是多余的防护，  \n用来抵御一种在光明境界中根本不可能发生的“失去”。"
