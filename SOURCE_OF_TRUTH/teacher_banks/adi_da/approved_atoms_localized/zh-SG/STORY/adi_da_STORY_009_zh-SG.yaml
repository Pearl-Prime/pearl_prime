body: 一名学生分享了一个突破性时刻：紧缩感首次清晰呈现为一种主动选择。阿迪·达说：“没错。现在你已能看清，自己在每一刻都在主动选择紧缩。紧缩并非发生在你身上，而是你所做出的动作。这种觉察本身，就是释放的第一步。但切勿将此觉察当作一条修行路径。许多人会执着于看清这个机制的过程，并借此感觉自己的灵性已更上一层。然而，这机制终究只是机制而已。真正重要的是——那个明亮、清醒、能看见它的‘本然’。”
