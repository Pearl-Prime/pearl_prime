body: 一名学生感到被自己心智的运作机制困住了。阿迪·达观察道：“你现在看见这机制了。这是进步。自我是一套机械系统，依其编程而反应。这编程，就是你每次感到不安全、不被看见、被遗弃时，累积起来的收缩。这个身心，正是那收缩的证明。但你并非这机制本身。你是那明亮的觉知，是观察它的主体。这机制无法靠强力停止，只能透过临在而转化。”
