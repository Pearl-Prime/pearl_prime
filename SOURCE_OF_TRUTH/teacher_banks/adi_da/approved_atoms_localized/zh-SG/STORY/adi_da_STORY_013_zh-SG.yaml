body: "当索菲亚臣服于虔敬时，她的双肩自然下垂。  \n并非因为有人告诉她要放松。  \n身体能分辨出：强迫的松弛，与真正释放的松弛，有何不同。  \n她的呼吸变得深长。\
  \  \n双手在膝上渐渐柔软。  \n光明并不需要她紧绷的努力。  \n真正的修习，正在于放下。  \n她感受到自己曾耗费多少能量，去对抗宇宙。  \n而停止对抗，原来如此简单。"
