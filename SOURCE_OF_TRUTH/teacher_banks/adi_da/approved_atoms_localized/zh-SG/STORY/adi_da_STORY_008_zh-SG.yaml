body: "一名学生陷入绝望：“我试过所有方法，却毫无效果。紧缩感反而越来越深。”  \n阿迪·达的脸庞柔和下来：“你已抵达机制自我显现之处。  \n‘尝试’本身，就是这机制。\
  \  \n努力只会加深分离。这正是最完美的时刻。  \n此刻你终于看清：‘自我’无法解决‘自我’。  \n光明并非紧缩的自我所能抓取之物；  \n它是在抓取止息时，自然呈现的本来面目。\
  \  \n绝望，正是臣服的入口。  \n你已站在门槛之上——请勿退转。”"
