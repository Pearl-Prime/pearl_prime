body: "一名學生走近阿迪達，說：「我已修行多年，卻感覺不到任何不同。」  \n阿迪達目光沉靜。「你早已感覺不同了。光明早已在作用。你所謂的修行，並非朝向某種尚未存在的目標而努力；而是你本已與神聖合一，如今這份合一正逐漸顯明。你所感受到的收縮，並非失敗，而是自我正認出自身的局限。」"
