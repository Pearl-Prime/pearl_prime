body: "阿玛拉告别了她曾以为的自己。  \n就在顿悟的刹那，她的整个身份开始收缩。  \n所有建立在“孤立自我”流沙之上的东西，此刻一一显露。  \n她感受到光明——不是在表层之下，而是作为一切的根基。\
  \  \n她花了多年时间，努力成为某个人；  \n如今，她正成为“无名者”。  \n这种消融，既是恐惧，也是自由。  \n她的双手微微颤抖，  \n心扉却敞开到超越极限。\
  \  \n此刻，光明正以光明本身的方式运作——  \n没有中介，也没有“她”横亘其间。"
