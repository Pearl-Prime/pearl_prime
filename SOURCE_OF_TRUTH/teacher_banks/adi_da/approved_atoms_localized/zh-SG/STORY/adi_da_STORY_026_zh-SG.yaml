body: "以撒走入自己內心的聖殿，才發現那裡一直空無一物。  \n不是缺乏光明。  \n而是他一直站在門前，未曾跨入。  \n\n他的整個身體開始移動。  \n\
  他往旁邊讓開。  \n\n湧入的，並非出於他的作為；  \n是光明，自然湧入。  \n\n他的神經系統在一瞬間學會了——  \n多年修行也未能教會它的事。  \n\
  \n那束縛他的收縮，原來根本不必存在，  \n甚至從未真實存在過。  \n它消融了。  \n\n他只是透明的存在，  \n讓光明自在穿透、遍照。"
