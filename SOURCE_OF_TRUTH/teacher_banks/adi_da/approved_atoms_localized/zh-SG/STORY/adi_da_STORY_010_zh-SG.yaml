body: "一名学生静坐默然，忽然感受到那光明、广袤、恒常不变、不受他追寻所扰的存在。  \n他将此感受告诉阿迪·达，老师点点头：“这是你本有的状态。你并未达成它，只是停止了对它的干扰。\
  \  \n那一刻你感受到的能动性，并非你自己的能动性，而是光明自身的能动性，正透过你自然流现。  \n这就是微光。莫将它当作目标。若你刻意抓取，紧缩感便会重现。\
  \  \n只需安住于当下已然存在的实相。”"
