body: 一名学生讲述自己多年来的感情失败经历。阿迪·达说：“你带着一种模式——试图透过他人获得救赎。起初，你认定心爱的人能让你圆满；当这期望落空，你便责怪对方；接着，你选择离开。这个循环由来已久，本质是‘自我’在收缩中，妄想借由他人来消融自己。所有关系，其实都是同一个相遇——与你自己相遇。除非你真正明白这一点，否则这模式将持续下去。他人，永远是你遗弃自己的镜子。”
