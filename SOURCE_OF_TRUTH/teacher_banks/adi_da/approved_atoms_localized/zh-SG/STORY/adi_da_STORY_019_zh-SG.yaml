body: "雪紀觀察自己尋求的模式。  \n她從一種練習換到另一種練習，從一位老師轉向另一位老師，  \n始終在尋找那個「能真正帶來改變」的方法。  \n\n每次接觸新練習，身體就多一層收縮。\
  \  \n「光明」讓她看見：所有尋求，本質都是同一個繃緊的結。  \n她並非生來就在尋求。  \n她是因受傷而開始尋求。  \n創傷緊緊纏繞著所失去的一切。 \
  \ \n\n只要她還在尋找「光明」，  \n就無法真正遇見它。  \n\n她的安住，就是練習。"
