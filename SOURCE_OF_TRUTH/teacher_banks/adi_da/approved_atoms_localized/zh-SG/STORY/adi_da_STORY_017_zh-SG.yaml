body: "莱拉察觉到，自己总在成就周围收紧身体，紧紧抓住它们，仿佛那是自身价值的证明。  \n光明并不需要她的成就。  \n它根本不需要她。  \n这一觉察，悄然裂开一道缝隙。\
  \  \n她一直忙于成为“重要的人”，却忘了——自己本就重要。  \n不是因为做了什么，而是因为本来就是谁。  \n那围绕“成为”的紧绷，终于可以放下了。"
