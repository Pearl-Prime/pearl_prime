body: "尼古拉斯察觉到自己的表现型模式。  \n他紧绷着，只为显得有用、被人需要。  \n一旦停止表现，他就觉得自己一无是处。  \n“光明”让他看清：这并非爱，而是一种生存策略。\
  \  \n他早年所经历的爱，是有条件的。  \n于是他学会用努力去换取爱。  \n如今，他的整个身体都缠绕在“必须卓越”的执念里。  \n看见这个模式，便是第一个松动的契机。\
  \  \n这种紧绷不再主宰他。  \n他能感受它，也能选择别的可能。"
