body: "一名学生问道：“我该如何释放胸口的紧绷感？”  \n阿迪·达直视着他。  \n“这种紧绷，是你对关系的抗拒。  \n每当你除了他人，身体就会收缩。 \
  \ \n那一刻，你便放弃了彼此之间的场域。  \n光明，就存在于‘之间’——存在于真实的相遇之中。  \n释放，只能透过关系发生，而非透过孤立。”"
