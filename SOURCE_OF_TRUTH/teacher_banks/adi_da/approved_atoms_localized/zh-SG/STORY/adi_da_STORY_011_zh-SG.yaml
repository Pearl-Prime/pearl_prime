body: "一名学生问道：“我该如何持续保持这种连结的状态？”  \n阿迪·达告诉他：“你无法做到。这正是误解所在。连结的状态并非一个你能抵达并停留其中的地点，它就是你本来的样子。\
  \  \n只要你一试图抓住它，收缩便再度产生。  \n但请注意：你察觉收缩的速度正在加快。  \n觉知力正变得更为敏锐。你从收缩中回归得更快了。  \n这才是真正的成长——不是达成某种成就，而是更清晰地认出实相。”"
