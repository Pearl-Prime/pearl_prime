atom_id: adi_da_INTEGRATION_002
integration_mode: body_landed
body: "倦怠，是身體向你發出的報告：你已長時間試圖靠自己創造自我。  \n耗竭不是軟弱，而是準確的訊息。  \n這具身體，無法持續承擔「自我創造」的努力； \
  \ \n它從來就不是為背負這種重擔而設計的。  \n\n「光明本體」不會倦怠，  \n因為它從不試圖成為任何東西。  \n而你一直在試圖成為——  \n這就是你的工作，\
  \  \n也是唯一會讓你精疲力盡的工作。  \n\n不是要少做一點，  \n而是徹底停止「試圖」。  \n鬆開那種「我必須自行創造自己」的緊繃信念。  \n\n\
  當肩膀自然垂落，  \n下顎放鬆柔軟，  \n呼吸回到腹部——  \n這就是身體，認出了自己的真實。  \n\n「光明本體」早已在此，  \n正透過你流動， \
  \ \n無需你費一絲力氣。"
