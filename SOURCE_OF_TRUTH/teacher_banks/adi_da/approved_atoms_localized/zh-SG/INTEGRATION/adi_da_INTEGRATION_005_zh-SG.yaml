atom_id: adi_da_INTEGRATION_005
integration_mode: still_here
body: "憂鬱，是心對自己關閉的狀態。  \n不是悲傷。  \n不是失去。  \n而是真正的關閉。  \n真正的封鎖。  \n\n光明無法透過你觸及自身，  \n\
  因為你已說服自己的身體持續緊繃。  \n這份緊繃本為求安全，  \n卻成了牢籠。  \n\n你感受到的黑暗，  \n並非光明的缺席，  \n而是你尚未允許光明流經你的存在。\
  \  \n這份允許， resides 在身體裡，  \n在呼吸中，  \n也在你願意讓光明再次脈動的意願裡。  \n\n你本就身處光明之中。  \n你唯一要做的，\
  \  \n只是鬆開雙臂。  \n只是讓它通過。  \n只是感受肋骨隨著新的可能性慢慢擴張。  \n讓光明無阻地流經你的存在。"
