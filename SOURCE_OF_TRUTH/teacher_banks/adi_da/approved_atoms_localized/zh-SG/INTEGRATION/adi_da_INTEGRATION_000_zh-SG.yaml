atom_id: adi_da_INTEGRATION_000
integration_mode: still_here
body: "收缩此刻清晰可见。  \n它并非失败，而是你过往处理关系的方式所留下的印记。  \n身体收紧，是因为它学会了防范冲击。  \n每次你向他人靠近，真实的相遇却始终未能发生；\
  \  \n于是身体便收缩，以避免“未抵达”所带来的冲击。  \n这个模式由来已久，且真实存在。  \n你此刻觉察到的，正是收缩所驻留的确切位置。  \n光明本身并未收缩——你正置身其中。\
  \  \n收缩存在于你与他人之间的场域里。  \n那里，正是需要工作的所在；  \n那里，也正是你此刻已然身处之地。  \n那里，正是你可以重新开始的确切位置。\
  \  \n光明就在此处，在收缩之中，依然临在。"
