atom_id: adi_da_INTEGRATION_001
integration_mode: cost_visible
body: "當你相信自己與光明分離時，自我價值便崩塌了。  \n這就是代價——不是比喻，而是真實的耗損。  \n\n當身體以為自己孤身一人，它就必須憑空創造自身的價值。\
  \  \n這份努力極其巨大，而失敗則必然發生。  \n分離，正是「不值得感」運作的機制。  \n\n今天，你已察覺那信念在胸口收緊。  \n「不值得感」不是一個需要解決的問題，\
  \  \n而是一則訊息——  \n它清楚告訴你：你仍深信自己未與那至高本體相連。  \n正是這份確信，驅動著你全身的收縮。  \n\n請看清這份代價。  \n\
  看清「不知自己被萬有之源所愛」，究竟讓你付出了什麼。  \n\n這份「不值得感」，正穿著你身體再熟悉不過的形狀。"
