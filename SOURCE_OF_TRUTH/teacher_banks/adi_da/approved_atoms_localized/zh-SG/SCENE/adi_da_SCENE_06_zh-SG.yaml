atom_id: adi_da_SCENE_06
body: "夜色充滿房間。  \n你靜靜躺著，四周一片漆黑。  \n天花板隱沒於黑暗中。  \n身體毫無動靜。  \n思緒卻不停流轉。  \n時間緩慢流逝。  \n\
  黎明遲遲未至。  \n你一動不動。  \n黑暗濃厚而徹底。  \n你緩緩呼吸。  \n等待清晨降臨。  \n它卻始終不來。  \n你持續置身於黑暗之中。  \n\
  內心悄然敞開。  \n夜色越發深沉。  \n心靈歸於寧靜。  \n你完整地呼吸。"
