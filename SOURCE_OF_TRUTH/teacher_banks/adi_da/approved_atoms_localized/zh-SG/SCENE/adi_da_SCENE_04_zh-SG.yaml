atom_id: adi_da_SCENE_04
body: "你坐在坐垫上。  \n大厅非常安静。  \n其他人围坐在你身边。  \n你的呼吸进出自然。  \n内心却十分喧闹。  \n身体姿态渐渐内塌。  \n\
  你重新挺直脊背。  \n不久又塌了下去。  \n钟声尚未响起。  \n你全然留在这里。  \n不离开。  \n静默而坐。  \n呼吸缓慢。  \n心渐渐沉静下来。\
  \  \n寂静愈发深沉。"
