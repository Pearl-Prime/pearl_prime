atom_id: adi_da_SCENE_03
body: "食物放在你的盤子上。  \n四周人聲輕揚。  \n你身處人群之中。  \n你的身體就在這裡，此刻臨在。  \n但有某樣東西不在這裡。  \n你拿起叉子。\
  \  \n食物嘗起來淡而無味。  \n你咀嚼，然後吞嚥。  \n附近有人笑出聲。  \n你卻聽不見。  \n你靜默地進食。  \n你繼續緩慢地吃。  \n你始終保持高度臨在。\
  \  \n這頓飯漸漸沉澱下來。  \n房間寧靜安詳。  \n你的胸口悄然打開。"
