atom_id: adi_da_SCENE_04
body: 당신은 좌석 위에 앉아 있습니다. 강의실은 매우 고요합니다. 주변에는 다른 사람들이 앉아 있습니다. 호흡이 들어오고 나갑니다. 마음속은
  시끄럽습니다. 자세가 무너집니다. 다시 곧게 펴봅니다. 또 무너집니다. 종소리는 아직 울리지 않았습니다. 당신은 여기에 온전히 머뭅니다. 떠나지
  않습니다. 침묵 속에 앉아 있습니다. 천천히 숨을 쉬고 있습니다. 마음이 가라앉습니다. 고요함이 깊어집니다.
