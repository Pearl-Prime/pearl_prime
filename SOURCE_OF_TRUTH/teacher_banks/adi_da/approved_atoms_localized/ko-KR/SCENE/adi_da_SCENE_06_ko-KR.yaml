atom_id: adi_da_SCENE_06
body: "밤이 방을 가득 채웁니다.  \n당신은 어둠 속에 누워 있습니다.  \n천장은 보이지 않습니다.  \n몸은 움직이지 않습니다.  \n\
  마음은 쉬지 않고 흐릅니다.  \n시간은 천천히 흘러갑니다.  \n새벽은 오지 않습니다.  \n당신은 움직이지 않습니다.  \n어둠은 온전합니다.\
  \  \n호흡은 천천히 이어집니다.  \n아침을 기다립니다.  \n하지만 아침은 오지 않습니다.  \n어둠 속에 머물러 있습니다.  \n가슴이\
  \ 열립니다.  \n밤이 주변을 더욱 깊게 감쌉니다.  \n정신은 고요합니다.  \n호흡은 온전해집니다."
