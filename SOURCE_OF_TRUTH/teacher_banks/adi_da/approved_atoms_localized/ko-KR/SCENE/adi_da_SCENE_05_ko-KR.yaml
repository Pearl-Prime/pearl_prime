atom_id: adi_da_SCENE_05
body: "그녀는 자신의 문제에 대해 이야기합니다.  \n당신은 그녀의 말을 듣습니다.  \n그녀가 잠시 멈추고 당신을 바라봅니다.  \n그녀는\
  \ 당신에게 무언가를 기대합니다.  \n당신의 목이 깊이 조여옵니다.  \n당신은 그녀가 무엇을 원하는지 압니다.  \n하지만 당신은 그 말을\
  \ 하지 않습니다.  \n침묵이 두 사람 사이를 가로질러 길게 이어집니다.  \n그녀가 다시 말을 시작합니다.  \n당신은 여전히 침묵합니다.\
  \  \n두 사람 사이의 공간이 점점 넓어집니다.  \n당신은 그 침묵을 온전히 안아 줍니다.  \n당신의 마음이 부드러워집니다.  \n침묵이\
  \ 더 깊어집니다.  \n그 잠깐의 멈춤이 모든 것을 품고 있습니다.  \n당신의 마음이 부드러워집니다."
