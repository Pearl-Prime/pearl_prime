atom_id: adi_da_SCENE_03
body: "음식이 당신의 접시 위에 놓여 있습니다.  \n주변에서 목소리가 들려옵니다.  \n당신은 많은 사람들 속에 있습니다.  \n당신의 몸은\
  \ 지금 여기, 이 자리에 있습니다.  \n하지만 또 다른 어떤 것은 여기에 없습니다.  \n당신은 포크를 들어 올립니다.  \n음식은 맛이 없습니다.\
  \  \n당신은 씹고 삼킵니다.  \n가까이서 누군가 웃습니다.  \n그 소리는 들리지 않습니다.  \n당신은 조용히 식사를 합니다.  \n천천히,\
  \ 계속해서 먹습니다.  \n당신은 여전히 아주 깊이 현재에 머물러 있습니다.  \n식사가 점점 더 깊어집니다.  \n방 안은 고요합니다.  \n\
  당신의 가슴이 열립니다."
