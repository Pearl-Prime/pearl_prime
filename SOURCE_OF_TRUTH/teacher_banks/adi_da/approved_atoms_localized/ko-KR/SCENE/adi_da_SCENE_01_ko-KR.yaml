atom_id: adi_da_SCENE_01
body: "당신은 그의 맞은편에 앉아 있습니다.  \n방은 매우 단순합니다.  \n한쪽 창문으로 빛이 들어옵니다.  \n당신의 척추는 곧게 펴져\
  \ 있습니다.  \n그의 눈빛은 차분하고 단단합니다.  \n그는 시선을 돌리지 않습니다.  \n당신은 그 눈길을 오래 견디지 못합니다.  \n\
  고개를 살짝 숙입니다.  \n손은 무릎 위에 가만히 놓여 있습니다.  \n침묵이 모든 공간을 채웁니다.  \n당신은 온전히 ‘보이고’ 있음을 느낍니다.\
  \  \n가슴이 천천히 열립니다.  \n두 사람 사이의 여유가 점점 커집니다.  \n빛이 방 전체를 가득 채웁니다."
