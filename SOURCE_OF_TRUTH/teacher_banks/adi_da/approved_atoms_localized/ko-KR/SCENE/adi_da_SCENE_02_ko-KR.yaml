atom_id: adi_da_SCENE_02
body: 길은 매우 좁습니다. 양쪽으로 나무들이 가까이 다가와 있습니다. 발이 길을 찾아갑니다. 숲은 말하지 않습니다. 가슴이 가득 차 있습니다.
  무게가 갈비뼈 뒤에 앉아 있습니다. 잎 한 장이 천천히 떨어집니다. 어깨 위에 닿습니다. 손으로 쓸어내지 않습니다. 계속 앞으로 걷습니다. 주변의
  숲이 점점 깊어집니다. 호흡이 천천히 안정됩니다. 길은 계속 앞으로 이어집니다. 빛이 나무 사이로 스며듭니다.
