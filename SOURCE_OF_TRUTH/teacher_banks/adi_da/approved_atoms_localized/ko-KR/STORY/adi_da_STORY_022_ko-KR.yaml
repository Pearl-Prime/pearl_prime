body: "토머스는 자신의 생각을 마치 구름처럼 바라봅니다.  \n그는 생각을 바꿔야 한다고 배웠습니다.  \n하지만 ‘빛’은 생각의 변화를 요구하지\
  \ 않습니다.  \n그저 ‘나는 생각이 아니다’라는 것을 알아차리는 것만 필요합니다.  \n그의 온몸은 마치 마음을 통제해야만 살 수 있을 것처럼\
  \ 긴장해 있었습니다.  \n‘나는 생각이 아니다’는 깨달음이 생기면, 틈이 열립니다.  \n그 틈에서 몸의 긴장이 풀립니다.  \n그는 너무\
  \ 오랫동안 꽉 쥐고 있었던 거죠.  \n그저 바라보기만 해도 괜찮지 않을까요?"
