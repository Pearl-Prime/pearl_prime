body: "학생은 자신의 마음이 작동하는 방식에 갇혀 있다고 느낍니다. 아디 다가 말합니다.  \n“이제 그 작동 방식을 보고 계십니다. 이 자체가\
  \ 진전입니다.  \n자아는 프로그래밍된 대로 반응하는 기계적인 체계입니다.  \n그 프로그래밍은, 당신이 불안했고, 무시당했다고 느꼈고, 버려졌다고\
  \ 느꼈던  \n모든 순간에 쌓인 수축입니다.  \n이 몸-마음은 바로 그 수축의 증거입니다.  \n하지만 당신은 그 기계적인 체계가 아닙니다.\
  \  \n당신은 그것을 관찰하는 ‘빛나는 존재’입니다.  \n그 체계는 힘으로 멈출 수 없습니다.  \n오직 ‘현재에 있는 존재감’을 통해 서서히\
  \ 바뀝니다.”"
