body: "이삭은 자신의 마음 속 성전으로 들어간다.  \n그리고 그곳이 늘 비어 있었다는 사실을 깨닫는다.  \n빛이 없는 게 아니라—  \n\
  문 앞에 서서 들어가지 못했던 것이다.  \n\n그의 온몸이 움직인다.  \n그는 한 걸음 옆으로 물러선다.  \n\n그 안으로 밀려드는 건,\
  \ 그가 의도한 것이 아니다.  \n그저 빛이 밀려든다.  \n\n그의 신경계는 한순간 만에,  \n수년간의 수행으로도 가르칠 수 없었던 것을\
  \ 배운다.  \n\n그를 조여 왔던 긴장은 필요하지 않다.  \n실제로 존재조차 하지 않는다.  \n그것은 사라진다.  \n\n이삭은 이제 투명함\
  \ 그 자체가 되어,  \n빛이 스며나오는 통로가 된다."
