body: "학생 한 명이 관계 속에서 일어나는 분노와 씨름합니다. 아디 다가 말합니다.  \n“그 분노는 버려질까 봐 두려운 마음에서 옵니다. \
  \ \n다른 사람이 당신에게서 주의를 거두는 그 순간을 지켜보세요.  \n몸이 수축하고, 분노가 그 틈을 덮습니다.  \n당신은 이미 수축한 사람에게\
  \ 관계를 강요하고 있습니다.  \n이것은 그 사람의 실패도 아니고, 당신의 실패도 아닙니다.  \n빛나는 존재는 수축한 이들 사이의 공간에서\
  \ 움직입니다.  \n분노는 수축하는 소리일 뿐, 응답이 아닙니다.”"
