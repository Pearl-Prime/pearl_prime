body: "아델린이 ‘맞다’는 것을 고집하는 욕구를 내려놓을 때, 어깨가 풀어진다.  \n그녀는 마치 자신의 삶을 지키듯, 의견에 몸을 움츠리고\
  \ 있었다.  \n틀렸다는 느낌은 추락하는 것 같았다.  \n하지만 진정한 빛은 그녀를 받쳐 주고 있었다.  \n‘맞다’는 것에 매달리는 손을\
  \ 놓을 때, 그 빛이 선명해진다.  \n손이 열리고, 호흡이 깊어진다.  \n이제 그녀는 안다. ‘맞다’는 것 자체가 방어막이었음을.  \n\
  그 빛은 방어막이 필요 없다.  \n그 빛은 놓아줄 줄 아는 몸을 필요로 한다."
