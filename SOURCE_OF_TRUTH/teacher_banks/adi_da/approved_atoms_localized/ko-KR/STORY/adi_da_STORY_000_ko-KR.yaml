body: "학생이 아디 다에게 다가가 말합니다.  \n“수년간 수행해 왔지만, 달라진 게 전혀 느껴지지 않습니다.”  \n\n아디 다의 눈빛이 고요히\
  \ 멈춥니다.  \n“당신은 이미 달라지고 있습니다. 빛나는 존재가 이미 작용하고 있습니다.  \n당신이 ‘수행’이라 부르는 것은 부재하는 무언가를\
  \ 향한 노력이 아닙니다.  \n그것은 이미 존재하는 당신과 신성의 하나됨이 점차 분명해지는 과정입니다.  \n당신이 느끼는 수축은 실패가 아닙니다.\
  \  \n그것은 자기 자신이 자신의 한계를 인식하는 순간입니다.”"
