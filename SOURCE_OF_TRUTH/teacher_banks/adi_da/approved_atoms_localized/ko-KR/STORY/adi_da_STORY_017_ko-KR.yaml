body: 레일라는 자신의 성과 주위로 몸을 움츠리는 자신을 알아차립니다. 성과를 꽉 쥐고, 그것이 자신의 가치를 증명해 준다고 믿습니다. 그러나
  ‘빛나는 것’은 그녀의 업적을 필요로 하지 않습니다. 심지어 그녀 자신조차 필요로 하지 않습니다. 이 깨달음이 무언가를 부수고 열어줍니다. 그녀는
  ‘중요한 사람이 되기’ 위해 너무 바빴던 나머지, 이미 충분히 소중하다는 사실을 잊어버렸습니다. 무엇을 하는지가 아니라, 그 자체로서 말입니다.
  ‘되는 것’에 대한 긴장과 수축이 비로소 쉴 수 있습니다.
