body: 마테오가 기도할 때, 그의 온몸이 달라집니다. 어깨와 목, 허리 아래에 맺혀 있던 긴장이 서서히 풀립니다. 기도가 무엇인가를 고치기 때문이
  아닙니다. 오히려 그는 경건한 자세에서 몸을 조이는 것을 멈추기 때문입니다. 자신이 받아주는 것을 허락합니다. 손이 열리고, 호흡이 깊어지며,
  배가 부드러워집니다. 빛나는 존재는 완벽한 몸을 요구하지 않습니다. 다만, 신성한 방향으로 펼쳐질 준비가 된 몸을 원합니다.
