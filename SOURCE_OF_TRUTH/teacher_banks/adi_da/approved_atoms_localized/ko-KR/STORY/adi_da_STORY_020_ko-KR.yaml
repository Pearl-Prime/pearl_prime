body: "가브리엘은 분노를 느끼지만, 그 분노가 사랑으로 감싸여 있음을 본다.  \n그는 소중한 사람을 잃을까 봐 두려워해 몸을 움츠렸다.  \n\
  그 분노는 바로 그 움츠러듦의 목소리였다.  \n이것을 깨닫는 순간, 무언가가 바뀐다.  \n빛나는 실재가 그에게 보여준다.  \n‘둘이 아닌\
  \ 것’을 잃을 수는 없다는 사실을.  \n두려움은 진짜였다.  \n하지만 분리는 결코 진짜가 아니었다.  \n그의 가슴이 펴진다.  \n분노가\
  \ 사라진다.  \n억누르지 않고, 자연스럽게 사라진다.  \n빛나는 실재 안에서는 일어날 수 없는 상실을 막기 위한 불필요한 방어였다는 것이\
  \ 드러나기 때문이다."
