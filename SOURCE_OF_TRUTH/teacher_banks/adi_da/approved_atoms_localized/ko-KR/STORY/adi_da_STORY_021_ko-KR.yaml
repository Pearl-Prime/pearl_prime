body: "아마라는 자신이 생각해 왔던 그 ‘나’에서 죽는다.  \n그녀의 전부가, 깨달음의 순간에 수축한다.  \n별개의 자아라는 모래 위에 쌓아\
  \ 올린 모든 것이 드러난다.  \n그 아래에서 빛나는 것을 느낀다.  \n‘아래’가 아니다.  \n모든 것의 바탕으로서, 그 자체로 빛난다.\
  \  \n그녀는 오랜 세월 동안 ‘어떤 사람’이 되려고 애썼다.  \n이제는 ‘아무도 아닌 존재’가 된다.  \n해체는 공포이자 자유다. 동시에.\
  \  \n그녀의 손이 떨린다.  \n그녀의 심장은 용량을 넘어서 열린다.  \n이것은 중재자 없이, 그녀의 개입 없이,  \n빛 그 자체가 빛으로\
  \ 작용하는 순간이다."
