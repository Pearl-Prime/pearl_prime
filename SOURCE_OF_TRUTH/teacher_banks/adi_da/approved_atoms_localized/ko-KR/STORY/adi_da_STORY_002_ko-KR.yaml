body: "학생이 묻습니다. “가슴의 뻣뻣함을 어떻게 풀어야 할까요?”  \n아디 다가 그를 바로 바라봅니다.  \n\n“그 뻣뻣함은 관계를 거부하는\
  \ 당신의 반응입니다.  \n다른 사람으로부터 물러서는 순간, 몸은 스스로 움츠러듭니다.  \n그때 당신은 ‘관계의 장’을 버립니다.  \n빛나는\
  \ 존재는 ‘사이’에 있습니다. 진정한 만남 속에 있습니다.  \n해방은 고립이 아니라, 관계를 통해 일어납니다.”"
