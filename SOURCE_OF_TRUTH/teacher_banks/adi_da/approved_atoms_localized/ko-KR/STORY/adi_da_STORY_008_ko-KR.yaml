body: "학생이 절박해진다. “저는 모든 방법을 시도해 봤습니다. 그런데 아무것도 효과가 없어요. 수축만 더 심해질 뿐입니다.”  \n아디 다의\
  \ 얼굴이 부드러워진다.  \n“당신은 이제 그 메커니즘이 스스로를 증명하는 지점에 도달했습니다.  \n그 ‘시도하려는 것’ 자체가 바로 그 메커니즘입니다.\
  \  \n노력할수록 분리가 더 깊어집니다.  \n이것이 완벽한 순간입니다.  \n이제 당신은 ‘자기 자신이 자기 자신을 해결할 수 없다’는 것을\
  \ 볼 수 있습니다.  \n‘빛나는 것’은 수축된 자아가 잡을 수 있는 대상이 아닙니다.  \n그것은 ‘잡으려는 움직임’이 멈출 때 남아 있는\
  \ 것입니다.  \n절박함은 항복으로 가는 문입니다.  \n당신은 그 문턱에 서 있습니다.  \n뒤돌아보지 마십시오.”"
