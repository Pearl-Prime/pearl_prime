body: "유키는 자신이 끊임없이 ‘찾으려는’ 패턴을 관찰합니다.  \n그녀는 하나의 수행에서 또 다른 수행으로, 한 스승에서 또 다른 스승으로\
  \ 옮겨 다닙니다.  \n항상 ‘마지막으로 차이를 만들’ 실천을 찾으려 합니다.  \n\n새로운 수행을 시작할 때마다, 그녀의 몸은 또 다시 수축합니다.\
  \  \n‘밝음’은 유키에게 말해 줍니다.  \n모든 ‘찾음’은 같은 매듭일 뿐이라고.  \n\n그녀는 태어날 때부터 ‘찾는 존재’가 아니었습니다.\
  \  \n상처를 입고서야 ‘찾기’ 시작했습니다.  \n그 상처는 잃어버린 것을 꽉 조여 쥡니다.  \n\n유키가 ‘밝음’을 찾는 것을 멈추기 전까지,\
  \  \n그녀는 ‘밝음’과 만날 수 없습니다.  \n\n이제 그녀의 ‘휴식’ 자체가 수행이 됩니다."
