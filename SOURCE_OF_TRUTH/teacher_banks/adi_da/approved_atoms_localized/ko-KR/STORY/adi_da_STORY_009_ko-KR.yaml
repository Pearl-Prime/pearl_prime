body: "학생이 수축이 ‘선택’으로 명확히 보이는 전환점을 경험했다고 보고합니다. 아디 다는 말합니다.  \n“맞습니다. 이제 당신은 매 순간\
  \ 수축을 스스로 선택하고 있다는 것을 볼 수 있습니다.  \n수축은 당신에게 ‘일어나는 것’이 아닙니다.  \n그것은 당신이 ‘행하는 것’입니다.\
  \  \n이러한 인식 자체가 이미 해방의 첫 움직임입니다.  \n하지만 이 인식에서 ‘길’을 만들지 마십시오.  \n많은 이들이 이 작동 원리에\
  \ 대한 통찰에 집착하며, 그것을 영적 우월감의 근거로 삼습니다.  \n그러나 이 작동 원리는 단지 작동 원리일 뿐입니다.  \n그것을 보는 ‘빛나는\
  \ 존재’야말로 진정 중요한 것입니다.”"
