body: "학생이 묻습니다. “어떻게 하면 그 연결의 자리에 머물 수 있을까요?”  \n아디 다가 대답합니다. “그곳에 머물 수는 없습니다. 그것이\
  \ 바로 오해입니다.  \n연결의 자리는 당신이 도달해서 머물러야 하는 장소가 아닙니다.  \n그것은 바로 당신 자신입니다.  \n그 자리를 붙들려는\
  \ 순간, 다시 긴장이 생깁니다.  \n하지만 이제는 그걸 더 빨리 알아차리고 계십니다.  \n자각의 힘이 날카로워지고 있습니다.  \n긴장에서\
  \ 벗어나 회복되는 속도도 빨라지고 있습니다.  \n이것이 바로 성장입니다.  \n성취가 아니라, 깨달음입니다.”"
