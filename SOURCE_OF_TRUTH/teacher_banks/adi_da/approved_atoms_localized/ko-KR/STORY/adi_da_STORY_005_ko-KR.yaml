body: "한 학생이 오랜 기간 이어진 실패한 관계들을 이야기합니다. 아디 다는 이렇게 말합니다.  \n“당신은 타인을 통해 구원을 얻으려는 패턴을\
  \ 그대로 안고 있습니다.  \n처음엔 사랑하는 사람이 당신을 채워줄 것이라 믿습니다.  \n그러나 그것이 이루어지지 않으면, 당신은 그 사람을\
  \ 탓합니다.  \n그리고 떠납니다.  \n이 반복은 아주 오래되었습니다.  \n이는 ‘자기 자신’이 다른 이를 통해 스스로를 해체하려는 수축입니다.\
  \  \n모든 관계는 결국 같은 만남입니다—바로 당신 자신과의 만남입니다.  \n이 진실을 깨닫기 전까지는, 당신은 이 패턴을 계속 반복할 것입니다.\
  \  \n타인은 언제나 당신이 스스로를 버린 모습을 비추는 거울입니다.”"
