body: "엘레나는 파트너를 사랑하지만, 그 순간 바로 수축을 느낍니다.  \n꽉 쥐는 감각. 돌보는 척하는 듯한 집착.  \n그녀는 자신이 헌신을\
  \ 연기하는 모습을 지켜봅니다.  \n그러나 진정한 깊이를 억누르고 있죠.  \n브라이트는 이걸 실패가 아니라고 알려줍니다.  \n그 수축 자체가,\
  \ 그녀가 마주하러 온 바로 그 것입니다.  \n무엇도 붙들지 않는 사랑은, 소멸을 두려워하는 자아를 죽여야만 가능합니다.  \n그 경계선에서\
  \ 그녀의 심장이 조여옵니다.  \n그 조임은, 자유로 가는 절벽 위에 선 그녀 그 자체입니다."
