body: "클레어는 자신의 방어 기제를 느낍니다.  \n비난을 받을 때 얼굴이 딱딱하게 굳는 것을요.  \n누군가 자신을 이해하지 못할 때 가슴이\
  \ 조이는 것을요.  \n\n그 방어 기제는 한때 꼭 필요했습니다.  \n지금은 ‘빛’을 가로막고 있습니다.  \n\n그녀는 힘으로 방어 기제를\
  \ 없애려 하지 않아도 됩니다.  \n단지 그것을 ‘보기만’ 하면 됩니다.  \n그 수축이 얼마나 많은 에너지를 소모하는지 보는 것이죠.  \n\
  \n그것을 보는 순간, 피로감이 선명해집니다.  \n그리고 때때로, 그 선명함 속에서 약간의 이완이 찾아옵니다."
