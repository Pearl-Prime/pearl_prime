body: "마커스는 거울 속 자신을 바라보며 입가의 긴장감을 느낍니다.  \n사람들은 늘 그에게 더 자주 웃으라고, 긍정적이 되라고 말했습니다.\
  \  \n하지만 ‘빛’은 겉모습의 밝기를 요구하지 않습니다.  \n그 긴장 자체가 메시지입니다.  \n그의 얼굴은, 타인이 상상한 ‘그가 되어야\
  \ 할 사람’에 맞추기 위해 스스로를 억누르던 모든 순간을 담고 있습니다.  \n‘빛’은 이 억누름을 보고 있습니다.  \n그 ‘보는 것’이 바로\
  \ 시작입니다."
