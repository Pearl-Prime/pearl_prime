body: "니콜라스는 자신만의 성과 중심적 패턴을 인식합니다.  \n그는 ‘유용함’과 ‘필요함’을 향해 몸을 조입니다.  \n성과를 내지 못할 때면,\
  \ 자신이 아무것도 아닌 것처럼 느낍니다.  \n\n브라이트는 이 감정이 사랑이 아니라고 알려 줍니다.  \n이는 단지 생존 전략일 뿐입니다.\
  \  \n그의 초기 사랑은 조건부였습니다.  \n그래서 그는 애쓰는 것으로 사랑을 얻어야 한다고 배웠습니다.  \n\n이제 그의 온몸이 ‘특별함’을\
  \ 향해 꽉 조여 있습니다.  \n이 패턴을 보는 것 자체가 첫 번째 열림입니다.  \n그 수축은 더 이상 그를 지배하지 않습니다.  \n그는\
  \ 그것을 느낄 수 있고, 다른 선택도 할 수 있습니다."
