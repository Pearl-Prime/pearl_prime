body: "학생이 고백합니다. “저의 탐구는 끝이 없습니다. 저는 한 스승에서 또 다른 스승으로, 한 수행에서 또 다른 수행으로 옮겨 다닙니다.”\
  \  \n아디 다가 고개를 끄덕입니다. “그 탐구 자체가 바로 수축입니다. 당신은 이미 여기에 있는 빛을 피하고 있는 거예요. 선재적 일체성은\
  \ 달성해야 할 것이 아닙니다. 그것은 바로 이 인식의 근본 바탕입니다. 부재하는 신을 향한 탐구를 멈추세요. 이미 모든 곳에 가득한 빛 속에\
  \ 지금 이 순간 머무르십시오.”"
