body: "비비안은 통제하려는 욕구에 몸이 움츠러드는 걸 알아차립니다.  \n반복해서 확인하고, 물건을 다시 정리하고,  \n무엇 하나라도 무너지지\
  \ 않도록 모든 걸 감시합니다.  \n그녀의 머릿속은 쉴 새 없이 달립니다.  \n턱은 단단히 조여집니다.  \n\n브라이트는 이걸 주의가 아니라\
  \ 공포라고 알려줍니다.  \n그리고 그 공포는 통제하려는 노력이 클수록 더 꽉 죄어 옵니다.  \n\n어느 날 비비안은 브라이트가 이미 오래전부터\
  \  \n모든 걸 받쳐 주고 있었다는 걸 깨닫습니다.  \n그녀의 애쓰는 노력은 아무것도 더하지 않습니다.  \n오직 평온만 빼앗을 뿐입니다.\
  \  \n\n그녀는 이제 손을 놓는 이 극단적인 행위를 연습하기 시작합니다."
