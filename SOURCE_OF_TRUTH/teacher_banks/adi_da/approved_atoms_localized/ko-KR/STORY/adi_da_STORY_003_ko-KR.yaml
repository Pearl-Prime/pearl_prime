body: "학생이 명상 중에 오직 무감각만 느낍니다. 그가 아디 다에게 이 사실을 말하자, 스승은 이렇게 말합니다.  \n“그 무감각은 방어 전략입니다.\
  \ 당신의 몸은 견딜 수 없는 감정으로부터 자신을 지키기 위해 마비되도록 배웠습니다. 이는 생명체의 지혜입니다. 그러나 지금 그 방어가 오히려\
  \ 감옥이 되었습니다. 이제 당신은 ‘빛’에 대한 몸의 반응을 느끼도록 허락하세요. 감각을 느끼는 것—그것이 인식의 첫 문지방입니다.”"
