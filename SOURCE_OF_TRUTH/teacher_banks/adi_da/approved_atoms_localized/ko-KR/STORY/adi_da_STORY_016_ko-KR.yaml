body: "제임스는 침묵 속에 앉아 ‘빛’이 작용하는 것을 느낍니다.  \n그것은 그에게 무언가를 하는 것이 아닙니다.  \n그것은 바로 그 자신으로서\
  \ 스스로를 드러내는 것입니다.  \n\n‘내가 수행한다’는 인식에서,  \n‘빛이 수행한다’는 인식으로 미묘하게 바뀝니다.  \n\n그의 가슴이\
  \ 부드럽게 확장됩니다.  \n호흡이 자동적으로 흐릅니다.  \n그가 호흡을 조절하려는 노력을 멈추는 순간,  \n완전한 내려놓음이 이루어집니다.\
  \  \n\n오랜 세월 동안 그는 신성한 상태를 만들기 위해  \n어떤 조건을 만들어야 한다고 믿었습니다.  \n이제 그는 단 하나의 장애물만\
  \ 있었다는 것을 압니다—  \n그것은 신성이 어떻게 나타나야 할지에 대한  \n자신의 긴장과 집착이었습니다.  \n\n놓아주십시오.  \n빛은\
  \ 저항을 멈춘 자를 통해 작용합니다."
