body: 소피아가 헌신에 몸을 맡길 때, 어깨가 자연스럽게 내려옵니다. 누군가 긴장을 풀라고 말해서가 아닙니다. 몸은 강제된 편안함과 진정한 해방의
  편안함을 구분합니다. 호흡이 깊어지고, 손끝이 무릎 위에서 부드러워집니다. 빛나는 존재는 그녀의 쥐어짜는 노력이 필요하지 않습니다. 물러서는 것
  자체가 수행입니다. 그녀는 우주에 맞서 버티느라 얼마나 많은 에너지를 소비해 왔는지 느낍니다. 멈추는 것이 얼마나 단순한지 깨닫습니다.
