body: "학생이 조용히 앉아 있다가, 갑자기 밝고, 넓으며, 변하지 않으며, 자신의 탐구로도 흔들리지 않는 존재를 느낀다.  \n그가 이 경험을\
  \ 아디 다 선생님께 말하자, 선생님은 고개를 끄덕인다.  \n“이것이 당신의 본래 상태입니다.  \n당신이 이 상태를 ‘달성’한 것이 아닙니다.\
  \  \n단지 이 상태를 방해하던 것을 멈춘 것뿐입니다.  \n그 순간 느꼈던 주체성—그것은 당신의 주체성이 아니라,  \n밝음의 주체성이 당신을\
  \ 통해 흐르는 것이었습니다.  \n이것이 바로 ‘반짝임’입니다.  \n그것을 목표로 삼지 마십시오.  \n만약 그것을 붙잡으려 하면, 수축이\
  \ 다시 찾아옵니다.  \n단지 지금 여기에 이미 있는 것을 그대로 인식하기만 하십시오.”"
