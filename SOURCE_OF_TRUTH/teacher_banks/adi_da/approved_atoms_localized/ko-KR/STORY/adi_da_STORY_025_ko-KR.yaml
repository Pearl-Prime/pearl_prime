body: 파라는 슬픔을 느끼고, 그 슬픔이 몸 어디에서 수축하는지 알아차립니다. 가슴 속 매듭. 목구멍의 조임. 그녀는 사랑하던 사람을 잃었습니다.
  이 수축은 자신이 놓아주기를 거부하는 신호입니다. ‘빛’은 그녀에게 잊으라고 하지 않습니다. 대신, 죽은 사람과 함께 죽는 것을 멈추라고 말합니다.
  그녀의 사랑은 그대로 남아 있을 수 있습니다. 하지만 그 사랑을 꽉 붙들고 있는 한, ‘빛’이 진실했던 것을 이어가려는 움직임에는 참여할 수 없습니다.
  그녀는 손을 조금 풀어줍니다. 슬픔은 사라지지 않지만, 감옥에서 헌사로 바뀝니다.
