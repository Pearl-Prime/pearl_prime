body: 다니엘은 아들에게 말하다가, 자신도 모르게 아버지의 말투와 같은 억누름을 반복하고 있다는 것을 깨닫는다. 그 패턴은 마치 점령당한 듯 그를
  휘감는다. 처음으로 그는 이 패턴을 자신의 본성이라 여기지 않고, 대물림된 수축 반응으로 인식한다. ‘브라이트’는 그 순간을 보여 준다. 그는
  물러나려는 충동을 느끼지만, 다르게 선택할 수 있다. 의지력이 아니라, ‘보는 것’에서 비롯된 선택이다. ‘브라이트’는 일을 대신 해주지 않는다.
  그것은 우리가 유산을 둘러싼 수축을 멈출 때, 어떤 가능성이 열리는지를 보여 줄 뿐이다.
