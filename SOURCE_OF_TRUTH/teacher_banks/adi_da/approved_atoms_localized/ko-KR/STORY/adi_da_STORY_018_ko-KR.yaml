body: "라파엘은 브라이트를 향해 열릴 때 턱이 부드러워진다.  \n배가 자연스럽게 펴진다.  \n그는 어린 시절부터 태양 신경총에 머물러 있던\
  \ 긴장감을 느낀다.  \n그 긴장은 더 애쓰는 것으로 풀리지 않는다.  \n풀어주는 것만으로 사라진다.  \n그의 온몸은 오랫동안 헌신의 그릇이었지만,\
  \ 너무 꽉 조여져 감옥이 되어 있었다.  \n항복은 벽을 허무는 것이다.  \n자신이 얼마나 작고, 브라이트가 얼마나 광활한지를 느끼는 것이다.\
  \  \n그의 신경계는 지금 비로소, 오랫동안 움켜쥔 것을 내려놓아도 안전하다는 걸 배운다."
