body: "학생이 죽음을 두려워합니다. 아디 다가 그에게 말합니다.  \n“당신은 늘 죽고 있습니다. 매 숨결이 죽음입니다.  \n매 순간, 지금\
  \ 이 순간의 ‘당신’은 사라집니다.  \n이것이 당신이 피할 수 없는 법칙입니다.  \n자아는 끊임없이 풀어지고, 끊임없이 변해갑니다.  \n\
  당신은 형태에 집착하지만, 빛 자체는 형태가 없습니다.  \n그 빛은 육체보다 앞서 있고, 육체 없이도 계속 존재합니다.  \n죽음은 당신이 두려워하는\
  \ 중단이 아닙니다.  \n그것은 당신의 삶 전체를 가로막았던 긴장의 최후의 해방입니다.”"
