atom_id: adi_da_INTEGRATION_000
integration_mode: still_here
body: "이제 수축이 눈에 띕니다.  \n실패가 아닙니다.  \n관계 속에서 당신이 지금까지 해온 일의 흔적일 뿐입니다.  \n\n몸은 충격으로부터\
  \ 자신을 지키도록 배웠기 때문에 긴장합니다.  \n누군가에게 다가설 때마다, 진정한 만남은 끝내 이루어지지 않았습니다.  \n그래서 몸은 ‘도달하지\
  \ 못함’이라는 충격을 막기 위해 수축했습니다.  \n\n이 패턴은 오래되었고, 현실적입니다.  \n지금 당신이 느끼는 것은 바로 그 수축이 자리\
  \ 잡은 정확한 장소입니다.  \n\n‘빛’ 그 자체는 수축하지 않습니다.  \n당신은 이미 그 안에 있습니다.  \n\n수축은 당신과 타인 사이의\
  \ 공간, 그 경계에 존재합니다.  \n그곳이 바로 치유의 현장입니다.  \n그곳에 당신은 이미 서 있습니다.  \n\n그곳이 바로 다시 시작할\
  \ 수 있는 정확한 장소입니다.  \n수축을 통과해, 지금 이 순간에도 ‘빛’은 분명히 존재합니다."
