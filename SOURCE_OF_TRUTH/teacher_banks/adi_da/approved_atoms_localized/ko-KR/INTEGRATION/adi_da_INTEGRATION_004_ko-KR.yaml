atom_id: adi_da_INTEGRATION_004
integration_mode: someone_else
body: "당신의 경계가 무너진 건, 상대방의 감정이 당신의 수축보다 더 ‘실제적’이라고 믿었기 때문입니다.  \n상대가 긴장하는 걸 느꼈고, 당신은\
  \ 그 충격을 흡수하려고 부드러워졌습니다.  \n그건 사랑이 아닙니다.  \n그건 융합입니다.  \n그건 소멸입니다.  \n\n진정한 관계는,\
  \ 당신 안의 ‘빛’이 안정되어 있을 때만 가능합니다.  \n동시에 상대방 안의 ‘빛’도 안정되어 있어야 합니다.  \n두 개의 독립된 빛. 하나가\
  \ 아닙니다.  \n\n당신이 자신의 수축을 버리고 상대의 감정을 달래려 할 때,  \n당신은 상대에게 ‘그들의 감정이 당신을 지울 수 있다’고\
  \ 가르치는 겁니다.  \n또한 스스로에게도 ‘당신의 현실은 상대보다 덜 실제적이다’고 가르치는 겁니다.  \n\n경계란, 당신이 자신의 ‘빛’과의\
  \ 관계 속에 머무르는 자리입니다.  \n단단하지 않아도 되고, 차갑지 않아도 됩니다.  \n단지 분명해야 합니다.  \n\n상대방은 여전히 자신의\
  \ ‘빛’과의 관계 속에 머뭅니다.  \n서로 다른 두 개의 인식이, 융합되지 않고 만나는 것."
