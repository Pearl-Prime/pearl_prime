body: "슬픔은 진심 어린 사랑이 있었고, 그 관계가 당신의 수축 속에서 살아남지 못했을 때 몸이 아는 감정입니다.  \n당신은 사랑했습니다.\
  \ 빛은 움직였습니다.  \n하지만 당신은 물러났습니다. 방어했습니다. 닫았습니다.  \n사랑은 끝나지 않았습니다. 다만 당신이 사랑에 주었던\
  \ 허락이 끝났을 뿐입니다.  \n그것이 바로 슬픔입니다.  \n다른 사람을 잃은 것이 아닙니다.  \n당신이 스스로 거두어 간 ‘허락’을 잃은\
  \ 것입니다.  \n\n지금 당신에게 주어진 과제는, 다시 사랑할 수 있는가가 아닙니다.  \n빛은 사랑을 멈출 수 없습니다.  \n과제는 두려움이\
  \ 찾아올 때도 열린 채 머물 수 있는가입니다.  \n몸이 떨리더라도, 관계 안에 그대로 머무를 수 있는가입니다.  \n\n슬픔은 이 가르침을\
  \ 끊임없이 반복합니다.  \n슬픔은 바로 선생님이죠.  \n당신은 열린 채 머물 수 있습니다.  \n당신은 자신이 사랑받는 것을 허락할 수 있습니다.\
  \  \n사랑은 변하지 않았습니다.  \n단지 당신의 열림이 닫혔을 뿐입니다."
