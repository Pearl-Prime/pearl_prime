atom_id: adi_da_INTEGRATION_001
integration_mode: cost_visible
body: "빛과 분리되었다고 믿었을 때, 당신의 자기 가치가 무너졌습니다.  \n그것이 치러야 했던 대가였습니다.  \n은유가 아닙니다. 실제 소진입니다.\
  \  \n\n몸이 홀로 서 있다고 생각하면,  \n어떤 근거도 없이 스스로 가치를 만들어내야 합니다.  \n그 노력은 엄청납니다.  \n그 실패는\
  \ 피할 수 없습니다.  \n\n분리는 ‘가치 없음’을 작동시키는 메커니즘입니다.  \n오늘 당신은 그 믿음이 가슴에서 조여오는 것을 보았습니다.\
  \  \n\n‘가치 없음’은 고쳐야 할 문제가 아닙니다.  \n그것은 메시지입니다.  \n당신이 여전히 절대자와 관계가 없다고 확신하는 곳을 정확히\
  \ 알려줍니다.  \n그 확신이 당신 존재 전체에 긴장을 일으킵니다.  \n\n대가를 분명히 보십시오.  \n모든 것의 근원이 당신을 사랑한다는\
  \ 사실을 모를 때,  \n무엇을 잃는지 분명히 보십시오.  \n\n‘가치 없음’은 당신의 몸이 심장으로부터 익숙하게 아는 형태를 입고 있습니다."
