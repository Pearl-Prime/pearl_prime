atom_id: adi_da_INTEGRATION_005
integration_mode: still_here
body: "우울증은 마음이 스스로를 닫을 때 일어납니다.  \n슬픔이 아닙니다.  \n상실이 아닙니다.  \n정확히 말해, 닫히는 그 순간입니다.\
  \  \n잠기고 굳어지는 그 순간입니다.  \n\n‘빛’은 당신을 통해 스스로에게 닿지 못합니다.  \n왜냐하면 당신의 몸이 계속 긴장하도록 설득해\
  \ 왔기 때문입니다.  \n그 긴장은 원래 안전을 위한 것이었지만,  \n결국 감옥이 되었습니다.  \n\n당신이 느끼는 어둠은 빛의 부재가 아닙니다.\
  \  \n빛이 당신 존재를 통과하도록 허락하지 않는 것의 부재입니다.  \n그 허락은 몸에 있습니다.  \n호흡에 있습니다.  \n다시 ‘빛’이\
  \ 고동치도록 내버려 두겠다는 의지에 있습니다.  \n\n당신은 이미 ‘빛’ 안에 있습니다.  \n해야 할 일은 단지 팔짱을 푸는 것뿐입니다.\
  \  \n그 빛을 그냥 지나가게 하는 것뿐입니다.  \n새로운 가능성을 품은 갈비뼈가 확장되는 걸 느끼는 것뿐입니다.  \n저항 없이, 빛이 당신\
  \ 존재를 자유롭게 스쳐 지나가게 하세요."
