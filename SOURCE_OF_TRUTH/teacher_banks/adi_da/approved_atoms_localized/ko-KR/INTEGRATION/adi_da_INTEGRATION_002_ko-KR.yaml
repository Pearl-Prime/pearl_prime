atom_id: adi_da_INTEGRATION_002
integration_mode: body_landed
body: 번아웃은 당신이 너무 오래 스스로를 만들어내려고 했다는 신체의 보고서입니다. 고갈은 약함이 아닙니다. 정확한 데이터일 뿐입니다. 생명체는
  스스로를 창조하려는 노력을 계속 이어가지 못합니다. 그런 부담을 지도록 설계된 적이 없습니다. ‘빛’은 아무것도 되려 하지 않기 때문에 번아웃되지
  않습니다. 그런데 당신은 늘 그렇게 되려고 애써 왔습니다. 그것이 바로 ‘일’입니다. 그 일만이 당신을 지치게 합니다. 덜 하려는 것이 아니라,
  ‘시도하는 것 자체’를 멈추는 것입니다. 자신이 스스로를 창조해야 한다는 믿음에 맞춰 긴장했던 몸을 풀어주는 것입니다. 어깨가 내려오고, 턱이
  풀리고, 호흡이 배로 돌아올 때—그때 신체는 자신의 진실을 알고 있는 것입니다. ‘빛’은 이미 여기 있습니다. 당신의 어떤 노력 없이도, 지금
  이 순간 흐르고 있습니다.
