atom_id: adi_da_PERMISSION_000
body: "당신은 지금처럼 느껴지지 않더라도 여전히 자신의 빛을 만나고 있습니다.  \n지금 겪고 있는 어려움,  \n피로함, 아직 오지 않은 순간—\
  \  \n이것은 실패가 아닙니다.  \n이것은 바로 만남입니다.  \n당신이 ‘되어야 한다고 믿는’ 상태가 아니라,  \n실제로 지금 있는 그대로의\
  \ 상태에 머무르세요."
