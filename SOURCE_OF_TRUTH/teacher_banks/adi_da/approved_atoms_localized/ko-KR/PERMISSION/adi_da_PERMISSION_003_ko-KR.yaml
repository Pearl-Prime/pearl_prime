atom_id: adi_da_PERMISSION_003
body: 당신은 아직 표면 아래에서 벌어지고 있는 일을 보지 못합니다. 빛나는 존재가, 당신이 아직 인식하지 못하는 곳에서 활동하고 있습니다. 지금
  느끼는 혼란은 당신의 실패를 증명하지 않습니다. 그것은 당신의 이해를 넘어서는 어떤 더 큰 힘이 움직이고 있다는 증거입니다. 아직 알 수 없는
  것에 온전히 머무르세요.
