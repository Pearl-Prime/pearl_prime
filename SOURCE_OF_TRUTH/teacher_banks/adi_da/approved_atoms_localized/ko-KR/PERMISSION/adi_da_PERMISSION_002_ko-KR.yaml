atom_id: adi_da_PERMISSION_002
body: "당신이 붙들고 있는 그 끈질긴 힘.  \n자신을 견디게 하려는 힘, 위협을 통제하려는 힘.  \n그 힘이 이제 바로 위협이 되었습니다.\
  \  \n어깨를 내려 놓으세요.  \n주먹을 풀어 놓으세요.  \n그 자체로 풀어지는 것이 바로 치유입니다."
