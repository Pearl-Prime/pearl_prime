atom_id: adi_da_PERMISSION_001
body: "당신이 짊어지는 무게는 처벌이 아닙니다.  \n그것은 당신의 깊이를 증명하는 서명입니다.  \n피로를 주는 그 무거움 자체가,  \n\
  당신이 소중히 여기는 것을 버리지 않았음을 보여주는 증거입니다.  \n그 무게가 다리와 땅에 차분히 내려앉는 것을 느껴보세요."
