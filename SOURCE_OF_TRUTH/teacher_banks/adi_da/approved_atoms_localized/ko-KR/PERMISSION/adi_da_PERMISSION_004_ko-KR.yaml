atom_id: adi_da_PERMISSION_004
body: 당신의 과거를 버티기 위해 내린 결정들은 모두 옳았습니다. 그 결정들은 현명했고, 당신을 지켜냈습니다. 이제 당신의 몸은 더 이상 꽉 쥐고
  있을 필요가 없음을 알고 있습니다. 척추를 부드럽게 풀어 주세요. 그리고 이렇게 느껴보세요. “나는 받은 그대로가 딱 맞았어요.”
