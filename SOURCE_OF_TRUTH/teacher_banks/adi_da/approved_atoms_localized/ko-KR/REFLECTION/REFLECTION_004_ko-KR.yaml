atom_id: adi_da_REFLECTION_004
body: "사랑 앞에서 당신의 경계는 사라졌습니다.  \n‘아니오’라고 말하는 것이 버림받을 위험을 의미한다는 걸 배웠기에,  \n당신은 굽히고,\
  \ 흡수하고, 맞춰주는 사람이 되었습니다.  \n그 선택이 몸속 근육에 남긴 감각을 느껴보세요.  \n\n경계는 벽이 아닙니다.  \n경계는 진정한\
  \ 만남을 가능하게 하는 구조입니다.  \n경계란 이렇게 말합니다: “저는 여기 있습니다. 그리고 저는 당신이 아닙니다.”  \n경계란 이렇게\
  \ 말합니다: “이곳까지 제 에너지가 닿고, 이곳부터는 닿지 않습니다.”  \n이런 명확함이 없으면, 당신이 ‘사랑’이라 부르는 것은  \n의무가\
  \ 되고, 원망이 됩니다.  \n\n경계가 사라진 사람에게서 제가 관찰하는 수축은  \n불안과는 다릅니다.  \n그것은 투과성이 강해지고 모호해진\
  \ 자기 자신을  \n끊임없이 유지하려는 노력을 반영합니다.  \n빛나는 존재는 선명한 구분을 알아봅니다.  \n선명함이 바로 그 본성입니다.\
  \  \n\n당신의 경계는 이기적이지 않습니다.  \n당신의 명확함은 타인이 당신을 진짜 그대로 만나게 해줍니다.  \n버림받는 것을 피하려고\
  \ 만들어낸 가면이 아니라,  \n진짜 당신 그 자체를요."
