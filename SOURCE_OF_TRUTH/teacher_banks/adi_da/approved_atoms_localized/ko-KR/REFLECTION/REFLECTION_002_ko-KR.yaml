atom_id: adi_da_REFLECTION_002
body: "번아웃은 단순한 피로가 아닙니다.  \n번아웃은 몸이 더 이상 거짓말을 하지 않겠다고 선언하는 순간입니다.  \n당신의 고갈은 분명한\
  \ 언어로 말합니다.  \n당신이 세운 삶의 구조가, 지금 당신이 실제로 살아가는 삶과 더 이상 맞지 않는다고요.\n\n자연스러운 에너지와 휴식의\
  \ 리듬에 여전히 저항하는 곳을 살펴보세요.  \n몸과 마음이 ‘아니오’라고 외치는 순간에도 ‘예’라고 대답하는 곳을 살펴보세요.  \n실제로\
  \ 존재하는 것보다 상상 속 의무를 위해 진짜를 희생하는 곳을 살펴보세요.  \n이것들은 개인적인 실패가 아닙니다.  \n특정 조건 아래에서 형성된\
  \ 패턴일 뿐이며, 그 조건은 이미 사라졌을 수도 있습니다.\n\n저는 수많은 이들이 실제 외부 필요성에서 비롯되지 않은, 내면화된 요구에 복무하며\
  \ 스스로를 소진하는 모습을 지켜보았습니다.  \n그 요구는 자율적으로 작동하게 되었고, 이제는 스스로를 움직입니다.  \n당신은 오래전에 잠잠해진\
  \ 목소리들의 승인을 쫓고 있습니다.\n\n‘빛’은 당신을 단순한 휴식이 아닌,  \n진정으로 당신이 여기서 해야 할 일과,  \n머릿속 메아리가\
  \ 강요하는 일 사이의 차이를  \n근본적인 솔직함으로 직시하도록 부릅니다."
