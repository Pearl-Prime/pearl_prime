atom_id: adi_da_REFLECTION_001
body: "자존감은 생각에서 생겨나지 않습니다.  \n자존감은 당신보다 더 큰 것에 대한 헌신에서 비로소 태어납니다.  \n이것을 머리로 이해하는\
  \ 것이 아니라, 가슴으로 느껴보세요.  \n‘주는 것’이라는 개념이 아니라, 실제로 주는 순간의 감각을요.\n\n당신은 ‘성취와 수행’에서만\
  \ 가치가 생긴다고 배웠습니다.  \n사랑은 충분한 결과, 충분한 완벽함, 충분한 증거를 통해 얻어야 한다고 배웠습니다.  \n이 가르침은 상처로\
  \ 당신 안에 들어왔고, 그 상처는 곧 당신의 삶을 움직이는 방식이 되었습니다.  \n당신은 더 많이, 더 잘, 더 빠르게 추구합니다.  \n\
  마치 어떤 성과라도 달성하면, ‘내가 소중한가?’라는 질문에 드디어 답할 수 있을 것처럼 말입니다.\n\n빛나는 존재는 당신의 수행 이전에 이미\
  \ 당신을 알아봅니다.  \n이 인식은 얻을 수 없습니다. 이미 당신 안에 있기 때문입니다.  \n당신이 할 수 있는 건, 그 인식을 느끼지 못하게\
  \ 하는 움직임을 멈추는 일입니다.  \n그리고 당신 자신의 빛을 피하려는 자리에 주목하는 것입니다.  \n왜냐하면 그 빛은 위험해 보이고, 노출된\
  \ 듯하고, 고독하게 느껴지기 때문입니다.\n\n당신이 자신을 초월하는 무엇인가에 진심으로 헌신하며 쉴 때,  \n당신의 가치는 더 이상 당신의\
  \ 생산물에 달려 있지 않습니다."
