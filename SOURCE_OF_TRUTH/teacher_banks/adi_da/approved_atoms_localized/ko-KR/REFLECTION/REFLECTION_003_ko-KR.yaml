atom_id: adi_da_REFLECTION_003
body: "슬픔은 갈 곳을 잃은 사랑입니다.  \n목구멍에서, 가슴을 누르는 무게로 이 감정을 느껴보세요.  \n당신의 슬픔은 그 무엇이 얼마나\
  \ 소중했는지를 말해줍니다.\n\n당신은 슬픔이 짧고, 사적이고, 통제되어야 한다고 배웠습니다.  \n너무 많이 느끼거나, 너무 오래 느끼면 문제가\
  \ 있다는 말도 들었습니다.  \n이런 가르침은 슬픔이 스스로 완성되는 것을 막습니다.  \n앞으로 나아가지 못한 사랑의 힘이 몸속에 갇혀, 무거움이\
  \ 되고,  \n평범함처럼 보이는 긴장과 수축이 됩니다.\n\n완전한 슬픔을 지나간 사람들은 오히려 이후에 더 가볍게 산다는 것을 제가 관찰했습니다.\
  \  \n그것은 상실을 잊었기 때문이 아니라,  \n사랑이 더 이상 갇히지 않아서입니다.  \n사랑이 당신의 부정을 밀어내며 머무르지 않게 된\
  \ 것입니다.\n\n‘빛나는 존재’는 당신이 잃어버린 것을 바라보되,  \n당신의 슬픔을 고쳐야 한다고 요구하지 않습니다.  \n“이젠 다 지나갔어야\
  \ 해”라는 기대를 내려놓으세요.  \n사랑이 원하는 대로, 당신을 통해 자유롭게 흘러가게 하세요."
