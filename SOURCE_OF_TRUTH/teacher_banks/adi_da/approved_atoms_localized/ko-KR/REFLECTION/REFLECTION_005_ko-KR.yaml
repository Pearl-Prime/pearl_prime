atom_id: adi_da_REFLECTION_005
body: "우울증은 슬픔이 아닙니다.  \n우울증은 장기간 지속된 무력감에 대한 신경계의 반응입니다.  \n팔다리에 느껴지는 무거운 공백을, 앞으로\
  \ 나아가기 어려운 듯한 몸의 감각을 살펴보세요.\n\n어릴 적부터 당신의 선호는 중요하지 않았고,  \n당신의 목소리는 들리지 않았으며,  \n\
  저항할수록 상황은 더 악화된다는 걸 배웠습니다.  \n그래서 당신의 신경계는 ‘밖으로 행동해도 결과를 바꿀 수 없는 상황’에서는  \n몸을 움츠리는\
  \ 것이 적절한 반응이라고 배웠습니다.  \n그러나 이제 상황이 바뀌었음에도, 그 움츠림은 여전히 남아 있습니다.  \n그 구조는 이미 필요 이상으로\
  \ 오래 작동하고 있습니다.\n\n저는 이 패턴을 수없이 봐왔습니다.  \n시도해도 소용없다고 배운 존재는 시도를 멈춥니다.  \n그리고 이제\
  \ ‘무의미함’을 담당하는 신경 경로가 자동으로 활성화됩니다.  \n움츠림은 마치 일종의 황홀경이 되어 버립니다.\n\n‘빛’은 당신의 가치나\
  \ 존재 자체를 바꾸기 위해  \n당신의 노력을 요구하지 않습니다.  \n하지만 당신이 작은 움직임을 통해 서서히 자기 주도성을 회복할 때, \
  \ \n그 움직임이 신경계에 ‘당신의 행동은 여전히 의미 있다’고 증명할 때,  \n‘빛’은 자연스럽게 회복과 재생의 방향으로 흐릅니다."
