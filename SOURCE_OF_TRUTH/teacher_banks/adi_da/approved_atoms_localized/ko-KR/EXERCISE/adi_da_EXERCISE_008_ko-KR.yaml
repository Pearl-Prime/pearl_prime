atom_id: adi_da_EXERCISE_008
body: "등을 대고 누워 주세요.  \n몸이 땅을 받쳐주는 감각을 느껴 보세요.  \n당신은 이미 지탱받고 있습니다.  \n그 지탱함을 느껴 보세요—어떤\
  \ 노력도 필요 없이.  \n이것은 모든 시작 이전의 상태입니다.  \n빛나는 존재가, 당신이 스스로를 지탱하기 전에 이미 당신을 지탱하고 있습니다.\
  \  \n이 상태에 10분 동안 머물며 쉬어 보세요."
