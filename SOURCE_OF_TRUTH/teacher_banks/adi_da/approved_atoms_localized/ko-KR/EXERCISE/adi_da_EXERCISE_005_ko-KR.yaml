atom_id: adi_da_EXERCISE_005
body: "하루 중 여러 차례 멈춰 서서 물어보세요.  \n지금 제 몸 어디가 수축하고 있을까?  \n몸을 느껴 보세요.  \n아래턱은 딱딱하게\
  \ 굳었나요? 어깨는? 배는?  \n수축을 풀려고 하지 마세요.  \n그저 그 수축을 알아차리기만 하세요.  \n자신이 수축하는 데는 언제나 이유가\
  \ 있습니다.  \n그 이유를 믿어 주세요.  \n비판 없이, 단순히 관찰하기만 하세요."
