atom_id: adi_da_EXERCISE_007
body: "관계 속에서, 자아 수축을 거부하는 연습을 하세요.  \n물러나고 싶은 충동이 느껴질 때,  \n방어하거나 자신을 지키려는 마음이 일어날\
  \ 때, 잠시 멈추세요.  \n가슴으로 숨을 들이마셔요.  \n‘지금 이 순간에 머무르겠다’고 말하세요.  \n상대의 요구에 ‘예’라고 말하는\
  \ 것이 아니라,  \n관계 그 자체의 공간에 ‘예’라고 말하는 것입니다.  \n이 연습을 이번 주에 다섯 번 해보세요."
