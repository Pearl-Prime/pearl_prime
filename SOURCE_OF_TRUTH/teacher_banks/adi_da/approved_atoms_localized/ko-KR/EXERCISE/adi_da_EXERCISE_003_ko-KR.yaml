atom_id: adi_da_EXERCISE_003
body: "다른 사람과 마주 보거나 거울 앞에 앉습니다. 눈은 부드럽게 뜬 채로 유지합니다. 시선을 돌리지 않습니다.  \n상대를 당신을 바라보는\
  \ ‘빛나는 존재’로 봅니다.  \n이 시선을 거부하는 자아는 바로 ‘수축’입니다.  \n시선을 더 부드럽게 풀어갑니다.  \n세 분 동안 이\
  \ 상태를 유지합니다.  \n이것이 관계의 장입니다."
teacher:
