atom_id: adi_da_EXERCISE_006
body: "명상 자세로 앉습니다. 마음이 가라앉은 후, 몸 주변의 공간까지 인식을 넓혀 보세요.  \n피부 안쪽뿐 아니라, 바깥으로 퍼져나가는 그\
  \ 공간 전체를 느껴보세요.  \n그 공간으로 숨을 들이마십니다.  \n여러분은 그 공간과 분리되어 있지 않습니다.  \n그 공간이 여러분을 숨\
  \ 쉬게 합니다."
