atom_id: adi_da_EXERCISE_004
body: "눈을 감으세요. 코끝에서 호흡을 느껴보세요. 들이쉬는 순간은 시원하고, 내쉬는 순간은 따뜻합니다.  \n이곳은 안과 밖이 만나는 경계입니다.\
  \ 온 우주가 이곳을 통해 흐릅니다.  \n호흡을 조절하지 마세요. 단지 그 경계를 지나가는 호흡에 주의를 기울이기만 하세요."
teacher:
  teacher_id: adi_da
