atom_id: adi_da_EXERCISE_010
body: "지금 이 순간, 당신이 거부하고 있는 것을 알아차리세요.  \n감정을 거부하고 있나요? 다른 사람을 거부하고 있나요?  \n자신의 한계를\
  \ 거부하고 있나요?  \n그 거부에 주의를 기울이세요.  \n받아들이려고 하지 마세요.  \n거부 그 자체를 느껴보세요.  \n이는 몸이 하는\
  \ 하나의 움직임입니다.  \n그것을 이해하세요."
teacher:
  teacher_id: adi_da
  source_refs:
  - Not-Two Is Peace
  - The Transmission of Doubt
  synthesis_method: doctrine_grounded
