atom_id: adi_da_EXERCISE_002
body: "서서 땅에 닿은 몸의 무게를 느껴 보세요.  \n발바닥을 느껴 보세요.  \n발 아래 땅을 느껴 보세요.  \n중력이 몸을 끌어당기는\
  \ 감각을 느껴 보세요.  \n\n이 감각을 다리로, 배로, 가슴으로, 머리까지 천천히 위로 확장해 보세요.  \n\n당신은 땅입니다.  \n\
  무겁고, 지금 이곳에 있습니다.  \n\n이 중력 속에서 1분간 편안히 머물러 보세요."
