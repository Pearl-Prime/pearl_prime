atom_id: adi_da_EXERCISE_001
body: "눈을 감으세요.  \n가슴 뒤쪽 공간에 주의를 기울이세요.  \n여기가 심장 중심입니다.  \n흔히 막혀 있거나 방어적으로 굳어 있는\
  \ 느낌이 듭니다.  \n열려고 하지 마세요.  \n그 방어막 그 자체를 느껴보세요.  \n무엇을 지키고 있는 걸까요?  \n비판 없이, 그 보호의\
  \ 상태에 그대로 머무르세요.  \n그 방어막은 실패가 아니라, 지혜입니다."
teacher:
  teacher_id: adi_da
  source_refs:
  - The Knee of Listening
  synthesis_method: doctrine_grounded
