atom_id: adi_da_EXERCISE_000
body: "바르게 앉으세요.  \n호흡하세요.  \n몸이 긴장되는 부위를 느껴보세요—가슴, 목, 배입니다.  \n호흡을 바꾸려 하지 마세요.  \n\
  그 긴장을 싸우지 않고 그대로 관찰만 하세요.  \n이것은 브라이트가 스스로를 바라보는 순간입니다.  \n5분 동안 계속하세요.  \n긴장은 준비가\
  \ 되면 자연스럽게 풀릴 것입니다."
teacher:
  teacher_id: adi_da
  source_refs:
  - The Transmission of Doubt
  synthesis_method: doctrine_grounded
