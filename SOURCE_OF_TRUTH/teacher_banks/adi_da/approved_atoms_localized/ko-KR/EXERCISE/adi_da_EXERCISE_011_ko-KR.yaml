atom_id: adi_da_EXERCISE_011
body: "당신이 죽었다고 상상해 보세요.  \n몸은 사라졌습니다.  \n마음도 사라졌습니다.  \n그렇다면 무엇이 남아 있을까요?  \n남아 있는\
  \ 것을 느껴 보세요.  \n\n이것이 ‘빛’입니다.  \n이것은 태어나기 이전이며, 죽음 너머에 있습니다.  \n이 상태로 5분 동안 머물러\
  \ 주세요.  \n이것이 당신의 본래 상태입니다."
