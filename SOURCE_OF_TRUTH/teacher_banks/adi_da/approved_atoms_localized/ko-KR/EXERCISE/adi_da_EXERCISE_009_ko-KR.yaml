atom_id: adi_da_EXERCISE_009
body: "탐색을 멈추는 연습을 하세요.  \n하루에 한 번, 단 하나의 순간을 선택하세요.  \n변화를 향한 모든 노력을 잠시 멈추세요.  \n\
  명상도 하지 마세요.  \n연습도 하지 마세요.  \n자신을 다듬으려는 노력도 하지 마세요.  \n단순히 그대로 있는 것만으로 10분을 보내세요.\
  \  \n이것이 진정한 연습의 문턱입니다."
