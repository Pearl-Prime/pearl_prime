atom_id: adi_da_EXERCISE_001
body: "閉上雙眼。  \n將注意力帶到心臟後方的空間，那是心的中心。  \n這裡常會感覺被阻塞，或像穿著一層盔甲。  \n不必試圖打開它。  \n就去感受這層盔甲本身。\
  \  \n它在守護什麼？  \n持續安住於這份守護之中，不評判、不干預。  \n這層盔甲，是智慧，不是失敗。"
