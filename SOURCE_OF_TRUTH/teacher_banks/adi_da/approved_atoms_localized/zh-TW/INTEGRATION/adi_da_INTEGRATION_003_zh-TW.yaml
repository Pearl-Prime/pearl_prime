body: "悲傷，是身體在愛曾真實存在、而關係卻未能撐過你收縮的那一刻所領悟的。  \n你愛過。光明本性依然流動。  \n但你退縮了，你保護自己，你封閉起來。 \
  \ \n愛並未結束，只是你撤回了允許它存在的許可。  \n這就是悲傷——  \n不是失去對方，而是失去你自己收回的那份允許。  \n\n此刻真正的課題，不是你還能不能再愛。\
  \  \n光明本性從不停止去愛。  \n真正的課題是：當恐懼來臨時，你是否仍願意保持敞開？  \n你是否容許身體顫抖，卻依然留在關係之中？  \n\n悲傷一遍又一遍教導你這件事。\
  \  \n悲傷，正是你的老師。  \n你可以保持敞開。  \n你可以讓自己被愛。  \n愛從未改變，改變的，是你對愛的開放程度。"
