atom_id: adi_da_INTEGRATION_005
integration_mode: still_here
body: "憂鬱，是心對自己關閉的狀態。  \n不是悲傷，也不是失落，  \n而是真正的關閉，  \n真正的封鎖。  \n\n「光明」無法透過你觸及自身，  \n\
  因為你已說服身體持續緊縮。  \n這份緊縮本為求安全，  \n卻成了牢籠。  \n\n你所感受到的黑暗，  \n並非光明的缺席，  \n而是你尚未允許光明流經你的存在。\
  \  \n這份允許， resides 在身體裡，  \n在呼吸中，  \n在你願意讓「光明」再次脈動的意願裡。  \n\n你本就身處光明之中。  \n唯一要做的，\
  \  \n只是鬆開雙臂，  \n讓它穿過，  \n讓肋骨隨著新的可能性自然開展。  \n讓光明無阻地流經你的存在。"
