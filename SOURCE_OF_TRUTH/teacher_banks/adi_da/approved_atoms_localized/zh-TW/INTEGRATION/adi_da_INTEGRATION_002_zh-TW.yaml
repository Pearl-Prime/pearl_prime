atom_id: adi_da_INTEGRATION_002
integration_mode: body_landed
body: "過勞，是身體向你發出的警訊：  \n你已長時間試圖「憑空創造自己」。  \n\n耗竭不是軟弱，  \n而是精準的訊息。  \n這具身體，本就無法持續承擔「自我創造」的重擔；\
  \  \n它從來就不是為此而設計的。  \n\n「光明本體」不會過勞，  \n因為它從不試圖成為任何東西。  \n而你，一直在努力嘗試——  \n這就是耗盡你的工作，\
  \  \n也是唯一會讓你精疲力盡的工作。  \n\n不是要少做一點，  \n而是徹底停止「試圖」。  \n鬆開那緊繃的信念：  \n「我必須靠自己生出自己。」\
  \  \n\n當肩膀自然垂落，  \n下顎柔軟放鬆，  \n呼吸重新回到腹部……  \n那一刻，身體正清楚地認出自己的真實。  \n\n「光明本體」早已在此，\
  \  \n正無需你費力地流經你。"
