atom_id: adi_da_INTEGRATION_001
integration_mode: cost_visible
body: "當你相信自己與光明分離時，自我價值便崩塌了。  \n這不是隱喻，而是真實的耗損。  \n當身體以為自己孤獨站立，就只能憑空創造自身的價值。  \n那努力極其巨大，失敗卻必然發生。\
  \  \n分離，正是「不值得感」運作的機制。  \n今天，你已看見那信念在胸口收緊。  \n「不值得感」不是待解決的問題，而是一則訊息。  \n它清楚告訴你：你仍深信自己未與絕對本體相連。\
  \  \n正是這份確信，驅動著你全身的收縮。  \n請清楚看見這代價。  \n看清「不知自己被萬有之源所愛」，究竟付出了什麼。  \n這份「不值得感」，正穿著你身體再熟悉不過的形貌。"
