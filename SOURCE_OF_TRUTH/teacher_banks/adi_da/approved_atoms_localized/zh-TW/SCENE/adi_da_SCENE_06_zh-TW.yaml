atom_id: adi_da_SCENE_06
body: "夜晚籠罩房間。  \n你靜靜躺著，四周一片漆黑。  \n天花板隱沒在暗中。  \n身體毫無動靜。  \n思緒卻未曾停歇。  \n時間緩慢流逝。  \n\
  黎明遲遲不至。  \n你一動也不動。  \n黑暗徹底包圍著你。  \n你緩緩呼吸。  \n等待清晨到來。  \n但它始終未現。  \n你持續置身於黑暗之中。 \
  \ \n心，悄然敞開。  \n夜色越發深沉。  \n心靈歸於寧靜。  \n你完整地呼吸。"
