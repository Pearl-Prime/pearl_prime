atom_id: adi_da_SCENE_03
body: "食物放在你的盤子上。  \n四周人聲輕揚。  \n你身處人群之中。  \n你的身體，就在此刻，就在這裡。  \n但有某種東西，卻不在這裡。  \n你拿起叉子。\
  \  \n食物嘗起來毫無滋味。  \n你咀嚼，然後吞嚥。  \n附近有人笑了一聲。  \n你卻沒聽見。  \n你靜靜地吃著。  \n繼續緩慢地進食。  \n你始終非常臨在。\
  \  \n這頓飯，漸漸沉澱下來。  \n房間一片寧靜。  \n你的胸口，悄然敞開。"
