body: "丹尼爾對兒子說話時，赫然發現自己正重複著父親當年說過的話——語調一模一樣，連那種欲言又止的壓抑感也如出一轍。這模式像被附身般，自動流過他全身。  \n\
  他第一次意識到：這不是他的本性，而是代代相傳的收縮反應。  \n「光明」為他顯現那個當下——他能清楚感覺到想退縮的衝動，同時也能選擇不同做法。  \n這不是靠意志力，而是因為真正看見了。\
  \  \n「光明」不替你做事，它只是讓你看見：當你不再緊抓著家族遺留的收縮模式，生命還能如何展開。"
