body: "一名學生坦承：「我的尋求從未停歇。我從一位老師轉向另一位老師，從一種修習轉向另一種修習。」  \n阿迪達點點頭：「這尋求本身，就是收縮。你正逃離那本已當下顯現的光明。\
  \  \n本初合一，並非待你達成的目標；它正是此刻覺知所立足的根本。  \n停止朝向一個缺席的神明去尋求，  \n就在此刻，安住於那早已遍滿一切的光明之中。」"
