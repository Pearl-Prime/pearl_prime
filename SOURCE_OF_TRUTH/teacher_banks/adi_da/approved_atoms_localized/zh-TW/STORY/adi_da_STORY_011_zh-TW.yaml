body: "一名學生問：「我該如何持續停留在那份連結之中？」  \n阿迪達告訴他：「你做不到。這正是誤解所在。  \n那份連結，並非一個你能抵達、並長久停留的處所；\
  \  \n它就是你本然的樣貌。  \n只要你一試圖抓住它，收縮便再度生起。  \n但請留意：你察覺這一點的速度，正越來越快；  \n你的覺知力，正變得更加敏銳；\
  \  \n你從收縮中回歸連結的速度，也越來越快。  \n這，才是真正的成長——  \n不是達成某種成就，而是更清晰地認出實相。」"
