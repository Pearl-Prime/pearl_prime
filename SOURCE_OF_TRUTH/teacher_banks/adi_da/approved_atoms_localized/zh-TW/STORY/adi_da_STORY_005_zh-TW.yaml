body: "一位學生述說自己多年來感情屢屢失敗。阿迪達說：  \n「你一直帶著一種模式——想透過他人獲得救贖。  \n起初，你以為所愛之人能填滿你；  \n當這期待落空，你就責怪對方；\
  \  \n接著，你選擇離開。  \n這個循環由來已久。  \n它其實是『自我』的收縮，妄想藉由另一個人來消融自己。  \n所有關係，終究都是同一場相遇——與你自己相遇。\
  \  \n除非你真正明白這一點，否則這模式將不斷重演。  \n而對方，永遠是你遺棄自己的那面鏡子。」"
