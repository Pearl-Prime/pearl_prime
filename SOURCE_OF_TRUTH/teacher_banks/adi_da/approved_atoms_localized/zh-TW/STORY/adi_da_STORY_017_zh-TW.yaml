body: "萊拉察覺到，自己總是在成就周圍緊繃收縮，緊緊抓住它們，彷彿那是自身價值的證明。  \n光明不需要她的成就，甚至根本不需要她。  \n這份覺察，悄然裂開了一道縫。\
  \  \n她一直忙著成為「重要的人」，卻忘了——自己本來就重要。  \n不是因為她做了什麼，而是因為她就是她。  \n那種圍繞「成為」而生的緊繃，終於可以放下了。"
