body: "一位學生靜坐不語，忽然感受到那光明、廣大、恆常不變、從未被他的尋求所觸動的存在。  \n他將這體驗告訴阿迪達老師，老師點點頭說：  \n「這就是你本來的狀態。你並未『達成』它，只是停止了對它的干擾。\
  \  \n剛才那一瞬間你所感受到的主動性，並非出於你自身，而是光明本身的主動性，正透過你流現。  \n這就是一絲微光。別把它當成目標去追求；  \n一旦你伸手抓取，收縮感便會回來。\
  \  \n你只需如實安住於——本已在此的一切。」"
