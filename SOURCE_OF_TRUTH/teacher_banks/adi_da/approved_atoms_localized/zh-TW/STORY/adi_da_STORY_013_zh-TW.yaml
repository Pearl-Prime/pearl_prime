body: "當索菲亞臣服於虔敬時，她的肩膀自然垂落。  \n不是因為有人叫她放鬆。  \n身體清楚分辨：強迫的輕鬆，與釋放後的輕鬆，截然不同。  \n她的呼吸變得深長，雙手在膝上柔軟下來。\
  \  \n光明不需要她緊繃的努力。  \n真正的修練，就在這份順從之中。  \n她感受到自己曾耗費多少能量，對抗著整個宇宙；  \n而停下來，原來是如此簡單。"
