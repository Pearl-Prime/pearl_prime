body: "薇薇安察覺自己如何緊抓著控制不放：  \n不停檢查、重新整理、監控一切，只為防止任何事崩解。  \n她的思緒飛奔，下顎緊繃。  \n「光」讓她看見——這不是謹慎，而是恐懼。\
  \  \n而她越想掌控，恐懼就收得越緊。  \n有一天她終於明白：「光」一直穩穩托住一切。  \n她的努力毫無助益，只奪走內心的平靜。  \n於是，她開始練習一種徹底的行動：鬆開雙手。"
