body: "湯瑪斯靜觀自己的念頭，彷彿看著天上的雲。  \n有人告訴他，該改變這些念頭。  \n但「光明」並不需要念頭被改變，  \n只需要他認清：自己不是那些念頭。\
  \  \n\n他的整個身體一直緊繃著，  \n好像只要管住心念，就能得救。  \n\n當他真正看見「我並非念頭」的那一刻，  \n中間自然出現一道空隙。  \n\
  就在那道空隙裡，緊縮鬆開了。  \n他一直抓得太緊、太用力了。  \n那麼，如果他只是單純地看著呢？"
