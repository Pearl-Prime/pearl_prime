body: "詹姆斯靜坐不語，感受光明運作。  \n不是光明對他做什麼，  \n而是光明以他之身，自然運作。  \n\n「我在練習」的念頭，悄然轉為「光明正在練習」。\
  \  \n他的胸口自然開展，  \n呼吸變得自動而流暢。  \n\n只要他停止操控，臣服便即刻完成。  \n多年來，他總以為必須營造條件，才能迎接神聖顯現； \
  \ \n如今他明白：唯一阻擋神聖的，  \n正是自己緊縮的心——緊抓著「它該如何顯現」的執念。  \n\n鬆開吧。  \n光明，只透過那不再抗拒的人而行動。"
