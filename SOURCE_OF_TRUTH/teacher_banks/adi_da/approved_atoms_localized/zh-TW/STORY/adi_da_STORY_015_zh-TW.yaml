body: "艾蓮娜深愛她的伴侶，但一動念愛，便立刻感受到那收縮——  \n那緊抓、那黏著，還假裝成關懷。  \n她看著自己演繹忠誠，卻同時壓抑著更深的投入。  \n\
  「光」告訴她：這不是失敗。  \n這收縮，正是她來此要面對的。  \n毫無保留的愛，需要讓那個恐懼消亡的自我死去。  \n她的心，在那道門檻邊緣微微發緊。  \n\
  這份緊繃，正是她站在自由邊緣的樣子。"
