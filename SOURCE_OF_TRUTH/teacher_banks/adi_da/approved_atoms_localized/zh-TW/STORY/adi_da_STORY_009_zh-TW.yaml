body: "一位學員分享了一個突破性的時刻：  \n他看見「收縮」原來是一種選擇。  \n\n阿迪達說：  \n「對。現在你終於看清了——每一刻，你都在主動選擇收縮。\
  \  \n收縮並非發生在你身上，而是你正在做的事。  \n這份『看見』本身，就是釋放的第一步。  \n但別從這份看見中，硬闢一條修行之路。  \n許多人會執著於看清楚這個機制的過程，\
  \  \n甚至用它來證明自己靈性進步了。  \n其實，這機制就只是機制而已。  \n真正重要的，是那個明亮地『看見』它的本然。」"
