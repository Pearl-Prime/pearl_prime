body: "阿瑪拉死去了——死去了她以為的自己。  \n就在覺知的瞬間，她整個身份徹底收縮。  \n所有建立在「孤立自我」這片流沙之上的東西，此刻全都顯露出來。\
  \  \n她感受到光明，不在其下，而是作為一切的根基。  \n她花了多年，成為某個人；  \n如今，她成為無人。  \n這消融，同時是恐懼，也是自由。  \n\
  她的雙手顫抖，  \n心門敞開，超越一切容量。  \n此刻，光明正以光明本身運作——  \n沒有中介，也沒有「她」橫亙其中。"
