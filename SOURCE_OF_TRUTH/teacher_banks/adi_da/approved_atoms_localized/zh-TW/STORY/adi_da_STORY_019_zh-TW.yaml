body: "雪紀觀察自己尋求的模式。  \n她從一種練習換到另一種，從一位老師轉向另一位，  \n總在尋找那個「終於能帶來改變」的方法。  \n\n每一次，新練習都變成另一個收縮。\
  \  \n光明讓她看見：所有尋求，都是同一個結。  \n她並非生來就在尋求，  \n而是因受傷，才開始尋求。  \n那道傷，緊緊纏繞著她所失去的東西。  \n\n\
  只要她還在尋找光明，  \n就無法真正遇見它。  \n她的安住，成了唯一的練習。"
