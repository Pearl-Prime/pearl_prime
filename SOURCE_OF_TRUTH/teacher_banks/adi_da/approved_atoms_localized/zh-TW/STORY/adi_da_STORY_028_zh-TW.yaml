body: "馬特歐禱告時，整個身體都會改變。  \n長久以來卡在肩膀、頸部與下背的緊繃，全都鬆了下來。  \n這不是因為禱告能「修復」什麼，  \n而是因為在這份虔敬的姿態中，他停止了收縮。\
  \  \n他允許自己接納。  \n雙手自然張開，呼吸慢慢變長，腹部也柔軟下來。  \n光明不需要一具「完美」的身體，  \n它需要的，是一具願意展開的身體——\
  \  \n朝向神聖，徐徐展開。"
