body: "尼可拉斯察覺到自己的表現模式。  \n他緊繃著，只為「有用」，只為「被需要」。  \n一旦不表現，他就覺得自己一無是處。  \n「光明」讓他看見：這不是愛，而是生存策略。\
  \  \n他早年的愛，是有條件的。  \n所以他學會用努力去換取愛。  \n如今，他的整個身體都纏繞在「必須卓越」的緊繃裡。  \n看見這個模式，就是第一道敞開的縫隙。\
  \  \n那緊繃，不再主宰他。  \n他能感覺到它，也能選擇其他可能。"
