body: "以撒走進自己內心的聖殿，才發現它一直以來都是空的。  \n不是缺乏光明，而是空的——  \n因為他始終站在門前。  \n\n他的整個身體開始移動。 \
  \ \n他往旁邊讓開。  \n\n湧入的，不是他主動去做的；  \n是光明，自然湧入。  \n\n他的神經系統在一瞬間學會了：  \n多年修行都未能教會它的事。\
  \  \n\n那曾緊緊束縛他的收縮，  \n原來根本不需要，  \n甚至從來就不真實。  \n它消融了。  \n\n他只是站著，  \n成為一道透明——  \n\
  光明便由此透射而出。"
