body: "一名學生靜坐冥想，卻只感到麻木。  \n他將這狀況告訴阿迪達老師，老師說：  \n「這麻木是一種策略。你的身體學會了關閉自己，來保護你遠離難以承受的感受。\
  \  \n這是生命體的智慧。  \n但如今，這份保護已成了牢籠。  \n容許自己去感受身體對光明的反應。  \n感受，是認知的第一道門檻。」"
