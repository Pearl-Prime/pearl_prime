body: "當拉斐爾敞開自己，迎向光明時，  \n他的下顎放鬆了。  \n腹部自然舒展。  \n自童年起便盤踞在胃部的緊繃感，開始消融。  \n不是靠更用力，而是透過放下。\
  \  \n他的整個身體，曾是一隻盛滿虔誠的容器，  \n緊到成了牢籠。  \n臣服，是讓牆壁倒塌。  \n是感受自己的渺小，  \n也感受光明的浩瀚。  \n\
  他的神經系統漸漸學會：  \n它一直緊抓不放的東西，現在可以安心放下了。"
