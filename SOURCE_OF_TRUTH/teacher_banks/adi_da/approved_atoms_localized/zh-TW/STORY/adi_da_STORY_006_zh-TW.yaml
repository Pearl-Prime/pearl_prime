body: "一名學生害怕死亡。阿迪達告訴他：「你時時刻刻都在死亡。每一次呼吸，都是死亡。  \n每一刻，過去的你都已消逝。這是你無法逃脫的規律——自我不斷被釋放，也持續在轉變。\
  \  \n你緊抓著形相，但光明本身卻無形無相。它先於身體而存在，也能不依賴身體而繼續存在。  \n死亡並非你所恐懼的中斷，而是你一生以來所有收縮的最終釋放。」"
