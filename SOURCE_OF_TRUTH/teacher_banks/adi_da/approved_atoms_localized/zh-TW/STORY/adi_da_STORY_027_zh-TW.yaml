body: "克萊爾感受到自己的防衛機制。  \n當她被批評時，臉部肌肉如何僵硬；  \n當別人無法理解她時，胸口如何緊縮。  \n這些防衛，過去曾是必要的。  \n\
  但如今，它們阻擋了光明的流動。  \n她不需要用強力去剷除它們，  \n只需如實看見它們——  \n看見每一次收縮，耗費了多少能量。  \n在這份看見之中，疲憊自然浮現；\
  \  \n而有時，就在這清晰可見的瞬間，  \n身體會微微鬆開一點點。"
