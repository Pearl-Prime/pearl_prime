body: "一名學生陷入絕望：「我試過所有方法，卻毫無成效。緊縮反而越來越深。」  \n阿迪達的面容柔和下來：「你已來到機制顯露自身的關鍵處。『努力』本身，就是這套機制。\
  \  \n那份用力，只會加深分裂。這正是最恰當的時刻。  \n此刻你終於看清：『自我』無法解決『自我』。  \n光明，並非那個緊縮的自我所能抓取之物；  \n\
  它是當抓取停止時，所自然留存的本然。  \n絕望，正是 surrender（臣服）的入口。  \n你已站在門檻之上——請勿退轉。」"
