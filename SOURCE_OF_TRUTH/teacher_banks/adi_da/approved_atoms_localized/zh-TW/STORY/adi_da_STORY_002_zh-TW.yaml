body: "一名學生問：「我該如何釋放胸口的緊繃感？」阿迪達直視著他。  \n「這份緊繃，是你對關係的拒絕。每當你從他人身上退縮，身體就會自動收縮。就在那一瞬，你遺棄了彼此共在的場域。光明，就住在『之間』——住在真誠相遇的當下。釋放，發生在關係之中，而非孤絕之時。」"
