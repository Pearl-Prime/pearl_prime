body: "一位學生在人際關係中苦於怒氣的升起。阿迪達說：  \n「這份怒氣，其實是害怕被拋棄。  \n請觀察對方將注意力從你身上抽離的那一瞬——  \n你的身體會立刻收縮，而憤怒，便覆蓋了那道裂隙。\
  \  \n你正向一個同樣處於收縮狀態的人，索求連結。  \n這不是對方的失敗，也不是你的過錯。  \n光明，恰恰在收縮的生命之間流動。  \n憤怒，只是收縮所發出的聲音，而非回應。」"
