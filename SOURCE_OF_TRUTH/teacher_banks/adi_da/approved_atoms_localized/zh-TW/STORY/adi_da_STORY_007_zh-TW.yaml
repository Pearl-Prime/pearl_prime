body: "一名學生感到被自己心智的運作模式困住了。阿迪達觀察道：「你現在看見這套機制了。這就是進展。  \n自我，是一套依程式運作的機械系統。  \n這套程式，是過去每一個你感到不安全、不被看見、被遺棄的瞬間，所累積下來的收縮反應。\
  \  \n這個身心，正是那種收縮的證據。  \n但你不是這套機制。你是那光明本身，是覺察它的那個。  \n這機制無法靠用力去停止；它只會在臨在中轉化。」"
