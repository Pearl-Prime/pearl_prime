body: "加百列感受到自己的憤怒，卻看見這份憤怒被愛包裹著。  \n他因害怕失去所愛之人，而緊縮起來。  \n憤怒，正是這緊縮所發出的聲音。  \n\n當他看清這一點，內在便有了轉變。\
  \  \n「光明」向他顯示：在本然不二的境界裡，根本沒有「失去」可言。  \n那份恐懼是真實的，  \n但所謂的分離，從來就不曾真實存在。  \n\n他的胸口慢慢擴展開來，\
  \  \n憤怒自然消退——  \n並非壓抑，而是被照見：  \n原來這份防衛，本就無需存在；  \n因為在「光明」的領域中，  \n那種「失去」，根本不可能發生。"
