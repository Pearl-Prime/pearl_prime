atom_id: adi_da_REFLECTION_004
body: "當愛臨在，你的界線消融了。  \n你學到：說「不」，就可能被拋棄。  \n於是，你成了那個彎下腰、承接一切、妥協退讓的人。  \n感受一下，做出這個選擇時，身體肌肉的緊繃。\n\
  \n界線不是牆壁。  \n界線是讓真實相遇得以發生的結構。  \n界線說：「我在這裡，但我不是你。」  \n界線說：「我的能量，流到這裡，也只到這裡。」  \n\
  若失去這份清楚，你所稱的「愛」，便會悄悄轉為義務與怨懟。\n\n我觀察到，缺乏界線的人身上那種收縮感，並非焦慮。  \n那是持續不斷的努力——努力維持一個早已變得透氣、模糊、輪廓不清的自我。\
  \  \n光明，只認得清晰的分際；  \n清晰，正是它的本性。\n\n你的界線，從來不是自私。  \n你的清楚明白，反而讓他人有機會遇見真正的你，  \n而不是你為了逃避被拋棄，而辛苦搭建起來的那套防護裝置。"
