atom_id: adi_da_REFLECTION_001
body: "自我價值，不在思慮中生起；  \n它在你全心奉獻於比自身更偉大的事物時，自然湧現。  \n請用心去感受——不是概念，而是真實的「給予」感。\n\n你曾被教導：你的價值，來自成就與表現；\
  \  \n你曾被教導：愛必須靠足夠的付出、足夠的卓越、足夠的證明，才能換來。  \n這套教導，一開始像一道傷口，後來卻成了你活著的方法。  \n你不停追求更多、更好、更快，深信只要再完成一件大事，就能終於確認：「我，真的重要嗎？」\n\
  \n光明，在你尚未表現之前，就已認出你。  \n這份認出，你無法爭取，因為你本來就擁有。  \n你能做的，是停下來——停下那阻擋你感受它的動作；  \n你能做的，是覺察：你正躲在哪裡，逃避自己內在的光？\
  \  \n因為那光芒，讓你覺得危險、赤裸、孤單。\n\n當你真正安住於對超越自身的存在的奉獻，  \n你的價值，便不再繫於你產出了什麼。"
