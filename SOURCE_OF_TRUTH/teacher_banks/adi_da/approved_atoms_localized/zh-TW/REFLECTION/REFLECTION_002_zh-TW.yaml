atom_id: adi_da_REFLECTION_002
body: "過勞不是疲憊，  \n而是身體拒絕再說謊。  \n你的耗竭，其實在清楚地說話：  \n你過去搭建的生命架構，已不再適合你此刻真實的生活。\n\n請留意——\
  \  \n你還在哪裡，硬要違背能量與休息的自然節奏？  \n你還在哪裡，嘴上說「好」，身體卻早已喊「不」？  \n你還在哪裡，為了想像中的責任，犧牲了眼前真實的需要？\
  \  \n這些，都不是你個人的失敗。  \n它們只是曾在特定條件下形成的習慣，  \n而那些條件，很可能早已不存在了。\n\n我見過許多人，耗盡自己，只為服從內在化的一道命令——\
  \  \n那命令，早已脫離現實的外在需求。  \n它變得自主運作，自行驅動。  \n你仍在追逐某些聲音的認可，  \n而那些聲音，或許早已沉默多年。\n\n光明，正召喚你走向修復。\
  \  \n這修復，不只靠休息，  \n更靠一種徹底的誠實：  \n誠實地面對——你此生真正要做的事，  \n versus 你腦中迴盪不息、執意要你去做的事。"
