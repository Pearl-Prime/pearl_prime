body: "你的焦慮存在於收縮之中。  \n我觀察到：肩膀緊繃、呼吸停在肺部最上方、小腹緊握成拳。  \n請留意，此刻你的身體正在哪個部位用力抓緊。\n\n這種收縮不是錯誤。\
  \  \n它是你內在最深的智慧，正試圖在瓦解感來臨時，把你穩住、撐住。  \n你曾學到：放鬆，就等於崩解。  \n你也曾學到：保持警覺，才能保全自己。\n\n\
  我看過數千人身上都有同樣的結構。  \n這模式說：「只要我夠緊繃，意外就不會突破防線；只要我持續監控，就能掌控一切。」  \n但緊繃本身，就是一種瓦解。  \n\
  持續監控，終將耗盡那個監控的力量。\n\n你焦慮背後的光明，始終朝向你而來。  \n它不催促你放鬆。  \n它邀請你去看見：你正在保護自己免於什麼？  \n而這份保護，是否仍真正適用於你此刻真實的生活條件？"
