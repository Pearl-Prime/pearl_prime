body: ある生徒が、長年にわたる失敗した人間関係について語ります。アディ・ダはこう言います。「あなたは、他者を通して救いを求めようとするパターンを抱えています。まず、愛する人が自分を満たしてくれるはずだと期待します。それが叶わないと、相手を責め始めます。そして、去っていくのです。この繰り返しは、とても古いものです。それは、自己が自らの消滅を、他者を通して求めようとする収縮です。すべての人間関係は、結局のところ、自分自身との出会いです。このことに気づかなければ、あなたは同じパターンを繰り返し続けます。他者は常に、あなたが自分自身を捨ててきた姿を映す鏡なのです。」
