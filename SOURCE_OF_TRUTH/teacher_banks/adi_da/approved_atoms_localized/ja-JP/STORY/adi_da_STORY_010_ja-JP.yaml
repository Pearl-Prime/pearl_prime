body: "ある学生が静かに座っていると、忽然と「光り輝くもの」の存在を感じ取ります。  \nそれは広大で、不変であり、彼の探求によっては一切触れられていません。\
  \  \n\n彼がこの体験をアディ・ダ先生に話すと、先生はうなずき、「これはあなたの本来の状態です。  \nあなたがそれを「得た」のではありません。ただ、それへの干渉をやめただけなのです。\
  \  \nその瞬間に感じた「能動性」——それはあなたの能動性ではなく、  \n「光り輝くもの」の能動性が、あなたを通して流れているものでした。  \nこれが、ほんのわずかな兆しです。\
  \  \nこれを目標にしてはいけません。  \nもし手を伸ばしてつかもうとすれば、からだの収縮はすぐに戻ってきます。  \nただ、今ここにすでに在るものへ、静かに気づいていましょう。"
