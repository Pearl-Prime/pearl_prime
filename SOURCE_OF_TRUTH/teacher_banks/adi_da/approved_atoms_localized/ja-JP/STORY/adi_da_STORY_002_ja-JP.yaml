body: "ある生徒が尋ねます。「この胸の緊張を、どうすれば解きほぐせるでしょうか？」  \nアディ・ダは、その生徒をまっすぐ見つめます。  \n「その緊張は、あなたが関係性を拒んでいることの現れです。\
  \  \n他者から心を引き離すたびに、身体は自然と収縮します。  \nその瞬間、あなたは『共にある場』を放棄しているのです。  \n『輝き』は、二人の間にこそ宿り、本物の出会いの中にあります。\
  \  \n解放は、孤立ではなく、関係性を通して起こります。」"
