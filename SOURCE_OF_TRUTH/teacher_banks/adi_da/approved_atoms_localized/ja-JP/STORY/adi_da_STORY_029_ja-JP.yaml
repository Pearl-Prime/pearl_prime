body: "ビビアンは、自分がコントロールに身を縮めていることに気づきます。  \n何度も確認すること。  \n物の並びを何度も直すこと。  \nすべてを監視して、何も崩れないようにと必死になること。\
  \  \n\n頭の中はぐるぐる回り、アゴの筋肉はこわばります。  \n「ブライト」は彼女にこう伝えます——これは慎重さではありません。恐怖です。  \nそして、コントロールしようとすればするほど、その恐怖はより強く彼女を締めつけます。\
  \  \n\nある日、ビビアンは気づきます。  \nずっと、すべてを支えていたのは「ブライト」だったと。  \n自分の努力は何も加えていません。  \nただ、自分の平安だけを奪っているのです。\
  \  \n\nそこで彼女は、手を離すという、まったく新しい実践を始めます。"
