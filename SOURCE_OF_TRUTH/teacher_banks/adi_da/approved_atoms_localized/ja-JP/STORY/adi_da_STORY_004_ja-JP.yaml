body: ある学生が、人間関係の中で湧き上がる怒りに苦悩しています。アディ・ダはこう語ります。「その怒りは、見捨てられるのではないかという恐れです。相手が自分から注意をそらす瞬間を、静かに観察してください。そのとき、あなたの身体は縮こまり、怒りがその隙間を覆い隠します。あなたは、すでに縮こまっている相手に対して、関係性を求めています。しかし、それは相手の失敗でもなければ、あなたの失敗でもありません。『輝き』は、縮こまった者同士の間に広がる空間にこそ動き出します。怒りとは、身体の縮こまりが発する音であり、真の応答ではありません。」
