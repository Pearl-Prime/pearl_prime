body: "ある学生が座禅を組んでいて、ただ鈍さだけを感じていました。  \n彼がこのことをアディ・ダに伝えると、先生はこう言いました。  \n「その鈍さは、ひとつの戦略です。あなたの体は、耐え難い感覚からあなたを守るために、自らの働きを抑え込むことを学びました。これは、生命体としての知恵です。しかし今や、その守りが、かえってあなたを閉じ込める牢獄となっています。\
  \  \n光に触れたときの、あなたの体の反応を、そのまま感じてみてください。  \n感じること——それが、気づきへと至る最初のしきいです。」"
