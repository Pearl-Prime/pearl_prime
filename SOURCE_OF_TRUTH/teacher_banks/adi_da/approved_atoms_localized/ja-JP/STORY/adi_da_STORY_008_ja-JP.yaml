body: "ある生徒が絶望します。「私はすべてを試しました。何も効果がありません。収縮はむしろ深まるばかりです。」  \nアディ・ダの表情が和らぎます。「あなたは、この仕組みが自らを証明する場所に至りました。『試そうとする』という行為そのものが、まさにその仕組みなのです。努力すればするほど、分離は深まっていきます。これはまったく自然なことです。今、あなたには、『自分自身』が『自分自身』を解決できないことがはっきりと見えます。光輝（ブライト）とは、収縮した自己がつかみ取ることのできるものではありません。それは、つかむという行為がやんだときに残るものなのです。絶望こそが、委ねるという境地への入り口です。あなたは、その境界線上に立っています。振り返らないでください。」"
