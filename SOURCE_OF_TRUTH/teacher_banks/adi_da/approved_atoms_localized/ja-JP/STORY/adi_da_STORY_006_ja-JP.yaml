body: "ある学生が死を恐れています。アディ・ダは彼にこう語ります。「あなたは常に死んでいます。一息ごとに、あなたは死んでいるのです。  \n瞬間ごとに、これまでのあなたは消え去っています。これは逃れることのできない法則です。自我は常に解放され、常に変化し続けています。\
  \  \nあなたは形あるものにしがみついていますが、その「輝き」自体は、形を持たないものです。それは身体よりも前にあり、身体がなくなってもなお続きます。  \n\
  死とは、あなたが恐れているような中断ではありません。それは、あなたの一生を通して続いてきた収縮の、最後の解放なのです。」"
