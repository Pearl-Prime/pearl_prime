body: "ニコラスは、自分自身の「パフォーマンス」のパターンに気づきます。  \n彼は「役に立つこと」や「必要とされること」にからだを縮めています。  \nパフォーマンスをしていないとき、彼には自分が「何もない」と感じられるのです。\
  \  \n\n「ザ・ブライト」は彼に、これが愛ではないと示します。  \nこれは、生き延びるための戦略にすぎません。  \n彼が幼いころに体験した愛は、条件付きのものでした。\
  \  \nだから彼は、努力によってその愛を得ることを学んだのです。  \n\n今や、彼のからだ全体が「特別であるべきだ」という緊張でぎゅっと巻きついています。\
  \  \nこのパターンに気づくこと——それが、最初の小さな開きです。  \nその緊張が、もはや彼を支配しなくなります。  \n彼はその緊張を感じ取ることができ、そして、別の選択をすることができるのです。"
