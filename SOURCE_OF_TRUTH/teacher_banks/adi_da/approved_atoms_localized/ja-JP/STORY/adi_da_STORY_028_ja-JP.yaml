body: "マテオが祈りを捧げるとき、彼の全身が変化します。  \n肩、首、腰に長くこわばっていた緊張が、次第に和らぎます。  \nそれは祈りが何かを「直す」からではありません。\
  \  \n献身的な姿勢を取ることで、彼が無意識の緊張をやめ、受け入れる準備ができるからです。  \n手のひらが開き、呼吸が深まり、お腹の力が抜けて柔らかくなります。\
  \  \n「光」は完璧な身体を必要としていません。  \nただ、神聖なる方向へと自らを開こうとする身体を、静かに待っているのです。"
