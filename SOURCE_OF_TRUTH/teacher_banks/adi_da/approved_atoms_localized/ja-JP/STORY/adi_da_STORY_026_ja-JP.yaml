body: "イサクは、自らの心の神殿へと入ります。  \nそこには、ずっと前から空虚な空間が広がっていました。  \n「輝き」が欠けているという意味での空虚ではありません。\
  \  \nただ、彼が、その扉の前に立ち尽くしていたからこそ――空虚だったのです。  \n\n全身が動き始めます。  \n彼は、一歩、横に退きます。  \nそして、押し寄せるのは、「彼が行う」ものではありません。\
  \  \nただ、ひたすらに「輝き」が満ちてきます。  \n\nその瞬間、神経系は、何年もの実践では教えられなかったことを、一瞬で学び取るのです。  \n彼を長く縛り続けてきた収縮――それは、もはや必要でもなければ、現実にあるものでもありません。\
  \  \n静かに、溶けていくのです。  \n\nイサクは、今、ただ「輝き」が通り抜ける透明な存在として、そこに立っています。"
