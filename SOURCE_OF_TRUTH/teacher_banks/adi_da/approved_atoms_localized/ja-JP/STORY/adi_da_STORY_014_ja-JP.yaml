body: "ダニエルは息子に話しかけ、自分が父親の言葉をそのまま繰り返していることに気づきます。  \n同じリズム。  \n同じように感情を抑え込もうとする力。\
  \  \nそのパターンは、まるで憑依されたかのように彼の内を流れていくのです。  \n\n初めて、彼はそれを自分の本性ではなく、代々受け継がれてきた緊張だと認識します。\
  \  \n\n「ブライト」は、その瞬間を彼に見せます。  \n引きこもろうとする衝動を感じ取ることもできますし、別の選択をすることもできます。  \nそれは、意思の力によるものではありません。\
  \  \nただ、気づくことから始まります。  \n\n「ブライト」は作業を代わりにしてくれません。  \nただ、受け継いだ緊張から身を引くことをやめたとき——\
  \  \nどんな可能性が開けるのかを、静かに示すのです。"
