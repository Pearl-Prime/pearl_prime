body: "ガブリエルは自分の怒りを感じ取りますが、その怒りが愛に包まれていることに気づきます。  \n彼は、大切な人を失うことを恐れて、心を縮こまらせていました。\
  \  \nその怒りは、縮こまった心の声なのです。  \n\nこの気づきが訪れたとき、何かが変わります。  \n「光」は彼に、もともと「二つではないもの」を失うことは決してないと示します。\
  \  \n恐怖は確かにありました。  \nしかし、分離はそもそも現実ではなかったのです。  \n\n彼の胸が広がります。  \n怒りは消え去ります。  \n抑えられたのではありません。\
  \  \n「光」の領域においては起こり得ない喪失に対する、不必要な防衛であることが明らかになったのです。"
