body: "マルクスは鏡の中の自分を見つめ、口元のこわばりに気づきます。  \n「もっと笑顔を向けなさい」「前向きでいなさい」と、これまで何度も言われてきました。\
  \  \nでも、「ブライト」は、表面的な明るさを求めてはいません。  \nその緊張こそが、メッセージなのです。  \n彼の顔には、自分が他人の理想に合わせるために、何度となく自分を縮めてきた物語が刻まれています。\
  \  \n「ブライト」は、そのような「抑えること」を確かに見ています。  \nその「見る」ことが、すべての始まりです。"
