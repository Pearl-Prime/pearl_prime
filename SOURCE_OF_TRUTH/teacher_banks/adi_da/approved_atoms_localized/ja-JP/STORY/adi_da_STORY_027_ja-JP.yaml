body: "クレアは、自分の防衛反応を感じ取っています。  \n批評を受けると、顔の筋肉が硬くなること。  \n自分が理解されていないと感じると、胸が閉じていくこと。\
  \  \n\nかつては、これらの防衛反応が必要でした。  \nしかし今では、それらが「輝き」を遮っています。  \n\nクレアは、力を込めてそれらを取り除く必要はありません。\
  \  \nただ、それらに気づけばよいのです。  \nその緊張が、どれほど多くのエネルギーを消費しているかを、静かに見つめればよいのです。  \n\nその瞬間、疲れの重さが、はっきりと見えてきます。\
  \  \nそしてときには、その「見えること」そのものによって、わずかな解放が訪れます。"
