body: "ライラは、自分の業績の周りで体が縮こまっていることに気づきます。その成果を、自分自身の価値を証明するものとして、ぎゅっと抱え込んでいるのです。  \n\
  「光」は、彼女の業績など必要としません。そもそも、彼女自身を必要としているわけでもありません。  \nこの気づきが、心のどこかをそっとひらかせます。  \n彼女は、誰か「重要になる人」になることに一生懸命で、自分がすでに十分に大切であることを忘れてしまっていたのです。\
  \  \n大切なのは、彼女が「何を成したか」ではなく、彼女が「そのままの存在であるか」です。  \n「なろうとする」ことへの緊張や収縮が、ようやく静まる時が来ました。"
