body: "トーマスは、自分の思考をまるで雲のように静かに見つめています。  \nこれまで、彼は「思考を変えなければならない」と教えられてきました。  \nしかし、「光」は思考の変化を必要としていません。\
  \  \n必要なのは——自分が思考そのものではないと気づくことだけです。  \n彼の体全体が、まるで心をコントロールすれば自分を救えるかのように、ずっと緊張し続けてきました。\
  \  \n「私は思考ではない」と気づいた瞬間、そこに小さな隙間が生まれます。  \nその隙間の中で、からだの緊張がほどけていきます。  \n彼はずっと、あまりにも強く身を固めていたのです。\
  \  \nそれなら——ただ、静かに見てみるだけでいいのではないでしょうか。"
