body: "アマラは、自分がそうだと信じていた存在から死にます。  \nその瞬間、彼女のすべてのアイデンティティが収縮します。  \n「分かれた自己」という砂の上に築き上げてきたものが、一斉にその姿を現します。\
  \  \n彼女は、その奥底に光り輝くものを感じます。  \n「奥底」ではありません。  \nすべてのものの基盤そのものとして、光り輝くのです。  \n彼女は長年にわたり、誰かになるために生きてきました。\
  \  \n今、彼女は「誰でもない者」になります。  \nこの溶解は、恐怖でありながら、同時に自由でもあります。  \n彼女の手は震えます。  \n心は限界を超えて開かれていきます。\
  \  \nこれは、媒介者も、彼女自身も介在しないまま、  \n光り輝くものそのものが、ただ光り輝いている瞬間です。"
