body: "ユキは、自分が「求め続ける」パターンに気づきます。  \n彼女は次々と実践を移り、先生を変わり、  \nついに違いを生む「その一つ」を探し続けます。\
  \  \n\nしかし、新しい実践を始めるたびに、  \nからだはまた硬直してしまいます。  \n\n「光」は彼女に示します——  \nすべての「求め」は、同じ結び目であると。\
  \  \n\n彼女はもともと、「求めること」で生まれたわけではありません。  \n傷ついたからこそ、求め始めたのです。  \n\nその傷は、失ったものにからだを引き寄せ、\
  \  \nさらに強く締めつけます。  \n\n「光」を求め続ける限り、  \n彼女は「光」と出会うことはできません。  \n\nそこで、彼女の「休息」そのものが、\
  \  \n新たな実践となります。"
