body: "ファラーは、自分の悲しみを感じ取り、それが体のどこで収縮しているかに気づきます。  \n胸のなかのこわばり。  \n喉の締めつけ。  \n彼女は、愛していた人を失いました。\
  \  \nその収縮は、自分自身が手放そうとしないというサインです。  \n「ブライト」は、彼女に記憶を消すよう求めているわけではありません。  \n亡くなった人とともに、自分も死んでしまうのをやめるよう呼びかけているのです。\
  \  \n彼女の愛は、そのまま残っていてよいのです。  \nしかし、その愛を強く握りしめている限り、彼女は「ブライト」が紡ぎ続ける、かつて確かにあったものに対して、開かれていません。\
  \  \n彼女は、その握りをほどきます。  \n悲しみは消えません。  \nけれど、それは牢獄から、贈り物へと姿を変えていきます。"
