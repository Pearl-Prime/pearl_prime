body: "ある生徒が尋ねます。「そのつながりの場所にとどまるには、どうすればよいでしょうか？」  \nアディ・ダは彼に言います。「それはできません。それが誤解なのです。つながりの場所とは、あなたが到達してそこにとどまるような場所ではありません。それは、あなたそのものなのです。\
  \  \nその場所を「保とう」と思う瞬間、あなたは再び収縮を生み出しているのです。  \nしかし、気づいてください。あなたは今、それをより素早く認識できるようになっています。\
  \  \n主体性が鋭さを増しています。収縮から戻ってくる速度も速くなっています。  \nこれが成長です。達成ではなく、気づきなのです。」"
