body: "エレナはパートナーを愛していますが、その瞬間、体の緊張を感じ取ります。  \n握りしめる力。  \nまるで思いやりに見える、でも実際は執着である「つかむ」動き。\
  \  \n彼女は、深さを抑えながら、献身を演じる自分を見つめています。  \n「ブライト」は彼女にこう教えます。  \nこれは失敗ではありません。  \nこの緊張こそが、彼女がここに来た理由なのです。\
  \  \n何もかもを捧げる愛とは、消滅を恐れる自我を手放すことです。  \nその境目に立ったとき、彼女の心はぎゅっと縮みます。  \nこの縮みこそが、自由への一歩手前の瞬間なのです。"
