body: ある生徒は、自分自身の心の仕組みに閉じ込められたと感じています。アディ・ダはこう観察します。「今、あなたはその仕組みを見ることができました。これは進歩です。『自己』とは、プログラム通りに反応する機械的なシステムです。そのプログラムとは、これまでに感じたすべての不安、無視された体験、見捨てられた体験から蓄積された収縮です。この身体・心こそが、その収縮の証です。しかし、あなた自身はその仕組みではありません。あなたは、それを静かに見つめる『輝き』そのものです。この仕組みは、力で止めることはできません。ただ『今ここにいること』によって、やがて変化していくのです。」
