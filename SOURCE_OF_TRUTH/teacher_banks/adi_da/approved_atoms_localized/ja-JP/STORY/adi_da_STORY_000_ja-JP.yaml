body: "ある学生がアディ・ダに近づき、こう言います。「何年も修行を続けてきましたが、何も変わった気がしません。」  \nアディ・ダの目は静かにその学生にとどまります。「あなたはすでに、変わっているのです。光り輝く存在は、すでに働きかけています。あなたが『修行』と呼んでいるものは、欠けている何かを求める努力ではありません。それは、あなたの中にすでに備わっている神聖なるものとの一体性が、次第にはっきりと現れてくる過程なのです。あなたが感じている緊張や収縮は、失敗ではありません。それは、自分自身が自分の限界に気づき始めた瞬間なのです。」"
