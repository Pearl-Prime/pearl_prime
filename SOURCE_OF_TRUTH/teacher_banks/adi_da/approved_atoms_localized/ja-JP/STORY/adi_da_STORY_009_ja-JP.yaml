body: ある生徒が、収縮が「選択」として明確に見えるようになった瞬間を報告しました。アディ・ダは言います。「そうですね。今、あなたは、その収縮を、すべての瞬間に自ら選んでいることに気づいたのです。収縮は、あなたに『起こっている』ものではありません。それは、あなたが『行っている』ことです。この気づきそのものが、解放へと向かう最初の一歩です。しかし、この気づきから『道』を作らないでください。多くの人が、この仕組みを見るという体験に執着し、それをもって自分を霊的に進化したと感じてしまうのです。しかし、その仕組みは、単なる仕組みにすぎません。その仕組みを『見る』光そのものが、何より大切なのです。」
