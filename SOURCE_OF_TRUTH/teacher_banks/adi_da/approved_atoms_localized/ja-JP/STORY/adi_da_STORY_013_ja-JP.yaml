body: "ソフィアが献身に身を委ねると、肩の力が自然と抜ける。  \n誰かに「リラックスしなさい」と言われたからではない。  \n体は、「無理に力を抜こうとする」ことと、「本当に解放される」ことの違いを、ちゃんと知っている。\
  \  \n呼吸が深まり、手のひらも膝の上でやさしくほぐれていく。  \n「光」は、彼女のぎこちない努力など必要としていない。  \nむしろ、身を委ねることが、その実践なのだ。\
  \  \n彼女は、これまでどれほど宇宙に抵抗して力を注いできたかを、今、感じ取る。  \nやめることのほうが、どれほどシンプルで楽なのか——。"
