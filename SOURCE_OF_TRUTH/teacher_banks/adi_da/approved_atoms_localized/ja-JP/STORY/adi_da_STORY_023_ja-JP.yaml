body: "アデリンが「正しいこと」への執着を手放すと、肩の力が抜けていきます。  \n彼女はこれまで、自分の意見を命のように守ってきたのです。  \n「間違っている」と感じることは、まるで落下しているような感覚でした。\
  \  \nしかし、それを支えているのは「光」です。  \n「正しい」というこだわりを手放した瞬間、その「光」がはっきりと感じられるようになります。  \n彼女の手が自然に開き、呼吸が深くなります。\
  \  \n今、彼女は気づきました。「正しい」という思い込みこそが、自分を守る鎧だったのだと。  \nでも「光」には鎧など必要ありません。  \n必要なのは、手放すことができる身体なのです。"
