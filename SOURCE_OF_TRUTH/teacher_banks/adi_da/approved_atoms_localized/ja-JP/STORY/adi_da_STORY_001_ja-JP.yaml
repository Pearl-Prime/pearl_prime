body: "ある生徒が打ち明けます。「私はいつまでも探しつづけています。一人の先生から別の先生へ、一つの修行から別の修行へと移り変わっています。」  \nアディ・ダはうなずき、「その探すという行為そのものが、収縮なのです。あなたは、すでにここにある輝きから逃げているのです。本来の一体性は、何かを達成すべきものではありません。それは、この気づきそのものの土台なのです。不在の神に向かって探すのをやめましょう。すでにすべてに満ちているこの輝きに、今、ただ在りましょう。」"
