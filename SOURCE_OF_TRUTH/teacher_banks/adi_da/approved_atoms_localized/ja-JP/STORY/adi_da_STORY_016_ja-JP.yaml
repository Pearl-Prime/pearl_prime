body: "ジェームズは静かに座り、『光』が作用しているのを感じます。  \n彼に対して何かをしているわけではありません。  \nただ、彼自身として作用しているのです。\
  \  \n\n「私が実践している」という感覚から、  \n「『光』が実践している」という感覚へと、  \nほんのわずかに移り変わるのです。  \n\n胸が自然に広がります。\
  \  \n呼吸は自発的になります。  \nそれをコントロールしようとするのをやめた瞬間、  \n surrender（委ねきり）は完全に訪れます。  \n\n\
  長年にわたり、彼は「神聖な状態」を生み出すための条件を  \n自分自身で整えなければならないと思っていました。  \n今、彼は気づきます。  \nその状態を妨げていたのは、\
  \  \n「こうあるべきだ」という思い込みによる、  \n自分の内側の収縮だけだったと。  \n\n手放しましょう。  \n『光』は、抵抗をやめた者を通して作用します。"
