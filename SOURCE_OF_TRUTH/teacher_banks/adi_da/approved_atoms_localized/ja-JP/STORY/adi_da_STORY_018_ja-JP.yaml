body: "ラファエルが「光」に心を開くと、あごの緊張が和らぎます。  \nお腹が自然に解きほぐされます。  \n幼少期からみぞおちにこわばっていた緊張が、少しずつ溶けていきます。\
  \  \nそれは、より強く努めることでではなく、ただ手放すことで起こります。  \n彼の体全体が、あまりにも深く捧げられた献身の器となり、気づけば牢獄のように固まっていたのです。\
  \  \n委ねるとは、その壁を静かに取り払うことです。  \n自分がいかに小さく、そして「光」がいかに広大であるかを、そのまま感じ取ることです。  \n彼の神経系は、これまでずっと抱え続けてきたものを、今なら安心して手放せると学び始めます。"
