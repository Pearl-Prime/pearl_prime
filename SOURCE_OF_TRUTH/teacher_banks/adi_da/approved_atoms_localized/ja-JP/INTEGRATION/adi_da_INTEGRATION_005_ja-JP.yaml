atom_id: adi_da_INTEGRATION_005
integration_mode: still_here
body: "うつ状態とは、心が自分自身に閉ざされるときに起こります。  \n悲しみではありません。  \n喪失でもありません。  \nまさに「閉じる」ことそのものです。\
  \  \nまさに「こわばり続ける」ことそのものです。  \n\nあなたを通して「光」が自分自身に届かなくなるのは、  \nあなたの体が、ずっと収縮したままいるよう説得されてしまったからです。\
  \  \nその収縮は、もともと「安全のため」に生まれました。  \nしかし今や、それは「牢獄」になってしまいました。  \n\nあなたが感じている暗さは、光の欠如ではありません。\
  \  \n光があなたの内を通り抜けることを、あなたが許していないというだけのことです。  \nこの「許可」は、体の中にあります。  \n呼吸の中にあります。 \
  \ \n再び「光」が脈打つことを、心から受け入れようとする意志の中にあります。  \n\nあなたはすでに「光」の中にいます。  \n必要なのは、ただ自分の腕をほどくだけです。\
  \  \nそれを、そのまま通すだけです。  \n新たな可能性とともに、肋骨が広がる感覚を味わってください。  \n抵抗せず、光があなたの内を通り抜けていくのを感じてください。"
