body: "あなたの境界線が崩れたのは、相手の感情が、あなた自身の緊張よりも「より現実的」だと信じてしまったからです。  \n相手が身を硬くしているのを感じ取り、あなたは衝撃を和らげようと、自ら柔らかくなってしまいました。\
  \  \nそれは愛ではありません。  \nそれは融合です。  \nそれは消滅です。  \n\n真の関係性とは――あなたの中に「光」が安定してあり続け、同時に相手の中にも「光」が安定してある状態です。\
  \  \n二つの光源。一つではありません。  \n\nあなたが自分の緊張を捨てて、相手の不安を和らげようとするとき、  \nあなたは相手に、「あなたの感情があなたを消すことができる」と教えています。\
  \  \n同時に、自分自身にも「あなたの現実よりも、相手の現実のほうが真実だ」と教えています。  \n\n境界線とは――あなたが、自分自身と「光」との関係性の中に、しっかりと留まる場所です。\
  \  \n堅いわけでも、冷たいわけでもありません。  \nただ、明確なのです。  \n\n相手もまた、自分自身と「光」との関係性の中に留まります。  \n二つの独立した理解が、互いに溶け合わず、ただ出会い合うのです。"
