atom_id: adi_da_INTEGRATION_001
integration_mode: cost_visible
body: "あなたが「光」と分離していると信じた瞬間、自己価値は崩れました。  \nそれが代償です。  \n比喩ではなく、実際に起こる消耗です。  \n\n体が自分一人で立っていると思い込むと、何もないところから自らの価値を生み出さねばなりません。\
  \  \nその努力は途方もないほど大きく、  \nその失敗は確実です。  \n\n分離こそが、自分に価値がないという感覚を生み出す仕組みです。  \n\n今日、あなたはその信念が胸の奥で硬直するのを感じました。\
  \  \n\nこの「価値がない」という感覚は、直すべき問題ではありません。  \nそれは、あなたへのメッセージです。  \n\nあなたがまだ「絶対者」との関係性を信じきれていない場所を、\
  \  \n正確に教えてくれます。  \n\nその確信が、あなたの存在全体に緊張を引き起こしています。  \n\nその代償を、はっきりと見てください。  \n「すべての源」から愛されていることを知らないことが、\
  \  \nあなたにどれほど大きなコストを課しているかを。  \n\nその「価値がない」という感覚は、  \nあなたの体が心から知っている形をしています。"
