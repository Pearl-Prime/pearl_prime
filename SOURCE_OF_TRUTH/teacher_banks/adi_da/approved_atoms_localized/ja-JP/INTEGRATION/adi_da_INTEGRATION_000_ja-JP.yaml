body: "今、収縮が目に見えるようになりました。  \nそれは失敗ではありません。  \nあなたがこれまで「関係性」を通して行ってきたことの、特有の痕跡です。\
  \  \n\n体が緊張するのは、衝撃から自分を守る方法を学んだからです。  \n誰かに向かって一歩踏み出したとき、その「本当の出会い」はいつも届きませんでした。\
  \  \nそこで体は、届かないという衝撃を防ぐために収縮したのです。  \n\nこのパターンは古く、確かに存在します。  \n今、あなたが気づいているのは、まさにその収縮が宿っている場所です。\
  \  \n\n「輝き（ブライト）」そのものは、収縮していません。  \nあなたは今、すでにその中にいます。  \n\n収縮は、あなたと他者との間の領域にあります。\
  \  \nそここそが、取り組むべき場所です。  \nそして、あなたはすでにそこにいます。  \n\nこここそが、もう一度始められる precisely な場所です。\
  \  \nここに、収縮を通してさえも確かに present している「輝き」があります。"
