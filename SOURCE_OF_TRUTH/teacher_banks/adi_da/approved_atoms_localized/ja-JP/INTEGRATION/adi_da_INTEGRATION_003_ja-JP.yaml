body: "悲しみとは、愛が確かに存在し、その関係があなたの収縮に耐えられなかったときに、体が知る感覚です。  \nあなたは愛しました。  \n光は動き続けました。\
  \  \nしかし、あなたは後ずさりしました。  \n守ろうとしました。  \n心を閉ざしました。  \n愛は終わっていません。  \nただ、あなたが愛を許すことをやめただけです。\
  \  \nそれが悲しみです。  \n他者を失ったことではありません。  \n自分が撤回した「許可」を失ったことです。  \n\n今、あなたに課せられた課題は――\
  \  \nもう一度愛せるかどうかではありません。  \n光は、愛することを止めません。  \n課題は――恐怖が訪れたとき、あなたが開いたままでいられるかどうかです。\
  \  \n体が震えても、なお関係の中にとどまれるかどうかです。  \n悲しみは、このことを何度も教えてくれます。  \n悲しみこそが、あなたの先生です。  \n\
  \nあなたは開いたままでいられます。  \nあなたは、自分を愛されるままにしておけます。  \n愛そのものは変わっていません。  \n変わったのは、あなたがそれに向ける\
  \ openness（開かれた姿勢）だけです。"
