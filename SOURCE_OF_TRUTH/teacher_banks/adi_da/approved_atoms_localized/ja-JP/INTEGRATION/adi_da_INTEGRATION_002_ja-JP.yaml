atom_id: adi_da_INTEGRATION_002
integration_mode: body_landed
body: "バーンアウトとは、あなたが自分自身を生み出そうとしてきた期間が長すぎることを、体が伝えるサインです。  \n消耗しているのは、弱さではありません。 \
  \ \nそれは正確な情報です。  \n生命体は、自分自身を創り出すという努力を、ずっと続けることはできません。  \nそもそも、その重荷を背負うようには設計されていません。\
  \  \n「輝き」は、燃え尽きません。なぜなら、「何かになろう」とはしないからです。  \nあなたは、ずっと「何かになろう」としてきました。  \nそれが、あなたの仕事でした。\
  \  \nそして、それを疲れさせる唯一の仕事です。  \n「やることを減らす」のではなく、  \n「なることをやめる」のです。  \n「自分自身を生み出さねばならない」という思い込みに伴う緊張を、すべて手放すのです。\
  \  \n肩が落ちるとき、  \n顎の力が抜けるとき、  \n呼吸が再びお腹に戻るとき――  \nその瞬間、体は自分の真実を知っているのです。  \n「輝き」はすでにここにあり、あなたの力を借りずに、ただ通り抜けていきます。"
