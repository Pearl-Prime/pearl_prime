atom_id: adi_da_REFLECTION_001
body: "自己価値は、思考から生まれるものではありません。  \n自分よりも大きなものへの献身から、初めて生まれます。  \n頭で考えるのではなく、心で感じてください。\
  \  \n「献げる」という概念ではなく、実際に体感する「与える感覚」を。  \n\nあなたは、自分の価値が「成果」や「パフォーマンス」から生まれると教えられてきました。\
  \  \n愛は、十分な働き、十分な優秀さ、十分な証拠によって「獲得」しなければならないと教えられました。  \nその教えは、傷としてあなたの内に根付き、やがて生き方へと変わります。\
  \  \nあなたは、もっと・より良く・より速くと追い求め続けます。  \nそして、一つひとつの達成が、ついに「自分は本当に大切なのか？」という問いに答えを与えてくれると信じています。\
  \  \n\n「輝き」は、あなたのパフォーマンス以前に、すでにあなたを認めています。  \nこの認められることは、獲得できるものではありません。  \nなぜなら、あなたはすでにそれを備えているからです。\
  \  \nあなたができることは――その認められることを感じるのを妨げている動きを、ただやめること。  \nあなたができることは――自分の内なる輝きから、なぜか身を隠してしまう場所に、静かに気づくこと。\
  \  \n輝きは、危険に感じられるから。無防備に感じられるから。孤独に感じられるから。  \n\n自分が及ばないほど大きなものへ、本気で心を捧げて休むとき――\
  \  \nあなたの価値は、もはやあなたの「生産」に依存しなくなります。"
