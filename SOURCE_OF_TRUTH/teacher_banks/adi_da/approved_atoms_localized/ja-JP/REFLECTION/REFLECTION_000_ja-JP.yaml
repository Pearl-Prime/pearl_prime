atom_id: adi_da_REFLECTION_000
body: "あなたの不安は、収縮の中にあります。  \n私はそれを、肩の緊張や、肺の一番上に留まっている呼吸、お腹に握られた拳の中に見ます。  \n今、あなたの体がどこで力を込めて\
  \ gripping しているか、気づいてみてください。\n\nその収縮は、間違いではありません。  \nそれは、崩れゆく状況に直面したとき、あなた自身を保とうとする、最も深い知性の働きです。\
  \  \nあなたは、「緩めること＝バラバラになること」だと学びました。  \n「警戒し続けること＝守られること」とも学びました。\n\n私は、何千人もの人が同じような身体の構造を抱えているのを見てきました。\
  \  \nそのパターンはこう語ります。「十分に緊張していれば、予期せぬものが押し入ってこない」  \n「常に監視していれば、私はコントロールを失わない」  \n\
  しかし、緊張そのものが、一種の崩れです。  \n絶え間ない監視は、監視する力を次第に消耗させます。\n\nあなたの不安の奥にある光（ブライト）は、いつもあなたに向かって近づいています。\
  \  \nそれは、あなたに「リラックスしなさい」とは言いません。  \n代わりにこう問いかけています。「今、あなたが守ろうとしているのは何ですか？そして、その守りは、今、実際にあなたが生きている状況にとって、まだ役立っているでしょうか？」"
