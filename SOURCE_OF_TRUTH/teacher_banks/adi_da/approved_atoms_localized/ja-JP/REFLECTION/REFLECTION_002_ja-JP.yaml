atom_id: adi_da_REFLECTION_002
body: "バーンアウトは単なる疲労ではありません。  \nバーンアウトとは、体がもう嘘をつかないという意思表示です。  \nあなたの疲れは、はっきりとした言葉で語っています。\
  \  \nあなたが築いた生活の構造は、今あなたが生きている現実にはもはや合わなくなっていると。  \n\nまず、自分自身のエネルギーと休息の自然なリズムに、今も無理に抗っている場所に気づいてください。\
  \  \n自分の体や心が「ノー」と言っているのに、口では「イエス」と答えている場所に気づいてください。  \nそして、実際にあるべきものではなく、頭の中だけで思い描いた義務のために、自分自身を犠牲にしている場所にも気づいてください。\
  \  \nこれらは、決してあなたの個人的な失敗ではありません。  \nこうしたパターンは、かつての特定の状況のもとで身についたものです。  \nその状況は、今やすでに存在しないかもしれません。\
  \  \n\n私は、多くの人が、もはや現実の外的必要性から生じていない内面化された要求に仕えるために、自らをすり減らしていくのを見てきました。  \nその要求は、やがて自律的に動き始めます。\
  \  \n自分で自分を駆り立て続けるのです。  \nあなたは、もはや沈黙しているかもしれない声の承認を、今も追い求めています。  \n\n「光」は、あなたを単なる休息ではなく、回復へと導こうとしています。\
  \  \nそれは、自分が本当にここですべきことと、頭の中のこだわりが「しなければならない」と主張することとの間で、ありのままの誠実さを持つことから始まります。"
