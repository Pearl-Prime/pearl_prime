atom_id: adi_da_REFLECTION_004
body: "愛の前では、あなたの境界線が溶けてしまいました。  \n「いいえ」と言うことは、見捨てられるリスクを意味すると学びました。  \nそこで、あなたは曲がり、受け止め、合わせる人になりました。\
  \  \nその選択が、どんな筋肉感を伴うか、感じてみてください。\n\n境界線は壁ではありません。  \n境界線は、本物の出会いを可能にする構造です。  \n\
  境界線とは——「私はここにいます。そして、私はあなたではありません」。  \n境界線とは——「私のエネルギーは、ここまでは届きます。ここからは届きません」。 \
  \ \nこの明確さがなければ、「愛」と呼んでいるものは、やがて義務や不満へと変わっていきます。\n\n無境界の人に見られる収縮は、不安とは異なります。  \n\
  それは、もはや透けて定義されない自己を、絶えず維持しようとする努力です。  \n「光」は、明確な区別を認識します。  \n明晰さこそが、その本質です。\n\n\
  あなたの境界線は、決してわがままではありません。  \nあなたの明確さによって、他者は、見捨てられることを恐れて築いた仮構ではなく、  \nありのままのあなたに出会えるのです。"
