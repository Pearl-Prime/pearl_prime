atom_id: adi_da_REFLECTION_005
body: "うつ病は、悲しみではありません。  \nうつ病は、長期間にわたる無力感に対する神経系の反応です。  \n手足の重さを感じてください。前に進むことが不可能に思える感覚に気づいてください。\n\
  \n幼い頃から、あなたの好みは重要でないと学びました。  \n声が届かないことを学びました。  \n抵抗しても、むしろ被害が大きくなるだけだと学びました。  \n\
  その結果、あなたの神経系は――外的な行動では状況を変えられないときには、縮こまることが「適切な反応」であると学んだのです。  \nそして、状況が変わっても、その縮こまりは続いています。\
  \  \nもはや必要のないところまで、その神経の構造が働き続けているのです。\n\n私は、このパターンを何度も見てきました。  \n試すことが無意味だったため、その人は試すのをやめました。\
  \  \nそして今では、「無意味さ」を司る神経回路が、自動的に活性化するようになっています。  \nその縮こまりは、一種のトランスへと変わります。\n\n「光」は、あなたの価値や存在そのものを変えるために、あなたに努力を求めてはいません。\
  \  \nしかし、小さな動きを通じて、少しずつ「自分の行動にはまだ意味がある」という感覚を取り戻すとき――  \nあなたの神経系がそれを実感できるとき――  \n\
  「光」は、自然と再生へと向かって動いていきます。"
