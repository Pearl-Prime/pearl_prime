atom_id: adi_da_REFLECTION_003
body: "悲しみとは、行き場を失った愛です。  \nその感覚を、のどに、肋骨に重くのしかかる重さとして感じてください。  \nあなたの悲しみは、どれほど大切だったかを示す尺度です。\n\
  \nかつてあなたは、悲しみは短く、内密で、コントロールされるべきだと教えられました。  \nあまりにも強く、あるいは長く感じるのは、あなたに何か問題があるからだとも言われました。\
  \  \nこうした教えが、悲しみの自然な完了を妨げています。  \n前に進むことのできない愛の力は、あなたの体に閉じ込められ、重さとなり、日常的に「普通」と見なされる緊張や収縮へと変わります。\n\
  \n私は、完全な悲しみを通り抜けていく人々が、その後、実際に軽やかに生きるようになるのを観察してきました。  \nそれは、喪失を忘れてしまったからではなく、愛がもはや閉じ込められておらず、あなたがそれを認めようと拒んでいることに押し戻されなくなったからです。\n\
  \n「光」は、あなたの喪失を、悲しみを「直さなければならない」と求めることなく、ただ静かに見守ります。  \n「もうここまでには立ち直るべきだ」と自分を責めるのをやめてください。\
  \  \n愛が、あなたを通して、必要とするままに流れるのを許しましょう。"
