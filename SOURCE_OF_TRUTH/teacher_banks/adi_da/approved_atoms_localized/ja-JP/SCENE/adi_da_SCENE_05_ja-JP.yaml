atom_id: adi_da_SCENE_05
body: "彼女は自分の悩みについて話します。  \nあなたは、その言葉に耳を傾けます。  \n彼女は一瞬黙り、あなたを見つめます。  \nあなたに対して、何かを期待しています。\
  \  \nあなたの喉の奥が、深く引き締まります。  \n彼女が何を望んでいるのか、あなたにはわかります。  \nでも、あなたはそれを口にしません。  \n沈黙が、二人の間に広がります。\
  \  \n彼女は再び口を開きます。  \nあなたは、ただ静かにしています。  \nその静けさが、さらに広がっていきます。  \nあなたは、その静けさを、すべて受け止めています。\
  \  \nあなたの心が、やわらかくなります。  \n静けさが、より深まっていきます。  \nその沈黙が、すべてを包み込んでいます。  \nあなたの心が、やわらかくなります。"
