atom_id: adi_da_SCENE_02
body: "道はとても狭い。  \n両側には木々が迫っている。  \n足元が、自然と道をたどっていく。  \n森は語らない。  \n胸の奥が満ちている。  \n\
  重さは肋骨の裏に静かに座っている。  \n一枚の葉がゆっくりと舞い降りる。  \n肩にそっと落ちる。  \nあなたはそれを払い落とさない。  \nただ、前へと歩き続ける。\
  \  \n森は、周囲で次第に深まっていく。  \n呼吸はゆっくりと、落ち着いていく。  \n道は、前方へと続いていく。  \n光が木々の間を通り抜けてくる。"
