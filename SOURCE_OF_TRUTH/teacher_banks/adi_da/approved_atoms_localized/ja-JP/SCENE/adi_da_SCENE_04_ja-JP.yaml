atom_id: adi_da_SCENE_04
body: "あなたは座布団に座っています。  \nホールはとても静かです。  \n周りには、ほかの人たちが座っています。  \nあなたの呼吸が、ゆっくりと出入りしています。\
  \  \n心の中はとてもざわついています。  \n姿勢が内側へと崩れていきます。  \nそこで、あなたは再び背筋を伸ばします。  \nまたすぐに、姿勢は崩れてしまいます。\
  \  \nまだ鐘の音は鳴っていません。  \nあなたは今ここに、完全に留まり続けます。  \n立ち上がりません。  \nただ、静かに座り続けます。  \nゆっくりと呼吸を続けます。\
  \  \n心が次第に静まっていきます。  \n静寂が、さらに深まっていきます。"
