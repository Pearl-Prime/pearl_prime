atom_id: adi_da_SCENE_06
body: "夜が部屋を満たしています。  \nあなたは暗闇の中に横たわっています。  \n天井は見えません。  \n体は静かに動かず、重く沈んでいます。  \n\
  心は休むことなく、ただ巡り続けています。  \n時間がゆっくりと過ぎていきます。  \n夜明けは訪れません。  \nあなたは身を動かしません。  \n暗闇は完全に包み込んでいます。\
  \  \nゆっくりと呼吸しています。  \n朝の訪れを待っています。  \nしかし、それはやってきません。  \nあなたは暗闇の中に留まり続けます。  \n心が静かに開いていきます。\
  \  \n周りの夜はさらに深まっていきます。  \nあなたの精神は静かで落ち着いています。  \n深く、完全な呼吸をしています。"
