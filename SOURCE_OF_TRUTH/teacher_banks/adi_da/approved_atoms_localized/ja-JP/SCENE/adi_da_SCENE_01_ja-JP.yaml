atom_id: adi_da_SCENE_01
body: "あなたは彼の向かい側に座っています。  \n部屋はとてもシンプルです。  \n一か所の窓から光が差し込んでいます。  \nあなたの背骨はまっすぐです。\
  \  \n彼の目は静かで、じっとしています。  \nその視線は、一度も逸らしません。  \nあなたは、その目を見つめ続けることができません。  \n視線をそっと下ろします。\
  \  \n両手は太ももの上に自然と置かれています。  \n沈黙が、すべてを満たしています。  \nあなたは、ありのままに見つめられていることを感じます。  \n\
  心がゆっくりと開いていきます。  \n二人の間には、静かな余白が広がります。  \n部屋全体が、やさしい光で満たされていきます。"
