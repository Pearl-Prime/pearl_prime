atom_id: adi_da_SCENE_03
body: "食べ物がお皿の上にあります。  \n周りでは声が響いています。  \nあなたは、多くの人々の中にいます。  \nあなたの体は、今、ここにあります。 \
  \ \nでも、何かほかのものがここにはありません。  \nあなたはフォークを手に取ります。  \n食べ物は、何の味もしません。  \n噛んで、飲み込みます。 \
  \ \n近くで誰かが笑っています。  \nでも、あなたには聞こえません。  \nあなたは静かに食べ続けます。  \nゆっくりと、一匙ずつ。  \n心を今この瞬間に保ち続けます。\
  \  \n食事の時間が、深まっていきます。  \n部屋は静かで平和です。  \nあなたの胸が、自然と開いていきます。"
