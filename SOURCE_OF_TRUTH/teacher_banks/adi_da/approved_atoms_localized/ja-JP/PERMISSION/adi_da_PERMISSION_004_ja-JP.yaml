atom_id: adi_da_PERMISSION_004
body: あなたが過去を生き延びるために下した決断は、すべて正しかったのです。それは知恵に満ちた選択でした。その決断があなたを守り、ここまでの人生を支えてきたのです。今、あなたの身体は、かつて強く抱え込んでいたものを手放しても安全だと理解しています。背骨の緊張をやさしく解きほぐしながら、こう感じてください。「私は、まさにそのときに必要なものを受け取っていた」と。
