body: "あなたがこわばり続けていること。自分自身を保ち、脅威に対処しようとしていること。そのこわばりそのものが、今や脅威となっています。  \n肩の力をゆっくりと抜いてください。\
  \  \n握りしめた拳を、そっとほどいてください。  \nその「ほぐれること」そのものが、すでに癒しです。"
