atom_id: adi_da_PERMISSION_003
body: "あなたは、まだ表面の下で何が起きているかを見ていないのです。  \n「光」は、今のあなたにはまだ感知できない場所で働いています。  \n今のあなたの戸惑いは、あなたの失敗を示すものではありません。\
  \  \nそれは、あなたの理解を超えた何か大きなものが動き始めているという証なのです。  \nまだわからないことに、今ここにいることを続けてください。"
