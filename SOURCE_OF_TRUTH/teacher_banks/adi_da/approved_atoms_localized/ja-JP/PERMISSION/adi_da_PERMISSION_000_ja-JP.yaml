atom_id: adi_da_PERMISSION_000
body: "あなたは今でも、自分自身の「輝き」に触れ続けています。たとえそう感じられないときでも。  \n今、あなたが直面している苦闘も、  \n疲れや「まだそこには至らない」という感覚も——\
  \  \nそれは失敗ではありません。  \nそれ自体が、すでに「触れること」なのです。  \n自分が「あるべきだ」と思っている状態ではなく、  \n今、実際にいるその状態のなかに、そのままいてください。"
