atom_id: adi_da_EXERCISE_004
body: "目を閉じてください。鼻の穴に息を感じてください。吸うときは涼しく、吐くときは温かく感じます。  \nここは内と外が出会う境界です。この場所を、宇宙全体が通り抜けていきます。\
  \  \n息をコントロールしようとしないでください。ただ、その境界を息が通り抜けるのを静かに気づいていましょう。"
