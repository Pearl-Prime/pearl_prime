atom_id: adi_da_EXERCISE_007
body: "人間関係において、自己収縮への拒否を練習しましょう。  \n引きこもりたい、守りたい、防御したいと感じたときには、ひとまず立ち止まります。  \n心に息を送ります。\
  \  \n「今、ここにいる」ことに、静かに「はい」と言いましょう。  \n相手の要求に「はい」と言うのではなく、関係性そのものという「場」に「はい」と言います。\
  \  \n今週、この練習を5回行ってください。"
