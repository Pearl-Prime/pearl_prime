atom_id: adi_da_EXERCISE_008
body: "仰向けに寝てください。  \n体が大地を受け止められているのを感じましょう。  \nあなたは支えられています。  \nその支えを、何かを成し遂げたからではなく、ただそこにいるだけで感じてください。\
  \  \nこれは、すべての始まりより前にあります。  \n「光」があなたを支えています——あなたが自分自身を支えようとする前からです。  \nこの状態で、10分間、ゆっくりと休みましょう。"
