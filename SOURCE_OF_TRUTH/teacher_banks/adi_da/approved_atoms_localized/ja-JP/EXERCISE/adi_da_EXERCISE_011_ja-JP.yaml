atom_id: adi_da_EXERCISE_011
body: "あなたが亡くなったと想像してください。  \n身体はなくなりました。  \n心もありません。  \nでは、何が残っているでしょうか？  \nその「残っているもの」を感じ取ってください。\
  \  \n\nこれが「光」です。  \nこれは、誕生の前であり、死の向こう側にあります。  \nこの状態で、五分間、ただ休んでください。  \nこれが、あなた本来のあり方です。"
