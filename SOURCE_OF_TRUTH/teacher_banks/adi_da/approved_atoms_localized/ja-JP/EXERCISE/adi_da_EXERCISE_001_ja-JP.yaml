atom_id: adi_da_EXERCISE_001
body: "目を閉じてください。  \n心臓の後ろの空間に意識を向けてください。  \nここが「ハートセンター」です。  \n多くの場合、この場所は塞がれたり、鎧のように固くなっている感覚があります。\
  \  \n無理に開こうとはしないでください。  \nその「鎧」そのものを感じ取ってください。  \nそれは何を守ろうとしているのでしょうか。  \n判断をせずに、ただその「守り」の存在に今ここに留まってください。\
  \  \nその鎧は、失敗ではなく、知恵なのです。"
