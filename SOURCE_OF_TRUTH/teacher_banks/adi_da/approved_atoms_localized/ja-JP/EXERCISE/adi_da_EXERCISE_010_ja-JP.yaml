atom_id: adi_da_EXERCISE_010
body: "今、あなたが拒んでいるものに気づいてください。  \n感情を拒んでいますか？  \n他者を拒んでいますか？  \n自分自身の限界を拒んでいますか？ \
  \ \nその「拒否」に意識を向けてください。  \n受け入れようとはしないでください。  \n「拒否」という感覚そのものを感じ取ってください。  \nそれは、からだが自然に示す動きです。\
  \  \nその意味を理解してください。"
