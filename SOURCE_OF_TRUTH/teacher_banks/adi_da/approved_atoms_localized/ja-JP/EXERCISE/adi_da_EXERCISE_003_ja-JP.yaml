atom_id: adi_da_EXERCISE_003
body: "他の人と向かい合って座るか、鏡の前に座ります。目は開けたまま、やさしく保ちます。視線を逸らさないでください。  \n相手を、あなたを見つめ返す「輝き」として見つめてください。\
  \  \nこの視線を受け入れようとしない「自分」こそが、緊張や収縮です。  \n視線をさらにやさしく緩めていきます。  \nそのまま3分間、静かに留まります。\
  \  \nこれが、関係性が生まれる場です。"
