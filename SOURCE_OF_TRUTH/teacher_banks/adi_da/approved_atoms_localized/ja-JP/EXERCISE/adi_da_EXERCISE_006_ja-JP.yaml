atom_id: adi_da_EXERCISE_006
body: "座禅の姿勢で静かに座りましょう。心と体が落ち着いたら、意識を自分の身体の周りの空間へと広げてください。  \n皮膚の内側だけではなく、身体から外へと広がる「場」全体を感じ取ってください。\
  \  \nその場へと息を送り込んでください。  \nあなたは、その空間とは切り離されていません。  \nむしろ、その空間があなたを呼吸しているのです。"
