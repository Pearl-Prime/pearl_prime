atom_id: adi_da_EXERCISE_000
body: "背筋を伸ばして座ります。  \n呼吸をします。  \n体の緊張している場所に気づいてください——胸、のど、お腹です。  \n呼吸を変える必要はありません。\
  \  \nただ、緊張を戦わず、ただ静かに見守るだけです。  \nこれは「光」が自らを観察している瞬間です。  \n5分間続けます。  \n緊張は、その時が来れば自然と和らぎます。"
