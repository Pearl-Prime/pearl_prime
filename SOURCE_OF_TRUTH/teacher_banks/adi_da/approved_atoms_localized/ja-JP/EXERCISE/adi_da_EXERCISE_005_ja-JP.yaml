atom_id: adi_da_EXERCISE_005
body: "一日のなかで、何度か立ち止まり、こう問いかけてください。  \n「今、私はどこに緊張しているでしょうか？」  \n体の感覚に意識を向けてみましょう。\
  \  \nアゴは硬くなっていませんか？  \n肩はこわばっていませんか？  \nお腹は引き締まっていませんか？  \nその緊張を解こうとはせず、ただ気づいてください。\
  \  \n私たちが緊張するのには、必ず理由があります。  \nその理由を信頼してください。  \nただ、判断を挟まずに、静かに観察するだけです。"
