atom_id: adi_da_EXERCISE_002
body: "立ち上がって、地面にかかる自分の体重を感じてください。  \n足の裏を感じてください。  \nその下にある大地を感じてください。  \n重力の引き寄せを感じてください。\
  \  \n\n今、その感覚を、足から太もも、お腹、胸、頭へと、ゆっくり上へ広げてください。  \n\nあなたは大地そのものです。  \n重く、今ここに確かに存在しています。\
  \  \n\nこの重力の中に、1分間、静かに身を委ねてください。"
