atom_id: adi_da_EXERCISE_009
body: "探求をやめる練習をしましょう。  \n毎日、たった一度だけ、その瞬間を選んでください。  \n変化を目指すすべての努力を、そこでやめます。  \n瞑想もせず、トレーニングもせず、自分を「直そう」ともしません。\
  \  \nただ、ありのままの自分として、10分間、静かに在り続けます。  \nこれが、本物の実践への入り口です。"
