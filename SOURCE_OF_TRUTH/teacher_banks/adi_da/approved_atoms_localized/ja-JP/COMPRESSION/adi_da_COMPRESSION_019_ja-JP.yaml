body: あなたはあなたの不安ではない。あなたはあなたの抑うつではない。あなたはあなたの恐怖ではない。これらは意識を通過する収縮だ。それらが通り過ぎていくものは、意識そのものには影響を与えない。空は天気によって傷つけられないように、意識も通過するものに触れることはない。
