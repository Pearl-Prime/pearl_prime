body: 収縮は見つめられることを望んでいません。それは見えないまま生き延びます。あなたが正直な注意力でそれを向かい合うと、すでに緩み始めています。なぜならあなたがそれに無自覚でいなくなったからです。それがあなたの問題を解決したわけではありません。あなたがそれに気づかなかった意識状態から離れたのです。
