atom_id: adi_da_SCENE_04
body: "你坐在坐墊上。  \n大廳非常安靜。  \n其他人圍繞著你而坐。  \n你的呼吸進出流暢。  \n內心卻十分喧鬧。  \n身體姿勢漸漸塌陷。  \n\
  你再次挺直腰背。  \n不久，又塌陷下去。  \n鐘聲尚未響起。  \n你全然留在這裡。  \n不離開。  \n靜默而坐。  \n呼吸緩慢。  \n心慢慢沉靜下來。\
  \  \n寧靜逐漸加深。"
