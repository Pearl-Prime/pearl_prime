atom_id: adi_da_SCENE_03
body: "食物放在你嘅碟上。  \n周圍有聲音傳來。  \n你身處人群之中。  \n你嘅身體就喺呢度，好真實。  \n但有啲嘢又唔喺呢度。  \n你拿起叉。 \
  \ \n食物食落冇乜味道。  \n你細嚼，然後吞嚥。  \n附近有人笑。  \n你聽唔到。  \n你靜靜噉食。  \n你繼續慢慢噉食。  \n你始終好專注於當下。\
  \  \n呢頓飯漸漸變得更深沉。  \n房間好寧靜。  \n你嘅胸口慢慢打開。"
