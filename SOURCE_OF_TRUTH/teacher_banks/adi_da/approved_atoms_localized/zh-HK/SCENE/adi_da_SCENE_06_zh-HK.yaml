atom_id: adi_da_SCENE_06
body: "夜晚籠罩房間。  \n你靜靜躺臥在黑暗中。  \n天花板隱沒不見。  \n身體一動不動。  \n思緒卻未曾停歇。  \n時間緩慢流逝。  \n黎明遲遲未至。\
  \  \n你依然不動。  \n黑暗徹底包圍一切。  \n你緩緩呼吸。  \n靜待清晨降臨。  \n但它始終不來。  \n你繼續留在黑暗裡。  \n心扉悄然打開。\
  \  \n夜色愈加深沉。  \n心神安寧沉靜。  \n你完整地呼吸。"
