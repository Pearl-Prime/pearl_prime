atom_id: adi_da_SCENE_02
body: "路徑十分狹窄。  \n兩旁樹木緊貼而立。  \n雙腳自然找到前路。  \n森林靜默無聲。  \n胸口滿溢著氣息。  \n重量沉落於肋骨之後。  \n\
  一片葉子緩緩飄落。  \n停在你的肩上。  \n你沒有拂去它。  \n繼續向前行走。  \n森林在四周漸漸加深。  \n呼吸慢慢變得平穩。  \n小路持續向前延伸。\
  \  \n光線穿透樹梢灑下。"
