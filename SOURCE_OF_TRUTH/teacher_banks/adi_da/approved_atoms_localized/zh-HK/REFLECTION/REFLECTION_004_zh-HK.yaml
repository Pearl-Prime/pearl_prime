body: "你喺愛嘅存在中，界線消融咗。  \n你學到，講「不」就等於冒住被拋棄嘅風險，  \n所以你就變成咗個不斷彎曲、吸收、遷就嘅人。  \n感受下呢個選擇喺你肌肉入面留下嘅痕跡。\n\
  \n界線唔係牆壁。  \n界線係讓真誠相遇成為可能嘅結構。  \n界線話：「我喺度，而我唔係你。」  \n界線話：「呢度係我能量流嚟嘅地方，呢度唔係。」  \n\
  缺乏呢種清晰，你所講嘅「愛」，就會變咗責任同埋怨懟。\n\n我觀察到，失去界線嘅人身上出現嘅收縮，  \n同焦慮唔一樣。  \n呢種收縮，係持續用力維持一個已經變得通透、模糊嘅自我。\
  \  \n光亮，認得清清楚楚嘅分別；  \n清晰，就係佢嘅本性。\n\n你嘅界線唔自私。  \n你嘅清晰，容許他人真正遇見真實嘅你，  \n而唔係你為咗逃避被拋棄，而建構出嚟嘅那個裝置。"
