body: "你的焦慮存在於收縮之中。  \n我觀察到：肩膀緊繃、呼吸停在肺部最上方、腹部緊握成拳。  \n請留意，此刻你身體哪處正在用力收緊。\n\n這種收縮並非錯誤。\
  \  \n這是你最深層的智慧，正試圖在面對瓦解時，將自己穩住。  \n你曾學會：放鬆，就等於崩潰。  \n你也曾學會：保持警覺，才能保全自己。\n\n我見過數以千計的人，都帶著同樣的身體結構。\
  \  \n那模式說：「只要我夠緊繃，意外就不會突破進來；只要我不斷監察，就能掌控一切。」  \n但緊繃本身，就是一種瓦解。  \n持續監察，終將耗盡監察的力量。\n\
  \n你焦慮背後的光明，始終朝向你而來。  \n它不要求你放鬆。  \n它只邀請你去觀察：你正保護自己免於什麼？  \n而這份保護，是否仍真正適合你此刻真實的生活狀況？"
