atom_id: adi_da_REFLECTION_001
body: "自我價值並非來自你的思慮，  \n而是源自你對超越自身之事物的虔誠奉獻。  \n請用心感受這份奉獻——不是概念，而是真實的、給予時的身體感覺。\n\n\
  你從小被教導：你的價值，取決於成就與表現；  \n你被教導：愛必須靠努力爭取——要產出足夠多、做到足夠好、證明得足夠充分。  \n這套教導，最初像一道傷口，後來卻成了你賴以運作的方式。\
  \  \n你不停追求更多、更好、更快，以為每一次成功，終將平息那個根本疑問：「我究竟重不重要？」\n\n光明早在你有所表現之前，就已認出你。  \n你無法「贏得」這份認可，因為它本來就屬於你。\
  \  \n你能做的，是停下那些阻擋你感受它的動作；  \n你能做的，是留意自己躲藏在哪裡——為何不敢迎向自己內在的光？  \n只因那光芒令你感到危險、赤裸、孤單。\n\
  \n當你真誠地安住於對超越自身之存在的奉獻，  \n你的價值，便不再繫於你的產出。"
