atom_id: adi_da_INTEGRATION_003
integration_mode: question_open
body: "悲傷，是身體對真愛的體認——  \n當愛真切存在，而關係卻未能承受你內在的收縮。  \n\n你曾愛過。  \n光明本性依然流動。  \n但你退縮了，你保護自己，你封閉起來。\
  \  \n愛並未終止，  \n只是你撤回了容許愛存在的許可。  \n這，就是悲傷。  \n不是失去對方，  \n而是失去你自己收回的那份允許。  \n\n此刻真正的課題，\
  \  \n並非你是否還能再愛。  \n光明本性從不會停止去愛。  \n真正的課題是：  \n當恐懼來臨時，你能否依然敞開？  \n當身體顫抖時，你能否仍留在關係之中？\
  \  \n\n悲傷一遍又一遍教導你這一點。  \n悲傷，正是你的老師。  \n\n你可以保持敞開。  \n你可以讓自己被愛。  \n愛本身沒有改變，  \n改變的，是你對愛的開放程度。"
