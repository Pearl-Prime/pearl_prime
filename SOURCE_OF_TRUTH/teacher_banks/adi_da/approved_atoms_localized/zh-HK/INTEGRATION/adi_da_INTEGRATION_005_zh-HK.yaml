atom_id: adi_da_INTEGRATION_005
integration_mode: still_here
body: "抑鬱，是心對自己關上門的那一刻。  \n不是悲傷。  \n不是失去。  \n而是真真切切地關閉。  \n真真切切地鎖緊。  \n\n「光明」無法經由你觸及自身，\
  \  \n因為你已說服身體持續收縮。  \n這收縮本意是為了安全，  \n卻漸漸成了牢籠。  \n\n你所感受到的黑暗，  \n並非光明的缺席，  \n而是你尚未允許光明流經你的存在。\
  \  \n這份允許， resides 在身體裡，  \n在呼吸中，  \n也在你願意再次讓「光明」搏動的心意裡。  \n\n你本就身處光明之中。  \n唯一要做的，\
  \  \n只是鬆開雙臂。  \n只是讓它穿過。  \n只是感受肋骨隨著新可能而擴張。  \n讓光明毫無阻礙地流經你的存在。"
