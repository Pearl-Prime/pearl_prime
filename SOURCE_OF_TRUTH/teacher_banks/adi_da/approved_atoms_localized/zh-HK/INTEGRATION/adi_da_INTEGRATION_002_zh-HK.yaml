body: "疲勞耗盡，是身體向你發出的報告：你已長時間試圖靠自己創造自我。  \n這種耗竭並非軟弱，而是準確的訊息。  \n你的身體無法持續承擔「自我創造」的努力——它從來就不是為此而設計的。\
  \  \n那光明本體不會耗盡，正因為它從不試圖成為任何東西。  \n而你一直在努力嘗試，這就是耗力之處，也是唯一令人精疲力竭的工作。  \n重點不在於少做些什麼，而在徹底停止嘗試。\
  \  \n放下那份「必須由自己開創自我」的緊繃信念。  \n當雙肩自然垂落，下顎放鬆柔軟，呼吸重新回到腹部——  \n那一刻，身體便認出了自己的真實。  \n\
  那光明本體早已在此，自在流動，無需你費絲毫氣力。"
