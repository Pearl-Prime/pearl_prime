body: "收縮現已清晰可見。  \n這並非失敗，  \n而是你過去處理關係的方式所留下的印記。  \n\n身體收緊，是因為它學會了防禦衝擊。  \n每次你向他人靠近，真正的相遇卻從未真正發生；\
  \  \n於是身體便收縮起來，以免承受「未能抵達」所帶來的震驚。  \n\n這個模式既古老，亦真實。  \n你此刻察覺到的，正是收縮所駐留的確切位置。  \n\n\
  光明本身並未收縮——  \n你正身處其中。  \n\n收縮存在於你與他人之間的能量場中。  \n那裡，就是用功之處；  \n那裡，也正是你早已所在之處。  \n\
  \n那裡，正是你可以重新開始的確切位置。  \n光明就在這裡，穿透收縮而臨在。"
