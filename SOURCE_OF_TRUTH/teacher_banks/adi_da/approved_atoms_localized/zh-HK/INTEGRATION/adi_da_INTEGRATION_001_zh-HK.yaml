atom_id: adi_da_INTEGRATION_001
integration_mode: cost_visible
body: "當你相信自己與光明分離，自我價值便崩塌了。  \n這就是代價——並非比喻，而是真實的耗損。  \n當身體以為自己孤身一人，它便得憑空創造自身價值。 \
  \ \n這份努力極其巨大，而失敗則必然發生。  \n分離，正是「不配得感」運作的機制。  \n今天，你已察覺那信念在胸口收緊。  \n「不配得感」不是待解決的問題，而是一則訊息。\
  \  \n它清楚告訴你：你仍堅信自己未與至高本體相連。  \n這份信念，驅動著你全身的收縮。  \n請清晰看見這份代價。  \n請看清：當你不知自己正被萬有之源所愛，你付出了什麼？\
  \  \n這份「不配得感」，已化為一種身形——你的身體對它再熟悉不過。"
