body: "你嘅界限崩潰，因為你相信對方嘅感受比你自己嘅收縮更真實。  \n你感受到對方繃緊，於是你就放軟自己，去承受呢個衝擊。  \n呢樣唔係愛。  \n呢樣係融合。\
  \  \n呢樣係抹除。  \n\n真正嘅關係，需要你內在嘅「光明」保持穩定，同時對方內在嘅「光明」亦保持穩定。  \n兩個光源。  \n唔係一個。  \n\n\
  當你拋棄自己嘅收縮，只為安撫對方嘅收縮，  \n你就喺教對方：佢嘅感受可以將你抹走。  \n同時，你亦喺教自己：你嘅現實，冇佢嘅現實咁真實。  \n\n界限，就係你持續安住於自己同「光明」之間嘅關係嘅地方。\
  \  \n唔硬。  \n唔冷。  \n但清晰。  \n\n對方，亦安住於佢自己同「光明」之間嘅關係。  \n兩種獨立嘅體認，相遇而不融合。"
