body: "當拉斐爾向光明敞開時，他的下顎放鬆了。  \n腹部自然舒展。  \n自小便盤踞在他胃部的緊繃感，開始消融。  \n不是靠更用力，而是靠放下。  \n\
  他整個身體，原是一隻盛載虔誠的容器，  \n緊得成了牢籠。  \n臣服，是讓牆壁倒塌。  \n是感受自己有多渺小，  \n而光明又有多浩瀚。  \n他的神經系統漸漸學懂：\
  \  \n它一直緊抓不放的東西，現在可以安全地放下了。"
