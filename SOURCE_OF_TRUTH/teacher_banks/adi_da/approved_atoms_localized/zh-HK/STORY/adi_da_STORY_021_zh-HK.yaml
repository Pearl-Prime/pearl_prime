body: "阿瑪拉死去，死去了她一直以為的自己。  \n就在覺察的瞬間，她整個身份收縮了。  \n她所有建立在「獨立自我」這片流沙上的東西，全都顯露出來。  \n\
  她感受到光明，不在其下，而是作為一切的根基。  \n她花費多年，成為某個人；  \n如今，她成為無人。  \n這消融，同時是恐懼，也是自由。  \n她的雙手顫抖。\
  \  \n她的心，打開至超越極限。  \n這是光明，以光明本身行動——  \n沒有中介，沒有「她」擋在中間。"
