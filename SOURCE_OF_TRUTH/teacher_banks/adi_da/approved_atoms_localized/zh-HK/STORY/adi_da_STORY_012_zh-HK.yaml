body: "馬庫斯望著鏡中的自己，留意到嘴角的緊繃。  \n有人叫他多笑、要保持正面。  \n但「光體」不需要表面的光亮。  \n那收縮，本身就是訊息。  \n\
  他的臉，記載著每一次為迎合他人對「他該是誰」的想像，而壓縮自己的經歷。  \n「光體」看見這份緊繃。  \n這份看見，就是起點。"
