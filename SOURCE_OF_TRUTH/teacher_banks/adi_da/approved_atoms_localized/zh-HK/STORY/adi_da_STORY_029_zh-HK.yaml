body: "薇薇安察覺到自己如何因渴望掌控而緊繃：  \n不停檢查、重新整理、監控一切，唯恐事情崩潰。  \n她思緒飛奔，下顎緊繃。  \n「光」讓她看見——這不是謹慎，而是恐懼。\
  \  \n而她越想掌控，恐懼便收得越緊。  \n有一天，她忽然明白：「光」一直穩穩托住一切。  \n她的努力毫無增益，只奪走內心的平靜。  \n於是，她開始練習一種徹底的行動：鬆開雙手。"
