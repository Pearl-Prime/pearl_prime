body: "一位學生在人際關係中難以應對突如其來的憤怒。阿迪達說：「這份憤怒，其實是害怕被拋棄。  \n請留意對方將注意力從你身上抽離的那一剎那。  \n你的身體會立刻收縮，而暴怒，便掩蓋了這收縮所造成的空隙。\
  \  \n你正向一位同樣處於收縮狀態的人，索求連結。  \n這並非對方的失敗，亦非你的過錯。  \n光明，恰恰在收縮的生命之間流動。  \n憤怒，只是收縮時發出的聲音，而非真正的回應。」"
