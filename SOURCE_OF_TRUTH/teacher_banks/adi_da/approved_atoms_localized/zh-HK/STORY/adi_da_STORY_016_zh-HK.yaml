body: "詹姆斯靜坐不語，感受光明運作。  \n光明並非對他做什麼，  \n而是以他之身，自然運作。  \n\n「我在修行」的念頭，悄然轉為「光明在修行」。 \
  \ \n他的胸口自然擴張，  \n呼吸變得自動而流暢。  \n\n一旦停止操控，臣服便即刻完成。  \n多年來，他以為必須創造條件，才能迎接神聖顯現；  \n\
  如今他明白：唯一阻擋光明的，  \n正是自己對它「應當如何顯現」的緊縮與執著。  \n\n放下吧。  \n光明，只透過那不再抗拒的人而行動。"
