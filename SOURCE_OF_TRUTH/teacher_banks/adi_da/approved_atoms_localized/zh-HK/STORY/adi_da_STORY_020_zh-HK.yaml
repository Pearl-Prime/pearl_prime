body: "加百列感受到自己的憤怒，同時看見這憤怒被愛包裹著。  \n他因害怕失去所愛之人，而本能地收縮起來。  \n那憤怒，正是這收縮所發出的聲音。  \n當他看清這一點，內在便悄然轉變。\
  \  \n「光亮」向他顯示：在本然不二的境界裡，根本沒有「失去」可言。  \n他的恐懼是真實的，  \n但那份分離，從來就不曾真實存在。  \n他的胸口自然擴展，\
  \  \n憤怒隨之消散——  \n並非壓抑，而是被照見：  \n原來這份防衛毫無必要，  \n因為在「光亮」的領域中，  \n根本不可能發生所謂的失去。"
