body: "當阿德琳放下「一定要對」的執念，她的肩膀便放鬆下來。  \n她一直緊繃著身體，緊抓自己的意見，彷彿那些意見維繫著她的生命。  \n犯錯，對她而言就像墜落。\
  \  \n但真正支撐她的，是那道光明。  \n當她鬆開「必須正確」的握持，光明便清晰可見。  \n她的雙手自然張開，呼吸變得深長。  \n她此刻明白：「一定要對」，原來只是盔甲。\
  \  \n而光明不需要盔甲，  \n它需要的，是一具懂得放手的身體。"
