body: "當馬泰奧祈禱時，他整個身體都會改變。  \n肩頭、頸項、腰背長久以來的緊繃，一一鬆開。  \n這不是因為祈禱能「解決」什麼。  \n而是因為在那虔敬的姿勢中，他停止了收縮。\
  \  \n他容許自己去承接。  \n雙手自然張開。  \n呼吸變得綿長。  \n小腹慢慢柔軟下來。  \n光明不需要一個完美的身體，  \n只需要一個願意展開的身體——\
  \  \n朝向神聖，徐徐展開。"
