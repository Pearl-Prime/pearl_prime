body: "一名學生靜坐時，忽然感受到那光明、廣大、恆常不變、不受他尋求所觸動的存在。  \n他將這體驗告訴阿迪達，老師點頭說：  \n「這是你本來的狀態。你並未『達成』它，只是停止了干擾它。\
  \  \n剛才那一刻你感受到的能動性，並非出於你自己，而是光明的能動性，正透過你流現。  \n這就是一絲微光。  \n切勿把它當作目標去追求；一旦執取，收縮便會重現。\
  \  \n你只需如實安住於當下已然存在的真實。」"
