body: 一名學生述說多年來感情關係屢屢失敗。阿迪達說：「你一直帶著一種模式——想透過他人得到救贖。起初，你以為所愛之人能填滿自己；當這期望落空，你就怪罪對方；然後選擇離開。這個循環由來已久，其實是『自我』在收縮，卻又渴望透過另一個人來消融自己。所有關係，終究都是同一場相遇——與你自己相遇。除非你真正明白這一點，否則這模式將不斷重複。而對方，永遠是你拋棄自己的那面鏡子。」
