body: "有學生問：「我該如何釋放胸口的緊繃感？」阿迪達直視着他。  \n「這份緊繃，是你拒絕關係的表現。每當你退縮、遠離對方，身體便會收縮。就在那一刻，你放棄了彼此之間的空間。光明，就住在『之間』——住在真誠相遇的當下。釋放，只能透過關係發生，而非孤獨隔絕。」"
