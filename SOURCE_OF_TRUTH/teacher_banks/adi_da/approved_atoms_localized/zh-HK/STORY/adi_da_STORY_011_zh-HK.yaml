body: "有學生問：「我怎樣才能持續處於那種連結的狀態？」  \n阿迪達對他說：「你做不到。這正是誤解之處。  \n連結的狀態，並非一個你可以抵達、然後停留其中的地方。\
  \  \n它就是你本然的樣貌。  \n只要你一試圖抓住它，收縮便再度出現。  \n但請留意：你察覺這一點的速度，正越來越快；  \n主體的覺察力，也愈發敏銳；\
  \  \n你從收縮中回歸的速度，也愈來愈快。  \n這才是真正的成長——  \n不是達成某種成就，而是更清晰地認出實相。」"
