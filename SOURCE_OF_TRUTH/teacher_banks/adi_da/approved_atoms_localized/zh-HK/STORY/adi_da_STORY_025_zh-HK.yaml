body: "法拉感受到自己的悲傷，並留意到身體哪處出現收縮：胸口的繃緊、喉嚨的壓迫。  \n她失去了一位所愛的人。  \n這份收縮，是自我拒絕放手的表現。  \n\
  「光明」並非要她遺忘，而是邀請她停止隨逝者一同死去。  \n她的愛可以長存，  \n但只要仍緊緊抓住不放，她便無法承接「光明」對真實之物的延續。  \n她鬆開了手。\
  \  \n悲傷並未消失，  \n卻從牢籠，轉化為一份奉獻。"
