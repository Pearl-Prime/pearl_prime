body: "尼古拉斯察覺到自己一直以來的表現模式。  \n他緊繃起來，只為顯得有用、被人需要。  \n一旦停止表現，他就覺得自己一無是處。  \n「光」讓他看見：這不是愛，而是生存策略。\
  \  \n他早年的愛是有條件的，  \n所以他學會用努力去換取愛。  \n如今，他的整個身體都緊繃著，只為成為非凡之人。  \n看見這個模式，就是第一道裂縫。\
  \  \n那種緊繃，不再主宰他了。  \n他能感覺到它，也能選擇別的方式。"
