body: "一名學生感到自己被困於內心的機制之中。阿迪達觀察道：「你現在看見這機制了。這已是進展。自我，只是一套機械系統，按既定程式作出反應。  \n這套程式，正是你每次感到不安全、被忽視、被遺棄時，所累積起來的收縮反應。\
  \  \n這個身心，正是那收縮的證據。  \n但你並非這套機制。你是那光明，是觀照它的覺知。  \n這機制無法靠強力停止；唯有透過臨在，它才會轉化。」"
