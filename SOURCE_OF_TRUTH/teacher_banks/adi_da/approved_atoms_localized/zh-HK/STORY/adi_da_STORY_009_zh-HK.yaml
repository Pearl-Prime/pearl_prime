body: "一名學生分享了一個突破性的時刻：他清楚看見，收縮原來是一種選擇。阿迪達說：  \n「對。現在你明白，每一個當下，你都在主動選擇收縮。收縮並非發生在你身上，而是你正在做的事。這種『看見』本身，已是釋放的第一步。但不要從這『看見』中，再鋪一條路。許多人執著於看清這個機制的過程，甚至以此覺得自己靈性進步了。其實，這機制只是機制而已。真正重要的，是那能看見它的『光明』。」"
