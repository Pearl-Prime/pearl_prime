body: "一名學生走近阿迪達，說：「我已修習多年，卻感覺不到任何不同。」  \n阿迪達目光沉靜。「你其實早已感覺不同。光明本已運作。你所稱的『修習』，並非朝向某種尚未存在的東西而努力；而是你本已與神聖合一，此刻正逐漸顯明。你感受到的收縮，並非失敗，而是自我正認出自身的局限。」"
