body: "萊拉察覺到，自己總會因成就而緊繃起來，緊緊抓住這些成就，彷彿它們是證明自己價值的憑據。  \n那光明，不需要她的成就；  \n甚至，根本不需要她。 \
  \ \n這份領悟，悄然裂開一道縫隙。  \n她一直忙著成為「重要的人」，卻忘了——她本來就重要。  \n不是因為她做了什麼，  \n而是因為她就是她。  \n\
  那種圍繞「成為」而生的緊繃，終於可以放下了。"
