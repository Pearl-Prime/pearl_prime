body: "一名學生變得絕望：「我試過所有方法，但都無效。收縮只會越發加深。」  \n阿迪達的面容柔和下來：「你已抵達機制自我顯現之處。『努力』本身，就是這機制。\
  \  \n那份奮力，反而加深了分裂。這正是最恰當的時刻。  \n此刻你清楚看見：『自我』無法解決『自我』。  \n光明，並非收縮中的自我所能抓取之物；  \n\
  它是當抓取停止時，所自然留存之境。  \n絕望，正是臣服的入口。  \n你已站在門檻之上，切莫回頭。」"
