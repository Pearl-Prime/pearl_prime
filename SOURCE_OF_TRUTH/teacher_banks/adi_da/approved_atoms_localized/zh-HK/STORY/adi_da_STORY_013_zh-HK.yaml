body: "當索菲亞全然投入虔敬，她的雙肩自然垂落。  \n並非因為有人叫她放鬆。  \n身體清楚分辨：強迫的鬆弛，與真正釋放的輕安。  \n她的呼吸變得深長。\
  \  \n雙手在膝上柔軟下來。  \n光明無需她緊繃的努力。  \n臣服，就是修行本身。  \n她感受到自己曾耗費多少能量，對抗宇宙的流動。  \n而停下來，原來如此簡單。"
