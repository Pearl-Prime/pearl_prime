body: "丹尼爾跟兒子說話時，聽到自己重複著父親當年說過的話——語調一模一樣，連那種欲言又止的收縮感也如出一轍。這模式像附身般穿過他。  \n他第一次意識到：這不是他的本性，而是代代相傳的一種收縮。\
  \  \n「光明」向他展現那個當下——他能感覺到想退縮的衝動，也能選擇不同。  \n這不是靠意志力，而是因為看見。  \n「光明」不做功課，它只顯示：當你不再緊繃地抱住自己的遺產，什麼是可能的。"
