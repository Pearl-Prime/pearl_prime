body: "湯瑪斯觀察自己的念頭，就像看著天上的雲。  \n有人告訴他，應該改變這些念頭。  \n但「光明」並不需要改變念頭，  \n只需要認清：他不是自己的念頭。\
  \  \n\n他的整個身體一直緊繃著，  \n彷彿只要管好心念，就能救自己。  \n\n當他真正看見「我並非念頭」，  \n中間便自然出現一道空隙。  \n就在那空隙裡，緊縮感鬆開了。\
  \  \n他一直抓得那麼緊。  \n如果，他只是靜靜地看呢？"
