body: "以撒走進自己內心的聖殿，才發現那裡一直空無一物。  \n不是缺乏光明，而是他一直站在門前，未曾跨入。  \n他的整個身體開始移動——他往旁邊讓開。 \
  \ \n湧入的，並非出於他的作為；  \n是光明，自然湧入。  \n他的神經系統在一瞬之間，學會了多年修行也未能教會它的事：  \n那束縛他的收縮，原來既非必要，亦非真實；\
  \  \n它就此消融。  \n他只是澄明通透的存在，  \n讓光明，從中遍照。"
