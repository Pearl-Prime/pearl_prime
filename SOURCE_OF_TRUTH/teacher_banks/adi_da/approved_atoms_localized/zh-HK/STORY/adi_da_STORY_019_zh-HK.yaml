body: "雪紀觀察自己尋求的模式。  \n她由一種練習轉到另一種練習，由一位老師轉到另一位老師，  \n總在尋找那「最後能帶來改變」的一個。  \n\n每次，新練習都變成另一重收縮。\
  \  \n光明向她顯示：所有尋求，其實是同一個結。  \n她並非生來就在尋求；  \n她是因受傷而開始尋求。  \n創傷緊緊纏繞著所失去之物。  \n\n只要她仍在尋找光明，\
  \  \n就無法真正遇見它。  \n她的安住，本身就是練習。"
