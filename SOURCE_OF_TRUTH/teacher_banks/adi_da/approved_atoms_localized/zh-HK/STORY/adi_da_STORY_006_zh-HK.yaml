body: "有位學生懼怕死亡。阿迪達對他說：「你時刻都在死去。每一次呼吸，都是死亡。  \n每一刻，那個曾經的你，都已消逝。這是你無法逃脫的規律——自我不斷被釋放，又不斷轉化。\
  \  \n你緊抓著形相不放，但光明本身卻無形無相。它先於身體而存在，亦不倚賴身體而延續。  \n死亡並非你所恐懼的中斷，而是你一生以來所有收縮的最終釋放。」"
