body: "伊利娜深愛她的伴侶，但一愛上，便即刻感受到那收縮。  \n那緊握。  \n那以關懷為偽裝的依附。  \n她看著自己表現出忠誠，卻同時壓抑著更深層的流露。\
  \  \n「光」告訴她：這不是失敗。  \n這收縮，正是她來此要面對的。  \n毫無保留的愛，需要讓那個恐懼消亡的自我死去。  \n她的心，在那道門檻邊緣繃緊。\
  \  \n這份繃緊，正是她站在自由邊緣的樣子。"
