body: "克萊爾感受到自己的防禦機制。  \n她被批評時，臉部肌肉如何僵硬；  \n別人不理解她時，胸口如何緊縮。  \n這些防禦，過去曾是必要的。  \n但如今，它們卻遮蔽了光明。\
  \  \n她不必強行拆除它們，  \n只需如實看見它們——  \n看見每一次收縮，耗費多少能量。  \n當她真正看見，疲憊便浮現出來。  \n而有時，就在這清晰的看見之中，\
  \  \n會自然出現一絲鬆動。"
