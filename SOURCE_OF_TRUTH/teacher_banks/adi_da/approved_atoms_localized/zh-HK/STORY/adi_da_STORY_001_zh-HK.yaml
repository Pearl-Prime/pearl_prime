body: "一位學生坦白道：「我的追尋從不停止。我由一位老師轉到另一位老師，由一種修行轉到另一種修行。」  \n阿迪達點頭說：「這追尋本身，就是收縮。你正逃避那本已當下顯現的光明。\
  \  \n那本初的合一，並非有待成就之物；它正是此一覺知的根本所在。  \n莫再朝向一個缺席的神而追尋。請安住於那早已遍滿一切的光明之中。」"
