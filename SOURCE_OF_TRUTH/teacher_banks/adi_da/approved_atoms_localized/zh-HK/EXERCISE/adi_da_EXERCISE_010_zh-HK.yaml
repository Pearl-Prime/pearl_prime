atom_id: adi_da_EXERCISE_010
body: "留意你此刻正在拒絕什麼。  \n你是否在拒絕感受？  \n拒絕另一個人？  \n拒絕自己的界限？  \n把覺察帶到這份拒絕之上。  \n不必勉強自己接受。\
  \  \n單純感受「拒絕」本身。  \n這是身體的一種姿勢。  \n理解它。"
