body: |
  A woman I'll call Asha sits cross-legged on her bedroom floor at eleven at night. She has been crying, though the crying has stopped. The room is small and dark except for a single lamp.

  She places both hands over her heart. Not to feel better. She does not believe that will work. She places them there because she does not know what else to do.

  She says three words quietly into the room. Her voice sounds unfamiliar to her — softer than she usually allows. She says them again. The lamp hums.

  Nothing dramatic happens. She does not feel healed or whole. Her face is still wet. But something in the room is different in the way that a room changes when someone else is in it — except no one has entered.

  She sits with her hands over her heart until her breathing changes on its own. She does not know what to call what happened. She writes nothing down.
