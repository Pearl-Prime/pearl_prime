body: |
  Amara chants every morning before her children wake. She chose this practice six months ago when her life felt scattered in every direction. The chanting started as an experiment. Now it is a thread she holds. She sits cross-legged on a mat near the window. The sky outside is still dark. She begins the sounds. Her voice is not trained. It does not matter. The vibration moves through her throat and into her chest. The soul body responds to frequency, not performance. After ten minutes, her hands stop trembling — she had not noticed they were trembling until they stop. Her mind produces thoughts. She does not chase them. She returns to the sound. The sound is the anchor. When her daughter calls from the hallway, Amara rises with a chest that carries a different quality than the one she woke with. She greets the child with open arms. The frequency she cultivated in the quiet moves through the greeting. The child presses her face into Amara's shoulder and goes still. Love transmits without words. This is how the practice extends beyond the mat.
