body: |
  I was working with someone I'll call Fang. She spirals in anxiety about her boundaries. She says yes when she means no. People ask and she complies. The shame that follows is intense. She feels she is failing at love by having her own needs. But when she begins a practice of gratitude for the strength it takes to set a boundary — gratitude for loving herself enough to protect her own energy — something shifts. She sits with this: "I am grateful for the strength to say no. I am grateful that I love myself enough to set this boundary." She practices this with each boundary she needs to set. The boundary becomes an act of love, not selfishness. She learns to speak her boundary with love and gratitude for the person, even as she holds her own line. "I love you. I am grateful for our connection. And I need to protect my energy right now." Love and boundaries are not in opposition. They are the same thing. Love offered without conditions means also loving herself. Self-love includes saying no.
