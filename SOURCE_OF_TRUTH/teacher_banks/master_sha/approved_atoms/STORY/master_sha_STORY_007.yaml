body: |
  I was working with someone I'll call Jing. She carries burnout so deep it feels like a spiritual crisis. She has given everything and feels empty. Empty heart. Empty energy. Empty purpose. She has poured herself out in service and now there is nothing left to give. The shame follows: she feels she has failed. She should be able to keep going. She should not need rest. But she is breaking. She begins a practice of something counterintuitive: receiving. She is not giving. She is receiving love. She visualizes healing light pouring into her, restoring her soul, her body, her spirit. She practices gratitude: "I am grateful for the chance to rest. I am grateful to receive what I have given to others." She chants softly: "I am loved. I am held. I am healed." Not as denial of her burnout, but as a frequency that begins to replenish. She practices receiving as an act of love for herself. Slowly, the source within her begins to refill. She learns: you cannot pour from an empty vessel. Receiving love is not failure. It is the necessary cycle. You cannot give without receiving. The soul knows this. Gratitude for the chance to restore herself becomes the frequency that restores her. She learns: she is worthy of the love she has given to others.
