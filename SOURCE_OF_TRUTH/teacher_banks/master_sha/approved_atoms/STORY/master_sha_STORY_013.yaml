body: |
  A group of people are sitting in a circle in a conference room repurposed for the afternoon. The chairs are wrong for this — too corporate, too wheeled. But no one leaves.

  They have been asked to chant a sound together. Most of them have never done this. Several laugh first, which is fine.

  Then something shifts in the collective sound — a moment when it stops being eleven separate sounds and becomes one. It is brief. Some of them will not remember it afterward, or will say they imagined it.

  A man in the back row — a project manager who drove forty minutes to be here — puts his hand over his mouth. Not to stop something from coming out. To hold something in. His chest is doing something he did not authorize it to do.

  The sound continues. The fluorescent lights hum beneath it. No one explains what happened. The facilitator does not point it out.
