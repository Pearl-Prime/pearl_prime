body: |
  There is a river in the teaching that wants to flow to the sea. But the path is not direct. The river meets obstacles: mountains, walls built by humans, deserts that seem to stretch forever. The river does not stop. It does not judge the obstacles. It does not decide it is failing because the path is not direct. The river simply flows, moving around every obstacle, finding the way. Sometimes it must go backward before it can go forward. Sometimes it pools and waits. But it never loses its direction. The sea is the destination. The love is the destination. The soul knows this. The soul in each human heart is like this river. It wants to move toward love. It wants to reach the sea of divine love. But the world has built obstacles. Shame, fear, old pain, false beliefs. The soul does not stop. It keeps moving. It finds the cracks in the wall. It moves around the obstacles. If you follow the soul's knowing, you will reach the sea even after a thousand detours. You will arrive even after the path seemed impossible. This is the teaching: trust the river within you. Trust the soul that knows the way to love. Even if the path is complicated, even if you cannot see it, the soul is moving you toward the sea. Divine love is waiting. The river of your soul will find its way home.
