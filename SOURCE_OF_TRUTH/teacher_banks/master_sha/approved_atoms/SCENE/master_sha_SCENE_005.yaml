body: "Someone apologized for hurting you and you feel resistance to forgiving them.\
  \ You turn the forgiveness toward yourself instead\u2014for holding the grudge,\
  \ for carrying the wound. In that self-forgiveness, the external forgiveness becomes\
  \ possible."
