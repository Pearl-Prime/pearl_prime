body: |
  Tao Calligraphy is not art. I say this not to diminish calligraphy as art — it is
  beautiful — but to be precise about what Tao Calligraphy is and what it does.

  Tao Calligraphy is a healing field. When I create a Tao Calligraphy piece, I am not
  composing characters on paper. I am transmitting a high-frequency information field
  that carries the qualities of Tao — unconditional love, forgiveness, compassion,
  light — into a physical form that holds and radiates those qualities.

  The piece continues to transmit after I set down the brush. People who sit near it,
  who focus on it, who use it in practice, are entering the field. The field interacts
  with their own energy body, their soul, their cellular structure. Where there is
  negative information — blockage, stagnation, karmic imprint — the higher frequency
  of the Tao field works to clear and transform it.

  I have used Tao Calligraphy in my healing intensives, in hospitals, in homes. The
  results are documented in testimonials from thousands of students worldwide across
  decades. I do not ask anyone to believe this in advance. I ask them to experience it.

  But the mechanism is not mysterious — it is a question of frequency. Every cell, every
  organ, every aspect of the soul body emits and receives information. Tao Calligraphy
  offers a specific, coherent, high-frequency signal. The body knows how to receive it.
