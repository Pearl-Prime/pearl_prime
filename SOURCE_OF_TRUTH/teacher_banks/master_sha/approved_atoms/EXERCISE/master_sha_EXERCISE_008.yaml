body: |
  Body-Spirit Communication: Place your hands on an area where you hold tension or emotional pain. Breathe into it. Silently ask: "What do you need from me? What is your message?" Listen. Your body-spirit knows. It might be: rest, love, boundaries, acknowledgment, forgiveness. Once you know what is needed, offer it. "I hear you. I love you. I am here." The body responds to being heard and loved. Healing follows listening.
