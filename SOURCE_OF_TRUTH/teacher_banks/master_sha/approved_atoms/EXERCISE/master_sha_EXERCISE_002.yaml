body: |
  Healing Light Visualization: Close your eyes. Imagine healing light — perhaps golden, perhaps white — entering your body at the crown of your head. Watch it slowly pour down through your entire being, touching every cell, every place of tension or blockage. As it flows, whisper or think: "I am healed. I am loved. Blockages melt in the frequency of love." Continue for 5-10 minutes, letting the light move at its own pace. You are not forcing healing — you are inviting it, creating a frequency that allows the soul's natural healing to occur.
