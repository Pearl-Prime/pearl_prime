body: |
  Universal Love Extension: After practicing love toward yourself, extend it outward. Silently send love to someone you cherish, someone neutral to you, someone difficult, and finally to all beings. "I send love and healing to all beings. May all be loved. May all be healed. May all be free." You are not trying to feel it intensely — you are offering it as a frequency, a blessing. This practice aligns your individual healing with the healing of all. Love multiplies when shared.
