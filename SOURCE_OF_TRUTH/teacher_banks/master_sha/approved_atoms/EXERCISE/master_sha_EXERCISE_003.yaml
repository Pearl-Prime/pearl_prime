body: |
  Gratitude Frequency: Set aside 10 minutes. Sit comfortably. Begin to notice small things you are grateful for — your breath, your hands, the ground supporting you. As each gratitude arises, really feel it, let it move through your body. Gratitude is a frequency that opens the heart and begins to shift the nervous system toward healing. You are not grateful because life is perfect — you are grateful despite difficulty. This shifts the frequency from lack to abundance, from victim to connected.
