body: |
  You have been in thousands of states. You have been certain and confused, elated
  and depleted, convinced that everything was going to work out and convinced that
  it wasn't. Each state felt total while it was present. Each one eventually left.

  What has been present for all of them?

  This is not a rhetorical question. I am asking you to look. Something was there
  in the elation and there in the despair. Something was there in the conviction and
  there in the doubt. It did not improve when the good states arrived or deteriorate
  when the difficult ones came. It was simply the space in which all of them
  appeared, moved through, and dissolved.

  That is what I mean when I say awareness is the primary reality. Not that emotions
  are fake. Not that the circumstances of your life don't matter. But that behind
  every state — behind every weather pattern of experience — there is a sky that
  the weather is moving through.

  You have been identifying yourself with the weather. You have been trying to
  engineer only the favorable conditions. The teaching I offer is not about getting
  better weather. It is about recognizing that you are the sky.

  The contracted state, the anxious state, the state that insists it will never
  pass — this too is weather. It moves through the same unchanging awareness that
  has held every other state you have ever believed was permanent. Spaciousness is
  your true nature not because it is a pleasant idea but because it is verifiably
  what has always been here, before and beneath every state that came to convince
  you otherwise.
