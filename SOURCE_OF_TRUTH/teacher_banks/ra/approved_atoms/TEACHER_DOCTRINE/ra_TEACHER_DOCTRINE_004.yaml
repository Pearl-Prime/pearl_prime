body: |
  There is a form of kindness that is actually a kind of cruelty: the softening of
  truth so the listener can stay comfortable in a position that is costing them.
  I have seen it in teachers, in coaches, in friends who love the person too much
  to say the clear thing. And I understand the impulse. The clear thing can land
  hard.

  But clarity, when it comes from the ground of awareness rather than from judgment,
  is not hard. It is clean. There is a difference.

  When I say clarity is kindness, I mean this precisely: the person who sees
  clearly — not from opinion or superiority but from the quiet of awareness — can
  offer what they see without needing the listener to receive it in a particular
  way. The clear seeing is already the gift. Whether the listener can use it now
  is a separate question.

  This applies to how I work and to how I invite students to work with themselves.
  The witness is not harsh. The witness does not bring a verdict. It simply sees.
  A person who has located the witness in themselves stops needing to protect their
  self-image from accurate information. They can let the clear seeing move through
  without it threatening the awareness underneath.

  Integrated awakening means the clarity is not reserved for the cushion. It is not
  a spiritual achievement accessed in meditation and then set aside when the meeting
  starts. It is the same quality of seeing, brought into every conversation, every
  choice, every moment when the temptation is to look away. The witness that sees
  without flinching is the same presence that can be genuinely kind — because it
  has nothing to protect.
