body: |
  When I use the word costume, people sometimes hear a dismissal of everything they
  have worked to become. They have spent years building competence, building a
  reputation, building the person they show up as. And they hear me say costume and
  flinch, because it sounds like I am saying: none of that matters.

  That is not what I am pointing to.

  The costume is real. The skills are real. The history that shaped you is real.
  What I am inviting you to notice is that you are wearing these things — and the
  one wearing them is not reducible to any of them. When the costume comes into
  question — when the role you built your identity around shifts, or the performance
  you believed was you stops being convincing — something panics.

  What is panicking? Look carefully. It is not the awareness. The awareness is not
  panicking. Something in the costume is panicking because it believes the costume
  is the person. Costume-dropping is not destruction. It is the recognition that
  you were never only what you were wearing.

  This distinction matters practically. The person who has identified entirely with
  the costume cannot update the costume without it feeling like annihilation. They
  cannot receive honest feedback, cannot change direction, cannot let a chapter end.
  Because every adjustment feels like dying.

  The one who knows they are wearing a costume can change clothes. They can update
  what they do, how they show up, which roles they inhabit — without existential
  terror, because the wearer knows it is still here regardless of what it's wearing.
  This is not detachment. It is the freedom that comes from knowing what you actually are.
