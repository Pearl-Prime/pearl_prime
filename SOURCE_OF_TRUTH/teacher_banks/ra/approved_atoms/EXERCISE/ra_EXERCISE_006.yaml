atom_id: ra_EXERCISE_006
body: 'Stand with your feet hip-width apart and eyes open. Feel your feet on the ground. This is your root. Now expand your awareness upward to include the vast sky above you. You are simultaneously rooted in the earth and open to the sky. Breathe and notice that you are the meeting point of these two infinities. You are grounded and spacious at once. This is the balance Ra teaches. Continue for five to seven minutes. This practice prevents the anxiety that comes from either being ungrounded or disembodied. You are witness and participant. Vast and incarnate.'
