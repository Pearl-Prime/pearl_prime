atom_id: ra_EXERCISE_011
body: 'This is a witnessing grief practice. Sit comfortably and allow your grief or sadness to be fully present. Do not try to shift it or make it better. Simply observe it with tenderness. Feel where it lives in your body. Notice the thoughts that accompany it. Notice the emotions. And from the witnessing awareness, hold all of this with compassion. The grief is honored. It is not bypassed. But you are not collapsed into it. You are simultaneously the one who grieves and the vast awareness that holds the griever. Practice for five to ten minutes. This teaches the necessary integration: to feel fully and simultaneously know you are vast.'
