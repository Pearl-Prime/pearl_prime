atom_id: ra_EXERCISE_008
body: 'This is a spaciousness practice. Sit with your eyes closed. Imagine that your awareness is expanding outward in all directions like an infinite sphere. You are not contracting into your body. You are expanding into space. The body is within this spacious awareness, not the center of it. Your breath, your heartbeat, your thoughts—all appear within this vastness. Nothing is outside it. Practice this for five to ten minutes. This expands the container of awareness and dissolves the claustrophobia that comes with being fused with anxiety or overwhelm.'
