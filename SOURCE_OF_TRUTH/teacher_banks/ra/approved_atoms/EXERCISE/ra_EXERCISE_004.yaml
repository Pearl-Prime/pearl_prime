atom_id: ra_EXERCISE_004
body: 'Sit with your feet flat on the ground. Place your awareness at the base of your spine, feeling your connection to the earth. This is your ground, the foundation that does not move. From here, expand your awareness upward through your spine, feeling the stability all the way up through the crown of your head. You are rooted and spacious at the same time. Continue for five to seven minutes. This practice creates what Ra teaches: witnessing without detachment. You are grounded in your humanity and simultaneously aware of the vast consciousness that contains everything. It heals both anxiety and the spiritual bypassing that comes from ungrounded transcendence.'
