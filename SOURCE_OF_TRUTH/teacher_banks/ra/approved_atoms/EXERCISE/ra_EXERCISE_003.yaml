atom_id: ra_EXERCISE_003
body: 'This is a thought-observing practice. Sit comfortably and notice the thoughts that arise naturally, without trying to create them or suppress them. Observe them as if they are clouds passing through the sky of your awareness. Do not judge them. Do not believe them. Simply observe: "There is a thought. There is another thought." The key is to find the space between the thoughts, where there is stillness. Rest there. Continue for five to ten minutes. This practice creates distance between you and habitual thought patterns, allowing clarity to emerge.'
