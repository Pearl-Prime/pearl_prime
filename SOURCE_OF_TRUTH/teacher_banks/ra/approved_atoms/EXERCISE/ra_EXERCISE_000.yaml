atom_id: ra_EXERCISE_000
body: 'Sit comfortably with your eyes open or closed. Notice whatever is present in this moment: a sensation in your body, a thought, a sound, an emotion. Do not judge it. Do not try to change it. Simply observe it with curiosity, as if you are witnessing something on a screen. After a few breaths, let that attention shift to something else. The thought passes. The sensation changes. Notice the awareness that is observing all of this without being harmed. This is witnessing practice. Continue for five to ten minutes. This foundational practice cultivates clarity and grounds you in the vast awareness that is unharmed by what passes through it.'
