atom_id: ra_EXERCISE_002
body: 'Sit with your spine upright. Place your awareness on the sensations in your body without trying to change them. Feel the weight of your body on the chair. Feel the texture of your clothing. Feel any places of tension or ease. You are simply observing. You are not the sensations. The sensations are happening in the field of awareness that you are. Continue for five to eight minutes. This grounded witnessing practice anchors you in your physical reality while cultivating the clear observation that prevents anxiety from collapsing into overwhelm.'
