atom_id: ra_EXERCISE_007
body: 'Sit comfortably and practice observing your emotions without identification. You might say silently: "There is anger. There is sadness. There is fear." You are not these emotions. They are passing through you. Continue to observe for five to eight minutes. The practice creates what Ra teaches: clarity of observation. When you are identified with your emotions, they control you. When you observe them, you remain in the vast awareness that is unharmed by them. This practice directly addresses anxiety spirals by creating the space between you and the thought/emotion complex.'
