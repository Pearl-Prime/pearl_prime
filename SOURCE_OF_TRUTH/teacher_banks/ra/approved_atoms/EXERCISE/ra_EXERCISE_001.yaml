atom_id: ra_EXERCISE_001
body: 'Find a comfortable seated position. Breathe naturally. As you breathe, imagine that you are observing your breath from a vast distance. You are not the breath. You are the awareness that observes the breath. The breath comes. The breath goes. The observer remains. Do this for five to seven minutes. This teaches you to locate and rest in the witnessing awareness. It creates a gap between you and the automatic processes of mind and body, allowing clarity to emerge.'
