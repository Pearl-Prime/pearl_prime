atom_id: ra_EXERCISE_010
body: 'Sit comfortably and practice observing your judgments about yourself. Each time you notice a judgment—"I am not good enough," "I am failing," "I should be different"—simply observe it as you would observe a cloud. Do not argue with the judgment or believe it. Just notice: "There is a judgment." The witnessing itself is the practice. Over time, the judgments lose their grip because they are no longer being believed; they are simply being observed. Continue for five to ten minutes. This practice directly addresses the anxiety that comes from constant self-judgment and self-criticism.'
