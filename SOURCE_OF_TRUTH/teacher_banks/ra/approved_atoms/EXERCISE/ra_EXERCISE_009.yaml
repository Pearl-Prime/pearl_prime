atom_id: ra_EXERCISE_009
body: 'Sit with your eyes softly open. Practice clarity of observation by noticing what is true right now without adding anything to it. See this moment as it actually is. Not the story about it. The actual data: the light, the sounds, the sensations, the basic existence of things. Notice how much of your suffering comes from the story you add to what is actually happening. The practice is to rest in clarity—what is actually here right now. Continue for five to seven minutes. This is the heart of Ra''s teaching: clarity is kindness. To see what is without distortion is to be free.'
