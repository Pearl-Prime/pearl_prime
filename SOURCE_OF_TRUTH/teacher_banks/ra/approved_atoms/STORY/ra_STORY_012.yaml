body: |
  Miriam is fifty-one years old. She sits across from her adult daughter in a restaurant booth. The daughter speaks. Her words land like small stones: "You were never really present. Even when you were there, you weren't there."

  Miriam's chest tightens. Her hands press flat against the table. She does not speak immediately.

  Something in her wants to defend. Something in her wants to explain the years of working double shifts, the exhaustion, the love that had no language. The defense rises like heat.

  She watches it rise.

  She does not become the defense. She does not become the shame that follows it. She sits in the booth and notices: jaw clenched, breath shallow, a burning behind the sternum.

  She names none of this aloud. She simply sees it.

  Her daughter waits. The silence between them is not empty. It holds everything that was never said across thirty years.

  Miriam exhales slowly. "You are right," she says. "I was not present in the way you needed."

  No elaboration. No rescue. The words fall clean.

  Her daughter's eyes fill. She did not expect agreement. She expected the familiar wall.

  The wall is not there. In its place is something Miriam cannot name but can feel in her open hands resting on the table. Not peace exactly. Not resolution. Something more like ground. The kind that does not require the conversation to go any particular way in order to remain solid.

  They sit together in what is true. Neither of them moves to fill it.
