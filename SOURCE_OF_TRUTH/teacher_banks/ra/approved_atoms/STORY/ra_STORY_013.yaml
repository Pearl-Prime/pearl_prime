body: |
  Darius is thirty-four. He sits in a hospital corridor at 2 a.m. His father is in surgery. The corridor is long and white and indifferent.

  His body does not know what to do with this. His legs press hard against the plastic chair. His throat is dry. His mind runs the same loop: he should have called more, he should have visited last month, he should have said the things that now hang unfinished.

  He is not a man who meditates. He has no practice. He has only this moment and the weight of it pressing through his chest like something structural giving way.

  He closes his eyes. Not to escape. There is nowhere to go.

  He notices the fluorescent hum above him. He notices the cold air on his forearms. He notices the thoughts arriving and departing like trains he did not board.

  The thought: he might not make it.

  He does not push it away. He lets it be present. It sits in the corridor with him.

  Something underneath the thought does not move. He cannot name it. It is not comfort. It is not hope. It is simply the fact of his own presence, undeniable, here, aware.

  He is the one who knows the fear. He is not the fear itself.

  A nurse passes. He watches her shoes on the linoleum. The hum continues. His father is somewhere behind a closed door, and Darius is here, breathing, the witness to all of it.

  The grief is real. The ground beneath the grief is also real. Both are true at once.

  He does not move. He does not need to. He waits with everything that is.
