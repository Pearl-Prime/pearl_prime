body: |
  Tomás is forty-six. He has been sober for three years. He attends a weekly group and speaks honestly and has rebuilt much of what the drinking dismantled.

  Tonight the group leader asks: who are you now, without the story of the addict?

  The room is quiet. Tomás looks at his hands. Thick fingers. A scar across the left knuckle from a night he does not fully remember.

  He has built his identity on the recovery. The addict who became sober. The man who did the work. This story is true. It is also a story.

  He opens his mouth and closes it.

  "I don't know," he says. His voice is level but his jaw is tight.

  The group leader nods once. Says nothing.

  Tomás sits with the not-knowing. It is not comfortable. The chest opens in a way that feels like exposure. He has no armor for this. The recovery narrative was armor. The addiction before it was armor.

  Underneath both of them is something that has no name and no history.

  He breathes. The chair is solid beneath him. His feet press the floor.

  He is the one who drank. He is the one who stopped. He is also the one who was present through all of it, watching, unchanged by the content passing through.

  He does not say this aloud. He lets it stay where it lives, below language.

  After the group ends he stands outside in the cold air. His breath is visible. He watches it disperse. He does not reach for his phone. He stands in the spaciousness of not yet knowing what comes next, and finds it bearable.
