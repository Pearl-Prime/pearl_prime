body: |
  The teaching of witnessing is simple but not easy. It is not about shutting down emotion or becoming detached from life. It is about knowing the difference between the content of your experience and the awareness in which it is held.

  Imagine a glass of water. The water is the content—your thoughts, emotions, sensations. The glass is awareness. The glass holds the water but the glass is not the water. The glass remains clear regardless of what liquid it contains.

  When you are depressed, the water is dark. The glass is still clear.

  When you are anxious, the water is turbulent. The glass is still clear.

  When you are grieving, the water is heavy. The glass is still clear.

  This is not a promise that the depression or anxiety or grief will disappear. The water may be dark for a long time. But you are not the water. You are the glass. And the glass is unbreakable.

  The practice is to notice: I am experiencing this thought. I am observing this feeling. I am aware of this sensation. The small shift of perspective—from identification (I am anxious) to observation (I am observing anxiety)—opens the whole sky.

  This does not require years of meditation. You can practice it right now, in any moment. Right now, what are you observing? A room, a thought, a sensation. You are the observing presence. The content can change but the observing presence remains.

  This is clarity. This is kindness to yourself. Not in denying what is true but in knowing that what you are is larger than any single experience.

  Rest in this knowing. The ground is always here.
