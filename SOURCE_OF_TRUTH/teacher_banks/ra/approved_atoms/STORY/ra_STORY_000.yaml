body: |
  Kenji is a high school teacher. He has been teaching for twelve years and is very good at what he does. But for the past six months, he has been increasingly anxious. He cannot sleep. He cannot eat. His mind spins with catastrophic thoughts: what if I am not good enough, what if the students are suffering in my class, what if I am doing it all wrong.

  His partner has suggested meditation. His doctor has suggested medication. He tries both. The anxiety persists. It is not the worst anxiety he has ever felt, but it is relentless. It colors everything.

  One night, sitting alone, he tries a different approach. He does not try to meditate away the anxiety. He does not try to fix it. Instead, he observes it like someone watching clouds move across the sky.

  Here is the thought: I am failing.
  Here is the feeling: a tight band around my ribs.
  Here is the sensation: pressure in my head.

  He does not identify with any of it. He is not the thought. He is not the feeling. He is the one observing. He is the space in which the anxiety appears and then dissolves.

  The anxiety does not disappear. But something in him has shifted. He is no longer fused with it. He is not at war with it. He is simply witnessing it. And the witness is clear. The witness is untouched.

  When he returns to class the next day, he still feels the anxiety. But it is information now, not a verdict. He teaches well. The students respond. And underneath it all, there is a stability that comes from knowing: I can observe this anxiety without being destroyed by it.
