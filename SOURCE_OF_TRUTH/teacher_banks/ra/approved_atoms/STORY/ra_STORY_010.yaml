body: |
  Marcus has not spoken to his brother in five years. The estrangement is complete. The pain is never far from the surface. He has tried therapy. He has tried to let it go. Nothing works. The rift is still there, unhealed.

  One day, walking through the park, he sees someone who looks like his brother from a distance. The grief crashes through him. Five years. Five years of silence. Five years of carrying this loss.

  He finds a bench and sits with the grief. He does not try to fix it. He does not tell himself: you have to let this go, you have to move on. He simply sits with the fact that his brother is alive and they do not speak. That is the reality. That is what is true.

  As he sits, something becomes clear. The grief is real. The hurt is real. The loss is real. But the witness observing this grief is not harmed by it. The witness is not destroyed by the estrangement. The witness is clear.

  This is not the same as feeling better. The grief is still there. The loss is still there. But he is not entirely identified with it anymore. He is the ground in which the grief appears. And the ground is vast enough for this.

  He does not know if the estrangement will be healed. He does not know if his brother will ever call. He does not know what the future holds. But in this moment, he has found something steady. Something untouched by the loss.

  He sits on the bench for a long time. He cries. The witness witnesses the crying without judgment. Without trying to make it mean anything. Just: here is loss, here is love, here is the clear sky.

  He stands eventually and walks out of the park. The grief walks with him. It will always walk with him. But he no longer believes the grief is the final word about his life.
