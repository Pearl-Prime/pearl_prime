body: |
  Marcus is sixty-three. He retired eight months ago after forty years in civil engineering. He built bridges. Literal ones. He is proud of this and says so when asked.

  Nobody asks anymore.

  He spends his mornings at the kitchen table with coffee, watching the yard. His wife is at work until three. The house is quiet in a way that has weight.

  He is not depressed. He has checked this carefully. He sleeps well. He eats. He exercises. He is fine.

  He is also nobody in particular.

  One morning he notices he is watching a bird on the fence post. A sparrow. It sits for a long time, then flies. He watches it go.

  He does not reach for his phone. He does not turn on the television. He stays with the empty fence post.

  Something in him recognizes this moment. He cannot say from where. The recognition is not intellectual. It is in the sternum. A kind of settling.

  For forty years he was the engineer. The builder. The one with the answer to the load-bearing question. That is not gone. It is simply not present right now.

  What is present is this: a man, a table, a coffee cup, a fence post, morning light.

  He is the awareness in which all of it appears. He does not know this as a teaching. He knows it as a fact, the way he knows the temperature of the coffee without thinking about temperature.

  He refills his cup. He sits back down. He watches the yard with the quality of someone who has nowhere else to be and finds this, for the first time, sufficient.
