body: |
  Soo-Yeon is twenty-eight. She works in data analysis. She is precise, efficient, well-regarded. She arrives at her desk each morning at eight and leaves at six and fills the hours between with competence.

  On a Tuesday afternoon she pauses mid-spreadsheet. Her hands stop on the keyboard. Something is absent. She cannot name it. The numbers are correct. The report will be finished on time. Everything is as it should be.

  And yet.

  She turns her chair toward the window. The city is gray and ordinary below her. She breathes once, slowly, through her nose.

  She is not unhappy. She is not happy either. She is something more like transparent. As though she could pass a hand through herself and find nothing solid.

  She has read about witnessing. A book her cousin gave her, which she found too abstract. But now, in this Tuesday pause, she tries it without trying.

  She looks at the transparency and does not call it emptiness. She looks at it and calls it space.

  Space is not a problem.

  The thought arrives: I do not know who I am outside of what I produce.

  She watches the thought. It is accurate. It is also just a thought. It rises in something that is not itself a thought. It rises in the awareness that observes it.

  That awareness is not transparent. That awareness is clear.

  She turns back to the spreadsheet. She finishes the report. But something has shifted in the quality of her attention. The numbers are the same. She is not.
