body: |
  Priya is twenty-two. She is in her final year of university. She calls her mother and says: "I don't think I believe in God anymore."

  The line goes quiet. Her mother's silence is not peaceful. It is the silence of something breaking.

  Priya's throat tightens. She holds the phone against her ear. She hears her mother's breath.

  "You will come back to it," her mother says finally.

  Priya does not argue. She says goodbye. She puts the phone down on the desk.

  She sits with what she has done. The room is small. A single lamp. A plant on the windowsill that needs water.

  She expected relief. What she finds is more complicated. There is relief. There is also grief. There is also something she has no name for, a vast open space where certainty used to live.

  She does not rush to fill the space with a new certainty.

  She breathes into it. The spaciousness is uncomfortable in the way that open country is uncomfortable after years of walls. Too much sky. No edges.

  She looks at the plant. Its leaves droop slightly. She gets up and waters it. The act is small and complete.

  She returns to her chair. The open space is still there. She does not know what she believes. She knows she is the one asking the question. She knows the asking itself is clear, is honest, is real.

  The ground beneath the question does not require an answer. It simply holds the one who asks.

  She sits until the lamp is the only light in the room.
