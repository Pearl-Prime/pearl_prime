body: |
  There is a story about a river and a stone.

  The stone sits at the bottom of the river. The river moves over it, around it, through the crevices at its edges. In flood season the water is violent and fast. In dry season it slows to a trickle. The stone does not chase the flood. The stone does not mourn the drought.

  A traveler stops at the bank and asks the stone: are you not swept away?

  The stone says nothing. The stone has no need to answer.

  The traveler watches the water move. He watches it carry leaves, silt, the occasional branch. He watches it carry his own reflection, distorted and brief.

  He understands then that the river is not asking the stone to become water. The river is not asking the stone to be still. The river simply moves, and the stone simply is, and neither one requires the other to be different.

  The traveler sits down on the bank. He has been moving for many years. He has been trying to become something. He has been trying to stop becoming something. Both efforts exhaust him equally.

  He places his hand in the water. The cold moves through his fingers.

  He is neither the water nor the stone. He is the one who feels the cold. He is the awareness in which the river and the stone and the reflection and the exhaustion all appear.

  He does not need to become the stone. He already is the ground in which the stone rests.

  He sits until the light changes. Then he stands and continues walking. The river continues behind him, unchanged, carrying everything and holding nothing.
