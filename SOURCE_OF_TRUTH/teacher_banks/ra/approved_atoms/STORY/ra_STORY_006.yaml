body: |
  In the mountain teaching, there is a story about the stone. The stone sits in the field. The sun rises and beats down on the stone. The stone is heated. The rain comes and cools it. The wind buffets it. The snow piles on top of it. The seasons turn. The years pass.

  The stone is subject to all of this. But the stone is never damaged by any of it. The stone does not resist the sun or grasp for the rain. The stone does not contract against the wind. The stone simply endures. And in enduring, the stone is shaped. But the stone itself is never harmed.

  This is the teaching. You are not the stone, but you have the stone's nature. What happens to you—loss, grief, fear, humiliation—is like the weather moving through. You are subject to it. But you are not destroyed by it.

  The stone does not try to be peaceful. The stone simply continues. It does not meditate on its own solidity. It simply is what it is, unmoved at the center even as it is moved on the surface.

  This is the ground you are. This is the being that you are. Not separate from the movement of life but not identified with it. Held in clarity that is not personal but is always available.

  Rest in this. Rest in your stoneness. Rest in the ground that does not move regardless of what passes across it.
