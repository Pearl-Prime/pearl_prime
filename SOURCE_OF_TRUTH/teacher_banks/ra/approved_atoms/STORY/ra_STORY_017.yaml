body: |
  Lena is thirty-nine. She teaches yoga. She is known for her calm. Students tell her she has a gift. She accepts this gracefully and does not mention that she has not felt calm in four months.

  She stands at the front of the studio before class begins. The room smells of cedar and clean mats. Twelve students arrange themselves in rows.

  Her stomach is tight. The tightness has no clear cause. She has examined it from every angle: her marriage is stable, her health is fine, her work is meaningful. The tightness does not respond to logic.

  She begins class. Her voice is steady. She cues the breath, the alignment, the release.

  She watches herself teach. Not with judgment. With the quality of observation she has practiced for years but rarely turned toward herself.

  Here is the voice that sounds calm. Here is the stomach that is not. Here is the gap between them.

  She does not try to close the gap. She witnesses it.

  The class moves through its sequence. A student in the back struggles with balance and laughs at herself. Lena smiles genuinely. The smile is real even inside the tightness.

  After class, she sits alone on her mat. The studio empties. She places one hand on her abdomen. The tightness is still there.

  She says to it, silently: I see you. You are not me. But I am not fighting you.

  The tightness does not dissolve. It shifts slightly, the way a held breath shifts when someone finally notices it is being held.

  She rolls her mat. She turns off the lights. She walks out into the ordinary evening, witnessing herself walk.
