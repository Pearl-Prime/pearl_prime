body: |
  A room with a single window. Morning light. A person sits in a chair and does not move for forty minutes. They do not meditate. They do not pray. They do not try to achieve anything.

  They just sit. They watch the light move across the floor. They hear the sound of traffic outside. They feel the weight of their body in the chair. They feel the breath moving.

  There is no meaning being constructed. There is no story. There is only the simple fact of being alive in this moment. The light. The sound. The breath. The chair holding the body.

  As the light moves, something in them settles. Not into peace necessarily. Just into the clarity that this moment is exactly as it is. It does not need to be different. It does not need to be improved. This sitting. This light. This breath. This is everything.

  When they stand after the sitting, the world is the same as it was. But they are different. They have touched the ground that does not move. They have remembered that beneath all the doing and all the becoming, there is a being that is always intact.

  They move through the rest of the day from this knowing. The day will be what it is. But the one who moves through it is rooted in the stillness that was here the whole time.
