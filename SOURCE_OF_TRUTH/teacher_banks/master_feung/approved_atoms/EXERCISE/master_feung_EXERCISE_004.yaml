atom_id: master_feung_EXERCISE_004
body: 'On a blank page, draw a rough outline of a very large painting — rectangle filling
  the page. Mark a single small dot anywhere inside it. That dot is you. Now mark
  fifteen more dots, scattered throughout the painting — each one a person in your
  life. Look at the full picture. Notice that no dot is at the center. No dot is more
  necessary than another. Notice how the anxiety of needing to be in the right position
  softens when you see the whole.'
