atom_id: master_feung_EXERCISE_000
body: 'Find a comfortable seat with your spine upright but not rigid. Let your hands rest on your thighs, palms up if possible. Close your eyes gently. Begin to notice your natural breath without trying to change it. After a few moments, begin to breathe more deeply, imagining that your inhale is traveling all the way down to your belly—below your navel, into what is called the dantian. Your belly should expand gently on the inhale. On the exhale, let everything soften and release. Practice this for five to ten minutes. This is foundational for calming anxiety and connecting with your center.'
