atom_id: master_feung_EXERCISE_010
body: 'Write down the name of someone you have been caring for at the expense of yourself.
  Beneath their name, write your own name. Both names are brushstrokes in the same
  painting. Neither name is more necessary. Now ask: what would a stroke of genuine
  care for yourself look like today? Write one specific thing. That is your next stroke.
  Make it.'
