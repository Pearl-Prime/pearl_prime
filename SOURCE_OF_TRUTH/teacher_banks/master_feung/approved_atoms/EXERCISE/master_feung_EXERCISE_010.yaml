atom_id: master_feung_EXERCISE_010
body: 'Stand with your feet wider than shoulder-width apart, knees bent as if in a wide squat but not lowering completely—only bend about fifteen to twenty degrees. Let your arms hang at your sides or rest your hands on your thighs. Breathe naturally and deeply for three to five minutes. This is the horse stance, a fundamental Qigong posture. It builds root, stabilizes your center, and reminds your body that it has the capacity to hold steady. Begin with just thirty seconds to one minute if this is new, and gradually build duration. This is especially grounding for anxiety and self-doubt.'
