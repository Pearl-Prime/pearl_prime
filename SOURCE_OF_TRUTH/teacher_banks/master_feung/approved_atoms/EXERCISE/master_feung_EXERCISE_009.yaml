atom_id: master_feung_EXERCISE_009
body: 'Stand at a window or go outside. Look at something that has been there longer
  than you have — a tree, a building, a hillside. Say to it: "You were here before
  my worry and you will be here after." This is not spiritual bypass. This is scale
  calibration. Let your nervous system register the presence of something that has
  continued without your management. Breathe once from that registering. Return to
  your day with the scale corrected.'
