atom_id: master_feung_EXERCISE_007
body: 'Fill a page with the same character written as many times as will fit, without
  lifting the pen between characters — just a long continuous trail of marks. When
  the page is full, set it beside you. This is what sustained effort looks like: not
  impressive individual strokes but the patient accumulation of presence. Burnout often
  comes from believing each stroke must be the best stroke. This page shows that showing
  up is enough.'
