atom_id: master_feung_EXERCISE_007
body: 'Lie on your back with your knees bent and feet flat on the floor, hip-width apart. Place one hand on your chest and one on your belly. As you inhale slowly, let your belly expand while your chest remains relatively still. This is belly breathing, the foundation of calm. As you exhale, let both the belly and chest soften completely. Practice this for five minutes. If your mind wanders, simply notice and return to the breath without judgment. This is the most foundational practice for soothing the nervous system and releasing anxiety. It can be done anytime, anywhere.'
