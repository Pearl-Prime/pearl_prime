atom_id: master_feung_EXERCISE_006
body: 'Stand with your feet hip-width apart and knees slightly bent. Imagine that your spine is like a string suspended from the crown of your head. Gently roll your shoulders backward five times, then forward five times. Then slowly turn your head to the right as far as is comfortable, return to center, and turn to the left. Do this five times in each direction. Finally, gently drop your right ear toward your right shoulder, return to center, and repeat on the left, five times each side. These movements release tension and open the meridians in your neck and shoulders, areas where anxiety and burnout get locked.'
