atom_id: master_feung_EXERCISE_006
body: 'Take any object that represents something you have been giving too much of yourself
  to — a work badge, a bill, a phone. Hold it in both hands. Say aloud: "This is one
  stroke. It is not the whole painting." Set the object down. Step back two paces
  and look at the room. The room is larger than the object. You are larger than this
  one demand. This is the Grand Painting perspective: zoom out until the proportion
  is accurate.'
