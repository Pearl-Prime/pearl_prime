atom_id: master_feung_EXERCISE_012
body: 'Place your hand flat on a table. Feel the pressure of the surface against your
  palm. Notice the weight of your arm, the temperature of the surface, the small sounds
  in the room. This is the body being fully present — not performing wellness, not
  achieving calm, just registering what is actually here. Stay for sixty seconds. The
  painting is not made by floating above the canvas. It is made by contact. This is
  contact.'
