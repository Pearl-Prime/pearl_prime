atom_id: master_feung_EXERCISE_008
body: 'Stand with your feet shoulder-width apart. Slowly bend your knees and bring your hands down as if you are gathering something from the earth. As you stand back up, smoothly raise your hands up the center of your body, as if you are bringing energy from the earth up through your core. At the top, open your arms out to the sides in a gesture of expansion. Then slowly bring them back down to gather again. Repeat eight to ten times, moving slowly and smoothly. This is a foundational Qigong sequence that builds and circulates qi, especially helpful for burnout and the feeling of being depleted.'
