atom_id: master_feung_EXERCISE_008
body: 'Write on a small piece of paper one thing you feel you have failed at. Fold the
  paper once. Now write on the outside: "This stroke belongs to the painting." The
  fold is not erasing it — the stroke happened and it is real. But it is one stroke
  among thousands. Place the folded paper somewhere you will see it once more, then
  let it go. The painting is not ruined by a difficult stroke. It is made complex and
  real by it.'
