atom_id: master_feung_EXERCISE_005
body: 'Before sleep tonight, take one minute. Write one sentence about something that
  happened today that felt true — not good or bad, just true. Do not edit it. Set
  it down. That sentence is a completed brushstroke. The day is now a finished piece.
  You do not need to carry it into tomorrow. Put the paper face-down and sleep.'
