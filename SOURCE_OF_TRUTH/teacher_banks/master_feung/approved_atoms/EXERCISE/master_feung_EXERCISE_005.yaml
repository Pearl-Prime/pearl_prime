atom_id: master_feung_EXERCISE_005
body: 'Sit with your spine upright. Place your index and middle fingers on the inner wrist, where you can feel your pulse. This is the location of important meridian points. Breathe slowly and deeply, and as you breathe, gently press these points with each exhale. Imagine that you are sending calming energy down your arm and into the earth. After one minute, switch arms. This practice is grounding and helps move stagnant energy that creates anxiety and self-doubt. It can be done anywhere, anytime.'
