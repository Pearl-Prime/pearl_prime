atom_id: master_feung_EXERCISE_002
body: 'Sit comfortably and place one hand on your heart center and one hand on your lower belly. Breathe naturally. As you inhale, imagine golden light filling your heart. As you exhale, imagine this light traveling down through your center line to your belly, grounding there. Do this for seven to ten breaths. Then reverse: as you inhale, imagine light rising from your belly to your heart. As you exhale, imagine it radiating outward. This circulates energy through your meridians and connects your heart and belly, calming anxiety and restoring wholeness.'
