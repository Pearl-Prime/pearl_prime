atom_id: master_feung_EXERCISE_002
body: 'Write down the name of one thing you are anxious about. Now place the paper on
  a flat surface and look at it from a standing position. Then imagine standing on
  the peak of Hua Shan — granite that is four hundred million years old, carved by
  forces that predate human civilization. Read the name again from that height. Notice
  what stays and what changes in scale. You do not have to dismiss the anxiety. Simply
  let it be a small stroke in a very large painting.'
