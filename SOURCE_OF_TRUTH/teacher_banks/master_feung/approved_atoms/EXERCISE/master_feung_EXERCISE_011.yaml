atom_id: master_feung_EXERCISE_011
body: 'Take a pen and write the number of years you have been alive. Beside it, write
  400,000,000 — the approximate age of the granite at Hua Shan. Look at the two numbers
  together. You are a very new stroke. Your financial worry, your fear of running out,
  your sense that time is against you — these are strokes that feel vast from inside
  the stroke. From outside, they are very recent, very small, and very temporary.
  The painting continues regardless. You have time.'
