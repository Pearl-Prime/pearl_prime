atom_id: master_feung_EXERCISE_011
body: 'This is an inner smile practice. Sit comfortably with your eyes closed. Begin to breathe slowly and deeply into your dantian, the energy center below your navel. Then, with your mind, smile gently at each part of your body, starting with your head and moving downward: smile at your eyes, your nose, your mouth, your throat, your heart, your belly, your legs, your feet. As you smile at each part, imagine that part glowing with warmth and appreciation. This entire practice takes about five to seven minutes. It cultivates self-compassion, dissolves shame, and reminds your body that it deserves kindness.'
