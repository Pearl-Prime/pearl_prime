atom_id: master_feung_EXERCISE_001
body: 'Take a piece of paper and a pen or brush. Without planning what you will write
  or draw, make one mark on the paper. It does not matter what it is. Now look at
  it. That mark cannot be undone. It is part of the painting. Notice what it feels
  like to have made something that is complete and irreversible — not a draft, not
  a practice run, but the actual stroke. This is the teaching. The next mark is also
  irreversible. The practice is to make it fully, without holding back in anticipation
  of correction.'
