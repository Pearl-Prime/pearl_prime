atom_id: master_feung_EXERCISE_001
body: 'Stand with your feet shoulder-width apart, knees slightly bent, as if you are about to sit in a chair but only descend a few inches. Let your arms hang at your sides. Begin to sway very gently side to side, as if you are a tree in a light breeze. Keep the movement minimal—only an inch or two in each direction. Breathe naturally. As you sway, imagine that roots are growing from the soles of your feet deep into the earth. This grounds your energy and stabilizes your nervous system. Practice for three to five minutes. This is especially helpful for overwhelm and anxiety.'
