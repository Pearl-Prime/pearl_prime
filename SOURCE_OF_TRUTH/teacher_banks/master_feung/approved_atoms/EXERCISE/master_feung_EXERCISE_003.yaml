atom_id: master_feung_EXERCISE_003
body: 'Take a brush or pen and write the character for person — 人 — slowly, in one
  unbroken motion. Do not lift the instrument until the character is complete. Notice
  that the character requires you to commit fully before you know how it will land.
  This is how boundaries work: they must be written in one continuous stroke, not
  edited mid-way. Practice writing it three times. Each time, begin without hesitation.'
