atom_id: master_feung_EXERCISE_003
body: 'Stand with feet shoulder-width apart. Slowly raise your arms out to your sides and up above your head, as if drawing energy from the earth toward the sky. This should take about three seconds. Pause at the top for one breath. Then slowly lower your arms, bringing them down the front of your body as if you are gathering energy and bringing it back to your center. This should also take three seconds. Repeat five to ten times. This is a basic Qigong movement that opens your meridians, relieves burnout, and reminds your body that it has access to energy and support.'
