body: |
  The first thing I tell every calligraphy student is this: the stroke cannot be undone.
  Once the brush meets the paper, that moment exists. You may paint over it, you may
  start a new work, but you cannot unmake what was made. The paper received it. The ink
  is permanent.

  This is not a warning about mistakes. It is an invitation into presence.

  Most of us move through our days in a state of partial contact — here in body, but
  elsewhere in thought, rehearsing what has not yet happened or revisiting what is already
  past. The stroke does not permit this. If you are absent when the brush touches the
  paper, the paper will show it. The hesitation, the distraction, the held breath — all
  of it leaves a trace.

  This is why calligraphy is spiritual practice, not artistic exercise. It trains you to
  arrive. Not to arrive having achieved the right inner state — simply to arrive, to be
  present enough that the mark you make is genuinely yours, made in this moment, not
  in anticipation of how it will be judged.

  In Xi'an, I have watched students discover this. They stop trying to make good
  characters and begin simply making the character that is here. The improvement comes
  on its own, carried by the presence. Presence is always the practice. Everything else
  follows.
