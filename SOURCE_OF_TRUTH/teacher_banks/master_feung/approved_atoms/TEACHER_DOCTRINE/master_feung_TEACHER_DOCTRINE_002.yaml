body: |
  There is a teaching I have carried from the lineage of Hua Shan, from the calligraphers
  who preceded me, and it is this: the brush does not improve by imitating a better brush.
  It improves by becoming more fully what it already is.

  We live in a time that has an enormous appetite for self-improvement. I do not object
  to this. Refinement is real. Practice matters. But underneath much of what we call
  self-improvement is a quiet rejection — a turning away from the self that exists now
  in order to reach a self that does not yet exist. This is different from genuine
  development. Genuine development happens when you go deeper into what is already true
  about you, not when you replace yourself with a different version.

  When I look at a student's calligraphy, I am not looking for the characters to match
  an ideal form. I am looking for the student to be present in the stroke. The great
  masters are recognizable precisely because their presence is unmistakable — you can
  feel the person who made this mark. Not their technique. Their being.

  This is what I am trying to point toward when I say: being yourself is the teaching.
  Not performing yourself. Not curating yourself. The painting does not need your most
  polished version. It needs your actual mark — the one only you can make.
