body: |
  My students in Xi'an sometimes ask me why their best characters emerge after long
  periods of frustration. They practice for weeks without progress, and then one morning
  the brush moves differently. They want to know what changed.

  What changed is that the frustration became part of the work. It was not standing
  outside the learning — it was the learning, pressing inward, opening something that
  comfort would not have opened.

  In the Grand Painting, suffering is not a smear on an otherwise clean surface. It is
  pigment. The tradition I come from has witnessed centuries of human difficulty — wars,
  upheaval, loss, the collapse of dynasties and the slow rebuilding of ordinary life.
  What survived was not the absence of darkness. What survived was the understanding
  that darkness has its place in the composition, the same as light.

  Your longing, your grief, your sense that something important has not yet arrived —
  these are not signs that you have been overlooked. They are signs that you are alive
  and awake, that you are taking the painting seriously. The aspiration to become
  something more is itself a kind of brushstroke. It creates tension in the composition,
  and tension is what gives a painting its life.

  Do not try to resolve your suffering prematurely. Sit with it long enough to discover
  what it is asking you to paint.
