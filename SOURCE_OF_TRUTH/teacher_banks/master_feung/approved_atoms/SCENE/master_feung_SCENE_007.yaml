body: You have brought your financial spreadsheet with you, somehow, in your mind, all the way up Hua Shan. At the peak, you look out across the Guanzhong Plain and the numbers feel suddenly abstract. The mountain was here four hundred million years before currency. It will be here four hundred million years after. You carry the spreadsheet back down, but it is lighter.
