body: 'Claudia was afraid of people. Not all people, and not in a clinical way — she
  had managed to build a life and a career and close friendships. But in groups, at
  parties, in rooms where she knew no one, she became small and careful and returned
  home exhausted and ashamed of her smallness.

  She had always thought of this as a failure of courage. She had tried many interventions.
  She came to Master Feung''s workshop looking for another one.

  On the second day, she admitted that she found social situations painful. Master
  Feung asked: "What are you afraid will happen if someone sees your brushstroke clearly?"

  She thought about it. "That they won''t like it."

  "And if they don''t?"

  "Then it means the brushstroke is wrong."

  Master Feung was quiet for a moment. "You have confused the judgment of the viewer
  with the validity of the stroke. In the Grand Painting, no viewer gets to decide
  whether a stroke belongs. The painting decides. And the painting already includes
  you." He paused. "What would you say if you knew the stroke was already legitimate,
  and the only question was whether to be fully yourself while making it?"

  Claudia did not become someone who loved parties. But she stopped conducting herself
  in them as if she were on trial.'
