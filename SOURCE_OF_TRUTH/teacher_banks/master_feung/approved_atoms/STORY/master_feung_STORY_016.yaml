body: |
  When grief arrives, the body closes. The chest draws inward. The throat tightens. The breath shortens to protect the heart, the way a hand cups a flame against wind.

  This closing is not weakness. It is intelligence. The body knows that something precious has been lost and it guards the space where that thing lived.

  The trouble comes when the closing becomes permanent. When the protection hardens into armor. When the breath stays short not because grief is present but because the body has forgotten it is allowed to open again.

  The meridians that run through the chest—the heart pathway, the lung pathway—require movement to stay clear. When the breath stays shallow for months, these pathways congest. The qi pools and stagnates. What began as protection becomes obstruction.

  The practice for grief is not to push the grief away. It is to breathe gently into the chest, one degree of opening at a time. Not forcing. Not performing recovery. Simply reminding the body that breath can reach that space again.

  Place one hand on your sternum. Breathe toward your hand. Not deep. Not dramatic. Just present. The chest will resist at first. This is normal. The body is checking whether it is safe. Stay with it. Breathe again. Over days, over weeks, the chest remembers that opening is not the same as losing.
