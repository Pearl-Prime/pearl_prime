body: |
  Lena sits on the bathroom floor with her back against the tub. The tile is cold through her jeans. Her sister's wedding is in four hours and she cannot stand up.

  This is not sadness she can name. It is older than that. Her legs simply stopped working in the way legs are supposed to work toward things. She slid down the wall and sat.

  Her phone shows six unread messages. She turns it face-down on the tile.

  She places both hands on her thighs. She breathes. The first breath does not reach her belly. Neither does the second. On the third she stops trying to make the breath go anywhere and simply notices the hands on her thighs—their weight, their warmth, the texture of denim under her palms.

  Her attention moves from the wedding, from her sister's face, from the years of distance between them, into her hands. Just her hands. Just the tile under her. Just the cold at her back.

  Her breath drops. Her belly softens. She does not solve anything. She does not resolve what is broken between her and her sister. She sits on the bathroom floor and gathers herself the way water gathers in a low place—not by deciding to gather, but by following what is natural when the effort stops.

  Twenty minutes later she stands. She washes her face. She puts on her shoes. She goes.
