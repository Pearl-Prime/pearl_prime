body: 'Isabela had been in a depression for almost a year. She was being treated —
  she was on medication, she saw a psychiatrist. She was not in crisis. But she existed,
  day to day, behind a film that separated her from everything she used to care about.
  She described it as being a stroke that had dried before it touched the canvas.

  She came to Xi''an on the advice of her psychiatrist, who thought a change of environment
  might help. She did not expect to find anything. She sat in Master Feung''s sessions
  with the mild disengagement that had become her default state.

  On the third day, he was speaking about the painting and said something that caught
  her: "The stroke that is not yet dry is not lost. It is waiting. The canvas is patient."

  She stayed after the session and told him what she had said to herself — that she
  was a stroke that had dried before touching. He listened. Then he said: "Depression
  is not drying before contact. Depression is contact that you cannot feel yet. You
  are still in the painting. The numbness is the painting''s way of protecting you
  while it holds something very heavy."

  She cried, which surprised her — she had not cried in months. Something had made
  contact through the film. She stayed two extra days in Xi''an. She did not recover
  in those two days. But she stopped believing she had left the painting for good.'
