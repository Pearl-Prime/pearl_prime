body: |
  When you wake at three in the morning and cannot return to sleep, you are watching your nervous system. It is awake because somewhere in your day, your attention was fractured. You were not fully in one place. Your qi scattered.

  The remedy is not to sleep harder or to force rest. Rest does not come from force. Rest comes from gathering.

  Tonight, before you sleep, try this: sit for five minutes. Place your attention in your belly, below the navel. This is the dantian, the gathering place. Not your thoughts. Not your racing mind. Your belly.

  Breathe slowly into that space. Not deep breathing that strains. Breathing that is gentle as a hand settling on cloth. Imagine your scattered attention like light from a broken lamp returning to the center bulb. One breath at a time, gathering. This is not sleep. But this gathering is what sleep needs.

  When you lie down, your nervous system is not waiting to be shut off. It is waiting to be collected. When the qi gathers in the belly, the body remembers: I am here. I am safe. I can rest.

  This is the first medicine. Not pills. Not willpower. The body knowing that attention and breath bring it home.
