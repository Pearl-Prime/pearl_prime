body: 'Diego had been running his family''s restaurant for three years since his father
  died. It was not a bad restaurant. But it was his father''s restaurant, not his.
  Every dish on the menu was his father''s. Every decoration was his father''s choice.
  Diego had added nothing. He was afraid that changing anything would mean his father
  was more gone.

  He met Master Feung at a cultural exchange in Xi''an, and described the situation
  over dinner. Master Feung listened, then asked: "If your father''s brushstroke is
  still on the canvas — and it is, because the restaurant exists — does adding your
  brushstroke beside it make his disappear?"

  Diego said he didn''t know. He had been so afraid of overwriting his father that
  he had refused to write at all.

  "The painting does not remove old strokes when new ones are added," Master Feung
  said. "Your father''s stroke is permanent. So is the one you have been refusing to
  make. The refusal is also a stroke — but it is not the stroke you want to leave."

  Diego changed one dish on the menu the following week. Just one. But it was his.
  He put it beside his father''s recipes and the menu became something neither of them
  had made alone.'
