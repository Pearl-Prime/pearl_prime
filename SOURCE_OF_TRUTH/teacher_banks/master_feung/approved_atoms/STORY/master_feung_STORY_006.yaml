body: |
  In the old teachings, there is a story about the well. The well is deep. At the bottom, the water is cold and clear. But when the well is unused, leaves fall into it. Dust gathers. The opening becomes clogged.

  One day a traveler comes to draw water. They look down and see only darkness and debris. They think: the well is dead. There is no water here. They walk on.

  But the well is not dead. The water is unchanged. It is still there, cold and clear. But without being drawn upon, without being tended, the well becomes invisible.

  A person who tends the well knows this. They do not panic when they see the debris. They simply begin to clear. They reach down and pull out what blocks the opening. They draw up water, slow and patient. With each drawing, the well clears itself. The water that was hidden becomes accessible again.

  Your dantian is like this. It is the well of your energy. When you are scattered in worry, in rushing, in endless task, the well becomes clogged. You forget the water is there. You think it is gone.

  It is not gone. It is only waiting to be tended. To be drawn upon. To be remembered as the source.
