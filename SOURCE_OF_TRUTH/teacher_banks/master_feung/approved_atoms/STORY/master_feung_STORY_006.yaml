body: 'Tom was a fifty-year-old secondary school teacher from Manchester who had never
  thought of himself as a spiritual person. He came to Xi''an on what he called "a
  cultural trip" — really, he had been signed off work for six weeks with burnout and
  needed somewhere to be that was not his house.

  On the first day at the cultural center, Master Feung asked everyone to introduce
  themselves by saying one true thing. Tom said: "I have been teaching for twenty-two
  years and I am very tired."

  Master Feung nodded. "A brushstroke that has been pressing against the canvas for
  twenty-two years without being lifted deserves to be lifted." He paused. "Tiredness
  is not a sign that you have been doing it wrong. It is a sign that you have been
  doing it fully."

  Tom had expected to be told he needed to find more joy, or breathe better, or change
  his mindset. He had not expected to be told that his tiredness was evidence of something
  real and worthy.

  He spent the rest of the week walking around Xi''an, visiting the old city walls,
  eating things he didn''t recognize, sleeping until 8 a.m. He did not fix anything.
  But he stopped treating his exhaustion as a character flaw. When he returned to teaching,
  the first thing he changed was how often he let himself stop.'
