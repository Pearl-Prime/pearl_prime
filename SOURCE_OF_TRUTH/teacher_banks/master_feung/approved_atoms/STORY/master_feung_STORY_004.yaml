body: |
  The garden at dawn. Mist rising from the grass. The air is cool and still. A person stands alone, feet on wet earth, hands at their sides. They are not thinking about their anxiety or their work or the meeting scheduled for nine.

  They are only feeling the ground. The specific weight of their bones in gravity. The space between their ribs opening with each breath. The moisture on their skin. The way the light is coming through the trees.

  No one has told them to do this. No one is watching. There is only the garden and the body that occupies it. The body begins to move very slowly. Arms rise like they are moving through water. Legs step forward with no hurry. There is no music but the breath and the birds.

  After ten minutes they stop. They stand again with arms at their sides. The anxiety is still present in the way it always is, but it has moved back. It is in the distance now, a sound from another room. The attention has been gathered into the present: feet, earth, light, breath. The qi has gone where the attention went.

  They turn and walk back toward the house slowly, leaving footprints in the damp grass.
