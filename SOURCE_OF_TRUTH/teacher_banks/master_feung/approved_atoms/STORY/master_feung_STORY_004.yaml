body: 'Kenji had grown up being told he was talented. In school, in university, in
  his first job at an architecture firm in Tokyo. He had believed it, more or less,
  until the firm put him on a prestigious project and he found he could not make a
  single decision without checking three times whether it was good enough.

  He spent a month studying with Master Feung in Xi''an as part of a residency program.
  On the third week, he brought his sketchbook to the session and showed Master Feung
  the pages — beautiful drawings, all begun and none finished. "I keep thinking the
  next version will be better," Kenji said.

  Master Feung looked at the pages for a long time. "The brushstroke that is never
  made," he said finally, "is not better than the one that is. It is simply absent
  from the painting." He turned the sketchbook back to Kenji. "Your talent is real.
  But talent held perpetually in reserve is not a contribution — it is a withholding."

  Kenji finished a drawing that afternoon. It was not his best. But it was done, and
  he put it on the wall of the studio, and it was more than he had produced in three
  months. From that finished drawing, the next one came easier. And the one after that.'
