body: 'Sofia had lost her brother eighteen months earlier — sudden, no illness, just
  a Tuesday and then no more Tuesdays with him. She had done all the things: grief
  counseling, time with family, the rituals of mourning. She was functional. Her colleagues
  thought she was doing well.

  What she could not do was talk about him without performing composure. She had learned
  to manage the grief so skillfully that she couldn''t feel it anymore, only watch
  it from a professional distance.

  She came to Master Feung''s workshop as part of a humanities fellowship. On the
  last day, he asked the group to make one mark on a piece of paper that represented
  something they could not say in words. Sofia picked up the brush and made a single
  downward stroke — heavy, dragging, and then lifting away.

  Master Feung looked at it without comment for a moment. Then he said: "This stroke
  knows what it is. The painting holds it exactly as it is."

  She cried then, properly, for the first time. Not because it helped, exactly, but
  because the stroke had been made and it was visible and it was real and it could
  not be taken back. Her brother had been here. That was permanent. The painting held it.'
