body: |
  Your anxiety is not a problem to be eliminated. It is a messenger. When your body is tight, when your breath is shallow, when your qi is fragmented across a hundred worries, your anxiety is the voice saying: something here is out of order. Pay attention.

  The mistake is thinking you should silence that voice. You cannot silence it with willpower or distraction. You can only understand it.

  Ask it: what are you protecting me from?

  Sit quietly. Place your hand on your chest. Feel the rhythm of your heart. Notice where you hold tension. Your shoulders? Your jaw? Your belly? The tension is not random. It is specific. Your body is bracing against something real or imagined. It is preparing for impact.

  Stay there with that bracing. Do not try to relax it away. Do not shame yourself for it. Just notice: I am here. I am bracing. I am afraid. Let the body be afraid. Let it hold its shape for a moment.

  Then ask: what if I do not need to brace so hard? What if this moment is actually safe?

  Breathe into that question. Not answering it with your mind. But feeling into it with your body. The anxiety does not disappear. But it shifts. It becomes information instead of a command. It becomes something you are aware of instead of something that is running you.
