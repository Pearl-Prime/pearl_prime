body: |
  The office at 6 AM before anyone arrives. The lights are off except for the glow from the security system. A person sits at their desk in the near-dark. They do not turn on the overhead light.

  Their hands rest in their lap. Their eyes are closed. The building is silent except for the air conditioning and a distant hum. No one is asking them for anything. No email is arriving. No clock is counting down.

  They notice their breath is slow here. They notice their shoulders have descended. The tremor in their hands has quieted. In the darkness, with no audience, with no urgency, their body finds its natural rhythm.

  They sit this way for seven minutes. Then they open their eyes. The same desk. The same chair. The same work waiting. But they are different. They have remembered, in the quiet, that they are not only a working self. They are also a body that breathes. A presence that can be still.

  They stand and walk to the window. The city is beginning to wake. They watch the light change. They breathe.
