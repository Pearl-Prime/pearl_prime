body: 'Mei-Lin was twenty-seven and had recently been promoted to a leadership role
  she had not expected and was not sure she deserved. In meetings, she prepared more
  than anyone else, spoke last, and still left every meeting wondering if the others
  had noticed she was pretending.

  At a weekend retreat hosted by Master Feung''s cultural center in Xi''an, she described
  this feeling during a small group session. She was surprised to find that three other
  people in the group immediately recognized it.

  Master Feung said: "The brushstroke that believes it does not belong in the painting
  is usually the one that was placed there by the painting itself. The painting knows
  what it needs. You were chosen for this position because you already have what the
  painting requires. The uncertainty you feel is not evidence of absence. It is evidence
  that you take the work seriously."

  He paused. "Impostors do not lose sleep over whether they are good enough. They
  do not worry about the work at all."

  Mei-Lin did not stop feeling uncertain. But she began to separate the uncertainty
  from the question of legitimacy. She was uncertain and she belonged. Both things
  were true.'
