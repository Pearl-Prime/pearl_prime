body: |
  Marcus arrives at the community center fifteen minutes early. He sits in the plastic chair outside the Qigong room and checks his phone four times in three minutes. His leg bounces. He is here because his doctor said stress reduction and this was cheaper than therapy.

  He does not believe in energy. He believes in cortisol and sleep debt and the particular exhaustion of managing a small business through its third difficult year. He is here as a practical measure.

  When the instructor opens the door, Marcus follows the others inside. He stands in the back row. The instructor says nothing about belief. She says: place one hand on your belly. Notice if it moves when you breathe.

  Marcus places his hand. His belly does not move. His chest lifts and falls but his belly stays still and hard as a board.

  He stands there for two minutes noticing this. The instructor does not correct him. She simply breathes, and her belly rounds gently outward on the inhale. Marcus watches. He tries. His belly moves, slightly, once.

  Something releases behind his sternum. Not emotion. Not insight. Just a small loosening, like a jar lid giving a quarter turn. He does not know what qi is. But he knows that his belly was held tight and now it is slightly less tight. He breathes again. The belly moves again. He stays in the back row and says nothing to anyone. He comes back the following Tuesday.
