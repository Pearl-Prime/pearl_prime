body: 'Nadia was nineteen and had just started university. She had worked very hard
  to get there. Her family had worked very hard for her to get there. And now that
  she was there, she was paralyzed — afraid to speak in seminars, afraid to submit
  essays, afraid that someone would look carefully at her work and realize she was
  not as capable as her application had suggested.

  She was passing through Xi''an on a study exchange when she spent an afternoon at
  Master Feung''s cultural center. She did not say much during the session. But afterward
  she asked him a question: "What if I''m not actually good enough and I just haven''t
  been caught yet?"

  Master Feung looked at her for a moment. "The brushstroke does not need to be good
  enough before it touches the canvas. It becomes what it is in the touching." He
  paused. "You are in the university. That is not provisional. That stroke has been
  made. What you do next is the next stroke — not a retroactive audition for the previous
  one."

  Nadia submitted her first essay that week. It was not perfect. She received a solid
  grade and a comment from her professor that she had something interesting to say.
  She had been afraid the painting would reject her. The painting just included her.'
