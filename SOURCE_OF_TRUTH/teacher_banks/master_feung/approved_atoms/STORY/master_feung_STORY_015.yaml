body: 'Yusuf had been unemployed for seven months. He was a graphic designer, talented
  and experienced, and the work had simply dried up in a way he had not anticipated.
  Each month, he calculated and recalculated. Each month, the calculation was survivable,
  just. Each month, the anxiety was the same size regardless of the calculation.

  He came to Xi''an for other reasons — a friend''s wedding — and ended up attending
  one of Master Feung''s public evening talks. The teacher spoke about money as a
  context within the painting, not the painting itself. He said: "The painter who
  runs out of ink does not cease to be a painter. The painter finds new ink, or a
  different medium, or waits. What does not change is the painter''s nature and the
  painting''s continuation."

  Yusuf found this difficult to believe in his situation. He said so. Master Feung
  replied: "I am not asking you to feel reassured. I am asking you to be careful about
  letting the financial situation define your brushstroke. Your value as a painter
  is not set by the current availability of commissions."

  Yusuf did not find work immediately. But he stopped conducting himself as if he
  were a lesser person because of the gap. He started treating the period as one brushstroke
  in a longer painting — difficult, but not defining.'
