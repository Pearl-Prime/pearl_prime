body: |
  Tobias stands at the edge of the park at six in the morning. His Qigong teacher told him to practice outside when possible. He drove twenty minutes to be here and now stands at the grass line, arms at his sides, feeling foolish.

  Three joggers pass. A woman walks her dog. Tobias is a forty-four-year-old accountant in a fleece jacket and he is about to move his arms in slow circles in public. His face warms.

  He begins anyway. The first movement—raising the arms like wings, palms down—feels theatrical. His eyes stay open, checking the path. His breath is short and self-conscious.

  By the fourth repetition something shifts. Not inspiration. Not transcendence. His attention drops from his face into his hands. He notices the weight of his arms. He notices the morning air moving across his palms as they rise and fall. His breath lengthens without instruction.

  A jogger passes and does not look at him. Another passes. Tobias stops tracking them. His attention moves inward, following the warmth that builds along his forearms, into his shoulders, down through the center of his chest. This is the qi moving. He does not call it that yet. He calls it: my arms feel different than they did five minutes ago.

  He stays for twenty minutes. He drives home without the radio on.
