body: 'Samuel was sixty-seven and had retired eighteen months ago after a full career
  as a civil engineer. He had looked forward to retirement. When it came, he was surprised
  to find it frightening. Without the structure of work, he did not know what his brushstroke
  was.

  He came to Xi''an with his wife, who was attending an academic conference. He spent
  three days at Master Feung''s cultural center while she worked.

  On the second day, he asked Master Feung something he had not been able to say to
  anyone else: "If I have stopped doing the thing that defined me, who am I in the
  painting now?"

  Master Feung took a long time before answering. "You were never only your work in
  the painting. You were always larger than the stroke you made at the office. Retirement
  has not removed your brushstroke. It has removed a frame that told you which part
  of the canvas to work on." He smiled slightly. "The canvas is much larger than that
  frame. You are being asked, perhaps for the first time, to choose where your stroke
  goes. This is not a loss of identity. It is the recovery of it."

  Samuel spent the afternoon walking along the ancient city walls of Xi''an, looking
  at the landscape. He was sixty-seven and he was beginning something. That thought
  stayed with him for years.'
