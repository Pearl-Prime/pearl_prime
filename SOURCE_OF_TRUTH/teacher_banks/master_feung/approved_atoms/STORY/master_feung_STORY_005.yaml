body: 'Fatima had been awake at 2 a.m. for most of the past year. Not for any single
  reason — there were several: her mother''s health, a business partnership that had
  gone wrong, a relationship she wasn''t sure she still wanted. Each night, she lay
  in the dark and visited each worry in turn, as if checking that they were still there.
  They always were.

  She traveled to Xi''an for a two-week program at Master Feung''s cultural center.
  On the fourth night, still awake at 2 a.m. in her guest room, she went down to the
  courtyard and found Master Feung there, sitting quietly.

  He did not ask why she was awake. He said: "The painter who cannot put down the
  brush has not understood that the painting continues without them." She started to
  explain the worries. He listened, then said: "These strokes are already made. You
  are not holding them in place by reviewing them. You are simply not letting yourself
  be separate from them for a few hours."

  He suggested she imagine setting each worry down on the painting and stepping back
  from the canvas before sleep. Not solving anything. Just stepping back.

  She did not sleep perfectly that night. But she slept. And the worries were still
  there in the morning, exactly as she had left them, waiting to be worked with in
  the light.'
