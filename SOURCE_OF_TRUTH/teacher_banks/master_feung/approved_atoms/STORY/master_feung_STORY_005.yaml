body: |
  James is burning out and does not know it. He works seventy-hour weeks. He tells himself it is temporary, that once this project ships, he will rest. The project ships. A new one arrives. He tells himself again: temporary.

  His hands have developed tremors. He cannot hold a coffee cup without thinking about it. His eyes blur when he reads email at night. He sleeps four, five hours maximum. He wakes angry, wakes anxious, wakes with his heart racing.

  His wife asks: are you okay?

  He says yes because he has said yes so many times it feels like the truth. He drinks more coffee. He makes a doctor's appointment and cancels it. He tells himself these are normal conditions for someone working at his level. Everyone at work looks like this. Everyone.

  Then one morning he cannot get out of bed. His body refuses. It is not dramatic. There is no pain. His limbs are simply very heavy and he cannot find a reason to move them. He lies there for three hours. He cancels three meetings. His mind offers thoughts—failure, disappointment, this is what you get for being weak—but they do not stick. His body has checked out. His qi has nothing left to offer.

  His wife finds him this way and says nothing. She makes tea and sits with him. He looks at her and says: I do not know how to stop.

  She says: your body knows. Your body stopped for you.
