body: |
  Damien finishes his third year of daily Qigong practice and tells his teacher he feels nothing different. His teacher listens without changing expression.

  Damien says: I expected something by now. Some sign. Some shift. His voice carries the particular flatness of a man who has worked hard and received no visible return.

  His teacher asks him to stand and raise his arms to shoulder height, palms down.

  Damien raises his arms. He holds them there. His teacher watches.

  After thirty seconds, his teacher says: how long before your arms would have tired, three years ago.

  Damien thinks. He says: maybe ten seconds. They would shake.

  His teacher says nothing more. He gestures toward the arms, still steady, still held without effort.

  Damien lowers his arms slowly. He stands with his hands at his sides. The cultivation has been happening in the body while his mind looked elsewhere for evidence. The qi has been building in the pathways he cannot see, and the proof lives in his steady arms, in his sleep that comes easily now, in the way he no longer raises his voice in traffic.

  He did not notice these changes because they did not announce themselves. They simply became him. He nods once at his teacher. His teacher nods back. The lesson requires no further words.
