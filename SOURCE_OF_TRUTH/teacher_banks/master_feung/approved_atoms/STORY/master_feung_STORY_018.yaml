body: 'Wei had chronic back pain. It had started three years ago and had not gone away
  despite physical therapy and the best medical attention he could access. He had read
  everything about chronic pain. He understood the mechanisms. What he could not do
  was stop resenting his body for having it.

  He spent a week at Master Feung''s center as part of a group focused on somatic
  awareness. He was skeptical of the framing — he was an engineer and preferred technical
  explanations. But he came because someone he trusted had recommended it.

  Master Feung did not speak about healing. He spoke about presence. He said: "The
  body that is in pain is still making the brushstroke. It is not a failed body. It
  is a body that is carrying something and continuing to make strokes anyway."

  During a guided attention practice, he asked the group to notice their bodies not
  as problems to be solved but as the instrument through which the stroke was made.
  Wei found this unexpectedly moving. He had been treating his back as an obstacle
  to his life. The reframe was small but real: his body was not preventing him from
  being in the painting. His body was how he was in it.

  He did not stop having pain. But he stopped having pain plus rage at the pain. That
  reduction was not nothing.'
