body: |
  In the Qigong tradition, there is a teaching about the river. The river does not struggle against the stone. It does not fight. It simply moves, and in moving over centuries, it wears the stone smooth.

  The river does not decide to be patient. Patience is its nature. It flows at the speed it flows. If the channel narrows, the water deepens. If the banks widen, it spreads. It follows the shape it is given.

  A student once asked the teacher: but the river sometimes floods. It destroys. How is that not struggle?

  The teacher said: the flood is still not struggle. It is the river being exactly what a river is. Force does not resist force. It meets what is present and moves through it. The river is never in conflict with itself.

  This is the qi. It does not demand anything. It finds the path of least resistance. When we hold ourselves tight with effort, we become a dam. The qi cannot move. When we release that holding, we are the river again.

  Burnout is not laziness. It is the body saying: I have been a dam for too long. The reservoir is empty. The qi has nowhere to go.
