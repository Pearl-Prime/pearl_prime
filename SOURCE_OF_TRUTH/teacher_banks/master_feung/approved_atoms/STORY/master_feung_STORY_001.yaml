body: 'Amara had been a nurse for eleven years. She was good at it — everyone said
  so. But she had come to Master Feung''s workshop in Xi''an not because she was good
  at nursing, but because she had not been able to cry in two years. She had spent
  so long absorbing other people''s pain that she had forgotten what her own felt like.

  On the second day, Master Feung asked the group to write one word that described
  what they were carrying. Amara wrote "emptiness." She felt embarrassed, thinking
  the others would write something more dignified. But when she looked around the room,
  she saw the same discomfort on every face.

  Master Feung collected all the papers and laid them side by side on the floor. "Look,"
  he said. "These are all brushstrokes in the same painting. Not one of them is wrong.
  Not one of them is too much for the canvas." He paused. "Amara — emptiness is not
  the absence of a brushstroke. It is a brushstroke that has been giving itself away
  until it forgot its own shape."

  That night, she cried for the first time in two years. Not from grief, but from recognition.
  Her stroke was still there. It had just been buried under everyone else''s.'
