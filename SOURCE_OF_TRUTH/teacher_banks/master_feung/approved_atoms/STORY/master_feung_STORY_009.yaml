body: 'Marcus had been told by a therapist, a meditation app, two self-help books,
  and his partner that he needed to stop overthinking. He agreed. The problem was that
  every time he tried to stop overthinking, he started thinking very hard about how
  to stop thinking, which he was fairly sure was the opposite of the goal.

  He came to the Xi''an cultural center on a research trip — he was studying Chinese
  philosophical traditions — and ended up staying for a workshop almost by accident.

  When he described his situation to Master Feung, the teacher smiled. "The problem
  is not that you think too much. The problem is that you are thinking about the painting
  instead of making the stroke." He picked up a brush and held it above a piece of
  paper. "While I hold the brush here, I can think about every possible stroke. The
  moment the brush touches the paper, the thinking becomes irrelevant. The stroke is
  being made."

  He touched the brush to the paper and drew a single deliberate line. "Thinking ends
  where contact begins. Your mind is not the enemy. It just needs contact with the
  canvas more than it needs more planning time."

  Marcus started finishing more sentences. More emails. More conversations. Not by
  thinking less — but by noticing when thinking had become a substitute for the stroke.'
