body: |
  Wei sits at her desk, shoulders rising toward her ears. Three hours into email responses and her breath lives only in her throat. Her hands move from keyboard to phone to notepad in tight circuits. She does not notice her chest is locked.

  At 2 PM she stands to walk, thinking caffeine will help. Instead she finds herself in the stairwell, gripping the railing. Her heart is not racing but her ribs feel small, compressed. She counts the breaths—eleven, twelve—all shallow. The fluorescent light hums. She closes her eyes and realizes she has been breathing like this since morning.

  She reaches for her phone to text someone, then stops. There is no one to tell. She simply notices: her shoulders, her throat, the knot behind her eyes. She does not try to fix it. She just feels the weight of where her attention has been all day—in her inbox, in the next task, in the voice saying she should have answered faster.

  Wei sits on the stairs for two minutes. She breathes. Nothing changes except that she stops trying to make it change. When she stands again, her shoulders are still high, her breath still shallow. But now she knows she is doing this. She is the one holding herself this tight.
