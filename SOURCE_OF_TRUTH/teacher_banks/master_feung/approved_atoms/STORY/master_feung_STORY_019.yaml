body: 'Aiko was a thirty-two-year-old novelist who had published one book, received
  good reviews, and then spent four years unable to write the second. She was not blocked
  on ideas. She had hundreds of ideas. What she could not do was begin, because beginning
  meant the first book was no longer an accident — it meant the second book would
  reveal whether she was actually a writer or whether the first had been luck.

  She came to Xi''an as part of an artist residency and attended Master Feung''s sessions
  in the evenings.

  When she described her situation, he said: "You are afraid that the next stroke will
  reveal the truth about the first one. But the first stroke''s truth is already set.
  It cannot be unwritten by what comes after it. What you are really afraid of is that
  the second stroke will reveal the truth about you — and that the truth might not
  be what you hope."

  He paused. "Here is what is certain: the truth about you is already in the painting.
  The second book will not create it. It will only make more of it visible." He picked
  up a brush. "The only question is: do you want more of yourself visible?"

  Aiko started writing the next morning. Not a good first page. But a first page. The
  stroke touched the canvas. Everything after it became easier than the waiting had been.'
