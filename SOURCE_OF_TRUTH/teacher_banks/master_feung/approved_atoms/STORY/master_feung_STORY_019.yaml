body: |
  Soo-Jin's hands move through the Qigong form in the dim living room at 11 PM. Her children sleep down the hall. She has thirty minutes before she is too tired to stand.

  Six months ago she dismissed this practice as too slow. She wanted results she could measure—weight, sleep scores, something with a number. She came to it only because everything faster had stopped working.

  Now she moves through the form and her attention drops without instruction into her lower belly, the dantian. She does not direct it there. It goes because this is where it has learned to go. Her breath follows. The movement slows further than the form requires, her body finding its own tempo.

  Halfway through, she stops. She stands still with her arms at her sides. The stillness is not absence. It hums. Her palms face forward and she notices heat building there, moving up the inside of her forearms toward her elbows. She does not chase it. She lets it arrive.

  This is the thing she could not have explained to herself six months ago: stillness is not rest from movement. It is a different kind of movement. The qi moves through her meridians while her body holds quiet. She is not passive. She is the most active she has been all day.

  She completes the form. She checks the clock. Forty minutes have passed. She does not know where the extra ten went. She goes to bed without her phone.
