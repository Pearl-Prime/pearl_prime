body: |
  In the Qigong tradition, there is a teaching about the bamboo. The bamboo does not grow upward all at once. In the first year, all its growth is underground. The roots extend. The foundation deepens. To the observer, nothing visible happens.

  In the second year, the bamboo breaks through the soil and grows six inches. In the third year, it grows another foot. By the seventh year, the bamboo grows at a rate that seems impossible—up to ninety feet in a single season.

  But this rapid growth is not sudden. It is the result of six years of invisible root building. The roots were doing the work all along. The visible growth was only possible because the foundation was deep.

  Your practice is like this. When you begin to cultivate your qi, you are building roots. You may not feel dramatic changes. You may not feel energy rushing through your meridians. You may simply feel a little more ease. A little more breath. A little less urgency.

  This is the roots establishing. This is not failure. This is the only way real transformation happens. You cannot skip to the bamboo shooting upward. You must tend the invisible work first. The foundation that no one can see is what makes every visible transformation possible.

  Trust the roots.
