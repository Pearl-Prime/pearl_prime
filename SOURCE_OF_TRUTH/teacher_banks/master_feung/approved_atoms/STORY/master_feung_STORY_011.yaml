body: 'Ravi was a forty-year-old cardiologist who had gone into medicine to help people
  and now mostly felt the weight of the ones he had not been able to help. He was
  not burned out, exactly — he still cared. That was the problem. He cared about every
  patient he lost in a way that had accumulated over fifteen years into something that
  felt like a bruise that covered his whole chest.

  He joined Master Feung''s pilgrimage to Hua Shan as a guest of a colleague. On
  the mountain, three hours up the eastern peak, he sat on a ledge and looked out
  at the landscape below — the plain, the ancient city, the haze. He was not a spiritual
  person. But the scale of what he was seeing did something to the scale of what he
  was carrying.

  Master Feung sat beside him after a few minutes. "The mountain has been here four
  hundred million years," he said. "It has witnessed more deaths than you have. It
  has not broken. It does not carry each one as a personal failure."

  Ravi said he did not think he could stop caring. Master Feung said: "I am not asking
  you to stop caring. I am asking you to let the painting be large enough to hold what
  you have given it. You are one stroke. A very good stroke. But you cannot carry the
  whole canvas."'
