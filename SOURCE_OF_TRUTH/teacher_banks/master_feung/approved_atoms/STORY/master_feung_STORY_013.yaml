body: 'Jin had been in the same job for eight years and was good at it, but woke most
  mornings with a low dread that he could not name. The job was fine. His apartment
  was fine. His social life was fine. But something was not being expressed, and he
  did not know what it was.

  He came to Master Feung''s weekend workshop after seeing a flyer in a hotel lobby
  in Xi''an. He sat through most of the first day without speaking. On the second morning,
  Master Feung asked the group: "What is the stroke you have been making that is not
  your own?"

  Jin thought about it for a long time. Then he said: "I think I have been painting
  the picture someone else wanted me to paint."

  Master Feung nodded slowly. "This is common. The painting that belongs to you is
  still there, waiting. You have not lost it. You have only been working on a different
  canvas." He paused. "The question is not whether to switch canvases. It is what
  your actual stroke looks like, now that you have asked."

  Jin did not quit his job that week. But he started making one thing each evening
  that was entirely his — small, private, unproductive. A sketch. A sentence. A meal
  he cooked for no reason. The dread did not disappear, but it became less total. There
  was now a part of the painting that was unmistakably his.'
