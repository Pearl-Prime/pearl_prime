body: |
  Priya's hands shake as she pours her morning tea. The cup rattles against the saucer. She sets both down on the counter and stands with her palms flat against the cold tile.

  Her mother called last night. The conversation lasted forty minutes and left Priya's throat raw and her jaw clenched through sleep. She woke with the argument still running, her body replaying each exchange, shoulders drawn forward, neck rigid.

  She knows this pattern. She has studied it. She teaches breathwork to corporate clients on Thursday afternoons. She knows the meridians, knows that unresolved anger rises to the liver, knows the breath can move what the mind refuses to release. She knows all of this and her hands still shake.

  Priya presses her palms harder into the tile. She breathes into her lower abdomen, the dantian. The first breath catches in her chest. The second drops lower. On the third, her belly softens and a sound comes out of her that she did not plan—not a word, not a cry, just air releasing from somewhere deep.

  She stands at the counter for six more breaths. Her hands stop shaking. Her jaw remains tight. She does not pretend otherwise. She pours the tea again, steadily this time, and sits down. The anger is still present. Now it has a container. She can carry it without spilling.
