body: 'Hannah was a therapist who was very good at holding space for other people''s
  pain and had no idea how to hold space for her own. She had been treating a client
  with severe depression for two years and found herself absorbing something from the
  sessions — not the depression exactly, but a heaviness that she carried home and
  set down only reluctantly.

  She attended a workshop at Master Feung''s center in Xi''an on a professional development
  trip. During a session on presence and boundaries, she asked: "How do you stay fully
  present with someone''s pain without taking it on?"

  Master Feung said: "You are asking how to be two strokes at once — your own stroke,
  and the stroke of the person in pain. This is not possible. You can be close to
  their stroke. You can look at their stroke with full attention. But their stroke
  is not yours to carry. If you pick it up, you are holding the brush wrong."

  He continued: "Full presence means being fully yourself while fully with them. Not
  merging. Not absorbing. Present contact — not dissolution."

  Hannah thought about the distinction for weeks afterward. She started ending sessions
  with a brief ritual of her own — a few minutes to set down what she had witnessed
  and return to her own stroke. It was not a cure. But it was a practice, and it had
  edges.'
