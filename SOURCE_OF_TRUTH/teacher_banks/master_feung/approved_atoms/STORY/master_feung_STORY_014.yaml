body: |
  There is a teaching about the bamboo in winter. Snow accumulates on the bamboo stalk. The stalk bends. It bends further. It bends until the watching student thinks: now it will break.

  Then the snow slides off. The bamboo returns to vertical. It does not spring back in anger. It does not overshoot. It simply returns to its nature, which is upright.

  The student asked: how does the bamboo know when to bend and when to hold.

  The teacher said: the bamboo does not know. It simply has no opinion about the snow. It receives what comes. It yields to what is heavy. When the weight leaves, it returns.

  The student said: but I am not bamboo. I have opinions.

  The teacher said: yes. And your opinions are the extra snow. They add weight the stalk was not built to hold. The bamboo bends under real weight and returns. You bend under real weight and then add the weight of your judgment about the bending. That second weight is what breaks things.

  Cultivation is not the removal of difficulty. It is the practice of releasing the second snow. The first snow is life. The second snow is the story you tell about the first snow. The qi moves freely when you carry only what is actually present.
