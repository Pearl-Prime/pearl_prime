body: |
  Marcus has been promoted. It is what he worked toward for five years. The morning of the announcement, he sits at the new desk in the new office, and his shoulders are locked. His jaw is tight. His right hand is numb.

  He tells himself this is excitement. His body says something else. His body says: you are not safe to expand. You are not safe to be visible.

  At lunch he does not eat. He scrolls through email confirmations, messages of congratulation. None of it lands. His chest feels armored. His breath is high and fast. He catches himself holding his shoulders up toward his ears and lets them drop, and within seconds they climb back up. Up and up and up.

  He has no explanation for it. The promotion is real. He wanted this. But his body is bracing for impact, and he does not know why. He wonders if he is sick. He wonders if he is broken.

  That night he lies in bed and tries to relax. The harder he tries, the tighter his shoulders become. At 2 AM he gets up and stands at the window. In the darkness he tries something different. He stops trying to change it. He simply breathes into the tightness. Not into it like a warrior breaching a gate, but into it like water finding a crack.

  His shoulders do not release. But in the bearing witness, something shifts. The armor is still there. But it is no longer fighting him. It is protecting him. He is protecting himself.
