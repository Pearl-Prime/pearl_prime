body: 'Priya had been laid off from her engineering job four months earlier. She was
  fifty-three years old. She had done the math a hundred times — the savings, the
  months remaining, the probability of finding another position at her salary level.
  The math always said the same thing: she was probably fine. But the anxiety did not
  respond to the math.

  She had come to Master Feung''s weekend intensive in Xi''an because a friend had
  suggested she needed something that wasn''t a spreadsheet. She was skeptical. She
  sat in the back row.

  On the first morning, Master Feung spoke about Hua Shan — the mountain visible on
  clear days east of the city. He said the granite at the summit formed four hundred
  million years ago. "Human financial systems," he said quietly, "are approximately
  five thousand years old. Your particular financial anxiety is approximately four
  months old." He did not say this to dismiss her fear. He said it to locate it in
  the painting.

  Priya wrote in her notebook: "My fear is a very new stroke in a very old painting."

  She still had the fear. But she stopped letting it be the whole canvas. She started
  sending applications the following week — not from urgency, but from the steadier
  ground of someone who knew where her stroke actually fit.'
