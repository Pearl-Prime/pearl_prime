body: |
  Thomas has been practicing Qigong for three months. He comes to it because of chronic anxiety. He was skeptical at first. But something about it works. Or rather, nothing works. The anxiety is still there. But he is less attached to it.

  Today he is in a meeting when his phone buzzes. His email alert. He feels the spike of adrenaline, the pull toward his pocket. The old pattern: check the email, respond to the problem, keep moving.

  But instead he notices what is happening. He feels his breath shift from his belly to his chest. He feels his shoulders rise. He notices the thought: something is wrong, I need to fix it now.

  Instead of obeying, he breathes into his dantian. One breath. Then another. His attention gathers. He does not check the email. The meeting continues. The qi settles. The anxiety is still present, but it is no longer giving orders.

  After the meeting, he checks his phone. The email was a scheduling confirmation. Not a problem. Not urgent. But without the practice, he would have responded to it as though the building was on fire.

  He thinks: this is the teaching. Not that anxiety goes away. But that I am not enslaved to it anymore. I can feel it and choose. I can be still even when the signal says to move.
