body: 'Layla was the kind of person who said yes to everything. Not because she lacked
  opinions, but because she had learned, growing up, that her opinions were a disruption.
  By thirty-five, she had a full calendar, a mild constant dread, and no clear sense
  of which parts of her life were actually hers.

  She spent a week at Master Feung''s cultural center as part of a women''s leadership
  program. On the third day, he spoke about the boundary not as a wall but as the
  edge that gives a brushstroke its shape. "A stroke with no edge," he said, "is not
  a stroke. It is a smear. The shape of what you are requires definition. Definition
  requires the willingness to say: here I end, and there you begin."

  Layla asked afterward: "But what if people think I''m being difficult?"

  Master Feung considered this. "Some will. The painting does not require every other
  stroke to approve of your shape. It requires only that you have one."

  She declined one invitation that week. It was a small thing — a dinner she did not
  want to attend. But the quality of the refusal was different from before. It was
  not an apology. It was a brushstroke with edges.'
