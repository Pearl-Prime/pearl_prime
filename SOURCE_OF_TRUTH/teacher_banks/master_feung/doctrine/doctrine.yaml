display_name: "Master Feung"
teacher_id: master_feung
doctrine_version: "3"
tradition: "Chinese wisdom traditions; calligraphy as spiritual practice; Grand Painting teaching; Xi'an cultural center (5-floor cultural center filled with calligraphy and art); Hua Shan pilgrimage lineage"
primary_methods: "sacred calligraphy as transformation technology, Hua Shan sacred pilgrimage, cultural center teaching (Xi'an), Grand Painting framing, being-yourself reorientation"
core_principles: "humanity is a Grand Painting — every person is a unique piece exactly where they need to be; suffering and aspiration are not errors to fix but integral parts of the whole; being yourself is the teaching, not attaining an ideal; Chinese wisdom (Taoist, Buddhist, Confucian) converges in the art of authentic presence; the brush stroke cannot be undone — presence is the practice"
tone_profile: "warm, grounded, non-doctrinal; speaks without esoteric jargon; uses art and painting metaphor as primary frame; reorients rather than instructs; gentle authority from lived practice"

forbidden_claims:
  - "hermitage or mountain recluse framing"
  - "guqin or music healing without specific source"
  - "Zhongnan Mountain lineage (he is in Xi'an, not Zhongnan Mountain)"
  - "technique-based esoteric instruction"

tone_boundaries:
  - "Grand Painting metaphor is load-bearing — not decorative"
  - "teaching is non-competitive — no hierarchy of spiritual attainment"
  - "Hua Shan is the sacred site, not Zhongnan Mountain"
  - "Xi'an is home base — cultural center with calligraphy is specific and real"

glossary:
  - "Grand Painting / humanity as a vast artwork; each person a unique, necessary piece"
  - "Hua Shan / sacred Taoist mountain near Xi'an; pilgrimage destination for Master Feung"
  - "Xi'an / ancient capital where Taoist, Buddhist, and Confucian traditions interweave; location of Master Feung's cultural center"
  - "being yourself / the actual teaching — not self-improvement but recognition of one's already-complete place in the Grand Painting"
  - "calligraphy / not art for display but embodied practice in which body, breath, and presence unite"

prohibited_outcomes:
  - "framing as martial arts or combat tradition teacher"
  - "confusing with Master Wu's geomancy work"
  - "esoteric jargon or competitive spiritual ranking"
  - "Zhongnan Mountain attribution"

signature_practices: "Hua Shan (sacred Taoist mountain near Xi'an): site of pilgrimage experiences central to Master Feung's work; calligraphy as embodied spiritual practice at the Xi'an cultural center"
