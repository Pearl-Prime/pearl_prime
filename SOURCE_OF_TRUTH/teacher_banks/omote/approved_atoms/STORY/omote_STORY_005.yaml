body: |
  I knew Hana who performs invulnerability. She has learned this performance well. She does not ask for help. She does not show pain. She does not admit fear. The performance is exhausting because she is alert to every moment someone might detect the truth beneath. She watches others' faces for signs of pity. She moves through the world defended. Then one day, someone sees through it anyway. They offer kindness not with pity but with genuine care. She does not have to defend anymore in that moment. The relief is so profound she realizes: the protection she thought the mask was giving her is actually restricting her. She begins to let people see her vulnerability. Not recklessly, but in small moments, with people she has learned to trust. The world does not collapse. People respond with care, not judgment. In releasing the performance of invulnerability, she discovers actual strength — the strength that comes from being known and still choosing to stay.
