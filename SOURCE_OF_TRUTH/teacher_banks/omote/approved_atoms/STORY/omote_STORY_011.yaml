body: |
  The actor waits backstage. The play begins. On stage, someone delivers a monologue. The actor listens. There is a moment of rest between scenes — the ma, the meaningful emptiness. No action. No dialogue. No performance. Just the holding of space. The actor notices: in this moment, nothing is performed. Everything is real. The breath is real. The presence is real. The rest is not empty. It is full. It is the ground from which the next action will arise. The actor notices: authenticity is not in constant action. It is in the willingness to rest. To not know what comes next. To be still in the space between one moment and another. In Noh theater, this space is sacred. The actor knows: when the body finally rests, the presence becomes most authentic. The performed and the real meet in the silence.
