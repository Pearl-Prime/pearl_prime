body: |
  I worked with someone I'll call Tomoko. She leads a nonprofit. She speaks often about mission, values, collective purpose. Her board finds her inspiring. Her staff finds her consistent. She has built an authentic presence — or so she believes — around these principles. Then a grant falls through and she has to cut two positions. She calls the staff meeting. She speaks about mission and resilience. She uses the language she always uses. Afterward, one of the departing employees stops her in the hallway. "I needed you to just say it was hard," the woman says. "Not the mission. Just that this is hard." Tomoko stands in the hallway after she leaves. The fluorescent light hums. She realizes: she has built an authentic presence around her values. But values, performed constantly, become their own kind of mask. Authentic presence includes the moments when the values do not resolve the difficulty. She sends a brief message to the full staff that evening. It contains no mission language. It says only that she is sitting with the weight of the decision and she imagines they are too.
