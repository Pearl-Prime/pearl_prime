body: |
  I was working with someone I'll call Akira. He sits in the boardroom, presenting quarterly results. His jaw is set. His voice is even. He is the professional who has mastered the room — fifteen years perfecting this performance. But today, something beneath the surface cracks. His hands shake slightly turning the page. He notices: the performance is real, but so is the exhaustion underneath it. He does not stop performing. Instead, he becomes conscious of the performance. His next sentence carries both: the professional competence and a visible human breath. The mask does not dissolve. It becomes permeable. In that small shift, his shoulders drop half an inch. The armor is still there, but he is not struggling to hold it together anymore. Authenticity is not the absence of the social face. It is the face worn with knowing.
