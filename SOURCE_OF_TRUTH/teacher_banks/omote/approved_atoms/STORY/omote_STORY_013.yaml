body: |
  I was working with someone I'll call Daisuke. He runs a small architecture firm. He speaks in a low, measured voice. His staff describes him as unreadable. He considers this a compliment. He has built the performance carefully over twenty years: calm, decisive, never rattled. Then his firm loses a major contract. He calls a team meeting. He prepares his measured voice. He stands at the whiteboard. His throat tightens. His eyes go dry. He begins to speak and nothing comes out that he rehearsed. What comes out instead is: "This one hurt." Four words. He does not explain them. He does not perform recovery. He stands in the ma — the space between what he planned to say and what the moment requires. His project manager exhales audibly. Someone else nods. The room does not need him to be unreadable. It needs him to be present. His hands stop gripping the marker. He sets it down. The performance he returns to after that moment is not smaller. It is more honest about its own weight.
