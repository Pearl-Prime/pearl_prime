body: |
  I worked with someone I'll call Emiko. She is a surgeon. She has performed under pressure so long that pressure has become her resting state. Her hands are steady in the OR. Her voice never rises. She has trained herself to remove sensation from high-stakes moments. She calls this focus. Then her own mother is admitted to the hospital. A different surgeon operates. Emiko sits in the waiting room in street clothes. No role. No mask available that fits this moment. Her hands grip her knees. Her breath goes shallow. She cannot perform composure because there is no one here who needs her to be the surgeon. She is simply a daughter. The sensation she has trained away for twenty years returns all at once. Her eyes fill. She does not stop them. A nurse brings tea. Emiko wraps both hands around the cup and holds it. The warmth reaches her palms. She sits in that waiting room for four hours. She does not perform calm. She inhabits it, differently, from the inside. When she returns to the OR the following week, something in her hands is the same. Something in her chest is not.
