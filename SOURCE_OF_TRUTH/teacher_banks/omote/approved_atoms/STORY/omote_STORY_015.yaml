body: |
  I was working with someone I'll call Haruto. He is a middle manager at a logistics company. He describes himself as easygoing. His team agrees. He smooths every conflict before it surfaces. He translates difficult messages from above into digestible ones below. He is the oil in the machine. Then his director asks him to deliver a round of performance warnings. He delivers them. He softens each one so thoroughly that three employees do not realize they have been warned. The director calls him in. "They didn't hear it," she says. Haruto sits with that. His chest feels hollow. He understands: his easygoing performance serves connection, but it also serves his own discomfort with being the source of difficulty. The mask is not wrong. But it has been covering something he has not examined. He goes back to each employee. He speaks more directly. His voice stays calm but the words carry weight now. His stomach tightens through each conversation. He does not smooth it away. The easygoing quality returns afterward, earned rather than reflexive.
