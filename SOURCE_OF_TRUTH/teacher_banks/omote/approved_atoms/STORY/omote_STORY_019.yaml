body: |
  I was working with someone I'll call Nobu. He is fifty-three. He retired early from a career in finance. He expected relief. Instead he wakes each morning with no performance to put on and finds the absence disorienting. His body does not know what to do without the preparation: the suit, the commute, the role. He sits at the kitchen table in ordinary clothes. His coffee goes cold. He describes this as emptiness. I ask him to stay with the emptiness rather than fill it. He resists. He signs up for three committees, two volunteer roles, a board position. Then his back seizes. He spends two weeks unable to sit at a desk. He lies on the floor of his living room with a pillow under his knees. He has nothing to perform. The ceiling is the same every hour. Slowly, over those two weeks, something underneath the emptiness becomes visible. Not purpose — not yet. But a quality of stillness he has not touched since childhood. The ma between his former life and whatever comes next is not a failure of identity. It is the ground from which the next thing grows. He does not rush to name it.
