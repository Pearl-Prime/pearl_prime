body: |
  I was working with someone I'll call Sora. She arrives at the office at 7 a.m., leaves at 8 p.m. She is always on. Always present for everyone else. Always managing, facilitating, smoothing the way. She smiles in meetings even when she is hollowed out. One morning, she sits at her desk and cannot move. Not illness, but something has simply stopped. She has no more permission from herself to perform ease. She realizes: the mask itself is not the problem. But wearing it constantly, with no rest, with no ura — no private inside — has made her a lie. She begins to do something radical. She leaves work at 5 p.m. She does not answer emails after dinner. These small acts feel like betrayal. But in the protected space of rest, something restores. Her body remembers how to recover. When she returns to the performance, it is lighter because she is not defending it constantly. The mask becomes less tight when you are not afraid to take it off and rest.
