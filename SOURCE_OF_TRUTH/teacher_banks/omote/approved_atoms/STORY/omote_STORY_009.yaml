body: |
  I worked with Natsume, who carries anxiety about being perceived as weak. She performs toughness like armor. Her voice is hard. Her decisions are definitive. She does not ask questions that might expose uncertainty. She is exhausted from the relentless performance. One morning, she realizes: the mask was never protecting her. It was imprisoning her. She was so busy defending the image of strength that she could not access actual strength. Actual strength is flexible. It includes admitting: "I need help with this." So she stops the performance. Not everywhere, but in moments she chooses. She allows herself to be seen as she actually is: capable in some things and uncertain in others. She can lift heavy things and also have moments where she cannot. The relief is immediate. She can be strong in some things and vulnerable in others. Authenticity holds multitudes. The body no longer has to maintain a single rigid posture. She can rest.
