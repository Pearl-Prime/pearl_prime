emotional_intensity_band: 2
body: |
  I worked with Kenji, who manages a team at a tech firm. He speaks in meetings with authority he does not feel. Internally, he doubts every decision. The contradiction exhausts him. He believes authenticity means admitting: "I don't know." So he tries. He says it in a meeting. The room does not collapse. No one loses respect. Instead, someone offers information. Someone else admits her own uncertainty. The team moves closer. He realizes: competence is real. Doubt is real. They exist together. He stops performing perfect certainty and moves with quiet confidence that includes his own learning. His anxiety about being found out diminishes because he stops hiding in the first place. The performance loosens because the thing beneath it is not a lie — it is complexity.
