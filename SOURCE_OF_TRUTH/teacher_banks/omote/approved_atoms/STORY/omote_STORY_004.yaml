body: |
  I worked with Yuki, who polishes herself before every meeting. Her words are chosen. Her appearance is controlled. She moves through the office like someone managing a carefully constructed image. One day in a conversation, she notices her body's signal: tension in her jaw so tight she cannot feel it until she does. Shallow breathing. Hands holding the table edge. These are the body's flags of a mask worn with unconscious effort. She asks herself: "What if I simply moved through today without trying to manage how I appear?" The risk feels enormous — judgment, rejection, invisibility. So she does it in one small meeting. She arrives without having planned her comments. She speaks what comes. Her voice sounds different. A colleague looks up, really looks, and leans forward. Something in authenticity is contagious. In the ma — the space between effort and surrender — she experiences actual presence. When the performance stops, she is finally there.
