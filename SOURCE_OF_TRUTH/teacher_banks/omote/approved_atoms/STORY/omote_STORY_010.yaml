body: |
  You have been taught that authenticity means removing all masks. This is a misunderstanding. The teaching is this: you have a social face. You need it. The problem is not the face. The problem is unconsciousness about the face. You move through the world performing versions of yourself without noticing. You perform confidence while fear runs underneath. You perform competence while doubt whispers. You split yourself without acknowledging the split. The cost is exhaustion and a deep falseness that others can sense. Here is what to do: become conscious of the performance. Feel it in your body. Notice when you are performing and when you are resting in what is actually true. The moment you are conscious of the mask, it becomes lighter. You are no longer trying to make it real. You are simply wearing it and knowing that you are. This is the teaching: rest, not in the removal of the mask, but in the consciousness of the mask. In that consciousness, authentic presence emerges. You are performing AND you are real. Both can be true.
