body: |
  I worked with someone I'll call Mio. She is a physical therapist. She is good at her work and she knows it. She moves through her clinic with practiced ease. She asks the right questions. She listens with her whole face. At the end of each session she feels the quiet satisfaction of a thing done well. One evening she notices she has not thought about her own body all day. Her left shoulder aches. Her feet are tired. She sits on the edge of the treatment table — the one her patients use — and presses her palms flat against the surface. The paper crinkles. She breathes. She is not performing anything for anyone. The shoulder still aches. But she is aware of it now. This is the beginning of something she will return to: the practice of turning the same quality of attention she gives others toward herself. Not as a project. As a small, daily act of rest.
