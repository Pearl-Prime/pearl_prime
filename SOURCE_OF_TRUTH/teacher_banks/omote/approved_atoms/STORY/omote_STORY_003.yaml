body: |
  In Noh theater, the mask is carved with such precision that when the actor wears it long enough, feeling the weight on their face, something shifts. The actor does not remove the mask. Instead, the actor's actual face beneath begins to move toward the mask. The boundary between performer and mask dissolves. The actor has not stripped away the artifice. The actor has brought consciousness to it. There is a story told in the tradition of a mask that was worn for twenty years. When finally removed, the actor's face had changed shape to meet it. Not disfigured, but transformed. The mask and the face had become one. This is what authenticity means in Noh: not the absence of the mask, but the alignment of the person with the role they are playing. When the mask is worn consciously, the face beneath becomes truer, not less true. The mask becomes an expression of who the actor actually is.
