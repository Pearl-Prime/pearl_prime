body: |
  I was working with someone I'll call Riku. He is twenty-eight. He works in sales. He is very good at reading rooms. He shifts his energy to match whoever he is with: casual with casual clients, formal with formal ones, funny when funny is needed. He considers this a skill. His numbers prove it. But at dinner with his closest friend, the friend says: "I never know what you actually think about anything." Riku laughs. Then he drives home and the laugh fades. He sits in his parked car. The street is quiet. He tries to locate what he actually thinks about the dinner, the conversation, his friend's comment. The search takes longer than he expects. The performance has become so fluid that the ura — the inside — is hard to find quickly. He is not alarmed by this. He is curious. He starts a practice: at the end of each day, he writes three sentences about what he actually noticed, wanted, or felt. Not for anyone. Just to keep the inside legible to himself.
