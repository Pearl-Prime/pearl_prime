body: |
  You have been performing so long you have forgotten you are performing. This is the cost. Not the mask itself — the mask is neutral, necessary. But the unconsciousness about the mask. The belief that you are failing if the mask is visible. You perform confidence while doubt runs underneath. You perform ease while anxiety moves through your body. You split yourself in two: the face you show and the face you carry privately. This division is exhausting. But here is the mechanism you have not noticed: the moment you become conscious that you are performing, something shifts. You are still performing. The role is still real. But now you know you are performing. There is a difference between an actor who does not know they are acting and an actor who knows the role completely. The second one is free. The body relaxes. The armor becomes lighter because you are no longer trying to hide the armor. You are simply wearing it and knowing that you are. This is authentic presence: not the absence of the social mask, but the mask worn with consciousness and ease.
