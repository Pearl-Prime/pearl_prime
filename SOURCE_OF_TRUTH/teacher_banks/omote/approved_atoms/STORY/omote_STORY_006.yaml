body: |
  I worked with Yuriko, who has chosen the role of caretaker. She is the one who listens. The one who holds space. The one who knows the needs of everyone around her. She performs endless patience because she has decided that is her role in the world. Her own exhaustion is not permitted. When she feels it, shame follows — the shame that she is not actually capable of true care, that she is just performing. She skips lunch. She cancels plans. She is always available. One evening, she is on a call with someone who says: "You sound tired. Are you okay?" The question breaks something open. She is not okay. She has not been okay. She begins to honor something Noh masters know: the ma — the space between action and rest. She rests. Not out of guilt, but because she realizes: constant performance of caring with no rest becomes a lie. The caretaker who never rests is not authentic care — it is self-abandonment wearing the mask of service. When she returns to her role with actual restoration underneath, the care becomes real again. She can be the one who holds others AND the one who needs to be held.
