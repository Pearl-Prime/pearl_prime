body: |
  I worked with someone I'll call Yuki. She teaches high school literature. Every morning she stands at the front of the room and becomes Teacher. The students see competence, warmth, steady authority. She has worn this face so long she no longer notices the wearing. Then one afternoon a student asks her what her favorite book is — not for class, just genuinely curious. Yuki opens her mouth to give the professional answer. She stops. Something in her chest goes still. She gives the real answer instead: a novel she read at sixteen that made her cry on a train. The student leans forward. Three others look up from their desks. The room changes temperature. Yuki does not understand what happened until she walks home. The omote did not fail her. She simply let something from the ura pass through it, briefly, like light through a paper screen. The next morning she stands at the front of the room again. Teacher. But the word sits differently in her body now.
