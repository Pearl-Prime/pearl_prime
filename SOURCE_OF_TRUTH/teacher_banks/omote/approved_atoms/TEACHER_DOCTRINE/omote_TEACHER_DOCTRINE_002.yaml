body: |
  One of the assumptions I work to dissolve in the people I guide is the
  idea that spiritual experience and historical understanding are separate
  categories — that you come to Kyoto for the temples and you go elsewhere
  for the spirit.

  In the Yamato worldview, these were never divided. The chronicles of
  ancient Japan — the Kojiki, the Nihon Shoki — are simultaneously
  historical records and cosmological maps. The emperors who ruled from
  Asuka and Nara were not merely political figures who also had religious
  ceremonies. They were the living axis between heaven and earth. The
  geography of governance and the geography of the sacred were identical.

  When I walk with you through the Asuka plain — past the keyhole tombs of
  the ancient sovereigns, past the stones that no scholar has fully decoded,
  past the rice paddies that have been worked by the same families for
  thirty generations — I am not separating cultural history from spiritual
  encounter. I am showing you that here, they were the same river.

  Understanding this changes how you receive what you see. A wooden gate is
  also a threshold between dimensions. A ritual performed for fourteen
  centuries carries the weight of all those repetitions in its gestures.
  A tree planted at a shrine by an emperor twelve hundred years ago is still
  alive, still breathing, still in some sense performing its original
  function.

  History here is not past. It is the present in formal dress. Learning to
  see this is the beginning of genuine encounter with this land.
