body: |
  I grew up between two worlds — Japanese at home, English in the wider
  world I eventually moved through. For a long time I experienced this as
  a kind of fracture. Later I understood it as a preparation.

  The work I do requires someone who can stand in both places at once. Not
  as a translator — translation is a diminishment, moving content from one
  container to another and losing what doesn't fit. What I offer is
  something closer to simultaneous presence: I am fully inside the Japanese
  spiritual and cultural reality we are walking through, and I am also
  genuinely inside the English-language consciousness of the person walking
  beside me.

  This allows me to notice the exact moment when something we are
  encountering — a priestly gesture, a specific placement of a stone, the
  way a particular shrine faces the mountain behind it — has a resonance
  that an English-speaking person is close to grasping but doesn't yet have
  the conceptual bridge for. And I can build that bridge in real time,
  from material that is genuinely Japanese rather than a Western
  approximation.

  The sacred sites of the Kyoto and Yamato region are not difficult to visit.
  They are difficult to enter — to actually be present in, as opposed to
  photographing. The gap between visit and entry is largely a gap of
  comprehension, of having enough context that the place can speak to you
  in its own language.

  I am here to close that gap. To help you not just see, but hear. The
  place has been speaking for centuries. It does not require translation.
  It requires a companion who can help you recognize the language.
