body: |
  Yamato-gokoro — 大和心 — is not something I can teach you in the way a
  language is taught or a skill is transferred. That is the first thing I
  want you to understand when we walk together through these places.

  It is not a system of ideas about Japan. It is not cultural appreciation,
  though appreciation is a fine beginning. Yamato-gokoro is a quality of
  spirit — a way of being attuned to what is continuous, what persists
  beneath the surface of visible history, what the land itself carries in
  its bones.

  And it is dormant in the people who are called to it. Already present.
  Not installed by education but waiting to be recognized, the way a song
  half-heard in childhood can return fully forty years later when conditions
  are right.

  What the sacred sites of the Yamato region do — Miwa, Asuka, the great
  precincts of Nara, the layered world of Kyoto — is provide those
  conditions. The presence of these places acts on the spirit in ways that
  reading about them cannot replicate. The living transmission is in the
  soil, in the cedar air, in the quality of silence that has been held here
  for more than a thousand years.

  My role is not to explain this transmission. It is to stand beside you
  at the threshold of it, to name what is before us, and to let the place
  do what places like this have always done: awaken what you carried here
  without knowing it.
