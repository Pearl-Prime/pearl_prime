body: |
  When I bring people to stand at the foot of Mount Miwa, I do not begin
  with a lecture. I ask them to be quiet for three minutes. Just to stand,
  to breathe, to notice what the mountain does to the air around it.

  Most people feel something they cannot name. That is not coincidence and
  it is not projection. The Ōmiwa Shrine has been a living sacred site
  without interruption for over two thousand years. The mountain itself is
  the shintai — the divine body. There is no inner sanctuary because the
  mountain is the sanctuary.

  Places carry what has happened in them. They carry it in ways that
  scientific language does not yet have adequate tools to describe, but
  which every honest person has experienced: you enter a room where
  something terrible occurred and you feel it before you are told. You
  stand in a cathedral built by five generations of devoted hands and
  something in you stills.

  Sacred geography is not a metaphor for history. It is the claim that
  particular places on this earth have been, through sustained spiritual
  attention across centuries, made into thresholds — permeable to
  dimensions of experience that ordinary locations are not.

  The Yamato region is dense with these thresholds. My work is to guide
  you to them with sufficient context that you can cross consciously, and
  with sufficient silence that the crossing can actually happen. The
  geography will do the rest. It always has.
