body: |
  Mask Awareness: Choose a social setting you frequent (work, family, friends). Notice the specific mask you wear in that context. What qualities do you perform? What do you hide? Don't judge it. Notice it with curiosity. The mask serves a purpose. But awareness of the mask is the first step toward conscious wearing of it. Ask yourself: "In this moment, which is actually true — the performed version or something underneath?" You might find both are true. In that recognition, something releases.
