body: |
  Rest as Restoration: Set aside time — even 20 minutes — where you are not performing, not trying, not managing anyone's experience. Not scrolling, not distracting, but simply resting. Let your body settle. In Noh theater, the ma — the space between movements — is essential to the art. Without it, there is only tension. Without rest, there is only performance. Your authentic presence needs the ma. It needs the ground of restoration from which true action can arise. Practice this rest regularly.
