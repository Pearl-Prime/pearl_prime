body: |
  Performance Inquiry: Bring to mind a role you play often. Ask yourself: "Is this role authentic to who I am, or is it a defense against being fully seen?" The answer might be: "It's part of who I am, but I've been performing it unconsciously." Or: "This role is serving a protective function, but I've lost touch with what's underneath." In inquiry, the stance shifts. You are no longer unconsciously performing. You are consciously choosing. And in that choice, authenticity begins.
