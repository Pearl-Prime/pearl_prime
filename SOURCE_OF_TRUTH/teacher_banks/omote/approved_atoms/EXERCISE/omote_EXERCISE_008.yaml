body: |
  The Ura — Your Inside: Create a private space — mental or physical — that is only for you. This is the ura, the inside. What you carry here does not need to be performed or managed for anyone else. You can be exhausted here. Uncertain here. Grieving here. Scared here. The ura is sacred because it is not on display. Honor it. Return to it. The fact that you have an inside space where you can be fully yourself makes authentic presence in the omote (the surface) possible.
