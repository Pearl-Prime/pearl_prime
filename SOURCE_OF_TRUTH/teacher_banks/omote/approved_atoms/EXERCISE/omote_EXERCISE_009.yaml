body: |
  Conscious Choosing: When you notice yourself falling into an old performance pattern, pause. Ask: "Am I choosing this mask consciously, or am I running it automatically?" There is a huge difference. Unconscious performance creates anxiety and exhaustion. Conscious performance — choosing to wear a mask while knowing it is a mask — is grounded and authentic. The goal is not to remove all masks but to wear them with awareness, with choice, with the knowledge of what is underneath.
