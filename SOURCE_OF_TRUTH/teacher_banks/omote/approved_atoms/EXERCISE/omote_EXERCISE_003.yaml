body: |
  Vulnerability Practice: In a small, safe context, share something true that you normally hide. "I'm unsure about this." "I'm tired." "I don't understand that." Notice the impulse to soften it, to perform certainty instead. Resist that impulse once. Say the simple truth. Notice what happens. Often, the catastrophe the mind predicts doesn't occur. Instead, connection deepens. Authenticity is not about oversharing — it is about honest presence. Practice this in small doses, building your tolerance for being seen.
