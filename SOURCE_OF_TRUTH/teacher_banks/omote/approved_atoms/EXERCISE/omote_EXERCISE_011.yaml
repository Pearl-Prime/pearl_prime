body: |
  Stillness Between Actions: In any interaction — a conversation, a meeting, a social gathering — practice finding stillness between your actions. One moment of authentic presence between efforts to manage the interaction. In that stillness, the ma, something real can emerge. You don't have to perform all the time. You can be active and rested, giving and authentic. Practice finding the pause, the space between, where the whole being can settle.
