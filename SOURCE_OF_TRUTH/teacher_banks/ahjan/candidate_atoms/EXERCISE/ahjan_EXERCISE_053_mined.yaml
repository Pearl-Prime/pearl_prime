body: It is a state of being beyond our ordinary concepts of good and bad, wants and
  aversions. True happiness and liberation are found when you transcend these worldly
  attachments.In the spiritual journey, self-effort involves disciplined practices
  like meditation, mindfulness, and compassion. These practices are the tools that
  help you ascend on the path toward enlightenment. However, you must use them consistently
  and correctly to reap their benefits.
