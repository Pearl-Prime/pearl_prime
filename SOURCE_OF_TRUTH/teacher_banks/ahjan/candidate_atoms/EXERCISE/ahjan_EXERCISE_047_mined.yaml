body: However, true meditation seeks to completely still these waves so that the treasure
  can be directly accessed.In essence, meditation is about going beyond thought, transcending
  the limitations of self-centered thinking, and entering a realm of boundless awareness.
  When we achieve this state, our minds become like the vast open blue sky, unobstructed
  by the constant flight of thoughts.The Transformative Power of MeditationMeditation
  is not merely a practice of quieting the mind; it is a means of entering the dimensions
  of light and enlightenment.
