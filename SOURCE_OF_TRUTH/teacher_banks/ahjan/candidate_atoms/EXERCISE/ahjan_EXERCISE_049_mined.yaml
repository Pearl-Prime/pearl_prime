body: In this state, the anxieties of tomorrow, the burdens of yesterday, and the
  constraints of self-doubt fade away.States of Mind and PerceptionStates of mind
  determine our perception of reality. Just as a window can offer a view of the ocean
  or a dark alley, our state of mind shapes how we perceive the world. Meditation,
  therefore, is the practice of shifting to higher and brighter states of mind.
