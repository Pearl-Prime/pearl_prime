atom_id: ahjan_TEACHING_084_mined
body: Among the tormented souls, one named Karmasara experienced a transformation,
  realizing his own blame and resentment perpetuated his suffering.Moved by Mogesita's
  compassion, Karmasara embraced forgiveness and the Dharma. His karma shifted, and
  he was reborn as a human. He dedicated his life to spreading compassion and forgiveness,
  eventually attaining enlightenment. This story illustrates the power of compassion
  and the Dharma in transcending suffering.In another story, there was a troubled
  monk haunted by a relentless hungry ghost. The tormented monk turned to the Buddha
  for guidance.
