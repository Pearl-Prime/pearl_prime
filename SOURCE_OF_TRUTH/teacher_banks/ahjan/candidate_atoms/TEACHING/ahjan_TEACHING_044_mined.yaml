body: In essence, it's synonymous with the divine.The Trap of ConceptualizationOne
  of the fundamental challenges in our spiritual journey is the tendency to reduce
  profound truths, like the concept of light, into mere intellectual ideas. We read
  about these concepts in books, hear them in sermons, and hold them as beliefs. We
  think we "get it." We think we understand what light and God are, and we're ready
  to move forward. But therein lies the trap.True spiritual purity and enlightenment
  require us to transcend concepts and ideas.
