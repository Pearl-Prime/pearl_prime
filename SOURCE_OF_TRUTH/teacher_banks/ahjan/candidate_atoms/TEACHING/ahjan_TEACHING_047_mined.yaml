body: Buddha's disciples often described the transformative power of his teachings,
  noting that they brought about profound awareness of light within.Light in ChristianityChristianity,
  too, has a rich tradition of associating light with the divine and spiritual purity.
  While the religion has a diverse array of beliefs and interpretations, there's a
  common thread among the saints and mystics of Christianity. These individuals, who
  have had direct encounters with the divine, often describe their experiences as
  encounters with light.St.
