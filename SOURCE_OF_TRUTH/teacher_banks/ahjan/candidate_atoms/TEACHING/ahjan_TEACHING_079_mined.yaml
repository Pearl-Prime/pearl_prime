body: The Wheel of Dharma, often depicted as the Bhava Chakra in Buddhist cosmology,
  offers profound insights into the various states of incarnation and the human experience.
  This esoteric teaching, as discussed in the text, introduces us to the concept of
  the Six Worlds, representing different dimensions of existence. While Christianity
  has its own cosmological framework with three states the world of man, heaven, and
  hell Buddhism presents a more intricate view with endless planes and worlds within
  worlds.
