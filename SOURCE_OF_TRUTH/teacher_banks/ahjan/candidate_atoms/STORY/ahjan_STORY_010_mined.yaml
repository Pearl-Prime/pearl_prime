body: It allows us to see life with new eyes, unburdened by personal limitations.In
  the story of Milarepa, we witness how a person living in poverty and hardship can
  perceive the world as a realm of enlightenment, magic, power, light, beauty, love,
  and happiness. The transformation in Milarepa's awareness is a testament to the
  power of meditation to shift one's perception of reality from suffering to transcendence.The
  Role of an Enlightened TeacherWhile meditation is a personal journey, the guidance
  of an enlightened teacher can be invaluable.
