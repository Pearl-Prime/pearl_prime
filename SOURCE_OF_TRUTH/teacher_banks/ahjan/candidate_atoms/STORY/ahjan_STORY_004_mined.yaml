atom_id: ahjan_STORY_004_mined
body: This universal love is not bound by personal desires or attachments but is a
  compassionate force that encompasses all beings.A fitting Buddhist story to illustrate
  this is the tale of the Buddha sacrificing himself to feed a starving tigress and
  her cubs.
