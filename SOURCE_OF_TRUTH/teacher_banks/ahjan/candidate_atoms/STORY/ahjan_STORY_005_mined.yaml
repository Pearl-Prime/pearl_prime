body: nearby river. Then, bring me water from the river."The young man followed the
  Buddha's words, and this time the water from the river was fresh and pure.The Buddha
  smiled and said, "Happiness is like that cup of water. When you hold onto worries
  and desires like the salt, your life becomes bitter and unsatisfying. But when you
  let go of those attachments, your life becomes as fresh and pure as the river water.
