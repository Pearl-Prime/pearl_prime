body: It's a dualistic view of reality.However, through the direct experience of light,
  as taught by an enlightened teacher or through meditation, this perception can transform.
  The space between the stars turns into gold light. What was once a stark contrast
  between bright stars and dark space becomes an awareness of all-encompassing, radiant
  light.
