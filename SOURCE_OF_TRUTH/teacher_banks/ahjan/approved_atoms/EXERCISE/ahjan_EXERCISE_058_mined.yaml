body: 'Helvetica-Bold;Helvetica; ;;;; ;;;; Karma Yoga: The Joy of Selfless Action
  Introduction Karma Yoga, a fundamental aspect of the yogic philosophy, is often
  overshadowed by the more physically oriented practices. However, its significance
  lies in its transformative potential, guiding individuals towards a life of unattached
  action and pure giving. Understanding Karma Yoga Karma Yoga is rooted in the Bhagavad
  Gita''s teachings, emphasizing action without attachment to outcomes. This path
  teaches that true happiness and fulfillment come from selfless service.'
