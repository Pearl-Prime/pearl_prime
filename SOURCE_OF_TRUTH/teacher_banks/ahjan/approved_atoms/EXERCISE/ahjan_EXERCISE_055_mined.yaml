body: 'Dharma and Duty: The Cornerstones of Karma Yoga At the heart of Karma Yoga
  is the concept of ''dharma'' or duty. It''s about aligning our actions with our
  intrinsic nature and societal role, fostering a sense of purpose and direction.
  Purity and humility in this context mean approaching our duties with a clear, unselfish
  mindset, free from the ego''s desire for recognition or reward. Selfless Service:
  The Ultimate Goal Karma Yoga elevates the act of selfless service to the highest
  form of spiritual practice. It''s not just about what we do, but the intention behind
  our actions.'
