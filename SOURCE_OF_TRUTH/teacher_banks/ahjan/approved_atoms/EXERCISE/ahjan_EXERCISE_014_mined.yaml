body: experiencing spiritual light. When you engage in meditation and successfully
  quiet your thoughts, you open the door to an immediate, profound spiritual experience.
  It's in this stillness and emptiness of the mind that you can access the luminous,
  spiritual light.Stopping thought during meditation allows you to pierce through
  the veil of concepts and ideas, enabling you to experience the truth of existence
  beyond the self.
