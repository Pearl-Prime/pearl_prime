body: 'Helvetica-Bold;Helvetica; ;;;; ;;;; Karma Yoga: The Path of Purity and Humility
  Karma Yoga: The Path of Selfless Action Karma Yoga, a spiritual path rooted in selfless
  action, emphasizes performing duties with dedication but without attachment to the
  outcomes. This form of yoga teaches that true fulfillment lies in serving others
  and finding unity with the world around us. Integrating the virtues of purity and
  humility, Karma Yoga guides us towards a life of transparent intentions and a humble
  approach to our actions.'
