atom_id: ahjan_SCENE_006
body: |
  You eat something delicious. You notice the impulse to want it to last forever.
  You also notice it is already becoming memory. The flavor fades. The plate empties.
  You see clearly that holding never works. Release is not sadness. It is alignment
  with how things actually move.
