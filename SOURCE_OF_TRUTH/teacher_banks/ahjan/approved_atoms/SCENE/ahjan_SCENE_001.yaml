atom_id: ahjan_SCENE_001
body: |
  At your desk, a memory surfaces. Someone said something years ago that you replay
  as if it happened this morning. You feel the contraction in your chest. You notice
  that the contraction is real. The person speaking those words is not here. What you
  are feeling now is the mind's story, not the past event.
