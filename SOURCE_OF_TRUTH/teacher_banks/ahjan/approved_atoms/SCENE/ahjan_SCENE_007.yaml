atom_id: ahjan_SCENE_007
body: |
  You do ordinary work with full attention. Your hands move. You notice where your
  mind goes when you stop watching it. Then you return. This is what purity means.
  Not transcendence, but presence. Not someplace else, but here. The work continues.
  The attention continues. That is enough.
