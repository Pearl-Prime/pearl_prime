atom_id: ahjan_SCENE_010
body: |
  A desire arises to say something you shouldn't. You feel the words forming. You
  also feel that you are not forced to say them. The desire is real. Saying it is a
  choice. You choose silence. The desire remains but becomes just a thought, not a
  command. This is how freedom actually lives.
