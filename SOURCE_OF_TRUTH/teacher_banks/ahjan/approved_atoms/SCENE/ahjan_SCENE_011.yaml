atom_id: ahjan_SCENE_011
body: |
  You sit after a day of many demands. Your mind is scattered. Instead of trying to
  settle it, you notice each thought as it arrives. The arrivals slow. Not because
  you pushed them away, but because you stopped resisting them. Acceptance itself
  is the gate.
