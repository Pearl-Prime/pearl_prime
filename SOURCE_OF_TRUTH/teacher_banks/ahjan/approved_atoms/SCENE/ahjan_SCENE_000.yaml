atom_id: ahjan_SCENE_000
body: |
  You sit in the morning before others wake. The room is still. A truck passes on
  the street below. You notice the sound arrive, peak, and fade. Your mind had made
  it mean something until you saw it was only sound. You return attention to breath.
  This moment is the whole practice.
