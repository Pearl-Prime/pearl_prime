atom_id: ahjan_SCENE_002
body: |
  You watch your breath move in and out. You notice how easy it is to think instead
  of breathing. The thought feels urgent. You mark it. It passes. The breath continues.
  There is no problem with thinking. The problem is forgetting that you are not
  your thoughts.
