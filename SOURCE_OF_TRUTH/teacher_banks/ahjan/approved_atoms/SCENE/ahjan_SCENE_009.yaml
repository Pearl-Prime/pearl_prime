atom_id: ahjan_SCENE_009
body: |
  You notice yourself holding tension in your shoulders. You don't relax. You observe
  where the tension is, what it feels like. You see that you created it through habit,
  not because something requires it. The seeing itself brings release. The shoulders
  lower. Nothing else needed to happen.
