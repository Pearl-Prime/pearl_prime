atom_id: ahjan_SCENE_003
body: |
  You walk through a crowded space. Someone bumps your shoulder. Anger flares. You
  feel the impulse to turn. Then you pause. You notice where the anger lives in your
  body. It is real. The other person did not know they touched you. Your anger is
  your own creation. This seeing is freedom.
