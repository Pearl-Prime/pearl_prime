atom_id: ahjan_SCENE_005
body: |
  You lie in bed unable to sleep. Worry cycles through your mind like a wheel. You
  have tried to fight it. You have tried to escape it. Now you turn toward it. What
  is the fear underneath? When you look at it directly, the wheel slows. Not because
  the fear went away, but because you stopped running from it.
