atom_id: ahjan_SCENE_008
body: |
  You feel the habit of judgment arise toward someone you don't understand. Instead
  of acting on it, you pause. You observe how the judgment feels in your body. You
  notice that judging says nothing true about them. It reveals only the shape of your
  own conditioning. This clarity softens the judgment.
