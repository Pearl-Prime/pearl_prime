atom_id: ahjan_TEACHING_029_mined
body: Through their example, they show that the path to liberation is accessible to
  all who are willing to undertake it.One of the key aspects of the enlightened ones
  is their ability to bring excellence and precision to every aspect of life. Whether
  they are engaged in martial arts, healing, or any other discipline, they infuse
  their activities with a sense of magic and power.
