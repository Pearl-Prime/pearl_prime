atom_id: ahjan_REFLECTION_009
body: |
  What brings you fear? Name the fear. Now sit with it without trying to solve it.
  Notice where it lives in your body. Is the fear itself painful, or is the story
  you tell about what the fear means painful? Can you have the fear without the story?
  What would that be like?
