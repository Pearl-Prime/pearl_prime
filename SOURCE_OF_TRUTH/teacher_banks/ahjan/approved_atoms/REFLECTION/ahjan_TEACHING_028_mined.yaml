atom_id: ahjan_TEACHING_028_mined
body: It is a process of self-purification, where one gradually lets go of the ego
  and embraces a state of pure awareness.The enlightened ones serve as guides on this
  path, offering their wisdom and teachings to those who seek enlightenment. They
  demonstrate that it is possible to overcome the greatest difficulties in life, such
  as anger, jealousy, depression, and desire.
