atom_id: ahjan_TEACHING_046_mined
body: His teachings, referred to as the Dharma, were said to bring light and illumination
  to those who embraced them.In Buddhism, all essential aspects of the teachings lead
  practitioners toward an awareness of light as the ultimate truth. The words and
  concepts within Buddhism act as signposts, directing the mind toward the direct
  experience of inner light, which is synonymous with enlightenment.
