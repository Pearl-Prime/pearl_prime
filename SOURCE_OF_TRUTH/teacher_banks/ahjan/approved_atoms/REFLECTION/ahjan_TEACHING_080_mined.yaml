body: 'This exploration delves into the significance of the Wheel of Dharma and how
  it offers a pathway to enlightenment, transcending the limitations of the Six Worlds.The
  Six Worlds, as depicted in the Wheel of Dharma, encompass a wide spectrum of incarnational
  experiences:Hell (Naraka): The lowest realm characterized by intense suffering,
  anguish, and torment.'
