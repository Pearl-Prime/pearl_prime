body: However, in the modern world, where the sources of stress are often more psychological
  than physical, this mechanism can become maladaptive if left unchecked.Stress is
  a consequence of being disconnected from one's true self or path. It results from
  inner conflicts caused by societal conditioning and a misalignment between our actions
  and our inner truth.
