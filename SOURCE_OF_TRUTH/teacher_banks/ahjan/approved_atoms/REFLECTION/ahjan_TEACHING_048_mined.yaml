atom_id: ahjan_TEACHING_048_mined
body: A teacher who has directly encountered the light can share their awareness with
  you, helping you navigate the path with greater clarity and depth.Just as Buddha's
  disciples reported seeing light emanating from him during his teachings, students
  of enlightened teachers often describe similar experiences. The light transmitted
  by an awakened teacher can bestow knowledge, reveal the path to truth, and illuminate
  the student's inner world.
