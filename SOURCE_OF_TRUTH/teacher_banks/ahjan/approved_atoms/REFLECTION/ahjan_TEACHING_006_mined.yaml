atom_id: ahjan_TEACHING_006_mined
body: These higher states reveal greater possibilities in their physical lives, fostering
  success, happiness, and fulfillment.Beyond States of Mind:While higher states of
  mind bring happiness and clarity, the ultimate aim of Buddhism is to transcend all
  states of mind. It goes beyond the realm of God-consciousness or any concept of
  divinity. Buddhist enlightenment is the process of letting go, even of the concept
  of self.
