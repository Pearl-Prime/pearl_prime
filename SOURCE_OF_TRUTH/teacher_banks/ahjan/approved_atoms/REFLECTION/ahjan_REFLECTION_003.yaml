atom_id: ahjan_REFLECTION_003
body: |
  When you feel anger, where does it live in your body? Sit with the sensation itself.
  Not the story about who wronged you. The physical reality of the emotion. How long
  can you observe it without reacting? What does anger teach you when you don't run
  from it?
