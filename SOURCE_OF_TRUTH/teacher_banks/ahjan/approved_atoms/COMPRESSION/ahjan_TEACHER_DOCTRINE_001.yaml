body: |
  Ahjan keeps pointing toward a small word that gets larger the longer you sit
  with it. Mindfulness. Most people hear that word and think it means calm.
  Ahjan says no. Mindfulness is not calm. Mindfulness is noticing. And the
  thing about noticing is that you are not trying to change what you find.

  This is the part most people skip. They notice the tightness in the chest
  and immediately try to soften it. They notice the racing heart and
  immediately try to slow it. They notice the busy mind and immediately try
  to quiet it. All of that is doing. Mindfulness, in the way Ahjan teaches
  it, is the willingness to see without correcting.

  "I see the chest is tight." Full stop. Not "I see the chest is tight, let
  me fix that." Not "I see the chest is tight, what is wrong with me."
  Just: "I see the chest is tight." The seeing is the practice. The seeing
  is what changes things. But only if you do not turn the seeing into another
  job to get done.

  Ahjan often says it like this. "If you are looking at a candle and you keep
  adjusting the candle, you are not actually looking at it. You are managing
  it. Put your hands down. Let the candle be what it is. Then you will see
  the candle."

  The same is true for whatever is happening in your body right now. If you
  keep adjusting it, you are not actually seeing it. You are managing it. And
  management is not the same as awareness. Management often keeps a thing in
  place by paying close attention to it without ever letting it complete.

  Awareness is different. Awareness gives a sensation room to do what it was
  going to do anyway. The tightness moves through. The racing slows on its
  own. The thought passes. Not because you fixed it. Because you finally got
  out of its way.

  This is what Ahjan keeps returning to. Notice. Do not correct. See what
  happens when you simply look.
