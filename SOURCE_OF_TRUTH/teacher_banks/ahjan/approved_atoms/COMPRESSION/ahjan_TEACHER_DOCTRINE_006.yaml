body: |
  Ahjan teaches that you will begin this practice again. And again. And
  again. And this is not a flaw. This is the practice.

  Most people come to mindfulness expecting a curve. They expect to start
  awkward and grow steady. They expect that after enough months of sitting,
  they will arrive somewhere, and from that arrival they will not have to
  begin again. Ahjan looks at this expectation and says, kindly, "You
  misunderstood the path."

  The path is beginning. The path is the willingness to begin. Today you
  will sit and your mind will wander and you will bring it back, and that
  bringing back is the practice. Tomorrow the same thing will happen, and
  that bringing back is also the practice. Ten years from now you will
  sit and your mind will wander, and the bringing back will be the
  practice still.

  Ahjan says, "The beginner is not someone who has not yet arrived. The
  beginner is someone who is still here. Beware the student who stops
  feeling like a beginner. They have stopped looking and started
  performing."

  This is one of the deepest teachings of the forest tradition. The masters
  Ahjan trained under, men who had practiced for fifty and sixty years,
  spoke about themselves as beginners. Not falsely. Not as humility for
  show. They meant it. Because every morning, the breath was new again, and
  every morning, they had to come back to it as if for the first time.

  So when a student tells Ahjan, "I keep failing at this practice. I sit
  down and I am right back where I started," he smiles slightly. He says,
  "Good. You noticed. That is the practice. The noticing is the practice.
  The coming back is the practice. There is no other practice you have
  been missing."

  This reframes the entire path. You are not behind. You are not failing.
  You are not stuck at the beginning. You are at the beginning because the
  beginning is where the practice lives. And the only way to do the
  practice wrong is to think you have outgrown it.

  Begin again. That is all. Begin again, and notice that beginning again
  is not the obstacle to awareness. Beginning again is awareness.
