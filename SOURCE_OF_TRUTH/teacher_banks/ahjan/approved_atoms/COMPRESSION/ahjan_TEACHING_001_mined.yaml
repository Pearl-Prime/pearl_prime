atom_id: ahjan_TEACHING_001_mined
body: 'However, the Buddha introduced a revolutionary concept: going beyond states
  of mind. This idea was not entirely new, as there had been other enlightened teachers
  before him. Nevertheless, the Buddha''s teachings presented a profound departure
  from the prevailing spiritual ideologies.In Buddhism, it is believed that there
  are 10,000 states of mind, and humans constantly shift from one state to another,
  coloring their perception of reality. Each state of mind creates its unique version
  of reality, whether it is joyful, sorrowful, or neutral.'
