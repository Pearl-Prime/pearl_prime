body: |
  Ahjan often says that there are two kinds of meditation, and they look
  almost the same from the outside, and they are opposites from the inside.

  The first kind is meditation as escape. You sit down. You close your eyes.
  You reach for the calm. You reach for the quiet mind. You reach for the
  feeling of being above the chaos of your life. If anything difficult
  arises in the body or the mind, you push it away and reach for the calm
  again. The meditation becomes a small vacation from your actual existence.
  You leave the cushion feeling lighter. Then your day picks up where it
  left off, and the heaviness comes back.

  The second kind is meditation as showing up. You sit down. You close your
  eyes. And instead of reaching for anything, you let what is actually here
  arrive. The tightness in the chest is here. The tiredness behind the eyes
  is here. The list of things you forgot to do is here. The sadness you did
  not have time to feel this week is here. You do not push any of it away.
  You let it be there with you, and you stay.

  Ahjan teaches the second kind. He says, "You are not here to leave your
  life. You are here to finally be in it." Escape is a tool that worked
  when you were a child and had no other tool. By now, in adulthood, escape
  has costs you can name. Things in your body that did not get felt.
  Conversations you did not have. Grief that is still waiting for an
  audience.

  When Ahjan teaches a student to sit, he is not teaching them how to feel
  better in twenty minutes. He is teaching them how to show up. How to be
  with what is. How to let the body breathe in the presence of someone who
  is actually paying attention.

  This sounds simple. It is the hardest thing many people will ever do.
  Because showing up means giving up the small constant project of being
  somewhere else. And that project has been running so long it feels like
  who you are.

  Ahjan says: it is not who you are. Show up once and you will see.
