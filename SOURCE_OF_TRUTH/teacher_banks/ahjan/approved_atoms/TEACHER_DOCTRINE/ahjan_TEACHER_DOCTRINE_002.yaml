body: |
  What Ahjan returns to again and again is the cost of bracing. He uses that
  word a lot. Bracing. The body in a low-grade clench, twenty-four hours a
  day, waiting for an impact that is not coming.

  He says it like this. "You are running a war that is not happening." The
  body is dressed for combat. The shoulders are up. The jaw is set. The
  breath is shallow. The stomach is tight. Every muscle is half-engaged,
  half-ready to spring or freeze or flee. And there is no actual enemy in
  the room. The room is quiet. The meeting is fine. The deadline is real
  but ordinary. The person across the table is a colleague, not a threat.

  But the body does not know that. The body has been on duty so long that
  standing down feels dangerous. To unclench feels like exposure. To let
  the shoulders drop feels like dropping a shield. So the bracing continues.
  Through breakfast. Through the commute. Through the workday. Through the
  evening that should have been rest. Through the sleep that does not
  restore.

  Ahjan teaches that this is one of the most ordinary forms of suffering and
  also one of the most invisible. You cannot see it from the outside. The
  person looks competent. The person is competent. But underneath, every
  cell is on watch, and the watch never ends.

  The cost shows up later. In the chronic tension in the neck. In the gut
  that no longer digests well. In the sleep that comes only with help. In
  the strange numbness that arrives after years of vigilance, as if the body
  finally turned its volume down because no one was ever going to tell it
  the war was over.

  So Ahjan does this small, radical thing. He looks at the body and says,
  out loud or silently, "There is no war here right now. You can stand
  down." Not for the year. Not for the week. For this breath. The body, if
  it is met by someone who is actually paying attention, will sometimes
  believe it. And in that one breath of believing, something rests that has
  not rested in a very long time.
