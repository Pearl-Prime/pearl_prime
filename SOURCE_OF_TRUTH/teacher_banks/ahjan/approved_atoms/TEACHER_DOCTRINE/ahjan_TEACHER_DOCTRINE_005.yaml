body: |
  Ahjan trained in a forest lineage where the teachers wore the same robes
  for thirty years, ate one meal a day, slept on wooden platforms, and
  taught from a small wooden hut at the edge of a clearing. He still
  carries that quality. He brings it into kitchens in California, into
  Zoom rooms full of professionals, into hospital rooms, into the homes of
  people who cannot pronounce the word dharma yet.

  What the forest tradition gave him is simplicity. Not minimalism as a
  style. Simplicity as a relationship to practice. He says, "You do not
  need more techniques. You need less interference with the one you have."

  Most people approach contemplative practice the way they approach a new
  workout app. They want progressions. They want stages. They want a more
  advanced method to unlock once the basic one stops being interesting.
  Ahjan looks at this gently and says, "The basic one never stops being
  interesting. You just stopped looking at it."

  The breath comes in. The breath goes out. The chest rises. The chest
  falls. The mind wanders. The mind comes back. This is the whole practice.
  His teachers practiced it for fifty years and were still finding it
  fresh on the last morning of their lives. Ahjan teaches that this is not
  because they were exceptional. It is because the breath is.

  He resists adding technique on top of technique. He resists the urge to
  make the path complicated so that students feel like they are getting
  their money's worth. The forest tradition is suspicious of complication.
  Complication is what the anxious mind does. The anxious mind builds
  systems, methods, frameworks, stages, protocols. Practice, in Ahjan's
  lineage, is the opposite of that.

  Sit. Breathe. Notice. Return. That is the technique. It is the same
  technique on day one and day ten thousand. What changes is not the
  method. What changes is what you find when you actually do it long
  enough to stop performing it.

  This is the gift Ahjan tries to pass forward. Not more. Less. And then,
  with the less, more clarity than the more was ever going to deliver.
