body: |
  Ahjan teaches that the first place to look is not the mind. The mind comes
  second. The body has already registered what is happening before any thought
  arrives to explain it. By the time you are thinking about your anxiety, your
  chest has already tightened, your jaw has already locked, your shoulders have
  already climbed. The mind walks in late and tries to take credit for the
  arrival.

  In the forest tradition Ahjan was trained in, this is not philosophy. It is
  observation. Sit with anyone in the middle of fear and you will see it. The
  breath shortens before the worry is named. The stomach drops before the
  thought completes. The hand moves to the chest before the person can say what
  is wrong.

  So Ahjan begins where the actual signal is. Not at the level of belief, not
  at the level of self-talk, not at the level of trying to argue with what is
  happening. He begins at the place where the nervous system has already spoken.

  "What is the body doing right now?" That is the question he keeps coming back
  to. Not "what are you thinking?" Not "what are you afraid of?" What is the
  body doing right now. Where is the tightness. Where is the heat. Where is the
  emptiness. Where is the breath sitting.

  This is not a trick to bypass the mind. The mind is still welcome. But the
  mind has had its turn for most of your life, and it has not solved this. The
  body has been waiting underneath the whole time, holding the actual data,
  willing to be consulted the moment someone is brave enough to ask.

  Ahjan says: look there first. Not always. Not for every question. But for
  this one — the one about whatever fear or pattern is running your day — look
  there first. The mind cannot tell you what the body already knows.
