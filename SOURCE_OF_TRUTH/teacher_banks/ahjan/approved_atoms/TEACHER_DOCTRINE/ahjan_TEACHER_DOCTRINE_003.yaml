body: |
  Ahjan teaches that awareness is not something you have to manufacture. It
  is not a state you build by working hard. It is closer to a place you
  return to. He uses the word homecoming sometimes. He says, "Awareness is
  the address you were never not at. You just stopped writing to it."

  Most people approach mindfulness like a workout. They tense up to relax.
  They concentrate to be present. They strain to soften. Ahjan watches this
  in students and gently shakes his head. He says, "You do not have to push
  the river to remember it is wet. You only have to stand in it."

  The body has always been here. The breath has always been moving. The
  weight of your feet on the floor right now, the temperature of the air
  on your skin, the small sounds in the room — all of this has been here
  the whole time. Awareness is just the act of returning to what was never
  actually missing.

  This is why Ahjan does not teach mindfulness as discipline first. He
  teaches it as homecoming first. Discipline can come later, when it is
  useful. But if you start with discipline, you start with the idea that
  awareness is somewhere else and you have to fight to reach it. That is
  not the teaching. The teaching is the opposite.

  Awareness is the room you have been pacing around inside for years. The
  walls are familiar. The floor is familiar. You did not build any of it.
  You only walked away in your head for a while, off into the future or
  back into the past or sideways into the thousand small worries that fill
  a day. The walking away is what was effortful. The coming back is the
  rest.

  So when Ahjan says, "Come back to the breath," he is not asking you to
  start over. He is asking you to notice what has been here the whole time.
  The breath is already moving. The body is already here. The ground is
  already under the feet. That is the practice. Not building something new.
  Returning to something that never left.
