body: |
  When Ahjan teaches what the old texts call the four foundations of
  mindfulness, he refuses to leave the words in their original form alone
  on the page. He translates them into the body of the person sitting in
  front of him. He says, "These are not categories. These are four places
  to look."

  The first is the body. What is the body doing right now. Is the
  shoulders up. Is the breath shallow. Is there heat in the face. Is the
  jaw set. Is the stomach hard. Ahjan begins here because the body cannot
  lie. The body has already told you everything you need to know.

  The second is feeling tone. Not emotion. Not story. Just the basic
  quality of what is arriving in your experience. Pleasant. Unpleasant.
  Neutral. That is all. The mind wants to skip past this and go straight
  to interpretation. Ahjan slows the student down. "Before you decide
  what this is, just notice — is it pleasant, unpleasant, or neutral?"
  That single move interrupts most of the suffering of an ordinary day.

  The third is the state of the mind. Is the mind tight. Is the mind
  spacious. Is the mind grasping. Is the mind quiet. Ahjan does not ask
  what the mind is thinking about. He asks what shape the mind is in. The
  difference matters. The content of thought is endless. The shape of
  thought is observable in a single breath.

  The fourth is what the old texts call dhammas, which Ahjan translates as
  patterns. Not eternal truths. Patterns. The pattern of clinging when
  something feels good. The pattern of pushing away when something feels
  bad. The pattern of identifying with whatever happens to be showing up
  right now. Ahjan teaches that seeing the pattern is the beginning of
  not being driven by it.

  He says: do not try to hold all four at once. Look at one. Then look at
  the next. The body first, almost always. Then feeling tone. Then the
  state of the mind. Then the patterns underneath. This is twenty-five
  hundred years old. It is also as ordinary as opening a window. The
  teaching survives because it is simple, and it is simple because the
  truth it points to is already in the room.
