body: |
  When you work in the ordinary sense, you extract: hours for wage, effort for
  outcome. The spine is always checking—am I ahead, behind, making ground?
  
  But there is another way. Call it karma yoga, or calling your work itself your
  meditation. The mechanism is simple: you shift the center of gravity from personal
  gain to the work itself. You give the effort forward. Not expecting return.
  
  This one change touches everything. A carpenter becomes carpenter, not for the
  paycheck, but because the hammer moving true is its own light. A manager stays
  present with their team's difficulty instead of thinking, how fast can I rise?
  
  The teaching is not mystical—it is almost mechanical. When you stop hoarding your
  attention, something shifts. The work feeds you differently. Not always easier.
  But the quality of exhaustion becomes the quality of having given.
