atom_id: ahjan_TEACHING_094_mined
body: To reach that summit, you must climb, and this climb requires self-effort.In
  a Buddhist story, a young monk named Sujata sought enlightenment from an enlightened
  master, Venerable Ananda. Ananda emphasized that while he could offer guidance,
  enlightenment could not be given but had to be realized through one's own efforts
  and self-discipline.
