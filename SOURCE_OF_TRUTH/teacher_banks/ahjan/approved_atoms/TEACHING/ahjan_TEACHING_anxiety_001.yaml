body: |
  Ahjan teaches that anxiety is not a malfunction. In tantric mysticism,
  opposites are complementary, not opposed. The settled body and the anxious
  body are not two different people living in you. They are one field of
  attention, moving through different bands.

  A band of awareness is what Ahjan calls the particular quality a moment of
  attention takes on. Some bands are wide and slow. Some bands are narrow and
  fast. Anxiety is a band pulled tight. It is not a separate self that has
  invaded you, and it is not evidence that something has gone wrong with your
  nervous system. It is one setting on an instrument that has many settings.

  This matters because most people spend their energy fighting the tight
  band directly, trying to force it back to wide and slow through sheer will.
  Ahjan does not teach this. He teaches the etiquette of consciousness:
  approach the tight band the way you would approach anything mystical, with
  attention rather than force. You do not out-argue a tightened field. You
  meet it. You widen the field of attention around the tightness until the
  tightness has room to loosen on its own schedule.

  He says the tight chest at the kitchen sink is as valid a site of practice
  as any mountain retreat. Anxiety does not wait for the meditation cushion,
  so the practice cannot wait for it either. Self-effort is required and it
  is sufficient. No outside rescue has to arrive before you can begin
  noticing the band you are already standing inside.

  Ahjan says: do not treat anxiety as the enemy in the room. Treat it as
  information about which band you are currently in, and then widen the
  field around it. The tight band and the settled field are one continuum,
  not two camps at war.
