atom_id: ahjan_TEACHING_095_mined
body: Sujata dedicated himself to diligent practice, eventually achieving enlightenment
  on his own, illustrating the importance of self-effort on the spiritual path.One
  of the fundamental teachings in Buddhism is that enlightenment cannot be given to
  you by an external force, whether it be a deity or another person. Instead, it is
  your responsibility to elevate your consciousness and understanding through diligent
  practice and self-discipline.Once, in a remote village, there lived a man suffering
  from a severe illness.
