body: |
  A core principle Ahjan repeats across every topic is that spiritual
  practice must integrate the physical world. It cannot be reserved for a
  separate, cleaner category of experience. Applied to anxiety, this
  principle rules out a common move: treating anxiety as proof that you
  have left the practice, or as an interruption to be tolerated until the
  real spiritual moment resumes.

  There is no separate, cleaner category. The tight band in your chest
  during a difficult conversation is inside the practice, not outside it.
  The racing thoughts before a deadline are inside the practice. Ahjan does
  not ask students to wait for stillness before beginning. He asks them to
  begin with whatever field of attention is actually present, tight or
  wide, and work from there.

  This is why the kitchen counter carries the same weight as the mountain
  in his teaching. Both are places where a body can notice its own bands of
  awareness. Anxiety at the kitchen counter is not a lesser or more
  contaminated version of the anxiety a person might feel elsewhere. It is
  simply where the practice is currently available.

  He also teaches that this integration cuts the other direction. Insight
  gained while sitting with anxiety is not separate from insight gained in
  formal practice. Both come from the same field of attention, observed
  with the same etiquette of consciousness. A person who has genuinely met
  their anxiety once, without escaping it, has practiced something real,
  whether or not a cushion was involved.

  Ahjan says: do not build a wall between the anxious moment and the
  spiritual moment. There is one continuous field. Anxiety is simply where
  it is presently asking to be met.
