body: |
  Ahjan uses the phrase etiquette of consciousness for the protocol he
  teaches for approaching anything mystical: attention first, force never.
  He extends the same etiquette to anxiety, because a tightened band of
  awareness is, to him, no less worthy of careful approach than any other
  state that arrives uninvited.

  Most people meet anxiety rudely. They interrupt it, argue with it, or try
  to leave the room before it finishes speaking. Ahjan asks students to
  notice this reflex without judging it, because the reflex is understandable.
  Nobody was taught to sit with a tightened field. Everybody was taught to
  make it stop.

  The etiquette he teaches instead has three simple movements. Notice where
  in the body the band has tightened. Observe the edges of that tightness
  without pushing on them. Let the field of attention include the tightness
  rather than orbit around trying to remove it. None of these movements ask
  you to like the anxiety or agree with what it is telling you. They ask you
  to be present for it the way you would be present for a guest who showed
  up without calling first.

  This is not passive. Ahjan is clear that self-effort is required and
  sufficient. The etiquette is a discipline, practiced the same way any
  skill is practiced, until it becomes available in the ordinary moments,
  not only on the cushion. A tight chest before a meeting. A racing mind at
  a red light. These are the actual training grounds.

  Ahjan says: the mystical cannot be argued into submission, and neither can
  anxiety. Both are met through etiquette, through attention held steady
  long enough for the field to widen on its own.
