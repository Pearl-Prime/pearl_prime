body: These teachings enable them to perceive the world from a brighter perspective.Life
  as a Dream:Buddhism posits that life is like a dream, composed of an ever-changing
  landscape of 10,000 states of mind. Just as dreams are transient and illusory, so
  is life's ever-shifting nature. The way individuals perceive life is determined
  by their current state of mind.
