body: |
  The land is not passive. This is the first thing that must be understood before any
  geomantic assessment is meaningful.

  Dragon Veins — Long Mai — are living energy currents that move through the earth the
  way meridians move through the body. They carry qi accumulated over geological time,
  shaped by water courses, mountain ridgelines, soil composition, and the accumulated
  human and non-human activity layered into a site over centuries. These are not
  metaphysical constructs. They are structural features of the earth's energetic
  architecture, as real as the geology they follow.

  My work across China, Taiwan, and Japan has involved mapping these currents — their
  activation states, their directions, their points of convergence and blockage. A site
  that sits on a healthy Dragon Vein carries a fundamentally different quality than one
  that does not, and that difference expresses itself in measurable patterns: the vitality
  of populations living there, the political stability of institutions built there, the
  creative and economic output of regions centered there.

  This is not poetry about landscapes. It is a technical discipline with diagnostic
  criteria, intervention methods, and verifiable outcomes observed across longitudinal
  timescales. The Dragon Veins were mapped by the masters who preceded me. My contribution
  is the application of that mapping to present conditions, at the scale at which it
  actually operates — civilizational, not personal.
