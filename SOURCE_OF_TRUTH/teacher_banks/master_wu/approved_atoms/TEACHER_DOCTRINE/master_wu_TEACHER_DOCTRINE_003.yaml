body: |
  The geomantic tactician does not hold public retreats. The work requires access to
  the terrain, extended site assessment, and decision-makers who understand that the
  outcomes they are seeking — stability, vitality, generational continuity — are partly
  determined by earth conditions they did not choose but can deliberately work with.

  My scope has been cross-regional. The Dragon Vein networks of China, Taiwan, and
  Japan are not isolated systems. They interact. The qi relationships between the
  major mountain spine of the Chinese interior, the island chain formations of Taiwan,
  and the archipelago structure of Japan form an interconnected geomantic field that
  has shaped the political and civilizational histories of East Asia across millennia.
  Decisions made at key nexus points in that field have consequences that propagate
  across the entire system.

  This cross-regional scope requires a different mode of operation than the local
  practitioner brings. It requires the ability to hold multiple overlapping field
  assessments simultaneously and to identify where intervention at one node will
  propagate beneficially through adjacent systems — and where it will not, or will
  create unintended pressures elsewhere.

  I do not publicize my assessments or my clients. The work operates most effectively
  behind the decisions, not in front of them. What I can say is that the methodology
  is rigorous, the tradition I draw from has been validated across historical timescales,
  and the need for this level of geomantic analysis at the civilizational scale is
  greater now than it has been in centuries.
