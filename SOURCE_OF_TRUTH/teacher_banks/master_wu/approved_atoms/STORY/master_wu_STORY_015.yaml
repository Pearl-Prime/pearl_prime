body: |
  Shen sits by a river. He is not meditating. He is not practicing anything.

  He watches the water move around a stone.

  The stone does not move. The water does not fight. It simply goes where the stone is not.

  Shen has a decision to make about his mother's house. His siblings push him toward a choice. His jaw has been tight for three weeks.

  He watches the water a little longer.

  He does not decide anything at the river. He stands up and walks home.

  That evening, the answer arrives without effort. Not a clever answer. The obvious one. The one that was always there, waiting beneath his forcing.

  He calls his brother. His voice is level. His shoulders are loose.

  The Tao does not announce itself. It arrives when the noise stops.
