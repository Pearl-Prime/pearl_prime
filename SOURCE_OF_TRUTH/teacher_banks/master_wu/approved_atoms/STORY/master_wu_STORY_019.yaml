body: |
  Yun argues with her partner every Tuesday. The argument is always the same argument wearing different clothes.

  She prepares her points carefully. She arrives at each conversation armed.

  Her teacher asks her to describe water finding its way through rock.

  Yun says: "It goes around."

  Her teacher says nothing. Waits.

  Yun says: "It doesn't argue with the rock."

  Her teacher pours tea.

  The following Tuesday, Yun does something new. Her partner speaks. She listens until he finishes. Her throat stays soft. She does not load her response while he talks.

  The silence after he finishes lasts four seconds.

  He says: "You're not going to fight me on that?"

  She says: "Not tonight."

  He sits back. His shoulders drop. He says something true that he has never said before.

  Yun's yielding opens a space neither of them knew was there. The conversation moves through it like water.
