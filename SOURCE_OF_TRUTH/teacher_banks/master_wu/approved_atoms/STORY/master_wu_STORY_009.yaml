body: |
  Hong is anxious about conflict. She avoids it entirely. But the avoidance costs her—in boundaries, in authenticity, in her ability to be heard.

  One day, sitting alone, she thinks about yin and yang. Not opposites fighting, but complementary forces in balance.

  The teaching comes to her: *Conflict is not all yin or all yang. Softness and firmness together. Yielding and clarity both present.*

  Hong begins to practice bringing both qualities. She's soft in her manner but clear in her boundaries. Yielding in her flexibility but firm in her values.

  The conflict doesn't disappear, but it becomes navigable. She can be both soft and strong.

  The paradox works. She stops breaking when she stands.
