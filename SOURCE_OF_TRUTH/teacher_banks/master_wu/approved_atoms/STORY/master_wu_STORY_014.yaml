body: |
  Mei runs a small bakery. She arrives at four in the morning. She controls every detail—the temperature, the timing, the shape of each loaf. Her hands move fast and tight.

  Sales drop. She pushes harder. She adds new items. She stays later.

  One afternoon, an old customer watches her knead dough. He says nothing for a long time. Then: "The bread was better before."

  Mei stops. Her hands go still on the counter.

  She asks when. He says: "When you used to hum."

  She does not understand this at first. She goes home and sits with it.

  The next morning she moves more slowly. She does not track the clock. Her shoulders drop two inches.

  The dough responds differently under her hands. Softer. More yielding.

  The bread sells out by noon.

  She did not add skill. She removed force. The Tao moved through the gap she left open.
