body: |
  Early morning. The city is not yet loud. A man I'll call Wen stands at his kitchen window with both hands around a cup he is not drinking from.

  He has been awake since four. The business decision that has to be made by Friday sits somewhere behind his sternum. He has made lists. He has asked three people. He has run the numbers twice.

  The tea cools in his hands. Steam lifts and dissolves. He watches it go without trying to hold it.

  He does not reach a conclusion at the window. He does not receive a sign. But his shoulders drop slightly — the first time they have in two days — and he notices this the way you notice a sound stopping.

  He pours the cold tea out. Makes a second cup. Sits down. The decision is still there. Something in how he is carrying it has changed.
