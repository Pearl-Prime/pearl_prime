body: |
  Wei has a boundary problem. People always ask too much of him, and he always says yes. He doesn't know how to hold a firm boundary. His shoulders carry the weight of their requests.

  One morning, sitting alone, Wei thinks about water and banks. Water doesn't argue with the banks that contain it. It simply finds its level. The bank teaches the water where to be.

  Wei starts to understand something. A boundary isn't a wall to defend. It's just a shape that holds you. Water accepts its container. Water is soft but unmoved.

  He says no to an unreasonable request. It's not aggressive. It's not defensive. It's just where the boundary is. His voice is clear and quiet.

  And surprisingly, people accept it better when there's no force behind it. Just clarity.
