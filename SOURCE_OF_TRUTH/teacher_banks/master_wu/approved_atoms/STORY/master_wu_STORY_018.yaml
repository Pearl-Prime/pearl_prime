body: |
  Rui has built his career on force. Twenty years of pushing, outworking, outmaneuvering.

  At fifty-one, his body stops cooperating. His heart throws an irregular beat. The doctor uses the word "chronic."

  Rui sits in the parking lot after the appointment. His hands grip the steering wheel until his knuckles pale.

  He has fought everything his entire life. There is nothing to fight here.

  He drives to a park. He does not know why. He sits on a bench and stares at the grass.

  A child nearby releases a balloon by accident. The child screams. The balloon rises.

  The child's father kneels down. He says: "Watch where it goes."

  They watch together until it disappears.

  Something in Rui's chest releases its grip.

  He does not become a different man that afternoon. He begins to notice when he is forcing. That noticing is enough to start.

  Yang meets yin at the edge of what cannot be pushed through. This is where the Tao enters.
