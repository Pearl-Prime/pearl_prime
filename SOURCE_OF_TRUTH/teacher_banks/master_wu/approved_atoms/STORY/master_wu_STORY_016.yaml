body: |
  Jian's father is dying. Jian stands at the hospital window and grips the frame.

  He has managed everything—the doctors, the paperwork, the family calls. His neck holds a rigid line. His breath sits high in his chest and does not descend.

  A nurse touches his arm. She says: "You can sit with him now. There is nothing left to manage."

  Jian does not move for a moment.

  Then something in his sternum cracks open. Not breaks—opens.

  He walks into the room. He does not speak. He takes his father's hand and lets the silence be what it is.

  His breath drops into his belly for the first time in days.

  His father opens his eyes once. Closes them again.

  Jian does not try to fill the space. He yields to it. The room holds them both.

  This is not weakness. This is Te—the inherent power that arrives only when force leaves.
