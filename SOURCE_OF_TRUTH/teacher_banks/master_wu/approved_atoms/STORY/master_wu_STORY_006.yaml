body: |
  Min is overwhelmed at work. Too many demands, all urgent. She's been trying to power through, but she's approaching collapse. Her chest is tight. She forgets to eat.

  One evening, sitting in silence at home, a thought comes: *What if you did nothing?*

  She laughs nervously. *Everything would fall apart.*

  But then she wonders: *Or would it find its level, like water?*

  Min takes a radical step: she stops. Works less. Does only what's directly in front of her.

  Some things don't get done. The world doesn't end. And something in the work that remains becomes clearer, easier. Her shoulders drop.

  Wu Wei: less force, more effectiveness.
