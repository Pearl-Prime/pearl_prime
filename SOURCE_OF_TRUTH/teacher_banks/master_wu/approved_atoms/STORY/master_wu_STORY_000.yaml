body: |
  Ling is anxious about a conflict at work. She's been planning her approach for days—what to say, how to control the conversation, how to win. The script is tight in her chest.

  At meditation, her teacher says nothing. Just sits.

  That night, Ling stops planning. She goes to the meeting and just listens. Doesn't force her point. Doesn't defend. Her hands stay open on the table.

  The conversation resolves itself. Not because she was clever, but because she stopped pushing.

  She realizes: the harder she presses, the more resistance. Like pushing water uphill. The moment she stops pushing, the water flows around the obstacle.

  Wu Wei. Not doing nothing. Doing without force.
