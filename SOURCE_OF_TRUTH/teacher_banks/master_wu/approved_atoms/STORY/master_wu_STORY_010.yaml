body: |
  In Taoist teaching, there is the story of the bamboo and the oak.

  The bamboo is supple. When the heavy snow comes, the bamboo bends. The snow slides off. The bamboo straightens. It survives many winters.

  The oak is rigid and strong. When the heavy snow comes, it does not bend. The branches snap. The oak is damaged.

  A student asked which was stronger.

  The master said: "The bamboo dies of old age. The oak dies in the first bad winter."

  Suppleness is strength over time.
