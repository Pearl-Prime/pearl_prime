atom_id: master_wu_STORY_001
story_origin: composite
story_type: character_study
emotional_intensity_band: 3
body: |
  Dao is burned out. He's been trying to push through, force his way through exhaustion by pure willpower. His body is heavy. His eyes close during meetings.

  His Taoist teacher suggests he stop. Not rest in the effortful sense, but yield to what his body is asking.

  Dao stops forcing. He sleeps when tired. He moves slowly. He doesn't try to optimize his recovery. He doesn't journal or meditate. He just stops.

  Something strange happens. By not fighting the exhaustion, he moves through it. Not quickly, but naturally. Like water flowing downhill without resistance. The descent is easy.

  The Tao works through yielding. The soft overcomes the hard. Not by pushing harder, but by giving way.
