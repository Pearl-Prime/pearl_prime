body: |
  Ping teaches children. She prepares elaborate lessons. She fills every minute with instruction.

  The children drift. Their eyes move to the window. Their feet tap under desks.

  Her mentor visits the classroom. He watches. He says nothing during the lesson.

  Afterward he asks: "What happens when you stop?"

  Ping says she cannot stop. There is too much to cover.

  He nods slowly. "The cup is full."

  The next week, Ping leaves ten minutes unplanned. She sits down. She says: "Tell me something."

  A boy in the back speaks for the first time all semester. Then a girl near the window. Then three more.

  Ping's hands rest open on her knees.

  The emptiness she feared becomes the most useful thing in the room.
