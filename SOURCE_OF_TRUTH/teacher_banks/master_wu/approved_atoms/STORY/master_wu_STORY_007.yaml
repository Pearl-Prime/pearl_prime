body: |
  Yu has been trying to become a different person. Someone more confident, more accomplished, more worthy. She reads books. She does affirmations. She works.

  One morning, sitting quietly, a realization comes: *You are trying to be the river when you are already the river. All this effort to become—it's like water trying to be water.*

  The thought stops her. She's been trying to transform. But maybe the transformation isn't the point.

  Yu stops trying to become. She starts paying attention to who she actually is right now.

  Not as a failure. Not as something to fix. Just as something that is.

  The self-worth doesn't arrive through achievement or positive thinking. It arrives through the simple act of not resisting what is already here.

  She sits still for the first time in years.
