body: |
  She is sitting beside a creek in a park she has never stopped in before. She has walked past it for three years. Today her meeting was cancelled and she had forty minutes and nowhere to put them.

  The water moves around a rock without deciding to. It does not pause to consider the obstacle. It does not try harder. It simply continues in the shape available to it.

  Her hands are in her lap. The sound enters without her inviting it. The tightness in her chest has been there since Tuesday — the email she hasn't answered, the conversation she has been building inside her head. She has not moved. The creek keeps going.

  At some point — she cannot say when — the thing she was holding loosens. Not because she let it go. Because she stopped gripping. There is a difference, though she could not explain it.

  She sits for twenty more minutes. The water does not notice. That is, somehow, the point.
