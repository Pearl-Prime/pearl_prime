body: |
  Bao is anxious. There's a situation at work that might go badly. His instinct is to try to control every variable, to anticipate every problem. He makes lists. He loses sleep.

  One night, unable to sleep, he thinks: *If I were water, how would I approach this?*

  Water doesn't anticipate. It doesn't plan. It moves in response to gravity and terrain. It's completely responsive, not predictive.

  Bao tries something radical: he drops his plans. He goes to the meeting prepared, but without a script. Responsive. His hands stop shaking.

  Things go differently than he predicted. But not worse. Different, and manageable.

  The anxiety was the cost of trying to predict the future. Without that burden, he moves more easily through what actually happens.
