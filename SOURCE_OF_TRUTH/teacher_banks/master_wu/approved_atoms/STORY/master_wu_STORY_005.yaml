body: |
  In the Tao Te Ching, there is a paradox about the hard and the soft.

  The stone does not budge. It is strong.

  But the water that has no form cannot be broken. It flows around everything.

  A student built a wall to protect her home. It was strong. It held.

  But the wind found every crack. The rain seeped through. She was always defending.

  She learned the water way. She let some things pass through. She yielded where she could.

  And somehow, less was lost.
