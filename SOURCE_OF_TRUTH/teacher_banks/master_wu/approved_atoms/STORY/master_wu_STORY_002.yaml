body: |
  In the Taoist tradition, there is a story about the usefulness of the empty cup.

  A master poured tea for a student. The cup filled. The master kept pouring. The tea overflowed onto the table.

  The student said: "Stop! The cup is full."

  The master said: "Yes. Your mind is like this cup. Full of what you already know. How can anything new enter?"

  The master stopped pouring. The cup was useless. The student was useless.

  Only when they became empty could they be filled.
