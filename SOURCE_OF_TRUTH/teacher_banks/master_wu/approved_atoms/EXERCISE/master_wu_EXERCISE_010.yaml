atom_id: master_wu_EXERCISE_010
body: |
  Sit and practice the art of non-doing. Don't meditate in the sense of maintaining focus. Just sit.
  
  Let your mind do what it does. Let your body be what it is. Don't manage the experience.
  
  This is radical. Most of us are always doing something—controlling, managing, optimizing.
  
  What happens when you stop? When you let the Tao simply move without your interference?
  
  Twenty minutes of genuine non-doing. Not meditation technique, but the absence of technique.
