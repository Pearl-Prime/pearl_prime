atom_id: master_wu_EXERCISE_011
body: |
  Sit and consider a koan about emptiness and fullness. "The most useful thing is nothing. Nothing is fullness; everything is lack."
  
  Don't try to understand it. Let it work in your mind like yeast in bread. Let it expand.
  
  When the mind tries to solve it, release. Return to sitting with the paradox.
  
  The teaching arrives not through understanding, but through surrender to the question itself.
  
  This is the gateway to Wu Wei—when you stop trying to know and let knowing happen.
  
  Twenty minutes. The emptiness is the fullness.
