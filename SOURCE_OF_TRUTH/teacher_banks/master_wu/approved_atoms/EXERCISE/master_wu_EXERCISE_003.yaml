atom_id: master_wu_EXERCISE_003
body: |
  Do something ordinary—walk, eat, wash your hands—but with complete attention to not-doing.
  
  This means: don't force. Don't optimize. Let the activity unfold at its natural pace.
  
  Walk without trying to walk. Eat without trying to eat. Let the Tao move through the action.
  
  Notice the quality of ease when you're not constantly managing and correcting.
  
  This is Wu Wei in daily life. Effortless action. The body and world in harmony, not at odds.
  
  Twenty minutes, or less. The insight comes from the simplicity.
