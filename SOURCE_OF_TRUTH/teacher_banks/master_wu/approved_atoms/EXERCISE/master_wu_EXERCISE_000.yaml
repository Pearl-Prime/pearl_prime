atom_id: master_wu_EXERCISE_000
body: |
  Sit comfortably. Bring your attention to your breath.
  
  The teaching is this: breathe as though you're not doing anything.
  
  Don't control the breath. Don't make it slower or deeper. Let it be completely natural.
  
  This is Wu Wei in the body. The body already knows how to breathe. You're simply getting out of your own way.
  
  When you notice yourself trying to make the breath something, just release that effort. Let the Tao breathe itself.
  
  Fifteen minutes. The practice is in the releasing, not the achieving.
