atom_id: master_wu_EXERCISE_009
body: |
  When you encounter resistance in your body or mind, practice the water response.
  
  Don't push harder. Don't try to overcome through force. Instead, find the way around.
  
  If there's tension, soften. If there's resistance, yield slightly. If there's a block, find the path of least resistance.
  
  This is a practice in real time. Throughout your day, notice where you're pushing and try flowing instead.
  
  The insight is that the softest approach often creates the most change. Water, not stone.
  
  Notice what shifts when you approach difficulty with yielding rather than force.
