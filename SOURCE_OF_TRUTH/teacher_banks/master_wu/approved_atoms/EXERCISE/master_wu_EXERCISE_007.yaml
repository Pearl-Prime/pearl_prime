atom_id: master_wu_EXERCISE_007
body: |
  This is an emptiness practice. Sit and imagine a cup.
  
  The cup's usefulness is not in the ceramic. It's in the empty space inside. The space that holds what you need.
  
  Now think of yourself as the cup. Your worth is not in what you've achieved or what you contain. It's in the emptiness—the capacity, the space, the potential.
  
  When you stop trying to fill yourself with accomplishment or worth, the emptiness becomes your greatest asset.
  
  Fifteen minutes of resting in that paradox.
