atom_id: master_wu_EXERCISE_005
body: |
  Watch water. A river, a fountain, even a glass of water you disturb.
  
  Notice how water moves. It doesn't fight obstacles. It flows around them. It finds the path of least resistance.
  
  But through this softness, water is relentless. Over time, it wears stone.
  
  Sit with this teaching. In your own life, where are you being hard and getting nowhere? Where might you benefit from the soft power of water?
  
  This is Te—inherent power that works through yielding, not force.
  
  Ten minutes of meditation on water as your teacher.
