atom_id: master_wu_EXERCISE_001
body: |
  Stand or sit. Bring awareness to the places where you're holding tension in your body.
  
  The practice is not to fix the tension, but to soften your relationship to it.
  
  Where you're tight, invite softness. Not through force. Through gentleness. "Can this be a little softer?" Not a command. A question.
  
  Notice what happens when you don't fight the tension. Does it shift? Or does it just become less significant?
  
  This is yielding. Working with the resistance rather than against it.
  
  Ten minutes. The softness comes through acceptance, not through effort.
