atom_id: master_wu_EXERCISE_008
body: |
  Stand or sit and practice the art of minimal movement.
  
  Make one small movement—raise your hand, shift your weight—using only the energy necessary. Nothing more.
  
  This is Wu Wei in the body. Not efficiency exactly, but grace. Doing with the least force.
  
  Notice how it feels different from your usual movement. Less effortful. More natural.
  
  Practice this throughout the day. Small movements done with perfect economy of energy.
  
  The teaching is that force is not the same as power. Power comes through alignment, not effort.
