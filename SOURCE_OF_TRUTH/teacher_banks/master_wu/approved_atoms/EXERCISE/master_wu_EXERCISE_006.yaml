atom_id: master_wu_EXERCISE_006
body: |
  Sit and practice yin-yang awareness. Bring to mind two opposite qualities: softness and firmness, movement and stillness, action and receptivity.
  
  The teaching is not that one is right. Both are necessary. Both create balance.
  
  Where have you been one-sided? Only hard? Only soft? Only active? Only passive?
  
  Invite the opposite quality in. Not as replacement, but as balance. Like adding yin to yang.
  
  The nervous system settles when there's balance. Not pure peace, but dynamic equilibrium.
  
  Fifteen minutes of noticing what balance actually feels like in your body.
