- accent_id: hook_story_anxiety_story_v1_lane07
  accent_class: HOOK_STORY
  body: 'Maya sat in the hustle culture for the third time that week, and for the third time the alarm
    without threat arrived before she did. Not as a thought — as a sensation. A tightening behind the
    sternum that had nothing to do with the LinkedIn in front of her and everything to do with a version
    of safety she''d stopped believing in years ago.

    ---


    In that moment the choice is small and costly: keep performing readiness, or admit the body voted
    first.


    The cost is not drama — it is the quiet spend of staying braced while nothing has happened yet.


    What changes is the object of attention: the alarm becomes information instead of a verdict.


    The next pressure remains unresolved — the scene is not finished, only named.'
