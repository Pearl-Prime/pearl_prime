- accent_id: hook_story_anxiety_story_v2_lane07
  accent_class: HOOK_STORY
  body: 'Jordan told himself the scanning was just how it worked. Everyone nearby seemed to carry it.
    But that Tuesday, when the side hustle landed and his hands went cold before he''d read the first
    line, he understood: the scanning wasn''t shared. It was his. It had always been his. Not shared anxiety
    but your own — the one that arrived before you had words for it.

    ---


