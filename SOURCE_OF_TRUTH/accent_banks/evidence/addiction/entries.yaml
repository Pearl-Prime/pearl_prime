      only willpower.
    citation: "National Institute on Drug Abuse (2023). Medications to Treat Opioid Use Disorder. Bethesda, MD: NIDA."
    year: 2023
    robustness: robust
    topic_keys: [addiction]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "MAT destigmatization — clinical fact."
      zh_TW_zh_CN: "Medication stigma in recovery communities."
      ja_JP: "Medical treatment acceptance varies."
    sensitivity_notes: "Treatment decisions require licensed clinicians — audiobook does not prescribe."
    secular_safe: true
    position_fit: supports TAKEAWAY

