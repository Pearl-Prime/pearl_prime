      alcohol use disorder achieve stable recovery — hope is evidence-based, though
      paths vary.
    citation: "Vaillant GE (1995). The Natural History of Alcoholism Revisited. Cambridge, MA: Harvard University Press."
    year: 1995
    robustness: robust
    topic_keys: [addiction, courage]
    doctrine_keys: []
