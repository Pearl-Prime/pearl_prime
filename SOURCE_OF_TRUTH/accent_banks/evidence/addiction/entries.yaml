entries:
  - evidence_id: add_disease_model_asa_2011
    entry_type: finding
    claim: >
      Major medical bodies classify addiction as a chronic brain disease involving
      reward, motivation, and memory circuits — not a simple moral failure.
    citation: "American Society of Addiction Medicine (2011). Public Policy Statement: Definition of Addiction. Chevy Chase, MD: ASAM."
    year: 2011
    robustness: robust
    topic_keys: [addiction]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Reduce shame — biology plus choice."
      zh_TW_zh_CN: "Addiction stigma intense — medical frame helps."
      ja_JP: "Substance issues highly stigmatized — careful tone."
    sensitivity_notes: "Audiobook is not treatment. Active addiction requires professional help — always flag."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: add_cue_reactivity_relapse_2010
    entry_type: finding
    claim: >
      Triggers — places, people, stress — activate craving through learned brain
      pathways long after stopping. Craving is a brain signal, not proof you have
      failed recovery.
    citation: "Koob GF, Volkow ND (2010). Neurocircuitry of addiction. Neuropsychopharmacology, 35(1), 217-238."
    year: 2010
    robustness: robust
    topic_keys: [addiction, anxiety]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Trigger planning as skill."
      zh_TW_zh_CN: "Social drinking pressure contexts."
      ja_JP: "After-work drinking culture triggers."
    sensitivity_notes: "Recovery content must defer to clinicians and support groups for active addiction."
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: add_social_support_recovery_2020
    entry_type: finding
    claim: >
      Mutual-aid groups and social support predict better long-term recovery outcomes
      in alcohol and drug use disorder research — connection is medicine.
    citation: "Kelly JF, Humphreys K, Ferri M (2020). Alcoholics Anonymous and other 12-step programs for alcohol use disorder. Cochrane Database of Systematic Reviews."
    year: 2020
    robustness: robust
    topic_keys: [addiction, loneliness]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "AA not only path — but support robust."
      zh_TW_zh_CN: "Family shame may block groups — name barrier."
      ja_JP: "Anonymous support culturally sensitive."
    sensitivity_notes: "Do not position self-help audiobook as substitute for treatment programs."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: add_stigma_delays_treatment_2023
    entry_type: finding
    claim: >
      Shame and stigma are among the top reasons people delay seeking addiction
      treatment in national surveys — silence worsens outcomes.
    citation: "Substance Abuse and Mental Health Services Administration (2023). National Survey on Drug Use and Health. Rockville, MD: SAMHSA."
    year: 2023
    robustness: robust
    topic_keys: [addiction, shame]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Name stigma as barrier."
      zh_TW_zh_CN: "Family face blocks help-seeking."
      ja_JP: "Secrecy prolongs struggle."
    sensitivity_notes: "Encourage professional and peer support without diagnosing reader."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: add_case_matthew_perry_recovery_2022
    entry_type: documented_case
    claim: >
      Matthew Perry's published memoir documented decades of addiction, relapse, and
      treatment cycles alongside career success — external achievement did not protect
      him from substance struggle.
    citation: "Perry M (2022). Friends, Lovers, and the Big Terrible Thing. New York: Flatiron Books."
    year: 2022
    robustness: robust
    topic_keys: [addiction]
    doctrine_keys: []
    case_attribution: "Matthew Perry — published memoir (2022)"
    locale_framing_notes:
      en_EU: "Celebrity recognition — scale to ordinary lives."
      zh_TW_zh_CN: "Public success private addiction archetype."
      ja_JP: "High-functioning addiction pattern."
    sensitivity_notes: "Respectful framing; trigger for active users; professional help pointer."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: add_behavioral_addiction_internet_2010
    entry_type: finding
    claim: >
      Problematic internet and phone use shows craving, tolerance, and withdrawal-like
      symptoms in growing research — behavioral addictions share patterns with
      substance disorders.
    citation: "Grant JE, Potenza MN, Weinstein A, Gorelick DA (2010). Introduction to behavioral addictions. American Journal of Drug and Alcohol Abuse, 36(5), 233-241."
    year: 2010
    robustness: mixed
    caveat: "Behavioral addiction taxonomy debated in DSM; patterns robust, clinical category evolving."
    topic_keys: [addiction, anxiety]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Phone/social scroll compulsion."
      zh_TW_zh_CN: "Gaming / short-video compulsion."
      ja_JP: "Mobile game compulsion patterns."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: add_stress_relapse_marlatt_1985
    entry_type: finding
    claim: >
      Stress and negative emotion are among the strongest relapse triggers in the
      Marlatt relapse-prevention model — supported across substance use research.
    citation: "Marlatt GA, Gordon JR (1985). Relapse Prevention. New York: Guilford Press."
    year: 1985
    robustness: robust
    topic_keys: [addiction, burnout]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Stress plan before crisis."
      zh_TW_zh_CN: "Work stress plus social drinking."
      ja_JP: "Overtime stress plus drinking culture."
    sensitivity_notes: "Relapse is common in recovery — not moral failure; seek support."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: add_family_enabling_2005
    entry_type: finding
    claim: >
      Family systems research describes enabling — shielding someone from consequences
      — as prolonging addiction, though usually born from love and fear.
    citation: "Brown S, Lewis V, Li A (2005). The family recovery process. In White WL, Kurtz E (Eds.), Addiction and Recovery in America. Washington, DC: NASW Press."
    year: 2005
    robustness: robust
    topic_keys: [addiction, boundaries, compassion_fatigue]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Codependency awareness without blame."
      zh_TW_zh_CN: "Family covering for addict."
      ja_JP: "Family shame enabling secrecy."
    sensitivity_notes: "Family members of addicts may need Al-Anon or professional support."
    secular_safe: true
    position_fit: supports PIVOT

