      zh_TW_zh_CN: "First day at prestigious employer — universalizable."
      ja_JP: "Large-company onboarding anxiety."
    sensitivity_notes: "Controversial figure in some markets — use account not brand endorsement."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: imp_mentorship_reduces_imposter_2015
    entry_type: finding
    claim: >
      Access to mentors and normalized stories of struggle from senior colleagues
      reduces imposter feelings in longitudinal student and early-career samples —
      belonging cues update the threat model.
    citation: "Hutchins HM, Rainbolt P (2016). What triggers impostor phenomenon among academic faculty? A critical incident study exploring antecedents, coping, and development opportunities. Human Resource Development International, 19(5), 468-488."
    year: 2016
    robustness: mixed
    caveat: "Mostly academic/professional samples; effect sizes vary."
    topic_keys: [imposter_syndrome]
    doctrine_keys: ["COMPOSITE_DOCTRINE v10"]
    locale_framing_notes:
      en_EU: "Mentorship/sponsorship framing."
      zh_TW_zh_CN: "Senior colleague (laoshi/xuezhang) guidance culturally resonant."
      ja_JP: "Senpai normalization of early struggle."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: imp_objective_performance_does_not_cure_2019
    entry_type: finding
    claim: >
      Meta-analytic work finds only weak correlations between imposter feelings and
      actual job performance — feeling like a fraud and performing well are
      compatible states, not opposites.
    citation: "Bravata DM, et al. (2020). Prevalence, predictors, and treatment of impostor syndrome: A systematic review. Journal of General Internal Medicine, 35(4), 1252-1275."
    year: 2020
    robustness: mixed
    caveat: "Imposter measures vary; performance metrics domain-specific."
    topic_keys: [imposter_syndrome]
    doctrine_keys: ["COMPOSITE_DOCTRINE v14"]
    locale_framing_notes:
      en_EU: "Decouples feeling from competence — core pivot beat."
      zh_TW_zh_CN: "Exam scores vs ongoing fraud feeling — education parallel."
      ja_JP: "Credential obtained but still unqualified feeling."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: imp_self_compassion_intervention_2019
    entry_type: finding
    claim: >
      Interventions teaching self-compassion — especially normalizing struggle —
      reduce imposter feelings more than generic self-esteem boosts in several
      controlled trials with students and professionals.
    citation: "Patzak A, et al. (2017). Is the impostor phenomenon related to self-compassion? Journal of Individual Differences, 38(4), 247-253."
    year: 2017
    robustness: robust
    topic_keys: [imposter_syndrome, self_worth]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    locale_framing_notes:
      en_EU: "Self-compassion as skill — ties to come-home doctrine."
      zh_TW_zh_CN: "Indirect self-kindness framing preferred."
      ja_JP: "Avoid boastful self-affirmation tone."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY
