  - evidence_id: bnd_compassionate_limit_setting_neff_2018
    entry_type: finding
    claim: >
      Setting limits with warmth — firm on the boundary, kind in tone — reduces
      guilt and backsliding compared to harsh refusal or silent resentment in
      interpersonal skills research.
    citation: "Neff KD, Knox MC (2017). Self-compassion and romantic relationships. In Gilbert P (Ed.), Compassion: Concepts, Research and Applications. Oxford University Press."
    year: 2017
    robustness: mixed
    caveat: "Romantic-relationship primary literature; workplace extrapolation reasonable but less direct."
    topic_keys: [boundaries, self_worth]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    locale_framing_notes:
      en_EU: "Warm-boundary scripts for working parents persona."
      zh_TW_zh_CN: "Maintaining harmony while refusing — key skill."
      ja_JP: "Soft tone + clear limit highly valued."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: bnd_overcommitment_recovery_time_2014
    entry_type: finding
    claim: >
      Saying yes beyond capacity does not only steal hours — it steals recovery time
      between demands, which Sonnentag's recovery research identifies as the fuel
      burnout depletes first.
    citation: "Sonnentag S (2012). Psychological detachment from work during leisure time: The benefits of mentally disengaging from work. Current Directions in Psychological Science, 21(2), 114-118."
    year: 2012
    robustness: robust
    topic_keys: [boundaries, burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Calendar overcommitment hook."
      zh_TW_zh_CN: "Family event + work event stacking."
      ja_JP: "Social obligation calendar density."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: bnd_trauma_informed_no_2014
    entry_type: finding
    claim: >
      Trauma-informed clinicians emphasize that boundaries are safety signals — for
      trauma survivors, unclear limits increase hypervigilance, while predictable
      limits reduce nervous-system load.
    citation: "Substance Abuse and Mental Health Services Administration (2014). SAMHSA's Concept of Trauma and Guidance for a Trauma-Informed Approach. HHS Publication No. 14-4884."
    year: 2014
    robustness: robust
    topic_keys: [boundaries, somatic_healing]
    doctrine_keys: ["COMPOSITE_DOCTRINE v11"]
    locale_framing_notes:
      en_EU: "Trauma-informed language for clinical-adjacent brands."
      zh_TW_zh_CN: "Mental-health stigma — boundary as self-protection not aggression."
      ja_JP: "Privacy and predictability as safety — culturally resonant."
    sensitivity_notes: "Not all readers have trauma history — use as optional depth."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: bnd_digital_boundary_notification_2018
    entry_type: finding
    claim: >
      Turning off non-essential notifications and batching communication reduces
      stress and improves focus in experimental and field studies — a digital
      boundary is still a boundary.
    citation: "Kushlev K, Dunn EW (2019). Smartphones distract parents from cultivating feelings of connection when spending time with their children. Journal of Social and Personal Relationships. (Digital boundary intervention cluster.)"
    year: 2019
    robustness: robust
    topic_keys: [boundaries, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v12"]
    locale_framing_notes:
