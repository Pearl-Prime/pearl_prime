  - evidence_id: fstr_present_bias_spending_2002
    entry_type: finding
    claim: >
      People overweight immediate spending pleasure versus future security — present
      bias — which predictably strains budgets without moral failure.
    citation: "O'Donoghue T, Rabin M (1999). Doing it now or later. American Economic Review, 89(1), 103-124."
    year: 1999
