      Irregular paychecks — gig work, commissions, seasonal work — increase financial
      anxiety and planning difficulty beyond average income level.
    citation: "Farrell D, Grieg AE (2016). Paychecks, Paydays, and the Online Platform Economy. JPMorgan Chase Institute."
    year: 2016
