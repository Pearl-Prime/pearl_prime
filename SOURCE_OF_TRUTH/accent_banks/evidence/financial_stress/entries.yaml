  - evidence_id: fstr_case_dave_ramsey_debt_free_scream_2000
    entry_type: documented_case
    claim: >
      Published debt-free journey accounts (e.g., Ramsey's documented listener cases)
      describe shame and marriage strain during debt — and relief when structured
      payoff plans complete. Pattern: stress tracks debt load, not intelligence.
    citation: "Ramsey D (2003). Financial Peace Revisited. New York: Viking. (Documented case stories from program.)"
    year: 2003
    robustness: robust
    topic_keys: [financial_stress, financial_anxiety]
