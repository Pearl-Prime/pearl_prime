  - evidence_id: fstr_scarcity_bandwidth_mullainathan_2013
    entry_type: finding
    claim: >
      Financial pressure consumes mental bandwidth — leaving less capacity for planning,
      patience, and problem-solving. Feeling scattered about money can be scarcity,
      not stupidity.
    citation: "Mani A, Mullainathan S, Shafir E, Zhao J (2013). Poverty impedes cognitive function. Science, 341(6149), 976-980."
    year: 2013
    robustness: robust
    topic_keys: [financial_stress, financial_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Overlaps financial_anxiety bank — stress register."
      zh_TW_zh_CN: "Housing cost cognitive load."
      ja_JP: "Living-cost stress."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: fstr_money_fights_divorce_predictor_2009
    entry_type: finding
    claim: >
      Couples who report frequent money conflict are more likely to divorce in
      longitudinal studies — financial stress is relational, not only mathematical.
    citation: "Dew J (2008). Debt change and marital satisfaction change in recently married couples. Family Relations, 57(1), 60-71."
    year: 2008
    robustness: robust
    topic_keys: [financial_stress, divorce, relationship_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    locale_framing_notes:
      en_EU: "Money as relationship stressor."
      zh_TW_zh_CN: "Family financial secrecy shame."
      ja_JP: "Household budget conflict."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: fstr_paycheck_to_paycheck_fed_2023
    entry_type: finding
    claim: >
      Large national surveys find many middle-income households could not cover a
      modest emergency from savings alone — liquidity stress is structural for millions.
    citation: "Federal Reserve Board (2023). Report on the Economic Well-Being of U.S. Households. Washington, DC."
    year: 2023
    robustness: robust
    topic_keys: [financial_stress, financial_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    locale_framing_notes:
      en_EU: "US data — localize for EU editions."
      zh_TW_zh_CN: "Middle-class squeeze recognition."
      ja_JP: "Savings anxiety despite employment."
    sensitivity_notes: "Not financial advice — descriptive only."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: fstr_stress_cortisol_debt_2013
    entry_type: finding
    claim: >
      Chronic debt worry elevates stress hormones in some studies — money anxiety
      is physiological, not just mental accounting.
    citation: "Sweet E, Nandi A, Adam EK, McDade TW (2013). The high price of debt: Household financial debt and depressive symptoms in U.S. adults. Journal of Family and Economic Issues, 34(4), 445-454."
    year: 2013
    robustness: robust
    topic_keys: [financial_stress, somatic_healing]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Body feels debt before spreadsheet."
      zh_TW_zh_CN: "Loan shame somaticized."
      ja_JP: "Debt stress physical symptoms."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: fstr_financial_literacy_not_enough_2013
    entry_type: finding
    claim: >
      Financial literacy alone does not eliminate stress when income is insufficient
      — knowledge helps but cannot budget away structural shortfall.
    citation: "Willis LE (2011). The financial education fallacy. American Economic Review, 101(3), 429-434."
    year: 2011
