  - evidence_id: ovt_scheduled_worry_time_borkovec_1983
    entry_type: finding
    claim: >
      Containing worry to a fixed daily window — scheduled worry time — reduces total
      worry hours in controlled trials for generalized anxiety.
    citation: "Borkovec TD, Wilkinson L, Folensbee R, Lerman C (1983). Stimulus control applications to the treatment of worry. Behaviour Research and Therapy, 21(3), 247-251."
    year: 1983
    robustness: robust
