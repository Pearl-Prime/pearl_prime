  - evidence_id: ovt_sleep_loss_rumination_2018
    entry_type: finding
    claim: >
      Sleep deprivation increases repetitive negative thinking the next day — the
      2 a.m. loop is harder to exit when the brain is under-rested.
    citation: "Nota JA, Coles ME (2018). Shorter sleep duration and longer sleep onset latency are related to difficulty disengaging attention from negative emotional images in individuals with elevated transdiagnostic repetitive negative thinking. Journal of Behavior Therapy and Experimental Psychiatry, 58, 114-122."
    year: 2018
    robustness: robust
    topic_keys: [overthinking, sleep_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v09"]
    locale_framing_notes:
