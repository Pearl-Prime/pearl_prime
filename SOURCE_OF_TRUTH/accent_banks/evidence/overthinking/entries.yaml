  - evidence_id: ovt_case_churchill_black_dog_1911
    entry_type: documented_case
    claim: >
      Winston Churchill's published writings described recurring 'black dog' depressions
      alongside wartime leadership — documenting that relentless mental activity and
      heavy mood can coexist in high-functioning lives.
    citation: "Churchill W (1930). A Roving Commission: My Early Life. London: Thornton Butterworth. (Black dog references in correspondence and later biographical collections, e.g., Gilbert M (1991).)"
    year: 1930
    robustness: robust
    topic_keys: [overthinking, depression]
    doctrine_keys: ["COMPOSITE_DOCTRINE v14"]
    case_attribution: "Winston Churchill — published autobiographical and biographical record"
    locale_framing_notes:
