      of uncertainty predicts worry and OCD-spectrum loops across studies.
    citation: "Dugas MJ, Gagnon F, Ladouceur R, Freeston MH (1998). Generalized anxiety disorder: A preliminary test of a conceptual model. Behaviour Research and Therapy, 36(2), 215-226."
    year: 1998
    robustness: robust
