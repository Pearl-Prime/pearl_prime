      with catastrophic stories in acceptance-based therapy trials.
    citation: "Hayes SC, Strosahl KD, Wilson KG (2012). Acceptance and Commitment Therapy: The Process and Practice of Mindful Change, 2nd ed. New York: Guilford Press."
    year: 2012
    robustness: robust
