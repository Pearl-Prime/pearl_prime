  - evidence_id: ovt_rumination_unanswerable_questions_1991
    entry_type: finding
    claim: >
      The mind often loops on questions that thought cannot answer — what they meant,
      what will happen, whether you chose right. Research on rumination shows these
      loops rarely produce new information, only more distress.
    citation: "Nolen-Hoeksema S (1991). Responses to depression and their effects on the duration of depressive episodes. Journal of Abnormal Psychology, 100(4), 569-582."
    year: 1991
    robustness: robust
    topic_keys: [overthinking, anxiety, depression]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Doctrine v01 — loop asks unanswerable question."
      zh_TW_zh_CN: "Family future-planning worry overlap."
      ja_JP: "Workplace mistake replay loops."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: ovt_perfectionism_frost_1990
    entry_type: finding
    claim: >
      Perfectionism — setting flawless standards and harsh self-criticism when they
      are missed — predicts anxiety and overthinking more reliably than high standards
      alone.
    citation: "Frost RO, Marten P, Lahart C, Rosenblate R (1990). The dimensions of perfectionism. Cognitive Therapy and Research, 14(5), 449-468."
    year: 1990
    robustness: robust
    topic_keys: [overthinking, perfectionism, imposter_syndrome]
    doctrine_keys: ["COMPOSITE_DOCTRINE v08"]
    locale_framing_notes:
      en_EU: "Perfectionism as overthinking driver — user-requested topic key."
      zh_TW_zh_CN: "Exam/credential perfectionism."
      ja_JP: "Mistake-averse workplace culture."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: ovt_worry_vs_problem_solving_borkovec_1985
    entry_type: finding
    claim: >
      Worry mimics problem-solving but usually skips action — it rehearses catastrophe
      without narrowing options. Distinguishing the two helps you exit the loop.
    citation: "Borkovec TD, Robinson E, Pruzinsky T, DePree JA (1983). Preliminary exploration of worry: Some characteristics and processes. Behaviour Research and Therapy, 21(1), 9-16."
    year: 1983
    robustness: robust
    topic_keys: [overthinking, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    locale_framing_notes:
      en_EU: "Is this worry or a solvable problem?"
      zh_TW_zh_CN: "Practical family problem-solving vs midnight rumination."
      ja_JP: "Process improvement vs anxious rehearsal."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: ovt_somatic_anchoring_present_moment_2011
    entry_type: finding
    claim: >
      Brief attention to bodily sensation — feet on floor, hands on chair — interrupts
      abstract mental time-travel in experimental studies of mindfulness and grounding.
    citation: "Hofmann SG, Sawyer AT, Witt AA, Oh D (2010). The effect of mindfulness-based therapy on anxiety and depression: A meta-analytic review. Journal of Consulting and Clinical Psychology, 78(2), 169-183."
    year: 2010
    robustness: mixed
    caveat: "MBT meta-analysis — grounding is one component; effect sizes modest vs active controls."
    topic_keys: [overthinking, somatic_healing]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    locale_framing_notes:
      en_EU: "Body returns while mind travels — doctrine v02."
      zh_TW_zh_CN: "Somatic focus culturally acceptable."
      ja_JP: "Brief grounding before meetings."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: ovt_decision_fatigue_baumeister_2011
    entry_type: finding
    claim: >
      Making many decisions depletes the quality of later choices in lab studies —
      overthinking every small decision burns the same cognitive fuel big ones need.
    citation: "Baumeister RF, Tierney J (2011). Willpower: Rediscovering the Greatest Human Strength. New York: Penguin. (Synthesizes decision fatigue studies; ego-depletion replication mixed — decision quality decline more robust.)"
    year: 2011
    robustness: mixed
    caveat: "Ego-depletion model weakened; decision fatigue and choice overload have stronger replication than global willpower tank."
    topic_keys: [overthinking, burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v09"]
    locale_framing_notes:
      en_EU: "Automate small choices to protect deep thinking."
      zh_TW_zh_CN: "Decision overload in caregiving + work."
      ja_JP: "Reduce micro-decisions after long workdays."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: ovt_intolerance_uncertainty_dugas_1998
