  - evidence_id: slp_mindfulness_insomnia_2016
    entry_type: finding
    claim: >
      Mindfulness-based programs show modest improvements in sleep quality for people
      with insomnia in randomized trials — especially when rumination drives wakefulness.
    citation: "Black DS, O'Reilly GA, Olmstead R, Breen EC, Irwin MR (2015). Mindfulness meditation and improvement in sleep quality and daytime impairment among older adults with sleep disturbances. JAMA Internal Medicine, 175(4), 494-501."
    year: 2015
    robustness: mixed
    caveat: "Modest effects; older-adult sample in landmark trial; replication in younger adults ongoing."
