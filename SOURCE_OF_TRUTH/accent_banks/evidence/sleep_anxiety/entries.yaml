  - evidence_id: slp_case_van_gogh_sleep_letters_1888
    entry_type: documented_case
    claim: >
      Vincent van Gogh's published letters describe tormented, irregular sleep and
      racing thoughts at night alongside intense creative output — a historical record
      of insomnia and mental strain coexisting.
    citation: "Van Gogh V (1888). Letters to Theo van Gogh. Documented in Jansen H, Luijten H, Bakker N (2009). Vincent van Gogh: The Letters. Amsterdam: Van Gogh Museum."
    year: 1888
    robustness: robust
    topic_keys: [sleep_anxiety, depression]
    doctrine_keys: ["COMPOSITE_DOCTRINE v14"]
    case_attribution: "Vincent van Gogh — published correspondence"
    locale_framing_notes:
