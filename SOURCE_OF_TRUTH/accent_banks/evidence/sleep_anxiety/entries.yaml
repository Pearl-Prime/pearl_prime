  - evidence_id: slp_temperature_sleep_onset_2008
    entry_type: finding
    claim: >
      A slight drop in core body temperature signals sleep onset — cool, dark rooms
      and warm baths before bed leverage this physiology.
    citation: "Okamoto-Mizuno K, Mizuno K (2012). Effects of thermal environment on sleep and circadian rhythm. Journal of Physiological Anthropology, 31(1), 14."
    year: 2012
    robustness: robust
    topic_keys: [sleep_anxiety, somatic_healing]
