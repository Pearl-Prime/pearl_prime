  - evidence_id: slp_insomnia_prevalence_nimh_2023
    entry_type: finding
    claim: >
      Roughly one in three adults reports insomnia symptoms — trouble falling asleep,
      staying asleep, or waking unrefreshed. Sleep struggle is common, not a personal
      failure.
    citation: "National Institute of Mental Health (2023). Statistics: Insomnia. Bethesda, MD: NIMH."
    year: 2023
    robustness: robust
    topic_keys: [sleep_anxiety, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Normalize without diagnosing every bad night."
      zh_TW_zh_CN: "Sleep pressure in student/work cohorts."
      ja_JP: "Sleep shortage culturally normalized — validate harm."
    sensitivity_notes: "Chronic insomnia lasting months warrants clinical evaluation."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: slp_cbt_i_first_line_2015
    entry_type: finding
    claim: >
      Cognitive behavioral therapy for insomnia (CBT-I) is the first-line treatment
      in major clinical guidelines — often more durable than sleeping pills for chronic
      insomnia.
    citation: "Edinger JD, Arnedt JT, Bertisch SM, et al. (2021). Behavioral and psychological treatments for chronic insomnia disorder in adults: An American Academy of Sleep Medicine clinical practice guideline. Journal of Clinical Sleep Medicine, 17(2), 255-262."
    year: 2021
    robustness: robust
    topic_keys: [sleep_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Skills-based sleep work — not pill-first messaging."
      zh_TW_zh_CN: "Medication stigma inverse — CBT-I less known; introduce gently."
      ja_JP: "Behavioral sleep hygiene before supplements."
    sensitivity_notes: "Audiobook teaches principles, not CBT-I protocol. Persistent insomnia — seek sleep specialist."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: slp_sleep_effort_paradox_1987
    entry_type: finding
    claim: >
      Trying hard to fall asleep often keeps you awake — sleep effort triggers arousal.
      The body sleeps when pursuit relaxes, not when it intensifies.
    citation: "Espie CA, Broomfield NM, MacMahon KM, Macphee LM, Taylor LM (2006). The attention-intention-effort pathway in the development of psychophysiologic insomnia: A theoretical review. Sleep Medicine Reviews, 10(4), 215-245."
    year: 2006
    robustness: robust
    topic_keys: [sleep_anxiety, overthinking]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    locale_framing_notes:
      en_EU: "Performance anxiety about sleep — core hook."
      zh_TW_zh_CN: "Exam-eve sleep effort trap."
      ja_JP: "Must-sleep-before-big-day pressure."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: slp_cognitive_arousal_harvey_2002
    entry_type: finding
    claim: >
      Sleep-anxious minds treat the bed as a thinking place — planning, worrying,
      rehearsing — which conditions wakefulness in the bedroom.
    citation: "Harvey CJ (2002). A cognitive model of insomnia. Behaviour Research and Therapy, 40(8), 869-893."
    year: 2002
    robustness: robust
    topic_keys: [sleep_anxiety, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v08"]
    locale_framing_notes:
      en_EU: "Bed-as-office habit."
      zh_TW_zh_CN: "Phone in bed — WeChat scrolling."
      ja_JP: "Late-night work messaging in bed."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: slp_screen_blue_light_circadian_2019
    entry_type: finding
    claim: >
      Evening bright light — especially screens held close — delays melatonin and
      shifts circadian timing, making sleep onset harder.
    citation: "Hale L, Guan S (2015). Screen time and sleep among school-aged children and adolescents: A systematic literature review. Sleep Medicine Reviews, 21, 50-58."
    year: 2015
    robustness: robust
    topic_keys: [sleep_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v12"]
    locale_framing_notes:
      en_EU: "Screen curfew as practical step."
      zh_TW_zh_CN: "Family shared room — screen habits complex."
      ja_JP: "Commute phone use until bedtime."
    sensitivity_notes: "Effect size modest for adults; still useful behavioral lever."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: slp_sleep_debt_anxiety_spiral_2020
    entry_type: finding
    claim: >
      Poor sleep raises next-day anxiety; higher anxiety disrupts the following night —
      a bidirectional spiral documented in experimental sleep-restriction studies.
    citation: "Ben Simon E, Rossi A, Harvey AG, Walker MP (2020). Overanxious and underslept. Nature Human Behaviour, 4, 100-110."
    year: 2020
    robustness: robust
    topic_keys: [sleep_anxiety, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v10"]
    locale_framing_notes:
      en_EU: "Break spiral at either lever."
      zh_TW_zh_CN: "Parenting sleep debt + worry."
      ja_JP: "Workweek sleep compression."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: slp_stimulus_control_spielman_1987
    entry_type: finding
    claim: >
      Using the bed only for sleep (and intimacy) retrains the brain to associate
      it with rest — a core CBT-I technique with strong trial support.
    citation: "Spielman AJ, Yang CM, Glovinsky PB (2011). Sleep restriction and compression. In Perlis ML, Aloia MS, Kuhn BR (Eds.), Behavioral Treatments for Sleep Disorders. Academic Press."
    year: 2011
    robustness: robust
    topic_keys: [sleep_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Get up if awake 20+ minutes — actionable."
      zh_TW_zh_CN: "Small apartments — bed multi-use; adapt realistically."
      ja_JP: "Studio apartment constraints — compassionate adaptation."
    sensitivity_notes: null
    secular_safe: true
