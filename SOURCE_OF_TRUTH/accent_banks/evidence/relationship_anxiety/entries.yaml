  - evidence_id: rel_attachment_anxiety_bowlby_1988
    entry_type: finding
    claim: >
      Some people carry chronic worry about abandonment or rejection in close
      relationships — attachment anxiety — that predates the current partner and
      amplifies ordinary conflicts.
    citation: "Bowlby J (1988). A Secure Base. New York: Basic Books."
    year: 1988
    robustness: robust
    topic_keys: [relationship_anxiety, anxiety]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Pattern predates this relationship."
      zh_TW_zh_CN: "Family attachment legacy."
      ja_JP: "Fear of being burdensome."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: rel_protest_behavior_hazan_1987
    entry_type: finding
    claim: >
      Anxious attachment often shows 'protest behaviors' — texting repeatedly, seeking
      reassurance, picking fights to test closeness — which push partners away.
    citation: "Hazan C, Shaver P (1987). Romantic love conceptualized as an attachment process. Journal of Personality and Social Psychology, 52(3), 511-524."
    year: 1987
    robustness: robust
    topic_keys: [relationship_anxiety]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Reassurance loop naming."
      zh_TW_zh_CN: "WeChat message checking."
      ja_JP: "Read-receipt anxiety."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: rel_loneliness_in_marriage_2018
    entry_type: finding
    claim: >
      Loneliness can occur inside marriage when partners feel unseen — emotional
      disconnection predicts distress beyond relationship status alone.
    citation: "Cacioppo JT, Patrick W (2008). Loneliness: Human Nature and the Need for Social Connection. New York: Norton."
    year: 2008
    robustness: robust
    topic_keys: [relationship_anxiety, loneliness]
