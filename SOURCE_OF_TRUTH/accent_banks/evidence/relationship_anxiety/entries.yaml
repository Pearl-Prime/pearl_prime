  - evidence_id: rel_anxious_avoidant_trap_1987
    entry_type: finding
    claim: >
      Anxious-anxious or anxious-avoidant pairings often create pursue-withdraw
      cycles that intensify both partners' fears — the dance is relational, not
      one person's flaw.
    citation: "Hazan C, Shaver P (1987). Romantic love conceptualized as an attachment process. Journal of Personality and Social Psychology, 52(3), 511-524."
    year: 1987
    robustness: robust
    topic_keys: [relationship_anxiety]
    doctrine_keys: []
    locale_framing_notes:
