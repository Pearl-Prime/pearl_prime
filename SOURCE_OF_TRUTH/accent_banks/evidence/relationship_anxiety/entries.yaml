  - evidence_id: rel_conflict_anxiety_physiology_2016
    entry_type: finding
    claim: >
      Relationship conflict elevates heart rate and stress hormones even in mild
      disagreements — the body treats relational threat like physical threat.
    citation: "Kiecolt-Glaser JK, Wilson SJ (2017). Lovesick: How couples' relationships influence health. Annual Review of Clinical Psychology, 13, 421-443."
    year: 2017
    robustness: robust
    topic_keys: [relationship_anxiety, somatic_healing]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Pause during physiological flooding."
      zh_TW_zh_CN: "Cool-down before continuing argument."
      ja_JP: "Exit conflict when body spikes."
    sensitivity_notes: "Domestic violence contexts need safety planning — not generic conflict tips."
    secular_safe: true
    position_fit: supports PIVOT

