  - evidence_id: rel_gottman_four_horsemen_1994
    entry_type: finding
    claim: >
      Relationship researchers identified criticism, contempt, defensiveness, and
      stonewalling as patterns that predict breakup — anxiety often fuels the first
      three when unchecked.
    citation: "Gottman JM (1994). What Predicts Divorce? Hillsdale, NJ: Erlbaum."
    year: 1994
    robustness: robust
    topic_keys: [relationship_anxiety, boundaries]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Name patterns not partners."
      zh_TW_zh_CN: "Indirect conflict styles — adapt examples."
      ja_JP: "Stonewalling in conflict-avoidant pairs."
    sensitivity_notes: "Not couple therapy — patterns awareness only."
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: rel_reassurance_backfire_2012
    entry_type: finding
    claim: >
      Excessive reassurance-seeking can temporarily calm relationship anxiety but
      maintains it long-term — partners cannot provide enough proof to satisfy doubt.
    citation: "Mikulincer M, Shaver PR (2007). Attachment in Adulthood: Structure, Dynamics, and Change. Guilford Press."
    year: 2007
    robustness: robust
    topic_keys: [relationship_anxiety, overthinking]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Ask once vs ask six times."
      zh_TW_zh_CN: "Partner reassurance addiction."
      ja_JP: "Repeated confirmation seeking."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: rel_case_mister_rogers_neighborhood_1968
    entry_type: documented_case
    claim: >
      Fred Rogers's published interviews described lifelong sensitivity to rejection
      and deliberate practice of making others feel seen — documenting that relational
      warmth can be built, not only inherited.
    citation: "Rogers F, Sharapan B (2000). The World According to Mister Rogers. New York: Hyperion."
    year: 2000
    robustness: robust
    topic_keys: [relationship_anxiety, loneliness]
    doctrine_keys: []
