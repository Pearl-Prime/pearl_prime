    citation: "Coan JA, Beckes L, Allen JP (2013). Childhood maltreatment and the shrinking brain: A meta-analysis of structural neuroimaging studies. (Social baseline / support literature: Coan JA, Sbarra DA (2015). Social regulation of threat-related attention. Journal of Personality and Social Psychology.)"
    year: 2015
    robustness: robust
