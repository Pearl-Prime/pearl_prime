    claim: >
      Approaching feared situations in small steps — graduated exposure — is one
      of the oldest and best-supported methods for building courage with fear.
    citation: "Wolpe J (1958). Psychotherapy by Reciprocal Inhibition. Stanford University Press."
    year: 1958
    robustness: robust
    topic_keys: [courage, anxiety, social_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v10"]
