  - evidence_id: cou_post_traumatic_growth_tedeschi_1996
    entry_type: finding
    claim: >
      Some people report increased meaning, relationships, or strength after major
      adversity — post-traumatic growth — though this is not universal or required.
    citation: "Tedeschi RG, Calhoun LG (1996). The Posttraumatic Growth Inventory: Measuring the positive legacy of trauma. Journal of Traumatic Stress, 9(3), 455-471."
    year: 1996
    robustness: robust
    topic_keys: [courage, grief]
    doctrine_keys: ["COMPOSITE_DOCTRINE v12"]
    locale_framing_notes:
      en_EU: "Never require silver linings."
      zh_TW_zh_CN: "Avoid pressure to grow from pain."
      ja_JP: "Quiet strength without glorifying suffering."
    sensitivity_notes: "PTG must not invalidate ongoing pain or replace grief work."
    secular_safe: true
