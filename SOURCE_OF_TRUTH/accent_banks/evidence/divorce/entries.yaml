    claim: >
      Contempt between spouses — eye-rolling, mockery, disgust — predicts divorce
      more strongly than how often couples fight.
    citation: "Gottman JM, Levenson RW (1992). Marital processes predictive of later dissolution. Journal of Personality and Social Psychology, 63(2), 221-233."
    year: 1992
    robustness: robust
    topic_keys: [divorce, relationship_anxiety]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Pattern recognition not blame assignment."
      zh_TW_zh_CN: "Indirect contempt in conflict-avoidant cultures."
      ja_JP: "Silent contempt and withdrawal."
    sensitivity_notes: "Not couples therapy — awareness only."
    secular_safe: true
    position_fit: supports PIVOT

