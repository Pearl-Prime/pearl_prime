  - evidence_id: div_children_adjustment_meta_2011
    entry_type: finding
    claim: >
      Most children adjust after divorce when conflict decreases and co-parenting
      stays stable — ongoing parental warfare harms more than separation itself in
      meta-analyses.
    citation: "Amato PR (2001). Children of divorce in the 1990s: An update of the Amato and Keith (1991) meta-analysis. Journal of Family Psychology, 15(3), 355-370."
    year: 2001
    robustness: robust
    topic_keys: [divorce]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Reduce guilt — conflict level matters."
      zh_TW_zh_CN: "Child wellbeing and harmony post-split."
      ja_JP: "Co-parenting quality emphasis."
    sensitivity_notes: "Not parenting advice — research summary only."
    secular_safe: true
    position_fit: supports PIVOT

