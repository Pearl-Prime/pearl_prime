  - evidence_id: div_stress_holmes_rahe_1967
    entry_type: finding
    claim: >
      Divorce consistently ranks among life's highest stress events in decades of
      stress-scale research — the strain is real, not weakness.
    citation: "Holmes TH, Rahe RH (1967). The Social Readjustment Rating Scale. Journal of Psychosomatic Research, 11(2), 213-218."
    year: 1967
    robustness: robust
    topic_keys: [divorce, grief]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Normalize divorce stress."
      zh_TW_zh_CN: "Divorce stigma — validate without judgment."
      ja_JP: "Divorce shame in traditional families."
    sensitivity_notes: "Domestic violence contexts need safety resources — not 'stay together' framing."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: div_grief_marriage_death_1976
    entry_type: finding
    claim: >
      Ending a marriage often produces full grief — mourning the future, identity,
      and daily routines — even when divorce is the right choice.
