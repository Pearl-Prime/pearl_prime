  - evidence_id: div_financial_women_post_2018
    entry_type: finding
    claim: >
      Divorce often produces sharper financial stress for women who earned less
      during marriage — economic adjustment is structural, not personal failure.
    citation: "Peterson R (2016). Marriage and divorce: Patterns by gender, race, and educational attainment. Monthly Labor Review, U.S. Bureau of Labor Statistics."
    year: 2016
    robustness: robust
    topic_keys: [divorce, financial_stress, money]
    doctrine_keys: []
    locale_framing_notes:
