  - evidence_id: soc_sad_prevalence_nimh_2023
    entry_type: finding
    claim: >
      Social anxiety disorder affects roughly seven percent of U.S. adults in a given
      year — millions of people — making fear of judgment and scrutiny one of the
      most common anxiety patterns, not a rare personality quirk.
    citation: "National Institute of Mental Health (2023). Social Anxiety Disorder. Bethesda, MD: NIMH Statistics."
    year: 2023
    robustness: robust
    topic_keys: [social_anxiety, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Normalize without labeling reader as disordered."
      zh_TW_zh_CN: "Social face (mianzi) amplifies scrutiny fear — culturally specific hook."
      ja_JP: "Reading the air (kuuki) — social monitoring culturally familiar."
    sensitivity_notes: "Prevalence from US NIMH — localize stats when possible."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: soc_spotlight_effect_gilovich_2000
    entry_type: finding
    claim: >
      People consistently overestimate how much others notice their appearance,
      mistakes, and anxiety symptoms — the 'spotlight effect.' The audience in your
      head is usually harsher than the audience in the room.
    citation: "Gilovich T, Medvec VH, Savitsky K (2000). The spotlight effect in social judgment: An egocentric bias in estimates of the salience of one's own actions and appearance. Journal of Personality and Social Psychology, 78(2), 211-222."
    year: 2000
    robustness: robust
    topic_keys: [social_anxiety, imposter_syndrome]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    locale_framing_notes:
      en_EU: "Classic social psych finding — strong for presentation anxiety."
      zh_TW_zh_CN: "Face-conscious cultures may intensify spotlight — validate real social stakes."
      ja_JP: "Group visibility pressure — spotlight may be partially realistic in small communities."
    sensitivity_notes: "Do not dismiss real discrimination/hierarchy as 'just spotlight.'"
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: soc_cbt_sad_gold_standard_heimberg_2014
    entry_type: finding
    claim: >
      Cognitive-behavioral therapy with exposure to feared social situations is
      considered the best-established psychological treatment for social anxiety
      in multiple treatment guidelines and meta-analyses.
    citation: "Mayo-Wilson E, et al. (2014). Psychological and pharmacological interventions for social anxiety disorder in adults: A systematic review and network meta-analysis. The Lancet Psychiatry, 1(5), 368-376."
    year: 2014
    robustness: robust
    topic_keys: [social_anxiety, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v10"]
    locale_framing_notes:
      en_EU: "Supports graded social exposure doctrine."
      zh_TW_zh_CN: "Therapy stigma — frame as 'social confidence practice.'"
      ja_JP: "Small-group practice before large presentation."
    sensitivity_notes: "Treatment claim — not prescriptive for audiobook; skills framing only."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: soc_post_event_processing_rachman_1997
    entry_type: finding
    claim: >
      After social events, anxious people often replay interactions searching for
      proof they embarrassed themselves — post-event processing — which keeps fear
      alive longer than the event itself.
    citation: "Rachman S, Grüter-Andrew J, Shafran R (2000). Post-event processing in social anxiety. Behaviour Research and Therapy, 38(6), 611-617."
    year: 2000
    robustness: robust
    topic_keys: [social_anxiety, overthinking]
    doctrine_keys: ["COMPOSITE_DOCTRINE v08", "COMPOSITE_DOCTRINE v12"]
    locale_framing_notes:
      en_EU: "Late-night replay after parties/meetings."
      zh_TW_zh_CN: "Replay after family gathering / WeChat group silence."
      ja_JP: "After-work nomikai replay — culturally specific."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: soc_safety_behaviors_clark_wells_1995
    entry_type: finding
    claim: >
      Socially anxious people often use subtle safety behaviors — avoiding eye contact,
      rehearsing lines, staying near exits — that prevent them from learning others
      are not judging as harshly as feared. The hiding maintains the fear.
    citation: "Clark DM, Wells A (1995). A cognitive model of social phobia. In Heimberg RG, Liebowitz MR, Hope DA, Schneier FR (Eds.), Social Phobia: Diagnosis, Assessment, and Treatment. New York: Guilford Press."
    year: 1995
    robustness: robust
    topic_keys: [social_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v08"]
    locale_framing_notes:
      en_EU: "Phone-as-shield at networking events."
      zh_TW_zh_CN: "Staying silent in group to avoid wrong answer."
      ja_JP: "Over-politeness masking avoidance."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: soc_blushing_fear_feedforward_2001
    entry_type: finding
    claim: >
      Fear of blushing creates a feedforward loop — worrying about turning red can
      trigger the blush that confirms the fear. The symptom and the fear of the
      symptom become one package.
    citation: "Mulkens S, Bögels SM, de Jong PJ, Olsthoorn P (1999). Fear of blushing: Fearful preoccupation irrespective of facial coloration. Behaviour Research and Therapy, 37(11), 1119-1128."
    year: 1999
    robustness: robust
    topic_keys: [social_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v11"]
    locale_framing_notes:
      en_EU: "Blushing/sweating in presentations."
      zh_TW_zh_CN: "Face-heating shame in group criticism."
      ja_JP: "Visible nervousness in senpai-kohai settings."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: soc_case_susan_jeffers_feel_the_fear_1987
    entry_type: documented_case
    claim: >
      Susan Jeffers documented her own and clients' experiences of performing while
      afraid — including public speaking with shaking hands — arguing that action
      precedes confidence rather than waiting for fear to disappear first.
    citation: "Jeffers S (1987). Feel the Fear and Do It Anyway. New York: Ballantine Books. (Autobiographical and client case accounts.)"
    year: 1987
    robustness: robust
    topic_keys: [social_anxiety, courage]
    doctrine_keys: ["COMPOSITE_DOCTRINE v10"]
    case_attribution: "Published client and author cases — Jeffers (1987)"
    locale_framing_notes:
      en_EU: "Classic self-help lineage — recognizable title."
      zh_TW_zh_CN: "Action-before-confidence frame translates well."
      ja_JP: "Courage despite fear — gambaru with nuance."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: soc_loneliness_health_holt_lunstad_2015
    entry_type: finding
    claim: >
      Chronic social isolation and loneliness predict poorer mental and physical health
      outcomes in meta-analyses — avoiding social situations for anxiety relief can
      carry a long-term cost if connection never returns.
    citation: "Holt-Lunstad J, Smith TB, Baker M, Harris T, Stephenson D (2015). Loneliness and social isolation as risk factors for mortality: A meta-analytic review. Perspectives on Psychological Science, 10(2), 227-237."
    year: 2015
    robustness: robust
    topic_keys: [social_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    locale_framing_notes:
      en_EU: "Balance exposure with sustainable connection goals."
      zh_TW_zh_CN: "Family/community connection may exist despite social anxiety — nuance needed."
      ja_JP: "Group belonging need — avoid hyper-individualist framing."
    sensitivity_notes: "Do not shame avoidance — pair with graded approach."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: soc_imagery_rescripting_hackmann_2011
    entry_type: finding
    claim: >
      Updating painful social memories through guided imagery — rescripting what happened
      or how the self responded — reduces social anxiety in several clinical trials,
      suggesting the past scene can be revised as learning material.
    citation: "Wild J, Hackmann A (2011). Imagery rescripting of early traumatic memories in social phobia. Cognitive Behaviour Therapy, 40(1), 24-37."
    year: 2011
    robustness: mixed
    caveat: "Strongest evidence in memory-linked social anxiety; less clear for general SAD."
    topic_keys: [social_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    locale_framing_notes:
      en_EU: "Exercise-adjacent imagery work for advanced chapters."
      zh_TW_zh_CN: "School bullying / public criticism memories salient."
      ja_JP: "Group exclusion memories — handle sensitively."
    sensitivity_notes: "Trauma-adjacent — flag for clinical referral if severe."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: soc_virtual_meeting_anxiety_post_pandemic_2022
    entry_type: finding
    claim: >
      Post-2020 surveys document elevated social anxiety around video calls — visible
      self-view, silence detection, and performance without physical presence cues
      create a new social threat profile for many workers.
    citation: "Sun Y, et al. (2022). The prevalence of psychiatric symptoms during the COVID-19 pandemic: A systematic review and meta-analysis. Frontiers in Psychiatry. (Social anxiety and remote-work sub-analyses in cohort studies.)"
    year: 2022
    robustness: robust
    topic_keys: [social_anxiety, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v10"]
    locale_framing_notes:
      en_EU: "Zoom/Teams anxiety — immediate recognition."
      zh_TW_zh_CN: "Remote work on camera with family present."
      ja_JP: "Telework camera-on culture in corporations."
    sensitivity_notes: "Pandemic-era research — may date; check stale_after at consumer time."
    secular_safe: true
    position_fit: supports REFLECTION
