  - evidence_id: sha_shame_vs_guilt_tangney_1996
    entry_type: finding
    claim: >
      Guilt says 'I did something bad'; shame says 'I am bad.' Shame predicts
      depression, aggression, and withdrawal more strongly than guilt in longitudinal
      research.
    citation: "Tangney JP, Dearing RL (2002). Shame and Guilt. New York: Guilford Press."
    year: 2002
    robustness: robust
    topic_keys: [shame, self_worth]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Name the shame voice — core reframe."
      zh_TW_zh_CN: "Face-loss (diulian) shame culturally salient."
      ja_JP: "Public mistake shame in groups."
    sensitivity_notes: "Shame can track trauma — professional support if overwhelming."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: sha_shame_withdrawal_loop_2004
    entry_type: finding
    claim: >
      Shame triggers hiding — canceling plans, avoiding eye contact — which cuts off
      the connection that could dissolve shame, deepening isolation.
    citation: "Gilbert P (2003). Evolution, social roles, and differences in shame and guilt. Social Research, 70(4), 1205-1230."
    year: 2003
    robustness: robust
    topic_keys: [shame, social_anxiety]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Hide-after-mistake pattern."
      zh_TW_zh_CN: "Avoid family after failure."
      ja_JP: "Absenteeism after public error."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: sha_self_compassion_shame_neff_2005
    entry_type: finding
    claim: >
      Self-compassion exercises reduce shame intensity faster than self-esteem
      boosts in experimental studies — kindness disarms the attack.
    citation: "Neff KD (2003). Self-compassion: An alternative conceptualization of attitudes toward oneself. Self and Identity, 2(2), 85-101."
    year: 2003
    robustness: robust
    topic_keys: [shame, self_worth]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "What would you tell a friend?"
      zh_TW_zh_CN: "Indirect self-kindness scripts."
      ja_JP: "Gentle inner tone practice."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: sha_case_brene_brown_ted_shame_2006
    entry_type: documented_case
    claim: >
      Brené Brown's published research describes shame as the fear of disconnection —
      'Is there something about me that if other people see it, I won't be worthy
      of connection?' — naming the universal mechanism.
    citation: "Brown B (2006). Shame Resilience Theory. Families in Society, 87(1), 43-52."
    year: 2006
    robustness: robust
    topic_keys: [shame]
    doctrine_keys: []
    case_attribution: "Brené Brown — published research (2006)"
    locale_framing_notes:
      en_EU: "High recognition in wellness market."
      zh_TW_zh_CN: "Connection fear framing."
      ja_JP: "Belonging fear in groups."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: sha_toxic_shame_bradshaw_1988
    entry_type: finding
    claim: >
      Clinicians distinguish healthy shame (brief, behavior-correcting) from toxic
      shame (chronic identity condemnation) — the latter often learned in childhood
      criticism.
    citation: "Bradshaw J (1988). Healing the Shame That Binds You. Deerfield Beach, FL: Health Communications."
    year: 1988
    robustness: mixed
    caveat: "Clinical model widely used; empirical trials more limited than basic shame/guilt distinction."
    topic_keys: [shame]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Inner critic as learned voice."
      zh_TW_zh_CN: "Parental criticism internalized."
      ja_JP: "Strict upbringing shame legacy."
    sensitivity_notes: "Deep childhood shame may need therapy — not self-help alone."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: sha_shame_silence_secrecy_2012
    entry_type: finding
    claim: >
      Keeping shame secret intensifies it — spoken shame loses some power in
      disclosure research with trusted others.
    citation: "Brown B (2012). Daring Greatly. New York: Gotham Books. (Synthesizes disclosure/shame resilience literature.)"
    year: 2012
    robustness: robust
    topic_keys: [shame]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Trusted witness, not public broadcast."
      zh_TW_zh_CN: "Shame secrecy in family systems."
      ja_JP: "Confide in one safe person."
    sensitivity_notes: "Disclosure must be chosen and safe — not forced vulnerability."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: sha_perfectionism_shame_link_2010
    entry_type: finding
    claim: >
      Perfectionism often defends against shame — if you are flawless, no one can
      reject the real you — but perfectionism increases shame when flaws appear.
    citation: "Frost RO, Marten P, Lahart C, Rosenblate R (1990). The dimensions of perfectionism. Cognitive Therapy and Research, 14(5), 449-468."
    year: 1990
    robustness: robust
    topic_keys: [shame, perfectionism, overthinking]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Perfectionism as shame armor."
      zh_TW_zh_CN: "Face-saving perfection."
      ja_JP: "Mistake intolerance."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: sha_cultural_shame_collectivist_2006
    entry_type: finding
    claim: >
      Shame functions differently across cultures — in collectivist contexts, shame
      often regulates group harmony and can be especially acute around family honor.
    citation: "Wong Y, Tsai J (2007). Cultural models of shame and guilt. In Tracy JL, Robins RW, Tangney JP (Eds.), The Self-Conscious Emotions. Guilford Press."
    year: 2007
    robustness: robust
    topic_keys: [shame]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Do not assume Western individualist shame frame."
      zh_TW_zh_CN: "Family face (mianzi) — primary framing."
      ja_JP: "Group harmony shame — tsumetai gaze."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

