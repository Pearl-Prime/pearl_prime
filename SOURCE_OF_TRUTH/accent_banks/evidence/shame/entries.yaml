      the body becomes a billboard for perceived unworthiness.
    citation: "Duarte C, Pinto-Gouveia J, Ferreira C (2014). Escaping from body image shame and harsh self-criticism: Exploration of underlying mechanisms of binge eating. Eating Behaviors, 15(4), 638-643."
    year: 2014
    robustness: robust
