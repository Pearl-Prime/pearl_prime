      zh_TW_zh_CN: "Listening to family trauma repeatedly."
      ja_JP: "Counselor burnout recognition."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: cf_supervision_buffers_2010
