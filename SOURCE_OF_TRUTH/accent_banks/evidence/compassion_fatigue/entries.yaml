  - evidence_id: cf_vicarious_trauma_mclean_2009
    entry_type: finding
    claim: >
      Repeated exposure to others' trauma narratives changes therapists' worldview
      and sense of safety — vicarious trauma is an occupational hazard, not weakness.
    citation: "McCann IL, Pearlman LA (1990). Vicarious traumatization: A framework for understanding the psychological effects of working with victims. Journal of Traumatic Stress, 3(1), 131-149."
    year: 1990
    robustness: robust
    topic_keys: [compassion_fatigue, somatic_healing]
    doctrine_keys: ["COMPOSITE_DOCTRINE v10"]
    locale_framing_notes:
