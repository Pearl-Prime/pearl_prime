      in healthcare workers across organizational studies.
    citation: "Lee HF, Yom YH, Lee N (2015). A systematic review on the factors affecting effective communication between registered nurses and oncology adult patients in inpatient and outpatient settings. (Supervision/debrief cluster in helper literature.)"
    year: 2015
