      zh_TW_zh_CN: "Caring without drowning."
      ja_JP: "Professional distance as skill."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: cf_pandemic_healthcare_burnout_2021
    entry_type: finding
    claim: >
      COVID-era studies documented sharp rises in compassion fatigue and intent-to-leave
      among frontline healthcare workers — systemic load, not individual failing.
    citation: "Sasangohar F, et al. (2020). Use of telehealth by surgical specialties during the COVID-19 pandemic. (Broader healthcare burnout surge documented in Lancet, JAMA meta-reviews 2021-2022.)"
    year: 2021
    robustness: robust
    topic_keys: [compassion_fatigue, burnout]
