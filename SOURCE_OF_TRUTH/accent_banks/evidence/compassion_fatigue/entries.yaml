  - evidence_id: cf_figley_secondary_trauma_1995
    entry_type: finding
    claim: >
      Helpers who absorb others' trauma — nurses, therapists, caregivers — can develop
      secondary traumatic stress with symptoms mirroring burnout and PTSD.
    citation: "Figley CR (1995). Compassion Fatigue: Coping with Secondary Traumatic Stress Disorder in Those Who Treat the Traumatized. New York: Brunner/Mazel."
    year: 1995
    robustness: robust
    topic_keys: [compassion_fatigue, burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Healthcare/education primary audience."
      zh_TW_zh_CN: "Elder-care compassion fatigue salient."
      ja_JP: "Nursing/care work recognition."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: cf_empathy_fatigue_distinction_2002
    entry_type: finding
    claim: >
      Compassion fatigue is not the same as burnout — it tracks empathic overload
      from others' pain more than workload alone.
    citation: "Stamm BH (2002). Measuring Compassion Satisfaction and Compassion Fatigue. Lutherville, MD: Sidran Press."
    year: 2002
    robustness: robust
    topic_keys: [compassion_fatigue]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    locale_framing_notes:
      en_EU: "Name the specific drain."
      zh_TW_zh_CN: "Family caregiver empathy overload."
      ja_JP: "Helper-role exhaustion."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: cf_compassion_satisfaction_stamm_2002
    entry_type: finding
    claim: >
      Helping work also produces compassion satisfaction — meaning from care — which
      buffers fatigue when nourished intentionally.
    citation: "Stamm BH (2010). The Concise ProQOL Manual, 2nd ed. Pocatello, ID: ProQOL.org."
    year: 2010
    robustness: robust
    topic_keys: [compassion_fatigue]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    locale_framing_notes:
