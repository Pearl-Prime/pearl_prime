  - evidence_id: cf_detachment_not_coldness_2008
    entry_type: finding
    claim: >
      Skilled empathy includes regulated closeness — emotional boundaries that prevent
      full fusion with each client's pain while staying present.
    citation: "Gleichgerrcht E, Decety J (2013). Empathy in clinical practice: How conscious and unconscious empathy shape the therapeutic relationship. Frontiers in Psychology, 4, 106."
    year: 2013
    robustness: robust
    topic_keys: [compassion_fatigue, boundaries]
    doctrine_keys: ["COMPOSITE_DOCTRINE v13"]
    locale_framing_notes:
