      zh_TW_zh_CN: "Meaning in caregiving role."
      ja_JP: "Pride in care work."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: cf_moral_injury_shay_1994
    entry_type: finding
    claim: >
      When caregivers cannot provide the care they believe is right — systemic limits,
      understaffing — moral injury produces guilt and exhaustion beyond ordinary stress.
    citation: "Shay J (1994). Achilles in Vietnam: Combat Trauma and the Undoing of Character. New York: Atheneum. (Extended to healthcare moral injury literature.)"
    year: 1994
    robustness: robust
    topic_keys: [compassion_fatigue, burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    locale_framing_notes:
      en_EU: "System failure, not personal failure."
      zh_TW_zh_CN: "Under-resourced family care."
      ja_JP: "Hospital understaffing context."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: cf_self_care_not_selfish_2018
    entry_type: finding
    claim: >
      Caregiver self-care predicts sustained care quality — depleted helpers make
      more errors and withdraw emotionally in longitudinal healthcare studies.
    citation: "Mills J, Wand T, Fraser JA (2018). Exploring the meaning and practice of self-care among palliative care nurses and doctors: A qualitative study. BMC Palliative Care, 17(1), 63."
    year: 2018
    robustness: mixed
    caveat: "Qualitative and correlational; directionality debated but consensus supports caregiver restoration."
    topic_keys: [compassion_fatigue, boundaries]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Oxygen-mask principle for helpers."
      zh_TW_zh_CN: "Self-care guilt in daughters caring for parents."
      ja_JP: "Helper must rest to continue."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: cf_case_mother_teresa_dark_night_2007
    entry_type: documented_case
    claim: >
      Published biographical accounts describe Mother Teresa's decades of spiritual
      desolation and exhaustion while continuing caregiving — documenting that even
      devoted helpers face empty periods.
    citation: "Kolodiejchuk B (Ed.) (2007). Mother Teresa: Come Be My Light. New York: Doubleday. (Published correspondence.)"
    year: 2007
    robustness: robust
    topic_keys: [compassion_fatigue]
    doctrine_keys: ["COMPOSITE_DOCTRINE v14"]
    case_attribution: "Published correspondence — Kolodiejchuk (2007)"
    locale_framing_notes:
