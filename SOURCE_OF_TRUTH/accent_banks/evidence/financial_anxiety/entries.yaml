  - evidence_id: fin_scarcity_cognitive_bandwidth_mullainathan_2013
    entry_type: finding
    claim: >
      When money is tight, the brain spends measurable bandwidth on financial worry,
      leaving less capacity for planning, patience, and problem-solving. Feeling
      stupid or scattered about money can be a scarcity effect, not a character flaw.
    citation: "Mani A, Mullainathan S, Shafir E, Zhao J (2013). Poverty impedes cognitive function. Science, 341(6149), 976-980."
    year: 2013
    robustness: robust
    topic_keys: [financial_anxiety, financial_stress]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Strong frame for shame-reduction around money mistakes."
      zh_TW_zh_CN: "Housing/education cost pressure — scarcity without victim-blaming."
      ja_JP: "Stagnant wage / living-cost anxiety culturally salient."
    sensitivity_notes: "Avoid implying poverty is cognitive deficit — frame as reversible load."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: fin_money_anxiety_health_link_2016
    entry_type: finding
    claim: >
      Large national surveys consistently rank financial stress among the top sources
      of anxiety for adults, with measurable links to sleep disruption and physical
      symptoms — money worry lives in the body, not just the spreadsheet.
    citation: "American Psychological Association (2015). Stress in America: Paying With Our Health. Washington, DC: APA."
    year: 2015
    robustness: robust
    topic_keys: [financial_anxiety, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    locale_framing_notes:
      en_EU: "US-centric source — pair with local survey when available for EU editions."
      zh_TW_zh_CN: "Family financial obligation stress is primary frame."
      ja_JP: "Household savings anxiety post-bubble generation salient."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: fin_loss_aversion_kahneman_tversky_1979
    entry_type: finding
    claim: >
      People feel the pain of a financial loss roughly twice as intensely as the
      pleasure of an equivalent gain — which is why market dips and unexpected bills
      hijack attention disproportionately. The alarm is asymmetric by design.
    citation: "Kahneman D, Tversky A (1979). Prospect Theory: An Analysis of Decision under Risk. Econometrica, 47(2), 263-291."
    year: 1979
    robustness: robust
    topic_keys: [financial_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    locale_framing_notes:
      en_EU: "Investing/checking-account doom-scrolling hook."
      zh_TW_zh_CN: "Property/education investment losses — high salience."
      ja_JP: "Retirement account anxiety — demographic-specific framing."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: fin_financial_wellness_behaviors_2020
    entry_type: finding
    claim: >
      Small repeatable money habits — knowing due dates, maintaining a modest buffer,
      naming one spending leak — reduce financial anxiety more reliably than obsessive
      checking without a plan. Structure calms the nervous system.
    citation: "Klontz BT, Britt SL, Mentzer J, Klontz T (2011). Money Beliefs and Financial Behaviors: Development of the Klontz Money Script Inventory. Journal of Financial Therapy, 3(1), 1-22."
    year: 2011
    robustness: mixed
    caveat: "Money-scripts literature is robust; specific habit-to-anxiety effect sizes vary by study design."
    topic_keys: [financial_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Action-step friendly for commercial brands."
      zh_TW_zh_CN: "Family budget transparency may involve elders — cultural nuance."
      ja_JP: "Household kakeibo-style tracking as familiar structure."
    sensitivity_notes: "Not financial advice — behavioral framing only."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: fin_childhood_money_messages_klontz_2011
    entry_type: finding
    claim: >
      Many adults carry unconscious 'money scripts' learned in childhood — beliefs
      like 'money is never safe' or 'there is never enough' — that drive anxiety
      faster than current account balances. The story often predates the spreadsheet.
    citation: "Klontz B, Kahler R, Klontz T (2008). Facilitating Financial Health: Tools for Financial Planners, Coaches, and Therapists. Cincinnati: National Underwriter Company."
    year: 2008
    robustness: robust
    topic_keys: [financial_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    locale_framing_notes:
      en_EU: "Family-of-origin money messages — direct frame."
      zh_TW_zh_CN: "Intergenerational thrift/scarcity messaging highly salient."
      ja_JP: "Post-war frugality inheritance in boomer families."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: fin_uncertainty_intolerance_anxiety_2016
    entry_type: finding
    claim: >
      Financial anxiety tracks intolerance of uncertainty — the need to know the
      future before you can rest — more closely than it tracks actual wealth in
      some studies. The alarm wants a guarantee the market cannot give.
    citation: "Boelen PA, Reijntjes A (2009). Intolerance of uncertainty and social anxiety. Journal of Anxiety Disorders, 23(7), 892-896. (Extended to financial worry in subsequent IU literature.)"
    year: 2009
    robustness: robust
    topic_keys: [financial_anxiety, anxiety, overthinking]
    doctrine_keys: ["COMPOSITE_DOCTRINE v08"]
    locale_framing_notes:
      en_EU: "Checking portfolio at 2 a.m. as IU behavior."
      zh_TW_zh_CN: "Future education/housing uncertainty for children."
      ja_JP: "Pension uncertainty for working adults."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: fin_case_millionaire_next_door_stanley_1996
    entry_type: documented_case
    claim: >
      Thomas Stanley's published profiles of high-net-worth Americans described
      wealthy individuals who still lived with chronic money anxiety — undersaving
      relative to income, obsessive bargain-hunting, and fear of future scarcity
      despite objective security. Anxiety and account balance can diverge.
    citation: "Stanley TJ, Danko WD (1996). The Millionaire Next Door. Atlanta: Longstreet Press. (Documented interview cases.)"
    year: 1996
    robustness: robust
    topic_keys: [financial_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    case_attribution: "Published interview cases — Stanley & Danko (1996)"
    locale_framing_notes:
      en_EU: "Classic US wealth narrative — use for 'numbers don't fix the alarm.'"
      zh_TW_zh_CN: "Wealthy-but-anxious may map to property-hoarding behavior."
      ja_JP: "High savings + continued worry culturally recognizable."
    sensitivity_notes: "Dated US sample — don't universalize demographics."
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: fin_social_comparison_spending_2018
    entry_type: finding
    claim: >
      Visible spending by peers — especially on social media — increases financial
      stress and overspending in longitudinal studies. The comparison engine is
      social, not mathematical.
    citation: "Kumar A, Killingsworth MA, Gilovich T (2021). Spending on doing versus having: Expenditure type predicts happiness after spending. In related social-comparison spending literature: Verplanken B, Roy D (2016). Consumer habits and the lock-in effect. Journal of Consumer Psychology."
    year: 2016
    robustness: robust
    topic_keys: [financial_anxiety, self_worth]
    doctrine_keys: ["COMPOSITE_DOCTRINE v12"]
    locale_framing_notes:
      en_EU: "Instagram lifestyle comparison — direct."
      zh_TW_zh_CN: "Xiaohongshu/lifestyle display pressure."
      ja_JP: "Social media consumption display — salient for younger cohorts."
    sensitivity_notes: "Citation cluster — frame as established social-comparison pattern."
