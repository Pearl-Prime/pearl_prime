  - evidence_id: fin_emergency_buffer_anxiety_reduction_2018
    entry_type: finding
    claim: >
      Even modest liquid savings — often cited around one to three months of essential
      expenses — correlate with lower financial anxiety in household finance research,
      independent of income level. The buffer is psychological as much as financial.
    citation: "Federal Reserve Board (2023). Report on the Economic Well-Being of U.S. Households. Washington, DC. (Emergency savings and stress correlation.)"
    year: 2023
    robustness: robust
    topic_keys: [financial_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "US Fed data — localize threshold for market."
      zh_TW_zh_CN: "Family emergency fund often collective — not individual account."
      ja_JP: "Household reserve fund (yobiikin) framing."
    sensitivity_notes: "Not prescriptive financial planning — correlation framing."
    secular_safe: true
