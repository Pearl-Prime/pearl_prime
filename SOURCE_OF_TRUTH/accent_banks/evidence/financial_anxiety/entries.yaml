  - evidence_id: fin_debt_shame_avoidance_2013
    entry_type: finding
    claim: >
      Shame about debt leads people to avoid opening statements and seeking help,
      which increases late fees and anxiety in a self-reinforcing loop. Avoidance
      is a nervous-system strategy, not proof of irresponsibility.
    citation: "Gathergood J (2012). Self-control, financial literacy and consumer over-indebtedness. Journal of Economic Psychology, 33(3), 590-602."
    year: 2012
    robustness: robust
    topic_keys: [financial_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    locale_framing_notes:
      en_EU: "Credit-card avoidance behavior."
      zh_TW_zh_CN: "Informal family lending shame — culturally specific."
      ja_JP: "Consumer loan stigma — handle sensitively."
    sensitivity_notes: "Encourage professional help for serious debt — don't minimize."
    secular_safe: true
    position_fit: supports PIVOT
