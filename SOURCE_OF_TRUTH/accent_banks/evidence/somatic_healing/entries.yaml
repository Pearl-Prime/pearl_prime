  - evidence_id: som_polyvagal_theory_porges_2011
    entry_type: finding
    claim: >
      The autonomic nervous system shifts between states of safety, mobilization, and
      shutdown — body symptoms often track which state is active, not just what you
      are thinking.
    citation: "Porges SW (2011). The Polyvagal Theory: Neurophysiological Foundations of Emotions, Attachment, Communication, and Self-regulation. New York: Norton."
    year: 2011
    robustness: mixed
    caveat: "Polyvagal theory influential but debated; core autonomic arousal/calm physiology is robust."
    topic_keys: [somatic_healing, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Nervous system states language popular in somatic brands."
      zh_TW_zh_CN: "Body-mind balance framing."
      ja_JP: "Autonomic regulation without jargon."
    sensitivity_notes: "Avoid overclaiming polyvagal as proven clinical protocol for all trauma."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: som_interoception_accuracy_garfinkel_2015
    entry_type: finding
    claim: >
      Noticing internal body signals — heartbeat, breath, tension — with some accuracy
      correlates with better emotion regulation in research on interoception.
    citation: "Garfinkel SN, Seth AK, Barrett AB, Suzuki K, Critchley HD (2015). Knowing your own heart: Distinguishing interoceptive accuracy from interoceptive awareness. Biological Psychology, 104, 65-74."
    year: 2015
    robustness: robust
    topic_keys: [somatic_healing, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    locale_framing_notes:
      en_EU: "Body scan as data gathering."
      zh_TW_zh_CN: "TCM body awareness — secular parallel only."
      ja_JP: "Breath and belly attention."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: som_trauma_body_van_der_kolk_2014
    entry_type: finding
    claim: >
      Trauma can leave lasting changes in stress hormones and body vigilance — the
      body may stay on guard after the mind names the danger past.
    citation: "van der Kolk BA (2014). The Body Keeps the Score: Brain, Mind, and Body in the Healing of Trauma. New York: Viking."
    year: 2014
    robustness: mixed
    caveat: "Popular synthesis; core stress/trauma physiology robust; not all specific treatment claims trial-tested."
    topic_keys: [somatic_healing, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v10"]
    locale_framing_notes:
      en_EU: "Trauma-informed somatic framing."
      zh_TW_zh_CN: "Trauma stigma — body-first language may feel safer."
      ja_JP: "Stress held in body — culturally familiar."
    sensitivity_notes: "Trauma content — encourage professional trauma therapy when indicated; no 'stored in every cell' claims."
    secular_safe: true
    position_fit: supports REFLECTION

