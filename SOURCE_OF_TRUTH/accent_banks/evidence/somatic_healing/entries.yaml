  - evidence_id: som_shaking_trauma_discharge_levine_1997
    entry_type: finding
    claim: >
      Animals naturally discharge acute stress through movement after threat — humans
      often override this, which somatic therapists argue can prolong activation.
    citation: "Levine PA (1997). Waking the Tiger: Healing Trauma. Berkeley: North Atlantic Books."
    year: 1997
    robustness: single-study
    caveat: "Theoretical/clinical model; animal discharge robust; human Somatic Experiencing trials limited and mixed."
    topic_keys: [somatic_healing]
    doctrine_keys: ["COMPOSITE_DOCTRINE v11"]
    locale_framing_notes:
      en_EU: "Gentle movement after stress — cautious framing."
      zh_TW_zh_CN: "Avoid sensational trauma-release promises."
      ja_JP: "Walk after shock — simple frame."
    sensitivity_notes: "Trauma-adjacent — do not promise shake-out cures; professional help for PTSD."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: som_breath_slow_vagal_2018
    entry_type: finding
    claim: >
      Slow breathing near six breaths per minute increases heart-rate variability
      and parasympathetic tone in laboratory studies — a direct body-downshift lever.
    citation: "Zaccaro A, Piarulli A, Laurino M, et al. (2018). How Breath-Control Can Change Your Life: A systematic review on psycho-physiological correlates of controlled breathing. Frontiers in Human Neuroscience, 12, 353."
    year: 2018
