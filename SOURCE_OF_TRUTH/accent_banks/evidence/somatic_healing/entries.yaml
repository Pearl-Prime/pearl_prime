  - evidence_id: som_case_alexander_technique_tinbergen_1973
    entry_type: documented_case
    claim: >
      Nobel laureate Niko Tinbergen credited the Alexander Technique with improving
      his chronic tension and breathing in his Nobel banquet speech — a published
      public account of somatic practice changing physical strain.
    citation: "Tinbergen N (1973). Nobel Banquet Speech, December 10, 1973. Documented in Nobel Prize official archives."
    year: 1973
    robustness: robust
    topic_keys: [somatic_healing]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
