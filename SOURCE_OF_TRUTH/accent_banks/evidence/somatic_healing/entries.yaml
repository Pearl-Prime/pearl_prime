      trial meta-analyses — movement plus breath appears to matter.
    citation: "Hofmann SG, Andreoli G, Sawyer AT, Witt AA (2010). The effect of mindfulness-based therapy on anxiety and depression: A meta-analytic review. (Yoga-specific: Cramer H, et al. (2018). Yoga for anxiety: A systematic review and meta-analysis of randomized controlled trials. Depression and Anxiety, 35(9), 830-843.)"
    year: 2018
    robustness: mixed
    caveat: "Heterogeneous yoga styles; modest effects vs active controls."
    topic_keys: [somatic_healing, anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
