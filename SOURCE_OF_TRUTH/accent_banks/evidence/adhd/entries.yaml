      zh_TW_zh_CN: "High achievement plus ADHD coexistence."
      ja_JP: "Performance and attention differences."
    sensitivity_notes: "Medication mention — do not imply reader should use medication."
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: adh_sleep_disruption_2013
    entry_type: finding
    claim: >
      ADHD correlates with delayed sleep phase and restless sleep in meta-analyses
      — tired brains worsen attention and impulse control the next day.
    citation: "Cortese S, et al. (2013). Sleep in children with ADHD: Meta-analysis of polysomnographic studies. Sleep Medicine Reviews, 17(4), 359-366."
    year: 2013
    robustness: robust
    topic_keys: [adhd, sleep_anxiety]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Sleep as ADHD lever."
      zh_TW_zh_CN: "Late-night phone plus morning struggle."
      ja_JP: "Sleep debt and focus collapse."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: adh_stimulant_treatment_efficacy_2018
    entry_type: finding
    claim: >
      Stimulant medications reduce core ADHD symptoms in the majority of diagnosed
      adults in clinical trials — one evidence-based tool among many.
    citation: "Faraone SV (2018). The pharmacology of amphetamine and methylphenidate: Relevance to the neurobiology of ADHD and other psychiatric disorders. Neuroscience & Biobehavioral Reviews."
    year: 2018
    robustness: robust
    topic_keys: [adhd]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Medication as option not identity."
      zh_TW_zh_CN: "Medication stigma in some families."
      ja_JP: "Prescription acceptance varies by generation."
    sensitivity_notes: "Prescribing is clinician-only — audiobook must not recommend medication."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: adh_late_diagnosis_grief_2020
    entry_type: finding
    claim: >
      Adults diagnosed with ADHD later in life often grieve years of self-blame —
      reframing past struggles as neurology can bring relief and anger simultaneously.
    citation: "Young S, et al. (2020). Guidance for identification and treatment of individuals with ADHD and autism spectrum disorder. ADHD in adults clinical literature cluster."
    year: 2020
    robustness: mixed
    caveat: "Qualitative literature strong; quantitative grief studies emerging."
    topic_keys: [adhd, shame, grief]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Late diagnosis grief naming."
      zh_TW_zh_CN: "Decades of 'not trying hard enough.'"
      ja_JP: "Adult diagnosis relief and regret."
    sensitivity_notes: "Diagnosis requires qualified clinician — online quizzes insufficient."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: adh_hyperfocus_tradeoff_2021
    entry_type: finding
    claim: >
      ADHD attention can hyperfocus intensely on interesting tasks while failing to
      start boring-but-important ones — not inconsistency of character but interest-driven
      attention wiring.
    citation: "Ashinoff BK, Abu-Akel A (2021). Hyperfocus: The forgotten frontier of attention. Psychological Research, 85(1), 1-19."
    year: 2021
    robustness: robust
    topic_keys: [adhd, overthinking]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Hyperfocus superpower plus blind spot."
      zh_TW_zh_CN: "Gaming/hobby focus vs homework."
      ja_JP: "Hobby immersion vs admin neglect."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT
