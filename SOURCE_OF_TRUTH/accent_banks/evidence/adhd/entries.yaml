  - evidence_id: adh_prevalence_nimh_2023
    entry_type: finding
    claim: >
      ADHD affects roughly 4–5% of adults worldwide — millions of people — making
      attention and impulse struggles a recognized neurological pattern, not laziness.
    citation: "National Institute of Mental Health (2023). Attention-Deficit/Hyperactivity Disorder in Adults: What You Need to Know. Bethesda, MD: NIMH."
    year: 2023
    robustness: robust
    topic_keys: [adhd]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Normalize without self-diagnosing."
      zh_TW_zh_CN: "ADHD underdiagnosed in adults — stigma remains."
      ja_JP: "Adult ADHD awareness growing slowly."
    sensitivity_notes: "Audiobook does not diagnose. Suspected ADHD warrants clinical evaluation."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: adh_executive_function_barkley_1997
    entry_type: finding
    claim: >
      ADHD primarily involves executive function difficulties — planning, starting,
      sustaining attention, inhibiting impulses — not low intelligence or motivation.
    citation: "Barkley RA (1997). Behavioral inhibition, sustained attention, and executive functions. Psychological Bulletin, 121(1), 65-94."
    year: 1997
    robustness: robust
    topic_keys: [adhd, overthinking]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Replace lazy label with executive function."
      zh_TW_zh_CN: "School failure shame legacy."
      ja_JP: "Desk work struggle not moral failure."
    sensitivity_notes: "Skills support only — medication decisions require clinicians."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: adh_time_blindness_2015
    entry_type: finding
    claim: >
      Many adults with ADHD experience 'time blindness' — difficulty sensing how
      long tasks take or how soon deadlines arrive — which creates chronic lateness
      and panic that looks like carelessness.
    citation: "Barkley RA (2015). Attention-Deficit Hyperactivity Disorder: A Handbook for Diagnosis and Treatment, 4th ed. New York: Guilford Press."
    year: 2015
    robustness: robust
    topic_keys: [adhd]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "External timers and alarms as tools."
      zh_TW_zh_CN: "Punctuality pressure in workplaces."
      ja_JP: "Train-time deadline panic."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: adh_rejection_sensitive_dysphoria_2015
    entry_type: finding
    claim: >
      Many people with ADHD report intense emotional pain after perceived rejection
      or criticism — rejection-sensitive dysphoria — disproportionate to the trigger
      but real in the moment.
    citation: "Dodson WW (2015). Emotional regulation and rejection sensitivity. Attention magazine, CHADD."
    year: 2015
    robustness: mixed
    caveat: "RSD term popularized clinically; formal DSM category absent; emotional dysregulation in ADHD robust."
    topic_keys: [adhd, shame, relationship_anxiety]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Email tone catastrophe spiral."
      zh_TW_zh_CN: "Boss criticism spiral."
      ja_JP: "Group exclusion sensitivity."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: adh_external_structure_helps_2011
    entry_type: finding
    claim: >
      External structure — visible lists, body doubling, accountability partners —
      compensates for executive function gaps better than willpower alone in ADHD
      coaching and clinical literature.
    citation: "Solanto MV (2011). Cognitive-Behavioral Therapy for Adult ADHD. New York: Guilford Press."
    year: 2011
    robustness: robust
    topic_keys: [adhd]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Environment design over shame."
      zh_TW_zh_CN: "Study buddy / coworking parallel."
      ja_JP: "Visible task boards at desk."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: adh_case_simone_biles_2016
    entry_type: documented_case
    claim: >
      Simone Biles's published statements about ADHD and public scrutiny documented
      that elite performance and ADHD coexist — attention differences do not cap
      achievement.
    citation: "Documented in sports press and Biles public statements (2016); WADA therapeutic use exemption reporting."
    year: 2016
    robustness: robust
    topic_keys: [adhd, imposter_syndrome]
    doctrine_keys: []
    case_attribution: "Simone Biles — published public statements (2016)"
    locale_framing_notes:
