  - evidence_id: sw_stable_vs_unstable_attributions_seligman_1975
    entry_type: finding
    claim: >
      Attributing setbacks to permanent, global flaws ('I always fail at everything')
      deepens hopelessness — whereas specific, changeable explanations protect worth.
    citation: "Abramson LY, Seligman ME, Teasdale JD (1978). Learned helplessness in humans: Critique and reformulation. Journal of Abnormal Psychology, 87(1), 49-74."
    year: 1978
    robustness: robust
    topic_keys: [self_worth, depression]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    locale_framing_notes:
      en_EU: "Always/never language trap."
      zh_TW_zh_CN: "Family criticism globalized to identity."
      ja_JP: "Workplace failure overgeneralization."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: sw_secure_base_bowlby_1988
    entry_type: finding
    claim: >
      Early attachment research shows that feeling securely valued — not perfectly
      performed — builds exploration and resilience. Worth precedes achievement.
    citation: "Bowlby J (1988). A Secure Base: Parent-Child Attachment and Healthy Human Development. New York: Basic Books."
    year: 1988
    robustness: robust
    topic_keys: [self_worth, relationship_anxiety]
