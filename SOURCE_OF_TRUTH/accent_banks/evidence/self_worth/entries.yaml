  - evidence_id: sw_inner_critic_shame_gilbert_2003
    entry_type: finding
    claim: >
      Harsh internal self-talk activates threat circuits similar to external criticism
      — the inner critic is not 'motivation,' it is stress.
    citation: "Gilbert P (2003). Evolution, social roles, and differences in shame and guilt. Social Research, 70(4), 1205-1230."
    year: 2003
    robustness: robust
    topic_keys: [self_worth, shame]
    doctrine_keys: ["COMPOSITE_DOCTRINE v08"]
    locale_framing_notes:
      en_EU: "Inner critic vs coach reframe."
      zh_TW_zh_CN: "Filial shame internalized."
      ja_JP: "Self-scolding after mistakes."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: sw_case_brene_brown_shame_research_2006
    entry_type: documented_case
    claim: >
      Brené Brown's published research interviews document professionals who tied
      worth to perfection — and found that vulnerability and imperfection acknowledgment
      predicted connection more than flawless performance.
    citation: "Brown B (2006). Shame Resilience Theory: A Grounded Theory Study on Women and Shame. Families in Society, 87(1), 43-52."
    year: 2006
    robustness: robust
    topic_keys: [self_worth, shame]
    doctrine_keys: ["COMPOSITE_DOCTRINE v14"]
    case_attribution: "Brené Brown — published grounded-theory research (2006)"
    locale_framing_notes:
