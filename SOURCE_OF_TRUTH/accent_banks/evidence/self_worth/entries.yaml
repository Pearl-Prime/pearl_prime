  - evidence_id: sw_gratitude_self_worth_2018
    entry_type: finding
    claim: >
      Gratitude practices modestly increase life satisfaction in trials — not by
      denying problems but by widening what counts as good enough today.
    citation: "Dickens LR (2017). Using gratitude to promote positive health outcomes: A meta-analysis. Journal of Positive Psychology, 12(6), 567-578."
    year: 2017
    robustness: mixed
    caveat: "Small-to-modest effects; can feel invalidating if forced during crisis."
    topic_keys: [self_worth]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Three specific gratitudes — light touch."
      zh_TW_zh_CN: "Gratitude vs toxic positivity — caveat matters."
      ja_JP: "Seasonal thanksgiving framing."
    sensitivity_notes: "Do not use gratitude to bypass clinical depression or grief."
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: sw_worth_not_productivity_2019
    entry_type: finding
    claim: >
      Sociological and psychological work on 'productivism' links tying human value
      to output with burnout and shame when output drops — worth is not earned by
      the to-do list.
    citation: "Frayne D (2015). The Refusal of Work: The Theory and Practice of Resistance to Work. London: Zed Books. (Synthesized in burnout/self-worth crossover literature.)"
    year: 2015
    robustness: single-study
    caveat: "Theoretical synthesis more than RCT; aligns with robust burnout/self-determination findings."
    topic_keys: [self_worth, burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v14"]
    locale_framing_notes:
      en_EU: "Anti-hustle worth framing."
      zh_TW_zh_CN: "Productivity guilt in caregiving + work."
      ja_JP: "Gambaru worthiness trap."
    sensitivity_notes: null
    secular_safe: true
