  - evidence_id: sw_mattering_flett_2018
    entry_type: finding
    claim: >
      Feeling that you matter to others — not fame, but being needed and seen —
      predicts well-being independently of achievement in longitudinal studies.
    citation: "Flett GL (2018). The Psychology of Mattering: Understanding the Human Need to be Significant. London: Routledge."
    year: 2018
    robustness: robust
