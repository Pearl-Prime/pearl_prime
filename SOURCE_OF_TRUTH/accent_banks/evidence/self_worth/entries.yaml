  - evidence_id: sw_contingent_self_worth_crocker_2003
    entry_type: finding
    claim: >
      When self-worth depends entirely on grades, income, or others' approval,
      every setback feels like identity failure. Researchers call this contingent
      self-esteem — stable worth needs more than one scoreboard.
    citation: "Crocker J, Knight CJ (2005). Contingencies of self-worth. Psychological Review, 112(2), 390-414."
    year: 2005
    robustness: robust
    topic_keys: [self_worth, imposter_syndrome, comparison]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Comparison topic key — social media scoreboards."
      zh_TW_zh_CN: "Gaokao / salary comparison culture."
      ja_JP: "Credential and seniority comparison."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: sw_self_compassion_vs_self_esteem_neff_2009
    entry_type: finding
    claim: >
      Self-compassion — kindness toward yourself in difficulty — buffers shame better
      than chasing high self-esteem, which can rise and fall with performance.
    citation: "Neff KD, Vonk R (2009). Self-compassion versus global self-esteem: Two different ways of relating to oneself. Journal of Personality, 77(1), 23-50."
    year: 2009
    robustness: robust
    topic_keys: [self_worth]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    locale_framing_notes:
      en_EU: "Come-home-to-self framing."
      zh_TW_zh_CN: "Self-compassion can sound selfish — reframe as sustainability."
      ja_JP: "Indirect self-kindness preferred."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: sw_social_comparison_theory_festinger_1954
    entry_type: finding
    claim: >
      People naturally compare upward to others — and upward comparison often lowers
      mood and self-evaluation, even when your life is objectively fine.
    citation: "Festinger L (1954). A theory of social comparison processes. Human Relations, 7(2), 117-140."
    year: 1954
    robustness: robust
    topic_keys: [self_worth, comparison, body_image]
    doctrine_keys: ["COMPOSITE_DOCTRINE v12"]
