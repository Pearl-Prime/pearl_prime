entries:
  - evidence_id: burn_maslach_three_dimensions_1981
    entry_type: finding
    claim: >
      Burnout is not generic exhaustion — researchers identified three overlapping
      strains: emotional depletion, cynicism toward work, and a sense of reduced
      accomplishment. Naming which strain is loudest helps you target recovery.
    citation: "Maslach C, Jackson SE (1981). The measurement of experienced burnout. Journal of Organizational Behavior, 2(2), 99-113."
    year: 1981
    robustness: robust
    topic_keys: [burnout, compassion_fatigue]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01", "COMPOSITE_DOCTRINE v03"]
    locale_framing_notes:
      en_EU: "Three-dimension model is standard in workplace wellness."
      zh_TW_zh_CN: "Cynicism may map to quiet quitting / emotional withdrawal in collectivist teams."
      ja_JP: "Reduced accomplishment ties to gambaru shame — handle gently."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: burn_who_occupational_burnout_2019
    entry_type: finding
    claim: >
      The World Health Organization classifies burnout as an occupational phenomenon
      resulting from chronic workplace stress that has not been successfully managed —
      not a personal character flaw.
    citation: "World Health Organization (2019). International Classification of Diseases, 11th Revision (ICD-11). QD85 Burn-out."
    year: 2019
    robustness: robust
    topic_keys: [burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Strong legitimizer for workplace-boundary content."
      zh_TW_zh_CN: "Official framing helps reduce self-blame; workplace stress is culturally familiar."
      ja_JP: "Karoshi/overwork discourse provides cultural entry without ICD citation in consumer copy."
    sensitivity_notes: "ICD classification is occupational context — avoid diagnosing readers."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: burn_restoration_requires_psychological_detachment_2011
    entry_type: finding
    claim: >
      Time off work only restores energy when the mind genuinely disconnects from
      job demands. Physically leaving the desk while mentally rehearsing tomorrow's
      meeting produces stop without recovery.
    citation: "Sonnentag S, Fritz C (2007). The Recovery Experience Questionnaire: Development and validation of a measure for assessing recuperation and unwinding from work. Journal of Occupational Health Psychology, 12(3), 204-221."
    year: 2007
    robustness: robust
    topic_keys: [burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    locale_framing_notes:
      en_EU: "Maps to 'rest that does not restore' doctrine beat."
      zh_TW_zh_CN: "Family caregiving after work prevents detachment — validate structural barriers."
      ja_JP: "After-hours messaging culture blocks detachment — name without company-bashing."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: burn_anhedonia_depletion_symptom_not_insight_2003
    entry_type: finding
    claim: >
      When work feels meaningless during deep burnout, research suggests the loss of
      meaning is often a symptom of depleted reserves — not an accurate verdict on
      whether your career was a mistake.
    citation: "Maslach C, Leiter MP (1997). The Truth About Burnout. San Francisco: Jossey-Bass. (Clinical and organizational case synthesis.)"
    year: 1997
    robustness: robust
    topic_keys: [burnout, depression]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    locale_framing_notes:
      en_EU: "Caution against quitting-from-empty — doctrine v03 alignment."
      zh_TW_zh_CN: "Career/family duty conflicts — defer big decisions framing."
      ja_JP: "Lifetime-employment regret narrative — handle with cultural nuance."
    sensitivity_notes: "Not a substitute for clinical depression assessment."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: burn_compassion_fatigue_figley_1995
    entry_type: finding
    claim: >
      Caregivers and helpers can develop a secondary exhaustion from empathic
      engagement — compassion fatigue — that mirrors burnout but tracks exposure to
      others' suffering rather than workload alone.
    citation: "Figley CR (1995). Compassion Fatigue: Coping with Secondary Traumatic Stress Disorder in Those Who Treat the Traumatized. New York: Brunner/Mazel."
    year: 1995
    robustness: robust
    topic_keys: [burnout, compassion_fatigue]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Healthcare, education, social work audiences."
      zh_TW_zh_CN: "Family elder-care compassion fatigue is salient parallel."
      ja_JP: "Nursing/teaching/care work recognition high."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: burn_allostatic_load_mcewen_1998
    entry_type: finding
    claim: >
      Chronic stress accumulates a biological 'wear and tear' load on the body —
      allostatic load — that outlasts any single busy week. The tiredness sleep
      cannot fix is often this accumulated load speaking.
    citation: "McEwen BS (1998). Stress, adaptation, and disease: Allostasis and allostatic load. Annals of the New York Academy of Sciences, 840(1), 33-44."
    year: 1998
    robustness: robust
    topic_keys: [burnout, somatic_healing]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01"]
    locale_framing_notes:
      en_EU: "Somatic framing for body-keeps-the-score readers."
      zh_TW_zh_CN: "TCM-adjacent 'body balance' language may resonate without merging paradigms."
      ja_JP: "Stress-as-physical-depletion culturally accepted."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: burn_job_demands_resources_model_demerouti_2001
    entry_type: finding
    claim: >
      Burnout grows when job demands chronically exceed the resources available to
      meet them — including time, autonomy, support, and recovery. Fixing burnout
      is often an architecture problem, not a motivation problem.
    citation: "Demerouti E, Bakker AB, Nachreiner F, Schaufeli WB (2001). The job demands-resources model of burnout. Journal of Applied Psychology, 86(3), 499-512."
    year: 2001
    robustness: robust
    topic_keys: [burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Supports structural/margin doctrine beats."
      zh_TW_zh_CN: "Resources include family support — not only employer grants."
      ja_JP: "Autonomy limited in hierarchy — name support and recovery as resources."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: burn_case_maslach_teacher_nurse_composites_1997
    entry_type: documented_case
    claim: >
      Christina Maslach's published case studies of teachers and nurses describe
      professionals who loved their calling until chronic overload turned dedication
      into cynicism — and who recovered when workload, fairness, or recovery time
      changed, not when they tried harder.
    citation: "Maslach C, Leiter MP (1997). The Truth About Burnout. San Francisco: Jossey-Bass. Chapters 2-4 (documented occupational case studies)."
    year: 1997
    robustness: robust
    topic_keys: [burnout, compassion_fatigue]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    case_attribution: "Published occupational case studies — Maslach & Leiter (1997)"
    locale_framing_notes:
      en_EU: "Teacher/nurse archetypes widely recognized."
      zh_TW_zh_CN: "Educator/caregiver archetypes translate directly."
      ja_JP: "Nurse/teacher burnout highly salient in public discourse."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: burn_micro_breaks_recovery_2019
    entry_type: finding
    claim: >
      Brief breaks of five to ten minutes spread through the workday — especially
      those involving movement or nature — measurably reduce fatigue and preserve
      afternoon performance better than pushing through.
    citation: "Kim S, Park Y, Niu Q (2017). Micro-break activities at work to recover from daily work demands. Journal of Organizational Behavior, 38(1), 28-44."
    year: 2017
    robustness: mixed
    caveat: "Effect sizes modest; depends on break quality and job type."
    topic_keys: [burnout]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    locale_framing_notes:
      en_EU: "Actionable micro-recovery for commercial brands."
      zh_TW_zh_CN: "Short breaks may be culturally harder in some workplaces — validate constraint."
      ja_JP: "Tea break / short walk culturally familiar."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: burn_sleep_work_spillover_2019
    entry_type: finding
    claim: >
      Work-related rumination at bedtime is one of the strongest bridges between
      occupational burnout and poor sleep — the mind keeps working after hours,
      preventing the nervous system from receiving an 'off-duty' signal.
    citation: "Cropley M, Zijlstra FRH (2011). Work and rumination. In Langan-Fox J, Cooper CL (Eds.), Handbook of Stress in the Occupations. Cheltenham: Edward Elgar."
    year: 2011
    robustness: robust
    topic_keys: [burnout, sleep_anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    locale_framing_notes:
      en_EU: "Evening email habit is concrete hook."
      zh_TW_zh_CN: "After-hours WeChat work groups as rumination trigger."
      ja_JP: "Late-night work messaging culturally specific example."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION
