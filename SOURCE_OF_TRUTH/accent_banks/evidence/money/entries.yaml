    citation: "Atalay AS, Meloy MG (2011). Retail therapy: A strategic effort to improve mood. Psychology & Marketing, 28(6), 638-659."
    year: 2011
    robustness: mixed
    caveat: "Small effects; guilt rebound documented in some studies not all."
