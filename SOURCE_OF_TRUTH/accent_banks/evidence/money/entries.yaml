  - evidence_id: mon_money_scripts_klontz_2011
    entry_type: finding
    claim: >
      Unconscious beliefs about money — 'there is never enough,' 'rich people are
      greedy' — drive spending and saving patterns more than income alone in
      financial psychology research.
    citation: "Klontz BT, Britt SL, Mentzer J, Klontz T (2011). Money Beliefs and Financial Behaviors: Development of the Klontz Money Script Inventory. Journal of Financial Therapy, 3(1), 1-22."
    year: 2011
    robustness: robust
    topic_keys: [money, financial_anxiety, financial_stress]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Distinct from financial_anxiety — belief layer."
      zh_TW_zh_CN: "Intergenerational thrift/scarcity scripts."
      ja_JP: "Post-bubble frugality inheritance."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: mon_mental_accounting_thaler_1999
    entry_type: finding
    claim: >
      People treat money differently depending on mental labels — 'fun money' vs
      'rent money' — which explains irrational-seeming spending that is psychologically
      consistent.
    citation: "Thaler RH (1999). Mental accounting matters. Journal of Behavioral Decision Making, 12(3), 183-206."
    year: 1999
    robustness: robust
    topic_keys: [money]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Envelope budgeting psychology."
      zh_TW_zh_CN: "Family budget mental buckets."
      ja_JP: "Separate household accounts culture."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: mon_loss_aversion_spending_1979
    entry_type: finding
    claim: >
      Losses feel roughly twice as painful as equivalent gains feel good — which
      makes selling investments, admitting bad purchases, or cutting sunk costs
      emotionally harder than spreadsheets suggest.
    citation: "Kahneman D, Tversky A (1979). Prospect Theory. Econometrica, 47(2), 263-291."
    year: 1979
    robustness: robust
    topic_keys: [money, financial_stress]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Sunk-cost fallacy naming."
      zh_TW_zh_CN: "Property loss aversion."
      ja_JP: "Stock loss reluctance."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

