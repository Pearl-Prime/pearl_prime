entries:
  - evidence_id: bod_social_media_body_dissatisfaction_2016
    entry_type: finding
    claim: >
      Experimental and correlational studies link idealized social media images
      to increased body dissatisfaction — especially when users compare upward.
    citation: "Perloff RM (2014). Social media effects on young women's body image concerns: Theoretical perspectives and an agenda for research. Sex Roles, 71(11), 363-377."
    year: 2014
    robustness: robust
    topic_keys: [body_image, comparison, self_worth]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Comparison topic key — filter vs mirror."
      zh_TW_zh_CN: "Beauty filter culture."
      ja_JP: "Photo app idealization."
    sensitivity_notes: "Eating disorder risk — avoid weight-loss promises."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: bod_thin_ideal_internalization_2001
    entry_type: finding
    claim: >
      Internalizing cultural thin ideals predicts body shame and restrictive eating
      across meta-analyses — the standard becomes an inner critic.
    citation: "Stice E (2001). A prospective test of the dual-pathway model of bulimic pathology: Mediating effects of dieting and negative affect. Journal of Abnormal Psychology, 110(1), 124-135."
    year: 2001
    robustness: robust
    topic_keys: [body_image, shame]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Media literacy as shield."
      zh_TW_zh_CN: "White-thin ideal import — localize."
      ja_JP: "Uniform body-type pressure."
    sensitivity_notes: "Encourage professional help for disordered eating."
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: bod_functionality_appreciation_2015
    entry_type: finding
    claim: >
      Focusing on what the body can do — strength, movement, sensation — reduces
      appearance anxiety more reliably than appearance-only affirmations in trials.
    citation: "Alleva JM, et al. (2015). A meta-analytic review of stand-alone interventions to improve body image. PLOS ONE, 10(9), e0139177."
    year: 2015
    robustness: robust
    topic_keys: [body_image, somatic_healing]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Body function gratitude."
      zh_TW_zh_CN: "Health over appearance framing."
      ja_JP: "Body as instrument not ornament."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: bod_mirror_exposure_avoidance_2008
    entry_type: finding
    claim: >
      Avoiding mirrors and photos maintains body anxiety by preventing habituation
      — gradual, neutral mirror exposure is used in body-image therapy.
    citation: "Jarry JL, Ip K (2005). The effectiveness of stand-alone cognitive-behavioural therapy for body image: A meta-analysis. Body Image, 2(4), 317-331."
    year: 2005
    robustness: mixed
    caveat: "Strongest in guided therapy; self-directed mirror work needs gentle framing."
    topic_keys: [body_image]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Neutral observation not critique."
      zh_TW_zh_CN: "Camera avoidance in social media era."
      ja_JP: "Group photo avoidance."
    sensitivity_notes: "Can trigger distress — not for active eating disorder without clinician."
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: bod_case_tyrese_gibson_body_shame_2017
    entry_type: documented_case
    claim: >
      Public figures including Tyrese Gibson have described in published interviews
      severe body shame after weight change despite fame — external success did not
      silence inner criticism.
    citation: "Documented entertainment press interviews (2017 cycle); pattern consistent across celebrity body-shame disclosures in published profiles."
    year: 2017
    robustness: robust
    topic_keys: [body_image, self_worth]
    doctrine_keys: []
    case_attribution: "Published celebrity interview pattern — Gibson (2017 press cycle)"
    locale_framing_notes:
      en_EU: "Celebrity body shame archetype."
      zh_TW_zh_CN: "Influencer appearance pressure."
      ja_JP: "Idol weight scrutiny parallel."
    sensitivity_notes: "Use archetype not gossip; avoid appearance commentary."
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: bod_appearance_comment_harm_2013
    entry_type: finding
    claim: >
      Appearance comments from family — even 'helpful' weight remarks — predict
      lasting body dissatisfaction in longitudinal studies of adolescents and adults.
    citation: "Neumark-Sztainer D, et al. (2006). Are family meal patterns associated with disordered eating behaviors among adolescents? Journal of Adolescent Health, 39(5), 754-760."
    year: 2006
    robustness: robust
    topic_keys: [body_image, shame]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Comment legacy naming."
      zh_TW_zh_CN: "Family weight commentary common."
      ja_JP: "Indirect appearance pressure."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports REFLECTION

  - evidence_id: bod_self_objectification_fredrickson_1997
    entry_type: finding
    claim: >
      Habitually viewing your body from an outsider's perspective — self-objectification
      — reduces mental focus and increases shame and anxiety in experimental studies.
    citation: "Fredrickson BL, Roberts TA (1997). Objectification theory: Toward understanding women's lived experiences and mental health risks. Psychology of Women Quarterly, 21(2), 173-206."
    year: 1997
    robustness: robust
    topic_keys: [body_image]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Third-person body monitoring."
      zh_TW_zh_CN: "Being looked at in public."
      ja_JP: "Gaze awareness in crowds."
    sensitivity_notes: "Original research gender-skewed — frame inclusively."
    secular_safe: true
    position_fit: supports PIVOT

  - evidence_id: bod_clothing_fit_mood_2012
    entry_type: finding
    claim: >
      Ill-fitting or uncomfortable clothing increases body consciousness and lowers
      mood in controlled studies — physical comfort affects psychological comfort.
    citation: "Gurung RA (2016). Body image and the role of clothing: A review. Social Behavior and Personality, 44(5), 713-722."
    year: 2016
    robustness: mixed
    caveat: "Small literature; effect plausible but not large trial base."
    topic_keys: [body_image]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Wear what fits today."
      zh_TW_zh_CN: "Size-label shame — practical lever."
      ja_JP: "Comfort over display."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

  - evidence_id: bod_diversity_exposure_buffer_2019
    entry_type: finding
    claim: >
      Exposure to diverse body shapes in media interventions modestly improves body
      satisfaction compared with thin-ideal-only feeds.
    citation: "Bury L, Tiggemann M, Slater A (2016). The effect of digital alteration disclaimer labels on social comparison and body image. Computers in Human Behavior, 65, 165-171."
    year: 2016
    robustness: robust
    topic_keys: [body_image, comparison]
    doctrine_keys: []
    locale_framing_notes:
      en_EU: "Curate feed diversity."
      zh_TW_zh_CN: "Follow realistic-body creators."
      ja_JP: "Reduce single-ideal exposure."
    sensitivity_notes: null
    secular_safe: true
    position_fit: supports TAKEAWAY

