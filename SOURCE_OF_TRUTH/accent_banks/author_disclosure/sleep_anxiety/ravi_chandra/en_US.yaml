        For a long stretch, my chest ran the ten a.m. standup again at one in the morning, complete with the parts I got right.
        I assumed that meant I still had unfinished business with the day. Usually I did not — the alarm just had not gotten the memo that the day was over.
        What helped was not a wind-down routine; it was learning to notice the rerun as a rerun, not as new evidence.
