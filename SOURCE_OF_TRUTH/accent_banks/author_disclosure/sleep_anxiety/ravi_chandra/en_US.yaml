  position_variants:
    before_THREAD:
      body: |
        I have watched teammates put a hand on the sternum before turning out the light, the same small gesture they use on a loading screen.
        It did not knock them out faster. It gave them one honest signal to check before deciding the night was a write-off.
        The ones who kept doing it were not better sleepers right away — they were harder to convince that being awake meant something was wrong with them.
        Bring that same hand to the next chapter and notice what it tells you before you reach for anything else.
