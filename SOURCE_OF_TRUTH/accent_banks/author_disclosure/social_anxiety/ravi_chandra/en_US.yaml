- disclosure_id: ad_ravi_social_admission_unmute_v01
  disclosure_function: failure_model
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - performed_calm_while_body_alarm_ran
  - body_noise_as_information
  topic_keys: [social_anxiety, anxiety]
  allowed_positions: [after_PIVOT, after_REFLECTION]
  register: witness
  position_variants:
    after_PIVOT:
      body: |
        I had a two-minute ritual before unmuting in a meeting: check my face, check my voice, check that nothing in me looked like it was under siege.
        None of it was about the words I was about to say. It was damage control for an alarm only I could hear.
        What changed was not getting braver on camera — it was letting the alarm exist without spending the two minutes hiding it first.
        See if the next time you are waiting to be called on, you can let the noise be there instead of managing it away first.
    after_REFLECTION:
      body: |
        I had a two-minute ritual before unmuting in a meeting: check my face, check my voice, check that nothing in me looked like it was under siege.
