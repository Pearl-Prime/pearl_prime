    after_REFLECTION:
      body: |
        Ahjan's teaching on the alarm within reframed being watched as a trigger, not a flaw — the alarm doing its job a beat too early, not evidence I could not handle the room.
        That distinction mattered more to me on camera than any script for what to say once I was unmuted.
        I stopped needing the two minutes of preparation to feel entitled to speak.
        Maybe it will help you separate what your body is signaling from what you assume it means about you being seen.

- disclosure_id: ad_ravi_social_endorsement_name_the_freeze_v01
  disclosure_function: vulnerability
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  - harder_to_gaslight_about_feeling
  topic_keys: [social_anxiety]
  allowed_positions: [before_THREAD, after_REFLECTION]
  register: witness
  position_variants:
    before_THREAD:
      body: |
        I have watched teammates name the freeze out loud in their own head — "that is the alarm, not laziness" — right before they were called on.
        It did not make the room feel smaller. It kept them from mistaking the freeze for proof they had nothing to offer.
        The ones who kept naming it were not less nervous; they were harder to convince that the nerves disqualified them from the room.
        Bring that same naming into the next chapter before you decide what your own freeze is evidence of.
