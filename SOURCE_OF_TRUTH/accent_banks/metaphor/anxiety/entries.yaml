- accent_id: metaphor_burnout_taxi_meter_lane07_v01
  accent_class: METAPHOR
  body: 'Here''s the strange accounting of it. A taxi doesn''t have to be moving for the meter to run.
    It can sit at the curb, engine idling, going nowhere - and the fare climbs anyway. Your nervous system
    works the same way. It doesn''t bill you for what you do. It bills you for what it *prepares* you
    to do. The meter doesn''t start when you open the laptop. It starts the moment your body decides the
    day has begun - and your body votes early.


    Mapped mechanism: preparation cost is billed before visible work begins. The nervous system charges
    for readiness, not only for output.


    Boundary: the meter image stops where real structural load begins — it explains invisible spend; it
    does not prove the job is fair or unfair.


    Return to the chapter problem: watch for the moment the body votes that the day has started, before
    anyone has asked anything of you.'
