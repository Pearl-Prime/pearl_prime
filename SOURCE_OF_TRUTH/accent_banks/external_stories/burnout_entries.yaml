    position_fit: supports REFLECTION
    sensitivity_notes: ''
  - story_id: ext_burn_moth_teacher_v01
    type: true_life_broadcast
    emotional_shape: tearjerker
    story: 'Moth storytellers who teach in under-resourced schools often describe a particular fatigue:
      crying in the parking lot after car line, grading until midnight, loving students while resenting
      the job that owns their Sundays. One common line — ''I used to think I was bad at self-care; now
      I think the system is bad at letting me care.''


      Teacher burnout is emotional labor without replenishment. The tearjerker is not dramatic failure
      in the classroom. It is a dedicated adult running on fumes while still remembering every child''s
      name. Recognition is not permission to quit tomorrow — it is refusal to call depletion moral weakness.'
    source: The Moth — teacher burnout stories
    citation: The Moth Radio Hour education-themed episodes; teacher burnout story slams.
    rights_class: paraphrase_attributed
    topic_keys: &id007
    - burnout
    doctrine_keys: &id008
