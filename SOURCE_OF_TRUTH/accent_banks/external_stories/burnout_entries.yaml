    type: historical
    emotional_shape: cautionary
    story: '台灣護理人力長年短缺，健保給付與班表壓力使護理師過勞、離職率居高不下。疫情期間，媒體記錄下連續值班、防護裝備下的脱水與崩潰——許多護理師說不是怕病毒，而是怕撐不完下一班。


      醫療 burnout 是制度性問題：當一個人照顧十幾床病人，身體的警報不是抗壓性差，而是數學上的不可能。台灣聽眾聽見這些故事，常在同一句裡同時感到感激與心酸——因為被照顧者也知道，照顧者正在燃盡。'
    source: 台灣護理人力短缺與過勞議題
    citation: 台灣護理學會人力調查；衛生福利部護理人力統計；疫情期間護理人員報導
