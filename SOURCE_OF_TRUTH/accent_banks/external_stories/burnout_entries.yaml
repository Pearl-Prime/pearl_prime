  - story_id: ext_burn_film_whiplash_v01
    type: film
    emotional_shape: contrast
    story: 'In Damien Chazelle''s Whiplash, jazz drummer Andrew Neiman accepts abuse from conductor Terence
      Fletcher in exchange for greatness — bleeding fingers, isolation, panic attacks reframed as dedication.
      The film asks whether art requires destruction of the self, and leaves the viewer queasy at the
      applause in the final frame.


      Burnout culture often wears Fletcher''s face: no sleep, no mercy, brilliance as excuse. Whiplash
      is nominative mirror, not prescription — a contrast story for anyone who confuses depletion with
      seriousness and calls the wreckage ''passion.'''
    source: Whiplash (2014), Bold Films
    citation: Chazelle, D. (dir.) Whiplash. Bold Films/Sony Pictures Classics, 2014.
    rights_class: nominative_reference
    topic_keys: &id003
    - burnout
