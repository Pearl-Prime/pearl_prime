  universal:
  - story_id: ext_burn_mythic_sisyphus_v01
    type: mythic
    emotional_shape: cautionary
    story: 'Sisyphus, punished by the gods, must push a boulder uphill forever — only to watch it roll
      back each time he nears the summit. Albert Camus later read the myth as absurd heroism: one must
      imagine Sisyphus happy. But the image before philosophy is simpler: exhaustion with no finish line.


      Burnout is not always dramatic collapse. Sometimes it is Sisyphean competence — emails cleared,
      boulder returned, inbox refilled. The body learns that effort no longer purchases rest. The cautionary
      note is not laziness. It is a system that confuses motion with meaning until the pushers cannot
      remember why the hill matters.'
    source: Greek myth — Sisyphus
    citation: Homer, Odyssey XI.593–600; Camus, A. The Myth of Sisyphus (1942).
    rights_class: public_domain_retelling
    topic_keys:
