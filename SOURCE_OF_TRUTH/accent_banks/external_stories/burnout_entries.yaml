  - story_id: ext_burn_historical_florence_nightingale_v01
    type: historical
    emotional_shape: underdog
    story: 'Florence Nightingale revolutionized nursing in the Crimean War — and collapsed afterward with
      what historians now read as chronic illness and probable burnout, bedridden for years while still
      writing reforms from a sickroom. She did not retire from purpose; her body retired from the front.


      The underdog lesson is double: care work can save thousands while extracting the caregiver. Nightingale''s
      later decades prove that burnout does not always look like quitting. Sometimes it looks like genius
      reduced to a desk and a ceiling, still fighting systems from a body that cannot stand.'
    source: Florence Nightingale — post-Crimea illness and work
    citation: Bostridge, M. Florence Nightingale (2008); Nightingale's collected writings; British Library
      archives.
    rights_class: verified_facts_only
    topic_keys: &id005
    - burnout
    doctrine_keys: &id006
