  zh_CN:
  - story_id: ext_burn_zh_cn_zhuge_liang_v01
    type: historical
    emotional_shape: tearjerker
    story: '《三国演义》写诸葛亮北伐七年，''食少事烦，其能久乎''——病逝五丈原时五十四岁。史家与演义都留下一位丞相在国力不济、君主多疑、战线漫长中硬撑的形象：才智绝顶，身体被政务与战事一寸寸耗尽。


      倦怠不一定是现代病。它也可能是''明知不可为而为之''的慢性透支——责任感把睡眠、饮食、退路全部让位给未竟之业。诸葛亮的结局提醒：再强的系统，也经不起长年无恢复的高负荷。'
    source: 诸葛亮 — 北伐与五丈原病逝
    citation: 陈寿《三国志·蜀志·诸葛亮传》；罗贯中《三国演义》第一百零四回
    rights_class: public_domain_retelling
