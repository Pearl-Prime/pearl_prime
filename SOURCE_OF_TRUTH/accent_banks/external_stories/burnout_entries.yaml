    position_fit: supports REFLECTION
    sensitivity_notes: ''
  - story_id: ext_burn_sports_naomi_osaka_v01
    type: sports
    emotional_shape: breakthrough
    story: 'Naomi Osaka withdrew from the 2021 French Open after conflicts over mandatory press obligations,
      citing mental health and long-running burnout from the tour''s demands. She was fined; she paused
      anyway. In subsequent essays she described depression and the pressure of being a global face before
      she felt like a finished person.


      Athletic burnout is often misread as softness. Osaka''s public pause named the trade: visibility
      buys sponsorship but spends nervous-system currency. Her breakthrough was not a trophy — it was
      refusing to keep performing wellness for cameras while running on empty behind them.'
    source: Naomi Osaka — 2021 French Open withdrawal
    citation: Osaka, N. Time essay June 2021; Roland-Garros statements May 2021; WTA press archives.
    rights_class: verified_facts_only
    topic_keys:
    - burnout
    doctrine_keys:
    - COMPOSITE_DOCTRINE v05
    secular_safe: true
    position_fit: supports PIVOT
    sensitivity_notes: ''
  - story_id: ext_burn_business_amazon_warehouse_v01
    type: business
    emotional_shape: cautionary
    story: 'Investigative reporting on Amazon fulfillment centers documented scan rates, timed bathroom
      breaks, injury rates, and turnover so high that bodies are treated as interchangeable throughput.
      Workers described bone-deep fatigue — not one bad week but seasons of speed-up without recovery.


      Burnout at scale is policy, not personality. When metrics reward only output, the warehouse teaches
      what white-collar jobs echo quietly: you are a slot in a machine that does not sleep. Naming institutional
      burnout is the first refusal of shame that pretends the problem is an individual''s poor boundaries.'
    source: Amazon warehouse working conditions — investigative reporting
    citation: Reveal/Center for Investigative Reporting Amazon warehouse series; OSHA injury data; Congressional
      testimony 2021.
    rights_class: verified_facts_only
