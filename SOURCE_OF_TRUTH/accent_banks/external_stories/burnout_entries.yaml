  ja_JP:
  - story_id: ext_burn_ja_jp_salaryman_v01
    type: business
    emotional_shape: quiet-recognition
    story: '日本のサラリーマン文化は、長時間残業、飲み会、休暇取得率の低さを美徳のように語ってきた。メディアは『過労自殺』『うつ』『退職代行』と並べて、同じ構造の別の出口を見せる。現場では、朝の満員電車で目を閉じているだけの疲労が、年次評価では『意欲』に換算されない。


      burnout は、やる気の欠如ではなく、やる気を前提に設計された組織への適応限界である。日本語圏の聴衆にとって、これは個人の性格ではなく、職場の空気の話だ。'
