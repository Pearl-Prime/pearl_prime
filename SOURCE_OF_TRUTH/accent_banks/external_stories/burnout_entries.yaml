  - story_id: ext_burn_storycorps_nurse_v01
    type: true_life_broadcast
    emotional_shape: tearjerker
    story: 'StoryCorps booths have captured nurses telling grandchildren why they stayed through COVID
      — and why some finally left. A recurring detail: the smell of antiseptic on days off, hands cracked
      from washing, the moral injury of triaging who gets a bed. Love for patients and hatred of the conditions
      share one shift.


      Pandemic burnout did not invent the problem; it magnified it. These recordings are primary-source
      proof that exhaustion can coexist with heroism without canceling either. The tearjerker is hearing
      someone say ''I am proud and I am done'' in the same breath — and knowing both can be true without
      canceling the years of care.'
    source: StoryCorps — nursing and pandemic caregiver stories
    citation: StoryCorps COVID-19 archive; National Nurses United testimony themes.
    rights_class: paraphrase_attributed
    topic_keys:
    - burnout
    doctrine_keys:
    - COMPOSITE_DOCTRINE v01
