  - story_id: ext_burn_ted_brown_play_v01
    type: true_life_broadcast
    emotional_shape: breakthrough
    story: 'Researcher Stuart Brown, in TED and clinical work on play, argues that chronic deprivation
      of play correlates with rigidity, depression, and burnout — not because play is frivolous but because
      it is how mammals reset threat detection. Adults who schedule only productivity lose the neurology
      of relief.


      Burnout recovery narratives often start with permission: doodling, pickup games, useless hobbies.
      Brown''s contrast is scientific and gentle — the opposite of hustle culture is not laziness. It
      is restoring a behavior evolution wired for survival, not for quarterly metrics.'
    source: Stuart Brown — play deprivation and burnout research
    citation: Brown, S. TED Talk 'Play is more than fun'; Brown & Vaughan, Play (2009).
    rights_class: paraphrase_attributed
    topic_keys: &id009
    - burnout
    doctrine_keys: &id010
    - COMPOSITE_DOCTRINE v03
    secular_safe: true
    position_fit: supports TAKEAWAY
    sensitivity_notes: ''
  - story_id: ext_burn_business_medical_residents_v01
    type: business
    emotional_shape: cautionary
    story: 'U.S. medical residency programs have long required eighty-hour weeks and overnight shifts
      — a training model defended as tradition and attacked as dangerous. Studies link resident burnout
      to medical errors, depression, and attrition from medicine entirely. Libby Zion''s death in 1984
      helped spark reform debates that continue decades later.


      Institutional burnout dresses in white coats. The cautionary arc is not ''doctors are weak.'' It
      is that a culture requiring self-destruction to enter a healing profession exports exhaustion into
      every patient encounter. The body keeps the score of the schedule.'
    source: Medical resident duty hours and burnout
    citation: Accreditation Council for Graduate Medical Education duty-hour standards; Shanafelt et al.
      physician burnout studies; Libby Zion case history.
    rights_class: verified_facts_only
    topic_keys: &id011
    - burnout
    doctrine_keys: &id012
    - COMPOSITE_DOCTRINE v08
    secular_safe: true
    position_fit: supports PIVOT
    sensitivity_notes: ''
  - story_id: ext_burn_film_journalism_spotlight_v01
    type: film
    emotional_shape: underdog
    story: 'Spotlight follows Boston Globe reporters uncovering clergy abuse — months of dead ends, lawyers
      circling, editors weighing lawsuits against truth. The burnout is moral and procedural: witnesses
      who hang up, folders that multiply, the temptation to let someone else carry the next call.


      Mission-driven work burns differently. The underdog is not the article — it is the reporter''s sleep
      debt and the marriage strained by secrecy. Spotlight reminds that justice stories cost the nervous
      systems of the people who stay on the phone after five o''clock.'
    source: Spotlight (2015), Open Road Films
    citation: McCarthy, T. (dir.) Spotlight. Open Road Films, 2015; Boston Globe investigative series
      2002.
    rights_class: nominative_reference
    topic_keys: &id013
    - burnout
    doctrine_keys: &id014
    - COMPOSITE_DOCTRINE v05
    secular_safe: true
    position_fit: supports REFLECTION
    sensitivity_notes: Institutional abuse theme; nominative reference only.
  - story_id: ext_burn_pop_culture_hustle_v01
    type: pop_culture
    emotional_shape: contrast
    story: 'Silicon Valley ''hustle culture'' — sleep-when-you''re-dead slogans, founder worship, 996
      memes imported from tech overseas — became a pop-culture aesthetic before backlash documented heart
      attacks in thirty-year-olds and ''quiet quitting'' as counter-label. The contrast is stark: the
      same Instagram quotes that glorified grind now sit beside burnout memoirs topping bestseller lists.


      Cultural burnout is collective narrative whiplash. One decade''s virtue (''outwork everyone'') becomes
      the next decade''s diagnosis. Naming the turn does not erase debt from the hustle years — but it
      can stop the shame of a body that finally said no, and let rest count as data instead of defeat.'
    source: Hustle culture — tech and social media discourse
    citation: Odell, J. How to Do Nothing (2019); reporting on 996.ICU movement; burnout memoir trend
      analyses 2021–2023.
    rights_class: verified_facts_only
    topic_keys: &id015
    - burnout
    doctrine_keys: &id016
    - COMPOSITE_DOCTRINE v04
    secular_safe: true
    position_fit: supports REFLECTION
    sensitivity_notes: ''
  - story_id: ext_burn_sports_andre_agassi_v01
    type: sports
    emotional_shape: breakthrough
    story: 'In his autobiography Open, Andre Agassi writes that he hated tennis — a confession shocking
      from an eight-time Grand Slam champion. He describes childhood forced by his father, methamphetamine
      use in 1997, and years performing excellence while emotionally vacant. Recovery involved leaving
      the tour, rebuilding identity, and returning on his own terms.


      Elite burnout is not always overtraining. Sometimes it is performing a life you never chose. Agassi''s
      breakthrough was honesty that threatened his brand and saved his personhood — proof that the scoreboard
      can read ''win'' while the inner ledger reads empty, and that naming the emptiness can be the first
      real victory.'
    source: Andre Agassi — Open autobiography
    citation: Agassi, A. with Moehringer, J.R. Open (2009); ATP career record.
    rights_class: verified_facts_only
    topic_keys: &id017
    - burnout
    doctrine_keys: &id018
    - COMPOSITE_DOCTRINE v05
    secular_safe: true
    position_fit: supports TAKEAWAY
    sensitivity_notes: Substance use referenced; public autobiography facts only.
  - story_id: ext_burn_historical_marie_curie_v01
    type: historical
    emotional_shape: underdog
    story: 'Marie Curie worked in a poorly ventilated shed isolating radium — years of radiation exposure
      she did not yet understand, combined with grief after Pierre''s death and public scandal. She continued
      teaching, fundraising for institutes, and running a mobile X-ray unit during World War I while her
      health deteriorated.


      Burnout meets sacrifice without romance here. Curie''s drive advanced science and cost her body
      — a underdog story not of laziness versus grit, but of a mind that could not stop while the tissue
      slowly failed. The lesson is limits, not lesser devotion: even pioneers need shields the era did
      not provide.'
    source: Marie Curie — laboratory work and wartime service
    citation: Quinn, S. Marie Curie (1995); Curie Nobel lectures; French National Archives.
    rights_class: verified_facts_only
    topic_keys:
    - burnout
    doctrine_keys:
    - COMPOSITE_DOCTRINE v05
    secular_safe: true
    position_fit: supports REFLECTION
