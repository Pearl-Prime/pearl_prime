  - story_id: ext_burn_fresh_air_caregiver_v01
    type: true_life_broadcast
    emotional_shape: quiet-recognition
    story: 'Fresh Air episodes on caregiving — parents of disabled children, adult children of aging parents,
      nurses leaving the profession — share a quiet recognition: burnout arrives as numbness, not only
      tears. Guests describe making lunch on autopilot while grief and resentment sit in the same pan,
      unspoken at church or at work.


      Caregiver burnout is often invisible because love is supposed to be infinite. Hearing someone on
      NPR name the exhaustion without divorcing the love lets listeners exhale. The body is not betraying
      devotion. It is asking for a witness.'
    source: Fresh Air — caregiving and caregiver burnout episodes
    citation: NPR Fresh Air archive; caregiver burnout interview themes (2015–2024).
    rights_class: paraphrase_attributed
    topic_keys:
    - burnout
