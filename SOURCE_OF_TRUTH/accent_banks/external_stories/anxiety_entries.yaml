  - story_id: ext_anx_historical_ada_lovelace_v01
    type: historical
    emotional_shape: contrast
    story: 'Ada Lovelace, daughter of the poet Byron, translated and annotated Charles Babbage''s Analytical
      Engine notes in 1843 — arguably the first published computer program. She also lived under Victorian
      scrutiny: women of her class were not supposed to imagine machines that might think. Her letters
      show exhilaration and doubt braided together — visionary math beside fear of overstepping.


      Anxiety in high ability often sounds like fraudulence before the word existed. Lovelace did not
      wait for permission from her nervous system. She wrote the algorithm anyway — proof that the chest
      tightens and the mind can still publish the future. Her notes remain a map for anyone whose hands
      shake over work that matters.'
    source: Ada Lovelace — Analytical Engine notes
    citation: Lovelace, A. Notes on L. F. Menabrea (1843); Fuegi, J. Lovelace & Babbage (2003) IEEE Annals.
    rights_class: verified_facts_only
