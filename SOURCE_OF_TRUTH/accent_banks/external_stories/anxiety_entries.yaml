  - story_id: ext_anx_fresh_air_anxiety_theme_v01
    type: true_life_broadcast
    emotional_shape: quiet-recognition
    story: 'NPR''s Fresh Air has repeatedly hosted clinicians, writers, and public figures discussing
      anxiety as a civilizational hum — not only pathology but the sound of hyper-vigilant bodies in news
      cycles, caregiving, and creative work. A recurring listener theme in call-in segments: ''I look
      fine at dinner and rehearse catastrophes in the car.''


      Fresh Air''s register is conversational precision — naming worry without moralizing it. For anxious
      listeners, hearing a voice describe the split between exterior competence and interior alarm can
      be the first normalization that does not demand a cure on Wednesday. Recognition is not resolution.
      It is oxygen — the kind that lets you stay in the conversation without pretending the alarm is silent.'
    source: Fresh Air — anxiety and mental health episode themes
    citation: NPR Fresh Air archive; Terry Gross interviews on anxiety disorders and stress (2010s–2020s).
    rights_class: paraphrase_attributed
    topic_keys:
    - anxiety
