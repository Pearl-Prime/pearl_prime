  - story_id: ext_anx_film_shoplifters_v01
    type: film
    emotional_shape: tearjerker
    story: '是枝裕和の『万引き家族』は、貧困のなかで結びついた疑似家族が、盗みと愛情の境界で暮らす物語だ。子どもは店の死角を覚える一方、世界への不安は''捕まるかもしれない''という身体感覚として常に残る。幸福な場面にも、聴衆は追い詰められた神経を忘れられない。


      経済的不安と社会的不安は分離できない。日本の視聴者にとって、この映画は『お金の心配』が家族の呼吸をどう細くするかを、fictionとしてではなく生活の近さで見せる——それ自体が不安の言語化になる。'
    source: 万引き家族（2018）、是枝裕和監督
    citation: 是枝裕和『万引き家族』ギャガ、2018；カンヌ国際映画祭 パルム・ドール
    rights_class: nominative_reference
    topic_keys: &id019
