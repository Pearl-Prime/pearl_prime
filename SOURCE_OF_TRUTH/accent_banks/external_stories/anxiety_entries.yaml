  - story_id: ext_anx_historical_lincoln_melancholy_v01
    type: historical
    emotional_shape: quiet-recognition
    story: 'Abraham Lincoln''s contemporaries documented a man prone to deep melancholy — long depressive
      episodes, suicidal language in his youth, and a temperament historians later read alongside his
      stamina during the Civil War. He did not have our vocabulary for anxiety disorders, but the record
      describes a leader who knew the interior weather and still filed briefs, buried a son, and delivered
      the Gettysburg Address.


      American civic myth likes steady nerves. Lincoln''s verified melancholy offers a counter-myth: the
      alarm can be chronic while duty remains choosable. Anxiety here is not weakness disqualifying power.
      It is a documented human backdrop to decisions that could not wait for perfect calm.'
    source: Abraham Lincoln — documented melancholy
    citation: Shenk, J.W. Lincoln's Melancholy (2005); Lincoln legal papers and contemporary memoirs.
    rights_class: verified_facts_only
