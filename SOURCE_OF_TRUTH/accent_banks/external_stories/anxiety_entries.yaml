  - story_id: ext_anx_film_inside_out_v01
    type: film
    emotional_shape: breakthrough
    story: 'In Pixar''s Inside Out, eleven-year-old Riley''s emotions are personified — Joy tries to run
      the console alone while Sadness is treated as contamination. When Riley''s family moves cities,
      Joy''s control strategy collapses; only when Sadness is allowed to name loss does Riley reconnect
      with her parents and regain coherent feeling.


      The film''s anxiety insight is structural: panic is not always fear out of control. Sometimes it
      is ungrieved change managed by a part that believes happiness must monopolize the dashboard. Riley''s
      recovery begins when mixed feelings are permitted to coexist — not when Joy wins the argument. That
      is anxiety named as logistics, not moral failure: many bodies need more than one emotion on stage
      at once.'
    source: Inside Out (2015), Pixar Animation Studios
    citation: Docter, P. & Del Carmen, R. (dirs.) Inside Out. Disney/Pixar, 2015.
    rights_class: nominative_reference
