  - story_id: ext_anx_business_nokia_v01
    type: business
    emotional_shape: cautionary
    story: 'Nokia dominated mobile phones in the early 2000s — then smartphones rewrote the category.
      Public postmortems describe internal fear of killing successful product lines, fragmented software
      bets, and the anxiety of admitting that the map said ''turn here'' years before the company did.
      Microsoft acquired Nokia''s devices unit in 2013 as the brand''s phone era ended.


      Market anxiety is collective: thousands of competent people can share a silence about the obvious
      because naming it means becoming the messenger who gets shot. Nokia''s arc is not ridicule. It is
      what happens when alarm is whispered in meetings but not priced into strategy until the window closes.'
    source: Nokia smartphone transition and decline
    citation: Chesbrough, H. Nokia's smartphone era analyses; Microsoft–Nokia acquisition 2013; Nokia
      annual reports 2007–2013.
    rights_class: verified_facts_only
    topic_keys:
    - anxiety
    doctrine_keys:
