  zh_TW:
  - story_id: ext_anx_zh_cn_sima_qian_v01
    type: historical
    emotional_shape: underdog
    story: '司马迁因替李陵辩护触怒汉武帝，受宫刑。对于士大夫而言，这是比死更难承受的屈辱；他在《报任安书》里写自己曾欲自尽，却选择活下来完成《史记》。身体与名誉的焦虑并未消失，被他织进《太史公自序》的使命感里。


      焦虑有时不是逃避工作的借口，而是极端羞辱之后仍要继续书写的代价。司马迁的例子说明：最剧烈的精神震荡，也可能与最长线的见证并存——不是因为他不痛，而是因为他把痛写进了时间的账本。'
    source: 司马迁 — 《报任安书》与《史记》
    citation: 司马迁《史记·太史公自序》；《报任安书》
