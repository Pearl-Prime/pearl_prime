  - story_id: ext_anx_moth_stage_fright_v01
    type: true_life_broadcast
    emotional_shape: humor
    story: 'On The Moth, performers routinely describe stage fright as a bodily hijacking — knees liquifying,
      mouth drying, the moment before the microphone when the story you rehearsed in the shower evaporates.
      One recurring arc: the teller walks into the light anyway, forgets a line, laughs, and discovers
      the audience is not a tribunal but witnesses.


      Performance anxiety shrinks when the goal shifts from ''be flawless'' to ''be in contact.'' The
      Moth archive is proof that shaking hands can still hold a true sentence. The humor is not mockery.
      It is recognition that terror and telling can share a stage. The body can tremble and still deliver
      the true sentence the room came to hear.'
    source: The Moth — stage fright and performance anxiety stories
    citation: The Moth Radio Hour and podcast archive; live story slam recordings.
    rights_class: paraphrase_attributed
