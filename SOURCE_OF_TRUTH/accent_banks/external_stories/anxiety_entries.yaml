  ja_JP:
  - story_id: ext_anx_ja_jp_karoshi_v01
    type: business
    emotional_shape: cautionary
    story: '1980年代、日本で「過労死（かろうし）」という言葉が社会的に固定化した。長時間労働、休暇不使用、倒れても休めない空気——不安は個人の心配事ではなく、職場の構造として身体に刻まれた。政府は後年、労災認定基準を拡大し、メディアは若手社員の急死を繰り返し報じた。


      日本の聴衆にとって、仕事の不安は『明日の会議』だけではない。『このまま働き続けても大丈夫か』という慢性的な身体警報である。過労死の史は、個人の弱さではなく、警報を無視させる文化の費用だ。'
    source: 日本の過労死問題 — 1980年代以降
    citation: 厚生労働省 過労死等の労災補償状況；西垣通『過労死』岩波新書
    rights_class: verified_facts_only
    topic_keys:
    - anxiety
    doctrine_keys:
    - COMPOSITE_DOCTRINE v08
    secular_safe: true
    position_fit: supports PIVOT
    sensitivity_notes: 労働災害・死亡テーマ。簡潔な公共事実のみ。
  - story_id: ext_anx_film_shoplifters_v01
    type: film
    emotional_shape: tearjerker
    story: '是枝裕和の『万引き家族』は、貧困のなかで結びついた疑似家族が、盗みと愛情の境界で暮らす物語だ。子どもは店の死角を覚える一方、世界への不安は''捕まるかもしれない''という身体感覚として常に残る。幸福な場面にも、聴衆は追い詰められた神経を忘れられない。


      経済的不安と社会的不安は分離できない。日本の視聴者にとって、この映画は『お金の心配』が家族の呼吸をどう細くするかを、fictionとしてではなく生活の近さで見せる——それ自体が不安の言語化になる。'
    source: 万引き家族（2018）、是枝裕和監督
    citation: 是枝裕和『万引き家族』ギャガ、2018；カンヌ国際映画祭 パルム・ドール
