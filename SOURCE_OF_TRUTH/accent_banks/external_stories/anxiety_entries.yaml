  - story_id: ext_anx_mythic_icarus_v01
    type: mythic
    emotional_shape: cautionary
    story: 'Daedalus built wings of wax and feather for himself and his son Icarus to escape Crete. He
      warned: fly the middle path — not too low where the sea''s damp clings, not too high where the sun
      melts wax. Icarus soared anyway, intoxicated by height, and fell into the sea.


      The myth is usually taught as hubris. It is also an anxiety map: the terror of moderation when ecstasy
      is available. Many anxious people do not fear falling. They fear the moment after success — when
      the body asks whether you can hold altitude without burning the very structure that lifted you.'
    source: Greek myth — Icarus and Daedalus
    citation: Ovid, Metamorphoses VIII.183–235; Apollodorus, Bibliotheca III.15.9.
    rights_class: public_domain_retelling
