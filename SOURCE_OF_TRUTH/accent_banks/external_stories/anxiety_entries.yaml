  - story_id: ext_anx_sports_simone_biles_tokyo_v01
    type: sports
    emotional_shape: breakthrough
    story: 'At the Tokyo 2020 Olympics, Simone Biles withdrew from several gymnastics finals, citing the
      ''twisties'' — a disorienting loss of spatial awareness in the air. The world wanted a medal narrative;
      Biles offered a nervous-system narrative. She said she could have competed for the team but risked
      serious injury because her body and mind were not synchronized.


      Performance anxiety at that altitude is not stage fright with chalk. It is the moment when the skill
      that once felt automatic demands proof you still trust gravity. Biles named the alarm publicly and
      chose safety over applause. For many listeners, that was the first time anxiety in elite sport sounded
      like courage instead of quitting.'
    source: Simone Biles — Tokyo 2020 Olympics withdrawal
    citation: IOC press conferences July 2021; Biles statements via USA Gymnastics; NBC Olympic coverage.
    rights_class: verified_facts_only
