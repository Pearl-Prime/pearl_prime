  - story_id: ext_anx_business_kodak_digital_v01
    type: business
    emotional_shape: cautionary
    story: 'Kodak invented the first digital camera in 1975 — and then protected its film cash cow for
      decades while the world learned to photograph without rolls. Executives understood the technology;
      anxiety about cannibalizing profit kept the future in a lab drawer. When digital finally swallowed
      the market, Kodak filed for bankruptcy in 2012.


      Corporate anxiety often masquerades as prudence. The cautionary lesson is not ''innovate faster.''
      It is that bodies and institutions share a reflex: when the safe identity is threatened, we postpone
      the obvious until the cliff arrives. Kodak''s fear was not ignorance. It was attachment to a story
      that used to work.'
    source: Kodak digital camera invention and bankruptcy arc
    citation: Anthony, S. The Little Black Book of Innovation (2011); Kodak Chapter 11 filing Jan 2012;
      Rochester Democrat and Chronicle archives.
    rights_class: verified_facts_only
