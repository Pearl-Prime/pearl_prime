    position_fit: supports PIVOT
    sensitivity_notes: ''
  - story_id: ext_anx_ted_mcgonigal_stress_v01
    type: true_life_broadcast
    emotional_shape: contrast
    story: 'Health psychologist Kelly McGonigal, in her widely cited TED talk ''How to Make Stress Your
      Friend,'' revisits research on stress beliefs: people who interpret physiological arousal as harmful
      show worse cardiovascular outcomes than those who read the same sensations as the body rising to
      a challenge. She does not claim stress is pleasant — she reframes the secondary anxiety about anxiety.


      For listeners whose chest tightens before meetings, the contrast is liberating: part of the damage
      may be the story layered on top of the pulse. Naming stress as performance preparation will not
      erase fear, but it can shrink the shame that pretends a human body should never activate.'
    source: Kelly McGonigal — TED talk on stress mindset
    citation: McGonigal, K. TED Global 2013 'How to Make Stress Your Friend'; Jamieson et al. stress reappraisal
      studies.
    rights_class: paraphrase_attributed
