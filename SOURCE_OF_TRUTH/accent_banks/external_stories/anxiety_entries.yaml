  - story_id: ext_anx_storycorps_911_v01
    type: true_life_broadcast
    emotional_shape: tearjerker
    story: 'StoryCorps recorded hundreds of conversations about September 11, 2001 — spouses describing
      last phone calls, children asking why a parent did not come home, first responders whose bodies
      stayed on alert for years after the dust settled. A recurring thread is not only grief but hyper-vigilance:
      sirens that rewind time, subway stops that feel like traps.


      Collective trauma seeds personal anxiety. The 9/11 archive documents how a nation''s worst day becomes
      a private nervous system soundtrack — proof that worry after catastrophe is not overreaction. It
      is memory doing unfinished work in the chest — and naming that work is often the first way the present
      stops feeling like trespass.'
    source: StoryCorps — September 11 remembrance archive
    citation: StoryCorps 9/11 Initiative; National September 11 Memorial & Museum oral history partnerships.
    rights_class: paraphrase_attributed
    topic_keys:
    - anxiety
    doctrine_keys:
