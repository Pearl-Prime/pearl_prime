  - story_id: ext_anx_historical_darwin_palpitations_v01
    type: historical
    emotional_shape: quiet-recognition
    story: 'Charles Darwin suffered decades of palpitations, trembling, nausea, and dread so severe that
      he often could not leave his home at Down House. Victorian physicians called it nervous illness;
      modern readers recognize anxiety in a body that would not stand down. Darwin still finished On the
      Origin of Species — not because the alarm stopped, but because he built a life around its rhythm:
      short walks, strict routine, letters instead of lecture halls.


      Anxiety is not proof you cannot do the work. Sometimes it is proof your nervous system is loud while
      your mind is still accurate. Darwin''s palpitations did not invalidate his eye for finches. They
      named the cost of seeing clearly in a world that punishes new answers.'
    source: Charles Darwin — documented health and anxiety
    citation: Darwin, C. Autobiography; Colp, R. Darwin's Illness (2008); Darwin Correspondence Project.
    rights_class: verified_facts_only
