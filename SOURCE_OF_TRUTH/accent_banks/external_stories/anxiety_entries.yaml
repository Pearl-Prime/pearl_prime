  - story_id: ext_anx_film_gravity_v01
    type: film
    emotional_shape: underdog
    story: 'In Alfonso Cuarón''s Gravity, astronaut Ryan Stone is stranded after debris destroys her shuttle.
      Oxygen ticks down; every grab for handholds is also a grab against panic. The film''s terror is
      not only space — it is breath becoming a ledger. Stone must do precision work while grief and hyperventilation
      compete for the same ribcage.


      Anxiety often feels like zero gravity: no friction, no floor, no proof the next minute will arrive.
      Stone''s arc is not fearless mastery. It is acting with trembling hands because the alternative
      is drift. The body learns one rung at a time that panic and motion can occupy the same suit.'
    source: Gravity (2013), Warner Bros.
    citation: Cuarón, A. (dir.) Gravity. Warner Bros., 2013.
    rights_class: nominative_reference
