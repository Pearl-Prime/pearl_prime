  - story_id: ext_anx_zh_cn_xiang_yu_v01
    type: historical
    emotional_shape: cautionary
    story: '项羽垓下被围，夜闻四面楚歌，以为楚地尽失，军心瓦解。《史记》写他惊惶、饮酒悲歌，次日突围至乌江，自觉无颜见江东父老而自刎。后世读此，常叹其刚烈，亦见其焦虑如何在一夜之间放大为''全盘皆输''的叙事。


      灾难化思维并不现代：当环境音被解读为灭顶证据，最勇的人也会把一次失利写成终局。项羽的故事是警示——警报声可能是真实的，但大脑给警报配的字幕，未必是史实。'
    source: 项羽 — 垓下之战与乌江自刎
    citation: 司马迁《史记·项羽本纪》
    rights_class: public_domain_retelling
    topic_keys: &id015
    - anxiety
    doctrine_keys: &id016
    - COMPOSITE_DOCTRINE v04
    secular_safe: true
    position_fit: supports PIVOT
    sensitivity_notes: ''
  - story_id: ext_anx_zh_cn_su_shi_v01
    type: historical
    emotional_shape: breakthrough
    story: '苏轼一生多次贬谪，乌台诗案后几近丧命，黄州时期贫病交加。他在《定风波》里写：''莫听穿林打叶声，何妨吟啸且徐行。''并非无雨，而是雨声中选择不把每一滴都听成审判。后世读者从中取出的是焦虑与旷达并存的证据——不是否认政治恐惧，而是在恐惧里练习步伐。


      中文语境里的焦虑疗愈常引用苏轼，不是因为他无忧无虑，而是因为他把外部不确定写进了词牌，让身体记得：惊雷在耳，仍可徐行。'
    source: 苏轼 — 黄州时期与《定风波》
    citation: 苏轼《定风波·莫听穿林打叶声》；《宋史·苏轼传》
    rights_class: public_domain_retelling
