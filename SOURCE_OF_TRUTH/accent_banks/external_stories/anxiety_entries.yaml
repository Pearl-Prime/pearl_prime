  - story_id: ext_anx_zh_cn_xiang_yu_v01
    type: historical
    emotional_shape: cautionary
    story: '项羽垓下被围，夜闻四面楚歌，以为楚地尽失，军心瓦解。《史记》写他惊惶、饮酒悲歌，次日突围至乌江，自觉无颜见江东父老而自刎。后世读此，常叹其刚烈，亦见其焦虑如何在一夜之间放大为''全盘皆输''的叙事。


      灾难化思维并不现代：当环境音被解读为灭顶证据，最勇的人也会把一次失利写成终局。项羽的故事是警示——警报声可能是真实的，但大脑给警报配的字幕，未必是史实。'
    source: 项羽 — 垓下之战与乌江自刎
    citation: 司马迁《史记·项羽本纪》
