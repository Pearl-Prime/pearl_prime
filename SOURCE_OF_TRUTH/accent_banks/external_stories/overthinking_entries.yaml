  - story_id: ext_over_film_beautiful_mind_v01
    type: film
    emotional_shape: contrast
    story: 'A Beautiful Mind portrays mathematician John Nash''s struggle with schizophrenia — including
      periods when paranoid ideation flooded his ability to trust perception. The film''s dramatized arc
      shows Nash learning to discriminate which thoughts require engagement and which must be walked past
      without negotiation.


      Overthinking at clinical intensity is not ''just worry harder.'' But for subclinical listeners,
      Nash''s later strategy offers a secular metaphor: not every thought earns a seat at the table. Some
      lines of reasoning are noise wearing a suit. The contrast is discipline without self-contempt —
      notice, label, decline to follow.'
    source: A Beautiful Mind (2001), Universal Pictures
    citation: Howard, R. (dir.) A Beautiful Mind. Universal, 2001; Nasar, S. biography (1998).
    rights_class: nominative_reference
    topic_keys: &id003
    - overthinking
    doctrine_keys: &id004
    - COMPOSITE_DOCTRINE v04
    secular_safe: true
    position_fit: supports PIVOT
    sensitivity_notes: Mental illness portrayed; nominative reference, not clinical advice.
  - story_id: ext_over_sports_chuck_knoblauch_v01
    type: sports
    emotional_shape: cautionary
    story: 'Yankees second baseman Chuck Knoblauch developed ''the yips'' — overthinking a throw he had
      made thousands of times, he began sailing balls into the stands. Sports psychology case studies
      cite his visible hesitation: the mind inserting a camera between hand and glove until muscle memory
      could not run.


      Athletic overthinking is embodied proof that analysis can sabotage automation. The cautionary note
      for daily life: the spreadsheet in your head during a simple email or handshake is the same mechanism.
      Thought arrives to help, stays to direct, and suddenly you cannot release the ball.'
    source: Chuck Knoblauch — throwing yips
    citation: ESPN retrospective on Knoblauch yips; sports psychology literature on performance breakdown.
    rights_class: verified_facts_only
    topic_keys: &id005
    - overthinking
    doctrine_keys: &id006
