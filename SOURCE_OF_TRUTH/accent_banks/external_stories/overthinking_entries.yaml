    secular_safe: true
    position_fit: supports PIVOT
    sensitivity_notes: ''
  - story_id: ext_over_ted_rumination_v01
    type: true_life_broadcast
    emotional_shape: breakthrough
    story: 'Psychologist Guy Winch, in TED talks on emotional first aid, describes rumination — replaying
      conversations, drafting imaginary arguments, scanning for mistakes — as a habit that feels like
      problem-solving but rarely produces new information. Studies link repetitive thought to depression
      maintenance and sleep disruption.


      The breakthrough is naming the loop: overthinking is not depth; it is a stuck refresh button. Winch''s
      practical contrast — set a ten-minute worry window, then change physical context — gives listeners
      permission to treat thoughts as events, not commands. Discipline without denying the feeling''s
      pull.'
    source: Guy Winch — TED talks on rumination
    citation: Winch, G. TED Talk 'Why we all need to practice emotional first aid'; Winch, Emotional First
      Aid (2013).
    rights_class: paraphrase_attributed
    topic_keys: &id009
    - overthinking
    doctrine_keys: &id010
    - COMPOSITE_DOCTRINE v03
    secular_safe: true
    position_fit: supports TAKEAWAY
    sensitivity_notes: ''
  - story_id: ext_over_moth_wedding_speech_v01
    type: true_life_broadcast
    emotional_shape: humor
    story: 'Moth tellers often recount overthinking a wedding toast — rewriting index cards in the bathroom,
      debating whether the second joke insults Aunt Carol, practicing tone in the mirror until the moment
      sounds rehearsed and hollow. The punchline is usually that the speech that landed was the shorter,
      messier one.


      Social overthinking is performance multiplied by love — you care, so the mind generates seventeen
      versions of embarrassment. Hearing it on stage normalizes the absurdity. The audience did not want
      perfection. They wanted presence. The humor loosens the grip of the draft that will never be final
      enough.'
    source: The Moth — wedding and speech anxiety stories
    citation: The Moth podcast archive; wedding toast story themes.
    rights_class: paraphrase_attributed
    topic_keys: &id011
    - overthinking
    doctrine_keys: &id012
