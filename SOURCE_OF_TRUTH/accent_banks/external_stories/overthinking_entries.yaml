  - story_id: ext_over_business_paralysis_analysis_v01
    type: business
    emotional_shape: cautionary
    story: 'Kodak and Blockbuster are often cited in business schools alongside a quieter pattern: teams
      that commissioned endless studies while competitors shipped. Intel under Andy Grove famously warned
      that ''only the paranoid survive'' — but Grove also demanded decision dates, because paranoia without
      deadlines becomes churn.


      Corporate overthinking is meetings about meetings, decks that refine risk color but never pick a
      lane. The cautionary lesson mirrors personal rumination: intelligence multiplies scenarios faster
      than it closes them. Strategy requires a calendar, not only a spreadsheet.'
    source: Corporate analysis paralysis — business case patterns
    citation: Grove, A. Only the Paranoid Survive (1996); Christensen, C. disruption case studies.
    rights_class: verified_facts_only
    topic_keys: &id007
    - overthinking
    doctrine_keys: &id008
