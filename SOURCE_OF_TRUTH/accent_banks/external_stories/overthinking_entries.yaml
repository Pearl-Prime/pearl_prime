  universal:
  - story_id: ext_over_mythic_buridan_ass_v01
    type: mythic
    emotional_shape: humor
    story: 'Medieval philosophy tells of Buridan''s ass — a donkey equally hungry and thirsty, placed
      exactly between hay and water, unable to decide which need to satisfy first, and starving while
      deliberating. The parable is absurd on purpose: perfect balance between options becomes paralysis.


      Overthinking often feels sophisticated — weighing every variable — but the ass is the honest mirror.
      Analysis without a stopping rule is not wisdom. It is hunger next to water while the mind writes
      another pros-and-cons list. The humor is gentle: your catastrophe is also a donkey meme philosophers
      have told for centuries.'
    source: Buridan's ass — medieval decision paradox
    citation: Buridan, J. commentaries on Aristotle; standard philosophy of decision retelling.
    rights_class: public_domain_retelling
    topic_keys:
    - overthinking
