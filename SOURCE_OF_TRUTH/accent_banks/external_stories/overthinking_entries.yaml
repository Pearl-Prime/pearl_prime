  ja_JP:
  - story_id: ext_over_ja_jp_perfectionism_v01
    type: pop_culture
    emotional_shape: quiet-recognition
    story: '日本では『完璧主義』と『考えすぎ』がセットで語られることが多い。手紙の一言、敬語の一段、職場の返信タイミング——相手の顔が見えないまま何度も下書きを直す。SNSでは『メンヘラ』などのレッテルと戦いながら、過剰な自省が日常化している。


      過剰思考は、配慮の裏返しでもある。相手を傷つけたくないという優しさが、送信ボタンの前でループする。日本語圏の聴衆には、『気遣い』と『停止できない頭』の距離が近い。'
    source: 日本の完璧主義・過剰配慮文化
