  - story_id: ext_over_fresh_air_insomnia_v01
    type: true_life_broadcast
    emotional_shape: quiet-recognition
    story: 'Fresh Air interviews on insomnia and anxiety frequently return to the same hour: 3 a.m., when
      the brain reopen cases closed at noon — an email tone, a parenting mistake, a number on a statement.
      Guests describe not sleeping because thinking feels like preparation, even when preparation has
      no dawn task attached.


      Night overthinking borrows tomorrow''s energy for imaginary trials. Fresh Air''s quiet register
      — clinicians and memoirists side by side — helps listeners hear that the courtroom is closed. The
      thoughts are real; the verdict can wait for coffee and daylight.'
    source: Fresh Air — insomnia and nighttime rumination episodes
    citation: NPR Fresh Air sleep and anxiety archives; interview themes on 3 a.m. worry.
    rights_class: paraphrase_attributed
    topic_keys:
