    story: '台灣升學制度長年把『考試』做成全家的時間軸：補習班、模考、志願序反覆演算。新聞與紀錄片記錄學生失眠、反覆檢查答案卡、考上後仍無法停止擔心下一關——過度思考從考場延伸到人生每一個選擇。


      這不是個人『想太多』的道德問題，而是制度把不確定性壓在年輕人身上的結果。台灣聽眾聽見這個故事，常點頭於『明明已經考了100分，還在想若當初少寫一個字』的身體記憶。'
    source: 台灣升學壓力與考試文化
    citation: 教育部統計；台灣升學制度研究；媒體紀錄補教與學生壓力
