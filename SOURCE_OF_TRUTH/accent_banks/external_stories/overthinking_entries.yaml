    secular_safe: true
    position_fit: supports REFLECTION
    sensitivity_notes: ''
  - story_id: ext_over_book_hamlet_v01
    type: book
    emotional_shape: contrast
    story: 'Shakespeare''s Hamlet is literature''s longest meditation on delay — to act or not, to trust
      the ghost, to kill Claudius at prayer. Soliloquies turn impulse into philosophy until bodies pile
      on stage. Audiences for four centuries have recognized themselves in a prince who thinks past the
      moment action would suffice.


      Hamlet is not a mental-health manual. As cultural reference, he embodies overthinking as tragedy:
      intelligence that cannot land. The contrast invites a question without mockery — which of your current
      loops are conscience, and which are theater your life keeps funding?'
    source: Hamlet — William Shakespeare
    citation: Shakespeare, W. Hamlet (c. 1600); Arden Shakespeare critical editions.
    rights_class: public_domain_retelling
    topic_keys: &id013
    - overthinking
    doctrine_keys: &id014
