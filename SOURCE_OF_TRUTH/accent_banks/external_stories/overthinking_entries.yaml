  - story_id: ext_over_storycorps_regret_v01
    type: true_life_broadcast
    emotional_shape: tearjerker
    story: 'StoryCorps conversations about regret often feature elders replaying a single conversation
      — words not said, moves not made — for decades. The overthinking is retrospective: the mind edits
      a film that cannot be reshot, searching for the branch where courage lived.


      These recordings are tearful and ordinary. They teach that rumination about the past feels like
      loyalty to someone you hurt or left. The gentle pivot is not ''stop caring.'' It is noticing when
      memory becomes a courtroom with no appeals process — and when the living deserve today''s attention
      more than yesterday''s rewrite.'
    source: StoryCorps — regret and life-review conversations
    citation: StoryCorps archive; National Day of Listening regret-themed segments.
    rights_class: paraphrase_attributed
    topic_keys:
