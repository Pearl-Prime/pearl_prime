  - story_id: ext_over_sports_simone_manual_v01
    type: sports
    emotional_shape: breakthrough
    story: 'Gymnasts describe ''mental blocks'' on skills they have landed thousands of times — the body
      freezes while the mind runs catastrophe footage. Simone Biles, beyond Tokyo''s twisties, has spoken
      about needing to relearn trust panel by panel, thought by thought, not muscling through.


      Overthinking in sport is not abstract. It is a split second where cognition overrides motor scripts.
      Biles naming the block publicly gave language to anyone whose expertise suddenly demands conscious
      micromanagement. The breakthrough is permission to scale back until the automatic returns — speed
      is not always virtue.'
    source: Simone Biles — mental blocks in gymnastics
    citation: Biles interviews on mental blocks; sports psychology literature on skill regression.
    rights_class: verified_facts_only
    topic_keys:
    - overthinking
    doctrine_keys:
    - COMPOSITE_DOCTRINE v05
