    position_fit: supports REFLECTION
    sensitivity_notes: ''
  - story_id: ext_over_historical_churchill_decisions_v01
    type: historical
    emotional_shape: contrast
    story: 'Winston Churchill''s wartime memos show a leader who could deliberate endlessly — red-penciling
      drafts, demanding more data, walking the halls at 2 a.m. — and still issue decisive orders before
      dawn. Colleagues described both exhaustive analysis and sudden action, not one without the other.


      Overthinking is not always inability to act. Sometimes it is the mind''s rehearsal room before the
      lever is pulled. Churchill''s contrast is useful: rumination with a deadline can be strategy, not
      pathology — until the rehearsal outlasts the war''s need for a decision. The hinge is whether thought
      serves motion or replaces it.'
    source: Winston Churchill — wartime decision-making
    citation: 'Churchill, W. The Second World War memoirs; Gilbert, M. Churchill: A Life (1991).'
    rights_class: verified_facts_only
    topic_keys: &id001
    - overthinking
    doctrine_keys: &id002
