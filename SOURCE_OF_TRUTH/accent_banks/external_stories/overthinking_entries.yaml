  - story_id: ext_over_film_social_network_v01
    type: film
    emotional_shape: cautionary
    story: 'The Social Network depicts Mark Zuckerberg coding Facemash and Facebook while relationships
      fracture — scenes of rapid iteration paired with obsessive replay of slights and status. Whether
      or not every scene is historically precise, the film''s cultural takeaway is familiar: the mind
      that outthinks social hurt can build empires and still eat alone in a conference room.


      Overthinking grievances can fuel achievement and starve connection. The cautionary mirror is not
      anti-ambition. It asks whether your mental loops serve creation or revenge — and whether the scoreboard
      you are building measures the life you want.'
    source: The Social Network (2010), Columbia Pictures
    citation: Fincher, D. (dir.) The Social Network. Columbia, 2010; Mezrich, B. The Accidental Billionaires
      (2009).
    rights_class: nominative_reference
    topic_keys: &id015
