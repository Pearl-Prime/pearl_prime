    position_fit: supports TAKEAWAY
    sensitivity_notes: ''
  - story_id: ext_over_business_intel_grove_v01
    type: business
    emotional_shape: contrast
    story: 'Andy Grove, former Intel CEO, built a culture of constructive worry — scenario planning, competitive
      fear, red-flag meetings. He also institutionalized ''constructive confrontation'' with deadlines:
      worry must terminate in a decision owner and date, or it is theater.


      For overthinkers in careers, Grove offers a contrast model. Paranoia is fuel; calendar is brake.
      The mind may generate fifty futures by lunch — leadership discipline asks which future gets a prototype
      this week. Thinking without a ship date is hobby; with one, it is strategy.'
    source: Andy Grove — Intel decision culture
    citation: Grove, A. High Output Management (1983); Only the Paranoid Survive (1996).
    rights_class: verified_facts_only
    topic_keys: &id017
    - overthinking
    doctrine_keys: &id018
    - COMPOSITE_DOCTRINE v03
    secular_safe: true
    position_fit: supports TAKEAWAY
    sensitivity_notes: ''
  - story_id: ext_over_pop_culture_paradox_choice_v01
    type: pop_culture
    emotional_shape: contrast
    story: 'Psychologist Barry Schwartz''s ''paradox of choice'' research — popularized in TED talks and
      his book — shows that more options can increase regret, paralysis, and second-guessing. Supermarket
      jam studies and 401(k) enrollment patterns suggest the mind treats every extra door as responsibility
      to optimize.


      Modern overthinking is partly inventory management: streaming menus, dating apps, career ladders.
      Schwartz does not preach minimalism as moral superiority. He names the cognitive tax of abundance
      — permission to satisfice, to pick good-enough and close the browser tab without a tribunal.'
    source: Barry Schwartz — paradox of choice
    citation: Schwartz, B. The Paradox of Choice (2004); Schwartz TED Talk on choice.
    rights_class: paraphrase_attributed
    topic_keys: &id019
    - overthinking
    doctrine_keys: &id020
    - COMPOSITE_DOCTRINE v03
    secular_safe: true
    position_fit: supports REFLECTION
    sensitivity_notes: ''
