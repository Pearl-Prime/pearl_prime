# External Stories bank — Wave 1 (Pearl_Research)
# Status: unwired — no pipeline consumer until accent build lane opens.
# Spec: specs/EXTERNAL_STORIES_BANK_SPEC.md
# KNOWN_UNWIRED: accent_banks/external_stories/ — bank seeded; composer/planner consumer absent.

bank_id: external_stories_wave_1
status: unwired
wave: 1
authority: Pearl_Research
created: 2026-07-07
schema_version: "1.0.0"

integrity_rule: |
  Rule 0: Pen-name authors have no real biography and no clients. This bank contains
  zero fabricated true stories, zero claimed client cases, zero invented author history.
  Every entry is verifiable external fact, cultural-work reference, or attributed broadcast.

entry_schema:
  required:
    - story_id
    - type
    - emotional_shape
    - story
    - source
    - citation
    - rights_class
    - topic_keys
    - doctrine_keys
    - locale_fit
    - secular_safe
    - position_fit
  optional:
    - persona_fit
    - sensitivity_notes

topics_wave_1:
  anxiety:
    priority: P0
    target: 15-20
    path: anxiety_entries.yaml
  burnout:
    priority: P0
    target: 15-20
    path: burnout_entries.yaml
  overthinking:
    priority: P0
    target: 15-20
    path: overthinking_entries.yaml
  imposter_syndrome:
    priority: P0
    target: 15-20
    path: imposter_syndrome_entries.yaml
  financial_anxiety:
    priority: P0
    target: 15-20
    path: financial_anxiety_entries.yaml

layout_wave_1: flat_entries_per_topic

locale_clusters_wave_1:
  universal: "Cross-market — Olympics, global myth, Kodak/Nokia arcs"
  en_US: "Western history, US broadcast, Hollywood nominative reference"
  zh_CN: "Chinese history and idiom; PRC sensitivity exclusions enforced"
  zh_TW: "Traditional Chinese canon; Taiwan-resonant figures"
  ja_JP: "Japanese history, workplace culture, Zen-adjacent public figures"

story_mix_profiles: config/authoring/story_mix_profiles.yaml

verification_artifacts:
  ledger: artifacts/research/external_stories_verification_ledger.jsonl
  rejected: artifacts/research/external_stories_rejected_log.jsonl
  sensitivity_exclusions: artifacts/research/external_stories_sensitivity_exclusion_log.jsonl
  emit_script: scripts/research/emit_external_stories_wave1.py
  corpus: scripts/research/external_stories_wave1_corpus.py

