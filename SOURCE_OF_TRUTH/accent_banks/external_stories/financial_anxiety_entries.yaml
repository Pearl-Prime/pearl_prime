  universal:
  - story_id: ext_fin_1929_black_tuesday_v01
    type: historical
    emotional_shape: cautionary
    story: 'On October 29, 1929, the New York Stock Exchange lost billions in a single session. Crowds
      gathered on Wall Street not because everyone owned stocks — many did not — but because the crash
      rewrote the story of tomorrow. Banks failed. Savings vanished. The anxiety outlasted the trading
      floor: a generation that learned to hoard cash in coffee tins and mistrust any promise of stability.


      Financial anxiety is often memory in the body — not only your memory. The crash taught that numbers
      on paper can erase kitchens and college funds overnight. The wound is not irrational. It is inherited
      caution from a market that proved it could eat its believers.'
    source: Wall Street Crash of 1929
    citation: Galbraith, J.K. The Great Crash 1929 (1954); Federal Reserve historical archives.
