    type: pop_culture
    emotional_shape: humor
    story: '近藤麻理恵の『人生がときめく片づけの魔法』が世界的大ヒットしたとき、日本では''捨てられない不安''という言葉も流行した——物を捨てることへの金融的・感情的恐れ。持っていることで安心する身体は、片づけ本を読んでもなかなか手を離せない。


      笑い話の裏にあるのは、お金と物は同じ回路で''将来の備え''として脳に登録されている、という認識。'
