  - story_id: ext_fin_moth_paycheck_to_paycheck_v01
    type: true_life_broadcast
    emotional_shape: quiet-recognition
    story: 'A Moth storyteller described checking her bank app in the grocery line — not because she was
      buying anything fancy, but because she needed to know if the card would decline for milk. She said
      the shame was not poverty itself but performing calm while doing math in public.


      Financial anxiety is often invisible until a beep at the register. The story names the split screen:
      face forward, numbers scrolling behind the eyes.'
    source: The Moth — financial stress story
    citation: The Moth Radio Hour archive; paycheck-to-paycheck theme episodes.
    rights_class: paraphrase_attributed
