  - story_id: ext_fin_ted_saez_inequality_v01
    type: true_life_broadcast
    emotional_shape: contrast
    story: 'Economist Emmanuel Saez, in TED and academic lectures, documented how income growth since
      the 1980s concentrated at the top while median wages stagnated. The charts are numbers; the anxiety
      they explain is lived — two-income families feeling poorer than one-income families decades ago.


      Financial anxiety is not only personal failure. Sometimes it is accurate math against a ladder with
      missing rungs. Naming the structure does not pay the rent, but it can stop the shame from pretending
      the rent is late because you are lazy.'
    source: Emmanuel Saez — inequality research presentations
    citation: Saez, E. & Zucman, G. The Triumph of Injustice (2019); TED Talk data presentations.
    rights_class: paraphrase_attributed
    topic_keys: &id009
