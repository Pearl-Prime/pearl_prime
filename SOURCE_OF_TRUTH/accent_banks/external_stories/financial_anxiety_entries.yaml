  zh_CN:
  - story_id: ext_fin_zh_cn_salt_iron_monopoly_v01
    type: historical
    emotional_shape: contrast
    story: '汉代盐铁官营，民间小贩私贩盐几钱即可入狱。司马迁在《史记》里写商人''富者田连阡陌，贫者无立锥之地''——钱不只是数字，是能否合法活下去的门槛。古代读者听见的金融焦虑，是盐价、徭役、灾荒叠加时，明天还有没有饭吃。


      今日焦虑多关于账户余额，但身体里古老的脚本类似：资源突然收紧，错误不可撤回。历史提醒——对缺口的恐惧有时比缺口本身更老。'
    source: 汉代盐铁论 — 《史记·平准书》
    citation: 司马迁《史记·平准书》；《盐铁论》桓宽
    rights_class: public_domain_retelling
    topic_keys: &id015
    - financial_anxiety
    - financial_stress
    doctrine_keys: &id016
    - COMPOSITE_DOCTRINE v04
    secular_safe: true
    position_fit: supports REFLECTION
    sensitivity_notes: ''
  - story_id: ext_fin_zh_cn_red_mansion_decay_v01
    type: book
    emotional_shape: tearjerker
    story: '《红楼梦》里贾府的败落，不是一夜赌博，而是账目、人情、排场与季节性的入不敷出慢慢蚀空根基。宝玉看见的仍是花与诗，管事的人已在暗处拆借。读者感到的不只是家族悲剧，还有一种熟悉的现代寒意：外表体面还在，底层数字已经红灯。


      金融焦虑有时就是这样——危机先发生在账本里，身体要晚一季才听见。'
    source: 《红楼梦》贾府败落
    citation: 曹雪芹《红楼梦》后四十回情节线；程高本
    rights_class: nominative_reference
