  - story_id: ext_fin_ja_jp_bubble_1991_v01
    type: business
    emotional_shape: cautionary
    story: '1991年、日本のバブル経済が崩壊した。東京の地価神話は消え、銀行は不良債権に苦しみ、失われた三十年と呼ばれる停滞が始まった。バブル期に借りて買った人々は、資産価値だけでなく将来の物語も失った。


      金融不安は、数字が減ったあとも''二度と豊かになれないかもしれない''というナarrativeを残す。身体は帳簿より遅れて安心する。'
    source: 日本バブル経済崩壊
    citation: 日本銀行歴史資料；失われた三十年研究（野口悠紀雄ほか）
    rights_class: verified_facts_only
