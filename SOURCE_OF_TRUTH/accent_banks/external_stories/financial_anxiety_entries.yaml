  - story_id: ext_fin_storycorps_great_depression_v01
    type: true_life_broadcast
    emotional_shape: tearjerker
    story: 'StoryCorps recorded grandchildren interviewing grandparents who lived through the Great Depression.
      A recurring detail: shoes repaired with cardboard, flour-sack dresses, the smell of a mother''s
      fear when the radio said ''bank holiday.'' One woman said she still cannot throw away a clean jar.


      Financial anxiety transmitted across generations is not overspending guilt. It is a child who learned
      that safety is a cupboard that might be empty Thursday.'
    source: StoryCorps — Great Depression archive
    citation: StoryCorps National Day of Listening; Depression-era oral history collections.
