  - story_id: ext_fin_pursuit_happyness_2006_v01
    type: film
    emotional_shape: underdog
    story: 'The Pursuit of Happyness follows Chris Gardner sleeping in a BART station bathroom with his
      young son while interning unpaid at a brokerage. The film''s power is not the happy ending on Wall
      Street. It is the middle — the locked door, the shoes outside, the father''s hand over the child''s
      ears so he will not hear knocking.


      Financial anxiety is often shame about proximity to fall. Gardner''s story names the cliff edge
      without pretending everyone gets the internship. The hinge is dignity maintained in a room that
      was never meant to be a bedroom.'
    source: The Pursuit of Happyness (2006), Columbia Pictures
    citation: Muccino, G. (dir.) The Pursuit of Happyness. Columbia, 2006; Gardner, C. memoir.
    rights_class: nominative_reference
