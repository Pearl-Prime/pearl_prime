  - story_id: ext_fin_enron_pension_v01
    type: business
    emotional_shape: cautionary
    story: 'When Enron collapsed in 2001, employees lost jobs and retirement accounts heavily invested
      in company stock — some lost everything while executives cashed out. Congress later heard testimony
      from workers who had trusted the logo on their 401(k) statements more than diversification.


      Financial anxiety after Enron is structural mistrust: the institution that promised your future
      sold the future first. The body learns to treat ''company loyalty'' in a portfolio as a warning
      label.'
    source: Enron scandal — employee pension losses
    citation: U.S. Senate hearings 2002; McLean, B. & Elkind, P. The Smartest Guys in the Room (2003).
    rights_class: verified_facts_only
