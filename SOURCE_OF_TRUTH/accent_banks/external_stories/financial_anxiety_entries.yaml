  - story_id: ext_fin_lehman_weekend_2008_v01
    type: business
    emotional_shape: tearjerker
    story: 'On the weekend of September 13, 2008, Lehman Brothers executives learned the U.S. government
      would not rescue the firm. By Monday it filed the largest bankruptcy in American history. Employees
      carried boxes out of offices; retirement accounts tied to company stock collapsed. Many had not
      believed the institution could die.


      Financial anxiety after 2008 is not only personal budgeting fear. It is the memory that the logo
      on your badge is not a floor — it is a raft that can sink while you are still polishing the deck.'
    source: Lehman Brothers bankruptcy — 2008 financial crisis
    citation: McDonald, L. & Robinson, P. A Colossal Failure of Common Sense (2009); bankruptcy filing
      15 Sep 2008.
