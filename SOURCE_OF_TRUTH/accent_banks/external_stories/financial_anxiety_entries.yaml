  - story_id: ext_fin_fresh_air_ramsey_debt_v01
    type: true_life_broadcast
    emotional_shape: contrast
    story: 'Fresh Air has hosted both debt-relief advocates and critics of shame-based personal finance
      culture. A recurring listener theme across episodes: the voicemail shame when creditors call during
      dinner — children learning that money is a secret that makes parents'' voices smaller.


      Financial anxiety is acoustic before it is arithmetic. The contrast Fresh Air draws is between individual
      bootstraps rhetoric and the sound of a house trying to be normal while the phone rings.'
    source: Fresh Air — personal finance and debt episodes
    citation: NPR Fresh Air archive; debt culture episode themes.
    rights_class: paraphrase_attributed
    topic_keys:
    - financial_anxiety
    - financial_stress
