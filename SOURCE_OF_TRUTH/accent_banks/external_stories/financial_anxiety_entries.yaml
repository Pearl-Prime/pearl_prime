  - story_id: ext_fin_pop_culture_lottery_curse_v01
    type: pop_culture
    emotional_shape: contrast
    story: 'Multiple studies of lottery winners show a pattern journalists call the ''lottery curse''
      — many return to baseline happiness or worse within years; bankruptcies and estranged families are
      common enough to be a genre in tabloid coverage. The contrast: everyone imagines money will quiet
      the alarm, yet sudden wealth often turns the alarm up — who to trust, how to say no, what if it
      ends.


      Financial anxiety is not only about not having enough. Sometimes it is about not believing enough
      will stay.'
    source: Lottery winner outcome research
    citation: Brickman, P. et al. (1978). Lottery winners and accident victims. Journal of Personality
      and Social Psychology.
    rights_class: verified_facts_only
