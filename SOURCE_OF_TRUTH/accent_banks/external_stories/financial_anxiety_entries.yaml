  - story_id: ext_fin_midas_myth_v01
    type: mythic
    emotional_shape: cautionary
    story: 'King Midas asked that everything he touch turn to gold. Dionysus granted it. Midas starved
      because food became metal in his mouth; he turned his daughter into a statue with a hug. He begged
      to be relieved of the gift.


      The myth is not anti-wealth. It is anti-wish without cost accounting. Financial anxiety often sounds
      like scarcity, but underneath is Midas logic — terror that the thing you wanted will cost the untranslatable:
      time, relationship, sleep, the ability to enjoy what you already have.'
    source: Greek myth — King Midas
    citation: Ovid, Metamorphoses XI.85–145; standard mythographic retelling.
    rights_class: public_domain_retelling
