  - story_id: ext_fin_zh_tw_bubble_taiwan_1990_v01
    type: historical
    emotional_shape: cautionary
    story: '1990年代台灣股市飆升後崩盤，許多家庭把積蓄押在股票與土地，一夜之間縮水。新聞留下自殺率上升、夫妻爭吵、中年失業的紀錄。對經歷過的人，後來的繁榮並沒有完全沖淡身體裡的警報——''再來一次怎麼辦''。


      金融焦慮在台灣常帶著世代的肌肉記憶，不只是個人理財技巧問題。'
    source: 1990年代台灣股市泡沫
    citation: 台灣中央銀行金融穩定報告；學術研究台股泡沫文獻
