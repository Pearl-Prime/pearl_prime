  - story_id: ext_fin_olympics_nadia_comaneci_v01
    type: sports
    emotional_shape: underdog
    story: 'Nadia Comaneci scored the first perfect ten in Olympic gymnastics in 1976 — then defected
      from Romania years later, describing life under a regime that controlled earnings and travel while
      she generated global fame. The financial anxiety was political: your body is an asset the state
      owns.


      Her later life in the West included rebuilding security from scratch. The underdog arc is not the
      medal. It is learning that applause does not automatically convert to a bank account you control.'
    source: Nadia Comaneci — Olympic career and defection
    citation: Comaneci, N. Letters to a Young Gymnast (2003); Olympic film archive 1976.
    rights_class: verified_facts_only
    topic_keys:
    - financial_anxiety
