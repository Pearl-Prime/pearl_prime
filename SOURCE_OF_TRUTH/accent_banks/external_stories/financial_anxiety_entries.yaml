  - story_id: ext_fin_sports_mike_tyson_bankrupt_v01
    type: sports
    emotional_shape: cautionary
    story: 'Mike Tyson earned over three hundred million dollars in the ring and filed for bankruptcy
      in 2003. Public accounts cited entourages, lawsuits, and spending without structure — velocity without
      a floor. The cautionary arc is not mockery. It is proof that income spikes do not teach the nervous
      system safety; sometimes they teach that money is infinite until it is not.


      Financial anxiety after windfalls is real: the body never updated from scarcity, or updated to party,
      but not to guard.'
    source: Mike Tyson bankruptcy — public financial record
    citation: U.S. Bankruptcy Court filing 2003; ESPN financial retrospective reporting.
    rights_class: verified_facts_only
