  - essence_id: we_anx_body_first_awareness_v01
    theme: body_first_awareness
    topic_keys: [anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02"]
    source_teachers: [ahjan, junko, sai_ma, master_wu]
    source_refs:
      - ahjan_TEACHER_DOCTRINE_000
      - junko_TEACHER_DOCTRINE_001
      - sai_ma_TEACHER_DOCTRINE_000
      - master_wu_TEACHER_DOCTRINE_001
    secular_safe: true
    position_fit: after_REFLECTION
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          Before the explanation arrives, the body has already spoken. The chest has tightened. The jaw has set. The shoulders have climbed toward the ears while the mind was still assembling its first reasonable sentence about why everything is fine. This is not a failure of intelligence. It is the order of operations in a nervous system that learned to scan for danger long before language showed up to narrate the scan.

          Every wisdom path that has survived contact with ordinary life arrives at the same starting place: look where the signal actually is. Not at the story about the signal. Not at the verdict the story produces. At the heat, the clench, the shallow breath, the hand that moved to the sternum before anyone could name what was wrong. The body cannot lie the way the mind can. It registers first and explains second.

          When anxiety is running your day, the most useful question is not what you are afraid of. It is what the body is doing right now. Where is the tightness sitting. Where is the breath. What changed in the last ten seconds that no one in the room noticed except the part of you that lives below thought. That is the data. Everything else is commentary.

          Carry that orientation into the exercise that follows — begin where the signal already is, not where the explanation wishes it had started.
    # LOCALIZATION-ADDED (zh-TW, flagship_phase2_layer6): loader has no locale
    # dispatch yet for this bank (see phoenix_v4/planning/accent_planner.py
    # _load_wisdom_essence — reads register_variants.secular.body directly with
    # no locale param). Content staged here in the same shape as register_variants
    # so a one-line loader change can pick it up. Reported to Pearl_Dev.
    locale_variants:
      zh_TW:
        secular:
          body: |
            在解釋抵達之前，身體早已開口。胸口先是一緊，下顎繃緊，肩膀不自覺地往耳朵靠近——而心智還在組織它第一句「一切都沒事」的合理說詞。這不是智力上的失誤。這是一套運作順序：神經系統早在語言學會為警報配上旁白之前，就已經學會了掃描危險。

            每一條真正經得起日常生活考驗的智慧之路，最終都回到同一個起點：去看訊號真正所在之處。不是訊號所編織的故事，也不是那個故事所下的判決。而是那股熱意、那陣緊縮、那淺淺的呼吸、那隻在任何人還來不及說清楚哪裡不對勁之前，就已經按上胸骨的手。身體不會像心智那樣說謊。它總是先登記，後解釋。

            當焦慮主宰你的一天時，最有用的問題不是「你在害怕什麼」，而是「此刻身體正在做什麼」。緊繃停留在哪裡。呼吸停在哪裡。過去十秒鐘，房間裡沒有人察覺、卻只有活在思考之下的那部分的你注意到了什麼變化。這才是數據。其餘的，都只是評論。

            把這份定向感帶進接下來的練習——從訊號已經所在之處開始，而不是從解釋希望它開始的地方開始。
      wisdom_traditions:
        examples:
          - "The body registers before the mind explains — look there first."
          - "Sensation is the first language; interpretation comes second."
          - "What the chest already knows, argument cannot reach."
      tradition_attributed:
        examples:
          - "In the forest contemplative line, awareness begins at sensation, not belief."
          - "East Asian calligraphic training teaches the hand to speak before the commentary arrives."
          - "Somatic healing traditions treat the body as the first reporter, not the mind's witness."

  - essence_id: we_anx_noticing_without_fixing_v01
    theme: noticing_without_fixing
    topic_keys: [anxiety, overthinking]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03"]
    source_teachers: [ahjan, sai_ma, master_feung, junko]
    source_refs:
      - ahjan_TEACHER_DOCTRINE_001
      - sai_ma_TEACHER_DOCTRINE_006
      - master_feung_TEACHER_DOCTRINE_000
      - junko_TEACHER_DOCTRINE_002
    secular_safe: true
    position_fit: after_REFLECTION
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          There is a difference between seeing what is happening and turning seeing into another job. Most people notice the tight chest and immediately begin managing it — softening, correcting, diagnosing, asking why this is happening again. The noticing lasted half a second. The fixing lasted the rest of the hour. That is not awareness. That is supervision.

          Mindfulness, in the sense that actually helps with anxiety, is closer to looking at a candle without adjusting it. If you keep moving the candle to make it burn correctly, you are not looking at it. You are managing it. The same is true for whatever is moving through the body right now. The willingness to see without correcting is the whole practice. The seeing itself changes things — but only when you stop converting every glance into a repair project.

          Try the smaller sentence: the chest is tight. Full stop. Not the chest is tight and therefore something is wrong with me. Not the chest is tight so I must fix it before the meeting. Just: the chest is tight. Awareness gives a sensation room to complete what it came to do. Management keeps it in place by paying close attention without ever letting it finish.

          Take that distinction into the scene ahead — notice what arrives without appointing yourself its supervisor.
      wisdom_traditions:
        examples:
          - "See without correcting; the seeing is the practice."
          - "Bare attention lets sensation complete its arc."
          - "Management is not the same as awareness."
      tradition_attributed:
        examples:
          - "In bare-attention practice, the instruction is to look without adjusting the candle."
          - "Contemplative lineages distinguish witnessing from fixing — the witness does not manage."
          - "Calligraphic masters teach receiving the mark before revising it."

  - essence_id: we_anx_bracing_cost_v01
    theme: bracing_cost
    topic_keys: [anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v03", "COMPOSITE_DOCTRINE v08"]
    source_teachers: [ahjan, sai_ma, master_wu, master_feung]
    source_refs:
      - ahjan_TEACHER_DOCTRINE_002
      - sai_ma_TEACHER_DOCTRINE_000
      - master_wu_TEACHER_DOCTRINE_003
      - master_feung_TEACHER_DOCTRINE_001
    secular_safe: true
    position_fit: after_REFLECTION
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          Much of what people call anxiety is not the original alarm. It is the cost of staying braced after the alarm sounded. The body dressed for impact that is not arriving. Shoulders up. Jaw set. Breath shallow. Stomach hard. Every muscle half-engaged, half-ready, while the room is ordinary and the deadline is real but not lethal. The system has been on duty so long that standing down feels like exposure.

          This is one of the most invisible forms of suffering because it looks like competence from the outside. You can perform fine while every cell stays on watch. The cost arrives later — in the neck that never releases, the gut that stops digesting well, the sleep that requires help, the numbness that follows years of vigilance because no one ever told the body the war was over.

          The original sensation rises and passes in minutes if it is not held in place. The bracing can last all day. What traditional paths name as the second arrow is often larger than the first: not the tightness, but the war against the tightness. When resistance meets sensation, the system reads resistance as proof the threat continues. The alarm stays on because you are fighting the alarm.

          Let that land before the exercise — the bracing may cost more than the wave it was meant to stop.
      wisdom_traditions:
        examples:
          - "The war against the sensation often costs more than the sensation."
          - "Chronic bracing is competence wearing armor nobody can see."
          - "Resistance keeps the alarm sounding after the room is safe."
      tradition_attributed:
        examples:
          - "Forest-contemplative teaching names the second layer of suffering as resistance to what is already here."
          - "East Asian brush traditions know tension held too long ruins the stroke — release is part of the art."
          - "Somatic lineages map chronic vigilance as a protective pattern that outlived its threat."

  - essence_id: we_anx_self_compassion_worth_v01
    theme: self_compassion_worth
    topic_keys: [anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    source_teachers: [sai_ma, master_feung, ahjan, junko]
    source_refs:
      - sai_ma_TEACHER_DOCTRINE_000
      - sai_ma_TEACHER_DOCTRINE_004
      - master_feung_TEACHER_DOCTRINE_000
      - ahjan_TEACHER_DOCTRINE_003
    secular_safe: true
    position_fit: before_THREAD
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          Anxiety often arrives with a hidden verdict: you should not be feeling this. Not at your age. Not at your level. Not after everything you have done to get better. The alarm itself is difficult enough. Then a second voice joins it — the voice that treats the alarm as evidence you have failed to become the person you were supposed to be.

          Every durable tradition of healing eventually turns the gaze inward with tenderness rather than prosecution. Not because suffering is desirable, but because the exhausted, braced, doubting version of you is still part of the composition. The painting does not need your polished performance. It needs your actual mark — the one only you can make from where you stand right now. Gentleness toward your own limits is not self-indulgence. It is the condition under which anything real can change.

          You do not have to earn the right to receive care by first eliminating the fear. The fear is happening in a body that also deserves steadiness, warmth, and the end of the private war against its own signals. When love — or even simple decency — finally reaches you, you are not taking something from the world. You are warming the instrument the world actually needs.

          Hold that permission as you step into the thread that follows — you are allowed to meet yourself where you are, not where the anxiety says you should already be.
      wisdom_traditions:
        examples:
          - "Tenderness toward the braced self is not weakness; it is where change begins."
          - "You do not have to earn care by first defeating the fear."
          - "The composition needs your actual mark, not your polished performance."
      tradition_attributed:
        examples:
          - "In the maternal contemplative line, the sacred is described as already seated in the chest — exhaustion does not disqualify you."
          - "Chinese calligraphic teaching holds every mark as belonging to the whole scroll, including the dark strokes."
          - "Compassion practices train outward kindness by first letting it reach the one in the mirror."

  - essence_id: we_anx_impermanence_weather_v01
    theme: impermanence_weather
    topic_keys: [anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v01", "COMPOSITE_DOCTRINE v06"]
    source_teachers: [sai_ma, master_feung, ahjan, master_wu]
    source_refs:
      - sai_ma_TEACHER_DOCTRINE_006
      - master_feung_TEACHER_DOCTRINE_001
      - ahjan_TEACHER_DOCTRINE_001
      - master_wu_TEACHER_DOCTRINE_001
    secular_safe: true
    position_fit: after_REFLECTION
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          Anxiety has a weather quality if you watch it long enough. Fronts move in. Pressure drops. The sky darkens without warning. Then — if you do not freeze the system by bracing against every shift — the front passes. The body is built to discharge surges when they are allowed to complete. What feels permanent in the middle of a spike is often a moving system mistaken for a fixed identity.

          This is why ancient metaphors keep returning to sky and weather. The storm is real. The damage it can do to a day is real. And the sky that holds the storm was there before it arrived and remains after it leaves. You are not the weather. You are the field the weather moves through. The tightness, the heat, the racing thought — these are conditions passing, not the whole climate of your life.

          Impermanence is not a consolation prize for people who cannot fix themselves. It is a precise observation about how sensation behaves when it is met rather than arrested. The loop that plays at three in the morning is loud. It is also a recording of conditions, not a final verdict on who you are. What rises can fall. What tightens can soften. What shouts can finish its sentence and leave.

          Read the weather honestly, then carry that wider sky into the practice ahead.
      wisdom_traditions:
        examples:
          - "Anxiety moves like weather; the sky that holds it remains."
          - "What rises can complete its arc when it is not held in place."
          - "The storm is real; permanence is usually a misreading."
      tradition_attributed:
        examples:
          - "Contemplative lineages compare passing states to weather over an unchanged sky."
          - "East Asian painting tradition treats darkness as pigment in the composition, not a mistake on the scroll."
          - "Geomantic observation reads land as dynamic relationship — conditions shift while the field remains."

  - essence_id: we_anx_observing_self_v01
    theme: observing_self
    topic_keys: [anxiety, overthinking]
    doctrine_keys: ["COMPOSITE_DOCTRINE v04"]
    source_teachers: [junko, ahjan, master_feung, sai_ma]
    source_refs:
      - junko_TEACHER_DOCTRINE_000
      - ahjan_TEACHER_DOCTRINE_001
      - ahjan_TEACHER_DOCTRINE_009
      - master_feung_TEACHER_DOCTRINE_002
    secular_safe: true
    position_fit: after_REFLECTION
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          When anxiety fills the whole room, there seems to be no one left to watch it. The chest tightening is the world. The racing thought is the only voice. But notice what happens in the half-second before the old reaction fires: something sees the tightness arriving. Something notices the pattern getting ready to run its program. That seeing part is not the panic. It is the place awareness returns to when the storm is given a little space.

          This is the move every reflective tradition eventually teaches in its own vocabulary — not becoming a different person, but discovering the part of you that is not identical to whatever is happening. The observer does not need to be serene. It only needs to be present long enough to say: there is the fear, and here is the one who can see the fear. That distance is small. It is also the beginning of choice.

          Most people dismiss the half-second because the reaction still happened afterward. Wrong standard. The half-second was not supposed to stop everything. It was supposed to exist. Awareness, even briefly, is the seed every later freedom grows from. You do not need a perfect twenty-minute sit. You need one honest glance that says: oh, there it is.

          Let that witness stay lit as you move into the exercise — you are not only the alarm; you are also the one who can see it ringing.
      wisdom_traditions:
        examples:
          - "There is the fear, and there is the one who can see the fear."
          - "The half-second of noticing counts even when the reaction follows."
          - "Awareness creates a small distance; distance creates choice."
      tradition_attributed:
        examples:
          - "Contemplative training distinguishes the field of experience from what moves through it."
          - "Receptive lineages describe the self as tuned instrument, not identical to every signal passing through."
          - "Calligraphic mastery is recognizable because the maker's presence survives in the stroke."

  - essence_id: we_anx_already_complete_v01
    theme: already_complete
    topic_keys: [anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v05"]
    source_teachers: [master_feung, sai_ma, ahjan, master_sha]
    source_refs:
      - master_feung_TEACHER_DOCTRINE_000
      - master_feung_TEACHER_DOCTRINE_002
      - sai_ma_TEACHER_DOCTRINE_002
      - ahjan_TEACHER_DOCTRINE_003
    secular_safe: true
    position_fit: before_THREAD
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          Anxiety often sells a future bargain: become calm first, then you will be acceptable. Become steady first, then you can rest. Become the improved version, and only then will you count as whole. That bargain keeps the body braced because wholeness is always one repair away. Every wisdom tradition that lasts longer than a trend eventually reverses the order. You begin from what is already here.

          Look at any enduring art form and the instruction is the same. The scroll speaks as a whole before any single character is judged. The brush does not improve by imitating a better brush; it improves by becoming more fully what it already is. You are one mark in a larger composition — not a mistake waiting to be erased, not a draft version of someone else. The question is not whether you match an ideal. The question is whether you are fully present in your own stroke.

          Awareness is closer to homecoming than achievement. The breath has already been moving. The ground has already been under your feet. The room you paced inside for years did not need to be built. You only walked away in your head. Coming back is rest, not conquest. You are not failing because anxiety is here. You are a living person in whom anxiety is one weather pattern among many.

          Step into the thread carrying that completeness — not finished, not flawless, already enough to begin.
      wisdom_traditions:
        examples:
          - "Wholeness is not earned by first defeating the alarm."
          - "The brush becomes itself; it does not replace itself with an ideal."
          - "Homecoming is rest, not conquest."
      tradition_attributed:
        examples:
          - "Chinese calligraphic lineages teach receiving the whole scroll before judging any single character."
          - "Contemplative homecoming practices treat awareness as a return, not an acquisition."
          - "Embodied devotional lineages locate the sacred as already present, not stored on a distant shelf."

  - essence_id: we_anx_suffering_as_pigment_v01
    theme: suffering_as_pigment
    topic_keys: [anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v06"]
    source_teachers: [master_feung, ahjan, sai_ma, master_wu]
    source_refs:
      - master_feung_TEACHER_DOCTRINE_001
      - master_feung_TEACHER_DOCTRINE_003
      - ahjan_TEACHER_DOCTRINE_002
      - sai_ma_TEACHER_DOCTRINE_006
    secular_safe: true
    position_fit: after_REFLECTION
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          There is a habit of treating difficult feeling as contamination — something that should not be on the canvas, evidence the painting went wrong. Anxiety intensifies this habit because it arrives with urgency. Fix this. Hide this. Make it stop before anyone sees. But the traditions that have watched human lives across centuries describe darkness differently. Not as error waiting to be scraped off. As pigment. As part of what gives the composition depth.

          Long frustration in any real craft eventually enters the work. The student practices for weeks without progress, then one morning the hand moves differently. What changed is not the absence of difficulty. The difficulty pressed inward until it opened something comfort would not have opened. Your longing, grief, and sense that something has not yet arrived are not proof you were overlooked. They are signs you are awake to your own life.

          This does not mean seeking pain or romanticizing distress. It means refusing to treat every hard state as disqualifying evidence. Anxiety can be information, weather, and pigment at once — real, temporary, and part of a larger picture that is still being made. Do not resolve the feeling prematurely just to escape the discomfort of not yet knowing what it is asking you to paint.

          Carry that reframe into the integration ahead — the dark stroke may belong to the whole.
      wisdom_traditions:
        examples:
          - "Difficulty can enter the work instead of standing outside it."
          - "Darkness in the composition is pigment, not proof of failure."
          - "Do not resolve the feeling before you learn what it is asking."
      tradition_attributed:
        examples:
          - "Chinese calligraphic masters describe frustration as part of the learning that opens the hand."
          - "Grand-scroll teaching holds empty space and dark strokes as equally necessary to the whole."
          - "Contemplative lineages witness centuries of upheaval and preserve darkness as part of the composition, not its ruin."

  - essence_id: we_anx_transmission_beyond_mind_v01
    theme: transmission_beyond_mind
    topic_keys: [anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v07"]
    source_teachers: [junko, master_sha, ahjan, master_feung]
    source_refs:
      - junko_TEACHER_DOCTRINE_001
      - master_sha_TEACHER_DOCTRINE_000
      - junko_TEACHER_DOCTRINE_003
      - master_sha_TEACHER_DOCTRINE_001
    secular_safe: true
    position_fit: before_THREAD
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          Anxiety loves the mind because the mind can argue all night and still wake up tired. It can produce elegant reasons, catastrophic forecasts, and perfectly structured self-criticism without ever touching the place where the body is actually braced. Some shifts do not arrive as concepts first. They land in the sternum. In the throat. In a sudden loosening that has no name your inner narrator can file away.

          Healing traditions older than the spreadsheet all describe layers. The analytical mind observes experience beautifully and often arrives late to the part that needed contact. What helps sometimes bypasses explanation entirely — a tone, a presence, a field of attention that reorganizes before the story catches up. People often feel something they are not sure they believe in, and only later connect a quiet change in their life to that wordless moment. The shift came first. Understanding followed.

          You do not have to trust this fully before trying it. You only have to stop closing the door before something has had a chance to arrive. Let the mind decide afterward what to make of it. The body does not wait for a complete theory before it softens. It responds to being met.

          Enter the thread with that openness — not every change will arrive as a sentence you can repeat.
      wisdom_traditions:
        examples:
          - "Some healing lands before the mind can explain it."
          - "The shift can come first; understanding follows."
          - "Contact sometimes bypasses the argument layer entirely."
      tradition_attributed:
        examples:
          - "Receptive transmission lineages describe contact that reaches the body before the analytic mind files it."
          - "Integrated medicine traditions treat root-level alignment as upstream of symptom-level debate."
          - "Pre-verbal healing arts work on the field directly, like tuning an instrument without lecturing about music theory."

  - essence_id: we_anx_ordinary_life_practice_v01
    theme: ordinary_life_practice
    topic_keys: [anxiety]
    doctrine_keys: ["COMPOSITE_DOCTRINE v02", "COMPOSITE_DOCTRINE v11"]
    source_teachers: [ahjan, master_feung, master_wu, junko]
    source_refs:
      - ahjan_TEACHER_DOCTRINE_007
      - master_feung_TEACHER_DOCTRINE_000
      - ahjan_TEACHER_DOCTRINE_003
      - master_wu_TEACHER_DOCTRINE_002
    secular_safe: true
    position_fit: after_REFLECTION
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          There is a fantasy that real change requires extraordinary conditions — the retreat, the silent month, the version of you who finally has enough time. Anxiety feeds on that fantasy because it keeps practice somewhere else while the body stays braced in the ordinary Tuesday. But every durable path eventually translates its oldest instructions into the room you are already in.

          Four places to look, taught for centuries and still as ordinary as opening a window. What is the body doing. What is the basic tone of what is arriving — pleasant, unpleasant, neutral — before the story starts. What shape is the mind in, not what content it is spinning. What patterns repeat when something feels good, bad, or uncertain. You do not need to hold all four at once. Body first, almost always. Then tone. Then shape. Then pattern.

          This is not less serious because it is simple. It is serious because it is available while the email refreshes, while the meeting loads, while you stand in line with your heart already running ahead of you. Practice is not what happens after life calms down. Practice is how you meet life while the alarm is still ringing.

          Take that ordinary map into the exercise next — the teaching survives because it is already in the room.
      wisdom_traditions:
        examples:
          - "Practice is how you meet ordinary life, not what waits after it calms down."
          - "Body, tone, mind-shape, pattern — four places to look, one breath at a time."
          - "The oldest instructions translate into the room you are already in."
      tradition_attributed:
        examples:
          - "Forest-contemplative teaching renders ancient mindfulness foundations as four places to look in plain language."
          - "Calligraphic training turns the scroll into a daily discipline, not a special occasion."
          - "Geomantic observation treats attention to place as practice woven into ordinary movement through the world."

  - essence_id: we_anx_patterns_as_recordings_v01
    theme: patterns_as_recordings
    topic_keys: [anxiety, overthinking]
    doctrine_keys: ["COMPOSITE_DOCTRINE v08"]
    source_teachers: [sai_ma, ahjan, junko, master_feung]
    source_refs:
      - sai_ma_TEACHER_DOCTRINE_006
      - sai_ma_TEACHER_DOCTRINE_001
      - ahjan_TEACHER_DOCTRINE_007
      - junko_TEACHER_DOCTRINE_003
    secular_safe: true
    position_fit: after_REFLECTION
    dosage_class: sparse_flair
    register_variants:
      secular:
        body: |
          You know the loop even if you have never named it. The verdict that you are behind. The rehearsal of failure before anything has happened. The bracing for danger while the room is calm. It plays without invitation, worn smooth by replay, and after enough years it starts to feel like identity instead of habit. That confusion is one of anxiety's cruelest tricks.

          Every reflective tradition that has worked with the mind long enough eventually distinguishes the person from the pattern running through the person. The loop is not a character flaw. It is a recording stored in the nervous system — a groove the body learned when repetition was the only teacher available. You cannot think your way out of a recording, because thinking is often part of what plays. What helps is exposure: seeing the pattern clearly enough that it is experienced as a pattern rather than as the truth.

          Each time light — or simple awareness — reaches the groove, the replay can grow quieter. Not because you won an argument with yourself, but because what runs in the dark loses power when it is seen. Do not wait for a silent mind before you begin. The noisy mind is exactly what this practice is for. You are not failing each time the loop returns. You are learning to recognize weather you once mistook for climate.

          Bring that recognition into the practice ahead — name the recording before you obey it.
      wisdom_traditions:
        examples:
          - "The loop is a recording, not your identity."
          - "What is seen clearly loses power to run you in the dark."
          - "You cannot argue a groove smooth; you can expose it."
      tradition_attributed:
        examples:
          - "Brain-clearing contemplative lineages describe limiting patterns as stored loops, not moral defects."
          - "Contemplative pattern work treats clinging and pushing away as observable habits, not eternal truths."
          - "Receptive lineages note that messages can arrive as gifts to be recognized, not commands to be obeyed."

  - essence_id: we_anx_standing_down_permission_v01
    theme: standing_down_permission
