    register_variants:
      secular:
        body: |
          The body often stays at post because no one ever gave it permission to stand down. Shoulders up. Breath guarded. Jaw set. The system learned that unclenching equals exposure, that rest equals danger, that competence requires permanent readiness. So the war continues through breakfast, through the commute, through the evening that was supposed to restore you. The enemy is gone. The watch continues.

          Here is the small radical act every somatic wisdom path eventually recommends. Look at the body and say, quietly and honestly: there is no war here right now. Not for the year. Not for the week. For this breath. You can let the shoulders drop one degree. You can let the exhale be a little longer than the inhale. You can let one half-second of noticing count without requiring it to fix everything first.

          Permission is not collapse. It is the end of fighting your own nervous system while asking it to perform calm on command. The tenderness you extend to yourself — the rest, the end of the private prosecution — is where the instrument relearns safety. One breath of believing the war is over can rest something that has not rested in a very long time.

          Carry that permission into the thread ahead — stand down for this breath, and see what becomes possible next.
      wisdom_traditions:
        examples:
          - "There is no war here right now — you can stand down for one breath."
          - "Permission is not collapse; it is the end of fighting your own signals."
          - "One half-second of noticing counts without needing to fix everything."
      tradition_attributed:
        examples:
          - "Forest-contemplative teaching gives explicit permission for small moments of awareness to be the whole practice."
          - "Compassion lineages treat rest as training the instrument, not stealing from the world."
          - "Calligraphic mastery knows the hand must release before the next true stroke can land."
