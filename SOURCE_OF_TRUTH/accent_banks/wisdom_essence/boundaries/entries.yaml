  register_variants:
    secular:
      body: 'A boundary is not a wall first. It is information first. It tells the room where contact
        can remain honest without becoming extraction. The body usually knows this before the calendar
        admits it. The shoulders lift when one more "quick" request lands. The stomach hardens when a
        yes is leaving your mouth while the rest of you is already preparing the resentment.


        Many people wait until anger is loud enough to authorize a boundary. By then the nervous system
        has been filing reports for weeks. The cleaner practice is to notice the early edge: the pause
        before replying, the heat in the face, the sudden wish to disappear from the thread. Those signals
        are not proof you are selfish. They are evidence that the current agreement has become unclear
        or too expensive.


        A good boundary makes the exchange more truthful. It says what can happen, what cannot happen,
        and what condition would make a different answer possible. That kind of edge does not reduce care.
        It protects the conditions under which care can keep being real.

        '
