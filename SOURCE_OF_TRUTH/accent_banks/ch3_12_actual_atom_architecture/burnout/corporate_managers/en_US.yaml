    beats:
      - surface: HOOK_QUESTION
        beat_id: ch11_hook_question_worth_after_stopping_v01
        source_type: authored_ch11_source
        body: |
          If you stopped proving yourself tomorrow, on purpose, and nothing about your worth actually changed — would you believe it, or would you need proof of that too?

      - surface: SCENE
        beat_id: ch11_scene_grace_declined_promotion_track_v01
        source_type: authored_ch11_source
        body: |
          Grace turned down a stretch role that would have fast-tracked her toward director, and spent the next two weeks explaining the decision to people who had not asked for an explanation — as though declining more output required more justification than accepting it ever had.

      - surface: VALIDATION_NORMALIZATION
        beat_id: ch11_validation_over_explaining_common_v01
        source_type: authored_ch11_source
        body: |
          If you have ever over-explained a decision to do less, that compulsion is not insecurity in the way it gets dismissed. It is a nervous system checking, again and again, whether it is still allowed to exist at a smaller scale than before.

      - surface: ANGLE_CALLBACK
        beat_id: ch11_angle_callback_ledger_closing_v01
        source_type: authored_ch11_source
        body: |
          The invisible cost has run through this entire book as an account of what your body, your relationships, and your identity have quietly been spending. This chapter asks the harder question underneath all of it: what happens to your sense of worth once the spending finally slows down.

      - surface: CALLBACK_ECHO
        beat_id: ch11_callback_echo_usefulness_audit_v01
        source_type: authored_ch11_source
        body: |
          Chapter 3 asked you to run the Usefulness Audit and simply see the automatic verdict your mind produced on a slow day. This chapter asks you to go one step further: to test, deliberately, whether that verdict was ever actually true.

      - surface: ANALOGY
        beat_id: ch11_analogy_bank_that_pays_interest_at_rest_v01
        source_type: authored_ch11_source
        analogy_not_metaphor: true
        body: |
          Think of an account that pays interest simply for existing, whether or not you deposit anything new this month. Most people manage their sense of worth like a checking account that only holds a balance if new deposits keep arriving. Worth without output is closer to the first kind of account — value that was never contingent on this week's activity in the first place.

      - surface: AUTHOR_COMMENTARY
        beat_id: ch11_author_commentary_worth_beyond_yield_v01
        source_type: authored_ch11_source
        author_id: lena_thorne
        commentary_type: observed_pattern
        body: |
          I have often watched someone finally take a slower month, only to spend it privately auditing whether they still deserved their place — as though worth were a membership that lapses without a renewal fee paid in output. What I want to name here is that this checking is exhausting precisely because it is unnecessary. The worth was never up for renewal.

      - surface: READER_PROMISE
        beat_id: ch11_reader_promise_direct_you_v01
        source_type: authored_ch11_source
        body: |
          In this chapter, you will test, directly, whether your worth actually depends on your output — not as a slogan, but as something you can check against your own evidence.

      - surface: STORY_PROGRESS_1
        beat_id: ch11_grace_progress_1_explaining_v01
        source_type: authored_ch11_source
        character: Grace
        story_position: beginning
        body: |
          By the third conversation explaining her decision, Grace heard herself say "I just don't want to overextend right now" for the fourth time and realized she did not actually owe anyone that sentence. No one had questioned her judgment. She had been the one auditing it.

      - surface: TRANSITION_GLUE
        beat_id: ch11_transition_realization_to_mechanism_v01
        source_type: authored_ch11_source
        body: |
          That realization is worth sitting with, because it names exactly what this chapter is about: an internal audit running long after any external one has stopped asking questions — and understanding why that audit keeps running is the first step to letting it close.

      - surface: MECHANISM_EXPLANATION
        beat_id: ch11_mechanism_identity_output_fusion_v01
        source_type: authored_ch11_source
        body: |
          When identity has been fused to output for long enough, a slower period does not register as a neutral fact. It registers as a threat, because the architecture of self has no category for "worth that persists without new evidence." So the mind manufactures the evidence anyway — through over-explaining, through preemptive justification, through a private audit that runs regardless of whether anyone is actually asking for one.

      - surface: COMPOSITE_TEACHING_BINDING
        beat_id: ch11_teaching_binding_loosen_the_weld_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v17
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "Here is the deeper point underneath Grace's fourth repeated explanation."
        body: |
          Here is the deeper point underneath Grace's fourth repeated explanation. The deeper work is not only to rest. It is to begin loosening the weld between worth and output — to locate worth somewhere that does not depend on yield, to notice that a person's value does not rise on a productive day or fall on a depleted one. A life has value while it is resting, recovering, contributing nothing measurable at all. This is not a slogan. It is the structural condition for a recovery that lasts: rest the body, and also question the architecture that made rest feel like disappearing.

      - surface: CITED_EVIDENCE_BINDING
        beat_id: ch11_evidence_binding_maslach_case_studies_v01
        source_type: bound_evidence
        bound_evidence_id: burn_case_maslach_teacher_nurse_composites_1997
        bound_evidence_source: SOURCE_OF_TRUTH/accent_banks/evidence/burnout/entries.yaml
        body: |
          Maslach and Leiter's published case studies of teachers and nurses describe professionals who loved their calling until chronic overload turned dedication into cynicism — and who recovered when workload, fairness, or recovery time changed, not when they tried harder. Recovery, in these documented cases, was never a function of proving more worth through more effort. It was a function of the conditions changing, which is difficult evidence for the belief that trying harder was ever the real lever.

      - surface: BRIDGE_TO_EXTERNAL
        beat_id: ch11_bridge_to_external_osaka_v01
        source_type: authored_ch11_source
        body: |
          The documented cases show recovery happening through changed conditions, not increased effort. One of the most visible athletes of her generation made the same case in public, at enormous personal cost, by simply stopping.

      - surface: EXTERNAL_STORY_OR_CASE_STUDY
        beat_id: ch11_external_story_osaka_v01
        source_type: bound_external_story
        bound_story_id: ext_burn_sports_naomi_osaka_v01
        bound_story_source: SOURCE_OF_TRUTH/accent_banks/external_stories/burnout_entries.yaml
        body: |
          Naomi Osaka withdrew from the 2021 French Open after conflicts over mandatory press obligations, citing mental health and long-running burnout from the demands of the tour. She was fined publicly; she paused anyway. In the essays and interviews that followed, she made a case rarely stated so plainly by an athlete at her level: that her worth was not actually contingent on continuing to perform on schedule, no matter how the fine or the criticism tried to argue otherwise.

      - surface: BRIDGE_BACK_TO_READER
        beat_id: ch11_bridge_back_after_osaka_v01
        source_type: authored_ch11_source
        body: |
          You will likely never be fined in public for stepping back. The quieter version is still real: a declined promotion, a slower quarter, a project handed to someone else — each one a small test of whether your worth actually moves when your output does. It generally does not, once you actually check.

      - surface: PERSONA_TOPIC_REFLECTION
        beat_id: ch11_persona_reflection_manager_worth_output_v01
        source_type: authored_ch11_source
        body: |
          Corporate management measures almost everything except this, which is precisely why the belief that worth equals output goes unchallenged for so long inside the role: the dashboards track deliverables, not the fact that a manager's value to their team and their own family was never actually reducible to this quarter's numbers.

      - surface: TROUBLESHOOTING_PERMISSION
        beat_id: ch11_troubleshooting_permission_belief_wont_flip_instantly_v01
        source_type: authored_ch11_source
        body: |
          If some part of you read this chapter and still does not believe it, that is expected, not a failure of the work. A belief this old rarely flips from a single argument. What matters is that you keep testing it against your own evidence, the way Grace is about to.

      - surface: STORY_PROGRESS_2
        beat_id: ch11_grace_progress_2_slow_month_v01
        source_type: authored_ch11_source
        character: Grace
        story_position: middle
        body: |
          A month into the smaller role, Grace had a genuinely quiet week — no fires, no visible wins — and instead of auditing herself, she wrote down, deliberately, three ways people had relied on her that week that had nothing to do with output: a colleague who vented to her before a hard call, a decision she helped someone else make more calmly, a meeting that ran better because she was in the room.

      - surface: AUTHOR_TOOL_INTRO
        beat_id: ch11_author_tool_intro_worth_ledger_correction_v01
        source_type: authored_ch11_source
        author_id: lena_thorne
        body: |
          I want to give you one more diagnostic, a direct continuation of the tool from Chapter 3 — this time run not on a slow day, but on the belief itself.

      - surface: PRACTICE_APPLICATION_TOOL
        beat_id: ch11_tool_worth_ledger_correction_v01
        source_type: authored_ch11_source
        tool_not_exercise: true
        tool_steps:
          - "Name a stretch of low output from the past month."
          - "List every way you were actually valuable during that stretch that was not measured by output."
          - "Compare that list honestly against the verdict your mind produced at the time."
        body: |
          The Worth Ledger Correction has three lines. Stretch: name a period of low output from the past month. Value: list every way you were actually valuable during that stretch that had nothing to do with output — presence, judgment, care, steadiness. Comparison: set that list beside the verdict your mind produced at the time, and notice the gap. The gap is not proof you were wrong to feel it. It is proof the verdict was never reading the whole ledger.

      - surface: INTEGRATION_REFLECTION
        beat_id: ch11_integration_reflection_worth_ledger_correction_v01
        source_type: authored_ch11_source
        body: |
          This correction does not need to convince you permanently in one sitting. It only needs to plant one honest counterexample against a belief that has been running unopposed for a long time.

      - surface: PIVOT_BINDING
        beat_id: ch11_pivot_binding_beliefs_that_drove_overeffort_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v20
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "The pivot here names the belief directly, because naming it is most of the work."
        body: |
          The pivot here names the belief directly, because naming it is most of the work: lasting recovery usually means examining the beliefs that drove the over-effort in the first place — that worth is earned through output, that rest must be deserved, that slowing down is failure, that the load was fair and the only thing lacking was personal strength. As long as those beliefs stand, the system will be driven back to the draw that emptied it. The full work is twofold: let the body refill through real recovery, and loosen the architecture that made stillness feel like failure.

      - surface: CLOSING_TAKEAWAY_BINDING
        beat_id: ch11_closing_takeaway_worth_never_moved_v01
        source_type: authored_ch11_source
        body: |
          Check the evidence honestly, and you will likely find what Grace found: your worth never actually moved when your output did. Only the belief that it would ever moved at all.

      - surface: STORY_PROGRESS_3
        beat_id: ch11_grace_progress_3_no_explanation_v01
        source_type: authored_ch11_source
        character: Grace
        story_position: end
        body: |
          Two months later, Grace turned down a second stretch opportunity, briefly, without the paragraph of justification she had given the first time. "Not right now — thanks for thinking of me" was the whole message. No one asked for more. She did not privately audit herself afterward either.

      - surface: CALLBACK_RETURN
        beat_id: ch11_callback_return_ledger_worth_line_closed_v01
        source_type: authored_ch11_source
        body: |
          The ledger from Chapter 1 has one line this chapter finally gets to close: worth was never actually one of the entries. It never needed to be earned back, because it was never spent in the first place — only obscured by everything else that was.

      - surface: PROPULSION
        beat_id: ch11_propulsion_to_ch12_v01
        source_type: authored_ch11_source
        body: |
          If worth was never the thing at stake, what remains is the practical question this whole book has been building toward: how do you actually rebuild a life from the inside, once the old accounting no longer runs it. That is where we go, last.
