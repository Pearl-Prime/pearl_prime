  - chapter: 5
    chapter_title: The Overfunctioning Reflex
    chapter_theme: overfunctioning as mechanism
    architecture:
      - HOOK_QUESTION
      - SCENE
      - VALIDATION_NORMALIZATION
      - ANGLE_CALLBACK
      - CALLBACK_ECHO
      - ANALOGY
      - AUTHOR_COMMENTARY
      - READER_PROMISE
      - STORY_PROGRESS_1
      - TRANSITION_GLUE
      - MECHANISM_EXPLANATION
      - COMPOSITE_TEACHING_BINDING
      - CITED_EVIDENCE_BINDING
      - BRIDGE_TO_EXTERNAL
      - EXTERNAL_STORY_OR_CASE_STUDY
      - BRIDGE_BACK_TO_READER
      - PERSONA_TOPIC_REFLECTION
      - TROUBLESHOOTING_PERMISSION
      - STORY_PROGRESS_2
      - AUTHOR_TOOL_INTRO
      - PRACTICE_APPLICATION_TOOL
      - INTEGRATION_REFLECTION
      - PIVOT_BINDING
      - CLOSING_TAKEAWAY_BINDING
      - STORY_PROGRESS_3
      - CALLBACK_RETURN
      - PROPULSION
    beats:
      - surface: HOOK_QUESTION
        beat_id: ch5_hook_question_whose_job_v01
        source_type: authored_ch5_source
        body: |
          How many of the tasks on your list this week actually required you specifically — and how many did you simply get to first?

      - surface: SCENE
        beat_id: ch5_scene_renata_third_deck_v01
        source_type: authored_ch5_source
        body: |
          Renata was rebuilding a slide deck for the second time that week — not because her director asked her to, but because she had seen a version circulating that felt "not quite ready," and she could not make herself send it forward unpolished. It was 11:40 p.m. No one had asked her to be awake.

      - surface: VALIDATION_NORMALIZATION
        beat_id: ch5_validation_covering_gaps_normal_v01
        source_type: authored_ch5_source
        body: |
          If you have ever redone someone else's work quietly rather than raise it, that is not controlling. It is a nervous system that learned, at some point, that gaps left unfilled become your problem eventually — so filling them early feels like the only safe move.

      - surface: ANGLE_CALLBACK
        beat_id: ch5_angle_callback_second_job_v01
        source_type: authored_ch5_source
        body: |
          The invisible cost is not only what your own role demands. For many managers, it includes a second, unassigned job: quietly absorbing the slack that other people, or the system itself, leave behind.

      - surface: CALLBACK_ECHO
        beat_id: ch5_callback_echo_ledger_uncounted_hours_v01
        source_type: authored_ch5_source
        body: |
          The ledger from Chapter 1 does not only total what your job requires. It totals what you have quietly agreed to carry beyond it — and for Renata, at 11:40 p.m., that second column had grown far longer than the first.

      - surface: ANALOGY
        beat_id: ch5_analogy_load_bearing_wall_v01
        source_type: authored_ch5_source
        analogy_not_metaphor: true
        body: |
          Think of a wall that was never meant to bear weight, pressed into service anyway because it happened to be standing in the right place. It holds, for a while. No one designed it for the load, and no one notices the strain until the crack finally shows — and by then it looks like the wall's failure, not the design's.

      - surface: AUTHOR_COMMENTARY
        beat_id: ch5_author_commentary_reliable_person_cost_v01
        source_type: authored_ch5_source
        author_id: lena_thorne
        commentary_type: observed_pattern
        body: |
          I have often seen the most capable person on a team quietly become its load-bearing wall — the one who redoes the weak handoff, smooths the missed deadline, absorbs the unclear instruction so no one else has to feel the friction. What I want to name here is that being able to carry the load is not the same as it being yours to carry.

      - surface: READER_PROMISE
        beat_id: ch5_reader_promise_direct_you_v01
        source_type: authored_ch5_source
        body: |
          In this chapter, you will learn to see the difference between the work that is actually yours and the work you have simply been absorbing, so you can start setting some of the second load back down.

      - surface: STORY_PROGRESS_1
        beat_id: ch5_renata_progress_1_deck_v01
        source_type: authored_ch5_source
        character: Renata
        story_position: beginning
        body: |
          When her director finally saw the polished deck the next morning, he said only, "nice, thanks" — with no idea it had cost Renata three hours of sleep, and no way to know, because she had never told him the earlier version needed the work at all.

      - surface: TRANSITION_GLUE
        beat_id: ch5_transition_invisibility_to_mechanism_v01
        source_type: authored_ch5_source
        body: |
          That invisibility is not incidental. It is what makes overfunctioning so hard to catch: the work gets done well enough that no one, including the person doing it, can see how much extra was quietly absorbed to make it look effortless.

      - surface: MECHANISM_EXPLANATION
        beat_id: ch5_mechanism_vigilance_second_job_v01
        source_type: authored_ch5_source
        body: |
          Overfunctioning runs on a background process researchers call vigilance: a part of the mind that stays permanently assigned to a task after it is finished, watching for gaps, tracking whether it was good enough, rehearsing what might still be needed. That watching produces nothing visible, closes nothing, and drains the same limited reserves as the actual work — which is why a day full of quiet vigilance can feel more exhausting than a day full of hard, visible tasks.

      - surface: COMPOSITE_TEACHING_BINDING
        beat_id: ch5_teaching_binding_second_job_vigilance_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v21
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "Here is the deeper point underneath Renata's second pass at the deck."
        body: |
          Here is the deeper point underneath Renata's second pass at the deck. Picture two people doing the same work: one does the task and sets it down; the other does the task and then keeps a quiet part of the mind permanently assigned to it, checking, re-checking, bracing for the response. By the end of the day both have done the same visible work, but only one is depleted — because the watching is not free, even though it produces nothing and never closes.

          This helps explain a confusing feature of overfunctioning: the sense of being exhausted by a day in which the visible list looks manageable. The energy did not drain through the tasks. It drained through the standing watch that surrounded them — the second, unassigned job of tracking, bracing, and guarding against everything that might require the work.

      - surface: CITED_EVIDENCE_BINDING
        beat_id: ch5_evidence_binding_jd_r_model_v01
        source_type: bound_evidence
        bound_evidence_id: burn_job_demands_resources_model_demerouti_2001
        bound_evidence_source: SOURCE_OF_TRUTH/accent_banks/evidence/burnout/entries.yaml
        body: |
          Demerouti and colleagues' job demands-resources model gives Renata's pattern a name that is not about her character: burnout grows when job demands chronically exceed the resources available to meet them — time, autonomy, support, and recovery. Fixing overfunctioning is very often an architecture problem, not a motivation problem. Renata was not lacking discipline. She was quietly supplying the resource gap herself, every night, unpaid and unnoticed.

      - surface: BRIDGE_TO_EXTERNAL
        beat_id: ch5_bridge_to_external_residents_v01
        source_type: authored_ch5_source
        body: |
          The research names the gap. A whole profession shows what happens when an entire training system is built on the expectation that individuals will simply cover it.

      - surface: EXTERNAL_STORY_OR_CASE_STUDY
        beat_id: ch5_external_story_medical_residents_v01
        source_type: bound_external_story
        bound_story_id: ext_burn_business_medical_residents_v01
        bound_story_source: SOURCE_OF_TRUTH/accent_banks/external_stories/burnout_entries.yaml
        body: |
          U.S. medical residency programs have long required eighty-hour weeks and overnight shifts, a training model defended as tradition and attacked as dangerous. Studies link resident burnout to medical errors, depression, and attrition from medicine entirely, and Libby Zion's 1984 death helped spark reform debates that continue decades later. The overfunctioning here was not chosen by any individual resident. It was structurally required — a system that ran on the assumption that people would keep absorbing the gap between the staffing that existed and the staffing that was actually needed.

      - surface: BRIDGE_BACK_TO_READER
        beat_id: ch5_bridge_back_after_residents_v01
        source_type: authored_ch5_source
        body: |
          Your version has no overnight shift and no white coat. It may look like a slide deck redone at midnight, or a project quietly rescued from a vendor's late delivery. The structure is the same: a resource gap that got closed by one person's unpaid overfunctioning, so smoothly that the gap itself became invisible.

      - surface: PERSONA_TOPIC_REFLECTION
        beat_id: ch5_persona_reflection_manager_overfunction_v01
        source_type: authored_ch5_source
        body: |
          Corporate management often selects for exactly this pattern. The people promoted fastest are frequently the ones who quietly absorb the most slack, and the promotion reads as reward — which teaches the nervous system that overfunctioning is not a cost to be managed but a strategy that works, right up until it doesn't.

      - surface: TROUBLESHOOTING_PERMISSION
        beat_id: ch5_troubleshooting_permission_not_lazy_v01
        source_type: authored_ch5_source
        body: |
          If some part of you is already worried that naming this pattern means you will start letting things drop, notice that fear and set it down for now. This chapter is not asking you to stop caring about quality. It is asking you to start noticing which parts of the load were ever actually yours.

      - surface: STORY_PROGRESS_2
        beat_id: ch5_renata_progress_2_noticing_v01
        source_type: authored_ch5_source
        character: Renata
        story_position: middle
        body: |
          The following week, Renata caught herself opening a colleague's draft to "just fix a few things" and paused with her cursor on the file. For the first time she asked herself, before opening it, whether the fixing was actually required or whether she simply could not tolerate watching something imperfect move forward without her.

      - surface: AUTHOR_TOOL_INTRO
        beat_id: ch5_author_tool_intro_coverage_map_v01
        source_type: authored_ch5_source
        author_id: lena_thorne
        body: |
          I want to give you a small diagnostic for exactly that pause — a way to see, on paper, how much of your week belongs to you and how much you have simply been covering.

      - surface: PRACTICE_APPLICATION_TOOL
        beat_id: ch5_tool_coverage_map_v01
        source_type: authored_ch5_source
        tool_not_exercise: true
        tool_steps:
          - "List three tasks from this week that were not formally assigned to you."
          - "For each, name whose gap you were actually filling."
          - "Ask: what would have happened, specifically, if you had let that gap stay visible."
        body: |
          The Coverage Map has three lines, run for three tasks from this week that were not formally assigned to you. Task: what did you do that was not technically yours? Gap: whose slack were you actually covering? Consequence: what would have happened, specifically, if you had let that gap stay visible instead of closing it yourself? Write the answers plainly. Some consequences will turn out to be real. Some will turn out to be a fear that has never actually been tested.

      - surface: INTEGRATION_REFLECTION
        beat_id: ch5_integration_reflection_coverage_map_v01
        source_type: authored_ch5_source
        body: |
          The point of the map is not to stop caring about outcomes. It is to separate the gaps that are genuinely dangerous to leave open from the gaps you have simply never allowed yourself to test, because testing them felt riskier than absorbing them.

      - surface: PIVOT_BINDING
        beat_id: ch5_pivot_binding_drive_vs_capacity_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v10
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "The pivot here is a distinction worth holding onto."
        body: |
          The pivot here is a distinction worth holding onto: the drive to keep going is not the same as the capacity to keep going. Renata's drive to fix the deck stayed high long after her actual resources had thinned, because the drive was fed by habit and vigilance, not by an honest read of what she had left. The skill is learning to ask, separately, not "do I feel like I should cover this," but "do I actually have the resources to cover this" — because in overfunctioning, those two questions reliably have different answers.

      - surface: CLOSING_TAKEAWAY_BINDING
        beat_id: ch5_closing_takeaway_not_yours_v01
        source_type: authored_ch5_source
        body: |
          Being able to carry something does not make it yours. Some of what you have been quietly covering was never your gap to close.

      - surface: STORY_PROGRESS_3
        beat_id: ch5_renata_progress_3_left_visible_v01
        source_type: authored_ch5_source
        character: Renata
        story_position: end
        body: |
          The next time Renata found an unfinished draft, she flagged it back to its owner instead of fixing it herself, and spent the evening bracing for the fallout that never came. The gap had been visible for one day. Nothing had broken. She had simply never let anyone find out that it wouldn't.

      - surface: CALLBACK_RETURN
        beat_id: ch5_callback_return_second_column_v01
        source_type: authored_ch5_source
        body: |
          The ledger keeps two columns for a manager like Renata: what the job actually required, and what she quietly agreed to cover beyond it. This chapter does not erase the second column. It simply insists that she finally gets to see it — and decide, deliberately, what belongs there.

      - surface: PROPULSION
        beat_id: ch5_propulsion_to_ch6_v01
        source_type: authored_ch5_source
        body: |
          If some of the load was never yours to carry, the natural next question is whether the rest you have been taking — the evenings, the weekends, the one real vacation a year — has actually been doing what rest is supposed to do. For many people, it has not. That is where we go next.
    binding_summary:
      new_authored_beats: 22
      bound_beats: 4
      bound_to:
        - type: composite_doctrine
          id: "COMPOSITE_DOCTRINE v21"
          used_by: [ch5_teaching_binding_second_job_vigilance_v01]
        - type: composite_doctrine
          id: "COMPOSITE_DOCTRINE v10"
          used_by: [ch5_pivot_binding_drive_vs_capacity_v01]
        - type: evidence
          id: burn_job_demands_resources_model_demerouti_2001
          used_by: [ch5_evidence_binding_jd_r_model_v01]
        - type: external_story
          id: ext_burn_business_medical_residents_v01
          used_by: [ch5_external_story_medical_residents_v01]
