    beats:
      - surface: HOOK_QUESTION
        beat_id: ch3_hook_question_worth_without_output_v01
        source_type: authored_ch3_source
        body: |
          If a quarter went by and you produced nothing anyone could point to, would you still believe you were worth keeping around?

      - surface: SCENE
        beat_id: ch3_scene_performance_review_prep_v01
        source_type: authored_ch3_source
        body: |
          Mara sat in the parking garage twenty minutes before her own performance review, rereading a list she had made the night before: every project shipped, every fire put out, every stakeholder kept calm. It read like a defense brief. She was not being accused of anything. She had built the case anyway.

      - surface: VALIDATION_NORMALIZATION
        beat_id: ch3_validation_receipts_are_normal_v01
        source_type: authored_ch3_source
        body: |
          If you have ever rehearsed your own accomplishments before anyone asked for them, that is not vanity. It is a nervous system that has learned to keep receipts, because somewhere along the way, being useful stopped feeling optional and started feeling like the price of staying safe.

      - surface: ANGLE_CALLBACK
        beat_id: ch3_angle_callback_ledger_of_usefulness_v01
        source_type: authored_ch3_source
        body: |
          The invisible cost from Chapter 1 was the body paying in advance. This chapter names a second, quieter entry in the same account: the belief that the payment is the only thing that makes you worth having. The ledger is not just tracking what your body spends. It is tracking what you think you have to produce to be allowed to rest.

      - surface: CALLBACK_ECHO
        beat_id: ch3_callback_echo_ledger_v01
        source_type: authored_ch3_source
        body: |
          You were asked to keep the word ledger close. Here it is again, but the entry has changed. It is no longer only recording cost. It is recording a trade you agreed to without remembering signing it: output for worth.

      - surface: ANALOGY
        beat_id: ch3_analogy_vending_machine_self_v01
        source_type: authored_ch3_source
        analogy_not_metaphor: true
        body: |
          Think of a vending machine that only dispenses when it is fed. No coin, no snack — the machine has no other setting. A self built the same way has only one mode: produce, and be worth something; stop, and go dark. The machine cannot tell the difference between being unplugged and simply being at rest.

      - surface: AUTHOR_COMMENTARY
        beat_id: ch3_author_commentary_worth_welded_to_output_v01
        source_type: authored_ch3_source
        author_id: lena_thorne
        commentary_type: observed_pattern
        body: |
          I have often seen managers describe a good day only in terms of what they cleared, closed, or carried for someone else. What I want to name here is the quiet architecture underneath that habit: worth that got welded to output early enough that it stopped feeling like a belief and started feeling like a fact.

      - surface: READER_PROMISE
        beat_id: ch3_reader_promise_direct_you_v01
        source_type: authored_ch3_source
        body: |
          In this chapter, you will learn to separate what you produce from what you are worth, so a slow week can stop registering as a verdict on your value.

      - surface: STORY_PROGRESS_1
        beat_id: ch3_mara_progress_1_review_v01
        source_type: authored_ch3_source
        character: Mara
        story_position: beginning
        body: |
          Mara's manager opened the review with "you've had a strong quarter," and Mara felt the specific relief of a verdict landing in her favor — followed, seconds later, by the quiet dread of not knowing what she would feel if the sentence had gone the other way.

      - surface: TRANSITION_GLUE
        beat_id: ch3_transition_relief_to_mechanism_v01
        source_type: authored_ch3_source
        body: |
          That relief is worth pausing on, because relief this specific is a clue. It points to a self-worth account that only clears when the ledger shows enough output — and an account like that never stays cleared for long.

      - surface: MECHANISM_EXPLANATION
        beat_id: ch3_mechanism_output_worth_fusion_v01
        source_type: authored_ch3_source
        body: |
          When worth is fused to output, the mind stops asking "is this task necessary" and starts asking "does this task prove I deserve to exist here." Every declined request becomes a small identity threat instead of a scheduling decision. The system cannot tell the difference between resting and disappearing, so it keeps producing past the point of depletion to avoid a danger that was never really about the task.

      - surface: COMPOSITE_TEACHING_BINDING
        beat_id: ch3_teaching_binding_worth_welded_to_output_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v17
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "Here is the deeper point underneath Mara's relief in that review room."
        body: |
          Here is the deeper point underneath Mara's relief in that review room. Underneath many cases of burnout sits a particular architecture of self, where a person's worth has come to live inside their productivity — what they are is what they produce, and the value of a day is measured by its yield. A self built this way cannot rest, because rest, in its own terms, is a small erasure: to stop producing is to stop being worth anything.

          This is not a minor contributing factor. It is an engine that drives the system toward depletion and then forbids the very recovery that would fix it, because every boundary, every decline, every slower week reads as a threat to identity rather than a normal adjustment. The deeper work is not only to rest. It is to loosen the weld — to locate worth somewhere that does not rise and fall with yield.

      - surface: CITED_EVIDENCE_BINDING
        beat_id: ch3_evidence_binding_maslach_three_dimensions_v01
        source_type: bound_evidence
        bound_evidence_id: burn_maslach_three_dimensions_1981
        bound_evidence_source: SOURCE_OF_TRUTH/accent_banks/evidence/burnout/entries.yaml
        body: |
          Researchers who study burnout do not treat it as one undifferentiated feeling. Maslach and Jackson's foundational 1981 framework identifies three overlapping strains: emotional depletion, cynicism toward the work, and a reduced sense of personal accomplishment. That third strain is worth sitting with. It means the sense that your work no longer counts for anything is not a private failure of perspective — it is one of the three recognized shapes burnout takes, and it is the one Mara's parking-garage rehearsal was quietly trying to outrun.

      - surface: BRIDGE_TO_EXTERNAL
        beat_id: ch3_bridge_to_external_agassi_v01
        source_type: authored_ch3_source
        body: |
          The research names the pattern. What it does not show is what it looks like when someone wins by every external measure and still cannot locate the worth underneath — which is exactly what one of the most decorated athletes of his generation eventually admitted, in public, at the height of his career.

      - surface: EXTERNAL_STORY_OR_CASE_STUDY
        beat_id: ch3_external_story_agassi_v01
        source_type: bound_external_story
        bound_story_id: ext_burn_sports_andre_agassi_v01
        bound_story_source: SOURCE_OF_TRUTH/accent_banks/external_stories/burnout_entries.yaml
        body: |
          In his memoir Open, Andre Agassi wrote that he hated tennis — a confession that stunned a public that only knew him as an eight-time Grand Slam champion. He describes a childhood in which the sport was forced on him, years of performing excellence while feeling emotionally vacant, and a slow, costly rebuilding of an identity that was never his own choosing. Recovery meant stepping away from the tour and returning only once tennis stopped being the whole ledger of his worth. Elite burnout, in his case, was not overtraining. It was a scoreboard that read "win" while the inner account read empty — and naming that emptiness, publicly, was the first real victory.

      - surface: BRIDGE_BACK_TO_READER
        beat_id: ch3_bridge_back_after_agassi_v01
        source_type: authored_ch3_source
        body: |
          You may never hold a trophy for what you do at work, and the comparison can feel too large to be useful. But the shape is smaller and more familiar than it looks: a scoreboard that says you are doing well, next to an inner account that cannot feel it, because the account was never actually being credited with your worth — only with your output.

      - surface: PERSONA_TOPIC_REFLECTION
        beat_id: ch3_persona_reflection_manager_worth_v01
        source_type: authored_ch3_source
        body: |
          Corporate management is one of the few roles where usefulness is measured constantly and publicly: dashboards, reviews, stack rankings, the visible cadence of who delivered what. That visibility can quietly convert a job into a running referendum on whether you deserve your seat, and a manager can spend years mistaking a strong quarter for proof of worth instead of evidence of output.

      - surface: TROUBLESHOOTING_PERMISSION
        beat_id: ch3_troubleshooting_permission_no_instant_fix_v01
        source_type: authored_ch3_source
        body: |
          If some part of you just tried to solve this by planning to work slightly less next quarter, notice that reflex kindly and set it down for now. A worth-output weld does not loosen because you produce less. It loosens because you start locating worth somewhere the ledger cannot reach — and this chapter is only the beginning of that search.

      - surface: STORY_PROGRESS_2
        beat_id: ch3_mara_progress_2_slow_week_v01
        source_type: authored_ch3_source
        character: Mara
        story_position: middle
        body: |
          Two weeks later Mara had an unusually quiet stretch — a project delayed upstream, nothing urgent landing on her desk. Instead of relief, she felt exposed, as though the absence of output were visible to everyone, as though she might be found out for having nothing to show.

      - surface: AUTHOR_TOOL_INTRO
        beat_id: ch3_author_tool_intro_usefulness_audit_v01
        source_type: authored_ch3_source
        author_id: lena_thorne
        body: |
          Before we go any further, I want to give you a small diagnostic — not a fix, just a way to see the weld between worth and output clearly enough to start questioning it.

      - surface: PRACTICE_APPLICATION_TOOL
        beat_id: ch3_tool_usefulness_audit_v01
        source_type: authored_ch3_source
        tool_not_exercise: true
        tool_steps:
          - "Name one day in the last month where you produced very little."
          - "Name the first sentence your mind said about your worth that day."
          - "Ask: is that sentence a fact, or an old rule the ledger has been enforcing."
        body: |
          The Usefulness Audit has three lines. Day: name one day in the last month where you produced very little. Verdict: what was the first sentence your mind said about your worth that day? Source: is that sentence a fact about your value, or a rule the ledger has been quietly enforcing since long before this job? Write one sentence for each line. Do not try to resolve the third line yet — just see it clearly.

      - surface: INTEGRATION_REFLECTION
        beat_id: ch3_integration_reflection_audit_v01
        source_type: authored_ch3_source
        body: |
          The point of the audit is not to produce a better verdict about your worth on a slow day. It is to notice that a verdict was being produced automatically at all — and that automatic is not the same as true.

      - surface: PIVOT_BINDING
        beat_id: ch3_pivot_binding_from_yield_to_capacity_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v17
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "The pivot this chapter is pointing toward is simple to state and slow to live."
        body: |
          The pivot this chapter is pointing toward is simple to state and slow to live: untie the worth from the output, and the system is finally allowed to refill. That does not happen by force of argument in one sitting. It happens by noticing, again and again, that a slow week did not actually change what you are worth — only what you produced during it.

      - surface: CLOSING_TAKEAWAY_BINDING
        beat_id: ch3_closing_takeaway_worth_not_yield_v01
        source_type: authored_ch3_source
        body: |
          Your worth was never the yield. The yield was just the thing that was easiest to measure. Take that sentence into next week's slow afternoon and see if it holds.

      - surface: STORY_PROGRESS_3
        beat_id: ch3_mara_progress_3_naming_it_v01
        source_type: authored_ch3_source
        character: Mara
        story_position: end
        body: |
          By Friday of the quiet week, Mara caught herself mid-apology to a colleague for "not having much to report" — and for the first time, stopped, and asked out loud whether she owed anyone that apology at all. She did not have an answer yet. She had, for the first time, the question.

      - surface: CALLBACK_RETURN
        beat_id: ch3_callback_return_ledger_worth_v01
        source_type: authored_ch3_source
        body: |
          The ledger from Chapter 1 tracked what your body was spending. This chapter adds an honest correction to the same account: your worth was never one of the line items. It was never for sale, and it was never at risk. Only your energy was ever actually being spent.

      - surface: PROPULSION
        beat_id: ch3_propulsion_to_ch4_v01
        source_type: authored_ch3_source
        body: |
          If your worth was never the thing being spent, the next honest question is what actually was — and why your body has been so certain, for so long, that it needed to keep paying. That is where we go next.
