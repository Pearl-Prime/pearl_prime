    beats:
      - surface: HOOK_QUESTION
        beat_id: ch10_hook_question_what_stays_undone_v01
        source_type: authored_ch10_source
        body: |
          What if the most disciplined thing you did this week was the task you deliberately left unfinished?

      - surface: SCENE
        beat_id: ch10_scene_jordan_report_v01
        source_type: authored_ch10_source
        body: |
          Jordan had a report due Friday that no one had actually asked for by a specific date — just a vague "whenever you get a chance" from a director three weeks earlier. He had already rewritten the executive summary twice, on two separate nights, for a document he was fairly sure would be skimmed once and archived.

      - surface: VALIDATION_NORMALIZATION
        beat_id: ch10_validation_cant_stop_normal_v01
        source_type: authored_ch10_source
        body: |
          If you have ever kept polishing something no one was waiting on, that is not perfectionism in the way it gets described at parties. It is a nervous system that has learned stopping feels dangerous, even when nothing external is actually demanding you continue.

      - surface: ANGLE_CALLBACK
        beat_id: ch10_angle_callback_undone_as_spend_v01
        source_type: authored_ch10_source
        body: |
          The invisible cost includes every task you kept doing past the point it needed you — because each of those extra hours was a withdrawal made in service of a demand that, on inspection, was never actually there.

      - surface: CALLBACK_ECHO
        beat_id: ch10_callback_echo_ledger_extra_hours_v01
        source_type: authored_ch10_source
        body: |
          The ledger from Chapter 1 does not distinguish between hours a task genuinely required and hours you added because stopping felt unsafe. Both draw from the same account, and Jordan's third rewrite of the summary was drawn entirely from the second kind.

      - surface: ANALOGY
        beat_id: ch10_analogy_gardener_who_never_stops_pruning_v01
        source_type: authored_ch10_source
        analogy_not_metaphor: true
        body: |
          Think of a gardener who cannot stop pruning a hedge that is already the right shape, because stopping feels like admitting the work is finished, and finished feels like a kind of loss. The hedge does not need more pruning. The gardener needs a different relationship with the moment the shears go down.

      - surface: AUTHOR_COMMENTARY
        beat_id: ch10_author_commentary_stopping_as_skill_v01
        source_type: authored_ch10_source
        author_id: lena_thorne
        commentary_type: observed_pattern
        body: |
          I have often watched capable people treat "good enough" as a phrase for people with lower standards, when in practice it is one of the harder skills a depleted system has to relearn. What I want to name here is that knowing when to stop is not the absence of discipline. It is a distinct discipline of its own, and most high performers were never taught it.

      - surface: READER_PROMISE
        beat_id: ch10_reader_promise_direct_you_v01
        source_type: authored_ch10_source
        body: |
          In this chapter, you will practice choosing, on purpose, what does not get done — so leaving something unfinished can start to feel like a decision instead of a failure.

      - surface: STORY_PROGRESS_1
        beat_id: ch10_jordan_progress_1_third_rewrite_v01
        source_type: authored_ch10_source
        character: Jordan
        story_position: beginning
        body: |
          Jordan caught himself starting a fourth pass on the executive summary at 10:40 p.m. and, for reasons he could not fully explain, closed the laptop mid-sentence instead. He lay awake for twenty minutes afterward, certain he had left something dangerously unfinished. Nothing happened. No one noticed. The document sat exactly as good as it had been an hour earlier.

      - surface: TRANSITION_GLUE
        beat_id: ch10_transition_nothing_happened_to_mechanism_v01
        source_type: authored_ch10_source
        body: |
          "Nothing happened" is worth taking seriously as data, because it is precisely the outcome a depleted, over-activated system cannot predict in advance. Understanding why stopping feels unsafe explains why Jordan needed twenty minutes just to believe that closing the laptop had been fine.

      - surface: MECHANISM_EXPLANATION
        beat_id: ch10_mechanism_stillness_reads_as_danger_v01
        source_type: authored_ch10_source
        body: |
          In a chronically activated nervous system, stillness itself can register as unsafe. The body, locked in a low-grade emergency, reads rest — or an unfinished task — as danger: there is so much undone, so much that could go wrong, and stopping feels like negligence rather than a normal boundary. This is why the discomfort of leaving something undone often has nothing to do with the actual stakes of the task, and everything to do with an alarm firing because the system is out of practice at not responding to it.

      - surface: COMPOSITE_TEACHING_BINDING
        beat_id: ch10_teaching_binding_doing_less_is_treatment_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v08
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "Here is the deeper point underneath Jordan's twenty wide-awake minutes."
        body: |
          Here is the deeper point underneath Jordan's twenty wide-awake minutes: doing less is the treatment, even when doing less feels unbearable. Burnout is a state of depletion, and the treatment for depletion is reduced expenditure — but a chronically activated nervous system reads stillness as danger, so stopping triggers an alarm rather than relief. The way through is to do less anyway, and to expect the discomfort: start small enough that the protest is survivable, feel the alarm that follows, and do not obey it. Let the body learn, slowly, that nothing terrible happens when the demand drops.

      - surface: CITED_EVIDENCE_BINDING
        beat_id: ch10_evidence_binding_micro_breaks_v01
        source_type: bound_evidence
        bound_evidence_id: burn_micro_breaks_recovery_2019
        bound_evidence_source: SOURCE_OF_TRUTH/accent_banks/evidence/burnout/entries.yaml
        body: |
          Research on micro-breaks gives this practice concrete backing: brief pauses of five to ten minutes spread through the workday, especially those involving movement or a change of scene, measurably reduce fatigue and preserve afternoon performance better than pushing through without stopping. The effect sizes are modest and depend on the quality of the break — but the mechanism confirms what Jordan discovered by accident at 10:40 p.m.: a deliberate stop is not lost productivity. It is one of the few interventions that actually protects it.

      - surface: BRIDGE_TO_EXTERNAL
        beat_id: ch10_bridge_to_external_sisyphus_v01
        source_type: authored_ch10_source
        body: |
          The research shows what a deliberate stop protects. Myth offers the oldest possible image of what happens to a person who never gets one.

      - surface: EXTERNAL_STORY_OR_CASE_STUDY
        beat_id: ch10_external_story_sisyphus_v01
        source_type: bound_external_story
        bound_story_id: ext_burn_mythic_sisyphus_v01
        bound_story_source: SOURCE_OF_TRUTH/accent_banks/external_stories/burnout_entries.yaml
        body: |
          Sisyphus, punished by the gods, must push a boulder uphill forever, only to watch it roll back each time he nears the summit. Burnout is not always dramatic collapse; sometimes it is Sisyphean competence — emails cleared, boulder returned, inbox refilled — a body that has learned effort no longer purchases rest. The cautionary note is not laziness. It is a system that confuses motion with meaning until the person pushing can no longer remember why the hill matters, because no one, including Sisyphus, ever chose to set the boulder down on purpose.

      - surface: BRIDGE_BACK_TO_READER
        beat_id: ch10_bridge_back_after_sisyphus_v01
        source_type: authored_ch10_source
        body: |
          Your boulder has a name like "inbox" or "executive summary," and it will, in fact, roll back tomorrow no matter how thoroughly you push it tonight. The deliberate not-do is not giving up on the hill. It is choosing, on purpose, when the shears go down.

      - surface: PERSONA_TOPIC_REFLECTION
        beat_id: ch10_persona_reflection_manager_not_do_v01
        source_type: authored_ch10_source
        body: |
          Corporate management rarely offers explicit permission to leave something at "good enough," because visible thoroughness is easy to reward and invisible restraint is not. A manager who deliberately stops at a reasonable point can look, to an outside observer, exactly the same as one who never started caring — which is part of why the skill is so rarely modeled out loud.

      - surface: TROUBLESHOOTING_PERMISSION
        beat_id: ch10_troubleshooting_permission_not_sloppy_v01
        source_type: authored_ch10_source
        body: |
          If part of you just flagged this as permission to do sloppy work, that is not what is being asked here. The deliberate not-do is choosing a genuine stopping point on purpose, not abandoning standards. The discomfort of choosing it is the actual practice.

      - surface: STORY_PROGRESS_2
        beat_id: ch10_jordan_progress_2_declined_optional_task_v01
        source_type: authored_ch10_source
        character: Jordan
        story_position: middle
        body: |
          The following week, Jordan was offered an optional stretch assignment that would have looked good but required weekends for a month. He said no in the same email thread, plainly, without over-explaining. He noticed he expected consequences that never arrived.

      - surface: AUTHOR_TOOL_INTRO
        beat_id: ch10_author_tool_intro_boundary_setting_v01
        source_type: authored_ch10_source
        author_id: lena_thorne
        body: |
          Before you decide your next deliberate stop, I want to offer you a short practice built for exactly this moment — the moment right before you say no, and the moment right after.

      - surface: CANONICAL_EXERCISE_BINDING
        beat_id: ch10_exercise_binding_boundary_setting_v01
        source_type: bound_canonical_exercise
        bound_exercise_id: integ_012
        bound_exercise_name: Boundary Setting
        bound_exercise_source: SOURCE_OF_TRUTH/practice_library/inbox/integration_bridges_library_34_PRODUCTION_READY.json
        five_layer:
          bridge: "Right now. Not later. Not to fix anything. Just to give yourself a different input for a moment."
          intro: "This is Boundary Setting. Insight without action fades. You do not need to believe that. Just try it."
          description: "Think about a boundary you need to set or reinforce. Saying no to something. Protecting your time or energy. Boundaries aren't mean. They're necessary. What would it be like to set a boundary from this grounded, calm place? Not out of anger or resentment, but from clarity about what you need. You deserve to protect your well-being."
          aha: "Now, I want you to notice something. Notice what shifted. Whatever came up is valid. Whatever happened — or did not happen — is exactly right."
          integration: "Now, before you move on, the smallest step counts. Nothing has to change from this moment forward. That is enough."
        body: |
          This is Boundary Setting, drawn from the practice library rather than invented for this book. Think about a boundary you need to set or reinforce — saying no to something, protecting your time or energy. Boundaries aren't mean; they're necessary. What would it be like to set this boundary from a grounded, calm place, not out of anger or resentment but from clarity about what you need? You deserve to protect your well-being. Notice what shifted; whatever came up is valid, whatever happened or did not happen is exactly right. Before you move on, remember the smallest step counts. That is enough.

      - surface: INTEGRATION_REFLECTION
        beat_id: ch10_integration_reflection_boundary_setting_v01
        source_type: authored_ch10_source
        body: |
          The practice is small on purpose. A boundary set once does not undo years of a system trained to keep going, but each one is a small, real piece of evidence that the alarm was wrong about what would happen if you stopped.

      - surface: PIVOT_BINDING
        beat_id: ch10_pivot_binding_finish_line_moves_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v27
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "The pivot here is the bargain Jordan had been making without noticing."
        body: |
          The pivot here is the bargain Jordan had been making without noticing: the finish line that promises rest tends to keep moving, and a system organized around it never gets to stop. I will rest when this is done, the bargain goes — but when the project ships, another arrives, and the rest is deferred again, indefinitely. The way out is to stop waiting for the finish line and insert the deliberate not-do into the unfinished middle, because the work will always still be there. The rest has to be taken from inside the ongoing demand, not after it, because there is no after.

      - surface: CLOSING_TAKEAWAY_BINDING
        beat_id: ch10_closing_takeaway_stopping_is_discipline_v01
        source_type: authored_ch10_source
        body: |
          Stopping on purpose is not the absence of standards. It is a discipline of its own, and it is one you are allowed to practice starting with something small tonight.

      - surface: STORY_PROGRESS_3
        beat_id: ch10_jordan_progress_3_intentional_incomplete_v01
        source_type: authored_ch10_source
        character: Jordan
        story_position: end
        body: |
          A month later, Jordan submitted a project update he knew was not the most polished version he could produce, wrote "this is where it stands, happy to iterate if needed" beneath it, and sent it before he could reopen the document. No one asked him to iterate. The boulder had rolled back down, as it always would. He had chosen, this time, when to walk away from the hill.

      - surface: CALLBACK_RETURN
        beat_id: ch10_callback_return_ledger_chosen_stop_v01
        source_type: authored_ch10_source
        body: |
          The ledger from Chapter 1 does not ask you to do less of everything, indiscriminately. It asks you to notice which hours were ever actually required — and to start, deliberately, choosing not to spend the ones that weren't.

      - surface: PROPULSION
        beat_id: ch10_propulsion_to_ch11_v01
        source_type: authored_ch10_source
        body: |
          Choosing what not to do only holds if you actually believe you are still worth something on the days you produce less. That belief is the last real piece of this book's argument, and it is where we go next.
