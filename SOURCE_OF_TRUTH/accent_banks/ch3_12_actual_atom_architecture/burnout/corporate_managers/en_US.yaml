      - STORY_PROGRESS_1
      - TRANSITION_GLUE
      - MECHANISM_EXPLANATION
      - COMPOSITE_TEACHING_BINDING
      - CITED_EVIDENCE_BINDING
      - BRIDGE_TO_EXTERNAL
      - EXTERNAL_STORY_OR_CASE_STUDY
      - BRIDGE_BACK_TO_READER
      - PERSONA_TOPIC_REFLECTION
      - TROUBLESHOOTING_PERMISSION
      - STORY_PROGRESS_2
      - AUTHOR_TOOL_INTRO
      - PRACTICE_APPLICATION_TOOL
      - INTEGRATION_REFLECTION
      - PIVOT_BINDING
      - CLOSING_TAKEAWAY_BINDING
      - STORY_PROGRESS_3
      - CALLBACK_RETURN
      - PROPULSION
    beats:
      - surface: HOOK_QUESTION
        beat_id: ch8_hook_question_who_are_you_carrying_v01
        source_type: authored_ch8_source
        body: |
          Whose problem have you quietly made your own this month — and when did they actually ask you to carry it?

      - surface: SCENE
        beat_id: ch8_scene_marcus_saturday_call_v01
        source_type: authored_ch8_source
        body: |
          Marcus took a call from a junior report on a Saturday, again, and spent forty minutes coaching her through a conflict with a peer that had nothing to do with him. His own daughter waited at the kitchen table with a board game half set up, watching her father mouth "one more minute" for the third time.

      - surface: VALIDATION_NORMALIZATION
        beat_id: ch8_validation_rescuing_reflex_common_v01
        source_type: authored_ch8_source
        body: |
          If you have ever picked up a call you didn't have to take, on a day you were supposed to be off, for a problem that was never technically yours, that reflex is not saintliness. It is a nervous system that learned, somewhere, that other people's distress is an emergency you are responsible for resolving.

      - surface: ANGLE_CALLBACK
        beat_id: ch8_angle_callback_relational_ledger_v01
        source_type: authored_ch8_source
        body: |
          The invisible cost extends past your own body and your own calendar into the people closest to you. Every Saturday spent rescuing someone else's problem is a Saturday quietly withdrawn from the account of the people who actually needed you present.

      - surface: CALLBACK_ECHO
        beat_id: ch8_callback_echo_ledger_relational_v01
        source_type: authored_ch8_source
        body: |
          The ledger from Chapter 1 is not only personal. It has a relational column too — and Marcus's daughter, watching the board game sit unplayed, was one of the people quietly paying into it alongside him.

      - surface: ANALOGY
        beat_id: ch8_analogy_lifeguard_never_off_duty_v01
        source_type: authored_ch8_source
        analogy_not_metaphor: true
        body: |
          Think of a lifeguard who never leaves the chair, even on days off, because every swimmer looks, to that trained eye, like they might be drowning. The vigilance that makes a good lifeguard on shift becomes exhausting and finally corrosive when it never clocks out — and the people nearest to that lifeguard start to notice they are only ever seen as potential emergencies.

      - surface: AUTHOR_COMMENTARY
        beat_id: ch8_author_commentary_rescuing_reads_as_love_v01
        source_type: authored_ch8_source
        author_id: lena_thorne
        commentary_type: observed_pattern
        body: |
          I have often heard rescuing described, by the person doing it, as simply being a good manager, a good friend, a good parent — and I do not doubt the care underneath it. What I want to name here is that a rescue that is never declined starts to cost the rescuer's own relationships, quietly, in the very currency it was trying to protect.

      - surface: READER_PROMISE
        beat_id: ch8_reader_promise_direct_you_v01
        source_type: authored_ch8_source
        body: |
          In this chapter, you will learn to notice the relational cost of chronic rescuing, so the people closest to you stop losing time to problems that were never actually theirs to lose it to.

      - surface: STORY_PROGRESS_1
        beat_id: ch8_marcus_progress_1_saturday_call_v01
        source_type: authored_ch8_source
        character: Marcus
        story_position: beginning
        body: |
          When Marcus finally hung up, his daughter had already put the board game away without him. She said it was fine. Her voice was careful in a way that told him it was not entirely fine, and that she was already learning not to expect otherwise.

      - surface: TRANSITION_GLUE
        beat_id: ch8_transition_daughter_to_mechanism_v01
        source_type: authored_ch8_source
        body: |
          That careful voice is worth sitting with, because it marks the exact place where rescuing stops being generosity and starts being a withdrawal from somewhere else — a place Marcus had not been tracking at all.

      - surface: MECHANISM_EXPLANATION
        beat_id: ch8_mechanism_resentment_and_boundary_v01
        source_type: authored_ch8_source
        body: |
          Chronic rescuing runs on a boundary that keeps getting crossed by the rescuer's own hand: each unrequested Saturday call is a small overdraft against reserves that were meant for someone else. The body does not always register these overdrafts immediately. But they accumulate, and eventually they surface as a low, confusing resentment — not at the person being rescued, but at the shape of a life organized around always being available for other people's emergencies.

      - surface: COMPOSITE_TEACHING_BINDING
        beat_id: ch8_teaching_binding_resentment_reports_boundary_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v26
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "Here is the deeper point underneath the careful tone in Marcus's daughter's voice."
        body: |
          Here is the deeper point underneath the careful tone in Marcus's daughter's voice: resentment is often a depleted system reporting a boundary that was crossed too many times. It feels ugly and out of character, and most people try to suppress it, adding guilt about the resentment on top of the resentment itself. But resentment tends to accumulate exactly where demands have repeatedly exceeded what a person had to give, and they gave anyway — each unacknowledged limit leaving a small residue that compounds over time.

          The work is not to suppress the feeling, which only buries the signal while the cause continues. It is to read it: to ask what limit the resentment is reporting, and whether that limit — Saturday, dinner, the daughter's board game — finally deserves to be honored.

      - surface: CITED_EVIDENCE_BINDING
        beat_id: ch8_evidence_binding_compassion_fatigue_v01
        source_type: bound_evidence
        bound_evidence_id: burn_compassion_fatigue_figley_1995
        bound_evidence_source: SOURCE_OF_TRUTH/accent_banks/evidence/burnout/entries.yaml
        body: |
          Figley's 1995 research on compassion fatigue describes exactly the mechanism at work in Marcus's Saturday calls: caregivers and helpers can develop a secondary exhaustion from empathic engagement that mirrors burnout but tracks exposure to others' distress rather than workload alone. Rescuing is not free simply because it looks like generosity from the outside. It draws on the same finite reserves as everything else, and it draws on them even on the days meant to be protected.

      - surface: BRIDGE_TO_EXTERNAL
        beat_id: ch8_bridge_to_external_caregiver_v01
        source_type: authored_ch8_source
        body: |
          The research names the exhaustion. Public radio has captured, in caregivers' own words, exactly how this kind of rescuing changes a household from the inside.

      - surface: EXTERNAL_STORY_OR_CASE_STUDY
        beat_id: ch8_external_story_fresh_air_caregiver_v01
        source_type: bound_external_story
        bound_story_id: ext_burn_fresh_air_caregiver_v01
        bound_story_source: SOURCE_OF_TRUTH/accent_banks/external_stories/burnout_entries.yaml
        body: |
          Fresh Air episodes on caregiving — parents of disabled children, adult children of aging parents, nurses leaving the profession — share a quiet recognition: burnout arrives as numbness, not only tears, and guests describe managing everyone else's crisis so continuously that they lose track of their own needs and their family's, one small deferred moment at a time. The rescuing was never the villain in these stories. The absence of any boundary around it was.

      - surface: BRIDGE_BACK_TO_READER
        beat_id: ch8_bridge_back_after_caregiver_v01
        source_type: authored_ch8_source
        body: |
          You may not be a caregiver in the clinical sense, and the shape can still be familiar: a Saturday call taken instead of a board game finished, a pattern of always being the one who picks up. The cost does not announce itself all at once. It shows up, quietly, in a daughter's careful voice.

      - surface: PERSONA_TOPIC_REFLECTION
        beat_id: ch8_persona_reflection_manager_rescuing_v01
        source_type: authored_ch8_source
        body: |
          Corporate management often trains rescuing directly into the job description: the manager is supposed to be the person who steps in when a report is struggling, who absorbs the escalation before it reaches leadership, who is always technically reachable. That training does not stop being active just because the calendar says weekend.

      - surface: TROUBLESHOOTING_PERMISSION
        beat_id: ch8_troubleshooting_permission_not_cold_v01
        source_type: authored_ch8_source
        body: |
          If part of you is already worried that setting a limit here means becoming a manager who doesn't care, notice that fear and set it down for now. This chapter is not asking you to stop caring about your team. It is asking you to notice what the unlimited version of that care has been quietly costing at your own kitchen table.

      - surface: STORY_PROGRESS_2
        beat_id: ch8_marcus_progress_2_declined_call_v01
        source_type: authored_ch8_source
        character: Marcus
        story_position: middle
        body: |
          The next Saturday, when the same report texted about a different peer conflict, Marcus typed "let's talk Monday" and then sat with his phone for a full minute before sending it, certain something would go wrong because he had not immediately rescued. Nothing went wrong. The conflict was still there Monday, exactly as manageable as it would have been on Saturday.

      - surface: AUTHOR_TOOL_INTRO
        beat_id: ch8_author_tool_intro_rescue_ledger_v01
        source_type: authored_ch8_source
        author_id: lena_thorne
        body: |
          I want to give you a small diagnostic for exactly that Saturday text — a way to see clearly whose problem you were about to rescue, and what it was quietly costing elsewhere.

      - surface: PRACTICE_APPLICATION_TOOL
        beat_id: ch8_tool_rescue_ledger_v01
        source_type: authored_ch8_source
        tool_not_exercise: true
        tool_steps:
          - "Name a problem you stepped into this month that was not formally yours to solve."
          - "Name who or what lost your time as a result."
          - "Ask: what would have happened if you had let the person carry it themselves, at least at first."
        body: |
          The Rescue Ledger has three lines. Rescue: name a problem you stepped into this month that was not formally yours to solve. Cost: who or what lost your time as a result — a person, an evening, a piece of your own rest? Test: what would have happened, specifically, if you had let the other person carry it themselves, at least at first? Write plainly. Notice how often the honest answer is that they could have carried more than you assumed.

      - surface: INTEGRATION_REFLECTION
        beat_id: ch8_integration_reflection_rescue_ledger_v01
        source_type: authored_ch8_source
        body: |
          The ledger is not asking you to become unavailable. It is asking you to notice that every rescue has a cost somewhere, even when it looks free, and that the people closest to you are often the ones quietly absorbing it.

      - surface: PIVOT_BINDING
        beat_id: ch8_pivot_binding_withdrawal_removes_support_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v29
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "The pivot here is the other half of the same pattern."
        body: |
          The pivot here is the other half of the same pattern: withdrawing from people is often the depleted system economizing, and the withdrawal removes one of recovery's main supports. Marcus's constant availability to his team was quietly paired with a growing unavailability to his own family — the same depletion that made rescuing feel automatic was also making genuine presence at home feel expensive. Nervous systems regulate partly through contact with other steady nervous systems; a nightly hour with his daughter is not indulgence. It is closer to medicine, and rescuing everyone else was cutting him off from receiving it.

      - surface: CLOSING_TAKEAWAY_BINDING
        beat_id: ch8_closing_takeaway_rescue_has_a_cost_v01
        source_type: authored_ch8_source
        body: |
          Every rescue you make has a cost, and it is rarely paid by you alone. Someone at your own table has been quietly footing part of the bill.

      - surface: STORY_PROGRESS_3
        beat_id: ch8_marcus_progress_3_finished_game_v01
        source_type: authored_ch8_source
        character: Marcus
        story_position: end
        body: |
          Three Saturdays later, Marcus and his daughter finished the board game they had started weeks earlier, no calls interrupting it. She won. He noticed, watching her arrange the pieces back in the box, that he had missed this specific, ordinary kind of noticing far more than he had realized.

      - surface: CALLBACK_RETURN
        beat_id: ch8_callback_return_relational_entry_v01
        source_type: authored_ch8_source
        body: |
          The ledger from Chapter 1 does not stop at your own skin. It runs through every relationship where your availability quietly became someone else's Saturday, and Marcus's daughter was one of the people this chapter finally let him see clearly.

      - surface: PROPULSION
        beat_id: ch8_propulsion_to_ch9_v01
        source_type: authored_ch8_source
        body: |
          If rescuing everyone costs more than it looks like it costs, the next honest question is how much capacity you actually have to give in the first place — and whether admitting a real limit is failure, or simply accurate accounting. That is where we go next.
    binding_summary:
      new_authored_beats: 22
      bound_beats: 4
      bound_to:
        - type: composite_doctrine
          id: "COMPOSITE_DOCTRINE v26"
          used_by: [ch8_teaching_binding_resentment_reports_boundary_v01]
        - type: composite_doctrine
          id: "COMPOSITE_DOCTRINE v29"
