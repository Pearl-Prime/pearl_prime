  - chapter: 8
    chapter_title: The Cost of Rescuing
    chapter_theme: relational consequence of rescuing
    architecture:
      - HOOK_QUESTION
      - SCENE
      - VALIDATION_NORMALIZATION
      - ANGLE_CALLBACK
      - CALLBACK_ECHO
      - ANALOGY
      - AUTHOR_COMMENTARY
