    beats:
      - surface: HOOK_QUESTION
        beat_id: ch4_hook_question_body_truth_v01
        source_type: authored_ch4_source
        body: |
          What if the headache, the clenched jaw, the stomach that has stopped tolerating coffee were never random — what if they were the only language your body had left to use, after every other message you sent yourself went unread?

      - surface: SCENE
        beat_id: ch4_scene_devon_urgent_care_v01
        source_type: authored_ch4_source
        body: |
          Devon sat in an urgent care waiting room at 7:40 p.m., still in his badge lanyard, filling out a form that asked when his chest tightness started. He wrote "a few days," then crossed it out and wrote "a few months," then crossed that out too, because the honest answer was that he could not remember a time recently when his chest had not been at least a little tight.

      - surface: VALIDATION_NORMALIZATION
        beat_id: ch4_validation_symptoms_not_overreacting_v01
        source_type: authored_ch4_source
        body: |
          If you have sat in a waiting room half-convinced you were overreacting to a body that felt undeniably wrong, that split is not confusion. It is what happens when a person has been trained for years to trust the calendar over the body, and the body finally got loud enough to compete.

      - surface: ANGLE_CALLBACK
        beat_id: ch4_angle_callback_ledger_evidence_v01
        source_type: authored_ch4_source
        body: |
          The invisible cost was never only a feeling. It was a set of physical entries — tightened muscle, shortened breath, a stomach on permanent alert — and this chapter reads those entries as evidence rather than inconvenience.

      - surface: CALLBACK_ECHO
        beat_id: ch4_callback_echo_ledger_body_v01
        source_type: authored_ch4_source
        body: |
          Keep the ledger in mind once more. Chapter 1 introduced it as something your body was paying into. This chapter shows you where the receipts have been sitting the whole time: not in your inbox, but in your shoulders, your jaw, your sleep.

      - surface: ANALOGY
        beat_id: ch4_analogy_smoke_detector_v01
        source_type: authored_ch4_source
        analogy_not_metaphor: true
        body: |
          Think of a smoke detector with its battery slowly failing. At first it still chirps at real smoke. Then it starts chirping at nothing, and gets disconnected out of irritation. Months later, an actual fire spreads unannounced, because the one system built to warn early was quietly taken offline by the very person it was trying to protect.

      - surface: AUTHOR_COMMENTARY
        beat_id: ch4_author_commentary_overridden_signals_v01
        source_type: authored_ch4_source
        author_id: lena_thorne
        commentary_type: observed_pattern
        body: |
          I have often seen high-performing managers describe their body almost like unreliable staff — something to manage around, push through, or wait out. What I want to name here is what that framing costs: a body treated as an obstacle stops reporting clearly, right when its reporting matters most.

      - surface: READER_PROMISE
        beat_id: ch4_reader_promise_direct_you_v01
        source_type: authored_ch4_source
        body: |
          In this chapter, you will learn to read your body's signals as accurate data instead of static, so the next tight chest or lost night of sleep can inform you instead of just interrupting you.

      - surface: STORY_PROGRESS_1
        beat_id: ch4_devon_progress_1_urgent_care_v01
        source_type: authored_ch4_source
        character: Devon
        story_position: beginning
        body: |
          The doctor ran the tests Devon expected to fail and came back instead with an unremarkable EKG and a question: "When was the last time you took a full day where no one from work could reach you?" Devon opened his mouth to answer and found he genuinely did not know.

      - surface: TRANSITION_GLUE
        beat_id: ch4_transition_devon_to_mechanism_v01
        source_type: authored_ch4_source
        body: |
          Devon's clean test results are worth sitting with, because a body can be in real trouble without showing up on the standard panel. The trouble here was not a diagnosis. It was a signal that had been overridden for so long it had almost gone silent.

      - surface: MECHANISM_EXPLANATION
        beat_id: ch4_mechanism_interoception_override_v01
        source_type: authored_ch4_source
        body: |
          The body has a running channel — call it its inner sensing — that reports hunger, tension, fatigue, and threat in real time so the system can respond before damage compounds. Every time that report is overridden because there is a meeting to get through, the channel gets a little harder to read. Override it long enough and the channel does not just go quiet. It stops being trustworthy even when you finally try to listen.

      - surface: COMPOSITE_TEACHING_BINDING
        beat_id: ch4_teaching_binding_signals_dimmed_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v28
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "Here is the deeper point underneath the doctor's question to Devon."
        body: |
          Here is the deeper point underneath the doctor's question to Devon. Under sustained pressure, a person learns to override the body's signals — the tiredness is pushed through, the hunger ignored or numbed with caffeine, the tension worked around. Each override is small and seems necessary in the moment, but repeated for long enough it dims the channel itself, until a person genuinely cannot tell how they are or what they need.

          This degraded sensing is dangerous in a specific way: the body's signals are the early-warning system for overload, and when that system goes quiet, a person drives the depletion deeper, blind to how empty they have become, until the collapse arrives without the gradual warnings that should have preceded it. The work is to slowly turn the channel back up — to ask, gently and regularly, what the body is actually reporting, and let the small answers matter again.

      - surface: CITED_EVIDENCE_BINDING
        beat_id: ch4_evidence_binding_allostatic_load_v01
        source_type: bound_evidence
        bound_evidence_id: burn_allostatic_load_mcewen_1998
        bound_evidence_source: SOURCE_OF_TRUTH/accent_banks/evidence/burnout/entries.yaml
        body: |
          This is not just a metaphor for something psychological. McEwen's 1998 concept of allostatic load describes a real, accumulating biological wear-and-tear from chronic stress — a load that outlasts any single busy week. The tiredness sleep cannot fix, the tightness that does not release on a weekend: this is often that accumulated load speaking, in the only vocabulary a body has.

      - surface: BRIDGE_TO_EXTERNAL
        beat_id: ch4_bridge_to_external_curie_v01
        source_type: authored_ch4_source
        body: |
          The research names the load. History offers a stark picture of what happens when brilliant, driven people keep overriding it for years in service of work they believe matters too much to pause for.

      - surface: EXTERNAL_STORY_OR_CASE_STUDY
        beat_id: ch4_external_story_marie_curie_v01
        source_type: bound_external_story
        bound_story_id: ext_burn_historical_marie_curie_v01
        bound_story_source: SOURCE_OF_TRUTH/accent_banks/external_stories/burnout_entries.yaml
        body: |
          Marie Curie worked for years in a poorly ventilated shed isolating radium, absorbing radiation exposure she did not yet understand, while also carrying grief after her husband Pierre's death and the strain of public scandal. She kept teaching, fundraising, and researching through all of it, treating her own depletion as a cost of doing necessary work. Her body was reporting real damage long before the field understood what radium exposure meant — a body telling the truth to a world, and a woman, not yet equipped to hear it.

      - surface: BRIDGE_BACK_TO_READER
        beat_id: ch4_bridge_back_after_curie_v01
        source_type: authored_ch4_source
        body: |
          You are very unlikely to be handling radioactive material. But the shape may still be familiar: important work, a body sending signals that get filed under "later," and a gap between exposure and consequence wide enough to make the override feel, for a long time, like it was free.

      - surface: PERSONA_TOPIC_REFLECTION
        beat_id: ch4_persona_reflection_manager_body_v01
        source_type: authored_ch4_source
        body: |
          Corporate management often trains a specific kind of body-blindness: back-to-back meetings that leave no time to notice hunger, a culture where visible composure is rewarded regardless of what it costs internally, a calendar that treats the body as infrastructure rather than the actual system doing the work. Reading your own signals accurately can start to feel like a skill you were never taught, because in this role it was rarely useful to have it.

      - surface: TROUBLESHOOTING_PERMISSION
        beat_id: ch4_troubleshooting_permission_not_hypochondria_v01
        source_type: authored_ch4_source
        body: |
          If part of you is already worried that paying attention to your body will turn you into someone who overreacts to every twinge, that fear is common and it is not what this chapter is asking. The goal is not vigilance about symptoms. It is restoring a channel that has been muted for so long you stopped noticing it was off.

      - surface: STORY_PROGRESS_2
        beat_id: ch4_devon_progress_2_first_notice_v01
        source_type: authored_ch4_source
        character: Devon
        story_position: middle
        body: |
          Two days after the urgent care visit, Devon noticed his jaw was clenched during a routine status call — not because anything had gone wrong, but because the call itself had become the trigger. It was the first time in longer than he could say that he had caught the tension while it was happening instead of finding it hours later as a headache.

      - surface: AUTHOR_TOOL_INTRO
        beat_id: ch4_author_tool_intro_foundation_scan_v01
        source_type: authored_ch4_source
        author_id: lena_thorne
        body: |
          Before you try to fix anything, I want to offer you a way back into the channel itself — a short body scan that asks nothing of you except to notice what is already there.

      - surface: CANONICAL_EXERCISE_BINDING
        beat_id: ch4_exercise_binding_foundation_scan_v01
        source_type: bound_canonical_exercise
        bound_exercise_id: body_001
        bound_exercise_name: Foundation Scan
        bound_exercise_source: SOURCE_OF_TRUTH/practice_library/inbox/body_awareness_library_34_PRODUCTION_READY.json
        five_layer:
          bridge: "Try this before you move on. Not to fix anything. Just to give yourself a different input for a moment."
          intro: "This is Foundation Scan. Attention is the first step. You do not need to believe that. Just try it."
          description: "Starting at the top of your head, slowly bring your awareness down through your entire body. Notice your scalp, your face, your jaw. Your neck and shoulders. Your chest and belly. Your arms and hands. Your hips and legs. Your feet. Don't try to change anything. Just notice. This is your body in this moment. Say hello to it."
          aha: "Now, I want you to notice something. Notice where you held tension. Whatever came up is valid. Whatever happened — or did not happen — is exactly right."
          integration: "Now, before you move on, pick one area and notice it later. Nothing has to change from this moment forward. That is enough."
        body: |
          This is the Foundation Scan, drawn from the practice library rather than invented for this book. Starting at the top of your head, slowly bring your awareness down through your entire body — scalp, face, jaw, neck and shoulders, chest and belly, arms and hands, hips and legs, feet. Don't try to change anything. Just notice. This is your body in this moment; say hello to it. Now, notice where you held tension — whatever came up is valid, whatever happened or did not happen is exactly right. Before you move on, pick one area and notice it again later today. Nothing has to change from this moment forward. That is enough.

      - surface: INTEGRATION_REFLECTION
        beat_id: ch4_integration_reflection_scan_v01
        source_type: authored_ch4_source
        body: |
          The scan is not diagnostic and it is not a fix. It is practice at receiving a report your body has been trying to send you for a long time. The more often you receive it, the less it has to shout to be heard.

      - surface: PIVOT_BINDING
        beat_id: ch4_pivot_binding_ledger_coming_due_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v07
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "This is the pivot Devon's waiting room moment was quietly pointing toward."
        body: |
          This is the pivot Devon's waiting room moment was quietly pointing toward: the body keeps a ledger, and burnout is often that ledger coming due. A young system can run a deficit for years and seem to suffer no consequence — the bill is not waived, only deferred — and the exhaustion that finally lands is rarely the cost of one bad week. It is the cost of years, arriving all at once. The work is to stop adding to the debt, and let the long, slow repayment do its work.

      - surface: CLOSING_TAKEAWAY_BINDING
        beat_id: ch4_closing_takeaway_body_evidence_v01
        source_type: authored_ch4_source
        body: |
          Your body was never being dramatic. It was keeping accurate books on a life that was overdrawing it, and it has been trying to hand you the statement for a long time.

      - surface: STORY_PROGRESS_3
        beat_id: ch4_devon_progress_3_scheduled_off_time_v01
        source_type: authored_ch4_source
        character: Devon
        story_position: end
        body: |
          By the end of the month, Devon had blocked one weekday evening a week as genuinely unreachable — not a grand overhaul, just one recurring gap. His chest was not fully quiet yet. But for the first time, when it tightened, he noticed it the same day instead of the same season.

      - surface: CALLBACK_RETURN
        beat_id: ch4_callback_return_ledger_body_v01
        source_type: authored_ch4_source
        body: |
          The ledger from Chapter 1 was never abstract. It was written in Devon's jaw, in his shortened breath, in a channel that had been muted so long it forgot how to speak clearly. Reading the body's entries honestly is not weakness. It is the only way the account ever gets balanced.

      - surface: PROPULSION
        beat_id: ch4_propulsion_to_ch5_v01
        source_type: authored_ch4_source
        body: |
          If the body has been telling the truth all along, the next question is why so many capable people keep overriding it anyway — often not out of denial, but because they have quietly taken on far more than was ever theirs to carry. That is where we go next.
