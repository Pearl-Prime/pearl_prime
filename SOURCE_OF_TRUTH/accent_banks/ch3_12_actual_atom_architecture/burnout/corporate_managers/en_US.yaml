  - chapter: 11
    chapter_title: Worth Without Output
    chapter_theme: worth without output
    architecture:
      - HOOK_QUESTION
      - SCENE
      - VALIDATION_NORMALIZATION
      - ANGLE_CALLBACK
      - CALLBACK_ECHO
      - ANALOGY
      - AUTHOR_COMMENTARY
