      canonical_exercise_bound: false
      canonical_exercise_bound_reason: >
        Ch8 is a relational/diagnostic chapter, not a nervous-system regulation
        chapter, so it uses PRACTICE_APPLICATION_TOOL (the Rescue Ledger) rather
        than CANONICAL_EXERCISE_BINDING.

  - chapter: 9
    chapter_title: Finite Capacity Is Accurate Accounting
    chapter_theme: finite capacity as accurate accounting
    architecture:
      - HOOK_QUESTION
      - SCENE
      - VALIDATION_NORMALIZATION
      - ANGLE_CALLBACK
      - CALLBACK_ECHO
      - ANALOGY
      - AUTHOR_COMMENTARY
      - READER_PROMISE
      - STORY_PROGRESS_1
      - TRANSITION_GLUE
      - MECHANISM_EXPLANATION
      - COMPOSITE_TEACHING_BINDING
      - CITED_EVIDENCE_BINDING
      - BRIDGE_TO_EXTERNAL
      - EXTERNAL_STORY_OR_CASE_STUDY
      - BRIDGE_BACK_TO_READER
      - PERSONA_TOPIC_REFLECTION
      - TROUBLESHOOTING_PERMISSION
      - STORY_PROGRESS_2
      - AUTHOR_TOOL_INTRO
      - CANONICAL_EXERCISE_BINDING
      - INTEGRATION_REFLECTION
      - PIVOT_BINDING
      - CLOSING_TAKEAWAY_BINDING
      - STORY_PROGRESS_3
      - CALLBACK_RETURN
      - PROPULSION
    beats:
      - surface: HOOK_QUESTION
        beat_id: ch9_hook_question_capacity_or_character_v01
        source_type: authored_ch9_source
        body: |
          When you finally cannot take on one more thing, is that a failure of character, or is it just an honest number showing up where a story used to be?

      - surface: SCENE
        beat_id: ch9_scene_sofia_third_ask_v01
        source_type: authored_ch9_source
        body: |
          Sofia stared at a Slack message asking if she could "just quickly" take on a fourth workstream this quarter, and felt something in her chest refuse before her mind had finished reading the sentence. She typed "sure, happy to help" anyway, deleted it, and sat with her hands on the keyboard, not typing anything at all.

      - surface: VALIDATION_NORMALIZATION
        beat_id: ch9_validation_refusal_is_data_v01
        source_type: authored_ch9_source
        body: |
          If your body has ever said no before your mind finished agreeing to something, that reflex is not weakness. It is a system with better bookkeeping than your inbox, reporting a balance you had not consciously checked.

      - surface: ANGLE_CALLBACK
        beat_id: ch9_angle_callback_ledger_as_accounting_v01
        source_type: authored_ch9_source
        body: |
          The invisible cost has always been a form of accounting, even when it did not feel like one. This chapter asks you to treat the ledger the way you would treat any honest set of books: not as an insult, but as information you can actually use.

      - surface: CALLBACK_ECHO
        beat_id: ch9_callback_echo_ledger_balance_v01
        source_type: authored_ch9_source
        body: |
          The ledger from Chapter 1 was never keeping score to shame you. It was keeping a running balance — and Sofia's hands frozen over the keyboard were the closest thing to that balance finally being read out loud.

      - surface: ANALOGY
        beat_id: ch9_analogy_overdraft_not_moral_failure_v01
        source_type: authored_ch9_source
        analogy_not_metaphor: true
        body: |
          Think of a bank account that flags an overdraft. The flag is not a judgment on your worth as a person. It is a number describing a number, nothing more — and yet many people respond to their own depleted capacity as though the flag were a verdict on their character rather than an accurate read of a finite balance.

      - surface: AUTHOR_COMMENTARY
        beat_id: ch9_author_commentary_capacity_not_failure_v01
        source_type: authored_ch9_source
        author_id: lena_thorne
        commentary_type: observed_pattern
        body: |
          I have often seen capable managers treat their own limits as evidence of insufficient effort, as though a truly committed person would simply find more room. What I want to name here is that capacity is not a measure of commitment. It is a measure of capacity, and treating it as a character test is what keeps people spending past a balance that was never infinite to begin with.

      - surface: READER_PROMISE
        beat_id: ch9_reader_promise_direct_you_v01
        source_type: authored_ch9_source
        body: |
          In this chapter, you will learn to read your own limits as accurate information rather than as evidence against you, so "I don't have capacity for this" can become a fact you state instead of a failure you confess.

      - surface: STORY_PROGRESS_1
        beat_id: ch9_sofia_progress_1_frozen_hands_v01
        source_type: authored_ch9_source
        character: Sofia
        story_position: beginning
        body: |
          Sofia eventually sent "let me check my bandwidth and get back to you tomorrow" — not a yes, not a no, just enough of a pause to avoid answering from the frozen place her body had put her in. It was the smallest possible delay. It still felt like defiance.

      - surface: TRANSITION_GLUE
        beat_id: ch9_transition_delay_to_mechanism_v01
        source_type: authored_ch9_source
        body: |
          That small delay matters, because it is often the only room a depleted decision-making system has left. Understanding why decisions get harder exactly when capacity runs low explains what Sofia was actually experiencing at her keyboard.

      - surface: MECHANISM_EXPLANATION
        beat_id: ch9_mechanism_decision_fatigue_v01
        source_type: authored_ch9_source
        body: |
          The act of deciding — weighing options, overriding the easy impulse, holding a boundary steady against pressure — draws on a limited and depletable pool of self-control. Through a long stretch of demands and resisted requests, that pool drains, and as it empties, the capacity to decide collapses earlier and earlier, sometimes down to the smallest choices. This is not a defect. It is a specific, measurable resource running low, exactly the way any finite resource does under sustained draw.

      - surface: COMPOSITE_TEACHING_BINDING
        beat_id: ch9_teaching_binding_decision_capacity_wears_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v22
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "Here is the deeper point underneath Sofia's frozen hands over the keyboard."
        body: |
          Here is the deeper point underneath Sofia's frozen hands over the keyboard: the capacity to decide wears down like a muscle, which is why depletion shows up first as small choices becoming impossible. In ordinary life this pool refills overnight; in burnout it does not fully refill, so a person begins each day already partway depleted, and the capacity to decide collapses earlier and earlier. It is not weakness of will. It is a depleted will, which is a different thing entirely — and a worn resource recovers by being spent less, not by being scolded for running low.

      - surface: CITED_EVIDENCE_BINDING
        beat_id: ch9_evidence_binding_who_occupational_v01
        source_type: bound_evidence
        bound_evidence_id: burn_who_occupational_burnout_2019
        bound_evidence_source: SOURCE_OF_TRUTH/accent_banks/evidence/burnout/entries.yaml
        body: |
          The World Health Organization's 2019 classification gives this accounting an official weight worth naming plainly: burnout is an occupational phenomenon resulting from chronic workplace stress that has not been successfully managed — not a personal character flaw. When Sofia's capacity ran out on a fourth workstream, the organization studying this pattern at a population level had already concluded that the exhaustion belongs to the system generating the demand at least as much as to the person absorbing it.

      - surface: BRIDGE_TO_EXTERNAL
        beat_id: ch9_bridge_to_external_nightingale_v01
        source_type: authored_ch9_source
        body: |
          The classification names the pattern at a population scale. History shows what happens to one specific, formidable person who spent past her own accurate limit for years before the accounting finally came due.

      - surface: EXTERNAL_STORY_OR_CASE_STUDY
        beat_id: ch9_external_story_nightingale_v01
        source_type: bound_external_story
        bound_story_id: ext_burn_historical_florence_nightingale_v01
        bound_story_source: SOURCE_OF_TRUTH/accent_banks/external_stories/burnout_entries.yaml
        body: |
          Florence Nightingale revolutionized nursing during the Crimean War through relentless, self-sacrificing work — and collapsed afterward with what historians now read as chronic illness and probable burnout, spending years largely bedridden while still writing the reforms that would define the profession. Her capacity had a real limit long before she treated it as one. The accounting eventually happened whether or not she had agreed to read it in advance.

      - surface: BRIDGE_BACK_TO_READER
        beat_id: ch9_bridge_back_after_nightingale_v01
        source_type: authored_ch9_source
        body: |
          You will likely never reform a profession from a sickroom, and the shape can still apply: a capacity that has a real ceiling, spent past that ceiling because acknowledging it felt like giving something up. The accounting happens either way. The only choice is whether you read it early or late.

      - surface: PERSONA_TOPIC_REFLECTION
        beat_id: ch9_persona_reflection_manager_capacity_v01
        source_type: authored_ch9_source
        body: |
          Corporate management rarely has a formal mechanism for saying "I am at capacity" that does not sound like an admission of failure, even though capacity is a completely ordinary constraint in every other resource the organization tracks — budget, headcount, server load. A manager's own bandwidth is treated as though it should be the one infinite input in an otherwise finite system.

      - surface: TROUBLESHOOTING_PERMISSION
        beat_id: ch9_troubleshooting_permission_not_excuse_v01
        source_type: authored_ch9_source
        body: |
          If part of you is worried that naming a limit will sound like an excuse, notice that worry and set it down for now. This chapter is not asking you to announce every limit publicly tomorrow. It is asking you to start reading your own capacity as a number, not as a character reference.

      - surface: STORY_PROGRESS_2
        beat_id: ch9_sofia_progress_2_actual_answer_v01
        source_type: authored_ch9_source
        character: Sofia
        story_position: middle
        body: |
          The next morning, Sofia wrote back honestly: she did not have capacity for a fourth workstream without dropping something else, and asked which of the current three should be deprioritized if this one was truly urgent. Her manager, mildly surprised, actually answered the question instead of pushing back on the premise.

      - surface: AUTHOR_TOOL_INTRO
        beat_id: ch9_author_tool_intro_energy_management_v01
        source_type: authored_ch9_source
        author_id: lena_thorne
        body: |
          I want to offer you a practice for reading your own capacity before you are asked to defend it out loud — a simple way of noticing where your energy actually is throughout an ordinary day.

      - surface: CANONICAL_EXERCISE_BINDING
        beat_id: ch9_exercise_binding_energy_management_v01
        source_type: bound_canonical_exercise
        bound_exercise_id: integ_026
        bound_exercise_name: Energy Management
        bound_exercise_source: SOURCE_OF_TRUTH/practice_library/inbox/integration_bridges_library_34_PRODUCTION_READY.json
        five_layer:
          bridge: "Pause here for a moment. Not to fix anything. Just to give yourself a different input for a moment."
          intro: "This is Energy Management. Insight without action fades. You do not need to believe that. Just try it."
          description: "Notice your energy throughout the day. When do you feel most alive and focused? When does your energy dip? Can you structure your day to work with your natural rhythms instead of against them? Do challenging work when you're fresh. Rest when you need to. You're not a machine. Honor your human needs."
          aha: "Now, I want you to notice something. Notice what shifted. Whatever came up is valid. Whatever happened — or did not happen — is exactly right."
          integration: "Now, before you move on, the smallest step counts. Nothing has to change from this moment forward. That is enough."
        body: |
          This is Energy Management, drawn from the practice library rather than invented for this book. Notice your energy throughout the day — when do you feel most alive and focused, and when does it dip? Can you structure your day to work with your natural rhythms instead of against them, doing challenging work when you're fresh and resting when you need to? You're not a machine; honor your human needs. Notice what shifted; whatever came up is valid, whatever happened or did not happen is exactly right. Before you move on, remember the smallest step counts. That is enough.

      - surface: INTEGRATION_REFLECTION
        beat_id: ch9_integration_reflection_energy_management_v01
        source_type: authored_ch9_source
        body: |
          Tracking your energy is not about optimizing every hour. It is about having an honest number to point to the next time someone asks for a fourth workstream — a real read of your capacity instead of a guess made under pressure.

      - surface: PIVOT_BINDING
        beat_id: ch9_pivot_binding_demand_exceeded_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v12
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "The pivot here is the private verdict worth questioning directly."
        body: |
          The pivot here is the private verdict worth questioning directly: you did not fail the system; in many cases the demand exceeded what any system could sustain. A great deal of modern demand is not actually calibrated to what a human capacity can sustain — workloads designed for more people than are doing them, availability expected around the clock. When a person breaks under such conditions, the break is not necessarily evidence of personal weakness. It can be evidence that the demand was never survivable indefinitely, for anyone.

      - surface: CLOSING_TAKEAWAY_BINDING
        beat_id: ch9_closing_takeaway_limit_is_a_number_v01
        source_type: authored_ch9_source
        body: |
          Your limit is not a verdict on your worth. It is a number, and numbers are allowed to be read without apology.

      - surface: STORY_PROGRESS_3
        beat_id: ch9_sofia_progress_3_deprioritized_v01
        source_type: authored_ch9_source
        character: Sofia
        story_position: end
        body: |
          By the end of the quarter, one of Sofia's original three workstreams had been formally deprioritized, and the fourth had gone to someone with room for it. Nothing had collapsed. The only thing that had changed was that her capacity had finally been treated as real information instead of an inconvenient feeling to override.

      - surface: CALLBACK_RETURN
        beat_id: ch9_callback_return_ledger_as_honest_math_v01
        source_type: authored_ch9_source
        body: |
          The ledger from Chapter 1 was never an accusation. It was always honest math, and Sofia's frozen hands over the keyboard were the moment that math finally got to speak instead of being overridden one more time.

      - surface: PROPULSION
        beat_id: ch9_propulsion_to_ch10_v01
        source_type: authored_ch9_source
        body: |
          Once a limit is read as real, the next step is learning to act on it deliberately — not by doing everything and hoping capacity magically expands, but by consciously choosing what does not get done. That is where we go next.
