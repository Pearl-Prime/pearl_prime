        yours), not a nervous-system regulation chapter, so it uses
        PRACTICE_APPLICATION_TOOL (the Coverage Map) rather than
        CANONICAL_EXERCISE_BINDING.

  - chapter: 6
    chapter_title: Why the Vacation Didn't Work
    chapter_theme: why vacation/rest did not work
    architecture:
      - HOOK_QUESTION
      - SCENE
      - VALIDATION_NORMALIZATION
      - ANGLE_CALLBACK
      - CALLBACK_ECHO
      - ANALOGY
      - AUTHOR_COMMENTARY
      - READER_PROMISE
      - STORY_PROGRESS_1
      - TRANSITION_GLUE
      - MECHANISM_EXPLANATION
      - COMPOSITE_TEACHING_BINDING
      - CITED_EVIDENCE_BINDING
      - BRIDGE_TO_EXTERNAL
      - EXTERNAL_STORY_OR_CASE_STUDY
      - BRIDGE_BACK_TO_READER
      - PERSONA_TOPIC_REFLECTION
      - TROUBLESHOOTING_PERMISSION
      - STORY_PROGRESS_2
      - AUTHOR_TOOL_INTRO
      - CANONICAL_EXERCISE_BINDING
      - INTEGRATION_REFLECTION
      - PIVOT_BINDING
      - CLOSING_TAKEAWAY_BINDING
      - STORY_PROGRESS_3
      - CALLBACK_RETURN
      - PROPULSION
    beats:
      - surface: HOOK_QUESTION
        beat_id: ch6_hook_question_vacation_didnt_work_v01
        source_type: authored_ch6_source
        body: |
          Why is it that you can come back from a full week away and, by Tuesday, feel like you never left?

      - surface: SCENE
        beat_id: ch6_scene_tomas_return_from_pto_v01
        source_type: authored_ch6_source
        body: |
          Tomás unpacked his suitcase on a Sunday night, seven days of paid time off officially used, and felt the familiar dread arrive before he had even opened his laptop. He had done everything the vacation was supposed to require — the beach, the unread novel, the phone in a drawer for most of it — and somehow he felt no fuller than when he left.

      - surface: VALIDATION_NORMALIZATION
        beat_id: ch6_validation_vacation_failure_common_v01
        source_type: authored_ch6_source
        body: |
          If a real vacation has ever left you strangely unrestored, that does not mean you are broken or ungrateful. It means the vacation addressed something your calendar could see and missed something your calendar could not: whether your mind actually stopped working, even while your body sat on a beach.

      - surface: ANGLE_CALLBACK
        beat_id: ch6_angle_callback_rest_not_reaching_account_v01
        source_type: authored_ch6_source
        body: |
          The invisible cost does not pause for a scheduled vacation. If the spending continues in the background — the mental rehearsal, the low-grade monitoring — then a week away can look like rest on the calendar while the actual ledger keeps running a deficit the whole time.

      - surface: CALLBACK_ECHO
        beat_id: ch6_callback_echo_ledger_unpaid_v01
        source_type: authored_ch6_source
        body: |
          The ledger does not care how the time was labeled. A week marked "vacation" only credits the account if the spending actually stopped — and for Tomás, some part of the spending never did.

      - surface: ANALOGY
        beat_id: ch6_analogy_car_idling_v01
        source_type: authored_ch6_source
        analogy_not_metaphor: true
        body: |
          Think of a car idling in a driveway for a week instead of being driven. The wheels have stopped, which looks like rest from the outside. But the engine is still running, still burning fuel, still generating heat — and an idling engine does not repair itself the way a truly switched-off one does.

      - surface: AUTHOR_COMMENTARY
        beat_id: ch6_author_commentary_deceleration_not_recovery_v01
        source_type: authored_ch6_source
        author_id: lena_thorne
        commentary_type: observed_pattern
        body: |
          I have often heard people describe a vacation that "should have worked" with a note of self-blame, as though gratitude for the beach should have been enough to switch something off. What I want to name here is that switching off is a separate skill from being grateful, and a week is sometimes not long enough to even begin learning it.

      - surface: READER_PROMISE
        beat_id: ch6_reader_promise_direct_you_v01
        source_type: authored_ch6_source
        body: |
          In this chapter, you will learn the difference between slowing down and actually recovering, so your next stretch of real time off has a chance to reach the account instead of just decelerating on top of it.

      - surface: STORY_PROGRESS_1
        beat_id: ch6_tomas_progress_1_unpacking_v01
        source_type: authored_ch6_source
        character: Tomás
        story_position: beginning
        body: |
          By Tuesday morning, two days back, Tomás caught himself thinking, half-seriously, that he needed another vacation to recover from the one he had just taken. He said it as a joke to a colleague. Neither of them laughed.

      - surface: TRANSITION_GLUE
        beat_id: ch6_transition_joke_to_mechanism_v01
        source_type: authored_ch6_source
        body: |
          That joke is worth taking literally for a moment, because it points at something real: a week that only decelerates a system, without ever letting it rebuild, will leave a person exactly where Tomás found himself — rested enough to notice he wasn't actually recovered.

      - surface: MECHANISM_EXPLANATION
        beat_id: ch6_mechanism_deceleration_vs_recovery_v01
        source_type: authored_ch6_source
        body: |
          Deceleration is the system slowing from high activation toward calm; it feels like relief because the contrast with the workweek is real. But deceleration is only the first stage — the system coming down, not yet rebuilding. Deeper repair processes begin only after deceleration is complete, which for a chronically activated system can take longer than a week allows. By the time Tomás's body had finished coming down, the trip was nearly over, and the climb back toward the next week began before real rebuilding had ever started.

      - surface: COMPOSITE_TEACHING_BINDING
        beat_id: ch6_teaching_binding_rest_that_doesnt_restore_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v04
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "Here is the deeper point underneath Tomás's flat, unfunny joke."
        body: |
          Here is the deeper point underneath Tomás's flat, unfunny joke: rest that does not restore is not rest. Time off work only refills the system when the mind genuinely disconnects from job demands. Physically leaving the desk while mentally rehearsing tomorrow's meeting produces a stop without a recovery — the body sits still while a part of the system keeps working, and stillness alone was never the thing that repairs a depleted person.

          This is why some vacations leave a person feeling almost as tired as they were before, and why the disappointment so often gets read as personal failure rather than as an accurate description of what actually happened: the demand paused; the mind, quietly, did not.

      - surface: CITED_EVIDENCE_BINDING
        beat_id: ch6_evidence_binding_psychological_detachment_v01
        source_type: bound_evidence
        bound_evidence_id: burn_restoration_requires_psychological_detachment_2011
        bound_evidence_source: SOURCE_OF_TRUTH/accent_banks/evidence/burnout/entries.yaml
        body: |
          Sonnentag and Fritz's research on recovery experiences found exactly this: time off work only restores energy when the mind genuinely disconnects from job demands. Physically leaving the desk while mentally rehearsing tomorrow's meeting produces stop without recovery. Tomás did not fail his vacation. His mind simply never received the memo that the demand had actually paused.

      - surface: BRIDGE_TO_EXTERNAL
        beat_id: ch6_bridge_to_external_hustle_v01
        source_type: authored_ch6_source
        body: |
          The research explains the mechanism. A whole cultural moment shows what happens when an entire generation of workers is taught, explicitly, that switching off is the failure and staying on is the badge of honor.

      - surface: EXTERNAL_STORY_OR_CASE_STUDY
        beat_id: ch6_external_story_hustle_culture_v01
        source_type: bound_external_story
        bound_story_id: ext_burn_pop_culture_hustle_v01
        bound_story_source: SOURCE_OF_TRUTH/accent_banks/external_stories/burnout_entries.yaml
        body: |
          Silicon Valley "hustle culture" — sleep-when-you're-dead slogans, founder worship, overwork memes imported and celebrated online — became a pop-culture aesthetic before the backlash caught up with documented heart attacks in thirty-year-olds and quiet confessions of collapse behind the highlight reel. The culture did not just normalize long hours. It taught an entire cohort that a mind that never switches off is a mind doing something admirable, right up until the switching-off stopped being available even when it was finally allowed.

      - surface: BRIDGE_BACK_TO_READER
        beat_id: ch6_bridge_back_after_hustle_v01
        source_type: authored_ch6_source
        body: |
          You may never have posted a hustle slogan in your life, and the pattern can still have reached you sideways — through a manager who answered email at midnight, through a culture where the fastest replier looked the most committed. The lesson lands the same way: a mind trained never to fully stop does not automatically know how, just because a vacation finally gave it the chance.

      - surface: PERSONA_TOPIC_REFLECTION
        beat_id: ch6_persona_reflection_manager_pto_v01
        source_type: authored_ch6_source
        body: |
          Corporate management often turns PTO into a logistics problem to be solved before departure rather than a state to be entered on arrival — the handoff document, the out-of-office message, the mental list of who might escalate what. A manager can do all of that competently and still leave the actual switching-off undone, because nothing in the role ever taught that it required separate attention.

      - surface: TROUBLESHOOTING_PERMISSION
        beat_id: ch6_troubleshooting_permission_no_instant_fix_v01
        source_type: authored_ch6_source
        body: |
          If part of you just concluded that you need a longer vacation to finally fix this, hold that thought loosely. Length can help, but the skill this chapter is pointing at is switching off at all — and that skill is worth practicing in small doses before you ever spend a long one testing it.

      - surface: STORY_PROGRESS_2
        beat_id: ch6_tomas_progress_2_evening_test_v01
        source_type: authored_ch6_source
        character: Tomás
        story_position: middle
        body: |
          The following Thursday, Tomás tried something smaller than a vacation: one evening with his phone in another room, no email, no plan to check "just in case." By 8 p.m. he noticed a low hum of anxiety he had not expected — proof, more than any beach ever gave him, of how unfamiliar actually stopping had become.

      - surface: AUTHOR_TOOL_INTRO
        beat_id: ch6_author_tool_intro_saying_yes_to_rest_v01
        source_type: authored_ch6_source
        author_id: lena_thorne
        body: |
          Before you plan your next big trip, I want to offer you a much smaller practice — one built for exactly the evening Tomás tried, when the body is asking for rest and the mind has not yet learned to say yes to it.

      - surface: CANONICAL_EXERCISE_BINDING
        beat_id: ch6_exercise_binding_saying_yes_to_rest_v01
        source_type: bound_canonical_exercise
        bound_exercise_id: integ_030
        bound_exercise_name: Saying Yes to Rest
        bound_exercise_source: SOURCE_OF_TRUTH/practice_library/inbox/integration_bridges_library_34_PRODUCTION_READY.json
        five_layer:
          bridge: "This one is for your body. Not to fix anything. Just to give yourself a different input for a moment."
          intro: "This is Saying Yes to Rest. The bridge is one step. You do not need to believe that. Just try it."
          description: "If your body asks for rest today, see if you can say yes. Not later. Not after you finish everything. Now. Rest doesn't have to be earned. It's not a reward for productivity. It's a biological need. You deserve to rest simply because you're alive. What would it be like to trust that and act on it?"
          aha: "Now, I want you to notice something. Notice if the next step feels clearer. There is no wrong answer. Whatever happened — or did not happen — is exactly right."
          integration: "Now, before you move on, action does not need to be big. Nothing has to change from this moment forward. You did something just now."
        body: |
          This is Saying Yes to Rest, drawn from the practice library rather than invented for this book. If your body asks for rest today, see if you can say yes — not later, not after you finish everything, now. Rest doesn't have to be earned; it is not a reward for productivity, it is a biological need, and you deserve to rest simply because you're alive. Notice if the next step feels clearer; there is no wrong answer here, whatever happened or did not happen is exactly right. Before you move on, remember the action does not need to be big. You did something just now.

      - surface: INTEGRATION_REFLECTION
        beat_id: ch6_integration_reflection_saying_yes_v01
        source_type: authored_ch6_source
        body: |
          The practice is not the vacation. It is smaller and more frequent than that on purpose, because the skill of actually stopping gets built the same way it eroded: through repetition, not through one large attempt.

      - surface: PIVOT_BINDING
        beat_id: ch6_pivot_binding_weekend_decelerate_v01
        source_type: bound_composite_doctrine
        bound_doctrine_id: COMPOSITE_DOCTRINE v23
        bound_doctrine_source: SOURCE_OF_TRUTH/composite_doctrine/burnout/CANONICAL.txt
        wrapper_intro: "The pivot here reframes what Tomás's vacation actually did."
        body: |
          The pivot here reframes what Tomás's vacation actually did: a weekend, or even a week, can decelerate a depleted system without ever recovering it. The relief on day one was real — the foot came off the accelerator, the racing eased — but relief is not the same as repair. Feeling better by the second day is not evidence the reserves rebuilt. Often it is only evidence the engine finally idled, just before it was revved again. A system this depleted may simply need longer, more frequent, or more protected stretches than a single trip provides.

      - surface: CLOSING_TAKEAWAY_BINDING
        beat_id: ch6_closing_takeaway_deceleration_not_failure_v01
        source_type: authored_ch6_source
        body: |
          Your vacation did not fail because you did it wrong. It decelerated a system that needed more than deceleration — and that is information, not a verdict on your ability to rest.

      - surface: STORY_PROGRESS_3
        beat_id: ch6_tomas_progress_3_weekly_practice_v01
        source_type: authored_ch6_source
        character: Tomás
        story_position: end
        body: |
          Tomás did not book another trip. Instead he kept the phone-in-another-room evening going once a week, and noticed, a month in, that the low hum of anxiety on those evenings had quieted from a shout to a murmur. He was not fixed. He was, for the first time, actually practicing.

      - surface: CALLBACK_RETURN
        beat_id: ch6_callback_return_ledger_credited_only_when_stopped_v01
        source_type: authored_ch6_source
        body: |
          The ledger only credits rest that actually reaches it. Chapter 1's account was never asking Tomás for a longer vacation. It was asking for a mind that had learned, even briefly, how to stop — and that is a skill built in evenings, not just in the one week a year labeled "away."

      - surface: PROPULSION
        beat_id: ch6_propulsion_to_ch7_v01
        source_type: authored_ch6_source
        body: |
          If switching off is this hard to learn, it raises a harder question underneath it: who are you, exactly, in the minutes when nothing is being produced and no one is watching? For many people that question has no ready answer. That is where we go next.
    binding_summary:
      new_authored_beats: 21
      bound_beats: 5
