- quote_id: quote_w2_univ_retag_epictetus_enchiridion_01_v01
  text: Some things are in our control and others not. Things in our control are opinion, pursuit, desire,
    aversion, and, in a word, whatever are our own actions. Things not in our control are body, property,
    reputation, command, and, in a word, whatever are not our own actions.
  text_en: Some things are in our control and others not. Things in our control are opinion, pursuit,
    desire, aversion, and, in a word, whatever are our own actions. Things not in our control are body,
    property, reputation, command, and, in a word, whatever are not our own actions.
  author: Epictetus
  primary_source: Enchiridion §1 (tr. Elizabeth Carter, 1758)
  verified_via: Perseus Digital Library, Epict. Ench. 1; Carter translation public domain
  public_domain: y
