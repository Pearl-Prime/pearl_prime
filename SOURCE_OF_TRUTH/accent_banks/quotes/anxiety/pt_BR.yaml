    — not outside.
  author: Marcus Aurelius
  primary_source: 'Meditations IV.3 (tr. Gregory Hays, 2002 — short excerpt; PD alternative: Long 1862
    same passage)'
  verified_via: 'Meditations 4.3; verified against Long PD: ''Today I have got out of all trouble, or
    rather I have cast out all trouble, for it was not outside, but within and in my opinions.'''
