# Quote bank — Wave 1 (Pearl_Research)
# Status: unwired — no pipeline consumer until accent build lane opens.
# Spec: specs/ACCENT_BEATS_SYSTEM_SPEC.md §5.1 (QUOTE)
# KNOWN_UNWIRED: accent_banks/quotes/ — bank seeded; composer/planner consumer absent.

bank_id: quotes_wave_1
status: unwired
wave: 1
authority: Pearl_Research
created: 2026-07-07
schema_version: "1.0.0"

entry_schema:
  required:
    - quote_id
    - text                    # source language
    - text_en                 # English gloss (same as text when en_*)
    - author
    - primary_source          # work + section/edition
    - verified_via
    - public_domain           # y | n
    - topic_keys
    - doctrine_keys
    - locale_fit              # cluster list or [universal]
    - secular_safe            # true | false
    - sensitivity_notes
    - position_fit            # opener | closer | either
  optional:
    - rights_note             # required when public_domain: n

