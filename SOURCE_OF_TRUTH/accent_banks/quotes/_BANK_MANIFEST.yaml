locale_clusters:
  universal: "Cross-market stoic/nature/anonymous — locale_fit tagged universal only"
  en_US: "Western canon — en_US, en_GB, en_AU; NOT tagged universal by default"
  zh_CN: "Simplified Chinese canon; PRC sensitivity exclusions enforced"
  zh_TW: "Traditional script; broader Buddhist latitude; Taiwan-resonant canon"
  ja_JP: "Japanese canon + Zen; teacher-mode vs secular tags per quote"
  de_DE: "German-language canon first (Goethe, Rilke, Nietzsche PD works)"
  fr_FR: "French canon (Montaigne, Camus PD, Pascal Pensées)"
  it_IT: "Italian canon (Seneca Latin via IT gloss, Leopardi PD)"
  es_ES: "Spanish/Latin-American canon (Baltasar Gracián, Machado)"
  hu_HU: "Hungarian canon (Petőfi, Ady, Madách PD)"
  pt_BR: "Brazilian/Portuguese canon (Machado de Assis, Pessoa PD)"

verification_artifacts:
  ledger: artifacts/research/quote_verification_ledger.jsonl
  rejected: artifacts/research/quote_rejected_log.jsonl
  sensitivity_exclusions: artifacts/research/quote_sensitivity_exclusion_log.jsonl
  claims_dir: pearl_research/claims/

