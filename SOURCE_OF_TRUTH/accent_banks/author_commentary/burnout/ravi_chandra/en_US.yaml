  allowed_positions:
  - after_REFLECTION
  register: witness
  position_variants:
    after_REFLECTION:
      body: 'I have watched people I work alongside show up early, leave late, and answer messages at
        midnight, and call all of it commitment right up until the week they could not get out of bed.

        We were trained to read that pace as proof of drive, not as a countdown.

        The ones who caught it early were not less ambitious — they were the ones who noticed the countdown
        before it hit zero.

        Notice what your own pace has been counting down toward.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
