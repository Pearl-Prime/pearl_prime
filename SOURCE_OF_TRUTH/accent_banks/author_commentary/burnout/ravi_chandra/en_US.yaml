- commentary_id: ac_ravi_burnout_observed_small_practice_v01
  commentary_type: observed_pattern
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  topic_keys:
  - burnout
  allowed_positions:
  - after_EXERCISE
  register: witness
  position_variants:
    after_EXERCISE:
      body: 'I have handed depleted people a two-minute recovery practice and watched them assume it could
        not possibly be enough to matter.

        We are trained to believe only large, visible effort counts as real repair.

        The ones who kept doing it anyway did not report feeling recharged — they reported noticing the
        depletion a little sooner each week, before it cost them a full day.

        See whether that earlier noticing is already showing up for you.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/ravi_chandra/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_ravi_burnout_admission_performed_calm_v01
  commentary_type: personal_admission
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - performed_calm_while_body_alarm_ran
  topic_keys:
  - burnout
  allowed_positions:
  - after_PIVOT
  register: witness
  position_variants:
    after_PIVOT:
      body: 'For a long stretch I could sound composed in every stand-up while running on nothing but habit
        and caffeine, and I mistook the composure for proof I was fine.

        Nobody made me hide the depletion; I had simply never been taught that looking fine and being
        fine were different measurements.

        What finally helped was not performing calm better — it was admitting the schedule producing the
        depletion was the actual problem.

        See if the next practice lands differently once you stop grading your exhaustion by how well you
        hide it.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/ravi_chandra/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_ravi_burnout_endorsement_small_v01
  commentary_type: gentle_endorsement
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  - body_noise_as_information
  topic_keys:
  - burnout
  allowed_positions:
  - after_EXERCISE
  register: witness
  position_variants:
    after_EXERCISE:
      body: 'The people I have watched keep this up did not come back with more energy, and I would not
        trust the claim if they had.

        They came back with a slightly earlier read on their own depletion, which for people who give
        all day at work is the harder-won result.

        Maybe it will do the same for you; maybe it will only buy you one honest signal before the tank
        reads empty instead of after.

        Either result is worth the two minutes it costs.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/ravi_chandra/en_US.yaml
