  register: witness
  position_variants:
    before_THREAD:
      body: 'I have watched people try a recovery practice this small and dismiss it because nothing dramatic
        happened afterward.

        The ones who stayed with it did not report a transformation — they reported fewer weeks that ended
        with them staring at a blank screen, too depleted to start.

        That is a modest result, and modest results are the ones that survive a quarter where everyone
        still needs something from you.

        Let that be permission enough for what comes next.

        '
