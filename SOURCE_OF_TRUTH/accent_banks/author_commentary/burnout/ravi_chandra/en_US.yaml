- commentary_id: ac_ravi_burnout_skeptic_running_on_fumes_v01
  commentary_type: skeptics_companion
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - skeptic_of_body_lead_approach
  - harder_to_gaslight_about_feeling
  topic_keys:
  - burnout
  allowed_positions:
  - after_EXERCISE
  register: witness
  position_variants:
    after_EXERCISE:
      body: 'I did not trust anything that sounded like a wellness exercise — I trusted output, deadlines,
        and whether the deliverable shipped on time.

        For a long time, naming my own depletion out loud sounded like something said by people with lighter
        workloads than mine.

        What changed my mind was smaller than belief: the weeks I actually logged my own reserve, I made
        fewer costly mistakes the week after.

        You do not have to trust the reframe yet — just watch whether the next week goes differently.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/ravi_chandra/en_US.yaml
