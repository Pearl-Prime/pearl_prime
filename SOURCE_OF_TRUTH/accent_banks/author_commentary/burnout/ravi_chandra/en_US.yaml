- commentary_id: ac_ravi_burnout_disclosure_ahjan_v01
  commentary_type: source_disclosure
  mode_allow:
  - teacher_mode
  composite_safe: false
  bio_license_refs:
  - ahjan_framework_observer
  topic_keys:
  - burnout
  doctrine_keys:
  - COMPOSITE_DOCTRINE v02
  allowed_positions:
  - after_REFLECTION
  register: witness
  position_variants:
    after_REFLECTION:
      body: 'I found Ahjan''s teaching on depletion after every productivity framework I had tried treated
        tiredness as a scheduling problem instead of a signal.

        He does not ask you to manage your calendar better — he asks you to stop treating exhaustion as
        evidence you are not trying hard enough.

        As someone who has watched a lot of capable people run on empty, I found that distinction usable
        at the standup and at midnight alike.

        Maybe it will help you name what your own reserve has been reporting for longer than you have
        admitted.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/ravi_chandra/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_ravi_burnout_observed_hiding_v01
  commentary_type: observed_pattern
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  - harder_to_gaslight_about_feeling
  topic_keys:
  - burnout
  allowed_positions:
  - after_INTEGRATION
  register: witness
  position_variants:
    after_INTEGRATION:
      body: 'I have watched capable people hide how depleted they were because they assumed everyone else
        on the team was handling the same load without coming apart.

        Nobody on the team would let a broken build stay hidden, but off the clock we let people hide
        the signal that matters most about themselves.

        The ones who finally said "I am running on nothing" out loud stopped carrying it alone, and the
        workload itself did not change but the isolation did.

        Take that naming into whatever you let yourself admit tonight.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/ravi_chandra/en_US.yaml
