- commentary_id: ac_lena_burnout_observed_small_practice_v01
  commentary_type: observed_pattern
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - treats_people_who_help_for_a_living
  topic_keys:
  - burnout
  allowed_positions:
  - after_EXERCISE
  register: witness
  position_variants:
    after_EXERCISE:
      body: 'I have handed depleted caregivers a two-minute recovery practice and watched them apologize
        for how small it felt.

        We are trained to measure ourselves by output, so anything that does not exhaust us can feel like
        it does not count.

        The ones who kept doing it anyway did not report feeling recharged — they reported one fewer thing
        running on empty by the end of the shift.

        See whether that is already true for you before you decide it is not enough.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/lena_thorne/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_lena_burnout_admission_ran_on_empty_v01
  commentary_type: personal_admission
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - fifteen_years_icu_nurse
  - performed_steady_while_alarm_ran
  topic_keys:
  - burnout
  allowed_positions:
  - after_PIVOT
  register: witness
  position_variants:
    after_PIVOT:
      body: 'For a long stretch I mistook my own steadiness for proof I still had capacity left, when actually
        I had none and was running on the habit of composure alone.

        Nobody made me hide it; I had simply never been taught that depletion and dedication could look
        identical from the outside.

        What finally helped was not trying harder to recover on the same schedule — it was admitting the
        schedule itself was the problem before my body admitted it for me.

        See if the next practice lands differently when you stop grading your exhaustion against your dedication.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/lena_thorne/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_lena_burnout_endorsement_helpers_v01
  commentary_type: gentle_endorsement
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - treats_people_who_help_for_a_living
  - watched_caregivers_run_on_alarm
  topic_keys:
  - burnout
  allowed_positions:
  - after_EXERCISE
  register: witness
  position_variants:
    after_EXERCISE:
      body: 'The caregivers I have watched keep this up did not come back with more energy, and I would
        not trust the claim if they had.

        They came back with a slightly earlier warning system for their own depletion, which for people
        who give all day is the harder-won result.

        Maybe it will do the same for you; maybe it will only buy you one honest signal before the tank
        reads empty instead of after.

        Either result is worth the two minutes it costs.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/lena_thorne/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_lena_burnout_skeptic_running_on_fumes_v01
  commentary_type: skeptics_companion
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - clinical_skeptic_of_soft_language
  - fifteen_years_icu_nurse
  topic_keys:
  - burnout
  allowed_positions:
  - after_EXERCISE
  register: witness
  position_variants:
    after_EXERCISE:
      body: 'I did not trust anything that sounded like a self-care exercise — I trusted charts, handoffs,
        and whether the next shift found the patient stable.

        For a long time, naming my own depletion out loud sounded like something said by people with lighter
        caseloads than mine.

        What changed my mind was smaller than belief: the days I actually logged my own reserve, I made
        fewer avoidable mistakes on the days that followed.

        You do not have to trust the reframe yet — just watch whether the next shift goes differently.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/lena_thorne/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_lena_burnout_disclosure_ahjan_v01
  commentary_type: source_disclosure
  mode_allow:
  - teacher_mode
  composite_safe: false
  bio_license_refs:
  - ahjan_framework_observer
  topic_keys:
  - burnout
  doctrine_keys:
  - COMPOSITE_DOCTRINE v02
  allowed_positions:
  - after_REFLECTION
  register: witness
  position_variants:
    after_REFLECTION:
      body: 'I found Ahjan''s teaching on depletion after every productivity handout I had ever been given
        had treated tiredness as a scheduling problem instead of a signal.

        He does not ask you to manage your time better — he asks you to stop treating exhaustion as evidence
        you are not trying hard enough.

        As someone who spent years reading bodies for a living, I found that distinction usable at the
        nurses'' station and at three in the morning alike.

        Maybe it will help you name what your own reserve has been reporting for longer than you have admitted.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/lena_thorne/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_lena_burnout_observed_hiding_v01
  commentary_type: observed_pattern
  mode_allow:
  - composite
  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - watched_caregivers_run_on_alarm
  - treats_people_who_help_for_a_living
  topic_keys:
  - burnout
  allowed_positions:
  - after_INTEGRATION
  register: witness
  position_variants:
    after_INTEGRATION:
      body: 'I have watched capable people hide how depleted they were because they assumed everyone else
        on the floor was handling the same load without coming apart.

        On the unit we would never let a colleague hide a real vital sign, but off the clock we let people
        hide the one that matters most.

        The ones who finally said "I am running on nothing" out loud stopped carrying it alone, and the
        load itself did not change but the isolation did.

        Take that naming into whatever you let yourself admit tonight.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/lena_thorne/en_US.yaml
  disclosure_feature: AUTHOR_COMMENTARY_as_AUTHOR_DISCLOSURE
- commentary_id: ac_lena_burnout_endorsement_small_v01
  commentary_type: gentle_endorsement
  mode_allow:
