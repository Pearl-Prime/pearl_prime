  - teacher_mode
  composite_safe: true
  bio_license_refs:
  - fifteen_years_icu_nurse
  - watched_caregivers_run_on_alarm
  topic_keys:
  - burnout
  allowed_positions:
  - after_REFLECTION
  register: witness
  position_variants:
    after_REFLECTION:
      body: 'On the unit I watched nurses finish a double, chart every number correctly, and then sit in
        the parking lot too depleted to turn the key.

        We called that dedication for years before anyone called it what it was.

        The ones who lasted were not the ones who cared less — they were the ones who learned to log their
        own depletion the way they logged a patient''s vitals, before it became an emergency.

        Notice what your own chart would say about you right now.

        '
  depth_pattern: AUTHOR_SOURCE_RESTRICTED_4
  deepened_by: perfect_books_wave2_bankfill_20260718
  source_authority: SOURCE_OF_TRUTH/accent_banks/author_commentary/burnout/lena_thorne/en_US.yaml
