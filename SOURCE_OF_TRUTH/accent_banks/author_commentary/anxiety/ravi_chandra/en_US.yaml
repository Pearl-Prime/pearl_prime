  - skeptic_of_body_lead_approach
  topic_keys: [anxiety, social_anxiety]
  allowed_positions: [after_EXERCISE]
  register: witness
  position_variants:
    after_EXERCISE:
      body: |
        I did not believe the body-lead thing either — not while standup was still the loudest meeting of my day.
        It sounded like something people say when they have never shipped on a deadline.
        What changed was smaller than belief: I stopped treating the chest spike as proof that I was failing the room.
        Try the next step without needing to trust it yet.

- commentary_id: ac_ravi_anxiety_observed_freeze_v01
  commentary_type: observed_pattern
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  - gen_z_professional_context
  topic_keys: [anxiety, overthinking]
  object_keys: [after_send_reply_anxiety]
  allowed_positions: [after_INTEGRATION]
  register: witness
  position_variants:
    after_INTEGRATION:
      body: |
        I have watched people stare at a task for forty minutes and call it laziness in their heads while their body was running a full threat assessment on a blank screen.
        The ones who named it freeze instead of failure stopped adding shame on top of the alarm.
        That alone did not solve the task — but it changed what happened when the task was still there the next morning.
        Take that naming into whatever you integrate tonight.

- commentary_id: ac_ravi_anxiety_endorsement_small_v01
  commentary_type: gentle_endorsement
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
