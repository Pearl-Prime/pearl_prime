- commentary_id: ac_ravi_anxiety_observed_standup_v01
  commentary_type: observed_pattern
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  - gen_z_professional_context
  topic_keys: [anxiety, overthinking]
  doctrine_keys: [COMPOSITE_DOCTRINE v03]
  object_keys: [pre_presentation_activation]
  allowed_positions: [after_REFLECTION]
  register: witness
  position_variants:
    after_REFLECTION:
      body: |
        I have watched people sit through standups with their chest running a louder meeting than the one on the calendar.
        Not one of them looked anxious — they looked prepared, which is its own kind of performance.
        The ones who started treating that chest noise as early information, not a verdict on their competence, stopped apologizing for needing a minute before they replied.
        Carry that distinction into what you try next in this room.

- commentary_id: ac_ravi_anxiety_observed_noting_v01
  commentary_type: observed_pattern
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  topic_keys: [anxiety]
  exercise_keys: [med_007]
  allowed_positions: [after_EXERCISE]
  register: witness
  position_variants:
    after_EXERCISE:
      body: |
        I have seen people try a practice this small and assume it cannot matter because nothing dramatic happened in the first sixty seconds.
        That is usually the wrong metric.
        The ones who kept going did not feel calmer on day one — they felt slightly less surprised by the alarm when it showed up again.
        Notice whether that is already different from how you have been reading your own chest.

- commentary_id: ac_ravi_anxiety_admission_body_lead_v01
  commentary_type: personal_admission
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - performed_calm_while_body_alarm_ran
  - body_noise_as_information
  topic_keys: [anxiety]
  allowed_positions: [after_PIVOT]
  register: witness
  position_variants:
    after_PIVOT:
      body: |
        This one took me the longest to believe — that the body could lead and the explanation could arrive second.
        I had built a career on being the person who had the answer before the question finished loading.
        Letting the chest speak first felt like professional negligence until I noticed how often my explanations were just elegant ways of ignoring what had already started.
        See if the next practice lands differently if you stop requiring it to make intellectual sense first.

- commentary_id: ac_ravi_anxiety_endorsement_stuck_v01
  commentary_type: gentle_endorsement
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  - harder_to_gaslight_about_feeling
  topic_keys: [anxiety]
  exercise_keys: [med_016]
  allowed_positions: [after_EXERCISE]
  register: witness
  position_variants:
    after_EXERCISE:
      body: |
        The people I have watched stick with this did not come back sounding serene.
        They came back sounding harder to gaslight about how they were actually feeling — which, in open-plan offices, counts as a real shift.
        Maybe it will help you too; maybe it will only help you name what is already happening.
        Either way, that is more useful than another performance of fine.

- commentary_id: ac_ravi_anxiety_skeptic_standup_v01
  commentary_type: skeptics_companion
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - performed_calm_while_body_alarm_ran
  - skeptic_of_body_lead_approach
  topic_keys: [anxiety, social_anxiety]
  allowed_positions: [after_EXERCISE]
  register: witness
  position_variants:
    after_EXERCISE:
      body: |
        I did not believe the body-lead thing either — not while standup was still the loudest meeting of my day.
        It sounded like something people say when they have never shipped on a deadline.
        What changed was smaller than belief: I stopped treating the chest spike as proof that I was failing the room.
        Try the next step without needing to trust it yet.

- commentary_id: ac_ravi_anxiety_disclosure_ahjan_v01
  commentary_type: source_disclosure
  mode_allow: [teacher_mode]
  composite_safe: false
  bio_license_refs:
  - ahjan_framework_observer
  topic_keys: [anxiety]
  doctrine_keys: [COMPOSITE_DOCTRINE v03]
  allowed_positions: [after_REFLECTION]
  register: witness
  position_variants:
    after_REFLECTION:
      body: |
        I came across Ahjan's teaching on the alarm within at a point when every productivity framework I tried was just a more organized way to ignore my chest.
        He does not ask you to become calm — he asks you to stop treating the alarm as a character flaw.
        I found that framing usable in sprint reviews and in the two minutes before I unmute.
        Maybe it will help you name what your body has been reporting all along.

- commentary_id: ac_ravi_anxiety_observed_freeze_v01
  commentary_type: observed_pattern
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - watched_teammates_try_practices
  - gen_z_professional_context
  topic_keys: [anxiety, overthinking]
  object_keys: [after_send_reply_anxiety]
  allowed_positions: [after_INTEGRATION]
  register: witness
  position_variants:
    after_INTEGRATION:
      body: |
        I have watched people stare at a task for forty minutes and call it laziness in their heads while their body was running a full threat assessment on a blank screen.
        The ones who named it freeze instead of failure stopped adding shame on top of the alarm.
        That alone did not solve the task — but it changed what happened when the task was still there the next morning.
        Take that naming into whatever you integrate tonight.

- commentary_id: ac_ravi_anxiety_admission_perform_fine_v01
  commentary_type: personal_admission
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - performed_calm_while_body_alarm_ran
  topic_keys: [anxiety]
  allowed_positions: [before_THREAD]
  register: witness
  position_variants:
    before_THREAD:
      body: |
        I spent years being good at performing fine while my chest kept the minutes.
        The performance was not dishonesty — it was what the job rewarded.
        What I needed was not a better mask; it was one honest signal I could trust before the mask went on.
        Carry that question into the next chapter: what is your body reporting before you answer how you are doing.

- commentary_id: ac_ravi_anxiety_endorsement_small_v01
  commentary_type: gentle_endorsement
