  position_variants:
    before_THREAD:
      body: |
        I have seen people try practices this small and dismiss them because nothing cinematic happened.
        The ones who stayed with it did not report enlightenment — they reported fewer surprise ambushes from their own nervous system.
        That is a modest win, and modest wins survive busy weeks better than breakthrough stories.
        Let that be enough permission for what comes next.

- commentary_id: ac_ravi_anxiety_skeptic_loading_screen_v01
  commentary_type: skeptics_companion
  mode_allow: [composite, teacher_mode]
  composite_safe: true
  bio_license_refs:
  - skeptic_of_body_lead_approach
  - hand_on_sternum_practice
  topic_keys: [anxiety]
  allowed_positions: [after_PIVOT]
  register: witness
  position_variants:
    after_PIVOT:
      body: |
        I thought putting a hand on my sternum during a loading screen was absurd the first dozen times I did it.
        Absurd is a fair first reaction.
        What I could not argue with was that the alarm sometimes peaked before the thought finished forming — and the hand gave me one second that the thought never did.
        You do not have to believe in it yet; you only have to notice whether the next beat arrives differently.
