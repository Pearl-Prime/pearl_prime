- accent_id: ts_anxiety_gen_z_professionals_01
  body: 'If a part of you just tried to turn the last practice into a performance review, that is the
    resistance this beat expects — not a personal defect.


    Forgetting the sequence mid-day is ordinary. Bodies under alarm drop instructions; that does not cancel
    the work already done.


    When you forget the sequence mid-day, return to one slow exhale and the phone face-down for thirty
    seconds. The alarm does not need a perfect performance — it needs a witness.


    Re-enter with the smallest honest move, then hand forward to integration — incomplete recovery is
    still data, not defeat.'
  topic_keys:
  - anxiety
  persona_fit:
  - gen_z_professionals
