  accent_class: EXERCISE_SETUP
  exercise_type: 00_breath_regulation
  body: 'Why here: the prior beat left the body activated enough that explanation alone will not land.


    What it is: This is a breath-based practice. You are not trying to breathe perfectly or deeply. You
    are giving your nervous system a rhythm it can follow. When the breath has a predictable pattern,
    the system that manages your stress response starts to ease. You do not have to believe this. Just
    follow the count and notice what your body does with it.


    What will happen: you will follow a short sequence; you may notice shift, boredom, or nothing dramatic
    — all three are valid data. Stop if dizziness or pain appears.


    Guided action comes next — keep the preview, then begin without promising a cure.


    Layered aha belongs after the steps, not before them.


    Integration handoff: return to the chapter with one noticed fact from the practice.'
