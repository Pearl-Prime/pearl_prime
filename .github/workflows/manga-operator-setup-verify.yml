# Operator checklist: runner online + required secrets + digest var. Fails loudly; optional issue on failure.
name: Manga Operator Setup Verify

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: pearl-star-gpu runner status
        id: runner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if python3 scripts/ci/check_pearl_star_runner_online.py; then
            echo "pearl_star_gpu_runner_status=online" >> "$GITHUB_OUTPUT"
            echo "## Runner" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`pearl-star-gpu\` status: **online**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "pearl_star_gpu_runner_status=offline_or_missing" >> "$GITHUB_OUTPUT"
            echo "## Runner" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`pearl-star-gpu\` status: **offline_or_missing**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Required secrets (presence only; values masked)
        id: secrets
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RUNCOMFY_API_KEY: ${{ secrets.RUNCOMFY_API_KEY }}
          RUNCOMFY_TOKEN: ${{ secrets.RUNCOMFY_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${R2_ACCOUNT_ID}" ] && MISSING="$MISSING R2_ACCOUNT_ID"
          if [ -z "${R2_ACCESS_KEY_ID}${CF_R2_ACCESS_KEY}" ]; then MISSING="$MISSING R2_ACCESS_KEY_ID|CF_R2_ACCESS_KEY"; fi
          if [ -z "${R2_SECRET_ACCESS_KEY}${CF_R2_SECRET_KEY}" ]; then MISSING="$MISSING R2_SECRET_ACCESS_KEY|CF_R2_SECRET_KEY"; fi
          [ -z "${R2_BUCKET}" ] && MISSING="$MISSING R2_BUCKET"
          [ -z "${SENDGRID_API_KEY}" ] && MISSING="$MISSING SENDGRID_API_KEY"
          if [ -z "${RUNCOMFY_API_KEY}${RUNCOMFY_TOKEN}" ]; then MISSING="$MISSING RUNCOMFY_API_KEY|RUNCOMFY_TOKEN"; fi
          if [ -z "${CLAUDE_API_KEY}${ANTHROPIC_API_KEY}" ]; then MISSING="$MISSING CLAUDE_API_KEY|ANTHROPIC_API_KEY"; fi
          echo "## Secrets" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$MISSING" ]; then
            echo "MISSING:$MISSING" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Missing secrets:$MISSING"
            exit 1
          fi
          echo "- All required secret names present (values not shown)." >> "$GITHUB_STEP_SUMMARY"

      - name: WEEKLY_ROLLOUT_OPERATOR_EMAIL repository variable
        run: |
          set -euo pipefail
          V="${{ vars.WEEKLY_ROLLOUT_OPERATOR_EMAIL }}"
          echo "## Vars" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$V" ]; then
            echo "::error::WEEKLY_ROLLOUT_OPERATOR_EMAIL repository variable is not set"
            echo "MISSING_VAR: WEEKLY_ROLLOUT_OPERATOR_EMAIL" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "- WEEKLY_ROLLOUT_OPERATOR_EMAIL is set (value masked in logs)." >> "$GITHUB_STEP_SUMMARY"

      - name: Ollama models (Pearl Star)
        continue-on-error: true
        env:
          PEARL_STAR_IP: ${{ secrets.PEARL_STAR_IP }}
          PEARL_STAR_OLLAMA_HOST: ${{ vars.PEARL_STAR_OLLAMA_HOST }}
        run: |
          python3 scripts/ci/check_ollama_models.py >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "_Ollama model check failed (non-blocking)._"

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Manga operator setup incomplete ($(date -u +%Y-%m-%dT%H:%MZ))" \
            --body "Workflow: ${{ github.workflow }} run [${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}]. See Step Summary for runner + secrets + vars. Labels: \`operator-action-required\`, \`manga\`." \
            || true
