# Cloud-native catalog fan-out for any registry lane_id: brings every under-target
# canonical brand to 800 book-plan skeletons via the bridge (no LLM), one PR per
# ≤180-file chunk, polling BOTH required checks then squash-merging.
#
# REQUIRES repo secret CATALOG_PAT (repo + workflow scope). Idempotent: pure additions only.
#
# Pilot: de_DE first; CJK6 locales are bridge-safe for structural skeletons but
# content authoring remains translation/voice-gated downstream.
name: Catalog fan-out — locale (800/brand)

on:
  workflow_dispatch:
    inputs:
      locale:
        description: Registry lane_id (e.g. de_DE, fr_FR, ja_JP)
        required: true
        default: de_DE
        type: choice
        options:
          - de_DE
          - fr_FR
          - es_ES
          - es_US
          - it_IT
          - hu_HU
          - pt_BR
          - ja_JP
          - ko_KR
          - zh_TW
          - zh_CN
          - zh_HK
          - zh_SG
      brands:
        description: >-
          Space-separated brand ids to process. Leave empty to auto-discover
          every canonical brand currently under 800 book plans for this locale.
        required: false
        default: ''
        type: string
      target:
        description: Target plan count per brand
        required: false
        default: '800'
        type: string

concurrency:
  group: catalog-fanout-locale-${{ github.event.inputs.locale }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover under-target brands (${{ github.event.inputs.locale }})
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      count: ${{ steps.list.outputs.count }}
      locale_slug: ${{ steps.list.outputs.locale_slug }}
    steps:
      - name: Guard — CATALOG_PAT must be set
        env:
          PAT: ${{ secrets.CATALOG_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::CATALOG_PAT secret is not set. Add a PAT (repo + workflow scope) named CATALOG_PAT, then re-run."
            exit 1
          fi
          echo "CATALOG_PAT present."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Compute brand matrix
        id: list
        env:
          BRANDS_INPUT: ${{ github.event.inputs.brands }}
          TARGET: ${{ github.event.inputs.target }}
          LOCALE: ${{ github.event.inputs.locale }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 - <<'PYEOF' > /tmp/matrix.json
          import os, json, collections, subprocess
          from pathlib import Path
          import yaml

          from scripts.catalog.locale_paths import normalize_lane_id, locale_slug

          lane_id = normalize_lane_id(os.environ["LOCALE"])
          slug = locale_slug(lane_id)
          book_dir = f"config/source_of_truth/book_plans_{slug}/"

          target = int(os.environ.get("TARGET") or "800")
          override = (os.environ.get("BRANDS_INPUT") or "").split()

          r = subprocess.run(
              ["git", "ls-tree", "-r", "--name-only", "origin/main", book_dir],
              capture_output=True, text=True)
          have = collections.Counter()
          for line in r.stdout.splitlines():
              have[Path(line).stem.split("__")[0]] += 1

          reg = yaml.safe_load(Path(
              "config/brand_management/global_brand_registry_unified.yaml").read_text())
          base = {
              rec.get("brand_archetype_id")
              for rec in reg.get("brands", {}).values()
              if rec.get("lane_id") == lane_id and rec.get("brand_archetype_id")
          }

          if override:
              brands = [b for b in override if have.get(b, 0) < target]
          else:
              brands = sorted((b for b in base if have.get(b, 0) < target),
                              key=lambda b: have.get(b, 0))
          print(json.dumps({"brand": brands}))
          Path("/tmp/locale_slug.txt").write_text(slug)
          PYEOF
          SLUG="$(cat /tmp/locale_slug.txt)"
          if [ -z "$SLUG" ]; then
            echo "::error::locale_slug resolved empty for LOCALE='${LOCALE}' — refusing to emit (would write to book_plans_/)."
            exit 1
          fi
          {
            echo "matrix=$(cat /tmp/matrix.json)"
            echo "count=$(python3 -c 'import json;print(len(json.load(open("/tmp/matrix.json"))["brand"]))')"
            echo "locale_slug=${SLUG}"
          } >> "$GITHUB_OUTPUT"
          echo "Brands to process for ${LOCALE}:"
          cat /tmp/matrix.json

  fanout:
    name: ${{ matrix.brand }} (${{ github.event.inputs.locale }}) → target
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    env:
      GH_TOKEN: ${{ secrets.CATALOG_PAT }}
      TARGET: ${{ github.event.inputs.target }}
      BRAND: ${{ matrix.brand }}
      LOCALE: ${{ github.event.inputs.locale }}
      LOCALE_SLUG: ${{ needs.discover.outputs.locale_slug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CATALOG_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate + chunk + PR + merge
        env:
          PYTHONPATH: ${{ github.workspace }}
          GIT_LFS_SKIP_SMUDGE: '1'
        run: |
          set -euo pipefail
          TARGET="${TARGET:-800}"
          if [ -z "${LOCALE_SLUG}" ]; then
            echo "::error::LOCALE_SLUG is empty (LOCALE='${LOCALE}') — aborting to avoid writing to config/source_of_truth/book_plans_/."
            exit 1
          fi
          BOOK_DIR="config/source_of_truth/book_plans_${LOCALE_SLUG}"
          SERIES_DIR="config/source_of_truth/series_plans_${LOCALE_SLUG}"
          git config user.name "Pearl_Catalog (CI)"
          git config user.email "catalog-ci@users.noreply.github.com"

          git fetch origin main --quiet
          COUNT=$(git ls-tree -r --name-only origin/main "$BOOK_DIR/" | grep -c "/${BRAND}__" || true)
          echo "$BRAND ($LOCALE) has $COUNT plans on origin/main (target $TARGET)"
          if [ "$COUNT" -ge "$TARGET" ]; then echo "Already complete — exiting."; exit 0; fi

          python3 scripts/catalog/gen_brand_catalog_plan_csv.py --brand "$BRAND" --locale "$LOCALE" --out "/tmp/${BRAND}.csv"
          python3 scripts/catalog/catalog_plan_csv_to_plan_yaml.py --csv "/tmp/${BRAND}.csv" --brand "$BRAND" --locale "$LOCALE" \
            --out-books "/tmp/${BRAND}_books" --out-series "/tmp/${BRAND}_series"

          git ls-tree -r --name-only origin/main "$BOOK_DIR/" > /tmp/origin_books.txt
          git ls-tree -r --name-only origin/main "$SERIES_DIR/" > /tmp/origin_series.txt
          : > /tmp/netnew.txt
          for f in "/tmp/${BRAND}_books"/*.yaml; do
            [ -e "$f" ] || continue
            bn=$(basename "$f")
            grep -q "/${bn}$" /tmp/origin_books.txt || echo "book|$f" >> /tmp/netnew.txt
          done
          for f in "/tmp/${BRAND}_series"/*.yaml; do
            [ -e "$f" ] || continue
            bn=$(basename "$f")
            grep -q "/${bn}$" /tmp/origin_series.txt || echo "series|$f" >> /tmp/netnew.txt
          done
          NET=$(wc -l < /tmp/netnew.txt | tr -d ' ')
          echo "$BRAND: $NET net-new files"
          if [ "$NET" -eq 0 ]; then echo "Nothing to add — exiting."; exit 0; fi

          split -l 180 /tmp/netnew.txt /tmp/chunk_
          BATCH=0
          for CHUNK in /tmp/chunk_*; do
            BATCH=$((BATCH+1))
            CHUNK_N=$(wc -l < "$CHUNK" | tr -d ' ')
            git fetch origin main --quiet
            BASE_TREE=$(git rev-parse "origin/main^{tree}")
            BASE_COMMIT=$(git rev-parse origin/main)
            IDX="/tmp/idx_${BRAND}_${BATCH}_$$"
            rm -f "$IDX"
            GIT_INDEX_FILE="$IDX" git read-tree "$BASE_TREE"
            while IFS='|' read -r kind src; do
              [ -z "$src" ] && continue
              if [ "$kind" = "book" ]; then dir="book_plans_${LOCALE_SLUG}"; else dir="series_plans_${LOCALE_SLUG}"; fi
              repo_path="config/source_of_truth/${dir}/$(basename "$src")"
              hash=$(git hash-object -w "$src")
              GIT_INDEX_FILE="$IDX" git update-index --add --cacheinfo "100644,$hash,$repo_path"
            done < "$CHUNK"
            NEW_TREE=$(GIT_INDEX_FILE="$IDX" git write-tree)
            rm -f "$IDX"

            if git diff-tree -r --name-status "$BASE_TREE" "$NEW_TREE" | grep -q "^D"; then
              echo "::error::deletions detected for $BRAND batch $BATCH — aborting"; exit 1
            fi

            COMMIT=$(git commit-tree "$NEW_TREE" -p "$BASE_COMMIT" \
              -m "feat(catalog): ${LOCALE} skeletons ${BRAND} batch ${BATCH} (${CHUNK_N} plans)")
            BRANCH="ci/catalog-${LOCALE_SLUG}-${BRAND}-${GITHUB_RUN_ID}-b${BATCH}"
            git push origin "${COMMIT}:refs/heads/${BRANCH}"

            PR_URL=$(gh pr create --title "feat(catalog): ${LOCALE} skeletons ${BRAND} batch ${BATCH}" \
              --body "Structural plan skeletons (\`_needs_authoring: true\`). Bridge-generated, no LLM. Pure additions for \`${LOCALE}\`. Automated by catalog-fanout-locale.yml." \
              --base main --head "$BRANCH")
            PR=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Opened PR #$PR for $BRAND batch $BATCH"

            STATE="pending"
            for _ in $(seq 1 40); do
              sleep 30
              GOV=$(gh pr view "$PR" --json statusCheckRollup --jq '.statusCheckRollup[]|select(.name=="Verify governance")|.conclusion' 2>/dev/null || true)
              PS=$(gh pr view "$PR" --json statusCheckRollup --jq '.statusCheckRollup[]|select(.name=="parse-sweep")|.conclusion' 2>/dev/null || true)
              if [ "$GOV" = "SUCCESS" ] && [ "$PS" = "SUCCESS" ]; then STATE="green"; break; fi
              if [ "$GOV" = "FAILURE" ] || [ "$PS" = "FAILURE" ]; then STATE="failed"; break; fi
            done
            if [ "$STATE" != "green" ]; then
              echo "::warning::PR #$PR not green ($STATE) — leaving open for sweep"; continue
            fi

            gh pr merge "$PR" --squash --delete-branch || true
            sleep 15
            if [ "$(gh pr view "$PR" --json state --jq '.state')" != "MERGED" ]; then
              sleep 30; gh pr merge "$PR" --squash --delete-branch || true
            fi
          done

          git fetch origin main --quiet
          FINAL=$(git ls-tree -r --name-only origin/main "$BOOK_DIR/" | grep -c "/${BRAND}__" || true)
          echo "$BRAND FINAL ($LOCALE): $FINAL plans on origin/main"
