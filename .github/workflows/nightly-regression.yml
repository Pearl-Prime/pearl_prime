# Nightly regression — full pytest + gate verification on main.
# Scheduled 03:00 UTC nightly; also on-demand.
# Failure surfaces via GitHub Actions UI + optional email hook.
name: Nightly regression

on:
  workflow_dispatch: {}
  schedule:
    # Every day at 03:00 UTC (~19:00 PT / 11:00 SGT).
    - cron: "0 3 * * *"

jobs:
  regression:
    name: Nightly regression
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run full pytest (not slow)
        id: pytest
        run: |
          PYTHONPATH=. python -m pytest tests/ -v --tb=short -m "not slow" --junitxml=artifacts/pytest.xml 2>&1 | tee artifacts/pytest_stdout.txt
        continue-on-error: true

      - name: Run governance verification
        id: governance
        run: |
          PYTHONPATH=. python scripts/ci/verify_github_governance.py --mode local 2>&1 | tee artifacts/governance_stdout.txt
        continue-on-error: true

      - name: Run production readiness gates
        id: readiness
        run: |
          PYTHONPATH=. python scripts/run_production_readiness_gates.py 2>&1 | tee artifacts/readiness_stdout.txt
        continue-on-error: true

      - name: Summarize
        if: always()
        run: |
          PYTEST_RC=${{ steps.pytest.outcome }}
          GOV_RC=${{ steps.governance.outcome }}
          READY_RC=${{ steps.readiness.outcome }}
          echo "## Nightly regression — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| pytest (not slow) | $PYTEST_RC |" >> $GITHUB_STEP_SUMMARY
          echo "| governance verifier | $GOV_RC |" >> $GITHUB_STEP_SUMMARY
          echo "| readiness gates | $READY_RC |" >> $GITHUB_STEP_SUMMARY
          if [ "$PYTEST_RC" != "success" ] || [ "$GOV_RC" != "success" ] || [ "$READY_RC" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more checks failed — see artifacts." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

      - name: Fail job if any check failed
        if: steps.pytest.outcome != 'success' || steps.governance.outcome != 'success' || steps.readiness.outcome != 'success'
        run: exit 1
