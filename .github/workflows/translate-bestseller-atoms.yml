# Translate bestseller atoms (PIVOT/TAKEAWAY/THREAD/PERMISSION/STORY) to CJK6 locales.
#
# DISABLED 2026-07-10 (CI-ALLOWLIST-N/A — this is a policy fix, not an exemption):
# this workflow previously injected TOGETHER_API_KEY and DASHSCOPE_API_KEY/BASE_URL/
# MODEL from repo secrets into scripts/localization/run_translation_loop.py, both
# banned paid cloud LLM APIs under CLAUDE.md's LLM Tier Policy
# ("BANNED -- paid LLM APIs ... DashScope cloud, Together"). See
# artifacts/qa/CI_WORKFLOW_BANNED_KEY_FIX_2026-07-10.md for the full writeup.
#
# The compliant Tier-2 path (Qwen via Ollama on Pearl Star) cannot simply replace
# those keys here: this job runs on GitHub-hosted `ubuntu-latest`, which cannot
# reach Pearl Star's Tailscale-only Ollama endpoint. Running this compliantly
# would require a self-hosted runner registered on that Tailscale network -- an
# infra decision left to the operator, not made unilaterally by this fix.
#
# Until that's decided, use the working interactive path instead (proven in
# artifacts/qa/JA_JP_TRANSLATION_CLOSEOUT_2026-07-10.md): run
# `scripts/localization/run_translation_loop.py` locally/on Pearl Star with
# OLLAMA_HOST (or QWEN_BASE_URL pointed at the Ollama :11434 endpoint) set --
# no API key needed, no banned cloud calls.
#
# Ported from audiobook comparator (run_comparator_loop.py).

name: Translate bestseller atoms (CJK6)

on:
  workflow_dispatch:
    inputs:
      persona:
        description: 'DISABLED — see top-of-file comment. Kept for shape only.'
        required: true
        type: string
      locale:
        description: 'DISABLED — see top-of-file comment. Kept for shape only.'
        required: true
        type: string
        default: 'ja-JP'
      slot:
        description: 'DISABLED — see top-of-file comment. Kept for shape only.'
        required: false
        type: string
        default: ''
      ref:
        description: 'DISABLED — see top-of-file comment. Kept for shape only.'
        required: false
        type: string
        default: 'main'
      dry_run:
        description: 'DISABLED — see top-of-file comment. Kept for shape only.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  blocked:
    runs-on: ubuntu-latest
    steps:
      - name: Explain why this workflow is disabled
        run: |
          echo "::error::This workflow is disabled — it previously required TOGETHER_API_KEY / DASHSCOPE_API_KEY, both banned paid cloud LLM APIs under CLAUDE.md's LLM Tier Policy, and GitHub-hosted runners cannot reach Pearl Star's Tailscale-only Ollama endpoint to use the compliant free path instead."
          echo "::error::Use the interactive path instead: python3 scripts/localization/run_translation_loop.py --locale <locale> --persona <persona> with OLLAMA_HOST set, run from an operator/Claude Code session with Tailscale access to Pearl Star."
          echo "::error::See artifacts/qa/CI_WORKFLOW_BANNED_KEY_FIX_2026-07-10.md for full context."
          exit 1
