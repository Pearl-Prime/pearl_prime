# Translate bestseller atoms (PIVOT/TAKEAWAY/THREAD/PERMISSION/STORY) to CJK6 locales.
# Uses the full comparator loop: translate -> judge -> patch -> retry (max 3).
# Ported from audiobook comparator (run_comparator_loop.py).
#
# Usage: trigger manually via workflow_dispatch, pick persona + locale(s).

name: Translate bestseller atoms (CJK6)

concurrency:
  group: translate-bestseller-${{ github.event.inputs.persona }}-${{ github.event.inputs.locale }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      persona:
        description: 'Persona to translate (e.g. educators, healthcare_rns, or "all")'
        required: true
        type: string
      locale:
        description: 'Target locale (ja-JP, ko-KR, zh-CN, zh-HK, zh-SG, zh-TW, or "all")'
        required: true
        type: string
        default: 'ja-JP'
      slot:
        description: 'Atom type filter (PIVOT, TAKEAWAY, THREAD, PERMISSION, STORY, comparison, false_alarm, grief, overwhelm, shame, spiral, watcher, "engines" for all 7, or blank for all)'
        required: false
        type: string
        default: ''
      ref:
        description: 'Branch to checkout (default: main)'
        required: false
        type: string
        default: 'main'
      dry_run:
        description: 'Dry run (show manifest only, no API calls)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # Map repo secrets to what the translation scripts expect
      DASHSCOPE_API_KEY: ${{ secrets.QWEN_API_KEY }}
      DASHSCOPE_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
      DASHSCOPE_MODEL: ${{ secrets.QWEN_MODEL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet openai pyyaml

      - name: Build translation command
        id: cmd
        run: |
          CMD="python3 scripts/localization/run_translation_loop.py"

          PERSONA="${{ github.event.inputs.persona }}"
          LOCALE="${{ github.event.inputs.locale }}"
          SLOT="${{ github.event.inputs.slot }}"
          DRY="${{ github.event.inputs.dry_run }}"

          if [ "$PERSONA" != "all" ]; then
            CMD="$CMD --persona $PERSONA"
          fi

          if [ "$LOCALE" = "all" ]; then
            CMD="$CMD --all-locales"
          else
            CMD="$CMD --locale $LOCALE"
          fi

          if [ -n "$SLOT" ]; then
            CMD="$CMD --slot $SLOT"
          fi

          if [ "$DRY" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          CMD="$CMD --resume --max-parallel 5"

          echo "cmd=$CMD" >> "$GITHUB_OUTPUT"
          echo "Running: $CMD"

      - name: Run translation (with judge loop)
        run: |
          PYTHONPATH=. ${{ steps.cmd.outputs.cmd }}

      # SAFETY NET: Save translations to disk as artifact IMMEDIATELY
      # Even if git/PR steps fail, the translated files are preserved
      - name: Save translations as artifact (safety net)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: translations-${{ github.event.inputs.persona }}-${{ github.event.inputs.locale }}-${{ github.run_id }}
          path: |
            atoms/**/locales/*/CANONICAL.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Report coverage
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          PYTHONPATH=. python3 scripts/ci/report_translation_coverage.py || true

      - name: Count translated files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        id: count
        run: |
          COUNT=$(find atoms -path '*/locales/*/CANONICAL.txt' -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "file_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT translated files"

      - name: Create PR with translations
        if: ${{ github.event.inputs.dry_run != 'true' && steps.count.outputs.file_count > 0 }}
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          LOCALE="${{ github.event.inputs.locale }}"

          git config user.name "Phoenix Omega Bot"
          git config user.email "noreply@phoenix-omega.dev"

          BRANCH="agent/translate-${PERSONA}-${LOCALE}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          # Add all translated files (handles any directory depth)
          find atoms -path '*/locales/*/CANONICAL.txt' -type f -exec git add {} +

          git commit -m "feat(localization): translate ${PERSONA} bestseller atoms to ${LOCALE}

          Automated CJK6 translation via Qwen/Dashscope.
          Persona: ${PERSONA}
          Locale(s): ${LOCALE}
          Files: ${{ steps.count.outputs.file_count }}

          Co-Authored-By: Qwen (Dashscope) <noreply@alibaba.com>"

          git push -u origin "$BRANCH"

          gh pr create \
            --title "feat(localization): ${PERSONA} bestseller atoms → ${LOCALE} (${{ steps.count.outputs.file_count }} files)" \
            --body "Automated CJK6 translation via workflow dispatch.

          - Persona: ${PERSONA}
          - Locale(s): ${LOCALE}
          - Slot(s): ${SLOT:-all}
          - Files translated: ${{ steps.count.outputs.file_count }}
          - Pipeline: \`run_translation_loop.py\`
          - Artifact backup: translations-${PERSONA}-${LOCALE}-${{ github.run_id }}

          Review sample translations before merging." \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}
          SLOT: ${{ github.event.inputs.slot }}
