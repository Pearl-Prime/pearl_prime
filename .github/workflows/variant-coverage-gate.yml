name: Variant coverage gate

# Spec #739 Phase 3 — variant coverage gate (strict).
#
# Walks registry/<topic>.yaml + atoms/<persona>/<topic>/<section_type>/CANONICAL.txt
# and asserts >=3 variants per section per spec
# specs/SPEC_5_VARIANTS_AND_BESTSELLER_BEAT_WIRING.md §3.1 + SPEC-739-THRESHOLD-01.
#
# Phase 3: gaps reached zero (PR #767). Gate flipped to --strict per spec §6.
# Any new section with < 3 variants now blocks the PR.

on:
  pull_request:
    paths:
      - 'registry/**/*.yaml'
      - 'atoms/**/CANONICAL.txt'
      - 'scripts/registry/validate_variant_coverage.py'
      - 'tests/test_validate_variant_coverage.py'
      - '.github/workflows/variant-coverage-gate.yml'
  workflow_dispatch:

jobs:
  variant-coverage:
    name: Variant coverage gate (>=3 per section)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run validator unit tests
        run: PYTHONPATH=. python3 -m pytest tests/test_validate_variant_coverage.py -v

      - name: Run variant coverage validator (strict)
        run: |
          mkdir -p artifacts/qa
          PYTHONPATH=. python3 scripts/registry/validate_variant_coverage.py \
            --strict \
            --skip-registry \
            --report-out "artifacts/qa/variant_coverage_gap_$(date -u +%Y-%m-%d).md"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: variant-coverage-report
          path: artifacts/qa/variant_coverage_gap_*.md
          if-no-files-found: warn
          retention-days: 30
