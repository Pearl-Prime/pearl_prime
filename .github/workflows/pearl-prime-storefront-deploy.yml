# Pearl Prime Storefront — Cloudflare Pages deploy workflow
#
# Mirrors the pattern in `.github/workflows/brand-admin-onboarding-pages.yml`
# (the canonical Phoenix Omega Pages deploy reference per
# `skills/pearl-int/references/cloudflare_pages_deploy.md`).
#
# Layout: no-build static frontend in storefront/public/ + Pages Functions in
# storefront/functions/. wrangler deploys public/ as static assets and bundles
# functions/ (a sibling in the project dir) as the Worker API automatically — so
# there is NO Vite build step.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — Custom token under account `b80152c319f941e6e92f928e2617a3d5`.
#     Permissions: Account → Cloudflare Pages → Edit; User → User Details → Read.
#     Account Resources: Specific account → b80152c3... (NOT "All accounts" which returns empty).
#     Already present in repo secrets (shared with brand-admin-onboarding-pages.yml).
#   CLOUDFLARE_ACCOUNT_ID — `b80152c319f941e6e92f928e2617a3d5` (NOT operator's primary 626d6eb8... account).
#     Already present in repo secrets (shared with brand-admin-onboarding-pages.yml).
#
# Cloudflare Pages project: provisioned once (operator action) named exactly
# `pearl-prime-storefront` (must match `--project-name` below). D1/R2/KV bindings
# are uncommented in storefront/wrangler.toml after the operator provisions them
# (see skills/pearl-int/references/storefront_resource_ids.md +
# artifacts/coordination/storefront_operator_actions.tsv).
#
# D1 catalog seed (after the D1 binding is live — operator/CI step, NOT this deploy):
#   cd storefront && npm run seed
#   wrangler d1 execute pearl_prime_storefront --remote --file=seeds/skus.sql
#
# Snipcart webhook secret (operator-set): Pages → pearl-prime-storefront →
# Settings → Environment variables → `SNIPCART_WEBHOOK_SECRET` (encrypted).
#
# DO NOT run `wrangler pages deploy` from a laptop. Use this workflow.

name: Pearl Prime Storefront (Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "storefront/**"
      - ".github/workflows/pearl-prime-storefront-deploy.yml"

concurrency:
  group: pearl-prime-storefront-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        # Do NOT enable `lfs: true` — repo LFS budget is exhausted
        # (brand-admin-onboarding-pages.yml PR #1122). LFS assets live in R2.

      - name: Deploy to Cloudflare Pages (static public/ + Pages Functions)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: storefront
          command: pages deploy public --project-name=pearl-prime-storefront

      - name: Run summary
        run: |
          echo "## Pearl Prime Storefront deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Project: pearl-prime-storefront (static public/ + Pages Functions in functions/)" >> $GITHUB_STEP_SUMMARY
          echo "- Account: b80152c3..." >> $GITHUB_STEP_SUMMARY
          echo "- Live: https://pearl-prime-storefront.pages.dev" >> $GITHUB_STEP_SUMMARY
          echo "- D1 seed (after D1 bound): cd storefront && npm run seed && wrangler d1 execute pearl_prime_storefront --remote --file=seeds/skus.sql" >> $GITHUB_STEP_SUMMARY
          echo "- Runbook: skills/pearl-int/references/storefront_resource_ids.md" >> $GITHUB_STEP_SUMMARY
