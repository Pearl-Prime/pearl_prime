name: Manga Quality Analysis

on:
  workflow_dispatch:
    inputs:
      series_id:
        description: 'Series ID to analyze (default: anxiety_gen_alpha_01)'
        required: false
        default: 'anxiety_gen_alpha_01'
      branch:
        description: 'Branch containing analysis artifacts (leave blank for current)'
        required: false
        default: ''

jobs:
  forensic-analysis:
    name: Forensic Analysis & Gap Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pillow reportlab pyyaml jsonschema

      - name: Validate analysis artifacts exist
        id: validate
        run: |
          echo "Checking for required analysis artifacts..."
          FILES=(
            "artifacts/analysis/manga_forensic_teardown.md"
            "artifacts/research/manga_quality_bar/01_iyashikei_craft_study.md"
            "artifacts/research/manga_quality_bar/02_studio_workflow_gap_analysis.md"
            "specs/manga_series_identity_layer.md"
            "specs/manga_character_setting_consistency.md"
            "specs/comfyui_workflow_character_reference.md"
            "specs/manga_name_thumbnail_stage.md"
            "specs/manga_page_layout_spec_schema.json"
            "specs/manga_visual_quality_gates.md"
            "docs/MANGA_QUALITY_GAP_PLAN.md"
          )
          MISSING=0
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              LINES=$(wc -l < "$f")
              echo "  ✓ $f ($LINES lines)"
            else
              echo "  ✗ MISSING: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING required files missing"
            exit 1
          fi
          echo "All analysis artifacts present."

      - name: Validate JSON schema
        run: |
          python3 -c "
          import json, sys
          with open('specs/manga_page_layout_spec_schema.json') as f:
              schema = json.load(f)
          print(f'Schema loaded: {schema.get(\"\$schema\", \"no schema ref\")}')
          print(f'Root type: {schema.get(\"type\", \"unknown\")}')
          required = schema.get('required', [])
          print(f'Required top-level fields: {required}')
          print('JSON schema valid.')
          "

      - name: Validate series identity example
        run: |
          python3 -c "
          import yaml, sys
          try:
              with open('config/source_of_truth/manga_series_examples/the_garden_at_tidecalm.yaml') as f:
                  data = yaml.safe_load(f)
              required_fields = ['series_id', 'marketing_title', 'logline', 'volume_plan', 'character_roster', 'setting_bible']
              missing = [k for k in required_fields if k not in data]
              if missing:
                  print(f'WARNING: Missing fields in example YAML: {missing}')
              else:
                  print(f'Series identity example valid: {data.get(\"marketing_title\", \"no title\")}')
          except Exception as e:
              print(f'WARNING: Could not validate series identity example: {e}')
          "

      - name: Generate gap summary report
        id: gap_summary
        run: |
          python3 - <<'EOF'
          import re

          with open("docs/MANGA_QUALITY_GAP_PLAN.md") as f:
              content = f.read()

          # Extract executive summary section
          exec_match = re.search(r'## 1\. Executive Summary.*?(?=## 2\.)', content, re.DOTALL)
          exec_summary = exec_match.group(0) if exec_match else "Executive summary not found"

          # Extract sprint sequence
          sprint_match = re.search(r'## 4\. Cost / Time Summary.*?(?=## 5\.)', content, re.DOTALL)
          sprint_table = sprint_match.group(0) if sprint_match else "Sprint table not found"

          # Extract success checklist count
          checklist_count = content.count("- [ ]")

          print(f"Analysis document: {len(content.splitlines())} lines")
          print(f"Success checklist items: {checklist_count}")
          print()
          print("--- EXECUTIVE SUMMARY ---")
          print(exec_summary[:1500])
          print()
          print("--- SPRINT TABLE ---")
          print(sprint_table[:800])
          EOF

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manga-quality-analysis-${{ github.run_id }}
          path: |
            artifacts/analysis/
            artifacts/research/manga_quality_bar/
            specs/manga_series_identity_layer.md
            specs/manga_character_setting_consistency.md
            specs/comfyui_workflow_character_reference.md
            specs/manga_name_thumbnail_stage.md
            specs/manga_page_layout_spec_schema.json
            specs/manga_visual_quality_gates.md
            config/source_of_truth/manga_series_examples/
            docs/MANGA_QUALITY_GAP_PLAN.md
          retention-days: 90

      - name: Post executive summary to step summary
        run: |
          python3 - <<'EOF'
          import re

          with open("docs/MANGA_QUALITY_GAP_PLAN.md") as f:
              content = f.read()

          # Extract exec summary
          exec_match = re.search(r'## 1\. Executive Summary.*?(?=## 2\.)', content, re.DOTALL)
          exec_text = exec_match.group(0) if exec_match else "See docs/MANGA_QUALITY_GAP_PLAN.md"

          # Extract top gaps table (first 15 rows)
          gap_match = re.search(r'## 2\. Ranked Gap List.*?(?=## 3\.)', content, re.DOTALL)
          gap_text = gap_match.group(0)[:3000] if gap_match else ""

          summary = f"""# Manga Quality Analysis — Run Summary

          {exec_text}

          {gap_text}

          ---
          **Full plan:** [docs/MANGA_QUALITY_GAP_PLAN.md](docs/MANGA_QUALITY_GAP_PLAN.md)

          **Next action:** Operator reviews plan → approves sprint sequence → Sprint 0 (Foundation Fixes) begins.
          """

          import os
          with open(os.environ["GITHUB_STEP_SUMMARY"], "w") as f:
              f.write(summary)
          EOF
