# Cloudflare Pages: brand-wizard-app + synced onboarding JSON + spine HTML (copied in prebuild).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_ACCOUNT_ID — 626d6eb8162a8121f74e59235d82a4f5 (operator account)
#   CLOUDFLARE_API_TOKEN_PAGES — Account → Cloudflare Pages → Edit (deploy only)
#   CLOUDFLARE_API_TOKEN — R2 / feed workflows (do not use for Pages deploy)
#
# Cloudflare Pages project: `brand-admin-onboarding-bu2` → https://brand-admin-onboarding-bu2.pages.dev
#
# If either secret is missing, the deploy job fails after a successful build — add both before expecting green deploys.
name: Brand admin onboarding (Pages)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "brand-wizard-app/**"
      - "config/onboarding/**"
      - "scripts/onboarding/**"
      - "brand_onboarding_hub.html"
      - "brand_admin_master_onboarding.html"
      - "brand_admin_weekly_os.html"
      - "market_lane_matrix.html"
      - "lane_examples_gallery.html"
      - ".github/workflows/brand-admin-onboarding-pages.yml"

concurrency:
  group: brand-admin-onboarding-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: brand-wizard-app
    steps:
      - uses: actions/checkout@v4
        # NOTE: lfs:true was added in PR #1120 but immediately revealed the repo's
        # GitHub LFS budget is exhausted ("This repository exceeded its LFS budget"),
        # so the LFS fetch always failed and the build job died before npm run build.
        # PR #1122 un-LFS'd teacher_pics/*.png so those serve as regular blobs.
        # Other LFS-tracked assets under brand-wizard-app/public/assets/* (covers,
        # manga, videos, audiobooks) are still 130-byte pointer text on the live
        # site — separate operator decision (buy LFS data pack, un-LFS those too,
        # or migrate media to R2). Until then, lfs:true is actively harmful — it
        # blocks the entire deploy from running.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: brand-wizard-app/package-lock.json

      - name: Validate onboarding JSON
        run: python3 scripts/ci/validate_onboarding_registry.py
        working-directory: ${{ github.workspace }}

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: brand-admin-onboarding-dist
          path: brand-wizard-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: brand-wizard-app
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            brand-wizard-app/functions
            brand-wizard-app/wrangler.toml

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: brand-admin-onboarding-dist
          path: brand-wizard-app/dist

      - name: Sync R2 secrets to Pages (Waystream download proxy)
        continue-on-error: true
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PAGES || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          npm i wrangler@3.90.0 --no-save
          for name in R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_ACCOUNT_ID R2_ENDPOINT; do
            value="${!name:-}"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler pages secret put "$name" --project-name=brand-admin-onboarding
            fi
          done

      - name: Ensure Pages project exists (idempotent — no-op if already created)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN_PAGES || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: brand-wizard-app
          command: pages project create brand-admin-onboarding --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN_PAGES || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=brand-admin-onboarding --commit-dirty=true
          workingDirectory: brand-wizard-app
