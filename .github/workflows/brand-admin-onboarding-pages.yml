# Cloudflare Pages: brand-wizard-app + synced onboarding JSON + spine HTML (copied in prebuild).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — Cloudflare dashboard → Manage Account → API Tokens → Create Token.
#     Use a custom token with: Account → Cloudflare Pages → Edit (minimum for `wrangler pages deploy`).
#   CLOUDFLARE_ACCOUNT_ID — Dashboard → any zone → Overview → Account ID (right sidebar).
#
# Cloudflare Pages project: create once named exactly `brand-admin-onboarding` (must match --project-name below).
# After first deploy, confirm the live hostname under Pages → project → Domains (often https://brand-admin-onboarding.pages.dev).
#
# If either secret is missing, the deploy job fails after a successful build — add both before expecting green deploys.
name: Brand admin onboarding (Pages)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "brand-wizard-app/**"
      - "config/onboarding/**"
      - "scripts/onboarding/**"
      - "brand_onboarding_hub.html"
      - "brand_admin_master_onboarding.html"
      - "brand_admin_weekly_os.html"
      - "market_lane_matrix.html"
      - "lane_examples_gallery.html"
      - ".github/workflows/brand-admin-onboarding-pages.yml"

concurrency:
  group: brand-admin-onboarding-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: brand-wizard-app
    steps:
      - uses: actions/checkout@v4
        # NOTE: lfs:true was added in PR #1120 but immediately revealed the repo's
        # GitHub LFS budget is exhausted ("This repository exceeded its LFS budget"),
        # so the LFS fetch always failed and the build job died before npm run build.
        # PR #1122 un-LFS'd teacher_pics/*.png so those serve as regular blobs.
        # Other LFS-tracked assets under brand-wizard-app/public/assets/* (covers,
        # manga, videos, audiobooks) are still 130-byte pointer text on the live
        # site — separate operator decision (buy LFS data pack, un-LFS those too,
        # or migrate media to R2). Until then, lfs:true is actively harmful — it
        # blocks the entire deploy from running.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: brand-wizard-app/package-lock.json

      - name: Validate onboarding JSON
        run: python3 scripts/ci/validate_onboarding_registry.py
        working-directory: ${{ github.workspace }}

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: brand-admin-onboarding-dist
          path: brand-wizard-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: brand-wizard-app
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            brand-wizard-app/functions
            brand-wizard-app/wrangler.toml

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: brand-admin-onboarding-dist
          path: brand-wizard-app/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=brand-admin-onboarding --commit-dirty=true
          workingDirectory: brand-wizard-app
