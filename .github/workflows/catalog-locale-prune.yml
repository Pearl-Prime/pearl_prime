# Prune market-suppressed topic plans for a locale (hu_HU = 7 fit topics).
#
# Governance: ≤50 deletions per PR (mass_deletion gate). Self-sequencing loop
# until no suppressed-topic files remain. Prefer generation-time fit via
# market_topic_fit.py wired into gen_brand_catalog_plan_csv.py.
#
# REQUIRES CATALOG_PAT. Ref OPD-20260627-001.
name: Catalog locale prune — suppressed topics

on:
  workflow_dispatch:
    inputs:
      locale:
        description: Registry lane_id (e.g. hu_HU)
        required: true
        default: hu_HU
        type: choice
        options:
          - hu_HU
      max_deletions:
        description: Deletions per PR (max 50 — governance gate)
        required: false
        default: '50'
        type: string

concurrency:
  group: catalog-locale-prune-${{ github.event.inputs.locale }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prune:
    name: Prune ${{ github.event.inputs.locale }} suppressed topics
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ secrets.CATALOG_PAT }}
      LOCALE: ${{ github.event.inputs.locale }}
      MAX_DEL: ${{ github.event.inputs.max_deletions }}
    steps:
      - name: Guard — CATALOG_PAT must be set
        env:
          PAT: ${{ secrets.CATALOG_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::CATALOG_PAT secret is not set."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CATALOG_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Prune loop (≤50 deletions per PR)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git config user.name "Pearl_Catalog (CI)"
          git config user.email "catalog-ci@users.noreply.github.com"
          MAX="${MAX_DEL:-50}"
          if [ "$MAX" -gt 50 ]; then
            echo "::warning::Capping deletions at 50 (governance mass_deletion gate)"
            MAX=50
          fi

          ROUND=0
          while true; do
            git fetch origin main --quiet
            git checkout -f origin/main
            git clean -fd config/source_of_truth/

            REMAIN=$(PYTHONPATH="$PYTHONPATH" python3 scripts/catalog/prune_suppressed_locale_plans.py \
              --locale "$LOCALE" --dry-run --max-files 99999 2>&1 | grep -oE 'suppressed_total=[0-9]+' | cut -d= -f2 || echo 0)
            echo "Round $ROUND: $REMAIN suppressed-topic files on disk"
            if [ "${REMAIN:-0}" = "0" ]; then
              echo "Nothing left to prune — done."
              break
            fi

            ROUND=$((ROUND+1))
            python3 scripts/catalog/prune_suppressed_locale_plans.py \
              --locale "$LOCALE" --max-files "$MAX"

            git diff --name-only origin/main > /tmp/deleted.txt
            DEL=$(wc -l < /tmp/deleted.txt | tr -d ' ')
            if [ "$DEL" = "0" ]; then
              echo "No deletions vs origin/main — done."
              break
            fi

            BASE_TREE=$(git rev-parse "origin/main^{tree}")
            BASE_COMMIT=$(git rev-parse origin/main)
            IDX="/tmp/idx_prune_${LOCALE}_${ROUND}_$$"
            rm -f "$IDX"
            GIT_INDEX_FILE="$IDX" git read-tree "$BASE_TREE"
            while IFS= read -r repo_path; do
              [ -z "$repo_path" ] && continue
              GIT_INDEX_FILE="$IDX" git update-index --force-remove "$repo_path" 2>/dev/null || true
            done < /tmp/deleted.txt
            NEW_TREE=$(GIT_INDEX_FILE="$IDX" git write-tree)
            rm -f "$IDX"

            ADD=$(git diff-tree -r --name-status "$BASE_TREE" "$NEW_TREE" | grep -c '^A' || true)
            if [ "$ADD" != "0" ]; then
              echo "::error::additions detected in prune PR — aborting"; exit 1
            fi

            COMMIT=$(git commit-tree "$NEW_TREE" -p "$BASE_COMMIT" \
              -m "chore(catalog): prune ${LOCALE} suppressed topics round ${ROUND} (${DEL} files)")
            BRANCH="ci/catalog-prune-${LOCALE}-${GITHUB_RUN_ID}-r${ROUND}"
            git push origin "${COMMIT}:refs/heads/${BRANCH}"

            PR_URL=$(gh pr create --title "chore(catalog): prune ${LOCALE} suppressed topics r${ROUND}" \
              --body "Remove market-suppressed topic plans per \`market_topic_fit.yaml\`. ≤50 deletions/PR for governance. Ref OPD-20260627-001." \
              --base main --head "$BRANCH")
            PR=$(echo "$PR_URL" | grep -oE '[0-9]+$')

            STATE="pending"
            for _ in $(seq 1 50); do
              sleep 30
              GOV=$(gh pr view "$PR" --json statusCheckRollup --jq '.statusCheckRollup[]|select(.name=="Verify governance")|.conclusion' 2>/dev/null || true)
              PS=$(gh pr view "$PR" --json statusCheckRollup --jq '.statusCheckRollup[]|select(.name=="parse-sweep")|.conclusion' 2>/dev/null || true)
              if [ "$GOV" = "SUCCESS" ] && [ "$PS" = "SUCCESS" ]; then STATE="green"; break; fi
              if [ "$GOV" = "FAILURE" ] || [ "$PS" = "FAILURE" ]; then STATE="failed"; break; fi
            done
            if [ "$STATE" != "green" ]; then
              echo "::warning::PR #$PR not green ($STATE) — stopping loop"; exit 0
            fi
            gh pr merge "$PR" --squash --delete-branch || true
            sleep 15

            if [ "$ROUND" -ge 200 ]; then
              echo "::warning::prune round cap hit — re-dispatch to continue"
              break
            fi
          done
