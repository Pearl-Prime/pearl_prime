name: LLM Policy Enforcement

on:
  pull_request:
    paths:
      - '**/*.py'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.sh'
  workflow_dispatch:

jobs:
  enforce:
    name: Scan for banned paid-LLM API usage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audit dependencies
        run: pip install pyyaml

      - name: Run LLM policy audit
        id: audit
        run: |
          OUTFILE="artifacts/llm_audit_$(date -u +%Y%m%d_%H%M%S).md"
          mkdir -p artifacts
          PYTHONPATH=. python3 scripts/ci/audit_llm_callers.py \
            --banned-patterns-file config/governance/banned_llm_patterns.yaml \
            --allowed-patterns-file config/governance/allowed_llm_patterns.yaml \
            --output "$OUTFILE" \
            --fail-on-violation
          echo "audit_report=$OUTFILE" >> $GITHUB_OUTPUT

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llm-audit-${{ github.run_id }}
          path: artifacts/llm_audit_*.md
          retention-days: 90

      - name: Comment on PR with violations
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(ls -t artifacts/llm_audit_*.md 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "$(cat "$LATEST")"
          else
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "## LLM Policy Violation Detected\n\nAudit report not generated. Check workflow logs for details."
          fi
