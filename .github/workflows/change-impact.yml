name: Change impact

on:
  pull_request:
    branches: [main]

jobs:
  change-impact:
    name: Change impact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for mass deletions
        run: |
          DELETED=$(git diff --name-status origin/main...HEAD | grep '^D' | wc -l)
          ADDED=$(git diff --name-status origin/main...HEAD | grep '^A' | wc -l)
          MODIFIED=$(git diff --name-status origin/main...HEAD | grep '^M' | wc -l)
          TOTAL=$(git diff --name-only origin/main...HEAD | wc -l)
          
          echo "## Change Impact Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Files added | $ADDED |" >> $GITHUB_STEP_SUMMARY
          echo "| Files modified | $MODIFIED |" >> $GITHUB_STEP_SUMMARY
          echo "| Files deleted | $DELETED |" >> $GITHUB_STEP_SUMMARY
          echo "| Total changed | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          
          if [ "$DELETED" -gt 50 ]; then
            echo ""
            echo "::error::BLOCKED: This PR deletes $DELETED files. PRs that delete more than 50 files require manual review."
            echo "::error::Review the full deletion list: git diff --name-status origin/main...HEAD | grep '^D'"
            echo ""
            echo "### ⛔ BLOCKED — Mass deletion detected" >> $GITHUB_STEP_SUMMARY
            echo "This PR deletes **$DELETED files**. Threshold: 50." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Top deleted directories:" >> $GITHUB_STEP_SUMMARY
            git diff --name-status origin/main...HEAD | grep '^D' | cut -f2 | cut -d/ -f1 | sort | uniq -c | sort -rn | head -10 | while read count dir; do
              echo "- $dir: $count files" >> $GITHUB_STEP_SUMMARY
            done
            exit 1
          fi
          
          if [ "$TOTAL" -gt 500 ]; then
            echo "::warning::Large PR: $TOTAL files changed. Consider splitting into smaller PRs."
            echo "### ⚠️ Large PR warning" >> $GITHUB_STEP_SUMMARY
            echo "This PR changes **$TOTAL files**. Consider splitting." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "✅ Change impact check passed ($DELETED deletions, $TOTAL total)"
