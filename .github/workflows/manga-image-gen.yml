name: Generate manga chapter images

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Workspace path (relative to repo root)'
        required: true
        default: 'artifacts/manga/test_chapter'
      backend:
        description: 'Image backend'
        required: true
        default: 'runcomfy'
        type: choice
        options: [runcomfy, noop]
      dry_run:
        description: 'Dry run (no API calls)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      chapter_number:
        description: 'Chapter number'
        required: false
        default: '1'

jobs:
  generate:
    name: Generate manga images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUNCOMFY_API_KEY: ${{ secrets.RUNCOMFY_API_KEY }}
      RUNCOMFY_DEPLOYMENT_ID: '677edba8-ace0-4b2b-bad2-8e94b9959065'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyyaml requests
      - name: Run manga chapter pipeline
        run: |
          ARGS="--workspace ${{ inputs.workspace }} --backend ${{ inputs.backend }}"
          ARGS="$ARGS --chapter-number ${{ inputs.chapter_number }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: python3 scripts/manga/run_manga_chapter.py $ARGS"
          PYTHONPATH=. python3 scripts/manga/run_manga_chapter.py $ARGS
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manga-chapter-${{ inputs.chapter_number }}
          path: ${{ inputs.workspace }}/
