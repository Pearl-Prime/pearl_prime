# GitHub Pages: build static artifact and deploy.
# Use this workflow when Pages is set to "GitHub Actions" in repo Settings → Pages.
# The build job must produce an artifact that deploy-pages can publish.
name: pages build and deployment

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build static site
        run: |
          mkdir -p _site
          if [ -d public ] && [ "$(ls -A public 2>/dev/null)" ]; then
            cp -r public/* _site/
          fi
          if [ ! -f _site/index.html ]; then
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Phoenix Omega</title></head><body><h1>Phoenix Omega</h1><p><a href="breathwork/">Free breathwork tools</a></p></body></html>' > _site/index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
