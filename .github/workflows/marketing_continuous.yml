name: Marketing continuous ingest

on:
  schedule:
    - cron: '15 * * * *'    # Every hour at :15
  workflow_dispatch:
    inputs:
      mode:
        description: 'ingest-only, briefs, full'
        required: false
        default: 'ingest-only'
        type: choice
        options:
          - ingest-only
          - briefs
          - full

concurrency:
  group: marketing-continuous
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
      QWEN_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || secrets.QWEN_API_KEY }}
      QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || secrets.QWEN_API_KEY }}
      MODE: ${{ github.event.inputs.mode || 'ingest-only' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install pyyaml requests --break-system-packages

      - name: Preflight runner + Qwen API health
        run: |
          set -euo pipefail
          echo "mode=$MODE"
          echo "== Memory check =="
          FREE_PAGES=$(vm_stat | awk '/Pages free/ {gsub("\\.","",$3); print $3}')
          INACTIVE_PAGES=$(vm_stat | awk '/Pages inactive/ {gsub("\\.","",$3); print $3}')
          FREE_BYTES=$(( (FREE_PAGES + INACTIVE_PAGES) * 4096 ))
          python3 - <<'PY'
          free_bytes = int("${FREE_BYTES}")
          free_gb = free_bytes / (1024**3)
          print(f"free_mem_gb={free_gb:.2f}")
          if free_gb < 2.0:
              raise SystemExit("Insufficient free memory (<2.0 GB).")
          PY
          echo "== Disk check =="
          FREE_KB=$(df -k . | awk 'NR==2{print $4}')
          python3 - <<'PY'
          free_kb = int("${FREE_KB}")
          free_gb = free_kb / (1024**2)
          print(f"free_disk_gb={free_gb:.2f}")
          if free_gb < 10.0:
              raise SystemExit("Insufficient free disk (<10 GB).")
          PY
          if [ "$MODE" != "ingest-only" ]; then
            echo "== Qwen model check =="
            curl -fsS "$QWEN_BASE_URL/models" >/tmp/models.json
            cat /tmp/models.json | head -c 300; echo
            echo "== Qwen warmup =="
            curl -fsS --max-time 45 "$QWEN_BASE_URL/chat/completions" \
              -H 'Content-Type: application/json' \
              -H "Authorization: Bearer $QWEN_API_KEY" \
              -d "{\"model\":\"$QWEN_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"ok\"}],\"max_tokens\":64,\"temperature\":0.0,\"enable_thinking\":false}" >/tmp/warmup.json
            python3 - <<'PY'
            import json
            data = json.load(open("/tmp/warmup.json"))
            if "error" in data:
                raise SystemExit(f"Warmup failed: {data['error']}")
            print("warmup_ok=true")
            PY
          else
            echo "mode=ingest-only; skipping strict LM preflight"
          fi

      - name: Check emergency stop
        run: |
          python3 -c "
          import yaml
          cfg = yaml.safe_load(open('config/marketing/ingest_limits.yaml'))
          if cfg.get('global', {}).get('emergency_stop', False):
              print('EMERGENCY STOP is active — skipping ingest')
              exit(1)
          print('Emergency stop: OFF — proceeding')
          "

      - name: Ingest web research
        run: |
          SCRIPT="scripts/marketing/ingest_web_research.py"
          if [ ! -f "$SCRIPT" ]; then
            echo "Skipping web ingest; missing $SCRIPT"
            exit 0
          fi
          for attempt in 1 2; do
            echo "web-ingest attempt=$attempt"
            python3 "$SCRIPT" --all --verbose && exit 0
            if [ "$attempt" -eq 2 ]; then
              echo "web-ingest failed after retry"
              exit 1
            fi
            sleep 10
          done

      - name: Ingest sales signals (if present)
        run: |
          SALES_FILE="artifacts/marketing/incoming/latest_sales.csv"
          SCRIPT="scripts/marketing/ingest_sales_signals.py"
          if [ ! -f "$SCRIPT" ]; then
            echo "Skipping sales ingest; missing $SCRIPT"
            exit 0
          fi
          if [ -f "$SALES_FILE" ]; then
            for attempt in 1 2; do
              echo "sales-ingest attempt=$attempt"
              python3 "$SCRIPT" --input "$SALES_FILE" --verbose && exit 0
              if [ "$attempt" -eq 2 ]; then
                echo "sales-ingest failed after retry"
                exit 1
              fi
              sleep 10
            done
          else
            echo "No sales file found at $SALES_FILE — skipping"
          fi

      # Phase 2+: uncomment when gates are built
      # - name: Build briefs (daily only)
      #   if: inputs.mode == 'briefs' || inputs.mode == 'full'
      #   run: python3 scripts/marketing/build_persona_topic_briefs.py --pilot --verbose

      # - name: Propose patches (daily only)
      #   if: inputs.mode == 'full'
      #   run: python3 scripts/marketing/propose_prompt_patches.py --from-briefs --verbose

      # - name: Evaluate proposals (shadow mode)
      #   if: inputs.mode == 'full'
      #   run: python3 scripts/marketing/promotion_gate.py --shadow --verbose

      - name: Upload ingest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketing-signals-${{ github.run_number }}
          path: artifacts/marketing/
          retention-days: 14
