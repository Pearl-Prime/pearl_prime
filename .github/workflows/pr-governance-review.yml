# PR governance review — Pearl_PM + Pearl_Architect automated gate.
# Runs scripts/ci/pr_governance_review.py on every PR open / synchronize and
# posts the verdict as a PR comment. Closes GAP-G1 from
# docs/FULL_REPO_IMPLEMENTATION_GAP_PLAN_2026-04-26.md.
#
# Authority: docs/GITHUB_GOVERNANCE.md, CLAUDE.md
# Spec ws:   ws_pr_governance_workflow_wiring_20260427

name: PR governance review

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  governance-review:
    name: Governance review (Pearl_PM + Pearl_Architect)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pr_governance_review.py (JSON output)
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          PYTHONPATH=. python3 scripts/ci/pr_governance_review.py --json > /tmp/gov_review.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Truncate to 30 KB so the PR comment stays under GitHub's 65 KB body limit
          head -c 30000 /tmp/gov_review.json > /tmp/gov_review_trunc.json
          echo "json_path=/tmp/gov_review_trunc.json" >> "$GITHUB_OUTPUT"

      - name: Post review verdict as PR comment
        uses: actions/github-script@v7
        env:
          REVIEW_EXIT: ${{ steps.review.outputs.exit_code }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const exit = process.env.REVIEW_EXIT;
            let body;
            try {
              const raw = fs.readFileSync('/tmp/gov_review_trunc.json', 'utf8');
              const j = JSON.parse(raw);
              const verdict = exit === '0' ? '✅ APPROVED' : '❌ BLOCKED';
              const warnings = (j.warnings || []).slice(0, 20);
              body = [
                `## PR Governance Review — ${verdict}`,
                '',
                `**Subsystem(s):** ${(j.subsystems || []).join(', ') || '(none detected)'}`,
                `**Files changed:** ${j.files_changed || 0}`,
                `**Mass-delete:** ${j.deletions || 0} ${(j.deletions || 0) > 50 ? '⚠️ exceeds 50-file rule' : ''}`,
                '',
                warnings.length > 0 ? `### Warnings (${warnings.length})\n\n${warnings.map(w => `- ${w}`).join('\n')}` : '_No warnings._',
                '',
                exit !== '0' ? `### Blockers\n\n${(j.blockers || []).map(b => `- ${b}`).join('\n')}` : '',
                '',
                `_Generated by \`.github/workflows/pr-governance-review.yml\` — see \`scripts/ci/pr_governance_review.py\`._`
              ].filter(Boolean).join('\n');
            } catch (e) {
              body = `## PR Governance Review\n\nReview script exited with code ${exit}, but JSON output was unparseable.\n\nCheck the workflow logs.`;
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail job on BLOCKED verdict
        if: ${{ steps.review.outputs.exit_code != '0' }}
        run: |
          echo "::error::PR governance review BLOCKED. See PR comment for details."
          exit 1
