# EI V2 gates — unit tests + rigorous eval + promotion gate check.
# Runs on every PR (reports success when no EI paths change so branch protection is satisfied).
# On push/schedule: path-filtered or weekly. V1 remains authoritative; V2 is advisory until promotion.
name: EI V2 gates

on:
  push:
    branches: [main, master]
    paths:
      - 'phoenix_v4/quality/**'
      - 'config/quality/ei_v2*'
      - 'config/quality/ei_v2_promotion*'
      - 'tests/test_ei_v2*'
      - 'scripts/ci/run_ei_v2*'
      - 'scripts/ci/check_ei_v2*'
      - '.github/workflows/ei-v2-gates.yml'
  pull_request:
    branches: [main, master]
    # No path filter: run on every PR so required check "EI V2 gates" is always reported (skip when no EI paths).
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC for trend tracking
  workflow_dispatch:

jobs:
  # Single job so one check "EI V2 gates" is reported; skips when no EI paths changed.
  ei-v2-gates:
    name: EI V2 gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ei:
              - 'phoenix_v4/quality/**'
              - 'config/quality/ei_v2*'
              - 'config/quality/ei_v2_promotion*'
              - 'tests/test_ei_v2*'
              - 'scripts/ci/run_ei_v2*'
              - 'scripts/ci/check_ei_v2*'

      - name: Skip (no EI V2 paths changed)
        if: steps.filter.outputs.ei != 'true'
        run: echo "No EI V2 paths changed; check passes for branch protection."

      - uses: actions/setup-python@v5
        if: steps.filter.outputs.ei == 'true'
        with:
          python-version: '3.11'

      - name: Install test dependencies
        if: steps.filter.outputs.ei == 'true'
        run: pip install -r requirements-test.txt

      - name: Run EI V2 test suite
        if: steps.filter.outputs.ei == 'true'
        run: |
          TESTS="tests/test_ei_v2.py"
          if [ -f tests/test_ei_v2_hybrid.py ]; then
            TESTS="$TESTS tests/test_ei_v2_hybrid.py"
          fi
          PYTHONPATH=. python -m pytest $TESTS -v --tb=short -x

      - name: Run rigorous evaluation (3-book sample)
        if: steps.filter.outputs.ei == 'true'
        run: |
          PYTHONPATH=. python scripts/ci/run_ei_v2_rigorous_eval.py --sample 3

      - name: Catalog calibration + dimension gates
        if: steps.filter.outputs.ei == 'true'
        run: |
          PYTHONPATH=. python scripts/ci/run_ei_v2_catalog_calibration.py --learn

      - name: Check V2 promotion readiness
        if: steps.filter.outputs.ei == 'true'
        continue-on-error: true
        run: |
          PYTHONPATH=. python scripts/ci/check_ei_v2_promotion_gate.py \
            --eval-report artifacts/ei_v2/eval_rigorous_report.json \
            --criteria config/quality/ei_v2_promotion_criteria.yaml

      - name: Verify required EI V2 artifacts exist
        if: steps.filter.outputs.ei == 'true'
        run: |
          required=(
            "artifacts/ei_v2/catalog_calibration.json"
            "artifacts/ei_v2/eval_rigorous_report.json"
            "artifacts/ei_v2/promotion_gate_result.json"
          )
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing required artifact: $f" >&2
              exit 1
            fi
          done

      - name: Upload EI V2 evidence
        if: always() && steps.filter.outputs.ei == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ei-v2-evidence
          path: |
            artifacts/ei_v2/eval_rigorous_report.json
            artifacts/ei_v2/eval_rigorous_summary.txt
            artifacts/ei_v2/promotion_gate_result.json
            artifacts/ei_v2/catalog_calibration.json
            artifacts/ei_v2/learned_params.json
            artifacts/ei_v2/learner_feedback.jsonl
          if-no-files-found: ignore
