name: Manga Image Bank Build

on:
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand id (stillness_press)'
        required: true
        default: 'stillness_press'
      topics:
        description: 'Comma topics or empty = zero-coverage only'
        required: false
        default: ''
      target_count:
        description: 'Max new images to generate (cap)'
        required: false
        default: '120'
      min_panels:
        description: 'When topics empty, include topics with fewer than this many raw PNGs'
        required: false
        default: '60'

jobs:
  wait_runner:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Wait for pearl-star-gpu
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MAX_WAIT_S: '1800'
          INTERVAL_S: '30'
        run: python3 scripts/ci/wait_for_self_hosted_runner.py

  build_bank:
    needs: [wait_runner]
    runs-on: [self-hosted, pearl-star-gpu]
    timeout-minutes: 720
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-test.txt
      - name: Resolve topics + generate
        env:
          COMFYUI_URL: ${{ secrets.COMFYUI_URL }}
          PEARL_STAR_IP: ${{ secrets.PEARL_STAR_IP }}
          RUNCOMFY_API_KEY: ${{ secrets.RUNCOMFY_API_KEY }}
          RUNCOMFY_TOKEN: ${{ secrets.RUNCOMFY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${RUNCOMFY_TOKEN:-}" ] && [ -z "${RUNCOMFY_API_KEY:-}" ]; then export RUNCOMFY_API_KEY="$RUNCOMFY_TOKEN"; fi
          BANK="image_bank/${{ inputs.brand }}"
          TOPICS="${{ inputs.topics }}"
          if [ -z "$TOPICS" ]; then
            RAW=$(python3 scripts/manga/list_zero_coverage_topics.py --brand "${{ inputs.brand }}" --format slugs --min-panels "${{ inputs.min_panels }}")
            TOPICS=$(echo "$RAW" | tr ' ' ',')
          fi
          echo "Topics: ${TOPICS:-<none>}"
          python3 scripts/manga/stillness_press_image_bank.py audit --bank "$BANK" --out artifacts/manga/image_bank_pre_audit.txt
          if [ -z "${TOPICS}" ]; then
            echo "No zero-coverage topics — nothing to generate."
            exit 0
          fi
          python3 scripts/manga/stillness_press_image_bank.py generate --bank "$BANK" --backend comfyui --topics "$TOPICS" --max-new "${{ inputs.target_count }}"
          python3 scripts/manga/stillness_press_image_bank.py index --bank "$BANK"
      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH=agent/manga-image-bank-${{ github.run_id }}
          git checkout -b "$BRANCH"
          git add image_bank/ artifacts/manga/
          git commit -m "chore(manga): image bank gap fill (${{ inputs.brand }})" || { echo "No changes"; exit 0; }
          git push -u origin "$BRANCH"
          gh label create agent-generated --color BFD4F2 --description "Agent PR" 2>/dev/null || true
          gh pr create --title "chore(manga): image bank build ${{ inputs.brand }}" --label agent-generated --body "Automated image_bank fill. See artifacts/manga/image_bank_pre_audit.txt"
      - name: Upload on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manga-image-bank-fail-${{ github.run_id }}
          path: |
            artifacts/manga/
          retention-days: 14
          if-no-files-found: ignore
      - name: Summary
        if: always()
        run: echo "## Image bank build — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
