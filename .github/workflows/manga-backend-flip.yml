name: Manga Backend Flip

on:
  workflow_dispatch:
    inputs:
      confirm_runner_live:
        description: 'Type CONFIRMED if pearl-star-gpu is online'
        required: true
        default: ''

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm
        run: |
          if [ "${{ inputs.confirm_runner_live }}" != "CONFIRMED" ]; then
            echo "Set confirm_runner_live=CONFIRMED"; exit 1
          fi
  flip:
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Flip defaults
        run: python3 scripts/ci/flip_manga_backend.py
      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH=agent/manga-backend-flip-${{ github.run_id }}
          git checkout -b "$BRANCH"
          git add config/weekly_rollout/manga_rollout.yaml .github/workflows/manga-smoke-test.yml .github/workflows/weekly-manga-rollout.yml
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          git commit -m "chore(manga): flip default backend to comfyui + self-hosted runner"
          git push -u origin "$BRANCH"
          gh label create agent-generated --color BFD4F2 --description "Agent PR" 2>/dev/null || true
          gh pr create --title "chore(manga): backend flip comfyui + pearl-star-gpu" --label agent-generated --body "Replay remains selectable via manga-smoke dispatch backend=replay."
      - name: Upload on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manga-backend-flip-fail-${{ github.run_id }}
          path: scripts/ci/flip_manga_backend.py
          if-no-files-found: ignore
      - name: Summary
        if: always()
        run: echo "## Backend flip — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
