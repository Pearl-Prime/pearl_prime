# Research feeds ingest — fetch RSS from config/research/youth_feed_sources.yaml
# and save to artifacts/research/raw/<date>. No model run; for use with local Qwen3.
# See docs/research/continue_gen_research3.md and docs/research/RESEARCH_FEED_SOURCES.md.
name: Research feeds ingest

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch RSS feeds
        run: |
          PYTHONPATH=. python scripts/research/fetch_feeds.py

      - name: Upload research raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-raw-${{ github.run_id }}
          path: artifacts/research/raw/
          retention-days: 14
