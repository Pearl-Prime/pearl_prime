name: ACT-013 — 13 New Atom Types

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — plan only, no commits (pass true or false)'
        required: false
        default: 'false'

env:
  BRANCH_NAME: agent/act-013-atom-types-${{ github.run_id }}

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install anthropic 2>/dev/null || true

      - name: Configure git identity
        run: |
          git config user.name "Pearl_Dev (GitHub Actions)"
          git config user.email "actions@github.com"
          mkdir -p artifacts

      - name: Extract ACT-013 scope
        run: |
          python3 -c "
import re
with open('artifacts/analysis/bestseller_action_plan.md', 'r') as f:
    content = f.read()
m = re.search(r'ACT-013.*?(?=ACT-014|##|\Z)', content, re.DOTALL)
print(m.group(0)[:3000] if m else 'ACT-013 section not found.')
" 2>&1 | tee artifacts/act-013-scope.txt
          echo "## ACT-013 Scope" >> $GITHUB_STEP_SUMMARY
          cat artifacts/act-013-scope.txt >> $GITHUB_STEP_SUMMARY

      - name: Audit existing atom types
        run: |
          python3 -c "
import os, re
# Find atom type definitions
results = []
for root, dirs, files in os.walk('.'):
    dirs[:] = [d for d in dirs if d not in ['__pycache__', '.git', 'node_modules']]
    for f in files:
        if f.endswith('.py'):
            path = os.path.join(root, f)
            try:
                content = open(path).read()
                if 'atom_type' in content.lower() or 'AtomType' in content:
                    results.append(path)
            except: pass
for r in results[:20]:
    print(r)
" 2>&1 | tee artifacts/act-013-atom-type-locations.txt

      - name: Create feature branch
        run: git checkout -b ${{ env.BRANCH_NAME }}

      - name: Run implementation agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PYTHONPATH=. python3 scripts/ci/run_agent_refactor.py \
            --task act-013-atom-types \
            --branch "${{ env.BRANCH_NAME }}" \
            --specs artifacts/analysis/bestseller_action_plan.md \
            --context-file artifacts/act-013-scope.txt \
            --dry-run "${{ inputs.dry_run }}" \
            --requirements "$(cat <<'REQS'
ACT-013: Add 13 new atom types as specified in artifacts/analysis/bestseller_action_plan.md §ACT-013.
For each new atom type:
1. Add the type definition (enum value or string constant) to the atom type registry.
2. Add a YAML template under config/source_of_truth/atoms/ (or wherever existing atoms live).
3. Add a renderer/handler stub so the pipeline doesn't crash when it encounters the new type.
4. Add unit tests: one per new type confirming it renders without error.
5. Do not remove or rename any existing atom types.
REQS
)" \
            2>&1 | tee artifacts/act-013-agent.log
          tail -50 artifacts/act-013-agent.log >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        if: inputs.dry_run != 'true'
        run: |
          PYTHONPATH=. python3 -m pytest tests/ -x -q --timeout=120 \
            -k "atom_type or atom" \
            2>&1 | tee artifacts/act-013-test-results.log || true

      - name: Commit push and open PR
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes produced." >> $GITHUB_STEP_SUMMARY
          else
            git add .
            git commit -m "feat(atoms): ACT-013 add 13 new atom types [agent]

Adds 13 new atom types per bestseller_action_plan.md §ACT-013.
Includes type definitions, YAML templates, renderer stubs, and unit tests.

Co-Authored-By: Pearl_Dev via GitHub Actions <actions@github.com>"
            git push -u origin ${{ env.BRANCH_NAME }}
            gh pr create \
              --title "feat(atoms): ACT-013 add 13 new atom types" \
              --body "P2 sprint — ACT-013. Adds 13 new atom types with templates, renderer stubs, and tests. See \`artifacts/analysis/bestseller_action_plan.md\` §ACT-013. Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

> ⚠️ Operator review required before merge.

🤖 Generated by Pearl_Dev via GitHub Actions." \
              --label "agent-generated,p2,act-013" \
              --base main --head "${{ env.BRANCH_NAME }}"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: act-013-${{ github.run_id }}
          path: artifacts/act-013-*.{log,txt}
          retention-days: 90
