name: Manga quality forensic analysis

on:
  workflow_dispatch:

jobs:
  parallel_streams:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        stream:
          - forensic_teardown
          - iyashikei_craft
          - studio_workflow_gap
          - series_identity_layer
          - character_consistency
          - name_thumbnail_stage
          - visual_quality_gates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run workstream stub
        run: |
          mkdir -p "artifacts/analysis/matrix/${{ matrix.stream }}"
          echo "# ${{ matrix.stream }}" > "artifacts/analysis/matrix/${{ matrix.stream }}/notes.md"
          echo "Run ${{ github.run_id }} UTC" >> "artifacts/analysis/matrix/${{ matrix.stream }}/notes.md"
      - name: Upload partial artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensic-${{ matrix.stream }}-${{ github.run_id }}
          path: artifacts/analysis/matrix/${{ matrix.stream }}/
          retention-days: 30

  assemble_pr:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [parallel_streams]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 -m pip install -q pyyaml
      - name: Download matrix artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: forensic-*-${{ github.run_id }}
          path: artifacts/analysis/matrix_dl
          merge-multiple: true
      - name: Consolidate + sprint script
        run: |
          python3 scripts/manga/forensic_quality_sprint.py
          if [ -d artifacts/analysis/matrix_dl ]; then
            rsync -a artifacts/analysis/matrix_dl/ artifacts/analysis/ || cp -R artifacts/analysis/matrix_dl/* artifacts/analysis/ 2>/dev/null || true
          fi
      - name: Open draft PR + issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH=agent/manga-forensic-${{ github.run_id }}
          git checkout -b "$BRANCH"
          git add artifacts/analysis
          if git diff --cached --quiet; then
            echo "No changes to commit; skipping PR"
            exit 0
          fi
          git commit -m "chore(manga): forensic quality analysis artifacts" \
            -m "Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
          git push -u origin "$BRANCH"
          gh label create agent-generated --color BFD4F2 --description "Agent-opened PRs" 2>/dev/null || true
          gh pr create --draft \
            --title "chore(manga): forensic quality analysis (${{ github.run_id }})" \
            --label agent-generated \
            --body "Automated forensic pack. See artifacts/analysis/MANGA_QUALITY_GAP_PLAN.md"
          ISSUE_BODY="Executive summary: open draft PR and read MANGA_QUALITY_GAP_PLAN.md. Run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --title "Manga forensic analysis summary (${{ github.run_id }})" \
            --label agent-generated \
            --body "$ISSUE_BODY"
      - name: Upload full analysis on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: forensic-assemble-fail-${{ github.run_id }}
          path: artifacts/analysis
          if-no-files-found: ignore
          retention-days: 30
      - name: Summary
        if: always()
        run: echo "## Forensic analysis — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
