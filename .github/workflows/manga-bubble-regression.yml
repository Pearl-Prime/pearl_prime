name: Manga bubble regression

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  bubble_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Collect pytest targets
        id: targets
        run: echo "paths=$(python3 scripts/ci/collect_manga_bubble_tests.py)" >> "$GITHUB_OUTPUT"

      - name: Run manga bubble / lettering regression
        id: pytest
        run: |
          set -euo pipefail
          : > pytest.log
          echo "## Pytest targets" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.targets.outputs.paths }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          PYTHONPATH=. python3 -m pytest ${{ steps.targets.outputs.paths }} -q --timeout=120 2>&1 | tee pytest.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manga-bubble-regression-${{ github.run_id }}
          path: pytest.log
          retention-days: 14

      - name: Open regression issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create regression --color D73A4A --description "Regression" 2>/dev/null || true
          BODY="Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} — cc @Ahjan108"
          gh issue create \
            --title "manga-bubble-regression failed (${{ github.run_id }})" \
            --label regression \
            --body "$BODY"

      - name: Summary
        if: always()
        run: |
          echo "## Manga bubble regression — ${{ job.conclusion }}" >> "$GITHUB_STEP_SUMMARY"
          tail -30 pytest.log >> "$GITHUB_STEP_SUMMARY" || true
