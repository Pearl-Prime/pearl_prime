# Cloud-native en_US skeleton → buildable flip campaign: deterministic naming pass
# (_needs_authoring: false) per brand, one PR per ≤180 modified plans, polling BOTH
# required checks then squash-merging. Self-sequencing — mirrors catalog-fanout-campaign.
#
# REQUIRES repo secret CATALOG_PAT (repo + workflow scope). Idempotent: only flips
# plans still marked _needs_authoring with arc+atoms present.
#
# Pilot: dispatch with brands=warrior_calm before empty brands (full fan-out).
# Ref OPD-20260627-001. Does NOT touch book_plans_<locale> or atoms/.
name: Catalog flip — en_US buildable campaign

on:
  workflow_dispatch:
    inputs:
      brands:
        description: Space-separated brand ids (empty = all with pending flips)
        required: false
        default: ''
        type: string

concurrency:
  group: catalog-flip-campaign
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover brands with pending flips
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - name: Guard — CATALOG_PAT must be set
        env:
          PAT: ${{ secrets.CATALOG_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::CATALOG_PAT secret is not set."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Compute flip matrix
        id: list
        env:
          BRANDS_INPUT: ${{ github.event.inputs.brands }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          ARGS=(--json-only)
          if [ -n "${BRANDS_INPUT:-}" ]; then
            ARGS+=(--brands "${BRANDS_INPUT}")
          fi
          python3 scripts/catalog/discover_flip_campaign.py "${ARGS[@]}" > /tmp/matrix.json
          COUNT="$(python3 -c 'import json;print(len(json.load(open("/tmp/matrix.json"))["include"]))')"
          {
            echo "matrix=$(cat /tmp/matrix.json)"
            echo "count=${COUNT}"
          } >> "$GITHUB_OUTPUT"
          echo "Brands to flip: ${COUNT}"
          cat /tmp/matrix.json

  flip:
    name: ${{ matrix.brand }} → buildable
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    env:
      GH_TOKEN: ${{ secrets.CATALOG_PAT }}
      BRAND: ${{ matrix.brand }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CATALOG_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Flip + chunk + PR + merge
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git config user.name "Pearl_Catalog (CI)"
          git config user.email "catalog-ci@users.noreply.github.com"

          git fetch origin main --quiet
          BEFORE=$(PYTHONPATH="$PYTHONPATH" python3 scripts/catalog/discover_flip_campaign.py --brands "$BRAND" --json-only)
          PENDING=$(python3 -c 'import json,sys; d=json.load(sys.stdin); print(d["include"][0]["pending"] if d["include"] else 0)' <<< "$BEFORE")
          echo "$BRAND pending flips on origin/main baseline: $PENDING"
          if [ "$PENDING" = "0" ]; then echo "Nothing to flip — exiting."; exit 0; fi

          python3 scripts/catalog/flip_authoring_skeletons.py --brand "$BRAND"

          git diff --name-only origin/main -- config/source_of_truth/book_plans_en_us/ > /tmp/changed.txt || true
          CHANGED=$(wc -l < /tmp/changed.txt | tr -d ' ')
          echo "$BRAND: $CHANGED modified plan files"
          if [ "$CHANGED" = "0" ]; then echo "No diffs — exiting."; exit 0; fi

          split -l 180 /tmp/changed.txt /tmp/chunk_
          BATCH=0
          for CHUNK in /tmp/chunk_*; do
            BATCH=$((BATCH+1))
            CHUNK_N=$(wc -l < "$CHUNK" | tr -d ' ')
            git fetch origin main --quiet
            BASE_TREE=$(git rev-parse "origin/main^{tree}")
            BASE_COMMIT=$(git rev-parse origin/main)
            IDX="/tmp/idx_flip_${BRAND}_${BATCH}_$$"
            rm -f "$IDX"
            GIT_INDEX_FILE="$IDX" git read-tree "$BASE_TREE"
            while IFS= read -r repo_path; do
              [ -z "$repo_path" ] && continue
              [ -f "$repo_path" ] || continue
              hash=$(git hash-object -w "$repo_path")
              GIT_INDEX_FILE="$IDX" git update-index --add --cacheinfo "100644,$hash,$repo_path"
            done < "$CHUNK"
            NEW_TREE=$(GIT_INDEX_FILE="$IDX" git write-tree)
            rm -f "$IDX"

            if git diff-tree -r --name-status "$BASE_TREE" "$NEW_TREE" | grep -q "^D"; then
              echo "::error::deletions detected for $BRAND batch $BATCH — aborting"; exit 1
            fi

            COMMIT=$(git commit-tree "$NEW_TREE" -p "$BASE_COMMIT" \
              -m "feat(catalog): flip en_US ${BRAND} batch ${BATCH} (${CHUNK_N} buildable)")
            BRANCH="ci/catalog-flip-${BRAND}-${GITHUB_RUN_ID}-b${BATCH}"
            git push origin "${COMMIT}:refs/heads/${BRANCH}"

            PR_URL=$(gh pr create --title "feat(catalog): flip en_US ${BRAND} batch ${BATCH}" \
              --body "Deterministic skeleton flip (\`_needs_authoring: false\` + naming). No LLM. Automated by catalog-flip-campaign.yml. Ref OPD-20260627-001." \
              --base main --head "$BRANCH")
            PR=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Opened PR #$PR for $BRAND batch $BATCH"

            STATE="pending"
            for _ in $(seq 1 50); do
              sleep 30
              GOV=$(gh pr view "$PR" --json statusCheckRollup --jq '.statusCheckRollup[]|select(.name=="Verify governance")|.conclusion' 2>/dev/null || true)
              PS=$(gh pr view "$PR" --json statusCheckRollup --jq '.statusCheckRollup[]|select(.name=="parse-sweep")|.conclusion' 2>/dev/null || true)
              if [ "$GOV" = "SUCCESS" ] && [ "$PS" = "SUCCESS" ]; then STATE="green"; break; fi
              if [ "$GOV" = "FAILURE" ] || [ "$PS" = "FAILURE" ]; then STATE="failed"; break; fi
            done
            if [ "$STATE" != "green" ]; then
              echo "::warning::PR #$PR not green ($STATE) — leaving open for sweep"; continue
            fi

            gh pr merge "$PR" --squash --delete-branch || true
            sleep 15
            if [ "$(gh pr view "$PR" --json state --jq '.state')" != "MERGED" ]; then
              sleep 30; gh pr merge "$PR" --squash --delete-branch || true
            fi
          done

          git fetch origin main --quiet
          AFTER=$(PYTHONPATH="$PYTHONPATH" python3 scripts/catalog/discover_flip_campaign.py --brands "$BRAND" --json-only)
          REM=$(python3 -c 'import json,sys; d=json.load(sys.stdin); print(d["include"][0]["pending"] if d["include"] else 0)' <<< "$AFTER")
          echo "$BRAND FINAL pending flips: $REM"
