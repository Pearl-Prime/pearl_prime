name: ACT-015 — Catalog Buying-Trigger

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — plan only, no commits (pass true or false)'
        required: false
        default: 'false'

env:
  BRANCH_NAME: agent/act-015-catalog-buying-trigger-${{ github.run_id }}

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install anthropic 2>/dev/null || true

      - name: Configure git identity
        run: |
          git config user.name "Pearl_Dev (GitHub Actions)"
          git config user.email "actions@github.com"
          mkdir -p artifacts

      - name: Extract ACT-015 scope
        run: |
          python3 -c "
import re
with open('artifacts/analysis/bestseller_action_plan.md', 'r') as f:
    content = f.read()
m = re.search(r'ACT-015.*?(?=ACT-016|##|\Z)', content, re.DOTALL)
print(m.group(0)[:3000] if m else 'ACT-015 section not found.')
" 2>&1 | tee artifacts/act-015-scope.txt
          echo "## ACT-015 Scope" >> $GITHUB_STEP_SUMMARY
          cat artifacts/act-015-scope.txt >> $GITHUB_STEP_SUMMARY

      - name: Create feature branch
        run: git checkout -b ${{ env.BRANCH_NAME }}

      - name: Run implementation agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PYTHONPATH=. python3 scripts/ci/run_agent_refactor.py \
            --task act-015-catalog-buying-trigger \
            --branch "${{ env.BRANCH_NAME }}" \
            --specs artifacts/analysis/bestseller_action_plan.md \
            --context-file artifacts/act-015-scope.txt \
            --dry-run "${{ inputs.dry_run }}" \
            --requirements "$(cat <<'REQS'
ACT-015: Catalog buying-trigger integration (see bestseller_action_plan.md §ACT-015).
The buying trigger is a set of psychological/emotional signals in the book's opening and
chapter endings that drive purchase decisions. Implementation:
1. Define the buying-trigger schema (YAML config in config/source_of_truth/ or equivalent).
2. Add buying-trigger scoring to the book quality gate (flag books that score below threshold).
3. Add buying-trigger injection hooks in the chapter generation path so Pearl_Writer
   receives buying-trigger guidance per persona × topic.
4. Add tests: schema validation, scorer returns expected score for mock chapter, hook fires.
REQS
)" \
            2>&1 | tee artifacts/act-015-agent.log
          tail -50 artifacts/act-015-agent.log >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        if: inputs.dry_run != 'true'
        run: |
          PYTHONPATH=. python3 -m pytest tests/ -x -q --timeout=120 \
            -k "buying_trigger or catalog" \
            2>&1 | tee artifacts/act-015-test-results.log || true

      - name: Commit push and open PR
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes produced." >> $GITHUB_STEP_SUMMARY
          else
            git add .
            git commit -m "feat(catalog): ACT-015 buying-trigger integration [agent]

Adds buying-trigger schema, quality gate scoring, and chapter generation
hooks per bestseller_action_plan.md §ACT-015.

Co-Authored-By: Pearl_Dev via GitHub Actions <actions@github.com>"
            git push -u origin ${{ env.BRANCH_NAME }}
            gh pr create \
              --title "feat(catalog): ACT-015 catalog buying-trigger integration" \
              --body "P2 sprint — ACT-015. Adds buying-trigger schema, quality-gate scoring, and chapter generation hooks. See \`artifacts/analysis/bestseller_action_plan.md\` §ACT-015. Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

> ⚠️ Operator review required before merge.

🤖 Generated by Pearl_Dev via GitHub Actions." \
              --label "agent-generated,p2,act-015" \
              --base main --head "${{ env.BRANCH_NAME }}"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: act-015-${{ github.run_id }}
          path: artifacts/act-015-*.{log,txt}
          retention-days: 90
