# Translation: run full comparator loop for all personas × all CJK6 locales.
# translate -> judge -> patch -> retry (max 3) -> pass or manual_review.
#
# DISABLED 2026-07-10 (follow-up to PR #5498, artifacts/qa/CI_WORKFLOW_BANNED_KEY_FIX_2026-07-10.md):
# this workflow injected DASHSCOPE_API_KEY/BASE_URL/MODEL from repo secrets into
# scripts/localization/run_translation_loop.py, running on GitHub-hosted
# ubuntu-latest -- which cannot reach Pearl Star's Tailscale-only Ollama
# endpoint, the compliant Tier-2 path. It also ran on an UNATTENDED WEEKLY
# SCHEDULE (Sundays 2 AM) -- the highest-risk shape in this audit, since any
# violation here would have been automatic and silent rather than requiring a
# manual dispatch. Whether it ever made a real (banned) DashScope-cloud call
# depends on what the QWEN_BASE_URL secret is actually configured to, which is
# not knowable from the repo alone; either way, an ubuntu-latest runner
# injecting these keys on an automatic schedule cannot be verified compliant.
# See artifacts/qa/CI_DASHSCOPE_WORKFLOW_AUDIT_2026-07-10.md for the full
# 8-workflow audit this fix is part of.
#
# The `schedule:` trigger is removed entirely (an always-failing job on an
# unattended cron is pure noise, not a safeguard). workflow_dispatch is kept
# for shape only. run_translation_loop.py is already Ollama-capable (PR
# #5498) -- what's missing is a runner that can reach Pearl Star. Until a
# self-hosted runner registered on that Tailscale network exists (an operator
# infra decision, not made here), use the interactive path instead: run
# `scripts/localization/run_translation_loop.py` locally/on Pearl Star with
# OLLAMA_HOST set, as proven in artifacts/qa/JA_JP_TRANSLATION_CLOSEOUT_2026-07-10.md.

name: Translate atoms (Qwen matrix)

on:
  workflow_dispatch:
    inputs:
      persona:
        description: 'DISABLED — see top-of-file comment. Kept for shape only.'
        required: false
        type: string
        default: ''
      locale:
        description: 'DISABLED — see top-of-file comment. Kept for shape only.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  blocked:
    runs-on: ubuntu-latest
    steps:
      - name: Explain why this workflow is disabled
        run: |
          echo "::error::This workflow is disabled — it injected DASHSCOPE_API_KEY/BASE_URL/MODEL from repo secrets on an UNATTENDED WEEKLY SCHEDULE, while running on GitHub-hosted ubuntu-latest, which cannot reach Pearl Star's Tailscale-only Ollama endpoint (the compliant Tier-2 path under CLAUDE.md's LLM Tier Policy). The weekly cron trigger has been removed."
          echo "::error::Use the interactive path instead: python3 scripts/localization/run_translation_loop.py with OLLAMA_HOST set, run from an operator/Claude Code session with Tailscale access to Pearl Star."
          echo "::error::See artifacts/qa/CI_DASHSCOPE_WORKFLOW_AUDIT_2026-07-10.md for full context."
          exit 1
