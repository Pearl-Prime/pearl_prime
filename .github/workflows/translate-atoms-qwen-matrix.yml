# Translation: run full comparator loop for all personas × all CJK6 locales.
# translate -> judge -> patch -> retry (max 3) -> pass or manual_review.
# Scheduled weekly Sunday 2 AM; can also be triggered manually.

name: Translate atoms (Qwen matrix)

concurrency:
  group: translate-matrix
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      persona:
        description: 'Persona filter (blank = all)'
        required: false
        type: string
        default: ''
      locale:
        description: 'Locale filter (blank = all CJK6)'
        required: false
        type: string
        default: ''
  schedule:
    - cron: '0 2 * * 0'

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || secrets.QWEN_API_KEY }}
      DASHSCOPE_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
      DASHSCOPE_MODEL: ${{ secrets.QWEN_MODEL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet openai pyyaml

      - name: Run translation loop
        run: |
          CMD="PYTHONPATH=. python3 scripts/localization/run_translation_loop.py"

          PERSONA="${{ github.event.inputs.persona }}"
          LOCALE="${{ github.event.inputs.locale }}"

          if [ -n "$PERSONA" ]; then
            CMD="$CMD --persona $PERSONA"
          fi

          if [ -n "$LOCALE" ]; then
            CMD="$CMD --locale $LOCALE"
          else
            CMD="$CMD --all-locales"
          fi

          CMD="$CMD --resume --max-parallel 5"
          eval $CMD

      - name: Report coverage
        run: PYTHONPATH=. python3 scripts/ci/report_translation_coverage.py || true

      - name: Structural gate
        run: PYTHONPATH=. python3 scripts/localization/locale_structural_gate.py --all-locales || true

      - name: Create PR with translations
        if: success()
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard atoms/)" ]; then
            echo "No new translations."
            exit 0
          fi

          BRANCH="agent/translate-matrix-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add atoms/*/*/locales/ atoms/*/*/*/locales/
          git add artifacts/localization/ || true
          git commit -m "feat(localization): weekly translation matrix run

          Automated CJK6 translation via comparator loop.

          Co-Authored-By: Qwen (Dashscope) <noreply@alibaba.com>"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "feat(localization): weekly translation matrix $(date +%Y-%m-%d)" \
            --body "Automated weekly translation via full comparator loop (translate → judge → patch → retry max 3). Review sample translations before merging."
        env:
          GH_TOKEN: ${{ github.token }}
