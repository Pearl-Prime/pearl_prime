name: Investigation — deep_book_6h quality_gate reject

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic to test (default: anxiety)'
        required: false
        default: 'anxiety'
      persona:
        description: 'Persona to test (default: gen_z_professionals)'
        required: false
        default: 'gen_z_professionals'

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || pip install pyyaml 2>/dev/null || true

      - name: Create artifacts directory
        run: mkdir -p artifacts/regression

      - name: Run diagnose_repetition analysis
        run: |
          echo "## deep_book_6h Regression Investigation" >> $GITHUB_STEP_SUMMARY
          echo "Topic: ${{ inputs.topic }} | Persona: ${{ inputs.persona }}" >> $GITHUB_STEP_SUMMARY
          PYTHONPATH=. python3 scripts/analysis/diagnose_repetition.py \
            --topic "${{ inputs.topic }}" \
            --persona "${{ inputs.persona }}" \
            --runtime-format deep_book_6h \
            --output artifacts/regression/deep_book_6h_repetition_diagnosis.md \
            2>&1 | tee artifacts/regression/deep_book_6h_trace.log
          echo "Exit code: $?" >> $GITHUB_STEP_SUMMARY

      - name: Extract quality_gate reject reasons
        if: always()
        run: |
          grep -E "Reject|repetition|band:|reason:|quality_gate|FAIL" \
            artifacts/regression/deep_book_6h_trace.log \
            > artifacts/regression/deep_book_6h_reject_analysis.md 2>/dev/null || \
            echo "No rejection patterns found in log (script may have run cleanly)." \
            > artifacts/regression/deep_book_6h_reject_analysis.md
          echo "### Reject Analysis" >> $GITHUB_STEP_SUMMARY
          cat artifacts/regression/deep_book_6h_reject_analysis.md >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-book-6h-investigation-${{ github.run_id }}
          path: artifacts/regression/
          retention-days: 90

      - name: Open investigation issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## deep_book_6h quality_gate REJECT — Investigation\n\n"
          BODY+="**Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n"
          BODY+="**Topic:** ${{ inputs.topic }} | **Persona:** ${{ inputs.persona }}\n\n"
          BODY+="### Reject Analysis\n\`\`\`\n$(cat artifacts/regression/deep_book_6h_reject_analysis.md)\n\`\`\`\n\n"
          BODY+="### Diagnosis\n\`\`\`\n$(head -60 artifacts/regression/deep_book_6h_repetition_diagnosis.md 2>/dev/null || echo 'see artifacts')\n\`\`\`"
          EXISTING=$(gh issue list --label regression --state open \
            --search "deep_book_6h quality_gate" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "Regression: deep_book_6h quality_gate REJECT on flagship (${{ inputs.topic }} × ${{ inputs.persona }})" \
              --body "$(printf '%b' "$BODY")" \
              --label "regression,p1"
          else
            gh issue comment "$EXISTING" \
              --body "New investigation run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
