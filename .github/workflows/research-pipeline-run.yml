# Two-pass generational research (Qwen API via OpenAI-compatible endpoint).
# Uses repository secrets: QWEN_BASE_URL, QWEN_MODEL, and API key from DASHSCOPE_API_KEY (preferred) or QWEN_API_KEY.
name: Research Pipeline — Qwen3 Two-Pass

on:
  workflow_dispatch:
    inputs:
      output_stem:
        description: "Date stem for output files (e.g. 2026-03-31)"
        required: true
        default: "2026-03-31"
      layers:
        description: "Comma-separated layer IDs (or 'all')"
        required: true
        default: "all"

permissions:
  contents: write

jobs:
  run-layers:
    runs-on: ubuntu-latest
    env:
      QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
      QWEN_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || secrets.QWEN_API_KEY }}
      QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || secrets.QWEN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install openai pyyaml requests

      - name: Verify API connectivity
        run: |
          python3 -c "
          from openai import OpenAI
          import os
          client = OpenAI(
              base_url=os.environ['QWEN_BASE_URL'],
              api_key=os.environ['QWEN_API_KEY'],
          )
          r = client.chat.completions.create(
              model=os.environ['QWEN_MODEL'],
              messages=[{'role': 'user', 'content': 'Say hello in one word'}],
              max_tokens=10,
          )
          print('API OK:', (r.choices[0].message.content or '').strip())
          "

      - name: Run research layers
        run: |
          STEM="${{ github.event.inputs.output_stem }}"
          LAYERS="${{ github.event.inputs.layers }}"
          if [ "$LAYERS" = "all" ]; then
            LAYERS="psychology,pain_points,event_impact,narrative,platform,linguistic,semantic_trend"
          fi
          IFS=',' read -ra IDS <<< "$LAYERS"
          for id in "${IDS[@]}"; do
            id="$(echo "$id" | xargs)"
            [ -z "$id" ] && continue
            echo "=== Running layer: $id ==="
            python3 scripts/research/run_research.py --prompt-id "$id" --output-stem "$STEM"
            echo "=== Done: $id ==="
          done

      - name: Validate outputs
        run: |
          STEM="${{ github.event.inputs.output_stem }}"
          FAIL=0
          for layer in psychology pain_points world_events narrative platform linguistic semantic_trend; do
            YAML="artifacts/research/${layer}/${STEM}.yaml"
            MD="artifacts/research/${layer}/${STEM}_reasoning.md"
            if [ -f "$YAML" ]; then
              python3 -c "import yaml; yaml.safe_load(open('${YAML}')); print('${layer}: YAML OK')" || { echo "${layer}: YAML FAIL"; FAIL=1; }
              if grep -q "placeholder" "$YAML" 2>/dev/null; then
                echo "${layer}: YAML STILL PLACEHOLDER"; FAIL=1
              fi
            else
              echo "${layer}: missing $YAML"; FAIL=1
            fi
            if [ -f "$MD" ]; then
              if grep -q "placeholder" "$MD"; then
                echo "${layer}: reasoning STILL PLACEHOLDER"; FAIL=1
              else
                echo "${layer}: reasoning OK ($(wc -l < "$MD") lines)"
              fi
            else
              echo "${layer}: missing $MD"; FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "VALIDATION FAILED"
            exit 1
          fi

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/research/psychology/ artifacts/research/pain_points/ artifacts/research/world_events/ artifacts/research/narrative/ artifacts/research/platform/ artifacts/research/linguistic/ artifacts/research/semantic_trend/ || true
          if git diff --cached --quiet; then
            echo "No new artifacts to commit"
          else
            STEM="${{ github.event.inputs.output_stem }}"
            LAYERS="${{ github.event.inputs.layers }}"
            git commit -m "feat: live Qwen3 two-pass output (${STEM})" \
              -m "Layers: ${LAYERS}" \
              -m "Model: ${QWEN_MODEL}" \
              -m "Triggered by: workflow_dispatch" \
              -m "Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
          fi
