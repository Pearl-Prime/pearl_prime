name: Manga series pitch

on:
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand ID'
        required: true
        default: 'stillness_press'
      topic:
        required: true
        default: 'burnout'
      genre:
        required: true
        default: 'shonen'
      persona:
        required: false
        default: 'gen_z_professionals'

jobs:
  pitch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -q pyyaml
      - name: Generate series identity YAML
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          if [ -n "${CLAUDE_API_KEY:-}" ]; then echo "::add-mask::$CLAUDE_API_KEY"; fi
          python3 scripts/manga/manga_series_pitch.py \
            --brand "${{ inputs.brand }}" \
            --topic "${{ inputs.topic }}" \
            --genre "${{ inputs.genre }}" \
            --persona "${{ inputs.persona }}"
      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH=agent/manga-series-pitch-${{ github.run_id }}
          git checkout -b "$BRANCH"
          git add config/source_of_truth/manga_series_identities/
          git commit -m "feat(manga): series identity pitch (${{ inputs.brand }}/${{ inputs.topic }})" \
            -m "Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
          git push -u origin "$BRANCH"
          gh label create agent-generated --color BFD4F2 --description "Agent-opened PRs" 2>/dev/null || true
          gh pr create \
            --title "feat(manga): series identity — ${{ inputs.brand }} / ${{ inputs.topic }}" \
            --label agent-generated \
            --body "LLM series pitch YAML under config/source_of_truth/manga_series_identities/."
      - name: Upload on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manga-series-pitch-fail-${{ github.run_id }}
          path: config/source_of_truth/manga_series_identities/
          if-no-files-found: ignore
          retention-days: 14
      - name: Summary
        if: always()
        run: echo "## Manga series pitch — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
