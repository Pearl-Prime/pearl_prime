name: Branch Hygiene Sweep

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * MON"  # Monday 10:00 UTC

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch all remote branches
        run: git fetch --prune origin

      - name: Run health check
        run: |
          mkdir -p artifacts
          bash scripts/git/health_check.sh 2>&1 | tee artifacts/health.log || true
          echo "## Health Check" >> $GITHUB_STEP_SUMMARY
          tail -30 artifacts/health.log >> $GITHUB_STEP_SUMMARY

      - name: Identify stale branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/git/identify_stale_branches.py \
            --threshold-days 30 \
            --output artifacts/stale_branches.md \
            2>&1 | tee artifacts/stale_branches_trace.log
          echo "## Stale Branch Candidates" >> $GITHUB_STEP_SUMMARY
          cat artifacts/stale_branches.md >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-hygiene-${{ github.run_id }}
          path: artifacts/
          retention-days: 30

      - name: Open issue with prune candidates
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CANDIDATE_COUNT=$(grep -c "^-" artifacts/stale_branches.md 2>/dev/null || echo 0)
          if [ "$CANDIDATE_COUNT" -eq "0" ]; then
            echo "No stale branches found — skipping issue creation." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          # Avoid duplicate issues for the same week
          WEEK=$(date -u +%Y-W%V)
          EXISTING=$(gh issue list --label maintenance --state open \
            --search "Branch hygiene" --json number,title \
            --jq ".[] | select(.title | contains(\"$WEEK\")) | .number" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open for week $WEEK — skipping." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          {
            echo "## Stale Branch Prune Candidates"
            echo ""
            cat artifacts/stale_branches.md
            echo ""
            echo "---"
            echo "**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "> ⚠️ **Do NOT auto-delete.** Operator reviews this list and prunes manually via \`git push origin --delete <branch>\`."
            echo "> Check each branch for any open PRs or unpushed work before deleting."
            echo ""
            echo "**Recovery is always possible** — the daily auto-cleanup workflow (\`cleanup-stale-worktrees.yml\`) tag-archives every branch before deletion. Restore any \`archive/<branch>-<date>\` with:"
            echo '```bash'
            echo "git fetch origin --tags"
            echo "git checkout -b recovered/<name> archive/<branch>-<date>"
            echo '```'
          } > /tmp/issue_body.md
          gh issue create \
            --title "Branch hygiene — stale branch prune candidates ($(date -u +%Y-%m-%d), W$WEEK)" \
            --body-file /tmp/issue_body.md \
            --label maintenance
