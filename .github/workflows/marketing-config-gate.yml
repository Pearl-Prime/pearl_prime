name: Marketing Config Validation Gate

on:
  pull_request:
    paths:
      - 'config/marketing/**'
      - 'phoenix_v4/marketing/**'
      - 'phoenix_v4/qa/validate_marketing_feed.py'
      - 'scripts/marketing/build_marketing_feed.py'
      - 'scripts/marketing/build_funnel_book_url_index.py'
      - '.github/workflows/marketing-config-gate.yml'
  push:
    branches:
      - main
    paths:
      - 'config/marketing/**'
      - 'phoenix_v4/marketing/**'

jobs:
  validate-marketing-config:
    runs-on: ubuntu-latest
    name: Validate Marketing Config

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate feed schema
        run: |
          PYTHONPATH=. python -m phoenix_v4.qa.validate_marketing_config
          PYTHONPATH=. python -m phoenix_v4.qa.validate_marketing_feed --sample-feed
          python3 scripts/marketing/build_funnel_book_url_index.py --check

      - name: Report validation results
        if: always()
        run: |
          echo "Marketing config validation completed"
