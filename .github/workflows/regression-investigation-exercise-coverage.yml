name: Investigation — EXERCISE coverage gap

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic to audit (default: anxiety)'
        required: false
        default: 'anxiety'
      persona:
        description: 'Persona to audit (default: gen_z_professionals)'
        required: false
        default: 'gen_z_professionals'

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || pip install pyyaml 2>/dev/null || true

      - name: Create artifacts directory
        run: mkdir -p artifacts/regression

      - name: Audit EXERCISE atoms
        run: |
          echo "## EXERCISE Coverage Audit" >> $GITHUB_STEP_SUMMARY
          echo "Topic: ${{ inputs.topic }} | Persona: ${{ inputs.persona }}" >> $GITHUB_STEP_SUMMARY
          PYTHONPATH=. python3 scripts/analysis/audit_exercise_coverage.py \
            --persona "${{ inputs.persona }}" \
            --topic "${{ inputs.topic }}" \
            --output artifacts/regression/exercise_coverage_audit.md \
            2>&1 | tee artifacts/regression/exercise_audit_trace.log

      - name: Trace library_34 fallback
        if: always()
        run: |
          PYTHONPATH=. python3 scripts/analysis/trace_library_fallback.py \
            --persona "${{ inputs.persona }}" \
            --topic "${{ inputs.topic }}" \
            --output artifacts/regression/library_34_fallback_trace.md \
            2>&1 | tee -a artifacts/regression/exercise_audit_trace.log

      - name: Summarise findings
        if: always()
        run: |
          echo "### Coverage Audit" >> $GITHUB_STEP_SUMMARY
          head -40 artifacts/regression/exercise_coverage_audit.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "### library_34 Fallback Trace" >> $GITHUB_STEP_SUMMARY
          head -30 artifacts/regression/library_34_fallback_trace.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exercise-coverage-investigation-${{ github.run_id }}
          path: artifacts/regression/
          retention-days: 90

      - name: Open investigation issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## EXERCISE Coverage Gap — ${{ inputs.persona }} × ${{ inputs.topic }}\n\n"
          BODY+="**Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n"
          BODY+="### Coverage Audit\n\`\`\`\n$(cat artifacts/regression/exercise_coverage_audit.md 2>/dev/null || echo 'see artifacts')\n\`\`\`\n\n"
          BODY+="### library_34 Fallback Trace\n\`\`\`\n$(cat artifacts/regression/library_34_fallback_trace.md 2>/dev/null || echo 'see artifacts')\n\`\`\`"
          EXISTING=$(gh issue list --label regression --state open \
            --search "EXERCISE coverage gap" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "Regression: EXERCISE coverage gap for ${{ inputs.persona }} × ${{ inputs.topic }}" \
              --body "$(printf '%b' "$BODY")" \
              --label "regression,p1"
          else
            gh issue comment "$EXISTING" \
              --body "New investigation run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
