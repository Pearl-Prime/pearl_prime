name: Pearl News daily publish

# 6 AM Taiwan (UTC+8) = 22:00 UTC previous day → morning cycle
# 6 PM Taiwan (UTC+8) = 10:00 UTC              → evening cycle
#
# REQUIRES self-hosted runner `pearl-star` — Ollama runs on the same host (loopback).
# Local Mac cron fallback: bash scripts/pearl_news/install_daily_cron.sh

on:
  schedule:
    - cron: '0 22 * * *'   # 6 AM Taiwan (UTC+8) — morning cycle
    - cron: '0 10 * * *'   # 6 PM Taiwan (UTC+8) — evening cycle
  workflow_dispatch:
    inputs:
      cycle:
        description: 'Cycle to run: morning, evening, or full'
        required: true
        default: morning
        type: choice
        options:
          - morning
          - evening
          - full
      dry_run:
        description: 'Dry run — generate but do not publish?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  publish-articles:
    name: Publish Pearl News articles (${{ github.event.inputs.cycle || 'scheduled' }})
    # pearl-star runner has Tailscale; required to reach Pearl Star Ollama (Tier 2).
    runs-on: [self-hosted, pearl-star]
    timeout-minutes: 90

    env:
      WORDPRESS_SITE_URL: ${{ secrets.WORDPRESS_SITE_URL }}
      WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
      WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
      # Tier 2 routing: Gemma (EN) + Qwen (CJK) on local Ollama (pearl-star runner).
      # Hardcoded loopback — runner and Ollama share the same host; avoids secret newline issues.
      GEMMA_BASE_URL: http://127.0.0.1:11434/v1
      GEMMA_MODEL: gemma3:27b
      QWEN_BASE_URL: http://127.0.0.1:11434/v1
      QWEN_MODEL: qwen2.5:14b
      QWEN_API_KEY: ollama
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preflight Pearl Star LLM + WordPress secrets
        run: bash scripts/pearl_news/preflight_daily_publish.sh

      # ───────────────────────────────────────────────────────────────────
      # Pearl News sidebar parity gate (BLOCKS publish on parity-fail).
      # Authority: docs/PEARL_NEWS_SIDEBAR_VERSION_HISTORY.md,
      #            docs/PEARL_NEWS_SIDEBAR_FUNCTION_INVENTORY.md,
      #            docs/PEARL_NEWS_WRITER_SPEC.md §S.
      # If this step fails, the assembled sidebar has drifted from the
      # canonical SHA chain. Restore per §S; do NOT bypass this gate.
      # ───────────────────────────────────────────────────────────────────
      - name: Check Pearl News sidebar parity
        run: python3 scripts/ci/check_pearl_news_sidebar_parity.py --verbose

      - name: Determine cycle from schedule
        id: cycle
        run: |
          # workflow_dispatch: use input; scheduled: derive from UTC hour
          INPUT_CYCLE="${{ github.event.inputs.cycle }}"
          if [ -n "$INPUT_CYCLE" ]; then
            echo "cycle=$INPUT_CYCLE" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%H)
            # 22:00 UTC = morning (6AM Taiwan); 10:00 UTC = evening (6PM Taiwan)
            if [ "$HOUR" -ge 21 ] || [ "$HOUR" -lt 3 ]; then
              echo "cycle=morning" >> "$GITHUB_OUTPUT"
            else
              echo "cycle=evening" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run Pearl News daily cycle
        run: |
          CYCLE="${{ steps.cycle.outputs.cycle }}"
          DRY="${{ github.event.inputs.dry_run }}"
          FLAGS="--cycle $CYCLE"
          [ "$DRY" = "true" ] && FLAGS="$FLAGS --dry-run"
          echo "Running: python3 scripts/pearl_news/run_daily_news_cycle.py $FLAGS"
          python3 scripts/pearl_news/run_daily_news_cycle.py $FLAGS

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pearl-news-cycle-${{ steps.cycle.outputs.cycle }}-${{ github.run_id }}
          path: artifacts/pearl_news/
          retention-days: 14
