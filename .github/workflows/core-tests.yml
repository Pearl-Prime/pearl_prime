# Core tests — fast pytest + production readiness gates.
# Required for branch protection on main/master.
# Runs on every push/PR to main/master.
name: Core tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  core-tests:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install -r requirements-test.txt
        # production gates (Gate 17) require jsonschema; requirements-test.txt includes jsonschema>=4.0

      - name: Run fast/core pytest
        run: |
          PYTHONPATH=. python -m pytest tests/ \
            -v --tb=short \
            -m "not slow" \
            -x
        continue-on-error: false

      - name: Smoke manga chapter runner CLI
        run: |
          PYTHONPATH=. python scripts/ci/smoke_manga_chapter_runner.py
        continue-on-error: false

      - name: Validate marketing config
        run: |
          PYTHONPATH=. python -m phoenix_v4.qa.validate_marketing_config
        continue-on-error: false

      # Regression guard: schema, ready asset_path, source/fidelity honesty,
      # critical rows must stay ready unless intentional_non_ready + placeholder_reason.
      - name: Validate onboarding registry JSON
        run: |
          python scripts/ci/validate_onboarding_registry.py
        continue-on-error: false

      - name: Rebuild curated freebie index for deterministic gates
        run: |
          python scripts/rebuild_freebie_index_from_plans.py \
            --plans-dir artifacts/freebies/blessed_plans \
            --out artifacts/freebies/index.jsonl

      - name: Run production readiness gates
        run: |
          PYTHONPATH=. python scripts/run_production_readiness_gates.py
