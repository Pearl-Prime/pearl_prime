name: Drift detectors

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  drift-detectors:
    name: Drift detectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve diff base
        id: diff_base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=" >> "$GITHUB_OUTPUT"
          fi

      - name: Canonical pipeline path (four-piece chord — BLOCK)
        env:
          CANONICAL_PIPELINE_GATE_MODE: fail
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_canonical_pipeline_path.py "${EXTRA[@]}" --gate-mode fail

      - name: Duplicate modules (warn)
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_duplicate_modules.py "${EXTRA[@]}"

      - name: Authority doc read (warn)
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_authority_doc_read.py "${EXTRA[@]}"

      - name: Manga render-progress bytes (stub-as-done — BLOCK)
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_render_progress_bytes.py "${EXTRA[@]}"

      - name: Manga story-authored render entry (listing-as-story — BLOCK)
        run: |
          python3 -m pip install --quiet pyyaml  # only dep; gate uses inline substance mirrors otherwise
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_manga_story_authored.py "${EXTRA[@]}"

      - name: Manga config wiring (unwired-config-as-working — BLOCK)
        run: |
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_manga_wiring.py

      - name: Brand admin Weekly OS public sync (BLOCK)
        run: python3 scripts/ci/check_brand_admin_weekly_os_public_sync.py

      - name: 12-shape chapter object continuity (BLOCK)
        run: PYTHONPATH=. python3 scripts/ci/check_chapter_object_continuity.py

      - name: Data dictionary enforced (undocumented / orphan / unwired-knob — BLOCK)
        run: |
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_data_dictionary.py
