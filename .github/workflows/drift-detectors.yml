name: Drift detectors

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  drift-detectors:
    name: Drift detectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve diff base
        id: diff_base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=" >> "$GITHUB_OUTPUT"
          fi

      - name: Canonical pipeline path (four-piece chord — BLOCK)
        env:
          CANONICAL_PIPELINE_GATE_MODE: fail
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_canonical_pipeline_path.py "${EXTRA[@]}" --gate-mode fail

      - name: Duplicate modules (warn)
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_duplicate_modules.py "${EXTRA[@]}"

      - name: Authority doc read (warn)
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_authority_doc_read.py "${EXTRA[@]}"

      - name: Manga render-progress bytes (stub-as-done — BLOCK)
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_render_progress_bytes.py "${EXTRA[@]}"

      - name: Manga story-authored render entry (listing-as-story — BLOCK)
        run: |
          python3 -m pip install --quiet pyyaml  # only dep; gate uses inline substance mirrors otherwise
          BASE="${{ steps.diff_base.outputs.base }}"
          EXTRA=()
          if [ -n "$BASE" ]; then
            EXTRA=(--base "$BASE" --head HEAD)
          fi
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_manga_story_authored.py "${EXTRA[@]}"

      - name: Manga config wiring (unwired-config-as-working — BLOCK)
        run: |
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_manga_wiring.py

      - name: Western lane format (en_US illustrated pilot — BLOCK)
        run: |
          python3 -m pip install --quiet pyyaml jsonschema
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_western_lane_format.py

      - name: Spine packet integrity (planner owns duplicate resolution — BLOCK)
        run: PYTHONPATH=scripts/ci:. python3 scripts/ci/check_spine_packet_integrity.py

      - name: Brand admin Weekly OS public sync (BLOCK)
        run: python3 scripts/ci/check_brand_admin_weekly_os_public_sync.py

      - name: 12-shape chapter object continuity (BLOCK)
        run: PYTHONPATH=. python3 scripts/ci/check_chapter_object_continuity.py

      - name: Accent plan assignment (planner-owned accents — BLOCK)
        run: PYTHONPATH=. python3 scripts/ci/check_accent_plan_assignment.py

      - name: Flagship 12-shape chapter shape (BLOCK)
        run: PYTHONPATH=. python3 scripts/ci/check_flagship_chapter_shape.py

      - name: Flagship golden gates — ch1 + full-book parity, exercise five-layer + diversity (BLOCK)
        run: |
          set -euo pipefail
          # Exercise pick diversity — fast, no render (rejects all-one-library / sequential-run).
          PYTHONPATH=. python3 scripts/ci/check_flagship_exercise_diversity.py
          # One canonical production render, shared by every render-consuming golden gate.
          PYTHONPATH=. python3 scripts/run_pipeline.py \
            --topic anxiety --persona gen_z_professionals \
            --arc config/source_of_truth/master_arcs/gen_z_professionals__anxiety__overwhelm__F006.yaml \
            --pipeline-mode spine --runtime-format extended_book_2h \
            --quality-profile production --exercise-journeys --no-job-check \
            --render-book --render-dir /tmp/flagship_golden --seed flagship_phase2_layer6 || true
          test -s /tmp/flagship_golden/book.txt
          # Golden #1 (ch1) + golden #2 (full book) byte parity, both from the one render.
          PYTHONPATH=. python3 scripts/ci/check_flagship_book_parity.py --snapshot all \
            --ch1-from-file /tmp/flagship_golden/book.txt --full-from-file /tmp/flagship_golden/book.txt
          # Every ch2-12 EXERCISE renders its full 5 layers (bridge/intro/description/aha/integration).
          PYTHONPATH=. python3 scripts/ci/check_flagship_exercise_five_layer.py --book /tmp/flagship_golden/book.txt

      - name: Flagship CH1 executable contract (BLOCK)
        run: PYTHONPATH=. python3 scripts/ci/check_flagship_contract.py

      - name: Data dictionary enforced (undocumented / orphan / unwired-knob — BLOCK)
        run: |
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_data_dictionary.py

      - name: No-lost-functions — capability regression vs base (§18 — BLOCK)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE="${{ steps.diff_base.outputs.base }}"
          REF="${BASE:-origin/main}"
          PYTHONPATH=scripts/ci:. python3 scripts/ci/check_capability_regression.py --baseline-ref "$REF"
