# Release gates — production readiness gates + rigorous test + canary + rollback smoke.
# Runs on push to main and workflow_dispatch. Required for release confidence.
name: Release gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, master]
    paths:
      - 'phoenix_v4/**'
      - 'scripts/**'
      - 'config/**'
      - 'atoms/**'
      - '.github/workflows/release-gates.yml'
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  release-gates:
    name: Release gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt

      - name: Production readiness gates
        run: |
          PYTHONPATH=. python scripts/run_production_readiness_gates.py

      - name: Simulation analyzer gate
        if: github.event_name != 'pull_request'
        run: |
          SIM_N=1000
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SIM_N=10000
          fi
          PYTHONPATH=. python scripts/ci/run_intelligent_sim_gates.py \
            --run-sim \
            --n "$SIM_N" \
            --baseline artifacts/reports/pearl_prime_sim_baseline.json \
            --no-fail

      - name: Rigorous system test (skip sim for speed)
        if: github.event_name != 'pull_request'
        run: |
          PYTHONPATH=. python scripts/ci/run_rigorous_system_test.py --skip-sim --strict --skip-atoms-coverage --skip-systems-test

      - name: Pipeline canary (20 books)
        if: github.event_name != 'pull_request'
        run: |
          PYTHONPATH=. python scripts/ci/run_canary_100_books.py \
            --n 20 \
            --analysis artifacts/reports/pearl_prime_sim_analysis.json \
            --combo-mode best-worst \
            --combo-limit 3

      - name: Release smoke (pre-rollback)
        if: github.event_name != 'pull_request'
        run: |
          bash scripts/release/release_smoke.sh

      - name: Rollback smoke (post-restore verification)
        if: github.event_name != 'pull_request'
        run: |
          chmod +x scripts/release/rollback_smoke.sh
          bash scripts/release/rollback_smoke.sh

      - name: Pin latest systems-test report for release evidence
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          reports = sorted(Path("artifacts/systems_test").glob("report_*.json"), key=lambda p: p.stat().st_mtime)
          target = Path("artifacts/release/latest_systems_test_report.json")
          if reports:
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(reports[-1], target)
              print(f"Pinned {reports[-1]} -> {target}")
          else:
              print("No systems-test report found to pin.")
          PY

      - name: Write workflow run manifest
        if: always()
        run: |
          PYTHONPATH=. python scripts/ci/write_workflow_run_manifest.py \
            --workflow-name "Release gates" \
            --workflow-file ".github/workflows/release-gates.yml" \
            --out artifacts/release/workflow_run_manifest.json \
            --artifact artifacts/simulation_10k.json \
            --artifact artifacts/release/latest_systems_test_report.json \
            --artifact artifacts/release/release_smoke_evidence.json \
            --artifact artifacts/release/rollback_smoke_evidence.json \
            --artifact artifacts/canary_plans/canary_summary.json \
            --artifact artifacts/canary_plans/canary_failures.json \
            --artifact artifacts/reports/pearl_prime_sim_analysis.json \
            --artifact artifacts/reports/pearl_prime_sim_analysis_SUMMARY.txt \
            --artifact artifacts/reports/bestseller_error_report.json \
            --artifact artifacts/reports/bestseller_error_report_SUMMARY.txt

      - name: Write Pearl Prime release evidence (PR)
        if: always() && github.event_name == 'pull_request'
        run: |
          PYTHONPATH=. python scripts/ci/write_pearl_prime_release_evidence.py \
            --profile pr \
            --out artifacts/release/pearl_prime_release_evidence.json

      - name: Write Pearl Prime release evidence (push/schedule/dispatch)
        if: always() && github.event_name != 'pull_request'
        run: |
          PYTHONPATH=. python scripts/ci/write_pearl_prime_release_evidence.py \
            --profile release \
            --out artifacts/release/pearl_prime_release_evidence.json

      - name: Upload release evidence
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: release-gates-evidence
          path: |
            artifacts/release/workflow_run_manifest.json
            artifacts/release/pearl_prime_release_evidence.json
            artifacts/release/latest_systems_test_report.json
            artifacts/release/release_smoke_evidence.json
            artifacts/release/rollback_smoke_evidence.json
            artifacts/simulation_10k.json
            artifacts/canary_plans/canary_summary.json
            artifacts/canary_plans/canary_failures.json
            artifacts/reports/pearl_prime_sim_analysis.json
            artifacts/reports/pearl_prime_sim_analysis_SUMMARY.txt
            artifacts/reports/bestseller_error_report.json
            artifacts/reports/bestseller_error_report_SUMMARY.txt
          if-no-files-found: ignore
