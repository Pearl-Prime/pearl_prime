name: Manga Fonts Acquire

on:
  workflow_dispatch:

jobs:
  fetch_fonts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download OFL-licensed manga fonts
        run: |
          set -euo pipefail
          mkdir -p fonts/manga/ttf
          curl -fL -o fonts/manga/ttf/Bangers-Regular.ttf \
            "https://github.com/google/fonts/raw/main/ofl/bangers/Bangers-Regular.ttf"
          curl -fL -o fonts/manga/ttf/PatrickHand-Regular.ttf \
            "https://github.com/google/fonts/raw/main/ofl/patrickhand/PatrickHand-Regular.ttf"
          curl -fL -o fonts/manga/ttf/ArchitectsDaughter-Regular.ttf \
            "https://github.com/google/fonts/raw/main/ofl/architectsdaughter/ArchitectsDaughter-Regular.ttf"
          curl -fL -o fonts/manga/ttf/NotoSansJP-Regular.otf \
            "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/Japanese/NotoSansJP-Regular.otf"
          ls -la fonts/manga/ttf/
          file fonts/manga/ttf/*

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update FONT_REGISTRY.yaml status=installed
        run: |
          python3 -m pip install -q pyyaml
          python3 scripts/manga/update_font_registry.py --mark-installed || \
            echo "Registry updater failed — continuing"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH=agent/manga-fonts-install-$(date +%Y%m%d)
          git checkout -b "$BRANCH"
          git add fonts/manga/ttf/ fonts/manga/FONT_REGISTRY.yaml
          git commit -m "feat(manga): install OFL-licensed manga fonts (OFL bundle)" \
            -m "Bangers, PatrickHand, ArchitectsDaughter + NotoSansJP. Unblocks print-grade bubbles." \
            -m "Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>" || { echo "Nothing to commit"; exit 0; }
          git push -u origin "$BRANCH"
          gh label create agent-generated --color BFD4F2 --description "Agent-opened PRs" 2>/dev/null || true
          gh pr create \
            --title "feat(manga): install OFL-licensed manga fonts" \
            --label agent-generated \
            --body "Adds OFL fonts under fonts/manga/ttf/. See fonts/manga/FONT_REGISTRY.yaml."

      - name: Summary
        if: always()
        run: echo "## Manga Fonts Acquire — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
