# Temp: generate video bank images via RunComfy
name: Generate video bank images
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic (anxiety, burnout, etc.)'
        default: 'anxiety'
      output_dir:
        description: 'Output directory'
        default: 'artifacts/video/real_assets'
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUNCOMFY_API_KEY: ${{ secrets.RUNCOMFY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate images
        run: |
          PYTHONPATH=. python3 scripts/image_generation/runcomfy_batch.py \
            --api-key "$RUNCOMFY_API_KEY" \
            --topic ${{ inputs.topic }} \
            --output ${{ inputs.output_dir }}
      - uses: actions/upload-artifact@v4
        with:
          name: video-bank-${{ inputs.topic }}
          path: ${{ inputs.output_dir }}/
