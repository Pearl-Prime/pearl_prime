# Pearl Prime Storefront V1 — HARD CTA cutover CI guard.
#
# Authority: docs/specs/PEARL_PRIME_STOREFRONT_V1_SPEC.md
#            §14.5 + §AMENDMENT-2026-06-04.3 §14 (HARD cutover)
#            Q-PRP-CTA-UNIFY-01 = HARD cutover at launch day, zero coexistence period
#
# What this guard does:
#   Scans all 7 sweep-surface categories for external paid-content CTA URL
#   patterns (Amazon, Audible, Google Play, Apple Books, Kobo, WEBTOON,
#   Honto, BookWalker, cmoa, affiliate shorteners). Any match outside the
#   curated allow-list at config/storefront/external_link_allowlist.yaml
#   fails the guard.
#
# Trigger:
#   - Every PR touching swept surfaces, CI scripts, or workflow files.
#   - Daily 09:00 UTC scheduled scan on main (catches drift from merges that
#     didn't touch swept-surface paths but still introduced an external CTA).
#   - Manual via workflow_dispatch.
#
# Gating:
#   - --fail-on-violation mode → exits 1 on any non-allowlisted match.
#   - Phase A launch milestone gated on zero violations (see §AMENDMENT-2026-06-04.4).
#
# Source of truth: scripts/ci/check_external_buy_links.py
name: Check external buy links

on:
  push:
    branches: [main, master]
    paths:
      - 'config/storefront/sku_url_map.yaml'
      - 'config/storefront/external_link_allowlist.yaml'
      - 'scripts/ci/check_external_buy_links.py'
      - '.github/workflows/check-external-buy-links.yml'
      - 'funnel/**'
      - 'brand-wizard-app/public/free/**'
      - 'brand-wizard-app/public/free_ja/**'
      - 'somatic_exercise_freebee_apps/**'
      - 'config/marketing/**'
      - 'docs/marketing/**'
      - 'scripts/marketing/**'
      - 'marketing_deep_research/**'
      - 'config/funnel/email_templates/**'
      - 'config/funnel/line_jp/**'
      - 'pearl_news/articles/**'
      - 'pearl_news/article_templates/**'
      - 'pearl_news/atoms/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'config/storefront/sku_url_map.yaml'
      - 'config/storefront/external_link_allowlist.yaml'
      - 'scripts/ci/check_external_buy_links.py'
      - '.github/workflows/check-external-buy-links.yml'
      - 'funnel/**'
      - 'brand-wizard-app/public/free/**'
      - 'brand-wizard-app/public/free_ja/**'
      - 'somatic_exercise_freebee_apps/**'
      - 'config/marketing/**'
      - 'docs/marketing/**'
      - 'scripts/marketing/**'
      - 'marketing_deep_research/**'
      - 'config/funnel/email_templates/**'
      - 'config/funnel/line_jp/**'
      - 'pearl_news/articles/**'
      - 'pearl_news/article_templates/**'
      - 'pearl_news/atoms/**'
  schedule:
    # Daily 09:00 UTC scan on main. Catches drift from merges that didn't
    # touch swept-surface paths but still introduced an external CTA.
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check-external-buy-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install -q pyyaml
      - name: Validate external_link_allowlist.yaml parses
        run: |
          python -c "import yaml; yaml.safe_load(open('config/storefront/external_link_allowlist.yaml'))"
      - name: Validate sku_url_map.yaml parses (if present)
        run: |
          if [ -f config/storefront/sku_url_map.yaml ]; then
            python -c "import yaml; yaml.safe_load(open('config/storefront/sku_url_map.yaml'))"
          fi
      - name: HARD CTA cutover guard (fail on any external paid-CTA match)
        run: |
          python3 scripts/ci/check_external_buy_links.py --fail-on-violation
      - name: Upload violation TSV artifact (when guard fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: external-buy-links-violations
          path: artifacts/qa/external_buy_links_violations_*.tsv
          if-no-files-found: ignore
          retention-days: 30
