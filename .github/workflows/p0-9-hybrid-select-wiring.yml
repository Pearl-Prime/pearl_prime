name: P0.9 — hybrid_select production wiring
# dispatch-trigger: v2  # forces trigger re-read after type:choice fix

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — plan only, no commits (pass true or false)'
        required: false
        default: 'false'

env:
  BRANCH_NAME: agent/p0-9-hybrid-select-${{ github.run_id }}

jobs:
  wire:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install anthropic 2>/dev/null || true

      - name: Configure git identity
        run: |
          git config user.name "Pearl_Dev (GitHub Actions)"
          git config user.email "actions@github.com"

      - name: Locate hybrid_select_slot_production
        run: |
          echo "## Locating hybrid_select_slot_production" >> $GITHUB_STEP_SUMMARY
          grep -rn "hybrid_select_slot_production" . --include="*.py" \
            | grep -v "__pycache__" | tee artifacts/p0-9-symbol-locations.txt
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat artifacts/p0-9-symbol-locations.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Create feature branch
        run: |
          mkdir -p artifacts
          git checkout -b ${{ env.BRANCH_NAME }}

      - name: Run Claude API wiring agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PYTHONPATH=. python3 scripts/ci/run_agent_refactor.py \
            --task p0-9-hybrid-select-wiring \
            --branch "${{ env.BRANCH_NAME }}" \
            --context-file artifacts/p0-9-symbol-locations.txt \
            --dry-run "${{ inputs.dry_run }}" \
            --requirements "$(cat <<'REQS'
hybrid_select_slot_production exists in phoenix_v4/qa/bestseller_editor.py (near line 257)
but is only called from test code. Wire it into the spine slot resolution path so it is
called in production. Steps:
1. Find all catalog/assembly call sites that currently use the non-hybrid selection path.
2. Replace them with hybrid_select_slot_production calls (or a thin adapter if signature differs).
3. Add tests that prove hybrid_select_slot_production is called during a real production run
   (not just in tests) — use monkeypatching or call-count assertions.
4. Do not break existing tests. Keep changes minimal and focused.
REQS
)" \
            2>&1 | tee artifacts/p0-9-wiring-agent.log
          echo "## Agent log (last 50 lines)" >> $GITHUB_STEP_SUMMARY
          tail -50 artifacts/p0-9-wiring-agent.log >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        if: inputs.dry_run != 'true'
        run: |
          PYTHONPATH=. python3 -m pytest tests/ -x -q \
            --timeout=120 \
            -k "hybrid_select or bestseller_editor or slot_resolution" \
            2>&1 | tee artifacts/p0-9-test-results.log || true
          tail -20 artifacts/p0-9-test-results.log >> $GITHUB_STEP_SUMMARY

      - name: Commit and push
        if: inputs.dry_run != 'true'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "AGENT_RESULT=no_changes" >> $GITHUB_ENV
          else
            git add .
            git commit -m "feat(pipeline): P0.9 wire hybrid_select into spine slot resolution [agent]

Wires hybrid_select_slot_production (phoenix_v4/qa/bestseller_editor.py)
into the production spine slot resolution path.
Adds tests proving production call path is active.

Co-Authored-By: Pearl_Dev via GitHub Actions <actions@github.com>"
            git push -u origin ${{ env.BRANCH_NAME }}
            echo "AGENT_RESULT=committed" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-9-wiring-${{ github.run_id }}
          path: artifacts/p0-9-*.{log,txt}
          retention-days: 90

      - name: Open PR
        if: env.AGENT_RESULT == 'committed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "feat(pipeline): P0.9 wire hybrid_select into spine slot resolution" \
            --body "$(cat <<'BODY'
## P0.9 — hybrid_select_slot_production Production Wiring

`hybrid_select_slot_production` existed in `phoenix_v4/qa/bestseller_editor.py` but was only
called from test code. This PR wires it into the production spine slot resolution path.

### Changes
- Identifies production call sites using non-hybrid selection
- Wires `hybrid_select_slot_production` into the production path
- Adds tests proving the production call path is active

### References
- `phoenix_v4/qa/bestseller_editor.py` ~line 257
- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

> ⚠️ **Operator review required** — do not merge without reading the diff.

🤖 Generated by Pearl_Dev via GitHub Actions. Labeled `agent-generated`.
BODY
)" \
            --label "agent-generated,p0" \
            --base main \
            --head "${{ env.BRANCH_NAME }}"
