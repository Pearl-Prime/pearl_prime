name: Validate brand registry (unified 39×14)

# Keeps the unified registry + its consumers (roster, submit endpoint) consistent.
# Spec: specs/BRAND_REGISTRY_RECONCILIATION_37x14_SPEC.md

on:
  pull_request:
    paths:
      - "config/brand_management/global_brand_registry_unified.yaml"
      - "config/brand_management/brand_admin_users.yaml"
      - "server/routes/brand_onboarding.py"
      - "scripts/brand_management/build_unified_brand_registry.py"
      - "scripts/ci/validate_brand_registry_unified.py"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - run: python3 scripts/ci/validate_brand_registry_unified.py
