name: ACT-014 — Pearl_Writer LLM Expansion Audit

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — audit only, no commits'
        required: false
        default: 'false'

env:
  BRANCH_NAME: agent/act-014-pearl-writer-audit-${{ github.run_id }}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install anthropic 2>/dev/null || true

      - name: Configure git identity
        run: |
          git config user.name "Pearl_Dev (GitHub Actions)"
          git config user.email "actions@github.com"
          mkdir -p artifacts

      - name: Extract ACT-014 scope
        run: |
          python3 -c "
import re
with open('artifacts/analysis/bestseller_action_plan.md', 'r') as f:
    content = f.read()
m = re.search(r'ACT-014.*?(?=ACT-015|##|\Z)', content, re.DOTALL)
print(m.group(0)[:3000] if m else 'ACT-014 section not found.')
" 2>&1 | tee artifacts/act-014-scope.txt
          echo "## ACT-014 Scope" >> $GITHUB_STEP_SUMMARY
          cat artifacts/act-014-scope.txt >> $GITHUB_STEP_SUMMARY

      - name: Audit Pearl_Writer LLM call sites
        run: |
          echo "### Pearl_Writer LLM call sites" | tee artifacts/act-014-llm-callsites.txt
          grep -rn "pearl_writer\|PearlWriter\|generate_prose\|llm_call\|anthropic\|openai\|model=" \
            phoenix_v4/ --include="*.py" 2>/dev/null \
            | grep -v "__pycache__" \
            | grep -v "test_" \
            | head -100 >> artifacts/act-014-llm-callsites.txt || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          head -40 artifacts/act-014-llm-callsites.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Create feature branch
        run: git checkout -b ${{ env.BRANCH_NAME }}

      - name: Run audit + implementation agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PYTHONPATH=. python3 scripts/ci/run_agent_refactor.py \
            --task act-014-pearl-writer-audit \
            --branch "${{ env.BRANCH_NAME }}" \
            --specs artifacts/analysis/bestseller_action_plan.md \
            --context-file artifacts/act-014-llm-callsites.txt \
            --dry-run "${{ inputs.dry_run }}" \
            --requirements "$(cat <<'REQS'
ACT-014: Pearl_Writer LLM Expansion Audit (see bestseller_action_plan.md §ACT-014).
Phase 1 (always): produce artifacts/act-014-expansion-audit.md listing:
  - All LLM call sites in Pearl_Writer / prose generation path
  - Current model(s) used per call site
  - Recommended model upgrades or multi-model routing (e.g. haiku for short fills,
    sonnet for chapters, opus for quality-gate rewrites)
  - Estimated cost and quality impact per recommendation
Phase 2 (implement if scope is clear): implement the highest-confidence model routing
changes. Each change must have a test showing the correct model is selected.
Output audit doc even if no code changes are made.
REQS
)" \
            2>&1 | tee artifacts/act-014-agent.log
          tail -50 artifacts/act-014-agent.log >> $GITHUB_STEP_SUMMARY

      - name: Commit push and open PR
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Audit complete — no code changes (audit doc only)." >> $GITHUB_STEP_SUMMARY
          else
            git add .
            git commit -m "feat(writing): ACT-014 Pearl_Writer LLM expansion [agent]

Audit + implementation of Pearl_Writer model routing improvements.
See artifacts/act-014-expansion-audit.md for full findings.

Co-Authored-By: Pearl_Dev via GitHub Actions <actions@github.com>"
            git push -u origin ${{ env.BRANCH_NAME }}
            gh pr create \
              --title "feat(writing): ACT-014 Pearl_Writer LLM expansion audit + routing" \
              --body "P2 sprint — ACT-014. LLM model routing audit and improvements for Pearl_Writer. See \`artifacts/analysis/bestseller_action_plan.md\` §ACT-014 and audit output in artifacts. Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

> ⚠️ Operator review required before merge.

🤖 Generated by Pearl_Dev via GitHub Actions." \
              --label "agent-generated,p2,act-014" \
              --base main --head "${{ env.BRANCH_NAME }}"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: act-014-${{ github.run_id }}
          path: artifacts/act-014-*.{log,txt,md}
          retention-days: 90
