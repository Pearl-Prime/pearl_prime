# Single-book smoke test — parameterized brand × topic × persona × format run.
# On-demand via workflow_dispatch. Useful for quickly verifying one pipeline
# configuration end-to-end without running the full ladder.
name: Single-book smoke test

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic id"
        required: true
        default: "anxiety"
      persona:
        description: "Persona id"
        required: true
        default: "gen_z_professionals"
      arc:
        description: "Arc YAML filename under config/source_of_truth/master_arcs/"
        required: true
        default: "gen_z_professionals__anxiety__overwhelm__F006.yaml"
      runtime_format:
        description: "Single runtime format"
        required: true
        default: "standard_book"
      quality_profile:
        description: "Quality profile"
        required: true
        default: "draft"

jobs:
  smoke:
    name: Single-book smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run pipeline
        run: |
          mkdir -p artifacts/smoke
          PYTHONPATH=. python3 scripts/run_pipeline.py \
            --topic "${{ inputs.topic }}" --persona "${{ inputs.persona }}" \
            --arc "config/source_of_truth/master_arcs/${{ inputs.arc }}" \
            --pipeline-mode spine --runtime-format "${{ inputs.runtime_format }}" \
            --no-job-check --render-book --render-dir artifacts/smoke \
            --out artifacts/smoke/plan.json \
            --no-generate-freebies --no-update-freebie-index \
            --quality-profile "${{ inputs.quality_profile }}" 2>&1 | tee artifacts/smoke/stdout.txt

      - name: Summarize
        if: always()
        run: |
          echo "## Smoke test: ${{ inputs.topic }} × ${{ inputs.persona }} × ${{ inputs.runtime_format }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 artifacts/smoke/stdout.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ inputs.topic }}-${{ inputs.persona }}-${{ inputs.runtime_format }}
          path: artifacts/smoke/
          retention-days: 30
