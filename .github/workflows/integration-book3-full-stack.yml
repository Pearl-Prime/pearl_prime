# Weekly full-stack Book 3 integration test (OPD-107–118 + Angle Registry v2).
# Too expensive for every PR; runs Sundays 06:00 UTC and on workflow_dispatch.
name: Integration — Book 3 full stack

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 0"

jobs:
  book3-full-stack:
    name: Book 3 full-stack integration
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run integration test
        run: make test-integration

      - name: Upload render artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: book3-full-stack-${{ github.run_id }}
          path: artifacts/integration/book3_full_stack/
          retention-days: 30
