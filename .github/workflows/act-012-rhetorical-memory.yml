name: ACT-012 — Rhetorical Memory Integration
# dispatch-trigger: v2  # forces trigger re-read after type:choice fix

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — plan only, no commits (pass true or false)'
        required: false
        default: 'false'

env:
  BRANCH_NAME: agent/act-012-rhetorical-memory-${{ github.run_id }}
  ACT_ID: ACT-012

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install anthropic 2>/dev/null || true

      - name: Configure git identity
        run: |
          git config user.name "Pearl_Dev (GitHub Actions)"
          git config user.email "actions@github.com"
          mkdir -p artifacts

      - name: Extract ACT-012 scope from action plan
        run: |
          python3 -c "
import re, sys
with open('artifacts/analysis/bestseller_action_plan.md', 'r') as f:
    content = f.read()
# Extract ACT-012 section
m = re.search(r'ACT-012.*?(?=ACT-013|##|\Z)', content, re.DOTALL)
print(m.group(0)[:3000] if m else 'ACT-012 section not found — see full action plan.')
" 2>&1 | tee artifacts/act-012-scope.txt
          echo "## ACT-012 Scope" >> $GITHUB_STEP_SUMMARY
          cat artifacts/act-012-scope.txt >> $GITHUB_STEP_SUMMARY

      - name: Create feature branch
        run: git checkout -b ${{ env.BRANCH_NAME }}

      - name: Run Claude API implementation agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PYTHONPATH=. python3 scripts/ci/run_agent_refactor.py \
            --task act-012-rhetorical-memory \
            --branch "${{ env.BRANCH_NAME }}" \
            --specs artifacts/analysis/bestseller_action_plan.md \
            --context-file artifacts/act-012-scope.txt \
            --dry-run "${{ inputs.dry_run }}" \
            --requirements "$(cat <<'REQS'
ACT-012: Rhetorical Memory Integration.
Read the ACT-012 section of artifacts/analysis/bestseller_action_plan.md for full scope.
Core goal: integrate a rhetorical memory layer so that Pearl_Writer tracks and avoids
repeating rhetorical patterns within a single book. This prevents the content repetition
that caused the deep_book_6h quality_gate REJECT.
Implementation must:
1. Track rhetorical devices (metaphors, analogies, sentence openers, structural patterns)
   used in each chapter during generation.
2. Feed that memory forward into subsequent chapter prompts so Pearl_Writer avoids
   repeating the same devices.
3. Plug into the existing pearl_writer call path without breaking current API.
4. Add unit tests for the memory accumulation logic.
5. Add integration test showing reduced repetition score on a short book mock.
REQS
)" \
            2>&1 | tee artifacts/act-012-agent.log
          tail -50 artifacts/act-012-agent.log >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        if: inputs.dry_run != 'true'
        run: |
          PYTHONPATH=. python3 -m pytest tests/ -x -q --timeout=120 \
            -k "rhetorical or memory or repetition" \
            2>&1 | tee artifacts/act-012-test-results.log || true

      - name: Commit push and open PR
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes produced." >> $GITHUB_STEP_SUMMARY
          else
            git add .
            git commit -m "feat(writing): ACT-012 rhetorical memory integration [agent]

Adds rhetorical pattern tracking to Pearl_Writer to prevent intra-book
repetition. Addresses deep_book_6h quality_gate REJECT regression.

Co-Authored-By: Pearl_Dev via GitHub Actions <actions@github.com>"
            git push -u origin ${{ env.BRANCH_NAME }}
            gh pr create \
              --title "feat(writing): ACT-012 rhetorical memory integration" \
              --body "P2 sprint — ACT-012. Adds rhetorical pattern memory to prevent intra-book repetition. See \`artifacts/analysis/bestseller_action_plan.md\` §ACT-012. Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

> ⚠️ Operator review required before merge.

🤖 Generated by Pearl_Dev via GitHub Actions." \
              --label "agent-generated,p2,act-012" \
              --base main --head "${{ env.BRANCH_NAME }}"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: act-012-${{ github.run_id }}
          path: artifacts/act-012-*.{log,txt}
          retention-days: 90
