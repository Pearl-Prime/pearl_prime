# Server CI — lint, test, and smoke-test the Phoenix Omega API server.
# Runs on PRs that touch server/ or config/server.yaml.
name: Server CI

on:
  push:
    branches: [main, master]
    paths:
      - "server/**"
      - "config/server.yaml"
      - "scripts/run_server.py"
      - "requirements-server.txt"
      - "tests/test_server*.py"
  pull_request:
    branches: [main, master]
    paths:
      - "server/**"
      - "config/server.yaml"
      - "scripts/run_server.py"
      - "requirements-server.txt"
      - "tests/test_server*.py"

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-server.txt
          pip install -r requirements-test.txt
          pip install httpx

      - name: Run server tests
        run: |
          PYTHONPATH=. python -m pytest tests/test_server_health.py -v --tb=short -x

      - name: Smoke-test server startup
        run: |
          PYTHONPATH=. timeout 10 python -c "
          from server.app import create_app
          app = create_app()
          print('Server app created successfully')
          " || true
