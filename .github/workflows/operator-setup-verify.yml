name: Operator Setup Verify

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # every 6h

jobs:
  check_setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check self-hosted runner registration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUNNERS=$(gh api /repos/${{ github.repository }}/actions/runners --jq '.runners | length')
          echo "Total registered runners: $RUNNERS"
          GPU_RUNNER=$(gh api /repos/${{ github.repository }}/actions/runners \
            --jq '.runners[] | select(.labels[].name=="pearl-star-gpu") | .status' 2>/dev/null || echo "NOT_REGISTERED")
          echo "pearl-star-gpu status: ${GPU_RUNNER:-NOT_REGISTERED}"
          echo "## Runner Status" >> $GITHUB_STEP_SUMMARY
          echo "- Total runners: $RUNNERS" >> $GITHUB_STEP_SUMMARY
          echo "- pearl-star-gpu: **${GPU_RUNNER:-NOT_REGISTERED}**" >> $GITHUB_STEP_SUMMARY
          echo "pearl_star_gpu_runner=${GPU_RUNNER:-NOT_REGISTERED}" >> $GITHUB_ENV

      - name: Check required secrets (presence only — values never logged)
        run: |
          MISSING=""
          [ -z "${{ secrets.RUNCOMFY_TOKEN }}" ]      && MISSING="$MISSING RUNCOMFY_TOKEN"
          [ -z "${{ secrets.CF_R2_ACCESS_KEY }}" ]    && MISSING="$MISSING CF_R2_ACCESS_KEY"
          [ -z "${{ secrets.CF_R2_SECRET_KEY }}" ]    && MISSING="$MISSING CF_R2_SECRET_KEY"
          [ -z "${{ secrets.GEMMA_BASE_URL }}" ]      && MISSING="$MISSING GEMMA_BASE_URL"
          [ -z "${{ secrets.QWEN_BASE_URL }}" ]       && MISSING="$MISSING QWEN_BASE_URL"
          echo "## Secrets Status" >> $GITHUB_STEP_SUMMARY
          if [ -n "$MISSING" ]; then
            echo "- **MISSING:**$MISSING" >> $GITHUB_STEP_SUMMARY
            echo "MISSING_SECRETS=$MISSING" >> $GITHUB_ENV
            exit 1
          fi
          echo "- All required secrets: **PRESENT**" >> $GITHUB_STEP_SUMMARY

      - name: Check Ollama model availability on Pearl Star
        run: |
          GEMMA_URL="${{ secrets.GEMMA_BASE_URL }}"
          QWEN_URL="${{ secrets.QWEN_BASE_URL }}"
          OLLAMA_ROOT="${GEMMA_URL%/v1}"
          echo "## Pearl Star Ollama Models" >> $GITHUB_STEP_SUMMARY
          if curl --silent --max-time 10 "${OLLAMA_ROOT}/api/tags" | python3 -c "
import sys, json
data = json.load(sys.stdin)
models = [m['name'] for m in data.get('models', [])]
has_gemma = any('gemma' in m.lower() for m in models)
has_qwen  = any('qwen' in m.lower() for m in models)
print('gemma:', has_gemma, '| qwen:', has_qwen)
ok = has_gemma and has_qwen
sys.exit(0 if ok else 1)
" 2>&1; then
            echo "- Gemma + Qwen: **PRESENT**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Ollama unreachable or models missing — ensure Pearl Star is running gemma2:9b and qwen2.5:14b" >> $GITHUB_STEP_SUMMARY
            echo "MISSING_SECRETS=${MISSING_SECRETS:-} OLLAMA_MODELS" >> $GITHUB_ENV
          fi

      - name: Summarise readiness
        if: success()
        run: |
          echo "## Setup Status: ALL CLEAR" >> $GITHUB_STEP_SUMMARY
          echo "Runner and secrets verified. Pipeline workflows can run unattended." >> $GITHUB_STEP_SUMMARY

      - name: Open issue if setup incomplete
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="**pearl-star-gpu runner or required secrets missing.**\n\n"
          BODY+="Runner: ${pearl_star_gpu_runner:-unknown}\n"
          BODY+="Missing secrets: ${MISSING_SECRETS:-none detected but step failed}\n\n"
          BODY+="See workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n"
          BODY+="**Action required:** Follow docs/GITHUB_ACTIONS_BACKGROUND_AGENTS.md."
          # Avoid duplicate open issues for the same day
          EXISTING=$(gh issue list --label operator-action-required --state open \
            --search "Operator setup incomplete" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "Operator setup incomplete — $(date -u +%Y-%m-%d)" \
              --body "$(printf '%b' "$BODY")" \
              --label operator-action-required
          else
            echo "Open issue #$EXISTING already exists — skipping duplicate."
          fi
