# Production weekly manga lane. Cron Monday 14:00 UTC (~6am PT) + manual dry_run.
name: Weekly Manga Rollout

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true | false — dry run (no R2 upload; placeholders only)'
        required: false
        default: 'false'

jobs:
  wait_runner:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Wait up to 30m for pearl-star-gpu
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MAX_WAIT_S: '1800'
          INTERVAL_S: '30'
        run: python3 scripts/ci/wait_for_self_hosted_runner.py

  manga_rollout:
    needs: [wait_runner]
    runs-on: [self-hosted, pearl-star-gpu]
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Load operator env (optional)
        continue-on-error: true
        run: |
          if [ -f "$HOME/.config/pearl-star/operator.env" ]; then
            set -a && . "$HOME/.config/pearl-star/operator.env" && set +a
          fi

      - name: Mask secrets
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RUNCOMFY_TOKEN: ${{ secrets.RUNCOMFY_TOKEN }}
        run: |
          set -euo pipefail
          for x in "$R2_ACCESS_KEY_ID" "$R2_SECRET_ACCESS_KEY" "$R2_ACCOUNT_ID" "$CF_R2_ACCESS_KEY" "$CF_R2_SECRET_KEY" "$SENDGRID_API_KEY" "$RUNCOMFY_TOKEN"; do
            if [ -n "$x" ]; then echo "::add-mask::$x"; fi
          done

      - name: Run weekly rollout
        env:
          PYTHONPATH: .
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CF_R2_ACCESS_KEY: ${{ secrets.CF_R2_ACCESS_KEY }}
          CF_R2_SECRET_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RUNCOMFY_TOKEN: ${{ secrets.RUNCOMFY_TOKEN }}
          WEEKLY_ROLLOUT_OPERATOR_EMAIL: ${{ vars.WEEKLY_ROLLOUT_OPERATOR_EMAIL }}
        run: |
          set -euo pipefail
          FLAGS=""
          DRY="${{ github.event.inputs.dry_run }}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY" = "true" ]; then
            FLAGS="--dry-run"
          fi
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            FLAGS=""
          fi
          python3 scripts/weekly_manga_rollout.py $FLAGS 2>&1 | tee rollout.log

      - name: Upload run log + digest draft
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-manga-rollout-${{ github.run_id }}
          path: |
            rollout.log
            artifacts/weekly_digests/
            artifacts/weekly_manga_runs/
          retention-days: 90
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "## Weekly Manga Rollout — Run ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          tail -50 rollout.log >> "$GITHUB_STEP_SUMMARY" || true
