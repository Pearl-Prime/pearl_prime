name: Manga Rollout Failure Notify

on:
  workflow_run:
    workflows: ['Weekly Manga Rollout']
    types: [completed]

jobs:
  notify_on_failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Record failure summary
        run: |
          set -euo pipefail
          mkdir -p notify_out
          {
            echo "Weekly Manga Rollout FAILED"
            echo "run_id=${{ github.event.workflow_run.id }}"
            echo "url=${{ github.event.workflow_run.html_url }}"
          } | tee notify_out/summary.txt
          echo "## Weekly Manga Rollout failure" >> "$GITHUB_STEP_SUMMARY"
          cat notify_out/summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Optional email (SendGrid)
        continue-on-error: true
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          WEEKLY_ROLLOUT_OPERATOR_EMAIL: ${{ vars.WEEKLY_ROLLOUT_OPERATOR_EMAIL }}
        run: |
          if [ -n "${SENDGRID_API_KEY:-}" ]; then echo "::add-mask::$SENDGRID_API_KEY"; fi
          if [ -z "${SENDGRID_API_KEY:-}" ] || [ -z "${WEEKLY_ROLLOUT_OPERATOR_EMAIL:-}" ]; then
            echo "Skipping email (missing SENDGRID_API_KEY or WEEKLY_ROLLOUT_OPERATOR_EMAIL)"
            exit 0
          fi
          curl -sfS -X POST https://api.sendgrid.com/v3/mail/send \
            -H "Authorization: Bearer $SENDGRID_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"personalizations\":[{\"to\":[{\"email\":\"${WEEKLY_ROLLOUT_OPERATOR_EMAIL}\"}]}],\"from\":{\"email\":\"noreply@phoenix-omega.local\",\"name\":\"Phoenix Manga\"},\"subject\":\"Weekly Manga Rollout failed\",\"content\":[{\"type\":\"text/plain\",\"value\":\"Run ${{ github.event.workflow_run.id }} — ${{ github.event.workflow_run.html_url }}\"}]}"

      - name: Open escalation issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create operator-action-required --color D93F0B --description "Ops" 2>/dev/null || true
          ISSUE_BODY="Workflow run failed: ${{ github.event.workflow_run.html_url }} — inspect rollout artifacts; re-run with dry_run or fix secrets/runner."
          gh issue create \
            --label operator-action-required \
            --title "Weekly Manga Rollout failed (${{ github.event.workflow_run.id }})" \
            --body "$ISSUE_BODY"

      - name: Upload notify bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manga-rollout-notify-${{ github.run_id }}
          path: notify_out/
          if-no-files-found: ignore
          retention-days: 14
