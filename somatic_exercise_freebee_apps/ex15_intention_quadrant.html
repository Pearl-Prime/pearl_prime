<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intention Breath — Four Quadrants</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Karla:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--q1:#6AADCF;--q2:#CFB86A;--q3:#6ACF8F;--q4:#CF6A8F;--bg:#0A0C14;--text:#DDD7CC;--muted:#585450}
  body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;user-select:none}
  .wrap{z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.2rem;max-width:440px;padding:1.5rem 1rem;width:100%}
  h1{font-family:'Marcellus',serif;font-size:1.8rem;letter-spacing:.04em}
  .sub{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
  .quad{border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:.8rem;min-height:110px;display:flex;flex-direction:column;gap:.4rem;transition:all .5s;background:rgba(255,255,255,.02)}
  .quad.active{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.04)}
  .quad-title{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;opacity:.6}
  .quad input{background:none;border:none;border-bottom:1px solid rgba(255,255,255,.1);color:var(--text);font-family:'Karla',sans-serif;font-size:.85rem;padding:.3rem 0;outline:none;width:100%}
  .quad input::placeholder{color:rgba(255,255,255,.15)}
  .quad input:focus{border-color:rgba(255,255,255,.3)}
  .quad-icon{font-size:1.2rem;opacity:.4}
  .breath-bar{width:100%;display:flex;align-items:center;gap:1rem;padding:.6rem 1rem;border-radius:8px;background:rgba(255,255,255,.02)}
  .orb{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);transition:transform 5s ease-in-out,background .5s;flex-shrink:0}
  .orb.expand{transform:scale(1.8)}
  .bl{font-size:.8rem;color:var(--muted);flex:1}
  .pc{font-size:1.2rem;font-weight:300;opacity:.7}
  .bar{width:100%;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
  .bf{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,var(--q1),var(--q4))}
  .info-row{display:flex;gap:2rem;font-size:.78rem;color:var(--muted)}
  .info-row strong{color:var(--text);font-weight:500}
  .controls{display:flex;gap:1rem}
  .btn{font-family:'Karla',sans-serif;padding:.5rem 1.4rem;border:1px solid rgba(255,255,255,.1);border-radius:100px;background:rgba(255,255,255,.03);color:var(--text);font-size:.78rem;cursor:pointer;transition:all .3s}
  .btn:hover{background:rgba(255,255,255,.08)}
  .btn.pri{background:rgba(106,173,207,.15);border-color:rgba(106,173,207,.3)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Intention Breath</h1>
  <p class="sub">Set an intention for each quadrant · breathe with it</p>
  <div class="grid">
    <div class="quad" id="q0" style="border-color:rgba(106,173,207,.15)">
      <div class="quad-icon">🌊</div>
      <div class="quad-title" style="color:var(--q1)">Release</div>
      <input placeholder="What do I release?" id="i0">
    </div>
    <div class="quad" id="q1" style="border-color:rgba(207,184,106,.15)">
      <div class="quad-icon">☀️</div>
      <div class="quad-title" style="color:var(--q2)">Invite</div>
      <input placeholder="What do I invite in?" id="i1">
    </div>
    <div class="quad" id="q2" style="border-color:rgba(106,207,143,.15)">
      <div class="quad-icon">🌱</div>
      <div class="quad-title" style="color:var(--q3)">Grow</div>
      <input placeholder="What am I growing?" id="i2">
    </div>
    <div class="quad" id="q3" style="border-color:rgba(207,106,143,.15)">
      <div class="quad-icon">❤️</div>
      <div class="quad-title" style="color:var(--q4)">Gratitude</div>
      <input placeholder="What am I grateful for?" id="i3">
    </div>
  </div>
  <div class="breath-bar">
    <div class="orb" id="orb"></div>
    <span class="bl" id="bl">Press Begin to start</span>
    <span class="pc" id="pc"></span>
  </div>
  <div class="bar"><div class="bf" id="bf"></div></div>
  <div class="info-row">
    <span>Quadrant <strong id="qn">—</strong></span>
    <span>Remaining <strong id="rem">4:00</strong></span>
  </div>
  <div class="controls">
    <button class="btn pri" id="sb" onclick="toggle()">Begin</button>
    <button class="btn" onclick="doReset()">Reset</button>
  </div>
</div>
<script>
const QS=['Release','Invite','Grow','Gratitude'];
const COLORS=['var(--q1)','var(--q2)','var(--q3)','var(--q4)'];
const INH=5,EXH=5,CYCLE=10,SESSION=240,QUAD_DUR=60;
let running=false,paused=false,t=0,total=0,lastTs=0,lastP='',lastQ=-1,aCtx=null;
function audio(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx}
function tone(f,d=.2){try{const x=audio(),o=x.createOscillator(),g=x.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,x.currentTime);g.gain.linearRampToValueAtTime(.06,x.currentTime+.04);g.gain.exponentialRampToValueAtTime(.001,x.currentTime+d);o.connect(g);g.connect(x.destination);o.start();o.stop(x.currentTime+d)}catch(e){}}
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

function tick(ts){
  if(!running||paused)return;
  if(!lastTs)lastTs=ts;const dt=(ts-lastTs)/1000;lastTs=ts;t+=dt;total+=dt;
  if(total>=SESSION){end();return}
  const q=Math.min(Math.floor(total/QUAD_DUR),3);
  if(q!==lastQ){
    for(let i=0;i<4;i++){document.getElementById('q'+i).classList.toggle('active',i===q)}
    document.getElementById('qn').textContent=QS[q];
    tone(350+q*50);lastQ=q;
  }
  const ct=t%CYCLE;const isIn=ct<INH;
  const orb=document.getElementById('orb');
  const cur=isIn?'in':'out';
  if(cur!==lastP){
    orb.classList.toggle('expand',isIn);
    orb.style.background=isIn?'rgba(255,255,255,.12)':'rgba(255,255,255,.05)';
    lastP=cur;
  }
  const val=document.getElementById('i'+q).value||QS[q];
  document.getElementById('bl').textContent=isIn?'Inhale — '+val:'Exhale — '+val;
  document.getElementById('pc').textContent=Math.ceil(isIn?INH-ct:EXH-(ct-INH));
  document.getElementById('bf').style.width=(total/SESSION*100)+'%';
  document.getElementById('rem').textContent=fmt(Math.max(0,SESSION-total));
  requestAnimationFrame(tick);
}

function toggle(){
  const b=document.getElementById('sb');
  if(!running){running=true;paused=false;t=0;total=0;lastTs=0;lastP='';lastQ=-1;
    b.textContent='Pause';requestAnimationFrame(tick);
  }else if(!paused){paused=true;lastTs=0;b.textContent='Resume'}
  else{paused=false;lastTs=0;b.textContent='Pause';requestAnimationFrame(tick)}
}
function doReset(){
  running=false;paused=false;t=0;total=0;lastTs=0;lastP='';lastQ=-1;
  document.getElementById('sb').textContent='Begin';document.getElementById('qn').textContent='—';
  document.getElementById('rem').textContent=fmt(SESSION);document.getElementById('bl').textContent='Press Begin to start';
  document.getElementById('pc').textContent='';document.getElementById('bf').style.width='0';
  document.getElementById('orb').classList.remove('expand');
  for(let i=0;i<4;i++)document.getElementById('q'+i).classList.remove('active');
}
function end(){running=false;document.getElementById('sb').textContent='Begin';document.getElementById('bl').textContent='Intentions set ✦';document.getElementById('pc').textContent='';tone(528,.8)}
</script>
</body>
</html>
