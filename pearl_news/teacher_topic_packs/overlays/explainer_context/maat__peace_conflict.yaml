      - id: ex_headline_peace_conflict_02
        line: "Ma'at teaches that peace is not silence. It is accurate accounting and qalb (heart) healing. A South Indian Sufi teacher names what young peacebuilders are already doing."
        metadata:
          article_types: ["explainer_context"]

# youth_implications when strict control is desired (deterministic).
youth_implications:
  options:
    - id: ex_youth_impl_peace_01
      line: "For Gen Z and younger living in conflict-aware or post-conflict worlds, the explainer is not only background. It is permission to trust your insistence that the record matters—that peace without truth is not the same as right order, and that documentation and honest witness are not obstacles to peace but requirements for it."
      metadata:
        article_types: ["explainer_context"]
        semantic_family: "youth-record-matters"
    - id: ex_youth_impl_peace_02
      line: "The explainer shows that when institutions ask young people to 'heal' or 'move on' without addressing what happened, they are not offering the same standard the Ma'at tradition names. Your qalb (heart) that knows the gap—between what is said and what you know—is reading the situation accurately."
      metadata:
        article_types: ["explainer_context"]
        semantic_family: "youth-body-truth"
