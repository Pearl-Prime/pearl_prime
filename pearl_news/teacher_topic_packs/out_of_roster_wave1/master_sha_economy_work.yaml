teacher_intro:
  options:
    - id: master_sha_econ_intro_01
      line: "Master Sha, a Tao Source and Soulfulness teacher for decades, has watched young people carry work instability as if it were a verdict on character. They are not asking only how to work harder. They are asking how to stop turning volatility into a blockage that blocks the flow of self-worth. In the Tao Source framework, that blockage can be met with greatest compassion for the self — and cleared so dignity is not determined by the schedule app."
      metadata:
        semantic_family: identity_seen_shift
        tone: plain
        intensity: 3
        article_types: ["hard_news_spiritual_response", "commentary"]

