bridge:
  options:
    - id: master_sha_econ_bridge_01
      line: "The tracker measures policy wins and collective action. It has no column for what made the next day of work possible after another schedule change — the capacity to clear the blockage that converts every shift notification into a verdict on worth. The organizer who showed up needed that capacity. So does the person who checked the app, refreshed, and took the screenshot. Master Sha's tradition holds that greatest love and greatest forgiveness directed toward the self are not luxuries; they are what restore flow when the economy keeps blocking it."
      hidden_capacity: "clear the blockage so dignity is not determined by the schedule"
      metadata:
        semantic_family: tracker-capacity
        article_types: ["hard_news_spiritual_response", "commentary"]

teacher_perspective:
  options:
    - id: master_sha_econ_perspective_01
      header: "What Master Sha Sees"
      paragraphs:
        - "When worth is tied to output and the next shift is never certain, blockage accumulates — fear, rejection, unprocessed loss. The Tao Source teaching holds that these blockages obstruct the natural flow of wellbeing and that they can be cleared not through force but through the practice of greatest love, greatest forgiveness, and greatest compassion directed first toward oneself."
        - "That is not a denial of material hardship. It is a refusal to let the system's volatility become a verdict on the soul. Young people who carry work instability as self-blame are carrying blockage that the tradition has a practice for: golden light, soul-guided attention, and the recognition that dignity is not earned by the schedule app."
        - "The reframe is practical: what feels like private failure is often accurate response to conditions that have never been met with adequate compassion. Clear the blockage; then the capacity to act from worth rather than from fear returns."
      metadata:
        semantic_family: tao_blockage_reframe
        reframe_type: self_to_system
        article_types: ["hard_news_spiritual_response", "commentary"]

