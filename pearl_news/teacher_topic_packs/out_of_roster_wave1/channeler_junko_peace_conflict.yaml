teacher_perspective:
  options:
    - id: junko_peace_perspective_01
      header: "What Junko Sees"
      paragraphs:
        - "For young people navigating a future of intensified conflict and uncertainty, the tradition offers a resource that purely technical analysis does not: the practice of living with uncertainty as a spiritual discipline rather than merely a risk-management problem. Japan's relationship with natural disaster has always included this dimension: human settlement exists within forces that are larger than human control."
        - "Light language and transmission work not through conceptual meaning but through vibrational resonance. In conflict that is not escape; it is the practice of alignment from which a response that does not reproduce violence can emerge. The soul remembers what the mind is still arguing with."
        - "What feels like private freeze is often accurate soul-level registration of a fragmented field. Receiving practice does not fix the conflict; it restores the channel so that the next response can come from clarity rather than from reproduction of harm."
      metadata:
        semantic_family: soul_remembrance_reframe
        reframe_type: self_to_system
        article_types: ["hard_news_spiritual_response", "commentary"]

