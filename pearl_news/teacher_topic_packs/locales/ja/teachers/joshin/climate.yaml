hook_personal:
  options:
  - id: hook_personal_01
    line: 地球への関心はこれまで以上に強い。それでも次の数字に十分長く向き合い、何をすべきか決められる感覚は、持ちにくくなっている。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: ある世代は情報に通じ、道徳的にも真剣でありながら、更新のたびに「制度が待ちすぎた」という証拠として届くたびに、日々の実効力を失いかねない。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei（真言密教系の真言の教師）は、実践の場で気候ニュースが若者に何をもたらすかを見てきました。学生は「どう穏やかに感じればいいか」とは聞きません。「大人が長く待ちすぎたという証拠が次々と届くなかで、身・口・意をそろえて行動できる状態をどう保つか」と聞いています。
  - id: teacher_intro_02
    line: Joshin Sensei（真言仏教の教師）は、実践で気候の恐れがまず道徳的な真剣さとして、ついで注意の散逸として現れる様子を見てきました。若者は危機が現実かどうかは問いません。「更新のたびに引き裂かれるなかで、身・口・意をひとつの所作にもどすにはどうするか」と問いています。
youth_somatic:
  options:
  - id: climate_threshold_phone_01
    line: 'グループチャットで更新を読みます。胸が締め付けられます。アプリを閉じます。また開きます。見ないからといって数字が真実でなくなるわけではないからです。

      LOOP_SEQUENCE: "更新を読む。胸が締まる。アプリを閉じる。また開く。"'
  - id: climate_threshold_phone_02
    line: '授業の前に新たなしきい値を見ます。のどが締まります。スマートフォンを伏せます。また手に取ります。未来が「準備ができるまで」とは待ってはくれないからです。

      LOOP_SEQUENCE: "しきい値を見る。のどが締まる。伏せる。また手に取る。"'
teacher_witness:
  options:
  - id: mirrored_loop_01
    line: Joshin Senseiは今年、学生のなかにこの一連の動き──読む、締まる、閉じる、戻る──をそのまま見てきました。
  - id: mirrored_loop_02
    line: 若者のなかでその順序が繰り返されるのを見てきました。数字が届き、身体が縮み、スマホが伏せられ、それでも心は戻ります。現実はそこにあるからです。
turnaround:
  options:
  - id: youth_action_climate_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 学生と若者の連帯は仲間を訓練し、運動を組み、公的目標と実生活のギャップに当局が答えざるを得ない状況をつくっています。
  - id: youth_action_climate_02
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 若い組織者は訴訟を起こし、研修を開き、地域の損失を記録し続けています。国政が熱のスピードに追いつかないときも。
bridge:
  options:
  - id: tracker_capacity_01
    line: 2,666 cases. 51 jurisdictions. トラッカーは若者が何をしたかを測ります。前回の遅れのあと、次の申し立てを可能にしたもの──制度が応答し続けないなかでも「身・口・意をそろえて再び行動できる」容量──の欄はありません。次の案件を起こした組織者にはそれが要りました。更新を読み、アプリを閉じ、また開いた人にも要ります。Joshin Senseiの真言の伝統は、そのそろえ方を千年以上かけて育んできました。
  - id: tracker_capacity_02
    line: 気候のトラッカーは案件、目標、しきい値を数えます。若者が真実と接したまま、制度のまた遅れのあとでも「再び行動する」力を保てる内面の容量は数えません。次の組織者にはそれが要ります。アプリを開き直した読者にも要ります。Joshin Senseiの伝統はそれを三密（Sanmitsu）と呼び、この身体、いま、利用できます。
teacher_perspective:
  options:
  - id: sokushin_sanmitsu_01
    header: Joshin Senseiが見ていること
    paragraphs:
    - '真言には、この種の圧力を指す正確な枠組みがあります。即身成仏（Sokushin Jobutsu）──このいまの身体そのものでの仏性です。気候の更新を読む身体は故障しているのではありません。安心と現実の不一致を正確に察知しているのです。伝統は、この身体を離れて平安を求めません。この身体を明晰さと行動の場にすると教えます。'
    - 'Joshinはそれを三密（Sanmitsu）と結びつけます。身（印契）、口（真言）、意（観想）を同時にそろえる三つの密です。気候ニュースが注意を散らすとき、実践は「考え抜く」ことではありません。三つをひとつの所作にもどすことです。その再そろえが、次の行動を可能にします。'
    - 'ここでの転換が重要です。「自分が壊れている、間違っている」という私的な欠陥に感じることが、しばしば遅延に形づくられた制度・構造への正確な反応です。心は、本当の乱れが外にあると見えたとき、自分を壊れ物と呼ぶのをやめ、身体は秩序が戻る最初の場所になります。'
  - id: sokushin_sanmitsu_02
    header: Joshin Senseiが見ていること
    paragraphs:
    - Joshin Senseiは気候のパニックを理具の成仏（Rigu no Jobutsu）──本具の覚りの価値──として読みます。あなたが感じる切迫は誤信号ではありません。そこに常にあった明晰さが危険に応答しているのです。
    - そこから三密へ向かいます。問いは「一日中どう穏やかに感じるか」ではありません。次の更新が届いた瞬間に身・口・意をそろえ、注意が無力な反復に飲まれないようにするか、という問いです。
    - その枠組みでは自己責めが和らぎます。若者が気にしすぎるのでも、自分が感じることが間違いでもありません。問題は、制度・構造が耐えがたい遅延を個人の神経系に外注し続けていることです。真言は、この身体のなかで線を保つ方法を与えます。
practice:
  options:
  - id: sanmitsu_01
    display_name: 三密のそろえ
    announcement_line: Joshin Senseiは、気候の情報が身・口・意を散らし続ける瞬間のため、5分間の三密のそらえを教えています。サイドバーに、時間どおり手順付きで載せています。
    relief_lines:
    - 心は、更新のたびに「行動は無意味だ」と証明するのをやめます。
    - 身・口・意がひとつの所作にもどり、再び行動できる容量が戻ります。
  - id: sanmitsu_02
    display_name: 三密のそろえ
    announcement_line: Joshin Senseiは、気候の数字がシャットダウンに変わる瞬間のため、5分間の三密のそらえを教えています。サイドバーにあり、授業の前、スクロールのあと、次の会議の前など短時間で使えます。
    relief_lines:
    - 身体は、更新のたびに全面崩壊へ変換するのをやめます。
    - 次の具体的な行動に足るほどのそろえが戻ります。
sdg:
  primary:
    title: 気候変動に具体的な対策を
    line: 国連はSDG 13とその気候教育・レジリエンスの目標を通じて、まさにこのギャップへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: youngo_01
    line: 'The Climate Reality ProjectとYOUNGOは、ともに若者向けの入口を運営しています。入口: https://youngoclimate.org'
  - id: una_usa_01
    line: 次の一歩がそちらでない場合、UNA-USAは同じ枠組みを地域から地球規模まで扱います。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
    - id: threshold_warning_01
      line: 1.55°Cは、もはや「警告」の段階ではない。
  headline_layer_2:
    options:
    - id: shingon_attention_01
      line: Joshin Senseiは、気候ストレスがZ世代の注意に何をしているか──そしてこの身体に何ができるか──を名指します。
    - id: shingon_alignment_01
      line: Joshin Senseiは、気候の苦しみを身・口・意をそらえる呼びかけとして読み、弱さの証明とはしません。
