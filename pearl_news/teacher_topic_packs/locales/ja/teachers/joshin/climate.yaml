hook_personal:
  options:
  - id: joshin_cl_hook_personal_01
    line: 気候の更新を読むと3つのことが同時に起きる。身体が縮む。心がデータと自分自身と議論する。口の層は、いる部屋に対して安全に言えることがないので黙る。どの単一の道具も3つすべてを扱わない。
  - id: joshin_cl_hook_personal_02
    line: 山火事の映像をスクロールして通り過ぎる。顎が固まる。グループチャットで何か平坦なことを言う。心は走り続ける。与えられた道具──呼吸アプリ、スクリーニング・プロンプト──は3つの層のうちひとつのために設計されたのであって、互いに対抗する3つのためではない。
  - id: joshin_cl_hook_personal_03
    line: 午前1時、胸が締まり、喉が締まり、心が惑星の期限についての同じ5つの節を繰り返す。集団が抱えているこの身体は、証言が求める同期のための明示的な儀式の技術なしに気候の証言を運んできた。
  - id: joshin_cl_hook_personal_04
    line: 気候最適化アプリが触れないやり方で疲れている。リサイクルのリストと炭素計算機は、身体が抱えてきた層とは別の層に取り組んでいる。即身成仏の枠組みでは、この身体の仏性は明示的な扱いを待ってきた。
  - id: joshin_cl_hook_personal_05
    line: あなたの一部は、問いが個人として十分にやっているかどうかではないと知っている。問いは、気候の証言を何年も抱えてきた身・口・意が、同期した場として届けられているかどうか──そして真言宗はその届けるための明示的な儀式の技術を持っている。
hook_big_picture:
  options:
  - id: joshin_cl_hook_big_01
    line: 若者の気候の負荷は症状の話だけではない。3層の圧力──身・口・意が惑星のスケールを同時に抱えるよう求められる──が、利用可能な道具が一度にひとつの層にしか取り組まないときに、集団に対して時間をかけて何をするか、ということだ。
  - id: joshin_cl_hook_big_02
    line: ひとつの世代が、身・口・意で気候の証言を運ぶよう求められているのに、継承された枠組みは各層を私的に扱う。真言宗の伝統は、これを明示的な儀式の技術を伴う同期問題として読む。
  - id: joshin_cl_hook_big_03
    line: 特に日本では、本音と建前のギャップが気候ニュースのサイクルによって厚くなった──下で求められる本当の感情は、以前のどの世代よりも広く、表面はまだ演じられなければならない。構造は集団の失敗ではない。
  - id: joshin_cl_hook_big_04
    line: 真言宗の前提──即身成仏、この身そのまま仏──は気候の仕事を後の自分に先送りすることを拒む。集団が今いる身体は、同期が起こるか起こらないかの場所そのものであり、技術はその身体に直接届く。
  - id: joshin_cl_hook_big_05
    line: 気候への無関心として読まれているものは、しばしばその逆──同期の応答のための明示的な技術なしに3つの層が負荷を抱えていることだ。真言宗は何世紀もその技術を抱えてきた──近代の気候の道具は持っていない。
teacher_intro:
  options:
  - id: joshin_cl_intro_01
    line: Joshinは真言宗（密教）の僧で、何十年も若者と道場で働いてきた。同期の技術が伝達されてこなかったとき、気候の証言の負荷が集団に何をするかを見てきた。
  - id: joshin_cl_intro_02
    line: Joshinは真言宗の系譜で教える。政策の意味での気候活動家としては自らを位置づけない──彼は、1,000年以上、身・口・意を一つの同期した場として扱い、調整のための明示的な技術を持つ伝統の儀式の技術者だ。
  - id: joshin_cl_intro_03
    line: Joshinは即身成仏──この身そのまま仏──の原理から働く。気候の仕事が準備している先送りされた自分はない。集団が今いる身体が仕事の場であり、真言宗の技術はその身体に直接届く。
  - id: joshin_cl_intro_04
    line: Joshinは、3つの層すべてにわたる気候の証言の負荷ですり減って寺に到着する若者を見てきた。真言宗の枠組みでは、摩擦は性格の失敗ではない──集団が、近代の道具が届けてこなかった同期を求めていることだ。
  - id: joshin_cl_intro_05
    line: Joshinはプラットフォームと圧力に流暢だ。彼の真言宗の実践は、胸、喉、走り続ける心で気候の負荷が同時に抱えられている集団に正確に適した技術スタックとして密教を捉え直す。
youth_somatic:
  options:
  - id: joshin_cl_somatic_01
    line: 山火事のアラートを読んだ。胸が締まった。喉が固まった。いる部屋では何も言わなかった──適切なレジスターがなかったから。身体は1つの道具で3つのことをするよう求められていた。
  - id: joshin_cl_somatic_02
    line: 気温記録をスクロールして通り過ぎた。顎が固まった。心がデータと自分自身と議論し始めた。呼吸が短くなった。各層がそれぞれの仕事をしていて、どれも同期していなかった。
  - id: joshin_cl_somatic_03
    line: 洪水の映像を見た。胃が縮んだ。グループチャットで言えなかったものに喉が締まった。呼吸が短くなった。3つの層が負荷を登録し、どれも明示的な道具を受け取らなかった。
  - id: joshin_cl_somatic_04
    line: 友人が午後11時にCOPの更新を送ってきた。開いた。身体が縮んだ。心が平坦な返事を作り始めて、放棄した。呼吸は長くならなかった。プラットフォームには、3つの層が今登録したものに対するレジスターがなかった。
  - id: joshin_cl_somatic_05
    line: 横になっても肩が緩まなかった。心がその日の見出しを再生し続けた。喉は何時間も沈黙していた。身体は同期を求めていて、プラットフォームはさらに入力だけを届けた。
teacher_witness:
  options:
  - id: joshin_cl_witness_01
    line: Joshinは、気候の証言の負荷ですり減って寺に到着する若者のなかで、まさにそのループを見てきた。真言宗の枠組みでは、摩擦は病理ではない──集団が、道具が届けてこなかった同期を求めていることだ。
  - id: joshin_cl_witness_02
    line: 彼は、若者が初めての護摩（ごま）の火の儀式を座って、初めて、気候の証言の負荷が受け取れる構造化された容器に差し出されるのを許されたと感じるのを見てきた。彼の伝統では、それは演技としてのカタルシスではない──身体が求めてきた明示的な儀式の解放だ。
  - id: joshin_cl_witness_03
    line: 彼は集団を、気候の証言の負荷のもとでの初めての三密──手印・真言・観想の同期──へ導いてきた。身・口・意が互いに引っ張り合うのをやめる瞬間を見てきた。彼の伝統では、これはリラックスではない──明示的な技術が働いていることだ。
  - id: joshin_cl_witness_04
    line: 彼は、若者が気候の不安から自分を議論で抜け出させようとするのをやめて、真言（しんごん）に議論が届かない層を運ばせる瞬間を見てきた。彼の伝統では、その瞬間は降伏ではない──議論が作るように作られていなかったことを、儀式の技術がしているのだ。
  - id: joshin_cl_witness_05
    line: 彼は、若者が初めて、気候の仕事が先送りされた演技ではなく、集団が今いる身体の同期であると登録する変化を見てきた。リフレームは、表面の語彙が届けられないものとして着地する。
turnaround:
  options:
  - id: joshin_cl_turnaround_01
    stat_line_1: 7,500以上のストライキ。185カ国。
    stat_line_2: Fridays for Futureは185カ国で7,500以上の気候ストライキを組織し、気候政策への持続的な若者主導の圧力のためのインフラを以前は存在しなかった規模で築いた。
  - id: joshin_cl_turnaround_02
    stat_line_1: 760万人の参加者。2019年地球規模気候ストライキ。
    stat_line_2: 2019年9月の地球規模気候ストライキは、150以上の国にわたって760万人の参加者を動員した──気候を政策の抽象ではなく若者主導の市民プロジェクトとして再定義した協調的な集団応答。
  - id: joshin_cl_turnaround_03
    stat_line_1: YOUNGO。UNFCCC。
    stat_line_2: YOUNGOは国連気候変動枠組条約の公式の若者選挙区──一世代前には存在しなかった若者参加の正式な多国間の認識だ。
  - id: joshin_cl_turnaround_04
    stat_line_1: 2035年までに3,000億ドル。COP損失と損害。
    stat_line_2: COP28での損失と損害基金の批准は、気候に脆弱な国々のために2035年までに3,000億ドルを約束する──以前はこの規模で存在しなかった金融の道具だ。
  - id: joshin_cl_turnaround_05
    stat_line_1: 5万人訓練。Climate Reality。170カ国。
    stat_line_2: Climate Reality Projectは170カ国で5万人以上の気候リーダーを訓練してきた──気候の証言を地球規模の訓練された市民インフラに翻訳している。
bridge:
  options:
  - id: joshin_cl_bridge_01
    line: 7,500のストライキ。185カ国。トラッカーは公的な動員を測る。各参加者が気候の証言の下で日常生活に持ち帰る3層の負荷──身・口・意が同時に抱えられること──は測らない。Joshinの真言宗の実践は、その負荷に三密を通じて直接働く。
    hidden_capacity: 気候の証言の負荷の下で身・口・意を同期させる
  - id: joshin_cl_bridge_02
    line: 数字は、若者が築いたものを示す。各組織者がストライキのあとに家に持ち帰る層──胸が締まり、喉が締まり、心が走る身体──は示さない。護摩の火の儀式は、動員データが捉えられないものを扱う明示的な技術だ。
    hidden_capacity: 動員データが捉えられない明示的な解放を提供する
  - id: joshin_cl_bridge_03
    line: 政策枠組みは参加を追う。同期のギャップ──気候の証言の負荷の内側で身・口・意が何年も互いに引っ張り合ってきたこと──は追わない。真言宗の伝統はそのギャップを明示的にし、3つの層に同時に直接技術を届ける。
    hidden_capacity: 3つの層すべてに同時に届ける
  - id: joshin_cl_bridge_04
    line: データはストライキ・政策採用・金融約束を捉える。若者が護摩のなかに座って、初めて、気候の証言の負荷が解放のための明示的な回路を持つと感じる瞬間は捉えられない。Joshinの枠組みでは、その回路はトラッカーが報告しない安堵だ。
    hidden_capacity: トラッカーが示せない明示的な回路を提供する
  - id: joshin_cl_bridge_05
    line: インフラは測れる。即身成仏──今のこの身体が気候の仕事の場であるという認識──は測れない。Joshinの伝統はインフラを置き換えない──その下の層を名づけ、インフラが届けようとしている集団のために明示的な儀式の技術を差し出す。
    hidden_capacity: インフラが届かない層を名づけ扱う
teacher_perspective:
  options:
  - id: joshin_cl_perspective_01
    header: Joshinが見ていること
    paragraphs:
    - Joshinは若者に「恐れが間違いであるかのように気候について落ち着け」とは言わない。真言宗の枠組みでは、恐れは、明示的な同期なしに3層の証言の負荷を抱えてきた身体からの正確な情報だ。問題は集団ではない。問題は、抱えるよう求められている層化された負荷のための儀式の技術の不在だ。
    - そこから彼は三密──手印、真言、曼荼羅の同時使用──に向かう。真言宗の伝統は、明示的・身体的なタスクで、身・口・意に一度に取り組むために三密を使う。3つの層すべてに分散した気候の証言の負荷に対して、これは近代の道具が届けてこなかった技術だ。
    - これが重要なのは、対処の個人の失敗に感じられることが、彼の枠組みでは、同期のギャップへの正確な応答だからだ。真言宗の前提──即身成仏──は仕事を先送りすることを拒む。集団が今いる身体は同期の場であり、先送りされた気候の自分の聴衆ではない。
  - id: joshin_cl_perspective_02
    header: Joshinが見ていること
    paragraphs:
    - Joshinの伝統では、気候の証言の負荷は、どの層が活性化されてきたかについての情報として読まれる。胸が締まる──身体。喉が締まる──口。心が走る──意。利用可能な道具は一度にひとつの層に取り組んできた。三密は3つすべてに明示的な仕事を同時に行う。
    - 電話ネイティブの集団にとって、三密の明示的・身体的な性質はポイントの一部だ。手印は身体を地に着ける──指が気候計算機が求めないことをする。真言は口の層を扱う──喉が、プラットフォームのスクリプトが要求しないことを求められる。曼荼羅は、アルゴリズムが生成できない構造化された場のなかに意を保つ。
    - 結果は気候の否認でも楽観でもない。持続的な気候の証言の圧力の下で互いに対抗して動いてきた層の明示的な再整合だ。身体はその整合を安堵として登録する──技術は常に整合の仕事を直接していた。
  - id: joshin_cl_perspective_03
    header: Joshinが見ていること
    paragraphs:
    - 護摩は真言宗の火の儀式──蓄積した負荷の明示的・非認知的な解放。気候ニュースのサイクルは、吸収が生み出す摩擦を解放するための明示的な回路なしに、集団が吸収するように訓練してきた。何年もかけて、摩擦はプラットフォームが届かない層に蓄積する。
    - 護摩はできる。火が受信者だ。儀式の構造が明示的な許可と明示的な容器を提供する──気候の証言の負荷は変容のために差し出され、分析や判断のためではない。集団の身体は、集団の心が今起きたことに言葉を与えるより先に、受け取りを登録する。
    - Joshinの枠組みでは、これは気候の回避ではなく気候の演技でもない。1,000年以上にわたって、ニュースサイクル管理の文化が積み上げる種類の蓄積した、扱われていない負荷のために洗練されてきた儀式の技術だ。
  - id: joshin_cl_perspective_04
    header: Joshinが見ていること
    paragraphs:
    - 即身成仏──この身そのまま仏──は荷重を担う真言宗の前提だ。それは気候の仕事を、集団が個人の炭素最適化を通じて準備している後の自分に先送りすることを拒む。集団が今いる身体は、枠組みのなかではすでに気候の仕事が負荷に出会う場所だ。
    - 気候を先送りされた問題として扱い、気候の証言を運ぶ身体を背景として扱うものとして訓練されてきた世代にとって、このリフレームは構造的に異なる。近代の道具は仕事は指標に対してだと仮定する。真言宗は仕事は同期に対してだと仮定し、指標は同期が起きたあとに届くものだ。
    - リフレームは気候の安定を約束しない。それを抱えてきた層が、実際の仕事の場として認識される──そして、近代の道具が飛ばしてきた同期のための明示的な技術を受け取る。
  - id: joshin_cl_perspective_05
    header: Joshinが見ていること
    paragraphs:
    - Joshinが戻ってくる原理は、気候の証言の負荷は私的な症状の装いをした同期問題だ、ということだ。身・口・意は惑星のスケールを同時に抱えるよう求められてきて、継承された道具は一度にひとつの層に取り組んできた。
    - 真言宗の貢献は同期そのもののための技術だ。三密は3つの層すべてに一度に取り組む。護摩は表面が拒んできた蓄積した負荷を解放する。儀式の構造は、プラットフォームが生成できない明示的な容器を提供する。
    - 電話ネイティブの集団にとって、問いはプラットフォームを捨てるかどうかではない。問いは、同期の技術がそれと並べて利用可能になるかどうかだ。Joshinは、それはできる、そして近代の道具が届けない層こそ、伝統が何世紀も働いてきた層だ、と教える。
practice:
  default_id: joshin_cl_practice_01
  options:
  - id: joshin_cl_practice_01
    display_name: 手印の気候の地着け
    announcement_line: Joshinは、気候の更新が届いたあと、スクリーンには求められないことを身体に与える明示的な手印の稽古、4分間の「手印の気候の地着け」を教える。サイドバーにあり、短く、日常のなかで使える。
    relief_lines:
    - 身体は、気候のフィードが生成できないことを明示的に求められる。
    - 気候の証言を抱えてきた身体の層は、明示的なリセットを受け取る。
  - id: joshin_cl_practice_02
    display_name: 真言の声の層
    announcement_line: Joshinは、気候の証言の瞬間にプラットフォームのスクリプトが上書きしてきた口の層を扱う、3分間の「真言の声の層」の稽古を差し出す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 喉は、プラットフォームのスクリプトが生成できないことを与えられる。
    - 口の層は、気候の表面が拒んできた整合を登録する。
  - id: joshin_cl_practice_03
    display_name: 護摩の気候の受け取り
    announcement_line: Joshinは、7分間の「護摩（ごま）の気候の受け取り」の観想を教える──真言宗の火の儀式を映した構造化された観想で、回路なしに蓄積してきた気候の証言の負荷のための明示的な容器を提供する。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 蓄積した気候の負荷は、受け取れる構造化された容器に差し出される。
    - 集団の身体は、ニュースサイクルが許してこなかった明示的な解放を登録する。
  - id: joshin_cl_practice_04
    display_name: 三密の気候の同期
    announcement_line: Joshinは、気候の更新が届いたあと、5分間の「三密（さんみつ）の気候の同期」を教える──手印（しゅいん）・真言（しんごん）・観想の同時使用で、身・口・意を一つの場に戻す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 3つの層すべてに明示的な仕事が同時に求められる。
    - 気候の証言の下で互いに引っ張り合うことが緩む。
  - id: joshin_cl_practice_05
    display_name: 即身成仏の気候の想起
    announcement_line: Joshinは、3分間の「即身成仏の気候の想起」を差し出す──実践者を、集団が今いる身体が気候の仕事の場であって後の自分のための準備ではないという真言宗の前提に戻す静かなリフレームの稽古だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 集団が抱えているこの身体が、実際の気候の実践の場として認識される。
    - 内なる状態を後の自分に押し出している先送りのパターンが緩む。
cta:
  options:
  - id: joshin_cl_cta_01
    line: 350.orgは化石燃料の使用終了に取り組む地球規模の気候運動だ。入り口：その地域行動ネットワークと投資撤退キャンペーン。
  - id: joshin_cl_cta_02
    line: Fridays for Futureは185カ国で7,500以上の気候ストライキを組織してきた。入り口：その地域のストライキ・ネットワークまたは地域調整。
  - id: joshin_cl_cta_03
    line: Sunrise Movementは気候行動とグリーンジョブのための米国の若者主導運動だ。入り口：そのハブ・ネットワーク──400以上の米国ハブ。
  - id: joshin_cl_cta_04
    line: Earthjusticeは米国最大の公益環境法組織だ。入り口：そのアドボカシー・ネットワークと訴訟キャンペーン。
  - id: joshin_cl_cta_05
    line: Climate Reality Projectは170カ国で5万人以上の気候リーダーを訓練している。入り口：そのリーダーシップ訓練プログラム。
title_system:
  headline_layer_2:
    options:
    - id: joshin_cl_headline_01
      line: 真言宗の僧が、気候の証言の負荷を3層の同期問題として読む──そして近代の道具が届けられない明示的な儀式の技術を差し出す。
    - id: joshin_cl_headline_02
      line: 儀式の技術としての密教──Joshinは、気候の証言の下の層について語る。
    - id: joshin_cl_headline_03
      line: 即身成仏──今のこの身体が気候の仕事の場──真言宗の僧が、持続的な気候の負荷の下の電話ネイティブの集団に出会う。
    - id: joshin_cl_headline_04
      line: 三密──手印（しゅいん）、真言（しんごん）、曼荼羅（まんだら）──Joshinは、気候計算機が届けられない同期について語る。
    - id: joshin_cl_headline_05
      line: 護摩の火の儀式が気候の証言の負荷に出会う──真言宗の僧が、プラットフォームが解放できない蓄積した負荷について語る。
