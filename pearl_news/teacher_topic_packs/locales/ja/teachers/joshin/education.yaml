hook_personal:
  options:
  - id: hook_personal_01
    line: 学びたい気持ちはまだある。同時に、仕事が始まる前に制度がどれだけ注意を浪費するかも知っている。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育のストレスは負荷だけではありません。中断だらけの制度が注意、自信、学びと接し続ける力に何をするか、という問題です。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei（真言密教系の真言の教師）は、実践で学生が課題に留まる努力そのものですでに疲れ切って現れるのを見てきました。学校が大切かどうかは問いません。散った注意を私的な失敗として扱うのをやめ、身・口・意をひとつの所作にもどして仕事が着地するにはどうか、と問いています。
  - id: teacher_intro_02
    line: Joshin Sensei（真言仏教の教師）は、教育の圧力が実践の場に分断された注意と自己責めとして現れるのを見てきました。若者はもっと勉強するにはと問うのではありません。制度が中断を自己像に変えないにはどうか、と問いています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '課題ポータルを開きます。集中が切れます。タブを切り替えます。また戻ります。仕事はまだ終わらなければならないからです。

      LOOP_SEQUENCE: "ポータルを開いた。集中が切れた。タブを切り替えた。戻った。"'
  - id: youth_somatic_02
    line: '読書に座ります。心がグループチャットに飛びます。閉じます。また読み物を開きます。締切は動かないからです。

      LOOP_SEQUENCE: "座った。心が飛んだ。チャットを閉じた。読み物をまた開いた。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Joshin Senseiは学生のなかでこの順序を見てきました。課題が開き、注意が割れ、タブが変わり、同じ張りつめた制度のなかで努力が再起動します。
  - id: teacher_witness_02
    line: 実践の場でそのループを見てきました。開く、切れる、切り替える、戻る。身体と端末が、着地する前に注意を引き裂き続けます。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 学生と若い教育者が研修を組み、ピアチュータリングを開き、注意に配慮した学びの空間を求める運動をしています。
  - id: turnaround_02
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 若者はよりよい設計を求める運動を組み、注意の失敗を記録し、無限の集中を前提としないピアチュータリングを開いています。
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. トラッカーは学生と教師がすでに何を変えているかを測ります。もう一日の断片化のあと、仕事に戻ることを可能にしたもの──身・口・意を十分長くそろえ、一つのことが着地し、中断を自己像にしない容量──の欄はありません。ポータルを開いて戻った学生にはそれが要りました。Joshin Senseiの真言の伝統には、そのそらえの言葉と実践があります。
  - id: bridge_02
    line: 教育のトラッカーはプログラムと成果を数えます。制度が注意を散らし続けるなかで課題に留まる内面のそらえは数えません。それは真言の語で三密（Sanmitsu）です。次の自習にそれが要ります。ポータルに戻った読者にも要ります。Joshin Senseiの伝統は千年以上それを育んできました。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Joshin Senseiが見ていること
    paragraphs:
    - Joshinはまず断片化と自己同一化を分けます。真言では、身・口・意はひとつに働くよう意図されています。学びの環境がそれらを引き裂き続けるとき、問題は学生が壊れていることではありません。学びが要請するそらえそのものに敵対的な条件である、ということです。
    - ここでの三密は生産性の言葉ではありません。注意が一つのことに十分長く着地して学べるよう、三つの密をひとつの所作にもどす規律です。この枠の正精進は根性ではありません。タブを切り替えたあと再び戻る容量であり、その戻りを失敗の証にしない力です。
    - '再フレームはこう精密になります。「自分が壊れている、間違っている」に感じることが、しばしば持続的注意のために設計されなかった制度・構造への正確な反応です。実践は、この身体を戻る場所にし、責めの場所にしないことです。'
  - id: teacher_perspective_02
    header: Joshin Senseiが見ていること
    paragraphs:
    - Joshin Senseiは教育のストレスを即身成仏（Sokushin Jobutsu）として読みます。集中できない学生は欠陥ではありません。この身体、この瞬間が、集中が戻る場になりえます。伝統は学ぶために身体を離れよとは言いません。そらえることを求めます。
    - そこから三密へ。問いは永遠に気が散らないことではありません。ポータルとチャットが引き裂いたあとに身・口・意をひとつの所作にもどすと、次の段落が可能になります。
    - その枠組みでは自己責めが和らぎます。欠陥はあなたのものではありません。壊れた自己でも、混乱した心でもありません。問題は、いかなる人間の神経系も持続しえない注意を前提に機関と政策が設計し続けていることです。真言は、この身体のなかで線を保つ方法を与えます。
practice:
  options:
  - id: practice_01
    display_name: 5分間・三密で注意を戻す
    announcement_line: Joshin Senseiは、ポータルとタブが注意を散らした瞬間のため、5分間の三密で注意を戻す実践を教えています。サイドバーにあり、次の学習ブロックの前や、また中断のあとなど短時間で使えます。
    relief_lines:
    - 圧力が自己全体に名前を貼るのをやめます。
    - 次の正直な一手に足るそらえが戻ります。
  - id: practice_02
    display_name: 三密のそろえ
    announcement_line: Joshin Senseiは、集中がすでに切れ、仕事がまだ待っているときのため、5分間の三密のそらえを教えています。サイドバーに、時間どおり手順付きで載せています。
    relief_lines:
    - 身・口・意がひとつの所作にもどります。
    - 次の段落が可能になります。
sdg:
  primary:
    title: 質の高い教育
    line: 国連はSDG 4とその質の高い教育と生涯学習の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Student Voiceなど若者主導の教育ネットワークが、提唱とピア支援への入口を提供しています。入口: https://www.stuvoice.org'
  - id: cta_02
    line: UNA-USAは地域から地球規模で教育とSDG 4のプログラムを運営しています。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 教育のストレスは負荷だけの話ではない。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: Joshin Senseiは散った注意と個人的失敗を分けます。
    - id: headline_layer_2_02
      line: Joshin Senseiは、制度が引き裂き続けるときに身・口・意に何ができるかを名指します。
