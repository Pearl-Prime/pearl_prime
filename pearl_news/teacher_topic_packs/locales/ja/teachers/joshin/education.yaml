hook_personal:
  options:
  - id: joshin_ed_hook_personal_01
    line: 課題は終えられる。締切にも間に合う。資格証を通じて届けられるはずだったものは届いていない──制度が認証するものと身体が登録するものとの同期は、広がってきた。
  - id: joshin_ed_hook_personal_02
    line: あなたは制度の内側にいて、求められることをやっている。身体は3つの層──画面、家族の期待、プラットフォームの演技──を抱えてきた。カリキュラムが訓練していたのはひとつだけ。残りの2つは代償を蓄積し続けている。
  - id: joshin_ed_hook_personal_03
    line: 午前2時、レポートを終える。顎は固まっている。成績が届く。あなたの一部がずっと尋ねているのは、合格したかどうかではない──このやり取りで身・口・意が同じ部屋にいたかどうかだ。
  - id: joshin_ed_hook_personal_04
    line: シラバスを読んで、その半分のあたりで喉が締まる。それでも読書課題は終える。締まりは情報だった。制度はそれを受け取るための技術を与えなかった。
  - id: joshin_ed_hook_personal_05
    line: あなたの一部は、問いがどうもっと勉強するかではないと知っている。問いは、今あなたがいる身体に何かが実際に届けられているかどうか──そして真言宗はその届けるための明示的な儀式の技術を保持している。
hook_big_picture:
  options:
  - id: joshin_ed_hook_big_01
    line: 若者の教育の負荷は学業量だけの話ではない。資格証の配信が時間をかけて何を犠牲にするか──身・口・意が何年も互いに対抗して働くなかで、制度が3つのうちひとつしか測らないときに積み上がる同期のギャップ、ということだ。
  - id: joshin_ed_hook_big_02
    line: ひとつの世代が、カリキュラムが描き出せない世界を継ぐよう求められている。制度が届けるものと、その世界で実際に生きなければならない身体が必要とするものとのギャップは、集団の失敗ではない──失われた技術スタックだ。
  - id: joshin_ed_hook_big_03
    line: 特に日本では、本音と建前のギャップが、プラットフォームと資格証の構造のなかで厚くなった。集団は、以前のどの世代よりも広いギャップを抱えるよう求められている──そしてカリキュラムは表面だけを訓練してきた。
  - id: joshin_ed_hook_big_04
    line: 真言宗の前提──即身成仏、この身そのまま仏──は内なる仕事を先送りすることを拒む。学生が内側にいる身体はすでに実践の場であり、資格証は制度が測るものであって、仕事そのものではない。
  - id: joshin_ed_hook_big_05
    line: 学生の離脱として読まれているものは、しばしば身体が、カリキュラムが同期を届けていないことを登録していることだ。真言宗の伝統は同期のための明示的な儀式の技術を持っている──近代の制度は持っていない。
teacher_intro:
  options:
  - id: joshin_ed_intro_01
    line: Joshinは真言宗（密教）の僧で、何十年も道場で若い学生と働いてきた。同期を必要として到着した集団に対して、資格証だけの配信が何をするかを見てきた。
  - id: joshin_ed_intro_02
    line: Joshinは真言宗の系譜で教える。政策の意味での教育改革者としては自らを位置づけない──彼は、1,000年以上、カリキュラムが届けない身・口・意の同期に取り組んできた伝統の儀式の技術者だ。
  - id: joshin_ed_intro_03
    line: Joshinは即身成仏──今のこの身体が仕事の場──の原理から働く。資格証が準備している先送りされた自分はない。学生が内側にいる身体は、すでに実践が負荷に出会う場所だ。
  - id: joshin_ed_intro_04
    line: Joshinは、成績証明書と「来たものが実際に伝達されているか」という未発の問いを抱えて到着する若い学生を見てきた。真言宗の枠組みでは、その問いは動機の話ではない──制度がどの層に届ける用意があるかの話だ。
  - id: joshin_ed_intro_05
    line: Joshinはプラットフォームと圧力に流暢だ。彼の真言宗の実践は、カリキュラムがLMSであり、表面がプラットフォームであり、内なる状態は後で解決される問題として扱われてきた集団のための技術スタックとして密教を捉え直す。
youth_somatic:
  options:
  - id: joshin_ed_somatic_01
    line: 午前1時、講義のタブを開いた。目は別の画面に流れた。タブを閉じた。締切は本物で、注意と課題の同期は届かなかったので、また開いた。
  - id: joshin_ed_somatic_02
    line: 教科書の章を読んだ。3ページ目で顎が固まった。再読しないスクリーンショットを撮った。表面は進み続けることを求め、下が教材を登録しなくても次に進んだ。
  - id: joshin_ed_somatic_03
    line: レポートを提出した。呼吸は長くならなかった。成績が届いた。身体は安堵を記録しなかった──身体が扱われるのを待っていた層は、資格証の交換の一部ではなかったから。
  - id: joshin_ed_somatic_04
    line: 講義を2倍速で見た。内容と、その後で歩いて入る世界とのギャップで胃が縮んだ。縮みに名前をつけなかった──認識のための儀式の技術が提供されていなかったから。
  - id: joshin_ed_somatic_05
    line: ゼミに座って、肩が緩まなかった。見回すと、同じ肩の5人の他の学生がいた──部屋が作っていなかった層を、身体が一斉に登録していた。
teacher_witness:
  options:
  - id: joshin_ed_witness_01
    line: Joshinは、資格証のサイクルのあとに寺に到着する若い学生のなかで、まさにそのループを見てきた。真言宗の枠組みでは、摩擦は動機の失敗ではない──カリキュラムがひとつの層に届けるあいだに3つの層が待っていたことを身体が登録していることだ。
  - id: joshin_ed_witness_02
    line: 彼は、若者が初めての三密の稽古を座って、初めて、身・口・意が同時に明示的な仕事を求められるのを感じるのを見てきた。彼の伝統では、それは学びではない──届けられてこなかった層への届けだ。
  - id: joshin_ed_witness_03
    line: 彼は、資格証がカリキュラムだと確信して到着した集団を導いてきた。最初の稽古は道場の内側で資格証を置くこと──そしてその場所に届くものが、資格証が隠していた層だ。
  - id: joshin_ed_witness_04
    line: 彼は、若者が即身成仏──カリキュラムの内側のこの身体がすでに仕事の場──を実現する瞬間を見てきた。リフレームは、表面管理のカリキュラムが届けられないものとして着地する。
  - id: joshin_ed_witness_05
    line: 彼は、若い学生が資格証をカリキュラムとして扱うのをやめて、儀式の技術に教えさせ始める変化を見てきた。彼の伝統では、その変化は反制度的ではない──同期がどう感じるかを身体が思い出すことだ。
turnaround:
  options:
  - id: joshin_ed_turnaround_01
    stat_line_1: 2億4,400万人の子ども。UNESCO。
    stat_line_2: UNESCOは、2億4,400万人の子どもと若者がまだ世界で学校に通っていないと推定している──SDG 4と、野心を地域のインフラに翻訳する一連の国家計画を枠づける数字だ。
  - id: joshin_ed_turnaround_02
    stat_line_1: 100以上の加盟国。Global Campaign for Education。
    stat_line_2: Global Campaign for Educationは、100以上の加盟国で市民社会を結びつけている──教育のアドボカシーを散在するキャンペーンではなく共有インフラに変えている。
  - id: joshin_ed_turnaround_03
    stat_line_1: SDG 4。2030年の期限。
    stat_line_2: SDG 4は、2030年までに包括的で公平な質の高い教育をすべての人に届けることを国際社会に約束させている──以前の枠組みが持っていなかった多国間の道具だ。
  - id: joshin_ed_turnaround_04
    stat_line_1: 7,600万人の子ども。ECW。
    stat_line_2: Education Cannot Waitは、創設以来7,600万人を超える危機影響下の子どもに届き、緊急時の教育のために7億ドルを動員した。
  - id: joshin_ed_turnaround_05
    stat_line_1: 2,200万人の参加者。World's Largest Lesson。
    stat_line_2: UNICEFと地球規模の教育者の連携であるWorld's Largest Lessonは、160カ国の2,200万人以上の子どもに届いた──SDGの枠組みを教室レベルの伝達インフラに翻訳している。
bridge:
  options:
  - id: joshin_ed_bridge_01
    line: 2億4,400万人の子ども。UNESCO。トラッカーは登録、修了、政策採用を測る。教室の内側で届けられているもの──資格証の交換中に身・口・意が同期しているか、それとも資格証が届くために必要な同期なしに集団が資格証を受け取っているか──は測らない。
    hidden_capacity: 資格証の交換中に身・口・意を同期させる
  - id: joshin_ed_bridge_02
    line: 数字は、建てられたものを示す。同期のギャップ──制度が互いに対抗して訓練してきた層と、それを抱えてきた身体が代償を蓄積し続けている層──は示さない。Joshinの真言宗の実践は、その蓄積に直接働く。
    hidden_capacity: トラッカーが測れない蓄積した同期の代償に働く
  - id: joshin_ed_bridge_03
    line: 枠組みは参加と修了を追う。資格証の下の層──制度が別の層に届けるあいだ学生が内側にいる身体──は追わない。真言宗の伝統はその層を明示的にし、それに直接技術を届ける。
    hidden_capacity: カリキュラムが飛ばす層に技術を届ける
  - id: joshin_ed_bridge_04
    line: 政策の道具は資格証をスケールさせる。三密──手印・真言・観想の同期──はスケールさせない。資格証が届けられない容量こそ、真言宗の伝統が何世紀も働いてきた容量だ。
    hidden_capacity: 資格証が届けられない同期をスケールさせる
  - id: joshin_ed_bridge_05
    line: インフラは測れる。即身成仏──学生が内側にいるこの身体がすでに仕事の場──は測れない。Joshinの伝統はインフラを置き換えない──その下の層を名づけ、インフラが届けようとしている集団のために明示的な儀式の技術を差し出す。
    hidden_capacity: インフラが届かない層を名づけ扱う
teacher_perspective:
  options:
  - id: joshin_ed_perspective_01
    header: Joshinが見ていること
    paragraphs:
    - Joshinは若い学生に「動機の不足であるかのようにもっと勉強しろ」とは言わない。真言宗の枠組みでは、摩擦は身体が同期を求めていることだ──三密、身・口・意の同時の関与──をカリキュラムが届けることを拒んできた。問題は集団ではない。問題は、資格証の下の層のための明示的な儀式の技術の不在だ。
    - そこから彼は即身成仏に向かう。今のこの身体が仕事の場であるという真言宗の前提は、資格証が準備している後の自分への内なる仕事の先送りを拒む。学生が内側にいる身体は、すでに同期が起こり得る場所であり、実践はその身体に直接届ける明示的な技術だ。
    - これが重要なのは、注意の個人の失敗に感じられることが、彼の枠組みでは、同期のギャップへの正確な応答だからだ。リフレームは締切を取り除かない──資格証だけが飛ばしてきた層を含む構造のなかに締切を置く。
  - id: joshin_ed_perspective_02
    header: Joshinが見ていること
    paragraphs:
    - Joshinの伝統では、カリキュラムの内側の身体の縮こまりは情報であり、誤作動ではない。制度がひとつの層に届けるあいだ3つの層が扱われるのを待っていたことを身体が登録していることだ。真言宗の答えは三密──手印、真言、曼荼羅の同時使用──で、3つの層すべてに同時に明示的な仕事を与える。
    - 電話ネイティブの学生にとって、これらの道具の明示的・身体的な性質はポイントの一部だ。手印は身体を地に着ける──指がLMSには求められないことをする。真言は口の層を扱う──喉が、プラットフォームのスクリプトが要求しないことを求められる。曼荼羅は、アルゴリズムが生成できない構造化された場のなかに意（こころ）を保つ。
    - 結果は近代的な意味でのリラックスではない。資格証のサイクルの内側で互いに対抗して動いてきた層の明示的な再整合だ。身体はその整合を安堵として登録するが、安堵は副作用だ──技術は常に整合の仕事を直接していた。
  - id: joshin_ed_perspective_03
    header: Joshinが見ていること
    paragraphs:
    - 護摩は真言宗の火の儀式──蓄積した負荷の非認知的な解放のための明示的な儀礼。資格証のサイクルは、若い学生が教材を吸収するように訓練してきた──吸収が生み出す摩擦を解放するための明示的な回路なしに。何年もかけて、摩擦はLMSが届かない層に蓄積する。
    - 護摩はできる。火が受信者だ。儀式の構造が明示的な許可と明示的な容器を提供する──差し出されるものは変容のために差し出され、分析や判断のためではない。学生の身体は、学生の心が今起きたことに言葉を与えるより先に、受け取りを登録する。
    - Joshinの枠組みでは、これは療法ではなく娯楽でもない。1,000年以上にわたって、資格証管理の文化が積み上げる種類の蓄積した、扱われていない負荷のために洗練されてきた儀式の技術だ。近代の制度にそれと同等のものがないことは集団の欠陥ではない──制度が抱えるように設計されてこなかった語彙だ。
  - id: joshin_ed_perspective_04
    header: Joshinが見ていること
    paragraphs:
    - 即身成仏──この身そのまま仏──は荷重を担う真言宗の前提だ。それは内なる仕事を、資格証が準備している後の自分に先送りすることを拒む。学生が今いる身体は、枠組みのなかではすでに実践が負荷に出会う場所だ。
    - 資格証を仕事の単位として扱い、資格証を運ぶ身体を背景として扱うものとして訓練されてきた世代にとって、このリフレームは構造的に異なる。近代の制度は仕事は資格証に対してだと仮定する。真言宗は仕事は同期に対してだと仮定し、資格証は同期が起きたあとに表面に届くものだ。
    - リフレームは締切が消えると約束しない。それを抱えてきた層が、実際の仕事の場として認識される──そして、資格証のサイクルが飛ばしてきた同期のための明示的な技術を受け取る。
  - id: joshin_ed_perspective_05
    header: Joshinが見ていること
    paragraphs:
    - Joshinが戻ってくる原理は、教育は資格証の配信だけのために作られたものではなかった、ということだ。世代を越える同期した伝達──身・口・意を明示的な実践で一つの場に持ち込む──のためだった。どれかひとつが欠けると、資格証は残り、同期は届かない。
    - 彼の枠組みでは、近代の制度は資格証ではとても上手になり、同期を届ける力をますます失っている。そのギャップは制度だけの責任ではない──実践の技術が、制度が置き換えられるよりも早く薄くなるときに起きる。真言宗は何世紀もその技術を抱えてきた。
    - 電話ネイティブの集団にとって、問いは資格証を捨てるかどうかではない。問いは、同期の技術がそれと並べて利用可能になるかどうかだ。Joshinは、それはできる、そして資格証のサイクルが飛ばす層こそ、伝統が何世紀も働いてきた層だ、と教える。
practice:
  default_id: joshin_ed_practice_01
  options:
  - id: joshin_ed_practice_01
    display_name: 手印の学習の地着け
    announcement_line: Joshinは、学習セッションの始めに、スクリーンには求められないことを身体に与える明示的な手印の稽古、4分間の「手印の学習の地着け」を教える。サイドバーにあり、短く、日常の学習のなかで使える。
    relief_lines:
    - 身体は、LMSが生成できないことを明示的に求められる。
    - スクリーンに対抗して引っ張られてきた身体の層は、明示的なリセットを受け取る。
  - id: joshin_ed_practice_02
    display_name: 真言の喉のリセット
    announcement_line: Joshinは、課題と課題のあいだに、プラットフォームのスクリプトが上書きしてきた口の層を扱う、3分間の「真言の喉のリセット」を差し出す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 喉は、プラットフォームのスクリプトが生成できないことを与えられる。
    - 口の層は、表面が拒んできた整合を登録する。
  - id: joshin_ed_practice_03
    display_name: 護摩の学習の受け取り
    announcement_line: Joshinは、7分間の「護摩（ごま）の学習の受け取り」の観想を教える──資格証のサイクルのあいだに蓄積した摩擦のための明示的な容器を提供する構造化された観想だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 蓄積した学習の摩擦は、受け取れる構造化された容器に差し出される。
    - 集団の身体は、資格証のサイクルが許してこなかった明示的な解放を登録する。
  - id: joshin_ed_practice_04
    display_name: 三密の学習の同期
    announcement_line: Joshinは、ゼミの始まりやレポートの前に、5分間の「三密（さんみつ）の学習の同期」を教える──手印（しゅいん）・真言（しんごん）・観想の同時使用で、3つの層を一つの場に持ち込む。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 3つの層すべてに明示的な仕事が同時に求められる。
    - 各層が明示的な仕事を持つので、互いに引っ張り合うことが緩む。
  - id: joshin_ed_practice_05
    display_name: 即身成仏のカリキュラム想起
    announcement_line: Joshinは、3分間の「即身成仏のカリキュラム想起」を差し出す──実践者を、カリキュラムの内側の身体が後の自分のための準備ではなくすでに仕事の場であるという真言宗の前提に戻す静かなリフレームの稽古だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 集団が抱えているこの身体が、資格証の聴衆ではなく実際の実践の場として認識される。
    - 内なる状態を後の自分に押し出している先送りのパターンが緩む。
cta:
  options:
  - id: joshin_ed_cta_01
    line: UNESCOは国連教育科学文化機関で、SDG 4の多国間リードだ。入り口：そのGlobal Education Coalitionまたは加盟国の関与。
  - id: joshin_ed_cta_02
    line: Global Campaign for Educationは、100以上の加盟国で市民社会を結びつけ、包括的な質の高い教育を求めている。入り口：その国別連合リスト。
  - id: joshin_ed_cta_03
    line: Education Cannot Waitは、緊急時の教育のための地球規模の基金で、7,600万人の危機影響下の子どもに届いている。入り口：そのアドボカシーとパートナーシップ・プログラム。
  - id: joshin_ed_cta_04
    line: Malala Fundは、すべての少女が12年の無料・安全・質の高い教育を受ける権利を擁護する。入り口：そのアドボカシー・プログラムと国別キャンペーン。
  - id: joshin_ed_cta_05
    line: Teach For Allは、60以上の国の独立した連携組織の地球規模ネットワークで、教育変革のための集団的リーダーシップを育てる。入り口：そのネットワークと国別パートナーのリスト。
title_system:
  headline_layer_2:
    options:
    - id: joshin_ed_headline_01
      line: 真言宗の僧が、資格証対同期のギャップを、近代の制度が答えるように作られていないカリキュラムの問いとして読む。
    - id: joshin_ed_headline_02
      line: 三密──手印（しゅいん）、真言（しんごん）、曼荼羅（まんだら）──Joshinは、LMSが届けられない同期について語る。
    - id: joshin_ed_headline_03
      line: 即身成仏──今のこの身体が仕事の場──真言宗の僧が、資格証が強化する先送りのパターンについて語る。
    - id: joshin_ed_headline_04
      line: 護摩の火の儀式が電話ネイティブの集団に出会う──Joshinは、資格証のサイクルが解放のための回路なしに蓄積してきた摩擦について語る。
    - id: joshin_ed_headline_05
      line: 儀式の技術としての密教──Joshinは、飛ばされてきたカリキュラムの下の層について語る。
