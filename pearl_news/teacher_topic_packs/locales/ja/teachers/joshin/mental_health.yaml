hook_personal:
  options:
  - id: hook_personal_01
    line: いちばんつらいのは、螺旋が本当の自分の声のように聞こえ始める瞬間です。そこで自己像が奪われます。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 若者のメンタルの過負荷は症状の数だけではありません。速度、断片化、圧力が内側から自己像を占領し始めることの問題です。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei（真言密教系の真言の教師）は、実践で若者が過負荷と自己を同一視し、体系が両者を分ける余白を与えないのを見てきました。学生は「平静を装うには」とは聞きません。「嵐が自己だと生きるのをやめるには」と聞いています。
  - id: teacher_intro_02
    line: Joshin Sensei（真言仏教の教師）は、実践の場でメンタルの過負荷が人全体に名前を貼り始めるとき何が起きるかを見てきました。若者は圧力の現実性を問いません。嵐ではなかった部分──身・口・意のひとつの所作──をどう見つけるか、と問いています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '深夜に更新を読みます。思考が駆けます。スマホを置きます。また手に取ります。螺旋はすでに回り始めているからです。

      LOOP_SEQUENCE: "更新を読んだ。思考が駆けた。スマホを置いた。また手に取った。"'
  - id: youth_somatic_02
    line: 'グループチャットで見出しを見ます。呼吸が浅くなります。アプリを閉じます。また開きます。見ないからといってループが止まらなかったからです。

      LOOP_SEQUENCE: "見出しを見た。呼吸が浅くなった。アプリを閉じた。また開いた。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Joshin Senseiは若者のなかにこのループそのものを見てきました。警告が届き、思考が速まり、スマホが伏せられ、同じ圧力が手をまた引き戻します。
  - id: teacher_witness_02
    line: 今年の学生のなかでその順序を見てきました。読む、駆ける、伏せる、戻る。身体と端末が、心がまだ自己から分離できない螺旋を繰り返します。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 若者の組織者がピアの輪を開き、傾聴の訓練を組み、学校にメンタルヘルス支援を私的な弱さではなくインフラとして扱うよう迫っています。
  - id: turnaround_02
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 若者はピア支援をつくり、運動とアクセス改善を組み、螺旋が部屋全体を支配し始めたときに本当に効くことを記録しています。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. トラッカーはピアの輪と運動を測ります。過負荷のまた一週間のあと、次の正直な手を伸ばすことを可能にしたもの──嵐を本物として受け止めつつ、それを自己像にしない明晰さ──の欄はありません。スマホを置いてまた手に取った人にはそれが要りました。Joshin Senseiの真言の伝統には名前があります。嵐が最終的に消し去れない本具の覚りの本性です。
  - id: bridge_02
    line: メンタルヘルスのトラッカーはプログラムと待ち時間を数えます。若い人が過負荷と自己を分け、身・口・意がひとつの所作にもどる内面のそらえは数えません。次のピア支援者にはそれが要ります。アプリを開き直した読者にも要ります。Joshin Senseiの伝統は千年以上それを実践してきました。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Joshin Senseiが見ていること
    paragraphs:
    - 'Joshinはまず区別から始めます。真言では、意識はそのなかを通る嵐より大きい。理具の成仏は、本具の覚りの価値がすでに在ることを意味します。強度は本物です。それが自己の最終的な名前ではありません。'
    - だから教えは抑圧を目指しません。身・口・意が十分そろい、心が高まりのたびに自己と名づけるのをやめ、圧力下の過負荷として読めるほどのそらえを目指します。
    - 再フレームが重要です。「自分がおかしい」に感じることが、どの神経系も正常化すべきではない速度と制度への正確な反応であることがよくあります。実践は、壊れたことのなかった所作に戻ることです。
  - id: teacher_perspective_02
    header: Joshin Senseiが見ていること
    paragraphs:
    - 'Joshin Senseiはメンタルの過負荷を三密（Sanmitsu）として読みます。心が駆ければ、身体と言葉も一緒に動きます。最初の一手は「考え抜く」ことではありません。三つの密──印契、真言、観想──をひとつにもどし、嵐に器を与えることです。'
    - '即身成仏（Sokushin Jobutsu）もここに当てはまります。この身体、この瞬間が、明晰さの場になりえます。螺旋はあなたが壊れている証拠ではありません。実践が守ろうとする容量を体系が過負荷にしている証拠です。'
    - その枠組みでは自己責めが和らぎます。若者が敏感すぎるのでも、過負荷を感じる自分が間違いでもありません。問題は、制度・構造が一つの神経系に持つべき量を超えて背負わせ続けていることです。真言は、この身体のなかで線を保つ方法を与えます。
practice:
  options:
  - id: practice_01
    display_name: 5分間・三密で過負荷をリセット
    announcement_line: Joshin Senseiは、駆ける思考が部屋全体を支配し始める瞬間のため、5分間の三密で過負荷をリセットする実践を教えています。サイドバーに、時間どおりで率直に載せています。
    relief_lines:
    - 圧力が自己全体に名前を貼るのをやめます。
    - 次の正直な一手に足る安定が戻ります。
  - id: practice_02
    display_name: 三密のそろえ
    announcement_line: Joshin Senseiは、螺旋がすでに回っているときのため、5分間の三密のそらえを教えています。サイドバーにあり、深夜のあとや次の用事の前など短時間で使えます。
    relief_lines:
    - 身・口・意がひとつの所作にもどります。
    - 嵐は本物のまま、もう自己像を支配しません。
sdg:
  primary:
    title: すべての人に健康と福祉を
    line: 国連はSDG 3とその健康と福祉の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Active MindsとBorn This Way Foundationは、ともに若者向けの入口を提供しています。入口: https://www.activeminds.org'
  - id: cta_02
    line: 次の一歩がそちらでない場合、Born This Way Foundationは優しさとメンタルウェルネスに焦点を当て、同じ領域で活動しています。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若者の過負荷は、自己の声のように聞こえると危うくなる。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: Joshin Senseiは、嵐とそれを抱える明晰さとのあいだの切れ目を名指します。
    - id: headline_layer_2_02
      line: Joshin Senseiは、メンタルの過負荷を身・口・意を通して読み、この身体に何ができるかを示します。
