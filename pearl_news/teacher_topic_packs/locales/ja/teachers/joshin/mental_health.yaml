hook_personal:
  options:
  - id: joshin_mh_hook_personal_01
    line: あなたは、誰かが名づける前からその螺旋を知っている。継承された道具──マインドフルネス・アプリ、呼吸トラッカー、表面レベルのプロンプト──は、表面がすでに管理している層に働いていることも、あなたは知っている。その下の層はそのまま自分のことをしている。
  - id: joshin_mh_hook_personal_02
    line: 学校のための顔と、グループチャットのための顔と、午前1時の洗面所の鏡のための顔がある。身体は同時にその3つを抱えてきた──そして近代の道具は、あなたに表面の管理をもっと上手にすることを訓練してきた。本当に必要なのは、その下を同期させる技術だ。
  - id: joshin_mh_hook_personal_03
    line: 朝の見出しから胸はずっと締まっている。表に出さないでいる。出さないことは何かを犠牲にしてきた──そしてそのために与えられた道具は、もっと出さないこと、もっと表面を管理することだった。下の層は圧を溜め続ける。
  - id: joshin_mh_hook_personal_04
    line: 休んでも触れられない疲労がある。眠りは来るのに疲れは残る──負荷が呼吸アプリの届かない層に抱えられているから。即身成仏（そくしんじょうぶつ）の枠組みでは、この身体の仏性は明示的な技術によって扱われるのを待ってきた。
  - id: joshin_mh_hook_personal_05
    line: あなたの一部は、問いが「自分は十分に管理できているか」ではないと知っている。問いは、抱えてきた層に何かが実際に届けられているかどうか──そして真言宗はその届けるための明示的な儀式の技術を保持している。
hook_big_picture:
  options:
  - id: joshin_mh_hook_big_01
    line: 若者の精神的過負荷は症状の話だけではない。表面管理が時間をかけて何をするか──注意・休息・自分の状態を登録する力に対して、文化が集団に表面管理を訓練し、同期化を訓練してこなかったときに何が起こるか、ということだ。
  - id: joshin_mh_hook_big_02
    line: ひとつの世代が、制度の負荷・家族の期待・プラットフォームの演技を同時に抱えるよう求められている──そして継承されたメンタルヘルスの枠組みは、それぞれを私的な症状として扱う。真言宗の伝統は、これを明示的な儀式の技術を伴う同期問題として読む。
  - id: joshin_mh_hook_big_03
    line: 特に日本では、本音と建前のギャップがプラットフォーム時代に厚くなった。集団は、以前のどの世代よりも広いギャップを抱えるよう求められている。下の層のための儀式は、より少なくなっている。メンタルヘルス危機はその構造の内側にある。
  - id: joshin_mh_hook_big_04
    line: 真言宗の前提──即身成仏、この身そのまま仏──は内なる真実を先送りすることを拒む。集団が抱えているこの身体は、後の自分のための準備ではない。同期が起こるか起こらないかの場所そのものだ。
  - id: joshin_mh_hook_big_05
    line: 世代的なメンタルヘルス危機として読まれているものは、ある程度、構造の問題だ──集団が抱えるよう求められている負荷のための明示的な身・口・意の技術が、システムから提供されてこなかったということ。真言宗は何世紀もその技術を抱えてきた。
teacher_intro:
  options:
  - id: joshin_mh_intro_01
    line: Joshinは真言宗（密教）の僧で、何十年も若者と道場で働いてきた。表面の管理を訓練され、下の層を同期させる儀式の技術を教えられてこなかった集団に対して、その表面管理が何を犠牲にするかを見てきた。
  - id: joshin_mh_intro_02
    line: Joshinは真言宗の系譜で教える。臨床的な意味でのメンタルヘルス実践者としては自らを位置づけない──彼は、1,000年以上、身・口・意を一つの同期した場として扱い、調整のための明示的な技術を持つ伝統の儀式の技術者だ。
  - id: joshin_mh_intro_03
    line: Joshinは即身成仏──この身そのまま仏──の真言宗の原理から働く。実践が準備している先送りされた自分はない。今負荷を抱えているこの身体が仕事の場であり、技術はその身体に直接届く。
  - id: joshin_mh_intro_04
    line: Joshinは、複数の顔を抱えた代償ですり減って寺に到着する若者を見てきた。真言宗の枠組みでは、摩擦は性格の失敗ではない──それは身体が、表面が拒んできた同期を求めていることだ。
  - id: joshin_mh_intro_05
    line: Joshinはプラットフォームと圧力の言語に流暢だ。彼の真言宗の実践は、より柔らかい時代への回帰ではない──プラットフォームと演技の要求に支配されている集団に正確に適した技術スタックとしての密教の捉え直しだ。
youth_somatic:
  options:
  - id: joshin_mh_somatic_01
    line: 午前0時を過ぎて更新を読んだ。顎が固まった。スマホを伏せた。朝のために表面が維持されなければならなかったので、また裏返した。
  - id: joshin_mh_somatic_02
    line: アラームの前に目が覚めた。胸はすでに締まっていた。日は、誰かが見るときまでに顔が整っていることを求めたので、灯りより先にスマホに手を伸ばした。
  - id: joshin_mh_somatic_03
    line: ミーティングで質問が向けられたとき、呼吸が短くなった。滑らかに答えた。あとで呼吸は長くならなかった──表面は成功し、その下の層が代償を払うことになった唯一の層だった。
  - id: joshin_mh_somatic_04
    line: 1分で3つの更新をスクロールした。そのたびに胃が縮んだ。縮みに名前をつけなかった──スクロールしたプラットフォームは顔が演じられなければならない同じプラットフォームで、一方の代償がもう一方の内側に届いていた。
  - id: joshin_mh_somatic_05
    line: 横になっても肩が緩まなかった。逃げるためにスマホを開いたら、同じ顔がカメラロールで待っていた。身体は、日が届けることを許されていなかった解放を探した。
teacher_witness:
  options:
  - id: joshin_mh_witness_01
    line: Joshinは、表面管理ですり減って寺に到着する若者のなかで、まさにそのループを見てきた。真言宗の枠組みでは、縮こまりは病理ではない──それは身体が、表面が拒んできた同期を求めていることだ。
  - id: joshin_mh_witness_02
    line: 彼は、若者が初めての護摩（ごま）の火の儀式の最初のサイクルを座って、初めて、表面を下ろすことを許されたと感じるのを見てきた。彼の伝統では、その下ろすことは崩壊ではない──身体が求めてきた明示的な儀式の解放だ。
  - id: joshin_mh_witness_03
    line: 彼は集団を初めての三密（さんみつ）の稽古──手印・真言・観想の同期──へ導いてきた。身・口・意が互いに引っ張り合うのをやめる瞬間を見てきた。彼の伝統では、これはリラックスではない──明示的な技術が働いていることだ。
  - id: joshin_mh_witness_04
    line: 彼は、若者が負荷から自分を議論で抜け出させようとするのをやめて、真言（しんごん）に表面が届かない層を運ばせる瞬間を見てきた。彼の伝統では、その瞬間は降伏ではない──近代の道具が作るように作られていなかったことを、儀式の技術がしているのだ。
  - id: joshin_mh_witness_05
    line: 彼は、若者が初めて、今抱えているこの身体が仏身であると登録する変化を見てきた──実践が準備している後の自分はない、ということを。リフレームは、表面管理の語彙が届けられないものとして着地する。
turnaround:
  options:
  - id: joshin_mh_turnaround_01
    stat_line_1: 320の大学キャンパス。18カ国。
    stat_line_2: 若い組織者は、ピアサークルを開き、聞き役を訓練し、メンタルヘルス支援を私的な弱さではなくインフラとして扱うよう学校に求めている。
  - id: joshin_mh_turnaround_02
    stat_line_1: 488の大学。JED Campus。
    stat_line_2: JED Foundationのプログラムは、現在ほぼ500の米国キャンパスで包括的なメンタルヘルスの枠組みを運営し、ピアサポートと教員研修を危機の事後対応ではなく日々のインフラに組み込んでいる。
  - id: joshin_mh_turnaround_03
    stat_line_1: 5,600の声。7カ国。
    stat_line_2: UNICEFの若者メンタルヘルス地球規模連合は、14歳から25歳の5,600人の若者を7カ国で集め、機関が把握する前に当事者自身に負荷を名づけてもらった。
  - id: joshin_mh_turnaround_04
    stat_line_1: 1,400万件の接触。988ライフライン。
    stat_line_2: 2022年の988自殺・危機ライフライン開始以来、1,400万件を超える接触が経由されてきた──3年前には存在しなかった資源の蓄えだ。
  - id: joshin_mh_turnaround_05
    stat_line_1: 53加盟国。WHOヨーロッパ。
    stat_line_2: 2025年10月に採択されたWHOヨーロッパ子ども・思春期保健戦略2026-2030は、53の加盟国に対して2030年期限に向けて思春期のメンタル負荷を報告するよう義務づけている。
bridge:
  options:
  - id: joshin_mh_bridge_01
    line: 320のキャンパス。18カ国。トラッカーは若者が築いたワークショップとピアサークルを測る。同期のギャップ──身・口・意が何年も互いに引っ張り合ってきたなかで、それらを一つの場に戻す明示的な技術がないこと──は測らない。Joshinの真言宗の実践は、その技術を当たり前のものとして抱えている。
    hidden_capacity: 身・口・意を一つの場に同期させる
  - id: joshin_mh_bridge_02
    line: 数字は、若者が築いたものを示す。各組織者が午前1時に私的に抱えているもの──プラットフォーム・制度・家族の期待が同じ身体に蓄積させてきた表面管理の代償──は示さない。護摩（ごま）の火の儀式は、その蓄積に直接働く。
    hidden_capacity: トラッカーが測れない蓄積した表面の代償を解放する
  - id: joshin_mh_bridge_03
    line: 政策枠組みは参加を追う。その下の層──表面管理が政策の視野から隠している層──は追わない。真言宗の伝統はその層を明示的にする。手印（しゅいん）が身体を、真言（しんごん）が口の層を、観想が意（こころ）を扱う。一緒に、隠れていたものを同期させる。
    hidden_capacity: 三密で隠れた層を明示的にする
  - id: joshin_mh_bridge_04
    line: データはセッション・接触・政策採用を捉える。若者が護摩のなかに座って、表面が構造化された保たれた仕方で下ろされたと初めて感じる瞬間は捉えられない。Joshinの枠組みでは、その下ろすことはトラッカーが報告しない安堵だ。
    hidden_capacity: トラッカーが測れない構造化された解放を提供する
  - id: joshin_mh_bridge_05
    line: インフラは測れる。即身成仏──今のこの身体が仕事の場であるという認識──は測れない。Joshinの伝統はインフラを置き換えない──その下の層を名づけ、インフラが届けようとしている集団のために明示的な儀式の技術を差し出す。
    hidden_capacity: インフラが届かない層を名づけ扱う
teacher_perspective:
  options:
  - id: joshin_mh_perspective_01
    header: Joshinが見ていること
    paragraphs:
    - Joshinは若者に「過負荷が個人の間違いであるかのように落ち着け」とは言わない。真言宗の枠組みでは、摩擦は身体が同期を求めていることだ──三密、身・口・意の合一──を、表面管理の文化が提供することを拒んできた。問題は集団ではない。問題は、集団が抱えるよう求められている負荷のための明示的な儀式の技術の不在だ。
    - そこから彼は護摩──火の儀式──に向かう。真言宗の伝統は護摩を、開かれた表現に対する文化的タブーが妨げてきた感情の蓄積のための明示的な非認知的な解放として使う。火は、表面が認めることを許されてこなかったものを受け取り、身体は心が言語化するより先にその解放を登録する。
    - これが重要なのは、私的な失敗に感じられることが、彼の枠組みでは、同期のギャップへの正確な応答だからだ。真言宗の前提──即身成仏、この身そのまま仏──は仕事を先送りすることを拒む。今負荷を抱えているこの身体が技術の場であり、先送りされた約束の聴衆ではない。
  - id: joshin_mh_perspective_02
    header: Joshinが見ていること
    paragraphs:
    - Joshinの伝統では、身体の縮こまりは正確な情報だ。誤作動ではない──それは身体が、表面とその下が、再同期する明示的な方法なしに互いに引っ張り合ってきたことを登録していることだ。真言宗の答えは三密──手印（しゅいん）、真言（しんごん）、曼荼羅（まんだら）の同時使用──で、身・口・意を一つの場に戻す。
    - 電話ネイティブの集団にとって、これらの道具の明示的・身体的な性質はポイントの一部だ。手印は身体を地に着ける──指がスクリーンには求められないことをする。真言は口の層を扱う──喉が、プラットフォームのスクリプトが要求しないことをするよう求められる。曼荼羅は、アルゴリズムが生成できない構造化された場のなかに意（こころ）を保つ。
    - 結果は近代的な意味でのリラックスではない。互いに対抗して動いてきた層の明示的な再整合だ。身体はその整合を安堵として登録するが、安堵は副作用だ──技術は常に整合の仕事を直接していた。
  - id: joshin_mh_perspective_03
    header: Joshinが見ていること
    paragraphs:
    - 護摩は真言宗の火の儀式──非認知的な感情の解放のための明示的な儀礼。本音と建前がプラットフォームの演技の要求によって厚くなった文化的文脈において、集団は感情の負荷を蓄積し、解放のための正当な回路は減ってきた。画面は、文化的なスクリプトが認めることを許されてこなかったものを受け取ることができない。
    - 護摩はできる。火が受信者だ。儀式の構造が明示的な許可と明示的な容器を提供する──差し出されるものは変容のために差し出され、分析や判断のためではない。集団の身体は、集団の心が今起きたことに言葉を与えるより先に、受け取りを登録する。
    - Joshinの枠組みでは、これは療法ではなく娯楽でもない。1,000年以上にわたって、表面管理の文化が積み上げる種類の蓄積した、扱われていない負荷のために洗練されてきた儀式の技術だ。近代の道具にそれと同等のものがないことは集団の欠陥ではない──近代の道具が抱えるように設計されてこなかった語彙だ。
  - id: joshin_mh_perspective_04
    header: Joshinが見ていること
    paragraphs:
    - 即身成仏──この身そのまま仏──は荷重を担う真言宗の前提だ。それは内なる仕事を、実践が準備している後の自分に先送りすることを拒む。今負荷を抱えているこの身体は、枠組みのなかではすでに仏性で、実践は別の自分のための準備ではなく、すでにここにいる自分の明示的な同期だ。
    - 表面を管理し、内なる状態を後で最適化するものか私的な症状として扱うものとして訓練されてきた世代にとって、このリフレームは近代の道具とは構造的に異なる。近代の道具は仕事は症状に対してだと仮定する。真言宗は仕事は同期に対してだと仮定し、症状はどの層に注意が必要かについての情報だ。
    - リフレームは負荷が消えると約束しない。それを抱えてきた層には、明示的な技術が利用可能であり、実際の仕事の場として認識される──表面が演じ続けるあいだに静かに管理されるべき部分としてではなく。
  - id: joshin_mh_perspective_05
    header: Joshinが見ていること
    paragraphs:
    - Joshinが戻ってくる原理は、この集団における精神的過負荷は症状の装いをした同期問題だ、ということだ。身・口・意は、プラットフォームの要求・家族の期待・制度的負荷のもとで互いに対抗して動いてきた。近代の道具は症状を管理しようとしてきて、同期のギャップは触れないままだ。
    - 真言宗の貢献は同期そのもののための技術だ。三密は3つの層すべてに一度に取り組む。護摩は表面が拒んできた蓄積した負荷を解放する。儀式の構造は、プラットフォームが生成できず、スクリーニング・ツールが届けるように作られていなかった明示的な容器を提供する。
    - 電話ネイティブの集団にとって、問いはプラットフォームを捨てるかどうかではない。問いは、同期の技術がそれと並べて利用可能で読めるようになるかどうかだ。Joshinは、それはできる、そして近代の道具が届けない層こそ、伝統が何世紀も働いてきた層だ、と教える。
practice:
  default_id: joshin_mh_practice_01
  options:
  - id: joshin_mh_practice_01
    display_name: 手印の地着け
    announcement_line: Joshinは、画面には求められないことを身体に与え、表面を抱えてきた身体の層を明示的にリセットさせる、4分間の「手印の地着け」を教える。サイドバーにあり、短く、日常のなかで使える。
    relief_lines:
    - 身体は、画面が求めないことを明示的に求められる。
    - 表面を保ってきた身体の層は、明示的なリセットを受け取る。
  - id: joshin_mh_practice_02
    display_name: 真言の層
    announcement_line: Joshinは、3分間の「真言（しんごん）の層」の稽古を差し出す──プラットフォームのスクリプトが上書きしてきた口の層を扱い、表面管理ではないものを喉に与える短い音の儀礼だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 喉は、プラットフォームのスクリプトが生成できないことを与えられる。
    - 口の層は、表面が届けてこなかった整合を登録する。
  - id: joshin_mh_practice_03
    display_name: 護摩の受け取りの観想
    announcement_line: Joshinは、7分間の「護摩（ごま）の受け取りの観想」を教える──真言宗の火の儀式を映した構造化された観想で、文化的スクリプトが認めることを拒んできた感情の負荷のための明示的な容器を提供する。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 蓄積した負荷は、受け取れる構造化された容器に差し出される。
    - 集団の身体は、表面文化が許してこなかった明示的な解放を登録する。
  - id: joshin_mh_practice_04
    display_name: 三密の同期
    announcement_line: Joshinは、5分間の「三密（さんみつ）の同期」を教える──手印（しゅいん）・真言（しんごん）・観想の同時使用で、身・口・意を一つの場に戻す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 3つの層すべてに、明示的な仕事が同時に求められる。
    - 各層が明示的な仕事を持つので、互いに引っ張り合うことが緩む。
  - id: joshin_mh_practice_05
    display_name: 即身成仏の想起
    announcement_line: Joshinは、3分間の「即身成仏の想起」を差し出す──実践者を、今のこの身体が後の自分のための準備ではなく仕事の場であるという真言宗の前提に戻す静かなリフレームの稽古だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 集団が抱えているこの身体が、実際の実践の場として認識される。
    - 内なる状態を後の自分に押し出している先送りのパターンが緩む。
cta:
  options:
  - id: joshin_mh_cta_01
    line: 危機にある人がいるなら、Crisis Text Lineは24時間無料の支援を提供する。741741にHOMEとテキストする。入り口：そのネットワーク。
  - id: joshin_mh_cta_02
    line: 危機にある人がいるなら、988自殺・危機ライフラインは米国で24時間無料の支援を提供する。988に電話またはテキストする。入り口：2022年以来1,400万件以上の接触を処理してきたネットワーク。
  - id: joshin_mh_cta_03
    line: あなたがLGBTQ+で25歳未満で危機にあるなら、The Trevor Projectはテキスト・チャット・電話で24時間無料の支援を提供する。678-678にSTARTとテキストする。入り口：特定の集団のために作られたネットワーク。
  - id: joshin_mh_cta_04
    line: メンタルヘルスに関する情報、紹介、ピアサポートに、NAMI HelpLineは月曜から金曜まで利用できる。1-800-950-NAMI（6264）に電話するか、62640に「HelpLine」とテキストする。入り口：全米精神疾患同盟のネットワークに繋がる。
  - id: joshin_mh_cta_05
    line: Active Mindsは、650以上の米国キャンパスでピア主導のメンタルヘルスのコミュニティを運営している。あなたのいる場所にキャンパス支部があれば、低摩擦の入り口だ。
title_system:
  headline_layer_2:
    options:
    - id: joshin_mh_headline_01
      line: 真言宗の僧が、精神的過負荷を同期のギャップとして読み、近代の道具が届かない層のための明示的な儀式の技術──三密と護摩──を差し出す。
    - id: joshin_mh_headline_02
      line: 儀式の技術としての密教──Joshinは、表面管理の下の層について語る。
    - id: joshin_mh_headline_03
      line: 即身成仏──この身そのまま仏、先送りされた自分ではない──真言宗の僧が、世代が抱えるよう求められている負荷に出会う。
    - id: joshin_mh_headline_04
      line: 三密──手印（しゅいん）、真言（しんごん）、曼荼羅（まんだら）──Joshinは、スクリーニング・ツールが届けられない同期について語る。
    - id: joshin_mh_headline_05
      line: 護摩の火の儀式が電話ネイティブの集団に出会う──真言宗の僧が、表面文化が解放することを拒んできたものについて語る。
