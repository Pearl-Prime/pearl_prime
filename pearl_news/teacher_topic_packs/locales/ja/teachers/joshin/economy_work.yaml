hook_personal:
  options:
  - id: joshin_ew_hook_personal_01
    line: スケジュール・アプリが更新され、顎が固まるのに気づく前にシフトを取った。身体はすでに計算をしていた。心は1週間自分自身と議論してきた。口の層は言うべきことを言っていない。3つの層が活性化されて、利用可能な道具はひとつだった。
  - id: joshin_ew_hook_personal_02
    line: 生産性コースをやった。金融リテラシーのモジュールもやった。日曜日の夜、胸はまだ締まっている。与えられた道具は表面に取り組んでいた──その下の層は不安定さを自分ひとりで抱えてきた。
  - id: joshin_ew_hook_personal_03
    line: 午前1時、朝のAI置き換え記事が正しかったかを確認する。喉が締まり、心が走り、身体は2時間動いていない。3つの層がひとつの問いを抱えていて、利用可能な同期の技術はない。
  - id: joshin_ew_hook_personal_04
    line: 副業のアドバイスが触れないやり方で疲れている。集団が今いる身体は起きている仕事の場であり、生産性の道具はその身体を、仕事そのものではなく仕事への障害として扱ってきた。
  - id: joshin_ew_hook_personal_05
    line: あなたの一部は、問いがスケジュールをどう最適化するかではないと知っている。問いは、身・口・意が同期した場として届けられているかどうか──そして真言宗はその届けるための明示的な儀式の技術を、スケジュール・アプリのサイクルの内側でさえ持っている。
hook_big_picture:
  options:
  - id: joshin_ew_hook_big_01
    line: 若者の仕事の負荷は時間数だけの話ではない。3層の圧力──身・口・意がスケジュール・アプリの時間で走るあいだ、継承された道具は一度にひとつの層にしか取り組まない──が、集団に対して何年もかけて何をするか、ということだ。
  - id: joshin_ew_hook_big_02
    line: ひとつの世代が、不安定さ、資格証への不安、AI置き換えの不確実性を同時に抱えるよう求められている──そして継承された枠組みはそれぞれを私的に扱う。真言宗の伝統は、これを明示的な儀式の技術を伴う同期のギャップとして読む。
  - id: joshin_ew_hook_big_03
    line: 特に日本では、本音と建前のギャップがプラットフォーム労働の構造によって厚くなった──下の本当の疲労は、以前のどの世代よりも広く、表面はまだチームチャットで演じられなければならない。
  - id: joshin_ew_hook_big_04
    line: 真言宗の前提──即身成仏、この身そのまま仏──は仕事を、資格証やキャリアの弧が準備している後の自分に先送りすることを拒む。シフトの合間に集団が今いる身体は、実際の実践の場だ。
  - id: joshin_ew_hook_big_05
    line: 仕事からの離脱として読まれているものは、しばしば身体が表面を管理し続けることを拒んでいることだ──同期の技術が決して届けられてこなかったあいだに。真言宗は何世紀もその技術を抱えてきた。
teacher_intro:
  options:
  - id: joshin_ew_intro_01
    line: Joshinは真言宗（密教）の僧で、何十年も不安定な仕事のサイクルにいる若者と道場で働いてきた。同期の技術を受け取ってこなかった集団に対して、スケジュール・アプリのループが何をするかを見てきた。
  - id: joshin_ew_intro_02
    line: Joshinは真言宗の系譜で教える。労働改革者としては自らを位置づけない──彼は、1,000年以上、スケジュールと生産性コースが届けない身・口・意の同期に取り組んできた伝統の儀式の技術者だ。
  - id: joshin_ew_intro_03
    line: Joshinは即身成仏──この身そのまま仏──の原理から働く。キャリアの弧が準備している先送りされた自分はない。シフトの合間に集団が今いる身体は、すでに仕事の場だ。
  - id: joshin_ew_intro_04
    line: Joshinは、何年ものスケジュール・アプリの不安定さのあとに寺に到着する若者を見てきた。真言宗の枠組みでは、摩擦は動機の失敗ではない──身体が、生産性の道具が届けてこなかった同期を求めていることだ。
  - id: joshin_ew_intro_05
    line: Joshinはプラットフォームと圧力に流暢だ。彼の真言宗の実践は、仕事の生活がスケジュール・アプリで、内なる状態が別のモジュールで解決される後回しの問題として扱われてきた集団のための技術スタックとして密教を捉え直す。
youth_somatic:
  options:
  - id: joshin_ew_somatic_01
    line: 午後10時にスケジュール・アプリを開いた。顎が固まった。シフトを取った。あとで呼吸は長くならなかった──次のシフトがすでに同じ身体に向かっていたから。
  - id: joshin_ew_somatic_02
    line: 通知がレートの変更を告げた。胸が締まった。チームチャットで何も言わなかった──口の層に、たった今起きたことのレジスターがなかったから──そして心はプラットフォームのロジックと議論し始めた。
  - id: joshin_ew_somatic_03
    line: AI置き換え記事を見て胃が縮んだ。夕食で家族に言えなかったものに喉が締まった。呼吸が短くなった。3つの層が負荷を登録し、どれも明示的な道具を受け取らなかった。
  - id: joshin_ew_somatic_04
    line: 連続で2つ目のシフトを取り、肩が緩まなかった。心は次の2週間がカバーしなければならないことを追跡し続けた。身体は明示的な同期の道具なしに何年も不安定さの計算をしてきた。
  - id: joshin_ew_somatic_05
    line: 午前6時、朝のシフトの前に洗面所に座った。顎が固まった。喉は沈黙していた。心は事前に一日を走らせていた。プラットフォームはどの層についても最適化のヒントを与えなかった。
teacher_witness:
  options:
  - id: joshin_ew_witness_01
    line: Joshinは、スケジュール・アプリのサイクルのあとに寺に到着する若者のなかで、まさにそのループを見てきた。真言宗の枠組みでは、摩擦は動機の失敗ではない──身体が、生産性の道具が届けてこなかった同期を求めていることだ。
  - id: joshin_ew_witness_02
    line: 彼は、若者が不安定さの負荷の下で初めての護摩（ごま）の火の儀式を座って、初めて、スケジュール・アプリが身体に蓄積してきたものが明示的な解放のための回路を持つと感じるのを見てきた。彼の伝統では、それは演技としてのカタルシスではない──明示的な儀式の技術が働いていることだ。
  - id: joshin_ew_witness_03
    line: 彼は集団をシフトの合間の初めての三密──手印・真言・観想の同期──へ導いてきた。身・口・意が互いに引っ張り合うのをやめる瞬間を見てきた。彼の伝統では、これはリラックスではない──3つの層に同時に届ける技術だ。
  - id: joshin_ew_witness_04
    line: 彼は、若者が不安定さから自分を議論で抜け出させようとするのをやめて、真言（しんごん）に議論が届かない層を運ばせる瞬間を見てきた。彼の伝統では、その瞬間は降伏ではない──生産性コースが作るように作られていなかったことを、儀式の技術がしているのだ。
  - id: joshin_ew_witness_05
    line: 彼は、若者が即身成仏──シフトの合間に集団が今いる身体がすでに実践が負荷に出会う場所──を登録する変化を見てきた。リフレームは、表面の生産性の語彙が届けられないものとして着地する。
turnaround:
  options:
  - id: joshin_ew_turnaround_01
    stat_line_1: 7,300万人の失業者。ILO 2024年。
    stat_line_2: 国際労働機関は2024年に7,300万人の若者が世界で失業していると推定する──新しいILO若年雇用プログラムとFair Workweek運動を枠づける数字だ。
  - id: joshin_ew_turnaround_02
    stat_line_1: Fight for $15。11州とDC。
    stat_line_2: Fight for $15運動は米国の11州とワシントンDCで最低賃金の引き上げを確保してきた──若者主導の圧力を制定された労働政策に翻訳している。
  - id: joshin_ew_turnaround_03
    stat_line_1: 1,200以上の協同組合。USFWC。
    stat_line_2: 米国労働者協同組合連盟は現在1,200以上の労働者所有の協同組合を調整し、10年前にはこの規模で存在しなかった、不安定でない仕事のためのインフラを築いている。
  - id: joshin_ew_turnaround_04
    stat_line_1: 米国7都市とオレゴン。Fair Workweek。
    stat_line_2: Fair Workweekのスケジュール法は米国7都市とオレゴン全州で施行されている──スケジュール・アプリの圧力を施行可能な労働者の権利の法律に翻訳している。
  - id: joshin_ew_turnaround_05
    stat_line_1: EU27カ国。プラットフォーム労働者指令。
    stat_line_2: 2024年採択のEUプラットフォーム労働者指令は、27の加盟国に対してプラットフォーム労働者を再分類し、アルゴリズム管理に対応するよう義務づける──一世代前には存在しなかった多国間の労働保護だ。
bridge:
  options:
  - id: joshin_ew_bridge_01
    line: 7,300万人の失業者。ILO。トラッカーは労働市場の参加を測る。シフトの合間に各労働者が抱える3層の負荷──不安定さの下で身・口・意が同時に抱えられること──は測らない。Joshinの真言宗の実践は、その負荷に三密を通じて直接働く。
    hidden_capacity: 不安定さの下で身・口・意を同期させる
  - id: joshin_ew_bridge_02
    line: 数字は、建てられたものを示す。各若い労働者がダブル・シフトの終わりに私的に抱えるもの──スケジュール・アプリ、チームチャット、家族の期待が同じ身体に蓄積させてきた表面管理の代償──は示さない。護摩はその蓄積に直接働く。
    hidden_capacity: トラッカーが測れない蓄積した不安定さの負荷を解放する
  - id: joshin_ew_bridge_03
    line: 政策枠組みは賃金とスケジュールを追う。同期のギャップ──プラットフォーム労働のループの内側で身・口・意が何年も互いに引っ張り合ってきたこと──は追わない。真言宗の伝統はそのギャップを明示的にし、3つの層に直接技術を届ける。
    hidden_capacity: 3つの層すべてに同時に届ける
  - id: joshin_ew_bridge_04
    line: データは労働市場と政策採用を捉える。若い労働者が三密のなかに座って、何年ぶりかに身・口・意が互いに引っ張り合うのをやめるのを初めて感じる瞬間は捉えられない。Joshinの枠組みでは、その瞬間はトラッカーが報告しない安堵だ。
    hidden_capacity: トラッカーが示せない明示的な同期の認識を登録する
  - id: joshin_ew_bridge_05
    line: インフラは測れる。即身成仏──今のこの身体が、シフトの合間に、仕事の場であるという認識──は測れない。Joshinの伝統はインフラを置き換えない──その下の層を名づけ、インフラが届けようとしている集団のために明示的な儀式の技術を差し出す。
    hidden_capacity: インフラが届かない層を名づけ扱う
teacher_perspective:
  options:
  - id: joshin_ew_perspective_01
    header: Joshinが見ていること
    paragraphs:
    - Joshinは若い労働者に「時間管理の欠陥であるかのようにもっと上手に時間を管理しろ」とは言わない。真言宗の枠組みでは、摩擦は身体が同期を求めていることだ──三密、身・口・意の同時の関与──を生産性の道具が届けることを拒んできた。問題は集団ではない。問題は、集団が抱えている負荷のための明示的な儀式の技術の不在だ。
    - そこから彼は即身成仏に向かう。今のこの身体が仕事の場であるという真言宗の前提は、内なる仕事をキャリアの弧が準備している後の自分に先送りすることを拒む。シフトの合間に集団が今いる身体は、すでに実践が負荷に出会う場所だ。
    - これが重要なのは、個人の失敗に感じられることが、彼の枠組みでは、同期のギャップへの正確な応答だからだ。リフレームはスケジュール・アプリを取り除かない──生産性の道具が飛ばしてきた層を含む構造のなかにスケジュールを置く。
  - id: joshin_ew_perspective_02
    header: Joshinが見ていること
    paragraphs:
    - Joshinの伝統では、不安定さの負荷は、どの層が活性化されてきたかについての情報として読まれる。顎が固まる──身体。喉が締まる──口。心が走る──意。生産性の道具は一度にひとつの層に取り組んできた。三密は3つすべてに明示的・身体的な仕事を同時に行う。
    - 電話ネイティブの集団にとって、三密の明示的・身体的な性質はポイントの一部だ。手印は身体を地に着ける──指がスケジュール・アプリには求められないことをする。真言は口の層を扱う──喉が、チームチャットが要求しないことを求められる。曼荼羅は、アルゴリズムが生成できない構造化された場のなかに意を保つ。
    - 結果は仕事の最適化ではない。持続的な不安定さの圧力の下で互いに対抗して動いてきた層の明示的な再整合だ。身体はその整合を安堵として登録する──技術は常に整合の仕事を直接していた。
  - id: joshin_ew_perspective_03
    header: Joshinが見ていること
    paragraphs:
    - 護摩は真言宗の火の儀式──蓄積した負荷の明示的・非認知的な解放。スケジュール・アプリのサイクルは、不安定さを吸収するように集団を訓練してきた──吸収が生み出す摩擦を解放するための明示的な回路なしに。何年もかけて、摩擦は生産性コースが届かない層に蓄積する。
    - 護摩はできる。火が受信者だ。儀式の構造が明示的な許可と明示的な容器を提供する──不安定さの負荷は変容のために差し出され、分析や判断のためではない。集団の身体は、集団の心が今起きたことに言葉を与えるより先に、受け取りを登録する。
    - Joshinの枠組みでは、これは仕事の回避ではなく仕事の演技でもない。1,000年以上にわたって、生産性管理の文化が積み上げる種類の蓄積した、扱われていない負荷のために洗練されてきた儀式の技術だ。
  - id: joshin_ew_perspective_04
    header: Joshinが見ていること
    paragraphs:
    - 即身成仏──この身そのまま仏──は荷重を担う真言宗の前提だ。それは内なる仕事を、キャリアの弧が準備している後の自分に先送りすることを拒む。シフトの合間に集団が今いる身体は、枠組みのなかではすでに実践が負荷に出会う場所だ。
    - 仕事を運ぶ身体を背景として扱い、資格証やキャリアを仕事の単位として扱うものとして訓練されてきた世代にとって、このリフレームは構造的に異なる。近代の道具は仕事は生産性の出力に対してだと仮定する。真言宗は仕事は同期に対してだと仮定し、生産性は同期が起きたあとに届くものだ。
    - リフレームは不安定さが消えると約束しない。それを抱えてきた層が、実際の仕事の場として認識される──そして、近代の道具が飛ばしてきた同期のための明示的な技術を受け取る。
  - id: joshin_ew_perspective_05
    header: Joshinが見ていること
    paragraphs:
    - Joshinが戻ってくる原理は、不安定さの負荷は私的な症状の装いをした同期問題だ、ということだ。身・口・意はスケジュール・アプリの時間で同時に走るよう求められてきて、継承された道具は一度にひとつの層に取り組んできた。
    - 真言宗の貢献は同期そのもののための技術だ。三密は3つの層すべてに一度に取り組む。護摩は表面が拒んできた蓄積した不安定さの負荷を解放する。儀式の構造は、プラットフォームが生成できない明示的な容器を提供する。
    - 電話ネイティブの集団にとって、問いはスケジュール・アプリを捨てるかどうかではない。問いは、同期の技術がそれと並べて利用可能になるかどうかだ。Joshinは、それはできる、そして近代の道具が届けない層こそ、伝統が何世紀も働いてきた層だ、と教える。
practice:
  default_id: joshin_ew_practice_01
  options:
  - id: joshin_ew_practice_01
    display_name: 手印のシフトの地着け
    announcement_line: Joshinは、シフトの合間に、スケジュール・アプリには求められないことを身体に与える明示的な手印の稽古、4分間の「手印のシフトの地着け」を教える。サイドバーにあり、短く、日常の仕事のなかで使える。
    relief_lines:
    - 身体は、スケジュール・アプリが生成できないことを明示的に求められる。
    - 不安定さを抱えてきた身体の層は、明示的なリセットを受け取る。
  - id: joshin_ew_practice_02
    display_name: 真言の声のリセット
    announcement_line: Joshinは、チームチャットのスクリプトが上書きしてきた口の層を扱う、3分間の「真言の声のリセット」を差し出す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 喉は、チームチャットが生成できないことを与えられる。
    - 口の層は、プラットフォームの表面が拒んできた整合を登録する。
  - id: joshin_ew_practice_03
    display_name: 護摩の不安定さの受け取り
    announcement_line: Joshinは、7分間の「護摩（ごま）の不安定さの受け取り」の観想を教える──スケジュール・アプリのサイクルのあいだに蓄積した摩擦のための明示的な容器を提供する構造化された観想だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 蓄積した不安定さの負荷は、受け取れる構造化された容器に差し出される。
    - 集団の身体は、生産性の文化が許してこなかった明示的な解放を登録する。
  - id: joshin_ew_practice_04
    display_name: 三密の仕事の同期
    announcement_line: Joshinは、シフトの合間に、5分間の「三密（さんみつ）の仕事の同期」を教える──手印（しゅいん）・真言（しんごん）・観想の同時使用で、身・口・意を一つの場に戻す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 3つの層すべてに明示的な仕事が同時に求められる。
    - 不安定さの下で互いに引っ張り合うことが緩む。
  - id: joshin_ew_practice_05
    display_name: 即身成仏のシフトの想起
    announcement_line: Joshinは、3分間の「即身成仏のシフトの想起」を差し出す──実践者を、シフトの合間の身体が後の自分のための準備ではなくすでに仕事の場であるという真言宗の前提に戻す静かなリフレームの稽古だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - シフトの合間の身体が、先送りされたキャリアの聴衆ではなく実際の実践の場として認識される。
    - 内なる状態を後の自分に押し出している先送りのパターンが緩む。
cta:
  options:
  - id: joshin_ew_cta_01
    line: USFWC（米国労働者協同組合連盟）は1,200以上の労働者所有の協同組合を調整している。入り口：その加盟ネットワークと労働者協同組合の訓練。
  - id: joshin_ew_cta_02
    line: Fight for $15は米国の11州とワシントンDCで最低賃金の引き上げを確保してきた。入り口：その州と地域のキャンペーン。
  - id: joshin_ew_cta_03
    line: ILO若年雇用プログラムは、加盟国全体で適切な若年雇用のための政策と技術的支援を構築する。入り口：その国レベルのプログラムと若者対話。
  - id: joshin_ew_cta_04
    line: Center for Popular Democracyは、低賃金労働者と職場の権利のための草の根の政策キャンペーンを組織する。入り口：その加盟組織とFair Workweekキャンペーン・ネットワーク。
  - id: joshin_ew_cta_05
    line: NELP（全米雇用法プロジェクト）は、低賃金労働者と失業労働者のための米国主導の法的擁護者だ。入り口：そのアドボカシー・ネットワークと研究から政策へのパイプライン。
title_system:
  headline_layer_2:
    options:
    - id: joshin_ew_headline_01
      line: 真言宗の僧が、不安定さの負荷を3層の同期問題として読む──そして生産性コースが届けられない明示的な儀式の技術を差し出す。
    - id: joshin_ew_headline_02
      line: 儀式の技術としての密教──Joshinは、スケジュール・アプリのサイクルの下の層について語る。
    - id: joshin_ew_headline_03
      line: 即身成仏──今のこの身体が、シフトの合間に、仕事の場──真言宗の僧が、キャリアの弧が強化する先送りのパターンについて語る。
    - id: joshin_ew_headline_04
      line: 三密──手印（しゅいん）、真言（しんごん）、曼荼羅（まんだら）──Joshinは、スケジュール・アプリが届けられない同期について語る。
    - id: joshin_ew_headline_05
      line: 護摩の火の儀式が不安定さの下の電話ネイティブの集団に出会う──真言宗の僧が、プラットフォームが解放できない蓄積した負荷について語る。
