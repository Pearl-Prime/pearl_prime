hook_personal:
  options:
  - id: hook_personal_01
    line: シフトのたびに、不確実性を成熟として扱うよう求められる。あなたは走り続け、その裏にどれだけ見えない努力があるかも知っている。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: '経済的ストレスはいま、不安定な条件の下での自己管理として降りてくる──雇われやすさを保ち、柔軟であり、穏やかでいる。そして制度が努力を公平に報いているかのように振る舞う。'
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei（真言密教系の真言の教師）は、実践で若者が労働の不安定さをまるで人格への判決のように背負うのを見てきました。彼らは「もっと働くには」だけを問うのではありません。変動を自己責めに変えずに済ますにはどうか、スケジュールが変わり続けるなかで身・口・意をそろえて行動するにはどうか、と問っています。
  - id: teacher_intro_02
    line: Joshin Sensei（真言仏教の教師）は、実践の場で不安定な仕事が若者に何をするかを見てきました。学生も労働者も、努力が無意味かどうかは問いません。制度が静止を拒むなかで、次の一手を打てるほど安定を保つにはどうか、と問いています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'スケジュールアプリを確認します。胃が落ちます。また更新します。シフトが足元から変わる前に、スクショを撮ります。

      LOOP_SEQUENCE: "アプリを確認した。胃が落ちた。また更新した。スクショを撮った。"'
  - id: youth_somatic_02
    line: '名簿を開きます。あごが締まります。更新します。現実が動き続けるので、スクショを撮ります。

      LOOP_SEQUENCE: "名簿を開いた。あごが締まった。更新した。スクショを撮った。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Joshin Senseiは、学生と若い労働者のなかにこの仕事のループそのもの──確認、落ちる、更新、一瞬だけ事実を固定しようとするスクショ──を見てきました。
  - id: teacher_witness_02
    line: 実践の場でその順序を見てきました。アプリが開き、身体が反応し、指が更新し、スクショが、制度が固定してくれないものを留めます。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 若い労働者と学生労働者の連帯が条件を記録し、案件を起こし、地域の労働ルールを変えています。
  - id: turnaround_02
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 若者は組織し、安定したシフト、公正な賃金、変動を人格の試練のように扱わない環境のための研修を開いています。
bridge:
  options:
  - id: bridge_01
    line: 1,240 cases. 32 cities. トラッカーは若い労働者が何に挑んだかを測ります。不安定な一週間のあと、次の申し立てやシフト交渉を可能にしたもの──不安定さを自己像にせずに行動できる容量──の欄はありません。スクショを撮った人にはそれが要りました。Joshin Senseiの真言の伝統には、条件が動いても残るものに名前があります。理具の成仏（Rigu no Jobutsu）、本具の覚りの価値です。実践は、この身体のなかで、圧力の下でそれを守ることです。
  - id: bridge_02
    line: 労働のトラッカーは案件と政策上の勝利を数えます。若い人が次のシフトや会議に顔を出し、スケジュールに自己の価値全体を預けずにいられる内面のそろえは数えません。次の申し立てにはそれが要ります。アプリを更新した労働者にも要ります。Joshin Senseiの伝統は千年以上それを実践してきました。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Joshin Senseiが見ていること
    paragraphs:
    - Joshinはまず不安定さと自己同一化を分けます。真言では、理具の成仏は覚りの本性がすでに在ることを意味します。安定雇用が創り、悪いシフトが壊すものではありません。苦しみは、変わる条件が個人的失敗の証拠として内面化すると膨らみます。
    - ここでの三密は、根性の言葉ではありません。世界が動き続けるときに身・口・意をひとつの所作にもどす規律です。次の一手が、変動に自己全体が崩壊せずに可能になるように。
    - '再フレームはこう精密になります。「自分が壊れている、間違っている」に感じることが、しばしば不安定を前提に組み立てられた経済への正確な反応です。問題は、制度・構造が個人にひとりで背負わせるものを生み続けていることです。実践は、この身体を責めの場ではなく、安定の場にすることです。'
  - id: teacher_perspective_02
    header: Joshin Senseiが見ていること
    paragraphs:
    - Joshin Senseiは仕事の不安定さを即身成仏（Sokushin Jobutsu）──このいまの身体そのものでの仏性──として読みます。安定が見つからない労働者は欠陥ではありません。この身体、この瞬間が、スケジュールの次の一手に関わらず、尊厳と行動が出会う場になりえます。
    - そこから三密へ。問いは、アプリが更新されたときの「落ちる感じ」を永遠になくすことではありません。次の一手──案件を起こす、シフトに出る、あるいは単に息をする──がまだ自分のものであるように身・口・意をそらえるか、という問いです。
    - その枠組みでは自己責めが和らぎます。若者にレジリエンスがないのでも、不安定を感じる自分が間違いでもありません。問題は、経済が制度として不安定を個人の神経系に外注し続けていることです。真言は、この身体のなかで線を保つ方法を与えます。
practice:
  options:
  - id: practice_01
    display_name: 5分間・三密の安定
    announcement_line: Joshin Senseiは、仕事の不安定さが明晰さを上書きし始める瞬間のため、5分間の三密の安定を教えています。サイドバーにあり、次のシフトの前や、スケジュールのショックのあとなど短時間で使えます。
    relief_lines:
    - 圧力が自己全体に名前を貼るのをやめます。
    - 次の正直な一手に足る安定が戻ります。
  - id: practice_02
    display_name: 三密のそろえ
    announcement_line: Joshin Senseiは、スケジュールがまた変わり、身体がまだ追いついていないときのため、5分間の三密のそらえを教えています。サイドバーに、時間どおり手順付きで載せています。
    relief_lines:
    - 身・口・意がひとつの所作にもどります。
    - 崩壊せずに次の一手が可能になります。
sdg:
  primary:
    title: 働きがいと経済成長
    line: 国連はSDG 8とその働きがいと経済成長の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'ILOと若者の労働権利団体は、ともにこの仕事への入口を提供しています。入口: https://www.ilo.org/global/topics/youth-employment'
  - id: cta_02
    line: UNA-USAはSDG 8と働きがいについて、地域から地球規模まで同じ枠組みで活動しています。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 仕事の不安定さは賃金以上を食っている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: Joshin Senseiは経済的な不安定さと本具の価値を分けます。
    - id: headline_layer_2_02
      line: Joshin Senseiは、スケジュールが変わり続けるときに身・口・意に何ができるかを名指します。
