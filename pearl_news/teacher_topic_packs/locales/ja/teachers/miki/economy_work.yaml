hook_personal:
  options:
    - id: hook_personal_01
      line: 努力は本物です。それへの承認はそうではありません。アプリは、週の予定を立てたあとでシフトを変えます。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 経済的な不安定さはお金だけの話ではありません。雇用側の体系が若者が差し出したものを抱きとめてくれないとき、尊厳と安定の感覚に何が起きるか、という話です。
teacher_intro:
  options:
    - id: identity_observation_shift_01
      line: ライトランゲージとサウンドヒーリングを教えるMikiさんは、実践の場でギグ労働の不安定さが若者に何をもたらすかを見てきました。彼らが問うのは賃金だけではありません。不安定さの真実を受け止めつつ、努力が無意味だという信念へ身体が崩れ落ちないようにするにはどうするか、です。
    - id: identity_observation_shift_02
      line: ライトランゲージとクリスタルボウルの伝統から、Mikiさんは、若者のシフトが週の途中でアプリから消える場面を実践の場で見てきました。それは手配の混乱だけではありません。関係性の断裂です──労働者の努力が「重要だ」と抱かれたことがないという破れ目です。その断裂は、政策の言葉に届くずっと前に、胃の沈みと自己監視として身体に宿ります。
youth_somatic:
  options:
    - id: schedule_rupture_01
      line: "シフトをアプリで確認します。胃が沈みます。次の確認の前に変わるかもしれないので、すばやくスクショします。それから次の通知を待ちます。安定は、いま捕まえなければならないものだからです。\n\nLOOP_SEQUENCE: \"アプリを確認する。胃が沈む。すばやくスクショする。次の変更を待つ。\""
    - id: schedule_rupture_02
      line: "勤務チャットでシフト割り当てを見ます。胸が締まります。通知なしに消えるので、すぐにコピーを保存します。それから確認を続けます。抱いてくれるはずの仕事が、抱いてくれないからです。\n\nLOOP_SEQUENCE: \"シフトを見る。胸が締まる。すぐ保存する。確認を続ける。\""
teacher_witness:
  options:
    - id: mirrored_loop_01
      line: Mikiは若い労働者のなかにこのループを見てきました──アプリが開き、胃が締まり、スクショが取られ、待ちが始まる。
    - id: mirrored_loop_02
      line: 彼女はギグワーカーの身体のなかでその順序も見てきました──確認、沈み、保存、警戒。身体は、プラットフォームが抱かないものを抱くことを学びます。
turnaround:
  options:
    - id: youth_action_economy_01
      stat_line_1: "850+ campaigns. 47 cities."
      stat_line_2: 若い労働者はプラットフォームを横断して組織し、運動を起こし、スケジュールの安定、賃金の透明性、そしてアルゴリズム駆動の不安定さが奪った尊厳の回復を求めています。
    - id: youth_action_economy_02
      stat_line_1: "850+ campaigns. 47 cities."
      stat_line_2: ギグワーカーは訴訟を起こし、同僚評議会を開き、スト日程を決め続けています。プラットフォームが雇用条件を変え続けるときも。
bridge:
  options:
    - id: tracker_capacity_01
      line: 労働者の権利運動のトラッカーは勝ち取った要求と、交渉桌に着かざるを得なくなったプラットフォームを数えます。前回のキャンセルのあと、次のシフトのスクショを可能にしたもの──体系が尊厳を裂き続けるなかでも「自分自身の尊厳と接し続ける力」──の欄はありません。同僚を組織した若い労働者にはそれが要りました。アプリを確認し、胃が沈み、翌日もそこにいる人にも要ります。Mikiの伝統は、何世代にもわたり、サウンドと在り方を通じてその力を育んできました。身体は、体系が消すものを覚えていられます。
    - id: tracker_capacity_02
      line: 経済正義のトラッカーは要求と政策上の勝利を数えます。プラットフォームがすでにスケジュールから書き消したあとも、若い労働者が自分の価値にとどまれる内面の容量は数えません。次の同僚との対話にはそれが要ります。シフトをスクショし、次の変更を待つ人にも要ります。Mikiの伝統は、その容量は欠けているのではなく、不安定さという関係性の断裂に覆われている、と捉えます。サウンドとライトランゲージは、それをあらわにするのを助けます。
teacher_perspective:
  options:
    - id: relational_rupture_01
      header: Mikiが見ていること
      paragraphs:
        - Mikiの伝統では、経済的な不安定さはまず賃金問題ではなく、関係性の断裂です。若者が努力を差し出し、体系が一貫性や承認で抱きとめてくれないとき、労働者と雇用者のあいだの網は裂けます。身体はそれを先に記録します──胃の沈み、胸の締まり、スクショして待つという学習された習慣として。心はあとから政策の言葉を持ってきます。
        - 正しい関係性のなかで生きるという原理──当事者すべてのあいだの網を保つこと──は、施しや感謝を求めません。基本的な相互性を求めます。仕事が欲しければ、労働者を抱け、と。ギグワーカーにとって、その網はアルゴリズムで断たれます。シフトは消え、アルゴリズムは理由を示さず、身体は努力が返ってくる義務を生まないことを学びます。
        - 重要な転換は次のとおりです。「私が壊れている、間違っている、不安定だ」という感じ方は、しばしば、抱いてくれないよう設計された体系への正確な反応です。身体は故障しているのではありません。関係性の断裂を記録しています。若い労働者が胃の沈みを、プラットフォームが相互性を拒否する明確な読み取りであり、個人的欠陥ではないと理解するとき、自己責めが和らぎます。問題は労働者ではありません。制度的な網が裂かれ、身体がそれを知っている、ということです。
    - id: relational_rupture_02
      header: Mikiが見ていること
      paragraphs:
        - Mikiは経済的な不安定さを祓い──この場合は労働者と雇用者のあいだの関係を傷つける行いを清める営み──のレンズで読みます。ギグ労働の不安定さはスケジュールの混乱だけではありません。労働を尊厳あるものにする相互の網を体系的に壊すことです。
        - 若者は、努力が承認や安定を生まない労働経済を受け継いでいます。プラットフォームは柔軟性を約束し、実際には不安定だけを届けます。週の予定を立てたシフトは消え、アルゴリズムは説明を示さず、損失は一人で抱えさせられます。それは日常規模の関係性の断裂です。
        - その枠組みでは自己責めが和らぎます。乱れは計画や粘り強さの能力ではなく、揺さぶられたと感じる私が間違っている、ということでもありません。乱れは、体系と機関が労働者が差し出したものを抱きとめないことにあります。想起としての癒しとは、求めていた尊厳と安定の感覚は破壊されたのではなく、不安定さに覆われている、ということです。サウンドと在り方は、プラットフォームが認めなくても努力が価値を生むことを、身体が思い出すのを助けます。
practice:
  options:
    - id: sound_receiving_01
      announcement_line: Mikiは、シフトアプリがまた落とした瞬間──身体が疲労と警戒のあいだに挟まれたときのため、5分間の「サウンドと光の受容」を教えています。サイドバーに、時間どおりの手順付きで載せています。
      relief_lines:
        - 身体は、不安定さを一人で抱えるのをやめます。
        - 次のシフト、次の同僚との会話に足るほどの尊厳が戻ります。
    - id: sound_receiving_02
      announcement_line: Mikiは、スケジュールの変動が自己監視に変わり、アプリを望む以上に確認してしまう瞬間のため、5分間の実践を教えています。言葉の届かないところにサウンドは届きます。信じることを身体がやめてしまったところに届きます。サイドバーにあり、シフトのあいだや次の確認の前など短時間で使えます。
      relief_lines:
        - 身体は、不安定さを自分から隠すのをやめます。
        - 自分自身の価値の感覚が整い、他者と組織する力が戻ります。
sdg:
  primary:
    line: 国連はSDG 8とそのデセントワーク、公正な賃金、労働者の権利の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: coworker_organizing_01
      line: "Gig Workers Collectiveとワーカーセンター系の組織は、同僚との対話とプラットフォーム運動のピア主導型トレーニングを提供しています。入口: https://gigworkerscollective.org"
    - id: economic_justice_01
      line: 経済正義と労働者の力の出発点が欲しい場合、Young InvinciblesはZ世代と賃金、不安定さ、労働法の変革に取り組んでいます。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
      - id: precarity_01
        line: またシフトが消えた。スクショした。
  headline_layer_2:
    options:
      - id: miki_attention_01
        line: ライトランゲージとサウンドのヒーラーが、政策の言葉が追いつく前にギグ労働の不安定さが身体に何をするかを名指します。
      - id: miki_relational_01
        line: ある癒しの伝統は、経済的な不安定さを関係性の断裂として読み、体系が抱いてくれないときに尊厳を抱くための実践を示します。
