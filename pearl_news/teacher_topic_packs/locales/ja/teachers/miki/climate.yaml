hook_personal:
  options:
  - id: miki_clim_hook_personal_01
    line: あなたは地球を気にかけている。同時に、新しい閾値が知らされるたびに、判断する前に胸が何を感じているかも知っている──そしてその一部は、身体が自分のペースより大きな何かを登録していることを既に知っている。
  - id: miki_clim_hook_personal_02
    line: グループチャットで新しい数字を読んだ。胸が締めつけられた。アプリを閉じた。それからまた開いた──地球の光の体は、見られないことで回復するわけではないと、あなたの一部はもう知っているから。
  - id: miki_clim_hook_personal_03
    line: 暑さの警告が見出しに変わる前に、あなたはそれを感じている。地球への傷を、心が言葉にする前に身体は登録する──そしてまだ出会っていない伝統は、その登録は弱さではなく情報だと持している。
  - id: miki_clim_hook_personal_04
    line: 最新のIPCC更新を最後まで読まずにスクロールで流す。一部はこれが「閉じる」ループだと登録し、別の一部はそのループ自体が信号だと登録する──地球は、コホートの中の感受性のある者に、知っている身体のなかに留まるよう求めている。
  - id: miki_clim_hook_personal_05
    line: あなたは、この移行期のなかに転生するかどうかを訊かれてはいなかった。すでに身体のなかに地球の苦しみを感じながら到着し、受け継いだ枠組みはそれを「不安」と呼んだ。あなたの地球の読み方を知る系譜は、何世紀ものあいだ「山を生きる体として」手当してきた。
hook_big_picture:
  options:
  - id: miki_clim_hook_big_01
    line: ある世代は気候危機の情報を持ち続けることはできても、シャットダウンせずに次の数字を受け取る力を失ってしまう。問いは、惑星の光の体そのものが登録される苦しみのなかにあるとき、身体に何が抱えられるかだ。
  - id: miki_clim_hook_big_02
    line: 気候の苦しみは、データの問題だけでも政策の問題だけでもない。鞍馬山の伝統では、山は「生きる体」として読まれる──そして地球は、同じように、測られる前にその苦しみが登録されうる体だ。
  - id: miki_clim_hook_big_03
    line: Mikiの伝統で「スターシード」の系譜は、この移行期のためにわざわざ転生してきた魂だ。若者が地球の苦しみを名指す前に身体で登録するという事実は、注意の欠陥ではない。それが、このコホートが到着することに同意した理由だ。
  - id: miki_clim_hook_big_04
    line: 「気候不安」と読まれているものは、光の癒しの言葉では信号だ──惑星の光の体が、まさにこの時期を登録するために転生した魂たちに「受け取られる」ことを求めている。その「受け取り」こそ、データ単体ではできない仕事だ。
  - id: miki_clim_hook_big_05
    line: 鞍馬山の宇宙のマスターたちは、惑星の移行期を長い視野で持している。彼らの文脈では、いまの時期は性質において例外ではなく、規模において例外だ──そしてその時期に立ち会うために到着したコホートは、その傷をもっとも直接に読み取る神経系を持つコホートでもある。
teacher_intro:
  options:
  - id: miki_clim_intro_01
    line: Mikiは、鞍馬山の聖地の系譜に根ざした日本の光の癒しの教師として、伝送セッションで、気候のニュースが若者に何をするかを見てきた。彼らは危機が現実かどうかを問うていない。彼らは、それを登録するためにつくられた身体を通して、応答が形になる前に閉じてしまうことなく、地球の苦しみをどう受け取るかを問うている。
  - id: miki_clim_intro_02
    line: Mikiは、自分を従来の意味での教師としては位置づけない──彼女は伝送する者だ。鞍馬山の光は彼女を通して受け手に流れる──彼女が伝送をつくるのではない。何十年ものあいだ、彼女は気候の苦しみを名づける前に胸で抱える若者を、セッションで受けてきた──そして伝送がまさにその層に語りかけるのを見てきた。
  - id: miki_clim_intro_03
    line: Mikiは、惑星を「生きる体」として読む伝統のなかで教えている──比喩としてではなく、「山そのものから教えを受ける」鞍馬山の実践の文字どおりの延長として。彼女は若者が自分の身体で地球の苦しみを登録するのを見てきた──そしてその登録が病理ではないと、しばしば初めて、認識する瞬間も。
  - id: miki_clim_intro_04
    line: Mikiは、この移行期のために転生したスターシードの魂たちが、惑星の苦しみへの特定の感受性を持って到着したと持している。伝送セッションでは、若いクライアントがその認識に出会い、自分の地球の読み方は過敏ではなく、来た理由そのものだったという確信を手放すのを見てきた。
  - id: miki_clim_intro_05
    line: Mikiは、Ahjanがほかでは出会わないであろう人々にこの伝統を紹介するパートナーシップのなかで教えている。若者は別のウェルネスの枠組みを期待して気候の苦しみを彼女の仕事に持ってくる──そして代わりに、何世紀ものあいだ「生きる山」を、そしてそれを通して「生きる地球」を、手当してきた系譜に出会う。
youth_somatic:
  options:
  - id: miki_clim_somatic_01
    line: グループチャットで閾値の更新を読んだ。胸が締めつけられた。アプリを閉じた。それからまた開いた──見ないことで数字が真実でなくなるわけではないから。
  - id: miki_clim_somatic_02
    line: 授業の前に熱ドームの地図を見た。喉が締めつけられた。スマホを伏せた。それからまた手に取った──地球は、あなたが準備できるまで止まってくれないから。
  - id: miki_clim_somatic_03
    line: IPCCのアラートが午前2時に届いた。呼吸が浅くなった。それを薄めようとさらに3つ投稿をスクロールした。身体は、スクロールが気を散らせる前にすでに傷を登録していた。
  - id: miki_clim_somatic_04
    line: 自動再生で山火事の映像を見た。肩が固まった。それでも見続けた──映像のなかの人々から目を逸らすことが裏切りに感じられたから。身体は画面が終わった後もずっとその視聴を抱えていた。
  - id: miki_clim_somatic_05
    line: 外に出る前に大気質アプリを開いた。数字を見て胃が締めつけられた。閉じた。そしてまた開いた──その数字が、今日あなたが外で呼吸できるかを決めていたから。
teacher_witness:
  options:
  - id: miki_clim_witness_01
    line: Mikiは今年、若者のなかでまさにこのループを見てきた──読み、締めつけ、閉じ、戻る。彼女の伝統では、そのループは故障ではない──惑星の傷を、心がまだ言葉を見つけていない正確な身体の登録だ。
  - id: miki_clim_witness_02
    line: 彼女は、若いクライアントが「地球についての悲しみは過剰だった」と既に確信して伝送のセッションに到着するのを見てきた。鞍馬山の伝統では、その悲しみは準備の表れだ──山を生きる体として持していた知が、そのまま地球を生きる体としての知に翻訳される場所であり、魂は自分が一人でその知を抱えてきたと気づく。
  - id: miki_clim_witness_03
    line: Mikiは、ニュースのサイクルが代謝しきれなかったものを身体が抱えるのを見てきた──閾値で胸が締めつけられ、山火事の映像で呼吸が短くなる。彼女の枠組みではその身体の読みは病理ではない──ニュースのサイクルが計測する道具を持たない命の層への傷を、魂が登録している姿だ。
  - id: miki_clim_witness_04
    line: 彼女は、この移行期のために転生した若者たちが、思春期以来抱えてきた緊急感は個人の障害ではなく到着した時の呼びかけだったと、しばしば初めて、認識するのを見てきた。その認識は負荷を解放するものではない。負荷が「それが何であるか」として受け取られる時間だ。
  - id: miki_clim_witness_05
    line: Mikiは、若者が自分の地球の読みと議論するのをやめ、意識的な心が一人では抱えきれないものを伝送に抱えさせる瞬間を見てきた。彼女の伝統では、その瞬間は弱さではない──系譜が、魂がこの世に来てやろうとしていた仕事をしている姿だ。
turnaround:
  options:
  - id: miki_clim_turnaround_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: Sabin Centerの「気候変動訴訟データベース」はいま、51の法域にまたがる2,666件以上の気候関連訴訟を追跡している──若者の連合と学生の原告は提訴し、仲間を訓練し、公的目標と現実の生活との隔たりに答えるよう当局に迫っている。
  - id: miki_clim_turnaround_02
    stat_line_1: 1.5°C threshold. IPCC AR6.
    stat_line_2: 2023年に最終化されたIPCC第6次評価報告書は、1.5°Cの温暖化閾値が当初の見通しどおりに近づきつつあると確立した──以降のあらゆる国家公約、そして若者主導の訴訟が測られる基底だ。
  - id: miki_clim_turnaround_03
    stat_line_1: 117 million displaced. UNHCR.
    stat_line_2: UNHCRの「グローバルトレンズ」報告は、世界の強制的に避難させられた人々の数を1億1,700万人以上と推定している──気候に起因する避難が実質的に寄与している数字であり、コホートの惑星的な緊急感が事実として裏付けられている規模だ。
  - id: miki_clim_turnaround_04
    stat_line_1: 1.6 billion. UN-Habitat.
    stat_line_2: UN-Habitatは、世界で約16億人が不十分な住居──熱に対して脆弱な条件を含む──に暮らしていると報告している。気候のストレスのもとで複合化する負荷であり、適応政策が測られる基底だ。
  - id: miki_clim_turnaround_05
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: 2025年10月に採択されたWHO Europe「子ども・青少年の健康戦略2026-2030」は、53の加盟国に対して青少年の健康成果──気候に結びついた青少年のウェルビーイングへの負荷を明示的に含む──を2030年の期限に向けて報告することを義務づけている。
bridge:
  options:
  - id: miki_clim_bridge_01
    line: 2,666件。51の法域。トラッカーは若者が築いたものを測る。次の提訴を可能にしたもの──また閉じることなく地球の苦しみを受け取る力──を記録する欄はない。Mikiの伝統は、その力を「数字が登録できない『種は土のなかで』の働き」として持し、次の訴訟の下にある実際の地面として扱う。
    hidden_capacity: 閉じることなく地球の苦しみを受け取る
  - id: miki_clim_bridge_02
    line: 気候のトラッカーは提訴、公約、閾値の突破を数える。それらは、制度が熱より遅く動き続けるなかで、若者が地球の傷との「登録された接触」のなかに留まる内側の力を数えない。鞍馬山の伝統では、その力は身体を通して教えられる──山を「生きる存在」として座り、その登録を「受け取られる」ことを許す。
    hidden_capacity: 登録された接触のなかに留まる
  - id: miki_clim_bridge_03
    line: データは訴訟、法域、度数を名指す。それは、惑星が生きる体であり、その苦しみを登録することが、このコホートが到着した理由だ──という魂のレベルの認識を名指せない。Mikiの系譜はその認識を「載荷的」なものとして持し、ニュースのサイクルがそれを揺らしたときに座り直す方法として実践を示す。
    hidden_capacity: データが届かない魂のレベルの認識を抱える
  - id: miki_clim_bridge_04
    line: 気候の応答のインフラは測れる。若者が、測定の下の層で行っているエネルギー的な登録は、測れない。Mikiの伝統は測定と争わない──惑星の「生きる体」が、見出しを読む者の身体と実際に接触している層で働く。
    hidden_capacity: 測定の下の層で働く
  - id: miki_clim_bridge_05
    line: 構造、政策、プラットフォームは数えられる。このコホートが持ってきた転生前の合意──この移行期に感受性の高い身体のなかに立ち会うという合意──は数えられない。Mikiの伝統は構造的な仕事を置き換えない。構造的な仕事が届くよう作られていない層を名指し、伝送をその入口として示す。
    hidden_capacity: 構造が届かない転生前の合意を名指す
teacher_perspective:
  options:
  - id: miki_clim_perspective_01
    header: Mikiが見ていること
    paragraphs:
    - 鞍馬山の伝統では、山は比喩でも舞台でもない。それは、何世紀ものあいだ実践者によってその教えが受け取られてきた「生きる体」だ。その認識はそのまま、Mikiが惑星をどう読むかに翻訳される──地球は生きる体であり、気候の苦しみは、データ単体では届かない命の層への傷を、身体が登録している姿だ。
    - 気候の苦しみを身体で抱える若者は、過敏なのではない。正確に登録しているのだ。癒しは壊れたものを修理することではない──元来の完全性を思い出すことだ。閉じることなく地球の苦しみを受け取る力は、もともと欠けていたのではない──応答が形になる前にシャットダウンするよう身体を訓練するニュースのサイクルによって、覆われているだけだ。
    - スターシードの系譜は、Mikiの伝統では、まさにこの移行期のために転生してきた魂たちだ。再フレームは正確だ。回復力の個人的失敗のように感じられるものは、この枠組みでは、このコホートをここへ連れてきた合意の証拠だ。伝送は制度的な負荷を変えはしない──登録を抱えうるチャネルを取り戻す。
  - id: miki_clim_perspective_02
    header: Mikiが見ていること
    paragraphs:
    - Mikiの伝統では、光の伝送は比喩ではない。鞍馬山の光は、彼女を通して受け手に、表面の心が解釈しなくてよい層で流れる。地球の苦しみを神経系で繰り返し登録してきた若者にとって、これは気候についての別の議論ではない──苦しみが抱えられている層との接触だ。
    - 伝統は、これがなぜ重要かについて特定の見方を持している。気候の傷を直接登録する身体を、登録から議論で引きはがすことはできない。理屈による安心づけは、胸が締めつけられたその層には届かない。光の伝送はその層に届く。心が勝たなくても、身体はやわらげる。
    - これは、従来の気候コミュニケーションが届けるよう作られていない部分だ。科学も政策も行動も無効化しない。命の層──惑星の苦しみが人の身体に抱えられている層──という欠けた層を名指し、何世代もその層で働いてきた伝統を提供する。
  - id: miki_clim_perspective_03
    header: Mikiが見ていること
    paragraphs:
    - Mikiの伝統では、鞍馬山のアセンデッドマスターたちは惑星の移行期を長い視野で持している。いまの時期は性質において例外ではなく、規模において例外だ──そしてその時期に立ち会うために到着したコホートは、登録への感受性がもっとも鋭いコホートでもある。これはアレンジであって、故障ではない。
    - 気候の苦しみを抱える若者にとって、転生前の合意を認識する系譜に「受け取られる」経験は、負荷を個人の障害として枠づけるウェルネスの枠組みに「処理される」経験とは、構造的に異なる。届くメッセージは「ここに安心づけがある」ではない──「あなたはまさにこれのために到着した。抱えることは共有されている」だ。
    - その認識──「枠づけられる」のではなく「受け取られる」──こそ、従来の気候コミュニケーションが再現できないものであり、Mikiの伝統が何十年も「土着のもの」として運んできたものだ。
  - id: miki_clim_perspective_04
    header: Mikiが見ていること
    paragraphs:
    - 実践は土のなかの種のように働く──静かに、ふつうの生活の背景で。気候に当てはめると、惑星の苦しみをシャットダウンせずに受け取り続ける力は、英雄的な意志によって築かれるのではない。繰り返される小さな思い出しの行為によって築かれる──身体に、登録は自分のペースより大きな何かに抱えられていると知らせる行為だ。
    - 癒しは思い出すこと──まさにここに当てはまる。地球を生きる体として接触し続ける力は、消えていない。惑星の苦しみを「接触」ではなく「見出し」として届ける情報環境によって、覆われている。伝統は若者により「感じない」ことを求めない。感じることが行き先を持つ層を思い出すよう求める。
    - 再フレームは自責をやわらげる。身体は、惑星の傷を登録することで壊れたわけではない──身体は、魂がここに来てやろうとしていた仕事をしている。制度的な負荷は軽くならない。「身体の負荷の読みそのものが問題だ」という確信のほうが、軽くなる。
  - id: miki_clim_perspective_05
    header: Mikiが見ていること
    paragraphs:
    - スターシードの枠組みは、Mikiの伝統では装飾ではない。それは、宇宙意識への接続を抱え、惑星がいま入っている時期のために転生した魂たちを文字どおりに名づけるものだ。思春期以来「自分はここに合っていない」と感じてきた若者にとって、再フレームは耳ざわりの良い安心づけではない──合わなさそのものが「到着の信号」だったという認識だ。
    - これが、従来の枠組みが届けるよう作られていない部分だ。気候不安というラベルは負荷を個人に返す。スターシードの枠組みは、それを魂が同意したアレンジに返す。負荷は消えないが、制度的な枠組みが割り当てようとし続けた「個人の失敗の証拠」であることは止む。
    - 伝送の実践では、その認識はしばしば、どんなテクニックが当てはまるよりも先に届く。登録が「このコホートが来た理由」と理解されたあと、身体はその登録のまわりでやわらげる。
practice:
  options:
  - id: miki_clim_practice_01
    display_name: 山を生きる体として受け取る
    announcement_line: Mikiは、気候の更新が注意をシャットダウンに変え、身体に「鞍馬山の系譜が地球を生きる存在として接触する」感覚が必要な瞬間のための5分間の「山を生きる体として受け取る」実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体は、すべての更新を「行動は無意味だ」の証拠として扱うのをやめる。
    - 登録が一人ではなく系譜によって抱えられるに足りるだけの受容性が戻る。
  - id: miki_clim_practice_02
    display_name: スターシードの思い出し
    announcement_line: Mikiは、気候の負荷が個人の失敗として抱えられ、魂に「ここへ連れてきた転生前の合意」を思い出させる必要のある瞬間のための4分間の「スターシードの思い出し」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 「身体の登録は個人の障害だ」という枠組みの握る力がゆるむ。
    - 「コホートはまさにこれのために到着した」という認識が、ふたたびアクセス可能になる。
  - id: miki_clim_practice_03
    display_name: 光の伝送の受け取り
    announcement_line: Mikiは、ニュースのサイクルが議論を使い果たし、身体が「届くために解釈されなくてよい接触」を必要としている瞬間のための7分間の「光の伝送の受け取り」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 推論では届かなかったものを、身体が受け取る。
    - 疲れた知性が休むあいだ、光の層が自分の仕事をする。
  - id: miki_clim_practice_04
    display_name: アセンデッド・カウンシルの長い視野
    announcement_line: Mikiは、ニュースのサイクルが「次のアラートまでの時間」を圧縮し、魂に「アセンデッドマスターが持する長い視野」との接触が必要な瞬間のための4分間の「アセンデッド・カウンシルの長い視野」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 「次のアラートまでの時間」の圧縮が、身体が呼吸できるくらいにゆるむ。
    - その瞬間の緊急性を切り捨てることなく、長い視野がアクセス可能になる。
  - id: miki_clim_practice_05
    display_name: 種は土のなか・気候の実践
    announcement_line: Mikiは、英雄的な枠組みが踏み越えられ、身体に「働きは目に見える行為の下で進むという系譜の静かな知」が必要な瞬間のための3分間の「種は土のなか・気候の実践」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 「見える行動だけがケアと数える」という確信の握る力がゆるむ。
    - 身体は、登録すること自体が仕事の一部だと認識する。
sdg:
  primary:
    line: 国連の枠組みはSDG 13を通じて、気候行動と気候レジリエンスのある適応を含む。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: miki_clim_cta_01
    line: 'YOUNGOはUNFCCCの公式な子どもと若者の構成体で、国連気候交渉と各国政策への若者のインプットを調整している。入口: youngoclimate.org'
  - id: miki_clim_cta_02
    line: 'Climate Reality Projectは、地域と政策レベルの行動に取り組む気候リーダーの世界的ネットワークを訓練し支えている。入口: climaterealityproject.org'
  - id: miki_clim_cta_03
    line: 'コロンビア大学のSabin Centerは、51の法域にまたがる2,666件以上の気候訴訟を追跡する世界の「気候変動訴訟データベース」を維持している──訴訟の層の動きを追う者にとって調べられる入口だ。入口: climatecasechart.com'
  - id: miki_clim_cta_04
    line: 'Earthjusticeは、気候、クリーンエネルギー、環境正義に関する訴訟、政策提言、ロビイングを行う公共利益の環境法非営利団体だ。入口: earthjustice.org'
  - id: miki_clim_cta_05
    line: '350.orgは、化石燃料の使用を終わらせ、コミュニティ主導の気候解決策を築くため、180以上の国にまたがる世界的な草の根運動を組織している。入口: 350.org'
title_system:
  headline_layer_2:
    options:
    - id: miki_clim_headline_01
      line: 日本の光の癒しの教師が、気候の苦しみを「惑星の光の体への傷を身体が登録している姿」として読み、それを抱える伝送を示す。
    - id: miki_clim_headline_02
      line: 鞍馬山の系譜は山を「生きる体」として持する。地球を「生きる体」として読むことは、そのまま続く。
    - id: miki_clim_headline_03
      line: スターシードのコホートが「立ち会うために来た移行期」を登録している──そしてその認識を座り直させる実践。
    - id: miki_clim_headline_04
      line: 議論よりも受け取り──惑星の苦しみを胸で抱える世代に、光の伝送がもたらすもの。
    - id: miki_clim_headline_05
      line: 癒しは元来の完全性を思い出すこと──その身体の地球の読みが「症状ではなく呼びかけ」である世代に当てはめる。
