hook_personal:
  options:
    - id: hook_personal_01
      line: 地球への思いは本物です。それでも新しいしきい値ごとに、何をすべきか決める前から身体に何が起きているかも感じています。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: ある世代は情報に通じていても、次の数字をシャットダウンせずに受け止める力を失っていくことがあります。問いは、ニュースが届き続けるとき、身体がいくらまで抱えられるかです。
teacher_intro:
  options:
    - id: identity_observation_shift_01
      line: ライトランゲージとサウンドヒーリングを教えるMikiさんは、実践の場で気候ニュースが若者に何をもたらすかを見てきました。彼らが問うのは危機の真実性ではありません。真実を受け止めつつ、応答する前に身体が閉じてしまわないようにするにはどうするか、です。
    - id: identity_observation_shift_02
      line: ライトランゲージとクリスタルボウルの伝統から、Mikiさんはリトリートで、気候の更新がまず道徳的な真剣さとして届き、つづいて身体の過負荷になる様子を見てきました。学生が求めているのは励ましではありません。教えられた自然の秩序を敬う一方で、予定どおりに壊れ続ける現実のなかで、応答できるほど受容的であり続けるにはどうするか、です。
youth_somatic:
  options:
    - id: climate_threshold_phone_01
      line: "グループチャットで更新を読みます。胸が締まります。アプリを閉じます。また開きます。見ないからといって数字が真実でなくなるわけではないからです。\n\nLOOP_SEQUENCE: \"更新を読む。胸が締まる。アプリを閉じる。また開く。\""
    - id: climate_threshold_phone_02
      line: "授業の前に新たなしきい値を見ます。のどが締まります。スマートフォンを伏せます。また手に取ります。未来が「準備ができるまで」とは待ってはくれないからです。\n\nLOOP_SEQUENCE: \"しきい値を見る。のどが締まる。伏せる。また手に取る。\""
teacher_witness:
  options:
    - id: mirrored_loop_01
      line: Mikiは今年、若者のなかにこのループそのもの──読む、締まる、閉じる、戻る──を見てきました。
    - id: mirrored_loop_02
      line: 彼女はその順序の繰り返しも見てきました。数字が届き、身体が縮み、スマホが伏せられ、それでも心は戻ります。現実はそこに残っているからです。
turnaround:
  options:
    - id: youth_action_climate_01
      stat_line_1: "2,666 cases. 51 jurisdictions."
      stat_line_2: 学生と若者の連帯は仲間を訓練し、運動を組み、公的目標と実生活のギャップに当局が答えざるを得ない状況をつくっています。
    - id: youth_action_climate_02
      stat_line_1: "2,666 cases. 51 jurisdictions."
      stat_line_2: 若い組織者は訴訟を起こし、研修を開き、地域の損失を記録し続けています。国政が熱のスピードに追いつかないときも。
bridge:
  options:
    - id: tracker_capacity_01
      line: "2,666 cases. 51 jurisdictions. トラッカーは若者が何をしたかを測ります。前回の遅れのあと、次の申し立てを可能にしたもの──制度が応答し続けないなかでも「再び受容的であり、再び行動できる力」──の欄はありません。次の案件を起こした組織者にはそれが要りました。更新を読み、アプリを閉じ、また開いた人にも要ります。Mikiの伝統は、サウンドと在り方を通じて、その力を何世代にもわたって育んできました。"
    - id: tracker_capacity_02
      line: 気候のトラッカーは案件、目標、しきい値を数えます。若者が真実と接したまま、制度のまた遅れのあとでも「再び応答する」力を保てる内面の容量は数えません。次の組織者にはそれが要ります。アプリを開き直した読者にも要ります。Mikiの伝統は、心が過負荷のとき、身体が何を受け取れるかに働きかけます。
teacher_perspective:
  options:
    - id: relational_rupture_01
      header: Mikiが見ていること
      paragraphs:
        - Mikiの伝統では、環境破壊は技術問題だけではありません。人、土地、そして伝統が霊と呼ぶものとのあいだの関係性の断裂です。身体はしばしば、心が言葉を見つける前にその断裂を記録します。気候の苦しみがこんなに疲れるのは、感受性が強すぎるからではありません。生命を支える網の裂け目を正確に察知しているからです。
        - 神隨の道──自然の秩序に沿って生きるという原理──は、英雄的な自己犠牲を求めません。日々の気づきを求めます。何を買い、何を捨て、都市をどう移動するか。リサイクルの規範と公共の意識が現実にあるZ世代にとって、それはすでに生活圧です。伝統はそこに霊的な重みを与えます。
        - 重要な転換は次のとおりです。「私が壊れている、間違っている」という私的な欠陥に感じることが、しばしば、人間の選択と生きる世界との関係において集合的な断裂を生み出し続ける制度と構造への正確な反応です。本当の乱れがそこにあると見えたとき、身体は自分を壊れ物と呼ぶのをやめます。
    - id: relational_rupture_02
      header: Mikiが見ていること
      paragraphs:
        - Mikiは気候の過負荷を祓い（harae）──人、土地、神々のあいだの関係を傷つける行いを清める営み──のレンズで読みます。伝統は環境破壊を技術的修正だけとして扱いません。関係性の断裂として扱い、関係性の修復を要します。
        - 衰退する地方を受け継ぐ若者は、人間の生活と野生の自然との境界──里山──を、どの世代よりも少ない資源で守るよう求められています。それは比喩ではありません。身体が応答している条件そのものです。
        - その枠組みでは自己責めが和らぎます。欠陥は私ではありません。壊れた自己でも、混乱した反応でもありません。問題は、機関と政策の体系が網を裂き続け、身体がそれを知っていることです。想起としての癒しとは、応答の力はもともとあったが過負荷に覆われている、ということです。サウンドと在り方は、それをあらわにするのを助けます。
practice:
  options:
    - id: sound_receiving_01
      announcement_line: Mikiは、気候の情報が注意をシャットダウンに変え続ける瞬間のため、5分間の「サウンドと光の受容」を教えています。サイドバーに、時間どおりの手順付きで載せています。
      relief_lines:
        - 身体は、更新のたびに「行動は無意味だ」と証明するのをやめます。
        - 次の本当の応答に足るほどの受容性が戻ります。
    - id: sound_receiving_02
      announcement_line: Mikiは、気候の数字が身体の過負荷に変わる瞬間のため、5分間の実践を教えています。言葉の届かないところにサウンドは届きます。サイドバーにあり、授業の前、スクロールのあと、次の会議の前など短時間で使えます。
      relief_lines:
        - 身体は、更新のたびに全面崩壊へ変換するのをやめます。
        - 内面のペースが整い、再び行動できる容量が戻ります。
sdg:
  primary:
    line: 国連はSDG 13とその気候教育・レジリエンスの目標を通じて、まさにこのギャップへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: youngo_01
      line: "The Climate Reality ProjectとYOUNGOは、ともに若者向けの入口を運営しています。入口: https://youngoclimate.org"
    - id: una_usa_01
      line: 次の一歩がそちらでない場合、UNA-USAは地域から地球規模までのプログラムを運営しています。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
      - id: threshold_warning_01
        line: 1.55℃は、もはや「警告」の段階ではありません。
  headline_layer_2:
    options:
      - id: miki_attention_01
        line: ライトランゲージとサウンドのヒーラーが、気候ストレスがZ世代の受容と応答の力に何をしているかを名指します。
      - id: miki_relational_01
        line: ある癒しの伝統は、気候の苦しみを関係性の断裂として読み、応答できるほど受容的であり続けるための実践を示します。
