hook_personal:
  options:
    - id: hook_personal_01
      line: また一つ、共同声明のプレスリリースを読みます。同時に、同じパートナーから出た過去三つのリリースが、カメラが去ったあと実際に何を生んだかも、あなたは知っています。
    - id: hook_personal_02
      line: 若者諮問の席に「はい」と答えました。同時に、その会議室が身体に何を抱えさせるかも知っています──小さな席、短い発言時間、長い説明の負担。
    - id: hook_personal_03
      line: 報告書の最後に並ぶパートナーのロゴをスクロールします。同時に、どのロゴが立ち上げ式に現れ、どのロゴがそれ以降静かなままかも知っています。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: パートナーシップはもはや制度設計だけの問題ではありません。結果を最も受ける人々が、その仕事の組み立て方に発言権を持てているかどうかの、日々の試金石です。
    - id: hook_big_picture_02
      line: SDG 17は、他の十六の目標を動かす運用の仕組みとしてパートナーシップを位置づけています。その仕組みは測定されています。多くのマルチステークホルダー・パートナーシップは、発足から24か月以内に若者包摂の目標を満たせていません。
    - id: hook_big_picture_03
      line: 多くのパートナーシップの枠組みは、協働を「双方が持ち寄るものの合計」として扱います。光のヒーリングの伝統は別の基準を持ちます──両者の間に開く、どちらか一方では運べないチャネルがあるかどうか、です。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Mikiは、鞍馬山の聖地伝統に根ざした日本の光のヒーリングの教師です。実践の場で、彼女は国際的なパートナーシップから戻ってきた若者が、目に見えない重さを抱えているのを見てきました。彼らが問うのは、協働に意味があるかではありません。設計が自分の貢献を「補助」として扱うとき、どうしたら真のパートナーシップに留まれるか、です。
    - id: teacher_intro_02
      line: Mikiは、鞍馬山でアセンデッド・マスターたちの周波数を受け取り伝達する教師です。光のヒーリングのセッションで、彼女は欠損ではなく本来の完全性を基盤に設計されていないパートナーシップが生む、特定の疲労を見てきました。彼女が示す教えは、制度的な非対称を変えるものではありません。小さな側のパートナーが、自分がすでに部屋に持ち込んでいるものを思い出すチャネルを回復するものです。
    - id: teacher_intro_03
      line: MikiはAhjanと並んで教えています。その関係そのものが、彼女が説く原理を体現しています──競合せずに、一方が他方の贈り物が見えるための条件をつくる。パートナーシップの問いを彼女のもとに持ち込む学生は、その種の地盤を探しています。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: "共同声明のプレスリリースを読みました。肩が固まりました。タブを閉じました。それからまた開きました。並んでいる名前は変わらないからです。\nLOOP_SEQUENCE: \"プレスリリースを読んだ。肩が固まった。タブを閉じた。また開いた。\""
    - id: youth_somatic_02
      line: "パートナーシップの招待を開きました。のどが締まりました。さっと目を通して飛ばしました。それからまた戻りました。「いいえ」と言うことにもコストがあるからです。\nLOOP_SEQUENCE: \"招待を開いた。のどが締まった。流し読んだ。戻ってきた。\""
    - id: youth_somatic_03
      line: "二つの組織の新しいMOUを読みました。胸が締まりました。スマホを置きました。それからまた手に取りました。小さい側にいる友人が、もうグループチャットにいたからです。\nLOOP_SEQUENCE: \"MOUを読んだ。胸が締まった。スマホを置いた。また手に取った。\""
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Mikiは、パートナーシップの仕事から戻る若者にこのループそのものを見てきました──プレスリリース、締まり、目をそらす、そして戻る。小さい側にいる人々はまだその中にいるからです。
    - id: teacher_witness_02
      line: 彼女は、対等なパートナーとして入ったはずの学生が、欠損の交換として協働を扱う設計に消耗して出てくるのを見てきました。鞍馬山の伝統は、その消耗を協働スキルの不足とは解釈しません。設計と、パートナーシップが本当に運べる光の質との不一致として名指します。
    - id: teacher_witness_03
      line: Mikiは、より静かな転換も見てきました──若いパートナーが「完全性は失われていなかった、覆われていただけだ」と思い出す瞬間。その想起が起こると、制度上の条件が変わらなくても、パートナーシップの会話の形が変わります。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: "480 youth-led coalitions. 33 countries."
      stat_line_2: 若いパートナーは、収支開示の共同統治パイロットを運営し、MOUのデフォルト秘密保持を拒み、パートナーシップ説明責任スコアカードを公開しています──大きい側のパートナーから止めるよう求められても、です。
    - id: turnaround_02
      stat_line_1: "480 youth-led coalitions. 33 countries."
      stat_line_2: 若者パートナーシップのネットワークは、どのパートナーシップが包摂目標を達成し、どれが達成しなかったかを記録しています。元のMOUを書いた資金提供者が見つけられる場所に、リストを公開しています。
    - id: turnaround_03
      stat_line_1: "480 youth-led coalitions. 33 countries."
      stat_line_2: 若者は南南知識ネットワークを構築し、招集者・抽出者モデルを迂回するピアツーピアの集まりを運営し、パートナーシップをPRではなくインフラとして扱っています。
bridge:
  options:
    - id: bridge_01
      line: 480 youth-led coalitions. 33 countries. トラッカーは若者が何を築いたかを測ります。直前のパートナーシップが協働の言葉で抽出を届けたあと、次のパートナーシップを可能にしたもの──パートナーシップが開く前にすでにそこにあった完全性を思い出し、設計が再生産する非対称のなかでも思い出し続ける力──の欄はありません。戻ってきたパートナーにはそれが要りました。ループのなかの読者にも要ります。Mikiの伝統は、その力を世代を超えて伝えてきました。
    - id: bridge_02
      line: パートナーシップのトラッカーは署名と共同声明を数えます。大きい側のパートナーがパートナーシップを隠れみのとして使ったあとも、若いパートナーが関与し続けるための内面の容量は数えません。その容量──鞍馬山伝統が「土のなかの種」と呼ぶ仕事──は自らを名乗りません。パートナーシップの背景で静かに働き続けます。小さい側のパートナーがそこに留まり続けているあいだに。
    - id: bridge_03
      line: 480 youth-led coalitions. 33 countries. その数は行動を測ります。より遅いものは測りません──制度的な力があなたから抽出するよう形作られている人々と、真の協働に留まる規律。Mikiは鞍馬山のアセンデッド・マスターたちがパートナーシップについて伝えるものを運びます──本当に整合した協働を通って動く光は、両者の個別の光の合計ではなく、質的に異なる何かである、という伝達です。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Mikiが見ていること
      paragraphs:
        - 実践は土のなかの種のように働きます──静かに、日常生活の背景で。MikiとAhjanのパートナーシップ──Ahjanが、自分一人では出会わなかったかもしれない聴衆にMikiの仕事を紹介する──は、この原理をリアルタイムで体現しています。最も生成的なパートナーシップは、一方が他方の贈り物が見えるための条件をつくる関係です。承認そのものを取り合うのではなく、です。
        - 癒しは壊れたものを直すことではなく、本来の完全性を思い出すことです。パートナーシップに適用すると、Mikiの伝達はこう告げます──最も効果的な協働は互いの欠損を埋めるものではなく、両者が出会いを通じて自分の完全性を思い出し活性化する関係である、と。相互補償ではなく、相互の想起としてのパートナーシップです。
        - Mikiが鞍馬山で運ぶ周波数を持つアセンデッド・マスターたちは、協働について特定の見方を保ちます。真に整合したパートナーシップを通って動く光は、個別の光の合計ではなく、質的に異なる何かです──どちらも一人では運べなかった伝達です。これが、なぜパートナーシップが存在するかについての鞍馬山の理解です──効率でも網羅でもなく、二人以上を必要とするチャネルが開くために、です。
    - id: teacher_perspective_02
      header: Mikiが見ていること
      paragraphs:
        - Mikiはパートナーシップの負荷を身体を通じて読みます。小さい側のパートナーは、二つのフィールドを同時に抱えるよう求められています──表明された協働のフィールドと、大きい側のパートナーが実際にしていることのフィールド。光のヒーリングの伝統は、その負荷を態度の失敗としては扱いません。パートナーシップの設計が直接向き合おうとしなかったものを身体が抱えているのだ、と扱います。
        - そこからMikiは想起を実践として向き直します。鞍馬山の伝達は、何か新しいものを獲得することではありません。すでにそこにあったもの──制度的設計が「欠損」と名指し続けようとする本来の完全性──を覆いから現すことです。小さい側のパートナーがそれを思い出すと、設計が割り当てようとした役割を引き受けることなく、パートナーシップの会話を進められます。
        - 「私が壊れている、間違っている、非対称に気づくのは私の落ち度だ」と感じるものは、しばしば、欠損を前提に設計されたパートナーシップに対する身体の正確な拒否です。本来の完全性はパートナーシップが開く前からすでにそこにあり、パートナーシップがそれをどう名指そうと無傷のままだ──身体がそれを感じると、自分を壊れたものと呼ばなくなります。
    - id: teacher_perspective_03
      header: Mikiが見ていること
      paragraphs:
        - Mikiは非対称を正確に名指します。多くの制度的パートナーシップは意図の失敗ではありません。撤退コストが大きく異なる当事者によって設計された取り決めです。安く撤退できる側が、実際には条件を設定する傾向にあります。光のヒーリングの伝統は、撤退コストが等しいふりをしません。小さい側の価値が大きい側の条件に依存しない、という認識を身体に伝達することで応答します。
        - スターシードとアセンデッド・マスターの文脈はここで重要です。困難な制度的地形を越えてパートナーシップの仕事を運ぶ魂は、制度的地形が認識する仕方を知らない能力を携えて到着することがある、とMikiは説きます。伝達は、これらの魂がすでに運んでいるものを思い出すのを助けます──そして両者がその認識と接触しているとき、パートナーシップの仕事は別の質で進みます。
        - 「私が壊れている、間違っている、パートナーシップの形に合わないのは私の落ち度だ」と感じるものは、しばしば、間違った基準で設計されたパートナーシップに対する身体の正確な拒否です。本当の基準は、両者の間でチャネルが開くかどうかであって、小さい側が大きい側のテンプレートに合うかどうかではない──そう見えると、自分を壊れたものと呼ばなくなります。
practice:
  options:
    - id: practice_01
      announcement_line: Mikiは、パートナーシップが貢献を欠損として扱い始め、小さい側のパートナーがパートナーシップが開く前にすでにあったものを思い出す必要のある瞬間のため、5分間の「土のなかの種を受け取る」実践を教えています。サイドバーに、時間どおりで段階的に載せています。
      relief_lines:
        - 身体は、パートナーシップの欠損の語りを自分についての真実として抱えるのをやめます。
        - 次の会話、次のMOU改訂、留まるかどうかの次の決断に足る、より落ち着いた地盤が戻ります。
    - id: practice_02
      announcement_line: Mikiは「癒しは直すことではなく思い出すこと」という5分間の本来の完全性の実践を教えています。パートナーシップが一方の他方による救出として自分を語り始めた瞬間のために。サイドバーに、通話の前、会議のあと、すぐ使える形で載せています。
      relief_lines:
        - 設計が組み込む救出のダイナミクスを、避けがたいものとして引き受けるのをやめます。
        - 仕事の実際の条件で、関与か拒否かを選ぶに足る地盤が戻ります。
    - id: practice_03
      announcement_line: Mikiは鞍馬山の伝達に根ざした5分間の実践を教えています。両者が割り当てられた位置ではなく完全性から部屋に入る必要があるパートナーシップ会議の前のために。サイドバーに載せています。
      relief_lines:
        - 身体は部屋、人、会議の実際のかかっているものを認識します。
        - 次の合意、拒否、正直な間に足る、より明晰な地盤が戻ります。
sdg:
  primary:
    line: 国連はSDG 17とそのマルチステークホルダー・パートナーシップ、データ、モニタリング、説明責任の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: "国連子ども・若者メジャーグループ（UN MGCY）は、ハイレベル政治フォーラムを含む国連パートナーシップ・プロセスへの若者の意見を調整しています。入口: https://www.unmgcy.org"
    - id: cta_02
      line: "Restless Developmentは、グローバル・サウス全域でパートナーシップの結果に関する若者主導の調査と説明責任の仕事を運営しています。入口: https://restlessdevelopment.org"
    - id: cta_03
      line: "PYE Globalは、協働をプレスリリースではなく実践として扱うピアツーピアのパートナーシップ研修を運営しています。入口: https://pyeglobal.org"
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 多くのマルチステークホルダー・パートナーシップは、若者包摂の目標を満たせていない。
      - id: headline_layer_1_02
        line: SDG 17が仕組みである。その仕組みが力を発揮できていない。
      - id: headline_layer_1_03
        line: 若いパートナーは、自分たちの名前を使うパートナーシップを監査している。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: ある日本の光のヒーリングの教師が、パートナーシップが再生産し続ける欠損中心の設計を名指し──チャネルを回復する伝達を示す。
      - id: headline_layer_2_02
        line: 鞍馬山の系譜は、真のパートナーシップを通って動く光は個別の光の合計ではなく、質的に異なる何かであると告げる。
      - id: headline_layer_2_03
        line: 癒しは本来の完全性を思い出すこと。その認識のうえに築かれるパートナーシップは、互いの欠損を埋めるそれとは異なる持続性を持つ。
