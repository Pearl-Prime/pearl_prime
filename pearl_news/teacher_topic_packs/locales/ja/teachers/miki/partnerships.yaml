hook_personal:
  options:
  - id: miki_part_hook_personal_01
    line: また一つ、共同声明のプレスリリースを読む。同時に、同じパートナーから出た過去三つのリリースが、カメラが去ったあと実際に何を生んだかも知っている──そしてあなたの一部は、プレスリリースが登録するよう作られたことのない層で、すでにパートナーシップを読んでいる。
  - id: miki_part_hook_personal_02
    line: 若者諮問の席に「はい」と言った。同時に、会議室が身体に何を抱えさせるかも感じている──小さい席、小さい発言時間の割り当て、大きい説明の割り当て──そして議題が決まる前に、身体はすでに「アラインメントのギャップ」を読んでいた。
  - id: miki_part_hook_personal_03
    line: 報告書の下のパートナーロゴをスクロールする。同時に、どのロゴが立ち上げに現れ、どのロゴが以来静かにしているかも知っている──そして、プレスリリースが読み損ねたときも、あなたの身体が正しく読んでいたアラインメントも、知っている。
  - id: miki_part_hook_personal_04
    line: 連合で誰かと出会い、場が違って感じられた。それに言葉はなかった──そして、共通の話題の下にある「光の体のアラインメント」を身体が認識したのだ、と一部は登録する。それは、価値観のリストがテストしない層だ。
  - id: miki_part_hook_personal_05
    line: パートナーシップに踏み込み、「ここに来たことがある」と感じた──同じ力学、同じ荷電、同じ出口コスト。鞍馬山の伝統は「パートナーシップのなかには転生前のアレンジがある」と持し、認識は、心がそれと議論する前に身体のなかに到着する。
hook_big_picture:
  options:
  - id: miki_part_hook_big_01
    line: パートナーシップはもはや制度設計だけの問いではない。それは、結果にもっとも影響を受ける人々が、パートナーが仕事をどう構造化するかに発言権を持つかどうか──そして、共通の話題の下のアラインメントが本物か修辞かどうか──の、日々のテストだ。
  - id: miki_part_hook_big_02
    line: SDG 17はパートナーシップを「他の16の目標を動かす機構」として名指す。その機構は測られてきた。多くの多ステークホルダー・パートナーシップは、ローンチから24カ月以内に若者包摂の目標を達成できない──そしてパターンが繰り返されるのは、設計が「光の体のアラインメント」ではなく「共通の声明」をテストするからだ。
  - id: miki_part_hook_big_03
    line: Mikiの伝統では、パートナーシップは「光の体のアラインメント」の層で読まれる──共通の価値観の下にある、実際の相性が住む層だ。この枠組みは制度的なアカウンタビリティを置き換えない──アカウンタビリティの枠組みが測る道具を持たない層を名指す。
  - id: miki_part_hook_big_04
    line: 鞍馬山の系譜は「パートナーシップのなかには転生前のアレンジがある」と持する──表面の心が説明できる前に、魂がその配置を認識する。この枠組みは負荷をロマン化しない──価値観のリストが予測できなかった仕方で、ある種のパートナーシップが困難な地形を越えて荷を負う理由を名指す。
  - id: miki_part_hook_big_05
    line: 多くのパートナーシップの枠組みは、協働を「各当事者がテーブルに持ち込むものの合計」として扱う。光の癒しの伝統は別のテストを持している──当事者の光の体が実際に整列しているかどうか、そして両者のあいだに開くチャネルが、どちらも一人では運べない種類のものかどうか。
teacher_intro:
  options:
  - id: miki_part_intro_01
    line: Mikiは、鞍馬山の聖地の系譜に根ざした日本の光の癒しの教師として、国際的なパートナーシップから戻る若者がプレスリリースが登録しない重みを抱えているのを見てきた。彼らは協働が重要かどうかを問うていない。彼らは、設計が「共通の声明」をテストし「実際に仕事を抱える光の体のアラインメント」をテストしないとき、本物のパートナーシップにどう留まるかを問うている。
  - id: miki_part_intro_02
    line: Mikiは、自分を従来の意味での教師としては位置づけない──彼女は伝送する者だ。鞍馬山の光は彼女を通してパートナーシップそのものへ──そのなかにいる個人だけにではなく──流れる。何十年もの間、彼女はアラインメントのギャップを既に読んでいる身体と、その読みを無視するよう告げられた表面の心を持って到着する若い当事者を見てきた。
  - id: miki_part_intro_03
    line: Mikiは「パートナーシップのなかには転生前のアレンジがある」と持する──表面の心が説明できる前に、魂がその配置を認識する。伝送セッションでは、若い当事者がその認識に出会い、自分が負荷を想像していただけだ、という受け継いだ枠組みを手放すのを見てきた。
  - id: miki_part_intro_04
    line: Mikiは、パートナーシップが「光の体のアラインメント」の層でテストされる伝統のなかで教えている──価値観のステートメントでも、共同プレスリリースでもなく、その下の、実際の相性が住む層で。彼女は、学生が「アラインメントのギャップの読みは過敏ではなく情報だった」と、しばしば初めて、認識するのを見てきた。
  - id: miki_part_intro_05
    line: MikiはAhjanとともに、彼女が教える原則そのものを実演するパートナーシップのなかで教えている──一方の当事者が他方の贈り物を認識させる条件をつくり、認識そのものを争わない。パートナーシップの問いを彼女の仕事に持ち込む学生は、その種の特定の地面を探している。
youth_somatic:
  options:
  - id: miki_part_somatic_01
    line: 共同プレスリリースを読んだ。肩が固まった。タブを閉じた。それからまた開いた──掲載されている名前が変わるわけではなく、身体がもう一度アラインメントを読む必要があったから。
  - id: miki_part_somatic_02
    line: パートナーシップの招待を開いた。喉が締めつけられた。読み流して通り過ぎた。それからまた戻ってきた──「いいえ」と言うことにもコストがあり、身体は招待が実際に何を求めているかを読み続けていたから。
  - id: miki_part_somatic_03
    line: 二つの組織の新しいMOUを読んだ。胸が締めつけられた。スマホを置いた。それから手に取った──小さい側の友人がすでにグループチャットにいて、アラインメントのギャップが働く条件になっていたから。
  - id: miki_part_somatic_04
    line: 運営委員会の会議に歩いて入ったとき、誰かが話す前に呼吸が短くなった。部屋に、警告されていなかった荷電があった。議題よりも先に、身体がその場を読んだ。
  - id: miki_part_somatic_05
    line: パートナーの電子メールを開いたとき、件名を読み終える前にあごが固まった。受信箱を閉じた。それからまた開いた──関係はまだそこにあり、身体がすでに非対称を示していたとしても。
teacher_witness:
  options:
  - id: miki_part_witness_01
    line: Mikiは、パートナーシップの仕事から戻る若者のなかで、まさにこのループを見てきた──リリース、締めつけ、目を逸らす、戻る、小さい側の人々はまだそこにいるから。彼女の伝統では、このループは故障ではない──プレスリリースが覆うように作られたアラインメントのギャップを、身体が読んでいる姿だ。
  - id: miki_part_witness_02
    line: 彼女は、学生が共通の価値観を期待してパートナーシップに入り、価値観は書類で一致しているのに光の体のアラインメントは一致していなかったために、消耗して去るのを見てきた。鞍馬山の伝統はその消耗を「協力スキルの失敗」とは解釈しない──設計がテストした層と、パートナーシップが実際に住んでいる層との不一致として名指す。
  - id: miki_part_witness_03
    line: Mikiはより遅いものを見てきた──若い当事者が「身体はずっとアラインメントを正しく読んでいた」と認識し、受け継いだ枠組みがその読みを上書きするよう訓練していた、と気づく瞬間だ。上書きが止むと、制度的な条件が変わっていなくても、パートナーシップの決定はより明確になる。
  - id: miki_part_witness_04
    line: 彼女は、若い当事者が「負荷は自分のプロ意識の欠如だ」と確信して到着するのを見てきた。彼女の伝統では、その確信は信号だ──身体のアラインメントの読みが「情報」ではなく「個人の欠陥」として読まれている場所だ。
  - id: miki_part_witness_05
    line: Mikiは、若い当事者が「パートナーシップのなかには転生前のアレンジがある」という認識を、まだ言葉なしに抱えて伝送セッションに歩いて来るのを見てきた。彼女の伝統では、その認識は「ファンタジー」ではなく「情報」として歓迎される──表面の心が説明できる前に、魂が配置を読んでいる姿として。
turnaround:
  options:
  - id: miki_part_turnaround_01
    stat_line_1: 480 youth-led coalitions. 33 countries.
    stat_line_2: 若い当事者は、オープンブックの共同統治のパイロットを運営し、MOUのデフォルトの守秘契約を拒否し、より大きなパートナーが頼まないでくれと言うときでもパートナーのアカウンタビリティ・スコアカードを公開している。
  - id: miki_part_turnaround_02
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: 2025年10月に採択されたWHO Europe「子ども・青少年の健康戦略2026-2030」は、53の加盟国に対して青少年のウェルビーイング──若者の声なしに設計された多ステークホルダー・パートナーシップのなかで青少年が抱える負荷を含む──を報告することを義務づけている。
  - id: miki_part_turnaround_03
    stat_line_1: 5,600 voices. 7 countries.
    stat_line_2: UNICEFの「青少年メンタルヘルスのためのグローバル連合」は、7カ国にまたがる14-25歳の若者5,600人を集めた──そしてコホートの報告は、標準的なパートナーシップ設計テンプレートが、若者が制度的協働をどう経験するかについて見落としていたものを表に出した。
  - id: miki_part_turnaround_04
    stat_line_1: 244 million. Out of school.
    stat_line_2: UNESCOのSDG 4モニタリングは、世界で学校に通っていない子ども・若者を2億4,400万人と推定している──若者に仕える、と主張するあらゆるパートナーシップが測られる規模であり、包摂の目標がテストされる基底だ。
  - id: miki_part_turnaround_05
    stat_line_1: 117 million displaced. UNHCR.
    stat_line_2: UNHCRの「グローバルトレンズ」は、強制的に避難させられた人々を1億1,700万人以上と推定している──パートナーシップの枠組みが「迂回する」のではなく「ともに設計する」ことを学ばなければならない人口であり、どのアラインメントが圧力下で持つかを露わにする負荷だ。
bridge:
  options:
  - id: miki_part_bridge_01
    line: 若者主導の連合480。33カ国。トラッカーは若者が築いたものを測る。最後のパートナーシップが「協働の言語」のなかで搾取をもたらしたあと、次のパートナーシップを可能にしたもの──パートナーシップが開く前にすでにそこにあった元来の完全性を思い出し、パートナーシップが再生産する非対称のなかでも思い出し続ける力──を記録する欄はない。Mikiの系譜は、その力を何世代も伝送してきた。
    hidden_capacity: 制度の非対称のなかで元来の完全性を思い出す
  - id: miki_part_bridge_02
    line: パートナーシップのトラッカーは署名と共同声明を数える。それらは、支配的なパートナーがパートナーシップを「カバー」として使ったあとも若い当事者がエンゲージメントに留まる内側の力を数えない。その力──鞍馬山の伝送が「種は土のなかで」の働きと呼ぶもの──は自分自身を告知しない。小さいパートナーが姿を見せ続けるあいだ、静かに働く。
    hidden_capacity: 自分自身を告知しない「種は土のなかで」の働きを信頼する
  - id: miki_part_bridge_03
    line: 若者主導の連合480。33カ国。数は行動を測る。それは、より遅いもの──制度的な力があなたの力から搾取するよう形作られている人々と、本物の協働のなかに留まる規律──を測らない。Mikiは、鞍馬山のアセンデッドマスターがパートナーシップについて持しているもの──真にアラインしている協働を通して動く光は、当事者個々の光の合計ではなく、質的に異なる何かだ──を伝送する。
    hidden_capacity: どちらも一人では運べないパートナーシップのチャネルを開く
  - id: miki_part_bridge_04
    line: 追跡された結果は、契約、声明、招集を記録する。それは、共通の話題の下にある光の体のアラインメントを記録しない。Mikiの枠組みでは、そのアラインメントこそ、パートナーシップが持つか持たないかが決まる層であり──価値観のリストがテストするよう作られたことのない層だ。
    hidden_capacity: 価値観のリストがテストできない光の体のアラインメントを登録する
  - id: miki_part_bridge_05
    line: 構造、MOU、プラットフォームは数えられる。あるパートナーシップが実際に運んでいる転生前のアレンジは、数えられない。Mikiの伝統は制度的アカウンタビリティの枠組みを置き換えない──枠組みが読む道具を持たない層を名指し、魂がまず配置を認識した層への入口として伝送を示す。
    hidden_capacity: 枠組みが読めない転生前のアレンジを名指す
teacher_perspective:
  options:
  - id: miki_part_perspective_01
    header: Mikiが見ていること
    paragraphs:
    - 実践は土のなかの種のように働く──静かに、ふつうの生活の背景で。Mikiのパートナーシップは、Ahjanがほかでは出会わないであろう聴衆にMikiの仕事を紹介するものであり、この原則をリアルタイムで実演する。もっとも生成的なパートナーシップは、一方の当事者が他方の贈り物を認識させる条件をつくり、認識そのものを争わないものだ。
    - 癒しは壊れたものを修理することではない──元来の完全性を思い出すことだ。パートナーシップに当てはめると、Mikiの伝送は、もっとも効果的な協働は「互いの欠損を埋める」ものではなく、「両者が出会いを通して自分自身の完全性を思い出し、活性化する」ものだと持する。互いの補償ではなく、互いの思い出しとしてのパートナーシップだ。
    - Mikiが運ぶ周波数の源である鞍馬山のアセンデッドマスターは、協働について特定の見方を持している。真にアラインしているパートナーシップを通して動く光は、個々の光の合計ではなく、質的に異なる何かだ──どちらも一人では運べない伝送だ。これは、パートナーシップがそもそも存在する理由についての鞍馬山の理解だ──効率でもカバレッジでもなく、複数を必要とするチャネルが開くことだ。
  - id: miki_part_perspective_02
    header: Mikiが見ていること
    paragraphs:
    - Mikiは身体を通してパートナーシップの緊張を読む。小さい側のパートナーは、二つの場を同時に抱えるよう求められている──宣言された協働の場と、支配的なパートナーが実際に行っていることの場だ。光の癒しの伝統は、この緊張を「態度の失敗」として扱わない。パートナーシップ設計が直接向き合うことを拒否したアラインメントのギャップを、身体が読んでいる姿として扱う。
    - そこからMikiは「思い出すこと」を実践として向ける。鞍馬山の伝送は、何か新しいものを獲得することではない。常にそこにあったもの──制度の設計が「欠損」と印をつけ続ける元来の完全性──を覆いから取り出すことだ。小さい側のパートナーがそれを思い出すと、設計が割り当てようとした役割を継承することなく、パートナーシップの会話を進めることができる。
    - '再フレームは正確だ: 協力スキルの個人的失敗──自分は壊れている、非対称に気づいたのは間違いだった──のように感じられるものは、しばしば「想定された欠損」のまわりに設計されたパートナーシップを、身体が正確に拒否している姿だ。元来の完全性は、パートナーシップが開く前にすでにそこにあり、パートナーシップがそれをどう名指しても損なわれない──と身体が感じ取ると、自分を「壊れている」と呼ぶことをやめる。'
  - id: miki_part_perspective_03
    header: Mikiが見ていること
    paragraphs:
    - Mikiは「パートナーシップのなかには転生前のアレンジがある」と持する──表面の心が説明できる前に、魂がその配置を認識する。この枠組みは負荷をロマン化せず、すべての関係を予測もしない──価値観のリストが予測できなかった仕方で、ある種のパートナーシップが困難な地形を越えて荷を負う理由を名指す。
    - スターシードとアセンデッドマスターの文脈はここで重要だ。Mikiは、困難な制度的地形を越えてパートナーシップの仕事を運ぶ魂たちが、制度的地形が認識する方法を知らない力を持って到着することが多いと教える。伝送はその魂たちにすでに運んでいるものを思い出すのを助ける──そして両者がその認識との接触のなかにあるとき、パートナーシップの仕事は異なる進み方をする。
    - '再フレームは重要だ: デジャヴュや早すぎる愛着のように感じられるもの──自分はプロらしくない、投影している──は、しばしば魂がすでに出会ったことのある配置を、身体が正確に登録している姿だ。その認識は、自分自身と議論するに任されるのではなく系譜のなかで抱えられるとき、ファンタジーではなく情報だ。'
  - id: miki_part_perspective_04
    header: Mikiが見ていること
    paragraphs:
    - Mikiはパートナーシップを「光の体のアラインメント」の層で読む──共通の価値観の下にある、実際の相性が住む層だ。価値観のステートメントは一致しうるが、光の体のアラインメントは一致しないことがあり──そしてパートナーシップは、二つの層のあいだのギャップに比例して、一方の当事者を消耗させる。
    - 伝統はこれを神秘的な好奇心として扱わない。工学として扱う。アラインメントのギャップを読んできた身体は、それを読み続ける──読みと議論しても、ギャップは閉じない。ギャップを閉じるのは、ギャップが実際に住んでいる層でのアラインメント作業だ──そしてその作業の不在こそ、同じパートナーシップのパターンが戻り続ける理由だ。
    - 再フレームは具体的だ。障害は、ギャップに気づき続けるパートナーにあるのではない。表層だけをテストし、身体に読みを上書きするよう期待する設計にある。Mikiの伝統は、上書きを求める体系に踏みつぶされることなく、読みとの接触のなかに留まる実践を提供する。
  - id: miki_part_perspective_05
    header: Mikiが見ていること
    paragraphs:
    - Mikiは非対称を正確に名指す。多くの制度的パートナーシップは意図の失敗ではない。出口コストが非常に異なる当事者によって設計されたアレンジだ。安く立ち去ることができる当事者は、実際には条件を設定する傾向がある。光の癒しの伝統は、出口コストが等しいふりをして応えるのではない。身体を通して、「小さい当事者の価値はより大きい当事者の条件に依存しない」という認識を伝送することで応える。
    - 系譜は出口コストの非対称の下にある二つ目の層を名指す──光の体のアラインメントの層だ。パートナーシップの実際の耐久性が決まる場所だ。出口コストの非対称は高いが光の体のアラインメントが真であるパートナーシップは、なお持ちうる──出口コストの非対称は低いが光の体のアラインメントが不在であるパートナーシップは、プレスリリースに関わらず、持たない。
    - '再フレームは重要だ: 個人的失敗──自分は壊れている、パートナーシップの形に合わないのは間違いだ──のように感じられるものは、しばしば「間違ったテスト」のまわりに設計されたパートナーシップを、身体が正確に拒否している姿だ。本当のテストは、小さい当事者がより大きい当事者のテンプレートに合うかどうかではなく、当事者のあいだにチャネルが開くかどうかだ──と心が見るとき、心は自分を「壊れている」と呼ぶことをやめる。'
practice:
  options:
  - id: miki_part_practice_01
    display_name: 種は土のなか・パートナーシップの受け取り
    announcement_line: Mikiは、パートナーシップが貢献を欠損として扱いはじめ、小さい側のパートナーが「パートナーシップが開く前にすでにそこにあったもの」を思い出す必要のある瞬間のための5分間の「種は土のなか・パートナーシップの受け取り」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体は、パートナーシップの欠損ナラティブを「自己についての真実」として運ぶのをやめる。
    - 次の会話、次のMOUの改訂、留まるかどうかの次の決定のために、より落ち着いた地面が戻る。
  - id: miki_part_practice_02
    display_name: 元来の完全性・パートナーシップ実践
    announcement_line: Mikiは、パートナーシップが「一方の当事者がもう一方を救う」物語として自らを語りはじめた瞬間のための5分間の「元来の完全性」実践──修理ではなく思い出すこととしての癒し──を教える。サイドバーに、コール前にも、会議後にも、短く使えるよう載せている。
    relief_lines:
    - 設計が組み込む「庇護者-被救援者」の力学が、避けがたいものとして住み続けることをやめる。
    - 仕事の実際の条件で、エンゲージメントか拒否かを選ぶに足りる地面が戻る。
  - id: miki_part_practice_03
    display_name: 鞍馬山のチャネル実践
    announcement_line: Mikiは、鞍馬山の伝送に根ざした7分間の実践を教える──両者が「割り当てられた位置」ではなく「完全性」から入る必要があるパートナーシップ会議の前のために。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体は、部屋、人々、会議の実際の利害を認識する。
    - 次の合意、拒否、または正直な間のための、より明確な地面が戻る。
  - id: miki_part_practice_04
    display_name: 光の体のアラインメント・チェック
    announcement_line: Mikiは、価値観のステートメントは一致するのに身体がギャップを読み続け──表面の心がその読みが「情報」か「投影」かを知る必要がある──瞬間のための4分間の「光の体のアラインメント・チェック」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体がしてきた読みが、「想像」として上書きされることをやめる。
    - 留まるか、一歩引くかの決定が、実際のデータに基づいて可能になる。
  - id: miki_part_practice_05
    display_name: 転生前の認識・抱え
    announcement_line: Mikiは、パートナーシップの配置が表面の心が説明できない荷電とともに登録され、魂に「認識はファンタジーではなく情報だ」と思い出させる必要のある瞬間のための3分間の「転生前の認識・抱え」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 認識が、受け継がれた枠組みによって議論で押し出されることをやめる。
    - 魂が、一人ではなく系譜とともに、配置を抱える。
sdg:
  primary:
    line: 国連の枠組みはSDG 17を通じて、多ステークホルダー・パートナーシップ、データ、モニタリング、アカウンタビリティを含む。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: miki_part_cta_01
    line: 'UN Major Group for Children and Youth（UN MGCY）は、ハイレベル政治フォーラムを含む国連パートナーシッププロセスへの若者のインプットを調整している。入口: unmgcy.org'
  - id: miki_part_cta_02
    line: 'Restless Developmentは、グローバル・サウス全域でパートナーシップの成果に関する若者主導の研究とアカウンタビリティの仕事を運営している。入口: restlessdevelopment.org'
  - id: miki_part_cta_03
    line: 'PYE Globalは、協働を「プレスリリース」ではなく「実践」として扱う、ピア・トゥ・ピアのパートナーシップ研修を運営している。入口: pyeglobal.org'
  - id: miki_part_cta_04
    line: 'International Youth Foundationは、100カ国以上で、雇用、教育、リーダーシップの測定可能な成果を持つ若者開発のパートナーシップを運営している。入口: iyfnet.org'
  - id: miki_part_cta_05
    line: 'Civicusは、アカウンタブルなパートナーシップとシビックスペースのモニタリングに取り組む、市民社会組織の世界的同盟だ。入口: civicus.org'
title_system:
  headline_layer_2:
    options:
    - id: miki_part_headline_01
      line: 日本の光の癒しの教師が、パートナーシップが繰り返し再生産する「欠損設計」を名指し──チャネルを取り戻す伝送を示す。
    - id: miki_part_headline_02
      line: 鞍馬山の系譜はパートナーシップを「光の体のアラインメント」の層──共通の価値観の下にある、実際の相性が住む層──で読む。
    - id: miki_part_headline_03
      line: あるパートナーシップは転生前のアレンジだ──そして認識は、心がそれと議論する前に身体のなかに到着する。
    - id: miki_part_headline_04
      line: 癒しは元来の完全性を思い出すこと──その認識の上に築かれたパートナーシップは、「互いの欠損を埋める」上に築かれたパートナーシップとは異なる耐久性を持つ。
    - id: miki_part_headline_05
      line: 合計ではなくチャネル──鞍馬山のアセンデッドマスターが、パートナーシップがそもそもなぜ存在するかについて持しているもの。
