hook_personal:
  options:
    - id: hook_personal_01
      line: ニュースを読み、わたしたちをすべてつなぐ網が裂けたように感じます。それでも翌朝、学校では平気なふりをしなければなりません。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 分断された世界を受け継いだ世代に、紛争ニュースは何かをします。それは情報だけではありません。人、土地、集合的安全のあいだの関係の網が裂け、なお予定どおりに裂け続けていることを身体が知る、ということです。
teacher_intro:
  options:
    - id: identity_observation_shift_01
      line: ライトランゲージとサウンドヒーリングを教えるMikiさんは、実践の場で、紛争ニュースが若者に何をもたらすかを見てきました。彼らが問うのは暴力の真実性ではありません。壊れゆく場所についての真実を受け止めつつ、集合的安全の喪失で身体が閉じないようにするにはどうするか、です。
    - id: identity_observation_shift_02
      line: ライトランゲージとクリスタルボウルの伝統から、Mikiさんは、若者がまた都市が爆撃され、また集落が避難し、また一線が断たれたと読む場面を実践の場で見てきました。それはまず胸の凍りとして届き、つづいて共通の安全の網があるという前提の喪失として届きます。その破れ目は、集合的断裂という言葉を心が見つけるずっと前に、無感覚とドゥームスクロールとして身体に宿ります。
youth_somatic:
  options:
    - id: conflict_freeze_01
      line: "フィードで紛争の更新を読みます。胸が凍ります。着地せずにスクロールを続けます。わたしたちがすべてつながっているという感覚を取り戻す何かを求めて。それから無感覚が来て、見られないまま見てしまう、在り続けられないまま在る、というあいだで、さらにスクロールします。\n\nLOOP_SEQUENCE: \"更新を読む。胸が凍る。着地せずスクロールする。無感覚になる。戻る。\""
    - id: conflict_freeze_02
      line: "避難の見出しを見ました。のどが締まります。さらに深くスクロールし、それから通り過ぎ、また戻り、知る必要と逃げたい必要のあいだに挟まれます。それから感じることが止まりました。\n\nLOOP_SEQUENCE: \"見出しを見る。のどが締まる。深くスクロールして通り過ぎる。感じるのをやめる。\""
teacher_witness:
  options:
    - id: mirrored_loop_01
      line: Mikiは若者のなかにこのループそのものを見てきました──読む、凍る、尽きないスクロール、麻痺。
    - id: mirrored_loop_02
      line: 彼女は世界ニュースを抱える若者の身体のなかでその順序も見てきました──身体が凍り、スクロールが深くなり、感覚が消え、断裂がまだ真実なのでループがまた始まる。
turnaround:
  options:
    - id: youth_action_peace_01
      stat_line_1: "1,200+ active campaigns. 156 countries."
      stat_line_2: 若者は平和構築の取り組み、紛争を越えた対話、停戦への説明責任を求める運動を組織し、ワークショップを開き、紛争ニュースがつくる孤立を拒んでいます。
    - id: youth_action_peace_02
      stat_line_1: "1,200+ active campaigns. 156 countries."
      stat_line_2: 若い組織者は紛争線の両側で信頼を築き、軍事費への説明責任を政府に求め、ニュースが修復不能だと告げた集合的安全の網を再び織り直しています。
bridge:
  options:
    - id: tracker_capacity_01
      line: 平和構築のトラッカーは停戦交渉と対話の取り組みを数えます。前回の爆撃のあと、次の関与の日を可能にしたもの──ニュースが繰り返し裂くなかでも「集合的な帰属と接し続ける力」──の欄はありません。紛争を越えた対話を組織した若者にはそれが要りました。更新を読み、胸が凍り、なおスクロールし、網を探している人にも要ります。Mikiの伝統は、何世代にもわたり、サウンドと在り方を通じてその力を育んできました。接続は断たれても、身体はそれを覚えていられます。
    - id: tracker_capacity_02
      line: 紛争と平和構築のデータベースは死傷者、停戦、交渉を数えます。ニュースが喪失を告げたあとも、若者が自身のまとまりと集合的安全への信を保てる内面の容量は数えません。次の橋を架ける会話にはそれが要ります。紛争の更新を読み、世界が割れたと感じ、接続を探しに戻る人にも要ります。Mikiの伝統は、その容量は欠けているのではなく、戦争と暴力の関係性の断裂に覆われている、と捉えます。サウンドとライトランゲージは、破れより大きなものへの帰属の信頼をあらわにするのを助けます。
teacher_perspective:
  options:
    - id: relational_rupture_01
      header: Mikiが見ていること
      paragraphs:
        - Mikiの伝統では、紛争と暴力は可能なかぎり深い関係性の断裂として理解されます。すべての人、すべての場所、すべての未来をつなぐ網の破れです。若者が戦争、爆撃、避難について読むとき、身体は抽象情報としてではなく、集合的帰属の布の裂け目としてこれを記録します。胸の凍り、無感覚のスクロール、網がまだ保たれている証拠をニュースが求める戻り──これらは弱さの印ではありません。関係性のトラウマへの正確な読み取りです。
        - 正しい関係性のなかで生きるという原理は問います。網を通じて遠い他者とつながっているとき、わたしたちは何に責任を負うのか、と。分断された世界を受け継いだ若者にとって、紛争ニュースを読むことはその問いに毎日触れることです。身体はしばしば言葉より先に答えます。わたしたちはつながっており、わたしたちは責任を負い、断裂は網が本物だからこそ痛い、と。
        - 重要な転換は次のとおりです。「私が壊れている、無力な絶望のなかで間違っている」という感じ方は、しばしば、集合場の本当の断裂への正確な反応です。身体は故障しているのではありません。安全と帰属がすべての人に共有されるという前提の破れを記録しています。若者が無感覚を個人的欠陥ではなく、集合的まとまりの喪失への合理的反応と理解するとき、自己責めが和らぎます。問題は若者ではありません。問題は、網の体系的・制度的な破れであり、身体がそれを知っている、ということです。
    - id: relational_rupture_02
      header: Mikiが見ていること
      paragraphs:
        - Mikiは紛争ニュースと若者への影響を祓い──この場合は人間の帰属と集合的安全の網を傷つける行いを清める営み──のレンズで読みます。戦争と暴力は政治や戦略の出来事だけではありません。わたしたちが一緒に抱かれていると告げる関係場を体系的に壊す出来事です。
        - 進行する紛争の世界を受け継ぐ若者は、どの世代よりも少ない資源で集合的帰属を抱くよう求められています。更新のたびに、網は脆く、断裂はいつでも起こりうる、安全の前提は地球規模では共有されていない、と思い出させられます。それは比喩ではありません。身体が凍り、無感覚になり、着地なくスクロールするとき、身体が応答していることそのものです。
        - その枠組みでは自己責めが和らぎます。乱れは若者の希望やケアの能力ではなく、打ちのめされたと感じる私が間違っている、ということでもありません。乱れは、断裂が本物で続いている世界にあります。想起としての癒しとは、帰属の網を認め、そこにとどまる力は決して失われなかったが、なお起きている破れに覆われている、ということです。サウンドと在り方は、断裂の下に、まとまりと接続は死んでいない──認識され、体系と制度が求めるもののために設計されていない構造のなかで再建されるのを待っている──と身体が思い出すのを助けます。
practice:
  options:
    - id: sound_receiving_01
      announcement_line: Mikiは、紛争ニュースが胸を凍らせ、身体が集合的安全の糸を失った瞬間のため、5分間の「サウンドと光の受容」を教えています。サイドバーに、時間どおりの手順付きで載せています。
      relief_lines:
        - 身体は、断裂ごとに「接続は不可能だ」と証明するのをやめます。
        - 次の会話と、網を織り直す次の一歩に足るほどのまとまりが戻ります。
    - id: sound_receiving_02
      announcement_line: Mikiは、ニュースサイクルが無感覚をループに変え、深くスクロールしているのに着地しないときのため、5分間の実践を教えています。サウンドは、網のなかですべてが抱かれているという信から切り離された部分に届きます。サイドバーにあり、読んだあと、組織する前、ニュースが足元を奪ったときなど短時間で使えます。
      relief_lines:
        - 身体は、断裂を自分がケアできなかった個人的失敗の証明にするのをやめます。
        - 帰属と信頼の感覚が整い、他者と行動し組織する力が戻ります。
sdg:
  primary:
    line: 国連はSDG 16とその平和構築、紛争予防、包摂的な正義の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: peace_org_01
      line: "Peace Beyond BordersとSearch for Common Groundは、紛争を越えた対話と平和構築への若者向け入口を提供しています。入口: https://www.sfcg.org"
    - id: ceasefire_01
      line: 停戦提言と非軍事化への入口を探すなら、Youth for Ceasefire Coalitionは紛争線を越えてZ世代の組織者をつなぎます。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
      - id: breaking_web_01
        line: ニュースは網が破れたと言った。身体はそれを信じた。
  headline_layer_2:
    options:
      - id: miki_attention_01
        line: ライトランゲージとサウンドのヒーラーが、紛争ニュースが若者の集合的安全の感覚に何をするかを名指します。
      - id: miki_relational_01
        line: ある癒しの伝統は、紛争を可能なかぎり深い関係性の断裂として読み、網が破れるなかでもまとまりを保つための実践を示します。
