hook_personal:
  options:
    - id: hook_personal_01
      line: 問題は宿題だけではありません。宿題が届く場──そこに自分の全体が許されているかどうか、です。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 教育のストレスは、動機づけより先に環境の問題であることが多い。一日は中断、圧力、注意や自己のほかの側面が落ち着く余地のなさで組み立てられています。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: ライトランゲージとサウンドヒーリングを教えるMikiさんは、実践の場で、学習条件が大きく生み出す注意の失われ方を、学生の責めにされている様子を見てきました。彼らが問うのは、もっと集中する方法だけではありません。体系が知性だけに語りかけ、身体が部屋の外に置かれたままのとき、学びはどう起こりうるのか、です。
    - id: teacher_intro_02
      line: ライトランゲージと伝達の伝統から、Mikiさんは、若者が自分の知のほんの一部しか測られていないと知っているときに何が起きるかを実践の場で見てきました。彼らが求めているのは楽な試験ではありません。ポータルとタブで心が疲れきったとき、身体が受け取れる伝達の仕方を、です。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: "課題ポータルを開きます。集中が散ります。タブを切り替えます。それから戻ります。課題はまだ待っているからです。\n\nLOOP_SEQUENCE: \"ポータルを開く。集中が散る。タブを切り替える。戻る。\""
    - id: youth_somatic_02
      line: "講義を読み込みます。呼吸が浅くなります。グループチャットを確認します。それから画面に戻ります。締切は動いていないからです。\n\nLOOP_SEQUENCE: \"講義を読み込む。呼吸が浅くなる。チャットを確認する。戻る。\""
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Mikiは学生のなかにそのループを見てきました──課題が開き、心が散り、タブが変わり、同じ圧力場のなかで注意が再び組み立てられる。
    - id: teacher_witness_02
      line: 彼女はその順序も見てきました──ポータル、散り、切り替え、戻り。身体は部屋に招かれたことはなく、学びは頭のなかだけにあると体系は仮定します。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 何百ものキャンパス。数十カ国。
      stat_line_2: 学生と若者の連帯は運動を組み、知性だけでなく整个人を尊重する学習環境を開き、画面だけでなく在り方のレベルで伝達が起こるピア主導の場をつくっています。
bridge:
  options:
    - id: bridge_01
      line: 教育のトラッカーは資格と修了率を数えます。身体が含まれるときに学びを受け取る力──場が断片化したときに注意を統合する力──は数えません。次の世代にはそれが要ります。Mikiの伝統は、最も深い伝達は情報だけではなく、整个人が部屋に招かれたとき身体が受け取るものであると捉えます。サウンドと在り方が、その招きをつくります。
    - id: bridge_02
      line: 体系は知性が再生産できるものを測ります。次の本当の理解の瞬間を可能にしたもの──身体が着地し、心が統合できる力──の欄はありません。ついに概念を理解した学生にはそれが要りました。ポータルを開き、タブを切り替え、戻った人にも要ります。Mikiの伝統は、整个人に働きかける実践を通じて、その力を何世代にもわたって育んできました。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Mikiが見ていること
      paragraphs:
        - Mikiの伝統では、最も深い伝達は情報だけではありません。整个人が部屋にいるとき、身体が受け取るものです。ポータルと画面だけで内容を届け、身体を招かない教育の体系は、技術的にはできるが注意を統合できず、断片化に耐えられない学生を生みがちです。伝統は問います。身体が含まれるなら、学びはどう見えるか、と。
        - ライトランゲージとサウンドは概念ではなく共鳴を通じて働きます。言葉と画面の届かないところに届きます。学校の一日の構造とデジタル場によって注意が散らされた若者にとって、伝統は対抗重りを与えます。次の要求が来る前に、身体が受け取り統合できる実践です。
        - その転換が重要です。問題は学生に規律がないことではありません。問題は、伝達を情報転送へ削ぎ落とし、受け取りと統合の能力を含め、あなたのほかの部分をドアの外に置いたことです。「私が壊れている、間違っている」という私的な欠陥に感じることが、しばしば、個人では直せない条件への正確な反応です。Mikiの伝統は、その力に名前と実践を与えます。
    - id: teacher_perspective_02
      header: Mikiが見っていること
      paragraphs:
        - Mikiは教育のストレスを伝達のレンズで読みます。身体は、心が十分に処理する前に受け取ります。学習環境が知性だけのため──ポータル、タブ、締切──に組み立てられると、身体は断片化したまま置かれます。伝統は、本当の学びには整个人が要る、とします。さもなければ、体系は人間が知りうるほんの一部だけを測っています。
        - 想起としての癒しは、ここにも当てはまります。集中し、統合し、在り続ける力は破壊されたのではなく、招かれたことがありません。サウンドと在り方は、その力が戻る条件をつくります。伝統は、もっと頑張れと学生に求めません。身体が着地するよう、条件が変わることを求めます。
        - その枠組みでは自己責めが和らぎます。乱れは学生だけにあるのではなく、私が苦しんでいるのが間違いでもありません。乱れは、学びが届けられ方と、人間が実際に受け取る仕方のあいだの隙にあります。Mikiの伝統は、それが求めるもののために設計されていない体系と制度の構造のなかで、その隙のための実践を示します。
practice:
  options:
    - id: sound_receiving_01
      announcement_line: Mikiは、ポータルとタブが注意を散らし、身体が着地する招きを受けていない瞬間のため、5分間の「サウンドと光の受容」を教えています。サイドバーに、時間どおりの手順付きで載せています。
      relief_lines:
        - 身体は、断片化を一人で抱えるのをやめます。
        - 次の本当の集中の区間に足るほどの安定が戻ります。
    - id: sound_receiving_02
      announcement_line: Mikiは、学習環境が知り方を断片化し、心がポータルと評価で疲れきった瞬間のため、5分間の実践を教えています。言葉の届かないところにサウンドは届きます。サイドバーにあり、授業のあいだ、スクロールのあと、次の課題の前など短時間で使えます。
      relief_lines:
        - 身体は、断片化を自分から隠すのをやめます。
        - 内面のペースが整い、すでに知っていることを認められる力が戻ります。
sdg:
  primary:
    line: 国連はSDG 4とその質の高い教育と生涯学習の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: 多くのキャンパスで、学生主導のメンタルヘルスと学習正義のグループがピアの場と提言を提供しています。入口はキャンパスネットワーク、ワークショップ、または地域の若者組織の窓口です。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 教育のストレスは、動機づけより先に環境の問題であることが多い。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: ライトランゲージとサウンドのヒーラーが、身体が部屋に招かれたとき学びはどう見えるかと問います。
      - id: headline_layer_2_02
        line: ある癒しの伝統は、伝達が情報だけのとき失われるものを名指し、身体が外に置かれたままになることを示します。
