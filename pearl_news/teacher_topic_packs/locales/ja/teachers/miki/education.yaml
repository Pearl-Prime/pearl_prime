hook_personal:
  options:
  - id: miki_edu_hook_personal_01
    line: あなたはまだ学びたい。同時に、一日のどれだけが「その背景に荷電を持たない情報の転送」かも知っている──そして言葉になっていなくても、別の種類の学びを覚えている部分が、あなたの一部にはある。
  - id: miki_edu_hook_personal_02
    line: ポータルを開く。注意が散る。タブを切り替え、戻る。作業はまだ終わらない──そして、部屋の場が決して「光の場」ではなく、ただの配信システムだったと、あなたの一部は知っている。
  - id: miki_edu_hook_personal_03
    line: 勉強しようと座る。部屋は平らに感じられる。知性は押し通そうとし、身体は押し返す。その平らさが負荷だ──系譜が持する「教室を光の場として」が決して届けられず、あなたはそれなしで作業している。
  - id: miki_edu_hook_personal_04
    line: 課題は目の前にある。頭は、すでに学校で9時間分の仕事をした。同じ段落を三回読んでも入らない──そして頭で押し通そうとしている部分は、その場が最初から呼び入れなかった部分だ。
  - id: miki_edu_hook_personal_05
    line: 成績が届き、より深い知っていることの上に乗る──「評価基準」は、系譜が「受け取り」と呼ぶものを記録するよう作られたことがなく、あなたは何年も「間違った層で間違ったもの」のために評価されてきた。
hook_big_picture:
  options:
  - id: miki_edu_hook_big_01
    line: 若者教育のいまの危機は、内容やアクセスだけの危機ではない。場の危機だ。鞍馬山の伝統では学びは「山そのものから受け取られる」──そして「情報転送として」造られた教室は、系譜が「教え」として意味する層を届けられない層で動いている。
  - id: miki_edu_hook_big_02
    line: 知性が再生産できるものだけを測る教育システムは、人が知っているものの最小の部分しか測っていない。この伝統で本当の教育とは、荷電された場のなかでの光の伝送だ──そしてその場の不在こそ、どんな評価基準にも欄を持たない負荷だ。
  - id: miki_edu_hook_big_03
    line: Mikiの伝統で「スターシード」の系譜は、学びを「光の場」として期待して到着した魂だ。「注意の欠如」と読まれているものは、多くの場合、その場が部屋にないという魂の正確な登録だ──そして受け継がれた枠組みは、その登録を学生の失敗と読み続ける。
  - id: miki_edu_hook_big_04
    line: 知性だけのために造られた教室は、複数の層で受け取る力を持って到着したコホートを抱えられない。その力は病理でもクセでもない──コホートの実際のレンジだ──そして構造は、まったく異なるレンジのために造られていた。
  - id: miki_edu_hook_big_05
    line: 「山そのものから教えを受け取る」鞍馬山の実践は、何世紀にもわたるものだ。近代の教室への翻訳は直接的だ──部屋が光で荷電されているとき、レッスンは、評価基準が学びを本物にするためにそれを測らなくてもよい層で着地する。
teacher_intro:
  options:
  - id: miki_edu_intro_01
    line: Mikiは、鞍馬山の聖地の系譜に根ざした日本の光の癒しの教師として、伝送セッションで、「光の場」ではなく「情報転送」として造られた教室によって大部分が生み出される注意の喪失について学生が責められるのを見てきた。彼らは「どうやってもっと集中するか」だけを訊いていない。場が部屋から欠けているとき、学びはどう起きるのかを訊いている。
  - id: miki_edu_intro_02
    line: Mikiは、自分を従来の意味での教師としては位置づけない──彼女は伝送する者だ。鞍馬山の光は彼女を通して学生に、評価基準が学びを本物にするためにそれを登録しなくてもよい層で流れる。何十年もの間、ポータルとタブで知性が疲れ、身体が荷電された場を待ち続けてきた若者と仕事をしてきた。
  - id: miki_edu_intro_03
    line: Mikiは、学びが「山そのものから受け取られる」伝統のなかで教えている。コホートへの翻訳は直接的だ──注意の散らばりと読まれているものは、しばしば、部屋がその場が動くべき層で荷電されていないことを魂が登録している姿だ。そしてその登録は、失敗ではなく情報だ。
  - id: miki_edu_intro_04
    line: Mikiは、このコホートのスターシードの魂たちが「複数の層で受け取る」特定の力を持って到着したと持している。伝送セッションでは、若いクライアントがその認識に出会い、評価基準からの距離が「欠陥」ではなく「来た理由」だったという確信に出会うのを見てきた。
  - id: miki_edu_intro_05
    line: Mikiは「癒しは修理ではなく思い出すこと」と持する伝統のなかで教える。学びに当てはめると、これは、集中する力、統合する力、レッスンを着地させる力は壊れてはいなかった──「光の場」ではなく「情報転送」を届けた部屋に、決して招き入れられなかった、ということを意味する。再フレームは具体的だ。
youth_somatic:
  options:
  - id: miki_edu_somatic_01
    line: 課題ポータルを開く。目の焦点が失われる。タブを切り替える。それから戻る、作業はまだ終わらないから。
  - id: miki_edu_somatic_02
    line: 試験が画面に読み込まれる。額が緊張する。最初の問題を読み、目がうつろになる。吸収せずに下にスクロールする。時計は動いている。
  - id: miki_edu_somatic_03
    line: 講義を座って聴くあいだ、許可なく肩が上がっていく。スライドが更新される。身体は40分動いていない。呼吸は部屋の平らな場に合わせて短くなった。
  - id: miki_edu_somatic_04
    line: 段落の途中でグループチャットが光る。呼吸が止まる。メッセージを確認し、糸を失う。読んでいたものはもう入っていなかった──チャットが、場が1時間にわたって生み出していた散らばりに名前をつけただけだ。
  - id: miki_edu_somatic_05
    line: 授業が終わる。廊下に出る。目はロッカーに焦点が合わなくなり、身体はようやく一日を吐き出す。スマホを取り出す。次の何かを身体のなかで抱える余地が残っていないから、スクロールが始まる。
teacher_witness:
  options:
  - id: miki_edu_witness_01
    line: Mikiは、学生のなかでこの連なりを見てきた──ポータル、散らばり、タブ切り替え、戻り。彼女の枠組みでは、その散らばりは欠如の証拠ではない──部屋がその場の動くべき層で荷電されていない、と魂が登録している姿だ。
  - id: miki_edu_witness_02
    line: 制度が散らばりを「失敗」と読むのを彼女は見てきた──散らばりこそが信号だったのに。身体は、部屋の場が「届けられる範囲」を踏み越えていたことを知っていた──そして魂は「荷電された部屋」のために、言葉なしに待っていた。
  - id: miki_edu_witness_03
    line: Mikiは、若い学習者が「集中できないのは性格の問題」と確信して伝送の場に到着するのを見てきた。そして、身体がそれを「自分の壊れ」ではなく「場の不在」として読んでいたのだと気づく瞬間も。
  - id: miki_edu_witness_04
    line: 彼女の枠組みでは「ポータル疲労」は比喩ではない。知性はその日中、同じ種類の接触で使われすぎ、そして魂はずっと「荷電された場」を頼んでいた。伝送のセッションは、その頼みが出会われる唯一の部屋だ。
  - id: miki_edu_witness_05
    line: Mikiは若い学習者が「評価基準が登録しない力」を抱えて伝送の場に歩いて来るのを見てきた──そしてその力が初めて歓迎されるのを見てきた。彼女の伝統では、その歓迎は治療でもカリキュラムでもない──欠けていた場が、ようやく到着する瞬間だ。
turnaround:
  options:
  - id: miki_edu_turnaround_01
    stat_line_1: 650 chapters. US campuses.
    stat_line_2: Active Mindsはいま、米国の大学キャンパスで650以上のピア主導のメンタルヘルス支部を運営し、学生に傾聴サークルの主催を訓練し、学習条件を「私的なレジリエンス」ではなく「インフラ」として扱うよう制度に圧力をかけている。
  - id: miki_edu_turnaround_02
    stat_line_1: 244 million. Out of school.
    stat_line_2: UNESCOのSDG 4モニタリングは、世界で学校に通っていない子ども・若者を2億4,400万人と推定している──「教室の場」の話が測られる基底であり、コホートの負荷が抱えられる規模だ。
  - id: miki_edu_turnaround_03
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: JED財団のJED Campusプログラムは、米国の約500の大学で包括的なメンタルヘルスと学習条件の枠組みを運営し、ピア支援と教員研修を日常のインフラのなかに組み込んでいる。
  - id: miki_edu_turnaround_04
    stat_line_1: 65 percent. UNICEF Learning Recovery.
    stat_line_2: UNICEFの2024年「学習回復」モニタリングは、世界で高校2年生に相当する学年で基礎的な習熟度に達する生徒が約65%にとどまることを示した──政策が、修辞ではなく資金のある回復プログラムで対応できる、追跡可能なギャップだ。
  - id: miki_edu_turnaround_05
    stat_line_1: $1 billion. Education Cannot Wait.
    stat_line_2: 国連がホストする「危機影響下の教育のためのグローバル基金」Education Cannot Waitは、2016年以来10億ドル以上を動員してきた──標準的な教室制度が構造的に届かなかったコホートに、資金が回された。
bridge:
  options:
  - id: miki_edu_bridge_01
    line: トラッカーは政策の変化やピアプログラムを測る。次の1時間、本当に「受け取り」が可能になった理由──表面の心が散らかったときに、評価基準が登録しない層から受け取る力──の欄はない。Mikiの伝統は、その力を「数字が読めない『種は土のなかで』の働き」として持している。
    hidden_capacity: 評価基準が登録しない層から受け取る
  - id: miki_edu_bridge_02
    line: 追跡された結果は、修了・出席・成績を記録する。それらは、データが捉えられたときに部屋が持っていた荷電を記録しない。Mikiの枠組みでは、その荷電──場の在不在──こそデータが届かない層であり、実際の学びが抱えられている層だ。
    hidden_capacity: データが届かない部屋の荷電を登録する
  - id: miki_edu_bridge_03
    line: 指標は評価基準を名指す。評価基準がそもそも読むよう作られていない「元来の力」は名指せない。Mikiの伝統は評価基準を置き換えない──その下の層を名指し、疲れた知性に元来の力が戻ってくる入口として「伝送」を示す。
    hidden_capacity: 評価基準が狭まるときも元来の力をアクセス可能に保つ
  - id: miki_edu_bridge_04
    line: コンテンツは数えられる。教室の場は数えられない。Mikiの伝統では、部屋の荷電も教えられているものの一部であり──「光の場」として学びを期待して到着した魂を持つ学生は、レッスンを登録する前に部屋の荷電を登録する。
    hidden_capacity: コンテンツと並んで荷電を登録する
  - id: miki_edu_bridge_05
    line: 体系は、その体系が測るよう設計されたものを測る。コホートが持って到着した元来の力は、設計のなかにはない。Mikiの伝統は設計と争わない──設計に含まれていない層を名指し、その層を部屋に戻す実践を示す。
    hidden_capacity: 元来の力を部屋に戻す
teacher_perspective:
  options:
  - id: miki_edu_perspective_01
    header: Mikiが見ていること
    paragraphs:
    - 鞍馬山の伝統では、学びは「山そのものから受け取られる」──言葉による指示ではなく、荷電された場のなかでの光の伝送として。何世紀ものその実践は、近代の教室にそのまま翻訳される。情報の転送だけのために設計された教室に到着するコホートは、しばしば言葉なしに、魂が学びを「受け取るために来た場」が部屋から欠けていると登録している。
    - 知性が再生産できるものだけを測る教育システムは、人が知っているものの最小の部分しか測っていない。伝統は評価基準を無効化しない──評価基準がそもそも読むよう作られていなかったものを名指す。部屋の荷電、元来の力が実際に着地する層、評価基準が登録する前に起きる学びの部分だ。
    - 「集中できない自分は壊れている、間違っている」と感じられるものは、しばしば、系譜が「教え」と呼ぶ場が部屋にないと魂が正確に登録している姿だ。癒しは思い出すこと──まさにここに当てはまる。集中する力は壊れてはいなかった──「光の場」ではなく「転送」としてコンテンツを届けた部屋に、決して招き入れられなかった。
  - id: miki_edu_perspective_02
    header: Mikiが見ていること
    paragraphs:
    - Mikiの伝統での仕組みは具体的だ。荷電された場のなかでの光の伝送は、元来の力が住んでいる層に届く。一日のコンテンツに知性を使われすぎた若い学習者にとって、光の層は、実際の素材がもう一度着地できる場所だ。要点は教科書が間違っていることではない──身体が、教科書が届く様式で受け取る容量を超えて押し出されている、ということだ。
    - 伝統は、もう一つの層を開く実践を示す。教科書のレッスンは変わらない──学習者がチャネルが開いた状態でレッスンに戻り、同じ言葉がふたたび届くようになる。これはハックでも回避策でもない──評価基準がそもそも登録するよう作られていなかった層が、学びと再び接触するに過ぎない。
    - 再フレームは具体的だ。障害は学生にあるのではない。学びが届けられる仕方と、魂が実際に受け取る仕方とのあいだの隔たりにある。Mikiの伝統は、要求されているものに合わせて作られたことのない構造のなかで、その隔たりのための実践を提供する。
  - id: miki_edu_perspective_03
    header: Mikiが見ていること
    paragraphs:
    - Mikiの伝統では、鞍馬山のアセンデッドマスターたちは、教えについての特定の見方を持している。本当の教えは荷電された場のなかでの伝送だ──山そのものを教師として、系譜が世代を超えて場を持し、学生はその場が動く層で受け取る。近代の教室への翻訳は直接的であり、場の不在こそ負荷だ。
    - 教科書の積み重ねに疲れた若い学習者にとって、「荷電された場」を知る系譜から受け取る経験は、「教科書が含んでいたものの再生産」で評価される経験とは構造的に異なる。教科書は無効にされない。別の層が取り戻される。
    - その層を取り戻すことが、Mikiの伝統が何世紀も行ってきたことだ。それは学校の代わりではない。それは、学校がそもそも届けるよう作られていない欠けた場が、ふたたび学びと接触する瞬間だ──元来の力が思い出されうるために。
  - id: miki_edu_perspective_04
    header: Mikiが見ていること
    paragraphs:
    - スターシードの枠組みは、Mikiの伝統では、ここに当てはまる。「複数の層で受け取る」力を持って到着したコホートは、評価基準からの距離がもっとも鋭いコホートでもある。「注意の欠如」と読まれているものは、多くの場合、場が在らないと魂が登録している姿であり──受け継がれた枠組みは、その負荷を個人に返し続ける。
    - これは耳ざわりの良い再フレームではない。評価基準が明日変わるとは約束しないし、異なるレンジのために造られた構造のなかでコホートが「合わなく」感じることを責めもしない。ただ構造的事実を名指し、「合わなさは個人の障害だ」と信じる追加の重荷を外す。
    - 伝送の実践では、その重荷を外すことが最初に届く部分であることが多い──チャネルを取り戻す、より深い仕事が始まる前に。
  - id: miki_edu_perspective_05
    header: Mikiが見ていること
    paragraphs:
    - 実践は土のなかの種のように働く──静かに、ふつうの生活の背景で。学びに当てはめると、これは、仕事が英雄的な規律でも学術的なスペクタクルでもないことを意味する。部屋がそれを提供できないときでも「場が手当されている」と身体に知らせる、繰り返される小さな受け取りの行為だ。
    - 癒しは思い出すこと──まさにここに当てはまる。受け取る力、統合する力、レッスンを着地させる力は失われたのではない──「伝送」ではなく「転送」を届けた情報環境によって、覆われていた。伝統は学習者により頑張るよう求めない。場が手当されるよう求め、元来の力が思い出されうるようにする。
    - 再フレームは自責をやわらげる。身体は、荷電のない部屋で散らばることで壊れたわけではない。身体は、場を求める仕事をしている。制度的な構造は変わらない。「散らばりは学生の個人的失敗だ」という確信のほうが、軽くなる。
practice:
  options:
  - id: miki_edu_practice_01
    display_name: 光の場の受け取り
    announcement_line: Mikiは、ポータルとタブが注意を散らし、部屋が「荷電された場」ではなかった瞬間のための5分間の「光の場の受け取り」を教える。魂は、評価基準が読めるよりも多くを既に知っている。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心は、すべての中断を「失敗の証拠」として扱うのをやめる。
    - 場が取り戻されると、受け取る元来の力が浮かび上がりうる。
  - id: miki_edu_practice_02
    display_name: 鞍馬山の教室・座り直し
    announcement_line: Mikiは、授業のあいだや、別の平らな講義の後など、身体が「部屋を荷電された場として」の系譜の理解との接触を必要としている瞬間のための3分間の「鞍馬山の教室・座り直し」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体は、一日がそれを提供していなくても、「荷電された部屋」がどう感じられるかを思い出す。
    - 次の1時間の集中が、身体が手当されていると知る場のなかで始まる。
  - id: miki_edu_practice_03
    display_name: 光の伝送の読書ポーズ
    announcement_line: Mikiは、ページの言葉が届かず、表面の心がその吸収率を超えて押し出された瞬間のための4分間の「光の伝送の読書ポーズ」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 意味を押し通す前に、素材の光が受け取られる。
    - 身体が読書が着地できるレジスターに落ちたので、ページが再び届く範囲になる。
  - id: miki_edu_practice_04
    display_name: 元来の力の思い出し
    announcement_line: Mikiは、試験や課題が「自分は本当に知っていることを知らない」という確信を引き起こした瞬間のための4分間の「元来の力の思い出し」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 知性は、学習者が頼める唯一の源ではなくなる。
    - 学習者が部屋に持ってきた元来の力が、ふたたびアクセス可能になる。
  - id: miki_edu_practice_05
    display_name: 種は土のなか・学びの実践
    announcement_line: Mikiは、教室に入る前、講義にログインする前──身体が、自分自身のレジスターのまま部屋に入る必要があるとき──のための3分間の「種は土のなか・学びの実践」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 学習者は部屋の平らさを借りずに、自分の場のまま入る。
    - レッスンは、一日の蓄積した負荷の上ではなく、手当されている身体の上に着地する。
sdg:
  primary:
    line: 国連の枠組みはSDG 4を通じて、ウェルビーイングと包摂的な学習条件を質の高い教育の一部とする。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: miki_edu_cta_01
    line: 'Active Mindsは米国のキャンパスで650以上のピア主導のメンタルヘルス支部を運営し、注意を無限の資源として扱わない学習条件のために活動している。入口: activeminds.org'
  - id: miki_edu_cta_02
    line: 'The Jed FoundationはJED Campusを運営しており、いまでは米国の約500の大学に組み込まれた包括的なメンタルヘルスと学習条件の枠組みだ。入口: jedfoundation.org'
  - id: miki_edu_cta_03
    line: 'UNESCOのGlobal Education Coalitionは、学習回復とアクセスについて多国間・NGO・民間セクターの対応を集約する。入口: globaleducationcoalition.org'
  - id: miki_edu_cta_04
    line: 'Education Cannot Waitは、危機影響下の教育のための国連ホストのグローバル基金で、2016年以来10億ドル以上を動員してきた──標準的な教育構造が届かないコホートのために。入口: educationcannotwait.org'
  - id: miki_edu_cta_05
    line: 'UNICEFは世界の若者の学習回復モニタリングを運営し、青少年の基礎的な習熟度のギャップを閉じるために働く国とパートナーを支援している。入口: unicef.org'
title_system:
  headline_layer_2:
    options:
    - id: miki_edu_headline_01
      line: 日本の光の癒しの教師が、教育のストレスを「欠けた場」として読み──それを取り戻す伝送を示す。
    - id: miki_edu_headline_02
      line: 「情報転送としての教室」対「光の場としての教室」──鞍馬山の系譜が、評価基準には見えないものを名指す。
    - id: miki_edu_headline_03
      line: もっとコンテンツではなく受け取り──光の癒しの伝統が、知性を使われすぎた学習者にもたらすもの。
    - id: miki_edu_headline_04
      line: 「光の場」を期待して到着したスターシードのコホート──そしてその認識を座り直させる実践。
    - id: miki_edu_headline_05
      line: 修理ではなく思い出すこととしての癒し──「元来の力」を評価基準が読むよう作られたことのない世代に当てはめる。
