hook_personal:
  options:
    - id: hook_personal_01
      line: いちばんつらいのは、気分が悪いことだけではありません。それでも安定したふりをしなければならない体系のなかで、気分が悪いことです。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 若者のメンタルヘルスの負荷は、順序の問題でもあります。支援の体系はケアを名指し続けながら、ふつうの生活が実際に守られる条件をつくれていません。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: ライトランゲージとサウンドヒーリングを教えるMikiさんは、実践の場で、若者が過負荷をまるで個人的欠陥のように抱える様子を見てきました。彼らが問うのは、気分を良くする方法だけではありません。セラピスト、アルゴリズム、セルフヘルプのコンテンツに心が語りかけられても救われないとき、身体は何を受け取れるのか、です。
    - id: teacher_intro_02
      line: ライトランゲージとクリスタルボウルの伝統から、Mikiさんは、苦しみが身体に抱かれ、知性が疲れきっている場面を実践の場で見てきました。学生はもうアドバイスを求めていません。過負荷になった心を迂回し、苦しみが実際に宿るところに語りかける、別の接触の仕方を求めています。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: "最新の警告を読みます。のどが締まります。スマホを伏せます。それからまた確認します。圧力はまだそこにあり、見ないふりをしても何も変わらないからです。\n\nLOOP_SEQUENCE: \"警告を読む。のどが締まる。スマホを伏せる。また確認する。\""
    - id: youth_somatic_02
      line: "グループチャットで見出しを見ました。肩が固まります。アプリを閉じます。また開きます。目を背けても不安が去らなかったからです。\n\nLOOP_SEQUENCE: \"見出しを見る。肩が固まる。アプリを閉じる。また開く。\""
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Mikiはこのループそのものを見てきました──警告が届き、のどが閉じ、スマホが暗くなり、未解決の真実がまだ待っているので注意が戻る。
    - id: teacher_witness_02
      line: 彼女は若者のなかでその順序も見てきました──読む、締まる、伏せる、戻る。身体は、心がまだ処理しきれないものを抱えています。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: "320 campuses. 18 countries."
      stat_line_2: 若者の組織者はピアの輪を開き、リスナー訓練を組み、学校にメンタルヘルス支援を私的な弱さではなくインフラとして扱うよう迫っています。
bridge:
  options:
    - id: bridge_01
      line: "320 campuses. 18 countries. トラッカーは輪、運動、ピア支援を測ります。前週の過負荷のあと、次の正直さを可能にしたもの──「もう大丈夫なはず」という公的な嘘を繰り返す代わりに、身体のなかの真実を受け取る力──の欄はありません。Mikiの伝統は、身体が解釈する前に受け取るという力を、サウンドと在り方で扱います。"
    - id: bridge_02
      line: メンタルヘルスのトラッカーはプログラムと待ち時間を数えます。体系が抱きとめてくれないときに、若者が自分の経験と接し続けられる内面の容量は数えません。次の正直な会話にはそれが要ります。スマホを伏せ、また開いた人にも要ります。Mikiの伝統は、癒しは想起だと捉えます──もともとの容量はそこにあり、覆われているだけです。サウンドと光は、それをあらわにするのを助けます。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Mikiが見ていること
      paragraphs:
        - Mikiの伝統では、ライトランゲージと伝達は概念的意味ではなく振動の共鳴を通じて働きます。言葉の届かない部分に届きます。セラピスト、アルゴリズム、セルフヘルプのコンテンツに語りかけられても救われなかった若者にとって、伝統は別の接触のモードを示します。疲れきった知性を迂回し、苦しみが実際に抱えられるエネルギー身体に直接語りかける、というものです。
        - 想起としての癒しとは、本来の自己は失われておらず、覆われている、ということです。圧力と過負荷は欠陥の証明ではありません。誰も受け取れなかったものを身体が抱えねばならなかったときに積み上がるものです。伝統は、心に考えさせようとはしません。サウンドと在り方を通じて、身体が十分柔らかくなり、すでに知っていることを思い出せるようにします。
        - その転換が緩和の始まりです。圧力は、自身に欠陥がある証明ではなく、安定したふりをしながら本当に回復する条件を与えない体系に求められてきたことの証拠になります。
    - id: teacher_perspective_02
      header: Mikiが見ていること
      paragraphs:
        - Mikiは若者のメンタルヘルスの過負荷を伝達のレンズで読みます。身体は、心が解釈する前に受け取ります。心がアドバイス、診断、デジタルノイズで飽和しているとき、伝統は内容を足しません。身体が理解しなくても使える別のチャネル──サウンド、振動、在り方──を示します。
        - 伝統は、情報で直せるものと、受け取られることでしか出会えないものを区別します。「マインドフルネスに失敗した」とかセラピーに失敗した若者は、しばしば失敗していません。身体が本当に守りを下ろせる関係的な器なしに道具だけ渡されたのです。サウンドとライトランゲージは、その器をつくります。
        - その枠組みでは自己責めが和らぎます。問題は、自己が壊れていることではありません。問題は、体系と制度が、一人では抱えきれない量を身体に外注し続けていることです。実践は、もっと頑張ることではなく、前に受け取れなかったものを身体が受け取れるようにすることです。
practice:
  options:
    - id: practice_01
      announcement_line: Mikiは、過負荷と自己沈黙が重なり始める瞬間のため、5分間の「サウンドと光の受容」を教えています。サイドバーに、具体的に使える形で載せています。
      relief_lines:
        - 身体は、重さ全体を一人で抱えるのをやめます。
        - 次の正直な一歩に足るほどの受容性が戻ります。
sdg:
  primary:
    line: 国連はSDG 3とその健康と福祉の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: "Active MindsとBorn This Way Foundationは、ともに若者向けの入口を提供しています。入口: https://www.activeminds.org"
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 若者のメンタルヘルスの危機は、身体が何を受け取れるかの危機でもあります。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: ライトランゲージとサウンドのヒーラーは、過負荷が私的欠陥だという嘘を拒みます。
      - id: headline_layer_2_02
        line: ある癒しの伝統は、言葉の届かないところを身体が抱えるときに何が起きるかを名指します。
