hook_personal:
  options:
  - id: miki_mh_hook_personal_01
    line: あなたはそのスパイラルを、誰かが名づける前から知っている。同時に、セラピストもアルゴリズムも自助も、あなたに「話しかけてきた」だけで安心は届かなかったとも知っている──そして、届くよう求められているものは、その「話しかけ」が着地する層にはない、ということも、あなたの一部は知っている。
  - id: miki_mh_hook_personal_02
    line: 真夜中に警告を読んだ。喉が締めつけられた。スマホを伏せた。それからまた確認した──プレッシャーはまだそこにあり、それがどこに抱えられているかの層は、見ないふりをしても変わらないから。
  - id: miki_mh_hook_personal_03
    line: あなたは、言葉になる前にその負荷を感じている。心が「不安」と名づける前に胸が締めつけられる。光の流れこそが求めているもので──見出しを読んで安心を探していた一部は、間違った計器を読んでいた。
  - id: miki_mh_hook_personal_04
    line: 午前1時にスマホを置き、また手に取る。どちらも助けにならない──エーテル体のブロックは、スマホが届いたことのない層だから。そしてそこをスクロールで抜け出ようとしている一部は、すでに使われすぎている部分だ。
  - id: miki_mh_hook_personal_05
    line: スレッドを読んだ。スクリーニングを受けた。呼吸アプリを使った。心はできることをすべてやった──そして伝統が「失われたのではなく、ただ覆われているだけ」と持する、あなたのなかの「元来の完全性」は、修復ではなく「思い出される」ことを求めている。
hook_big_picture:
  options:
  - id: miki_mh_hook_big_01
    line: 若者の精神的な負荷は、症状だけの問題ではない。それは、絶え間ない圧力が注意・休息・身体の「光の流れを開いておく力」に何をするかの問題であり──ブロックを「信号」ではなく「欠陥」として扱う、受け継がれた枠組みの問題でもある。
  - id: miki_mh_hook_big_02
    line: 鞍馬山の伝統では、精神的な健康の苦しみは「エーテル体での光の流れが阻まれている」その目に見える縁として読まれる。この枠組みは苦しみを切り捨てない──従来のインテーク用紙が測る道具を持たない層を名指す。
  - id: miki_mh_hook_big_03
    line: ある世代は、古い意味の構造が溶け、新しいものがまだ届いていない移行期のなかで精神的な負荷を運んでいる。過負荷は個人の失敗ではない──どの個人も一人で抱えられるよう作られていない構造的な隔たりを、身体が正確に登録している姿だ。
  - id: miki_mh_hook_big_04
    line: 従来の体系が「不安」と読むものは、光の癒しの言葉では「登録」だ──エーテル体が「準備していた世界は、もはや生きなければならない世界ではない」と知らせている──そして受け継がれた枠組みはその登録のほうを障害と読み続ける。
  - id: miki_mh_hook_big_05
    line: 癒しは壊れたものを修理することではない──元来の完全性を思い出すことだ。精神的な過負荷に当てはめると、これは、コホートが「新しい自分になる」よう求められているのではなく、「失われたのではなく、ただ負荷で一時的に覆われていた」全体性を思い出すよう求められている、ということを意味する。
teacher_intro:
  options:
  - id: miki_mh_intro_01
    line: 'Mikiは、鞍馬山の聖地の系譜に根ざした日本の光の癒しの教師として、伝送セッションで、若者が精神的な過負荷を本物の苦しみとして抱えるのを見てきた──同時に、彼女の伝統がそれを正確に名指す姿として: エーテル体での光の流れが阻まれている、その目に見える縁として。従来の枠組みは、その登録を障害として読み続ける。伝統はそれを信号として読む。'
  - id: miki_mh_intro_02
    line: Mikiは、自分を従来の意味での教師としては位置づけない──彼女は伝送する者だ。鞍馬山の光は彼女を通して受け手に、表面の心が解釈しなくてよい層で流れる。何十年もの間、セラピストやアルゴリズムや自助に「話しかけられて」疲れた若者と仕事をしてきた。
  - id: miki_mh_intro_03
    line: Mikiは光の伝送と仕事をしている──癒しの周波数が、彼女を通して受け手に流れる流れだ。彼女は、若いクライアントがスクリーニングツールが「不安」と名指すのと同じループを通り抜けるのを見てきた──そしてエーテル体での光の流れが、表層が議論されるのではなく取り戻されるとき、そのループが緩むのを見てきた。
  - id: miki_mh_intro_04
    line: Mikiは、このコホートのスターシードの魂たちはエーテル層への特定の感受性を運んでいると持している。実践のセッションでは、若者がその認識に出会い、しばしば初めて、自分の苦しみが「スクリーニングツールが届く層」で診断されるのではなく、「実際にそれが住んでいる層」で読まれていることに気づくのを見てきた。
  - id: miki_mh_intro_05
    line: Mikiは「癒しは修理ではなく思い出すこと」と持する伝統のなかで教える。精神的な過負荷に当てはめると、これは、彼女が若者を「より安定した誰か」に変えようと働かない、ということを意味する──彼女は、もともと失われたことのない安定が思い出されうるチャネルを取り戻すために働く。
youth_somatic:
  options:
  - id: miki_mh_somatic_01
    line: 警告を読んだ。喉が締めつけられた。スマホを伏せた。それからまた確認した──プレッシャーはまだそこにあり、見ないふりをしても何も変わらなかったから。
  - id: miki_mh_somatic_02
    line: アラームより先に目が覚めた。肩はすでに固まっていた。明かりよりも先にスマホを取った──不安はもうそこにあり、身体は世界がそれと合っているかどうかを知る必要があったから。
  - id: miki_mh_somatic_03
    line: 通知の音が届いたとき、胸が締めつけられた。最後の会話を3回繰り返した。呼吸が短くなった。心が選ぶより先に、身体がループを走らせた。
  - id: miki_mh_somatic_04
    line: 画面が読み込まれるあいだ、息を止めていた。肩が上がった。メッセージが現れた時にだけ、それも半分だけ、息を吐いた──次のメッセージはすでに届きはじめていたから。
  - id: miki_mh_somatic_05
    line: 横になったが、目はぴんと開いた。一日が繰り返された。喉はゆるまなかった。眠りこそ助けになると知っていたのに、そこへの扉が見つけられなかった。
teacher_witness:
  options:
  - id: miki_mh_witness_01
    line: Mikiは、受け取りに来る者のなかでまさにこのループを見てきた──警告、締めつけ、閉じ、確認。彼女の枠組みでは、そのプレッシャーは性格の欠陥ではない──スクリーニングツールが表層しか測らなかったとき、エーテル体が「届いてくれ」と頼んでいる姿だ。
  - id: miki_mh_witness_02
    line: 彼女は、若者が「知性が今までに解決していたはずだ」とすでに確信して伝送のセッションに歩いてくるのを見てきた。彼女の伝統では、その確信は信号だ──表面の心が止まり、従来の接触が届かない仕事を、光の伝送ができる場所だ。
  - id: miki_mh_witness_03
    line: Mikiは、説明が抱えきれなかったものを身体が抱えるのを見てきた。彼女の枠組みでは、その身体のループは故障ではない──ブロックが実際に住んでいる層が無視されたとき、エーテル体が残された唯一のチャネルを通して語っている姿だ。
  - id: miki_mh_witness_04
    line: Mikiは、若いクライアントが、どんなスクリーニングツールも名指さないエーテル層の「登録」を抱えて到着するのを見てきた。彼女の伝統では、その登録は病理ではなく情報だ──彼らを抱える体系が、苦しみが実際に抱えられている層に決して合わせられていなかったという信号だ。
  - id: miki_mh_witness_05
    line: Mikiは、若者が「答えを出そう」とするのをやめ、表面の心が一人でやるよう求められていた仕事を光の伝送に任せる瞬間を見てきた。彼女の伝統では、その瞬間は弱さではない──従来のインテーク用紙が言葉を持たない準備の表れだ。
turnaround:
  options:
  - id: miki_mh_turnaround_01
    stat_line_1: 5,600 voices. 7 countries.
    stat_line_2: UNICEFの「青少年メンタルヘルスのためのグローバル連合」は、7カ国にまたがる14-25歳の若者5,600人を集めて、従来の報道が見落としていたものを表に出した──そしてコホートは、機関より先に自分たちで負荷に名前をつけた。
  - id: miki_mh_turnaround_02
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: JED財団のプログラムは、いまや米国の約500の大学で包括的なメンタルヘルスの枠組みを運営し、ピア支援と教員研修を、危機の後ではなく日常のインフラに組み込んでいる。
  - id: miki_mh_turnaround_03
    stat_line_1: 14 million contacts. 988 Lifeline.
    stat_line_2: 988「自殺と危機のライフライン」が2022年に開始されて以来、1400万件を超える接触がそこを経由して送られている──3年前には存在しなかった資源プールであり、いま、毎晩、その重みを担っている。
  - id: miki_mh_turnaround_04
    stat_line_1: 650 chapters. US campuses.
    stat_line_2: Active Mindsはいま、米国の大学キャンパスで650以上のピア主導のメンタルヘルス支部を運営し、学生に傾聴サークルの主催を訓練し、メンタルヘルス支援を「私的なレジリエンス」ではなく「インフラ」として扱うよう制度に圧力をかけている。
  - id: miki_mh_turnaround_05
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: 2025年10月に採択されたWHO Europe「子ども・青少年の健康戦略2026-2030」は、53の加盟国に対して、青少年の精神的な負荷を2030年の期限に向けて報告することを義務づけている──コホートの負荷を「論評」ではなく「ガバナンス」として扱う、初の多国間の手段だ。
bridge:
  options:
  - id: miki_mh_bridge_01
    line: 5,600の声。7カ国。連合は、従来の報道が見落としていたものを表に出した。それでも、次の正直な手助けの呼びかけを可能にしたもの──従来のインテーク用紙が表層しか測らないなかで、身体の登録を受け取る力──を記録する欄はない。Mikiの伝統は、その力を「数字が読めない『種は土のなかで』の働き」として持している。
    hidden_capacity: インテーク用紙が表層しか測らないなかで身体の登録を受け取る
  - id: miki_mh_bridge_02
    line: メンタルヘルス応答のインフラは測れる。ブロックが実際に抱えられているエーテル体は、測れない。Mikiの伝統は測定と争わない──その下の層、つまり従来のインテーク用紙が登録しない「元来の完全性」が思い出されるのを待っている層で働く。
    hidden_capacity: 測定の下のエーテル層で働く
  - id: miki_mh_bridge_03
    line: データはセッション、接触、政策の採用を名指す。それは、あなたのなかの「元来の完全性」は失われたのではなく一時的に覆われているだけだ──という魂のレベルの思い出しを名指せない。Mikiの系譜はその思い出しを、トラッカーが届かない実際の救いとして持している。
    hidden_capacity: データが届かない魂のレベルの思い出しを抱える
  - id: miki_mh_bridge_04
    line: 構造、政策、プラットフォームは数えられる。エーテル体での光の流れ──そして表層が議論されるのではなく流れが取り戻されるときに開くループ──は、数えられない。Mikiの伝統は構造的な応答を置き換えない。応答が届けるよう作られていない層を名指す。
    hidden_capacity: 構造的応答が届けられない光の流れを登録する
  - id: miki_mh_bridge_05
    line: 1400万件の接触。988ライフライン。資源は本物だ。それは同時に、従来の枠組みのなかに抱えられている──危機を「思い出しを通り抜けるブロック」ではなく「管理すべき症状」として扱う枠組みのなかに。Mikiの伝統は、その資源が届くよう作られていない層を名指し、伝送をその入口として示す。
    hidden_capacity: 従来の資源が届くよう作られていない層を名指す
teacher_perspective:
  options:
  - id: miki_mh_perspective_01
    header: Mikiが見ていること
    paragraphs:
    - 鞍馬山の伝統では、精神的な健康の苦しみは「エーテル体での光の流れが阻まれている」その目に見える縁として読まれる。ブロックは「管理すべき障害」ではない──「元来の完全性」が住む層が、負荷によって覆われているという信号だ。癒しは壊れたものを修理することではない──元来の完全性を思い出すことだ。
    - 光の伝送は概念的な意味を通して働くのではない──Mikiから受け手へ、癒しの周波数が文字どおりに流れることを通して働く。セラピストやアルゴリズムや自助に「話しかけられて」安心が届かなかった若者にとって、これは別の議論ではない──ブロックが実際に住んでいる層との接触だ。
    - 再フレームは正確だ。「自分が壊れている、間違っている」と感じられるものは、この枠組みでは、従来のインテーク用紙が測る道具を持たないエーテル層のブロックを、身体が正確に登録している姿だ。伝送は従来の支援を無効化しない──元来の完全性が思い出されうるチャネルを取り戻す。
  - id: miki_mh_perspective_02
    header: Mikiが見ていること
    paragraphs:
    - Mikiの伝統での仕組みは具体的だ。光の伝送は文字どおりだ──癒しの周波数が、教師から受け手へ、表面の心が解釈しなくてよい層で流れる。これがメンタルヘルスの文脈でなぜ重要かといえば、スパイラルと議論しても、スパイラルが抱えられている層には届かないからだ。
    - Mikiは、若者が伝送を受け取り、後で「間違った計器で届こうとしていた層との接触」の救いを描写するのを見てきた。心が勝たなくても、身体はやわらげた。ブロックは議論で押し出されなくてもよかった──流れが、元来の完全性を思い出すに足りるだけ取り戻されればよかった。
    - これは、従来のケアが届けるよう作られていない部分だ。従来のケアを無効化しない──欠けた層を名指し、何世代もその層で働いてきた伝統を提供する。
  - id: miki_mh_perspective_03
    header: Mikiが見ていること
    paragraphs:
    - Mikiの伝統では、鞍馬山のアセンデッドマスターたちは、精神的な健康の苦しみについて特定の見方を持している。エーテル層でブロックを登録する身体を、表層の推論で議論から引きはがすことはできない。マスターたちは、ブロックが実際に住んでいる層で系譜を通して伝送する──そして表面の心は、接触が起きるためにその接触に参加する必要はない。
    - 精神的な過負荷を抱える若者にとって、アルゴリズムより古い何かに「受け取られる」経験は、それに「処理される」経験とは構造的に異なる。届くメッセージは「ここにテクニックがある」ではない──「あなたは、負荷が実際に抱えられている層で受け取られている。そして系譜は何世紀ものあいだ、この仕事をしてきた」だ。
    - その区別──「処理される」のではなく「受け取られる」──こそ、従来のインフラが再現できないものであり、Mikiの伝統が何十年も「土着のもの」として運んできたものだ。
  - id: miki_mh_perspective_04
    header: Mikiが見ていること
    paragraphs:
    - スターシードの枠組みは、Mikiの伝統では、ここで載荷的だ。この移行期のために到着したコホートは、エーテル層への特定の感受性を運んでいる。このコホートで「より強い不安」と読まれているものは、部分的には、登録の鋭さだ──制度的な枠組みが計器を持たない層を、魂が読んでいる姿だ。
    - これは耳ざわりの良い再フレームではない。負荷がすぐに引くとは約束しないし、不安定な構造のなかでコホートが不安定に感じることを責めもしない。ただ構造的事実を名指し、「登録の鋭さそれ自体が個人の障害だ」と信じる追加の重荷を外す。
    - 伝送の実践では、その重荷を外すことが最初に届く部分であることが多い──光の流れを取り戻す、より深い仕事が始まる前に。
  - id: miki_mh_perspective_05
    header: Mikiが見ていること
    paragraphs:
    - 実践は土のなかの種のように働く──静かに、ふつうの生活の背景で。精神的な過負荷に当てはめると、これは、仕事が英雄的な意志でも危機のスペクタクルでもないことを意味する。エーテル体に「流れは手当されている」と知らせる、繰り返される小さな思い出しの行為だ。
    - 癒しは思い出すこと──まさにここに当てはまる。スクリーニング結果や診断ラベルやスパイラルによって、元来の完全性は壊されなかった。覆われた。伝統は若者により「安定した誰か」になるよう求めない。負荷が届くより前にすでにそこにあった全体性を思い出すよう求める。
    - 再フレームは自責をやわらげる。身体は、ブロックを登録することで壊れたわけではない──身体は、元来の完全性が思い出されるよう求める仕事をしている。従来の支援は軽くならない。「身体の登録それ自体が問題だ」という確信のほうが、軽くなる。
practice:
  options:
  - id: miki_mh_practice_01
    display_name: 光の伝送の受け取り
    announcement_line: Mikiは、スパイラルが走り、心が一人でそれを解こうとしすぎている瞬間のための5分間の「光の伝送の受け取り」を教える。光の流れはただ「受け取られる」ことを求めている。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心は、すべての思考のサージを「壊れている証拠」として扱うのをやめる。
    - チャネルが開いているとき、身体のなかの元来の完全性が思い出されうる。
  - id: miki_mh_practice_02
    display_name: エーテルの流れの一時停止
    announcement_line: Mikiは、通知と通知のあいだ、身体が「ブロックを置く許可」なしに負荷を運んでいるときのための3分間の「エーテルの流れの一時停止」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - エーテル層のブロックが、スパイラルの下に隠れるのではなく、注意のもとに利用可能になる。
    - 光の流れが、議論されるのではなく、ふたたび受け取られる。
  - id: miki_mh_practice_03
    display_name: 鞍馬山の座り直し
    announcement_line: Mikiは、スパイラルが一日を踏み越え、身体が「山を生きる存在として」の接触を必要としている瞬間のための7分間の「鞍馬山の座り直し」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体は、系譜が「教える存在としての山」と接触するのを思い出す。
    - 身体が一人で負荷を運ばなくなり、ブロックがやわらぐ。
  - id: miki_mh_practice_04
    display_name: アセンデッド・カウンシルの抱え
    announcement_line: Mikiは、内的な議論が身体を踏み越え、魂に「ニュースのサイクルより古い系譜と、抱えることが共有されている」と思い出させる必要のある瞬間のための4分間の「アセンデッド・カウンシルの抱え」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 問いは「解くべきもの」であることをやめ、「差し出すもの」になる。
    - 負荷が表面の心より大きな何かに抱えられているという認識が、ふたたびアクセス可能になる。
  - id: miki_mh_practice_05
    display_name: 元来の完全性の思い出し
    announcement_line: Mikiは、診断ラベルがアイデンティティと融合してしまい、魂に「全体性は失われたのではなく、ただ一時的に覆われていた」と思い出させる必要のある瞬間のための3分間の「元来の完全性の思い出し」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 診断ラベルが「自己」への握りをゆるめる。
    - 負荷が届くより前にすでにそこにあった元来の完全性を、身体が認識する。
sdg:
  primary:
    line: 国連の枠組みはSDG 3を通じて、精神的な健康とウェルビーイングを含む。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: miki_mh_cta_01
    line: 'あなたや知っている誰かが危機にあるなら、Crisis Text Lineは無料の24時間体制の支援を提供する。HOMEを741741にテキスト。入口: そのネットワークに参加すること。'
  - id: miki_mh_cta_02
    line: 'あなたや知っている誰かが危機にあるなら、988「自殺と危機のライフライン」は米国全土で無料の24時間体制の支援を提供する。988に電話またはテキスト。入口: そのネットワークは2022年以来1400万件を超える接触を扱ってきた。'
  - id: miki_mh_cta_03
    line: 'あなたがLGBTQ+で25歳未満で危機にあるなら、The Trevor Projectはテキスト、チャット、電話で無料の24時間体制の支援を提供する。STARTを678-678にテキスト。入口: 特定のコホート向けに作られたネットワーク。'
  - id: miki_mh_cta_04
    line: 'メンタルヘルスについての情報、紹介、ピアサポートには、NAMI HelpLineが月曜から金曜に利用できる。1-800-950-NAMI（6264）に電話、または「HelpLine」を62640にテキスト。入口: National Alliance on Mental Illnessのネットワークに繋がる。'
  - id: miki_mh_cta_05
    line: 'Active Mindsは米国の650以上のキャンパスでピア主導のメンタルヘルスのコミュニティを運営している。あなたの近くにキャンパス支部があれば、それは摩擦の少ない入口だ。なければ、全国ネットワークが同じインフラを他で築いた仲間につなぐ。'
title_system:
  headline_layer_2:
    options:
    - id: miki_mh_headline_01
      line: 日本の光の癒しの教師が、精神的な過負荷を「阻まれた光の流れの目に見える縁」として名指し──それを取り戻す伝送を示す。
    - id: miki_mh_headline_02
      line: 修理ではなく思い出すこととしての癒し──鞍馬山の枠組みが「話しかけられて安心の届かない」コホートに出会う。
    - id: miki_mh_headline_03
      line: もう一つの指示の積み重ねではなく光の伝送──系譜が「疲れた知性」にもたらすもの。
    - id: miki_mh_headline_04
      line: 病理ではなくエーテル層──光の癒しの伝統が若者の精神的な負荷を再フレームする。
    - id: miki_mh_headline_05
      line: 生産よりも受け取り──鞍馬山のアセンデッド・カウンシルが「阻まれた流れ」を抱える世代にもたらすもの。
