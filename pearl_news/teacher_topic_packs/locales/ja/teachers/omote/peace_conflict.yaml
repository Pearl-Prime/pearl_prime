hook_personal:
  options:
    - id: hook_personal_01
      line: 通知一つで公的暴力が私生活に入り込んでくるのを、身体は言葉より先に感じ取ります。見てきたことが正直に向き合われないとき、鬼（oni）は大きくなります。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 紛争のニュースは地政学だけではありません。注意・睡眠・道徳的まじめさを保てるかどうかの日々の戦いであり、向き合われなかった悲しみと恥の集団の鬼（oni）が、さらなる暴力として現れるのか、浄化として現れるのかの戦いでもあります。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Omote Senseiは、日本の聖なる生き方と浄化の教えを伝える教師として、実践の場で紛争の圧力が若者に何をするかを見てきました。彼らが問うのは「世界は危ないか」ではありません。麻痺も演出された怒りもなく、大和心（Yamato-gokoro）として、見たことを道徳的感情の重みごとどう抱えるか、という問いです。
    - id: teacher_intro_02
      line: Omote Senseiは日本の伝統から教えます。合宿の場では、すでに紛争アラートを抱えて来る若者を見てきました。伝統は、鬼（oni）が個人だけでなく集団的なものであると説きます。共同体や国家が悲しみ・恥・責任を正直に向き合えないとき、鬼は大きくなり、攻撃と暴力として現れます。平和の仕事は浄化から始まります。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |-
        紛争のアラートを読みます。胸が締まります。一瞬立ち止まります。危険は本物で、見ないことは何も変えないので、また確認します。
        LOOP_SEQUENCE: "read the alert. chest tightened. stopped for a second. checked again."
    - id: youth_somatic_02
      line: |-
        グループチャットで更新を見ました。顎と呼吸が止まります。スマホを置きます。現実はまだそこにあるので、また手に取ります。
        LOOP_SEQUENCE: "saw the update. jaw and breath locked. put the phone down. picked it up again."
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Omote Senseiは若者のなかで、このループそのものを見てきました。アラートが来て身体が縮み、一瞬時間が止まり、現実はまだそこにあるので注意が戻る。日本の伝統はそれを病理化しません。大和心（Yamato-gokoro）が求める証人の重み──痛みから目をそらさないこと──と名づけ、消費されずに再び行動できるよう浄化を示します。
    - id: teacher_witness_02
      line: 彼はその連続も見てきました。通知が来て胸か顎が固まり、端末を置いても、心は戻る。伝統は、平和の仕事は集団の内なる苦しみの浄化から始まると説きます。ないことにするのではなく、正直に向き合い手放せる条件をつくることです。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 676 million women and girls. 50 kilometers from active conflict.
      stat_line_2: 若者は被害を記録し、連合を組織し、制度が分断するときでも平和と説明責任のためのワークショップを開いています。
    - id: turnaround_02
      stat_line_1: 676 million women and girls. 50 kilometers from active conflict.
      stat_line_2: 若年層の和平構築者はワークショップを開き、連合を組み、事例を記録して、紛争への応答の一部として浄化と奉仕を位置づけています。
bridge:
  options:
    - id: bridge_01
      line: 6億7,600万人の女性と少女。活動中の紛争から50キロ以内。トラッカーは曝露・避難・制度の破綻を測ります。積み重なったもの──悲しみ、怒り、無力感──を正直に向き合い、次のアラートのあとも他者を守り、真実を語り、再び行動するのに必要な内面の容量は数値にありません。もう一度確認した人にはその容量が要りました。Omote Senseiの伝統は、代々浄化と「他者を助けることが自らを救う」という教えを実践してきました。
    - id: bridge_02
      line: 数字は被害と対応を測ります。若者がついに集団の鬼（oni）に向き合う実践を持つとき──否定ではなく、悲しみ・恥・責任を正直に向き合い手放せる儀式と共同の条件のなかで──何が起きるかは測りません。その容量が、次の守る人・証人に要ります。Omote Senseiの伝統は、当事者が生存には他者の矮小化が要ると信じるとき紛争が続き、その信念こそが鬼であると説きます。真の安全は浄化と奉仕から来る、と伝えます。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Omote Senseiが見ていること
      paragraphs:
        - Omote Senseiは、若者に「怖いから落ち着け」とは言いません。鬼（oni）は個人の苦しみだけではなく、集団的なものです。共同体や国家が悲しみ・恥・責任を正直に向き合えないとき、集団レベルで鬼は大きくなり、攻撃、代罪、最終的には暴力として現れます。伝統は、平和の仕事は集団の内なる苦しみの浄化から始まると説きます。ないことにするのではなく、儀式と共同のなかで正直に向き合い手放せる条件をつくることです。
        - そこから大和心（Yamato-gokoro）へ──痛みから目をそらさない誠実な心です。武力紛争の文脈では、暴力と不正を目撃する若者は、無感覚にも演出された怒りにも走らず、見たことを道徳的感情の重みごと抱くよう求められます。伝統は、循環を再生産する反応と、変容の条件をつくす誠実な証人とを区別します。
        - それが意味することは次のとおりです。私が壊れ、暴力に混乱しているという感覚は、正直な応答であり、浄化に真正面から向き合われてこなかった紛争の制度と構造への応答です。伝統の洞察は、その信念こそが鬼であるということであり、真の安全は他者を打ち負かすことではなく、自己利益と集団の福祉の境界を溶かす奉仕の実践から来る、ということです。
    - id: teacher_perspective_02
      header: Omote Senseiが見ていること
      paragraphs:
        - Omote Senseiの伝統では、紛争への恐れは個人だけのものではありません。向き合われない悲しみと恥から大きくなる鬼（oni）は、浄化されなければ暴力として現れます。伝統は感じるなと言うのではなく、自分と集団のなかに積み重なったものを向き合い、手放す条件をつくるよう求めます。
        - ここでの浄化は魔法の消去ではありません。水・風・儀式・呼吸を通じて明晰さを取り戻す誠実な鍛錬です。若者が否定や演技ではなく正直さで集団の鬼（oni）に向き合う実践を与えられたとき、他者を守る・真実を語るのに十分機能できる容量が開けます。
        - その枠組みでは、自己責めは和らぎます。欠陥な自己でも、混乱した証人でもありません。問題は、浄化の実践なしに向き合われない苦しみを運び続けてきた制度と政策の仕組みです。Omote Senseiの伝統はその実践と、「他者を助けることが最終的に自らを救う」という教えを示します。
practice:
  options:
    - id: practice_01
      display_name: 浄化と奉仕の実践
      announcement_line: Omote Senseiは、紛争アラートが真実の恐れを全面シャットダウンに変え続ける瞬間のため、4分間の「浄化と奉仕の実践」を教えます。サイドバーにあり、日常で使える短さです。
      relief_lines:
        - 積み重なったものは、向き合い手放せます。
        - 次の正直な一歩に足りる落ち着きが戻ります。
    - id: practice_02
      display_name: 浄化と奉仕の実践
      announcement_line: Omote Senseiは、アラートが来て集団の鬼（oni）を否定ではなく向き合う必要があるときのため、4分間の「浄化と奉仕の実践」を教えます。サイドバーにあり、次の確認の前か更新のあとに使える短さです。
      relief_lines:
        - 鬼（oni）は、否定ではなく正直な見立てに会います。
        - 奉仕は、仕える者をも回復させます。
sdg:
  primary:
    line: 国連はSDG 16と、その平和・正義・強い制度の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: この問題に取り組むなら、UNA-USAは地域からグローバルまでのプログラムを運営しています。入口は、ネットワークへの参加や地域の若者和平構築への参加です。
    - id: cta_02
      line: 若者の和平構築・説明責任のネットワークは、地域と国際の両方で入口を提供します。入口は、UNA-USAまたはお住まいの地域の団体です。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 紛争アラートが日常生活を書き換えています。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 日本の伝統の教師が、真実を保ち崩れない戦いと、平和の仕事が浄化しなければならない鬼（oni）を名指します。
      - id: headline_layer_2_02
        line: Omote Senseiは紛争の圧力を集団的・個人的な苦しみとして読み、応答として浄化と奉仕を示します。
