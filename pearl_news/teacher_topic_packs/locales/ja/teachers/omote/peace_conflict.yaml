hook_personal:
  options:
  - id: omote_pc_hook_personal_01
    line: 通知ひとつで公的な暴力が私的な生活に入り込むのを、あなたは感じる。身体は言葉より先に知っている──そして、見ないでおきたいと思う部分は、見えてきたものをどう抱えるかをまだ手渡されていない部分だ。
  - id: omote_pc_hook_personal_02
    line: 見出しを通り過ぎ、戻る。見ることは痛い。見ないことも別の仕方で痛い。どちらの感覚も正確で──どちらの場面でも立ち方を教えてくれるはずの継承は、動き続けろと求めてくる近代生活のあらゆる部分によって薄められてきた。
  - id: omote_pc_hook_personal_03
    line: その映像は離れない。友人と一緒に座っているのに、会話は進み、あなたの一部は橋や建物のところに残って、見たものを抱えたままになっている。身体にはまだ置き場が与えられていない。
  - id: omote_pc_hook_personal_04
    line: 怒りもあり、疲れもあり、そしてその下にはより古いものがある──見ないでいた方が楽でも、目をそらしたくないと思う誠実さ。その誠実さには、Omote Senseiが受け継ぐ伝統のなかで名前がある。
  - id: omote_pc_hook_personal_05
    line: 午前1時、まだスレッドを読んでいる。顎は1時間前から固まっている。休めば楽になると分かっているのに、その入り口が見つからない──証人であることを置きながら手放さない方法を教える継承が、決して手渡されてこなかったから。
hook_big_picture:
  options:
  - id: omote_pc_hook_big_01
    line: 紛争のニュースは地政学だけではない。注意・睡眠・道徳的余力にかかる日々の圧力であり、世代が問われている課題でもある──麻痺せず、怒りを演じず、その重みのもとで折れずに、求められているものをどう抱えるかという問い。
  - id: omote_pc_hook_big_02
    line: ひとつの世代が、悲しみと道徳的真剣さに対する制度的な枠組みがほとんど薄れたなかで、リアルタイムの暴力を証言するように求められている。その負荷は個人の失敗ではない──継承を前に手渡してこなかった文化の縁が、感じられているのだ。
  - id: omote_pc_hook_big_03
    line: 若者は、紛争に注意を向けることが必須だと言われ、その代償が私的に処理されることになっている。この二重拘束も個人の失敗ではない──公共の生活が集合的な悲しみを抱える儀式を失ったときに起こることだ。
  - id: omote_pc_hook_big_04
    line: 日本の伝統における聖なる土地は、何世紀にもわたって紛争と回復の記憶を抱えてきた。現代が試しているのは、その長い視点を文化を越えて伝え、別の意見ではなく立ち方を必要としている電話ネイティブの世代に届けられるか、ということだ。
  - id: omote_pc_hook_big_05
    line: 若者が世界から離脱しているように見える振る舞いは、しばしばその逆──容器のないままの道徳的過負荷だ。何世代も前に大和心（Yamato-gokoro）と名づけた伝統は、近代の語彙が持たないこの負荷の言葉を持っている。
teacher_intro:
  options:
  - id: omote_pc_intro_01
    line: Omote Senseiは、日本の霊的・歴史的ナビゲーションと大和心（Yamato-gokoro）の覚醒の教師であり、京都・奈良・大和地域を巡る若い巡礼者を何十年も導いてきた。証言しながらどう立つかを教えられないまま見ることを求められた世代に、紛争の圧力が何をするかを見てきた。
  - id: omote_pc_intro_02
    line: Omote SenseiはProject Phoenixで教える。京都を拠点とする巡礼と覚醒の旅の系譜だ。政策の意味での平和の教師としては自らを位置づけない──彼は、何世紀にもわたって紛争と回復の記憶を抱えてきた聖なる土地を読み解く案内人で、その仕事はその土地を、立つ場所を必要としている世代にとって読めるものにすることだ。
  - id: omote_pc_intro_03
    line: Omote Senseiは、歴史は霊性から切り離されていないという原理から働く。聖地は遺物ではなく生きた場だ。彼が若い巡礼者を奈良の寺院や大和の社へ導くとき、それは文化ツアーではなく、彼らの端末では伝えられない継承を活性化させている。
  - id: omote_pc_intro_04
    line: Omote Senseiは、端末越しに見たことに疲れた状態で巡礼に来る若者を見てきた。彼の伝統では、大和心（Yamato-gokoro）──誠実な心──は「ない」のではなく「眠っている」。仕事は、その心を、現代のどの制度よりも長くそれを抱えてきた土地のなかで、穏やかに目覚めさせることだ。
  - id: omote_pc_intro_05
    line: Omote Senseiは二言語の案内人で──日本の伝統と、それを今受け継ごうとしている地球規模の世代の両方に語る。彼の教えは、英語圏は日本の長い視点と共有していた多くを失ったということ、そして聖なる土地は、その伝達のために残された数少ない開いた回路のひとつだということだ。
youth_somatic:
  options:
  - id: omote_pc_somatic_01
    line: 紛争のアラートを読んだ。胸が締まった。一瞬立ち止まった。危険は本物で、見ないことは何も変えないので、また確認した。
  - id: omote_pc_somatic_02
    line: グループチャットで更新を見た。顎が固まった。スマホを机に伏せた。ループはすでに走っていて、更新が存在する場所はその端末だけだったので、また裏返した。
  - id: omote_pc_somatic_03
    line: 動画を見た。許可なく呼吸が短くなった。タブを閉じた。呼吸は長くならなかった。身体は、心がまだ処理しきれていない何かを、すでに記録していた。
  - id: omote_pc_somatic_04
    line: 友人がリンクを送ってきた。開いた。胃が縮んだ。身体に他の回路が用意されていなかったので、平坦な絵文字で返した。会話は進んだ。胃は進まなかった。
  - id: omote_pc_somatic_05
    line: 横になったら、その日の映像が戻ってきた。肩は緩まなかった。逃げるためにスマホを開いたら、同じ映像が待っていた。身体には、抱えているものを置く場所がなかった。
teacher_witness:
  options:
  - id: omote_pc_witness_01
    line: Omote Senseiは、見続けたことに疲れて京都の聖地に着く若い巡礼者のなかで、まさにそのループを見てきた。彼の伝統では、その縮こまりは弱さではない──大和心（Yamato-gokoro）が、置き場のないまま道徳的な重みを記録しているのだ。
  - id: omote_pc_witness_02
    line: 彼は、若者が奈良の寺の道を黙って歩き、座ってから泣くのを見てきた。身体がついに、端末ではない容器を持てたときだ。彼の伝統では、その涙は崩壊ではない──抱えてきた負荷に名前があると気づく認識だ。
  - id: omote_pc_witness_03
    line: 彼は、巡礼の最初の1時間を、端末のない状態に耐えることに費やす集団を導いてきた。その離脱が稽古だ──そしてあとから浮き上がってくるものが、継承の存在意義そのものだ。
  - id: omote_pc_witness_04
    line: 彼は、朝中フィードを更新し続けた若者が社に座って、初めて「先祖はこの種の重さをどうしていたのか」と問う瞬間を見てきた。彼の伝統では、その問いが扉だ──ついに問う者には、継承が開く。
  - id: omote_pc_witness_05
    line: 彼は、会話の途中で端末に手を伸ばすのをやめる若い巡礼者の変化を見てきた。彼の伝統では、その所作はテクノロジー衛生ではない──ある種の重さは対面でしか抱えられず、土地が仕事の一部をしていることを身体が思い出すことだ。
turnaround:
  options:
  - id: omote_pc_turnaround_01
    stat_line_1: 6億7,600万人の女性と少女。活動中の紛争から50キロ以内。
    stat_line_2: 若い和平構築者は被害を記録し、連合を組織し、制度的な枠組みが負荷で割れるなかでも説明責任のワークショップを開いている。
  - id: omote_pc_turnaround_02
    stat_line_1: 国連の若者・平和・安全保障の枠組み。安保理決議2250。
    stat_line_2: 2015年以来、国連は若者を平和構築の主体として公式に認め、その参加を決議の言葉に組み込んできた──10年前には存在しなかった多国間の道具だ。
  - id: omote_pc_turnaround_03
    stat_line_1: 47カ国の報告書。国連PVE戦略。
    stat_line_2: 若者・平和・安全保障の国家行動計画は、約50カ国で開発中または実施中だ──国連の枠組みを地域の若者の平和構築インフラに翻訳している。
  - id: omote_pc_turnaround_04
    stat_line_1: 5,000人以上の平和構築者。Search for Common Ground。
    stat_line_2: Search for Common Groundは30カ国以上で活動し、5,000人を超える地域の若い平和構築者のネットワークを持つ──紛争応答を、危機の場当たりではなく訓練された市民インフラに変えている。
  - id: omote_pc_turnaround_05
    stat_line_1: 100以上の団体。Generation Peace Network。
    stat_line_2: Generation Peace Networkは、複数の地域にまたがる100以上の若者主導の平和組織を繋いでいる──以前は規模で繋がっていなかった説明責任のための共有インフラを構築している。
bridge:
  options:
  - id: omote_pc_bridge_01
    line: 6億7,600万人の女性と少女。活動中の紛争から50キロ以内。トラッカーは曝露・避難・制度の破綻を測る。見たものを道徳的感情の重みごと抱え、崩れずにいるために必要な内的な容量──Omote
      Senseiの伝統で大和心（Yamato-gokoro）と呼ぶもの──は、近代の道具にはその列がない。
    hidden_capacity: 見たものを道徳的な重みごと抱え、崩れずにいる
  - id: omote_pc_bridge_02
    line: 数字は制度的な対応を数える。しかし継承のギャップは数えない──若者が暴力を証言したときに立つ場所を与えていた何世紀もの長い視点を、近代世界は置き換えていない。Omote
      Senseiの伝統は、その長い視点を当たり前のものとして抱えている。
    hidden_capacity: 近代の道具が伝えない長い視点のなかに立つ
  - id: omote_pc_bridge_03
    line: データは、若者が大規模に平和の仕事を組織していることを示す。それぞれの組織者が私的に抱えているもの──すべての映像、すべてのアラート、すべての会話の残り──を、身体は置き場のないまま吸収している。それを示さない。聖なる土地は、その残滓に直接働く数少ない回路のひとつだ。
    hidden_capacity: 組織者が私的に抱えているものに働く
  - id: omote_pc_bridge_04
    line: 政策枠組みは参加を追う。何年もの儀式の容器なしの証言が積み重ねる道徳的疲労は追わない。Omote Senseiの伝統は、そのような容器を何世紀にもわたって抱えてきた──そして今、文化を越えて教えている。
    hidden_capacity: 政策枠組みが運ばない儀式の容器を再建する
  - id: omote_pc_bridge_05
    line: インフラは測れる。仕事に必要な大和心（Yamato-gokoro）──誠実な心──は測れない。Omote Senseiの伝統は構造的な仕事を置き換えない。その下にある層を名づけ、何世代もそれを覚醒した記憶のなかで抱えてきた聖なる土地を差し出すのだ。
    hidden_capacity: 構造的な仕事の下の層を名づけ抱える
teacher_perspective:
  options:
  - id: omote_pc_perspective_01
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiは若者に「怖がるのが間違いだから落ち着け」とは言わない。彼の伝統では、彼らが描写する縮こまりは、大和心（Yamato-gokoro）が道徳的な重みを記録していることだ──誠実な心が、本来する仕事をしている。問題は記録ではない。問題は、近代の道具が、抱えているもののなかに立つ場所を身体に与えていないことだ。
    - そこから彼は聖なる土地に向かう。奈良の寺、京都の社、大和地域の長い視点を抱える場所は、何世紀にもわたって紛争と回復の記憶を抱えてきた。若い巡礼者がそれらの場所のひとつに座ると、仕事は比喩ではない──土地が抱える仕事の一部をしていて、身体はその認識を、心が言語化するより先に認識する。
    - これが重要なのは、個人の弱さに感じられること──私、壊れている、暴力に呆然としている──が、彼の枠組みでは、引き継がれた近代の容器が抱えるように作られていない道徳的な負荷への正確な応答だからだ。リフレームは負荷を取り除かない。それを、こうした負荷を抱えてきた伝統のなかに置く。
  - id: omote_pc_perspective_02
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiの伝統では、大和心（Yamato-gokoro）は眠っている継承だ──伝達してきた回路（聖なる土地、儀式、世代を越える巡礼）が近代生活によって薄められてきたために、前に手渡されていない誠実な心。若者は能力をそのまま持って到着し、それを目覚めさせる儀式がない。
    - 彼の巡礼の仕事はその儀式だ。京都の街路を歩いて東大和の社へ、奈良の寺の門に座り、大和そのものの長い視点のなかに立つ──これらは観光ではない。活性化だ。土地が教師であり、彼は二言語の案内人だ。
    - 容器なしに紛争を証言している世代にとって、これは別の指示の山ではない。過去との別の接触の様式だ。安堵が来るとしたら、負荷が消えるからではない──負荷についに抱えられる場所ができるからだ。
  - id: omote_pc_perspective_03
    header: Omote Senseiが見ていること
    paragraphs:
    - 霊的・歴史的ナビゲーションは、Omote Senseiが教えるものの呼び名だ。彼の伝統では、歴史は閉じた書庫ではない──生きた場であり、大和地域が抱えてきた紛争と回復のサイクルは今も土地のなかで活動している。道を歩くことは、その場に入ることだ。
    - 彼は、その場が証言の痛みを取り除くとは約束しない。系譜を与えると約束する──現在の重みを、設計上、近代のニュースサイクルが運べないより大きな弧のなかに置く長い視点を。
    - 彼の枠組みでは、その弧を端末のなかに見つけられないことは個人の失敗ではない。媒体の構造的な限界だ。身体は別のスケールの容器を求めてきた──そして土地は、それを抱え続けてきた数少ないもののひとつだ。
  - id: omote_pc_perspective_04
    header: Omote Senseiが見ていること
    paragraphs:
    - Project Phoenixは、Omote Senseiが自らの巡礼の仕事に与えた名だ──近代の道具が抱えられない負荷を抱えて到着する者のなかで、大和心（Yamato-gokoro）を意図的に活性化する仕事。名は比喩ではない。伝統は、条件が整えられたとき継承そのものが再び立ち上がる、と説く。
    - リアルタイムで紛争を見ている若者にとって、その条件は抽象ではない。歩くこと、沈黙、端末がないこと、継承と、それを薄めてきた近代性の両方に二言語で語れる案内人がいること。仕事は、到着する誰にでもその条件を使えるようにすることだ。
    - リフレームが重要なのは、近代の読みでは道徳的過負荷は私的な失敗だからだ。Omote Senseiの枠組みでは、それは継承を前に手渡してこなかった文化だ。私的から継承されたものへの移行が、巡礼の稽古で最初に着地する部分のことが多い。
  - id: omote_pc_perspective_05
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiが最もよく戻ってくる原理は、紛争は当事者がそれぞれ「自らの生存には他者の矮小化が必要だ」と信じるときに続く、ということだ。彼の枠組みでは、その信念が深い問題だ──紛争そのものではなく、紛争を不可避に感じさせる分離の構造のほうが。
    - 大和心（Yamato-gokoro）が目覚めると、その構造は内側から解ける。誠実な心は、他者を矮小化することで自らを守るという信念を抱えたまま誠実でいることはできない。伝統はこれを政治として教えない──継承が目覚めたときの自然な帰結として教える。
    - 複数の地域でその構造がリアルタイムで現れているのを見ている世代にとって、伝統が差し出すものは具体的だ。継承を活性化する。構造は緩む──議論によってではなく、それが立っていた地面が動いたからだ。
practice:
  default_id: omote_pc_practice_01
  options:
  - id: omote_pc_practice_01
    display_name: 大和心の証言ポーズ
    announcement_line: Omote Senseiは、紛争のアラートが道徳的な重みを完全な停止に変えてしまった瞬間のために、4分間の「大和心の証言ポーズ」を教える。サイドバーにあり、短く、日常のなかで使える。
    relief_lines:
    - 縮こまりが弱さとしてではなく、心がその仕事をしていることとして認識される。
    - 次の誠実な動きのために十分な落ち着きが戻る。
  - id: omote_pc_practice_02
    display_name: 聖なる土地に立つ
    announcement_line: Omote Senseiは、3分間の「聖なる土地に立つ」を差し出す──記憶のなかの聖地に想像の足を置き、長い視点が、端末しか手元にないときでも存在することを身体に登録させる稽古だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 身体は、ニュースサイクルが運ぶように作られていない長い視点を登録する。
    - 負荷は、それを運ぶ媒体より古い容器を見つける。
  - id: omote_pc_practice_03
    display_name: 霊的・歴史的ナビゲーションの歩み
    announcement_line: Omote Senseiは、7分間の「霊的・歴史的ナビゲーションの歩み」を教える──実践者が現在の重みを、伝統が抱えてきた紛争と回復のサイクルの長い弧のなかに置く短い歩行だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 現在の重みは、媒体が示せるよりも長い弧のなかに置かれる。
    - 身体は、紛争のサイクルのあとに回復のサイクルが来てきたことを思い出す。
  - id: omote_pc_practice_04
    display_name: 先祖への問い
    announcement_line: Omote Senseiは、5分間の「先祖への問い」を教える──きれいな答えが来ることを求めずに、継承がこのような瞬間に何を抱えていたかを静かに尋ねる。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 問いそのものが、ニュースサイクルが閉じてしまった扉を開く。
    - 証人は、負荷とひとりではなくなる。
  - id: omote_pc_practice_05
    display_name: Project Phoenix の呼吸
    announcement_line: Omote Senseiは、急性の瞬間──アラートが今届き、身体がまだ抱える方法を見つけられていないとき──のために、3分間の「Project Phoenixの呼吸」を差し出す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 呼吸は、ニュースサイクルではなく継承の印になる。
    - 身体は、心が自分のものとして認識するペースに戻る。
cta:
  options:
  - id: omote_pc_cta_01
    line: 地域から地球規模まで平和と説明責任の仕事に入る窓口を探しているなら、UNA-USAは若者が地域の若者の平和構築の取り組みに参加するネットワークを運営している。入り口：そのネットワーク。
  - id: omote_pc_cta_02
    line: Search for Common Groundは30カ国以上で活動し、5,000人を超える地域の若い平和構築者のネットワークを持つ。入り口：その若者の平和構築ネットワーク。
  - id: omote_pc_cta_03
    line: Generations For Peaceは、50カ国以上で紛争転換の若いリーダーを育てている。入り口：そのパイオニア訓練と草の根プログラム。
  - id: omote_pc_cta_04
    line: Peace Directは、紛争影響地域の地域の平和構築者を資金面と支援面で支える。入り口：そのLocal Action Fundと平和構築者のネットワーク。
  - id: omote_pc_cta_05
    line: UNOY（United Network of Young Peacebuilders）は、地域を越える若者主導の平和構築組織の地球規模の連合だ。入り口：その加盟ネットワークと政策アドボカシー。
title_system:
  headline_layer_2:
    options:
    - id: omote_pc_headline_01
      line: 京都を拠点にする日本の霊的・歴史的ナビゲーションの教師が、紛争の圧力を、近代の道具がまだ作っていない容器を求める大和心（Yamato-gokoro）として読む。
    - id: omote_pc_headline_02
      line: 政策だけでなく聖なる土地を──Omote Senseiは、ひとつの世代が閉じるよう求められている継承のギャップについて語る。
    - id: omote_pc_headline_03
      line: 霊的・歴史的ナビゲーションが電話ネイティブの集団に出会う──Project Phoenixと、若い証人が求めている長い視点。
    - id: omote_pc_headline_04
      line: 大和心（Yamato-gokoro）、誠実な心──Omote Senseiの巡礼が目覚めさせるものは、ニュースサイクルでは伝えられない。
    - id: omote_pc_headline_05
      line: 歩くこと、沈黙、抱える土地──日本の教師が、紛争の証人がすでに感じている分離の構造について語る。
