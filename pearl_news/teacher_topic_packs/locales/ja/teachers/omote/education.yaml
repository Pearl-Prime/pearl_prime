hook_personal:
  options:
    - id: hook_personal_01
      line: 学校は人生の準備をすると言われます。ある日は、自分の注意を疑う訓練をしているように感じ、本当に難しいものに向き合うことから逃げ続けているようにも感じます。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 教育の負担は人格の問題でもあります。学校は深さと配慮を語りながら、人格形成を測れる能力に置き換えています。若者が難しいことを正直に向き合うことを教えられないところで、鬼（oni）は根を下ろします。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Omote Senseiは、日本の聖なる生き方と浄化の教師として、実践の場で学生が散漫な注意を道徳的欠陥のように抱えるのを見てきました。彼らが問うのは「教育は大事か」ではありません。大和心（Yamato-gokoro）──誠実な心──がカリキュラムから剥がされ、パフォーマンスに置き換えられたなかで学ぶとは何か、です。
    - id: teacher_intro_02
      line: Omote Senseiは日本の伝統から教えます。実践の場で、失敗と不快から守る制度にすでに疲れて来る学生を見てきました。伝統は、教育には難しいものとの誠実な出会いの実践が含まれなければならず、さもなければ本当の苦難が来たときに鬼（oni）が根を下ろす、と説きます。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |-
        課題ポータルを開きます。身体が緊張します。別の画面に移ります。仕組みが抱えさせてくれなくても課題は残るので、また戻ります。
        LOOP_SEQUENCE: "opened the portal. body tensed. switched away. came back."
    - id: youth_somatic_02
      line: |-
        アプリで締切を見ました。肩と顎が締まります。タブを切り替えます。やるべきことは残るので、また戻ります。
        LOOP_SEQUENCE: "saw the deadline. shoulders and jaw tightened. switched tabs. returned."
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Omote Senseiはその連続そのものを見てきました。課題が現れ身体が構え、注意が離れ、問題の名付けを誤った制度のなかで努力が戻る。日本の伝統は学生を責めず、カリキュラムから人格形成と誠実な難しさを剥がした制度を名指します。
    - id: teacher_witness_02
      line: 彼は学生がこのループを抱えるのも見てきました。ポータルが開き身体が緊張し、タブが変わり、同じ圧力が引き戻す。伝統は、若者が難しいことを正直に向き合うことを教えられないところで鬼（oni）がいちばん根を下ろしやすい、と説きます。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 410 workshops. 27 cities.
      stat_line_2: 若者はワークショップを組織し、キャンペーンを開き、学生と若手教育者は学びの支援、より健全な時間割、注意に優しい学びの場をすでにつくっています。
    - id: turnaround_02
      stat_line_1: 410 workshops. 27 cities.
      stat_line_2: 若者は組織し、ピアの輪を開き、傾聴の訓練をし、学校に人格と誠実な難しさを学びの方程式の一部として扱わせようとしています。
bridge:
  options:
    - id: bridge_01
      line: 410ワークショップ。27都市。トラッカーは改革と学びの支援を測ります。もう一日の分断のあと、学びに誠実に戻るのに何が要ったか──制度の混乱を自分の失敗と呼ばずに難しいものに向き合う容量──の欄はありません。ポータルに戻った学生にそれが要りました。Omote Senseiの伝統は代々大和心（Yamato-gokoro）と誠実な難しさへの出会いを育んできました。
    - id: bridge_02
      line: 数字はプログラムと改革を測ります。若者がついに誠実な向き合いを含む実践を持つとき──能力の演技ではなく、打算ではなく道徳的感情から行動する誠実な心──何が起きるかは測りません。その容量が次の誠実な学習に要ります。Omote Senseiの伝統はそれを大和心（Yamato-gokoro）と呼びます。自分と共同体と仕事そのものへの誠実です。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Omote Senseiが見ていること
      paragraphs:
        - Omote Senseiはまず学生が気が散っていると言いません。まず制度を名指します。日本の聖なる伝統では、教育は人格形成──打算ではなく道徳的感情から行動する誠実な大和心（Yamato-gokoro）の涵養──から切り離されませんでした。カリキュラムから人格形成を剥がし測れる能力に置き換えた現代の教育は、技術的にはできるが誠実に生きることを知らない人を生みます。伝統はそれを学生ではなく彼らを形作った制度の失敗と見なします。
        - そこから鬼（oni）へ。鬼（oni）は内なる苦しみとして、若者が難しいことを正直に向き合うことを教えられないところでいちばん根を下ろしやすいです。失敗、不快、道徳的複雑さから学生を守る教育はレジリエンスある大人を生みません。本当の苦難に初めて出会したとき、向き合う実践が育てられていなければ鬼（oni）が立ち上がる大人を生みます。
        - それが再フレームです。「私が壊れている──おかしい」に感じることは、乱れた学びの環境への正直な読みであり、伝統は、制度と構造が要求していることのために設計されていなかったなかで、難しいものとの誠実な出会いを教育に含めるべきだと説きます。
    - id: teacher_perspective_02
      header: Omote Senseiが見ていること
      paragraphs:
        - Omote Senseiの伝統では、散漫な注意は認知の問題にとどまりません。人格の問題です──実践を通じてしか涵養されない誠実な在り方、大和心（Yamato-gokoro）の欠如です。制度が深さと配慮を語りながら日々を分断とパフォーマンスで組み立てるとき、伝統は問います。難しいものに向き合う実践はどこにありますか。
        - 聖なる地理は、何を学ぶかと同じくらいどこで学ぶかが要ると教えます。画面だけで教育された若者に、伝統は特定の喪失を指します。場所に根ざした知──その土地に身体を置き続けてしか生まれない理解、風景の記憶と注意への要求──の欠如です。
        - その枠組みでは、自己責めは和らぎます。学生が怠けているのでも、苦しむ自分が間違っているのでもありません。問題は、誠実な学びの条件を剥いだ制度が結果を学生のせいにしていることです。Omote Senseiの伝統は基準を示します。自分と共同体と仕事そのものへの誠実です。
practice:
  options:
    - id: practice_01
      display_name: 浄化と奉仕の実践
      announcement_line: Omote Senseiは、学校の圧力が心を自分に対して演技させている瞬間のため、4分間の「浄化と奉仕の実践」を教えます。サイドバーにあり、短く構造化されています。
      relief_lines:
        - 積み重なったものは、向き合い手放せます。
        - 次の正直な一歩に足りる落ち着きが戻ります。
    - id: practice_02
      display_name: 浄化と奉仕の実践
      announcement_line: Omote Senseiは、課題ポータルと分断した一日が内面を浄化する必要に置いたときのため、4分間の「浄化と奉仕の実践」を教えます。サイドバーにあり、授業の前や課題の合間に使える短さです。
      relief_lines:
        - パフォーマンスの鬼（oni）は、正直な見立てに会います。
        - 誠実な心が次の一歩のために戻ります。
sdg:
  primary:
    line: 国連はSDG 4と、その質の高い教育の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: UNESCOのグローバル教育連合と学生支援団体の両方が、ここでの実践的な入口を提供しています。入口は https://www.unesco.org/en/education/globaleducationcoalition です。
    - id: cta_02
      line: 次の一歩がそこでないなら、学生主導の教育正義の団体が同じ枠組みで地方と国家に取り組んでいます。入口は、ネットワークへの参加です。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 学校は学びを語りながら、その条件を壊している。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 日本の伝統の教師は、散漫な注意を制度のずれの印として読み、大和心（Yamato-gokoro）を名指します。
      - id: headline_layer_2_02
        line: Omote Senseiは、人格形成が剥がれたとき教育の圧力が何をするかを語り、難しいものに正直に向き合う実践を示します。
