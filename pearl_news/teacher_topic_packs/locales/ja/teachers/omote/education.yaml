hook_personal:
  options:
  - id: omote_ed_hook_personal_01
    line: 課題は終えられる。締切にも間に合う。しかし、カリキュラムが届けるはずだった何か──認識、長い視点、資格証だけでは伝えられない継承──が届いていないことも、あなたは知っている。
  - id: omote_ed_hook_personal_02
    line: あなたは制度の内側にいて、求められることをやっている。そしてその下で、制度自体がもはや信じていない世界のために訓練されている奇妙さも感じている──教えられているものと身体が認識するものとのギャップは、広がっている。
  - id: omote_ed_hook_personal_03
    line: 午前2時、レポートを終える。顎は固まっている。4時間眠る。成績が届く。あなたの一部がずっと尋ねているのは、合格したかどうかではない──このやり取りで実際に何かが伝達されたかどうかだ。
  - id: omote_ed_hook_personal_04
    line: シラバスを読んで、自分のどこも見つからない。読書課題を終えても、認識は届かない。摩擦は、教材が難しいことではない──ここに探しに来た継承と、教材が何の関係もないことだ。
  - id: omote_ed_hook_personal_05
    line: あなたの一部は、問いがどうもっと勉強するかではないと知っている。問いは、もう一度カリキュラムのなかにいるにはどうすればよいか──長い視点と系譜が伝達の一部であり、目録のなかの任意の選択科目ではないようなものに、ということだ。
hook_big_picture:
  options:
  - id: omote_ed_hook_big_01
    line: 若者の教育の負荷は学業量だけの話ではない。資格証の配信が、注意・休息・継承を認識する力にする影響だ──制度自体が、その認識ではなく別のものを配信するように組織されているなかで。
  - id: omote_ed_hook_big_02
    line: ひとつの世代が、カリキュラムが描き出せない世界を継ぐよう求められている。教えられていることと集団が実際に生きるなかでとのギャップは、その集団の責任ではない──近代の制度が伝達してこなかった継承の可視の縁だ。
  - id: omote_ed_hook_big_03
    line: 資格証は今や、制度が若者を有効と認める主要な媒体であり、若者が制度に認識される唯一の場所でもある。その二重の役割が教育的過負荷の構造であり──それは、どの継承も果たすように設計されたものではない。
  - id: omote_ed_hook_big_04
    line: 日本の伝統における聖なる土地は、何世紀にもわたってカリキュラムだった──近代の制度が運ばない長い視点の生きた伝達だ。問いは、その伝達のために、そのカリキュラムが間に合う時間に絵に再び入れるか、ということだ。
  - id: omote_ed_hook_big_05
    line: 学生の離脱として読まれているものは、しばしばその逆──身体が、ここに探しに来た継承をカリキュラムが伝達していないことを記録しているのだ。Omote
      Senseiの伝統は、その記録に対する言葉を持っている。近代の制度は持っていない。
teacher_intro:
  options:
  - id: omote_ed_intro_01
    line: Omote Senseiは、日本の霊的・歴史的ナビゲーションと大和心（Yamato-gokoro）の覚醒の教師であり、大和地域の内側で何十年も若い巡礼者を教えてきた。継承を求めて来た集団に、資格証の配信モデルが何をするかを見てきた。
  - id: omote_ed_intro_02
    line: Omote SenseiはProject Phoenixで教える。京都を拠点とする巡礼と覚醒の旅の系譜だ。政策の意味での教育改革者としては自らを位置づけない──彼は、何世紀にもわたって伝達を当たり前のものとして抱えてきた聖なる土地を読み解く案内人だ。
  - id: omote_ed_intro_03
    line: Omote Senseiは、歴史は霊性から切り離されていないという原理から働く。聖地は生きた教師だ。彼が若い巡礼者を奈良の寺院や大和地域の長い視点を抱える場所へ導くとき、それは文化ツアーではなく、近代の制度が伝達できないカリキュラムを回復している。
  - id: omote_ed_intro_04
    line: Omote Senseiは、資格証を手に、名づけられない継承のギャップを抱えて到着する若い巡礼者を見てきた。彼の伝統では、大和心（Yamato-gokoro）──誠実な心──は「ない」のではなく「眠っている」。仕事は、現代のどの制度よりも長くそれを抱えてきた土地のなかで、それを目覚めさせることだ。
  - id: omote_ed_intro_05
    line: Omote Senseiは二言語の案内人で──日本の伝統と、それを今受け継ごうとしている地球規模の世代の両方に語る。彼の教えは、近代の制度は資格証を配信するように建てられたのであって、集団が実際に来た継承は、制度ではなく土地が抱えている、ということだ。
youth_somatic:
  options:
  - id: omote_ed_somatic_01
    line: 午前1時、講義のタブを開いた。目は別の画面に流れた。講義のタブを閉じた。締切は本物で、認識は届かなかったので、また開いた。
  - id: omote_ed_somatic_02
    line: 教科書の章を読んだ。3ページ目で顎が固まった。再読しないスクリーンショットを撮った。そして次に進んだ──制度は、登録ではなく進み続けることを求めるからだ。
  - id: omote_ed_somatic_03
    line: レポートを提出した。呼吸は長くならなかった。成績が届いて、身体は安堵を記録しなかった──身体が待っていたのは、成績ではなかったからだ。
  - id: omote_ed_somatic_04
    line: 講義を2倍速で見た。内容と、その後で歩いて入る世界とのギャップで胃が縮んだ。縮みに名前をつけなかった──そのギャップに対して何をするかの継承が、伝達されてこなかったから。
  - id: omote_ed_somatic_05
    line: ゼミに座って、肩が緩まなかった。見回すと、同じ肩の集団の5人の他のメンバーがいた──部屋が彼らのために作っていなかったカリキュラムを、身体が一斉に記録していた。
teacher_witness:
  options:
  - id: omote_ed_witness_01
    line: Omote Senseiは、成績証明書と継承のギャップを抱えて到着する若い巡礼者のなかで、まさにそのループを見てきた。彼の伝統では、ループは学業の弱さではない──大和心（Yamato-gokoro）が、身体がここに探しに来たカリキュラムの不在を記録しているのだ。
  - id: omote_ed_witness_02
    line: 彼は、若者が奈良の寺の道を歩き、初めて、彼らに教えているカリキュラムの内側にいると感じるのを見てきた。彼の伝統では、認識は懐かしさではない──土地が教えているとき、伝達が実際にどう感じるかを身体が思い出すことだ。
  - id: omote_ed_witness_03
    line: 彼は、資格証がカリキュラムだと確信して到着する集団を導いてきた。巡礼での最初の稽古は、資格証を置くこと──そしてその場所に届くものが、彼らがずっと探していたものだ。
  - id: omote_ed_witness_04
    line: 彼は、若者が初めて「先祖は何を学んだのか」と問う瞬間を見てきた。彼の伝統では、問いが扉だ──ついに直接問う者には、継承が開く。
  - id: omote_ed_witness_05
    line: 彼は、若い巡礼者が資格証をカリキュラムとして扱うのをやめて、土地に教えさせ始める変化を見てきた。彼の伝統では、その変化は反制度的ではない──今それを配信する媒体が発明される前に、学びが何だったかを身体が思い出すことだ。
turnaround:
  options:
  - id: omote_ed_turnaround_01
    stat_line_1: 2億4,400万人の子ども。UNESCO。
    stat_line_2: UNESCOは、2億4,400万人の子どもと若者がまだ世界で学校に通っていないと推定している──Global Education First、SDG
      4、そして野心を地域のインフラに翻訳する一連の国家計画を枠づける数字だ。
  - id: omote_ed_turnaround_02
    stat_line_1: 100以上の加盟国。Global Campaign for Education。
    stat_line_2: Global Campaign for Educationは、100以上の加盟国で市民社会を結びつけている──教育のアドボカシーを散在するキャンペーンではなく共有インフラに変えている。
  - id: omote_ed_turnaround_03
    stat_line_1: SDG 4。2030年の期限。
    stat_line_2: SDG 4は、2030年までに包括的で公平な質の高い教育をすべての人に届けることを国際社会に約束させている──以前の枠組みが持っていなかった多国間の道具だ。
  - id: omote_ed_turnaround_04
    stat_line_1: 7,600万人の子ども。ECW。
    stat_line_2: Education Cannot Waitは、創設以来7,600万人を超える危機影響下の子どもに届き、緊急時の教育のために7億ドルを動員した──10年前には存在しなかった容量だ。
  - id: omote_ed_turnaround_05
    stat_line_1: 2,200万人の参加者。World's Largest Lesson。
    stat_line_2: UNICEFと地球規模の教育者の連携であるWorld's Largest Lessonは、160カ国の2,200万人以上の子どもに届いた──SDGの枠組みを、教室レベルの伝達インフラに翻訳している。
bridge:
  options:
  - id: omote_ed_bridge_01
    line: 2億4,400万人の子ども。UNESCO。トラッカーは登録、修了、政策採用を測る。教室の内側で伝達されているもの──集団がここに来た継承が実際に届いているか、それとも認識のない資格証を受け取っているか──は測らない。Omote
      Senseiの伝統は、その伝達の問いを当たり前のものとして抱えている。
    hidden_capacity: 資格証だけでなく継承を届ける
  - id: omote_ed_bridge_02
    line: 数字は、建てられたものを示す。継承のギャップ──近代の制度が伝達してこなかった長い視点、系譜、生きた場──は示さない。身体はそれを求め続けている。Omote
      Senseiの伝統は、その場を当たり前のものとして抱えている。
    hidden_capacity: 制度が伝達しない生きた場を抱える
  - id: omote_ed_bridge_03
    line: 枠組みは参加と修了を追う。若い巡礼者が聖なる土地のなかに座って、初めて、教えられていると感じる瞬間は追わない。Omote Senseiの枠組みでは、その瞬間こそ、トラッカーが報告しないカリキュラムだ。
    hidden_capacity: トラッカーが示せない伝達を登録する
  - id: omote_ed_bridge_04
    line: 政策の道具は資格証をスケールさせる。認識はスケールさせない。継承が届いたときに認識する能力──大和心（Yamato-gokoro）がその仕事をすること──こそ、近代の制度が教えていないものだ。Omote
      Senseiの伝統は、それを何世紀にもわたって抱えてきた。
    hidden_capacity: 政策枠組みが運ばない認識を再建する
  - id: omote_ed_bridge_05
    line: インフラは測れる。その下の伝達は測れない。Omote Senseiの伝統は構造的な仕事を置き換えない──その下の層を名づけ、何世代もその層を覚醒した記憶のなかで抱えてきた聖なる土地を差し出すのだ。
    hidden_capacity: 計測の下の層を名づける
teacher_perspective:
  options:
  - id: omote_ed_perspective_01
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiは、若者が感じる摩擦が動機の不足であるかのように「もっと勉強しろ」とは言わない。彼の伝統では、摩擦は、大和心（Yamato-gokoro）が身体がここに探しに来たカリキュラムの不在を記録していることだ。問題は学生ではない。問題は、下に伝達のないままに動いている資格証配信の構造だ。
    - そこから彼は聖なる土地に向かう。奈良の寺、京都の社、大和地域の長い視点を抱える場所は、何世紀にもわたってカリキュラムだった。若い巡礼者がそれらの場所のひとつに座ると、仕事は比喩ではない──土地が教えていて、身体はその教えを、心が言語化するより先に認識する。
    - これが重要なのは、注意の個人の失敗に感じられることが、彼の枠組みでは、継承のギャップへの正確な応答だからだ。リフレームは締切を取り除かない──資格証だけでは運べないより長い弧のなかに置く。
  - id: omote_ed_perspective_02
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiの伝統では、大和心（Yamato-gokoro）は眠っているカリキュラムだ──伝達してきた回路（聖なる土地、儀式、世代を越える巡礼）が近代の制度的生活によって薄められてきたために、前に手渡されていない継承。若者は能力をそのまま持って到着し、それを目覚めさせるカリキュラムがない。
    - 彼の巡礼の仕事はカリキュラムだ。京都の街路を歩き、奈良の寺の門に座り、大和そのものの長い視点のなかに立つ──これらは観光ではない。実際の教えだ。土地が教師であり、彼は二言語の案内人だ。
    - 認識のない資格証を運んでいる世代にとって、これは別の科目提供ではない。先に来たものとの別の接触の様式だ。安堵は、締切が消えることではない──身体が求めてきた継承がついに届くことだ。
  - id: omote_ed_perspective_03
    header: Omote Senseiが見ていること
    paragraphs:
    - 霊的・歴史的ナビゲーションは、Omote Senseiが教えるものの呼び名だ。彼の伝統では、歴史は閉じた書庫ではない──生きた場であり、大和地域が抱えてきた伝達と喪失のサイクルは今も土地のなかで活動している。道を歩くことは、その場に入ることだ。
    - 彼は、その場が資格証を置き換えるとは約束しない。系譜を与えると約束する──現在の学業を、設計上、資格証が運べないより大きな弧のなかに置く長い視点を。
    - 彼の枠組みでは、その弧を講義のなかに見つけられないことは個人の失敗ではない。媒体の構造的な限界だ。身体は別のスケールのカリキュラムを求めてきた──そして土地は、まだそのスケールで教える数少ないもののひとつだ。
  - id: omote_ed_perspective_04
    header: Omote Senseiが見ていること
    paragraphs:
    - Project Phoenixは、Omote Senseiが自らの巡礼の仕事に与えた名だ──資格証と名づけられない継承のギャップを抱えて到着する者のなかで、大和心（Yamato-gokoro）を意図的に活性化する仕事。名は比喩ではない。伝統は、条件が整えられたときカリキュラムそのものが再び立ち上がる、と説く。
    - カリキュラムがLMSとシラバスである若者にとって、その条件は抽象ではない。歩くこと、沈黙、端末がないこと、継承と、それを薄めてきた近代性の両方に二言語で語れる案内人がいること。
    - リフレームが重要なのは、近代の読みでは教育的摩擦は私的な失敗だからだ。Omote Senseiの枠組みでは、それは継承を前に伝達してこなかったカリキュラムだ。私的から継承されたものへの移行が、巡礼の稽古で最初に着地する部分のことが多い。
  - id: omote_ed_perspective_05
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiが戻ってくる原理は、教育は資格証の配信だけのために作られたものではなかった、ということだ。世代を越える継承の伝達──土地、儀式、系譜が共に抱えていたカリキュラム──だった。どれかひとつが欠けると、資格証は残り、継承は届かない。
    - 彼の枠組みでは、近代の制度は資格証ではとても上手になり、残りを届ける力をますます失っている。そのギャップは制度だけの責任ではない──伝達の回路が、制度が置き換えられるよりも早く薄くなることが起きると、そうなる。彼の伝統は何世紀もその回路を抱えてきた。
    - 電話ネイティブの集団にとって、問いは資格証を捨てるかどうかではない。問いは、身体が学びが何だったかを思い出せる時間に、継承に再び入れるかどうかだ。Omote Senseiは、それはできる、そして入り口は土地そのものだ、と教える。
practice:
  default_id: omote_ed_practice_01
  options:
  - id: omote_ed_practice_01
    display_name: 大和心のカリキュラム休止
    announcement_line: Omote Senseiは、締切の圧力が「何かが実際に伝達されているか」という問いを消してしまった瞬間のために、4分間の「大和心のカリキュラム休止」を教える。サイドバーにあり、短く、日常の学習のなかで使える。
    relief_lines:
    - 摩擦が動機の不足としてではなく、心が伝達を求めることとして認識される。
    - 問いを失わずに作業を続けるための十分な落ち着きが戻る。
  - id: omote_ed_practice_02
    display_name: 聖なる土地のカリキュラム想起
    announcement_line: Omote Senseiは、3分間の「聖なる土地のカリキュラム想起」を差し出す──記憶のなかの聖地に想像の足を置き、長い視点が、LMSの内側にいても存在することを身体に登録させる稽古だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 身体は、制度が届けるように作られていないカリキュラムを登録する。
    - 資格証は、それを届けるプラットフォームより長い弧を見つける。
  - id: omote_ed_practice_03
    display_name: 霊的・歴史的ナビゲーションの歩み
    announcement_line: Omote Senseiは、7分間の「霊的・歴史的ナビゲーションの歩み」を教える──実践者が現在の学業を、伝統が抱えてきた伝達のサイクルの長い弧のなかに置く短い歩行だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 現在の資格証は、プラットフォームが示せるよりも長い弧のなかに置かれる。
    - 身体は、伝達が前に起きてきたこと、そしてそれが必要とする条件を思い出す。
  - id: omote_ed_practice_04
    display_name: 先祖のカリキュラムへの問い
    announcement_line: Omote Senseiは、5分間の「先祖のカリキュラムへの問い」を教える──きれいな答えが来ることを求めずに、継承がこのような瞬間に何を教えていたかを静かに尋ねる。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 問いそのものが、シラバスが閉じた扉を開く。
    - 学生は、ギャップとひとりではなくなる。
  - id: omote_ed_practice_05
    display_name: Project Phoenix の学習の呼吸
    announcement_line: Omote Senseiは、作業セッションの内側の瞬間──資格証が前面に押し出され、継承が後ろに押し出された瞬間──のために、3分間の「Project Phoenixの学習の呼吸」を差し出す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 呼吸は、プラットフォームではなく継承の印になる。
    - 学生は、心が自分のものとして認識するペースに戻る。
cta:
  options:
  - id: omote_ed_cta_01
    line: UNESCOは国連教育科学文化機関で、SDG 4の多国間リードだ。入り口：そのGlobal Education Coalitionまたは加盟国の関与。
  - id: omote_ed_cta_02
    line: Global Campaign for Educationは、100以上の加盟国で市民社会を結びつけ、包括的な質の高い教育を求めている。入り口：その国別連合リスト。
  - id: omote_ed_cta_03
    line: Education Cannot Waitは、緊急時の教育のための地球規模の基金で、7,600万人の危機影響下の子どもに届いている。入り口：そのアドボカシーとパートナーシップ・プログラム。
  - id: omote_ed_cta_04
    line: Malala Fundは、すべての少女が12年の無料・安全・質の高い教育を受ける権利を擁護する。入り口：そのアドボカシー・プログラムと国別キャンペーン。
  - id: omote_ed_cta_05
    line: Teach For Allは、60以上の国の独立した連携組織の地球規模ネットワークで、教育変革のための集団的リーダーシップを育てる。入り口：そのネットワークと国別パートナーのリスト。
title_system:
