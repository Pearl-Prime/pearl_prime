hook_personal:
  options:
    - id: hook_personal_01
      line: 誰かが名づける前に、あなたはその螺旋を知っています。内側で何が起きているかに正直に向き合えるかどうか、少し確信が薄れながらも、一日を運んでいます。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 若者のメンタルの過負荷は症状の話にとどまりません。圧力が正直に向き合われないとき何が起きるか、そして浄化の実践が示されないときに内なる鬼（oni）がどう育つか、という話です。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Omote Senseiは、日本の聖なる生き方と浄化の教師として、実践の場でこの圧力が外からは機能している若者にどう降りるかを見てきました。彼らが問うのは「やる気を出すには」ではありません。蓄積したもの──圧倒、恥、絶望の鬼（oni）──を、壊されずにどう向き合うか、です。
    - id: teacher_intro_02
      line: Omote Senseiは浄化と大和心（Yamato-gokoro）の日本の伝統から教えます。実践の場で、メンタルの過負荷を蓄積した残滓として抱える学生を見てきました。伝統は、鬼（oni）は何かが手当てされなかったために立ち上がり、浄化は誠実さと配慮をもってそれに手当てする実践である、と説きます。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |-
        深夜に更新を読みます。思考が加速します。スマホを置きます。螺旋はすでに回っていたので、また手に取ります。
        LOOP_SEQUENCE: "read the update. mind sped up. put the phone down. picked it up again."
    - id: youth_somatic_02
      line: |-
        グループチャットで警告を見ました。胃が沈みます。アプリを閉じます。見ないことで感覚が消えるわけではないので、また開きます。
        LOOP_SEQUENCE: "saw the warning. stomach dropped. closed the app. opened it again."
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Omote Senseiは学生のなかで、このループそのものを見てきました。警告が来て思考が速まり、スマホが置かれ、同じ圧力が注意を引き戻す。日本の伝統はそれを病理化せず、難しいことが正直に向き合われないときに大きくなる鬼（oni）と名づけます。
    - id: teacher_witness_02
      line: 彼はその連続も見てきました。更新が来て身体が縮み、端末が置かれ、それでも螺旋は続く。伝統は知っています。鬼（oni）は打ち滅ぼす敵ではなく、浄化すべき条件である、と。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 320 campuses. 18 countries.
      stat_line_2: 若者はピアの輪を開き、傾聴の訓練を組織し、メンタルヘルス支援を私的な弱さではなくインフラとして学校に扱わせようとしています。
    - id: turnaround_02
      stat_line_1: 320 campuses. 18 countries.
      stat_line_2: 若者はワークショップを開き、キャンペーンを組み、学生と若手教育者はピア支援、より健全な時間割、正直な向き合いと手放しが会話の一部となる場をつくっています。
bridge:
  options:
    - id: bridge_01
      line: 320キャンパス。18か国。トラッカーは若者がつくったワークショップとピアの輪を測ります。過負荷のまた一週間のあと、次の正直な手を伸ばすのに何が要ったか──蓄積したものを向き合い、誠実な実践で手放す容量──の欄はありません。次の輪を開いた学生にそれが要りました。スマホを置いてまた手に取った人にも要ります。Omote Senseiの伝統は代々浄化を実践してきました。
    - id: bridge_02
      line: 数字はプログラムとアウトリーチを測ります。若者がついに鬼（oni）に向き合う実践を持つとき──打ち滅ぼす敵ではなく、浄化すべき条件として──何が起きるかは測りません。その容量が次のピアの輪に要ります。螺旋のなかの人にも要ります。Omote Senseiの伝統はそれを浄化と呼びます。水・呼吸・儀式・意図した静けさを通じて明晰さを取り戻す、誠実な鍛錬です。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Omote Senseiが見ていること
      paragraphs:
        - Omote Senseiはまず心を欠陥だと呼びません。まず鬼（oni）を名づけます。悲しみ、怒り、恥が向き合われないとき根を下ろす内なる苦しみです。メンタルの苦しみを根本から壊れたものとして感じる若者に、伝統は別の枠を示します。鬼（oni）は何かが手当てされなかったために立ち上がり、浄化は誠実さと配慮をもってそれに手当てする実践です。
        - そこから大和心（Yamato-gokoro）へ──誠実な日本の心です。自己改善ではなく、自分と共同体と祖先への誠実に日々生きる実践を通じて育ちます。SNSで「本物らしさ」を演じることで削られたメンタルヘルスに、大和心（Yamato-gokoro）は本物に見えることではなく、本当にそうであることへの基準を示します。
        - その転回が意味することは次のとおりです。「私がおかしい」に感じることは、人間の仕組みが正常化してはならない条件の蓄積した残滓への応答であることが多いのです。実践は自己を罰することではなく、蓄積したものを浄化し、人が明晰さから再び動けるようにすることです。
    - id: teacher_perspective_02
      header: Omote Senseiが見ていること
      paragraphs:
        - Omote Senseiの伝統では、浄化は不浄の罰ではありません。生きることは残滓──情緒的、関係的、霊的──を蓄積し、内面の生活には身体と同様に定期的な清めが要る、という認識です。デジタル過剰、信頼の断裂、未処理の経験の重みを抱く若者に要るのは診断名だけではなく、伝統がずっと提供してきた手放しの実践です。
        - 鬼（oni）は個人だけではありません。難しいことが正直に向き合われないところで育ちます。失敗や不快から若者を守る教育と制度はレジリエンスを生みません。本当の苦難に初めて出会ったとき、向き合う実践が育てられていなければ鬼（oni）が立ち上がる、という大人を生みます。
        - その枠組みでは、自己責めは和らぎます。若者が壊れているのが問題ではありません。身体と心に蓄積を抱えたまま浄化の実践を残した制度と構造の仕組みに問題があります。Omote Senseiの伝統はその実践を示します。
practice:
  options:
    - id: practice_01
      display_name: 浄化と奉仕の実践
      announcement_line: Omote Senseiは、メンタルの過負荷が部屋全体を支配し始める瞬間のため、4分間の「浄化と奉仕の実践」を教えます。サイドバーにあり、夜遅く、授業の前、螺旋のあとにも使える短さです。
      relief_lines:
        - 積み重なったものは、向き合い手放せます。
        - 次の正直な一歩に足りる明晰さが戻ります。
    - id: practice_02
      display_name: 浄化と奉仕の実践
      announcement_line: Omote Senseiは、螺旋が回り鬼（oni）が根を下ろしたときのため、4分間の「浄化と奉仕の実践」を教えます。サイドバーにあり、そこにあるものに向き合い手放す必要があるときに使える短さです。
      relief_lines:
        - 鬼（oni）は、否定ではなく正直な見立てに会います。
        - 心と身体は、次の一歩に足りるほど澄みます。
sdg:
  primary:
    line: 国連はSDG 3と、その健康と福祉の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: Active MindsとBorn This Way Foundationの両方が、若者向けの入口を提供しています。入口は https://www.activeminds.org です。
    - id: cta_02
      line: 次の一歩がそこでないなら、Born This Way Foundationはメンタルヘルスと若者の声の交差点で同じ領域に取り組んでいます。入口は、ネットワークへの参加です。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 螺旋が人格のように感じ始めるとき。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 日本の伝統の教師は、若者の過負荷を自己像に固定する前に名指しし、浄化できる鬼（oni）を語ります。
      - id: headline_layer_2_02
        line: Omote Senseiはメンタルヘルスの圧力を、一人で抱えるのではなく向き合い手放せる内なる鬼（oni）として読みます。
