hook_personal:
  options:
  - id: omote_mh_hook_personal_01
    line: あなたは、誰かが名づける前からその螺旋を知っている。継承された道具──療法、呼吸アプリ、スクリーニングの質問──は、身体が抱えているものをどこに置けばいいかを実際には与えずに、あなたに語りかけてきただけだということも、あなたは知っている。
  - id: omote_mh_hook_personal_02
    line: 午前1時、あなたはスマホを置いた。呼吸は長くならなかった。また手に取った。1時の身体に対して持っている唯一の継承が端末そのものだから──そして、その負荷を届けたのも端末だ。
  - id: omote_mh_hook_personal_03
    line: 朝の見出しから胸はずっと締まっている。呼吸アプリもやった。スクリーニングもやった。胸はまだ締まっている──負荷が抱えられている層が、近代の道具が届くように作られた層ではないから。
  - id: omote_mh_hook_personal_04
    line: 休んでも触れられない疲労がある。眠りは来るのに疲れは残る──あなたが抱えているものは個人的なものだけではなく、集合的な重みを身体に置く方法を教えていた継承が、ほとんど消えるまで薄くなったから。
  - id: omote_mh_hook_personal_05
    line: あなたの一部は、問いが「自分をどう直すか」ではないと知っている。問いは、もう一度継承のなかにいるにはどうすればよいか──現在の負荷を、ニュースサイクルよりも長い弧のなかに置く長い視点を、ということだ。
hook_big_picture:
  options:
  - id: omote_mh_hook_big_01
    line: 若者の精神的過負荷は症状の話だけではない。注意・休息・人間でい続ける力に、絶え間ない圧力が何をするかという話だ──その各々を抱えていた継承を薄くしてしまった文化の内側で。
  - id: omote_mh_hook_big_02
    line: ひとつの世代が、儀式の容器なしに集合的な悲しみを運び、世代間の足場なしに集合的な証言を運び、聖なる土地がかつて与えていた長い視点なしに集合的な恐怖を運ぶよう求められている。負荷は個人の失敗ではない──構造だ。
  - id: omote_mh_hook_big_03
    line: 端末は今や、世界の苦しみを届ける主要な媒体であり、若者が到着するものをどこに置けるかの主要な場所でもある。その二重の役割が過負荷の構造であり──それは、どの継承も果たすように設計されたものではない。
  - id: omote_mh_hook_big_04
    line: 日本の伝統における聖なる土地は、何世紀にもわたって身体ひとりでは抱えられないものを抱えてきた。現在の問いは、媒体がもともとは果たすように作られていなかった仕事を継承に果たさせるために、電話ネイティブの世代が間に合う時間にその土地に再び入れるか、ということだ。
  - id: omote_mh_hook_big_05
    line: 世代的な精神的危機として読まれているものは、ある程度、継承のギャップの可視の縁だ──長い視点・儀式・系譜を失った文化が、集合的な重みを私的な症状に潰さないように抱えていたものを失ったことの。
teacher_intro:
  options:
  - id: omote_mh_intro_01
    line: Omote Senseiは、日本の霊的・歴史的ナビゲーションと大和心（Yamato-gokoro）の覚醒の教師であり、京都と大和地域で何十年も若い巡礼者を導いてきた。立つ場所としての継承を与えられないまま見ることを求められた世代に、過負荷が何をするかを見てきた。
  - id: omote_mh_intro_02
    line: Omote SenseiはProject Phoenixで教える。京都を拠点とする巡礼と覚醒の旅の系譜だ。臨床的な意味でのメンタルヘルスの教師としては自らを位置づけない──彼は、伝統が当たり前のものとして抱える長い視点を保持してきた聖なる土地を読み解く案内人だ。
  - id: omote_mh_intro_03
    line: Omote Senseiは、精神的な負荷は身体に抱えられ、身体は継承に抱えられるという原理から働く。継承が薄くなると、身体は本来ひとりで運ぶように作られていないものを、ひとりで運ぶよう求められる。彼の仕事は、身体と継承の回路を回復することだ。
  - id: omote_mh_intro_04
    line: Omote Senseiは、継承された容器が彼らのために抱えていなかった負荷ですでにすり減って到着する若い巡礼者を見てきた。彼の伝統では、大和心（Yamato-gokoro）──誠実な心──は「ない」のではなく「眠っている」。仕事は、それを何世紀にもわたって抱えてきた土地のなかで目覚めさせることだ。
  - id: omote_mh_intro_05
    line: Omote Senseiは二言語の案内人で──日本の伝統と、それを今受け継ごうとしている地球規模の世代の両方に語る。彼の教えは、近代の道具は症状のために設計されたのであって、症状を不可避にする継承のギャップのためではない、ということだ。
youth_somatic:
  options:
  - id: omote_mh_somatic_01
    line: 午前0時を過ぎて更新を読んだ。顎が固まった。スマホを伏せた。身体には負荷を置く他の場所がなかったので、また裏返した。
  - id: omote_mh_somatic_02
    line: アラームの前に目が覚めた。胸はすでに締まっていた。意識より先に恐れが来ていて、最初の1時間の唯一の儀式が端末だったので、灯りより先にスマホに手を伸ばした。
  - id: omote_mh_somatic_03
    line: 友人のメッセージから見出しが届いて、授業の途中で呼吸が短くなった。読んだ。平坦な絵文字で返した。呼吸は長くならなかった──その瞬間に対して日が差し出した唯一の継承は、動き続けろということだったから。
  - id: omote_mh_somatic_04
    line: 1分で3つの危機をスクロールして通り過ぎた。そのたびに胃が縮んだ。縮みに名前をつけなかった──60秒で複合的な集合的悲しみに対してどうするかの継承が、前に手渡されてこなかったから。
  - id: omote_mh_somatic_05
    line: 横になっても肩が緩まなかった。逃げるためにスマホを開いたら、同じ負荷が待っていた。身体は長い視点を探したが、媒体は次の投稿だけを差し出した。
teacher_witness:
  options:
  - id: omote_mh_witness_01
    line: Omote Senseiは、継承された容器が捉え損ねた負荷ですり減って京都の聖地に着く若い巡礼者のなかで、まさにそのループを見てきた。彼の伝統では、負荷は病理ではない──それを置く儀式のないままに、大和心（Yamato-gokoro）が道徳的な重みを記録しているのだ。
  - id: omote_mh_witness_02
    line: 彼は、若者が寺の道を黙って歩き、土地のなかに座って、初めて、抱えてきた負荷に名前と系譜があると感じるのを見てきた。最初の認識は安堵ではない──置き場ができたという認識だ。
  - id: omote_mh_witness_03
    line: 彼は、聖地での最初の1時間を端末のない状態に耐えることに費やす集団を導いてきた。その離脱が稽古だ──そしてあとから浮き上がってくるものが、媒体が処理を阻んでいたものだ。
  - id: omote_mh_witness_04
    line: 彼は、若者が初めて「先祖はこのような負荷をどうしていたのか」と問う瞬間を見てきた。彼の伝統では、問いが扉だ──ついに直接問う者には、継承が開く。
  - id: omote_mh_witness_05
    line: 彼は、若い巡礼者が負荷を解こうとするのをやめて、土地に抱えさせ始める変化を見てきた。彼の伝統では、その変化は屈服ではない──ひとりで運ぶように作られていなかったことを身体が思い出すことだ。
turnaround:
  options:
  - id: omote_mh_turnaround_01
    stat_line_1: 320の大学キャンパス。18カ国。
    stat_line_2: 若い組織者は、ピアサークルを開き、聞き役を訓練し、メンタルヘルス支援を私的な弱さではなくインフラとして扱うよう学校に求めている。
  - id: omote_mh_turnaround_02
    stat_line_1: 488の大学。JED Campus。
    stat_line_2: JED Foundationのプログラムは、現在ほぼ500の米国キャンパスで包括的なメンタルヘルスの枠組みを運営し、ピアサポートと教員研修を危機の事後対応ではなく日々のインフラに組み込んでいる。
  - id: omote_mh_turnaround_03
    stat_line_1: 5,600の声。7カ国。
    stat_line_2: UNICEFの若者メンタルヘルス地球規模連合は、14歳から25歳の5,600人の若者を7カ国で集め、機関が把握する前に当事者自身に負荷を名づけてもらった。
  - id: omote_mh_turnaround_04
    stat_line_1: 1,400万件の接触。988ライフライン。
    stat_line_2: 2022年の988自殺・危機ライフライン開始以来、1,400万件を超える接触が経由されてきた──3年前には存在しなかった資源の蓄えだ。
  - id: omote_mh_turnaround_05
    stat_line_1: 53加盟国。WHOヨーロッパ。
    stat_line_2: 2025年10月に採択されたWHOヨーロッパ子ども・思春期保健戦略2026-2030は、53の加盟国に対して2030年期限に向けて思春期のメンタル負荷を報告するよう義務づけている。
bridge:
  options:
  - id: omote_mh_bridge_01
    line: 320の大学キャンパス。18カ国。トラッカーは、若者が構築したワークショップとピアサークルを測る。継承のギャップ──長い視点、儀式、系譜──近代の道具が彼らのために運んでこなかったもの──は測らない。Omote
      Senseiの伝統は、その長い視点を当たり前のものとして抱えている。
    hidden_capacity: 道具が伝えない長い視点のなかに立つ
  - id: omote_mh_bridge_02
    line: 数字は、若者が築いた足場を示す。各組織者が午前1時に私的に抱えているもの──置き場のないまま身体が吸収した、すべてのアラート、すべての会話、すべての映像の残り──は示さない。
    hidden_capacity: 各組織者が私的に抱えているものに働く
  - id: omote_mh_bridge_03
    line: 政策枠組みは参加を追う。道徳的疲労は追わない──儀式の容器なしに何年も証言するよう求められたときに積み重なる種類のものだ。Omote Senseiの伝統は、そのような容器を何世紀にもわたって抱えてきた。
    hidden_capacity: 道具が運ばない儀式の容器を再建する
  - id: omote_mh_bridge_04
    line: データは、セッション・接触・政策採用を捉える。若い巡礼者が聖なる土地のなかに座って、抱えてきたものに系譜があると初めて感じる瞬間は捉えられない。Omote
      Senseiの枠組みでは、その瞬間こそ、どのトラッカーも報告しない安堵だ。
    hidden_capacity: トラッカーが示せないものを登録する
  - id: omote_mh_bridge_05
    line: インフラは測れる。各組織者が負荷を抜けるのを導く大和心（Yamato-gokoro）は測れない。Omote Senseiの伝統はインフラの仕事を置き換えない──その下の層を名づけ、何世代もその層を覚醒した記憶のなかで抱えてきた土地を差し出すのだ。
    hidden_capacity: 計測の下の層を名づける
teacher_perspective:
  options:
  - id: omote_mh_perspective_01
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiは、若者に「過負荷が個人の間違いであるかのように落ち着け」とは言わない。彼の伝統では、彼らが描写する縮こまりは、大和心（Yamato-gokoro）が道徳的な重みを記録していることだ──誠実な心が、本来する仕事をしている。問題は記録ではない。問題は、継承された道具が、抱えているもののなかに立つ場所を身体に与えていないことだ。
    - そこから彼は聖なる土地に向かう。奈良の寺、京都の社、大和地域の長い視点を抱える場所は、何世紀にもわたって集合的な重みの記憶を抱えてきた。若い巡礼者がそれらの場所のひとつに座ると、仕事は比喩ではない──土地が抱える仕事の一部をしていて、身体はその認識を、心が言語化するより先に認識する。
    - これが重要なのは、私的な失敗に感じられることが、彼の枠組みでは、継承のギャップへの正確な応答だからだ。リフレームは負荷を取り除かない──こうした負荷を抱えてきた伝統のなかに置く。
  - id: omote_mh_perspective_02
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiの伝統では、大和心（Yamato-gokoro）は眠っている継承だ──伝達してきた回路（聖なる土地、儀式、世代を越える巡礼）が近代生活によって薄められてきたために、前に手渡されていない誠実な心。若者は能力をそのまま持って到着し、それを目覚めさせる儀式がない。
    - 彼の巡礼の仕事はその儀式だ。京都の街路を歩き、奈良の寺の門に座り、大和そのものの長い視点のなかに立つ──これらは観光ではない。活性化だ。土地が教師であり、彼は二言語の案内人だ。
    - 容器なしに精神的な負荷を運んでいる世代にとって、これは別の指示の山ではない。先に来たものとの別の接触の様式だ。安堵は、負荷が消えることではない──負荷についに抱えられる場所ができることだ。
  - id: omote_mh_perspective_03
    header: Omote Senseiが見ていること
    paragraphs:
    - 霊的・歴史的ナビゲーションは、Omote Senseiが教えるものの呼び名だ。彼の伝統では、歴史は閉じた書庫ではない──生きた場であり、大和地域が抱えてきた集合的な重みと回復のサイクルは今も土地のなかで活動している。道を歩くことは、その場に入ることだ。
    - 彼は、その場が負荷の痛みを取り除くとは約束しない。系譜を与えると約束する──現在の重みを、設計上、近代のニュースサイクルが運べないより大きな弧のなかに置く長い視点を。
    - 彼の枠組みでは、その弧を端末のなかに見つけられないことは個人の失敗ではない。媒体の構造的な限界だ。身体は別のスケールの容器を求めてきた──そして土地は、それを抱え続けてきた数少ないもののひとつだ。
  - id: omote_mh_perspective_04
    header: Omote Senseiが見ていること
    paragraphs:
    - Project Phoenixは、Omote Senseiが自らの巡礼の仕事に与えた名だ──継承された道具が抱えられない負荷を抱えて到着する者のなかで、大和心（Yamato-gokoro）を意図的に活性化する仕事。名は比喩ではない。伝統は、条件が整えられたとき継承そのものが再び立ち上がる、と説く。
    - 午前1時が端末と日々の見出しになっている若者にとって、その条件は抽象ではない。歩くこと、沈黙、端末がないこと、継承と、それを薄めてきた近代性の両方に二言語で語れる案内人がいること。
    - リフレームが重要なのは、近代の読みでは精神的過負荷は私的な失敗だからだ。Omote Senseiの枠組みでは、それは継承を前に手渡してこなかった文化だ。私的から継承されたものへの移行が、巡礼の稽古で最初に着地する部分のことが多い。
  - id: omote_mh_perspective_05
    header: Omote Senseiが見ていること
    paragraphs:
    - Omote Senseiが戻ってくる原理は、精神的過負荷は私的な誤作動ではなく、かつてそれを抱えていた足場なしに動いている証人の機能だということだ。身体は壊れていない。その周りの構造が薄くなったのだ。
    - 聖なる土地が再び絵に入ると、証人の機能は個人より大きなものに抱えられる。彼の伝統では、それは比喩ではない──土地は何世紀もこの仕事をしてきて、心がそれに言葉を与える前に、身体が抱えられていることを認識する。
    - 電話ネイティブの集団にとって問いは、媒体を捨てるかどうかではない。問いは、身体がひとりで運ぶようには作られていなかったことを思い出せる時間に、継承に再び入れるかどうかだ。Omote
      Senseiは、それはできる、そして入り口は土地そのものだ、と教える。
practice:
  default_id: omote_mh_practice_01
  options:
  - id: omote_mh_practice_01
    display_name: 大和心の落ち着き
    announcement_line: Omote Senseiは、身体が置く前に負荷が積み上がってしまった瞬間のために、4分間の「大和心の落ち着き」の稽古を教える。サイドバーにあり、短く、日常のなかで使える。
    relief_lines:
    - 縮こまりが弱さとしてではなく、心が本来する仕事として認識される。
    - 次の誠実な動きのために十分な落ち着きが戻る。
  - id: omote_mh_practice_02
    display_name: 聖なる土地の想起
    announcement_line: Omote Senseiは、3分間の「聖なる土地の想起」を差し出す──記憶のなかの聖地に想像の足を置き、長い視点が、午前1時に端末だけが手元にあるときでも存在することを身体に登録させる稽古だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 身体は、媒体が運ぶように作られていない長い視点を登録する。
    - 負荷は、それを届ける道具より古い容器を見つける。
  - id: omote_mh_practice_03
    display_name: 霊的・歴史的ナビゲーションの間
    announcement_line: Omote Senseiは、7分間の「霊的・歴史的ナビゲーションの間」を教える──現在の負荷を、伝統が前に抱えてきたサイクルの長い弧のなかに置く稽古だ。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 現在の重みは、ニュースサイクルが示せるよりも長い弧のなかに置かれる。
    - 身体は、重みのサイクルのあとに回復のサイクルが来てきたことを思い出す。
  - id: omote_mh_practice_04
    display_name: 先祖の系譜への問い
    announcement_line: Omote Senseiは、5分間の「先祖の系譜への問い」を教える──きれいな答えが来ることを求めずに、継承がこのような瞬間に何を抱えていたかを静かに尋ねる。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 問いそのものが、媒体が閉じた扉を開く。
    - 証人は、負荷とひとりではなくなる。
  - id: omote_mh_practice_05
    display_name: Project Phoenix の休息の呼吸
    announcement_line: Omote Senseiは、確認と確認のあいだの瞬間──身体が置く許可なしに負荷を運んできた瞬間──のために、3分間の「Project Phoenixの休息の呼吸」を差し出す。サイドバーにあり、時間と手順がある。
    relief_lines:
    - 呼吸は、媒体ではなく継承の印になる。
    - 身体は、心が自分のものとして認識するペースに戻る。
cta:
  options:
  - id: omote_mh_cta_01
    line: 危機にある人がいるなら、Crisis Text Lineは24時間無料の支援を提供する。741741にHOMEとテキストする。入り口：そのネットワーク。
  - id: omote_mh_cta_02
    line: 危機にある人がいるなら、988自殺・危機ライフラインは米国で24時間無料の支援を提供する。988に電話またはテキストする。入り口：2022年以来1,400万件以上の接触を処理してきたネットワーク。
  - id: omote_mh_cta_03
    line: あなたがLGBTQ+で25歳未満で危機にあるなら、The Trevor Projectはテキスト・チャット・電話で24時間無料の支援を提供する。678-678にSTARTとテキストする。入り口：特定の集団のために作られたネットワーク。
  - id: omote_mh_cta_04
    line: メンタルヘルスに関する情報、紹介、ピアサポートに、NAMI HelpLineは月曜から金曜まで利用できる。1-800-950-NAMI（6264）に電話するか、62640に「HelpLine」とテキストする。入り口：全米精神疾患同盟のネットワークに繋がる。
  - id: omote_mh_cta_05
    line: Active Mindsは、650以上の米国キャンパスでピア主導のメンタルヘルスのコミュニティを運営している。あなたのいる場所にキャンパス支部があれば、低摩擦の入り口だ。
title_system:
  headline_layer_2:
    options:
    - id: omote_mh_headline_01
      line: 京都を拠点にする日本の霊的・歴史的ナビゲーションの教師が、精神的過負荷を、近代の道具がまだ作っていない容器を求める大和心（Yamato-gokoro）として読む。
    - id: omote_mh_headline_02
      line: 症状だけでなく聖なる土地を──Omote Senseiは、若者の負荷の背後にある継承のギャップについて語る。
    - id: omote_mh_headline_03
      line: 霊的・歴史的ナビゲーションが電話ネイティブの集団に出会う──Project Phoenixと、身体が求めてきた長い視点。
    - id: omote_mh_headline_04
      line: 大和心（Yamato-gokoro）、誠実な心──Omote Senseiの巡礼が目覚めさせるものは、スクリーニング・ツールが届かない。
    - id: omote_mh_headline_05
      line: 歩くこと、沈黙、抱える土地──日本の教師が、ひとつの世代の精神的負荷の背後にある継承のギャップについて語る。
