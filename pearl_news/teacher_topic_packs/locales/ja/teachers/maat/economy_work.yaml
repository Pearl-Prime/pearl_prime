hook_personal:
  options:
  - id: hook_personal_01
    line: 仕事は柔軟性をますます求め、安定はますます与えず、その代償をスケジュールが認める前に身体は知っている。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 経済ストレスはいま、アイデンティティの圧として来る。雇われ続けること、いつでも応答すること、不安定を性格の試しのように演じ続けること。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 南インドのスーフィー教師Maat（タミル・ナードゥのダルガー伝統、ラビア・アル＝アダウィーヤの炎とタミル・シッダ詩人たちの「心は真理の器官」という理解を受け継ぐ）は、実践の場でこの圧が若者にどう降りるかを見てきた。何が起きているかだけでなく、機関が繰り返し過小評価する真実を、qalb（霊的な心）がすでに知っているとき、自分の知覚をどう信じるかを問うている。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'シフトアプリを確認する。胃が落ちる。また更新する。見たことを信じられる前にシフトが消えるかもしれないからスクショする。

      LOOP_SEQUENCE: "アプリを確認した。胃が落ちた。また更新した。スクショした。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Maatはこのループそのものを見てきた。アプリ確認、身体の落下、更新、瞬間を止めようとするスクショ。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 若い労働者が条件を記録し、賃金窃盗の訴えを起こし、不安定な労働ルールを公的記録に引きずり出すキャンペーンを組織している。
bridge:
  options:
  - id: bridge_01
    line: '1,240 cases. 32 cities. トラッカーは若者が何をしたかを測る。もう一つのキャンセルシフトのあと、次の一歩を可能にしたもの──経済が不確実性を私的な恥に変え続けるなかでも、再び行動できるだけ機能し続ける容量──の欄はない。戻ってきた人に要った。同じループの読者にも要る。Maatの伝統はこれを正確に語る：渇望は傷ではない。欠けているものをすでに知っている証だ。Beloved Letterの実践は、いちばん愛するものに手紙を書く──何かを求めず、意識的なishq（渇望）だけを表す。渇望が意識的になると、心は不安定を無価値と取り違えるのをやめる。'
    hidden_capacity: 真実ある行動へ戻る
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Maatが見ていること
    paragraphs:
    - Maatはまず真実から始める。最初の歪みは、構造的な乱れを私的欠陥として扱わされるときに起きる。
    - 正しい関係とは、機関の都合に縮めずに、実際に起きていることを名指すことだ。その名指しは芝居ではなく、現実との整列である。
    - 「自分が壊れている、間違っている」と感じることは、害・遅延・乱れを誤名しつつ信頼を求め続けるシステムへの、しばしば正確な応答である。
practice:
  options:
  - id: practice_01
    display_name: Beloved Letter（愛する者への手紙）
    announcement_line: 'MaatはBeloved Letterの実践を教える──ラビアの祈りの詩に根ざす。いちばん愛するものに手紙を書く。何かを求めない──渇望だけを表す。Maatは言う、渇望は傷ではない。欠けているものをすでに知っている証だ。サイドバーに時間どおり実用的に載せている。'
    relief_lines:
    - 心は、すでに知っていることと取引するのをやめる。
    - 十分な安定が戻り、はっきり見ることを謝らずに現実を名指せる。
sdg:
  primary:
    line: 国連はSDG 8とその働きがいのある雇用の目標を通じて、この問いの枠組みを示している。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'ILOと若者労働者連帯がここへの公的入口になる。入口: https://www.ilo.org/global/topics/youth-employment'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若い労働者は、賃金の数字以上の不安定を背負っている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 南インドのスーフィー教師が、不安定の下で機能し続ける隠れた闘いを名指し、尊厳への渇望は弱さではなく、値するものを知っている証だと語る。
