hook_personal:
  options:
  - id: hook_personal_01
    line: 誰かが名指す前に螺旋を知っている。内側の容量が薄まり続けるなか、一日を運ぶのにどれだけの労がいるかも知っている。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 若者のメンタルヘルスの負担は臨床トレンドだけではない。機関が過負荷を正常化し、若者がそれを私的欠陥として扱い始めるまでの仕方でもある。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 南インドのスーフィー教師Maat（タミル・ナードゥのダルガー伝統、ラビア・アル＝アダウィーヤの炎とタミル・シッダ詩人たちの「心は真理の器官」という理解を受け継ぐ）は、実践の場でこの圧が若者にどう降りるかを見てきた。何が起きているかだけでなく、機関が繰り返し過小評価する真実を、qalb（霊的な心）がすでに知っているとき、自分の知覚をどう信じるかを問うている。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '真夜中にレポートを読む。身体が締まる。スマホを置く。また拾う。圧はすでに部屋にあるから。

      LOOP_SEQUENCE: "レポートを読んだ。身体が締まった。スマホを置いた。また拾った。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Maatはこのループそのものを見てきた。レポート、身体の締まり、スマホを置く、圧がまだそこにあるからの戻り。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 学生がピアの輪、ワークショップ、キャンペーンをつくり、メンタルヘルスを私的弱さではなく共有インフラとして扱っている。
bridge:
  options:
  - id: bridge_01
    line: '320 campuses. 18 countries. トラッカーは若者が何をしたかを測る。もう一週の過負荷のあと、次の一歩を可能にしたもの──助けを求め、圧を自己像に変えずに戻る容量──の欄はない。戻ってきた人に要った。同じループの読者にも要る。Maatの伝統はこれを正確に語る：qalb（霊的な心）はghaflah（無自覚）で曇る。あらゆる気晴らし、機関の嘘、「大丈夫」を演じる瞬間が曇りの層だ。考えで切り抜けるのではない。鏡を磨き、心がすでに知っているものを映すまで。'
    hidden_capacity: 真実ある行動へ戻る
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Maatが見ていること
    paragraphs:
    - Maatはまず真実から始める。最初の歪みは、構造的な乱れを私的欠陥として扱わされるときに起きる。
    - 正しい関係とは、機関の都合に縮めずに、実際に起きていることを名指すことだ。その名指しは芝居ではなく、現実との整列である。
    - 「自分が壊れている、間違っている」と感じることは、害・遅延・乱れを誤名しつつ信頼を求め続けるシステムへの、しばしば正確な応答である。
practice:
  options:
  - id: practice_01
    display_name: 5分間の鏡磨き
    announcement_line: Maatは5分間の鏡磨きを教える。寝る前に、その日本当に在った瞬間を一つ特定し、演技ではなく完全にそこにいた60秒を保つ。過負荷が心を曇らせ始める瞬間のため。サイドバーに時間どおり実用的に載せている。
    relief_lines:
    - 心は、すでに知っていることと取引するのをやめる。
    - 十分な安定が戻り、はっきり見ることを謝らずに現実を名指せる。
sdg:
  primary:
    line: 国連はSDG 3とそのメンタルヘルスの目標を通じて、この問いの枠組みを示している。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Born This Way Foundationが若者向けの支援とメンタルヘルス周りの組織化の入口になる。入口: https://bornthisway.foundation'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若者のメンタル過負荷は増え続けている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 南インドのスーフィー教師が、圧が自己像に固まる前に名指し、心は心が落ち着かせられないものをすでに知っていると教える。
