hook_personal:
  options:
  - id: hook_personal_01
    line: 見ないことは不誠実に感じるから読み続ける。繰り返される暴力が身体と信頼に何をしているかも知っている。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 紛争の圧力はもはや地政学だけではない。道徳的傷害として、保護に繰り返し失敗する機関への信頼の崩壊としても来る。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 南インドのスーフィー教師Maat（タミル・ナードゥのダルガー伝統に根ざす）は、実践の場で紛争の圧が若者に何をするかを見てきた。何が起きているかだけでなく、機関が繰り返し過小評価する真実を、qalb（霊的な心）がすでに知っているとき、自分の知覚をどう信じるかを問うている。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '最新の報告を読む。胸が締まる。目をそらす。また戻る。良心はまだそこにあるから。

      LOOP_SEQUENCE: "報告を読んだ。胸が締まった。目をそらした。戻った。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Maatはこのループそのものを見てきた。報告、身体の締まり、そらし、良心がまだ在るからの戻り。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 143 youth coalitions. 28 countries.
    stat_line_2: 若い平和構築者が害を記録し、連帯を組織し、機関が停滞しているあいだもワークショップを開いている。
bridge:
  options:
  - id: bridge_01
    line: '143 youth coalitions. 28 countries. トラッカーは若者が何をしたかを測る。もう一巡の暴力と機関の失敗のあと、次の一歩を可能にしたもの──無感動や怒りに身を任せず、再び人間として行動する容量──の欄はない。戻ってきた人に要った。同じループの読者にも要る。Maatの伝統はこれを正確に語る：sama（献身の聴き）──知性を迂回し、qalbに直接語りかける。暴力にまだ砕ける心は、まだ働いている心だ。鎧ではない。音が、悲嘆が閉じたものを開くのを許し、次の明晰な行為を可能にする。'
    hidden_capacity: 真実ある行動へ戻る
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Maatが見ていること
    paragraphs:
    - Maatはまず真実から始める。最初の歪みは、構造的な乱れを私的欠陥として扱わされるときに起きる。
    - 正しい関係とは、機関の都合に縮めずに、実際に起きていることを名指すことだ。その名指しは芝居ではなく、現実との整列である。
    - 「自分が壊れている、混乱している」と感じることは、害・遅延・乱れを誤名しつつ信頼を求め続けるシステムと制度構造への、正確な応答である。
practice:
  options:
  - id: practice_01
    display_name: 15分間のサマ聴取
    announcement_line: Maatは15分間のサマ聴取を教える。一首の献身音楽を、耳ではなく胸で聴く。身体のどこに音が落ちるか。何が開くか。何が抵抗するか。サマは音楽を楽しむことではない。知性を迂回し、qalbに直接語りかけるために音を使うことだ。サイドバーに時間どおり実用的に載せている。
    relief_lines:
    - 心は、すでに知っていることと取引するのをやめる。
    - 十分な安定が戻り、はっきり見ることを謝らずに現実を名指せる。
sdg:
  primary:
    line: 国連はSDG 16とその平和、正義、制度的信頼の目標を通じて、この問いの枠組みを示している。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: '国連と若者正義ネットワークがこの仕事への公的入口になる。入口: https://www.unwomen.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若者は紛争を道徳的傷害として背負っている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 南インドのスーフィー教師が、繰り返される暴力の下で人間であり続ける闘いを名指し、まだ砕ける心はまだ働いている心だと語る。
