hook_personal:
  options:
  - id: hook_personal_01
    line: 仕事は柔軟性をますます求め、安定をますます与えず、その代償をスケジュールが認める前に身体が知っています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 経済のストレスはいま、同一化の圧力として届きます——雇われ続け、いつでも応え、不安定さが性格の試しであるかのように振る舞うこと。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意識と恩寵のヴェーダ的教師）は、実践の場でこの圧力が若者にどう落ちるかを見てきました。気分を良くする方法だけを問うのではなく、圧力が自己の物語全体になるのをどう止めるかを問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      スケジュールアプリを確認します。胃が落ちます。また更新します。見たことを信じる前にシフトが消えるかもしれないからスクショします。LOOP_SEQUENCE: "checked the app. stomach dropped. refreshed again. took the screenshot."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa はこのループを正確に見てきました——アプリ確認、身体の落下、更新、瞬間を止めようとするスクショ。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 若い労働者は条件を記録し、賃金窃盗の訴えを起こし、不安定な労働ルールを公的記録に引きずり出すキャンペーンを組織しています。
bridge:
  options:
  - id: bridge_01
    line: 1,240 cases. 32 cities. トラッカーは若者がしたことを測ります。もう一つの遅れや途切れた応答のあと、経済が不確実性を私的ストレスに変え続けるなかで、再び機能して行動する次の一歩を可能にしたものの欄はありません。戻った人にも、そのループの読者にもそれが要りました。Sai Maa の教えにはその容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa が見ていること
    paragraphs:
    - Sai Maa はまず、意識をそのなかを通り過ぎる嵐から分けます。圧力は本物ですが、圧倒が同一化になる必要はありません。
    - 彼女の教えは若者に困難を否定せよとは言いません。恐れや過負荷が自己の唯一の語り手にならないほど、内なる清明を取り戻せと言います。
    - 「私が壊れている、間違っている」に感じることは、持続不可能な負荷を制度が正常化し続けることへの正確な反応であることが多いのです。
practice:
  options:
  - id: practice_01
    display_name: 5分間・圧倒リセット（Overwhelm Reset）
    announcement_line: Sai Maa は、労働・経済の圧力が注意を無力感に変え始める瞬間のため、5分間の Overwhelm Reset を教えています。サイドバーにあり、時間どおりで実用的です。
    relief_lines:
    - 螺旋が自己全体を定義する権威を少し失います。
    - 次の正直な決断に足る清明が戻ります。
sdg:
  primary:
    title: 働きがいも経済成長も
    line: 国連はSDG 8とその働きがいのある仕事に関する目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'ILO と青年労働権利団体が、ここへの公的入口を提供しています。入口: https://www.ilo.org/global/topics/youth-employment'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若い労働者は、賃金が示す以上の不安定さを抱えている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 教師が、不安定さの下で機能し続ける隠れた闘いを名指します。
