hook_personal:
  options:
  - id: hook_personal_01
    line: 螺旋は誰かが名指す前から分かっています。一日を前に運びながら、内側の容量が薄くなっていくのに要する労力も分かっています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 若者のメンタルヘルスの負荷は臨床の傾向だけではありません。機関が過負荷を正常化し、若者がそれを私的欠陥として扱い始める仕方についてでもあります。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意識と恩寵のヴェーダ的教師）は、実践の場でこの圧力が若者に何をするかを見てきました。気分を良くする方法だけを問うのではなく、圧力が自己の物語全体になるのをどう止めるかを問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      深夜に報告を読みます。身体が緊みます。スマホを置きます。また手に取ります。圧力はすでに部屋にいます。
      LOOP_SEQUENCE: "read the report. body tightened. set the phone down. picked it up again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa はこのループを正確に見てきました——報告、身体の緊み、スマホを置く、圧力がまだそこにあるため戻る。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 学生はピアの輪、ワークショップ、キャンペーンを築き、メンタルヘルスを私的弱点ではなく共有インフラとして扱っています。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. トラッカーは若者がしたことを測ります。もう一つの遅れや途切れた応答のあと、助けを求め、過負荷を同一化にせず戻る次の一歩を可能にしたものの欄はありません。戻った人にも、そのループの読者にもそれが要りました。Sai Maa の教えにはその容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa が見ていること
    paragraphs:
    - Sai Maa はまず、意識をそのなかを通り過ぎる嵐から分けます。圧力は本物ですが、圧倒が同一化になる必要はありません。
    - 彼女の教えは若者に困難を否定せよとは言いません。恐れや過負荷が自己の唯一の語り手にならないほど、内なる清明を取り戻せと言います。
    - 「私が壊れている、間違っている」に感じることは、持続不可能な負荷を制度が正常化し続けることへの正確な反応です。
practice:
  options:
  - id: practice_01
    display_name: 5分間・圧倒リセット（Overwhelm Reset）
    announcement_line: Sai Maa は、メンタルヘルスの圧力が注意を無力感に変え始める瞬間のため、5分間の Overwhelm Reset を教えています。サイドバーにあり、時間どおりで実用的です。
    relief_lines:
    - 螺旋が自己全体を定義する権威を少し失います。
    - 次の正直な決断に足る清明が戻ります。
sdg:
  primary:
    title: 健康と福祉
    line: 国連はSDG 3とそのメンタルヘルス関連の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Active Minds が、若者メンタルヘルス組織化への公的入口を提供しています。入口: https://www.activeminds.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若者のメンタル過負荷は増え続けている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 教師が、同一化に硬くなる前に圧力を名指します。
