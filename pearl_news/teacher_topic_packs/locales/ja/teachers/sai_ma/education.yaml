hook_personal:
  options:
  - id: hook_personal_01
    line: まだ学びたい気持ちはあります。同時に、いまの制度が注意を散らし、努力を疲弊へと早く変えるのも知っています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育の負荷は分量だけではありません。学校が注意と学びが働く条件をいまもつくれるかという問題です。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意識と恩寵のヴェーダ的教師）は、実践の場でこの圧力が若者にどう落ちるかを見てきました。気分を良くする方法だけを問うのではなく、圧力が自己の物語全体になるのをどう止めるかを問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      課題ポータルを開きます。集中が切れます。離れます。また戻ります。仕事はまだそこにあります。LOOP_SEQUENCE: "opened the portal. focus broke. switched away. came back."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa はこのループを正確に見てきました——ポータルが開き、集中が切れ、離れ、仕事がまだ残るため戻る。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 学生と教育者は学び支え、より健全な時間割、注意を守る教室改革を築き、キャンペーンを主催するだけにとどまりません。
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. トラッカーは若者がしたことを測ります。もう一つの遅れや途切れた応答のあと、次の一歩を可能にしたもの——断片化を同一化にせず仕事に戻る容量——の欄はありません。戻った人にも、そのループの読者にもそれが要りました。Sai Maa の教えにはその容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa が見ていること
    paragraphs:
    - Sai Maa はまず、意識をそのなかを通り過ぎる嵐から分けます。圧力は本物ですが、圧倒が同一化になる必要はありません。
    - 彼女の教えは若者に困難を否定せよとは言いません。恐れや過負荷が自己の唯一の語り手にならないほど、内なる清明を取り戻せと言います。
    - 「私が壊れている、間違っている」に感じることが、持続不可能な負荷を制度が正常化し続けることへの正確な反応であることが多いのです。
practice:
  options:
  - id: practice_01
    display_name: 5分間・圧倒リセット（Overwhelm Reset）
    announcement_line: Sai Maa は、教育の圧力が注意を無力感に変え始める瞬間のため、5分間の Overwhelm Reset を教えています。サイドバーにあり、時間どおりで実用的です。
    relief_lines:
    - 螺旋が自己全体を定義する権威を少し失います。
    - 次の正直な決断に足る清明が戻ります。
sdg:
  primary:
    title: 質の高い教育
    line: 国連はSDG 4とその質の高い教育の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'UNESCOのグローバル教育連合が、ここへの公的入口を提供しています。入口: https://www.unesco.org/en/education/globaleducationcoalition'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 学生は、制度が適応するより速く集中を失っている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 教師が、断片化した条件の下で学びを可能に保つ闘いを名指します。
