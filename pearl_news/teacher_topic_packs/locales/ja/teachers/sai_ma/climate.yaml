hook_personal:
  options:
  - id: hook_personal_01
    line: 地球のことを気にかけています。同時に、次の数字に十分長く留まって何をすべきか決める力が少なくなっているのも感じます。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 気候の圧力はもはや環境だけではありません。注意、感情、市民性——若者が現実と接し続けながら機能を失わないにはどうか、という問題です。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意識と恩寵のヴェーダ的教師）は、実践の場でこの圧力が若者にどう落ちるかを見てきました。気分を良くする方法だけを問うのではなく、圧力が自己の物語全体になるのをどう止めるかを問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      気候の更新を読みます。身体が緊みます。目をそらします。また戻ります。数字はまだ本当です。LOOP_SEQUENCE: "read the update. body tightened. looked away. came back."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa はこのループを正確に見てきました——更新、身体の緊み、そらす、現実がまだそこにあるため戻る。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 若い気候組織者は訴えを起こし、ワークショップを主催し、公的約束と生きられた現実のあいだに機関が答えるよう求めています。
bridge:
  options:
  - id: bridge_01
    line: 2,666 cases. 51 jurisdictions. トラッカーは若者がしたことを測ります。もう一つの遅れや途切れた応答のあと、体系が応答し続けないとき、真実に十分長く接して再び行動する次の一歩を可能にしたものの欄はありません。戻った人にも、そのループの読者にもそれが要りました。Sai Maa の教えにはその容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa が見ていること
    paragraphs:
    - Sai Maa はまず、意識をそのなかを通り過ぎる嵐から分けます。圧力は本物ですが、圧倒が同一化になる必要はありません。
    - 彼女の教えは若者に困難を否定せよとは言いません。恐れや過負荷が自己の唯一の語り手にならないほど、内なる清明を取り戻せと言います。
    - 「私が壊れている、間違っている」に感じることは、持続不可能な負荷を制度が正常化し続けることへの正確な反応であることが多いのです。
practice:
  options:
  - id: practice_01
    display_name: 5分間・圧倒リセット（Overwhelm Reset）
    announcement_line: Sai Maa は、気候の圧力が注意を無力感に変え始める瞬間のため、5分間の Overwhelm Reset を教えています。サイドバーにあり、時間どおりで実用的です。
    relief_lines:
    - 螺旋が自己全体を定義する権威を少し失います。
    - 次の正直な決断に足る清明が戻ります。
sdg:
  primary:
    title: 気候変動に具体的な対策を
    line: 国連はSDG 13とその気候教育とレジリエンスの目標を通じて、まさにこの裂け目への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'YOUNGO と青年気候コミュニティが、ここへの公的入口を提供しています。入口: https://youngoclimate.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 気候の閾値はもはや抽象ではない。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 教師が、Z世代とアルファ世代の注意に気候圧力が何をしているかを名指します。
