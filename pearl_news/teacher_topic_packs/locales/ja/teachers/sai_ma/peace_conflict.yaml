hook_personal:
  options:
  - id: hook_personal_01
    line: 見ないことは不誠実のように感じます。同時に、繰り返される暴力が身体と信頼に何をしているかも知っています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 紛争の圧力はもはや地政学だけではありません。道徳的傷害として、保護に繰り返し失敗する機関への信頼の崩壊として届きます。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意識と恩寵のヴェーダ的教師）は、実践の場でこの圧力が若者にどう落ちるかを見てきました。気分を良くする方法だけを問うのではなく、圧力が自己の物語全体になるのをどう止めるかを問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      最新の報告を読みます。胸が緊みます。目をそらします。また戻ります。良心はまだそこにあります。LOOP_SEQUENCE: "read the report. chest tightened. looked away. came back."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa はこのループを正確に見てきました——報告、身体の緊み、そらす、良心がまだあるため戻る。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 143 youth coalitions. 28 countries.
    stat_line_2: 若い平和構築者は害を記録し、ワークショップを組み、避難した仲間を支え、機関が停滞しても信頼のネットワークを築いています。
bridge:
  options:
  - id: bridge_01
    line: 143 youth coalitions. 28 countries. トラッカーは若者がしたことを測ります。もう一つの遅れや途切れた応答のあと、無感覚や絶望に降りずに再び人間として行動する次の一歩を可能にしたものの欄はありません。戻った人にも、そのループの読者にもそれが要りました。Sai Maa の教えにはその容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa が見ていること
    paragraphs:
    - Sai Maa はまず、意識をそのなかを通り過ぎる嵐から分けます。圧力は本物ですが、圧倒が同一化になる必要はありません。
    - 彼女の教えは若者に困難を否定せよとは言いません。恐れや過負荷が自己の唯一の語り手にならないほど、内なる清明を取り戻せと言います。
    - 「私が壊れている、間違っている」に感じることは、持続不可能な負荷を制度が正常化し続けることへの正確な反応であることが多いのです。
practice:
  options:
  - id: practice_01
    display_name: 5分間・圧倒リセット（Overwhelm Reset）
    announcement_line: Sai Maa は、平和・紛争の圧力が注意を無力感に変え始める瞬間のため、5分間の Overwhelm Reset を教えています。サイドバーにあり、時間どおりで実用的です。
    relief_lines:
    - 螺旋が自己全体を定義する権威を少し失います。
    - 次の正直な決断に足る清明が戻ります。
sdg:
  primary:
    title: 平和、公正、強い制度
    line: 国連はSDG 16とその平和、公正と制度信頼の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: '国連ユースオフィスと青年平和ネットワークが、ここへの公的入口を提供しています。入口: https://www.un.org/youthenvoy/'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若者は紛争を道徳的傷害として抱えている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 教師が、繰り返される暴力と制度的失敗の下で人間であり続ける闘いを名指します。
