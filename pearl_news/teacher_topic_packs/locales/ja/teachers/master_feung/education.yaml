hook_personal:
  options:
    - id: hook_personal_01
      line: 学びたい気持ちはまだあります。同時に、課題が始まる前から制度がどれだけ注意を浪費しているかも知っています。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 教育のストレスは負荷だけではありません。中断だらけの制度が注意、自信、学びとつながり続ける力に何をしているか、という問題です。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Master Fan Jo（芸術と身体の実践を通じた道教の修練を教える教師）は、実践の場で教育の圧力が学生に何をしているかを見てきました。彼らはすでに「課題に留まる努力」だけで疲れ切って現れます。Master Fanは、学校が大切かどうかではなく、散らばった注意を私的な失敗だとしないにはどうか、と問う姿を見てきました。
    - id: teacher_intro_02
      line: Master Fan Jo（自然さと古琴に根ざす）は、実践の場で教育の圧力が分断された注意と自己責めとして現れるのを観察してきました。Master Fanは、若者がもっと勉強する方法ではなく、制度が中断をアイデンティティに変えないようにするにはどうか、と問うのを見てきました。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        課題ポータルを開きます。集中が切れます。タブを切り替えます。また戻ります。仕事はまだ終わらなければならないからです。
        LOOP_SEQUENCE: ポータルを開いた。集中が切れた。タブを切り替えた。戻った。
    - id: youth_somatic_02
      line: |
        読書に座ります。心がグループチャットに飛びます。閉じます。また読み物を開きます。締切は動かないからです。
        LOOP_SEQUENCE: 座った。心が飛んだ。チャットを閉じた。読み物をまた開いた。
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Master Fanは学生のなかでこの順序を見てきました。課題が開き、注意が割れ、タブが変わり、同じ張りつめた制度のなかで努力が再起動します。
    - id: teacher_witness_02
      line: Master Fanはスタジオでもそのループを見てきました。開く、切れる、切り替える、戻る。身体と端末が、着地する前に注意を引き裂き続けます。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 410 workshops. 27 cities.
      stat_line_2: 学生と若い教育者がワークショップを組み、ピアチュータリングを開き、注意に配慮した学びの空間を求める運動をしています。
    - id: turnaround_02
      stat_line_1: 410 workshops. 27 cities.
      stat_line_2: 若者はキャンペーンを組み、注意の失敗を記録し、無限の集中を前提としないピアチュータリングを開いています。
bridge:
  options:
    - id: bridge_01
      line: 410 workshops. 27 cities. トラッカーは学生と教師がすでに何を変えているかを測ります。もう一日の断片化のあと、仕事に戻ることを可能にしたもの──身体が十分長く自然さを見つけ、一つのことが着地し、中断をアイデンティティにしない容量──の欄はありません。ポータルを開いて戻った学生にはそれが要りました。Master Fanの伝統には、呼吸・動き・一行の誠実さを通じた修練として、その言葉と実践があります。
      hidden_capacity: 一つのことが着地するまで身体が自然さを見つけられるようにする
    - id: bridge_02
      line: 教育のトラッカーはプログラムと成果を数えます。制度が注意を散らし続けるなかで課題に留まる内面の容量は数えません。その容量──身体が力まないときに残り、心が応答できるもの──は次の自習に要ります。ポータルに戻った読者にも要ります。Master Fanの修練の実践は、それを守るために設計されています。
      hidden_capacity: 制度が散らすなかで課題に留まる
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Master Fanが見ていること
      paragraphs:
        - Master Fanはまず断片化とアイデンティティを分けます。道教の言葉では、自然さとは努力が落ちたあとに残るものです。学びの環境が注意を引き裂き続けるとき、問題は学生が壊れていることではありません。学びが要請するそらえそのものに敵対的な条件である、ということです。
        - ここでの修練は生産性の言葉ではありません。身体が先に動く実践です。一息、一線を引く、体重の一度の移動──注意が一つのことに十分長く着地して学べるようにするためです。山は安定しようとしません。身体が自分の帰りを見つけるままにします。
        - 再フレームはこう精密になります。「自分が壊れている、間違っている」に感じることが、しばしば持続的注意のために設計されなかった制度・構造への正確な反応です。実践は、この身体を戻る場所にし、責めの場所にしないことです。
    - id: teacher_perspective_02
      header: Master Fanが見ていること
      paragraphs:
        - Master Fanは教育のストレスを自然さを通して読みます。集中できない学生は欠陥ではありません。この身体、この瞬間が、集中が戻る場になりえます。伝統は学ぶために身体を離れよとは言いません。緊張の一割をほどき、呼吸と地面にあとは任せよと言います。
        - そこから修練へ。問いは永遠に気が散らないことではありません。ポータルとチャットが注意を引き裂いたあとに身体が先に動くと、次の段落が可能になります。一線を引く、体重の一度の移動──その再整列が次の段落を可能にします。
        - その枠組みでは自己責めが和らぎます。欠陥はあなたのものではありません。混乱した心でも、壊れた自己でもありません。問題は、いかなる人間の神経系も持続しえない注意を前提に機関と政策が設計し続けていることです。自然さは少しずつ戻ります。
practice:
  options:
    - id: practice_01
      display_name: Mountain Stillness and Brush
      announcement_line: Master Fanは、ポータルとタブが注意を散らした瞬間のため、5分間のMountain Stillness and Brushを教えています。サイドバーにあり、次の学習ブロックの前や、また中断のあとなど短時間で使えます。
      relief_lines:
        - 圧力が自己全体に名前を貼るのをやめます。
        - 次の正直な一手に足る自然さが戻ります。
    - id: practice_02
      display_name: Mountain Stillness and Brush
      announcement_line: Master Fanは、集中がすでに切れ、仕事がまだ待っているときのため、5分間のMountain Stillness and Brushを教えています。サイドバーに、時間どおり手順付きで載せています。
      relief_lines:
        - 身体が自分の静けさを見つけます。
        - 次の段落が可能になります。
sdg:
  primary:
    title: 質の高い教育
    line: 国連はSDG 4とその質の高い教育と生涯学習の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: "Student Voiceなど若者主導の教育ネットワークが、提唱とピア支援への入口を提供しています。入口: https://www.stuvoice.org"
    - id: cta_02
      line: UNA-USAは地域から地球規模で教育とSDG 4のプログラムを運営しています。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 教育のストレスは負荷だけの話ではありません。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 道教の教師が、散った注意と個人的失敗を分けます。
      - id: headline_layer_2_02
        line: 道教の教師が、制度が引き裂き続けるときに身体に何ができるかを名指します。
