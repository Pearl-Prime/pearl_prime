hook_personal:
  options:
    - id: hook_personal_01
      line: シフトのたびに、不確実性を成熟だと扱うよう求められます。続けていますが、その裏でどれだけの隠れた努力がいるかも知っています。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 経済のストレスは今や不安定な条件の下での自己管理として落ちてきます。雇われ続けること、柔軟であり続けること、冷静であり続けること、そして制度が努力を公平に報いているかのように振る舞うこと。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Master Fan Jo（芸術と古琴を通じた道教の修練を教える教師）は、実践の場で若者が労働の不安定さをまるで人格への判決のように背負うのを見てきました。Master Fanは、もっと働く方法だけでなく、変動を自己責めに変えないこと、スケジュールが変わり続けるなかで身体が自然さを見つける方法を問う姿を観察してきました。
    - id: teacher_intro_02
      line: Master Fan Jo（自然さと太極拳に根ざす）は、スタジオの実践で不安定な仕事が若者に何をするかを見てきました。Master Fanは、努力が意味を持つかではなく、制度が静止を拒むなかで次の一手を踏み出すにはどうか、名簿で心が回り続けるときに心から感じ取るにはどうか、と問う学生と労働者を目にしてきました。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        スケジュールアプリを確認します。胃が沈みます。また更新します。シフトが足元から変わる前に、画面をスクショします。
        LOOP_SEQUENCE: アプリを確認した。胃が沈んだ。また更新した。スクショした。
    - id: youth_somatic_02
      line: |
        名簿を開きます。あごが緊張します。更新します。現実が動き続けるので、スクショします。
        LOOP_SEQUENCE: 名簿を開いた。あごが緊張した。更新した。スクショした。
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Master Fanは学生と若い労働者のなかでこの労働のループそのものを見てきました。確認、沈み、更新、一瞬だけ事実を固定しようとするスクショです。
    - id: teacher_witness_02
      line: Master Fanはスタジオでもその順序を見てきました。アプリが開き、身体が反応し、指が更新し、スクショが制度が保証しないものを留めます。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 1,240 cases. 32 cities.
      stat_line_2: 若い労働者と学生労働者の連合が条件を記録し、案件を起こし、地域の労働ルールを変えています。
    - id: turnaround_02
      stat_line_1: 1,240 cases. 32 cities.
      stat_line_2: 若者は安定したシフト、公正な賃金、変動を性格の試練にしない条件のためのワークショップを開き、組織しています。
bridge:
  options:
    - id: bridge_01
      line: 1,240 cases. 32 cities. トラッカーは若い労働者が挑戦したことを測ります。もう一週間の不安定のあと、次の申立てやシフト交渉を可能にしたもの──不安定さをアイデンティティにせず、十分に安定して行動できる容量──の欄はありません。スクショを撮った人にはそれが要りました。Master Fanの伝統には、条件が変わっても残るものに名前があります。自然さです。呼吸、動き、一行の誠実さを通じて、この身体のなかでそれを守る実践です。
      hidden_capacity: 不安定さをアイデンティティにせず十分に安定して行動する
    - id: bridge_02
      line: 労働のトラッカーは案件と政策上の勝利を数えます。スケジュールに自己の価値全体を渡さずに、次のシフトや次の会議に顔を出せる内面の容量は数えません。その容量──身体が力まないときに残り、心が応答できるもの──は次の申立てに要ります。アプリを更新した労働者にも要ります。Master Fanの修練の実践は、それを守るために設計されています。
      hidden_capacity: スケジュールに価値全体を渡さずに顔を出す
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Master Fanが見ていること
      paragraphs:
        - Master Fanはまず不安定さとアイデンティティを分けます。道教の言葉では、自然さとは努力が落ちたあとに残るものです。安定雇用がそれを作るのでも、悪いシフトが壊すのでもありません。変わる条件を内面化して個人的失敗の証にすると苦しみが増えます。
        - ここでの修練は根性の言葉ではありません。世界が動き続けるときに身体が先に動く実践です。一息、一線、体重の移動──全体が変動に崩れずに次の一手が可能になるようにします。心からの感じ取りは分析より速いです。まず心から感じ取ります。
        - 再フレームはこう精密になります。「自分が壊れている、間違っている」に感じることが、しばしば不安定さの上に築かれた経済への正確な反応です。問題は、制度と構造が個人がひとりで背負うものを生み出し続けていることです。実践は、この身体を自然さの場所にし、責めの場所にしないことです。
    - id: teacher_perspective_02
      header: Master Fanが見ていること
      paragraphs:
        - Master Fanは仕事の不安定さを自然さを通して読みます。安定を見つけられない労働者は欠陥ではありません。この身体、この瞬間が、スケジュールが次に何をしても尊厳と行動が出会う場になりえます。伝統は安らぎのために身体を離れよとは言いません。緊張の一割をほどき、呼吸と地面にあとは任せよと言います。
        - そこから修練へ。問いはアプリが更新されたときに沈みを永遠に感じないことではありません。身体が先に動くと次の一手はまだあなたのものです。案件を起こす、シフトに出る、あるいは変動をアイデンティティにせず一線を引く──。
        - その枠組みでは自己責めが和らぎます。問題は若者にレジリエンスがないことでも、不安定を感じる自分が間違っていることでもありません。問題は、経済が制度として不安定さを個人の神経系に外注し続けていることです。自然さは少しずつ戻ります。身体が自分の静けさを見つけるままにします。
practice:
  options:
    - id: practice_01
      display_name: Mountain Stillness and Brush
      announcement_line: Master Fanは、仕事の不安定さが明晰さを上書きし始める瞬間のため、5分間のMountain Stillness and Brushを教えています。サイドバーにあり、次のシフトの前や、またスケジュールの衝撃のあとなど短時間で使えます。
      relief_lines:
        - 圧力が自己全体に名前を貼るのをやめます。
        - 次の正直な一手に足る自然さが戻ります。
    - id: practice_02
      display_name: Mountain Stillness and Brush
      announcement_line: Master Fanは、スケジュールがまた変わり、身体がまだ追いついていないときのため、5分間のMountain Stillness and Brushを教えています。サイドバーに、時間どおり手順付きで載せています。
      relief_lines:
        - 身体が自分の静けさを見つけます。
        - 崩れずに次の一手が可能になります。
sdg:
  primary:
    title: 働きがいのある経済成長と包摂的かつ持続可能な経済
    line: 国連はSDG 8とその働きがいのある経済成長の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: "ILOと若者の労働権利団体の両方が、この仕事への入口を提供しています。入口: https://www.ilo.org/global/topics/youth-employment"
    - id: cta_02
      line: UNA-USAは同じ枠組みを地方から地球規模で働きがいとSDG 8のために扱っています。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 仕事の不安定さは賃金以上を食いつぶしています。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 道教の教師が、経済的な不安定さと固有の価値を分けます。
      - id: headline_layer_2_02
        line: 道教の教師が、スケジュールが変わり続けるときに身体に何ができるかを名指します。
