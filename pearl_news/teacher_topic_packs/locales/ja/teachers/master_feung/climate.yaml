hook_personal:
  options:
    - id: hook_personal_01
      line: 地球への思いはこれまで以上に強いです。それでも次の数字のそばに十分長く留まり、何をするか決められる感覚は薄れているように感じます。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: ある世代は情報に通じ、道徳的にも真剣でありながら、更新のたびに制度が長く待ちすぎた証として届くと、日々の機能を失っていきます。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Master Fan Jo（芸術、動き、古琴を通じた道教の修練を教える教師）は、スタジオの実践で気候ニュースが若者に何をするかを見てきました。Master Fanは、学生が落ち着きを求めるのではなく、圧力の下で身体がロックするのをやめ、次の一手がまだ可能であるようにする容量を求める姿を見てきました。
    - id: teacher_intro_02
      line: Master Fan Jo（道教の自然さと太極拳に根ざす）は、実践の場で気候の恐れがまず道徳的な真剣さとして、つぎに身体の力みとして現れるのを見てきました。Master Fanは、危機が本物かではなく、心が螺旋する前に身体が知っているもの──呼吸、地面、一行の誠実さ──にどう戻るか、と若者が問うのを観察してきました。
youth_somatic:
  options:
    - id: climate_threshold_phone_01
      line: |
        グループチャットで更新を読みます。胸が締め付けられます。アプリを閉じます。また開きます。見なかったからといって数字が嘘になるわけではないからです。
        LOOP_SEQUENCE: 更新を読んだ。胸が締まった。アプリを閉じた。また開いた。
    - id: climate_threshold_phone_02
      line: |
        授業前に新しい閾値を見ました。のどが締め付けられます。スマホを伏せます。また手に取ります。未来は準備ができてから待ってはくれないからです。
        LOOP_SEQUENCE: 閾値を見た。のどが締まった。伏せた。また手に取った。
teacher_witness:
  options:
    - id: mirrored_loop_01
      line: Master Fanは今年、学生のなかでこのループそのものを見てきました。読む、締まる、閉じる、戻るです。
    - id: mirrored_loop_02
      line: Master Fanは若者のなかでその順序の繰り返しを見てきました。数字が届き、身体が縮み、スマホが下がり、それでも心は戻ります。現実はまだそこにあります。
turnaround:
  options:
    - id: youth_action_climate_01
      stat_line_1: 2,666 cases. 51 jurisdictions.
      stat_line_2: 学生と若者の連合が仲間を訓練し、キャンペーンを組み、公的目標と暮らしの現実のあいだを当局に答えさせています。
    - id: youth_action_climate_02
      stat_line_1: 2,666 cases. 51 jurisdictions.
      stat_line_2: 若い組織者は、国家が熱に追いつかないときも、案件を起こし、ワークショップを開き、地域の損失を記録し続けています。
bridge:
  options:
    - id: tracker_capacity_01
      line: 2,666 cases. 51 jurisdictions. トラッカーは若者がしたことを測ります。前回の遅れのあと、次の申立てを可能にしたもの──制度が応答し続けないときに再び行動するのに十分機能している容量──の欄はありません。次の案件を起こした組織者にはそれが要りました。更新を読み、アプリを閉じ、また開いた人にも要ります。Master Fanの伝統は何千年もそれを育んできました。身体が力まないときに戻る自然さです。
      hidden_capacity: 再び行動するのに十分機能し続ける
    - id: tracker_capacity_02
      line: 気候のトラッカーは案件、目標、閾値を数えます。もう一つの制度の遅れのあと、真実と接触したまま再び行動する内面の容量は数えません。その容量──努力が落ちたあとに残り、身体が心から動けるもの──は次の組織者に要ります。アプリをまた開いた読者にも要ります。Master Fanの修練の実践は、それを守るために設計されています。
      hidden_capacity: 真実と接触しつつ機能を失わない
teacher_perspective:
  options:
    - id: naturalness_cultivation_01
      header: Master Fanが見ていること
      paragraphs:
        - Master Fanは自然さから始めます。努力が落ちたあとに残る状態です。気候ニュースの下で締まる身体は故障ではありません。安心と現実の不一致を正確に感じ取っています。伝統は落ち着きを力づくよう求めません。緊張の一割をほどき、呼吸と地面にあとは任せよと言います。
        - Master Fanはそれを修練と組み合わせます。芸術、動き、呼吸、注意を通じて自己を磨く実践です。気候の情報が無力感に変わり続けるとき、考えで抜け出すのではありません。身体が先に動きます。一息、一線、体重の移動──そうして再び行動が可能になります。
        - ここでの転換は重要です。「自分が壊れている、間違っている」に感じることが、しばしば制度の遅れで形作られた制度・構造への正確な反応です。心から先に感じ取ると、身体は自分を壊れ物と呼ぶのをやめます。心からの応答は分析より速く、正直です。届いたものを信頼します。
    - id: naturalness_cultivation_02
      header: Master Fanが見ていること
      paragraphs:
        - Master Fanは気候のパニックを心からの応答として読みます。心が分類する前に心から感じ取ります。感じる切迫さは誤信号ではありません。危険への、最も深い知性の応答です。
        - そこから自然さへ。問いは一日中落ち着いていることではありません。身体が自分の静けさを見つけると、次の一手は力ずくではなく整列します。山は安定しようとしません。身体がそれから学ぶままにします。
        - その枠組みでは自己責めが和らぎます。問題は若者が思いすぎることでも、緊張を感じる自分が間違っていることでもありません。問題は、制度と構造が耐えがたい遅れを個人の神経系に外注し続けていることです。芸術と呼吸を通じた修練は、常にそこにあった自然さ──そこへ戻し、再び行動できるようにします。
practice:
  options:
    - id: mountain_stillness_01
      display_name: Mountain Stillness and Brush
      announcement_line: Master Fanは、気候の情報が注意を無力感に変え続ける瞬間のため、5分間のMountain Stillness and Brushを教えています。サイドバーに、時間どおり手順付きで載せています。
      relief_lines:
        - 心は更新のたびに行動が無意味だとするのをやめます。
        - 内側のペースが安定し、再び行動する容量とともに戻ります。
    - id: mountain_stillness_02
      display_name: Mountain Stillness and Brush
      announcement_line: Master Fanは、気候の数字がシャットダウンに変わる瞬間のため、5分間のMountain Stillness and Brushを教えています。サイドバーにあり、授業の前、スクロールのあと、次の会議の前など短時間で使えます。
      relief_lines:
        - 身体は更新のたびに全崩壊に変えるのをやめます。
        - 次の本当の行動に足る自然さが戻ります。
sdg:
  primary:
    title: 気候変動に具体的な対策を
    line: 国連はSDG 13とその気候教育とレジリエンスの目標を通じて、まさにこのギャップへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: youngo_01
      line: "Climate Reality ProjectとYOUNGOの両方が、若者向けの入口を運営しています。入口: https://youngoclimate.org"
    - id: una_usa_01
      line: 次の一歩がそうでなければ、UNA-USAは同じ枠組みを地方から地球規模で扱っています。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
      - id: threshold_warning_01
        line: 1.55Cはもはや警告ではありません。
  headline_layer_2:
    options:
      - id: taoist_attention_01
        line: 道教の教師が、気候ストレスがZ世代の注意に何をしているか、そして身体に何ができるかを名指します。
      - id: taoist_naturalness_01
        line: 道教の教師は気候の苦しみを自然さと修練を通して読み、弱さの証ではないと示します。
