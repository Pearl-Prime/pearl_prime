hook_personal:
  options:
  - id: hook_personal_01
    line: 見ないことは不誠実に思えるので読み続けます。繰り返される暴力が身体と信頼に何をしているかも知っています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 紛争の圧力はもはや地政学だけではありません。道徳的傷害として、そして守ってくれない制度への信頼の崩壊として届きます。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Ahjanは上座部仏教の教師として、実践の場でこの圧力が若者にどう降りるかを見てきました。学生はもはや「やる気を保つには」とは聞きません。「圧力が予定どおりに降りてくるなかで、どう機能を保つか」と聞いています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '最新の報告を読みます。胸が締まります。目をそらします。また戻ります。良心はまだそこにあるからです。 LOOP_SEQUENCE: "報告を読んだ。胸が締まった。目をそらした。戻った。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan師はこの一連の動き──報告、身体の締まり、そらし、良心がまだあるからの戻り──をそのまま見てきました。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 143 youth coalitions. 28 countries.
    stat_line_2: 若い和平構築者は被害を記録し、研修を組織し、避難した仲間を支え、制度が停滞するなかでも信頼のネットワークを築いています。
bridge:
  options:
  - id: bridge_01
    line: 143 youth coalitions. 28 countries. トラッカーは若者が何をしたかを測ります。再び遅延や破綻した対応のあと、次の一歩を可能にしたもの──無感動や絶望に降りず、再び人間として行動できる容量──の欄はありません。戻ってきた人にはそれが要りました。そのループの読者にも要ります。Ahjan師の教えには、その容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Ahjanが見ていること
    paragraphs:
    - Ahjan師はまず正確な接触から始めます。身体が本当の圧力に反応するとき、それは故障ではありません。しばしば公的な安心と実生活の現実の不一致を察知しているのです。
    - その認識を正精進と結びつけます。正精進は生産性の言葉ではありません。真実との接触と、まだ可能な行動にエネルギーを向ける規律です。
    - 再フレームが重要です。「自分が欠陥だ──壊れている、間違っている」に感じることが、しばしば遅延、負担、矛盾を個人に外注し続けるシステムへの正確な反応です。
practice:
  options:
  - id: practice_01
    announcement_line: Ahjan師は、平和・紛争の圧力が注意を無力感に変え始める瞬間のため、5分間の「整える実践」を教えています。サイドバーに、時間どおりで実用的に載せています。
    relief_lines:
    - 心は、次の更新が「行動は無意味だ」と証明するのをやめます。
    - 内面のペースが整い、再び行動できる容量が戻ります。
sdg:
  primary:
    line: 国連はSDG 16とその平和、正義、制度的信頼の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'UN Youth Officeと若者の和平構築ネットワークが、ここでの入口を提供しています。入口: https://www.un.org/youthenvoy/'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若者は紛争を道徳的傷害として背負っている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: ある教師が、繰り返される暴力と制度の失敗の下で人間であり続ける戦いを名指しする。
