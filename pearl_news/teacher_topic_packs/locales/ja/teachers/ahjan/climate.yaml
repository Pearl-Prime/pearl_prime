hook_personal:
  options:
  - id: hook_personal_01
    line: 地球への関心はかつてないほど強い。それでも次の数字に十分向き合い、「何をすべきか」を決められる感覚は、むしろ失われていく。
  - id: hook_personal_02
    line: 気候の更新を読み続けるのは、目を背けることが不誠実に思えるからです。新しい数字ごとに、身体に何が起きているかも分かっています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: ある世代は情報に通じ、道徳的にも真剣でありながら、更新のたびに「制度が待ちすぎた」という証拠として届くたびに、日々の機能を損なうことがあります。
  - id: hook_big_picture_02
    line: 圧力はもはや生態系だけではありません。注意、感情、そして市民性です。若者は現実と接したまま、それに飲まれずにいるにはどうすればよいのか。
teacher_intro:
  options:
  - id: identity_observation_shift_01
    line: 上座部仏教の教師として25年、Ahjanは実践の場でこれが若者に何をもたらすかを見てきました。学生はもはや「やる気を保つには」とは聞きません。「約束された未来が予定どおりに消えていくなかで、どう機能を保つか」と聞いています。
  - id: identity_observation_shift_02
    line: Ahjanは25年の上座部仏教の教師として、気候への不安が実践の場にまず道徳的な真剣さとして現れ、つづいて機能の低下として現れる様子を見てきました。学生は危機の現実性を問うのではなく、「大人が長く待ちすぎたという絶え間ない証拠の下で、注意が崩壊しないようにするにはどうするか」と問っています。
youth_somatic:
  options:
  - id: climate_threshold_phone_01
    line: 'グループチャットで更新を読みます。胸が締め付けられます。アプリを閉じます。また開きます。見ないからといって数字が真実でなくなるわけではないからです。

      LOOP_SEQUENCE: "更新を読む。胸が締まる。アプリを閉じる。また開く。"'
  - id: climate_threshold_phone_02
    line: '授業の前に新たなしきい値を見ます。のどが締まります。スマートフォンを伏せます。また手に取ります。未来が「準備ができるまで」とは待ってはくれないからです。

      LOOP_SEQUENCE: "しきい値を見る。のどが締まる。伏せる。また手に取る。"'
teacher_witness:
  options:
  - id: mirrored_loop_01
    line: Ahjanは今年、学生のなかにこの一連の動き──読む、締まる、閉じる、戻る──をそのまま見てきました。
  - id: mirrored_loop_02
    line: 若者のなかでその順序が繰り返されるのを見てきました。数字が届き、身体が縮み、スマホが伏せられ、それでも心は戻ります。現実はそこにあるからです。
turnaround:
  options:
  - id: youth_action_climate_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 学生と若者の連帯は仲間を訓練し、運動を組み、公的目標と実生活のギャップに当局が答えざるを得ない状況をつくっています。
  - id: youth_action_climate_02
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 若い組織者は訴訟を起こし、研修を開き、地域の損失を記録し続けています。国政が熱のスピードに追いつかないときも。
bridge:
  options:
  - id: tracker_capacity_01
    line: 2,666 cases. 51 jurisdictions. トラッカーは若者が何をしたかを測ります。前回の遅れのあと、次の申し立てを可能にしたもの──制度が応答し続けないなかでも「再び行動できるほど機能を保つ力」──の欄はありません。次の案件を起こした組織者にはそれが要りました。更新を読み、アプリを閉じ、また開いた人にも要ります。Ahjan師の伝統は、それを2,500年かけて育んできました。
  - id: tracker_capacity_02
    line: 気候のトラッカーは案件、目標、しきい値を数えます。若者が真実と接したまま、制度のまた遅れのあとでも「再び行動する」力を保てる内面の容量は数えません。次の組織者にはそれが要ります。アプリを開き直した読者にも要ります。Ahjan師の伝統には、それを守る言葉と実践があります。
teacher_perspective:
  options:
  - id: samvega_right_effort_01
    header: Ahjanが見ていること
    paragraphs:
    - 仏教の実践には、この種の圧力を指す正確な語があります。サンヴェーガ（samvega）です。世界が教えられたより脆いと認識が揺さぶられる瞬間です。気候の苦しみがこんなに疲れるのは、身体が故障しているからではありません。公的な安心と物質的現実の不一致を、身体が正確に察知しているからです。
    - Ahjanはそれを正精進と結びつけます。生産性の言葉ではありません。真実とまだ接できるところにエネルギーを使う規律です。次の報告にとどまれない心は、個人の弱さを証明しているのではありません。常に注意を求めながら、釣り合った対応を拒むシステムへの反応です。
    - ここでの転換が重要です。「自分が壊れている、間違っている」という私的な欠陥に感じることが、しばしば「常に注意を求めながら、制度が釣り合った行動を拒む」システムへの正確な反応です。本当の乱れが外にあると見えたとき、心は自分を壊れ物と呼ぶのをやめます。
  - id: samvega_right_effort_02
    header: Ahjanが見ていること
    paragraphs:
    - Ahjanは気候のパニックをサンヴェーガとして読みます。現実が否定しきれないほど深刻になり、言葉がつく前に身体が知る瞬間です。その切迫は誤信号ではありません。危険との真実の接触です。
    - そこから正精進へ向かいます。一日中やる気を保つかではありません。真実と接しうるところにエネルギーを向け、注意が無力な反復に費やされないようにするか、という問いです。
    - その枠組みでは自己責めが和らぎます。欠陥はあなたのものではありません。壊れた自己でも、間違った反応でもありません。制度と政策が耐えがたい遅延を個人の神経系に外注し続けているのが問題です。自分を失敗と名づける代わりに、圧力を生んだ構造をようやく見られるようになります。
practice:
  options:
  - id: steadying_01
    announcement_line: Ahjan師は、気候の情報が注意を無力感に変え続ける瞬間のため、5分間の「整える実践」を教えています。サイドバーに、時間どおりの手順付きで載せています。
    relief_lines:
    - 心は、更新のたびに「行動は無意味だ」と証明するのをやめます。
    - 内面のペースが整い、再び行動できる容量が戻ります。
  - id: steadying_02
    announcement_line: Ahjanは、気候の数字がシャットダウンに変わる瞬間のため、5分間の「整える実践」を教えています。サイドバーにあり、授業の前、スクロールのあと、次の会議の前など短時間で使えます。
    relief_lines:
    - 身体は、更新のたびに全面崩壊へ変換するのをやめます。
    - 次の具体的な行動に足るほどの安定が戻ります。
sdg:
  primary:
    line: 国連はSDG 13とその気候教育・レジリエンスの目標を通じて、まさにこのギャップへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: youngo_01
    line: 'The Climate Reality ProjectとYOUNGOは、ともに若者向けの入口を運営しています。入口: https://youngoclimate.org'
  - id: una_usa_01
    line: 次の一歩がそちらでない場合、UNA-USAは地域から地球規模までのプログラムを運営しています。入口はネットワーク参加です。
title_system:
  headline_layer_1:
    options:
    - id: threshold_warning_01
      line: 1.55Cは、もはや「警告」の段階ではない。
    - id: threshold_warning_02
      line: しきい値は、もはや抽象ではない。
  headline_layer_2:
    options:
    - id: buddhist_attention_01
      line: 仏教の教師が、気候ストレスがZ世代の注意に何をしているかを語る。
    - id: buddhist_function_01
      line: 仏教の教師が、気候の苦しみを「機能の戦い」として読み、弱さの証明ではないと示す。
