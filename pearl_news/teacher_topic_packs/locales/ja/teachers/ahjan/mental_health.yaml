hook_personal:
  options:
  - id: hook_personal_01
    line: 誰かが名づける前に、あなたはその螺旋を知っています。一日を運ぶのに、内面の容量が薄くなっていくのにどれだけの労力がいるかも知っています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 若者のメンタルヘルスの負担は臨床の動向だけではありません。過負荷が常態化し、若者がそれを私的な欠陥として受け止めるまで、制度がそれを正常化する仕方の問題です。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Ahjanは上座部仏教の教師として、実践の場でこの圧力が若者にどう降りるかを見てきました。学生はもはや「やる気を保つには」とは聞きません。「圧力が予定どおりに降りてくるなかで、どう機能を保つか」と聞いています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '深夜に報告を読みます。身体が締まります。スマホを置きます。また手に取ります。圧力はすでに部屋のなかにいるからです。 LOOP_SEQUENCE: "報告を読んだ。身体が締まった。スマホを置いた。また手に取った。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan師はこの一連の動き──報告、身体の締まり、スマホを置く、圧力がまだそこにあるからの戻り──をそのまま見てきました。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 学生はメンタルヘルスを私的な弱さではなく共有のインフラとして捉える仲間の輪、研修、運動をつくっています。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. トラッカーは若者が何をしたかを測ります。再び遅延や破綻した対応のあと、次の一歩を可能にしたもの──過負荷を自己像に変えずに助けを求め戻る容量──の欄はありません。戻ってきた人にはそれが要りました。そのループの読者にも要ります。Ahjan師の教えには、その容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Ahjanが見ていること
    paragraphs:
    - Ahjan師はまず正確な接触から始めます。身体が本当の圧力に反応するとき、それは故障ではありません。しばしば公的な安心と実生活の現実の不一致を察知しているのです。
    - その認識を正精進と結びつけます。正精進は生産性の言葉ではありません。真実との接触と、まだ可能な行動にエネルギーを向ける規律です。
    - 再フレームが重要です。「自分が欠陥だ──壊れている、間違っている」に感じることが、しばしば遅延、負担、矛盾を個人に外注し続けるシステムへの正確な反応です。
practice:
  options:
  - id: practice_01
    announcement_line: Ahjan師は、メンタルヘルスの圧力が注意を無力感に変え始める瞬間のため、5分間の「整える実践」を教えています。サイドバーに、時間どおりで実用的に載せています。
    relief_lines:
    - 心は、次の更新が「行動は無意味だ」と証明するのをやめます。
    - 内面のペースが整い、再び行動できる容量が戻ります。
sdg:
  primary:
    line: 国連はSDG 3とそのメンタルヘルスの目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Active Mindsと若者主導のメンタルヘルス団体が、ここでの入口を提供しています。入口: https://www.activeminds.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若者のメンタル過負荷は高まり続けている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: ある教師が、自己像に固定される前の圧力を名指しする。
