hook_personal:
  options:
  - id: hook_personal_01
    line: 学びたい気持ちはまだあります。同時に、今の仕組みが注意を散らし、努力を疲弊へ変える速さも知っています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育の負担は量だけではありません。学校がまだ、注意と学びが働く条件をつくれるかどうかの問題です。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Ahjanは上座部仏教の教師として、実践の場でこの圧力が若者にどう降りるかを見てきました。学生はもはや「やる気を保つには」とは聞きません。「圧力が予定どおりに降りてくるなかで、どう機能を保つか」と聞いています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '課題ポータルを開きます。集中が途切れます。別の画面に移ります。また戻ります。課題はまだそこにあるからです。 LOOP_SEQUENCE: "ポータルを開いた。集中が途切れた。切り替えた。戻った。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan師はこの一連の動き──ポータルを開く、集中の途切れ、切り替え、課題が残るからの戻り──をそのまま見てきました。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 学生と教育者は学びの支援、より健全な時間割、そして運動を開催し場を提供するだけにとどまらず注意を守る教室改革を進めています。
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. トラッカーは若者が何をしたかを測ります。再び遅延や破綻した対応のあと、次の一歩を可能にしたもの──注意の分散を自己像に変えずに課題へ戻る容量──の欄はありません。戻ってきた人にはそれが要りました。そのループの読者にも要ります。Ahjan師の教えには、その容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Ahjanが見ていること
    paragraphs:
    - Ahjan師はまず正確な接触から始めます。身体が本当の圧力に反応するとき、それは故障ではありません。しばしば公的な安心と実生活の現実の不一致を察知しているのです。
    - その認識を正精進と結びつけます。正精進は生産性の言葉ではありません。真実との接触と、まだ可能な行動にエネルギーを向ける規律です。
    - 再フレームが重要です。「自分が欠陥だ──壊れている、間違っている」に感じることが、しばしば遅延、負担、矛盾を個人に外注し続けるシステムへの正確な反応です。
practice:
  options:
  - id: practice_01
    announcement_line: Ahjan師は、教育の圧力が注意を無力感に変え始める瞬間のため、5分間の「整える実践」を教えています。サイドバーに、時間どおりで実用的に載せています。
    relief_lines:
    - 心は、次の更新が「行動は無意味だ」と証明するのをやめます。
    - 内面のペースが整い、再び行動できる容量が戻ります。
sdg:
  primary:
    line: 国連はSDG 4とその質の高い教育の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'UNESCOのグローバル教育連合が、ここでの公的入口を提供しています。入口: https://www.unesco.org/en/education/globaleducationcoalition'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 学生の集中は、制度が適応するより速く削がれている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: ある教師が、分散した条件の下で学びを続ける戦いを名指しする。
