hook_personal:
  options:
  - id: hook_personal_01
    line: 仕事は柔軟性をますます求める一方で安定は与えにくく、そのコストはスケジュールが認める前から身体が知っています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 経済的ストレスはいまアイデンティティへの圧力として届きます。雇われやすさを保ち、いつでも応答し、不安定さを人格の試練のように振る舞うことが求められます。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Ahjanは上座部仏教の教師として、実践の場でこの圧力が若者にどう降りるかを見てきました。学生はもはや「やる気を保つには」とは聞きません。「圧力が予定どおりに降りてくるなかで、どう機能を保つか」と聞いています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'スケジュールアプリを確認します。胃のあたりが沈みます。また更新します。画面をスクショします。シフトが消えてしまう前に、見たことを信じたいからです。 LOOP_SEQUENCE: "アプリを確認した。胃が沈んだ。また更新した。スクショした。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan師はこの一連の動き──アプリを見る、身体の沈み、更新、瞬間を固定しようとするスクショ──をそのまま見てきました。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 若い労働者は労働条件を記録し、賃金未払いの訴えを起こし、不安定な労働規則を公的記録に引きずり出す運動を組織しています。
bridge:
  options:
  - id: bridge_01
    line: 1,240 cases. 32 cities. トラッカーは若者が何をしたかを測ります。再び遅延や破綻した対応のあと、次の一歩を可能にしたもの──経済が不確実性を私的ストレスに変え続けるなかで「再び行動できるほど機能を保つ力」──の欄はありません。戻ってきた人にはそれが要りました。そのループの読者にも要ります。Ahjan師の教えには、その容量を守る言葉があります。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Ahjanが見ていること
    paragraphs:
    - Ahjan師はまず正確な接触から始めます。身体が本当の圧力に反応するとき、それは故障ではありません。しばしば公的な安心と実生活の現実の不一致を察知しているのです。
    - その認識を正精進と結びつけます。正精進は生産性の言葉ではありません。真実との接触と、まだ可能な行動にエネルギーを向ける規律です。
    - 再フレームが重要です。「自分が欠陥だ──壊れている、間違っている」に感じることが、しばしば遅延、負担、矛盾を個人に外注し続けるシステムへの正確な反応です。
practice:
  options:
  - id: practice_01
    announcement_line: Ahjan師は、経済・仕事の圧力が注意を無力感に変え始める瞬間のため、5分間の「整える実践」を教えています。サイドバーに、時間どおりで実用的に載せています。
    relief_lines:
    - 心は、次の更新が「行動は無意味だ」と証明するのをやめます。
    - 内面のペースが整い、再び行動できる容量が戻ります。
sdg:
  primary:
    line: 国連はSDG 8とその「働きがいのある人間らしい仕事」の目標を通じて、これへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'ILOと若者の労働権利団体は、ともに公的な入口を提供しています。入口: https://www.ilo.org/global/topics/youth-employment'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若い労働者は、賃金の数字以上に不安定を背負っている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: ある教師が、不安定の下で機能を保つ隠れた戦いを名指しする。
