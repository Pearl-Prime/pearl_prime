hook_personal:
  options:
  - id: hook_personal_01
    line: 公的な暴力は、ひとつの通知を通じて私生活に入り込むのを感じます。言葉より先に、身体がそれを抱えます。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 紛争ニュースは地政学だけではありません。注意、睡眠、道徳的な真剣さを保てるか——公的な混乱が身体に染み込むかどうか、日々の戦いでもあります。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Pamela Fellows（ヴァジュラヤーナの灌頂、ヨガ資格、Peter Levine と Pat Ogden のソマティック療法の訓練）は、公的暴力を私的な神経系のなかに抱える若者を実践の場で見てきました。紛争が本物かどうかを問うのではなく、その下で身体が固まらないようにする方法を問うています。伝統は、恐れのエネルギーを抑圧ではなく実践と遇えば知へと変容すると言います。
  - id: teacher_intro_02
    line: Pamela Fellows はヴァジュラヤーナとソマティックの土台から教えます——灌頂、ゴンドロ修了、Levine と Porges の身体読み取りを持ちます。学生が紛争ニュースを心が処理できないすべてを入れる容器のように抱えるのを見てきました。伝統は身体に鎧を着せたり恐れを迂回したりしません。抱えられたものに遇い、変容させます。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      紛争アラートを読みます。胸が緊み、抱えます。一瞬止まります。また確認します。危険は本物で、見ないことは何も変えませんから。

      LOOP_SEQUENCE: "read the alert. chest tightened and held. stopped for a second. checked again."
  - id: youth_somatic_02
    line: |
      グループチャットで更新を見ます。あごと呼吸が止まります。スマホを置きます。また手に取ります。現実はまだそこにあります。

      LOOP_SEQUENCE: "saw the update. jaw and breath locked. put the phone down. picked it up again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Pamela Fellows は若者のなかでこのループを正確に見てきました——アラート、身体の収縮と保持、一瞬の停止、そして現実がまだそこにあるため注意が戻る。ヴァジュラヤーナとソマティックの訓練は身体を病理化せず、何を抱え、どう変容させ他者を守り、真実を語り、再び行動するかを問います。
  - id: teacher_witness_02
    line: 通知、胸やあごの保持、端末を置く、そして心が戻る——その順序を見てきました。心がまだ統合できなかったものを身体が抱えてきました。Pamela Fellows の伝統は、抱えられたものに在り方で遇う実践を提供します。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 676 million women and girls. 50 kilometers from active conflict.
    stat_line_2: 若者は被害を記録し、法リテラシーのワークショップを組み、制度が分断するときも平和と説明責任の仕事を組織しています。
  - id: turnaround_02
    stat_line_1: 676 million women and girls. 50 kilometers from active conflict.
    stat_line_2: 青年の平和構築者はピアの輪、訓練された証人、ワークショップを主催し、機関に紛争への応答に身体と心を含めるよう求めています。
bridge:
  options:
  - id: bridge_01
    line: トラッカーは若者が築いた輪とキャンペーンを測ります。もう一連の暴力のあと、次の平和の行為を可能にしたもの——身体が抱えていたものを手放し、応答を弱さと呼ばずに清明が戻る容量——の欄はありません。次の対話に来た若者にも、スマホを置いてまた開いた人にもそれが要りました。Pamela Fellows のヴァジュラヤーナの訓練はこう名指します——五つの神経症的毒（瞋、貪、痴、嫉、慢）は取り除く障害ではなく、五仏の知の素材です。紛争アラートで構えた身体は、抑圧ではなくソマティックな在り方と遇えば平和に要る清明へと変容するエネルギーを抱えています。
  - id: bridge_02
    line: 数字はアウトリーチと対話の回数を測ります。若者がいま恐れを抱えているものを含む実践を持つとき——恐れに鎧ではなく身体のあるがままに遇うことで何かが動く——それは測られません。その転換が次の対話に要ります。ループのなかの人にも要ります。Pamela Fellows の伝統は名を持ちます——拒む必要は何もないというタントラの原則です。恐れは実践と遇えば、在り方へ戻る道そのものです。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Pamela Fellows が見ていること
    paragraphs:
    - 彼女は若者に、恐れが誤りだから落ち着けとは言いません。恐れは危険への正確な接触でありうます。身体は心がまだ処理できないものを抱えます。本当の問いは、その保持が真実に応答する手放しの実践になるか、それとも反復とパニックに神経系全体を渡す崩壊になるかです。
    - そこからタントラの原則へ——毒は薬です。身体の知は心が避けるものを含みます。若者が裁きではなくソマティックな在り方で抱えられたものに遇う実践を持つとき、現実を否定せずに機能し続ける容量が開けます。
    - それが重要なのは、「私が壊れている、間違っている」に感じることが、制度が公的混乱を内に留めきれないなかで生きる影響を身体が正確に抱えていることであることが多いからです。Pamela Fellows の伝統は、再びより安定した土台から行動するために、抱えられたものに遇う実践を提供します。
  - id: teacher_perspective_02
    header: Pamela Fellows が見ていること
    paragraphs:
    - Pamela Fellows の伝統では、紛争の恐れは認知だけではありません。胸、あご、呼吸に落ち、アラートが心より速いとき身体が抱えます。感じるのをやめよとは言いません。応答に身体を含めよと言います。
    - ここでのハートフルネスは、身体と現在を含むより深い知から生きることです。若者が否定ではなく温かさで抱えられたものに遇う実践を持つとき、他者を守り真実を語るのに足る機能が開けます。
    - その枠では自己責めが和らぎます。問題は若者が敏感すぎることでも、私が打ちのめされるのが誤りでもありません。問題は、制度と構造が手放しの実践なしに公的混乱を身体に残し続けていることです。Pamela Fellows の伝統はその実践を提供します。
practice:
  options:
  - id: practice_01
    display_name: 5分間・聖なる証人の坐（Sacred Witness Sit）
    announcement_line: Pamela Fellows は、紛争アラートが真実の恐れを全面シャットダウンに変え始める瞬間のため、5分間の Sacred Witness Sit を教えています。サイドバーにあり、日常で使える短さです。
    relief_lines:
    - 身体が負担をひとりで抱え続けるのをやめます。
    - 次の正直な一手に足る安定が戻ります。
  - id: practice_02
    display_name: 5分間・聖なる証人の坐（Sacred Witness Sit）
    announcement_line: Pamela Fellows は、アラートが落ち、身体が心がまだ処理できないものを抱えているときのため、5分間の Sacred Witness Sit を教えています。サイドバーにあり、次の確認の前や更新のあとにも短く使えます。
    relief_lines:
    - 圧力が自己全体に名前を貼るのをやめます。
    - 心と身体が迂回ではなく含まれます。
sdg:
  primary:
    title: 平和、公正、強い制度
    line: 国連はSDG 16とその平和、正义と強い制度の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: この問題が自分のことなら、地域から UNA-USA か、同じ枠組みで働く青年平和ネットワークから始められます。入口はネットワークへの参加です。
  - id: cta_02
    line: 青年の平和構築と説明責任のネットワークが、地域と国際のレベルで入口を提供しています。入口：UNA-USA または地域の団体。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 紛争アラートが日常を書き換えている。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: ヴァジュラヤーナの訓練を受けた教師は、紛争の恐れを全体の同一化にさせず、身体が抱えているものを名指します。
    - id: headline_layer_2_02
      line: Pamela Fellows は紛争の圧力をソマティックとヴァジュラヤーナの土台で読みます——恐れは平和の素材です。
