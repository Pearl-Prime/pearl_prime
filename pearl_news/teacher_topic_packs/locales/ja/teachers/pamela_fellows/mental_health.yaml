hook_personal:
  options:
  - id: hook_personal_01
    line: 螺旋は誰かが名指す前から分かっています。一日を前に運びながら、内側の容量が薄くなっていくのも分かっています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 若者のメンタルヘルスの負荷は症状の話だけではありません。注意、休息、感じる力が同時に攻められるとき、身体に何が蓄積されるかという話です。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Pamela Fellows（ヴァジュラヤーナの灌頂、ヨガ資格、Peter Levine と Pat Ogden のソマティック療法の訓練）は、外からは機能して見える若者にこの圧力が何をするかを実践の場で見てきました。元気になる方法だけを問うのではなく、心がまだ手放せないものを身体が抱え続けるのをどう止めるかを問うています。伝統は毒即薬と言います——螺旋を駆動する神経症的エネルギーは、在り方と遇えば知へと変わります。
  - id: teacher_intro_02
    line: Pamela Fellows はヴァジュラヤーナとソマティックの土台から教えます——灌頂、ゴンドロ修了、Levine と Porges の身体読み取りを持ちます。リトリートで、メンタルの過負荷を心が処理できないすべてを格納する器のように抱える学生を見てきました。伝統は身体や困難な感情を迂回しません。変容させます。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      深夜に更新を読みます。あごが緊み、胃が固まります。スマホを置きます。また手に取ります。螺旋はすでに回っていますから。

      LOOP_SEQUENCE: "read the update. jaw tightened, stomach held. put the phone down. picked it up again."
  - id: youth_somatic_02
    line: |
      グループチャットに警告を見ます。胸が何かを抱えているように感じます。アプリを閉じます。また開きます。見なければ感覚が消えるわけではないからです。

      LOOP_SEQUENCE: "saw the warning. chest held. closed the app. opened it again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Pamela Fellows は学生のなかでこのループを正確に見てきました——警告、身体の保持、スマホを置く、そして同じ圧力が注意を引き戻す。ヴァジュラヤーナとソマティックの訓練は身体を病理化せず、何を抱え、どう変容させるかを問います。
  - id: teacher_witness_02
    line: 更新が落ち、あごや胃が緊み、端末が置かれ、画面が暗くなっても心は戻る——螺旋は止まらない。心がまだ処理できなかったものを身体が抱えてきました。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 若者主導の組織はピアの輪を開き、リスナー訓練を組み、メンタルヘルス支援を私的弱点ではなくインフラとして扱うよう学校に求めています。
  - id: turnaround_02
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 学生と若い教育者はワークショップを組み、ピア支援の輪を主催し、過負荷の対話に身体を含める空間を求める運動をしています。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. トラッカーは若者が築いた輪とキャンペーンを測ります。もう一週間の過負荷のあと、次の正直な打ち明けを可能にしたもの——走っていたパターンを見て、習慣ではなく清明から応答を選ぶ容量——の欄はありません。輪に来た若者にも、警告を読み、スマホを置き、また開いた人にもそれが要りました。Pamela Fellows の伝統は何世代もその容量を育んできました。圧倒されているのはあなたではなく、圧倒が現れる不変の見る者です。それが見えればパターンは緩み、次の正直な一手が可能になります。
  - id: bridge_02
    line: 数字はプログラムとアウトリーチを測ります。心が古い物語に固執するとき、覚知がすでに知っているところに休息する内面の容量は測られません。次の正直な一手にそれが要ります。スマホを閉じてまた開いた人にも要ります。Pamela Fellows の伝統は、あなたはパターンではなかった——パターンが現れる不変の覚知である、と保ちます。元気になるのではなく、すでに起きているものの証人ではないふりをやめることです。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Pamela Fellows が見ていること
    paragraphs:
    - 彼女はまず心を欠陥とは呼びません。心がまだ処理できないものを身体が抱えていることに気づきます。ヴァジュラヤーナとソマティックの伝統では、表面の圧倒の下のより深い詰まりは取り除く障害ではなく、変容しうるエネルギーです。身体が見られ感じられると、何かが手放せます。
    - そこから心の知へ向かいます。問いはすべての思考を支配することではありません。螺旋が自己の唯一の語り手にならないよう、身体と心を応答に含めることです。身体は心が避けるものを抱え、心は心が追いつく前に知っています。
    - その転換が重要です。「私が壊れている、間違っている」に感じることが、どの制度も過負荷を正常化すべきでないとき、身体の正確な反応であることが多いのです。実践は感情を空にすることではなく、そこに遇い、より安定した土台から再び動けるようにすることです。
  - id: teacher_perspective_02
    header: Pamela Fellows が見ていること
    paragraphs:
    - Pamela Fellows の伝統では、苦しみは心だけにありません。あご、胃、胸に落ち、心が統合できないとき身体が抱えます。感じるのをやめよとは言いません。応答に身体を含めよと言います。
    - ここでのハートフルネスは感情論ではなく、身体と現在を含むより深い知から生きることです。若者が裁きではなく温かさで抱えられたものに遇う実践を持つとき、崩壊せずに機能し続ける容量が開けます。
    - その枠では自己責めが和らぎます。欠陥は私のものではありません——混乱した身体でも、壊れた自己でもありません。問題は、制度と構造が手放しの実践なしに負荷を身体に置き続けていることです。Pamela Fellows の伝統はその実践を提供します。
practice:
  options:
  - id: practice_01
    display_name: 5分間・身体ファースト・チェックイン
    announcement_line: Pamela Fellows は、メンタルの過負荷が部屋全体を占め始める瞬間のため、5分間の Body-First Check-In を教えています。サイドバーにあり、深夜、授業前、螺旋のあとも短く使えます。
    relief_lines:
    - 身体が負担をひとりで抱え続けるのをやめます。
    - 次の正直な一手に足る手放しが戻ります。
  - id: practice_02
    display_name: 5分間・身体ファースト・チェックイン
    announcement_line: Pamela Fellows は、螺旋が回り、身体が心がまだ名指せないものを抱えているときのため、5分間の Body-First Check-In を教えています。サイドバーにあり、方程式に身体を含める必要があるときに短く使えます。
    relief_lines:
    - 圧力が自己全体に名前を貼るのをやめます。
    - 心と身体が迂回ではなく含まれます。
sdg:
  primary:
    title: 健康と福祉
    line: 国連はSDG 3とその健康と福祉の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Active Minds と Born This Way Foundation の双方が、若者向けの入口を提供しています。入口: https://www.activeminds.org'
  - id: cta_02
    line: '次の一歩がそうでない場合、Born This Way Foundation はメンタルヘルスと若者の声の交差点でプログラムを運営しています。入口: https://bornthisway.foundation'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 螺旋が性格のように感じ始めるとき。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: ヴァジュラヤーナの訓練を受けた教師は、若者の過負荷を同一化させず、身体が抱えているものを名指します。
    - id: headline_layer_2_02
      line: Pamela Fellows はメンタルヘルスの圧力をソマティックとヴァジュラヤーナの土台で読みます——毒は薬です。
