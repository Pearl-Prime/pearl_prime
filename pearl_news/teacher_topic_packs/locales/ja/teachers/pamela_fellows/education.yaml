hook_personal:
  options:
  - id: hook_personal_01
    line: 学校は人生の準備だと言われます。一方で、自分の注意を信じられなくなるように訓練されている日もあります——その負担を身体が抱えています。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育の負荷は認知だけの問題ではありません。制度が深さや配慮を語りながら日常を断片化と圧力で組み立てるとき、若い身体に蓄積される緊張として現れます。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Pamela Fellows（ヴァジュラヤーナの灌頂を受け、ヨガ資格を持ち、Peter Levine と Pat Ogden の下でソマティック療法を学んだ教師）は、実践の場で、散らばった注意が道徳的欠陥のように感じられる学校の圧力を抱えた学生を見てきました。教育が大切かどうかを問うのではなく、学びに必要な条件を制度が繰り返し損なうとき、身体は何を抱えているのかを問うています。その伝統は四諦として読みます——苦しみを名指し、それを駆動するパターンを名指し、転換しうることを確認し、道を実践する。
  - id: teacher_intro_02
    line: Pamela Fellows はヴァジュラヤーナとソマティックの土台から教えます——灌頂、ゴンドロ修了、Levine と Porges の身体の読み取りを持ちます。実践の場で、課題に留まる努力そのもので疲れ切った学生が現れるのを見てきました。心がまだ名指せないものを身体が抱えているのです。伝統は心身を分けません。抱えられたものを変容させます。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      課題ポータルを開きます。身体が緊みます。離れます。また戻ります。仕事は、制度が抱えさせてくれなくても、まだそこにあります。

      LOOP_SEQUENCE: "opened the portal. body tightened. switched away. came back."
  - id: youth_somatic_02
    line: |
      アプリで締切を見ます。肩とあごが固まります。タブを切り替えます。また戻ります。やるべきことはまだ残っています。

      LOOP_SEQUENCE: "saw the deadline. shoulders and jaw held. switched tabs. returned."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Pamela Fellows はこの順序を何度も見てきました——課題が現れ、身体が構え、注意が離れ、制度が問題を誤名づけするなかで努力が戻ってくる。ヴァジュラヤーナとソマティックの訓練は身体を責めず、何を抱えているか、どう変容させ学びを可能にするかを問います。
  - id: teacher_witness_02
    line: ポータルが開き、身体が緊み、タブが変わり、同じ圧力が引き戻す——そのループを学生のなかで見てきました。断片化した制度が抱えきれなかったものを、身体が抱え続けています。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 若者はワークショップを組み、キャンペーンを主催し、学生と若い教育者は学び支え、より健全な時間割、注意に配慮した学びの空間をすでに築いています。
  - id: turnaround_02
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 若者はピアの輪、傾聴の訓練を組み、学校に人全体——身体と心——を学びの方程式に含めるよう求めています。
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. トラッカーは改革と学び支えを測ります。もう一日の断片化のあと、正直に学びに戻ることを可能にしたもの——制度の乱れを自分の失敗と呼ばずに、身体が抱えていたものを手放す容量——の欄はありません。ポータルに戻った学生にはそれが要りました。Pamela Fellows のヴァジュラヤーナの訓練は、神経症的エネルギー——苛立ち、渇愛、無明——を障害ではなく、ソマティックな在り方と四諦の診断として遇えば、鏡のような知、弁別の知、平等性の知へと変容しうると名指します。
  - id: bridge_02
    line: 数字はプログラムと改革を測ります。若者がいま抱えているものを含む実践を持つとき、身体のあるがままに遇うことで心が仕事に戻れる——その容量は測られません。次の正直な自習にそれが要ります。Pamela Fellows の伝統は、拒む必要は何もないというタントラの原則を持ちます。散らばったエネルギーも、在り方と遇えば注意への道そのものです。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Pamela Fellows が見ていること
    paragraphs:
    - 彼女はまず学生を「注意散漫」とは呼びません。断片化した制度が抱えきれなかったものを身体が抱えていることに気づきます。ヴァジュラヤーナとソマティックの伝統では、表面の圧倒の下にある内的な詰まりは取り除く障害ではなく、変容しうるエネルギーです。身体が見られ感じられるとき、何かが手放せます。
    - そこから心の知へ向かいます。問いは注意を支配することではありません。身体と心を応答に含め、螺旋が自己の唯一の語り手にならないようにすることです。身体は心が避けるものを抱え、心が追いつく前に心は知っています。
    - 再フレームはこうなります。「私が壊れている、間違っている」に感じることが、どの学び環境も正常化すべきでない過負荷に対する身体の正確な反応であることが多いのです。実践は感情を空にすることではなく、そこに遇い、より安定した土台から仕事に戻れるようにすることです。
  - id: teacher_perspective_02
    header: Pamela Fellows が見ていること
    paragraphs:
    - Pamela Fellows の伝統では、苦しみは心だけにありません。額、肩、あごに落ち、心が統合できないとき身体が抱えます。もっと頑張れとは言いません。応答に身体を含めるよう求めます。
    - ここでのハートフルネスは感情論ではなく、身体と現在を含むより深い知から生きることです。若者が裁きではなく在り方で抱えられたものに遇う実践を持つとき、崩壊せずに機能し続ける容量が開けます。
    - その枠では自己責めが和らぎます。欠陥はあなたの混乱した身体でも、壊れた自己でもありません。問題は、制度と構造が手放しの実践なしに負荷を身体に置き続けていることです。Pamela Fellows の伝統はその実践を提供します。
practice:
  options:
  - id: practice_01
    display_name: 5分間・毒から知への反転（Poison-to-Wisdom Flip）
    announcement_line: Pamela Fellows は、学校の圧力が心を自分に対して働かせている瞬間のため、5分間の Poison-to-Wisdom Flip を教えています。サイドバーにあり、短く構成されています。
    relief_lines:
    - 身体が負担をひとりで抱え続けるのをやめます。
    - 次の正直な一手に足る安定が戻ります。
  - id: practice_02
    display_name: 5分間・毒から知への反転（Poison-to-Wisdom Flip）
    announcement_line: Pamela Fellows は、課題ポータルと断片化した一日が、心がまだ処理しきれないものを身体に残したときのため、5分間の Poison-to-Wisdom Flip を教えています。サイドバーにあり、授業の前や合間に使える長さです。
    relief_lines:
    - 圧力が自己全体に名前を貼るのをやめます。
    - 心と身体が迂回ではなく含まれます。
sdg:
  primary:
    title: 質の高い教育
    line: 国連はSDG 4とその質の高い教育の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'UNESCOのグローバル教育連合と学生擁護団体の双方が、ここへの実践的な入口を提供しています。入口: https://www.unesco.org/en/education/globaleducationcoalition'
  - id: cta_02
    line: 次の一歩がそうでない場合、学生主導の教育正義団体が同じ枠組みを地域と国家のレベルで扱います。入口はそのネットワークへの参加です。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 学校は学びを名指しながら、その条件を壊している。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: ヴァジュラヤーナの訓練を受けた教師は、散らばった注意を、制度が抱えきれないものを身体が示している印として読みます。
    - id: headline_layer_2_02
      line: Pamela Fellows は教育の圧力をソマティックとヴァジュラヤーナの土台で読みます——毒は注意へ戻る道そのものです。
