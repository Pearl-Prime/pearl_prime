hook_personal:
  options:
    - id: hook_personal_01
      line: 地球を思っています。それでも次の数字のそばに十分長く留まり、何をするか決められる感覚は薄れているように感じます。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 気候の圧力はもはや環境だけではありません。注意、感情、市民性──若者は現実と接触したまま、その下で機能を失わずにいるにはどうか、という問題です。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Master Wu（土地と修練の教師）は、実践の場でこの圧力が若者に落ちるのを見てきました。学生はもっと頑張る方法だけを問うのではありません。断片化を訓練し続ける環境のなかでどう安定するかを問っています。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        気候の更新を読みます。身体が締まります。目をそらします。また戻ります。数字はまだ本当だからです。
        LOOP_SEQUENCE: "更新を読んだ。身体が締まった。目をそらした。戻った。"
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Master Wuはこのループそのものを見てきました。更新、身体の締まり、そらし、現実がまだそこにあるからの戻りです。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 2,666 cases. 51 jurisdictions.
      stat_line_2: 若い気候組織者が案件を起こし、ワークショップを開き、公的約束と暮らしの現実のあいだを制度に答えさせています。
bridge:
  options:
    - id: bridge_01
      line: 2,666 cases. 51 jurisdictions. トラッカーは若者がしたことを測ります。もう一つの遅れか破綻した対応のあと、次の一歩を可能にしたもの──制度が応答し続けないときに、真実と十分長く接触して再び行動する容量──の欄はありません。戻ってきた人にはそれが要りました。そのループの読者にも要ります。Master Wuの教えには、その容量を守る言葉があります。
      hidden_capacity: 真実に沿った行動へ戻る
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Master Wuが見ていること
      paragraphs:
        - Master Wuはまず場から始めます。注意、調整、努力は意志だけでなく条件によって形づくられます。
        - 周りの場が断片的で不安定、あるいは厳しいとき、最初の誤りはその混乱を人への判断に翻訳することです。
        - 「自分が壊れている、間違っている」に感じることが、しばしば求めることのために設計されなかった制度・構造のまわりの、劣化した条件への正確な反応です。
practice:
  options:
    - id: practice_01
      display_name: 5-minute Return-to-Ground Practice
      announcement_line: Master Wuは、気候の圧力が注意を無力感に変え始める瞬間のため、5分間のReturn-to-Ground Practiceを教えています。サイドバーに、時間どおり実用的に載せています。
      relief_lines:
        - 身体はあらゆる要求を全面の混乱だとするのをやめます。
        - 次の正直な行動に足る調整が戻ります。
sdg:
  primary:
    title: 気候変動に具体的な対策を
    line: 国連はSDG 13とその気候教育とレジリエンスの目標を通じて、まさにこのギャップへの枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
    - id: cta_01
      line: "YOUNGOと若者気候グループが、ここへの公的入口を提供しています。入口: https://youngoclimate.org"
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 気候の閾値はもはや抽象ではありません。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 教師が、気候の圧力がZ世代とGen Alphaの注意に何をしているかを名指します。
