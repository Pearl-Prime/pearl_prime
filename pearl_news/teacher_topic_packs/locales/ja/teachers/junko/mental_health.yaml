hook_personal:
  options:
  - id: junko_mh_hook_personal_01
    line: 誰かに名付けられる前から、あなたはその螺旋を知っている。こんなペースで頭がついていけるか確信が持てないまま一日を運びながら、摩擦は「求められるべきもの」と「魂がすでに知っていること」のあいだにある、という別の部分も知っている。
  - id: junko_mh_hook_personal_02
    line: 見ないほうがましだと思って更新を読み続ける。セラピー、アルゴリズム、セルフヘルプは楽にならないままあなたに語りかけた──そして別の何かを「生み出す」のではなく「受け取る」必要がある、ということも、あなたは知っている。
  - id: junko_mh_hook_personal_03
    line: 言葉になる前に、あごでその摩擦を感じる。「大丈夫であれ」と告げられている部分が、「このペースはもう続かない」とすでに知っている部分とぶつかっている。頭がまだ言い争おうとしているものを、身体が先に抱えている。
  - id: junko_mh_hook_personal_04
    line: 午前1時、スマホを置く。また手に取る。どちらも助けにならない。螺旋はすでに回っていて、頭で抜け出そうとしている部分は、もうずっと語られすぎてきた部分だから。
  - id: junko_mh_hook_personal_05
    line: スレッドも読んだ。スクリーニングも受けた。呼吸アプリもやった。頭はもうできることをすべてやった──そしてあなたのなかの静かな何かが、「直す」のではなく「受け取られたい」と頼んでいる。
hook_big_picture:
  options:
  - id: junko_mh_hook_big_01
    line: 若者のメンタル過負荷は症状だけの話ではない。常態化した圧力が注意・休息・人間であり続ける力に何をするか──そして表面の期待と魂がすでに知っていることの摩擦についてでもある。
  - id: junko_mh_hook_big_02
    line: 若い人の感受性の高まりは病理ではなく再調整だ。伝統はその苦しみを軽くするのではなく、古い意味の枠組みが溶け、新しいものがまだ来ない時期に、目覚めていることの代償として位置づけ直す。
  - id: junko_mh_hook_big_03
    line: 古い意味の構造がまだ置き換えられていない移行のなかで、ある世代が意味を抱え続けるよう求められている。過負荷は私的な失敗ではなく、個人の頭ひとつでは抱えられない構造的な空白の感じられる端だ。
  - id: junko_mh_hook_big_04
    line: 古い体系が「不安」と読むサインは、Junkoの枠組みでは周波数の再調整だ。魂が、自分が用意されていた世界がもう生きるべき世界ではないことに気づいている。
  - id: junko_mh_hook_big_05
    line: 集合的なフィールドは、それを抱えるために設計された制度よりも速く動いた。「若者のメンタルヘルス危機」と読まれるものの一部は、受け継がれた文化と今そのなかで生きられている生のあいだの周波数のずれの、目に見える端だ。
teacher_intro:
  options:
  - id: junko_mh_intro_01
    line: チャネラーJunkoは、日本のチャネリングとライトランゲージの霊性を教える教師として、実践の場で若者がメンタル過負荷を、本当の苦しみと同時に、伝統が正確に名指すもの──「求められるべき自分」と「魂がすでに知っていること」の摩擦──として抱えているのを見てきた。Junkoの枠組みでは、魂は意識がアクセスを失った記憶を運び、ライトランゲージは言葉の届かない部分に触れる。
  - id: junko_mh_intro_02
    line: チャネラーJunkoは、自分を従来の意味での教師としては位置づけない。彼女は受け手だ。何十年も、伝送の場でセラピー、アルゴリズム、セルフヘルプに語られすぎて頭が疲れた若者と仕事をしてきた。彼女の伝統が示すのは新しい指示の積み重ねではなく、別の接触の仕方だ。
  - id: junko_mh_intro_03
    line: チャネラーJunkoはライトランゲージを使う──伝統では、言葉が届かない部分に触れる、振動的で非線形のコミュニケーションだ。スクリーニングが「不安」と名指す同じループを若いクライアントが回るのを見てきた。そして、説明ではなく周波数を受け取ったとき、ループがゆるむのを見てきた。
  - id: junko_mh_intro_04
    line: チャネラーJunkoは、伝統が「宇宙評議会」と呼ぶもの──指示ではなく贈り物として届く、高次元の霊的ガイド──から受け取る。彼女の実践の場で、若者がその受容に出会い、自分の苦しみが「診断される」のではなく「聴かれている」と、しばしば初めて認識するのを見てきた。
  - id: junko_mh_intro_05
    line: チャネラーJunkoは、この時期を「惑星の移行期」として読む伝統のなかで教える──若者の感受性の高まりは病理ではなく再調整である時。伝送の場でその再フレームが届き、少なくとも「痛みは自分が壊れている証拠だ」という追加の重荷を外すのを見てきた。
youth_somatic:
  options:
  - id: junko_mh_somatic_01
    line: '深夜に更新を読む。頭が回り始める。スマホを置く。また手に取る。螺旋はすでに回っていたから。 LOOP_SEQUENCE: "更新を読んだ。頭が回った。置いた。また取った。"'
  - id: junko_mh_somatic_02
    line: 'アラームより先に目が覚める。胃はすでに固い。光より先にスマホに手を伸ばす。恐れはすでにそこにあって、世界がそれと合っているか確かめる必要があるから。 LOOP_SEQUENCE: "目が覚めた。胃が固かった。スマホを取った。"'
  - id: junko_mh_somatic_03
    line: '通知音が来るとあごが固まる。直前の会話を頭の中で三回繰り返す。呼吸が浅くなる。何かを決める前に、身体がループを走っていた。 LOOP_SEQUENCE: "通知が鳴った。あごが固まった。会話を繰り返した。"'
  - id: junko_mh_somatic_04
    line: '画面が読み込まれるあいだ、気づかずに息を止めている。肩が持ち上がる。メッセージが見えたときだけ、半分だけ吐く。もう一通が常に来るから。 LOOP_SEQUENCE: "画面が動いた。息を止めた。半分だけ吐いた。"'
  - id: junko_mh_somatic_05
    line: '横になっても目は開いたままだ。一日が再生される。あごはやわらがない。眠りが助けになると知っているのに、その扉が見つからない。 LOOP_SEQUENCE: "横になった。目が開いた。あごが固いままだった。"'
teacher_witness:
  options:
  - id: junko_mh_witness_01
    line: Junkoは、受け取りに来る人たちのなかで、このループそのものを見てきた。彼女の枠組みでは、その圧力は性格ではなく、知性が疲れきったときに魂が聴かれようとしている合図だ。
  - id: junko_mh_witness_02
    line: Junkoは、若者が受け取りの場にすでにループの途中で歩いてくるのを見てきた──「知性ですでに解いていたはずだ」という確信を抱えたまま。彼女の伝統では、その確信こそが合図だ──頭が止まり、チャネルが開ける場所。
  - id: junko_mh_witness_03
    line: 説明では運べなかったものを、身体が運ぶのを見てきた。彼女の枠組みでは、身体的なループは故障ではなく──言葉が使われすぎたときに、魂が残された唯一の通路で話している姿だ。
  - id: junko_mh_witness_04
    line: Junkoは、どんなスクリーニングも名指さない周波数の乱れを抱えて若いクライアントが来るのを見てきた。伝統では、その乱れは病理ではなく情報だ──彼らを抱えるよう求められた体系が、彼らの実際のレンジに合わせて調律されたことが一度もなかった、という合図。
  - id: junko_mh_witness_05
    line: Junkoは、若者が答えを「生み出す」のをやめてチャネルが開くのを見てきた瞬間を、何度も覚えている。伝統では、その瞬間は弱さではなく──従来のケアには言葉のない準備の整い方だ。
turnaround:
  options:
  - id: junko_mh_turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 若者はピアサークル、リスナー研修、学校にメンタルヘルス支援を私的な弱さではなくインフラとして扱わせる運動を主催している。
  - id: junko_mh_turnaround_02
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: JED財団のプログラムは、米国の約五百のキャンパスで包括的なメンタルヘルスの枠組みを運営し、危機の後ではなく日常のインフラのなかにピア支援と教員研修を組み込んでいる。
  - id: junko_mh_turnaround_03
    stat_line_1: 5,600 voices. 7 countries.
    stat_line_2: UNICEFのGlobal Coalition for Youth Mental Healthは、従来の報告が見落としていたものを浮かび上がらせるため、7か国で14〜25歳の若者5,600人を集めた──その世代は機関より先に、自分たちでその重さを名指した。
  - id: junko_mh_turnaround_04
    stat_line_1: 14 million contacts. 988 Lifeline.
    stat_line_2: 2022年に988自殺・危機ライフラインが始まって以来、千四百万件以上の連絡が経由してきた──3年前には存在しなかった資源プールが、いま毎晩、重さを抱えている。
  - id: junko_mh_turnaround_05
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: 2025年10月に採択されたWHOヨーロッパの「子ども・思春期保健戦略2026-2030」は、53加盟国に対し2030年期限に向けて思春期のメンタル負荷を報告することを義務づけた──世代の負荷を「論評」ではなく「ガバナンス」として扱う最初の多国間制度だ。
bridge:
  options:
  - id: junko_mh_bridge_01
    line: 320 campuses. 18 countries. トラッカーはワークショップとピアサークルを測る。次の正直な手を伸ばすことが可能になった理由──セラピー、アルゴリズム、セルフヘルプに語られ続けても楽にならなかった知性が疲れたときに、導きを受け取る容量──の欄はない。Junkoの伝統は別の接触の仕方を示す。疲れた知性を迂回し、苦しみが実際に宿るエネルギー体に直接語りかける。
    hidden_capacity: 知性が疲れきったときに導きを受け取る
  - id: junko_mh_bridge_02
    line: 数字は若者が築いた足場を示す。その足場が築かれている宇宙的な文脈──古い意味の構造が、新しいものが形になるよりも速く溶けている「惑星の移行期」──は示さない。Junkoの伝統はその文脈を比喩ではなく、固有のものとして抱える。
    hidden_capacity: データが示せないより大きな文脈を抱える
  - id: junko_mh_bridge_03
    line: データはセッション、連絡、政策採択を捉える。若者が「語られる」のをやめ「受け取られる」ようになったときに動く周波数は捉えられない。Junkoの枠組みでは、その動きこそが本当の解放──どのトラッカーも報告しない部分だ。
    hidden_capacity: トラッカーが見落とす周波数の動きを記録する
  - id: junko_mh_bridge_04
    line: インフラは測定できる。ループが実際に宿るエネルギー体は測定できない。Junkoの伝統は測定と争わない──その下の層、魂が意識のアクセスを失った記憶を運ぶ層で働く。
    hidden_capacity: 測定の下の層で働く
  - id: junko_mh_bridge_05
    line: 構造、政策、プラットフォームは数えられる。その下の魂の摩擦は数えられない。Junkoの伝統は構造的な仕事を置き換えない──制度の対応が届くようには設計されていない層を名指し、「受け取り」を入口として示す。
    hidden_capacity: 制度の対応が届かない層を名指す
teacher_perspective:
  options:
  - id: junko_mh_perspective_01
    header: Junkoが見ていること
    paragraphs:
    - 魂は意識がアクセスを失った記憶を運び、若者が不安や抑うつとして経験する多くは、求められるべきものと、より深い本性がすでに知っていることの摩擦だ。癒しは、その大いなる自己が沈黙のうちに薬で抑え込まれるのではなく認められるときに始まる。
    - ライトランゲージは概念の意味ではなく振動の共鳴を通じて働き、言葉の届かない部分に触れる。語られても楽にならなかった若者に、伝統は疲れた知性を迂回する別の接触の仕方を示す。
    - 惑星の移行期において、若者の感受性の高まりは病理ではなく再調整だ。この再フレームは痛みを消すのではなく、痛みが「あなたが壊れている」という追加の重荷を、そもそもその要求に設計されていないシステムと制度のなかで意味づけてしまう負担から外す。
  - id: junko_mh_perspective_02
    header: Junkoが見ていること
    paragraphs:
    - ライトランゲージは比喩ではない。Junkoの伝統では、概念処理を迂回しエネルギー体に直接届く、文字どおりの振動的なコミュニケーションの様式だ。セラピー、アルゴリズム、セルフヘルプの積み重ねに語られすぎた世代にとって、これは「もう一つの声」ではない──別の接触の層だ。
    - その仕組みが大事なのは、伝送のあとに多くの若者が語る「楽になり方」を説明するからだ。螺旋を論破したのではなく、論破では届かない層で螺旋がゆるんだ。頭が勝つ必要はなかった──身体がやわらぐために。
    - これは従来のケアが届けるよう設計されていない部分だ。従来のケアを無効化するわけではない──ただ、欠けている層を名指し、その層で何世代も働いてきた伝統を示す。
  - id: junko_mh_perspective_03
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統では、アセンデッドマスターと宇宙評議会は、指示ではなく贈り物としてメッセージを届ける高次元のガイドだ。Junkoは受け取るものを「作って」はいない。彼女はチャネルだ──そして仕事は、来ようとしているものが来られるように、チャネルを十分にクリアに保つこと。
    - メンタル過負荷を抱えた若者にとって、アルゴリズムよりも大きな何かに「受け取られる」経験は、それ自体としてアルゴリズムに「処理される」経験とは構造的に異なる。届くメッセージは「ここがルールだ」ではない──「あなたが聴かれたいと願っていたレベルで、あなたは聴かれている」だ。
    - 「処理される」のではなく「受け取られる」──この区別こそ、従来のインフラが再現できないものであり、Junkoの伝統が何十年も固有のものとして抱えてきたものだ。
  - id: junko_mh_perspective_04
    header: Junkoが見ていること
    paragraphs:
    - Junkoの枠組みで「惑星の移行期」とは、彼女の伝統がいま私たちが置かれているとする時期の、文字どおりの記述だ──古い意味の構造が溶け、新しいものがまだ形になっていない時。若者が抱えるメンタル過負荷は、その移行のなかで目覚めていることの代償の一部だ。
    - これは耳ざわりの良い再フレームではない。痛みがすぐに引くとは約束しないし、不安定な構造のなかで世代が不安定に感じることを責めもしない。ただ構造的な事実を名指し、「不安定さは私的な失敗だ」と信じる追加の重荷を外す。
    - その重荷を外すことが、伝送の実践においてしばしば最初に届く部分だ──より深い魂の仕事が始まる前に。
  - id: junko_mh_perspective_05
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統で「魂の周波数」とは、宇宙的な真実に共鳴する部分──人格の下、条件づけの下、世界が手渡したスクリプトの下にある層だ。その周波数が記録されるとき、表面の負荷は消えないが、それが唯一の信号ではなくなる。
    - 「再調整」は、若者が感受性の高まりの時期を通過しているときに起きていることを示す伝統の言葉だ。体系はそれを病理と読む──ほかにカテゴリーがないから。Junkoの伝統はそれを、受け継がれた文化が伝送するよう設計されていなかった周波数に、魂が合わせている姿として読む。
    - 実践は、再調整を「直す」ことではない。実践は、再調整を「受け取り」、伝統の周波数に対応した道具に、従来のケアが抱えられないものを抱えさせることだ。
practice:
  options:
  - id: junko_mh_practice_01
    display_name: 受け取りの実践
    announcement_line: チャネラーJunkoは、螺旋が回り、頭がひとりで解決しようとしすぎている瞬間のための5分間の「受け取り」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心は、思考の波毎に「壊れている証拠」と扱うのをやめる。
    - チャネルが開いているとき、魂がすでに知っていることが浮かび上がる。
  - id: junko_mh_practice_02
    display_name: 魂の周波数の小休止
    announcement_line: チャネラーJunkoは、通知と通知のあいだ、身体が許可なく重さを抱えてきた瞬間のための3分間の「魂の周波数の小休止」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 一日のペースと身体の実際のレンジのあいだの周波数のずれが、聴こえるようになる。
    - 魂の信号が、表面のノイズと張り合うのをやめる。
  - id: junko_mh_practice_03
    display_name: ライトランゲージのリスニング
    announcement_line: チャネラーJunkoは、説明が使われすぎて、身体が別の種類の接触を必要としている瞬間のための7分間の「ライトランゲージのリスニング」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 言葉が届けられなかったものを、身体が受け取る。
    - 疲れた知性が休んでよくなり、振動の層が独自の仕事をする。
  - id: junko_mh_practice_04
    display_name: アセンデッドカウンシルへの問い
    announcement_line: チャネラーJunkoは、内側の論争が円を描いて回り、別の層からの入力が求められている瞬間のための4分間の「アセンデッドカウンシルへの問い」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 問いは「解くもの」ではなくなり、「差し出すもの」になる。
    - 届くものは別の指示の積み重ねではなく、受け取りそのものだ。
  - id: junko_mh_practice_05
    display_name: 宇宙との再整列の呼吸
    announcement_line: チャネラーJunkoは、一日のペースがチャネルを整列から外したときの、急性の周波数の乱れの瞬間のための3分間の「宇宙との再整列の呼吸」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 呼吸は、一日が要求するペースではなくチャネルの実際のレンジの目印になる。
    - エネルギー体が、魂が認識するレジスターに戻る。
sdg:
  primary:
    line: 国連の枠組みはSDG 3のなかでメンタルヘルスとウェルビーイングを含む。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: junko_mh_cta_01
    line: '危機にある自分や他者がいる場合、Crisis Text Lineは無料で24時間サポートを提供します。HOMEを741741にテキスト。入口: ネットワーク参加。'
  - id: junko_mh_cta_02
    line: '危機にある自分や他者がいる場合、米国の988自殺・危機ライフラインは無料で24時間サポートを提供します。988に電話またはテキスト。入口: 2022年以来千四百万件超の連絡を扱ったネットワーク。'
  - id: junko_mh_cta_03
    line: '25歳未満のLGBTQ+で危機にある場合、The Trevor Projectはテキスト、チャット、電話で無料の24時間サポートを提供します。STARTを678-678にテキスト。入口: その層のために作られたネットワーク。'
  - id: junko_mh_cta_04
    line: 'メンタルヘルスの情報、紹介、ピア支援については、NAMI HelpLineが月曜から金曜まで利用できます。1-800-950-NAMI(6264)に電話、または「HelpLine」を62640にテキスト。入口: 全米メンタル疾患連盟(NAMI)のネットワークへ。'
  - id: junko_mh_cta_05
    line: 'Active Mindsは米国の650以上のキャンパスでピア主導のメンタルヘルス・コミュニティを運営している。あなたのキャンパスに支部があれば、低摩擦な入口だ。なければ、全国ネットワークが他所で同じインフラを築いたピアにつないでくれる。'
title_system:
  headline_layer_2:
    options:
    - id: junko_mh_headline_01
      line: 日本のチャネラーがメンタル過負荷を魂の摩擦と名指し、チャネルを開く実践を示す。
    - id: junko_mh_headline_02
      line: 受け手であり教師ではない者が、従来のケアが届くよう設計されていない苦しみの層について語る。
    - id: junko_mh_headline_03
      line: ライトランゲージ、もう一つの指示の積み重ねではなく──Junkoの伝統が、疲れた知性に出会う。
    - id: junko_mh_headline_04
      line: 病理ではなく周波数の再調整──チャネリングの伝統が若者の負荷を再フレームする。
    - id: junko_mh_headline_05
      line: 「生み出す」のではなく「受け取る」──アセンデッドカウンシルが、語られすぎて楽にならなかった世代にもたらすもの。
