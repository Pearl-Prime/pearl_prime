hook_personal:
  options:
  - id: junko_clim_hook_personal_01
    line: 新たな気候のしきい値を読み、思考の下で何かが動いたのを感じた。意識は問題解決をしたかった。より深いところは、すでに失われたものを悼んでいた。
  - id: junko_clim_hook_personal_02
    line: 予報を見たとたん、頭が追いつく前に全身が固まった。あなたのより深い部分はもう数字の意味を知っていた。考える部分はまだそれに追いつこうとしている。
  - id: junko_clim_hook_personal_03
    line: 行ったことのない場所の写真がフィードに届く。キャプションが理由を告げる前に、胸がそれを登録する。魂はすでにそこに居た──ずっと既にそこに居た──そしてあなたを抱える制度には、その種の記憶のための言葉がない。
  - id: junko_clim_hook_personal_04
    line: 新たな数字を聞いたとき、あなたの下にある何かが悼んだ。悼むと決めたわけではない。何を悼んでいるかも自分でわかっていない。身体は知っている。あなたの名前が届く前から、悼みはすでに動いていた。
  - id: junko_clim_hook_personal_05
    line: 天候はあなたが予報で説明できるよりも前に、身体が登録する周波数で変わった。かつて頼れた季節の「間違った暖かさ」のなかにそれを感じる。魂は、受け継がれた言葉がまだ追いついていない惑星の再調整に応答している。
hook_big_picture:
  options:
  - id: junko_clim_hook_big_01
    line: 若者は気候の断裂を、意識の理解よりも深いレベルで感じる。彼らの身体は、知性がまだ処理していない生態的な信号に応答している。これは不安ではない。これは、考える心がまだ抱えきれないものを魂が抱えている姿だ。
  - id: junko_clim_hook_big_02
    line: 制度が気候について言い続けることと、より深い自己がすでに知っていることのあいだの摩擦が、身体を閉ざす圧力を生む。若者は反応しすぎているのではない──魂がすでに伝えようとしていることをどう受け取るかの資源が足りていないだけだ。
  - id: junko_clim_hook_big_03
    line: Junkoの枠組みで「惑星の移行期」は、コホートが置かれている状況の文字どおりの記述だ──古い生態的構造が、受け継がれた言葉が記述できる速さよりも速く溶解している時。多くの若者が運ぶ気候反応は、ある程度、その移行のなかで目覚めていることの代償だ。
  - id: junko_clim_hook_big_04
    line: 集合的なフィールドは、それを抱えるよう設計された制度よりも速く動いた。「気候不安」と読まれるものは、ある程度、受け継がれた枠組みがカテゴリーを持たない周波数のずれの目に見える端だ──そしてこのコホートが最初にそれを登録するのは、まだ身体がその信号に対して麻痺していないからだ。
  - id: junko_clim_hook_big_05
    line: 先祖の知っていること──土地がどう変わったか、土地が何を求めているかについて人間の神経系に蓄えられた長い記憶──は、産業的な枠組みによって尊重されてこなかった。Junkoの伝統では、若者はその知っていることの一部を、制度が抱えられないとき身体を通して未来に運んでいる。
teacher_intro:
  options:
  - id: junko_clim_intro_01
    line: 'チャネラーJunkoは、日本のチャネリングとライトランゲージの霊性を教える教師として、リトリートの場で気候の苦しみが若者に何をするかを見てきた──本当の苦しみと、伝統が正確に名指すもの:意識がまだ処理していない生態的な断裂への魂の応答。Junkoの枠組みでは、より深い自己が、知性のアクセスできない生態的な知っていることを運ぶ。ライトランゲージはその知っていることがすでに保たれている場所に触れる。'
  - id: junko_clim_intro_02
    line: チャネラーJunkoは、自分を従来の意味での教師としては位置づけない。彼女は受け手だ。何十年も、伝送の場で、周囲の制度が認めるのを拒んでいる生態的な知っていることを身体で運んできた若者と仕事をしてきた。彼女の伝統は彼らに「落ち着け」と求めない──聴き方を提供する。
  - id: junko_clim_intro_03
    line: チャネラーJunkoは、若者が気候政策の部屋が登録しない周波数を運んで来るのを見てきた。彼女の伝統では、その周波数はなだめる対象としての不安ではない──部屋がまだ消化していない生態的な真実を魂が抱えている姿だ。
  - id: junko_clim_intro_04
    line: チャネラーJunkoは、伝統が「宇宙評議会」と呼ぶもの──指示ではなく贈り物としてメッセージを届ける高次元のガイド──から受け取る。気候に関する評議会の導きは、楽観や絶望についてではない──制度的な気候の会話が動作してきた現実の層についてだ。
  - id: junko_clim_intro_05
    line: チャネラーJunkoは、いまの時期を「惑星の移行期」として読む──制度的な気候対応がまだ追いついていない、集合的フィールドの文字どおりの構造的シフト。この枠組みでは、若者の生態的感受性の高まりは病理ではない──いま惑星がなりつつあるものへの再調整だ。
youth_somatic:
  options:
  - id: junko_clim_somatic_01
    line: 'フィードで新しいしきい値を読んだ。頭が数字に追いつく前に身体が固まった。アプリを閉じた。それからまた開いた、すでに知っていた部分がまだ走っていたから。 LOOP_SEQUENCE: "しきい値を読んだ。身体が固まった。閉じた。戻った。"'
  - id: junko_clim_somatic_02
    line: '寝る前に予報を見て、情報が完全に届く前に胸で何かが動くのを感じた。スマホを置いた。それから下で動いていた知っていることがあなたを引き戻した。 LOOP_SEQUENCE: "予報を見た。胸が動いた。置いた。戻った。"'
  - id: junko_clim_somatic_03
    line: '山火事の煙の写真が読み込まれ、見出しが説明する前にあごが固まった。スクロールして過ぎ、また戻った。身体はもう、吸わないはずの空気を吸い込んでいた。 LOOP_SEQUENCE: "山火事の画像。あごが固まった。過ぎた。戻った。"'
  - id: junko_clim_somatic_04
    line: '洪水の写真がフィードに届き、顔は何もしなかった。胃がすべてをした。どう感じればいいかわからなかった、身体がすでに感じていたから。 LOOP_SEQUENCE: "洪水の写真。顔は動かなかった。胃が動いた。言葉はまだ。"'
  - id: junko_clim_somatic_05
    line: '気温急上昇の通知が来て、許可なく肩が上がった。記事は開かなかった。開く必要がなかった。画面に出ている数字を身体は知っていた。 LOOP_SEQUENCE: "気温アラート。肩が上がった。開かなかった。身体は知っていた。"'
teacher_witness:
  options:
  - id: junko_clim_witness_01
    line: Junkoは、受け取りに来る人たちのなかで、このループそのものを見てきた。身体が収縮し、頭が管理しようとし、画面が暗くなり、それから魂の知っていることが意識を引き戻す──生態的な真実が、考えの下にすでに保たれているから。
  - id: junko_clim_witness_02
    line: 彼女は、若者が制度が名指すのを拒んでいる生態的な悲しみをすでに抱えて受け取りの場に歩いて来るのを見てきた。彼女の伝統では、その悲しみは病理ではない──コホートの周りの言葉が状態を最小化し続けている惑星に対する、魂の正確な応答だ。
  - id: junko_clim_witness_03
    line: Junkoは、若者が制度的な気候の言葉を「身体が報告し続けてきたもの」と一致させようと議論するのをやめ、代わりに身体を信頼し始める瞬間を見てきた。彼女の伝統では、その瞬間はデータの否定ではない──データの下の層が口を開く許可を得ている姿だ。
  - id: junko_clim_witness_04
    line: 彼女の枠組みでは、気候ニュースのループは対処の失敗ではない。それは、周囲の言葉が消化していない生態的な真実を身体が抱え、まだ開かれている唯一の信号を通じて、実際に惑星に起きていることとの別の種類の接触を求めている姿だ。
  - id: junko_clim_witness_05
    line: Junkoは、若者がすでに準備のできた状態で受け取りの場に到着するのを見てきた──もう議論を終え、もう最小化を終え、もう制度的な言葉が追いつくのを待つことを終えた状態で。彼女の伝統では、その準備こそ、従来の気候コミュニケーションが出会う術を知らないものだ。
turnaround:
  options:
  - id: junko_clim_turnaround_01
    stat_line_1: 2,666 climate cases. 51 jurisdictions.
    stat_line_2: 若い組織者たちは大人が否定した生態的な知っていることを抱えるために、訴訟を起こし、ワークショップを主催し、仲間を訓練している──裁判所や政府の動きが遅すぎても。
  - id: junko_clim_turnaround_02
    stat_line_1: 195 parties. UNFCCC.
    stat_line_2: 国連気候変動枠組条約はいまパリ協定のもとで195の締約国を束ね、若者の選挙区YOUNGOは公式オブザーバーの地位を持つ──このコホートの政策の仕事が立つ床だ。
  - id: junko_clim_turnaround_03
    stat_line_1: 400+ hubs. Sunrise Movement.
    stat_line_2: Sunrise Movementはいま米国で400を超える若者主導のハブを組織し、グリーンニューディール政策を押し、コホートが先に名指した生態的悲しみをすでに抱えて気候の仕事に到着した若者を訓練している。
  - id: junko_clim_turnaround_04
    stat_line_1: 50,000 trained leaders. Climate Reality.
    stat_line_2: アル・ゴアが創設したThe Climate Reality Projectは、170カ国以上で50,000人を超えるリーダーを訓練してきた──制度的な対応がまだ入っていない部屋で、気候対応の共通言語を持つ分散型のコホート。
  - id: junko_clim_turnaround_05
    stat_line_1: $300 billion. COP loss-and-damage.
    stat_line_2: 前線と若者の代表団からの数十年の圧力の後、多国間の気候プロセスはいまや、2035年までに年間3,000億ドルの目標フロアを持つ「損失と損害」のコミットメント枠組みを正式に追跡する──このコホートが先に名指したものを認める最初の多国間気候制度だ。
bridge:
  options:
  - id: junko_clim_bridge_01
    line: 2,666 climate cases. 51 jurisdictions. トラッカーは若者が築いたものを測る。前回の制度的遅延の後に次の訴訟提起を可能にしたもの──意識が圧倒されたときでも、魂がすでに知っていることに対して受容的でいる容量──の欄はない。その受容性こそ、気候組織者が次の訴訟を絶望ではなく整列から提起できる理由だ。Junkoの伝統はそれを「受け取りの実践」と呼び、生態的な知っていることがすでに保たれている部分に触れる。
    hidden_capacity: 知性が圧倒されたときも魂の知っていることに受容的でいる
  - id: junko_clim_bridge_02
    line: 気候のトラッカーは訴訟、目標、メガワットを数える。それは、より深い自己が生態的な断裂についてすでに知っていることを受け取る容量──分析の下にあり、意識が円を描いて回っているときでも行動を導ける知っていること──を数えない。Junkoの伝統はその知性と直接働く。
    hidden_capacity: 魂の知っていることを行動の導きとして受け取る
  - id: junko_clim_bridge_03
    line: データは排出、批准、適応を捉える。それは、惑星がまだ麻痺していないコホートの身体とすでに通信している振動的な層を捉えられない。Junkoの枠組みでは、その振動的な層は、気候対応がそれが対象としていると主張するコホートに実際に届くために含めるべき層の一部だ。
    hidden_capacity: 気候対応に振動的な層を含める
  - id: junko_clim_bridge_04
    line: 気候の指標は数えられる。コホートが運んで到着した「生態的な知っていること」は数えられない。Junkoの伝統は指標を置き換えない──その下の層、惑星が、受け継がれた言葉が相談を拒んだ身体と通信してきた層を名指す。
    hidden_capacity: 指標と並んで生態的な知っていることを届く範囲に保つ
  - id: junko_clim_bridge_05
    line: 構造、条約、誓約は測定できる。その下にある惑星のフィールドは測定できない。Junkoの伝統は構造的な気候の仕事と争わない──その仕事が届くよう設計されていない層を名指し、入口として「受け取り」を示す。
    hidden_capacity: 気候構造が届かない層を名指す
teacher_perspective:
  options:
  - id: junko_clim_perspective_01
    header: Junkoが見ていること
    paragraphs:
    - 魂は意識がアクセスを失った記憶を運ぶ。若者が気候不安として経験する多くは、心理的な障害ではない。それは表面の安心と、より深い自己がすでに知っていることのあいだの摩擦だ。再フレームは単純だ──あなたの身体は壊れていない。あなたの魂は、抱えるべきものを抱えている。
    - ライトランゲージは概念の意味ではなく振動の共鳴を通じて働く。語られても楽にならなかった若者に、伝統は、生態的な知っていることがすでに住んでいる部分との直接の接触を提供する。そのチャネルを開くことは、次の決定の仕方をすべて変える。
    - 惑星の移行期は、若者の感受性の高まりが病理ではなく再調整であることを意味する。自分のなかの欠陥のように感じられるもの──壊れている、混乱している、間違っている──は、代わりに、言葉と行動を一致させることを拒んでいる体系と制度構造への、魂の正確な応答だ。答えは「受け取り」──より深い自己がすでに言っていることに耳を傾けることを学ぶ──にある。
  - id: junko_clim_perspective_02
    header: Junkoが見ていること
    paragraphs:
    - 惑星の周波数は、それを記述するために作られた制度的な言葉よりも速く変わってきた。Junkoの伝統では、振動に敏感な身体は、意識が報告書を登録する前に惑星の周波数を登録する。その周波数のシフトがコホートに対して敵対的であるとき、ニュースはすでに負荷を抱えた身体の上に乗る──そしてその負荷が「不安」と名指される。
    - これは気候科学者への批判ではない。科学者も受け継がれた言葉のなかで働く──彼らも、自分が話す言葉を設計したわけではない。伝統は言葉の下の層、惑星のコミュニケーションが実際に受け取られるか受け取られないかが決まる層を名指している。
    - 受け取りの層こそ、Junkoの実践が働く場所だ。それはデータを置き換えるのではない──その日中、データが届く様式で吸収する容量を超えて押し出された身体にとって、データを届く範囲にする。
  - id: junko_clim_perspective_03
    header: Junkoが見ていること
    paragraphs:
    - Junkoの枠組みで、いまの時期は「惑星の移行期」だ──コホートが置かれている状況の文字どおりの記述で、古い生態的構造が新しいものが形になるよりも速く溶解している時。しきい値を読む若者はこの移行を起こしていない──彼らはそのなかにいる。
    - これは耳ざわりの良い再フレームではない。負荷がすぐに引くとは約束しないし、不安定な惑星のなかでコホートが不安定に感じることを責めもしない。ただ構造的事実を名指し、「不安定さは対処の私的失敗だ」と信じる追加の重荷を外す。
    - 伝送の実践では、その重荷を外すことが最初に届く部分であることが多い──移行のなかでコホートが実際にやろうとして来たことを見つけるより深い仕事が始まる前に。
  - id: junko_clim_perspective_04
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統では、アセンデッドマスターと宇宙評議会は、指示ではなく贈り物としてメッセージを届ける高次元のガイドだ。彼らの惑星に関する導きは、政策の部屋の導きではない──交渉の窓のために最適化するのではなく、交渉の下にあって身体が最初に登録する生態的な知っていることの層を名指す。
    - 気候政策の部屋が言っていることと、自分の身体が報告し続けてきたこととのあいだのギャップに疲れた若者にとって、政策の部屋ではない導き源から「受け取られる」経験は、構造的に異なる。データは変わらない──しかし、何が証拠として許されるかが変わる。
    - 「交渉される」のではなく「受け取られる」──この区別こそ、従来の気候インフラが再現できないものであり、Junkoの伝統が何十年も固有のものとして抱えてきたものだ。
  - id: junko_clim_perspective_05
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統で「ライトランゲージ」は、表面の言葉が届かない部分に触れる、文字どおりの振動的・非線形のコミュニケーションだ。惑星に当てはめると、地球が通信していることの実際の受け取りは、従来の気候の言葉が動作するよう作られていない層を通して起きる、ということだ。
    - その日のレポート、アラート、予報という内容に知性を使われすぎた若者にとって、ライトランゲージの層は、地球の通信がもう一度着地できる場所だ。要点はレポートが間違っているということではない──身体が、レポートが届く様式で受け取る容量を超えて押し出されている、ということだ。
    - 伝統は、もう一つの層を開く実践を示す。レポートは変わらない──しかしコホートは、チャネルが開いた状態でそれに戻り、惑星が何を求めてきたかが、レポートの内側からではなくコホートの内側から聴こえるようになる。
practice:
  options:
  - id: junko_clim_practice_01
    display_name: 受け取りの実践
    announcement_line: チャネラーJunkoは、気候の更新が身体を閉ざし、魂の知っていることが下で走り続ける瞬間のための5分間の「受け取り」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心は身体の応答を「破綻の証拠」として扱うのをやめる。
    - チャネルが開いたとき、魂がすでに知っていることが浮かび上がり、そこから容量が戻る。
  - id: junko_clim_practice_02
    display_name: 気候ニュースのチャネル・リセット
    announcement_line: チャネラーJunkoは、気候の通知が届いた後、心が追いつく前に身体がすでに惑星の信号を登録している瞬間のための3分間の「チャネル・リセット」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体は、アラートの残りを次の瞬間に持ち込まなくなる。
    - チャネルは、前の瞬間の重みの下で身体がすでに崩れた後ではなく、新しい瞬間が始まる前に開く。
  - id: junko_clim_practice_03
    display_name: 生態的悲しみのためのライトランゲージ
    announcement_line: チャネラーJunkoは、受け継がれた言葉が使い果たされ、その下の生態的悲しみが別の様式の接触を必要としている瞬間のための7分間の「生態的悲しみのためのライトランゲージ」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 言葉が機能しなくなっていた層で、悲しみが聴こえるようになる。
    - 身体は、言葉を介してではなく、惑星のコミュニケーションを直接抱える許可を得る。
  - id: junko_clim_practice_04
    display_name: 惑星についてのアセンデッドカウンシルへの問い
    announcement_line: チャネラーJunkoは、気候の問いが円を描いて回り、コホートが、政策の部屋が含めない導き源にではなく政策の部屋に問うてきた瞬間のための4分間の「惑星についてのアセンデッドカウンシルへの問い」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 問いは「政策の部屋を通して交渉するもの」ではなくなり、「政策の部屋が含めない導き源に差し出すもの」になる。
    - 届くものは別の交渉の積み重ねではなく、受け取りそのものだ。
  - id: junko_clim_practice_05
    display_name: 行動前の周波数調律
    announcement_line: チャネラーJunkoは、訴訟提起の前、行動への参加の前、会議への登場の前──身体が、制度的な気候の言葉ではなく自分自身のレジスターのまま仕事に入る必要がある瞬間のための3分間の「行動前の周波数調律」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 組織者は部屋の周波数を借りずに、自分の周波数のまま行動に到着する。
    - 行動は一日の蓄積した負荷の上ではなく、調律された身体の上に着地する。
sdg:
  primary:
    line: 国連はSDG 13に気候行動とレジリエンスの目標の枠組みを持ち、教育と若者の能力構築を含む。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: junko_clim_cta_01
    line: 'The Climate Reality Projectは170カ国以上で50,000人を超えるリーダーを訓練し、自分の文脈で気候について語れるようにしている。入口: climaterealityproject.org'
  - id: junko_clim_cta_02
    line: '草の根の若者組織が次のステップであれば、Sunrise Movementは米国で400を超える若者主導のハブを運営し、気候の力を築きグリーンニューディール政策を押している。入口: sunrisemovement.org'
  - id: junko_clim_cta_03
    line: 'YOUNGOは国連気候変動枠組条約の公式若者選挙区だ。入口: youngo.uno'
  - id: junko_clim_cta_04
    line: '350.orgは数十カ国で分散型の気候組織化を行い、草の根行動を通じて世界経済を化石燃料から外すことに焦点を当てる。入口: 350.org'
  - id: junko_clim_cta_05
    line: 'Friends of the Earth Internationalは70カ国以上の草の根環境団体の連合で、システム的な変容と前線コミュニティの支援に焦点を当てる。入口: foei.org'
title_system:
  headline_layer_1:
    options:
    - id: junko_clim_headline_h1_01
      line: 1.5度はもう予報ではない。
    - id: junko_clim_headline_h1_02
      line: あなたの頭がまだ処理しているものを、あなたの身体はすでに知っている。
  headline_layer_2:
    options:
    - id: junko_clim_headline_01
      line: 日本のチャネラーが気候の苦しみを「魂の知っていること」と名指し、より深い自己がすでに抱えているものを受け取る実践を示す。
    - id: junko_clim_headline_02
      line: チャネラーが若者の気候反応を不安としてではなく、魂の正確な知っていることとして読み、聴き方を教える。
    - id: junko_clim_headline_03
      line: 病理ではなく周波数の再調整──チャネリングの伝統がコホートの気候反応を再フレームする。
    - id: junko_clim_headline_04
      line: 交渉ではなく受け取り──アセンデッドカウンシルが移行期の惑星にもたらすもの。
    - id: junko_clim_headline_05
      line: 受け手であり教師ではない者が、制度的な気候対応が聴ける前から惑星が伝送してきたものについて語る。
