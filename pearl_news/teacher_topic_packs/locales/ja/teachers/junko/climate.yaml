hook_personal:
  options:
  - id: hook_personal_01
    line: 新たな気候のしきい値を読み、思考の下で何かが動いたのを感じた。意識は問題解決をしたかった。より深いところは、すでに失われたものを悼んでいた。
  - id: hook_personal_02
    line: 予報を見て、心が追いつく前に全身が締まった。より深い部分は数字の意味をすでに知っていた。考える部分はまだ追いつこうとしている。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 若者は意識的理解より深いレベルで気候の断裂を感じ取る。身体は知性がまだ処理しきれない生態の信号に応答している。これは不安ではない。思考の心がまだ運べないものを魂が抱いているのだ。
  - id: hook_big_picture_02
    line: 機関が気候について語ることと、より深い自己がすでに知っていることの摩擦が、身体を閉じる圧力をつくる。若者は過剰反応していない。魂がすでに伝えようとしていることをどう受け取るか、リソースが足りないだけだ。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: チャネラーJunkoは、日本のチャネリングとライトランゲージの霊性を教える教師として、リトリートで気候の苦しみが若者にもたらすもの──本当の苦しみと、意識がまだ処理していない生態の断裂への魂の応答として伝統が正確に名指すもの──を見てきた。Junkoの枠組みでは、より深い自己は知性がアクセスできない生態の知を運び、ライトランゲージはその知がすでに抱えている部分に届く。
  - id: teacher_intro_02
    line: チャネラーJunkoは、日本のチャネリングの実践者として、実践の場で気候データが若者に何を引き起こすか──恐怖を超えた何か──を見てきた。魂は思考の心が処理する前に断裂を認識する。彼女の伝統は落ち着けとは求めない。より深い自己がすでに知っていることを受け取り、その知が可能にすることを導かせよと求める。
youth_somatic:
  options:
  - id: climate_soul_phone_01
    line: 'フィードで新たなしきい値を読む。心が数字に追いつく前に身体が締まった。アプリを閉じる。また戻る。すでに知っていた部分がまだ動いているから。

      LOOP_SEQUENCE: "しきい値を読んだ。身体が締まった。アプリを閉じた。戻った。"'
  - id: climate_soul_phone_02
    line: '寝る前に予報を見て、情報がまだ落ち着く前に胸のなかで何かが動いたのを感じた。スマホを置く。その下ですでに動いていた知が、また引き戻した。

      LOOP_SEQUENCE: "予報を見た。胸が動いた。スマホを置いた。戻った。"'
teacher_witness:
  options:
  - id: junko_climate_witness_01
    line: Junkoは、受け取りに来る人たちのなかで、このループそのものを見てきた。身体は縮み、心は管理しようとし、画面は暗くなり、それから生態の真実はすでに思考の下で抱かれているから、魂の知が意識を引き戻す。
  - id: junko_climate_witness_02
    line: 若者がこの順序を辿るのを見てきた。気候の知らせが届き、より深い自己が先に応答し、意識の心は閉じようとし、それから受容が戻る。魂がすでに知っていることをまだ抱いているからだ。
turnaround:
  options:
  - id: youth_action_climate_01
    stat_line_1: 2,666 climate cases. 51 jurisdictions.
    stat_line_2: 若い組織者は訴訟を起こし、ワークショップを開き、大人が否定した生態の知を仲間が抱える訓練をしている──裁判と政府が遅すぎるときも。
  - id: youth_action_climate_02
    stat_line_1: 2,666 climate cases. 51 jurisdictions.
    stat_line_2: 若者は土地癒しの儀式、コミュニティのレジリエンス・ネットワーク、魂がすでに未来に必要なことを理解している場所からの損失の記録を主催している。
bridge:
  options:
  - id: junko_climate_bridge_01
    line: 2,666 climate cases. 51 jurisdictions. トラッカーは若者が何を建てたかを測る。前回の制度的遅延のあと、次の申し立てを可能にしたもの──意識の心が圧倒されているときでも魂がすでに知っていることへの受容を保つ容量──の欄はない。その受容が、次の気候案件を絶望ではなく整列から起こす。しきい値を読んでアプリを閉じ、また開いた人にも要る。Junkoの伝統はこれを受け取りの実践と呼び、生態の知がすでに抱えている部分に届く。
    hidden_capacity: 知性が圧倒されているときも魂の知への受容を保つ
  - id: junko_climate_bridge_02
    line: 気候トラッカーは案件、目標、メガワットを数える。より深い自己が生態の断裂についてすでに知っていること──分析の下にあり、意識の心が空回りしているときでも行動を導ける知──を受け取る容量は数えない。次の若い組織者にも、フィードを開き直した読者にも要る。Junkoの伝統はこの知性に直接働く。ライトランゲージと伝達が、魂がまだ聴いている部分に届く。
    hidden_capacity: 魂の知を行動の導きとして受け取る
teacher_perspective:
  options:
  - id: junko_climate_perspective_01
    header: Junkoが見ていること
    paragraphs:
    - 魂は意識がアクセスを失った記憶を運ぶ。若者が気候不安として経験する多くは心理障害ではない。表面の安心とより深い自己がすでに知っていることの摩擦だ。再フレームは単純だ。身体は壊れていない。魂が抱くべきものを抱いている。
    - ライトランゲージは概念ではなく振動の共鳴を通じて働く。知性に語られても楽にならなかった若者に、伝統は生態の知がすでに生きている部分との直接接触を示す。そのチャネルを開くと、次の決め方がすべて変わる。
    - 惑星の移行期において、若者の感受性の高まりは病理ではなく再調整だ。「自分が欠陥だ──壊れている、混乱している、間違っている」に感じることは、言葉と行動を一致させないシステムと制度への魂の正確な応答だ。答えは受容──より深い自己がすでに言っていることを聴くことだ。
  - id: junko_climate_perspective_02
    header: Junkoが見ていること
    paragraphs:
    - Junkoは気候の締まりを魂の記憶のレンズで読む。若者が身体に抱いているものは個人的な不足ではない。周りの機関が認めようとしない生態の断裂への魂の正確な応答だ。
    - 伝統は身体が先に知ると教える。気候データが届いたとき、身体は思考より深いレベルですでに情報を受け取っている。問いはその反応をどう落ち着かせるかではない。その反応が何を言っているか流暢になるにはどうするかだ。
    - この再フレームは恥を溶かす。「自分が欠陥だ」という感覚は、魂の知を雑音ではなく知性として扱うことを拒むシステムと政策構造への正確な応答だ。Junkoは、その知性を次に何が来るかへの容量へ変える受け取りの実践を教える。
practice:
  options:
  - id: junko_climate_practice_01
    display_name: 受け取りの実践
    announcement_line: チャネラーJunkoは、気候の更新が身体を閉じ、魂の知が下で走っている瞬間のための5分間の「受け取り」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心は、身体の反応を崩壊の証明として扱うのをやめる。
    - チャネルが開くと魂がすでに知っていることが浮かび、そこから容量が戻る。
  - id: junko_climate_practice_02
    display_name: 受け取りの実践
    announcement_line: チャネラーJunkoは、気候情報で身体が固まり、より深い部分がすでに理解していることに触れたいときのための5分間の「受け取り」を教える。サイドバーにあり、次の行動の前や螺旋が締まったあとなど短時間で使える。
    relief_lines:
    - 魂の知が表面の不安の下に閉じ込められるのをやめる。
    - より深い自己がすでに抱くものとの整列が、次の一歩を見えるようにする。
sdg:
  primary:
    line: 国連はSDG 13のなかで気候行動とレジリエンスの目標を示し、教育と若者の容量構築を含む。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: climate_reality_01
    line: 'The Climate Reality ProjectとYOUNGOは若者向けトレーニングと気候行動への入口を提供している。入口: https://climaterealityproject.org'
  - id: sunrise_movement_01
    line: 草の根の若者組織が次の一歩なら、Sunrise Movementは気候の力を築く若者向けプログラムを運営している。入口：ネットワーク参加。
title_system:
  headline_layer_1:
    options:
    - id: threshold_finality_01
      line: 1.5度は、もはや予報ではない。
    - id: soul_knowing_01
      line: 身体は、心がまだ処理していることをすでに知っている。
  headline_layer_2:
    options:
    - id: junko_climate_headline_01
      line: 日本のチャネラーが気候の苦しみを魂の知と名指し、より深い自己がすでに抱くものを受け取る実践を示す。
    - id: junko_climate_headline_02
      line: チャネラーは若者の気候への反応を不安ではなく魂の正確な知として読み、聴き方を教える。
