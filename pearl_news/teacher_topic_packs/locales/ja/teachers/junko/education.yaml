hook_personal:
  options:
  - id: junko_edu_hook_personal_01
    line: 学びたい気持ちはまだある。同時に、仕組みが本題に入る前にどれだけ注意を浪費するかも知っている──目の前の学習者は、システムが想定した種類の学習者ではない、ということも。
  - id: junko_edu_hook_personal_02
    line: ポータルを開く。集中が途切れる。タブを切り替え、戻る。課題はまだ終わらない。表面の心がアクセスを失った記憶を、魂は運んでいる、という部分も知っている。
  - id: junko_edu_hook_personal_03
    line: 勉強しようと座る。部屋の周波数は、あなたが持ってきた周波数と一致しない。知性は押し通そうとし、身体は押し返す。負荷は素材ではなく──そのずれにある。
  - id: junko_edu_hook_personal_04
    line: 課題は目の前にある。頭は、すでに学校で9時間分の仕事をした。同じ段落を三回読んでも内容が入らない──そして頭で押し通そうとしている部分は、一日中使われすぎた部分だ。
  - id: junko_edu_hook_personal_05
    line: 成績が届き、より深い知っていることの上に乗る──課題そのものは、その評価基準が記録するように作られていない仕方で、あなたはすでに理解していた。表面の心は縮むが、魂の記憶は縮まない。
hook_big_picture:
  options:
  - id: junko_edu_hook_big_01
    line: 若者教育のいまの危機は、主に内容や方法の危機ではない。周波数の危機だ。産業時代の服従のために設計された教室の振動レベルは、前世代より感受性とエネルギー的気づきを多く持って来る若者と両立しにくい。
  - id: junko_edu_hook_big_02
    line: 知性が再生産できるものだけを測る教育システムは、人が知っているものの最小の部分しか測っていない。本当の教育は、より深い知性へのアクセスを目覚めさせることであり、表面の心に情報を足すだけではない。
  - id: junko_edu_hook_big_03
    line: ある周波数のために作られた教室は、別の周波数で来る世代を抱えられない。注意欠如や行動の失敗と読まれるものは、Junkoの枠組みでは制度に分類のない周波数の不一致だ──分類があろうとなかろうと、負荷は本物だ。
  - id: junko_edu_hook_big_04
    line: 測定が「知っていることとして数えるもの」を狭めるとき、評価基準から外れるものは存在しないのではなく──記録されないだけだ。若い学習者が語る危機は、システムが要求するものだけでなく、システムが彼らがすでに運んでいるものを見ていないことの危機でもある。
  - id: junko_edu_hook_big_05
    line: 産業的服従のために作られた教室は、注意が無限に再生する資源であり、身体が脳の乗り物であるような学習者を前提とする。いま通過するコホートはそのどちらでもない。衝突するのは構造的な枠組みであり──診断されるのはコホートのほうだ。
teacher_intro:
  options:
  - id: junko_edu_intro_01
    line: チャネラーJunkoは、日本のチャネリングとライトランゲージの霊性を教える教師として、実践の場で若者が、知性が再生産できるものだけを測るシステムにすでに疲れて学習に到着するのを見てきた。彼女の枠組みでは、いまの若者教育の危機は主に内容や方法の危機ではない──周波数の危機だ。目の前の学生たちは、システムが想定した種類の学習者ではない。
  - id: junko_edu_intro_02
    line: チャネラーJunkoは、自分を従来の意味での教師としては位置づけない。彼女は受け手だ。何十年も、伝送の場で、本当に学びたかったものに座る前に、その日のコンテンツの積み重ねによって知性を使い果たした若者と仕事をしてきた。彼女の伝統は、まったく別の接触の様式を提供する。
  - id: junko_edu_intro_03
    line: チャネラーJunkoは、若い学習者が教室の登録しない周波数を運んで来るのを見てきた。彼女の伝統では、その周波数は欠損やクセではなく──制度が前提とするものと、実際に扉から入ってくるコホートとの隔たりについての情報だ。
  - id: junko_edu_intro_04
    line: Junkoの伝統では、各人は意識がアクセスを失った魂の記憶を運び、本当の教育はそのアクセスを目覚めさせることだ。評価基準で落ちた学生が伝送のセッションに入り、自分が「学習」と呼ぶことを許されてこなかった「知っていること」に気づくのを、彼女は見てきた。
  - id: junko_edu_intro_05
    line: チャネラーJunkoは、いまの時期を「惑星の移行期」として読む──古い学習の構造が、新しいものが形になるよりも速く溶けている時。この枠組みでは、若い学習者の感受性の高まりは病理や注意散漫ではなく──制度がまだ追いついていないカリキュラムへの再調整だ。
youth_somatic:
  options:
  - id: junko_edu_somatic_01
    line: '課題ポータルを開く。集中が途切れる。タブを切り替える。それから戻る、課題はまだ終わらないから。 LOOP_SEQUENCE: "ポータルを開いた。集中が切れた。タブを切り替えた。戻った。"'
  - id: junko_edu_somatic_02
    line: '試験が画面に読み込まれる。あごが固まる。最初の問題を読み、目がうつろになる。吸収せずに下にスクロールする。手は時計が動いていることを知っている。 LOOP_SEQUENCE: "試験が始まった。あごが固まった。スクロールした。"'
  - id: junko_edu_somatic_03
    line: '講義を座って聴くあいだ、許可なく肩が上がっていく。スライドが更新される。身体は40分動いていない。呼吸はそれに合わせて短くなった。 LOOP_SEQUENCE: "講義に座った。肩が上がった。呼吸が短くなった。"'
  - id: junko_edu_somatic_04
    line: '段落の途中でグループチャットが光る。呼吸が止まる。メッセージを確認し、読んでいた糸を失う。読んでいたものはもう入っていなかった──チャットがそのずれに名前をつけただけだ。 LOOP_SEQUENCE: "段落を読んでいた。チャットが光った。糸を失った。"'
  - id: junko_edu_somatic_05
    line: '授業が終わる。廊下に出る。目はロッカーに焦点が合わなくなり、身体はようやく一日を吐き出す。スマホを取り出す。次の何かを抱える余力がもう残っていないから、スクロールが始まる。 LOOP_SEQUENCE: "授業が終わった。目が焦点を失った。スクロールが始まった。"'
teacher_witness:
  options:
  - id: junko_edu_witness_01
    line: Junkoは受け取りに来る人たちのなかで、この連なりを見てきた。彼女の枠組みでは、その断絶は欠如の証拠ではなく──ポータルが提供するよう設計されていない別の種類の接触を、魂が頼んでいる姿だ。
  - id: junko_edu_witness_02
    line: 制度が散漫さを「失敗」と読むのを彼女は見てきた──散漫さこそが信号だったのに。身体は、もう1時間維持すれば何かが折れる周波数に呼び入れられたことを、知っていた。
  - id: junko_edu_witness_03
    line: Junkoは若い学習者が、集中できない自分を「性格の問題」と確信して伝送の場に到着するのを見てきた。そして、身体がそれを「自分の壊れ」ではなく構造的な不一致として読んでいたのだと気づく瞬間も。
  - id: junko_edu_witness_04
    line: 彼女の枠組みでは、ポータル疲労は比喩ではない。知性はその日中、同じ種類の接触で使われすぎてきた。そして魂はずっと、別の層を頼んでいた。受け取りの場は、その頼みが聴かれる唯一の部屋だ。
  - id: junko_edu_witness_05
    line: Junkoは若い学習者が、評価基準が登録しない周波数を抱えて受け取りの場に歩いて来るのを見てきた。そして、その周波数が初めて歓迎されるのを見てきた。彼女の伝統では、その歓迎は治療でもカリキュラムでもない──欠けていた層だ。
turnaround:
  options:
  - id: junko_edu_turnaround_01
    stat_line_1: 650 chapters. US campuses.
    stat_line_2: Active Mindsはいま、米国の大学キャンパスで650以上のピア主導のメンタルヘルス支部を運営し、学生に傾聴サークルの主催を訓練し、学習条件を「私的なレジリエンス」ではなく「インフラ」として扱うよう制度に圧力をかけている。
  - id: junko_edu_turnaround_02
    stat_line_1: 244 million. Out of school.
    stat_line_2: UNESCOのSDG 4モニタリングは、世界で学校に通っていない子ども・若者を2億4,400万人と推定している──教室の周波数の話が測られる基底であり、コホートの負荷が抱えられる規模だ。
  - id: junko_edu_turnaround_03
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: JED財団のJED Campusプログラムは、米国の約五百の大学で包括的なメンタルヘルスと学習条件の枠組みを運営し、ピア支援と教員研修を日常のインフラのなかに組み込んでいる。
  - id: junko_edu_turnaround_04
    stat_line_1: 65 percent. UNICEF Learning Recovery.
    stat_line_2: UNICEFの2024年「学習回復」モニタリングは、世界で高校2年生に相当する学年で基礎的な習熟度に達する生徒が約65%にとどまることを示した──政策が、修辞ではなく資金のある回復プログラムで対応できる、追跡可能なギャップだ。
  - id: junko_edu_turnaround_05
    stat_line_1: $1 billion. Education Cannot Wait.
    stat_line_2: 国連がホストする「危機影響下の教育のためのグローバル基金」Education Cannot Waitは、2016年以来10億ドル以上を動員してきた──標準的な教室制度が構造的に届かなかったコホートに、資金が回された。
bridge:
  options:
  - id: junko_edu_bridge_01
    line: トラッカーは政策の変化やピアプログラムを測る。次の1時間、本当に集中できた理由──表面の心が散らかったときに、魂のレベルから受け取る容量──の欄はない。Junkoの伝統は、各人は魂の記憶を運び、本当の教育は表面の心に情報を足すことではなく、より深い知性へのアクセスを目覚めさせることだとする。
    hidden_capacity: 表面の心が散らかったときに魂のレベルから受け取る
  - id: junko_edu_bridge_02
    line: 追跡された結果は、修了・出席・成績を記録する。それらは、データが捉えられたときに学習者が運んでいた周波数を記録しない。Junkoの枠組みでは、その周波数がデータの届かない層であり──実際の不一致が抱えられている層だ。
    hidden_capacity: データが届かない周波数を登録する
  - id: junko_edu_bridge_03
    line: 指標は評価基準を名指す。評価基準がそもそも読むよう作られていない魂の記憶は名指せない。Junkoの伝統は評価基準を置き換えない──その下の層を名指し、疲れた頭にそれが戻ってくる入口として「受け取り」を示す。
    hidden_capacity: 評価基準が狭まるときも魂の記憶を届く範囲に保つ
  - id: junko_edu_bridge_04
    line: コンテンツは数えられる。教室が伝送する振動は数えられない。Junkoの伝統では、部屋の振動も教えられているものの一部であり──感受性の高い学生は、レッスンを登録する前に部屋の周波数を登録する。
    hidden_capacity: コンテンツと並んで振動を登録する
  - id: junko_edu_bridge_05
    line: 体系は、その体系が測るよう設計されたものを測る。若い学習者が運んで来るより深い知っていることは、設計のなかにはない。Junkoの伝統は設計と争わない──設計に含まれていない層を名指し、その層を部屋に戻す実践を示す。
    hidden_capacity: より深い知っていることを部屋に戻す
teacher_perspective:
  options:
  - id: junko_edu_perspective_01
    header: Junkoが見ていること
    paragraphs:
    - 知性が試験で再生産できるものだけを測る教育システムは、人が知っているものの最小の部分しか測っていない。伝統は、各人が魂の記憶を運び、本当の教育とはそのアクセスを目覚めさせるプロセスであるとする。
    - 若者教育のいまの危機は、主に内容や方法の危機ではない。周波数の危機だ。産業時代の服従のために設計された教室の振動レベルは、感受性の高い若者と両立しにくい。伝統は学校にチャネリングを教えることを求めない──ただ、目の前の学生はシステムが想定した種類の学習者ではないと気づくよう求める。
    - 集中しようとするときに「自分は壊れている、間違っている」と感じるものは、しばしば周波数の不一致への正確な反応だ。受け取りの実践は、システムが知性を使い果たしたときにチャネルを取り戻す。
  - id: junko_edu_perspective_02
    header: Junkoが見ていること
    paragraphs:
    - 教室の周波数は、教えられているものの一部だ。Junkoの伝統では、振動に敏感な若者は、画面のスライドを登録する前に部屋の周波数を登録する。周波数がコホートにとって敵対的であるとき、レッスンはすでに負荷を抱えた身体の上に乗る──そしてその負荷が「注意散漫」と名指される。
    - これは教師への批判ではない。教師もその構造のなかで働く。彼らも自分が教える部屋を設計したわけではない。伝統は、カリキュラムの下の層、実際に「受け取り」が起きるか起きないかが決まる層を名指している。
    - 受け取りの層こそ、Junkoの実践が働く場所だ。それは教育法を置き換えるのではない──その日中、自分の周波数を超えて押し出された学習者にとって、教育法を届く範囲にする。
  - id: junko_edu_perspective_03
    header: Junkoが見ていること
    paragraphs:
    - Junkoの枠組みでは、いまの時期は「惑星の移行期」だ──古い学習の構造が、新しいものが形になるよりも速く溶けている時。ノートパソコンの前に座る若い学習者は、この移行を起こしたわけではない。彼らはそのなかにいる──そして彼らを抱える制度は、いま溶けつつある構造のために作られた。
    - これは耳ざわりの良い再フレームではない。負荷がすぐに引くとは約束しないし、不安定な制度のなかでコホートが不安定に感じることを責めもしない。ただ構造的事実を名指し、「不安定さは私的な失敗だ」と信じる追加の重荷を外す。
    - 伝送の実践では、その重荷を外すことが最初に届く部分であることが多い──魂の記憶へのアクセスを回復する、より深い仕事が始まる前に。
  - id: junko_edu_perspective_04
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統では、アセンデッドマスターと宇宙評議会は、指示ではなく贈り物としてメッセージを届ける高次元のガイドだ。彼らのカリキュラムは教科書のカリキュラムではない──受け手が開いていてチャネルが澄んでいるときに伝送される「知っていること」の層だ。
    - 教科書の積み重ねに疲れた若い学習者にとって、知性が「生み出さなくてよかった」カリキュラムから受け取る経験は、知性が「生み出したもの」で評価される経験と構造的に異なる。教科書は無効にされない。別の層が単に取り戻される。
    - その層を取り戻すことが、Junkoの伝統が何世代も行ってきたことだ。それは学校の代わりではない。それは、学校がそもそも届けるよう作られていない欠けた層だ。
  - id: junko_edu_perspective_05
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統で「ライトランゲージ」は、表面の言葉が届かない部分に触れる、文字どおりの振動的・非線形のコミュニケーションだ。学習に当てはめると、「知っていること」の受け取りは、従来の教室が伝送するよう作られていない層を通して起きる、ということだ。
    - 一日のコンテンツに知性を使われすぎた若い学習者にとって、ライトランゲージの層は、実際の素材がもう一度着地できる場所だ。要点は教科書が間違っているということではない──身体が、教科書が届く様式で受け取る容量を超えて押し出されている、ということだ。
    - 伝統は、もう一つの層を開く実践を示す。教科書のレッスンは変わらない──学習者がチャネルが開いた状態でレッスンに戻り、同じ言葉がふたたび届くようになる。
practice:
  options:
  - id: junko_edu_practice_01
    display_name: 受け取りの実践
    announcement_line: チャネラーJunkoは、ポータルとタブが注意を散らし、課題はまだ終わらないという瞬間のための5分間の「受け取り」の実践を教える。魂は、表面の心が抱えきれないほどのことをすでに知っている。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心は、すべての中断を「失敗の証拠」として扱うのをやめる。
    - チャネルが開いているとき、魂がすでに知っていることが浮かび上がる。
  - id: junko_edu_practice_02
    display_name: タスク間のチャネル・リセット
    announcement_line: チャネラーJunkoは、あるタブから次のタブへの移行の瞬間──知性が、身体が追いつけない速さで文脈を切り替えているとき──のための3分間の「チャネル・リセット」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体は、前のタスクの残りを次のタスクに持ち込まなくなる。
    - チャネルは、新しいタスクが始まる前に開く──うまく行かなくなった後ではなく。
  - id: junko_edu_practice_03
    display_name: ライトランゲージの読書ポーズ
    announcement_line: チャネラーJunkoは、ページの言葉が届かず、表面の心がその吸収率を超えて押し出された瞬間のための4分間の「ライトランゲージの読書ポーズ」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 意味を押し通す前に、素材の振動が受け取られる。
    - 身体が読書が着地できるレジスターに落ちたので、ページが再び届く範囲になる。
  - id: junko_edu_practice_04
    display_name: 魂の記憶の呼び戻し
    announcement_line: チャネラーJunkoは、試験や課題が「自分は本当に知っていることを知らない」という確信を引き起こした瞬間のための4分間の「魂の記憶の呼び戻し」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 知性は、学習者が頼める唯一の源ではなくなる。
    - 学習者が部屋に持ってきたより深い知っていることが、ふたたびアクセス可能になる。
  - id: junko_edu_practice_05
    display_name: 授業前の周波数調律
    announcement_line: チャネラーJunkoは、教室に入る前、講義にログインする前──身体が、自分自身のレジスターのまま部屋に入る必要があるとき──のための3分間の「授業前の周波数調律」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 学習者は部屋の周波数を借りずに、自分の周波数のまま入る。
    - レッスンは一日の蓄積した負荷の上ではなく、調律された身体の上に着地する。
sdg:
  primary:
    line: 国連の枠組みはSDG 4を通じて、ウェルビーイングと包摂的な学習条件を質の高い教育の一部とする。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: junko_edu_cta_01
    line: 'Active Mindsは米国のキャンパスで650以上のピア主導のメンタルヘルス支部を運営し、注意を無限の資源として扱わない学習条件のために活動している。入口: activeminds.org'
  - id: junko_edu_cta_02
    line: 'The Jed FoundationはJED Campusを運営しており、いまでは米国の約五百の大学に組み込まれた包括的なメンタルヘルスと学習条件の枠組みだ。入口: jedfoundation.org'
  - id: junko_edu_cta_03
    line: 'UNESCOのGlobal Education Coalitionは、学習回復とアクセスについて多国間・NGO・民間セクターの対応を集約する。入口: globaleducationcoalition.org'
  - id: junko_edu_cta_04
    line: 'The Trevor Projectは25歳未満のLGBTQ+の若者向けに無料24時間の危機支援を提供し、同じコホートのための安全な学校環境を主張する。STARTを678-678にテキスト。入口: thetrevorproject.org'
  - id: junko_edu_cta_05
    line: 'Education Cannot Waitは、危機影響下の教育のための国連ホストのグローバル基金で、2016年以来10億ドル以上を動員してきた──標準的な教育構造が届かないコホートのために。入口: educationcannotwait.org'
title_system:
  headline_layer_2:
    options:
    - id: junko_edu_headline_01
      line: 日本のチャネラーが教育のストレスを周波数の危機と読み、チャネルを開く実践を示す。
    - id: junko_edu_headline_02
      line: 学生の欠如ではなく教室の不一致──チャネリングの伝統が評価基準には見えないものを名指す。
    - id: junko_edu_headline_03
      line: 魂は評価基準が読むよう作られていない記憶を運ぶ──Junkoが語る「欠けたカリキュラム」。
    - id: junko_edu_headline_04
      line: もっとコンテンツではなく受け取り──チャネラーが、知性を使われすぎた学習者にもたらすもの。
    - id: junko_edu_headline_05
      line: 教室が伝送するよう作られていなかった周波数で到着する世代──Junkoが語る「惑星の学習者」。
