hook_personal:
  options:
  - id: junko_econ_hook_personal_01
    line: シフトのたびに、不確実性を成熟として演じろと求められる。それでも前に進み、その裏にどれだけ隠れた努力があるか知っている──摩擦は、魂が来た目的とスケジュールアプリが要求することのあいだにある、という部分も。
  - id: junko_econ_hook_personal_02
    line: シフトアプリを確認する。胃が沈む。また更新し、スクショする。価値は成果で決まらないのに、仕組みは人間の価値を生産性指標へ還元し続ける。
hook_big_picture:
  options:
  - id: junko_econ_hook_big_01
    line: 経済ストレスはいま、不安定な条件下での自己管理として降りる。雇われ続け、柔軟であり、冷静でいろ。若者が不安定さについて感じる不安の一部は、魂レベルの目的の理解と、目的と無関係なシステムレベルの成功の定義との摩擦だ。
  - id: junko_econ_hook_big_02
    line: 惑星の移行には、搾取と欠乏の上に築かれた経済構造の崩壊が含まれる。不安定を生きる若い労働者は旧パラダイムの溶解のなかにいる。伝統は新しいものが痛みなく来るとは約束しないが、古いものにしがみつくほうがより苦しみを増やすと言い切る。
teacher_intro:
  options:
  - id: junko_econ_intro_01
    line: チャネラーJunkoは、日本のチャネリングとライトランゲージの霊性を教える教師として、実践の場で若者が仕事の不安定さをまるで自己価値の判決のように抱えるのを見てきた。彼女の枠組みでは、経済的な不安定さへの不安の一部は、システムの成功の定義が目的と無関係だと魂が認識していることでもある。
youth_somatic:
  options:
  - id: junko_econ_somatic_01
    line: 'シフトアプリを確認する。胃が沈む。また更新する。シフトが目の前で変わる前にスクショする。 LOOP_SEQUENCE: "アプリを見た。胃が沈んだ。更新した。スクショした。"'
teacher_witness:
  options:
  - id: junko_econ_witness_01
    line: Junkoは、受け取りに来る人たちのなかで、この仕事のループそのものを見てきた。彼女の枠組みでは、安定への欲求は弱さではなく、目覚めと貢献へ向けられた仕事ならどう見えるかを魂が問う合図だ。
turnaround:
  options:
  - id: junko_econ_turnaround_01
    stat_line_1: Youth-led campaigns and coalitions.
    stat_line_2: 若い労働者はフェアなシケジュール、透明性、不安定さを性格試験として扱わない条件のためのワークショップを主催し、組織している。
bridge:
  options:
  - id: junko_econ_bridge_01
    line: トラッカーは政策の勝利と集合的行動を測る。次の勤務日を可能にしたもの──生産性指標に人間の価値を還元するシステムに魂が疲れきったとき、導きを受け取る容量──の欄はない。Junkoの伝統は、惑星の移行に搾取と欠乏の経済の崩壊が含まれると捉える。受け取りの実践は経済を直すのではなく、次の通知に目的が飲み込まれる前にチャネルを戻す。
    hidden_capacity: 生産性指標に目的が飲み込まれる前に導きを受け取る
teacher_perspective:
  options:
  - id: junko_econ_perspective_01
    header: Junkoが見ていること
    paragraphs:
    - 魂はキャリアパスを最適化するために転生したのではない。学び、奉仕し、目覚めるために来た。生産性指標に人間の価値を還元する経済に閉じ込められた若者に、伝統は急進的な再フレームを示す。価値は成果で決まらず、経済的不安の一部は魂レベルの目的と、目的と無関係なシステムの成功定義との摩擦だ。
    - 惑星の移行には、流れと豊かさではなく搾取と欠乏の上に築かれた経済構造の崩壊が含まれる。不安定を生きる若い労働者は旧経済パラダイムの溶解のなかにいる。伝統は新しいものが痛みなく来るとは約束しないが、古い構造にしがみつくほうがより苦しみを増やすと言い切る。
    - 「自分が欠陥だ」と感じることは、しばしば目覚めと貢献へ向けられた仕事がどう見えるかをシステムが一度も問わなかったことへの、魂レベルで正確な反応だ。受け取りの実践は、アプリに知性を使い果たしたあとチャネルを戻す。
practice:
  options:
  - id: junko_econ_practice_01
    display_name: 受け取りの実践
    announcement_line: チャネラーJunkoは、シフトアプリが次の通知に価値を結びつけ、魂が別の答えを求めている瞬間のための5分間の「受け取り」を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心は、シフトのたびに自己価値の判決へ変換するのをやめる。
    - チャネルが開いているとき、魂がすでに知っている目的が浮かび上がる。
sdg:
  primary:
    line: 国連の枠組みではSDG 8を通じて、体面のある仕事、公正な雇用、労働者のウェルビーイングの保護が含まれる。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: junko_econ_cta_01
    line: '若者主導の労働とフェアワークの団体が、シケジュールと労働の尊厳について集合的行動への入口を提供している。入口: 地域支部とキャンペーンからネットワーク参加。'
title_system:
  headline_layer_2:
    options:
    - id: junko_econ_headline_01
      line: 日本のチャネラーが仕事の不安定さを魂の目的の摩擦と読み、チャネルを開く実践を示す。
