hook_personal:
  options:
  - id: junko_econ_hook_personal_01
    line: シフト交代のたびに、不確かさを成熟のように扱えと言われる。続けながら、それにどれだけの隠れた努力がかかるかを知っている──そして魂が来てやろうとしていることと、スケジュールアプリが要求していることとのあいだに摩擦がある、という部分も知っている。
  - id: junko_econ_hook_personal_02
    line: スケジュールアプリを確認する。胃が落ちる。再読み込みしてスクリーンショットを撮る。あなたの価値はアウトプットでは決まらない。それでも体系は人間の価値を生産性指標に還元し続ける。
  - id: junko_econ_hook_personal_03
    line: 役割の説明は、その仕事を生きたことがない誰かが書いた。それでも仕事はやる。説明に自分を合わせようとしている部分は、使われすぎた部分だ──そして下にある本当の仕事を知っている部分は、口を開く許可をまだ得ていない。
  - id: junko_econ_hook_personal_04
    line: 通知が午後11時に来る。開かないほうがましだと思って開く。シフトがまた変わった。身体は「選ばれずに利用可能であれ」と求められてきた──そして身体はその点数をつけ続けている。
  - id: junko_econ_hook_personal_05
    line: 給与が振り込まれ、より深い知っていることの上に乗る──数字が認識する以上のものをあなたは生み出した、そして生産性指標は、あなたが本当に運んだものを登録するように作られていなかった。数字は縮むが、魂レベルの価値は縮まない。
hook_big_picture:
  options:
  - id: junko_econ_hook_big_01
    line: 経済的ストレスはいま、不安定な条件下での自己管理として届く──雇用可能であれ、柔軟であれ、冷静であれ。若者が不安定さに感じる不安は、ある程度、魂レベルの目的の理解と、目的とは何の関係もない体系的な成功の定義とのあいだの摩擦だ。
  - id: junko_econ_hook_big_02
    line: 惑星の移行期は、抽出と希少性に基づく経済構造の崩壊を含む。不安定さを経験している若い労働者は、古いパラダイムの溶解を生きている──そして伝統は新しいパラダイムが痛みなく来ると約束しないが、古いものにしがみつくとより苦しみが増す、と主張する。
  - id: junko_econ_hook_big_03
    line: 抽出モデルはまだ崩壊し終わっていないが、その代償はすでに、そのモデルを作ったことに最も責任のないコホートに吸収されている。若い労働者が運ぶ負荷は、一つの仕事の負荷ではない──置き換えが形になる前に溶解している、ある「パラダイムの感じられる端」だ。
  - id: junko_econ_hook_big_04
    line: AI代替不安は、Junkoの枠組みでは、見える形になった周波数のずれだ──魂が来てやろうとしているまさにその仕事の次元で、それを上回る生産性を出すよう最適化された道具と競うことを求められている世代。脅威は道具ではなく、道具が点数化するよう作られた指標だ。
  - id: junko_econ_hook_big_05
    line: 希少性のパラダイムは希少性の行動を生む──買いだめ、ゲートキーピング、生産性の最大化。伝統は豊かさをロマン化しないが、希少性に形作られた制度から魂の形をした生を引き出そうとすることの代償を名指す。
teacher_intro:
  options:
  - id: junko_econ_intro_01
    line: チャネラーJunkoは、日本のチャネリングとライトランゲージの霊性を教える教師として、実践の場で若者が仕事の不安定さを「価値の判決」のように抱えているのを見てきた。彼女の枠組みでは、経済的不安定さに対する不安は、体系の成功定義が目的と何の関係もないことを魂が認識している姿だ。
  - id: junko_econ_intro_02
    line: チャネラーJunkoは、自分を従来の意味での教師としては位置づけない。彼女は受け手だ。何十年も、伝送の場で、自分の魂が実際に来てやろうとしたことを認識する前に、生産性指標によって職業を狭められてきた若者と仕事をしてきた。
  - id: junko_econ_intro_03
    line: チャネラーJunkoは、若い労働者がスケジュールアプリの登録しない「天職」を抱えて来るのを見てきた。彼女の伝統では、その天職は趣味やサイドプロジェクトではない──それは魂が来てやろうとした実際の仕事であり、それを登録しないことは制度の失敗であって労働者の失敗ではない。
  - id: junko_econ_intro_04
    line: Junkoの伝統では、各人は意識が直接アクセスを失った「魂レベルの目的」を運び、問いは「生計のために何をすべきか」ではなく「この魂は何をしにここに来たのか」だ。受け取りの場でその問いが届き、若者がしばしば初めて、自分は答えをずっと知っていたのだと気づくのを彼女は見てきた。
  - id: junko_econ_intro_05
    line: チャネラーJunkoはいまの時期を「惑星の移行期」として読む──抽出経済が、置き換え構造が形になるよりも速く溶解している時。この枠組みでは、若い労働者の職業的混乱は病理ではない──まだ発明されていない仕事のかたちへの再調整だ。
youth_somatic:
  options:
  - id: junko_econ_somatic_01
    line: 'スケジュールアプリを確認する。胃が落ちる。再読み込みする。それからシフトが変わる前にスクリーンショットを撮る。 LOOP_SEQUENCE: "アプリを開いた。胃が落ちた。再読み込みした。スクショを撮った。"'
  - id: junko_econ_somatic_02
    line: '給与が午後11時53分に振り込まれ、身体が追いつく前に目はもう数字の上にある。あごが固まる。電卓アプリを開く──頭ではもう計算が走っているから。 LOOP_SEQUENCE: "振り込みが来た。あごが固まった。電卓を開いた。"'
  - id: junko_econ_somatic_03
    line: '明日のシフトは午前5時だ。アラームをセットする。身体はもう知っている。あなたは時間どおりに眠らない。肩はすでに明日のなかにある。 LOOP_SEQUENCE: "アラームをセットした。肩が上がった。眠れない。"'
  - id: junko_econ_somatic_04
    line: 'アプリが鳴る。決める前に身体がびくっとする。立ったままメッセージを読む──また座ったら「これが今のリズムだ」と認めることになるから。呼吸は胸にとどまる。'
  - id: junko_econ_somatic_05
    line: '玄関のドアを開ける前に、頭の中で家賃計算が走る。身体はもう計算を終え、今月できないことを身体は教えてきた。一日はまだ始まっていない。'
teacher_witness:
  options:
  - id: junko_econ_witness_01
    line: Junkoは、受け取りに来る人たちのなかで、この仕事のループそのものを見てきた。彼女の枠組みでは、その安定への必要は弱さではなく──地位や安全ではなく目覚めと貢献に向かう仕事はどう見えるか、と魂が問うている姿だ。
  - id: junko_econ_witness_02
    line: 彼女は、若い労働者が「職業的な混乱は計画の私的失敗だ」と確信して受け取りの場に到着するのを見てきた。彼女の伝統では、その混乱が信号だ──魂が、自分が来てやろうとしなかった機能に身体を委ねるのを拒否している。
  - id: junko_econ_witness_03
    line: Junkoは、若い労働者が今いる仕事を最適化しようとするのをやめ、その下にある仕事に耳を傾け始める瞬間を見てきた。彼女の伝統では、その瞬間は「辞めること」ではない──「受け取り」だ。そして受け取りは、生産性指標が登録するように作られていなかった層だ。
  - id: junko_econ_witness_04
    line: 彼女の枠組みでは、スケジュールアプリのループは故障ではない。それは制度が記録するのを拒んでいるスコアを、身体が記録している姿だ──「選ばれずに利用可能であれ」と求められた代償を登録し、まだ開かれている唯一の信号を通じて別の契約を求めている。
  - id: junko_econ_witness_05
    line: Junkoは、若い労働者が、履歴書では記述できない天職を抱えて受け取りの場に入って来て、その天職が初めて歓迎されるのを見てきた。彼女の伝統では、その歓迎は「キャリア相談」ではない──従来の仕事の枠組みが届くよう作られていなかった層だ。
turnaround:
  options:
  - id: junko_econ_turnaround_01
    stat_line_1: $15 minimum wage. 11 states.
    stat_line_2: 2012年にファストフード労働者が始めたFight for $15運動は、いまや米国の11州と数十都市で15ドル以上の最低賃金を勝ち取った──このコホートが組織する前には存在しなかった賃金の底を築いてきた。
  - id: junko_econ_turnaround_02
    stat_line_1: 73 million. ILO youth unemployment.
    stat_line_2: 国際労働機関(ILO)の「世界の雇用と社会展望2024」は、世界の若者の失業を約7,300万人と見積もる──若者の職業政策が測られる多国間の追跡上の底であり、コホートの負荷の規模だ。
  - id: junko_econ_turnaround_03
    stat_line_1: 1,200+ co-ops. USFWC.
    stat_line_2: 米国の労働者協同組合連合(USFWC)はいま、国内で1,200を超える民主的に所有された労働者協同組合を数える──スケジュールアプリを受け取る労働者が、それを書く側にもなるという、小さいが成長している代替モデルだ。
  - id: junko_econ_turnaround_04
    stat_line_1: 7 cities. Fair Workweek.
    stat_line_2: シアトル、ニューヨーク、サンフランシスコを含む米国7都市はいま「Fair Workweek法」を持ち、予測可能なシフト、事前通知、変更時の予測補償を義務づけている──このコホートが先に名指したスケジュールアプリの不安定さに直接対応する政策の道具だ。
  - id: junko_econ_turnaround_05
    stat_line_1: EU Platform Workers Directive. 27 states.
    stat_line_2: EUは2024年に「プラットフォーム労働者指令」を採択し、27加盟国にギグ・プラットフォーム労働者への雇用保護の拡張を義務づけた──アルゴリズム的なシフト制御を、規制可能な労働条件として扱う最初の多国間制度だ。
bridge:
  options:
  - id: junko_econ_bridge_01
    line: トラッカーは政策の勝利と集合的行動を測る。次の一日の仕事を可能にしたもの──人間の価値を生産性指標に還元する体系に魂が疲れたときに、導きを受け取る容量──の欄はない。Junkoの伝統は、惑星の移行期は抽出と希少性に基づく経済構造の崩壊を含むとする。受け取りの実践は経済を直すものではない──次の通知に目的を呑み込まれないようにチャネルを取り戻すものだ。
    hidden_capacity: 生産性指標に目的を呑み込まれないように導きを受け取る
  - id: junko_econ_bridge_02
    line: 数字はコホートが築いた賃金の底を示す。その下にある「魂の目的」──労働者が本当にここに来てやろうとした仕事、賃金の底が測るように作られていなかったもの──は示さない。Junkoの伝統は賃金の底と争わない──賃金の底が届かない層を名指す。
    hidden_capacity: 賃金の底の下にある「魂の目的」を見えるように保つ
  - id: junko_econ_bridge_03
    line: データはシフト、時間、賃金を捉える。それはシフトのなかに自分の意図を持って入ってきた「天職」を捉えられない。Junkoの枠組みでは、その天職がデータの届かない層であり──タイムカードが何を記録しようと、仕事が実際に起きている層だ。
    hidden_capacity: タイムカードが記録できない天職を登録する
  - id: junko_econ_bridge_04
    line: 生産性指標は測定できる。労働者にとってのその仕事の意味は測定できない。Junkoの伝統は測定と争わない──その下の層、魂がその仕事は何のためかという記憶を運ぶ層で働く。
    hidden_capacity: 生産性指標の下の層で働く
  - id: junko_econ_bridge_05
    line: 構造、政策、プラットフォームは数えられる。その下の「魂の仕事」は数えられない。Junkoの伝統は構造的な労働改革を置き換えない──制度の対応が届くよう設計されていない層を名指し、入口として「受け取り」を示す。
    hidden_capacity: 労働改革が届かない層を名指す
teacher_perspective:
  options:
  - id: junko_econ_perspective_01
    header: Junkoが見ていること
    paragraphs:
    - 魂はキャリアパスを最適化しに肉体に入ったのではない──学び、奉仕し、目覚めにここに来た。人間の価値を生産性指標に還元する経済システムに囚われた若者にとって、伝統は根本的な再フレームを提供する──あなたの価値はアウトプットでは決まらない、そして経済的不安定さに対する不安は、ある程度、魂レベルの目的の理解と、目的とは何の関係もない体系的な成功の定義とのあいだの摩擦だ。
    - 惑星の移行期は、流れと豊かさではなく、抽出と希少性に基づいて作られた経済構造の崩壊を含む。不安定さを経験している若い労働者は、古い経済パラダイムの溶解を生きている。伝統は新しいパラダイムが痛みなく来ると約束しない──しかし、古いものの構造にしがみつくとより苦しみが増す、と主張する。
    - 集中しようとするときに「自分は壊れている、間違っている」と感じるものは、しばしば、目覚めと貢献に向かう仕事はどう見えるかを一度も問うたことのない体系への、魂レベルの正確な反応だ。受け取りの実践は、知性がスケジュールアプリに使われ尽くしたときにチャネルを取り戻す。
  - id: junko_econ_perspective_02
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統で「天職」は、魂が本当に来てやろうとした仕事だ──それは「ジョブ」と同義ではない。天職はジョブの内側で生きられることも、ジョブに逆らって生きられることも、ジョブが認識しない空間で生きられることもある。伝統が問うのは「あなたのキャリアパスは何か」ではなく「あなたの魂は何をしにここに来たのか、そして今の取り決めはそのうちのどれだけを許しているのか」だ。
    - 多くの若い労働者が語る摩擦は、怠惰でも混乱でもない。それは天職が、それを登録するように作られていなかった生産性指標を押し返している姿だ。指標は、ひとりの労働者の受け取りの実践のために変わるわけではない──しかし受け取りは、労働者が「指標の判決を仕事の真実だ」と取り違えるのをやめさせる。
    - そこから、以前は見えなかった選択肢が見えるようになる。仕事はそのままかもしれない。しかし労働者はもう、指標の人質ではない。
  - id: junko_econ_perspective_03
    header: Junkoが見ていること
    paragraphs:
    - Junkoの枠組みでは、いまの時期は「惑星の経済的な移行期」だ──抽出経済が、置き換え構造が形になるよりも速く溶解している時。二つのパートタイムと、もう一つのアプリベースのサイドギグを抱える若い労働者は、この移行を起こしたわけではない──彼らはそのなかにいて、彼らを抱える労働市場は、いま溶解している構造のために作られた。
    - これは耳ざわりの良い再フレームではない。安定がすぐに来るとは約束しないし、不安定な労働市場のなかでコホートが不安定に感じることを責めもしない。ただ構造的事実を名指し、「不安定さは計画の私的失敗だ」と信じる追加の重荷を外す。
    - 伝送の実践では、その重荷を外すことが最初に届く部分であることが多い──魂が本当にやろうとして来たことを見つけるより深い仕事が始まる前に。
  - id: junko_econ_perspective_04
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統では、アセンデッドマスターと宇宙評議会は、指示ではなく贈り物としてメッセージを届ける高次元のガイドだ。彼らの天職に関する導きは、履歴書の導きではない。それは指標のために最適化しない──それは、生産性のトラッカーが言語を持たない語彙で、しばしば魂が来てやろうとした仕事を名指す。
    - 生産性のトラッカーが測るものと、シフトを通じて実際に運ぶものとのあいだのギャップに疲れた若い労働者にとって、生産性のトラッカーではない導き源から「受け取られる」経験は、構造的に異なる。シフトは変わらない──しかし、何が「仕事」と名指されるかが変わる。
    - 「測られる」のではなく「受け取られる」──この区別こそ、従来のキャリアインフラが再現できないものであり、Junkoの伝統が何十年も固有のものとして抱えてきたものだ。
  - id: junko_econ_perspective_05
    header: Junkoが見ていること
    paragraphs:
    - Junkoの伝統で「ライトランゲージ」は、表面の言葉が届かない部分に触れる、文字どおりの振動的・非線形のコミュニケーションだ。仕事に当てはめると、天職の実際の受け取りは、従来のキャリアの会話が動作するよう作られていない層を通して起きる、ということだ。
    - その日のシフト変更、給与、指標の判決という内容に知性を使われすぎた若い労働者にとって、ライトランゲージの層は、魂が来てやろうとした仕事がもう一度聴かれる場所だ。要点はジョブが間違っているということではない──身体が、生産性のトラッカーが届く様式で天職を受け取る容量を超えて押し出されている、ということだ。
    - 伝統は、もう一つの層を開く実践を示す。仕事はまったく変わらないかもしれない。しかし労働者は、チャネルが開いた状態でジョブに戻り、ジョブと天職が一致しているかという問いが、指標の内側からではなく労働者の内側から答えられるようになる。
practice:
  options:
  - id: junko_econ_practice_01
    display_name: 受け取りの実践
    announcement_line: チャネラーJunkoは、スケジュールアプリが次の通知に価値を結びつけ、魂が別の種類の答えを求めている瞬間のための5分間の「受け取り」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心はすべてのシフト変更を価値の判決に変換するのをやめる。
    - チャネルが開いているとき、目的について魂がすでに知っていることが浮かび上がる。
  - id: junko_econ_practice_02
    display_name: スケジュールアプリの小休止
    announcement_line: チャネラーJunkoは、通知が届いた後、心が追いつく前に身体がすでに計算を終えている瞬間のための3分間の「スケジュールアプリの小休止」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 身体は次のシフトが実際に来る前にそれを抱えるのをやめる。
    - 労働者は次の決定に、不安先取りではなく現在のまま到着する。
  - id: junko_econ_practice_03
    display_name: 天職のためのライトランゲージ
    announcement_line: チャネラーJunkoは、履歴書の言葉やジョブの説明の言葉が使われすぎ、魂が別のレジスターで聴かれる必要がある瞬間のための7分間の「天職のためのライトランゲージ」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 履歴書の下にある天職が、ふたたび聴こえるようになる。
    - 疲れた知性が休んでよくなり、振動の層が独自の仕事をする。
  - id: junko_econ_practice_04
    display_name: 目的についてのアセンデッドカウンシルへの問い
    announcement_line: チャネラーJunkoは、キャリアの問いが円を描いて回り、労働者が指標に問うのではなく指標が届かない導き源に問うべき瞬間のための4分間の「目的についてのアセンデッドカウンシルへの問い」の実践を教える。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 問いは「履歴書を通して解くもの」ではなくなり、「履歴書が含まない導き源に差し出すもの」になる。
    - 届くものは別の最適化の積み重ねではなく、受け取りそのものだ。
  - id: junko_econ_practice_05
    display_name: シフト前の周波数調律
    announcement_line: チャネラーJunkoは、打刻する前、身体がスケジュールアプリのではなく自分自身のレジスターのままシフトに入る必要がある瞬間のための3分間の「シフト前の周波数調律」を示す。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 労働者は職場の周波数を借りずに、自分の周波数のままシフトに入る。
    - シフトは一日の蓄積した負荷の上ではなく、調律された身体の上に着地する。
sdg:
  primary:
    line: 国連の枠組みはSDG 8を通じて、ディーセントワーク、公正な雇用、労働者のウェルビーイングの保護を含む。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: junko_econ_cta_01
    line: 'Fight for $15はファストフードなど低賃金労働者を組織し、米国の11州で15ドル最低賃金を勝ち取ったキャンペーンを展開している。入口: fightfor15.org'
  - id: junko_econ_cta_02
    line: '米国労働者協同組合連合(USFWC)は、国内で1,200以上の民主的に所有された労働者協同組合をつなぎ、スケジュールアプリを受け取る労働者がそれを書く側にもなるモデルを示す。入口: usworker.coop'
  - id: junko_econ_cta_03
    line: 'Coworker.orgは、職場のどこででも労働者が、正式な労組ステップを必須にせずに、スケジュール・賃金・条件の変更を求めるキャンペーンを組織するのを助けるプラットフォームだ。入口: coworker.org'
  - id: junko_econ_cta_04
    line: 'Fair Workweek Initiativeは、予測可能なシフトの法律を可決した米国7都市を追跡・支援し、他地域の組織者が同じ政策を追求するのを助ける。入口: fairworkweek.org'
  - id: junko_econ_cta_05
    line: 'ILOの「ディーセントワーク・アジェンダ」と世界の若者雇用モニタリングは、各国の政策チームが労働条件の決定の多国間の底として使う。入口: ilo.org/decentwork'
title_system:
  headline_layer_2:
    options:
    - id: junko_econ_headline_01
      line: 日本のチャネラーが仕事の不安定さを「魂の目的」の摩擦として読み、チャネルを開く実践を示す。
    - id: junko_econ_headline_02
      line: 価値は生産性指標ではない──チャネリングの伝統がスケジュールアプリの下にある「天職」を名指す。
    - id: junko_econ_headline_03
      line: 受け手であり教師ではない者が、従来のキャリアインフラが届くよう作られていなかった仕事の層について語る。
    - id: junko_econ_headline_04
      line: 計画の私的失敗ではなく、惑星の経済的な移行──Junkoが負荷を抱えるコホートについて語る。
    - id: junko_econ_headline_05
      line: 生産性ではなく受け取り──指標で評価される世代に、アセンデッドカウンシルがもたらすもの。
