hook_personal:
  options:
  - id: master_sha_mh_hook_personal_01
    line: 誰かが名指す前に螺旋を知っている。一日を運びながら、心がこのペースを保てるかどうかますます確信が持てない──流れを何かが塞いでいるように感じる。
  - id: master_sha_mh_hook_personal_02
    line: 見ないほうがましに感じるから更新を読み続ける。螺旋が身体に何をしているか──加速、置く、戻る──も知っている。
hook_big_picture:
  options:
  - id: master_sha_mh_hook_big_01
    line: 若者のメンタル過負荷は症状だけではない。絶え間ない圧が注意、休息、機能し続ける能力に何をするか──螺旋が走っているとき、閉塞を何が晴らすか。
  - id: master_sha_mh_hook_big_02
    line: 機関は過負荷を正常化し、若者がそれを私的欠陥として扱い始める。伝統は別の名を持つ。コンパッションで迎え、晴らせる閉塞だ。
teacher_intro:
  options:
  - id: master_sha_mh_intro_01
    line: ジー・ガン・シャ師（Dr. and Master Zhi Gang Sha）は、数十年にわたりTao SourceとSoulfulnessを教え、実践の場で若者がメンタル過負荷を本当の苦しみと、伝統が正確に名指す閉塞の両方として抱えるのを見てきた。壊れているかどうかではない。螺旋が自分自身への判決のように感じるのをやめたいと問うている。Tao Sourceの枠組みでは、閉塞は力ではなく、魂に導かれた注意と自己への最大のコンパッションの実践で晴らせる。
youth_somatic:
  options:
  - id: master_sha_mh_somatic_01
    line: '真夜中に更新を読む。心が加速する。スマホを置く。また拾う。螺旋はすでに回っていたから。

      LOOP_SEQUENCE: "更新を読んだ。心が加速した。スマホを置いた。また拾った。"'
teacher_witness:
  options:
  - id: master_sha_mh_witness_01
    line: Master Shaは受講者のなかでこのループそのものを見てきた。警告、心の加速、スマホを置く、同じ圧が注意を引き戻す。彼の枠組みではその圧は性格ではない。黄金の光とコンパッションで迎えられる閉塞である。
turnaround:
  options:
  - id: master_sha_mh_turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 若者オーガナイザーがピアの輪を開き、キャンペーンを組織し、学校にメンタルヘルス支援をインフラとして扱わせ、私的弱さではないと迫っている。
bridge:
  options:
  - id: master_sha_mh_bridge_01
    line: 320 campuses. 18 countries. トラッカーは若者がつくったワークショップとピアの輪を測る。もう一週の過負荷のあと、次の正直な手を伸ばすことを可能にしたもの──思考の奔流すべてを自己像に変える閉塞を晴らす容量──の欄はない。次の輪を開いた学生に要った。スマホを置き、また拾った人にも要る。Master Shaの伝統は何世代も黄金の光と最大のコンパッションで閉塞を洗ってきた。
    hidden_capacity: 明晰さが螺旋に飲み込まれないよう閉塞を晴らす
teacher_perspective:
  options:
  - id: master_sha_mh_perspective_01
    header: Master Shaが見ていること
    paragraphs:
    - 感情・エネルギー・関係の閉塞が、ウェルビーイングの自然な流れを妨げる。若者にとって主要な閉塞は性格欠陥ではなく、恐れ、拒否、十分なコンパッションに出会わなかった未処理の喪失の積み重ねである。
    - Tao Sourceの教えは、これらの閉塞を力ではなく、まず自己に向けた最大の愛、最大の許し、最大のコンパッションの実践で晴らせると説く。Soulfulness──魂に導かれた瞑想の実践──は、心だけが知ではないことを教える。魂は心がまだ争っていることを知っている。
    - 再フレームは実用的だ。「自分が壊れている、混乱している」に感じることは、適切な注意に一度も出会わなかったシステムと制度が生んだ閉塞であることが多い。自分を誤る証明をする代わりに、圧を生んだ構造を見られる。伝統は螺旋が戻らないと約束しない。戻ったとき流れを取り戻す実践を示す。
practice:
  options:
  - id: master_sha_mh_practice_01
    display_name: Tao Source ゴールデンライトの実践
    announcement_line: Master Shaは5分間のTao Sourceゴールデンライトの実践を教える。螺旋が走り、明晰さが閉塞られたように感じる瞬間のため。Tao Sourceからの黄金の光が、力では動かせないものを洗う。サイドバーに時間どおりステップ付きで載せている。
    relief_lines:
    - あらゆる思考が自己像に変わる閉塞がやわらぐ。
    - 次の正直な手を伸ばすだけの流れが戻る。
sdg:
  primary:
    line: 国連の枠組みはSDG 3のなかでメンタルヘルスとウェルビーイングを含み、支援へのアクセスと機能する容量は同じ目標の一部である。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: master_sha_mh_cta_01
    line: '自分や誰かが支援を必要とするなら、Crisis Text Lineが無料で24時間対応する。入口: HOMEと741741にテキスト。次の一歩が地域からグローバルへのネットワークなら、UNA-USAが同じ枠組みで動いている。'
title_system:
  headline_layer_2:
    options:
    - id: master_sha_mh_headline_01
      line: Tao Sourceの教師がメンタル過負荷を閉塞として名指し、流れを取り戻す実践を示す。
