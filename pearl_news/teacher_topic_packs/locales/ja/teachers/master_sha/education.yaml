hook_personal:
  options:
  - id: master_sha_edu_hook_personal_01
    line: まだ学びたい。仕事が始まる前にシステムがどれだけ注意を浪費するか、散らばりがどれだけ自分への判決のように感じるかも知っている。
  - id: master_sha_edu_hook_personal_02
    line: ポータルを開く。集中が切れる。タブを切り替えて戻る。課題はまだ片付けなければならず、意図と次の正直な一区切りのあいだに何かが流れを塞いでいる。
hook_big_picture:
  options:
  - id: master_sha_edu_hook_big_01
    line: 教育ストレスは量だけではない。中断だらけのシステムが注意、自信、学びとつながり続ける能力に何をするか──散らばりがそれを塞いだとき、源とのつながりをどう取り戻すか。
  - id: master_sha_edu_hook_big_02
    line: システムが注意を無限の資源として扱うと、学ぶべきことと学生のあいだの流れに閉塞が生まれる。伝統にはそれを晴らす実践がある。
teacher_intro:
  options:
  - id: master_sha_edu_intro_01
    line: ジー・ガン・シャ師（Dr. and Master Zhi Gang Sha）は、数十年にわたりTao SourceとSoulfulnessを教え、実践の場で若者が課題にたどり着く前から、ただそこにとどまる努力ですでに疲れ切っているのを見てきた。学校が大事かどうかではない。散らばった注意を私的失敗として扱うのをやめたいと問うている。Tao Sourceの枠組みでは、その散らばりはしばしば閉塞であり、魂を部屋に招き戻せば晴らせる。
youth_somatic:
  options:
  - id: master_sha_edu_somatic_01
    line: '課題ポータルを開く。集中が切れる。タブを切り替える。また戻る。課題はまだ片付けなければならないから。

      LOOP_SEQUENCE: "ポータルを開いた。集中が切れた。タブを切り替えた。戻った。"'
teacher_witness:
  options:
  - id: master_sha_edu_witness_01
    line: Master Shaは受講者のなかでこの順序を見てきた。課題が開き、注意が砕け、タブが変わり、同じ負担のシステムのなかで努力が再起動する。彼の枠組みではその断裂は欠陥の証ではない。黄金の光と源への回帰で応える閉塞である。
turnaround:
  options:
  - id: master_sha_edu_turnaround_01
    stat_line_1: Campuses and districts worldwide.
    stat_line_2: 学生と若者がキャンペーンを組織し、メンタルヘルス支援、ピアリスニング、注意を無限資源として扱わない学びの条件を主催している。
bridge:
  options:
  - id: master_sha_edu_bridge_01
    line: トラッカーは政策変更とピアプログラムを測る。もう一日の散らばりのあと、本当の集中の次の一時間を可能にしたもの──次のタブではなく知恵の源につながる容量──の欄はない。課題にとどまった学生に要った。ポータルを開き、タブを切り替え、戻った人にも要る。Master Shaの伝統は、本物の学びはそのつながりから始まり、愛・許し・コンパッションは付け足しではなく明晰さが流れ出る土台だと説く。
    hidden_capacity: 散らばりが自己像にならないよう、知恵の源につながる
teacher_perspective:
  options:
  - id: master_sha_edu_perspective_01
    header: Master Shaが見ていること
    paragraphs:
    - Tao Sourceの教えは、学生がその産物を積み重ねるだけでなく知恵の源につながるときに本物の学びが始まると説く。情報を届けながら学生とその情報の源との関係を育てない教育システムは、知識はあっても知恵に欠ける人を生み、その差は知識が予想しなかった条件への応答に現れる。
    - 愛・許し・コンパッションは教育に後から添える価値ではなく、これなくして他の学びはすべて閉塞になる基盤的容量だ。システムが注意を無限の資源として扱うと、学ぶべきことと学生のあいだの流れに閉塞が生まれる。
    - 再フレームは実用的だ。集中を失った「自分が壊れている」に感じることは、学習者への十分なコンパッションに一度も出会わなかった条件の結果であることが多い。先に閉塞を晴らす。そうすれば、要求したことのために設計されなかったシステムと制度のなかでも、心は課題に戻れる。
practice:
  options:
  - id: master_sha_edu_practice_01
    display_name: Tao Source ゴールデンライトの実践
    announcement_line: Master Shaは5分間のTao Sourceゴールデンライトの実践を教える。ポータルとタブが注意を散らし、課題はまだ残るときのため。黄金の光が閉塞を洗い、魂が源に再接続する。サイドバーに時間どおりステップ付きで載せている。
    relief_lines:
    - あらゆる中断が自己像に変わる閉塞がやわらぐ。
    - 次の正直な集中の一区切りに十分な明晰さが戻る。
sdg:
  primary:
    line: 国連のSDG 4の枠組みには、質の高い教育の一部としてウェルビーイングと包摂的な学びの条件が含まれる。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: master_sha_edu_cta_01
    line: 'Active Mindsなど若者主導のネットワークがキャンパスでのメンタルヘルスと学びの条件のために動いている。入口: activeminds.org'
title_system:
  headline_layer_2:
    options:
    - id: master_sha_edu_headline_01
      line: Tao Sourceの教師が教育ストレスを閉塞として読み、学びへのつながりを取り戻す実践を名指す。
