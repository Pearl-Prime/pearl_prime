hook_personal:
  options:
  - id: hook_personal_01
    line: 気候の更新を読みます。胃が緊みます。アプリを閉じます。また開きます。問題も緊みも変わりませんでした。
  - id: hook_personal_02
    line: 最もつらいのは怖いことだけではありません。未来が安定しているかのように演じよと期待する制度のなかで怖がること——そしてもう大丈夫でいねばならないと言うパターンが自動で回っていることです。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 気候の苦しみは序列の問題でもあります。危機を止められないときに回るパターンは個人の欠陥ではありません。覚知がどこかにあり、脅威の下で清明を選ぶ枠がないときに回るものです。
  - id: hook_big_picture_02
    line: 若者の気候の苦しみは事実だけではありません。引き継がれたパターン——これに対処できねばならないという条件づけ、更新と否認を循環させずにループを断てない反射——についてでもあります。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra は、若者が気候の苦しみを個人的弱点の証のように抱えるのを実践の場で見てきました。怖さを減らす方法だけを問うのではなく、凍結—スクロール—戻りのループを可能にするパターンをはっきり見て、再び行動する清明にアクセスする方法を問うています。
  - id: teacher_intro_02
    line: Teacher Ra はサツァンで、気候ニュースが落ち古いパターンが覆うのを見てきました——もう大丈夫でいねばならないという条件づけ、解決なく確認と閉じるを循環する反射。安心を求めているのではなく、次の明確な選択が現れる容量に戻るほどパターンをはっきり見る方法を問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      気候の更新を読みます。胃が緊みます。アプリを閉じます。また開きます。危機はまだ本物で、見ないふりは何も変えません。

      LOOP_SEQUENCE: "read the update. stomach tightened. closed the app. opened again."
  - id: youth_somatic_02
    line: |
      グループチャットに見出しを見ます。胸が固まります。アプリを閉じます。また開きます。目をそらしても不安は去りませんでした。

      LOOP_SEQUENCE: "saw the headline. chest locked. closed the app. opened again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra はこのループを正確に見てきました——更新、身体の緊み、アプリの暗転、未解の危機がまだ待つため注意が戻る。
  - id: teacher_witness_02
    line: 若者のなかでその順序を見てきました——読む、緊まる、閉じる、戻る。パターンは回っています。問いは、循環以外を選べるほどはっきり見えるかです。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth climate action is shifting from paralysis to system change.
    stat_line_2: 若者は気候の輪を招き、企業の言葉と実際の変化のあいだを地図にし、キャンペーンを組み、気候レジリエンスをインフラとして扱うワークショップを主催しています。容量が育っています。
  - id: turnaround_02
    stat_line_1: Hundreds of youth-led climate initiatives are moving beyond awareness into local power.
    stat_line_2: 若い組織者は地域の気候影響を記録し、相互扶助のネットワークを通じてキャンペーンを組み、気候計画が作られる席を求めています。麻痺のパターンは、現れるパターンによって遮られつつあります。
bridge:
  options:
  - id: bridge_01
    line: 気候のトラッカーは排出と政策目標を測ります。真実を読み、緊みを通過させ、清明に戻る——更新と否認を循環させずに再び行動する容量は数えません。次の気候の輪を招く若者にも、更新を読み、アプリを閉じてまた開いた人にもそれが要りました。Teacher Ra の伝統は何世代もその容量を育んできました。データに溺れているのはあなたではなく、圧倒が現れる不変の証人です。
  - id: bridge_02
    line: 気候報告はデータとシナリオを数えます。心が緊みを欠陥の証だと固執するとき、覚知がすでに知っているところに休息する内面の容量は数えません。次の正直な選択にそれが要ります。アプリを閉じてまた開いた人にも要ります。Teacher Ra の伝統は、あなたはパターンではなかった——パターンが現れる不変の覚知である、と保ちます。気候の苦しみから自由になるのではなく、すでにその証人ではないふりをやめることです。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Teacher Ra が見ていること
    paragraphs:
    - Teacher Ra は若者の気候の苦しみを条件づけとして読みます。伝統はその苦しみを病理化せず、何が回っているかを名指します。もう大丈夫でいねばならないという恐れ、解決なく確認を循環する反射——をはっきり見たとき、あなたはパターンではありません。それを見る者です。その距離が違い方を選ぶ容量の始まりです。
    - 統合された覚醒はピーク体験ではなく、気候の仕事そのものに伴って歩く転換です。一日中楽観を感じる方法ではありません。緊みが来たときに止まり、何が回っているかを名指し、習慣ではなく清明からひとつの応答を選ぶ方法です。信頼は、心が固執することを手放し覚知がすでに知っているところに休息する用意です——ここでは、選び行動する自分の容量について本当に知っていることです。
    - その再フレームが緩みの始まりです。苦しみは欠陥の証明ではなく、パターンが回っている証拠になります。乱れは心理だけではありません。気候現実と、その条件下ではっきり見る容量のあいだの裂け目です。Teacher Ra の伝統はその裂け目のための実践を提供します——気候を良くするのではなく、あなたの容量を解き放ち、要求するもののなかで大切なことに現れるために。
  - id: teacher_perspective_02
    header: Teacher Ra が見ていること
    paragraphs:
    - Teacher Ra の伝統では、統合とは日常生活に根ざした覚醒です。気候の苦しみを抱える若者は、見るレベルでしか動かないところを内容のレベルで直そうとしがちです——実存的脅威にすでに大丈夫でいねばならないというパターン、緊みは壊れているというパターン、世界が燃えているのに安定を演じねばならないというパターン。パターンをはっきり見れば、その握りは弱まります。
    - 伝統は心が固執することと覚知がすでに知っていることとを分けます。締まった身体、閉じて開かれたアプリ——それは回っているパターンです。気づける者はその瞬間すでにそれから自由です。実践は力ずくで直すのでも楽観で迂回するのでもなく、その気づきに戻ることです。
    - その枠では、苦しみそのものが情報になります——新しい容量を要する条件への正確な反応です。自己責めが和らぎます。問題はあなたが壊れていることではありません。気候が変わり、それが中心になる前に取りつけられたパターンがまだ回っていることです。Teacher Ra の伝統は、パターンを見て名指し、清明から——あなたに大切な仕事へ実際に動かす——ひとつの応答を選ぶ方法を与えます。
practice:
  options:
  - id: practice_01
    display_name: 5分間・スクリーンエクササイズ
    announcement_line: Teacher Ra は、気候の苦しみと凍結—スクロール—戻りのループが溶け合い始める瞬間のため、5分間の Screen Exercise を教えています——スマホ画面そのものを鏡にします。サイドバーにあり、精密で使えます。
    relief_lines:
    - パターンが全体を支配するのをやめます。
    - 再び行動するのに足る清明が戻ります。
  - id: practice_02
    display_name: 5分間・スクリーンエクササイズ
    announcement_line: Teacher Ra は、気候の更新のあと、次の会話や行動の前に本当に知っているところに戻るための5分間の Screen Exercise を教えています。画面が鏡——見ているのは見られているものではありません。サイドバーにあり、読むと閉じるのあいだの瞬間向けに時間どおりです。
    relief_lines:
    - 緊みは循環せず通過します。
    - 大切なことを見て選べるほどの安定が戻ります。
sdg:
  primary:
    title: 気候変動に具体的な対策を
    line: 国連はSDG 13とその気候行動の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Climate Reality Project と 350.org の双方が、気候の輪、地域行動、力の構築への若者向け入口を提供しています。入口: https://www.climatereality.com と https://350.org'
  - id: cta_02
    line: Fridays for Future、Sunrise Movement、地域の青年気候評議会などが、ピア主導の輪と直接行動の経験を提供しています。地域またはオンラインで何が組織されているか確認してください。入口はネットワークへの参加です。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 気候の苦しみは、いま何が支配しているかの危機でもある。
    - id: headline_layer_1_02
      line: 凍結—スクロール—戻りのループは条件づけであり、性格ではない。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: アドヴァイタ・ヴェーダーンタの教師は、気候の苦しみを私的欠陥の嘘と拒み、パターンをはっきり見て再び行動する方法を名指します。
    - id: headline_layer_2_02
      line: 自己問いと証人としての覚知の伝統は、気候ニュースがつき古いパターンが全体を覆うときの実践を提供します。
