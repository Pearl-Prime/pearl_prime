hook_personal:
  options:
  - id: hook_personal_01
    line: シフトアプリを確認します。胃が落ちます。変わる前にスクショします。またルールを読みます。シフトは戻らず、緊みも去りませんでした。
  - id: hook_personal_02
    line: 最もつらいのは金銭の不安定だけではありません。それをあなたのせいにする制度のなかで不安定であること——そして苦しんでいるなら個人的に何かが欠けていると言うパターンが自動で回っていることです。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 経済の不安定さは序列の問題でもあります。ギグ経済が常時警戒を強いるときに回るパターンは個人の欠陥ではありません。不安定が前提になり、監視が生存の条件になるときに回るものです。
  - id: hook_big_picture_02
    line: 若者の経済的苦しみはお金だけではありません。不安定を個人の責めに変える条件づけ、アプリを何度も確かめて本当に値するものに戻らない反射——についてでもあります。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（アドヴァイタ・ヴェーダーンタ）は、若者が経済の不安定さを個人的失敗の証のように抱えるのを実践の場で見てきました。稼ぐ方法だけを問うのではなく、ギグ経済の不安定さが自己責めに変わるパターンをはっきり見て、体系をはっきり見る清明と尊厳にアクセスする方法を問うています。
  - id: teacher_intro_02
    line: Teacher Ra はサツァンで、シフトが消え仕事が途切れたとき古いパターンが覆うのを見てきました——苦しんでいるなら失敗だという条件づけ、スクショと自己監視の反射、値することに戻らないこと。安心を求めているのではなく、羞恥ではなく尊厳から応答を選べるほどパターンをはっきり見る方法を問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      シフトアプリを確認します。胃が落ちます。変わる前にスクショします。またルールを読みます。シフトは消え、自分に何かが欠けているという感覚は去りませんでした。

      LOOP_SEQUENCE: "checked the app. stomach dropped. took screenshot. read the rules again."
  - id: youth_somatic_02
    line: |
      ギグの仕事がキャンセルされたのを見ます。胸が固まります。またアプリを確認します。緊みが自分のせいだと言い、直さねばならないと言ったからです。

      LOOP_SEQUENCE: "saw the cancellation. chest locked. checked the app. checked again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra はこのループを正確に見てきました——アプリの不安定、胃の落下、スクショ、未解の羞恥がまだ回るためルールをまた読む。
  - id: teacher_witness_02
    line: 若者のなかでその順序を見てきました——確認、落下、スクショ、戻り。パターンは回っています。問いは、自己監視の循環以外を選べるほどはっきり見えるかです。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth worker organizing is building collective power and system literacy.
    stat_line_2: 若い労働者はギグ労働者の共同を形成し、アルゴリズム差別を記録し、キャンペーンを組み、アプリが仕事をどう支配するかの透明性について主催しています。個人の羞恥のパターンは、集団の力とはっきり見るパターンによって遮られつつあります。
  - id: turnaround_02
    stat_line_1: Youth are organizing economic justice and worker dignity movements.
    stat_line_2: 若者はワークショップを組み、キャンペーンを主催し、賃金正義の輪を招き、産業横断で不安定さを地図にし、不安定の体系が誰に利益をもたらすかを問います。自己監視のパターンは、体系をはっきり見て集団で行動するパターンに置き換えられつつあります。
bridge:
  options:
  - id: bridge_01
    line: 経済のトラッカーは成長と雇用率を測ります。シフトの変化を読み、落下を通過させ、本当に値することに戻る——確認と自己責めを循環させずに他者とともに体系をはっきり見て行動する容量は数えません。次の共同を招く若い労働者にも、パターンが手放れずアプリをまた見た人にもそれが要りました。Teacher Ra の伝統は何世代もその容量を育んできました。あなたは失敗しているギグワーカーではない——不安定が現れる不変の証人です。
  - id: bridge_02
    line: 労働報告は仕事と賃金を数えます。アプリが不安定さをあなたのせいだと説得しようとするとき、本当に値することに休息する内面の容量は数えません。次の正直な選択にそれが要ります。スクショしてルールをまた読んだ人にも要ります。Teacher Ra の伝統は、あなたはパターンではなかった——パターンが現れる不変の覚知である、と保ちます。値する者になるのではなく、体系が忘れさせようとしている証人ではないふりをやめることです。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Teacher Ra が見ていること
    paragraphs:
    - Teacher Ra は若者の経済的不安定を条件づけとして読みます。伝統はその不安定さや羞恥を病理化せず、何が回っているかを名指します。苦しんでいるなら何かが欠けているという恐れ、アプリを監視して値することに戻らない反射——をはっきり見たとき、あなたはパターンではありません。それを見る者です。その距離が、体系を見て尊厳から選ぶ容量の始まりです。
    - 統合された覚醒はピーク体験ではなく、仕事と組織化そのものに伴って歩く転換です。一日中安定を感じる方法ではありません。不安定が当たったときに止まり、何が回っているかを名指し、習慣ではなく清明からひとつの応答を選ぶ方法です。信頼は、心が固執することを手放し覚知がすでに知っているところに休息する用意です——ここでは、あなたの価値と公正な労働が要ることについて本当に知っていることです。
    - その再フレームが緩みの始まりです。不安定さは欠陥の証明ではなく、パターンが回っている証拠になります——体系レベルの不安定さを個人の責めに変えるパターン。乱れは心理だけではありません。監視と不安定さのために設計された経済体系と、その条件下ではっきり見る容量のあいだの裂け目です。Teacher Ra の伝統はその裂け目のための実践を提供します。
  - id: teacher_perspective_02
    header: Teacher Ra が見ていること
    paragraphs:
    - Teacher Ra の伝統では、統合とは日常生活に根ざした覚醒です。経済的不安定のなかで暮らす若者は、見るレベルでしか動かないところを内容のレベルで直そうとしがちです——苦しんでいるなら壊れているというパターン、不安定は自分のせいというパターン、不当な条件の前で感謝を演じねばならないというパターン。パターンをはっきり見れば、その握りは弱まります。
    - 伝統は心が固執することと覚知がすでに知っていることとを分けます。落下した身体、何度も確認されたアプリ、スクショ——それは回っているパターンです。気づける者はその瞬間すでにそれから自由です。実践は力ずくで直すのでも、個人ハッスルの空疎な楽観で迂回するのでもなく、その気づきに戻ることです。
    - その枠では、苦しみそのものが情報になります——監視と不安定さが労働の条件とされた体系への正確な反応です。自己責めが和らぎます。問題はあなたが壊れていることではありません。問題はギグ経済がリスクを労働者に外部化し、そのリスクを羞恥に変えるように設計されたことです。Teacher Ra の伝統は、パターンを見て名指し、本当に知っているところから——他者とともに尊厳から体系をはっきり見て行動する——ひとつの応答を選ぶ方法を与えます。
practice:
  options:
  - id: practice_01
    display_name: 5分間・「誰が気づいている？」一休み
    announcement_line: Teacher Ra は、シフトが消え仕事が途切れ、警戒と責めの循環が覆い始める瞬間のため、5分間の「Who's Noticing?」一休みを教えています——覚知を気づいている者へ返す一つの問いです。サイドバーにあり、精密で使えます。
    relief_lines:
    - パターンが全体を支配するのをやめます。
    - 尊厳から再びはっきり見るのに足る清明が戻ります。
  - id: practice_02
    display_name: 5分間・「誰が気づいている？」一休み
    announcement_line: Teacher Ra は、シフトキャンセルや不安定のニュースのあと、次のアプリ確認や会話の前に値することに戻るための5分間の「Who's Noticing?」一休みを教えています。羞恥に気づいているのは誰か——ひとつの問いで螺旋が一休みします。サイドバーにあり、引き金と螺旋のあいだの瞬間向けに時間どおりです。
    relief_lines:
    - 自己監視のループが一休みします。
    - 体系をはっきり見て値することから選べるほどの安定が戻ります。
sdg:
  primary:
    title: 働きがいも経済成長も
    line: 国連はSDG 8とその働きがいと経済成長の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: '若者主導の労働者組織が、集団組織化、賃金正義、ギグ労働者の連帯への入口を提供しています。入口: https://youngworkersunited.org と https://gigworkersrising.org'
  - id: cta_02
    line: Economic Policy Institute や地域のワーカー・センターなどの若者向け組織が、輪、スキル構築、集団の力の仕事を提供しています。地域またはオンラインで何が組織されているか確認してください。入口はネットワークへの参加です。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 経済的不安定さは、いま何が支配しているかの危機でもある。
    - id: headline_layer_1_02
      line: 警戒と責めの循環は条件づけであり、性格ではない。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: アドヴァイタ・ヴェーダーンタの教師は、不安定さを個人的欠陥の嘘と拒み、パターンをはっきり見て尊厳から行動する方法を名指します。
    - id: headline_layer_2_02
      line: 自己問いと証人としての覚知の伝統は、ギグ経済と古いパターンが全体を覆うときの実践を提供します。
