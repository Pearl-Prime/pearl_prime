hook_personal:
  options:
  - id: hook_personal_01
    line: 最もつらいのは気分が悪いことだけではありません。まだ安定を演じよと期待する制度のなかで苦しむこと——そしてもう大丈夫でいねばならないと言うパターンが自動で回っていることです。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 若者のメンタルヘルスの負荷は序列の問題でもあります。支援は語られながら、普通の生活が守られる条件が欠ける。覚知がどこかにあるときに回るパターンは個人の欠陥ではありません。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（バンガロール出身、アドヴァイタ・ヴェーダーンタ——ウパニシャッドとラマナ・マハルシの問い）は、若者が過負荷を個人的欠陥のように抱えるのを実践の場で見てきました。気分を良くする方法だけを問うのではなく、回っているパターン——もう大丈夫でいねばならないという条件づけ——をはっきり見て、習慣ではなく清明から応答する方法を問うています。
  - id: teacher_intro_02
    line: Teacher Ra はアドヴァイタ・ヴェーダーンタから——ニサルガダッタを『バガヴァッド・ギーター』と同じように引用します——サツァンで、心が継承されたパターン——恐れ、自己責め、正しさへの執着——に走り、若者がそれをはっきり見る枠を持たないときを見てきました。鼓舞を求めているのではなく、パターンが緩み、ざわめきが静まったときすでにここにあるものが現れるようにする方法を問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      最新の警告を読みます。喉が締まります。スマホを閉じます。また確認します。圧力はまだそこにあり、見ないふりは何も変えません。

      LOOP_SEQUENCE: "read the warning. throat tightened. shut the phone. checked again."
  - id: youth_somatic_02
    line: |
      グループチャットに見出しを見ます。肩が固まります。アプリを閉じます。また開きます。目をそらしても不安は去りませんでした。

      LOOP_SEQUENCE: "saw the headline. shoulders locked. closed the app. opened again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra はこのループを正確に見てきました——警告、喉の閉じ、スマホの暗転、未解の真実がまだ待つため注意が戻る。
  - id: teacher_witness_02
    line: 若者のなかでその順序を見てきました——読む、締まる、閉じる、戻る。パターンは回っています。問いは、はっきり見て選べるかです。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 若者主導の組織はピアの輪を開き、キャンペーンを組み、リスナー訓練を組み、メンタルヘルス支援を私的弱点ではなくインフラとして扱うよう学校に求めています。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. トラッカーは輪、キャンペーン、ピア支援を測ります。もう一週間の過負荷のあと、次の正直さを可能にしたもの——走っていたパターンを見て、習慣ではなく清明から応答を選ぶ容量——の欄はありません。輪に来た若者にも、警告を読み、スマホを閉じてまた開いた人にもそれが要りました。Teacher Ra の伝統は何世代もその容量を育んできました。圧倒されているのはあなたではなく、圧倒が現れる不変の証人です。
  - id: bridge_02
    line: メンタルヘルスのトラッカーはプログラムと待ち時間を数えます。心が古い物語に固執するとき、覚知がすでに知っているところに休息する内面の容量は数えません。次の正直な一手にそれが要ります。スマホを閉じてまた開いた人にも要ります。Teacher Ra の伝統は、あなたはパターンではなかった——パターンが現れる不変の覚知である、と保ちます。元気になるのではなく、すでに起きているものの証人ではないふりをやめることです。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Teacher Ra が見ていること
    paragraphs:
    - Teacher Ra は若者のメンタルヘルスの過負荷を条件づけとして読みます。伝統はパターンを病理化せず名指します。恐れ、自己責め、正しさへの執着をはっきり見たとき、あなたはパターンではありません。それを見る者です。その距離が手放ちの始まりです。
    - 統合された覚醒はピーク体験ではなく、普通の生活に伴って歩く転換です。一日中やる気を感じる方法ではありません。止まり、何が回っているかを名指し、習慣ではなく清明からひとつの応答を選ぶ方法です。信頼は、心が固執することを手放し覚知がすでに知っているところに休息する用意です。
    - その再フレームが緩みの始まりです。圧力は欠陥の証明ではなく、パターンが回っている証拠になります。乱れは心理だけではありません。体系がつくった条件と、その条件下ではっきり見る容量のあいだの裂け目です。Teacher Ra の伝統はその裂け目のための実践を提供します。
  - id: teacher_perspective_02
    header: Teacher Ra が見ていること
    paragraphs:
    - Teacher Ra の伝統では、日常生活に根ざした覚醒が統合の意味です。過負荷を抱える若者は、見るレベルでしか動かないところを内容のレベルで直そうとしがちです——もう大丈夫でいねばならないというパターン、欠陥だというパターン、安定を演じねばならないというパターン。パターンをはっきり見れば、その握りは弱まります。
    - 伝統は心が固執することと覚知がすでに知っていることとを分けます。締まった身体、閉じて開かれたスマホ——それは回っているパターンです。気づける者はその瞬間すでにそれから自由です。実践は力ずくで直すのではなく、その気づきに戻ることです。
    - その枠では自己責めが和らぎます。問題はあなたが壊れていることではありません。問題は体系が過負荷をかけパターンが覆ったことです。Teacher Ra の伝統は、パターンを見て名指し、清明からひとつの応答を選ぶ方法を与えます——青年メンタルヘルスの文脈での自己問いの姿です。
practice:
  options:
  - id: practice_01
    display_name: 5分間・「誰が気づいている？」一休み
    announcement_line: Teacher Ra は、過負荷と自己沈黙が溶け合い始める瞬間のため、5分間の「Who's Noticing?」一休みを教えています——覚知を、気づいている者へ返す一つの問いです。サイドバーにあり、精密で使えます。
    relief_lines:
    - パターンが全体を支配するのをやめます。
    - 次の正直な一手に足る清明が戻ります。
sdg:
  primary:
    title: 健康と福祉
    line: 国連はSDG 3とその健康と福祉の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Active Minds と Born This Way Foundation の双方が、若者向けの入口を提供しています。入口: https://www.activeminds.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 若者のメンタルヘルス危機は、いま何が支配しているかの危機でもある。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: アドヴァイタ・ヴェーダーンタの教師は、過負荷を私的欠陥の嘘と拒み、パターンをはっきり見る方法を名指します。
    - id: headline_layer_2_02
      line: 自己問いと証人としての覚知の伝統は、古いパターンが回り清明が遠いときの実践を提供します。
