hook_personal:
  options:
  - id: hook_personal_01
    line: 紛争はひとつの通知を通じて日常生活に入り、内面の場全体を占めようとします。そこに留まっていいかが問われます。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 平和と紛争の圧力は地政学だけではありません。恐れが覚知を覆うか、通過して同一化の全体像にならないかの戦いでもあります。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（バンガロール出身、アドヴァイタ・ヴェーダーンタの教師）は、紛争の圧力が若者に何をするかを実践の場で見てきました。恐れが本物かどうかを問うのではなく、自己の全体の形になるのをどう防ぎ、条件づけではなく清明から応答するかを問うています。
  - id: teacher_intro_02
    line: Teacher Ra はアドヴァイタ・ヴェーダーンタから、リトリートで紛争ニュースが落ち古いパターンが覆うときを見てきました——脅威に走る条件づけ、正しさへの執着、我対他への崩壊。慰めを求めているのではなく、異なる応答を選べるほどパターンをはっきり見る方法を問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      紛争アラートを読みます。身体が構えます。スマホを置きます。また確認します。危険は本物で、見ないことは何も変えません。

      LOOP_SEQUENCE: "read the alert. body braced. put the phone down. checked again."
  - id: youth_somatic_02
    line: |
      見出しを見ます。胸が緊みます。アプリを閉じます。また開きます。脅威はまだそこにあり、心は離れませんでした。

      LOOP_SEQUENCE: "saw the headline. chest tightened. closed the app. opened again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra は若者のなかでそのループを見てきました——アラート、身体の構え、スマホを置く、脅威がまだあるため注意が戻る。
  - id: teacher_witness_02
    line: 読む、構える、置く、戻る——その順序を見てきました。脅威に走る条件づけは本物です。問いは、全体を支配させるかです。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth-led dialogue and documentation efforts are growing.
    stat_line_2: 若者は対話の輪を組み、人権侵害を記録して記録を説明責任のために残し、紛争が内面の場全体を占めないワークショップを主催しています。
  - id: turnaround_02
    stat_line_1: Across regions, youth are demanding a seat at the table.
    stat_line_2: 学生と青年連合はキャンペーンを組み、事例を記録し、不満足な必要についての情報として不同意を扱う入口を主催しています——抑圧すべき問題としてではありません。
bridge:
  options:
  - id: bridge_01
    line: 紛争のトラッカーは死傷者と停戦を数えます。反応的絶望や反応的怒りに飲まれずに起きていることを見据える——条件づけではなく清明から応答する容量は数えません。次の対話を招く若者にも、アラートを読み、スマホを置いてまた開いた人にもそれが要りました。Teacher Ra の伝統は何世代もその容量を育んできました。恐れているのはあなたではなく、恐れが現れる不変の証人です。
  - id: bridge_02
    line: ニュースはエスカレーションと対応を測ります。次の平和の行為を可能にしたもの——心が固執することを手放し覚知がすでに知っているところに休息する用意——の欄はありません。Teacher Ra が引くアフリカの霊的伝統では、祖先は道徳的証人として働きます。Teacher Ra の教えは、あなたはパターンではなかった——恐れが現れる不変の覚知である、と保ちます。平和になるのではなく、すでに起きているものの証人ではないふりをやめ、パターンを再生しない応答を選ぶことです。
teacher_perspective:
  options:
    - id: ubuntu_awakening_01
      header: Teacher Ra が見ていること
      paragraphs:
        - Teacher Ra は紛争を ubuntu として読みます——私はわれらがあるから在る。自己の境界は皮膚で固定されず、共同体へ広がります。したがって武力紛争は他者の破壊だけではなく、共同体へ広がった自己の破壊でもあります。民族・国家の紛争のなかの若者にとって、平和は利他ではなく自己保存の形になりうます。自己に他者が含まれるとき、生存は実際何を要するか、と伝統は問います。
        - そこから条件づけへ。心は恐れ、我対他、正しさへの執着という継承されたパターンで回ります。紛争ニュースが落ちると、はっきり見られなければそれらが覆います。覚醒はピーク体験ではなく、パターンを見て再生しない応答を選ぶ持続的容量です。平和と紛争の文脈での自己問いの意味がそれです。
        - 重要な転換はこうです。「私が壊れている、無力な怒りに混乱している」に感じることが、共同体の場の破壊を制度が再生産する体系への正確な反応であることが多いのです。心は、暴力を起こしうる条件が変えうるとき、本当の乱れは条件にあると見たとき、自分を壊れていると呼ぶのをやめます。
    - id: ubuntu_awakening_02
      header: Teacher Ra が見ていること
      paragraphs:
        - Teacher Ra の伝統では、パラバー——紛争解決の技術としての長い共同体対話——は不同意を抑圧すべき問題ではなく、満たされない必要についての情報として扱います。多くの若者向け紛争は、パラバーのプロセスに制度的な家がないためにエスカレートします。伝統は問います——誰が対話を招き、誰が排除されているか。それは平和に二次的ではなく、平和の条件です。
        - アフリカの霊的伝統は祖先を道徳的証人として保ちます。今をつくった犠牲の先にいる者たちは、いま選ばれる選択と関係にあります。紛争後社会の若者にとって、これは復讐でも消去でもない説明責任の枠です——祖先は演技の平和ではなく正直な会計を要請します。
        - 統合された覚醒はここに当てはまります。欠陥はあなたのものではありません——壊れた自己でも、混乱した証人でもありません。脅威に走る条件づけをはっきり見れば、その握りは弱まります。本当の乱れは分断を再生産する体系と制度です。覚知がすでに知っているところ——他者は他者だけではなく、自己と共同体の境界は固定されない——に休息し、そこから破壊ではなく築く応答を選べます。
practice:
  options:
  - id: integrated_awakening_01
    display_name: 5分間・対象—証人の坐（Object-Witness Sitting）
    announcement_line: Teacher Ra は、紛争ニュースが内面の場を覆い古いパターンが全体を走らせているときのため、5分間の Object-Witness Sitting を教えています。起こるものを対象として、証人として休息します。サイドバーにあり、時間どおり段階付きです。
    relief_lines:
    - 心は各アラートを、自己全体が脅威下にある証明として扱うのをやめます。
    - パターンを見て再生しない応答を選べるほどの清明が戻ります。
  - id: integrated_awakening_02
    display_name: 5分間・対象—証人の坐（Object-Witness Sitting）
    announcement_line: Teacher Ra は、恐れが覚知を覆ったとき、覚知がすでに知っているところに戻るための5分間の Object-Witness Sitting を教えています。起こるものは対象、あなたは証人です。サイドバーにあり、アラートのあと、次の会話の前、就寝前にも短く使えます。
    relief_lines:
    - 身体は脅威が唯一の現実であるかのように構えるのをやめます。
    - 次の明確な一手に足る広がりが戻ります。
sdg:
  primary:
    title: 平和、公正、強い制度
    line: 国連はSDG 16とその平和、公正と強い制度の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 若者主導の平和構築組織が、対話と記録の仕事への入口を提供しています。入口は、UNA-USA のような地域から地球規模のネットワークへの参加か、地域の青年平和プログラムへの参加です。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 紛争は内面の場全体を占めようとする。そこに留まっていいかが問われる。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: アドヴァイタ・ヴェーダーンタの教師は紛争を ubuntu として読み、条件づけではなく清明から応答する実践を提供します。
    - id: headline_layer_2_02
      line: パラバーと祖先の証人の伝統は、平和に何が要るかを名指します——誰が対話を招き、誰が排除されているか。
