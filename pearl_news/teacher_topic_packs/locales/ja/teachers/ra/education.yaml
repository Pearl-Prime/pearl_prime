hook_personal:
  options:
  - id: hook_personal_01
    line: テストの結果が出ます。胃が落ちます。従うべき姿を演じます。また順位を確認します。数字も落ち込みも変わらなかったからです。
  - id: hook_personal_02
    line: 最もつらいのは失敗や苦戦だけではありません。成績が価値の証明だとまだ言う制度のなかで苦しむこと——そして成績を価値の証に変えるパターンが自動で回っていることです。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育の圧力は序列の問題でもあります。成績が同一化の印になるときに回るパターンは個人の欠陥ではありません。賭けが高すぎ、覚知が数字以外に留まる場所を失ったときに回るものです。
  - id: hook_big_picture_02
    line: 若者の教育の苦しみは成績だけではありません。引き継がれたパターン——成績が価値に等しいという条件づけ、証明求めの循環を断ち切らずに順位を何度も確かめる反射——についてでもあります。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（バンガロール出身、アドヴァイタ・ヴェーダーンタの教師——ウパニシャッドとラマナ・マハルシの問いに浸る）は、成績が価値を証明するというパターンが回ると、若者が本当に知っていることにアクセスできなくなるのを実践の場で見てきました。点数の上げ方だけを問うのではなく、パターンをはっきり見て、学びが再び現れる集中と安定に戻る方法を問うています。
  - id: teacher_intro_02
    line: Teacher Ra はアドヴァイタ・ヴェーダーンタの伝統から——ニサルガダッタを『バガヴァッド・ギーター』と同じように引用する教師です——サツァンで成績がつき、古いパターンが覆うときを見てきました。条件づけ、順位を何度も確かめる反射、本当に知っていることに戻らないこと。励ましを求めているのではなく、パターンをはっきり見て、パターンが押しつけるのではなく知っているところから応答を選ぶ方法を問うています。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      テストの点数を見ます。胃が落ちます。従います。また順位を確認します。数字も変わらず、知っていることも戻りませんでした。

      LOOP_SEQUENCE: "got the score. stomach dropped. performed compliance. checked ranking again."
  - id: youth_somatic_02
    line: |
      成績が掲示されます。肩が固まります。アプリを閉じます。また開きます。感覚もパターンも手放れませんでした。

      LOOP_SEQUENCE: "saw the grade. shoulders locked. closed the app. opened again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra はこのループを正確に見てきました——結果、胃の落下、従う演技、未解決のパターンがまだ回るため注意が戻る。
  - id: teacher_witness_02
    line: 若者のなかでその順序を見てきました——成績、落下、演技、戻り。パターンは回っています。問いは、それをはっきり見て循環以外を選べるかです。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth-led educational movements are reframing learning and assessment.
    stat_line_2: 若者は代替評価の枠組み、ピア学習の輪を築き、害を記録し、ワークショップを組み、成績が測るものと実際の学びが要るもののあいだを主催しています。成績即証明のパターンは、学びに来るパターンによって遮られつつあります。
  - id: turnaround_02
    stat_line_1: Students are organizing for assessment reform and learning autonomy.
    stat_line_2: 若者はワークショップを組み、キャンペーンを主催し、誰がテストを設計し何を測っているかを問い、順位に学びを結びつけない空間を築いています。点数を見るパターンは、本当に学ぶことへ戻るパターンに置き換えられつつあります。
bridge:
  options:
  - id: bridge_01
    line: 教育のトラッカーは成績と卒業率を測ります。フィードバックを受け取り、落下を通過させ、本当に知っていることに戻る——確認と証明求めを循環させずに再び集中して学ぶ容量は数えません。次の学習の輪を招く若者にも、パターンが手放れず順位をまた見た人にもそれが要りました。Teacher Ra の伝統は何世代もその容量を育んできました。あなたは成績ではない——成績が現れる不変の証人です。それが見えればパターンは緩み、学ぶ容量が戻ります。
  - id: bridge_02
    line: 評価の制度は点数と順位を数えます。成績が知識のすべてだと説得しようとするとき、本当に知っているところに休息する内面の容量は数えません。次の正直な選択にそれが要ります。順位をまた確認した人にも要ります。Teacher Ra の伝統は、あなたはパターンではなかった——パターンが現れる不変の覚知である、と保ちます。良い学生になるのではなく、すでに知っている者ではないふりをやめることです。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Teacher Ra が見ていること
    paragraphs:
    - Teacher Ra は若者の教育の苦しみを条件づけとして読みます——覚知がどこかにあるときに自動で回る思考・感情・反応の継承されたパターンです。伝統はその苦しみを病理化せず、何が回っているかを名指します。パターンをはっきり見たとき——成績が価値を証明する恐れ、集中に戻らず順位をまた見る反射——あなたはパターンではありません。それを見る者です。その距離が、違い方で学ぶ容量の始まりです。
    - 統合された覚醒はピーク体験ではなく、教室と学びに伴って歩く転換です。一日中やる気を感じる方法ではありません。落下が来たときに止まり、何が回っているかを名指し、習慣ではなく清明からひとつの応答を選ぶ方法です。伝統は信頼を、心が固執することを手放し覚知がすでに知っているところに休息する用意と読みます——ここでは、教材、問い、目の前の問題について本当に知っていることです。
    - その再フレームが緩みの始まりです。苦しみはあなたに何かが欠けている証明ではなく、パターンが回っている証拠になります。乱れは心理だけではありません。成績を価値に結びつけた体系と、その条件下ではっきり見る容量のあいだの裂け目です。Teacher Ra の伝統はその裂け目のための実践を提供します——体系を良くするのではなく、集中して学べる自分の容量を解き放つために。
  - id: teacher_perspective_02
    header: Teacher Ra が見ていること
    paragraphs:
    - Teacher Ra の伝統では、日常生活に根ざした覚醒——ピーク体験ではなく現実への出会い方の持続的な転換——が統合の意味です。教育の圧力の下の若者は、見るレベルでしか動かないところを内容のレベルで直そうとしがちです——成績が価値の証明だというパターン、落下は欠陥の証だというパターン、評価の前で安定を演じねばならないというパターン。パターンをはっきり見れば、その握りは弱まります。
    - 伝統は心が固執することと覚知がすでに知っていることとを分けます。落下した身体、何度も確認された順位——それは回っているパターンです。それに気づける者は、その瞬間すでにそれから自由です。実践は、力ずくでパターンを直すのでも、個人努力の空疎な楽観で迂回するのでもなく、その気づきに戻ることです。
    - その枠では、苦しみそのものが情報になります——賭けが高すぎる体系への正確な反応です。自己責めが和らぎます。問題はあなたが壊れていることではありません。問題は成績があなたについて語る以上の意味を持たされたことです。Teacher Ra の伝統は、パターンを見て名指し、清明から——学びのなかに留まる——ひとつの応答を選ぶ方法を与えます。
practice:
  options:
  - id: practice_01
    display_name: 5分間・「私のものではない」ドロップ（Not Mine Drop）
    announcement_line: Teacher Ra は、成績がつき成績即価値の循環が始まる瞬間のため、5分間の「Not Mine」ドロップを教えています。不足の各思考に「私のものではない」と遇けば覚知は本当に知っているところに戻ります。サイドバーにあり、精密で使えます。
    relief_lines:
    - パターンが全体を支配するのをやめます。
    - 集中して再び学ぶのに足る清明が戻ります。
  - id: practice_02
    display_name: 5分間・「私のものではない」ドロップ（Not Mine Drop）
    announcement_line: Teacher Ra は、点数やフィードバックのあと、次の自習や教室の前に本当に知っているところに戻るための5分間の「Not Mine」ドロップを教えています。成績があなただと言う各思考に「私のものではない」と遇けば覚知は戻ります。サイドバーにあり、学びと確認のあいだの瞬間向けに時間どおりです。
    relief_lines:
    - 落下は循環せず通過します。
    - 教材をはっきり見、関わることを選べるほどの安定が戻ります。
sdg:
  primary:
    title: 質の高い教育
    line: 国連はSDG 4とその質の高い教育の目標を通じて、この問題への枠組みを示しています。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: cta_01
    line: 'Student Disability Rights Network や National Association of Student Financial Aid Administrators などの組織が、教育公正とピア学習の輪への若者向け入口を提供しています。入口: https://www.studentdisabilityrightsnetwork.org'
  - id: cta_02
    line: 若者主導の学習サークル、学習コレクティブ、ピアチュータリングのネットワークは、単独の成績中心の勉強への代替を提供しています。地域の青年教育正義団体を調べるか、仲間と輪を始めてください。入口はネットワークへの参加です。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 教育の圧力は、いま何が支配しているかの危機でもある。
    - id: headline_layer_1_02
      line: 成績即価値の循環は条件づけであり、性格ではない。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: アドヴァイタ・ヴェーダーンタの教師は、成績が価値を証明するという嘘を拒み、パターンをはっきり見て再び学ぶ方法を名指します。
    - id: headline_layer_2_02
      line: 自己問いと証人としての覚知の伝統は、点数がつき古いパターンが全体を覆うときの実践を提供します。
