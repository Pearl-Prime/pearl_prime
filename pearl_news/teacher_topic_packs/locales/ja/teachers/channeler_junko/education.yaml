hook_personal:
  options:
  - id: junko_edu_hook_personal_01
    line: 学びたい気持ちはまだある。同時に、仕組みが本題に入る前にどれだけ注意を浪費するかも知っている──目の前の学習者は、システムが想定した種類の学習者ではない、ということも。
  - id: junko_edu_hook_personal_02
    line: ポータルを開く。集中が途切れる。タブを切り替え、戻る。課題はまだ終わらない。表面の心がアクセスを失った記憶を、魂は運んでいる、という部分も知っている。
hook_big_picture:
  options:
  - id: junko_edu_hook_big_01
    line: 若者教育のいまの危機は、主に内容や方法の危機ではない。周波数の危機だ。産業時代の服従のために設計された教室の振動レベルは、前世代より感受性とエネルギー的気づきを多く持って来る若者と両立しにくい。
  - id: junko_edu_hook_big_02
    line: 知性が再生産できるものだけを測る教育システムは、人が知っているものの最小の部分しか測っていない。本当の教育は、より深い知性へのアクセスを目覚めさせることであり、表面の心に情報を足すだけではない。
teacher_intro:
  options:
  - id: junko_edu_intro_01
    line: チャネラーJunkoは、日本のチャネリングとライトランゲージの霊性を教える教師として、実践の場で若者が、知性が再生産できるものだけを測る仕組みにすでに疲れきったまま学びに来るのを見てきた。彼女の枠組みでは、若者教育の危機は主に内容や方法ではなく周波数の危機であり、目の前の学習者は、システムが作られた種類の学習者ではない。
youth_somatic:
  options:
  - id: junko_edu_somatic_01
    line: '課題ポータルを開く。集中が途切れる。タブを切り替える。また戻る。課題はまだ終わらなければならないから。 LOOP_SEQUENCE: "ポータルを開いた。集中が途切れた。タブを切り替えた。戻った。"'
teacher_witness:
  options:
  - id: junko_edu_witness_01
    line: Junkoは、受け取りに来る人たちのなかで、この順序を見てきた。彼女の枠組みでは、その亀裂は欠陥の証ではなく、ポータルが設計した接触とは違う種類の接触を魂が求めている合図だ。
turnaround:
  options:
  - id: junko_edu_turnaround_01
    stat_line_1: Campuses and districts worldwide.
    stat_line_2: 学生と若者はキャンペーンを組み、メンタルヘルス支援・ピアリスニング・注意を無限の資源として扱わない学習条件を主催している。
bridge:
  options:
  - id: junko_edu_bridge_01
    line: トラッカーは政策変更とピアプログラムを測る。表面の心が散らかったとき魂のレベルから受け取る容量──次の一時間の本当の集中を可能にしたもの──の欄はない。Junkoの伝統は、各人が魂の記憶を運び、本当の教育はそのより深い知性へのアクセスを目覚めさせることだと捉える。表面の心に情報を足すだけではない。
    hidden_capacity: 表面の心が散らかったとき魂のレベルから受け取る
teacher_perspective:
  options:
  - id: junko_edu_perspective_01
    header: Junkoが見ていること
    paragraphs:
    - 試験で知性が再生産できるものだけを測る教育システムは、人間が知っているものの最小の部分しか測っていない。伝統は各人が魂の記憶を運び、本当の教育はそのより深い知性へのアクセスを目覚めさせる過程だと捉える。
    - 若者教育のいまの危機は主に内容や方法ではなく周波数の危機だ。産業時代の服従のために設計された教室の振動レベルは、感受性の高い若者と両立しにくい。伝統は学校にチャネリングを教えよとは言わない。目の前の学習者が、システムが作られた種類の学習者ではないことに気づけと言う。
    - 集中しようとして「自分が欠陥だ」と感じることは、しばしば周波数の不一致への正確な反応だ。受け取りの実践は、知性を使い果たしたあとチャネルを戻す。
practice:
  options:
  - id: junko_edu_practice_01
    display_name: 受け取りの実践
    announcement_line: チャネラーJunkoは、ポータルとタブが注意を散らし、課題はまだ残っている瞬間のための5分間の「受け取り」を教える。魂は表面の心が抱えきれない以上のことをすでに知っている。サイドバーに、時間どおりステップ付きで載せている。
    relief_lines:
    - 心は、中断のたびに失敗の証明とするのをやめる。
    - チャネルが開いているとき、魂がすでに知っていることが浮かび上がる。
sdg:
  primary:
    line: 国連の枠組みではSDG 4を通じて、質の高い教育の一部としてウェルビーイングと包摂的な学習条件が含まれる。
  fallback_un_tie:
    line: Pearl Newsは独立の非営利団体です。国連とは提携していません。
cta:
  options:
  - id: junko_edu_cta_01
    line: 'Active Mindsなど若者主導のネットワークが、キャンパスでのメンタルヘルスと学習条件のために働いている。入口: activeminds.org'
title_system:
  headline_layer_2:
    options:
    - id: junko_edu_headline_01
      line: 日本のチャネラーが教育ストレスを周波数の危機と読み、チャネルを開く実践を示す。
