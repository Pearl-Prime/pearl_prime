hook_personal:
  options:
  - id: hook_personal_01
    line: 最难的不只是感觉糟糕。更是在仍期待你表演稳态的体系里受苦——而「你早该好了」的模式在自动运转。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 青年心理健康压力也是秩序问题：支持系统口称关怀，却未能创造可真正保护日常生活的条件。当觉知在别处时运转的模式不是个人缺陷。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（生于班加罗尔，不二论吠檀多传统——浸于奥义书与拉玛那·马哈希的参问）在实修场合见过年轻人把过载当作个人缺陷来扛。他们不只问如何感觉好一点，而问如何看见正在运转的模式——「早该好了」的条件作用——以便从清明而非习惯中回应。
  - id: teacher_intro_02
    line: Teacher Ra 来自不二论吠檀多传统——引用尼萨加达塔如同引用《薄伽梵歌》——他在萨桑中见过当心被继承模式——恐惧、自责、必须正确——驱动、而年轻人没有框架清楚看见它们时会发生什么。他们不求激励，而求如何让模式松动，使喧嚣落定后已然在此之物显现。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你读最新警告。喉咙收紧。你关掉手机。你又查看，因为压力仍在，假装否则并不能改变什么。

      LOOP_SEQUENCE: "read the warning. throat tightened. shut the phone. checked again."
  - id: youth_somatic_02
    line: |
      你在群聊里看到标题。肩锁住。你关掉应用。你又打开，因为担忧并未因移开目光而离开。

      LOOP_SEQUENCE: "saw the headline. shoulders locked. closed the app. opened again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra 见过这一精确循环——警告抵达，喉咙关闭，手机暗下，注意返回，因为未解的真相仍在等待。
  - id: teacher_witness_02
    line: 他在年轻人身上见过这一序列——阅读、收紧、关闭、返回。模式在运转；问题是你能否足够清楚地看见它并选择。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 青年组织者在主持同伴圈、组织运动、培训倾听者，并要求学校把心理支持当作基础设施，而非私人弱点。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. 追踪器衡量圈、运动与同伴支持。却没有一栏记录「又一周过载之后，下一次诚实何以可能」——看见当时运转的模式、并从清明而非习惯中选择回应的容量。来到圈里的年轻人需要它；读了警告、关掉手机又打开的人也需要。Teacher Ra 的传统数代以来一直在培育那种容量：你不是那个被淹没的人——你是其中淹没显现的不变见证。当它被看见，模式松动，下一次诚实行动才可能。
  - id: bridge_02
    line: 心理健康追踪器数项目与等待时间。却不数当心固守旧叙事时，年轻人能否安息于觉知已知之处的内在容量。下一次诚实行动需要它；关掉手机又打开的人也需要。Teacher Ra 的传统坚持：你从来不是那个模式——你是模式中显现的不变觉知。你不是要「变健康」，而是要停止假装你不是正在发生之事的见证。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Teacher Ra 所见
    paragraphs:
    - Teacher Ra 以条件作用读青年心理过载。传统不病理化那些模式，而命名它们。当你清楚看见模式——恐惧、自责、必须正确——你不是模式。你是能看见它的那位。那段距离是释放的开始。
    - 整合的觉醒不是巅峰体验，而是与你一起走进日常生活的东西。问题不是如何全天受激励，而是如何暂停、命名何者在运转，并选择一个来自清明而非习惯的回应。传统把信任读作愿意放下心的固执，安息于觉知已知之处。
    - 这一再框架是缓解的开始。压力不再证明你有毛病，而开始证明模式在运转。失序不只在心理；它也在体系所造条件与在那些条件下清楚看见之间的裂隙。Teacher Ra 的传统为那裂隙提供实践。
  - id: teacher_perspective_02
    header: Teacher Ra 所见
    paragraphs:
    - 在 Teacher Ra 的传统里，扎根日常生活的觉醒即是整合。背负过载的年轻人常试图在内容层面修补只能在看见层面移动的东西——「早该好了」的模式、「你有缺陷」的模式、「必须表演稳态」的模式。当你清楚看见模式，它的抓握会松动。
    - 传统区分心的固执与觉知已知。收紧的身体、被关掉又打开的手机——那是模式在运转。能注意到它的那位，在那一刻已免于它。实践是回到那种注意，而非用力修正模式。
    - 在这一框架下，自责软化。问题不是你坏了。问题是体系使你过载而模式接管。Teacher Ra 的传统给你一条路：看见模式、命名它，并选择一个来自清明的回应——在青年心理健康的语境里，这就是自我参问的样子。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「谁在觉察？」停顿（Who's Noticing?）
    announcement_line: Teacher Ra 教授五分钟「Who's Noticing?」停顿，用于过载与自我沉默开始融合的时刻——一个问题把觉知带回觉察者本身。在侧栏，精确可用。
    relief_lines:
    - 模式不再导演整场戏。
    - 足够清明回归，以支撑下一次诚实行动。
sdg:
  primary:
    title: 健康与福祉
    line: 联合国通过SDG 3及其健康与福祉目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'Active Minds 与 Born This Way Foundation 均提供面向青年的入口。入口: https://www.activeminds.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 青年心理健康危机也是一场「谁在主导」的危机。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位不二论吠檀多教师拒绝把过载说成私人缺陷——并指出如何清楚看见模式。
    - id: headline_layer_2_02
      line: 自我参问与见证觉知的传统，在旧模式运转、清明遥远时提供一种实践。
