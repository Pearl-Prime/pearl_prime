hook_personal:
  options:
  - id: hook_personal_01
    line: 你读气候更新。胃收紧。你关掉应用。你又打开，因为问题未变，紧绷也未变。
  - id: hook_personal_02
    line: 最难的不只是害怕。更是在仍期待你表演未来稳定的体系里害怕——而「你早该没事」的模式在自动运转。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 气候痛苦也是秩序问题：当你无法阻止危机时运转的模式不是个人缺陷。它们是觉知在别处、心在威胁下没有框架选择清明时会出现的东西。
  - id: hook_big_picture_02
    line: 青年的气候痛苦不止于事实。它关乎被继承的模式——「你该能扛住」的条件作用，以及在不打破循环的情况下反复更新与否认的反射。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（不二论吠檀多——浸于奥义书与拉玛那·马哈希的参问）在实修场合见过年轻人把气候痛苦当作个人软弱的证明。他们不只问如何少怕，而问如何看见使冻结—滚动—返回循环成为可能的模式——以获得再次行动的清明。
  - id: teacher_intro_02
    line: Teacher Ra 来自不二论吠檀多传统——引用尼萨加达塔如同引用《薄伽梵歌》——他在萨桑中见过气候新闻落下、旧模式接管时发生的事：「早该没事」的条件作用，在确认与关闭之间循环却无解决的反射。他们不求安慰，而求如何足够清楚地看见模式，使下一次清晰选择得以出现的容量回归。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你读气候更新。胃收紧。你关掉应用。你又打开，因为危机仍真实，假装否则并不能改变什么。

      LOOP_SEQUENCE: "read the update. stomach tightened. closed the app. opened again."
  - id: youth_somatic_02
    line: |
      你在群聊里看到标题。胸锁住。你关掉应用。你又打开，因为担忧并未因移开目光而离开。

      LOOP_SEQUENCE: "saw the headline. chest locked. closed the app. opened again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra 见过这一精确循环——更新抵达，身体收紧，应用暗下，注意返回，因为未解的危机仍在等待。
  - id: teacher_witness_02
    line: 他在年轻人身上见过这一序列——阅读、收紧、关闭、返回。模式在运转；问题是你能否足够清楚地看见它，以选择循环之外的东西。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth climate action is shifting from paralysis to system change.
    stat_line_2: 年轻人在召集气候圈、绘制企业话语与实际变化之间的缺口，组织运动并主持工作坊，把气候韧性当作基础设施。能力正在积累。
  - id: turnaround_02
    stat_line_1: Hundreds of youth-led climate initiatives are moving beyond awareness into local power.
    stat_line_2: 年轻组织者在记录社区气候影响，通过互助网络组织运动，并要求在制定气候计划的桌边有一席。麻痹的模式正被「到场」的模式打断。
bridge:
  options:
  - id: bridge_01
    line: 气候追踪器衡量排放与政策目标。却不计算读懂真相、让紧绷穿过、回到清明——在更新与否认的循环之外再次行动的容量。召集下一场气候圈的年轻人需要它；读了更新、关掉应用又打开的人也需要。Teacher Ra 的传统数代以来一直在培育那种容量：你不是那个被数据淹没的人——你是其中压倒显现的不变见证。当它被看见，清明回归，下一次诚实行动才可能。
  - id: bridge_02
    line: 气候报告数数据与情景。却不数当心坚称紧绷证明你坏了时，年轻人能否安息于觉知已知之处的内在容量。下一次诚实选择需要它；关掉应用又打开的人也需要。Teacher Ra 的传统坚持：你从来不是那个模式——你是模式中显现的不变觉知。你不是要摆脱气候痛苦，而是要停止假装你不是它的见证。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Teacher Ra 所见
    paragraphs:
    - Teacher Ra 以条件作用读青年气候痛苦。传统不把那种痛苦病理化，而命名何者在运转。当你清楚看见模式——恐惧说早该没事、在无解决的情况下循环查看的反射——你不是模式。你是能看见它的那位。那段距离是不同选择的开始。
    - 整合的觉醒不是巅峰体验，而是与气候工作本身一起行走的转变。问题不是如何全天乐观，而是当紧绷来临时如何暂停、命名何者在运转，并选择一个来自清明而非习惯的回应。信任是愿意放下心的固执，安息于觉知已知——此处即你关于选择与行动容量真实所知。
    - 这一再框架是缓解的开始。痛苦不再证明你有毛病，而开始证明模式在运转。失序不只在心理；它也在气候现实与在那些条件下清楚看见之间的裂隙。Teacher Ra 的传统为那裂隙提供实践——不是让气候变好，而是释放你自己的容量，使你在体系从未为它所要求之物而设计的情况下仍能出现在要紧之事上。
  - id: teacher_perspective_02
    header: Teacher Ra 所见
    paragraphs:
    - 在 Teacher Ra 的传统里，整合指扎根日常生活的觉醒。背负气候痛苦的年轻人常试图在内容层面修补只能在看见层面移动的东西——「对存在威胁早该没事」的模式、「紧绷意味你坏了」的模式、「世界在燃烧却仍须表演稳态」的模式。当你清楚看见模式，它的抓握会松动。
    - 传统区分心的固执与觉知已知。收紧的身体、被关掉又打开的应用——那是模式在运转。能注意到它的那位，在那一刻已免于它。实践是回到那种注意，而非用力修正模式或用乐观绕过。
    - 在这一框架下，痛苦本身成为信息：对需要新容量的条件的准确反应。自责软化。问题不是你坏了。问题是气候在变，而在它成为中心之前安装的模式仍在运转。Teacher Ra 的传统给你一条路：看见模式、命名它，并选择一个来自清明——实际推动你走向对你重要的工作——的回应。
practice:
  options:
  - id: practice_01
    display_name: 五分钟屏幕练习（Screen Exercise）
    announcement_line: Teacher Ra 教授五分钟 Screen Exercise——把手机屏幕当作镜子——用于气候痛苦与冻结—滚动—返回循环开始融合的时刻。在侧栏，精确可用。
    relief_lines:
    - 模式不再导演整场戏。
    - 足够清明回归，以再次行动。
  - id: practice_02
    display_name: 五分钟屏幕练习（Screen Exercise）
    announcement_line: Teacher Ra 教授五分钟 Screen Exercise，用于气候更新之后、下一次谈话或行动之前需要回到真实所知时。屏幕成为镜子——在看者不是所见。在侧栏，为阅读与关闭之间的片刻计时。
    relief_lines:
    - 紧绷穿过而非循环。
    - 足够稳定回归，以看见要紧之事并选择它。
sdg:
  primary:
    title: 气候行动
    line: 联合国通过SDG 13及其气候行动目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'Climate Reality Project 与 350.org 均提供进入气候圈、本地行动与力量建设的青年入口。入口: https://www.climatereality.com 与 https://350.org'
  - id: cta_02
    line: Fridays for Future、Sunrise Movement 与地方青年气候理事会等提供同伴主导的圈子与直接行动经验。查询你所在地区或线上正在组织的内容。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 气候痛苦也是一场「谁在主导」的危机。
    - id: headline_layer_1_02
      line: 冻结—滚动—返回循环是条件作用，不是性格。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位不二论吠檀多教师拒绝把气候痛苦说成私人缺陷——并指出如何清楚看见模式、再次行动。
    - id: headline_layer_2_02
      line: 自我参问与见证觉知的传统，在气候新闻落下、旧模式接管全场时提供一种实践。
