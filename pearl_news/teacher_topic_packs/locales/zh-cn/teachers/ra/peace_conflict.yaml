hook_personal:
  options:
  - id: hook_personal_01
    line: 冲突通过一条通知进入日常生活，然后要求占据整个内在场域。问题在于它是否被允许留在那里。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 和平与冲突压力不只是地缘政治。它们是一场斗争：恐惧是占据觉知，还是穿过觉知而不变成整个身份。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（生于班加罗尔，不二论吠檀多教师）在实修场合见过冲突压力如何作用于年轻人。他们不问恐惧是否真实，而问如何不让它成为自我的全部形状——如何从清明而非条件作用中回应。
  - id: teacher_intro_02
    line: Teacher Ra 来自不二论吠檀多传统，在闭关场合见过冲突新闻落下、旧模式接管时发生的事——在威胁上运转的条件作用、必须正确、坍缩进我们与他们。他们不求安慰，而求如何足够清楚地看见模式，以选择不同的回应。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你读冲突警报。身体绷紧。你放下手机。你又查看，因为危险真实，不看并不能改变什么。

      LOOP_SEQUENCE: "read the alert. body braced. put the phone down. checked again."
  - id: youth_somatic_02
    line: |
      你看到标题。胸收紧。你关掉应用。你又打开，因为威胁仍在，心无法放下。

      LOOP_SEQUENCE: "saw the headline. chest tightened. closed the app. opened again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra 在年轻人身上见过这一循环——警报落下、身体绷紧、手机放下，注意又因威胁仍在而返回。
  - id: teacher_witness_02
    line: 他见过这一序列——阅读、绷紧、放下、返回。在威胁上运转的条件作用真实存在；问题是否让它导演整场戏。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth-led dialogue and documentation efforts are growing.
    stat_line_2: 年轻人在组织对话圈、记录人权侵害以使记录服务于问责，并主持工作坊，拒绝让冲突占据整个内在场域。
  - id: turnaround_02
    stat_line_1: Across regions, youth are demanding a seat at the table.
    stat_line_2: 学生与青年联盟在组织运动、记录案例，并主持入口，把分歧当作关于未满足需求的信息，而非要压制的问题。
bridge:
  options:
  - id: bridge_01
    line: 冲突追踪器数伤亡与停火。却不数能否在视野中托住所发生之事而不被反应性绝望或反应性愤怒吞噬——从清明而非条件作用回应的容量。召集下一场对话的年轻人需要它；读了警报、放下手机又打开的人也需要。Teacher Ra 的传统数代以来一直在培育那种容量：你不是那个害怕的人——你是其中恐惧显现的不变见证。当它被看见，清明与你一起进入下一场对话。
  - id: bridge_02
    line: 新闻衡量升级与应对。却没有一栏记录「下一次和平行动何以可能」——愿意放下心的固执、安息于觉知已知之处。Teacher Ra 所援引的非洲灵性传统中，祖先作为道德见证：逝者与当下所做的选择相关联。对冲突后社会的年轻人，这提供既非复仇也非抹除的问责框架。Teacher Ra 的教导坚持：你从来不是那个模式——你是其中恐惧显现的不变觉知。你不是要变得和平，而是要停止假装你不是正在发生之事的见证——并从那种看见中选择不复制暴力的回应。
teacher_perspective:
  options:
  - id: ubuntu_awakening_01
    header: Teacher Ra 所见
    paragraphs:
    - Teacher Ra 以 ubuntu 读冲突：我因我们而在。自我的边界不固定在皮肤；它延伸到共同体。因此武装冲突不只是对他者的摧毁，也是对延伸到共同体的自我的摧毁。对穿行于民族与国家冲突的年轻人，和平可重框架为自保而非施舍。当自我包含他者时，生存实际需要什么？传统如此发问。
    - 由此他转向条件作用。心在恐惧、我们与他们、必须正确等继承模式上运转。冲突新闻落下时，除非被清楚看见，否则它们会接管。觉醒不是巅峰体验，而是持续看见模式并选择不复制它的回应的能力。在和平与冲突语境里，这就是自我参问的含义。
    - 重要的转变是：像「我坏了、被无助的愤怒搞糊涂了」这样的感受，常常是共同体场域被摧毁时，对制度仍在生产的条件的准确反应。当心看见暴力可能发生的条件可以改变时，它停止称自己为坏掉的。真正的失序在于条件——而非你。
  - id: ubuntu_awakening_02
    header: Teacher Ra 所见
    paragraphs:
    - 在 Teacher Ra 的传统里，palaver——作为冲突解决技术的延长共同体对话——把分歧当作关于未满足需求的信息，而非要压制的问题。许多面向青年的冲突因 palaver 过程没有制度家园而升级。传统发问：谁在召集对话，谁被排除？那不是和平的次要问题，而是和平的条件。
    - 非洲灵性传统认为祖先是道德见证：逝者与他们所创造的当下之人的选择相关联。对冲突后社会的年轻人，这提供既非复仇也非抹除的问责框架——祖先要求诚实清算，而非表演的和平。
    - 整合的觉醒在此适用：过错不在你——不是破碎的自我，不是糊涂的见证。当你清楚看见在威胁上运转的条件作用，它的抓握会松动。真正的失序是复制分裂的体系与制度。你可以安息于觉知已知——他者不只是他者，自我与共同体的边界并不固定——并从那种休息中选择建设而非摧毁的回应。
practice:
  options:
  - id: integrated_awakening_01
    display_name: 五分钟「对象—见证」坐（Object-Witness Sitting）
    announcement_line: Teacher Ra 教授五分钟 Object-Witness Sitting，用于冲突新闻已占据内在场域、旧模式导演全场时——与所起者同坐，作为见证休息。在侧栏，计时并逐步说明。
    relief_lines:
    - 心停止把每一次警报当作整个自我受威胁的证明。
    - 足够清明回归，以看见模式并选择不复制它的回应。
  - id: integrated_awakening_02
    display_name: 五分钟「对象—见证」坐（Object-Witness Sitting）
    announcement_line: Teacher Ra 教授五分钟 Object-Witness Sitting，用于恐惧已占据觉知、需要回到觉知已知时。所起者为对象；你是见证。在侧栏，短到可在警报后、下一场对话前或睡前使用。
    relief_lines:
    - 身体停止像威胁是唯一现实那样绷紧。
    - 足够空间回归，以支撑下一次清晰行动。
sdg:
  primary:
    title: 和平、正义与强大机构
    line: 联合国通过SDG 16及其和平、正义与强大机构目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 青年主导的和平建设组织提供进入对话与记录工作的入口。入口：加入如 UNA-USA 等本地到全球网络，或参与地区青年和平项目。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 冲突要求占据整个内在场域。问题在于它是否被允许留下。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位不二论吠檀多教师以 ubuntu 读冲突——并提供从清明而非条件作用回应的实践。
    - id: headline_layer_2_02
      line: palaver 与祖先见证的传统命名和平所需：谁在召集对话，谁被排除。
