hook_personal:
  options:
  - id: hook_personal_01
    line: 你看到测验结果。胃一沉。你做出顺从的样子。你又去查排名，因为数字没变，下沉感也没变。
  - id: hook_personal_02
    line: 最难的不只是失败或挣扎。更是在仍宣称分数证明你价值的体系里受苦——而「表现即价值证明」的模式在自动运转。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育压力也是秩序问题：当分数成为身份标记时运转的模式不是个人缺陷。它们是赌注过高、觉知无处安放只能落在数字上时会出现的东西。
  - id: hook_big_picture_02
    line: 青年的教育痛苦不止于分数。它关乎被继承的模式——把成绩等同于价值的条件作用，以及在不回到专注的情况下反复查看排名的反射。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（生于班加罗尔，不二论吠檀多传统教师——浸于奥义书与拉玛那·马哈希的参问）在实修场合见过年轻人因「分数证明价值」的模式运转而失去与自己真实所知相接的途径。他们不只问如何提高分数，而问如何足够清楚地看见该模式，使专注与稳定回归，让学习再次显现。
  - id: teacher_intro_02
    line: Teacher Ra 来自不二论吠檀多传统——引用尼萨加达塔如同引用《薄伽梵歌》——他在萨桑中见过成绩落下、旧模式接管时发生的事：条件作用、反复查排名却不回到真实所知。他们不求鼓励，而求如何足够清楚地看见模式，从所知而非从模式的强求中选取回应。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你看到分数。胃一沉。你做出顺从。你又查排名，因为数字未变，你所知也未在移开目光时回来。

      LOOP_SEQUENCE: "got the score. stomach dropped. performed compliance. checked ranking again."
  - id: youth_somatic_02
    line: |
      你看到张贴的成绩。肩锁住。你关掉应用。你又打开，因为感觉未变，模式也未释放。

      LOOP_SEQUENCE: "saw the grade. shoulders locked. closed the app. opened again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra 见过这一精确循环——结果抵达，胃下沉，顺从上演，注意返回，因为未解的模式仍在运转。
  - id: teacher_witness_02
    line: 他在年轻人身上见过这一序列——分数、下沉、表演、返回。模式在运转；问题是你能否足够清楚地看见它，以选择循环之外的东西。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth-led educational movements are reframing learning and assessment.
    stat_line_2: 年轻人在搭建替代评估框架、同伴学习圈，记录伤害，组织工作坊并主持活动，弥合成绩所测与实际学习所需之间的裂隙。「表现即证明」的模式正被「为学习而到场」的模式打断。
  - id: turnaround_02
    stat_line_1: Students are organizing for assessment reform and learning autonomy.
    stat_line_2: 年轻人组织工作坊、发起运动；青年倡导者追问谁设计了考试、它实际测量什么，并搭建不把学习与排名绑定的空间。查分的模式正被回到真正要学之事的模式取代。
bridge:
  options:
  - id: bridge_01
    line: 教育追踪器衡量成绩与毕业率。却不计算接纳反馈、让下沉穿过、回到真实所知——在反复查证与求证明的循环之外重新专注学习的容量。召集下一场学习圈的年轻人需要它；因模式不释而又查排名的人也需要。Teacher Ra 的传统数代以来一直在培育那种容量：你不是分数——你是其中分数显现的不变见证。当它被看见，模式松动，学习的能力回归。
  - id: bridge_02
    line: 评估体系数分数与排名。却不数当分数试图说服你知识就是数字时，年轻人能否安息于真实所知的内在容量。下一次诚实选择需要它；截图后又读规则的人也需要。Teacher Ra 的传统坚持：你从来不是那个模式——你是模式中显现的不变觉知。你不是要变成好学生，而是要停止假装你不是已经知道的那一位。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Teacher Ra 所见
    paragraphs:
    - Teacher Ra 以条件作用读青年的教育痛苦——当觉知在别处时自动运转的继承下来的思想、情绪与反应模式。传统不把那种痛苦病理化，而命名何者在运转。当你清楚看见模式——恐惧说分数证明价值、不回到专注却再查排名的反射——你不是模式。你是能看见它的那位。那段距离是不同方式学习的开始。
    - 整合的觉醒不是巅峰体验，而是与你一起走进教室与学习的东西。问题不是如何全天有动力，而是当下沉来临时如何暂停、命名何者在运转，并选择一个来自清明而非习惯的回应。传统把信任读作愿意放下心的固执，安息于觉知已知之处——此处即你对材料、问题、眼前题目真实所知。
    - 这一再框架是缓解的开始。挣扎不再证明你有毛病，而开始证明模式在运转。失序不只在心理；它也在把分数绑到价值的体系与在那些条件下清楚看见之间的裂隙。Teacher Ra 的传统为那裂隙提供实践——不是让体系变好，而是释放你自己的容量，使你能专注学习。
  - id: teacher_perspective_02
    header: Teacher Ra 所见
    paragraphs:
    - 在 Teacher Ra 的传统里，扎根日常生活的觉醒——非巅峰体验，而是你如何与现实相遇的持久转变——即是整合。承受教育压力的年轻人常试图在内容层面修补只能在看见层面移动的东西：分数证明价值的模式、下沉意味缺陷的模式、在评估前必须表演稳态的模式。当你清楚看见模式，它的抓握会松动。
    - 传统区分心的固执与觉知已知。下沉的身体、再次被查看的排名——那是模式在运转。能注意到它的那位，在那一刻已免于它。实践是回到那种注意，而非用力修正模式或用虚假的个体奋斗乐观来绕过。
    - 在这一框架下，痛苦本身成为信息：对赌注过高的体系的准确反应。自责软化。问题不是你坏了。问题是分数被赋予关于你的过重意义。Teacher Ra 的传统给你一条路：看见模式、命名它，并选择一个来自真实所知——使你留在学习中而非留在证明里——的回应。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「非我」落下（Not Mine Drop）
    announcement_line: Teacher Ra 教授五分钟「Not Mine」落下，用于成绩落下、表现—价值循环开始接管的时刻——每个不足的念头遇以「非我」，直到觉知回到真实所知。在侧栏，精确可用。
    relief_lines:
    - 模式不再导演整场戏。
    - 足够清明回归，以再专注与学习。
  - id: practice_02
    display_name: 五分钟「非我」落下（Not Mine Drop）
    announcement_line: Teacher Ra 教授五分钟「非我」落下，用于分数或反馈之后、下一次自习或课堂之前需要回到真实所知时。每个说「分数就是你」的念头遇以「非我」——觉知返回。在侧栏，为学习与查看之间的片刻计时。
    relief_lines:
    - 下沉穿过而非循环。
    - 足够稳定回归，以看清材料并选择投入。
sdg:
  primary:
    title: 优质教育
    line: 联合国通过SDG 4及其优质教育目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'Student Disability Rights Network 与 National Association of Student Financial Aid Administrators 等组织提供进入教育公平工作与同伴学习圈的青年入口。入口: https://www.studentdisabilityrightsnetwork.org'
  - id: cta_02
    line: 青年主导的学习圈、学习共同体与同伴辅导网络，提供替代单打独斗、唯分数论的自习方式。查询本地的青年教育正义组织，或与同伴开圈。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 教育压力也是一场「谁在主导」的危机。
    - id: headline_layer_1_02
      line: 警觉—自责循环是条件作用，不是性格。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位不二论吠檀多教师拒绝把成绩等同于价值的谎言——并指出如何清楚看见模式、再次学习。
    - id: headline_layer_2_02
      line: 自我参问与见证觉知的传统，在分数落下、旧模式接管全场时提供一种实践。
