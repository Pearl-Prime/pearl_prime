hook_personal:
  options:
  - id: hook_personal_01
    line: 你查看排班应用。胃一沉。你在变动前截图。你又读规则，因为班次没回来，紧绷也没离开。
  - id: hook_personal_02
    line: 最难的不只是财务不稳。更是在仍把不稳归咎于你的体系里受苦——而「若你挣扎，定是你个人有问题」的模式在自动运转。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 经济不稳定也是秩序问题：当零工经济迫使持续警觉时运转的模式不是个人缺陷。它们是体系把波动当作常态、把监视当作生存条件时会出现的东西。
  - id: hook_big_picture_02
    line: 青年的经济痛苦不止于钱。它关乎被继承的模式——把不稳定内化为个人责备的条件作用，以及在不回到你真实应得之物的情况下反复查看应用的反射。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra（不二论吠檀多传统——浸于奥义书与拉玛那·马哈希的参问）在实修场合见过年轻人把经济不稳定当作个人失败的证明。他们不只问如何多挣钱，而问如何看见把零工经济的波动变成自我责备的模式——以获得看清体系所需的清明与尊严。
  - id: teacher_intro_02
    line: Teacher Ra 来自不二论吠檀多传统——引用尼萨加达塔如同引用《薄伽梵歌》——他在萨桑中见过班次取消或工作枯竭、旧模式接管时发生的事：「若你挣扎，你就在失败」的条件作用，反复查看、截图、自我监视却不回到你应得之物。他们不求安慰，而求如何足够清楚地看见模式，以选择来自尊严而非羞耻的回应。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你查看排班应用。胃一沉。你在变动前截图。你又读规则，因为班次消失，「我有问题」的感觉却没有离开。

      LOOP_SEQUENCE: "checked the app. stomach dropped. took screenshot. read the rules again."
  - id: youth_somatic_02
    line: |
      你看到零工被取消。胸锁住。你又查应用。你又查，因为紧绷告诉你这是你的错，你必须修好它。

      LOOP_SEQUENCE: "saw the cancellation. chest locked. checked the app. checked again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Teacher Ra 见过这一精确循环——应用显示波动，胃下沉，截图发生，规则又被阅读，因为未解的羞耻仍在运转。
  - id: teacher_witness_02
    line: 他在年轻人身上见过这一序列——查看、下沉、截图、返回。模式在运转；问题是你能否足够清楚地看见它，以选择自我监视循环之外的东西。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth worker organizing is building collective power and system literacy.
    stat_line_2: 年轻工人在组建零工集体、记录算法歧视、组织运动并主持关于应用如何控制工作的透明化。个人羞耻的模式正被集体力量与清楚看见的模式打断。
  - id: turnaround_02
    stat_line_1: Youth are organizing economic justice and worker dignity movements.
    stat_line_2: 年轻人组织工作坊、发起运动，召集工资正义圈、绘制跨行业的不稳定地图，并追问波动体系使谁受益。自我监视的模式正被清楚看见体系并集体行动的模式取代。
bridge:
  options:
  - id: bridge_01
    line: 经济追踪器衡量增长与就业率。却不计算读懂班次变动、让下沉穿过、回到你真实应得之物——在反复查看与自我责备的循环之外与他人一起看清体系并行动的容量。召集下一场集体的年轻工人需要它；因模式不释而又查应用的人也需要。Teacher Ra 的传统数代以来一直在培育那种容量：你不是那个失败的零工工人——你是其中不稳定显现的不变见证。当它被看见，羞耻松动，从尊严行动的容量回归。
  - id: bridge_02
    line: 劳动报告数工作与工资。却不数当应用试图说服你波动是你的错时，年轻人能否安息于真实应得的内在容量。下一次诚实选择需要它；截图后又读规则的人也需要。Teacher Ra 的传统坚持：你从来不是那个模式——你是模式中显现的不变觉知。你不是要变得配得，而是要停止假装你不是见证一个被设计来让你忘记这一点的体系。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Teacher Ra 所见
    paragraphs:
    - Teacher Ra 以条件作用读青年经济不稳定。传统不把那种不稳定或其羞耻病理化，而命名何者在运转。当你清楚看见模式——恐惧说若你挣扎则你有毛病、监视应用却不回到你应得之物的反射——你不是模式。你是能看见它的那位。那段距离是看见体系并从尊严中选择的开始。
    - 整合的觉醒不是巅峰体验，而是与你一起走进工作本身与组织的东西。问题不是如何全天感觉稳定，而是当波动击中时如何暂停、命名何者在运转，并选择一个来自清明而非习惯的回应。信任是愿意放下心的固执，安息于觉知已知——此处即你关于自身价值与公正劳动的真实所知。
    - 这一再框架是缓解的开始。不稳定不再证明你有毛病，而开始证明模式在运转——把体系级波动变成个人责备的模式。失序不只在心理；它也在为监视与不稳定而设计的经济体系与在那些条件下清楚看见之间的裂隙。Teacher Ra 的传统为那裂隙提供实践。
  - id: teacher_perspective_02
    header: Teacher Ra 所见
    paragraphs:
    - 在 Teacher Ra 的传统里，整合指扎根日常生活的觉醒。穿行经济不稳定的年轻人常试图在内容层面修补只能在看见层面移动的东西——「若你挣扎，你坏了」「波动是你的错」「在不公条件下必须表演感恩」的模式。当你清楚看见模式，它的抓握会松动。
    - 传统区分心的固执与觉知已知。下沉的身体、被反复查看的应用、截图——那是模式在运转。能注意到它的那位，在那一刻已免于它。实践是回到那种注意，而非用力修正模式或用个体拼搏的虚假乐观绕过。
    - 在这一框架下，痛苦本身成为信息：对把监视与不稳定做成工作条件的体系的准确反应。自责软化。问题不是你坏了。问题是零工经济被设计为把风险外化给工人并把风险变成羞耻。Teacher Ra 的传统给你一条路：看见模式、命名它，并选择一个来自真实所知——使你与他人一起从尊严中看清体系并行动——的回应。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「谁在觉察？」停顿（Who's Noticing?）
    announcement_line: Teacher Ra 教授五分钟「Who's Noticing?」停顿，用于班次取消或工作枯竭、警觉—责备循环开始接管的时刻——一个问题把觉知带回觉察者本身。在侧栏，精确可用。
    relief_lines:
    - 模式不再导演整场戏。
    - 足够清明回归，以再从尊严中看见。
  - id: practice_02
    display_name: 五分钟「谁在觉察？」停顿（Who's Noticing?）
    announcement_line: Teacher Ra 教授五分钟「Who's Noticing?」停顿，用于班次取消或不稳定新闻之后、下一次查应用或谈话之前需要回到真实应得时。谁在觉察羞耻——一个问题，螺旋暂停。在侧栏，为触发与螺旋之间的片刻计时。
    relief_lines:
    - 自我监视循环暂停。
    - 足够稳定回归，以看清体系并从应得之物中选择。
sdg:
  primary:
    title: 体面工作和经济增长
    line: 联合国通过SDG 8及其体面工作和经济增长目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: '青年工人组织提供进入集体组织、工资正义与零工团结的入口。入口: https://youngworkersunited.org 与 https://gigworkersrising.org'
  - id: cta_02
    line: Economic Policy Institute 与地方工人中心等面向青年的组织提供圈子、技能建设与集体力量工作。查询你所在地区或线上正在组织的内容。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 经济不稳定也是一场「谁在主导」的危机。
    - id: headline_layer_1_02
      line: 警觉—责备循环是条件作用，不是性格。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位不二论吠檀多教师拒绝把不稳定说成个人缺陷——并指出如何清楚看见模式、从尊严中行动。
    - id: headline_layer_2_02
      line: 自我参问与见证觉知的传统，在零工经济与旧模式接管全场时提供一种实践。
