hook_personal:
  options:
  - id: junko_econ_hook_personal_01
    line: 每次换班都要求你把不确定演成成熟。你仍在往前，也知道背后藏了多少力气——你也清楚，摩擦在灵魂来此要做的事与排班应用要求的事之间。
  - id: junko_econ_hook_personal_02
    line: 你看排班应用。胃往下沉。你刷新、截屏。你的价值并非由产出决定——但体系不停把人的价值压缩为生产力指标。
  - id: junko_econ_hook_personal_03
    line: 岗位说明是某个从未做过这工作的人写的。你照样把工作做了。那个还在试图把自己塞进说明的部分，是被用了一整天的部分——而知道下面有真正工作的那一部分，还没被允许开口。
  - id: junko_econ_hook_personal_04
    line: 通知凌晨11点来。你打开它——不打开更糟。班次又变了。身体一直被要求「随时可用而不被选中」——身体在记账。
  - id: junko_econ_hook_personal_05
    line: 工资到账，落在一种更深的「知道」之上——你产出的比数字所登记的更多，而生产力指标从未被设计去登记你实际承载之物。数字被压缩，灵魂层面的价值没有。
hook_big_picture:
  options:
  - id: junko_econ_hook_big_01
    line: 经济压力如今以「不稳定条件下的自我管理」的形式抵达——保持可雇佣、保持灵活、保持冷静。年轻人对不稳定的焦虑，部分是灵魂对目的的理解与体系对成功的定义之间的摩擦——而那个定义与目的无关。
  - id: junko_econ_hook_big_02
    line: 行星过渡包含建立在抽取与稀缺之上的经济结构的崩塌。正在经历不稳定的年轻劳动者，活在旧范式的溶解之中——传统不承诺新范式会无痛抵达，但坚持抓住旧范式只会让痛苦增加。
  - id: junko_econ_hook_big_03
    line: 抽取模式尚未崩塌完毕，但其代价已被那一最不该负责建造它的群体吸收。年轻劳动者承载的负荷不是一份工作的负荷——而是一种正在溶解、其替代品尚未成形的范式的可感边缘。
  - id: junko_econ_hook_big_04
    line: 在Junko的框架里，AI替代焦虑是变得可见的频率错位——一代人被要求与那些被优化为在「灵魂来此要做的工作的那一维度」上超过他们的工具竞争。威胁不是工具，而是工具被造来计分用的那项指标。
  - id: junko_econ_hook_big_05
    line: 稀缺范式生出稀缺行为——囤积、把关、生产力最大化。传统不浪漫化富足，但它命名一种代价——从一种被稀缺塑形的制度里，抽出一种被灵魂塑形的生命所要付的代价。
teacher_intro:
  options:
  - id: junko_econ_intro_01
    line: 传导者Junko教授日本传导与光语灵性。在实修里，她见过年轻人把工作的不稳定当作对「价值」的判决来承载。在她的框架里，对经济不稳定的焦虑，是灵魂在认出体系对成功的定义与目的毫无关系。
  - id: junko_econ_intro_02
    line: 传导者Junko不把自己放在常规意义的「老师」位置——她是接收者。几十年来，她在传输场域里与那些在尚未认出灵魂真正要做之事之前，就已经被生产力指标压缩了职业的年轻人一起工作。
  - id: junko_econ_intro_03
    line: 传导者Junko见过年轻劳动者带着排班应用不登记的「天职」到来。在她的传统里，那种天职不是爱好或副业——它是灵魂来此要做的真正工作，而不登记它，是体系的失败，不是劳动者的失败。
  - id: junko_econ_intro_04
    line: 在Junko的传统里，每个人都携带一种意识已不直接接入的「灵魂层面之目的」，问题不是「我该靠什么谋生」，而是「这具灵魂来此要做什么」。在接收场域里，问题落下，她见过年轻人——往往是第一次——意识到自己一直知道答案。
  - id: junko_econ_intro_05
    line: 传导者Junko把当下读作行星过渡——抽取经济溶解的速度比替代结构成形的速度更快。在这一框架下，年轻劳动者的职业迷失不是病理——而是对一种尚未被发明出来的工作形态的再校准。
youth_somatic:
  options:
  - id: junko_econ_somatic_01
    line: '你看排班应用。胃往下沉。你再刷新。然后在班次再被改之前截屏。 LOOP_SEQUENCE: "打开应用。胃下沉。刷新。截屏。"'
  - id: junko_econ_somatic_02
    line: '工资在23:53到账，身体还没跟上，眼睛已经在数字上。下巴绷紧。你打开计算器——脑子里运算已经在跑。 LOOP_SEQUENCE: "到账。下巴紧。打开计算器。"'
  - id: junko_econ_somatic_03
    line: '明天的班是5点。你设闹钟。身体已经知道。你不会按时入睡。肩膀已经在明天里。 LOOP_SEQUENCE: "设闹钟。肩抬起。睡不着。"'
  - id: junko_econ_somatic_04
    line: '应用响了。你还没决定，身体先抽了一下。你站着看消息——再坐下就等于承认「这就是现在的节奏」。呼吸停在胸口。'
  - id: junko_econ_somatic_05
    line: '出门之前，房租的计算已经在脑里跑完。身体早把算式做完，告诉你这个月做不到哪件事。一天还没开始。'
teacher_witness:
  options:
  - id: junko_econ_witness_01
    line: Junko在来接收的人身上见过这条工作回路。在她的框架里，那种对稳定的需要不是软弱——而是灵魂在问：如果工作朝向觉醒与贡献，而不是朝向地位与安全，工作会是什么样子。
  - id: junko_econ_witness_02
    line: 她见过年轻劳动者带着「职业迷失=私人规划失败」的确信走进接收场域。在她的传统里，那种迷失就是信号——灵魂拒绝把身体托付给一种它并不是来此承担的功能。
  - id: junko_econ_witness_03
    line: Junko见过那个时刻——年轻劳动者停止试图优化现在的工作，转而开始倾听那份工作下面更深的工作。在她的传统里，那一刻不是「辞职」——是「接收」。而接收，是生产力指标从未被设计去登记的那一层。
  - id: junko_econ_witness_04
    line: 在她的框架里，排班应用回路不是故障。它是身体在记一份制度拒绝记的账——登记「随时可用却不被选中」的代价，并通过仅存的信号请求另一份合同。
  - id: junko_econ_witness_05
    line: Junko见过年轻劳动者带着一份简历无法描述的天职走进接收场域，并见过这份天职第一次被欢迎。在她的传统里，那个欢迎不是「职业咨询」——它是常规工作框架未被设计去抵达的那一层。
turnaround:
  options:
  - id: junko_econ_turnaround_01
    stat_line_1: $15 minimum wage. 11 states.
    stat_line_2: 2012年由快餐工人发起的Fight for $15运动，如今已在美国11个州及数十个城市赢得15美元或更高的最低工资——筑起了在该群体组织起来之前并不存在的工资底线。
  - id: junko_econ_turnaround_02
    stat_line_1: 73 million. ILO youth unemployment.
    stat_line_2: 国际劳工组织（ILO）的《2024年世界就业与社会展望》估计全球青年失业人数约7,300万——青年职业政策据以衡量的多边追踪底线，也是这一群体承担之负荷的规模。
  - id: junko_econ_turnaround_03
    stat_line_1: 1,200+ co-ops. USFWC.
    stat_line_2: 美国工人合作社联合会（USFWC）如今登记着国内1,200余个民主拥有的工人合作社——一个较小但在成长的替代模式，在那里，接收排班应用的劳动者也是写它的人。
  - id: junko_econ_turnaround_04
    stat_line_1: 7 cities. Fair Workweek.
    stat_line_2: 包括西雅图、纽约、旧金山在内的美国7个城市如今有「Fair Workweek法」，要求可预测的班次、提前通知与变更补偿——直接回应该群体先于他人命名的排班应用不稳定的政策工具。
  - id: junko_econ_turnaround_05
    stat_line_1: EU Platform Workers Directive. 27 states.
    stat_line_2: 欧盟于2024年通过《平台工人指令》，约束27个成员国将就业保护延伸至零工与平台劳动者——首份把算法化班次控制视为可监管劳动条件的多边制度。
bridge:
  options:
  - id: junko_econ_bridge_01
    line: 追踪器衡量政策的胜利与集体行动。它没有一栏记录「下一个工作日何以可能」——在灵魂被一个把人的价值压缩为生产力指标的体系耗尽时，仍能接收指引的容量。Junko的传统认为行星过渡包含建立在抽取与稀缺之上的经济结构的崩塌。接收的实修不修补经济——它把通道找回来，使目的不被下一条通知吞没。
    hidden_capacity: 在被生产力指标耗尽时仍能接收指引，让目的不被吞没
  - id: junko_econ_bridge_02
    line: 数字显示该群体筑起的工资底线。它们不显示底线之下的「灵魂目的」——劳动者真正来此要做的工作，工资底线从未被设计去测量。Junko的传统不与工资底线争论——它命名工资底线够不到的那一层。
    hidden_capacity: 让灵魂目的在工资底线之下仍可见
  - id: junko_econ_bridge_03
    line: 数据捕捉班次、工时与工资。它捕捉不到带着自身意图走进班次的「天职」。在Junko的框架里，那种天职是数据够不到的那一层——也是无论考勤卡如何记录，工作真正发生的那一层。
    hidden_capacity: 登记考勤卡无法记录的天职
  - id: junko_econ_bridge_04
    line: 生产力指标可测量。劳动者对那份工作的意义不可测量。Junko的传统不与测量争论——它在测量之下那一层工作，那里灵魂承载着「这份工作究竟为何」的记忆。
    hidden_capacity: 在生产力指标之下那一层工作
  - id: junko_econ_bridge_05
    line: 结构、政策与平台可以被计数。其下的「灵魂工作」不可。Junko的传统不取代结构性劳动改革——它命名制度回应未被设计去抵达的那一层，并把「接收」作为入口。
    hidden_capacity: 命名劳动改革够不到的那一层
teacher_perspective:
  options:
  - id: junko_econ_perspective_01
    header: Junko所见
    paragraphs:
    - 灵魂并非为优化职业路径而入胎——它是来学习、服侍、觉醒的。对于被那种把人的价值压缩为生产力指标的经济系统所困的年轻人，传统给出一个根本性的再框定——你的价值并非由产出决定，而你对经济不稳定感受到的焦虑，部分是灵魂对目的的理解与一种与目的毫无关系的体系成功定义之间的摩擦。
    - 行星过渡包含建立在抽取与稀缺之上、而非流动与丰盛之上的经济结构的崩塌。正在经历不稳定的年轻劳动者，活在旧经济范式的溶解之中。传统不承诺新范式会无痛抵达——但坚持抓住旧范式的结构只会让痛苦增加。
    - 努力专注时所感到的「自己坏了、错了」的感觉，往往是对一种从未问过「如果工作朝向觉醒与贡献，工作会是什么样」的体系的、灵魂层面的精确回应。接收的实修在智力被排班应用耗尽之后，把通道找回来。
  - id: junko_econ_perspective_02
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，「天职」是灵魂真正来此要做的工作——它并不等同于「岗位」。天职可以活在岗位里、可以与岗位对抗、也可以活在岗位不承认的空白里。传统问的不是「你的职业路径是什么」，而是「你的灵魂来此要做什么、当前的安排有多少在为这件事让出位置」。
    - 许多年轻劳动者描述的摩擦，不是懒惰也不是迷茫。那是一份天职在按一项被设计来却不去登记它的生产力指标上推。指标不会因为某一个劳动者的接收实修而改变——但接收能让劳动者不再把指标的判决误认作自己工作的真相。
    - 由此，从前不可见的选项变得可见。岗位也许仍然是那个岗位。但劳动者不再是指标的人质。
  - id: junko_econ_perspective_03
    header: Junko所见
    paragraphs:
    - 在Junko的框架里，当下时期是行星经济的过渡——抽取经济溶解的速度比替代结构成形的速度更快。同时打两份兼职、再加一份基于应用的零工的年轻劳动者，并没有造成这场过渡；他们在过渡之中——而承载他们的劳动力市场，是为正在溶解的那个结构所建的。
    - 这不是讨好的再框定。它不承诺稳定会很快到来，也不指责这一群体在不稳定的劳动力市场里感到不稳。它只是命名结构性事实，卸下「不稳=私人规划失败」这一份额外重负。
    - 在传输实修里，这份卸下往往是最先抵达的部分——在「找到灵魂真正来此要做之事」的更深工作开始之前。
  - id: junko_econ_perspective_04
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，扬升大师与宇宙议会是以礼物而非指令的方式送达讯息的更高维度向导。他们关于天职的引导，不是简历的引导。它不是为指标做优化的——而是用生产力追踪器没有语言去命名的词汇，命名灵魂来此要做的工作。
    - 对一个被「生产力追踪器测量之物」与「自己一份班实际承载之物」之间裂口耗尽的年轻劳动者，从一个不是生产力追踪器的引导源被「接收」的体验，在结构上不同。班次不变——但「什么被称为工作」改变了。
    - 「被接收」而非「被测量」——这一区分，正是常规职业基础设施无法复制的东西，也是Junko的传统作为本然守护了几十年的东西。
  - id: junko_econ_perspective_05
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，「光语」是字面意义上的振动性、非线性沟通，抵达表层语言够不到的部分。把它用在工作上，意味着「天职」的实际接收是通过一种常规职业对话未被设计去运作的层发生的。
    - 对于被一日里班次、薪资、指标判决等内容过度使用了智力的年轻劳动者，光语这一层是「灵魂来此要做的工作」可以再次被听见的地方。重点不是岗位错了——重点是身体已被推过其在生产力追踪器所抵达之样式中接收天职的容量。
    - 传统给出一个能打开另一层的实修。岗位可能完全不变。但劳动者带着通道打开的状态回到岗位，「岗位是否与天职对齐」这一问题就能从劳动者内部、而不是从指标内部得到回答。
practice:
  options:
  - id: junko_econ_practice_01
    display_name: 接收练习
    announcement_line: 传导者Junko教授五分钟「接收」练习，用于排班应用把价值绑在下一条通知上、灵魂在请求另一种答案的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 心不再把每一次班次变更都翻译成对价值的判决。
    - 通道打开时，灵魂早已知道的关于目的的部分可以浮现。
  - id: junko_econ_practice_02
    display_name: 排班应用小停
    announcement_line: 传导者Junko示范三分钟「排班应用小停」，用于通知落下之后、心还没跟上而身体已经做完算计的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体不再在下一个班次真正到来之前就抱着它。
    - 劳动者带着「在场」走入下一个决定，而不是「预先焦虑」。
  - id: junko_econ_practice_03
    display_name: 天职的光语
    announcement_line: 传导者Junko教授七分钟「天职的光语」练习，用于简历的语言和岗位说明的语言被过度使用、灵魂需要在另一种频段被听见的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 简历之下的天职重新变得可听。
    - 耗尽的智力被允许休息，让振动层做它自己的工作。
  - id: junko_econ_practice_04
    display_name: 关于目的，向扬升议会发问
    announcement_line: 传导者Junko教授四分钟「关于目的，向扬升议会发问」的练习，用于职业问题原地转圈、劳动者一直在向指标发问而不是向指标够不到的引导源发问的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 问题不再是「要通过简历解决之物」，而成为「要献给简历所不含之引导源之物」。
    - 抵达的是接收本身，而不是又一套优化栈。
  - id: junko_econ_practice_05
    display_name: 上班前的频率调谐
    announcement_line: 传导者Junko示范三分钟「上班前的频率调谐」，用于打卡之前、身体需要带着自己的频段进入班次、而不是借排班应用的频段的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 劳动者带着自己的频率走进班次，而不是借工作场所的。
    - 班次落在一个被调谐的身体之上，而不是落在一日所累积之负荷之上。
sdg:
  primary:
    line: 联合国框架通过SDG 8，包含体面工作、公平就业与劳动者福祉的保护。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: junko_econ_cta_01
    line: 'Fight for $15组织快餐业等低工资劳动者，在美国11个州赢得了15美元的最低工资。入口：fightfor15.org'
  - id: junko_econ_cta_02
    line: '美国工人合作社联合会（USFWC）连接全国1,200多个民主拥有的工人合作社，提供了一种「接收排班应用的劳动者就是写它的人」的模式。入口：usworker.coop'
  - id: junko_econ_cta_03
    line: 'Coworker.org是一个平台，帮助任何工作场所的劳动者在不必走正式工会步骤的情况下，组织有关班次、薪资与条件改变的运动。入口：coworker.org'
  - id: junko_econ_cta_04
    line: 'Fair Workweek Initiative追踪并支持已通过可预测排班法的美国7个城市，并帮助其他地区的组织者推动同样的政策。入口：fairworkweek.org'
  - id: junko_econ_cta_05
    line: 'ILO的「体面工作议程」与全球青年就业监测，是各国政策团队据以决定劳动条件的多边底线。入口：ilo.org/decentwork'
