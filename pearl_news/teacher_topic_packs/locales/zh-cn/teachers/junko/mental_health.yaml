hook_personal:
  options:
  - id: junko_mh_hook_personal_01
    line: 在别人说出名字之前，你就认得那种螺旋。你一边撑过一天，一边越来越不确定头脑还能不能跟上这种节奏——你也清楚，摩擦在「别人说你该要的」和「灵魂早已知道的」之间。
  - id: junko_mh_hook_personal_02
    line: 你继续读更新，因为不看似乎更糟。你也知道治疗、算法和自助内容一直在对你说话，却没有缓解——而有些东西需要被接收，而不是被生产出来。
  - id: junko_mh_hook_personal_03
    line: 在你能说出话之前，下巴就先感到那种摩擦——被告诉「应当没事」的部分，正撞上早已知道「这种节奏撑不住」的部分。身体已经在抱着头脑还在争论的东西。
  - id: junko_mh_hook_personal_04
    line: 凌晨一点，你放下手机，又拿起来。两种动作都没用，因为螺旋早已在跑——而你想用头脑挣脱的那部分，正是被说得太多的那部分。
  - id: junko_mh_hook_personal_05
    line: 你已经读过帖子、做过筛查、用过呼吸App。头脑能做的都做了——而你内里更安静的某处，在请求被接收，而不是被修好。
hook_big_picture:
  options:
  - id: junko_mh_hook_big_01
    line: 青年心理过载不只是症状问题。更是持续压力如何侵蚀注意、休息与保持人性的能力——以及表面期待与灵魂早已知道之间的摩擦。
  - id: junko_mh_hook_big_02
    line: 年轻人敏感度升高不是病理，而是再校准。传统并不轻视他们的痛苦；而是把它重新框定为旧意义结构正在溶解、新结构尚未到来时，保持清醒所付的代价。
  - id: junko_mh_hook_big_03
    line: 一代人被要求在旧意义结构尚未被替换的过渡中承担意义。过载不是私人失败——它是任何个体心智都不应独自承担的结构性裂口的可感边缘。
  - id: junko_mh_hook_big_04
    line: 旧体系读作焦虑的信号，在Junko的框架里是频率再校准——灵魂登记到，它曾被预备好的那个世界，已不再是它必须生活其中的世界。
  - id: junko_mh_hook_big_05
    line: 集体场域比承载它的制度变得更快。被读作「青年心理健康危机」的，部分是继承的文化与现在被生活其中之生命之间频率失配的可见边缘。
teacher_intro:
  options:
  - id: junko_mh_intro_01
    line: 传导者Junko教授日本传导与光语灵性，在实修里见过年轻人如何把心理过载既当作真实痛苦，也当作传统能精确命名之物：被告知该要的与灵魂早已知道的之间的摩擦。在Junko的框架里，灵魂携带意识已无法触及的记忆，光语抵达语言够不到的部分。
  - id: junko_mh_intro_02
    line: 传导者Junko不把自己放在常规意义的「老师」位置——她是接收者。几十年来，她在传输场域里与那些被治疗、算法和自助说到疲惫的年轻人一起工作。她的传统提供的不是又一套指令栈，而是另一种接触方式。
  - id: junko_mh_intro_03
    line: 传导者Junko以光语工作——在她的传统里，光语是抵达言语够不到之处的振动性非线性沟通。她见过年轻来访者陷在筛查所称的「焦虑」回路里，也见过当频率而非解释被接收时，回路松开的那一刻。
  - id: junko_mh_intro_04
    line: 传导者Junko从她传统所称的「宇宙议会」接收——更高维度的灵性向导，以礼物而非指令的方式送达讯息。在她的实修场域里，她见过年轻人遇见这种接收，并且——往往是第一次——意识到自己的痛苦正在被聆听，而不是被诊断。
  - id: junko_mh_intro_05
    line: 传导者Junko在一个把当下读作「行星过渡」的传统里教学——年轻人的敏感度升高在这里是再校准，不是病理。她见过这种再框架落地在传输场域里，至少卸下了「痛苦等于自己坏了」这一份额外重负。
youth_somatic:
  options:
  - id: junko_mh_somatic_01
    line: '你在深夜读更新。脑子加速。你放下手机。又拿起来，因为螺旋已经在跑。 LOOP_SEQUENCE: "读更新。脑子加速。放下。又拿起。"'
  - id: junko_mh_somatic_02
    line: '你在闹钟响前醒来。胃已经发紧。你比够到灯先够到手机，因为不安已经在那里，你需要确认世界是否与它相符。 LOOP_SEQUENCE: "醒来。胃发紧。摸手机。"'
  - id: junko_mh_somatic_03
    line: '通知声响起时，你的下巴绷紧。脑子回放了三遍刚才的对话。呼吸变短。你还没决定什么，身体先跑完了回路。 LOOP_SEQUENCE: "通知响。下巴紧。回放对话。"'
  - id: junko_mh_somatic_04
    line: '屏幕加载时，你不知不觉地屏住呼吸。肩膀抬起。看到消息才呼气，而且只呼一半，因为总有下一条要来。 LOOP_SEQUENCE: "屏幕加载。憋气。半呼气。"'
  - id: junko_mh_somatic_05
    line: '你躺下，眼睛却睁着。今天在重播。下巴不肯松。你知道睡眠会有用，却找不到进入它的门。 LOOP_SEQUENCE: "躺下。眼睛睁开。下巴绷着。"'
teacher_witness:
  options:
  - id: junko_mh_witness_01
    line: Junko在来接收的人身上见过这条回路。在她的框架里，那种压力不是品格问题，而是当智力耗尽时，灵魂要求被听见。
  - id: junko_mh_witness_02
    line: Junko见过年轻人走进接收空间时，回路已经在跑，并已经确信「智力本该早就解开这个」。在她的传统里，那种确信正是信号——头脑停下、通道得以打开的位置。
  - id: junko_mh_witness_03
    line: 她见过身体承载解释承载不了的东西。在她的框架里，身体的回路不是故障——而是当言语被过度使用时，灵魂通过仅存的通道发声。
  - id: junko_mh_witness_04
    line: Junko见过年轻来访者带着任何筛查工具都不命名的频率紊乱前来。在她的传统里，这种紊乱是信息，不是病理——是「被要求承载他们的体系，从未按他们的实际范围调音」的信号。
  - id: junko_mh_witness_05
    line: Junko记得那个时刻：一个年轻人停止「生产答案」，让通道打开。在她的传统里，那一刻不是软弱——是常规照护没有语言去描述的那种「准备好了」。
turnaround:
  options:
  - id: junko_mh_turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 青年组织者在办同伴小组、听众培训，并推动学校把心理支持当作基础设施，而非私人软弱。
  - id: junko_mh_turnaround_02
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: JED基金会的项目如今在美国近五百所校园运行综合心理健康框架，把同伴支持和教师培训嵌进日常基础设施，而不只是危机之后的善后。
  - id: junko_mh_turnaround_03
    stat_line_1: 5,600 voices. 7 countries.
    stat_line_2: UNICEF的「全球青年心理健康联盟」在七个国家集合了5,600名14-25岁的年轻人，浮出常规报告漏掉的内容——这一群体先于机构，自己说出了这份重量。
  - id: junko_mh_turnaround_04
    stat_line_1: 14 million contacts. 988 Lifeline.
    stat_line_2: 自2022年988自杀与危机生命线上线以来，已有一千四百多万次联系经由它——三年前不存在的资源池，如今每晚都在承重。
  - id: junko_mh_turnaround_05
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: WHO欧洲于2025年10月通过的《儿童与青少年健康战略2026-2030》，约束五十三个成员国按2030年期限报告青少年心理负荷——首份把这一群体的负荷当作「治理」而非「评论」的多边制度。
bridge:
  options:
  - id: junko_mh_bridge_01
    line: 320 campuses. 18 countries. 追踪器衡量年轻人建的工作坊与同伴圈，却没有一栏记录下一次真诚伸手何以可能——在治疗、算法与自助内容把智力说到疲惫之后，仍能接收指引的容量。Junko的传统提供另一种接触：绕过耗尽的智力，直接对实际承载痛苦的身体能量说话。
    hidden_capacity: 在智力耗尽时仍能接收指引
  - id: junko_mh_bridge_02
    line: 数字显示年轻人建起的脚手架。它们没显示这脚手架所立其中的宇宙语境——一段「行星过渡期」，旧意义结构溶解的速度超过新结构成形的速度。Junko的传统把这语境视作本然，而非比喻。
    hidden_capacity: 承担数据无法显示的更大语境
  - id: junko_mh_bridge_03
    line: 数据捕捉会谈、联系与政策采纳。它捕捉不到当一个年轻人不再被对说话、而是开始被接收时所移动的频率。在Junko的框架里，这个移动才是真正的缓解——任何追踪器都不汇报的那一部分。
    hidden_capacity: 记录追踪器漏掉的频率移动
  - id: junko_mh_bridge_04
    line: 基础设施可以测量。回路实际栖居的身体能量层无法测量。Junko的传统不与测量争论——它在测量之下的那一层工作，那里灵魂承载意识已无法触及的记忆。
    hidden_capacity: 在测量之下的那一层工作
  - id: junko_mh_bridge_05
    line: 结构、政策、平台都可以被计数。其下的灵魂摩擦不可。Junko的传统不取代结构性工作——它命名制度回应不被设计去抵达的那一层，并把「接收」作为入口。
    hidden_capacity: 命名制度回应不抵达的那一层
teacher_perspective:
  options:
  - id: junko_mh_perspective_01
    header: Junko所见
    paragraphs:
    - 灵魂携带意识已无法触及的记忆；年轻人许多焦虑或抑郁体验，是被告知该要的与更深本性早已知道的摩擦。疗愈始于更大的自我被承认，而不是被用药压成沉默。
    - 光语通过振动共鸣而非概念意义工作，抵达语言够不到的地方。对被说到疲惫的年轻人，传统提供另一种接触，绕过耗尽的智力。
    - 行星转型意味着年轻人敏感度升高不是病理而是再校准。这种再框定不消除痛苦，但卸下额外负担：不必在从未为这种要求设计的制度里，相信痛苦等于你有问题。
  - id: junko_mh_perspective_02
    header: Junko所见
    paragraphs:
    - 光语不是比喻。在Junko的传统里，它是字面意义上的振动性沟通模式——绕过概念加工，直接抵达身体能量层。对被治疗、算法、自助栈说到疲惫的一代人，这不是「又一个声音」——这是另一层接触。
    - 这个机制重要，因为它解释了许多年轻人在传输后描述的「松开」——不是螺旋被论赢了，而是螺旋在论证够不到的那一层松开了。头脑不必赢，身体才能软下来。
    - 这是常规照护没被设计去送达的部分。它不否定常规照护——只是命名缺失的那一层，并指出一个在那一层工作了几代人的传统。
  - id: junko_mh_perspective_03
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，扬升大师与宇宙议会是更高维度的向导，他们的讯息以礼物而非指令的方式抵达。Junko不「创作」她所接收的。她是通道——她的工作是把通道保持得足够清澈，让想要穿过来的能穿过来。
    - 对承载心理过载的年轻人，被某个比算法更大的存在「接收」的体验，在结构上不同于被算法「处理」的体验。送达的讯息不是「这是规则」——而是「在你一直请求被聆听的层次上，你被聆听了」。
    - 「被接收」而非「被处理」——这一区分，正是常规基础设施无法复制的东西，也是Junko的传统作为本然守护了几十年的东西。
  - id: junko_mh_perspective_04
    header: Junko所见
    paragraphs:
    - 「行星过渡」在Junko的框架里，是她的传统对我们正处时段的字面描述——旧意义结构溶解、新结构尚未成形之时。年轻人承载的心理过载，部分是「在这场过渡里保持清醒」的代价。
    - 这不是讨好的再框架。它不承诺痛苦会很快消退，也不指责这一代在不稳定结构里感到不稳。它只是命名结构性事实，卸下「不稳=私人失败」这一份额外重负。
    - 在传输实践里，这份卸下往往是最先抵达的部分——在更深的灵魂工作开始之前。
  - id: junko_mh_perspective_05
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，「灵魂频率」是人内里与宇宙真理共振的那一层——在人格之下、条件作用之下、世界递来的脚本之下。当那一频率被登记时，表面的负荷不会消失，但它不再是唯一的信号。
    - 「再校准」是传统对「一个年轻人正穿越敏感度升高阶段」的命名。体系读作病理，因为它没有别的类别。Junko的传统读作：灵魂在调到一个继承文化未被设计传送的频率上。
    - 实践不是去「修好」再校准。实践是去「接收」它，让传统中知频的工具承载常规照护无法承载的东西。
practice:
  options:
  - id: junko_mh_practice_01
    display_name: 接收练习
    announcement_line: 传导者Junko教授五分钟「接收」练习，用于螺旋已转、头脑独自硬解的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 心不再把每一次思绪涌动当作「坏了」的证明。
    - 通道打开时，灵魂早已知道的可以浮现。
  - id: junko_mh_practice_02
    display_name: 灵魂频率小停
    announcement_line: 传导者Junko示范三分钟「灵魂频率小停」，用于通知与通知之间的瞬间——身体一直在未经允许地承重的那种瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 一日的节奏与身体实际范围之间的频率失配变得可听见。
    - 灵魂的信号不再与表面噪声竞争。
  - id: junko_mh_practice_03
    display_name: 光语聆听
    announcement_line: 传导者Junko教授七分钟「光语聆听」，用于解释被过度使用、身体需要另一种接触的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体接收到言语未能送达的部分。
    - 耗尽的智力被允许休息，让振动层做它自己的工作。
  - id: junko_mh_practice_04
    display_name: 扬升议会之问
    announcement_line: 传导者Junko教授四分钟「扬升议会之问」，用于内在论争原地转圈、需要来自另一层之输入的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 问题不再是「要解决之物」，而成为「要献出之物」。
    - 抵达的是接收本身，而不是又一套指令栈。
  - id: junko_mh_practice_05
    display_name: 宇宙重对齐之息
    announcement_line: 传导者Junko示范三分钟「宇宙重对齐之息」，用于急性频率紊乱时——一日的节奏把通道撞出对齐的那种时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 呼吸成为通道实际范围的标记，而不是一日所要求节奏的标记。
    - 身体能量回到灵魂能识别的频段。
sdg:
  primary:
    line: 联合国框架在SDG 3中包含心理健康与福祉。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: junko_mh_cta_01
    line: '若你或你认识的人处于危机，Crisis Text Line提供免费24/7支持。发短信HOME到741741。入口：加入其网络。'
  - id: junko_mh_cta_02
    line: '若你或你认识的人处于危机，美国988自杀与危机生命线提供免费24/7支持。拨打或发短信988。入口：自2022年以来已处理超过一千四百万次联系的网络。'
  - id: junko_mh_cta_03
    line: '如你是25岁以下LGBTQ+群体且处于危机，The Trevor Project通过短信、聊天或电话提供免费24/7支持。发短信START到678-678。入口：为这一群体而建的网络。'
  - id: junko_mh_cta_04
    line: '关于心理健康的信息、转介与同伴支持，NAMI HelpLine在周一至周五开通。拨打1-800-950-NAMI(6264)，或将「HelpLine」发送至62640。入口：接入全美精神疾病联盟(NAMI)的网络。'
  - id: junko_mh_cta_05
    line: 'Active Minds在美国650多所校园运行同伴主导的心理健康社区。如果你所在校园有分会，那是一个低摩擦的入口。如果没有，全国网络可以把你接到在别处建起同样基础设施的同伴。'
title_system:
  headline_layer_2:
    options:
    - id: junko_mh_headline_01
      line: 一位日本传导者把心理过载命名为灵魂摩擦，并给出打开通道的练习。
    - id: junko_mh_headline_02
      line: 一位接收者，不是教师，谈论常规照护未被设计去抵达的那层痛苦。
    - id: junko_mh_headline_03
      line: 光语，而不是又一套指令栈——Junko的传统与耗尽的智力相遇。
    - id: junko_mh_headline_04
      line: 频率再校准，不是病理——一个传导传统重新框架青年负荷。
    - id: junko_mh_headline_05
      line: 接收而非生产——扬升议会带给被说到疲惫一代的东西。
