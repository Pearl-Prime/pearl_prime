hook_personal:
  options:
  - id: junko_edu_hook_personal_01
    line: 你仍然想学习。你也清楚体系在真正进入正题前浪费了多少注意——而眼前的学习者，并不是这个体系当初被设计去面对的那种学习者。
  - id: junko_edu_hook_personal_02
    line: 你打开门户。注意断掉。你切换标签，又回来。作业还得交，而你内里有一部分知道：灵魂携带表层心智已经够不到的记忆。
  - id: junko_edu_hook_personal_03
    line: 你坐下来读书，房间的频率却与你带进来的频率不合。智力试图硬推，身体反推回来。负荷不是材料——而是那道错位。
  - id: junko_edu_hook_personal_04
    line: 作业摆在面前。你的头脑已经在学校里干完了九个小时。同一段你读了三遍都没进——而那个想用头脑硬推过去的部分，正是被用了一整天的那部分。
  - id: junko_edu_hook_personal_05
    line: 成绩落下来，落在一种更深的「知道」之上——评分量表从未被设计去登记你早已理解了材料的那种方式。表层心智被压缩，灵魂记忆没有。
hook_big_picture:
  options:
  - id: junko_edu_hook_big_01
    line: 当下青年教育的危机，主要不是内容或方法的危机——而是频率的危机。为工业时代之服从而设计的教室运行在一种振动层级上，与那些比上一代带着更高敏感度和能量觉知到来的年轻人不相容。
  - id: junko_edu_hook_big_02
    line: 只测量「智力可以再现之物」的教育系统，是在测量人所知的最小一部分。真正的教育是唤醒对那一更深智能的接入，而不只是给表层心智加更多信息。
  - id: junko_edu_hook_big_03
    line: 为某一频率所造的教室，承载不了带着另一频率而来的群体。被读作注意缺失或行为失败之物，在Junko的框架里是制度没有类别去命名的频率错位——有没有类别，负荷都是真的。
  - id: junko_edu_hook_big_04
    line: 当测量把「算作知道」的范围收窄时，落在量表之外的并不缺席——只是没被登记。年轻学习者所描述的危机，不仅是体系所要求的，也是体系看不见他们已经承载之物的危机。
  - id: junko_edu_hook_big_05
    line: 为工业服从而造的教室，预设的学习者其注意是可以无限再生的资源、其身体是大脑的载具。如今穿过这些教室的群体二者皆非。撞上他们的是结构性框架——而被诊断的，是这群体本身。
teacher_intro:
  options:
  - id: junko_edu_intro_01
    line: 传导者Junko教授日本传导与光语灵性。在实修里，她见过年轻人在抵达学习之前就已被「只测量智力能复现之物」的体系耗尽。在她的框架里，当下青年教育的危机主要不是内容或方法的危机——而是频率的危机。眼前的学生并不是体系当初被设计去面对的那种学习者。
  - id: junko_edu_intro_02
    line: 传导者Junko不把自己放在常规意义的「老师」位置——她是接收者。几十年来，她在传输场域里与那些在真正坐下来学习他们想学的东西之前，就已被一整天的内容堆叠用完智力的年轻人一起工作。她的传统提供的是另一种完全不同的接触模式。
  - id: junko_edu_intro_03
    line: 传导者Junko见过年轻学习者带着教室不登记的频率到来。在她的传统里，那种频率不是缺陷或怪癖——它是关于「制度被设计去面对什么」与「真正走进门来的群体是什么」之间裂口的信息。
  - id: junko_edu_intro_04
    line: 在Junko的传统里，每个人都携带意识已经够不到的灵魂记忆，真正的教育就是唤醒这种接入。她见过被评分量表淘汰的学生走进传输会谈，并第一次承认自己其实「知道」一些此前从未被允许称为「学习」的东西。
  - id: junko_edu_intro_05
    line: 传导者Junko把当下这段时期读作行星过渡——旧的学习结构溶解的速度，比新结构成形的速度更快。在这一框架下，年轻学习者敏感度的升高不是病理也不是分心——而是对一种制度尚未跟上的课程的再校准。
youth_somatic:
  options:
  - id: junko_edu_somatic_01
    line: '你打开作业门户。注意断掉。切换标签。然后回来，因为作业还得交。 LOOP_SEQUENCE: "打开门户。注意断掉。切换标签。回来。"'
  - id: junko_edu_somatic_02
    line: '考试在屏幕上加载。下巴锁住。读完第一题，眼神发空。没吸收任何东西地往下滚。手知道时钟正在跑。 LOOP_SEQUENCE: "考试开始。下巴锁住。没吸收地滚动。"'
  - id: junko_edu_somatic_03
    line: '你坐着听讲，肩膀未经许可地往上升。幻灯片刷新。身体已经静止四十分钟，呼吸也跟着变短。 LOOP_SEQUENCE: "坐着听讲。肩膀上升。呼吸变短。"'
  - id: junko_edu_somatic_04
    line: '你读到一半时群聊亮起。呼吸被吊住。你查消息，丢失阅读的线。其实阅读早已没进——群聊只是把那道分散叫出了名字。 LOOP_SEQUENCE: "读到一半。群聊亮起。线断了。"'
  - id: junko_edu_somatic_05
    line: '下课。你走进走廊。眼睛在储物柜上失去焦点，身体终于把一天呼了出去。你掏出手机。下一件事你已经没有余地去抱了，所以滚动开始。 LOOP_SEQUENCE: "下课。眼睛失焦。开始滚动。"'
teacher_witness:
  options:
  - id: junko_edu_witness_01
    line: Junko在来接收的人身上见过这条序列。在她的框架里，那种断裂不是缺陷的证据——而是灵魂在请求一种「门户从未被设计去提供的」接触。
  - id: junko_edu_witness_02
    line: 她见过制度把分散读作失败，可分散正是信号——身体知道，被叫进来的那种频率，再撑一个小时就会有什么撕裂。
  - id: junko_edu_witness_03
    line: Junko见过年轻学习者在传输场域里到来时已经确信「无法集中=自己的品格问题」——也见过身体认出「原来这一直是在读一个结构性错位，不是我坏了」的那一刻。
  - id: junko_edu_witness_04
    line: 在她的框架里，「门户疲劳」不是比喻。智力一整天都在被以同一种方式过度使用，而灵魂这一整段时间一直在请求另一层。接收的房间，是这种请求被听见的唯一房间。
  - id: junko_edu_witness_05
    line: Junko见过年轻学习者带着评分量表不登记的频率走进接收的房间——并见过这频率第一次被欢迎。在她的传统里，那个欢迎不是治疗、也不是课程——它是缺失的那一层。
turnaround:
  options:
  - id: junko_edu_turnaround_01
    stat_line_1: 650 chapters. US campuses.
    stat_line_2: Active Minds如今在美国校园运行六百五十多个同伴主导的心理健康分会，培训学生主持倾听小组，并推动制度把学习条件当作基础设施，而不是私人「韧性」。
  - id: junko_edu_turnaround_02
    stat_line_1: 244 million. Out of school.
    stat_line_2: 联合国教科文组织（UNESCO）的SDG 4监测把全球失学儿童与青少年数估计为2.44亿——任何「教室频率」讨论被测量的底线，也是这一群体之负荷被承担的规模。
  - id: junko_edu_turnaround_03
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: JED基金会的JED Campus项目在美国近五百所大学里运行综合心理健康与学习条件框架，把同伴支持和教师培训嵌入到日常基础设施中。
  - id: junko_edu_turnaround_04
    stat_line_1: 65 percent. UNICEF Learning Recovery.
    stat_line_2: UNICEF的2024年「学习恢复」监测显示，全球约65%的相当于十年级的学生达到基础熟练度——一个政策可以用「有资金的恢复项目」而不是修辞来回应的可追踪缺口。
  - id: junko_edu_turnaround_05
    stat_line_1: $1 billion. Education Cannot Wait.
    stat_line_2: 联合国托管的、面向危机受影响教育的全球基金Education Cannot Wait，自2016年以来已动员超过十亿美元——资金被导向标准课堂体系结构性上无法触及的那一群体。
bridge:
  options:
  - id: junko_edu_bridge_01
    line: 追踪器衡量政策变化和同伴项目。它没有一栏记录「下一个小时真正能集中」何以可能——在表层心智散乱时，从灵魂层接收的容量。Junko的传统认为，每个人都携带灵魂记忆，真正的教育是唤醒对那更深智能的接入，而不只是给表层心智加信息。
    hidden_capacity: 在表层心智散乱时从灵魂层接收
  - id: junko_edu_bridge_02
    line: 被追踪的结果记录完成、出勤、成绩。它们不记录数据被捕获那一刻学习者所携带的频率。在Junko的框架里，那个频率正是数据够不到的那一层——也是真正错位被承载之处。
    hidden_capacity: 登记数据够不到的那一频率
  - id: junko_edu_bridge_03
    line: 指标命名评分量表。它们无法命名评分量表从未被设计去读的灵魂记忆。Junko的传统不取代评分量表——它命名其下那一层，并将「接收」呈现为疲惫心智回到那一层的入口。
    hidden_capacity: 在量表收窄时仍让灵魂记忆可达
  - id: junko_edu_bridge_04
    line: 内容可数。教室传输的振动不可数。Junko的传统认为，房间的振动也是被教之物的一部分——而带着更高敏感度的学生，在登记课件之前先登记房间的频率。
    hidden_capacity: 在内容之外也登记振动
  - id: junko_edu_bridge_05
    line: 体系测量它自身被设计去测量的东西。年轻学习者带来的更深的「知道」并不在那一设计里。Junko的传统不与设计争论——它命名设计之外的那一层，并提供让它重回房间的实践。
    hidden_capacity: 让更深的「知道」重回房间
teacher_perspective:
  options:
  - id: junko_edu_perspective_01
    header: Junko所见
    paragraphs:
    - 只测量「智力能在考试中复现之物」的教育系统，是在测量人所知的最小一部分。传统认为每个人都携带灵魂记忆，而真正的教育是唤醒对那更深智能的接入这一过程。
    - 当下青年教育的危机，主要不是内容或方法的危机，而是频率的危机。为工业时代服从设计的教室运行在与年轻人高敏感度不相容的振动层级。传统并不要求学校教传导——它只要求学校注意到：眼前的学生并不是体系所设计去面对的那种学习者。
    - 努力集中时所感到的「自己坏了、错了」的感觉，往往是对频率错位的精确回应。接收的实践能在体系耗尽智力之后把通道找回来。
  - id: junko_edu_perspective_02
    header: Junko所见
    paragraphs:
    - 教室的频率也是被教之物的一部分。Junko的传统认为，对振动敏感的年轻人，在登记屏幕上的幻灯片之前先登记房间的频率。当频率对群体怀有敌意时，课就落在一个已经被加载的身体之上——而那份加载就被命名为「不专心」。
    - 这不是对老师的批评。老师也在结构内工作，他们不是自己所教房间的设计者。传统所命名的，是课程之下的那一层——真正「接收」是发生还是没发生的那一层。
    - 接收这一层，正是Junko的实修工作之处。它不取代教法——它让被一日推过其频率的学习者，重新够到教法。
  - id: junko_edu_perspective_03
    header: Junko所见
    paragraphs:
    - 在Junko的框架里，当下时期是行星过渡——旧的学习结构溶解的速度比新结构成形的速度更快。坐在笔记本前的年轻学习者没有造成这场过渡；他们处在它之中——而承载他们的制度，是为正在溶解的那一结构所建的。
    - 这不是讨好的再框定。它不承诺负荷会很快消退，也不指责这一群体在不稳定制度里感到不稳。它只是命名结构性事实，卸下「不稳=私人失败」这一份额外重负。
    - 在传输实修里，这份卸下往往是最先抵达的部分——在更深的「恢复对灵魂记忆之接入」的工作开始之前。
  - id: junko_edu_perspective_04
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，扬升大师与宇宙议会是以礼物而非指令的方式送达讯息的更高维度向导。他们的课程不是教科书的课程——它是当接收者敞开、通道清澈时被传输的「知道」之层。
    - 对被教科书堆叠耗尽的年轻学习者，从「不必由智力生产」的课程中接收的体验，在结构上不同于「依据智力所生产之物」被评分的体验。教科书并未被否定。另一层被重新归位。
    - 把那一层归位，是Junko的传统几代人所做的事。这不是学校的替代——这是学校从来不是被设计去送达的那一缺失之层。
  - id: junko_edu_perspective_05
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，「光语」是字面意义上的振动性、非线性沟通，抵达表层语言够不到的部分。把它用在学习上，意味着「知道」的接收是通过常规教室未被设计去传输的那一层发生的。
    - 对于已被一日内容堆叠过度使用智力的年轻学习者，光语这一层是实际素材可以再次落地的场所。重点不是教科书错了——重点是身体已被推过其在教科书所到达之样式中接收的容量。
    - 传统给出一个能打开另一层的实修。教科书的课不变——学习者在通道打开的状态下回到课上，同样的字句重新变得可达。
practice:
  options:
  - id: junko_edu_practice_01
    display_name: 接收练习
    announcement_line: 传导者Junko教授五分钟「接收」练习，用于门户与标签把注意打散、作业又还得交的时刻。灵魂已经知道，比表层心智能承载的还多。在侧栏，计时并逐步说明。
    relief_lines:
    - 心不再把每一次被打断都当作「失败」的证据。
    - 通道打开时，灵魂早已知道的可以浮现。
  - id: junko_edu_practice_02
    display_name: 任务之间的通道重置
    announcement_line: 传导者Junko示范三分钟「通道重置」，用于一个标签切到下一个标签的瞬间——智力切换上下文的速度超过身体跟得上的速度的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体不再把上一项任务的残留带到下一项里。
    - 通道在新任务进入之前打开，而不是等到它已经出错之后。
  - id: junko_edu_practice_03
    display_name: 光语阅读小停
    announcement_line: 传导者Junko教授四分钟「光语阅读小停」，用于页面的字句不再落地、表层心智已被推过其吸收速率的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 在意义被硬推之前，先接收素材的振动。
    - 身体掉进一个阅读得以落地的频段，页面重新变得可达。
  - id: junko_edu_practice_04
    display_name: 灵魂记忆唤回
    announcement_line: 传导者Junko教授四分钟「灵魂记忆唤回」，用于考试或作业触发「我其实不知道自己已经知道的东西」这一确信的瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 智力不再是学习者可以请求的唯一来源。
    - 学习者带进房间的更深的「知道」重新变得可达。
  - id: junko_edu_practice_05
    display_name: 上课前的频率调谐
    announcement_line: 传导者Junko示范三分钟「上课前的频率调谐」，用于进入教室前、登入讲座前——身体需要带着自己的频段进入房间的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 学习者带着自己的频率走进房间，而不是借房间的。
    - 课程落在一个被调谐的身体之上，而不是落在一日所累积之负荷之上。
sdg:
  primary:
    line: 联合国框架通过SDG 4，将福祉与包容性学习条件视为优质教育的一部分。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: junko_edu_cta_01
    line: 'Active Minds在美国校园运行超过650个同伴主导的心理健康分会，为不把注意当作无限资源的学习条件而工作。入口：activeminds.org'
  - id: junko_edu_cta_02
    line: 'The Jed Foundation运行JED Campus，是如今嵌入美国近五百所大学的综合心理健康与学习条件框架。入口：jedfoundation.org'
  - id: junko_edu_cta_03
    line: 'UNESCO的Global Education Coalition汇集多边、NGO与私营部门对学习恢复与可及性的回应。入口：globaleducationcoalition.org'
  - id: junko_edu_cta_04
    line: 'The Trevor Project为25岁以下LGBTQ+青少年提供免费24/7危机支持，并为这一群体倡议更安全的校园环境。发短信START到678-678。入口：thetrevorproject.org'
  - id: junko_edu_cta_05
    line: 'Education Cannot Wait，联合国托管的、面向危机受影响教育的全球基金，自2016年以来已动员超过十亿美元——给标准教学结构无法触及的群体。入口：educationcannotwait.org'
title_system:
  headline_layer_2:
    options:
    - id: junko_edu_headline_01
      line: 一位日本传导者把教育压力读作频率的危机——以及打开通道的练习。
    - id: junko_edu_headline_02
      line: 教室的错位，而非学生的缺陷——一个传导传统命名评分量表看不见之物。
    - id: junko_edu_headline_03
      line: 灵魂携带评分量表从未被设计去读的记忆——Junko谈那缺失的课程。
    - id: junko_edu_headline_04
      line: 接收，而非更多内容——一位传导者带给被过度使用智力的学习者的东西。
    - id: junko_edu_headline_05
      line: 一代人带着教室不被设计去传输的频率到来——Junko谈「行星学习者」。
