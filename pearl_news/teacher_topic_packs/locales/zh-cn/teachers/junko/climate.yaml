    - id: junko_clim_headline_01
      line: 一位日本传导者把气候痛苦命名为灵魂之知——以及接收更深自我早已承载之物的练习。
    - id: junko_clim_headline_02
      line: 一位传导者把年轻人的气候回应读作不是焦虑，而是灵魂的精确「知道」——并教如何聆听。
    - id: junko_clim_headline_03
      line: 频率再校准，不是病理——一个传导传统重新框架群体的气候回应。
    - id: junko_clim_headline_04
      line: 接收而非谈判——扬升议会带给一颗过渡中的行星的东西。
    - id: junko_clim_headline_05
      line: 一位接收者，不是教师，谈论制度性气候回应能够听见之前，行星一直在传送之物。
