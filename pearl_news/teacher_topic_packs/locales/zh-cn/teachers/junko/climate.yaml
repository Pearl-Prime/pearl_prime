hook_personal:
  options:
  - id: hook_personal_01
    line: 你读到新的气候阈值，感到思考之下有什么在动。意识想解决问题。更深处已在哀悼已经失去的东西。
  - id: hook_personal_02
    line: 你看到预报，在头脑跟上之前全身先收紧。更深的那部分已经知道数字意味着什么。还在思考的那部分仍在追赶。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 年轻人在比意识理解更深的层面感知气候断裂。身体在对智力尚未完全处理的生态信号作出反应。这不是焦虑。是灵魂抱着心智尚无法承载的东西。
  - id: hook_big_picture_02
    line: 机构关于气候的说法与更深自我早已知道的之间的摩擦，会产生让身体关闭的压力。年轻人不是反应过度。他们只是缺少如何接收灵魂已在诉说之事的资源。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 传导者Junko教授日本传导与光语灵性，在闭关里见过气候痛苦给年轻人带来什么——既是真实痛苦，也是传统能精确命名之物：对意识尚未处理的生态断裂的灵魂回应。在Junko的框架里，更深自我携带智力无法触及的生态知，光语抵达人已持有这种知的部分。
  - id: teacher_intro_02
    line: 传导者Junko是日本传导传统的实践者，在实修里见过气候数据在年轻人身上触发什么——超越恐惧的东西。灵魂在思考心智处理之前认出断裂。她的传统不要求他们冷静，而要求接收更深自我已知，并让那知引导可能之事。
youth_somatic:
  options:
  - id: climate_soul_phone_01
    line: '你在推送里读到新阈值。在头脑追上数字前身体先收紧。你关掉应用。又回来了，因为已经知道的那部分仍在运转。

      LOOP_SEQUENCE: "读阈值。身体收紧。关应用。回来。"'
  - id: climate_soul_phone_02
    line: '睡前你看到预报，在信息落定前感到胸口有什么在动。你放下手机。底下已在移动的知又把你拉回去。

      LOOP_SEQUENCE: "看预报。胸口动。放下手机。回来。"'
teacher_witness:
  options:
  - id: junko_climate_witness_01
    line: Junko在来接收的人身上见过这条回路。身体收缩，心智想管理，屏幕暗下，然后灵魂的知把意识拉回，因为生态真相已在思考之下被抱着。
  - id: junko_climate_witness_02
    line: 她见过年轻人走过这一序列：气候消息到达，更深自我先回应，意识心智想关闭，然后接纳回来，因为灵魂仍抱着已知。
turnaround:
  options:
  - id: youth_action_climate_01
    stat_line_1: 2,666 climate cases. 51 jurisdictions.
    stat_line_2: 年轻组织者在立案、办工作坊，并培训同伴抱持大人否认的生态知——即便法院与政府太慢。
  - id: youth_action_climate_02
    stat_line_1: 2,666 climate cases. 51 jurisdictions.
    stat_line_2: 青年主办土地疗愈仪式、社区韧性网络，并从灵魂已懂未来所需之处记录地方损失。
bridge:
  options:
  - id: junko_climate_bridge_01
    line: 2,666 climate cases. 51 jurisdictions. 追踪器衡量年轻人建了什么，却没有一栏记录上一次制度拖延之后下一次提交何以可能——在意识心智不堪重负时仍对灵魂已知保持接收的容量。那种接收让气候组织者从对齐而非绝望中提起下一案。读阈值、关应用又打开的人也需要。Junko的传统称之为接收练习，抵达人已持有生态知的部分。
    hidden_capacity: 在智力不堪重负时仍对灵魂已知保持接收
  - id: junko_climate_bridge_02
    line: 气候追踪器统计案件、目标与兆瓦，却不统计接收更深自我对生态断裂已知的能力——那知在分析之下，仍能在意识空转时引导行动。下一任年轻组织者需要它，重新打开推送的读者也需要。Junko的传统直接与此智力工作：光语与传导抵达灵魂仍在倾听的部分。
    hidden_capacity: 把灵魂已知接收为行动的指引
teacher_perspective:
  options:
  - id: junko_climate_perspective_01
    header: Junko所见
    paragraphs:
    - 灵魂携带意识已无法触及的记忆。年轻人许多所谓气候焦虑不是心理障碍，而是表面安抚与更深自我已知之间的摩擦。再框定很简单：身体没有坏。灵魂在抱该抱的东西。
    - 光语通过振动共鸣而非概念意义工作。对被说到疲惫的年轻人，传统提供与生态知已活在其内的部分的直接接触。打开那条通道会改变下一个决定的一切。
    - 行星转型中，年轻人敏感度升高不是病理而是再校准。像「我有缺陷——坏了、乱了、错了」的感受，常是对言行不一的体系与制度的灵魂层面准确反应。答案是接收——倾听更深自我已在说的。
  - id: junko_climate_perspective_02
    header: Junko所见
    paragraphs:
    - Junko以灵魂记忆的透镜读气候紧绷。年轻人身体里的不是个人不足，而是对周围机构拒绝承认的生态断裂的灵魂准确回应。
    - 传统教导身体先知道。气候数据落下时，身体在比思考更深的层面已接收信息。问题不是如何平息反应，而是如何听懂它在说什么。
    - 这种再框定化解羞耻。像「我有问题」的感受，常是把灵魂的知当噪音而非智性的体系与政策结构的准确反应。Junko教接收练习，把那智性变成面对下一步的容量。
practice:
  options:
  - id: junko_climate_practice_01
    display_name: 接收练习
    announcement_line: 传导者Junko教授五分钟「接收」练习，用于气候更新让身体关闭、灵魂之知在下面奔跑的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 心不再把身体反应当作崩坏的证明。
    - 通道打开时灵魂已知可以浮现，容量随之回来。
  - id: junko_climate_practice_02
    display_name: 接收练习
    announcement_line: 传导者Junko教授五分钟「接收」练习，用于气候信息让身体锁死、你需要触及更深部分已理解之事时。在侧栏，下一次行动前或螺旋收紧后都够用。
    relief_lines:
    - 灵魂的知不再困在表面焦虑之下。
    - 与更深自我已抱持之物对齐，下一步会显现。
sdg:
  primary:
    line: 联合国在SDG 13中提出气候行动与韧性目标，含教育与青年能力建设。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: climate_reality_01
    line: 'The Climate Reality Project与YOUNGO均提供青年培训与气候行动入口。入口: https://climaterealityproject.org'
  - id: sunrise_movement_01
    line: 若下一步是草根青年组织，Sunrise Movement为建立气候力量的年轻人开办项目。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
    - id: threshold_finality_01
      line: 1.5度不再只是预测。
    - id: soul_knowing_01
      line: 你的身体早已知道心智还在处理的事。
  headline_layer_2:
    options:
    - id: junko_climate_headline_01
      line: 一位日本传导者把气候痛苦命名为灵魂之知，并给出接收更深自我已抱持之物的练习。
    - id: junko_climate_headline_02
      line: 一位传导者把青年对气候的反应读作灵魂准确的知，并教如何倾听。
