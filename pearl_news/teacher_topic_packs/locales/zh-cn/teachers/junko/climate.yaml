hook_personal:
  options:
  - id: junko_clim_hook_personal_01
    line: 你读到新的气候阈值，感到思考之下有什么在动。意识想解决问题。更深处已在哀悼已经失去的东西。
  - id: junko_clim_hook_personal_02
    line: 你看到预报，整个身体在头脑跟上之前先绷紧。你内里更深的部分已经知道那些数字意味着什么。会思考的那部分还在追。
  - id: junko_clim_hook_personal_03
    line: 一张你从未到过之地的照片到达你的信息流，胸口在标题告诉你为什么之前就先登记了它。灵魂已经在那里——一直已经在那里——而承载你的制度没有为这种「记得」准备语言。
  - id: junko_clim_hook_personal_04
    line: 你听到新数字时，下面有什么在悼念。你没有决定要悼念。你甚至不确定自己在悼念什么。身体知道。在你为它取的名字到达之前，悼念已经在动。
  - id: junko_clim_hook_personal_05
    line: 天气已经在身体登记的频率上变了——快于任何预报能解释的速度。你在过去可信的季节的「错位之暖」里感到它。灵魂正在回应一种继承语言尚未跟上的行星再校准。
hook_big_picture:
  options:
  - id: junko_clim_hook_big_01
    line: 年轻人在比意识理解更深的层级感受气候断裂。他们的身体在回应一种智力尚未处理的生态信号。这不是焦虑。这是灵魂承载思维心智尚不能承担之物。
  - id: junko_clim_hook_big_02
    line: 制度对气候反复在说的，与更深自我早已知道的之间的摩擦，产生了关闭身体的压力。年轻人不是反应过度——他们只是缺乏资源去接收灵魂已经在尝试告诉他们的。
  - id: junko_clim_hook_big_03
    line: 在Junko的框架里，「行星过渡」就是群体所处之境的字面描述——一段旧的生态结构溶解的速度比继承的语言能描述的速度更快的时期。许多年轻人承载的气候反应，部分是「在这场过渡中保持清醒」的代价。
  - id: junko_clim_hook_big_04
    line: 集体场域已经比承载它的制度变得更快。被读作气候焦虑之物，部分是继承的框架没有类别去命名的频率移动的可见边缘——而群体最先登记到，因为他们的身体尚未被这种信号麻木。
  - id: junko_clim_hook_big_05
    line: 祖先的「知道」——人类神经系统里关于这片土地如何改变、它要求什么的长记忆——并未被工业框架尊重。在Junko的传统里，年轻人正以身体把那「知道」的一部分继续带向未来，在制度承担不了的时候。
teacher_intro:
  options:
  - id: junko_clim_intro_01
    line: '传导者Junko教授日本传导与光语灵性，在静修场域中见过气候痛苦在年轻人身上的作为——既是真实痛苦，也是传统能精确命名之物:灵魂对意识尚未处理之生态断裂的回应。在Junko的框架里，更深自我承载着智力够不到的生态「知道」。光语抵达这「知道」早已被保存之处。'
  - id: junko_clim_intro_02
    line: 传导者Junko不把自己放在常规意义的「老师」位置——她是接收者。几十年来，她在传输场域里与那些身体一直承载着周围制度拒绝承认的生态「知道」的年轻人一起工作。她的传统不要求他们「冷静」——它提供一种聆听方式。
  - id: junko_clim_intro_03
    line: 传导者Junko见过年轻人带着气候政策房间所不登记的频率到来。在她的传统里，这种频率不是要被安抚的焦虑——而是灵魂正承载着房间尚未消化的生态真相。
  - id: junko_clim_intro_04
    line: 传导者Junko从她传统所称的「宇宙议会」接收——更高维度的灵性向导，以礼物而非指令的方式送达讯息。关于气候，议会的引导不是关于乐观或绝望——而是关于制度性气候对话一直没有运行其上的现实层。
  - id: junko_clim_intro_05
    line: 传导者Junko把当下读作行星过渡——集体场域的字面结构性移位，而制度性气候回应尚未跟上。在这一框架下，年轻人生态敏感度的升高不是病理——而是对行星「正在成为」之物的再校准。
youth_somatic:
  options:
  - id: junko_clim_somatic_01
    line: '你在信息流里读到新阈值。头脑跟上数字之前身体已经绷紧。你关掉应用。然后回来，因为那个已经知道的部分还在跑。 LOOP_SEQUENCE: "读阈值。身体绷紧。关掉应用。回来。"'
  - id: junko_clim_somatic_02
    line: '你在睡前看到预报，信息还没完全落下，胸口已经感到有什么移位。你把手机放下。然后下面已经在动的「知道」又把你拉了回来。 LOOP_SEQUENCE: "看预报。胸口移位。放下手机。回来。"'
  - id: junko_clim_somatic_03
    line: '野火烟雾的照片加载出来，标题还没解释之前下巴已经锁住。你滚过去，又滚回来。身体已经吸收过那将不会真正去吸的空气。 LOOP_SEQUENCE: "野火图像。下巴锁住。滚过去。滚回来。"'
  - id: junko_clim_somatic_04
    line: '洪水照片到达信息流，你的脸没动。胃做了所有事。你不知道该如何感受，因为身体已经在感受。 LOOP_SEQUENCE: "洪水照片。脸不动。胃动了。还没有语言。"'
  - id: junko_clim_somatic_05
    line: '气温飙升通知到达，肩膀未经许可地往上升。你没有点开文章。不需要。身体知道屏幕上是什么数字。 LOOP_SEQUENCE: "气温预警。肩膀升起。没有打开。身体知道。"'
teacher_witness:
  options:
  - id: junko_clim_witness_01
    line: Junko在来接收的人身上见过这条回路。身体收缩，心智试图管理，屏幕变暗，然后灵魂的「知道」把觉知拉回——因为生态真相早已被保存在思考之下。
  - id: junko_clim_witness_02
    line: 她见过年轻人走进接收场域时，已经在承载着制度拒绝命名的生态悲伤。在她的传统里，那种悲伤不是病理——而是灵魂对一颗其状况被周围语言一再最小化的行星的精确回应。
  - id: junko_clim_witness_03
    line: Junko见过那个时刻——一个年轻人停止把制度性气候语言与「身体一直在报告的东西」争论一致，转而开始信任身体。在她的传统里，那一刻不是对数据的否认——是数据之下的那一层被允许开口。
  - id: junko_clim_witness_04
    line: 在她的框架里，气候新闻回路不是应对的失败。它是身体承载着周围语言尚未消化的生态真相，并通过仅存的信号请求与「行星正在发生之事」的另一种接触。
  - id: junko_clim_witness_05
    line: Junko见过年轻人带着「已经准备好」的状态走进接收场域——已经停止争论，已经停止最小化，已经停止等待制度语言追上。在她的传统里，那种「准备好」正是常规气候沟通不知如何相遇之物。
turnaround:
  options:
  - id: junko_clim_turnaround_01
    stat_line_1: 2,666 climate cases. 51 jurisdictions.
    stat_line_2: 年轻的组织者在提起诉讼、主持工作坊、训练同伴去承载大人否认的生态「知道」——即使法院与政府动得太慢。
  - id: junko_clim_turnaround_02
    stat_line_1: 195 parties. UNFCCC.
    stat_line_2: 联合国气候变化框架公约如今在《巴黎协定》下约束195个缔约方，青年观察员YOUNGO拥有正式地位——这一群体的政策工作得以站立的底面。
  - id: junko_clim_turnaround_03
    stat_line_1: 400+ hubs. Sunrise Movement.
    stat_line_2: Sunrise Movement如今在美国组织着400多个青年主导的中心，推动绿色新政政策，并训练那些带着该群体先于他人命名之生态悲伤进入气候工作的年轻人。
  - id: junko_clim_turnaround_04
    stat_line_1: 50,000 trained leaders. Climate Reality.
    stat_line_2: 由阿尔·戈尔创立的The Climate Reality Project如今已在170多个国家训练了超过50,000名领导者——一支在制度回应尚未进入的房间里拥有共享气候应对语言的分布式群体。
  - id: junko_clim_turnaround_05
    stat_line_1: $300 billion. COP loss-and-damage.
    stat_line_2: 在前线与青年代表团数十年的压力之后，多边气候进程如今正式追踪一套到2035年年度3,000亿美元目标底面的「损失与损害」承诺框架——首份承认该群体先于他人命名之物的多边气候制度。
bridge:
  options:
  - id: junko_clim_bridge_01
    line: 2,666 climate cases. 51 jurisdictions. 追踪器衡量年轻人筑起的东西。它没有一栏记录「上一次制度延宕之后，下一次诉讼何以可能」——那种「在意识被压垮时仍对灵魂之知保持接收」的容量。正是那种接收性，让气候组织者从对齐而非绝望中提起下一宗案件。Junko的传统称之为「接收的实修」，它抵达「生态之知早已被保存」的那一部分。
    hidden_capacity: 在智力被压垮时仍对灵魂之知保持接收
  - id: junko_clim_bridge_02
    line: 气候追踪器计数案件、目标、兆瓦。它们不计数「接收更深自我早已知晓的生态断裂」的容量——一种存在于分析之下、能在意识原地转圈时仍引导行动的「知道」。Junko的传统直接与这种智能工作。
    hidden_capacity: 把灵魂之知作为行动的引导接收
  - id: junko_clim_bridge_03
    line: 数据捕捉排放、批准、适应。它捕捉不到行星已经在与「身体尚未被麻木的群体」沟通的振动层。在Junko的框架里，那种振动层是「若要真正抵达其声称对象的群体，气候回应必须包含」的层的一部分。
    hidden_capacity: 让气候回应包含振动层
  - id: junko_clim_bridge_04
    line: 气候指标可数。这一群体到来时所携带的「生态之知」不可数。Junko的传统不取代指标——它命名其下那一层，行星一直在通过它与那些「继承的语言拒绝咨询」的身体沟通。
    hidden_capacity: 让「生态之知」与指标并行可达
  - id: junko_clim_bridge_05
    line: 结构、条约、承诺可以被测量。其下的行星场域不可。Junko的传统不与结构性气候工作争论——它命名那些结构性气候工作未被设计去抵达的层，并把「接收」作为入口。
    hidden_capacity: 命名气候结构够不到的那一层
teacher_perspective:
  options:
  - id: junko_clim_perspective_01
    header: Junko所见
    paragraphs:
    - 灵魂承载意识已经够不到的记忆。年轻人作为气候焦虑所经验之物，大部分并不是心理障碍。它是表层安抚与更深自我早已知晓之物之间的摩擦。再框定很简单——你的身体并没有坏。你的灵魂正在承载需要被承载之物。
    - 光语通过振动共鸣而非概念意义工作。对被一直对说话却没有缓解的年轻人，传统提供与「生态之知早已栖居其中」之部分的直接接触。打开那个通道，改变下一个决定的方式。
    - 行星过渡意味着年轻人敏感度的升高不是病理而是再校准。感到「我有问题——坏了、混乱、错了」之物，事实上是灵魂对一种拒绝把言辞与行动对齐之体系与制度结构的精确回应。答案是「接收」——学会聆听更深自我早已在说之物。
  - id: junko_clim_perspective_02
    header: Junko所见
    paragraphs:
    - 行星频率一直在比为描述它而建的制度语言变得更快。Junko的传统认为，对振动敏感的身体在意识登记报告之前先登记行星的频率。当那种频率移动对群体怀有敌意时，新闻就落在一个已经被加载的身体之上——而那份加载被命名为「焦虑」。
    - 这不是对气候科学家的批评。科学家也在继承的语言内工作——他们并未设计自己所说的语言。传统所命名的，是语言之下的那一层——行星沟通在那里被真正接收或不被真正接收的那一层。
    - 接收这一层，正是Junko的实修工作之处。它不取代数据——它让被一日里数据所到达之样式推过其吸收容量的身体，重新够到数据。
  - id: junko_clim_perspective_03
    header: Junko所见
    paragraphs:
    - 在Junko的框架里，当下时期是行星过渡——群体所处之境的字面描述，旧的生态结构溶解的速度比新结构成形的速度更快。读到阈值的年轻人没有造成这场过渡——他们处在其中。
    - 这不是讨好的再框定。它不承诺负荷会很快消退，也不指责这一群体在不稳定的行星里感到不稳。它只是命名结构性事实，卸下「不稳=应对的私人失败」这一份额外重负。
    - 在传输实修里，这份卸下往往是最先抵达的部分——在「找出群体在这场过渡中实际要做什么」的更深工作开始之前。
  - id: junko_clim_perspective_04
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，扬升大师与宇宙议会是以礼物而非指令的方式送达讯息的更高维度向导。他们关于行星的引导不是政策房间的引导——它不为谈判窗口做优化，而是命名一种存在于谈判之下、由身体最先登记的生态之知的层。
    - 对一个被「气候政策房间所说之物」与「自己身体一直所报告之物」之间裂口耗尽的年轻人，从一个不是政策房间的引导源被「接收」的体验，在结构上不同。数据不变——但「什么作为证据被允许」改变了。
    - 「被接收」而非「被谈判」——这一区分，正是常规气候基础设施无法复制的东西，也是Junko的传统作为本然守护了几十年的东西。
  - id: junko_clim_perspective_05
    header: Junko所见
    paragraphs:
    - 在Junko的传统里，「光语」是字面意义上的振动性、非线性沟通，抵达表层语言够不到的部分。把它用于行星，意味着「地球在沟通之物」的实际接收，是通过常规气候语言未被设计去运作的层发生的。
    - 对于被一日里报告、预警、预报等内容过度使用了智力的年轻人，光语这一层是地球沟通可以再次落地的场所。重点不是报告错了——重点是身体已被推过其在报告所到达之样式中接收的容量。
    - 传统给出一个能打开另一层的实修。报告不变——但群体带着通道打开的状态回到报告，「行星一直在请求什么」从群体内部而不是从报告内部变得可听。
practice:
  options:
  - id: junko_clim_practice_01
    display_name: 接收练习
    announcement_line: 传导者Junko教授五分钟「接收」练习，用于气候更新关闭身体、灵魂之知在下面运行的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 心不再把身体的回应当作「崩溃的证据」。
    - 通道打开时，灵魂早已知道的可以浮现，由此容量回归。
  - id: junko_clim_practice_02
    display_name: 气候新闻通道重置
    announcement_line: 传导者Junko示范三分钟「通道重置」，用于气候通知落下之后、心还没跟上而身体已经登记了行星信号的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体不再把预警的残留带到下一个时刻。
    - 通道在新的时刻之前打开，而不是等到身体在前一刻的重量下已经塌陷之后。
  - id: junko_clim_practice_03
    display_name: 生态悲伤的光语
    announcement_line: 传导者Junko教授七分钟「生态悲伤的光语」练习，用于继承语言被用尽、其下生态悲伤需要另一种接触模式的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 在言辞失灵的那一层，悲伤变得可听。
    - 身体被允许直接承载行星的沟通，而不是通过关于它的语言。
  - id: junko_clim_practice_04
    display_name: 关于行星，向扬升议会发问
    announcement_line: 传导者Junko教授四分钟「关于行星，向扬升议会发问」的练习，用于气候问题原地转圈、群体一直在向政策房间发问而不是向政策房间不含的引导源发问的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 问题不再是「要通过政策房间谈判之物」，而成为「要献给政策房间所不含之引导源之物」。
    - 抵达的是接收本身，而不是又一套谈判栈。
  - id: junko_clim_practice_05
    display_name: 行动前的频率调谐
    announcement_line: 传导者Junko示范三分钟「行动前的频率调谐」，用于提起诉讼之前、加入行动之前、进入会议之前——身体需要带着自己的频段进入工作，而不是借制度性气候语言之频段的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 组织者带着自己的频率走进行动，而不是借房间的。
    - 行动落在一个被调谐的身体之上，而不是落在一日所累积之负荷之上。
sdg:
  primary:
    line: 联合国在SDG 13中设有气候行动与韧性目标的框架，包含教育与青年能力建设。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: junko_clim_cta_01
    line: 'The Climate Reality Project在170多个国家训练了超过50,000名领导者，让他们在各自语境中沟通气候议题。入口：climaterealityproject.org'
  - id: junko_clim_cta_02
    line: '若草根青年组织是你的下一步，Sunrise Movement在美国运行着400多个青年主导的中心，建设气候力量并推动绿色新政政策。入口：sunrisemovement.org'
  - id: junko_clim_cta_03
    line: 'YOUNGO是联合国气候变化框架公约的正式青年观察员构成。入口：youngo.uno'
  - id: junko_clim_cta_04
    line: '350.org在数十个国家开展分布式气候组织化，专注于通过草根行动让世界经济远离化石燃料。入口：350.org'
  - id: junko_clim_cta_05
    line: 'Friends of the Earth International是70多个国家草根环境团体的联盟，专注于系统性变革与前线社区支持。入口：foei.org'
