hook_personal:
  options:
  - id: hook_personal_01
    line: 你能感到公共暴力通过一条通知就进入私生活；在语言之前，身体先接住它。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 冲突新闻不只是地缘政治。它关乎注意、睡眠与道德严肃性能否在公共失序持续渗入身体时仍然完整。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Pamela Fellows（金刚乘受灌、持瑜伽师资，于 Peter Levine 与 Pat Ogden 门下受躯体疗法训练）在实修场合见过年轻人把公共暴力扛进私人的神经系统。他们不问冲突是否真实，而问如何让身体不在其下锁死。其传统说：恐惧的能量若以实践相遇而非压制，可化为智慧。
  - id: teacher_intro_02
    line: Pamela Fellows 以金刚乘与躯体工作为根基——持灌顶、完成前行，并承 Levine 与 Porges 的身体解读。她见过学生把冲突新闻当作心尚无法处理之一切的容器来扛。其传统不为身体加甲、也不绕过恐惧，而是与所承载相遇并转化。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你读冲突警报。胸收紧、托住。你停了一秒。你又查看，因为危险真实，不看并不能改变什么。

      LOOP_SEQUENCE: "read the alert. chest tightened and held. stopped for a second. checked again."
  - id: youth_somatic_02
    line: |
      你在群聊里看到更新。下颌与呼吸锁住。你放下手机。你又拿起，因为现实仍在。

      LOOP_SEQUENCE: "saw the update. jaw and breath locked. put the phone down. picked it up again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Pamela Fellows 在年轻人身上见过这一精确循环——警报落下、身体收缩并托住、时间停一秒，注意又因现实仍在而返回。其金刚乘与躯体训练不病理化身体，而问身体承载什么、如何转化，使人能再保护他人、说真话或行动。
  - id: teacher_witness_02
    line: 她见过这一序列——通知抵达、胸或下颌托住、设备放下，然后心又回去。身体一直在承载心尚无法整合之物。Pamela Fellows 的传统提供与所承载以临在相遇的实践。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 676 million women and girls. 50 kilometers from active conflict.
    stat_line_2: 年轻人在记录伤害、组织法律素养工作坊，并在体系碎裂时仍组织和平与问责工作。
  - id: turnaround_02
    stat_line_1: 676 million women and girls. 50 kilometers from active conflict.
    stat_line_2: 青年和平建设者主持同伴圈、训练见证者、组织工作坊，并要求机构把身心纳入对冲突的回应。
bridge:
  options:
  - id: bridge_01
    line: 追踪器衡量年轻人搭建的圈与运动。却没有一栏记录「又一轮暴力之后，下一次和平行动何以可能」——释放身体所承载、使清明返回而不把回应称为软弱的容量。来到下一场对话的年轻人需要它；放下手机又打开的人也需要。Pamela Fellows 的金刚乘训练如此命名：五毒——瞋、贪、痴、嫉、慢——并非要移除的障碍，而是五佛智慧的素材。在冲突警报下绷紧的身体所承载的能量，以躯体临在而非压制相遇，可化为和平所需的清明。
  - id: bridge_02
    line: 数字衡量外展与对话场次。却不衡量当年轻人终于有一种实践把所承载纳入——不为恐惧加甲，而在身体所在之处与之相遇使某物松动——时发生的事。那松动是下一场对话需要的，也是循环中的人需要的。Pamela Fellows 的传统有其名：密乘原则——无需拒绝任何事物。恐惧若以实践相遇，本身就是回到临在的路径。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Pamela Fellows 所见
    paragraphs:
    - 她不会告诉年轻人「冷静」，仿佛恐惧才是错误。恐惧可以是对危险的准确接触。身体托住心尚未能处理之物。真正的问题是：那种托住会成为释放的实践，使你能真实回应——还是崩溃，把整个神经系统交给重复与恐慌。
    - 由此她转向密乘原则：毒即是药。身体的知包含心所回避者。当年轻人获得以躯体临在而非评判与所承载相遇的实践，便可能在否认现实的情况下仍维持功能。
    - 这要紧，因为像「我坏了、错了」这样的感受，常常是生活在制度未能把公共失序关在外面的影响之下时，身体的准确反应。Pamela Fellows 的传统提供实践，使人能从更稳的地面再次行动。
  - id: teacher_perspective_02
    header: Pamela Fellows 所见
    paragraphs:
    - 在 Pamela Fellows 的传统里，冲突恐惧不只在认知。它落在身体——胸、下颌、呼吸——当警报快于心之整合时身体托住它。传统不要求你停止感受，而要求把身体纳入回应。
    - 此处的「heartfulness」指从心的智慧而活——包含身体与当下的更深知。当年轻人获得以温暖而非否认与所承载相遇的实践，便可能仍足够功能以保护他人或说真话。
    - 在这一框架下，自责软化。问题不是年轻人太敏感，也不是我感到崩溃就错了。问题是制度与结构让公共失序留在身体中，却不给释放的实践。Pamela Fellows 的传统提供那种实践。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「神圣见证坐」（Sacred Witness Sit）
    announcement_line: Pamela Fellows 教授五分钟 Sacred Witness Sit，用于冲突警报把真实恐惧变成全面关闭的时刻。在侧栏，简短，可用于日常生活。
    relief_lines:
    - 身体不再独自扛住全部负荷。
    - 足够稳定回归，以支撑下一次诚实行动。
  - id: practice_02
    display_name: 五分钟「神圣见证坐」（Sacred Witness Sit）
    announcement_line: Pamela Fellows 教授五分钟 Sacred Witness Sit，用于警报已落、身体托住心尚无法处理之物时。在侧栏，短到可在下一次查看前或更新后使用。
    relief_lines:
    - 压力不再给整个自我命名。
    - 心与身体被纳入，而非被绕过。
sdg:
  primary:
    title: 和平、正义与强大机构
    line: 联合国通过SDG 16及其和平、正义与强大机构目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 若此事与你相关，可从本地 UNA-USA 或运作同一框架的青年和平网络入手。入口：加入其网络。
  - id: cta_02
    line: 青年和平与问责网络在地方与国际层面提供入口。入口：UNA-USA 或你所在地区的团体。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 冲突警报正在改写日常。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位受金刚乘训练的教师拒绝让冲突恐惧变成整个身份——并命名身体在承载什么。
    - id: headline_layer_2_02
      line: Pamela Fellows 以躯体与金刚乘的地面读冲突压力——恐惧是和平的素材。
