hook_personal:
  options:
  - id: hook_personal_01
    line: 人们常说学校在为人生做准备。有些日子却更像在训练你不再信任自己的注意力——而身体正在为此承担代价。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育的紧张不只是认知负担。当体系口称深度与关怀，却把日常组织成碎片化与高压时，它会以年轻人身体里持续绷紧的方式落地。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Pamela Fellows（金刚乘受灌、持瑜伽师资，并在 Peter Levine 与 Pat Ogden 门下接受躯体疗法训练）在实修场合见过学生把学业压力内化为「分散的注意是道德缺陷」。他们不问教育是否重要，而问当体系一再破坏学习所需条件时，身体在承载什么。她以四圣谛来读：指出苦、指出驱动它的模式、确认可以转化、并实践道路。
  - id: teacher_intro_02
    line: Pamela Fellows 以金刚乘与躯体工作为根基教学——持灌顶、完成前行（ngondro），并承 Levine 与 Porges 的身体解读。她见过学生带着一种疲惫出现：光是待在任务上就已耗竭；身体抱着心尚无法命名之物。其传统不把身心拆开，而是转化所承载者。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你打开作业门户。身体绷紧。你切换离开。你又回来，因为活还在，无论体系是否帮你托住它。

      LOOP_SEQUENCE: "opened the portal. body tightened. switched away. came back."
  - id: youth_somatic_02
    line: |
      你在应用里看到截止日期。肩与下颌锁住。你切换标签页。你又回来，因为事情仍须完成。

      LOOP_SEQUENCE: "saw the deadline. shoulders and jaw held. switched tabs. returned."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Pamela Fellows 见过这一连串——任务出现、身体绷紧、注意离开，又在体系误指问题的情况下不得不把努力拉回来。其金刚乘与躯体训练不病理化身体，而问身体承载什么、如何转化以使学习仍可能发生。
  - id: teacher_witness_02
    line: 她见过这一循环——门户打开、身体绷紧、标签切换、压力把人拉回。身体一直在承载碎片化体系无法容纳之物。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 年轻人在组织工作坊、发起运动；学生与青年教育者已在搭建学习支持、更健康的课表，以及更利于注意力的学习空间。
  - id: turnaround_02
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 年轻人在组织同伴圈、培训倾听者，并要求学校把整个人——身心——纳入学习方程式，而非仅办活动与口号。
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. 追踪器衡量改革与学习支持。却没有一栏记录「又一天碎片化之后，何以诚实回到学习」——释放身体所承载、使注意返回而不把体系的失序内化为个人失败的容量。回到门户的学生需要它。Pamela Fellows 的金刚乘训练如此命名：烦恼能量——怨愤、贪求、无明——并非要铲除的障碍；在躯体临在与四圣谛的诊断下，可转化为镜智、妙观察智或平等性智。在门户前绷紧的身体所承载的能量，遇之而非斗之，可化为清明。
  - id: bridge_02
    line: 数字衡量项目与改革。却不衡量当年轻人终于有一种实践把所承载纳入——不是从外「修专注」，而是在身体所在之处与之相遇，使心能回到课业——时身体里发生的事。下一次诚实自习需要那种容量。Pamela Fellows 的传统有其名：密乘原则——无需拒绝任何事物。散乱的能量，在临在中相遇，本身就是回到注意的路径。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Pamela Fellows 所见
    paragraphs:
    - 她不会先称学生「分心」。她会先注意到身体在承载心尚未能整合之物。在其金刚乘与躯体传统中，表层崩溃之下的更深阻滞不是要清除的障碍，而是可转化的能量。当身体被看见、被感受，某些东西可以松开。
    - 由此她转向心的智慧。问题不是如何支配每一个念头，而是如何把身体与心纳入回应，使螺旋不致成为自我的唯一叙述者。身体承载心所回避者；心在心智跟上之前已知。
    - 再框架因此是：像「我坏了、错了」这样的感受，常常是对本不该被制度常态化的过载的准确反应。实践不是抽空感受，而是与之相遇，使人能从更稳的地面回到工作。
  - id: teacher_perspective_02
    header: Pamela Fellows 所见
    paragraphs:
    - 在 Pamela Fellows 的传统里，受苦不只在心。它落在身体——额、肩、下颌——当心无法整合时身体托住它。传统不要求你停止感受，而要求把身体纳入回应。
    - 此处的「heartfulness」指从心的智慧而活——非感伤，而是包含身体与当下的更深知。当年轻人获得以温暖而非评判与所承载相遇的实践，便可能在不崩溃的情况下维持功能。
    - 在这一框架下，自责软化。过错不在我——不是糊涂的身体，不是破碎的自我。问题是制度与结构持续把负荷堆给身体，却不给释放的实践。Pamela Fellows 的传统提供那种实践。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「毒转智」翻转（Poison-to-Wisdom Flip）
    announcement_line: Pamela Fellows 教授五分钟 Poison-to-Wisdom Flip，用于学业压力使心与自己为敌的时刻。在侧栏，简短而有结构。
    relief_lines:
    - 身体不再独自扛住全部负荷。
    - 足够稳定回归，以支撑下一次诚实行动。
  - id: practice_02
    display_name: 五分钟「毒转智」翻转（Poison-to-Wisdom Flip）
    announcement_line: Pamela Fellows 教授五分钟 Poison-to-Wisdom Flip，用于作业门户与碎片化的一日使身体托住心尚无法处理之物时。在侧栏，短到可在课前或任务之间使用。
    relief_lines:
    - 压力不再给整个自我命名。
    - 心与身体被纳入，而非被绕过。
sdg:
  primary:
    title: 优质教育
    line: 联合国通过SDG 4及其优质教育目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'UNESCO全球教育联盟与学生倡导组织均提供可操作的入口。入口: https://www.unesco.org/en/education/globaleducationcoalition'
  - id: cta_02
    line: 若下一步不在彼处，学生主导的教育正义团体在地方与国家层面处理同一框架。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 学校在谈论学习，却在破坏学习的条件。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位受金刚乘训练的教师把分散的注意读成信号：身体在承载体系无法容纳之物。
    - id: headline_layer_2_02
      line: Pamela Fellows 以躯体与金刚乘的地面读教育压力——毒即是回到注意的路径。
