hook_personal:
  options:
  - id: hook_personal_01
    line: 在任何人命名之前，你已知道那种螺旋；你也知道在内在容量不断变薄时，仍要把日子撑过去需要多少力气。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 青年心理健康压力不只是症状叙事。它关乎持续高压对身体做了什么——当注意、休息与感受能力同时受围攻时，被_hold住的是什么。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Pamela Fellows（金刚乘受灌、持瑜伽师资，于 Peter Levine 与 Pat Ogden 门下受躯体疗法训练）在实修场合见过这种压力如何作用于外表仍「正常」的年轻人。他们不只问如何感觉好一点，而问如何让身体停止承载心尚未释放之物。其传统说：毒即是药——驱动螺旋的神经质能量，在与临在相遇时可化为智慧。
  - id: teacher_intro_02
    line: Pamela Fellows 以金刚乘与躯体工作为根基——持灌顶、完成前行，并承 Levine 与 Porges 的身体解读。她在闭关场合见过学生把心理过载当作「心处理不了的一切的储藏室」来扛。其传统不绕过身体或困难情绪，而转化它们。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你在深夜读更新。下颌收紧、胃部揪住。你放下手机。你又拿起，因为螺旋已在运转。

      LOOP_SEQUENCE: "read the update. jaw tightened, stomach held. put the phone down. picked it up again."
  - id: youth_somatic_02
    line: |
      你在群聊里看到警告。胸口像托着什么东西。你关掉应用。你又打开，因为不看并不能让感受消失。

      LOOP_SEQUENCE: "saw the warning. chest held. closed the app. opened it again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Pamela Fellows 在学生身上见过这一精确循环——警告抵达、身体绷紧、手机放下，然后同样的压力把注意拉回去。其金刚乘与躯体训练不病理化身体，而问身体承载什么、如何转化。
  - id: teacher_witness_02
    line: 她见过年轻人身上的这一序列——更新落下、下颌或胃收紧、设备放下，然后心又回去，因为螺旋并不因屏幕熄灭而停止。身体一直在承载心尚无法整合之物。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 青年组织者在主持同伴圈、组织倾听者培训，并要求学校把心理支持当作基础设施，而非私人弱点。
  - id: turnaround_02
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 学生与青年教育者在组织工作坊、主持同伴支持圈，并开展运动，要求在关于过载的对话中纳入身体。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. 追踪器衡量年轻人搭建的圈与运动。却没有一栏记录「又一周过载之后，下一次诚实开口何以可能」——看见当时运转的模式、并从清明而非习惯中选择回应的容量。来到圈里的年轻人需要它；读了警告、放下手机又打开的人也需要。Pamela Fellows 的传统数代以来一直在培育那种容量：你不是那个被淹没的人——你是其中淹没显现的不变的见者。当它被看见，模式松动，下一次诚实行动才可能。
  - id: bridge_02
    line: 数字衡量项目与外展。却不衡量当心固守旧叙事时，年轻人能否安息于觉知已知之处的那种内在容量。下一次诚实行动需要它；关掉手机又打开的人也需要。Pamela Fellows 的传统坚持：你从来不是那个模式——你是模式中显现的不变的觉知。你不是要「变健康」，而是要停止假装你不是正在发生之事的见证。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Pamela Fellows 所见
    paragraphs:
    - 她不会先说心坏了。她会先注意到身体在承载心尚未能处理之物。在其金刚乘与躯体传统中，表层崩溃之下的更深阻滞不是要移除的障碍，而是可转化的能量。当身体被看见、被感受，某些东西可以释放。
    - 由此她转向心的智慧。问题不是支配每一个念头，而是把身体与心纳入回应，使螺旋不致成为自我的唯一叙述者。身体承载心所回避者；心在心智跟上之前已知。
    - 这一转变要紧：像「我坏了、错了」这样的感受，常常是对任何学习制度都不该常态化的过载的准确反应。实践不是抽空感受，而是与之相遇，使人能从更稳的地面再次行动。
  - id: teacher_perspective_02
    header: Pamela Fellows 所见
    paragraphs:
    - 在 Pamela Fellows 的传统里，受苦不只在心。它落在身体——下颌、胃、胸——当心无法整合时身体托住它。传统不要求你停止感受，而要求把身体纳入回应。
    - 此处的「heartfulness」指从心的智慧而活——非感伤，而是包含身体与当下的更深知。当年轻人获得以温暖而非评判与所承载相遇的实践，便可能在不崩溃的情况下维持功能。
    - 在这一框架下，自责软化。过错不在我——不是糊涂的身体，不是破碎的自我。问题是制度与结构持续把负荷堆给身体，却不给释放的实践。Pamela Fellows 的传统提供那种实践。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「身体优先」检视（Body-First Check-In）
    announcement_line: Pamela Fellows 教授五分钟 Body-First Check-In，用于心理过载开始占据整个房间的时刻。在侧栏，短到可在深夜、课前或螺旋之后使用。
    relief_lines:
    - 身体不再独自扛住全部负荷。
    - 足够释放回归，以支撑下一次诚实行动。
  - id: practice_02
    display_name: 五分钟「身体优先」检视（Body-First Check-In）
    announcement_line: Pamela Fellows 教授五分钟 Body-First Check-In，用于螺旋已转、身体托住心尚无法命名之物时。在侧栏，短到可在需要把身体纳入方程式时使用。
    relief_lines:
    - 压力不再给整个自我命名。
    - 心与身体被纳入，而非被绕过。
sdg:
  primary:
    title: 健康与福祉
    line: 联合国通过SDG 3及其健康与福祉目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'Active Minds 与 Born This Way Foundation 均提供面向青年的入口。入口: https://www.activeminds.org'
  - id: cta_02
    line: '若下一步不在彼处，Born This Way Foundation 在心理健康与青年发声的交叉点运营项目。入口: https://bornthisway.foundation'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 当螺旋开始像性格。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位受金刚乘训练的教师拒绝让青年过载变成身份——并命名身体在承载什么。
    - id: headline_layer_2_02
      line: Pamela Fellows 以躯体与金刚乘的地面读心理压力——毒即是药。
