hook_personal:
  options:
  - id: master_wu_ew_hook_personal_01
    line: 在任何人命名之前，你就知道气在变薄。你一边撑过一天，一边工作场所之下的地脉持续被抽稀——你内里清楚，紊乱不只在你之内，而在「劳动所被承载其中」的那条龙脉里。
  - id: master_wu_ew_hook_personal_02
    line: 你继续看排班应用，因为不看似乎更糟。你也知道职业建议、副业栈和生产力系统一直在对你说话却没有接地——你被要求承担的劳动负荷，本就不该由一个与大地之脉断开的身体吸收。
  - id: master_wu_ew_hook_personal_03
    line: 在你说出话之前，肩膀先感到那种摩擦——身体的气接地，正撞上一种把工作场所之下的地脉保持稀薄的劳动场域。身体已经在抱着工资刻度还在争论的东西。
  - id: master_wu_ew_hook_personal_04
    line: 凌晨一点，你关掉排班又打开。两种动作都没用，因为消耗正运行在工作场所之下的龙脉里——而你想用头脑挣脱的那部分，正是被过度要求的那部分，同时大地本身已经静默。
  - id: master_wu_ew_hook_personal_05
    line: 你已经读过职业指南、拿到认证、做过副业。头脑能做的都做了——而你内里更安静的某处，在请求与工作场之下的大地之气接触，而不是又一套表层心智可以执行的指令。
hook_big_picture:
  options:
  - id: master_wu_ew_hook_big_01
    line: 青年劳动苦楚不只是工资趋势。它是一代神经系统在登记一份龙脉紊乱——工作生活之下的地脉正承载制度层不断推迟之物，最先感受到的是表面上的身体。
  - id: master_wu_ew_hook_big_02
    line: 年轻劳动者的敏感度升高不是病理；在Master Wu的堪舆框架里，那是最接近地脉登记的群体先于劳动经济层感到龙脉紊乱。身体先于工资数据感到消耗。
  - id: master_wu_ew_hook_big_03
    line: 一代人被要求维持日常劳动能力，而其下的文明龙脉正在变薄。消耗不是私人职业伦理失败——它是没有任何个体神经系统能独自吸收的地脉裂口的可感边缘。
  - id: master_wu_ew_hook_big_04
    line: 集体劳动场域加速得比设计来接地它的气脉更快，零工与平台经济如今承载着制度雇佣层无法化解的地脉负荷。被读作青年倦怠的，部分是龙脉失配的可见边缘。
  - id: master_wu_ew_hook_big_05
    line: 在中国、台湾、日本之间，Master Wu的勘察读到同一龙脉登记在不同表面劳动制度下显现。青年工作苦楚不是单一国家经济异常——它是跨区域的地脉状况，任何单一国家的劳动政策都无法独自化解。
teacher_intro:
  options:
  - id: master_wu_ew_intro_01
    line: Master Wu是一位道家堪舆师，与龙脉（地之活气脉）工作。他看见最贴近地脉的群体承载劳动苦楚，不是私人失败，而是「制度层无法读到的龙脉紊乱」的可感边缘。在他的框架里，下一班面前消耗的身体不是失灵；它在登记工作场所之下气的裂口。
  - id: master_wu_ew_intro_02
    line: Master Wu不把自己放在「劳动改革者」或「公共教师」的位置。他作为堪舆战术师工作——在中国、台湾、日本之间勘测龙脉，在活化点上做策略性「珍珠安置」，以稳定上方人群所立的工作生活的地脉。他的传统向被零工平台与工资停滞耗尽的一代提供的，是与日程之下的龙脉层的接触。
  - id: master_wu_ew_intro_03
    line: Master Wu以珍珠安置工作——在龙脉的活化点上做策略性能量锚定，在他的传统里，这种安置可稳定上方人群所立的地脉。他见过住在不稳定地脉段附近的劳动者的表面消耗，跟随他在气脉本身中所勘测到的紊乱。
  - id: master_wu_ew_intro_04
    line: Master Wu的工作横跨台南、台湾与日本列岛——东亚大陆与岛系龙脉交汇的跨区域活化点。他见过一区的地脉紊乱如何在不同国家工资制度下产生不同的劳动症状，也见过堪舆回应如何越过政策回应无法越过的边界。
  - id: master_wu_ew_intro_05
    line: Master Wu在一个把当下读作「文明龙脉再校准」的传统里教学——这是一段时期，继承的文化地理之龙脉被要求承载它们未被调到的劳动负荷。在此框架下，青年工作苦楚是「最贴近地脉的群体」最先在日常劳动场域内感受到再校准的方式。
youth_somatic:
  options:
  - id: master_wu_ew_somatic_01
    line: 你在深夜读到排班表。肩膀发紧。你关掉应用。又打开，因为房租仍要付，紊乱在地脉里，而不在应用里。
  - id: master_wu_ew_somatic_02
    line: 你在闹钟响前醒来。太阳神经丛已经发紧。你比够到灯先够到手机，因为房间之下的地脉已经稀薄，你需要确认表面场域是否与它相符。
  - id: master_wu_ew_somatic_03
    line: 连续第三个班开始时，你的脚失去与地面的接触。你回放了工资数学三遍。呼吸变短。你还没决定什么，身体已经先失去了根。
  - id: master_wu_ew_somatic_04
    line: 平台评分加载时，你屏住呼吸。肩膀锁住。看见星级才呼气，而且只呼一半，因为气已经变薄，下一单已在路上。
  - id: master_wu_ew_somatic_05
    line: 你躺下，眼睛却睁着。一周的工时在重播。肩膀不肯松。你知道睡眠是入口，却找不到大地之气可以踏进去。
teacher_witness:
  options:
  - id: master_wu_ew_witness_01
    line: Master Wu在最贴近地脉登记的群体身上见过这条回路——打开、气变薄、关掉、又回来。在他的堪舆框架里，那不是品格，而是龙脉通过最不被隔绝的身体在表达「劳动场域之下变薄的那段地脉」。
  - id: master_wu_ew_witness_02
    line: Master Wu见过年轻劳动者走进勘察对话时已在回路中段，已笃定「拼劲本该早已解决此事」。在他的传统里，那种笃定是信号——表层心智停下、地脉登记得以被读到的位置。
  - id: master_wu_ew_witness_03
    line: 他见过身体承载生产力栈承载不了的东西。在他的框架里，身体的消耗不是故障——而是当职业伦理话术被过度使用时，龙脉通过仅存的通道发声。
  - id: master_wu_ew_witness_04
    line: Master Wu见过从台南到东京的年轻劳动者，承载着任何国家工资统计都不命名的气紊乱。在他的传统里，那种紊乱是信息，不是病理——是「读取此群体的制度劳动层从未被调到他们身体实际所立的地脉范围」的信号。
  - id: master_wu_ew_witness_05
    line: Master Wu记得那一刻：一个年轻劳动者停止「优化又一小时」，转而让房间之下的地脉重新进入接触。在他的传统里，那一刻不是懒惰——是常规劳动框架没有语言去描述的「准备好了」。
turnaround:
  options:
  - id: master_wu_ew_turnaround_01
    stat_line_1: 73 million. ILO 2024.
    stat_line_2: 国际劳工组织估计2024年全球有超过七千三百万年轻人失业——一个被测量的负荷命名了「制度层不断推迟结构性回应时」群体被要求承担的缺口。
  - id: master_wu_ew_turnaround_02
    stat_line_1: 11 states. DC. Fight for $15.
    stat_line_2: 「Fight for $15」运动如今已在美国十一个州加上哥伦比亚特区推动最低工资政策——在联邦层不动时由该运动逐州组织的可测量移动。
  - id: master_wu_ew_turnaround_03
    stat_line_1: 1,200+ cooperatives. USFWC.
    stat_line_2: 美国工人合作社联合会(USFWC)如今协调一千二百多家工人所有制企业——一种非企业制的劳动基础设施，把经济决策权拉回到工人本身，而不是向上推迟。
  - id: master_wu_ew_turnaround_04
    stat_line_1: 7 cities + Oregon. Fair Workweek.
    stat_line_2: 「公平工作周」保护——涵盖可预测排班、提前通知与休息权——如今已在美国七个主要城市加上俄勒冈州立法落地，在联邦层尚未匹配时为轮班工作建起监管底线。
  - id: master_wu_ew_turnaround_05
    stat_line_1: 27 EU states. Platform Workers Directive.
    stat_line_2: 欧盟于2024年通过的「平台工人指令」把二十七个成员国绑定到一项零工工人推定雇佣框架——首份把平台劳动归类作为治理而非评论的多边制度。
bridge:
  options:
  - id: master_wu_ew_bridge_01
    line: 73 million. ILO. 追踪器衡量制度留下的缺口。它没有一栏记录「让下一班诚实工作成为可能」的容量——在不把消耗写成身份的前提下，与课业保持接触的容量。Master Wu的传统对那份容量有语言——龙脉修养工作在劳动回应之下的地脉里。
    hidden_capacity: 与工作保持接触而不将消耗写成身份
  - id: master_wu_ew_bridge_02
    line: 数字显示制度层建起的框架。它们没显示制度层所立的龙脉语境——一段文明时期，劳动场域之下的地脉变薄的速度超过继承文化的节奏能稳定的范围。Master Wu的传统把那语境视作本然。
    hidden_capacity: 承担劳动数据无法显示的地脉语境
  - id: master_wu_ew_bridge_03
    line: 数据捕捉工资、工时与政策采纳。它捕捉不到当一个年轻身体重新与工作场所之下的大地之气接触时所发生的移动——即便表面班次仍在继续。在Master Wu的框架里，这个移动才是真正的回归——任何追踪器都不汇报的那一部分。
    hidden_capacity: 记录追踪器漏掉的地脉复位
  - id: master_wu_ew_bridge_04
    line: 劳动基础设施可以测量。身体之气被实际接地或抽稀的地脉无法测量。Master Wu的传统不与测量争论——它在其下的那一层工作，那里龙脉修养与珍珠安置以一种制度层无法抵达的方式运作。
    hidden_capacity: 在测量之下的地脉层工作
  - id: master_wu_ew_bridge_05
    line: 工资、工时与平台都可以被计数。其下被承载在劳动场域之下的文明龙脉不可。Master Wu的传统不取代劳动工作——它命名制度回应不被设计去抵达的地脉层，并把龙脉接触作为入口。
    hidden_capacity: 命名劳动回应不抵达的地脉层
teacher_perspective:
  options:
  - id: master_wu_ew_perspective_01
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的框架里，土地本身含有称为「龙脉」的活气电流——劳动不仅是经济交换；它在身体里由工作场所之下的地脉接地。所谓青年倦怠，在堪舆登记上，是身体最贴近大地之气的群体先于劳动经济层感受到紊乱。
    - 这一再框架很精确：像「我坏了、错了」这种感受，往往是地脉的准确信号——制度与结构把劳动负荷放在了对气紊乱最缺少隔绝的群体身上。处理表面症状并不处理地脉状况。
    - 龙脉修养并不绕过劳动改革。它在劳动改革未被设计去抵达的那一层工作——身体之下的那一层，那里地脉承担实际登记，且在活化点上的珍珠安置可以稳定表面回应所不能稳定之物。
  - id: master_wu_ew_perspective_02
    header: Master Wu所见
    paragraphs:
    - 珍珠安置在Master Wu的传统里不是比喻。它是字面意义的修习——在龙脉活化点上做策略性能量锚定——可稳定上方人群所立的劳动地脉。被常规回应当作私人倦怠处理的青年工作苦楚，在他的框架里，是「尚未被堪舆照看的、未被锚定的那段地脉」的表面表达。
    - 这一修习重要，因为它解释了住在已被照看之活化点附近的人群所描述的「松开」——不是劳动负荷被论赢了，而是其下的地脉在表层论证够不到的那一层被稳定下来。头脑不必赢，身体才能回到大地。
    - 这是常规劳动改革没被设计去送达的部分。它不否定工资工作——只是命名缺失的那一层，并指出一个在地脉层工作了文明时长的传统。
  - id: master_wu_ew_perspective_03
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的传统里，中国、台湾、日本的龙脉横跨东亚大陆与岛系地理交汇为一个整合的地脉系统。青年劳动负荷在北京、台北、东京的制度工资制度下表现不同，但在地脉登记上是同一个跨区域状况——堪舆回应可以越过政治回应无法越过的边界。
    - 对承载这份负荷的年轻人，被某个比一国劳动框架更大的存在「见证」的体验，在结构上不同于被它「处理」。送达的讯息不是「这是工资率」——而是「你工作生活之下的地脉已被勘测，你所感的紊乱是在文明尺度上被登记的，不是只在你一人身上」。
    - 「在地脉层被见证」而非「在制度层被处理」——这一区分，正是常规劳动基础设施无法复制的东西，也是Master Wu的传统在三个区域作为本然守护了数代人的东西。
  - id: master_wu_ew_perspective_04
    header: Master Wu所见
    paragraphs:
    - 「文明龙脉再校准」在Master Wu的框架里，是他的传统对我们正处时段的字面描述——继承的文化地理之龙脉被要求承载它们未被调到的劳动负荷，而最贴近地脉的群体最先感到这份再校准。年轻人承载的工作苦楚，部分是「在地脉结构移位的时期被调到大地脉络」的代价。
    - 这不是讨好的再框架。它不承诺工资结构会很快改变，也不指责这一群体在不稳定的地脉里感到不稳。它只在堪舆层命名结构性事实，卸下「不稳=私人失败」这一份额外重负。
    - 在勘察实践里，这份卸下往往是最先抵达的部分——在更深的龙脉修养工作在活化点上展开之前。
  - id: master_wu_ew_perspective_05
    header: Master Wu所见
    paragraphs:
    - Master Wu的传统把龙脉读作「文明记忆线」——龙脉不仅承载当下的气流，也承载文化地理所历每一份负荷的累积记录，包括继承的劳动要求。在这一登记上，青年工作苦楚所表达的，不只是当下工资压力，也是早期制度世代未能代谢的「被推迟的负荷」。最贴近地脉的身体最先感到那张未付的账单。
    - 这一框架不要求群体独自承担那张账单。它在文明尺度上命名账单、辨认地脉可被重新稳定的活化点，并把珍珠安置与龙脉修养作为传统的回应——在制度回应未被设计去触及的那一层运作。
    - 修习不是「修好群体」。修习是准确读取地脉、在活化点上安置珍珠，让龙脉去做劳动层做不到的结构性稳定。
practice:
  options:
  - id: master_wu_ew_practice_01
    display_name: 龙脉聆听
    announcement_line: Master Wu教授五分钟「龙脉聆听」修习，用于劳动压力把身体的气接地转换为表面无力感的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体不再把表面工作量当作全部登记，而与房间之下的地脉重新接触。
    - 足够的气接地回来，支撑下一班诚实工作，不再把消耗写成私人身份。
  - id: master_wu_ew_practice_02
    display_name: 龙脉勘测小停
    announcement_line: Master Wu示范四分钟「龙脉勘测小停」，用于班次与班次之间的瞬间——身体一直在未经允许地承担劳动负荷的那种瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 劳动负荷在地脉层变得可读，而不再被读作个人职业伦理失败。
    - 群体消耗不再被当作个人的资产负债表。
  - id: master_wu_ew_practice_03
    display_name: 地脉接气
    announcement_line: Master Wu教授三分钟「地脉接气」，用于脚已失去与地面的接触、劳动场域已把气抽出登记范围的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 脚记起地板之下的地脉，气找到稳定的锚点——即便班次仍在继续。
    - 呼吸回到地脉所持的节奏，而不是平台所要求的节奏。
  - id: master_wu_ew_practice_04
    display_name: 珍珠安置观想
    announcement_line: Master Wu教授六分钟「珍珠安置观想」，用于劳动负荷被当作个人病理而非地脉状况处理的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 工作场所之下的活化点进入视野，负荷不再只被身体独自承载。
    - 紊乱被认作一段未被锚定的地脉，而非私人缺陷；珍珠安置开始稳定该场域。
  - id: master_wu_ew_practice_05
    display_name: 堪舆稳定之息
    announcement_line: Master Wu示范三分钟「堪舆稳定之息」，用于急性地脉紊乱——劳动场域把气与地脉撞出对齐的那种时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 呼吸成为地脉实际节奏的标记，而不是平台所要求节奏的标记。
    - 身体回到工作场所之下龙脉所识别的频段。
sdg:
  primary:
    line: 联合国框架在SDG 8中包含「人人享有体面工作」。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_wu_ew_cta_01
    line: '美国工人合作社联合会(USFWC)协调全国一千二百多家工人所有制企业。入口：连接其成员合作社网络。'
  - id: master_wu_ew_cta_02
    line: '「Fight for $15」已在美国十一个州加上DC组织最低工资移动。入口：在你所在州加入运动网络。'
  - id: master_wu_ew_cta_03
    line: '国际劳工组织(ILO)青年就业项目在全球跟踪并支持青年工作政策框架。入口：其全球青年就业政策网络。'
  - id: master_wu_ew_cta_04
    line: '「人民民主中心」在美国组织「公平工作周」运动与工人权力基础设施。入口：其附属组织与工人主导的运动。'
  - id: master_wu_ew_cta_05
    line: '「全美就业法项目」(NELP)在美国为低薪与零工工人构建法律与政策基础设施。入口：其工人权利与政策改革网络。'
title_system:
  headline_layer_2:
    options:
    - id: master_wu_ew_headline_01
      line: 一位道家堪舆师把青年劳动苦楚命名为龙脉紊乱——并给出让身体回到大地的地脉修习。
    - id: master_wu_ew_headline_02
      line: 一位龙脉战术师，不是劳动改革者，谈论常规回应未被设计去抵达的那层工作苦楚。
    - id: master_wu_ew_headline_03
      line: 珍珠安置，而不是又一份副业——Master Wu的传统与最贴近劳动地脉的群体相遇。
    - id: master_wu_ew_headline_04
      line: 地脉再校准，不是病理——一个堪舆传统重新框架青年劳动负荷。
    - id: master_wu_ew_headline_05
      line: 跨区域龙脉回应——Master Wu的传统带给「任何单一国家政策都无法化解之劳动负荷」的东西。
