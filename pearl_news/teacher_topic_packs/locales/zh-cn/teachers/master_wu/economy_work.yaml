hook_personal:
  options:
    - id: hook_personal_01
      line: 工作不断要更多灵活，却给更少稳定；在排班承认之前，你的身体已知道代价。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 经济压力如今以身份压力到来：保持可雇佣、随时在线，并表现得像不稳定是对性格的考验。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Master Wu（土地与修养教师）在实修里见过这种压力落在年轻人身上。学生不只问如何更努力，而问如何在不断训练碎片化的环境里保持稳定。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        你查看排班应用。胃一沉。你再刷新。然后截图，免得班次在你相信所见之前就消失。
        LOOP_SEQUENCE: "查了应用。胃沉。再刷新。截了图。"
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Master Wu见过这一循环——查应用、身体下沉、刷新，以及试图把片刻钉住的截图。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 1,240 cases. 32 cities.
      stat_line_2: 年轻劳动者在记录条件、提起工资盗窃案件，并组织运动，把不稳定劳动规则拉进公共记录。
bridge:
  options:
    - id: bridge_01
      line: 1,240 cases. 32 cities. 追踪器衡量年轻人做了什么，却没有一栏记录「又一次拖延或失效回应之后，何以还能迈出下一步」——在经济不断把不确定变成私人压力时，仍能足够机能化以再行动的容量。回来的人需要它，处于那一循环的读者也需要它。Master Wu的教导有语言守护那种容量。
      hidden_capacity: 回到依真相的行动
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Master Wu所见
      paragraphs:
        - Master Wu从场域开始。注意、调节与努力既由意志也由条件塑造。
        - 当周围场域碎片化、不稳定或严酷时，首要错误是把那种失序翻成对人的评判。
        - 像「我坏了、错了」这种感受，常常是对你周围设计不良或恶化条件——以及从未为它所要求之物而设计的制度与结构——的准确反应。
practice:
  options:
    - id: practice_01
      display_name: 5-minute Return-to-Ground Practice
      announcement_line: Master Wu教授五分钟「Return-to-Ground Practice」，用于工作与经济的压力开始把注意变成无力感的时刻。在侧栏，计时且务实。
      relief_lines:
        - 身体不再把每一种要求都当作全面失序。
        - 足够调节回来，支撑下一次诚实行动。
sdg:
  primary:
    title: 体面工作和经济增长
    line: 联合国通过SDG 8及其体面工作相关目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: cta_01
      line: "国际劳工组织与青年工人联盟在此提供公共入口。入口: https://www.ilo.org/global/topics/youth-employment"
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 年轻劳动者背负的不稳定比工资所显示的更多。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 一位教师点出在不稳定之下仍为保持机能而战的隐性挣扎。
