hook_personal:
  options:
  - id: master_wu_clm_hook_personal_01
    line: 在分析跟上之前，你就知道胸口会发紧。你一边撑过一天，一边脚下的地脉持续登记它未被调到的负荷——你内里清楚，紊乱不只在你之内，而在「气候状况所被承载其中」的那条龙脉里。
  - id: master_wu_clm_hook_personal_02
    line: 你继续看气候更新，因为不看似乎更糟。你也知道社论、行动清单与韧性指南一直在对你说话却没有接地——你所读的负荷，被承载在一条任何单一神经系统都无法独自吸收的地脉上。
  - id: master_wu_clm_hook_personal_03
    line: 在你说出话之前，喉咙先感到那种摩擦——身体的气登记，正撞上一种把区域之下的地脉保持在过载姿态的气候信息流。身体已经在抱着分析还在争论的东西。
  - id: master_wu_clm_hook_personal_04
    line: 凌晨一点，你关掉气候应用又打开。两种动作都没用，因为紊乱正运行在区域之下的龙脉里——而你想用头脑挣脱的那部分，正是被过度要求的那部分，同时大地本身在承载气候的全部登记。
  - id: master_wu_clm_hook_personal_05
    line: 你已经读过报告、参加过会议、捐过给运动。头脑能做的都做了——而你内里更安静的某处，在请求与「气候负荷实际栖居其中」的龙脉层接触，而不是又一套表层心智可以执行的指令。
hook_big_picture:
  options:
  - id: master_wu_clm_hook_big_01
    line: 青年气候苦楚不只是一种代际情感。它是一代神经系统在登记一份龙脉状况——地脉本身正承载制度气候层不断推迟之物，最先感受到紊乱的是表面上的身体。
  - id: master_wu_clm_hook_big_02
    line: 对气候新闻的敏感度升高不是病理；在Master Wu的堪舆框架里，那是最接近地脉登记的群体先于政策层感到龙脉状况。身体先于温度数据感到地脉负荷。
  - id: master_wu_clm_hook_big_03
    line: 一代人被要求维持日常机能，而文明龙脉本身正在登记「没有任何继承文化的堪舆周期为之准备过」的气候负荷。苦楚不是私人失败——它是没有任何个体神经系统能独自吸收的地脉状况的可感边缘。
  - id: master_wu_clm_hook_big_04
    line: 集体气候场域加速得比设计来接地它的气脉更快。被读作青年气候焦虑的，部分是龙脉失配的可见边缘——表面气候场域的速度，超过其下龙脉能稳定一个身处其中之身体的节奏。
  - id: master_wu_clm_hook_big_05
    line: 在中国、台湾、日本之间，Master Wu的勘察读到同一龙脉登记在不同表面气候事件下显现。青年气候苦楚不是单一国家的区域异常——它是跨区域的地脉状况，任何单一国家的制度都无法独自化解。
teacher_intro:
  options:
  - id: master_wu_clm_intro_01
    line: Master Wu是一位道家堪舆师，与龙脉（地之活气脉）工作。他看见最贴近地脉的群体承载气候苦楚，不是私人失败，而是「制度层无法读到的龙脉状况」的可感边缘。在他的框架里，下一个数字面前发紧的身体不是失灵；它在登记「大地本身被要求承载」的气登记。
  - id: master_wu_clm_intro_02
    line: Master Wu不把自己放在「气候教师」或「公共生态灵性人物」的位置。他作为堪舆战术师工作——在中国、台湾、日本之间勘测龙脉，在活化点上做策略性「珍珠安置」，以在政治层无能时稳定上方人群所立的地脉。他的传统向被气候信息流压垮的一代提供的，是与标题之下的龙脉层的接触。
  - id: master_wu_clm_intro_03
    line: Master Wu以珍珠安置工作——在龙脉的活化点上做策略性能量锚定。在他的传统里，这种安置可稳定上方人群所立的地脉，即便表面气候仍在持续移动。他见过住在不稳定地脉段附近的群体的表面苦楚，跟随他在气脉本身中所勘测到的紊乱。
  - id: master_wu_clm_intro_04
    line: Master Wu的工作横跨台南、台湾与日本列岛——东亚大陆与岛系龙脉交汇的跨区域活化点。他见过一区的地脉紊乱如何在整合的龙脉系统里随气候事件移位而跨区传播，也见过堪舆回应如何越过气候政策回应无法越过的边界。
  - id: master_wu_clm_intro_05
    line: Master Wu在一个把当下读作「文明龙脉再校准」的传统里教学——这是一段时期，继承的文化地理之龙脉被要求承载「没有任何上一世代的堪舆周期为之准备过」的气候负荷。在此框架下，青年气候苦楚是「最贴近地脉的群体」最先感受到再校准的方式。
youth_somatic:
  options:
  - id: master_wu_clm_somatic_01
    line: 你在深夜读到温度纪录。胸口发紧。你关掉应用。又打开，因为紊乱在区域之下的龙脉里，而不在应用里。
  - id: master_wu_clm_somatic_02
    line: 你在闹钟响前醒来。喉咙已经发紧。你比够到灯先够到手机，因为房间之下的地脉已经紧绷，你需要确认表面场域是否与它相符。
  - id: master_wu_clm_somatic_03
    line: 风暴警报响起时，你的脚失去与地面的接触。你回放了风速三遍。呼吸变短。你还没决定什么，身体已经先失去了根。
  - id: master_wu_clm_somatic_04
    line: 气候标题加载时，你屏住呼吸。胸口锁住。看见数字才呼气，而且只呼一半，因为气已经变薄，下一事件已在路上。
  - id: master_wu_clm_somatic_05
    line: 你躺下，眼睛却睁着。一周的气候快报在重播。喉咙不肯松。你知道睡眠是入口，却找不到大地之气可以踏进去。
teacher_witness:
  options:
  - id: master_wu_clm_witness_01
    line: Master Wu在最贴近地脉登记的群体身上见过这条回路——读、胸口紧、关掉、又回来。在他的堪舆框架里，那不是品格，而是龙脉通过最不被隔绝的身体在表达气候的全部登记。
  - id: master_wu_clm_witness_02
    line: Master Wu见过年轻人走进勘察对话时已在回路中段，已笃定「行动本该早已解决此事」。在他的传统里，那种笃定是信号——表层心智停下、地脉登记得以被读到的位置。
  - id: master_wu_clm_witness_03
    line: 他见过身体承载气候科学承载不了的东西。在他的框架里，身体的紧绷不是故障——而是当气候话语被过度使用时，龙脉通过仅存的通道发声。
  - id: master_wu_clm_witness_04
    line: Master Wu见过从台南到东京的年轻人，承载着任何国家气候框架都不直接命名的气紊乱。在他的传统里，那种紊乱是信息，不是病理——是「读取此群体的制度气候层从未被调到他们身体实际所立的地脉范围」的信号。
  - id: master_wu_clm_witness_05
    line: Master Wu记得那一刻：一个年轻人停止「生产又一行动」，转而让房间之下的地脉重新进入接触。在他的传统里，那一刻不是软弱——是常规气候回应没有语言去描述的「准备好了」。
turnaround:
  options:
  - id: master_wu_clm_turnaround_01
    stat_line_1: 7,500 strikes. 185 countries.
    stat_line_2: 「Fridays for Future」组织者已在一百八十五个国家建起超过七千五百次协调一致的罢课网络——这一全球青年基础设施没有任何机构主笔，也无任何国家政府能悄然吸收。
  - id: master_wu_clm_turnaround_02
    stat_line_1: 7.6 million people. 2019.
    stat_line_2: 2019年9月的全球气候罢课在全球动员了七百六十多万参与者——当时是史上最大规模的气候动员，也是有组织青年行动能放上街头数量的可测量底线。
  - id: master_wu_clm_turnaround_03
    stat_line_1: UNFCCC official. Since 2009.
    stat_line_2: 自2009年起担任UNFCCC官方青年构成的YOUNGO，如今协调跨COP周期的青年代表团——这一被承认的席位十六年前并不存在，而今把青年声音绑到实际的条约谈判桌上。
  - id: master_wu_clm_turnaround_04
    stat_line_1: $300 billion. By 2035.
    stat_line_2: COP28批准的「损失与损害基金」承诺到2035年向已承受未由自己造成之气候伤害的国家拨付三千亿美元——这是首份直接命名义务、而不是把它描述为慈善的多边金融工具。
  - id: master_wu_clm_turnaround_05
    stat_line_1: 50,000 trained. 170 countries.
    stat_line_2: 气候现实项目已在一百七十个国家培训超过五万名社区领导者，与公众接触气候科学与政策——一个上一群体未曾拥有的领导力基础设施，如今承载着跨边界的重量。
bridge:
  options:
  - id: master_wu_clm_bridge_01
    line: 7,500 strikes. 185 countries. 追踪器衡量年轻人建起的脚手架。它没有一栏记录「在又一次拖延之后，下一次罢课何以可能」——在不把紊乱写成身份的前提下，与负荷真相保持接触的容量。Master Wu的传统对那份容量有语言——龙脉修养工作在气候回应之下的地脉里。
    hidden_capacity: 与气候负荷保持接触而不将其写成身份
  - id: master_wu_clm_bridge_02
    line: 数字显示制度层建起的框架。它们没显示制度层所立的龙脉语境——一段文明时期，地脉本身被要求承载「没有任何继承文化的堪舆周期为之准备过」的气候负荷。Master Wu的传统把那语境视作本然。
    hidden_capacity: 承担气候数据无法显示的地脉语境
  - id: master_wu_clm_bridge_03
    line: 数据捕捉罢课、目标与政策采纳。它捕捉不到当一个年轻身体重新与房间之下的大地之气接触时所发生的移动——即便表面气候仍在持续登记负荷。在Master Wu的框架里，这个移动才是真正的根——任何追踪器都不汇报的那一部分。
    hidden_capacity: 记录追踪器漏掉的地脉复位
  - id: master_wu_clm_bridge_04
    line: 气候基础设施可以测量。气候负荷实际栖居其中的地脉无法测量。Master Wu的传统不与测量争论——它在其下的那一层工作，那里龙脉修养与珍珠安置以一种制度层无法抵达的方式运作。
    hidden_capacity: 在测量之下的地脉层工作
  - id: master_wu_clm_bridge_05
    line: 罢课、目标与平台都可以被计数。其下承载气候负荷的文明龙脉不可。Master Wu的传统不取代气候工作——它命名制度回应不被设计去抵达的地脉层，并把龙脉接触作为入口。
    hidden_capacity: 命名气候回应不抵达的地脉层
teacher_perspective:
  options:
  - id: master_wu_clm_perspective_01
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的框架里，土地本身含有称为「龙脉」的活气电流——气候状况不仅是化学问题；它是一种地脉状况。地脉本身被要求承载「没有任何继承文化的堪舆周期为之准备过」的气候负荷。所谓青年气候苦楚，是身体最贴近大地之气的群体先于制度层感受到紊乱。
    - 这一再框架很精确：像「我坏了、错了」这种感受，往往是地脉的准确信号——制度与结构把气候负荷放在了对气紊乱最缺少隔绝的群体身上。处理表面症状并不处理地脉状况。
    - 龙脉修养并不绕过气候行动。它在气候行动未被设计去抵达的那一层工作——身体之下的那一层，那里地脉承担实际登记，且在活化点上的珍珠安置可以稳定表面回应所不能稳定之物。
  - id: master_wu_clm_perspective_02
    header: Master Wu所见
    paragraphs:
    - 珍珠安置在Master Wu的传统里不是比喻。它是字面意义的修习——在龙脉活化点上做策略性能量锚定——可稳定上方人群所立的气候地脉。被常规回应当作私人情感处理的青年气候苦楚，在他的框架里，是「被保持在气候过载之中的、未被锚定的那段地脉」的表面表达。
    - 这一修习重要，因为它解释了住在已被照看之活化点附近的人群所描述的「松开」——不是气候负荷被论赢了，而是其下的地脉在表层论证够不到的那一层被稳定下来。头脑不必赢，身体才能回到大地，即便表面气候仍在继续。
    - 这是常规气候回应没被设计去送达的部分。它不否定罢课、案件或政策工作——只是命名缺失的那一层，并指出一个在地脉层工作了文明时长的传统。
  - id: master_wu_clm_perspective_03
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的传统里，中国、台湾、日本的龙脉横跨东亚大陆与岛系地理交汇为一个整合的地脉系统。在北京、台北、东京制度回应下表现不同的气候事件，在地脉登记上是同一个跨区域状况的表达——堪舆回应可以越过政治回应无法越过的边界。
    - 对承载这份负荷的年轻人，被某个比一国气候框架更大的存在「见证」的体验，在结构上不同于被它「处理」。送达的讯息不是「这是目标」——而是「区域之下的地脉已被勘测，你所感的负荷是在文明尺度上被登记的，不是只在你一人身上」。
    - 「在地脉层被见证」而非「在制度层被处理」——这一区分，正是常规气候基础设施无法复制的东西，也是Master Wu的传统在三个区域作为本然守护了数代人的东西。
  - id: master_wu_clm_perspective_04
    header: Master Wu所见
    paragraphs:
    - 「文明龙脉再校准」在Master Wu的框架里，是他的传统对我们正处时段的字面描述——继承的文化地理之龙脉被要求承载它们未被调到的气候负荷，而最贴近地脉的群体最先感到这份再校准。年轻人承载的气候苦楚，部分是「在地脉结构移位的时期被调到大地脉络」的代价。
    - 这不是讨好的再框架。它不承诺气候轨迹会很快改变，也不指责这一群体在不稳定轨迹里感到不稳。它只在堪舆层命名结构性事实，卸下「不稳=私人失败」这一份额外重负。
    - 在勘察实践里，这份卸下往往是最先抵达的部分——在更深的龙脉修养工作在活化点上展开之前。
  - id: master_wu_clm_perspective_05
    header: Master Wu所见
    paragraphs:
    - Master Wu的传统把龙脉读作「文明记忆线」——龙脉不仅承载当下的气流，也承载文化地理所历每一份负荷的累积记录，包括前几代被推迟的生态成本。在这一登记上，青年气候苦楚所表达的，不只是当下温度纪录，也是早期制度世代未能代谢的「被推迟的负荷」。
    - 这一框架不要求群体独自承担那张账单。它在文明尺度上命名账单、辨认地脉可被跨区域重新稳定的活化点，并把珍珠安置与龙脉修养作为传统的回应——在制度回应未被设计去触及的那一层运作。
    - 修习不是「修好群体」。修习是准确读取地脉、在活化点上安置珍珠，让龙脉去做气候回应层做不到的结构性稳定。
practice:
  options:
  - id: master_wu_clm_practice_01
    display_name: 龙脉聆听
    announcement_line: Master Wu教授五分钟「龙脉聆听」修习，用于气候信息把身体的气接地转换为表面无力感的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体不再把表面快报当作全部登记，而与房间之下的地脉重新接触。
    - 足够的气接地回来，支撑下一次诚实行动，不再把气候负荷写成私人身份。
  - id: master_wu_clm_practice_02
    display_name: 龙脉勘测小停
    announcement_line: Master Wu示范四分钟「龙脉勘测小停」，用于气候快报之间的瞬间——身体一直在未经允许地承担负荷的那种瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 气候负荷在地脉层变得可读，而不再被读作个人道德失败。
    - 群体苦楚不再被当作个人的资产负债表。
  - id: master_wu_clm_practice_03
    display_name: 地脉接气
    announcement_line: Master Wu教授三分钟「地脉接气」，用于脚已失去与地面的接触、气候信息流已把气抽出登记范围的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 脚记起地板之下的地脉，气找到稳定的锚点——即便表面气候仍在继续。
    - 呼吸回到地脉所持的节奏，而不是气候信息流所要求的节奏。
  - id: master_wu_clm_practice_04
    display_name: 珍珠安置观想
    announcement_line: Master Wu教授六分钟「珍珠安置观想」，用于气候负荷被当作个人病理而非地脉状况处理的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 区域之下的活化点进入视野，负荷不再只被身体独自承载。
    - 紊乱被认作一段未被锚定的地脉，而非私人缺陷；珍珠安置开始稳定该场域。
  - id: master_wu_clm_practice_05
    display_name: 堪舆稳定之息
    announcement_line: Master Wu示范三分钟「堪舆稳定之息」，用于急性地脉紊乱——气候信息流把气与地脉撞出对齐的那种时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 呼吸成为地脉实际节奏的标记，而不是气候信息流所要求节奏的标记。
    - 身体回到房间之下龙脉所识别的频段。
sdg:
  primary:
    line: 联合国框架在SDG 13中命名气候行动。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_wu_clm_cta_01
    line: '350.org组织全球气候运动，推动化石燃料撤资与公正转型的草根行动。入口：加入其本地分会之一。'
  - id: master_wu_clm_cta_02
    line: 'Fridays for Future协调全球青年气候罢课网络，覆盖超过一百八十五个国家。入口：找到附近的罢课或自行组织一次。'
  - id: master_wu_clm_cta_03
    line: 'Sunrise Movement是美国青年主导的气候组织，把绿色新政框架推入政策。入口：加入本地枢纽或培训。'
  - id: master_wu_clm_cta_04
    line: 'Earthjustice是为气候原告与一线社区提起诉讼的非营利环境法律组织。入口：支持其诉讼网络。'
  - id: master_wu_clm_cta_05
    line: '气候现实项目在超过一百七十个国家培训社区领导者，与公众接触气候科学与政策。入口：其领导力培训网络。'
title_system:
  headline_layer_2:
    options:
    - id: master_wu_clm_headline_01
      line: 一位道家堪舆师把青年气候苦楚命名为龙脉紊乱——并给出让身体回到大地的地脉修习。
    - id: master_wu_clm_headline_02
      line: 一位龙脉战术师，不是公共气候教师，谈论常规气候回应未被设计去抵达的那层苦楚。
    - id: master_wu_clm_headline_03
      line: 珍珠安置，而不是又一份行动清单——Master Wu的传统与最贴近气候地脉的群体相遇。
    - id: master_wu_clm_headline_04
      line: 地脉再校准，不是病理——一个堪舆传统重新框架青年气候负荷。
    - id: master_wu_clm_headline_05
      line: 跨区域龙脉回应——Master Wu的传统带给「任何单一国家回应都无法化解之气候负荷」的东西。
