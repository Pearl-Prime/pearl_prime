hook_personal:
  options:
  - id: master_wu_mh_hook_personal_01
    line: 在任何人命名之前，你就知道那种螺旋。你一边撑过一天，一边胸口的气在不断变薄——你内里清楚，紊乱并不只在你一人之内，而在你所立足的那片场域之下、地脉之中。
  - id: master_wu_mh_hook_personal_02
    line: 你继续刷信息流，因为不看似乎更糟。你也知道治疗师、算法和自助内容一直在对你说话，却没有缓解——你所承载的负荷，本就不该由一个神经系统独自吸收。
  - id: master_wu_mh_hook_personal_03
    line: 在你说出话之前，太阳神经丛先感到那种摩擦——身体的气脉接地，正撞上一条龙脉从未被调到那种节奏的信息流。身体已经在抱着头脑还在争论的东西。
  - id: master_wu_mh_hook_personal_04
    line: 凌晨一点，你关掉应用又打开。两种动作都没用，因为螺旋正运行在房间之下的地脉里——而你想用头脑挣脱的那部分，正是被过度要求的那部分，与此同时大地本身已经静默。
  - id: master_wu_mh_hook_personal_05
    line: 你已经读过帖子、做过筛查、用过呼吸App。头脑能做的都做了——而你内里更安静的某处，在请求与大地之气接触，而不是又一套表层心智可以执行的指令。
hook_big_picture:
  options:
  - id: master_wu_mh_hook_big_01
    line: 青年心理过载不只是临床趋势。它是一代神经系统在登记一份龙脉紊乱——文明生活之下的地脉正承载制度层不断推迟之物，最先感受到的是表面上的身体。
  - id: master_wu_mh_hook_big_02
    line: 年轻人的敏感度升高不是病理；在Master Wu的堪舆框架里，那是最接近地脉登记的群体先于数据感到龙脉紊乱。身体是在准确登记，不是在故障。
  - id: master_wu_mh_hook_big_03
    line: 一代人被要求维持日常机能，而其下的文明龙脉正在变薄。过载不是私人失败——它是没有任何个体神经系统能独自吸收的地脉裂口的可感边缘。
  - id: master_wu_mh_hook_big_04
    line: 集体场域加速得比设计来接地它的气脉更快。被读作青年心理健康危机的，部分是龙脉失配的可见边缘——表面场域的速度，超过其下龙脉能稳定身体的节奏。
  - id: master_wu_mh_hook_big_05
    line: 在中国、台湾、日本之间，Master Wu的勘察读到同一龙脉紊乱在不同表面症状下显现。青年心理负荷不是某一区域的异常——它是跨区域的地脉状况，任何单一国家的制度都无法独自化解。
teacher_intro:
  options:
  - id: master_wu_mh_intro_01
    line: Master Wu是一位道家堪舆师，与龙脉（地之活气脉）工作。他看见年轻人所属的群体承载心理过载，不是私人失败，而是制度层无法读到的地脉紊乱的可感边缘。在他的框架里，下一次通知面前变薄的身体不是失灵，而是在登记场域之下的气之裂口。
  - id: master_wu_mh_intro_02
    line: Master Wu不把自己放在「公共说教者」或「静修导师」的位置。他作为堪舆战术师工作——在中国、台湾、日本之间勘测龙脉，在活化点上做策略性「珍珠安置」，以稳定上方人群所立的地脉。他的传统向被表面噪声压垮的一代提供的，是与地脉这一层的接触。
  - id: master_wu_mh_intro_03
    line: Master Wu以珍珠安置工作——在龙脉的活化点上做策略性能量锚定，在他的传统里，这种安置可稳定上方人群所立的地脉。他见过青年的表面症状跟随他在地脉本身中所勘测到的紊乱，也见过当其下的地脉被复位时，那份负荷如何松开。
  - id: master_wu_mh_intro_04
    line: Master Wu的工作横跨台南、台湾与日本列岛——东亚大陆与岛系龙脉在此交汇的跨区域活化点。他见过同一种地脉紊乱在不同国家制度层下产生不同的表面症状，也见过在制度层无能为力时，堪舆层如何回应。
  - id: master_wu_mh_intro_05
    line: Master Wu在一个把当下读作「文明龙脉再校准」的传统里教学——这是一段时期，继承的文化地理之龙脉被要求承载它们未被调到的负荷。在此框架下，青年心理过载是「最贴近地脉的群体」最先感受到再校准的方式。
youth_somatic:
  options:
  - id: master_wu_mh_somatic_01
    line: 你在深夜读到更新。胸口发紧。你关掉应用。又打开，因为紊乱在地脉里，而不在屏幕里。
  - id: master_wu_mh_somatic_02
    line: 你在闹钟响前醒来。太阳神经丛已经发紧。你比够到灯先够到手机，因为房间之下的气紊乱已经在那里，你需要确认表面场域是否与它相符。
  - id: master_wu_mh_somatic_03
    line: 通知响起时，你的脚在桌下失去与地面的接触。你回放了刚才的对话三遍。呼吸变短。你还没决定什么，身体已经先失去了根。
  - id: master_wu_mh_somatic_04
    line: 屏幕加载时，你不知不觉地屏住呼吸。胸口锁住。看到消息才呼气，而且只呼一半，因为气已经变薄，下一次紊乱已在路上。
  - id: master_wu_mh_somatic_05
    line: 你躺下，眼睛却睁着。一日负荷在重播。太阳神经丛不肯松。你知道睡眠是入口，却找不到大地之气可以踏进去。
teacher_witness:
  options:
  - id: master_wu_mh_witness_01
    line: Master Wu在最贴近地脉的群体身上见过这条回路——读、气变薄、关掉、又回来。在他的堪舆框架里，那不是品格，而是龙脉通过最不被隔绝的身体在表达自身。
  - id: master_wu_mh_witness_02
    line: Master Wu见过年轻人走进勘察对话时已在回路中段，已笃定「智力本该早已解决此事」。在他的传统里，那种笃定是信号——表层心智停下、地脉登记得以被读到的位置。
  - id: master_wu_mh_witness_03
    line: 他见过身体承载解释承载不了的东西。在他的框架里，身体的回路不是故障——而是当表层分析被过度使用时，龙脉通过仅存的通道发声。
  - id: master_wu_mh_witness_04
    line: Master Wu见过从台南到东京的年轻人，承载着任何国家筛查工具都不命名的气紊乱。在他的传统里，那种紊乱是信息，不是病理——是「读取此群体的制度层从未被调到他们身体实际所立的地脉范围」的信号。
  - id: master_wu_mh_witness_05
    line: Master Wu记得那一刻：一个年轻人停止「生产答案」，转而让房间之下的地脉重新进入接触。在他的传统里，那一刻不是软弱——是常规照护没有语言去描述的「准备好了」。
turnaround:
  options:
  - id: master_wu_mh_turnaround_01
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: JED基金会的项目如今在美国近五百所校园运行综合心理健康框架，把同伴支持与教师培训嵌进日常基础设施，而不只是危机之后的善后。
  - id: master_wu_mh_turnaround_02
    stat_line_1: 14 million contacts. 988 Lifeline.
    stat_line_2: 自2022年988自杀与危机生命线上线以来，已有一千四百多万次联系经由它——三年前不存在的资源池，如今每晚都在承重。
  - id: master_wu_mh_turnaround_03
    stat_line_1: Crisis Text Line. 24/7.
    stat_line_2: Crisis Text Line网络建起免费的24小时短信基础设施，在年轻人实际生活的媒介里与他们相遇——这是上一群体未曾拥有的安静入口，如今承载着深夜伸手的重量。
  - id: master_wu_mh_turnaround_04
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: WHO欧洲于2025年10月通过的《儿童与青少年健康战略2026-2030》，约束五十三个成员国按2030年期限报告青少年心理负荷——首份把这一群体的负荷当作治理而非评论的多边制度。
  - id: master_wu_mh_turnaround_05
    stat_line_1: 5,600 voices. 7 countries.
    stat_line_2: UNICEF的「全球青年心理健康联盟」在七个国家集合了5,600名14-25岁的年轻人，浮出常规报告漏掉的内容——这一群体先于机构，自己说出了这份重量。
bridge:
  options:
  - id: master_wu_mh_bridge_01
    line: 488 universities. 追踪器衡量制度搭起的脚手架。它没有一栏记录「让下一次伸手成为可能」的容量——在不把紊乱写成身份的前提下，与负荷的真相保持接触的容量。Master Wu的传统对那份容量有语言——龙脉修养工作在表面回应之下的地脉里，那里负荷才是真正被承载的位置。
    hidden_capacity: 与负荷保持接触而不将其写成身份
  - id: master_wu_mh_bridge_02
    line: 数字显示制度层建起的热线与框架。它们没显示制度层所立的龙脉语境——一段文明时期，青年生活之下的地脉变薄的速度超过继承文化的节奏能稳定的范围。Master Wu的传统把那语境视作本然。
    hidden_capacity: 承担数据无法显示的地脉语境
  - id: master_wu_mh_bridge_03
    line: 数据捕捉联系、会谈与政策采纳。它捕捉不到当一个年轻身体重新与房间之下的大地之气接触时所发生的移动。在Master Wu的框架里，这个移动才是真正的复位——任何追踪器都不汇报的那一部分。
    hidden_capacity: 记录追踪器漏掉的地脉复位
  - id: master_wu_mh_bridge_04
    line: 基础设施可以测量。气紊乱实际栖居的地脉无法测量。Master Wu的传统不与测量争论——它在其下的那一层工作，那里龙脉修养与珍珠安置以一种制度层无法抵达的方式运作。
    hidden_capacity: 在测量之下的地脉层工作
  - id: master_wu_mh_bridge_05
    line: 结构、政策、平台都可以被计数。其下的文明龙脉不可。Master Wu的传统不取代结构性工作——它命名制度回应不被设计去抵达的地脉层，并把龙脉接触作为入口。
    hidden_capacity: 命名制度回应不抵达的地脉层
teacher_perspective:
  options:
  - id: master_wu_mh_perspective_01
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的框架里，土地本身含有称为「龙脉」的活气电流——这些以大地为基的气脉，承载着集体生活的实际负荷。所谓青年心理过载，在地脉登记上，是身体最贴近大地之气的群体先于制度层感受到紊乱。身体不是失灵；它在准确登记。
    - 这一再框架很精确：像「我坏了、错了」这种感受，往往是地脉的准确信号——制度与结构把这份负荷放在了对气紊乱最缺少隔绝的群体身上。当紊乱被认作龙脉状况而非私人过错时，疗愈才开始。
    - 龙脉修养并不绕过常规照护。它在常规照护未被设计去抵达的那一层工作——身体之下的那一层，那里地脉承担实际登记，且在活化点上的珍珠安置可以稳定表面回应所不能稳定之物。
  - id: master_wu_mh_perspective_02
    header: Master Wu所见
    paragraphs:
    - 珍珠安置在Master Wu的传统里不是比喻。它是字面意义的修习——在龙脉活化点上做策略性能量锚定——可稳定上方人群所立的地脉。被常规回应当作「私人病理」处理的青年心理负荷，在他的框架里是「尚未被堪舆照看的、未被锚定的那段地脉」的表面表达。
    - 这一修习重要，因为它解释了住在已被照看之活化点附近的人群所描述的「松开」——不是负荷被论赢了，而是其下的地脉在表层论证够不到的那一层被稳定下来。头脑不必赢，身体才能回到大地。
    - 这是常规照护没被设计去送达的部分。它不否定临床回应——只是命名缺失的那一层，并指出一个在地脉层工作了文明时长的传统。
  - id: master_wu_mh_perspective_03
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的传统里，中国、台湾、日本的龙脉横跨东亚大陆与岛系地理交汇为一个整合的地脉系统。青年心理负荷在北京、台北、东京制度层下表现不同，但在地脉登记上是同一个跨区域状况——堪舆回应可以越过政治回应无法越过的边界。
    - 对承载这份负荷的年轻人，被某个比一国制度框架更大的存在「见证」的体验，在结构上不同于被它「处理」。送达的讯息不是「这是规则」——而是「你身下的地脉已被勘测，你所感的紊乱是在文明尺度上被登记的，不是只在你一人身上」。
    - 「在地脉层被见证」而非「在制度层被处理」——这一区分，正是常规基础设施无法复制的东西，也是Master Wu的传统在三个区域作为本然守护了数代人的东西。
  - id: master_wu_mh_perspective_04
    header: Master Wu所见
    paragraphs:
    - 「文明龙脉再校准」在Master Wu的框架里，是他的传统对我们正处时段的字面描述——继承的文化地理之龙脉被要求承载它们未被调到的负荷，而最贴近地脉的群体最先感到这份再校准。年轻人承载的心理过载，部分是「在地脉结构移位的时期被调到大地脉络」的代价。
    - 这不是讨好的再框架。它不承诺负荷会很快消退，也不指责这一群体在不稳定的地脉里感到不稳。它只在堪舆层命名结构性事实，卸下「不稳=私人失败」这一份额外重负。
    - 在勘察实践里，这份卸下往往是最先抵达的部分——在更深的龙脉修养工作在活化点上展开之前。
  - id: master_wu_mh_perspective_05
    header: Master Wu所见
    paragraphs:
    - Master Wu的传统把龙脉读作「文明记忆线」——龙脉不仅承载当下的气流，也承载文化地理所历每一份负荷的累积记录。在这一登记上，青年心理负荷所表达的，不只是当下的压力，也是早期制度世代未能代谢的「被推迟的负荷」。最贴近地脉的身体最先感到那张未付的账单。
    - 这一框架不要求群体独自承担那张账单。它在文明尺度上命名账单、辨认地脉可被重新稳定的活化点，并把珍珠安置与龙脉修养作为传统的回应——在制度回应未被设计去触及的那一层运作。
    - 修习不是「修好群体」。修习是准确读取地脉、在活化点上安置珍珠，让龙脉去做制度层做不到的结构性工作。
practice:
  options:
  - id: master_wu_mh_practice_01
    display_name: 龙脉聆听
    announcement_line: Master Wu教授五分钟「龙脉聆听」修习，用于青年心理压力把身体的气接地转换为表面无力感的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体不再把表面过载当作全部登记，而与房间之下的地脉重新接触。
    - 足够的气接地回来，支撑下一次诚实行动，不再把紊乱写成身份。
  - id: master_wu_mh_practice_02
    display_name: 龙脉勘测小停
    announcement_line: Master Wu示范四分钟「龙脉勘测小停」，用于通知与通知之间的瞬间——身体一直在未经允许地承担气负荷的那种瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 紊乱在地脉层变得可读，而不再被读作个人失败。
    - 群体负荷不再被当作个人的资产负债表。
  - id: master_wu_mh_practice_03
    display_name: 地脉接气
    announcement_line: Master Wu教授三分钟「地脉接气」，用于脚已失去与地面的接触、表面场域已把气抽出登记范围的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 脚记起地板之下的地脉，气找到稳定的锚点。
    - 呼吸回到地脉所持的节奏，而不是信息流所要求的节奏。
  - id: master_wu_mh_practice_04
    display_name: 珍珠安置观想
    announcement_line: Master Wu教授六分钟「珍珠安置观想」，用于负荷被当作个人病理而非地脉状况处理的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 房间之下的活化点进入视野，负荷不再只被身体独自承载。
    - 紊乱被认作一段未被锚定的地脉，而非私人缺陷；珍珠安置开始稳定该场域。
  - id: master_wu_mh_practice_05
    display_name: 堪舆稳定之息
    announcement_line: Master Wu示范三分钟「堪舆稳定之息」，用于急性地脉紊乱——表面场域把气与地脉撞出对齐的那种时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 呼吸成为地脉实际节奏的标记，而不是表面场域所要求节奏的标记。
    - 身体回到房间之下龙脉所识别的频段。
sdg:
  primary:
    line: 联合国框架在SDG 3中包含心理健康与福祉。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_wu_mh_cta_01
    line: '若你或你认识的人处于危机，Crisis Text Line提供免费24/7支持。发短信HOME到741741。入口：加入其网络。'
  - id: master_wu_mh_cta_02
    line: '若你或你认识的人处于危机，美国988自杀与危机生命线提供免费24/7支持。拨打或发短信988。入口：自2022年以来已处理超过一千四百万次联系的网络。'
  - id: master_wu_mh_cta_03
    line: '如你是25岁以下LGBTQ+群体且处于危机，The Trevor Project通过短信、聊天或电话提供免费24/7支持。发短信START到678-678。入口：为这一群体而建的网络。'
  - id: master_wu_mh_cta_04
    line: '关于心理健康的信息、转介与同伴支持，NAMI HelpLine在周一至周五开通。拨打1-800-950-NAMI(6264)，或将「HelpLine」发送至62640。入口：接入全美精神疾病联盟(NAMI)的网络。'
  - id: master_wu_mh_cta_05
    line: 'Active Minds在美国650多所校园运行同伴主导的心理健康社区。如果你所在校园有分会，那是一个低摩擦的入口。如果没有，全国网络可以把你接到在别处建起同样基础设施的同伴。'
title_system:
  headline_layer_2:
    options:
    - id: master_wu_mh_headline_01
      line: 一位道家堪舆师把青年心理过载命名为龙脉紊乱——并给出让身体回到大地的地脉修习。
    - id: master_wu_mh_headline_02
      line: 一位龙脉战术师，不是公共说教者，谈论常规照护未被设计去抵达的那层痛苦。
    - id: master_wu_mh_headline_03
      line: 珍珠安置，而不是又一套指令栈——Master Wu的传统与最贴近地脉的群体相遇。
    - id: master_wu_mh_headline_04
      line: 地脉再校准，不是病理——一个堪舆传统重新框架青年心理负荷。
    - id: master_wu_mh_headline_05
      line: 跨区域龙脉回应——Master Wu的传统带给「任何单一国家制度都无法独自化解之负荷」的东西。
