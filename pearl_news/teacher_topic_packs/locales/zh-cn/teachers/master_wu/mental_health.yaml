hook_personal:
  options:
    - id: hook_personal_01
      line: 在任何人命名之前你就知道螺旋。你也清楚在内里容量不断变薄时，撑过一天要费多少力。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 青年心理健康负担不只是临床趋势，更是制度如何把过载正常化、直到年轻人开始把它当私人缺陷的方式。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Master Wu（土地与修养教师）在实修里见过这种压力落在年轻人身上。学生不只问如何更努力，而问如何在不断训练碎片化的环境里保持稳定。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        你在深夜过后读报道。身体发紧。你放下手机。你又拿起，因为压力已经在房间里。
        LOOP_SEQUENCE: "读了报道。身体紧。放下手机。又拿起。"
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Master Wu见过这一循环——报道、身体发紧、放下手机，以及因压力仍在而返回。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 320 campuses. 18 countries.
      stat_line_2: 学生在搭建同伴圈、工作坊与运动，把心理健康当作共享基础设施而非私人软弱。
bridge:
  options:
    - id: bridge_01
      line: 320 campuses. 18 countries. 追踪器衡量年轻人做了什么，却没有一栏记录「又一次拖延或失效回应之后，何以还能迈出下一步」——求助并返回、而不把过载写成身份的容量。回来的人需要它，处于那一循环的读者也需要它。Master Wu的教导有语言守护那种容量。
      hidden_capacity: 回到依真相的行动
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Master Wu所见
      paragraphs:
        - Master Wu从场域开始。注意、调节与努力既由意志也由条件塑造。
        - 当周围场域碎片化、不稳定或严酷时，首要错误是把那种失序翻成对人的评判。
        - 像「我坏了、错了」这种感受，常常是对你周围设计不良或恶化条件——以及从未为它所要求之物而设计的制度与结构——的准确反应。
practice:
  options:
    - id: practice_01
      display_name: 5-minute Return-to-Ground Practice
      announcement_line: Master Wu教授五分钟「Return-to-Ground Practice」，用于心理健康压力开始把注意变成无力感的时刻。在侧栏，计时且务实。
      relief_lines:
        - 身体不再把每一种要求都当作全面失序。
        - 足够调节回来，支撑下一次诚实行动。
sdg:
  primary:
    title: 良好健康与福祉
    line: 联合国通过SDG 3及其心理健康目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: cta_01
      line: "Active Minds与青年支持团体在此提供公共入口。入口: https://www.activeminds.org"
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 青年心理过载持续攀升。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 一位教师在它硬化成身份之前点出那种压力。
