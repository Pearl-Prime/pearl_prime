hook_personal:
  options:
  - id: master_wu_edu_hook_personal_01
    line: 在任何人命名之前，你就知道专注会变薄。你一边撑过一天，一边胸口的气持续与课业失去对位——你内里清楚，紊乱不只在你之内，而在你正试图学习的房间之下的地脉里。
  - id: master_wu_edu_hook_personal_02
    line: 你继续打开标签页，因为关掉似乎更糟。你也知道生产力系统、学习App与辅导栈一直在对你说话却没有接地——你被要求维持的注意力，本就不该由一个与大地之脉断开的身体承担。
  - id: master_wu_edu_hook_personal_03
    line: 在你说出话之前，太阳神经丛先感到那种紊乱——身体的气接地，正撞上一种把书桌之下的地脉保持稀薄的学习场域。身体已经在抱着课程大纲还在争论的东西。
  - id: master_wu_edu_hook_personal_04
    line: 凌晨一点，你又打开文档又关掉。两种动作都没用，因为专注正在房间之下的龙脉里变薄——而你想硬撑过去的那部分，正是被过度要求的那部分，同时大地本身已经静默。
  - id: master_wu_edu_hook_personal_05
    line: 你已经读过学习指南、做过模拟测试、用过App。头脑能做的都做了——而你内里更安静的某处，在请求与学习场域之下的大地之气接触，而不是又一套表层心智可以执行的指令。
hook_big_picture:
  options:
  - id: master_wu_edu_hook_big_01
    line: 青年学习苦楚不只是课程趋势。它是一代神经系统在登记一份龙脉紊乱——学习生活之下的地脉正承载制度改革层不断推迟之物，最先感受到的是表面上的身体。
  - id: master_wu_edu_hook_big_02
    line: 对学习压力的敏感度升高不是病理；在Master Wu的堪舆框架里，那是最贴近地脉登记的群体感到课程层无法读取的龙脉紊乱。身体先于测试分数感到地脉裂口。
  - id: master_wu_edu_hook_big_03
    line: 一代人被要求维持日常注意，而其下的文明龙脉正在变薄。碎片化不是私人学习障碍——它是没有任何个体神经系统能独自吸收的地脉裂口的可感边缘。
  - id: master_wu_edu_hook_big_04
    line: 集体学习场域加速得比设计来接地注意的气脉更快。被读作青年专注危机的，部分是龙脉失配的可见边缘——表面学习场域的速度，超过其下龙脉能稳定一个学习中身体的节奏。
  - id: master_wu_edu_hook_big_05
    line: 在中国、台湾、日本之间，Master Wu的勘察读到同一龙脉登记在不同表面学习体系下显现。青年专注苦楚不是单一国家教学法问题——它是跨区域的地脉状况，任何单一国家的制度都无法独自化解。
teacher_intro:
  options:
  - id: master_wu_edu_intro_01
    line: Master Wu是一位道家堪舆师，与龙脉（地之活气脉）工作。他看见最贴近地脉的群体承载学习过载，不是私人学习失败，而是「课程层无法读到的龙脉紊乱」的可感边缘。在他的框架里，下一份作业面前飘走的身体不是失灵；它在登记书桌之下气的裂口。
  - id: master_wu_edu_intro_02
    line: Master Wu不把自己放在「教育改革者」或「公共教师」的位置。他作为堪舆战术师工作——在中国、台湾、日本之间勘测龙脉，在活化点上做策略性「珍珠安置」，以稳定上方人群所立的学习生活的地脉。他的传统向被学习要求压垮的一代提供的，是与日程之下的龙脉层的接触。
  - id: master_wu_edu_intro_03
    line: Master Wu以珍珠安置工作——在龙脉的活化点上做策略性能量锚定，在他的传统里，这种安置可稳定上方人群所立的地脉。他见过住在不稳定地脉段附近的学生的表面专注变薄，跟随他在气脉本身中所勘测到的紊乱。
  - id: master_wu_edu_intro_04
    line: Master Wu的工作横跨台南、台湾与日本列岛——东亚大陆与岛系龙脉交汇的跨区域活化点。他见过一区的地脉紊乱如何在不同国家课程下产生不同的学习症状，也见过堪舆回应如何越过课程回应无法越过的边界。
  - id: master_wu_edu_intro_05
    line: Master Wu在一个把当下读作「文明龙脉再校准」的传统里教学——这是一段时期，继承的文化地理之龙脉被要求承载它们未被调到的负荷。在此框架下，青年学习过载是「最贴近地脉的群体」最先在日常学习场域内感受到再校准的方式。
youth_somatic:
  options:
  - id: master_wu_edu_somatic_01
    line: 你在深夜打开文档。眼睛飘走。你切换标签。又切回来，因为课业仍在，紊乱在地脉里，而不在标签里。
  - id: master_wu_edu_somatic_02
    line: 你在闹钟响前醒来。太阳神经丛已经发紧。你比够到课本先够到手机，因为房间之下的地脉已经稀薄，你需要确认表面场域是否与它相符。
  - id: master_wu_edu_somatic_03
    line: 作业加载时，你的脚失去与地面的接触。你回放了截止日期三遍。呼吸变短。你还没决定什么，身体已经先失去了根。
  - id: master_wu_edu_somatic_04
    line: 页面加载时，你屏住呼吸。胸口锁住。看见题面才呼气，而且只呼一半，因为气已经变薄，下一份作业已在路上。
  - id: master_wu_edu_somatic_05
    line: 你躺下，眼睛却睁着。一周的截止日期在重播。太阳神经丛不肯松。你知道睡眠是入口，却找不到大地之气可以踏进去。
teacher_witness:
  options:
  - id: master_wu_edu_witness_01
    line: Master Wu在最贴近地脉登记的群体身上见过这条回路——打开、气变薄、切换走、又回来。在他的堪舆框架里，那不是品格，而是龙脉通过最不被隔绝的身体在表达「学习场域之下变薄的那段地脉」。
  - id: master_wu_edu_witness_02
    line: Master Wu见过年轻人走进勘察对话时已在回路中段，已笃定「自律本该早已解决此事」。在他的传统里，那种笃定是信号——表层心智停下、地脉登记得以被读到的位置。
  - id: master_wu_edu_witness_03
    line: 他见过身体承载生产力系统承载不了的东西。在他的框架里，身体的回路不是故障——而是当学习栈被过度使用时，龙脉通过仅存的通道发声。
  - id: master_wu_edu_witness_04
    line: Master Wu见过从台南到东京的年轻人，承载着任何国家课程都不命名的气紊乱。在他的传统里，那种紊乱是信息，不是病理——是「读取此群体的制度学习层从未被调到他们身体实际所立的地脉范围」的信号。
  - id: master_wu_edu_witness_05
    line: Master Wu记得那一刻：一个年轻人停止硬撑，转而让房间之下的地脉重新进入接触。在他的传统里，那一刻不是懒惰——是常规学习没有语言去描述的「准备好了」。
turnaround:
  options:
  - id: master_wu_edu_turnaround_01
    stat_line_1: 244 million. UNESCO.
    stat_line_2: UNESCO估计目前有二亿四千四百万儿童失学——一道被测量的获取裂口，命名了「制度层不断推迟结构性回应时」群体被要求承担的负荷。
  - id: master_wu_edu_turnaround_02
    stat_line_1: 100+ countries. Global Campaign for Education.
    stat_line_2: 「全球教育运动」如今覆盖一百多个成员国——一个把「受教育权」框架推入国家政策的协调联盟，规模超过任何单一部委的独自能力。
  - id: master_wu_edu_turnaround_03
    stat_line_1: SDG 4. 2030 deadline.
    stat_line_2: 可持续发展目标SDG 4到2030年将联合国成员国绑定到「包容、公平的优质教育」——一份把群体获取作为治理而非评论命名的多边制度。
  - id: master_wu_edu_turnaround_04
    stat_line_1: 76 million reached. Education Cannot Wait.
    stat_line_2: 「教育不能等待」——联合国全球紧急教育基金——已惠及七千六百多万处于危机背景中的儿童，一个十年前并不存在的融资基础设施，如今在国家系统无法承担处承重。
  - id: master_wu_edu_turnaround_05
    stat_line_1: 22 million participants. 160 countries.
    stat_line_2: 「World's Largest Lesson」如今已在一百六十个国家覆盖二千二百万参与者——围绕可持续发展目标建起的、面向青年的教育基础设施，把课堂连接到制度课程无法越过的边界。
bridge:
  options:
  - id: master_wu_edu_bridge_01
    line: 244 million. UNESCO. 追踪器衡量制度留下的获取裂口。它没有一栏记录「让下一次诚实尝试页面成为可能」的容量——在不把专注失败写成身份的前提下，与课业保持接触的容量。Master Wu的传统对那份容量有语言——龙脉修养工作在学习回应之下的地脉里。
    hidden_capacity: 与课业保持接触而不将飘走写成身份
  - id: master_wu_edu_bridge_02
    line: 数字显示制度层建起的框架。它们没显示制度层所立的龙脉语境——一段文明时期，学习生活之下的地脉变薄的速度超过继承文化的节奏能稳定的范围。Master Wu的传统把那语境视作本然。
    hidden_capacity: 承担学习数据无法显示的地脉语境
  - id: master_wu_edu_bridge_03
    line: 数据捕捉入学、课时与政策采纳。它捕捉不到当一个年轻身体重新与书桌之下的大地之气接触、专注重新找到自身登记时所发生的移动。在Master Wu的框架里，这个移动才是真正的回归——任何追踪器都不汇报的那一部分。
    hidden_capacity: 记录追踪器漏掉的专注回归
  - id: master_wu_edu_bridge_04
    line: 学习基础设施可以测量。注意被实际接地或变薄的地脉无法测量。Master Wu的传统不与测量争论——它在其下的那一层工作，那里龙脉修养与珍珠安置以一种制度层无法抵达的方式运作。
    hidden_capacity: 在测量之下的地脉层工作
  - id: master_wu_edu_bridge_05
    line: 课程、政策与平台都可以被计数。其下被承载在学习场域之下的文明龙脉不可。Master Wu的传统不取代课程工作——它命名制度回应不被设计去抵达的地脉层，并把龙脉接触作为入口。
    hidden_capacity: 命名课程回应不抵达的地脉层
teacher_perspective:
  options:
  - id: master_wu_edu_perspective_01
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的框架里，土地本身含有称为「龙脉」的活气电流——注意不仅是一种认知功能；它在身体里由学习场域之下的地脉承载。所谓青年专注危机，在堪舆登记上，是身体最贴近大地之气的群体先于课程层感受到紊乱。
    - 这一再框架很精确：像「我坏了、错了」这种感受，往往是地脉的准确信号——制度与结构把学习负荷放在了对气紊乱最缺少隔绝的群体身上。处理表面症状并不处理地脉状况。
    - 龙脉修养并不绕过学习。它在学习未被设计去抵达的那一层工作——身体之下的那一层，那里地脉承担实际登记，且在活化点上的珍珠安置可以稳定表面回应所不能稳定之物。
  - id: master_wu_edu_perspective_02
    header: Master Wu所见
    paragraphs:
    - 珍珠安置在Master Wu的传统里不是比喻。它是字面意义的修习——在龙脉活化点上做策略性能量锚定——可稳定上方人群所立的学习地脉。被常规回应当作私人分心处理的青年专注苦楚，在他的框架里，是「尚未被堪舆照看的、未被锚定的那段地脉」的表面表达。
    - 这一修习重要，因为它解释了住在已被照看之活化点附近的人群所描述的「松开」——不是学习负荷被论赢了，而是其下的地脉在表层论证够不到的那一层被稳定下来。头脑不必赢，身体才能回到大地。
    - 这是常规学习改革没被设计去送达的部分。它不否定课程回应——只是命名缺失的那一层，并指出一个在地脉层工作了文明时长的传统。
  - id: master_wu_edu_perspective_03
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的传统里，中国、台湾、日本的龙脉横跨东亚大陆与岛系地理交汇为一个整合的地脉系统。青年学习负荷在北京、台北、东京的制度课程下表现不同，但在地脉登记上是同一个跨区域状况——堪舆回应可以越过政治回应无法越过的边界。
    - 对承载这份负荷的年轻人，被某个比一国课程更大的存在「见证」的体验，在结构上不同于被它「处理」。送达的讯息不是「这是测试分数」——而是「你学习之下的地脉已被勘测，你所感的紊乱是在文明尺度上被登记的，不是只在你一人身上」。
    - 「在地脉层被见证」而非「在制度层被处理」——这一区分，正是常规学习基础设施无法复制的东西，也是Master Wu的传统在三个区域作为本然守护了数代人的东西。
  - id: master_wu_edu_perspective_04
    header: Master Wu所见
    paragraphs:
    - 「文明龙脉再校准」在Master Wu的框架里，是他的传统对我们正处时段的字面描述——继承的文化地理之龙脉被要求承载它们未被调到的学习负荷，而最贴近地脉的群体最先感到这份再校准。年轻人承载的学习过载，部分是「在地脉结构移位的时期被调到大地脉络」的代价。
    - 这不是讨好的再框架。它不承诺学习系统会很快变得人性，也不指责这一群体在不稳定的地脉里感到不稳。它只在堪舆层命名结构性事实，卸下「不稳=私人失败」这一份额外重负。
    - 在勘察实践里，这份卸下往往是最先抵达的部分——在更深的龙脉修养工作在活化点上展开之前。
  - id: master_wu_edu_perspective_05
    header: Master Wu所见
    paragraphs:
    - Master Wu的传统把龙脉读作「文明记忆线」——龙脉不仅承载当下的气流，也承载文化地理所历每一份负荷的累积记录，包括继承的学习要求。在这一登记上，青年专注苦楚所表达的，不只是当下压力，也是早期制度世代未能代谢的「被推迟的负荷」。
    - 这一框架不要求群体独自承担那张账单。它在文明尺度上命名账单、辨认地脉可被重新稳定的活化点，并把珍珠安置与龙脉修养作为传统的回应——在制度回应未被设计去触及的那一层运作。
    - 修习不是「修好群体」。修习是准确读取地脉、在活化点上安置珍珠，让龙脉去做课程层做不到的结构性工作。
practice:
  options:
  - id: master_wu_edu_practice_01
    display_name: 龙脉聆听
    announcement_line: Master Wu教授五分钟「龙脉聆听」修习，用于学习压力把身体的气接地转换为表面无力感的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体不再把表面工作量当作全部登记，而与房间之下的地脉重新接触。
    - 足够的气接地回来，支撑下一次诚实尝试页面，不再把专注失败写成身份。
  - id: master_wu_edu_practice_02
    display_name: 龙脉勘测小停
    announcement_line: Master Wu示范四分钟「龙脉勘测小停」，用于作业与作业之间的瞬间——身体一直在未经允许地承担学习负荷的那种瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 学习负荷在地脉层变得可读，而不再被读作个人学习缺陷。
    - 群体专注紊乱不再被当作个人的资产负债表。
  - id: master_wu_edu_practice_03
    display_name: 地脉接气
    announcement_line: Master Wu教授三分钟「地脉接气」，用于脚已失去与地面的接触、学习场域已把气抽出登记范围的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 脚记起地板之下的地脉，气找到稳定的锚点——即便作业仍在继续。
    - 呼吸回到地脉所持的节奏，而不是截止日期所要求的节奏。
  - id: master_wu_edu_practice_04
    display_name: 珍珠安置观想
    announcement_line: Master Wu教授六分钟「珍珠安置观想」，用于学习负荷被当作个人病理而非地脉状况处理的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 学校之下的活化点进入视野，负荷不再只被身体独自承载。
    - 紊乱被认作一段未被锚定的地脉，而非私人缺陷；珍珠安置开始稳定该场域。
  - id: master_wu_edu_practice_05
    display_name: 堪舆稳定之息
    announcement_line: Master Wu示范三分钟「堪舆稳定之息」，用于急性地脉紊乱——学习场域把气与地脉撞出对齐的那种时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 呼吸成为地脉实际节奏的标记，而不是日程所要求节奏的标记。
    - 身体回到房间之下龙脉所识别的频段。
sdg:
  primary:
    line: 联合国框架在SDG 4中包含包容、公平的优质教育。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_wu_edu_cta_01
    line: 'UNESCO协调全球教育框架，并报告世界范围内的失学儿童情况。入口：其教育项目与青年参与管道。'
  - id: master_wu_edu_cta_02
    line: '「全球教育运动」协调一百多个成员国的联盟，把「受教育权」框架推入国家政策。入口：其成员网络。'
  - id: master_wu_edu_cta_03
    line: '「教育不能等待」——联合国全球紧急教育基金——已惠及七千六百多万处于危机背景中的儿童。入口：支持其在危机中为教育融资。'
  - id: master_wu_edu_cta_04
    line: 'Malala Fund投资于教育倡导者与活动家，在差距最大的区域为女孩构建受教育权基础设施。入口：支持其教育倡导网络。'
  - id: master_wu_edu_cta_05
    line: 'Teach For All是独立教育组织的全球网络，致力于扩大学习的获取与公平。入口：其成员国教师与领导力管道。'
title_system:
  headline_layer_2:
    options:
    - id: master_wu_edu_headline_01
      line: 一位道家堪舆师把青年专注苦楚命名为龙脉紊乱——并给出让注意回到大地的地脉修习。
    - id: master_wu_edu_headline_02
      line: 一位龙脉战术师，不是教育改革者，谈论常规回应未被设计去抵达的那层学习苦楚。
    - id: master_wu_edu_headline_03
      line: 珍珠安置，而不是又一款学习App——Master Wu的传统与最贴近学习地脉的群体相遇。
    - id: master_wu_edu_headline_04
      line: 地脉再校准，不是病理——一个堪舆传统重新框架青年学习负荷。
    - id: master_wu_edu_headline_05
      line: 跨区域龙脉回应——Master Wu的传统带给「任何单一国家课程都无法化解之学习负荷」的东西。
