hook_personal:
  options:
    - id: hook_personal_01
      line: 你仍想学习，也清楚当下体系多快把注意打成碎片、把努力磨成耗竭。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 教育负担不只是作业量，更是学校是否仍能创造注意与学习得以运作的条件。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Master Wu（土地与修养教师）在实修里见过教育压力对年轻人做了什么。学生不只问如何更努力，而问如何在不断训练碎片化的环境里保持稳定。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        你打开作业门户。专注断了。你移开。你又回来，因为活还在。
        LOOP_SEQUENCE: "打开门户。专注断。移开。回来。"
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Master Wu见过这一循环——门户打开、专注断裂、移开，以及因课业仍在而返回。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 410 workshops. 27 cities.
      stat_line_2: 学生与教育者组织工作坊、开展同伴辅导，并争取保护注意而非只索取注意的课堂改革运动。
bridge:
  options:
    - id: bridge_01
      line: 410 workshops. 27 cities. 追踪器衡量年轻人做了什么，却没有一栏记录「又一次拖延或失效回应之后，何以还能迈出下一步」——回到课业而不把碎片化写成身份的容量。回来的人需要它，处于那一循环的读者也需要它。Master Wu的教导有语言守护那种容量。
      hidden_capacity: 回到依真相的行动
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Master Wu所见
      paragraphs:
        - Master Wu从场域开始。注意、调节与努力既由意志也由条件塑造。
        - 当周围场域碎片化、不稳定或严酷时，首要错误是把那种失序翻成对人的评判。
        - 像「我坏了、错了」这种感受，常常是对设计不良或恶化的制度与结构的准确反应。你可以看见产生压力的条件，而不把自己命名为失败。
practice:
  options:
    - id: practice_01
      display_name: 5-minute Return-to-Ground Practice
      announcement_line: Master Wu教授五分钟「Return-to-Ground Practice」，用于教育压力开始把注意变成无力感的时刻。在侧栏，计时且务实。
      relief_lines:
        - 身体不再把每一种要求都当作全面失序。
        - 足够调节回来，支撑下一次诚实行动。
sdg:
  primary:
    title: 优质教育
    line: 联合国通过SDG 4及其优质教育目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: cta_01
      line: "UNESCO全球教育联盟在此提供公共入口。入口: https://www.unesco.org/en/education/globaleducationcoalition"
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 学生失去专注的速度快于体系适应。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 一位教师点出在碎片化条件下，仍为学习可能而战的挣扎。
