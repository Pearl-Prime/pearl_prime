hook_personal:
  options:
    - id: hook_personal_01
      line: 你继续阅读，因为不看像是不诚实。你也清楚重复暴力正在对你的身体与信任做什么。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 冲突压力不再只是地缘问题。它以道德创伤到来，也以对一再未能保护人们的制度的信任崩塌到来。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Master Wu（土地与修养教师）在实修里见过这种压力落在年轻人身上。学生不只问如何更努力，而问如何在不断训练碎片化的环境里保持稳定。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        你读最新报道。胸发紧。你移开目光。你又回来，因为良知还在。
        LOOP_SEQUENCE: "读了报道。胸紧。移开目光。回来。"
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Master Wu见过这一循环——报道、身体发紧、移开目光，以及因良知仍在而返回。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 143 youth coalitions. 28 countries.
      stat_line_2: 年轻和平建设者在记录伤害、组织工作坊、支持流离的同伴，并在制度停滞时仍搭建信任网络。
bridge:
  options:
    - id: bridge_01
      line: 143 youth coalitions. 28 countries. 追踪器衡量年轻人做了什么，却没有一栏记录「又一次拖延或失效回应之后，何以还能迈出下一步」——不向麻木或绝望投降、仍能足够像人而再行动的容量。回来的人需要它，处于那一循环的读者也需要它。Master Wu的教导有语言守护那种容量。
      hidden_capacity: 回到依真相的行动
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Master Wu所见
      paragraphs:
        - Master Wu从场域开始。注意、调节与努力既由意志也由条件塑造。
        - 当周围场域碎片化、不稳定或严酷时，首要错误是把那种失序翻成对人的评判。
        - 像「我坏了、错了」这种感受，常常是对你周围设计不良或恶化条件——以及从未为它所要求之物而设计的制度与结构——的准确反应。
practice:
  options:
    - id: practice_01
      display_name: 5-minute Return-to-Ground Practice
      announcement_line: Master Wu教授五分钟「Return-to-Ground Practice」，用于和平与冲突压力开始把注意变成无力感的时刻。在侧栏，计时且务实。
      relief_lines:
        - 身体不再把每一种要求都当作全面失序。
        - 足够调节回来，支撑下一次诚实行动。
sdg:
  primary:
    title: 和平、正义与强大机构
    line: 联合国通过SDG 16及其和平、正义与制度信任目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: cta_01
      line: "联合国青年事务办公室与青年和平建设网络在此提供公共入口。入口: https://www.un.org/youthenvoy/"
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 年轻人正把冲突当作道德创伤来背负。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 一位教师点出在重复暴力与制度失灵之下，仍为保持人性而战的挣扎。
