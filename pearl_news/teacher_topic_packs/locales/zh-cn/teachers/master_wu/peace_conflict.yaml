hook_personal:
  options:
  - id: master_wu_pc_hook_personal_01
    line: 在分析跟上之前，你就知道胸口会发紧。你一边撑过一天，一边脚下的地脉持续紧绷——你内里清楚，这份紊乱不只在你之内，而在「冲突所被承载其中」的那条龙脉里。
  - id: master_wu_pc_hook_personal_02
    line: 你继续看更新，因为不看似乎更糟。你也知道社论、立场文件与解释一直在对你说话，却没有缓解——你所读的冲突，被承载在一条任何单一神经系统都无法独自吸收的地脉上。
  - id: master_wu_pc_hook_personal_03
    line: 在你说出话之前，下巴先感到那种摩擦——身体的气登记，正撞上一种把一区地脉持续保持在对立姿态的信息流。身体已经在抱着分析还在争论的东西。
  - id: master_wu_pc_hook_personal_04
    line: 凌晨一点，你关掉对话又打开。两种动作都没用，因为紧张正运行在区域之下的龙脉里——而你想用头脑挣脱的那部分，正是被过度要求的那部分，同时大地本身在承载冲突的全部登记。
  - id: master_wu_pc_hook_personal_05
    line: 你已经读过快报、签过请愿、捐过力所能及之物。头脑能做的都做了——而你内里更安静的某处，在请求与「冲突实际栖居其中」的龙脉层接触，而不是又一套表层心智可以执行的论证。
hook_big_picture:
  options:
  - id: master_wu_pc_hook_big_01
    line: 青年冲突苦楚不只是道德反应。它是「最贴近地脉登记的群体」感到政治层不断推迟的龙脉紧绷——最先感到它的是表面上的身体。
  - id: master_wu_pc_hook_big_02
    line: 一代人被要求维持日常机能，而冲突区下的龙脉以「继承的制度框架无法松开」的姿态运行。苦楚不是私人失败——它是没有任何个体神经系统能独自吸收的地脉状况的可感边缘。
  - id: master_wu_pc_hook_big_03
    line: 年轻人对冲突的敏感度升高不是病理；在Master Wu的堪舆框架里，那是最接近地脉的群体先于政策层感到龙脉紊乱。身体在准确登记。
  - id: master_wu_pc_hook_big_04
    line: 集体场域加速得比设计来接地它的气脉更快，冲突区如今承载着外交制度层无法化解的地脉负荷。被读作青年和平焦虑的，部分是龙脉失配的可见边缘。
  - id: master_wu_pc_hook_big_05
    line: 在中国、台湾、日本之间，Master Wu的勘察读到同一龙脉登记在不同表面冲突下显现。青年和平苦楚不是单一冲突的异常——它是跨区域的地脉状况，任何单一国家的外交层都无法独自化解。
teacher_intro:
  options:
  - id: master_wu_pc_intro_01
    line: Master Wu是一位道家堪舆师，与龙脉（地之活气脉）工作。他看见最贴近地脉的群体承载冲突苦楚，不是私人失败，而是「制度层无法松开的龙脉紧绷」的可感边缘。在他的框架里，下一份快报面前发紧的胸口不是失灵；它在登记表面场域被要求承载的冲突的气登记。
  - id: master_wu_pc_intro_02
    line: Master Wu不把自己放在「公共和平倡导者」或「静修导师」的位置。他作为堪舆战术师工作——在中国、台湾、日本之间勘测龙脉，在活化点上做策略性「珍珠安置」，以在政治层无能时稳定地脉。他的传统向被冲突信息流压垮的一代提供的，是与龙脉层的接触。
  - id: master_wu_pc_intro_03
    line: Master Wu以珍珠安置工作——在龙脉的活化点上做策略性能量锚定。在他的传统里，这种安置可稳定上方人群所立的地脉。他见过住在争议地理附近的群体的表面苦楚跟随他在气脉本身中所勘测到的紊乱。
  - id: master_wu_pc_intro_04
    line: Master Wu的工作横跨台南、台湾与日本列岛——东亚大陆与岛系龙脉交汇的跨区域活化点。他见过一区的地脉紧绷如何在整合的龙脉系统里跨区传播，也见过堪舆回应如何越过外交回应无法越过的边界。
  - id: master_wu_pc_intro_05
    line: Master Wu在一个把当下读作「文明龙脉再校准」的传统里教学——这是一段时期，继承的文化地理之龙脉被要求承载「制度回应所推迟的冲突」。在此框架下，青年和平苦楚是「最贴近地脉的群体」最先感受到这份推迟负荷的方式。
youth_somatic:
  options:
  - id: master_wu_pc_somatic_01
    line: 你在深夜读到快报。胸口发紧。你关掉标签页。又打开，因为紧张在龙脉里，而不在标签页里。
  - id: master_wu_pc_somatic_02
    line: 你在闹钟响前醒来。下巴已经绷紧。你比够到灯先够到手机，因为房间之下的地脉已经紧绷，你需要确认表面场域是否与它相符。
  - id: master_wu_pc_somatic_03
    line: 警报响起时，你的肩膀抬起。你回放了伤亡数字三遍。呼吸变短。你还没决定什么，身体已经先登记了地脉负荷。
  - id: master_wu_pc_somatic_04
    line: 标题加载时，你屏住呼吸。胸口锁住。看见数字才呼气，而且只呼一半，因为气已经变薄，下一份快报已在路上。
  - id: master_wu_pc_somatic_05
    line: 你躺下，眼睛却睁着。一周的快报在重播。下巴不肯松。你知道睡眠是入口，却找不到大地之气可以踏进去。
teacher_witness:
  options:
  - id: master_wu_pc_witness_01
    line: Master Wu在最贴近地脉登记的群体身上见过这条回路——读、胸口紧、关掉、又回来。在他的堪舆框架里，那不是品格，而是龙脉通过最不被隔绝的身体在表达冲突的全部登记。
  - id: master_wu_pc_witness_02
    line: Master Wu见过年轻人走进勘察对话时已在回路中段，已笃定「分析本该早已解决此事」。在他的传统里，那种笃定是信号——表层心智停下、地脉登记得以被读到的位置。
  - id: master_wu_pc_witness_03
    line: 他见过身体承载立场文件承载不了的东西。在他的框架里，身体的紧绷不是故障——而是当外交分析被过度使用时，龙脉通过仅存的通道发声。
  - id: master_wu_pc_witness_04
    line: Master Wu见过从台南到东京的年轻人，承载着任何国家和平框架都不直接命名的气紊乱。在他的传统里，那种紊乱是信息，不是病理——是「制度冲突化解层从未被调到他们身体实际所立的地脉范围」的信号。
  - id: master_wu_pc_witness_05
    line: Master Wu记得那一刻：一个年轻人停止「生产立场」，转而让房间之下的地脉重新进入接触。在他的传统里，那一刻不是软弱——是常规和平工作没有语言去描述的「准备好了」。
turnaround:
  options:
  - id: master_wu_pc_turnaround_01
    stat_line_1: 676 million. 50km.
    stat_line_2: 据估计有六亿七千六百万女性与女孩生活在距活跃冲突五十公里以内——一个被测量的距离命名了「最贴近地脉的群体」在未书写其条件的前提下被要求承担的负荷。
  - id: master_wu_pc_turnaround_02
    stat_line_1: UNSCR 2250. Youth Peace and Security.
    stat_line_2: 联合国「青年、和平与安全」议程——以安理会2250号决议为锚——已建起正式多边制度，把青年命名为冲突转型的参与者，而不只是它的受害者。
  - id: master_wu_pc_turnaround_03
    stat_line_1: 47 countries. National Action Plans.
    stat_line_2: 四十七个国家已通过「青年、和平与安全」国家行动计划——可测量的制度脚手架，把政府绑定到「在和平建设中把群体的角色落地」，而不是只在修辞上描述。
  - id: master_wu_pc_turnaround_04
    stat_line_1: 5,000 peacebuilders. Search for Common Ground.
    stat_line_2: 「共同立场」组织在活跃冲突区建起一个超过五千名受训和平建设者的网络——上一群体未曾拥有的和平建设基础设施，如今承载着越过制度无法越过的边界的重量。
  - id: master_wu_pc_turnaround_05
    stat_line_1: 100+ organizations. Generation Peace Network.
    stat_line_2: 「Generation Peace Network」如今连接冲突区域内超过一百个青年和平建设组织——一个在任何单一国家政策框架都无法独自勘测的尺度上运作的协调群体基础设施。
bridge:
  options:
  - id: master_wu_pc_bridge_01
    line: 47 countries. National Action Plans. 追踪器衡量制度搭起的脚手架。它没有一栏记录「让下一次诚实伸手成为可能」的容量——在不把紊乱写成身份的前提下，与冲突真相保持接触的容量。Master Wu的传统对那份容量有语言——龙脉修养工作在表面回应之下的地脉里。
    hidden_capacity: 与冲突保持接触而不将其写成身份
  - id: master_wu_pc_bridge_02
    line: 数字显示制度层建起的框架。它们没显示制度层所立的龙脉语境——一段文明时期，冲突区之下的地脉被保持在「继承文化的外交节奏无法松开」的姿态。Master Wu的传统把那语境视作本然。
    hidden_capacity: 承担外交数据无法显示的地脉语境
  - id: master_wu_pc_bridge_03
    line: 数据捕捉决议、计划与受训和平建设者。它捕捉不到当一个年轻身体重新与房间之下的大地之气接触时所发生的移动——即便表面冲突仍在继续。在Master Wu的框架里，这个移动才是真正的根——任何追踪器都不汇报的那一部分。
    hidden_capacity: 记录追踪器漏掉的地脉复位
  - id: master_wu_pc_bridge_04
    line: 和平基础设施可以测量。冲突紧张实际栖居其中的地脉无法测量。Master Wu的传统不与测量争论——它在其下的那一层工作，那里龙脉修养与珍珠安置以一种制度层无法抵达的方式运作。
    hidden_capacity: 在测量之下的地脉层工作
  - id: master_wu_pc_bridge_05
    line: 决议、计划与平台都可以被计数。其下的、被保持在冲突姿态中的文明龙脉不可。Master Wu的传统不取代外交工作——它命名制度回应不被设计去抵达的地脉层，并把龙脉接触作为入口。
    hidden_capacity: 命名外交回应不抵达的地脉层
teacher_perspective:
  options:
  - id: master_wu_pc_perspective_01
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的框架里，土地本身含有称为「龙脉」的活气电流——冲突首先并非在政策中被登记，而是在「被保持在对立姿态」的地脉中被登记。所谓青年和平苦楚，在堪舆登记上，是身体最贴近大地之气的群体先于制度层感受到紊乱。
    - 这一再框架很精确：像「我坏了、错了」这种感受，往往是地脉的准确信号——制度与结构把冲突的全部负荷放在了对气紊乱最缺少隔绝的群体身上。处理表面症状并不处理地脉状况。
    - 龙脉修养并不绕过外交工作。它在外交工作未被设计去抵达的那一层工作——身体之下的那一层，那里地脉承担实际登记，且在活化点上的珍珠安置可以稳定表面回应所不能稳定之物。
  - id: master_wu_pc_perspective_02
    header: Master Wu所见
    paragraphs:
    - 珍珠安置在Master Wu的传统里不是比喻。它是字面意义的修习——在龙脉活化点上做策略性能量锚定——可稳定上方人群所立的地脉，包括跨争议地理的人群。被制度回应当作私人情感处理的青年和平苦楚，在他的框架里，是「被保持在冲突姿态的、未被锚定的那段地脉」的表面表达。
    - 这一修习重要，因为它解释了住在已被堪舆照看之活化点附近的人群所描述的「松开」——不是冲突被论赢了，而是其下的地脉在表层论证够不到的那一层被稳定下来。头脑不必赢，身体才能回到大地。
    - 这是常规和平工作没被设计去送达的部分。它不否定外交回应——只是命名缺失的那一层，并指出一个在地脉层工作了文明时长的传统。
  - id: master_wu_pc_perspective_03
    header: Master Wu所见
    paragraphs:
    - 在Master Wu的传统里，中国、台湾、日本的龙脉横跨东亚大陆与岛系地理交汇为一个整合的地脉系统。在北京、台北、东京外交层下表现不同的冲突，在地脉登记上是同一个跨区域状况——堪舆回应可以越过政治回应无法越过的边界。
    - 对承载这份负荷的年轻人，被某个比一国框架更大的存在「见证」的体验，在结构上不同于被它「处理」。送达的讯息不是「这是解决方案」——而是「区域之下的地脉已被勘测，你所感的冲突是在文明尺度上被登记的，不是只在你一人身上」。
    - 「在地脉层被见证」而非「在制度层被处理」——这一区分，正是常规和平基础设施无法复制的东西，也是Master Wu的传统在三个区域作为本然守护了数代人的东西。
  - id: master_wu_pc_perspective_04
    header: Master Wu所见
    paragraphs:
    - 「文明龙脉再校准」在Master Wu的框架里，是他的传统对我们正处时段的字面描述——继承的文化地理之龙脉被要求承载「制度回应所推迟的冲突」，而最贴近地脉的群体最先感到这份再校准。年轻人承载的和平苦楚，部分是「在地脉结构移位的时期被调到大地脉络」的代价。
    - 这不是讨好的再框架。它不承诺冲突会很快化解，也不指责这一群体在不稳定的地脉里感到不稳。它只在堪舆层命名结构性事实，卸下「不稳=私人失败」这一份额外重负。
    - 在勘察实践里，这份卸下往往是最先抵达的部分——在更深的龙脉修养工作在活化点上展开之前。
  - id: master_wu_pc_perspective_05
    header: Master Wu所见
    paragraphs:
    - Master Wu的传统把龙脉读作「文明记忆线」——龙脉不仅承载当下的气流，也承载文化地理所历每一份冲突的累积记录。在这一登记上，青年和平苦楚所表达的，不只是当下战争新闻，也是早期制度世代未能解决的「被推迟的冲突」。最贴近地脉的身体最先感到那张未付的账单。
    - 这一框架不要求群体独自承担那张账单。它在文明尺度上命名账单、辨认地脉可被跨区域重新稳定的活化点，并把珍珠安置与龙脉修养作为传统的回应——在制度回应未被设计去触及的那一层运作。
    - 修习不是「修好群体」。修习是准确读取地脉、在活化点上安置珍珠，让龙脉去做制度层做不到的结构性稳定。
practice:
  options:
  - id: master_wu_pc_practice_01
    display_name: 龙脉聆听
    announcement_line: Master Wu教授五分钟「龙脉聆听」修习，用于冲突信息流把身体的气接地转换为表面无力感的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体不再把表面快报当作全部登记，而与房间之下的地脉重新接触。
    - 足够的气接地回来，支撑下一次诚实行动，不再把冲突负荷写成私人身份。
  - id: master_wu_pc_practice_02
    display_name: 龙脉勘测小停
    announcement_line: Master Wu示范四分钟「龙脉勘测小停」，用于快报与快报之间的瞬间——身体一直在未经允许地承担冲突地脉负荷的那种瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 冲突在地脉层变得可读，而不再被读作个人道德失败。
    - 群体苦楚不再被当作个人的资产负债表。
  - id: master_wu_pc_practice_03
    display_name: 地脉接气
    announcement_line: Master Wu教授三分钟「地脉接气」，用于脚已失去与地面的接触、冲突信息流已把气抽出登记范围的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 脚记起地板之下的地脉，气找到稳定的锚点——即便表面冲突仍在继续。
    - 呼吸回到地脉所持的节奏，而不是快报所要求的节奏。
  - id: master_wu_pc_practice_04
    display_name: 珍珠安置观想
    announcement_line: Master Wu教授六分钟「珍珠安置观想」，用于冲突被当作个人道德病理而非地脉状况处理的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 争议区域之下的活化点进入视野，负荷不再只被身体独自承载。
    - 紊乱被认作一段未被锚定的地脉，而非私人缺陷；珍珠安置开始稳定该场域。
  - id: master_wu_pc_practice_05
    display_name: 堪舆稳定之息
    announcement_line: Master Wu示范三分钟「堪舆稳定之息」，用于急性地脉紊乱——冲突信息流把气与地脉撞出对齐的那种时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 呼吸成为地脉实际节奏的标记，而不是冲突信息流所要求节奏的标记。
    - 身体回到房间之下龙脉所识别的频段。
sdg:
  primary:
    line: 联合国框架在SDG 16中包含和平、正义与强大的机构。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_wu_pc_cta_01
    line: '美国联合国协会(UNA-USA)围绕联合国和平与安全优先事项动员公民行动。入口：通过本地分会或校园项目加入其网络。'
  - id: master_wu_pc_cta_02
    line: '「共同立场」(Search for Common Ground)培训活跃冲突区的和平建设者——一个超过五千名实践者的网络如今跨越制度回应无法越过的边界。入口：其和平建设者项目。'
  - id: master_wu_pc_cta_03
    line: '「Generations For Peace」通过课程与田野实践，在冲突区域内构建青年和平建设能力。入口：其青年领导力管道。'
  - id: master_wu_pc_cta_04
    line: '「Peace Direct」支持冲突影响社区中的本地和平建设者，并把他们的工作放到国际政策谈判桌上放大。入口：其本地和平建设者网络。'
  - id: master_wu_pc_cta_05
    line: '「UNOY Peacebuilders」协调冲突区域内超过一百个青年和平组织的网络。入口：其青年和平建设者联盟。'
title_system:
  headline_layer_2:
    options:
    - id: master_wu_pc_headline_01
      line: 一位道家堪舆师把青年和平苦楚命名为龙脉紊乱——并给出让身体回到大地的地脉修习。
    - id: master_wu_pc_headline_02
      line: 一位龙脉战术师，不是公共和平倡导者，谈论制度回应未被设计去抵达的那层冲突。
    - id: master_wu_pc_headline_03
      line: 珍珠安置，而不是又一份立场文件——Master Wu的传统与最贴近冲突地脉的群体相遇。
    - id: master_wu_pc_headline_04
      line: 地脉再校准，不是病理——一个堪舆传统重新框架青年冲突负荷。
    - id: master_wu_pc_headline_05
      line: 跨区域龙脉回应——Master Wu的传统带给「任何单一国家外交都无法化解之冲突」的东西。
