hook_personal:
  options:
  - id: master_sha_mh_hook_personal_01
    line: 在任何人命名之前你就知道螺旋；你仍撑着过一天，却越来越不确定心智能否继续这个节奏——仿佛流动被什么堵住。
  - id: master_sha_mh_hook_personal_02
    line: 你不断读更新，因为不看更糟。你也清楚螺旋对身体在做什么——加速、放下、再拿起。
hook_big_picture:
  options:
  - id: master_sha_mh_hook_big_01
    line: 青年心理过载不只关于症状，也关于持续压力如何影响注意、休息与保持功能的能力——以及螺旋运转时，什么能清理淤塞。
  - id: master_sha_mh_hook_big_02
    line: 机构把过载正常化，直到年轻人开始把它当私人缺陷。传统另有名称：可用慈悲承接并清理的淤塞。
teacher_intro:
  options:
  - id: master_sha_mh_intro_01
    line: Dr. and Master Zhi Gang Sha数十年教授Tao Source与Soulfulness，在实修里见过年轻人把心理过载同时当作真实痛苦与其传统精确命名之物：淤塞。他们不问自己是否坏了，而问如何让螺旋不再像对自身的判决。在Tao Source框架里，淤塞可以清理——不靠蛮力，而靠魂引导的注意与对自己最大的慈悲。
youth_somatic:
  options:
  - id: master_sha_mh_somatic_01
    line: '你在午夜后读更新。心智加速。你放下手机。又拿起，因为螺旋已在运转。

      LOOP_SEQUENCE: "读更新。心智加速。放下手机。又拿起。"'
teacher_witness:
  options:
  - id: master_sha_mh_witness_01
    line: Master Sha在学生身上见过这条回路——警告到来、心智加速、手机放下、同一压力又把注意拉回。在他的框架里那不是品格，而是可用金光与慈悲承接的淤塞。
turnaround:
  options:
  - id: master_sha_mh_turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 青年组织者在主办同伴圈、组织运动，并迫使学校把心理支持当基础设施，而非私人软弱。
bridge:
  options:
  - id: master_sha_mh_bridge_01
    line: 320 campuses. 18 countries. 追踪器衡量年轻人搭建的工作坊与同伴圈，却没有一栏记录又一周过载之后下一次真诚伸手何以可能——清理把每次思维涌动都变成身份的淤塞的容量。开启下一个圈的学生需要它，放下手机又拿起的人也需要。Master Sha的传统数代以来以金光与最大慈悲冲洗淤塞。
    hidden_capacity: 清理淤塞，使明晰不被螺旋吞没
teacher_perspective:
  options:
  - id: master_sha_mh_perspective_01
    header: Master Sha所见
    paragraphs:
    - 情绪、能量与关系上的淤塞阻碍福祉的自然流动。年轻人主要的淤塞往往不是性格缺陷，而是恐惧、拒绝与从未被足够慈悲承接的未处理丧失的累积。
    - Tao Source教导：这些淤塞不靠蛮力，而靠首先朝向自身的最大爱、最大宽恕、最大慈悲的实践来清理。Soulfulness（魂引导的冥想）教导：心智不是唯一的智性；魂知道心智仍在争辩什么。
    - 再框定很务实：像「我有问题——坏了、乱了」的感受，常是从未被恰当对待的体制所产生的淤塞。不必再证明自己错了，而可以看见产生压力的结构。传统不保证螺旋永不回头；它提供螺旋回来时恢复流动的练习。
practice:
  options:
  - id: master_sha_mh_practice_01
    display_name: 道源金光练习
    announcement_line: Master Sha教授5分钟道源金光练习，用于螺旋已转、明晰像被堵住的时刻。来自道源的金光冲洗蛮力移不动之物。在侧栏，计时并逐步说明。
    relief_lines:
    - 把每个念头都变成身份的淤塞软化。
    - 足够流动回归，支撑下一次真诚伸手。
sdg:
  primary:
    line: 联合国框架在SDG 3中包含心理健康与福祉；获得支持与保持功能的能力同属该目标。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_sha_mh_cta_01
    line: '若你或他人需要支持，Crisis Text Line提供免费24/7接入。入口：发短信HOME至741741。若下一步是本地到全球的网络连接，UNA-USA在同一框架下工作。'
title_system:
  headline_layer_2:
    options:
    - id: master_sha_mh_headline_01
      line: 一位道源教师把心理过载命名为淤塞——以及恢复流动的练习。
