hook_personal:
  options:
  - id: master_sha_edu_hook_personal_01
    line: 你仍想学习，却也清楚系统在开工前就浪费了你多少注意力——散乱又多像对你的判决。
  - id: master_sha_edu_hook_personal_02
    line: 你打开门户。专注断了。你切换标签页又回来。作业仍得完成，而意图与下一段诚实专注之间，像有什么堵住了流动。
hook_big_picture:
  options:
  - id: master_sha_edu_hook_big_01
    line: 教育压力不只关于课业量，也关于打断密集的系统如何影响注意、自信与持续接触学习的能力——以及散乱堵住它时，如何恢复与源的连接。
  - id: master_sha_edu_hook_big_02
    line: 当系统把注意当作无限资源，学生与所学之间的流动就会产生淤塞。传统有清理它的练习。
teacher_intro:
  options:
  - id: master_sha_edu_intro_01
    line: Dr. and Master Zhi Gang Sha数十年教授Tao Source与Soulfulness，在实修里见过年轻人在抵达功课前就已耗尽——只为待在任务旁。他们不问学校是否重要，而问如何停止把散乱当作私人失败。在Tao Source框架里，那散乱常常是淤塞；把魂请回房间，可以清理。
youth_somatic:
  options:
  - id: master_sha_edu_somatic_01
    line: '你打开作业门户。专注断了。你切换标签页。又回来，因为作业仍得做完。

      LOOP_SEQUENCE: "打开门户。专注断了。切换标签页。回来。"'
teacher_witness:
  options:
  - id: master_sha_edu_witness_01
    line: Master Sha在学生身上见过这串顺序——任务打开、注意碎裂、标签切换，然后在同一紧绷系统里重启努力。在他的框架里那不是不足的证明，而是以金光与回归源头来回应的淤塞。
turnaround:
  options:
  - id: master_sha_edu_turnaround_01
    stat_line_1: Campuses and districts worldwide.
    stat_line_2: 学生与青年在组织运动，并主办心理健康支持、同伴倾听与不把注意当无限资源的学习条件。
bridge:
  options:
  - id: master_sha_edu_bridge_01
    line: 追踪器衡量政策与同伴项目，却没有一栏记录又一天散乱之后，下一小时真正专注何以可能——连接智慧之源而非下一个标签页的容量。撑住任务的学生需要它，打开门户、切换标签又回来的人也需要。Master Sha的传统认为，真正的学习始于那连接；爱、宽恕、慈悲不是附加，而是明晰流出的地基。
    hidden_capacity: 连接智慧之源，使散乱不变成身份
teacher_perspective:
  options:
  - id: master_sha_edu_perspective_01
    header: Master Sha所见
    paragraphs:
    - Tao Source教导：真正的学习始于学生连接智慧之源，而非只堆积其产物。只传递信息却不培育学生与信息之源的关系的教育系统，会造就“有知识却缺智慧”的人——差别显现在知识未预料的条件下的反应。
    - 爱、宽恕、慈悲不是事后补上的价值，而是没有它们一切学习都会淤塞的基础能力。系统把注意当无限资源，就会在学生与所学之间制造淤塞。
    - 再框定很务实：像“我有问题——坏了、错了、没法专注”的感受，常是学习者从未被给予足够慈悲对待的结果。先清淤塞；然后心才能在从未为当下要求而设计的体制结构中回到任务。
practice:
  options:
  - id: master_sha_edu_practice_01
    display_name: 道源金光练习
    announcement_line: Master Sha教授5分钟道源金光练习，用于门户与标签页打散注意、作业仍得完成时。金光冲洗淤塞；魂重连于源。在侧栏，计时并逐步说明。
    relief_lines:
    - 把每次打断都变成身份的淤塞软化。
    - 足够明晰回归，支撑下一段诚实专注。
sdg:
  primary:
    line: 联合国SDG 4框架将福祉与包容学习条件纳入优质教育的一部分。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_sha_edu_cta_01
    line: 'Active Minds及类似青年网络推动校园心理健康与学习条件。入口: activeminds.org'
title_system:
  headline_layer_2:
    options:
    - id: master_sha_edu_headline_01
      line: 一位道源教师把教育压力读作淤塞——并点出恢复与学习连接的练习。
