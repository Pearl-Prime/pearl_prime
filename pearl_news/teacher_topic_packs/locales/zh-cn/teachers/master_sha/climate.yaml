hook_personal:
  options:
  - id: master_sha_climate_hook_personal_01
    line: 你在乎地球，却仍觉得难以在下一个数字前停留足够久去行动——仿佛知与行之间有东西阻断了流动。
  - id: master_sha_climate_hook_personal_02
    line: 你不断读气候更新，因为移开目光像是不诚实。你也清楚每个新数字对身体在做什么——收紧、关闭、再回来。
hook_big_picture:
  options:
  - id: master_sha_climate_hook_big_01
    line: 一代人可以信息充分、道德严肃，却在每次更新都像机构等待过久的证据时失去行动能力；传统对阻断流动之物有名称。
  - id: master_sha_climate_hook_big_02
    line: 压力不再只是生态，也是注意力与能量：年轻人如何在接触现实的同时，不让恐惧变成麻痹下一步的淤塞？
teacher_intro:
  options:
  - id: master_sha_climate_intro_01
    line: Dr. and Master Zhi Gang Sha（大道源头与Soulfulness教师）数十年教学，在实修里见过年轻人把气候新闻同时当作道德严肃与阻断行动之流的东西。他们不问地球是否危急，而问如何在恐惧变成麻痹下一步的淤塞时，仍与真相保持接触。
youth_somatic:
  options:
  - id: master_sha_climate_somatic_01
    line: '你在群聊里读到更新。胸收紧。你关掉应用。又打开，因为数字仍为真。

      LOOP_SEQUENCE: "读更新。胸收紧。关应用。又打开。"'
teacher_witness:
  options:
  - id: master_sha_climate_witness_01
    line: Master Sha在学生身上见过这条回路——读、收紧、关闭、返回。在他的框架里那不是故障，而是系统准确登记了年轻人所知与仍能所为之间的流动淤塞。
turnaround:
  options:
  - id: master_sha_climate_turnaround_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 学生与青年联盟在培训同伴、开展运动，并迫使官员回应公共目标与 lived reality 之间的落差。
bridge:
  options:
  - id: master_sha_climate_bridge_01
    line: '2,666 cases. 51 jurisdictions. 追踪器衡量年轻人做了什么，却没有一栏记录上次拖延之后下一次立案何以可能——向具体居住地倾注爱与慈悲、使淤塞不吞没行动意志的能力。提起下一案的组织者需要它，读更新、关应用又打开的人也需要。Master Sha的传统对此有名称：最大的爱、最大的宽恕、最大的慈悲，先对自己，再对地球。'
    hidden_capacity: 倾注爱与慈悲，使淤塞不吞没行动意志
teacher_perspective:
  options:
  - id: master_sha_climate_perspective_01
    header: Master Sha所见
    paragraphs:
    - 道源教导：万有通过单一源头相连；人类对地球之所为，作为能量现实也作用于自身，而非仅隐喻。气候破坏是人类与地球之间流动的淤塞。
    - 一切淤塞唯有先被看清，并以转化实践而非重复制造它的模式来承接，才能处理。最大的爱、最大的宽恕、最大的慈悲——施于地球本身——不是感伤，而是实践框架。
    - 被气候破坏规模麻痹的年轻人，可从向所居之处的土、水、近旁空气倾注爱与慈悲开始。像「我有问题」的感受，常是对任何个人都无法独自修复的体制条件的准确回应。传统认为这实践改变的不只是践行者，还有场域本身。
practice:
  options:
  - id: master_sha_climate_practice_01
    display_name: 道源金光练习
    announcement_line: Master Sha教授5分钟道源金光练习，用于气候信息变成淤塞的时刻。从道源引入金光洗过身体；向地球倾注爱与慈悲。在侧栏，计时并逐步说明。
    relief_lines:
    - 麻痹下一步的淤塞软化。
    - 足够流动回归，能从与源的清晰连接再次行动。
sdg:
  primary:
    line: 联合国通过SDG 13及其气候教育与韧性目标，为这一落差提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_sha_climate_cta_01
    line: 'The Climate Reality Project与YOUNGO均提供青年入口。入口: https://youngoclimate.org'
  - id: master_sha_climate_cta_02
    line: 若下一步不是它们，UNA-USA在同一框架下连接本地与全球。入口：加入其网络。
title_system:
  headline_layer_2:
    options:
    - id: master_sha_climate_headline_01
      line: 一位道源教师把气候瘫痪读作淤塞——并点出清理它的练习。
