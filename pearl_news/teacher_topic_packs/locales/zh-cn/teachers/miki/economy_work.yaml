hook_personal:
  options:
    - id: hook_personal_01
      line: 你的努力是真实的，对它的承认却不是。应用在你已经按周安排好生活之后，又改了班次。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 经济不稳定不只是钱的问题，而是当雇佣你的体系拒绝承接你所付出的一切时，年轻人的尊严与稳定感会发生什么。
teacher_intro:
  options:
    - id: identity_observation_shift_01
      line: Miki是光语与音声疗愈教师，在实修场合见过零工不稳定对年轻人意味着什么。他们不只问更高工资，而问如何在身体不塌进「努力无关紧要」的信念之前承接不稳定的真相。
    - id: identity_observation_shift_02
      line: 来自光语与水晶钵疗愈传统的Miki，在实修中见过年轻人的班次如何在周中从应用里消失。这不只是后勤混乱，而是关系断裂——劳动者的努力从未被当作重要之事来承接。这道裂口先以胃部的下沉与自我监视栖于身体，远早于它以政策抱怨抵达心智。
youth_somatic:
  options:
    - id: schedule_rupture_01
      line: "你在应用里查班次。胃一沉。你飞快截图，因为下次查看前它可能会变。然后你等待下一条通知，因为稳定如今要靠你抓住。\n\nLOOP_SEQUENCE: \"查应用。胃下沉。快速截图。等待下一次变动。\""
    - id: schedule_rupture_02
      line: "你在工作群看到班次安排。胸口发紧。你立刻保存副本，因为班次会无声消失。然后你继续查，因为本该托住你的工作并不会托住你。\n\nLOOP_SEQUENCE: \"看到班次。胸口发紧。立刻保存。继续查看。\""
teacher_witness:
  options:
    - id: mirrored_loop_01
      line: Miki在年轻工人身上见过这一循环——应用打开，胃收紧，截图发生，等待开始。
    - id: mirrored_loop_02
      line: 她在零工者的身体里也见过这一序列——查看、下沉、保存、警戒。身体学会承载平台不愿承载之物。
turnaround:
  options:
    - id: youth_action_economy_01
      stat_line_1: "850+ campaigns. 47 cities."
      stat_line_2: 年轻工人在跨平台组织运动，推动日程稳定、工资透明，并恢复算法驱动的不稳定所夺走的尊严。
    - id: youth_action_economy_02
      stat_line_1: "850+ campaigns. 47 cities."
      stat_line_2: 零工者仍在立案、举办同事理事会并确定罢工日期，即便平台不断改写雇佣条款。
bridge:
  options:
    - id: tracker_capacity_01
      line: 劳工权利运动的追踪器统计赢得的要求与被迫上桌的平台，却没有一栏记录「又一次取消之后，下一次班次截图何以可能」——在体系持续撕裂尊严时仍与自身尊严保持接触的能力。组织同事的年轻工人需要它；查了应用、胃一沉、次日仍在的人也需要它。Miki所承传统数代以来通过音声与临在培育这种能力：身体能记住体系抹去之物。
    - id: tracker_capacity_02
      line: 经济正义追踪器统计诉求与政策胜利，却不统计让年轻工人在已被平台从日程中抹去之后仍能停留在自身价值里的内在容量。下一次同事对话需要它；截了图等待下一次变动的人也需要它。Miki所承传统认为这种容量并非缺失，而是被不稳定的关系断裂所覆盖；音声与光语有助于让它显现。
teacher_perspective:
  options:
    - id: relational_rupture_01
      header: Miki所见
      paragraphs:
        - 在Miki的传统里，经济不稳定首先不是工资问题，而是关系断裂。当年轻人付出努力而体系不能以一致与承认来承接时，劳动者与雇主之间的网就撕裂。身体先登记这种断裂——胃沉、胸紧、截图与等待的习惯——心智随后才带来政策语言。
        - 在正当关系中生活、维护各方之间网络的原则，不要求施舍或感恩，而要求基本互惠：若要工作，就要托住工人。对零工者而言，网被算法切断：班次消失，算法不给理由，身体学到努力不会产生相应的义务。
        - 重要的转折是：像「我坏了、错了、不稳定」这种感受，常常是对一个设计上就不托住你的体系的准确反应。身体并非失灵，而是在登记关系破裂。当年轻工人把胃沉读作平台拒绝互惠的清晰信号而非个人缺陷时，自责会软化。问题不在工人，而在制度之网被撕裂，而身体知道这一点。
    - id: relational_rupture_02
      header: Miki所见
      paragraphs:
        - Miki以祓（净化损伤关系网络的行为）来读经济不稳定；此处是劳动者与雇主之间的网。零工不稳定不只是日程混乱，而是系统性地打破使工作有尊严的互惠网络。
        - 年轻人继承的劳动经济里，努力不产生承认或稳定。平台许诺灵活，却只交付波动：你围绕其安排的周被撕碎，算法不给解释，损失要你独自背负。这是日常生活规模的关系断裂。
        - 在这一框架下，自责会软化。失序不在工人的规划或坚持能力，也不在「我感到动摇就是错了」。失序在体系与机构拒绝承接工人所付出之物。疗愈作为记起，意味着你所寻求的尊严与稳定感并未被毁，只是被不稳定覆盖；音声与临在有助于身体记起：即便平台拒绝承认，你的努力仍创造价值。
practice:
  options:
    - id: sound_receiving_01
      announcement_line: Miki教授五分钟「音声与光之承接」，用于班次应用再次掉落、身体夹在疲惫与警戒之间的时刻。在侧栏，计时并逐步说明。
      relief_lines:
        - 身体不再独自背负不稳定。
        - 足够尊严回来，支撑下一次班次与下一次同事对话。
    - id: sound_receiving_02
      announcement_line: Miki教授五分钟实作，用于日程波动变成自我监视、你查看应用的次数超过所愿的时刻。音声抵达语言所不能、抵达身体学会不信任之处。在侧栏，班次间隙或下次查看前都够用。
      relief_lines:
        - 身体不再向自己隐瞒不稳定。
        - 更稳的自我价值感回来，随之是与他人一起组织的能力。
sdg:
  primary:
    line: 联合国通过SDG 8及其体面工作、公平工资与劳工权利目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: coworker_organizing_01
      line: "Gig Workers Collective与工人中心类组织提供由同伴带领的同事对话与平台运动培训。入口: https://gigworkerscollective.org"
    - id: economic_justice_01
      line: 若你想要经济正义与劳工力量的起点，Young Invincibles与Z世代一起处理工资、不稳定与劳动法变革。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
      - id: precarity_01
        line: 班次又没了。你截了图。
  headline_layer_2:
    options:
      - id: miki_attention_01
        line: 一位光语与音声疗愈者在政策语言赶上之前，点出零工不稳定先对身体做了什么。
      - id: miki_relational_01
        line: 一种疗愈传统把经济不稳定读作关系断裂，并提供在体系不托住你时仍托住尊严的实践。
