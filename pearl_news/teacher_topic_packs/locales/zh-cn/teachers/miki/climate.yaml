hook_personal:
  options:
    - id: hook_personal_01
      line: 你关心地球。你也会在决定怎么做之前，就感到每一个新阈值对身体做了什么。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 一代人可以既保持知情，又失去在不关闭的情况下承接下一个数字的能力。问题在于新闻不断到来时，身体还能承载多少。
teacher_intro:
  options:
    - id: identity_observation_shift_01
      line: Miki是光语与音声疗愈教师，在实修场合见过气候新闻对年轻人意味着什么。他们不问危机是否真实，而问如何在身体尚未关闭之前承接真相。
    - id: identity_observation_shift_02
      line: 来自光语与水晶钵疗愈传统的Miki，在静修中见过气候资讯如何先以道德严肃抵达，再以身体过载显现。学生不求励志，而问在所当敬重的自然秩序仍按日程崩解时，如何保持足够开放以行动。
youth_somatic:
  options:
    - id: climate_threshold_phone_01
      line: "你在群聊里读到更新。胸口发紧。你关掉应用。你又打开，因为不看并不会让数字变得不真实。\n\nLOOP_SEQUENCE: \"读更新。胸口发紧。关应用。又打开。\""
    - id: climate_threshold_phone_02
      line: "你在课前看到新的阈值。喉咙发紧。你把手机扣在桌上。你又拿起来，因为未来不会等你准备好。\n\nLOOP_SEQUENCE: \"看到阈值。喉咙发紧。扣下手机。又拿起。\""
teacher_witness:
  options:
    - id: mirrored_loop_01
      line: Miki今年在年轻人身上见过这一整段循环——读、发紧、关掉、再回来。
    - id: mirrored_loop_02
      line: 她见过这一序列反复出现——数字到来，身体收缩，手机放下，心思又回去，因为现实仍在。
turnaround:
  options:
    - id: youth_action_climate_01
      stat_line_1: "2,666 cases. 51 jurisdictions."
      stat_line_2: 学生与青年联盟在培训同伴、开展运动，并推动官员回应公共目标与现实生活之间的落差。
    - id: youth_action_climate_02
      stat_line_1: "2,666 cases. 51 jurisdictions."
      stat_line_2: 年轻组织者仍在立案、办工作坊并记录地方损失，即便国家政府的动作仍慢于升温。
bridge:
  options:
    - id: tracker_capacity_01
      line: "2,666 cases. 51 jurisdictions. 追踪器衡量年轻人做了什么，却没有一栏记录「又一次拖延之后，下一次提交何以可能」——在体系持续不回应时，仍能足够开放并再次行动所需的内在容量。提起下一案的组织者需要它；读了更新、关掉应用又打开的人也需要它。Miki所承传统通过音声与临在，数代以来一直在培育这种容量。"
    - id: tracker_capacity_02
      line: 气候追踪器统计案件、目标与阈值，却不统计让年轻人能在又一次制度拖延之后仍与真相保持接触、再次行动的内在容量。下一任组织者需要它，重新打开应用的读者也需要它。Miki所承传统在心智过载时，与身体仍能接收什么一起工作。
teacher_perspective:
  options:
    - id: relational_rupture_01
      header: Miki所见
      paragraphs:
        - 在Miki的传统里，环境破坏不只是技术问题，而是人、土地与所谓灵性之间的关系的断裂。身体往往在心智找到语言之前就登记这种断裂。气候痛苦之所以耗竭，往往不是因为过于敏感，而是因为你准确感知维系生命的网络出现了裂口。
        - 随神之道——依自然秩序而活——并不要求英雄式牺牲，而要求日常留心：你买什么、丢什么、如何在城市中移动。对Z世代而言，在回收规范与公共意识已具现实感的条件下，这已是生活重压；传统赋予其灵性重量。
        - 重要的转折是：像「我坏了、错了」这种私人缺陷感，常常是对持续制造集体断裂的制度与结构安排的准确反应。当真正的失序被看见在外部时，身体便不再把自己叫作坏的。
    - id: relational_rupture_02
      header: Miki所见
      paragraphs:
        - Miki以祓（harae）——净化损伤人、土地与神明之间网络的行为——来读气候过载。传统不把环境破坏只当作技术修补，而当作需要关系性修复的断裂。
        - 继承衰退乡村的年轻人，要以比任何一代更少的资源去维护人类生活与野境之间的边界——里山。这不是隐喻，而是身体正在回应的现实。
        - 在这一框架下，自责会软化。过错不在我——不是破碎的自我，不是错的反应。问题在于机构与政策体系持续撕裂网络，而身体知道这一点。疗愈作为记起，意味着回应的能力本在，只是被过载覆盖；音声与临在有助于让它显现。
practice:
  options:
    - id: sound_receiving_01
      announcement_line: Miki教授五分钟「音声与光之承接」，用于气候信息不断把注意变成关闭的时刻。在侧栏，计时并逐步说明。
      relief_lines:
        - 身体不再把每一次更新都当作行动无用的证明。
        - 足够开放回来，支撑下一次真实回应。
    - id: sound_receiving_02
      announcement_line: Miki教授五分钟实作，用于气候数字变成身体过载的时刻。音声抵达语言所不能。在侧栏，课前、刷完屏或下一场会前都够用。
      relief_lines:
        - 身体不再把每一次更新都变成全面崩溃。
        - 更稳的内在节奏回来，随之是再次行动的能力。
sdg:
  primary:
    line: 联合国通过SDG 13及其气候教育与韧性目标，为这一落差提供了框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: youngo_01
      line: "The Climate Reality Project与YOUNGO都面向青年提供入口。入口: https://youngoclimate.org"
    - id: una_usa_01
      line: 若下一步不是那边，UNA-USA在地方到全球层面有项目。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
      - id: threshold_warning_01
        line: 1.55℃不再只是预警。
  headline_layer_2:
    options:
      - id: miki_attention_01
        line: 一位光语与音声疗愈者点出气候压力正对Z世代的承接与回应能力做什么。
      - id: miki_relational_01
        line: 一种疗愈传统把气候痛苦读作关系断裂，并提供一种实践，让人在仍能行动时保持足够开放。
