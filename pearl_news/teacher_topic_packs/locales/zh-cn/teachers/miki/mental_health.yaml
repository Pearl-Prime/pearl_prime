hook_personal:
  options:
    - id: hook_personal_01
      line: 最难的不只是感觉糟糕，而是在仍要求你表现稳定的体系里感觉糟糕。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 青年心理健康承压也是一种秩序问题：支持体系不断命名关怀，却未能创造让日常生活真正可被保护的条件。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Miki是光语与音声疗愈教师，在实修场合见过年轻人如何把过载当作个人缺陷来背负。他们不只问如何好受些，而问当治疗师、算法与自助内容已对心智说尽话却仍无缓解时，身体还能接收什么。
    - id: teacher_intro_02
      line: 来自光语与水晶钵疗愈传统的Miki，在实修中见过痛苦抱在身体而智力耗尽时会发生什么。学生不求更多建议，而求另一种接触方式——绕过过载的心智，直接触及痛苦实际所在之处。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: "你读到最新警告。喉咙发紧。你合上手机。然后又查看，因为压力仍在，假装不然也无济于事。\n\nLOOP_SEQUENCE: \"读警告。喉咙发紧。合手机。又查看。\""
    - id: youth_somatic_02
      line: "你在群聊里看到标题。肩膀锁住。你关掉应用。你又打开，因为移开目光并没有带走担忧。\n\nLOOP_SEQUENCE: \"看到标题。肩膀锁住。关应用。又打开。\""
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Miki见过这一整段循环——警告抵达，喉咙合上，手机暗下，注意又因未解真相仍在而回来。
    - id: teacher_witness_02
      line: 她在年轻人身上见过这一序列——读、发紧、合上、回来。身体抱着心智尚无法处理之物。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: "320 campuses. 18 countries."
      stat_line_2: 青年组织者在举办同伴圆圈、组织倾听者培训，并推动学校将心理健康支持当作基础设施而非私人软弱。
bridge:
  options:
    - id: bridge_01
      line: "320 campuses. 18 countries. 追踪器测量圆圈、运动与同伴支持，却没有一栏记录「又一周过载之后，下一次诚实何以可能」——在重复公开谎言「你早该好了」的同时，仍在身体里接收真实的能力。Miki所承传统通过音声与临在，与这种能力一起工作：身体先于心智接收。"
    - id: bridge_02
      line: 心理健康追踪器统计项目与等待时间，却不统计在体系未能托住时，年轻人仍与自身经验保持接触的内在容量。下一次诚实对话需要它；合上手机又打开的人也需要它。Miki所承传统认为疗愈是记起——原有容量本在，只是被覆盖；音声与光有助于让它显现。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Miki所见
      paragraphs:
        - 在Miki的传统里，光语与传承不经概念意义而经振动共振运作，抵达语言所不能及之处。对被治疗师、算法与自助内容说尽话却仍无缓解的年轻人，传统提供另一种接触：绕过耗竭的智力，直接向承载痛苦的能量身体说话。
        - 疗愈作为记起，意味着原初自我并未消失，只是被覆盖。压力与过载不是缺陷的证明，而是在无人承接时身体不得不背负之物累积而成。传统不让心智去「想通」，而以音声与临在让身体足够柔软，记起已知之事。
        - 这一转折是缓解的开端：压力不再证明你有问题，而开始成为证据——体系一直要求你表现稳定，却不给你真正恢复的条件。
    - id: teacher_perspective_02
      header: Miki所见
      paragraphs:
        - Miki以传承的透镜读青年心理健康过载：身体在心智解读之前先接收。当心被建议、诊断与数字噪音饱和时，传统不增加内容，而提供另一通道——音声、振动、临在——身体无需理解即可使用。
        - 传统区分什么可由信息修复、什么只能被承接。「正念失败」或治疗失败的年轻人往往并未失败；他们是在没有能让身体真正放下戒备的关系容器时只拿到了工具。音声与光语创造这种容器。
        - 在这一框架下，自责会软化。问题不是你坏了，而是体系与制度结构把个人神经系统无法独自承载的量持续外包给身体。实践不是更努力，而是让身体接收此前未能接收之物。
practice:
  options:
    - id: practice_01
      announcement_line: Miki教授五分钟「音声与光之承接」，用于过载与自我沉默开始合流的时刻。在侧栏，具体可用。
      relief_lines:
        - 身体不再独自背负全部重量。
        - 足够开放回来，支撑下一步诚实行动。
sdg:
  primary:
    line: 联合国通过SDG 3及其健康与福祉目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: cta_01
      line: "Active Minds与Born This Way Foundation都面向青年提供入口。入口: https://www.activeminds.org"
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 青年心理健康危机，也是身体能承接什么之危机。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 一位光语与音声疗愈者拒绝把过载说成私人缺陷的谎言。
      - id: headline_layer_2_02
        line: 一种疗愈传统点出当身体抱着语言所不能及之物时会发生什么。
