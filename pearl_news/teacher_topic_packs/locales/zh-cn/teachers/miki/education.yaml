hook_personal:
  options:
    - id: hook_personal_01
      line: 问题不只是作业，还有作业抵达其中的场域——你的整个自我是否被允许在场。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 教育压力往往在动机之前就是环境性的：一天被中断、压力与空间不足所组织，难以让注意或你的其余部分沉淀下来。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Miki是光语与音声疗愈教师，在实修场合见过学习条件在很大程度上制造的注意力流失如何被归咎为学生。他们不只问如何更专注，而问当体系只针对智力、身体被留在门外时，学习如何仍可能发生。
    - id: teacher_intro_02
      line: 来自光语与传承传统的Miki，在实修中见过年轻人明知教育只测量他们所知的一小部分时会发生什么。他们不求更容易的考试，而求在门户与标签让心智耗尽时，身体仍能接收的传授方式。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: "你打开作业门户。专注散了。你切换标签页。然后你回来，因为任务还在等。\n\nLOOP_SEQUENCE: \"打开门户。专注散。切换标签。回来。\""
    - id: youth_somatic_02
      line: "你加载讲座。呼吸变浅。你查看群聊。然后你回到屏幕前，因为截止日期没有动。\n\nLOOP_SEQUENCE: \"加载讲座。呼吸变浅。查看聊天。回来。\""
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Miki在学生身上见过这一循环——任务打开，心思散开，标签切换，注意在同一压力场里重新拼凑。
    - id: teacher_witness_02
      line: 她见过这一序列——门户、散开、切换、回来。身体从未被邀入房间；体系假定学习只在头脑里。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 数百所校园。数十个国家。
      stat_line_2: 学生与青年联盟在组织运动，营造尊重整个人而不只是智性的学习环境，并建立同伴主导的空间，让传承在临在层面发生，而不只在屏幕前。
bridge:
  options:
    - id: bridge_01
      line: 教育追踪器统计学历与完成率，却不统计身体被纳入时承接学习的能力——场域碎裂时整合注意的能力。下一代需要它。Miki所承传统认为最深的传承不只是信息，而是整个人被邀入房间时身体所接收的。音声与临在创造这种邀请。
    - id: bridge_02
      line: 体系测量智力能复现什么，却没有一栏记录「下一次真正理解何以可能」——让身体落地、让心智整合的能力。终于理解概念的学生需要它；打开门户、切换标签又回来的人也需要它。Miki所承传统通过面向整个人的实践，数代以来一直在培育这种能力。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Miki所见
      paragraphs:
        - 在Miki的传统里，最深的传承不只是信息，而是整个人在房间里时身体所接收的。通过门户与屏幕递送内容却不邀请身体的教育体系，往往培养出技术上能干却无法整合注意、难以承受碎裂的学生。传统问：若身体被纳入，学习会是什么样子？
        - 光语与音声不经概念而经共振运作，抵达语言与屏幕所不能。对注意被校日结构与数字场撕散的年轻人，传统提供配重：在下一次要求到来前让身体接收并整合的实践。
        - 这一转折很重要：问题不是学生缺乏纪律，而是体系把传承削成信息传输，把包括接收与整合能力在内的其余自我留在门外。像「我坏了、错了」这种私人缺陷感，常常是对个人无法独自修复的条件的准确反应。Miki的传统为这种能力命名并给予实践。
    - id: teacher_perspective_02
      header: Miki所见
      paragraphs:
        - Miki以传承的透镜读教育压力：身体在心智充分处理之前先接收。当学习环境只为智力而建——门户、标签、截止日期——身体被留在碎裂中。传统认为真正的学习需要整个人；否则体系测量的只是人类可知的最小切片。
        - 疗愈作为记起在此也适用：集中、整合、在场的力量并未被毁，只是从未被邀请。音声与临在创造让这种力量回来的条件。传统不要求学生更努力，而要求条件改变以使身体落地。
        - 在这一框架下，自责会软化。失序不只在学生，受苦也不是你的错。失序在传授方式与人类实际接收方式之间的缝隙。Miki的传统提供针对这一缝隙的实践，而它所处的体系与制度结构从未为它所要求之物而设计。
practice:
  options:
    - id: sound_receiving_01
      announcement_line: Miki教授五分钟「音声与光之承接」，用于门户与标签打散注意、身体未被邀请落地的时刻。在侧栏，计时并逐步说明。
      relief_lines:
        - 身体不再独自背负碎裂。
        - 足够稳定回来，支撑下一段真正的专注。
    - id: sound_receiving_02
      announcement_line: Miki教授五分钟实作，用于学习环境碎裂了你的知、心智被门户与表现耗尽的时刻。音声抵达语言所不能。在侧栏，课间、刷完屏或下一项任务前都够用。
      relief_lines:
        - 身体不再向自己隐瞒碎裂。
        - 更稳的内在节奏回来，随之是认出你已知道之事的能力。
sdg:
  primary:
    line: 联合国通过SDG 4及其优质教育与终身学习目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: cta_01
      line: 许多校园的学生心理健康与学习正义团体提供同伴空间与倡导。入口：加入校园网络、工作坊或地方青年组织的入口。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 教育压力往往在动机之前就是环境性的。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 一位光语与音声疗愈者问：当身体被邀入房间，学习会是什么样子？
      - id: headline_layer_2_02
        line: 一种疗愈传统点出传承只是信息、身体被留在外边时失去之物。
