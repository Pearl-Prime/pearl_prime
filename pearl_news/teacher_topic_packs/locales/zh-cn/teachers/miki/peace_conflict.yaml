hook_personal:
  options:
    - id: hook_personal_01
      line: 你读新闻，感觉维系我们所有人的网撕裂了。可第二天早上在学校，你仍得装作没事。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 冲突新闻对继承了一个碎裂世界的一代人有其独特作用。不只是信息，而是身体认出人与土地、人与集体安全之间的关系网被撕裂，且仍按日程继续撕裂。
teacher_intro:
  options:
    - id: identity_observation_shift_01
      line: Miki是光语与音声疗愈教师，在实修场合见过冲突新闻对年轻人意味着什么。他们不问暴力是否真实，而问如何在身体不因集体安全的丧失而关闭之前，承接关于破碎之地的真相。
    - id: identity_observation_shift_02
      line: 来自光语与水晶钵疗愈传统的Miki，在实修中见过年轻人读到又一城市遭轰炸、又一聚落流离、又一界线断裂时会发生什么。它先以胸腔冻结抵达，再以「共同安全之网仍在」这一假设的丧失抵达。这道裂口在身体里表现为麻木与无尽刷屏，远早于心智找到「集体断裂」一词。
youth_somatic:
  options:
    - id: conflict_freeze_01
      line: "你在信息流里读到冲突更新。胸口冻住。你继续滚动却无法落地，希望有什么能恢复「我们彼此相连」的感觉。然后麻木来了，你在无法直视却无法移开、无法在场却仍在那里之间，继续滚动。\n\nLOOP_SEQUENCE: \"读更新。胸口冻住。无落地滚动。麻木。循环回来。\""
    - id: conflict_freeze_02
      line: "你看到关于流离的标题。喉咙发紧。你往深处滚，又滑过去，再回来，夹在需要知道与需要逃开之间。然后你不再有任何感觉。\n\nLOOP_SEQUENCE: \"见标题。喉咙发紧。深滚又滑过。停止感受。\""
teacher_witness:
  options:
    - id: mirrored_loop_01
      line: Miki在年轻人身上见过这一整段循环——读、冻结、无尽滚动、麻木。
    - id: mirrored_loop_02
      line: 她见过背负全球新闻的年轻人的身体里的这一序列——身体冻结，滚动加深，感觉消失，断裂仍为真故循环再起。
turnaround:
  options:
    - id: youth_action_peace_01
      stat_line_1: "1,200+ active campaigns. 156 countries."
      stat_line_2: 青年在组织并举办和平建设、跨冲突对话与停火问责的工作坊，拒绝冲突新闻制造的孤立。
    - id: youth_action_peace_02
      stat_line_1: "1,200+ active campaigns. 156 countries."
      stat_line_2: 青年组织者在冲突线两侧建立信任，要求政府对军费负责，并重建新闻宣称已无法修复的集体安全之网。
bridge:
  options:
    - id: tracker_capacity_01
      line: 和平建设追踪器统计停火谈判与对话倡议，却没有一栏记录「又一次轰炸之后，下一天的参与何以可能」——在新闻不断撕裂时仍与集体归属保持接触的能力。组织跨冲突对话的年轻人需要它；读了更新、胸口冻结、仍在滚动寻找网的人也需要它。Miki所承传统通过音声与临在，数代以来一直在培育这种能力：即便连接断裂，身体仍能记起连接。
    - id: tracker_capacity_02
      line: 冲突与和平数据库统计伤亡、停火与谈判，却不统计在新闻宣告丧失之后，年轻人仍保持自身整全与对集体安全之信的内面容量。下一次建桥对话需要它；读了冲突更新、感到世界裂开又回来寻找连接的人也需要它。Miki所承传统认为这种容量并非缺失，而是被战争与暴力的关系断裂所覆盖；音声与光语有助于让「你仍属于更大整体」的可信度显现。
teacher_perspective:
  options:
    - id: relational_rupture_01
      header: Miki所见
      paragraphs:
        - 在Miki的传统里，冲突与暴力被理解为可能最深的关系断裂——连接所有人、所有地方与所有未来的网破裂。年轻人读到战争、轰炸、流离时，身体不是当作抽象信息登记，而是当作集体归属之布的撕裂。胸口的冻结、麻木式滚动、回到新闻寻找网仍存在的证明——这些不是软弱，而是对关系创伤的准确阅读。
        - 在正当关系中生活的原则问：通过网与远方他人相连时，我们负有何种责任？对继承碎裂世界的年轻人，读冲突新闻意味着每日触及此问。身体往往先于语言回答：我们相连，我们有责，断裂之痛正因网是真实的。
        - 重要的转折是：像「我坏了、在无助绝望中错了」这种感受，常常是对集体场域中真实断裂的准确反应。身体并非失灵，而是在登记「安全与归属为众人共享」这一前提的破裂。当年轻人把麻木读作对集体连贯丧失的合理反应而非个人缺陷时，自责会软化。问题不在年轻人，而在网在制度与结构层面被撕裂，而身体知道这一点。
    - id: relational_rupture_02
      header: Miki所见
      paragraphs:
        - Miki以祓（净化损伤人类归属与集体安全之网的行为）来读冲突新闻对青年的影响。战争与暴力不只是政治或战略事件，而是系统性地打破告诉我们仍被一起托住的关系场。
        - 继承持续冲突世界的年轻人，要以比任何一代更少的资源去承载集体归属。每一次更新都在提醒：网脆弱、断裂随时可能、安全前提并非全球共享。这不是隐喻，而是身体冻结、麻木、无落地滚动时所回应的现实。
        - 在这一框架下，自责会软化。失序不在年轻人的希望或关怀能力，也不在「我感到粉碎就是错了」。失序在一个断裂真实且仍在发生的世界。疗愈作为记起，意味着认出并停留在归属之网中的能力从未被毁，只是被仍在发生的破裂所覆盖；音声与临在有助于让身体记起：连贯与连接并未死去，它们在断裂之下，等待在从未为这种要求而设计的体系与制度结构中被认出与重建。
practice:
  options:
    - id: sound_receiving_01
      announcement_line: Miki教授五分钟「音声与光之承接」，用于冲突新闻冻住胸口、身体失去集体安全之线的时刻。在侧栏，计时并逐步说明。
      relief_lines:
        - 身体不再把每一次破裂都当作连接不可能的证明。
        - 足够整全回来，支撑下一次对话与织网的一步。
    - id: sound_receiving_02
      announcement_line: Miki教授五分钟实作，用于新闻周期把麻木变成循环、你滚得更深却无法落地的时刻。音声抵达你已断开与「我们同在网中」之信的部分。在侧栏，读后、组织前或新闻抽走脚下之地时都够用。
      relief_lines:
        - 身体不再把断裂孤立为证明自己关怀失败的证据。
        - 更稳的归属与可信感回来，随之是与他人行动与组织的能力。
sdg:
  primary:
    line: 联合国通过SDG 16及其和平建设、冲突预防与包容正义目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: peace_org_01
      line: "Peace Beyond Borders与Search for Common Ground面向青年提供跨冲突对话与和平建设入口。入口: https://www.sfcg.org"
    - id: ceasefire_01
      line: 若你在寻找停火倡导与非军事化工作的入口，Youth for Ceasefire Coalition连接跨越冲突线的Z世代组织者。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
      - id: breaking_web_01
        line: 新闻说网破了。你的身体信了。
  headline_layer_2:
    options:
      - id: miki_attention_01
        line: 一位光语与音声疗愈者点出冲突新闻正对年轻人的集体安全感做什么。
      - id: miki_relational_01
        line: 一种疗愈传统把冲突读作最深的关系断裂，并提供在网破裂时仍保持整全的实践。
