hook_personal:
  options:
  - id: master_feung_econ_hook_personal_01
    line: 每一次班次变动都要求你把不确定当作成熟。你一直在扛，也清楚背后要费多少隐形力气——你内里清楚，你承担的不稳定从来不是你写下的。
  - id: master_feung_econ_hook_personal_02
    line: 你在说得出口之前，胃先一沉。头脑能做的都做了——读了讨论、做了筛查、试过拼命栈。你内里更安静的某处，在请求被见证，而不是被优化。
  - id: master_feung_econ_hook_personal_03
    line: 凌晨一点，你刷新应用，看消息。两种动作都没用，因为班次不论怎样都会再动——而你想去控制它的那部分，正是已被过度要求一整天的那部分。
  - id: master_feung_econ_hook_personal_04
    line: 你打开排班表，下颌发紧。你也明白，没有完美出勤、没有无瑕表现、没有加班能撤销不是你造成的不稳定——而你内里需要空间去做你本来就是的那一笔，而不是你被要求表演的那个工人。
  - id: master_feung_econ_hook_personal_05
    line: 在分析跟上之前，身体先知道波动的真相。你已经读了足够多生产力内容。剩下的是更安静的问题——如何在此身、在大画里的此处，做你自己，而不在不是你写下的排班下消失。
hook_big_picture:
  options:
  - id: master_feung_econ_hook_big_01
    line: 经济压力如今落在不稳定条件下的自我管理：保持可雇佣、保持弹性、保持冷静，并表现得像体系在公平回报努力。错位不在年轻劳动者，而在那个不断把结构性不稳定转化为个人神经系统负荷的结构里。
  - id: master_feung_econ_hook_big_02
    line: 工作不稳定不是努力的故障，而是对「劳动市场承诺与实际交付」之间落差的准确登记——而这一落差由打开应用的那个身体承担。
  - id: master_feung_econ_hook_big_03
    line: 人类是一幅大画——当下被要求承载不稳定负荷的那一部分，恰是最无力书写其条件的那一部分。结构性不公并不抽象；它是每一个截屏排班的年轻劳动者的可感边缘。
  - id: master_feung_econ_hook_big_04
    line: 旧体系读作「懒一代」的信号，在冯老师的框架里，是身体在登记：它曾被预备好的工作，已不再是它被提供的工作。这一登记不是懒——是临在。
  - id: master_feung_econ_hook_big_05
    line: 工作的集体场域比承载它的制度变得更快。被读作青年经济危机的，部分是结构性裂口的可见边缘——任何个体的一笔都无法独自合拢。
teacher_intro:
  options:
  - id: master_feung_econ_intro_01
    line: 冯老师，一位华人智慧传统的教师，在他西安的文化中心里见过年轻人承担工作不稳——不是私人失败，而是大画的可感边缘：一幅广袤的艺术作品，其中每个人都是独特而必要的一笔。在他的教导里，排班更新时下沉的身体不是失灵，而是大画在认得它自身的负荷。
  - id: master_feung_econ_intro_02
    line: 冯老师不把自己放在学生之上的权威位置——他教导：做你自己即是修行，而不是达成一个理想。几十年来，他在西安文化中心里与那些工作负荷比神经系统能安顿更快到来的年轻人一起工作。他的传统提供的不是又一套拼命栈，而是一份回归——回到每个人在那幅大画里早已占据的位置。
  - id: master_feung_econ_intro_03
    line: 冯老师以书法为身体修行。一笔下去，不能撤回——这就是教导。他见过年轻劳动者带着「我应当做得更多」的笃定走进画室，带着「我的不稳是个人失败的证明」的笃定走进画室，并见过当笔与纸相会、临在成为修行时，那种笃定如何松开。
  - id: master_feung_econ_intro_04
    line: 冯老师在西安的五层文化中心里教学——道、佛、儒三传统在那里交织为一种不宗派的修行。他朝拜华山，那道家圣山，不是比喻——是他教导的实存基础。他从那基础出发，与年轻劳动者相遇，不是给答案，而是认出：你已经是大画所需的那一笔。
  - id: master_feung_econ_intro_05
    line: 冯老师在一个把人类读作大画的传统里教学——每个人都是独特、必要的一笔，恰在其当处。他见过这一再框架在承担排班不稳的年轻劳动者身上落地，至少卸下了「这份负荷证明我被放错了位置」这一份额外重负。
youth_somatic:
  options:
  - id: master_feung_econ_somatic_01
    line: 你查看排班应用。胃一沉。你再刷新。然后截图，免得班次在你之下被改掉。
  - id: master_feung_econ_somatic_02
    line: 你打开排班表。下颌发紧。你刷新。然后截图，因为现实一直在动，你需要把自己所处位置的一张稳定图像钉住。
  - id: master_feung_econ_somatic_03
    line: 午餐前你刷过三条招聘信息。肩膀抬起，呼吸变短。你没吃完三明治，因为身体已经把找工作排在了用餐之上。
  - id: master_feung_econ_somatic_04
    line: 主管的消息加载时，你不知不觉屏住呼吸。胃锁住。看到话才呼气，而且只呼一半，因为总有下一条消息。
  - id: master_feung_econ_somatic_05
    line: 你躺下，眼睛却睁着。明天的班次在重播。下巴不肯松。你知道睡眠会有用，却找不到进入它的门。
teacher_witness:
  options:
  - id: master_feung_econ_witness_01
    line: 冯老师在他西安中心的学生与年轻劳动者身上见过这一工作回路本身——查看、下沉、刷新、试图把片刻事实钉住的截图。在他的教导里，那条回路不是品格，而是大画通过当下被要求承担它的那一笔在登记负荷。
  - id: master_feung_econ_witness_02
    line: 冯老师见过年轻劳动者走进书法画室时已在回路中段，已笃定「努力本该早就把这件事稳定下来」。在他的传统里，那种笃定是信号——那是奋力停下、临在得以回返的位置。
  - id: master_feung_econ_witness_03
    line: 他见过身体承载生产力内容承载不了之物。在他的框架里，身体的回路不是失灵——是大画通过优化被过度使用之后仍醒着的唯一一笔，在发声。
  - id: master_feung_econ_witness_04
    line: 冯老师见过年轻劳动者带着任何劳动报告都不准确命名的羞耻前来。在他的传统里，那种羞耻是信息，不是病理——是「被要求承担不稳定的群体，从来不是写下产生这些条件的群体」的信号。
  - id: master_feung_econ_witness_05
    line: 冯老师见过那一刻：一个年轻劳动者不再尝试制造完美的工人自我，转而让笔与纸相会。在他的传统里，那一刻不是软弱——是常规雇佣没有语言去描述的「做你自己」的回归。
turnaround:
  options:
  - id: master_feung_econ_turnaround_01
    stat_line_1: 73 million. ILO 2024.
    stat_line_2: ILO 2024年青年失业报告统计全球七千三百万无业青年——这是任何个人未曾书写、任何国家政策也尚未完全应对的群体负荷的可测量底线。
  - id: master_feung_econ_turnaround_02
    stat_line_1: 13.6%. Youth rate 2024.
    stat_line_2: ILO 2024青年失业率为百分之十三点六——大约是成人率的三倍，也是每一个年轻劳动者被要求当作个人失误吸收的结构性事实。
  - id: master_feung_econ_turnaround_03
    stat_line_1: 11 states + DC. Fight for $15.
    stat_line_2: 「Fight for $15」运动已推动美国十一个州外加哥伦比亚特区提高最低工资——青年主导的劳工组织转化为覆盖近四分之一国家的可测量政策成果。
  - id: master_feung_econ_turnaround_04
    stat_line_1: 1,200 co-ops. USFWC.
    stat_line_2: 美国工人合作社联盟如今协调一千二百多家工人持有的合作社——这一替代所有权基础设施十年前不存在于这一规模，如今提供了一道走出纯粹不稳的可测量之门。
  - id: master_feung_econ_turnaround_05
    stat_line_1: 7 cities + Oregon. Fair Workweek.
    stat_line_2: 「公平工作周」法案已在美国七座城市与俄勒冈全州通过——首批将排班不稳本身命名为需要政策回应的劳动伤害、而非个人灵活性问题的立法浪潮。
bridge:
  options:
  - id: master_feung_econ_bridge_01
    line: 73 million. ILO 2024. 追踪器衡量年轻人承担的失业。它没有一栏记录「在又一周不稳定之后，下一次轮班、下一次申请、下一次对话何以可能」——在不把整个自我交给排班的前提下，仍能稳到足以再次行动的容量。冯老师的传统对奋力落下后仍存之物有名字——在大画里做你自己，即使大画正在你周围被重新排列。
    hidden_capacity: 不把自我交给排班而仍能稳到足以行动
  - id: master_feung_econ_bridge_02
    line: 数字显示年轻人建的政策胜利。它们没显示这些胜利所在的大画语境——一段「最少书写权的群体被要求承担最重要负荷」的时期。冯老师的传统把这语境视作本然，而非比喻。
    hidden_capacity: 承担数据无法显示的更大语境
  - id: master_feung_econ_bridge_03
    line: 数据捕捉案件、合作社与工资增益。它捕捉不到这个移动：一个年轻人不再尝试做完美的工人，记起自己已经是大画所需的那一笔。在冯老师的框架里，这份记起才是真正的根——任何追踪器都不报告的那一部分。
    hidden_capacity: 记起大画早已需要的那一笔
  - id: master_feung_econ_bridge_04
    line: 基础设施可以测量。一笔下去不能撤回——人们不再强求工人表演时所带来的临在——不可测量。冯老师的传统不与测量争论；它在测量之下的那一层工作，那里书法是被修习的，做你自己是每日的教导。
    hidden_capacity: 在测量之下的笔触层工作
  - id: master_feung_econ_bridge_05
    line: 合作社、公平工作周法案与最低工资增益都可以被计数。其下的结构性不公——一代人进入前代不必生存的工作条件——不可计数。冯老师的传统不取代结构性工作；它命名制度回应不被设计去抵达的那一层，并把华山所立之临在作为入口。
    hidden_capacity: 命名追踪器无法计数的结构性不公
teacher_perspective:
  options:
  - id: master_feung_econ_perspective_01
    header: 冯老师所见
    paragraphs:
    - 在冯老师的框架里，人类是一幅大画——一幅广袤的艺术作品，每个人都是独特而必要的一笔，恰在其当处。承载排班负荷的年轻劳动者并未被放错；他们正是大画把他们放在那里的那一笔。当那种安放被误读为个人失败，而不是被认作大画对结构性负荷的准确登记时，苦就会长。
    - 书法在冯老师的教导里不是用来展示的艺术，而是身体修行：在其中身、息、临在合一。一笔下去，不能撤回——这就是教导。一直想把它做得完美的年轻劳动者，正在对抗真正的修行。临在即修行。笔与纸相会一次，那一次相会已足够。
    - 这一再框架很精确：像「我坏了、错了」这种感受，往往是大画的准确信号——制度与结构把这份负荷放在了最无力书写其条件的那一笔上。修行不是修理自我。修行是在此身、此处，做你自己，让笔与纸相会，即使排班正被重新排列。
  - id: master_feung_econ_perspective_02
    header: 冯老师所见
    paragraphs:
    - 书法在冯老师的教导里不是比喻。它是字面意义的修行——笔、墨、纸、息、身——其中临在的不可重复性被感知。不稳被当作拼命问题处理的年轻劳动者，未曾被给到这一传统已守护几个世纪的层次——一笔诚实即足够的那一层。
    - 这修行重要，因为它解释了许多年轻劳动者在纸前用时之后所述的「松开」——不是不稳被论赢了，而是不稳在论证够不到的那一层松开了。笔不必完美，息就能软下来。
    - 这是常规雇佣没被设计去送达的部分。它不否定案件、合作社或政策工作——只是命名缺失的那一层，并指出一个在那一层工作了几代人的传统。
  - id: master_feung_econ_perspective_03
    header: 冯老师所见
    paragraphs:
    - 在冯老师的传统里，华山不是目的地——是关系。这道家圣山近西安，已是几个世纪的朝拜之所，冯老师本人在那里的时间，是他所教之物的实存基础。山不刻意求稳。它本就是。从山学的身体，停止刻意求稳，让稳定自行抵达。
    - 对承担排班负荷的年轻劳动者，被某个比经理更大的存在「见证」的体验，在结构上不同于被他们「处理」。送达的讯息不是「这是指标」——而是「你已经是大画所需的那一笔，你承担的不稳定从来不是你一人写下的」。
    - 「被见证」而非「被处理」——这一区分，正是常规雇佣无法复制的东西，也是冯老师的传统作为本然在西安中心守护了几十年的东西。
  - id: master_feung_econ_perspective_04
    header: 冯老师所见
    paragraphs:
    - 在冯老师的框架里，做你自己即是教导——不是自我提升，不是达成理想，不是变成更好的工人。觉得自己「应该更高产、更灵活、更怎样」的年轻人，正在对抗真正的修行。大画把他们放在他们所在的位置；他们感到的负荷，是大画的负荷，不是他们独自的负荷。
    - 这不是讨好的再框架。它不承诺劳动市场会很快稳定，也不指责这一群体在不稳定市场里感到不稳。它只是命名安放，并卸下「不稳=被放错位置」这一份额外重负。
    - 在书法修习里，那份卸下往往是最先抵达的部分——在更深的「做你自己」回归开始之前。
  - id: master_feung_econ_perspective_05
    header: 冯老师所见
    paragraphs:
    - 在冯老师的传统里，西安是道、佛、儒三股流汇合之地——不汇成一种混合教条，而是汇成一种不宗派的真实临在修行。觉得自己需要一个系统、一种方法、一个完美工作路径的年轻劳动者，尚未被告知：汇合的诸流不产生方法，它们产生回归。
    - 此处的修养不是生产力话术，而是世界不停在动时让身体带路——一息、一笔、一次重心移动——使下一手从临在抵达，而不是从惊慌抵达。山不刻意。笔不强求。让身体向这学习。
    - 在这一框架下，自责会软化。问题不是年轻人懒，也不是你感到不稳定就错了。问题是劳动市场交付不稳定的速度超过神经系统能吸收的速度，大画如今正在通过最无力承担它的那一笔登记这份交付。在此处做你自己，即是修行。其余是体系的账，不是你的。
practice:
  options:
  - id: master_feung_econ_practice_01
    display_name: 笔的临在
    announcement_line: 冯老师教授五分钟「笔的临在」修行，用于工作不稳开始覆盖明晰的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 笔与纸相会一次，心不再用排班为整个自我命名。
    - 更稳的临在回来，连同从你本来就是的那一笔再次行动的容量。
  - id: master_feung_econ_practice_02
    display_name: 华山朝拜记忆
    announcement_line: 冯老师示范四分钟「华山朝拜记忆」修行，用于排班冲击把身体撞出其自身范围的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体记起那座山——山不刻意求稳。
    - 呼吸找到自己的节奏，不再追赶排班所要求的节奏。
  - id: master_feung_econ_practice_03
    display_name: 大画见证
    announcement_line: 冯老师教授六分钟「大画见证」修行，用于劳动不稳被读作个人失败的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 大画进入视野——你所是的那一笔不再被读作整个负荷。
    - 身体记起，它在此处是被安放的，不是被惩罚的。
  - id: master_feung_econ_practice_04
    display_name: 书法的小停
    announcement_line: 冯老师示范三分钟「书法的小停」，用于班次与班次之间的瞬间——身体一直在未经允许地承重的那种瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 一笔不可撤回成为「临在而非表演」的标记。
    - 群体负荷不再被当作个人的资产负债表。
  - id: master_feung_econ_practice_05
    display_name: 做你自己的回想
    announcement_line: 冯老师教授三分钟「做你自己的回想」，用于「想更高产、想更灵活、想更怎样」的冲动取代真正修行的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 想变成更好工人的压力软化，你早已所是的那一笔回到视野。
    - 大画重回焦点，排班不再被当作个人的审计。
sdg:
  primary:
    line: 联合国框架在SDG 8及其充分而富有成效就业目标中命名体面工作。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_feung_econ_cta_01
    line: 美国工人合作社联盟在全美协调一千二百多家工人持有的合作社。入口——在附近找到或创建一家合作社。
  - id: master_feung_econ_cta_02
    line: 「Fight for $15」是工人主导的运动，争取生活工资与工会权利，已在美国十一州推动最低工资政策。入口——加入本地运动。
  - id: master_feung_econ_cta_03
    line: 国际劳工组织（ILO）青年就业项目开展全球青年劳动危机的研究、政策与合作工作。入口——其青年网络与资源。
  - id: master_feung_econ_cta_04
    line: Center for Popular Democracy是在五十多座城市组织公平工作周、公平工资与经济尊严的全国网络。入口——其成员组织。
  - id: master_feung_econ_cta_05
    line: 国家就业法律项目（NELP）提供关于最低工资、欠薪与工人权利的法律研究与倡导。入口——其权利告知资源与政策网络。
