hook_personal:
  options:
  - id: master_feung_edu_hook_personal_01
    line: 你仍想学习，也清楚在任务真正开始之前，体系已经浪费了你多少注意——你内里清楚，这份碎裂从来不是你写下的。
  - id: master_feung_edu_hook_personal_02
    line: 你在说得出口之前，眼神先飘开。头脑能做的都做了——读了生产力贴、试了专注App、做了筛查。你内里更安静的某处，在请求被见证，而不是被优化。
  - id: master_feung_edu_hook_personal_03
    line: 凌晨一点，你打开阅读又切到群聊。两种动作都没用，因为截止不会动，群聊也不会停——而你想同时抓住两者的那部分，正是已被过度要求一整天的那部分。
  - id: master_feung_edu_hook_personal_04
    line: 你打开门户，额头发紧。你也明白，没有完美的专注、没有无瑕的时间表、没有额外的学习块能撤销不是你造成的注意条件——而你内里需要空间去做你本来就是的那一笔，而不是你被要求表演的那个学生。
  - id: master_feung_edu_hook_personal_05
    line: 在分析跟上之前，身体先知道碎裂的真相。你已经读了足够多学习指南。剩下的是更安静的问题——如何在此身、在大画里的此处，做你自己，而不在不是你写下的作业量下消失。
hook_big_picture:
  options:
  - id: master_feung_edu_hook_big_01
    line: 教育压力不只是作业量。更是打断密集的体系对注意、自信与持续接触学习的能力做了什么。错位不在学生，而在那个把结构性碎裂转化为个人神经系统负荷的结构里。
  - id: master_feung_edu_hook_big_02
    line: 散掉的注意不是意志的故障，而是对「学习实际所需与注意敌对体系所允许之间落差」的准确登记——而坐在门户前的这一群体被要求把这落差吸收为个人特质。
  - id: master_feung_edu_hook_big_03
    line: 人类是一幅大画——当下被要求在注意敌对设计中学习的那一部分，恰是最无力书写其条件的那一部分。结构性错配并不抽象；它是每一个关上又打开门户的学生的可感边缘。
  - id: master_feung_edu_hook_big_04
    line: 旧体系读作「专注问题」的信号，在冯老师的框架里，是身体在登记：学习条件已被设计成对学习所需之整全本身不友好。这一登记不是失败——是临在。
  - id: master_feung_edu_hook_big_05
    line: 学习的集体场域比承载它的制度变得更快。被读作世代注意危机的，部分是结构性裂口的可见边缘——任何个体的一笔都无法独自合拢。
teacher_intro:
  options:
  - id: master_feung_edu_intro_01
    line: 冯老师，一位华人智慧传统的教师，在他西安的文化中心里见过年轻人承担教育压力——不是私人失败，而是大画的可感边缘：一幅广袤的艺术作品，其中每个人都是独特而必要的一笔。在他的教导里，门户面前散开的身体不是失灵，而是大画在认得它自身的负荷。
  - id: master_feung_edu_intro_02
    line: 冯老师不把自己放在学生之上的权威位置——他教导：做你自己即是修行，而不是达成一个理想。几十年来，他在西安文化中心里与那些学业负荷比注意能安顿更快到来的年轻人一起工作。他的传统提供的不是又一套生产力栈，而是一份回归——回到每个人在那幅大画里早已占据的位置。
  - id: master_feung_edu_intro_03
    line: 冯老师以书法为身体修行。一笔下去，不能撤回——这就是教导。他见过年轻学生带着「我应该多读」的笃定走进画室，带着「我的散注是个人失败的证明」的笃定走进画室，并见过当笔与纸相会、临在成为修行时，那种笃定如何松开。
  - id: master_feung_edu_intro_04
    line: 冯老师在西安的五层文化中心里教学——道、佛、儒三传统在那里交织为一种不宗派的修行。他朝拜华山，那道家圣山，不是比喻——是他教导的实存基础。他从那基础出发，与年轻学生相遇，不是给答案，而是认出：你已经是大画所需的那一笔。
  - id: master_feung_edu_intro_05
    line: 冯老师在一个把人类读作大画的传统里教学——每个人都是独特、必要的一笔，恰在其当处。他见过这一再框架在承担注意负荷的年轻学生身上落地，至少卸下了「这份负荷证明我被放错了位置」这一份额外重负。
youth_somatic:
  options:
  - id: master_feung_edu_somatic_01
    line: 你打开作业门户。专注断了。你切换标签页。又回来，因为活还得做完。
  - id: master_feung_edu_somatic_02
    line: 你坐下阅读。心思跳到群聊。你关掉它。又打开阅读，因为截止不会动。
  - id: master_feung_edu_somatic_03
    line: 讲座中你刷过三条通知。肩膀抬起，呼吸变短。你没接住最后一点，因为注意已经在它能落地之前被切成三段。
  - id: master_feung_edu_somatic_04
    line: 页面加载时，你不知不觉屏住呼吸。额头锁住。页面出现才呼气，而且只呼一半，因为总有下一个标签在叫。
  - id: master_feung_edu_somatic_05
    line: 你躺下，眼睛却睁着。未读列表在重播。下巴不肯松。你知道早课前需要睡眠，却找不到进入休息的门。
teacher_witness:
  options:
  - id: master_feung_edu_witness_01
    line: 冯老师在他西安中心的学生身上见过这一回路本身——打开、断掉、切换、回来。在他的教导里，那条回路不是品格，而是大画通过当下被要求承担它的那一笔在登记结构性负荷。
  - id: master_feung_edu_witness_02
    line: 冯老师见过年轻学生走进书法画室时已在回路中段，已笃定「努力本该早就把专注安顿下来」。在他的传统里，那种笃定是信号——那是奋力停下、临在得以回返的位置。
  - id: master_feung_edu_witness_03
    line: 他见过身体承载学习指南承载不了之物。在他的框架里，身体的回路不是失灵——是大画通过优化被过度使用之后仍醒着的唯一一笔，在发声。
  - id: master_feung_edu_witness_04
    line: 冯老师见过年轻学生带着任何学业报告都不准确命名的羞耻前来。在他的传统里，那种羞耻是信息，不是病理——是「被要求在注意敌对条件下学习的群体，从来不是写下这些条件的群体」的信号。
  - id: master_feung_edu_witness_05
    line: 冯老师见过那一刻：一个年轻学生不再尝试制造完美的自习，转而让笔与纸相会。在他的传统里，那一刻不是软弱——是常规教育没有语言去描述的「做你自己」的回归。
turnaround:
  options:
  - id: master_feung_edu_turnaround_01
    stat_line_1: 244 million. UNESCO 2023.
    stat_line_2: 联合国教科文组织2023年报告统计全球两亿四千四百万失学儿童与青年——这是衡量任何个体学生挣扎的结构基线，也是没有任何个体书写的负荷。
  - id: master_feung_edu_turnaround_02
    stat_line_1: 70%. World Bank.
    stat_line_2: 世界银行报告低收入与中等收入国家中百分之七十的十岁儿童无法阅读基本文本——这是制度推迟下来、群体被要求从产生它的条件之内合拢的学习裂口。
  - id: master_feung_edu_turnaround_03
    stat_line_1: 100+ countries. GCE.
    stat_line_2: 全球教育运动如今协调超过一百个成员国的教育倡导——一项推动普世受教育权的全球公民社会基础设施，一代人之前并不存在于这一规模。
  - id: master_feung_edu_turnaround_04
    stat_line_1: 76M children. $700M.
    stat_line_2: 联合国紧急与持续危机教育基金「Education Cannot Wait」已覆盖超过七千六百万儿童，并动员逾七亿美元——这是有组织紧急教育资金能放在这一群体之后的可测量底线。
  - id: master_feung_edu_turnaround_05
    stat_line_1: 2030 deadline. SDG 4.
    stat_line_2: SDG 4使所有联合国成员国承诺到2030年实现包容、公平的优质教育——首个把政府绑到学习负荷上的普世基准，而不是把它当作私人家庭责任。
bridge:
  options:
  - id: master_feung_edu_bridge_01
    line: 244 million. UNESCO 2023. 追踪器衡量失学的儿童。它没有一栏记录「在又一天碎裂之后，下一次回到纸上何以可能」——在不把打断当作身份的前提下，让身体足够久地找到一笔诚实、使一件事落地的容量。冯老师的传统对奋力落下后仍存之物有名字——在大画里做你自己，即使学习条件充满敌意。
    hidden_capacity: 让身体找到一笔诚实使一件事落地
  - id: master_feung_edu_bridge_02
    line: 数字显示教育者与倡导者建起的脚手架。它们没显示这脚手架所立其中的大画语境——一段「最少书写权的群体被要求承担最重要负荷」的时期。冯老师的传统把这语境视作本然，而非比喻。
    hidden_capacity: 承担数据无法显示的更大语境
  - id: master_feung_edu_bridge_03
    line: 数据捕捉识字率、入学与项目资金。它捕捉不到这个移动：一个年轻人不再尝试做完美的学生，记起自己已经是大画所需的那一笔。在冯老师的框架里，这份记起才是真正的根——任何追踪器都不报告的那一部分。
    hidden_capacity: 记起大画早已需要的那一笔
  - id: master_feung_edu_bridge_04
    line: 基础设施可以测量。一笔下去不能撤回——学生不再强求完美自习时所带来的临在——不可测量。冯老师的传统不与测量争论；它在测量之下的那一层工作，那里书法是被修习的，做你自己是每日的教导。
    hidden_capacity: 在测量之下的笔触层工作
  - id: master_feung_edu_bridge_05
    line: 项目、基金与政策都可以被计数。其下的结构性错配——一代人被要求在前代不必生存的条件下学习——不可计数。冯老师的传统不取代结构性工作；它命名制度回应不被设计去抵达的那一层，并把华山所立之临在作为入口。
    hidden_capacity: 命名追踪器无法计数的结构性错配
teacher_perspective:
  options:
  - id: master_feung_edu_perspective_01
    header: 冯老师所见
    paragraphs:
    - 在冯老师的框架里，人类是一幅大画——一幅广袤的艺术作品，每个人都是独特而必要的一笔，恰在其当处。承担注意负荷的年轻学生并未被放错；他们正是大画把他们放在那里的那一笔。当那种安放被误读为个人失败，而不是被认作大画对结构性负荷的准确登记时，苦就会长。
    - 书法在冯老师的教导里不是用来展示的艺术，而是身体修行：在其中身、息、临在合一。一笔下去，不能撤回——这就是教导。一直想把它做得完美的学生，正在对抗真正的修行。临在即修行。笔与纸相会一次，那一次相会已足够。
    - 这一再框架很精确：像「我坏了、错了」这种感受，往往是大画的准确信号——制度与结构把这份负荷放在了最无力书写其条件的那一笔上。修行不是修理自我。修行是在此身、此处，做你自己，让笔与纸相会，即使门户仍在不断拉扯注意。
  - id: master_feung_edu_perspective_02
    header: 冯老师所见
    paragraphs:
    - 书法在冯老师的教导里不是比喻。它是字面意义的修行——笔、墨、纸、息、身——其中临在的不可重复性被感知。散注被当作专注障碍处理的年轻学生，未曾被给到这一传统已守护几个世纪的层次——一笔诚实即足够的那一层。
    - 这修行重要，因为它解释了许多年轻学生在纸前用时之后所述的「松开」——不是碎裂被论赢了，而是碎裂在论证够不到的那一层松开了。笔不必完美，息就能软下来。
    - 这是常规教育没被设计去送达的部分。它不否定政策工作、资金或倡导——只是命名缺失的那一层，并指出一个在那一层工作了几代人的传统。
  - id: master_feung_edu_perspective_03
    header: 冯老师所见
    paragraphs:
    - 在冯老师的传统里，华山不是目的地——是关系。这道家圣山近西安，已是几个世纪的朝拜之所，冯老师本人在那里的时间，是他所教之物的实存基础。山不刻意求稳。它本就是。从山学的身体，停止刻意求稳，让稳定自行抵达。
    - 对承担注意负荷的年轻学生，被某个比算法更大的存在「见证」的体验，在结构上不同于被它「处理」。送达的讯息不是「这是指标」——而是「你已经是大画所需的那一笔，你承担的负荷从来不是你一人写下的」。
    - 「被见证」而非「被处理」——这一区分，正是常规教育无法复制的东西，也是冯老师的传统作为本然在西安中心守护了几十年的东西。
  - id: master_feung_edu_perspective_04
    header: 冯老师所见
    paragraphs:
    - 在冯老师的框架里，做你自己即是教导——不是自我提升，不是达成理想，不是变成更好的学生。觉得自己「应该更专注、更自律、更怎样」的年轻人，正在对抗真正的修行。大画把他们放在他们所在的位置；他们感到的负荷，是大画的负荷，不是他们独自的负荷。
    - 这不是讨好的再框架。它不承诺学习条件会很快改善，也不指责这一群体在碎裂条件下感到碎裂。它只是命名安放，并卸下「碎裂=被放错位置」这一份额外重负。
    - 在书法修习里，那份卸下往往是最先抵达的部分——在更深的「做你自己」回归开始之前。
  - id: master_feung_edu_perspective_05
    header: 冯老师所见
    paragraphs:
    - 在冯老师的传统里，西安是道、佛、儒三股流汇合之地——不汇成一种混合教条，而是汇成一种不宗派的真实临在修行。觉得自己需要一个系统、一种方法、一个完美学习常规的年轻学生，尚未被告知：汇合的诸流不产生方法，它们产生回归。
    - 此处的修养不是生产力话术，而是世界不停在动时让身体带路——一息、一笔、一次重心移动——使下一手从临在抵达，而不是从惊慌抵达。山不刻意。笔不强求。让身体向这学习。
    - 在这一框架下，自责会软化。问题不是年轻人不专注，也不是你感到散就错了。问题是学习条件被设计成与学习所需之整全对立，大画如今正在通过最无力承担它的那一笔登记这份错配。在此处做你自己，即是修行。其余是体系的账，不是你的。
practice:
  options:
  - id: master_feung_edu_practice_01
    display_name: 笔的临在
    announcement_line: 冯老师教授五分钟「笔的临在」修行，用于门户与标签已打散注意的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 笔与纸相会一次，心不再用错过的段落为整个自我命名。
    - 更稳的临在回来，连同从你本来就是的那一笔回到一件事上的容量。
  - id: master_feung_edu_practice_02
    display_name: 华山朝拜记忆
    announcement_line: 冯老师示范四分钟「华山朝拜记忆」修行，用于碎裂把身体撞出其自身范围的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身体记起那座山——山不刻意求稳。
    - 呼吸找到自己的节奏，不再追赶门户所要求的节奏。
  - id: master_feung_edu_practice_03
    display_name: 大画见证
    announcement_line: 冯老师教授六分钟「大画见证」修行，用于结构性碎裂被读作个人失败的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 大画进入视野——你所是的那一笔不再被读作整个负荷。
    - 身体记起，它在此处是被安放的，不是被惩罚的。
  - id: master_feung_edu_practice_04
    display_name: 书法的小停
    announcement_line: 冯老师示范三分钟「书法的小停」，用于学习块与学习块之间的瞬间——身体一直在未经允许地承重的那种瞬间。在侧栏，计时并逐步说明。
    relief_lines:
    - 一笔不可撤回成为「临在而非表演」的标记。
    - 群体负荷不再被当作个人的资产负债表。
  - id: master_feung_edu_practice_05
    display_name: 做你自己的回想
    announcement_line: 冯老师教授三分钟「做你自己的回想」，用于「想更专注、想更自律、想更怎样」的冲动取代真正修行的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 想变成更好学生的压力软化，你早已所是的那一笔回到视野。
    - 大画重回焦点，作业量不再被当作个人的审计。
sdg:
  primary:
    line: 联合国框架在SDG 4及其包容性终身学习目标中命名优质教育。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: master_feung_edu_cta_01
    line: 联合国教科文组织（UNESCO）通过SDG 4协调与成员国项目领导全球教育议程。入口——其教育监测报告与合作伙伴网络。
  - id: master_feung_edu_cta_02
    line: 全球教育运动（GCE）是在一百多个国家组织争取普世受教育权的公民社会网络。入口——其成员联盟。
  - id: master_feung_edu_cta_03
    line: 「Education Cannot Wait」是联合国紧急与持续危机教育基金。入口——其资助网络与合作伙伴组织。
  - id: master_feung_edu_cta_04
    line: 马拉拉基金（Malala Fund）通过倡导与资助，在八个国家推动女童中等教育。入口——其Gulmakai教育活动家网络。
  - id: master_feung_edu_cta_05
    line: Teach For All是在超过六十个国家发展课堂与社区集体领导力的全球网络。入口——其国家级合作伙伴项目。
title_system:
  headline_layer_2:
    options:
    - id: master_feung_edu_headline_01
      line: 一位西安教师把散注命名为大画的负荷——以及让临在回返的那一笔。
    - id: master_feung_edu_headline_02
      line: 一位书法教师，不是学习教练，谈论常规教育未被设计去抵达的那层教育压力。
    - id: master_feung_edu_headline_03
      line: 做你自己，而不是变成更好的学生——冯老师的传统与群体注意负荷相遇。
    - id: master_feung_edu_headline_04
      line: 立足华山、根在西安——一位华人智慧教师把散注重新框架为准确登记。
    - id: master_feung_edu_headline_05
      line: 大画承载负荷——冯老师的传统带给被递了注意敌对学习条件一代的东西。
