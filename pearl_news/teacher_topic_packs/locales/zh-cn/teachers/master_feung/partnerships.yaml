# ZH-CN overlay for master_feung × partnerships.
# Patches `line:` per option id. Base: pearl_news/teacher_topic_packs/teachers/master_feung/partnerships.yaml

schema_version: 1
teacher_id: master_feung
topic: partnerships

hook_personal:
  options:
    - id: hook_personal_01
      line: |
        你读到合作伙伴关系的公告。你搜索那个项目的地址。你刷家庭群,发现你周围没有人听说过它。
        公告不是写给你那个街区的。
    - id: hook_personal_02
      line: |
        你读到联合公报。你数签字。你往回翻找截止日期所在的那段。截止日期在两年之后,在你认识
        的任何人三层楼之外。
    - id: hook_personal_03
      line: |
        你在某人的短视频里听到新闻发布会片段。你等着那座你住的城市出现的部分。它没有出现。
        你关掉 App。胸口的压力是真的。

hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: |
        多边伙伴关系在公告层继续增长,而落地差距在邻里层继续扩大。新闻稿到交付的距离正在成为
        Z 世代公民参与的决定性信任信号。
    - id: hook_big_picture_02
      line: |
        跨部门伙伴关系在伙伴们于合影之后留在房间里时才有效。2025 年 SDG 进展报告把伙伴关系的
        交付——而非伙伴关系的形成——指为拖慢其他所有目标的瓶颈。
    - id: hook_big_picture_03
      line: |
        多方利益相关者伙伴关系是 SDG 框架的承重机制。它们停滞时,整个时间表跟着滑动。年轻人
        正在察觉——把公民能量重新分配给响应更快的本地联盟。

teacher_intro:
  options:
    - id: teacher_intro_01
      line: |
        Master Feung,西安文化中心的中国智慧传承教师——书法与 Grand Painting 教导在此交汇——
        一直在观察学生提问方式的转变。不再是「机构应该做什么」,而是「我这条街上,究竟哪个机构
        真正抵达过」。
    - id: teacher_intro_02
      line: |
        Master Feung 来自西安文化中心,在那里书法作为身体化修养被教导。他观察到学生不再带着
        怀疑而来,而是带着精确的记录:哪些项目落地、哪些没有、哪一年、哪一块街区。
    - id: teacher_intro_03
      line: |
        Master Feung 在西安以书法为身体化修养教学已四十年。他看着机构信任慢慢、然后突然地变薄。
        2026 年来到的学生不再要求机构变好——他们在问哪些笔画真正在画面上相会。

youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        你读那个合作伙伴公告。肩膀往里收。你关掉文章。然后你打开家庭群问有没有人听过它。
        没有人听过。
        LOOP_SEQUENCE: "read the announcement. shoulders pulled in. closed the article. opened the chat."
    - id: youth_somatic_02
      line: |
        你刷联合声明。胸口收紧。你搜索那个项目的地址。然后你停下搜索,因为项目在另一个城市。
        LOOP_SEQUENCE: "scrolled the statement. chest tightened. searched the address. stopped searching."
    - id: youth_somatic_03
      line: |
        你读到新闻片段。下颌咬紧。你刷新本地新闻流。然后你关掉,因为没有新的本地内容。
        LOOP_SEQUENCE: "read the clip. jaw clenched. refreshed the feed. closed the tab."

teacher_witness:
  options:
    - id: teacher_witness_01
      line: |
        Master Feung 在文化中心反复观察到这种模式——学生带着一份精确的「没有抵达的伙伴关系」
        清单走进来。他把这份清单当作数据,不是愤世嫉俗:身体正在读取笔画在哪里相会,哪里没有。
    - id: teacher_witness_02
      line: |
        在四十年的教学里,Master Feung 看到伙伴关系的修辞反复超过伙伴关系的交付。新的是检测
        的速度:差距在一次刷屏里就被看见,身体先于头脑命名它。
    - id: teacher_witness_03
      line: |
        Master Feung 看着学生在伙伴关系公告之后把手机翻过去——没有愤怒,只是一种倦怠。他把这
        份倦怠当作诚实的。工作是去找笔画真正相会的地方,然后从那里延伸。

turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 数十个跨部门青年联盟。多个国家。
      stat_line_2: 年轻组织者在发布实施进度看板,绘制伙伴关系到达邻里的时间地图,推动多边机构汇报交付——而不仅是形成。
    - id: turnaround_02
      stat_line_1: 多个本地公民联盟。若干捐助方问责平台。
      stat_line_2: 联盟在追踪哪些公告转化为项目、命名其滞后,要求伙伴关系召集者发布季度抵达报告,而不是年度新闻通稿。
    - id: turnaround_03
      stat_line_1: 多个区域。多个交付监督试点。
      stat_line_2: 年轻公民研究者的网络在搭建开放的伙伴关系追踪工具,把交付当作指标、公告当作输入——并让多边召集者采用相同的定义。

bridge:
  options:
    - id: bridge_01
      line: |
        Master Feung 的 Grand Painting 框架直接命名伙伴关系的问题:一笔不与另一笔相会,就还
        不是伙伴关系。新闻稿是公告;笔画在页面上相会才是伙伴关系。
    - id: bridge_02
      line: |
        从西安文化中心,Master Feung 提出一个有用的区分:页面不是伙伴关系;笔画在页面上的相会
        才是。只在公告层完成的伙伴关系是未完成的工作,不是伙伴关系的失败。
    - id: bridge_03
      line: |
        书法的框架在这里很具体:两支笔必须触到同一页面。Master Feung 教导,认得笔画真正触到
        的地方就是修养——公告层可以很响亮,而触到的层依然稀薄。

teacher_perspective:
  options:
    - id: teacher_perspective_01
      paragraphs:
        - |
          在 Master Feung 的 Grand Painting 教导中,伙伴关系是笔画在页面上相会时的存在状态。
          页面是共享的;伙伴关系是共享的。伙伴关系的公告是准备工作,不是事情本身。
        - |
          Master Feung 教导:笔画无法撤回,但要让两笔相会,需要两支笔都到场。他把信任差距读为
          准确的阅读,而不是愤世嫉俗:身体在问第二支笔在哪里。
        - |
          从西安文化中心——儒、道、佛在书法与绘画中交汇之处——Master Feung 认为做自己是真正
          伙伴关系的前提。假装的自己之间形成的伙伴关系不是伙伴关系,而是表演。
    - id: teacher_perspective_02
      paragraphs:
        - |
          Master Feung 做一个仔细的区分:伙伴关系的形成是一笔在某处;伙伴关系的交付是一笔与
          另一笔相会。画面两者都需要。公告层可以很响亮,而相会层并不在场。
        - |
          他教导:认得已经共享的笔画就是工作。许多伙伴关系已经在邻里层级相会——一间学校与一家
          诊所之间、一个合作社与一个青年中心之间。Grand Painting 包括它们全部。
        - |
          Master Feung 把伙伴关系当作工艺,而不是表演。西安中心让学生学习读取相会真实存在的
          地方,从那里延伸,而不是等待最响的公告抵达自己的街区。
    - id: teacher_perspective_03
      paragraphs:
        - |
          Master Feung 把伙伴关系的倦怠读为诚实的身体数据:当公告没有被抵达匹配时,肩膀会收紧。
          这种收紧是对准确性的请求,不是需要管理的情绪过度。
        - |
          书法修养小而具体。毛笔触到页面。身体找出相会已经在哪里发生。从 Grand Painting 框架
          看,每一个真实的伙伴关系——本地诊所与本地学校——都是已经完成的一笔。
        - |
          Master Feung 认为修养与结构性工作并行。修养让身体保持准确阅读的能力。结构性工作要求
          公告层与相会层趋于一致。两者都要保留。

practice:
  options:
    - id: practice_01
      announcement_line: |
        两支笔在同一页上。各写一笔。注意它们相会的地方。那个相会就是伙伴关系。页面无论如何
        都没变化;是相会让它成为伙伴关系。
    - id: practice_02
      announcement_line: |
        把手机放下。拿一支笔。从页面两侧各画一条线,直到相遇。注意肩膀。相会就是修养。
    - id: practice_03
      announcement_line: |
        站立。三次缓慢呼吸。说出一个已经抵达你所居住之地的伙伴关系——诊所与学校,合作社与图书馆,
        任何都行。注意身体。那个相会就是数据。

cta:
  options:
    - id: cta_01
      line: |
        打开 sdgs.un.org/partnerships。挑一个为你所在区域列出的伙伴关系。在本地新闻里搜索它。
        注意它是否真的抵达你居住的地方,把这个观察带到你下一次公民对话里。
    - id: cta_02
      line: |
        阅读 unstats.un.org/sdgs 上的 2025 SDG 进展报告。找出第 17 项目标提到的交付差距。
        挑一个,问一位本地代表你的社区站在差距的哪一侧。
    - id: cta_03
      line: |
        在 monitor.civicus.org 追踪公民空间状况。按你的国家筛选。所列条件预示某个伙伴关系
        公告是否可能抵达——把这份数据带到你下一个加入的联盟里。
