hook_personal:
  options:
  - id: hook_personal_01
    line: 你仍想学习，也清楚现行体系多快把注意打成碎片、把努力变成耗竭。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育的紧张不只是作业量，更是学校是否仍能创造注意与学习得以运作的条件。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意识与恩典的吠陀教师）在实修场合见过这种压力如何落在年轻人身上。他们不只问如何感觉好一点，而问如何不让压力成为「我是谁」的全部故事。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你打开作业门户。专注断了。你切换离开。你又回来，因为活还在。LOOP_SEQUENCE: "opened the portal. focus broke. switched away. came back."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa 见过这一精确循环——门户打开、专注断裂、离开，又因课业仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 学生与教育者正在搭建学习支持、更健康的课表与保护注意而非仅组织运动的课堂改革。
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. 追踪器衡量年轻人做了什么。却没有一栏记录「又一次延迟或断裂的回应之后，下一步何以可能」——不把碎片化变成身份、仍能回到课业的容量。回来的人需要它，处于循环中的读者也需要。Sai Maa 的教导有语言来保护那种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa 所见
    paragraphs:
    - Sai Maa 会先把意识与穿过它的风暴分开。压力真实，但压倒不必成为身份。
    - 她的教导不要求年轻人否认困难，而要求恢复足够内在清明，使恐惧或过载不致成为自我的唯一叙述者。
    - 像「我坏了、错了」这样的感受，常常是对制度与结构持续把不可持续的紧张常态化的准确反应。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「过载重置」（Overwhelm Reset）
    announcement_line: Sai Maa 教授五分钟 Overwhelm Reset，用于教育压力开始把注意变成无助的时刻。在侧栏，计时且实用。
    relief_lines:
    - 螺旋失去一些定义整个自我的权威。
    - 足够清明回归，以支撑下一次诚实决定。
sdg:
  primary:
    title: 优质教育
    line: 联合国通过SDG 4及其优质教育目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'UNESCO全球教育联盟提供公共入口。入口: https://www.unesco.org/en/education/globaleducationcoalition'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 学生失去专注的速度快于体系的适应。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师点出在碎片化条件下维持学习可能性的斗争。
