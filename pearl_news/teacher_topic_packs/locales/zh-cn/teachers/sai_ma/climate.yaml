hook_personal:
  options:
  - id: hook_personal_01
    line: 你关心地球，却也感到越来越难在下一个数字前停留足够久以决定做什么。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 气候压力不再只是环境。它是注意、情感与公民性：年轻人如何在与现实保持接触的同时不失功能？
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意识与恩典的吠陀教师）在实修场合见过这种压力如何落在年轻人身上。他们不只问如何感觉好一点，而问如何不让压力成为「我是谁」的全部故事。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你读气候更新。身体绷紧。你移开目光。你又回来，因为数字仍然为真。LOOP_SEQUENCE: "read the update. body tightened. looked away. came back."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa 见过这一精确循环——更新、身体绷紧、转开，又因现实仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 青年气候组织者在提起诉讼、主持工作坊，并要求机构回应公共承诺与生活现实之间的裂口。
bridge:
  options:
  - id: bridge_01
    line: 2,666 cases. 51 jurisdictions. 追踪器衡量年轻人做了什么。却没有一栏记录「又一次延迟或断裂的回应之后，下一步何以可能」——在体系持续不回应时，仍与真相接触足够久、能再行动的容量。回来的人需要它，处于循环中的读者也需要。Sai Maa 的教导有语言来保护那种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa 所见
    paragraphs:
    - Sai Maa 会先把意识与穿过它的风暴分开。压力真实，但压倒不必成为身份。
    - 她的教导不要求年轻人否认困难，而要求恢复足够内在清明，使恐惧或过载不致成为自我的唯一叙述者。
    - 像「我坏了、错了」这样的感受，常常是对制度与结构持续把不可持续的紧张常态化的准确反应。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「过载重置」（Overwhelm Reset）
    announcement_line: Sai Maa 教授五分钟 Overwhelm Reset，用于气候压力开始把注意变成无助的时刻。在侧栏，计时且实用。
    relief_lines:
    - 螺旋失去一些定义整个自我的权威。
    - 足够清明回归，以支撑下一次诚实决定。
sdg:
  primary:
    title: 气候行动
    line: 联合国通过SDG 13及其气候教育与韧性目标，为恰恰这一裂口提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'YOUNGO 与青年气候社群提供公共入口。入口: https://youngoclimate.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 气候阈值不再抽象。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师点出气候压力正对 Z 世代与阿尔法世代的注意做什么。
