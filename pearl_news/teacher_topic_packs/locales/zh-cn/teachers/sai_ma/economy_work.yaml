hook_personal:
  options:
  - id: hook_personal_01
    line: 工作不断要求更多灵活、给予更少稳定，而身体在排班承认代价之前就已知道代价。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 经济压力如今作为身份压力到来：保持可雇、随时在线，并表现得仿佛不稳定是对品格的考验。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意识与恩典的吠陀教师）在实修场合见过这种压力如何落在年轻人身上。他们不只问如何感觉好一点，而问如何不让压力成为「我是谁」的全部故事。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你查看排班应用。胃一沉。你又刷新。然后截图，因为班次可能在你能相信所见之前就消失。LOOP_SEQUENCE: "checked the app. stomach dropped. refreshed again. took the screenshot."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa 见过这一精确循环——查应用、身体下沉、刷新、试图用截图把瞬间按住。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 年轻工人在记录条件、提起工资盗窃诉讼，并组织运动，迫使不稳定的劳动规则进入公共记录。
bridge:
  options:
  - id: bridge_01
    line: 1,240 cases. 32 cities. 追踪器衡量年轻人做了什么。却没有一栏记录「又一次延迟或断裂的回应之后，下一步何以可能」——在经济持续把不确定性变成私人压力时，仍能足够功能、再次行动的容量。回来的人需要它，处于循环中的读者也需要。Sai Maa 的教导有语言来保护那种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa 所见
    paragraphs:
    - Sai Maa 会先把意识与穿过它的风暴分开。压力真实，但压倒不必成为身份。
    - 她的教导不要求年轻人否认困难，而要求恢复足够内在清明，使恐惧或过载不致成为自我的唯一叙述者。
    - 像「我坏了、错了」这样的感受，常常是对制度与结构持续把不可持续的紧张常态化的准确反应。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「过载重置」（Overwhelm Reset）
    announcement_line: Sai Maa 教授五分钟 Overwhelm Reset，用于劳动与经济压力开始把注意变成无助的时刻。在侧栏，计时且实用。
    relief_lines:
    - 螺旋失去一些定义整个自我的权威。
    - 足够清明回归，以支撑下一次诚实决定。
sdg:
  primary:
    title: 体面工作和经济增长
    line: 联合国通过SDG 8及其体面工作相关目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: '国际劳工组织（ILO）与青年劳动权利团体提供公共入口。入口: https://www.ilo.org/global/topics/youth-employment'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 年轻工人背负的不稳定超过工资所显示。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师点出在不稳定之下维持功能的隐秘斗争。
