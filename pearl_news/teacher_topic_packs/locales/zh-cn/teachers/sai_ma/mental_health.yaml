hook_personal:
  options:
  - id: hook_personal_01
    line: 在任何人命名之前，你已知道那种螺旋；你也知道在内在容量不断变薄时，仍要把日子撑过去需要多少力气。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 青年心理健康压力不只是临床趋势。它关乎机构如何把过载常态化，直到年轻人开始把它当作私人缺陷。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意识与恩典的吠陀教师）在实修场合见过这种压力如何作用于年轻人。他们不只问如何感觉好一点，而问如何不让压力成为「我是谁」的全部故事。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你在深夜读报告。身体绷紧。你放下手机。你又拿起，因为压力已在房间里。
      LOOP_SEQUENCE: "read the report. body tightened. set the phone down. picked it up again."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa 见过这一精确循环——报告、身体绷紧、放下手机，又因压力仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 学生正在搭建同伴圈、工作坊与运动，把心理健康当作共享基础设施，而非私人弱点。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. 追踪器衡量年轻人做了什么。却没有一栏记录「又一次延迟或断裂的回应之后，下一步何以可能」——求助并返回、却不把过载变成身份的容量。回来的人需要它，处于循环中的读者也需要。Sai Maa 的教导有语言来保护那种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa 所见
    paragraphs:
    - Sai Maa 会先把意识与穿过它的风暴分开。压力真实，但压倒不必成为身份。
    - 她的教导不要求年轻人否认困难，而要求恢复足够内在清明，使恐惧或过载不致成为自我的唯一叙述者。
    - 像「我坏了、错了」这样的感受，是对制度与结构持续把不可持续的紧张常态化的准确反应。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「过载重置」（Overwhelm Reset）
    announcement_line: Sai Maa 教授五分钟 Overwhelm Reset，用于心理健康压力开始把注意变成无助的时刻。在侧栏，计时且实用。
    relief_lines:
    - 螺旋失去一些定义整个自我的权威。
    - 足够清明回归，以支撑下一次诚实决定。
sdg:
  primary:
    title: 健康与福祉
    line: 联合国通过SDG 3及其心理健康相关目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'Active Minds 提供面向青年的心理健康倡导公共入口。入口: https://www.activeminds.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 青年心理过载持续上升。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师在压力硬化成身份之前先命名它。
