hook_personal:
  options:
  - id: hook_personal_01
    line: 你继续读，因为不看像不诚实；你也清楚重复暴力正在对你的身体与信任做什么。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 冲突压力不再只是地缘政治。它作为道德伤害到来，作为对一再未能保护的机构的信任崩塌到来。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa（意识与恩典的吠陀教师）在实修场合见过这种压力如何落在年轻人身上。他们不只问如何感觉好一点，而问如何不让压力成为「我是谁」的全部故事。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: |
      你读最新报告。胸收紧。你移开目光。你又回来，因为良心仍在。LOOP_SEQUENCE: "read the report. chest tightened. looked away. came back."
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa 见过这一精确循环——报告、身体绷紧、转开，又因良心仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 143 youth coalitions. 28 countries.
    stat_line_2: 青年和平建设者在记录伤害、组织工作坊，支持流离的同伴，并在机构迟滞时仍搭建信任网络。
bridge:
  options:
  - id: bridge_01
    line: 143 youth coalitions. 28 countries. 追踪器衡量年轻人做了什么。却没有一栏记录「又一次延迟或断裂的回应之后，下一步何以可能」——在不投降于麻木或绝望的情况下仍足够人性、能再行动的容量。回来的人需要它，处于循环中的读者也需要。Sai Maa 的教导有语言来保护那种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Sai Maa 所见
    paragraphs:
    - Sai Maa 会先把意识与穿过它的风暴分开。压力真实，但压倒不必成为身份。
    - 她的教导不要求年轻人否认困难，而要求恢复足够内在清明，使恐惧或过载不致成为自我的唯一叙述者。
    - 像「我坏了、错了」这样的感受，常常是对制度与结构持续把不可持续的紧张常态化的准确反应。
practice:
  options:
  - id: practice_01
    display_name: 五分钟「过载重置」（Overwhelm Reset）
    announcement_line: Sai Maa 教授五分钟 Overwhelm Reset，用于和平冲突压力开始把注意变成无助的时刻。在侧栏，计时且实用。
    relief_lines:
    - 螺旋失去一些定义整个自我的权威。
    - 足够清明回归，以支撑下一次诚实决定。
sdg:
  primary:
    title: 和平、正义与强大机构
    line: 联合国通过SDG 16及其和平、正义与制度信任目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: '联合国青年特使办公室与青年和平网络提供公共入口。入口: https://www.un.org/youthenvoy/'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 年轻人正把冲突作为道德伤害来背负。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师点出在重复暴力与制度失败之下仍保持人性的斗争。
