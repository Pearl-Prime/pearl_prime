hook_personal:
  options:
  - id: hook_personal_01
    line: 工作不断要求你更灵活，却给你更少稳定，而身体在排班承认之前就知道代价。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 经济压力如今以身份压力到来：保持可雇佣、随时在线，并把不稳定当成品格考验来演。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Ahjan是上座部佛教教师，在实修里见过这种压力如何落在年轻人身上。学生不再问如何保持热情，而是问在压力按日程降下时如何还能运转。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你打开排班应用。胃里一沉。你又刷新。然后截图，因为班次可能在你能相信所见之前就消失。 LOOP_SEQUENCE: "看了应用。心里一沉。又刷新。截了图。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan见过这一整段循环——看应用、身体下沉、刷新、以及试图把瞬间固定的截图。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 年轻工人在记录条件、提起欠薪案件，并组织运动，把不稳定的劳动规则拉进公共记录。
bridge:
  options:
  - id: bridge_01
    line: 1,240 cases. 32 cities. 追踪器衡量年轻人做了什么，却没有一栏记录又一次拖延或失效回应之后、下一步何以可能——在经济不断把不确定转成私人压力时，仍能再次行动所需的运转力。走回来的人需要它；处在那种循环里的读者也需要它。Ahjan的教法有语言来保护这种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Ahjan所见
    paragraphs:
    - Ahjan会从准确接触开始。身体对真实压力作出反应时，往往不是失灵，而是在感知官方安抚与生活现实之间的错位。
    - 他把这种认识与正精进并提。正精进不是生产力话语，而是在仍能与真相接触、仍能采取可行行动之处引导能量的纪律。
    - 重构很重要：像「我有缺陷——我坏了、错了」这种感受，常常是把拖延、紧张与矛盾外推到个人身上的体系的准确反应。
practice:
  options:
  - id: practice_01
    announcement_line: Ahjan教授五分钟「安定练习」，用于经济与工作压力开始把注意变成无助的时刻。在侧栏，计时且务实。
    relief_lines:
    - 心不再把下一次更新当作行动无用的证明。
    - 更稳的内在节奏回来，随之是再次行动的能力。
sdg:
  primary:
    line: 联合国通过SDG 8及其体面工作目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'ILO与青年劳动权利团体都提供公共入口。入口: https://www.ilo.org/global/topics/youth-employment'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 年轻工人背负的不稳定，比工资数字显示的更多。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师点出在不稳定之下保持运转的隐性抗争。
