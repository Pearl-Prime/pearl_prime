hook_personal:
  options:
  - id: hook_personal_01
    line: 在别人命名之前你就认得那种螺旋，也清楚在内在容量不断变薄时撑过一天要费多少力。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 青年心理健康压力不只是临床趋势，更是机构如何把过载正常化，直到年轻人把它当成私人缺陷。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Ahjan是上座部佛教教师，在实修里见过这种压力如何落在年轻人身上。学生不再问如何保持热情，而是问在压力按日程降下时如何还能运转。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你在午夜后读报告。身体发紧。你放下手机。你又拿起，因为压力已经在房间里。 LOOP_SEQUENCE: "读报告。身体发紧。放下手机。又拿起。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan见过这一整段循环——报告、身体发紧、放下手机、以及因压力仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 学生正在建立同伴小组、工作坊与运动，把心理健康视为共同基础设施，而非私人软弱。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. 追踪器衡量年轻人做了什么，却没有一栏记录又一次拖延或失效回应之后、下一步何以可能——不把过载当成身份、仍能求助并回来的容量。走回来的人需要它；处在那种循环里的读者也需要它。Ahjan的教法有语言来保护这种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Ahjan所见
    paragraphs:
    - Ahjan会从准确接触开始。身体对真实压力作出反应时，往往不是失灵，而是在感知官方安抚与生活现实之间的错位。
    - 他把这种认识与正精进并提。正精进不是生产力话语，而是在仍能与真相接触、仍能采取可行行动之处引导能量的纪律。
    - 重构很重要：像「我有缺陷——我坏了、错了」这种感受，常常是把拖延、紧张与矛盾外推到个人身上的体系的准确反应。
practice:
  options:
  - id: practice_01
    announcement_line: Ahjan教授五分钟「安定练习」，用于心理健康压力开始把注意变成无助的时刻。在侧栏，计时且务实。
    relief_lines:
    - 心不再把下一次更新当作行动无用的证明。
    - 更稳的内在节奏回来，随之是再次行动的能力。
sdg:
  primary:
    line: 联合国通过SDG 3及其心理健康目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'Active Minds与青年主导的心理健康团体在此提供入口。入口: https://www.activeminds.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 青年心理过载持续上升。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师在压力固化成身份之前先为它命名。
