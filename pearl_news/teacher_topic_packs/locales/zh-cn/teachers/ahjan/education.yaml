hook_personal:
  options:
  - id: hook_personal_01
    line: 你仍想学习，也清楚现行体系多快就把注意变成涣散、把努力变成耗竭。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育的压力不只是作业量，而是学校是否仍能创造让注意与学习得以运转的条件。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Ahjan是上座部佛教教师，在实修里见过这种压力如何落在年轻人身上。学生不再问如何保持热情，而是问在压力按日程降下时如何还能运转。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你打开作业门户。专注断了。你切走。你又回来，因为作业还在。 LOOP_SEQUENCE: "打开门户。专注断了。切走。回来。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan见过这一整段循环——打开门户、专注断裂、切走、以及因作业仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 学生与教育工作者在建立学习支持、更健康的时间表，以及保护注意、而非仅仅组织活动和承办场面的课堂改革。
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. 追踪器衡量年轻人做了什么，却没有一栏记录又一次拖延或失效回应之后、下一步何以可能——不把碎片化当成身份、仍能回到学业的容量。走回来的人需要它；处在那种循环里的读者也需要它。Ahjan的教法有语言来保护这种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Ahjan所见
    paragraphs:
    - Ahjan会从准确接触开始。身体对真实压力作出反应时，往往不是失灵，而是在感知官方安抚与生活现实之间的错位。
    - 他把这种认识与正精进并提。正精进不是生产力话语，而是在仍能与真相接触、仍能采取可行行动之处引导能量的纪律。
    - 重构很重要：像「我有缺陷——我坏了、错了」这种感受，常常是把拖延、紧张与矛盾外推到个人身上的体系的准确反应。
practice:
  options:
  - id: practice_01
    announcement_line: Ahjan教授五分钟「安定练习」，用于学业压力开始把注意变成无助的时刻。在侧栏，计时且务实。
    relief_lines:
    - 心不再把下一次更新当作行动无用的证明。
    - 更稳的内在节奏回来，随之是再次行动的能力。
sdg:
  primary:
    line: 联合国通过SDG 4及其优质教育目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'UNESCO全球教育联盟在此提供公共入口。入口: https://www.unesco.org/en/education/globaleducationcoalition'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 学生失焦的速度快于体系的适应。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师点出在碎片化条件下维持学习的抗争。
