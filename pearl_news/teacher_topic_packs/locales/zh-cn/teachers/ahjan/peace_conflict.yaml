hook_personal:
  options:
  - id: hook_personal_01
    line: 你持续阅读，因为不看像是不诚实。你也清楚重复暴力正在对你的身体与信任做什么。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 冲突压力不再只是地缘政治，它以道德伤害到来，也以对一再未能保护的机构之信任的崩塌到来。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Ahjan是上座部佛教教师，在实修里见过这种压力如何落在年轻人身上。学生不再问如何保持热情，而是问在压力按日程降下时如何还能运转。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你读最新报道。胸口发紧。你移开目光。你又回来，因为良知仍在。 LOOP_SEQUENCE: "读报道。胸口发紧。移开目光。回来。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan见过这一整段循环——报道、身体发紧、移开目光、以及因良知仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 143 youth coalitions. 28 countries.
    stat_line_2: 年轻和平建设者在记录伤害、组织工作坊、支持流离的同伴，并在机构停滞时仍建立信任网络。
bridge:
  options:
  - id: bridge_01
    line: 143 youth coalitions. 28 countries. 追踪器衡量年轻人做了什么，却没有一栏记录又一次拖延或失效回应之后、下一步何以可能——在麻木或绝望之外仍能再次以人的方式行动的容量。走回来的人需要它；处在那种循环里的读者也需要它。Ahjan的教法有语言来保护这种容量。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Ahjan所见
    paragraphs:
    - Ahjan会从准确接触开始。身体对真实压力作出反应时，往往不是失灵，而是在感知官方安抚与生活现实之间的错位。
    - 他把这种认识与正精进并提。正精进不是生产力话语，而是在仍能与真相接触、仍能采取可行行动之处引导能量的纪律。
    - 重构很重要：像「我有缺陷——我坏了、错了」这种感受，常常是把拖延、紧张与矛盾外推到个人身上的体系的准确反应。
practice:
  options:
  - id: practice_01
    announcement_line: Ahjan教授五分钟「安定练习」，用于和平与冲突压力开始把注意变成无助的时刻。在侧栏，计时且务实。
    relief_lines:
    - 心不再把下一次更新当作行动无用的证明。
    - 更稳的内在节奏回来，随之是再次行动的能力。
sdg:
  primary:
    line: 联合国通过SDG 16及其和平、正义与制度信任目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'UN Youth Office与青年和平建设网络在此提供入口。入口: https://www.un.org/youthenvoy/'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 年轻人正把冲突当作道德伤害来背负。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位教师点出在重复暴力与制度失灵之下仍保持人性的抗争。
