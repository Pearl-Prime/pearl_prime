hook_personal:
  options:
  - id: hook_personal_01
    line: 你继续读，因为不看像是不诚实；你也清楚反复暴力正对你的身体与信任做什么。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 冲突压力不再只是地缘政治，也以道德创伤到来，并以对一再未能保护的机构的信任崩塌到来。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 南印度苏菲教师Maat（扎根泰米尔纳德道堂传统）在实修里见过冲突压力对年轻人意味着什么。他们不只问发生了什么，更在问：当qalb（灵性之心）早已知道机构持续低估的真相时，如何仍信任自己的感知。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你读最新报告。胸收紧。你移开目光。又回来，因为良心仍在。

      LOOP_SEQUENCE: "读报告。胸收紧。移开目光。回来。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Maat见过这条回路——报告、身体收紧、转开，又因良心仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 143 youth coalitions. 28 countries.
    stat_line_2: 年轻和平建设者在记录伤害、组织联盟并举办工作坊，即便机构停滞。
bridge:
  options:
  - id: bridge_01
    line: '143 youth coalitions. 28 countries. 追踪器衡量年轻人做了什么，却没有一栏记录又一轮暴力与机构失职之后下一步何以可能——在不至于向麻木或愤怒投降的情况下，仍足够像人、足以再次行动的容量。回来的人需要它，同一条回路上的读者也需要。Maat的传统对此有精确语言：sama（虔听）绕过智力，直接向qalb说话。仍为暴力心碎的心，仍是工作着的心。练习不是给它装甲，而是让声音打开悲恸所关闭之处，使下一个清醒行动成为可能。'
    hidden_capacity: 回到基于真相的行动
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Maat所见
    paragraphs:
    - Maat从真相开始。第一种扭曲，是人被要求把结构性失序当作私人缺陷。
    - 正当关系意味着如实命名正在发生的事，而不为迎合机构而缩小它。那命名不是戏剧，而是与现实对齐。
    - 像「我有问题——坏了、乱了」的感受，常是对一边误称伤害、拖延或失序、一边仍索要信任的制度结构的准确回应。
practice:
  options:
  - id: practice_01
    display_name: 15分钟萨玛聆听
    announcement_line: Maat教授15分钟萨玛聆听——一首虔敬音乐，用胸腔而非耳朵听。注意音乐落在身体何处、什么打开、什么抗拒。萨玛不是欣赏音乐，而是用声音绕过智力、直接向qalb说话。在侧栏，计时且可实操。
    relief_lines:
    - 心不再与已知讨价还价。
    - 足够稳定回归，能清晰命名现实，而不为看清而道歉。
sdg:
  primary:
    line: 联合国通过SDG 16及其和平、正义与强有力机构目标，为此提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: '联合国与青年正义网络提供进入这项工作的公共入口。入口: https://www.unwomen.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 年轻人正把冲突当作道德创伤来背负。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位南印度苏菲教师点出在反复暴力下仍保持人性的斗争——并说仍会碎裂的心，仍是仍在工作的心。
