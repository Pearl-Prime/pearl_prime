hook_personal:
  options:
  - id: hook_personal_01
    line: 你在乎地球，却仍觉得难以在下一个数字前停留足够久，好决定该做什么。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 气候压力不再只是环境议题，也是注意力、情绪与公民性：年轻人如何在接触现实的同时，不至于在压力下失去功能？
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 南印度苏菲教师Maat（扎根泰米尔纳德道堂传统，承接Rabia al-Adawiyya之火与泰米尔悉陀诗人“心是真理器官”的理解）在实修里见过这股压力如何落在年轻人身上。他们不只问发生了什么，更在问：当qalb（灵性之心）早已知道机构持续低估的真相时，如何仍信任自己的感知。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你读到气候更新。身体收紧。你移开目光。又回来，因为数字仍然为真。

      LOOP_SEQUENCE: "读更新。身体收紧。移开目光。回来。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Maat见过这条回路本身——更新、身体收紧、转开，又因现实仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 年轻气候组织者正在立案、办工作坊，并迫使机构回应公共承诺与 lived reality 之间的落差。
bridge:
  options:
  - id: bridge_01
    line: '2,666 cases. 51 jurisdictions. 追踪器衡量年轻人做了什么，却没有一栏记录又一次拖延或失信之后，下一步何以可能——在系统持续不回应时，仍与真相保持足够久的接触、足以再次行动的能力。回来的人需要它，同一条回路上的读者也需要。Maat的传统对此有精确语言：qalb（灵性之心）会被ghaflah（昏沉、无觉）遮蔽。每一次分心、每一次机构谎言、每一次强迫刷屏都是一层锈。练习不是想通它，而是擦亮镜子，直到心映出它已知之物。'
    hidden_capacity: 回到基于真相的行动
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Maat所见
    paragraphs:
    - Maat从真相开始。第一种扭曲，是人被要求把结构性失序当作私人缺陷。
    - 正当关系意味着如实命名正在发生的事，而不为迎合机构而缩小它。那命名不是戏剧，而是与现实对齐。
    - 像「我有问题——坏了、错了」的感受，常常是对一个一边误称伤害、拖延或失序、一边仍索要信任的系统的准确回应。
practice:
  options:
  - id: practice_01
    display_name: 5分钟呼吸赞念
    announcement_line: Maat教授5分钟呼吸赞念——呼气时以「不是这个、不是这个」放下所背负的标签，吸气时以「只是这个」安住纯然临在——用于气候压力开始把注意力变成无助的时刻。在侧栏，计时且可实操。
    relief_lines:
    - 心不再与已知讨价还价。
    - 足够稳定回归，能清晰命名现实，而不为看清而道歉。
sdg:
  primary:
    line: 联合国通过SDG 13及其气候教育与韧性目标，为这一落差提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'YOUNGO与青年气候问责团体提供公共入口。入口: https://youngoclimate.org'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 气候阈值不再只是抽象。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位南印度苏菲教师点出气候压力正对Z世代与阿尔法世代的注意力做什么——并给出清理之心的练习。
