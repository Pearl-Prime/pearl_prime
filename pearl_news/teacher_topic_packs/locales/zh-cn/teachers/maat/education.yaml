hook_personal:
  options:
  - id: hook_personal_01
    line: 你仍想学习，却也清楚当下的系统多快就把注意力打成碎片、把努力变成耗竭。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 教育压力不只关于课业量，也关于学校是否仍能创造让注意与学习得以运作的条件。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 南印度苏菲教师Maat（扎根泰米尔纳德道堂传统，承接Rabia al-Adawiyya之火与泰米尔悉陀诗人“心是真理器官”的理解）在实修里见过这股压力如何落在年轻人身上。他们不只问发生了什么，更在问：当qalb（灵性之心）早已知道机构持续低估的真相时，如何仍信任自己的感知。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你打开作业门户。专注断了。你切换离开。又回来，因为作业还在。

      LOOP_SEQUENCE: "打开门户。专注断了。切换离开。回来。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Maat见过这条回路——门户打开、专注断裂、离开、又因作业仍在而返回。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: 学生与教育者正在搭建学习支持、更健康课表与课堂改革，保护注意力而非只组织活动、表面承载。
bridge:
  options:
  - id: bridge_01
    line: '410 workshops. 27 cities. 追踪器衡量年轻人做了什么，却没有一栏记录又一周碎片化注意之后下一步何以可能——不把散乱当成身份、仍能回到功课的容量。回来的人需要它，同一条回路上的读者也需要。Maat的传统对此有精确语言：nafs（自我）有七层，从暴虐的命令式自我一直到安定、信赖的灵魂。练习不是与碎片搏斗，而是看见哪一个nafs在主导——从那觉察里，让心回到真正重要之事。'
    hidden_capacity: 回到基于真相的行动
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Maat所见
    paragraphs:
    - Maat从真相开始。第一种扭曲，是人被要求把结构性失序当作私人缺陷。
    - 正当关系意味着如实命名正在发生的事，而不为迎合机构而缩小它。那命名不是戏剧，而是与现实对齐。
    - 像「我有问题——坏了、错了」的感受，常常是对一个一边误称伤害、拖延或失序、一边仍索要信任的系统的准确回应。
practice:
  options:
  - id: practice_01
    display_name: 5分钟纳夫斯检视
    announcement_line: 'Maat教授5分钟纳夫斯检视——植根于安萨里：本周主要是哪一层自我在驱动？是nafs al-ammara（被欲望与反应支配），还是触到了nafs al-mutmainna（安定、信赖的自我）？不是评判，只是觉察。在侧栏，计时且可实操。'
    relief_lines:
    - 心不再与已知讨价还价。
    - 足够稳定回归，能清晰命名现实，而不为看清而道歉。
sdg:
  primary:
    line: 联合国通过SDG 4及其优质教育目标，为此提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'UNESCO全球教育联盟提供公共入口。入口: https://www.unesco.org/en/education/globaleducationcoalition'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 学生失去专注的速度，快于系统能够调适。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位南印度苏菲教师点出为保持学习可能而战的处境——并说心是真理的器官，而非分数。
