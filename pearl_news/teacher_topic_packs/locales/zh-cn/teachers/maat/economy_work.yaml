hook_personal:
  options:
  - id: hook_personal_01
    line: 工作不断索要更多灵活，却给更少稳定；在排班承认代价之前，你的身体早已知道成本。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 经济压力如今以身份压力到来：保持可雇佣、随时在线，并把不稳定演成对品格的考验。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 南印度苏菲教师Maat（扎根泰米尔纳德道堂传统，承接Rabia al-Adawiyya之火与泰米尔悉陀诗人“心是真理器官”的理解）在实修里见过这股压力如何落在年轻人身上。他们不只问发生了什么，更在问：当qalb（灵性之心）早已知道机构持续低估的真相时，如何仍信任自己的感知。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你查看排班应用。胃一沉。你又刷新。然后截图，因为班次可能在你能相信所见之前就消失。

      LOOP_SEQUENCE: "查应用。胃沉。再刷新。截图。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Maat见过这条回路——查应用、身体下沉、刷新、试图把瞬间按住的截图。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 年轻工人在记录条件、提起工资盗窃诉讼，并组织运动，把不稳定劳动规则拖进公共记录。
bridge:
  options:
  - id: bridge_01
    line: '1,240 cases. 32 cities. 追踪器衡量年轻人做了什么，却没有一栏记录又一次取消班次之后下一步何以可能——在经济持续把不确定变成私人羞耻时，仍能维持足够功能、再次行动的容量。回来的人需要它，同一条回路上的读者也需要。Maat的传统对此有精确语言：渴望不是伤口，而是你已经知道缺了什么的证明。Beloved Letter练习让你写给最爱之物——不求什么，只表达有意识的ishq（渴望）。当渴望变得有意识，心便不再把不稳定错当成无价值。'
    hidden_capacity: 回到基于真相的行动
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Maat所见
    paragraphs:
    - Maat从真相开始。第一种扭曲，是人被要求把结构性失序当作私人缺陷。
    - 正当关系意味着如实命名正在发生的事，而不为迎合机构而缩小它。那命名不是戏剧，而是与现实对齐。
    - 像「我有问题——坏了、错了」的感受，常常是对一个一边误称伤害、拖延或失序、一边仍索要信任的系统的准确回应。
practice:
  options:
  - id: practice_01
    display_name: Beloved Letter（致所爱之信）
    announcement_line: 'Maat教授Beloved Letter练习——植根于Rabia的祷诗。给你最爱之物写一封信。不求什么——只表达渴望。Maat说：渴望不是伤口，是你已经知道缺了什么的证明。在侧栏，计时且可实操。'
    relief_lines:
    - 心不再与已知讨价还价。
    - 足够稳定回归，能清晰命名现实，而不为看清而道歉。
sdg:
  primary:
    line: 联合国通过SDG 8及其体面工作与经济增长目标，为此提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: '国际劳工组织与青年工人联盟提供公共入口。入口: https://www.ilo.org/global/topics/youth-employment'
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 年轻工人背负的不稳定，比工资数字显示的更多。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: 一位南印度苏菲教师点出在不稳定下保持功能的隐秘斗争——并说对尊严的渴望不是软弱，而是你知道自己值得什么的证明。
