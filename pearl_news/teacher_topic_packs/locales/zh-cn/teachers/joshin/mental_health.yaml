hook_personal:
  options:
  - id: hook_personal_01
    line: 最难的时刻是螺旋开始像你的真实声音。身份就是在那里被夺走的。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 青年心理超载不只是症状统计，更是速度、碎片化与压力如何从内部开始殖民身份。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Joshin Sensei（真言密教传承的真言教师）在实修里见过年轻人把过载与自我混淆，而体系几乎不给空间把两者分开。学生不问如何假装平静，而问如何不再像把风暴当成自己那样活着。
    - id: teacher_intro_02
      line: Joshin Sensei（真言佛教教师）在实修场所见过心理超载开始给整个人命名时会发生什么。年轻人不问压力是否真实，而问如何找到从未是风暴的那部分——身、语、意在同一动作里。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你在深夜读更新。思绪狂奔。你放下手机。你又拿起，因为螺旋已经在跑。

      LOOP_SEQUENCE: "读更新。思绪狂奔。放下手机。又拿起。"'
  - id: youth_somatic_02
    line: '你在群聊里看到标题。呼吸变浅。你关掉应用。你又打开，因为不看并没有止住循环。

      LOOP_SEQUENCE: "看到标题。呼吸变浅。关应用。又打开。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Joshin Sensei在年轻人身上见过这一整段循环——警告落下，思绪加速，手机放下，同一股压力又把手指拉回去。
  - id: teacher_witness_02
    line: 他今年在学生身上见过这一序列——读、狂奔、放下、回来。身体与设备重复心尚无法与身份分开的螺旋。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 青年组织者在举办同伴圈、组织倾听培训，并推动学校把心理支持当作基础设施，而非私人软弱。
  - id: turnaround_02
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: 年轻人在建设同伴支持、组织运动与改善可及，并记录当螺旋开始占据房间时真正有效的东西。
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. 追踪器衡量同伴圈与运动，却没有一栏记录「又一周过载之后，下一次诚实伸手何以可能」——让风暴真实却不让它成为身份的明晰。放下手机又拿起的人需要它。Joshin Sensei所承真言传统为之有名：风暴终究抹不掉的本具觉悟本性。
  - id: bridge_02
    line: 心理健康追踪器统计项目与等待时间，却不统计让年轻人把过载与自我分开、使身、语、意回到同一动作的内在对齐。下一任同伴支持者需要它，重新打开应用的读者也需要它。Joshin Sensei的传统已实践逾千年。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Joshin Sensei所见
    paragraphs:
    - 'Joshin从区分开始：在真言中，意识大于穿过它的风暴。理具成佛意味着本具的觉悟价值本已在场。强度是真实的，却不是自我的最终名字。'
    - 因此他的教导不以压抑为目标，而以足够的对齐——身、语、意——使心不再把每一次涌动当作身份，而把它读作压力下的过载。
    - 再框架要紧。像「我有问题」这种感受，常常是对任何神经系统都不该常态化的速度与体系的准确反应。修法是回到从未坏掉的那个动作。
  - id: teacher_perspective_02
    header: Joshin Sensei所见
    paragraphs:
    - 'Joshin Sensei以三密（Sanmitsu）读心理超载：心狂奔时，身与语随之而动。第一步不是想通，而是把三密——手印、真言、观想——收回一处，给风暴一个容器。'
    - '即身成佛（Sokushin Jobutsu）在此适用：此身、此刻可以是清明的场。螺旋不是你有缺陷的证明，而是体系正在压垮修法所要守护的容量的证明。'
    - 在这一框架下，自责会软化。问题不是年轻人太敏感，也不是你感受过载错了，而是制度与结构要求个人背负超过一副神经系统应承载的东西。真言给出在此身中守住底线的方法。
practice:
  options:
  - id: practice_01
    display_name: 五分钟三密过载重置
    announcement_line: Joshin Sensei教授五分钟「三密过载重置」，用于狂奔的思绪开始占据房间的时刻。在侧栏，计时且直接。
    relief_lines:
    - 压力不再给整个自我命名。
    - 足够稳定回来，支撑下一次诚实行动。
  - id: practice_02
    display_name: 三密对齐
    announcement_line: Joshin Sensei教授五分钟「三密对齐」，用于螺旋已在运转的时刻。在侧栏，深夜之后或下一件义务之前都够用。
    relief_lines:
    - 身、语、意回到同一动作。
    - 风暴仍在，但不再占有身份。
sdg:
  primary:
    title: 良好健康与福祉
    line: 联合国通过SDG 3及其健康与福祉目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: 'Active Minds与Born This Way Foundation都面向青年提供入口。入口: https://www.activeminds.org'
  - id: cta_02
    line: 若下一步不是那边，Born This Way Foundation在同一空间侧重善意与心理健康，入口为加入其网络。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 青年过载在听起来像自我时变得危险。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: Joshin Sensei点出风暴与能承载它的清明之间的裂隙。
    - id: headline_layer_2_02
      line: Joshin Sensei透过身、语、意读心理超载，并指出此身能做什么。
