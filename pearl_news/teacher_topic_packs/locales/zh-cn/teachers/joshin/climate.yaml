hook_personal:
  options:
  - id: hook_personal_01
    line: 你对地球比以往任何时候都更关心，却常常觉得没法把下一个数字看久一点，好决定该做什么。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 一代人可以既见多识广、道德上严肃，又会在每一次更新都像证明「机构等得太久」时，失去日常的行动力。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei（真言密教传承的真言教师）在实修场所见过气候新闻对年轻人意味着什么。学生不问如何感到平静，而问在世界不断拿出「成年人等得太久」的证据时，如何把身、语、意对齐到足以行动。
  - id: teacher_intro_02
    line: Joshin Sensei（真言佛教教师）在实修里见过气候恐惧先以道德严肃出现，再以注意力涣散出现。年轻人不问危机是否真实，而问在每一次更新都可能把人扯开时，如何把身、语、意收回同一个动作。
youth_somatic:
  options:
  - id: climate_threshold_phone_01
    line: '你在群聊里读到更新。胸口发紧。你关掉应用。你又打开，因为不看并不会让数字变得不真实。

      LOOP_SEQUENCE: "读更新。胸口发紧。关应用。又打开。"'
  - id: climate_threshold_phone_02
    line: '你在课前看到新的阈值。喉咙发紧。你把手机扣在桌上。你又拿起来，因为未来不会等你准备好。

      LOOP_SEQUENCE: "看到阈值。喉咙发紧。扣下手机。又拿起。"'
teacher_witness:
  options:
  - id: mirrored_loop_01
    line: Joshin Sensei今年在学生身上见过这一整段循环——读、发紧、关掉、再回来。
  - id: mirrored_loop_02
    line: 他见过年轻人重复这一序列——数字到来，身体收缩，手机放下，心思又回去，因为现实仍在。
turnaround:
  options:
  - id: youth_action_climate_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 学生与青年联盟在培训同伴、开展运动，并推动官员回应公共目标与现实生活之间的落差。
  - id: youth_action_climate_02
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: 年轻组织者仍在立案、办工作坊并记录地方损失，即便国家政府的动作仍慢于升温。
bridge:
  options:
  - id: tracker_capacity_01
    line: 2,666 cases. 51 jurisdictions. 追踪器衡量年轻人做了什么，却没有一栏记录「又一次拖延之后，下一次提交何以可能」——在体系持续不回应时，仍能再次把身、语、意对齐到足以行动。提起下一案的组织者需要它；读了更新、关掉应用又打开的人也需要它。Joshin Sensei所承真言传统用一千多年培育这种对齐。
  - id: tracker_capacity_02
    line: 气候追踪器统计案件、目标与阈值，却不统计让年轻人能在又一次制度拖延之后仍与真相保持接触、再次行动的内在容量。下一任组织者需要它，重新打开应用的读者也需要它。Joshin Sensei的传统称之为三密（Sanmitsu），并可在此身、此刻取用。
teacher_perspective:
  options:
  - id: sokushin_sanmitsu_01
    header: Joshin Sensei所见
    paragraphs:
    - '真言对这种压力有精确的框架：即身成佛（Sokushin Jobutsu）——就在此身成佛。读气候更新的身体并没有失灵，而是在准确感知安抚与现实之间的错位。传统不要求你离开此身去寻找平安，而要求你把此身作为清明与行动的场。'
    - 'Joshin将其与三密并提：身（手印）、口（真言）、意（观想）同时对齐。当气候新闻打散注意时，实践不是「想通」，而是把三者收回同一个动作。这种再对齐使下一次行动成为可能。'
    - '这里的转折很重要：像「我坏了、错了」这种感受，常常是对被拖延塑造的制度与结构的准确反应。当心灵看见真正的失序在外部时，便不再把自己叫作坏的，身体则成为秩序可以回来的第一处。'
  - id: sokushin_sanmitsu_02
    header: Joshin Sensei所见
    paragraphs:
    - Joshin Sensei以理具成佛（Rigu no Jobutsu）——本具的觉悟价值——来读气候恐慌。你感到的紧迫不是错误信号，而是始终在那里的清明在对危险作出回应。
    - 由此转向三密。问题不是如何全天平静，而是当下一次更新落下时，如何把身、语、意对齐，使注意不被无助的重复耗尽。
    - 在这一框架下，自责会软化。问题不是年轻人在乎太多，也不是你感受错了，而是制度与结构把难以承受的拖延外包给个人的神经系统。真言给出在此身中守住底线的方法。
practice:
  options:
  - id: sanmitsu_01
    display_name: 三密对齐
    announcement_line: Joshin Sensei教授五分钟「三密对齐」，用于气候信息不断打散身、语、意的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 心不再把每一次更新都当作行动无用的证明。
    - 身、语、意回到同一动作，再次行动的能力随之回来。
  - id: sanmitsu_02
    display_name: 三密对齐
    announcement_line: Joshin Sensei教授五分钟「三密对齐」，用于气候数字变成关闭的时刻。在侧栏，课前、刷完屏或下一场会前都够用。
    relief_lines:
    - 身体不再把每一次更新都变成全面崩溃。
    - 足够对齐回来，支撑下一次真实行动。
sdg:
  primary:
    title: 气候行动
    line: 联合国通过SDG 13及其气候教育与韧性目标，为这一落差提供了框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: youngo_01
    line: 'The Climate Reality Project与YOUNGO都面向青年提供入口。入口: https://youngoclimate.org'
  - id: una_usa_01
    line: 若下一步不是那边，UNA-USA在同一框架下从地方到全球开展工作。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
    - id: threshold_warning_01
      line: 1.55°C不再只是预警。
  headline_layer_2:
    options:
    - id: shingon_attention_01
      line: Joshin Sensei点出气候压力正对Z世代的注意做什么——以及此身能做什么。
    - id: shingon_alignment_01
      line: Joshin Sensei把气候痛苦读成对齐身、语、意的召唤，而非软弱证明。
