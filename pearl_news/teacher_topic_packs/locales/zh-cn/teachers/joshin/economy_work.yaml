hook_personal:
  options:
  - id: hook_personal_01
    line: 每一次排班变动都逼你把不确定当成成熟。你一直在撑，也知道背后有多少看不见的努力。
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 经济压力如今落在不稳定条件下的自我管理：保持可雇佣、保持灵活、保持冷静，并表现得像体系在公平回报努力。
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei（真言密教传承的真言教师）在实修里见过年轻人把工作不稳定当成对品格的判决。他们不只问如何更努力，而问如何把波动从自责里拆出来，以及在日程不停变化时如何把身、语、意对齐到足以行动。
  - id: teacher_intro_02
    line: Joshin Sensei（真言佛教教师）在实修场所见过不稳定工作对年轻人意味着什么。学生与工人不问努力是否重要，而问在体系拒绝静止时，如何稳到足以迈出下一步。
youth_somatic:
  options:
  - id: youth_somatic_01
    line: '你查看排班应用。胃一沉。你又刷新。然后在班次从脚下滑走之前截图。

      LOOP_SEQUENCE: "查了应用。胃一沉。又刷新。截了图。"'
  - id: youth_somatic_02
    line: '你打开排班表。下颌发紧。你刷新。然后截图，因为现实一直在动。

      LOOP_SEQUENCE: "打开名单。下颌发紧。刷新。截图。"'
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Joshin Sensei在学生与年轻工人身上见过这一整段工作循环——查看、下沉、刷新、试图用截图钉住一瞬间的事实。
  - id: teacher_witness_02
    line: 他在实修场所见过这一序列——应用打开，身体反应，手指刷新，截图钉住制度不愿固定的东西。
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 年轻工人与学生工人在记录条件、立案并改变地方劳动规则。
  - id: turnaround_02
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: 青年在组织并举办工作坊，争取稳定排班、公平薪酬，以及不把波动当作品格考验的环境。
bridge:
  options:
  - id: bridge_01
    line: 1,240 cases. 32 cities. 追踪器衡量年轻工人挑战了什么，却没有一栏记录「又一个不稳定的一周之后，下一次提交或排班谈判何以可能」——不把不稳定当成身份、仍能行动的能力。截图的人需要它。Joshin Sensei所承真言传统为条件变动之后仍存者有名：理具成佛（Rigu no Jobutsu），本具的觉悟价值。修法是在此身、在压力下守护它。
  - id: bridge_02
    line: 劳动追踪器统计案件与政策胜利，却不统计让年轻人能在下一次班次或会议露面、而不把整个自我价值交给日程的内在对齐。下一案需要它，刷新应用的工人也需要它。Joshin Sensei的传统已实践逾千年。
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: Joshin Sensei所见
    paragraphs:
    - Joshin先区分不稳定与身份。在真言中，理具成佛意味着觉悟本性本已在此，不由稳定雇佣创造，也不因糟糕排班而消灭。痛苦在变动条件被内化为个人失败的证明时加剧。
    - 此处的三密不是拼命话术，而是在世界不停变动时把身、语、意收回同一动作，使下一手可能而不让整个自我坍进波动里。
    - '再框架因此更精确：像「我坏了、错了」这种感受，常常是对建立在不稳定之上的经济的准确反应。问题是制度与结构不断把个人独自背负的东西生成出来。修法是把此身作为稳定的场，而非责备的场。'
  - id: teacher_perspective_02
    header: Joshin Sensei所见
    paragraphs:
    - Joshin Sensei以即身成佛（Sokushin Jobutsu）读工作不稳定——就在此身成佛。找不到稳定的工人并非有缺陷。此身、此刻仍可是尊严与行动相遇之处，无论日程下一步如何。
    - 由此转向三密。问题不是永远消除应用更新时的下坠感，而是如何把身、语、意对齐，使下一手仍是你的——立案、出勤，或只是把呼吸从波动里抽离而不把它当成身份。
    - 在这一框架下，自责会软化。问题不是年轻人缺乏韧性，也不是你感受不稳定错了，而是经济作为体系把不稳定外包给个人的神经系统。真言给出在此身中守住底线的方法。
practice:
  options:
  - id: practice_01
    display_name: 五分钟三密稳住
    announcement_line: Joshin Sensei教授五分钟「三密稳住」，用于工作不稳定开始覆盖明晰的时刻。在侧栏，下次班次前或又一次日程冲击后都够用。
    relief_lines:
    - 压力不再给整个自我命名。
    - 足够稳定回来，支撑下一次诚实行动。
  - id: practice_02
    display_name: 三密对齐
    announcement_line: Joshin Sensei教授五分钟「三密对齐」，用于日程刚又改变、身体还在追赶的时刻。在侧栏，计时并逐步说明。
    relief_lines:
    - 身、语、意回到同一动作。
    - 下一手可能在而不崩溃。
sdg:
  primary:
    title: 体面工作和经济增长
    line: 联合国通过SDG 8及其体面工作与经济增长目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News是独立非营利机构，与联合国无隶属关系。
cta:
  options:
  - id: cta_01
    line: '国际劳工组织与青年劳动权利团体都提供进入这一工作的入口。入口: https://www.ilo.org/global/topics/youth-employment'
  - id: cta_02
    line: UNA-USA在地方到全球层面以同一框架推进体面工作与SDG 8。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
    - id: headline_layer_1_01
      line: 工作不稳定正在侵蚀的不只是工资。
  headline_layer_2:
    options:
    - id: headline_layer_2_01
      line: Joshin Sensei把经济不稳定与本具价值分开。
    - id: headline_layer_2_02
      line: Joshin Sensei点出日程不停变化时，身、语、意能做什么。
