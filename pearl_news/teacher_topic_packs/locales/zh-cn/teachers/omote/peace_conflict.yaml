hook_personal:
  options:
    - id: hook_personal_01
      line: 你能感到公共暴力经由一条通知渗入私人生活。身体比语言更早知晓——而当所见从未被诚实面对时，鬼（oni）便会滋长。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 冲突新闻不只是地缘政治。它关乎注意力、睡眠与道德严肃性能否保持完整，也关乎集体未被面对的悲伤与羞耻之鬼（oni），将以更多暴力显现，还是以净化显现。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Omote Sensei传授日本圣性生活与净化之道，在实修中见过冲突压力如何落在年轻人身上。他们不问世界是否危险，而问如何以大和心（Yamato-gokoro）的分量抱住所见——既不麻木，也不表演愤怒。
    - id: teacher_intro_02
      line: Omote Sensei立足于日本传统。他在闭关场所见到学生与年轻人已背负着冲突预警而来；传统认为鬼（oni）不仅属于个人，更属于集体——当共同体或国家未能诚实面对悲伤、羞耻与责任时，鬼在集体层面滋长，并以攻击与暴力外显。和平工作始于净化。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |-
        你读到冲突预警。胸口发紧。你停了一瞬。又因危险真实、视而不见并不能改变任何事，而再次查看。
        LOOP_SEQUENCE: "read the alert. chest tightened. stopped for a second. checked again."
    - id: youth_somatic_02
      line: |-
        你在群聊里看到更新。下颌与呼吸锁住。你放下手机。现实仍在，于是你又拿起。
        LOOP_SEQUENCE: "saw the update. jaw and breath locked. put the phone down. picked it up again."
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Omote Sensei在年轻人身上见过这一循环——预警抵达、身体收缩、时间停驻一瞬，注意力又因现实仍在而返回。日本传统不将其病理化，而称之为大和心（Yamato-gokoro）所要求的见证之重：抱住所痛而不移开目光，并以净化使人能再度行动而不被吞噬。
    - id: teacher_witness_02
      line: 他也观察这一序列——通知到达、胸或下颌绷紧、设备放下，心智又折返。传统认为和平工作始于集体内心之苦的净化：并非假装其不存在，而是创造可诚实面对并释放的条件。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 676 million women and girls. 50 kilometers from active conflict.
      stat_line_2: 年轻人在记录伤害、组织联盟并举办工作坊，即便制度断裂仍从事和平与问责工作。
    - id: turnaround_02
      stat_line_1: 676 million women and girls. 50 kilometers from active conflict.
      stat_line_2: 青年和平建设者举办工作坊、组织联盟并记录案例，将净化与服务纳入对冲突的回应。
bridge:
  options:
    - id: bridge_01
      line: 6.76亿妇女与女童。距活跃冲突50公里。追踪器衡量暴露、流离与制度崩解，却没有一栏计量：在又一次预警之后，要再次保护他人、说出真相或行动，需何种内在容量来面对并释放所累积的悲恸、愤怒与无力。再次查看的人需要那种容量。Omote Sensei的传统数代以来践行净化，并教导助人即救己。
    - id: bridge_02
      line: 数字衡量伤害与应对，却不衡量：当年轻人终于拥有直面集体鬼（oni）的实践——不以否认而以仪式与共同体条件诚对悲伤、羞耻与责任并释放——会发生什么。下一任保护者或见证者需要那种容量。Omote Sensei的传统认为，冲突在各方相信生存必须以贬抑他者为代价时延续，而该信念本身即是鬼；真正的安全来自净化与服务。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Omote Sensei所见
      paragraphs:
        - Omote Sensei不会劝年轻人“冷静”，仿佛恐惧才是错误。鬼（oni）不仅是个人层面的内在之苦，更是集体的：当共同体或国家未能诚实面对悲伤、羞耻与责任，鬼在集体层面滋长，表现为攻击、替罪与最终暴力。传统认为和平工作始于集体内心之苦的净化——不是假装其不存在，而是在仪式与共同体中创造可诚实面对并释放的条件。
        - 由此转向大和心（Yamato-gokoro）——对痛苦不背过脸去的诚心。在武装冲突语境中，目睹暴力与不公的年轻人被要求既不麻木也不表演愤怒，而是以完整的道德情感抱住所见。传统区分使循环延续的反应，与创造转化条件的诚恳见证。
        - 这意味着：感到“我有毛病——我坏了、被暴力搞糊涂了”往往是对从未被诚实净化的冲突体系与制度的准确回应。传统的洞见是，该信念本身即是鬼；真正的安全不来自击败他者，而来自消解自利与集体福祉边界的践行服务。
    - id: teacher_perspective_02
      header: Omote Sensei所见
      paragraphs:
        - 在Omote Sensei的传统中，对冲突的恐惧不仅属于个人，也属于集体。未被面对的悲伤与羞耻所滋长的鬼（oni），若不经净化，将以暴力外显。传统并非要求你停止感受，而要求你面对——于己于集体——所累积者，并创造可释放的条件。
        - 此处的净化并非魔法抹除。它是经由水、风、仪式与呼吸恢复明晰的诚实纪律。当年轻人获得以诚实而非否认或表演来面对集体鬼（oni）的实践时，足以保护他人或说出真相的功能性容量方可出现。
        - 在此框架下，自责缓和。过错不在你——非破碎的自我，非糊涂的见证。问题在于制度与政策结构长期承载未被净化的内心之苦。Omote Sensei的传统提供该实践，以及“助人终救己”的教导。
practice:
  options:
    - id: practice_01
      display_name: 净化与服务实践
      announcement_line: Omote Sensei教授四分钟的「净化与服务实践」，用于冲突预警不断把真实的恐惧推向全面关闭的时刻。内容在侧栏，简短，可在日常生活中使用。
      relief_lines:
        - 所累积者可被面对并释放。
        - 足以支撑下一步诚实行动的稳定感会回来。
    - id: practice_02
      display_name: 净化与服务实践
      announcement_line: Omote Sensei教授四分钟的「净化与服务实践」，用于预警已至、须面对而非否认集体鬼（oni）之时。内容在侧栏，短到可在下次查看前后使用。
      relief_lines:
        - 鬼（oni）以诚实观照相会，而非以否认。
        - 服务他人亦恢复服务者自身。
sdg:
  primary:
    line: 联合国通过可持续发展目标16及其和平、正义与强韧机构相关目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News为独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: cta_01
      line: 若你关注此议题，UNA-USA在地方至全球层面设有项目。入口：加入其网络或参与地区青年和平建设。
    - id: cta_02
      line: 青年和平建设与问责网络在地方与国际层面均提供入口。入口：UNA-USA或你所在地区的组织。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 冲突预警正在改写日常生活。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 一位日本传统教师点出：在保持真实而不崩溃的斗争，以及和平工作必须净化的鬼（oni）。
      - id: headline_layer_2_02
        line: Omote Sensei将冲突压力读作集体与个人的内在之苦，并以净化与服务作为回应。
