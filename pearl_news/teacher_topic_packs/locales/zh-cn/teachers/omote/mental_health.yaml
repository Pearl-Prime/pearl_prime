hook_personal:
  options:
    - id: hook_personal_01
      line: 在任何人命名之前，你已知晓那条螺旋。你仍把日子撑过去，同时对能否诚实面对内在正在发生的事，少了几分把握。
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: 青年心理过载不只是症状问题。它关乎压力若从未被诚实面对会发生什么，以及当没有净化实践被提供时，内苦（鬼／oni）如何滋长。
teacher_intro:
  options:
    - id: teacher_intro_01
      line: Omote Sensei传授日本圣性生活与净化之道，在实修中见过这种压力如何落在表面仍“正常”的年轻人身上。他们不问如何被激励，而问如何面对所累积者——压垮、羞耻或绝望的鬼（oni）——而不被其摧毁。
    - id: teacher_intro_02
      line: Omote Sensei立足于净化与大和心（Yamato-gokoro）的日本传统。他在实修中见到学生把心理过载当作沉积的残渣；传统认为鬼（oni）因未被照料之事而起，净化是以诚实与关怀照料它的实践。
youth_somatic:
  options:
    - id: youth_somatic_01
      line: |-
        你在深夜读更新。思绪加速。你放下手机。又因螺旋已在运转而再次拿起。
        LOOP_SEQUENCE: "read the update. mind sped up. put the phone down. picked it up again."
    - id: youth_somatic_02
      line: |-
        你在群聊里看到预警。胃一沉。你关掉应用。又因不看并不能让感受消失而再次打开。
        LOOP_SEQUENCE: "saw the warning. stomach dropped. closed the app. opened it again."
teacher_witness:
  options:
    - id: teacher_witness_01
      line: Omote Sensei在学生身上见过这一循环——预警抵达、思绪加速、手机放下，又因同一压力而注意力折返。日本传统不将其病理化，而称之为：当艰难未被诚实面对时便会滋长的鬼（oni）。
    - id: teacher_witness_02
      line: 他也观察这一序列——更新落下、身体收缩、设备放下，螺旋仍在继续；传统深知：鬼（oni）不是要消灭的敌，而是要净化的境况。
turnaround:
  options:
    - id: turnaround_01
      stat_line_1: 320 campuses. 18 countries.
      stat_line_2: 青年组织者举办同伴小组、组织倾听者培训，并推动学校将心理支持视为基础设施而非私人弱点。
    - id: turnaround_02
      stat_line_1: 320 campuses. 18 countries.
      stat_line_2: 年轻人在举办工作坊与运动，学生与青年教育工作者正在建立同伴支持、更健康的时间表，以及把诚实面对与释放纳入对话的空间。
bridge:
  options:
    - id: bridge_01
      line: 320所高校。18个国家。追踪器衡量年轻人建立的工作坊与同伴圈，却没有一栏记录：又一周过载之后，下一次诚实伸手何以可能——面对所累积并以诚实实践释放的容量。开启下一个圈子的学生需要它。放下手机又拿起的人也需要它。Omote Sensei的传统数代践行净化。
    - id: bridge_02
      line: 数字衡量项目与外展，却不衡量：当年轻人终于拥有面对鬼（oni）的实践——不是当作要摧毁的敌，而是当作要净化的条件——会发生什么。下一个同伴圈需要那种容量。身处螺旋中的人也需要。Omote Sensei的传统称之为净化：经由水、呼吸、仪式与有意之静，恢复明晰的诚实纪律。
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: Omote Sensei所见
      paragraphs:
        - Omote Sensei不会先称心智有缺陷。他先命名鬼（oni）——当悲恸、愤怒或羞耻未被面对时扎根的内在之苦。对把心理痛苦感受为根本性破损的年轻人，传统给出另一框架：鬼（oni）因未被照料之事而起，净化是以诚实与关怀照料它的实践。
        - 由此转向大和心（Yamato-gokoro）——诚恳的日本心。它不是经由自我改善达成，而是经由对自己、共同体与祖先保持诚信的日常实践而养成。对被社交媒体上的“真实表演”侵蚀心理健康的年轻人，大和心（Yamato-gokoro）提供的标准关乎真正如此，而非看似如此。
        - 这一转向事关重大：感到“我有问题”常常是人对本不该被制度常态化的条件的准确回应。实践不是惩罚自我，而是净化所累积，使人能从明晰处再度行动。
    - id: teacher_perspective_02
      header: Omote Sensei所见
      paragraphs:
        - 在Omote Sensei的传统中，净化并非对不洁的惩罚。它承认生活累积残渣——情绪、关系、灵性——而内在生活如身体一样需要定期涤除。背负数字过载、信任破裂与未消化经验的年轻人，需要的不仅是诊断，更是传统一向提供的那种释放实践。
        - 鬼（oni）不仅属于个人。它在艰难从未被诚实面对之处滋长。保护年轻人免于失败与不适的教育与制度并不培养韧性；它们培养的是首次遭遇真正艰难时因从未培养面对实践而鬼（oni）被激活的成人。
        - 在此框架下，自责缓和。问题不是年轻人“坏了”，而是制度结构让身心背负累积却未留净化实践。Omote Sensei的传统提供该实践。
practice:
  options:
    - id: practice_01
      display_name: 净化与服务实践
      announcement_line: Omote Sensei教授四分钟的「净化与服务实践」，用于心理过载开始占据整个房间的时刻。内容在侧栏，简短，可供深夜、课前或螺旋之后使用。
      relief_lines:
        - 所累积者可被面对并释放。
        - 足以支撑下一步诚实行动的明晰会回来。
    - id: practice_02
      display_name: 净化与服务实践
      announcement_line: Omote Sensei教授四分钟的「净化与服务实践」，用于螺旋已转、鬼（oni）已扎根之时。内容在侧栏，短到可在需要面对并释放当下之所存时使用。
      relief_lines:
        - 鬼（oni）以诚实观照相会，而非以否认。
        - 心与身体澄清到足以迈出下一步。
sdg:
  primary:
    line: 联合国通过可持续发展目标3及其健康与福祉相关目标，为这一问题提供框架。
  fallback_un_tie:
    line: Pearl News为独立非营利机构，与联合国无隶属关系。
cta:
  options:
    - id: cta_01
      line: Active Minds与Born This Way Foundation均提供面向青年的入口。入口：https://www.activeminds.org
    - id: cta_02
      line: 若下一步不在彼处，Born This Way Foundation在心理健康与青年声音的交叉点从事同类工作。入口：加入其网络。
title_system:
  headline_layer_1:
    options:
      - id: headline_layer_1_01
        line: 当螺旋开始像人格本身。
  headline_layer_2:
    options:
      - id: headline_layer_2_01
        line: 一位日本传统教师在青年过载固化为身份之前将其点明，并命名可被净化的鬼（oni）。
      - id: headline_layer_2_02
        line: Omote Sensei将心理健康压力读作可面对、可释放而非独担的内在鬼（oni）。
