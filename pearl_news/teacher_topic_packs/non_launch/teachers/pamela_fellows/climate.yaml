      display_name: "Heart and Body Check-In"
      duration: "5 minutes"
      announcement_line: "Pamela Fellows teaches a 5-minute Heart and Body Check-In for moments when climate information keeps converting into held tension. It is in the sidebar, timed and step by step."
      relief_lines:
        - "The body stops carrying the whole load alone."
        - "Enough release returns for the next real action."
      relief_register: ["capacity", "release", "act again"]
      derived_from_frame: "heartfulness_embodiment"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: practice_02
      display_name: "Heart and Body Check-In"
      duration: "5 minutes"
      announcement_line: "Pamela Fellows teaches a 5-minute Heart and Body Check-In for when climate numbers turn into shutdown or numbness. It is in the sidebar, short enough to use before class, after scrolling, or before the next meeting."
      relief_lines:
        - "The heart and body are included, not bypassed."
        - "A steadier presence returns for whatever comes next."
      relief_register: ["capacity", "clarity", "act again"]
      derived_from_frame: "heartfulness_embodiment"
      article_types: ["hard_news_spiritual_response", "commentary"]

