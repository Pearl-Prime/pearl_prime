      article_types: ["hard_news_spiritual_response"]
    - id: practice_02
      display_name: "Purification and Service Practice"
      duration: "4 minutes"
      announcement_line: "Omote teaches a 4-minute Purification and Service Practice for when the schedule app and the unstable week have left the inner life in need of purification. It is in the sidebar, brief and structured."
      relief_lines:
