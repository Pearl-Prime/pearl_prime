    - The pattern stops running the whole show.
    - Enough clarity returns to act again.
    relief_register:
    - capacity
    - clarity
    - act again
    derived_from_frame: climate_conditioning
    article_types:
    - hard_news_spiritual_response
  - id: practice_02
    display_name: 5-minute Screen Exercise
    duration: 5 minutes
    announcement_line: Ra teaches a 5-minute Screen Exercise for after the climate
      update hits and you need to return to what you actually know before the next
      conversation or action. The screen becomes the mirror — what is looking is not
      what is seen. It is in the sidebar, timed for the moment between reading and
      closing.
    relief_lines:
    - The tightness moves through instead of cycling.
    - Enough steadiness returns to see what matters and choose it.
    relief_register:
    - capacity
    - clarity
    - choose
    derived_from_frame: climate_conditioning
    article_types:
    - hard_news_spiritual_response
