topic_fit:
  fit_level: primary
  fit_reason: Education pressure fits Ra when young people are run by the pattern that performance equals worth and that pattern makes them lose access to what they actually know. The tradition offers a way to see the conditioning and return to the clarity that lets learning show up again.
  forbidden_angles:
  - do not reduce to generic motivation
  - do not frame academic struggle as personal weakness
diagnostic_frames:
  default_id: performance_conditioning
  options:
  - id: performance_conditioning
    key_term: conditioning
    key_term_gloss: the inherited pattern that says your worth is measured by your grade, your score, your ranking — what the tradition calls misidentification with the body-mind. When that pattern runs, you lose access to what you actually know because awareness is identified with the content of the thought rather than resting as the witness
    diagnosis_line: The body is not malfunctioning; it is accurately running patterns installed long before the stakes of grading became attached to identity.
    self_to_system_reframe: What feels like private inadequacy is often the pattern running; you are the one who can see it and choose from what you actually know instead of what the pattern insists.
    what_normal_analysis_misses: How the performance-worth cycle is conditioning, not character — and how cognitive steadiness and focus return when the pattern is seen clearly.
    youth_specific_tie: Young people under education pressure are often running patterns that convert every evaluation into proof of fundamental worth, and the tradition offers a way to see that pattern and release it.
    approved_quote_lines:
    - you are not the pattern; you are the one who can see it
    - your grade is not a measure of what you actually know
    banned_lines:
    - everything happens for a reason
    - just believe in yourself
hook_personal:
  options:
  - id: hook_personal_01
    line: You get the test result. Your stomach drops. You perform what compliance looks like. Then you check the ranking again because the number did not change and neither did the drop.
    semantic_family: personal-pressure
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: hook_personal_02
    line: The hardest part is not only failing or struggling. It is struggling inside a system that still says your grade proves your worth — and the pattern that converts performance into proof of value is running automatically.
    semantic_family: personal-pressure-alt
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Education pressure is also an order problem: the patterns that run when grades become identity markers are not personal defects. They are what runs when the system has made the stakes too high and awareness has nowhere to land except on the number.'
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_02
    line: Youth education distress is about more than grades. It is about the inherited patterns — the conditioning that says performance equals worth, the reflex to check the ranking again without breaking the cycle of proof-seeking.
    semantic_family: system-pressure-alt
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra, a Bangalore-born teacher in the Advaita Vedanta tradition — steeped in the Upanishads and the inquiry of Ramana Maharshi — has watched in practice sessions young people lose access to what they actually know because the pattern that says their grade proves their worth is running. They are not asking only how to get a better score. They are asking how to see the pattern clearly enough to return to the focus and steadiness that lets learning show up again.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Teacher Ra, from the Advaita Vedanta tradition — who quotes Nisargadatta as easily as he quotes the Bhagavad Gita — has seen in practice sessions in satsang what happens when the grade lands and the old patterns take over — the conditioning that says your score is your worth, the reflex to check and re-check the ranking without returning to what you actually know. They are not asking for encouragement. They are asking how to see the pattern clearly enough to choose a response that comes from what you know rather than what the pattern insists.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You get the test score. Your stomach drops. You perform compliance. Then you check the ranking again because the number did not change and what you know did not return when you looked away.

