    announcement_line: Ra teaches a 5-minute "Not Mine" Drop for after the score or feedback arrives and you need to return to what you actually know before the next study session or classroom moment. Each thought that says the grade is you gets met with "not mine" — and awareness returns. It is in the sidebar, timed for the moment between learning and checking.
    relief_lines:
    - The drop moves through instead of cycling.
    - Enough steadiness returns to see the material clearly and choose to engage.
    relief_register:
