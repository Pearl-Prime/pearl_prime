topic_fit:
  fit_level: primary
  fit_reason: Economic precarity fits Ra when young people are run by the pattern that says if you are struggling financially, something is wrong with you personally — and gig economy forces constant vigilance that the pattern converts into self-blame. The tradition offers a way to see the conditioning and access the capacity to see the system clearly.
  forbidden_angles:
  - do not reduce to generic financial advice
  - do not frame economic struggle as personal weakness
diagnostic_frames:
  default_id: precarity_conditioning
  options:
  - id: precarity_conditioning
    key_term: conditioning
    key_term_gloss: the inherited pattern that says if you are struggling financially, something is wrong with you personally — what the tradition calls misidentification with the body-mind. The vigilance required by precarity converts that pattern into constant self-surveillance because awareness is identified with the role of worker rather than resting as the witness
    diagnosis_line: The body is not malfunctioning; it is accurately running patterns installed long before economic systems created the conditions of volatility and surveillance.
    self_to_system_reframe: What feels like private shame is often the pattern running; you are the one who can see it and choose from dignity instead of self-surveillance.
    what_normal_analysis_misses: How the vigilance-blame cycle is conditioning, not character — and how dignity and clarity about the system return when the pattern is seen clearly.
    youth_specific_tie: Young people navigating economic precarity are often running patterns that convert system-level volatility into personal blame, and the tradition offers a way to see that pattern and release it.
    approved_quote_lines:
    - you are not the pattern; you are the one who can see it
    - economic precarity is not proof that something is wrong with you
    banned_lines:
    - everything happens for a reason
    - just work harder
hook_personal:
  options:
  - id: hook_personal_01
    line: You check the shift app. Your stomach drops. You screenshot before it changes. Then you read the rules again because the shift did not come back and the tightness will not leave.
    semantic_family: personal-pressure
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: hook_personal_02
    line: The hardest part is not only the financial instability. It is the instability inside a system that still blames you for it — and the pattern that says if you are struggling, something is wrong with you personally is running automatically.
    semantic_family: personal-pressure-alt
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Economic precarity is also an order problem: the patterns that run when the gig economy forces constant vigilance are not personal defects. They are what runs when the system has made volatility the expected condition and surveillance the condition of survival.'
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_02
    line: Youth economic distress is about more than money. It is about the inherited patterns — the conditioning that converts precarity into personal blame, the reflex to check and re-check the app without returning to what you actually deserve.
    semantic_family: system-pressure-alt
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ra, a Bangalore-born teacher in the Advaita Vedanta tradition — steeped in the Upanishads and the inquiry of Ramana Maharshi — has watched in practice sessions young people carry economic precarity as if it were proof of personal failure. They are not asking only how to earn more money. They are asking how to see the pattern that converts the gig economy's volatility into self-blame — so they can access the clarity and dignity that lets them see the system clearly.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Teacher Ra, from the Advaita Vedanta tradition — who quotes Nisargadatta as easily as he quotes the Bhagavad Gita — has seen in practice sessions in satsang what happens when the shift cancels or the work dries up and the old patterns take over — the conditioning that says if you are struggling, you are failing, the reflex to check and screenshot and self-surveil without returning to what you actually deserve. They are not asking for reassurance. They are asking how to see the pattern clearly enough to choose a response that comes from dignity rather than shame.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
youth_somatic:
