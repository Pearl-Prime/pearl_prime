    derived_from_frame: precarity_conditioning
    article_types:
    - hard_news_spiritual_response
  - id: practice_02
    display_name: '"Who''s Noticing?" Pause'
    duration: 5 minutes
    announcement_line: Ra teaches a 5-minute "Who's Noticing?" pause for after the shift cancellation or precarity news hits and you need to return to what you actually deserve before the next app check or conversation. One question — who is noticing the shame? — and the spiral pauses. It is in the sidebar, timed for the moment between the trigger and the spiral.
    relief_lines:
