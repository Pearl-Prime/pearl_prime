teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ra has seen this exact loop — the app shows volatility, the stomach drops, the screenshot happens, and the rules are read again because the unresolved shame is still running.
    semantic_family: loop-mirror
    loop_type: vigilance_blame_cycle
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: He has watched that sequence in young people — the check, the drop, the screenshot, the return. The pattern is running; the question is whether you can see it clearly enough to choose something other than the cycle of self-surveillance.
    semantic_family: loop-mirror-alt
    loop_type: vigilance_blame_cycle
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Youth worker organizing is building collective power and system literacy.
    stat_line_2: Young workers are forming gig worker collectives, documenting algorithmic discrimination, and organizing campaigns and hosting transparency about how apps control work. The pattern of individual shame is being interrupted by the pattern of collective power and clear seeing.
    semantic_family: institutional-action
    article_types:
    - hard_news_spiritual_response
  - id: turnaround_02
    stat_line_1: Youth are organizing economic justice and worker dignity movements.
    stat_line_2: Young people are organizing workshops, hosting campaigns, and young people are convening wage-justice circles, mapping precarity across industries, and asking who benefits from the volatility system. The pattern of self-surveillance is being replaced by the pattern of seeing the system clearly and acting collectively.
    semantic_family: institutional-action-alt
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 'Economic trackers measure growth and employment rates. They do not count the capacity to read the shift change, let the drop move through, and return to what you actually deserve — the capacity to see the system clearly and act with others instead of cycling through checking and self-blame. The young worker who will convene the next collective needs it. So does the one who checked the app again because the pattern would not release. Ra''s tradition has been developing that capacity for generations: you are not the gig worker who is failing — you are the unchanging witness in whom the precarity appears. When that is seen, shame loosens and the capacity to act from dignity returns.'
    hidden_capacity: see the pattern and the system; choose from dignity
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: Labor reports count jobs and wages. They do not count the inner capacity that lets a young worker rest in what they actually deserve when the app is trying to convince them that volatility is their fault. That capacity is what the next honest choice needs. It is what the person who took the screenshot and read the rules again needs too. Ra's tradition holds that you were never the pattern — you are the unchanging awareness in which the pattern appears. You are not trying to become worthy. You are trying to stop pretending you are not already the witness of a system that was designed to make you forget that.
    hidden_capacity: rest in what you actually deserve; access the capacity to see systems and choose
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ra Sees
    paragraphs:
    - 'Ra reads youth economic precarity through conditioning: the inherited patterns of thought, emotion, and reaction that run automatically when awareness is elsewhere. The tradition does not pathologize that precarity or the shame it generates; it names what is running. When you see the pattern clearly — the fear that says if you are struggling, something is wrong with you, the reflex to surveil the app without returning to what you deserve — you are not the pattern. You are the one who can see it. That distance is the beginning of the capacity to see the system and choose from dignity.'
    - Integrated awakening means the shift is not a peak experience but something that walks with you into the work itself and the organizing. The question is not how to feel stable all day. The question is how to pause when the volatility hits, name what is running, and choose one response that comes from clarity rather than habit. The tradition holds that trust is the willingness to let go of what the mind insists on and rest in what awareness already knows — in this case, what you actually know about your worth and what fair work requires.
    - That reframe is the beginning of relief. The precarity stops being proof that something is wrong with you and starts being evidence that a pattern is running — the pattern that converts system-level volatility into personal blame. The disorder is not only psychological; it is the gap between an economic system designed for surveillance and precarity and the capacity to see clearly under those conditions. Ra's tradition offers a practice for that gap — not to make the system okay, but to free your own capacity so you can see it clearly and act from dignity.
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Ra Sees
    paragraphs:
    - 'In Ra''s tradition, awakening that is lived and grounded in daily life — not a peak experience but a sustained shift in how you meet reality — is what integration means. Young people navigating economic precarity are often trying to fix at the level of content what can only shift at the level of seeing: the pattern that says if you are struggling, you are broken, that the volatility is your fault, that you have to perform gratitude in the face of unfair conditions. When you see that pattern clearly, it loses its grip.'
    - The tradition distinguishes between what the mind insists on and what awareness already knows. The body that dropped, the app that was checked again and again, the screenshots — that is the pattern running. The one who can notice that is already free of it in that moment. The practice is to return to that noticing, not to fix the pattern by force or bypass it with false optimism about individual hustle.
    - 'In that frame, the distress itself becomes information: accurate response to a system that has made precarity and surveillance the condition of work. Self-blame softens. The problem is not that you are broken. The problem is that the gig economy has been designed to externalize risk to workers and convert that risk into shame. Ra''s tradition gives you a way to see the pattern, name it, and choose one response that comes from what you actually know — one that lets you see the system clearly and act with others from dignity.'
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
