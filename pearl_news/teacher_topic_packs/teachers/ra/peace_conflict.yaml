      display_name: "5-minute Object-Witness Sitting"
      duration: "5 minutes"
      announcement_line: "Ra teaches a 5-minute Object-Witness Sitting for moments when conflict news has taken over the inner field and the old patterns are running the show — sitting with what arises as object while resting as the witness. It is in the sidebar, timed and step by step."
      relief_lines:
        - "The mind stops treating every alert as proof that the whole self is under threat."
        - "Enough clarity returns to see the pattern and choose a response that does not reproduce it."
      relief_register: ["clarity", "capacity", "choice"]
      derived_from_frame: "ubuntu_conditioning"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: integrated_awakening_02
      display_name: "5-minute Object-Witness Sitting"
      duration: "5 minutes"
      announcement_line: "Ra teaches a 5-minute Object-Witness Sitting for the moment when fear has occupied consciousness and you need to return to what awareness already knows. What arises is the object; you are the witness. It is in the sidebar, short enough to use after the alert, before the next conversation, or before sleep."
      relief_lines:
        - "The body stops bracing as if the threat were the only reality."
        - "Enough spaciousness returns for the next clear move."
      relief_register: ["clarity", "spaciousness", "act again"]
      derived_from_frame: "ubuntu_conditioning"
      article_types: ["hard_news_spiritual_response", "commentary"]

