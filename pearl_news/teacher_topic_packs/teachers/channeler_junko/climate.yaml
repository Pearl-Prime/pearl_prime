bridge:
  options:
    - id: junko_climate_bridge_01
      line: "2,666 climate cases. 51 jurisdictions. The tracker measures what young people built. It has no column for what made the next filing possible after the last institutional delay — the capacity to stay receptive to what the soul already knows even when the conscious mind is overwhelmed. That receptivity is what lets a climate organizer file the next case from alignment instead of desperation. It is what the person who read the threshold and closed the app needs too. Junko's tradition calls it receiving practice, and it reaches the part of a person where ecological knowing is already held."
      hidden_capacity: "stay receptive to soul knowing when intellect is overwhelmed"
      semantic_family: "tracker-capacity"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: junko_climate_bridge_02
      line: "Climate trackers count cases, targets, and megawatts. They do not count the capacity to receive what the deeper self already knows about ecological rupture — the knowing that exists beneath analysis and can guide action even when the conscious mind is running in circles. That receptivity is what the next young organizer needs. It is what the reader who reopened the feed needs too. Junko's tradition works directly with this intelligence: light language and transmission that reach the parts of a person where the soul is still listening."
      hidden_capacity: "receive soul knowing as guidance for action"
      semantic_family: "tracker-capacity-alt"
      article_types: ["hard_news_spiritual_response", "commentary"]

teacher_perspective:
  options:
    - id: junko_climate_perspective_01
      header: "What Junko Sees"
      paragraphs:
        - "The soul carries memory the conscious mind has lost access to. Much of what young people experience as climate anxiety is not psychological disorder. It is the friction between surface reassurance and what the deeper self already knows. The reframe is simple: your body is not broken. Your soul is holding what needs to be held."
        - "Light language works through vibrational resonance rather than conceptual meaning. For young people whose intellect has been talked at without relief, the tradition offers direct contact with the part of them where ecological knowing already lives. Opening that channel changes everything about how the next decision is made."
        - "Planetary transition means heightened sensitivity in young people is not pathology but recalibration. What feels like a fault in me — broken, confused, wrong — is instead the soul accurately responding to a system and institutional structure that refuses to match its words with action. The answer is reception — learning to listen to what the deeper self is already saying."
      semantic_family: "soul_climate_reframe"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: junko_climate_perspective_02
      header: "What Junko Sees"
      paragraphs:
        - "Junko reads climate tightness through the lens of soul memory. What young people are holding in their bodies is not personal inadequacy. It is the soul's accurate response to ecological rupture that the institutions around them refuse to acknowledge."
        - "The tradition teaches that the body knows first. When climate data lands, the body has already received the information at a level deeper than thinking. The question is not how to calm that response. The question is how to become fluent in what it is saying."
        - "This reframe dissolves shame. What feels like a personal fault — myself broken, confused by the weight — is instead an accurate response to a system and policy structure that keeps treating the soul's knowing as noise instead of intelligence. Junko teaches a practice of receiving that turns that intelligence into capacity for what comes next."
      semantic_family: "soul_climate_reframe_alt"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]

