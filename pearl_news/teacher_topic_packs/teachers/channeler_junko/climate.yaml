topic_fit:
  fit_level: primary
  fit_reason: "Climate distress is the soul's response to ecological rupture that the conscious mind cannot process. The body's reaction to climate data is the deeper self recognizing what the intellect cannot yet hold. Junko's tradition works directly with that knowing."
  forbidden_angles:
    - "do not reduce to eco-anxiety management"
    - "do not frame the body's response as personal weakness"

hook_personal:
  options:
    - id: hook_personal_01
      line: "You read the new climate threshold and felt something beneath your thinking shift. Your conscious mind wanted to problem-solve. Something deeper was already grieving what was already gone."
      semantic_family: "soul-intellect-split"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
    - id: hook_personal_02
      line: "You saw the forecast and your whole body tightened before your mind could catch up. The deeper part of you already knew what the numbers meant. The part that thinks is still trying to keep up."
      semantic_family: "soul-knowing-first"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response"]

hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: "Young people sense climate rupture at a level deeper than their conscious understanding. Their bodies are responding to ecological signals that the intellect has not yet processed. This is not anxiety. This is the soul holding what the thinking mind cannot yet carry."
      semantic_family: "soul-ecological-witness"
      angle: "soul-first-knowing"
      article_types: ["hard_news_spiritual_response"]
    - id: hook_big_picture_02
      line: "The friction between what institutions keep saying about climate and what the deeper self already knows creates a pressure that closes down the body. Young people are not overreacting. They are under-resourced in how to receive what their soul is already trying to tell them."
      semantic_family: "soul-resource-gap"
      angle: "reception-capacity"
      article_types: ["hard_news_spiritual_response"]

teacher_intro:
  options:
    - id: teacher_intro_01
      line: "Channeler Junko, a teacher of Japanese channeling and light-language spirituality, has watched in retreat sessions what climate distress does to young people — both real suffering and something her tradition names precisely: the soul's response to ecological rupture that the conscious mind has not yet processed. In Junko's framework, the deeper self carries ecological knowing the intellect cannot access. Light language reaches the parts of a person where this knowing is already held."
      semantic_family: "identity_seen_shift"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_intro_02
      line: "Channeler Junko, a practitioner in the Japanese channeling tradition, has seen in practice sessions what climate data triggers in young people — something beyond fear. The soul recognizes the rupture before the thinking mind can process it. Her tradition does not ask them to calm down. It asks them to receive what the deeper self already knows, and let that knowing guide what becomes possible."
      semantic_family: "identity_seen_shift_alt"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response", "commentary"]

