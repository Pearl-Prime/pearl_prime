bridge:
  options:
  - id: junko_mh_bridge_01
    line: '320 campuses. 18 countries. The tracker measures the workshops and peer
      circles young people built. It has no column for what made the next honest reach-out
      possible - the capacity to receive guidance when the mind has been talked at
      by therapists, algorithms, and self-help content without relief. Junko''s tradition
      offers a different mode of contact: one that bypasses the exhausted intellect
      and speaks directly to the energetic body where distress is actually held.'
    hidden_capacity: receive when the intellect is exhausted
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: junko_mh_perspective_01
    header: What Junko Sees
    paragraphs:
    - The soul carries memory that the conscious mind has lost access to, and much
      of what young people experience as anxiety or depression is the friction between
      what they are told they should want and what their deeper nature already knows.
      Healing begins when that larger self is acknowledged rather than medicated into
      silence.
    - Light language works not through conceptual meaning but through vibrational
      resonance - it reaches the parts of a person that words cannot access. For young
      people who have been talked at without relief, the tradition offers a different
      mode of contact that bypasses the exhausted intellect.
    - Planetary transition means that heightened sensitivity in young people is not
      pathology but recalibration. The reframe does not remove the pain, but it removes
      the additional burden of believing the pain means something is wrong with you
      within a system and institutional structure that was never designed for what
      it demands.
    metadata:
      semantic_family: soul_remembrance_reframe
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
