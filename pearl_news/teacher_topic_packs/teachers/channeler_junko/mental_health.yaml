teacher_witness:
  options:
  - id: junko_mh_witness_01
    line: Junko has seen this exact loop in those who come to receive. In her framework
      that pressure is not character; it is the soul asking to be heard when the intellect
      is exhausted.
    metadata:
      semantic_family: loop-mirror
      loop_type: midnight_spiral
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: junko_mh_turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: Youth organizers are hosting peer circles, organizing listener training,
      and forcing schools to treat mental health support as infrastructure, not private
      weakness.
    metadata:
