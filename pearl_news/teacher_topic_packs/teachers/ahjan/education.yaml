teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ahjan, a Theravada Buddhist teacher, has watched in practice sessions this pressure land on young people. Students are not asking how to stay inspired anymore. They are asking how to stay functional while the pressure keeps arriving on schedule.
    semantic_family: ahjan-education-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You open the assignment portal. Focus breaks. You switch away. Then you come back because the work is still there. LOOP_SEQUENCE: "opened the portal. focus broke. switched away. came back."'
    loop_type: pressure_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ajahn Ahjan has seen this exact loop -- the portal opening, the break in focus, the switch away, and the return because the work still remains.
    semantic_family: ahjan-education-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: Students and educators are building study supports, healthier schedules, and classroom reforms that protect attention instead of merely organizing campaigns and hosting it.
    semantic_family: ahjan-education-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. The tracker measures what young people did. It has no column for what made the next step possible after another delayed or broken response -- the capacity to return to the work without turning fragmentation into identity. The person who came back needed it. So does the reader in that loop. Ajahn Ahjan's teaching has language for protecting that capacity.
    hidden_capacity: return to truthful action
    semantic_family: ahjan-education-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ajahn Ahjan Sees
    paragraphs:
    - Ajahn Ahjan would begin with accurate contact. The body is not malfunctioning when it reacts to real pressure; it is often perceiving a mismatch between official reassurance and lived reality.
    - He pairs that recognition with right effort. Right effort is not productivity language. It is the discipline of directing energy where truthful contact and usable action are still possible.
    - 'The reframe matters: what feels like a personal fault — me, broken, wrong — is often accurate response to a system that keeps externalizing delay, strain, and contradiction onto the person.'
    semantic_family: ahjan-education-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Steadying Practice
    duration: 5 minutes
    announcement_line: Ajahn Ahjan teaches a 5-minute Steadying Practice for moments when education pressure starts converting attention into helplessness. It is in the sidebar, timed and practical.
    relief_lines:
    - The mind stops treating the next update as proof that action is pointless.
    - A steadier internal pace returns, and with it the capacity to act again.
    relief_register:
    - capacity
    - clarity
    - act again
