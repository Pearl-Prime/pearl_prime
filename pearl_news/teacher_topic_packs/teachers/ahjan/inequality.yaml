topic_fit:
  fit_level: primary
  fit_reason: 'Inequality lands as bands of awareness collapsing under the daily proof that worth is being economically arbitrated; Tantric mysticism holds that laundry and mountains are equally sacred — a frame that protects inherent worth while the structural work proceeds.'
  forbidden_angles:
  - do not preach acceptance of structural harm as wisdom
  - do not privatize inequality as a personal mindset problem
hook_personal:
  options:
  - id: hook_personal_01
    line: You watch the rent number rise faster than the wage number. You also feel the smaller, quieter drain — the way the gap keeps trying to tell you what you are worth.
    semantic_family: ahjan-inequality-hook-personal
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: hook_personal_02
    line: You keep scrolling job listings between classes. You also know the math — that the wage on offer will not close the gap to the rent on the apartment your parents had at your age.
    semantic_family: ahjan-inequality-hook-personal-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
  - id: hook_personal_03
    line: You compare the price of the textbook to the hours it will take to earn it. The math is fast. The slower thing is what the comparison keeps doing to how you see yourself.
    semantic_family: ahjan-inequality-hook-personal-textbook
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Inequality pressure is not only economic. It is the daily installation of a hierarchy of worth that the institutions perpetuating the gap refuse to name.
    semantic_family: ahjan-inequality-hook-big
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_02
    line: The wealthiest 1% captured nearly two-thirds of new global wealth since 2020. The gap is not narrating itself as a structural arrangement. It is narrating itself as a verdict on the person it falls on.
    semantic_family: ahjan-inequality-hook-big-verdict
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_03
    line: When wages cannot meet rent and student debt grows faster than starting salaries, inequality stops being an economic abstraction. It becomes the daily field in which young people are asked to negotiate with their own sense of inherent worth.
    semantic_family: ahjan-inequality-hook-big-field
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ahjan, a Tantric Buddhist teacher for 25 years, has watched in practice sessions what economic inequality does to young people. Students are not asking for permission to want a fair wage. They are asking how to keep the gap from rewriting their inner sense of worth while the structural fight goes on.
    semantic_family: ahjan-inequality-intro
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_intro_02
    line: Teacher Ahjan, rooted in the Rama lineage and the Tantric synthesis of Karma, Bhakti, and Jnana Yoga, has watched in the practice room what unequal systems install in young bodies. He has heard students name the hourly gap, the housing gap, the inheritance gap — and watched the inner work begin not with denial of the gap, but with refusing the verdict the gap keeps trying to deliver.
    semantic_family: ahjan-inequality-intro-lineage
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_intro_03
    line: Teacher Ahjan has spent 25 years teaching the Tantric recognition that laundry and mountains are equally sacred. In practice sessions he has watched young people receive that teaching in the middle of economic precarity — and seen the moment the hierarchy of worth that inequality installs begins to lose its grip, even before the rent has changed.
    semantic_family: ahjan-inequality-intro-laundry
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You open the rent listing. Your chest tightened. You closed the tab. Then you opened it again because the rent does not get smaller when you stop looking. LOOP_SEQUENCE: "opened the listing. chest tightened. closed the tab. opened it again."'
    loop_type: dignity_drain
    body_register: chest
    digital_behavior: close-return
    article_types:
    - hard_news_spiritual_response
  - id: youth_somatic_02
    line: 'You saw the wealth-share chart in your feed. Your shoulders tightened. You scrolled past it. Then you came back because the chart was still the world. LOOP_SEQUENCE: "saw the chart. shoulders tightened. scrolled past. came back."'
    loop_type: dignity_drain
    body_register: shoulders
    digital_behavior: scroll-return
    article_types:
    - hard_news_spiritual_response
  - id: youth_somatic_03
    line: 'You compared paychecks with a friend in the group chat. Your throat tightened. You stopped typing. Then you sent the message anyway because pretending it was equal was its own kind of harm. LOOP_SEQUENCE: "compared the paychecks. throat tightened. stopped typing. sent the message."'
    loop_type: dignity_drain
    body_register: throat
    digital_behavior: pause-return
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ahjan has seen this exact loop in practice rooms — the chart, the tightening, the look away, and the return because the arrangement is still there when attention comes back.
    semantic_family: ahjan-inequality-witness
    loop_type: dignity_drain
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: He has watched young people sit with the same gesture across years of teaching — reading the number, feeling the body register the verdict, naming it, and then refusing to be the verdict. The Tantric tradition has language for that refusal.
    semantic_family: ahjan-inequality-witness-refusal
    loop_type: dignity_drain
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_03
    line: Ahjan has watched students arrive at the practice room with the gap already running through their sense of who they are. The first thing the room offers is not consolation. It is the disciplined recognition that the verdict the gap delivers is not the same thing as the gap itself.
    semantic_family: ahjan-inequality-witness-discipline
    loop_type: dignity_drain
    article_types:
    - hard_news_spiritual_response
