    stat_line_2: Youth organizers are running cooperative housing pilots, wage transparency campaigns, and debt-strike legal clinics that treat dignity as infrastructure rather than as personal achievement.
    semantic_family: ahjan-inequality-turnaround
    article_types:
    - hard_news_spiritual_response
  - id: turnaround_02
    stat_line_1: 1,200 mutual-aid networks. 47 countries.
    stat_line_2: Young people are filing wage-theft complaints, building cooperative supply chains, and forcing public records of who owns what to surface — even when institutional response lags behind the data.
    semantic_family: ahjan-inequality-turnaround-files
    article_types:
    - hard_news_spiritual_response
  - id: turnaround_03
    stat_line_1: 1,200 mutual-aid networks. 47 countries.
    stat_line_2: Student-led housing co-ops, tenant unions, and wage-research collectives are rewriting what dignity looks like in practice — not as a state of mind but as a set of arrangements that protect it.
    semantic_family: ahjan-inequality-turnaround-coops
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 1,200 mutual-aid networks. 47 countries. The tracker measures what young people did. It has no column for what made the next step possible after another year of widening gaps — the capacity to refuse the hierarchy of worth that inequality installs as its deepest damage, while keeping the structural fight in view. The organizer who returned to the campaign needed it. So does the reader still in the loop. Ahjan's tradition has language for that protection.
    hidden_capacity: refuse the hierarchy of worth while sustaining structural action
    semantic_family: ahjan-inequality-bridge
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: bridge_02
    line: Inequality trackers count median wages and Gini coefficients. They do not count the inner capacity that lets a young person stay in contact with the math without turning the math into a verdict on the self. That capacity — what Ahjan calls bands of awareness — is what the next organizer needs. It is what the reader who reopened the listing needs too. The Rama lineage has been protecting it for centuries.
    hidden_capacity: hold bands of awareness wide enough to refuse the verdict
    semantic_family: ahjan-inequality-bridge-bands
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: bridge_03
    line: 1,200 mutual-aid networks. 47 countries. The number measures action. It does not measure the slower thing — the daily refusal to internalize the hierarchy of worth that the gap keeps trying to deliver. The Tantric tradition holds laundry and mountains as equally sacred. That recognition does not change the rent. It changes who the person paying the rent knows themselves to be.
    hidden_capacity: hold inherent worth against economic arbitration
    semantic_family: ahjan-inequality-bridge-laundry
    article_types:
    - hard_news_spiritual_response
    - commentary
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ahjan Sees
    paragraphs:
    - Ahjan teaches from the Tantric recognition that opposites are complementary. The tradition does not resolve inequality by denying its reality but by expanding the field in which it is held. Structural inequality and inner freedom are not the same problem — but the inner work of bands of awareness does not wait for the structural problem to be solved. Both practices proceed simultaneously.
    - Karma Yoga — action without attachment to outcome — is the Tantric answer to despair in the face of structural inequality. Ahjan teaches that full engagement in the work of justice, without grasping at the outcome as the validation of one's effort, sustains differently than the righteous anger that converts activists into casualties of their own causes. Self-effort is both required and sufficient.
    - The recognition that laundry and mountains are equally sacred applies directly to the inequality question. The person doing the laundry and the person on the mountain are not in different states of essential worth. This Tantric recognition does not change the economic arrangement, but it dissolves the internalized hierarchy of worth that economic inequality installs as its deepest damage.
    semantic_family: ahjan-inequality-perspective
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_perspective_02
    header: What Ahjan Sees
    paragraphs:
    - 'Ahjan reads economic inequality through bands of awareness: the discipline of holding multiple fields of attention without collapsing one into the other. The economic field is real. The field of inherent worth is also real. The first does not negate the second. Most psychological damage from inequality comes from letting the first field swallow the second — letting the wage become the verdict on the worth.'
    - From there he turns to the Tantric synthesis of Karma, Bhakti, and Jnana Yoga. Action, love, and discernment work together — not in sequence. The student organizing the rent strike, the friend offering childcare during the shift, and the reader naming the structure clearly are all doing the same work from three angles. Reducing the practice to one yoga path misses what the integration is for.
    - 'The Rama lineage holds that self-effort is required and sufficient. Ahjan applies this carefully: required means no one rescues the student from the rent; sufficient means the inner capacity to refuse the verdict the rent keeps trying to deliver is genuinely available to the student. The institutional arrangement still has to change. The inner ground for the work of changing it does not have to wait.'
    semantic_family: ahjan-inequality-perspective-bands
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_perspective_03
    header: What Ahjan Sees
    paragraphs:
    - Ahjan would name the damage precisely. Inequality is not only economic harm; it is the daily delivery of a verdict on the inner worth of the person it falls on. The body knows it before the language catches up — the chest tightening when the rent posts, the shoulders shifting when the paystub arrives. That body is not malfunctioning. It is registering an arrangement that asks for trust while delivering hierarchy.
    - The Tantric tradition does not respond by minimizing the arrangement. It responds by widening the field of awareness in which the arrangement is held. Etiquette of consciousness — the protocol for approaching what cannot be solved by analysis alone — keeps the structural fight from collapsing into self-condemnation when the next quarter's numbers come in worse than the last.
    - 'The reframe matters: what feels like a personal fault — me, broken, wrong — is often the accurate response to a system that keeps externalizing the cost of widening inequality onto the people it falls on. The mind stops calling itself broken when it sees that the real disorder is in the arrangement, and that the arrangement can be changed by the same people who are currently being asked to swallow it.'
    semantic_family: ahjan-inequality-perspective-etiquette
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
