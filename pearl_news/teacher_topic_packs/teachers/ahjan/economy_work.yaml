hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Economic stress now arrives as identity pressure: stay employable, stay
      available, and keep acting as if instability were a test of character.'
    semantic_family: ahjan-economy_work-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ahjan, a Theravada Buddhist teacher, has watched in practice sessions
      this pressure land on young people. Students are not asking how to stay inspired
      anymore. They are asking how to stay functional while the pressure keeps arriving
      on schedule.
    semantic_family: ahjan-economy_work-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You check the schedule app. Your stomach drops. You refresh again. Then
      you screenshot it because the shift might disappear before you can trust what
      you saw. LOOP_SEQUENCE: "checked the app. stomach dropped. refreshed again.
      took the screenshot."'
    loop_type: pressure_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ajahn Ahjan has seen this exact loop -- the app check, the drop in the body,
      the refresh, and the screenshot that tries to hold the moment still.
    semantic_family: ahjan-economy_work-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: Young workers are documenting conditions, filing wage-theft cases,
      and organizing campaigns that force unstable labor rules into the public record.
    semantic_family: ahjan-economy_work-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 1,240 cases. 32 cities. The tracker measures what young people did. It has
      no column for what made the next step possible after another delayed or broken
      response -- the capacity to stay functional enough to act again when the economy
      keeps converting uncertainty into private stress. The person who came back needed
      it. So does the reader in that loop. Ajahn Ahjan's teaching has language for
      protecting that capacity.
    hidden_capacity: return to truthful action
    semantic_family: ahjan-economy_work-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ajahn Ahjan Sees
    paragraphs:
    - Ajahn Ahjan would begin with accurate contact. The body is not malfunctioning
      when it reacts to real pressure; it is often perceiving a mismatch between official
      reassurance and lived reality.
    - He pairs that recognition with right effort. Right effort is not productivity
      language. It is the discipline of directing energy where truthful contact and
      usable action are still possible.
    - 'The reframe matters: what feels like a personal fault — me, broken, wrong —
      is often accurate response to a system that keeps externalizing delay, strain,
      and contradiction onto the person.'
    semantic_family: ahjan-economy_work-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Steadying Practice
    duration: 5 minutes
    announcement_line: Ajahn Ahjan teaches a 5-minute Steadying Practice for moments
      when economy work pressure starts converting attention into helplessness. It
      is in the sidebar, timed and practical.
    relief_lines:
    - The mind stops treating the next update as proof that action is pointless.
    - A steadier internal pace returns, and with it the capacity to act again.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
