teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ahjan, a Theravada Buddhist teacher, has watched in practice sessions this pressure land on young people. Students are not asking how to stay inspired anymore. They are asking how to stay functional while the pressure keeps arriving on schedule.
    semantic_family: ahjan-peace_conflict-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the latest report. Your chest tightens. You look away. Then you come back because conscience is still there. LOOP_SEQUENCE: "read the report. chest tightened. looked away. came back."'
