  - id: ahjan_pc_practice_02
    display_name: Etiquette of Consciousness Recall
    duration: 4 minutes
    announcement_line: Ahjan teaches a 4-minute Etiquette of Consciousness Recall
      for moments when conflict witness has been arriving faster than the field of
      attention can hold, and the protocol for receiving rather than processing has
      been lost in the rush. It is in the sidebar, timed and step by step.
    relief_lines:
    - The larger field is approached as something to be received, not solved alone.
    - The body returns to a register that can sustain witness without collapse.
