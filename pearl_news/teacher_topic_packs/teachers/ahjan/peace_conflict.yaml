    display_name: Bands of Awareness Pause
    duration: 5 minutes
    announcement_line: Ahjan teaches a 5-minute Bands of Awareness Pause for moments
      when a conflict update has collapsed the field of attention into the single
      frame of personal helplessness. It is in the sidebar, timed and step by step.
    relief_lines:
    - The two fields — what the conflict is doing and what the body can sustain —
      stop collapsing into each other.
    - A steadier ground returns for the next action, the next conversation, the next
      decision about where to put energy.
    relief_register:
    - capacity
    - clarity
    - act again
