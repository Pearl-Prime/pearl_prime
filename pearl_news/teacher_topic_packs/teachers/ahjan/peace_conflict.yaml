topic_fit:
  fit_level: primary
  fit_reason: 'Conflict witness from inside the feed is exactly the load Tantric Buddhism
    is built to meet — the body registering violence at planetary scale before any
    inherited framework names it, and the etiquette of consciousness offering a protocol
    for staying in contact with the field without collapsing into despair or detachment.'
  forbidden_angles:
  - do not preach false equivalence between aggressor and target
  - do not frame witness-fatigue as personal weakness
  - do not separate spiritual practice from the civic work of peacebuilding
hook_personal:
  options:
  - id: ahjan_pc_hook_personal_01
    line: You read another dispatch from another conflict you have no direct line
      into. Your chest tightened before the words finished loading — and part of you
      knows the tightening is not malfunction but accurate contact with violence happening
      at a scale no inherited frame taught you how to hold.
    metadata:
      semantic_family: witness-chest
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_hook_personal_02
    line: You care about the people in this conflict more than you can act on. You
      also know what the cumulative load of watching is doing to your body — and the
      friction between the caring and the absence of proportionate action is not personal
      flaw. It is the felt edge of a system that has handed you the witness without
      handing you any field of response.
    metadata:
      semantic_family: witness-without-action
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_hook_personal_03
    line: You keep reading the threads because looking away feels like complicity.
      You also feel the throat close every time a name lands and you cannot say it
      out loud. The body has been holding the difference between the load and the
      available action for longer than the conversation has named.
    metadata:
      semantic_family: body-knows-first
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_hook_personal_04
    line: At 1 a.m. you close the dispatch and open it again. Neither move helps,
      because the conflict does not pause for either choice. What is asked of you
      is not a better choice between looking and not looking — it is a different relationship
      to witness itself, the kind your inherited frame never named.
    metadata:
      semantic_family: midnight-witness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_hook_personal_05
    line: You have signed the petitions, posted the graphics, donated what you could.
      The action has been real and the load has not lifted — because the load is not
      the action's failure. It is the cost of bearing witness to violence at planetary
      scale inside a frame that has kept asking you to know without giving you anywhere
      proportionate to put what you know.
    metadata:
      semantic_family: action-without-relief
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: ahjan_pc_hook_big_01
    line: A generation can be highly informed about every active conflict on the planet
      and still lose daily functional capacity when each new dispatch arrives as proof
      that the institutions waited too long. The pressure is no longer only geopolitical
      — it is attentional, and the inherited spiritual vocabularies of consolation
      are not built for it.
    metadata:
      semantic_family: institutional-delay
      angle: cumulative-witness
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_hook_big_02
    line: Tantric Buddhism holds that opposites are complementary, not in conflict.
      Peace work is one of the precise places this has to be lived — the grief and
      the action, the witness and the rest, the rage and the patient discernment of
      what is actually one's to do — at the same time, without the inherited frame's
      insistence that one must be chosen.
    metadata:
      semantic_family: opposites-complementary
      angle: tantric-frame
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_hook_big_03
    line: 676 million women and girls live within 50 kilometers of an active conflict.
      The number is the visible edge of a deeper load — a planetary field a generation
      is being asked to register inside their own bodies, often before any institution
      has agreed to meet the field at the same depth.
    metadata:
      semantic_family: scale-of-witness
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_hook_big_04
    line: Bands of awareness — the discipline of holding multiple fields of attention
      without collapsing one into the other — is what peace work has been quietly
      asking young people to develop in practice, often before any tradition has named
      it for them. The Rama lineage has been refining the discipline across centuries
      of exactly this kind of contact.
    metadata:
      semantic_family: bands-of-awareness
      angle: discipline-of-attention
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_hook_big_05
    line: The wheel of dharma turns slowly and the conflicts are moving faster than
      the civic response. What is being asked of young people is not to choose between
      contemplative practice and direct action but to recover the older recognition
      that the two were never separable — that laundry and mountains are equally sacred,
      and the next vigil and the next breath are both expressions of the same field.
    metadata:
      semantic_family: dharma-and-action
      angle: practical-spiritual
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: ahjan_pc_intro_01
    line: 'Teacher Ahjan, a Tantric Buddhist teacher rooted in the Rama lineage for
      25 years, has watched in practice rooms what cumulative witness does to young
      people. Students are not asking how to stop caring anymore. They are asking
      how to stay functional inside a feed that delivers another conflict every day
      — and the tradition Ahjan teaches has language and practice for exactly this:
      not denial, not collapse, but bands of awareness wide enough to hold the witness
      and the steady ground at once.'
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_intro_02
    line: Teacher Ahjan teaches the Tantric synthesis of Karma Yoga, Bhakti Yoga,
      and Jnana Yoga — action, devotion, and discernment as a single integrated practice.
      For 25 years he has watched conflict witness arrive in practice sessions first
      as moral seriousness and then as loss of function. What the tradition offers
      is not another reassurance. It is a different relationship to bearing witness
      itself.
    metadata:
      semantic_family: three-yogas-integration
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_intro_03
    line: Teacher Ahjan, also known as Samvara in the Rama lineage he is recapitulating,
      has taught in practice rooms and at sacred sites for 25 years. He does not separate
      contemplative work from civic action. In his framework conflict witness is not
      a private grief to be solved by going inward — it is the felt edge of the same
      field that the next peace work must address, and the etiquette of consciousness
      applies to both.
    metadata:
      semantic_family: rama-lineage-recapitulation
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_intro_04
    line: Teacher Ahjan teaches that the mystical cannot be known — only experienced,
      and only through the etiquette of consciousness that lets the smaller self meet
      the larger field without collapsing either one. For 25 years he has watched
      young people arrive at his retreat already in contact with a depth of suffering
      no inherited framework had given them language for. Peace work is one of the
      precise places that contact is happening.
    metadata:
      semantic_family: etiquette-of-consciousness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_intro_05
    line: Teacher Ahjan teaches inside a tradition that holds the subtle body as the
      level at which conflict witness is actually carried. The subtle body and the
      six worlds are not metaphors in his framework. They are precise language for
      what is happening when a young person's nervous system registers violence at
      planetary scale as personal collapse — and the practice he offers refuses to
      let the planetary load collapse the field in which peace work is still possible.
    metadata:
      semantic_family: subtle-body-six-worlds
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: ahjan_pc_somatic_01
    line: You read the dispatch in a group chat. Your chest tightened. You closed
      the app. Then you opened it again because not looking did not make the violence
      pause.
    metadata:
      semantic_family: dispatch-chest
      loop_type: read-tighten-close-return
      body_register: chest
      digital_behavior: close-return
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_somatic_02
    line: You saw the casualty count update before class. Your throat tightened. You
      put your phone face down. Then you picked it up again because the count would
      not wait for you to feel ready to read it.
    metadata:
      semantic_family: count-throat
      loop_type: read-tighten-putdown-return
      body_register: throat
      digital_behavior: put-down-return
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_somatic_03
    line: Your jaw clenched when the ceasefire announcement was followed within an
      hour by the new dispatch. You scrolled past it. Then you scrolled back, because
      the silence had a quality you needed to verify with your own attention.
    metadata:
      semantic_family: ceasefire-jaw
      loop_type: scroll-past-scroll-back
      body_register: jaw
      digital_behavior: scroll-back
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_somatic_04
    line: You held your breath while the conflict map loaded. Your shoulders lifted.
      You exhaled only when you confirmed the lines had not yet reached someone you
      know — and only halfway, because the lines keep moving.
    metadata:
      semantic_family: map-breath
      loop_type: breath-hold-confirm
      body_register: breath
      digital_behavior: map-load
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_somatic_05
    line: You lay down and your eyes pinned open. The names from the day replayed.
      Your chest would not soften. You knew sleep was the thing that would help and
      you could not find the door into it.
    metadata:
      semantic_family: names-sleep
      loop_type: sleep-resistance-replay
      body_register: chest
      digital_behavior: lying down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: ahjan_pc_witness_01
    line: Ahjan has seen this exact loop in young people in practice this year — the
      reading, the tightening, the closing, the return. In his framework that loop
      is not weakness. It is the body registering accurately what the conversation
      around it has not yet caught up to, and the discipline of bands of awareness
      is precisely what protects the field where peace work can still be done.
    metadata:
      semantic_family: loop-mirror
      loop_type: read-tighten-close-return
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_witness_02
    line: He has watched the slow thing happen — the way a young person's witness
      collapses not at the first dispatch but at the tenth, the thirtieth, the hundredth.
      In Ahjan's framework the collapse is not the failure of caring. It is what happens
      when bands of awareness have been asked to hold more than the inherited practices
      know how to support, and the tradition's job is to widen those bands again.
    metadata:
      semantic_family: cumulative-witness
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_witness_03
    line: Ahjan has seen the body carry what the explanations could not — the throat
      that closes when the next name lands, the chest that locks before the casualty
      count finishes loading. In the Tantric framework the body is not the problem
      to be transcended. It is the precise instrument through which the field is being
      read, and the practice is to receive the reading without collapsing into it.
    metadata:
      semantic_family: somatic-instrument-witness
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_witness_04
    line: Ahjan has watched young people walk into the retreat already certain they
      should be doing more, alone. In his tradition that certainty is the signal —
      the place where the inherited individualist frame stops, and the older recognition
      that peace work is collective work at the level of the subtle body can finally
      begin to land.
    metadata:
      semantic_family: collective-subtle-body
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_witness_05
    line: He has watched the moment when a young person stops trying to fix every
      conflict from inside the same exhausted attention that the conflict news has
      already shaped. In Ahjan's framework that moment is not surrender. It is the
      etiquette of consciousness finally being practiced — the protocol that lets
      a larger field meet the smaller self at the depth the moment requires.
    metadata:
      semantic_family: etiquette-readiness
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: ahjan_pc_turnaround_01
    stat_line_1: 676 million women and girls. 50 km.
    stat_line_2: UN Women reports that six hundred and seventy-six million women and
      girls now live within fifty kilometers of an active armed conflict — the highest
      number since the second world war, and the baseline that every credible peace-and-security
      effort has to begin from.
    metadata:
      semantic_family: un-women-50km
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_turnaround_02
    stat_line_1: UN YPS. Resolution 2250.
    stat_line_2: Security Council Resolution 2250 established the Youth, Peace, and
      Security agenda in 2015 — the first multilateral instrument that treats young
      people as agents of peacebuilding rather than only its targets, and the framework
      every national action plan since then has been negotiated inside.
    metadata:
      semantic_family: yps-2250
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_turnaround_03
    stat_line_1: 47 national action plans. YPS.
    stat_line_2: Forty-seven national governments have now adopted Youth, Peace, and
      Security national action plans, and youth coalitions are forcing the count to
      keep rising — turning a UN resolution into a binding domestic commitment, one
      capital at a time.
    metadata:
      semantic_family: yps-national-plans
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_turnaround_04
    stat_line_1: 5,000+ partners. Search for Common Ground.
    stat_line_2: Search for Common Ground now works with more than five thousand local
      partners across more than thirty countries, running the peacebuilding infrastructure
      that picks up where ceasefires leave off and where the world's attention has
      already moved on.
    metadata:
      semantic_family: scg-partners
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_pc_turnaround_05
    stat_line_1: 100+ orgs. Generation Peace Network.
    stat_line_2: The Generations For Peace network now coordinates more than one hundred
      member organizations across more than fifty countries, training young leaders
      in conflict transformation in places the inherited diplomatic vocabulary still
      treats as unreachable.
    metadata:
      semantic_family: generation-peace-network
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: ahjan_pc_bridge_01
    line: 676 million women and girls. 50 kilometers. The tracker measures the proximity.
      It has no column for what made the next vigil possible after the last week's
      cumulative load — the capacity to stay in contact with planetary violence without
      losing the field of attention required to do peace work at all. The Rama lineage
      has been refining that capacity for centuries.
    hidden_capacity: stay in contact with the field without losing function
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_bridge_02
    line: Conflict trackers count casualties, ceasefires, and resolutions. They do
      not count the inner capacity that lets a young person hold witness and action
      at the same time without collapsing one into the other. That capacity — what
      Ahjan calls bands of awareness — is what peace work has been quietly requiring
      at the level the inherited vocabularies of consolation cannot reach.
    hidden_capacity: hold witness and action in the same field
    metadata:
      semantic_family: bands-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_bridge_03
    line: The numbers show the scaffolding the young built. They do not show the etiquette
      of consciousness the scaffolding was built inside — the protocol for staying
      in contact with something larger than the personal capacity to hold, without
      pretending the personal capacity is the only field that matters. The Tantric
      tradition holds that protocol as native, not metaphor.
    hidden_capacity: practice the etiquette of consciousness under planetary load
    metadata:
      semantic_family: etiquette-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_bridge_04
    line: The data captures plans, partners, and resolutions. It cannot capture the
      integration the Tantric synthesis points to — that the Karma Yoga of showing
      up to the next vigil, the Bhakti Yoga of devotion to the people whose names
      have been arriving in the feed, and the Jnana Yoga of discerning which channels
      of action are still genuinely available are the same work from three angles.
      Reducing peace work to one yoga path misses what the integration is for.
    hidden_capacity: integrate the three yogas inside a single peace practice
    metadata:
      semantic_family: three-yogas-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_bridge_05
    line: 47 national action plans. YPS. The count measures presence in policy. It
      does not measure the field — the energetic register in which a generation found
      itself in the same recognition at the same time, across borders the inherited
      diplomatic vocabulary still treats as separating. In the Tantric framework that
      field is not poetic. It is the precise level at which collective consciousness
      shifts.
    hidden_capacity: register the field that the count cannot show
    metadata:
      semantic_family: field-shift-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: ahjan_pc_perspective_01
    header: What Ahjan Sees
    paragraphs:
    - Tantric Buddhism holds that opposites are complementary, not in conflict — and
      peace work is one of the precise places this insight has to be lived rather
      than recited. Grief and action, witness and rest, rage and patient discernment
      are not in conflict. They are the conditions for each other. The tradition does
      not resolve them by choosing one. It widens the field of awareness wide enough
      to hold them at once, and the discipline of staying in that field is what peace
      work has been requiring all along.
    - Bands of awareness — the discipline of holding multiple fields of attention
      without collapsing one into the other — is what conflict witness has been quietly
      asking young people to develop in practice, often before any tradition has named
      it for them. The fault is not that the cohort cannot do it. The fault is that
      the practice has been lost from the inherited frames, and the Rama lineage is
      carrying the recapitulation forward for the conditions the next generation is
      living inside.
    - 'The reframe matters: what feels like a private fault — me, broken, wrong for
      losing function under cumulative witness — is often the accurate response of
      a nervous system being asked to hold what no inherited diplomatic vocabulary
      has named at the same depth. The mind stops calling itself broken when it sees
      that the real disorder is in a system that has outsourced planetary witness
      onto individual attention, and that the Tantric tradition has language and practice
      for the inner ground from which institutional peace work can still be made.'
    metadata:
      semantic_family: opposites-complementary-frame
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_perspective_02
    header: What Ahjan Sees
    paragraphs:
    - The Tantric synthesis of Karma Yoga, Bhakti Yoga, and Jnana Yoga — action, devotion,
      and discernment — is not a sequence. It is a single integrated practice that
      peace work is one of the rare places now requiring all three at once. The young
      organizer who shows up to the vigil, the young person who keeps the names of
      the dead clearly in mind, and the young analyst who reads the ceasefire language
      carefully enough to know which clauses the parties have already privately abandoned
      are all doing the same work from three angles.
    - Reducing peace work to one yoga path — pure action without devotion, or pure
      contemplation without discernment, or pure analysis without love — misses what
      the integration is for. The integration is what protects the practitioner from
      collapse when any single angle becomes unbearable. The Rama lineage has been
      refining this integration for centuries, and the tradition Ahjan carries is
      a recapitulation of that work for the conditions the next generation is now
      living inside.
    - 'In that frame, self-blame softens. The fault is not that you have not done
      enough — most of the cohort has already done more than the diplomatic infrastructure
      ever asked of them. The fault is that the work has been carried inside a frame
      that reduces it to one yoga at a time, and the body knows the integration is
      missing before the conversation does. The Tantric tradition does not ask the
      young to become superhuman. It asks them to recover the practice their inherited
      vocabularies forgot how to teach.'
    metadata:
      semantic_family: three-yogas-frame
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_perspective_03
    header: What Ahjan Sees
    paragraphs:
    - Etiquette of consciousness, in Ahjan's tradition, is the protocol for approaching
      what cannot be solved by analysis alone. Conflict witness is one of the clearest
      places it applies. The violence is not a problem the individual mind can think
      its way through. It is a field — a planetary condition the subtle body registers
      before the conceptual mind catches up. The etiquette is the practice of letting
      the field be received without collapsing it back into the smaller frame of personal
      problem-solving.
    - In practical terms this means the young person who closes the dispatch and opens
      it again is not in malfunction. They are already practicing a primitive version
      of the etiquette — refusing to look away, refusing to dissociate, but not yet
      having the formal language for what they are doing. Ahjan's tradition offers
      the language. It does not invent the practice. The practice is already there
      in the body, waiting to be named precisely enough that it can be sustained across
      the years the peace work will actually require.
    - The reframe is that the etiquette of consciousness is not a contemplative withdrawal
      from public life. It is the discipline that lets the practitioner stay engaged
      with the next vigil, the next donation, the next coalition meeting — and the
      grief, the rage, the names from the feed — without separating them. Laundry
      and mountains are equally sacred. The next email and the next breath are the
      same field. The tradition that splits these has nothing to offer at the depth
      peace work now requires.
    metadata:
      semantic_family: etiquette-frame
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_perspective_04
    header: What Ahjan Sees
    paragraphs:
    - 'The six worlds, in Ahjan''s tradition, are not metaphors. They are precise
      language for the layers of experience conflict witness moves a young person
      through in any given day: the hell-realm of the casualty count, the hungry-ghost
      realm of needing one more piece of information, the human realm of moral seriousness
      that finds its ground in real action, the realm of subtle bliss when a moment
      of connection across the conflict actually lands, and the higher realms where
      the field of peacebuilding itself is felt directly. The practice is not to escape
      any of these. It is to recognize them and to keep the field of attention wide
      enough that no single realm becomes the only one.'
    - In that framework the cohort is not in pathology. The cohort is being asked
      to traverse all six realms in a single feed, often without the formal language
      for what is happening, and the tradition's job is to name the realms precisely
      enough that the traversal can become conscious rather than collapse. The wheel
      of dharma turns, and the practice is to stay with the turning rather than to
      try to stop the wheel at the realm the algorithm happens to amplify.
    - 'The reframe is that the young people losing function under cumulative witness
      are not failing the moment. They are registering the moment at the level the
      inherited diplomatic vocabularies were not designed to support. The Tantric
      tradition has the language. The Rama lineage has been refining the practice.
      The work now is recapitulation: restoring to the next generation the discipline
      their inherited frames forgot how to teach.'
    metadata:
      semantic_family: wheel-six-worlds-frame
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: ahjan_pc_perspective_05
    header: What Ahjan Sees
    paragraphs:
    - In Ahjan's tradition the subtle body is not metaphor. It is the precise level
      at which conflict witness is actually held — not in the conceptual mind that
      reads the dispatch, but in the energetic register that knows what the dispatch
      means before the conceptual mind catches up. The tightening in the chest, the
      closing in the throat, the breath that will not deepen when the next casualty
      count loads are subtle-body readings of planetary load. The tradition's job
      is to receive those readings as information, not as malfunction.
    - 'The mystical cannot be known — only experienced, and only through the etiquette
      that lets the smaller self approach what is larger than itself without collapsing
      either one. Peace work is one of the places this is now being practiced at scale,
      mostly without the formal language. Young people are already in contact with
      a depth of suffering the inherited diplomatic frame has refused to meet. The
      tradition Ahjan carries does not invent the contact. It names the contact precisely
      enough that the contact can be sustained — across the years, across the vigils,
      across the next ceasefire that fails.'
    - 'The reframe is that practical and spiritual are not separable. Laundry and
      mountains are equally sacred. The next coalition call and the next breath are
      the same field. The tradition that splits these has nothing to offer at the
      depth peace work now requires, and the tradition that holds them together —
      Tantric Buddhism in the Rama lineage — has been holding them together for centuries.
      The work is recapitulation: restoring the integration the inherited frames lost
      track of.'
    metadata:
      semantic_family: subtle-body-frame
      reframe_type: self_to_system
