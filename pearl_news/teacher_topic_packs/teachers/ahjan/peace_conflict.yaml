    display_name: Six Worlds Witness
    duration: 6 minutes
    announcement_line: Ahjan teaches a 6-minute Six Worlds Witness practice for moments
      when one realm of conflict experience — the casualty count, the moral seriousness,
      the brief lift after an action — has become the only field of attention. It
      is in the sidebar, timed and step by step.
    relief_lines:
    - The single realm that had become the whole field returns to its actual proportion
      inside the larger picture.
    - The other realms become available again, and with them the energy that had been
      trapped in the one.
