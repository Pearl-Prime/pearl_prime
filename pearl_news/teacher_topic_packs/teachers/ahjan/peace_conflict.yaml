title_system:
  headline_layer_2:
    options:
    - id: ahjan_pc_headline_01
      line: A Tantric Buddhist teacher names what cumulative conflict witness is doing
        to Gen Z attention — and the practice that widens the bands again.
      metadata:
        semantic_family: teacher-attention
        article_types:
        - hard_news_spiritual_response
    - id: ahjan_pc_headline_02
      line: Opposites are complementary — Ahjan reads peace work as the precise place
        the Tantric synthesis has to be lived rather than recited.
      metadata:
        semantic_family: opposites-frame
        article_types:
        - hard_news_spiritual_response
    - id: ahjan_pc_headline_03
      line: The Rama lineage holds the integration of Karma Yoga, Bhakti Yoga, and
        Jnana Yoga — peace work is one of the rare places now requiring all three
        at once.
      metadata:
        semantic_family: three-yogas-frame
        article_types:
        - hard_news_spiritual_response
    - id: ahjan_pc_headline_04
      line: Etiquette of consciousness, not contemplative withdrawal — a Tantric teacher
        on the protocol peace work has been quietly requiring all along.
      metadata:
        semantic_family: etiquette-frame
        article_types:
        - hard_news_spiritual_response
    - id: ahjan_pc_headline_05
      line: Laundry and mountains are equally sacred — Ahjan refuses the split between
        contemplative practice and direct action that the inherited frames keep proposing.
      metadata:
        semantic_family: practical-spiritual-frame
        article_types:
        - hard_news_spiritual_response
