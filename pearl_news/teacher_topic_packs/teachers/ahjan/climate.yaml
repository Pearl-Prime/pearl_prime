bridge:
  options:
  - id: tracker_capacity_01
    line: 2,666 cases. 51 jurisdictions. The tracker measures what young people did.
      It has no column for what made the next filing possible after the last delay
      -- the capacity to stay functional enough to act again when the system keeps
      not responding. The organizer who filed the next case needed it. So does the
      person who read the update, closed the app, and opened it again. Ajahn Ahjan's
      tradition has been developing it for 2,500 years.
    hidden_capacity: stay functional enough to act again
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: tracker_capacity_02
    line: Climate trackers count cases, targets, and thresholds. They do not count
      the inner capacity that lets a young person stay in contact with the truth long
      enough to act again after another institutional delay. That capacity is what
      the next organizer needs. It is what the reader who reopened the app needs too.
      Ajahn Ahjan's tradition has language and practice for protecting it.
    hidden_capacity: stay in contact with truth without losing function
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
    - commentary
teacher_perspective:
  options:
  - id: samvega_right_effort_01
    header: What Ahjan Sees
    paragraphs:
    - 'Buddhist practice has a precise name for this kind of pressure: samvega, the
      destabilizing recognition that the world is more fragile than you were taught
      to believe. What makes climate distress so exhausting is not that the body is
      malfunctioning. It is that the body is perceiving the mismatch between official
      reassurance and material reality accurately.'
    - Ahjan pairs that with right effort. This is not productivity language. It is
      the discipline of using energy where contact with truth is still possible. A
      mind that can no longer stay with the next report is not proving personal weakness.
      It is responding to a system that asks for constant awareness while refusing
      proportionate response.
    - 'The shift matters here: what feels like a private fault — me, broken, wrong
      — is often accurate response to a system that asks for constant awareness while
      refusing proportionate institutional action. The mind stops calling itself broken
      when it sees that the real disorder is outside it.'
    semantic_family: samvega-right-effort
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: samvega_right_effort_02
    header: What Ahjan Sees
    paragraphs:
    - 'Ahjan reads climate panic through samvega: the moment when reality becomes
      too serious for denial, and the body knows it before the mind finds the language.
      That urgency is not an error signal. It is truthful contact with danger.'
    - From there he turns to right effort. The question is not how to feel inspired
      all day. The question is how to direct energy where contact with truth is still
      possible, so attention is not consumed by helpless repetition.
    - In that frame, self-blame softens. The fault is not yours — not a broken self,
      not a wrong response. The problem is that institutions and policy systems keep
      outsourcing unbearable delay onto individual nervous systems. Instead of naming
      myself as the failure, I can finally see the structure that produced the pressure.
    semantic_family: samvega-right-effort-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
