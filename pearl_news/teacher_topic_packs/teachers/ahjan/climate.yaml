    semantic_family: truth-vs-overload
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: A generation can be highly informed, morally serious, and still lose daily
      functional capacity when every update arrives as proof that institutions waited
      too long.
    semantic_family: institutional-delay
    angle: future-loss
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_02
    line: 'The pressure is no longer only ecological. It is attentional, emotional,
      and civic: how do young people stay in contact with reality without shutting
      down under it?'
    semantic_family: attention-collapse
    angle: attention-collapse
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: identity_observation_shift_01
    line: Teacher Ahjan, a Theravada Buddhist teacher for 25 years, has seen in practice
      rooms what this does to young people. Students are not asking how to stay inspired
      anymore. They are asking how to stay functional while the future they were promised
      keeps disappearing on schedule.
    semantic_family: identity_seen_shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: identity_observation_shift_02
    line: Teacher Ahjan, a Theravada Buddhist teacher for 25 years, has watched climate
      fear arrive in practice sessions first as moral seriousness and then as loss
      of function. Students are not asking whether the crisis is real. They are asking
      how to keep attention from collapsing under constant proof that adults waited
      too long.
    semantic_family: identity_seen_shift_alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
    - commentary
