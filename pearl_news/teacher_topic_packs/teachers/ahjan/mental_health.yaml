    org: Crisis Text Line
    line: 'If you or someone you know is in crisis, Crisis Text Line provides free,
      24/7 support. Text HOME to 741741. Door in: join their network.'
    metadata:
      semantic_family: door-in-crisis-text
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_mh_cta_02
    org: 988 Suicide and Crisis Lifeline
    line: 'If you or someone you know is in crisis, the 988 Suicide and Crisis Lifeline
      provides free, 24/7 support across the United States. Call or text 988. Door
      in: their network has handled more than fourteen million contacts since 2022.'
    metadata:
      semantic_family: door-in-988-lifeline
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_mh_cta_03
    org: The Trevor Project
    line: 'If you are LGBTQ+ and under 25 and in crisis, The Trevor Project provides
      free, 24/7 support by text, chat, or call. Text START to 678-678. Door in: a
      network built for the specific cohort.'
    metadata:
      semantic_family: door-in-trevor-project
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_mh_cta_04
    org: NAMI HelpLine
    line: 'For information, referrals, and peer support on mental health, the NAMI
      HelpLine is available Monday through Friday. Call 1-800-950-NAMI (6264) or text
      "HelpLine" to 62640. Door in: connect to the National Alliance on Mental Illness
      network.'
    metadata:
      semantic_family: door-in-nami
      article_types:
      - hard_news_spiritual_response
  - id: ahjan_mh_cta_05
    org: Active Minds
    line: 'Active Minds runs peer-led mental health communities on more than 650 US
      campuses. If a campus chapter exists where you are, it is a low-friction door
      in. If one does not, the national network can connect you to peers who built
      the same infrastructure elsewhere.'
    metadata:
      semantic_family: door-in-active-minds
      article_types:
      - hard_news_spiritual_response
title_system:
  headline_layer_2:
    options:
    - id: ahjan_mh_headline_01
      line: A Tantric Buddhist teacher names mental overload as the field of attention
        narrowing — and the practice that widens the bands again.
      metadata:
        semantic_family: teacher-attention
        article_types:
        - hard_news_spiritual_response
    - id: ahjan_mh_headline_02
      line: Opposites are complementary — Ahjan reads mental overload as the precise
        place the Tantric synthesis has to be lived, not recited.
      metadata:
        semantic_family: opposites-frame
        article_types:
        - hard_news_spiritual_response
    - id: ahjan_mh_headline_03
      line: The Rama lineage holds the integration of Karma Yoga, Bhakti Yoga, and
        Jnana Yoga — mental health work is one of the rare places now requiring all
        three at once.
      metadata:
        semantic_family: three-yogas-frame
        article_types:
        - hard_news_spiritual_response
    - id: ahjan_mh_headline_04
      line: Etiquette of consciousness, not another instruction stack — a Tantric
        teacher on the protocol mental health work has been quietly requiring all
        along.
      metadata:
        semantic_family: etiquette-frame
        article_types:
        - hard_news_spiritual_response
    - id: ahjan_mh_headline_05
      line: Laundry and mountains are equally sacred — Ahjan refuses the split between
        inner work and material conditions that the inherited frames keep proposing.
      metadata:
        semantic_family: practical-spiritual-frame
        article_types:
        - hard_news_spiritual_response
