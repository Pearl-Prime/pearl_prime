hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Youth mental-health strain is not only a clinical trend. It is the way institutions normalize overload until young people start treating it as a private flaw.
    semantic_family: ahjan-mental_health-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ahjan, a Theravada Buddhist teacher, has watched in practice sessions this pressure land on young people. Students are not asking how to stay inspired anymore. They are asking how to stay functional while the pressure keeps arriving on schedule.
    semantic_family: ahjan-mental_health-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the report after midnight. Your body tightens. You set the phone down. Then you pick it up again because the pressure is already in the room. LOOP_SEQUENCE: "read the report. body tightened. set the phone down. picked it up again."'
    loop_type: pressure_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ajahn Ahjan has seen this exact loop -- the report, the body tightening, the phone set down, and the return because the pressure is still there.
    semantic_family: ahjan-mental_health-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: Students are building peer circles, workshops, and campaigns that treat mental health as shared infrastructure rather than private weakness.
    semantic_family: ahjan-mental_health-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. The tracker measures what young people did. It has no column for what made the next step possible after another delayed or broken response -- the capacity to seek help and return without turning overload into identity. The person who came back needed it. So does the reader in that loop. Ajahn Ahjan's teaching has language for protecting that capacity.
    hidden_capacity: return to truthful action
    semantic_family: ahjan-mental_health-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ajahn Ahjan Sees
    paragraphs:
    - Ajahn Ahjan would begin with accurate contact. The body is not malfunctioning when it reacts to real pressure; it is often perceiving a mismatch between official reassurance and lived reality.
    - He pairs that recognition with right effort. Right effort is not productivity language. It is the discipline of directing energy where truthful contact and usable action are still possible.
    - 'The reframe matters: what feels like a personal fault — me, broken, wrong — is often accurate response to a system that keeps externalizing delay, strain, and contradiction onto the person.'
    semantic_family: ahjan-mental_health-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Steadying Practice
    duration: 5 minutes
    announcement_line: Ajahn Ahjan teaches a 5-minute Steadying Practice for moments when mental health pressure starts converting attention into helplessness. It is in the sidebar, timed and practical.
    relief_lines:
    - The mind stops treating the next update as proof that action is pointless.
    - A steadier internal pace returns, and with it the capacity to act again.
    relief_register:
    - capacity
    - clarity
    - act again
