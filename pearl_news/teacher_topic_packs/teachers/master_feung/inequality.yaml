# Master Feung × inequality (SDG 10: Reduced Inequalities)
# Doctrine authority: SOURCE_OF_TRUTH/teacher_banks/master_feung/doctrine/doctrine.yaml
# Tradition: Chinese wisdom (calligraphy as spiritual practice; Grand Painting teaching; Xi'an cultural center; Hua Shan pilgrimage)
# Frame for inequality: economic disparity reads as a denial of one's necessary place in the Grand Painting; the practice is to recognize inherent placement before the structural work proceeds.

schema_version: 1
teacher_id: master_feung
topic: inequality
active: true

identity:
  display_name: Master Feung
  attribution_name: Master Feung
  tradition: Chinese wisdom traditions (calligraphy as spiritual practice; Grand Painting teaching; Xi'an cultural center; Hua Shan pilgrimage lineage)
  tradition_short: Chinese wisdom
  teacher_setting_options:
    - Xi'an cultural center
    - calligraphy studio
    - Hua Shan pilgrimage path
  teacher_years: '40'
  affiliation_safe_line: has attended the United Spiritual Leaders Forum
  launch_approved: true

persona:
  id: gen_z_alpha
  age_band: 13-29
  default_register: phone-native, high-pressure, institution-skeptical
  daily_worlds:
    - school
    - phone
    - group chat
    - late-night scrolling
    - part-time work
  tie_to_real_world_struggles:
    - id: dignity_drain
      label: structural inequality eroding the sense of one's necessary place before any defense can land
      loop: reads the rent-vs-wage chart -> chest tightens -> closes app -> opens it again because the numbers do not get smaller
      body_markers: [chest, throat, shoulders]
      digital_markers: [close, reopen, scroll, check again]

topic_fit:
  fit_level: primary
  fit_reason: |
    Inequality reads as a denial of the reader's necessary place in the Grand Painting — economic
    arbitration that says some pieces are more required than others. Master Feung's calligraphy frame
    holds that every stroke is necessary exactly where it lands; the practice is recognizing inherent
    placement while the structural work continues.
  forbidden_angles:
    - do not preach acceptance of structural harm as wisdom
    - do not privatize inequality as a personal mindset problem
    - do not romanticize Chinese tradition as a fix for material harm

hook_personal:
  options:
    - id: hook_personal_01
      line: |
        You know the chart before you open the app. Rent column. Wage column. The gap reads back at
        you as if you should explain yourself for being on the wrong side of it.
      semantic_family: master_feung-inequality-hook-personal
      tone: plain
      intensity: 3
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: hook_personal_02
      line: |
        The room reads you before you read the room. The number on your paycheck arrives before
        anyone asks what you did this month. You start arguing with the number as if it can hear.
      semantic_family: master_feung-inequality-hook-personal
      tone: plain
      intensity: 3
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: hook_personal_03
      line: |
        You stop sending the resume. You read three more job posts and close the tab. You do not
        feel weak. You feel arbitrated — measured by a scale you did not agree to.
      semantic_family: master_feung-inequality-hook-personal
      tone: plain
      intensity: 4
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: |
        Economic inequality among young people is not a private deficit. It is a structural arrangement
        that prices out housing, schooling, and time itself — and then asks the priced-out to explain
        their lack of resilience.
      semantic_family: master_feung-inequality-hook-big
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: hook_big_picture_02
      line: |
        The shape of inequality has shifted. Wealth concentration is no longer only at the top — it
        compounds along access to housing, credit, and inheritance, sorting young people into futures
        before they have made a single decision of their own.
      semantic_family: master_feung-inequality-hook-big
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: hook_big_picture_03
      line: |
        Inequality wears a generational face now. The young workers carrying the system also carry
        the slowest claim on its outputs — and the systems built to redistribute it have stalled.
      semantic_family: master_feung-inequality-hook-big
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

teacher_intro:
  options:
    - id: teacher_intro_01
      line: |
        Master Feung, a Chinese wisdom teacher from a calligraphy lineage in Xi'an, has watched
        inequality arrive in his students' first sentence: not what they are working on, but whether
        they belong in the work at all.
      semantic_family: master_feung-inequality-intro
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: teacher_intro_02
      line: |
        Master Feung, from the Xi'an cultural center where calligraphy and Grand Painting teaching
        converge, has been watching students arrive with a quieter version of the same question:
        whether their stroke counts on the page.
      semantic_family: master_feung-inequality-intro
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: teacher_intro_03
      line: |
        For four decades Master Feung has taught calligraphy as an embodied practice in Xi'an.
        The students arriving now bring a particular shape of dignity-strain: the sense that the
        economy itself is sorting who counts as a finished stroke.
      semantic_family: master_feung-inequality-intro
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        You read the rent-vs-wage chart. Your chest tightens. You close the app. Then you open it
        again because the numbers do not get smaller. LOOP_SEQUENCE: "read the chart. chest tightened. closed the app. opened it again."
      loop_type: dignity_drain
      body_register: chest
      digital_behavior: close-reopen
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: youth_somatic_02
      line: |
        You scroll the job posts. Your shoulders pull in. You set the phone down. Then you pick it
        up again because the rent does not move. LOOP_SEQUENCE: "scrolled the posts. shoulders pulled in. set the phone down. picked it up."
      loop_type: dignity_drain
      body_register: shoulders
      digital_behavior: scroll-return
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: youth_somatic_03
      line: |
        You check the inheritance article. Your throat tightens. You reopen the chat. Then you stop
        typing because the words feel small against the structure. LOOP_SEQUENCE: "checked the article. throat tightened. opened the chat. stopped typing."
      loop_type: dignity_drain
      body_register: throat
      digital_behavior: open-close
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

teacher_witness:
  options:
    - id: teacher_witness_01
      line: |
        Master Feung has observed this pattern consistently at the cultural center — students arriving
        with the question of whether they belong before they ask what they want to make. He treats
        the question as a sign the room itself has been mis-described.
      semantic_family: master_feung-inequality-witness
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: teacher_witness_02
      line: |
        In four decades of teaching, Master Feung has seen the same shape arrive in different decades.
        What is new is the speed: the dignity-drain is now arriving by phone before students walk
        through the door.
      semantic_family: master_feung-inequality-witness
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: teacher_witness_03
      line: |
        Master Feung watches students set down the brush mid-stroke when the phone reaches them.
        He does not call it failure of focus. He calls it the body reading conditions that the
        room had not yet acknowledged.
      semantic_family: master_feung-inequality-witness
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

turnaround:
  options:
    - id: turnaround_01
      stat_line_1: Dozens of cities. Hundreds of youth-led co-ops.
      stat_line_2: Young workers are organizing wage-transparency drives, housing-cooperative pilots, and inheritance-policy campaigns that treat dignity as shared infrastructure rather than personal grit.
      semantic_family: master_feung-inequality-turnaround
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: turnaround_02
      stat_line_1: Many countries. Many pilot programs.
      stat_line_2: Coalitions of student renters, gig workers, and first-generation graduates are publishing pay data, mapping rent gaps, and pressuring local governments to treat housing as a baseline rather than a bonus.
      semantic_family: master_feung-inequality-turnaround
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: turnaround_03
      stat_line_1: Multiple regions. Multiple living-wage pilots.
      stat_line_2: Civic alliances led by young workers are testing universal basic services, debt-jubilee proposals, and worker-owned platform alternatives — every effort treating dignity as a structural fact, not a personality trait.
      semantic_family: master_feung-inequality-turnaround
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

bridge:
  options:
    - id: bridge_01
      line: |
        Master Feung's Grand Painting frame names the inequality loop directly: when one stroke is
        priced lower than another, the painting is not failing — the pricing is. The dignity is
        not in question; the system arbitrating it is.
      semantic_family: master_feung-inequality-bridge
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: bridge_02
      line: |
        The calligraphy frame here is concrete: the brush stroke cannot be undone, but the page can
        be redesigned. Master Feung holds that the practice of recognizing one's necessary place
        runs alongside — not instead of — the structural work.
      semantic_family: master_feung-inequality-bridge
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: bridge_03
      line: |
        From the Xi'an cultural center Master Feung names the trap: pricing tells the painted piece
        it is optional. The pricing is wrong; the piece is not. The work is to keep teaching from
        that center while the prices get re-argued in public.
      semantic_family: master_feung-inequality-bridge
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: What Master Feung Sees
      paragraphs:
        - |
          In Master Feung's Grand Painting teaching, every person is a unique and necessary piece of
          humanity — not a draft, not a placeholder, not optional. Economic inequality is the price
          tag mistaking itself for the painting.
        - |
          Master Feung teaches that the brush stroke cannot be undone, but the page can be
          redesigned. The work of inherent worth and the work of structural redesign run in parallel.
          Calligraphy practice is one way to keep contact with the first while doing the second.
        - |
          The Xi'an cultural center holds that being yourself is the actual teaching — not
          self-improvement toward an ideal but recognition of one's already-complete place. From
          that recognition, the work of redistribution becomes a craft, not a plea.
      semantic_family: master_feung-inequality-perspective
      reframe_type: structural-with-inherent-worth
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: teacher_perspective_02
      header: What Master Feung Sees
      paragraphs:
        - |
          Master Feung draws a distinction students recognize quickly: pricing is not painting.
          Wages and rents are arbitrations. They tell you what the system is asking. They do not
          tell you what your stroke is.
        - |
          From the Grand Painting frame, the painting goes on. The stroke you make this week is
          already necessary somewhere on the page. Master Feung asks students to keep making it
          while the pricing gets argued — not after, not instead, alongside.
        - |
          The Xi'an cultural center treats authentic presence as a craft. Inequality erodes it by
          asking the painted piece to prove it belongs. Master Feung returns the question to where
          it started: the painting is the proof.
      semantic_family: master_feung-inequality-perspective
      reframe_type: structural-with-inherent-worth
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: teacher_perspective_03
      header: What Master Feung Sees
      paragraphs:
        - |
          Master Feung reads the inequality loop as a body reading conditions: the chest tightens
          when the economy says you are arbitrable. The body is right. The arbitration is the
          structural fact to engage; the inherent worth is not what is in question.
        - |
          The calligraphy practice is small and concrete. Three strokes. The body finds the page.
          The page finds the body. The brush stroke cannot be undone, and that fact is reassuring,
          not threatening — there is a place where what you do counts immediately.
        - |
          Master Feung holds that the Grand Painting includes the slowest-paid worker, the first
          to be cut, the last to be hired. None of these are draft errors. Inequality is the
          pricing scheme. The painting is unchanged.
      semantic_family: master_feung-inequality-perspective
      reframe_type: structural-with-inherent-worth
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

practice:
  options:
    - id: practice_01
      display_name: Three Strokes Practice
      duration: 4 min
      announcement_line: |
        Take the brush — or any pen. Three strokes on one page. The chest finds the line; the line
        finds the chest. Notice that the page is not arbitrating; you are placing.
      relief_lines:
        - The first stroke does not have to be the right stroke. It has to be a stroke.
        - The page accepts what you place. The pricing is in another room.
        - When the body returns, the dignity returns. The structure work continues separately.
      relief_register: grounded
      derived_from_frame: Grand Painting
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: practice_02
      display_name: Brush Return
      duration: 5 min
      announcement_line: |
        Set the phone down. Take a pen. One word on a clean page. Then another. The page is the
        practice; the pricing is not in this room.
      relief_lines:
        - The page accepts the first word. That acceptance is the practice.
        - The chest releases when the body has a place to land. The page is the place.
        - When the pen returns to the page, the body remembers it is on the painting.
      relief_register: grounded
      derived_from_frame: Grand Painting
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: practice_03
      display_name: Necessary Place Practice
      duration: 3 min
      announcement_line: |
        Stand. Three slow breaths. Name one thing you do that the painting requires — not what the
        market priced, what the painting requires. Notice the chest. Notice the room.
      relief_lines:
        - The market price and the painting requirement are not the same fact.
        - The body responds to the painting requirement faster than to the price.
        - Three breaths is the practice. The structural work is the work. Both stay.
      relief_register: grounded
      derived_from_frame: Grand Painting
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

sdg:
  number: '10'
  name: Reduced Inequalities
  agency: UN Department of Economic and Social Affairs (UN DESA)
  link_to_topic: Master Feung's Grand Painting frame meets SDG 10 where dignity is treated as structural infrastructure rather than personal achievement.

cta:
  options:
    - id: cta_01
      org: Oxfam International
      line: |
        Track the Inequality Index at oxfam.org/inequality. Use it to localize one wage-vs-rent
        conversation in the room you are already in.
      semantic_family: master_feung-inequality-cta
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: cta_02
      org: International Labour Organization (ILO)
      line: |
        Read the ILO Global Wage Report at ilo.org/global-wage-report. One number, one neighbor —
        share what the wage gap looks like where you live.
      semantic_family: master_feung-inequality-cta
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]
    - id: cta_03
      org: World Inequality Lab
      line: |
        Open the World Inequality Database at wid.world. Find your country's wealth-share curve.
        Bring one chart to the next civic conversation you are in.
      semantic_family: master_feung-inequality-cta
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary]

