teacher_intro:
  options:
  - id: teacher_intro_01
    line: Master Fan Jo, a Taoist teacher of cultivation through art and the Guqin,
      has watched in practice sessions young people carry work instability as if it
      were a verdict on character. Master Fan has observed them ask not only how to
      work harder, but how to stop turning volatility into self-blame — and how to
      let the body find naturalness when the schedule keeps changing.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Master Fan Jo, grounded in naturalness and Tai Chi, has seen in practice
      sessions in the studio what precarious work does to young people. Master Fan
      has witnessed students and workers ask not whether effort matters, but how to
      stay steady enough to make the next move when the system keeps refusing to hold
      still — and how to sense from the heart when the mind is spinning on the roster.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
