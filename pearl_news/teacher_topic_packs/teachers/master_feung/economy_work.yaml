bridge:
  options:
  - id: bridge_01
    line: '1,240 cases. 32 cities. The tracker measures what young workers challenged.
      It has no column for what made the next filing or shift negotiation possible
      after another unstable week — the capacity to stay steady enough to act without
      turning precarity into identity. The person who took the screenshot needed that.
      Master Fan''s tradition has a name for what remains when conditions shift: naturalness.
      The practice is to protect it in this body, through breath, movement, and one
      honest line.'
    hidden_capacity: stay steady enough to act without precarity as identity
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: Labor trackers count cases and policy wins. They do not count the inner
      capacity that lets a young person show up for the next shift or the next meeting
      without handing their whole sense of worth over to the schedule. That capacity
      — what remains when the body stops forcing and the heart can respond — is what
      the next filing needs. It is what the worker who refreshed the app needs too.
      Master Fan's cultivation practice is designed to protect it.
    hidden_capacity: show up without handing worth over to the schedule
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Master Fan Sees
    paragraphs:
    - Master Fan would begin by separating instability from identity. In Taoist terms,
      naturalness is what remains when striving falls away. It is not created by stable
      employment or destroyed by a bad schedule. Suffering grows when changing conditions
      are internalized as proof of personal failure.
    - Cultivation here is not grind language. It is the practice of letting the body
      lead when the world keeps shifting — one breath, one line drawn, one shift of
      weight — so the next move is possible without the whole self collapsing into
      the volatility. Heart response is faster than analysis. Sense from the heart
      first.
    - 'That makes the reframe precise: what feels like a personal fault -- me, broken,
      wrong -- is often accurate response to an economy built on instability. The
      problem is that a system and institutional structure keep generating what the
      individual then carries alone. The practice is to make this body the site of
      naturalness, not the site of blame.'
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Master Fan Sees
    paragraphs:
    - Master Fan reads work precarity through naturalness. The worker who cannot find
      stability is not defective. This body, in this moment, can be the place where
      dignity and action meet, regardless of what the schedule does next. The tradition
      does not ask you to leave the body to find ease. It asks you to release ten
      per cent of the tension and let the breath and the ground do the rest.
    - From there Master Fan turns to cultivation. The question is not how to never
      feel the drop when the app updates. The question is how to let the body lead
      so the next move is still yours — file the case, show up for the shift, or simply
      draw one line without turning the volatility into identity.
    - In that frame, self-blame softens. The problem is not that young people lack
      resilience or that I am wrong for feeling unstable. The problem is that the
      economy functions as a system that keeps outsourcing instability onto individual
      nervous systems. Naturalness arrives in increments. Let the body find its own
      stillness.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
