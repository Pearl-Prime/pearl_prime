    - id: practice_02
      display_name: "Mountain Stillness and Brush"
      duration: "5 minutes"
      announcement_line: "Master Fan teaches a 5-minute Mountain Stillness and Brush for when focus has already broken and the work is still waiting. It is in the sidebar, timed and step by step."
      relief_lines:
        - "The body finds its own stillness."
        - "The next paragraph becomes possible."
      relief_register: ["clarity", "capacity", "act again"]
      derived_from_frame: "primary"
      article_types: ["hard_news_spiritual_response"]

