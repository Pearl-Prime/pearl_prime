  - id: master_feung_edu_somatic_03
    line: You scrolled past three notifications during the lecture. Your shoulders
      lifted. Your breath shortened. You did not catch the last point, because the
      attention had already been divided three times before it could land.
    metadata:
      semantic_family: shoulder-divide-miss
      loop_type: portal_scatter
      body_register: shoulders
      digital_behavior: scroll-notifications
