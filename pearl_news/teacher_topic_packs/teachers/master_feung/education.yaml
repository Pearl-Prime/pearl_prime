topic_fit:
  fit_level: primary
  fit_reason: Education pressure is not a flaw in the student. In the Grand Painting,
    every person is a unique necessary piece — and the body that scatters under attention-hostile
    conditions is registering the structure, not personal failure. Calligraphy and
    being-yourself practice return one honest stroke to the hand even when the portal
    keeps pulling attention apart.
  forbidden_angles:
  - do not reduce this to generic wellness
  - do not frame the pressure as personal weakness
hook_personal:
  options:
  - id: master_feung_edu_hook_personal_01
    line: You still want to learn. You also know how much of your attention the system
      wastes before the work even begins — and part of you knows the fracture was
      never authored by you.
    metadata:
      semantic_family: attention-wasted-before
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_edu_hook_personal_02
    line: You feel the eyes drift before you have words for it. The mind has done
      its work — read the productivity threads, tried the focus apps, taken the screenings.
      Something quieter in you is asking to be witnessed rather than optimized.
    metadata:
      semantic_family: eyes-witness
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_edu_hook_personal_03
    line: At 1 a.m. you open the reading and switch to the chat. Neither move helps,
      because the deadline will not move and the chat will not stop — and the part
      of you trying to hold both is the part that has been over-asked all day.
    metadata:
      semantic_family: midnight-switch
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_edu_hook_personal_04
    line: You open the portal and your forehead tightens. You also know that no perfect
      focus, no flawless schedule, no extra study block will undo the attention conditions
      you did not create — and that something in you needs space to be the piece it
      actually is, not the student it has been asked to perform.
    metadata:
      semantic_family: piece-not-performance
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_edu_hook_personal_05
    line: The body knows the truth of the fragmentation before the analysis catches
      up. You have read enough study guides. What remains is a quieter question —
      how to be yourself, here, in this body, in this part of the larger artwork,
      without disappearing under the workload you did not author.
    metadata:
      semantic_family: be-yourself-under-workload
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: master_feung_edu_hook_big_01
    line: Educational stress is not only about workload. It is about what interruption-heavy
      systems do to attention, confidence, and the ability to stay in contact with
      learning. The mismatch is not in the student; it is in the structure that converts
      structural fragmentation into private nervous-system load.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_edu_hook_big_02
    line: Scattered attention is not a malfunction of will. It is the accurate registering
      of the gap between what learning actually requires and what attention-hostile
      systems will allow — and the cohort attending the portal is being asked to absorb
      the gap as a personal trait.
    metadata:
      semantic_family: fragmentation-as-accuracy
      angle: structural-deferral
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_edu_hook_big_03
    line: Humanity is a vast artwork — and the part of the painting now being asked
      to learn through attention-hostile design is the part with the least power to
      have authored the conditions. The structural mismatch is not abstract; it is
      the felt edge of every student who closes the portal and reopens it.
    metadata:
      semantic_family: grand-painting-mismatch
      angle: structural-mismatch
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_edu_hook_big_04
    line: The signal that older systems read as a focus problem is, in Master Feung's
      framework, the body registering that the conditions for learning have been engineered
      against the very coherence learning requires. That registration is not failure
      — it is presence.
    metadata:
      semantic_family: presence-registration
      angle: body-as-witness
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_edu_hook_big_05
    line: The collective field of learning has shifted faster than the institutions
      designed to hold it. What gets read as a generational attention crisis is, in
      part, the visible edge of a structural gap that no individual brush stroke was
      built to close alone.
    metadata:
      semantic_family: structural-gap
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: master_feung_edu_intro_01
    line: Master Feung, a teacher of Chinese wisdom traditions, has watched in his
      Xi'an cultural center young people carry education pressure not as a private
      failing but as the felt edge of the Grand Painting — the vast artwork in which
      every person is a unique, necessary piece. In his teaching, the body that scatters
      under the portal is not malfunctioning; it is the painting recognizing its own
      load.
    metadata:
      semantic_family: grand-painting-context
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_edu_intro_02
    line: Master Feung does not position himself as an authority above his students
      — he teaches that being yourself is the practice, not attaining an ideal. For
      decades he has worked at his Xi'an cultural center with young people whose study
      load arrives faster than their attention can settle. What his tradition offers
      is not another productivity stack; it is a return to the place each person already
      holds in the larger artwork.
    metadata:
      semantic_family: being-yourself-frame
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_edu_intro_03
    line: Master Feung works with calligraphy as embodied practice. The brush stroke
      cannot be undone — and that is the teaching. He has watched young students arrive
      certain they should be studying more, certain their scattered attention is proof
      of personal failure, and watched the certainty soften when the brush meets the
      page and presence becomes the practice.
    metadata:
      semantic_family: calligraphy-witness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_edu_intro_04
    line: Master Feung teaches from his five-floor cultural center in Xi'an, where
      Taoist, Buddhist, and Confucian traditions interweave into a single non-doctrinal
      practice. His pilgrimage to Hua Shan, the sacred Taoist mountain, is not metaphor
      — it is the lived ground of his teaching. From that ground he meets young students
      not with answers but with the recognition that they are already the piece the
      painting needed.
    metadata:
      semantic_family: xian-huashan-ground
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_edu_intro_05
    line: Master Feung teaches inside a tradition that reads humanity as a Grand Painting
      — every person a unique, necessary piece exactly where they need to be. He has
      watched the reframe land in young students carrying attention load and remove,
      at least, the additional burden of believing the load is proof they were placed
      wrong.
    metadata:
      semantic_family: piece-already-placed
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
