# Master Feung × partnerships (SDG 17: Partnerships for the Goals)
# Doctrine authority: SOURCE_OF_TRUTH/teacher_banks/master_feung/doctrine/doctrine.yaml
# Frame for partnerships: institutions collaborate the way a Grand Painting comes together — each piece necessary, none more central than another. The practice is to recognize where a stroke is already shared and treat that as the partnership infrastructure.

schema_version: 1
teacher_id: master_feung
topic: partnerships
active: true

identity:
  display_name: Master Feung
  attribution_name: Master Feung
  tradition: Chinese wisdom traditions (calligraphy as spiritual practice; Grand Painting teaching; Xi'an cultural center; Hua Shan pilgrimage lineage)
  tradition_short: Chinese wisdom
  teacher_setting_options:
    - Xi'an cultural center
    - calligraphy studio
    - Hua Shan pilgrimage path
  teacher_years: '40'
  affiliation_safe_line: has attended the United Spiritual Leaders Forum
  launch_approved: true

persona:
  id: gen_z_alpha
  age_band: 13-29
  default_register: phone-native, high-pressure, institution-skeptical
  daily_worlds:
    - school
    - phone
    - group chat
    - late-night scrolling
    - civic action
  tie_to_real_world_struggles:
    - id: trust_drain
      label: institutional trust collapsing under the weight of partnerships that announce themselves but do not show up where the reader lives
      loop: reads the partnership press release -> shoulders pull in -> closes the tab -> opens the inbox to find nothing landed where the family lives
      body_markers: [shoulders, chest, jaw]
      digital_markers: [open, close, search, refresh]

topic_fit:
  fit_level: primary
  fit_reason: |
    Partnerships read as institutional choreography until they touch the reader's neighborhood. Master
    Feung's Grand Painting frame holds that a partnership is a shared stroke — one only exists when
    multiple hands meet on the page. The practice is recognizing the strokes that already meet and
    extending those, rather than waiting for the announcement to mean something.
  forbidden_angles:
    - do not romanticize partnerships as cure-alls for structural harm
    - do not minimize accountability gaps in multilateral institutions
    - do not flatten Chinese wisdom into generic 'collaboration' rhetoric

hook_personal:
  options:
    - id: hook_personal_01
      line: |
        You read the partnership announcement. You search the address of the program. You scroll
        the family group chat and find no one near you who has heard of it. The announcement was
        not for your block.
      semantic_family: master_feung-partnerships-hook-personal
      tone: plain
      intensity: 3
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: hook_personal_02
      line: |
        You read the joint communique. You count the signatures. You scroll back to the part where
        a deadline lives. The deadline is two years out and three rooms away from anyone you know.
      semantic_family: master_feung-partnerships-hook-personal
      tone: plain
      intensity: 3
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: hook_personal_03
      line: |
        You hear the press conference clip in someone's reel. You wait for the part where the city
        you live in shows up. It does not. You close the app. The pressure in the chest is real.
      semantic_family: master_feung-partnerships-hook-personal
      tone: plain
      intensity: 4
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: |
        Multilateral partnerships continue to multiply at the announcement layer while implementation
        gaps widen at the neighborhood layer. The press-release-to-delivery distance is becoming the
        defining trust signal for Gen Z civic engagement.
      semantic_family: master_feung-partnerships-hook-big
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: hook_big_picture_02
      line: |
        Cross-sector partnerships work when the partners stay in the room past the photograph. The
        2025 SDG progress report named partnership-delivery — not partnership-formation — as the
        chokepoint slowing every other goal.
      semantic_family: master_feung-partnerships-hook-big
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: hook_big_picture_03
      line: |
        Multi-stakeholder partnerships are the SDG framework's load-bearing mechanism. When they
        stall, the entire schedule slips. Young people are noticing — and rerouting their civic
        energy to local coalitions that show up faster.
      semantic_family: master_feung-partnerships-hook-big
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

teacher_intro:
  options:
    - id: teacher_intro_01
      line: |
        Master Feung, a Chinese wisdom teacher from the Xi'an cultural center where calligraphy and
        Grand Painting teaching converge, has been watching the question shift in his students.
        It is no longer 'what should institutions do' but 'where in my street has any institution
        actually arrived'.
      semantic_family: master_feung-partnerships-intro
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: teacher_intro_02
      line: |
        Master Feung, from the Xi'an cultural center where calligraphy is taught as embodied practice,
        has been observing that his students arrive carrying not skepticism but precise documentation:
        which programs landed, which did not, which year, which block.
      semantic_family: master_feung-partnerships-intro
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: teacher_intro_03
      line: |
        For four decades Master Feung has taught calligraphy as an embodied practice in Xi'an. He
        has watched institutional trust thin out gradually, then suddenly. The students arriving
        in 2026 are no longer asking institutions to be better — they are asking which strokes
        actually meet on the page.
      semantic_family: master_feung-partnerships-intro
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

youth_somatic:
  options:
    - id: youth_somatic_01
      line: |
        You read the partnership announcement. Your shoulders pull in. You close the article. Then
        you open the family chat to ask if anyone has heard of it. No one has. LOOP_SEQUENCE: "read the announcement. shoulders pulled in. closed the article. opened the chat."
      loop_type: trust_drain
      body_register: shoulders
      digital_behavior: open-close
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: youth_somatic_02
      line: |
        You scroll the joint statement. Your chest tightens. You search the program address. Then
        you stop searching because the program is in a different city. LOOP_SEQUENCE: "scrolled the statement. chest tightened. searched the address. stopped searching."
      loop_type: trust_drain
      body_register: chest
      digital_behavior: scroll-search
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: youth_somatic_03
      line: |
        You read the press clip. Your jaw clenches. You refresh the local news feed. Then you close
        it because nothing local has been added. LOOP_SEQUENCE: "read the clip. jaw clenched. refreshed the feed. closed the tab."
      loop_type: trust_drain
      body_register: jaw
      digital_behavior: refresh-close
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

teacher_witness:
  options:
    - id: teacher_witness_01
      line: |
        Master Feung has observed this pattern consistently in the cultural center — students arriving
        with a precise inventory of partnerships that did not arrive. He treats the inventory as data,
        not cynicism: the body is reading where the strokes met and where they did not.
      semantic_family: master_feung-partnerships-witness
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: teacher_witness_02
      line: |
        In four decades of teaching, Master Feung has seen partnership rhetoric outpace partnership
        delivery in cycles. What is new is the speed of detection: the gap is visible inside one
        scroll session, and the body registers it before the mind names it.
      semantic_family: master_feung-partnerships-witness
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: teacher_witness_03
      line: |
        Master Feung watches students put the phone face-down after a partnership announcement
        without anger — just a kind of weariness. He treats the weariness as honest. The work is
        to find where strokes have actually met and extend from there.
      semantic_family: master_feung-partnerships-witness
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

turnaround:
  options:
    - id: turnaround_01
      stat_line_1: Dozens of cross-sector youth coalitions. Many countries.
      stat_line_2: Young organizers are publishing implementation dashboards, mapping partnership-to-neighborhood arrival times, and pressuring multilateral institutions to report delivery — not just formation.
      semantic_family: master_feung-partnerships-turnaround
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: turnaround_02
      stat_line_1: Many local civic alliances. Several donor accountability platforms.
      stat_line_2: Coalitions are tracking which announcements turned into programs, naming the lag, and asking partnership conveners to publish quarterly arrival reports rather than annual press packets.
      semantic_family: master_feung-partnerships-turnaround
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: turnaround_03
      stat_line_1: Multiple regions. Multiple delivery-watchdog pilots.
      stat_line_2: Networks of young civic researchers are building open partnership-tracking tools, treating delivery as the metric and announcement as the input — and getting multilateral conveners to adopt the same definitions.
      semantic_family: master_feung-partnerships-turnaround
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

bridge:
  options:
    - id: bridge_01
      line: |
        Master Feung's Grand Painting frame names the partnership question directly: a stroke that
        does not meet another stroke is not yet a partnership. The press release is the announcement;
        the meeting on the page is the partnership.
      semantic_family: master_feung-partnerships-bridge
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: bridge_02
      line: |
        From the Xi'an cultural center Master Feung holds a useful distinction: the page is not the
        partnership; the meeting of strokes on the page is. Announcement-only partnerships are
        unfinished work, not partnership failures.
      semantic_family: master_feung-partnerships-bridge
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: bridge_03
      line: |
        The calligraphy frame is concrete here: two brushes have to touch the same page. Master
        Feung teaches that recognizing where the brushes actually touch is the practice — the
        announcement layer can be loud while the touching layer stays sparse.
      semantic_family: master_feung-partnerships-bridge
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: What Master Feung Sees
      paragraphs:
        - |
          In Master Feung's Grand Painting teaching, a partnership exists when strokes meet on a
          page. The page is shared; the partnership is shared. The announcement of a partnership
          is preparation, not the thing itself.
        - |
          Master Feung teaches that the brush stroke cannot be undone, but the meeting of strokes
          requires both brushes to arrive. He reads the trust gap not as cynicism but as
          accurate reading: the body is asking where the second brush is.
        - |
          From the Xi'an cultural center where Confucian, Taoist, and Buddhist traditions interweave
          in calligraphy and art, Master Feung holds that being-yourself is the precondition for
          true partnership. A partnership of pretended selves is not a partnership; it is theater.
      semantic_family: master_feung-partnerships-perspective
      reframe_type: delivery-over-announcement
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: teacher_perspective_02
      header: What Master Feung Sees
      paragraphs:
        - |
          Master Feung draws a careful distinction: partnership formation is a stroke in one place;
          partnership delivery is a stroke meeting another stroke. The painting needs both. The
          announcement layer can be loud without the meeting layer being present.
        - |
          He teaches that the practice of recognizing already-shared strokes is the work. Many
          partnerships are already meeting at the neighborhood level — between a school and a
          clinic, between a co-op and a youth center. The Grand Painting includes them all.
        - |
          Master Feung treats partnership as a craft, not a performance. The Xi'an center teaches
          students to read where the meeting is real and to extend from there, rather than waiting
          for the loudest announcement to land in their block.
      semantic_family: master_feung-partnerships-perspective
      reframe_type: delivery-over-announcement
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: teacher_perspective_03
      header: What Master Feung Sees
      paragraphs:
        - |
          Master Feung reads the partnership weariness as honest body data: the shoulders tighten
          when the announcement is not matched by arrival. That tightening is a request for
          accuracy, not an emotional excess to manage.
        - |
          The calligraphy practice is small and concrete. The brush meets the page. The body
          finds out where the meeting is already happening. From the Grand Painting frame, every
          authentic partnership — local clinic with local school — is a finished stroke already.
        - |
          Master Feung holds that the practice and the structural work are parallel. The practice
          keeps the body able to read accurately. The structural work asks the announcement layer
          to converge with the meeting layer. Both stay.
      semantic_family: master_feung-partnerships-perspective
      reframe_type: delivery-over-announcement
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

practice:
  options:
    - id: practice_01
      display_name: Two Brushes Practice
      duration: 4 min
      announcement_line: |
        Two pens on the same page. One stroke from each. Notice where they meet. That meeting is the
        partnership. The page is unchanged either way; the meeting is what made it a partnership.
      relief_lines:
        - The first stroke does not have to meet the second immediately. The page can wait.
        - The body reads when a partnership is real — chest releases when the second brush arrives.
        - Three minutes is the practice. The institutional accountability is the institutional work. Both stay.
      relief_register: grounded
      derived_from_frame: Grand Painting
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: practice_02
      display_name: Meeting on the Page
      duration: 5 min
      announcement_line: |
        Set the phone down. Take a pen. Draw two lines from different sides of the page until they
        meet. Notice the shoulders. The meeting is the practice.
      relief_lines:
        - The page is large enough for both lines. Meeting is one event, not the only event.
        - The shoulders release when the meeting arrives. The body knows the difference between meeting and announcement.
        - The work continues outside the page. The page is the practice, not the policy.
      relief_register: grounded
      derived_from_frame: Grand Painting
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: practice_03
      display_name: Stroke Inventory
      duration: 3 min
      announcement_line: |
        Stand. Three slow breaths. Name one partnership that has arrived where you live — a clinic
        with a school, a co-op with a library, anything. Notice the body. That meeting is data.
      relief_lines:
        - The body responds faster to arrived partnerships than to announced ones.
        - One concrete meeting is more useful than many announced ones. The painting includes both, but the meeting is the partnership.
        - Three breaths is the practice. The civic work is the civic work. Both stay.
      relief_register: grounded
      derived_from_frame: Grand Painting
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

sdg:
  number: '17'
  name: Partnerships for the Goals
  agency: UN Department of Economic and Social Affairs (UN DESA)
  link_to_topic: Master Feung's Grand Painting frame meets SDG 17 where partnership is a meeting of strokes — delivery, not announcement.

cta:
  options:
    - id: cta_01
      org: SDG Partnerships Platform (UN DESA)
      line: |
        Open sdgs.un.org/partnerships. Pick one partnership listed for your region. Search for it
        in local news. Note whether it has arrived where you live and bring that to the next
        civic conversation you are in.
      semantic_family: master_feung-partnerships-cta
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: cta_02
      org: Multi-Stakeholder Partnerships (UN DESA)
      line: |
        Read the 2025 SDG Progress Report at unstats.un.org/sdgs. Identify the delivery gaps named
        for Goal 17. Pick one and ask a local representative which side of the gap your community
        sits on.
      semantic_family: master_feung-partnerships-cta
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]
    - id: cta_03
      org: Civicus Monitor
      line: |
        Track civic-space conditions at monitor.civicus.org. Filter for your country. The conditions
        listed predict whether a partnership announcement is likely to arrive — bring that data to
        the next coalition you join.
      semantic_family: master_feung-partnerships-cta
      article_types: [hard_news_spiritual_response, youth_feature, explainer_context, commentary, interfaith_dialogue_report]

