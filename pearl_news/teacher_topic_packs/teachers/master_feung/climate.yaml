topic_fit:
  fit_level: primary
  fit_reason: Climate distress is not a flaw in the young person. In the Grand Painting,
    every piece is necessary — and the body that tightens under the next number is
    not broken but registering its own place in the larger artwork. Calligraphy and
    being-yourself practice return the brush stroke to the hand even when the system
    keeps moving slower than the heat.
  forbidden_angles:
  - do not reduce to generic resilience
  - do not frame distress as personal weakness
hook_personal:
  options:
  - id: master_feung_climate_hook_personal_01
    line: You care more about the planet than ever. You still feel less able to stay
      with the next number long enough to decide what to do — and part of you knows
      the load was never meant to be carried by your nervous system alone.
    metadata:
      semantic_family: care-vs-capacity
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_hook_personal_02
    line: You feel the chest tighten before you have words for it. The mind has done
      its work — read the threads, taken the actions it could. Something quieter in
      you is asking to be witnessed rather than mobilized into one more frantic gesture.
    metadata:
      semantic_family: chest-witness
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_hook_personal_03
    line: At 1 a.m. you close the app and open it again. Neither move helps, because
      the future does not wait for your nervous system to feel ready — and the part
      of you trying to solve it before sleep is the part that has been over-asked.
    metadata:
      semantic_family: midnight-reopen
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_hook_personal_04
    line: You read the new threshold and your throat tightens. You also know that
      no individual posture, no perfect feeling, no flawless action will undo the
      delay you did not create — and that something in you needs space to be the piece
      it actually is, not the savior it cannot be.
    metadata:
      semantic_family: piece-not-savior
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_hook_personal_05
    line: The body knows the truth of the number before the analysis catches up. You
      have read enough commentary. What remains is a quieter question — how to be
      yourself, here, in this body, in this part of the larger artwork, without disappearing
      under the load you did not author.
    metadata:
      semantic_family: be-yourself-under-load
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: master_feung_climate_hook_big_01
    line: A generation can be highly informed, morally serious, and still lose daily
      functional capacity when every update arrives as proof that institutions waited
      too long. The mismatch is not in the young person; it is in the structure that
      keeps converting collective load into private nervous-system collapse.
    metadata:
      semantic_family: institutional-delay
      angle: future-loss
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_hook_big_02
    line: Climate grief is not a malfunction of attention. It is the accurate registering
      of the gap between what was promised and what is being delivered — and the cohort
      reading the numbers is being asked to hold what institutions deferred.
    metadata:
      semantic_family: grief-as-accuracy
      angle: institutional-deferral
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_hook_big_03
    line: Humanity is a vast artwork — and the part of the painting now being asked
      to carry the climate load is the part with the least power to have authored
      the conditions. The structural injustice is not abstract; it is the felt edge
      of every young person who reopens the app.
    metadata:
      semantic_family: grand-painting-injustice
      angle: structural-injustice
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_hook_big_04
    line: The climate signal that older systems read as anxiety is, in Master Feung's
      framework, the body registering that the world it was prepared for is no longer
      the world it has to live in. That registration is not pathology — it is presence.
    metadata:
      semantic_family: presence-registration
      angle: body-as-witness
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_hook_big_05
    line: The collective field has shifted faster than the institutions designed to
      hold it. What gets read as climate anxiety in young people is, in part, the
      visible edge of a structural gap that no individual brush stroke was built to
      close alone.
    metadata:
      semantic_family: structural-gap
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: master_feung_climate_intro_01
    line: Master Feung, a teacher of Chinese wisdom traditions, has watched in his
      Xi'an cultural center young people carry climate distress not as a private failing
      but as the felt edge of the Grand Painting — the vast artwork in which every
      person is a unique, necessary piece. In his teaching, the body that tightens
      under the next number is not malfunctioning; it is the painting recognizing
      its own load.
    metadata:
      semantic_family: grand-painting-context
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_intro_02
    line: Master Feung does not position himself as an authority above his students
      — he teaches that being yourself is the practice, not attaining an ideal. For
      decades he has worked at his Xi'an cultural center with young people whose climate
      load arrives faster than their nervous systems can settle. What his tradition
      offers is not another instruction stack; it is a return to the place each person
      already holds in the larger artwork.
    metadata:
      semantic_family: being-yourself-frame
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_intro_03
    line: Master Feung works with calligraphy as embodied practice. The brush stroke
      cannot be undone — and that is the teaching. He has watched young students arrive
      certain they should be doing more, certain their distress is proof of failure,
      and watched the certainty soften when the brush meets the page and presence
      becomes the practice.
    metadata:
      semantic_family: calligraphy-witness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_intro_04
    line: Master Feung teaches from his five-floor cultural center in Xi'an, where
      Taoist, Buddhist, and Confucian traditions interweave into a single non-doctrinal
      practice. His pilgrimage to Hua Shan, the sacred Taoist mountain, is not metaphor
      — it is the lived ground of his teaching. From that ground he meets young people
      not with answers but with the recognition that they are already the piece the
      painting needed.
    metadata:
      semantic_family: xian-huashan-ground
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_intro_05
    line: Master Feung teaches inside a tradition that reads humanity as a Grand Painting
      — every person a unique, necessary piece exactly where they need to be. He has
      watched the reframe land in young people carrying climate load and remove, at
      least, the additional burden of believing the load is proof they were placed
      wrong.
    metadata:
      semantic_family: piece-already-placed
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: master_feung_climate_somatic_01
    line: You read the update in a group chat. Your chest tightened. You closed the
      app. Then you opened it again because not looking did not make the number less
      true.
    metadata:
      semantic_family: chest-tighten-reopen
      loop_type: read-tighten-close-return
      body_register: chest
      digital_behavior: close-return
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_somatic_02
    line: You saw the new threshold before class. Your throat tightened. You put your
      phone face down. Then you picked it up again because the future does not wait
      for you to feel ready.
    metadata:
      semantic_family: throat-threshold
      loop_type: read-tighten-close-return
      body_register: throat
      digital_behavior: put-down-return
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_somatic_03
    line: You scrolled past three climate posts before lunch. Your shoulders lifted.
      Your breath shortened. You did not finish the sandwich, because the body had
      already ranked the load above the meal.
    metadata:
      semantic_family: shoulder-shorten-skip
      loop_type: read-tighten-close-return
      body_register: shoulders
      digital_behavior: scroll-past
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_somatic_04
    line: You held your breath without noticing while the headline loaded. Your chest
      locked. You exhaled only when you saw the number and only halfway, because there
      is always another headline coming.
    metadata:
      semantic_family: breath-hold-headline
      loop_type: read-tighten-close-return
      body_register: breath
      digital_behavior: headline-load
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_somatic_05
    line: You lay down and your eyes pinned open. The data replayed. Your jaw would
      not soften. You knew the work would still be there in the morning and you could
      not find the door into rest.
    metadata:
      semantic_family: night-replay
      loop_type: read-tighten-close-return
      body_register: jaw
      digital_behavior: lying-down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: master_feung_climate_witness_01
    line: Master Feung has seen this exact loop in students at his Xi'an center —
      the reading, the tightening, the closing, the return. In his teaching that loop
      is not character; it is the painting registering load through the only piece
      currently asked to hold it.
    metadata:
      semantic_family: loop-mirror
      loop_type: read-tighten-close-return
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_witness_02
    line: Master Feung has watched young people walk into the calligraphy studio already
      mid-loop, already certain the effort should have settled this by now. In his
      tradition that certainty is the signal — the place where striving stops and
      presence can return.
    metadata:
      semantic_family: striving-exhausted
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_witness_03
    line: He has seen the body carry what the explanations could not. In his framework
      the somatic loop is not a malfunction — it is the painting speaking through
      the only piece left awake when the analysis has been overused.
    metadata:
      semantic_family: somatic-painting-message
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_witness_04
    line: Master Feung has watched young students arrive with grief that no commentary
      names accurately. In his tradition that grief is information, not pathology
      — a signal that the cohort being asked to carry the climate load was never the
      one that authored the conditions producing it.
    metadata:
      semantic_family: grief-information
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_witness_05
    line: Master Feung has watched the moment when a young person stops trying to
      produce the perfect feeling and lets the brush meet the page instead. In his
      tradition that moment is not weakness — it is the return to being yourself that
      conventional response has no language for.
    metadata:
      semantic_family: brush-return
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: master_feung_climate_turnaround_01
    stat_line_1: 7,500 strikes. 185 countries.
    stat_line_2: Fridays for Future organizers have built a network of more than seven
      thousand five hundred coordinated strikes across one hundred eighty-five countries
      — a global youth infrastructure no agency authored and no national government
      can quietly absorb.
    metadata:
      semantic_family: strike-infrastructure
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_turnaround_02
    stat_line_1: 1.5°C. AR6 thresholds.
    stat_line_2: The IPCC AR6 reports synthesize the climate science across the 1.5°C
      and 2°C scenarios — the documents young organizers now cite when officials hedge
      on what the next decade actually requires.
    metadata:
      semantic_family: ar6-citation-base
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_turnaround_03
    stat_line_1: UNFCCC official. Since 2009.
    stat_line_2: YOUNGO, the official youth constituency at the UNFCCC since 2009,
      now coordinates youth delegations across COP cycles — a recognized seat that
      did not exist sixteen years ago and now binds youth voice to the actual treaty
      table.
    metadata:
      semantic_family: youngo-seat
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_turnaround_04
    stat_line_1: 7.6 million people. 2019.
    stat_line_2: The Global Climate Strike of September 2019 mobilized more than seven
      and a half million participants worldwide — at the time the largest climate
      mobilization in history, and a measurable floor for what coordinated youth action
      can put into the streets.
    metadata:
      semantic_family: 2019-mobilization
      article_types:
      - hard_news_spiritual_response
  - id: master_feung_climate_turnaround_05
    stat_line_1: $300 billion. COP28 ratified.
    stat_line_2: The COP loss-and-damage fund ratified at COP28 commits $300 billion
      by 2035 to the countries already bearing climate harm they did not author —
      the first multilateral financial instrument that names the obligation directly
      rather than describing it as charity.
    metadata:
      semantic_family: loss-damage-fund
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: master_feung_climate_bridge_01
    line: 7,500 strikes. 185 countries. The tracker measures the scaffolding young
      people built. It has no column for what made the next strike possible after
      the last delay — the capacity to stay in contact with the truth long enough
      to act again without handing the whole self over to the load. Master Feung's
      tradition has language for what remains when striving falls away — being yourself
      in the painting, even when the painting is on fire.
    hidden_capacity: stay in contact with the truth without handing the self over
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_bridge_02
    line: The numbers show the strikes the young built. They do not show the Grand
      Painting context that those strikes are being built inside — a period where
      the cohort with the least authoring power is being asked to hold the most consequential
      load. Master Feung's tradition holds that context as native, not metaphor.
    hidden_capacity: hold the larger context the data cannot show
    metadata:
      semantic_family: grand-painting-context-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_bridge_03
    line: The data captures cases, targets, and thresholds. It cannot capture the
      shift that happens when a young person stops trying to be the savior and remembers
      they are already the piece the painting needed. In Master Feung's framework
      that remembrance is the actual ground — the part no tracker reports.
    hidden_capacity: remember the piece the painting already needed
    metadata:
      semantic_family: remembrance-ground
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_bridge_04
    line: The infrastructure is measurable. The brush stroke that cannot be undone
      — the presence each person brings when they stop forcing — is not. Master Feung's
      tradition does not argue with the measurement; it works in the layer beneath
      it, where calligraphy is practiced and being yourself becomes the daily teaching.
    hidden_capacity: work in the brush-stroke layer beneath measurement
    metadata:
      semantic_family: measurable-vs-brush
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_bridge_05
    line: Strikes, targets, and platforms can be counted. The structural injustice
      underneath — a generation asked to carry what previous generations deferred
      — cannot. Master Feung's tradition does not replace the structural work; it
      names the layer institutional response is not designed to reach and offers Hua
      Shan-grounded presence as the door in.
    hidden_capacity: name the structural injustice the trackers cannot count
    metadata:
      semantic_family: structural-injustice-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: master_feung_climate_perspective_01
    header: What Master Feung Sees
    paragraphs:
    - In Master Feung's framework, humanity is a Grand Painting — a vast artwork in
      which every person is a unique, necessary piece exactly where they need to be.
      The young person carrying climate load is not misplaced; they are the piece
      the painting placed precisely there. Suffering grows when that placement is
      misread as personal failure rather than recognized as the painting's accurate
      registration of the load.
    - Calligraphy in Master Feung's teaching is not art for display. It is embodied
      practice in which body, breath, and presence unite. The brush stroke cannot
      be undone — and that is the teaching. The young person who keeps trying to do
      it perfectly is fighting the actual practice. Presence is the practice. The
      brush meets the page once, and that meeting is enough.
    - The reframe is precise — what feels like personal weakness — me, broken, wrong
      — is often the painting's accurate signal that the system and institutional
      structure have placed this load on the piece least able to have authored its
      conditions. The practice is not to fix the self. The practice is to be yourself,
      here, in this body, and let the brush meet the page even when the page is on
      fire.
    metadata:
      semantic_family: grand-painting-reframe
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_perspective_02
    header: What Master Feung Sees
    paragraphs:
    - Calligraphy is not metaphor in Master Feung's teaching. It is the literal practice
      — brush, ink, page, breath, body — in which the unrepeatable nature of presence
      becomes felt. The young person whose climate distress is being processed as
      pathology has not been offered the layer the tradition has held for centuries —
      the layer where one honest stroke is enough.
    - The practice matters because it explains the relief many young people describe
      after time at the page — not that they have been argued out of the grief, but
      that the grief has loosened on a layer that argument never reaches. The brush
      did not have to be perfect for the breath to soften.
    - This is the part conventional response is not designed to deliver. It does not
      invalidate the strikes, the cases, or the policy work — but it names a missing
      layer, and offers a tradition that has worked in that layer for generations.
    metadata:
      semantic_family: calligraphy-mechanism
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_perspective_03
    header: What Master Feung Sees
    paragraphs:
    - In Master Feung's tradition, Hua Shan is not a destination — it is a relationship.
      The sacred Taoist mountain near Xi'an has been a pilgrimage site for centuries,
      and Master Feung's own time there is the lived ground of what he teaches. The
      mountain does not try to be stable. It is. The body that learns from the mountain
      stops trying to be stable and lets stability arrive on its own.
    - For a young person carrying climate load, the experience of being witnessed
      by something larger than the algorithm is, in itself, structurally different
      from being processed by it. The message that lands is not "here is the rule";
      it is "you are already the piece the painting needed, and the load you carry
      was never authored by you alone."
    - That distinction — witnessed rather than processed — is what conventional infrastructure
      cannot reproduce, and what Master Feung's tradition has carried as native for
      decades at the Xi'an center.
    metadata:
      semantic_family: huashan-witness
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_perspective_04
    header: What Master Feung Sees
    paragraphs:
    - Being yourself, in Master Feung's framework, is the teaching — not self-improvement,
      not attaining an ideal, not becoming someone else. The young person who feels
      they should be more activist, more resilient, more anything is fighting the
      actual practice. The painting placed them exactly where they are, and the load
      they feel is the painting's load, not theirs alone.
    - This is not a flattering reframe. It does not promise the climate trajectory
      will shift quickly, and it does not blame the cohort for feeling unstable in
      an unstable trajectory. It simply names the placement and removes the additional
      weight of believing the instability proves they were placed wrong.
    - That weight removal is, in calligraphy practice, often the part that lands first
      — before the deeper return to being yourself can begin.
    metadata:
      semantic_family: being-yourself-frame
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_feung_climate_perspective_05
    header: What Master Feung Sees
    paragraphs:
    - Xi'an, in Master Feung's tradition, is the ground where Taoist, Buddhist, and
      Confucian streams converge — not into a hybrid doctrine but into a single non-doctrinal
      practice of authentic presence. The young person who feels they need a system,
      a method, a perfect approach has not yet been told that the converging streams
      do not produce a method. They produce a return.
    - Cultivation here is not productivity language. It is the practice of letting
      the body lead — one breath, one stroke, one shift of weight — so the next move
      arrives from presence rather than panic. The mountain does not try. The brush
      does not strive. Let the body learn from that.
    - In that frame, self-blame softens. The problem is not that young people care
      too much or that you are wrong for feeling strained. The problem is that institutions
      kept deferring, and the painting is now registering the deferral through the
      piece least able to absorb it. Being yourself, here, is the practice. The rest
      is the system's accounting, not yours.
    metadata:
      semantic_family: xian-convergence
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
