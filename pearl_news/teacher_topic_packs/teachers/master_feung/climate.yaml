bridge:
  options:
  - id: tracker_capacity_01
    line: '2,666 cases. 51 jurisdictions. The tracker measures what young people did.
      It has no column for what made the next filing possible after the last delay
      — the capacity to stay functional enough to act again when the system keeps
      not responding. The organizer who filed the next case needed it. So does the
      person who read the update, closed the app, and opened it again. Master Fan''s
      tradition has been developing it for millennia: naturalness that returns when
      the body stops forcing.'
    hidden_capacity: stay functional enough to act again
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: tracker_capacity_02
    line: Climate trackers count cases, targets, and thresholds. They do not count
      the inner capacity that lets a young person stay in contact with the truth long
      enough to act again after another institutional delay. That capacity — what
      remains when striving falls away and the body can move from the heart — is what
      the next organizer needs. It is what the reader who reopened the app needs too.
      Master Fan's cultivation practice is designed to protect it.
    hidden_capacity: stay in contact with truth without losing function
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
    - commentary
teacher_perspective:
  options:
  - id: naturalness_cultivation_01
    header: What Master Fan Sees
    paragraphs:
    - Master Fan begins with naturalness — the state that remains when striving falls
      away. The body that tightens under climate news is not malfunctioning. It is
      accurately perceiving the mismatch between reassurance and reality. The tradition
      does not ask you to force calm. It asks you to release ten per cent of the tension,
      then let the breath and the ground do the rest.
    - 'Master Fan pairs that with cultivation: the practice of refining the self through
      art, movement, breath, and attention. When climate information keeps converting
      into helplessness, the move is not to think your way out. It is to let the body
      lead — one breath, one line drawn, one shift of weight. That is how action becomes
      possible again.'
    - 'The shift matters here: what feels like a personal fault — me, broken, wrong
      — is often accurate response to a system and institutional structure shaped
      by institutional delay. The body stops calling itself broken when it senses
      from the heart first — heart response is faster and more honest than analysis.
      Trust what arrives.'
    semantic_family: naturalness-cultivation
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: naturalness_cultivation_02
    header: What Master Fan Sees
    paragraphs:
    - Master Fan reads climate panic through heart response — sensing from the heart
      before the mind categorises. The urgency you feel is not an error signal. It
      is the deepest kind of intelligence, responding to danger.
    - From there Master Fan turns to naturalness. The question is not how to feel
      calm all day. The question is how to let the body find its own stillness so
      that the next move is not forced but aligned. The mountain does not try to be
      stable. Let the body learn from that.
    - In that frame, self-blame softens. The problem is not that young people care
      too much or that I am wrong for feeling strained. The problem is that a system
      and institutional structure keep outsourcing unbearable delay onto individual
      nervous systems. Cultivation through art and breath returns you to what was
      always there — naturalness — so you can act again.
    semantic_family: naturalness-cultivation-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
