teacher_intro:
  options:
  - id: teacher_intro_01
    line: Master Fan Jo, a Taoist teacher of cultivation through art, movement, and
      the Guqin, has seen in practice sessions in the studio what climate news does
      to young people. Master Fan has watched students ask not for calm, but for the
      capacity to stop the body from locking under pressure so the next move is still
      possible.
    semantic_family: identity_seen_shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_intro_02
    line: Master Fan Jo, grounded in Taoist naturalness and Tai Chi, has watched in
      practice sessions climate fear arrive first as moral seriousness and then as
      the body forcing. Master Fan has observed young people asking not whether the
      crisis is real, but how to return to what the body knows before the mind spirals
      — breath, ground, one honest line.
    semantic_family: identity_seen_shift_alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
    - commentary
