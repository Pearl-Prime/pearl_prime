      LOOP_SEQUENCE: "saw the update. jaw and breath locked. put the phone down. picked
      it up again."'
    loop_type: conflict_hold
    body_register: jaw
    digital_behavior: checks again
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Pamela has seen this exact loop in young people — the alert lands, the body
      contracts and holds, time stops for a second, and attention returns because
      reality is still there. Her Vajrayana and somatic training does not pathologize
      the body; it asks what the body is holding and how to transmute it so that the
      person can protect others, tell the truth, or act again.
    semantic_family: loop-mirror
    loop_type: conflict_hold
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: She has watched that sequence — the notification arrives, the chest or jaw
      holds, the device goes down, and then the mind goes back. The body has been
      carrying what the mind could not yet integrate. Pamela's tradition offers a
      practice to meet what is held with presence.
    semantic_family: loop-mirror-alt
    loop_type: conflict_hold
    article_types:
    - hard_news_spiritual_response
