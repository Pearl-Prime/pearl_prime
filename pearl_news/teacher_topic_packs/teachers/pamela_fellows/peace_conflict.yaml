bridge:
  options:
  - id: bridge_01
    line: 'The tracker measures the circles and campaigns young people built. It has
      no column for what made the next act of peace possible after another round of
      violence — the capacity to release what the body was holding so that clarity
      could return without calling the response a weakness. The young person who showed
      up to the next dialogue needed that capacity. So does the one who put the phone
      down and picked it up again. Pamela''s Vajrayana training names this exactly:
      the five neurotic poisons — aggression, craving, ignorance, jealousy, pride
      — are not obstacles to be removed. They are the raw material of the five buddha
      wisdoms. The body that braced at the conflict alert is holding energy that,
      met with somatic presence instead of suppression, transmutes into the clarity
      that peace requires.'
    hidden_capacity: release what the body holds so the person can act again
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: 'The numbers measure outreach and dialogue sessions. They do not measure
      what happens in the body when a young person finally has a practice that includes
      what they are carrying — not armoring against the fear, but meeting the body
      where it is so that something can shift. That shift is what the next dialogue
      needs. It is what the person in the loop needs. Pamela''s tradition has a name
      for this: the tantric principle that nothing needs to be rejected. The fear,
      met with practice, is itself the path back to presence.'
    hidden_capacity: include the body so the person can stay in contact with danger
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Pamela Sees
    paragraphs:
    - Pamela would not tell young people to calm down as if fear were the mistake.
      Fear can be accurate contact with danger. The body holds what the mind cannot
      yet process. The real question is whether that holding becomes a practice of
      release — so that the person can respond truthfully — or a collapse that hands
      the whole nervous system over to repetition and panic.
    - 'From there she turns to the tantric principle: the poison is the medicine.
      The body''s intelligence includes what the mind avoids. When young people are
      given a practice that meets what is held with somatic presence rather than judgment,
      the capacity to stay functional without denying reality becomes available.'
    - That matters because what feels like a personal fault — me, broken, wrong —
      is often the body accurately holding the impact of living near public disorder
      that institutions have not contained within a system and institutional structure.
      Pamela's tradition offers a practice to meet what is held so that the person
      can act again from steadier ground.
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Pamela Sees
    paragraphs:
    - In Pamela's tradition, conflict fear is not only cognitive. It lands in the
      body — the chest, the jaw, the breath — and the body holds it when the alert
      lands faster than the mind can integrate. The tradition does not ask you to
      stop feeling; it asks you to include the body in the response.
    - Heartfulness here means living from the heart's intelligence — a deeper knowing
      that includes the body and the present moment. When young people are given a
      practice that meets what is held with warmth rather than denial, the capacity
      to remain functional enough to protect others or tell the truth becomes available.
    - In that frame, self-blame softens. The problem is not that young people are
      too sensitive or that I am wrong for feeling shattered. The problem is that
      the system and institutional structure have left the body carrying public disorder
      without a practice of release. Pamela's tradition offers that practice.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
