hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Conflict news is not only geopolitical. It becomes a daily fight over whether
      attention, sleep, and moral seriousness can stay intact while public disorder
      keeps leaking into the body.
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Pamela Fellows — Vajrayana-initiated, yoga-certified, trained in somatic
      therapy under Peter Levine and Pat Ogden — has watched in practice sessions
      young people hold public violence inside private nervous systems. They are not
      asking whether the conflict is real. They are asking how to keep the body from
      locking down under it. Her tradition says the energy of fear, met with practice
      rather than suppression, transmutes into wisdom.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Pamela Fellows teaches from a Vajrayana and somatic ground — holding empowerments,
      ngondro completion, and the body-reading of Levine and Porges. She has watched
      in practice sessions students carry conflict news as if the body were a container
      for everything the mind could not process. Her tradition does not armor the
      body or bypass the fear; it meets what is held and transmutes it.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
