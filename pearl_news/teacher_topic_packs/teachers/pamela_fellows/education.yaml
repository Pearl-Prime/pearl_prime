    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Education strain is not only cognitive. It lands in young bodies as held
      tension when the system names depth and care while organizing daily life around
      fragmentation and pressure.
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: 'Pamela Fellows — Vajrayana-initiated, yoga-certified, trained in somatic
      therapy under Peter Levine and Pat Ogden — has watched in practice sessions
      students carry school pressure as if scattered attention were a moral flaw.
      They are not asking whether education matters. They are asking what the body
      is holding when the system keeps violating the conditions learning needs. Her
      tradition reads this through the Four Noble Truths: name the suffering, name
      the pattern driving it, confirm it can shift, practice the path.'
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Pamela Fellows teaches from a Vajrayana and somatic ground — holding empowerments,
      ngondro completion, and the body-reading of Levine and Porges. She has seen
      in practice sessions students arrive already exhausted by the effort required
      just to stay with the task — and the body holding what the mind could not yet
      name. Her tradition does not separate body from mind; it transmutes what is
      held.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
