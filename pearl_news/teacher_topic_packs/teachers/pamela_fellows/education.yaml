teacher_witness:
  options:
  - id: teacher_witness_01
    line: Pamela has seen that exact sequence — the task appears, the body braces,
      attention leaves, and effort has to return inside a system that keeps misnaming
      the problem. Her Vajrayana and somatic training does not blame the body; it
      asks what the body is holding and how to transmute it so that learning can happen.
    semantic_family: loop-mirror
    loop_type: portal_hold
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: She has watched students carry this loop — the portal opens, the body holds
      tension, the tab changes, and then the same pressure pulls them back. The body
      has been holding what the fragmented system could not contain.
    semantic_family: loop-mirror-alt
    loop_type: portal_hold
    article_types:
    - hard_news_spiritual_response
