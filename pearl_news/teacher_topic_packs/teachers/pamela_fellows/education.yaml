bridge:
  options:
  - id: bridge_01
    line: '410 workshops. 27 cities. The tracker measures reforms and study supports.
      It has no column for what made the next honest return to learning possible after
      another day of fragmentation — the capacity to release what the body was holding
      so that attention could return without calling the system''s disorder your failure.
      The student who came back to the portal needed that capacity. Pamela''s Vajrayana
      training names this: the neurotic energy — the frustrated anger, the scattered
      craving, the dull ignorance — is not an obstacle. Met with somatic presence
      and the Four Noble Truths as diagnostic, it transmutes into mirror-like wisdom,
      discriminating awareness, or the wisdom of equanimity. The body that braced
      at the portal is holding energy that becomes clarity when met, not fought.'
    hidden_capacity: release what the body holds so attention can return
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: 'The numbers measure programs and reforms. They do not measure what happens
      in the body when a young person finally has a practice that includes what they
      are carrying — not fixing focus from the outside, but meeting the body where
      it is so the mind can return to the work. That capacity is what the next honest
      study session needs. Pamela''s tradition has a name for this: the tantric principle
      that nothing needs to be rejected. The scattered energy, met with presence,
      is itself the path back to attention.'
    hidden_capacity: include the body so the mind can return to the work
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Pamela Sees
    paragraphs:
    - Pamela would not start by calling the student distracted. She would start by
      noticing that the body is holding what the fragmented system has not been able
      to contain. In her Vajrayana and somatic tradition, the body holds what the
      mind avoids — and that held energy is not a defect but raw material. When the
      system names depth and care while producing fragmentation all day long, the
      body carries the cost.
    - From there she turns to the heart's intelligence. The question is not how to
      dominate attention. It is how to include the body in the response, so that what
      feels like a problem with the student can be seen as a truthful reading of a
      disordered learning environment — and the body can release what it has been
      holding.
    - 'That is the reframe: what feels like a personal fault — me, broken, wrong —
      is often the body accurately holding conditions that no learning environment
      should normalize. The problem is that the system and institutional structure
      keeps generating what the individual then carries alone. The practice is not
      to empty the body of feeling but to meet what is there so that the person can
      return to the work from steadier ground.'
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Pamela Sees
    paragraphs:
    - In Pamela's tradition, scattered attention is not only a cognitive issue. It
      lands in the body — the forehead, the shoulders, the jaw — and the body holds
      it when the system cannot provide the conditions for sustained focus. The tradition
      does not ask you to try harder; it asks you to include the body in the equation.
    - Heartfulness here means living from the heart's intelligence — a deeper knowing
      that includes the body and the present moment. When young people are given a
      practice that meets what is held with presence rather than judgment, the capacity
      to return to the work without making interruption your identity becomes available.
    - In that frame, self-blame softens. The problem is not that students are lazy
      or unfocused or that I am wrong for feeling overloaded. The problem is that
      the body has been carrying the load of a fragmented system without a practice
      of release. Pamela's tradition offers that practice.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
