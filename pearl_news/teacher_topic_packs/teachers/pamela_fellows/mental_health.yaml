    - "do not frame the pressure as personal weakness"

hook_personal:
  options:
    - id: hook_personal_01
      line: "You know the spiral before anyone names it. You still carry the day forward while feeling less sure your body can keep holding what the mind has not released."
      semantic_family: "personal-pressure"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: "Youth mental overload is not only about symptoms. It is about what constant pressure does to the body — what gets held when attention, rest, and the ability to feel are all under siege."
      semantic_family: "system-pressure"
      angle: "systemic-pressure"
      article_types: ["hard_news_spiritual_response"]

teacher_intro:
  options:
    - id: teacher_intro_01
      line: "Pamela Fellows — Vajrayana-initiated, yoga-certified, trained in somatic therapy under Peter Levine and Pat Ogden — has seen in practice sessions what this pressure does to young people who still look functional from the outside. They are not asking how to feel inspired. They are asking how to stop the body from holding what the mind has not found a way to release. Her tradition says the poison is the medicine: the neurotic energy driving the spiral is the same energy that becomes wisdom when met with presence."
      semantic_family: "identity-seen-shift"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_intro_02
      line: "Pamela Fellows teaches from a Vajrayana and somatic ground — holding empowerments, ngondro completion, and the body-reading of Levine and Porges. She has watched in retreat sessions how students carry mental overload as if the body were a storage unit for everything the mind could not process. Her tradition does not bypass the body or the difficult emotion; it transmutes them."
      semantic_family: "identity-seen-shift-alt"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response"]

youth_somatic:
  options:
    - id: youth_somatic_01
      line: "You read the update after midnight. Your jaw tightened and your stomach held. You put the phone down. Then you picked it up again because the spiral was already running.\nLOOP_SEQUENCE: \"read the update. jaw tightened, stomach held. put the phone down. picked it up again.\""
      loop_type: "midnight_hold"
      body_register: "jaw"
      digital_behavior: "put the phone down"
      article_types: ["hard_news_spiritual_response"]
    - id: youth_somatic_02
      line: "You saw the warning in a group chat. Your chest felt like it was holding something. You closed the app. Then you opened it again because not looking did not make the feeling go away.\nLOOP_SEQUENCE: \"saw the warning. chest held. closed the app. opened it again.\""
      loop_type: "midnight_hold"
      body_register: "chest"
      digital_behavior: "close-return"
      article_types: ["hard_news_spiritual_response"]

teacher_witness:
  options:
    - id: teacher_witness_01
      line: "Pamela has seen this exact loop in students — the warning arrives, the body holds, the phone goes down, and then the same pressure pulls attention back. Her Vajrayana and somatic training does not pathologize the body; it asks what the body is carrying and how to transmute it."
      semantic_family: "loop-mirror"
      loop_type: "midnight_hold"
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_witness_02
      line: "She has watched that sequence in young people — the update lands, the jaw or stomach tightens, the device is put down, and then the mind returns because the spiral does not stop when the screen goes dark. The body has been holding what the mind could not yet process."
      semantic_family: "loop-mirror-alt"
      loop_type: "midnight_hold"
      article_types: ["hard_news_spiritual_response"]

