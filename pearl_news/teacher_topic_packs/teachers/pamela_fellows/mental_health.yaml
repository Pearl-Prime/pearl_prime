      stat_line_2: "Students and youth educators are organizing workshops, hosting peer support circles, and campaigning for spaces where the body is included in the conversation about overload."
      semantic_family: "institutional-action-alt"
      article_types: ["hard_news_spiritual_response"]

bridge:
  options:
    - id: bridge_01
      line: "320 campuses. 18 countries. The tracker measures the workshops and peer circles young people built. It has no column for what made the next honest reach-out possible after another week of overload — the capacity to release what the body was holding so that clarity could return. The student who opened the next circle needed that capacity. So does the person who put the phone down and picked it up again. Pamela's Vajrayana training names this exactly: the five neurotic poisons — aggression, craving, ignorance, jealousy, pride — are not obstacles to be removed. They are the raw material of the five buddha wisdoms. The body that tightened at midnight is holding energy that, met with practice instead of panic, transmutes into clarity."
      hidden_capacity: "release what the body holds so clarity can return"
      semantic_family: "tracker-capacity"
      article_types: ["hard_news_spiritual_response"]
    - id: bridge_02
      line: "The numbers measure programs and outreach. They do not measure what happens in the body when a young person finally has a practice that includes what they are carrying — not fixing it from the outside, but meeting the body where it is so that something can shift. That shift is what the next peer circle needs. It is what the person in the spiral needs. Pamela's tradition has a name for this: the tantric principle that nothing needs to be rejected. The poison is the path. The spiral, met with somatic presence and the Four Noble Truths as diagnostic, becomes workable."
      hidden_capacity: "include the body so something can shift"
      semantic_family: "tracker-capacity-alt"
      article_types: ["hard_news_spiritual_response"]

teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: "What Pamela Sees"
      paragraphs:
        - "Pamela would not start by calling the mind defective. She would start by noticing that the body is holding what the mind has not been able to process. In her Vajrayana and somatic tradition, inner blockage — the deeper pattern underneath surface overwhelm — is not an obstacle to remove but energy to transmute. When the body is allowed to be seen and felt, something can release."
        - "From there she turns to the heart's intelligence. The question is not how to dominate every thought. It is how to include the body and the heart in the response, so the spiral does not become the sole narrator of the self. The body holds what the mind avoids; the heart knows what the mind has not caught up to."
        - "That shift matters: what feels like a personal fault — me, broken, wrong — is often the body accurately holding overload that no institutional or policy system should normalize. The practice is not to empty the body of feeling but to meet what is there so that the person can move again from steadier ground."
      semantic_family: "teacher-diagnosis"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_perspective_02
      header: "What Pamela Sees"
      paragraphs:
        - "In Pamela's tradition, suffering is not only in the mind. It lands in the body — the jaw, the stomach, the chest — and the body holds it when the mind cannot integrate. The tradition does not ask you to stop feeling; it asks you to include the body in the response."
        - "Heartfulness here means living from the heart's intelligence — not sentiment, but a deeper knowing that includes the body and the present moment. When young people are given a practice that meets what is held with warmth rather than judgment, the capacity to stay functional without collapsing becomes available."
        - "In that frame, self-blame softens. The fault is not mine — not a confused body, not a broken self. The problem is that the system and institutional structure keeps placing the load on the body without a practice of release. Pamela's tradition offers that practice."
      semantic_family: "teacher-diagnosis-alt"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response"]

