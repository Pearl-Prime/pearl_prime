teacher_witness:
  options:
  - id: teacher_witness_01
    line: Omote Sensei has seen this exact loop in students — the warning arrives,
      the mind accelerates, the phone goes down, and then the same pressure pulls
      attention back. The Japanese tradition does not pathologize it; it names it
      as the oni that grows when what is difficult is not faced honestly.
    semantic_family: loop-mirror
    loop_type: oni_spiral
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: 'He has watched that sequence — the update lands, the body contracts, the
      device is put down, and then the spiral continues because the tradition knows:
      the oni is not an enemy to be destroyed but a condition to be purified.'
    semantic_family: loop-mirror-alt
    loop_type: oni_spiral
    article_types:
    - hard_news_spiritual_response
