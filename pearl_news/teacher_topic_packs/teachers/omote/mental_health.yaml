bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. The tracker measures the workshops and peer
      circles young people built. It has no column for what made the next honest reach-out
      possible after another week of overload — the capacity to face what had accumulated
      and release it through honest practice. The student who opened the next circle
      needed that capacity. So does the person who put the phone down and picked it
      up again. Omote Sensei's tradition has practiced purification for generations.
    hidden_capacity: face and release what has accumulated
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: 'The numbers measure programs and outreach. They do not measure what happens
      when a young person finally has a practice that faces the oni — not as an enemy
      to destroy but as a condition to purify. That capacity is what the next peer
      circle needs. It is what the person in the spiral needs. Omote Sensei''s tradition
      calls it purification: the honest discipline of restoring clarity through water,
      breath, ritual, and intentional stillness.'
    hidden_capacity: purify what has accumulated
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Omote Sensei Sees
    paragraphs:
    - 'Omote Sensei would not start by calling the mind defective. He would start
      by naming the oni — the inner affliction that takes root when grief, rage, or
      shame is not faced. For young people who experience their mental suffering as
      something fundamentally broken in them, the tradition offers a different frame:
      the oni arose because something was not attended to, and purification is the
      practice of attending to it with honesty and care.'
    - From there he turns to Yamato-gokoro — the sincere Japanese heart-mind. It is
      not achieved through self-improvement but through the daily practice of living
      with integrity toward oneself, one's community, and one's ancestors. For young
      people whose mental health is eroded by the performance of authenticity on social
      media, Yamato-gokoro offers a standard that is not about appearing genuine but
      about actually being so.
    - 'That shift matters: what feels like something wrong with me is often the accumulated
      residue of conditions that no human system should normalize. The practice is
      not to punish the self but to purify what has accumulated so that the person
      can move again from clarity.'
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Omote Sensei Sees
    paragraphs:
    - In Omote Sensei's tradition, purification is not punishment for being impure.
      It is the recognition that living accumulates residue — emotional, relational,
      spiritual — and that regular cleansing is as necessary for the inner life as
      it is for the body. Young people who carry the accumulated weight of digital
      overexposure, broken trust, and unprocessed experience need not a diagnosis
      but a practice of release that the tradition has always provided.
    - The oni is not only personal. It grows where difficulty is never honestly faced.
      Education and systems that protect young people from failure and discomfort
      do not produce resilience; they produce adults whose first encounter with genuine
      hardship activates the oni because no practice of facing it was ever cultivated.
    - In that frame, self-blame softens. The problem is not that young people are
      broken. The problem is that the system and institutional structure have left
      body and heart carrying accumulation without a practice of purification. Omote
      Sensei's tradition offers that practice.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
