hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Youth mental overload is not only about symptoms. It is about what constant
      pressure does when it is never honestly faced — and the inner affliction that
      grows when no practice of purification is offered.
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Omote Sensei, a teacher of the Japanese sacred way-of-life and purification,
      has seen in practice sessions this pressure land on young people who still look
      functional from the outside. They are not asking how to feel inspired. They
      are asking how to face what has accumulated — the oni of overwhelm, shame, or
      despair — without being destroyed by it.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Omote Sensei teaches from the Japanese tradition of purification and Yamato-gokoro.
      He has watched in practice sessions students carry mental overload as accumulated
      residue — and the tradition holds that the oni arises because something was
      not attended to, and purification is the practice of attending to it with honesty
      and care.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
