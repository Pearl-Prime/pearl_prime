teacher_witness:
  options:
  - id: teacher_witness_01
    line: Omote Sensei has seen that exact sequence — the task appears, the body braces,
      attention leaves, and effort has to return inside a system that keeps misnaming
      the problem. The Japanese tradition does not blame the student; it names the
      system that stripped character formation and honest difficulty from the curriculum.
    semantic_family: loop-mirror
    loop_type: school_oni
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: He has watched students carry this loop — the portal opens, the body tenses,
      the tab changes, and then the same pressure pulls them back. The tradition holds
      that the oni takes root most easily where young people are never taught to face
      difficulty honestly.
    semantic_family: loop-mirror-alt
    loop_type: school_oni
    article_types:
    - hard_news_spiritual_response
