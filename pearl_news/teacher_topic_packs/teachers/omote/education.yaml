bridge:
  options:
  - id: omote_ed_bridge_01
    line: 244 million children. UNESCO. The tracker measures enrollment, completion,
      and policy adoption. It does not measure what is transmitted inside the classroom
      — whether the inheritance the cohort came for actually arrives, or whether
      they receive a credential without recognition. Omote Sensei's tradition holds
      the transmission question as native.
    hidden_capacity: deliver inheritance, not only credential
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_bridge_02
    line: The numbers show what has been built. They do not show the inheritance
      gap — the long-view, the lineage, the living field that the modern institution
      has not been transmitting and that the body keeps asking for. Omote Sensei's
      tradition holds that field as native.
    hidden_capacity: hold the living field the institution does not transmit
    metadata:
      semantic_family: living-field-gap
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_bridge_03
    line: Frameworks track participation and completion. They do not track the moment
      a young pilgrim sits inside sacred geography and feels, for the first time,
      that they are being taught. In Omote Sensei's framework that moment is the
      curriculum the trackers cannot report.
    hidden_capacity: register transmission the trackers cannot show
    metadata:
      semantic_family: transmission-recognition
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_bridge_04
    line: Policy instruments scale credentials. They do not scale recognition. The
      capacity to recognize an inheritance when it arrives — Yamato-gokoro doing
      its work — is exactly what the modern institution does not teach. Omote Sensei's
      tradition has carried it for centuries.
    hidden_capacity: rebuild the recognition the policy frame does not carry
    metadata:
      semantic_family: recognition-capacity
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_bridge_05
    line: The infrastructure is measurable. The transmission underneath it is not.
      Omote Sensei's tradition does not replace the structural work — it names the
      layer beneath it and offers the sacred geography that has held that layer in
      waking memory for generations.
    hidden_capacity: name and hold the layer beneath the measurement
    metadata:
      semantic_family: structural-vs-yamato-gokoro
      article_types:
      - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: omote_ed_perspective_01
    header: What Omote Sensei Sees
    paragraphs:
    - Omote Sensei does not tell young people to study harder as if the friction
      they feel were a motivation deficit. In his tradition the friction is Yamato-gokoro
      registering the absence of the curriculum the body came here to find. The
      problem is not the student. The problem is the architecture of credential delivery
      operating without the transmission underneath.
    - From there he turns to sacred geography. The temples of Nara, the shrines of
      Kyoto, and the long-view sites of the Yamato region have been a curriculum
      for centuries. When a young pilgrim sits at one of these sites, the work is
      not metaphor — the geography is teaching, and the body recognizes the teaching
      before the mind has language for it.
    - That matters because what feels like a personal failure of focus is, in his
      framework, accurate response to an inheritance gap. The reframe does not remove
      the deadline. It places the deadline inside a longer arc that the credential
      alone cannot carry.
    metadata:
      semantic_family: teacher-diagnosis
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_perspective_02
    header: What Omote Sensei Sees
    paragraphs:
    - In Omote Sensei's tradition Yamato-gokoro is the dormant curriculum — the inheritance
      that has not been transmitted forward because the channels that used to transmit
      it (sacred geography, ritual, intergenerational pilgrimage) have been thinned
      by modern institutional life. The young arrive with the capacity intact and
      no curriculum to wake it.
    - His pilgrimage work is the curriculum. Walking the Kyoto streets, sitting at
      the Nara temple gates, standing inside the long-view of Yamato itself — these
      are not tourism. They are the actual teaching. The geography is the teacher;
      he is the bilingual guide.
    - For a generation carrying credentials without recognition, this is not another
      course offering. It is a different mode of contact with what came before. The
      relief is not that the deadline lifts — it is that the inheritance the body
      had been asking for finally arrives.
    metadata:
      semantic_family: dormant-curriculum
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_perspective_03
    header: What Omote Sensei Sees
    paragraphs:
    - Spiritual history navigation is Omote Sensei's term for what he teaches. History
      in his tradition is not a closed archive — it is a living field, and the cycles
      of transmission and loss that the Yamato region has held are still active in
      the geography. To walk the path is to enter that field.
    - He does not promise the field replaces the credential. He promises it gives
      the student a lineage — a long-view that places the current studies inside
      a longer arc than the credential, by design, can carry.
    - In his framework the inability to find that arc inside the lecture is not personal
      failure. It is the architectural limit of the medium. The body has been asking
      for a different scale of curriculum, and the geography is one of the few that
      still teaches at that scale.
    metadata:
      semantic_family: spiritual-history-curriculum
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_perspective_04
    header: What Omote Sensei Sees
    paragraphs:
    - Project Phoenix is the name Omote Sensei gives his pilgrimage work — the deliberate
      activation of Yamato-gokoro in those arriving with credentials and an inheritance
      gap they cannot name. The name is not metaphor. The tradition holds that the
      curriculum itself rises again when the conditions are arranged for it.
    - For young people whose curriculum is the LMS and the syllabus, those conditions
      are not abstract. They are walking, silence, the absence of the device, the
      presence of a guide who is bilingual in the inheritance and the modernity that
      has thinned it.
    - The reframe matters because the modern read of educational friction is private
      failure. In Omote Sensei's framework it is a curriculum that has not transmitted
      the inheritance forward. The shift from private to inherited is the part that,
      in pilgrimage practice, often lands first.
    metadata:
      semantic_family: project-phoenix-curriculum
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_perspective_05
    header: What Omote Sensei Sees
    paragraphs:
    - The principle Omote Sensei returns to is that education was never meant to
      be only credential delivery. It was meant to be transmission of an inheritance
      across generations — a curriculum that the geography, the ritual, and the lineage
      held together. When any one of those is missing, the credential remains and
      the inheritance does not arrive.
    - In his framework the modern institution has become very good at the credential
      and increasingly unable to deliver the rest. That gap is not the institution's
      fault alone — it is what happens when the channels of transmission thin faster
      than the institution can replace them. His tradition has carried the channels
      across centuries.
    - For a phone-native cohort, the question is not whether to abandon the credential.
      The question is whether the inheritance can be re-entered in time for the body
      to remember what learning was. Omote Sensei teaches that it can be — and that
      the entry point is the geography itself.
    metadata:
      semantic_family: credential-vs-inheritance
      article_types:
      - hard_news_spiritual_response
