bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. The tracker measures reforms and study supports.
      It has no column for what made the next honest return to learning possible after
      another day of fragmentation — the capacity to face what is difficult without
      calling the system's disorder your failure. The student who came back to the
      portal needed that capacity. Omote Sensei's tradition has practiced cultivating
      Yamato-gokoro and honest encounter with difficulty for generations.
    hidden_capacity: face what is difficult without making it identity
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: 'The numbers measure programs and reforms. They do not measure what happens
      when a young person finally has a practice that includes honest facing — not
      performance of competence but the sincere heart-mind that acts from moral feeling
      rather than calculation. That capacity is what the next honest study session
      needs. Omote Sensei''s tradition calls it Yamato-gokoro: integrity toward oneself,
      one''s community, and the work itself.'
    hidden_capacity: act from sincere heart-mind rather than performance
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Omote Sensei Sees
    paragraphs:
    - Omote Sensei would not start by calling the student distracted. He would start
      by naming the system. In the Japanese sacred tradition, education was never
      separated from the formation of character — the cultivation of Yamato-gokoro,
      the sincere heart-mind that acts from moral feeling rather than calculation.
      Modern education systems that have stripped character formation from the curriculum
      and replaced it with measurable competencies have produced technically capable
      people who do not know how to live with integrity — and the tradition regards
      this as a failure not of students but of the system that shaped them.
    - From there he turns to the oni. The oni — inner affliction — takes root most
      easily where young people are never taught to face difficulty honestly. Education
      systems that protect students from failure, discomfort, and moral complexity
      do not produce resilient adults; they produce adults whose first encounter with
      genuine hardship activates the oni because no practice of facing it was ever
      cultivated.
    - 'That is the reframe: what feels like a personal fault — me, broken, wrong —
      is often a truthful reading of a disordered learning environment — and the tradition
      holds that education must include the practice of honest encounter with what
      is difficult within a system and institutional structure that was never designed
      for what it demands.'
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Omote Sensei Sees
    paragraphs:
    - 'In Omote Sensei''s tradition, scattered attention is not only a cognitive issue.
      It is a character issue — the absence of Yamato-gokoro, the sincere presence
      that can only be cultivated through practice. When the system names depth and
      care while organizing daily life around fragmentation and performance, the tradition
      asks: where is the practice of facing what is difficult?'
    - 'Sacred geography teaches that where you learn matters as much as what you learn.
      For young people educated entirely through screens, the tradition identifies
      a specific loss: the absence of place-based knowledge, the kind of understanding
      that can only arise from sustained physical presence in a landscape that has
      its own memory and its own demands on attention.'
    - 'In that frame, self-blame softens. The problem is not that students are lazy
      or that I am wrong for struggling. The problem is that the system has stripped
      the conditions for sincere learning and then blamed the student for the result.
      Omote Sensei''s tradition offers a standard: integrity toward oneself, one''s
      community, and the work itself.'
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
