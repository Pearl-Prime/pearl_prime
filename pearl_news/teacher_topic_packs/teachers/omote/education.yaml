topic_fit:
  fit_level: primary
  fit_reason: The curriculum young people are inside has been built for credential
    delivery while the body and soul have been asking for inheritance — for the
    long-view, the living field, the geography that recognizes them. Omote Sensei's
    tradition reads this gap and offers spiritual-historical navigation as a different
    mode of education.
  forbidden_angles:
  - do not reduce to generic productivity
  - do not frame as personal motivation problem
  - do not use Noh theater as primary framework
hook_personal:
  options:
  - id: omote_ed_hook_personal_01
    line: You can complete the assignments. You can hit the deadlines. You also know
      that something the curriculum was supposed to deliver has not arrived — a recognition,
      a long-view, an inheritance that the credential alone cannot transmit.
    metadata:
      semantic_family: credential-without-recognition
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_hook_personal_02
    line: You are inside the system and you are doing what it asks. You also feel,
      under all of it, the strangeness of being trained for a world the institution
      itself no longer believes in — and the gap between what is taught and what
      the body recognizes is widening.
    metadata:
      semantic_family: training-gap-widening
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_hook_personal_03
    line: At 2 a.m. you finish the paper. The jaw is locked. You sleep four hours.
      The grade arrives. Something a part of you keeps asking is not whether you
      passed — it is whether anything was actually transmitted in the exchange.
    metadata:
      semantic_family: transmission-question
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_hook_personal_04
    line: You read the syllabus and recognize none of yourself in it. You complete
      the readings and the recognition does not arrive. The friction is not that
      the material is hard — it is that the material has nothing to do with the
      inheritance you came here to find.
    metadata:
      semantic_family: inheritance-not-found
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_hook_personal_05
    line: A part of you knows the question is not how to study harder. The question
      is what would it take to be inside a curriculum again — one where the long-view
      and the lineage were part of the transmission, not optional electives in the
      catalog.
    metadata:
      semantic_family: longer-arc-curriculum
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: omote_ed_hook_big_01
    line: Youth education load is not only about workload. It is what credential
      delivery does to attention, rest, and the capacity to recognize an inheritance
      when the institution itself has been organized to deliver something other than
      that.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_hook_big_02
    line: A generation is being asked to inherit a world the curriculum is not equipped
      to describe. The gap between what is taught and what the cohort has to actually
      live inside is not the cohort's fault — it is the visible edge of an inheritance
      the modern institution has not been transmitting.
    metadata:
      semantic_family: curriculum-world-gap
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_hook_big_03
    line: The credential is now the primary medium through which the institution
      validates a young person and the primary place a young person can find the
      institution will recognize them at all. That double role is the architecture
      of educational overload — and it is not what any inheritance was designed to
      do.
    metadata:
      semantic_family: credential-double-role
      angle: medium-architecture
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_hook_big_04
    line: Sacred geography in the Japanese tradition has been a curriculum for centuries
      — a living transmission of the long-view that the modern institution does not
      carry. The question is whether that curriculum can re-enter the picture in
      time for the inheritance to do the work the credential was never built to do.
    metadata:
      semantic_family: geography-as-curriculum
      angle: tradition-as-curriculum
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_hook_big_05
    line: What gets read as student disengagement is often the opposite — the body
      registering that the curriculum it is inside has not been transmitting the
      inheritance it came here to find. Omote Sensei's tradition has language for
      that registration that the modern institution does not.
    metadata:
      semantic_family: disengagement-as-recognition
      angle: tradition-language-gap
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: omote_ed_intro_01
    line: Omote Sensei, a teacher of Japanese spiritual-historical navigation and
      Yamato-gokoro awakening, has taught young pilgrims inside the Yamato region
      for decades. He has seen what the credential delivery model does to a cohort
      that came in asking for an inheritance.
    metadata:
      semantic_family: identity-seen-shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_intro_02
    line: Omote Sensei teaches inside Project Phoenix, his pilgrimage and awakening
      tour lineage based in Kyoto. He does not position himself as an education reformer
      in the policy sense — he is a guide through the sacred geography that has held
      transmission as native for centuries.
    metadata:
      semantic_family: guide-not-reformer
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_intro_03
    line: Omote Sensei works from the principle that history is not separate from
      spirit and that sacred sites are living teachers. When he leads young pilgrims
      to the temples of Nara or the long-view sites of the Yamato region, he is not
      delivering a culture tour — he is restoring a curriculum the modern institution
      cannot transmit.
    metadata:
      semantic_family: history-as-living-teacher
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_intro_04
    line: Omote Sensei has watched young pilgrims arrive with credentials in hand
      and an inheritance gap they cannot name. In his tradition Yamato-gokoro — the
      sincere heart-mind — is dormant rather than absent. The work is to wake it
      inside the geography that has held it longer than any modern institution has
      existed.
    metadata:
      semantic_family: yamato-gokoro-dormant
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_intro_05
    line: Omote Sensei is a bilingual guide — speaking across the Japanese tradition
      and the global generation now arriving to inherit it. His teaching is that
      the modern institution was built to deliver credentials, and that the inheritance
      the cohort actually came for is held by the geography, not by the institution.
    metadata:
      semantic_family: bilingual-bridge
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
youth_somatic:
  options:
  - id: omote_ed_somatic_01
    line: You opened the lecture tab at 1 a.m. The eyes drifted to the second screen.
      You closed the lecture tab. Then you opened it again because the deadline was
      real and the recognition was not arriving.
    metadata:
      semantic_family: lecture-tab-loop
      loop_type: deadline_no_recognition
      body_register: eyes
      digital_behavior: opens the tab
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_somatic_02
    line: You read the textbook chapter. The jaw locked at the third page. You took
      a screenshot you would never reread. Then you moved on because the system
      requires the moving-on, not the registration.
    metadata:
      semantic_family: jaw-locked-textbook
      loop_type: textbook_required
      body_register: jaw
      digital_behavior: screenshot
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_somatic_03
    line: You handed in the paper. The breath did not lengthen. The grade arrived
      and the body did not register relief — because what the body had been waiting
      for was not the grade.
    metadata:
      semantic_family: breath-grade-mismatch
      loop_type: grade_no_relief
      body_register: breath
      digital_behavior: submission portal
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_somatic_04
    line: You watched the lecture at 2x speed. The stomach turned at the gap between
      the content and the world you would walk into after. You did not name the turning
      — because the inheritance for what to do with that gap had not been transmitted.
    metadata:
      semantic_family: stomach-content-world-gap
      loop_type: speed_compression
      body_register: stomach
      digital_behavior: 2x speed playback
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_somatic_05
    line: You sat in the seminar and the shoulders would not soften. You looked
      around and saw five other cohort members with the same shoulders — the body
      registering, all at once, the curriculum the room had not built for them.
    metadata:
      semantic_family: shoulders-collective-recognition
      loop_type: seminar_recognition
      body_register: shoulders
      digital_behavior: in-room observation
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: omote_ed_witness_01
    line: Omote Sensei has seen this exact loop in young pilgrims who arrive with
      transcripts and an inheritance gap. In his tradition the loop is not academic
      weakness — it is Yamato-gokoro registering the absence of the curriculum the
      body came here to find.
    metadata:
      semantic_family: yamato-registers-curriculum-gap
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_witness_02
    line: He has watched young people walk the Nara temple paths and feel, for the
      first time, that they are inside a curriculum that is teaching them. In his
      tradition the recognition is not nostalgia — it is the body remembering what
      transmission actually feels like when the geography is doing the teaching.
    metadata:
      semantic_family: geography-as-teacher
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_witness_03
    line: He has guided cohorts who arrive convinced the credential was the curriculum.
      The first practice on pilgrimage is letting the credential be set down — and
      what arrives in its place is what they were looking for all along.
    metadata:
      semantic_family: credential-laid-down
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_witness_04
    line: He has seen the moment when a young person asks, for the first time, what
      their ancestors learned. In his tradition that question is the door — the inheritance
      opens to whoever finally addresses it directly.
    metadata:
      semantic_family: ancestor-question-as-door
      article_types:
      - hard_news_spiritual_response
  - id: omote_ed_witness_05
    line: He has watched the shift when a young pilgrim stops treating the credential
      as the curriculum and lets the geography begin to teach. In his tradition the
      shift is not anti-institutional — it is the body remembering what learning
      was before the medium that now delivers it was invented.
    metadata:
      semantic_family: geography-teaches
      article_types:
      - hard_news_spiritual_response
