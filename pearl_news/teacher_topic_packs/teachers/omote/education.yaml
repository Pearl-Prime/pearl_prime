hook_personal:
  options:
  - id: hook_personal_01
    line: You are told school is preparing you for life. Some days it feels like it
      is training you to distrust your own attention — and never to face what is actually
      difficult.
    semantic_family: personal-pressure
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Education strain is also a character problem: schools name depth and care
      while replacing character formation with measurable competencies — and the oni
      takes root where young people are never taught to face difficulty honestly.'
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Omote Sensei, a teacher of the Japanese sacred way-of-life and purification,
      has watched in practice sessions students carry school pressure as if scattered
      attention were a moral flaw. They are not asking whether education matters.
      They are asking what it means to learn inside systems that have stripped Yamato-gokoro
      — the sincere heart-mind — from the curriculum and replaced it with performance.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Omote Sensei teaches from the Japanese tradition. He has seen in practice
      sessions students arrive already exhausted by systems that protect them from
      failure and discomfort — and the tradition holds that education must include
      the practice of honest encounter with what is difficult, or the oni will take
      root when hardship finally arrives.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
