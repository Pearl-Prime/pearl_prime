topic_fit:
  fit_level: primary
  fit_reason: "Conflict pressure maps to the oni at collective and personal levels; the tradition's purification and helping-others teaching is core to peace."
  forbidden_angles:
    - "do not reduce this to generic wellness"
    - "do not frame the pressure as personal weakness"

hook_personal:
  options:
    - id: hook_personal_01
      line: "You can feel public violence entering private life through one notification. The body knows it before language does — and the oni grows when what is seen is never honestly faced."
      semantic_family: "personal-pressure"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: "Conflict news is not only geopolitical. It becomes a daily fight over whether attention, sleep, and moral seriousness can stay intact — and whether the collective oni of un-faced grief and shame will express as more violence or as purification."
      semantic_family: "system-pressure"
      angle: "systemic-pressure"
      article_types: ["hard_news_spiritual_response"]

teacher_intro:
  options:
    - id: teacher_intro_01
      line: "Omote Sensei, a teacher of the Japanese sacred way-of-life and purification, has seen in practice sessions what conflict pressure does to young people. They are not asking whether the world is dangerous. They are asking how to hold what they see with the full weight of moral feeling — Yamato-gokoro — without numbing or performing outrage."
      semantic_family: "identity-seen-shift"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_intro_02
      line: "Omote Sensei teaches from the Japanese tradition. He has seen in retreat spaces how students and young people arrive already carrying conflict alerts — and the tradition holds that the oni is not only personal but collective: when a community or nation fails to face its grief, shame, or responsibility honestly, the oni grows and expresses as aggression and violence. Peace work begins with purification."
      semantic_family: "identity-seen-shift-alt"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response"]

youth_somatic:
  options:
    - id: youth_somatic_01
      line: "You read the conflict alert. Your chest tightened. You stopped for a second. Then you check again because the danger is real and not looking changes nothing.\nLOOP_SEQUENCE: \"read the alert. chest tightened. stopped for a second. checked again.\""
      loop_type: "conflict_oni"
      body_register: "chest"
      digital_behavior: "reads the alert"
      article_types: ["hard_news_spiritual_response"]
    - id: youth_somatic_02
      line: "You saw the update in a group chat. Your jaw and breath locked. You put the phone down. Then you picked it up again because reality is still there.\nLOOP_SEQUENCE: \"saw the update. jaw and breath locked. put the phone down. picked it up again.\""
      loop_type: "conflict_oni"
      body_register: "jaw"
      digital_behavior: "checks again"
      article_types: ["hard_news_spiritual_response"]

teacher_witness:
  options:
    - id: teacher_witness_01
      line: "Omote Sensei has seen this exact loop in young people — the alert lands, the body contracts, time stops for a second, and attention returns because reality is still there. The Japanese tradition does not pathologize it; it names it as the weight of witness that Yamato-gokoro requires — holding what is painful without looking away — and offers purification so that the person can act again without being consumed."
      semantic_family: "loop-mirror"
      loop_type: "conflict_oni"
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_witness_02
      line: "He has watched that sequence — the notification arrives, the chest or jaw holds, the device goes down, and then the mind goes back. The tradition holds that peace work begins with the purification of collective inner affliction — not by pretending it does not exist, but by creating the conditions in which it can be honestly faced and released."
      semantic_family: "loop-mirror-alt"
      loop_type: "conflict_oni"
      article_types: ["hard_news_spiritual_response"]

turnaround:
