      stat_line_1: "676 million women and girls. 50 kilometers from active conflict."
      stat_line_2: "Young people are documenting harm, organizing coalitions, and hosting workshops for peace and accountability work even when systems fracture."
      semantic_family: "institutional-action"
      article_types: ["hard_news_spiritual_response"]
    - id: turnaround_02
      stat_line_1: "676 million women and girls. 50 kilometers from active conflict."
      stat_line_2: "Youth peacebuilders are hosting workshops, organizing coalitions, and documenting cases to treat purification and service as part of the response to conflict."
      semantic_family: "institutional-action-alt"
      article_types: ["hard_news_spiritual_response"]

bridge:
  options:
    - id: bridge_01
      line: "676 million women and girls. 50 kilometers from active conflict. The tracker measures exposure, displacement, and broken institutions. It does not count the inner capacity needed to face what has accumulated — grief, rage, helplessness — and release it through honest practice so that the person could remain functional enough to protect others, tell the truth, or act again after the next alert. The person who checked again needed that capacity. Omote Sensei's tradition has practiced purification and the principle that helping others saves ourselves for generations."
      hidden_capacity: "face and release what has accumulated so the person can act again"
      semantic_family: "tracker-capacity"
      article_types: ["hard_news_spiritual_response"]
    - id: bridge_02
      line: "The numbers measure harm and response. They do not measure what happens when a young person finally has a practice that faces the collective oni — not by denying it but by creating the ritual and communal conditions in which grief, shame, and responsibility can be honestly faced and released. That capacity is what the next protector or witness needs. Omote Sensei's tradition holds that conflict persists when each party believes its survival requires the diminishment of the other — and that this belief is the oni itself. Genuine security comes from purification and service."
      hidden_capacity: "purify collective affliction and serve so security can be redefined"
      semantic_family: "tracker-capacity-alt"
      article_types: ["hard_news_spiritual_response"]

teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: "What Omote Sensei Sees"
      paragraphs:
        - "Omote Sensei would not tell young people to calm down as if fear were the mistake. The oni is not only a personal affliction; it is a collective one. When a community or a nation fails to face its grief, its shame, or its responsibility honestly, the oni grows at the collective level and expresses itself as aggression, scapegoating, and ultimately violence. The tradition holds that peace work begins with the purification of collective inner affliction — not by pretending it does not exist, but by creating the ritual and communal conditions in which it can be honestly faced and released."
        - "From there he turns to Yamato-gokoro — the sincere heart-mind that does not look away from what is painful. In the context of armed conflict, this means that young people who witness violence and injustice are called not to numb themselves or to perform outrage but to hold what they see with the full weight of moral feeling. The tradition distinguishes between reaction — which perpetuates cycles — and sincere witness, which creates the conditions for transformation."
        - "That matters: what feels like a personal fault — me, broken, confused by violence — is instead accurate response to a system and institutional structure of conflict that has never been met with honest purification. The tradition's insight is that this belief is the oni itself — and that genuine security comes not from defeating the other but from the practice of service that dissolves the boundary between self-interest and collective wellbeing."
      semantic_family: "teacher-diagnosis"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_perspective_02
      header: "What Omote Sensei Sees"
      paragraphs:
        - "In Omote Sensei's tradition, conflict fear is not only personal. It is collective. The oni that grows when grief and shame are not faced expresses as violence when it is not purified. The tradition does not ask you to stop feeling; it asks you to face what has accumulated — in yourself and in the collective — and to create conditions for release."
        - "Purification here is not magical erasure. It is the honest discipline of restoring clarity through water, wind, ritual, and breath. When young people are given a practice that faces the collective oni with honesty rather than denial or performance, the capacity to remain functional enough to protect others or tell the truth becomes available."
        - "In that frame, self-blame softens. The fault is not yours — not a broken self, not a confused witness. The problem is that the institutional and policy system has been carrying un-faced affliction without a practice of purification. Omote Sensei's tradition offers that practice — and the teaching that helping others is what ultimately saves ourselves."
      semantic_family: "teacher-diagnosis-alt"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response"]

