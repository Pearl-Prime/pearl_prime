topic_fit:
  fit_level: primary
  fit_reason: Conflict pressure asks young people to hold what is painful with the
    full weight of moral feeling — what the Japanese tradition names as Yamato-gokoro
    — without numbing or performing outrage. Spiritual-historical navigation gives
    them a way to stand in the present while drawing on the long view sacred geography
    has carried for generations.
  forbidden_angles:
  - do not reduce to generic wellness
  - do not frame the pressure as personal weakness
  - do not use Noh theater as primary framework
hook_personal:
  options:
  - id: omote_pc_hook_personal_01
    line: You can feel public violence entering private life through one notification.
      The body knows before language does — and the part of you that would rather
      not look is the part that has not yet been given a way to hold what is being
      seen.
    metadata:
      semantic_family: notification-body-knowing
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_hook_personal_02
    line: You scroll past the headline and then back to it. Looking hurts. Not looking
      hurts in a different way. Both registers are accurate — and the inheritance
      that would teach you how to stand in either has been thinned out by every part
      of modern life that asks you to keep moving.
    metadata:
      semantic_family: scroll-double-bind
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_hook_personal_03
    line: The image will not leave you. You sit with friends and the conversation
      moves and a part of you stays back at the bridge or the building, holding what
      you saw. The body has not been given a place to put it.
    metadata:
      semantic_family: image-residue
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_hook_personal_04
    line: You are angry and you are tired and underneath both is something older —
      a sincerity that does not want to look away even when looking away would be
      easier. That sincerity has a name in the tradition Omote Sensei carries.
    metadata:
      semantic_family: undernotes-of-sincerity
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_hook_personal_05
    line: At 1 a.m. you are still reading the thread. The jaw locked an hour ago.
      You know rest would help and you cannot find the door into it — because the
      inheritance that would tell you how to lay down witness without abandoning it
      was never handed forward.
    metadata:
      semantic_family: midnight-witness
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: omote_pc_hook_big_01
    line: Conflict news is not only geopolitical. It is daily pressure on attention,
      sleep, and moral capacity — and the unmet question of whether a generation
      can hold what it is being asked to hold without numbing, performing, or breaking
      under the weight.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_hook_big_02
    line: A generation is being asked to bear witness to violence in real time while
      institutional frameworks for grief and moral seriousness have thinned to almost
      nothing. The load is not a personal failure — it is the felt edge of a culture
      that has not handed the inheritance forward.
    metadata:
      semantic_family: cultural-inheritance-thinned
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_hook_big_03
    line: The young are being told that paying attention to conflict is essential
      and that the cost of paying attention is private. That double-bind is not a
      personal failure either — it is what happens when public life loses the rituals
      that used to hold collective grief.
    metadata:
      semantic_family: ritual-loss
      angle: collective-frame
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_hook_big_04
    line: Sacred geography in the Japanese tradition has carried memory of conflict
      and restoration for centuries. The current moment is testing whether that long-view
      can be transmitted across cultures and into a phone-native generation that needs
      a stance more than another opinion.
    metadata:
      semantic_family: long-view-test
      angle: tradition-as-resource
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_hook_big_05
    line: What gets read as youth disengagement from world events is often the opposite
      — moral overload without a container. The tradition that named Yamato-gokoro
      generations ago has language for this load that the inherited modern vocabulary
      does not.
    metadata:
      semantic_family: overload-without-container
      angle: tradition-language-gap
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: omote_pc_intro_01
    line: Omote Sensei, a teacher of Japanese spiritual-historical navigation and
      Yamato-gokoro awakening, has guided young pilgrims through Kyoto, Nara, and
      the Yamato region for decades. He has seen what conflict pressure does to a
      generation that has been asked to witness without being taught how to stand
      in what they witness.
    metadata:
      semantic_family: identity-seen-shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_intro_02
    line: Omote Sensei teaches inside Project Phoenix, his pilgrimage and awakening
      tour lineage based in Kyoto. He does not position himself as a peace teacher
      in the policy sense — he is a guide through the sacred geography that has held
      the memory of conflict and restoration for centuries, and his work is to make
      that geography legible to a generation that needs a place to stand.
    metadata:
      semantic_family: guide-not-policy
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_intro_03
    line: Omote Sensei works from the principle that history is not separate from
      spirit and that sacred sites are living fields, not relics. When he leads young
      pilgrims to the temples of Nara or the shrines of Yamato, he is not delivering
      a culture tour — he is activating an inheritance their phones cannot transmit.
    metadata:
      semantic_family: history-as-living-field
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_intro_04
    line: Omote Sensei has watched young people arrive on pilgrimage already exhausted
      by what they have witnessed through their phones. In his tradition, Yamato-gokoro
      — the sincere heart-mind — is dormant rather than absent. The work is to wake
      it, gently, in the presence of the sites that have carried it longer than any
      modern institution has existed.
    metadata:
      semantic_family: yamato-gokoro-dormant
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_intro_05
    line: Omote Sensei is a bilingual guide — he speaks across the Japanese tradition
      and the global generation now arriving to inherit it. His teaching is that the
      English-speaking world has lost much of what it once held in common with the
      Japanese long-view, and that sacred geography is one of the few channels still
      open for that transmission.
    metadata:
      semantic_family: bilingual-bridge
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
youth_somatic:
  options:
  - id: omote_pc_somatic_01
    line: You read the conflict alert. The chest tightened. You stopped for a second.
      Then you checked again because the danger is real and not looking changes nothing.
    metadata:
      semantic_family: chest-tighten-loop
      loop_type: conflict_witness
      body_register: chest
      digital_behavior: reads the alert
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_somatic_02
    line: You saw the update in the group chat. The jaw locked. You put the phone
      face-down on the desk. Then you turned it back over because the loop was already
      running and the device was the only place the update existed.
    metadata:
      semantic_family: jaw-lock-recheck
      loop_type: conflict_witness
      body_register: jaw
      digital_behavior: phone face-down
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_somatic_03
    line: You watched the video and the breath shortened without permission. You
      closed the tab. The breath did not lengthen. The body had registered something
      the mind had not yet finished processing.
    metadata:
      semantic_family: breath-shortened-residue
      loop_type: conflict_witness
      body_register: breath
      digital_behavior: closed the tab
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_somatic_04
    line: A friend sent the link. You opened it. The stomach turned. You sent back
      a flat emoji because the body had no other channel ready. The conversation
      moved on. The stomach did not.
    metadata:
      semantic_family: stomach-channel-gap
      loop_type: conflict_witness
      body_register: stomach
      digital_behavior: flat emoji reply
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_somatic_05
    line: You lay down and the day's images returned. The shoulders would not soften.
      You opened the phone to escape and the same images were waiting. The body had
      no place to put what it was carrying.
    metadata:
      semantic_family: shoulder-residue-no-exit
      loop_type: conflict_witness
      body_register: shoulders
      digital_behavior: lying down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: omote_pc_witness_01
    line: Omote Sensei has seen this exact loop in young pilgrims who arrive at the
      Kyoto sites already worn by what they have been watching. In his tradition the
      contraction is not weakness — it is Yamato-gokoro registering moral weight without
      a place to lay it down.
    metadata:
      semantic_family: yamato-gokoro-registers
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_witness_02
    line: He has watched young people walk the Nara temple paths in silence, then
      sit down and weep when the body finally has a container that is not the phone.
      In his tradition the tears are not breakdown — they are recognition that the
      load they have been carrying has a name.
    metadata:
      semantic_family: recognition-on-the-path
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_witness_03
    line: He has guided cohorts whose first hour on pilgrimage is spent learning to
      tolerate the absence of the phone. The withdrawal is the practice — and what
      surfaces afterward is what the inheritance is for.
    metadata:
      semantic_family: phone-withdrawal-as-practice
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_witness_04
    line: He has seen the moment when a young person who has been refreshing the
      feed all morning sits down at a shrine and asks, for the first time, what their
      ancestors did with this kind of weight. In his tradition that question is the
      door — the inheritance opens to whoever finally asks for it.
    metadata:
      semantic_family: ancestor-question-as-door
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_witness_05
    line: He has watched the shift when a young pilgrim stops reaching for the phone
      mid-conversation. In his tradition that gesture is not technology hygiene —
      it is the body remembering that some weights can only be held in person and
      that the geography is doing part of the work.
    metadata:
      semantic_family: geography-doing-the-work
      article_types:
      - hard_news_spiritual_response
