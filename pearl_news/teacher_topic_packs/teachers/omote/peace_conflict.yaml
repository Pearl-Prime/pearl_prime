bridge:
  options:
  - id: omote_pc_bridge_01
    line: 676 million women and girls. 50 kilometers from active conflict. The tracker
      measures exposure, displacement, and broken institutions. It does not measure
      the inner capacity needed to hold what has been seen with the full weight of
      moral feeling and not collapse — what Omote Sensei's tradition names as Yamato-gokoro,
      and what the modern toolkit has no column for.
    hidden_capacity: hold what has been seen with full moral weight and not collapse
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_bridge_02
    line: The numbers count institutional response. They do not count the inheritance
      gap — the centuries-old long-view that used to give young people a place to
      stand when they witnessed violence and that the modern world has not replaced.
      Omote Sensei's tradition holds that long-view as native.
    hidden_capacity: stand inside a long-view the modern toolkit does not transmit
    metadata:
      semantic_family: inheritance-gap
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_bridge_03
    line: The data show that young people are organizing peace work at scale. They
      do not show what each organizer is carrying privately — the residue of every
      image, every alert, every conversation that the body absorbed without a place
      to put it. Sacred geography in Omote Sensei's tradition is one of the few channels
      that addresses that residue directly.
    hidden_capacity: address what each organizer carries privately
    metadata:
      semantic_family: organizer-residue
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_bridge_04
    line: Policy frameworks track participation. They do not track the moral exhaustion
      that builds when a young person has been asked to witness conflict for years
      without a ritual container. Omote Sensei's tradition has carried such containers
      for centuries and now teaches them across cultures.
    hidden_capacity: rebuild a ritual container the policy frame does not carry
    metadata:
      semantic_family: moral-exhaustion-container
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_bridge_05
    line: The infrastructure is measurable. The Yamato-gokoro — the sincere heart-mind
      — that the work requires is not. Omote Sensei's tradition does not replace the
      structural work; it names the layer beneath it and offers the sacred geography
      that has held that layer in waking memory for generations.
    hidden_capacity: name and hold the layer beneath the structural work
    metadata:
      semantic_family: structural-vs-yamato-gokoro
      article_types:
      - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: omote_pc_perspective_01
    header: What Omote Sensei Sees
    paragraphs:
    - Omote Sensei does not tell young people to calm down as if fear were the mistake.
      In his tradition the contraction they describe is Yamato-gokoro registering
      moral weight — the sincere heart-mind doing the work it is built to do. The
      problem is not the registering. The problem is that the modern toolkit has
      not given them a place to stand inside it.
    - From there he turns to sacred geography. The temples of Nara, the shrines of
      Kyoto, the long-view sites of the Yamato region have carried the memory of
      conflict and restoration for centuries. When a young pilgrim sits at one of
      these sites, the work is not metaphor — the geography is doing part of the
      holding, and the body recognizes that recognition before the mind does.
    - That matters because what feels like personal weakness — me, broken, undone
      by violence — is in his framework accurate response to a moral load that the
      inherited modern container is not built to carry. The reframe does not remove
      the load. It places it inside a tradition that has held loads like this before.
    metadata:
      semantic_family: teacher-diagnosis
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_perspective_02
    header: What Omote Sensei Sees
    paragraphs:
    - In Omote Sensei's tradition Yamato-gokoro is the dormant inheritance — the
      sincere heart-mind that has not been transmitted forward because the channels
      that used to transmit it (sacred geography, ritual, intergenerational pilgrimage)
      have been thinned by modern life. The young arrive with the capacity intact
      but no ritual to wake it.
    - His pilgrimage work is the ritual. Walking the Kyoto streets to the Higashi-Yamato
      shrines, sitting at the Nara temple gates, standing inside the long-view of
      Yamato itself — these are not tourism. They are activation. The geography is
      the teacher; he is the bilingual guide.
    - For a generation carrying conflict witness without a container, this is not
      another instruction stack. It is a different mode of contact with the past.
      The relief, when it lands, is not that the load lifts — it is that the load
      finally has a place to be carried.
    metadata:
      semantic_family: dormant-inheritance
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_perspective_03
    header: What Omote Sensei Sees
    paragraphs:
    - Spiritual history navigation is Omote Sensei's term for what he teaches. History
      in his tradition is not a closed archive — it is a living field, and the cycles
      of conflict and restoration that the Yamato region has held are still active
      in the geography. To walk the path is to enter that field.
    - He does not promise that the field removes the pain of bearing witness. He
      promises that it gives the witness a lineage — a long-view that places the
      current weight inside a larger arc that the modern news cycle, by design, cannot
      carry.
    - In his framework the inability to find that arc inside the phone is not a personal
      failure. It is the architectural limit of the medium. The body has been asking
      for a different scale of container, and the geography is one of the few that
      has held.
    metadata:
      semantic_family: spiritual-history-navigation
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_perspective_04
    header: What Omote Sensei Sees
    paragraphs:
    - Project Phoenix is the name Omote Sensei gives his pilgrimage work — the deliberate
      activation of Yamato-gokoro in those who arrive carrying loads the modern toolkit
      cannot hold. The name is not metaphor. The tradition holds that the inheritance
      itself rises again when the conditions are arranged for it.
    - For young people watching conflict in real time, those conditions are not abstract.
      They are walking, silence, the absence of the phone, the presence of a guide
      who is bilingual in the inheritance and the modernity that has thinned it.
      The work is to make the conditions available to whoever arrives.
    - The reframe matters because the modern read of moral overload is private failure.
      In Omote Sensei's framework it is a culture that has not transmitted the inheritance
      forward. The shift from private to inherited is the part that, in pilgrimage
      practice, often lands first.
    metadata:
      semantic_family: project-phoenix-conditions
      article_types:
      - hard_news_spiritual_response
  - id: omote_pc_perspective_05
    header: What Omote Sensei Sees
    paragraphs:
    - The principle Omote Sensei returns to most often is that conflict persists
      when each party believes its survival requires the diminishment of the other.
      In his framework that belief is the deep problem — not the conflict itself,
      but the architecture of separation that makes the conflict feel inevitable.
    - Yamato-gokoro, when awakened, undoes the architecture from inside. The sincere
      heart-mind cannot hold the belief that another's diminishment secures one's
      own and remain sincere. The tradition does not teach this as politics; it teaches
      it as the natural consequence of awakening the inheritance.
    - For a generation watching that architecture play out in real time across multiple
      regions, the tradition's offer is concrete. Activate the inheritance. The architecture
      loosens — not by argument but because the ground it was standing on has shifted.
    metadata:
      semantic_family: architecture-of-separation
      article_types:
      - hard_news_spiritual_response
