    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Climate pressure is no longer only environmental. It is attentional, emotional, and civic: how do young people stay in contact with reality without losing function under it?'
    semantic_family: master_wu-climate-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Master Wu, a land and cultivation teacher, has watched in practice sessions this pressure land on young people. Students are not only asking how to try harder. They are asking how to stay steady inside environments that keep training fragmentation.
    semantic_family: master_wu-climate-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the climate update. Your body tightens. You look away. Then you come back because the number is still true. LOOP_SEQUENCE: "read the update. body tightened. looked away. came back."'
    loop_type: fragmentation_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Master Wu has seen this exact loop -- the update, the body tightening, the turning away, and the return because reality is still there.
    semantic_family: master_wu-climate-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: Young climate organizers are filing cases, hosting workshops, and forcing institutions to answer the gap between public promises and lived reality.
    semantic_family: master_wu-climate-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 2,666 cases. 51 jurisdictions. The tracker measures what young people did. It has no column for what made the next step possible after another delayed or broken response -- the capacity to stay in contact with truth long enough to act again when the system keeps not responding. The person who came back needed it. So does the reader in that loop. Master Wu's teaching has language for protecting that capacity.
    hidden_capacity: return to truthful action
    semantic_family: master_wu-climate-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Master Wu Sees
    paragraphs:
    - Master Wu would begin with the field. Attention, regulation, and effort are shaped by conditions as much as by will.
    - When the surrounding field is fragmented, unstable, or harsh, the first mistake is to translate that disorder into a judgment on the person.
    - What feels like a personal fault — me, broken, wrong — is often accurate response to badly designed or degraded conditions around you within a system and institutional structure that was never designed for what it demands.
    semantic_family: master_wu-climate-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Return-to-Ground Practice
    duration: 5 minutes
    announcement_line: Master Wu teaches a 5-minute Return-to-Ground Practice for moments when climate pressure starts converting attention into helplessness. It is in the sidebar, timed and practical.
    relief_lines:
    - The body stops treating every demand as total disorganization.
    - Enough regulation returns for the next honest action.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
