    id: SDG 8
    title: Decent Work and Economic Growth
    line: The United Nations has a framework for this through SDG 8 and its decent-work
      targets.
  fallback_un_tie:
    line: Pearl News is an independent nonprofit. We are not affiliated with the United
      Nations.
