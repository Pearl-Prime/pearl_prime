      article_types: ["hard_news_spiritual_response"]

teacher_intro:
  options:
    - id: teacher_intro_01
      line: "Master Wu, a land and cultivation teacher, has seen in practice sessions what education pressure does to young people. Students are not only asking how to try harder. They are asking how to stay steady inside environments that keep training fragmentation."
      semantic_family: "master_wu-education-intro"
      article_types: ["hard_news_spiritual_response"]

youth_somatic:
  options:
    - id: youth_somatic_01
      line: "You open the assignment portal. Focus breaks. You switch away. Then you come back because the work is still there.
LOOP_SEQUENCE: \"opened the portal. focus broke. switched away. came back.\""
      loop_type: "fragmentation_loop"
      article_types: ["hard_news_spiritual_response"]

teacher_witness:
  options:
    - id: teacher_witness_01
      line: "Master Wu has seen this exact loop -- the portal opening, the break in focus, the switch away, and the return because the work still remains."
      semantic_family: "master_wu-education-witness"
      article_types: ["hard_news_spiritual_response"]

turnaround:
  options:
    - id: turnaround_01
      stat_line_1: "410 workshops. 27 cities."
      stat_line_2: "Students and educators are organizing workshops, hosting peer tutoring, and campaigning for classroom reforms that protect attention instead of merely demanding it."
      semantic_family: "master_wu-education-turnaround"
      article_types: ["hard_news_spiritual_response"]

bridge:
  options:
    - id: bridge_01
      line: "410 workshops. 27 cities. The tracker measures what young people did. It has no column for what made the next step possible after another delayed or broken response -- the capacity to return to the work without turning fragmentation into identity. The person who came back needed it. So does the reader in that loop. Master Wu's teaching has language for protecting that capacity."
      hidden_capacity: "return to truthful action"
      semantic_family: "master_wu-education-bridge"
      article_types: ["hard_news_spiritual_response"]

teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: "What Master Wu Sees"
      paragraphs:
        - "Master Wu would begin with the field. Attention, regulation, and effort are shaped by conditions as much as by will."
        - "When the surrounding field is fragmented, unstable, or harsh, the first mistake is to translate that disorder into a judgment on the person."
        - "What feels like a personal fault — me, broken, wrong — is often accurate response to a system and institutional structure that were badly designed or degraded. Instead of naming myself as the failure, I can see the conditions that produced the pressure."
      semantic_family: "master_wu-education-perspective"
      article_types: ["hard_news_spiritual_response"]

practice:
  default_id: practice_01
  options:
    - id: practice_01
      display_name: "5-minute Return-to-Ground Practice"
      duration: "5 minutes"
      announcement_line: "Master Wu teaches a 5-minute Return-to-Ground Practice for moments when education pressure starts converting attention into helplessness. It is in the sidebar, timed and practical."
      relief_lines:
        - "The body stops treating every demand as total disorganization."
        - "Enough regulation returns for the next honest action."
      relief_register: ["capacity", "clarity", "act again"]
      article_types: ["hard_news_spiritual_response"]

