    display_name: 5-minute Return-to-Ground Practice
    duration: 5 minutes
    announcement_line: Master Wu teaches a 5-minute Return-to-Ground Practice for moments when mental health pressure starts converting attention into helplessness. It is in the sidebar, timed and practical.
    relief_lines:
    - The body stops treating every demand as total disorganization.
    - Enough regulation returns for the next honest action.
