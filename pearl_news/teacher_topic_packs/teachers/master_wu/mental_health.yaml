hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Youth mental-health strain is not only a clinical trend. It is the way institutions normalize overload until young people start treating it as a private flaw.
    semantic_family: master_wu-mental_health-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Master Wu, a land and cultivation teacher, has watched in practice sessions this pressure land on young people. Students are not only asking how to try harder. They are asking how to stay steady inside environments that keep training fragmentation.
    semantic_family: master_wu-mental_health-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the report after midnight. Your body tightens. You set the phone down. Then you pick it up again because the pressure is already in the room. LOOP_SEQUENCE: "read the report. body tightened. set the phone down. picked it up again."'
    loop_type: fragmentation_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Master Wu has seen this exact loop -- the report, the body tightening, the phone set down, and the return because the pressure is still there.
    semantic_family: master_wu-mental_health-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: Students are building peer circles, workshops, and campaigns that treat mental health as shared infrastructure rather than private weakness.
    semantic_family: master_wu-mental_health-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 320 campuses. 18 countries. The tracker measures what young people did. It has no column for what made the next step possible after another delayed or broken response -- the capacity to seek help and return without turning overload into identity. The person who came back needed it. So does the reader in that loop. Master Wu's teaching has language for protecting that capacity.
    hidden_capacity: return to truthful action
    semantic_family: master_wu-mental_health-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Master Wu Sees
    paragraphs:
    - Master Wu would begin with the field. Attention, regulation, and effort are shaped by conditions as much as by will.
    - When the surrounding field is fragmented, unstable, or harsh, the first mistake is to translate that disorder into a judgment on the person.
    - What feels like a personal fault — me, broken, wrong — is often accurate response to badly designed or degraded conditions around you within a system and institutional structure that was never designed for what it demands.
    semantic_family: master_wu-mental_health-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
