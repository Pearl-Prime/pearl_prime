      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: master_wu_mh_hook_big_01
    line: Youth mental overload is not only a clinical trend. It is the way a generation
      of nervous systems registers a Long Mai disturbance — the earth meridians beneath
      civilizational life are carrying loads the institutional layer keeps deferring,
      and the bodies on the surface feel it first.
    metadata:
      semantic_family: long-mai-system-pressure
      angle: geomantic-systemic
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_hook_big_02
    line: Heightened sensitivity in young people is not pathology; in Master Wu's
      geomantic framework it is the cohort tuned closest to the earth meridian register.
      The bodies feel the Dragon Vein disturbance before the data confirms it — that
      is the function, not the malfunction.
    metadata:
      semantic_family: cohort-as-meridian-sensor
      angle: meridian-as-sensor
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_hook_big_03
    line: A generation is being asked to hold daily functional capacity while the
      civilizational Dragon Veins beneath them are running thin. The overload is
      not a private failure — it is the felt edge of an earth-meridian gap that no
      individual nervous system was built to absorb alone.
    metadata:
      semantic_family: meridian-gap-structural
      angle: civilizational-load
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_hook_big_04
    line: The collective field has accelerated faster than the earth qi pathways
      designed to ground it. What gets read as a youth mental health crisis is, in
      part, the visible edge of a Long Mai mismatch — the speed of the surface field
      exceeding the pace at which the Dragon Veins beneath can stabilize a body.
    metadata:
      semantic_family: field-meridian-speed-mismatch
      angle: pace-gap
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_hook_big_05
    line: Across China, Taiwan, and Japan, Master Wu's surveys read the same Dragon
      Vein disturbance under different surface symptoms. The youth mental load is
      not a regional anomaly — it is a cross-regional meridian condition the institutions
      of any single nation cannot resolve alone.
    metadata:
      semantic_family: cross-regional-pattern
      angle: cross-regional-meridian
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: master_wu_mh_intro_01
    line: Master Wu, a Taoist geomancer working with Long Mai — the living earth
      qi pathways the tradition calls Dragon Veins — has watched the cohort that
      young people belong to carry mental overload not as a private failing but as
      the felt edge of a meridian disturbance the institutional layer cannot read.
      In his framework, the body that thins under the next notification is not malfunctioning;
      it is registering the qi gap in the ground beneath the field.
    metadata:
      semantic_family: long-mai-context
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_wu_mh_intro_02
    line: Master Wu does not position himself as a public preacher or retreat teacher.
      He operates as geomantic tactician — mapping Dragon Veins across China, Taiwan,
      and Japan and placing pearls at activation sites that stabilize the earth qi.
      What his tradition offers a generation overloaded by surface noise is not another
      instruction stack; it is contact with the meridian layer beneath the noise.
    metadata:
      semantic_family: tactician-not-preacher
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_wu_mh_intro_03
    line: Master Wu works with pearl placement — strategic energetic anchoring at
      Dragon Vein activation sites that, in his tradition, stabilize the earth meridian
      for the population living above it. He has watched the surface symptoms of
      youth overload track the disturbance he has been mapping in the qi pathways
      themselves, and watched the load loosen when the meridian beneath is restored.
    metadata:
      semantic_family: pearl-placement-witness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_wu_mh_intro_04
    line: Master Wu's work spans Tainan, Taiwan, and the Japanese archipelago — cross-regional
      activation sites where the Dragon Veins of the East Asian continental and island
      systems converge. He has seen the same meridian disturbance produce different
      surface symptoms under different national institutional layers, and he has
      watched the geomantic layer respond when the institutional layer cannot.
    metadata:
      semantic_family: cross-regional-ground
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_wu_mh_intro_05
    line: Master Wu teaches inside a tradition that reads the present period as a
      civilizational Long Mai recalibration — a time when the earth meridians of
      the inherited cultural geography are being asked to carry loads they were not
      tuned to absorb. The youth mental overload is, in this frame, the cohort closest
      to the meridian feeling the recalibration first.
