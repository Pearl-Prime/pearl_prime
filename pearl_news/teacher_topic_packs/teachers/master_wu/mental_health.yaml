    org: 988 Suicide and Crisis Lifeline
    line: 'If you or someone you know is in crisis, the 988 Suicide and Crisis Lifeline
      provides free, 24/7 support across the United States. Call or text 988. Door
      in: their network has handled more than fourteen million contacts since 2022.'
    metadata:
      semantic_family: door-in-988-lifeline
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_cta_03
    org: The Trevor Project
    line: 'If you are LGBTQ+ and under 25 and in crisis, The Trevor Project provides
      free, 24/7 support by text, chat, or call. Text START to 678-678. Door in:
      a network built for the specific cohort.'
    metadata:
      semantic_family: door-in-trevor-project
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_cta_04
    org: NAMI HelpLine
    line: 'For information, referrals, and peer support on mental health, the NAMI
      HelpLine is available Monday through Friday. Call 1-800-950-NAMI (6264) or
      text "HelpLine" to 62640. Door in: connect to the National Alliance on Mental
      Illness network.'
