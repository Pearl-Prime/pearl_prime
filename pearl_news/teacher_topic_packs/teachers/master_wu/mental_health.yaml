turnaround:
  options:
  - id: master_wu_mh_turnaround_01
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: The JED Foundation program now runs comprehensive mental health
      frameworks across nearly five hundred US campuses, embedding peer support and
      faculty training into the day-to-day infrastructure rather than the crisis
      aftermath.
    metadata:
      semantic_family: campus-infrastructure
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_turnaround_02
    stat_line_1: 14 million contacts. 988 Lifeline.
    stat_line_2: Since the 988 Suicide and Crisis Lifeline launched in 2022, more
      than fourteen million contacts have been routed through it — a resource pool
      that did not exist three years ago and now carries weight every night.
    metadata:
      semantic_family: resource-pool-built
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_turnaround_03
    stat_line_1: Crisis Text Line. 24/7.
    stat_line_2: The Crisis Text Line network has built a free, twenty-four-hour
      texting infrastructure that meets young people in the medium they actually
      live in — a quiet door that did not exist for the previous cohort and now carries
      the weight of the late-night reach.
    metadata:
      semantic_family: text-line-medium-match
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_turnaround_04
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: The WHO Europe Child and Adolescent Health Strategy 2026-2030, adopted
      in October 2025, binds fifty-three member states to report on adolescent mental
      load against a 2030 deadline — the first multilateral instrument that treats
      the cohort load as governance, not commentary.
    metadata:
      semantic_family: policy-shift
      article_types:
      - hard_news_spiritual_response
  - id: master_wu_mh_turnaround_05
    stat_line_1: 5,600 voices. 7 countries.
    stat_line_2: UNICEF's Global Coalition for Youth Mental Health gathered 5,600
      young people aged 14-25 across seven countries to surface what conventional
      reporting had missed — and the cohort named the load themselves before the
      agencies could.
    metadata:
      semantic_family: youth-collective-naming
      article_types:
      - hard_news_spiritual_response
bridge:
