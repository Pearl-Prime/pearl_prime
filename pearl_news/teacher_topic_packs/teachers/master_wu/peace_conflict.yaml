    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Master Wu, a land and cultivation teacher, has watched in practice sessions this pressure land on young people. Students are not only asking how to try harder. They are asking how to stay steady inside environments that keep training fragmentation.
    semantic_family: master_wu-peace_conflict-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the latest report. Your chest tightens. You look away. Then you come back because conscience is still there. LOOP_SEQUENCE: "read the report. chest tightened. looked away. came back."'
    loop_type: fragmentation_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Master Wu has seen this exact loop -- the report, the body tightening, the turning away, and the return because conscience is still present.
    semantic_family: master_wu-peace_conflict-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 143 youth coalitions. 28 countries.
    stat_line_2: Young peacebuilders are documenting harm, organizing workshops, and hosting harm, supporting displaced peers, and building trust networks even while institutions stall.
    semantic_family: master_wu-peace_conflict-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 143 youth coalitions. 28 countries. The tracker measures what young people did. It has no column for what made the next step possible after another delayed or broken response -- the capacity to stay human enough to act again without surrendering to numbness or despair. The person who came back needed it. So does the reader in that loop. Master Wu's teaching has language for protecting that capacity.
    hidden_capacity: return to truthful action
    semantic_family: master_wu-peace_conflict-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Master Wu Sees
    paragraphs:
    - Master Wu would begin with the field. Attention, regulation, and effort are shaped by conditions as much as by will.
    - When the surrounding field is fragmented, unstable, or harsh, the first mistake is to translate that disorder into a judgment on the person.
    - What feels like a personal fault — me, broken, wrong — is often accurate response to badly designed or degraded conditions around you within a system and institutional structure that was never designed for what it demands.
    semantic_family: master_wu-peace_conflict-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Return-to-Ground Practice
    duration: 5 minutes
    announcement_line: Master Wu teaches a 5-minute Return-to-Ground Practice for moments when peace conflict pressure starts converting attention into helplessness. It is in the sidebar, timed and practical.
    relief_lines:
    - The body stops treating every demand as total disorganization.
    - Enough regulation returns for the next honest action.
