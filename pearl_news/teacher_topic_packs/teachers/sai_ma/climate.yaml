hook_personal:
  options:
  - id: sai_ma_climate_hook_personal_01
    line: You care about the planet and still feel less able to stay with the next
      number long enough to decide what to do — part of you knows the load is real,
      and part of you knows something larger has been asking you to host it differently.
    metadata:
      semantic_family: planetary-care-pressure
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_hook_personal_02
    line: You keep reading the data because not looking feels dishonest. You also
      know the inherited stack — the policy updates, the news cycle, the doomscroll
      — has talked at you without relief, and that something deeper, something already
      alive in you, is asking to be recognized rather than overloaded.
    metadata:
      semantic_family: inherited-frame-fatigue
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_hook_personal_03
    line: You feel it in your stomach before the headline finishes loading — the part
      of you that is told to keep calm running into the part that already carries
      a deeper knowing about the planet. The body holds what the inherited frame is
      still trying to argue with.
    metadata:
      semantic_family: somatic-planetary-knowing
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_hook_personal_04
    line: You look away from the update and come back to it again. Neither move helps,
      because the pattern in the brain was already firing — and the part of you trying
      to think your way out is the same part that has been overrun for too long.
    metadata:
      semantic_family: look-away-pattern
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_hook_personal_05
    line: You have signed the petitions, joined the strike, done the recycling. The
      mind has done all it can — and the quieter recognition of interconnection already
      inside you is asking to be awakened, not added to.
    metadata:
      semantic_family: interconnection-call
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: sai_ma_climate_hook_big_01
    line: Climate pressure is no longer only environmental. It is attentional, somatic,
      and structural — and what gets read as despair is, in part, unity consciousness
      pressing on a brain whose inherited patterns of separation were never asked
      to host the planet as one body.
    metadata:
      semantic_family: unity-pressure-on-pattern
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_hook_big_02
    line: Heightened planetary sensitivity in young people is not pathology. In Sai
      Maa's lineage it is the felt edge of Shakti pressing against inherited categories
      — the cost of being awake during a period when the structures designed to manage
      the planet were never built to recognize it as a living field.
    metadata:
      semantic_family: shakti-planetary-press
      angle: divine-feminine-emergence
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_hook_big_03
    line: A generation is being asked to hold the planet inside structures the inherited
      institutions cannot scale. The overload is not a private failure — it is the
      felt edge of a structural gap that the Divine Feminine, recognized as embodied
      reality rather than metaphor, is built to address.
    metadata:
      semantic_family: divine-feminine-structural-climate
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_hook_big_04
    line: The signal that older systems read as climate anxiety is, in Sai Maa's framework,
      the brain registering that the world it was prepared for is no longer the world
      the planet has to live as. The pattern itself is the door — and Diksha is the
      light that opens it.
    metadata:
      semantic_family: pattern-as-door-climate
      angle: diksha-opening
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_hook_big_05
    line: The collective field is asking young people to host the planet's actual
      interconnection — not the abstraction. The climate crisis is, in part, the
      visible edge of unity consciousness pressing against patterns of separation
      that the brain has not yet been illuminated through.
    metadata:
      semantic_family: unity-consciousness-press-climate
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: sai_ma_climate_intro_01
    line: 'Her Holiness Sai Maa, Jagadguru of the Hindu Vishnuswami lineage and the
      first female Jagadguru in 2,700 years, has watched in Diksha transmissions young
      people carry planetary distress as both real suffering and something her lineage
      names precisely: unity consciousness pressing on inherited patterns of separation.
      In Sai Maa''s framework, Brain Illumination Meditation does not argue with the
      pattern — it clears it, and lets the recognition of interconnection land where
      it has always been ready to.'
    metadata:
      semantic_family: jagadguru-witness-climate
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: sai_ma_climate_intro_02
    line: Her Holiness Sai Maa does not teach to produce followers. She teaches to
      cultivate masters — to awaken the recognition of interconnection already inside
      every person who comes. For decades she has worked with young people whose minds
      are exhausted from being talked at by the inherited frame, and what her lineage
      offers is not another instruction set; it is Diksha, the transmission of light
      into the brain.
    metadata:
      semantic_family: masters-not-followers-climate
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: sai_ma_climate_intro_03
    line: Her Holiness Sai Maa works through Sai Maa Diksha — the transmission of
      light directly into the brain to awaken the recognition that every being is
      interconnected with the planet itself. She has watched young people move through
      the same loop the data names as climate anxiety, and watched the loop loosen
      when the light, not the explanation, reaches the pattern.
    metadata:
      semantic_family: diksha-light-witness-climate
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: sai_ma_climate_intro_04
    line: Her Holiness Sai Maa speaks across East and West as one field — her lineage
      is Hindu Vishnuswami, and she has received visitations from Jesus, St. Germain,
      and Archangel Michael in the same realization. In Brain Illumination Meditation
      young people meet a tradition that does not split East and West and does not
      ask them to choose between the planetary voices already calling them.
    metadata:
      semantic_family: east-west-integration-climate
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: sai_ma_climate_intro_05
    line: Her Holiness Sai Maa teaches inside the lineage of Vishnuswami as Jagadguru
      — world teacher — and her teaching is inseparable from the humanitarian work
      of Humanity in Unity and the Temple of Consciousness. Young people are not asked
      to leave the world to receive Diksha; they are taught that planetary care and
      self-mastery are the same practice.
    metadata:
      semantic_family: humanitarian-inseparable-climate
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: sai_ma_climate_somatic_01
    line: You read the climate update. Your body tightens. You look away. Then you
      come back because the number is still true and the pattern is already firing.
    metadata:
      semantic_family: update_pattern
      loop_type: update_loop
      body_register: stomach
      digital_behavior: look away
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_somatic_02
    line: You wake before the alarm. Your stomach is already tight. You reach for
      the phone before you reach for the light, because the pattern is already there
      and you need to check whether the planet matches it.
    metadata:
      semantic_family: morning_planetary_check
      loop_type: morning_pattern
      body_register: stomach
      digital_behavior: reach for the phone
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_somatic_03
    line: Your jaw clenches when the weather alert comes through. You replay every
      summer you remember from before. Your breath shortens. The brain ran the inherited
      pattern before you decided anything.
    metadata:
      semantic_family: jaw-clench-weather
      loop_type: jaw_clench
      body_register: jaw
      digital_behavior: weather alert
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_climate_somatic_04
    line: You hold your breath without noticing while the chart loads. Your shoulders
      lift. You exhale only when you see the curve and only halfway, because the
      pattern is teaching the body to brace for the next one.
    metadata:
      semantic_family: breath-brace-chart
      loop_type: breath_brace
      body_register: breath
      digital_behavior: chart load
