topic_fit:
  fit_level: primary
  fit_reason: 'Partnerships across institutional power asymmetries can be entered as transaction or as communion; Sai Maa''s teaching of the Divine Feminine as embodied force and cultivating-masters-not-followers reframes partnership as mutual flowering rather than patron-client dependency.'
