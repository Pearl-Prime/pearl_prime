teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa has seen this exact loop in young people returning from partnership work — the release, the tightening, the look away, and the return because the people on the smaller side were still in it.
    semantic_family: sai_ma-partnerships-witness-loop
    loop_type: patron_client_drag
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: She has watched students enter partnerships seeking a patron and leave them carrying invisible labor that the larger partner publicly took credit for. The Vishnuswami lineage does not wave that away. It names it as a mismatch between the partnership's stated form and the consciousness from which it was actually designed.
    semantic_family: sai_ma-partnerships-witness-labor
    loop_type: patron_client_drag
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_03
    line: Sai Maa has watched the slower thing — the way young partners learn to feel patron-client dependency as a tightening in the body before the contract names it. The teaching she offers is not skepticism. It is the disciplined recognition that genuine partnership requires both parties to be inhabiting their own mastery, not their assigned role in the hierarchy.
    semantic_family: sai_ma-partnerships-witness-mastery
    loop_type: patron_client_drag
    article_types:
    - hard_news_spiritual_response
