  - do not preach unity-consciousness as a substitute for accountability
  - do not frame the disillusionment of being on the smaller side as personal cynicism
hook_personal:
  options:
  - id: hook_personal_01
    line: You read another joint-statement press release. You also know what the last three from the same partners actually produced once the cameras left.
    semantic_family: sai_ma-partnerships-hook-personal-press
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: hook_personal_02
    line: You said yes to the youth advisory seat. You also know the meeting is at 11 a.m. on a Wednesday, scheduled by people who do not need to skip a shift to attend.
    semantic_family: sai_ma-partnerships-hook-personal-seat
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
  - id: hook_personal_03
    line: You scroll the partner logos at the bottom of the report. You also know which logos showed up to the launch and which logos have been quiet since.
    semantic_family: sai_ma-partnerships-hook-personal-logos
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Partnerships are no longer only an institutional-design question. They are a daily test of whether the people most affected by an outcome have any say in how the partners structure the work.
    semantic_family: sai_ma-partnerships-hook-big-design
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_02
    line: SDG 17 names partnerships as the operating mechanism for the other sixteen goals. The mechanism has been measured. Most multi-stakeholder partnerships fail their stated youth-inclusion targets within 24 months of launch.
    semantic_family: sai_ma-partnerships-hook-big-sdg17
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_03
    line: The partnership form has been used as both genuine collaboration and as institutional cover. The difference is rarely visible at launch — it is visible 18 months in, when the press conference is over and the convening organization decides which partner gets to keep showing up.
    semantic_family: sai_ma-partnerships-hook-big-cover
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Sai Maa, the first female Jagadguru in 2,700 years of the Vishnuswami lineage, has watched young people return from interfaith and civic partnerships with the same question. They are not asking whether collaboration matters. They are asking how to stay in genuine partnership when the larger partner keeps extracting more than they bring.
    semantic_family: sai_ma-partnerships-intro-jagadguru
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_intro_02
    line: Sai Maa, rooted in the Vishnuswami lineage and the integrated humanitarian work of the Temple of Consciousness, has watched in Brain Illumination teaching sessions the specific exhaustion of being the smaller party in a partnership designed around the larger party's exit terms. The teaching she offers does not erase the asymmetry. It activates the inner ground from which the smaller partner can choose mutual flowering over patron-client dependency.
    semantic_family: sai_ma-partnerships-intro-mutual
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_intro_03
    line: Sai Maa — Jagadguru, humanitarian, founder of Humanity in Unity — has watched in decades of Diksha work the specific moment when a student stops seeking a patron and starts inhabiting their own mastery. That shift is the precondition for partnerships that change what is possible. The students bringing partnership questions to her teaching are asking how to inhabit it in institutional rooms designed to delay it.
    semantic_family: sai_ma-partnerships-intro-diksha
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
