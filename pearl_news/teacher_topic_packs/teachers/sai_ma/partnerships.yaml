  - id: youth_somatic_02
    line: 'You opened the partnership invitation. Your jaw tightened. You skimmed past it. Then you came back because saying no had its own cost too. LOOP_SEQUENCE: "opened the invitation. jaw tightened. skimmed past. came back."'
