    line: 'If you are LGBTQ+ and under 25 and in crisis, The Trevor Project provides
      free, 24/7 support by text, chat, or call. Text START to 678-678. Door in: a
      network built for the specific cohort.'
    metadata:
      semantic_family: door-in-trevor-project
      article_types:
