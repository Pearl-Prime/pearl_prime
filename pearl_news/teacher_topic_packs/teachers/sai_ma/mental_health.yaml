      org: "Active Minds"
      line: "Active Minds offers a public entry point for youth mental health organizing. Door in: https://www.activeminds.org"
      semantic_family: "sai_ma-mental_health-cta"
      article_types: ["hard_news_spiritual_response"]

title_system:
