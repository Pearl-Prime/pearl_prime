    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Economic stress now arrives as identity pressure: stay employable, stay
      available, and keep acting as if instability were a test of character.'
    semantic_family: sai_ma-economy_work-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa, a Vedic teacher of consciousness and grace, has watched
      in practice sessions this pressure land on young people. Students are not only
      asking how to feel better. They are asking how to stop letting pressure become
      the whole story of who they are.
    semantic_family: sai_ma-economy_work-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You check the schedule app. Your stomach drops. You refresh again. Then
      you screenshot it because the shift might disappear before you can trust what
      you saw. LOOP_SEQUENCE: "checked the app. stomach dropped. refreshed again.
      took the screenshot."'
    loop_type: overwhelm_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa has seen this exact loop -- the app check, the drop in the body,
      the refresh, and the screenshot that tries to hold the moment still.
    semantic_family: sai_ma-economy_work-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: Young workers are documenting conditions, filing wage-theft cases,
      and organizing campaigns that force unstable labor rules into the public record.
    semantic_family: sai_ma-economy_work-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 1,240 cases. 32 cities. The tracker measures what young people did. It has
      no column for what made the next step possible after another delayed or broken
      response -- the capacity to stay functional enough to act again when the economy
      keeps converting uncertainty into private stress. The person who came back needed
      it. So does the reader in that loop. Sai Maa's teaching has language for protecting
      that capacity.
    hidden_capacity: return to truthful action
    semantic_family: sai_ma-economy_work-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Sai Maa Sees
    paragraphs:
    - Sai Maa would begin by separating consciousness from the storm moving through
      it. Pressure is real, but overwhelm should not become identity.
    - Her teaching does not ask young people to deny the difficulty. It asks them
      to recover enough inner clarity that fear or overload does not become the sole
      narrator of the self.
    - What feels like a personal fault -- me, broken, wrong -- is often accurate response
      to a system and institutional structure that keep normalizing unsustainable
      strain.
    semantic_family: sai_ma-economy_work-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Overwhelm Reset
    duration: 5 minutes
    announcement_line: Sai Maa teaches a 5-minute Overwhelm Reset for moments when
      economy work pressure starts converting attention into helplessness. It is in
      the sidebar, timed and practical.
    relief_lines:
    - The spiral loses some of its authority to define the whole self.
    - Enough clarity returns for the next honest decision.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
