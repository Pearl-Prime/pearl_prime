topic_fit:
  fit_level: primary
  fit_reason: In Sai Maa's lineage education distress is not laziness — it is limiting
    patterns of fragmented attention running in a brain that has been asked to host
    more consciousness than the inherited classroom was designed to carry. Brain
    Illumination Meditation and Diksha exist to clear those patterns and let mastery,
    not compliance, become the basis of learning.
  forbidden_angles:
