  - do not blame students for fragmentation
  - do not reduce focus to productivity hacks
hook_personal:
  options:
  - id: hook_personal_01
    line: You still want to learn. You also know how quickly the current system turns
      attention into scatter and effort into exhaustion.
    semantic_family: sai_ma-education-hook-personal
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Education strain is not only about workload. It is about whether schools
      still create the conditions under which attention and learning can function.
    semantic_family: sai_ma-education-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa, a Vedic teacher of consciousness and grace, has watched
      in practice sessions this pressure land on young people. Students are not only
      asking how to feel better. They are asking how to stop letting pressure become
      the whole story of who they are.
    semantic_family: sai_ma-education-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You open the assignment portal. Focus breaks. You switch away. Then you
      come back because the work is still there. LOOP_SEQUENCE: "opened the portal.
      focus broke. switched away. came back."'
    loop_type: overwhelm_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa has seen this exact loop -- the portal opening, the break in focus,
      the switch away, and the return because the work still remains.
    semantic_family: sai_ma-education-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: Students and educators are building study supports, healthier schedules,
      and classroom reforms that protect attention instead of merely organizing campaigns
      and hosting it.
    semantic_family: sai_ma-education-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. The tracker measures what young people did. It
      has no column for what made the next step possible after another delayed or
      broken response -- the capacity to return to the work without turning fragmentation
      into identity. The person who came back needed it. So does the reader in that
      loop. Sai Maa's teaching has language for protecting that capacity.
    hidden_capacity: return to truthful action
    semantic_family: sai_ma-education-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Sai Maa Sees
    paragraphs:
    - Sai Maa would begin by separating consciousness from the storm moving through
      it. Pressure is real, but overwhelm should not become identity.
    - Her teaching does not ask young people to deny the difficulty. It asks them
      to recover enough inner clarity that fear or overload does not become the sole
      narrator of the self.
    - What feels like a personal fault -- me, broken, wrong -- is often accurate response
      to a system and institutional structure that keep normalizing unsustainable
      strain.
    semantic_family: sai_ma-education-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Overwhelm Reset
    duration: 5 minutes
    announcement_line: Sai Maa teaches a 5-minute Overwhelm Reset for moments when
      education pressure starts converting attention into helplessness. It is in the
      sidebar, timed and practical.
    relief_lines:
    - The spiral loses some of its authority to define the whole self.
    - Enough clarity returns for the next honest decision.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
