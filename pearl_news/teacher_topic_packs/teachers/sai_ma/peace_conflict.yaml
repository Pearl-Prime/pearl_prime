hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Conflict pressure is no longer only geopolitical. It arrives as moral injury
      and as the collapse of trust in institutions that keep failing to protect.
    semantic_family: sai_ma-peace_conflict-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Her Holiness Sai Maa, a Vedic teacher of consciousness and grace, has watched
      in practice sessions this pressure land on young people. Students are not only
      asking how to feel better. They are asking how to stop letting pressure become
      the whole story of who they are.
    semantic_family: sai_ma-peace_conflict-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the latest report. Your chest tightens. You look away. Then you
      come back because conscience is still there. LOOP_SEQUENCE: "read the report.
      chest tightened. looked away. came back."'
    loop_type: overwhelm_loop
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Sai Maa has seen this exact loop -- the report, the body tightening, the
      turning away, and the return because conscience is still present.
    semantic_family: sai_ma-peace_conflict-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 143 youth coalitions. 28 countries.
    stat_line_2: Young peacebuilders are documenting harm, organizing workshops, and
      hosting harm, supporting displaced peers, and building trust networks even while
      institutions stall.
    semantic_family: sai_ma-peace_conflict-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: 143 youth coalitions. 28 countries. The tracker measures what young people
      did. It has no column for what made the next step possible after another delayed
      or broken response -- the capacity to stay human enough to act again without
      surrendering to numbness or despair. The person who came back needed it. So
      does the reader in that loop. Sai Maa's teaching has language for protecting
      that capacity.
    hidden_capacity: return to truthful action
    semantic_family: sai_ma-peace_conflict-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Sai Maa Sees
    paragraphs:
    - Sai Maa would begin by separating consciousness from the storm moving through
      it. Pressure is real, but overwhelm should not become identity.
    - Her teaching does not ask young people to deny the difficulty. It asks them
      to recover enough inner clarity that fear or overload does not become the sole
      narrator of the self.
    - What feels like a personal fault -- me, broken, wrong -- is often accurate response
      to a system and institutional structure that keep normalizing unsustainable
      strain.
    semantic_family: sai_ma-peace_conflict-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Overwhelm Reset
    duration: 5 minutes
    announcement_line: Sai Maa teaches a 5-minute Overwhelm Reset for moments when
      peace conflict pressure starts converting attention into helplessness. It is
      in the sidebar, timed and practical.
    relief_lines:
    - The spiral loses some of its authority to define the whole self.
    - Enough clarity returns for the next honest decision.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
