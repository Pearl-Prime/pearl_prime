topic_fit:
  fit_level: primary
  fit_reason: In Sai Maa's lineage conflict distress is not moral failure — it is
    unity consciousness pressing on a brain whose inherited patterns of separation
    cannot host the recognition that every being is interconnected. Brain Illumination
    Meditation and Diksha exist to clear those patterns and let young people stay
    human under repeated witness of violence without collapsing or numbing.
  forbidden_angles:
  - do not preach numbness as wisdom
  - do not confuse silence with peace
  - do not separate East and West — speak across both
  - do not reduce the lineage to generic Hindu or Vedic Hindu framing
