hook_personal:
  options:
  - id: sai_ma_pc_hook_personal_01
    line: You keep reading because not looking feels dishonest. You also know what
      repeated violence is doing to your body and your trust — and part of you knows
      something larger has been asking to reach you, but the patterns of separation
      in the brain keep crowding it out.
    metadata:
      semantic_family: witness-pressure
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_hook_personal_02
    line: You keep returning to the feed because not staying in contact feels worse.
      You also know the inherited stack — the briefings, the takes, the doomscroll
      — has talked at you without relief, and that something deeper, something already
      alive in you, is asking to be recognized rather than briefed.
    metadata:
      semantic_family: inherited-frame-fatigue-peace
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_hook_personal_03
    line: You feel it in your chest before the headline finishes loading — the part
      of you that wants to look away running into the part that already carries a
      deeper knowing about the unity of every being. The body holds what the inherited
      frame is still trying to argue with.
    metadata:
      semantic_family: somatic-unity-knowing
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_hook_personal_04
    line: You scroll past the image and scroll back. Neither move helps, because the
      pattern in the brain was already firing — and the part of you trying to think
      your way out is the same part that has been overrun for too long.
    metadata:
      semantic_family: scroll-back-pattern
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_hook_personal_05
    line: You have signed the petitions, joined the calls, kept the vigil. The mind
      has done all it can — and the quieter recognition of unity consciousness already
      inside you is asking to be awakened, not added to.
    metadata:
      semantic_family: unity-call-peace
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: sai_ma_pc_hook_big_01
    line: Conflict pressure is no longer only geopolitical. It arrives as moral injury,
      as the collapse of trust in institutions that keep failing to protect — and
      as the felt edge of unity consciousness pressing on a brain whose inherited
      patterns of separation were never asked to host the recognition that every being
      is interconnected.
    metadata:
      semantic_family: unity-pressure-on-pattern-peace
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_hook_big_02
    line: Heightened moral sensitivity in young people is not pathology. In Sai Maa's
      lineage it is the felt edge of Shakti pressing against inherited categories
      of us and them — the cost of being awake during a period when the structures
      designed to manage conflict were never built to recognize humanity as one body.
    metadata:
      semantic_family: shakti-conflict-press
      angle: divine-feminine-emergence
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_hook_big_03
    line: A generation is being asked to hold the world inside structures the inherited
      institutions cannot scale. The moral injury is not a private failure — it is
      the felt edge of a structural gap that the Divine Feminine, recognized as embodied
      reality rather than metaphor, is built to address.
    metadata:
      semantic_family: divine-feminine-structural-peace
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_hook_big_04
    line: The signal that older systems read as moral fatigue is, in Sai Maa's framework,
      the brain registering that the world it was prepared for is no longer the world
      conscience has to live in. The pattern itself is the door — and Diksha is the
      light that opens it.
    metadata:
      semantic_family: pattern-as-door-peace
      angle: diksha-opening
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_hook_big_05
    line: The collective field is asking young people to host the actual interconnection
      of every life — not the abstraction. The peace crisis is, in part, the visible
      edge of unity consciousness pressing against patterns of separation that the
      brain has not yet been illuminated through.
    metadata:
      semantic_family: unity-consciousness-press-peace
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: sai_ma_pc_intro_01
    line: 'Her Holiness Sai Maa, Jagadguru of the Hindu Vishnuswami lineage and the
      first female Jagadguru in 2,700 years, has watched in Diksha transmissions young
      people carry conflict distress as both real moral injury and something her lineage
      names precisely: unity consciousness pressing on inherited patterns of separation.
      In Sai Maa''s framework, Brain Illumination Meditation does not argue with the
      pattern — it clears it, and lets the recognition of interconnection land where
      it has always been ready to.'
    metadata:
      semantic_family: jagadguru-witness-peace
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: sai_ma_pc_intro_02
    line: Her Holiness Sai Maa does not teach to produce followers. She teaches to
      cultivate masters — to awaken the recognition of unity consciousness already
      inside every person who comes. For decades she has worked with young people
      whose minds are exhausted from witnessing violence the inherited institutions
      cannot stop, and what her lineage offers is not another instruction set; it
      is Diksha, the transmission of light into the brain.
    metadata:
      semantic_family: masters-not-followers-peace
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: sai_ma_pc_intro_03
    line: Her Holiness Sai Maa works through Sai Maa Diksha — the transmission of
      light directly into the brain to awaken the recognition that every being is
      interconnected. She has watched young people move through the same loop the
      briefings name as moral injury, and watched the loop loosen when the light,
      not the analysis, reaches the pattern.
    metadata:
      semantic_family: diksha-light-witness-peace
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: sai_ma_pc_intro_04
    line: Her Holiness Sai Maa speaks across East and West as one field — her lineage
      is Hindu Vishnuswami, and she has received visitations from Jesus, St. Germain,
      and Archangel Michael in the same realization. In Brain Illumination Meditation
      young people meet a tradition that does not split East and West and refuses
      the inherited categories of us and them on which most conflict frames rest.
    metadata:
      semantic_family: east-west-integration-peace
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: sai_ma_pc_intro_05
    line: Her Holiness Sai Maa teaches inside the lineage of Vishnuswami as Jagadguru
      — world teacher — and her teaching is inseparable from the humanitarian work
      of Humanity in Unity and the Temple of Consciousness. Young people are not asked
      to leave the world to receive Diksha; they are taught that staying human under
      witness and humanitarian service are the same practice.
    metadata:
      semantic_family: humanitarian-inseparable-peace
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: sai_ma_pc_somatic_01
    line: You read the latest report. Your chest tightens. You look away. Then you
      come back because conscience is still there and the pattern is already firing.
    metadata:
      semantic_family: report_pattern
      loop_type: report_loop
      body_register: chest
      digital_behavior: look away
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_somatic_02
    line: You wake before the alarm. Your stomach is already tight. You reach for
      the phone before you reach for the light, because the pattern is already there
      and you need to check whether the world has shifted overnight.
    metadata:
      semantic_family: morning_conflict_check
      loop_type: morning_pattern
      body_register: stomach
      digital_behavior: reach for the phone
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_somatic_03
    line: Your jaw clenches when the breaking-news banner comes through. You replay
      the names you already remember. Your breath shortens. The brain ran the inherited
      pattern of separation before you decided anything.
    metadata:
      semantic_family: jaw-clench-banner
      loop_type: jaw_clench
      body_register: jaw
      digital_behavior: breaking-news banner
      article_types:
      - hard_news_spiritual_response
  - id: sai_ma_pc_somatic_04
    line: You hold your breath without noticing while the photograph loads. Your shoulders
      lift. You exhale only after you see it and only halfway, because the pattern
      is teaching the body to brace for the next image.
    metadata:
      semantic_family: breath-brace-image
      loop_type: breath_brace
