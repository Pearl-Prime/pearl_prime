bridge:
  options:
  - id: tracker_capacity_01
    line: 'Workers'' rights campaigns track demands won and platforms forced to the
      table. The tracker has no column for what made the next shift screenshot possible
      after the last cancellation — the capacity to stay in contact with your own
      dignity when the system keeps rupturing it. The young worker organizing their
      coworkers needed it. So does the person who checked the app, felt their stomach
      drop, and is still there the next day. Miki''s tradition has been developing
      that capacity through sound and presence for generations: the body can remember
      what the system erases.'
    hidden_capacity: stay in contact with own dignity when the system keeps rupturing
      it
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: tracker_capacity_02
    line: Economic justice trackers count demands and policy wins. They do not count
      the inner capacity that lets a young worker stay in their own value when the
      platform has already written them out of the schedule. That capacity is what
      the next coworker conversation needs. It is what the person who screenshotted
      the shift and waits for the next drop needs too. Miki's tradition holds that
      this capacity is not missing; it is covered by the relational rupture of precarity.
      Sound and light language can help uncover it.
    hidden_capacity: recognize own value when the system refuses to hold it
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: relational_rupture_01
    header: What Miki Sees
    paragraphs:
    - In Miki's tradition, economic precarity is not primarily a wage problem; it
      is a relational rupture. When a young person offers their effort and the system
      refuses to hold it with consistency or recognition, the web between worker and
      employer tears. The body registers that rupture first — as stomach-drop, as
      chest-tighten, as the learned habit of screenshot-and-wait. The mind comes later
      with policy language.
    - 'The principle of living in right relationship — maintaining the web between
      all parties — does not ask for charity or gratitude. It asks for basic mutuality:
      if you want the work, hold the worker. For gig workers, that web is severed
      by algorithm; the shift disappears, the algorithm offers no why, and the body
      learns that its effort does not create obligation in return.'
    - 'The reframe that matters: what feels like a personal fault -- me, broken, wrong,
      unstable -- is often accurate response to a system designed not to hold you.
      The body is not malfunctioning. It is registering a relational break. When young
      workers understand that their stomach-drop is not a personal defect but a clear
      reading of the platform''s refusal to reciprocate, self-blame softens. The problem
      is not the worker. The problem is that the institutional web has been torn and
      the body knows it.'
    semantic_family: relational-rupture
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: relational_rupture_02
    header: What Miki Sees
    paragraphs:
    - Miki reads economic precarity through the lens of harae — purification of actions
      that damage the web of relationships, in this case between worker and employer.
      Gig-work instability is not only about scheduling chaos; it is the systematic
      breaking of the reciprocal web that makes work dignified.
    - 'Young people are inheriting a labor economy where effort does not generate
      recognition or stability. The platform promises flexibility but delivers only
      volatility: the shift you planned your week around vanishes, the algorithm offers
      no explanation, and you are left to hold the loss alone. That is relational
      rupture at the scale of daily life.'
    - 'In that frame, self-blame softens. The disorder is not in the worker''s capacity
      to plan or persist, and I am not wrong for feeling shaken. It is in the system
      and institution refusing to hold what the worker has offered. Healing as remembering
      means: the sense of dignity and stability you seek was not destroyed; it is
      covered by precarity. Sound and presence can help the body remember that your
      effort creates value, even when the platform refuses to recognize it.'
    semantic_family: relational-rupture-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
