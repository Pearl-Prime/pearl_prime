hook_personal:
  options:
  - id: hook_personal_01
    line: Your effort is real. The recognition for it is not. The app changes the
      shift after you have already planned your week around it.
    semantic_family: dignity-rupture
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Economic precarity is not only about money. It is about what happens to
      a young person's sense of dignity and stability when the system that employs
      them refuses to hold what they have offered.
    semantic_family: relational-rupture-work
    angle: dignity-loss
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: identity_observation_shift_01
    line: Miki-san, a teacher of light-language and sound healing, has watched in
      practice sessions what gig-work instability does to young people. They are not
      asking only for better wages. They are asking how to receive the truth about
      precarity without the body collapsing into the belief that their effort does
      not matter.
    semantic_family: identity_seen_shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: identity_observation_shift_02
    line: Miki-san, from the light-language and crystal-bowl healing tradition, has
      seen in practice sessions what happens when a young person's shift disappears
      from the app mid-week. It is not only logistical chaos. It is a relational rupture
      — the worker's effort was never held as mattering. That break lives in the body
      first, as stomach-drop and self-surveillance, long before it reaches the mind
      as a policy complaint.
    semantic_family: identity_seen_shift_alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: schedule_rupture_01
    line: 'You check the app for your shift. Your stomach drops. You screenshot it
      fast because it might change before your next check. Then you wait for the next
      notification because stability is something you have to catch now.

      LOOP_SEQUENCE: "checked the app. stomach dropped. screenshotted fast. waited
      for the next change."'
    loop_type: schedule_rupture_loop
    body_register: stomach
    digital_behavior: checks the app
    article_types:
    - hard_news_spiritual_response
  - id: schedule_rupture_02
    line: 'You saw the shift assignment in the work chat. Your chest tightened. You
      saved a copy immediately because shifts vanish without notice. Then you kept
      checking because the job that is supposed to hold you will not.

      LOOP_SEQUENCE: "saw the shift. chest tightened. saved a copy. kept checking."'
    loop_type: schedule_rupture_loop
    body_register: chest
    digital_behavior: screenshots
    article_types:
    - hard_news_spiritual_response
