teacher_intro:
  options:
  - id: identity_observation_shift_01
    line: Miki-san, a teacher of light-language and sound healing, has watched in
      practice sessions what conflict news does to young people. They are not asking
      whether the violence is real. They are asking how to receive the truth about
      breaking places without the body shutting down from the loss of collective safety.
    semantic_family: identity_seen_shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: identity_observation_shift_02
    line: Miki-san, from the light-language and crystal-bowl healing tradition, has
      seen in practice sessions what happens when a young person reads that another
      city has been bombed, another settlement has been displaced, another line has
      broken. It arrives first as a freezing in the chest, then as the loss of the
      assumption that a common web of safety exists. That break lives in the body
      as numbness and doom-scroll, long before the mind finds words for collective
      rupture.
    semantic_family: identity_seen_shift_alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
youth_somatic:
