    line: 'You read the conflict update in the news feed. Your chest froze. You kept
      scrolling, not landing, hoping for something that would restore the feeling
      that we are all connected. Then numbness came and you scrolled more because
      you could not look away and you could not stay present.

      LOOP_SEQUENCE: "read the update. chest froze. scrolled without landing. went
      numb. cycled back."'
    loop_type: conflict_freeze_numb_loop
    body_register: chest
    digital_behavior: reads update
    article_types:
    - hard_news_spiritual_response
  - id: conflict_freeze_02
    line: 'You saw the headline about displacement. Your throat tightened. You scrolled
      deeper into the story, then past it, then back, caught between needing to know
      and needing to escape. Then you stopped feeling at all.

      LOOP_SEQUENCE: "saw the headline. throat tightened. scrolled deeper then past
      it. stopped feeling."'
    loop_type: conflict_freeze_numb_loop
    body_register: throat
    digital_behavior: doom-scrolls
    article_types:
    - hard_news_spiritual_response
