bridge:
  options:
  - id: tracker_capacity_01
    line: 'Peace-building trackers count ceasefire negotiations and dialogue initiatives.
      They have no column for what made the next day of engagement possible after
      the last bombing — the capacity to stay in contact with collective belonging
      when the news keeps rupturing it. The young person who organized a cross-conflict
      conversation needed it. So does the person who read the update, felt their chest
      freeze, and is still scrolling, still searching for the web. Miki''s tradition
      has been developing that capacity through sound and presence for generations:
      the body can remember that connection exists even when it has been broken.'
    hidden_capacity: stay in contact with collective belonging when rupture keeps
      arriving
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: tracker_capacity_02
    line: Conflict and peacebuilding databases count casualties, ceasefires, and negotiations.
      They do not count the inner capacity that lets a young person stay in their
      own coherence and belief in collective safety when the news has announced their
      loss. That capacity is what the next bridge-building conversation needs. It
      is what the person who read the conflict update, felt the world crack, and came
      back to look for connection needs too. Miki's tradition holds that this capacity
      is not missing; it is covered by the relational rupture of war and violence.
      Sound and light language can help uncover the credibility that you belong to
      something larger than the breaking.
    hidden_capacity: believe in collective belonging when the web keeps being torn
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
    - commentary
teacher_perspective:
  options:
  - id: relational_rupture_01
    header: What Miki Sees
    paragraphs:
    - In Miki's tradition, conflict and violence are understood as the deepest possible
      relational rupture — the breaking of the web that connects all people, all places,
      and all futures. When a young person reads about war, bombing, or displacement,
      the body registers this not as abstract information but as a tear in the fabric
      of collective belonging. The freezing in the chest, the numb-scroll, the return
      to the news seeking proof that the web still holds — these are not signs of
      weakness. They are accurate readings of relational trauma.
    - 'The principle of living in right relationship asks: what are we responsible
      for when we are connected to distant others through the web? For young people
      who have inherited a fragmented world, reading conflict news means touching
      that question daily. The body often answers before language can: we are responsible,
      we are connected, and the breaking matters because the web is real.'
    - 'The reframe that matters: what feels like a personal fault -- me, broken, wrong
      in helpless despair -- is sometimes accurate response to a real rupture in the
      collective field. The body is not malfunctioning. It is registering a break
      in the assumption that safety and belonging are shared across all people. When
      young people understand that their numbing is not a personal defect but a reasonable
      response to the loss of collective coherence, self-blame softens. The problem
      is not the young person. The problem is that the system and institutional structure
      of the web has been torn and the body knows it.'
    semantic_family: relational-rupture
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: relational_rupture_02
    header: What Miki Sees
    paragraphs:
    - Miki reads conflict news and its impact on youth through the lens of harae —
      the purification of actions that damage the web of relationships, in this case
      the web of human belonging and collective safety. War and violence are not only
      political or strategic events; they are the systematic breaking of the relational
      field that tells us we are held together.
    - Young people inheriting a world of ongoing conflict are being asked to hold
      collective belonging with fewer resources than any previous generation. Every
      news update reminds them that the web is fragile, that rupture is possible at
      any moment, that the assumption of safety is not shared globally. That is not
      a metaphor. It is what the body is responding to when it freezes, when it numbs,
      when it doom-scrolls without landing.
    - 'In that frame, self-blame softens. The disorder is not in the young person''s
      capacity to hope or to care, and I am not wrong for feeling shattered. The disorder
      is in the world where rupture is real and ongoing. Healing as remembering means:
      the capacity to recognize and stay in the web of belonging was never destroyed;
      it is covered by the breaking that is still happening. Sound and presence can
      help the body remember that coherence and connection are not dead — they are
      underneath the rupture, waiting to be recognized and rebuilt within a system
      and institutional structure that was never designed for what it demands.'
    semantic_family: relational-rupture-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
