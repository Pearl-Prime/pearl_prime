    line: Conflict news does something to a generation that inherited a fractured
      world. It is not only information. It is the body's recognition that the web
      of relationships between people, land, and collective safety has been torn and
      keeps tearing on a schedule.
    semantic_family: collective-rupture
    angle: belonging-loss
    article_types:
