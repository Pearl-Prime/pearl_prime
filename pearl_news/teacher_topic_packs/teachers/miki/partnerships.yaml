      deficit and the smaller partner needs to remember what was already there before
      the partnership opened. It is in the sidebar, timed and step by step.
    relief_lines:
    - The body stops carrying the partnership's deficit narrative as the truth about
      the self.
    - A steadier ground returns for the next conversation, the next MOU revision,
      the next decision about whether to stay in.
    relief_register:
    - capacity
    - clarity
    - act again
    derived_from_frame: seed_in_soil_partnership
