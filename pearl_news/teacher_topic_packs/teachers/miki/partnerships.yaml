  - id: practice_02
    display_name: 5-minute Original Completeness Practice
    duration: 5 minutes
    announcement_line: Miki teaches a 5-minute Original Completeness practice — healing as remembering not repairing — for the moment when the partnership has started narrating itself as the rescue of one party by the other. It is in the sidebar, short enough to use before the call or after the meeting.
    relief_lines:
    - The patron-rescue dynamic the design installs stops being inhabited as inevitable.
    - Enough ground returns to choose engagement or refusal on the work's actual terms.
