topic_fit:
  fit_level: primary
  fit_reason: 'Partnerships built around what each party lacks invite competition and exhaustion; Miki''s transmission lineage holds that partnerships built around remembering and activating each party''s original completeness carry a different kind of light. The Kurama-yama tradition has been doing this work for centuries.'
  forbidden_angles:
  - do not preach generic positivity as a substitute for accountability
  - do not frame the disillusionment of being on the smaller side as personal weakness
hook_personal:
  options:
  - id: hook_personal_01
    line: You read another joint-statement press release. You also know what the last three from the same partners actually produced once the cameras left.
    semantic_family: miki-partnerships-hook-personal-press
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: hook_personal_02
    line: You said yes to the youth advisory seat. You also feel what the meeting room asks the body to carry — the smaller seat, the smaller share of the speaking time, the larger share of the explaining.
    semantic_family: miki-partnerships-hook-personal-seat
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
  - id: hook_personal_03
    line: You scroll the partner logos at the bottom of the report. You also know which logos showed up to the launch and which logos have been quiet since.
    semantic_family: miki-partnerships-hook-personal-logos
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Partnerships are no longer only an institutional-design question. They are a daily test of whether the people most affected by an outcome have any say in how the partners structure the work.
    semantic_family: miki-partnerships-hook-big-design
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_02
    line: SDG 17 names partnerships as the operating mechanism for the other sixteen goals. The mechanism has been measured. Most multi-stakeholder partnerships fail their stated youth-inclusion targets within 24 months of launch.
    semantic_family: miki-partnerships-hook-big-sdg17
    article_types:
    - hard_news_spiritual_response
  - id: hook_big_picture_03
    line: Most partnership frameworks treat collaboration as the sum of what each party brings to the table. The light healing tradition holds a different test — what kind of channel opens between the parties that neither could carry alone.
    semantic_family: miki-partnerships-hook-big-channel
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Miki, a Japanese light healing teacher rooted in the Kurama-yama sacred site lineage, has watched young people return from international partnerships carrying invisible weight. They are not asking whether collaboration matters. They are asking how to stay in genuine partnership when the design treats their contribution as supplementary rather than carried.
    semantic_family: miki-partnerships-intro-kurama
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_intro_02
    line: Miki, whose transmission carries the frequencies the ascended masters at Kurama-yama hold, has watched in light healing sessions the specific exhaustion of partnerships designed around deficit rather than completeness. The teaching she offers does not change the institutional asymmetry. It restores the channel through which the smaller partner remembers what they already carry into the room.
    semantic_family: miki-partnerships-intro-completeness
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_intro_03
    line: Miki teaches alongside Ahjan in a partnership that itself demonstrates the principle she teaches — one party creating the conditions for the other's gift to be recognized, without competition for the recognition itself. The students who bring partnership questions to her work are looking for that particular kind of ground.
    semantic_family: miki-partnerships-intro-ahjan
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the joint press release. Your shoulders tightened. You closed the tab. Then you opened it again because the names listed were not changing. LOOP_SEQUENCE: "read the release. shoulders tightened. closed the tab. opened it again."'
    loop_type: deficit_partnership_drag
    body_register: shoulders
    digital_behavior: close-return
    article_types:
    - hard_news_spiritual_response
  - id: youth_somatic_02
    line: 'You opened the partnership invitation. Your throat tightened. You skimmed past it. Then you came back because saying no had its own cost too. LOOP_SEQUENCE: "opened the invitation. throat tightened. skimmed past. came back."'
    loop_type: deficit_partnership_drag
    body_register: throat
    digital_behavior: skim-return
    article_types:
    - hard_news_spiritual_response
  - id: youth_somatic_03
    line: 'You read the new MOU between the two organizations. Your chest tightened. You set the phone down. Then you picked it up because your friend on the smaller side was already in the group chat. LOOP_SEQUENCE: "read the MOU. chest tightened. put the phone down. picked it up again."'
    loop_type: deficit_partnership_drag
    body_register: chest
    digital_behavior: put-down-return
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Miki has seen this exact loop in young people returning from partnership work — the release, the tightening, the look away, and the return because the people on the smaller side were still in it.
    semantic_family: miki-partnerships-witness-loop
    loop_type: deficit_partnership_drag
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: She has watched students enter partnerships expecting to be filled and leave them depleted because the design treated collaboration as the exchange of deficits. The Kurama-yama tradition does not interpret that depletion as a failure of cooperative skill. It names it as a mismatch between the design and the kind of light partnership can actually carry.
    semantic_family: miki-partnerships-witness-depletion
    loop_type: deficit_partnership_drag
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_03
    line: Miki has watched the slower thing — the moment a young partner remembers that completeness was never absent in them, only covered. Once that remembering occurs, the partnership conversation changes shape, even when the institutional terms of the conversation have not.
    semantic_family: miki-partnerships-witness-remembering
    loop_type: deficit_partnership_drag
    article_types:
    - hard_news_spiritual_response
turnaround:
