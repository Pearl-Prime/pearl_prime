    display_name: 5-minute Seed-in-Soil Receiving
    duration: 5 minutes
    announcement_line: Miki teaches a 5-minute Seed-in-Soil Receiving practice for moments when a partnership has started treating contribution as deficit and the smaller partner needs to remember what was already there before the partnership opened. It is in the sidebar, timed and step by step.
    relief_lines:
    - The body stops carrying the partnership's deficit narrative as the truth about the self.
    - A steadier ground returns for the next conversation, the next MOU revision, the next decision about whether to stay in.
    relief_register:
