    - Enough ground returns to choose engagement or refusal on the work's actual terms.
    relief_register:
    - completeness
    - remember
    - terms
    derived_from_frame: original_completeness_partnership
    metadata:
      semantic_family: original_completeness_partnership_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_part_practice_03
    display_name: Kurama-yama Channel Practice
    duration: 7 minutes
    announcement_line: Miki teaches a 7-minute practice rooted in the Kurama-yama
      transmission — for moments before a partnership meeting where both parties need
      to enter from completeness rather than from assigned position. It is in the
      sidebar, timed and step by step.
    relief_lines:
    - The body recognizes the room, the people, and the actual stakes of the meeting.
    - A clearer ground returns for the next agreement, refusal, or honest pause.
    relief_register:
    - channel
    - Kurama-yama
    - threshold
    derived_from_frame: kurama_channel_practice
    metadata:
      semantic_family: kurama_channel_partnership_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_part_practice_04
    display_name: Light-Body Alignment Check
