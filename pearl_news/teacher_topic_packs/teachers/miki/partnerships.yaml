  fit_reason: In the Kurama-yama tradition partnerships are read at the level of
    light-body alignment — the layer beneath shared values where the actual compatibility
    lives. The tradition further holds that some partnerships are pre-incarnation
    arrangements that the soul recognizes before the surface mind can explain.
