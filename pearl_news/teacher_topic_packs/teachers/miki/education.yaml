      LOOP_SEQUENCE: "loaded the lecture. breath shallow. checked the chat. returned."'
    loop_type: portal_field_disorder
    body_register: breath
    digital_behavior: switches tabs
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Miki has seen that loop in students — the task opens, the mind scatters,
      the tab changes, and attention has to reassemble itself inside the same pressure
      field.
    semantic_family: loop-mirror
    loop_type: portal_field_disorder
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: She has watched that sequence — the portal, the break, the switch, the return.
      The body was never invited into the room; the system assumes learning is only
      in the head.
    semantic_family: loop-mirror-alt
    loop_type: portal_field_disorder
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: Hundreds of campuses. Dozens of countries.
    stat_line_2: Students and youth coalitions are organizing campaigns and hosting
      learning environments that honor the whole person — not only the intellect —
      and building peer-led spaces where transmission can happen at the level of presence,
      not only screen.
    semantic_family: institutional-action
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: Education trackers count credentials and completion rates. They do not count
      the capacity to receive learning when the body is included — the capacity to
      consolidate attention when the field is fragmented. That capacity is what the
      next generation needs. Miki's tradition holds that the most profound transmission
      is not only information; it is what the body receives when the whole person
      is invited into the room. Sound and presence create that invitation.
    hidden_capacity: receive learning when the body is included
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: The system measures what the intellect can reproduce. It has no column for
      what made the next moment of real understanding possible — the capacity to let
      the body land so the mind can consolidate. The student who finally understood
      the concept needed it. So does the one who opened the portal, switched tabs,
      and came back. Miki's tradition has been developing that capacity through practices
      that address the whole person, not only the mind.
    hidden_capacity: let the body land so the mind can consolidate
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Miki Sees
    paragraphs:
    - 'In Miki''s tradition, the most profound transmission is not only information
      — it is what the body receives when the whole person is in the room. Education
      systems that deliver content through portals and screens without inviting the
      body often produce students who are technically capable but unable to consolidate
      attention or withstand fragmentation. The tradition asks: what would learning
      look like if the body were included?'
    - 'Light language and sound work not through concepts but through resonance. They
      reach places that words and screens cannot. For young people whose attention
      has been scattered by the structure of the school day and the digital field,
      the tradition offers a counterweight: practices that let the body receive and
      integrate before the next demand arrives.'
    - That reframe matters. The problem is not that students lack discipline. The
      problem is that the system has stripped transmission down to information transfer
      and left the rest of who they are — including the capacity to receive and consolidate
      — outside the door. What feels like a personal fault — me, broken, wrong — is
      often accurate response to conditions no individual can fix alone. Miki's tradition
      gives that capacity a name and a practice.
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Miki Sees
    paragraphs:
    - 'Miki reads education stress through the lens of transmission: the body receives
      before the mind can fully process. When the learning environment is built only
      for the intellect — portals, tabs, deadlines — the body is left to fragment.
      The tradition holds that genuine learning requires the whole person; otherwise
      the system is measuring the smallest part of what a human being can know.'
    - Healing as remembering applies here too. The capacity to focus, to consolidate,
      to stay present was not destroyed; it was never invited. Sound and presence
      create the conditions in which that capacity can return. The tradition does
      not ask students to try harder. It asks the conditions to change so the body
      can land.
    - In that frame, self-blame softens. The disorder is not only in the student,
      and I am not wrong for struggling. It is in the gap between how learning is
      delivered and how human beings actually receive. Miki's tradition offers a practice
      for that gap within a system and institutional structure that was never designed
      for what it demands.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
