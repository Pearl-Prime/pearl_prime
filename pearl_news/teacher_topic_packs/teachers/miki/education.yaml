hook_personal:
  options:
  - id: hook_personal_01
    line: The problem is not only homework. It is the field the homework arrives inside
      — and whether your whole self is allowed to be there.
    semantic_family: personal-pressure
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Education stress is often environmental before it is motivational: the
      day is organized around interruption, pressure, and too little room for attention
      — or the rest of who you are — to consolidate.'
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Miki-san, a teacher of light-language and sound healing, has watched in
      practice sessions students be blamed for forms of attention loss that are largely
      produced by their learning conditions. They are not asking only how to focus
      harder. They are asking how learning can happen at all when the system addresses
      only the intellect and the body is left outside the door.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Miki-san, from the light-language and transmission tradition, has seen in
      practice sessions what happens when young people know their education is measuring
      the smallest part of what they know. They are not asking for easier tests. They
      are asking for a kind of transmission that the body can receive when the mind
      is exhausted by portals and tabs.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
youth_somatic:
