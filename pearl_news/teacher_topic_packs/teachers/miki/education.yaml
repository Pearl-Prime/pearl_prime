diagnostic_frames:
  default_id: relational_rupture
  options:
  - id: relational_rupture
    key_term: harae
    key_term_gloss: purification of actions that damage the web between people, land,
      and spirit
    diagnosis_line: The body is not malfunctioning; it is registering a rupture in
      relationship with its own knowing.
    self_to_system_reframe: What feels like private attention loss is often accurate
      response to a system designed to fragment the mind before the deeper self can
      recognize.
    what_normal_analysis_misses: How the tradition treats education overload as disconnection
      from what the deeper self already knows, not only as a focus problem.
    youth_specific_tie: Young people are being educated in systems that overload information
      while disconnecting them from what they already recognize at the depth of knowing.
    approved_quote_lines:
    - the system measures the smallest part of what you know while asking you to disown
      the rest
    banned_lines:
    - you just need to try harder
