schema_version: 1
teacher_id: miki
topic: climate
active: true

identity:
  display_name: Miki
  attribution_name: Miki-san
  tradition: "Light language, ascended-master transmission, and crystal-bowl healing"
  tradition_short: "light-language healing"
  teacher_setting_options:
    - "sound session"
    - "transmission circle"
  teacher_years: "decades of practice"
  affiliation_safe_line: "has attended the United Spiritual Leaders Forum"
  launch_approved: true

persona:
  id: gen_z_alpha
  age_band: "13-29"
  default_register: "phone-native, high-pressure, institution-skeptical"
  daily_worlds:
    - school
    - phone
    - group chat
    - late-night scrolling
    - part-time work
  tie_to_real_world_struggles:
    - id: read_tighten_close_return
      label: "climate update as body shock then return"
      loop: "reads the number -> body tightens -> closes app -> reopens because truth remains"
      body_markers: ["chest", "throat", "tighten"]
      digital_markers: ["close", "reopen", "scroll", "check again"]

topic_fit:
  fit_level: primary
  fit_reason: "Climate distress maps to relational rupture with land and the need for receptive repair; Miki's tradition addresses what words cannot reach and what the body already knows."
  forbidden_angles:
    - "do not reduce to generic resilience"
    - "do not frame distress as personal weakness"

diagnostic_frames:
  default_id: relational_rupture
  options:
    - id: relational_rupture
      key_term: "harae"
      key_term_gloss: "purification of actions that damage the web between people, land, and spirit"
      diagnosis_line: "The body is not malfunctioning; it is registering a rupture in relationship with what sustains life."
      self_to_system_reframe: "What feels like private overwhelm is often accurate response to collective rupture with the living world."
      what_normal_analysis_misses: "How the tradition treats environmental damage as relational, not only technical."
      youth_specific_tie: "Young people inherit a boundary to maintain — human life and wild nature — with fewer resources than any prior generation."
      approved_quote_lines:
        - "the boundary between human life and wild nature is a moral responsibility to maintain"
      banned_lines:
        - "everything happens for a reason"

hook_personal:
  options:
    - id: hook_personal_01
      line: "You care about the planet. You also feel what each new threshold does to your body before you can decide what to do."
      semantic_family: "care-vs-capacity"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: "A generation can stay informed and still lose the capacity to receive the next number without shutting down. The question is what the body can hold when the news keeps arriving."
      semantic_family: "attention-collapse"
      angle: "future-loss"
      article_types: ["hard_news_spiritual_response"]

teacher_intro:
  options:
    - id: identity_observation_shift_01
      line: "Miki-san, a teacher of light-language and sound healing, has seen in practice sessions what climate news does to young people. They are not asking whether the crisis is real. They are asking how to receive the truth without the body closing down before they can respond."
      semantic_family: "identity_seen_shift"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: identity_observation_shift_02
      line: "Miki-san, from the light-language and crystal-bowl healing tradition, has watched in retreat sessions how climate updates arrive first as moral seriousness and then as somatic overload. Students are not asking for inspiration. They are asking how to stay receptive enough to act when the natural order they were taught to honor keeps breaking on schedule."
      semantic_family: "identity_seen_shift_alt"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response", "commentary"]

youth_somatic:
  options:
    - id: climate_threshold_phone_01
      line: "You read the update in a group chat. Your chest tightened. You closed the app. Then you opened it again because not looking did not make the number less true.\nLOOP_SEQUENCE: \"read the update. chest tightened. closed the app. opened it again.\""
      loop_type: "read-tighten-close-return"
      body_register: "tightening"
      digital_behavior: "close-return"
      article_types: ["hard_news_spiritual_response"]
    - id: climate_threshold_phone_02
      line: "You saw the new threshold before class. Your throat tightened. You put your phone face down. Then you picked it up again because the future does not wait for you to feel ready.\nLOOP_SEQUENCE: \"saw the threshold. throat tightened. put the phone down. picked it up again.\""
      loop_type: "read-tighten-close-return"
      body_register: "tightening"
      digital_behavior: "put-down-return"
      article_types: ["hard_news_spiritual_response"]

teacher_witness:
  options:
    - id: mirrored_loop_01
      line: "Miki has seen this exact loop in young people this year — the reading, the tightening, the closing, the return."
      semantic_family: "loop-mirror"
      loop_type: "read-tighten-close-return"
      article_types: ["hard_news_spiritual_response"]
    - id: mirrored_loop_02
      line: "She has watched that sequence repeat — the number arrives, the body contracts, the phone goes down, and then the mind goes back because reality is still there."
      semantic_family: "loop-mirror-alt"
      loop_type: "read-tighten-close-return"
      article_types: ["hard_news_spiritual_response"]

turnaround:
  options:
    - id: youth_action_climate_01
      stat_line_1: "2,666 cases. 51 jurisdictions."
      stat_line_2: "Students and youth coalitions are training peers, building campaigns, and forcing officials to answer the gap between public targets and lived reality."
      semantic_family: "institutional-action"
      article_types: ["hard_news_spiritual_response"]
    - id: youth_action_climate_02
      stat_line_1: "2,666 cases. 51 jurisdictions."
      stat_line_2: "Young organizers are still filing cases, hosting workshops, and documenting local losses even when national governments keep moving slower than the heat."
      semantic_family: "institutional-action-alt"
      article_types: ["hard_news_spiritual_response"]

bridge:
  options:
    - id: tracker_capacity_01
      line: "2,666 cases. 51 jurisdictions. The tracker measures what young people did. It has no column for what made the next filing possible after the last delay — the capacity to stay receptive enough to act again when the system keeps not responding. The organizer who filed the next case needed it. So does the person who read the update, closed the app, and opened it again. Miki's tradition has been developing that capacity through sound and presence for generations."
      hidden_capacity: "stay receptive enough to act again"
      semantic_family: "tracker-capacity"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: tracker_capacity_02
      line: "Climate trackers count cases, targets, and thresholds. They do not count the inner capacity that lets a young person stay in contact with the truth long enough to act again after another institutional delay. That capacity is what the next organizer needs. It is what the reader who reopened the app needs too. Miki's tradition works with what the body can receive when the mind is overloaded."
      hidden_capacity: "stay in contact with truth without losing capacity to respond"
      semantic_family: "tracker-capacity-alt"
      article_types: ["hard_news_spiritual_response", "commentary"]

teacher_perspective:
  options:
    - id: relational_rupture_01
      header: "What Miki Sees"
      paragraphs:
        - "In Miki's tradition, environmental damage is not only a technical problem. It is a relational rupture — between people, land, and what the tradition calls spirit. The body often registers that rupture before the mind finds words. What makes climate distress so exhausting is not that you are too sensitive. It is that you are accurately perceiving the break in the web that sustains life."
        - "The principle of kannagara no michi — living in accordance with the natural order — does not ask for heroic sacrifice. It asks for daily attentiveness: what you buy, what you discard, how you move through a city. For Gen Z, where recycling norms and public awareness are real, this is already a lived pressure; the tradition gives it spiritual weight."
        - "The shift that matters: what feels like a personal fault — me, broken, wrong — is instead accurate response to a system and institutional structure that keeps producing collective rupture. The body stops calling itself broken when it sees that the real disorder is in the relationship between human choice and the living world."
      semantic_family: "relational-rupture"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: relational_rupture_02
      header: "What Miki Sees"
      paragraphs:
        - "Miki reads climate overload through the lens of harae — purification of actions that damage the web of relationships between people, land, and kami. The tradition does not treat environmental damage as a technical fix; it treats it as relational rupture that requires relational repair."
        - "Young people inheriting declining rural communities are being asked to maintain the boundary between human life and wild nature — satoyama — with fewer resources than any previous generation. That is not a metaphor. It is the condition the body is responding to."
        - "In that frame, self-blame softens. The fault is not mine — not a broken self, not a confused response. The problem is that institutions and policy systems keep tearing the web, and the body knows it. Healing as remembering means: the capacity to respond was always there; it is covered by overload. Sound and presence can help uncover it."
      semantic_family: "relational-rupture-alt"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]

practice:
  default_id: sound_receiving_01
  options:
    - id: sound_receiving_01
      display_name: "5-minute Sound and Light Receiving"
      duration: "5 minutes"
      announcement_line: "Miki teaches a 5-minute Sound and Light Receiving practice for moments when climate information keeps converting attention into shutdown. It is in the sidebar, timed and step by step."
      relief_lines:
        - "The body stops treating every update as proof that action is pointless."
        - "Enough receptivity returns for the next real response."
      relief_register: ["capacity", "receptivity", "act again"]
      derived_from_frame: "relational_rupture"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: sound_receiving_02
      display_name: "5-minute Sound and Light Receiving"
      duration: "5 minutes"
      announcement_line: "Miki teaches a 5-minute practice for the moment when climate numbers turn into somatic overload. Sound reaches what words cannot. It is in the sidebar, short enough to use before class, after scrolling, or before the next meeting."
      relief_lines:
        - "The body stops converting every update into total collapse."
        - "A steadier internal pace returns, and with it the capacity to act again."
      relief_register: ["capacity", "clarity", "act again"]
      derived_from_frame: "relational_rupture"
      article_types: ["hard_news_spiritual_response", "commentary"]

