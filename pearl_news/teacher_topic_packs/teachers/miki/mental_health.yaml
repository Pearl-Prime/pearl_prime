hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Youth mental-health strain is also an order problem: support systems keep
      naming care while failing to create conditions where ordinary life is actually
      protectable.'
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Miki-san, a teacher of light-language and sound healing, has watched in
      practice sessions young people carry overload as if it were a personal defect.
      They are not asking only how to feel better. They are asking what the body can
      receive when the mind has been talked at by therapists, algorithms, and self-help
      content without relief.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Miki-san, from the light-language and crystal-bowl healing tradition, has
      seen in practice sessions what happens when distress is held in the body and
      the intellect is exhausted. Students are not asking for more advice. They are
      asking for a different mode of contact — one that bypasses the overloaded mind
      and speaks to where the distress actually lives.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
