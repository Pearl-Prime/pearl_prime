  - id: youth_somatic_02
    line: 'You saw the headline in a group chat. Your shoulders locked. You closed
      the app. Then you opened it again because the worry did not leave when you looked
      away.

      LOOP_SEQUENCE: "saw the headline. shoulders locked. closed the app. opened again."'
    loop_type: spiral_vs_truth
    body_register: shoulders
    digital_behavior: closed the app
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Miki has seen this exact loop — the warning arrives, the throat closes,
      the phone goes dark, and attention returns because the unresolved truth is still
      waiting.
    semantic_family: loop-mirror
    loop_type: spiral_vs_truth
    article_types:
    - hard_news_spiritual_response
  - id: teacher_witness_02
    line: She has watched that sequence in young people — the read, the tightening,
      the shut, the return. The body holds what the mind cannot yet process.
    semantic_family: loop-mirror-alt
    loop_type: spiral_vs_truth
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: Youth organizers are hosting peer circles, organizing listener training,
      and forcing schools to treat mental health support as infrastructure, not private
      weakness.
    semantic_family: institutional-action
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: '320 campuses. 18 countries. The tracker measures circles, campaigns, and
      peer support. It has no column for what made the next act of honesty possible
      after another week of overload — the capacity to receive what is true in the
      body instead of repeating the public lie that you should already be fine. Miki''s
      tradition works with that capacity through sound and presence: the body receives
      before the mind can interpret.'
    hidden_capacity: receive what is true in the body without being consumed
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: Mental-health trackers count programs and wait times. They do not count
      the inner capacity that lets a young person stay in contact with their own experience
      when the system has failed to hold it. That capacity is what the next honest
      conversation needs. It is what the person who shut the phone and opened it again
      needs too. Miki's tradition holds that healing is remembering — the original
      capacity was always there; it is covered. Sound and light can help uncover it.
    hidden_capacity: stay in contact with own experience under pressure
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Miki Sees
    paragraphs:
    - 'In Miki''s tradition, light language and transmission work not through conceptual
      meaning but through vibrational resonance. They reach the parts of a person
      that words cannot access. For young people who have been talked at by therapists,
      algorithms, and self-help content without relief, the tradition offers a different
      mode of contact: one that bypasses the exhausted intellect and speaks directly
      to the energetic body where distress is actually held.'
    - Healing as remembering means the original self is not gone — it is covered.
      The pressure and overload are not proof of defect; they are what accumulates
      when the body has had to hold what no one could receive. The tradition does
      not ask the mind to figure it out. It offers sound and presence so the body
      can soften enough to remember what it already knows.
    - That reframe is the beginning of relief. The pressure stops being proof that
      something is wrong with you and starts being evidence that the system has been
      asking you to perform steadiness without giving you the conditions to actually
      restore it.
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Miki Sees
    paragraphs:
    - 'Miki reads youth mental-health overload through the lens of transmission: the
      body receives before the mind can interpret. When the mind is saturated by advice,
      diagnosis, and digital noise, the tradition does not add more content. It offers
      a different channel — sound, vibration, presence — that the body can use without
      having to understand.'
    - The tradition distinguishes between what can be fixed by information and what
      can only be met by being received. Young people who have 'failed at mindfulness'
      or therapy often did not fail; they were given the tool without the relational
      container in which the body can actually drop its guard. Sound and light language
      create that container.
    - In that frame, self-blame softens. The problem is not that you are broken. the
      problem is that the system and institutional structure body has been holding
      more than it was designed to hold alone. The practice is not to try harder;
      it is to let the body receive what it could not receive before.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
