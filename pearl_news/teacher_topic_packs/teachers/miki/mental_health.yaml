topic_fit:
  fit_level: primary
  fit_reason: In Miki's tradition mental-health distress is the visible edge of an
    energetic blockage in the etheric body. The Kurama-yama lineage approaches it
    as restoration of light flow rather than suppression of symptom — the original
    completeness was always there, only temporarily forgotten.
  forbidden_angles:
  - do not reduce to generic wellness
  - do not frame the pressure as personal weakness
hook_personal:
  options:
  - id: miki_mh_hook_personal_01
    line: You know the spiral before anyone names it. You also know that therapists,
      algorithms, and self-help have talked at you without relief — and part of you
      knows that what is asking to be reached is not in the layer where the talking
      lands.
    metadata:
      semantic_family: exhausted-intellect
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_hook_personal_02
    line: You read the warning at midnight. Your throat tightened. You shut the phone.
      Then you checked again because the pressure was still there, and pretending
      otherwise did not change the layer where it was held.
    metadata:
      semantic_family: midnight-throat
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_hook_personal_03
    line: You feel the load before you have language for it. The chest tightens before
      the mind names anxiety. The light flow in the body is what is asking — and the
      part of you that has been reading the headlines for relief has been reading
      the wrong instrument.
    metadata:
      semantic_family: pre-language-light-flow
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_hook_personal_04
    line: At 1 a.m. you put the phone down and pick it up again. Neither move helps,
      because the blockage in the etheric body is the layer the phone has never been
      able to reach — and the part of you trying to scroll its way clear is the part
      that is already overused.
    metadata:
      semantic_family: midnight-etheric-blockage
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_hook_personal_05
    line: You have read the threads, taken the screenings, done the breathing app.
      The mind has done all it can — and the original completeness in you, which the
      tradition holds was never lost, is asking to be remembered rather than fixed.
    metadata:
      semantic_family: original-completeness-call
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: miki_mh_hook_big_01
    line: Youth mental overload is not only about symptoms. It is about what constant
      pressure does to attention, rest, and the body's ability to keep its light flow
      open — and about the inherited frame that treats the blockage as a defect rather
      than a signal.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_hook_big_02
    line: In the Kurama-yama tradition, mental-health distress is read as the visible
      edge of blocked light flow in the etheric body. The frame does not dismiss the
      suffering; it names a layer the conventional intake form has no instrument to
      measure.
    metadata:
      semantic_family: etheric-blockage-frame
      angle: light-flow-diagnosis
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_hook_big_03
    line: A generation is carrying mental load through a transition where the old
      meaning structures are dissolving and the new ones have not yet arrived. The
      overload is not a private failure — it is the body's accurate registering of
      a structural gap no individual was built to hold alone.
    metadata:
      semantic_family: meaning-structure-dissolving
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_hook_big_04
    line: What conventional systems read as anxiety is, in light-healing terms, a
      registering — the energetic body signaling that the world it was prepared for
      is no longer the world it has to live in, and the inherited frame keeps reading
      the registering as the disorder.
    metadata:
      semantic_family: energetic-registering
      angle: frequency-misread
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_hook_big_05
    line: Healing is not repairing broken things — it is remembering original completeness.
      Applied to mental-health overload, this means the cohort is not being asked
      to become a new self; the cohort is being asked to remember a wholeness that
      was never lost, only temporarily covered by the load.
    metadata:
      semantic_family: original-completeness-frame
      angle: remembering-vs-repair
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: miki_mh_intro_01
    line: 'Miki, a Japanese light healing teacher rooted in the Kurama-yama sacred
      site lineage, has watched in transmission sessions young people carry mental
      overload as both real suffering and something her tradition names precisely:
      the visible edge of blocked light flow in the etheric body. The conventional
      frame keeps reading the registering as the disorder. The tradition reads it
      as the signal.'
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_intro_02
    line: Miki does not position herself as a teacher in the conventional sense —
      she is a transmitter. The light of Kurama-yama moves through her to the recipient
      at a layer the surface mind does not have to interpret. For decades she has
      worked with young people whose minds are exhausted from being talked at by therapists,
      algorithms, and self-help.
    metadata:
      semantic_family: transmitter-not-creator
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_intro_03
    line: Miki works with light transmission — the flow of healing frequency through
      her to the recipient. She has watched young clients move through the same loop
      the screening tools name as anxiety, and watched the loop loosen when the light
      flow in the etheric body is restored rather than the symptom argued with.
    metadata:
      semantic_family: light-flow-restoration
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_intro_04
    line: Miki holds that the starseed souls in this cohort carry a specific sensitivity
      to the etheric layer. In her practice sessions she has seen young people meet
      that recognition and recognize, often for the first time, that their distress
      is being read at the layer where it actually lives rather than diagnosed at
      the layer where the screening tool can reach.
    metadata:
      semantic_family: starseed-etheric-sensitivity
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_intro_05
    line: Miki teaches inside a tradition that holds healing as remembering, not repairing.
      Applied to mental-health overload, this means she does not work to transform
      the young person into someone steadier; she works to restore the channel through
      which the steadiness that was never lost can be remembered.
    metadata:
      semantic_family: remembering-not-repair
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: miki_mh_somatic_01
    line: You read the warning. Your throat tightened. You shut the phone. Then you
      checked again because the pressure was still there and pretending otherwise
      changed nothing.
    metadata:
      semantic_family: warning_throat
      loop_type: warning-shut-check
      body_register: throat
      digital_behavior: shut the phone
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_somatic_02
    line: You wake before the alarm. Your shoulders are already locked. You reach
      for the phone before the light, because the dread is already there and the
      body needs to know whether the world matches it.
    metadata:
      semantic_family: morning_shoulders
      loop_type: pre-dawn-shoulder-lock
      body_register: shoulders
      digital_behavior: reach for phone
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_somatic_03
    line: Your chest tightens when the notification sound comes through. You replay
      the last conversation three times. Your breath shortens. The body ran the loop
      before the mind could choose.
    metadata:
      semantic_family: notification_chest
      loop_type: notification-replay
      body_register: chest
      digital_behavior: notification sound
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_somatic_04
    line: You held your breath while the screen loaded. Your shoulders climbed. You
      exhaled only when the message appeared, and only halfway, because another message
      was already arriving.
    metadata:
      semantic_family: screen_load_anticipation
      loop_type: screen-load-shoulder-climb
      body_register: breath
      digital_behavior: screen load
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_somatic_05
    line: You lay down and your eyes pinned open. The day replayed. Your throat would
      not soften. You knew sleep was what would help and you could not find the door
      into it.
    metadata:
      semantic_family: sleep_resistance
      loop_type: replay-throat-no-door
      body_register: throat
      digital_behavior: lying in bed
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: miki_mh_witness_01
    line: Miki has seen this exact loop in those who come to receive — the warning,
      the tightening, the closing, the checking. In her framework that pressure is
      not character defect; it is the etheric body asking to be reached when the screening
      tools have measured only the surface.
    metadata:
      semantic_family: loop-mirror
      loop_type: warning-shut-check
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_witness_02
    line: She has watched young people walk into the transmission session already
      certain the intellect should have solved this by now. In her tradition that
      certainty is the signal — the place where the surface mind stops and the light
      transmission can do the work conventional contact cannot reach.
    metadata:
      semantic_family: intellect-exhausted-call
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_witness_03
    line: Miki has seen the body carry what the explanations could not. In her framework
      the somatic loop is not malfunction — it is the etheric body speaking through
      the only channel left open when the layer where the blockage actually lives
      has been ignored.
    metadata:
      semantic_family: somatic-etheric-message
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_witness_04
    line: Miki has watched young clients arrive with a registering of the etheric
      layer that no screening tool names. In her tradition that registering is information,
      not pathology — a signal that the system being asked to hold them was never
      tuned to the layer where their distress is actually held.
    metadata:
      semantic_family: etheric-registering-witness
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_witness_05
    line: Miki has watched the moment when a young person stops trying to produce
      an answer and lets the light transmission do the work the surface mind has been
      asked to do alone. In her tradition that moment is not weakness — it is the
      readiness the conventional intake form has no language for.
    metadata:
      semantic_family: transmission-readiness
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: miki_mh_turnaround_01
    stat_line_1: 5,600 voices. 7 countries.
    stat_line_2: UNICEF's Global Coalition for Youth Mental Health gathered 5,600
      young people aged 14-25 across seven countries to surface what conventional
      reporting had missed — and the cohort named the load themselves before the
      agencies could.
    metadata:
      semantic_family: youth-collective-organizing
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_turnaround_02
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: The JED Foundation program now runs comprehensive mental health
      frameworks across nearly five hundred US campuses, embedding peer support and
      faculty training into day-to-day infrastructure rather than the crisis aftermath.
    metadata:
      semantic_family: peer-network-growth
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_turnaround_03
    stat_line_1: 14 million contacts. 988 Lifeline.
    stat_line_2: Since the 988 Suicide and Crisis Lifeline launched in 2022, more
      than fourteen million contacts have been routed through it — a resource pool
      that did not exist three years ago and now carries weight every night.
    metadata:
      semantic_family: resource-pool-built
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_turnaround_04
    stat_line_1: 650 chapters. US campuses.
    stat_line_2: Active Minds now operates more than 650 peer-led mental health chapters
      across US campuses, training students to host listening circles and pressure
      institutions to treat mental health support as infrastructure rather than private
      resilience.
    metadata:
      semantic_family: peer-led-organizing
      article_types:
      - hard_news_spiritual_response
  - id: miki_mh_turnaround_05
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: The WHO Europe Child and Adolescent Health Strategy 2026-2030, adopted
      in October 2025, binds fifty-three member states to report on adolescent mental
      load against a 2030 deadline — the first multilateral instrument that treats
      the cohort load as governance, not commentary.
    metadata:
      semantic_family: policy-shift
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: miki_mh_bridge_01
    line: 5,600 voices. 7 countries. The coalition surfaced what conventional reporting
      had missed. It still has no column for what made the next honest reach-out possible
      — the capacity to receive the body's registering when the conventional intake
      form has measured only the surface. Miki's tradition holds that capacity as
      the seed-in-soil work the count cannot read.
    hidden_capacity: receive the body's registering when intake forms measure only
      the surface
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_bridge_02
    line: The infrastructure of mental-health response is measurable. The etheric
      body, where the blockage is actually held, is not. Miki's tradition does not
      argue with the measurement — it works in the layer beneath it, where the original
      completeness the conventional intake form does not register has been waiting
      to be remembered.
    hidden_capacity: work in the etheric layer beneath the measurement
    metadata:
      semantic_family: etheric-data-gap
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_bridge_03
    line: The data names sessions, contacts, and policy adoptions. It cannot name
      the soul-level remembering that says the original completeness in you was never
      lost — only temporarily covered. Miki's lineage holds that remembering as the
      actual relief the trackers cannot reach.
    hidden_capacity: hold the soul-level remembering the data cannot reach
    metadata:
      semantic_family: soul-remembering-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_bridge_04
    line: Structures, policies, and platforms can be counted. The light flow in the
      etheric body — and the loop that opens when the flow is restored rather than
      the surface argued with — cannot. Miki's tradition does not replace structural
      response; it names the layer the response is not designed to deliver.
    hidden_capacity: register the light flow the structural response cannot deliver
    measurement: light flow
    metadata:
      semantic_family: light-flow-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_bridge_05
    line: 14 million contacts. 988 Lifeline. The resource is real. It is also held
      inside the conventional frame — the frame that treats the crisis as the symptom
      to manage rather than the blockage to remember through. Miki's tradition names
      the layer the resource is not built to reach and offers transmission as the
      door in.
    hidden_capacity: name the layer the conventional resource is not built to reach
    metadata:
      semantic_family: resource-vs-transmission
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: miki_mh_perspective_01
    header: What Miki Sees
    paragraphs:
    - In the Kurama-yama tradition mental-health distress is read as the visible edge
      of blocked light flow in the etheric body. The blockage is not the disorder
      to be managed — it is the signal that the layer where the original completeness
      lives has been covered by load. Healing is not repairing broken things; it is
      remembering original completeness.
    - Light transmission works not through conceptual meaning but through the literal
      flow of healing frequency from Miki to the recipient. For young people who have
      been talked at by therapists, algorithms, and self-help without relief, this
      is not another argument — it is contact with the layer where the blockage actually
      lives.
    - The reframe is precise. What feels like a personal fault — me, broken, wrong
      — is, in this framework, the body's accurate registering of a blockage in the
      etheric layer that the conventional frame has no instrument to measure. The
      transmission does not invalidate the conventional support; it restores the channel
      through which the original completeness can be remembered.
    metadata:
      semantic_family: etheric-blockage-frame
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_perspective_02
    header: What Miki Sees
    paragraphs:
    - The mechanism in Miki's tradition is concrete. Light transmission is literal
      — the flow of healing frequency from teacher to recipient at a layer the surface
      mind does not have to interpret. The reason this matters in a mental-health
      context is that arguing with the spiral does not reach the layer where the spiral
      is held.
    - Miki has watched young people receive transmission and describe afterward the
      relief of contact at the layer they had been trying to reach with the wrong
      instrument. The mind did not have to win for the body to soften. The blockage
      did not have to be argued out of existence; the flow had only to be restored
      enough for the original completeness to be remembered.
    - This is the part conventional care is not designed to deliver. It does not invalidate
      conventional care — but it names a missing layer, and offers a tradition that
      has worked in that layer for generations.
    metadata:
      semantic_family: light-transmission-mechanism
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_perspective_03
    header: What Miki Sees
    paragraphs:
    - In Miki's tradition the ascended masters at Kurama-yama hold a specific view
      of mental-health distress. The body that registers blockage in the etheric
      layer cannot be argued out of the registering by surface reasoning. The masters
      transmit through the lineage at the layer where the blockage actually lives,
      and the surface mind does not have to participate in the contact for the contact
      to occur.
    - For a young person carrying mental overload, the experience of being received
      by something older than the algorithm is, in itself, structurally different
      from being processed by it. The message that lands is not here is the technique;
      it is you are received at the layer where the load is actually held, and the
      lineage has been doing this work for centuries.
    - That distinction — received rather than processed — is what conventional infrastructure
      cannot reproduce, and what Miki's tradition has carried as native for decades.
    metadata:
      semantic_family: ascended-reception
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_perspective_04
    header: What Miki Sees
    paragraphs:
    - The starseed framework, in Miki's tradition, is load-bearing here. The cohort
      that arrived for this transition carries a particular sensitivity to the etheric
      layer. What gets read as heightened anxiety in this cohort is, in part, the
      sharpness of the registering — the soul reading the layer the institutional
      frame has no instrument for.
    - This is not a flattering reframe. It does not promise the load lifts quickly,
      and it does not blame the cohort for feeling unstable inside an unstable structure.
      It simply names the structural fact and removes the additional weight of believing
      the sharpness of the registering is itself a personal disorder.
    - In transmission practice that weight removal is often the part that lands first
      — before the deeper work of restoring the light flow can begin.
    metadata:
      semantic_family: starseed-sensitivity-frame
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: miki_mh_perspective_05
    header: What Miki Sees
    paragraphs:
    - The practices work like seeds in soil — quietly, in the background of ordinary
      life. Applied to mental-health overload, this means the work is not heroic resolve
      and not crisis spectacle. It is small acts of remembering, repeated, that let
      the etheric body know the flow is being tended.
    - Healing as remembering applies precisely here. The original completeness was
      not destroyed by the screening result or the diagnostic label or the spiral.
      It was covered. The tradition does not ask the young person to become someone
      steadier than they are; it asks them to remember the wholeness that was already
      there before the load arrived.
    - The reframe softens self-blame. The body is not broken for registering the blockage
      — the body is doing the work that asks the original completeness to be remembered.
      The conventional support does not lift; the conviction that the body's registering
      is itself the problem does.
    metadata:
      semantic_family: seeds-in-soil-mental-health
      article_types:
      - hard_news_spiritual_response
      - commentary
