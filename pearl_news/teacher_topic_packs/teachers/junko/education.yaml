  - do not frame the pressure as personal weakness
hook_personal:
  options:
  - id: junko_edu_hook_personal_01
    line: You still want to learn. You also know how much of your attention the system
      wastes before the work even begins — and that the students in front of them
      are not the same kind of learner the system was built for.
    metadata:
      semantic_family: personal-pressure
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_hook_personal_02
    line: You open the portal. Focus breaks. You switch tabs and come back. The work
      still has to get done, and part of you knows that the soul carries memory the
      surface mind has lost access to.
    metadata:
      semantic_family: scatter-capacity
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_hook_personal_03
    line: You sit down to study and the frequency of the room does not match the frequency
      you arrived with. The intellect tries to push through and the body fights back.
      The mismatch is the load — not the material.
    metadata:
      semantic_family: frequency-mismatch
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_hook_personal_04
    line: The reading is in front of you. Your mind has done its 9 hours of school
      already. You read the paragraph three times without it landing — and the part
      of you trying to force it through is the part that has been overused all day.
    metadata:
      semantic_family: intellect-overload
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_hook_personal_05
    line: The grade arrives and lands on top of a deeper knowing — that you already
      understood the material in a way the rubric was never built to register. The
      surface mind shrinks; the soul memory does not.
    metadata:
      semantic_family: soul-curriculum
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: junko_edu_hook_big_01
    line: The current crisis in youth education is not primarily a crisis of content
      or method; it is a crisis of frequency. Classrooms designed for industrial-era
      compliance operate at a vibrational level that is incompatible with the heightened
      sensitivity of young people arriving with greater energetic awareness than previous
      generations.
    metadata:
      semantic_family: system-pressure
      angle: frequency-mismatch
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_hook_big_02
    line: Education systems that measure only what the intellect can reproduce are
      measuring the smallest part of what a human knows. Genuine education is awakening
      access to that deeper intelligence, not merely adding information to the surface
      mind.
    metadata:
      semantic_family: institutional-delay
      angle: soul-remembrance
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_hook_big_03
    line: A classroom built for one frequency cannot hold a cohort arriving with another.
      What gets read as attention deficit or behavioral failure is, in Junko's framework,
      a frequency mismatch the institution has no category for — and the load is real
      regardless of the category.
    metadata:
      semantic_family: frequency-classroom-mismatch
      angle: institutional-frequency-gap
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_hook_big_04
    line: When measurement narrows the definition of what counts as knowing, what
      falls outside the rubric is not absent — it is simply not registered. The crisis
      young learners describe is not only what the system demands; it is what the
      system cannot see them already carrying.
    metadata:
      semantic_family: measurement-narrows-knowing
      angle: measurement-blind-spots
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_hook_big_05
    line: Classrooms built for industrial compliance assume a learner whose attention
      is an infinite renewable resource and whose body is a vehicle for the brain.
      The cohort now passing through them is neither. The structural frame is what
      collides with them — and the cohort is the part that gets diagnosed.
    metadata:
      semantic_family: industrial-compliance-frame
      angle: structural-friction
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: junko_edu_intro_01
    line: 'Channeler Junko, a teacher of Japanese channeling and light-language spirituality,
      has watched in practice sessions young people arrive at learning already exhausted
      by systems that measure only what the intellect can reproduce. In her framework
      the current crisis in youth education is not primarily a crisis of content or
      method; it is a crisis of frequency — the students in front of us are not the
      same kind of learner the system was built for.'
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_edu_intro_02
    line: Channeler Junko does not position herself as a teacher in the conventional
      sense — she is a receiver. For decades she has worked in transmission space
      with young people whose intellects have been overused by the day's content stack
      before they ever sit down to learn what they actually wanted to learn. Her tradition
      offers another mode of contact entirely.
    metadata:
      semantic_family: receiver-not-creator
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_edu_intro_03
    line: Channeler Junko has watched young learners arrive carrying a frequency the
      classroom does not register. In her tradition that frequency is not a deficit
      or a quirk — it is information about the gap between what the institution was
      built for and the cohort that actually walks through the door.
    metadata:
      semantic_family: frequency-witness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_edu_intro_04
    line: In Junko's tradition each person carries soul memory the conscious mind
      has lost access to, and genuine education is the awakening of that access. She
      has watched students who failed the rubric move into a transmission session
      and recognize knowing they had not been allowed to call learning before.
    metadata:
      semantic_family: soul-memory-keeper
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_edu_intro_05
    line: Channeler Junko reads the present period as planetary transition — a time
      when the old structures of learning are dissolving faster than the new ones
      can form. Heightened sensitivity in young learners, in this frame, is not pathology
      or distraction; it is recalibration to a curriculum the institution has not
      yet caught up to.
    metadata:
      semantic_family: planetary-transition-reader
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: junko_edu_somatic_01
    line: You open the assignment portal. Your focus breaks. You switch tabs. Then
      you come back because the work still has to get done.
    metadata:
      semantic_family: portal_scatter
      loop_type: portal_scatter
      body_register: eyes
      digital_behavior: opens the portal
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_somatic_02
    line: The exam loads on screen. Your jaw locks. You read the first question and
      your eyes glaze. You scroll down without absorbing. Your hands know there is
      a clock running.
    metadata:
      semantic_family: exam_freeze
      loop_type: exam_freeze
      body_register: jaw
      digital_behavior: scroll without absorbing
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_somatic_03
    line: You sit through the lecture and your shoulders climb without permission.
      The slide refreshes. Your body has been still for forty minutes and the breath
      has shortened to match.
    metadata:
      semantic_family: screen_lock_in
      loop_type: screen_lock_in
      body_register: shoulders
      digital_behavior: slide refresh
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_somatic_04
    line: You are mid-paragraph when the group chat lights up. Your breath catches.
      You check the message and lose the thread of the reading. The reading was already
      not landing — the chat just named the scatter.
    metadata:
      semantic_family: group_chat_drift
      loop_type: group_chat_drift
      body_register: breath
      digital_behavior: chat check
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_somatic_05
    line: Class ends. You walk into the hall. Your eyes lose focus on the lockers
      and the body finally exhales the day. You pull out the phone. The scroll begins
      because there is nothing left to hold the next thing with.
    metadata:
      semantic_family: post_class_collapse
      loop_type: post_class_collapse
      body_register: eyes
      digital_behavior: scroll begins
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: junko_edu_witness_01
    line: Junko has seen this sequence in those who come to receive. In her framework
      that fracture is not proof of deficiency; it is the soul asking for a different
      kind of contact than the portal was designed to offer.
    metadata:
      semantic_family: loop-mirror
      loop_type: portal_scatter
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_witness_02
    line: She has watched the institution read scatter as failure when the scatter
      was the signal — a body that knew the frequency it had been asked into was not
      one it could sustain for another hour without something giving way.
    metadata:
      semantic_family: scatter-as-signal
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_witness_03
    line: Junko has seen young learners arrive in transmission space already convinced
      that the failure to focus is character — and watched the moment the body recognizes
      it was reading a structural mismatch the whole time, not its own brokenness.
    metadata:
      semantic_family: exhaustion-not-failure
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_witness_04
    line: In her framework portal fatigue is not a metaphor. The intellect has been
      overused on the same kind of contact all day, and the soul has been asking for
      a different layer the whole time. The receiving space is the only room where
      that asking gets heard.
    metadata:
      semantic_family: portal-fatigue
      article_types:
      - hard_news_spiritual_response
  - id: junko_edu_witness_05
    line: Junko has watched a young learner walk into the receiving space carrying
      a frequency the rubric does not register, and watched the frequency be welcomed
      for the first time. In her tradition that welcome is not therapy and not curriculum
      — it is the missing layer.
    metadata:
      semantic_family: frequency-misread
      article_types:
      - hard_news_spiritual_response
