topic_fit:
  fit_level: primary
  fit_reason: The soul carries ecological memory the conscious mind has lost access
    to. Much of what young people experience as climate anxiety is the friction between
    surface reassurance and what the deeper self already knows about planetary rupture.
  forbidden_angles:
  - do not reduce to generic eco-grief
  - do not frame the body's response as personal weakness
hook_personal:
  options:
  - id: junko_clim_hook_personal_01
    line: You read the new climate threshold and felt something beneath your thinking
      shift. Your conscious mind wanted to problem-solve. Something deeper was already
      grieving what was already gone.
    metadata:
      semantic_family: soul-intellect-split
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_hook_personal_02
    line: You saw the forecast and your whole body tightened before your mind could
      catch up. The deeper part of you already knew what the numbers meant. The part
      that thinks is still trying to keep up.
    metadata:
      semantic_family: soul-knowing-first
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_hook_personal_03
    line: A photograph of a place you have never been arrives in your feed and your
      chest registers it before the caption tells you why. The soul was already there
      — was always already there — and the institution that holds you has no language
      for that kind of remembering.
    metadata:
      semantic_family: ecological-recall
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_hook_personal_04
    line: You hear the new figure and something underneath you mourns. You did not
      decide to mourn. You are not even sure what you are mourning. The body knows.
      The grief was already moving before your name for it arrived.
    metadata:
      semantic_family: planetary-grief
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_hook_personal_05
    line: The weather has shifted on a frequency the body registers before any forecast
      can explain. You feel it in the wrong-warmth of a season that used to be reliable.
      The soul is responding to a planetary recalibration the inherited language has
      not caught up to.
    metadata:
      semantic_family: frequency-shift-witness
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: junko_clim_hook_big_01
    line: Young people sense climate rupture at a level deeper than their conscious
      understanding. Their bodies are responding to ecological signals that the intellect
      has not yet processed. This is not anxiety. This is the soul holding what the
      thinking mind cannot yet carry.
    metadata:
      semantic_family: soul-ecological-witness
      angle: soul-first-knowing
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_hook_big_02
    line: The friction between what institutions keep saying about climate and what
      the deeper self already knows creates a pressure that closes down the body.
      Young people are not overreacting. They are under-resourced in how to receive
      what their soul is already trying to tell them.
    metadata:
      semantic_family: soul-resource-gap
      angle: reception-capacity
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_hook_big_03
    line: Planetary transition, in Junko's framework, is the literal description of
      what the cohort is inside of — a period in which old ecological structures dissolve
      faster than the inherited language can describe. The climate response many young
      people carry is, in part, the cost of being awake inside that transition.
    metadata:
      semantic_family: planetary-transition-frame
      angle: planetary-context
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_hook_big_04
    line: The collective field has shifted faster than the institutions designed to
      hold it. What gets read as climate anxiety is, in part, the visible edge of
      a frequency shift the inherited frameworks have no category for, and that the
      cohort registers first because its body has not yet been numbed to the signal.
    metadata:
      semantic_family: collective-frequency-shift
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_hook_big_05
    line: Ancestral knowing — the long memory held in the human nervous system about
      how the land has changed and what it asks — has not been honored by industrial
      frameworks. The young, in Junko's tradition, are carrying part of that knowing
      forward through the body when the institutions cannot hold it.
    metadata:
      semantic_family: ancestral-knowing
      angle: long-memory
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: junko_clim_intro_01
    line: 'Channeler Junko, a teacher of Japanese channeling and light-language spirituality,
      has watched in retreat sessions what climate distress does to young people — both
      real suffering and something her tradition names precisely: the soul''s response
      to ecological rupture that the conscious mind has not yet processed. In Junko''s
      framework, the deeper self carries ecological knowing the intellect cannot access.
      Light language reaches the parts of a person where this knowing is already held.'
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_intro_02
    line: Channeler Junko does not position herself as a teacher in the conventional
      sense — she is a receiver. For decades she has worked in transmission space
      with young people whose bodies have been carrying ecological knowing that the
      surrounding institutions refuse to acknowledge. Her tradition does not ask them
      to calm down; it offers them a way to listen.
    metadata:
      semantic_family: receiver-witness-frame
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_intro_03
    line: Channeler Junko has watched young people arrive carrying a frequency the
      climate-policy room does not register. In her tradition that frequency is not
      anxiety to be soothed — it is the soul holding the ecological truth the room
      has not yet metabolized.
    metadata:
      semantic_family: ecological-soul-keeper
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_intro_04
    line: Channeler Junko receives from what her tradition calls the cosmic council
      — higher-dimensional spiritual guides whose messages arrive as gifts rather
      than instructions. On climate, the council's guidance is not about optimism
      or despair; it is about the layer of reality the institutional climate conversation
      has been operating without.
    metadata:
      semantic_family: cosmic-council-context
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_intro_05
    line: Channeler Junko reads the present period as planetary transition — a literal
      structural shift in the collective field that the institutional climate response
      has not yet caught up to. The heightened ecological sensitivity in young people,
      in this frame, is not pathology; it is recalibration to what the planet is now
      becoming.
    metadata:
      semantic_family: planetary-recalibration-reader
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: junko_clim_somatic_01
    line: 'You read the new threshold in your feed. Your body tightened before your
      mind caught up to the number. You closed the app. Then you came back because
      the part of you that already knew was still running. LOOP_SEQUENCE: "read the
      threshold. body tightened. closed the app. came back."'
    metadata:
      semantic_family: read-tighten-close-return
      loop_type: read-tighten-close-return
      body_register: tightening
      digital_behavior: close-return
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_somatic_02
    line: 'You saw the forecast before bed and felt something shift in your chest
      before the information even fully landed. You put the phone down. Then the
      knowing that was already moving underneath kept pulling you back. LOOP_SEQUENCE:
      "saw the forecast. chest shifted. put the phone down. came back."'
    metadata:
      semantic_family: forecast-night-grip
      loop_type: forecast-night-grip
      body_register: chest
      digital_behavior: put-down-return
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_somatic_03
    line: 'The wildfire smoke picture loaded and your jaw locked before the headline
      could explain. You scrolled past, then back. Your body had already absorbed
      the air you would not breathe. LOOP_SEQUENCE: "wildfire image. jaw locked. scrolled
      past. scrolled back."'
    metadata:
      semantic_family: wildfire-news-loop
      loop_type: wildfire-news-loop
      body_register: jaw
      digital_behavior: scroll-past-scroll-back
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_somatic_04
    line: 'The flood photo landed in your feed and your face did nothing. Your stomach
      did everything. You did not know how to feel because the body was already feeling
      it. LOOP_SEQUENCE: "flood photo. face still. stomach moved. no language yet."'
    metadata:
      semantic_family: flood-photo-numb
      loop_type: flood-photo-numb
      body_register: stomach
      digital_behavior: passive-scroll
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_somatic_05
    line: 'The temperature spike notification arrived and your shoulders rose without
      permission. You did not open the article. You did not need to. The body knew
      what number was on the screen. LOOP_SEQUENCE: "temperature alert. shoulders
      rose. did not open. body knew."'
    metadata:
      semantic_family: temperature-spike-dread
      loop_type: temperature-spike-dread
      body_register: shoulders
      digital_behavior: did-not-open
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: junko_clim_witness_01
    line: Junko has seen this exact loop in those who come to receive. The body contracts,
      the mind tries to manage, the screen goes dark, and then the soul's knowing
      pulls awareness back because the ecological truth is already held beneath the
      thinking.
    metadata:
      semantic_family: loop-mirror
      loop_type: read-tighten-close-return
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_witness_02
    line: She has watched young people walk into the receiving space already carrying
      the ecological grief the institution refuses to name. In her tradition that
      grief is not pathology — it is the soul's accurate response to a planet whose
      condition the language around the cohort keeps minimizing.
    metadata:
      semantic_family: soul-asking-first
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_witness_03
    line: Junko has watched the moment when a young person stops trying to argue the
      institutional climate-language into matching what the body has been reporting,
      and starts trusting the body instead. In her tradition that moment is not denial
      of the data — it is the layer beneath the data being permitted to speak.
    metadata:
      semantic_family: institution-denial-recognition
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_witness_04
    line: In her framework the climate-news loop is not failure of coping. It is the
      body holding the ecological truth the surrounding language has not metabolized,
      and asking — through the only signal still open — for a different kind of contact
      with what is actually happening to the planet.
    metadata:
      semantic_family: ecological-truth-held
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_witness_05
    line: Junko has watched a young person arrive in the receiving space already
      ready — already done arguing, already done minimizing, already done waiting
      for the institutional language to catch up. In her tradition that readiness
      is what conventional climate communication does not know how to meet.
    metadata:
      semantic_family: reception-readiness-climate
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: junko_clim_turnaround_01
    stat_line_1: 2,666 climate cases. 51 jurisdictions.
    stat_line_2: Young organizers are filing cases, hosting workshops, and training
      their peers to hold the ecological knowing that adults denied — even when courts
      and governments move too slowly.
    metadata:
      semantic_family: institutional-action
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_turnaround_02
    stat_line_1: 195 parties. UNFCCC.
    stat_line_2: The UN Framework Convention on Climate Change now binds 195 parties
      under the Paris Agreement, and youth-constituency YOUNGO has formal observer
      status — the floor on which the cohort's policy work now stands.
    metadata:
      semantic_family: multilateral-policy
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_turnaround_03
    stat_line_1: 400+ hubs. Sunrise Movement.
    stat_line_2: The Sunrise Movement now organizes more than 400 youth-led hubs
      across the United States, pushing Green New Deal policy and training young people
      who arrived in climate work already carrying the ecological grief the cohort
      named first.
    metadata:
      semantic_family: youth-organizing-climate
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_turnaround_04
    stat_line_1: 50,000 trained leaders. Climate Reality.
    stat_line_2: The Climate Reality Project, founded by Al Gore, has now trained
      more than 50,000 leaders across over 170 countries — a distributed cohort with
      shared language for climate response in the rooms the institutional response
      has not yet entered.
    metadata:
      semantic_family: distributed-cohort-growth
      article_types:
      - hard_news_spiritual_response
  - id: junko_clim_turnaround_05
    stat_line_1: $300 billion. COP loss-and-damage.
    stat_line_2: After decades of pressure from front-line and youth delegations,
      the multilateral climate process now formally tracks a loss-and-damage commitment
      framework with a target floor at $300 billion annually by 2035 — the first
      multilateral climate instrument that recognizes what the cohort named first.
    metadata:
      semantic_family: loss-and-damage-recognition
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: junko_clim_bridge_01
    line: 2,666 climate cases. 51 jurisdictions. The tracker measures what young people
      built. It has no column for what made the next filing possible after the last
      institutional delay — the capacity to stay receptive to what the soul already
      knows even when the conscious mind is overwhelmed. That receptivity is what
      lets a climate organizer file the next case from alignment instead of desperation.
      Junko's tradition calls it receiving practice, and it reaches the part of a
      person where ecological knowing is already held.
    hidden_capacity: stay receptive to soul knowing when intellect is overwhelmed
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_bridge_02
    line: Climate trackers count cases, targets, and megawatts. They do not count
      the capacity to receive what the deeper self already knows about ecological
      rupture — the knowing that exists beneath analysis and can guide action even
      when the conscious mind is running in circles. Junko's tradition works directly
      with that intelligence.
    hidden_capacity: receive soul knowing as guidance for action
    metadata:
      semantic_family: soul-knowing-gap
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_bridge_03
    line: Data captures emissions, ratifications, and adaptations. It does not capture
      the vibrational layer at which the planet is already communicating with the
      cohort whose body has not yet been numbed. In Junko's framework that vibrational
      layer is part of what the climate response must include if it intends to actually
      reach the cohort it claims to address.
    hidden_capacity: include the vibrational layer in the climate response
    metadata:
      semantic_family: vibrational-data-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_bridge_04
    line: Climate metrics are countable. The ecological knowing the cohort arrived
      carrying is not. Junko's tradition does not replace the metric — it names the
      layer beneath, where the planet has been communicating with bodies the inherited
      language refused to consult.
    hidden_capacity: keep ecological knowing accessible alongside the metric
    metadata:
      semantic_family: ecological-vs-numerical
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_bridge_05
    line: Structures, treaties, and pledges can be measured. The planetary field beneath
      them cannot. Junko's tradition does not argue with the structural climate work
      — it names the layer the structural climate work is not designed to reach and
      offers reception as the door in.
    hidden_capacity: name the layer climate structures cannot reach
    metadata:
      semantic_family: planetary-vs-measurable
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: junko_clim_perspective_01
    header: What Junko Sees
    paragraphs:
    - The soul carries memory the conscious mind has lost access to. Much of what
      young people experience as climate anxiety is not psychological disorder. It
      is the friction between surface reassurance and what the deeper self already
      knows. The reframe is simple — your body is not broken. Your soul is holding
      what needs to be held.
    - Light language works through vibrational resonance rather than conceptual meaning.
      For young people whose intellect has been talked at without relief, the tradition
      offers direct contact with the part of them where ecological knowing already
      lives. Opening that channel changes everything about how the next decision is
      made.
    - Planetary transition means heightened sensitivity in young people is not pathology
      but recalibration. What feels like a fault in me — broken, confused, wrong — is
      instead the soul accurately responding to a system and institutional structure
      that refuses to match its words with action. The answer is reception — learning
      to listen to what the deeper self is already saying.
    metadata:
      semantic_family: soul_climate_reframe
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_perspective_02
    header: What Junko Sees
    paragraphs:
    - The frequency of the planet has been changing faster than the institutional
      language built to describe it. Junko's tradition holds that bodies sensitive
      to vibration register the planet's frequency before the conscious mind registers
      the report on it. When that frequency-shift is hostile to the cohort, the news
      lands on top of an already-loaded body — and the load gets named as anxiety.
    - This is not a critique of climate scientists. The scientists also work inside
      the inherited language; they did not design the language they speak. The tradition
      is naming the layer beneath the language, the layer where the actual reception
      of the planet's communication happens or fails to happen.
    - The reception layer is where Junko's practice works. It does not replace the
      data; it makes the data reachable for a body whose nervous system has been
      pushed past its capacity to absorb in the mode the data arrives in.
    metadata:
      semantic_family: frequency-ecological-mechanism
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_perspective_03
    header: What Junko Sees
    paragraphs:
    - In Junko's framework the current period is planetary transition — the literal
      description of what the cohort is inside of, in which old ecological structures
      dissolve faster than the new ones can form. The young person reading the threshold
      did not cause this transition; they are inside it.
    - This is not a flattering reframe. It does not promise the load lifts quickly,
      and it does not blame the cohort for feeling unstable inside an unstable planet.
      It simply names the structural fact and removes the additional weight of believing
      the instability is a personal failure of coping.
    - That weight removal is, in transmission practice, often the part that lands
      first — before the deeper work of finding what the cohort is actually here to
      do during the transition can begin.
    metadata:
      semantic_family: planetary-transition-climate
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_perspective_04
    header: What Junko Sees
    paragraphs:
    - In Junko's tradition the ascended masters and cosmic council are higher-dimensional
      guides whose messages arrive as gifts rather than instructions. Their guidance
      on the planet is not the policy room's guidance. It does not optimize for the
      negotiating window; it names the layer of ecological knowing that exists beneath
      negotiation and is registered by bodies first.
    - For a young person exhausted by the gap between what the climate-policy room
      is saying and what their body has been reporting, the experience of being received
      by a guidance source that is not the policy room is structurally different.
      The data does not change. But what is permitted as evidence changes.
    - That distinction — received rather than negotiated — is what conventional climate
      infrastructure cannot reproduce, and what Junko's tradition has carried as native
      for decades.
    metadata:
      semantic_family: ascended-council-ecology
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_clim_perspective_05
    header: What Junko Sees
    paragraphs:
    - Light language, in Junko's tradition, is literal vibrational non-linear communication
      that reaches parts of a person the surface language does not. Applied to the
      planet, this means that the actual reception of what the earth is communicating
      happens through a layer the conventional climate language is not built to operate
      on.
    - For a young person whose intellect has been overused by the day's content of
      reports, alerts, and forecasts, the light-language layer is the place where
      the earth's communication can land again. The point is not that the reports
      are wrong; the point is that the body has been pushed past its capacity to
      receive in the mode the reports arrive in.
    - The tradition offers a practice that opens that other layer. The reports do
      not change. But the cohort returns to them with the channel open, and what
      the planet has been asking becomes audible from inside the cohort rather than
      from inside the report.
    metadata:
      semantic_family: light-language-earth
      article_types:
      - hard_news_spiritual_response
      - commentary
