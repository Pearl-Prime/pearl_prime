hook_personal:
  options:
  - id: junko_mh_hook_personal_01
    line: You know the spiral before anyone names it. You still carry the day forward
      while feeling less sure your mind can keep doing this pace — and part of you
      knows the friction is between what you are told you should want and what your
      soul already knows.
    metadata:
      semantic_family: personal-pressure
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_hook_personal_02
    line: You keep reading the updates because not looking feels worse. You also know
      that therapists, algorithms, and self-help have talked at you without relief
      — and that something else might need to be received, not produced.
    metadata:
      semantic_family: truth-vs-overload
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_hook_personal_03
    line: You feel the friction in your jaw before you have words for it — the part
      of you that is told to be fine running into the part that already knows the
      pace is not sustainable. The body holds what the mind is still trying to argue
      with.
    metadata:
      semantic_family: soul-friction
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_hook_personal_04
    line: At 1 a.m. you put the phone down and pick it up again. Neither move helps,
      because the spiral was already running — and the part of you trying to think
      your way out is the part that has been talked at too much already.
    metadata:
      semantic_family: midnight-spiral
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_hook_personal_05
    line: You have read the threads, taken the screenings, done the breathing app.
      The mind has done all it can — and something quieter in you is asking to be
      received rather than fixed.
    metadata:
      semantic_family: exhausted-intellect
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: junko_mh_hook_big_01
    line: Youth mental overload is not only about symptoms. It is about what constant
      pressure does to attention, rest, and the ability to stay human — and about
      the friction between surface expectations and what the soul already knows.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_hook_big_02
    line: Heightened sensitivity in young people is not pathology but recalibration.
      The tradition does not dismiss their suffering; it reframes it as the cost of
      being awake during a period when the old structures of meaning are dissolving
      and the new ones have not yet arrived.
    metadata:
      semantic_family: institutional-delay
      angle: soul-remembrance
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_hook_big_03
    line: A generation is being asked to hold meaning through a transition where the
      old structures have not yet been replaced. The overload is not a private failure
      — it is the felt edge of a structural gap that no individual mind was built
      to carry alone.
    metadata:
      semantic_family: meaning-structure-dissolving
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_hook_big_04
    line: The signal that older systems read as anxiety is, in Junko's framework,
      a frequency recalibration — the soul registering that the world it was prepared
      for is no longer the world it has to live in.
    metadata:
      semantic_family: cosmic-recalibration
      angle: frequency-shift
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_hook_big_05
    line: The collective field has shifted faster than the institutions designed to
      hold it. What gets read as a youth mental health crisis is, in part, the visible
      edge of a frequency mismatch between the inherited culture and the lives now
      being lived inside it.
    metadata:
      semantic_family: frequency-mismatch
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: junko_mh_intro_01
    line: 'Channeler Junko, a teacher of Japanese channeling and light-language spirituality,
      has watched in practice sessions young people carry mental overload as both
      real suffering and something her tradition names precisely: the friction between
      what they are told they should want and what their soul already knows. In Junko''s
      framework, the soul carries memory the mind has lost access to — and light language
      reaches the parts that words cannot.'
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_intro_02
    line: Channeler Junko does not position herself as a teacher in the conventional
      sense — she is a receiver. For decades she has worked in transmission space
      with young people whose minds are exhausted from being talked at by therapists,
      algorithms, and self-help. What her tradition offers is not another instruction
      stack; it is a different mode of contact.
    metadata:
      semantic_family: receiver-not-creator
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_intro_03
    line: Channeler Junko works with light language — vibrational non-linear communication
      that, in her tradition, reaches parts of a person that words cannot. She has
      watched young clients move through the same loop the screening tools name as
      anxiety, and watched the loop loosen when the frequency, not the explanation,
      is received.
    metadata:
      semantic_family: light-language-witness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_intro_04
    line: Channeler Junko receives from what her tradition calls the cosmic council
      — higher-dimensional spiritual guides whose messages arrive as gifts rather
      than instructions. In her practice sessions she has seen young people meet that
      reception and recognize, often for the first time, that their distress is being
      heard rather than diagnosed.
    metadata:
      semantic_family: cosmic-council-context
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_intro_05
    line: Channeler Junko teaches inside a tradition that reads this period as planetary
      transition — a time when heightened sensitivity in young people is recalibration,
      not pathology. She has watched the reframe land in transmission space and remove,
      at least, the additional burden of believing the pain is proof of being broken.
    metadata:
      semantic_family: planetary-transition
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: junko_mh_somatic_01
    line: You read the update after midnight. Your mind sped up. You put the phone
      down. Then you picked it up again because the spiral was already running.
    metadata:
      semantic_family: midnight_spiral
      loop_type: midnight_spiral
      body_register: jaw
      digital_behavior: put the phone down
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_somatic_02
    line: You wake before the alarm. Your stomach is already tight. You reach for
      the phone before you reach for the light, because the dread is already there
      and you need to check whether the world matches it.
    metadata:
      semantic_family: morning_dread
      loop_type: morning_dread
      body_register: stomach
      digital_behavior: reach for the phone
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_somatic_03
    line: Your jaw clenches when the notification sound comes through. You replay
      the last conversation in your head three times. Your breath shortens. The body
      ran the loop before you decided anything.
    metadata:
      semantic_family: jaw-clench-replay
      loop_type: jaw_clench
      body_register: jaw
      digital_behavior: notification sound
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_somatic_04
    line: You hold your breath without noticing while the screen loads. Your shoulders
      lift. You exhale only when you see the message and only halfway, because there
      is always another message coming.
    metadata:
      semantic_family: notification-anticipation
      loop_type: notification_hold
      body_register: breath
      digital_behavior: screen load
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_somatic_05
    line: You lie down and your eyes pin open. The day replays. Your jaw will not
      soften. You know sleep is the thing that would help and you cannot find the
      door into it.
    metadata:
      semantic_family: sleep-resistance
      loop_type: sleep_resistance
      body_register: jaw
      digital_behavior: lying down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: junko_mh_witness_01
    line: Junko has seen this exact loop in those who come to receive. In her framework
      that pressure is not character; it is the soul asking to be heard when the intellect
      is exhausted.
    metadata:
      semantic_family: loop-mirror
      loop_type: midnight_spiral
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_witness_02
    line: Junko has watched young people walk into the receiving space already mid-loop,
      already certain the intellect should have solved this by now. In her tradition
      that certainty is the signal — the place where the mind stops and the channel
      can open.
    metadata:
      semantic_family: intellect-exhausted-call
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_witness_03
    line: She has seen the body carry what the explanations could not. In her framework
      the somatic loop is not a malfunction — it is the soul speaking through the
      only channel left open when the words have been overused.
    metadata:
      semantic_family: somatic-soul-message
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_witness_04
    line: Junko has watched young clients arrive with a frequency disturbance that
      no screening tool names. In her tradition that disturbance is information, not
      pathology — a signal that the system being asked to hold them was never tuned
      to their actual range.
    metadata:
      semantic_family: frequency-disturbance-witness
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_witness_05
    line: Junko has watched the moment when a young person stops trying to produce
      an answer and lets the channel open instead. In her tradition that moment is
      not weakness — it is the readiness that conventional care has no language for.
    metadata:
      semantic_family: reception-readiness
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: junko_mh_turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: Youth organizers are hosting peer circles, organizing listener training,
      and forcing schools to treat mental health support as infrastructure, not private
      weakness.
    metadata:
      semantic_family: institutional-action
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_turnaround_02
    stat_line_1: 488 universities. JED Campus.
    stat_line_2: The JED Foundation program now runs comprehensive mental health frameworks
      across nearly five hundred US campuses, embedding peer support and faculty training
      into the day-to-day infrastructure rather than the crisis aftermath.
    metadata:
      semantic_family: peer-network-growth
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_turnaround_03
    stat_line_1: 5,600 voices. 7 countries.
    stat_line_2: UNICEF's Global Coalition for Youth Mental Health gathered 5,600
      young people aged 14-25 across seven countries to surface what conventional
      reporting had missed — and the cohort named the load themselves before the agencies
      could.
    metadata:
      semantic_family: youth-collective-organizing
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_turnaround_04
    stat_line_1: 14 million contacts. 988 Lifeline.
    stat_line_2: Since the 988 Suicide and Crisis Lifeline launched in 2022, more
      than fourteen million contacts have been routed through it — a resource pool
      that did not exist three years ago and now carries weight every night.
    metadata:
      semantic_family: resource-pool-built
      article_types:
      - hard_news_spiritual_response
  - id: junko_mh_turnaround_05
    stat_line_1: 53 member states. WHO Europe.
    stat_line_2: The WHO Europe Child and Adolescent Health Strategy 2026-2030, adopted
      in October 2025, binds fifty-three member states to report on adolescent mental
      load against a 2030 deadline — the first multilateral instrument that treats
      the cohort load as governance, not commentary.
    metadata:
      semantic_family: policy-shift
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: junko_mh_bridge_01
    line: '320 campuses. 18 countries. The tracker measures the workshops and peer
      circles young people built. It has no column for what made the next honest reach-out
      possible — the capacity to receive guidance when the mind has been talked at
      by therapists, algorithms, and self-help content without relief. Junko''s tradition
      offers a different mode of contact: one that bypasses the exhausted intellect
      and speaks directly to the energetic body where distress is actually held.'
    hidden_capacity: receive when the intellect is exhausted
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_bridge_02
    line: The numbers show the scaffolding the young built. They do not show the cosmic
      context that scaffolding is being built inside — a period of planetary transition
      where the old meaning structures are dissolving faster than the new ones can
      form. Junko's tradition holds that context as native, not metaphor.
    hidden_capacity: hold the larger context the data cannot show
    metadata:
      semantic_family: cosmic-context-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_bridge_03
    line: The data captures sessions, contacts, and policy adoptions. It cannot capture
      the frequency that shifts when a young person stops being talked at and starts
      being received. In Junko's framework that shift is the actual relief — the part
      no tracker reports.
    hidden_capacity: register the frequency shift the trackers miss
    metadata:
      semantic_family: frequency-data-gap
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_bridge_04
    line: The infrastructure is measurable. The energetic body, where the loop is
      actually held, is not. Junko's tradition does not argue with the measurement
      — it works in the layer beneath it, where the soul carries memory the conscious
      mind has lost access to.
    hidden_capacity: work in the layer beneath the measurement
    metadata:
      semantic_family: measurable-vs-energetic
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_bridge_05
    line: Structures, policies, and platforms can be counted. The soul friction underneath
      cannot. Junko's tradition does not replace the structural work — it names the
      layer that institutional response is not designed to reach and offers reception
      as the door in.
    hidden_capacity: name the layer institutional response cannot reach
    metadata:
      semantic_family: structural-vs-soul
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: junko_mh_perspective_01
    header: What Junko Sees
    paragraphs:
    - The soul carries memory that the conscious mind has lost access to, and much
      of what young people experience as anxiety or depression is the friction between
      what they are told they should want and what their deeper nature already knows.
      Healing begins when that larger self is acknowledged rather than medicated into
      silence.
    - Light language works not through conceptual meaning but through vibrational
      resonance — it reaches the parts of a person that words cannot access. For young
      people who have been talked at without relief, the tradition offers a different
      mode of contact that bypasses the exhausted intellect.
    - Planetary transition means that heightened sensitivity in young people is not
      pathology but recalibration. The reframe does not remove the pain, but it removes
      the additional burden of believing the pain means something is wrong with you
      within a system and institutional structure that was never designed for what
      it demands.
    metadata:
      semantic_family: soul_remembrance_reframe
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_perspective_02
    header: What Junko Sees
    paragraphs:
    - Light language is not metaphor. In Junko's tradition it is a literal vibrational
      mode of communication that bypasses conceptual processing and reaches the energetic
      body directly. For a generation talked at by therapists, algorithms, and self-help
      stacks, this is not another voice — it is a different layer of contact.
    - The mechanism matters because it explains the relief many young people describe
      after a transmission — not that they have been argued out of the spiral, but
      that the spiral has loosened on a layer that argument never reaches. The mind
      did not have to win for the body to soften.
    - This is the part conventional care is not designed to deliver. It does not invalidate
      conventional care — but it names a missing layer, and offers a tradition that
      has worked in that layer for generations.
    metadata:
      semantic_family: light-language-mechanism
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_perspective_03
    header: What Junko Sees
    paragraphs:
    - In Junko's tradition the ascended masters and cosmic council are higher-dimensional
      guides whose messages arrive as gifts rather than instructions. Junko does not
      author what is received. She is the channel — and her job is to keep the channel
      clear enough that what wants to come through can.
    - For a young person carrying mental overload, the experience of being received
      by something larger than the algorithm is, in itself, structurally different
      from being processed by it. The message that lands is not "here is the rule";
      it is "you are heard at the level you have been asking to be heard."
    - That distinction — received rather than processed — is what conventional infrastructure
      cannot reproduce, and what Junko's tradition has carried as native for decades.
    metadata:
      semantic_family: ascended-council-perspective
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_perspective_04
    header: What Junko Sees
    paragraphs:
    - Planetary transition, in Junko's framework, is the literal description of the
      period her tradition holds we are in — a time when the old meaning structures
      are dissolving and the new ones have not yet formed. The mental overload young
      people carry is, in part, the cost of being awake inside that transition.
    - This is not a flattering reframe. It does not promise the pain will lift quickly,
      and it does not blame the cohort for feeling unstable in an unstable structure.
      It simply names the structural fact and removes the additional weight of believing
      the instability is a personal failure.
    - That weight removal is, in transmission practice, often the part that lands
      first — before the deeper soul work can begin.
    metadata:
      semantic_family: planetary-transition-frame
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: junko_mh_perspective_05
    header: What Junko Sees
    paragraphs:
    - The soul frequency, in Junko's tradition, is the part of a person that resonates
      with cosmic truth — the layer beneath personality, beneath conditioning, beneath
      the script the world has handed them. When that frequency is registered, the
      surface load does not disappear, but it stops being the only signal.
    - Recalibration is the tradition's word for what is happening when a young person
      moves through a period of heightened sensitivity. The system reads it as pathology
      because the system has no other category. Junko's tradition reads it as the
      soul tuning to a frequency the inherited culture was not built to transmit.
    - The practice is not to fix the recalibration. The practice is to receive it,
      and to let the tradition's frequency-aware tools hold what conventional care
      cannot.
    metadata:
      semantic_family: frequency-recalibration
      article_types:
      - hard_news_spiritual_response
      - commentary
