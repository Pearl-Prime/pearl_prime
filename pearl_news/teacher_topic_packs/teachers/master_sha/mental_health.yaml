      semantic_family: soul-body-mind-disharmony
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_mh_hook_personal_04
    line: At 1 a.m. you put the phone down and pick it up again. Neither move helps, because the spiral was already running — and the part of you trying to think your way out is the part that has been talked at too much already. Soul healing, in the tradition, begins exactly where the intellect ends.
