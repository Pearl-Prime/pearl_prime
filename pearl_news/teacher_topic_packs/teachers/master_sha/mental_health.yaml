      semantic_family: truth-vs-overload
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_mh_hook_personal_03
    line: You feel the friction in your jaw before you have words for it — the part of you that is told to be fine running into the part that already knows the pace is not sustainable. The body is holding what the mind is still trying to argue with, and the layer below the body has not been touched.
