hook_big_picture:
  options:
  - id: master_sha_mh_hook_big_01
    line: Youth mental overload is not only about symptoms. It is about what constant pressure does to attention, rest, and the soul-body-mind harmony that the tradition holds is the actual target — and about the frequency layer that surface response is not built to reach.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_mh_hook_big_02
    line: Heightened distress in young people is not pathology alone. The Tao Source tradition reads it as soul-body-mind disharmony amplified by a culture that asks the mind to carry what only soul healing can release — and the reframe does not remove the suffering, it names the layer that has gone unaddressed.
    metadata:
      semantic_family: institutional-delay
      angle: soul-priority
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_mh_hook_big_03
    line: A generation is being asked to hold meaning through a transition where the inherited structures cannot reach the soul layer where the load is actually carried. The overload is not a private failure — it is the visible edge of a healing field that has not yet been offered at scale.
    metadata:
      semantic_family: meaning-structure-dissolving
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_mh_hook_big_04
    line: The signal that conventional systems read as anxiety is, in the Tao Grandmaster's framework, a frequency disturbance — the soul registering that the world it was prepared for is no longer the world it has to live in, and asking for a healing field that meets it at its actual range.
    metadata:
      semantic_family: cosmic-recalibration
      angle: frequency-shift
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_mh_hook_big_05
    line: The collective field has shifted faster than the institutions designed to hold it. What gets read as a youth mental health crisis is, in part, the visible edge of a frequency mismatch between the inherited culture and the lives now being lived inside it — a mismatch Tao Calligraphy's healing field is built to bridge.
    metadata:
      semantic_family: frequency-mismatch
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
teacher_intro:
