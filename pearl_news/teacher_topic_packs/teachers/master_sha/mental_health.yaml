  - id: master_sha_mh_hook_personal_01
    line: You know the spiral before anyone names it. You still carry the day forward while feeling less sure your mind can keep doing this pace — and part of you knows the friction is sitting on a layer deeper than the mind, where soul healing has not yet been offered.
