hook_big_picture:
  options:
  - id: master_sha_mh_hook_big_01
    line: Youth mental overload is not only about symptoms. It is about what constant pressure does to attention, rest, and the ability to stay functional — and what can clear the blockage when the spiral is running.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_mh_hook_big_02
    line: 'Institutions normalize overload until young people start treating it as a private flaw. The tradition has another name for it: blockage that can be met with compassion and cleared.'
    metadata:
      semantic_family: institutional-delay
      angle: self-to-system
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: master_sha_mh_intro_01
    line: 'Dr. and Master Zhi Gang Sha, a Tao Source and Soulfulness teacher for decades, has seen in practice sessions young people carry mental overload as both real suffering and something his tradition names precisely: blockage. Students are not asking whether they are broken. They are asking how to stop the spiral from feeling like a verdict on who they are. In the Tao Source framework, blockages can be cleared — not through force, but through the practice of soul-guided attention and greatest compassion for the self.'
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
