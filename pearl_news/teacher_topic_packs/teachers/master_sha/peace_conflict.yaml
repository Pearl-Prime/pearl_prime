teacher_perspective:
  options:
  - id: master_sha_peace_perspective_01
    header: What Master Sha Sees
    paragraphs:
    - The root of conflict is blockage in individuals, in communities, in the energetic
      field between groups. When fear, resentment, and unprocessed historical trauma
      accumulate without being cleared, they express as hostility and eventually violence.
      The Tao Source teaching holds that peace is not achieved by suppressing these
      blockages but by clearing them through greatest forgiveness.
    - Greatest love is not an emotion but a practice. Applied to conflict it means
      approaching the enemy with the recognition that they too are obstructed, and
      that their violence is an expression of blockage rather than of their true nature.
      This teaching does not ask young people to excuse harm; it asks them to see
      its origin clearly enough to respond in ways that do not reproduce it.
    - Sacred song has been used across cultures as a practice of collective healing
      after conflict. Communal vocalization restores a shared vibrational field that
      violence fragments. What feels like a personal fault — me, broken, wrong — is
      often accurate response to conditions no individual can fix alone. Young people
      who sing together after violence are doing something the tradition regards as
      essential within a system and institutional structure that was never designed
      for what it demands.
    metadata:
      semantic_family: tao_blockage_reframe
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
practice:
