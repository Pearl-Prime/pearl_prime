hook_personal:
  options:
  - id: master_sha_peace_hook_personal_01
    line: You can feel public violence entering private life through one notification.
      The body knows it before language does — and the fear can turn into a blockage
      that reproduces harm.
    metadata:
      semantic_family: personal-pressure
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_peace_hook_personal_02
    line: You keep reading because not looking feels dishonest. You also know what
      repeated conflict news is doing to your body — the tightening, the stop, the
      check again.
    metadata:
      semantic_family: truth-vs-overload
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: master_sha_peace_hook_big_01
    line: Conflict pressure is no longer only geopolitical. It arrives as moral injury
      and as blockage in the field between groups — and the tradition holds that clearing
      blockage is how response stops reproducing violence.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_peace_hook_big_02
    line: When fear, resentment, and unprocessed trauma accumulate without being cleared,
      they express as hostility and eventually violence. Peace is not achieved by
      suppressing blockages but by clearing them.
    metadata:
      semantic_family: institutional-delay
      angle: blockage-reframe
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: master_sha_peace_intro_01
    line: Dr. and Master Zhi Gang Sha, a Tao Source and Soulfulness teacher for decades,
      has seen in practice sessions young people carry conflict pressure as both fear
      and responsibility. They are not asking whether the world is dangerous. They
      are asking how to stay in contact with danger without the fear turning into
      a blockage that reproduces violence.
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
