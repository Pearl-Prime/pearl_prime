    line: The tracker measures ceasefires and treaties. It has no column for what
      made the next act of peacebuilding possible - the capacity to clear the blockage
      of fear and resentment so that response does not reproduce the pattern. Master
      Sha's tradition holds that sacred song and communal vocalization restore a shared
