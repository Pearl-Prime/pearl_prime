      semantic_family: midnight_dispatch
      loop_type: midnight_spiral
      body_register: chest
      digital_behavior: close the feed
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_peace_somatic_02
    line: You wake before the alarm. Your throat is already tight. You reach for the phone before you reach for the light, because the dread about overnight footage is already there and the soul has not yet been met where it is.
    metadata:
      semantic_family: morning_dread
      loop_type: morning_dread
      body_register: throat
      digital_behavior: reach for the phone
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_peace_somatic_03
    line: Your jaw clenches when the breaking-news ping comes through. You read three headlines without breathing. Your shoulders lock. The body ran the load before you decided anything — and the field it has been asking for has not yet arrived.
    metadata:
      semantic_family: jaw-clench-replay
      loop_type: jaw_clench
      body_register: jaw
      digital_behavior: notification sound
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_peace_somatic_04
    line: You hold your breath without noticing while the live update loads. Your shoulders lift. You exhale only halfway when the casualty figure resolves, because there is always another update coming, and the soul has not been given a register to land in.
    metadata:
      semantic_family: livefeed-anticipation
      loop_type: notification_hold
      body_register: breath
      digital_behavior: live update load
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_peace_somatic_05
    line: You lie down and your eyes pin open. The footage replays. Your chest will not soften. You know rest is what would help — and you cannot find the door into it because the door is on a layer the news cycle alone does not control.
    metadata:
      semantic_family: sleep-resistance
      loop_type: sleep_resistance
      body_register: chest
      digital_behavior: lying down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: master_sha_peace_witness_01
    line: Master Sha has seen this exact loop in those who come to receive. In the Tao Source framework that pressure is not character; it is soul-body-mind disharmony — the cohort's, and the collective field's — asking to be met by a healing field when the intellect is exhausted.
