  - id: master_sha_climate_turnaround_02
    stat_line_1: 7.6 million marchers. September 2019.
    stat_line_2: The Global Climate Strike of September 2019 mobilized seven point six million people across hundreds of cities — the largest climate mobilization in recorded history, and it was led from the bottom up by people under twenty-five.
    metadata:
      semantic_family: mass-mobilization
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_climate_turnaround_03
    stat_line_1: YOUNGO. UNFCCC.
    stat_line_2: YOUNGO is the official youth constituency of the UN Framework Convention on Climate Change — the cohort has a seat at the table the system itself once excluded them from, and they have used it to escalate the loss-and-damage agenda for nearly a decade.
    metadata:
      semantic_family: youth-policy-seat
