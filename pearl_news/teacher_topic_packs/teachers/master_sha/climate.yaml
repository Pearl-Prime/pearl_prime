bridge:
  options:
  - id: master_sha_climate_bridge_01
    line: '2,666 cases. 51 jurisdictions. The tracker measures what young people did. It has no column for what made the next filing possible after the last delay — the capacity to direct love and compassion toward the specific place where they live, so blockage does not swallow the will to act. The organizer who filed the next case needed that capacity. So does the person who read the update, closed the app, and opened it again. Master Sha''s tradition has a name for clearing that blockage: greatest love, greatest forgiveness, greatest compassion, applied first to the self, then to the Earth.'
    hidden_capacity: direct love and compassion so blockage does not swallow the will to act
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: master_sha_climate_perspective_01
    header: What Master Sha Sees
    paragraphs:
    - The Tao Source teaching holds that all of creation is connected through a single source, and what humanity does to the Earth it does to itself — not as metaphor but as energetic reality. Climate destruction is a blockage in the flow between humanity and the planet.
    - Like all blockages, it can be addressed only when it is first clearly seen and then met with the practice of transformation rather than the repetition of the patterns that created it. Greatest love, greatest forgiveness, greatest compassion — applied to the Earth itself — is not sentimentality; it is a practice framework.
    - 'Young people who feel paralysed by the scale of climate damage can begin with the practice of directing love and compassion toward the specific place where they live: the soil, the water, the air of their immediate environment. What feels like a personal fault — me, broken, wrong — is often accurate response to system and institutional conditions no individual can fix alone. The tradition holds that this practice changes not only the practitioner but the field.'
    metadata:
      semantic_family: tao_blockage_reframe
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
