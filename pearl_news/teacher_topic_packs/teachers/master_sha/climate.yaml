  - id: master_sha_climate_turnaround_01
    stat_line_1: 7,500+ strikes. 185 countries.
    stat_line_2: Fridays for Future has organized more than seven thousand five hundred coordinated climate strikes across one hundred eighty-five countries since 2018 — a youth-led infrastructure that did not exist when the cohort was born.
