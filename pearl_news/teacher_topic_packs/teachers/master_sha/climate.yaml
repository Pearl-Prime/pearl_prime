  - id: master_sha_climate_bridge_02
    line: The numbers show the scaffolding the young built. They do not show the cosmic context that scaffolding is being built inside — a period in which the Tao Grandmaster lineage holds universal love is the operating force most needed and least available to the planet. Tao Source holds that context as native, not metaphor.
    hidden_capacity: hold the universal-love context the data cannot show
    metadata:
      semantic_family: cosmic-context-bridge
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_sha_climate_bridge_03
    line: The data captures mobilizations, policies, and finance commitments. It cannot capture the frequency that shifts when a young person stops being talked at and receives a healing field at the soul layer between humanity and Earth. In the Tao Source framework that shift is the actual relief — the part no tracker reports.
    hidden_capacity: register the frequency shift the trackers miss
    metadata:
      semantic_family: frequency-data-gap
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_sha_climate_bridge_04
    line: The infrastructure is measurable. The soul body of the planet, where the disharmony is actually held, is not. The Tao Source tradition does not argue with the measurement — it works in the layer beneath it, where soul healing precedes body and mind healing as the structural ordering of any lasting change.
    hidden_capacity: work in the soul layer beneath the measurement
    metadata:
      semantic_family: measurable-vs-soul
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_sha_climate_bridge_05
    line: Strikes, policies, and platforms can be counted. The soul-body-mind disharmony between humanity and Earth underneath cannot. The Tao Source tradition does not replace the structural work — it names the layer institutional response is not designed to reach and offers Tao Calligraphy, Tao Song, and Tao Hands as the methods built for exactly that layer.
