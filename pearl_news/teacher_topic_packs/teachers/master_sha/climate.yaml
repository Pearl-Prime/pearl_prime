hook_big_picture:
  options:
  - id: master_sha_climate_hook_big_01
    line: A generation can be highly informed, morally serious, and still lose the capacity to act when every update arrives as proof that institutions waited too long — and the tradition has a name for what blocks the flow.
    metadata:
      semantic_family: institutional-delay
      angle: future-loss
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_climate_hook_big_02
    line: 'The pressure is no longer only ecological. It is attentional and energetic: how do young people stay in contact with reality without the fear turning into a blockage that paralyses the next move?'
    metadata:
      semantic_family: attention-blockage
      angle: attention-collapse
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: master_sha_climate_intro_01
    line: Dr. and Master Zhi Gang Sha, a Tao Source and Soulfulness teacher for decades, has watched in practice sessions young people carry climate news as both moral seriousness and something that blocks the flow of action. Students are not asking whether the planet is in trouble. They are asking how to stay in contact with the truth without the fear turning into a blockage that paralyses the next move.
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
