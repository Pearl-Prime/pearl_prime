      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_climate_hook_personal_02
    line: You keep reading climate updates because looking away feels dishonest. You also know what each new number is doing to your body — the tightening, the close, the return.
