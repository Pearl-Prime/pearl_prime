  - id: master_sha_climate_witness_02
    line: Master Sha has watched young people walk into the transmission space already mid-spiral, already certain the intellect should have solved this by now. In the tradition that certainty is the signal — the place where the mind stops and the planetary healing field can be received.
    metadata:
      semantic_family: intellect-exhausted-call
