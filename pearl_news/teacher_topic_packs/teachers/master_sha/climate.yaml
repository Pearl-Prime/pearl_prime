      semantic_family: chest-tighten-replay
      loop_type: jaw_clench
      body_register: chest
      digital_behavior: notification sound
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_climate_somatic_04
    line: You hold your breath without noticing while the satellite map loads. Your shoulders lift. You exhale only halfway when the data resolves, because there is always another reading coming, and the soul has not been given a register to land in.
    metadata:
      semantic_family: data-anticipation
      loop_type: notification_hold
      body_register: breath
      digital_behavior: map load
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_climate_somatic_05
    line: You lie down and your eyes pin open. The footage replays. Your chest will not soften. You know rest is the thing that would help — and you cannot find the door into it because the door is on a layer the news cycle alone does not control.
    metadata:
      semantic_family: sleep-resistance
      loop_type: sleep_resistance
      body_register: chest
      digital_behavior: lying down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: master_sha_climate_witness_01
    line: Master Sha has seen this exact loop in those who come to receive. In the Tao Source framework that pressure is not character; it is soul-body-mind disharmony — humanity's, and the planet's — asking to be met by a healing field when the intellect is exhausted.
