  - id: master_sha_climate_turnaround_04
    stat_line_1: $300 billion. Loss and damage.
    stat_line_2: At COP29 the loss-and-damage finance commitment was raised toward a $300 billion target by 2035 — a recognition that the planetary disharmony has produced harm that requires reparative finance, not only mitigation.
