      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: master_sha_education_intro_02
    line: Dr. and Master Sha holds credentials that almost never coexist — a Western medical degree and TCM physicianship, applied for decades to teaching that human learning is itself a soul-body-mind system. What the Tao Source tradition offers to students staring at rubrics is not another study plan; it is a high-frequency teaching field that reaches the learning capacity at its actual source.
