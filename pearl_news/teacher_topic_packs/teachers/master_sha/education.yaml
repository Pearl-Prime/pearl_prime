bridge:
  options:
  - id: master_sha_edu_bridge_01
    line: The tracker measures policy changes and peer programs. It has no column
      for what made the next hour of real focus possible after another day of scatter
      — the capacity to connect to the source of wisdom rather than merely to the
      next tab. The student who stayed with the task needed that capacity. So does
      the person who opened the portal, switched tabs, and came back. Master Sha's
      tradition holds that genuine learning begins at that connection, and that love,
      forgiveness, and compassion are not add-ons but the ground from which clarity
      flows.
    hidden_capacity: connect to the source of wisdom so scatter does not become identity
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: master_sha_edu_perspective_01
    header: What Master Sha Sees
    paragraphs:
    - The Tao Source teaching holds that genuine learning begins when the student
      connects to the source of wisdom rather than merely accumulating its products.
      Education systems that deliver information without cultivating the student's
      relationship to the source of that information produce knowledgeable people
      who lack wisdom — and the difference is visible in how a person responds to
      conditions that their knowledge did not anticipate.
    - Love, forgiveness, and compassion are not supplementary values to be added to
      education as an afterthought; they are foundational capacities without which
      all other learning becomes blockage. When the system treats attention as an
      infinite resource, it creates blockage in the flow between the student and what
      they are meant to learn.
    - 'The reframe is practical: what feels like a personal fault -- me, broken, wrong
      for losing focus -- is often the result of conditions that have never been met
      with adequate compassion for the learner. Clear the blockage first; then the
      mind can return to the task within a system and institutional structure that
      was never designed for what it demands.'
    metadata:
      semantic_family: tao_blockage_reframe
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
      - commentary
practice:
  default_id: master_sha_edu_practice_01
  options:
  - id: master_sha_edu_practice_01
    display_name: Tao Source Golden Light Practice
    duration: 5 minutes
    announcement_line: Master Sha teaches a 5-minute Tao Source Golden Light practice
      for moments when the portal and the tabs have scattered attention and the work
      still has to get done. Golden light washes the blockage; the soul reconnects
      to source. It is in the sidebar, timed and step by step.
    relief_lines:
    - The blockage that turns every interruption into identity softens.
    - Enough clarity returns for the next honest stretch of focus.
    relief_register:
    - clarity
    - focus
    - return
    derived_from_frame: tao_blockage_clear
    metadata:
      article_types:
      - hard_news_spiritual_response
      - commentary
