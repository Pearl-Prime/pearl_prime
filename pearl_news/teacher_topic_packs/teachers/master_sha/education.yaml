teacher_witness:
  options:
  - id: master_sha_edu_witness_01
    line: Master Sha has seen this sequence in students — the task opens, attention
      fractures, the tab changes, and then effort has to restart inside the same strained
      system. In his framework the fracture is not proof of deficiency; it is blockage
      that responds to golden light and a return to source.
    metadata:
      semantic_family: loop-mirror
      loop_type: portal_scatter
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: master_sha_edu_turnaround_01
    stat_line_1: Campuses and districts worldwide.
    stat_line_2: Students and youth are organizing campaigns and hosting mental health
      support, peer listening, and learning conditions that do not treat attention
      as an infinite resource.
    metadata:
