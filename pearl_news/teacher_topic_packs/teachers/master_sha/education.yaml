hook_personal:
  options:
  - id: master_sha_edu_hook_personal_01
    line: You still want to learn. You also know how much of your attention the system
      wastes before the work even begins — and how often scatter feels like a verdict
      on you.
    metadata:
      semantic_family: personal-pressure
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_edu_hook_personal_02
    line: You open the portal. Focus breaks. You switch tabs and come back. The work
      still has to get done, and something keeps blocking the flow between intention
      and the next honest stretch.
    metadata:
      semantic_family: scatter-capacity
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: master_sha_edu_hook_big_01
    line: Educational stress is not only about workload. It is about what interruption-heavy
      systems do to attention, confidence, and the ability to stay in contact with
      learning — and what can restore the connection to source when scatter blocks
      it.
    metadata:
      semantic_family: system-pressure
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: master_sha_edu_hook_big_02
    line: When the system treats attention as an infinite resource, it creates blockage
      in the flow between the student and what they are meant to learn. The tradition
      has a practice for clearing it.
    metadata:
      semantic_family: institutional-delay
      angle: frequency-mismatch
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: master_sha_edu_intro_01
    line: Dr. and Master Zhi Gang Sha, a Tao Source and Soulfulness teacher for decades,
      has watched in practice sessions young people arrive at learning already exhausted
      by the effort required just to stay with the task. They are not asking whether
      school matters. They are asking how to stop treating scattered attention as
      a private failure. In the Tao Source framework, that scatter is often blockage
      — and blockage can be cleared when the soul is invited back into the room.
    metadata:
      semantic_family: identity_seen_shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: master_sha_edu_somatic_01
    line: 'You open the assignment portal. Your focus breaks. You switch tabs. Then
      you come back because the work still has to get done.

