teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei, a Shingon teacher in the Mikkyo lineage, has seen in practice sessions students arrive already exhausted by the effort required just to stay with the task. They are not asking whether school matters. They are asking how to stop treating scattered attention as a private failure and how to bring body, speech, and mind back into one gesture so the work can land.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Joshin Sensei, a Shingon Buddhist teacher, has watched education pressure show up in the practice hall as fractured attention and self-blame. Young people are not asking how to study harder. They are asking how to stop the system from turning interruption into identity.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
