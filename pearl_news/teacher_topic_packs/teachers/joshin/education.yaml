topic_fit:
  fit_level: primary
  fit_reason: The curriculum young people are inside has been built to deliver credentials
    while the body, speech, and mind have been pulling against one another for years.
    Shingon's ritual technology — explicit Sanmitsu synchronization and Sokushin
    Jobutsu reframe — is precisely suited to the layer the credential cannot reach.
  forbidden_angles:
  - do not reduce to generic productivity
  - do not frame as personal motivation problem
  - do not use Zen framing
hook_personal:
  options:
  - id: joshin_ed_hook_personal_01
    line: You can complete the assignments and hit the deadlines. You also know that
      what was supposed to be delivered through the credential is not arriving —
      the synchronization between what the institution validates and what the body
      registers has been widening.
    metadata:
      semantic_family: credential-synchronization-gap
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_hook_personal_02
    line: You are inside the system and you are doing what it asks. The body has
      been carrying three layers — the screen, the family expectation, the platform
      performance — and the curriculum has been training only one. The other two
      keep accumulating cost.
    metadata:
      semantic_family: three-layers-one-trained
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_hook_personal_03
    line: At 2 a.m. you finish the paper. The jaw is locked. The grade arrives. Your
      part of you keeps asking is not whether you passed — it is whether body, speech,
      and mind were ever in the same room for the exchange.
    metadata:
      semantic_family: layers-in-same-room
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_hook_personal_04
    line: You read the syllabus and the throat closes around half of it. You complete
      the readings anyway. The closing was information. The institution gave you
      no technology for receiving it.
    metadata:
      semantic_family: throat-closing-information
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_hook_personal_05
    line: A part of you knows the question is not how to study harder. The question
      is whether anything is actually being delivered to the body you are inside
      now — and Shingon's tradition has explicit ritual technology for that delivery.
    metadata:
      semantic_family: ritual-tech-delivery
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: joshin_ed_hook_big_01
    line: Youth education load is not only about workload. It is what credential
      delivery costs over time — the synchronization gap that builds when body, speech,
      and mind are trained to operate against one another for years while the institution
      measures only one of the three.
    metadata:
      semantic_family: synchronization-gap-buildup
      angle: cultural-frame
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_hook_big_02
    line: A generation is being asked to inherit a world the curriculum is not equipped
      to describe. The gap between what the institution delivers and what the body
      that has to live inside that world actually needs is not the cohort's failure
      — it is a missing technology stack.
    metadata:
      semantic_family: missing-tech-stack
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_hook_big_03
    line: In Japan especially, honne/tatemae — the gap between real feeling and the
      face required — has thickened inside the platform-and-credential architecture.
      The cohort is being asked to hold the widest gap any prior generation has held,
      and the curriculum has been training only the surface.
    metadata:
      semantic_family: honne-tatemae-credential
      angle: cultural-architecture
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_hook_big_04
    line: Shingon's premise — Sokushin Jobutsu, Buddhahood in this very body — refuses
      to defer the inner work. The body the student is inside is already the site
      of the practice; the credential is what the institution measures, not the
      work itself.
    metadata:
      semantic_family: sokushin-vs-credential
      angle: doctrine-frame
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_hook_big_05
    line: What gets read as student disengagement is often the body registering that
      the curriculum it is inside has not been delivering synchronization. Shingon's
      tradition has explicit ritual technology for synchronization — the modern institution
      does not.
    metadata:
      semantic_family: disengagement-as-information
      angle: tradition-language-gap
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: joshin_ed_intro_01
    line: Joshin, a priest in the Shingon Esoteric Buddhist tradition (Mikkyo), has
      taught young students inside the ritual hall for decades. He has seen what
      credential-only delivery does to a cohort that arrived needing synchronization.
    metadata:
      semantic_family: identity-seen-shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_intro_02
    line: Joshin teaches inside the Shingon lineage. He does not position himself
      as an education reformer in the policy sense — he is a ritual technologist
      whose tradition has, for over a millennium, addressed the body/speech/mind
      synchronization the curriculum does not deliver.
    metadata:
      semantic_family: ritual-technologist
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_intro_03
    line: Joshin works from Sokushin Jobutsu — the Shingon premise that this body,
      now, is the site of the work. There is no deferred self the credential is
      preparing. The body the student is inside is already where the practice meets
      the load.
    metadata:
      semantic_family: sokushin-jobutsu-frame
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_intro_04
    line: Joshin has watched young students arrive with transcripts and an unspoken
      question — whether anything they came for is actually being transmitted. In
      Shingon's framework the question is not about motivation; it is about which
      layer the institution is willing to deliver to.
    metadata:
      semantic_family: which-layer-delivered-to
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_intro_05
    line: Joshin is fluent in platform and pressure. His Shingon practice reframes
      esoteric Buddhism as a technology stack for the cohort whose curriculum is
      the LMS and whose surface is the platform — and whose inner state has been
      treated as a deferred problem to be solved later.
    metadata:
      semantic_family: esoteric-as-tech-stack
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
youth_somatic:
  options:
  - id: joshin_ed_somatic_01
    line: You opened the lecture tab at 1 a.m. The eyes drifted to the second screen.
      You closed the lecture tab. Then you opened it again because the deadline was
      real and the synchronization between attention and assignment was not arriving.
    metadata:
      semantic_family: lecture-tab-loop
      loop_type: deadline_no_sync
      body_register: eyes
      digital_behavior: opens the tab
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_somatic_02
    line: You read the textbook chapter. The jaw locked at the third page. You took
      a screenshot you would not reread. Then you moved on because the surface required
      moving on, even when the underneath had not registered the material.
    metadata:
      semantic_family: jaw-locked-textbook
      loop_type: surface_moves_on
      body_register: jaw
      digital_behavior: screenshot
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_somatic_03
    line: You handed in the paper. The breath did not lengthen. The grade arrived.
      The body did not register relief — because the layer the body had been waiting
      to be addressed was never part of the credential exchange.
    metadata:
      semantic_family: breath-grade-mismatch
      loop_type: grade_no_relief
      body_register: breath
      digital_behavior: submission portal
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_somatic_04
    line: You watched the lecture at 2x speed. The stomach turned at the gap between
      the content and the world you would walk into after. You did not name the turning
      — because no ritual technology had been offered for what to do with the recognition.
    metadata:
      semantic_family: stomach-2x-recognition
      loop_type: speed_compression
      body_register: stomach
      digital_behavior: 2x speed playback
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_somatic_05
    line: You sat in the seminar and the shoulders would not soften. You looked around
      and saw five other students with the same shoulders — the bodies registering,
      all at once, the layer the room had not built for them.
    metadata:
      semantic_family: shoulders-collective
      loop_type: seminar_recognition
      body_register: shoulders
      digital_behavior: in-room observation
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: joshin_ed_witness_01
    line: Joshin has seen this exact loop in young students who arrive at the temple
      after a credentialing cycle. In Shingon's framework the friction is not motivation
      failure — it is the body registering that the curriculum has been delivering
      to one layer while three layers were waiting.
    metadata:
      semantic_family: three-layers-waiting
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_witness_02
    line: He has watched young people sit through the first Sanmitsu practice and
      feel, for the first time, body, speech, and mind being asked to do explicit
      work simultaneously. In his tradition the moment is not learning — it is delivery
      to layers that have been undelivered to.
    metadata:
      semantic_family: sanmitsu-delivery
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_witness_03
    line: He has guided cohorts who arrived convinced the credential was the curriculum.
      The first practice is letting the credential be set down inside the ritual
      hall — and what arrives in its place is the layer the credential was hiding.
    metadata:
      semantic_family: credential-laid-down
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_witness_04
    line: He has seen the moment when a young person realizes Sokushin Jobutsu — that
      the body inside the curriculum is already the site of the work. The reframe
      lands as something the surface-management curriculum cannot deliver.
    metadata:
      semantic_family: this-body-the-site
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_witness_05
    line: He has watched the shift when a young student stops treating the credential
      as the curriculum and lets the ritual technology begin to teach. In his tradition
      the shift is not anti-institutional — it is the body remembering what synchronization
      feels like.
    metadata:
      semantic_family: ritual-tech-teaches
      article_types:
      - hard_news_spiritual_response
