bridge:
  options:
  - id: joshin_ed_bridge_01
    line: 244 million children. UNESCO. The tracker measures enrollment, completion,
      and policy adoption. It does not measure what is delivered inside the classroom
      — whether body, speech, and mind are synchronized during the credential exchange,
      or whether the cohort receives a credential without the synchronization that
      makes the credential land.
    hidden_capacity: synchronize body, speech, and mind during the credential exchange
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_bridge_02
    line: The numbers show what has been built. They do not show the synchronization
      gap — the layers the institution has been training to pull against one another
      while the body that has to carry all three keeps accumulating cost. Joshin's
      Shingon practice addresses that accumulation directly.
    hidden_capacity: address the accumulated synchronization cost the tracker cannot
      measure
    metadata:
      semantic_family: synchronization-cost
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_bridge_03
    line: Frameworks track participation and completion. They do not track the layer
      underneath the credential — the body that the student is inside while the
      curriculum delivers to a different layer. Shingon's tradition makes the layer
      explicit and delivers technology directly to it.
    hidden_capacity: deliver technology to the layer the curriculum skips
    metadata:
      semantic_family: layer-skip-recovered
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_bridge_04
    line: Policy instruments scale credentials. They do not scale the Sanmitsu —
      the synchronization of mudra, mantra, and visualization — that addresses all
      three layers at once. The capacity the credential cannot deliver is exactly
      the capacity Shingon's tradition has been working on for centuries.
    hidden_capacity: scale the synchronization the credential cannot deliver
    metadata:
      semantic_family: scaling-sanmitsu
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_bridge_05
    line: The infrastructure is measurable. The Sokushin Jobutsu — the recognition
      that the body the student is inside is already the site of the work — is not.
      Joshin's tradition does not replace the infrastructure; it names the layer
      beneath it and offers explicit ritual technology for the cohort the infrastructure
      is trying to serve.
    hidden_capacity: name and address the layer the infrastructure cannot reach
    metadata:
      semantic_family: sokushin-vs-infrastructure
      article_types:
      - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: joshin_ed_perspective_01
    header: What Joshin Sees
    paragraphs:
    - Joshin does not tell young students to study harder as if the friction were
      a motivation deficit. In Shingon's framework the friction is the body asking
      for synchronization — Sanmitsu, the simultaneous engagement of body, speech,
      and mind — that the curriculum has been refusing to deliver. The problem is
      not the cohort. The problem is the absence of explicit ritual technology for
      the layer underneath the credential.
    - From there he turns to Sokushin Jobutsu. The Shingon premise that this body,
      now, is the site of the work refuses to defer the inner work to a later self
      the credential is preparing. The body the student is inside is already where
      synchronization can happen, and the practice is the explicit technology that
      delivers to that body directly.
    - That matters because what feels like a personal failure of focus is, in his
      framework, accurate response to a synchronization gap. The reframe does not
      remove the deadline — it places the deadline inside an architecture that includes
      the layer the credential alone has been skipping.
    metadata:
      semantic_family: teacher-diagnosis
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_perspective_02
    header: What Joshin Sees
    paragraphs:
    - In Joshin's tradition the body's contraction inside the curriculum is information,
      not malfunction. It is the body registering that the institution has been delivering
      to one layer while three layers were waiting to be addressed. The Shingon answer
      is Sanmitsu — the simultaneous use of mudra (hand seal), mantra (true word),
      and mandala (visualization) to give all three layers explicit work at once.
    - For a phone-native student, the explicit, embodied nature of these tools is
      part of the point. Mudra grounds the body — fingers do something the LMS cannot
      ask of them. Mantra addresses the speech layer — the throat is asked to do
      something the platform script does not require. Mandala holds the mind in a
      structured field that the algorithm cannot generate.
    - The result is not relaxation in the modern sense. It is the explicit re-alignment
      of layers that have been operating against each other inside the credential
      cycle. The body registers the alignment as relief, but the relief is the side
      effect; the technology was always doing the alignment work directly.
    metadata:
      semantic_family: sanmitsu-mechanism
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_perspective_03
    header: What Joshin Sees
    paragraphs:
    - Goma is the Shingon fire ritual — an explicit ceremony for non-cognitive release
      of accumulated load. The credential cycle has been training young students
      to absorb material without an explicit channel for releasing the friction the
      absorption produces. Over years, the friction accumulates in a layer the LMS
      cannot reach.
    - Goma can. The fire is the receiver. The ritual structure provides explicit
      permission and explicit container — what is offered is offered for transmutation,
      not for analysis or judgment. The student's body registers the receiving before
      the student's mind has language for what just happened.
    - In Joshin's framework this is not therapy and not entertainment. It is ritual
      technology that has been refined for over a millennium for precisely the kind
      of accumulated, unaddressed load that the credential-management culture builds
      up. The fact that the modern institution has no equivalent is not a defect
      of the cohort — it is a vocabulary the institution has not been designed to
      hold.
    metadata:
      semantic_family: goma-mechanism
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_perspective_04
    header: What Joshin Sees
    paragraphs:
    - Sokushin Jobutsu — Buddhahood in this very body — is the load-bearing Shingon
      premise. It refuses to defer the inner work to a later self that the credential
      is preparing. The body the student is inside now is, in the framework, already
      where the practice meets the load.
    - For a generation that has been trained to treat the credential as the unit
      of work and the body that carries the credential as background, this reframe
      is structurally different. The modern institution assumes the work is on the
      credential. Shingon assumes the work is on the synchronization, and the credential
      is what gets delivered to the surface after the synchronization has happened.
    - The reframe does not promise the deadline lifts. It promises the layer that
      has been doing the carrying is recognized as the site of the actual work and
      receives explicit technology for the synchronization the credential cycle has
      been skipping.
    metadata:
      semantic_family: sokushin-reframe
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ed_perspective_05
    header: What Joshin Sees
    paragraphs:
    - The principle Joshin returns to is that education was never meant to be only
      credential delivery. It was meant to be synchronized transmission — body, speech,
      and mind brought into one field through explicit practice. When any one of
      the three is missing, the credential remains and the synchronization does not
      arrive.
    - In his framework the modern institution has become very good at the credential
      and increasingly unable to deliver the synchronization. That gap is not the
      institution's fault alone — it is what happens when the practice technology
      thins faster than the institution can replace it. Shingon has carried the
      technology across centuries.
    - For a phone-native cohort, the question is not whether to abandon the credential.
      The question is whether the synchronization technology can be made available
      alongside it. Joshin teaches that it can be — and that the layer the credential
      cycle skips is exactly the layer the tradition has been working on for centuries.
    metadata:
      semantic_family: synchronization-technology
      article_types:
      - hard_news_spiritual_response
