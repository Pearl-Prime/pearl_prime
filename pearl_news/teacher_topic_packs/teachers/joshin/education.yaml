bridge:
  options:
  - id: bridge_01
    line: 410 workshops. 27 cities. The tracker measures what students and teachers are already changing. It has no column for what made the next return to the work possible after another day of fragmentation — the capacity to align body, speech, and mind long enough for one thing to land without making interruption your identity. The student who opened the portal and came back needed it. Joshin Sensei's Shingon tradition has language and practice for that alignment.
    hidden_capacity: align body, speech, mind for one thing to land
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: Education trackers count programs and outcomes. They do not count the inner alignment that lets a young person stay with the task when the system keeps scattering attention. That alignment — Sanmitsu in Shingon terms — is what the next study session needs. It is what the reader who came back to the portal needs too. Joshin Sensei's tradition has been developing it for over a millennium.
    hidden_capacity: stay with the task when the system scatters
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Joshin Sensei Sees
    paragraphs:
    - Joshin would begin by separating fragmentation from identity. In Shingon, the body, speech, and mind are meant to work as one. When the learning environment keeps pulling them apart, the problem is not that the student is broken. The problem is that the conditions are hostile to the very alignment that learning requires.
    - Sanmitsu here is not productivity language. It is the discipline of bringing the three mysteries back into one gesture so attention can land on one thing long enough to learn. Right effort in this frame is not grind. It is the capacity to return again after the tab switch, without turning that return into proof of failure.
    - 'That makes the reframe precise: what feels like a personal fault — me, broken, wrong — is often accurate response to a system and institutional structure that were never designed for sustained attention. The practice is to make this body the site of return, not the site of blame.'
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Joshin Sensei Sees
    paragraphs:
    - Joshin Sensei reads education stress through Sokushin Jobutsu — Buddhahood in this very body. The student who cannot focus is not defective. This body, in this moment, can be the place where focus returns. The tradition does not ask you to leave the body to learn. It asks you to align it.
    - From there he turns to Sanmitsu. The question is not how to never get distracted. The question is how to bring body, speech, and mind back into one gesture when the portal and the chat have pulled them apart. That realignment is what makes the next paragraph possible.
    - In that frame, self-blame softens. The fault is not yours — not a broken self, not a confused mind. The problem is that institutions and policy systems keep designing for attention that no human nervous system can sustain. Shingon gives a method to hold the line in this body anyway.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
