topic_fit:
  fit_level: primary
  fit_reason: Gig schedule, precarity, and credential-vs-work friction land in body,
    speech, and mind simultaneously, and the inherited toolkit treats each privately.
    Shingon's Sanmitsu ritual technology is built for three-layer load addressed
    at once.
  forbidden_angles:
  - do not reduce to generic productivity
  - do not frame as personal motivation problem
  - do not use Zen framing
hook_personal:
  options:
  - id: joshin_ew_hook_personal_01
    line: The schedule app refreshed and you took the shift before you noticed the
      jaw locking. The body had already done the math. The mind has been arguing
      with itself for a week. The speech layer has not said the thing it needs to
      say. Three layers were activated; one tool was available.
    metadata:
      semantic_family: three-layers-schedule
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_hook_personal_02
    line: You did the productivity course. You did the financial literacy module.
      The chest is still tight on Sunday night. The toolkit you were given was working
      on the surface; the layer underneath has been carrying the precarity by itself.
    metadata:
      semantic_family: surface-tools-underneath-load
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_hook_personal_03
    line: At 1 a.m. you check whether the AI-replacement article from the morning
      was right. The throat is tight, the mind is running, the body has not moved
      in two hours. Three layers carrying one question, with no synchronization technology
      available.
    metadata:
      semantic_family: midnight-ai-three-layers
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_hook_personal_04
    line: You are exhausted in a way the side hustle advice does not touch. The body
      the cohort is inside now is the site of the work that is happening, and the
      productivity toolkit has been treating that body as the obstacle to the work
      rather than the work itself.
    metadata:
      semantic_family: body-as-site-not-obstacle
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_hook_personal_05
    line: A part of you knows the question is not how to optimize the schedule. The
      question is whether body, speech, and mind are being delivered to as one synchronized
      field — and Shingon's tradition has explicit ritual technology for that delivery,
      even inside the schedule app cycle.
    metadata:
      semantic_family: ritual-tech-inside-schedule
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: joshin_ew_hook_big_01
    line: Youth work load is not only about hours. It is what three-layer pressure
      — body, speech, and mind running on schedule-app time while the inherited toolkit
      addresses one layer at a time — does to a cohort over years.
    metadata:
      semantic_family: three-layer-schedule
      angle: cultural-frame
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_hook_big_02
    line: A generation is being asked to carry precarity, credential anxiety, and
      AI-replacement uncertainty simultaneously, and the inherited frameworks treat
      each privately. Shingon's tradition reads this as a synchronization gap with
      explicit ritual technology, not a private failure to perform.
    metadata:
      semantic_family: synchronization-framing
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_hook_big_03
    line: In Japan especially, honne/tatemae has been thickened by the platform-work
      architecture — the real exhaustion underneath is wider than any prior generation
      has had to carry while the surface still has to be performed in the team
      chat.
    metadata:
      semantic_family: honne-tatemae-work
      angle: cultural-architecture
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_hook_big_04
    line: Shingon's premise — Sokushin Jobutsu, Buddhahood in this very body — refuses
      to defer the work to a later self that the credential or the career arc is
      preparing. The body the cohort is inside now, between shifts, is the site of
      the actual practice.
    metadata:
      semantic_family: sokushin-jobutsu-now
      angle: doctrine-frame
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_hook_big_05
    line: What gets read as work disengagement is often the body refusing to keep
      managing the surface while the synchronization technology has never been delivered.
      Shingon has carried that technology for centuries; the modern toolkit has not.
    metadata:
      semantic_family: disengagement-misread
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: joshin_ew_intro_01
    line: Joshin, a priest in the Shingon Esoteric Buddhist tradition (Mikkyo), has
      worked inside ritual halls with young people in precarious work cycles for
      decades. He has watched what the schedule-app loop does to a cohort that has
      not received the synchronization technology.
    metadata:
      semantic_family: identity-seen-shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_intro_02
    line: Joshin teaches inside the Shingon lineage. He does not position himself
      as a labor reformer — he is a ritual technologist whose tradition has, for
      over a millennium, addressed the body/speech/mind synchronization the schedule
      and the productivity course do not deliver.
    metadata:
      semantic_family: ritual-technologist
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_intro_03
    line: Joshin works from Sokushin Jobutsu — Buddhahood in this very body. There
      is no deferred self the career arc is preparing. The body the cohort is inside
      between shifts is already the site of the work.
    metadata:
      semantic_family: sokushin-jobutsu-frame
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_intro_04
    line: Joshin has watched young people arrive at the temple after years of schedule-app
      precarity. In Shingon's framework the friction is not motivation failure; it
      is the body asking for the synchronization that the productivity toolkit has
      not delivered.
    metadata:
      semantic_family: synchronization-asked-for
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_intro_05
    line: Joshin is fluent in platform and pressure. His Shingon practice reframes
      esoteric Buddhism as a technology stack precisely suited to a cohort whose
      work life is the schedule app and whose inner state has been treated as a deferred
      problem to be solved with another module.
    metadata:
      semantic_family: esoteric-as-tech-stack
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
youth_somatic:
  options:
  - id: joshin_ew_somatic_01
    line: You opened the schedule app at 10 p.m. The jaw locked. You took the shift.
      The breath did not lengthen afterwards because the next shift was already arriving
      to the same body.
    metadata:
      semantic_family: schedule-jaw-shift
      loop_type: schedule_loop
      body_register: jaw
      digital_behavior: schedule app refresh
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_somatic_02
    line: The notification said the rate was changing. The chest tightened. You did
      not say anything in the team chat — the speech layer had no register for what
      had just happened — and the mind began arguing with the platform's logic.
    metadata:
      semantic_family: rate-change-three-layers
      loop_type: platform_rate
      body_register: chest
      digital_behavior: rate change notification
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_somatic_03
    line: You watched the AI-replacement article and the stomach turned. The throat
      closed around the thing you could not say to the family at dinner. The breath
      shortened. Three layers registered the load; none received an explicit tool.
    metadata:
      semantic_family: ai-stomach-throat-breath
      loop_type: ai_anxiety
      body_register: stomach
      digital_behavior: article reading
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_somatic_04
    line: You took the second shift in a row and the shoulders would not soften.
      The mind kept tracking what the next two weeks would have to cover. The body
      had been doing the math of precarity for years without an explicit synchronization
      tool.
    metadata:
      semantic_family: precarity-math-no-sync
      loop_type: double_shift
      body_register: shoulders
      digital_behavior: shift confirmation
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_somatic_05
    line: At 6 a.m. before the morning shift you sat in the bathroom. The jaw locked.
      The throat was silent. The mind was running the day in advance. The platform
      had given you optimization tips for none of these layers.
    metadata:
      semantic_family: predawn-shift-three-layers
      loop_type: predawn_shift
      body_register: jaw
      digital_behavior: in-room observation
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: joshin_ew_witness_01
    line: Joshin has seen this exact loop in young people who arrive at the temple
      after the schedule-app cycle. In Shingon's framework the friction is not motivation
      failure — it is the body asking for the synchronization the productivity tools
      have not delivered.
    metadata:
      semantic_family: synchronization-asked
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_witness_02
    line: He has watched young people sit through their first Goma fire ritual under
      precarity load and feel, for the first time, that what the schedule app has
      been accumulating in the body has an explicit channel for release. In his tradition
      the moment is not catharsis as performance; it is the explicit ritual technology
      working.
    metadata:
      semantic_family: goma-receives-precarity
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_witness_03
    line: He has guided cohorts through their first Sanmitsu — the synchronization
      of mudra, mantra, and visualization — between shifts and watched the moment
      when body, speech, and mind stop pulling against one another. In his tradition
      that is not relaxation; it is the technology delivering to three layers at
      once.
    metadata:
      semantic_family: sanmitsu-between-shifts
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_witness_04
    line: He has seen the moment when a young person stops trying to argue themselves
      out of precarity and lets a mantra carry the layer the argument cannot reach.
      In his tradition the moment is not surrender — it is the ritual technology
      doing what the productivity course was not built to do.
    metadata:
      semantic_family: mantra-under-precarity
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_witness_05
    line: He has watched the shift when a young person registers Sokushin Jobutsu
      — that the body the cohort is inside now, between shifts, is already where
      the practice meets the load. The reframe lands as something the surface productivity
      vocabulary cannot deliver.
    metadata:
      semantic_family: this-body-the-site
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: joshin_ew_turnaround_01
    stat_line_1: 73 million unemployed. ILO 2024.
    stat_line_2: The International Labour Organization estimates 73 million young
      people unemployed globally in 2024 — a figure that has framed the new ILO
      Youth Employment Programme and the Fair Workweek movement.
    metadata:
      semantic_family: ilo-baseline
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_turnaround_02
    stat_line_1: Fight for $15. 11 states + DC.
    stat_line_2: The Fight for $15 movement has secured minimum-wage increases in
      eleven US states plus Washington DC — translating youth-led pressure into
      enacted labor policy.
    metadata:
      semantic_family: fight-for-15-scale
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_turnaround_03
    stat_line_1: 1,200+ cooperatives. USFWC.
    stat_line_2: The US Federation of Worker Cooperatives now coordinates more than
      twelve hundred worker-owned cooperatives, building an infrastructure for non-precarious
      work that did not exist at this scale a decade ago.
    metadata:
      semantic_family: usfwc-cooperative-network
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_turnaround_04
    stat_line_1: 7 US cities + Oregon. Fair Workweek.
    stat_line_2: Fair Workweek scheduling laws are now active in seven US cities
      plus Oregon statewide — translating schedule-app pressure into enforceable
      worker rights legislation.
    metadata:
      semantic_family: fair-workweek-laws
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_turnaround_05
    stat_line_1: 27 EU states. Platform Workers Directive.
    stat_line_2: The European Union Platform Workers Directive, adopted in 2024,
      binds twenty-seven member states to reclassify platform workers and address
      algorithmic management — multilateral labor protection that did not exist
      a generation ago.
    metadata:
      semantic_family: eu-platform-directive
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: joshin_ew_bridge_01
    line: 73 million unemployed. ILO. The tracker measures labor market participation.
      It does not measure the three-layer load — body, speech, and mind held simultaneously
      under precarity — that each worker is carrying between shifts. Joshin's Shingon
      practice addresses that load directly through Sanmitsu.
    hidden_capacity: synchronize body, speech, and mind under precarity
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_bridge_02
    line: The numbers show what has been built. They do not show what each young
      worker carries privately at the end of a double shift — the surface management
      cost that the schedule app and the team chat and the family expectation have
      been accumulating in the same body. Goma fire ritual addresses that accumulation
      directly.
    hidden_capacity: release accumulated precarity load the trackers cannot measure
    metadata:
      semantic_family: goma-precarity-release
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_bridge_03
    line: Policy frameworks track wages and scheduling. They do not track the synchronization
      gap — the body, speech, and mind pulling against one another for years inside
      the platform-work loop. Shingon's tradition makes the gap explicit and delivers
      technology directly to the three layers.
    hidden_capacity: deliver to all three layers at once
    metadata:
      semantic_family: three-layer-delivery
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_bridge_04
    line: The data capture labor markets and policy adoption. They cannot capture
      the moment a young worker sits inside Sanmitsu and feels body, speech, and
      mind stop pulling against one another for the first time in years. In Joshin's
      framework that moment is the relief no tracker reports.
    hidden_capacity: register what the trackers cannot show
    metadata:
      semantic_family: explicit-sync-recognition
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_bridge_05
    line: The infrastructure is measurable. The Sokushin Jobutsu — the recognition
      that this body, now, between shifts, is the site of the work — is not. Joshin's
      tradition does not replace the infrastructure; it names the layer beneath
      it and offers explicit ritual technology for the cohort the infrastructure
      is trying to serve.
    hidden_capacity: name and address the layer the infrastructure cannot reach
    metadata:
      semantic_family: sokushin-vs-infrastructure
      article_types:
      - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: joshin_ew_perspective_01
    header: What Joshin Sees
    paragraphs:
    - Joshin does not tell young workers to manage their time better as if the friction
      were a scheduling defect. In Shingon's framework the friction is the body asking
      for synchronization — Sanmitsu, the simultaneous engagement of body, speech,
      and mind — that the productivity toolkit has been refusing to deliver. The
      problem is not the cohort. The problem is the absence of explicit ritual technology
      for the load the cohort is carrying.
    - From there he turns to Sokushin Jobutsu. The Shingon premise that this body,
      now, is the site of the work refuses to defer the inner work to a later self
      that the career arc is preparing. The body the cohort is inside between shifts
      is already where the practice meets the load.
    - That matters because what feels like personal failure is, in his framework,
      accurate response to a synchronization gap. The reframe does not remove the
      schedule app — it places the schedule inside an architecture that includes
      the layer the productivity toolkit has been skipping.
    metadata:
      semantic_family: teacher-diagnosis
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_perspective_02
    header: What Joshin Sees
    paragraphs:
    - In Joshin's tradition precarity load is read as information about which layers
      have been activated. The jaw locks — body. The throat closes — speech. The
      mind runs — mind. The productivity toolkit has been addressing one layer at
      a time. Sanmitsu addresses all three with explicit, embodied work simultaneously.
    - For a phone-native cohort, the explicit, embodied nature of Sanmitsu is part
      of the point. Mudra grounds the body — fingers do something the schedule app
      cannot ask of them. Mantra addresses the speech layer — the throat is asked
      to do something the team chat does not require. Mandala holds the mind in a
      structured field that the algorithm cannot generate.
    - The result is not work optimization. It is the explicit re-alignment of layers
      that have been pulling against each other under sustained precarity pressure.
      The body registers the alignment as relief; the technology was always doing
      the alignment work directly.
    metadata:
      semantic_family: sanmitsu-mechanism
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_perspective_03
    header: What Joshin Sees
    paragraphs:
    - Goma is the Shingon fire ritual — explicit, non-cognitive release for accumulated
      load. The schedule-app cycle has been training the cohort to absorb precarity
      without an explicit channel for releasing the friction the absorption produces.
      Over years, the friction accumulates in a layer the productivity course cannot
      reach.
    - Goma can. The fire is the receiver. The ritual structure provides explicit
      permission and explicit container — precarity load is offered for transmutation,
      not for analysis or judgment. The cohort's body registers the receiving before
      the cohort's mind has language for what just happened.
    - In Joshin's framework this is not work avoidance and not work performance. It
      is ritual technology that has been refined for over a millennium for the kind
      of accumulated, unaddressed load that the productivity-management culture builds
      up.
    metadata:
      semantic_family: goma-mechanism
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_perspective_04
    header: What Joshin Sees
    paragraphs:
    - Sokushin Jobutsu — Buddhahood in this very body — is the load-bearing Shingon
      premise. It refuses to defer the inner work to a later self that the career
      arc is preparing. The body the cohort is inside now, between shifts, is, in
      the framework, already where the practice meets the load.
    - For a generation that has been trained to treat the body that carries the work
      as background and the credential or career as the unit of work, this reframe
      is structurally different. The modern toolkit assumes the work is on the productivity
      output. Shingon assumes the work is on the synchronization, and the productivity
      is what gets delivered after the synchronization has happened.
    - The reframe does not promise the precarity lifts. It promises the layer that
      has been doing the carrying is recognized as the site of the actual work and
      receives explicit technology for the synchronization the modern toolkit has
      been skipping.
    metadata:
      semantic_family: sokushin-reframe
      article_types:
      - hard_news_spiritual_response
  - id: joshin_ew_perspective_05
    header: What Joshin Sees
    paragraphs:
    - The principle Joshin returns to is that precarity load is a synchronization
      problem dressed up as a personal symptom. Body, speech, and mind have been
      asked to run on schedule-app time simultaneously, and the inherited toolkit
      has been addressing one layer at a time.
    - Shingon's contribution is the technology for the synchronization itself. Sanmitsu
      addresses all three layers at once. Goma releases accumulated precarity load
      that the surface has refused. The ritual structure provides the explicit container
      that the platform cannot generate.
    - For a phone-native cohort under sustained precarity load, the question is not
      whether to abandon the schedule app. The question is whether the synchronization
      technology can be made available alongside it. Joshin teaches that it can be
      — and that the layer the modern toolkit cannot reach is the layer the tradition
      has been working on for centuries.
    metadata:
      semantic_family: synchronization-technology
      article_types:
      - hard_news_spiritual_response
