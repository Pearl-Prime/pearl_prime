bridge:
  options:
  - id: bridge_01
    line: '1,240 cases. 32 cities. The tracker measures what young workers challenged.
      It has no column for what made the next filing or shift negotiation possible
      after another unstable week — the capacity to stay steady enough to act without
      turning precarity into identity. The person who took the screenshot needed that.
      Joshin Sensei''s Shingon tradition has a name for what remains when conditions
      shift: Rigu no Jobutsu, inherent awakened worth. The practice is to protect
      it in this body, under pressure.'
    hidden_capacity: stay steady enough to act without precarity as identity
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: Labor trackers count cases and policy wins. They do not count the inner
      alignment that lets a young person show up for the next shift or the next meeting
      without handing their whole sense of worth over to the schedule. That alignment
      — body, speech, and mind in one gesture — is what the next filing needs. It
      is what the worker who refreshed the app needs too. Joshin Sensei's tradition
      has been practising it for over a millennium.
    hidden_capacity: show up without handing worth over to the schedule
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Joshin Sensei Sees
    paragraphs:
    - Joshin would begin by separating instability from identity. In Shingon, Rigu
      no Jobutsu means that awakened nature is already present. It is not created
      by stable employment or destroyed by a bad schedule. Suffering grows when changing
      conditions are internalized as proof of personal failure.
    - Sanmitsu here is not grind language. It is the discipline of bringing body,
      speech, and mind into one gesture when the world keeps shifting — so the next
      move is possible without the whole self collapsing into the volatility.
    - 'That makes the reframe precise: what feels like a personal fault -- me, broken,
      wrong -- is often accurate response to an economy built on instability. The
      problem is that a system and institutional structure keep generating what the
      individual then carries alone. The practice is to make this body the site of
      steadiness, not the site of blame.'
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Joshin Sensei Sees
    paragraphs:
    - Joshin Sensei reads work precarity through Sokushin Jobutsu — Buddhahood in
      this very body. The worker who cannot find stability is not defective. This
      body, in this moment, can be the place where dignity and action meet, regardless
      of what the schedule does next.
    - From there he turns to Sanmitsu. The question is not how to never feel the drop
      when the app updates. The question is how to align body, speech, and mind so
      the next move is still yours — file the case, show up for the shift, or simply
      breathe without turning the volatility into identity.
    - In that frame, self-blame softens. The problem is not that young people lack
      resilience or that I am wrong for feeling unstable. The problem is that the
      economy functions as a system that keeps outsourcing instability onto individual
      nervous systems. Shingon gives a method to hold the line in this body anyway.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
