teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei, a Shingon teacher in the Mikkyo lineage, has watched in practice
      sessions young people carry work instability as if it were a verdict on character.
      They are not asking only how to work harder. They are asking how to stop turning
      volatility into self-blame — and how to keep body, speech, and mind aligned
      enough to act when the schedule keeps changing.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Joshin Sensei, a Shingon Buddhist teacher, has seen in the practice hall
      what precarious work does to young people. Students and workers are not asking
      whether effort matters. They are asking how to stay steady enough to make the
      next move when the system keeps refusing to hold still.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
