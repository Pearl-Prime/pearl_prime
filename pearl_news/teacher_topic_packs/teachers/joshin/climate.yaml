bridge:
  options:
  - id: tracker_capacity_01
    line: 2,666 cases. 51 jurisdictions. The tracker measures what young people did.
      It has no column for what made the next filing possible after the last delay
      — the capacity to align body, speech, and mind enough to act again when the
      system keeps not responding. The organizer who filed the next case needed it.
      So does the person who read the update, closed the app, and opened it again.
      Joshin Sensei's Shingon tradition has been developing that alignment for over
      a millennium.
    hidden_capacity: align body, speech, and mind enough to act again
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: tracker_capacity_02
    line: Climate trackers count cases, targets, and thresholds. They do not count
      the inner alignment that lets a young person stay in contact with the truth
      long enough to act again after another institutional delay. That alignment —
      body, speech, mind in one gesture — is what the next organizer needs. It is
      what the reader who reopened the app needs too. Joshin Sensei's tradition calls
      it Sanmitsu, and it is available in this body, now.
    hidden_capacity: stay in contact with truth without losing function
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
    - commentary
teacher_perspective:
  options:
  - id: sokushin_sanmitsu_01
    header: What Joshin Sensei Sees
    paragraphs:
    - 'Shingon has a precise frame for this kind of pressure: Sokushin Jobutsu — Buddhahood
      in this very body. The body that reads the climate update is not malfunctioning.
      It is accurately perceiving the mismatch between reassurance and reality. The
      tradition does not ask you to leave this body to find peace. It asks you to
      make this body the site of clarity and action.'
    - 'Joshin pairs that with Sanmitsu: the three mysteries — body (mudra), speech
      (mantra), and mind (visualization) aligned at once. When climate news scatters
      attention, the practice is not to think your way out. It is to bring the three
      back into one gesture. That realignment is what makes the next act possible.'
    - 'The shift matters here: what feels like a personal fault -- me, broken, wrong
      -- is often accurate response to a system and institutional structure shaped
      by delay. The mind stops calling itself broken when it sees that the real disorder
      is outside it, and the body becomes the first place where order can return.'
    semantic_family: sokushin-sanmitsu
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: sokushin_sanmitsu_02
    header: What Joshin Sensei Sees
    paragraphs:
    - Joshin Sensei reads climate panic through Rigu no Jobutsu — inherent awakened
      worth. The urgency you feel is not an error signal. It is the clarity that was
      always there, now responding to danger.
    - From there he turns to Sanmitsu. The question is not how to feel calm all day.
      The question is how to align body, speech, and mind in the moment when the next
      update lands, so attention is not consumed by helpless repetition.
    - In that frame, self-blame softens. The problem is not that young people care
      too much or that I am wrong for feeling it. The problem is that a system and
      institutional structure keep outsourcing unbearable delay onto individual nervous
      systems. Shingon gives a method to hold the line in this body anyway.
    semantic_family: sokushin-sanmitsu-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
    - commentary
