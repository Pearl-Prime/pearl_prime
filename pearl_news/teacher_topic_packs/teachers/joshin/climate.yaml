topic_fit:
  fit_level: primary
  fit_reason: Climate witness load lands in body, speech, and mind simultaneously
    and the modern toolkit addresses only one at a time. Shingon's Sanmitsu technology
    — explicit body/speech/mind synchronization — is built for exactly this kind
    of three-layer load.
  forbidden_angles:
  - do not reduce to generic eco-anxiety
  - do not frame as personal motivation problem
  - do not use Zen framing
hook_personal:
  options:
  - id: joshin_cl_hook_personal_01
    line: You read the climate update and three things happen at once. The body contracts.
      The mind argues with the data and with itself. The speech layer goes silent
      because there is nothing safe to say to the room you are in. No single tool
      addresses all three.
    metadata:
      semantic_family: three-layers-one-update
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_hook_personal_02
    line: You scroll past the wildfire footage. The jaw locks. You say something flat
      in the group chat. The mind keeps running. The toolkit you were given — breathing
      apps, screening prompts — was designed for one of the three layers, not the
      three pulling against each other.
    metadata:
      semantic_family: toolkit-one-layer
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_hook_personal_03
    line: At 1 a.m. the chest is tight, the throat is tight, the mind is repeating
      the same five clauses about the deadline the planet is on. The body the cohort
      is inside has been carrying climate witness without an explicit ritual technology
      for the synchronization the witness requires.
    metadata:
      semantic_family: midnight-three-layer
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_hook_personal_04
    line: You are exhausted in a way that climate optimization apps do not touch.
      The recycling list and the carbon calculator are addressing a different layer
      than the one the body has been carrying. The Buddha-nature in this body, in
      the Shingon framework, has been waiting for explicit address.
    metadata:
      semantic_family: buddha-nature-waiting
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_hook_personal_05
    line: A part of you knows the question is not whether you are doing enough as
      an individual. The question is whether the body, speech, and mind that have
      been carrying climate witness for years are being delivered to as a synchronized
      field — and Shingon's tradition has explicit ritual technology for that delivery.
    metadata:
      semantic_family: ritual-tech-question
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: joshin_cl_hook_big_01
    line: Youth climate load is not only about symptoms. It is what three-layer pressure
      — body, speech, and mind asked to hold the planetary scale simultaneously —
      does to a cohort when the toolkit available addresses only one layer at a
      time.
    metadata:
      semantic_family: three-layer-pressure
      angle: cultural-frame
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_hook_big_02
    line: A generation is being asked to carry climate witness across body, speech,
      and mind while the inherited frameworks treat each layer privately. Shingon's
      tradition reads this as a synchronization problem with explicit ritual technology,
      not a private failure to cope.
    metadata:
      semantic_family: synchronization-framing
      angle: structural-gap
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_hook_big_03
    line: In Japan especially, honne/tatemae has been thickened by the climate news
      cycle — the real feeling required underneath is wider than any prior generation
      has had to carry, and the surface still has to be performed. The architecture
      is not the cohort's failure.
    metadata:
      semantic_family: honne-tatemae-climate
      angle: cultural-architecture
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_hook_big_04
    line: Shingon's premise — Sokushin Jobutsu, Buddhahood in this very body — refuses
      to defer the climate work to a later self. The body the cohort is inside now
      is the site where the synchronization either happens or does not, and the technology
      addresses that body directly.
    metadata:
      semantic_family: sokushin-jobutsu-now
      angle: doctrine-frame
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_hook_big_05
    line: What gets read as climate apathy is often the opposite — three layers carrying
      the load without an explicit technology to synchronize the response. Shingon
      has carried that technology for centuries, and the modern climate toolkit has
      not.
    metadata:
      semantic_family: apathy-misread
      angle: collective-field
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: joshin_cl_intro_01
    line: Joshin, a priest in the Shingon Esoteric Buddhist tradition (Mikkyo), has
      worked inside ritual halls with young people for decades. He has watched what
      climate witness load does to a cohort when the synchronization technology has
      not been transmitted.
    metadata:
      semantic_family: identity-seen-shift
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_intro_02
    line: Joshin teaches inside the Shingon lineage. He does not position himself
      as a climate activist in the policy sense — he is a ritual technologist whose
      tradition has, for over a millennium, treated body, speech, and mind as one
      synchronized field with explicit technology for adjustment.
    metadata:
      semantic_family: ritual-technologist
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_intro_03
    line: Joshin works from Sokushin Jobutsu — Buddhahood in this very body. There
      is no deferred self the climate work is preparing. The body the cohort is inside
      now is the site of the work, and Shingon's technology addresses that body
      directly.
    metadata:
      semantic_family: sokushin-jobutsu-frame
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_intro_04
    line: Joshin has watched young people arrive at the temple worn down by climate
      witness load across all three layers. In Shingon's framework the friction is
      not character failure; it is the cohort asking for the synchronization the
      modern toolkit has not delivered.
    metadata:
      semantic_family: synchronization-asked-for
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_intro_05
    line: Joshin is fluent in platform and pressure. His Shingon practice reframes
      esoteric Buddhism as a technology stack precisely suited to a cohort whose
      climate load is being held simultaneously in the chest, the throat, and the
      running mind.
    metadata:
      semantic_family: esoteric-as-tech-stack
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
youth_somatic:
  options:
  - id: joshin_cl_somatic_01
    line: You read the wildfire alert. The chest tightened. The throat locked. You
      did not say anything in the room you were in because no register was available.
      The body had been asked to do three things at once with one tool.
    metadata:
      semantic_family: chest-throat-no-register
      loop_type: climate_witness
      body_register: chest
      digital_behavior: reads the alert
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_somatic_02
    line: You scrolled past the temperature record. The jaw locked. The mind began
      arguing with the data and with itself. The breath shortened. Each layer was
      doing its own work and none of them were synchronized.
    metadata:
      semantic_family: jaw-mind-argue-breath
      loop_type: climate_witness
      body_register: jaw
      digital_behavior: rapid scroll
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_somatic_03
    line: You watched the flood footage. The stomach turned. The throat closed around
      what could not be said in the group chat. The breath shortened. Three layers
      registered the load, and none of them received an explicit tool.
    metadata:
      semantic_family: stomach-throat-breath-load
      loop_type: climate_witness
      body_register: stomach
      digital_behavior: video playback
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_somatic_04
    line: A friend sent the COP update at 11 p.m. You opened it. The body contracted.
      The mind began composing a flat reply and abandoned it. The breath did not
      lengthen. The platform had no register for what three layers had just registered.
    metadata:
      semantic_family: cop-no-register
      loop_type: climate_witness
      body_register: body-overall
      digital_behavior: flat reply abandoned
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_somatic_05
    line: You lay down and the shoulders would not soften. The mind kept replaying
      the day's headlines. The throat had been silent for hours. The body had been
      asking for synchronization, and the platform had only delivered more input.
    metadata:
      semantic_family: shoulders-replay-no-synchronization
      loop_type: sleep_resistance
      body_register: shoulders
      digital_behavior: lying down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: joshin_cl_witness_01
    line: Joshin has seen this exact loop in young people who arrive at the temple
      worn down by climate witness load. In Shingon's framework the friction is not
      pathology — it is the cohort asking for the synchronization the toolkit has
      not delivered.
    metadata:
      semantic_family: synchronization-asked
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_witness_02
    line: He has watched young people sit through their first Goma fire ritual and
      feel, for the first time, that climate witness load has been allowed to be
      offered to a structured container that can receive it. In his tradition the
      moment is not catharsis as performance; it is the explicit ritual release the
      body has been asking for.
    metadata:
      semantic_family: goma-receives-climate
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_witness_03
    line: He has guided cohorts through their first Sanmitsu — the synchronization
      of mudra, mantra, and visualization — under climate witness load and watched
      the moment when body, speech, and mind stop pulling against one another. In
      his tradition that is not relaxation; it is the explicit technology working.
    metadata:
      semantic_family: sanmitsu-under-climate
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_witness_04
    line: He has seen the moment when a young person stops trying to argue themselves
      out of climate dread and lets a mantra carry the layer the argument cannot
      reach. In his tradition the moment is not surrender — it is the ritual technology
      doing what the argument was not built to do.
    metadata:
      semantic_family: mantra-under-dread
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_witness_05
    line: He has watched the shift when a young person registers, for the first time,
      that the climate work is not a deferred performance but the synchronization
      of the body the cohort is inside now. The reframe lands as something the surface
      vocabulary cannot deliver.
    metadata:
      semantic_family: this-body-the-site
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: joshin_cl_turnaround_01
    stat_line_1: 7,500+ strikes. 185 countries.
    stat_line_2: Fridays for Future has organized more than seventy-five hundred
      climate strikes across one hundred eighty-five countries, building infrastructure
      that did not previously exist for sustained youth-led pressure on climate policy.
    metadata:
      semantic_family: fff-scale
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_turnaround_02
    stat_line_1: 7.6 million participants. Global Climate Strike 2019.
    stat_line_2: The September 2019 Global Climate Strike mobilized 7.6 million participants
      across one hundred fifty-plus countries — a coordinated cohort response that
      reframed climate as a youth-led civic project rather than a policy abstraction.
    metadata:
      semantic_family: global-strike-mobilization
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_turnaround_03
    stat_line_1: YOUNGO. UNFCCC.
    stat_line_2: YOUNGO is the official youth constituency of the UN Framework Convention
      on Climate Change — formal multilateral recognition of youth participation
      that did not exist a generation ago.
    metadata:
      semantic_family: youngo-formal-recognition
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_turnaround_04
    stat_line_1: $300 billion by 2035. COP loss-and-damage.
    stat_line_2: The COP28 ratification of the loss-and-damage fund commits to $300
      billion by 2035 for climate-vulnerable nations — a financial instrument that
      did not previously exist at this scale.
    metadata:
      semantic_family: cop-loss-and-damage
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_turnaround_05
    stat_line_1: 50,000 trained. Climate Reality. 170 countries.
    stat_line_2: The Climate Reality Project has trained more than fifty thousand
      climate leaders across one hundred seventy countries — translating climate
      witness into a global trained civic infrastructure.
    metadata:
      semantic_family: climate-reality-trained
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: joshin_cl_bridge_01
    line: 7,500 strikes. 185 countries. The tracker measures public mobilization.
      It does not measure the three-layer load — body, speech, and mind held simultaneously
      under climate witness — that each participant is carrying back into ordinary
      life. Joshin's Shingon practice addresses that load directly through Sanmitsu.
    hidden_capacity: synchronize body, speech, and mind under climate witness load
    metadata:
      semantic_family: tracker-capacity
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_bridge_02
    line: The numbers show what young people built. They do not show the layer underneath
      — the body that each organizer carries home after the strike, with the chest
      tight, the throat tight, and the mind running. Goma fire ritual is the explicit
      technology for what the mobilization data cannot capture.
    hidden_capacity: provide explicit release the mobilization data cannot capture
    metadata:
      semantic_family: goma-after-strike
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_bridge_03
    line: Policy frameworks track participation. They do not track the synchronization
      gap — the body, speech, and mind pulling against one another for years inside
      climate witness load. Shingon's tradition makes the gap explicit and delivers
      technology directly to the three layers at once.
    hidden_capacity: deliver to all three layers at once
    metadata:
      semantic_family: three-layer-delivery
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_bridge_04
    line: The data capture strikes, policy adoptions, and financial commitments.
      They cannot capture the moment a young person sits inside Goma and feels,
      for the first time, that climate witness load has an explicit channel for
      release. In Joshin's framework that channel is the relief no tracker reports.
    hidden_capacity: provide explicit channel the tracker cannot show
    metadata:
      semantic_family: explicit-channel
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_bridge_05
    line: The infrastructure is measurable. The Sokushin Jobutsu — the recognition
      that this body, now, is the site of the climate work — is not. Joshin's tradition
      does not replace the infrastructure; it names the layer beneath it and offers
      explicit ritual technology for the cohort the infrastructure is trying to serve.
    hidden_capacity: name and address the layer the infrastructure cannot reach
    metadata:
      semantic_family: sokushin-vs-infrastructure
      article_types:
      - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: joshin_cl_perspective_01
    header: What Joshin Sees
    paragraphs:
    - Joshin does not tell young people to calm down about the climate as if the
      fear were the mistake. In Shingon's framework the fear is precise information
      from a body that has been holding three layers of witness load without explicit
      synchronization. The problem is not the cohort. The problem is the absence
      of ritual technology for the layered load they are being asked to carry.
    - From there he turns to Sanmitsu — the simultaneous use of mudra, mantra, and
      mandala. The Shingon tradition uses Sanmitsu to address body, speech, and mind
      at once, with explicit, embodied tasks. For climate witness load that has been
      distributed across all three layers, this is the technology the modern toolkit
      has not been delivering.
    - That matters because what feels like personal failure to cope is, in his framework,
      accurate response to a synchronization gap. The Shingon premise — Sokushin
      Jobutsu, Buddhahood in this very body — refuses to defer the work. The body
      the cohort is inside now is the site of the synchronization, not the audience
      for a deferred climate self.
    metadata:
      semantic_family: teacher-diagnosis
      reframe_type: self_to_system
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_perspective_02
    header: What Joshin Sees
    paragraphs:
    - In Joshin's tradition climate witness load is read as information about which
      layers have been activated. The chest tightens — body. The throat closes —
      speech. The mind runs — mind. The toolkit available has been addressing one
      layer at a time. Sanmitsu addresses all three with explicit work simultaneously.
    - For a phone-native cohort, the explicit, embodied nature of Sanmitsu is part
      of the point. Mudra grounds the body — fingers do something the climate calculator
      cannot ask of them. Mantra addresses the speech layer — the throat is asked
      to do something the platform script does not require. Mandala holds the mind
      in a structured field that the algorithm cannot generate.
    - The result is not climate denial or climate optimism. It is the explicit re-alignment
      of layers that have been pulling against each other under sustained climate
      witness pressure. The body registers the alignment as relief; the technology
      was always doing the alignment work directly.
    metadata:
      semantic_family: sanmitsu-mechanism
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_perspective_03
    header: What Joshin Sees
    paragraphs:
    - Goma is the Shingon fire ritual — explicit, non-cognitive release for accumulated
      load. The climate news cycle has been training the cohort to absorb without
      an explicit channel for releasing the friction the absorption produces. Over
      years, the friction accumulates in a layer the platform cannot reach.
    - Goma can. The fire is the receiver. The ritual structure provides explicit
      permission and explicit container — climate witness load is offered for transmutation,
      not for analysis or judgment. The cohort's body registers the receiving before
      the cohort's mind has language for what just happened.
    - In Joshin's framework this is not climate avoidance and not climate performance.
      It is ritual technology that has been refined for over a millennium for the
      kind of accumulated, unaddressed load that the news-cycle-management culture
      builds up. The fact that the modern toolkit has no equivalent is not a defect
      of the cohort — it is a vocabulary the toolkit has not been built to hold.
    metadata:
      semantic_family: goma-mechanism
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_perspective_04
    header: What Joshin Sees
    paragraphs:
    - Sokushin Jobutsu — Buddhahood in this very body — is the load-bearing Shingon
      premise. It refuses to defer the climate work to a later self that the cohort
      is preparing through individual carbon optimization. The body the cohort is
      inside now is, in the framework, already where the climate work meets the load.
    - For a generation that has been trained to treat climate as a deferred problem
      and the body that carries the climate witness as background, this reframe is
      structurally different. The modern toolkit assumes the work is on the metric.
      Shingon assumes the work is on the synchronization, and the metric is what
      gets delivered after the synchronization has happened.
    - The reframe does not promise climate stability. It promises the layer that
      has been doing the carrying is recognized as the site of the actual work and
      receives explicit technology for the synchronization the modern toolkit has
      been skipping.
    metadata:
      semantic_family: sokushin-reframe
      article_types:
      - hard_news_spiritual_response
  - id: joshin_cl_perspective_05
    header: What Joshin Sees
    paragraphs:
    - The principle Joshin returns to is that climate witness load is a synchronization
      problem dressed up as a personal symptom. Body, speech, and mind have been
      asked to carry the planetary scale simultaneously, and the inherited toolkit
      has been addressing one layer at a time.
    - Shingon's contribution is the technology for the synchronization itself. Sanmitsu
      addresses all three layers at once. Goma releases accumulated load that the
      surface has refused. The ritual structure provides the explicit container that
      the platform cannot generate.
    - For a phone-native cohort under sustained climate witness load, the question
      is not whether to abandon the platform. The question is whether the synchronization
      technology can be made available alongside it. Joshin teaches that it can be
      — and that the layer the modern toolkit cannot reach is the layer the tradition
      has been working on for centuries.
    metadata:
      semantic_family: synchronization-technology
      article_types:
      - hard_news_spiritual_response
