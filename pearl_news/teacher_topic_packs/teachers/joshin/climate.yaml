teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei, a Shingon teacher in the Mikkyo lineage, has seen in the
      practice hall what climate news does to young people. Students are not asking
      how to feel peaceful. They are asking how to keep body, speech, and mind aligned
      enough to act when the world keeps delivering proof that adults waited too long.
    semantic_family: identity_seen_shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
    - commentary
  - id: teacher_intro_02
    line: Joshin Sensei, a Shingon Buddhist teacher, has watched in practice sessions
      climate fear arrive first as moral seriousness and then as the scattering of
      attention. Young people are not asking whether the crisis is real. They are
      asking how to bring body, speech, and mind back into one gesture when every
      update threatens to pull them apart.
    semantic_family: identity_seen_shift_alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
    - commentary
