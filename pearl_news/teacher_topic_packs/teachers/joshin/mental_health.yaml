  - id: teacher_witness_01
    line: Joshin Sensei has watched this exact loop in young people — the warning
      lands, thought speeds up, the phone goes down, and then the same pressure pulls
      the hand back again.
    semantic_family: loop-mirror
    loop_type: overwhelm_identity
