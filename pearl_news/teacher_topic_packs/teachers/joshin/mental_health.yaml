hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Youth mental overload is not only about symptom counts. It is about how
      speed, fragmentation, and pressure begin to colonize identity from the inside.
    semantic_family: system-pressure
    angle: systemic-pressure
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Joshin Sensei, a Shingon teacher in the Mikkyo lineage, has watched in practice
      sessions young people confuse overwhelm with who they are because the system
      never gives them enough space to separate the two. Students are not asking how
      to fake calm. They are asking how to stop living as if the storm is the self.
    semantic_family: identity-seen-shift
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
  - id: teacher_intro_02
    line: Joshin Sensei, a Shingon Buddhist teacher, has seen in the practice hall
      what mental overload does when it starts to name the whole person. Young people
      are not asking whether the pressure is real. They are asking how to find the
      part of themselves that was never the storm — body, speech, and mind in one
      gesture.
    semantic_family: identity-seen-shift-alt
    tone: grave
    intensity: 4
    article_types:
    - hard_news_spiritual_response
