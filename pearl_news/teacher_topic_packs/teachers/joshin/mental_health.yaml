bridge:
  options:
  - id: bridge_01
    line: '320 campuses. 18 countries. The tracker measures peer circles and campaigns.
      It has no column for what made the next honest reach possible after another
      week of overload — the clarity that lets the storm be real without letting it
      become identity. The person who put the phone down and picked it up again needed
      that. Joshin Sensei''s Shingon tradition has a name for it: the inherent awakened
      nature that the storm cannot finally erase.'
    hidden_capacity: clarity that the storm is not the self
    semantic_family: tracker-capacity
    article_types:
    - hard_news_spiritual_response
  - id: bridge_02
    line: Mental health trackers count programs and wait times. They do not count
      the inner alignment that lets a young person separate overwhelm from who they
      are — body, speech, and mind returning to one gesture. That alignment is what
      the next peer supporter needs. It is what the reader who reopened the app needs
      too. Joshin Sensei's tradition has been practising it for over a millennium.
    hidden_capacity: separate overwhelm from identity
    semantic_family: tracker-capacity-alt
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Joshin Sensei Sees
    paragraphs:
    - 'Joshin begins with a distinction: in Shingon, consciousness is larger than
      the storm moving through it. Rigu no Jobutsu means the inherent awakened worth
      is already present. The intensity is real. It is not the final name of the self.'
    - That is why his teaching does not aim at suppression. It aims at enough alignment
      — body, speech, mind — that the mind can stop treating every surge as identity
      and start reading it as overload under pressure.
    - The reframe matters. What feels like something wrong with me is often accurate
      response to systems and speeds that no nervous system should have to normalize.
      The practice is to return to the gesture that was never broken.
    semantic_family: teacher-diagnosis
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
  - id: teacher_perspective_02
    header: What Joshin Sensei Sees
    paragraphs:
    - 'Joshin Sensei reads mental overload through Sanmitsu: when the mind races,
      the body and speech go with it. The first move is not to think your way out.
      It is to bring the three mysteries back into one — mudra, mantra, visualization
      — so the storm has a container.'
    - 'Sokushin Jobutsu applies here: this body, in this moment, can be the site of
      clarity. The spiral is not proof that you are broken. It is proof that the system
      is overloading the very capacity that practice is designed to protect.'
    - In that frame, self-blame softens. The problem is not that young people are
      too sensitive or that I am wrong for feeling overloaded. The problem is that
      a system and institutional structure keep asking them to hold more than one
      nervous system should. Shingon gives a method to hold the line in this body
      anyway.
    semantic_family: teacher-diagnosis-alt
    reframe_type: self_to_system
    article_types:
    - hard_news_spiritual_response
