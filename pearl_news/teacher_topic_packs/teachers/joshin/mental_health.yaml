  - id: teacher_witness_02
    line: He has seen that sequence in students this year — the read, the race, the
      put-down, the return. The body and the device keep repeating what the mind cannot
      yet separate from identity.
    semantic_family: loop-mirror-alt
    loop_type: overwhelm_identity
    article_types:
    - hard_news_spiritual_response
