topic_fit:
  fit_level: primary
  fit_reason: Climate grief is not a personal failure of resilience. It is the qalb registering loss the institutions keep understating. The Naqshbandi practice is not to numb the registration but to let dhikr and sama hold the practitioner while the work continues.
  forbidden_angles:
  - do not reduce the issue to generic resilience
  - do not frame distress as personal weakness
  - do not promise the grief will be transcended
hook_personal:
  options:
  - id: maat_cl_hook_personal_01
    line: You care about the planet and still find yourself less able to stay with the next number long enough to decide what to do. The heart that keeps registering the loss is the same heart that needs to keep acting, and the gap between the two is where the grief lives.
    metadata:
      semantic_family: registration-action-gap
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_hook_personal_02
    line: You read the latest model and feel your stomach drop before you finish the sentence. The body has been carrying what the institutions keep softening, and the part of you that knows is the part that has been most exhausted by being right.
    metadata:
      semantic_family: body-knows-keeps-being-right
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_hook_personal_03
    line: You watched another season arrive too hot, too dry, too late, and felt the longing rise — for a planet that does not keep grieving itself in slow motion, for a future that can be loved without flinching from it.
    metadata:
      semantic_family: longing-for-future
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_hook_personal_04
    line: You closed the report tab and could not name what you felt. It was not panic and not numbness — something quieter, the part of the heart that has been registering for years without anywhere to put what it knows.
    metadata:
      semantic_family: quieter-than-panic
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_hook_personal_05
    line: You are not asking the headlines to be less true. You are asking how to stay in love with a world that keeps breaking — how to let what you love stay close enough that you can still act when the next number lands.
    metadata:
      semantic_family: stay-in-love-still-act
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: maat_cl_hook_big_01
    line: Climate pressure is no longer only environmental. It is attentional, emotional, and civic — and the cost of converting it into helplessness lands first on the cohort least equipped to filter it out.
    metadata:
      semantic_family: attentional-emotional-civic
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_hook_big_02
    line: A generation is being asked to hold the planet's grief without the language most cultures once carried for grief itself. What gets read as climate anxiety is, in part, that gap — registration without ritual, knowing without a circle to hold the knowing.
    metadata:
      semantic_family: registration-without-ritual
      angle: cultural-gap
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_hook_big_03
    line: The Sufi traditions hold that the qalb — the spiritual heart — registers loss before the analytical mind catches up. The climate cohort is not failing to think clearly about the data. They are thinking clearly from a layer the data was not written to address.
    metadata:
      semantic_family: thinking-from-deeper-layer
      angle: spiritual-anthropology
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_hook_big_04
    line: When the institutional response keeps lagging the lived reality, the lag itself becomes the pressure. The young people carrying that lag in their bodies are not the symptom of a coping failure. They are the visible edge of a structural one.
    metadata:
      semantic_family: institutional-lag-edge
      angle: structural-edge
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_hook_big_05
    line: The mystical traditions name a class of love that does not require the beloved to be safe to keep loving them. Climate grief asks for exactly that love, and the absence of public language for it is part of why the cohort is drowning in private.
    metadata:
      semantic_family: love-without-safety-clause
      angle: tradition-frame
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: maat_cl_intro_01
    line: Teacher Maat — born Naqshbandi, MIT-trained engineer, ex-McKinsey consultant, now a Sufi teacher in the Hazrat Inayat Khan lineage — has watched in Sufi circles young people carry climate grief as the thing that has no name in the institutional vocabulary. In her framework the grief is not a failure of resilience. It is the qalb registering loss the data keeps understating, and the practice is to let dhikr keep the heart in honest contact with that registration.
    metadata:
      semantic_family: engineer-to-mystic-bridge
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_intro_02
    line: Teacher Maat teaches within the Naqshbandi Sufi tariqat — the path of the heart — and inside Hazrat Inayat Khan's universal Sufism, which holds that one does not need to be Muslim to walk this way. In her Sufi circles, young people arrive carrying climate pressure as a question about love itself, about whether it survives the loss the data keeps reporting. She does not answer with reassurance. She offers sama — sacred listening — and lets the music meet what the analysis cannot.
    metadata:
      semantic_family: universal-sufi-frame
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_intro_03
    line: Teacher Maat carries a strange double inheritance — Naqshbandi from birth, engineer by MIT training, consultant by ex-McKinsey practice, teacher by call. In her circles young people read the climate updates and ask whether the analytical mind they were trained to trust is the mind that keeps missing what their bodies already know. Her tradition does not ask them to choose. It asks them to let the heart, the qalb, be the place where the analysis lands.
    metadata:
      semantic_family: analytic-and-heart-witness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_intro_04
    line: Teacher Maat teaches Rumi inside Sufi circles where the lover-and-Beloved relationship is not metaphor but practice. When young people arrive carrying climate grief, she does not offer a coping framework. She offers a re-orientation — that the longing they feel for a planet that does not keep breaking is the same longing the mystics named ishq, and that the longing itself is the door.
    metadata:
      semantic_family: ishq-as-door
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_intro_05
    line: Teacher Maat teaches inside a tradition that has held, for centuries, the practice of staying open in the presence of loss without that openness collapsing into despair. In her circles she has watched young people walk in numbed by climate dread and walk out softened — not because the numbers changed, but because dhikr returned the heart to a register the dread had not been able to fully reach.
    metadata:
      semantic_family: tradition-of-staying-open
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: maat_cl_somatic_01
    line: You read the climate update. Your body tightened. You looked away. Then you came back because the number is still true.
    metadata:
      semantic_family: tighten-and-return
      loop_type: climate_grief
      body_register: chest
      digital_behavior: reads the update
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_somatic_02
    line: The forecast popped up on the lock screen. Your stomach dropped. You unlocked the phone to read more and your jaw tightened in the same motion. The body had registered before the words finished.
    metadata:
      semantic_family: lockscreen-stomach
      loop_type: lockscreen_dread
      body_register: stomach
      digital_behavior: lock screen forecast
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_somatic_03
    line: You held your breath while the new IPCC chart loaded. Your shoulders rose. You exhaled halfway when you saw the curve, because the rest of the breath was being held for the next chart you knew was coming.
    metadata:
      semantic_family: chart-load-breath
      loop_type: chart_load_hold
      body_register: breath
      digital_behavior: chart loads
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_somatic_04
    line: You finished the report and sat for a long minute without moving. Your hands were warm. The heart underneath them was still working, and that small fact felt like the only honest thing in the room.
    metadata:
      semantic_family: hand-on-heart-witness
      loop_type: post_report_stillness
      body_register: chest
      digital_behavior: finishes the report
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_somatic_05
    line: You lay down with the curtains still hot from the day and the model in your head running anyway. Your jaw would not soften. You knew sleep was the thing that would help and you could not find the door into it.
    metadata:
      semantic_family: night-model-running
      loop_type: night_model_loop
      body_register: jaw
      digital_behavior: lying down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: maat_cl_witness_01
    line: Maat has seen this exact loop in her Sufi circles — the update, the tightening, the turning away, and the return because reality is still there. In her tradition that return is not weakness. It is the qalb refusing to close, and the closing is what dhikr was made to prevent.
    metadata:
      semantic_family: qalb-refuses-to-close
      loop_type: climate_grief
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_witness_02
    line: Maat has watched young people sit in sohbet with their phones face-down after the third climate headline in a week. In her framework that silence is not collapse. It is the heart's response to overload — and the moment before sama, when sacred sound can begin to do what reading cannot.
    metadata:
      semantic_family: silence-as-pre-sama
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_witness_03
    line: She has watched the body carry what the projections could not metabolize. In her tradition that carrying is not a malfunction; it is the qalb registering the loss the institutions soften, and the registration is the first honest act available to the person inside it.
    metadata:
      semantic_family: registration-as-first-act
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_witness_04
    line: Maat has watched young clients arrive numb from climate dread and not know it. In her circles she does not ask them to feel more. She asks them to begin dhikr — one breath, one remembrance — and to let the practice loosen what the dread had locked, so the heart can begin to move again at its own pace.
    metadata:
      semantic_family: dhikr-loosens-dread
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_witness_05
    line: Maat has watched the moment when a young person stops trying to manage the climate grief and lets it become longing for the Beloved instead — longing for a creation tended, not depleted. In her tradition that moment is not bypass. It is the place where grief becomes prayer, and prayer becomes ground for the next clear act.
    metadata:
      semantic_family: grief-becomes-longing
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: maat_cl_turnaround_01
    stat_line_1: 7,500 strikes. 185 countries.
    stat_line_2: Fridays for Future has coordinated more than 7,500 youth climate strikes across over 185 countries since 2018, building a global youth climate organizing infrastructure that did not exist a decade ago.
    metadata:
      semantic_family: youth-strike-network
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_turnaround_02
    stat_line_1: 7.6 million. Global Climate Strike 2019.
    stat_line_2: The Global Climate Strike of September 2019 mobilized 7.6 million people across more than 150 countries — at the time the largest climate mobilization in history, and a cohort proof that climate organizing scale exists when given a frame.
    metadata:
      semantic_family: mobilization-scale-proof
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_turnaround_03
    stat_line_1: YOUNGO. UNFCCC youth constituency.
    stat_line_2: YOUNGO is the official youth constituency of the UN Framework Convention on Climate Change, channeling youth input into formal climate negotiations and putting cohort representation inside the rooms where the policy is written.
    metadata:
      semantic_family: policy-room-presence
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_turnaround_04
    stat_line_1: $300 billion. COP loss-and-damage commitments.
    stat_line_2: COP negotiations have anchored loss-and-damage commitments and broader climate finance pledges totaling over $300 billion — figures the youth climate movement helped force into the agenda after years of being told the framing was unrealistic.
    metadata:
      semantic_family: loss-and-damage-anchor
      article_types:
      - hard_news_spiritual_response
  - id: maat_cl_turnaround_05
    stat_line_1: 50,000 trained. 170 countries.
    stat_line_2: Climate Reality Project has trained more than 50,000 Climate Reality Leaders across over 170 countries — a practitioner pool that did not exist before and now organizes climate communication and policy work in regions formal institutions still under-serve.
    metadata:
      semantic_family: practitioner-pool-built
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: maat_cl_bridge_01
    line: 7,500 strikes across 185 countries. The tracker measures mobilization. It has no column for what kept the next strike convening after the last one was ignored — the heart staying open enough to keep showing up. Maat's tradition has language for exactly that capacity. The qalb, when softened by dhikr, does not stop grieving the planet. It stops armoring against the grief — and an unarmored heart is the one that can still organize.
    hidden_capacity: keep convening after the last strike was ignored
    metadata:
      semantic_family: unarmored-heart-organizes
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_bridge_02
    line: The data captures mobilizations and pledges. It does not capture what held the young organizer the night after the disaster when the policy victory came too late. In Maat's tradition that holding is sama — sacred listening, sound as doorway — and it is the layer the policy data cannot reach but the practitioner cannot do the work without.
    hidden_capacity: be held the night after the disaster
    metadata:
      semantic_family: sama-holds-practitioner
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_bridge_03
    line: Numbers track the strikes and the COP commitments. They cannot track the moment a young practitioner felt the heart begin to harden against the next bad number and chose dhikr instead — the breath of remembrance that returned the qalb to a state where the next conversation was still possible. That choice does not appear in any report. The work depends on it.
    hidden_capacity: choose dhikr instead of armor
    metadata:
      semantic_family: dhikr-vs-armor-choice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_bridge_04
    line: The infrastructure of climate organizing is measurable. The fanaa — the slow dissolution of the false self that wants to call the timeline normal and look away — is not. Maat's tradition does not measure that work and does not need to. It names it, and it offers practices that have carried it for centuries in circles that outlasted empires.
    hidden_capacity: dissolve the false self that wants to look away
    metadata:
      semantic_family: fanaa-vs-look-away
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_bridge_05
    line: Strikes, pledges, and finance commitments can be counted. The longing for a planet that does not keep breaking — the ishq that pulls a young climate organizer back into the room — cannot. Maat's tradition does not argue with the metrics. It tends the longing the metrics cannot see, and lets the longing be the engine the institutional response was never built to carry.
    hidden_capacity: tend the longing the metrics cannot see
    metadata:
      semantic_family: longing-as-engine
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: maat_cl_perspective_01
    header: What Maat Sees
    paragraphs:
    - In the Naqshbandi tariqat, the qalb — the spiritual heart — is not a metaphor. It is the organ through which the lover encounters the Beloved, and creation is one of the places the Beloved is encountered. When the planet keeps registering loss, the qalb registers that loss as personal because the relationship was never separate to begin with.
    - This is not a request to feel more. It is a request to feel honestly — to let the climate news land where it lands, in the chest, in the stomach, in the breath, and to let dhikr do the slow work of returning the heart to its native register without flooding it.
    - The young person carrying climate grief is not asked to fix it alone. The Sufi circle is the place where the carrying becomes shared — where sama, sacred listening, lets sound do what arguments cannot, and where the longing for a tended creation is named as ishq, not as weakness.
    metadata:
      semantic_family: qalb-open-by-dhikr
      reframe_type: closure_to_remembrance
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_perspective_02
    header: What Maat Sees
    paragraphs:
    - Fanaa, in this tradition, is the dissolution of the false self in Divine Love — and the false self has many shapes. Under climate pressure, the false self is often the one that wants to call the timeline normal, to absorb the data without letting it touch, to keep functioning at the cost of contact with what is true. Fanaa is not bypass. It is the slow undoing of that armor so the heart remains in honest contact with reality.
    - The practice is not detachment. Maat's tradition holds detachment as a forbidden reading. Fanaa is dissolution into love, not withdrawal from the world. The lover does not leave the Beloved's creation when the news arrives. The lover stays present to creation and lets the presence become broader.
    - For the young person, this looks like permission to keep feeling without that feeling becoming proof they cannot continue. The capacity to continue comes from the practice, not from the willpower of the personality.
    metadata:
      semantic_family: fanaa-as-staying-in-contact
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_perspective_03
    header: What Maat Sees
    paragraphs:
    - Dhikr — remembrance — is not mindfulness. In Maat's tradition this distinction is not optional. Mindfulness is attention training. Dhikr is the return of the heart to its source, to the Beloved, and the source does not change when the climate news does. The breath becomes a marker for that return, but the return is the work; the breath is the door.
    - Under climate pressure, dhikr is the small, durable practice that lets the heart not be ruled by the news cycle while still being in contact with what the cycle reports. The remembering does not deny the loss; it locates the heart somewhere the loss cannot fully reach, so the response to the loss can remain whole.
    - This is the layer climate organizing cannot deliver and need not. Maat's tradition does not compete with structural work. It carries the practitioner through the work, in the breath under the action.
    metadata:
      semantic_family: dhikr-not-mindfulness
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_perspective_04
    header: What Maat Sees
    paragraphs:
    - Sama, in this tradition, is the practice of sacred listening — music and sound as doorway to the heart. When the analytical mind has done all it can with a climate report and the heart is still tight, sama is the practice that bypasses the analysis and meets the body where it has been holding the news. It is not entertainment and not regulation. It is contact.
    - The Sufi circles have used sama for centuries to keep practitioners in honest relationship with loss without loss becoming the whole identity. The sound moves through the chest, the stomach, the breath. What had locked begins to soften. The remembering can happen again.
    - For the young person who has read too many reports and has nowhere safe for the body to land, sama offers a layer of listening the algorithmic feeds were never built to provide. The tradition is not arguing with the feeds. It is offering the door the feeds left out.
    metadata:
      semantic_family: sama-as-doorway
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_perspective_05
    header: What Maat Sees
    paragraphs:
    - Ma'rifa — experiential mystical knowledge — is the kind of knowing that does not arrive through reading more reports or consuming more analysis. It arrives through practice, through the qalb being in contact with the Beloved long enough that the contact becomes its own kind of certainty. For a generation drowning in climate information, this distinction is not academic.
    - The young person who has read every projection and is still asking what is true here is asking a ma'rifa question. The tradition holds that the analytical layer cannot fully answer it, because the question is being asked from a layer beneath the analysis. The answer comes through sustained practice — dhikr, sama, sohbet — not through one more dataset.
    - This is the engineer-mystic bridge in practice. Maat does not dismiss the analytical mind. She names what it can and cannot do, and offers the practices that meet the layer the analytical mind cannot reach on its own.
    metadata:
      semantic_family: marifa-vs-more-information
      article_types:
      - hard_news_spiritual_response
      - commentary
practice:
  default_id: maat_cl_practice_01
  options:
  - id: maat_cl_practice_01
    display_name: Dhikr Pause
    duration: 5 minutes
    announcement_line: Teacher Maat offers a 5-minute Dhikr Pause for moments when the next climate update has just landed and the chest is already tight. One breath in with the remembrance that the Beloved is closer than the news. One breath out with the release of what the heart was being asked to armor against. Five minutes. It is in the sidebar, timed and step by step.
    relief_lines:
    - The mind stops trying to metabolize the loss alone.
    - The qalb returns to a register the projection could not fully reach.
    relief_register:
    - remember
    - return
    - presence
    derived_from_frame: dhikr_pause
    metadata:
      semantic_family: dhikr_pause_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_practice_02
    display_name: Sama Listening
    duration: 12 minutes
    announcement_line: Teacher Maat teaches a 12-minute Sama Listening practice for moments when the analytical mind has done all it can with a climate report and the body still has not been heard. A single piece of devotional music, listened to with the chest and not the ears. Notice where the sound lands. Let it land. It is in the sidebar, timed and step by step.
    relief_lines:
    - The body receives what the analysis could not deliver.
    - The heart softens at the layer dhikr is preparing to meet.
    relief_register:
    - listen
    - receive
    - soften
    derived_from_frame: sama_listening
    metadata:
      semantic_family: sama_listening_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_practice_03
    display_name: Sufi Circle Recall
    duration: 7 minutes
    announcement_line: Teacher Maat offers a 7-minute Sufi Circle Recall for moments after a climate-laden news cycle when isolation is creeping in. Bring to mind a circle — physical or imagined — of those who hold this longing for a tended creation. Sit with them in silence first, then with a single remembrance. It is in the sidebar, timed and step by step.
    relief_lines:
    - The grief stops being held alone.
    - The longing for a tended creation finds company.
    relief_register:
    - gather
    - share
    - witness
    derived_from_frame: sufi_circle_recall
    metadata:
      semantic_family: sufi_circle_recall_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_practice_04
    display_name: Fanaa Witness
    duration: 6 minutes
    announcement_line: Teacher Maat teaches a 6-minute Fanaa Witness practice for the moment after the climate news lands and the false self has already started to whisper that this is normal. Sit with the whisper. Notice the shape of the armor it is offering. Let the breath be slow enough that the armor begins to dissolve, not be argued with. Six minutes. It is in the sidebar, timed and step by step.
    relief_lines:
    - The false self that wanted to call the timeline normal is named.
    - The dissolution begins, slowly, where willpower would have failed.
    relief_register:
    - dissolve
    - honest
    - softer
    derived_from_frame: fanaa_witness
    metadata:
      semantic_family: fanaa_witness_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_cl_practice_05
    display_name: Wine of Remembrance Breath
    duration: 3 minutes
    announcement_line: Teacher Maat offers a 3-minute Wine of Remembrance Breath for moments of acute climate overwhelm, when one more report has arrived and the body cannot hold one more. Breath in as if drinking from the wine of remembrance — the intoxication of presence that Rumi names. Breath out as the long exhale that lets the day's weight settle without becoming permanent. Three minutes. It is in the sidebar, timed and step by step.
    relief_lines:
    - The breath becomes a marker for presence rather than for the day's count.
    - The intoxication of remembrance loosens the grip the news had taken.
    relief_register:
    - presence
    - softening
    - remembrance
    derived_from_frame: wine_of_remembrance_breath
    metadata:
      semantic_family: wine_of_remembrance_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
