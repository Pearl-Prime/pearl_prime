hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Climate pressure is no longer only environmental. It is attentional, emotional, and civic: how do young people stay in contact with reality without losing function under it?'
    semantic_family: maat-climate-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ma'at, a South Indian Sufi teacher rooted in the dargah traditions of Tamil Nadu — who carries Rabia al-Adawiyya's fire and the Tamil Siddha poets' understanding that the heart is the organ of truth — has watched in practice sessions this pressure land on young people. They are not only asking what is happening. They are asking how to trust their own perception when the qalb — the spiritual heart — already knows what institutions keep understating.
    semantic_family: maat-climate-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the climate update. Your body tightens. You look away. Then you come back because the number is still true. LOOP_SEQUENCE: "read the update. body tightened. looked away. came back."'
    loop_type: truth_pressure
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ma'at has seen this exact loop -- the update, the body tightening, the turning away, and the return because reality is still there.
    semantic_family: maat-climate-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 2,666 cases. 51 jurisdictions.
    stat_line_2: Young climate organizers are filing cases, hosting workshops, and forcing institutions to answer the gap between public promises and lived reality.
    semantic_family: maat-climate-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: '2,666 cases. 51 jurisdictions. The tracker measures what young people did. It has no column for what made the next step possible after another delayed or broken response — the capacity to stay in contact with truth long enough to act again when the system keeps not responding. The person who came back needed it. So does the reader in that loop. Ma''at''s tradition has language for exactly this: the qalb — the spiritual heart — becomes clouded by ghaflah, heedlessness. Every distraction, every institutional lie, every compulsive scroll is a layer of tarnish. The practice is not to think your way through it. It is to polish the mirror until the heart reflects what it already knows.'
    hidden_capacity: return to truthful action
    semantic_family: maat-climate-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ma'at Sees
    paragraphs:
    - Ma'at would begin with truth. The first distortion happens when a person is asked to treat a structural disorder as a private defect.
    - Right relationship means naming what is actually happening without shrinking it to fit institutional comfort. That naming is not dramatics; it is alignment with reality.
    - What feels like a personal fault — me, broken, wrong — is often accurate response to a system that keeps asking for trust while misnaming harm, delay, or disorder.
    semantic_family: maat-climate-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Breath Dhikr
    duration: 5 minutes
    announcement_line: Ma'at teaches a 5-minute Breath Dhikr — exhale with the felt sense of 'not this, not this,' releasing every label you carry; inhale with 'only this,' pure presence — for moments when climate pressure starts converting attention into helplessness. It is in the sidebar, timed and practical.
    relief_lines:
    - The mind stops bargaining with what it already knows.
    - Enough steadiness returns to name reality without apologizing for seeing it clearly.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
