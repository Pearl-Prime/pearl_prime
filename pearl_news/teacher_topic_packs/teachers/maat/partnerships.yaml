bridge:
  options:
    - id: bridge_01
      line: "480 youth-led coalitions. 33 countries. The tracker measures what young people built. It has no column for what made the next partnership possible after the last one delivered extraction in collaborative language — the capacity to hold the asymmetry in clear view without surrendering the heart's own sense of inherent worth. The partner who came back needed it. So does the reader still in the loop. Ma'at's tradition has been refining the practice for centuries."
      hidden_capacity: "hold asymmetry in view while sustaining genuine partnership"
      semantic_family: "maat-partnerships-bridge-asymmetry"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: bridge_02
      line: "Partnership trackers count signatures and joint statements. They do not count the inner capacity that lets a young partner stay engaged after the dominant partner has used the partnership as cover. That capacity — what dhikr cultivates — keeps the smaller partner from carrying the institutional asymmetry as a personal verdict. The Naqshbandi tradition addresses it directly. SDG 17 does not."
      hidden_capacity: "refuse the asymmetry-as-verdict the dominant partner tries to install"
      semantic_family: "maat-partnerships-bridge-dhikr"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: bridge_03
      line: "480 youth-led coalitions. 33 countries. The count measures action. It does not measure the slower thing — the discipline of staying in genuine collaboration with people whose institutional power is shaped to extract from yours. Ma'at's tradition holds that the Beloved does not require a contract. Genuine partnership is a heart event before it is a structural one."
      hidden_capacity: "meet the other as face of the Beloved, not as instrument"
      semantic_family: "maat-partnerships-bridge-beloved"
      article_types: ["hard_news_spiritual_response", "commentary"]
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: "What Ma'at Sees"
      paragraphs:
        - "The Beloved does not require a contract. Ma'at teaches that the Sufi lover's orientation to the other is complete devotion, not strategic alignment. Genuine partnership is a heart event before it is a structural one — two souls recognizing in each other a face of the Beloved, in genuine resonance for shared service. This recognition does not emerge from negotiation; it emerges from the state of the heart that dhikr — remembrance — cultivates. Partnerships built on this ground have a different quality of durability."
        - "Sama as partnership practice. The Sufi gathering of sama — sacred music and listening — is what Ma'at brings to the question of how genuine collaboration is built. When parties to a partnership can sit together in genuine dhikr, in remembrance of what they are serving beyond their institutional identities, the transactional dynamics that undermine most partnerships begin to dissolve. Ma'at's Sufi Circles demonstrate this weekly: strangers become collaborators through shared devotion, not through aligned incentives."
        - "Fanaa of institutional nafs. The lower self of organizations — the defensive self-interest that prevents genuine partnership — is the same mechanism as the individual nafs, only larger. Ma'at teaches that the dissolution of institutional grasping, the organizational fanaa, is the prerequisite for the kind of partnership that changes what is possible. This is not achieved through structural redesign alone; it requires the heart dimension that the Sufi path addresses directly."
      semantic_family: "maat-partnerships-perspective-beloved"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_perspective_02
      header: "What Ma'at Sees"
      paragraphs:
        - "Ma'at reads partnership strain through the qalb — the spiritual heart that senses the institutional nafs before the contract does. The smaller partner is being asked to hold two fields at once — the field of the stated collaboration and the field of what the dominant partner is actually doing. Most damage from extractive partnerships comes from collapsing those fields into one, then taking the collapse as evidence that the partner who noticed it was being uncooperative."
        - "From there Ma'at turns to dhikr as partnership discipline. Remembrance returns the smaller partner to the ground from which the heart can read the room accurately, without the analytical mind's tendency to second-guess what the heart has already named. The Hazrat Inayat Khan lineage holds that the heart's discernment, properly cultivated, is faster and more honest than the strategic mind."
        - "The reframe is precise: what feels like a personal failure of cooperative skill — me, broken, wrong for noticing the extraction — is often the qalb's accurate refusal of a partnership designed to extract while calling itself collaborative. The mind stops calling itself broken when it sees that the real disorder is in the design of the partnership, and that design can be changed by the same partners who are currently being asked to consent to it."
      semantic_family: "maat-partnerships-perspective-qalb"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_perspective_03
      header: "What Ma'at Sees"
      paragraphs:
        - "Ma'at would name the asymmetry precisely. Most institutional partnerships are not failures of intention. They are arrangements designed by parties with very different exit costs. The party that can walk away cheaply will tend, in practice, to set the terms. The Naqshbandi tradition does not respond by pretending the exit costs are equal. It responds by widening the field of awareness in which the asymmetry is held."
        - "All are welcome — Hazrat Inayat Khan's teaching that universal Sufism is open to any soul that longs for the Beloved — applies directly to partnership work. Ma'at teaches that genuine collaboration requires the same openness across institutional difference that the Sufi Circle requires across religious difference. The other partner is not a stranger to be managed. The other partner is a face of the Beloved with whom the work has been entrusted."
        - "The reframe matters: what feels like a personal failure of cooperative skill — me, broken, wrong for noticing the extraction — is often the heart's accurate response to a partnership designed to extract while calling itself collaborative. The mind stops calling itself broken when it sees that the real disorder is in the design, and that the design can be changed."
      semantic_family: "maat-partnerships-perspective-universal"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]
practice:
  default_id: practice_01
  options:
    - id: practice_01
      display_name: "5-minute Qalb-Listening for Partnership"
      duration: "5 minutes"
      announcement_line: "Ma'at teaches a 5-minute Qalb-Listening practice for moments when a partnership has started extracting in collaborative language and the smaller partner needs to keep the heart's reading clear. It is in the sidebar, timed and step by step."
      relief_lines:
        - "The two fields — what the partnership claims to be and what the partnership is doing — stop collapsing into each other."
        - "A steadier ground returns for the next conversation, the next MOU revision, the next decision about whether to stay in."
      relief_register: ["capacity", "clarity", "act again"]
      derived_from_frame: "qalb_listening"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: practice_02
      display_name: "10-minute Sama for Co-Partners"
      duration: "10 minutes"
      announcement_line: "Ma'at teaches a 10-minute Sama practice — a single piece of devotional music, listened to with the chest, not the ears — for moments when the partnership work is being treated as if the smaller partner's contribution were optional. It is in the sidebar, short enough to use before the call or after the meeting."
      relief_lines:
        - "The grasping after recognition softens; the work itself returns to view."
        - "Enough ground returns to choose engagement or refusal on the work's actual terms."
      relief_register: ["capacity", "clarity", "act again"]
      derived_from_frame: "sama"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: practice_03
      display_name: "5-minute Dhikr Before the Meeting"
      duration: "5 minutes"
      announcement_line: "Ma'at teaches a 5-minute Dhikr practice — remembrance breath, the Beloved's name on each exhale — for the moment before a partnership meeting where the smaller partner needs the heart steady before the analytical mind begins. It is in the sidebar."
      relief_lines:
        - "The body recognizes the room, the people, and the actual stakes of the meeting."
        - "A clearer ground returns for the next agreement, refusal, or honest pause."
      relief_register: ["capacity", "clarity", "act again"]
      derived_from_frame: "dhikr"
      article_types: ["hard_news_spiritual_response", "commentary"]
