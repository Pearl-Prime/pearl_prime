topic_fit:
  fit_level: primary
  fit_reason: "Partnerships rest on what the heart can sense before the contract names it; Sufi practice cultivates the qalb-level discernment that distinguishes genuine collaboration from extractive arrangement wearing collaborative language."
  forbidden_angles:
    - "do not preach naive trust as a substitute for accountability"
    - "do not frame disillusionment with broken partnerships as personal cynicism"
hook_personal:
  options:
    - id: hook_personal_01
      line: "You read another joint-statement press release. You also know what the last three from the same partners actually produced once the cameras left."
      semantic_family: "maat-partnerships-hook-personal-press"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
    - id: hook_personal_02
      line: "You said yes to the youth advisory seat. You also know the meeting is at 11 a.m. on a Wednesday, scheduled by people who do not need to skip a shift to attend."
      semantic_family: "maat-partnerships-hook-personal-seat"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response"]
    - id: hook_personal_03
      line: "You scroll the partner logos at the bottom of the report. You also know which logos showed up to the launch and which logos have been quiet since."
      semantic_family: "maat-partnerships-hook-personal-logos"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: "Partnerships are no longer only an institutional-design question. They are a daily test of whether the people most affected by an outcome have any say in how the partners structure the work."
      semantic_family: "maat-partnerships-hook-big-design"
      article_types: ["hard_news_spiritual_response"]
    - id: hook_big_picture_02
      line: "SDG 17 names partnerships as the operating mechanism for the other sixteen goals. The mechanism has been measured. Most multi-stakeholder partnerships fail their stated youth-inclusion targets within 24 months of launch."
      semantic_family: "maat-partnerships-hook-big-sdg17"
      article_types: ["hard_news_spiritual_response"]
    - id: hook_big_picture_03
      line: "The partnership form has been used as both genuine collaboration and institutional cover. The difference between the two is rarely visible at launch — it is visible 18 months in, when the press conference is over and the convening organization decides which partner gets to keep showing up."
      semantic_family: "maat-partnerships-hook-big-cover"
      article_types: ["hard_news_spiritual_response"]
teacher_intro:
  options:
    - id: teacher_intro_01
      line: "Teacher Ma'at, a Naqshbandi Sufi teacher in the Hazrat Inayat Khan lineage, has watched young people return from interfaith and civic partnerships with the same question. They are not asking whether collaboration matters. They are asking how to stay in genuine partnership when the larger partner keeps extracting more than they bring."
      semantic_family: "maat-partnerships-intro-extraction"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_intro_02
      line: "Teacher Ma'at, rooted in the Naqshbandi Tariqat and the universal Sufism that Hazrat Inayat Khan brought West, has watched in sama gatherings the specific exhaustion of being the smaller partner in arrangements designed to deliver legitimacy to the larger one. The teaching she offers does not solve the structural asymmetry. It protects the qalb — the spiritual heart — from inheriting the costume the asymmetry tries to install."
      semantic_family: "maat-partnerships-intro-asymmetry"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_intro_03
      line: "Teacher Ma'at — Naqshbandi Sufi by lineage, MIT-trained engineer by formation — has watched in weekly Sufi Circles how the heart's discernment in partnership work runs faster than the analytical mind. Students arrive carrying the gut sense that something is off in a collaboration. The work in the circle is to let dhikr clear enough ground for the gut sense to name itself."
      semantic_family: "maat-partnerships-intro-discernment"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response", "commentary"]
youth_somatic:
  options:
    - id: youth_somatic_01
      line: "You read the joint press release. Your shoulders tightened. You closed the tab. Then you opened it again because the names listed were not changing.\nLOOP_SEQUENCE: \"read the release. shoulders tightened. closed the tab. opened it again.\""
      loop_type: "institutional_nafs"
      body_register: "shoulders"
      digital_behavior: "close-return"
      article_types: ["hard_news_spiritual_response"]
    - id: youth_somatic_02
      line: "You opened the partnership invitation. Your jaw tightened. You skimmed past it. Then you came back because saying no had its own cost too.\nLOOP_SEQUENCE: \"opened the invitation. jaw tightened. skimmed past. came back.\""
      loop_type: "institutional_nafs"
      body_register: "jaw"
      digital_behavior: "skim-return"
      article_types: ["hard_news_spiritual_response"]
    - id: youth_somatic_03
      line: "You read the new MOU between the two organizations. Your chest tightened. You set the phone down. Then you picked it up because your friend on the smaller side was already in the group chat.\nLOOP_SEQUENCE: \"read the MOU. chest tightened. put the phone down. picked it up again.\""
      loop_type: "institutional_nafs"
      body_register: "chest"
      digital_behavior: "put-down-return"
      article_types: ["hard_news_spiritual_response"]
teacher_witness:
  options:
    - id: teacher_witness_01
      line: "Ma'at has seen this exact loop in young people returning from partnership work — the release, the tightening, the look away, and the return because the people on the smaller side were still in it."
      semantic_family: "maat-partnerships-witness-loop"
      loop_type: "institutional_nafs"
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_witness_02
      line: "She has watched students who entered partnerships as equals leave them carrying invisible labor that the larger partner publicly took credit for. The Naqshbandi tradition does not wave that away. It names it precisely, then asks what kind of inner ground the work of staying in or leaving the partnership actually requires."
      semantic_family: "maat-partnerships-witness-labor"
      loop_type: "institutional_nafs"
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_witness_03
      line: "Ma'at has watched the slower thing — the way young partners learn to read partnership language for what it leaves out. The teaching she offers is not skepticism. It is the disciplined recognition that the qalb senses the institutional nafs before the contract does."
      semantic_family: "maat-partnerships-witness-qalb"
      loop_type: "institutional_nafs"
      article_types: ["hard_news_spiritual_response"]
turnaround:
