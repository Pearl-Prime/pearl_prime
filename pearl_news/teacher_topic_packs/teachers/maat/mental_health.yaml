hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Youth mental-health strain is not only a clinical trend. It is the way institutions normalize overload until young people start treating it as a private flaw.
    semantic_family: maat-mental_health-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ma'at, a South Indian Sufi teacher rooted in the dargah traditions of Tamil Nadu — who carries Rabia al-Adawiyya's fire and the Tamil Siddha poets' understanding that the heart is the organ of truth — has watched in practice sessions this pressure land on young people. They are not only asking what is happening. They are asking how to trust their own perception when the qalb — the spiritual heart — already knows what institutions keep understating.
    semantic_family: maat-mental_health-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You read the report after midnight. Your body tightens. You set the phone down. Then you pick it up again because the pressure is already in the room. LOOP_SEQUENCE: "read the report. body tightened. set the phone down. picked it up again."'
    loop_type: truth_pressure
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ma'at has seen this exact loop -- the report, the body tightening, the phone set down, and the return because the pressure is still there.
    semantic_family: maat-mental_health-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 320 campuses. 18 countries.
    stat_line_2: Students are building peer circles, workshops, and campaigns that treat mental health as shared infrastructure rather than private weakness.
    semantic_family: maat-mental_health-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: '320 campuses. 18 countries. The tracker measures what young people did. It has no column for what made the next step possible after another week of overload — the capacity to seek help and return without turning pressure into identity. The person who came back needed it. So does the reader in that loop. Ma''at''s tradition has language for exactly this: the qalb — the spiritual heart — becomes clouded by ghaflah, heedlessness. Every distraction, every institutional lie, every moment of performing okayness is a layer of tarnish. The practice is not to think your way through it. It is to polish the mirror until the heart reflects what it already knows.'
    hidden_capacity: return to truthful action
    semantic_family: maat-mental_health-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ma'at Sees
    paragraphs:
    - Ma'at would begin with truth. The first distortion happens when a person is asked to treat a structural disorder as a private defect.
    - Right relationship means naming what is actually happening without shrinking it to fit institutional comfort. That naming is not dramatics; it is alignment with reality.
    - What feels like a personal fault — me, broken, wrong — is often accurate response to a system that keeps asking for trust while misnaming harm, delay, or disorder.
    semantic_family: maat-mental_health-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Mirror Polish
    duration: 5 minutes
    announcement_line: Ma'at teaches a 5-minute Mirror Polish — before sleep, identify one moment from the day where you were genuinely present, fully there, not performing, and hold it for 60 seconds — for moments when overload starts clouding the heart. It is in the sidebar, timed and practical.
    relief_lines:
    - The mind stops bargaining with what it already knows.
    - Enough steadiness returns to name reality without apologizing for seeing it clearly.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
