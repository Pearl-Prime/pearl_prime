hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: Education strain is not only about workload. It is about whether schools still create the conditions under which attention and learning can function.
    semantic_family: maat-education-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ma'at, a South Indian Sufi teacher rooted in the dargah traditions of Tamil Nadu — who carries Rabia al-Adawiyya's fire and the Tamil Siddha poets' understanding that the heart is the organ of truth — has watched in practice sessions this pressure land on young people. They are not only asking what is happening. They are asking how to trust their own perception when the qalb — the spiritual heart — already knows what institutions keep understating.
    semantic_family: maat-education-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You open the assignment portal. Focus breaks. You switch away. Then you come back because the work is still there. LOOP_SEQUENCE: "opened the portal. focus broke. switched away. came back."'
    loop_type: truth_pressure
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ma'at has seen this exact loop -- the portal opening, the break in focus, the switch away, and the return because the work still remains.
    semantic_family: maat-education-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 410 workshops. 27 cities.
    stat_line_2: Students and educators are building study supports, healthier schedules, and classroom reforms that protect attention instead of merely organizing campaigns and hosting it.
    semantic_family: maat-education-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: '410 workshops. 27 cities. The tracker measures what young people did. It has no column for what made the next step possible after another week of fragmented attention — the capacity to return to the work without turning scatter into identity. The person who came back needed it. So does the reader in that loop. Ma''at''s tradition has language for exactly this: the nafs — the ego-self — has seven levels, from the tyrannical commanding self all the way to the settled, trusting soul. The practice is not to fight the fragmentation. It is to notice which nafs is driving the show — and from that noticing, let the heart return to what actually matters.'
    hidden_capacity: return to truthful action
    semantic_family: maat-education-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ma'at Sees
    paragraphs:
    - Ma'at would begin with truth. The first distortion happens when a person is asked to treat a structural disorder as a private defect.
    - Right relationship means naming what is actually happening without shrinking it to fit institutional comfort. That naming is not dramatics; it is alignment with reality.
    - What feels like a personal fault — me, broken, wrong — is often accurate response to a system that keeps asking for trust while misnaming harm, delay, or disorder.
    semantic_family: maat-education-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: 5-minute Nafs Audit
    duration: 5 minutes
    announcement_line: 'Ma''at teaches a 5-minute Nafs Audit — a weekly check-in rooted in Al-Ghazali: which ego-self drove me most this week? Was I in nafs al-ammara, controlled by appetite and reactivity? Or did I touch nafs al-mutmainna, the settled, trusting self? No judgment, just noticing. It is in the sidebar, timed and practical.'
    relief_lines:
    - The mind stops bargaining with what it already knows.
    - Enough steadiness returns to name reality without apologizing for seeing it clearly.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
