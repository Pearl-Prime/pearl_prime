topic_fit:
  fit_level: primary
  fit_reason: Repeated violence accumulates as moral injury and as armoring around the qalb — the heart that the Naqshbandi path holds as the organ of truth. The practice is not to harden the heart against grief but to let dhikr and sama keep the heart open enough to act again.
  forbidden_angles:
  - do not preach numbness as wisdom
  - do not confuse silence with peace
  - do not frame the heart's grief as personal weakness
hook_personal:
  options:
  - id: maat_pc_hook_personal_01
    line: You keep reading the reports because not looking feels dishonest. You also feel what repeated violence is doing to your chest, your breath, the small place inside that still refuses to call this normal.
    metadata:
      semantic_family: conscience-vs-numbness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_hook_personal_02
    line: You scroll past one more atrocity and feel your jaw clench before the words land. The body has been carrying what the institutions keep failing to name, and the heart you were told to protect is the one thing that has not gone quiet.
    metadata:
      semantic_family: body-knows-first
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_hook_personal_03
    line: You read the casualty count and feel the longing rise — not for distance, but for a way to stay close to what you love without the closeness breaking you. The wound is real, and the part of you that still feels it is not the problem.
    metadata:
      semantic_family: longing-as-evidence
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_hook_personal_04
    line: You watched the footage and went silent for an hour. You also know that silence cannot be where this ends, because the heart inside the silence has not been able to forget — and that refusal to forget is, by itself, a kind of prayer.
    metadata:
      semantic_family: silence-but-not-numb
      tone: grave
      intensity: 4
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_hook_personal_05
    line: You are not asking the news to make you feel less. You are asking how to keep the heart open without it shattering — how to let what you love stay close enough that you can still act when the next call comes.
    metadata:
      semantic_family: open-heart-vs-shatter
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: maat_pc_hook_big_01
    line: Conflict pressure no longer arrives only as geopolitics. It arrives as moral injury — the felt sense that what is happening cannot be named honestly inside the institutions tasked with naming it.
    metadata:
      semantic_family: moral-injury-frame
      angle: systemic-pressure
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_hook_big_02
    line: A generation is being asked to hold the weight of repeated violence inside institutions that keep failing to protect, and to do so without the language most cultures once carried for the heart's response to that failure.
    metadata:
      semantic_family: institutional-failure-context
      angle: institutional-context
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_hook_big_03
    line: The mystical traditions hold that the qalb — the spiritual heart — registers truth before the analytical mind catches up. What gets read as a youth crisis of hopelessness is, in part, that registration without anywhere safe to land.
    metadata:
      semantic_family: heart-as-organ-of-truth
      angle: spiritual-anthropology
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_hook_big_04
    line: When the public field keeps absorbing violence without metabolizing it, the cost lands somewhere — usually in the bodies of those young enough to still feel without filters, and the part of them that does not yet know how to armor.
    metadata:
      semantic_family: absorption-without-metabolism
      angle: cohort-absorption
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_hook_big_05
    line: The Sufi path does not treat the heart's response to violence as a problem to manage. It treats it as evidence that something inside the human remains tuned to the Beloved — and that the tuning is what must be protected when the world insists otherwise.
    metadata:
      semantic_family: beloved-tuning-protection
      angle: tradition-frame
      article_types:
      - hard_news_spiritual_response
teacher_intro:
  options:
  - id: maat_pc_intro_01
    line: Teacher Maat — born Naqshbandi, MIT-trained engineer, ex-McKinsey consultant, now a Sufi teacher in the Hazrat Inayat Khan lineage — has watched in Sufi circles young people carry the weight of repeated violence and arrive asking the question her tradition was made for. How does the heart stay open when what it loves keeps being harmed? In her framework the answer is not endurance and not detachment. It is dhikr — remembrance — practiced inside the wound, not around it.
    metadata:
      semantic_family: engineer-to-mystic-bridge
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_intro_02
    line: Teacher Maat teaches within the Naqshbandi Sufi tariqat — the path of the heart — and inside Hazrat Inayat Khan's universal Sufism, which holds that one does not need to be Muslim to walk this way. In her Sufi circles, young people arrive carrying conflict pressure as a question about love itself, about whether it survives this much harm. She does not answer with reassurance. She answers with sama — sacred listening — and lets the music do what the words cannot.
    metadata:
      semantic_family: universal-sufi-frame
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_intro_03
    line: Teacher Maat carries a strange double inheritance — Naqshbandi Sufi from birth, engineer by MIT training, consultant by ex-McKinsey practice, teacher by call. In her circles young people read the conflict updates and ask whether the analytical mind they were trained to trust is the same mind that keeps missing what their bodies already know. Her tradition does not ask them to choose. It asks them to let the heart, the qalb, be the place where the analysis lands.
    metadata:
      semantic_family: analytic-and-heart-witness
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_intro_04
    line: Teacher Maat teaches Rumi inside Sufi circles where the lover-and-Beloved relationship is not metaphor but practice. When young people arrive carrying repeated violence, she does not offer them a coping framework. She offers them a re-orientation — that the longing they feel for a world that will not keep breaking is the same longing the mystics named ishq, and that the longing itself is the door.
    metadata:
      semantic_family: ishq-as-door
      tone: plain
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_intro_05
    line: Teacher Maat teaches inside a tradition that has held, for centuries, the practice of staying open in the presence of unbearable love and unbearable harm. In her Sufi circles she has watched young people walk in numbed and walk out softened — not because anything outside changed, but because dhikr returned the heart to a register the violence had not been able to reach.
    metadata:
      semantic_family: tradition-of-staying-open
      tone: grave
      intensity: 3
      article_types:
      - hard_news_spiritual_response
      - commentary
youth_somatic:
  options:
  - id: maat_pc_somatic_01
    line: You read the latest report. Your chest tightens. You look away. Then you come back because conscience is still there.
    metadata:
      semantic_family: chest-clench-return
      loop_type: heart_under_violence
      body_register: chest
      digital_behavior: reads the report
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_somatic_02
    line: Your jaw locks when the alert vibrates. You replay the footage in your head before you decide to open it. Your breath shortens. The body had registered the harm before the decision to look.
    metadata:
      semantic_family: jaw-lock-pre-open
      loop_type: jaw_lock_replay
      body_register: jaw
      digital_behavior: alert vibrates
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_somatic_03
    line: You hold your breath while the video loads. Your shoulders rise. You exhale halfway when you see what it is, because the rest of the breath is being held for the next one.
    metadata:
      semantic_family: breath-held-for-next
      loop_type: video_load_hold
      body_register: breath
      digital_behavior: video loads
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_somatic_04
    line: You finished the article and sat for a long minute without moving. Your hands were warm. The heart underneath them was still working, and that small fact felt like the only honest thing in the room.
    metadata:
      semantic_family: hand-on-heart-witness
      loop_type: post_article_stillness
      body_register: chest
      digital_behavior: finishes the article
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_somatic_05
    line: You lay down and the day's footage replayed behind your eyes. Your jaw would not soften. You knew sleep was the thing that would help and you could not find the door into it.
    metadata:
      semantic_family: night-replay-no-door
      loop_type: night_replay
      body_register: jaw
      digital_behavior: lying down
      article_types:
      - hard_news_spiritual_response
teacher_witness:
  options:
  - id: maat_pc_witness_01
    line: Maat has seen this exact loop in her Sufi circles — the report, the tightening, the turning away, and the return because the heart will not let go. In her tradition that return is not weakness. It is the qalb refusing to close, and the closing is what dhikr was made to prevent.
    metadata:
      semantic_family: qalb-refuses-to-close
      loop_type: heart_under_violence
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_witness_02
    line: Maat has watched young people sit in sohbet with their phones face-down after the third atrocity in a week. In her framework that silence is not collapse. It is the heart's response to overload — and the moment before sama, when sacred sound can begin to do what reading cannot.
    metadata:
      semantic_family: silence-as-pre-sama
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_witness_03
    line: She has watched the body carry what the headlines could not metabolize. In her tradition that carrying is not a malfunction; it is the qalb registering the harm the institutions refuse to name, and the registration is the first honest act available to the person inside it.
    metadata:
      semantic_family: registration-as-first-act
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_witness_04
    line: Maat has watched young clients arrive numb and not know it. In her circles she does not ask them to feel more. She asks them to begin dhikr — one breath, one remembrance — and to let the practice loosen what the violence had locked, so the heart can begin to move again at its own pace.
    metadata:
      semantic_family: dhikr-loosens-lock
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_witness_05
    line: Maat has watched the moment when a young person stops trying to manage the grief and lets it become longing for the Beloved instead. In her tradition that moment is not bypass. It is the place where moral injury becomes prayer, and prayer becomes the ground from which the next clear act emerges.
    metadata:
      semantic_family: grief-becomes-longing
      article_types:
      - hard_news_spiritual_response
turnaround:
  options:
  - id: maat_pc_turnaround_01
    stat_line_1: 676 million women and girls. Within 50km of conflict.
    stat_line_2: UN Women data shows 676 million women and girls now live within 50 kilometers of active conflict — the highest figure since the 1990s — and youth coalitions worldwide are insisting that the response no longer treat their inclusion as optional.
    metadata:
      semantic_family: cohort-proximity-data
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_turnaround_02
    stat_line_1: UNSC 2250. 47 National Action Plans.
    stat_line_2: The UN Youth, Peace and Security agenda anchored by Security Council Resolution 2250 has been adopted into 47 National Action Plans across member states, binding governments to include youth in peace processes as a matter of policy, not goodwill.
    metadata:
      semantic_family: policy-instrument
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_turnaround_03
    stat_line_1: 5,000 peacebuilders. Search for Common Ground.
    stat_line_2: Search for Common Ground operates with more than 5,000 staff and partners across over 30 countries, including networks of young peacebuilders who run dialogue and conflict-transformation programs in places the headlines describe as intractable.
    metadata:
      semantic_family: practitioner-network
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_turnaround_04
    stat_line_1: 100+ organizations. Generation Peace Network.
    stat_line_2: The Generation Peace Network coordinates more than 100 youth-led peacebuilding organizations across regions of active conflict, sharing protocols and protecting practitioners in places no single institution can reach.
    metadata:
      semantic_family: youth-led-coordination
      article_types:
      - hard_news_spiritual_response
  - id: maat_pc_turnaround_05
    stat_line_1: Decades of Sufi dialogue. Naqshbandi circles.
    stat_line_2: Across the Naqshbandi and broader Sufi traditions, Sufi circles have hosted inter-communal dialogue for centuries — practices the contemporary peacebuilding sector is now reaching for and adapting, including in conflict zones where political negotiation has stalled.
    metadata:
      semantic_family: tradition-as-resource
      article_types:
      - hard_news_spiritual_response
bridge:
  options:
  - id: maat_pc_bridge_01
    line: 676 million women and girls now live within 50km of active conflict. The tracker measures proximity and policy. It has no column for the capacity that kept the next dialogue circle convening after the last round of violence — the heart staying open enough to keep showing up. Maat's tradition has language for exactly that capacity. The qalb, when softened by dhikr, does not stop grieving. It stops armoring against the grief — and an unarmored heart is the one that can still act.
    hidden_capacity: keep showing up after the last round of violence
    metadata:
      semantic_family: unarmored-heart-acts
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_bridge_02
    line: The data captures coalitions and Action Plans. It does not capture what held the young organizer the night after the funeral when the policy victory came too late. In Maat's tradition that holding is sama — sacred listening, sound used as doorway — and it is the layer the policy data cannot reach but the practitioner cannot do the work without.
    hidden_capacity: be held the night after the funeral
    metadata:
      semantic_family: sama-holds-practitioner
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_bridge_03
    line: Numbers track the peacebuilders and their programs. They cannot track the moment a young practitioner felt the heart begin to harden and chose dhikr instead — the breath of remembrance that returned the qalb to a state where another conversation across the line was still possible. That choice does not appear in any report. The work depends on it.
    hidden_capacity: choose dhikr instead of armor
    metadata:
      semantic_family: dhikr-vs-armor-choice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_bridge_04
    line: The infrastructure of peacebuilding is measurable. The fanaa — the slow dissolution of the false self that wants to call this normal and look away — is not. Maat's tradition does not measure that work and does not need to. It names it, and it offers practices that have carried it for centuries in circles that outlasted empires.
    hidden_capacity: dissolve the false self that wants to look away
    metadata:
      semantic_family: fanaa-vs-look-away
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_bridge_05
    line: Coalitions, Action Plans, and dialogue protocols can be counted. The longing for a world that does not keep breaking — the ishq that pulls a young peacebuilder back into the room — cannot. Maat's tradition does not argue with the metrics. It tends the longing the metrics cannot see, and lets the longing be the engine the institutional response was never built to carry.
    hidden_capacity: tend the longing the metrics cannot see
    metadata:
      semantic_family: longing-as-engine
      article_types:
      - hard_news_spiritual_response
      - commentary
teacher_perspective:
  options:
  - id: maat_pc_perspective_01
    header: What Maat Sees
    paragraphs:
    - In the Naqshbandi tariqat, the qalb — the spiritual heart — is not a metaphor. It is the organ through which the lover encounters the Beloved, and it is the first thing repeated violence asks a person to close. The tradition holds that closing the heart is what produces the next round of harm. The path is to keep the heart open, dhikr by dhikr, breath by breath, even when the world argues otherwise.
    - This is not a request to feel more. It is a request to feel honestly — to let what is happening land where it lands, in the chest, in the jaw, in the breath, and to let dhikr do the slow work of returning the heart to its native register without flooding it.
    - The young person carrying repeated conflict is not asked to fix it alone. The Sufi circle is the place where the carrying becomes shared — where sama, sacred listening, lets sound do what arguments cannot, and where the longing for a world without this harm is named as ishq, not as weakness.
    metadata:
      semantic_family: qalb-open-by-dhikr
      reframe_type: closure_to_remembrance
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_perspective_02
    header: What Maat Sees
    paragraphs:
    - Fanaa, in this tradition, is the dissolution of the false self in Divine Love — and the false self has many shapes. Under repeated violence, the false self is often the one that wants to call the harm normal, to absorb it without letting it touch, to keep functioning at the cost of contact with what is true. Fanaa is not bypass. It is the slow undoing of that armor so the heart remains in honest contact with reality.
    - The practice is not detachment. Maat's tradition holds detachment as a forbidden reading. Fanaa is dissolution into love, not withdrawal from the world. The lover does not leave the Beloved's table when the news arrives. The lover stays at the table and lets the table become bigger.
    - For the young person, this looks like permission to keep feeling without that feeling becoming the proof they cannot continue. The capacity to continue comes from the practice, not from the willpower of the personality.
    metadata:
      semantic_family: fanaa-as-staying-in-contact
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_perspective_03
    header: What Maat Sees
    paragraphs:
    - Dhikr — remembrance — is not mindfulness. In Maat's tradition this distinction is not optional. Mindfulness is attention training. Dhikr is the return of the heart to its source, to the Beloved, and the source does not change when the news does. The breath becomes a marker for that return, but the return is the work; the breath is the door.
    - Under repeated violence, dhikr is the small, durable practice that lets the heart not be ruled by the news cycle while still being in contact with what the cycle reports. The remembering does not deny the harm; it locates the heart somewhere the harm cannot fully reach, so the response to the harm can remain whole.
    - This is the layer institutional peacebuilding cannot deliver and need not. Maat's tradition does not compete with structural work. It carries the practitioner through the work, in the breath under the action.
    metadata:
      semantic_family: dhikr-not-mindfulness
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_perspective_04
    header: What Maat Sees
    paragraphs:
    - Sama, in this tradition, is the practice of sacred listening — music and sound as doorway to the heart. When the analytical mind has done all it can with a conflict update and the heart is still tight, sama is the practice that bypasses the analysis and meets the body where it has been holding the news. It is not entertainment and not regulation. It is contact.
    - The Sufi circles have used sama for centuries to keep practitioners in honest relationship with grief without grief becoming the whole identity. The sound moves through the chest, the jaw, the breath. What had locked begins to soften. The remembering can happen again.
    - For the young person who has read too many reports and has nowhere safe for the body to land, sama offers a layer of listening the algorithmic feeds were never built to provide. The tradition is not arguing with the feeds. It is offering the door the feeds left out.
    metadata:
      semantic_family: sama-as-doorway
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_perspective_05
    header: What Maat Sees
    paragraphs:
    - Ma'rifa — experiential mystical knowledge — is the kind of knowing that does not arrive through reading more news or consuming more analysis. It arrives through practice, through the qalb being in contact with the Beloved long enough that the contact becomes its own kind of certainty. For a generation drowning in information, this distinction is not academic.
    - The young person who has read every report on a conflict and is still asking what is true here is asking a ma'rifa question. The tradition holds that the analytical layer cannot fully answer it, because the question is being asked from a layer beneath the analysis. The answer comes through sustained practice — dhikr, sama, sohbet — not through one more article.
    - This is the engineer-mystic bridge in practice. Maat does not dismiss the analytical mind. She names what it can and cannot do, and offers the practices that meet the layer the analytical mind cannot reach on its own.
    metadata:
      semantic_family: marifa-vs-more-information
      article_types:
      - hard_news_spiritual_response
      - commentary
practice:
  default_id: maat_pc_practice_01
  options:
  - id: maat_pc_practice_01
    display_name: Dhikr Pause
    duration: 5 minutes
    announcement_line: Teacher Maat offers a 5-minute Dhikr Pause for moments when the next report has just landed and the chest is already tight. One breath in with the remembrance that the Beloved is closer than the news. One breath out with the release of what the heart was being asked to armor against. Five minutes. It is in the sidebar, timed and step by step.
    relief_lines:
    - The mind stops trying to metabolize the violence alone.
    - The qalb returns to a register the report could not fully reach.
    relief_register:
    - remember
    - return
    - presence
    derived_from_frame: dhikr_pause
    metadata:
      semantic_family: dhikr_pause_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_practice_02
    display_name: Sama Listening
    duration: 12 minutes
    announcement_line: Teacher Maat teaches a 12-minute Sama Listening practice for moments when the analytical mind has done all it can and the body still has not been heard. A single piece of devotional music, listened to with the chest and not the ears. Notice where the sound lands. Let it land. It is in the sidebar, timed and step by step.
    relief_lines:
    - The body receives what the analysis could not deliver.
    - The heart softens at the layer dhikr is preparing to meet.
    relief_register:
    - listen
    - receive
    - soften
    derived_from_frame: sama_listening
    metadata:
      semantic_family: sama_listening_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_practice_03
    display_name: Sufi Circle Recall
    duration: 7 minutes
    announcement_line: Teacher Maat offers a 7-minute Sufi Circle Recall for moments after a violence-laden news cycle when isolation is creeping in. Bring to mind a circle — physical or imagined — of those who hold this longing for the world to stop breaking. Sit with them in silence first, then with a single remembrance. It is in the sidebar, timed and step by step.
    relief_lines:
    - The grief stops being held alone.
    - The longing for a world without this harm finds company.
    relief_register:
    - gather
    - share
    - witness
    derived_from_frame: sufi_circle_recall
    metadata:
      semantic_family: sufi_circle_recall_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_practice_04
    display_name: Fanaa Witness
    duration: 6 minutes
    announcement_line: Teacher Maat teaches a 6-minute Fanaa Witness practice for the moment after the news lands and the false self has already started to whisper that this is normal. Sit with the whisper. Notice the shape of the armor it is offering. Let the breath be slow enough that the armor begins to dissolve, not be argued with. Six minutes. It is in the sidebar, timed and step by step.
    relief_lines:
    - The false self that wanted to call the harm normal is named.
    - The dissolution begins, slowly, where willpower would have failed.
    relief_register:
    - dissolve
    - honest
    - softer
    derived_from_frame: fanaa_witness
    metadata:
      semantic_family: fanaa_witness_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
  - id: maat_pc_practice_05
    display_name: Wine of Remembrance Breath
    duration: 3 minutes
    announcement_line: Teacher Maat offers a 3-minute Wine of Remembrance Breath for moments of acute overwhelm, when one more update has arrived and the body cannot hold one more. Breath in as if drinking from the wine of remembrance — the intoxication of presence that Rumi names. Breath out as the long exhale that lets the day's weight settle without becoming permanent. Three minutes. It is in the sidebar, timed and step by step.
    relief_lines:
    - The breath becomes a marker for presence rather than for the day's count.
    - The intoxication of remembrance loosens the grip the news had taken.
    relief_register:
    - presence
    - softening
    - remembrance
    derived_from_frame: wine_of_remembrance_breath
    metadata:
      semantic_family: wine_of_remembrance_practice
      article_types:
      - hard_news_spiritual_response
      - commentary
