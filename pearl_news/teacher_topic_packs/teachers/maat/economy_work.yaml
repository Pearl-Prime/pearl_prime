hook_personal:
  options:
  - id: hook_personal_01
    line: Work keeps asking for more flexibility while giving less stability, and
      your body knows the cost before the schedule ever admits it.
    semantic_family: maat-economy_work-hook-personal
    tone: plain
    intensity: 3
    article_types:
    - hard_news_spiritual_response
hook_big_picture:
  options:
  - id: hook_big_picture_01
    line: 'Economic stress now arrives as identity pressure: stay employable, stay
      available, and keep acting as if instability were a test of character.'
    semantic_family: maat-economy_work-hook-big
    article_types:
    - hard_news_spiritual_response
teacher_intro:
  options:
  - id: teacher_intro_01
    line: Teacher Ma'at, a South Indian Sufi teacher rooted in the dargah traditions
      of Tamil Nadu — who carries Rabia al-Adawiyya's fire and the Tamil Siddha poets'
      understanding that the heart is the organ of truth — has watched in practice
      sessions this pressure land on young people. They are not only asking what is
      happening. They are asking how to trust their own perception when the qalb —
      the spiritual heart — already knows what institutions keep understating.
    semantic_family: maat-economy_work-intro
    article_types:
    - hard_news_spiritual_response
youth_somatic:
  options:
  - id: youth_somatic_01
    line: 'You check the schedule app. Your stomach drops. You refresh again. Then
      you screenshot it because the shift might disappear before you can trust what
      you saw. LOOP_SEQUENCE: "checked the app. stomach dropped. refreshed again.
      took the screenshot."'
    loop_type: truth_pressure
    article_types:
    - hard_news_spiritual_response
teacher_witness:
  options:
  - id: teacher_witness_01
    line: Ma'at has seen this exact loop -- the app check, the drop in the body, the
      refresh, and the screenshot that tries to hold the moment still.
    semantic_family: maat-economy_work-witness
    article_types:
    - hard_news_spiritual_response
turnaround:
  options:
  - id: turnaround_01
    stat_line_1: 1,240 cases. 32 cities.
    stat_line_2: Young workers are documenting conditions, filing wage-theft cases,
      and organizing campaigns that force unstable labor rules into the public record.
    semantic_family: maat-economy_work-turnaround
    article_types:
    - hard_news_spiritual_response
bridge:
  options:
  - id: bridge_01
    line: '1,240 cases. 32 cities. The tracker measures what young people did. It
      has no column for what made the next step possible after another cancelled shift
      — the capacity to stay functional enough to act again when the economy keeps
      converting uncertainty into private shame. The person who came back needed it.
      So does the reader in that loop. Ma''at''s tradition has language for exactly
      this: longing is not a wound — it is the proof that you already know what you
      are missing. The Beloved Letter practice asks you to write to whatever you love
      most — not asking for anything, just expressing ishq, conscious longing. When
      longing becomes conscious, the heart stops confusing precarity with worthlessness.'
    hidden_capacity: return to truthful action
    semantic_family: maat-economy_work-bridge
    article_types:
    - hard_news_spiritual_response
teacher_perspective:
  options:
  - id: teacher_perspective_01
    header: What Ma'at Sees
    paragraphs:
    - Ma'at would begin with truth. The first distortion happens when a person is
      asked to treat a structural disorder as a private defect.
    - Right relationship means naming what is actually happening without shrinking
      it to fit institutional comfort. That naming is not dramatics; it is alignment
      with reality.
    - What feels like a personal fault — me, broken, wrong — is often accurate response
      to a system that keeps asking for trust while misnaming harm, delay, or disorder.
    semantic_family: maat-economy_work-perspective
    article_types:
    - hard_news_spiritual_response
practice:
  default_id: practice_01
  options:
  - id: practice_01
    display_name: Beloved Letter
    duration: 5 minutes
    announcement_line: 'Ma''at teaches a Beloved Letter practice — rooted in Rabia''s
      prayer poetry. Write a letter to whatever you love most. Not asking for anything
      — just expressing longing. Ma''at says: longing is not a wound. It is the proof
      that you already know what you are missing. It is in the sidebar, timed and
      practical.'
    relief_lines:
    - The mind stops bargaining with what it already knows.
    - Enough steadiness returns to name reality without apologizing for seeing it
      clearly.
    relief_register:
    - capacity
    - clarity
    - act again
    article_types:
    - hard_news_spiritual_response
