bridge:
  options:
    - id: bridge_01
      line: "1,200 mutual-aid networks. 47 countries. The tracker measures what young people did. It has no column for what made the next step possible after another year of widening gaps — the capacity to refuse the verdict the nafs of the system keeps trying to install, while keeping the structural fight in view. The organizer who returned to the campaign needed it. So does the reader still in the loop. Ma'at's tradition has been refining the practice for centuries."
      hidden_capacity: "refuse the nafs verdict while sustaining structural action"
      semantic_family: "maat-inequality-bridge-nafs"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: bridge_02
      line: "Inequality trackers count median wages and Gini coefficients. They do not count the inner capacity that lets a young person stay in contact with the math without converting the math into a verdict on the heart. That capacity — what dhikr cultivates — is what the next organizer needs. It is what the reader who reopened the listing needs too. The Naqshbandi tariqat has been protecting it through remembrance, not analysis."
      hidden_capacity: "dhikr keeps the heart out of reach of the economic verdict"
      semantic_family: "maat-inequality-bridge-dhikr"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: bridge_03
      line: "1,200 mutual-aid networks. 47 countries. The number measures action. It does not measure the slower thing — the daily refusal of the hierarchy of worth that the gap keeps trying to deliver. The Sufi tradition holds that the longing of the heart for the Beloved does not come in higher and lower grades by race, class, or credential. The Sufi Circle is the weekly demonstration of that."
      hidden_capacity: "hold inherent worth against economic arbitration"
      semantic_family: "maat-inequality-bridge-longing"
      article_types: ["hard_news_spiritual_response", "commentary"]
teacher_perspective:
  options:
    - id: teacher_perspective_01
      header: "What Ma'at Sees"
      paragraphs:
        - "Ma'at teaches that the nafs — the grasping lower self — is the mechanism of inequality. The lower self that distinguishes, ranks, and withholds is precisely what the Sufi path dissolves in the fire of Divine Love. Structural arrangements producing inequality are the collective nafs made material; and fanaa, the dissolution of the grasping self, is the inner transformation that those working for equity require in themselves, or the movement replicates the very dynamics it seeks to transform."
        - "All are welcome — this is the Sufi teaching that Hazrat Inayat Khan brought West, and it is Ma'at's specific contribution to the inequality conversation. You do not have to be Muslim to be Sufi. The path of the heart is open to any soul that longs for the Beloved, regardless of where the social order has placed them. The divine does not observe the hierarchies that humans have constructed; the Sufi Circle is the weekly proof of this."
        - "The longing itself is equal. The moth's yearning for the flame does not come in higher and lower grades by race, class, or credential. Ma'at teaches that the soul's capacity for love and for direct experience of the Divine is distributed equally at birth and suppressed unequally by circumstance. The Sufi Circle restores what the social arrangement has suppressed — not by demanding equity as a precondition, but by opening a door that the hierarchy has no authority to close."
      semantic_family: "maat-inequality-perspective-nafs"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_perspective_02
      header: "What Ma'at Sees"
      paragraphs:
        - "Ma'at reads the verdict that inequality keeps trying to deliver through fanaa — the dissolution of the false self in Divine Love. The verdict claims that worth tracks position in the social order. Fanaa is the inner practice that holds, again and again, that what is dissolved in love does not have position. This is not detachment from the structural fight. It is the inner ground that keeps the fight from becoming the same hierarchy in a different costume."
        - "From there she turns to dhikr — remembrance — as daily practice. The breath returns. The Beloved's name returns. The mind that has been narrating the verdict for hours stops narrating, just for a moment, and the heart that the verdict was trying to colonize remembers what it was before the colonization began. Ma'at teaches that this is not escape. It is the recovery of the ground from which honest action becomes possible."
        - "The reframe is precise: what feels like a personal failure — me, ranked, worth-less than the position the order assigned — is often the heart's accurate refusal of a verdict that the heart never had the standing to issue. The mind stops calling itself broken when it recognizes that the disorder is in the order, and that the dissolution of the false self does not wait for the dissolution of the false hierarchy."
      semantic_family: "maat-inequality-perspective-fanaa"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_perspective_03
      header: "What Ma'at Sees"
      paragraphs:
        - "Ma'at would name the damage precisely. Inequality is not only economic harm; it is the daily installation of a hierarchy of worth that the heart was never asked to consent to. The body knows it before the language catches up — the chest tightening when the rent posts, the shoulders shifting when the paystub arrives. That body is not malfunctioning. It is registering an arrangement that asks for trust while delivering hierarchy."
        - "The Naqshbandi tradition does not respond by minimizing the arrangement. It responds by widening the field in which the arrangement is held. Sama — sacred listening — bypasses the analytical mind and speaks directly to the qalb, the spiritual heart. When the heart is steady, the arrangement can be named clearly without colonizing the inner ground from which the work of changing it proceeds."
        - "The reframe matters: what feels like a personal fault — me, broken, wrong — is often the heart's accurate response to a system that keeps externalizing the cost of widening inequality onto the people it falls on. The mind stops calling itself broken when it sees that the real disorder is in the arrangement, and that the arrangement can be changed by the same people who are currently being asked to swallow it."
      semantic_family: "maat-inequality-perspective-qalb"
      reframe_type: "self_to_system"
      article_types: ["hard_news_spiritual_response", "commentary"]
