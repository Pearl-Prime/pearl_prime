topic_fit:
  fit_level: primary
  fit_reason: "Inequality lands as the collective nafs made material; Sufi practice of fanaa dissolves the grasping self that the hierarchy keeps trying to install, while keeping the structural fight in view."
  forbidden_angles:
    - "do not preach acceptance of structural harm as spiritual surrender"
    - "do not privatize inequality as a personal heart problem"
hook_personal:
  options:
    - id: hook_personal_01
      line: "You watch the rent climb past the wage. You also feel the slower drain — the way the gap keeps trying to tell you what the heart already refuses to accept."
      semantic_family: "maat-inequality-hook-personal-rent"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
    - id: hook_personal_02
      line: "You read the wealth-share chart between classes. You also know what the chart is doing — translating a structural arrangement into a verdict the heart was never asked to consent to."
      semantic_family: "maat-inequality-hook-personal-chart"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response"]
    - id: hook_personal_03
      line: "You compared your starting salary with a friend in the group chat. The math was fast. The slower thing was what the comparison kept trying to do to how you see yourself."
      semantic_family: "maat-inequality-hook-personal-chat"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response"]
hook_big_picture:
  options:
    - id: hook_big_picture_01
      line: "Inequality pressure is not only economic. It is the daily installation of a hierarchy of worth that the institutions perpetuating the gap refuse to name as their own design."
      semantic_family: "maat-inequality-hook-big-design"
      article_types: ["hard_news_spiritual_response"]
    - id: hook_big_picture_02
      line: "The wealthiest 1% captured nearly two-thirds of new global wealth since 2020. The arrangement is not narrating itself as policy. It is narrating itself as a verdict on the person it falls on."
      semantic_family: "maat-inequality-hook-big-verdict"
      article_types: ["hard_news_spiritual_response"]
    - id: hook_big_picture_03
      line: "When wages cannot meet rent and student debt grows faster than starting salaries, inequality stops being an abstraction. It becomes the daily field where young people are asked to negotiate with their own sense of inherent worth."
      semantic_family: "maat-inequality-hook-big-field"
      article_types: ["hard_news_spiritual_response"]
teacher_intro:
  options:
    - id: teacher_intro_01
      line: "Teacher Ma'at, a Naqshbandi Sufi teacher in the Hazrat Inayat Khan lineage, has watched in Sufi Circles what economic inequality does to young people. Students are not asking for permission to want fairness. They are asking how to keep the gap from rewriting the heart's own sense of inherent worth while the structural fight goes on."
      semantic_family: "maat-inequality-intro-circles"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_intro_02
      line: "Teacher Ma'at, rooted in the Naqshbandi Tariqat and the universal Sufism that Hazrat Inayat Khan carried West, has watched in sama gatherings the specific exhaustion of being on the smaller side of widening gaps. The teaching she offers does not resolve the structural arrangement. It protects the heart from inheriting the verdict the arrangement keeps trying to deliver."
      semantic_family: "maat-inequality-intro-sama"
      tone: grave
      intensity: 4
      article_types: ["hard_news_spiritual_response", "commentary"]
    - id: teacher_intro_03
      line: "Teacher Ma'at — born into the Naqshbandi Tariqat, trained as an MIT engineer, now teaching what the doctrine calls the path of the heart — has watched in weekly Sufi Circles how dhikr begins to dismantle the verdict that inequality installs. The students come to the circle carrying the gap. They leave carrying the question the gap could not finally answer."
      semantic_family: "maat-inequality-intro-bridge"
      tone: plain
      intensity: 3
      article_types: ["hard_news_spiritual_response", "commentary"]
youth_somatic:
  options:
    - id: youth_somatic_01
      line: "You opened the rent listing. Your chest tightened. You closed the tab. Then you opened it again because the rent does not get smaller when you stop looking.\nLOOP_SEQUENCE: \"opened the listing. chest tightened. closed the tab. opened it again.\""
      loop_type: "nafs_verdict"
      body_register: "chest"
      digital_behavior: "close-return"
      article_types: ["hard_news_spiritual_response"]
    - id: youth_somatic_02
      line: "You saw the wealth-share post in your feed. Your shoulders tightened. You scrolled past it. Then you came back because the post was still the world.\nLOOP_SEQUENCE: \"saw the post. shoulders tightened. scrolled past. came back.\""
      loop_type: "nafs_verdict"
      body_register: "shoulders"
      digital_behavior: "scroll-return"
      article_types: ["hard_news_spiritual_response"]
    - id: youth_somatic_03
      line: "You compared paychecks with a friend in the group chat. Your throat tightened. You stopped typing. Then you sent the message anyway because pretending it was equal was its own kind of harm.\nLOOP_SEQUENCE: \"compared the paychecks. throat tightened. stopped typing. sent the message.\""
      loop_type: "nafs_verdict"
      body_register: "throat"
      digital_behavior: "pause-return"
      article_types: ["hard_news_spiritual_response"]
teacher_witness:
  options:
    - id: teacher_witness_01
      line: "Ma'at has seen this exact loop in the Sufi Circle — the chart, the tightening, the look away, and the return because the arrangement is still there when attention comes back."
      semantic_family: "maat-inequality-witness-circle"
      loop_type: "nafs_verdict"
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_witness_02
      line: "She has watched students arrive at sama gatherings carrying the verdict the gap keeps trying to deliver. The first thing the gathering offers is not consolation. It is dhikr — the disciplined remembrance of what the verdict cannot reach."
      semantic_family: "maat-inequality-witness-dhikr"
      loop_type: "nafs_verdict"
      article_types: ["hard_news_spiritual_response"]
    - id: teacher_witness_03
      line: "Ma'at has watched the slower thing — the moment a student feels the nafs verdict and the heart's refusal of it as two distinct facts, no longer collapsed into one. The Naqshbandi tradition has been teaching that distinction for centuries."
      semantic_family: "maat-inequality-witness-nafs"
      loop_type: "nafs_verdict"
      article_types: ["hard_news_spiritual_response"]
