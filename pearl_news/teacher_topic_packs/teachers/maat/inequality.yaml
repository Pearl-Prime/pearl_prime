    - id: turnaround_03
      stat_line_1: "1,200 mutual-aid networks. 47 countries."
      stat_line_2: "Student-led housing co-ops, tenant unions, and wage-research collectives are rewriting what dignity looks like in practice — not as a state of mind but as a set of arrangements that protect it."
