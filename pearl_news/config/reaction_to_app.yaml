# Maps gen_z_reactions reaction_id → mini-app from somatic_exercise_freebee_apps/.
# Used by hard_news_v2 sidebar to embed the right interactive practice.
#
# Picking heuristic (when the article uses reaction_id X):
#   1. Use `primary` app for the reaction.
#   2. If primary unavailable, use `fallback`.
#   3. If neither, no mini-app — show static practice preview only.
#
# App URLs are served from the site at /apps/<filename>; embed via <iframe>
# in the sidebar's v2-practice-card.

schema_version: 1

reactions:
  displacement_anxiety:
    primary:  ex14_grounding_54321.html        # 5-4-3-2-1 grounding for displaced/anxious somatic state
    fallback: ex13_body_scan.html
    rationale: "Sensory grounding pulls the nervous system out of forward-projection."

  moral_injury:
    primary:  app22_tonglen.html               # tonglen — sending/receiving practice for institutional grief
    fallback: ex18_loving_kindness.html
    rationale: "Tonglen meets institutional moral injury with a practice that doesn't pretend it didn't happen."

  agency_loss:
    primary:  ex15_intention_quadrant.html     # intention quadrant — reclaim agency through clarified intent
    fallback: app01_478_breathing.html
    rationale: "Quadrant clarifies what is/isn't in the cohort's locus of control."

  future_foreclosure:
    primary:  ex15_intention_quadrant.html     # same intention practice — reclaim agency on a shorter horizon
    fallback: ex19_progressive_relaxation.html
    rationale: "When the long arc is foreclosed, the practice is to find the short-arc decision still possible."

  betrayal_by_institutions:
    primary:  app22_tonglen.html
    fallback: ex18_loving_kindness.html
    rationale: "Same family as moral_injury — institutional betrayal needs the tonglen posture."

  compassion_overload:
    primary:  app22_tonglen.html               # canonical for compassion-saturation
    fallback: ex19_progressive_relaxation.html
    rationale: "Tonglen is literally designed for compassion-overload regulation."

  epistemic_disorientation:
    primary:  ex14_grounding_54321.html        # ground back to sensorial certainty when meaning destabilizes
    fallback: ex13_body_scan.html
    rationale: "When the epistemic field is destabilized, sensory grounding restores a verifiable layer."

  acceleration_dread:
    primary:  ex20_physiological_sigh.html     # immediate parasympathetic intervention for overwhelm
    fallback: app01_478_breathing.html
    rationale: "Pace-of-change overload responds to physiological-sigh fast-regulation."

  recognition_relief:
    primary:  ex18_loving_kindness.html        # validate, soften, sustain
    fallback: app03_coherence_breathing.html
    rationale: "Recognition deserves a metta posture; loving-kindness keeps it from becoming bitterness."

  solidarity_pull:
    primary:  ex18_loving_kindness.html
    fallback: app22_tonglen.html
    rationale: "Solidarity practice extends loving-kindness from individual to peer cohort."

  body_overload:
    primary:  ex19_progressive_relaxation.html # body-by-body unwinding for somatic saturation
    fallback: ex20_physiological_sigh.html
    rationale: "PMR is the canonical somatic-overload regulator; physiological sigh is the rapid version."

  narrative_thinning:
    primary:  ex15_intention_quadrant.html     # rebuild the smallest sustainable narrative
    fallback: ex14_grounding_54321.html
    rationale: "When the macro-story dissolves, intention quadrant restores micro-story."
