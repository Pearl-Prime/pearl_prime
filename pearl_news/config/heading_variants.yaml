# Pearl News — heading variant pools.
#
# Authority: docs/PEARL_NEWS_WRITER_SPEC.md §14 (added by this PR).
# Consumed by: pearl_news/pipeline/heading_selector.py.
# Wired into: pearl_news/pipeline/assemble_v52.py (_SECTION_HEADERS_BY_LANG resolution).
#
# Two heading axes get variant pools:
#
#   gen_z_impact   — the youth-impact section heading. 5 variants per (topic × locale).
#                    Replaces the fixed "This is how it affects Gen Z and Gen Alpha"
#                    in assemble_v52.py:_SECTION_HEADERS_BY_LANG[*]["felt_experience"].
#
#   teacher_sees   — the teacher-insight section heading. 5 variants per teacher,
#                    authored in the teacher's primary locale. Replaces the fixed
#                    "What {teacher_name} Sees" with a tradition-aware framing
#                    (per operator: the teacher's NAME is no longer in the heading;
#                    the heading invokes the tradition, e.g. "A Tao Grandmaster
#                    Shares A Helpful Insight").
#
# Selection is deterministic per article: stable blake2b hash of (post_slug | axis)
# mod pool_size. Stable across re-publishes. See heading_selector.py for the rule.
#
# Falls back to the legacy fixed string in assemble_v52.py if a pool is missing.

schema_version: 1

