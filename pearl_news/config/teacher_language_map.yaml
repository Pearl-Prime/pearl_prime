# Canonical teacher → Pearl News article language (BCP-47 style keys used by pipeline).
# Used for: expansion/TTS/slot locale expectations when content is attributed to a teacher.
# Article-level `item["language"]` still drives expansion_routing.py; this map is the
# source of truth for which language a teacher’s primary publishing voice uses.
#
# Routing today: expansion_routing.py selects Claude vs Qwen from item["language"] only
# (see pearl_news/pipeline/expansion_routing.py). teacher_resolver.py filters candidates
# by article language vs roster region_fit. Align feed generation so teacher-native
# articles use the language below where policy requires it.

