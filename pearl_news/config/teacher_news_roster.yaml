# Pearl News — teacher roster for news articles.
# Maps each teacher to their tradition (for attribution) and Pearl News news topics.
# Used by teacher_resolver.py to pick a named teacher per article.
# Policy: One named teacher per article; attributed by name + tradition.
# Spec ref: PEARL_NEWS_WRITER_SPEC.md §6 (commentary exception applies to all templates when teacher atoms present).
# Authority: tradition / tradition_short / attribution_template MUST match each teacher's
#   SOURCE_OF_TRUTH/teacher_banks/<id>/doctrine/doctrine.yaml — doctrine wins on conflict.
# Canonical language assignment: pearl_news/config/teacher_language_map.yaml
#   (region_fit below is informational only; teacher_language_map is enforced by the pipeline).

schema_version: 1

# Active Pearl News teachers (per operator, 2026-05-15):
#   ja:    joshin, junko, miki, omote
#   zh-cn: master_feung, master_wu
#   en:    sai_ma, master_sha, ahjan, maat
# Non-active (retained for legacy compatibility; no Pearl News authoring): ra, pamela_fellows

teachers:
  ahjan:
    display_name: "Ahjan"
    tradition: "Tantric Buddhist"
    tradition_short: "Tantric Buddhist"
    region_fit: [japan, english, global]
    news_topics: [climate, mental_health, education, peace_conflict, partnerships, inequality]
    attribution_template: "From within the Tantric Buddhist tradition, Ahjan sensei teaches that"

