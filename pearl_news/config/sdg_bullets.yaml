# Pearl News — SDG sidebar bullets
# =================================
# Consumed by pearl_news/pipeline/assemble_v52.py via _load_sdg_bullets():
#   _load_sdg_bullets().get(str(sdg_num), {}).get("bullets")
# renders the 3 bullets under the "SDG Connection" sidebar badge.
#
# Schema:
#   sdgs:
#     "<sdg_number>":
#       name: <human label, mirrors SDG_DB[name]>
#       target: <primary UN target the article speaks to; informational>
#       bullets: [<exactly 3 short bullets, each grounded in a real UN target>]
#
# Authored for the topic-mapped SDGs Pearl News publishes against
# (3, 4, 8, 10, 13, 16, 17). Bullets reference the official UN SDG targets so
# the renderer stops emitting an empty SDG card (handoff 2026-06-07 §9.4).
# Targets verified against the UN Sustainable Development Goals framework.

schema_version: 1

sdgs:
  "3":
    name: Good Health & Well-Being
    target: "3.4"
    bullets:
      - "Target 3.4: cut premature death from non-communicable disease by a third and promote mental health and well-being."
      - "Target 3.5: strengthen prevention and treatment of substance abuse, including narcotic drug abuse."
      - "Target 3.8: achieve universal health coverage, including access to quality essential health services for young people."

  "4":
    name: Quality Education
    target: "4.7"
    bullets:
      - "Target 4.7: ensure all learners acquire the knowledge and skills needed to promote sustainable development and global citizenship."
      - "Target 4.1: ensure every girl and boy completes free, equitable, quality primary and secondary education."
      - "Target 4.4: substantially increase the number of youth with the skills needed for decent work and entrepreneurship."

  "8":
    name: Decent Work & Economic Growth
    target: "8.3"
    bullets:
      - "Target 8.3: support decent job creation, entrepreneurship, and the growth of micro- and small enterprises."
      - "Target 8.5: achieve full and productive employment and equal pay for work of equal value for all."
      - "Target 8.6: substantially reduce the share of youth not in employment, education, or training."

  "10":
    name: Reduced Inequalities
    target: "10.3"
    bullets:
      - "Target 10.3: ensure equal opportunity and reduce inequalities of outcome by eliminating discriminatory practices."
      - "Target 10.2: empower and promote the social, economic, and political inclusion of all, irrespective of status."
      - "Target 10.4: adopt fiscal, wage, and social-protection policies that progressively achieve greater equality."

  "13":
    name: Climate Action
    target: "13.3"
    bullets:
      - "Target 13.3: improve education and awareness on climate change mitigation, adaptation, and early warning."
      - "Target 13.1: strengthen resilience and adaptive capacity to climate-related hazards in all countries."
      - "Target 13.2: integrate climate change measures into national policies, strategies, and planning."

  "16":
    name: Peace, Justice & Strong Institutions
    target: "16.7"
    bullets:
      - "Target 16.7: ensure responsive, inclusive, participatory, and representative decision-making at all levels."
      - "Target 16.1: significantly reduce all forms of violence and related death rates everywhere."
      - "Target 16.3: promote the rule of law and ensure equal access to justice for all."

  "17":
    name: Partnerships for the Goals
    target: "17.17"
    bullets:
      - "Target 17.17: encourage and promote effective public, public-private, and civil-society partnerships."
      - "Target 17.16: strengthen the global partnership for sustainable development across all stakeholders."
      - "Target 17.18: enhance support for reliable, high-quality, timely, and disaggregated data."
