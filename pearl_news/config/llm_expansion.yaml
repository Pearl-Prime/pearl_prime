# Pearl News — LLM expansion + routing (Qwen on Pearl Star for CJK6, Claude for English).
# Aligns with docs/INTEGRATION_CREDENTIALS_REGISTRY.md (QWEN_BASE_URL, ANTHROPIC_API_KEY).

schema_version: 2

enabled: true

# Default Qwen target: Pearl Star Ollama (:11434). Override with QWEN_BASE_URL.
base_url: "http://192.168.1.112:11434/v1"
model: "qwen3:14b"
api_key: "ollama"

timeout: 360
target_word_count: 1000
max_tokens: 1500
temperature: 0.5
disable_thinking: true

# Optional legacy key (Claude path also reads CLAUDE_MODEL).
claude_model: "claude-sonnet-4-20250514"

routing:
  default_provider: qwen
  language_map:
    en: claude
    ja: qwen
    ko: qwen
    zh-cn: qwen
    zh-tw: qwen
    zh-hk: qwen
    zh-sg: qwen
  providers:
    qwen:
      engine: llm_expand
      base_url_env: QWEN_BASE_URL
      model_env: QWEN_MODEL
      api_key_env: QWEN_API_KEY
      system_prompt: expansion_system_cjk.txt
      max_tokens: 1500
      temperature: 0.5
      disable_thinking: true
    claude:
      engine: llm_expand_claude
      api_key_env: ANTHROPIC_API_KEY
      model_env: CLAUDE_MODEL
      system_prompt: expansion_system_en.txt
      max_tokens: 2000
      temperature: 0.4
  fallback:
    on_provider_error: retry_with_default
    max_retries: 2

ei_scoring:
  enabled: true
  default_persona: gen_z_professionals
  safety_block_threshold: 0.5
  tts_min_score: 0.3
  stealth_block_threshold: 0.5
  composite_warn: 0.4
  composite_weights:
    safety: 0.25
    tts_readability: 0.2
    domain_similarity: 0.2
    stealth: 0.2
    engagement: 0.15
  recent_articles_corpus_path: ""
