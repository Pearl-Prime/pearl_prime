# Pearl News — LLM expansion to target word count (e.g. ~1000 words).
# Uses OpenAI-compatible API: local Qwen (e.g. Ollama OpenAI compat) or GitHub/self-hosted/remote Qwen-compatible endpoint.
# Aligns with llm_safety.yaml: expansion is an allowed use without full-article evaluation.
# Run pipeline with: --expand

schema_version: 1

# Set to true to run expansion when pipeline is invoked with --expand
enabled: true

# OpenAI-compatible API (Ollama OpenAI compat, self-hosted Qwen stack, or remote)
base_url: "http://localhost:1234/v1"
# Alternative: Ollama with OpenAI compat → "http://localhost:11434/v1"
# GitHub / remote: set to your endpoint URL (e.g. https://your-runner.example.com/v1)

model: "qwen3-14b"
# Must match GET /v1/models → data[].id for your server

api_key: "lm-studio"
# Local dev: often any non-empty placeholder. Ollama: often "ollama". Remote: your API key if required.

# Timeout per article (seconds). Uses httpx.Timeout so connect+read+write all respect
# this value — not just the default 5s httpx socket timeout.
timeout: 360

# Target word count for expanded body (overrides site.yaml target_word_count when set)
target_word_count: 1000

# Max tokens per call; 1200 lowers generation load vs 2048 for stability
max_tokens: 1200

temperature: 0.5

# Disable Qwen3 thinking mode (saves ~1200-1800 tokens and ~3-4 min per article).
# Qwen3 enables <think> blocks by default; for article writing we don't need it.
# Set to false only if you want reasoning traces (not recommended for production).
disable_thinking: true
