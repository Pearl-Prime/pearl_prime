# Pearl News — LLM expansion + routing (slot engine: Claude for EN, Qwen-compatible for CJK).
# Rollback CJK to single-pass: set routing.fallback.use_legacy_full_document_cjk: true

schema_version: 2

enabled: true

# Default Qwen target: Pearl Star Ollama (:11434). Override with QWEN_BASE_URL.
base_url: "http://192.168.1.112:11434/v1"
model: "qwen2.5:14b"
api_key: "ollama"

timeout: 360
target_word_count: 1000
max_tokens: 1500
temperature: 0.5
disable_thinking: true

claude_model: "claude-sonnet-4-20250514"

# Global defaults; per-provider maps override by article language
min_output_chars:
  default: 1000
  en: 1500
  ja: 800
  zh-cn: 600
  zh-tw: 600
  ko: 800
  vi: 800

thin_output_retry: true

routing:
  default_provider: qwen_slots
  language_map:
    en: claude_slots
    ja: qwen_slots
    ko: qwen_slots
    zh-cn: qwen_slots
    zh-tw: qwen_slots
    zh-hk: qwen_slots
    zh-sg: qwen_slots
    vi: qwen_slots
  providers:
    claude_slots:
      engine: slot_expansion
      slot_backend: anthropic
      api_key_env: ANTHROPIC_API_KEY
      model_env: CLAUDE_MODEL
      system_prompt: expansion_system_en.txt
      max_tokens: 2000
      temperature: 0.4
      thin_output_retry: true
      min_output_chars:
        en: 1500
        default: 1200
    qwen_slots:
      engine: slot_expansion
      slot_backend: openai_compatible
      base_url_env: QWEN_BASE_URL
      model_env: QWEN_MODEL
      api_key_env: QWEN_API_KEY
      system_prompt: expansion_system_cjk.txt
      max_tokens: 1500
      temperature: 0.5
      disable_thinking: true
      thin_output_retry: true
      min_output_chars:
        ja: 800
        zh-cn: 600
        zh-tw: 600
        ko: 800
        vi: 800
        default: 1000
    qwen_legacy:
      engine: llm_expand
      base_url_env: QWEN_BASE_URL
      model_env: QWEN_MODEL
      api_key_env: QWEN_API_KEY
      system_prompt: expansion_system_cjk.txt
      max_tokens: 1500
      temperature: 0.5
      disable_thinking: true
  fallback:
    on_provider_error: retry_with_default
    max_retries: 2
    use_legacy_full_document_cjk: false

ei_scoring:
  enabled: true
  default_persona: gen_z_professionals
  safety_block_threshold: 0.5
  tts_min_score: 0.3
  stealth_block_threshold: 0.5
  composite_warn: 0.4
  composite_weights:
    safety: 0.25
    tts_readability: 0.2
    domain_similarity: 0.2
    stealth: 0.2
    engagement: 0.15
  recent_articles_corpus_path: ""
