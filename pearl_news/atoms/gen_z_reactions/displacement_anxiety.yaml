schema_version: 1
reaction_id: displacement_anxiety
display_name: "Displacement Anxiety"
description: >
  Activates when news threatens the cohort's relationship to place,
  future, or stable footing. Climate events, war reports, housing
  collapses, forced migration coverage. The body registers as if
  the threat were proximate even when geographically distant.

strong_topics:
  - climate
  - peace_conflict
  - migration
  - economy_work

variations:
  - id: v1
    text: >
      The story does not need to be in the cohort's country to land.
      Gen Z reads displacement news as a forward-projection: this is
      what could happen, this is what is already happening to people
      one step closer than yesterday. The plan-for-the-future muscle
      goes quiet. The protocol-for-the-emergency muscle does not.

  - id: v2
    text: >
      What surveyed readers describe is not panic but a slow
      recalibration of what 'home' is supposed to mean. Two-year
      leases get questioned. Plant-the-garden-this-spring decisions
      get deferred. The body has already done the math the headlines
      are just confirming.

  - id: v3
    text: >
      Across the 16-29 cohort, the displacement signal is not
      something they're learning from this article. It is something
      they're tracking — and the article is one more data point in
      a longer running observation. The shock of older audiences is
      not the same as the slow registration of younger ones.

  - id: v4
    text: >
      The story reads as a stress test of a question the cohort has
      been quietly carrying: where is solid ground, and how do I know
      it will still be there. The article doesn't answer that
      question. It confirms that the question was real to ask.

  - id: v5
    text: >
      Displacement-anxiety in this cohort is not the same as fear.
      It is closer to a continuous orientation: which arrangements
      are durable, which are about to give, where is the next move.
      The article puts numbers on what the orientation was already
      navigating.
