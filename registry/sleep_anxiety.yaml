      section_07:
        section_id: ch11_sec07
        section: 7
        type: INTEGRATION
        purpose: Landing — sleep is a background process not a foreground task
        scene_type: null
        min_variants_required: 3
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch11_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: |
            This week, return to one moment of clarity you have already had. Not a huge insight.
            A small one. Something you saw clearly without doubt. Sit with it. Remember what
            that clarity felt like in your body. You have already accessed the capacity you need.
            You have done this before. Begin again from there.
          fingerprint:
            char_count: 303
            paragraph_count: 1
            sentence_count: 9
          location_tokens: []
        - variant_id: ch11_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: |
            Take one situation that usually triggers you. Not the biggest one. A medium one.
            Next time it happens, pause for three breaths before responding. During those breaths,
            notice what you feel. Do not try to change it. Just notice. This noticing is the
            entire practice. Do this one time. See what happens.
          fingerprint:
            char_count: 302
            paragraph_count: 1
            sentence_count: 10
          location_tokens: []
        - variant_id: ch11_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: |
            Sit quietly for five minutes. Do nothing. Fix nothing. Change nothing. When your
            mind pulls away, bring attention back. This is the entire practice. Five minutes.
            One time this week. That is your integration. The rest of the week, continue as
            you normally do. Notice if anything shifts.
          fingerprint:
            char_count: 287
            paragraph_count: 1
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: sleep_anxiety
          section_type: INTEGRATION
          scene_type: null
          location_tokens: []
  chapter_12:
    chapter: 12
    title: What The Morning Feels Like After
    sections:
      section_01:
        section_id: ch12_sec01
        section: 1
        type: HOOK
        purpose: Forward — the day available from a quieter relationship with sleep
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch12_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'You killed the lights at eleven. The ceiling is still there at 2:14. You have run the math until the numbers
            go numb: if sleep came now, you would still land short. Your eyes stay shut. Your brain is sorting slides for
            a meeting that is not for six hours.'
          fingerprint:
            char_count: 255
            paragraph_count: 1
            sentence_count: 5
          location_tokens: []
        - variant_id: ch12_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: The phone is face-down an arm's length away. You will not flip it. You still know you are late. The room
            is the wrong temperature on both sides of the blanket. Your pulse sounds ordinary and that somehow offends you
            — like your body did not get the memo that tonight is for power-saving mode.
          fingerprint:
            char_count: 292
            paragraph_count: 1
            sentence_count: 5
          location_tokens: []
        - variant_id: ch12_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: You drank the wind-down tea. You dimmed the screen. You listened to someone whisper about rain through
            cheap earbuds. The routine scored a hundred on paper. Paper is not where you are living right now. The bed is
            real. The awake is realer.
          fingerprint:
            char_count: 239
            paragraph_count: 1
            sentence_count: 7
          location_tokens: []
        - variant_id: ch12_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: You are flat. Your thoughts are not — they ladder up through tomorrow, next week, the sentence you wish
            you had said last Tuesday. Sleep was sold as the off-switch. Someone wired a dimmer wrong. You keep turning it
            and the room stays bright inside your skull.
          fingerprint:
            char_count: 259
            paragraph_count: 1
            sentence_count: 5
          location_tokens: []
        - variant_id: ch12_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: The clock app promised six hours until the alarm. That was true before you watched it become five, then
            four. Each glance steals another slice without asking. You are negotiating with time like it owes you fairness.
            It does not.
          fingerprint:
            char_count: 228
            paragraph_count: 1
            sentence_count: 5
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: sleep_anxiety
          section_type: HOOK
          scene_type: null
          location_tokens: []
