          variant_number: 1
          variant_family: F1
          content: 'Marcus knows what the right call is on the vendor contract. He has known for a week. He could say it in one sentence. Instead he keeps the email in drafts, opening it on his phone in the elevator, at lunch, at red lights, reading his own clear recommendation and not pressing send, as if sending were a different and far heavier act than knowing.

            '
