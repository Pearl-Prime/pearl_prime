          content: 'Quarter-end is Friday and your part of the close is a single spreadsheet you have opened and not touched every day this week. You can see it now, the tab, the little green icon, mocking you with how ready it is. You are not lazy. You worked eleven hours yesterday. You just could not make your hands go toward that one specific green icon, and you still can''t, and Friday keeps coming.

            '
          fingerprint: 96c5bd138bc2e7aa
          location_tokens: []
        - variant_id: ch06_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'Lena''s calendar says focus block in soft gray, eleven to noon. It is 11:52. She has spent the block deciding which of four equally important things to start, and the deciding ate the doing, and now there are eight minutes left and a familiar warmth of shame climbing her neck, because to anyone watching she simply sat at her desk and did nothing, and that is not what happened, and she cannot explain what did.

            '
          fingerprint: 5f9f181b82010f8f
