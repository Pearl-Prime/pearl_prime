        variants:
        - variant_id: ch09_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: 'Keep this for the days the deciding eats the doing: externalize the choice. When four equal tasks produce a smooth wall instead of a ranking, do not run the doomed internal loop. Write them on a sticky note, close your eyes, and point. Do whatever your finger lands on, no appeal. The arbitrariness is the gift; it replaces an impossible internal ranking with a started task, and the started task carries itself. Three seconds of pointing can save an hour of stalling, and the work, once begun, almost never needed the ranking you could not produce.

            '
          fingerprint: c59d8ae4e0e52f1c
          location_tokens: []
        - variant_id: ch09_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'Take this into the next stuck morning: shorten the gap between deciding and doing to almost nothing. The flagged email, the small reply, the two-click forward, act on it in the first ninety seconds of your day, before the deciding can accumulate its weight and drain away. You do not lack resolve; you spend it, repeatedly, in the gap between meaning to and moving. Close the gap. Catch the decision while it is warm and convert it to motion before it can become one more meant-to-do riding on your chest.

            '
          fingerprint: f887f843066fc3a4
          location_tokens: []
        - variant_id: ch09_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'When momentum breaks mid-flow tomorrow, do not grind back in by force. A ping pulls your eyes, the live thread of attention vanishes, the half-built thing sits there. Reread your own last two sentences out loud, slowly, and let them rebuild the current from outside you. By the third sentence you will likely be back in the river. Re-entry is not willpower; it is an external echo of where you were, and your hands will follow it in when they would not follow a command to focus.

            '
