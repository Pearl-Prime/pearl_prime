          content: 'Keep this for the days the deciding eats the doing: externalize the choice. When four equal tasks produce a smooth wall instead of a ranking, do not run the doomed internal loop. Write them on a sticky note, close your eyes, and point. Do whatever your finger lands on, no appeal. The arbitrariness is the gift; it replaces an impossible internal ranking with a started task, and the started task carries itself. Three seconds of pointing can save an hour of stalling, and the work, once begun, almost never needed the ranking you could not produce.

            '
