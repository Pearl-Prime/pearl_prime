          content: 'Your one-on-ones are scheduled. Your one-on-ones are prepped. Your one-on-ones do not exist as actual prep, only as the intention of prep, and now Dana is at your door, on time, and you have the talking points fully formed in your head and absolutely nothing on the page, and you smile and say give me one sec and the one sec contains all your panic.

