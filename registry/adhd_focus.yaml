          content: 'Carry the refusal to moralize the freeze. When the what-is-wrong-with-me arrives tomorrow, do not answer it with the usual verdict. Answer it flatly with the truth: nothing is wrong, this is how my initiation is wired, and shaming it has never once helped me start. That sentence is not self-indulgence; it is removing weight from the exact spot where weight is the problem. Said early, before the loop tightens, it keeps the next beginning lighter by the whole amount of shame you declined to pile on.

            '
          fingerprint: c27b1b70d9b4dc3e
          location_tokens: []
        - variant_id: ch07_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'Shrink the task below the freeze line and let the first unit be a placeholder. Tomorrow, when the fourteen-line portal or the six-box form locks your whole body into a held breath, do the first unit badly, a placeholder you will correct. The first blank filled is the entire wall; once the task has begun, it is no longer beginning, and continuing was never the part that broke. One imperfect first entry, and the rest follow in minutes. Aim only at the first unit. The others will not need aiming at.

            '
          fingerprint: 1fc0bbdabe5cb43f
