      section_07:
        section_id: ch04_sec07
        section: 7
        type: INTEGRATION
        purpose: cost_exposure — INTEGRATION
        scene_type: null
        min_variants_required: 3
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch04_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: 'Carry one thing into tomorrow: the most startable task, not the most important one. When you sit down and the urgent things blur into an unrankable mass, do not try to choose the one that matters most; your prioritizer will stall on that choice. Choose the one your hand will actually move toward, the lowest activation energy, and start it. Trust that a started task generates the momentum a chosen one only promised, and that the warmed-up system will reach the important thing once it is moving. This is not lowering your standards. It is sequencing your day around how your initiation actually works, so that something gets begun, because the begun task is the one that pulls the rest behind it.

            '
          fingerprint: 88f06e21046f4156
          location_tokens: []
        - variant_id: ch04_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'Tomorrow, when the freeze comes, lower the stakes of the start without lowering the stakes of the work. Open a scratch file. Write the deliberately bad version, the one no one will see. Type a placeholder you will fix. The finished thing can matter enormously; the first keystroke must be allowed to matter nothing, because the freeze lives only at the threshold, and a threshold with nothing riding on it is one you can cross. Let the bad draft exist, and then make it good. The making-good was never the part that froze you.

            '
          fingerprint: 2fac3b3696151dac
          location_tokens: []
        - variant_id: ch04_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'Build one anchor before you need it. Pick the task most likely to stall you tomorrow, and pair it to a rhythm your body already runs: right after the eleven a.m. coffee, before anything else, open it and do one small unit. The coffee becomes the trigger your brain cannot generate on its own, and the one-unit rule keeps the task below the freeze line. You are not relying on willpower arriving at the right moment. You are arranging for the cue to come from outside, from a thing that happens anyway, so the start does not depend on a signal that may not fire.

            '
