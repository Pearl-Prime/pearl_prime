      section_05:
        section_id: ch04_sec05
        section: 5
        type: REFLECTION
        purpose: cost_exposure — REFLECTION
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch04_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Pay attention to the difference between deciding and doing, because for you they can be two separate expenditures of energy, and the first can quietly drain the fuel for the second. Most people experience deciding to do a task and doing it as nearly continuous; the decision flows into the action. For you, the decision can be a complete and exhausting act in itself that produces no motion. You decide, eleven mornings running, to answer the flagged email. You mean it every time. The deciding is real effort, and it leaves you tired, and yet the email stays unanswered, so that you have spent the energy of doing the task many times over while never doing it once. This is why you can end a day genuinely depleted with nothing visible to show, and why the someone-who-just-sat-there judgment is so wrong: you did not sit there, you decided to act dozens of times, each decision a small costly thing. The way out is to shorten the gap between deciding and doing to almost nothing, so the decision cannot drain away before the action catches it. Answer in the first ninety seconds, before the deciding can accumulate. Act on the decision while it is still warm. You are not lacking resolve. You have, if anything, too much of it, spent in the wrong place, on the deciding rather than the doing.

            '
          fingerprint: e19d952601e8e16f
          location_tokens: []
        - variant_id: ch04_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'The anchor is the central practical idea, and it deserves to be understood, not just used. An anchor is an external signal that does for you what an internal signal does for others: it cues the beginning, holds the structure, or restores the lost momentum, from outside, because your brain cannot reliably generate it from inside. The colleague who lets you think out loud is an anchor; their attention is the surface your formless prep can take shape against. The timer is an anchor; it externalizes the start that will not fire on its own. The single next action on a sticky note is an anchor; it holds the one piece of structure you need so you do not have to hold it internally. The eleven-a.m. coffee that triggers the dreaded spreadsheet is an anchor; it borrows a rhythm your body already runs. What unites these is that they are all things outside you, and that is exactly why they work, because the problem was never that you lacked the capacity to do the task but that you lacked a reliable internal source of the cue to begin it. You are not weak for needing the anchor. You are correctly diagnosing that the signal has to come from somewhere, and arranging for it to come from a place that actually delivers, which is, for you, outside.

            '
          fingerprint: 009208c0d67ebe1f
          location_tokens: []
        - variant_id: ch04_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Dopamine is part of this story, and it helps to understand its role without turning it into a lecture or an excuse. In a roughly working system, the anticipated reward of a task generates enough of a signal to get the prioritizer moving; the task lights up, gets ranked, gets started. In your system, that signal can run low, and the effect is specific and worth knowing: under low signal, the prioritizer does not gently slow down, ranking tasks more sluggishly. It stalls. It returns a smooth wall where the ranking should be, nothing, because below a certain threshold the ranking mechanism does not produce a weak answer, it produces no answer. This is why you can stare at four urgent tabs and feel not a faint preference but a complete blank. It also explains why the small, immediately completable task is the one your hand will move toward: it offers a quick, reliable hit of completion-signal that the large, distant task does not, and your system, starved, goes toward the available source. None of this is a failure of values. You value the big task more; your wiring routes toward the small one because that is where the signal is. Knowing this, you stop fighting the routing and start using it: do the small thing to generate the signal, and let the warmed-up system reach the big thing it could not reach cold.

            '
          fingerprint: 34ad416960b01a4f
          location_tokens: []
        metadata:
          persona: corporate_managers
          topic: adhd_focus
          section_type: REFLECTION
