        - variant_id: ch06_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'There is a task so small you keep skipping it: forward one email to Legal. Two clicks. You have not done it in three days. It travels with you, this two-click task, heavier than the strategy doc, because the strategy doc at least feels worthy of the resistance and this does not, and the smallness of it is exactly what makes the not-doing feel like proof of something.

            '
          fingerprint: 0d239d91d8f94b75
          location_tokens: []
        - variant_id: ch06_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: 'The all-hands slide is half built. You were in it, genuinely in it, fingers moving, ideas landing, and then a Slack ping pulled your eyes for four seconds and when you looked back the thread was gone. Not the file, the thread, the live wire of attention that had been running through you. You stare at the half-slide trying to find your way back in and the door it came through has closed.

            '
          fingerprint: 6fd4ea07e1f6b26c
