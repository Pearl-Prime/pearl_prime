          content: 'You told yourself you would write the performance review the moment your calendar cleared. It is clear now. A perfect, gleaming forty-five-minute block, no meetings, door effectively shut. And you are reading about a kitchen renovation. You are not interested in kitchens. You watch yourself read about kitchens and you think, with real bewilderment, what is wrong with me, and the cursor in the other window keeps its slow, blinking time.

            '
