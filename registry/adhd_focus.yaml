          variant_family: F1
          content: 'Stuck before the QBR deck? Name the next physical action out loud: open the file, type the title slide. Not the deck, the slide. Set a timer for 8 minutes and start. When it rings, you may stop. The freeze breaks at the verb, not the vision. Pick the smallest verb you can see and do only that.

