        - variant_id: ch02_sec09_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'Keep the truth about your exhaustion close, because tomorrow you may again produce little and feel depleted and reach for lazy as the explanation. It is the wrong word. If the day went to deciding-to-start a dozen times, to fighting the threshold and losing and regrouping, then you labored, hard, at a cost that left no visible trace. Do not score the day by output alone and convict yourself. Note the invisible effort, name it accurately, and let that accuracy keep you from adding shame to a system that starts worse, not better, under its weight.

