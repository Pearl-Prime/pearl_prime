      section_06:
        section_id: ch02_sec06
        section: 6
        type: REFLECTION
        purpose: mechanism — REFLECTION
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch02_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'There is a loop that does more damage than the freeze itself, and it is worth naming so you can step out of it. You fail to start. From the outside, and from a certain angle inside, this looks like simple not-doing, and so a voice arrives: you are lazy, you are unreliable, what is wrong with you. That voice produces shame. And shame, it turns out, is not a motivator for a stuck initiation system; it is more weight on the thing that was already too heavy to lift. The ashamed brain does not start more easily. It starts less easily, because now beginning the task means also confronting the evidence of having failed to begin it, and that is a worse, larger task than the original. So the freeze deepens, which produces more not-doing, which produces more shame, and the loop tightens. The single most useful intervention is often not a productivity technique at all but the interruption of this loop: the deliberate refusal to moralize the freeze. When you catch the what-is-wrong-with-me, you answer it, flatly, with the truth: nothing is wrong with me, this is a wiring difference in how I initiate, and shaming it has never once helped. That answer is not self-indulgence. It is removing weight from the exact spot where weight is the problem, so that the next beginning is lighter by the amount of shame you declined to add.

            '
          fingerprint: b0955365f58f8679
          location_tokens: []
        - variant_id: ch02_sec06_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Consider working with the wiring instead of against it, because the against-it strategy is the one you have already tried for years and it is the one that exhausts you. Against-the-wiring looks like this: choose the most important task, focus hard, push through the resistance by force of will, and feel like a failure when the force runs out. With-the-wiring looks different and feels almost like cheating, which is part of why people resist it. With-the-wiring means choosing not the most important task but the most startable one, because a started task generates momentum a chosen task only promises. It means using the small completion you can actually do to warm up the prioritizer that froze on the big one. It means pairing a dreaded task to a rhythm your body already has, so the rhythm becomes the trigger your brain cannot self-generate. It means letting yourself do the eighth tab, the small one your hand will move toward, and trusting that the act of finishing anything releases the chemistry the stalled system was waiting for. The objection is always but I should be able to just do the important thing directly. Perhaps. But should-be-able-to is a comparison to a different kind of mind, and you are not running that mind, you are running this one, and this one responds beautifully to being worked with and terribly to being forced.

            '
          fingerprint: 801ffa2ca54ed896
          location_tokens: []
        - variant_id: ch02_sec06_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Pay attention to the difference between deciding and doing, because for you they can be two separate expenditures of energy, and the first can quietly drain the fuel for the second. Most people experience deciding to do a task and doing it as nearly continuous; the decision flows into the action. For you, the decision can be a complete and exhausting act in itself that produces no motion. You decide, eleven mornings running, to answer the flagged email. You mean it every time. The deciding is real effort, and it leaves you tired, and yet the email stays unanswered, so that you have spent the energy of doing the task many times over while never doing it once. This is why you can end a day genuinely depleted with nothing visible to show, and why the someone-who-just-sat-there judgment is so wrong: you did not sit there, you decided to act dozens of times, each decision a small costly thing. The way out is to shorten the gap between deciding and doing to almost nothing, so the decision cannot drain away before the action catches it. Answer in the first ninety seconds, before the deciding can accumulate. Act on the decision while it is still warm. You are not lacking resolve. You have, if anything, too much of it, spent in the wrong place, on the deciding rather than the doing.

            '
          fingerprint: e19d952601e8e16f
          location_tokens: []
        metadata:
          persona: corporate_managers
          topic: adhd_focus
          section_type: REFLECTION
          scene_type: null
