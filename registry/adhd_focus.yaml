        - variant_id: ch02_sec09_integration_f1
          variant_number: 1
          variant_family: F1
          content: 'Hold onto the small completion as a tool, not a distraction. Tomorrow, when the big task is unreachable, do the small startable ones deliberately, one after another, and trust that finishing anything releases the chemistry your stalled prioritizer was waiting for. The eighth tab is not failure; it is your system finding the one door that opens. Use the small completions to warm up, and notice that forty minutes later the big task is suddenly approachable, not because you forced it, but because you generated the signal it needed.

            '
          fingerprint: fc220ceedf5e7249
          location_tokens: []
        - variant_id: ch02_sec09_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'Bring questions into the blank pages tomorrow. When a doc defeats you and your eyes slide off the void, do not try to fill it; turn it into a conversation. Type one question at the top, what do I most need this to do, and answer it in a sentence. Then the next question. Your brain can move toward a question when it cannot move toward a blank, and the document assembles itself out of the answers. The void was the wall; the question is the door, and you can build the door yourself in one line.

            '
          fingerprint: a7b3fef2985eac3e
