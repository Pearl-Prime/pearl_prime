        - variant_id: ch07_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'Last thing to carry: keep your promises small enough to keep, then notice when you keep them. Tomorrow, do not promise to finish the report. Promise to fill one box, do the first line, type the project name at the top. Then, when you do it, mark it, deliberately, as a kept word to yourself. Each small kept promise is a deposit against years of broken ones, evidence rebuilt that your intentions can be trusted when they are scaled to what your wiring can deliver. Self-trust returns this way, one keepable commitment at a time, not by grand resolve.

            '
