          content: 'The all-hands slide is half built. You were in it, genuinely in it, fingers moving, ideas landing, and then a Slack ping pulled your eyes for four seconds and when you looked back the thread was gone. Not the file, the thread, the live wire of attention that had been running through you. You stare at the half-slide trying to find your way back in and the door it came through has closed.

