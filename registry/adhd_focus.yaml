          variant_number: 1
          variant_family: F1
          content: 'The deck is due at nine. It is now seven-forty. You have known about this deck for eleven days. You open the file, see the title slide, and something behind your eyes goes flat and static, like a screen that powers on but never loads. You know exactly what slide two needs. You can describe it out loud. Your hand rests on the trackpad and does not move. The cursor blinks in the empty text box, patient, indifferent, and you sit there watching it blink, fully aware, fully stuck.

            '
          fingerprint: b0a721d8251d0af0
          location_tokens: []
        - variant_id: ch01_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: 'Your manager Slacks: just need that headcount memo by EOD, no rush. You read it three times. Each word is simple. The whole thing is maybe four hundred words you could write in your sleep. You alt-tab to your calendar, then to email, then back to the blank doc, then to a tab about a conference you will not attend. An hour passes the way water leaves a sink, quiet and total. The memo is still four hundred words you have not begun.

            '
          fingerprint: 477088b1e239089a
          location_tokens: []
        - variant_id: ch01_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: 'Calibration is Thursday. You have six people to rank and a form with six boxes. You sit down to do it Monday. You sit down to do it Tuesday. The boxes are still empty Wednesday at four, and now the not-doing has its own weight, a low hum under your sternum, because every hour you did not start has made starting feel more like confessing.

            '
          fingerprint: 092de31668fce7c3
          location_tokens: []
        - variant_id: ch01_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'The expense report is fourteen line items. Fourteen. You have done a thousand of these. You open the portal, and your whole body becomes a held breath. You straighten three pens on your desk. You refill a water bottle that was full. You answer a Slack that did not need answering. The portal sits open behind everything, login timed out, asking you, again, to begin.

            '
          fingerprint: 5c5951e54ada9633
          location_tokens: []
        - variant_id: ch01_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: 'Priya has eight tabs open and cannot tell you which one matters. Each is genuinely urgent. The QBR prep, the skip-level notes, the budget reconciliation, the offer letter that''s been waiting two days. Her brain reaches for the most important one and comes back with nothing, just a smooth wall where the ranking should be, and so she does the eighth tab, the small one, because it''s the only one her hand will actually move toward.

            '
          fingerprint: 4cacfe52ee766307
          location_tokens: []
