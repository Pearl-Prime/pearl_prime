          content: 'The budget cut means you have to tell someone their role is changing, and you have to draft the talking points first, and you have opened the talking-points doc forty times. Each time, your eyes slide off the blank page like water off glass. You are not avoiding the hard conversation. You would have the conversation right now. You cannot begin the document that has to come before it.

            '
