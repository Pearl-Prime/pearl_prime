      section_07:
        section_id: ch03_sec07
        section: 7
        type: REFLECTION
        purpose: somatic_legitimacy — REFLECTION
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch03_sec07_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'There is a particular trap in being competent, and you may be living inside it. Because you can do the work, brilliantly, when the door opens, the times the door sticks become inexplicable, to others and to you. A less capable person who failed to start would simply be judged unable. But you are visibly able, so the not-starting reads as choice, as something you are withholding, as you not trying. This is the cruelest version of the misunderstanding, and you may have internalized it most deeply of all, because the evidence of your own competence is used against you: if you can write the deck in twenty minutes, the voice says, then sitting for an hour not writing it was laziness, you could have just done it. But could-have is doing the heavy lifting in that sentence, and it is false. You could have done it once the door opened; you could not, by will alone, open the door, and the hour was the door being stuck, not you choosing to keep it shut. The competence and the stuck door coexist; one does not disprove the other. Holding this is hard precisely because your ability is real and visible, and the temptation is to take that ability as proof that the freeze was optional. It was not. The same person can be entirely capable of the task and entirely unable, in a given hour, to access the start of it, and both things are true at once.

            '
          fingerprint: f60542aae6b6589b
          location_tokens: []
        - variant_id: ch03_sec07_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Consider how much of your effort goes invisible, and let that recalibrate your sense of your own diligence. The standard ledger counts outputs: the memo sent, the form filled, the review written. By that ledger, an hour of freeze is an hour of nothing, and you are tempted to score yourself by it and find yourself lazy. But the ledger is missing entries. In that hour you decided to start a dozen times. You marshaled the will to begin and felt it dissolve at the threshold. You fought the static, lost, regrouped, fought again. You managed the rising shame so it did not flood you entirely. None of this shows up as output, and yet all of it is effort, often more effort than the task itself would have cost a differently wired person. This is why you can be genuinely exhausted by a day in which you produced little: you were not idle, you were laboring at the threshold, repeatedly, at a cost that leaves no visible trace. Naming this is not about excusing low output; it is about correcting a measurement error that has probably made you far harder on yourself than the facts warrant. You are not someone who does not try. You are someone whose trying is frequently spent in a place that produces no record, and the absence of the record is not the absence of the work.

            '
          fingerprint: c8dac9e959c0828e
          location_tokens: []
        - variant_id: ch03_sec07_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'End on the idea of self-trust, rebuilt on accurate terms, because the years of misunderstanding have probably eroded it. When you have repeatedly told yourself you would do a thing and then not done it, a corrosion sets in: you stop believing your own intentions, you brace for your own failure, you approach each task already half-expecting the freeze and the shame that follows. This anticipatory dread is itself a kind of pre-freeze, a way of arriving at the task already defeated. The repair is not to make grander promises and try harder to keep them; that is the cycle that did the eroding. The repair is to make your intentions small enough and your structures external enough that you can actually keep them, and then to notice, deliberately, when you do. You said you would fill one box, and you filled one box. You said you would do the first line, and you did the first line. These are not trivial. Each kept micro-promise is a deposit against the corrosion, evidence rebuilt that your word to yourself can be good, provided your word is scaled to what your wiring can deliver. Self-trust, for you, is not restored by force of resolve. It is restored by a long series of small commitments that you set up, structurally, to be keepable, and then keep, until the bracing-for-failure slowly gives way to a quieter, earned, accurate confidence that the door can be opened, because you have learned how, and have proof.

            '
          fingerprint: afa318677c99f94a
          location_tokens: []
        metadata:
          persona: corporate_managers
          topic: adhd_focus
          section_type: REFLECTION
