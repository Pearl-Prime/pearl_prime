          content: 'The thing about the reorg announcement is that it has to go out today, and everyone is waiting, and you have written the first sentence nine times. Each version is fine. None of them lets you write the second sentence. You stand up. You sit down. The stakes are high and somehow that does not make starting easier, it welds your hands to your sides, and you understand for the first time that pressure is not the same as momentum.

            '
