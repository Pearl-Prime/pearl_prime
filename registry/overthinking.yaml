sections:
  chapter_01:
    chapter: 1
    title: The Loop That Won't Close
    sections:
      section_01:
        section_id: ch01_sec01
        section: 1
        type: HOOK
        purpose: Recognition — the thought that keeps returning
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: |
            You've already made this decision. You're making it again.
            
            You ran the scenario before bed. You ran it when you woke up. You ran it on the walk, in the shower, at the moment you were supposed to be somewhere else entirely. The same decision. The same variables. A slightly different angle. No new conclusion.
            
            This is The Loop. It doesn't close because you haven't thought it through enough. The Loop runs because uncertainty is being treated as a threat — and the mind believes that if it just processes long enough, the uncertainty will resolve.
            
            It won't. Not that way.
            
            More thinking does not close The Loop. More thinking feeds it. Each pass generates a new angle, a new variable, a new version of what could go wrong. The loop mistakes motion for progress. It mistakes analysis for safety.
            
            You are not bad at decisions. You are not broken. You are running a protection system that learned to treat the unknown as dangerous — and so it keeps working, keeps scanning, keeps turning the same thing over.
            
            This chapter is about understanding what The Loop is actually afraid of — because it's never really about the decision.
          fingerprint:
            char_count: 1129
            paragraph_count: 7
            sentence_count: 23
          location_tokens: []
        - variant_id: ch01_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: The trajectory pressure is real. You're supposed to be building something by now. You're overthinking about
            what that means, whether you're on track, what happens if you're not.
          fingerprint:
            char_count: 177
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch01_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: You can see the whole system. The exploitative parts. The inequality. The unsustainability. You're trying
            to build a life within that system while being aware of its flaws. The awareness makes the overthinking worse.
          fingerprint:
            char_count: 216
            paragraph_count: 1
            sentence_count: 6
          location_tokens: []
        - variant_id: ch01_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: You've been told you can be anything but also that the world is ending and also that you should be grateful
            for your opportunities. The contradictions are generating constant overthinking.
          fingerprint:
            char_count: 188
            paragraph_count: 1
            sentence_count: 2
          location_tokens: []
        - variant_id: ch01_sec01_hook_f5
          variant_number: 5
          variant_family: F5
