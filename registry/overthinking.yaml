      section_08:
        section_id: ch03_sec08
        section: 8
        type: INTEGRATION
        purpose: Landing — the loop generates certainty-seeking not certainty
        scene_type: null
        min_variants_required: 3
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch03_sec08_integration_f1
          variant_number: 1
          variant_family: F1
          content: |
            This week, return to one moment of clarity you have already had. Not a huge insight.
            A small one. Something you saw clearly without doubt. Sit with it. Remember what
            that clarity felt like in your body. You have already accessed the capacity you need.
            You have done this before. Begin again from there.
          fingerprint:
            char_count: 303
            paragraph_count: 1
            sentence_count: 9
          location_tokens: []
        - variant_id: ch03_sec08_integration_f2
          variant_number: 2
          variant_family: F2
          content: |
            Take one situation that usually triggers you. Not the biggest one. A medium one.
            Next time it happens, pause for three breaths before responding. During those breaths,
            notice what you feel. Do not try to change it. Just notice. This noticing is the
            entire practice. Do this one time. See what happens.
          fingerprint:
            char_count: 302
            paragraph_count: 1
            sentence_count: 10
          location_tokens: []
        - variant_id: ch03_sec08_integration_f3
          variant_number: 3
          variant_family: F3
          content: |
            Sit quietly for five minutes. Do nothing. Fix nothing. Change nothing. When your
            mind pulls away, bring attention back. This is the entire practice. Five minutes.
            One time this week. That is your integration. The rest of the week, continue as
            you normally do. Notice if anything shifts.
          fingerprint:
            char_count: 287
            paragraph_count: 1
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: overthinking
          section_type: INTEGRATION
          scene_type: null
          location_tokens: []
  chapter_04:
    chapter: 4
    title: What The Loop Actually Does To Decisions
    sections:
      section_01:
        section_id: ch04_sec01
        section: 1
        type: HOOK
        purpose: Mechanism — analysis paralysis, the thought-chain mechanism
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch04_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: You're aware of systemic issues that previous generations weren't, which makes your position in the system
            feel compromised. You're overthinking the contradiction between knowing better and participating anyway.
          fingerprint:
            char_count: 211
            paragraph_count: 1
            sentence_count: 2
          location_tokens: []
        - variant_id: ch04_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: The trajectory pressure is real. You're supposed to be building something by now. You're overthinking about
            what that means, whether you're on track, what happens if you're not.
          fingerprint:
            char_count: 177
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch04_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: You can see the whole system. The exploitative parts. The inequality. The unsustainability. You're trying
            to build a life within that system while being aware of its flaws. The awareness makes the overthinking worse.
          fingerprint:
            char_count: 216
            paragraph_count: 1
            sentence_count: 6
          location_tokens: []
        - variant_id: ch04_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: You've been told you can be anything but also that the world is ending and also that you should be grateful
            for your opportunities. The contradictions are generating constant overthinking.
          fingerprint:
            char_count: 188
            paragraph_count: 1
            sentence_count: 2
          location_tokens: []
        - variant_id: ch04_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: Your Instagram feed is people your age doing seemingly impressive things. You're overthinking about whether
            your life is interesting enough, whether you're keeping pace, whether you're failing relative to your cohort.
          fingerprint:
            char_count: 217
            paragraph_count: 1
            sentence_count: 2
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: overthinking
          section_type: HOOK
          scene_type: null
          location_tokens: []
      section_02:
        section_id: ch04_sec02
        section: 2
        type: SCENE
        purpose: Mechanism scene — the decision that gets more unclear the longer it sits
        scene_type: action
        min_variants_required: 5
        story_eligible: true
        location_aware: true
        variants:
        - variant_id: ch04_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: |-
            scene_type: entry in {location.learning_space}.

            You stop with one foot on the mat inside the revolving door. {weather_detail} slides across the glass as the drum turns. {street_name} blurs and sharpens again. Someone behind you coughs. You step the rest of the way in. The lobby floor is polished. Your reflection in {building_type} glass is shorter than you expect. The turnstile line has not moved.
          fingerprint:
            char_count: 401
            paragraph_count: 2
            sentence_count: 9
          location_tokens:
          - '{location.learning_space}'
        - variant_id: ch04_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: |-
            scene_type: entry in {location.learning_space}.

            The line at {coffee_shop} bends toward the register. Steam rises from the machine. You read the board twice and the specials a third time. {street_name} noise is a steady wall behind you. Your hand is in your pocket for change you already counted. The person ahead orders. You still have not decided. {weather_detail} catches the chrome on the espresso machine.
          fingerprint:
            char_count: 410
            paragraph_count: 2
            sentence_count: 9
          location_tokens:
          - '{location.learning_space}'
        - variant_id: ch04_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: |-
            scene_type: transition in {location.learning_space}.

            You meant to keep walking. Instead you are at the window at the end of the hall. {weather_detail} makes a pale rectangle on the carpet. {neighborhood} roofs cut a jagged line below. The fire-escape shadow does not move. Your coffee is cooling against your palm. A door opens somewhere behind you. You do not turn.
          fingerprint:
            char_count: 367
            paragraph_count: 2
            sentence_count: 9
          location_tokens:
          - '{location.learning_space}'
        - variant_id: ch04_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: |-
            scene_type: entry in {location.learning_space}.

            Your chair faces two monitors. The left one shows a document title you opened eleven minutes ago. The cursor blinks in the same line. {street_name} traffic is a low pulse through {office_building} glass. Someone's keyboard clicks three cubicles over. You scroll one notch up. Nothing new appears. {weather_detail} shifts a stripe of light across your desk.
          fingerprint:
            char_count: 405
            paragraph_count: 2
            sentence_count: 9
          location_tokens:
          - '{location.learning_space}'
        - variant_id: ch04_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: |-
            scene_type: transition in {location.learning_space}.

            The escalator steps rise under your feet. You miss the rhythm once and catch it on the next. {local_landmark} is a smear of light at the far end of the concourse. A child runs past on the level below. You watch the handrail seam loop around. {transit_line} vibration hums through the floor. You are halfway up and already thinking about the return trip.
          fingerprint:
            char_count: 407
            paragraph_count: 2
            sentence_count: 8
          location_tokens:
          - '{location.learning_space}'
