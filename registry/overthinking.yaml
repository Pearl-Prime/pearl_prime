        - variant_id: ch01_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: |
            The loop runs because your body is treating uncertainty as threat. Your forehead tightens. The back of your neck holds a low, constant tension. Your breathing goes shallow. The loop isn't solving anything — it's your system generating activity so it feels like action is being taken against the threat. The sensation of spinning is the alarm running, not your mind malfunctioning. Uncertainty triggered the loop. The loop is the response, not the conclusion.
                    fingerprint:
