    title: The Number That Won't Leave You Alone
    sections:
      section_01:
        section_id: ch01_sec01
        section: 1
        type: HOOK
        purpose: Recognition — money as constant background noise
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: |
            You check the account at 11pm. You already checked it at 7. The number didn't change. You know it didn't change. You check it anyway.
            
            That is The Number. It is not just in the spreadsheet. It is in your body.
            
            You feel it before the screen loads. A tightening in the chest. A slight shift in the room. Someone says the word invoice in a meeting and something moves through you — not a thought, not a decision, a physical response. The body has already done the math. The body has already decided this is a problem.
            
            The mind follows. If this number, then that number. If that number, then this other thing. The chain builds faster than you can stop it. By the time you close the app you've already calculated three months forward into a version of the future where everything is worse.
            
            You didn't choose to do that. It happened.
            
            That's what this chapter is about. Not the math. The mechanism. The reason the number lives in the chest and not just the account — and what that means for the way you carry it.
