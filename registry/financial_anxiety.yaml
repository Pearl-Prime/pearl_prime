          content: |
            Money pressure isn't only a thought — it sits on the chest, it settles in the stomach, it braces the shoulders. Then the chain starts: if this number, then that one, then the next, then ruin. The body runs the whole sequence at once, even when the actual numbers haven't moved. This is catastrophic prediction as a physical process — the nervous system treating a possible future as a present threat. The weight you feel is the body loading that chain. That's what the weight is.
