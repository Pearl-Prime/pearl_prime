            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d02
          variant_number: 2
          variant_family: D02
          content: Safety is not the absence of danger. It is the presence of connection. You were never meant to survive
            this alone.
          fingerprint:
            char_count: 114
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d03
          variant_number: 3
          variant_family: D03
          content: Your nervous system learned to protect you before you had words. Thank it. Then show it that the war ended
            years ago.
          fingerprint:
            char_count: 117
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d04
          variant_number: 4
          variant_family: D04
          content: Healing is not a straight line. It is a spiral. You will pass the same pain at a higher altitude and mistake
            it for failure. It is not.
          fingerprint:
            char_count: 135
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d05
          variant_number: 5
          variant_family: D05
          content: The body keeps the score, but it also keeps the remedy. Stillness is not passive. It is the most active
            form of listening.
          fingerprint:
            char_count: 122
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
