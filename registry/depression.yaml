        location_aware: false
        variants:
        - variant_id: ch01_sec06_teacherdoctrine_d01
          variant_number: 1
          variant_family: D01
          content: The wound is not your enemy. It is the doorway you keep walking past. Turn toward it once and the whole
            hallway disappears.
          fingerprint:
