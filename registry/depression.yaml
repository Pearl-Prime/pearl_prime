      section_06:
        section_id: ch07_sec06
        section: 6
        type: REFLECTION
        purpose: REFLECTION 6 — first_practice
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch07_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: |
            Where in your life do you run from what is difficult? Can you name one place where
            you use busy-ness, distraction, or sleep to not feel something? Not to change it,
            but to see it. What would happen if you stopped running for just five breaths?
          fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch07_sec06_reflection_f2
          variant_number: 2
          variant_family: F2
          content: |
            Notice a thought that repeats itself in your mind. Follow it back. Who told you
            this was true? How long have you carried it? If you set it down right now, what
            would be different? Not forever. Just for today. What changes when the story stops?
          fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 8
          location_tokens: []
        - variant_id: ch07_sec06_reflection_f3
          variant_number: 3
          variant_family: F3
          content: |
            What are you attached to that you pretend you are not? Look at it without judgment.
            Why do you grip it? Is the thing itself the problem, or the story you built around
            having it? Can you hold it lightly and still have it? What happens then?
          fingerprint:
            char_count: 240
            paragraph_count: 1
            sentence_count: 6
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: depression
          section_type: REFLECTION
          scene_type: null
          location_tokens: []
      section_07:
        section_id: ch07_sec07
        section: 7
        type: INTEGRATION
        purpose: Landing — structure is a container for when presence returns
        scene_type: null
        min_variants_required: 3
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch07_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: |
            This week, return to one moment of clarity you have already had. Not a huge insight.
            A small one. Something you saw clearly without doubt. Sit with it. Remember what
            that clarity felt like in your body. You have already accessed the capacity you need.
            You have done this before. Begin again from there.
          fingerprint:
            char_count: 303
            paragraph_count: 1
            sentence_count: 9
          location_tokens: []
        - variant_id: ch07_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: |
            Take one situation that usually triggers you. Not the biggest one. A medium one.
            Next time it happens, pause for three breaths before responding. During those breaths,
            notice what you feel. Do not try to change it. Just notice. This noticing is the
            entire practice. Do this one time. See what happens.
          fingerprint:
            char_count: 302
            paragraph_count: 1
            sentence_count: 10
          location_tokens: []
        - variant_id: ch07_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: |
            Sit quietly for five minutes. Do nothing. Fix nothing. Change nothing. When your
            mind pulls away, bring attention back. This is the entire practice. Five minutes.
            One time this week. That is your integration. The rest of the week, continue as
            you normally do. Notice if anything shifts.
          fingerprint:
            char_count: 287
            paragraph_count: 1
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: depression
          section_type: INTEGRATION
          scene_type: null
          location_tokens: []
