      section_04:
        section_id: ch05_sec04
        section: 4
        type: REFLECTION
        purpose: The version that never gets seen
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch05_sec04_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'There''s a version of you that people don''t get to see.


            Not the "healed" version — the you who''s carrying the grief and still showing up.


            That version exists. You''ve been that person before.


            But every time you wait, you hide that version away.


            You decide: *"They can''t see me like this."*


            But "like this" is who you are right now.


            And if you keep hiding, no one gets to know who you''ve become.


            ---


            The world doesn''t need the "past it" version of you.


            The world can hold the grieving version too.


            But only if you let yourself be seen.


            ---'
          fingerprint:
            char_count: 520
            paragraph_count: 10
            sentence_count: 13
          location_tokens: []
        - variant_id: ch05_sec04_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'People want to know you.


            Not the before-version. Not the healed version.


            This version. The one carrying the weight right now.


            That''s not a lesser version of you.


            It''s the actual current you.


            ---


            When you hide until you''re "better," you''re making a decision on behalf of everyone who knows you:


            *"They can''t handle this version."*


            But that''s not theirs to decide. And most of them — the ones worth keeping — can.


            They just never get the chance.


            Because you''ve decided for them.


            ---'
          fingerprint:
            char_count: 480
            paragraph_count: 12
            sentence_count: 14
          location_tokens: []
        - variant_id: ch05_sec04_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'There''s a cost to hiding that isn''t about you.


            The people in your life are getting a curated version. The edited version. The version that only shows up when
            everything is manageable.


            They''re not getting to know what you''ve been through.


            They''re not getting to be there for you.


            And that''s a kind of loneliness for them too.


            ---


            Connection requires showing up as you are.


            Not as you wish you were.


            Not as you used to be.


            *As you are.*


            The grieving version is real. It''s present. It''s you.


            Give people a chance to meet it.


            ---'
          fingerprint:
            char_count: 530
            paragraph_count: 12
            sentence_count: 15
          location_tokens: []
        metadata:
          persona: Gen Z
