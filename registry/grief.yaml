        - variant_id: ch02_sec04_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Here''s an honest question:


            When did the grief stop being acute?


            Not when did it stop hurting. It still hurts. It probably will for a long time.


            But when did it stop being *unmanageable*?


            When did the floor stop shifting under you every moment?


            When did the risk of falling apart in public go from certain to... possible?


            For most people, that shift happens somewhere in the first year. Sometimes sooner.


            The grief becomes weather instead of flood.


            ---


            And yet — the sentence doesn''t update.


            It keeps running as if you''re still in the first days.


            As if the flood is still happening.


            As if the stakes are still as high as they were at the start.


            The conditions changed. The strategy didn''t follow.


            That''s what this chapter is about.


            ---'
