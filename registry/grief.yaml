      section_06:
        section_id: ch10_sec06
        section: 6
        type: REFLECTION
        purpose: How to recover
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch10_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s how to recover from a slip:


            **1. Notice it.** Don''t pretend it didn''t happen. Just acknowledge: *"I slipped."*


            **2. Skip the shame spiral.** One slip doesn''t define you. Don''t spend three days beating yourself up.


            **3. Get curious.** What triggered it? What was the grief doing? What can you learn?


            **4. Make one small move.** Not a big comeback. Just one thing. Proof that you can still act.


            **5. Keep going.** The slip is over. Today is new.


            ---


            Recovery isn''t dramatic.


            It''s just: slip, notice, move again.


            That''s it.


            ---'
          fingerprint:
            char_count: 540
            paragraph_count: 10
            sentence_count: 16
          location_tokens: []
        - variant_id: ch10_sec06_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Recovery from a slip isn''t a big dramatic comeback.


            You don''t need to prove anything. You don''t need to do twice as much to make up for the slip.


            You just need to take one step back toward the life you''re building.


            One text you send.


            One plan you make.


            One small move.


            ---


            Here''s why small is enough:


            The slip pulled you one step toward the old pattern.


            One step back is all that''s needed.


            You''re not miles behind. You''re one step away.


            Just one step.


            Then another.


            ---'
