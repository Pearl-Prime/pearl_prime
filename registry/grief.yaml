        - variant_id: ch12_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s what living looks like now:


            You wake up. The grief is there. Some days loud, some days quiet.


            You get up anyway.


            You go to places. You have conversations. You participate in life.


            The grief comes along. It''s always there. Sometimes you feel it sharply. Sometimes it''s just background.


            But you don''t wait for it to leave anymore.


            You just... live. With it.


            That''s what this looks like. Not dramatic. Just real.


            ---'
