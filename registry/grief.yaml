      section_04:
        section_id: ch03_sec04
        section: 4
        type: REFLECTION
        purpose: The myth you've been believing
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch03_sec04_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's the myth you've been believing:\n\n*\"Grief is something that passes. And once it passes, I'll be able to live again.\"*\n\nThat's the story. That's the assumption underneath the waiting.\n\nBut here's what actually happens:\n\nGrief doesn't pass. It changes.\n\nThe acute phase ends. The constant ache becomes intermittent. The drowning becomes something more like weather.\n\nBut the absence is still there. The weight is still present.\n\nJust... different.\n\n---\n\nSo if you're waiting for the grief to be gone before you live —\n\nYou might be waiting for something that doesn't happen.\n\nNot because you're doing it wrong.\n\nBut because grief doesn't work like that.\n\n---"
