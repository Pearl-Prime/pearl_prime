          variant_number: 10
          variant_family: D10
          content: "The grief is not the problem.\n\nThe waiting is the problem.\n\nThe grief is natural. The grief is appropriate. The grief is the cost of having cared about something enough to miss it.\n\nBut the waiting—the constant checking if you're \"ready yet\"—that's what's shrinking your life.\n\nYou don't need to be ready.\n\nYou need to start before you're ready.\n\nThe grief can come along. It doesn't need to stay home.\n\nAnd neither do you."
