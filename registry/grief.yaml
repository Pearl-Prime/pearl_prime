      section_03:
        section_id: ch01_sec03
        section: 3
        type: SCENE
        purpose: Relational avoidance — the message
        scene_type: relational
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch01_sec03_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'Now think about the conversation you didn''t have.


            The one where you were going to be honest about how you''re really doing. Or talk about them. Or let someone see
            what you''re actually carrying.


            You started to say it. Felt your throat tighten.


            And thought:

            *"Not now. I''m too fragile. Once I''m steadier, I''ll know what to say."*


            So you changed the subject.


            And said something lighter instead. Something that didn''t risk falling apart.


            Or you just… stayed quiet.


            ---'
          fingerprint:
            char_count: 391
            paragraph_count: 8
            sentence_count: 14
          location_tokens: []
        - variant_id: ch01_sec03_scene_f2
          variant_number: 2
          variant_family: F2
          content: 'Someone asked how you''re doing in {location.digital_space}.



            You know what you want to say—the real thing.



            But as you start to respond, the thoughts pile up:



            *"What if I''m too much? What if they don''t know what to say? What if I regret being honest?"*



            So you stop.



            You type: *"I''m okay."*



            And the conversation moves on without the truth.



            ---'
          fingerprint:
            char_count: 380
            paragraph_count: 8
            sentence_count: 8
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec03_scene_f3
          variant_number: 3
          variant_family: F3
          content: 'It''s the middle of the day. You''re in {location.digital_space}, staring at a message.



            Someone asked about them. Or about you. There''s something you want to say—not urgent, but true.



            But the timing feels off. Your chest feels tight. The words feel too heavy.



            So you think: *"I''ll reply later. When I can handle it."*



            But later, you''re tired.



            And by tomorrow, the moment feels gone.



            ---'
          fingerprint:
            char_count: 357
            paragraph_count: 7
            sentence_count: 11
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec03_scene_f4
          variant_number: 4
          variant_family: F4
          content: 'The cursor blinks in {location.digital_space}.



            You''ve typed something real. Something that would actually say what you''re feeling.



            But it sits there—glowing on the screen—like a confession you''re not ready to make.



            So you highlight it. Delete it.



            Replace it with something smaller. Safer. Emptier.



            And the real words sink back down. Waiting for a version of you that feels strong enough to say them.



            ---'
          fingerprint:
            char_count: 399
            paragraph_count: 7
            sentence_count: 12
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec03_scene_f5
          variant_number: 5
          variant_family: F5
          content: 'There was a message you almost sent in {location.digital_space}.



            It said what you actually feel.



            But you didn''t send it.



            And the conversation moved on without that honesty.



            Nothing broke. Nothing exploded.



            But something shifted—quietly. A small distance opened.



            And now you wonder: what would be different if you''d just said the thing?



            ---'
          fingerprint:
            char_count: 344
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.digital_space}'
        metadata:
          persona: Gen Z
          topic: grief
