            paragraph_count: 13
            sentence_count: 15
          location_tokens: []
        - variant_id: ch04_sec06_exercise_f3
          variant_number: 3
          variant_family: F3
          content: 'Here''s a practice for when your body feels braced and frozen:


            **Progressive Muscle Release.**


            Not to fix the grief. To give your nervous system something concrete to do.


            ---


            **The practice:**


            Clench your hands into fists. Hold for 5 counts. Release completely.


            Tighten your shoulders up toward your ears. Hold for 5 counts. Release.


            Tighten your whole face — screw it up. Hold for 5 counts. Release.


            Take one slow breath out.


            ---


            Your body has been holding tension on top of grief.


            This releases one layer.


            The grief stays. But the brace softens.


            And in a body that isn''t bracing, acting becomes possible.


            ---'
