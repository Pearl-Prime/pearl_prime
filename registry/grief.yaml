          content: "When the grief feels too big to move:\n\n**5-4-3-2-1 Grounding.**\n\nThis brings you back to the room. Back to now. Back to here.\n\n---\n\n**The practice:**\n\n5 things you can see.\n\n4 things you can touch.\n\n3 things you can hear.\n\n2 things you can smell.\n\n1 thing you can taste.\n\n---\n\nThis isn't about the grief.\n\nIt's about presence.\n\nWhen you're present in your body, in this room, in this moment — the small move becomes possible.\n\nNot because the grief left.\n\nBecause you're here now. And here is where the action happens.\n\n---"
