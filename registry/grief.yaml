        variants:
        - variant_id: ch03_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: "Picture the person you're waiting to become.\n\nThe one who's past the grief. Who feels like themselves again. Who can show up without the weight.\n\nWhat do they look like?\n\nProbably: lighter. Easier. More present. The version of you from before, but somehow also wiser.\n\nNow ask yourself:\n\nHave you ever actually been that person?\n\nNot briefly. Not for a moment. But consistently — the version who doesn't carry weight, who shows up without heaviness.\n\nBecause here's the truth:\n\nThat person might not exist.\n\nNot because there's something wrong with you.\n\nBut because that's not how grief works.\n\n---"
          fingerprint:
            char_count: 540
            paragraph_count: 12
            sentence_count: 12
          location_tokens: []
        - variant_id: ch03_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: "You keep waiting for the \"after\" version of yourself.\n\n\nThe one who wakes up and the grief has lifted.\n\n\nThe one who goes through the day without the weight pressing down.\n\n\nThe one who can mention them without something catching in their chest.\n\n\nBut here's what's happening:\n\n\nThat version keeps getting pushed further into the future.\n\n\n*\"Maybe next month. Maybe next year. Maybe once enough time has passed.\"*\n\n\nAnd the you who's here now — carrying it all — just keeps waiting.\n\n\n---"
          fingerprint:
            char_count: 440
            paragraph_count: 9
            sentence_count: 8
          location_tokens: []
        - variant_id: ch03_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: "Think about the last time you told yourself: \"I'll do it when I'm past this.\"\n\n\nWhat version of yourself were you imagining?\n\n\nProbably someone who feels whole. Someone who can handle things. Someone who isn't carrying the absence everywhere.\n\n\nBut that version never arrives.\n\n\nBecause grief doesn't work like that.\n\n\nIt doesn't end and then you become a different person.\n\n\nYou're always the same person. Just carrying different weights on different days.\n\n\n---"
          fingerprint:
            char_count: 420
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch03_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: "The future self you're waiting for has a specific quality:\n\n\nThey're not grieving anymore.\n\n\nThey've processed it, resolved it, put it somewhere it doesn't hurt.\n\n\nBut what if that's not what happens?\n\n\nWhat if the grief doesn't resolve — it just changes shape?\n\n\nWhat if you never become someone who doesn't carry it?\n\n\nThen the waiting becomes infinite.\n\n\nAnd the you who's here now never gets to live.\n\n\n---"
          fingerprint:
            char_count: 380
            paragraph_count: 9
            sentence_count: 9
          location_tokens: []
        - variant_id: ch03_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: "Here's what the waiting is really saying:\n\n\n*\"The person I am right now — grieving — isn't allowed to participate in life.\"*\n\n\n*\"Only a future version — healed, whole, past this — gets to show up.\"*\n\n\nBut grief doesn't work on that timeline.\n\n\nThe \"healed\" version you're imagining might never arrive. Not because you're broken — but because grief isn't something you get over. It's something you carry.\n\n\nAnd the person carrying it is still allowed to live.\n\n\n---"
