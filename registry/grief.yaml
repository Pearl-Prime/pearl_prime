          content: 'Look back at that version of you.


            The one who was just inside the loss. Who couldn''t predict when the tears would come. Who walked through the
            world like the floor had shifted under their feet.


            That person needed protection.


            And that protection looked like: *"Not now. Wait. Stay home. Stay quiet. Don''t risk it."*


            That wasn''t giving up.


            That was your system doing what systems do — finding a way to keep you safe when the threat felt overwhelming.


            ---


            You survived the hardest part.


            Not despite the waiting. In some ways, because of it.


            The strategy worked for what it was built for.


            What it was built for just doesn''t describe where you are anymore.


            ---'
