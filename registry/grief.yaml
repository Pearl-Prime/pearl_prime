        - variant_id: ch08_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: "Here's the real shift:\n\n**From \"I can't act when it's loud\" to \"I can act regardless of volume.\"**\n\nThe grief will have loud days. That's not going to change.\n\nBut your response to loud days can change.\n\n---\n\nOld response: Wait. Hide. Cancel.\n\nNew response: Breathe. Ground. Act anyway.\n\n---\n\nThe loud days don't have to be lost days.\n\nThey're just days when you carry more while you move.\n\nAnd you've already proven you can carry a lot.\n\n---"
