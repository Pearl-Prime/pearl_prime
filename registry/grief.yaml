        - variant_id: ch12_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: "Think about what's possible now.\n\n\nIn {location.daily_space}. In your relationships. In your work.\n\n\nThe grief didn't go away. But your capacity expanded.\n\n\nYou can hold more now. The grief and the joy. The absence and the presence.\n\n\nBoth. At the same time.\n\n\nThat's what changed. And that change is permanent.\n\n\n---"
