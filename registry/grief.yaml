        variants:
        - variant_id: ch12_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the final word:


            **The grief doesn''t have to go away for you to live.**


            It can stay.


            It probably will stay.


            And that''s okay.


            Because you learned something more important than how to get rid of it:


            **You learned how to live with it.**


            Not by fighting it.


            Not by fixing it.


            Not by waiting for it to leave.


            But by **carrying it while you move**.


            And that —


            That''s how you get your life back.


            Not by becoming someone who doesn''t grieve.


            **By being someone who grieves and lives anyway.**


            And you''re already doing that.


            So keep going.


            **The rest is just... life.**


            ---'
          fingerprint:
            char_count: 560
            paragraph_count: 19
            sentence_count: 18
          location_tokens: []
        - variant_id: ch12_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'You came here looking for a way through.


            And here''s what you found:


            There is no *through*.


            There''s only *with*.


            ---


            With the grief. With the absence. With the weight that doesn''t dissolve.


            With your life. With the people in it. With the days you have.


            ---


            You learned to hold both.


            Not perfectly. Not always gracefully.


            But persistently.


            Day after day, you chose to carry the grief and not let it be the only thing.


            ---


            That choice — made on hard days, made on exhausted days, made when everything in you wanted to wait — is the thing.


            Not a cure. Not a closure. Not an ending.


            Just a choice.


            Repeated.


            Until it became who you are.


            And now here you are.


            Carrying it.


            Living anyway.


            Keep choosing.


            ---'
          fingerprint:
            char_count: 600
            paragraph_count: 17
            sentence_count: 20
          location_tokens: []
        - variant_id: ch12_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'You don''t get to put it down.


            That''s the hard truth, and you''ve accepted it.


            The grief travels with you.


            To the places you go. The people you see. The moments that should be just happy but also hold the weight of what''s
            missing.


            ---


            But you''ve learned something profound:


            Carrying it is survivable.


            More than survivable.


            Carrying it is *livable*.


            You can carry the grief and also laugh. Also connect. Also be present. Also want things. Also love people.


            All of that is possible with the weight.


            You''ve proven it.


            ---


            So the invitation at the end of this is simple:


            Keep carrying.


            Keep living.


            Let the grief be part of the story — not the whole story, just a part.


            Your life is bigger than the loss.


            Let it be.


            ---'
          fingerprint:
            char_count: 620
            paragraph_count: 16
            sentence_count: 20
          location_tokens: []
        - variant_id: ch12_sec07_integration_f4
          variant_number: 4
          variant_family: F4
          content: 'The loss changed everything.


            Your future changed. Your identity changed. Your understanding of what matters changed.


            You didn''t ask for any of that.


            But here you are — changed, and still here.


            ---


            The person who started carrying this grief and the person who''s reading this now are different people.


            Not because the grief made you better.


            Because you chose, again and again, not to let it be the only thing.


            You built yourself alongside the grief.


            Not despite it. Not after it.


            Alongside it.


            ---


            That''s a remarkable thing to have done.


            Nobody sees all of it. Most of it happened in quiet moments, in private choices, in the small moves nobody else
            noticed.


            But you know what you did.


            And you can keep doing it.


            The rest of your life, if necessary.


            One small move at a time.


            ---'
          fingerprint:
            char_count: 640
            paragraph_count: 14
            sentence_count: 19
          location_tokens: []
        - variant_id: ch12_sec07_integration_f5
          variant_number: 5
          variant_family: F5
          content: 'There''s nothing left to wait for.


            That''s the final thing.


            You''ve been released from the waiting — not because the grief ended, but because you stopped making the grief''s
            departure the condition for your life.


            ---


            You don''t need to feel better first.


            You don''t need the grief to be smaller.


            You don''t need more time, more healing, more readiness.


            You can live now.


            Exactly as you are.


            Carrying what you carry.


            Full of what''s missing.


            And also full of what remains.


            ---


            Go to the thing.


            Send the message.


            Make the plan.


            Be present.


            The grief will come along. Let it.


            Your life is happening right now, alongside it.


            Not after.


            Not once.


            Now.


            Go.


            ---'
