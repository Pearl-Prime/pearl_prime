        - variant_id: ch11_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'You tried to fight the grief.


            Of course you did. It was the intuitive response.


            Fight it. Push it down. Keep it out. Wait it out.


            And none of that worked — because you can''t fight your own interior. You can only brace against it, and bracing
            is exhausting.


            ---


            When you stopped fighting, something unexpected happened.


            The grief got louder for a minute. Which felt wrong.


            But then: space.


            Room to breathe around the grief. Room to have other things alongside it.


            Room for your life to exist in the same place.


            That''s the paradox.


            Surrender made more room, not less.


            Acceptance expanded everything.


            ---'
          fingerprint:
