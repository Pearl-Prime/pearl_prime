      section_07:
        section_id: ch11_sec07
        section: 7
        type: INTEGRATION
        purpose: Who you are now
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch11_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s who you are now:


            **Someone who grieves and lives.**


            Not one or the other. Both.


            **Someone who carries weight and keeps moving.**


            Not waiting for it to lift. Moving with it.


            **Someone who shows up without being whole.**


            Because whole isn''t required. Present is enough.


            ---


            This is your new identity.


            Built through practice. Proven through evidence.


            You''re not who you were before the loss.


            You''re not who you feared you''d become.


            You''re someone new. Someone who carries grief and lives anyway.


            That''s who you are now.


            ---'
          fingerprint:
            char_count: 520
            paragraph_count: 11
            sentence_count: 15
          location_tokens: []
        - variant_id: ch11_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'Before this, you had a theory about yourself.


            *"I fall apart when things are hard."*


            *"I need conditions to be okay before I can function."*


            *"Grief takes people out. It would take me out."*


            None of those theories survived contact with reality.


            ---


            You didn''t fall apart. You bent, sometimes — but you didn''t break.


            You didn''t wait for conditions. You acted inside terrible conditions.


            You didn''t get taken out. You got transformed.


            ---


            The theories were wrong.


            And now you have evidence instead of theories.


            You know — not just hope, but *know* — what you''re capable of.


            Because you''ve already done it.


            That knowledge doesn''t leave.


            ---'
          fingerprint:
            char_count: 550
            paragraph_count: 12
            sentence_count: 16
          location_tokens: []
        - variant_id: ch11_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'You''re not done becoming.


            This isn''t the final version of you.


            There will be more losses. More weight. More moments where the old pattern beckons.


            You''ll carry those too.


            ---


            But here''s what''s different now:


            You have a framework.


            Notice. Acknowledge. Act.


            You have evidence.


            You''ve done this before. You can do it again.


            You have an identity.


            Someone who carries grief and lives anyway.


            ---


            That identity doesn''t require the grief to be small.


            It doesn''t require you to feel ready.


            It doesn''t require conditions.


            It just requires you to keep choosing — one small move at a time — to live.


            You''re already that person.


            You already were.


            ---'
