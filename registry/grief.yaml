  chapter_10:
    chapter: 10
    title: When You Slip
    sections:
      section_01:
        section_id: ch10_sec01
        section: 1
        type: HOOK
        purpose: You're going to slip
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch10_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: "Here's something you need to know:\n\n\n**You're going to slip.**\n\n\nThere will be a day when the old pattern comes back. When you cancel the thing. When you say no without thinking. When you wait without meaning to.\n\n\nAnd you'll think: *\"I'm back to square one.\"*\n\n\nBut you're not.\n\n\nA slip is not a collapse.\n\n\nAnd you need to know the difference.\n\n\n---"
          fingerprint:
            char_count: 360
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch10_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: "The old pattern doesn't disappear forever.\n\n\nIt's still in there. Waiting.\n\n\nAnd sometimes — on hard days, on loud days, on days when the grief is sharp — it shows up again.\n\n\n*\"Wait. Protect. Stay home.\"*\n\n\nWhen that happens, you might think you've failed.\n\n\nYou haven't.\n\n\nYou've just slipped. And slips are part of the process.\n\n\n---"
          fingerprint:
            char_count: 320
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch10_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: "Nobody tells you this:\n\n\nGrief doesn't move in a straight line.\n\n\nYou'll have weeks of carrying it well. Then a day when you can't carry anything.\n\n\nYou'll have months of showing up. Then a moment when you hide.\n\n\nThat's not regression. That's grief.\n\n\nWaves. Not a ladder.\n\n\n---"
          fingerprint:
            char_count: 280
            paragraph_count: 7
            sentence_count: 9
          location_tokens: []
        - variant_id: ch10_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: "Expect the slips.\n\n\nNot because you're weak.\n\n\nBecause grief is unpredictable.\n\n\nA song plays. An anniversary arrives. Someone says something.\n\n\nAnd suddenly the grief is loud again. And the old pattern is appealing again. And waiting feels like the only option.\n\n\nThat will happen.\n\n\nWhat matters is what you do next.\n\n\n---"
          fingerprint:
            char_count: 320
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch10_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: "You've been doing so well.\n\n\nCarrying the grief. Making small moves. Living alongside it.\n\n\nAnd then one day, you won't.\n\n\nYou'll skip the thing. Avoid the conversation. Choose the couch.\n\n\nAnd you'll be disappointed in yourself.\n\n\nBut listen:\n\n\nOne slip is not the end. It's just one day.\n\n\nTomorrow is different.\n\n\n---"
          fingerprint:
            char_count: 300
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: grief
          section_type: HOOK
