          content: "You're doing something ordinary.\n\n\nIn {location.daily_space}. Just a regular thing.\n\n\nAnd you notice: the grief is there. It came along.\n\n\nBut you didn't pause. Didn't check. Didn't wait.\n\n\nYou just... included it.\n\n\nThat's the shift in action. The grief stays. And so do you.\n\n\n---"
          fingerprint:
