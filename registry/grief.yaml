      section_06:
        section_id: ch03_sec06
        section: 6
        type: REFLECTION
        purpose: The invisible rule
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch03_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'There''s an invisible rule running underneath everything:


            *"You can''t live while you''re grieving."*


            You didn''t write this rule. No one taught it to you explicitly.


            But somewhere, you absorbed it.


            Maybe from the way people talk about grief — as something to "get through" before returning to life.


            Maybe from the expectation that grieving people should stay home, stay quiet, stay out of the way.


            Maybe from your own fear of falling apart in front of others.


            Whatever the source, the rule is running.


            *"First grieve. Then live."*


            But what if that rule is wrong?


            What if grieving and living aren''t sequential?


            What if they happen at the same time, in the same person, on the same day?


            ---'
          fingerprint:
            char_count: 650
            paragraph_count: 12
            sentence_count: 14
          location_tokens: []
        - variant_id: ch03_sec06_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'The rule got installed quietly.


            Nobody sat you down and said: *"While you''re grieving, you''re not allowed to fully live."*


            But you heard it in smaller ways.


            In the way people treated you after the loss — gently, carefully, as if you were fragile.


            In the way certain spaces suddenly felt off-limits — too full of memory, too likely to break something open.


            In the way you started checking yourself before entering any situation: *"Can I handle this right now?"*


            ---


            And the rule built up from those small signals.


            Not through one big decision. Through accumulated deference.


            Until the rule felt like common sense:


            *"Of course I can''t do that while I''m still grieving. What kind of person would?"*


            But it''s not common sense.


            It''s a story that got told so many times it became invisible.


            And invisible rules are the hardest to question.


            Because they don''t feel like rules.


            They just feel like reality.


            ---'
          fingerprint:
            char_count: 840
            paragraph_count: 15
            sentence_count: 20
          location_tokens: []
        - variant_id: ch03_sec06_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Ask yourself: who taught you that grief and living can''t coexist?


            Maybe no one said it directly.


            But somewhere in how grief gets talked about, treated, handled — there''s an assumption.


            That grieving people are fragile. That they need shelter. That they need to step back from life until they''re
            stable enough to return.


            And there''s truth in that — for a season.


            ---


            But somewhere along the way, *a season* became *forever.*


            The temporary shelter became the permanent address.


            And you stopped questioning whether you were still in the season that required it.


            You just kept following the rule.


            *First grieve. Then live.*


            But here''s what that rule costs:


            The grieving never ends.


            So the living never starts.


            And the rule keeps running — invisible, unquestioned — while your life waits outside.


            ---'
