          content: "Someone in {location.social_gathering} says something.\n\n\n*\"You seem different.\"*\n\n\nOr: *\"It's good to see you.\"*\n\n\nOr: *\"I'm glad you're here.\"*\n\n\nThey're noticing what you've built.\n\n\nNot that the grief is gone. That you're present despite it.\n\n\nThat's what they see. And it matters.\n\n\n---"
