          content: "For when the grief is at peak intensity:\n\n**4-7-8 Breath.**\n\nThis is a stronger intervention. Use it when the wave is crashing and you need to ride it out.\n\n---\n\n**The practice:**\n\nBreathe in for 4 counts.\n\nHold for 7 counts.\n\nBreathe out for 8 counts.\n\nRepeat 3-4 times.\n\n---\n\nThe long hold and exhale create a pause.\n\nIn that pause, you can remember: *\"This is grief. It's not an emergency. I can do this.\"*\n\nAnd then you can act.\n\n---"
