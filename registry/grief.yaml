      section_04:
        section_id: ch07_sec04
        section: 4
        type: EXERCISE
        purpose: Box Breathing (companion practice)
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch07_sec04_exercise_f1
          variant_number: 1
          variant_family: F1
          content: 'Before a small move, you can use this:


            **Box Breathing.**


            Not to make the grief go away.


            Just to give your body something to do besides brace.


            ---


            **The practice:**


            Breathe in for 4 counts.


            Hold for 4 counts.


            Breathe out for 4 counts.


            Hold for 4 counts.


            Repeat 2-3 times.


            ---


            Then: do the thing.


            The grief will still be there.


            But you''ll have created a small window of steadiness.


            Enough to move.


            ---'
          fingerprint:
            char_count: 420
            paragraph_count: 12
            sentence_count: 14
          location_tokens: []
        - variant_id: ch07_sec04_exercise_f2
          variant_number: 2
          variant_family: F2
          content: 'Before a small move, you can use this:


            **Slow Count Down.**


            Not to calm down. To shift from thinking to doing.


            ---


            **The practice:**


            Count down from 10 to 1. Slowly. Out loud if you can.


            With each number, press your feet into the floor.


            At 1, say: *"I''m moving now."*


            ---


            Then: move.


            Don''t think. Don''t re-evaluate. Just start the action.


            The count gives your brain something to do so your body can go first.


            ---


            The grief doesn''t disappear at 1.


            But you do something with the moment before action.


            And that''s enough to start.


            ---'
          fingerprint:
            char_count: 548
            paragraph_count: 13
            sentence_count: 16
          location_tokens: []
        - variant_id: ch07_sec04_exercise_f3
          variant_number: 3
          variant_family: F3
          content: 'Before a small move, you can use this:


            **Shoulder Drop.**


            Grief lives in the body. Often in the shoulders — high, tight, braced.


            This practice finds that tension and releases some of it.


            ---


            **The practice:**


            Notice your shoulders. Where are they right now?


            Lift them as high as they''ll go. Hold for 3 counts.


            Then let them drop completely.


            Repeat twice.


            Then roll them back once, slowly.


            ---


            Now notice: something released.


            Not the grief. Just the brace around it.


            ---


            When your body isn''t bracing, movement is easier.


            You''ve created a little room.


            Enough to act.


            ---'
