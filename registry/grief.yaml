      section_02:
        section_id: ch10_sec02
        section: 2
        type: SCENE
        purpose: What a slip looks like
        scene_type: setback
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch10_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what a slip looks like:\n\nThe grief is loud. Louder than it's been in weeks.\n\nYou have a thing scheduled. Something you've been showing up for. Something that should be fine.\n\nBut you look at it and think: *\"I can't. Not today.\"*\n\nSo you cancel. Or don't respond. Or stay in bed.\n\nAnd afterward, the shame arrives.\n\n*\"I was doing so well. What happened?\"*\n\nWhat happened is: grief. Grief happened.\n\n---"
          fingerprint:
            char_count: 400
            paragraph_count: 8
            sentence_count: 13
          location_tokens: []
        - variant_id: ch10_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: "You're in {location.daily_space}. Something triggers the grief.\n\n\nSuddenly you're underwater again.\n\n\nAnd all the progress feels like nothing.\n\n\n*\"I should be past this. I should be better by now.\"*\n\n\nSo you do the old thing. You wait. You hide. You protect.\n\n\nAnd then you feel like you've erased all the small moves you made.\n\n\nYou haven't.\n\n\n---"
          fingerprint:
            char_count: 340
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch10_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: "Picture yourself in {location.daily_space}.\n\n\nYou've been carrying the grief for weeks. It's been okay.\n\n\nThen: a wave. Out of nowhere. Crashing.\n\n\nAnd you slip. You say no to something. You pull back.\n\n\nIn that moment, you feel like you're starting over.\n\n\nBut you're not starting over. You're having a hard day.\n\n\nOne day is not the whole story.\n\n\n---"
          fingerprint:
            char_count: 340
            paragraph_count: 8
            sentence_count: 11
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch10_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: "The slip happens fast.\n\n\nOne minute you're functioning. The next, the grief is screaming and you're canceling everything.\n\n\nIn {location.daily_space}, you go back to the old pattern without even noticing.\n\n\nAnd then you do notice. And you feel awful.\n\n\nBut here's the thing:\n\n\nNoticing is progress.\n\n\nThe old you wouldn't have noticed. Would have stayed in the pattern for weeks.\n\n\nYou noticed. That's different.\n\n\n---"
          fingerprint:
            char_count: 380
            paragraph_count: 9
            sentence_count: 11
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch10_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: "The slip comes with a story:\n\n\n*\"See? I knew I couldn't do this.\"*\n\n\n*\"I'm not actually better.\"*\n\n\n*\"The grief won.\"*\n\n\nBut that story isn't true.\n\n\nThe truth is simpler: you had a hard day. You did the old thing. Tomorrow you can do differently.\n\n\nThe story makes it bigger than it is.\n\n\nA slip is just a slip. Not a verdict.\n\n\n---"
          fingerprint:
            char_count: 340
