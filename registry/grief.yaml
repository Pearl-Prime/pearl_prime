  chapter_08:
    chapter: 8
    title: When It Gets Loud
    sections:
      section_01:
        section_id: ch08_sec01
        section: 1
        type: HOOK
        purpose: Loud doesn't mean dangerous
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch08_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: "Some days the grief is quiet. Manageable. Almost background noise.\n\n\nAnd some days it's loud.\n\n\nSo loud you can barely think. So heavy you can barely move. So present you wonder how you'll get through the next hour.\n\n\nOn those days, the old pattern screams:\n\n\n*\"Don't do anything. You can't handle it. Wait.\"*\n\n\nBut here's what I need you to know:\n\n\n**Loud doesn't mean dangerous.**\n\n\nIt just means loud.\n\n\n---"
          fingerprint:
            char_count: 420
            paragraph_count: 9
            sentence_count: 11
          location_tokens: []
        - variant_id: ch08_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: "The volume of the grief isn't a measure of anything.\n\n\nIt doesn't tell you how broken you are.\n\n\nIt doesn't tell you how far from \"better\" you are.\n\n\nIt doesn't tell you whether you can act.\n\n\nIt just tells you: the grief is loud today.\n\n\nThat's information. Not a verdict.\n\n\n---"
          fingerprint:
            char_count: 300
            paragraph_count: 7
            sentence_count: 7
          location_tokens: []
        - variant_id: ch08_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: "Think about the loudest the grief has ever been.\n\n\nYou survived it.\n\n\nYou're still here.\n\n\nThe volume was high — and you got through.\n\n\nWhich means: volume alone doesn't stop you.\n\n\nThe belief that you can't act when it's loud — that's what stops you.\n\n\nAnd that belief can change.\n\n\n---"
          fingerprint:
            char_count: 300
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch08_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: "Loud grief feels like an emergency.\n\n\nEvery instinct says: stop. Protect. Shut down.\n\n\nBut most of the time, it's not an emergency.\n\n\nIt's just grief being grief. Wave crashing. Weight pressing.\n\n\nAnd you can ride out waves while still moving.\n\n\nNot comfortably. But possibly.\n\n\n---"
          fingerprint:
            char_count: 280
            paragraph_count: 7
            sentence_count: 9
          location_tokens: []
        - variant_id: ch08_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: "The grief gets loud and you think: *\"I can't.\"*\n\n\nBut \"I can't\" is usually \"I don't want to\" wearing a disguise.\n\n\nWhich is fair. Of course you don't want to act when it's this heavy.\n\n\nBut \"don't want to\" is different from \"can't.\"\n\n\nYou can.\n\n\nYou might not want to. It might be hard. It might be uncomfortable.\n\n\nBut you can.\n\n\n---"
