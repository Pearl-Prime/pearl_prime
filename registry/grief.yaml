      section_04:
        section_id: ch06_sec04
        section: 4
        type: REFLECTION
        purpose: What happens when you stop fighting
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch06_sec04_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what happens when you stop fighting:\n\n**The grief doesn't get bigger.**\n\nThat's the fear, right? That if you stop fighting, the grief will take over.\n\nBut the opposite happens.\n\nWhen you stop fighting, the grief becomes just grief. Heavy, but carryable.\n\nThe extra weight was always the fighting. The resistance. The judgment.\n\n---\n\nGrief + fighting = unbearable.\n\nGrief alone = heavy, but manageable.\n\nThe war was always the problem.\n\n---"
