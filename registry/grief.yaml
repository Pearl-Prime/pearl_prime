      section_04:
        section_id: ch01_sec04
        section: 4
        type: SCENE
        purpose: Social avoidance — the event
        scene_type: social
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch01_sec04_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'Now the place you didn''t go.


            The gathering. The event. The thing where you knew people might ask how you''re doing, or not ask, or look at
            you with that face that says they don''t know what to say.


            You thought about going.


            You really did.


            But then you felt it—that heaviness in your chest, that threat of tears, that pull to just… stay home.


            And you thought:

            *"I''ll go next time. When I''m less fragile. When I feel more like myself."*


            So you didn''t go.


            And later, when someone asked why, you said you were tired. Or busy. Or just not up for it.


            But the truth is—


            You were waiting.


            Waiting to not feel this way.


            ---'
          fingerprint:
            char_count: 632
            paragraph_count: 12
            sentence_count: 16
          location_tokens: []
        - variant_id: ch01_sec04_scene_f2
          variant_number: 2
          variant_family: F2
          content: 'They invited you to {location.social_gathering}.



            And immediately, the questions started:



            *"Will someone mention them? What if I cry? What if I don''t know what to say?"*



            You told yourself: *"I''ll go when I feel more together."*



            But "together" never arrived.



            So you stayed home. And spent the evening wondering what you missed.



            ---'
          fingerprint:
            char_count: 337
            paragraph_count: 7
            sentence_count: 7
          location_tokens:
          - '{location.social_gathering}'
        - variant_id: ch01_sec04_scene_f3
          variant_number: 3
          variant_family: F3
          content: 'The thing at {location.social_gathering} was happening right now.



            You''d said maybe. You''d thought about going.



            But when the time came, the grief felt too close to the surface. The couch felt safe. The idea of being around
            people felt exhausting.



            So you texted: *"Sorry, can''t make it tonight."*



            And you stayed home.



            Not because you didn''t want to go.



            But because going felt like too much while carrying this.



            ---'
          fingerprint:
            char_count: 417
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.social_gathering}'
        - variant_id: ch01_sec04_scene_f4
          variant_number: 4
          variant_family: F4
          content: 'There''s a version of you that went to {location.social_gathering}.



            They talked to people. They laughed when they could. They carried the weight and still showed up.



            But that version exists only in a parallel universe where the grief wasn''t so heavy.



            In this universe, you stayed home.



            Scrolling through photos later. Seeing what you missed.



            While the version of you that could''ve been there stayed locked behind a weight you couldn''t put down.



            ---'
          fingerprint:
            char_count: 438
            paragraph_count: 7
            sentence_count: 10
          location_tokens:
          - '{location.social_gathering}'
        - variant_id: ch01_sec04_scene_f5
          variant_number: 5
          variant_family: F5
          content: 'You didn''t go to {location.social_gathering}.



            And at first, it felt like relief.



            But then the photos started appearing. The conversations you weren''t part of. The life that kept moving without
            you.



            And you realized:



            Every time you wait to feel ready, the world keeps going.



            People keep connecting. Moments keep happening.



            And you keep watching from the outside—waiting for a version of yourself that feels whole.



            ---'
          fingerprint:
            char_count: 408
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.social_gathering}'
        metadata:
