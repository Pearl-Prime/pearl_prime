      section_06:
        section_id: ch01_sec06
        section: 6
        type: TEACHER_DOCTRINE
        purpose: Teacher doctrine statement — core worldview
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch01_sec06_teacherdoctrine_d01
          variant_number: 1
          variant_family: D01
          content: "You've been taught that grief is something to get through. That teaching is incomplete.\n\nHere's what you've been told: you must wait for the pain to pass before you can live again. Waiting for the grief to lift is patience—this is waiting-to-heal logic, and it masquerades as self-care while quietly putting life on hold.\n\nThe correction: grief doesn't pass and then you live. You live while the grief is still there. Life and loss exist together.\n\nThe grief is not a malfunction you need to fix. It is not a problem to solve before you can continue. It is the natural weight of having loved something that's no longer here in the same way.\n\nWhen you wait for the grief to pass before you move forward, you're training yourself to believe that living requires the absence of pain. It doesn't. Living happens alongside it.\n\nThe grief is not a gate. Waiting turns it into one.\n\nYou don't need to be past it. You need to learn to carry it while you live."
          fingerprint:
            char_count: 1055
            paragraph_count: 7
            sentence_count: 22
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d02
          variant_number: 2
          variant_family: D02
          content: "There's a pattern you've been following, and it has a name: waiting-to-heal logic.\n\nIt tells you that emotional readiness must precede living. It says you need to feel whole before you can move forward. It masquerades as wisdom while quietly putting life on pause.\n\nThis is the belief that you must be past the grief before you can act. You must feel like yourself again before you can show up. Waiting for the pain to lift is patience—this is waiting-to-heal logic.\n\nThe correction: grief doesn't end and then life begins. Life continues while grief is still present. They coexist.\n\nThe grief is not a sign that you're not ready. It is not a warning that you should wait. It is the weight of love that lost its destination.\n\nThe problem isn't the grief. It's the interpretation. When you wait, you're turning a feeling into a verdict.\n\nThe grief is not a gate. Waiting makes it one.\n\nYou don't need to be through it. You need to live while you carry it."
          fingerprint:
            char_count: 900
            paragraph_count: 8
            sentence_count: 18
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d03
          variant_number: 3
          variant_family: D03
          content: "Let's name what you've been doing: waiting-to-heal logic.\n\nIt's the belief that you need to feel better before you can live better. That grief must be processed, completed, resolved before you can fully participate again.\n\nHere's what that belief actually costs: your life keeps happening while you wait.\n\nThe correction: grief and living are not sequential. They are simultaneous. You don't finish one and start the other. You carry one while you do the other.\n\nThe grief is not evidence that you're not ready. It is evidence that something mattered. That's all.\n\nWhen you wait for the grief to lift, you're treating it like a gate. But gates require waiting. Grief doesn't.\n\nYou don't need to be past it. You need to carry it while you live."
          fingerprint:
            char_count: 720
            paragraph_count: 7
            sentence_count: 15
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d04
          variant_number: 4
          variant_family: D04
          content: "Here is the belief that has been running your life: grief first, then living.\n\nIt sounds reasonable. It sounds patient. But watch what it actually produces: a life on pause.\n\nThe correction: grief and living happen together. There is no \"after grief.\" There is only \"with grief.\"\n\nThe grief is not a sign that you should wait. It is not a warning that you're not ready. It is the natural consequence of having loved something that changed.\n\nWhen you treat grief as a gate, you give it power it doesn't actually have. The gate is a fiction. The waiting is the real problem.\n\nYou don't need to be past the grief. You need to learn to move while it's still there."
          fingerprint:
            char_count: 620
            paragraph_count: 6
            sentence_count: 13
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d05
          variant_number: 5
          variant_family: D05
          content: "The instruction you've been following is: wait until you're ready.\n\nBut \"ready\" never comes. Not the way you imagined.\n\nHere's the correction: readiness is not the absence of grief. Readiness is the decision to act while grief is still present.\n\nYou don't need to feel whole. You don't need to feel like yourself. You don't need to be past anything.\n\nYou just need to notice that grief and living can happen in the same body, at the same time.\n\nThe grief is not a gate. The waiting is the cage.\n\nAnd you can stop waiting whenever you choose."
          fingerprint:
            char_count: 500
            paragraph_count: 7
            sentence_count: 11
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d06
          variant_number: 6
          variant_family: D06
          content: "The world told you grief has a shape: beginning, middle, end.\n\nIt told you there's a timeline. A process. A moment when you'll be \"through it.\"\n\nThat's not how grief works.\n\nGrief moves like weather. It comes and goes. It shows up without warning. It stays longer some days than others.\n\nWaiting for it to finish is like waiting for the last cloud to pass before you go outside.\n\nYou'll wait forever.\n\nThe correction: you learn to live in all weathers. You carry an umbrella. You get wet sometimes. You go outside anyway.\n\nThat's what this is about. Not ending the grief. Living while it's still raining."
          fingerprint:
            char_count: 560
            paragraph_count: 9
            sentence_count: 14
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d07
          variant_number: 7
          variant_family: D07
          content: "You've been waiting for permission.\n\nPermission to live while still grieving. Permission to laugh while still sad. Permission to exist as a person who is both present and missing something.\n\nHere is the permission: you don't need it.\n\nThe grief is not asking you to wait. You're the one asking you to wait.\n\nThe grief is just weight. Weight you carry. Weight that changes how you move but doesn't have to stop you from moving.\n\nYou can grieve and live. At the same time. In the same body.\n\nThat's not betrayal. That's just how humans work."
          fingerprint:
            char_count: 500
            paragraph_count: 7
            sentence_count: 12
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d08
          variant_number: 8
          variant_family: D08
          content: "The sentence \"once I'm past this\" assumes grief is a place you leave.\n\nBut grief isn't a place. It's something you carry.\n\nYou don't leave it behind. You learn to hold it while you walk.\n\nThe correction isn't about getting past the grief. It's about getting skilled at living while the grief is present.\n\nDifferent verb. Different goal. Different life.\n\nYou're not behind. You're not stuck. You're just using the wrong map.\n\nThis is the new map: grief stays. You move anyway."
          fingerprint:
            char_count: 440
            paragraph_count: 8
            sentence_count: 11
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d09
          variant_number: 9
          variant_family: D09
          content: "There's a myth that says: strong people don't grieve for long.\n\nThe truth: strong people grieve and keep going. At the same time.\n\nStrength isn't the absence of grief. It's the ability to carry grief while still showing up.\n\nWaiting isn't strength. Waiting is a strategy that worked once and now works against you.\n\nThe new strategy: notice the grief. Acknowledge it. And then do the thing anyway.\n\nNot despite the grief. Alongside it."
