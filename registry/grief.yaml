      section_04:
        section_id: ch12_sec04
        section: 4
        type: REFLECTION
        purpose: What this is and isn't
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch12_sec04_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Let''s be clear about what this is and isn''t:


            **This isn''t "getting over it."**


            You''re not over it. You might never be. The loss is real and the absence stays.


            **This isn''t "moving on."**


            You''re not leaving anything behind. You''re carrying it forward.


            **This isn''t closure.**


            There''s no neat ending. No resolution. Just continuation.


            ---


            **This is learning to live with.**


            Carrying. Including. Moving forward with the weight.


            **This is integration.**


            The grief becomes part of your life, not something that stops your life.


            **This is choosing to live while grieving.**


            Not waiting. Living.


            ---'
          fingerprint:
            char_count: 580
            paragraph_count: 12
            sentence_count: 16
          location_tokens: []
        - variant_id: ch12_sec04_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'People will ask how you''re doing.


            And you''ll notice: the answer is more complicated than it used to be.


            Not *"I''m fine"* — the old deflection.


            Not *"I''m a mess"* — the old surrender.


            Something truer, something harder to say:


            *"I''m carrying it. I''m also living. Both."*


            ---


            Most people don''t have language for that.


            They want either okay or not okay.


            But you''ve been living in a third category — *carrying and moving* — and that doesn''t fit the usual answers.


            You don''t have to explain it fully.


            But you know what''s true.


            And knowing is enough.


            You''re not over it.


            You''re with it, and moving forward.


            That''s its own thing.


            ---'
          fingerprint:
            char_count: 560
            paragraph_count: 15
            sentence_count: 16
          location_tokens: []
        - variant_id: ch12_sec04_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'This isn''t a happy ending.


            Happy endings require the hard thing to be over.


            This isn''t over.


            The loss is still real. The absence is still present. Some days the grief is still the loudest thing in the room.


            ---


            But this is a different kind of ending.


            A *living* ending.


            The kind where the hard thing is still real and life is also still real.


            Where you carry both and neither cancels the other.


            ---


            You don''t get closure.


            You get continuance.


            The story doesn''t end. It changes shape.


            You''re still in it, carrying what you carry, choosing each day to live alongside the weight.


            That''s not a lesser thing.


            It might be a more honest thing than any ending.


            ---'
