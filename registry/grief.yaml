        - variant_id: ch12_sec06_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'There''s one more thing you don''t need:


            A reason the grief should be over by now.


            Grief doesn''t run on a schedule.


            There''s no point where you should be done, should be healed, should be past this.


            ---


            The *should be over by now* voice — that''s not wisdom.


            It''s impatience. Borrowed from people who''ve never carried what you carry.


            You don''t have to earn the right to still grieve.


            You don''t have to justify the timeline.


            The loss was real. The grief is proportionate.


            And however long it lasts — even if it lasts forever, in some form — that''s allowed.


            You''re allowed to still carry this.


            The grief doesn''t expire.


            And neither does your right to feel it.


            ---'
