sections:
  chapter_01:
    chapter: 1
    title: The Sentence That Quietly Runs Your Life
    sections:
      section_01:
        section_id: ch01_sec01
        section: 1
        type: HOOK
        purpose: Recognition — the sentence reveal
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'There''s a sentence you''ve been saying since the loss.


            You probably don''t even know you''re saying it.


            It shows up when someone asks how you''re doing. When you think about mentioning their name. When you consider
            going back to that place, or looking at those photos, or letting yourself feel the full weight of what''s missing.


            The sentence is:


            *"Once I''m past this, then I''ll be okay."*


            Or maybe your version sounds like:


            *"Once I stop feeling this way, I''ll be myself again."*

            *"Once enough time passes, this will lift."*

            *"Once I''ve processed this, I can move forward."*

            *"Once I''m through the worst of it, I''ll know what to do."*


            Same sentence. Different words.


            And here''s the thing—


            This sentence sounds wise. It sounds patient. It sounds like you''re being kind to yourself, waiting until you''re
            ready.


            But it''s not.


            It''s a trap.


            ---'
          fingerprint:
            char_count: 864
            paragraph_count: 13
            sentence_count: 13
          location_tokens: []
        - variant_id: ch01_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: 'What if I told you there''s a rule you''ve been following since the loss?



            Not a rule someone taught you explicitly. Not something written down anywhere.



            Just a quiet instruction running in the background of your mind:



            *"Wait until the grief passes."*



            It sounds reasonable. Patient, even.



            But here''s what that rule actually says:



            *"Who you are right now—grieving—isn''t allowed to live."*



            And so you wait. For the weight to lift. For the ache to fade. For a version of yourself that feels whole again.



            The rule keeps running. And you keep waiting.



            ---'
          fingerprint:
            char_count: 531
            paragraph_count: 10
            sentence_count: 12
          location_tokens: []
        - variant_id: ch01_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: 'Picture someone you know who lost something that mattered.



            They want to talk about it—really talk, not the surface version.



            But before they speak, they pause. They check in with themselves.



            *"Am I together enough? Will I fall apart?"*



            And if the answer is uncertain—if there''s any tightness, any threat of tears—



            They don''t say it.



            They wait.



            Now here''s the uncomfortable part:



            That person is you.



            And you''ve been doing this since the loss without realizing it.



            ---'
          fingerprint:
            char_count: 415
            paragraph_count: 11
            sentence_count: 10
          location_tokens: []
        - variant_id: ch01_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'Imagine a doorway you''ve been standing in front of since the loss.



            On the other side is your life—the conversations you want to have, the places you want to go, the memories you
            want to speak out loud.



            But there''s a sign on the door:



            *"Entry permitted only once you''re past the grief."*



            So you wait. You check yourself. You test your readiness.



            But "past the grief" never comes. Not the way you imagined.



            And the door stays closed.



            Not locked. Just... guarded. By a sentence you didn''t know you were enforcing.



            ---'
          fingerprint:
            char_count: 490
            paragraph_count: 9
            sentence_count: 14
          location_tokens: []
        - variant_id: ch01_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: 'How many things have you not done because you were waiting to feel different first?



            Conversations avoided. Places not visited. Their name left unspoken.



            All because of a sentence running quietly underneath:



            *"Once I''m past this, then I''ll be okay."*



            The sentence sounds wise. Protective.



            But look at what it''s actually produced:



            A growing distance from the life that''s still here. A collection of things left unsaid. A version of yourself
            waiting for permission that never arrives.



            Still waiting.



            ---'
          fingerprint:
            char_count: 448
            paragraph_count: 9
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: grief
          section_type: HOOK
