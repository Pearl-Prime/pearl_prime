  chapter_02:
    chapter: 2
    title: When It Made Sense
    sections:
      section_01:
        section_id: ch02_sec01
        section: 1
        type: HOOK
        purpose: Validation opening — "It made sense"
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch02_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: "So here's what I need you to know about that sentence — the one you've been saying since the loss:\n\n**It made sense.**\n\nNot in a \"you were being dramatic\" way.\nNot in a \"you should be further along\" way.\n\nI mean: early in the grief, waiting until you felt steadier to act was *the smart move*.\n\nLet me show you what I mean.\n\n---"
          fingerprint:
            char_count: 328
            paragraph_count: 6
            sentence_count: 5
          location_tokens: []
        - variant_id: ch02_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: "Before we go further, I want to address something you might be thinking:\n\n\n*\"But what if the sentence is right? What if I really should wait?\"*\n\n\nHere's what I need you to understand:\n\n\nAt one point, you were right.\n\n\nThe sentence wasn't a mistake. It was intelligent. It was protection.\n\n\nAnd you need to see that before anything else can shift.\n\n\n---"
          fingerprint:
            char_count: 346
            paragraph_count: 7
            sentence_count: 7
          location_tokens: []
        - variant_id: ch02_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: "Imagine explaining your grief to someone who doesn't get it.\n\n\nThey might say: *\"It's been a while. You should be feeling better.\"*\n\n\nBut you know it's not that simple.\n\n\nBecause the waiting? The protecting? The sentence that says \"once I'm past this, then I'll be okay\"?\n\n\nThat came from somewhere real.\n\n\nIt protected you once. And it made perfect sense when the loss was fresh.\n\n\n---"
          fingerprint:
            char_count: 352
            paragraph_count: 7
            sentence_count: 10
          location_tokens: []
        - variant_id: ch02_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: "Think of the sentence as a shield you built.\n\n\n*\"Once I'm past this, then I'll be okay.\"*\n\n\nAt some point, you needed that shield. The grief was sharp-edged and unpredictable, and waiting was the safest way through those first days.\n\n\nThe problem isn't that you built the shield.\n\n\nThe problem is that you're still carrying it—long after the acute phase has passed.\n\n\n---"
          fingerprint:
            char_count: 344
            paragraph_count: 6
            sentence_count: 6
          location_tokens: []
        - variant_id: ch02_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: "You didn't start waiting for no reason.\n\n\nSomething happened—the loss itself—that taught you: *acting while it's this raw is dangerous.*\n\n\nAnd so you learned to wait.\n\n\nThat learning kept you safe. It prevented mistakes. It helped you survive the worst of it.\n\n\nThe sentence made sense then.\n\n\nWhat matters now is whether it still does.\n\n\n---"
          fingerprint:
            char_count: 316
            paragraph_count: 7
            sentence_count: 8
          location_tokens: []
