        - variant_id: ch02_sec04_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Something shifted. Maybe gradually. Maybe in one specific moment.


            The acute grief — the kind that left you underwater, unable to breathe, unable to function — started to change.


            Not gone. Not finished.


            But different. More like a weight you carry than a wave that takes you under.


            Your capacity came back, slowly. You could function again. Go places. Have conversations.


            The conditions that made waiting necessary started to ease.


            But the strategy didn''t notice.


            ---


            The sentence kept running as if nothing had changed.


            *"Once I''m past this, then I''ll be okay."*


            Still checking for a steadiness that had already, in some ways, arrived.


            Still protecting you from a threat that had shifted shape.


            The strategy outlasted the emergency.


            ---'
          fingerprint:
