      section_06:
        section_id: ch05_sec06
        section: 6
        type: REFLECTION
        purpose: The life passing you by
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch05_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the hardest truth:


            **Your life is happening whether you participate or not.**


            Days are passing. Seasons are changing. People are moving through their lives.


            And you''re on the sidelines. Waiting.


            For a readiness that might never come.


            For a version of yourself that might not exist.


            For permission that nobody else can give you.


            ---


            The life doesn''t stop because you''re grieving.


            It just happens without you.


            And then one day you look up and realize: I missed it.


            Not the grief — the grief was always there.


            The life. I missed the life.


            ---'
          fingerprint:
            char_count: 520
            paragraph_count: 11
            sentence_count: 14
          location_tokens: []
        - variant_id: ch05_sec06_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'The strange thing about being on the sidelines is this:


            you still feel everything.


            You''re not protected from the grief by staying home.


            You''re not spared the loss by being invisible.


            You''re just absent from the parts of life that could also be good.


            ---


            Grief follows you wherever you go.


            So you might as well go somewhere worth going.


            The grief comes to the party either way.


            But at the party, there''s also a conversation you needed.


            At the party, there''s also something that makes you laugh.


            At home, there''s just the grief.


            ---'
          fingerprint:
            char_count: 510
            paragraph_count: 12
            sentence_count: 14
          location_tokens: []
        - variant_id: ch05_sec06_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'There''s a moment that happens when you''ve been waiting too long.


            You realize the waiting has become the life.


            Not a temporary pause before life resumes.


            The pause *is* what you''re living.


            ---


            And you can''t get that time back.


            The conversations you didn''t have — gone.


            The connections that faded — they fade fast when you''re not present.


            The ordinary moments that string a life together — they don''t wait.


            ---


            You thought you were protecting yourself until you were ready.


            But readiness was never coming.


            And the life you were protecting yourself *for* kept happening without you in it.


            ---'
          fingerprint:
            char_count: 570
            paragraph_count: 13
            sentence_count: 15
          location_tokens: []
        metadata:
          persona: Gen Z
