          variant_number: 4
          variant_family: F4
          content: "Someone asks how you're doing.\n\n\nYou're in {location.daily_space}. The grief is there.\n\n\nOld you would have panicked. Would have decided how much to reveal. Would have calculated the safest answer.\n\n\nNew you just says what's true.\n\n\n*\"I'm okay. Carrying some stuff. But I'm here.\"*\n\n\nNo performance. No hiding. Just honest presence.\n\n\nThat's what changes.\n\n\n---"
          fingerprint:
            char_count: 340
