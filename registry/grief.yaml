        variants:
        - variant_id: ch04_sec06_exercise_f1
          variant_number: 1
          variant_family: F1
          content: "Here's something you can use when the grief feels too loud to act:\n\n**Box Breathing.**\n\nIt's not about making the grief go away.\n\nIt's about creating enough space to act while the grief is still there.\n\n---\n\n**The practice:**\n\nBreathe in for 4 counts.\n\nHold for 4 counts.\n\nBreathe out for 4 counts.\n\nHold for 4 counts.\n\nRepeat 3-4 times.\n\n---\n\nThis doesn't fix the grief.\n\nIt just gives your body something to do besides brace.\n\nAnd in that space — you can choose to act.\n\n---"
