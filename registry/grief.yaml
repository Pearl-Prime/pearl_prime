      section_02:
        section_id: ch07_sec02
        section: 2
        type: SCENE
        purpose: What a small move looks like
        scene_type: action
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch07_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s what a small move looks like:


            The grief is heavy today. You''re carrying it.


            And instead of waiting until it lifts, you do one thing.


            You send one text. You say yes to one thing. You step outside for ten minutes.


            Not a big thing. Not proof that you''re better.


            Just one movement. With the grief along for the ride.


            That''s a small move.


            ---'
          fingerprint:
            char_count: 360
            paragraph_count: 7
            sentence_count: 10
          location_tokens: []
        - variant_id: ch07_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: 'You''re in {location.daily_space}. The grief is present.



            Old you would wait. Would stay small. Would put off the thing until later.



            New you picks up the phone. Types one message. Presses send.



            The grief didn''t go anywhere.



            But you moved anyway.



            That''s what this looks like.



            ---'
          fingerprint:
            char_count: 300
            paragraph_count: 7
            sentence_count: 8
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch07_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: 'Picture this in {location.daily_space}:



            You get an invitation. Your first instinct is no.



            But instead of automatic no, you pause.



            *"What''s the smallest yes I could give?"*



            Maybe it''s: "I''ll come for an hour." Maybe it''s: "I''ll try."



            Not a full yes. Just a crack in the door.



            That''s a small move.



            ---'
          fingerprint:
            char_count: 320
            paragraph_count: 8
            sentence_count: 9
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch07_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: 'The grief is loud today.



            In {location.daily_space}, you notice it. Heavy. Demanding.



            Old you would have let it win. Would have stayed in. Would have said "not today."



            New you says: *"You''re loud. And I''m going to do one thing anyway."*



            One email. One call. One small movement in the direction of life.



            With the grief still there. Still loud.



            But not in charge.



            ---'
          fingerprint:
            char_count: 360
            paragraph_count: 8
            sentence_count: 11
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch07_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: 'Small moves are specific:



            Not "I''ll be more social" — but "I''ll reply to Sarah''s message."



            Not "I''ll go out more" — but "I''ll walk to the coffee shop."



            Not "I''ll deal with this" — but "I''ll make one call."



            The specificity matters.



            Vague goals require readiness. Specific actions just require doing.



            ---'
