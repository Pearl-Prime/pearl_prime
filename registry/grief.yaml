          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch05_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: "There's a pile in {location.digital_space} you might not have noticed.\n\n\nUnreplied messages. Declined invitations. \"Not today\" that became \"not this week\" that became \"not anymore.\"\n\n\nIt grew slowly.\n\n\nSo slowly you didn't see it happening.\n\n\nBut it's there. And it represents something.\n\n\nAll the moments you could have been part of. All the connections you could have made.\n\n\nAll the life that happened while you were waiting.\n\n\n---"
          fingerprint:
            char_count: 400
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch05_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: "Count the events you've missed.\n\n\nNot just the big ones — the small ones too.\n\n\nThe coffee you didn't get. The walk you didn't take. The call you didn't make.\n\n\nEach one tiny.\n\n\nBut together, they tell a story.\n\n\nA story of a life getting smaller while you waited for the grief to shrink first.\n\n\nExcept the grief didn't shrink. And the life got smaller anyway.\n\n\n---"
