      section_02:
        section_id: ch02_sec02
        section: 2
        type: SCENE
        purpose: Origin moment — when waiting was protection
        scene_type: origin
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch02_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: "Think back.\n\nMaybe it was days after the loss. Or weeks. Or that first month where everything felt underwater.\n\nYou wanted to do something — go somewhere, see someone, say something real.\n\nBut you could *feel* how fragile you were.\n\nThe tears would come at the wrong moment.\nYou'd fall apart in public.\nOr worse — you'd say something you couldn't take back.\n\nSo you didn't go.\n\nYou waited.\nYou told yourself: *\"Once I'm steadier, then I'll be ready.\"*\n\nAnd you know what?\n\n**That worked.**\n\nYou avoided falling apart in front of people.\nYou stayed protected.\nYou got through those first terrible weeks.\n\nThe sentence — \"once I'm past this, then I'll be okay\" — wasn't a problem back then.\n\nIt was a **solution**.\n\n---"
          fingerprint:
            char_count: 736
            paragraph_count: 14
            sentence_count: 24
          location_tokens: []
        - variant_id: ch02_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: "Picture yourself in those early days, in {location.learning_space}.\n\n\nYou were supposed to function. To show up. To act like things were normal.\n\n\nBut before you could engage, your body ran the calculation:\n\n\n*\"What if I break down? What if they see how bad it is? What if I can't hold it together?\"*\n\n\nSo you pulled back.\n\n\nAnd told yourself: *\"I'll engage when I feel more stable.\"*\n\n\nThat distance wasn't weakness. It was strategy.\n\n\n---"
          fingerprint:
            char_count: 350
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.learning_space}'
        - variant_id: ch02_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: "There was a moment — maybe in {location.learning_space} — when the grief caught you off guard.\n\n\nA song. A smell. A phrase someone said.\n\n\nAnd suddenly you were underwater. Exposed. Barely holding on.\n\n\nAfter that, you made a decision:\n\n\n*\"I won't put myself in that position again. Not until I'm ready.\"*\n\n\nThat decision was wisdom. In that moment, you were protecting something that needed protecting.\n\n\n---"
          fingerprint:
            char_count: 380
            paragraph_count: 7
            sentence_count: 9
          location_tokens:
          - '{location.learning_space}'
        - variant_id: ch02_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: "Remember the first time you tried to act normal after the loss?\n\n\nYou went to {location.learning_space}. You tried to engage like nothing had changed.\n\n\nBut everything had changed.\n\n\nAnd you realized — painfully — that you weren't ready. The world moved too fast. The expectations were too high.\n\n\nSo you learned:\n\n\n*\"Wait until you're steadier. Then try again.\"*\n\n\nThat lesson wasn't wrong. It was exactly what you needed at the time.\n\n\n---"
          fingerprint:
            char_count: 380
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.learning_space}'
        - variant_id: ch02_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: "Early on, the waiting was survival.\n\n\nYou didn't have the capacity to both grieve and function. The grief took everything.\n\n\nSo you protected yourself in {location.learning_space}. You said no to things. You stayed home. You kept life small.\n\n\nAnd that was right.\n\n\nThe grief was too big to carry while also doing everything else. Something had to give.\n\n\nBut that was then.\n\n\n---"
          fingerprint:
            char_count: 320
            paragraph_count: 7
            sentence_count: 10
          location_tokens:
          - '{location.learning_space}'
        metadata:
