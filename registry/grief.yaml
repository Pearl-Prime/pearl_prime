        variants:
        - variant_id: ch09_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what \"normal\" feels like now:\n\n**Not grief-free. Just grief-integrated.**\n\nThe grief is part of your days. Not all of them, not constantly, but woven in.\n\nSome moments it's loud. Some moments it's quiet.\n\nBut it's no longer the thing that stops everything else.\n\n---\n\nThis is the new normal.\n\nNot the old normal — that's gone.\n\nNot a \"back to normal\" that erases what happened.\n\nA new normal that includes the loss. That carries it forward.\n\n---"
