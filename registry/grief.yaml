      section_07:
        section_id: ch02_sec07
        section: 7
        type: REFLECTION
        purpose: Danger vs discomfort distinction
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch02_sec07_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the distinction that changes everything:


            **Danger vs. discomfort.**


            Early in grief, acting while the loss was fresh could be genuinely dangerous. Bad decisions. Things said that
            couldn''t be unsaid. Falling apart in situations that couldn''t hold you.


            That was real danger.


            But now?


            Now, most of the time, it''s just discomfort.


            The heaviness is uncomfortable, not dangerous.

            The tears might come, which is uncomfortable — but not dangerous.

            The grief might show, which feels vulnerable — but vulnerability isn''t danger.


            ---


            Your system learned to treat grief as a stop sign.


            But grief isn''t a stop sign. It''s just weather.


            You can move in weather.


            ---'
          fingerprint:
            char_count: 650
            paragraph_count: 11
            sentence_count: 15
          location_tokens: []
        - variant_id: ch02_sec07_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Your system learned this lesson when the grief was new:


            *"Acting while raw equals danger."*


            It was true then. In those early days, acting impulsively could have cost you real things.


            So the system labeled it: *danger.*


            And now, every time you feel the grief, the system fires the same warning.


            But the grief isn''t what it was.


            And the situations aren''t as fragile as they were.


            You''ve gotten stronger — or at least more practiced at carrying the weight.


            ---


            So the signal is misfiring.


            The grief arrives. The system says *danger.* But the actual situation just says *discomfort.*


            Heavy, yes. Hard, yes.


            But not the same as the early days when the floor was actually shifting.


            The alarm is still set for an emergency that has, mostly, passed.


            You''re allowed to update it.


            ---'
          fingerprint:
            char_count: 740
            paragraph_count: 14
            sentence_count: 20
          location_tokens: []
        - variant_id: ch02_sec07_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Here''s a test.


            Next time you feel the grief and the pull to wait, ask yourself this:


            *"What''s the actual worst thing that happens if I go anyway?"*


            Not the imagined worst thing. The actual, realistic worst thing.


            Maybe the tears come. That''s uncomfortable. Not dangerous.


            Maybe you mention them and someone doesn''t know what to say. That''s awkward. Not dangerous.


            Maybe you carry the heaviness through the whole event and go home exhausted. That''s hard. Not dangerous.


            ---


            Danger has a different quality.


            Danger is: *this could genuinely harm something.* Your safety. Your relationships. Your ability to function.


            Discomfort is: *this will be hard. I might cry. I might feel the weight more sharply.*


            One requires stopping.


            The other just requires going anyway.


            The question is which one you''re actually dealing with.


            Most of the time, now, it''s the second.


            ---'
          fingerprint:
