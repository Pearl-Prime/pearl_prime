        - variant_id: ch03_sec03_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Here''s what gets quietly reinforced every time you wait:


            *"Who I am right now is not okay."*


            Not the action that feels too hard. Not the situation that feels too exposed.


            *You.* The grieving you. The heavy you. The you who exists in this exact moment.


