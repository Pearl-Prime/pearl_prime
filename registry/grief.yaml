      section_02:
        section_id: ch01_sec02
        section: 2
        type: SCENE
        purpose: Digital avoidance — the post
        scene_type: digital
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch01_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: "Think about the last time you almost mentioned them.\n\nNot because it wasn't relevant. Not because it didn't matter.\n\nBut because you looked at the words and thought:\n*\"I can't say this right now. I'm too raw. Once I'm less in it, I'll know what to say.\"*\n\nSo you deleted it.\n\nAnd said something lighter instead. Something that didn't risk falling apart.\n\nOr you just… said nothing at all.\n\n---"
          fingerprint:
            char_count: 420
            paragraph_count: 7
            sentence_count: 12
          location_tokens: []
        - variant_id: ch01_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: "You're looking at a photo in {location.digital_space}.\n\n\nIt's them. You want to share it—or at least acknowledge what you're feeling.\n\n\nBut your mind starts:\n\n\n*\"What if I cry? What if people don't know what to say? What if I make it awkward?\"*\n\n\nAnd then the familiar thought:\n\n\n*\"I'll share it later. When I feel more stable.\"*\n\n\nYou close the app.\n\n\nLater becomes tomorrow. Tomorrow becomes never.\n\n\nAnd the thing you wanted to say stays trapped inside.\n\n\n---"
          fingerprint:
            char_count: 416
            paragraph_count: 10
            sentence_count: 11
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: "It's late. You're alone, scrolling through {location.digital_space}.\n\n\nYou come across something that reminds you of them. Something that makes the absence sharp.\n\n\nYou start to type something honest. Something that actually says what you're carrying.\n\n\nBut the room feels too quiet. The feeling feels too big.\n\n\nAnd you think: *\"This isn't the right time. I'm too in it. I'll say something when I feel stronger.\"*\n\n\nSo you close the app.\n\n\nAnd the words you wanted to say sink back down.\n\n\n---"
          fingerprint:
            char_count: 449
            paragraph_count: 9
            sentence_count: 14
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: "There's an archive of things you almost said.\n\n\nIt lives in {location.digital_space}—in drafts, in notes, in messages you typed and deleted.\n\n\nEach one a small burial for something you wanted to express.\n\n\n*\"Here lies the memory I wanted to share.\"*\n\n\n*\"Here lies the photo I couldn't post.\"*\n\n\n*\"Here lies the version of me that wasn't ready to grieve out loud.\"*\n\n\nYou keep adding to the collection. Waiting for a steadiness that never arrives.\n\n\n---"
          fingerprint:
