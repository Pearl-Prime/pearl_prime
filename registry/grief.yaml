            sentence_count: 13
          location_tokens: []
        - variant_id: ch05_sec03_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'The grief took something from you.


            That''s real. That''s not up for debate.


            But the waiting is taking the rest.


            ---


            Consider what you had before that wasn''t connected to what you lost.


            Friends. Routines. Places that felt like yours. Ways of spending Tuesday.


            The grief didn''t erase those.


            The waiting did.


            One no at a time. One skipped event at a time. One "I''ll do it when I''m ready" at a time.


            ---


            The loss was not a choice.


            The continued shrinking is.


            ---'
