      section_07:
        section_id: ch09_sec07
        section: 7
        type: INTEGRATION
        purpose: The quiet confidence
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch09_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: "There's a quiet confidence building:\n\n**You know you can carry this.**\n\nNot because the grief got easier.\n\nBecause you've been carrying it. Day after day. Move after move.\n\n---\n\nYou have evidence now.\n\nHundreds of moments when you thought you couldn't — and you did.\n\nThat evidence adds up.\n\nIt becomes confidence. Not loud confidence. Quiet confidence.\n\nThe kind that says: *\"I've done this before. I can do it again.\"*\n\n---\n\nThe grief didn't shrink.\n\nYou grew around it.\n\n---"
