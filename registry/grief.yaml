          variant_family: F1
          content: "Let's be clear about what this is and isn't:\n\n**This isn't \"getting over it.\"**\n\nYou're not over it. You might never be. The loss is real and the absence stays.\n\n**This isn't \"moving on.\"**\n\nYou're not leaving anything behind. You're carrying it forward.\n\n**This isn't closure.**\n\nThere's no neat ending. No resolution. Just continuation.\n\n---\n\n**This is learning to live with.**\n\nCarrying. Including. Moving forward with the weight.\n\n**This is integration.**\n\nThe grief becomes part of your life, not something that stops your life.\n\n**This is choosing to live while grieving.**\n\nNot waiting. Living.\n\n---"
