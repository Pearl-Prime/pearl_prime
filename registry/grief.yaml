            Your chest is tight. Your eyes sting. You''re barely holding it together.



            And there''s a thing that needs doing.



            You do the breathing. You ground yourself. You feel your feet on the floor.



            And then you do the thing. Not perfectly. Not gracefully.



            But you do it. While the grief is screaming.



            That''s what this looks like.



