          content: "When the grief threatens to sweep you away:\n\n**Ground Through Your Feet.**\n\nThis practice brings you back to the physical. To the floor. To here.\n\n---\n\n**The practice:**\n\nFeel your feet on the ground.\n\nPress them down slightly. Notice the contact.\n\nSay to yourself: *\"I'm here. This is the floor. I'm standing on solid ground.\"*\n\n---\n\nThe grief is in your mind and heart.\n\nYour feet are in the room.\n\nWhen you ground through your feet, you connect to what's solid.\n\nAnd from solid ground, you can act.\n\n---"
