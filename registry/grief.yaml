      section_07:
        section_id: ch06_sec07
        section: 7
        type: INTEGRATION
        purpose: The permission you've been waiting for
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch06_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the permission you''ve been waiting for:


            **You can stop fighting.**


            You can let the grief be there.


            You can carry it without trying to fix it.


            You can live while it''s still present.


            ---


            This isn''t giving up. This isn''t letting the grief win.


            This is ending a war that was never winnable.


            This is choosing to live alongside what you''re carrying.


            This is finally letting yourself be a person who grieves and lives at the same time.


            ---


            You don''t need permission from anyone else.


            You just needed to know it was possible.


            It is.


            ---'
          fingerprint:
            char_count: 520
            paragraph_count: 11
            sentence_count: 14
          location_tokens: []
        - variant_id: ch06_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'You don''t have to declare a peace treaty with grief.


            You don''t have to feel good about it.


            You just have to put down the weapons.


            ---


            Not because it deserves mercy.


            Because the weapons are yours — and they''re heavy.


            Every act of resistance costs you. Every round of fighting takes something from you.


            You need that energy for living.


            ---


            So here it is:


            Put the weapons down.


            The grief can stay.


            You''re going to live anyway.


            Not someday. Not once it lifts.


            Now. Today. While it''s still here.


            ---'
          fingerprint:
            char_count: 440
            paragraph_count: 13
            sentence_count: 14
          location_tokens: []
        - variant_id: ch06_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'The war is over when you say it is.


            Not when the grief goes. The grief doesn''t decide.


            You decide.


            ---


            You decide: *I''m done spending energy fighting this. It''s here. I''ll carry it. I''m moving anyway.*


            That''s the whole thing.


            That''s the permission you''ve been looking for.


            ---


            Nobody else can give it to you.


            No amount of processing or reading or waiting will deliver it.


            You issue it.


            Right now if you want.


            The grief stays. The war ends. The living starts.


            ---'
          fingerprint:
