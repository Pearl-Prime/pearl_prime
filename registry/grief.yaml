      section_02:
        section_id: ch05_sec02
        section: 2
        type: SCENE
        purpose: The invisible accumulation
        scene_type: relational
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch05_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: "Think about all the things that have accumulated while you've been waiting.\n\nThe invitations you said no to. The conversations you avoided. The places you didn't go. The people you didn't reach out to.\n\nEach one seemed small.\n\nEach one seemed reasonable.\n\n*\"I'm not ready yet. I'll do it when I'm feeling better.\"*\n\nBut add them up.\n\nWeeks of saying no. Months of staying home. A year of smaller and smaller.\n\nThe cost doesn't feel dramatic because it happens gradually. But it's there.\n\nAnd it's getting bigger.\n\n---"
          fingerprint:
            char_count: 480
            paragraph_count: 10
            sentence_count: 14
          location_tokens: []
        - variant_id: ch05_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: "Look at your phone in {location.digital_space}.\n\n\nHow many messages have you not sent?\n\n\nHow many invitations have you declined?\n\n\nHow many \"I'll reach out when I'm ready\" that never happened?\n\n\nEach one made sense at the time.\n\n\nBut together, they form a pattern.\n\n\nA pattern of distance. Of isolation. Of a life getting smaller.\n\n\n---"
          fingerprint:
