          variant_family: F1
          content: "Notice what's different in your relationships:\n\n**You're showing up differently.**\n\nNot hiding the grief. Not performing wholeness.\n\nJust being present. With whatever you're carrying.\n\n---\n\nPeople can feel the shift.\n\nYou're not gone anymore. Not waiting on the sidelines.\n\nYou're here. Grieving and here.\n\nThat's different. That's better.\n\nNot for the grief — the grief is the same.\n\nFor the connection. The presence. The being-in-your-life-ness.\n\n---"
