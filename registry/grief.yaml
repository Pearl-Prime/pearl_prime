      section_06:
        section_id: ch11_sec06
        section: 6
        type: REFLECTION
        purpose: What you're capable of
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch11_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s what you''ve proven you''re capable of:


            **Carrying weight and moving anyway.**


            The grief didn''t get lighter. You got stronger at carrying it.


            **Being present while hurting.**


            You can show up. Even when it''s hard. Even when part of you wants to hide.


            **Living a life that includes loss.**


            Not a grief-free life. A life that has room for both. Joy and sorrow. Presence and absence.


            ---


            These capabilities don''t go away.


            They''re yours now. For whatever comes next.


            ---'
          fingerprint:
            char_count: 480
            paragraph_count: 9
            sentence_count: 13
          location_tokens: []
        - variant_id: ch11_sec06_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'There''s a specific kind of strength you''ve built that most people don''t have.


            The ability to hold contradiction.


            To feel grief and also feel gratitude. In the same moment. Without needing to resolve the tension.


            To carry absence and also carry presence.


            To be broken and functional. Simultaneously.


            ---


            Most people need things to be one way.


            Either okay or not okay.


            Either grieving or living.


            Either whole or not.


            You''ve learned that both can be true at once.


            That''s not a small skill.


            That''s the thing that makes everything else possible.


            ---'
          fingerprint:
            char_count: 480
            paragraph_count: 12
            sentence_count: 15
          location_tokens: []
        - variant_id: ch11_sec06_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Here''s what nobody tells you about grief:


            It teaches you tolerance for discomfort.


            Not because you want it to.


            Because you had no choice but to learn it.


            You had to keep existing while carrying something that felt impossible.


            So you learned to exist in that.


            ---


            And now that tolerance doesn''t just apply to grief.


            It applies to hard conversations you used to avoid.


            Decisions that used to paralyze you.


            Situations where you used to need everything to feel okay before you could act.


            You don''t need that anymore.


            You''ve carried worse. You know you can carry uncomfortable.


            That''s yours. Not just for grief.


            For everything.


            ---'
