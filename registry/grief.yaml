        - variant_id: ch04_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s what nobody told you about the grief:



            **It''s not the problem.**



            Your entire life since the loss, you''ve been trying to solve the grief.



            Like it''s a puzzle.


            Like it''s a glitch.


            Like it''s something broken in you that needs to be fixed.



            And everything you''ve heard has basically said the same thing:



            *"Here''s how to process it."*


            *"Here''s how to work through it."*


            *"Here''s how to finally feel better."*



            And so you tried.



            But here''s what I need you to understand:



            **You weren''t doing it wrong.**



            **You were trying to solve the wrong problem.**



            ---'
          fingerprint:
            char_count: 558
            paragraph_count: 11
            sentence_count: 6
          location_tokens: []
        - variant_id: ch04_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: 'What if everything you''ve been told about grief is backwards?



            You''ve been taught: *"Process it first. Then live."*



            You''ve been told: *"The grief is the problem. Get through it."*



            But here''s the question nobody asks:



            **What if trying to get through it is what''s keeping you stuck?**



            What if the grief itself was never actually stopping you?



            What if the only thing stopping you was the belief that you had to be past it first?



            ---'
          fingerprint:
            char_count: 424
            paragraph_count: 8
            sentence_count: 6
          location_tokens: []
        - variant_id: ch04_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: 'Watch what happens when someone tells you "you just need time."



            You wait for time to pass.



            You expect something to shift. You look for signs of "being better."



            And maybe some days are lighter — for a moment.



            But then the weight comes back.



            And you think: *"I must not be far enough along yet."*



            But here''s what''s actually happening:



            **You''re not doing it wrong.**



            **You''re waiting for something that doesn''t work the way you think.**



            ---'
          fingerprint:
            char_count: 392
            paragraph_count: 10
            sentence_count: 7
          location_tokens: []
        - variant_id: ch04_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'Imagine the grief as weather.



            It comes. It goes. It changes intensity. It shows up without warning.



            You''ve been trying to make the weather stop before you go outside.



            But what if the weather isn''t the problem?



            What if the problem is believing you can only live on sunny days?



            The grief isn''t stopping you from living.



            The belief that you need to wait for the grief to pass — that''s what''s stopping you.



            ---'
          fingerprint:
            char_count: 380
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch04_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: 'The grief is not the enemy.



            I know it feels that way. It''s heavy. It''s constant. It changes everything.



            But the grief is just the weight of having loved something that changed.



            That''s all.



            The enemy isn''t the weight.



            The enemy is the belief that you can''t move while carrying it.



            You can.



            The weight doesn''t stop you. The waiting does.



            ---'
