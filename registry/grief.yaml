        type: HOOK
        purpose: Why small moves matter
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch07_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: "You don't have to do everything at once.\n\n\nYou don't have to suddenly be \"back to normal.\"\n\n\nYou don't have to prove you're okay by doing all the things you used to do.\n\n\nYou just have to take one small move.\n\n\n---\n\n\nSmall moves matter because they prove something:\n\n\n**You can act while carrying this.**\n\n\nNot perfectly. Not easily.\n\n\nBut you can.\n\n\nAnd every small move is evidence.\n\n\n---"
          fingerprint:
            char_count: 380
            paragraph_count: 10
            sentence_count: 11
          location_tokens: []
        - variant_id: ch07_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: "The goal isn't to go from waiting to full speed.\n\n\nThe goal is to go from waiting to moving.\n\n\nAny movement. Any direction. Any pace.\n\n\nJust not waiting.\n\n\n---\n\n\nSmall moves are how you rebuild.\n\n\nNot by leaping. By stepping.\n\n\nOne foot. Then the other.\n\n\nWhile the grief is still there.\n\n\n---"
          fingerprint:
            char_count: 280
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        - variant_id: ch07_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: "Think about the smallest possible version of what you want to do.\n\n\nNot the full event. Not the complete conversation. Not the perfect reconnection.\n\n\nJust: one message. One yes. One step out the door.\n\n\nThat's enough.\n\n\nThat's actually everything.\n\n\nBecause small moves prove that movement is possible.\n\n\nAnd once movement is possible, bigger moves become possible too.\n\n\n---"
          fingerprint:
            char_count: 360
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch07_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: "You've been thinking too big.\n\n\n*\"I'll go back to normal.\"*\n\n\n*\"I'll be myself again.\"*\n\n\n*\"I'll do all the things I used to do.\"*\n\n\nBut those are big moves. And big moves feel impossible when you're carrying weight.\n\n\nSmall moves are different.\n\n\nSmall moves feel possible even while grieving.\n\n\nAnd small moves add up.\n\n\n---"
          fingerprint:
            char_count: 320
            paragraph_count: 9
            sentence_count: 8
          location_tokens: []
        - variant_id: ch07_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: "Here's why small moves work:\n\n\nThey don't require you to be ready.\n\n\nThey don't require the grief to be gone.\n\n\nThey just require one moment of decision.\n\n\n*\"I'm going to do this one thing. Right now. While carrying this.\"*\n\n\nThat's it.\n\n\nNo preparation. No waiting. No readiness required.\n\n\nJust: the thing, now, with the weight.\n\n\n---"
