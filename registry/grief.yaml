          variant_number: 1
          variant_family: F1
          content: 'Here''s what a slip actually means:


            **You''re human.**


            Humans carrying grief have hard days.


            Humans learning new patterns sometimes fall back to old ones.


            Humans making progress still stumble.


            That''s not failure. That''s being human.


            ---


            The slip means:


            The grief was loud. The old pattern was familiar. The new way was hard.


            So you did the easy thing.


            That''s information. Not a verdict.


            ---'
