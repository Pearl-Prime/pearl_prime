        variants:
        - variant_id: ch04_sec06_exercise_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s something you can use when the grief feels too loud to act:


            **Box Breathing.**


            It''s not about making the grief go away.


            It''s about creating enough space to act while the grief is still there.


            ---


            **The practice:**


            Breathe in for 4 counts.


            Hold for 4 counts.


            Breathe out for 4 counts.


            Hold for 4 counts.


            Repeat 3-4 times.


            ---


            This doesn''t fix the grief.


            It just gives your body something to do besides brace.


            And in that space — you can choose to act.


            ---'
          fingerprint:
            char_count: 440
            paragraph_count: 12
            sentence_count: 13
          location_tokens: []
        - variant_id: ch04_sec06_exercise_f2
          variant_number: 2
          variant_family: F2
          content: 'Here''s something to use when grief has locked everything tight:


            **The 5-4-3-2-1 Grounding Practice.**


            It doesn''t remove the grief. It widens the space around it.


            ---


            **The practice:**


            Name 5 things you can see right now.


            Name 4 things you can physically feel (floor, chair, fabric, temperature).


            Name 3 things you can hear.


            Name 2 things you can smell.


            Name 1 thing you can taste.


            ---


            That''s it.


            The grief is still there. But now you''re also here — in a room, in a body, in a moment that''s happening right
            now.


            And from here, you can act.


            ---'
          fingerprint:
