            The coffee you didn''t get. The walk you didn''t take. The call you didn''t make.



            Each one tiny.



            But together, they tell a story.



            A story of a life getting smaller while you waited for the grief to shrink first.



            Except the grief didn''t shrink. And the life got smaller anyway.



            ---'
