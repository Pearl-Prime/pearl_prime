      section_05:
        section_id: ch05_sec05
        section: 5
        type: REFLECTION
        purpose: What you're trading
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch05_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Let''s be honest about the trade you''re making:


            You''re trading presence for protection.


            Connection for comfort.


            Life for safety.


            ---


            And maybe that trade made sense early on.


            When the grief was acute. When falling apart was a real risk. When the world felt too sharp.


            But now?


            Now the protection has become a prison.


            Now the comfort is actually isolation.


            Now the safety is costing you the very life you''re trying to protect.


            ---


            The trade doesn''t make sense anymore.


            But you''re still making it.


            ---'
          fingerprint:
            char_count: 480
            paragraph_count: 12
            sentence_count: 14
          location_tokens: []
        - variant_id: ch05_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'At some point, safety became the whole goal.


            Not life. Not connection. Just: *don''t let this get worse*.


            And protection made sense. It still makes sense on the worst days.


            But you can''t build a life on pure protection.


            ---


            A life that''s organized entirely around not feeling worse isn''t really a life.


            It''s management.


            You''ve been managing instead of living.


            And management — careful, controlled, locked-down — costs you everything that makes life worth coming back to.


            The people. The moments. The small, ordinary texture of actually being present somewhere.


            ---'
          fingerprint:
            char_count: 540
            paragraph_count: 11
            sentence_count: 13
          location_tokens: []
        - variant_id: ch05_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'You made a deal at some point.


            *I''ll stay small. I''ll stay safe. And the grief won''t get worse.*


            But the deal didn''t hold.


            The grief didn''t get smaller because you got smaller.


            It just stayed the same size — but now it fills more of your world because your world got smaller.


            ---


            The trade didn''t work.


            And even if it had — even if staying small actually did keep the grief quieter — is that what you want?


            A quieter grief inside a smaller life?


            Or the life. With the grief in it.


            That''s the real choice.


            ---'
          fingerprint:
            char_count: 510
            paragraph_count: 12
            sentence_count: 15
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: grief
          section_type: REFLECTION
