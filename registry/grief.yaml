            Not that your capacity is permanently small.


            Not that the grief has won.


            Just: in that moment, on that day, the grief was heavier than what you had available.


            Sometimes that''s sleep debt. Sometimes it''s an anniversary. Sometimes there''s no reason at all.


            The capacity wasn''t enough for that moment.


            So you slipped.


            ---


            Next time you''ll have more. Or you''ll catch it faster. Or you''ll slip and recover quicker.


            That''s how it works. Not a verdict. A snapshot.


