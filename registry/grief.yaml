      section_03:
        section_id: ch05_sec03
        section: 3
        type: REFLECTION
        purpose: What you're actually losing
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch05_sec03_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what you're actually losing while you wait:\n\n**Time.** Days and weeks and months that don't come back.\n\n**Connection.** Relationships that fade when you're not present for them.\n\n**Momentum.** The ease of doing things that comes from doing them regularly.\n\n**Identity.** The sense of who you are that comes from participating in life.\n\n---\n\nThe grief takes something from you. That's true.\n\nBut the waiting takes even more.\n\nThe grief is unavoidable.\n\nThe waiting is a choice.\n\n---"
          fingerprint:
            char_count: 480
            paragraph_count: 10
