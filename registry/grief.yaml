            Every part of you wants to leave. To hide. To wait.



            But you stay.



            Not because you feel okay. Because you decided to stay.



            You ride the wave. It''s uncomfortable. It''s not graceful.



            But you don''t drown. And you don''t run.



            You just... stay. And do the thing.



