        - variant_id: ch04_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the shift:


            **Acting while the grief is still there.**


            Not waiting for it to lift.


            Not pushing through in spite of it.


            Not pretending it''s not there.


            Just... acting alongside it.


            The grief is here. And you''re going to do the thing anyway.


            Not because you''re strong. Not because you''re brave.


            Because waiting hasn''t been working.


            Because the grief isn''t going anywhere soon.


            Because your life is still happening, even while you''re carrying this.


            ---


            This isn''t about ignoring the grief.


            It''s about refusing to let the grief decide when you get to live.


            ---'
          fingerprint:
            char_count: 540
            paragraph_count: 13
            sentence_count: 14
          location_tokens: []
        - variant_id: ch04_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'You already know how to do two things at once.


            You''ve driven while sad. You''ve worked while anxious. You''ve laughed at something while still carrying something
            hard.


            The body doesn''t require emotional clearance before it moves.


            You move. The emotion comes with you.


            ---


            Acting alongside grief isn''t a special skill.


            It''s something you already do.


            The only difference is doing it on purpose.


            Choosing to move — while the grief is present — instead of waiting for the grief to give you permission.


            You don''t need its permission.


            You never did.


            ---'
          fingerprint:
            char_count: 540
            paragraph_count: 12
            sentence_count: 15
          location_tokens: []
        - variant_id: ch04_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'The version of you that waits for grief to lift before acting —


            that version is also grieving.


            They''re just grieving while staying still.


            And the version of you that acts while carrying the grief —


            that version is also grieving.


            They''re just grieving while moving.


            ---


            Both versions carry the weight.


            Only one of them also has a life.


            ---


            This isn''t about being tougher. It''s not about pushing through.


            It''s just recognizing that grief and action aren''t actually opposites.


            You can hold both.


            You''ve been holding both this whole time — you just haven''t been choosing the action part.


            ---'
