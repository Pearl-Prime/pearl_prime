          content: "Here's the final word:\n\n**The grief doesn't have to go away for you to live.**\n\nIt can stay.\n\nIt probably will stay.\n\nAnd that's okay.\n\nBecause you learned something more important than how to get rid of it:\n\n**You learned how to live with it.**\n\nNot by fighting it.\n\nNot by fixing it.\n\nNot by waiting for it to leave.\n\nBut by **carrying it while you move**.\n\nAnd that —\n\nThat's how you get your life back.\n\nNot by becoming someone who doesn't grieve.\n\n**By being someone who grieves and lives anyway.**\n\nAnd you're already doing that.\n\nSo keep going.\n\n**The rest is just... life.**\n\n---"
