        - variant_id: ch02_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'There''s a specific kind of loneliness that comes from this.


            Not the loneliness of missing the person you lost.


            A different kind. The loneliness of having removed yourself from everything that might require you to feel.


            You stopped going to places that carried memory.


            You stopped saying their name in conversations.


            You stopped bringing your real self to the rooms you entered — because the real self was too heavy, too raw, too
            much.


            And now you look around and notice:


            You''ve been here, but you haven''t been *here*.


            Present in body. Absent in everything that actually connects you to others.


            ---


            The protection created the isolation it was trying to prevent.


            The walls that kept you from falling apart also kept you from being known.


            That''s the cost.


            And it''s been accumulating quietly, one small retreat at a time.


            ---'
