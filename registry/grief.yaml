            But grief is the signal.


            It tells you: *this relationship mattered*. *This person was woven into my daily life*. *This loss has real dimensions*.


            That''s data. That''s honest, accurate data about your own experience.


            ---


            When a smoke detector goes off, you don''t destroy the detector.


            You check for smoke.


            Grief is the detector.


            It went off because something real happened.


            Not because you''re broken. Because you loved something.


            ---'
