        - variant_id: ch02_sec06_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'There''s something underneath the trade you haven''t looked at directly.


            When you chose protection over connection, you were deciding something else too.


            You were deciding:


            *"Being seen while I''m this way is worse than not being seen at all."*


            And that decision has been running everything.


            ---


            But is it true?


            Is being seen — messy, grieving, heavy — actually worse than being invisible?


            Because look at where the invisible road has taken you.


            Look at what invisibility actually costs.


            The grief is still there. But so is the isolation.


            And the isolation adds its own weight to the grief.


            So you didn''t protect yourself from pain.


            You just traded one kind for another.


            One that''s harder to name. Harder to see.


            But just as real.


            ---'
