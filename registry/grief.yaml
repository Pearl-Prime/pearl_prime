          content: 'There''s a simpler way to read a slip:


            **The grief was loud. The old road was familiar.**


            That''s it.


            You took the familiar road. Not because you''re broken. Because familiarity is powerful when you''re hurting.


            The old pattern exists because it worked once. It protected you when you needed protection.


            That it showed up again isn''t failure. It''s memory.


            ---


            The question isn''t *"Why did I slip?"*


            The question is: *"What was the grief telling me?"*


            Get curious. Not punishing.


            Curiosity leads somewhere. Punishment just loops.


