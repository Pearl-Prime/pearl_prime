      section_06:
        section_id: ch02_sec06
        section: 6
        type: REFLECTION
        purpose: The trade — visibility for invisibility
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch02_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the trade you''ve been making without realizing it:


            Visibility for invisibility.


            Connection for protection.


            Living for waiting.


            ---


            Every time you don''t go, you stay safe — but also unseen.


            Every time you don''t say the real thing, you avoid vulnerability — but also connection.


            Every time you wait, you protect yourself from the grief — but also from your life.


            The trade made sense once.


            Does it still?


            ---'
          fingerprint:
            char_count: 420
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        - variant_id: ch02_sec06_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Every choice has a cost.


            You knew the cost of being vulnerable — possibly falling apart, being seen in pieces, not being able to hold it
            together.


            So you chose the other option: stay protected, stay hidden, stay safe.


            You knew that cost too, at least in theory.


            But you didn''t fully calculate it.


            Because costs that accumulate slowly don''t feel like costs.


            They feel like just how things are.


            ---


            You missed things. Not dramatically — just steadily.


            Moments of connection that didn''t happen.


            Conversations that stayed on the surface.


            A slow retreat from your own life.


            All paid for in the currency of invisibility.


            All traded for the thing you were protecting:


            The guarantee that you wouldn''t be seen falling apart.


            Was that trade worth it?


            ---'
          fingerprint:
