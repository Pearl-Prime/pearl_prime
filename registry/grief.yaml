      section_05:
        section_id: ch09_sec05
        section: 5
        type: REFLECTION
        purpose: The moments where you notice
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch09_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "The shift shows up in small moments:\n\nYou laugh at something. And the grief doesn't punish you for it.\n\nYou have a conversation that doesn't mention them. And that's okay.\n\nYou go a few hours without the weight being overwhelming. And you don't feel guilty.\n\n---\n\nThese moments used to feel wrong. Like betrayal.\n\nNow they just feel like life.\n\nGrief and joy in the same day. Heaviness and lightness in the same hour.\n\nBoth allowed. Both real.\n\n---"
