      section_04:
        section_id: ch03_sec04
        section: 4
        type: REFLECTION
        purpose: The myth you've been believing
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch03_sec04_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the myth you''ve been believing:


            *"Grief is something that passes. And once it passes, I''ll be able to live again."*


            That''s the story. That''s the assumption underneath the waiting.


            But here''s what actually happens:


            Grief doesn''t pass. It changes.


            The acute phase ends. The constant ache becomes intermittent. The drowning becomes something more like weather.


            But the absence is still there. The weight is still present.


            Just... different.


            ---


            So if you''re waiting for the grief to be gone before you live —


            You might be waiting for something that doesn''t happen.


            Not because you''re doing it wrong.


            But because grief doesn''t work like that.


            ---'
          fingerprint:
            char_count: 620
            paragraph_count: 11
            sentence_count: 14
          location_tokens: []
        - variant_id: ch03_sec04_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Let''s look at the myth from a different angle.


            Grief is supposed to end. You''ve seen it in stories, movies, the way people talk.


            *"They finally got closure."*


            *"She''s done grieving. She''s moved on."*


            *"He found peace with it."*


            The story always has an ending. A point where the grief is resolved and life resumes.


            And so you''ve been waiting for your story to reach that point.


            ---


            But look at the people you know who have lost something significant.


            Do they stop grieving? Or do they learn to live alongside it?


            Do they reach closure? Or do they just stop letting the absence run everything?


            The myth says there''s an ending.


            But most people who''ve carried grief for a long time will tell you:


            You don''t stop missing them.


            You just stop making the missing a reason to stop living.


            That''s the real ending the myth doesn''t show.


            ---'
          fingerprint:
            char_count: 780
            paragraph_count: 14
            sentence_count: 20
          location_tokens: []
        - variant_id: ch03_sec04_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'The myth creates an impossible test.


            *"I''ll know I''m ready when the grief is gone."*


            But the grief doesn''t go. It changes.


            And because the test is impossible, you fail it every time.


            Every day you check: *Am I past it yet?*


            Every day the answer is: *Not quite.*


            And so every day you wait.


            For a finish line that doesn''t exist.


            ---


            Here''s the real test — the one you might actually be able to pass:


            Not: *Have I stopped grieving?*


            But: *Can I carry the grief and still show up?*


            That''s a test you can pass today.


            Right now, in this body, with this weight on your back.


            The grief stays. You show up anyway.


            That''s not failing the test.


            That''s finally asking the right question.


            ---'
