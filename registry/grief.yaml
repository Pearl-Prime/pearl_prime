      section_02:
        section_id: ch09_sec02
        section: 2
        type: SCENE
        purpose: What automatic looks like
        scene_type: integration
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch09_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what automatic looks like:\n\nYou wake up. The grief is there.\n\nBut instead of the old checklist — *\"How bad is it? Can I function? Should I cancel everything?\"*\n\nYou just... get up.\n\nThe grief comes along. It's part of the day. You don't fight it or fix it or wait for it to lift.\n\nYou just carry it. Like you carry your keys. Like you carry your phone.\n\nIt's there. And you move anyway.\n\n---"
          fingerprint:
            char_count: 400
            paragraph_count: 7
            sentence_count: 12
          location_tokens: []
        - variant_id: ch09_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: "You're in {location.daily_space}. Something reminds you of them.\n\n\nThe grief rises. Sharp. Present.\n\n\nOld you would have stopped. Would have needed to process it before continuing.\n\n\nNew you acknowledges it — *\"There it is\"* — and keeps going.\n\n\nNot pushing it away. Not pretending it's not there.\n\n\nJust continuing. With the grief along for the ride.\n\n\nThat's automatic.\n\n\n---"
          fingerprint:
            char_count: 360
            paragraph_count: 8
            sentence_count: 9
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch09_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: "Picture yourself in {location.daily_space}.\n\n\nThe grief is present — maybe quiet, maybe loud.\n\n\nAnd you're doing a thing. Working. Talking. Living.\n\n\nBoth at once. Without it being a big deal.\n\n\nThat's what integration looks like.\n\n\nNot grief-free. Just grief-alongside.\n\n\nThe grief and the living, happening in the same moment.\n\n\n---"
          fingerprint:
            char_count: 320
            paragraph_count: 8
            sentence_count: 9
          location_tokens:
          - '{location.daily_space}'
