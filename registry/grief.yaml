        - variant_id: ch12_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s what you don''t need anymore:


            **You don''t need to wait until the grief passes.**


            It might not pass. And you can live anyway.


            **You don''t need to feel whole.**


            You can act while carrying absence.


            **You don''t need to be "ready."**


            Readiness comes from acting, not before it.


            **You don''t need permission from anyone.**


            You''re allowed to live as you are.


            Right now.


            Carrying grief and all.


