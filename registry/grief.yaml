            sentence_count: 16
          location_tokens: []
        - variant_id: ch02_sec08_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'The sentence runs automatically now.


            You don''t decide to wait. You just... wait.


            You feel the grief. The impulse to pull back fires before you''ve even thought about it.


            The decision has been made before your conscious mind got involved.


            ---


            That''s how habits work.


            They get built through repetition until they don''t require decision-making anymore.


            You practiced waiting. Thousands of times, in small moments.


            And now waiting is the default — the thing your system does without checking first.


            That''s not a character flaw. That''s just how habits form.


            ---


            But here''s the thing about automatic behavior:


            Once you can see it, it''s no longer fully automatic.


            Seeing the pattern interrupts it, even slightly.


            And in that slight interruption, there''s a choice.


            Not the choice to never feel the grief.


            Just the choice to not always obey it.


            ---'
          fingerprint:
