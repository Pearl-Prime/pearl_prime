            You can stay in the slip longer, or shorter.


            You can beat yourself up, or stay curious.


            You can catastrophize, or keep the record accurate.


            You can spiral, or make one small move.


            ---


            The slip isn''t the test.


            What you do after the slip is the test.


            And now you know how to pass it.


