  chapter_12:
    chapter: 12
    title: What Comes Next
    sections:
      section_01:
        section_id: ch12_sec01
        section: 1
        type: HOOK
        purpose: The feeling isn't gone
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch12_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'Let''s be clear about something:



            **The grief isn''t gone.**



            You might have hoped — secretly, quietly — that learning to carry it would somehow make it disappear.



            It didn''t.



            The grief is still there. The absence is still real. The weight is still present.



            But something changed.



            You changed.



            ---'
          fingerprint:
            char_count: 300
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch12_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: 'You''ve learned to carry the grief.



            That doesn''t mean the grief is lighter.



            It means you''re stronger at carrying it.



            Different. Important. But different.



            The grief will still have loud days. Still catch you off guard. Still remind you of what''s missing.



            And you''ll carry it anyway.



            Because that''s who you are now.



            ---'
          fingerprint:
            char_count: 320
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch12_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: 'The goal was never to make the grief disappear.



            The goal was to learn to live while carrying it.



            And you''ve done that.



            Not perfectly. Not completely. But enough.



            Enough to have a life. Enough to show up. Enough to be present.



            The grief stays. And so does your life.



            Both. Together. Forward.



            ---'
          fingerprint:
            char_count: 300
            paragraph_count: 8
            sentence_count: 11
          location_tokens: []
        - variant_id: ch12_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'Here''s the truth nobody wants to say:



            The grief might not get smaller. Not significantly. Not the way you hoped.



            But it doesn''t have to.



            You can have a life with grief this size.



            You''ve proven it. You''re living it.



            The grief isn''t the problem anymore. It''s just what you carry.



            ---'
          fingerprint:
            char_count: 300
            paragraph_count: 7
            sentence_count: 10
          location_tokens: []
        - variant_id: ch12_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: 'What comes next isn''t grief-free.



            It''s grief-with.



            Grief with life. Grief with connection. Grief with presence.



            The absence stays. The weight remains.



            But it doesn''t stop you anymore.



            Because you''ve learned to include it instead of waiting for it to leave.



            That''s what comes next: more of this. Carrying and living. Together.



            ---'
