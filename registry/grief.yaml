  chapter_03:
    chapter: 3
    title: The Pattern You Didn't Know Was Running You
    sections:
      section_01:
        section_id: ch03_sec01
        section: 1
        type: HOOK
        purpose: The split — two versions of you
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch03_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what the sentence has been doing to you.\n\n\nNot just what it costs.\n\nNot just what you're avoiding.\n\n\nBut what it does to **the way you see yourself**.\n\n\nBecause here's the thing about that sentence — \"once I'm past this, then I'll be okay\":\n\n\nIt doesn't just delay your actions.\n\n\n**It splits you in two.**\n\n\nAnd you've been living like that for so long, you don't even notice it anymore.\n\n\n---"
          fingerprint:
            char_count: 393
            paragraph_count: 8
            sentence_count: 7
          location_tokens: []
        - variant_id: ch03_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: "Every time you say \"once I'm past this, then I'll be okay,\" you're creating a story in your head.\n\n\nA story about two people:\n\n\nThe person you are right now — grieving, heavy, not whole.\n\n\nAnd the person you'll become once the grief passes — light, present, yourself again.\n\n\nAnd the whole sentence is built on this belief:\n\n\n*Only the second person is allowed to live.*\n\n\nBut here's what you haven't noticed:\n\n\n**That second person never shows up.**\n\n\n---"
          fingerprint:
            char_count: 442
            paragraph_count: 9
            sentence_count: 4
          location_tokens: []
        - variant_id: ch03_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: "Watch what happens when you say the sentence.\n\n\nYou look at yourself in this moment — grieving, heavy — and you think: *\"This version can't do it.\"*\n\n\nThen you imagine a future version — past the grief, whole again — and you think: *\"That version can.\"*\n\n\nSo you wait for the first version to leave and the second version to arrive.\n\n\nBut here's what actually happens:\n\n\nThe second version never arrives.\n\n\nAnd the first version just keeps waiting.\n\n\n---"
          fingerprint:
            char_count: 434
            paragraph_count: 8
            sentence_count: 5
          location_tokens: []
        - variant_id: ch03_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: "There are two versions of you in your head.\n\n\nThe one who grieves. The one who lives.\n\n\nAnd you've decided — without realizing it — that they can't be the same person.\n\n\n*\"The grieving me can't handle things. The future me — the one who's past this — can.\"*\n\n\nSo you wait for grieving-you to become past-it-you.\n\n\nBut here's the problem:\n\n\nThey're both you.\n\n\nAnd waiting for one to replace the other is waiting for something that doesn't exist.\n\n\n---"
          fingerprint:
            char_count: 420
            paragraph_count: 8
            sentence_count: 7
          location_tokens: []
        - variant_id: ch03_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: "The sentence creates an impossible situation.\n\n\n\"Once I'm past this, then I'll be okay.\"\n\n\nIt says: the you who exists right now — carrying the grief — can't live.\n\n\nOnly a future you — free of this weight — is allowed.\n\n\nBut what if that future you never arrives?\n\n\nWhat if the grief doesn't pass the way you expected?\n\n\nThen you're just... waiting. Forever.\n\n\nFor a version of yourself that was never coming.\n\n\n---"
          fingerprint:
            char_count: 380
            paragraph_count: 9
            sentence_count: 8
