      section_04:
        section_id: ch04_sec04
        section: 4
        type: REFLECTION
        purpose: Why fixing makes it worse
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch04_sec04_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s why trying to fix the grief makes it worse:


            When you treat grief like a problem to solve, you add a second layer.


            Layer 1: The grief itself. Heavy, but carryable.


            Layer 2: The judgment about the grief. *"I shouldn''t still feel this way. Something is wrong. I need to fix this."*


            The first layer is natural.


            The second layer is what makes it unbearable.


            ---


            Think about what happens when you try to "process" the grief:


            You check: *"Am I better yet?"*


            You notice you''re not better.


            You feel worse about not being better.


            The grief stays. Plus now there''s frustration. Plus now there''s self-doubt.


            The fixing adds weight. It doesn''t remove it.


            ---'
          fingerprint:
            char_count: 620
            paragraph_count: 12
            sentence_count: 16
          location_tokens: []
        - variant_id: ch04_sec04_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'There''s a specific kind of exhaustion that comes from managing grief.


            Not the grief itself — the managing.


            The constant monitoring: *Am I better? Is this getting worse? Should I feel more? Should I feel less?*


            All that attention loops back on itself.


            And the grief stays exactly where it was.


            Plus now you''re tired from checking.


            ---


            You can''t think your way out of grief.


            The thinking is just more weight.


            Another layer on top of the original weight.


            The only way the checking stops helping is when you stop needing the grief to be different.


            ---'
          fingerprint:
            char_count: 530
            paragraph_count: 12
            sentence_count: 14
          location_tokens: []
        - variant_id: ch04_sec04_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Notice what happens when you call a feeling "bad."


            You tense around it. You try to push it away. You spend energy keeping it at a distance.


            And the pushing uses energy you don''t have right now.


            The grief takes some. The fighting takes the rest.


            ---


            Here''s what changes when you stop calling it bad:


            You stop adding strain on top of strain.


            *The grief is just heavy. Not wrong. Not a verdict.*


            And heavy things can be carried.


            Things you''ve judged as wrong — those are the things you wrestle with until you''re exhausted.


            The judgment is the extra cost.


            ---'
          fingerprint:
            char_count: 560
            paragraph_count: 12
            sentence_count: 15
          location_tokens: []
