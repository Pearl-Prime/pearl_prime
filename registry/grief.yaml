      section_03:
        section_id: ch12_sec03
        section: 3
        type: REFLECTION
        purpose: What you actually learned
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch12_sec03_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s what you actually learned:


            **You can carry grief and live at the same time.**


            Not sequentially. Simultaneously.


            The grief doesn''t have to pass for you to have a life.


            **The waiting was the problem, not the grief.**


            The grief is weight. Heavy, but carryable.


            The waiting was what shrunk your life.


            **You''re stronger than you thought.**


            Not because the grief got lighter. Because you carried it anyway.


            ---


            These lessons stay with you.


            For this grief. For future griefs. For anything heavy you have to carry.


            ---'
          fingerprint:
            char_count: 520
            paragraph_count: 10
            sentence_count: 14
          location_tokens: []
        - variant_id: ch12_sec03_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'You also learned something about time.


            Not *"time heals all wounds"* — that''s not what happened.


            What happened is: time gave you more evidence.


            More evidence that you can carry this.


            More evidence that the grief doesn''t have to win the day.


            More evidence that small moves accumulate.


            ---


            The grief at month twelve isn''t lighter than the grief at month one.


            But you''re more practiced at carrying it.


            You''ve carried it in more situations.


            You''ve proven to yourself, repeatedly, that carrying it is possible.


            That''s not healing. That''s mastery.


            Slow, hard-won, quiet mastery.


            And it''s yours.


            ---'
          fingerprint:
            char_count: 520
            paragraph_count: 13
            sentence_count: 15
          location_tokens: []
        - variant_id: ch12_sec03_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'What you learned isn''t only for this grief.


            That''s worth saying clearly.


            Because there will be more losses. Not this one — something else. Someone else. A future you can''t predict.


            And when that comes, you''ll already know:


            Wait for the grief to pass — and your life shrinks.


            Carry it while you move — and your life expands.


            ---


            You won''t have to learn that lesson again from scratch.


            You''ll know it in your body. In your record. In the evidence you''ve built.


            *"I''ve done this before. I can do it again."*


            That sentence — *"I''ve done this before"* — is one of the most powerful things a person can carry.


            You get to carry it now.


            ---'
          fingerprint:
