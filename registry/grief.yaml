      section_05:
        section_id: ch02_sec05
        section: 5
        type: REFLECTION
        purpose: The cost — protection became prevention
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch02_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s what protection became:


            Prevention.


            The same walls that kept you safe early on are now keeping you isolated.


            The waiting that protected you from falling apart is now keeping you from showing up.


            The sentence that helped you survive is now costing you your life.


            ---


            Not all at once. Gradually.


            Each time you didn''t go, the not-going got easier.

            Each time you didn''t say the real thing, the silence got more natural.

            Each time you waited, the waiting became default.


            And now you''re here.


            Still waiting.


            For a readiness that isn''t coming.


            For a version of yourself that might not exist.


            For a day when the grief finally lifts — even though the grief may have already changed into something you could
            carry.


            ---'
          fingerprint:
            char_count: 700
            paragraph_count: 13
            sentence_count: 17
          location_tokens: []
        - variant_id: ch02_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'The walls did their job.


            They kept you protected. They kept the worst exposure at bay.


            But walls don''t know when to come down.


            They just stay up. Because that''s what walls do.


            And now you''re living inside them.


            Not because you chose to stay. Because you forgot they were there.


            The protection became the furniture.


            The avoidance became the floor plan.


            And the house got smaller without you noticing — because you stopped going to the rooms you''d been avoiding for
            so long.


            ---


            This is not a character flaw.


            This is how protective patterns work.


            They overstay. They generalize. They spread from the original threat to anything that resembles the original threat.


            And eventually, *everything* resembles the original threat.


            So the walls keep going up. The house keeps shrinking.


            Until protection has become a kind of prison.


            ---'
