      section_03:
        section_id: ch04_sec03
        section: 3
        type: REFLECTION
        purpose: The feeling is information
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch04_sec03_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what the grief actually is:\n\n**Information.**\n\nNot a stop sign. Not a verdict. Not proof that you're not ready.\n\nJust information.\n\nIt says: *\"Something you loved is missing. Something changed. There's weight here.\"*\n\nThat's it.\n\nIt doesn't say: *\"You can't function.\"*\n\nIt doesn't say: *\"Stay home.\"*\n\nIt doesn't say: *\"Wait until I'm gone.\"*\n\nThose are interpretations you've added.\n\nThe grief itself is just weight. Just information. Just the body's way of holding what the mind hasn't figured out yet.\n\n---\n\nYou can carry information while you move.\n\nYou can hold weight while you act.\n\nThe grief is not a gate. It's just what you're carrying.\n\n---"
          fingerprint:
            char_count: 650
