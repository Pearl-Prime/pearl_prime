          content: "Here's the story you tell yourself after a slip:\n\n*\"I'm back at the beginning.\"*\n\n*\"All that progress was fake.\"*\n\n*\"I'll never really be okay.\"*\n\nThat story feels true in the moment. The disappointment is real.\n\nBut the story isn't accurate.\n\n---\n\nOne slip doesn't erase a hundred small moves.\n\nOne hard day doesn't undo weeks of showing up.\n\nOne moment of waiting doesn't mean you're back to who you were before.\n\nThe story is wrong.\n\n---"
