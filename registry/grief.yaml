      section_02:
        section_id: ch03_sec02
        section: 2
        type: SCENE
        purpose: The version that never arrives
        scene_type: internal
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch03_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'Picture the person you''re waiting to become.


            The one who''s past the grief. Who feels like themselves again. Who can show up without the weight.


            What do they look like?


            Probably: lighter. Easier. More present. The version of you from before, but somehow also wiser.


            Now ask yourself:


            Have you ever actually been that person?


            Not briefly. Not for a moment. But consistently — the version who doesn''t carry weight, who shows up without
            heaviness.


            Because here''s the truth:


            That person might not exist.


            Not because there''s something wrong with you.


            But because that''s not how grief works.


            ---'
          fingerprint:
            char_count: 540
            paragraph_count: 12
            sentence_count: 12
          location_tokens: []
        - variant_id: ch03_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: 'You keep waiting for the "after" version of yourself.



            The one who wakes up and the grief has lifted.



            The one who goes through the day without the weight pressing down.



            The one who can mention them without something catching in their chest.



            But here''s what''s happening:



            That version keeps getting pushed further into the future.



            *"Maybe next month. Maybe next year. Maybe once enough time has passed."*



            And the you who''s here now — carrying it all — just keeps waiting.



            ---'
          fingerprint:
            char_count: 440
            paragraph_count: 9
            sentence_count: 8
          location_tokens: []
        - variant_id: ch03_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: 'Think about the last time you told yourself: "I''ll do it when I''m past this."



            What version of yourself were you imagining?



            Probably someone who feels whole. Someone who can handle things. Someone who isn''t carrying the absence everywhere.



            But that version never arrives.



            Because grief doesn''t work like that.



            It doesn''t end and then you become a different person.



            You''re always the same person. Just carrying different weights on different days.



            ---'
          fingerprint:
            char_count: 420
            paragraph_count: 8
            sentence_count: 10
