          variant_number: 5
          variant_family: F5
          content: "You had something to share in {location.digital_space}.\n\n\nSomething about them. Something about what you're carrying.\n\n\nBut you didn't share it.\n\n\nAnd nothing happened.\n\n\nNo one noticed. No one asked. The world moved on without knowing what you were holding.\n\n\nWhich felt like relief at first.\n\n\nBut now—looking back—you see the cost:\n\n\nA whole archive of things left unsaid. Memories that stayed private. A grief that never got witnessed.\n\n\nAll waiting for a readiness that never came.\n\n\n---"
