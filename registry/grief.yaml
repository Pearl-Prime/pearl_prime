            paragraph_count: 14
            sentence_count: 17
          location_tokens: []
        - variant_id: ch08_sec03_exercise_f3
          variant_number: 3
          variant_family: F3
          content: 'When the grief is loud, your body needs something:


            **Humming Exhale.**


            This works through vibration. The sound resonates in your chest and tells your body to calm down.


            No one else needs to hear it.


            ---


            **The practice:**


            Breathe in for 4 counts.


            Breathe out slowly while making a low hum. Let the sound come from your chest, not your throat.


            Feel the vibration. Keep the exhale going as long as the hum lasts.


            Repeat 3-4 times.


            ---


            This isn''t meditation. It''s mechanics.


            Your vagus nerve responds to vibration — it''s a direct line to your calm.


            ---


            You can do this in a bathroom. In a car. Anywhere the grief is loud.


            It doesn''t need to make sense. It just needs to work.


            And it works.


            ---'
