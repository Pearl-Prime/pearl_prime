            paragraph_count: 14
            sentence_count: 19
          location_tokens: []
        - variant_id: ch02_sec08_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Watch for the moment right before you retreat.


            Something will happen — an invitation, an opportunity, a moment that calls for honesty.


            And before you''ve even consciously considered it, you''ll feel the pull.


            The heaviness. The tightening. The automatic:


            *"Not now. Later. When I''m more ready."*


            That''s the autopilot firing.


            ---


            You might not even notice it as a choice.


            It will feel like a fact.


            *"I can''t go. I''m too heavy right now."*


            But *"can''t"* is doing a lot of work there.


            Often what it means is: *"I''ve decided not to. Because I''ve always decided not to. Because that''s what I do
            when I feel this way."*


            That''s a habit.


            Not a limit.


            And habits — unlike limits — can be changed.


            Slowly. Deliberately. With practice.


            But they can change.


