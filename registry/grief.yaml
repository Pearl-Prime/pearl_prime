        - variant_id: ch05_sec03_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'What does isolation actually cost?


            Not in the abstract — in your specific life.


            The friendship that went quiet because you kept saying no.


            The habit you had that required showing up somewhere.


            The version of yourself that existed in the presence of other people.


            ---


            You didn''t just lose time.


            You lost texture.


            The small daily contact that makes a life feel inhabited instead of just endured.


            Waiting doesn''t preserve any of that.


            Waiting just means more of it drains away.


            ---'
          fingerprint:
