          content: "Here's the truth:\n\n**The volume of the grief doesn't dictate what you can do.**\n\nQuiet grief days — you can act.\n\nLoud grief days — you can also act.\n\nThe volume changes. Your capability doesn't.\n\n---\n\nYou've been letting the volume make decisions for you.\n\n*\"It's too loud today. I can't.\"*\n\nBut the volume is just volume. It's not a command.\n\nYou're still in charge of your choices.\n\nEven on the loudest days.\n\n---"
