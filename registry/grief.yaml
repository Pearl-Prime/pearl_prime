        - variant_id: ch12_sec06_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'You also don''t need to protect other people from the grief.


            That was a real burden — carrying the weight of the loss and also managing how it landed on everyone around you.


            *"I don''t want to make things hard for them."*


            *"I should seem okay so they don''t worry."*


            *"My grief is too much."*


            ---


            You can let that go.


            The people who can hold your grief with you will.


            The people who can''t — that''s their limitation, not your flaw.


            Your grief isn''t too much.


            It''s the appropriate size for the loss.


            You don''t need to make it smaller to deserve connection.


            You can bring the whole weight.


            And see who stays.


            The ones who stay are the right ones.


            ---'
