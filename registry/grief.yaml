      section_05:
        section_id: ch01_sec05
        section: 5
        type: REFLECTION
        purpose: Pattern naming — brain training
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what's happening.\n\nEvery time you say that sentence—\n*\"Once I'm past this, then I'll be okay\"*—\n\nYou're training yourself to treat the grief like a gate.\n\nYou're saying:\n*\"This feeling means I can't. This feeling means I'm not ready. This feeling means I should wait.\"*\n\nAnd something inside you listens.\n\nBecause that's how it works. You learn.\n\nSo the next time you think about going somewhere, or saying something real, or letting yourself be seen—\n\nSomething inside says:\n*\"Wait. You're still grieving. That must mean it's not time yet.\"*\n\nAnd you feel it again.\n\nThat heaviness. That tightness. That pull to wait.\n\nNot because the thing itself is wrong.\n\nBut because you've been teaching yourself that *the grief* means stop.\n\n---\n\nAnd here's the hardest part—\n\nThe more you wait, the smaller your world gets.\n\nThe places you don't go. The conversations you don't have. The memories you don't speak out loud. The version of yourself you don't let exist.\n\nAll of it shrinks.\n\nAnd something inside notices.\n\nIt says:\n*\"Okay, so we're not doing that anymore. Got it. That must be too hard.\"*\n\nSo the next time feels harder.\n\nThe next thing feels bigger.\n\nThe next moment of connection feels further away.\n\nNot because you're getting worse.\n\nNot because the grief is winning.\n\nBut because you've been living by a sentence that sounds like patience—\n\nBut works like a cage.\n\n---"
          fingerprint:
            char_count: 1354
            paragraph_count: 28
            sentence_count: 32
          location_tokens: []
        metadata:
