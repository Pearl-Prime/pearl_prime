        - variant_id: ch05_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: "The cost of waiting is invisible until you add it up.\n\n\nOne missed event doesn't matter. One avoided conversation is fine.\n\n\nBut weeks of this. Months of this.\n\n\nSuddenly you look around and wonder: where did everyone go?\n\n\nThey didn't go anywhere.\n\n\nYou just stopped showing up.\n\n\nAnd the world kept moving without you.\n\n\n---"
