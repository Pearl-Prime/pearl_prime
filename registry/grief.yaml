            This uses physical resistance to remind your body where it is.


            ---


            **The practice:**


            Stand near a wall.


            Place both palms flat against it.


            Press firmly — not hard enough to hurt, but hard enough to feel the resistance.


            Hold for 10 seconds. Feel the wall push back.


            Say quietly: *"I''m here. This wall is here. The floor is under me."*


            ---


            Physical resistance is grounding.


            The wall doesn''t care about the grief.


            It''s just there. Solid. Real.


            ---


            And you''re pressing against it. Also real. Also here.


            That''s enough to come back from the edge.


            Enough to act.


            ---'
