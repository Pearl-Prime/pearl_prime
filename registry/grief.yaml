        - variant_id: ch08_sec04_exercise_f2
          variant_number: 2
          variant_family: F2
          content: 'When the grief threatens to sweep you away:


            **Temperature Anchor.**


            This grounds you through sensation — the most direct route back to the present.


            ---


            **The practice:**


            Find something cold or warm nearby.


            A cold glass of water. A warm mug. Ice from the freezer.


            Hold it in both hands for 30 seconds.


            Focus entirely on the temperature. How it changes. Where it spreads through your palms.


            ---


            Your mind was somewhere terrible.


            Now it''s here, in your hands, feeling this.


            ---


            The grief is still there.


            But you just gave your nervous system something real to hold onto.


            And real things are grounding.


            And grounded is where action happens.


            ---'
          fingerprint:
