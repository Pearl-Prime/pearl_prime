      section_07:
        section_id: ch05_sec07
        section: 7
        type: INTEGRATION
        purpose: The shift that has to happen
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch05_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: 'So here''s the shift that has to happen:


            **From "waiting until I''m ready" to "acting while I''m carrying this."**


            Not because the grief should be gone by now.


            Not because you''re being weak or dramatic.


            But because the waiting is costing more than the acting ever could.


            ---


            The grief can stay.


            And you can still show up.


            That''s not ignoring it. That''s not pushing through.


            That''s just refusing to let the grief make all your decisions.


            ---


            You''re still the one in charge of your life.


            Even while grieving.


            Especially while grieving.


            ---'
          fingerprint:
            char_count: 520
            paragraph_count: 11
            sentence_count: 14
          location_tokens: []
        - variant_id: ch05_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'You can see the cost now.


            Not in theory — in the actual shape of your life.


            What got smaller. What faded. What you''ve been waiting to return to.


            ---


            The grief didn''t take all of that.


            The waiting did a significant portion of it.


            And waiting is something you can stop.


            ---


            Not all at once. Not in a dramatic reversal.


            Just: the next time something is available to you, show up for it.


            With the grief present.


            With the weight still there.


            Just show up.


            ---'
          fingerprint:
            char_count: 440
            paragraph_count: 12
            sentence_count: 14
          location_tokens: []
        - variant_id: ch05_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'The shift isn''t dramatic.


            It doesn''t require the grief to change.


            It doesn''t require you to feel ready.


            ---


            It just requires a different question.


            Old question: *"Am I ready?"*


            New question: *"Does this matter enough to show up for anyway?"*


            ---


            The grief doesn''t answer that question.


            Only you do.


            Because you''re the one who knows what matters.


            You''re the one who knows what your life is supposed to look like.


            The grief is just a passenger.


            You''re still the one driving.


            ---'
          fingerprint:
            char_count: 460
            paragraph_count: 13
            sentence_count: 14
          location_tokens: []
