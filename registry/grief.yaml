        - variant_id: ch11_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: "There's been a quiet shift in who you are.\n\n\nNot in the grief — the grief is still there.\n\n\nIn you.\n\n\nYou've become someone who carries weight and moves anyway.\n\n\nSomeone who doesn't wait for permission.\n\n\nSomeone who includes the grief instead of fighting it.\n\n\nThat's a new identity. And you built it yourself.\n\n\n---"
