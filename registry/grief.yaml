      section_07:
        section_id: ch03_sec07
        section: 7
        type: REFLECTION
        purpose: The cost — erasing yourself
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch03_sec07_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what the waiting is actually costing you:\n\n**You're erasing yourself.**\n\nNot on purpose. Not dramatically.\n\nJust... slowly.\n\nEvery time you don't show up, you become a little more invisible.\n\nEvery time you wait, your world gets a little smaller.\n\nEvery time you tell yourself \"not yet,\" you reinforce the belief that who you are right now — grieving — isn't allowed to exist.\n\n---\n\nThe grief isn't erasing you.\n\nThe waiting is.\n\nThe grief is just weight. Heavy, but carryable.\n\nThe waiting is what's shrinking your life.\n\n---"
