        - variant_id: ch03_sec07_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Invisibility doesn''t happen all at once.


            It happens in the small choices.


            The time you were at a gathering and said *"fine"* when someone asked how you were.


            The time you didn''t mention their name even though everything reminded you of them.


            The time you changed the subject before the conversation could get real.


            Each one felt like protection.


            Each one cost a small piece of being known.


            ---


            And now, looking back, you can see the accumulation.


            A whole collection of moments when you weren''t fully there.


            When the real you — carrying real weight — stayed home while a lighter, more manageable version showed up.


            That version kept you safe.


            But it also kept you from being seen.


            And being seen is how connection happens.


            So you protected yourself from the thing that would have helped.


            The grief isn''t making you invisible.


            The managing of the grief is.


            ---'
          fingerprint:
