        variants:
        - variant_id: ch02_sec04_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what changed:\n\nThe conditions shifted. But the strategy didn't.\n\nEarly on, you needed protection. The grief was acute. The risk of falling apart was high. Waiting made sense.\n\nBut time passed.\n\nThe acute phase ended. The grief changed shape — still present, but different. More like weather than like drowning.\n\nAnd yet the sentence kept running:\n\n*\"Once I'm past this, then I'll be okay.\"*\n\nAs if the threat was still the same.\n\nAs if you were still in those first weeks.\n\nAs if waiting was still the smart move.\n\n---\n\nThe problem isn't that you built the shield.\n\nThe problem is that the shield became permanent.\n\nWhat was once protection is now prevention.\n\n---"
