          variant_family: F2
          content: 'There''s a question underneath the question.


            Not just: *"What is the waiting costing you?"*


            But: *"What are you getting from it?"*


            Because the waiting isn''t just loss.


            It also provides something.


            Protection from vulnerability. Certainty that you won''t fall apart publicly. The comfort of a strategy — even
            a bad one — over the unknown of acting without a guarantee.


            The waiting keeps a kind of order.


            And order, when everything else has been chaotic, is hard to let go of.


            ---


            So sit with both sides.


            What it costs. What it gives.


            Not to decide right now. Just to see the full picture.


            Because you can''t change a pattern you haven''t actually looked at.


            And the waiting has been running in the dark long enough.


