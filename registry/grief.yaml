      section_05:
        section_id: ch03_sec05
        section: 5
        type: REFLECTION
        purpose: The loop you're stuck in
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch03_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the loop you''re stuck in:


            1. You feel the grief.

            2. You tell yourself: "I can''t do this while I''m feeling this way."

            3. You wait.

            4. While you wait, you feel more isolated.

            5. The isolation makes the grief heavier.

            6. The heavier grief makes you want to wait more.


            And around. And around. And around.


            The loop isn''t obvious because each step feels logical.


            *"Of course I can''t show up when I''m this heavy."*


            *"Of course the heaviness gets worse when I''m alone."*


            *"Of course being alone makes me want to wait until I''m lighter."*


            But the loop is the trap.


            And waiting is the door that keeps it closed.


            ---'
          fingerprint:
            char_count: 580
            paragraph_count: 13
            sentence_count: 14
          location_tokens: []
        - variant_id: ch03_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: 'Look at the loop from the outside.


            Someone starts avoiding things because they''re grieving.


            Because they''re avoiding things, they become more isolated.


            Because they''re isolated, they lose connection — the thing that actually helps carry grief.


            Without connection, the grief grows heavier.


            Because the grief grows heavier, the avoidance makes more sense.


            And so the avoiding continues.


            ---


            From inside the loop, every step feels logical.


            From outside, you can see the trap.


            The loop doesn''t need a reason to keep running. It generates its own justification.


            Each turn confirms the last turn.


            *"See? I knew I couldn''t go. Look how heavy I feel."*


            Yes. But you feel that heavy partly because you didn''t go.


            That''s the part the loop hides.


            And the only way to see it is to stop mid-rotation and ask:


            *"Is this grief getting heavier because of the grief — or because of the loop?"*


            ---'
          fingerprint:
            char_count: 820
            paragraph_count: 15
            sentence_count: 20
          location_tokens: []
        - variant_id: ch03_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'There''s a word for this loop:


            Withdrawal.


            Not intentional, not dramatic. Just quiet.


            Each day a little smaller. Each week a few more things avoided.


            And with each withdrawal, the world outside gets a little more foreign.


            A little harder to return to.


            So the next time the choice comes — go or stay — staying feels even more obviously correct.


            Because returning to something you''ve been away from feels like starting over.


            ---


            This is why the waiting gets harder the longer it goes on.


            Not because the grief is worse.


            Because the withdrawal has compounded.


            The gap between where you are and where you want to be has widened.


            And the widening makes the waiting feel more justified.


            But the widening *is the problem the waiting created.*


            The loop feeds itself.


            And the only exit is the one that feels hardest:


            Showing up before you feel ready.


            ---'
          fingerprint:
