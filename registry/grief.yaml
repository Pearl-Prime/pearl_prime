        - variant_id: ch10_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s the difference between a slip and a collapse:


            **A slip is one day.**


            You cancel a thing. You hide. You wait.


            But tomorrow, you notice. And you try again.


            **A collapse is surrender.**


            You go back to the old pattern permanently. You stop trying. You give up on living while carrying the grief.


            ---


            A slip doesn''t have to become a collapse.


            The moment you notice — *"I slipped"* — you''re already not collapsed.


            Noticing is the difference.


            Noticing means you can choose differently next time.


            ---'
