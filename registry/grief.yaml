            It requires you to be a different person before you''re allowed to live.


            To leave behind the exact version of yourself that needs to be there — the one who''s grieving, who loved someone,
            who carries real weight.


            To replace that person with a lighter, cleaner, more presentable version.


            But that version isn''t more real.


            It''s just more acceptable.


            And you deserve to be more than acceptable.


