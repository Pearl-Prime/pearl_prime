          content: "When the grief is loud, your body needs something:\n\n**Extended Exhale Breathing.**\n\nThe longer exhale activates your parasympathetic nervous system. It tells your body: *\"We're okay. We can handle this.\"*\n\n---\n\n**The practice:**\n\nBreathe in for 4 counts.\n\nBreathe out for 6 counts.\n\nRepeat 4-5 times.\n\n---\n\nThis isn't about making the grief quiet.\n\nIt's about calming your body so you can think clearly enough to act.\n\nThe grief stays loud. But your body becomes steadier.\n\nSteady enough to move.\n\n---"
