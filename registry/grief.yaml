          content: "Other people have noticed something.\n\nMaybe they haven't said it directly. But you can feel it.\n\nYou're different than you were in those early months. More present. More there.\n\nStill carrying the grief — that's visible too.\n\nBut not drowning in it. Not gone because of it.\n\nYou're here. Grieving and here.\n\nAnd people can feel the difference.\n\n---"
