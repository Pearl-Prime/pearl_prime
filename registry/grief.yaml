        - variant_id: ch09_sec04_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Notice what's different in social situations:\n\n**You're going.**\n\nNot to every thing. Not forcing yourself.\n\nBut to some things. The ones that matter.\n\n---\n\nAnd when you're there, you're actually there.\n\nNot performing okay. Not counting the minutes until you can leave.\n\nJust... present. With the grief as your quiet companion.\n\n---\n\nPeople don't need you to be grief-free.\n\nThey just need you to show up.\n\nAnd you're doing that now.\n\n---"
