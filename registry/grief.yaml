        variants:
        - variant_id: ch08_sec03_exercise_f1
          variant_number: 1
          variant_family: F1
          content: 'When the grief is loud, your body needs something:


            **Extended Exhale Breathing.**


            The longer exhale activates your parasympathetic nervous system. It tells your body: *"We''re okay. We can handle
            this."*


            ---


            **The practice:**


            Breathe in for 4 counts.


            Breathe out for 6 counts.


            Repeat 4-5 times.


            ---


            This isn''t about making the grief quiet.


            It''s about calming your body so you can think clearly enough to act.


            The grief stays loud. But your body becomes steadier.


            Steady enough to move.


            ---'
          fingerprint:
            char_count: 480
            paragraph_count: 11
            sentence_count: 13
          location_tokens: []
        - variant_id: ch08_sec03_exercise_f2
          variant_number: 2
          variant_family: F2
          content: 'When the grief is loud, your body needs something:


            **Physiological Sigh.**


            This is your nervous system''s fastest reset. One double inhale followed by a long exhale.


            ---


            **The practice:**


            Inhale fully through your nose.


            At the top, take one more short sniff — a second inhale on top of the first.


            Now exhale completely through your mouth. Slowly. All the way out.


            Repeat 2-3 times.


            ---


            The double inhale fully inflates your lungs.


            The long exhale activates your body''s calming system immediately.


            Faster than any other breathing technique.


            ---


            The grief is still loud.


            But your body just got the signal: *"We''re safe. We can act."*


            Use it whenever the volume spikes.


            ---'
