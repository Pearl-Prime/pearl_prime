          content: 'Think about how your body registers grief.


            That tightness in your chest. That heaviness behind your eyes. The way your stomach drops when something reminds
            you.


            That''s not malfunction.


            That''s your body tracking something real.


            The grief is doing its job — recording the weight of what changed, noting the size of the hole left behind.


            ---


            *It says: this mattered enough to hurt.*


            That''s not a problem to solve.


            That''s your own internal truth-telling.


            The feeling isn''t blocking you. It''s just reporting.


            You get to decide what to do with the report.


            ---'
