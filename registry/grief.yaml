          variant_number: 1
          variant_family: F1
          content: "Here's the thing no one tells you about grief:\n\nThe struggle to get past it is often worse than the grief itself.\n\nThe grief is heavy, yes. The grief is real.\n\nBut the constant battle—the *\"I shouldn't feel this way still\"* and the *\"when will this end\"* and the *\"what's wrong with me that I'm still carrying this\"*—\n\nThat's what makes it unbearable.\n\nThe grief is weight.\n\nThe struggle is fighting against gravity.\n\n---\n\nWhat if you didn't have to fight?\n\nWhat if the grief could just be there—heavy, present, real—\n\nWithout the additional weight of trying to make it go away?\n\n---"
