      section_02:
        section_id: ch04_sec02
        section: 2
        type: SCENE
        purpose: Proof you've already done it
        scene_type: memory
        min_variants_required: 5
        story_eligible: false
        location_aware: true
        variants:
        - variant_id: ch04_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: "Here's proof you've already done it.\n\nThink about a moment — maybe recently, maybe early on — when you did something while the grief was still present.\n\nYou went somewhere. You said something. You showed up.\n\nAnd the grief was there the whole time.\n\nYou felt the heaviness. You carried the weight. And you still did the thing.\n\nMaybe it wasn't comfortable. Maybe it was hard.\n\nBut you did it.\n\nWhich means:\n\nThe grief doesn't actually stop you.\n\nYou can move while it's there.\n\nYou've proven it.\n\n---"
          fingerprint:
            char_count: 460
            paragraph_count: 11
            sentence_count: 13
          location_tokens: []
        - variant_id: ch04_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: "Remember a time in {location.memory_space} when you did something despite the grief.\n\n\nMaybe you went to work. Or showed up for someone. Or had a conversation that mattered.\n\n\nThe grief was there. You felt it.\n\n\nBut you did it anyway.\n\n\nThat moment proves something important:\n\n\nThe grief doesn't require you to stop.\n\n\nYou can carry it and still move.\n\n\nYou've done it before. You can do it again.\n\n\n---"
          fingerprint:
            char_count: 380
            paragraph_count: 9
            sentence_count: 10
          location_tokens:
          - '{location.memory_space}'
        - variant_id: ch04_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: "Think about a specific moment in {location.memory_space}.\n\n\nThe grief was heavy that day. But something needed doing.\n\n\nSo you did it. Not because you were ready. Not because the grief lifted.\n\n\nBut because life required it.\n\n\nAnd you got through.\n\n\nThat's evidence.\n\n\nEvidence that the waiting isn't actually necessary.\n\n\nEvidence that you can act while carrying the weight.\n\n\n---"
          fingerprint:
            char_count: 350
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.memory_space}'
        - variant_id: ch04_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: "There's a moment you might not have noticed.\n\n\nA moment when you did something with the grief still present.\n\n\nYou went somewhere in {location.memory_space}. You talked to someone. You got through something difficult.\n\n\nAnd the world didn't end.\n\n\nThe grief was there — and you were still capable.\n\n\nThat capability doesn't disappear.\n\n\nIt's still in you. It's just been waiting for permission.\n\n\n---"
          fingerprint:
            char_count: 360
            paragraph_count: 8
            sentence_count: 10
          location_tokens:
          - '{location.memory_space}'
        - variant_id: ch04_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: "I want you to remember something:\n\n\nEvery day since the loss, you've done things while grieving.\n\n\nYou've gotten up. You've eaten. You've spoken to people. You've existed.\n\n\nThe grief was there for all of it.\n\n\nSo this idea that you can't function while grieving — it's not true.\n\n\nYou've been functioning. Just in a smaller way.\n\n\nThe question isn't whether you can act while grieving.\n\n\nThe question is whether you'll let yourself act on bigger things.\n\n\n---"
