          variant_number: 3
          variant_family: F3
          content: 'Sit with this for a moment:


            The person who gets to live — who gets to show up, connect, be present — has been here all along.


            Not waiting somewhere in the future.


            Not locked behind the grief.


            Here. Right now. Carrying the weight.


            ---


            What changes next chapter isn''t the grief.


            It''s the way you relate to it.


            You stop asking the grief for permission.


            You stop waiting for it to lift before you move.


            You start moving while it''s still there — not despite the weight, but with it.


            That shift is subtle.


            But it changes everything downstream.


            What you do next. Where you go. Who you let see you.


            All of it starts with answering yes to the question this chapter asks:


            *Is the person who carries the grief also the person who gets to live?*


            Yes.


            It was always yes.


