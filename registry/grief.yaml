      section_03:
        section_id: ch07_sec03
        section: 3
        type: EXERCISE
        purpose: 3-Second Check-In
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch07_sec03_exercise_f1
          variant_number: 1
          variant_family: F1
          content: 'Here''s a practice for when you''re deciding whether to do something:


            **The 3-Second Check-In.**


            ---


            **Second 1:** Notice where you feel the grief in your body.


            Chest? Stomach? Shoulders? Just notice.


            **Second 2:** Acknowledge it.


            *"The grief is here. I feel it."*


            **Second 3:** Ask one question:


            *"Is this dangerous, or just uncomfortable?"*


            ---


            If it''s dangerous: don''t do it. Protect yourself.


            If it''s just uncomfortable: the grief is not a reason to wait.


            You can act while uncomfortable.


            ---'
          fingerprint:
            char_count: 500
            paragraph_count: 13
            sentence_count: 14
          location_tokens: []
        - variant_id: ch07_sec03_exercise_f2
          variant_number: 2
          variant_family: F2
          content: 'Here''s a practice for when the grief starts to rise before a move:


            **The Body Scan Pause.**


            Not to fix anything. Just to locate yourself before you act.


            ---


            **The practice:**


            Close your eyes for 10 seconds.


            Start at the top of your head. Slowly move your attention downward.


            Notice where there''s tension. Where there''s tightness. Where the grief lives right now.


            Just locate it. Don''t try to change it.


            ---


            Now open your eyes.


            You know where the grief is.


            It''s in a place. Not everywhere.


            ---


            When it has a location, it''s smaller than when it feels like everything.


            And smaller means you can move around it.


            ---'
          fingerprint:
            char_count: 618
            paragraph_count: 14
            sentence_count: 16
          location_tokens: []
        - variant_id: ch07_sec03_exercise_f3
          variant_number: 3
          variant_family: F3
          content: 'When you''re not sure if you can do the thing, try this:


            **The One-Breath Decision.**


            You''re not committing yet. You''re just taking one breath and answering one question.


            ---


            **The practice:**


            Before you decide yes or no, pause.


            Take one full breath — in through the nose, out through the mouth.


            While you breathe in, ask: *"What''s the worst that happens if I try?"*


            While you breathe out, ask: *"What do I lose if I keep waiting?"*


            ---


            You don''t need a perfect answer.


            You just need one moment of honest contact with what''s actually at stake.


            ---


            Most of the time, the try costs less than the wait.


            The breath helps you see that.


            ---'
          fingerprint:
            char_count: 672
            paragraph_count: 14
            sentence_count: 17
          location_tokens: []
