          variant_family: F3
          content: 'The shame that follows a slip is not useful.


            Not because the slip doesn''t matter. It does.


            But because shame is backward-facing. It keeps you in the moment of the slip, replaying it.


            And recovery requires looking forward.


            ---


            So here''s the move:


            Acknowledge the slip once. *"That happened."*


            Skip the replay.


            Ask: *"What''s the smallest next thing I can do?"*


            Do that thing.


            ---


            Shame loops. Action moves.


            You don''t need more self-criticism. You need a next step.


            Find the next step.


