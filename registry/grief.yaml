            Old you would have said: *"I can''t right now."*



            New you says: *"Give me a moment."*



            You take a breath. You feel your feet. You acknowledge: *"This is hard."*



            And then you show up. Not the best version of you. But you.



            Present. Carrying. Doing.



            ---'
