        - variant_id: ch11_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: "There was a story you used to tell about yourself:\n\n\n*\"I'm someone who can't function while grieving.\"*\n\n\n*\"I'm someone who falls apart.\"*\n\n\n*\"I'm someone who has to wait until this passes.\"*\n\n\nThat story felt like the truth.\n\n\nBut look at what you've been doing.\n\n\nCarrying the grief. Making small moves. Showing up.\n\n\nThe story was wrong.\n\n\n---"
          fingerprint:
            char_count: 340
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch11_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: "You used to think grief defined what you could do.\n\n\n*\"Grieving people can't handle much.\"*\n\n\n*\"I need to wait until I'm myself again.\"*\n\n\n*\"I'll participate in life once this passes.\"*\n\n\nBut you've proven that wrong.\n\n\nNot by the grief passing.\n\n\nBy living while it stayed.\n\n\n---"
          fingerprint:
            char_count: 300
            paragraph_count: 8
            sentence_count: 8
          location_tokens: []
        - variant_id: ch11_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: "Remember who you thought you were?\n\n\nSomeone fragile. Someone who needed protecting. Someone who couldn't carry this and also live.\n\n\nLook at who you've become.\n\n\nSomeone who carries it anyway.\n\n\nSomeone who shows up with the weight.\n\n\nSomeone who refuses to let grief make all the decisions.\n\n\nThat's different. That's growth.\n\n\n---"
          fingerprint:
            char_count: 320
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch11_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: "The old identity was built on waiting.\n\n\n*\"I'm the person who can't yet.\"*\n\n\n*\"I'm the person who needs more time.\"*\n\n\n*\"I'm the person who's not ready.\"*\n\n\nThe new identity is built on carrying.\n\n\n*\"I'm the person who does it with the grief still there.\"*\n\n\n*\"I'm the person who shows up heavy.\"*\n\n\n*\"I'm the person who grieves and lives.\"*\n\n\n---"
          fingerprint:
            char_count: 360
            paragraph_count: 9
            sentence_count: 9
