          variant_family: F1
          content: "Here's what this book is about:\n\n**Learning to live while the grief is still there.**\n\nNot getting over it. Not getting through it. Not waiting for it to pass.\n\nJust... living alongside it.\n\nBecause here's what I've learned:\n\nThe grief doesn't have to go away for you to have a life.\n\nIt can stay.\n\nAnd you can still show up. Still connect. Still be present in the world that keeps existing.\n\nNot by pretending you're fine.\n\nNot by pushing through.\n\nBut by learning a different relationship with what you're carrying.\n\n---\n\nThat's what we're going to do together.\n\nNot fix the grief.\n\nNot rush the grief.\n\nJust learn to carry it—while also living.\n\n---"
