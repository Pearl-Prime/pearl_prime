      section_05:
        section_id: ch06_sec05
        section: 5
        type: REFLECTION
        purpose: Danger vs discomfort
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch06_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Here's the distinction you need:\n\n**Danger vs. discomfort.**\n\nCarrying grief while you act is uncomfortable.\n\nIt's heavy. It's noticeable. It might mean tears come at unexpected moments.\n\nBut it's not dangerous.\n\nYou won't fall apart beyond repair.\n\nYou won't break in a way that can't be held.\n\nYou'll just be a person doing a thing while carrying something heavy.\n\n---\n\nThe grief makes you think it's dangerous to act while carrying it.\n\nBut the grief is wrong.\n\nIt's just uncomfortable. And you can do uncomfortable things.\n\n---"
