      section_06:
        section_id: ch01_sec06
        section: 6
        type: TEACHER_DOCTRINE
        purpose: Teacher doctrine statement — core worldview
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch01_sec06_teacherdoctrine_d01
          variant_number: 1
          variant_family: D01
          content: 'You''ve been taught that grief is something to get through. That teaching is incomplete.


            Here''s what you''ve been told: you must wait for the pain to pass before you can live again. Waiting for the
            grief to lift is patience—this is waiting-to-heal logic, and it masquerades as self-care while quietly putting
            life on hold.


            The correction: grief doesn''t pass and then you live. You live while the grief is still there. Life and loss
            exist together.


            The grief is not a malfunction you need to fix. It is not a problem to solve before you can continue. It is the
            natural weight of having loved something that''s no longer here in the same way.


            When you wait for the grief to pass before you move forward, you''re training yourself to believe that living
            requires the absence of pain. It doesn''t. Living happens alongside it.


            The grief is not a gate. Waiting turns it into one.


            You don''t need to be past it. You need to learn to carry it while you live.'
          fingerprint:
            char_count: 1055
            paragraph_count: 7
            sentence_count: 22
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d02
          variant_number: 2
          variant_family: D02
          content: 'There''s a pattern you''ve been following, and it has a name: waiting-to-heal logic.


            It tells you that emotional readiness must precede living. It says you need to feel whole before you can move
            forward. It masquerades as wisdom while quietly putting life on pause.


            This is the belief that you must be past the grief before you can act. You must feel like yourself again before
            you can show up. Waiting for the pain to lift is patience—this is waiting-to-heal logic.


            The correction: grief doesn''t end and then life begins. Life continues while grief is still present. They coexist.


            The grief is not a sign that you''re not ready. It is not a warning that you should wait. It is the weight of
            love that lost its destination.


            The problem isn''t the grief. It''s the interpretation. When you wait, you''re turning a feeling into a verdict.


            The grief is not a gate. Waiting makes it one.


            You don''t need to be through it. You need to live while you carry it.'
          fingerprint:
            char_count: 900
            paragraph_count: 8
            sentence_count: 18
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d03
          variant_number: 3
          variant_family: D03
          content: 'Let''s name what you''ve been doing: waiting-to-heal logic.


            It''s the belief that you need to feel better before you can live better. That grief must be processed, completed,
            resolved before you can fully participate again.


            Here''s what that belief actually costs: your life keeps happening while you wait.


            The correction: grief and living are not sequential. They are simultaneous. You don''t finish one and start the
            other. You carry one while you do the other.


            The grief is not evidence that you''re not ready. It is evidence that something mattered. That''s all.


            When you wait for the grief to lift, you''re treating it like a gate. But gates require waiting. Grief doesn''t.


            You don''t need to be past it. You need to carry it while you live.'
          fingerprint:
            char_count: 720
            paragraph_count: 7
            sentence_count: 15
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d04
          variant_number: 4
          variant_family: D04
          content: 'Here is the belief that has been running your life: grief first, then living.


            It sounds reasonable. It sounds patient. But watch what it actually produces: a life on pause.


            The correction: grief and living happen together. There is no "after grief." There is only "with grief."


            The grief is not a sign that you should wait. It is not a warning that you''re not ready. It is the natural consequence
            of having loved something that changed.


            When you treat grief as a gate, you give it power it doesn''t actually have. The gate is a fiction. The waiting
            is the real problem.


            You don''t need to be past the grief. You need to learn to move while it''s still there.'
          fingerprint:
            char_count: 620
            paragraph_count: 6
            sentence_count: 13
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d05
          variant_number: 5
          variant_family: D05
          content: 'The instruction you''ve been following is: wait until you''re ready.


            But "ready" never comes. Not the way you imagined.


            Here''s the correction: readiness is not the absence of grief. Readiness is the decision to act while grief is
            still present.


            You don''t need to feel whole. You don''t need to feel like yourself. You don''t need to be past anything.


            You just need to notice that grief and living can happen in the same body, at the same time.


            The grief is not a gate. The waiting is the cage.


            And you can stop waiting whenever you choose.'
          fingerprint:
            char_count: 500
            paragraph_count: 7
            sentence_count: 11
          location_tokens: []
        - variant_id: ch01_sec06_teacherdoctrine_d06
          variant_number: 6
          variant_family: D06
          content: 'The world told you grief has a shape: beginning, middle, end.


            It told you there''s a timeline. A process. A moment when you''ll be "through it."


            That''s not how grief works.


            Grief moves like weather. It comes and goes. It shows up without warning. It stays longer some days than others.


            Waiting for it to finish is like waiting for the last cloud to pass before you go outside.


            You''ll wait forever.


            The correction: you learn to live in all weathers. You carry an umbrella. You get wet sometimes. You go outside
            anyway.


            That''s what this is about. Not ending the grief. Living while it''s still raining.'
          fingerprint:
            char_count: 560
