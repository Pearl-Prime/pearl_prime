        - variant_id: ch10_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: "Here's what to remember when you slip:\n\n**The grief isn't linear.**\n\nYou won't get better in a straight line. There will be good days and hard days. Progress and setbacks.\n\n**One day doesn't define the pattern.**\n\nYou've made a hundred small moves. One slip doesn't erase them.\n\n**You know how to recover.**\n\nNotice. Skip the shame. Make one small move. Keep going.\n\n**This is normal.**\n\nEveryone learning to carry grief slips sometimes. It's part of the process.\n\n---\n\nThe slip isn't the story.\n\nWhat you do next is the story.\n\n---"
