  chapter_09:
    chapter: 9
    title: When It Becomes Automatic
    sections:
      section_01:
        section_id: ch09_sec01
        section: 1
        type: HOOK
        purpose: Something shifted
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch09_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: "Something is different.\n\n\nYou might not have noticed it happening.\n\n\nBut somewhere between the first small move and now, something shifted.\n\n\nThe grief is still there. You still feel it.\n\n\nBut the automatic pause — the *\"I can't do this while carrying this\"* — it's getting quieter.\n\n\nYou're starting to move without fighting first.\n\n\nThat's not nothing. That's everything.\n\n\n---"
          fingerprint:
            char_count: 360
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch09_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: "Notice what's happening:\n\n\nYou did a thing. While grieving.\n\n\nAnd then you did another thing. And another.\n\n\nAnd somewhere along the way, the pattern started to shift.\n\n\nNot the grief — the grief is still there.\n\n\nThe pattern. The automatic waiting. The assumption that you can't.\n\n\nThat's what's changing.\n\n\n---"
          fingerprint:
            char_count: 300
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch09_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: "There's a moment when carrying becomes natural.\n\n\nNot easy. Not painless.\n\n\nJust... what you do.\n\n\nYou pick up the weight. You move. You don't stop to ask if you're allowed to.\n\n\nThat's the shift. From deliberate to automatic.\n\n\nFrom *\"Can I do this?\"* to *\"I'm doing this.\"*\n\n\nYou might be closer to that than you think.\n\n\n---"
          fingerprint:
            char_count: 320
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch09_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: "Remember when acting while grieving felt impossible?\n\n\nWhen every small move required a decision, a breath, a deliberate choice?\n\n\nNotice how that's shifting.\n\n\nThe moves are still happening. But they're requiring less effort.\n\n\nNot because the grief got lighter.\n\n\nBecause you got better at carrying it.\n\n\n---"
          fingerprint:
            char_count: 300
            paragraph_count: 7
            sentence_count: 8
          location_tokens: []
        - variant_id: ch09_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: "The shift happens quietly.\n\n\nOne day you realize: you did something without first checking if the grief would allow it.\n\n\nYou just... did it.\n\n\nThe grief was there. It didn't go anywhere.\n\n\nBut you stopped asking its permission.\n\n\nThat's the shift. And it changes everything.\n\n\n---"
          fingerprint:
            char_count: 280
            paragraph_count: 7
            sentence_count: 8
          location_tokens: []
        metadata:
