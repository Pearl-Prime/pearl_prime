            Noticing requires a vantage point. You need to be standing somewhere outside the pattern to see it.


            The fact that you can say *"I slipped"* means you haven''t surrendered to the pattern.


            You still have perspective.


            You can still choose.


            ---


            Collapse looks like: no noticing. Just the pattern, running, with no one watching it.


            A slip looks like: the pattern ran, and you saw it.


            Seeing it is everything.


            ---'
