        variants:
        - variant_id: ch03_sec08_integration_f1
          variant_number: 1
          variant_family: F1
          content: "Here's the question you can't avoid:\n\n**What if the person carrying the grief is also the person who gets to live?**\n\nNot a future version. Not a \"healed\" version. Not a version that somehow got past it.\n\nJust you. Right now. Carrying what you're carrying.\n\n---\n\nThat question might feel impossible.\n\nBut sit with it.\n\nBecause if the answer is yes — if the grieving you is also the living you —\n\nThen the waiting can stop.\n\nAnd something different can begin.\n\n---"
