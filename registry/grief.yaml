          variant_family: F2
          content: 'Picture yourself a month from now.



            In {location.daily_space}. Doing ordinary things.



            The grief is still there. You feel it in the morning. You notice it at odd moments.



            But you also notice: you''re living.



            Connecting. Working. Being present.



            Not despite the grief. Alongside it.



            That''s the future. More of what you''ve built.



