        - variant_id: ch03_sec07_reflection_f3
          variant_number: 3
          variant_family: F3
          content: 'Here''s what the slow erasure feels like from inside:


            Normal.


            That''s what''s so insidious about it.


            You don''t feel yourself disappearing. You just feel... careful. Managed. In control.


            Which is its own kind of relief after the chaos of early grief.


            Control feels good when everything has felt out of control.


            ---


            But at some point, control stops being relief and starts being restriction.


            The thing you''re managing becomes you.


            The careful, curated version becomes the only version available.


            And somewhere underneath it — the real you, the full you, the one who loved someone and lost them and is still
            carrying that — that person hasn''t been seen in a long time.


            Not because they''re gone.


            Because you''ve been protecting them.


            From the very exposure that would let them exist.


            The erasure isn''t the grief''s doing.


            It''s the hiding''s.


