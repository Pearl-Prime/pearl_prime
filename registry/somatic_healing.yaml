        variants:
        - variant_id: ch01_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: |
            Your body has been sending pressure, tension, and sensation signals for a long time. You developed efficient routes around them — push through, go numb, stay busy. Now the signals are louder. Not because something new is breaking, but because the routing is losing efficiency. The tension you keep noticing in your shoulders before dismissing it — that's a signal. The sensation in your chest you push past — that's another. Your body didn't stop transmitting. You became very skilled at not receiving.
                    fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch01_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: |
            Notice a thought that repeats itself in your mind. Follow it back. Who told you
            this was true? How long have you carried it? If you set it down right now, what
            would be different? Not forever. Just for today. What changes when the story stops?
          fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 8
          location_tokens: []
        - variant_id: ch01_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: |
            What are you attached to that you pretend you are not? Look at it without judgment.
            Why do you grip it? Is the thing itself the problem, or the story you built around
            having it? Can you hold it lightly and still have it? What happens then?
          fingerprint:
            char_count: 240
            paragraph_count: 1
            sentence_count: 6
          location_tokens: []
