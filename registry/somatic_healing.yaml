        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: |
            You noticed the headache at noon. By three, it was still there. You finished the report anyway.
            
            You have been doing this for a long time. Noticing something and routing around it. The tight shoulders you carry into the next meeting. The hunger you defer until there is time to address it properly, which is never, so you eat at your desk while reading something else.
            
            This is The Signal. Not pain, not illness — information. The body producing output you learned to file and not open.
            
            At some point you got very good at the routing. Override the signal, complete the task, address the body later. Later is an efficient system. It keeps things moving.
            
            What is harder to see is what the routing cost. Not in damage — in distance. The body sending something and you consistently, reasonably, productively not receiving it.
            
            The signals are still arriving. They have not stopped. This chapter is about learning to read them — not by stopping everything, but by turning back toward what has been trying to reach you.
