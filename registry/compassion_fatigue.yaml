  chapter_04:
    chapter: 4
    title: What Caring Without Reserve Does To The Body
    sections:
      section_01:
        section_id: ch04_sec01
        section: 1
        type: HOOK
        purpose: Mechanism — depletion physiology, the caring capacity ceiling
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch04_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: Your colleague cried in the Zoom call and you held space. Your chest has been holding space for six months
            now—for layoff anxiety, relationship problems, performance review breakdowns. You have nothing left in the tank.
            You're still nodding and making affirmations while your own throat closes.
          fingerprint:
            char_count: 294
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch04_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: Someone needed to listen at 3pm and you listened. Your hands typed supportive words while your shoulders
            carried the weight of another person's crisis. You can't remember the last time someone listened to you. The asymmetry
            is killing you slowly.
          fingerprint:
            char_count: 246
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch04_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: The team member was panicking about their review and you spent an hour reassuring them. Your stomach is
            now tied in knots over your own review that nobody asked about. You became the emotional infrastructure and there's
            nobody to be your foundation.
          fingerprint:
            char_count: 249
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch04_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'Your manager mentioned she''s stressed and you immediately offered to take tasks. Your jaw tightened as
            you volunteered yourself smaller. The pattern repeats: you contract to make room for someone else''s expansion.'
          fingerprint:
            char_count: 213
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch04_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: You've become the person people message after bad news. Your hands move to comfort people constantly. Your
            own bad news sits in your chest and you haven't told anyone because you're tired of being the listener, so you
            become the silent one.
          fingerprint:
            char_count: 240
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: compassion_fatigue
          section_type: HOOK
