      section_05:
        section_id: ch01_sec05
        section: 5
        type: REFLECTION
        purpose: Pattern naming — giving without a refill mechanism
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: |
            There is a real, physical vessel in you that holds the capacity to care — and right now it is empty. Not because the caring stopped, but because the drain ran faster than the refill. You can feel it in the flatness when someone else's pain reaches you and doesn't land the way it once did. That flatness isn't indifference. It's depletion. The vessel tells you what it needs. That signal is information, not failure.
                    fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch01_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: |
            Notice a thought that repeats itself in your mind. Follow it back. Who told you
            this was true? How long have you carried it? If you set it down right now, what
            would be different? Not forever. Just for today. What changes when the story stops?
          fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 8
          location_tokens: []
        - variant_id: ch01_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: |
            What are you attached to that you pretend you are not? Look at it without judgment.
            Why do you grip it? Is the thing itself the problem, or the story you built around
            having it? Can you hold it lightly and still have it? What happens then?
          fingerprint:
            char_count: 240
            paragraph_count: 1
            sentence_count: 6
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: compassion_fatigue
          section_type: REFLECTION
          scene_type: null
          location_tokens: []
