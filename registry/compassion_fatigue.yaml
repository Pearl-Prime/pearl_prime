sections:
  chapter_01:
    chapter: 1
    title: The Caring That Has Nowhere Left To Go
    sections:
      section_01:
        section_id: ch01_sec01
        section: 1
        type: HOOK
        purpose: Recognition — the empty vessel reveal
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: |
            You stayed on the phone an extra forty minutes. Someone else's crisis. Your own dinner went cold. You listened. You asked the right questions. You said the right things. And then you hung up and felt nothing. Not relief. Not warmth. Just — nothing.
            
            That's The Caring. It didn't disappear. It didn't stop mattering. It simply ran out of vessel.
            
            This is what no one tells you about caring deeply for a long time. The capacity isn't infinite. It doesn't replenish automatically overnight the way sleep is supposed to. You can spend years giving from a place that never gets refilled. And one day you pick up the phone, or walk into the room, or hear the story — and the caring is there, somewhere under the surface, but it can't get out.
            
            Not because you stopped loving. Not because you became cold.
            
            Because the vessel is empty.
            
            The empty is real. It is not a flaw. It is not failure. It is what happens when care has been flowing out, for a very long time, with nowhere to flow back in.
          fingerprint:
            char_count: 988
            paragraph_count: 6
            sentence_count: 26
          location_tokens: []
        - variant_id: ch01_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: Someone needed to listen at 3pm and you listened. Your hands typed supportive words while your shoulders
            carried the weight of another person's crisis. You can't remember the last time someone listened to you. The asymmetry
            is killing you slowly.
          fingerprint:
            char_count: 246
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch01_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: The team member was panicking about their review and you spent an hour reassuring them. Your stomach is
            now tied in knots over your own review that nobody asked about. You became the emotional infrastructure and there's
            nobody to be your foundation.
          fingerprint:
            char_count: 249
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch01_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'Your manager mentioned she''s stressed and you immediately offered to take tasks. Your jaw tightened as
            you volunteered yourself smaller. The pattern repeats: you contract to make room for someone else''s expansion.'
