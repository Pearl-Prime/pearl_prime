      section_09:
        section_id: ch02_sec09
        section: 9
        type: INTEGRATION
        purpose: Landing — the old standard, the new cost
        scene_type: null
        min_variants_required: 3
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch02_sec09_integration_f1
          variant_number: 1
          variant_family: F1
          content: |
            This week, return to one moment of clarity you have already had. Not a huge insight.
            A small one. Something you saw clearly without doubt. Sit with it. Remember what
            that clarity felt like in your body. You have already accessed the capacity you need.
            You have done this before. Begin again from there.
          fingerprint:
            char_count: 303
            paragraph_count: 1
            sentence_count: 9
          location_tokens: []
        - variant_id: ch02_sec09_integration_f2
          variant_number: 2
          variant_family: F2
          content: |
            Take one situation that usually triggers you. Not the biggest one. A medium one.
            Next time it happens, pause for three breaths before responding. During those breaths,
            notice what you feel. Do not try to change it. Just notice. This noticing is the
            entire practice. Do this one time. See what happens.
          fingerprint:
            char_count: 302
            paragraph_count: 1
            sentence_count: 10
          location_tokens: []
        - variant_id: ch02_sec09_integration_f3
          variant_number: 3
          variant_family: F3
          content: |
            Sit quietly for five minutes. Do nothing. Fix nothing. Change nothing. When your
            mind pulls away, bring attention back. This is the entire practice. Five minutes.
            One time this week. That is your integration. The rest of the week, continue as
            you normally do. Notice if anything shifts.
          fingerprint:
            char_count: 287
            paragraph_count: 1
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: compassion_fatigue
          section_type: INTEGRATION
          scene_type: null
          location_tokens: []
  chapter_03:
    chapter: 3
    title: The Pattern That Looks Like Dedication
    sections:
      section_01:
        section_id: ch03_sec01
        section: 1
        type: HOOK
        purpose: Pattern — the depletion loop disguised as commitment
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch03_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: Your colleague cried in the Zoom call and you held space. Your chest has been holding space for six months
            now—for layoff anxiety, relationship problems, performance review breakdowns. You have nothing left in the tank.
            You're still nodding and making affirmations while your own throat closes.
          fingerprint:
            char_count: 294
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch03_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: Someone needed to listen at 3pm and you listened. Your hands typed supportive words while your shoulders
            carried the weight of another person's crisis. You can't remember the last time someone listened to you. The asymmetry
            is killing you slowly.
          fingerprint:
            char_count: 246
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch03_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: The team member was panicking about their review and you spent an hour reassuring them. Your stomach is
            now tied in knots over your own review that nobody asked about. You became the emotional infrastructure and there's
            nobody to be your foundation.
          fingerprint:
            char_count: 249
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch03_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'Your manager mentioned she''s stressed and you immediately offered to take tasks. Your jaw tightened as
            you volunteered yourself smaller. The pattern repeats: you contract to make room for someone else''s expansion.'
          fingerprint:
            char_count: 213
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch03_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: You've become the person people message after bad news. Your hands move to comfort people constantly. Your
            own bad news sits in your chest and you haven't told anyone because you're tired of being the listener, so you
            become the silent one.
          fingerprint:
            char_count: 240
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: compassion_fatigue
          section_type: HOOK
          scene_type: null
          location_tokens: []
