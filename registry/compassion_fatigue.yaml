        section: 1
        type: HOOK
        purpose: Identity — person before caregiver
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch11_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: Your colleague cried in the Zoom call and you held space. Your chest has been holding space for six months
            now—for layoff anxiety, relationship problems, performance review breakdowns. You have nothing left in the tank.
            You're still nodding and making affirmations while your own throat closes.
          fingerprint:
            char_count: 294
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch11_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: Someone needed to listen at 3pm and you listened. Your hands typed supportive words while your shoulders
            carried the weight of another person's crisis. You can't remember the last time someone listened to you. The asymmetry
            is killing you slowly.
          fingerprint:
            char_count: 246
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
