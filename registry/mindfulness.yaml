        - variant_id: ch02_sec09_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'Carry this reframe: your full attention is the one thing you can always give. Tomorrow you will be unable to give most of what people want, the certainty, the headcount, the protection from the cycle. But in every conversation you can give the thing that is entirely yours, your undivided presence, and it is rarer and more felt than you think. When someone sits down with you, let that be the gift you offer, not the answer you cannot guarantee but the experience of being genuinely received. It costs nothing but the discipline of staying, and in a flooding half-present world it is, quietly, the most consequential thing you do all day.

            '
