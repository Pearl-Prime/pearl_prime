  chapter_02:
    chapter: 2
    title: How the Mind Got Trained to Race
    sections:
      section_01:
        section_id: ch02_sec01
        section: 1
        type: HOOK
        purpose: mechanism — HOOK
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch02_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'Notice your shoulders. Just that. Do not fix them. You will find they are up near your ears, and they have been there since the 9am, riding every meeting like a held breath you forgot you were holding. This is what a racing mind costs the body it forgot it has. All day your head sprints from agenda to agenda, and your shoulders quietly pay the invoice. The work is not to relax them by force. The work is just to notice they are there, again, attached to you, in this chair, now.

            '
          fingerprint: 9c55a3b41031d037
          location_tokens: []
        - variant_id: ch02_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: 'There is a version of you that gets through Thursday entirely on autopilot, that drives home and cannot recall the drive, that nods through a skip-level and retains nothing, that says yes to a project at 2pm and is genuinely surprised by it at 5. That version is competent. That version ships. And that version is not, by any honest measure, present for a single hour of its own life. You did not choose it. It accrued, meeting by meeting. The good news is that it can un-accrue the same way.

            '
          fingerprint: 6bb994e67f104c4f
          location_tokens: []
        - variant_id: ch02_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: 'Here is a question you have never been asked in a performance review: when, today, were you actually here? Not productive. Not responsive. Here. Eyes on the person, attention undivided, mind not three moves ahead. Most managers, asked this honestly, go quiet and then find a single moment, maybe two. A whole day of effort, and two moments of presence. This is not a failure of character. It is a skill nobody taught you, in an environment engineered to make it impossible. We can teach it.

            '
          fingerprint: 77bb53a4d26d7d91
          location_tokens: []
        - variant_id: ch02_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'The inbox loads and your stomach does something. Forty-one unread, three flagged red, one from your boss with no subject line. Before you have read a single word, your body has already filed a threat report. Notice that the dread arrived before the information did. Your nervous system read the shape of the screen, not the content of it, and braced. You will open them in a moment. But first, just see it: you are responding to a feeling about an inbox, not to an inbox. The two are not the same.

            '
          fingerprint: 621a7d4e138b4d58
          location_tokens: []
        - variant_id: ch02_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: 'Somebody on the all-hands says the word restructure and the room of faces on your screen goes still in a particular way. You feel your own mind leave the building. It is already in the corridor, doing math on your headcount, your budget, the two people you would have to tell. The CEO is still talking. You are not hearing any of it. Later you will need the very information you are missing right now, missing it precisely because you are afraid of it. The fear ran ahead and took your attention with it.

            '
          fingerprint: 8bba1c99b2edc707
