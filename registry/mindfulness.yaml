  chapter_11:
    chapter: 11
    title: Presence Inside a Full Day
    sections:
      section_01:
        section_id: ch11_sec01
        section: 1
        type: HOOK
        purpose: self_relation_shift — HOOK
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch11_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'Your calendar is a wall of fifteen-minute blocks, color-coded, back to back, and you have made a quiet error: you believe the blocks are where your attention lives. They are not. Your attention lives in the seam between them, the four-second gap as one call ends and the next dial tone starts, when your mind is still arguing the last point while a new face is already saying hello. You spend your whole day in those seams, half in, half out. This is a book about the seams.

            '
          fingerprint: 87b2bcfddb3138ef
          location_tokens: []
        - variant_id: ch11_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: 'A direct report is crying, quietly, and you are watching the corner of your own screen where a message preview just slid in. You catch yourself. You drag your eyes back to her face. This is the whole discipline, right here, smaller than a breath: the noticing that you left, and the choosing to come back. Not the staying. Nobody stays. The coming back. You will do it ten thousand times before you are any good at it, and you are already better than you were one sentence ago.

            '
          fingerprint: 38d93265d6b1447b
          location_tokens: []
        - variant_id: ch11_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: 'The QBR slide is up. Forty people on the call, your number on the screen, and your heart is doing the thing it does, a fast flat drumming high in the chest. You hear your own voice start to talk. It is competent. It is fine. And you are nowhere near it. You are three slides ahead, bracing for the question you dread, so braced for the future that you cannot hear the present asking you something simple. Where did you go? You were right here, and then you were gone.

            '
          fingerprint: 7da7cf9fe5675590
          location_tokens: []
        - variant_id: ch11_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'Notice your shoulders. Just that. Do not fix them. You will find they are up near your ears, and they have been there since the 9am, riding every meeting like a held breath you forgot you were holding. This is what a racing mind costs the body it forgot it has. All day your head sprints from agenda to agenda, and your shoulders quietly pay the invoice. The work is not to relax them by force. The work is just to notice they are there, again, attached to you, in this chair, now.

            '
          fingerprint: 9c55a3b41031d037
          location_tokens: []
        - variant_id: ch11_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: 'There is a version of you that gets through Thursday entirely on autopilot, that drives home and cannot recall the drive, that nods through a skip-level and retains nothing, that says yes to a project at 2pm and is genuinely surprised by it at 5. That version is competent. That version ships. And that version is not, by any honest measure, present for a single hour of its own life. You did not choose it. It accrued, meeting by meeting. The good news is that it can un-accrue the same way.

            '
          fingerprint: 6bb994e67f104c4f
          location_tokens: []
        metadata:
          persona: corporate_managers
