      section_02:
        section_id: ch03_sec02
        section: 2
        type: SCENE
        purpose: somatic_legitimacy — SCENE
        scene_type: internal
        min_variants_required: 5
        story_eligible: true
        location_aware: true
        variants:
        - variant_id: ch03_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'Hallway between meetings. {street_name} traffic faint through the window. You have ninety seconds and the old instinct says fill them, check something, manage something. Instead you walk slowly and feel your feet land, heel then sole, heel then sole, the carpet firm beneath. The hallway is just a hallway. Your next meeting is not here yet. For ninety seconds there is only walking, and feet, and the faint traffic, and a quiet that you forgot was allowed.

            '
          fingerprint: 5a173e2dd580de67
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch03_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: 'Your reflection in the dark monitor at 6:50, office half-empty. Nobody needs anything. The quiet is almost loud and your mind, with nothing to manage, starts inventing things to manage. You watch it do that. You do not believe it. You feel your back against the chair, your feet on the floor, the cooled air on your hands. The inventing slows. The quiet stops being loud. You sit in it for one more minute before you stand, and the minute is yours.

            '
          fingerprint: 15c83797d73a430f
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch03_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: 'The doorway of the 10am. One breath, taken on purpose, before you walk in. Feet under you. Shoulders dropping the half-inch they have held since dawn. The room is full of faces and agendas and you are about to enter it, but for this one breath you are only in the doorway, only breathing, only here. Then you step through, and you catch the first agenda item clean, whole, instead of mid-stream. One breath bought one clean minute.

            '
          fingerprint: 2a115d01e6aaa715
