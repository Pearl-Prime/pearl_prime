          content: 'Parked car, garage, engine ticking as it cools. You arrived three minutes ago and you are still in the meeting you held with no one on the drive. The {transit_line} hum is behind you now. You put your hands on the wheel, not to drive, just to feel them. Cold plastic. Your breath fogs nothing because it is warm in here. Forty minutes of imaginary arguments, done. The garage is dim and real and quiet, and you are, finally, only in it.

            '
          fingerprint: 12bea5f401d62764
