          variant_number: 1
          variant_family: F1
          content: 'Tomorrow, pick one doorway. Not all of them, one. Maybe it is the threshold of your 10am, or the seat of your car before you start it, or the second after a Slack ping sounds. Choose a single recurring moment and make it your doorway back, the one place in the day where you will, reliably, take one breath on purpose and feel your feet. You will forget most of the time. That is fine. The point is not to be present all day; that is not available to anyone. The point is to install one small, dependable return, so that at least once in the flood you come home to the room you are actually in. One doorway, practiced badly, beats ten resolutions kept perfectly in your imagination and never once in your day.

            '
          fingerprint: c4c330c7c8c6ccb5
          location_tokens: []
        - variant_id: ch04_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'Carry this into tomorrow: the drift is not the failure, the return is the rep. When you catch your attention three meetings ahead, do not sigh, do not grade yourself, do not narrate your inadequacy. Just note, neutrally, there is a return available, and take it. Bring the beam back to the room, no commentary, no penalty. Then it will drift again, in about four seconds, and you will return again, and that is not you failing at presence; that is you doing presence, which is nothing but this, over and over, the small free kindness of coming back. Count your returns if you must count anything. A day with many returns is a day well practiced, no matter how many drifts came first.

            '
          fingerprint: 002195ba50f0fd0b
          location_tokens: []
        - variant_id: ch04_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'One reframe to carry: between meetings, do not fill the seam, let the last one finish. Tomorrow, in the gap when one call ends and before the next begins, take your hands off the keyboard and let the residue of the room you just left settle and drain. Resist the reflex to cram one more reply into the four seconds. It will feel like waste; it is the opposite. Those few unfilled seconds are what let you arrive at the next room actually present for its opening, which is usually where the real thing gets said. You are not losing time by leaving the seam empty. You are buying the one thing that makes the next meeting worth attending: your actual presence at the start of it.

            '
          fingerprint: b6be58d40d44a1d5
          location_tokens: []
