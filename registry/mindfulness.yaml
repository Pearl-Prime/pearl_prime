      section_02:
        section_id: ch01_sec02
        section: 2
        type: SCENE
        purpose: recognition — SCENE
        scene_type: digital
        min_variants_required: 5
        story_eligible: true
        location_aware: true
        variants:
        - variant_id: ch01_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'The conference room. Glass on three sides. Your reflection faint over the parking lot. The VP is mid-sentence and you are watching your own hands flat on the cool table, and for one beat you are only that, hands on table, breath in chest, the hum of the projector. Then a thought about Q3 yanks you out and you are gone again. But you had the beat. You felt the table. You were, for one second, exactly where your body already was.

            '
          fingerprint: 9d3c7d64f2026e72
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: 'Elevator, sixth floor, doors closing. Eight seconds of nobody needing anything. You watch the numbers count down and feel the small drop in your stomach as the car descends, and notice your shoulders are up by your ears again. You do not force them down. You just see them. Outside, past the lobby glass, a gray {weather_detail} you have not looked at all day. Six. Five. Four. The day waits on the other side of the doors. For now, just the drop, the shoulders, the gray.

            '
          fingerprint: 253b40d5126b2244
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: 'Inbox open. Cursor blinking. Forty-one unread and your jaw has already set, teeth lightly together, a clench you did not order. You feel it now that you are looking. The screen glow is cold. The chair holds you. Nothing in the inbox has actually happened to you yet, and your body is already braced against all of it. You unclench the jaw, one millimeter, on purpose. The unread count does not change. But you are here for it now, instead of nowhere.

            '
          fingerprint: 1c637f8334c94095
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: 'The 1:1. Laptop lid down, on purpose, and the desk looks bare and strange without the glow. Sara is talking. You feel the itch in your right hand, the phantom reach for the keyboard that is not there. You let the itch be an itch. Her voice fills the space the screen used to fill. For the first time in a while you can hear the small catch in it, the thing under the words. The itch fades. You lean in.

            '
          fingerprint: 98657b4e6a816828
          location_tokens:
          - '{location.digital_space}'
        - variant_id: ch01_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: 'Standup, eleven faces in a grid. Someone is giving an update and your attention has slid sideways into your own to-do list. You catch it. You bring it back to the grid, to the actual voice, mid-word. You missed a sentence. You let yourself have missed it instead of covering. The voice keeps going and you are here for the rest of it, the breath in your chest steady, the to-do list quiet for now in its drawer.

            '
          fingerprint: 22939241c3d761b1
          location_tokens:
          - '{location.digital_space}'
        metadata:
