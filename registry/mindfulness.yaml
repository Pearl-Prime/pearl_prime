        - variant_id: ch01_sec04_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'The doorway of the 10am. One breath, taken on purpose, before you walk in. Feet under you. Shoulders dropping the half-inch they have held since dawn. The room is full of faces and agendas and you are about to enter it, but for this one breath you are only in the doorway, only breathing, only here. Then you step through, and you catch the first agenda item clean, whole, instead of mid-stream. One breath bought one clean minute.

            '
          fingerprint: 2a115d01e6aaa715
          location_tokens:
          - '{location.social_gathering}'
        - variant_id: ch01_sec04_scene_f2
          variant_number: 2
          variant_family: F2
          content: 'Video call, your own face in the corner, and you keep watching it, managing it. You click it off. Gone. The relief is immediate and physical, a small loosening behind the eyes. Now there is only the speaker, the actual person, the actual words, and the room of your attention is suddenly roomy with the self-monitoring gone. You feel your shoulders, unwatched, drop on their own. You hear the meeting fuller than you have in months.

            '
