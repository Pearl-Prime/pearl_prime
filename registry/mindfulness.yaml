          content: 'QBR, your slide up, forty muted faces. Your heart is doing the fast flat drumming high in the chest and you feel it now, name it, just a drum, just adrenaline, just the body doing its old thing. You do not fight it. You let it drum and you keep your eyes on the actual question on the actual screen instead of the disaster three slides ahead. The drum is loud. The question is simple. You answer the question.

            '
          fingerprint: 37991a6d31eb5a7c
