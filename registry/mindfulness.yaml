        - variant_id: ch09_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: 'Standup, eleven faces in a grid. Someone is giving an update and your attention has slid sideways into your own to-do list. You catch it. You bring it back to the grid, to the actual voice, mid-word. You missed a sentence. You let yourself have missed it instead of covering. The voice keeps going and you are here for the rest of it, the breath in your chest steady, the to-do list quiet for now in its drawer.

            '
          fingerprint: 22939241c3d761b1
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch09_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: 'Parked car, garage, engine ticking as it cools. You arrived three minutes ago and you are still in the meeting you held with no one on the drive. The {transit_line} hum is behind you now. You put your hands on the wheel, not to drive, just to feel them. Cold plastic. Your breath fogs nothing because it is warm in here. Forty minutes of imaginary arguments, done. The garage is dim and real and quiet, and you are, finally, only in it.

            '
          fingerprint: 12bea5f401d62764
          location_tokens:
          - '{location.daily_space}'
        - variant_id: ch09_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: 'QBR, your slide up, forty muted faces. Your heart is doing the fast flat drumming high in the chest and you feel it now, name it, just a drum, just adrenaline, just the body doing its old thing. You do not fight it. You let it drum and you keep your eyes on the actual question on the actual screen instead of the disaster three slides ahead. The drum is loud. The question is simple. You answer the question.

            '
