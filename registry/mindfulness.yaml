        - variant_id: ch03_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'Marcus sits down for a 1:1 and opens his laptop without thinking, and the screen glow lifts onto his face, and his eyes go to it, and his report keeps talking to the top of his head. He is not rude. He is not lazy. He has simply trained himself, across four hundred meetings, to keep one channel always open to the elsewhere, just in case. The cost is invisible until you name it: nobody in his orbit has had his full attention in months, and he is the last to know.

            '
          fingerprint: 9ed7369840a16979
