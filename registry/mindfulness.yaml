        variants:
        - variant_id: ch10_sec07_integration_f1
          variant_number: 1
          variant_family: F1
          content: 'Tomorrow, notice your shoulders once an hour, and do not fix them. Just check: are they up by your ears, riding the day like a held breath? Almost certainly they are. Do not force them down; simply notice them, let them be where they are, and watch what happens. Often, seen and unfought, they drop the half-inch on their own. The practice here is not relaxation; it is the stranger skill of noticing without immediately conscripting what you notice into a project. Your body has been keeping the score of your scattered attention all day. Checking in with it, gently, without the manager''s reflex to fix, is a small way of returning to the present through the one part of you that is always already in it.

            '
          fingerprint: 681d8bc53c78054b
          location_tokens: []
        - variant_id: ch10_sec07_integration_f2
          variant_number: 2
          variant_family: F2
          content: 'One question to carry into tomorrow, asked once at day''s end: when, today, was I actually here? Not productive, not responsive, here. Eyes on the person, mind not three moves ahead. You may find only one or two such moments, and that is not cause for shame; it is the honest baseline almost everyone shares. The point of the question is not to grade the day but to train the noticing, because a mind that asks where was I present begins, slowly, to catch itself in the act, to be present more often simply because it has started looking. Ask it kindly. The moments you find, however few, are real, and they are the start of more.

            '
          fingerprint: a372fa695d5e3b7c
          location_tokens: []
        - variant_id: ch10_sec07_integration_f3
          variant_number: 3
          variant_family: F3
          content: 'Carry this reframe: your full attention is the one thing you can always give. Tomorrow you will be unable to give most of what people want, the certainty, the headcount, the protection from the cycle. But in every conversation you can give the thing that is entirely yours, your undivided presence, and it is rarer and more felt than you think. When someone sits down with you, let that be the gift you offer, not the answer you cannot guarantee but the experience of being genuinely received. It costs nothing but the discipline of staying, and in a flooding half-present world it is, quietly, the most consequential thing you do all day.

            '
          fingerprint: 863692c989b0ea85
