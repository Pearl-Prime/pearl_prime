          variant_family: F2
          content: 'Try this and notice what happens. Stop reading at the end of this sentence and feel your feet on the floor. You did not feel them a moment ago, though they were there the whole time, carrying you. That is the entire problem in miniature. The present is always available, always free, always running underneath the noise, and your attention almost never visits it. Not because it is hard to find. Because nothing in your day points to it, and a hundred things point away.

            '
          fingerprint: bf886a1cd2f67fc9
