          content: 'Slack pings. Your hand is already moving. You catch it in the air, the reach, halfway to the phone, and you let your hand hover there for one breath. The ping is just a sound. The phone is just a rectangle. In the quarter-second of the hover, you are the one deciding, not the reflex. You let the breath finish. Then you choose, on purpose, and the choosing feels strange and roomy, like a door you did not know was a door.

            '
