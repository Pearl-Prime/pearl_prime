  chapter_06:
    chapter: 6
    title: The Calm Stretches You Already Had
    sections:
      section_01:
        section_id: ch06_sec01
        section: 1
        type: HOOK
        purpose: destabilization — HOOK
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch06_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: 'Somebody on the all-hands says the word restructure and the room of faces on your screen goes still in a particular way. You feel your own mind leave the building. It is already in the corridor, doing math on your headcount, your budget, the two people you would have to tell. The CEO is still talking. You are not hearing any of it. Later you will need the very information you are missing right now, missing it precisely because you are afraid of it. The fear ran ahead and took your attention with it.

            '
          fingerprint: 8bba1c99b2edc707
          location_tokens: []
        - variant_id: ch06_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: 'Marcus sits down for a 1:1 and opens his laptop without thinking, and the screen glow lifts onto his face, and his eyes go to it, and his report keeps talking to the top of his head. He is not rude. He is not lazy. He has simply trained himself, across four hundred meetings, to keep one channel always open to the elsewhere, just in case. The cost is invisible until you name it: nobody in his orbit has had his full attention in months, and he is the last to know.

            '
          fingerprint: 9ed7369840a16979
          location_tokens: []
        - variant_id: ch06_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: 'Try this and notice what happens. Stop reading at the end of this sentence and feel your feet on the floor. You did not feel them a moment ago, though they were there the whole time, carrying you. That is the entire problem in miniature. The present is always available, always free, always running underneath the noise, and your attention almost never visits it. Not because it is hard to find. Because nothing in your day points to it, and a hundred things point away.

            '
          fingerprint: bf886a1cd2f67fc9
          location_tokens: []
        - variant_id: ch06_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: 'By Friday you have the specific exhaustion of someone who has been thinking very hard about everything except what was in front of them. It does not feel like rest is the cure, and it is not. You can sleep ten hours and wake up still scattered, because the scatter is not tiredness. It is a habit of attention, a default the mind reaches for when it is flooded: leave the now, go manage the imagined future, return briefly, leave again. Rest does not touch the habit. Practice does.

            '
          fingerprint: b3ffbf0ad17fab5a
          location_tokens: []
        - variant_id: ch06_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: 'Nadia closes her laptop at 6:40 and the office is half-dark and quiet, and for the first time in eleven hours nobody needs anything from her, and she notices she has no idea how to be in a moment that is not a meeting. The silence is almost loud. Her mind, with nothing to manage, starts manufacturing things to manage. This is worth seeing clearly: the racing did not stop because the day stopped. The racing was never about the day. It is just what an untrained attention does with quiet.

            '
          fingerprint: 9837d07dce7973de
          location_tokens: []
        metadata:
          persona: corporate_managers
          topic: mindfulness
          section_type: HOOK
          scene_type: null
