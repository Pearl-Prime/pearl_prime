          content: 'Standup, eleven faces in a grid. Someone is giving an update and your attention has slid sideways into your own to-do list. You catch it. You bring it back to the grid, to the actual voice, mid-word. You missed a sentence. You let yourself have missed it instead of covering. The voice keeps going and you are here for the rest of it, the breath in your chest steady, the to-do list quiet for now in its drawer.

            '
