      section_02:
        section_id: ch05_sec02
        section: 2
        type: SCENE
        purpose: hidden_belief — SCENE
        scene_type: high-intensity
        min_variants_required: 5
        story_eligible: true
        location_aware: true
        variants:
        - variant_id: ch05_sec02_scene_f1
          variant_number: 1
          variant_family: F1
          content: 'QBR, your slide up, forty muted faces. Your heart is doing the fast flat drumming high in the chest and you feel it now, name it, just a drum, just adrenaline, just the body doing its old thing. You do not fight it. You let it drum and you keep your eyes on the actual question on the actual screen instead of the disaster three slides ahead. The drum is loud. The question is simple. You answer the question.

            '
          fingerprint: 37991a6d31eb5a7c
          location_tokens:
          - '{location.high_stakes_space}'
        - variant_id: ch05_sec02_scene_f2
          variant_number: 2
          variant_family: F2
          content: 'Slack pings. Your hand is already moving. You catch it in the air, the reach, halfway to the phone, and you let your hand hover there for one breath. The ping is just a sound. The phone is just a rectangle. In the quarter-second of the hover, you are the one deciding, not the reflex. You let the breath finish. Then you choose, on purpose, and the choosing feels strange and roomy, like a door you did not know was a door.

            '
          fingerprint: 31e2c50012fd2e98
          location_tokens:
          - '{location.high_stakes_space}'
        - variant_id: ch05_sec02_scene_f3
          variant_number: 3
          variant_family: F3
          content: 'Hallway between meetings. {street_name} traffic faint through the window. You have ninety seconds and the old instinct says fill them, check something, manage something. Instead you walk slowly and feel your feet land, heel then sole, heel then sole, the carpet firm beneath. The hallway is just a hallway. Your next meeting is not here yet. For ninety seconds there is only walking, and feet, and the faint traffic, and a quiet that you forgot was allowed.

            '
          fingerprint: 5a173e2dd580de67
          location_tokens:
          - '{location.high_stakes_space}'
        - variant_id: ch05_sec02_scene_f4
          variant_number: 4
          variant_family: F4
          content: 'Your reflection in the dark monitor at 6:50, office half-empty. Nobody needs anything. The quiet is almost loud and your mind, with nothing to manage, starts inventing things to manage. You watch it do that. You do not believe it. You feel your back against the chair, your feet on the floor, the cooled air on your hands. The inventing slows. The quiet stops being loud. You sit in it for one more minute before you stand, and the minute is yours.

            '
          fingerprint: 15c83797d73a430f
          location_tokens:
          - '{location.high_stakes_space}'
        - variant_id: ch05_sec02_scene_f5
          variant_number: 5
          variant_family: F5
          content: 'The doorway of the 10am. One breath, taken on purpose, before you walk in. Feet under you. Shoulders dropping the half-inch they have held since dawn. The room is full of faces and agendas and you are about to enter it, but for this one breath you are only in the doorway, only breathing, only here. Then you step through, and you catch the first agenda item clean, whole, instead of mid-stream. One breath bought one clean minute.

            '
          fingerprint: 2a115d01e6aaa715
          location_tokens:
          - '{location.high_stakes_space}'
