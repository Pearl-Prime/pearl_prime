      section_09:
        section_id: ch02_sec09
        section: 9
        type: INTEGRATION
        purpose: Landing — the old caution, the new cost
        scene_type: null
        min_variants_required: 3
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch02_sec09_integration_f1
          variant_number: 1
          variant_family: F1
          content: |
            This week, return to one moment of clarity you have already had. Not a huge insight.
            A small one. Something you saw clearly without doubt. Sit with it. Remember what
            that clarity felt like in your body. You have already accessed the capacity you need.
            You have done this before. Begin again from there.
          fingerprint:
            char_count: 303
            paragraph_count: 1
            sentence_count: 9
          location_tokens: []
        - variant_id: ch02_sec09_integration_f2
          variant_number: 2
          variant_family: F2
          content: |
            Take one situation that usually triggers you. Not the biggest one. A medium one.
            Next time it happens, pause for three breaths before responding. During those breaths,
            notice what you feel. Do not try to change it. Just notice. This noticing is the
            entire practice. Do this one time. See what happens.
          fingerprint:
            char_count: 302
            paragraph_count: 1
            sentence_count: 10
          location_tokens: []
        - variant_id: ch02_sec09_integration_f3
          variant_number: 3
          variant_family: F3
          content: |
            Sit quietly for five minutes. Do nothing. Fix nothing. Change nothing. When your
            mind pulls away, bring attention back. This is the entire practice. Five minutes.
            One time this week. That is your integration. The rest of the week, continue as
            you normally do. Notice if anything shifts.
          fingerprint:
            char_count: 287
            paragraph_count: 1
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: courage
          section_type: INTEGRATION
          scene_type: null
          location_tokens: []
  chapter_03:
    chapter: 3
    title: The Pattern That Looks Like Preparation
    sections:
      section_01:
        section_id: ch03_sec01
        section: 1
        type: HOOK
        purpose: Pattern — the delay loop disguised as readiness
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch03_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: The all-hands meeting is happening and you have a real disagreement. Your chest is loud with the thing
            you think needs saying. Your jaw tightens knowing that speaking up might mean becoming the difficult person, the
            one who doesn't go along.
          fingerprint:
            char_count: 241
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch03_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: You're watching a senior leader make a decision you think is wrong. Your hands are in your lap and your
            throat is closing. The gap between knowing something and speaking something is the size of a career.
          fingerprint:
            char_count: 204
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch03_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: The feedback culture says be honest and your stomach knows this is a test. You've seen what happens to
            people who actually are. Your hands stay still and the honest thing stays inside.
          fingerprint:
            char_count: 184
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch03_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: You raised a concern in the meeting and felt the temperature shift. Your shoulders pulled in as if making
            yourself smaller would make the friction disappear. The concern was valid and the response was silence.
          fingerprint:
            char_count: 209
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch03_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: The manager asked for honest feedback and your jaw tightened. You learned last time what honest feedback
            costs. You offer the safe version and watch them nod, satisfied with the lie.
          fingerprint:
            char_count: 182
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: courage
          section_type: HOOK
          scene_type: null
          location_tokens: []
