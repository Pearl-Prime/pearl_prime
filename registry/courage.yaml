    title: The Thing You're Not Doing
    sections:
      section_01:
        section_id: ch01_sec01
        section: 1
        type: HOOK
        purpose: Recognition — the action sitting undone
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: |
            The tab is open. It's been open for eleven days. The application. The email. The form with your name already typed into the first field. You haven't submitted it.
            
            That is The Alarm.
            
            Not laziness. Not indifference. Your body looked at that tab and fired a signal — danger, threat, do not proceed — the same signal it would fire if something wanted to hurt you. Your pulse moved. Your chest tightened. You opened another tab instead.
            
            Here is what's true: you can do the thing. The thing itself is not beyond you. You have the words. You have the qualifications. You have rehearsed the conversation in the car, in the shower, at 2am when you couldn't sleep.
            
            But rehearsing is not the same as saying.
            
            The alarm fires before you even begin. It doesn't wait to see how it goes. It treats the attempt as the threat. The outcome doesn't matter to the alarm — the exposure does.
            
            This chapter is about what the alarm is actually doing. And why it is not the last word.
          fingerprint:
            char_count: 964
            paragraph_count: 7
            sentence_count: 25
          location_tokens: []
        - variant_id: ch01_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: You're watching a senior leader make a decision you think is wrong. Your hands are in your lap and your
            throat is closing. The gap between knowing something and speaking something is the size of a career.
          fingerprint:
            char_count: 204
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch01_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: The feedback culture says be honest and your stomach knows this is a test. You've seen what happens to
            people who actually are. Your hands stay still and the honest thing stays inside.
