        variants:
        - variant_id: ch01_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: |
            When feedback lands, something happens in your chest before you've processed the words. Good outcome: a brief release of pressure. Bad outcome: a tightening that reads as evidence. Your body does this translation automatically — outcome becomes data about your value, instantaneously, without your consent. You don't choose the equation. It runs beneath the thinking. The chest registers the verdict first. What you feel there is the body sorting, not the truth arriving.
                    fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch01_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: |
            Notice a thought that repeats itself in your mind. Follow it back. Who told you
            this was true? How long have you carried it? If you set it down right now, what
            would be different? Not forever. Just for today. What changes when the story stops?
          fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 8
          location_tokens: []
        - variant_id: ch01_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: |
            What are you attached to that you pretend you are not? Look at it without judgment.
            Why do you grip it? Is the thing itself the problem, or the story you built around
            having it? Can you hold it lightly and still have it? What happens then?
          fingerprint:
            char_count: 240
            paragraph_count: 1
            sentence_count: 6
          location_tokens: []
