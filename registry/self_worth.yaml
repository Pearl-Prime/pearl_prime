    title: The Condition You Didn't Know You Set
    sections:
      section_01:
        section_id: ch01_sec01
        section: 1
        type: HOOK
        purpose: Recognition — conditional worth reveal
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: |
            You sent the thing. Now you're checking to see how it landed.
            
            Not obviously. Quietly. You reread the email you sent. You watch for the reply. You notice whether the compliment came — and when it did, you felt it for a moment, and then you needed another one.
            
            Someone said it was good. You thought: they're being kind. Someone said nothing. You thought: they're disappointed.
            
            This is The Condition. You set it without knowing. It goes like this: once I prove it, then I'll be okay. Once the feedback is good. Once the number goes up. Once someone confirms it.
            
            The Condition keeps moving. It has to. If it stayed fixed, you might reach it — and then what would hold the worth in place?
            
            So it shifts. The bar rises. The proof required gets larger. And in between each proof, there is the waiting — the ambient low-grade question of whether you measure up — running quietly under everything you do.
            
            You didn't choose The Condition. It was set early, by systems larger than you. But you've been maintaining it ever since.
            
            This chapter is about seeing The Condition clearly — for the first time.
