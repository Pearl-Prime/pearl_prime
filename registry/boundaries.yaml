      section_05:
        section_id: ch01_sec05
        section: 5
        type: REFLECTION
        purpose: Pattern naming — the cost of the unsaid no
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: |
            When a limit forms in you, you feel it — somewhere in the stomach, the chest, the throat. The limit is real. What happens between feeling it and saying it is also real: the throat closes slightly, the stomach tightens, the body treats the word 'no' as exposure. It fires a threat signal before you've spoken a single word. That signal was learned. It was learned because at some point, limits cost something. The body is remembering. That's what the tightening is — memory, not truth.
                    fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 4
          location_tokens: []
        - variant_id: ch01_sec05_reflection_f2
          variant_number: 2
          variant_family: F2
          content: |
            Notice a thought that repeats itself in your mind. Follow it back. Who told you
            this was true? How long have you carried it? If you set it down right now, what
            would be different? Not forever. Just for today. What changes when the story stops?
          fingerprint:
            char_count: 244
            paragraph_count: 1
            sentence_count: 8
          location_tokens: []
        - variant_id: ch01_sec05_reflection_f3
          variant_number: 3
          variant_family: F3
          content: |
            What are you attached to that you pretend you are not? Look at it without judgment.
            Why do you grip it? Is the thing itself the problem, or the story you built around
            having it? Can you hold it lightly and still have it? What happens then?
          fingerprint:
            char_count: 240
            paragraph_count: 1
            sentence_count: 6
          location_tokens: []
