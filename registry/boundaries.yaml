    title: The No That Never Gets Said
    sections:
      section_01:
        section_id: ch01_sec01
        section: 1
        type: HOOK
        purpose: Recognition — the limit that exists but won't come out
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: |
            You said yes. The word came out before you finished deciding. And the moment it was out you knew — you didn't want to. You had already formed the other word, somewhere between your chest and your throat, and then something rerouted it. Something changed the signal. Yes came out.
            
            That is The Yes. And it happens every time.
            
            The no forms. It forms completely. Your body knows. You know what you don't have capacity for, what you don't want to take on, what will cost you more than it gives. That knowledge is clear and present and real.
            
            And then something happens between the knowing and the saying.
            
            It isn't weakness. It isn't a missing skill. The word is there. The no forms in full. But the body looks at saying it — at the moment of limit, the moment of being seen saying no — and it reads that as exposure. As risk. As something that needs to be avoided the way a real threat gets avoided.
            
            So The Yes comes out instead.
            
            This chapter is about that space. The one between the forming and the saying. What lives there. And why the no keeps not making it through.
