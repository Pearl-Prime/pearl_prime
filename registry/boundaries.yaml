        location_aware: false
        variants:
        - variant_id: ch11_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: You've turned off Slack notifications and your shoulders stay tight. It's 8pm on a Thursday and you're
            waiting for the guilt to arrive—the sense that you should be responsive anyway, that being "offline" is unprofessional.
            Your chest tightens with the knowledge that somewhere a colleague might be trying to reach you.
          fingerprint:
            char_count: 318
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch11_sec01_hook_f2
          variant_number: 2
          variant_family: F2
          content: Your manager sent a message at 11:47pm and you saw it. Your hands started moving toward the keyboard before
            your mind caught up, muscle memory of urgent response. The boundary you set this morning already feels too expensive.
          fingerprint:
            char_count: 225
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch11_sec01_hook_f3
          variant_number: 3
          variant_family: F3
          content: You declined the 6pm meeting and your jaw clenched. Everyone else's calendar said yes. Now you're scanning
            the meeting notes like evidence at a trial, checking if you missed something that would prove you should have
            been there.
          fingerprint:
            char_count: 228
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch11_sec01_hook_f4
          variant_number: 4
          variant_family: F4
          content: The Slack thread continued without you and it felt like a betrayal. You set your working hours to 9-5 but
            the team works 8-9pm anyway. Your stomach knows you're not actually done when you close your laptop.
          fingerprint:
            char_count: 206
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
        - variant_id: ch11_sec01_hook_f5
          variant_number: 5
          variant_family: F5
          content: You told your manager you don't respond after 6pm and watched her expression shift. She didn't argue, just
            said she'd "keep that in mind." Your shoulders haven't relaxed since. That phrase means she'll remember it in
            a negative review.
          fingerprint:
            char_count: 235
            paragraph_count: 1
            sentence_count: 3
          location_tokens: []
