sections:
  chapter_01:
    chapter: 1
    title: The Credential You Keep Calling Fake
    sections:
      section_01:
        section_id: ch01_sec01
        section: 1
        type: HOOK
        purpose: Recognition — the competence gap that isn't there
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch01_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: |
            You leave the title off your introduction. Not by accident. You say your name, you say what you do, and then you add a qualifier — something that keeps the gap open. 'I kind of lead the team.' 'I stumbled into it.' 'I'm still figuring it out.' The credential lands on you and you hand it back.
            
            This is The Credential. Not the degree, not the job, not the promotion. The thing you earned that you cannot hold without flinching.
            
            Here is what is not happening: you are not hiding incompetence. You know the work. You do the work. What you are hiding from is a specific moment — the moment someone looks directly at you and believes what they see. That moment feels like danger.
            
            So you get ahead of it. You prepare more than anyone will ever see. You deflect the compliment before it lands. You name the luck before they can name the skill.
            
            The credential is real. The hiding is what this chapter is about.
          fingerprint:
            char_count: 906
            paragraph_count: 5
            sentence_count: 21
          location_tokens: []
