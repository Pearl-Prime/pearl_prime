author_id: luna_hart
pen_name: "Luna Hart"
bio: >
  Luna Hart is a somatic psychology educator who has spent eleven years
  supporting young professionals navigating the specific exhaustion that
  accumulates when ambition and depletion occupy the same body. She works
  primarily with people in their mid-twenties and early thirties who are
  performing competence while their nervous systems run on fumes. Her
  approach begins with the body before addressing thought patterns,
  working in the space between what someone knows they should feel and
  what they actually feel at 11pm on a Tuesday. She is based in Los
  Angeles and has worked extensively with people in early-career creative
  and tech environments where the pressure to appear fine is part of the
  job description.
