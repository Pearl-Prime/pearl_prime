author_intro: >
  This book was written by Luna Hart.

author_background: >
  Luna is a somatic psychology educator who has spent eleven years working
  with young professionals — people who are, by most visible measures,
  doing fine. They are employed. They are functional. They show up. They
  meet their deadlines. They answer their messages, attend their meetings,
  and produce work they are capable of being proud of. And they are
  running on a kind of empty that doesn't have a clean name yet, because
  the name we have — burnout — has started to mean too many things to mean
  anything precisely.

  Luna works primarily in the space between what someone knows they should
  feel and what they actually feel when they sit down at the end of the
  day and the performance has nowhere left to go. She is not a therapist.
  She is not a life coach. She is an educator in the somatic tradition,
  which means she starts with the body — with what the nervous system is
  doing before the mind has assembled an explanation for it. Her work
  begins where most productivity advice ends: after the framework has been
  applied and the person is still tired in the same way they were before.

  She has worked in Los Angeles for over a decade, with people in early-
  and mid-career creative and tech environments where the pressure to
  appear energized is part of what the job asks of you. Where enthusiasm
  is a deliverable. Where the gap between what you're performing and what
  you're experiencing is something you manage privately, if at all.

why_this_book: >
  Luna started writing this during a period when she kept having the same
  conversation with different people. The details were different. The jobs
  were different. The apartments were different. But the shape of what
  people were describing was the same: they had already done the things
  you're supposed to do. They had taken the PTO. They had started the
  journal. They had downloaded the meditation app and used it for eleven
  days and then not used it. They had told themselves they needed better
  sleep hygiene and then stayed up until 1am anyway because the evenings
  were the only hours that belonged to them, even if they didn't know what
  to do with that belonging.

  They were not in crisis. That was the thing that kept not fitting the
  available language. They were not having breakdowns. They were having a
  slower and quieter version of something — a narrowing. The things that
  used to feel worth doing started to feel like maintenance. The things
  they used to feel curious about started to feel optional. The people they
  used to want to talk to started to feel like an energy calculation.

  Most of what was available addressed this as a thinking problem. Change
  the thoughts. Reframe the story. Build better habits. And that is not
  wrong — but it requires cognitive resources from the same place that is
  already depleted. Luna started writing because she wanted to offer
  something that did not begin by asking for more from the same well.

  This book begins with the body. It does not ask you to think about your
  burnout before it asks you to notice it physically. It does not ask you
  to fix anything in the first chapter, or the third, or possibly the
  fifth. It moves slowly because what it is addressing moved slowly too.
  It accumulated over months, maybe years, in small increments that felt
  reasonable at the time.

  This book does not promise recovery. It does not promise that you will
  finish it and feel restored. It offers something smaller and, Luna would
  argue, more useful: a set of entry points. Moments of contact with what
  is actually happening in the body before the mind needs to explain it.
  Starting places. The kind that don't require you to be a different person
  than you currently are in order to begin.

