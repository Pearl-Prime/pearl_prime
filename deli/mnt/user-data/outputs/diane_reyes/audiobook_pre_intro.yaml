narrator_intro: >
  My name is Clara Mendez, and I will be guiding you through this audiobook.
book_title_line: >
  You are listening to "After the Shift," written by Diane Reyes.
series_line: >
  This audiobook is part of the Phoenix Care Series.
author_intro: >
  This book was written by Diane Reyes.
author_background: >
  Diane is a registered nurse and wellness educator who spent fifteen years
  in acute care before turning her focus to supporting other healthcare
  workers. She works specifically with nurses and frontline clinical staff
  who carry the cognitive weight of the floor into the hours that are
  supposed to be their own. She knows the culture from the inside — the
  charting, the handoffs, the moral arithmetic of a twelve-hour shift.
why_this_book: >
  Diane began writing this after realizing she was still running clinical
  simulations in her head years after leaving the floor — not for any active
  patient, but because her nervous system didn't know the shift was over.
  She had watched the same pattern in colleagues for years. People who were
  precise and competent and could not stop processing when the work stopped.
  The thinking felt like vigilance, not anxiety. That's what made it so hard
  to interrupt. This book does not ask you to think less carefully. It asks
  what it costs when the thinking doesn't know when it's off duty.
