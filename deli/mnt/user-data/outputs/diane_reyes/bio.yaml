author_id: diane_reyes
pen_name: "Diane Reyes"
bio: >
  Diane Reyes is a registered nurse and wellness educator who spent fifteen
  years on the floor of acute care units in urban hospitals before shifting
  her focus to supporting other healthcare workers managing the cognitive
  and emotional load of clinical practice. Her work addresses overthinking
  as it specifically manifests in people who make high-stakes decisions
  continuously and then cannot stop making decisions when the shift ends.
  She works with nurses, nurse practitioners, and frontline clinical staff
  navigating the particular exhaustion of caring for others in environments
  that do not always care back. She understands the culture from the inside:
  the charting, the handoffs, the moral arithmetic of a twelve-hour shift.
  She is based in Chicago.
