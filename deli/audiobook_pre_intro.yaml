author_intro: >
  This book was written by Marcus Cole.
author_background: >
  Marcus is an organizational psychologist and executive coach who has spent
  fourteen years working with senior leaders in New York across finance,
  media, and professional services. His work focuses on the social
  vigilance that accumulates at high levels of organizational responsibility
  — the kind that rarely gets named because naming it conflicts with what
  the role is supposed to look like.
why_this_book: >
  Marcus wrote this after the same pattern repeated itself too many times to
  ignore: leaders who were operating at the top of their fields and spending
  substantial mental energy, before and after every significant interaction,
  calculating how they had landed. Not from insecurity. From the accurate
  understanding that at their level, social miscalculation has real
  consequences. This book does not treat that vigilance as a flaw. It
  examines what carrying it continuously costs over time, and where it
  becomes something worth setting down.
