text: >
  Nadia does the math again. She has done it three times this week, always
  arriving at the same number, which is not a catastrophic number but is a
  number with no slack in it. Rent went up in March. She did not negotiate
  because she did not have the energy to find somewhere else. Her student
  loan payment comes out on the 14th. She has a small buffer that she has
  been careful with for eight months. It is smaller than it was in January.
  She closes the banking app. She opens it again to check something she
  already knows and then closes it.

