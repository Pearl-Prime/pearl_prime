text: >
  Marcus is on a call. The project lead is explaining the revised timeline
  and he is looking at his own hands on the keyboard and they are not
  moving. He has been in this meeting for nineteen minutes and he has not
  typed anything and he is not sure he has understood anything said in the
  last four of those minutes and he cannot make himself care enough to
  scroll back. He types "sounds good" in the chat at the moment that seems
  right. The project lead says his name, asking for his section update.
  He opens the wrong doc. He opens the right one. He reads the first line
  aloud and his voice is steady and he does not recognize the person it
  belongs to.

