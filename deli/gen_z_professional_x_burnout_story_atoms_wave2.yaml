text: >
  Jordan's shoulders have been at the wrong height for so long that he
  notices them now only when someone mentions it. His desk chair is not
  the right height for the desk. He adjusted it once and it drifted back.
  By 2pm every day a specific band of tension runs from the base of his
  skull to his right shoulder blade. He has a note in his phone that says
  "stretching" from November. He opens the note sometimes and does not
  read it. The headache that starts at 3pm is the same headache it was
  last Tuesday. He drinks more water and it doesn't help and he
  drinks more water.

