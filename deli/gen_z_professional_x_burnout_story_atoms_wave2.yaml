text: >
  The group chat has been active for three days about a trip in April. Nine
  messages since yesterday. Nadia has read them all and has not responded to
  any. She wants to go. She has wanted to go since they first talked about
  it in January. The responses required are small — confirm the dates, vote
  on the hotel — but each one requires her to perform enthusiasm she does
  not currently have in a register that will not worry anyone. She drafts a
  response twice and does not send it. She will send something tomorrow.
  She has said this to herself for four days and tomorrow is still the right
  answer because today she just cannot.
