# bio.yaml
---

author_id: kai_nakamura
pen_name: "Kai Nakamura"
bio: >
  Kai Nakamura is an organizational behavior researcher and workplace
  consultant who has spent nine years studying how high-performing
  environments produce exhaustion in people who are doing everything
  correctly. His work sits at the intersection of systems design and
  individual capacity — not in the sense that people are broken systems,
  but in the sense that the environments they operate in were not designed
  with human limits as a parameter. He consults with startups and
  mid-size companies in New York and San Francisco on team structure,
  workload distribution, and what he calls "invisible overhead" — the
  unmeasured cognitive labor that does not appear in any job description
  but accounts for a significant portion of actual depletion. He writes
  for people who already understand the structural causes of burnout and
  are now asking what to do while still inside the structure.
word_count: 142
status: approved

