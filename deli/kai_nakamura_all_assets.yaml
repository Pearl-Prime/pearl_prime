# why_this_book.yaml
---

author_id: kai_nakamura
topic_id: burnout
why_this_book: >
  Kai started writing this after observing a specific pattern across the
  organizations he worked with: the people who burned out fastest were
  not the people doing the most work. They were the people doing the most
  unmeasured work. The meetings that existed to coordinate other meetings.
  The context-switching that no calendar captured. The emotional labor of
  managing upward, managing laterally, and managing their own responses to
  environments that were not, by any formal measure, that bad. Nothing in
  the performance review covered it. Nothing in the job description named
  it. And so the people experiencing it had no vocabulary for what was
  happening that did not require them to sound either dramatic or ungrateful.
  Existing literature on burnout addressed it at the level of symptoms or
  at the level of organizational reform. Neither was useful for someone
  inside the machine trying to get through Thursday. Kai wrote this for
  that person. It does not promise structural change. It offers a way of
  seeing what is actually happening — with enough precision that the person
  inside it can start making decisions that are not purely reactive.
word_count: 197
status: approved

