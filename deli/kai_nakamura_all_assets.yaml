author_background: >
  Kai is an organizational behavior researcher and workplace consultant
  who has spent nine years studying how high-performing environments
  produce exhaustion in people who are functioning exactly as they were
  asked to. His work focuses on what he calls invisible overhead — the
  cognitive and emotional labor that does not appear in any job description,
  is not captured in any performance review, and is not visible to the
  people who design the systems that generate it. He consults with startups
  and mid-size organizations in New York and San Francisco. He writes for
  people who already understand why they are tired and are asking a
  different question: what to do while still inside it.

why_this_book: >
  Kai started writing this after noticing a consistent pattern across
  organizations: the people who burned out fastest were not the people
  doing the most work by any measurable definition. They were the people
  doing the most work that no one was measuring. The meeting that existed
  to coordinate another meeting. The context-switch that no calendar entry
  captured. The calculation of how to raise a concern without it being
  heard as a complaint. The ongoing task of appearing to be managing well
  enough that no one feels the need to check in, because being checked in
  on costs more than it recovers.

  None of this appeared in the job description. None of it was reflected
  in the performance framework. And because it was not named anywhere
  formally, the people experiencing it were left to interpret it privately —
  as weakness, as inefficiency, or as something they should be able to
  resolve by working on their mindset. They had usually already tried
  working on their mindset.

  The existing literature on burnout was useful at a remove. It named the
  phenomenon. It described the organizational conditions that produce it.
  What it did not offer was a usable map for someone in the middle of it,
  on a Tuesday, trying to get through the afternoon without losing
  something they need to keep.

  This book does not argue for systemic reform. It does not offer a program.
  It offers a specific kind of precision — the kind that comes from
  looking at what is actually happening, at the scale of an hour or a day,
  without requiring that it be more dramatic than it is. That precision is
  not the same as a solution. But it is a better starting place than
  confusion.

