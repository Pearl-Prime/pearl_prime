# MICRO-STAKE RESEARCH NOTE
# persona_id: gen_z_professional
# topic_id: burnout
# Last updated: 2026-02-20
# Status: approved

persona_id: gen_z_professional
topic_id: burnout
research_note_by: content_team

primary_environment: >
  Open-plan tech or creative office, startup to mid-size scale. Hot desks or
  assigned seating with full sightlines to teammates and management. No
  private offices at this level. Remote/hybrid common: home environments are
  kitchen tables, shared apartments, or bedroom desks where work and rest
  share the same physical space. Boundaries between work time and personal
  time are nominally self-managed and practically nonexistent.

daily_ritual_sites:
  - Commute (subway or car, phone-based; Slack and email start here)
  - Open office or co-working space (visible, observed, performing presence)
  - Kitchen table or bedroom desk (remote; no spatial separation from rest)
  - Coffee shop or third place (used as a psychological transition space)
  - Gym or walk (often the only scheduled non-screen time)
  - Late-night scroll (not leisure — ambient job market surveillance)

social_hierarchy_signals:
  - Manager's message response time (fast = you matter; delay = read the room)
  - Whether manager includes you in threads you used to be on
  - Who gets pulled into ad-hoc Zoom calls
  - Whose work gets presented to leadership vs. who watches
  - Who gets direct feedback vs. who gets silence
  - Performance review language shifts (strong → meeting expectations)
  - Whether your ideas get credited when someone else presents them

peer_comparison_loops:
  - LinkedIn: peer promotion announcements, new role posts, follower counts
  - Slack: who gets praised publicly in #wins or #shoutouts channels
  - Instagram/TikTok: peers who appear to have made creative work pay
  - Group chats: who gets invited to things outside work
  - Internal visibility: whose name comes up in meetings you're not in

micro_stake_list:
  - Manager stops making eye contact during standup
  - A Slack message left on read by someone who usually responds in minutes
  - Calendar invite for a recurring meeting gets declined without a note
  - Performance review language changes from "strong contributor" to "meeting expectations"
  - Group project Slack thread goes quiet after a message she posted
  - A peer's name gets mentioned in a leadership meeting; hers does not
  - LinkedIn notification that a college friend got promoted to senior role
  - The weekly team email goes out and her project update is summarized in one sentence
  - Manager stops asking follow-up questions in 1:1s
  - An idea she raised in a meeting appears in the next deck credited to the team
  - She is not added to a new project Slack channel that her peers are in
  - Her PTO request gets approved in four seconds without a single follow-up question
  - A colleague she mentors informally gets a stretch assignment she wasn't offered
  - Her camera-off policy on Zoom calls stops being acknowledged and starts being noticed

language_notes:
  native:
    - standup, sync, async, thread, deck, bandwidth, capacity, ping, sidebar
    - touch base, circle back (used with mild irony), greenlit, shipped
    - "low lift", "quick win", "on my radar", "table that", "taking ownership"
    - "I'm slammed", "pulling a lot right now", "trying to stay afloat"
    - "I saw your message" (when they've been avoiding the response)
  avoid:
    - synergy, leverage (verb), paradigm shift, value-add
    - clinical framing: exhaustion disorder, chronic fatigue
    - spiritual framing: alignment, abundance, manifestation (unless persona-specific)
    - anything that sounds like it comes from a 2015 productivity blog

emotional_cost_note: >
  The burnout this persona experiences is not dramatic. It does not arrive
  as a breakdown. It arrives as a narrowing: fewer things seem worth doing,
  fewer responses seem worth sending, fewer people seem worth explaining
  things to. The cost is not felt as crisis — it is felt as the progressive
  dulling of things that used to have edges. Work that felt meaningful starts
  to feel like maintenance. The specific pain is the gap between who they
  thought they were becoming in this job and who they are actually becoming.
  That gap is not named. It is performed around.

