author_id: marcus_cole
topic_id: social_anxiety
why_this_book: >
  Marcus began writing this after a pattern became impossible to ignore: the
  leaders he worked with were, by any external measure, operating at the top
  of their fields. They managed teams, closed deals, and ran rooms. They also
  spent significant mental energy before, during, and after nearly every
  social encounter calculating how they had been received. Not because they
  were insecure in the conventional sense, but because at their level, social
  missteps carry real organizational consequences. The anxiety was rational.
  The cost of carrying it continuously was not. Most available frameworks
  addressed social anxiety as a confidence problem or a cognitive distortion.
  Neither fit the people he worked with. They were confident. They were also
  exhausted from performing it. This book does not address social anxiety as
  a disorder or a weakness to be corrected. It addresses it as a weight that
  accumulates in high-accountability environments and examines what it costs
  over time.
