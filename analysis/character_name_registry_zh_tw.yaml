schema_version: 1
locale: zh-TW
status: 'RESOLVED_2026-07-22_ambiguities_locked_by_operator: see agent/zhtw-name-registry-resolutions-20260722
  for the resolution pass on top of PR #61 -- Dev/Dave kept distinct, Cai locked to 凱伊, Quin merged into
  Quinn, Brien folded into Brian, Suki/Mika/Ren/Hana/Yuna/Noa given override notes, Wei/Mei/Meilin/Chen/Jae
  marked do_not_convert, Farah merged into Farrah'
purpose: Canonical name-locking registry for zh-TW corpus-wide Chinese-character-name house style. Supersedes
  the earlier 5-name draft on agent/zh-tw-glossary-build-20260722 (never reviewed/pushed). This registry
  does NOT itself convert any atom content -- corpus conversion is a separate, later lane.
method: 'Sampled all English-source CANONICAL.txt files under atoms/**  (not locale subdirs), 5,328 files
  total across all engine types (HOOK/STORY/SCENE/PIVOT/TAKEAWAY/REFLECTION/EXERCISE/INTEGRATION/COMPRESSION/THREAD/PERMISSION/etc).
  Extracted capitalized word tokens, cross-referenced against /usr/share/dict/words and /usr/share/dict/propernames
  to suppress common-noun/verb/gerund false positives, then manually reviewed the ranked list by human
  judgment (this pass is NOT a fully automated grep -- abstract nouns like ''Recognition'', ''Embodiment'',
  ''Grief'', ''Crisis'' etc. were dropped by hand). Threshold: name-candidate token recurring in >=5 distinct
  English-source files. This is a high-coverage but not exhaustive sample -- lower-frequency names (appearing
  in <5 files) exist in the corpus and are NOT captured here; a follow-up wave should re-run this scan
  with a lower threshold before the corpus-conversion lane begins.'
