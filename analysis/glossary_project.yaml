    RULING (operator, 2026-07-22): transliterate character names to Chinese phonetic forms,
    not Latin script, corpus-wide. Apply consistently across every HOOK/STORY cold-open
    where the name recurs -- do not let individual translate-zh-tw batches invent their own
    rendering; use the locked Chinese name from the registry every time the source name
