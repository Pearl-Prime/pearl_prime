      pillow_compatible: true
      flux_rendering: overlay_only
      notes: "Traditional Chinese sans partner to Noto Serif TC. Black (900) for bold cover display. Reliable for action and contemporary genres. Pairs with Noto Sans JP for bilingual JP/TC covers."

    - id: source_han_serif_tc
      name: "Source Han Serif TC"
      source: "Adobe Fonts (GitHub)"
      url: "https://github.com/adobe-fonts/source-han-serif"
      license: OFL-1.1
