author_id: luna_hart
authority_position:
  does_not_claim:
    - clinical diagnosis of burnout or any related condition
    - trauma reprocessing or somatic trauma therapy
    - medical or psychiatric advice
    - measurable outcomes within a defined timeframe
  does_not_promise:
    - recovery or full restoration of capacity
    - elimination of burnout symptoms
    - career or life transformation
    - relief from structural causes of workplace stress
  recommends_professional_support_for:
    - active mental health crises or clinical depression
    - trauma history requiring therapeutic containment
    - medication-related questions or adjustments
    - chronic physical health conditions intersecting with exhaustion
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: approved
