text: >
  Maya's standup is in four minutes. She has not opened Slack yet. She knows
  there are 23 unread messages from yesterday afternoon and she is making a
  calculation about which ones she can survive not knowing before 10am. The
  calculation takes longer than it used to. She opens the app, sees the red
  badge, and closes it again. She will open it right before the call so there
  is not enough time to feel anything about what is in it.

