text: >
  There is a new project Slack channel. Sam found it because it appeared in
  the sidebar of a colleague's screen during a shared Zoom. Six people are
  in it. He is not one of them. Two of the six report to him. He does not
  know if this is an administrative oversight or something with a different
  shape. He composes a message to his manager asking about it, then reads
  it back and deletes it. He composes it again using different phrasing.
  He saves it as a draft. By the time he would send it, he needs to be on
  his next call and the draft sits there with no subject line.

