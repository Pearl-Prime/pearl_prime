text: >
  The quarterly performance summary uses the phrase "meeting expectations"
  where the previous one said "strong contributor." Jordan reads it twice.
  The manager is talking through next steps. Jordan nods. The words "meeting
  expectations" are sitting somewhere in the front of his chest. He is
  aware that this is the correct tier. He is also aware that six months ago
  he came to this job because he believed the correct tier would not be
  where he stayed. He smiles at the right moment. He asks one clarifying
  question. He closes the Zoom window and opens a new browser tab.

