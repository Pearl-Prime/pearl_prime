text: >
  It is 7:14pm. Nadia's laptop is still open on the kitchen table of her
  shared apartment. Her roommate is making dinner two feet away and they
  have exchanged six words since 5pm. She is not working on anything
  urgent. She is refreshing her inbox in a way that feels like working.
  Her shoulders are at a height they should not be. She does not notice
  this. She has not noticed this in approximately four months. The dinner
  her roommate made is getting cold because Nadia said she'd eat in a
  minute twenty minutes ago and she meant it both times.

