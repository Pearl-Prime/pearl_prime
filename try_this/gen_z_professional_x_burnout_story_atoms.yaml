text: >
  Zoë's PTO request is approved in the time it takes the page to reload.
  No follow-up. No "hope you get some rest." No question about coverage.
  She stares at the approval email. She had expected a conversation — who
  will handle her projects, can she brief someone, do they need her to
  check in. The question of who will handle her projects is not being asked
  because there is an answer that does not require asking her. She is not
  sure when that became true.

