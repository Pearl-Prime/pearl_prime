text: >
  Aisha's idea is in the deck. She can see it — third slide, second bullet,
  slightly reworded. She did not write that bullet. She is sitting in the
  all-hands watching the VP present it. The VP is using her word, the
  specific word she put in the shared doc two weeks ago: "friction." Nobody
  looks at Aisha. There is no reason anyone would know to look at Aisha.
  She types something in the notes app on her phone and then deletes it.
  The applause for the slide starts and she joins it at the right time and
  the right volume.

