authority_position:
  does_not_claim:
    - clinical diagnosis of social anxiety disorder or any DSM condition
    - psychotherapy or clinical treatment
    - neurological or psychiatric assessment
    - guaranteed behavioral change within a defined period
  does_not_promise:
    - elimination of social anxiety or its symptoms
    - transformation of social identity or interpersonal style
    - career advancement as a result of reading
    - resolution of organizational or interpersonal conflicts
  recommends_professional_support_for:
    - clinical social anxiety disorder or panic disorder
    - depression intersecting with social withdrawal
    - trauma histories involving social harm or humiliation
    - any condition requiring medication management
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: approved
