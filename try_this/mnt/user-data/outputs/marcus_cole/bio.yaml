pen_name: "Marcus Cole"
bio: >
  Marcus Cole is an executive coach and organizational psychologist who has
  spent fourteen years working with senior leaders in finance, media, and
  professional services in New York. His work focuses on the particular
  social anxiety that accumulates at high levels of organizational power —
  the kind that is rarely named because naming it conflicts with the
  identity the role requires. He works with people who are visibly
  succeeding and quietly managing a level of social vigilance that does not
  appear on any performance review. His background includes organizational
  behavior research and twelve years of direct coaching with C-suite and
  VP-level professionals navigating high-stakes relational environments.
  He is based in New York City.
