author_id: diane_reyes
topic_id: overthinking
why_this_book: >
  Diane started writing this during her third year after leaving the floor,
  when she realized she was still running clinical simulations in her head
  at 2am — not for any active patient, but because her nervous system had
  not received the memo that the shift was over. She had watched the same
  thing in colleagues for years: people who were clinically precise, deeply
  competent, and completely unable to stop processing when the work stopped.
  The thinking didn't feel like anxiety. It felt like vigilance. It felt
  like the responsible thing to do. That was what made it so difficult to
  interrupt. Most resources for overthinking addressed rumination as a
  cognitive habit to be corrected. They did not account for what it feels
  like to overthink when overthinking has kept people alive. This book does
  not ask healthcare workers to think less carefully. It asks what happens
  when the thinking doesn't know when it's off duty, and what it costs to
  carry that into the hours that are supposed to belong to something else.
