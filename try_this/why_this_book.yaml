author_id: luna_hart
topic_id: burnout
why_this_book: >
  Luna started writing this after noticing a pattern across the people she
  worked with: they had already read the articles, downloaded the apps, and
  started the gratitude journals. They knew burnout was real. They could
  name it correctly in conversation. And they were still burning. The
  knowledge was not the problem. The problem was that their bodies were
  still registering threat in environments that looked, from the outside,
  like opportunity. Most available support addressed the mind first. It
  offered reframes, perspective shifts, and productivity strategies that
  required the same cognitive load that was already depleted. This book
  does not offer a recovery plan or a framework for doing burnout better.
  It offers a set of small entry points for noticing what is happening in
  the body before it becomes something that requires a longer explanation
  to people who rely on you.
