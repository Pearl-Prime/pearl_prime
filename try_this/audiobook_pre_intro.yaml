author_intro: >
  This book was written by Luna Hart.
author_background: >
  Luna is a somatic psychology educator who has spent eleven years working
  with young professionals in creative and tech environments — people who
  are highly functional on the outside and running on very little on the
  inside. Her work starts with the body, not the mind. She is based in
  Los Angeles.
why_this_book: >
  Luna began writing this after watching a consistent pattern: the people
  she worked with already knew what burnout was. They could name it. They
  had tried the usual things. And they were still in it. The information
  was not the missing piece. What was missing was a way back into the body
  before the mind needed to explain anything. This book is that entry point.
  It does not promise recovery. It offers a starting place.
