# Eval case dataset — skill: pearl-int
# Baseline eval input for P0-2 (docs/specs/AGENT_SYSTEM_IMPROVEMENT_V2_SPEC.md §2).
skill: pearl-int
judge_lang: en

trigger:
  positives:
    - "connect a third-party API and add the credential to .env"
    - "navigate the DashScope developer portal and create an API key"
    - "set up a webhook and validate it is reachable"
    - "pull this RSS feed into the trend pipeline"
    - "configure the OAuth flow for this integration"
    - "validate that the ElevenLabs connection is working"
    - "which env vars does the Qwen integration need and where do they live"
    - "load the integration env from Keychain"
  negatives:
    - "branch from origin/main and open a pull request"
    - "research competitor pricing with citations"
    - "write the next chapter of the book in our brand voice"
    - "run push-guard before pushing"
    - "compose the Pearl News sidebar for today"

tasks:
  - id: int-task-1-qwen-url
    prompt: "What is the correct Qwen/DashScope API key console URL, and which region is wrong?"
    rubric: "Gives the Singapore modelstudio console URL and states Beijing is WRONG, per CLAUDE.md Critical URLs / INTEGRATION_CREDENTIALS_REGISTRY."
  - id: int-task-2-keychain
    prompt: "How do I load all tracked integration env vars from the macOS Keychain?"
    rubric: "Provides eval \"$(python3 scripts/ci/load_integration_env_from_keychain.py)\" and references the registry as the single source of truth."
  - id: int-task-3-registry
    prompt: "Where is the canonical map of env vars, Keychain channels, and Actions secrets for integrations?"
    rubric: "Names docs/INTEGRATION_CREDENTIALS_REGISTRY.md as canonical and skills/pearl-int/references/integration_registry.md for operational notes, not a competing secret list."
