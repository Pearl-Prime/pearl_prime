# Eval case dataset — skill: phoenix-isolation-pr
# Baseline eval input for P0-2 (docs/specs/AGENT_SYSTEM_IMPROVEMENT_V2_SPEC.md §2).
skill: phoenix-isolation-pr
judge_lang: en

trigger:
  positives:
    - "open a small isolation PR off origin/main for these two files"
    - "bootstrap a worktree with LFS-skip and checkout-index for a write scope"
    - "stage explicit paths and run the safety gate vs origin/main cached diff"
    - "produce a single reviewable isolation PR for this write scope"
    - "do the worktree-add then branch then commit then push then gh pr create flow"
    - "Pearl_Conductor subagent: ship this small slice as an isolation PR"
  negatives:
    - "connect the Stripe API and add the secret"
    - "research the wellness market with citations"
    - "run the full bestseller pipeline end to end"
    - "do an hourly repo health check across all branches"
    - "translate the chapter into Korean with Qwen"

tasks:
  - id: iso-task-1-purpose
    prompt: "What is the purpose of this skill and what does WRITE_SCOPE mean here?"
    rubric: "Explains it produces a single reviewable isolation PR for a small WRITE_SCOPE of paths, always based on origin/main, centralizing the worktree->branch->gate->commit->push->PR pattern."
  - id: iso-task-2-safety-gate
    prompt: "Describe the safety gate step before commit."
    rubric: "Describes a cached/staged diff comparison vs origin/main (explicit-path staging) plus preflight, ensuring only intended paths are committed."
  - id: iso-task-3-no-checkout-poison
    prompt: "Why not use a --no-checkout worktree in this repo, and what is the correct setup?"
    rubric: "Notes --no-checkout stages ~57k phantom deletions because origin/main tracks .claude/worktrees/**; correct path is LFS-skip + read-tree + checkout-index (or sparse-checkout set then mandatory reconcile)."
