      - {seq: 7, type: REFLECTION,      scene_type: null,     location_aware: false, story_eligible: true,  min_variants: 3}
      - {seq: 8, type: REFLECTION,      scene_type: null,     location_aware: false, story_eligible: true,  min_variants: 3}
      - {seq: 9, type: INTEGRATION,     scene_type: null,     location_aware: false, story_eligible: false, min_variants: 3}
