# Phoenix Omega V4 — Universal Registry Structural Template
# This is the shared skeleton used by ALL topic registries.
# Replace {TOPIC_ID}, {TOPIC_DISPLAY}, {CH##_*} placeholders at generation time.
# Arc roles match the universal therapeutic arc extracted from grief.yaml.
#
# DO NOT edit this file to add topic-specific content.
# Topic-specific titles → config/registry/topic_chapter_titles.yaml
# Topic-specific vocabulary → config/topic_skins.yaml
# Topic-specific engines   → config/topic_engine_bindings.yaml

meta:
  topic: "{TOPIC_ID}"
  display_name: "{TOPIC_DISPLAY}"
  template_version: "1.0"
  arc: universal_therapeutic_12ch

# Universal arc roles (chapter → arc_role mapping)
arc_roles:
  chapter_01: recognition
  chapter_02: origin
  chapter_03: pattern
  chapter_04: mechanism
  chapter_05: cost
  chapter_06: turning_point
  chapter_07: first_practice
  chapter_08: difficulty
  chapter_09: integration
  chapter_10: relapse
  chapter_11: identity
  chapter_12: forward

# Section layout per chapter (type sequence from grief.yaml)
# Matches the exact grief structure — this IS the universal arc.
chapter_layouts:
  chapter_01:
    arc_role: recognition
    sections:
      - {seq: 1, type: HOOK,            scene_type: null,     location_aware: false, story_eligible: false, min_variants: 5}
      - {seq: 2, type: SCENE,           scene_type: digital,  location_aware: true,  story_eligible: false, min_variants: 5}
      - {seq: 3, type: SCENE,           scene_type: relational, location_aware: true, story_eligible: false, min_variants: 5}
      - {seq: 4, type: SCENE,           scene_type: social,   location_aware: true,  story_eligible: false, min_variants: 5}
      - {seq: 5, type: REFLECTION,      scene_type: null,     location_aware: false, story_eligible: true,  min_variants: 3}
