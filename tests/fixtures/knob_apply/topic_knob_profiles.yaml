          with cheerleading energy (even warm cheerleading) activates the social
          anxiety reader's threat-detection. They are hypervigilant for being judged
          even by a book.
      - knobs: [exercise_density_medium, chapter_range_ch1-7]
        chapter_range: ch1-7
        reason: >
          Spine: "No exposure instruction before chapter 8. The false alarm, shame
          engine, and safety behavior mechanisms must all be fully in place before
          any exposure is introduced. Premature exposure instruction will be
          experienced as 'just do it' advice and will be rejected."
      - knobs: [narrative_structure_myth_killer, mechanism_depth_low]
        chapter_range: all
        reason: >
          myth_killer implies a wrong belief will be corrected with the right
          information. Social anxiety reader knows their belief is technically
          wrong — knowing it's wrong does not stop the alarm. Low mechanism +
          myth-killer structure reads as the generic confidence content this
          reader has already encountered.

    platform_conflicts:
      - platform: [ximalaya, kakao_page, naver_audiobook]
        conflict: Episode format cannot hold 8-chapter mechanism arc before exposure.
        resolution: Do not run social_anxiety in micro or serialized format.
      - platform: [spotify]
        conflict: >
          myth_killer and atomic are in Spotify preferred_structures. Both conflict
          with the spine's patience requirement.
        resolution: Use promise_engine on Spotify. Never myth_killer for social_anxiety.

    research_citations:
      - source: config/spines/social_anxiety_spine.yaml
        field: tone_and_pacing.trust_curve
        finding: >
          "This reader is hypervigilant about being judged — even by a book. Trust
          is built through precision in chapters 1-3: naming their experience so
          accurately that the reader feels recognized rather than evaluated."
        implication: >
          story_density: high is the trust mechanism. The scene-level precision
          must be higher than in other topics because the reader is monitoring
          for evaluation at all times.
      - source: config/spines/social_anxiety_spine.yaml
        field: what_makes_this_family_different
        finding: >
          "The book must not tell the reader they are more interesting than they think.
          That is condescending and will be rejected."
        implication: >
          teacher_presence ceiling. Warm but non-reassuring. The author's job is
          mechanism clarity, not encouragement.
      - source: marketing_deep_research/04_invisible_scripts.yaml
        finding: >
          "I can network and present to hundreds, but a casual dinner party feels
          impossible."
        implication: >
          The competence/context split is load-bearing for story selection. Stories
          must show the reader's relaxed-self, not confirm their performance identity.

    requires_human_decision: []

  # ─────────────────────────────────────────────────────────────────────────────
  sleep_anxiety:
    primary_mechanism: false_alarm
    allowed_engines: [false_alarm, spiral, overwhelm]

    knob_defaults:
      story_density: high
      exercise_density: low
      mechanism_depth: medium
      reflection_depth: medium
      pacing_profile: measured
      emotional_temperature: warm
      practical_vs_contemplative: contemplative_first
      teacher_presence: medium
      spirituality_level: secular
      compression: light
      narrative_structure: promise_engine
      runtime_target: standard

    hard_floors:
      emotional_temperature: warm
      story_density: medium
      pacing_profile: measured
      mechanism_depth: medium           # central paradox must be established early and held

    hard_ceilings:
      exercise_density: medium          # any exercise framed as technique breaks the anti-protocol message
      spirituality_level: secular       # sleep anxiety reader is already in control-seeking mode
      compression: light

    phase_overrides:
      early_book:                       # ch1-4
        exercise_density: none          # spine: all protocols named as the problem before any alternative
        practical_vs_contemplative: contemplative
        mechanism_depth: medium
        teacher_presence: medium
      mid_book:                         # ch5-8
        mechanism_depth: medium
        exercise_density: none
        reflection_depth: medium
      late_book:                        # ch9-12
        exercise_density: low
        practical_vs_contemplative: balanced
        mechanism_depth: low

    dangerous_combinations:
      - knobs: [exercise_density_medium, chapter_range_all]
        chapter_range: all
        reason: >
          Spine: "Almost every tip the reader has already tried is making the alarm
          louder by treating sleep as something to be achieved through performance.
          The book cannot offer a better sleep protocol — it must dismantle the
          protocol orientation entirely." Any exercise that looks like a technique
          re-activates the performance orientation. Medium exercise density is a
          spine violation.
      - knobs: [practical_vs_contemplative_practical, chapter_range_ch1-8]
        chapter_range: ch1-8
        reason: >
          Practical framing before the protocol is named as the problem reads as
          "a better sleep tip." Reader has tried better tips. Practical before
          mechanism is the category error the spine is designed to prevent.
      - knobs: [spirituality_level_moderate, teacher_presence_high]
        chapter_range: ch1-6
        reason: >
          Sleep anxiety reader is in hyper-control mode. Invisible script: "Sleep
          is the one thing I can't optimize my way into, and that terrifies me more
          than actual insomnia." Spiritual + confessional framing before the control
          paradox is named reads as yet another thing to try. Activates optimization
          of the spiritual approach.

    platform_conflicts:
      - platform: [spotify]
        conflict: >
          myth_killer is in Spotify preferred_structures and works for this topic —
          the myth is "effort improves sleep." However myth_killer must still name
          the paradox through ch1-3 before dismantling.
        resolution: >
          Sleep anxiety is one of the more platform-flexible topics. myth_killer
          acceptable on Spotify if paradox naming arrives before the myth-kill move.
      - platform: [audible]
        conflict: >
          "Somatic instructions in audio: work well when they use the imperative
          mood with slow pacing" (bestseller research). Sleep topic is inherently
          audio-native (bedtime listening context).
        resolution: >
          For audible runtime_target, late-book exercise_density: low exercises
          should be somatic and spoken-instruction only. No writing exercises.
          Prioritize slow pacing and deliberate breath-point spacing in prose.

    research_citations:
      - source: docs/BESTSELLER_QUALITY_BENCHMARK_RESEARCH.md
        finding: >
          "Chapter length sweet spot for audiobooks: 18–28 minutes." Sleep anxiety
          is inherently audio-native (bedtime listening context).
        implication: >
          runtime_target: standard. Chapter structure optimized for ~22-minute
          audio chapters. pacing_profile: measured aligns with 18-28 min window.
      - source: config/spines/sleep_anxiety_spine.yaml
        field: what_makes_this_family_different
        finding: >
          "Almost every tip the reader has already tried is making the alarm louder
          by treating sleep as something to be achieved through performance. The book
          cannot offer a better sleep protocol — it must dismantle the protocol
          orientation entirely."
        implication: >
          exercise_density: low ceiling (not medium or high) is the knob implication
          of this spine rule. Any exercise that appears to be a technique re-activates
          the performance trap.
      - source: marketing_deep_research/04_invisible_scripts.yaml
        finding: >
          "I can't sleep because I'm thinking about not being able to sleep, and
          that spiral is the most honest thing about me."
        implication: >
          The spiral engine (catastrophic sleep-thought chains) is active alongside
          the false_alarm engine. mechanism_depth must address both. story_density:
          high anchored in the specific bedtime experience.

    requires_human_decision: []

  # ─────────────────────────────────────────────────────────────────────────────
  financial_anxiety:
    primary_mechanism: overwhelm
    allowed_engines: [overwhelm, spiral, shame]

    knob_defaults:
      story_density: high
      exercise_density: low
      mechanism_depth: medium
      reflection_depth: medium
      pacing_profile: measured
      emotional_temperature: warm
      practical_vs_contemplative: contemplative_first
      teacher_presence: high
      spirituality_level: secular
      compression: none
      narrative_structure: promise_engine
      runtime_target: standard

    hard_floors:
      emotional_temperature: warm
      story_density: medium
      pacing_profile: measured
      exercise_density: none            # through ch07; shame blocks cognition until ch08

    hard_ceilings:
      exercise_density: medium          # book is NOT a personal finance manual
      spirituality_level: secular       # "abundance mindset" is a trust-breaker for avoidant readers
      compression: light
      practical_vs_contemplative: contemplative_first   # through ch07

    phase_overrides:
      early_book:                       # ch1-4
        exercise_density: none
        practical_vs_contemplative: contemplative
        mechanism_depth: medium
      mid_book:                         # ch5-8 — shame and avoidance confrontation
        exercise_density: none          # spine: "reader cannot act while shame is unnamed"
        mechanism_depth: medium
        reflection_depth: medium
      late_book:                        # ch8-12
        exercise_density: low           # one look — the smallest financial act
        practical_vs_contemplative: balanced
        mechanism_depth: low

    dangerous_combinations:
      - knobs: [exercise_density_medium, chapter_range_ch1-7]
        chapter_range: ch1-7
        reason: >
          Spine: "practical_interruption (ch08) must not arrive before shame has
          been held (reader cannot act while shame is unnamed)." Any financial
          exercise before ch08 will be blocked by shame. Reader will close the
          book rather than do an exercise that confirms their worst fear about
          what the numbers will show.
      - knobs: [spirituality_level_moderate, practical_vs_contemplative_balanced]
        chapter_range: ch1-6
        reason: >
          "Abundance mindset" or spiritual money frameworks activate shame in
          avoidant financial readers. If you're avoiding looking at your bank account,
          being told to manifest abundance or trust the universe reads as evidence
          the book doesn't understand the problem.
      - knobs: [mechanism_depth_high, story_density_low]
        chapter_range: ch1-3
        reason: >
          Bestseller research: "Books that assume financial anxiety is purely a
          knowledge problem (information-only approach)" listed under What DOESN'T
          Work. High mechanism without stories reads as the financial literacy
          content the reader is already too ashamed to engage.

    platform_conflicts:
      - platform: [ximalaya, wechat_read, dedao]
        conflict: >
          Chinese platforms have strict content moderation; financial stress/shame
          content may be moderated. Consumer language must be verified for each locale.
        resolution: >
          Flag financial_anxiety for locale-specific content moderation review
          before publishing to zh-CN platforms. zh-TW, zh-HK, zh-SG have different
          moderation requirements.
      - platform: [spotify]
        conflict: myth_killer works for the avoidance narrative but must not arrive before shame is named.
        resolution: Use promise_engine. myth_killer acceptable if shame engine fully named in ch1-5.

    research_citations:
      - source: docs/BESTSELLER_QUALITY_BENCHMARK_RESEARCH.md
        finding: >
          "I Will Teach You to Be Rich: Ch. 1 reframes 'rich' as a personal definition
          rather than a number — immediately reduces shame and widens the reader's
          permission to engage." Common reader praise: "Finally a money book that
          doesn't make me feel stupid."
        implication: >
          story_density: high with shame legitimization first. The #1 bestseller's
          opening move is shame reduction, not financial instruction.
      - source: config/spines/financial_anxiety_spine.yaml
        field: tone_and_pacing.action_timing
        finding: "First practical act arrives at chapter 8 — the one look."
        implication: >
          exercise_density: none floor through ch07.
      - source: config/spines/financial_anxiety_spine.yaml
        field: what_makes_this_family_different
        finding: >
          "This book is not a personal finance manual. Its job is to make the reader
          able to look at their situation clearly — which is the prerequisite for any
          practical action, not a replacement for it."
        implication: >
          exercise_density ceiling: medium (not high). Spirituality ceiling:
          secular — "abundance mindset" is not this book's territory.

    requires_human_decision:
      - knob: practical_vs_contemplative
        question: >
          The one financial act at ch08 ("looking at one number") is both practical
          and contemplative — it is an action that functions as a somatic experiment.
          Should the late-book practical_vs_contemplative be set to balanced or
          practical_first? The distinction matters for whether follow-on financial
          steps are introduced in ch09-12.

  # ─────────────────────────────────────────────────────────────────────────────
  financial_stress:
    primary_mechanism: overwhelm
    allowed_engines: [overwhelm, spiral, shame]

    knob_defaults:
      story_density: high
      exercise_density: low
      mechanism_depth: medium
      reflection_depth: medium
      pacing_profile: measured
      emotional_temperature: warm
      practical_vs_contemplative: contemplative_first
      teacher_presence: high
      spirituality_level: secular
      compression: none
      narrative_structure: promise_engine
      runtime_target: standard

    hard_floors:
      emotional_temperature: warm
      story_density: high               # real hardship reader must feel taken seriously, not soothed
      pacing_profile: measured
      exercise_density: none            # through ch07

    hard_ceilings:
      exercise_density: medium          # this is NOT a personal finance manual
      spirituality_level: secular       # HARDEST CEILING IN THE SET — see below
      compression: none
      practical_vs_contemplative: contemplative_first   # through ch07

    phase_overrides:
      early_book:                       # ch1-4
        exercise_density: none
        practical_vs_contemplative: contemplative
        mechanism_depth: medium
        emotional_temperature: warm
      mid_book:                         # ch5-8 — shame, destabilization, first look
        exercise_density: none          # spine: ch08 is "making the pile finite"
        mechanism_depth: medium
        reflection_depth: medium
      late_book:                        # ch8-12
        exercise_density: low
        practical_vs_contemplative: balanced
        mechanism_depth: low

    dangerous_combinations:
      - knobs: [spirituality_level_moderate, chapter_range_ch1-10]
        chapter_range: ch1-10
        reason: >
          THE MOST DANGEROUS COMBINATION FOR FINANCIAL_STRESS. Consumer language
          file: "I make good money and still live like I'm one mistake away from
          losing everything." Financial stress reader is under REAL pressure.
          Invisible script: "I calculate my financial safety margin like other people
          count sheep." Any spiritual framing ("trust abundance," "money flows to you")
          before the real hardship is fully honored reads as minimization of a real
          threat and immediately destroys trust. This is distinct from financial_anxiety
          where avoidance is the primary pattern — financial_stress readers are often
          highly engaged with their real situation. Spiritual bypass at any point
          before ch11 is a spine violation.
      - knobs: [exercise_density_medium, chapter_range_ch1-7]
        chapter_range: ch1-7
        reason: >
          Spine: "reader cannot act while shame is blocking cognition." Shame must
          be named (ch03) and the overwhelm mechanism explained (ch04) before any
          practical step is possible. Early exercises land as confirmation the book
          doesn't understand the weight of real financial pressure.
      - knobs: [pacing_profile_fast, compression_light]
        chapter_range: all
        reason: >
          Financial stress reader is carrying real weight. Spine: "the pile is
          finite; you can see it" — this realization takes time to build. Fast
          pacing with compression removes the legitimation arc that makes the reader
          feel their real situation has been taken seriously.
      - knobs: [practical_vs_contemplative_practical, chapter_range_ch1-7]
        chapter_range: ch1-7
        reason: >
          Spine: "Emotional regulation is prerequisite to practical action, not a
          supplement to it." This is the defining rule for financial_stress vs.
          financial_anxiety. Neither topic can receive practical steps before
          emotional grounding. Financial_stress has real hardship — practical-first
          framing in early chapters reads as advice that ignores the magnitude of
          the real situation.

    platform_conflicts:
      - platform: [ximalaya, wechat_read, dedao, netease_cloud]
        conflict: >
          Chinese platforms: financial stress content requires locale-specific review.
          Content about debt, bankruptcy, or economic hardship may be moderated
          differently by locale. zh-CN platforms require government compliance review.
        resolution: >
          Flag financial_stress for locale-specific content moderation review for
          all zh-* locales. Do not assume zh-TW and zh-CN have equivalent moderation.
      - platform: [spotify]
        conflict: myth_killer is borderline — the myth (hardship = permanent failure) is real.
        resolution: >
          promise_engine is safer. If myth_killer used, ensure the "myth" is the
          shame-based belief that the situation is unsurvivable, not the real hardship itself.

    research_citations:
      - source: docs/BESTSELLER_QUALITY_BENCHMARK_RESEARCH.md
        finding: >
          "The Psychology of Money: opens with a story contrasting a park attendant
          who became a millionaire through frugal investing with a high-earning
          executive who went bankrupt — immediately establishes: behavior matters
          more than knowledge." "Too abstract if you're in financial crisis and need
          immediate help" listed as Common Reader Complaint.
        implication: >
          Financial_stress reader needs more grounding than Housel's philosophical
          approach. story_density: high must include real-hardship scenes, not
          philosophical vignettes. The Housel model works for financial_anxiety;
          financial_stress needs heavier emotional legitimation.
      - source: marketing_deep_research/04_invisible_scripts.yaml
        finding: >
          "I make good money and still live like I'm one mistake away from losing
          everything." AND "I have money but I don't have security, which is the
          opposite problem but feels just as terrifying."
        implication: >
          SPIRITUALITY_LEVEL CEILING RATIONALE: Both invisible scripts show readers
          with real financial anxiety even when objectively stable. Spiritual money
          frameworks are not merely inaccessible to these readers — they actively
          invalidate the real threat experience. spirituality_level ceiling is
          secular (never moderate or higher) for financial_stress. This is the
          hardest spirituality ceiling of the 15 topics.
      - source: config/spines/financial_stress_spine.yaml
        field: what_makes_this_family_different
        finding: >
          "The hardship is real. This is the structural distinction between
          financial_stress and financial_anxiety: in financial_stress, the threat
          response is proportionate to an actual threat. The book cannot minimize
          the stress or frame it as a perception problem."
        implication: >
          emotional_temperature: warm is the floor — but the warmth cannot be
          soothing-warm (minimizing). It must be bearing-witness-warm. This is the
          distinction: grief_level witness posture for the financial reality.

    requires_human_decision:
      - knob: spirituality_level
        question: >
          spirituality_level: secular is the hard ceiling based on invisible scripts
          and spine rules. However, some financial stress readers use faith communities
          as support systems. Should there be a faith_variant path where spirituality
          is permitted only in the framing of community support (not abundance/manifestation)?
          If so, what is the ceiling value for that variant?

  # ─────────────────────────────────────────────────────────────────────────────
  somatic_healing:
    primary_mechanism: watcher
    allowed_engines: [watcher, overwhelm]

    knob_defaults:
      story_density: high
      exercise_density: low
      mechanism_depth: medium
      reflection_depth: medium
      pacing_profile: slow
      emotional_temperature: warm
      practical_vs_contemplative: contemplative_first
      teacher_presence: medium
      spirituality_level: secular_to_moderate   # wider range than most; body awareness spans traditions
      compression: none
      narrative_structure: van_der_kolk
      runtime_target: standard

    hard_floors:
      pacing_profile: measured          # observation-before-intervention cannot be rushed
      emotional_temperature: warm
      story_density: medium

    hard_ceilings:
      exercise_density: low             # spine: titration is the rule; catharsis-seeking is prohibited
      compression: none                 # observation arc cannot be compressed
      practical_vs_contemplative: contemplative_first   # through ch05
      spirituality_level: moderate      # ceiling; above moderate breaks secular-entry access

    phase_overrides:
      early_book:                       # ch1-5 — observation orientation ONLY
        exercise_density: none
        practical_vs_contemplative: contemplative
        mechanism_depth: light          # watcher mechanism at ch03; before that, observation naming only
        pacing_profile: slow
      mid_book:                         # ch6-9 — first titration; overwhelm handling
        exercise_density: low           # spine: "first practice at ch06: titration of one small sensation"
        practical_vs_contemplative: contemplative_first
        mechanism_depth: medium
      late_book:                        # ch10-12
        exercise_density: low
        practical_vs_contemplative: balanced
        pacing_profile: measured

    dangerous_combinations:
      - knobs: [exercise_density_medium, chapter_range_ch1-5]
        chapter_range: ch1-5
        reason: >
          OBSERVATION_BEFORE_INTERVENTION IS NON-NEGOTIABLE. Spine: "practical_interruption
          (ch06) — must follow destabilization; otherwise it arrives before the reader
          has seen why their current strategies are not working." Any exercise before
          ch06 breaks the observation orientation. For somatic_healing, this is the
          most structurally critical constraint of any topic in the set. Reader who
          has been living at a distance from their body will treat any early exercise
          as another form of doing-at-the-body rather than with it.
      - knobs: [exercise_density_high, chapter_range_all]
        chapter_range: all
        reason: >
          Spine: "The promise of catharsis or dramatic release is explicitly forbidden:
          it sets expectations that this work rarely delivers and can cause readers
          to push themselves past their actual capacity." High exercise density
          implies volume; somatic_healing requires titration (one small sensation
          at a time). High density breaks the titration principle at any chapter.
      - knobs: [narrative_structure_promise_engine, practical_vs_contemplative_balanced]
        chapter_range: ch1-5
        reason: >
          Promise engine implies a transformation destination. Somatic_healing spine:
          "They have not had a breakthrough. They have built a capacity." The promise
          of catharsis or dramatic change breaks the spine's deliberately modest arc.
          Any structure that implies "breakthrough" is dangerous for this topic.
      - knobs: [spirituality_level_high, mechanism_depth_low]
        chapter_range: all
        reason: >
          High spiritual framing without somatic mechanism narrows access to readers
          who already have a spiritual body framework. Somatic_healing serves readers
          "without requiring that any specific pathology be present." High spirituality
          + low mechanism excludes the secular-disconnected reader who is the primary
          entry point.

    platform_conflicts:
      - platform: [audible, apple_books]
        conflict: >
          "Somatic instructions in audio: work well when they use the imperative mood
          with slow pacing" (bestseller research). Somatic_healing is inherently
          audio-compatible if exercises are slow and somatic.
        resolution: >
          Late-book exercise_density: low should use audio-native somatic instructions.
          All exercises must include explicit "pause here" bridges. No written exercises.
          pacing_profile: slow especially during exercise delivery.
      - platform: [ximalaya, kakao_page]
        conflict: >
          Episode format cannot sustain 6-chapter observation arc before first practice.
          Short chapters with implicit payoff requirements break the titration model.
        resolution: Do not run somatic_healing in micro or serialized format.

    research_citations:
      - source: docs/BESTSELLER_QUALITY_BENCHMARK_RESEARCH.md
        finding: >
          "The Body Keeps the Score (van der Kolk, 2014): Ch. 1 names hypervigilance
          somatically before explaining the nervous system → shifts to exercises in
          later chapters." 376+ weeks NYT Paperback Nonfiction bestseller list.
        implication: >
          narrative_structure: van_der_kolk is the direct model for somatic_healing.
          Body-naming before mechanism is the spine's core sequence. Late exercise
          arrival validated by the #1 bestseller in adjacent somatic space.
      - source: config/spines/somatic_healing_spine.yaml
        field: what_makes_this_family_different
        finding: >
          "The observation-before-intervention sequence is non-negotiable: the reader
          who has been pushing through their body's signals for years must first learn
          to listen before they can work with what they hear."
        implication: >
          This is explicitly flagged as non-negotiable in the spine. Any knob
          combination that delivers intervention before observation (exercises before
          ch06) is a prohibited spine violation, not merely a suboptimal choice.
      - source: config/spines/somatic_healing_spine.yaml
        field: tone_and_pacing.action_timing
        finding: "First practice arrives at chapter 6: titration of one small sensation."
        implication: >
          exercise_density: none floor through ch05. Absolute.
      - source: marketing_deep_research/04_invisible_scripts.yaml
        finding: >
          "My body has been keeping score longer than I've been paying attention
          to it." (millennial_women_professionals)
        implication: >
          The body-keeping-score framing (van_der_kolk resonance) is the recognition
          vehicle. story_density: high must include the specific experience of not-
          noticing the body's signals. teacher_presence: medium with author disclosure
          of their own body-distance experience.

    requires_human_decision:
      - knob: spirituality_level
        question: >
          Somatic healing spans traditions — secular body awareness, trauma-informed,
          and contemplative/spiritual (yoga, meditation, Indigenous body practices).
          The spine does not constrain spirituality_level above secular. Should the
          default be secular_to_moderate (current setting), with a persona-driven
          switch? Or should spirituality_level be left as requires_human_decision
          for every somatic_healing catalog entry?
