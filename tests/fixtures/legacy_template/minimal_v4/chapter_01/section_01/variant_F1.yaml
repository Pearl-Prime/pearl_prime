title: Minimal fixture hook
text: |
  This is a compact legacy scaffold used only by unit tests. It names the false alarm
  without demanding that the listener fix anything in the first minute. The body keeps
  language permissive and somatic, inviting attention to breath and jaw before any
  instruction lands. We repeat a few rhythmic sentences so word count crosses a
  minimal threshold for composition checks. The scaffold closes with a gentle pivot
  toward curiosity rather than control. Nothing here claims clinical authority; it is
  fixture prose for deterministic loader tests. If you are reading this in production,
  someone committed a test fixture to the wrong path. Pause, breathe once, and return
  to the spine-guided chapter that matches the listener topic.
