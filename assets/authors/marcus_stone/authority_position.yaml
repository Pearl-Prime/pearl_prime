author_id: marcus_stone
authority_position:
  does_not_claim:
    - clinical diagnosis of burnout, depression, or any DSM condition
    - psychotherapy or occupational health treatment
    - neurological or psychiatric assessment
    - guaranteed recovery from burnout within a defined period
  does_not_promise:
    - elimination of work stress or burnout symptoms
    - restoration of a previous level of energy or output
    - recovery from clinical depression or anxiety disorders
    - fixed timeline for change
  recommends_professional_support_for:
    - clinical burnout or depression affecting daily functioning
    - trauma history requiring therapeutic containment
    - medication-related questions or adjustments
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
