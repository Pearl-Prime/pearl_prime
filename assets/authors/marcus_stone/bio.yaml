author_id: marcus_stone
pen_name: "Marcus Stone"
bio: >
  Marcus Stone spent eleven years as a Wall Street risk analyst, building models to price the chance that things would fall apart, before he recognized he was running the same model on himself around the clock.
  The burnout that took him out was not exhaustion alone; it was a narrative — a relentless internal forecast of failure, shortfall, and exposure that never once switched off.
  When he finally stopped, he applied the only discipline he trusted to the story itself: he examined its structure, traced what it rested on, and asked what was actually there when the forecast was set down.
  His writing draws on Kenjin Roshi's Soto Zen tradition of inquiry, applied to the narratives that drive high performers into collapse.
  He writes for the tech and finance professionals and founders who can quantify any risk except the cost of believing their own commentary.
  His practice is to strip the story from the suffering and ask, plainly, what remains.
  He did not study with Kenjin Roshi in person; he came to the teaching through his books and recorded talks.
