book_title_line: >
  This is the dynamic title line; supplied by the naming engine at compile time. If a runtime title is not supplied, the build fails.
series_line: >
  This audiobook is part of the Clear Seeing Books Series, drawing on Kenjin Roshi's Soto Zen tradition of inquiry — seeing through the story rather than managing it.
author_intro: >
  This book was written by Marcus Stone.
author_background: >
  Marcus spent eleven years as a Wall Street risk analyst before recognizing he was running the same forecast of failure on himself around the clock.
  He writes for tech and finance professionals and founders who can quantify any risk except the cost of believing their own commentary.
  His work applies Kenjin Roshi's Soto Zen tradition of inquiry to the narratives that drive high performers into collapse, stripping the story from the suffering to ask what remains.
why_this_book: >
  Marcus wrote this because the standard advice on burnout treated the symptom and ignored the engine.
  Rest and boundaries never quieted the internal forecast that narrated every hour as a referendum on his survival.
  Kenjin Roshi's Soto Zen inquiry gave him a way to examine the story directly rather than rearrange the conditions around it.
  This book does not promise that the pressure of your work will disappear; it offers a way to see through the story that turns ordinary work into a constant emergency.
  He did not study with Kenjin Roshi in person; he came to the teaching through his books and talks.
