author_id: marcus_stone
topic_id: burnout
why_this_book: >
  Marcus wrote this book because the standard advice on burnout treated the symptom and ignored the engine.
  Rest, boundaries, time off — he had tried all of it, and within days the internal forecast was running again: behind, exposed, about to be found out.
  The burnout was not coming from the workload alone.
  It was coming from a story about the workload that ran continuously, narrating every hour as a referendum on his worth and his survival.
  Kenjin Roshi's Soto Zen inquiry gave him a way to do what no vacation had: to examine the story directly rather than rearrange the conditions around it.
  When he traced the narrative to what it actually rested on and asked what remained without it, the urgency that had been driving him began to lose its grip.
  This book does not treat clinical burnout and it does not promise that the pressure of your work will disappear.
  It will not hand you a recovery schedule or a set of boundaries to enforce.
  It offers a way to see through the story that turns ordinary work into a constant emergency, drawn from a tradition built on exactly that kind of looking.
