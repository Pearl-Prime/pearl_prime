author_id: theo_castellan
pen_name: Theo Castellan
bio: 'Theo Castellan is an ex-corporate lawyer who burned out and rebuilt slowly. Theo writes for managers caught in worth, grief, depletion, and the long way back — not to fix the feeling, but to name
  what it is doing in the body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning
  routine required.'
word_count_target: 120-180
status: draft
