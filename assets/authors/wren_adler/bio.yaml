author_id: wren_adler
pen_name: Wren Adler
bio: 'Wren Adler is a writer who came back from a long depression. Wren writes for young professionals caught in worth, grief, depletion, and the long way back — not to fix the feeling, but to name what
  it is doing in the body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine
  required.'
word_count_target: 120-180
status: draft
