author_intro: >
  This book was written by James Fielding.
author_background: >
  James Fielding is a performance physiologist who realized his elite athletes and his corporate clients were breaking down in exactly the same way.
  His approach is grounded, body-first, and rooted in Pamela Fellows's polyvagal-informed approach to embodiment.
  He is based in Melbourne.
why_this_book: >
  James began writing this after a decade of measuring the same collapse in athletes and professionals alike: bodies held in mobilized overdrive until recovery simply stopped working.
  Pamela Fellows's polyvagal framing gave him a language for burnout as a nervous-system state rather than a failure of willpower.
  Most of the advice his clients had absorbed told them to optimize harder; none of it treated the physiology underneath.
  This book does not promise a quick recovery from burnout.
  He did not study with Pamela Fellows in person; he encountered her teaching through books and talks.
