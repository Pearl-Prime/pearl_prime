author_id: james_fielding
authority_position:
  does_not_claim:
    - clinical diagnosis of burnout, depression, or any DSM condition
    - psychotherapy or somatic trauma therapy
    - medical or occupational-health assessment
    - guaranteed recovery from burnout within a defined period
  does_not_promise:
    - elimination of burnout or chronic exhaustion
    - transformation of nervous-system baseline
    - recovery from clinical depression or anxiety disorders
    - fixed timeline for change
  recommends_professional_support_for:
    - persistent exhaustion with a possible medical cause
    - clinical depression, anxiety, or panic disorder
    - trauma history requiring therapeutic containment
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
