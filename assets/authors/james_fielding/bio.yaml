bio: >
  James Fielding spent fifteen years as a performance physiologist, first with elite athletes and later with the executives and founders who came to him wanting the same edge.
  The longer he worked across both worlds, the harder it became to ignore a single observation: his sprinters and his start-up clients were breaking down in exactly the same way, with the same physiology, on the same downward arc.
  He works with people in high-output fields — technology, finance, professional sport — whose nervous systems have been running in mobilized overdrive for so long that collapse stops looking like an event and starts looking like a baseline.
  His writing draws on Pamela Fellows's polyvagal-informed approach to embodiment, applied to the specific science of perfectionism collapse: how a body that never downshifts eventually loses the capacity to.
  His practice focuses on reading the physiological tells of burnout — the flattened recovery, the disrupted sleep, the effort that no longer produces output — before the body forces the issue.
  He is based in Melbourne.
