author_id: james_fielding
topic_id: burnout
why_this_book: >
  James began writing this after a decade of measuring the same collapse from two different directions: elite athletes whose performance fell off a cliff, and high-achieving professionals who arrived in his office insisting they were simply tired.
  They were not lazy.
  They were not failing.
  Their bodies had been held in a mobilized, high-output state for so long that the system that was meant to restore them had stopped doing its job.
  What Pamela Fellows describes through polyvagal theory gave James a language for what his data had been showing him for years: burnout as a nervous-system state, a body stuck on full effort with no path back to rest.
  Most of the advice his clients had absorbed told them to optimize harder, sleep-hack, or simply push through the wall.
  None of it treated the physiology underneath.
  This book does not diagnose burnout as a medical condition or promise a quick recovery.
  It offers ways to read the body's early signals of depletion and to understand recovery as a nervous-system shift rather than a productivity tactic, drawing on an embodiment tradition that reads the body's exhaustion as real information.
word_count_target: "150-250"
