author_id: mae_rivers
topic_id: grief
why_this_book: >
  Mae began writing this in the second year after the fire season that took two colleagues — when she realized she was no longer the person her family thought she was, and that the change was not grief in any shape she had been taught to recognize.
  It was simpler and more dangerous: a nervous system that had stopped being able to feel grief at all, because the alarm had been on for too long.
  What Ahjan calls the alarm within named what had happened.
  Compassion fatigue is not a moral failure or a lapse of caring.
  It is the body protecting itself from a level of repeated proximity to loss it was never built to absorb.
  The grief does not disappear.
  It moves underground.
  Most writing on compassion fatigue offered self-care strategies that read, to the people Mae knew, as insults.
  This book does not promise that helpers can keep helping forever.
  It offers the body-first recognition that the alarm is real and that the underground grief is reachable, slowly, through practice.
