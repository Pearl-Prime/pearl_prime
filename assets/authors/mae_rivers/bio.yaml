author_id: mae_rivers
pen_name: "Mae Rivers"
bio: >
  Mae Rivers is a former wildfire chaplain who came to the forest tradition after losing colleagues in the field.
  She writes for people who carry other people's grief and have forgotten how to put it down — first responders, healthcare professionals, and anyone whose work is to remain calm in proximity to loss.
  Her writing draws on Ahjan's contemplative-Buddhism framework of the alarm within, applied to the specific physiology of compassion fatigue: a nervous system stuck in proximity to other people's emergencies, with no way to register its own.
  She speaks plainly and slowly — both because the work she writes about earned that pace, and because the people she writes for cannot yet hear anything faster.
  She is based in Bozeman.
word_count_target: 120-180
