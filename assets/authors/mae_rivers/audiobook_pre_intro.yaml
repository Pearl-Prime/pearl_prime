narrator_intro: >
  My name is Pia Calder, and I will be guiding you through this audiobook.
book_title_line: >
  This is the dynamic title line; supplied by the naming engine at compile time. If a runtime title is not supplied, the build fails.
series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to the carried grief of helping professionals.
author_intro: >
  This book was written by Mae Rivers.
author_background: >
  Mae was a wildfire chaplain who came to the forest tradition after losing colleagues.
  She now writes for people who carry other people's grief and forget how to put it down.
  Her writing draws on Ahjan's framework of the alarm within.
  She is based in Bozeman.
why_this_book: >
  Mae began writing this in the second year after the fire season that took two colleagues, when she realized she was no longer the person her family thought she was.
  The change was simpler and more dangerous than grief: a nervous system that had stopped being able to feel grief at all.
  What Ahjan calls the alarm within named what had happened.
  Mae did not study with Ahjan directly; she came to his teaching through books her wildfire team's chaplain shared.
  This book offers a body-first recognition of the underground grief that helping professionals carry.
