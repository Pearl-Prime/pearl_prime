series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to the renunciation a parent can practice without leaving.
author_intro: >
  This book was written by Tara Woodfield.
author_background: >
  Tara lived at a forest monastery for six years before returning to raise her daughter alone, and now writes about renunciation as a practice for parents who cannot leave.
  Her work draws on Ahjan's framework of the alarm within and the older forest-tradition language of letting go.
  She is based in Vermont.
why_this_book: >
  Tara began writing this after the year she came back from the monastery to raise her daughter alone, when she discovered everything she had learned about renunciation needed translating into a life she could not exit.
  What Ahjan calls the alarm within is the architecture under most of what people experience as burnout.
  The body running a continuous alarm cannot put anything down.
  Tara did not study with Ahjan directly; she came to his teaching through forest-tradition books late in her practice.
  This book offers a parent's translation of letting go.
