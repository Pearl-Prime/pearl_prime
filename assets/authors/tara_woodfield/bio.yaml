author_id: tara_woodfield
pen_name: "Tara Woodfield"
bio: >
  Tara Woodfield lived at a forest monastery for six years before returning to raise her daughter.
  She writes about renunciation as a parent — what a person can put down even when they cannot leave.
  Her work focuses on sandwich-generation caregivers and working parents who are not in a position to walk away from anything but who are running out of capacity to keep carrying everything.
  Her writing draws directly on Ahjan's contemplative-Buddhism teaching of the alarm within and the forest tradition's older language of letting go, applied to the practical question of how a parent puts down what cannot be delegated.
  Her tone is unhurried and respectful of the reader's exhaustion; she trusts that a parent who is reading this is reading it because they are already trying.
  She is based in Vermont.
word_count_target: 120-180
