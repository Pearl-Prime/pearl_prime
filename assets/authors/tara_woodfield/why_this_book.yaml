author_id: tara_woodfield
topic_id: boundaries
why_this_book: >
  Tara began writing this after the year she came back from the monastery to raise her daughter alone, when she discovered that everything she had learned about renunciation needed to be re-translated into a context where she could not leave.
  Six years in a forest hall had taught her how to put things down.
  One year as a single parent taught her that renunciation, in a life she could not exit, looked completely different.
  What Ahjan calls the alarm within is the architecture under most of what people experience as burnout and as the inability to hold a boundary.
  The body running a continuous alarm cannot put anything down.
  The forest-tradition practice of letting go starts with recognizing the alarm — not arguing with it.
  Most writing on burnout treated boundaries as a communication strategy.
  Most writing on parenting treated renunciation as guilt-inducing.
  Tara found that neither matched the people she now teaches.
  This book does not promise a sustainable path through caregiving.
  It offers a parent's translation of an older practice — what can be put down, in this life, on this Tuesday.
