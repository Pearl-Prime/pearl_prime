author_id: omar_brooks
pen_name: "Omar Brooks"
bio: >
  Omar Brooks writes about the embodiment of courage — what the body actually does in the moment a person decides to show up while every nerve is telling them to run.
  He came to the work through his own long stretch in the flat, heavy, shut-down place that depression makes of the body, and through the slow realization that the way out ran through the nervous system, not around it.
  He writes for entrepreneurs and corporate managers carrying private weight behind capable exteriors — people expected to lead while their own systems have gone quiet and dim.
  His writing draws on Pamela Fellows's polyvagal-informed approach to embodiment, applied to the physiology of low mood: the shutdown state, the collapse, the way depression lives in posture and breath as much as in thought.
  His practice bridges that science with plain vulnerability — naming the body's heaviness honestly, and finding the small, real movements that signal to the nervous system that it is safe enough to come back online.
  He is based in Chicago.
