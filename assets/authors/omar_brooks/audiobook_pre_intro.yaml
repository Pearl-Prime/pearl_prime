author_intro: >
  This book was written by Omar Brooks.
author_background: >
  Omar Brooks writes about the embodiment of courage — what the body does when you decide to show up even though every nerve is saying run.
  His approach is warm, honest, and rooted in Pamela Fellows's polyvagal-informed approach to embodiment.
  He is based in Chicago.
why_this_book: >
  Omar began writing this from the other side of a long stretch when his own body had gone flat, heavy, and slow.
  Pamela Fellows's polyvagal framing gave him a language for depression as a body in protective shutdown rather than a failure of attitude.
  Most of what he had been offered told him to think differently or push through; almost none of it spoke to the body that had gone offline.
  This book does not promise the lifting of low mood on command.
  He did not study with Pamela Fellows in person; he encountered her teaching through books and talks.
