author_id: omar_brooks
topic_id: depression
why_this_book: >
  Omar began writing this from the other side of a long stretch when his own body had gone flat and heavy and slow, and nothing in his head could argue it back to life.
  He was not weak.
  He was not failing at positivity.
  His nervous system had dropped into a protective shutdown — the body's oldest response to feeling overwhelmed and unsafe — and it could not simply be reasoned out of it.
  What Pamela Fellows describes through polyvagal theory gave Omar a language for what depression had felt like from the inside: not a mood to fix but a body in collapse, breath shallow, posture folded, the system gone dim.
  Most of what he had been offered told him to think differently, count his blessings, or push through.
  Almost none of it spoke to the body that had gone offline.
  This book does not diagnose or treat clinical depression, and it does not promise the lifting of low mood on command.
  It offers honest, body-first ways to recognize the shutdown state and to send the nervous system the small signals of safety that let it slowly come back, drawing on an embodiment tradition that meets the body where it actually is.
