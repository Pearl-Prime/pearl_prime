author_id: omar_brooks
authority_position:
  does_not_claim:
    - clinical diagnosis or treatment of depression or any DSM condition
    - psychotherapy or somatic trauma therapy
    - psychiatric or psychological assessment
    - guaranteed lifting of low mood within a defined period
  does_not_promise:
    - elimination of depression or low mood
    - transformation of nervous-system baseline
    - recovery from clinical depression or mood disorders
    - fixed timeline for change
  recommends_professional_support_for:
    - clinical depression or persistent low mood
    - suicidal thoughts or self-harm
    - trauma history requiring therapeutic containment
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
