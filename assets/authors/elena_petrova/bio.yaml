author_id: elena_petrova
pen_name: Elena Petrova
bio: 'Elena Petrova is a therapist for people caring for parents and children at once. Elena writes for the sandwich generation caught in the anxious, racing mind — not to fix the feeling, but to name what
  it is doing in the body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine
  required.'
word_count_target: 120-180
status: draft
