author_id: ben_archer
topic_id: burnout
why_this_book: >
  Ben began writing this after his own body refused to come down from emergency mode — first between calls, then between shifts, then not at all — and he realized burnout was not in his head but in his physiology.
  He was not weak.
  He was not bad at the job.
  His nervous system had spent years learning to mobilize hard and fast for crises, and it had simply lost the ability to recognize when the crisis was over and rest was allowed.
  What Pamela Fellows describes through polyvagal theory gave Ben a language for what had happened to him: burnout as a body stuck in a threat-response state, braced for an emergency that is no longer there.
  Most of what high-strain workers are told about burnout treats it as a scheduling problem — take leave, set limits, recover on the weekend.
  Almost none of it addresses a nervous system that no longer knows how to stand down.
  This book does not diagnose burnout as a medical condition or promise a fast recovery.
  It offers ways to recognize the body's lingering emergency state and to give the nervous system the signals of safety it needs to downshift into genuine rest, drawing on an embodiment tradition that treats the body's exhaustion as real and addressable.
