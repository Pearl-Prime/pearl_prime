author_id: ben_archer
pen_name: "Ben Archer"
bio: >
  Ben Archer spent eleven years as a paramedic, a job that trains a body to mobilize for emergencies on command — and never quite tells it how to stand down afterward.
  When his own nervous system stopped switching off between calls, and then between shifts, and finally at all, he left the ambulance and went looking for the physiology of what had happened to him.
  He now works as a somatic researcher, writing for people in high-strain fields — technology, finance, frontline response — whose bodies have stayed locked in emergency mode long after the emergencies ended.
  His writing draws on Pamela Fellows's polyvagal-informed approach to embodiment, applied to the body's threat-response physiology: the mobilization that keeps people alive in a crisis and quietly erodes them when it never resolves into rest.
  His practice is precise and physiological: helping people read the signs that their bodies are still braced for a call that is not coming, and learning to give the nervous system the cues of safety it needs to finally downshift.
  He is based in Manchester.
