author_intro: >
  This book was written by Ben Archer.
author_background: >
  Ben Archer is a former paramedic turned somatic researcher who writes about the body's threat-response physiology — what happens when a nervous system stays locked in emergency mode long after the emergency ends.
  His approach is precise, body-first, and rooted in Pamela Fellows's polyvagal-informed approach to embodiment.
  He is based in Manchester.
why_this_book: >
  Ben began writing this after his own body refused to come down from emergency mode between calls, between shifts, and finally at all.
  Pamela Fellows's polyvagal framing gave him a language for burnout as a body stuck in a threat-response state rather than a scheduling problem.
  Most of what high-strain workers are told about burnout treats it as a matter of taking leave; almost none of it addresses a nervous system that no longer knows how to stand down.
  This book does not promise a fast recovery from burnout.
  He did not study with Pamela Fellows in person; he encountered her teaching through books and talks.
