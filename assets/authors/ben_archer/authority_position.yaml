author_id: ben_archer
authority_position:
  does_not_claim:
    - clinical diagnosis of burnout, PTSD, or any DSM condition
    - psychotherapy or somatic trauma therapy
    - medical or occupational-health assessment
    - guaranteed recovery from burnout within a defined period
  does_not_promise:
    - elimination of burnout or chronic stress activation
    - transformation of nervous-system baseline
    - recovery from post-traumatic stress or clinical anxiety
    - fixed timeline for change
  recommends_professional_support_for:
    - post-traumatic stress or trauma requiring therapeutic containment
    - persistent exhaustion with a possible medical cause
    - clinical anxiety, depression, or panic disorder
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
