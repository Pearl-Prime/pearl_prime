author_id: daniel_voss
topic_id: burnout
why_this_book: >
  Daniel began writing this after a decade of research on threat-detection systems and another half-decade of corporate consulting.
  The same pattern kept showing up across both: capable people, often at the top of their fields, whose bodies were running a continuous low-grade emergency they could not name.
  They refreshed Slack at midnight.
  They rehearsed conversations that had already ended.
  They felt one mistake away from exposure, regardless of how decorated their CVs were.
  What Ahjan calls the alarm within mapped cleanly onto what Daniel had been measuring in the lab.
  The framework gave him a way to name burnout without medicalizing it and without dismissing it as a productivity problem.
  Most existing writing offered either clinical pathology or hustle-culture reframes.
  Neither fit the people Daniel was watching.
  This book does not promise to eliminate burnout.
  It offers the science of why the alarm fires when there is nothing to escape, alongside the contemplative practices that have addressed that fire long before neuroscience could measure it.
word_count_target: 150-250
