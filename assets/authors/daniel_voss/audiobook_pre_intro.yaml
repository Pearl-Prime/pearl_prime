series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism alarm framework to the science of burnout.
author_intro: >
  This book was written by Daniel Voss.
author_background: >
  Daniel is a behavioral neuroscientist who left academia to work with high-performing professionals on the alarm patterns their careers reward.
  He bridges contemplative-neuroscience research with Ahjan's framework of the alarm within.
  He is based in Cambridge, Massachusetts.
why_this_book: >
  Daniel began writing this after a decade of research on threat-detection systems and another half-decade of corporate work.
  The same pattern repeated: capable people running a continuous low-grade emergency they could not name.
  What Ahjan calls the alarm within mapped onto what Daniel had been measuring.
  He did not train under Ahjan; he encountered his teaching through books and talks.
  This book does not promise to eliminate burnout.
  It offers the science of why the alarm fires when there is nothing to escape, alongside the contemplative practices that addressed that fire long before neuroscience could measure it.
