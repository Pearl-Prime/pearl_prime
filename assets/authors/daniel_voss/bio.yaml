author_id: daniel_voss
pen_name: "Daniel Voss"
bio: >
  Daniel Voss is a behavioral neuroscientist who left academic research after realizing the literature on alarm systems was more useful outside the lab than inside it.
  He works with high-performing professionals in tech, finance, and corporate management — people whose careers reward the very nervous-system patterns that produce burnout and imposter syndrome.
  His writing translates contemplative-neuroscience research into practical terms, drawing on Ahjan's framework of the alarm within to explain why the body keeps insisting on threat in environments that look — on paper — like opportunity.
  His approach refuses the false choice between clinical pathologizing and motivational reframing; instead, it offers grounded explanatory clarity for readers who want to understand the mechanism before they trust the practice.
  He is based in Cambridge, Massachusetts.
