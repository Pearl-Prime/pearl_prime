author_id: suki_moreno
pen_name: "Suki Moreno"
bio: >
  Suki Moreno is an embodiment researcher who studies the somatic signature of financial stress — the precise, repeatable things that happen in the body when a person opens a banking app or hears the word "money."
  She came to the subject sideways, expecting to study cognition, and kept finding the story written in the body first: the shallow breath, the gripped stomach, the bracing that arrived before any conscious thought about the numbers.
  She writes for millennial women professionals and working parents whose financial anxiety has quietly become a physiological state, running in the background of every decision they make.
  Her writing draws on Pamela Fellows's polyvagal-informed approach to embodiment, applied to the nervous-system patterns underneath money fear — and to teaching the body, over time, a different response to the same triggers.
  Her practice is research-grounded but intimate: helping people notice the exact bodily signature of their money stress, so that the panic becomes something they can feel and work with rather than something that simply happens to them.
  She is based in Toronto.
