series_line: >
  This audiobook is part of the Felt Sense Publishing Series, drawing on Pamela Fellows's polyvagal-informed approach to embodiment.
author_intro: >
  This book was written by Suki Moreno.
author_background: >
  Suki Moreno is an embodiment researcher who studies the somatic signature of financial stress and how money anxiety lives in nervous-system patterns.
  Her approach is research-grounded, body-first, and rooted in Pamela Fellows's polyvagal-informed approach to embodiment.
  She is based in Toronto.
why_this_book: >
  Suki began writing this after her research kept showing that financial anxiety appears in the body before it ever reaches conscious thought.
  Pamela Fellows's polyvagal framing gave her a language for money fear as a nervous-system state rather than a failure of discipline.
  Most of what people are offered about financial anxiety is purely cognitive; almost none of it addresses the body that panics first.
  This book gives no financial advice and does not promise that money worries will disappear.
  She did not study with Pamela Fellows in person; she encountered her teaching through books and talks.
