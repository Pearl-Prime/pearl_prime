author_id: suki_moreno
topic_id: financial_anxiety
why_this_book: >
  Suki began writing this after years of research kept turning up the same finding she had not gone looking for: financial anxiety shows up in the body before it ever reaches conscious thought.
  Her participants were not irresponsible.
  They were not bad with money.
  Their nervous systems had simply paired the idea of finances with threat so completely that a bank balance could trigger the same bracing as physical danger.
  What Pamela Fellows describes through polyvagal theory gave Suki a language for what her data kept showing: money fear as a nervous-system state — the shallow breath, the gripped stomach — running underneath every spreadsheet and every avoided statement.
  Most of what people are offered about financial anxiety is purely cognitive: budget harder, reframe scarcity, think your way to calm.
  Almost none of it addresses the body that panics before the thinking starts.
  This book does not give financial advice and does not promise that money worries will disappear.
  It offers ways to recognize the body's financial-stress signature as it arises and to teach the nervous system a steadier response to the same triggers, drawing on an embodiment tradition that treats the body's reactions as real and workable information.
