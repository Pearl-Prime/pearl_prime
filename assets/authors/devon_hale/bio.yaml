author_id: devon_hale
pen_name: Devon Hale
bio: 'Devon Hale is a product manager who spent years studying the racing mind. Devon writes for founders caught in the anxious, racing mind — not to fix the feeling, but to name what it is doing in the
  body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine required.'
word_count_target: 120-180
