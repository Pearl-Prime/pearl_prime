author_id: mira_santos
pen_name: "Mira Santos"
bio: >
  Mira Santos writes for the people holding everyone else together.
  After losing her mother during the years she was raising two children alone, she began noticing how grief and self-worth shared the same nervous-system architecture — the same alarm, the same exhaustion, the same quiet certainty that there was no time to feel any of it.
  She works with sandwich-generation caregivers and working parents who are managing other people's needs while the unprocessed losses pile up in the body.
  Her writing draws on Ahjan's contemplative-Buddhism framework of the alarm within, applied to the specific grief of people who never got to grieve in the first place — and to the self-worth that erodes inside that same suspension.
  Her practice favors the small, specific moments of recognition over any larger story of healing.
  She is based in Oakland.
