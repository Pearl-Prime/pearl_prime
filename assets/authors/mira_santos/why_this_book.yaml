author_id: mira_santos
topic_id: grief
why_this_book: >
  Mira began writing this after the third year of caring for her dying mother while raising two children, when she realized she was not actually grieving — she was managing.
  Days became logistics.
  Feelings became tasks for later.
  When her mother died, the grief did not begin.
  It just sat under everything she did, the way it does for so many sandwich-generation caregivers who never get to set down what they are carrying.
  What Ahjan calls the alarm within turned out to be the same architecture.
  The body that cannot grieve and the body that does not feel worth taking time for are running the same protective program.
  This book is not a manual for moving on.
  It does not promise stages or closure.
  It offers the recognition that grief and self-worth, in caregivers, are often two ends of one frozen body — and points at the small, specific moments where that body can begin to thaw without crisis.
