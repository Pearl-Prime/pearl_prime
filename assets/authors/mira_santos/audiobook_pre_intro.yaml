series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to the grief held by caregivers.
author_intro: >
  This book was written by Mira Santos.
author_background: >
  Mira lost her mother while raising two children alone, and from that experience built a practice of supporting sandwich-generation caregivers and working parents whose grief and self-worth share one nervous-system architecture.
  Her writing draws on Ahjan's framework of the alarm within.
  She is based in Oakland.
why_this_book: >
  Mira began writing this after the years of caring for a dying mother while raising two children, when she noticed she was not grieving — she was managing.
  The grief sat under everything.
  What Ahjan calls the alarm within turned out to be the same architecture.
  The body that cannot grieve and the body that will not take time for itself are running one protective program.
  She did not study with Ahjan directly; she encountered his teaching through books.
  This book offers the recognition that grief and self-worth, in caregivers, are often two ends of one frozen body.
