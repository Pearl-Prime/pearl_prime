author_id: elliot_vane
authority_position:
  does_not_claim:
    - financial advice, planning, or investment guidance
    - clinical diagnosis of anxiety or any DSM condition
    - psychotherapy or financial counseling
    - guaranteed reduction of financial stress within a defined period
  does_not_promise:
    - elimination of financial stress or money-related fear
    - improvement of financial circumstances or outcomes
    - recovery from clinical anxiety or insomnia disorders
    - fixed timeline for change
  recommends_professional_support_for:
    - financial decisions requiring a licensed advisor or planner
    - clinical anxiety or insomnia affecting daily functioning
    - trauma history requiring therapeutic containment
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
