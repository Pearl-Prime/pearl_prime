topic_id: financial_stress
why_this_book: >
  Elliot wrote this book because financial advice answers a question that the 3 AM mind is not actually asking.
  The spreadsheets, the budgets, the contingency plans — he had all of them, and they did nothing for the dread that woke him at three in the morning, certain that ruin was one mistake away.
  As a behavioral economist he knew, in daylight, how poorly the mind judges risk.
  At night the knowing vanished, and the story of catastrophe arrived feeling like simple fact.
  What changed things was Kenjin Roshi's Soto Zen inquiry, which did not argue with the forecast or offer a better financial plan but asked who was the one so certain of disaster.
  When Elliot turned to look for that certain one instead of the catastrophe, the story lost the authority the darkness had lent it.
  This book is not financial advice and it does not promise that your money worries will resolve.
  It will not tell you how to budget, invest, or build a safety net.
  It offers a way to see through the story your mind tells at night — to recognize the 3 AM verdict as a story rather than a fact — drawn from a tradition that studies exactly that kind of certainty.
