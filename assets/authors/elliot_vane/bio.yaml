author_id: elliot_vane
pen_name: "Elliot Vane"
bio: >
  Elliot Vane is a behavioral economist who built a career on how people misjudge risk, then spent years awake at 3 AM treating his own worst forecasts as settled fact.
  Money was where his mind ran hardest — the late-night arithmetic of ruin, the certainty that one wrong move would undo everything, the dread that felt less like feeling than verdict.
  What he eventually noticed, through Kenjin Roshi's books, was that the 3 AM mind does not report reality; it tells a story, and the dark makes the story sound like truth.
  His writing draws on Kenjin Roshi's Soto Zen tradition of inquiry, turned on the financial narratives that feel most certain precisely when they are least examined.
  He writes for founders and managers whose money fears arrive at night dressed as facts.
  His practice is to meet the 3 AM thought with a single question — who is the one so sure of this — rather than with reassurance.
  He did not study with Kenjin Roshi in person; he came to the teaching through his books and talks.
