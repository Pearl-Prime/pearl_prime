book_title_line: >
  This is the dynamic title line; supplied by the naming engine at compile time. If a runtime title is not supplied, the build fails.
series_line: >
  This audiobook is part of the Clear Seeing Books Series, drawing on Kenjin Roshi's Soto Zen tradition of inquiry — seeing through the story rather than managing it.
author_intro: >
  This book was written by Elliot Vane.
author_background: >
  Elliot is a behavioral economist who built a career on how people misjudge risk, then spent years treating his own 3 AM money fears as settled fact.
  He writes for founders and managers whose financial worries arrive at night dressed as facts.
  His work turns Kenjin Roshi's Soto Zen tradition of inquiry on the narratives that feel most certain precisely when they are least examined.
why_this_book: >
  Elliot wrote this because financial advice answers a question the 3 AM mind is not actually asking.
  He had the spreadsheets and the contingency plans, and none of it touched the nighttime certainty that ruin was one mistake away.
  Kenjin Roshi's Soto Zen inquiry did not argue with the forecast but asked who was the one so certain of disaster.
  This book is not financial advice and does not promise your money worries will resolve; it offers a way to recognize the 3 AM verdict as a story rather than a fact.
  He did not study with Kenjin Roshi in person; he came to the teaching through his books and talks.
