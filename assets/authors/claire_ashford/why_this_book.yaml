author_id: claire_ashford
topic_id: anxiety
why_this_book: >
  Dr. Claire Ashford began writing this after years of watching the same disconnect in her consulting room: clients who could narrate their anxiety fluently and still could not feel the difference between threat and safety in their own bodies.
  They were not unintelligent.
  They were not under-treated.
  Their nervous systems had simply learned to stay mobilized — chest tight, breath high, ready — long after any present danger had gone.
  What Pamela Fellows describes through polyvagal theory gave Claire a way to name what she had been seeing: anxiety not as a thinking problem but as a body held in a state it cannot tell is no longer needed.
  Most of what her clients had been offered asked them to argue with their thoughts or push harder through the discomfort.
  Almost none of it began with the body.
  This book does not diagnose anxiety or promise its disappearance.
  It offers entry points for noticing nervous-system states before they harden into another braced day, drawing on an embodiment tradition that takes the body's signals as information rather than noise.
