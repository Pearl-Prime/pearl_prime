pen_name: "Claire Ashford"
bio: >
  Dr. Claire Ashford is a clinical psychologist who spent a decade treating high-functioning perfectionists before she noticed the pattern that her training had taught her to talk around: the body knew first.
  Her clients could describe their thoughts with precision and still sit in front of her with shoulders locked, breath shallow, a nervous system braced against a threat that had long since passed.
  She works with millennial women and corporate managers — people whose competence is real and whose bodies have been quietly carrying what their minds refuse to name.
  Her writing draws on Pamela Fellows's polyvagal-informed approach to embodiment, applied to the specific physiology of perfectionism: the constant low hum of mobilization in people who never let themselves arrive at rest.
  Her practice focuses on the felt signals — the held jaw before a meeting, the gripped stomach reading an email — that high achievers learn to override because their lives reward the override.
  She is based in Edinburgh.
