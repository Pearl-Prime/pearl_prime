series_line: >
  This audiobook is part of the Felt Sense Publishing Series, drawing on Pamela Fellows's polyvagal-informed approach to embodiment.
author_intro: >
  This book was written by Claire Ashford.
author_background: >
  Dr. Claire Ashford is a clinical psychologist who works with perfectionists whose bodies carry the strain their minds refuse to name.
  Her approach is grounded, body-first, and rooted in Pamela Fellows's polyvagal-informed approach to embodiment.
  She is based in Edinburgh.
why_this_book: >
  Claire began writing this after years of watching clients narrate their anxiety fluently while their bodies stayed braced against a threat that had passed.
  Pamela Fellows's polyvagal framing gave her a way to understand anxiety as a nervous-system state rather than a thinking problem.
  Most of what her clients had been offered asked them to argue with their thoughts; almost none of it began with the body.
  This book does not promise the absence of anxiety.
  She did not study with Pamela Fellows in person; she encountered her teaching through books and talks.
