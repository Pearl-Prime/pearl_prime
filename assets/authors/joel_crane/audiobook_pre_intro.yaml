book_title_line: >
  This is the dynamic title line; supplied by the naming engine at compile time. If a runtime title is not supplied, the build fails.
series_line: >
  This audiobook is part of the Clear Seeing Books Series, drawing on Kenjin Roshi's Soto Zen tradition of inquiry — seeing through the story rather than managing it.
author_intro: >
  This book was written by Joel Crane.
author_background: >
  Joel sat zazen for thirty years before he wrote a word, and he writes sparely, sometimes a single question to a chapter.
  His subject is the boundary between what you are and what you think you are, grounded in Kenjin Roshi's Soto Zen tradition of inquiry.
  He does not offer techniques for raising self-worth; he offers questions that loosen the story of a self that needs raising.
why_this_book: >
  Joel wrote this after watching a lifetime of people try to think their way into being enough and arrive nowhere.
  He came to see that the search for self-worth is itself the trap, because it assumes a separate self waiting to be appraised.
  Kenjin Roshi's Soto Zen inquiry gave him a different question: not how do I become worthy, but who is the one asking.
  This book does not promise you will feel good about yourself; it offers questions held long enough to see through the story of the one who feels unworthy.
  He did not study with Kenjin Roshi in person; he found the teaching in his books and talks.
