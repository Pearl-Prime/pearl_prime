author_id: joel_crane
authority_position:
  does_not_claim:
    - clinical diagnosis of any DSM condition
    - psychotherapy or counseling for low self-worth
    - neurological or psychiatric assessment
    - guaranteed improvement in self-esteem within a defined period
  does_not_promise:
    - a permanent sense of worthiness or self-acceptance
    - elimination of self-critical thoughts
    - recovery from depression or identity-related clinical conditions
    - fixed timeline for change
  recommends_professional_support_for:
    - depression or persistent worthlessness affecting daily functioning
    - trauma history requiring therapeutic containment
    - identity disturbance requiring clinical care
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
