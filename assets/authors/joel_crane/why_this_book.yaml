author_id: joel_crane
topic_id: self_worth
why_this_book: >
  Joel wrote this book slowly, and about self-worth in particular, because he watched a lifetime of people try to think their way into being enough and arrive nowhere.
  They worked harder, achieved more, collected the proof — and the verdict underneath never changed.
  He came to see that the search for self-worth is itself the trap: it assumes there is a self standing apart, waiting to be appraised and found sufficient.
  Kenjin Roshi's Soto Zen inquiry gave him a different question.
  Not how do I become worthy, but who is the one asking, and is that self as solid as it claims to be.
  When Joel looked steadily for the one being judged, he could not find it as a fixed thing — and the judging quieted on its own.
  This book does not raise your self-esteem and it does not promise you will feel good about yourself.
  It will not give you a self to finally approve of.
  It offers, instead, a few questions held long enough to see through the story of the one who feels unworthy, in the spare manner of the tradition he learned it from.
