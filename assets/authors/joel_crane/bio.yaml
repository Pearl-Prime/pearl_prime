author_id: joel_crane
pen_name: "Joel Crane"
bio: >
  Joel Crane sat zazen for thirty years before he wrote a word.
  He came late to writing and writes sparely, sometimes a single question to a chapter, because he distrusts the part of the mind that wants more words to feel safe.
  He writes for people in the long middle of life — managers, parents, the quietly capable — who have spent decades building a self they are no longer sure is theirs.
  His subject is the boundary between what you are and what you think you are, and the steadiness that becomes available when you stop defending the second one.
  Drawing on Kenjin Roshi's Soto Zen tradition of inquiry, he does not offer techniques for raising self-worth; he offers questions that loosen the story of a self that needs raising at all.
  His one practice is to sit with a question longer than is comfortable and let it do its work.
  He did not study with Kenjin Roshi in person; he found the teaching in the older man's books and talks.
