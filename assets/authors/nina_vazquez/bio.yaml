author_id: nina_vazquez
pen_name: Nina Vazquez
bio: 'Nina Vazquez is a school counselor who sits with anxious teenagers. Nina writes for students caught in the anxious, racing mind — not to fix the feeling, but to name what it is doing in the body in
  language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine required.'
word_count_target: 120-180
status: draft
