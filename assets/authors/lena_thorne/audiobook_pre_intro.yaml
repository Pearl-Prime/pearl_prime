series_line: >
  This audiobook is part of the Stillness Press Series, drawing on Ahjan's contemplative-Buddhism teaching of the alarm system.
author_intro: >
  This book was written by Lena Thorne.
author_background: >
  Lena is a former ICU nurse who turned her own panic-attack recovery into a practice of supporting healthcare professionals navigating the alarm their work installs in their bodies.
  Her approach is grounded, body-first, and rooted in Ahjan's contemplative-Buddhism teaching of the alarm system.
  She is based in Portland.
why_this_book: >
  Lena began writing this after watching the same pattern across years of ICU shifts and the professionals she now works with: tight chests, shaking hands, thinner sleep.
  What Ahjan calls the alarm within — a nervous-system pattern firing regardless of present safety — gave her a language for what she had been watching.
  She did not study with Ahjan in person; she encountered his teaching through books and talks.
  This book does not promise the absence of anxiety.
  It offers the body-first entry points she wishes she had had earlier.
