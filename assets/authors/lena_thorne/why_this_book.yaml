author_id: lena_thorne
topic_id: anxiety
why_this_book: >
  Lena began writing this after watching a familiar pattern repeat across years of ICU shifts and the professionals she now works with: people whose chests went tight on the way to work, whose hands shook while charting, whose sleep got thinner each year.
  They were not weak.
  They were not new.
  Their bodies were running an alarm system that had been useful in one context and ruinous in another.
  What Ahjan calls the alarm within — a nervous-system pattern that fires regardless of present safety — gave Lena a language for what she had been watching.
  Most of what was available told these professionals to manage their thoughts or rest harder.
  None of it addressed the body first.
  This book does not diagnose anxiety or promise its absence.
  It offers entry points for noticing the alarm before it tips into crisis, drawing on a contemplative tradition that has watched human nervous systems for two and a half thousand years.
