author_id: lena_thorne
pen_name: "Lena Thorne"
bio: >
  Lena Thorne spent fifteen years as an ICU nurse before the panic attacks made her stop.
  What she found in recovery wasn't a cure — it was a way to see the alarm in the body for what it was, and a way to teach others to see it before their bodies arrived where hers had.
  She works with healthcare professionals and millennial women who have spent years performing competence while their nervous systems quietly raised the floor on what counted as a normal day.
  Her writing draws on Ahjan's contemplative-Buddhism framework of the alarm within, applied to the specific exhaustion that follows people whose work asks them to stay calm in other people's emergencies.
  Her practice focuses on the early signals — the tight chest in the locker room, the held breath in the elevator — that people learn to ignore because the work does not pause for them.
  She is based in Portland.
