author_id: rowan_beck
pen_name: "Rowan Beck"
bio: >
  Rowan Beck is an environmental psychologist who studies why people feel calmer in forests.
  His research looks at the specific environmental conditions — low information density, predictable visual rhythms, ambient sound — that allow an overstimulated nervous system to lower its alarm.
  He works with tech-finance professionals and millennial women whose anxiety and overthinking are sustained, in part, by environments designed to spike them.
  His writing translates forest-tradition principles into evidence-based simplicity practices, framed by Ahjan's contemplative-Buddhism teaching of the alarm within.
  His approach is grounded in the data and held by the older tradition: each chapter pairs one finding from the literature with one practice that has outlasted the literature.
  He is careful with claims and slow with prescriptions; the work assumes a reader who has been disappointed before.
  He is based in Vancouver.
word_count_target: 120-180
