series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to the simplicity practices that quiet an overstimulated nervous system.
author_intro: >
  This book was written by Rowan Beck.
author_background: >
  Rowan is an environmental psychologist who studies why people feel calmer in forests.
  His writing translates forest-tradition principles into evidence-based simplicity practices, framed by Ahjan's framework of the alarm within.
  He is based in Vancouver.
why_this_book: >
  Rowan began writing this after years of research showing the same finding: nervous systems calm down in environments that ask less of them.
  The trouble was that most readers did not have a forest to walk into.
  What Ahjan calls the alarm within is the body's response to environments that exceed its capacity, and the forest tradition's older answer matches what Rowan's research keeps validating.
  He did not study under Ahjan in person; he encountered his teaching through books.
  This book offers the science of why the alarm rises in modern professional environments.
