author_id: rowan_beck
topic_id: anxiety
why_this_book: >
  Rowan began writing this after years of research showing the same boring finding: nervous systems calm down in environments that ask less of them.
  The trouble was that most readers did not have a forest to walk into.
  They had Slack, group chats, three monitors, and the thirty-second window between meetings.
  What Ahjan calls the alarm within is the body's response to environments that exceed its capacity — and the forest tradition's centuries-old answer is, essentially, the same intervention Rowan's research keeps validating: lower the inputs, slow the cadence, repeat.
  The contemplative framework gave Rowan a way to talk about the science without flattening it into productivity advice.
  Most writing on anxiety either pathologized the condition or asked readers to think differently about their thoughts.
  Rowan's research suggested neither was the leverage point.
  This book does not promise calm by Friday.
  It offers the science of why the alarm rises in modern professional environments, alongside the small forest-tradition practices that, over time, can lower it.
