author_id: hana_lee
pen_name: "Hana Lee"
bio: >
  Hana Lee writes Zen for people who would never set foot in a temple, and she is the first to admit she only ended up there by accident herself.
  She found Kenjin Roshi's books in her early twenties while looking for something — anything — to do about the dread that flooded her before group chats, parties, and meetings she had agreed to in a braver moment.
  What she found was not a calming technique but a question, and it has become the spine of everything she writes: if you can see the anxious one, the one bracing to be judged, who exactly is the one seeing.
  She writes for Gen Z professionals and students who carry social anxiety like a phone in their pocket — always on, always buzzing — and who are allergic to anything that sounds like incense and wind chimes.
  Her tone is warm, funny, and completely uninterested in being spiritual.
  She did not study with Kenjin Roshi in person; she met the teaching entirely through his books and talks.
  She lives in Los Angeles.
