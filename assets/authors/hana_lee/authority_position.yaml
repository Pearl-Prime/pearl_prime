author_id: hana_lee
authority_position:
  does_not_claim:
    - clinical diagnosis of social anxiety disorder or any DSM condition
    - psychotherapy or exposure therapy
    - neurological or psychiatric assessment
    - guaranteed reduction of social anxiety symptoms within a defined period
  does_not_promise:
    - elimination of social anxiety or fear of judgment
    - a permanently confident or fearless social self
    - recovery from social anxiety disorder or panic disorder
    - fixed timeline for change
  recommends_professional_support_for:
    - social anxiety disorder or panic disorder
    - trauma history requiring therapeutic containment
    - avoidance severe enough to disrupt daily functioning
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
