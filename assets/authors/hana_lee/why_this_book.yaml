author_id: hana_lee
topic_id: social_anxiety
why_this_book: >
  Hana wrote this book because every other thing she tried for social anxiety either treated her like she was broken or treated her like she just needed more confidence.
  Neither landed.
  The dread before she walked into a room was not a confidence problem; it was a whole story, running on its own, about being watched and weighed and coming up short.
  No amount of positive self-talk argued the story down, because she was arguing from inside it.
  What changed things was the one question she kept finding in Kenjin Roshi's books: if you can notice the anxious one bracing to be judged, then who is noticing.
  The moment she looked for the watcher instead of the worry, the story did not have her so completely — there was a little space where there used to be none.
  This book does not promise you will become a social butterfly and it will not cure your anxiety.
  It is not about faking confidence until the fear gives up.
  It is about seeing through the story that you are the one on trial, told in plain language by someone who hated everything that sounded like a meditation retreat.
