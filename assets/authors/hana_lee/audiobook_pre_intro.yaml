series_line: >
  This audiobook is part of the Clear Seeing Books Series, drawing on Kenjin Roshi's Soto Zen tradition of inquiry — seeing through the story rather than managing it.
author_intro: >
  This book was written by Hana Lee.
author_background: >
  Hana writes Zen for people who would never set foot in a temple, having found it herself by accident in her early twenties.
  She writes for Gen Z professionals and students who carry social anxiety like a phone in their pocket, in a tone that is warm, funny, and uninterested in being spiritual.
  Her work rests on a single question from Kenjin Roshi's Soto Zen tradition of inquiry: if you can see the anxious one, who is the one seeing.
why_this_book: >
  Hana wrote this because everything else she tried for social anxiety either treated her as broken or told her to find more confidence.
  The dread before walking into a room was a whole story about being watched and found wanting, and no self-talk argued it down from the inside.
  What changed things was the question she kept finding in Kenjin Roshi's books: if you can notice the anxious one, who is noticing.
  This book does not promise to cure your anxiety; it is about seeing through the story that you are the one on trial.
  She did not study with Kenjin Roshi in person; she met the teaching entirely through his books and talks.
