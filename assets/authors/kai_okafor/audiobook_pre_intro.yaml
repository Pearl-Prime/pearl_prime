book_title_line: >
  This is the dynamic title line; supplied by the naming engine at compile time. If a runtime title is not supplied, the build fails.
series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to the social-monitoring patterns of Gen Z professionals.
author_intro: >
  This book was written by Kai Okafor.
author_background: >
  Kai is a Gen Z mindfulness researcher who writes about social anxiety and overthinking as alarm-system patterns rather than personality traits.
  His approach bridges contemplative-neuroscience research with Ahjan's framework of the alarm within.
  He is based in Brooklyn.
why_this_book: >
  Kai began writing this after watching classmates and clients run the loop he had spent years running: replaying every meeting and text for the moment they said the wrong thing.
  They did not have social anxiety as a diagnosis; they had it as a baseline.
  What Ahjan calls the alarm within is the same loop, named older.
  Kai did not study with Ahjan directly; he encountered the teaching through books and talks.
  This book offers a way to recognize the alarm without arguing with it.
