author_id: kai_okafor
topic_id: social_anxiety
why_this_book: >
  Kai began writing this after watching his classmates and clients run the same loop he had spent years running: replaying every meeting, every text, every brief exchange in the hallway, looking for the moment they had said the wrong thing.
  They did not have social anxiety as a diagnosis.
  They had social anxiety as a default state — a continuous low-volume alarm scanning every interaction for failure.
  What Ahjan calls the alarm within is the same loop, named older.
  In Ahjan's framework, the brain that will not stop monitoring is not broken; it is running a useful pattern in a context that no longer needs it.
  Most available writing offered productivity hacks or full-volume cognitive behavioral protocols.
  Neither spoke to people whose anxiety was a baseline rather than an episode.
  This book does not promise to silence the loop.
  It offers a way to recognize the alarm without arguing with it, and the small contemplative practices that, over time, change the volume.
word_count_target: 150-250
