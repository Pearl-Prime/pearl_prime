author_id: kai_okafor
pen_name: "Kai Okafor"
bio: >
  Kai Okafor is a Gen Z mindfulness researcher who writes about overthinking and social anxiety as what they actually are: an alarm system running a program no one chose to install.
  He works primarily with Gen Z professionals and graduate students whose social vigilance has become indistinguishable from their personalities.
  His writing skips the incense and goes straight to the neuroscience of why the brain will not stop rehearsing conversations, drawing on Ahjan's contemplative-Buddhism framework of the alarm within for the older language that names what newer research can finally measure.
  His approach makes a point of being interesting before it asks readers to do anything — the practices come after the explanation, not before, because Gen Z reads citation chains and notices when someone is skipping past them.
  He is based in Brooklyn.
word_count_target: 120-180
