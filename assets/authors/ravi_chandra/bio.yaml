author_id: ravi_chandra
pen_name: Ravi Chandra
bio: 'Ravi Chandra is a startup engineer who quieted his own overthinking. Ravi writes for young professionals caught in the anxious, racing mind — not to fix the feeling, but to name what it is doing in
  the body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine required.'
word_count_target: 120-180
