author_id: helen_cross
authority_position:
  does_not_claim:
    - clinical diagnosis of compassion fatigue, burnout, or any DSM condition
    - psychotherapy or somatic trauma therapy
    - psychological or occupational-health assessment
    - guaranteed relief from compassion fatigue within a defined period
  does_not_promise:
    - elimination of compassion fatigue or caregiver exhaustion
    - transformation of nervous-system baseline
    - recovery from clinical depression, anxiety, or PTSD
    - fixed timeline for change
  recommends_professional_support_for:
    - clinical depression, anxiety, or post-traumatic stress
    - trauma history requiring therapeutic containment
    - persistent exhaustion with a possible medical cause
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
