author_id: helen_cross
pen_name: "Helen Cross"
bio: >
  Helen Cross spent twenty-six years as an emergency-room nurse, and for most of them she mistook the cost of the work for the price of being good at it.
  It was her own body that finally taught her otherwise — the clenched gut walking into another shift, the inability to put a patient down even at home — long before any words for it arrived.
  She now trains healthcare workers and first responders in somatic boundary-setting: the body's way of saying "I have given enough" before the mind has the nerve to.
  Her writing draws on Pamela Fellows's polyvagal-informed approach to embodiment, applied to the people whose jobs reward endless giving until the nervous system simply runs out of road.
  Her practice is steady and unsentimental, shaped by decades on the floor: learning to feel the body's early "no" — the heaviness, the held breath, the flatness — and to honor it as information rather than weakness.
  She is based in Bristol.
