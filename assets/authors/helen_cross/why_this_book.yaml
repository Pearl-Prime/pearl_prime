author_id: helen_cross
topic_id: boundaries
why_this_book: >
  Helen began writing this after twenty-six years of watching good nurses — and finally herself — give past the point the body could sustain.
  They were not weak.
  They were not unprofessional.
  Their nervous systems had learned to override every internal signal that said "enough," because the work does not pause and the patients keep coming.
  What Pamela Fellows describes through polyvagal theory gave Helen a language for what her own body had been telling her for years: a boundary is not a decision the mind makes, it is a state the body enters when it has given more than it has.
  Most of what caregivers are taught about boundaries lives entirely in the head — scripts, assertiveness, saying no on paper.
  Almost none of it teaches them to feel the body's "no" before they are already empty.
  This book does not treat compassion fatigue as a clinical condition or promise that giving will ever feel easy.
  It offers ways to recognize the body's early signals of depletion and to set boundaries from that felt sense rather than from guilt, drawing on an embodiment tradition that trusts the body to know its own limits.
