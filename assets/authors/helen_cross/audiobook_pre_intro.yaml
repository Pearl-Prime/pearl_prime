author_intro: >
  This book was written by Helen Cross.
author_background: >
  Helen Cross was an emergency-room nurse for twenty-six years and now trains healthcare workers in somatic boundary-setting — the body's way of saying "I have given enough" before the mind catches up.
  Her approach is steady, body-first, and rooted in Pamela Fellows's polyvagal-informed approach to embodiment.
  She is based in Bristol.
why_this_book: >
  Helen began writing this after decades of watching good caregivers, and finally herself, give past the point the body could sustain.
  Pamela Fellows's polyvagal framing gave her a language for a boundary as a state the body enters, not a decision the mind makes.
  Most of what caregivers are taught about boundaries lives in the head; almost none of it teaches them to feel the body's "no" before they are already empty.
  This book does not promise that giving will ever feel easy.
  She did not study with Pamela Fellows in person; she encountered her teaching through books and talks.
