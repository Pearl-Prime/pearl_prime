author_id: vera_osei
pen_name: "Vera Osei"
bio: >
  Vera Osei is a grief doula and somatic therapist who sits with people in the rawest stretches of loss — the weeks and months when language fails and the body becomes the only honest witness.
  She came to this work the way many do, through a loss of her own, and through the slow discovery that grief was not living in her thoughts but in her shoulders, her jaw, the held breath she did not know she was holding.
  She writes for the people who carry too much for too long: the sandwich generation tending parents and children at once, and the nurses who absorb other people's endings shift after shift.
  Her writing draws on Pamela Fellows's polyvagal-informed approach to embodiment, applied to mourning without clinical distance — the body's wisdom in loss, what the shoulders know, what the hips remember.
  Her practice is unhurried and close to the body: noticing where grief has settled, and letting the nervous system move at the pace it actually needs rather than the pace the world prefers.
  She is based in London.
