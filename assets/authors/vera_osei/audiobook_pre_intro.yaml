author_intro: >
  This book was written by Vera Osei.
author_background: >
  Vera Osei is a grief doula and somatic therapist who writes about the body's wisdom in loss — what the shoulders know, what the jaw holds, what the hips remember.
  Her approach is warm, unhurried, and rooted in Pamela Fellows's polyvagal-informed approach to embodiment.
  She is based in London.
why_this_book: >
  Vera began writing this after years of sitting with people whose grief had settled into the body long after the world expected them to move on.
  Pamela Fellows's polyvagal framing gave her a language for mourning held in the shoulders, the jaw, the hips — a nervous system in a protective state it cannot yet leave.
  Most of what mourners are offered rushes them toward stages and closure; almost none of it lets the body grieve at its own speed.
  This book does not promise that grief will end on schedule.
  She did not study with Pamela Fellows in person; she encountered her teaching through books and talks.
