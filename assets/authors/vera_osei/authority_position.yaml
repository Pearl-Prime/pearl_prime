author_id: vera_osei
authority_position:
  does_not_claim:
    - clinical diagnosis of complicated grief or any DSM condition
    - bereavement therapy or somatic trauma therapy
    - psychological or psychiatric assessment
    - guaranteed resolution of grief within a defined period
  does_not_promise:
    - elimination of grief or sorrow
    - transformation of nervous-system baseline
    - recovery from prolonged grief disorder or clinical depression
    - fixed timeline for healing
  recommends_professional_support_for:
    - prolonged or complicated grief
    - trauma history requiring therapeutic containment
    - clinical depression or suicidal thoughts
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
