author_id: vera_osei
topic_id: grief
why_this_book: >
  Vera began writing this after years of sitting at bedsides and kitchen tables with people whose grief had nowhere to go but down into the body.
  They were not broken.
  They were not failing to cope.
  Their nervous systems were doing exactly what loss asks of them — bracing, shutting down, holding still — and then staying there long after the funeral, the casseroles, and the world's permission to mourn had passed.
  What Pamela Fellows describes through polyvagal theory gave Vera a language for what she had been feeling under her own hands: grief held in the shoulders, the jaw, the hips, a body in a protective state it cannot yet leave.
  Most of what mourners are offered rushes them toward stages, closure, or moving on.
  Almost none of it lets the body grieve at its own speed.
  This book does not treat grief as a disorder or promise that it will end on schedule.
  It offers gentle ways to notice where loss has settled in the body and to let the nervous system soften when it is ready, drawing on an embodiment tradition that trusts the body to know what mourning requires.
