series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to the alarm that fires around money and risk.
author_intro: >
  This book was written by Noor Ibrahim.
author_background: >
  Noor writes about the alarm that fires around money and risk, drawing on contemplative economics and Ahjan's contemplative-Buddhism framework of the alarm within.
  She works primarily with entrepreneurs and sandwich-generation adults navigating decisions under financial pressure.
  She is based in Toronto.
why_this_book: >
  Noor began writing this after the third entrepreneur of the year sat across from her crying about a balance sheet that was, in fact, fine.
  The body was running an alarm the spreadsheet could not soothe.
  What Ahjan calls the alarm within gave Noor a way to talk about courage without making it a willpower story.
  Noor did not study with Ahjan directly; she came to his teaching through books and recordings.
  This book offers the recognition that the alarm is doing its job, and the practices that change the body's relationship to a future it cannot control.
