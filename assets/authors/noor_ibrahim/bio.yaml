author_id: noor_ibrahim
pen_name: "Noor Ibrahim"
bio: >
  Noor Ibrahim writes about the alarm that fires around money and risk — the one that sounds like "not enough" even when the numbers say otherwise, and the one that rises when a decision asks more courage than the body believes it has.
  Drawing on contemplative economics and nervous-system science, she works with entrepreneurs and sandwich-generation adults whose financial anxiety is rarely about finance and whose courage is rarely about willpower.
  Her framework: Ahjan's contemplative-Buddhism teaching of the alarm within, applied to the specific physiology of risk under financial pressure.
  Her practice does not promise relief.
  It promises company — and a way to listen to the alarm without letting it write the next decision.
  She is based in Toronto.
word_count_target: 120-180
