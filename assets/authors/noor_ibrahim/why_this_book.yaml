author_id: noor_ibrahim
topic_id: courage
why_this_book: >
  Noor began writing this after the third entrepreneur of the year sat across from her crying about a balance sheet that was, in fact, fine.
  The numbers were not the problem.
  The body was running an alarm that the spreadsheet could not soothe.
  What Ahjan calls the alarm within gave Noor a way to talk about courage without making it a willpower story and a way to talk about financial anxiety without making it a math problem.
  Both are nervous-system patterns, and both ask for body-level recognition before any plan can hold.
  Most writing on courage promised transformation.
  Most writing on money promised mastery.
  Neither helped the people Noor was sitting with, who needed permission to feel the alarm rather than override it.
  This book does not promise courage on demand or relief from financial fear.
  It offers the recognition that the alarm is doing its job — and the contemplative practices that, over time, change the body's relationship to a future it cannot control.
