author_id: ruth_alder
pen_name: "Ruth Alder"
bio: >
  Ruth Alder was a hospice chaplain for twenty-two years.
  She writes about the boundaries that keep caregivers alive — not the walls people build to keep others out, but the ground that lets a person stay standing when everyone around them is falling.
  She works with healthcare professionals and first responders whose careers ask them to absorb other people's grief without contagion.
  Her writing draws on Ahjan's contemplative-Buddhism teaching of the alarm within for what she observed at countless bedsides: the body that cannot say no until the cost has already been paid.
  She refuses the language of self-care for what is, more honestly, the language of survival; her work is for caregivers who have already heard the cliches and need something quieter that holds.
  She is based in Asheville.
word_count_target: 120-180
