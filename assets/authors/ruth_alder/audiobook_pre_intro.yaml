series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to the boundary-setting that keeps caregivers alive.
author_intro: >
  This book was written by Ruth Alder.
author_background: >
  Ruth was a hospice chaplain for twenty-two years and now writes about the boundaries that keep caregivers alive.
  Her approach draws on Ahjan's contemplative-Buddhism framework of the alarm within, applied to the specific exhaustion of long-tenured helpers.
  She is based in Asheville.
why_this_book: >
  Ruth began writing this after her own near-collapse, the year she stopped being able to hear what her body was telling her about the work.
  The body says no in a thousand small ways before it says no in the way that takes years to recover from.
  What Ahjan calls the alarm within named the pattern she had watched in herself and in long-tenured caregivers she knew.
  Ruth did not train under Ahjan; she came to his teaching through books late in her career.
  The boundary, in this framework, is not a wall built later.
  It is the recognition of the alarm at the time it first fires.
