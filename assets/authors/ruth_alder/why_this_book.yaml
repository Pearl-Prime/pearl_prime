author_id: ruth_alder
topic_id: boundaries
why_this_book: >
  Ruth began writing this after her own near-collapse, the year she stopped being able to hear what her body was telling her about the work.
  She had spent two decades as a hospice chaplain.
  The boundaries she had set — and the many she had not set — had each been small at the time and devastating in aggregate.
  What Ahjan calls the alarm within named the pattern she had watched in herself and in nearly every long-tenured caregiver she knew.
  The body says no in a thousand small ways before it says no in the way that takes years to recover from.
  The boundary is not a wall built later.
  It is the recognition of the alarm at the time it first fires.
  Most writing on boundaries treated the topic as a communication problem.
  Ruth had watched too many caregivers burn out with perfectly worded boundaries on their lips.
  This book does not promise to make caregiving sustainable for everyone.
  It offers the body-level recognition of the alarm that, named early, can become the ground that keeps a caregiver standing.
word_count_target: 150-250
