author_id: tomas_vidal
pen_name: Tomas Vidal
bio: 'Tomas Vidal is a stay-at-home father who started writing at 5 a.m.. Tomas writes for working parents caught in the anxious, racing mind — not to fix the feeling, but to name what it is doing in the
  body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine required.'
word_count_target: 120-180
status: draft
