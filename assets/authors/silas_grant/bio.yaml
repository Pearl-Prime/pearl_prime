author_id: silas_grant
pen_name: "Silas Grant"
bio: >
  Silas Grant is a retired teacher who spent two decades walking before dawn.
  He writes short books — sixty pages, sometimes seventy — about what remains when a person stops trying to be more.
  His readers are entrepreneurs and sandwich-generation adults who have spent years building a self that kept disappointing them and who are tired enough now to consider another approach.
  His writing draws on Ahjan's contemplative-Buddhism teaching of the alarm within for what he has watched in himself and his students: a nervous system that has been told for so long it is not enough that the alarm has become its default state.
  Silas writes the book he wished someone had handed him at forty-two — short, calm, and honest about the limits of any framework, including his own.
  He is based in coastal Maine.
word_count_target: 120-180
