narrator_intro: >
  My name is Marcus Whaley, and I will be guiding you through this audiobook.
book_title_line: >
  This is the dynamic title line; supplied by the naming engine at compile time. If a runtime title is not supplied, the build fails.
series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to what remains when a person stops trying to be more.
author_intro: >
  This book was written by Silas Grant.
author_background: >
  Silas is a retired teacher who spent two decades walking before dawn and now writes short books about what remains when a person stops trying to be more.
  His work draws on Ahjan's framework of the alarm within.
  He is based in coastal Maine.
why_this_book: >
  Silas began writing this after his wife asked him, on a perfectly ordinary Tuesday, what he was actually trying to become.
  He had been teaching for thirty-one years.
  He had been trying for thirty-four.
  What Ahjan calls the alarm within named what Silas had spent most of his adult life inside.
  Silas did not study with Ahjan; he encountered his teaching through books in his sixties.
  This book offers the recognition that the alarm is not a verdict — it is a pattern.
