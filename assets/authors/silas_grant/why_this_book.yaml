author_id: silas_grant
topic_id: self_worth
why_this_book: >
  Silas began writing this after his wife asked him, on what he later realized was a perfectly ordinary Tuesday, what he was actually trying to become.
  He had been teaching middle-school English for thirty-one years.
  He had been trying for thirty-four.
  What Ahjan calls the alarm within named what Silas had been spending most of his adult life inside — a low continuous suggestion that the present arrangement of himself was inadequate and that the next thing would resolve it.
  The next thing did not resolve it.
  The next thing rarely does.
  Most writing on self-worth offered affirmations or therapy frameworks.
  Silas had tried both.
  Neither addressed the underlying alarm.
  This book does not promise that a reader will feel better about themselves.
  It offers, instead, the slow contemplative recognition that the alarm is not a verdict — it is a pattern.
  And patterns, given quiet enough attention, can change.
