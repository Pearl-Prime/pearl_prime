author_id: yuki_tanabe
pen_name: "Yuki Tanabe"
bio: >
  Yuki Tanabe grew up between Kyoto and San Francisco, at home in neither, which may be why she writes so well about the grief that has no name.
  She writes about the loss Zen rarely names directly — not the clean koan of impermanence, but the kind that sits in the throat when you cannot say what you lost.
  Her own grief came that way, unannounced and unnameable, and the spiritual language she had inherited felt too tidy for it.
  What helped was not consolation but Kenjin Roshi's Soto Zen inquiry, which did not ask her to accept the loss or move through stages, but to turn toward the one grieving and look.
  She writes for caregivers and people in the middle of life who carry losses they were never given permission to name.
  Her practice is to sit with the ache in the body and ask, gently, who is the one who feels this.
  She did not study with Kenjin Roshi in person; she found his teaching in his books and talks.
