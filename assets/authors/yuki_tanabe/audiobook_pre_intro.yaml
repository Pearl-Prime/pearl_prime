series_line: >
  This audiobook is part of the Clear Seeing Books Series, drawing on Kenjin Roshi's Soto Zen tradition of inquiry — seeing through the story rather than managing it.
author_intro: >
  This book was written by Yuki Tanabe.
author_background: >
  Yuki grew up between Kyoto and San Francisco and writes about the grief that has no name — the kind that sits in the throat when you cannot say what you lost.
  She writes for caregivers and people in the middle of life who carry losses they were never given permission to name.
  What reached her own grief was not consolation but Kenjin Roshi's Soto Zen tradition of inquiry, which asked her to turn toward the one who grieves and look.
why_this_book: >
  Yuki wrote this for the grief that does not qualify — the loss no one sends flowers for, the ending that was never marked.
  Almost everything written about loss assumed a clear before and after, while hers stayed lodged in the throat, unspoken, for years.
  Kenjin Roshi's Soto Zen inquiry did not tell her to accept the loss or pass through stages but to turn toward the one who grieved and look closely.
  This book does not promise the ache will end on a schedule; it offers a way to be with the one who grieves and see through the story that a loss must be named before it can be felt.
  She did not study with Kenjin Roshi in person; she found his teaching in his books and talks.
