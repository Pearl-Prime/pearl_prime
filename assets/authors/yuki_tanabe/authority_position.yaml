author_id: yuki_tanabe
authority_position:
  does_not_claim:
    - clinical diagnosis of prolonged grief disorder or any DSM condition
    - bereavement therapy or grief counseling
    - neurological or psychiatric assessment
    - guaranteed resolution of grief within a defined period
  does_not_promise:
    - elimination of grief or the ache of loss
    - completion of mourning on a fixed timeline
    - recovery from clinical depression or complicated grief
    - a defined sequence of stages or closure
  recommends_professional_support_for:
    - prolonged or complicated grief affecting daily functioning
    - trauma history requiring therapeutic containment
    - depression or suicidal thoughts following a loss
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
