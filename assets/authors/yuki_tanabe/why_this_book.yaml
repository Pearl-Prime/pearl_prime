author_id: yuki_tanabe
topic_id: grief
why_this_book: >
  Yuki wrote this book for the grief that does not qualify — the loss no one sends flowers for, the ending that was never marked, the ache that has no funeral.
  She had carried that kind of grief herself and found that almost everything written about loss assumed a clear before and after, a death with a date, a sorrow she was permitted to feel out loud.
  Hers was none of those things, and so it stayed lodged in her throat, unspoken, for years.
  The Zen she had grown up around spoke beautifully of impermanence but seemed to skip over the raw middle of it.
  What finally reached her was Kenjin Roshi's Soto Zen inquiry, which did not tell her to accept the loss or pass through stages but to turn toward the one who grieved and look closely at her.
  When she stopped trying to resolve the grief and simply sat with the one feeling it, something in the throat began to loosen.
  This book does not treat clinical grief and it does not promise that the ache will end on a schedule.
  It will not move you through stages or tell you when you should feel better.
  It offers a way to be with the one who grieves and to see, gently, through the story that the loss must be named or justified before it can be felt, in the unhurried manner of the tradition she learned it from.
