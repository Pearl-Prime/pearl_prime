topic_id: somatic_healing
why_this_book: >
  Iris began writing this in the years she could not sleep.
  She had two small children, a partner who traveled, a job that ran long, and a body that — by 11 p.m.
  — could not put down what 11 p.m.
  was bringing her.
  The mornings arrived without rest.
  The days felt thinner each year.
  What Ahjan calls the alarm within named what Iris had been calling, privately, an inability to let go.
  The body that cannot sleep is not failing at sleep.
  It is running an alarm that asks to be recognized rather than overridden.
  The contemplative-tradition language gave Iris a way to talk about this without medicalizing it and without prescribing a routine that would not survive a teething child.
  Most writing on sleep prescribed habits.
  Iris's clients had habits.
  They had sleep apps.
  They needed something else.
  This book does not promise eight hours.
  It offers small body-level practices for noticing the alarm before it becomes the night, drawn from a tradition that has watched human nervous systems for centuries.
