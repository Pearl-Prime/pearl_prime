author_id: iris_tam
pen_name: "Iris Tam"
bio: >
  Iris Tam teaches body-based simplicity — contemplative approaches to sleep, eating, and movement for people who want less but do not know where to start letting go.
  She works with millennial women professionals and working parents whose nervous systems are managing more than the body was designed to track and whose sleep, in particular, has become a nightly negotiation with an alarm that does not turn off when the lights do.
  Her writing draws on Ahjan's contemplative-Buddhism framework of the alarm within, applied to the small daily practices that, repeated, change the body's relationship to rest.
  Her practice is built for people who cannot add another routine — what she offers is shorter, smaller, and intended to fit between the obligations the reader already cannot drop.
  She is based in Seattle.
word_count_target: 120-180
