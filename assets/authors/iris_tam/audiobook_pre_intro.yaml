series_line: >
  This audiobook is part of the Stillness Press Series, applying Ahjan's contemplative-Buddhism teaching to body-based simplicity for an overworked nervous system.
author_intro: >
  This book was written by Iris Tam.
author_background: >
  Iris teaches body-based simplicity for people who want less but do not know where to start letting go.
  Her writing draws on Ahjan's framework of the alarm within, applied to sleep, eating, and movement.
  She is based in Seattle.
why_this_book: >
  Iris began writing this in the years she could not sleep.
  The body that cannot sleep is not failing at sleep — it is running an alarm that asks to be recognized rather than overridden.
  What Ahjan calls the alarm within gave Iris a way to talk about this without medicalizing it.
  Iris did not study with Ahjan in person; she came to his teaching through audio recordings on long winter nights.
  This book offers small body-level practices for noticing the alarm before it becomes the night.
