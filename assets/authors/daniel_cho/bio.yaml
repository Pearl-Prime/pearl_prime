author_id: daniel_cho
pen_name: Daniel Cho
bio: 'Daniel Cho is a former trader who studied his own panic from the inside. Daniel writes for tech and finance professionals caught in the anxious, racing mind — not to fix the feeling, but to name what
  it is doing in the body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine
  required.'
word_count_target: 120-180
status: draft
