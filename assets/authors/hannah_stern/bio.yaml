author_id: hannah_stern
pen_name: Hannah Stern
bio: 'Hannah Stern is a working mother who learned boundaries the hard way. Hannah writes for working parents caught in worth, grief, depletion, and the long way back — not to fix the feeling, but to name
  what it is doing in the body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning
  routine required.'
word_count_target: 120-180
status: draft
