author_intro: >
  This book was written by Alex Navarro.
author_background: >
  Alex Navarro translates polyvagal theory for the generation that grew up performing, explaining why the body panics in social situations even when the mind knows it is safe.
  His approach is plainspoken, body-first, and rooted in Pamela Fellows's polyvagal-informed approach to embodiment.
  He is based in Austin.
why_this_book: >
  Alex began writing this because he spent years believing his social anxiety was a personality flaw rather than a nervous-system reflex.
  Pamela Fellows's polyvagal framing gave him a language for social fear as a body's protective response, not a verdict on his worth.
  Most of what he and his peers had been handed told them to fake confidence or push through; almost none of it explained what was happening in the body.
  This book does not promise that nerves will vanish.
  He did not study with Pamela Fellows in person; he encountered her teaching through books and talks.
