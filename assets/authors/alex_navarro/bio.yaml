author_id: alex_navarro
pen_name: "Alex Navarro"
bio: >
  Alex Navarro translates polyvagal theory for the generation that grew up performing — the one that learned to manage an audience before it learned to feel safe in a room.
  He is not a clinician by training; he is a writer and researcher who spent his twenties reverse-engineering his own social panic, reading the science until the thing that had embarrassed him for years finally made sense as physiology rather than character.
  He writes for Gen Z professionals and students whose bodies brace for threat in ordinary social situations — a presentation, a party, an unanswered text — even when their minds know, flatly and certainly, that they are safe.
  His writing draws on Pamela Fellows's polyvagal-informed approach to embodiment, applied to the specific wiring of social fear: a nervous system reading other people as threats and bracing accordingly.
  His practice is plainspoken and unembarrassed: naming what the body is doing in the moment it does it, so the panic stops feeling like a verdict on who you are.
  He is based in Austin.
