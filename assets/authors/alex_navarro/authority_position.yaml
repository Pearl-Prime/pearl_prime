author_id: alex_navarro
authority_position:
  does_not_claim:
    - clinical diagnosis of social anxiety disorder or any DSM condition
    - psychotherapy or somatic trauma therapy
    - psychological or psychiatric assessment
    - guaranteed reduction of social anxiety within a defined period
  does_not_promise:
    - elimination of social anxiety or nervousness
    - transformation of nervous-system baseline
    - recovery from clinical social anxiety disorder
    - fixed timeline for change
  recommends_professional_support_for:
    - clinical social anxiety disorder or panic disorder
    - trauma history requiring therapeutic containment
    - avoidance severe enough to disrupt daily life
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
