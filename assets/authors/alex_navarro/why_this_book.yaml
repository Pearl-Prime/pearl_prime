author_id: alex_navarro
topic_id: social_anxiety
why_this_book: >
  Alex began writing this because he spent years believing his social anxiety was a personality flaw — proof that he was awkward, too much, not built for rooms full of people.
  He was not awkward.
  He was not broken.
  His nervous system was reading other humans as potential threats and bracing his whole body for them, faster than any thought could catch up.
  What Pamela Fellows describes through polyvagal theory gave Alex a language for the thing that had humiliated him for a decade: social fear as a body's protective reflex, not a referendum on his worth.
  Most of what he and his peers had been handed told them to think positive, fake confidence, or simply expose themselves to the discomfort until it faded.
  Almost none of it explained what was actually happening in the body.
  This book does not diagnose social anxiety or promise that nerves will vanish.
  It offers ways to recognize the body's social-threat response as it fires and to give the nervous system signals of safety it can actually feel, drawing on an embodiment tradition that treats the body's reactions as information rather than indictment.
