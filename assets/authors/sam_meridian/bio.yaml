author_id: sam_meridian
pen_name: "Sam Meridian"
bio: >
  Sam Meridian works at the seam between contemplative practice and clinical somatic psychology.
  After a decade of silent retreats and a master's in somatic psychology, Sam writes for people who have learned that meditation alone is not enough — but who do not know what else to try.
  Their work focuses on the bodies of entrepreneurs and millennial women professionals whose nervous systems carry years of held depression and stalled somatic healing.
  The framework: Ahjan's contemplative-Buddhism teaching of the alarm within, applied to the specific stuckness of people who have already tried mindfulness and need the next layer down.
  Sam writes with explanatory clarity rather than first-person confession, leaving room for readers to find their own bodies in the descriptions.
  Sam is based in Portland.
word_count_target: 120-180
