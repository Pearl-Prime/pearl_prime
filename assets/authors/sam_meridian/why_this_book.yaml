author_id: sam_meridian
topic_id: somatic_healing
why_this_book: >
  Sam began writing this after watching their somatic-therapy clients hit a wall that meditation alone could not move and that talk therapy circled around without entering.
  The wall had a shape: chronic low-grade depression, a body that did not lift, a feeling of stuckness that persisted no matter how many breath practices the client did or how many sessions of EMDR they had completed.
  What Ahjan calls the alarm within gave Sam a way to name what was happening — a nervous-system pattern running below the level of either contemplative awareness or cognitive insight, asking for body-level recognition rather than further analysis.
  Most somatic-healing writing collapsed into either trauma-recovery promises or vague invitations to feel.
  Neither matched what Sam saw.
  This book does not claim to heal depression or fix the body.
  It offers a framework for recognizing the alarm pattern under chronic somatic stuckness, alongside the slow contemplative practices that have, for centuries, addressed exactly that layer.
word_count_target: 150-250
