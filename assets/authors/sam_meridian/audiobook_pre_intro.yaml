series_line: >
  This audiobook is part of the Stillness Press Series, bridging contemplative practice and clinical somatic work through Ahjan's alarm-system framework.
author_intro: >
  This book was written by Sam Meridian.
author_background: >
  Sam Meridian works at the seam between contemplative practice and clinical somatic psychology, writing for people who have learned that meditation alone is not enough.
  Their approach draws on Ahjan's framework of the alarm within, applied to chronic somatic stuckness.
  Sam is based in Portland.
why_this_book: >
  Sam began writing this after watching somatic-therapy clients hit a wall that meditation alone could not move.
  The wall had a shape: chronic low-grade depression, a body that did not lift.
  What Ahjan calls the alarm within gave Sam a way to name what was happening — a nervous-system pattern asking for body-level recognition rather than further analysis.
  Sam did not train under Ahjan in person; they encountered his teaching through books and recorded talks.
  This book offers a framework for recognizing the alarm pattern under chronic somatic stuckness.
