author_id: oscar_bello
pen_name: Oscar Bello
bio: 'Oscar Bello is a hospital chaplain who sits with the depleted. Oscar writes for nurses caught in worth, grief, depletion, and the long way back — not to fix the feeling, but to name what it is doing
  in the body in language you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine required.'
word_count_target: 120-180
status: draft
