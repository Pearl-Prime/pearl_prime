pen_name: Mara Okonkwo
bio: 'Mara Okonkwo is a former ER nurse turned somatic educator. Mara writes for managers caught in the anxious, racing mind — not to fix the feeling, but to name what it is doing in the body in language
  you can use the next time it happens. The approach is secular and somatic: recognition, descent, and integration, on a commute or between obligations, no morning routine required.'
word_count_target: 120-180
