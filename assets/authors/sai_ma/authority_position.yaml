author_id: sai_ma
authority_position:
  does_not_claim:
    - clinical diagnosis or treatment of any mental-health condition
    - psychotherapy, counseling, or somatic trauma therapy
    - medical, neurological, or psychiatric assessment
    - religious conversion or required adoption of any belief
  does_not_promise:
    - enlightenment, awakening, or self-mastery on a fixed timeline
    - elimination of suffering, burnout, or difficult emotion
    - spiritual outcomes that substitute for professional care when it is needed
  recommends_professional_support_for:
    - clinical anxiety, depression, or any acute mental-health crisis
    - trauma history requiring therapeutic containment
    - medical or medication-related questions
    - circumstances requiring licensed or emergency care
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
