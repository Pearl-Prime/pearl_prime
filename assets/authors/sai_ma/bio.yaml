author_id: sai_ma
pen_name: "Sai Maa"
bio: >
  Sai Maa is a spiritual teacher in the Hindu Vishnuswami lineage and a Jagadguru — a world teacher
  within that tradition, recognized as the first woman to hold the title in its long history.
  Her work joins the Indian bhakti path of devotion with practices of inner transformation: Diksha,
  the transmission of light into the brain, and Brain Illumination Meditation, a guided clearing of
  the patterns that keep a person from their own depth.
  She teaches the Divine Feminine not as metaphor but as a living, embodied reality, and her aim is
  to cultivate masters rather than followers — people who can stand in their own self-mastery.
  Her teaching integrates Eastern and Western traditions and is inseparable from her humanitarian
  mission, carried through Humanity in Unity and the Temple of Consciousness, and from a conviction
  that love and compassion are a planetary healing force.
  Under the Open Vessel Press imprint her work turns devotion inward — toward those who have poured
  love outward for years and forgotten to include themselves, for whom surrender is a doorway, not a
  defeat.
word_count_target: 120-200
