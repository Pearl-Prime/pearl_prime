series_line: >
  This audiobook is published by Open Vessel Press and draws on Sai Maa's devotional teaching in the
  Vishnuswami lineage — devotion turned inward, for those who forgot to include themselves.
author_intro: >
  These teachings come from Sai Maa.
author_background: >
  Sai Maa is a teacher in the Hindu Vishnuswami lineage who joins the bhakti path of devotion with
  practices of inner transformation, and whose teaching is inseparable from her humanitarian mission.
  Her work turns devotion inward — toward caregivers and high-responsibility people who have poured
  love outward and learned to receive only late: surrender offered as a doorway, not a defeat.
why_this_book: >
  This book is for the people who are very good at love and have quietly left themselves off the list.
  The same surrender that softens a heart toward others can be offered inward, toward the one doing the
  pouring — not as one more task, but as receiving.
  It does not diagnose or promise the end of difficulty; it offers a devotional doorway.
transition_line: >
  Chapter One.
