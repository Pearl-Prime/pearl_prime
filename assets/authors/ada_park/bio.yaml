author_id: ada_park
pen_name: "Ada Park"
bio: >
  Ada Park is a cognitive scientist who spent a decade studying the mechanics of thought before she noticed she had never once questioned who was doing the thinking.
  That single turn — from the contents of the mind to the one aware of them — reorganized her work entirely.
  She writes for analytical people caught in thought loops they cannot reason their way out of: the tech and finance professionals who can model anything except the runaway commentary in their own heads.
  Her writing draws on Kenjin Roshi's Soto Zen tradition of inquiry, where the question is not how to fix a thought but how to see through the story it is telling.
  Her practice is simple and repeatable: when the loop starts, she turns attention back on the watcher rather than the watched, and the loop loses its author.
  She did not study with Kenjin Roshi in person; she came to his teaching through his books and recorded talks.
  She is based in Seattle.
