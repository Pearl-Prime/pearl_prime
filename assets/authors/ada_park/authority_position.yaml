author_id: ada_park
authority_position:
  does_not_claim:
    - clinical diagnosis of any DSM condition
    - psychotherapy or cognitive behavioral therapy
    - neurological or psychiatric assessment
    - guaranteed cessation of intrusive or repetitive thoughts within a defined period
  does_not_promise:
    - elimination of overthinking or rumination
    - a permanently quiet or thought-free mind
    - recovery from obsessive-compulsive or generalized anxiety disorders
    - fixed timeline for change
  recommends_professional_support_for:
    - obsessive-compulsive disorder or clinical rumination
    - generalized anxiety requiring therapeutic care
    - trauma history requiring therapeutic containment
    - active mental health crises
  resolution_compatibility:
    - grounded_shift
    - partial_resolution
status: draft
