book_title_line: >
  This is the dynamic title line; supplied by the naming engine at compile time. If a runtime title is not supplied, the build fails.
series_line: >
  This audiobook is part of the Clear Seeing Books Series, drawing on Kenjin Roshi's Soto Zen tradition of inquiry — seeing through the story rather than managing it.
author_intro: >
  This book was written by Ada Park.
author_background: >
  Ada is a cognitive scientist who spent a decade studying thought before turning her attention to the one who watches it.
  She writes for analytical people caught in loops they cannot reason their way out of, and her work is grounded in Kenjin Roshi's Soto Zen tradition of inquiry.
  She is based in Seattle.
why_this_book: >
  Ada wrote this after years of giving overthinkers better information and watching it change nothing.
  More analysis only fed the loop.
  What finally helped was the Soto Zen inquiry in Kenjin Roshi's books, which asked her to look at the one who was thinking rather than think harder.
  This book does not promise a quiet mind on command; it offers a way to see through the story the loop depends on.
  She did not study with Kenjin Roshi in person; she came to his teaching through his books and talks.
