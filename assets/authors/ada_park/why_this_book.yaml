author_id: ada_park
topic_id: overthinking
why_this_book: >
  Ada wrote this book because she spent years giving people better information and watching it change nothing.
  The overthinkers she worked with were not short on insight.
  They had read the studies, named their patterns, and built elaborate systems to manage their minds — and still lay awake rehearsing conversations that had already ended.
  More analysis only fed the machine.
  What finally helped came from an unexpected place: the Soto Zen inquiry in Kenjin Roshi's books, which did not ask her to think better but to look at the one who was thinking.
  When she turned attention back on the watcher, the thought loop had nothing to hold onto — there was no longer anyone inside it taking the bait.
  This book is not a productivity method and it does not promise a quiet mind on command.
  It does not treat the overthinking as a problem to be solved by more thinking.
  Instead it offers a way to step out of the loop by seeing through the story the loop depends on, drawn from a tradition that has studied the watching mind for centuries.
