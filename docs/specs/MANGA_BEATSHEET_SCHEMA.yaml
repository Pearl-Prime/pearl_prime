# Manga Beatsheet Schema (formal)
#
# Status: AUTHORITY (v1.0.0 — Milestone C Step 0 deliverable per OPD-140, 2026-05-22)
# Author: Pearl_Author + operator review
#
# What this file is:
#   The formal schema describing what a beatsheet IS. A beatsheet is the
#   operator-authored input contract consumed by the continuity_state generator
#   (Pearl_Author skill, Milestone C Step 1+) to produce N per-panel
#   continuity_state YAMLs per episode.
#
# Derived from: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/continuity_state/ep_001/_extracted_beatsheet.yaml
#   (the reverse-extracted beatsheet for ep_001) — NOT designed from theory.
#
# Consumed by:
#   - scripts/manga/continuity_state_generator.py (Milestone C Step 1+; not yet built)
#   - docs/PEARL_AUTHOR_CONTINUITY_STATE_GENERATOR.md (operator authoring guide; not yet written)
#
# Produces:
#   - artifacts/manga/<series_id>/continuity_state/<episode_id>/<panel_id>.yaml
#     for every beat in `beats[]`. Output schema: docs/specs/MANGA_CONTINUITY_STATE_SPEC.md v1.0.0
#
# Cross-spec references:
#   - docs/specs/MANGA_CONTINUITY_STATE_SPEC.md — the output schema
#   - docs/PEARL_AUTHOR_BEATSHEET_DESIGN_NOTES.md — field-by-field classification
#     + heuristic rules H1-H10 + per-archetype dispatch table + round-trip test
#   - config/manga/panel_templates/iyashikei.yaml — archetype catalog (genre-specific)
#   - config/manga/light_rigs/iyashikei.yaml — light_rig library (genre-specific)
#   - config/source_of_truth/manga_profiles/series/<series>.scene_inventory.yaml — scene→rig binding

schema_version: "1.0.0"
schema_id: manga_beatsheet
authority_doc: docs/specs/MANGA_BEATSHEET_SCHEMA.yaml
companion_docs:
  - docs/specs/MANGA_CONTINUITY_STATE_SPEC.md
  - docs/PEARL_AUTHOR_BEATSHEET_DESIGN_NOTES.md
  - docs/MANGA_V5_CATALOG_ROLLOUT_PLAN.md

# ── Top-level beatsheet structure ────────────────────────────────────────────

type: object
required:
  - schema_version
  - beatsheet_type
  - series_id
  - episode_id
  - stage_characters
  - beats

properties:

  schema_version:
    type: string
    description: "Schema version, e.g. '1.0.0'. Used by the generator to detect schema drift."
    enum: ["1.0.0"]

  beatsheet_type:
    type: string
    description: "Currently only 'episode' is supported. Reserved for future 'scene'/'arc' beatsheet types."
    enum: ["episode"]

  authority_schema:
    type: string
    description: "Path to this schema file. Convention; aids tool discovery."

  # ── Series identity (header) ──────────────────────────────────────────────

  series_id:
    type: string
    pattern: "^[a-z0-9_]+__[a-z0-9_]+__[a-z]{2}_[A-Z]{2}__[a-z0-9_]+__[a-z0-9_]+$"
    description: "Long-form series_id matching `chapter_script_series_id_long` in the series profile. e.g. 'stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying'."

  series_profile_path:
    type: string
    description: "Path to the series profile YAML. e.g. 'config/source_of_truth/manga_profiles/series/stillness_en_01.yaml'."

  scene_inventory_path:
    type: string
    description: "Path to the series scene_inventory YAML."

  style_state_path:
    type: string
    description: "Path to the series style_state YAML. Generator uses this for style-clause prompt injection (not embedded in continuity_state output)."

  panel_template_path:
    type: string
    description: "Path to the genre's panel_templates YAML (e.g. 'config/manga/panel_templates/iyashikei.yaml'). Source for archetype dispatch."

  light_rig_library:
    type: string
    description: "Path to the genre's light_rigs YAML. Source for H1 light_rig_id derivation."

  episode_id:
    type: string
    pattern: "^ep_\\d{3}$"
    description: "Episode identifier, zero-padded to 3 digits. e.g. 'ep_001'."

  chapter_script_path:
    type: string
    description: "Path to the chapter_script the beatsheet projects from. Generator may cross-reference but does not require."

  stage_characters:
    type: array
    description: "List of character_ids on stage in this episode. For ep_001: just ['mira_aoki']. Multi-character episodes list all named cast appearing in at least one beat."
    items:
      type: string
      pattern: "^[a-z][a-z0-9_]*$"
    minItems: 1

  # ── Defaults inherited by beat 1 ──────────────────────────────────────────

  defaults:
    type: object
    description: "Initial state inherited by beat 1 (the implicit 'beat 0'). Subsequent beats inherit-and-delta from this + the previous beat."
    properties:

      scene_id:
        type: string
        description: "Initial scene_id. Must be present in scene_inventory[series_id]."

      temporal:
        type: string
        enum: [dawn, morning, midday, afternoon, evening, dusk, night]
        description: "Initial temporal. Must be supported by at least one light_rig in scene_inventory[scene_id].light_rigs."

      light_rig_id:
        type: string
        description: "OPTIONAL initial light_rig override. Default: H1 derivation from (scene_id, temporal)."

      prop_state:
        type: object
        description: "Series-baseline props on stage at episode open. e.g. {phone: face_down, succulent_in_clay_pot: normal}. Every beat inherits + appends."
        additionalProperties:
          type: string
          description: "prop state value; must be present in prop_evolution_enum for that prop_type per MANGA_CONTINUITY_STATE_SPEC §2."

      weather_anchor:
        type: string
        description: "Initial weather anchor. Emitted only on beat 1 + scene_id transitions where scene_inventory declares a weather_anchor."

  # ── The beats list (1:1 with rendered panels) ─────────────────────────────

  beats:
    type: array
    description: "Ordered list of beats. Each beat produces exactly one panel YAML in v1.0. The beat ORDER == the panel order. panel_id is generated from (episode_id, 1-based index)."
    minItems: 1
    maxItems: 100  # webtoon panel max per chapter_script convention
    items:
      $ref: "#/definitions/Beat"

# ── Definitions ──────────────────────────────────────────────────────────────

definitions:

  Beat:
    type: object
    required:
      - beat_id
      - archetype
    properties:

      beat_id:
        type: string
        pattern: "^b\\d{2,3}$"
        description: "Operator-visible beat identifier, e.g. 'b01'..'b35'. Used in cross-references (rhyme_partner_beat). NOT the same as the generated panel_id."

      archetype:
        type: string
        description: "REQUIRED. The archetype dispatched by the generator. Must be a key in panel_template_path's archetypes block. e.g. 'tea_beat_close_up', 'chest_breath_micro', 'sparse_establishing_wide'. See iyashikei.yaml for the 19 supported in V4 launch."

      beat_type:
        type: string
        enum: [micro, spatial, standard, long_drop, miyazaki_ma]
        description: |
          OPTIONAL. Defaults to the archetype's primary beat_type from panel_template
          (iyashikei.yaml archetypes.<archetype>.beat_type.primary).
          Operator MUST override to standard+ for scene transitions (V4 spec §6.3.A invariant 1).

      intent:
        type: string
        description: "OPTIONAL operator commentary. Copied verbatim into the generated panel's continuity_invariants list. Typically lifted from the chapter_script's `intent` field for the corresponding panel."

      notes:
        type: string
        description: "OPTIONAL free-form operator notes. Also emitted into continuity_invariants."

      # ── Scene overrides ────────────────────────────────────────────────

      scene:
        type: object
        description: "Scene state override block. Omit entirely if no scene transition. Operator must include this block on every scene-jump beat (beat_type must be standard+) and on temporal transitions."
        properties:
          id:
            type: string
            description: "New scene_id. Must exist in scene_inventory."
          temporal:
            type: string
            enum: [dawn, morning, midday, afternoon, evening, dusk, night]
            description: "New temporal. Generator validates next-step-in-cycle UNLESS beat_type=standard+."
          light_rig_id:
            type: string
            description: "OPTIONAL operator override. Default: H1 derivation."

      # ── Character state overrides (per stage character) ─────────────────

      character:
        type: object
        description: "Per-character state overrides. Key is character_id from stage_characters. Omit entirely for beats with no character delta. Set <char>: null to explicitly suppress (empty character_state, e.g. ep001_035 episode card)."
        additionalProperties:
          oneOf:
            - type: "null"
              description: "Explicit suppression — generator emits empty character_state and excludes from L2 cutout."
            - $ref: "#/definitions/CharacterState"

      # ── Prop state overrides ────────────────────────────────────────────

      props:
        type: object
        description: "Additive prop_state deltas. Declare prop introductions + state transitions for this beat. Existing props persist via inheritance unless props_clear/props_reset is set."
        additionalProperties:
          type: string
          description: "prop state value; must be present in prop_evolution_enum for that prop_type. Generator emits intro/transition commentary into continuity_invariants."

      props_clear:
        type: boolean
        default: false
        description: "If true, generator emits prop_state: {}. Use sparingly — only for episode-card-like panels with no scene. e.g. ep001_035."

      props_reset:
        type: boolean
        default: false
        description: "If true, snapshot current prop_state (saved for later props_restore), then replace with this beat's `props` block. Use for scene excursions (e.g. flashback): kitchen props are saved, conference_table is introduced fresh."

      props_restore_from_scene_exit:
        type: boolean
        default: false
        description: "If true, restore the prop_state snapshotted at the most recent props_reset. Use when returning from a scene excursion (e.g. flashback → kitchen)."

      # ── Relational fields ───────────────────────────────────────────────

      shared_attention_anchor:
        oneOf:
          - type: "null"
          - type: string
            description: "prop_id (from this beat's prop_state) or character_id (from stage_characters)."
        description: "What's the focus of attention? Drives gaze_direction heuristic H2. Operator-authored per beat (B-cat)."

      # ── Tension vector override (OPD-146) ───────────────────────────────

      tension_override:
        type: string
        enum: [rising, steady, easing, reversing]
        description: |
          OPTIONAL operator override for relational_field.emotional_tension_vector.direction.
          Default (per OPEN-3 / OPD-146): generator emits literal H3 numerical-delta semantic
          (rising > 0, steady = 0, diminishing < 0 — mapped to enum). Operator sets this
          field to override with narrative semantics (e.g. `steady` on a +0.1 dial bump
          that's NOT meant as activation). Added in schema v1.0 per OPD-146 (2026-05-24).

      # ── Rhyme partner reference ─────────────────────────────────────────

      rhyme_partner_beat:
        type: string
        pattern: "^b\\d{2,3}$"
        description: "OPTIONAL. Used by archetype=pendulation_pair_visual_rhyme to point at the partner beat for composition copying. V1: documentation only; operator re-authors composition. V2 may auto-copy."

  CharacterState:
    type: object
    description: "Per-character per-beat state delta. All fields optional; omitted fields inherit from previous beat. Per V4 spec §6.1 + §6.2."
    properties:

      on_frame:
        type: boolean
        description: "OPTIONAL. Default: derived from archetype.subject_type (H5). Override to false for POV-shots / pet_companion / implied-character beats."

      role:
        type: string
        enum: [subject, implied_listener, off_stage]
        description: "OPTIONAL. Default: derived from on_frame (H6). subject if on_frame, implied_listener if off_frame."

      pose_id:
        type: string
        description: "OPTIONAL. Default: archetype's default_pose_id (D-cat per dispatch table §3). Operator override per intent. e.g. 'hands_wrapping_cup', 'front_portrait_seated_calm'."

      expression_dial:
        type: number
        minimum: 0.0
        maximum: 1.0
        multipleOf: 0.1
        description: "REQUIRED on character-present beats unless inherited. 0.0=neutral, 1.0=peak. Generator enforces |Δ|≤0.3 on micro beats per V4 spec §6.3.A invariant 6. Quantized to 0.1 buckets per V4 spec §6.8 Strategy 2."

      emotional:
        type: string
        enum:
          - calm
          - calm_with_subtle_unease
          - anxious
          - anxious_diminishing
          - exhausted
          - present
          - dissociating
          - joyful_quiet
          - joyful_active
        description: "Per emotional_state_enum (V4 spec §6.2). Heuristic invariant (V4 spec §6.3.B emotional_pendulation_iyashikei) flags discontinuous jumps as WARN at V4 launch."

      gaze:
        type: string
        description: |
          OPTIONAL. Default: derived from shared_attention_anchor (H2).
          Allowed values per gaze_enum (V4 spec §6.2):
            - at_camera
            - at_named_object_<prop_id>      (interpolated from prop_id)
            - at_named_character_<char_id>   (interpolated from char_id)
            - off_frame_left | off_frame_right | off_frame_up | off_frame_down
            - eyes_closed
            - middle_distance
          Generator emits at_named_object_X / at_named_character_Y with the actual ID interpolated.

      hand_state:
        type: string
        description: |
          OPTIONAL. Default: archetype default (D-cat). Operator override per intent.
          Allowed values per hand_state_enum (V4 spec §6.2):
            - relaxed_open
            - clenched
            - gripping_<prop_id>
            - wrapping_<prop_id>
            - reaching_for_<prop_id>
            - gesturing_open
            - tucked_self_soothing
            - covering_face

      breath_phase:
        type: string
        enum: [quickening, holding, inhale, exhale, exhale_settling, deep_steady]
        description: "REQUIRED when archetype=chest_breath_micro (D-cat dispatch). Generator EMITS field only for that archetype; INVALID on other archetypes."

# ── Generator behavior contract ──────────────────────────────────────────────
# (Informational — describes what the generator must do; not user-authored config.)

generator_contract:

  inheritance_model:
    description: "Each beat inherits the full continuity_state of the previous beat (or `defaults` if beat 1), then applies the beat's explicit overrides + archetype dispatch + heuristic rules."
    order:
      - "1. Initialize state = (beat_1 ? defaults : prev_beat_state.deep_copy())"
      - "2. Apply beat.scene overrides (if present)"
      - "3. Apply beat.character.<id> overrides (if present)"
      - "4. Apply beat.props / props_clear / props_reset / props_restore (if present)"
      - "5. Apply beat.shared_attention_anchor"
      - "6. Run archetype dispatch (D-cat fields: default pose_id, hand_state, breath_phase emit/suppress, subject_type-driven on_frame)"
      - "7. Run heuristic rules H1-H10 (C-cat fields: light_rig_id, gaze, on_frame, role, weather_anchor, etc.)"
      - "8. Emit auto-commentary continuity_invariants (scene jumps, prop introductions, dial deltas, light_rig transitions, v41 face boilerplate)"
      - "9. Append operator intent / notes to continuity_invariants"
      - "10. Compute panel_id + inherits_from"
      - "11. Write panel YAML"

  validation:
    description: "After all 35 panels are generated, the generator MUST run validate_continuity_invariants.py to confirm class-A gates pass. Generator output is INVALID if any class-A gate FAILs (per V4 spec §6.3.A)."
    command: "python3 scripts/manga/validate_continuity_invariants.py --continuity-state-dir <output_dir>"

  round_trip_test:
    description: "Per Milestone C exit criteria. Generator must reproduce the ep_001 35 YAMLs from _extracted_beatsheet.yaml within tolerance class declared in docs/PEARL_AUTHOR_BEATSHEET_DESIGN_NOTES.md §7.1. Test command per §7.3 of same doc."

  errors:
    description: "Generator MUST FAIL LOUDLY (not warn) on these conditions."
    conditions:
      - "beat has scene transition (scene.id != prev.scene_id) but beat_type ∉ {standard, long_drop, miyazaki_ma}"
      - "beat has temporal transition not matching next-step-in-cycle UNLESS beat_type=standard+"
      - "beat has |expression_dial - prev.expression_dial| > 0.3 AND beat_type=micro"
      - "beat has gaze=at_named_object_X where X ∉ prop_state AND X ∉ scene_state"
      - "beat has light_rig_id ∉ scene_inventory[scene_id].light_rigs"
      - "beat has prop_state transition that's non-adjacent in prop_evolution_enum"
      - "beat has breath_phase set but archetype != chest_breath_micro"
      - "beat references rhyme_partner_beat that doesn't exist"
      - "beat has character_state for a character_id not in stage_characters"

# ── Versioning ───────────────────────────────────────────────────────────────

version_history:
  - version: "1.0.0"
    date: "2026-05-22"
    author: "Pearl_Author + operator review"
    rationale: "Initial schema, Milestone C Step 0 deliverable per OPD-140. Bottom-up extraction from ep_001's 35 panel YAMLs. NOT designed from theory."
    coverage:
      - "Single-character episodes (multi-character deferred to v1.1 per OPEN-7)"
      - "iyashikei genre archetypes (12 of 19 exercised by ep_001)"
      - "Single locale (en_US) — locale aesthetic deltas are style_state concern, not beatsheet concern (per OPEN-8)"
    amendments:
      - date: "2026-05-24"
        author: "Pearl_Author per OPD-146"
        change: "Added Beat.tension_override (optional, enum [rising|steady|easing|reversing]). Encodes operator-narrative override for emotional_tension_vector.direction per OPD-146 / OPEN-3. Schema version unchanged (additive, optional field; v1.0.0 ergonomic extension)."

# ── Future extensions (NOT yet schema; documented for direction) ─────────────

planned_v1_1:
  - "Multi-character beats: character block keys all of stage_characters; per-character on_frame independent"
  - "Beat shorthand: expression_dial: '+0.1' parsed as delta relative to inherited value"
  - "Beat shorthand: emotional: 'inherit' explicit no-op (clarity over absence)"
  - "Sub-beats: a single beat with N sub-beats expanding to N panels with auto-progressed dial / inherited pose"

planned_v1_2:
  - "Generator output: emit telemetry per V4 spec §6.11 (cache hit/miss tied to beatsheet authoring patterns)"
  - "Beatsheet linter: warn on unused archetype defaults (operator could simplify)"

planned_v2_0_phase_2:
  - "Per-locale beatsheet override file (ja-JP/ko-KR aesthetic deltas per Milestone F)"
  - "Genre-agnostic schema (this v1.0 is iyashikei-tuned via archetype/light_rig references)"
  - "LLM-assisted beatsheet drafting from prose chapter_script (Pearl Star qwen-instruct, no paid APIs)"

# ── Authority chain ──────────────────────────────────────────────────────────

authority_chain:
  primary: "docs/MANGA_V5_CATALOG_ROLLOUT_PLAN.md §Milestone-C Step 0 (operator decision OPD-140)"
  schema_validators_target: "scripts/manga/validate_beatsheet.py (Milestone C Step 1+; not yet built)"
  generator: "scripts/manga/continuity_state_generator.py (Milestone C Step 1+; not yet built)"
  output_spec: "docs/specs/MANGA_CONTINUITY_STATE_SPEC.md v1.0.0"
  related_specs:
    - "docs/specs/MANGA_LAYER_RENDER_CONTRACT_SPEC.md (V4) — downstream render contract"
    - "docs/specs/MANGA_V5_LAYERED_ARCHITECTURE.md (V5.1) — downstream render pipeline"

# — end of schema —
