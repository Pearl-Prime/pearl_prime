[pytest]
# Phoenix test configuration — see docs/FULL_REPO_TEST_SUITE_PLAN.md and docs/ROBUST_INTELLIGENT_TESTING.md
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
# Default timeout per test (seconds); use @pytest.mark.timeout(N) to override. Requires pytest-timeout.
timeout = 120
markers =
    slow: marks tests as slow (excluded from fast CI run)
    integration: marks tests that need external resources or full pipeline
    e2e: end-to-end tests (compile, render, etc.)
    sanity: fast sanity checks (config load, registry consistency); run first for quick feedback
    intelligent: data-driven / parametrized tests over configs and locales; catch regressions early
