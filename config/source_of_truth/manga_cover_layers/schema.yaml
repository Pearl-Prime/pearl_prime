        reading_direction: rtl
        rating_system: publisher_self
        barcode_position: lower_right
        isbn_prefix: "978-4"
        barcode_type: JAN_EAN13
        paper_thickness_mm_per_page: 0.060
        cover_board_thickness_mm: 0.30
        dust_jacket: true
        flaps: true
        flap_width_mm: 80
        color_profile: Japan_Color_2011_Coated
