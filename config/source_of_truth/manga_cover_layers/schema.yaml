# Manga Cover Layer Selection Schema
# Governs: brand_signatures/, series_signatures/, volume_variations/
# Version: 1.0.0
# Owner: Pearl_Architect
# Updated: 2026-04-18
#
# This schema defines valid field types, required fields, and enumerated values
# for the four-layer manga cover uniqueness system.
# All YAML files under manga_cover_layers/ must pass yaml.safe_load() validation.
# Reference implementation: specs/manga_cover_uniqueness_engine.md

version: "1.0.0"
updated: "2026-04-18"

layers:
  brand_signature:
    description: "Immutable per-brand visual identity. Never changes once set."
    file_pattern: "brand_signatures/{brand_id}.yaml"

    required_fields:
      - brand_id
      - display_name
      - primary_palette
      - composition_family
      - mood_register
      - typography_family
      - taboo_elements
      - logo_lockup

    optional_fields:
      - tagline
      - series_defaults
      - cover_evolution_principle
      - production_notes
      - example_references

    field_types:
      brand_id:
        type: string
        format: slug
        description: "Lowercase hyphenated slug. Primary key. Never changes."
        example: "stillness-press"

      display_name:
        type: string
        description: "Human-readable brand name for editorial use."
        example: "Stillness Press"

      tagline:
        type: string
        description: "Short brand tagline. Used in marketing and back flap copy."
        example: "Stories that breathe."

      primary_palette:
        type: list
        min_items: 5
        max_items: 8
        items:
          type: object
          required_fields:
            - name
            - hex
            - role
          optional_fields:
            - notes
          field_types:
            name:
              type: string
              description: "Descriptive color name. Lowercase with underscores."
              example: "morning_mist"
            hex:
              type: string
              format: hex_color
              description: "6-digit hex color with # prefix."
              example: "#E8EAD8"
            role:
              type: enum
              values:
                - background
                - primary
                - accent
                - secondary
                - dark
                - light
              description: "Functional role of this color in the brand palette."
            notes:
              type: string
              description: "Design rationale for this color choice."

      composition_family:
        type: enum
        values:
          - portrait
          - environmental
          - symbolic
          - action
          - ensemble
        description: >
          Structural composition approach for all covers in this brand.
          portrait: character fills frame; face or figure is subject.
          environmental: setting dominates; character is presence in world.
          symbolic: object or abstract element carries the cover; character may be absent.
          action: dynamic pose and motion; energy lines acceptable.
          ensemble: multiple characters; group arrangement is the design problem.

      mood_register:
        type: enum
        values:
          - restrained
          - energetic
          - melancholic
          - epic
          - playful
          - sinister
        description: >
          Tonal baseline for all covers in this brand.
          restrained: no speed lines, no bursts, no action. Stillness.
          energetic: dynamic, vivid, motion-forward.
          melancholic: subdued, introspective, low saturation.
          epic: grand scale, dramatic lighting, sweeping.
          playful: bright, loose, comedic energy.
          sinister: dark, threatening, oppressive.

      typography_family:
        type: object
        required_fields:
          - display_font_id
          - body_font_id
          - accent_font_id
        optional_fields:
          - title_weight
          - display_font_notes
          - volume_number_font_id
          - volume_number_style
          - creator_credit_font_id
          - creator_credit_style
        field_types:
          display_font_id:
            type: string
            description: "Font ID from the shared font registry. Used for series title on cover."
          body_font_id:
            type: string
            description: "Font ID for body text (blurb, bio, smaller text)."
          accent_font_id:
            type: string
            description: "Font ID for accent text (volume number, callouts)."
          title_weight:
            type: integer
            description: "CSS-style font weight (100-900). 400 = regular, 700 = bold."
          display_font_notes:
            type: string
            description: "Design rationale for display font choice."
          volume_number_font_id:
            type: string
            description: "Font ID for volume number display. Defaults to accent_font_id."
          volume_number_style:
            type: string
            description: "Prose description of volume number styling."
          creator_credit_font_id:
            type: string
            description: "Font ID for creator credit text."
          creator_credit_style:
            type: string
            description: "Prose description of creator credit styling."

      taboo_elements:
        type: list
        min_items: 1
        items:
          type: string
          description: "Visual element this brand never uses on any cover."
        description: >
          Elements in this list are enforced as negative constraints in the cover
          brief. No volume variation or market adaptation may reintroduce a taboo element.
        examples:
          - speed_lines
          - screentone_burst_effects
          - dramatic_action_poses
          - dark_horror_imagery
          - highly_saturated_colors
          - red_tones_dominant
          - military_or_weapon_imagery
          - urban_industrial_backgrounds
          - exclamation_graphic_effects
          - digital_HUD_elements
          - isekai_status_windows

      logo_lockup:
        type: object
        required_fields:
          - position
          - size_relative
        optional_fields:
          - front_cover_position
          - spine_position
          - color_variant
          - notes
        field_types:
          position:
            type: string
            description: "Primary logo position. Use 'none' to omit from that surface."
            examples:
              - lower_left_back_cover
              - upper_left_front_cover
              - lower_right_back_cover
              - none
          front_cover_position:
            type: string
            description: "Logo position on front cover. 'none' if brand does not use logo on front."
          spine_position:
            type: string
            description: "Logo position on spine. Typically 'bottom' or 'top'."
            examples:
              - bottom
              - top
              - none
          size_relative:
            type: float
            min: 0.02
            max: 0.20
            description: "Logo size as fraction of cover width. Typical range: 0.05-0.12."
          color_variant:
            type: string
            description: "Which brand palette color to use for logo rendering."
          notes:
            type: string
            description: "Notes on logo design and placement philosophy."

      title_placement:
        type: object
        optional: true
        field_types:
          zone:
            type: enum
            values:
              - upper
              - lower
              - center
              - left
              - right
          alignment:
            type: enum
            values:
              - left
              - center
              - right
          horizontal_inset_mm:
            type: float
          vertical_inset_mm:
            type: float
          max_font_size_pt:
            type: integer
          color:
            type: string
            description: "Brand palette color name for title text."

      series_defaults:
        type: object
        optional: true
        description: "Default values inherited by series signatures unless overridden."

      cover_evolution_principle:
        type: string
        optional: true
        description: "Prose statement of intended visual evolution across a series."

      production_notes:
        type: object
        optional: true
        field_types:
          paper_stock_preference:
            type: enum
            values:
              - matte
              - gloss
              - silk
          lamination:
            type: enum
            values:
              - matte
              - gloss
              - soft_touch
              - none
          spot_uv:
            type: boolean
          embossing:
            type: boolean

      example_references:
        type: list
        optional: true
        items:
          type: object
          required_fields:
            - title
            - publisher
          optional_fields:
            - notes
          field_types:
            title:
              type: string
            publisher:
              type: string
            notes:
              type: string

  series_signature:
    description: "Per-series visual modifiers within brand constraints."
    file_pattern: "series_signatures/{series_id}.yaml"

    required_fields:
      - series_id
      - brand_id
      - color_accent_index
      - typography_weight
      - composition_variant
      - recurring_motif
      - protagonist_design_ref

    optional_fields:
      - location_bank
      - tone_arc
      - secondary_characters
      - genre_tags
      - demographic

    field_types:
      series_id:
        type: string
        format: slug
        description: "Globally unique slug. Convention: {brand_id}--{series_slug}."
        example: "stillness-press--wandering-harvest"

      brand_id:
        type: string
        format: slug
        description: "Foreign key to brand signature. Must match an existing brand_signatures/{brand_id}.yaml."

      color_accent_index:
        type: integer
        min: 0
        description: "Index into brand's primary_palette list. This series emphasizes this color."

      typography_weight:
        type: enum
        values:
          - light
          - regular
          - bold
        description: "Font weight for series title text within brand's display font family."

      composition_variant:
        type: string
        description: >
          Specific variant within brand's composition_family.
          Examples for 'environmental': environmental_foreground, environmental_midground,
          environmental_aerial, environmental_intimate.
          Must be a valid variant for the brand's composition_family.

      recurring_motif:
        type: object
        required_fields:
          - name
          - description
          - placement_default
        optional_fields:
          - color_override
          - scale_range
        field_types:
          name:
            type: string
            description: "Short name for the motif. Used as identifier."
            example: "barley_stalk"
          description:
            type: string
            description: "Full description of the motif. Used in cover brief generation."
            example: "A single stalk of barley, including seed head and two leaves."
          placement_default:
            type: string
            description: "Default placement of motif on cover."
            example: "right_edge_lower_third"
          color_override:
            type: string
            description: "If the motif uses a specific color, specify palette color name here."
          scale_range:
            type: string
            description: "Relative scale of motif on cover. E.g., '5-8% of cover height'."

      protagonist_design_ref:
        type: string
        format: file_path
        description: "Path to protagonist character sheet YAML or image."
        example: "assets/characters/wandering-harvest/protagonist.yaml"

      location_bank:
        type: list
        optional: true
        min_items: 8
        description: "Pool of settings for volume variation setting_variant_index selection."
        items:
          type: object
          required_fields:
            - name
            - description
            - environment_type
          optional_fields:
            - season
            - time_of_day
            - weather
            - interior
          field_types:
            name:
              type: string
              example: "rice_paddy_dawn"
            description:
              type: string
              example: "A rice paddy at dawn in summer. Mist over standing water."
            environment_type:
              type: enum
              values:
                - agricultural
                - forest
                - coastal
                - mountain
                - urban
                - interior
                - riverine
                - village
                - temple
                - transit
                - rooftop
                - open_field
            season:
              type: enum
              values:
                - spring
                - summer
                - autumn
                - winter
                - unspecified
            time_of_day:
              type: enum
              values:
                - dawn
                - morning
                - midday
                - afternoon
                - dusk
                - evening
                - night
            weather:
              type: enum
              values:
                - clear
                - overcast
                - rain
                - mist
                - snow
                - light_rain
            interior:
              type: boolean

      tone_arc:
        type: list
        optional: true
        description: >
          Intended mood arc across the series by volume index (0-based cycling).
          Engine uses this to validate mood_beat selection against story intent.
        items:
          type: enum
          values:
            - hopeful
            - tense
            - triumphant
            - dark
            - resolution
            - reflective

      secondary_characters:
        type: list
        optional: true
        description: "Characters eligible to appear as character_focal in volume variations."
        items:
          type: object
          required_fields:
            - name
            - character_type
          optional_fields:
            - design_ref
            - first_eligible_volume
            - last_eligible_volume
          field_types:
            name:
              type: string
            character_type:
              type: enum
              values:
                - antagonist
                - supporting_primary
                - supporting_secondary
            design_ref:
              type: string
              format: file_path
            first_eligible_volume:
              type: integer
              min: 1
            last_eligible_volume:
              type: integer
              description: "Omit if character appears to end of series."

      genre_tags:
        type: list
        optional: true
        items:
          type: string
          examples:
            - iyashikei
            - slice_of_life
            - seinen
            - josei
            - shonen
            - shojo
            - supernatural
            - romance
            - mystery
            - historical

      demographic:
        type: enum
        optional: true
        values:
          - shonen
          - shojo
          - seinen
          - josei
          - kodomomuke
          - all_ages

  volume_variation:
    description: "Per-volume selection indices into variant banks. Engine-generated, not manually authored."
    file_pattern: "volume_variations/{series_id}/vol_{volume_number:04d}.yaml"

    required_fields:
      - series_id
      - volume_number
      - seed
      - character_focal
      - pose_variant_index
      - setting_variant_index
      - color_temperature
      - mood_beat
      - background_treatment
      - focal_element

    optional_fields:
      - override_notes
      - anti_repetition_adjustments_applied

    field_types:
      series_id:
        type: string
        format: slug
        description: "Foreign key to series signature."

      volume_number:
        type: integer
        min: 1
        description: "1-indexed volume number."

      seed:
        type: integer
        description: "32-bit deterministic hash seed for this volume. Computed from brand+series+volume+market key."

      character_focal:
        type: enum
        values:
          - protagonist
          - antagonist
          - supporting_primary
          - supporting_secondary
          - ensemble
          - no_character
        description: >
          Who is on the cover.
          no_character: valid only for environmental or symbolic composition families.
          Anti-repetition: protagonist may not appear more than 3 consecutive volumes.

      pose_variant_index:
        type: integer
        min: 0
        description: >
          Index into genre pose library for the character focal type.
          Anti-repetition: must differ from previous volume's pose_variant_index.

      setting_variant_index:
        type: integer
        min: 0
        description: "Index into series location_bank or genre location bank."

      color_temperature:
        type: enum
        values:
          - warm
          - neutral
          - cool
        description: >
          Color palette distribution bias for this volume.
          Anti-repetition: max 2 consecutive volumes with identical temperature.

      mood_beat:
        type: enum
        values:
          - hopeful
          - tense
          - reflective
          - triumphant
          - ominous
        description: >
          Emotional tone of the cover.
          hopeful: open composition, light from above, warm temperature, open expression.
          tense: compressed composition, dramatic shadows, cooler temperature.
          reflective: space and distance, even diffuse lighting, neutral temperature.
          triumphant: expanded composition, high-key lighting, warm temperature.
          ominous: low-key lighting, cool-to-dark temperature, obscured expression.

      background_treatment:
        type: enum
        values:
          - blown_out
          - pattern
          - environment
          - solid_color
          - gradient
        description: >
          How the background area of the cover is treated.
          blown_out: forbidden for restrained/melancholic mood registers.
          pattern: must use palette colors only.
          environment: rendered scene background. Default for environmental brands.
          solid_color: single flat color from brand palette.
          gradient: two-color gradient within palette.

      focal_element:
        type: enum
        values:
          - character_dominant
          - setting_dominant
          - object_symbolic
        description: >
          Primary visual hierarchy.
          character_dominant: character occupies 40-70% of cover area.
          setting_dominant: character occupies 10-30%; setting leads.
          object_symbolic: non-character object in primary focal zone.

      override_notes:
        type: string
        optional: true
        description: "Reason for any manually overridden fields. Include approver and date."

      anti_repetition_adjustments_applied:
        type: list
        optional: true
        description: "List of fields adjusted by anti-repetition guardrails. For audit trail."
        items:
          type: string

  market_adaptation:
