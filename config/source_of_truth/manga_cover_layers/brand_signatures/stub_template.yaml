# ─────────────────────────────────────────
# COMPOSITION FAMILY
# ─────────────────────────────────────────

composition_family: TODO
# Choose ONE: portrait | environmental | symbolic | action | ensemble
#
# portrait:      character fills frame; face or figure is the visual subject
# environmental: setting dominates; character is present as a presence in the world
# symbolic:      object, texture, or abstract element carries the cover
# action:        dynamic pose and motion; energy lines acceptable
# ensemble:      multiple characters; group arrangement is the design problem
#
# This choice shapes every cover in the brand. Choose carefully.
# A brand that mixes composition families loses visual identity.

composition_notes: "TODO"
# Prose notes on how this composition family manifests for this brand.
# What are the specific rules? What percentage of cover area does the character occupy?
# What composition variants does this brand use within the family?
# Example: "Portrait covers place the protagonist from mid-chest up.
#           Character occupies 60-80% of cover area. Background is always bokeh
#           or soft-focus location, never blank."

# ─────────────────────────────────────────
# MOOD REGISTER
# ─────────────────────────────────────────

mood_register: TODO
# Choose ONE: restrained | energetic | melancholic | epic | playful | sinister
#
# restrained:  no speed lines, no bursts, no action; stillness
# energetic:   dynamic, vivid, motion-forward
# melancholic: subdued, introspective, low saturation
# epic:        grand scale, dramatic lighting, sweeping
# playful:     bright, loose, comedic energy
# sinister:    dark, threatening, oppressive
#
# Mood register governs: saturation ceiling, acceptable pose energy,
# whether speed lines are permitted, whether dark backgrounds are permitted.

mood_notes: "TODO"
# Explain how this register manifests for this brand.
# What visual choices define the register? What is explicitly forbidden?
# What is the emotional experience the reader should feel when looking at the cover?

