title: 'After the Flame: When Everything Is Too Much'
subtitle: A Field Guide for Founders Navigating Burnout Recovery
cover_tagline: Your to-do list isn't a list anymore. It's a weather system.
description:
  short_blurb: For the founder where every fire routes to them and the load never
    stops surging at once. This is a secular field guide for the moment everything
    is too much — telling the genuinely urgent from the merely loud, staying in your
    body when the flood hits, and finding the next real move. No new app, no morning
    routine, no promise the work gets lighter.
  long_description: 'There is a particular moment a founder knows too well. You sit
    down to work and forty things land at once — the hiring fire, the churned account,
    the investor email you''ve reread six times, the cofounder tension nobody is naming,
    the demo that''s somehow tomorrow. Your mind tries to hold all of it simultaneously
    and just whites out. You open a doc and stare. You refresh the same dashboard
    for the fourth time. From the outside it looks like you''re slacking. Inside,
    you''re drowning in a tab-storm that never closes. This book is for the founder
    running a young company where every problem routes to you, where there is no layer
    of management to absorb the hit, where saying yes to one thing means a different
    fire burns unattended. The one whose to-do list stopped being a list and became
    a weather system. You are not disorganized. You are carrying more concurrent load
    than a human nervous system was built to track, and your body is doing exactly
    what overwhelm does — bracing, narrowing, shutting the gates. Here we name what''s
    actually happening when everything is too much at once: not a character flaw,
    not a discipline problem, but a system past its capacity. We go down into the
    overwhelm instead of bulldozing it with another framework, because the flooding
    is information, and the urge to do all of it now is the very thing keeping you
    stuck in the doorway. You''ll learn to feel the difference between what is genuinely
    urgent and what is merely loud, between the fire and the smoke alarm. Then we
    come back up — to a way of meeting the same impossible week without your whole
    body clenching, where the load is still heavy but it stops crushing your chest.
    This is not a time-management book. It will not hand you a new app, a morning
    routine, or an inbox-zero ritual. It will not promise the work gets lighter, because
    the truth is your company is genuinely demanding and no system makes a young startup
    quiet. What it offers instead is plain language for the moment of flooding, and
    a way to stay in your body when the surge hits, so you can choose the next move
    instead of being shoved into it. You do not have to do everything right now. You
    only have to do the next real thing, and this book will help you find it without
    making the rest of the list disappear or pretending it isn''t there.'
