title: The Part of Me That Never Clocks Out
subtitle: For the working parent whose mind never goes off duty — scanning for the
  next emergency, the next bill, the next thing about to go wrong, long after the
  house is quiet
cover_tagline: The house is asleep. You're still on call. You always are.
description:
  short_blurb: Even when everyone is finally asleep and nothing is technically wrong,
    some part of you stays on watch — scanning the calendar, the inbox, the kids,
    the money, braced for the emergency that hasn't come yet. This is a book for the
    working parent whose mind never clocks out. It does not tell you to relax. It
    helps the part of you that's been standing guard for years finally feel safe enough
    to sit down.
  long_description: 'The house is quiet. The kids are asleep. Nothing, right now,
    is on fire. And still — some part of you is up, scanning. Did you sign the permission
    slip. Is the deposit going to clear before the autopay hits. Was that cough something.
    Did you reply to your boss or just think about replying. You lie in the dark and
    your mind walks the perimeter of your whole life, checking the locks, and it will
    not, will not stand down. Even rest feels like a risk you can''t quite afford.


    This book is for the working parent whose mind never goes off duty. Burnout doesn''t
    always look like collapse. Sometimes it looks like vigilance — a nervous system
    that decided, somewhere along the way, that if you stop watching, everything falls
    apart. So you watch. The schedule, the budget, the small faces for signs of trouble,
    the inbox after hours, the long list of what-ifs no one else seems to be tracking.
    You are exhausted not because you do nothing, but because some part of you is
    always working, even in your sleep.


    You''ll come to recognize hypervigilance for what it is in the body — the jaw
    that won''t unclench, the shallow breath high in the chest, the startle when the
    phone lights up, the way your whole system is tuned to a threat that, most nights,
    never actually arrives. You''ll learn that the watcher isn''t your enemy. It''s
    the part of you that has been trying, for years, to keep everyone safe. It just
    never learned that the danger isn''t constant, and that it''s allowed to rest.


    This book will not tell you to relax, as if you hadn''t thought of that. It will
    not hand you a breathing trick to override a survival response that''s smarter
    than any hack. It does not promise to switch the watching off — and it won''t
    pretend the demands on you aren''t real. There is no fix for a body that learned
    to brace. There is only the slow work of helping it feel safe enough to soften.


    What there is, is a way to turn toward the part of you that never clocks out —
    not to fight it, but to thank it, and to show it, breath by breath, that you can
    set it down for a moment and the world holds. The shoulders come down a half-inch.
    The jaw lets go. The ground is still there.


    You are allowed to stop standing guard. Not forever, not all at once. Just long
    enough to feel the floor hold you, and to remember that you, too, are someone
    worth keeping safe.


    Book 3 of the Felt Sense Publishing burnout series.'
