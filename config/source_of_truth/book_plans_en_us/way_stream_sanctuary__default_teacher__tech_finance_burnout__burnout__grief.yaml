title: 'After the Flame: Living with What You''ve Lost'
subtitle: A Field Guide for Tech and Finance Professionals Navigating Burnout Recovery
cover_tagline: You didn't lose your motivation. You lost something, and nobody called
  it a loss.
description:
  short_blurb: You used to be the person who could carry it all, and now you can barely
    open the laptop. This is a grief book disguised as a burnout book, for the engineer,
    trader, or operator who burned out so slowly they never got to mourn the version
    of themselves that ran on pure drive. No optimization. No comeback arc. Just the
    truth about what's gone and how to stand inside it.
  long_description: 'There was a version of you who shipped on no sleep and called
    it a personality. Who answered the page at 3 a.m. and felt useful. Who took the
    harder role, the bigger book, the on-call week nobody wanted, and ran on the quiet
    pride of being the one who could take it. That person is gone. Not on vacation.
    Gone. And the strangest part is that no one held a service, because on paper you''re
    still here, still on the org chart, still expected to be exactly who you were.


    This book is for the tech and finance professional who didn''t crash so much as
    fade. The senior engineer who can''t remember the last time a green build felt
    like anything. The PM, the trader, the analyst who looks fine in standup and feels
    like a hollowed-out shell by lunch. If you keep waiting to bounce back and the
    bounce keeps not coming, read this knowing it was written for exactly that gap.


    First, recognition. What you''re carrying isn''t laziness or a motivation problem
    you can hack. It''s grief. You lost a self — the high-output, always-available,
    identity-fused-with-the-job self — and grief that nobody names just sits in the
    body as fatigue, flatness, a low static hum of wrongness you can''t debug.


    Then, descent. This is the part the productivity world skips. You don''t fix grief
    by setting a better goal. You go down into it. You let yourself actually register
    that the old engine is cold and isn''t restarting, that some of what you gave
    the work you will not get back, that the role you mortgaged your nervous system
    for would replace you in a week. You stop sprinting away from the empty feeling
    and you sit on its floor.


    And then, slowly, integration. Not a triumphant return. You come back up carrying
    the loss instead of running from it — and something loosens. You start to tell
    the difference between rest and collapse. You stop negotiating with a self who
    no longer exists.


    This book will not promise you''ll get your old drive back, because you shouldn''t
    want it back the way it was. It won''t hand you a morning routine or a recovery
    sprint or a reframe that makes the loss productive. It refuses to optimize your
    grief.


    What it offers is plain and unsentimental: language for what actually happened
    to you, and permission to grieve it on company time, in a chair, with no deliverable
    attached. You''re allowed to have lost something. You''re allowed to say so.'
