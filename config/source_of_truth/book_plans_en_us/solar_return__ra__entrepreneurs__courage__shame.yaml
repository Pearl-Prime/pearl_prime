description:
  short_blurb: Some part of you is sure that if anyone looked closely enough, they'd
    see you don't belong here. This is for the founder who overworks to cover a defect
    they can't name — who reads every brave act as a chance to finally be exposed.
    You'll learn where that belief came from, why courage feels so costly when something
    underneath says you're not enough, and how to act without first earning the right.
  long_description: 'There''s a version of the story you never tell. In it, you''re
    not a founder — you''re someone who has fooled a room full of smart people, and
    any day now the right question will expose you for good.


    You know the feeling. The win that should land lands hollow, because you''re already
    braced for the moment they find out. The opportunity you don''t pursue, because
    pursuing it means being seen, and being seen means being caught. The exhausting
    hours you put in not to build something great but to cover the gap where you''re
    certain something is missing in you. This is shame — not the feeling that you
    did something wrong, but the buried belief that something is wrong with you, and
    that courage is a privilege you have to earn before you''re allowed any.


    This book is for the founder who hides. The one who built a company and still
    feels like a fraud running it. The one for whom every brave act — the pitch, the
    price raise, the hard ask — doubles as an audition for exposure. You are not actually
    a fraud, and you are not uniquely broken. You are carrying an old, quiet conviction
    that you are not enough as you are, and you have been outworking it instead of
    meeting it.


    Chapter by chapter, you''ll come to recognize the hidden belief by name and trace
    where it learned to live in you. You''ll feel the particular weight of having
    to be brave for two — to summon courage and first prove you deserve to have it.
    You''ll understand why shame makes every visible act feel dangerous, and how the
    hiding costs you far more than the exposure ever would. And you''ll meet the cliff-edge
    question that runs through this whole series: what is one thing you can do before
    you feel ready? Here it means: before you feel worthy. You don''t have to earn
    the step.


    This book will not give you a confidence makeover or a list of affirmations to
    repeat until you believe you''re enough. It will not declare you healed of the
    feeling that you''re a fraud. It promises no permanent arrival at self-worth.
    What it offers is gentler and truer: the recognition that the defect you''ve been
    hiding was never really there, and that you can act — visibly, bravely, imperfectly
    — without first passing a test you''ve been failing on purpose your whole life.


    You were never the fraud. You were the one who cared so much about being found
    out that you forgot you were the real thing all along.


    Come out of hiding by inches. The fire under the ash was always yours.


    Book 3 of the Ember & Ash Publishing courage series.'
