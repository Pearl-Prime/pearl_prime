title: Always On, Never Off
subtitle: For the first responder whose mind never stands down — when the scanning
  that kept you alive on shift has hardened into a depression you can't switch off
cover_tagline: The job is over for the night. No one told the part of you that's still
  watching the door.
description:
  short_blurb: The hypervigilance that kept you alive on the job doesn't clock out.
    It stays on through the night — scanning, bracing, monitoring threats that never
    come — until being permanently on guard hardens into a flat, exhausted depression
    you can't switch off. This is a steady companion for the first responder whose
    watcher never stands down, written to sit with you in the dark until the scanning
    can finally rest. No off switch promised — just a place to stop standing guard.
  long_description: 'The shift ended hours ago. The part of you that''s still watching
    the door didn''t get the message. You lie in the dark and the scanning runs on
    — checking the exits, replaying the call, bracing for the page that isn''t coming,
    listening to the house for a threat that isn''t there. The watchfulness that kept
    you alive at work has nowhere to set itself down, so it never does. And after
    enough years of never being off, a person goes flat. The watching becomes exhaustion.
    The exhaustion becomes a depression you can''t seem to switch off.


    This book is for the first responder whose mind never goes off duty. The medic
    who still hears the tones in the quiet. The cop who sits facing the door. The
    firefighter, the nurse, the dispatcher whose body has forgotten how to be safe
    in a room where nothing is wrong. You''re not paranoid and you''re not failing.
    You taught yourself to stay ready for anything so that nothing could catch you
    off guard — and now that readiness won''t lie down, and the cost of being permanently
    braced is the heavy, joyless flatness you''ve been carrying for years.


    You''ll come to recognize how relentless watchfulness becomes depression — how
    a body that can never quite believe it is safe eventually stops feeling much of
    anything at all. You''ll see what the watching has cost you in the dark hours.
    You''ll learn what it is to let the guard come down by degrees, to let the body
    register that the shift is actually over, and to discover that you do not have
    to keep standing watch inside your own home to be alright.


    This is not a protocol to manage your hypervigilance or optimize your recovery.
    There is no trick to deploy, nothing to run through before your next tour. Nothing
    here will help you scan more efficiently. That is the point. The part of you that
    watches does not need to get better at watching. It needs, finally, to be allowed
    to rest. This is a quiet presence for the long night of laying the watch down
    — a voice that will keep watch with you until you no longer have to.


    You don''t have to guard the door tonight. The shift is over. You''re allowed
    to set the watch down here, in the dark, and let something in you that has been
    braced for years finally come to rest.


    Book 3 of the Night Architecture Books depression series.'
