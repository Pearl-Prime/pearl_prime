title: It's Not That Deep, Until It Is
subtitle: For the kid who freezes before saying no — when your body sounds the alarm
  over a text, a favor, a group chat, and you can't tell if it's real danger or just
  a line you're allowed to draw
cover_tagline: Your body isn't broken. It just learned that saying no was dangerous.
description:
  short_blurb: Someone asks you for one small thing and your whole chest locks up
    like you're about to get caught. You're not in danger — you're just standing at
    a line you were never told you could draw. This is a book about the false alarm
    that goes off every time you're about to take up space, and how to stop treating
    an honest no like a crime.
  long_description: 'It happens before you''ve even decided anything. Someone asks
    you to cover for them, or stay longer, or do the thing you said you couldn''t
    — and your stomach drops, your face goes hot, your thumbs start typing ''yeah
    no worries'' before your brain catches up. By the time you hit send, the alarm
    has already won.


    You tell yourself it''s not that deep. It''s just a text. It''s just a favor.
    You don''t want to make it weird.


    This book is for you — the one whose body treats every small no like stepping
    off a cliff. The one who can feel a boundary coming and brace for it like a slammed
    door. You''re not dramatic and you''re not weak. Somewhere along the way you learned
    that taking up space was dangerous, and now your alarm system fires at things
    that were never actually threats: a friend''s disappointment, a read receipt,
    a teacher who might think less of you, a group chat that might go quiet.


    We''ll go slowly. You''ll come to recognize the difference between a real warning
    and a false alarm — the jolt that says ''this person could hurt you'' versus the
    jolt that just says ''this person might be annoyed, and you''ve decided that''s
    the same thing.'' You''ll learn what your body is actually doing when it locks
    you up at the threshold, and why it''s trying to protect a much younger version
    of you who really did need to keep everyone happy to stay safe. You''ll find out
    that the line you''re so scared to draw is not a wall. It''s the edge of the page.
    Nothing real can get made until there''s an edge.


    This isn''t a book that''s going to tell you to ''just be confident'' or stop
    caring what people think. That advice is useless and a little cruel, because at
    your age being left out genuinely costs something, and pretending it doesn''t
    is its own kind of lie. Nothing here will make the fear vanish on command. There''s
    no script that turns you into someone who never flinches.


    What there is, is this: the slow, real understanding that the alarm is not the
    truth. That you can feel it ring and still choose. That ''no'' can come out quiet
    and shaky and still count.


    You are allowed to take up space before you feel ready to. You''re allowed to
    draw the line with your voice trembling. You''re allowed to ruin the draft.


    Book 1 of the Blank Canvas Books boundaries series.'
