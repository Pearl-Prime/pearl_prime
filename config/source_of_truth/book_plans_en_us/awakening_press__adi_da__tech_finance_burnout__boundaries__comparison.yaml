title: They Seem to Carry Twice and Never Crack
subtitle: For the burned-out high performer measuring their limits against colleagues
  who look tireless
cover_tagline: They look like they need nothing. You believed it.
description:
  short_blurb: Everyone around you seems to absorb infinite load without flinching
    — replying at midnight, never overwhelmed, never needing a single line drawn.
    So wanting a boundary feels like an admission that you're weaker, less committed,
    falling behind. This is a book for the mind that measures its own limits against
    everyone who looks limitless. It will not help you win the comparison, and that
    is exactly the point.
  long_description: 'You look around and everyone else seems fine. They answer at
    midnight and again at six. They take on the extra without a word. They don''t
    seem to need the thing you need — the white space, the slower week, the meeting
    declined. And so the wish for a boundary curdles into evidence: if they can carry
    all of it and you can''t, the problem must be you. You''re less committed. Less
    capable. Quietly falling behind a field of people who appear to require nothing
    at all.


    This book is for you: the one who has turned the same sharp judgment you bring
    to your work onto the wrong place — your own life, held up against everyone who
    looks limitless. You don''t set boundaries because a boundary would prove the
    gap you already believe is there. So you keep matching a pace you never agreed
    to, measuring your need for rest against a highlight reel of other people''s stamina,
    and losing, every single time.


    You''ll come to recognize the comparison for what it is — a story built from the
    outside of other people''s lives, where you can see the output but never the cost.
    You''ll see how the old fear stirs the moment you imagine drawing a line they
    wouldn''t, and how the buried shame whispers that needing one makes you less.
    You''ll watch the spiral that turns every glance sideways into a verdict against
    yourself. And you''ll feel what''s true beneath all the measuring: that you were
    never actually behind, because there was never a race that you agreed to run.


    This is not a program for keeping up. Nothing here will help you win the comparison
    — there''s no method to out-endure the people you envy, no reframe that turns
    you into someone who needs nothing. That''s the whole illusion you''re trapped
    inside. What''s offered instead is the quiet end of the contest: the recognition
    that the calm you keep seeing in others is not a measure of your worth, and the
    limit you keep apologizing for is not a flaw in you. It''s just yours.


    You are allowed to need what you need, even if no one else seems to. You are allowed
    to stop measuring. You are allowed to step out of a race you never entered and
    find that the ground was always under your feet.


    Book 3 of the Awakening Press boundaries series.'
