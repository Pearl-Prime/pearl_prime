title: 'Setting Boundaries: Carrying What You Can''t Say (1)'
subtitle: What Shame Does to You — Boundaries for Gen Alpha Students (The Hidden Weight
  of Shame)
cover_tagline: You think wanting space makes you a bad person. That's the lie. Let's
  put it down.
description:
  short_blurb: Somewhere along the way you picked up the belief that having limits
    makes you selfish, cold, or too much, and so you carry every no like it's proof
    something is wrong with you. This is a book for students about the shame underneath
    your boundaries, the quiet belief that you don't actually get to need space. We
    are not going to fix you here. We are just going to set down the weight you were
    never supposed to be carrying in the first place.
  long_description: 'It''s not the saying no that wrecks you. It''s the after. The
    hours where you replay it on a loop, sure you came across as cold or selfish or
    difficult, certain that a good person wouldn''t have needed the space in the first
    place. So you apologize too much. You over-explain. You quietly give back the
    thing you just protected, because holding a boundary means holding the belief
    that wanting one makes you bad, and that belief is heavier than the no ever was.


    This book is for the student who has wrapped every limit in shame. The one who
    says yes just to avoid being seen as the difficult kid, who lets people in past
    the point of comfort because the alternative is feeling like there''s something
    fundamentally wrong with them. If you''ve ever felt that needing rest, needing
    distance, needing people to just stop, was a character flaw you had to hide, this
    is your book. You learned somewhere that your limits make you unlovable. Someone
    or something handed you that lesson when you were too young to argue with it,
    and you''ve been carrying it as fact ever since.


    We are not going to fix you, because you were never broken to begin with. Instead
    we name the thing precisely: this is shame, a buried belief that something is
    wrong with you for having needs at all, and it is not the truth. It''s just the
    oldest story in your head, repeated so many times it started sounding like a fact.
    Then we go down into where it came from, the moments that taught you space equals
    selfish, that needing things makes you too much, that love was something you kept
    by disappearing. We don''t rush past that part, because that part is the whole
    point. And then you come back up lighter, because you finally set down the weight
    you''d mistaken for who you are.


    This book won''t promise you''ll never feel the shame again, or that you''ll suddenly
    love every limit you set, or that the guilt evaporates the moment you understand
    where it started. It won''t optimize you into someone who never flinches. That
    is not the work, and anyone selling it is selling an edit.


    The real work is smaller and bigger than that. It''s realizing that the heaviness
    you''ve been hauling, the bone-deep certainty that you''re bad for wanting space,
    was never actually yours to carry. You picked it up when you were small and you''ve
    been dragging it behind you ever since. You''re allowed to put it down now. Your
    limits do not make you a worse person. They are part of what makes you a person
    at all.'
