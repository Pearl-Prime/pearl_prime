title: 'The Alarm Is Lying: The Shame Response'
subtitle: A Field Guide for Young Professionals Navigating Anxiety Relief
cover_tagline: The fear isn't that you'll fail. It's that they'll find out something
  is wrong with you.
description:
  short_blurb: Underneath a lot of work anxiety is a quiet, ancient belief that you're
    somehow not enough — and that any day now, someone will notice. This book goes
    after the shame the alarm is really protecting. No affirmations, no fixing yourself,
    just an honest look at the story you've been carrying.
  long_description: 'You send the message and then read it back eleven times for the
    tone that proves you''re a fraud. You get praised and can''t take it in, because
    some part of you is sure they just haven''t seen the real you yet. The anxiety
    at work feels like it''s about performance, deadlines, being good enough — but
    go down a layer and it''s quieter and older than that: a belief that something
    is fundamentally wrong with you, and your whole day is spent making sure no one
    finds out.


    This book is for the young professional running on shame. The one who feels like
    an imposter in a role they actually earned. Who over-apologizes, over-explains,
    takes feedback like a verdict on their worth as a person. Who is early enough
    in a career to still feel like they snuck in, and braced for the moment they get
    found out. If the alarm in your body is really guarding a secret belief that you''re
    not enough — and you''ve never said that out loud — this was written for exactly
    that.


    First, recognition: you''ll learn to catch shame in the act, to feel the difference
    between "I did something wrong" and "I am something wrong." Then you go down into
    it, which is the hard part, because shame''s whole job is to keep you from looking
    at it directly. You''ll turn toward the belief instead of performing around it,
    and trace it back to where it actually came from — long before this job, this
    title, these people you''re so afraid of disappointing. This is the descent, and
    it''s the only thing that drains the charge. You come back able to be seen without
    bracing for the verdict.


    What this book will not do: it will not hand you affirmations to repeat in the
    mirror, tell you you''re enough until you believe it, or treat your worth as a
    self-esteem problem to be fixed. There''s no positivity that papers over shame,
    no reframe that makes it disappear on command. The belief will surface again,
    in the next exposed moment, the next piece of feedback. What''s different is that
    you''ll recognize it for what it is — an old story, not a true one.


    You are not a fraud who got lucky. You''re a person carrying a belief you didn''t
    choose and never examined. You''re allowed to be seen — flaws, gaps, the real
    you — without it meaning anything is wrong with you. The shame lied. You''re allowed
    to stop believing it.'
