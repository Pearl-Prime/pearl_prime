title: 'Sleep Anxiety: The Shutdown Point'
subtitle: How Entrepreneurs Are Rewriting the Rules of Sleep Anxiety
cover_tagline: You lie down and the entire company lies down on top of you.
description:
  short_blurb: 'The day is finally over, the house is quiet, and the second your head
    hits the pillow every open loop in the business arrives at once — too much, all
    at the same time, with no order and no off switch. This is overwhelm at the worst
    possible hour: a founder''s whole load landing in the dark. This book helps you
    stop trying to sort the pile at midnight and meet the overwhelm itself, so the
    weight stops running the night.'
  long_description: 'Lights off. Quiet at last. And then it all arrives together —
    the hire you haven''t made, the burn rate, the customer who churned, the thing
    you promised the board, the message you never answered, the fear under all of
    it that you can''t hold this much. It doesn''t come in a line you can work through.
    It comes as a single crushing mass, all at once, the instant you stop moving.
    You lie there flattened by your own company.


    This is for the founder who only feels the full weight when they finally stop.
    All day you stayed ahead of it by doing the next thing, and the next — motion
    as a way of not feeling the size of the load. But the bed takes away the motion.
    There''s nothing left to do, so the whole thing lands, and your mind responds
    the only way it knows: by trying to sort the unsortable at midnight, ranking fears,
    drafting tomorrow, doing frantic triage on a pile that won''t hold still. The
    overwhelm isn''t that there''s too much to do. It''s that it all showed up at
    once and demanded to be felt.


    Devon Hale doesn''t hand you a way to organize the pile in the dark. The sorting
    is the trap — it''s how you stay up until 2am pretending planning is the same
    as rest. Recognition first: you''ll learn to feel the overwhelm arrive and name
    it as overwhelm, not as a to-do list that requires action right now. Then the
    descent — instead of fighting the mass or breaking it into tasks you can''t do
    at this hour, you let it be as big as it is and go down into the weight itself.
    You stop trying to make it manageable and let it be unmanageable without it destroying
    you. And you come back able to set the whole load down for the night, not because
    it shrank, but because you stopped trying to carry it while lying down.


    This book will not promise you a clear head at bedtime or a brain-dump routine
    to run before you sleep. It will not optimize your evening, hand you a prioritization
    framework for the dark, or tell you the overwhelm means you need a better system.
    There''s no worksheet. The load is real and it will still be there in the morning
    — that''s not the part this fixes.


    What changes is whether it gets the night too. You''ll feel the everything-at-once
    land and recognize it instead of obeying it. You''ll stop doing 1am triage on
    a pile that can wait. You''re allowed to put the whole company down at the edge
    of the bed and not pick it back up until morning.'
