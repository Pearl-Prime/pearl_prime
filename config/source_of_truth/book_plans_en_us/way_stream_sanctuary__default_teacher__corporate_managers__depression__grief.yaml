title: 'The Weight Without a Name: After the Loss'
subtitle: How Managers Are Rewriting the Rules of Overcoming Depression
cover_tagline: Nobody died, but something is gone — and you still have to run the
  Monday meeting.
description:
  short_blurb: Some kinds of depression don't announce themselves with a crisis. This
    one arrives as a slow leaking-away — of the job you thought you wanted, the version
    of yourself who used to care — while you keep leading a team that needs you. This
    is a book about the loss you can't name, written for the manager who has to keep
    showing up while carrying it.
  long_description: 'You close the laptop after another full day and feel nothing.
    Not relief, not pride — just a flat gray hum where the satisfaction used to be.
    The team hit its numbers. You said the right things in the one-on-ones. And somewhere
    underneath all of it, something you can''t point to has quietly gone missing.


    This book is for the manager living with that. The one who built a career on being
    the steady one, the person others bring their problems to, and who now wakes at
    4 a.m. grieving something with no funeral and no name. Maybe it''s the role you
    outgrew. Maybe it''s the ambition that used to pull you out of bed. Maybe it''s
    a self you can''t get back. You haven''t lost a person — so you tell yourself
    you have no right to feel this hollow. And then you get up and lead anyway.


    We''re going to do three things, and none of them is ''fix it.'' First, recognition:
    you''ll learn to name this as loss, plainly, instead of calling it burnout or
    a bad quarter and waiting for it to pass. Second, descent — the part nobody at
    work will let you do. Instead of managing the emptiness like a project with a
    deadline, you go down into it. You let the gray be gray. You stop interrogating
    it for a root cause and start letting it tell you what it actually is. Third,
    integration: you come back up still a manager, still responsible for other people,
    but no longer split in two — no longer performing fine while something inside
    quietly drowns.


    This is not a productivity book wearing a feelings costume. There is no morning
    routine here, no gratitude list to optimize your mood, no reframe that turns the
    loss into a growth opportunity for your LinkedIn. Waystream doesn''t do that.
    We''re not going to tell you this is secretly making you a better leader. It might
    just be loss, and loss is allowed to be loss.


    What you''ll get instead is plain language for what''s happening in your body
    and your days — words you can actually reach for the next time the hum descends
    in the middle of a budget review. You''ll learn the difference between numbing
    and resting, between isolating and retreating, between the depression talking
    and you talking. You''ll stop treating your own depleted self like an underperformer
    on your team.


    You don''t have to know what you lost to begin grieving it. You don''t have to
    be over it to be a good manager. You''re allowed to put the weight down right
    here, in these pages, before you pick the day back up.'
