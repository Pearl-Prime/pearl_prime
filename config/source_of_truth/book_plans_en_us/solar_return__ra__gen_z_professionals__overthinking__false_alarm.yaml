title: The Smoke Alarm in Your Chest
subtitle: For the young professional whose body braces for a disaster that never comes
  — learning to tell a real fire from a false alarm
cover_tagline: Your body keeps sounding the alarm. There is no fire.
description:
  short_blurb: You sent the email. It was fine. And still your chest tightens, your
    jaw sets, your whole body braces for something you can't name. This is a book
    for the overthinker whose alarm system fires perfectly — at nothing — and who
    is tired of living braced.
  long_description: 'It happens before the thought does. You hit send on a normal
    message, or your manager says "can we talk later," and something in your chest
    pulls tight. Your stomach drops. Your shoulders climb toward your ears. Your body
    has decided there''s a fire — and you spend the next four hours scanning for the
    smoke.


    There is no smoke. There never was.


    This book is for you: the Gen Z professional whose alarm system works beautifully
    and fires at all the wrong moments. You''re not fragile. You''re not paranoid.
    You''ve got a smoke detector wired straight into your nervous system, and it has
    learned to go off at a slammed door, an unanswered text, a tone you imagined in
    a one-word reply. It''s not broken. It''s just doing the one thing it knows how
    to do, too well, too often, for a danger that isn''t real.


    Here you''ll come to recognize the false alarm for what it is. You''ll learn the
    difference between the dread that means something and the dread that''s just your
    body rehearsing catastrophe out of habit. You''ll see how the bracing itself —
    the held breath, the clenched gut, the worst-case you build before breakfast —
    convinces you the threat must be real, because why else would you feel this way?
    You''ll learn to stand in that heat without grabbing the extinguisher, and to
    let the alarm ring itself out instead of treating every spike as proof.


    This is not a book that will teach you to stop feeling afraid. It won''t optimize
    your nervous system or hand you a morning routine that makes the dread go quiet
    forever. It will not promise you a fix, because you are not broken. Your alarm
    loves you. It has been trying to keep you safe in a world that taught you everything
    was urgent. That''s not a defect to delete. It''s a warmth to tend.


    What you''ll find instead is recognition — the kind that loosens the grip in your
    chest a half-inch at a time. You''ll learn to put a hand on the alarm and say,
    gently, not this time. To let the bracing soften before you''ve solved anything.
    To trust that you can feel the heat and still know there''s no fire.


    You are allowed to feel the alarm and not obey it. Start there.


    Book 1 of the Ember & Ash Publishing Overthinking series.'
