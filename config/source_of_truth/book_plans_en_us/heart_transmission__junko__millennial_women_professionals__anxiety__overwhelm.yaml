title: Everything at Once, and No Room Left to Breathe
subtitle: The pings, the deadlines, the people who all need a piece of you arriving
  at once — a quiet room for the woman who is full to the edges and can't find space
  to breathe.
cover_tagline: There is no more room. And still, more keeps arriving.
description:
  short_blurb: The messages, the deadlines, the people who need a piece of you, the
    life admin that never empties — it all arrives at once until there's no space
    left inside you to even feel it. This is a book for the woman at capacity, written
    to help her find the one square foot of room where she can put something down.
  long_description: 'It isn''t any single thing. It''s all of it, arriving at the
    same moment. The Slack ping over the email over the text from your mother over
    the meeting that moved over the laundry you can see from where you''re standing.
    Each one small. Together, a tide. You keep treading, keep answering, keep holding
    the whole weather system of other people''s needs in your two hands — and somewhere
    in there you stopped being able to hear yourself think.


    This book is for you: the one everyone calls reliable, the one who absorbs whatever
    lands, the woman whose to-do list breeds overnight and whose body has started
    to register a full inbox as a real and present emergency. You are not disorganized.
    You are not failing to cope. You are a person of finite capacity being asked to
    hold the infinite, and you''ve been doing it for so long you forgot capacity was
    a thing you were allowed to have.


    Here, you''ll come to recognize overwhelm for what it is — not a character flaw,
    not proof you can''t handle your life, but the honest signal of a vessel that
    is full. You''ll see how you became the place where everything gets put, how ''I''ll
    just do it myself'' quietly became a cage. You''ll learn what it feels like to
    let the flood be a flood without throwing your whole body into the current — to
    find, in the middle of the noise, one small room where you can set a single thing
    down and breathe before picking anything back up. Not productivity. Presence.
    The difference between managing the tide and remembering you are allowed to step
    out of it.


    This book will not hand you a new organizing system, a color-coded morning routine,
    or a promise that if you just push hard enough the flood will finally recede.
    It won''t, and you know it won''t. The demands aren''t the problem the way you''ve
    been told. The problem is that no one ever gave you permission to be a person
    with edges — to be full, and to stop.


    You don''t have to empty the whole ocean to find some air. You only have to learn
    that the room exists, that it''s yours, and that stepping into it for a moment
    is not the same as letting everyone down. Put one thing down. Just one. The rest
    will still be there, and so, for once, will you.


    Book 2 of the Heart Transmission Press anxiety series.'
