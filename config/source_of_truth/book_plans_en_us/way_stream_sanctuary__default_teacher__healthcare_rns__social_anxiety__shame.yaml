cover_tagline: 'The anxiety is loud. The thing underneath it is quiet: something''s
  wrong with me.'
description:
  short_blurb: Underneath the social dread is something heavier — a buried belief
    that there's something wrong with you, that if people really saw you they'd pull
    away. This is a book for nurses about the shame that lives under social anxiety.
    It won't reassure you that everyone likes you. It'll show you the belief you're
    actually carrying, and how to stop building your life around hiding it.
  long_description: 'The anxiety is the part you notice — the racing heart before
    the huddle, the dread of the breakroom, the relief when a coworker calls out so
    you have one less person to face. But go underneath it and there''s something
    quieter and much heavier: a belief you''ve never said out loud, that there''s
    something fundamentally wrong with you. That you''re awkward in a way other people
    aren''t. That if your colleagues really saw you — the real you, behind the competent
    nurse — they''d quietly decide they were right to keep their distance.


    This book is for the nurse whose social anxiety is built on a foundation of shame.
    The one who doesn''t just fear being judged but half-believes the judgment would
    be correct. Who replays every interaction hunting for the moment she was too much
    or not enough. Who''s certain her coworkers tolerate her more than they like her,
    and has organized years of small withdrawals around protecting them from the real
    her. You hold so much space for your patients'' worst moments. This is about the
    moment you can''t hold for yourself.


    Shame and anxiety are tangled here, and pulling them apart is the work. The anxiety
    says something bad might happen in this room. The shame says something bad is
    true about me, and it''s only a matter of time before they see it. That second
    belief is the engine — because if you''re convinced you''re flawed at the root,
    then every social moment isn''t just uncomfortable, it''s a chance for the secret
    to get out. We start by naming that belief plainly and dragging it into the light,
    because shame only survives unspoken.


    Then we go down into it. Not to fix you — the belief that you''re broken is the
    lie, not the diagnosis — but to feel its weight and trace where it came from.
    The childhood sense of being off. The culture that prizes effortless social ease.
    The years of reading every awkward pause as more evidence. You''ll learn to tell
    the difference between a real thing about how you relate to people and a cruel
    thing the shame is insisting on, because from the inside they sound the same until
    you slow down enough to separate them.


    This is not a book about becoming likeable. No charisma tips, no affirmations
    that everyone secretly adores you, no reframing the shame into something flattering.
    We''re not going to convince you that you''re wonderful in a crowd. We''re going
    to help you stop building your whole social life around hiding a wrongness that
    was never actually there.


    What changes is the weight. The belief doesn''t disappear on command — buried
    things hold on — but it stops being the floor under every interaction. You start
    to hear the shame as a voice rather than a fact, and you stop arranging your life
    to keep it hidden.


    There was never anything to hide. You were carrying a verdict that was wrong from
    the start. You''re allowed to walk into the room as someone who has nothing to
    keep secret — because you don''t.'
