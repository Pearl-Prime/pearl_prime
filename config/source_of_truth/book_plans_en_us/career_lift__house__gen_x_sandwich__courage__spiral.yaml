title: One Email I Never Sent, A Thousand Nights I Didn't Sleep
subtitle: For the mid-career parent whose mind turns one brave decision into a thousand
  reasons not to make it — and calls the loop being responsible
cover_tagline: The thought that won't let you sleep is the one you're meant to act
  on.
description:
  short_blurb: 'It started as one small question — should you finally say something,
    ask for more, make the change? By 2am it has multiplied into a thousand: what
    if it backfires, what if you''re too old, what about the deposit, what about Mom,
    who do you think you are. The spiral feels like diligence. It''s actually how
    you''ve talked yourself out of the next chapter for years. This book is for the
    mind that won''t stop circling.'
  long_description: 'It always starts so small. One thought. Maybe you should say
    something at work. Maybe you should ask for the raise, the title, the different
    role, the way out you''ve been quietly imagining. A reasonable thought, the size
    of a single email.


    And then it begins. By the time you''ve brushed your teeth, the one thought has
    become ten. By the time you''re lying in the dark next to someone who fell asleep
    an hour ago, it''s a thousand. What if it goes wrong. What if they say no. What
    if they say yes and you can''t do it. You''re too old to start over. You''re too
    tired. The deposit is due, your father has another appointment, and who exactly
    do you think you are. The spiral feeds itself, and you call it thinking it through.
    You call it being responsible. By morning you''ve made no decision at all, which
    was the spiral''s plan the whole time.


    This book is for you: the one whose mind never powers down, caught between the
    people who depend on you and the life you keep almost choosing. You are not indecisive.
    You are a careful person doing careful person''s math at three in the morning,
    and the math always comes out the same — not yet, not now, not you.


    Here you''ll come to see the spiral as a strategy, not a truth. You''ll watch
    how a single live question gets buried under a thousand manufactured ones, and
    how the volume of your worry has nothing to do with the danger of the choice.
    You''ll learn to step out of the loop without solving it, to act on the one real
    thought before the thousand false ones arrive. You''ll return, again and again,
    to a question small enough to survive the spiral: what is one thing you could
    do before you feel ready?


    This book will not promise you a quiet mind or a perfect plan. It won''t end the
    rumination for good or hand you a decision tree that finally makes the choice
    for you. The loop may still spin up at 2am. What changes is that you stop waiting
    for the spiral to finish before you live. You learn to take the one step while
    the thousand reasons are still talking.


    You are not failing because you overthink. You''ve just been letting the loudest
    part of your mind cast the only vote. The next chapter doesn''t need you certain.
    It needs you to send the email the spiral keeps deleting.


    You can begin before the noise agrees. That''s the whole secret.


    Book 2 of the Next Chapter Publishing courage series.'
