title: Your Body Has Been Holding the Whole House
subtitle: A grounded way home for the working parent whose chest stays tight and shoulders
  stay raised — for when too much arrives at once and there's no room left in your
  own body to stand
cover_tagline: You've been bracing so long you forgot the floor was still there.
description:
  short_blurb: Somewhere between the lunchboxes and the late emails, your body stopped
    being yours and became one more thing holding the household up. This is a book
    for the parent who is so full there is no room left to breathe. It is not a system
    to manage the overwhelm, but a way to let the ground come back up to meet you.
    It will not add one more task to your day.
  long_description: 'It usually finds you in the doorway. You''ve just gotten everyone
    where they need to be, or down for the night, and instead of relief there''s a
    flood — everything that''s still undone, everyone who still needs you, all of
    it arriving at once with nowhere to land. Your shoulders are up near your ears.
    Your breath has gone high and shallow, sitting at the top of your chest like it''s
    afraid to take up room. You are not tired so much as full, full past the brim,
    and your own body has become the last place you''d think to rest.


    This book is for the working parent who carries the whole house inside their nervous
    system. The one who hasn''t felt their feet on the floor in years because they''ve
    been bracing — for the next demand, the next sound from the other room, the next
    thing that can''t wait. You hold it in your jaw and your gut and the small of
    your back, and you''ve gotten so good at it that you mistook the clenching for
    who you are.


    What you''ll come to recognize, slowly, is that overwhelm is not a failure of
    organization. It''s a body that has been asked to contain more than any body can,
    and has done it anyway, for a long time, without being thanked. You''ll feel where
    you''ve stored the flood. You''ll find the breath you stopped letting all the
    way down, and you''ll let it reach the lowest part of your lungs again — the part
    that knows how to refill you from the root, instead of draining the root to keep
    the surface running. You''ll learn what it is to put something down without dropping
    it. To let the ground hold a little of what you''ve been holding alone.


    This is not a productivity system wearing a calmer coat. It will not help you
    do more, recover faster, or optimize a single thing. There is no morning routine
    here to fail at, no metric, no version of you at the finish line who finally has
    it handled. The point was never to manage the overwhelm better. The point is to
    come back into a body you can actually live in while it''s all still happening.


    Nothing here asks you to abandon anyone. It asks you to stop abandoning yourself
    first. You''re allowed to take up room in your own chest. You''re allowed to let
    the well fill from below.


    Book 1 of the Root & Meridian Press somatic healing series.'
