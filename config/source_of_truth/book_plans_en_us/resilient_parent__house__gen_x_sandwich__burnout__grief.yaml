title: The Person You Used to Have Time to Be
subtitle: For the parent grieving a self that got buried under everyone else's needs
  — and the slow loss that no one thinks to name
cover_tagline: You miss someone, and it's you.
description:
  short_blurb: No one died, but something is gone. The version of you with room in
    her life. The friendships that quietly thinned. The parent your mother used to
    be. This is a small book for the grief that hides inside burnout — the losses
    too ordinary to mourn out loud — and for letting yourself finally feel them in
    the quiet after bedtime.
  long_description: 'No one died. That''s what makes it so hard to say out loud. But
    you''ve been grieving for a long time now, quietly, in the spaces between everything
    you have to do. You miss the person you used to be — the one with time, with energy,
    with a life that had her own name on it. You miss friendships that didn''t end
    so much as fade, because there was never a free evening to keep them. You miss
    the parent your mother used to be, before the roles reversed and you became the
    one holding her steady.


    This book is for you. The one in the middle, raising children while caring for
    parents, carrying a kind of loss that no one sends a card for. You are not ungrateful
    and you are not falling apart. You are simply mourning what burnout quietly takes
    — the slow disappearance of a self, the small deaths that happen without a funeral,
    the future you''d half-pictured that isn''t going to look the way you thought.


    You''ll come to recognize the grief underneath the exhaustion. The way letting
    go isn''t something you''ve refused to do but something you''ve never been given
    the time to do. The way you brace against feeling it because feeling it might
    undo you, and there''s no one to take over while you fall apart. The way the loss
    comes up in the quiet after bedtime, when the house finally goes still and there''s
    no task left to outrun it with.


    This is not a book about closure, and it will not hand you five stages to move
    through. Nothing here will tell you to be grateful for what remains, or to find
    the silver lining, or to bounce back. It will not promise that the grief lifts
    on a schedule. It will not fix what was lost.


    What it offers instead is permission to grieve at all — to admit that something
    real is gone, even though everyone is still here, even though you''re supposed
    to be holding it together. To let one stolen moment be for mourning instead of
    managing. To stop pretending the losses don''t count just because they were quiet.


    You are allowed to miss who you were. You are allowed to set it down and feel
    it, just for now.


    Book 2 of the Stolen Moment Press Sandwich Generation Burnout series.'
