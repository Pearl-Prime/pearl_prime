title: 'The Cost of Caring: The Space Between You and Your Anxiety'
subtitle: A Real Talk Guide to Compassion Fatigue for Founders
cover_tagline: Your care turned into a watch you can't end. It's hollowing you out.
description:
  short_blurb: 'For the founder who scans every face, tone, and silence for who might
    be suffering or about to leave — a vigilance that feels like devotion while it
    drains them dry. This is a secular guide to the hypervigilant heart: finding the
    gap between holding a feeling and merely noticing it, and letting the watch end.
    No check-in cadence, no promise everyone will be fine.'
  long_description: 'It''s late, and you''re still scanning — not the metrics this
    time, but the people. Did the new hire seem off today? Was your reply in that
    thread too sharp? Is your cofounder quietly coming apart? The customer who went
    quiet — are they about to walk, and did you miss the tell? You have turned yourself
    into an early-warning system for everyone else''s suffering, and it does not switch
    off when the day ends. To the people around you, you''re the founder who''s deeply
    tuned in, who catches what others miss. What goes unseen is that the catching
    has become a vigil you can''t end, and it is quietly emptying you out. This book
    is for the founder whose care curdled into surveillance — who reads every face,
    every tone, every silence for the first sign that someone is hurting or about
    to leave. The one who can''t sit through a dinner without checking their phone
    in case a team member needs them. You''re not a control freak, and you''re not
    paranoid. You learned to watch for everyone''s pain because in a young company,
    catching the problem early is how you survive — but the watching outgrew its purpose,
    and now it costs you the very thing it was built to protect. Here we name what
    this vigil is and what it quietly takes: an around-the-clock attunement to other
    people''s hurt that wears the face of love while it grinds you down to nothing.
    Rather than white-knuckling it into stillness — which never works, since forcing
    calm just hands the vigil one more face to track — we turn toward it and ask what
    it is so afraid will happen if you ever look away. You''ll begin to separate the
    part of you that truly cares about your people from the part that has appointed
    itself their full-time guard. And a little distance opens up: room to feel someone''s
    mood without instantly making it your job, to notice it and let it move through
    you instead of holding it all night. This is not a hustle manual or a leadership
    playbook. No check-in cadence, no advice on managing your emotional bandwidth
    so you can monitor even more people. Nobody here will promise that everyone you
    care about ends up fine, because you run a real company and some of your people
    are genuinely struggling. The offer is different: plain, usable language for a
    heart stuck on permanent watch, and a way to stand the vigil down for a while
    that doesn''t require believing your people will fall apart the instant you stop
    looking. They don''t need you watching every hour to be okay. As it turns out,
    you don''t either.'
