title: Counting Heads in the Dark
subtitle: For the parent whose mind never stops scanning for the next thing that could
  hurt them — learning, at last, to let the watch set itself down
cover_tagline: You can put the watch down. Nothing falls apart when you do.
description:
  short_blurb: Some part of you is always on. Scanning the room, counting the kids,
    listening past the silence, monitoring everyone's mood, bracing for the thing
    that might go wrong. This book is for the parent whose mind never clocks out.
    It will show you that the watch can be set down — and that nothing falls apart
    when it is.
  long_description: 'There is a part of you that never stops watching. It counts the
    children in the back seat at every light. It reads the room the second you walk
    in. It listens past the quiet for the cry that means something''s wrong, tracks
    everyone''s mood, scans the horizon for the threat it''s certain is coming. Even
    in the rare still moment, even on the good days, it stays at its post — alert,
    vigilant, never quite off duty. You can''t remember the last time you were fully
    off the clock.


    This is the watcher: the hypervigilant mind doing what it believes is its sacred
    job, standing guard over the people you love against dangers that, overwhelmingly,
    never arrive. It was forged by love and by the real weight of being responsible
    for small, fragile lives. But somewhere it stopped being a tool you pick up when
    needed and became a post you can never leave — and a sentry that never sleeps
    doesn''t keep you safer. It just keeps you exhausted.


    This book is for you: the one who can''t relax even when everything is fine, the
    one who feels uneasy precisely because nothing is wrong yet. The one who has confused
    vigilance with love, as if lowering your guard for a moment would be a kind of
    abandonment. You are not paranoid and you are not over-reacting. You have a watchful,
    devoted mind that has been standing guard so long it has forgotten it''s allowed
    to rest.


    Slowly, you''ll come to recognize the watcher and feel how its scanning lives
    in the body — the eyes that won''t soften, the breath held high, the shoulders
    that never fully come down. You''ll learn the difference between true attention,
    which rises when it''s needed, and chronic vigilance, which never stands down
    at all. You''ll learn, in small and safe increments, what it is to let the guard
    rest for a breath — to discover that the room stays standing, the children keep
    breathing, the world holds, even when you are not personally watching it. Like
    light filling a room you''d kept dark, asking nothing of you.


    This book will not promise to make you stop caring, or hand you a system to perfectly
    manage every risk. It won''t optimize your vigilance or shame the part of you
    that learned to stay alert. That part was trying to protect everything you love.
    There is no flaw here to fix — only a tired sentry who deserves to be relieved.


    You are allowed to stand down. Not forever, not carelessly — just enough to breathe.
    And in the stillness where the watching finally rests, you may find that what
    you were guarding was safe all along.


    Book 7 of the Stillness Press anxiety series.'
