title: Still Listening Long After Lights-Out
subtitle: For the working parent whose mind stays on watch in the dark — scanning
  for dangers that never come, long after everyone is safely asleep
cover_tagline: Everyone's asleep. You're still on watch.
description:
  short_blurb: Even when the house is quiet and the children are safe in their beds,
    a part of you keeps scanning — listening for the cough, the fall, the thing that
    could go wrong. This book sits with the watcher inside you, the one that never
    clocks out, and gently offers to take the next shift.
  long_description: 'The house is quiet. The doors are locked, the children are breathing
    softly down the hall, and by every measure you are safe. And still, a part of
    you is awake and listening — for a cough, for a creak, replaying the day for what
    you might have missed, half-bracing for a danger that hasn''t arrived and almost
    certainly won''t. You can''t seem to put it down. The watching never fully stops,
    not even when your eyes finally close.


    This book is for the working parent who lives with a mind that never goes off
    duty. The hypervigilant one. The parent who scans every room for hazards, reads
    quiet tones for hidden threats, and lies awake on guard long after the need has
    passed. You are not paranoid and you are not high-strung by nature. You have a
    profoundly loving watcher inside you — a part that quietly took up its post the
    day you became responsible for someone small and fragile, and has been far too
    afraid to ever stand down since.


    Here, in a voice that comes and sits beside you through the long night, you''ll
    come to recognize the watcher with tenderness instead of frustration. You''ll
    see how it confuses vigilance with love, how it truly believes that if it ever
    stops scanning, even for a moment, harm will slip through. You''ll learn that
    the watcher cannot be argued away or forced asleep — only thanked, and slowly,
    gently relieved. You''ll feel what it''s like to let your guard soften without
    abandoning the ones you love, to trust, for one breath, that you are allowed to
    rest while the world keeps turning without your supervision. You''ll discover
    that laying your watch down is not the same as letting your children down.


    This is not a method to switch off your alertness, and it will not promise a mind
    that never scans again. There is no optimized, perfectly-relaxed parent to become,
    no final all-clear that lets you off forever. The watcher may take up its post
    again tomorrow night. That''s allowed. It loves them too.


    What you''ll have instead is a way to keep it company instead of being run by
    it — the warmth of being understood, and the quiet permission to lay your vigilance
    down, just for a while, into an open hand held out beside yours. You don''t have
    to keep watch alone. You''re allowed to let someone take the next shift.


    Book 7 of the Heart Transmission Press anxiety series.'
