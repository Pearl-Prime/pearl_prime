title: The Code That Never Came
subtitle: For the nurse whose body still braces for an emergency long after the shift
  ends — when the alarm keeps firing and there's nothing left to save
cover_tagline: Your body learned to be ready. Now it doesn't know how to stop.
description:
  short_blurb: Your chest tightens in the grocery line the way it did at the bedside,
    bracing for a monitor that isn't there. After years of being the one who stays
    calm while everyone else falls apart, your nervous system has forgotten how to
    tell a real emergency from a quiet Tuesday. This book is for the nurse whose alarm
    never powers down — and it will not ask you to push through one more time.
  long_description: 'It happens in the car first. The shift ended twenty minutes ago,
    your badge is still clipped to your scrubs, and your chest is braced like a monitor
    is about to alarm. Nothing is wrong. Your patients are stable. You are sitting
    in a parked car. And your body will not believe it.


    This is for the nurse whose alarm never came home from the floor. You spent years
    teaching your body to go from still to ready in half a second — to hear a tone
    three rooms away and already be moving. You got good at it. You got so good that
    your body stopped asking whether the danger was real. Now it fires in the produce
    aisle, at your kid''s recital, in the dark at 3am when your phone buzzes and your
    whole body floods before your eyes are even open.


    You are not broken. You are not weak. You are a body that learned its lesson too
    well, in a place that never let it rest. The bracing in your chest, the breath
    you can''t quite take all the way down, the way your hand goes to your phone before
    you''ve decided to reach for it — these are not signs that something is wrong
    with you. They are signs that something worked. The alarm did its job. It is simply
    still ringing.


    In these pages you''ll come to recognize the false alarm for what it is: a body
    doing exactly what it was trained to do, in a moment that no longer needs it.
    You''ll feel the difference between a real emergency and the echo of one. You''ll
    learn what it is to let your weight settle into a chair, a floor, the ground itself,
    and to feel — maybe for the first time in a long time — that nothing is coming.
    That you can stand down. That you are allowed to.


    This book will not teach you to push through. It will not tell you to relax, as
    if you hadn''t tried. It will not hand you a calmer face to wear on the unit.
    There is nothing here to fix, no protocol to follow, no nurse who was ever broken
    to begin with. What there is, instead, is a steady voice and solid ground — the
    kind that holds without gripping, that stays with you while your body slowly learns
    the shift is over.


    The code is not coming. You can put your hands down.


    Book 1 of the Held Ground Press anxiety series.'
