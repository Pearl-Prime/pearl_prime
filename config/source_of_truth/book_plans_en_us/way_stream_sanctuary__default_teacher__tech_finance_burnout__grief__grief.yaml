title: 'Grief: Living with What You''ve Lost'
subtitle: A Field Guide for Tech and Finance Professionals Navigating Grief
cover_tagline: Loss doesn't care that the market opens at 9:30.
description:
  short_blurb: Grief arrived and the world handed you two bereavement days and a full
    inbox. This is for the high-performer trying to carry a real loss while the deadlines
    keep their cadence. Not five tidy stages — a plain field guide to living with
    what's gone.
  long_description: 'The funeral was a Tuesday. By Thursday you were back, camera
    on, saying ''sorry, you cut out there.'' The grief didn''t end — it just went
    underground, surfacing in the elevator, in the parking garage, in the ten seconds
    before a call connects. Everyone was kind for about a week. Then the cadence reasserted
    itself: the sprint, the close, the review cycle, all of it indifferent to the
    fact that something at the center of your life is gone. You learned to grieve
    in the cracks, in mute, between meetings.


    This book is for the tech and finance professional living with a real loss inside
    a job that does not slow down. The person who lost a parent, a partner, a marriage,
    a pregnancy, a friend — and who is expected to keep being reliable, sharp, available.
    You operate in a world that prizes resolution: close the ticket, settle the trade,
    ship and move on. Grief doesn''t close. It doesn''t resolve on a timeline, and
    it definitely doesn''t care about your OKRs. The mismatch between how loss actually
    moves and how your job demands you move is its own particular kind of pain.


    We start by naming what you''re actually carrying — not the sanitized ''doing
    okay'' you give the team, but the real shape of it. Then we go down into it, because
    the descent is the part your entire professional reflex tells you to skip. You
    want to manage grief, optimize it, get back to baseline by a target date. This
    is not a problem to be managed. We don''t hand you the five stages like a project
    plan. We help you stop fleeing the feeling long enough to let it change you, so
    you come back able to live alongside what''s gone instead of bracing against it
    forever.


    This book will not promise closure or a return to who you were. It won''t give
    you a grief timeline to hit or tell you that staying busy is healing. There''s
    no reframe in here that makes loss efficient, because loss is not a thing you
    finish.


    What it offers is honest, grounded language for living with what you''ve lost
    — words you can actually use the next time it ambushes you between meetings, so
    you don''t have to swallow it whole. You don''t have to be ''over it'' to be okay
    at work. You don''t have to grieve on anyone''s schedule but your own. Setting
    it down for a moment doesn''t mean you''ve stopped carrying it. You''re allowed
    to carry it the way it actually weighs.'
