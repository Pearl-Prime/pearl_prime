title: Holding Three Trees in Falling Weather
subtitle: For the one carrying a parent, a child, and a job all at once, finding still
  air to breathe while the whole grove leans in the storm
cover_tagline: It all arrived at once, and there is no more room in you.
description:
  short_blurb: Too much is arriving at the same time and there is nowhere left in
    you to put it. This is a book for the person at the center of everyone's needs,
    and a way to find ground when capacity has run out and the day keeps asking for
    more.
  long_description: 'It is not one thing. It is everything, all at once. The parent
    who needs a ride to the doctor and the child who needs you at the school and the
    work that will not wait and the dishes and the bills and the text you forgot to
    answer three days ago. The flood comes in faster than you can bail, and somewhere
    underneath it your mind goes white and tight, because there is simply no more
    room in you — no space left to think, to choose, to feel anything but the rising
    water.


    This book is for you: the one in the middle, holding the generation above and
    the generation below, the person everyone turns to who has quietly run out of
    capacity and cannot say so out loud. You are not disorganized. You are not weak.
    You are carrying more than any one body was built to carry, and the overwhelm
    is not a personal failing — it is what a flood does when it has nowhere to drain.


    Walk slowly here, and you will come to recognize something. That you have been
    trying to hold the whole flood at once, all of it, in a single anxious grip, as
    though letting go of any of it would mean the whole thing collapses. You will
    learn what the forest floor knows: that it does not catch every falling leaf in
    mid-air. It simply lets them land, one at a time, and holds them where they fall.
    You will begin to feel the difference between the things that are genuinely yours
    to carry and the things you have only been gripping out of habit and fear.


    This is not a book about productivity. There is no system here for processing
    your inbox faster, no morning routine, no five-step framework for doing more in
    less time. It will not teach you to optimize the flood or hustle your way to the
    bottom of the list. It will not promise that everyone will stop needing you. What
    it offers instead is quieter and more honest: a clearing in the middle of the
    noise where you can set things down, one at a time, and discover that the ground
    holds even when you stop.


    Nothing here will help you carry more. That is the whole problem, and adding to
    it has never been the answer. The point is to find the place in you, deep and
    still as a forest pool, that was never meant to hold the flood — only to let it
    move through.


    You do not have to catch all of it. You are allowed to let it land.


    Book 2 of the Still Forest Press anxiety series.'
