title: Everyone in That Room Seems Sure of Themselves
subtitle: On the quiet habit of grading yourself against every composed face in the
  room — and the worth that no ranking can reach
cover_tagline: You keep score in a game no one else knows you're playing. You're always
  losing.
description:
  short_blurb: Around the table, everyone else seems to have it figured out — the
    easy authority, the cleaner title, the career that looks like it's going somewhere
    yours isn't. This is a book for the manager who quietly grades themselves against
    the whole room and never measures up, and who is tired of borrowing their worth
    from a comparison that cannot be won.
  long_description: 'It happens in the space of a status update. A peer speaks with
    that easy authority, names a number, mentions the thing they are leading next
    — and something in you goes cold and quietly busy. You begin the arithmetic you
    always begin. Where you are versus where they are. What they have that you do
    not. How far behind you must be for this to land the way it just did. By the time
    it is your turn to speak, you are already somewhere else, keeping score.


    This book is for the manager who measures. Against the colleague who got the title
    first. Against the friend whose career looks effortless from the outside. Against
    the version of yourself you were supposed to have become by now. You scan the
    room and see everyone else composed and certain, and you alone bracing — and the
    verdict is always the same, because a measure built to rank you will always find
    a way to.


    You will come to recognize how comparison really works in an ambitious life. How
    it poses as motivation while it quietly hollows you out. How it holds your insides
    up against everyone else''s outsides and calls the gap a fact about your worth.
    How the person who looks so certain across the table is very likely keeping a
    tally of their own. You will see what it costs to live your one working life as
    a permanent ranking — and you will feel what loosens when you finally set the
    wrong yardstick down.


    This book will not help you win the comparison, and that is the entire point.
    It will not teach you to get ahead of the people you envy, and it will not sell
    you the easy assurance everyone else seems to carry. It makes no promise that
    the impulse to measure ever fully goes quiet. What it offers instead is steadier
    ground: the recognition that you have been holding a borrowed ruler against the
    one life that was never meant to be ranked — yours, against a crowd — and that
    worth was never something you could earn a high enough place to finally deserve.
    The long arc of a life is not a leaderboard, and you were never as far behind
    as the tally insisted.


    The people around that table are not the measure of your life. Neither is the
    title you do not have yet.


    Book 2 of the Second Mountain Press Self-Worth series.'
