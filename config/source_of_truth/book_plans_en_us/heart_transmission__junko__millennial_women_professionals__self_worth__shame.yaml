title: If They Saw All of Me
subtitle: For the high-achieving woman who fears that if anyone glimpsed every part
  of her, they'd find the flaw she has spent years quietly working to hide
cover_tagline: You built a whole life around a place you decided was broken.
description:
  short_blurb: There's a part of you no résumé mentions — the quiet conviction that
    something is wrong with you, and that your job is to make sure no one ever finds
    it. This is a book for the woman who has spent years overworking to cover a flaw
    she's never let anyone see. It won't help you hide it better. It will sit with
    you while you stop.
  long_description: 'Somewhere along the way, you decided there was something wrong
    with you. Not a thing you did — a thing you are. You can''t always name it, but
    you''ve organized a whole life around making sure no one gets close enough to
    see it.


    So you became excellent. Reliable. The one who catches what others miss. From
    the outside it looks like ambition. From the inside, you know it''s a cover —
    a beautiful, exhausting cover for the place you decided was defective. And the
    praise never quite lands, because praise is for the version of you they can see,
    and you are busy guarding the one they can''t.


    This book is for the woman who reads her own good reviews and feels like a forgery.
    Who apologizes before she''s done anything wrong. Who hears ''you''re so put together''
    and thinks: you have no idea. If you''ve been carrying a quiet, lifelong sense
    that you are somehow less-than underneath it all — and overworking so no one finds
    out — this was written close to you, the way one heart turns toward another.


    We''ll go gently to the place you''ve been guarding. You''ll come to recognize
    the mask for what it always was: not a character flaw, but something a younger
    version of you built to stay safe. You''ll feel the cost of wearing it — how much
    of your energy goes to concealment, how the fear of exposure has been running
    quietly underneath your days. And you''ll meet the belief at the center of it,
    the one that says the real you is too much, or not enough, or simply wrong — and
    you''ll see, maybe for the first time, that it was never true. Not a verdict.
    Just an old ache that learned to speak in your voice.


    This book will not fix you, because you were never broken — and a person can''t
    be repaired into being worthy. There''s no program here, no protocol, no bright
    list of steps toward a flawless self. Nothing to perfect. Only the slow, warming
    work of being seen by one voice that asks for nothing back, until the part of
    you that you cover can come out into the light and find it isn''t a flaw at all.


    You are allowed to set the mask down. You are allowed to be seen whole.


    Book 1 of the Heart Transmission Press self worth series.'
