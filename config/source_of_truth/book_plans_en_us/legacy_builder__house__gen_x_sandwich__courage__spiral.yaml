title: The Plan That Was Never Brave Enough
subtitle: For the caretaker who rehearses the hard step a thousand times and never
  takes it — turning one true decision over until the window quietly closes
cover_tagline: You're not afraid to leap. You're afraid to stop planning the leap.
description:
  short_blurb: You've thought it through from every angle. You've drafted the conversation,
    predicted every reaction, run the worst case until it's worn smooth. And still
    you haven't moved — because the next thought always promises that one more pass
    will finally make it safe. This is a book for the mind that mistakes endless preparation
    for courage, and is ready to take the step it has already planned a hundred times.
  long_description: 'It starts as something reasonable. A decision needs making —
    about your mother''s care, about the job, about the thing you''ve wanted to say
    for years — and you are a responsible person, so you think it through. You consider
    the angles. You picture how it might land. You draft the words in your head on
    the drive home.


    And then you do it again. And again. One thought becomes ten, ten become a hundred,
    and somewhere in there the thinking stops being preparation and starts being a
    place to hide. Each new worry feels like diligence. Each replay feels like getting
    closer. But you never actually move, because the spiral always whispers the same
    thing: not yet, not quite, one more pass and you''ll be ready.


    This book is for you — the one holding a family together with a mind that never
    clocks out, who has confused the exhausting work of rumination with the real work
    of courage. You tell yourself you''re being careful. The truth is gentler and
    harder than that: you''ve been circling the edge for so long that circling has
    become the thing you do instead of stepping.


    You''ll come to recognize the spiral for what it is — not wisdom, not thoroughness,
    but fear wearing the costume of preparation. You''ll see how the perfect plan
    is always one thought away, how it has to be, because a plan you could actually
    act on would mean the moment had arrived. You''ll notice how the window you keep
    waiting to widen has, more than once, quietly closed while you rehearsed. And
    you''ll learn what it feels like to act on the plan you already have — the imperfect,
    eighty-percent, good-enough plan — and discover that the step you''ve taken a
    hundred times in your head takes about four seconds in the world.


    This book will not give you a system for thinking it through better. It will not
    hand you a decision-making framework that finally makes the fear go away, because
    no amount of planning was ever the missing piece. The spiral cannot be out-thought.
    It can only be interrupted by a single, ordinary action taken before the thinking
    feels finished.


    You do not need a better plan. You need to forgive yourself for the ones you never
    used, and take the small step the next one is already pointing toward. The view
    you keep imagining only opens once you''ve moved. You''ve prepared long enough.


    Book 2 of the Second Mountain Press courage series.'
