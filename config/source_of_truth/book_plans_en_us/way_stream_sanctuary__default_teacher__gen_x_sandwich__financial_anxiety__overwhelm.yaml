title: 'Financial Anxiety: Too Many Things, Not Enough You'
subtitle: A Real Talk Guide to Financial Anxiety for Gen X Sandwich
cover_tagline: Too many people need your money, and there isn't enough of you to go
  around.
description:
  short_blurb: You're funding a kid's tuition, covering a parent's prescriptions,
    and watching your own retirement number sit there untouched. This is a book for
    the moment when the math stops being numbers and starts being a wall you can't
    climb. It won't hand you a budget. It will teach you how to stand in the overwhelm
    without it flattening you.
  long_description: 'It usually hits at the kitchen table, late, after everyone else
    is asleep. The college portal is open in one tab, the pharmacy auto-refill notification
    is on your phone, and somewhere underneath both is the retirement account you
    keep telling yourself you''ll deal with next quarter. You go to add it up and
    your chest tightens before the total even loads. Too many people need a piece
    of you, and there is only one of you, and the figure you''re carrying is too big
    to look at straight.


    This book is for you — the one in the middle. Aging parents on one side, kids
    who still cost money on the other, and a paycheck that was sized for a smaller
    life than the one you''re actually living. You''re not bad with money. You''re
    carrying more financial weight than any one person was built to track at once,
    and the overwhelm you feel isn''t a character flaw. It''s an accurate reading
    of the load.


    So we start by naming it. Overwhelm isn''t the same as being broke and it isn''t
    the same as being anxious — it''s the specific shutdown that happens when too
    many real obligations arrive at the same time and your mind refuses to rank them.
    You''ll learn to recognize that shutdown in your body before it swallows the evening:
    the held breath, the open tabs you stop seeing, the urge to close the laptop and
    pretend none of it is due.


    Then, instead of rushing to fix it, you go down into it. You stop trying to solve
    all of it in one sitting and start letting the pile be a pile — looking at one
    corner of it at a time, on purpose, without the panic that says everything must
    be answered tonight. That''s the descent. It''s not pleasant, but it''s survivable,
    and it''s where the load finally stops being a single crushing mass and becomes
    a set of separate, human-sized things.


    What you come back with is not a spreadsheet that makes the obligations disappear.
    They''re still there. What changes is you. You''ll be able to open the laptop
    without your throat closing. You''ll be able to put one thing down so you can
    pick up another. You''ll stop confusing the feeling of too-much with the fact
    of what''s actually owed this week.


    This book will not promise you a system, a morning routine, or a clean financial
    life by spring. The money pressure of being the generation in the middle is real
    and it isn''t going away because you read a chapter. But you can stop being leveled
    by it every time you sit down to look. That much is yours to take. Open the laptop.
    You''re allowed to face it one corner at a time.'
