title: 'Imposter Syndrome: When You Feel Fundamentally Wrong'
subtitle: A Field Guide for Tech Finance Burnout Navigating Imposter Syndrome
cover_tagline: The fraud you're terrified of being exposed as doesn't exist.
description:
  short_blurb: You keep waiting to be found out, sure that one hard question will
    reveal you were never good enough to be here. In tech and finance, imposter syndrome
    is shame wearing a lanyard. This is a book about the buried belief that you don't
    belong — and how to finally look at it.
  long_description: 'The calendar invite comes in with no agenda, and your first thought
    is: this is it. This is the meeting where they realize their mistake. You''ve
    been waiting for it since the day you were hired — the moment someone asks the
    one question that exposes you for what some part of you is sure you are. A fraud
    who got lucky.


    This book is for the people in tech and finance who carry imposter syndrome as
    a private dread. The engineer who codes brilliantly and still feels like they''ve
    fooled everyone. The associate convinced the offer was an error nobody''s caught
    yet. The high performer living one hard question away from exposure, who experiences
    every success as a near miss instead of proof.


    Ana Reyes names what''s really running the show, and it isn''t a skills gap. It''s
    shame. The imposter feeling isn''t "I made a mistake" — it''s "I am the mistake."
    Underneath the competence is a buried belief that there''s something wrong with
    you that the credentials are covering up, and that any day now the cover slips.
    You don''t fear being wrong. You fear being seen.


    The book goes down into that belief instead of burying it under more achievement.
    You''ll get close to the thing you''ve never said out loud: that you secretly
    think you don''t actually belong, that you''re getting away with something. You''ll
    feel the shame of it directly, rather than outrunning it with one more win that
    never lands. That descent — looking straight at the fraud you''re afraid you are
    — is exactly where it dissolves. Because when you finally name it, there''s nothing
    there. There''s just a competent person who learned to feel like a counterfeit.


    Then you come back up able to hold your success without flinching. You''ll learn
    that the exposure you''ve been bracing for isn''t coming, because there''s nothing
    to expose. That you can be uncertain and still belong. That the seat is yours
    — not because you''ll never doubt it, but because the doubt was never the truth.


    This will not promise you a permanent end to the doubt or a trick for feeling
    legitimate. It won''t bury the shame under a gratitude list or a wall of accolades.
    There''s no mantra to repeat before the big meeting. There is only the honest
    work of carrying the thing you couldn''t say — and then saying it, and finding
    the fraud was never real.


    You are not getting away with anything. You belong here, and you always did.'
