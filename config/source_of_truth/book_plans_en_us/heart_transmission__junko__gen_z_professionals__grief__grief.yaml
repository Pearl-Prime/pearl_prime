title: The Chair Across From You Is Empty
subtitle: Carrying a loss no one at work can see, three weeks after the funeral —
  and the quiet permission to grieve without a deadline
cover_tagline: Nobody told you grief doesn't clock out when bereavement leave ends.
description:
  short_blurb: You went back to work. You answered the messages, joined the calls,
    and told everyone you were doing better. But the chair across from you is still
    empty, and a part of you has gone very quiet. This is a book that sits with the
    loss instead of asking you to be finished with it.
  long_description: 'There''s a moment a few weeks after the loss when the world expects
    you to be a person again. The casseroles stop arriving. The texts thin out. HR''s
    bereavement days are spent, and on Monday you''re back — answering threads, smiling
    into the standup camera, telling everyone you''re getting there. And you are getting
    somewhere, just not toward okay. You''re learning to carry a hole no one can see
    across a desk where you''re supposed to perform, and to do it without letting
    anyone see your hands shake.


    This book is for you. For the twenty-something who grieved on a deadline. Who
    lost someone — a parent, a friend, a grandparent who raised you, a version of
    a life you were promised — and discovered there is no time off long enough, and
    no one around who knows what to say anymore. You''ve become very good at the thumbs-up
    emoji. You''ve become a stranger to the part of yourself that is still, quietly,
    in mourning.


    We''ll sit with the chair that stays empty. We''ll let the absence be what it
    is — not a wound to close on schedule, not a lesson, not a thing to reframe into
    gratitude before you''re ready. You''ll come to recognize the small ways grief
    has hidden itself inside your competence: the over-functioning, the busyness you
    reach for so you don''t have to feel the quiet, the way you flinch when someone
    asks how you really are. You''ll find language for the loneliest part — that you
    are still loving someone who is gone, and the world keeps telling you that''s
    something to get over.


    This book will not move you through five stages. It will not hand you a timeline
    or a finish line or a silver lining. It won''t ask you to find the meaning in
    it, or to be grateful for the growth. There is no version of this where you win
    by being done.


    What it offers instead is company. A voice pulled up close, in a quiet room, beside
    the empty chair — close enough to be heard when nothing else can reach you, asking
    the only question that stays true when everything else has shifted: what remains?
    You are allowed to carry this. You are allowed to keep loving them. You don''t
    have to be finished to be alive again.


    Book 1 of the Heart Transmission Press grief series.'
