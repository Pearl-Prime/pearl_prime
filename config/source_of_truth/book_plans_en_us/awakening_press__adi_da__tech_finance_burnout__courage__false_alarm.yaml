title: The Body Keeps Sounding the Alarm
subtitle: For the high performer whose chest is braced for an impact that never comes
  — finding the courage beneath the false alarm
cover_tagline: The danger passed hours ago. Your body never got the message.
description:
  short_blurb: You keep waiting for the moment that will finally let you exhale, and
    it keeps not arriving. This is for the founder, the engineer, the one whose nervous
    system learned to treat every Slack ping and every quarter-end like a threat to
    survive. The courage you think you're missing was never missing — your alarm just
    got too good at its job.
  long_description: 'You know the feeling before you can name it. The deck is sent,
    the call is over, the deploy is green — and your chest is still braced, still
    scanning, still certain that something is about to go wrong. Nothing is. There
    is no tiger. There is only a calendar invite and a body that learned, somewhere
    along the way, to treat every quarter-end and every unread message like a thing
    it might not survive.


    This book is for you: the analyst, the founder, the one who closes the laptop
    at 1am with a heart rate that hasn''t read the room. You were told courage means
    pushing through the fear. So you''ve been pushing for years, and the fear is still
    here, louder than ever, and you''ve started to wonder if you''re simply not brave
    enough for the life you built.


    You''ll come to recognize something quieter and far more freeing. That the dread
    firing in your body is not a verdict on your character — it''s an alarm system
    doing exactly what it was trained to do, in a world engineered to keep it ringing.
    You''ll see how the false alarm masquerades as intuition, how it borrows the language
    of responsibility, how the bracing itself became so constant you mistook it for
    who you are. And underneath all of it, you''ll begin to feel something that was
    never in danger in the first place — a steadiness that doesn''t need the threat
    to pass before it can rest.


    This is not a book that will help you eliminate the fear, regulate your nervous
    system into submission, or finally win the war with your own body. There is no
    protocol here, no morning routine, no optimization. Those are just more ways of
    treating yourself as a problem to solve. Instead, you''ll learn to recognize the
    alarm for what it is — a sound, not a sentence — and to notice the open sky that
    was behind the weather the whole time.


    Courage, it turns out, was never the absence of the alarm. It''s what you are
    when you stop believing it. You don''t have to become someone braver. You only
    have to wake up to the one who was already steady, here, in the next breath.


    You are not broken. You are not behind. You are awake in a body that''s still
    ringing, and that''s allowed.


    Book 1 of the Awakening Press courage series.'
