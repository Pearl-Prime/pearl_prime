title: I Used to Have More to Give
subtitle: For the burned-out parent quietly mourning the version of themselves who
  had patience left at the end of the day — and the family they meant to be present
  for
cover_tagline: No one tells you that burnout is also a grief — for the parent you
  meant to be.
description:
  short_blurb: You snapped at them again over nothing, and the look on their face
    stayed with you all night. You remember being warmer than this, more patient,
    more here. This is a book for the parent grieving what burnout has quietly taken
    — and learning to stop punishing themselves for it.
  long_description: 'There''s a particular ache that comes at the end of a long day,
    after the door closes on the last bedtime. You replay the moment you lost your
    patience over something small. You remember — dimly, like another life — being
    softer than this. More present. The kind of parent who had something left over.
    And somewhere underneath the tiredness is a grief you rarely let yourself name:
    not just for your energy, but for the person you used to be, and the family you
    meant to give them.


    This book is for that grief. The one no one warns you about. The slow loss that
    burnout works on you — the patience worn thin, the warmth rationed, the bedtime
    stories read on autopilot while your mind is already three tasks ahead. You didn''t
    choose to become this depleted. It accumulated, one impossible week at a time,
    until the gap between the parent you wanted to be and the one running on empty
    became its own quiet sorrow.


    This book is for the parent who keeps apologizing in their own head. The one who
    misses themselves. The one who looks at old photos and can''t quite remember what
    it felt like to not be this tired.


    Here, you''ll come to recognize what burnout actually took, and to grieve it honestly
    instead of rushing to fix it. You''ll see how the relentless self-blame is itself
    a symptom of depletion — how an empty person has nothing left to be gentle with,
    least of all themselves. You''ll learn the difference between the things that
    are truly gone and the things that were only buried, waiting for enough rest to
    return. And you''ll find that letting yourself mourn what was lost is not giving
    up. It is the first honest step back toward the warmth you thought you''d lost
    for good.


    This book will not promise you can have it all back by tomorrow morning. It will
    not tell you to be grateful, or to reframe your exhaustion as a season, or to
    optimize your way to presence. The loss is real, and it deserves to be felt before
    it can be released. No amount of trying harder has ever brought a depleted person
    back to life — only rest, and honesty, and time.


    What it offers instead is permission to put down the case you keep building against
    yourself. To grieve the parent you couldn''t be, on the days you had nothing to
    give, without it meaning you failed. And to discover that the love was never gone
    — only buried under a weight no one was ever meant to carry alone.


    You are still in there. The warmth was never lost. It was only waiting for you
    to stop running long enough to feel it again.


    Book 2 of the Stillness Press burnout series.'
