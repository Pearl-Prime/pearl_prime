title: The Job You Almost Applied For
subtitle: For the qualified woman whose body sounds the alarm at the edge of every
  step up — bracing for a danger that never comes
cover_tagline: Your nerve isn't broken. It's just guarding a door that was never locked.
description:
  short_blurb: There's a version of your career on the other side of one terrifying
    email, and your whole body treats sending it like stepping off a ledge. This is
    a book for the woman who is ready on paper and rigid with dread in her chest,
    who keeps mistaking a bigger room for a real threat. It won't tell you the fear
    is irrational. It will show you how to step through it while it's still ringing.
  long_description: 'You read the posting again. You meet the requirements. You close
    the tab.


    It isn''t laziness and it isn''t lack of ambition. The moment you reach for the
    next thing — the application, the raise conversation, the ''I''d like to lead
    this'' — something in you slams shut. Your heart goes loud. Your stomach drops
    like the floor moved. Your body has decided this is dangerous, and it has filed
    the warning before your mind could ever argue back.


    This is a book for the woman whose career fear shows up as a false alarm. You''re
    not in danger. You''re at a door. But the alarm doesn''t know the difference between
    a bigger room and a cliff edge, so it fires the same way for both — full volume,
    full bracing, the dry mouth and the racing pulse that tell you to retreat to the
    version of your job you''ve already survived.


    You''ll come to recognize the alarm for what it is. The dread that arrives before
    you''ve even decided to do anything. The way you mistake your own readiness for
    recklessness. The hundred small retreats you''ve called ''being realistic'' —
    the email you didn''t send, the meeting where you let someone else''s smaller
    idea win, the promotion you talked yourself out of wanting so you wouldn''t have
    to feel this. You''ll learn to feel the surge and stay in the chair. To tell the
    difference between a body protecting you from harm and a body protecting you from
    growth. To take the step while the alarm is still going off, because waiting for
    the noise to stop is how you wait your whole life.


    This book will not make you fearless. It will not quiet your body for you or promise
    you a calm that arrives before the leap. There is no breathing trick here that
    turns a real edge into a flat road, and there is no version of this where you
    feel ready first. The readiness comes after. It always has. The women you''ve
    watched step up with steady hands didn''t wait until the fear was gone — they
    walked while it was still loud, and so can you.


    What it offers instead is company in the loud moment, and a way to keep moving
    when every signal says stop. The alarm can ring. You''re allowed to walk toward
    the door anyway.


    Book 1 of the Next Chapter Publishing courage series.'
