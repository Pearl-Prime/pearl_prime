title: 'After the Flame: The Shutdown Point'
subtitle: Too Many Things, Not Enough You — Burnout for Gen X Sandwich (When Everything
  Is Too Much)
cover_tagline: When the calls, the meds, the homework, and the work emails all land
  at once — and your brain just stops.
description:
  short_blurb: It's not that you can't handle one hard thing. It's that you're handling
    all of them, all at once, for everyone but yourself. This one-hour reset meets
    you at the moment the overwhelm whites out your brain, and shows you how to come
    back down without pretending the load got smaller.
  long_description: 'Your phone buzzes — it''s the care home. The other line is your
    kid''s school. There''s a work deadline you''ve already moved twice, a prescription
    that needs picking up, and a sink full of dishes you''ll get to never. And somewhere
    in there your mind just goes white. Not panic, exactly. More like a system that''s
    been asked to hold too much and quietly crashes.


    This is for you — the one in the squeeze of the sandwich generation, where aging
    parents and growing kids both need you today, right now, and there is genuinely
    more to do than one person can do. You''re not disorganized. You''re not weak.
    You''re carrying a load designed for three people, and the overwhelm is the honest
    readout of that math.


    This is a one-hour reset, built in three stages. Recognition: you learn to catch
    overwhelm in the body — the shallow breath, the tight jaw, the way every task
    suddenly feels equally urgent and impossible — before it swamps you. Descent:
    instead of frantically triaging or shutting down, you go down into the too-much
    itself, and stop pretending you can think your way out of a nervous system that''s
    flooded. You let it be as big as it is. Integration: you come back up able to
    do the next one thing, not all things — with the static turned down enough to
    actually be in your own life again.


    This book will not hand you a color-coded planner or tell you to wake up earlier
    to fit it all in. You don''t have a time-management problem; you have a too-much
    problem, and no app fixes that. It won''t promise the demands shrink, because
    they won''t. Your parents will still need you. Your kids will still need you.
    The deadline will still be there in the morning. What changes is that you stop
    drowning in all of it at once and learn to surface, breathe, and meet the load
    one piece at a time, instead of trying to hold the entire impossible pile in your
    head in a single held breath.


    In plain language you can reach for the next time everything hits at once, you''ll
    get a way to name what''s happening — "I''m flooded, not failing" — and a way
    back down that doesn''t require anyone to need you less or the day to suddenly
    get shorter. You''re allowed to not hold all of it in your head simultaneously.
    You''re allowed to let the overwhelm crest and pass instead of fighting it. For
    one hour, put it all down and let your system come back online. Start here.'
