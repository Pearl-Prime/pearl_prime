title: The Patients I Couldn't Save
subtitle: For the nurse carrying the ones who didn't make it — when anxiety is really
  unspoken loss, and letting go feels like letting them down
cover_tagline: You held their hand at the end. Who held yours?
description:
  short_blurb: Some shifts end and the patient doesn't go home. You keep moving —
    there's a bed to turn over, another assignment — and the loss goes somewhere you
    don't have words for, until it surfaces as a tight chest and a dread you can't
    name. This book is for the nurse whose anxiety is grief that was never allowed
    to be grief, and it will not rush you past a single one of them.
  long_description: 'You remember the room. You remember the time of death you called,
    the family you found the words for, the way you cleaned and prepared and made
    it gentle because that was the last thing you could do. And then you went back
    out and took report on the next admit, because the floor doesn''t stop, because
    there''s no bereavement leave for a nurse who lost a patient she''d had for three
    days. The grief had nowhere to go. So it went into your body, and now it lives
    there as something you call anxiety — a tightness, a dread, a bracing against
    a loss that already happened and was never allowed to be mourned.


    This is for the nurse carrying the ones who didn''t make it. The names you don''t
    say. The shifts that changed you and that you never told anyone about because
    what would you even say, and who has the time. You have been treating grief as
    a problem with your body, when it was never a malfunction at all. It is love with
    nowhere to land. It is the cost of caring for people at the edge of their lives
    and not being given a single minute to feel what that does to a person.


    You are not anxious. Or — not only. You are grieving, and grief that cannot move
    turns into a body that cannot settle.


    In these pages you''ll come to recognize the grief underneath the anxiety: the
    losses that were never named, the goodbyes you never got to have, the weight of
    caring that the work gave you no room to set down. You''ll learn the difference
    between bracing against loss and letting it move through you. You''ll feel what
    it is to finally set something down — not to forget it, not to get over it, but
    to lay it on ground that can hold it, so you don''t have to carry it clenched
    in your chest forever. You''ll discover that letting go is not letting them down.


    This book will not tell you to move on. It will not frame your grief as a mindset
    to fix or a stress to manage. It will not hurry you back to who you were before.
    There is no closure protocol here and no nurse to repair. What there is, instead,
    is a steady voice that knows the names matter — and solid ground beneath you,
    wide enough and strong enough to hold every loss you''ve been carrying alone,
    so that for the first time you can set them down and still keep loving them.


    They mattered. So do you. You are allowed to grieve.


    Book 5 of the Held Ground Press anxiety series.'
