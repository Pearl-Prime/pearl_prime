title: 'Overcoming Depression: When Loss Reshapes Everything'
subtitle: A Field Guide for Millennial Women Professionals Navigating Depression
cover_tagline: The flatness has a source. It's grief you never gave yourself room
  to feel.
description:
  short_blurb: Sometimes the heaviness you're calling depression is actually a loss
    that never got named. This is a one-hour reset for professional women who are
    functioning on the outside and gone gray on the inside. It won't fix you. It will
    show you what's underneath.
  long_description: 'You''re still hitting your deadlines. You''re still the one people
    rely on. But somewhere in the last few months the color drained out of everything,
    and you started calling it depression because that was the word within reach.
    What you haven''t connected it to is the loss — the role that ended, the version
    of your life that quietly closed, the relationship that isn''t there anymore,
    the future you''d half-planned that just stopped being possible. All you know
    is that a flat gray weight is sitting where your energy used to be, and most days
    you move it around like furniture.


    If you''re the woman who is high-functioning and hollowed out at the same time
    — who says "I''m fine" in the meeting and then sits in the parking garage with
    the engine off, not moving, not crying, just gone — this hour was written for
    you. For the one who suspects that if she stopped performing for sixty straight
    seconds, she''d find something underneath she has been very careful not to look
    at.


    So we look. The first thing we do is call it by its real name. This isn''t laziness,
    a motivation problem, or a flaw in your wiring — it''s grief that was never given
    room to land, so it went underground and surfaced as numbness. Naming it changes
    what you do with it. From there, instead of trying to optimize your way back to
    your old self, you let yourself go down into the loss for the length of this hour.
    You stop managing. You let the thing you lost be genuinely lost, without rushing
    to find the lesson in it. And then you surface again — not fixed, not finished,
    still carrying it, but no longer spending half your energy pretending the weight
    isn''t there. Changed, not repaired.


    Here is what you won''t be given: a five-step morning routine, a gratitude practice,
    a reframe that turns your loss into a growth opportunity, or a productivity system
    for feeling things faster. There is no life-hack for grief, because grief was
    never a productivity problem to begin with. It is simply the cost of having loved
    something, and that cost is not a defect in you.


    What you walk out with instead is language — the words to name the weight the
    next time it lands on you in the middle of a Tuesday standup, and the standing
    permission to feel it without treating it as something to clear off your plate
    before Monday.


    You are not broken. You are someone who lost something real and kept showing up
    anyway, which took more from you than anyone around you knows. That deserves an
    hour that asks nothing of you. Take it.'
