title: 'The Thing You Won''t Say: The False Alarm Response'
subtitle: A Real Talk Guide to Building Courage for Working Parents
cover_tagline: Your body sounds the alarm before you've even said hello. That's not
  weakness — it's wiring.
description:
  short_blurb: You're a competent parent and a competent professional, but the moment
    you have to raise your hand in a meeting or speak up at the school pickup, your
    body floods like you're in danger. This is a plain-spoken look at the false alarm
    — the surge of fear that fires when nothing is actually wrong. No fixing, no managing.
    Just learning what's happening and what to do with it the next time it hits.
  long_description: 'You''re standing at the edge of the work happy hour, or you''ve
    got a question that matters in the team meeting, or another parent just turned
    to you at drop-off — and your chest tightens, your face goes hot, your mind goes
    blank. Nobody is threatening you. Nothing is wrong. But your body is acting like
    a bear walked into the room. That''s the false alarm, and if you''ve spent years
    calling it cowardice, this book is going to give you a different word for it.


    This is for the working parent who holds it together all day — runs the meeting,
    runs the household, answers to a boss and to a six-year-old — and still freezes
    at the one thing that should be simple: speaking up, being seen, saying the thing
    you won''t say. You are not broken. Your alarm system is just firing on the wrong
    cue, and it has probably been doing it since long before you had kids of your
    own to be brave for.


    First you''ll learn to recognize it — the exact bodily signature of the surge,
    so you can name it in the half-second before it runs you. Then you''ll go down
    into it instead of bolting. Not breathing exercises, not a morning routine — actually
    staying in the room with the heat in your face and discovering that the alarm
    crests and passes whether or not you obey it. And then you come back changed:
    still feeling the surge, but no longer mistaking it for a verdict on who you are.


    Along the way you''ll pick up the small, unglamorous skills nobody hands you:
    letting the surge be in the room without letting it drive, staying in your seat
    the extra ten seconds it takes for the peak to pass, speaking with a shaky voice
    instead of waiting for a steady one that may never show up. None of it is about
    faking calm. It''s about doing the thing while the alarm still rings — raising
    your hand, sending the email, finishing the sentence — until your body updates
    its own outdated map of what counts as a threat.


    This book will not promise you confidence. It will not turn you into the parent
    who works the whole room or the colleague who never sweats. There is no optimized,
    anxiety-free version of you waiting at the end. What it offers instead is the
    end of the war — the moment you stop treating a false alarm as proof of failure
    and start treating it as exactly what it is: an old reflex that means well and
    gets it wrong.


    Your kids are watching how you do hard things. Not how you avoid them — how you
    do them scared. The brave parent isn''t the one who feels nothing at the parent-teacher
    night; it''s the one who asks the question anyway, voice wobbling, because it
    mattered. That''s the version of courage you can actually pass down. You don''t
    have to wait to feel ready. You don''t have to feel calm first. You''re allowed
    to let your heart pound and say the thing anyway.'
