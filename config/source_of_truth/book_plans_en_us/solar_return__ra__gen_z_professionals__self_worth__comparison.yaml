description:
  short_blurb: Your feed is full of people your age who seem to have it handled —
    the title, the apartment, the calm. You measure yourself against all of it and
    somehow always land behind. This is for the mind that turns everyone else into
    a scoreboard. It won't help you finally win the comparison, and that's the whole
    point.
  long_description: 'It usually happens late. You''re tired, you open your phone to
    stop thinking, and there it is — someone your age announcing the promotion, the
    move, the launch, the relationship that looks effortless. And in about two seconds,
    a quiet math runs in the back of your mind: they''re ahead, you''re behind, and
    you should have figured this out by now.


    This is what comparison does to self-worth. It takes a clear, capable mind and
    aims it at the one calculation it can never win — you, measured against everyone
    else, all at once, on their best day versus your real one. You don''t compare
    yourself to a person. You compare yourself to a highlight reel, and then you wonder
    why you always feel like the outtakes.


    This book is for the one who''s quietly keeping score. For the Gen Z professional
    who can be genuinely happy for a friend and gutted at the same time. You read
    the announcement, you type ''so happy for you,'' and you mean it — and then you
    sit with the heaviness that has nothing to do with them and everything to do with
    the gap you feel inside yourself. You''ve started treating other people''s lives
    as evidence in a case against your own.


    Here you''ll come to recognize how comparison actually works on you — how it cherry-picks,
    how it always finds someone further along, how it dresses up as motivation while
    it quietly drains the warmth out of everything you''ve actually done. You''ll
    see how the scoreboard moves the moment you reach it, so you''re never allowed
    to arrive. And you''ll begin to feel what''s true underneath the ranking: that
    your worth was never something to be won in a comparison, because it was never
    up for a vote.


    This is not a book that will help you get ahead. It won''t teach you to ''win
    at life'' or finally out-achieve the feeling. It won''t promise that one more
    accomplishment will quiet the comparison for good — because it won''t, and some
    part of you already knows that. Nothing here optimizes your standing. The point
    isn''t to climb higher than everyone in your feed. The point is to put the scoreboard
    down and feel the warmth that was here before you started ranking it.


    You are allowed to stop measuring. You don''t have to be ahead of anyone to be
    worth tending.


    Book 2 of the Ember & Ash Publishing self-worth series.'
