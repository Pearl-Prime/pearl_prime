title: I Used to Feel This More
subtitle: For the caregiver mourning the warmth that used to come easily — when the
  part of you that felt everything has gone quiet, and you miss her
cover_tagline: You did not stop caring. You are grieving the version of you who could.
description:
  short_blurb: No one warns you that compassion fatigue feels like a loss. You remember
    when this work moved you, when you came home full instead of hollow. This is the
    book for the quiet grief of a heart that has gone numb from giving — for missing
    the person you used to be. It will not rush you back to feeling. It will sit with
    you in what is gone, and help you understand that the numbness is not the end
    of your tenderness, only the cost of it.
  long_description: 'There was a version of you who felt this more. She cried at the
    good outcomes and the hard ones. She came home from a long day moved by what she
    had witnessed. She had room in her chest for the people she loved at the end of
    the night, not just at the start. You remember her. And somewhere along the way,
    without a funeral or a date you could point to, she went quiet — and you have
    been quietly grieving her ever since.


    This book is for you: the woman who gives care for a living and cannot understand
    why she feels so little now. The nurse who has stopped letting it in. The therapist
    who watches herself going through the motions. The one whose family says she seems
    far away, and is not wrong. You are not cold. You are not broken. You are mourning
    a tenderness that has been spent down to nothing, and grief is exactly the right
    word for it.


    Pull up a chair. We are going to talk about the losses that compassion fatigue
    quietly stacks up — the loss of feeling, the loss of the people and moments that
    used to land, the loss of who you were before the caring outpaced the refilling.
    We will let it be sad. We will not pretend the numbness is fine or productive
    or a sign you have finally gotten tough. We will name what was taken and, just
    as honestly, what you may need to set down on purpose so you can stop carrying
    it.


    Nothing here will hurry you back to your old self or promise that the warmth returns
    on a schedule. There is no exercise that resurrects what is gone or shames you
    for not feeling enough. This is not a plan to optimize your way back to caring.
    It is a conversation about loss — and about the strange relief of admitting that
    something in you died a little, so the rest of you can finally be tended.


    You are allowed to grieve who you used to be. You are allowed to miss her at the
    same table where you are learning to be kind to who you are now. The feeling is
    not gone forever. It is resting, the way you should have been allowed to all along.


    Book 2 of the Two Chairs Press compassion fatigue series.'
