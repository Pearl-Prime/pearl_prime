title: The 'No' You Think Makes You a Bad Person
subtitle: For the young professional who believes that needing limits means something
  is wrong with them — and overgives to cover it
cover_tagline: You don't have a boundary problem. You have a belief that you're too
  much.
description:
  short_blurb: You say yes to everything because somewhere underneath, you're convinced
    that the moment you stop being useful, people will see what you really are. This
    book is for the twenty-something who treats their own needs as proof of a defect.
    It won't fix you, because you were never broken. It'll help you set down the belief
    you've been overworking to hide.
  long_description: 'You stay late. You cover the shift. You answer the message at
    11pm because not answering feels like exposing something. And if anyone ever asked
    why you can''t just say no, you wouldn''t say ''I''m tired.'' You''d think — quietly,
    where no one can hear it — ''Because if I stop giving, they''ll find out I''m
    not actually good. They''ll see.''


    This is a book for you: the young professional who built a whole personality out
    of being easy, low-maintenance, never a burden, because some buried part of you
    decided long ago that your needs are evidence of a flaw. You''re early in your
    career, watching everyone else seem to ask for things without apologizing, and
    you''ve concluded the difference is that they''re allowed and you''re not. So
    you overgive. You overfunction. You make yourself indispensable so no one ever
    has the chance to leave.


    Here, you''ll come to recognize the shame underneath the yes — the old, wordless
    belief that there is something defective at the center of you, and that boundaries
    would let it show. You''ll feel how ''I have a limit'' got tangled up with ''I
    am a disappointment.'' You''ll notice how you perform availability the way other
    people perform competence — to cover a defect you''re not even sure is real. And
    you''ll begin to see that the thing you''ve been hiding was never a flaw. It was
    just a need. A human one. The most ordinary thing in the world.


    This book will not optimize you into a person who never feels the shame. It won''t
    hand you affirmations to repeat until you believe them, and it won''t promise
    that one reframe will dissolve a belief you''ve carried for years. There''s no
    fixing here, because nothing about you needs fixing. You are not a draft of a
    better person who hasn''t shipped yet. You''re already whole — you''ve just been
    taught to treat your wholeness as a problem.


    What''s here instead is the slow, honest work of separating your worth from your
    usefulness. Of letting a ''no'' exist without it meaning you''re bad. Of standing
    at the blank space of who you are when you''re not being useful, and finding —
    to your own surprise — that there''s a person there worth knowing.


    You''re allowed to have needs and still be good. You''re allowed to take up the
    room your existence requires. You''re allowed to stop auditioning for a place
    you already have.


    Book 2 of the Blank Canvas Books boundaries series.'
