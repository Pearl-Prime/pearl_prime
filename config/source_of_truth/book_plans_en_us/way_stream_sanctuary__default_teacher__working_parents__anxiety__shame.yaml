title: 'The Alarm Is Lying: What Shame Does to You'
subtitle: How Working Parents Are Rewriting the Rules of Anxiety Relief
cover_tagline: 'Underneath the anxiety is a quiet sentence you''ve believed forever:
  something is wrong with me.'
description:
  short_blurb: You manage, you cope, you keep it together, and underneath it all runs
    a quiet verdict that something is fundamentally wrong with you. This is a guide
    for working parents rewriting the rules of anxiety relief by going after the shame
    beneath it. It won't pump you full of affirmations. It'll help you find the buried
    sentence and stop obeying it.
  long_description: 'It''s there when you snap at your kid and the self-loathing arrives
    faster than the apology. It''s there when you take a compliment and instantly
    discount it. It''s there in the way you over-explain, over-apologize, over-deliver,
    all to outrun a feeling you can''t name. Underneath your anxiety is a verdict
    you''ve carried so long it feels like fact: something is wrong with me. Not with
    what I did. With me.


    This book is for the working parent who lives under that sentence. The one whose
    anxiety isn''t really about the deadline or the diagnosis or the messy house,
    but about what each of those seems to prove about you. You move through your days
    quietly braced for exposure, certain that if people saw the real you, the one
    you''re sure is defective, they''d pull back. You''re not actually broken. But
    the belief that you are has been running the show, and it''s exhausting.


    You''ll learn to name it: this is shame, not anxiety, not a personality, not the
    truth. A specific, buried feeling with a specific job, to keep you small and hidden
    so you can''t be rejected. Putting a name to it matters, because you''ve been
    treating a shame wound with anxiety tools and wondering why nothing sticks. Naming
    it won''t dissolve it, and this book won''t promise it does.


    Then you go down into it, toward the sentence itself, which is the last place
    you want to look because looking feels like agreeing with it. But you''ll learn
    to go down without drowning: to find where the belief got installed, usually long
    before you were a parent, and to see it for what it is, an old conclusion a younger
    you reached to survive something, not a fact about your worth. You stop fighting
    the shame and start understanding it.


    And you come back changed. Not suddenly full of self-love, this book won''t hand
    you a mirror and a mantra. Changed in that the verdict loses its grip. The voice
    that says something is wrong with you keeps talking, but you stop taking it as
    the final word. You can mess up as a parent and have it be a mistake, not evidence
    in a lifelong case against yourself.


    This book will not affirm you into wholeness, optimize your self-esteem, or promise
    you''ll wake up loving yourself by the end. What it offers instead is something
    steadier, the slow loosening of a belief you never chose. You are allowed to be
    a flawed, ordinary, struggling parent without that meaning you''re defective.
    The sentence was never true. You were just very young when you started believing
    it.'
