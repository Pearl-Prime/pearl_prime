title: 'The Line You Never Drew: The False Alarm Response'
subtitle: A Real Talk Guide to Setting Boundaries for Tech and Finance Professionals
cover_tagline: Saying no isn't dangerous. Your body just hasn't gotten the memo.
description:
  short_blurb: The thought of declining one more meeting sends a spike of dread through
    your chest, like something is genuinely about to go wrong. It isn't. This is a
    book about the false alarm that fires every time you try to set a limit, and how
    to stay in the room with it.
  long_description: 'Someone asks if you can "take a quick look" at one more thing,
    and before you''ve even thought about it your stomach drops, your jaw tightens,
    and you hear yourself say sure. The yes was out before your brain caught up. By
    the time you wonder why you agreed, the dread has already passed — because the
    threat was never real.


    This book is for the people in tech and finance whose nervous systems treat a
    boundary like a threat. The senior who can''t close their laptop without a low
    hum of "something''s wrong." The analyst whose chest tightens at the thought of
    leaving a Slack message unanswered overnight. The one who knows, intellectually,
    that declining a non-urgent ask won''t end their career — and whose body has clearly
    not received that information.


    Ana Reyes starts by naming what''s actually happening: this is a false alarm.
    The same wiring that should fire for real danger is firing when you go to protect
    your own time. Your body is convinced that drawing a line is unsafe, and it sounds
    the alarm — the racing heart, the spike of guilt, the urge to immediately undo
    the no. You are not overreacting. You are running a threat response over a calendar
    invite.


    Then the book goes down into it, instead of around it. You''ll learn to feel the
    alarm rise without obeying it. You''ll stay in the room with the discomfort of
    a boundary long enough to watch the catastrophe not arrive — the manager not implode,
    the deal not collapse, the team not turn on you. That staying is the whole practice.
    The fear doesn''t get fixed; it gets familiar, and then it gets quiet.


    You''ll come back able to tell the difference between a real fire and a false
    one. Between an actual emergency at 11pm and a body that simply hasn''t learned
    that your limits are allowed to exist. The alarm will still go off sometimes.
    You''ll just stop letting it run the meeting.


    This is not a book that promises you''ll never feel the dread again, or a system
    for saying no without flinching. It won''t optimize your stress response or hand
    you a script. There''s no breathing routine to memorize. There is only the slow,
    real work of staying with the false alarm until your body finally believes you
    when you say: this is safe.


    The alarm is not the truth. You are allowed to stay, and decide anyway.'
