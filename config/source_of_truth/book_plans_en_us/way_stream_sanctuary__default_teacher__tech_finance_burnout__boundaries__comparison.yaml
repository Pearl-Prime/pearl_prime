title: 'The Line You Never Drew: When Other People''s Success Feels Like Your Failure'
subtitle: A Field Guide for Tech and Finance Professionals Navigating Setting Boundaries
cover_tagline: Their promotion is not your verdict. Their "yes" is not your debt.
description:
  short_blurb: You said yes again because someone with your title already had. In
    tech and finance, the boundary you never drew is usually the one you measured
    against the person one level up. This is a book about how comparison erases your
    limits before you ever feel them.
  long_description: 'It is 9:40 on a Sunday and you are reorganizing a deck nobody
    asked you to touch, because someone in your cohort shipped theirs Friday and now
    the bar is wherever they left it. You didn''t decide to work tonight. You looked
    sideways, saw what they were carrying, and quietly raised your own load to match.


    This book is for the engineer, the analyst, the associate, the PM who keeps saying
    yes to the extra scope, the late call, the weekend ask, and then can''t figure
    out why they''re so tired when nobody is technically forcing them. It''s for the
    people who can''t draw a line because the person sitting one desk over, with the
    same title and the same deadline, isn''t drawing one either.


    Ana Reyes calls the thing by its real name first: this is comparison, and comparison
    is how your boundaries get erased before you even feel them. You''re not lazy
    and you''re not behind. You''ve been setting your limits by watching the most
    over-extended person in the room and treating their pace as the floor. Their twelve-hour
    day becomes your baseline. Their answered-at-midnight Slack becomes the standard
    you''re quietly graded against, and the grading never stops.


    From there the book goes down, not around. You''ll sit in the exact moment the
    comparison fires — the LinkedIn post, the promo announcement, the colleague who
    "just happens" to still be online — and you''ll feel what it does in your chest
    before you reach for your laptop to even the score. That descent is the work.
    Not fixing it. Not out-hustling it. Feeling how much of your yes was never about
    the task at all, and how little of it you actually chose.


    Then you come back up changed. You''ll learn to tell the difference between a
    limit you actually have and a limit someone else''s success talked you out of.
    You''ll catch the comparison earlier, when it''s still just a feeling and not
    yet a 70-hour week. You''ll find out that a line you draw on purpose holds, even
    when the person beside you refuses to draw one.


    This will not promise you a calendar that finally feels manageable or a five-step
    framework for saying no. It won''t optimize your boundaries or turn them into
    a productivity hack. There is no morning routine here. There is only the honest,
    repeatable work of noticing when their win has quietly become your sentence —
    and putting your limit back where it belongs.


    The line was always yours to draw. Their success was never permission to erase
    it.'
