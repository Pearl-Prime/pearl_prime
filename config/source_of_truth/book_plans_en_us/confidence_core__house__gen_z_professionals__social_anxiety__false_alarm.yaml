title: Bracing for a Room That Was Never Out to Get You
subtitle: For the young professional whose body sounds the alarm before every meeting,
  message, and hello — and who is learning to walk in before the dread decides for
  them
cover_tagline: Your nervous system is shouting danger into a room that just wants
  you in it.
description:
  short_blurb: Before the meeting starts, your chest is already tight and your face
    already warm, your body certain something is about to go wrong even when nothing
    is. This is a book for the young professional whose social alarm fires at hellos
    and Slack threads and shared lunches as if they were threats. It won't teach you
    to fake calm. It will show you how to recognize a false alarm for what it is,
    and cross the threshold anyway.
  long_description: 'You feel it before the door even opens. The tightening behind
    your ribs. The heat climbing your neck. The voice that says something is about
    to go wrong here, and you''re the one who''ll cause it. The meeting hasn''t started.
    The message you sent is sitting there unanswered, and you''ve already read it
    nine times for the mistake that isn''t in it. Nothing is actually happening. Your
    body did not get the memo.


    This book is for the young professional whose alarm system fires at ordinary rooms.
    The team lunch. The hello in the hallway. The camera turning on. You are not in
    danger, and some part of you knows that — and still the bracing comes, every time,
    as if walking into a conversation were walking into a fall. You have learned to
    manage it by getting smaller. Rehearsing the sentence. Scanning the faces. Leaving
    early. It costs you more than anyone sees.


    Here is what you will come to recognize. That the dread arriving before the room
    is a false alarm — a body built to protect you, firing at a threat that isn''t
    there. You''ll see how the bracing became a habit, and what it has quietly taken:
    the questions you didn''t ask, the rooms you left, the version of you that never
    got to arrive. You''ll learn that the alarm can sound without being obeyed. That
    you can feel the heat in your face and still raise your hand. That walking in
    before the fear gives permission is not recklessness — it''s the first step over
    a line you''ve been standing behind for years.


    This book will not promise to make the alarm stop. It won''t hand you a script,
    a power pose, or a way to become someone louder than you are. There is no optimizing
    your way out of a nervous system that loves you a little too anxiously. What it
    offers instead is recognition — the steadying relief of understanding the thing
    that has been running you — and a quieter, surer way to stand in the doorway and
    walk through.


    You were never the problem in those rooms. You just arrived already braced for
    an attack that was never coming. You can set that bracing down. Not all at once.
    One threshold at a time.


    Book 1 of the Threshold Books social anxiety series.'
