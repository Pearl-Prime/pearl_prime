title: 'Grief: When Loss Reshapes Everything'
subtitle: A Real Talk Guide to Grief for Corporate Managers
cover_tagline: Back at your desk by Tuesday. Still standing in it.
description:
  short_blurb: Someone or something is gone, and the world expected you to keep managing
    through it. The compassionate-leave email is sent, the team is covered, and you
    are quietly coming apart in the gaps between meetings. This is one hour to actually
    let the loss be a loss.
  long_description: 'You took the days. You sent the kind, brief email. You made sure
    the team was covered, the launch didn''t slip, the on-call rotation held. And
    now you''re back at your desk on a Tuesday with a hole in the middle of you that
    no one in the standup can see. The grief is real, the loss is real, and the entire
    machinery of your job is built on the quiet assumption that you''ll keep producing
    through it. So you have been. And it''s tearing, just below the surface, where
    the camera doesn''t reach.


    This hour is for the manager grieving on company time. Maybe a person you loved
    is gone. Maybe it''s a marriage, a parent''s slow decline, a friendship, a whole
    chapter that closed without your permission. Whatever it is, you''ve been holding
    it together for everyone reporting to you while it comes apart inside, because
    the calendar didn''t pause and grief doesn''t fit in a deprioritized sprint, and
    bereavement leave ran out long before the grief did.


    Waystream meets this without sentiment and without a worksheet. We start by naming
    the loss as a loss, not a resilience opportunity, not a thing to process efficiently
    before the next planning cycle. Then you go down into it. You let yourself feel
    the size of what''s gone for one full hour instead of metering it out between
    Slack pings. You stop managing the grief and let it move through you, which is
    the only direction it ever actually goes. This is descent on purpose: not to wallow,
    but because the way back up runs straight through the middle of it, never around
    the edge.


    This book will not tell you the loss happened for a reason or that you''ll come
    out stronger. It will not hand you five tidy stages to complete or promise you''ll
    feel like yourself again by the next quarter. Grief has no deadline and this hour
    won''t pretend otherwise. What it gives you is permission to set down the performance
    of being fine, go all the way into the loss, and come back to your desk changed,
    still grieving, but no longer doing it in secret while you smile through the one-on-one.


    You are allowed to be wrecked by this and still be the person they report to.
    The two were never actually in conflict, no matter how hard the workday has tried
    to convince you that you had to pick one. Let it be a loss.'
