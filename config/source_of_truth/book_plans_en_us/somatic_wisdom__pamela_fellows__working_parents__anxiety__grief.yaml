title: The Parent You Were Before All This
subtitle: For the working parent grieving an unnamed loss — the self, the ease, the
  life you pictured, that anxiety arrived to fill the space of
cover_tagline: Some of the worry is just sorrow you never got to feel.
description:
  short_blurb: Beneath the anxiety is a loss you may never have let yourself name
    — the person you were, the ease you had, the life you imagined would feel different
    than this. This is a body-first companion for the parent carrying ungrieved sorrow
    as constant worry. It won't rush you toward acceptance. It will make room for
    what you've lost, so your body doesn't have to hold it as fear.
  long_description: 'You found the old photo on your phone — you, before, laughing
    at something, looking lighter than you can remember feeling in years. And something
    caught in your throat. Not quite sadness, not quite longing. A grief with no funeral:
    for the self you used to be, the spontaneity you traded, the marriage or the body
    or the years that aren''t coming back, the version of this life you pictured that
    simply never arrived. Nobody died. And still, something was lost, and your body
    has been carrying that unnamed loss the only way it knows how — as a low, constant
    anxiety that never quite explains itself.


    This book is for the parent who is quietly grieving and calling it stress. Who
    feels a pang they can''t place at the school gate, at bedtime, at the sink. Who
    misses someone, and the someone is themselves. Who has had no time and no permission
    to mourn the things that ended when this chapter began — because the kids need
    dinner, because grief feels ungrateful when you love them this much, because there
    was never a moment to stop. The anxiety is real. But some of it is sorrow wearing
    the only coat it was given. Loss that can''t be felt doesn''t disappear. It waits
    in the body, and it knocks as fear.


    Here you''ll come to recognize the grief hidden inside the worry — the heaviness,
    the tightness in the chest that isn''t quite dread, the tears that arrive sideways
    at odd moments. You''ll learn that grief is not a problem to solve but a weight
    to be allowed, slowly, with breath and with kindness. You''ll feel what it is
    to let your body finally hold the loss as loss instead of as alarm — to let it
    move through you, soften, settle, the way it was always meant to. Not to get over
    what''s gone. To stop bracing against the missing of it.


    This is not a method for moving on. There''s no closure to achieve, no stages
    to march through, no pushing past it. We will not tell you to count your blessings
    over a body that needs to mourn, and we will not force open a grief you aren''t
    ready to meet. Nothing here promises the ache will leave on schedule. The point
    isn''t to be done. The point is to make room — to let what was lost be lost, and
    felt, and held.


    You are allowed to miss who you were and still love who you''ve become. You are
    allowed to grieve a life no one died from. The sorrow will rise and the sorrow
    will ease, the way weather moves through, and you can learn to let it pass through
    a body soft enough to feel it. You don''t have to carry it as fear anymore. You''re
    allowed to simply, finally, be sad — and to let that be tender instead of dangerous.


    Book 5 of the Felt Sense Publishing anxiety series.'
