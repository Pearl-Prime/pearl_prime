title: 'Sleep Anxiety: Too Many Things, Not Enough You'
subtitle: The Overwhelm Response — Sleep Anxiety for Healthcare Rns (When Everything
  Is Too Much)
cover_tagline: Too much shift, too little night. The system just trips the breaker.
description:
  short_blurb: Everything from the day landed at once the second the lights went off,
    and your mind simply went over capacity. This hour is for the nurse who hits the
    shutdown point in bed — flooded, blank, too full to rest. It won't help you process
    it all tonight. It'll show you what to do when the load is more than the night
    can hold.
  long_description: 'You got into bed and it all arrived at once. The patient who
    wasn''t doing well. The family member who lost it at the desk. The thing you said
    to the resident that you wish you hadn''t. The forty other things you didn''t
    have a second to feel during the shift. It didn''t come in a line you could work
    through one at a time — it came as a flood, all of it at the same moment, and
    something in you just tripped. Now you''re lying there both completely overloaded
    and weirdly blank, too full to think and too wired to sleep, staring at a ceiling
    you can''t see.


    This hour is for the nurse who hits the shutdown point in bed — the moment the
    day''s volume exceeds what one night can metabolize. You''re not weak for hitting
    it. You ran a twelve-hour shift that asked for more than any nervous system was
    built to hold, and now it''s all calling in at once with nowhere to land. The
    overwhelm isn''t a failure to cope. It''s a system at capacity doing exactly what
    a system at capacity does — it stops taking new input and it stops draining the
    old.


    You''ll start by recognizing the flood as a flood — not a to-do list to clear
    before you''re allowed to rest, not a sign you''re falling apart, just more than
    the night can hold. Then you''ll go down into the shutdown instead of fighting
    your way back to function. You''ll stop trying to sort it, solve it, or shrink
    it down to something manageable before dawn. You''ll let yourself be at capacity
    without demanding you process the whole day first. That''s the turn: you don''t
    have to drain the flood tonight. You just have to stop pouring more in by trying
    to handle all of it at 3am.


    What you come back with isn''t an empty mind or a tidy resolution. It''s permission
    to be over capacity and let the night just be the night. The load is real, and
    it''s also not all due right now. Most of it can wait until you''ve slept. Some
    of it will look smaller in daylight, and some of it was never yours to carry.
    Tonight, you get to set it down where it lands.


    This book will not promise you a cleared head, or a method to file the whole shift
    away before sleep, or a way to never get flooded again. There''s no decompression
    routine to run like a checklist, no version of the job that stops being this much
    on a bad day. The floods will come. You''ll just stop trying to bail the boat
    at 3am with a thimble.


    You don''t have to carry all of it into the night. You''re allowed to be full,
    and still lie down.'
