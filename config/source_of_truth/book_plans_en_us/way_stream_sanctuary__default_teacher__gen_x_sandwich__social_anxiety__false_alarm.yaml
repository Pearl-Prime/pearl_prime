title: 'Social Anxiety: When Fear Lies to You'
subtitle: A Real Talk Guide to Social Anxiety for the Sandwich Generation
cover_tagline: It's a school meeting, not a threat to your life. Try telling your
  nervous system that.
description:
  short_blurb: 'You walk into the IEP meeting, the family gathering, the doctor''s
    office, and your body reacts like you''re in real danger — racing heart, tight
    chest, the urge to bolt. This book is about the false alarm behind social anxiety:
    a threat response firing in rooms where nothing is actually threatening you. It
    teaches you to stay, and act, while the alarm is still going off.'
  long_description: 'It''s just a meeting. A circle of chairs, a teacher, your kid''s
    name on a form. Or it''s just a kitchen full of relatives who love you, asking
    how your mother''s doing. And your body has decided it''s a matter of survival
    — heart slamming, face hot, that animal pull toward the door. Nothing in the room
    can hurt you. Your nervous system did not get the memo.


    This book is for you — the one in the middle, holding aging parents and growing
    kids, walking into ordinary social situations and meeting them with a full-body
    emergency response. You are not fragile. You are running an alarm that mistakes
    being seen, being asked, being on the spot, for genuine danger — and you''ve spent
    years arranging your life around not setting it off.


    False alarm is the exact thing happening here. Social anxiety isn''t a character
    flaw; it''s a threat system misfiring in safe rooms. The dread before the gathering,
    the blank mind mid-sentence, the replay afterward — that''s your body sounding
    a siren for a situation that was never actually a threat. And because the siren
    feels like proof, you avoid, you cancel, you stay small.


    The work has three parts. Recognition: you learn to catch the alarm for what it
    is — a signal, not a verdict — and to name it in plain words while you''re standing
    in the doorway. Descent: instead of fighting the symptoms or fleeing the room,
    you go down into the surge and discover it crests and passes on its own, and that
    it can''t actually harm you. Integration: you come back able to stay in the room,
    speak in the meeting, answer the question, while your body is still buzzing —
    because the buzzing was never danger.


    This book will not promise you calm. It won''t hand you a breathing trick that
    switches the alarm off, and it won''t tell you that one day these rooms will feel
    easy. The surge may always come. What changes is that you stop obeying it. You
    stop letting a false alarm run your calendar and shrink your life.


    No exposure worksheets. No social scripts. No "just relax." Just a clear, grounded
    account of what the alarm is doing in your body and how to stay and act anyway,
    in the exact rooms you''ve been avoiding.


    Your body is allowed to ring the bell. You''re allowed to stay in your seat. That''s
    the whole practice.'
