title: Everyone Else Looks Like They've Got It
subtitle: For the working parent measuring a body full of strain against everyone
  who seems to manage it with ease
cover_tagline: Everyone else seems fine. You know how that feels.
description:
  short_blurb: Everyone else seems to be managing it with ease, and you're measuring
    your strained, tired body against theirs. This is a book for the working parent
    who always comes up short in the comparison — and the relief of finally putting
    the yardstick down.
  long_description: 'You see them at drop-off, in the meeting, on the screen — the
    other parents who seem to have it handled. Calm. Capable. Unbothered by the weight
    you can feel in your own chest right now. And something in you measures: their
    ease against your strain, their put-together morning against the one you barely
    survived, their steady bodies against yours that won''t stop bracing. You always
    come up short. You''ve been keeping this scorecard so long you''ve forgotten you''re
    the one holding the pen.


    This book is for the working parent who lives in comparison. The one who scrolls
    and shrinks, who watches everyone else seem fine and reads it as evidence of their
    own failure. Who carries the quiet exhaustion of never measuring up to people
    whose insides they cannot actually see.


    Here you''ll come to recognize what comparison is doing to your nervous system
    — the way each measurement tightens the body, confirms the deficit, and sends
    you reaching for more effort to close a gap that was never real. You''ll feel
    where the comparing lands: the sink in the stomach, the held breath, the bracing
    that comes the instant you stack yourself against someone else. You''ll learn
    that the calm you envy is mostly a surface you''re comparing your depths to, and
    that the way out is not to finally win — not to become impressive enough to stop
    feeling less-than — but to turn the instrument off its endless target: yourself,
    found wanting. The body cannot settle while it''s being measured. It settles when
    the measuring stops.


    Nothing here will help you win the comparison. That''s the point. This is not
    a book that will make you more put-together than the other parents or hand you
    the routine that finally closes the gap. There is nothing here to optimize, and
    no superior version of you waiting to come out on top.


    What it offers instead is recognition — a language for the comparing that you
    can reach for the next time it starts, at the school gate, in the feed, in the
    dark when everyone else seems asleep and fine and you are neither. You''ll come
    to understand what your body does when it measures itself against everyone else,
    and why, given all you carry unseen, it makes complete sense.


    Not fixed. Not finished. Just the scorecard set down at last, and a body that
    no longer has to win to be allowed to rest.


    Book 7 of the Stillness Press somatic healing series.'
