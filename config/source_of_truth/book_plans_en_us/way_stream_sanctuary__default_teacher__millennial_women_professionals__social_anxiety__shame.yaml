title: 'Social Anxiety: When You Feel Fundamentally Wrong'
subtitle: A Real Talk Guide to Social Anxiety for Professional Women
cover_tagline: You're not afraid of the party. You're afraid they'll see what you
  see.
description:
  short_blurb: Social anxiety isn't really about people — it's about being looked
    at while believing there's something wrong with you. This book goes underneath
    the avoidance to the buried conviction driving it, written for capable women who
    shrink in rooms they belong in. Not to fix you — nothing's broken — but to let
    you stop hiding the self you've decided is unacceptable.
  long_description: 'It''s not the small talk that scares you. It''s the looking.
    The moment in the conversation when their attention settles on you and you feel
    the floor drop, because now they might see it — the thing you''re sure is wrong
    with you, the defect under the competence, the part of you that you''ve spent
    your whole life keeping out of the light. So you deflect. You ask them about themselves.
    You leave before it gets too close. Anything but be seen.


    This book is for the professional woman whose social anxiety is really a hiding
    operation. You can do the job, run the meeting, hold the room when you have a
    role to play. It''s the unstructured exposure that undoes you — the mingling,
    the new group, the moment you''re just yourself with nothing to perform — because
    that''s when the wrongness might show. The avoidance isn''t about disliking people.
    It''s about protecting them from a version of you that you''ve decided they shouldn''t
    have to see.


    That conviction has a name, and it''s not anxiety. It''s shame — a buried belief
    that something at your core is unacceptable, fundamentally and permanently. Social
    situations don''t create it; they threaten to expose it. That''s why a friendly
    room can feel as dangerous as a hostile one. It was never about whether they''re
    nice. It''s about what you''re certain they''ll find.


    We''ll move through this in three stages, and it is not a confidence seminar.
    First, recognition: you''ll learn to feel the difference between ordinary social
    nerves and the specific dread of being seen as wrong — because they need completely
    different things from you. Second, descent: instead of managing the shame with
    performance or escaping the room before it surfaces, you''ll turn toward the thing
    you''ve decided is unacceptable and stay with it, directly, longer than feels
    safe. Third, integration: you''ll come back having learned that the wrongness
    cannot survive being witnessed — that it has only ever lived in the hiding.


    This is plain, secular talk for your real life — the party you left at the doorway,
    the introduction where you went vague about yourself, the friendship that stayed
    shallow because depth meant exposure. No worksheets. No mirror affirmations. No
    invitation to be grateful for the wound or call it your greatest teacher.


    What this book will not do is give you a fixed, presentable self to bring to the
    party. You don''t need one. There was never anything to correct. The work is not
    earning the right to be seen — it''s discovering you were never the problem you''ve
    been hiding all along.


    You are not too much and you are not wrong. You''re just exhausted from hiding.
    You''re allowed to be seen as you are.'
