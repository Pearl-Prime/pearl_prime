title: The Money Math Never Stops
subtitle: For the professional woman whose income looks fine and whose mind never
  gets a break — when student loans, rent, and the next obligation all arrive at once
cover_tagline: Everything is due, and there is no room left to think.
description:
  short_blurb: Your salary should be enough, and somehow you are still running numbers
    at the dinner table. This is a book for the professional woman who has too much
    arriving at once and no room left to breathe. It will not hand you a budget. It
    will hand you back the part of your mind the math has been renting.
  long_description: 'The student loan payment, the rent that climbed again, the friend''s
    wedding you cannot skip, the 401k you keep meaning to set up, the card you are
    quietly carrying. None of it is a crisis on its own. All of it together is a flood,
    and you have been treating the water level like a personal failing.


    This book is for the professional woman whose income looks fine from the outside
    and whose mind never actually gets to clock out. You are not bad with money. You
    have simply had too much arriving at once, for too long, with no room left to
    think — and a flooded room cannot tell you which thing matters most. It just keeps
    you bracing.


    You will come to recognize the overwhelm for what it is: not proof that you are
    behind, but a capacity that got exceeded and never got to reset. You will see
    why the numbers feel loudest exactly when you are most tired. Why opening the
    banking app and closing it again can take an entire evening. Why a raise can land
    and change nothing, because the flood does not care what the number is — it cares
    that there is no shore. You will start to notice the difference between a real
    obligation and the background roar that makes every obligation feel like it is
    due tonight.


    This book will not optimize you. It will not hand you a spreadsheet, a system,
    or a morning routine that finally fixes it. It will not tell you to earn more
    or want less. There is no budget at the back, and that is the point — you have
    tried being more disciplined, and discipline was never the thing that was missing.


    What you will find instead is room. A way to set the water down long enough to
    hear yourself think, so that the next decision is yours and not the panic''s.
    You do not have to have it all handled to deserve a quiet mind. You are allowed
    to put one thing down before you pick up the next. The room you have not entered
    yet — the one where the math is not always running — is closer than the flood
    has let you believe.


    Book 1 of the Next Chapter Publishing financial anxiety series.'
