title: 'Imposter Syndrome: Carrying What You Can''t Say'
subtitle: A Real Talk Guide to Imposter Syndrome for Corporate Managers
cover_tagline: The fear isn't that you'll fail. It's that they'll find out who you
  really are.
description:
  short_blurb: 'Underneath impostor syndrome is a belief you''ve never said aloud:
    that if anyone saw the real you, they''d know you don''t belong. This book is
    about that shame — the secret you''re sure you''re one mistake away from exposing.
    No fake-it-till-you-make-it. Just an honest descent into the thing you''re most
    afraid is true.'
  long_description: 'You delivered the project, it landed well, and instead of relief
    you felt the clock start. Because in your mind a win isn''t proof you''re good
    — it''s borrowed time before the discovery. You move through your role bracing
    for the moment someone looks closely and sees what you''re certain is underneath:
    that you don''t actually belong here, and you never did. That secret is the real
    subject of this book.


    This is for the manager who looks competent from every angle and privately lives
    one conversation away from being found out. You don''t just doubt your skills.
    You carry a buried conviction that the doubt is the truth and the competence is
    the costume — that the version of you people trust is a performance, and the real
    you is the fraud waiting to be exposed. That''s not modesty. That''s shame, and
    it has been writing the story.


    Recognition first: the impostor feeling isn''t really about ability. It''s a shame
    belief — the sense that something about you, at the core, disqualifies you, and
    that visibility equals exposure. So you keep the real self hidden, overprepare
    to cover the gap, and treat every success as a near miss. This book says the secret
    out loud, because a belief you can finally see has far less grip than one you''ve
    been protecting in the dark.


    Then we go down into it instead of outrunning it. We sit with the specific dread
    of being seen — not the fear of a bad outcome, but the deeper fear that the truth
    about you is bad. Not to reassure you that you''re great, not to coach you into
    owning the room. To stay with the belief long enough that it stops operating as
    the silent fact underneath everything you do at work.


    What you come back with isn''t unshakable self-belief. It''s the recognition that
    the thing you''ve been hiding was never the disqualifying secret you took it for.
    The exposure you dread is just being a person who doubts, in a body that learned
    to read doubt as proof of fraud.


    This book will not teach you to perform confidence until you feel it, and it won''t
    promise the fear of being found out disappears. You''ll still flinch when someone
    looks closely. You''ll just stop assuming that what they''d find is the worst
    thing you believe about yourself.


    You are allowed to be seen exactly as you are, doubt and all, and still belong
    in the seat. There was never a fraud to expose.'
