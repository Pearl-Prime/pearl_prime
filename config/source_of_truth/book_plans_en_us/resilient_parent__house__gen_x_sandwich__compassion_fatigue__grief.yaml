title: Grieving a Mother Who Is Still Alive
subtitle: Mourning the parent who used to be the one who knew what to do — and letting
  go of who you thought you'd get to be
cover_tagline: You are losing her slowly, and no one sends a casserole for that.
description:
  short_blurb: She is still here, and you are already grieving — the mother who used
    to be the one who knew what to do, the future you pictured, the version of caregiving
    you can no longer sustain. This is a book for the parent in the middle, mourning
    losses that have no funeral and no permission. It will not tell you to look on
    the bright side. It will sit in the quiet with you and let the loss be real.
  long_description: 'No one warns you about this kind of grief. The kind where the
    person is still alive — still in the next room, still on the phone — but the parent
    you knew is slipping away one small thing at a time. She forgets the name of the
    street you grew up on. He asks the same question a fourth time. The mother who
    used to be the one you called when you didn''t know what to do now needs you to
    know what to do, and something in you is breaking that has no name and no casserole
    and no one standing at the door to say they''re sorry for your loss.


    This book is for the Gen X parent caught in the middle — raising your own children
    while you watch a parent decline, grieving in advance and grieving in private.
    You are mourning more than a person. You are mourning the future you assumed you''d
    have, the version of yourself who would get to rest someday, the relationship
    you wanted and won''t get to finish. And underneath all of it, you may be grieving
    the parent you can no longer be to your own kids, because you have so little left
    to give.


    Here you will come to recognize the losses you''ve been carrying without a word
    for them. The slow goodbye that started before anyone acknowledged it. The guilt
    that hides inside grief — the part of you that is tired, that has had moments
    of wishing it were over, and then drowns in shame for thinking it. You will learn
    that letting go is not the same as giving up, and that you are allowed to release
    what you cannot carry without releasing the love underneath it.


    This book will not rush you toward acceptance. It will not tell you she''s still
    here so be grateful, or that everything happens for a reason, or hand you five
    stages to move through on a schedule. There is no fixing a loss like this. There
    is only being allowed to feel it — in the parked car, in the quiet after bedtime,
    in the stolen minutes when you finally let yourself stop being strong.


    So let it be heavy. You are not failing because this hurts. You are grieving someone
    you love while she is still here to be loved, and that is one of the hardest things
    a person can be asked to do. You are allowed to set it down for a moment. You
    are allowed to be the one who is held.


    Book 2 of the Stolen Moment Press compassion fatigue series.'
