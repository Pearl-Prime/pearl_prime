title: By Midnight a Single Worry Has Roots Everywhere
subtitle: For the parent whose one late-night thought branches into a hundred before
  dawn
cover_tagline: It started with one small worry. Now you can't find your way back down.
description:
  short_blurb: One worry catches, and by midnight it has become a hundred, each feeding
    the next. This is a steady book for working parents trapped in the spiral of rumination
    — and a way to stop feeding the loop and feel the ground come back beneath you.
  long_description: 'It begins with one thought. A look the teacher gave you at pickup.
    A cough that sounded wrong. An email you should have answered. By itself it''s
    nothing. But it catches, and then it pulls — into what it means, what could go
    wrong, what that says about you — and an hour later you''re three disasters deep
    and wide awake at 2am, exhausted and unable to stop. The spiral promised that
    if you just thought it through hard enough, you''d find solid ground. It never
    delivers. It only pulls you further down.


    This book is for the working parent whose mind spirals. The one who lies awake
    running the loop while the house sleeps, who can turn a single worry into a sleepless
    night, who is so tired of their own thinking. You are not weak and you are not
    catastrophizing for the drama of it. Your mind is trying to think its way to safety.
    It just doesn''t know that the thinking is the quicksand.


    Here you''ll come to recognize the spiral from the inside. How one thought hooks
    the next. How the loop disguises itself as problem-solving so you''ll keep feeding
    it. How the very effort to think your way out digs you in deeper. You''ll feel
    where the spinning lives in your body — the racing chest, the tight throat, the
    legs that won''t settle — and you''ll begin to find the one thing the spiral can''t
    offer: ground that doesn''t move, underneath all that motion. Not by winning the
    argument in your head. By stepping off the wheel.


    This is not a book of thought-stopping tricks or affirmations to argue back with.
    Arguing with the spiral feeds it; you already know that. There''s nothing here
    to push through and no mental technique to perfect. What''s here instead is slower
    and steadier: a way to recognize the pull early, to stop pouring fuel on the loop,
    and to let your body remember the solid ground that was beneath you the whole
    time you were spinning.


    You don''t have to follow the thought all the way down. The first worry will still
    come — minds do that, especially loving, responsible ones. But you can stop feeding
    it into a thousand. You can come back to the floor, the breath, the dark quiet
    room, the ground that is still holding you even now.


    You''re allowed to stop thinking and just be held for a while.


    Book 3 of the Held Ground Press anxiety series.'
