title: 'The Weight Without a Name: When Everything Is Too Much'
subtitle: A Real Talk Guide to Overcoming Depression for the Sandwich Generation
cover_tagline: It's not that you can't cope. It's that no one could carry this much
  at once.
description:
  short_blurb: Too many people need too much from you, and the heaviness that follows
    looks like depression but starts as overwhelm. This is a real-talk guide for the
    Sandwich Generation about what happens when everything lands at once. It won't
    help you do more — it'll help you put something down.
  long_description: 'There''s a specific kind of shutdown that happens when too much
    arrives at the same time. The pharmacy call, the school thing, the deadline, your
    dad''s confusion on the phone, the dishwasher that''s broken again — and instead
    of speeding up, you go blank. You sit in the car in the driveway with the engine
    ticking and can''t make yourself open the door. You''ve been calling that depression.
    A lot of it is overwhelm that finally maxed out, and your nervous system pulled
    the plug to protect you from a load it couldn''t keep carrying at full power.


    This is for the Sandwich Generation — the people raising kids and caregiving parents
    and holding a job in the same twenty-four hours everyone else gets. You''re not
    weak. You''re carrying three lives. When everything is too much, the body doesn''t
    push harder. It dims the lights and waits for the danger to pass, except the danger
    is just Tuesday, and Tuesday keeps coming.


    First you''ll recognize the difference between sadness and saturation — that the
    flat, heavy nothing is often a system that took on more than any one person was
    built to hold. Then you go down into it: not fixing the overwhelm, but feeling
    the honest truth of how much is actually on you, named one piece at a time so
    it stops being a single crushing blur and becomes a list of real, separate things.
    Then you come back able to see where the edges are.


    No worksheets here. No five-step morning routine. No one telling you to think
    your way to calm while your phone is buzzing with everyone else''s emergencies.
    Sam Meridian writes plainly and without sugar — the voice of someone who knows
    that ''just prioritize'' is useless advice when every item on the list is a person
    you love.


    What this book will not do: it will not teach you to get more done, and it will
    not pretend you can optimize your way out of a genuinely impossible load. There''s
    no productivity system for being three people at once. What it will do is name
    what''s actually happening when you go blank in the driveway, so you can recognize
    the dimming as protection instead of failure — and find the one thing you''re
    allowed to set down.


    You are not the bottleneck. You are a human being holding too much. That''s allowed
    to be true. Start here.'
