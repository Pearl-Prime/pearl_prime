title: The Body Cried Wolf
subtitle: For nurses whose alarm never shuts off — when speaking up, setting a limit,
  or simply being seen sets off a danger that isn't there
cover_tagline: Your body sounds the alarm before you've even decided to be brave.
description:
  short_blurb: You can stay calm through a code and then feel your heart slam at the
    thought of telling your manager you can't take the extra shift. This is a book
    for nurses whose nervous system treats every honest, courageous act as a threat
    to survive. It will not tell you to push through the fear. It will show you why
    the alarm fires, and how to let the ground hold you long enough to take the step
    anyway.
  long_description: 'You can run a rapid response with steady hands. You can deliver
    the worst news of someone''s life in a voice that does not shake. So why does
    your whole body brace when you have to ask the charge nurse for help, or tell
    a doctor you think the order is wrong, or say the word no?


    Because courage, for you, has stopped feeling like courage. It feels like danger.


    This book is for the nurse whose alarm system never fully powers down. You read
    every room for threat — the patient who might crash, the family who might complain,
    the colleague who might decide you''re not pulling your weight. You brace for
    something you can''t name. And the bracing has become so constant you''ve mistaken
    it for who you are.


    Here you''ll come to recognize the false alarm for what it is. You''ll see how
    the same vigilance that keeps your patients safe turns on you the moment you try
    to speak for yourself — how the body fires its warning before you''ve even finished
    the thought, and how you''ve learned to read that surge as proof you shouldn''t
    have spoken at all. You''ll feel where the alarm actually lives: not in your fear,
    but in a chest that never gets to the bottom of a breath, shoulders that have
    forgotten how to come down, a root that hasn''t touched the ground in years.


    This is not a book about getting braver. It will not hand you a script for being
    assertive or a five-step plan to override the fear. There is nothing here to force
    and no version of you that has to perform better under pressure. The alarm is
    not a flaw in your wiring to be fixed. It is a faithful, exhausted guard who has
    been on duty too long, mistaking your own honesty for an intruder.


    What you''ll find instead is slower, and truer: how to let your body learn, one
    steady breath at a time, that being seen is not the same as being in danger. How
    to feel the ground come back up to meet you. How to take one small, real step
    toward what you want before the alarm has agreed it''s safe — because it may never
    agree, and you can move anyway.


    You are allowed to want things. You are allowed to take up room. And you are allowed
    to feel the fear ring through you and stay exactly where you are.


    Book 1 of the Root & Meridian Press courage series.'
