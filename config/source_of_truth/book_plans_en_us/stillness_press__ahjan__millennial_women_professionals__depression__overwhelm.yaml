title: The Day Was Too Much Before It Started
subtitle: For the high-functioning woman drowning in a flat, gray heaviness — when
  even an ordinary morning arrives as more than you can carry
cover_tagline: You did everything today. You still can't feel the ground.
description:
  short_blurb: Some mornings the day is already too heavy before your feet touch the
    floor — not because anything is wrong, but because everything at once is more
    than you have left to give. This is a book for the woman who keeps functioning
    while a colorless weight presses down on all of it, and who is so tired of pretending
    the load is normal. It won't hand you a system. It will sit with you in the flood
    and let you put something down.
  long_description: 'It''s 7am and the day has already won. You haven''t moved yet
    and you can feel it stacked above you — the inbox, the standup, the texts you
    owe, the version of yourself everyone is expecting to show up. None of it is a
    crisis. That''s the part no one understands. It''s just all of it, arriving at
    once, against a heaviness that has no name and no good reason, and you do not
    have enough of yourself to meet it.


    This book is for the woman who functions. Who answers everything, hits every deadline,
    and still feels a gray weight pressing the color out of her days. Who has confused
    being depleted with being lazy, and overwhelm with failure, because from the outside
    she is doing fine. You are not behind. You are not weak. Your capacity is not
    broken — it has simply been asked to hold far more than any one person can hold,
    for far longer than anyone should, and the flood you feel is the honest sound
    of a life stretched past its edge.


    You''ll come to recognize the difference between a full life and a flooded one.
    How depression doesn''t always look like sadness — sometimes it looks like a competent
    woman who can''t decide what to eat because every small choice has become one
    more thing arriving at once. You''ll see how the heaviness and the overwhelm feed
    each other, and how much of the load you''ve been carrying was never yours to
    lift alone. You''ll find what it feels like to let the water settle instead of
    fighting the current — to make room, one thing at a time, until you can breathe
    in the space between.


    This book will not optimize you. It offers no morning routine, no mindset to perfect,
    no way to turn your exhaustion into one more project. It will not promise that
    the weight lifts by Friday. What it offers is quieter and harder to find: the
    permission to set something down without earning it first, and the steady company
    of a voice that has stood in this same flood and knows it is survivable.


    You are allowed to be tired. You are allowed to want less, not more. You are allowed
    to stop, here, on this page, and feel the floor come back under you.


    Book 1 of the Stillness Press depression series.'
