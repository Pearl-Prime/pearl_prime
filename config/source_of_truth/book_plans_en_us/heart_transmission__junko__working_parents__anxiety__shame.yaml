title: The Parent You're Afraid You Are
subtitle: For the working parent hiding a quiet belief that something is wrong with
  them — and overworking to keep anyone from finding out
cover_tagline: You're not hiding a flaw. You're hiding a wound.
description:
  short_blurb: 'Beneath the anxiety is an older, quieter fear: that you are secretly
    not enough, not patient enough, not present enough — and that if anyone saw the
    truth of you, they''d agree. This book gently turns toward that hidden belief
    and tells it something it has never been told.'
  long_description: 'It lives underneath everything else. Beneath the racing thoughts
    and the tight chest is a belief so old you barely hear it anymore: that something
    is wrong with you. That a better parent wouldn''t snap like that. That everyone
    else got an instruction manual you somehow missed. That if your colleagues, your
    own mother, the other parents at pickup ever saw who you really are behind the
    held-together smile, they would finally know what you''ve always quietly suspected
    — that you''re not enough.


    This book is for the working parent who carries shame like a second skin. The
    one who overworks, over-apologizes, and over-functions, hoping that if you just
    do enough you can cover the defect you''re certain is there. You are not defective.
    You are wounded — somewhere along the way you absorbed the idea that your worth
    had to be earned, and you''ve been paying down that debt with your own exhaustion
    ever since, as though rest were something you hadn''t yet deserved.


    Here, in a voice that comes close without judgment, you''ll come to recognize
    shame by its many disguises: the perfectionism, the comparison, the way you flinch
    at your own mistakes far harder than you''d ever flinch at a friend''s. You''ll
    learn the quiet but enormous difference between I did something wrong and I am
    something wrong — and how anxiety grows so easily in the soil of that second sentence.
    You''ll feel what it''s like to bring the hidden part of you into the warmth of
    being seen, and to discover that it was never the monster you feared. Just a tired,
    frightened part that has been overworking for years to keep you safe from being
    found out.


    This is not a confidence program, and it will not promise to fix the flaw — because
    there is no flaw to fix. There is no optimized, finally-good-enough parent waiting
    at the end of all the work. The old belief may whisper again tomorrow, in your
    mother''s voice or your own. That''s allowed. You can hear it and still not believe
    it.


    What you''ll have instead is a way to meet the part of you that you''ve been hiding,
    and to offer it the one thing it has never received: a hand that doesn''t pull
    away. You don''t have to earn your place in your child''s life, or in your own.
    You were never the problem.


    Book 4 of the Heart Transmission Press anxiety series.'
