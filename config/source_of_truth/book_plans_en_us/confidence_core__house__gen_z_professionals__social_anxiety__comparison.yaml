title: The Threshold Only You Seem to Notice
subtitle: For the young professional who feels the doorway every colleague crosses
  without thinking
cover_tagline: You're comparing your inside to everyone else's outside, and losing
  on purpose.
description:
  short_blurb: Everyone else seems to just walk into the room and belong — speaking
    up easily, laughing at the right moment, looking like none of this costs them
    anything. You watch it happen and feel further behind by the minute. This is a
    book for the young professional whose social anxiety runs on comparison. It won't
    help you finally win the comparison. That's the point.
  long_description: 'They walk in like they belong there. Your coworker drops a joke
    into the meeting and the room laughs. Someone speaks up without rehearsing it
    first. On your feed, everyone your age looks settled, connected, fine — like they
    got an instruction manual for being a person and you were absent the day it went
    out. You watch all of it and do the math you always do: they''re ahead, you''re
    behind, and the gap is your fault.


    This book is for the young professional whose social anxiety runs on comparison.
    You don''t just feel nervous in the room — you feel nervous and then measure that
    nervousness against everyone who looks like they feel nothing. The ease of others
    isn''t neutral information to you. It''s a scoreboard, and you are always losing
    on it. So you stay quiet to avoid proof of the gap, and the staying quiet becomes
    more proof, and the loop tightens with every room you enter.


    Here is what you will come to recognize. That you have been comparing your inside
    to everyone else''s outside — your raw, unedited fear against their composed surface
    — and calling the mismatch a verdict on your worth. You''ll see how the measuring
    works, how relentlessly it runs, and what it costs: the connection you don''t
    reach for because you''ve already decided you''d come up short. You''ll learn
    that the calm you envy is mostly a performance you can''t see behind, and that
    the part of you doing all this comparing is a sharp and careful one, simply turned
    the wrong way — on yourself, against a standard no one actually meets. You''ll
    feel what it''s like to walk into a room without first ranking yourself in it.
    That is the threshold: not winning the comparison, but stepping out of it.


    This book will not promise to make you the most at-ease person in the room. It
    won''t teach you to out-confident your coworkers or talk your way to the top of
    a scoreboard that was never real. Nothing here will help you win the comparison.
    That''s the point — because the comparison was never a fair fight, and you were
    never meant to be in it.


    The people who look like they belong are mostly just better at hiding that they
    wondered too. You don''t have to beat them to walk through the door. You only
    have to stop keeping score long enough to cross it.


    Book 3 of the Threshold Books social anxiety series.'
