title: How a Midnight Worry Multiplies
subtitle: A single small worry after lights-out, breeding into a hundred before you
  notice — a steady hand for the woman whose own mind keeps pulling her under in the
  dark
cover_tagline: It starts with one thought. By midnight it's a sky full of them.
description:
  short_blurb: It begins with one small worry, and by the time you notice, you're
    three hours and a hundred imagined disasters deep, each thought feeding the next.
    This is a book for the woman whose mind turns one sentence into a thousand, written
    to help her step off the wheel without having to win the argument inside it.
  long_description: 'It always starts so small. One thing someone said. One email
    left unanswered. One flicker of did-I-handle-that-right. And then the mind, which
    loves you and is trying to protect you, takes that single thread and begins to
    pull — and pull — until you''re three hours past sleep, lying in the dark with
    a thousand branching what-ifs, having argued with people who aren''t there and
    lost futures that haven''t happened. Each thought hands you to the next. The wheel
    turns and turns and you are strapped to it.


    This book is for you: the one whose brain replays the meeting on a loop, who drafts
    apologies at 1am for things no one else remembers, who has mistaken the spinning
    for solving. You are not crazy and you are not weak. You have a quick, capable,
    pattern-hunting mind — the same one that makes you good at your work — and right
    now it''s caught in a current that feeds itself, mistaking motion for safety.


    Here, you''ll come to recognize the spiral for what it is — not a search for the
    truth, not a problem you''re about to solve if you just think a little harder,
    but a loop that runs on its own fuel and calls it productivity. You''ll see how
    the mind convinces you that going around one more time will finally land you somewhere
    safe. You''ll learn what it feels like to step off the wheel mid-turn — not by
    silencing the thoughts, not by out-arguing them, but by gently declining to take
    the next one''s hand. There''s a moment, small as a breath, where the spiral offers
    you the next thought and you can simply not reach for it. This book lives in that
    moment.


    It will not hand you a thought-stopping technique to perform like a drill, or
    a reframing script, or the promise that you''ll someday have a mind that never
    spins. The goal was never to win the argument. The argument has no bottom. The
    goal is to notice you''re on the wheel, and to remember you were never actually
    tied to it.


    You don''t have to think your way out of the spiral. You only have to stop believing
    the next lap will save you — and let your hand, just once, stay open instead of
    grabbing the next thought as it comes around. The wheel can keep turning. You
    can step off and watch it go.


    Book 3 of the Heart Transmission Press anxiety series.'
