title: The Draft You'd Never Show Anyone
subtitle: For the teenager hiding the truest part of themselves behind a version that
  feels safe to share
cover_tagline: You don't lack courage. You're spending it all on hiding.
description:
  short_blurb: You work so hard to look fine. To say the safe thing, post the right
    thing, keep the realest part of you out of sight — because somewhere underneath
    you've decided that if people saw the actual you, they'd see the thing that's
    wrong. This is a book about that buried belief, and the quiet courage of letting
    yourself be seen.
  long_description: 'There''s a version of you that you keep out of sight. The questions
    you don''t ask so you won''t look dumb. The work you don''t show because it isn''t
    good enough yet, and it''s never good enough yet. The opinion you swallow, the
    laugh you fake, the way you scan a room to figure out who to be in it. From the
    outside it looks like you''re just quiet, just chill, just fine. Inside, you''re
    working harder than anyone knows — covering.


    This book is for you — the one who carries a quiet, buried belief that something
    about the real you is wrong. Not something you did. Something you are. And so
    you hide it, and you overwork to make up for it, and you brace for the day someone
    looks close enough to find it out.


    Here is what we are going to say plainly, as many times as you need to hear it:
    there is nothing to find. That belief is not the truth about you. It''s an old
    conclusion you reached when you were too young to argue with it, and you''ve been
    quietly building your whole self around protecting it ever since.


    You''ll come to recognize how much of your courage is already being spent — not
    on the leap, but on the cover-up. The energy it takes to hide is enormous. You''ll
    learn where the belief came from, why being a student makes the fear of being
    seen so sharp, and why hiding never actually makes you safe, only smaller. You''ll
    feel the difference between the you that performs and the you that''s real, and
    you''ll start to suspect the real one was never the problem.


    We''ll stand at the edge together. The drawing you keep face-down. The hand you
    don''t raise. The true sentence you almost say. You''ll learn that being seen
    is its own kind of courage — maybe the hardest kind for someone your age — and
    that you don''t have to fix yourself first to deserve it. One honest mark. One
    real thing, shown to one safe person, before you feel ready.


    This book will not make you confident or hand you a way to finally feel good enough.
    We are not here to fix you, because you were never broken — and a book that promised
    to fix you would just be agreeing that something''s wrong. There''s nothing in
    you that needs correcting. There''s only something to stop hiding.


    What you''ll find instead is permission. Permission to show the unfinished thing.
    To be seen before you''re polished. To let people meet the real you, shaky and
    in-progress, and discover that what you were so sure they''d reject is mostly
    just human, and mostly just yours.


    You were never the defect you''ve been covering. Let''s put down the cover, one
    honest mark at a time, and let the real you finally take up the room it''s allowed
    to.


    Book 3 of the Blank Canvas Books courage series.'
