title: 'Building Self Worth: What Shame Does to You'
subtitle: What Shame Does to You — Self-Worth for Millennial Women Professionals (What
  Shame Does to You)
cover_tagline: The voice isn't saying you did something wrong. It's saying you are
  wrong. Listen closer.
description:
  short_blurb: Underneath the achievements is a steady conviction that something is
    wrong with you at the core. This is the one-hour book about the shame that runs
    beneath self-worth, the belief no resume ever quiets. It won't argue you into
    feeling enough. It will go down to where that belief lives and let you see it
    for what it is.
  long_description: 'You did the thing. The launch landed. The review was glowing.
    The promotion finally came through. And for roughly a day you actually felt it
    — and then the old voice came back, the one that doesn''t bother saying you failed,
    that says something quieter and far worse instead: that none of this touches the
    thing that is genuinely wrong with you, that they simply haven''t seen it yet,
    that you are, all the way at the bottom, not enough in some way no achievement
    has ever once managed to reach.


    This is for the professional woman who has built a genuinely impressive life directly
    on top of a buried certainty that she is fundamentally flawed. This isn''t impostor
    syndrome in the tidy, postable, LinkedIn-caption sense. It''s the bone-deep conviction
    that the credentials are a costume thrown over something defective underneath,
    that being found out is only and always a matter of time, that the worth other
    people seem to see in you is a generous misunderstanding you are quietly responsible
    for managing and maintaining. So you keep achieving, you keep producing, you keep
    saying yes — half-believing that the next win, the bigger one, will finally land
    in the place that never feels okay. It never does. That place doesn''t answer
    to evidence. It was never an evidence problem.


    It goes in three descending steps. First it gets named, exactly: the voice was
    never actually about anything you did or didn''t do. It''s shame — the belief
    that something is wrong with who you fundamentally are — and it was already there,
    settled in, long before any job or title or review existed to hang it on. Then,
    instead of trying to outrun it with one more accomplishment, you stop reciting
    your résumé at the feeling and you go sit down with the belief itself. How early
    it arrived. How quietly it learned to disguise itself as having high standards,
    as caring, as drive. You let it be there without immediately reaching to fix it.
    Then you come back up able to recognize the voice for what it is — an old wound
    still talking — rather than receiving it as an accurate, up-to-date report on
    what you are.


    This will not hand you affirmations or teach you to argue the shame down with
    airtight logic and a list of your accomplishments. It will not promise the voice
    goes silent the moment you believe in yourself hard enough. It won''t simply tell
    you that you''re enough and expect that one sentence to land where the wound actually
    lives. The voice is not telling you the truth about yourself. It is faithfully
    repeating something you were taught, young, to believe.


    You are allowed to be enough at the core — nothing added, nothing proven, nothing
    pending. The wrongness you feel is not a fact about you. It is a story that got
    in early and stayed.'
