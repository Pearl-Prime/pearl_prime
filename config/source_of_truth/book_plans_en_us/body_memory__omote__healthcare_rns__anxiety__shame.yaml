title: Everyone Thinks I'm the Calm One
subtitle: For the nurse who is praised for staying steady and secretly believes she's
  the only one barely holding on — hiding the panic no one is supposed to see
cover_tagline: They think you're unflappable. You think you're a fraud.
description:
  short_blurb: You're the nurse everyone leans on — steady, unflappable, the one who
    handles it. And underneath the praise lives a quiet certainty that if anyone saw
    how anxious you really are, they'd know you were never as capable as they thought.
    This book is for the nurse who overworks to cover a defect she's sure is real,
    and it will not ask her to perform calm for one more person.
  long_description: 'They tell you you''re the calm one. The new grads watch how you
    move. The charge nurse gives you the train wrecks because you don''t rattle. And
    every time someone says it — she''s so steady, nothing fazes her — something in
    you flinches, because you know the truth. Inside, you are bracing. Inside, your
    heart is going. Inside, you are sure the steadiness is a performance, and that
    one day the mask will slip and everyone will finally see what you''ve always known:
    that you''re not actually as capable as they think, that there is something wrong
    with you, that you''ve been getting away with it.


    This is for the nurse who carries a hidden defect she''s certain is real. Shame
    is the quietest of the weights you carry and the heaviest. It isn''t the fear
    that you did something wrong — it''s the buried belief that you ARE something
    wrong, and that the calm exterior is the only thing standing between you and being
    found out. So you overwork. You over-prepare. You stay an hour late charting what
    was already fine, because the cost of someone seeing the panic underneath feels
    like exposure of the worst kind.


    You are not a fraud. The anxiety underneath the calm is not evidence of a defect.
    It is evidence that you have been holding something heavy, alone, for a very long
    time, and calling the strain of it proof that you''re broken.


    In these pages you''ll come to recognize shame for what it is: not a truth about
    who you are, but a belief you absorbed and have been overworking to hide. You''ll
    feel the difference between being calm and performing calm — and what it costs
    to never be allowed to set the performance down. You''ll learn what it is to let
    yourself be seen as a body that gets scared and stays good at the work anyway.
    You''ll feel your own weight held by ground that does not require you to be unflappable
    to deserve a place on it.


    This book will not coach you toward a more convincing calm. It will not tell you
    to fake it till you make it or to project confidence you don''t feel. It will
    not polish the mask. There is nothing wrong with you to fix. What there is, instead,
    is a steady voice that already sees the panic underneath and does not flinch —
    and solid ground that holds you exactly as you are, scared and capable and finally,
    mercifully, not hiding.


    You were never the fraud. You were just the only one who didn''t know everyone
    else was scared too.


    Book 4 of the Held Ground Press anxiety series.'
