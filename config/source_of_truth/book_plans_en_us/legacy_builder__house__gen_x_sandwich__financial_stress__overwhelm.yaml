title: The Math at Midnight
subtitle: For the one holding up two generations on a single income — when the bills,
  the parents, the kids, and the years arrive all at once and there's no room left
  to think
cover_tagline: You ran the numbers again. They still don't cover everyone you love.
description:
  short_blurb: You are the one the whole family leans on, and lately the leaning has
    become a flood — mortgage, your mother's care, the kid's tuition, the years you
    haven't saved, all arriving in the same week. This is a book for the person whose
    capacity ran out a while ago and who kept carrying anyway. It won't hand you a
    budget. It will help you find the floor under your feet again.
  long_description: 'It comes all at once. That''s the part nobody warns you about.
    The mortgage and the property tax and your mother''s new prescription and the
    deposit your kid needs by Friday and the quiet thought, underneath all of it,
    that you should have more saved by now — they don''t take turns. They land on
    the same Tuesday, in the same hour, and your mind goes wide and white trying to
    hold them all at once.


    This book is for you: the one in the middle. Old enough to have parents who need
    you and children who still do, caught in the squeeze that nobody chose, carrying
    a household and a half on a paycheck that was never designed for this much. You
    are the family''s shock absorber. When something breaks, the money comes from
    you. And lately it feels less like a budget and more like a flood with no shut-off
    valve.


    You will come to recognize the shape of your own overwhelm here. The way too much
    arrives at once and your capacity simply caps out — not because you''re weak,
    but because no one has infinite room. You''ll see the cost of being the steady
    one for everybody else. You''ll notice how the flood makes you reach for control
    in the smallest, strangest places, because the big numbers won''t move. And underneath,
    you may finally name the belief that has quietly run the whole season: that if
    you can''t carry all of it, you''ve failed the people who count on you.


    This book will not optimize your finances. It offers no app, no side hustle, no
    twelve-step path to abundance. It will not promise that the numbers come out different
    — they may not, not this year. What it offers instead is room. A place to set
    the whole weight down for one honest hour and see it clearly, all of it, without
    the panic narrowing your view.


    Because here is the thing the flood hides from you: you are not behind at the
    work of being a person. You are building something the spreadsheet can''t measure
    — a family that holds together, a foundation poured deep under a house you may
    never get to enjoy. That counts. It counts more than the balance.


    You''re allowed to be overwhelmed by a genuinely overwhelming thing. That''s not
    a flaw in you. That''s a true reading of the load. Set it down for a moment. The
    numbers will keep. You don''t have to carry all of it in a single breath.


    Book 1 of the Second Mountain Press financial stress series.'
