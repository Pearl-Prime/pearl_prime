title: The Ones You Couldn't Save
subtitle: For the first responder carrying losses that never made it home — grief
  that has no funeral, no words, and no place to set it down
cover_tagline: You held the line. No one ever told you you'd have to hold this too.
description:
  short_blurb: Some calls you never finish. They follow you home and they don't have
    a funeral. This is a quiet place to grieve the losses the job never let you mourn
    — and to set down a weight you were never meant to carry alone.
  long_description: 'There''s a name you still remember. A face. A call that went
    the way calls sometimes go, no matter how good you are, no matter how fast you
    moved. You filed the report and you cleared and you took the next one, because
    that''s the job. But it didn''t leave. It rode home with you and it''s been riding
    with you ever since.


    This book is for the first responder who is grieving and was never given the room
    to. The paramedic who lost the patient. The firefighter who carries the ones who
    didn''t make it out. The cop, the nurse, the dispatcher who heard it happen and
    could do nothing but listen. You were trained to keep moving. No one trained you
    for the part where the losses stay.


    Burnout, for you, isn''t just exhaustion. It''s accumulated grief with nowhere
    to go — the slow weight of carrying loss after loss while the world expected you
    to be fine by the next shift. You''ll come to recognize the cost of mourning on
    the move: the numbness that crept in because feeling each one fully felt impossible.
    The guilt that whispers you should have done more. The way you''ve armored over
    the soft places, not because you''re hard, but because you had to keep functioning.


    This book will not give you closure, because closure is a story we tell about
    grief, not the truth of it. It will not tell you to let go, or that they''re in
    a better place, or that time heals. It will not try to fix what was never broken
    — only carried too long, alone.


    What it offers is the permission you were never given: to grieve the ones you
    couldn''t save without it meaning you failed them. To set the weight down for
    a breath without abandoning their memory. To understand that the grief is not
    a wound in your character. It is the proof that you cared, in a job that asked
    you to care and then gave you nowhere to put it.


    You carried them. You can keep carrying them. But you do not have to carry them
    braced and silent and alone. You are allowed to mourn what the job never let you
    mourn. Let this be the place you begin.


    Book 2 of the Iron Gate Press Burnout series.'
