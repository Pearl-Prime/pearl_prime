title: The Version of You That Worked
subtitle: For the manager mourning a self the job slowly took — when the anxiety is
  really grief for the time and the person quietly given up along the climb
cover_tagline: Somewhere along the climb, you lost a person. The anxiety is the mourning
  you never got to do.
description:
  short_blurb: Somewhere in the years of climbing, you traded away a version of yourself
    — the time, the ease, the person you meant to become — and never stopped to grieve
    it. This is a book for the manager whose anxiety is really unacknowledged loss.
    It won't tell you to be grateful for how far you've come. It will give you room
    to mourn what it cost, and to finally set some of it down.
  long_description: 'No one tells you that a career can be a series of small losses.
    The friendships that thinned because you were always working. The version of yourself
    who used to have time, ease, a life outside the role. The thing you once meant
    to become, quietly traded, year by year, for the thing you became instead. You
    climbed, and the climb asked for payment, and you paid — and somewhere in there
    you lost a person without ever stopping to mourn them.


    This is grief. And much of what you''ve been calling anxiety is the loss you were
    never given room to feel.


    This book is for the manager who has succeeded at real cost and never let themselves
    count it. You''re not ungrateful — you know what you''ve built. But there''s a
    heaviness underneath the achievement, a low ache that the next promotion never
    reaches, and it isn''t fear of the future. It''s mourning for the past: for the
    time given up, the self set aside, the doors that quietly closed while you were
    busy succeeding. You feel it as the hollowness on the drive home, the unexpected
    tightness at a song or an old photo, the question you don''t let yourself finish
    — was it worth what it took?


    Here you''ll come to recognize grief where you''d been naming it stress — how
    loss with nowhere to go turns into a restless, anxious hum, how the body keeps
    the account even when the mind insists everything is fine, how what most needs
    releasing is not a problem to be solved but a goodbye that was never said. You''ll
    learn the difference between what was taken from you and what is finally yours
    to lay down. And you''ll feel what it is to let something be over — to grieve
    it honestly — and to discover that mourning a thing is how you stop carrying it.


    This book will not tell you to focus on the positive or count your blessings until
    the ache goes quiet. It will not reframe your losses as growth or hand you a gratitude
    practice to optimize your way past them. The grief is not a mindset problem to
    correct — it''s real loss that deserves to be felt, and the only way through it
    is through. There is no fix here, and there was never meant to be.


    What it offers is permission to mourn, here, in the middle of a successful life.
    Because grief that is finally allowed begins to move. And what you set down was
    never going to come back by being carried.


    You are allowed to miss who you were. You are allowed to grieve what it cost and
    keep living the life that''s left.


    Book 5 of the Stillness Press anxiety series.'
