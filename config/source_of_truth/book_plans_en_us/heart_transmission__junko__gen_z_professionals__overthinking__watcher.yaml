title: A Mind That Forgot How to Sit Down
subtitle: For the twentysomething forever scanning for the next thing to fix at work
  — making peace with the watchful part of you that braces for a danger that never
  arrives
cover_tagline: Always on watch. Never able to rest.
description:
  short_blurb: Some part of you is always scanning — your tone, their face, the room,
    the future — bracing for a threat it can never quite locate. This is a gentle
    conversation for the over-thinker whose mind never clocks out, and who has forgotten
    what it feels like to be off duty.
  long_description: 'There is a part of you that never sits down. While you work,
    it scans the room for who might be upset with you. While you rest, it rehearses
    tomorrow for what could go wrong. It reads your boss''s face, your friend''s pause,
    the gap between a message sent and a message answered, looking for the threat
    it is certain is coming. It has been watching so long you''ve forgotten there
    was ever a version of you that wasn''t.


    This book is for you — the one who is exhausted in a way sleep doesn''t touch.
    The one whose mind treats an ordinary day like a danger to outrun. You are not
    paranoid and you are not too much. Somewhere along the way, a tender part of you
    decided that if it just stayed alert enough, noticed enough, prepared enough,
    nothing would ever hurt you again. It began watching out of love. It simply never
    learned that it was allowed to rest.


    Here, we turn toward the watcher with warmth instead of trying to shut it off.
    You''ll come to recognize the hypervigilant mind — the constant low scan, the
    threat that''s always just out of frame, the way rest itself can feel unsafe because
    resting means softening. You''ll see how the watcher confuses monitoring with
    control, how it mistakes worry for protection, how it keeps you safe from dangers
    that were never going to come at the cost of the life happening right now. And
    slowly, you''ll learn what it feels like to sit beside that vigilant part of yourself
    and offer it what it has needed all along: not dismissal, but relief. Not you''re
    wrong, but you can rest now. I''ve got us.


    This is not a system, and it will not teach you to force the watcher quiet or
    discipline your attention into stillness. There is no technique here that switches
    off your vigilance by the end of the week. What there is, instead, is a quiet
    companionship — a voice in the room with you that understands why you''ve stayed
    so watchful, and stays with you while you learn, breath by breath, that it''s
    safe to come off duty.


    Nothing in these pages will help you watch more closely. The watching was never
    the answer. What it offers is the unguarded relief of being relieved — of discovering
    that the safety you''ve been scanning for was never out there in the room, but
    here, in the simple fact of being met.


    You are allowed to let the watching soften. You are allowed to be off duty and
    still be okay.


    Book 3 of the Heart Transmission Press Overthinking series.'
