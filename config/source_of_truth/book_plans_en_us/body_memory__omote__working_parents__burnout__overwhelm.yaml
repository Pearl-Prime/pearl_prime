title: There's No Room Left in You
subtitle: For the working parent carrying too much at once — when the day floods in
  faster than you can set anything down
cover_tagline: Everything arrived at the same time, and there was nowhere left to
  put it.
description:
  short_blurb: It isn't that you can't cope. It's that everything is arriving at once,
    and there is no surface left to set anything on. This is for the working parent
    whose day floods in faster than they can carry it, and who has forgotten that
    the ground beneath them can hold what their arms no longer can.
  long_description: 'You are standing in the kitchen and the day is arriving all at
    once. The lunches, the unanswered message, the small hand pulling at your sleeve,
    the thing you forgot, the thing you''re already late for. It isn''t one big problem
    you could brace against and push through. It''s a hundred small ones, all at the
    same time, each one small enough to seem manageable and all of them together more
    than any pair of hands was built to hold. There is no room left in you to take
    on even one more, and still the next one is already coming.


    This book is for the working parent who is not failing — who is, in fact, doing
    far too much, far too well, with nowhere to set any of it down. You haven''t lost
    your capacity. Your capacity is simply full, the way a glass is full, and the
    world keeps pouring as if it cannot see the water already running over the sides.


    Here, slowly, you''ll come to recognize what overwhelm actually is. Not weakness.
    Not poor planning. Not some flaw in you that everyone else has quietly solved.
    A flood — and floods are about volume, not character. You''ll feel how it arrives
    in the body before it ever reaches the calendar: the tight chest, the shallow
    breath, the shoulders braced for a wave that has, in truth, already broken over
    you. You''ll see how trying to carry all of it in your arms at once is the very
    thing that leaves no room to think, no room to choose, no room to breathe. And
    you''ll learn what it feels like to let the ground take some of the weight — to
    set one thing down and find that the whole structure does not collapse, that solid
    earth can hold what your shaking arms no longer can.


    This is not a system for doing more. It will not hand you a better morning routine
    or a color-coded way to squeeze more out of an exhaustion that is already total.
    There is no trick here for carrying the unbearable a little more efficiently,
    because the problem was never your efficiency. What''s here is quieter than that,
    and steadier: permission to stop holding everything up in the air at once, and
    the reminder — gentle, and said as many times as you need to hear it — that you
    were never meant to.


    You don''t have to find the energy to push through this. You don''t have to be
    the one who holds it all together while quietly coming apart. You''re allowed
    to put something down. You''re allowed to let the ground hold you while you do.


    Book 1 of the Held Ground Press burnout series.'
