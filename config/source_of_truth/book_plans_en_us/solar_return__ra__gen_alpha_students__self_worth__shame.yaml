title: The Version of You They Get to See
subtitle: For the student who keeps a brave face running all day — and the quiet belief,
  kept hidden, that something underneath is wrong with them
cover_tagline: You built a whole self to hide a self you never had to be ashamed of.
description:
  short_blurb: You learned early to keep the good version up front — the one who's
    fine, who's chill, who has it handled — because somewhere you decided the real
    one wasn't allowed to be seen. This is a book for the student carrying a buried
    belief that something is wrong with them, written by a voice that won't try to
    fix you, because there was never a defect there to fix.
  long_description: 'There''s a version of you that goes to school. The one who has
    the right answer ready, who laughs on cue, who keeps the face steady even on the
    days the inside is shaking. You got good at it. Maybe too good. Because somewhere,
    a long time ago, you came to a quiet conclusion about yourself — that if anyone
    saw the real thing underneath, they would back away. So you keep the good version
    up front and the other one banked down low, out of sight, and you call the gap
    between them a secret you have to manage all day long.


    This book is for you. For the student who overworks the smile, who apologizes
    for taking up space, who reads a single comment six times hunting for the proof
    that something is wrong with them. You have been carrying a belief you never said
    out loud — that the problem is not a thing you did, it is a thing you are. That
    belief is heavy. It is also not true, and a part of you has always half-known
    that, even on the nights it speaks the loudest.


    You will come to recognize the shape of it. The face you hold up, and what it
    costs to keep holding it. The habits you built to stay ahead of being found out
    — the perfectionism, the people-pleasing, the way you make yourself small so no
    one looks too closely. You will feel the moment the hidden belief gets named for
    what it actually is: not a fact about you, but a story you took in before you
    were old enough to question it, handed to you by people who were carrying their
    own. And slowly, in the warm part of this book, you will feel the difference between
    hiding something broken and protecting something that was never broken at all.


    This is not a confidence makeover. Nothing here will fix you, because there is
    no defect under there to repair, and a voice that keeps insisting you need fixing
    was never going to be the one that helped. What is here is quieter than that —
    someone sitting beside you in the dark who refuses to agree that you are the problem,
    and stays anyway.


    You do not have to earn your way back to being allowed. You do not have to prove
    the good version before you are permitted to set it down and breathe. The ember
    was always lit, the whole time, kept alive under everything. You just lost sight
    of it under all that ash.


    Let someone see the real one. You can start with you.


    Book 1 of the Ember & Ash Publishing Self Worth series.'
