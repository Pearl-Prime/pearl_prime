title: Letting Go of the Life You Thought You'd Have
subtitle: For the twenty-something grieving a future that didn't arrive — when anxiety
  is really mourning something you haven't named
cover_tagline: Some of your anxiety is grief that never got to be sad.
description:
  short_blurb: This wasn't the timeline you pictured. The career, the certainty, the
    version of your twenties everyone promised — quietly, some of it isn't coming,
    and a low anxiety has moved in where the disappointment should be. This is a book
    for the grief hiding inside your worry. You don't have to keep bracing against
    the loss. You're allowed to finally let it be sad.
  long_description: 'No one warned you that grief could be this quiet. There was no
    single loss, no moment that announced itself — just a slow realization that the
    future you built your hopes around isn''t the one that''s arriving. The career
    that looked certain. The timeline you measured yourself against. The version of
    yourself you were sure you''d be by now. And in the space where the sadness should
    live, something else moved in instead: a restless, humming anxiety that won''t
    let you sit still long enough to feel what was actually lost.


    This book is for you, early in adulthood and already mourning things you were
    never taught to mourn. For the one who feels behind on a path that may have been
    a fiction. For the person whose worry is really an ache wearing a more acceptable
    face — because anxiety feels productive, and grief feels like giving up. You are
    not ungrateful, and you are not failing to cope. You are carrying a loss that
    never got a name, and the bracing you feel is what happens when grief has nowhere
    to go.


    Spoken to you tenderly, the way someone sits beside you and doesn''t try to make
    it better too fast, these pages help you find the grief underneath the anxiety.
    You''ll feel how mourning can hide inside worry, how letting go feels like danger
    to a mind that equates control with safety. You''ll see what it costs to keep
    clutching a future that has already changed. And slowly, you''ll come to know
    that releasing what isn''t coming is not the same as giving up on your life —
    it''s how you finally make room to live the one that''s actually here. Grief asks
    for so little, in the end: not to be solved, only to be sat with, by you and by
    anyone willing to stay.


    This is not a system for moving on or optimizing your healing. It will not rush
    you to acceptance or hand you stages to complete. There is nothing to fix and
    no timeline to beat. What''s offered instead is gentler and more human: permission
    to grieve what you lost without losing yourself, and the quiet relief of letting
    your hands open. What you set down does not vanish; it simply stops being something
    you must carry alone in the dark.


    You don''t have to keep bracing against the loss. You''re allowed to set it down,
    and to be sad, and to still be okay.


    Book 5 of the Heart Transmission Press anxiety series.'
