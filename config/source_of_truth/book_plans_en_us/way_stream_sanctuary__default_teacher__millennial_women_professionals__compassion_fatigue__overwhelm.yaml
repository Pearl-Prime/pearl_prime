title: 'The Cost of Caring: Too Many Things, Not Enough You'
subtitle: A Field Guide for Millennial Women Professionals Navigating Compassion Fatigue
cover_tagline: Everyone needs a piece of you, all at once, and there isn't enough
  of you to go around.
description:
  short_blurb: Caring for a living means everyone's need arrives at the same time
    — and you're the one expected to hold all of it. This is a straight-talking guide
    for professional women drowning in other people's demands. It won't teach you
    to give more efficiently. It'll help you stop being the one who carries everyone.
  long_description: 'It isn''t one person. It''s all of them. The client in crisis
    and the colleague who''s spiraling and the family member who texts squarely in
    the middle of your one free hour and the part of your actual job that is literally
    tending people who need more than you have to give. It all lands at once, on you,
    and the weight of being needed by everyone simultaneously is its own particular
    kind of drowning.


    You''re not bad at this work. You are submerged in it. And the people leaning
    on you have no idea, because you''ve gotten so good at surfacing for just long
    enough to handle the next thing before going back under.


    Where some people''s compassion fatigue shows up as numbness, yours shows up as
    flood. Too many people, too much need, too many emotional demands stacked one
    atop the next until you genuinely cannot tell where one person''s crisis ends
    and the following one begins. You signed up for work that helps people, the helping
    swelled into a tide, and now the sheer volume of other people''s need is dragging
    you under faster than you can even name what you feel about it.


    The work here unfolds in three stages. The first names what''s happening as overwhelm
    specifically — too-much-at-once in a role where the ''too much'' is mostly other
    people''s pain arriving in your lap. Not a scheduling slip. A genuine flood. The
    second breaks ranks with every resilience training you''ve ever endured. It doesn''t
    reach for boundary scripts or a slicker intake form. It turns toward the overwhelm
    itself, because the reflex to instantly organize and manage and contain everyone''s
    needs is precisely the reflex that has been drowning you. It wades into the flood
    with you. The third stage rebuilds how you stand in relation to need — yours and
    theirs — so that not all of it has to be held by you, right now, all at once.


    Here''s what this won''t be. There''s no triage framework in here for ranking
    whose emergency wins. No technique for compartmentalizing faster. No system to
    make you a more efficient sponge for other people''s overwhelm. This book has
    zero interest in optimizing your capacity to be flooded. It will not help you
    carry more.


    What it offers instead is the harder, plainer thing: the recognition that being
    needed by everyone at once is a real and nameable overload, that the panic climbing
    your throat is an accurate signal about an impossible load and not evidence that
    you''re not cut out for this, and that you''re allowed to set some of it down
    without first proving you''re drowning badly enough to have earned the relief.


    You were never built to hold all of it. Not at once. Not alone. It is not a betrayal
    of anyone to finally say so.'
