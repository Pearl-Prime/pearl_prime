title: The House Is Quiet and Still You Brace
subtitle: For the parent who lies awake at 2am — kids in bed, an aging mother's pills
  sorted for the week, every door locked — and still cannot make the dread stand down
cover_tagline: Everyone is asleep and breathing. So why is your whole body still standing
  guard?
description:
  short_blurb: The kids are in bed, your parents made it through another day, the
    doors are locked — and that is exactly when your chest tightens and your mind
    starts bracing for something it cannot name. This is the book for the worried
    mind that confuses a quiet night with a coming catastrophe. It will not teach
    you to fight the alarm. It will teach you, slowly, to let the forest go quiet
    around it.
  long_description: 'It is long past midnight. The dishwasher has stopped. Down the
    hall, your teenager is finally asleep; across town, your mother''s medications
    are sorted into their little plastic days. By every measure, everyone you love
    is safe tonight. And still your body will not believe it. Your jaw is set. Your
    stomach is bracing. Some old alarm deep in you has decided that this stillness
    is the calm before something terrible, and it will not stand down.


    You are not in danger. You are exhausted, and you are carrying three generations
    on a nervous system that forgot how to rest somewhere around the second decade
    of holding everything together.


    This book is for you — the one who lies awake bracing for a phone call that does
    not come, who reads catastrophe into a quiet house, whose body sounds the alarm
    precisely when there is finally nothing left to do. You will come to recognize
    the false alarm for what it is: not prophecy, not weakness, but a loyal, tired
    part of you that has been on watch so long it no longer knows the war is over.
    You will see how the dread with no name took root, how it learned to mistake love
    for threat, and how a body braced for years can begin, gently, to set the weight
    down.


    We will move at the pace of the forest, not the pace of your fear. We will sit
    with the alarm instead of arguing with it, and let it grow quiet the way a pool
    goes clear only when you stop stirring it. There are no breathing tricks here
    to add to your list of things to fail at. No optimizing. No 2am productivity disguised
    as peace.


    This book will not promise that nothing bad will ever happen. It cannot, and it
    will not lie to you. It promises something quieter and truer: that you do not
    have to brace for the whole of life tonight. That the alarm can sound and you
    can let it pass through you like wind through old trees, and find that the ground
    beneath you held the entire time.


    You are allowed to lay the watch down. Not because the danger is gone, but because
    you, too, are someone worth letting rest.


    Book 1 of the Still Forest Press overthinking series.'
