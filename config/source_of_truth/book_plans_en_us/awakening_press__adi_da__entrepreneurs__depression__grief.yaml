title: Mourning the Person Who Built This
subtitle: For the founder grieving a self they outgrew — when the depression underneath
  the success is really a loss you were never allowed to name
cover_tagline: You didn't lose the company. You lost who you were when you started
  it.
description:
  short_blurb: The depression you cannot explain may be grief that has nowhere to
    go. This is for the founder who got everything they were chasing and felt something
    quietly die — the dreamer, the believer, the person they were before they had
    to become the one who carries it all. You will not be told to move on. You will
    be given room, at last, to let go.
  long_description: 'No one died. That is what makes it so hard to name. The company
    is still here, the team is still here, the version of your life you once would
    have envied is here — and still you carry something that feels exactly like bereavement,
    a heaviness with no funeral, a loss with no permission to mourn it. So you call
    it depression, or stress, or a rough patch, and you keep going, because what could
    you possibly be grieving when you have everything you set out to build?


    This book is for the founder who quietly lost someone along the way: the self
    who started it all. The one who believed without evidence, who was naive and electric
    and unguarded, who hadn''t yet learned to brace and manage and perform. Somewhere
    between the first round and the version of you that exists now, that person slipped
    away — and the flatness you feel is not the absence of success. It is the unmourned
    death of who you were before the success required you to become someone else.


    Here you will come to recognize grief in its disguises — as exhaustion you can''t
    sleep off, as a deadness in things that used to move you, as the strange hollowness
    of getting what you wanted. You will see how the self you are clutching, the one
    who has to hold the company together, may be exactly the grip you need to loosen.
    And slowly, you will feel that the part of you doing the grieving is itself untouched
    by the loss — that what you are beneath the story was never the dreamer or the
    founder, and was never taken from you at all. The one who weeps for who you were
    is still here, awake, and was here the whole time.


    This is not a book about closure and it will not hand you five stages to complete.
    It promises no recovery plan and nothing to optimize, because grief is not a problem
    to be solved — it is a tenderness that finally gets to breathe. The heaviness
    is not weakness. It is love for something that mattered, looking for somewhere
    to land.


    You are allowed to mourn the person who built this. Letting them go is not losing
    yourself. It is the beginning of coming home to what was never lost.


    Book 2 of the Awakening Press depression series.'
