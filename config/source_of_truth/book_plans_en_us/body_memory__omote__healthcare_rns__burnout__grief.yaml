title: The Ones You Couldn't Carry Home
subtitle: For the nurse holding losses that never got a name — every patient who didn't
  make it, and the version of yourself you had to leave at the bedside
cover_tagline: You charted the time of death and kept walking. The grief stayed.
description:
  short_blurb: Nobody told you that you would grieve, or how many times, or how little
    room there would be to do it. This book is for the nurse carrying a quiet stack
    of losses that were never named, and who has begun to sense that some weight cannot
    be carried any further — it has to be set down and mourned.
  long_description: 'You remember the room number. You remember what the family said,
    and the exact quality of the silence after the monitor went flat. You did everything
    right. You stayed steady, you held the hand, you spoke gently, and then you went
    and charted it and answered your next call light, because there were four other
    patients who still needed you. There was no room to fall apart. So you didn''t.
    You just kept the loss, the way you have kept all of them, in a place inside you
    that has gotten very full.


    This is a book about the grief that nursing does not give you time to feel. For
    the registered nurse whose burnout is, underneath everything, the unmourned weight
    of loss after loss after loss — patients you couldn''t save, families you couldn''t
    comfort enough, and the steady, less obvious losses too: the nurse you were when
    you started, the energy you used to have, the part of you that could still feel
    things at work without going numb.


    You will come to recognize that the numbness was never coldness. It was a body
    protecting itself the only way it could, by storing what there was no time to
    grieve. You will see how much you have been carrying that was never yours to carry
    alone. You will feel the difference between holding a loss and being crushed beneath
    it. And gently, on ground solid enough to bear it, you will begin the slow work
    of setting some of it down — naming what was taken, mourning what must be released,
    and letting the earth hold what your arms cannot anymore.


    This book will not give you closure, because the people you lost deserve more
    than a tidy ending. It will not tell you the grief was a lesson, or that it made
    you stronger, or that everything happens for a reason. It refuses every hollow
    comfort. What it offers instead is a place to set the weight down, and the truth
    that grieving is not the same as letting go of the people you couldn''t save.
    You can release the weight and keep the love. They were never the same thing.


    You are allowed to mourn. You are allowed to have lost something real. The ground
    beneath you does not move, and it is strong enough to hold what you have been
    carrying alone.


    Book 2 of the Held Ground Press Burnout series.'
