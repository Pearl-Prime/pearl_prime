title: Too Many Things at Once
subtitle: For the nurse carrying six patients, a dozen alarms, and no room left to
  breathe — finding ground when the whole shift arrives at the same second
cover_tagline: Everything needs you right now. There is no right now left for you.
description:
  short_blurb: Six patients, three alarms going off at once, a phone that won't stop,
    and a body that has run out of room to hold any of it. This is a body-based companion
    for the nurse who is drowning in the all-at-once — too much arriving with no space
    left to think. It won't help you do more. It will help you find the floor under
    your feet when the flood comes.
  long_description: 'Two call lights, a pump alarming, a doctor on the phone, a family
    in the hallway, and the med you were three steps from pulling still not pulled.
    It all arrives in the same instant and there is no order to it, no space between,
    no second where you can hear yourself think. Your breath goes shallow and high.
    Your mind goes white. The to-do list stops being a list and becomes a wave, and
    you are somewhere underneath it.


    This book is for the nurse who lives in the flood. The one whose capacity gets
    exceeded by ten in the morning and who spends the rest of the shift just trying
    to keep her head above it. You are not disorganized and you are not falling behind.
    You are a human nervous system being asked to hold more inputs than any nervous
    system was built to hold, over and over, with no time to discharge what came before
    the next thing lands.


    Here you''ll come to recognize overwhelm in the body before it takes you under
    — the breath climbing into the chest, the shoulders rising, the strange narrowing
    where the room seems to shrink. You''ll learn that you don''t have to clear the
    flood to find ground; the ground was never in the task list. It''s under your
    feet, in the weight of your body in your shoes, in one full breath that reaches
    the floor of the belly. You''ll practice the small, real things that bring you
    back into a body the work keeps pulling you out of — not to make you faster, but
    to give you somewhere to stand while the wave passes through.


    This is not a productivity system. It will not teach you to triage your soul the
    way you triage a hallway. It asks for the opposite: that in the middle of too
    much, you take thirty seconds to come back to one thing — the floor, the breath,
    the warmth returning to your hands — and let that be enough.


    Nothing here will help you carry more. You already carry too much, and your body
    knows the exact weight of it. What you''ve never been given is a way to set even
    a corner of it down without dropping it. That is what this book is for.


    You are allowed to come back to one breath. The flood will still recede. You don''t
    have to outrun it to survive it.


    Book 2 of the Felt Sense Publishing anxiety series.'
