cover_tagline: It's 3am and one small worry just took you everywhere it could go.
description:
  short_blurb: One ordinary worry at 3am becomes a chain of worst cases you never
    chose to picture. For the working parent whose mind spins a single midnight thought
    into a thousand, this is a one-hour reset for the nighttime spiral.
  long_description: 'It''s the middle of the night and it started with almost nothing.
    A small thing you forgot. A look someone gave you. And now, twenty minutes later,
    you''ve followed it all the way down: the mistake leads to the consequence leads
    to the version of your life where everything you were afraid of came true. You
    didn''t decide to imagine any of it. The first thought just kept turning, link
    after link, until you were wide awake at the bottom of a thousand of them.


    This book is for the working parent whose mind doesn''t just worry at night, it
    multiplies. The dark is the spiral''s best friend. With no daylight, no task,
    no kid pulling your sleeve, there''s nothing to interrupt the chain, so one thought
    branches into ten and ten into a hundred, each one feeling like the logical next
    step, all of them keeping you from the sleep you desperately need. You''ve tried
    to reason your way out. You can''t argue with a spiral at 3am. It just makes more
    spiral.


    We are not going to teach you to replace the dark thoughts with bright ones, because
    that''s not how a spiral works and you already know it doesn''t hold. What you''ll
    learn instead is the mechanism: a spiral isn''t a sequence of true things, it''s
    one motion, repeating, and it has a first turn you can learn to feel. You''ll
    learn to catch it at the second link instead of riding it to the thousandth. To
    name it the moment it starts to branch in the dark. And then to go down into the
    single thought underneath the avalanche, which is quieter, and far more bearable,
    than the avalanche itself.


    No sleep protocol. No worksheets, no counting backward from a hundred while the
    spiral laughs. This book will not promise you a mind that goes blank at bedtime,
    because it won''t, and the spiral will try again tomorrow night. What changes
    is that you recognize the first turn now, and you don''t have to follow it all
    the way down before morning.


    The spiral is not proof that you''re anxious past help or loving your family wrong.
    It''s a tired mind, in the dark, doing one thing too well. You don''t stop it
    by gripping the thoughts harder. You stop feeding the chain. The next time one
    3am thought tries to become a thousand, you''ll catch it at two, and you''ll go
    back to sleep.


    One hour. Read it before bed, or the next time you''re spiraling at 3am with nowhere
    to put it. You can get off here.'
