title: Talked Out of It by the Time the Sun Comes Up
subtitle: For the student who spirals through every way the brave thing could go wrong
cover_tagline: You didn't think your way in. You won't think your way out.
description:
  short_blurb: It started as one thought. Now it's 2am and you've watched the same
    worst-case scene forty times, each version worse than the last, and you cannot
    find the bottom of it. This book is for the teenager whose mind takes one small
    fear and spins it into a whole night. It won't try to argue you out of the spiral.
    It'll show you where the door is — the one that isn't another thought.
  long_description: 'It was nothing. One look someone gave you, one thing you said
    that landed wrong, one assignment you''re not sure you did right. One thought.
    And then your brain picked it up and started spinning, and now it''s late and
    you''ve played the scene so many times you can''t tell what actually happened
    anymore. Each loop adds something worse. Each answer just opens three new questions.
    You''re not even tired enough to stop — the spinning keeps you awake, and being
    awake gives it more to spin.


    This book is for the teenager who knows the spiral from the inside. The downward
    pull where one worry feeds the next and the whole thing gathers speed the harder
    you try to fix it. You''ve probably been told to ''just stop thinking about it,''
    which is about as useful as being told to stop a wheel by grabbing it. You''re
    not overthinking because you''re broken. You have a quick, powerful mind that
    got pointed at a threat and won''t stand down — and the more you reason with it,
    the more fuel it gets.


    Chapter by chapter, you''ll come to recognize the spiral as it starts, before
    it has speed. You''ll see how the part of you that''s trying to think its way
    to safety is the exact part keeping you up — and that the way out isn''t a better
    thought, it''s a different move entirely. You''ll learn that you don''t have to
    win the argument with your own mind to put it down. There''s a question this book
    keeps circling back to, and it isn''t ''how do I figure this out before I sleep.''
    It''s: what is one thing you can do before you feel ready — before the spiral
    gives you permission?


    This book will not promise to quiet your mind for good. It won''t hand you a thought-stopping
    trick or a clever reframe that makes the loop dissolve every time. Your mind is
    going to spin again. The point isn''t to never spiral — it''s to stop trusting
    the spiral as if it were telling you the truth. To notice the pull, feel it try
    to take you down, and step off the wheel while it''s still turning.


    You don''t have to solve the whole night to get free of it. You just have to stop
    feeding the fire and let it bank down to ember. Some things only go quiet when
    you finally stop poking them.


    Book 2 of the Ember & Ash Publishing courage series.'
