title: One Worry, Then a Thousand
subtitle: For the founder whose mind turns a single doubt into a midnight wildfire
  — and how to stop feeding the flames
cover_tagline: It started with one ember. By 2am the whole forest was burning.
description:
  short_blurb: 'It begins with one small thing — a number that''s slightly off, a
    reply that came back short. By midnight it''s a wildfire: the deal, the runway,
    the team, and your whole worth as a founder, all of it ablaze in your head. This
    is the book for the mind that turns a single ember into an inferno. It won''t
    help you think your way out. It will help you stop pouring on fuel.'
  long_description: 'It always starts small. One number slightly below projection.
    One client who ''just wants to talk.'' One word in a reply that landed wrong.
    A single ember — and then your mind reaches for the kindling.


    Within an hour it''s everything. If this deal slips, the quarter slips, and if
    the quarter slips, the raise falls through, and if the raise falls through you
    have to let people go, and if you let people go you were never really cut out
    for this, and you''re lying in the dark at 2am watching the whole forest of your
    life go up because of one cool email you can''t even quote correctly anymore.


    This book is for the founder whose worry doesn''t stay one worry. The one whose
    mind takes a real, manageable concern and breeds it into a thousand catastrophes,
    each thought catching the next like dry brush in August. You''re not irrational.
    You built something by following threads to their ends, by seeing five moves ahead
    — and that same gift, turned inward at midnight, becomes a fire that feeds itself.


    Here you''ll come to recognize the spiral by its shape, not its content. The way
    it always disguises itself as planning. The way every loop down feels like it''s
    almost reaching an answer, and never does. The way the thinking generates its
    own heat — more thought, more dread, more thought — until you''re not solving
    anything, you''re just burning. You''ll learn that the spiral is not asking to
    be finished. It''s asking to be fed, and the only way out is to stop handing it
    fuel.


    This book will not promise to make you stop thinking. It won''t optimize your
    decision-making or hand you a framework that resolves the doubt by morning. There''s
    no hack here, no five-step system, nothing to grind through. The spiral can''t
    be out-thought, because thinking is the very thing it runs on. You don''t escape
    a fire by adding logs to it.


    What''s left when the spiral burns down isn''t a blank, fearless mind. It''s the
    founder who can hold a single worry as a single worry — who can let one ember
    stay an ember, glowing and harmless, instead of the first spark of the end. The
    forest doesn''t have to burn every night. You just have to stop being the one
    who lights it.


    You are allowed to leave a thought unfinished. Not every doubt is a doorway you
    have to walk all the way through.


    Book 2 of the Ember & Ash Publishing overthinking series.'
