title: Too Much to Hold by the Time You Lie Down
subtitle: For the nurse whose whole shift comes flooding back the moment the lights
  go out — every patient, every near-miss, all at once
cover_tagline: All day you carried it without dropping a thing. Now it's all here
  at once.
description:
  short_blurb: You held twelve hours of other people's emergencies and never let the
    weight show. Then you lie down, and the whole day arrives at once — every chart,
    every face, every thing you almost missed. This is how to let the flood recede
    without fighting it.
  long_description: 'You held it all day. The med you double-checked, the patient
    who scared you, the family in the hallway, the chart you never finished, the thing
    you''ll think about for a week. You carried twelve hours of it and never let the
    weight show on your face. Then the shift ends, the lights go out, your head touches
    the pillow — and all of it arrives at once, a flood with no banks, more than any
    one body should have to hold lying down in the dark.


    This book is for the nurse who runs at capacity all day and only feels the overflow
    at night. You''re not bad at coping. You''re full. There was never a moment between
    the rooms to set anything down, so it all waited — and now, in the one quiet hour,
    the dam gives and everything you''ve been carrying comes through at once, too
    fast and too much to think your way out of.


    You''ll come to recognize overwhelm in the body before you can name it in the
    mind: the chest that can''t get a full breath, the buzzing under the skin, the
    sense that there''s no room left inside you. You''ll learn that the flood doesn''t
    need to be stopped or solved — it needs somewhere to go. Breath by breath, you''ll
    make space again. You''ll feel the difference between bracing against the wave
    and letting it move through and past you, until the water finds its level and
    the night opens back up with room to lie down in.


    This is not a system for doing more. There''s no triage to run on your own thoughts,
    no schedule to optimize, nothing to push through. Nothing here will tell you to
    clear your mind — an emptied mind was never the point, and ordering an overflowing
    one to go blank only adds to the flood. We work with the body instead, with the
    slow exhale and the ground beneath the bed, until your nervous system learns it
    doesn''t have to hold all of it, all at once, all alone.


    This book will not promise to fix you. It won''t hand you a fuller plate disguised
    as a solution or one more practice to perfect. It will only help you find the
    space to set the day down — not deny it, not finish it, just let it rest somewhere
    other than your chest.


    You carried more than enough today. You''re allowed to put it down now. There
    is room. Let the water settle.


    Book 2 of the Felt Sense Publishing sleep anxiety series.'
