title: I Used to Love This
subtitle: For the burned-out builder mourning the work they once gave everything to
  — and learning to set down a version of themselves that's already gone
cover_tagline: Some things you don't fix. You bury them, gently, and walk back to
  shore.
description:
  short_blurb: Nobody tells you that burnout is a kind of grief. You're not just tired
    — you're mourning the work you used to love, the person you used to be at it,
    and the future you were sure you'd have. This is a book for letting that loss
    be real, instead of pretending you can grind your way back to who you were.
  long_description: 'There was a version of you who couldn''t wait to open the laptop.
    Who loved the problem, the late build, the feeling of being good at something
    hard. You keep waiting for that person to come back. You keep thinking if you
    just rest enough, or push through one more quarter, the spark will return and
    everything will feel like it used to. It hasn''t. And the quiet, unspeakable truth
    underneath your exhaustion is not that you''re tired. It''s that you''re grieving.


    This book is for you: the builder, the operator, the one who poured years and
    identity into a craft in tech or finance and woke up one day to find the love
    gone and a stranger doing your job. You''re mourning the work you used to feel
    something for. You''re mourning the version of yourself who had that fire. And
    maybe you''re mourning a future you were certain of — the trajectory, the proof,
    the person you were going to become — that you can now feel slipping out of reach.
    That is loss. Real loss deserves to be grieved, not managed.


    What you''ll come to recognize here is that burnout isn''t only depletion; it''s
    the slow death of a relationship — between you and the thing you gave your life
    to. You''ll see the mask that insists you''re fine, just busy. You''ll feel where
    the grief lives in the body, in the heaviness you''ve been calling laziness. And
    you''ll meet the harder belief underneath: that to stop loving the work, or to
    let it go, would mean the years were wasted and you have failed. They weren''t.
    You haven''t.


    This is not a book about reigniting your passion or falling back in love with
    your career. It will not optimize your motivation or hand you five steps to caring
    again. Some things are not meant to be restored. They are meant to be honored,
    and grieved, and laid down — so your hands are finally free for whatever is actually
    next.


    You are allowed to mourn what burnout took. You are allowed to love what you loved
    and let it be over. Grief is not weakness. It is the tide going out, and the tide
    always comes back in, carrying something you can''t see yet.


    Book 2 of the Harbor Line Books burnout series.'
