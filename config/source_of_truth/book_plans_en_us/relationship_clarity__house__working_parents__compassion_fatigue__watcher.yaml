title: Always Listening For the Next Need
subtitle: For the working parent whose mind never clocks off — forever scanning for
  the cry, the spill, the thing about to go wrong, so braced to catch everyone that
  they can't feel their own life happening
cover_tagline: You're so busy listening for them that you can't hear yourself anymore.
description:
  short_blurb: Some part of you is always on duty — one ear cocked for the cry down
    the hall, the mood at the table, the thing about to go wrong. This is a book for
    the working parent whose mind never stands down, so braced to catch everyone that
    they've gone numb to their own life. It won't ask you to care less. It helps you
    set the watch down, just for a while.
  long_description: 'You can''t remember the last time you were fully off duty. Even
    now, reading this, part of you is half-listening — for the cough down the hall,
    the shift in your partner''s voice, the small disaster forming just out of sight.
    You scan faces at the dinner table for the mood before it lands. You brace for
    the need before it arrives. And somewhere under all that vigilance, you''ve stopped
    being able to feel your own life, because every part of your attention is turned
    toward everyone else.


    This book is for the working parent whose mind never clocks off. The one whose
    love took the shape of constant watching — anticipating, monitoring, catching
    things before they fall — until the watching became a low hum that never stops,
    even in the rare quiet. If you have lain awake scanning for a problem that wasn''t
    there, or sat beside the people you love while your attention paced the perimeter,
    this was written for you.


    You''ll come to recognize the shape of it underneath. How compassion fatigue turns
    devoted attention into hypervigilance, so that caring stops feeling like love
    and starts feeling like a shift that never ends. How the watching mind convinces
    you that if you stop scanning, something will be missed and it will be your fault.
    How being permanently braced for the next need leaves no version of you that gets
    to simply be in the room. You''ll see why you flinch at stillness, and why standing
    down feels less like rest than like dropping your guard.


    This book will not teach you to keep watch more efficiently. It hands you no system,
    no tightened routine, no checklist for staying one step ahead of your family.
    It will never suggest that the answer is to care less, or that your kids and your
    partner are threats to be managed. There is no clever trick here, because your
    vigilance was never a problem to be fixed. It was love that forgot it was allowed
    to rest.


    What there is, instead, is a chair where nothing is about to go wrong, and someone
    sitting across from you who isn''t asking you to catch anything. A place to set
    the watch down — not forever, not recklessly, just long enough to remember that
    you are a person in this family, not only the one who keeps everyone safe. To
    let your attention come home to you for a few minutes and find that the people
    you love are still fine, and so, for now, are you.


    You are allowed to stop listening for the next need. The world will hold for a
    while. So can you.


    Book 3 of the Two Chairs Press compassion fatigue series.'
