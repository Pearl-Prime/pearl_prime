- The Body Keeps the Score (Bessel van der Kolk) — explains the hypervigilant nervous
  system of those who do high-stakes work and why it won't stand down.
- Widen the Window (Elizabeth Stanley) — written by someone who lived chronic hyperarousal,
  on letting the guard down without losing the steadiness that protects you.
- It's OK That You're Not OK (Megan Devine) — frames grief as something to be felt
  rather than out-monitored or avoided, in a plainspoken non-clinical voice.
