title: Off Duty But Still On Watch
subtitle: For the first responder whose mind never stands down — when grief hides
  behind a constant scan for the next loss that never lets you rest
cover_tagline: The shift ended hours ago. Your watch never did.
description:
  short_blurb: The tones stopped. The shift ended. But the part of you that scans
    for the next emergency never powered down, and now it keeps a quiet watch over
    your grief, bracing for the next loss before this one has even landed. This is
    a steady, nocturnal companion for the watcher in you that cannot stop monitoring.
    It won't try to switch you off. It will sit beside the watch and help you finally
    let it rest.
  long_description: 'The radio is silent. The truck is back in the bay. You are home,
    in your own bed, in the dark — and still some part of you is sitting up, scanning
    the room, listening for the next thing to go wrong. The shift ended hours ago.
    Your watch never did. You lie there cataloguing exits and worst cases, bracing
    for a loss that hasn''t come yet, because in your line of work it always comes,
    and you have learned never to be caught unready.


    This book is for you. For the first responder whose vigilance saved lives on the
    job and now will not let you sleep. The medic who still hears phantom tones. The
    officer who reads every room for threat at a backyard barbecue. The dispatcher
    who carries every voice that called for help and never found out how it ended.
    You became a watcher because watching kept people alive. No one told you that
    the same vigilance, left running through the night, would settle over your grief
    and never let it land.


    Here, you will come to recognize what that endless scanning is really doing. How
    hypervigilance becomes a way of not feeling — staying braced for the next loss
    so you never have to sit still inside the last one. How the mind that monitors
    threats that never come is often a mind that cannot bear to stop, because stopping
    is where the grief is waiting. You will see the cost of a body that never settles:
    the rest that won''t come, the people in the room you''re watching over instead
    of being with, the empty chair you keep scanning past because looking at it directly
    would undo you.


    Nothing here will try to switch you off. There is no technique in these pages
    to override your nervous system or make you ''resilient'' enough to feel nothing.
    This is not a fix, and it will never treat your vigilance as a malfunction. It
    was earned in real darkness. It kept you and others alive. It is not a flaw to
    be beaten out of you — and that is not what tonight is for. Tonight is only for
    letting the watch loosen, on one quiet night, long enough that what you have been
    holding so carefully can finally be set down and grieved.


    You are not paranoid and you are not failing to cope. You are a person whose attention
    was forged in emergencies, still keeping watch long after the call has cleared.
    You are allowed to lower the watch tonight. Not to be careless — to be at rest.
    The next loss will come when it comes. This one has already arrived, and it has
    been waiting for you to stop scanning long enough to feel it.


    Book 2 of the Night Architecture Books grief series.'
