title: The Quiet Grief of Always Giving
subtitle: For the working parent mourning the person they were before everyone needed
  them — the energy, the self, the closeness that giving quietly took
cover_tagline: No one died. So why does it feel like something was buried?
description:
  short_blurb: 'There is a grief no one named for you: the slow loss of the person
    you used to be before everyone needed you, the energy you used to have, the self
    that has gone quiet under years of giving. This is a book for the working parent
    carrying a loss with no funeral. It will not tell you to be grateful — it will
    let you mourn, and then it will show you what releasing makes room for.'
  long_description: 'Somewhere along the way, you misplaced yourself. Not all at once
    — there was no single moment, no clean break. Just a thousand small handings-over.
    The hobby you stopped mentioning. The friend you stopped calling. The way you
    used to feel before you became the one everyone leans on. You look in the mirror
    some nights and there is a quiet ache you can''t quite name, and the closest word
    for it is grief.


    This book is for the working parent who is mourning and doesn''t know they''re
    allowed to. No one died. The kids are healthy, the job is fine, the parent you
    care for is still here — and that is exactly why this loss has gone unspoken.
    You grieve the self who had something left to give. You grieve the version of
    you who wasn''t tired all the way to the bone. You grieve, sometimes, the closeness
    you''ve lost with the very people you pour yourself out for, because giving and
    connecting turned out not to be the same thing.


    You will come to recognize this grief by its true shape: not ingratitude, not
    weakness, but the honest cost of years spent lowering the bucket into a well that
    kept running dry. You''ll feel the weight of what you''ve carried without putting
    down. You''ll meet the resentment that lives underneath the love and learn that
    it is not a betrayal — it is a signal that something real has been lost and never
    mourned.


    This book will not hand you a silver lining. It will not tell you the sacrifice
    was worth it or remind you how lucky you are. There is no reframe here that makes
    the loss disappear, no productivity in your sorrow, nothing to fix. It asks only
    that you let yourself feel what was taken, and then it asks the quieter question
    underneath: what would you have to set down — what story, what role, what impossible
    standard — before the well could begin to refill?


    Grief, it turns out, is not the opposite of moving forward. It is how the ground
    settles enough to hold you again.


    You are allowed to mourn yourself while you are still alive. You are allowed to
    want yourself back. Sitting with this loss on solid ground — letting it be real,
    letting it be heavy — is not giving up. It is the first thing that has been only
    yours in a very long time.


    Book 2 of the Held Ground Press Compassion Fatigue series.'
