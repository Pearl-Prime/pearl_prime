title: 'Burnout Recovery: After the Loss (2)'
subtitle: A Field Guide for Working Parents Navigating Burnout
cover_tagline: You didn't lose your spark. You spent it on people who needed you.
description:
  short_blurb: For the working parent who used to feel like themselves and can't find
    that person anymore. This is not a book about getting your energy back. It's about
    facing the quiet grief of who you were before the job, the kids, and the years
    of giving everything away.
  long_description: 'It hits on an ordinary Tuesday. The kids are finally asleep,
    the work laptop is closed, and you sit down expecting relief — and instead you
    feel nothing. Not tired. Empty. You catch a flash of who you used to be, the version
    of you that laughed easily and had thoughts that weren''t about logistics, and
    you realize that person has been gone for a while. Nobody told you that you were
    grieving. You just thought you were busy.


    This hour is for the working parent who has given so much for so long that the
    giving burned the person underneath. The one who shows up for the meeting and
    the pickup and the dinner and lies awake wondering where they went. If you''ve
    been calling it burnout because that''s the only word people hand you, this names
    the thing more honestly: you are grieving a self you didn''t get to say goodbye
    to.


    We start by naming it out loud — the loss is real, and pretending it isn''t is
    part of why it won''t lift. Then we go down into it instead of around it. Not
    to wallow. To stop fighting a grief that only grows when you outrun it. You''ll
    sit with the version of you that the last few years used up, and you''ll let that
    loss be true without rushing to fix it or fill it or hustle your way past it.
    That''s the descent. It''s quieter than you expect, and less frightening.


    What comes back is not the old you. That''s the integration, and it''s the part
    nobody promises: you don''t get the spark back like flipping a switch. You come
    back changed — steadier, with a clearer sense of what the giving cost and what
    you actually want to keep giving. The grief doesn''t vanish. It stops running
    the show.


    This book will not tell you to wake up at five, journal your gratitude, or reframe
    your exhaustion as a growth opportunity. There is no morning routine here, no
    optimization, no silver lining stapled onto a loss. It will not promise you''ll
    feel like your old self by the last page. What it offers is permission — to admit
    that something in you grieved while everyone needed you to keep functioning, and
    that admitting it is not weakness. It''s the first honest breath you''ve taken
    in a long time.


    You are allowed to mourn the person you used to be. You''re allowed to do it in
    one hour, after the house goes quiet, with no one asking anything of you. Start
    there.'
