title: The Fraud You're Sure They'll Find
subtitle: For the founder who is certain the success is borrowed and the real them
  is a fake — and the quiet undoing of a defect that was never actually there
cover_tagline: You overwork to cover a flaw you've never actually located.
description:
  short_blurb: Every win feels borrowed. In every room you are in, part of you is
    waiting to be found out. This is a book for the founder who built something real
    and still carries the buried conviction that there is something wrong with them,
    and who has been overworking for years to keep anyone from seeing it.
  long_description: 'You raised the round. You shipped the thing. The metrics are
    real and the team is real and on paper you are exactly the person the deck said
    you were. And still, in the quiet after the win, a voice you''ve carried so long
    you barely hear it anymore says the same thing it always says: this is borrowed,
    you got lucky, and one of these days the right person is going to look closely
    and see what you actually are.


    This book is for the founder who is living with shame and calling it standards.
    It rarely shows up loud. It shows up as the overwork that never feels like enough,
    the wins that evaporate the moment you reach them, the room you walk into already
    braced to be found out. You''ve built courage on top of it — the courage to keep
    performing, to keep covering, to keep the real you safely out of view. And it
    has worked, in a way. It also never lets you rest.


    Here you''ll come to recognize shame for what it is: not a true report about you,
    but a buried belief that something is fundamentally wrong with you — a defect
    you''ve spent years overworking to hide, one you have somehow never actually located.
    You''ll see how it disguises itself as humility and high standards, how it turns
    every achievement into proof that you fooled them again, and how exhausting it
    is to defend a flaw you can''t even find. You''ll notice the way it isolates you,
    certain that everyone else belongs and you alone are the impostor in the room.
    And gently, underneath the whole performance, you''ll begin to glimpse what you
    actually are when the story of the defect goes quiet — something whole, something
    that was never broken, something that needed no covering in the first place.


    This is not a book that will give you confidence, and it will not coach you out
    of impostor syndrome with affirmations. It promises no exercise that finally proves
    you belong. The point is the opposite: there was never anything to fix. The defect
    you''ve been hiding was a case of mistaken identity. You are not the flaw and
    you are not the mask you built over it — you are the awareness in which both have
    been appearing, and that has been clean and unbroken the entire time.


    You are allowed to set the cover down. You are allowed to be seen and to find,
    when you are, that there was nothing shameful underneath after all — only you,
    already enough, already home.


    Book 3 of the Awakening Press courage series.'
