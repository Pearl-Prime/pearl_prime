title: 'The 3am Mind: When Everything Is Too Much'
subtitle: A Field Guide for Professional Women Navigating Sleep Anxiety
cover_tagline: The whole next day lands on you the second the lights go off.
description:
  short_blurb: You lie down and the entire to-do list arrives at once — every deadline,
    every unanswered message, every thing you're behind on, all of it stacked on your
    chest in the dark. This is a book about the overwhelm that ambushes you precisely
    when you're trying to rest.
  long_description: 'The lights go off and it all arrives at once. Tomorrow''s meetings,
    the thing you forgot to send, the project that''s quietly slipping, the text you
    still haven''t answered, the low and total certainty that you are behind on everything,
    everywhere — it lands on your chest in a single load the moment your head hits
    the pillow. There is too much. It has all chosen 11pm to demand handling at the
    same time. And you cannot rest underneath the weight of it.


    This is for the professional woman who feels buried the instant she stops moving
    — the one who stays a single step ahead of the flood all day long and gets caught
    by it at night, when there is no task left to do, only the crushing arithmetic
    of how much there is. You are not disorganized. You are not weak, and you are
    not bad at this. There is genuinely a lot on you, and your mind has chosen the
    worst possible hour to set every piece of it down on your sternum at once.


    First you learn to name the overwhelm as overwhelm — not as a true and urgent
    accounting of all the ways you are failing, but as everything hitting you in a
    single heap because it is arriving simultaneously instead of one item at a time.
    Then, instead of trying to mentally sort the pile at midnight (which only ever
    makes it taller), you go down into the raw feeling of too-much itself. You stop
    trying to carry the entire next day while lying flat in the dark. You let the
    weight be as heavy as it is without hoisting it onto your shoulders. And the pile,
    left untouched, finally stops growing — because the thing feeding it, all along,
    was you reaching up to manage it.


    This book will not promise to clear your plate, or to optimize your time, or to
    give you a bedtime system that empties your mind onto a list so you can sleep.
    It will not make you a woman with less on her shoulders. What changes is that
    the weight stops crushing you the moment you lie down — you stop trying to lift
    tomorrow tonight, with no daylight and no help.


    Written in direct, no-nonsense language you can use the next time the whole list
    lands on you at once. No brain-dump worksheets. No brisk advice to simply prioritize.
    Just an honest field guide to the overwhelm that finds you in the dark and a way
    to lie down underneath it without trying to hold the ceiling up.


    It is allowed to be too much. That is not a problem you have to solve before you''re
    permitted to rest. You can let the entire weight of tomorrow sit there in the
    dark, unlifted, and sleep anyway — because the pile will still be there in the
    morning, and so, finally rested, will you.'
