title: I Miss the Parent I Meant to Be
subtitle: For the parent grieving the warmth compassion fatigue quietly took — mourning
  the patient, present version of you and learning to set the guilt down
cover_tagline: You didn't lose your love for them. You lost the room to feel it.
description:
  short_blurb: Somewhere along the way the warmth went quiet. You still love them
    — you just can't feel it the way you used to, and the snappish, going-through-the-motions
    parent in the mirror isn't who you meant to be. This is for the working parent
    grieving that loss, and gently letting go of the guilt that came with it.
  long_description: 'There''s a particular ache that comes after bedtime. The house
    is finally quiet, and you stand in the doorway of their room watching them sleep,
    and you feel it: I love this child more than my own life — so why did I spend
    the whole day just trying to get through them? You remember a version of yourself
    who was patient. Who knelt down and listened. Who didn''t measure the minutes
    until lights-out. You miss her. You miss him. And you have no idea where that
    person went.


    This book is for the working parent who is grieving — not a death, but a quiet
    disappearance. The slow loss of the warmth you used to feel so easily. Compassion
    fatigue doesn''t take your love; it takes your access to it. It leaves you caring
    just as much and feeling almost none of it, going through the right motions with
    a heart that''s gone numb from overuse. And underneath the numbness sits the guilt,
    heavy and constant: that you''re not the parent you promised yourself you''d be.


    Here you''ll come to recognize the shape of that grief — that what you''re mourning
    is real, and that mourning it doesn''t make you ungrateful. You''ll see how the
    warmth went quiet: not because you stopped caring, but because a heart that pours
    out all day, every day, with nothing flowing back, eventually runs dry to protect
    itself. You''ll learn the difference between the parent you are on your most depleted
    day and the parent you actually are. And in the few stolen minutes that are yours
    — the pause in the car, the quiet after the house goes still — you''ll begin the
    gentlest thing of all: letting go of the version of you that the guilt insists
    you should have been, so there''s finally room for the one who''s actually here.


    This book will not promise to give you that old self back, fixed and patient and
    endlessly warm by next week. It won''t optimize your bedtimes or tell you to be
    more present through sheer willpower. Grief doesn''t work that way, and you''ve
    been told to try harder for long enough. There is no fix here. There is only honesty,
    and company, and permission.


    You are allowed to miss who you were. You are allowed to grieve it without it
    meaning you''ve failed them. The warmth is not gone for good — it''s just been
    buried under everything you carry. And it comes back the same way you set anything
    heavy down: a few minutes at a time, when no one''s asking for you.


    Book 2 of the Stolen Moment Press compassion fatigue series.'
