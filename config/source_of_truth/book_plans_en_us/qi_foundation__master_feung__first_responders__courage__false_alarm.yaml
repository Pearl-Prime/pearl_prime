title: The Tone-Out That Never Comes
subtitle: For the responder who stays braced between calls — when the alarm in your
  body keeps firing long after the radio goes quiet
cover_tagline: You came down off the call hours ago. Your body never got the message.
description:
  short_blurb: You're trained to go from zero to everything in four seconds, and your
    body learned the lesson too well — now it braces in the parking lot, at the dinner
    table, at 2am, waiting for a tone-out that isn't coming. This is a quiet book
    for the responder whose alarm system never fully stands down. It won't ask you
    to be less ready. It will help the ground come back underneath you.
  long_description: 'You are sitting in the rig with the engine ticking, and the call
    ended an hour ago, but something in your chest is still leaning forward. The radio
    is quiet. Dispatch hasn''t toned you out. And still your shoulders are up around
    your ears, your jaw is set, your hearing has gone sharp the way it does on scene
    — braced for something that has no name and is not coming.


    This book is for you. For the paramedic, the firefighter, the officer, the dispatcher
    who has been trained to go from still to full in four seconds, and whose body
    took that training all the way down to the root. You learned to brace before you
    understood why. Now the bracing runs on its own. It fires at the dinner table.
    It fires when the house goes too quiet. It wakes you at 2am with your heart already
    going, certain the tone is about to drop, and there is no tone.


    What you will come to recognize here is that this is not weakness, and it is not
    damage. It is an alarm system that loves you and has stopped trusting the all-clear.
    You''ll come to see how the false alarm works — how the deep wiring that keeps
    you alive on a bad call forgets to release when the call is done; how courage
    got tangled up with never standing down, until you couldn''t tell readiness from
    dread. You''ll learn what it feels like to let the breath drop to the lowest part
    of the lungs again, to feel the ground take your weight, to let the energy that
    has been pinned at the surface sink back toward the root where it refills.


    This book will not promise to make the alarm stop. It will not optimize your nervous
    system or hand you a protocol to run on yourself. There is no fixing a body that
    has done exactly what you asked of it. What it offers instead is the difference
    between an alarm that owns you and one you can finally hear without obeying —
    the courage, smaller and truer than the kind they decorate, to feel the surge
    and not have to ride it.


    You do not have to be less brave to come down off the edge. You were never supposed
    to live up there. Let the false alarm be a false alarm. Let the ground hold you
    for once. You can take a single quiet breath before you feel ready, and that is
    enough to begin.


    Book 1 of the Root & Meridian Press courage series.'
