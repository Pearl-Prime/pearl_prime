title: When Everything Arrives at Once
subtitle: For the woman holding too much at the same time — when the inbox, the people,
  and the day all flood in and there is no room left to think
cover_tagline: The flood isn't a failure of willpower. It's a room with no floor left
  to stand on.
description:
  short_blurb: Everything is asking for you at the same time, and somewhere in the
    noise you lost the ground under your feet. This is a slow hour for the woman who
    is drowning in a life she's good at, written by someone who has felt the same
    flood. It won't hand you a system to do more. It will help you find the one square
    foot of stillness the water can't reach.
  long_description: 'It''s not one thing. If it were one thing you could handle it;
    handling things is what you do. It''s all of it, arriving at the same moment —
    the messages, the asks, the half-finished thoughts, the people who need a piece
    of you, the day pouring in faster than you can take it in. Your mind reaches for
    somewhere to stand and finds only more water.


    This book is for you — the one who is genuinely capable and genuinely flooded,
    who can run the meeting and answer the thread and remember the birthday and still
    feel, by mid-afternoon, like there''s no room left inside to draw a full breath.
    Overwhelm isn''t a sign that you''re failing. It''s what happens when a finite
    person is asked to be infinite, and keeps saying yes because saying yes is what
    got her this far.


    In these pages you''ll come to recognize the flood for what it is: not a measure
    of your inadequacy, but a sign that your capacity has been exceeded and your body
    is doing exactly what any honest body does when it''s full. You''ll learn to feel
    the difference between the things that are actually arriving and the dozens more
    your mind is bracing for in advance. You''ll discover that you don''t have to
    bail out the whole ocean to feel the water go still — you only have to find one
    place to stand.


    This is not a productivity book. There is no method here for fitting more into
    a day that''s already too full, no inbox to conquer, nothing to optimize. You
    will not be told that overwhelm is a time-management problem you''d have fixed
    if you tried harder. You''ll be kept company instead — by someone who knows what
    it is to be underwater with the lights on and a smile on, and who found that the
    way through wasn''t doing more, but letting the surface settle.


    We''ll move at the pace of settling water, because that''s the only pace at which
    a flooded mind can see its own bottom again. You''ll spend time in the moment
    the flood crests and learn to stop adding to it. You''ll feel what it''s like
    to set something down — not forever, just long enough to remember you have hands.


    Nothing here will ask you to care less or carry nothing. It asks only that you
    stop confusing the weight of everything with the truth of who you are. The water
    can go still. Not because you emptied the room, but because you finally stopped
    stirring it and let it find its level.


    You are allowed to put it down before it''s all done. Begin there.


    Book 2 of the Stillness Press anxiety series.'
