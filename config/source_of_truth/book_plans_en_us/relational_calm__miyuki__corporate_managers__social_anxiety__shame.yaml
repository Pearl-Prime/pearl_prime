title: The Manager Everyone Thinks Has It Together
subtitle: For the leader hiding the belief that they're a fraud — overworking to cover
  a defect no one else can see
cover_tagline: You manage the team. You can't manage the feeling that they'd leave
  if they knew.
description:
  short_blurb: 'You''re the one people come to. You handle it. And underneath the
    competence runs a quiet, constant belief: that there is something wrong with you,
    and that the whole performance exists to keep anyone from finding out. This is
    a book about that hidden belief — and what it costs to keep covering it.'
  long_description: 'There is a version of you that everyone at work sees, and a version
    only you know about. The first one is composed. Capable. The person who gets handed
    the hard conversation because she''ll stay steady. The second one is convinced,
    somewhere it never says out loud, that she is a fraud — and that every steady
    day is one more day of getting away with it.


    So you overwork. Not because the job requires it, but because the over-delivering
    is the cover. You answer first. You prepare past the point of need. You stay until
    the work is unassailable, because if the work is perfect, maybe no one will look
    closely enough to see the thing you''re sure is there: that something is wrong
    with you, at the root, and always has been.


    This book is for the manager who is carrying shame to work and calling it standards.
    The one who reads warmth from her team as a near miss — they like me because they
    haven''t seen it yet. The one whose social fear isn''t really about the meeting
    at all. It''s about being seen, and being found out.


    Here you''ll come to recognize the difference between a mistake and a defect.
    Shame doesn''t tell you that you did a bad thing; it tells you that you are a
    bad thing, and then it hands you more work to do about it. You''ll see how the
    covering became a full-time second job. You''ll feel what happens when the hidden
    belief is finally brought into the open and looked at plainly — not fixed, not
    argued with, just seen, in clean light, without the flinch.


    This is not a self-esteem program. There is no affirmation to repeat, no win to
    rack up, no proof to assemble that you are good enough. Nothing here asks you
    to perform a confidence you don''t have, and nothing here will make you feel worthy
    by Friday. That trade — earn the worth, then rest — is the trap. We''re not making
    it.


    What''s offered instead is the unguarded room. The you that everyone sees and
    the you that you hide, allowed to stand in the same place, with nothing extra
    between them. The buried belief, set down on the table where you can finally see
    how old it is, and how little it was ever about your work.


    You were never getting away with anything. There was nothing to get away with.
    Let that be true.


    Book 2 of the Bare Form Books social anxiety series.'
