title: The Body Keeps Bracing
subtitle: For the parent whose alarm goes off all day for a danger that never comes
  — learning to recognize the false alarm, and let the body finally stand down
cover_tagline: Nothing is wrong. So why won't your body believe it?
description:
  short_blurb: 'You are buckling a car seat, answering an email, packing a lunch —
    and underneath all of it, your body is braced as if something is about to go terribly
    wrong. This is the false alarm: a nervous system that loves your children so much
    it can''t tell the difference between a real threat and a Tuesday. Here is a gentler
    way to live inside it.'
  long_description: 'It comes over you in the middle of the most ordinary moment.
    You''re at the kitchen sink, or strapping a toddler into the stroller, or scanning
    the calendar for the third time, and your chest tightens, your shoulders climb,
    your breath goes shallow and high. Something is wrong. You''re sure of it. You
    just can''t find what.


    This is the false alarm. It is the oldest, most protective part of you firing
    as if there were a fire — pumping you full of readiness for a danger that, when
    you finally look, simply isn''t there. For a parent, that alarm is wired to everything
    you love most, which is exactly why it never seems to switch off.


    This book is for you: the mother, the father, the one who is somehow both exhausted
    and wide awake. The one who has googled symptoms at midnight. The one who braces
    at the school gate, at the doctor''s voicemail, at the silence from the other
    room that lasts a half-second too long. You are not broken, and you are not weak.
    You have a finely tuned instrument that was built to keep your children alive,
    and right now it is set far too sensitive — going off for shadows, for maybes,
    for nothing.


    Gently, without rushing, you''ll come to recognize the alarm for what it is. You''ll
    feel how it announces itself in the body before the mind ever finds a reason.
    You''ll learn to notice the bracing in your jaw and your hands and your held breath,
    and to meet it not as an emergency to solve but as a frightened part of you to
    sit beside. You''ll learn what it feels like to let your shoulders come down a
    single inch, like water finding its level again.


    This book will not promise to silence the alarm forever. It won''t hand you a
    protocol to optimize your nervous system, or turn calm into one more thing you''re
    failing to achieve before bedtime. There is no fixing here, because you were never
    broken. There is only the slow, real work of learning that not every alarm means
    fire — and that you are allowed to stop bracing, even while the day is still unfinished.


    You can love them with everything you have and still let your body rest. Both
    can be true. Let this be the place you begin to believe it.


    Book 1 of the Stillness Press anxiety series.'
