title: If They Knew How Much I Think About This
subtitle: For the student certain everyone else has it together — when overthinking
  hides a quieter belief that something is wrong with you
cover_tagline: You don't think you have a problem. You think you are one.
description:
  short_blurb: 'Underneath all the thinking is a quieter sentence: something is wrong
    with me. This is for the overthinker who overworks every word to cover a flaw
    they''re sure everyone would see. It won''t tell you you''re fine and move on.
    It will gently question whether the defect you''ve been hiding was ever there.'
  long_description: 'You don''t tell people how much you think. How long you spend
    on a two-line text. How many times you replayed the thing you said before deciding
    it proved something about you. Because under the overthinking there''s a quieter
    sentence, one you''ve never said out loud: that there is something wrong with
    you, specifically, and the thinking is the cost of keeping it hidden.


    This book is for the student who overworks every interaction to cover a flaw they''re
    certain everyone else would see. You don''t think you have a problem — you think
    you are one. The endless drafting, the apologizing, the rehearsing, the watching
    their face for the second they figure you out: it isn''t vanity and it isn''t
    weakness. It''s the work of someone who decided, a long time ago, that they were
    defective, and that constant effort was the rent on being allowed to stay.


    Here you''ll come to recognize shame as the ember underneath so much of the noise.
    How overthinking becomes a way to manage a self you believe is faulty — patch
    the gaps, predict the judgment, perform the version that might pass. How the certainty
    that you''re broken feels less like a feeling and more like a fact, so old you''ve
    stopped questioning it. You''ll learn what it''s like to hear that sentence in
    your head and not automatically believe it. You''ll begin to see the difference
    between making a mistake and being one — a difference shame has spent years blurring.
    And you''ll find that the thing you''ve been hiding and overworking to cover was
    never the defect you took it for. It was just a tender place that never got tended.


    This book will not tell you you''re fine and hurry past it. It won''t hand you
    affirmations to repeat into the mirror, or promise that enough self-love will
    burn the shame off for good. It refuses to treat your shame as a confidence problem
    with a confidence solution. What it offers is something slower and warmer: the
    recognition that you were never the flaw in the room, and permission to stop paying
    rent on a self that was never broken.


    You do not have to earn your place here by thinking harder. You are allowed to
    be seen exactly as you are, ember and ash and all, and stay.


    Book 4 of the Ember & Ash Publishing overthinking series.'
