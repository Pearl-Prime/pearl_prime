title: Did I Chart It Right
subtitle: For the nurse lying awake replaying one moment of the shift a thousand times
  — when a single 'what if I missed something' becomes the whole night
cover_tagline: One thought at 2am, multiplying until the sun comes up.
description:
  short_blurb: You're home, you're safe, you're in bed — and your mind is back in
    room 9, replaying the assessment, asking if you missed the early sign, if the
    dose was right, if you should call the unit. One small 'what if' becomes a thousand,
    each feeding the next. This book is for the nurse whose mind won't stop circling,
    and it will not tell you to just stop thinking.
  long_description: 'It starts small. One thought, on the drive home or in the dark
    at 2am: did I chart that right? And then it''s not one thought anymore. Did I
    catch the change in time. Was that the early sign. Did I document it. Should I
    call and check. What if. What if. What if. The questions multiply faster than
    you can answer them, each one breeding the next, and the harder you try to think
    your way out, the deeper the pull. You are exhausted. You have to be back in seven
    hours. And your mind will not stop circling room 9.


    This is for the nurse caught in the spiral. You know the one — where a single
    uncertainty about a single moment of a single shift becomes a current that drags
    the whole night under. It feeds on your conscientiousness, which is the cruelest
    part. The very thing that makes you a good nurse, the relentless double-checking,
    the refusal to miss a thing, is the thing that turns on you at midnight and won''t
    let go.


    You are not losing your mind. You are caught in a loop that promises resolution
    and never delivers it — because the spiral was never trying to solve the problem.
    It was only trying to feel certain, and certainty about a shift that is already
    over does not exist.


    In these pages you''ll come to recognize the spiral for what it is: rumination
    dressed up as responsibility, a downward pull that feeds itself and calls it diligence.
    You''ll learn the difference between a thought that needs an action and a thought
    that only wants another loop. You''ll feel what it is to stop chasing the bottom
    of a well that has no bottom — to let your feet find the floor, your weight find
    the bed, the ground find you — and to let a thought rise and pass without being
    pulled in after it.


    This book will not tell you to stop thinking. It will not hand you a thought-stopping
    trick or scold you for caring too much. It will not try to force your mind into
    something quieter. There is nothing to fix in a nurse whose only crime is taking
    the work seriously. What there is, instead, is a steady voice and solid ground
    beneath the circling — something that does not move, that holds you while the
    loop spins itself out and finally, finally lets you rest.


    The shift is charted. You are allowed to put it down.


    Book 3 of the Held Ground Press anxiety series.'
