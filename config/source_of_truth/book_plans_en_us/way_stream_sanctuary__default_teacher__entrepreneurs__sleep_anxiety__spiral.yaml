title: 'Sleep Anxiety: When One Thought Becomes a Thousand'
subtitle: The Rumination Trap — Sleep Anxiety for Entrepreneurs (Breaking the Thought
  Loop)
cover_tagline: One worry at midnight. By 2am you've rehearsed the company's entire
  funeral.
description:
  short_blurb: 'It starts with one small question in the dark and ends with you having
    pre-lived every way the business fails, the whole sequence playing on a loop while
    the hours burn. This is the spiral at night: a single founder thought breeding
    a thousand, and the harder you try to think it through, the further from sleep
    you get. This book shows you how the midnight loop actually runs, and how to step
    off it in the dark.'
  long_description: 'It''s one thought at first. Did I follow up with them? And in
    the dark, with nothing to check and nothing to do, that one thought puts down
    roots. By 1am you''re certain the deal is dead. By 1:30 the deal dying means the
    quarter missing, and the quarter missing means the layoffs, and the layoffs mean
    you failed everyone who believed you. You are not asleep. You are wide awake at
    2am, having attended your own company''s funeral in vivid detail, none of which
    has happened. This is the spiral, and night is where it does its best work.


    This is for the founder who lies in the dark trying to think their way to safety.
    You tell yourself if you can just reason it all the way through — trace every
    branch, settle every fear — you''ll finally feel calm enough to sleep. But the
    spiral has no destination. Each branch you settle sprouts two more. The thinking
    that feels like it''s solving something is the exact thing keeping you awake,
    because at night the loop has nothing to interrupt it and all the time in the
    world to run. One worry becomes a thousand not because the company is doomed,
    but because the dark is the perfect place for a loop to feed itself.


    Devon Hale takes the midnight spiral apart in plain language. Recognition first:
    you''ll learn to catch the handoff where a single fair question becomes a looping
    one — the moment thinking stops looking for an answer and starts manufacturing
    the next disaster. Then the descent, which feels wrong because it''s the opposite
    of what you''ve been doing: you stop trying to think your way to sleep. You don''t
    debunk the spiral, argue with it, or chase it to a conclusion it will never reach
    in the dark. You let the loop run without operating it, and you feel it lose its
    grip when you stop supplying the next worry. And you come back toward rest — not
    because you solved the 2am problem, but because you finally stopped treating every
    midnight loop as a meeting you had to attend.


    This book will not promise you uninterrupted sleep or a thought-stopping technique
    to run when you wake. It will not optimize your nights, hand you a mantra for
    the dark, or tell you the spiraling means you care more than the people who sleep
    fine. There''s no worksheet. The spiral may start again tomorrow night — that''s
    a mind in the dark, not a verdict on you.


    What changes is whether you have to ride it. You''ll recognize the loop while
    you''re in it at 1am, not realize it at dawn. You''ll know the difference between
    a real problem and a loop wearing a face that looks like yours. You''re allowed
    to notice the spiral start in the dark and decline to follow it all the way to
    the funeral.'
