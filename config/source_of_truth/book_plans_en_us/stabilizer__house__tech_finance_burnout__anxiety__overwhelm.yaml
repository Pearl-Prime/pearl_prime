title: The Tide Comes Over the Gunwale
subtitle: For the high performer flooded faster than they can bail
cover_tagline: The flood doesn't knock. It's already in the room before you wake.
description:
  short_blurb: Some mornings the day is on top of you before your feet hit the floor
    — every notification, every deadline, every open loop arriving at once with no
    room left to think. This is a steadying book for the overloaded tech-and-finance
    mind, and a way back to the still water beneath the flood.
  long_description: 'It arrives before you''re even awake. The day is already on top
    of you — the unread count, the calendar stacked wall to wall, the decision you
    didn''t make yesterday, the three fires you''ll be expected to put out before
    lunch. Forty tabs open in your head and not one of them will close. There''s no
    room left to think, and the not-thinking has its own panic to it, a rising water
    with nowhere to stand.


    This is a book for the days when it''s too much, all at once.


    When you work in tech or finance, overwhelm stops looking like an emergency and
    starts looking like the job. The flood becomes the baseline. You learn to operate
    underwater, to make decisions while your capacity is already exceeded, to call
    it normal because everyone around you seems to be doing the same. But a person
    can only run over capacity for so long before the body starts sounding an alarm
    the mind is too flooded to hear.


    You''ll come to recognize the shapes the flood takes. The bracing for a crash
    that hasn''t come. The way one task becomes a thousand the moment you try to hold
    it. The quiet shame of needing it to slow down when no one else seems to. The
    grief for the spaciousness you used to have, the mornings that didn''t start at
    a sprint. The comparison to the colleague who appears to carry twice as much without
    sinking. The part of you that keeps scanning the rising line even as you go under.


    This book will not teach you to do more, faster. It will not hand you a new system
    to manage the unmanageable, a tighter calendar, a fresh productivity religion.
    It will not promise an empty inbox or a quiet mind on demand. What it offers instead
    is the harbor — a way to find the still water that exists underneath the flood,
    the ground that holds even when the surface is churning, the breakwater that lets
    the boat stop pitching long enough for you to breathe.


    You do not have to hold all of it at once. You were never meant to. You are allowed
    to let the water be high and still find somewhere to stand.


    Book 2 of the Harbor Line Books anxiety series.'
