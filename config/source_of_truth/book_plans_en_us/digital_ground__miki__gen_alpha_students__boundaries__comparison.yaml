title: Everyone Else Seems So Chill
subtitle: For when everyone online looks effortlessly available and your own need
  for a door and a quiet hour starts to feel like a defect
cover_tagline: They reply at 2am like it's nothing. You read receipt and feel the
  weight of it.
description:
  short_blurb: Everyone else seems fine being on call all the time. They get added
    to the group, the project, the plans, and they just say yes — no flinch, no dread,
    no whole internal negotiation. Meanwhile you need a door, a quiet hour, a 'no,'
    and it makes you feel high-maintenance for existing. This is for the student who
    keeps losing a contest they never agreed to enter.
  long_description: 'Scroll for thirty seconds and the evidence is everywhere. Everyone
    else is so chill. They reply instantly and it costs them nothing. They get pulled
    into the group chat, the late-night plans, the favor, the project, and they just
    say yeah, easy, no drama. They seem to need nothing — no quiet hour, no door,
    no time to recover from being around people. And then there''s you, who needs
    all of it, and the wanting starts to feel like a defect everyone else got vaccinated
    against.


    So you measure. Against the friend who''s always down. Against the one who never
    seems drained. Against the whole timeline of people who look like being available
    is effortless. And every time, you come up short — not because you did anything
    wrong, but because you pointed a very precise instrument at the wrong target:
    yourself, against an audience that''s also performing fine.


    This book is for you. The one who''s quietly decided that needing limits makes
    you more difficult, more sensitive, more high-maintenance than everyone else seems
    to be. The one running a comparison you never consented to, against a version
    of other people that doesn''t actually exist — because you''re seeing their highlight
    reel of availability and your own unedited need.


    Here you''ll come to recognize the contest for what it is, and how it feeds itself
    — every ''they''re so chill'' a fresh way to come up short. You''ll see that the
    people who look like they need nothing are mostly just better at hiding the cost,
    or paying it somewhere you can''t see. You''ll feel the difference between an
    actual limit and the story that your limit makes you worse than the room. You''ll
    find the door is yours to close on your own schedule, not everyone else''s — and
    that the question isn''t how little can you get away with needing, but where,
    honestly, do you draw the line. Yours. Not theirs.


    Nothing here will help you win the comparison. That''s the point. There''s no
    tier of chill you can finally reach where needing space stops counting against
    you, because the contest was rigged from the start. This book won''t optimize
    you into someone lower-maintenance, won''t teach you to need less, won''t hand
    you a way to out-chill the timeline. It will just take you out of the race.


    You were never behind. You were running a comparison that has no finish line,
    against people who are also tired. You''re allowed to want what you want at the
    volume you want it.


    Book 3 of the Present Tense Books boundaries series.'
