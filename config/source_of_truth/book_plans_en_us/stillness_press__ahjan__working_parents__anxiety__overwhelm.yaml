title: One Square Foot of Quiet
subtitle: For the parent buried when everything lands at once — finding a single patch
  of still water on a day that has long since exceeded you
cover_tagline: When there is no room left to think, you can still find room to breathe.
description:
  short_blurb: The emails, the pickup, the unanswered text, the lunch you forgot to
    pack, the meeting that ran long, the small voice asking for you right now — all
    of it arriving at once, with no space in between. This book is for the days the
    flood comes in over your head. It won't help you carry more. It will help you
    find the one square foot of ground that is still yours.
  long_description: 'There is a particular moment a working parent knows too well.
    It is the moment when everything arrives at the same time. The phone is ringing
    and the timer is going off and someone is crying and the inbox has a red number
    you can''t look at and dinner is not started and you are standing in the middle
    of your own kitchen with your hands slightly open, unable to choose what to do
    first because all of it is first.


    This is overwhelm. Not laziness, not poor planning, not a failure of willpower
    — simply more than one person can hold, arriving faster than one person can sort
    it. The flood comes in, and the part of you that thinks clearly goes quiet under
    the water.


    This book is for you: the one running the whole operation, the one everyone reaches
    for, the one whose capacity was exceeded hours ago and who is still, somehow,
    going. The one who lies down at night with a mind that won''t stop listing. You
    are not weak for feeling buried. You are a finite person who has been handed an
    infinite amount, and the wonder is not that you feel overwhelmed — it''s that
    you''ve carried it this long.


    Without asking you to do more, you''ll come to recognize the difference between
    the flood itself and the panic about the flood. You''ll learn to feel the moment
    capacity tips over, and to find — even there, even then — one square foot of stillness
    that the day cannot take from you. You''ll practice letting the hundred things
    blur back into one breath, one object, one next small step, the way muddy water
    clears only when you stop stirring it.


    This book will not promise to empty your plate or hand you a system to manage
    it all. It will not turn rest into a productivity hack or make calm one more task
    you''re behind on. The amount is real, and most of it isn''t yours to fix tonight.
    What can change is your relationship to the flood — whether you go under fighting
    it, or learn to stand quietly in the middle of it and breathe.


    You do not have to get on top of everything to be allowed a moment of peace. You
    can set the whole impossible pile down, just for the length of one breath, and
    pick up only what is actually in front of you.


    Start there. One square foot. One breath. That is enough.


    Book 2 of the Stillness Press anxiety series.'
