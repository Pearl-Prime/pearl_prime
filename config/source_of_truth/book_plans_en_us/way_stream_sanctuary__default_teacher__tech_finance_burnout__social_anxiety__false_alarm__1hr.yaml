cover_tagline: Walking into the all-hands shouldn't feel like walking into traffic.
  To your body, it does.
description:
  short_blurb: Before the standup, the client call, the offsite dinner, your body
    sounds an alarm that has nothing to do with actual danger — racing heart, tight
    throat, the urge to disappear. This is a one-hour, secular look at the false alarm
    that fires the moment other people might be looking at you.
  long_description: 'You''re three minutes from the all-hands and your body has already
    decided this is a crisis. Heart going, palms damp, throat tight, that low hum
    that says leave. Nothing is actually wrong — no one''s threatened you, nothing''s
    on the line that won''t be there tomorrow — but the alarm doesn''t know that.
    It just knows people will be looking, and it screams as if looking could hurt
    you.


    This hour is for the person in tech or finance who can ship under pressure and
    reason through a hard problem, and still walks into a room full of colleagues
    like it''s a room full of risk. The dread before the demo, the spike when it''s
    your turn to talk, the relief that floods in the second it''s over — that''s not
    weakness, and it''s not a character flaw. It''s a false alarm, a threat response
    misfiring at the simple fact of being seen.


    First we name it. The pounding and the urge to flee are not proof that something
    bad is about to happen. They''re a smoke detector going off over nothing — loud,
    physical, and wrong about the danger it''s reporting.


    Then we go down into it rather than managing it away. You''ll learn to feel the
    alarm crest as you walk in, and to stay — eyes up, feet planted — without obeying
    the signal to shrink, bail, or armor up. We''ll find the spot where the body slams
    the brakes, the instant your system reads a meeting as a threat, and we''ll let
    it ring at full volume while you keep doing the ordinary thing it''s trying to
    stop: stay, look up, take your turn. Not breathing tricks. Not visualizing success.
    Just being present while the body does its loud, harmless thing, and not handing
    it the wheel.


    You come back able to tell the alarm from any real stakes. The meeting, the call,
    the dinner — none of them were the danger your body insisted on. Being seen was
    never the threat, and the proof is that you stayed and nothing it warned you about
    arrived.


    This will not make the dread vanish or turn you into someone who loves the spotlight.
    There''s no exposure ladder here, no becoming-charismatic plan, no optimizing
    yourself into ease. What changes is that the alarm stops deciding where you can
    go and which rooms you quietly avoid.


    The next room will set it off again. You''re allowed to walk in anyway, alarm
    and all. It will keep ringing; you no longer have to call it the truth.'
