title: 'Grief: The Grief That Doesn''t Leave (3)'
subtitle: A Real Talk Guide to Grief for Tech Finance Burnout
cover_tagline: Some losses don't get a funeral. This one still counts.
description:
  short_blurb: For the loss you never got to grieve because you had a quarter to close.
    The deal that died, the team that got cut, the years you can't get back. This
    is a one-hour reckoning with what's actually gone — no spin, no silver lining,
    no pivot to the next thing.
  long_description: 'You went back to work. Maybe the next morning. The round fell
    through and you had to tell the team something hopeful by 9 a.m. The reorg took
    people you''d built something real with and you were expected to keep velocity
    up that same sprint. Or the loss was quieter and longer — five years poured into
    a company that''s worth nothing now, a marriage that ran out while you were closing
    deals, a version of your life you traded away one late night at a time. Whatever
    it was, you never grieved it. There was no room on the calendar. And it didn''t
    go anywhere — it just sat down inside you and got heavy.


    This hour is for the people who don''t get bereavement leave for the things that
    actually break their hearts: the founder whose company died, the banker who gave
    the best decade of their life to a desk, the operator who lost the team that felt
    like the realest thing about the job. You''ve been treating the loss as a setback
    to recover from, a line to move past in the next board update. But it isn''t a
    setback. It''s a grief, and grief doesn''t respond to momentum.


    Ana Reyes won''t offer you a silver lining or tell you it happened for a reason.
    This is recognition first — saying plainly what you lost, letting it be a real
    loss and not a strategic learning. Then descent: going down into it instead of
    pivoting away, instead of doing what you''ve always done and converting pain into
    the next move. Then integration — not closure, not getting over it, but letting
    it become something you carry instead of something you''re constantly outrunning.
    You come back changed, with the loss finally allowed to exist.


    This will not give you five stages to complete or a framework to process your
    way to the other side. It will not promise you''ll be back to full capacity, or
    that you''ll find the lesson, or that this was secretly for the best. There is
    no exercise here, nothing to finish. Your loss does not have to become useful.
    It does not have to make you stronger to be worth grieving.


    What you get is plain language for the exact weight you''ve been carrying since
    you went back to work too soon — and permission to stop carrying it like a deliverable.


    Some things just hurt, and they''re allowed to. Sit down. You don''t have to make
    this into anything. You just have to let it be lost.'
