title: The Thing You're Sure They'd See If They Looked Too Close
subtitle: For the young professional who withdraws because they believe something
  is wrong with them — and the quiet relief of finding out there isn't
cover_tagline: You're not hiding from the room. You're hiding what you're sure it
  would find.
description:
  short_blurb: You go quiet in the meeting, leave the party early, keep your camera
    off — not because you're shy, but because you're certain that if anyone looked
    too closely, they'd find the flaw you've spent years covering. This is a book
    for the young professional whose social anxiety is really shame wearing a mask.
    It won't tell you to love yourself louder. It will show you that the defect you've
    been hiding was never there.
  long_description: 'There''s a moment, right before you''d have to be seen, when
    you decide to disappear instead. You let the question pass. You keep the camera
    off. You say you''re tired and leave the thing early. To everyone else it looks
    like you''re quiet, or busy, or a little reserved. What it actually is, underneath,
    is a verdict you reached a long time ago: that there is something wrong with you,
    and your only job in any room is to keep it from being seen.


    This book is for the young professional whose social anxiety isn''t really about
    the room. It''s about what you''re sure the room would find. You over-prepare
    so no one catches you unready. You apologize before you''ve done anything. You
    replay the one awkward thing you said for three days, because to you it wasn''t
    awkward — it was proof. The withdrawing, the over-functioning, the bracing for
    exposure: these are not your personality. They''re the cover you built over a
    belief you never agreed to hold.


    Here is what you will come to recognize. That the feeling running you isn''t shyness
    — it''s shame, the buried conviction that you, specifically, are the defect. You''ll
    see how early it was installed and how faithfully you''ve been hiding it ever
    since, exhausting yourself to manage an impression of a flaw that isn''t real.
    You''ll learn the difference between the mistake you made and the person you decided
    you were. You''ll feel what it''s like to be in a room without the second job
    of concealment — to let yourself be seen, plainly, and find that the floor holds.
    That is the threshold here: not becoming flawless, but discovering there was never
    a defect to hide.


    This book will not promise to fix you, because you are not broken. It won''t coach
    you to perform confidence or affirm your way past a feeling this old. There is
    no optimizing the shame out — there is only the slow, steadying work of seeing
    it clearly and setting down the mask you''ve held so long your hands forgot they
    were holding it.


    You have been so careful for so long. You can stop bracing to be found out. There
    is nothing in there that makes you unfit for the room. You just believed there
    was, and built a whole life around the hiding. You''re allowed to walk through
    the door as you are.


    Book 2 of the Threshold Books social anxiety series.'
