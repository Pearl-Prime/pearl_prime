title: Holding the Line Looks Easy for Them
subtitle: For the young professional sure everyone else sets limits without it costing
  a thing
cover_tagline: They answer at midnight and seem fine. So why can't you?
description:
  short_blurb: 'Everyone around you seems to absorb it without strain — the late pings,
    the packed calendar, the constant availability — and they look completely fine.
    So you decide the problem is you: your limit, your need for space, your inability
    to just handle it like they do. This is a book for the mind that measures its
    own breaking point against everyone who looks unbothered, and always comes up
    short.'
  long_description: 'Look around the open-plan floor and everyone else seems to have
    it handled. They reply to the 11pm message with a thumbs-up and no visible cost.
    They take the extra project and don''t appear to flinch. They keep their camera
    on, their tone bright, their calendar a wall of color, and somehow none of it
    seems to touch them. Then there''s you — quietly drowning, sure that the difference
    between you and them is a flaw only you can see.


    This book is for the young professional who has turned their own limits into evidence
    of failure. The one who scrolls a coworker''s effortless availability and feels
    the gap widen. Who assumes everyone else got an instruction manual for staying
    unbothered that never reached them. Who keeps raising the bar — answer faster,
    need less, want nothing — chasing a version of fine that other people seem to
    live in for free.


    You''ll come to recognize the rigged game you''re playing. The way you compare
    your raw, unedited inside to everyone else''s composed outside. The story that
    says their calm is real and yours is just not trying hard enough. The endless
    measuring that turns a normal human need for space into a personal deficiency.
    You''ll learn what the warrior knows: that the still center is not a thing you
    win by out-enduring the room — it is a place you stand, and the only ground worth
    holding is your own. Their pace was never the line you were meant to draw.


    Nothing here will help you finally keep up. There is no method that makes you
    the most available person on the team, no mindset that lets you out-tolerate everyone
    and call it peace. That race has no finish line, and you were never supposed to
    be in it. The work is setting the instrument down — turning the high-performance
    attention you''ve aimed at everyone else back toward the simple question of what
    you actually need.


    You are not behind. You are not the only one who struggles; you''re just the only
    one you can see from the inside. You''re allowed to stop measuring. You''re allowed
    to draw the line where you stand, not where they do.


    Book 3 of the Iron Gate Press Boundaries series.'
