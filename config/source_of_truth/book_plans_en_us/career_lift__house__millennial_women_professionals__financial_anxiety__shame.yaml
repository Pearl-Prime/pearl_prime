title: Everyone Thinks I Have It Figured Out
subtitle: For the professional woman who looks successful and feels secretly behind
  with money — hiding the belief that someone like her should be doing better by now
cover_tagline: They think you're killing it. You think they'd be horrified if they
  knew.
description:
  short_blurb: On paper you are doing well. Underneath, you are sure that if anyone
    saw your actual finances, the whole impression would collapse. This is a book
    for the professional woman carrying a private belief that she is secretly behind,
    secretly bad with money, secretly a fraud. It will not fix your numbers. It will
    set down the thing you have been overworking to hide.
  long_description: 'From the outside, you have it together. The title, the salary,
    the apartment, the impression that you are one of the ones who figured it out.
    And underneath it sits a belief you would never say out loud: that you are secretly
    behind, secretly bad with money, that if anyone saw the real numbers — the debt,
    the empty savings, the help you took, the thing you can''t afford but pretend
    you can — the whole picture would fall apart and they would finally see what you
    actually are.


    This book is for the professional woman who has turned money shame into a full-time
    job. You are not just anxious about your finances. You are ashamed of them, and
    you have wrapped that shame in achievement and silence and over-functioning, hoping
    no one looks too closely. You overwork to stay ahead of a verdict you have already
    passed on yourself.


    You will come to recognize the shame for what it is: a story about your worth
    wearing the costume of a story about your money. You will see how ''behind'' became
    a fact in your mind without a finish line to be behind of. Why someone else''s
    salary or savings can leave you feeling exposed, like they have proof of your
    defect. Why earning more never silences it, because the shame was never really
    about the number — it was about you, and the number was just where it chose to
    live. You will start to separate what your bank balance is from what you have
    decided it says about the kind of person you are.


    This book will not optimize you. It will not fix your credit, close your debt,
    or hand you the financial glow-up that finally makes you feel allowed. It will
    not tell you that you should already be further along — you have told yourself
    that enough. And it will not pretend the shame is silly. It is not silly. It is
    just not the truth about you.


    What you will find instead is the relief of being seen without collapsing. A way
    to set down the secret you have been guarding, so that your worth stops riding
    on a spreadsheet you keep hidden. You do not have to have your money figured out
    to be a person worth respecting. You are allowed to be exactly this far along
    and still be enough. The next chapter does not require you to finally deserve
    it. It just requires you to stop hiding to get there.


    Book 3 of the Next Chapter Publishing financial anxiety series.'
