title: Counting the Heads at the Table
subtitle: For the grieving parent whose mind never stops scanning for the next loss
  — when love and fear have started to feel like the same thing
cover_tagline: You lost one. Now you can't stop counting the rest.
description:
  short_blurb: Since the loss, you check on everyone. You count the heads at the table,
    listen for breathing down the hall, and read every cough like a forecast. This
    is a book for the grieving parent whose love turned into a watch that never ends
    — and for the part of you that's exhausted from standing guard.
  long_description: 'You count them now. At dinner, at the door, in the rearview mirror
    — a quick, automatic headcount you don''t even decide to do. Since the loss, some
    part of you has been standing at the window of your own life, scanning the road
    for the next thing to take someone. You text to make sure they landed. You crack
    the bedroom door at night to hear them breathing. You hear a cough and your mind
    has already written the worst version of the week. You call it being careful.
    Mostly it''s that grief taught you that people can actually be gone, and now you
    can''t unknow it.


    This book is for the working parent whose grief became vigilance. For you, who
    learned the hard way that the floor can drop, and who has been bracing against
    the next drop ever since — at work, in traffic, in the dark at 2am with your thumb
    hovering over a text you''re embarrassed to send. The people you love have become
    a list you keep checking. You are tired in a way sleep doesn''t touch, because
    the watch never really ends. No one sees how hard you are working to keep everyone
    safe. They just see a parent who worries too much.


    What you''ll come to recognize here is that the watching part of you isn''t your
    enemy, and it isn''t broken. It''s grief in a different coat. It stood up the
    day you lost someone and it has been trying, in its anxious, sleepless way, to
    make sure it never happens again — as if enough watching could have changed anything,
    as if love could be done carefully enough to be safe. We''ll sit with that quiet,
    awful bargain. We''ll look at how the scanning promises protection and delivers
    exhaustion, how it crowds out the very moments with your kids it claims to be
    guarding.


    We''ll talk plainly about the difference between caring for the people at your
    table and keeping watch over them — between being with them and bracing for the
    worst — and how grief blurred the line until they felt like the same act of love.


    This book won''t switch the worry off. It can''t, and a book that promised to
    would be lying to you. There is no quiet that makes you stop loving people who
    can die. What it offers instead is the other chair: a place to set the worry down
    for an hour, to be seen by someone who understands why you keep counting, and
    to remember that you are allowed to be at the table, not just standing beside
    it.


    You can love them without standing guard over them. You''re allowed to sit down.
    Everyone''s still here.


    Book 2 of the Two Chairs Press grief series.'
