title: More Than the Body Can Hold
subtitle: For the first responder whose nervous system never empties — when too many
  calls arrive at once and there's no room left to set any of them down
cover_tagline: You kept showing up. Your body kept the receipts.
description:
  short_blurb: You can run the call. You can run the next one. What you can't do is
    find the quiet space between them where the last one is supposed to drain out
    of you. This is a slow, grounded way to let your body finally set down what it
    has been carrying — not by toughening up, but by letting the flood move again
    from the root.
  long_description: 'It arrives all at once. The tones drop, and before the rig has
    even stopped you''ve already cataloged the scene, the hazards, the faces — and
    the last call hasn''t finished draining out of you yet, and the one before that
    is still in there too, and somewhere underneath them all is a holiday you worked
    and a name you never learned and a sound you can''t unhear. You are very good
    at taking it. That was never the problem. The problem is that nothing ever leaves.


    This book is for the paramedic, the firefighter, the dispatcher, the ER nurse,
    the deputy — anyone whose job is to absorb more in one shift than most people
    meet in a year, and who has slowly become a vessel that only fills and never empties.
    You''re not weak and you''re not broken. Your body did exactly what it was built
    to do: it held on, kept holding, and never got the long quiet it needed to let
    the water back out.


    Here you''ll come to recognize overwhelm not as a character flaw but as a flood
    with nowhere to go — capacity exceeded, the root of you packed so tight there''s
    no room left to think, let alone feel. You''ll learn what your shoulders, your
    jaw, your gut have been carrying on your behalf, and you''ll begin, slowly, to
    let that held charge move down and out through the floor — so the deep, low energy
    can finally refill from below, the way it''s meant to between calls. Not catharsis.
    Not a debrief. Just ground that finally holds the weight, and breath that reaches
    the lowest part of your lungs again.


    This is not a system to optimize you, and it will not make you take more. It won''t
    teach you to compartmentalize harder or bounce back faster. There is nothing here
    about resilience hacks or pushing through. The only thing it asks is that you
    stop being a sealed container for a little while and let something move.


    You are allowed to be full. You are allowed to set it down. You don''t have to
    carry every call out the door with you tonight.


    Book 1 of the Root & Meridian Press somatic healing series.'
