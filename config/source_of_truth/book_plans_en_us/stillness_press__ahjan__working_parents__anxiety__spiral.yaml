title: One Worry Becomes a Thousand
subtitle: For the parent lying awake while a single thought multiplies in the dark
  — stepping out of the spiral that feeds itself
cover_tagline: The thought isn't the problem. The pull is.
description:
  short_blurb: It starts with one small worry — a cough, a comment, a number in your
    account — and by the time you notice, it has split into a hundred worse ones,
    each pulling you further down. This book is for the mind that turns a single thought
    into a sleepless night. Not to argue with the thoughts, but to step back from
    the pull.
  long_description: 'It begins so quietly you don''t even see it start. One thought.
    A small one. Did the teacher seem off at pickup. Was that cough nothing. Can we
    actually afford this. And then, before you''ve decided anything, that single thought
    has divided — into the next, and the next, each one a little darker, each one
    pulling the floor down a little further, until you are lying in the dark at 2am
    running a catastrophe that hasn''t happened and probably won''t, unable to find
    the thread that brought you here.


    This is the spiral. It is rumination doing what rumination does: taking one ordinary
    worry and feeding it, turning it over, multiplying it, convincing you that if
    you just think hard enough you''ll think your way to safety. You never do. The
    spiral isn''t trying to solve anything. It''s a loop that mistakes motion for
    progress, and for a parent — whose worries are always about the people they''d
    die for — it can run all night.


    This book is for you: the one whose mind won''t power down, the one who has narrated
    entire imagined disasters into the ceiling. The one who wakes at the same hour
    every night to the same churning. You are not crazy and you are not catastrophizing
    on purpose. You have a mind that loves fiercely and confuses worry with protection
    — as if the worrying itself were keeping anyone safe.


    Slowly, you''ll come to recognize the spiral the moment it begins, before it has
    you. You''ll learn the felt difference between thinking about a problem and being
    pulled under by it. You''ll learn that you do not have to answer every thought,
    finish every imagined scenario, or win the argument the spiral keeps starting.
    You''ll practice letting the churning water go still — not by forcing it, but
    by stepping back far enough to watch one thought arise and pass without grabbing
    the next.


    This book will not promise to stop your thoughts or hand you a technique to control
    your mind. It won''t pretend you can optimize your way to a quiet head, or shame
    you for lying awake. The thoughts will keep coming; that''s what minds do. What
    can change is whether you follow them down. You can notice the first link of the
    chain and simply decline the second.


    The worry is not a command. The pull is not the truth. And in the space where
    you stop chasing the next thought, there is a stillness that was there the whole
    time, waiting underneath the noise.


    Book 3 of the Stillness Press anxiety series.'
