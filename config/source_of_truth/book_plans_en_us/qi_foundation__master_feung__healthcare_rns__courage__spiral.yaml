title: The Long Drive Home
subtitle: For nurses who replay the shift all night — when one second-guess becomes
  a thousand and courage drowns in the noise
cover_tagline: One thought about the shift, and by the off-ramp it has become a hundred.
description:
  short_blurb: Did I chart that right. Did I miss something. Did they think I was
    cold. By the time you're home, one small doubt has become a flood you can't get
    out of. This is a book for nurses whose minds spiral the moment they stop moving,
    and who have learned to call the spiral being careful. It won't help you think
    your way out. It will show you where to set the thought down.
  long_description: 'The shift is over. You did everything right, or close enough.
    And yet here you are, three exits from home, running it again: the patient in
    bed 12, the look the resident gave you, the order you double-checked and now can''t
    stop checking in your head. One thought has become ten. By the time you pull into
    the driveway it''s a hundred, and they all curl back to the same place — something
    you should have done, something you are.


    This book is for the nurse whose mind never gets off shift. The spiral feels like
    diligence. You tell yourself a good nurse stays vigilant, reviews, catches what
    she missed. So you let the thoughts run, believing that if you just think it through
    one more time you''ll finally feel settled. You never do. The spiral doesn''t
    end in an answer. It ends in exhaustion, and starts again tomorrow.


    Here you''ll come to recognize rumination for what it really is — not carefulness,
    but a current that feeds itself. You''ll see how the spiral disguises itself as
    responsibility, how it convinces you that stopping would be careless, how the
    very intelligence that makes you a good nurse gets turned into a wheel you can''t
    climb off. You''ll notice where it grips the body: the jaw that won''t unclench
    on the drive, the breath that stays high and quick, the way you''ve forgotten
    what it is to feel your own weight in the seat.


    This is not a book about thinking better. It will not give you a worksheet to
    challenge your thoughts or a technique to win the argument in your head. There
    is nothing to analyze your way out of and no perfectly reasoned conclusion waiting
    at the bottom of the spiral. The mind that spins is not broken. It is a powerful
    instrument that was never given a place to set its load down — so it carries everything,
    all the way home, all night.


    What you''ll find instead is the quieter thing the spiral has been keeping you
    from: how to let a thought arrive without chasing it down. How to feel the breath
    reach the lowest part of your lungs and the ground come up under you. How the
    courage you''re looking for is not the courage to finally solve it, but the courage
    to stop — to let the day be over, to trust that you were enough on the floor,
    and to let your mind come to rest like water finding its level.


    You do not have to finish the thought. You are allowed to let it go unanswered.
    You are allowed to come home.


    Book 2 of the Root & Meridian Press courage series.'
