title: Everything Is Due and I Am Going to Be Found Out
subtitle: For the student drowning in a semester that proves what you already feared
  — that you were never really good enough to keep up
cover_tagline: It's not that there's too much. It's what the too-much seems to prove.
description:
  short_blurb: Three deadlines, two readings you haven't started, and a quiet certainty
    underneath all of it that the workload is finally revealing the truth — you were
    never smart enough for this. This is a book for the student who freezes when too
    much arrives at once, and who has started to read their own overwhelm as evidence
    of the fraud they're sure they are.
  long_description: 'The tabs are open. The deadlines are stacked. You have eleven
    things due and you are doing none of them, because somewhere under the pile a
    sentence has gone quiet and certain: this is the semester they find out you were
    never good enough to be here.


    It''s not just that there''s too much. It''s what the too-much seems to prove.


    This book is for you — the college student who shuts down when the flood comes
    in. When every assignment arrives at once and your capacity runs out and you sit
    frozen, you don''t just feel behind. You feel exposed. The overwhelm becomes evidence.
    If you were really as capable as they thought when they let you in, you tell yourself,
    you wouldn''t be drowning like this.


    You''ll come to recognize how overwhelm and imposter syndrome feed each other
    on a campus built to flood you. How a stack of deadlines stops being a workload
    and becomes a verdict. How freezing feels like failing, and failing feels like
    the mask finally slipping. How opening the laptop and closing it again is not
    laziness but a nervous system that has hit its limit. How the more there is to
    do, the louder the voice gets that says everyone else can handle this and you
    can''t. We''ll stay in the flooded moment — not to optimize your way out of it,
    but to separate the genuine weight of too much from the lie that the weight is
    your character.


    This is not a productivity book. It will not hand you a color-coded system or
    promise that the right planner would have prevented this. There is no hack here
    for clearing the flood. The point is not to do more. The point is to stand in
    the doorway of an impossible week and recognize that being overwhelmed is what
    happens to capable people when too much arrives at once — not what happens to
    frauds when they''re finally caught.


    You were not let in by mistake. The flood is real. What it seems to prove about
    you is not.


    You don''t have to empty the pile before you''re allowed to believe you belong.
    You only have to stop letting the pile be the proof.


    Book 2 of the Threshold Books imposter syndrome series.'
