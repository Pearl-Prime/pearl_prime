title: 'After the Flame: When Loss Reshapes Everything'
subtitle: A Field Guide for Founders Navigating Burnout Recovery
cover_tagline: You're not failing. You're grieving the founder you used to be.
description:
  short_blurb: For the founder watching the fire that started their company go cold
    inside them. This is a secular field guide to the grief hiding underneath burnout
    — naming what you've actually lost, going down into it instead of bootstrapping
    past it, and coming back steadier. No recovery sprint, no forced positivity, no
    promise the spark returns exactly as it was.
  long_description: 'A founder''s burnout rarely arrives as a verdict. It arrives
    as a slow leak. The product you used to dream about now sits in a tab you can''t
    bring yourself to open. The Slack ping that once meant momentum lands in your
    chest like a small dread. You tell yourself you''re just tired, that a weekend
    will fix it, that real founders push through. But this isn''t tiredness. Something
    has gone quiet that used to be loud, and you''ve been grieving it for months without
    giving it a name. This book is for the founder who built something from nothing
    and is watching the fire that started it go cold inside them. The one who can''t
    say out loud that they miss who they were eighteen months ago, before the cap
    table and the runway math and the weight of people depending on them for rent.
    You are not failing. You are mourning, and there is a difference that matters.
    Here we name the specific losses living underneath the exhaustion: the version
    of you who slept, the cleaner vision, the certainty that this would all be worth
    it, the friend you used to be before the company ate your calendar whole. We go
    down into that grief instead of bootstrapping past it, because the loss is real,
    and pretending otherwise is exactly what keeps it lodged in your body and bleeding
    into your decisions. You''ll learn to tell the difference between a loss you can
    recover and one you only get to honor. Then we come back up. Not to the founder
    you were, but to a steadier one who can hold the company without being consumed
    by it, who can lead from something other than a low-grade panic. This is not a
    productivity book. It will not optimize your mornings or hand you a recovery sprint
    with a finish line. It will not promise the spark returns exactly as it was, because
    grief does not run in reverse, and anyone selling you that is selling you something.
    What it offers instead is plain language for what you have actually lost, and
    a way to carry it that does not require you to lie to your team, your board, or
    yourself at 2 a.m. when the dashboard glows and the house is quiet. You built
    this thing while it was changing you. You are allowed to grieve the company you
    thought you would be running, and the founder you thought you''d be, while you
    keep showing up for the ones that are actually here.'
