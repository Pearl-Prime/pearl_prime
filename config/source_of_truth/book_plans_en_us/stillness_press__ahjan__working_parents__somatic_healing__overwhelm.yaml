title: There Is No Room Left
subtitle: For the working parent carrying more than one body can hold — when everything
  arrives at once and there's nowhere to put it down
cover_tagline: Too much, all at once, and no room to set any of it down.
description:
  short_blurb: It all arrived at the same time and there was nowhere to put it. This
    is a book for the working parent who is past full — whose body is flooded long
    before the mind admits it — and a way back to a little ground beneath your feet.
  long_description: 'It came all at once, the way it always does. The work and the
    school email and the small body needing to be held and the thing you forgot and
    the thing you can''t forget — and somewhere underneath it your own body, flooded,
    with nowhere left to put any of it down. You''re not thinking anymore so much
    as bracing against the next wave. There is no room. There hasn''t been room in
    a long time.


    This book is for the working parent who lives past full. The one whose capacity
    gave out hours ago and who is still going, because going is the only option anyone
    left on the table. Who feels the flood rise in the chest and the throat and pushes
    through it, again, because the day does not pause for a nervous system that has
    had enough.


    Here you''ll come to recognize overwhelm for what it actually is in the body —
    not a failure of willpower or organization, but a system that has taken on more
    than it can metabolize and has no moment to discharge it. You''ll feel the difference
    between adding one more strategy and finally letting the water find a level. You''ll
    learn where the flood lives in you, what it''s like to let a single wave move
    through instead of damming it, and how even a breath of space can return when
    there seemed to be none. Not by doing more. Not by becoming more efficient at
    being overwhelmed. By stopping, for a moment, and letting the body catch up to
    a life it''s been chasing.


    This is not a book that will give you your time back or teach you to do it all
    without strain. It will not optimize your overwhelm or hand you a system to manage
    the unmanageable. There is nothing here to perfect, and no tireless version of
    you waiting on the other side of the right routine.


    What it offers instead is a place to set something down — a language for the flood
    that you can reach for the next time it rises, in the car before you go in, between
    two meetings, in the kitchen at 9pm with the dishes still waiting. You''ll come
    to understand what your body is doing when it''s overwhelmed, and why, given everything
    you carry, it makes complete sense.


    Not fixed. Not finished. Just a little more room than there was, and the knowing
    that the ground is still there underneath all of it.


    Book 2 of the Stillness Press somatic healing series.'
