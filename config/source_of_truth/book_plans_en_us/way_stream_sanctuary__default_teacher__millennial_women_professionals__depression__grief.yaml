title: 'The Weight Without a Name: When Loss Reshapes Everything'
subtitle: A Field Guide for Professional Women Navigating Overcoming Depression
cover_tagline: You're not depressed in the way they mean. Something ended, and no
  one told you to mourn it.
description:
  short_blurb: You're high-functioning on paper and flattened underneath. This is
    a field guide for the professional woman carrying a loss that has no funeral,
    no card, no language anyone around her recognizes. It won't tell you to cheer
    up. It will help you name what's actually gone.
  long_description: 'You answer the email. You lead the meeting. You smile in the
    elevator. And somewhere under all of it is a weight you can''t put down and can''t
    explain, because nothing technically happened. No one died. You didn''t get fired.
    So why does everything feel like it''s underwater.


    This book is for the professional woman who looks fine and feels gone. The one
    who has started calling it depression because that''s the only word anyone hands
    her, when the truer word might be grief. Grief for the version of your life you
    thought you''d be living by now. For a relationship that ended quietly. For the
    self you were before the burnout, before the move, before the year that took something
    out of you that no one else can see. Loss that comes without a casket doesn''t
    get a funeral. It just gets carried, in silence, into every ordinary Tuesday.


    Grace Adeyemi writes the way a clear-eyed friend talks at the end of a long day.
    First, recognition: this heaviness is not a character flaw or a productivity problem,
    it''s the shape grief takes when it has nowhere to go. Then descent. Instead of
    teaching you to manage the weight or optimize around it, this book walks you down
    into it, slowly, with your eyes open. You''ll learn to feel where loss actually
    lives in your body, the chest, the jaw, the hollow behind the sternum, and to
    stop treating that as something to fix before Monday. Then integration: not the
    loss erased, but you, changed and load-bearing, able to hold what happened without
    being crushed flat by it.


    This is not a recovery plan. There are no morning routines, no gratitude lists,
    no five steps to your best self. It will not promise you''ll be lighter by chapter
    ten or back to your old self by the end. Your old self isn''t coming back, and
    this book won''t pretend otherwise. What it gives you instead is steady, unhurried
    company while you go down to look at the loss, and language plain enough to reach
    for at your desk the next time the weight lands and you have nine minutes before
    a call.


    If you''ve been white-knuckling through grief while everyone congratulates you
    on how well you''re holding up, this book sees the cost of that. You don''t have
    to keep performing okay. Put the weight down. Look at what''s underneath it. You
    can begin right where you''re sitting.'
