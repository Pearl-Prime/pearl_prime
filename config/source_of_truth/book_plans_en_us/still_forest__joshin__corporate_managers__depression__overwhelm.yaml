title: The Weight You Carry Home
subtitle: For the manager who holds it together all day and goes flat the moment the
  door closes — when the load is too much and there's no room left to think
cover_tagline: You set everyone else's burden down. You never set down your own.
description:
  short_blurb: You are the steady one at work — the person everyone leans on, the
    one who keeps the room calm. Then you get home, and a grey weight settles over
    you that no one else can see. This is a quiet companion for the manager carrying
    more than a mind was built to hold, and for the moment you finally let some of
    it down.
  long_description: 'It arrives the moment the door closes behind you.


    All day you held the room. You absorbed the bad news, smoothed the panic, made
    the call no one else wanted to make, and kept your voice level while you did it.
    You were the steady one. And now you are sitting in the dark of your own kitchen
    with your coat still on, and something grey and heavy is settling over your chest
    — not sadness exactly, just a weight, and the flat certainty that there is no
    room left in you for anything more.


    This book is for you. For the manager who carries the whole team home in their
    body every night. For the one who has become so good at holding everything together
    that no one has noticed you are coming apart. For the person whose to-do list
    never empties and whose mind, by evening, has simply gone dim.


    Walk slowly here, the way you''d walk into a forest at dusk. We will not try to
    lighten the load by pretending it is lighter than it is. Instead we will look,
    without hurry, at the weight itself — how overwhelm is not weakness but a mind
    asked to hold more than any mind was built to hold; how the flood of too-much-at-once
    crowds out the very stillness that could clear it; how you learned to perform
    fine as a survival skill, and what it has cost you to keep performing it; how
    the body keeps the tally even when the calendar says you''re caught up. You''ll
    come to recognize the difference between a problem to be solved and a weight to
    be set down — and how rarely the two are the same thing.


    This is not a productivity book. It will not optimize you, fix your mornings,
    or hand you a routine for doing more with the little you have left. It makes no
    promise of relief by Friday. There is nothing here to win.


    What there is, is room. A clearing in the canopy where the weight you carry can
    be named out loud, witnessed, and — for one quiet hour — set down on the forest
    floor that was always strong enough to hold it. You do not have to carry it all.
    You never did.


    Book 1 of the Still Forest Press depression series.'
