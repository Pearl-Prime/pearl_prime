title: I Don't Recognize the Person Who Used to Be So Sure
subtitle: For the student grieving the confident kid they used to be — the one who
  knew they belonged before college quietly took that certainty away
cover_tagline: You're not just doubting yourself. You're mourning who you used to
  be.
description:
  short_blurb: You used to be the smart one. The sure one. The one who walked into
    rooms without rehearsing. Then college happened, and somewhere in the comparison
    and the workload that person went quiet, and you're not sure you'll ever get them
    back. This is a book for the student grieving a self they've lost — and learning
    that the way forward isn't recovering who you were, but releasing them.
  long_description: 'You remember being sure. In high school, in your hometown, in
    the version of your life before this — you were the one who knew things, who raised
    a hand without rehearsing, who walked into rooms like the room was lucky to have
    you. You don''t recognize the person typing this. Somewhere in the last year,
    that confident kid went quiet, and you''ve been low-key mourning them ever since.


    This isn''t only doubt. It''s grief. And nobody warned you that imposter syndrome
    would feel like a loss.


    This book is for you — the college student grieving a former self. The one who
    got somewhere harder, somewhere that made you small, and lost the certainty you
    used to carry without even noticing it leave. You keep trying to get that person
    back, and the not-getting-them-back is its own quiet bereavement, the kind no
    one holds a space for because nothing ''happened.''


    You''ll come to recognize the shape of this loss. How grief changes form — some
    days it''s anger at this place, some days it''s a flat numbness, some days it''s
    a sharp ache for a dorm room two years and one identity ago. How you''ve been
    treating your lost confidence like something to recover, when recovery was never
    the doorway. How holding on to who you were is keeping you from meeting who you''re
    becoming. We''ll stay with the loss honestly, without rushing you past it, because
    the confident kid deserves to be grieved before they can be released.


    This is not a book that will help you ''get back to your old self.'' It won''t
    promise to restore the person you were before college made you doubt, because
    that person was never the destination. There is no recovering the old certainty,
    and trying to is what''s keeping you stuck in the doorway. The point is not to
    become who you used to be. The point is to stand at the threshold, grieve the
    kid who was sure of everything, thank them — and walk through into someone who
    belongs here not because they never doubt, but because they kept going anyway.


    You didn''t lose yourself by mistake. Something real ended. And something you
    can''t see yet is waiting on the other side.


    You don''t have to get the old you back before you''re allowed to move forward.
    You only have to let them go gently enough to cross.


    Book 5 of the Threshold Books imposter syndrome series.'
