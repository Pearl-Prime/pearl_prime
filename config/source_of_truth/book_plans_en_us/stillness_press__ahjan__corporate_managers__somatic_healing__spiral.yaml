title: One Thought, a Thousand Times
subtitle: For managers caught in the loop that feeds itself — when a single worry
  tightens into a night you can't think your way out of
cover_tagline: The more you think it through, the tighter it gets.
description:
  short_blurb: It started as one thought. Then it forked, and forked again, and now
    it's 2am and you've run the same scenario forty ways and none of them let you
    go. This is a quiet book for the manager whose mind mistakes the spiral for solving
    — and whose body pays for every loop.
  long_description: 'It started as one thought. Did I handle that right. Then it forked
    — what they must think, what it means, what happens next, what you should have
    said — and now it''s 2am and you''ve run the same scenario forty different ways
    and not one of them has set you free. The loop feels like problem-solving. It
    is the opposite. It is the spiral, and the more you think it through, the tighter
    it pulls.


    This is rumination, and it is not a discipline problem or a sign you''re overthinking
    on purpose. It''s a nervous system that has learned to treat thinking as safety
    — that believes if it can just analyze the threat thoroughly enough, it can finally
    get ahead of it. So the mind loops. And each pass feels productive and leaves
    you tighter, more wound, further from sleep, because the body is bracing harder
    with every revolution.


    This book is for the mid-level manager who runs the cross-functional team and
    whose sharpest instrument — the analytic mind that anticipates every angle — turns
    on its owner the moment the office empties out. The body holds what the looping
    costs. You''ve called it being thorough. You''ve called it just how my brain works.
    You may not have noticed the spiral has a physical home, a clench it tightens
    by degrees.


    You''ll come to recognize the spiral as a body event, not only a mental one —
    the felt difference between thinking that moves and thinking that only winds.
    You''ll find where the tightening lives in you, the catch in the breath that feeds
    it, the way the loop and the clench keep each other going. And you''ll learn that
    you don''t escape a spiral by out-thinking it. You loosen it from the body — you
    let the clench ease, and the thought, with nothing left to grip, finally has somewhere
    to land.


    This book will not give you the answer the spiral keeps demanding. It won''t hand
    you a thought-stopping trick or a mindset reframe to optimize the loop away —
    those are just more thinking, and thinking is the trap. The spiral is not a puzzle
    to finish. It''s a tightening to release.


    What it offers is recognition, and a way down out of the loop. Language for the
    moment it starts. A practice you can do in the dark, on a train, in the gap before
    the meeting where the thought first caught — small enough to meet the spiral right
    where it lives.


    You are not too anxious and you are not failing to cope. You are a person whose
    mind learned that looping was protection, and who is allowed to discover that
    the way out was never another lap.


    Book 4 of the Stillness Press somatic healing series.'
