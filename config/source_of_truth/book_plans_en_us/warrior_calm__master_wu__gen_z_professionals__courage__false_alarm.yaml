title: Your Body Thinks the Meeting Will Kill You
subtitle: For the early-career professional whose nervous system treats every unsent
  message and unspoken opinion like a threat to survival
cover_tagline: The danger your body is screaming about is a calendar invite.
description:
  short_blurb: Your heart slams before a one-on-one. Your stomach drops over an email
    anyone else would send without thinking. This is for the moment you finally understand
    that your alarm is firing at full volume over things that cannot actually hurt
    you — and learn to act anyway, while it's still ringing.
  long_description: 'Read the room: your hands have gone cold, your chest is tight,
    and the threat your body is bracing against is a fifteen-minute call with your
    manager.


    You know, somewhere, that nothing is actually going to happen. No one is going
    to hit you. You won''t be thrown out into the cold. And still the alarm goes off
    — the same ancient circuitry that once warned your ancestors about predators,
    now firing over an unsent Slack message, a meeting you have to speak in, an opinion
    you''re not sure you''re allowed to have. Your body has confused exposure with
    danger. It treats being seen like being hunted.


    This is for you: the one who looks composed and is white-knuckling it underneath.
    Who has talked themselves out of a hundred small brave things because the dread
    felt like a warning instead of what it is — a false alarm.


    You''ll come to recognize the shape of it. How the body fires first and invents
    the reason after. How the racing heart before you speak is not proof that speaking
    is dangerous, only proof that it matters. How the urge to wait until you feel
    calm is the exact trap that keeps you silent, because calm was never coming first.
    You''ll learn what it means to feel the alarm fully — the heat, the hum, the bracing
    — and take one small step into the thing anyway. Not because the fear is gone.
    Because you''ve stopped letting it be the final word.


    This book will not make the alarm stop. It cannot promise you confidence, or a
    quiet body, or a self that never flinches before it acts. There is no breathing
    trick here that switches the fear off, no morning routine that armors you against
    being seen. The fear stays. You learn to move while it''s ringing.


    What''s offered instead is the quiet, trained calm underneath the alarm — the
    still center that holds while the storm goes off around it. The breath before
    action. The single step taken at the edge, before you feel ready, because ready
    is a story and the edge is real.


    You are not in danger. You never were. You''re just standing somewhere new, and
    your body hasn''t caught up yet.


    Let it ring. Step anyway.


    Book 1 of the Iron Gate Press Courage series.'
