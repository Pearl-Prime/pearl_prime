title: The Tone Still Sounds
subtitle: For the first responder whose body keeps bracing for a call that isn't coming
  — finding stand-down when the shift is over but the alarm won't quit
cover_tagline: The truck is back in the bay. Your body never got the message.
description:
  short_blurb: You ran toward the worst day of someone's life and held it together.
    Now it's hours later, the house is quiet, and your heart is still going like the
    tone is about to drop. This is for the body that won't stand down — and the steadier
    way back to ground that doesn't ask you to feel nothing.
  long_description: 'The call is over. The gear is hung up. There is nothing in front
    of you that needs responding to. And still your chest is tight, your jaw is set,
    your ears are half-listening for the tone. Your body is braced for something it
    can''t name, on a night when nothing is wrong.


    This book is for the firefighter, the medic, the dispatcher, the officer — anyone
    whose nervous system learned to go from zero to full alert in the time it takes
    a pager to sound, and then never learned how to come back down. You are not broken.
    You are not losing your edge. You have a finely trained alarm system that has
    started firing when there is no fire, and no one taught you what to do when the
    danger is gone but the readiness stays.


    You''ll come to recognize the false alarm for what it is. The bracing that has
    nothing to brace against. The scanning that finds no threat and keeps scanning
    anyway. The way your body treats a quiet house like a scene that hasn''t happened
    yet. You''ll see how the same wiring that keeps you alive on a call is the wiring
    that won''t switch off in the dark — and how meeting it, instead of fighting it,
    is the beginning of standing down.


    This is the still center in the storm, found not by force but by learning where
    the edge actually is. There''s a cliff your body keeps walking up to. The work
    is one step back from it — what is one thing you can do before you feel ready
    to rest?


    This book will not make you fearless, and it would be lying if it tried. It will
    not optimize your recovery time or hand you a protocol to suppress what your body
    is doing. There is no hack here, and nothing to armor against. The alarm is not
    the enemy. It is a trained instrument pointed at an empty room, and the work is
    not to silence it but to teach it the difference between the bay and the scene.


    You are allowed to be off duty in your own body. You don''t have to earn the quiet.
    Let the tone sound, and let it pass, and stay standing.


    Book 1 of the Iron Gate Press courage series.'
