title: The Yes Before You Decide
subtitle: For the woman whose body agrees before her mind does — when refusing someone
  feels like danger, not a choice
cover_tagline: Your mouth said yes before you knew you'd been asked.
description:
  short_blurb: There is a half-second between the request and your answer where something
    in you flinches, and the yes is out before you ever chose it. This is a book about
    that flinch — the alarm that fires when no real threat is there, only a person
    who wants something from you. It won't teach you to refuse faster. It will help
    you understand why your body treats a boundary like a threat to survive.
  long_description: 'Someone asks you for something — to stay late, to host, to take
    this on too — and before you''ve weighed a single thing, you hear yourself say
    yes. Not a thought-out yes. A reflex. A bracing. By the time your mind catches
    up, the word is already in the air and your chest has gone tight around it.


    This book is for the woman who manages a team all day and runs the household at
    night, who knows on paper exactly what a healthy boundary is, and who still cannot
    understand why the word ''no'' arrives in her body like a fire alarm. You are
    not weak. You are not a pushover. You have a finely tuned alarm system that has
    learned to read an ordinary request — a favor, an ask, a small disappointment
    to someone — as something you must not let happen.


    With the feather on one side of the scale and your whole life on the other, you
    will come to recognize how the false alarm works. How the dread arrives before
    the danger does, because there is no danger — only your nervous system bracing
    for a rupture that was real once and isn''t anymore. You''ll see why your body
    confuses someone''s momentary displeasure with a threat to your belonging, and
    why holding a line can make your hands shake when nothing is actually at stake.
    You''ll learn to feel the difference between an alarm and an emergency.


    This book will not hand you a script. It will not promise that no will ever feel
    easy, or that you''ll stop flinching by Friday. There is no technique here for
    overriding yourself faster. What there is, instead, is recognition — language
    for what''s happening in the half-second you''ve never been able to explain, so
    that the next time the alarm fires, you are not alone inside it.


    Nothing here asks you to become someone who doesn''t care. The caring is not the
    problem. The alarm is not a defect to delete; it''s a guard that has been standing
    watch too long at a door no one is trying to break down. You are allowed to thank
    it and still not obey it.


    You don''t have to earn the right to take up the space you take up. You don''t
    have to be in danger to deserve a ''no.''


    Book 1 of the Feather & Scale Press boundaries series.'
