title: Too Much, All at Once, All the Time
subtitle: For the medic, the firefighter, the dispatcher whose calls stack faster
  than the body can clear them — when there's no still moment left to breathe between
  runs
cover_tagline: You never got to set the last one down before the next one came.
description:
  short_blurb: Burnout doesn't always look like running out. Sometimes it looks like
    a flood that never recedes — call after call, alarm after alarm, with no still
    moment between them for the body to clear. This is a grounded way back down, for
    the responder who has been carrying everything at once for far too long.
  long_description: 'It happens in the truck on the way back from the last one. The
    tones drop again before you''ve even logged the previous run, and somewhere behind
    your sternum you feel it: there is no more room. Not panic exactly. Just a body
    that has been asked to hold one more thing on top of all the things it is already
    holding, and has quietly run out of anywhere to put it.


    This book is for the first responder who has stopped being able to tell where
    one shift ends and the next begins. The medic who carries the bad pediatric call
    into the kitchen at home. The firefighter, the dispatcher, the officer whose nervous
    system never gets the all-clear because the next demand always arrives before
    the last one has cleared the system. You are not falling apart. You are flooded
    — and a flooded ground cannot absorb one more drop, no matter how strong the ground
    is.


    What you''ll come to recognize here is that overwhelm is not too little capacity.
    It is too much arriving with nowhere to drain. We''ll sit with the way the body
    braces against a flood it can no longer feel the edges of, how the breath climbs
    into the top of the chest and stays there, and what it means that you haven''t
    reached the bottom of a full exhale in longer than you can remember. You''ll learn
    what your roots already know: that nothing living absorbs while it is bracing,
    and that the well does not refill while the bucket is still going down.


    This is not a book that will help you carry more. It will not optimize your shift
    or hand you a recovery protocol to squeeze between calls like one more task. There
    is no system here for becoming a higher-capacity version of yourself. The opposite,
    really. This is about letting the water level drop — making one small place inside
    you where the flood is allowed to recede, so the ground underneath can finally
    take a breath and begin, slowly, to hold again.


    You are allowed to put it down. Not all of it, not all at once — but enough to
    feel the floor come back up to meet you. Enough to remember that you were never
    meant to be a vessel that only fills.


    Book 1 of the Root & Meridian Press burnout series.'
