title: 'Social Anxiety: The Shame Response'
subtitle: Understanding How Shame Works in Your Body and Mind — and How to Release
  It — Social Anxiety for Corporate Managers (What Shame Does to You)
cover_tagline: You lead the meeting, then drive home certain everyone could tell something's
  wrong with you.
description:
  short_blurb: 'Underneath the competent manager is a belief you never say out loud:
    that you''re fundamentally off, and people can sense it. This is a one-hour, unsentimental
    look at the shame that turns every interaction into something to survive. You
    won''t be told you''re fine. You''ll be shown the thing you''ve been hiding, and
    what it costs to keep it hidden in a room full of people watching you.'
  long_description: 'You ran the meeting and it went fine, and now you''re in the
    car and the tally begins. The way your voice caught on one word. The joke that
    thudded. The three seconds you lost the thread and improvised. And under every
    item on the list, the conviction you would never say out loud in a room: that
    you are somehow off at the root, in a way other people simply aren''t, and that
    every time you''re around them is another opening for it to leak. It was never
    the meeting you dreaded. It''s being found out inside it.


    This book is for the manager who walks into a room already braced to be read,
    and reads every face for the verdict. Leading means you''re watched, and being
    watched gives the feeling a stage it never had at your desk. You rerun a hallway
    exchange hunting for the half-second your wrongness showed. You take a colleague''s
    flat expression as a quiet conclusion about you. You explain a little too much,
    apologize a beat too early, curate your whole presence so the thing stays under
    wraps, and it drains you in a way the actual work never does, because the work
    finishes and the guarding never clocks out.


    In one hour we turn toward the conviction itself rather than the evidence you
    keep collecting for it. First you put the belief into an actual sentence, the
    bare claim under all the monitoring, because a thing this old survives on staying
    unspoken and weakens the moment you say it flat. Then you stop arguing with it.
    Not a highlight reel of your wins to drown it out, but a clear look at where it
    actually came from, a verdict handed down long before this job that has been passing
    itself off as a fact about you ever since. From there the feeling stops running
    the social math for you.


    This book will not tell you you''re fine. You''ve been told, by people who meant
    every word, and it slid right past the place the belief lives, because this kind
    of shame doesn''t yield to counterargument. No mantra here, no exercise that melts
    it off, no promise you''ll glide into the next room finally easy in your skin.
    What you get instead is the daylight between believing something is wrong with
    you and running your entire working life as a campaign to keep it hidden.


    Waystream stays secular and grounded. We hand you plain language for what is actually
    happening, usable in the meeting, in the hallway, in the long drive home with
    the replay on loop. You are not a flaw that learned to chair a meeting. You''re
    a person hauling an old sentence into rooms that were never the courtroom you
    keep mistaking them for.


    You are allowed to be looked at and stay right where you are.'
