title: There's Nothing Wrong With You
subtitle: For the student who drafts the text six times, laughs a beat too early,
  and stays quietly braced that if anyone saw the real you, they'd finally know something
  was off
cover_tagline: You've been covering for a defect that was never there.
description:
  short_blurb: There's a specific kind of tired that comes from managing yourself
    all day — drafting the text six times, laughing a beat too early, making sure
    no one ever sees the version of you that you think is the real one. This book
    is for the student who learned to perform okay-ness so well that even they stopped
    checking if it was true. It won't fix you, because you were never broken. It'll
    just turn the lights on.
  long_description: 'There''s a moment you know better than almost anyone. You''re
    about to hit send, and you read it again. And again. You change one word. You
    add a ''lol'' so it lands softer. You delete the whole thing and start over, because
    somewhere underneath, there''s a quiet certainty that if you get it slightly wrong,
    people will finally see the thing you''ve been hiding — the part of you that''s
    off, that''s too much, that''s not enough, that''s just wrong somehow.


    This book is for you. The one who overworks the group project so no one finds
    out you don''t belong there. The one who over-explains, who apologizes for existing
    in the doorway, who has a face for every room and is exhausted from switching
    between them. You''re not anxious in some abstract way. You''re managing a leak
    you''ve never named, and it costs you everything you have.


    What you''ll come to recognize is that the defect you''ve been covering for was
    never real. The shame didn''t start with you — it got installed, early, by a thousand
    small moments where being yourself felt unsafe, and you got very good at hiding
    instead. You''ll watch how it runs: the mask you put on before you''re even awake.
    The way you overwork to earn a worth that was never actually conditional. The
    hidden belief, way down, that the problem is YOU — and the slow, strange relief
    of finding out it isn''t, and never was.


    This is not a glow-up. There''s no version of you waiting at the end that''s finally
    fixed, optimized, content-ready. Nobody here is going to tell you to delete the
    app, build better habits, or become your own brand. You don''t need to be improved.
    You need to stop bracing.


    So we go slow, and we start with what''s actually here. Not the version of you
    in the photo. The one in the room right now — feet on the floor, phone face-down
    for a second, breathing. That person was never the problem. That person never
    needed an edit.


    What this book offers instead is the lights coming on in a room you''ve been hiding
    in for years — and the unremarkable, enormous discovery that there was never anything
    in here that needed hiding. You can put the mask down. Not because you fixed yourself.
    Because there was never anything wrong with you to begin with.


    You''re allowed to be a person who is just a person. Start there.


    Book 1 of the Present Tense Books self worth series.'
