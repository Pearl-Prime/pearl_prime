title: The No You Swallow
subtitle: When a small 'no' to your boss, your mother, or the class group chat feels
  like detonating the whole room — a working parent's guide to the false alarm
cover_tagline: Your body braces for a fight that was never coming.
description:
  short_blurb: 'Long before anyone has asked you for anything, your body already knows
    the answer it''s about to give: yes. Yes to the extra shift, the bake sale, the
    favor you can''t afford. This is a book for the parent whose alarm goes off the
    instant a ''no'' comes into view, and who is ready to learn that the danger they''re
    bracing for usually isn''t there.'
  long_description: 'It happens before you''ve even decided. The text arrives, the
    ask lands, and something in your chest pulls tight. Your jaw sets. You''re already
    rehearsing the apology, already saying yes — not because you want to, but because
    the no caught in your throat feels like a live wire. Like if you let it out, something
    would break. The room. The relationship. The fragile peace you''ve spent all week
    holding together.


    This is a book for the working parent whose alarm goes off first and asks questions
    later. You know the feeling. Someone needs a thing, and before a single word is
    spoken your whole body braces — as if you were about to do something dangerous
    instead of simply protecting forty minutes, one evening, a sliver of yourself.
    You''ve learned to read ''no'' as a threat. And so you swallow it, again, and
    call the swallowing kindness.


    Here, you''ll come to recognize that bracing for what it is: a false alarm. You''ll
    see how the dread of the conversation is almost always bigger than the conversation.
    How your body sounds the warning for a confrontation that, more often than not,
    simply doesn''t come — the boss who says ''of course,'' the friend who understands,
    the child who is fine. You''ll notice the difference between a real rupture and
    the phantom one you keep predicting at the table.


    This isn''t a book of scripts. It won''t hand you a clever line to say across
    the kitchen. It won''t teach you to manage people or ''win'' the moment. There
    is no five-step system here for becoming someone who never flinches. The flinch
    is human. We''re not going to talk you out of it.


    What you''ll find instead is a quieter thing: the space between the alarm and
    the answer. The half-second where you get to notice the bracing, breathe, and
    choose — not from fear, but from the truth. A no can be soft. It can be kind.
    It can be said plainly across the table and leave both chairs still standing.


    You are not difficult for having a limit. You are not breaking anything by naming
    it. The danger you keep bracing for has, most of the time, already passed you
    by.


    Book 1 of the Two Chairs Press boundaries series.'
