title: 'Social Anxiety: When Fear Lies to You'
subtitle: How Professional Women Are Rewriting the Rules of Social Anxiety
cover_tagline: Your body braces like the room is a threat. It's just a room.
description:
  short_blurb: Your heart races before the happy hour. Your face heats up the second
    eyes land on you. This book is about the false alarm at the center of social anxiety
    — a body convinced that being seen is dangerous when nothing dangerous is happening
    — and how to walk into the room while it's still firing. No deep breaths that
    pretend it away. Just the truth about the alarm.
  long_description: 'You''re outside the room and your body is already bracing. Heart
    climbing, palms damp, that hot prickle up the neck — the same response you''d
    have if something were actually about to hurt you. But nothing is. It''s a networking
    event. A team lunch. A group of people who, statistically, are not a threat to
    your survival. And your nervous system is responding as though you''re about to
    be attacked.


    This book is for the professional woman whose body treats social exposure like
    physical danger. The flush when a meeting turns to you. The dread in the elevator
    before the offsite. The way your voice goes thin and your mind goes blank the
    moment you become the thing being looked at. You read those sensations as a warning
    — as proof the situation is dangerous and you should get out — and so you decline,
    you leave early, you stay on the edge of the room where the alarm is quieter.


    Here''s what you were never told: that''s a false alarm. Your threat-detection
    system evolved to keep you alive among people who could literally cast you out
    to die, and it has never updated. Being looked at registers as risk. Visibility
    registers as exposure to a predator. The racing heart isn''t reporting on the
    actual danger of the happy hour — there is none. It''s a smoke detector going
    off because you made toast.


    We''ll work through this in three moves, and not one of them is a breathing trick
    to shut the alarm off. First, recognition: you''ll learn to catch the alarm and
    name it accurately in the moment — not danger, just an old system misfiring. Second,
    descent: instead of fleeing the sensations or trying to calm them down before
    you''ll enter, you''ll go into them, let the body do its loud thing, and find
    out it cannot actually harm you or stop you. Third, integration: you''ll come
    back knowing, in your body, that you can walk into the room while the alarm is
    still ringing — that the firing was never a reason to leave.


    This is real, secular talk for your working life — the conference reception, the
    round of introductions, the camera-on meeting where your own face stares back
    at you. No grounding rituals to perform at the door. No forced calm. No story
    about your fear being a wise messenger you should thank. The alarm is just an
    alarm, and we''ll treat it like one.


    What this book will not do is promise the alarm stops firing. It may not. That''s
    not a failure state — it''s an old, loyal, overcautious system. What changes is
    that its firing stops counting as a verdict on where you''re allowed to go.


    The room is not a threat and being seen will not kill you. Your body is just very
    old and very loud. You''re allowed to walk in anyway.'
