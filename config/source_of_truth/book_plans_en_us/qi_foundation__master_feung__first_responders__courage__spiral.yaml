title: The Call I Run All Night
subtitle: For the responder whose mind replays one decision a thousand ways — when
  courage on scene turns to rumination in the dark
cover_tagline: You made the right call in nine seconds. You've been unmaking it for
  nine hours.
description:
  short_blurb: On scene you decide in seconds and you're usually right. Off shift,
    your mind takes that same decision and runs it again and again, each pass darker
    than the last, the should-have crowding out the sleep. This is a book for the
    responder caught in the spiral after the call. It won't argue you out of the loop.
    It will show you where the ground is, underneath it.
  long_description: 'The scene is over. You cleared it hours ago. By every account
    that matters, you did it right — fast, clean, the call everyone trains for. And
    now you are lying in the dark and your mind has reached back for that one moment
    and started to run it again. The turn you took. The order you gave. The half-second
    you''ll never get back. One thought becomes ten becomes a hundred, each one a
    little heavier, pulling down, and the more you try to think your way to solid
    ground the deeper the pull.


    This book is for you. For the responder who can hold absolute steadiness on the
    worst day of someone''s life, and then go home and be dragged under by a mind
    that will not stop relitigating it. You are not careless. The opposite — you are
    so committed to getting it right that your own thinking has turned on you, taking
    the very sharpness that keeps people alive and aiming it back at yourself in the
    dark, all night, with no scene to act on and nothing to do but spin.


    What you will come to recognize is the shape of the spiral itself — how rumination
    disguises itself as responsibility, how the loop promises that one more pass will
    finally settle it and never does, how the downward pull feeds on your own care
    for the work. You''ll come to see that courage here is not winning the argument
    with your mind. It is the harder, quieter thing: letting the thought arrive and
    not chasing it down. You''ll learn what it is to let the breath reach the lowest
    part of the lungs while the thoughts keep coming, to feel your weight return to
    the ground, to let the churning energy at the surface sink back toward the root
    where it can finally rest.


    This book will not promise to stop the spiral or fix your overthinking. There
    is no protocol that out-thinks a thinking mind. It will not hand you a clever
    reframe to win the loop, because winning the loop is still being in it. What it
    offers instead is somewhere to stand that the spiral cannot reach — the ground
    under the churn, steady whether the thoughts are loud or quiet.


    You do not have to settle the call to put it down. You do not have to win against
    your own mind to rest. The loop can keep turning, and you can stop riding it.
    One breath, dropped low, before you feel ready — that is the step off the edge
    of the spiral, and it is enough.


    Book 2 of the Root & Meridian Press courage series.'
