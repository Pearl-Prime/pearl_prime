title: The Room Where They All Seem Sure
subtitle: For the young professional certain every colleague crossed a threshold they
  are still standing outside of
cover_tagline: Standing in the doorway, you keep scoring yourself against everyone
  already inside the room.
description:
  short_blurb: Everyone in the meeting looks like they belong there. They speak up
    without rehearsing, they don't reread their messages four times, and they seem
    to have gotten a memo you never received. This book is for the young professional
    who measures themselves against every confident-looking coworker and always lands
    on the same verdict — that they're the only one who doesn't actually deserve the
    seat.
  long_description: 'It happens in the first thirty seconds of the meeting. Someone
    speaks up easily. Someone else laughs at the right moment. And you do the math
    you always do — fast, automatic, brutal — and the answer comes back the way it
    always does: everyone here belongs, and you snuck in.


    This book is for the young professional whose mind never stops measuring. You
    compare your insides to everyone else''s outsides — their ease to your effort,
    their certainty to your second-guessing, the version of them you can see to the
    version of you only you can feel. They look like they got the memo. You look,
    to yourself, like the one mistake the hiring process made.


    We''re going to look closely at that measuring you keep doing, because the habit
    isn''t broken — it''s just relentless, and it''s pointed the wrong way. You''ll
    come to recognize how comparison promises to tell you where you stand and instead
    just keeps you standing in the doorway, never quite walking through. You''ll see
    how you''ve been ranking yourself against people you don''t actually know — comparing
    your raw, unedited Tuesday to their final cut. You''ll notice how the scoreboard
    in your head doesn''t make you better; it just makes you smaller, and convinces
    you the smallness is accurate.


    And then, gradually, a different kind of quiet. What it feels like to put the
    measuring down for an hour. To let a coworker be good at something without it
    meaning you''ve failed. To notice that the people who look most like they belong
    are very often running the exact same math you are.


    This book will not help you win the comparison. That''s the point. It won''t make
    you more impressive than the person beside you, or coach you to fake the ease
    you envy. There is no leaderboard here to finally climb. The feeling of falling
    behind is not a measurement of your worth — it''s a measurement you were never
    supposed to be taking.


    You are not behind. You''re standing at the threshold of something real, looking
    sideways at everyone else''s doorway instead of stepping through your own. Belonging
    was never a competition you had to place in. The door is yours, and no one else
    has to come up short for you to walk through it.


    Nothing here will help you come out ahead. It will help you stop running the race
    that was never real. Step over the line as yourself — the room is large enough
    for all of you.


    Book 2 of the Threshold Books imposter syndrome series.'
