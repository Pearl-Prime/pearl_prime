title: Too Many Tabs Open to Sleep
subtitle: For the burned-out mind where the whole of your life comes due at once the
  moment the lights go off
cover_tagline: The day is over. Everything from it followed you into bed.
description:
  short_blurb: The moment your head hits the pillow, it all arrives at once — the
    unanswered thread, the quarter, the thing you forgot, the person you let down,
    the life you're supposed to be building. There's no room left to think, only the
    flood. This is a spare, unhurried book for the capable mind that has finally exceeded
    its own capacity, and needs an empty room more than another plan.
  long_description: 'You get into bed and the flood arrives.


    Not one thought — all of them. The thread you didn''t answer. The number that''s
    due. The thing you forgot to do and the worse thing you forgot you forgot. The
    investor, the report, the friend''s birthday, the move, the money, the whole shape
    of a life you''re somehow supposed to be holding together. It lands on you at
    once, in the dark, with the laptop closed and nothing you can actually do about
    any of it. There''s no room left in you to think. Just the rising water.


    This book is for you. For the person who runs on full all day — who holds a dozen
    open loops at work without dropping one — and then lies down at night and feels
    every one of them come due at the same instant. You didn''t run out of effort.
    You ran out of room. Capacity is finite, and yours has been spent.


    What you''ll come to recognize here is that overwhelm is not a backlog to clear.
    You cannot triage your way to rest at 2am, though God knows you''ve tried — ranking
    the worries, sorting them, telling yourself you''ll handle this one first thing.
    The sorting is the flood. Every attempt to manage the load adds to it. The mind
    that''s good at carrying everything cannot, by itself, learn to set anything down.


    So this book does something else. It clears the room instead of clearing the list.
    You''ll learn what it feels like when the hundred things stop arriving all at
    once and start arriving one at a time, or not at all. You''ll find the difference
    between a life that''s genuinely too much and a nervous system that has simply
    been asked to hold too much without ever being allowed to put it down. You''ll
    feel the empty space that opens when you stop trying to fit everything into one
    exhausted body at one impossible hour.


    This book will not help you get on top of it all. There is no system here, no
    inbox-zero for the mind, no method for processing the night more efficiently —
    because the reaching for a method is the overwhelm, dressed up as a solution.
    There is nothing here to organize.


    There is only an emptier room than the one you walked in with. Clean light. Space
    around each thing instead of all of it pressed together. The quiet understanding
    that you are allowed to carry nothing for these few hours, and that the world
    will still be there, intact, to be picked up in the morning.


    You don''t have to hold it all tonight. Let the room go empty. Let it be enough.


    Book 2 of the Bare Form Books Sleep Anxiety series.'
