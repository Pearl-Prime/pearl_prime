title: The Imposter at the Head of the Table
subtitle: For the manager who leads from behind a held breath — when courage stalls
  on the buried belief that you don't actually belong here
cover_tagline: Twenty years in, and some quiet part of you still expects to be found
  out.
description:
  short_blurb: 'You run the team, you make the call, and underneath it all you carry
    a belief you''ve never said out loud: that you''re not really the person they
    think you are, and one honest sentence might give you away. This is a steady,
    compassionate look at the shame beneath stalled courage, and at the slow work
    of standing where you already stand.'
  long_description: 'There''s a sentence you never say out loud. Not in the meeting,
    not to your peers, not even fully to yourself. It runs underneath everything:
    that you don''t quite belong at this table, that the title is bigger than the
    person holding it, that if you spoke the whole truth in the room they''d finally
    see what you''ve spent years covering. So you don''t speak it. You manage the
    project flawlessly and stay quiet about yourself, and you call the silence professionalism,
    and some buried part of you keeps waiting to be found out.


    That part has a name. It''s shame — the oldest, quietest root of lost courage.
    Not guilt over something you did, but a low belief about who you are, and the
    exhausting work of making sure no one sees it.


    This book is for the seasoned manager who leads from behind a held breath. Who
    has the experience and the results and still feels like the understudy. Who overworks
    not from ambition but for cover — proving, endlessly, a worth they''re sure they
    lack. Whose courage doesn''t fail for want of nerve, but because speaking up means
    standing fully in a self they''ve half-believed is a fraud.


    You will come to recognize the shame for what it is — not a truth about your worth,
    but a story you absorbed somewhere and have been overpaying on ever since. You''ll
    see how it disguises itself as humility, as standards, as just being careful.
    How the hiding costs more than the exposure ever would. And how the courage that
    matters here isn''t the bold kind at all. It''s the slow, unglamorous willingness
    to stop performing the person you think they want and stand, plainly, in the one
    you already are.


    This is not a book about silencing the doubt or replacing it with confidence you
    don''t feel. There''s no fix offered for being human, no shortcut around a tender
    place. The voice that says you don''t belong may always speak. You''ll learn to
    lead without obeying it.


    What finally steadies you is not proof that you''re worthy — that case can''t
    be closed. It''s the deeper foundation: the recognition that a life isn''t measured
    by the gap between who you are and who you fear you''re not, and that the trees
    worth planting get planted by ordinary people who were never sure, standing where
    they stood anyway. From later in the climb, the fraud you were so afraid of being
    looks like what it always was — a frightened, decent person doing real work, hiding
    for no reason at all.


    You belong at the table. You''re allowed to stop proving it.


    Book 3 of the Second Mountain Press courage series.'
