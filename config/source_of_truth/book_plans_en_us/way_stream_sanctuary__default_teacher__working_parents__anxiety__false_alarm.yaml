title: 'The Alarm Is Lying: The False Alarm Response'
subtitle: A Real Talk Guide to Anxiety Relief for Working Parents
cover_tagline: Your body is screaming danger. There is no danger. Here's how to tell
  the difference.
description:
  short_blurb: Your heart is pounding, your hands are cold, and a voice is yelling
    that something is terribly wrong, except nothing is. This is a real talk guide
    for working parents whose body keeps pulling a fire alarm with no fire. It won't
    tell you to breathe and think positive. It'll teach you what your alarm actually
    is, and how to stop obeying it.
  long_description: 'It hits in the school parking lot, or mid-email, or at 2am for
    no reason you can name. The pounding chest. The cold hands. The certainty that
    something is wrong, that you forgot something, missed something, that disaster
    is one breath away. You scan your life for the threat. There isn''t one. The alarm
    is going off anyway.


    This is for the working parent whose body cries wolf. The one who''s been told
    it''s just stress, just hormones, just too much coffee, while the actual experience
    is your own nervous system convinced you''re about to die over a forgotten permission
    slip. You''re not dramatic. You''re not broken. You''re running an alarm system
    that can''t tell the difference between a saber-toothed tiger and a Tuesday.


    You''ll start by learning to name it: this is a false alarm. Not the words people
    say to dismiss you, but a real, specific recognition of what''s happening in your
    body, said in language you can reach for the next time it fires while you''re
    trying to make breakfast. Naming it won''t switch it off. This book won''t pretend
    a sentence cures a surge of adrenaline. What naming does is put a sliver of space
    between you and the panic, enough to stop you from pouring gasoline on it.


    Then you go down into it. Not fighting the sensation, not white-knuckling through
    it, but turning toward the alarm and letting it crest and fall the way it''s built
    to, without you adding a story about heart attacks or losing it in front of your
    kids. You''ll learn what the alarm is actually trying to protect, and why arguing
    with it only makes it louder.


    And you come back changed. Not alarm-free, that''s not a real promise and this
    book won''t make it. Changed in your relationship to the alarm: it can ring without
    you running. Your body can spike without you spiraling. The sensation stops being
    proof of catastrophe and becomes just weather, loud and uncomfortable and passing.


    This book will not optimize you, fix you, or hand you a morning routine that makes
    the panic obey. There''s no breathing trick buried here that ends it forever.
    What''s here is plainer and more useful: a way to live in a body that overreacts,
    without that body running your whole day. You can be the parent whose alarm goes
    off and who keeps making the sandwich anyway. The fire isn''t real. You''re allowed
    to stop running from it.'
