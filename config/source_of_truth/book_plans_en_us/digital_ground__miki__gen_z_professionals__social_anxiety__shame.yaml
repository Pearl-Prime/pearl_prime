title: The Thing You Think Is Wrong With You
subtitle: Why the awkwardness feels like proof of a defect — and what loosens when
  you stop hiding a flaw that was never there
cover_tagline: You're not bad at people. You just decided you were.
description:
  short_blurb: Somewhere along the way you concluded that the awkwardness wasn't a
    feeling — it was evidence. Proof of some flaw you have to cover, over-prepare
    around, apologize for in advance. This is a book about the quiet shame underneath
    social anxiety, and what loosens when you stop treating yourself as the problem.
  long_description: 'You replay it that night — the thing you said, the beat too long
    before you said it, the face you think someone made. By morning it has hardened
    into something larger than a moment. It''s become proof. Evidence of a flaw you''ve
    been managing your whole life: that you are, at some level you don''t say out
    loud, just bad at this. Bad at people. Wrong in a way everyone else got the manual
    for.


    This book is for you — the one who over-prepares for a coffee chat, drafts the
    Slack message four times, rehearses the casual hello, and still walks away certain
    you blew it. You''ve built an entire operating system around hiding a defect you''re
    sure you have. The exhausting part isn''t the anxiety. It''s the second thing
    underneath it: the belief that the anxiety means something is wrong with you,
    specifically, and that if anyone saw the real volume of effort it takes you to
    seem normal, they''d finally know.


    What you''ll come to recognize is that the shame is older than the situations
    it attaches to, and it''s lying. The thing you think is wrong with you isn''t
    a flaw — it''s a feeling that learned to disguise itself as a fact about your
    character. You''ll start to catch the move: the way a single awkward moment gets
    promoted into a verdict on your whole self. You''ll meet the part of you that
    has been overworking to cover a hole that was never actually there. And you''ll
    find the doorway out is not becoming someone else — it''s stopping the apology
    you''ve been making for existing as you are.


    This is not a confidence makeover. No scripts, no ''fake it till you make it,''
    no morning routine that turns you into the version of yourself you think people
    would prefer. Nothing here will optimize your personality or rebrand you as effortlessly
    social. We are not going to fix you, because the premise that you''re broken is
    the actual problem — and chasing the fix is how the shame keeps you.


    What this book offers instead is the slow, specific relief of recognizing the
    difference between having a hard feeling and being a bad person. A way to name
    the shame in the moment it tries to pass itself off as truth. Not so you can finally
    earn your place in the room. So you can stop auditioning for it.


    There is nothing wrong with you. There is something hurting in you. Those are
    not the same, and you''re allowed to learn the difference.


    Book 2 of the Present Tense Books social anxiety series.'
