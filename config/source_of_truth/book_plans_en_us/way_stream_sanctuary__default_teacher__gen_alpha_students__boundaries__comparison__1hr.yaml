title: 'Setting Boundaries: Beyond the Highlight Reel (1)'
subtitle: A Field Guide for Gen Alpha Students Navigating Boundaries
cover_tagline: Everyone else makes it look easy. That's the lie.
description:
  short_blurb: You keep saying yes because everyone else seems fine with it, and you
    don't want to be the one who can't keep up. This one-hour read names what comparison
    does to your limits and shows you how to draw a line in your own life instead
    of measuring it against the feed. No worksheets, no fixing yourself, just a clear
    hour.
  long_description: 'You''re scrolling between classes and everyone looks like they''ve
    got it handled. They post the late-night study sessions, the friend group that
    never has drama, the version of themselves that always says yes and never seems
    wrecked by it. So you say yes too. You join the thing, cover the shift for a friend,
    let someone copy off you, stay in the group chat that drains you flat, because
    backing out would mean you''re the one who can''t hang. You''d be the weak link,
    the dramatic one, the person who needs a break everyone else apparently doesn''t.
    So the limit you actually have stays invisible, and you keep paying for it. This
    book is for the student who keeps their boundaries blurry because everyone else''s
    look like they don''t exist.


    Here''s what comparison does that nobody warns you about: it makes you set your
    line based on a highlight reel that was never real to begin with. You stop asking
    whether you actually want to do the thing. You start asking whether saying no
    would make you look like less than the people around you. And those are completely
    different questions. One is about your actual capacity, the hours and energy you
    genuinely have. The other is a performance staged for an audience that''s too
    busy performing for you to even notice. You can feel the difference in your body.
    One leaves you spent but okay. The other leaves you spent and quietly resentful,
    wondering why you agreed to something you never wanted.


    This is the one-hour edition, the spine of the work in a single sitting, written
    under the pen name Jonah Kim. It moves in three turns. First the recognition,
    catching the exact moment your yes is really about not falling behind someone
    else, not about anything you want. Then the descent, going down into the part
    you''d rather scroll past, where you admit how much energy you burn tracking everyone
    else''s limits while ignoring the one screaming inside you. Then the climb back,
    leaving you with a line that''s yours because it fits your actual life, not because
    it matches the feed.


    This won''t optimize you. It will not turn you into someone who never feels the
    pull, and it won''t hand you a clean script for the perfect no or promise that
    one good boundary kills the FOMO. The pull is real and it is not going anywhere.
    What changes is that you stop letting it quietly decide where your line goes.


    Nobody else''s feed gets a vote on what you can carry. You''re allowed to draw
    the line somewhere different than the people you''re watching, and you don''t
    owe a single one of them an explanation for it.'
