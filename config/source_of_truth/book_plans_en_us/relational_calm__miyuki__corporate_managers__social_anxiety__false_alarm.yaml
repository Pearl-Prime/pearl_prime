title: The Room Is Safe and Your Body Doesn't Believe It
subtitle: For the manager whose alarm goes off in every meeting — bracing for a threat
  that, again, never comes
cover_tagline: Nothing in the room is wrong. Tell that to your chest.
description:
  short_blurb: You walk into a meeting you called, with people who report to you,
    and your body floods like you've stepped in front of a moving car. There is no
    car. This is a book about the alarm that fires in safe rooms — and what happens
    when you finally stop arguing with it.
  long_description: 'It starts before the door. A pulse in the throat. A heat behind
    the sternum. You haven''t said anything yet. No one has looked at you yet. But
    your body has already decided this room is dangerous, and it is getting you ready
    to survive something that is not going to happen.


    You know the room is safe. That is the strange part. These are your colleagues.
    This is a status update. And still the alarm goes off — in the one-on-one, in
    the all-hands, in the half-second before you unmute. You have spent years getting
    good at hiding it. The steady voice. The unhurried nod. Meanwhile, underneath,
    you are braced against a threat you cannot name.


    This book is for the manager whose nervous system keeps misreading the room. The
    one who leads other people calmly while a private siren runs the whole time. You
    are not broken, and you are not bad at your job. You are carrying an alarm system
    that was built for a different kind of danger and never got the message that this
    room — this ordinary, lit, climate-controlled room — is not it.


    Here you''ll come to recognize the false alarm for what it is. Not a verdict on
    your competence. Not proof that something is about to go wrong. Just an old signal,
    firing on a hair trigger, in a place with no fire. You''ll see what the bracing
    costs you, quietly, day after day. You''ll feel what it is like to stop fighting
    the alarm and simply let it ring while you stay in the room.


    This is not a confidence program. There is no script for the meeting, no posture
    to hold, no technique to deploy at the threshold. Nothing here will make the alarm
    stop on command, and nothing here asks you to perform a calm you don''t feel.
    The work is quieter than that, and it is the opposite of one more thing to manage.


    What''s offered instead is room. The steady voice and the bracing body, allowed
    to be in the same place at the same time, with no winner. The doorway you keep
    approaching, approached one more time — this time without the war.


    You can walk in still afraid and still be safe. Both of those are true. Let them
    be.


    Book 1 of the Bare Form Books social anxiety series.'
