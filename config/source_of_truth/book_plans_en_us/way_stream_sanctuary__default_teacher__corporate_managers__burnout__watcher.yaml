title: 'Burnout Recovery: The Witnessing Practice'
subtitle: How Corporate Managers Are Rewriting the Rules of Burnout
cover_tagline: You stopped working hours ago. Your manager-brain didn't get the memo.
description:
  short_blurb: Burnout doesn't end when you close the laptop — not when part of you
    is still scanning for the next fire at 11pm. This is a real-talk guide to the
    hypervigilant manager-mind that never stands down, and how to put space between
    you and the anxiety that runs the night shift.
  long_description: 'It''s late. The work is done, the team is offline, the house
    has gone quiet. And your mind is still at the office — replaying the Slack thread
    you didn''t love, rehearsing tomorrow''s hard conversation, sweeping the org for
    the problem that hasn''t happened yet. You are not on the clock. But the part
    of you that watches for trouble never punched out, and you''ve half-forgotten
    that switching it off was ever an option.


    Burnout doesn''t only drain you; sometimes it leaves a circuit jammed in the on
    position. You became the person everyone escalates to. You trained yourself to
    spot the fire before the smoke, and now that radar will not power down — not on
    vacation, not on a Sunday, not at two in the morning when it jolts you awake to
    re-litigate a meeting from Thursday. The vigilance is why you''re good at the
    job. It''s also why your shoulders haven''t dropped from around your ears in months,
    and why rest, when you get it, doesn''t feel like rest.


    The work here is to meet that watcher face to face. It''s a part of you that has
    stood guard so long it now mistakes constant scanning for safety — as if letting
    your attention rest for one hour would let the whole building burn. You won''t
    silence it; that never works, and a part this loyal doesn''t respond to being
    told to shut up. Instead you learn to catch it in the act. You notice the scanning
    while it''s happening. You feel, maybe for the first time in a while, the gap
    between the anxious narrator and the you who is listening to it. And you widen
    that gap until there''s actual room to stand.


    From inside that room, everything changes — not because the work got safer, but
    because you are no longer fused to the alarm. A worry arrives and you get to decide
    whether it''s worth acting on, instead of obeying it on reflex. The threat passes
    through you rather than taking up residence. You can read the situation clearly
    precisely because you''re not drowning in it.


    This book won''t promise you a calm mind on command, and it won''t sell you a
    meditation streak or a bedtime ritual that finally clicks the brain off. The watcher
    is loud, practiced, and well-meaning; freedom isn''t deleting it but ceasing to
    take its every order. What you walk away with is room — a deliberate gap between
    you and the dread, wide enough that the next 11pm thought is information you can
    weigh in the morning instead of an order you have to obey tonight.


    You are not the night shift. You''re allowed to leave the post unguarded for a
    few hours and trust that the building will still be standing when morning comes.'
