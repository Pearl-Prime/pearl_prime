title: The Part of You That Never Goes Off Duty
subtitle: For the woman whose mind is always scanning for the next threat — teaching
  a hypervigilant nervous system that it is finally allowed to rest
cover_tagline: You've been standing guard over a room that's been safe for years.
description:
  short_blurb: There's a part of you that never clocks out — scanning every face,
    every tone, every inbox for the threat that's surely coming. This is a book for
    the woman whose nervous system has been standing guard so long it forgot how to
    stand down. It won't tell you to just relax. It will help your body learn, slowly,
    that the danger has passed.
  long_description: 'There''s a part of you that never sits down. Even now, reading
    this, it''s working — scanning the room, reading the tone of that last message,
    checking your own face to make sure it''s doing the right thing, watching for
    the threat it''s certain is coming. It watches when you''re trying to sleep. It
    watches during the good moments, looking for the catch. It has been on duty so
    long that you''ve stopped noticing it''s there. You just call it being responsible.
    Being prepared. Being you.


    This book is for the woman whose nervous system never goes off duty. The hypervigilant
    one, the one who sees the problem before anyone else, who can''t be surprised
    because she''s already imagined every angle. It made you good at your job. It
    also means you have not fully exhaled in years. The watcher isn''t paranoia and
    it isn''t a flaw. It''s a guard that took its post during something hard and was
    never told the danger had passed.


    Here you''ll come to recognize hypervigilance as a body held in readiness — the
    eyes that dart, the breath kept shallow so you can hear what''s coming, the muscles
    braced for a threat that lives mostly in memory now. You''ll learn that you cannot
    order the watcher to stand down, because it doesn''t trust words; it trusts safety,
    felt in the body, proven slowly over time. And you''ll learn to offer it that
    — not by forcing relaxation, but by letting your nervous system gather the evidence
    that this room, this moment, is actually safe.


    This is not a book that will tell you to just relax. It will not hand you a technique
    to switch off your vigilance like a light, or shame the watching as something
    to eliminate. That part of you kept you safe; it does not deserve to be overridden.
    There is no protocol here for forcing the guard off its post. The watching doesn''t
    stop because you command it. It stops because, breath by grounded breath, your
    body finally believes the threat is gone.


    What you''ll find instead is the felt sense of a body allowed to rest. The shoulders
    that come down when no one''s looking. The scanning that slows. The almost foreign
    sensation of being off duty — present, unguarded, and, at last, safe enough to
    stop watching.


    You are allowed to put the watch down. You are allowed to be safe before you''ve
    checked every exit. Let your body be the one to tell you the danger has passed.


    Book 7 of the Felt Sense Publishing Anxiety series.'
