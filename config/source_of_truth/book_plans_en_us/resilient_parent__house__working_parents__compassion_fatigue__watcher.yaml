title: I Never Get to Clock Off
subtitle: For the parent whose mind never goes off duty — still scanning the next
  need, the next mood, the next thing about to go wrong, long after the house is asleep
cover_tagline: Everyone else got to put the day down. Your mind is still on shift.
description:
  short_blurb: Even after lights-out, part of you is still on watch — listening for
    a cough, bracing for tomorrow, tracking everyone's mood before they've said a
    word. This is for the working parent whose mind never clocks off, who reads the
    room for a living and at home too. It won't make you stop caring. It'll show you
    how to stand down for a few stolen minutes.
  long_description: 'The house is asleep. You should be too. But part of you is still
    on shift — ear half-cocked for a cough down the hall, mind already three moves
    into tomorrow morning, running the silent tally you never stop running: who''s
    off today, who didn''t eat, who needs the form signed, what''s about to go wrong
    before it does. You gave care all day at work and all evening at home, and now,
    in the dark, the most exhausting part of you still won''t go off duty. You can''t
    remember the last time your mind was simply allowed to be quiet.


    This book is for the working parent who lives as a watcher. The one who reads
    every room they walk into, anticipates every need before it''s spoken, scans every
    face for the first flicker of a problem — at work, with the kids, in the marriage,
    everywhere, all the time. It''s a kind of love. It''s also a kind of exhaustion
    that no one can see, because the work happens entirely inside your head, and it
    never, ever clocks off.


    Here you''ll come to recognize the watcher for what it is: not vigilance you chose,
    but a caregiving mind that learned it could never afford to relax, and forgot
    how to stop. You''ll see how the scanning works — how it hunts for threats that
    mostly never come, how it dresses itself up as ''just being responsible,'' how
    it keeps you on call long after everyone else has been allowed to put the day
    down. You''ll learn the difference between the watching that actually protects
    your kids and the watching that only wears you out. And in the few minutes that
    are honestly yours — the pause before you go inside, the still pocket after the
    house goes quiet — you''ll practice the thing the watcher swears is impossible:
    letting your guard down, just for a moment, and trusting that the world will hold
    without you monitoring it.


    This book will not switch the watching off like a light. It won''t optimize your
    vigilance into something efficient, or promise you''ll never scan a room again.
    The watcher came from love and it isn''t going anywhere overnight, and any book
    that says otherwise hasn''t sat where you''re sitting. There is no off-switch
    here. There''s something better: permission to stand down, a few minutes at a
    time, without it meaning you''ve stopped caring.


    You are allowed to take your mind off duty. Not forever — just for now, just for
    these few stolen minutes that no one is asking anything of. The watch will still
    be there. You don''t have to be the only one holding it every single second.


    Book 3 of the Stolen Moment Press compassion fatigue series.'
