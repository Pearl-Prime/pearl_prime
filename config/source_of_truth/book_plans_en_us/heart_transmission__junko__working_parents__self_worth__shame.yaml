title: Nobody Knows How Hard You're Trying
subtitle: For the working parent who performs being enough all day — and is sure that
  if anyone saw underneath the competence, they'd find the thing that's wrong
cover_tagline: You built the armor so young you forgot you were ever bare underneath
  it.
description:
  short_blurb: You get everything done and still go to bed certain you're falling
    short of some standard nobody will name. This is a book for the working parent
    who has spent years covering a quiet belief that something is wrong with them
    — and is so tired of holding the armor up. Set down here, gently, what you've
    been carrying alone.
  long_description: 'There''s a version of you the conference room sees, and a version
    the school pickup line sees, and they are both very good at their jobs. Composed.
    On top of it. The parent who remembered the form, the colleague who caught the
    error. And there''s the one who lies awake afterward, replaying the single thing
    you got wrong, sure that if anyone looked closely enough they''d finally see it
    — the flaw you''ve been overworking to cover since before you can remember.


    This book is for that one.


    You learned early that being enough was something you had to prove, again, every
    day, to everyone. So you put on the armor and you became excellent, and excellence
    bought you a kind of safety. But it never reached the place that''s cold. You
    can do everything right and still feel like a fraud waiting to be found out. You
    can be loved and not feel it land, because some part of you is certain the love
    is for the performance, not for the person sweating underneath it.


    We''ll sit with that quietly. We''ll notice the mask without tearing it off —
    you''ve been ashamed enough for one lifetime. You''ll come to recognize the buried
    belief underneath everything you do: that there is something defective in you
    that hard work conceals and rest exposes. You''ll feel where that belief lives
    in your body, in the bracing of your shoulders before a room, in the breath you
    don''t take. And slowly, in your own time, you''ll begin to suspect it was never
    true — that the defect was a story handed to a child who had no way to refuse
    it.


    This is not a book that will fix you, because you are not broken and there is
    nothing to fix. It will not optimize your self-worth or turn it into a practice
    you can fail at. It offers no finish line where you finally become enough, because
    the premise of the finish line is the lie. What it offers instead is closer and
    harder: a place to set the armor down and find that you are still here, still
    held, still worthy of the same warmth you pour out all day without keeping a drop.


    You were never the problem you''ve been working so hard to hide. You can stop
    hiding now, even just here, even just for the length of these pages. Let this
    be the room where you don''t have to impress anyone — least of all yourself.


    Book 1 of the Heart Transmission Press self worth series.'
