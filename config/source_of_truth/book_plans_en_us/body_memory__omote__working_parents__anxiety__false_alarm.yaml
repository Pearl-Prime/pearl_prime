title: The Body Sounds the Alarm Before You Do
subtitle: For the parent whose chest tightens before the day begins — when the danger
  has no name and the body braces anyway
cover_tagline: Nothing is wrong. So why won't your body believe it?
description:
  short_blurb: You wake already braced, scanning a quiet house for a threat that isn't
    there. This is a steady, plainspoken book for working parents whose alarm fires
    on a calm morning — and a gentle way to let the body learn, at last, that it is
    standing on solid ground.
  long_description: 'It starts before your eyes are fully open. The kids are still
    asleep, the house is quiet, nothing is actually wrong — and your chest is already
    tight, your jaw already set, your whole body braced for something you cannot name.
    By the time the lunchboxes are packed you have run a dozen disasters that never
    came. You tell everyone you''re fine. You almost believe it.


    This book is for the working parent who lives with a false alarm. Not the fear
    that follows a real emergency, but the one that fires on an ordinary Tuesday —
    the smoke detector going off when there is no fire, only toast. You are not broken
    and you are not overreacting. Your body is keeping an old promise: stay ready,
    so no one you love gets hurt while you are the one holding everything together.


    Here, gently, you''ll come to recognize how that promise lives in you. How the
    bracing became so constant you stopped noticing it. How the alarm hijacks an ordinary
    morning and convinces you the readiness is the only thing keeping everyone safe.
    You''ll feel where it sits in your shoulders, your stomach, your breath — and
    you''ll begin to let the ground take some of the weight you have been holding
    alone for so long. Not by forcing calm. By letting your body discover it was already
    standing on something solid.


    This is not a book that will teach you to silence the alarm or override it through
    sheer will. There is no morning routine here, no breathing trick to optimize,
    nothing to push through. What''s here is slower and kinder than that: a way to
    meet the alarm without obeying it, so the false signal can finally lose its grip
    and your body can remember, in its own time, what safe feels like.


    You don''t have to stay braced to be a good parent. The readiness was love, and
    it kept you upright when you needed it. But you are allowed to set some of it
    down now. The ground is still here. It was always here. It will hold you and them,
    even on the mornings you''re sure it won''t.


    You can stop bracing for the thing that isn''t coming. You''re allowed to feel
    the floor under your feet again.


    Book 1 of the Held Ground Press anxiety series.'
