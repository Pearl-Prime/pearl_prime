title: The Part of You That Never Stops Checking
subtitle: For the caregiver whose mind never quiets — reading every mood, counting
  every pill, bracing for the fall before it comes
cover_tagline: Even in the few minutes that are yours, you are still listening for
  the fall.
description:
  short_blurb: You read your mother's voice for the first sign of confusion. You watch
    your teenager's face across the dinner table. You lie awake doing the medication
    math one more time. This is a book for the parent whose mind never quiets — always
    scanning, always braced, always the one who has to catch it. It will not give
    you one more thing to check. It will help you find the part of you that is allowed
    to stop watching, even for a breath.
  long_description: 'You hear your father''s footsteps on the stairs and your whole
    body tenses for the sound of a fall that doesn''t come. You scan your mother''s
    face on the video call for the flicker of confusion you''re afraid to find. You
    watch your kid push food around their plate and run the quiet calculation: is
    this normal, or is this the thing I''m supposed to catch? Your mind never quiets.
    It is always scanning, always one step ahead of a disaster, because you have decided
    — without ever deciding — that if you stop watching, something will slip through,
    and it will be your fault.


    This book is for the Gen X parent in the middle, the one holding two generations
    in your peripheral vision at all times. You are the one who notices first. You
    hold the medications, the moods, the missed calls, the subtle changes only you
    would catch. And the watchfulness that started as love has quietly swallowed everything
    else — it follows you into the shower, into the dark, into the few minutes that
    were supposed to be yours.


    In these pages you will come to recognize the watcher in you: the part that scans
    for trouble that mostly never comes, that mistakes constant checking for keeping
    everyone safe, that cannot rest because rest feels like letting go of something
    you are not allowed to drop. You''ll see what the endless scanning has cost —
    your sleep, your attention, the ability to sit in a quiet moment without your
    mind reaching for the next thing to check. And you''ll begin to understand that
    being braced every hour is not the same as keeping anyone alive.


    This book will not hand you a cleverer way to keep watch, or promise you control
    over outcomes you were never holding in the first place. There is no watching
    hard enough to prevent everything, and you have been trying to anyway. What you
    can do is let the watching rest — for one breath, in the parked car, in the quiet
    after bedtime — and learn that the world does not end the moment you stop bracing
    for it.


    So let your shoulders drop. You are allowed to not be scanning right now. You
    are allowed a few minutes where nothing is yours to catch. The watchfulness carried
    you here; it does not get to keep you forever.


    Book 3 of the Stolen Moment Press compassion fatigue series.'
