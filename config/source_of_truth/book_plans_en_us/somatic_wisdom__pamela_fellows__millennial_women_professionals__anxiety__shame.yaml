title: The Defect You're Sure You're Hiding
subtitle: For the woman who overworks to cover a feeling that something is wrong with
  her — meeting the shame underneath the anxiety with the body's gentleness
cover_tagline: You've been outrunning a verdict that was never true.
description:
  short_blurb: 'Underneath the anxiety is a quieter, older belief: that something
    is wrong with you, and if you ever stop performing, they''ll all find out. This
    is a book for the woman who overworks to cover a defect that doesn''t exist. It
    won''t help you earn your way out of the shame. It will help your body learn it
    was never the truth.'
  long_description: 'There''s a feeling underneath the anxiety, and it''s older. It
    says: something is wrong with me. Not with my work, not with my day — with me.
    And so you cover it. You over-prepare, over-deliver, over-apologize. You become
    so competent, so useful, so impossible to fault, that no one will ever get close
    enough to see the thing you''re sure is there. The anxiety is loud. But the shame
    is the engine underneath it, running quietly, all the time.


    This book is for the woman who has been overworking to outrun a verdict. You don''t
    just want to do well — you need to, because somewhere you decided that being enough
    was something you had to prove, again and again, or be found out. The shame doesn''t
    announce itself. It hides inside your ambition, your perfectionism, your terror
    of being seen as you actually are. It feels like the truest thing about you. It
    is not.


    Here you''ll come to recognize shame as a felt sense in the body before it is
    a belief in the mind — the heat in the face, the collapse in the chest, the urge
    to disappear or to perform harder. You''ll learn that the defect you''ve been
    hiding is not a fact about you but a wound that learned to call itself a fact.
    And you''ll learn what shame has never been able to survive: being met. Not fixed,
    not argued with — met, with warmth, in the one place it lives, which is the body.


    This is not a book about building self-esteem by achieving more. It will not teach
    you to affirm your way out of shame or perform your way into worthiness — that''s
    the trap, not the exit. There is no protocol here for finally earning the okayness
    you were born with. The shame doesn''t lift because you prove it wrong. It lifts
    because, for once, you stop running from it and let your own body be kind to the
    place that hurts.


    What you''ll find instead is the felt sense of warmth returning to a braced and
    hidden place. The breath that softens the collapse in your chest. The slow, almost
    unbelievable discovery that you can be seen — fully, flawed, unperformed — and
    stay safe.


    You are allowed to stop hiding. You are allowed to be enough before you''ve proven
    anything. Let your body be the first to know it was never true.


    Book 4 of the Felt Sense Publishing Anxiety series.'
