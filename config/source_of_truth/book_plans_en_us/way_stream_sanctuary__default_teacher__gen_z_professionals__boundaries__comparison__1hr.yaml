title: 'The Line You Never Drew: The Comparison Trap'
subtitle: A One-Hour Boundaries Reset for Young Professionals
cover_tagline: The reason you say yes is that everyone else already did.
description:
  short_blurb: You don't have a boundaries problem. You have a scoreboard running
    in your head, and it keeps setting your limits for you. This is a one-hour look
    at how comparison quietly draws your lines so that you never have to.
  long_description: 'It''s 6:40 on a Thursday and the ask just landed in your inbox.
    You already know you''re going to say yes, because Maya stayed late twice this
    week and the new hire posted about "loving the grind" and somewhere underneath
    all of it is the math you didn''t agree to run: everyone else is doing more, so
    who are you to stop. That''s the moment this book is about — the half-second before
    the yes, when the decision has already been made by a scoreboard you never switched
    on.


    This is for young professionals — early-career, watched, comparing your behind-the-scenes
    to everyone''s highlight reel — who can''t figure out why your boundaries dissolve
    the second you look sideways. You set a limit on Sunday and abandon it by Tuesday,
    not because you''re weak, but because comparison drew the line for you and comparison
    can always move it. Someone else stays later, posts more, answers faster, and
    your limit quietly slides to match theirs.


    First you name it: the boundary you never actually chose. The one that got set
    by what your most-online coworker appears to tolerate, by the group chat, by the
    feeling that resting is something you have to out-earn. Then you go down into
    it instead of fixing it — into the specific dread of being the one who does less,
    the exposure of having a limit when no one else seems to, the small panic that
    says falling behind here is the same as failing. You don''t reframe it. You feel
    where it lives and why it''s been running your calendar. And then you come back
    able to tell the difference between a line you drew and a line the scoreboard
    drew for you.


    This will not hand you a five-step framework for "protecting your energy." There''s
    no script, no morning routine, no app. It will not promise that you''ll stop comparing
    — you won''t, not entirely, and a book that swore otherwise would be lying to
    you. What it gives you instead is the ability to catch the scoreboard in the act,
    in real time, the next time an ask lands and your hand moves toward yes before
    you''ve decided anything at all.


    A boundary you set by looking at other people was never yours. It belonged to
    the comparison the whole time. You get to find out what your actual limit is —
    the one that holds when no one''s watching and no one''s keeping score. You''re
    allowed to draw a line that has nothing to do with anyone else, and you''re allowed
    to draw it now.'
