title: Reading Every Room for a Hurt
subtitle: For the woman whose mind never quite settles — endlessly searching rooms,
  faces, and inboxes for a hurt that never comes, and a hand to help it finally rest
cover_tagline: You have kept watch your whole life. It is safe, now, to let it be
  held.
description:
  short_blurb: There is a part of you that never rests. It reads the room before you
    enter, searches every face for disapproval, rehearses tomorrow while you are trying
    to fall asleep. This book is a gentle hand laid over that tireless watcher, not
    to silence it, but to thank it, and finally let it rest.
  long_description: 'You walk into a room and, before you have said a word, you have
    already read it. Who is in a mood. Who went quiet. What that pause in the meeting
    meant. You replay your boss''s tone on the drive home. You search your phone for
    the text that confirms someone is upset with you. Even lying down at night, some
    part of you stays awake and watching — listening for the trouble that is surely
    coming, because it has always felt like yours to notice first.


    This is the watcher. And this book is for the woman who has carried one for as
    long as she can remember: the one others describe as perceptive, attuned, always
    three steps ahead, who has never once felt she could fully set her attention down.
    You are not paranoid and you are not controlling. Long ago, some part of you came
    to believe that staying alert was how you would keep yourself safe — and it has
    been faithfully, exhaustingly awake ever since.


    Here you will come to recognize the watcher as a presence rather than a flaw —
    to feel the constant low hum of scanning that you had mistaken for simply being
    you. You will see what it costs to read every room and inbox for a danger that
    almost never arrives. You will learn that this watchful part is not your enemy
    and not your master; it is a frightened child who was asked, far too young, to
    keep everyone safe, and was never told she could stop. And you will discover what
    becomes possible when you turn toward her — not with another instruction, but
    with warmth — and offer her, at last, somewhere to rest.


    This is not a book that will teach you to switch your awareness off or harden
    yourself against the world. There is no system here to manage your attention,
    no technique to finally control the uncontrollable. The watcher will still stir
    sometimes; that is her nature. What changes is that you stop mistaking her alarm
    for the truth, and you learn to keep her company instead of obeying her.


    You do not have to see every hurt coming to be safe. You do not have to keep watch
    to be loved. This watching has been yours for a very long time, and it has tired
    you in ways you rarely let yourself feel. It is allowed, now, to be set gently
    down — into hands that will hold it with you.


    Book 3 of the Heart Transmission Press overthinking series.'
