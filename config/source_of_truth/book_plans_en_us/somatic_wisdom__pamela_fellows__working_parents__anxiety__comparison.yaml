title: Everyone Else Seems to Have It Together
subtitle: For the working parent measuring against the calm ones — when every other
  family looks effortless and you're sure you're the one falling behind
cover_tagline: They make it look easy. You feel like the only one drowning.
description:
  short_blurb: At drop-off, in the group chat, on every scrolling feed, everyone else
    looks calm and capable — and you measure your frantic insides against their smooth
    outsides and always come up short. This is a body-first companion for the parent
    caught in the exhausting habit of comparison. It won't help you win the comparison.
    That's the point.
  long_description: 'It''s drop-off, and you watch the other parent — unhurried, coffee
    in hand, kid''s hair actually brushed — and something in you sinks. They have
    it figured out. You''re the one who forgot the show-and-tell thing, again, who
    yelled in the car, again, whose insides are a tangle of worry while everyone else
    seems to glide. You scroll at night and it''s worse: the calm homes, the easy
    marriages, the parents who clearly aren''t lying awake like this. You measure
    yourself against all of them, and you always, always come up short.


    This book is for the parent who lives behind that ruler. Who compares their churning
    interior to everyone else''s composed surface and reads the gap as proof of their
    own failure. Who feels behind — at parenting, at calm, at coping, at life. Who
    can''t enjoy a good moment because someone, somewhere, seems to be doing it better.
    The comparison feels like information. It isn''t. It''s a high-precision instrument
    pointed at the one target it can never measure fairly: yourself, from the inside,
    against people you only see from the outside. You are not behind. You are comparing
    your felt experience to a highlight reel, and the math was never going to work.


    Here you''ll come to recognize comparison''s grip in the body — the sink in the
    gut, the tightening, the particular small clench of measuring and losing. You''ll
    learn that you cannot win this game and you were never meant to play it. You''ll
    feel what it is to come off the ruler and back into your own skin: the breath
    that''s yours, the ground that''s yours, the life that is actually, only, yours
    to live. Not to become the calm parent at drop-off. To stop needing to.


    This is not a method for finally measuring up. There''s no leveling the playing
    field, no out-performing the other parents, no optimizing yourself into the lead.
    Nothing here will help you win the comparison — that''s the point. We will not
    feed the instrument better data. We will gently turn it off. Nothing in these
    pages promises you''ll stop noticing the gap on command; the point is that the
    gap stops being a verdict.


    You are allowed to be exactly where you are, unfavorably compared to no one. You
    are allowed to set the ruler down. The comparison will rise and the comparison
    will ease, the way weather passes, and you can learn to let it move through a
    body that is busy living its own life. You don''t have to win. You get to come
    home to yourself instead.


    Book 6 of the Felt Sense Publishing anxiety series.'
