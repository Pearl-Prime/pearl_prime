title: 'Social Anxiety: What Shame Does to You'
subtitle: How Working Parents Are Rewriting the Rules of Social Anxiety
cover_tagline: Social anxiety isn't really about people. It's about what you're sure
  they'll find if they look too closely.
description:
  short_blurb: 'Strip away the sweaty palms and the avoided rooms and you reach the
    real engine: a quiet certainty that there''s something wrong with you, and that
    being seen means being found out. This book goes for that root. For working parents
    who can handle anything except being truly looked at — a direct, secular reckoning
    with the shame underneath.'
  long_description: 'You can chair the meeting and manage the calendar and keep small
    humans alive, but put you in a room where you might be truly seen — judged, weighed,
    noticed — and something in you wants to bolt. Here''s the part nobody names: it''s
    usually not the people you fear. It''s the thing you''re convinced they''ll discover
    if they look too long. Under a lot of social anxiety sits shame — the buried belief
    that there''s something wrong with you, and that visibility equals exposure.


    This is for the working parent who is more than competent on paper and still carries
    a private verdict that the real them, the unedited one, isn''t acceptable. You
    hang back at the edge of the gathering. You let other parents lead so you won''t
    be examined. You''re warm and capable in every role you can perform and quietly
    terrified in the moments you''d just be yourself. You likely absorbed this belief
    long before you had children, and now it shapes how you show up — or don''t —
    in front of them.


    First you''ll learn to recognize shame by what it does in social space — the bracing,
    the pre-emptive apology, the urge to shrink or over-explain, the certainty of
    a judgment that isn''t actually being handed down. Then you go down into it. Not
    to argue it away with affirmations or talk yourself into self-esteem, but to finally
    face the old belief head-on and see how borrowed it is, how little it matches
    the actual parent and professional you''ve become. And then you come back able
    to be in the room, seen, without the ground giving way.


    Along the way you''ll test the belief against reality in small, survivable doses:
    staying a beat longer in the conversation you''d usually exit, letting yourself
    be looked at without filling the silence, offering an opinion you can''t back
    away from and watching the catastrophe you braced for fail to arrive. You learn
    the difference between being seen and being judged — that they are not the same
    event, even though your body has filed them under one folder for years — and the
    room slowly stops feeling like a courtroom you have to escape.


    This book will not promise you''ll banish the inner critic or arrive at unshakable
    self-love. There''s no shame-free, fully-confident version of you waiting at the
    end of the right routine. What it offers is the difference between a belief that
    runs you from the shadows and one you can see clearly — and what you can see clearly
    stops running your social life.


    Your children don''t need a parent who''s beaten every insecurity. They need one
    who isn''t governed by the secret that something''s wrong with them. You''re allowed
    to be seen, exactly as you are, in any room you walk into. You always were.'
