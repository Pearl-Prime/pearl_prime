title: 'The Alarm Is Lying: Living with What You''ve Lost'
subtitle: A One-Hour Anxiety Reset for Tech & Finance Professionals
cover_tagline: The version of your career you thought you'd have is gone, and no one
  let you mourn it.
description:
  short_blurb: The startup folded, the role got cut, the future you were building
    toward quietly disappeared — and you were expected to update your LinkedIn and
    move on. This is a one-hour reset for tech and finance professionals carrying
    a loss they never named. It gives you permission to grieve what's gone instead
    of optimizing past it.
  long_description: 'The company you gave four years to shut down. The promotion track
    dissolved in a reorg. The equity turned out to be paper. The version of your life
    that was supposed to be here by now just isn''t, and somewhere underneath the
    anxiety is something heavier you haven''t let yourself call by its name: grief.
    Not for a person. For a future. For the person you thought you''d already be.


    This is for the engineer whose startup died and who was told to spin it as a learning
    experience. The finance professional who got cut at forty and feels the floor
    gone from under a plan two decades in the making. Anyone who lost a role, a company,
    a market, a self-image — and got handed a severance packet and a deadline to be
    fine. You updated the title online the same week. You took the call, said the
    right things, started the search. And nobody, including you, stopped to admit
    that something you built your life around just ended.


    Here''s what tech and finance never make room for: loss that isn''t a death still
    has to be grieved, and a nervous system that isn''t allowed to grieve turns the
    grief into anxiety instead. So you spin. You overwork. You refresh your inbox.
    You job-hunt at 2am with your chest tight, because moving fast feels safer than
    sitting still with what''s actually gone. The restlessness isn''t a productivity
    problem and it isn''t a discipline problem. It''s mourning with nowhere to go.


    This book will not tell you it happened for a reason or that the next thing will
    be even better. It will not hand you a five-step pivot plan dressed up as healing.
    It will not promise the ache resolves on a schedule — grief doesn''t run on sprints,
    and it won''t hit your deadline. What it does is let you recognize the loss as
    a loss, go down into it instead of outrunning it, and come back able to carry
    what''s gone without it driving you.


    In about an hour you''ll have honest language for what you lost and what it''s
    been doing to you underneath the surface. Not a reframe that erases it. A way
    to hold it — to let it be real, to let it weigh what it weighs — so it stops leaking
    out as dread at three in the morning and pressure you can''t explain by day.


    Something you cared about ended, and you were never given a single minute to mourn
    it. Take the minute. You''re allowed to grieve a future and still be standing.
    Letting it hurt is not falling apart. It''s the part everyone skipped.'
