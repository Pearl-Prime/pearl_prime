title: 'Somatic Healing: The Overwhelm Response'
subtitle: A Field Guide for Entrepreneurs Navigating Somatic Healing
cover_tagline: Your body hit its limit three quarters ago. It's still keeping score.
description:
  short_blurb: For the founder whose body broke before their will did, the clenched
    jaw, the shallow breath, the gut that knew first. This is a field guide to the
    overwhelm that lives in your nervous system, not your calendar. No biohacking,
    no recovery protocol, just a way to listen to what the body's been trying to tell
    you.
  long_description: 'Your jaw is tight right now. You probably didn''t notice until
    I said it. Your shoulders are up near your ears, your breath is parked high and
    shallow in your chest, and your gut has been in a low-grade knot since roughly
    the last fundraise. While you''ve been managing the company, your body has been
    quietly keeping score, and the tally is overdue.


    This book is for the founder who has been running on a redlined nervous system
    for so long it started to feel normal. The overwhelm isn''t really in your inbox.
    It''s in your body, the place that absorbed every too-much moment you powered
    through, every crisis you handled by clenching and pushing on. You learned to
    override the signals because the company needed you to. The body kept sending
    them anyway. Now it''s louder than the work, and you can''t think your way past
    a system that''s stuck in the on position.


    The real talk is that you cannot out-discipline a dysregulated nervous system,
    and you cannot optimize your body out of a state your mind put it in. The tightness
    and the shallow breath and the wired exhaustion are not flaws to fix. They''re
    the overwhelm made physical, the cost of carrying too much for too long with no
    place to put it down.


    First you name it, you actually feel where the too-much is living right now, the
    jaw, the chest, the gut, instead of staying up in your head narrating it. Then
    you go down into the body and let it be there, not bracing against the sensation
    but letting the held thing finally register, because the body isn''t malfunctioning,
    it''s reporting. And then you let it begin to settle on its own time, which is
    not your time, and not your roadmap''s.


    This will not promise you a hacked nervous system or a recovery stack that makes
    you bulletproof. It will not hand you a cold-plunge protocol or sell you peak
    performance. There is no biohacking here and no version where the overwhelm becomes
    your competitive edge. What it offers is plainer: a way to hear what your body
    has been trying to tell you under all the noise, language for the moment your
    chest tightens and you realize you''ve been holding your breath, and permission
    to let the held thing go.


    You are allowed to listen to your body before it has to shout. You are allowed
    to set down what it''s been carrying, right here, and feel it start to let go.'
