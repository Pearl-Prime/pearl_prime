title: Did I Chart It
subtitle: For the nurse whose mind replays the shift on a loop at 3am — when one worry
  about a patient becomes a thousand and the night runs out before the questions do
cover_tagline: One thought about the shift. Then it never stops.
description:
  short_blurb: It starts with one question — did I chart it, did I miss something,
    is he okay. By 3am it's a thousand. This is for the nurse whose mind replays the
    shift on an endless loop in the dark, learning how to let the spiral come to rest
    on solid ground.
  long_description: 'It starts so small. One thought. Did I chart that last set of
    vitals. Did I catch the change in his color, or did I miss it. Did I hand off
    everything, did I say it right, is she still okay.


    And then it''s not one thought. It''s a thousand. Each answer breeds three more
    questions. The shift replays itself behind your eyes, every decision reopened,
    every maybe sharpened, the loop tightening and feeding on itself and pulling you
    further down the longer you lie there. It''s 3am. You have to be back at seven.
    And your mind is running the whole shift again, and again, and it will not let
    you off.


    This book is for the nurse whose mind will not stop circling in the dark. You
    are not careless and you are not crazy. The spiral runs because you care precisely,
    because the stakes were real, because a mind trained to catch the one thing that
    could go wrong does not set that vigilance down at the bedroom door. The looping
    isn''t a defect in you. It''s your diligence, with nowhere safe to land — still
    searching for the error, long after the floor has gone quiet.


    You''ll come to recognize the spiral for what it is — not truth, but a worn groove
    the mind slides down when it''s tired and unanchored. You''ll learn the difference
    between checking something once and circling it a hundred times. You''ll feel
    what it is to let a thought arrive and then come to rest, to let the loop touch
    ground instead of dropping endlessly through you. You''ll find that you don''t
    have to follow the spiral down or wrestle it to a stop. You only have to let it
    land on something solid.


    This is not a thought-control technique. There''s no protocol here for winning
    the argument with your own mind, no checklist that turns your rest into one more
    thing to get right. Nothing in these pages will help you think your way out. You
    already tried that. It''s 3am, and it didn''t work.


    So stop reaching for the bottom of the thought. There isn''t one. Let the spiral
    slow against ground that doesn''t give way. You don''t have to solve the shift
    again tonight. The floor is under you. Let the loop come down and rest there,
    and you with it.


    Book 3 of the Held Ground Press sleep anxiety series.'
