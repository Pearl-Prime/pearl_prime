title: 'The Alarm Is Lying: Measuring Yourself Against Everyone'
subtitle: A Real Talk Guide to Anxiety Relief for Managers
cover_tagline: The peer who got promoted isn't a verdict on you. Your nervous system
  just treats it like one.
description:
  short_blurb: You manage a team, but you can't stop ranking yourself against every
    other manager in the building. This is a direct, secular look at why the comparing
    mind runs hottest exactly when you're most responsible — and how to stop letting
    the scoreboard set your pulse.
  long_description: 'It happens in the leadership meeting. Someone else''s numbers
    go up on the screen, or your peer drops a phrase that sounds smarter than anything
    you said, and something in your chest tightens before you''ve even decided to
    care. By the time you''re back at your desk you''re not managing your team anymore
    — you''re managing a private scoreboard nobody else can see, and you''re losing
    on it.


    This book is for the manager who looks competent from the outside and runs a constant
    tally on the inside. You hit your targets and immediately measure them against
    the manager one rung up. You read a colleague''s calm as proof of your own panic.
    You scroll the org chart the way other people scroll their phones — looking for
    where you fall short.


    First, the recognition: the comparing mind isn''t ambition and it isn''t insight.
    It''s your alarm system grabbing the nearest yardstick and calling the gap an
    emergency. Naming that is the start. You''ll learn to catch the exact moment the
    measuring begins — the meeting, the message, the metric — and to say plainly what
    just happened in your body, in words you can actually use next time it fires.


    Then the descent. Instead of fixing the comparison by winning it or talking yourself
    out of it, you go down into what''s underneath: the belief that your worth is
    a ranking, and that falling behind means falling apart. You sit with the discomfort
    of being one manager among many instead of sprinting away from it. That''s where
    it loosens — not because you came out on top, but because you stopped needing
    the contest to settle whether you''re okay.


    Integration is quieter than the panic was. You start to feel the difference between
    information and threat — a peer''s win is data, not a sentence. You manage your
    people without auditioning against the manager next door. The scoreboard doesn''t
    vanish, but it stops running your pulse.


    This book will not turn you into the top performer. It won''t optimize your output,
    hand you a confidence routine, or promise the comparing thought never comes back.
    There''s no morning ritual here and no pretending the anxiety is a gift. What
    changes is your relationship to the measuring — you see it for what it is and
    you stop handing it the controls.


    You were never supposed to lead from inside a competition with everyone you work
    with. You''re allowed to put the yardstick down and still be good at this.'
