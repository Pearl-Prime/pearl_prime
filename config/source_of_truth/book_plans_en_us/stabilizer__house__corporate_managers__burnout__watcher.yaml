title: Still at the Helm After the Lights Go Out
subtitle: For the burned-out manager whose mind keeps steering long after the workday
  ends
cover_tagline: The threat you keep watching for rarely comes. The watching is what's
  burning you down.
description:
  short_blurb: You closed the laptop hours ago, but some part of you is still at the
    helm — checking, anticipating, bracing for the message that might land, the problem
    only you would catch. This is a steadying book for the manager whose mind never
    goes off duty. It won't tell you to try harder to relax. It will show you how
    the watcher finally stands down, and what it feels like to let someone else keep
    the watch.
  long_description: 'It''s late. The work is done, the team is offline, the apartment
    is quiet. And still, some part of you is standing at the helm in the dark, scanning
    the horizon for the thing that might go wrong. You refresh the inbox one more
    time. You replay the meeting, hunting for the misstep. You lie down and your mind
    keeps its hand on the wheel, running the list, bracing for the escalation that
    only you would catch in time. You are off the clock. You are not off duty. You
    haven''t been off duty in years.


    This book is for the manager whose mind never stops watching. Somewhere along
    the way you became the early-warning system for an entire team — the one who anticipates,
    who catches it before it lands, who sleeps with one eye on the channel. That vigilance
    made you good at this. It is also quietly burning you to the waterline, because
    a nervous system that never gets to stand down never gets to recover, and a sentry
    who never sleeps eventually stops being able to tell a real threat from a shadow.


    Here, we sit with the watcher instead of fighting it. You''ll come to recognize
    the hypervigilance for what it is — not a personality trait, not diligence, but
    an alarm that got stuck in the on position and forgot how to switch off. You''ll
    see the cost of being permanently braced: the rest that never restores, the presence
    you can''t quite give the people in the room, the way the scanning feeds itself
    until the watching becomes the only thing you know how to do. And slowly, you''ll
    learn what it feels like to let the watch be kept by something other than your
    own exhausted attention — to come off the helm and trust the harbor to hold while
    you finally close your eyes.


    This is not a book about discipline or relaxation techniques. It will not tell
    you to try harder to switch off, or hand you a breathing trick to force the alarm
    quiet. You cannot white-knuckle your way out of hypervigilance, and anyone who
    tells you to just stop worrying has never stood the watch you stand. There is
    no optimization here, no mental-toughness drill. There is only the slow, real
    work of teaching a body that''s been braced for years that it is, at last, allowed
    to come ashore.


    You are allowed to stand down. You are allowed to let the horizon be someone else''s
    to watch for one night, and to discover that the harbor held just fine while you
    slept.


    Book 3 of the Harbor Line Books burnout series.'
