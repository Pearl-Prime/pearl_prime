title: The Spreadsheet That Won't Close
subtitle: For the manager who balances everyone's numbers all day and can't make their
  own add up — when the money fear arrives all at once and there's no room left to
  think
cover_tagline: You can model a billion-dollar forecast. Tonight you can't make four
  figures feel safe.
description:
  short_blurb: You run the numbers for a living, so why does your own money feel like
    a flood you can't get ahead of? This is a book for the manager whose financial
    fear arrives all at once — every bill, every what-if, every year still to fund
    — until there's no room left to think. It won't hand you a system. It will give
    you back the room.
  long_description: 'It comes all at once. You''re fine, and then a single number
    on a statement pulls the floor out, and suddenly it''s the mortgage and the tuition
    and the aging parents and the retirement math and the quiet question of whether
    any of it is actually enough — all of it, in the same breath, at the same volume.
    You manage budgets that would make most people dizzy. You are calm in the room
    when the forecast misses. And then you sit at your own kitchen table at midnight,
    the screen lighting up your face, and you cannot make the panic hold still long
    enough to think.


    This book is for you — the one everyone trusts with the numbers, who has nobody
    to hand their own to. The manager who has confused being responsible for money
    with being safe from it. The capable person drowning quietly in a flood that has
    no single source, because the flood is the point: too much arriving at once, capacity
    exceeded, no shore in sight.


    We''ll go slowly, on purpose. You''ll come to recognize the moment the alarm trips
    and everything floods in at the same time — and why the very care that makes you
    good at your job turns on you in the dark. You''ll see what the overwhelm is actually
    costing you: the presence at dinner, the sleep, the years you''re spending bracing
    instead of living. You''ll learn what it feels like to put one thing down before
    you can pick anything up — to drain the flood by inches rather than damming it
    by force. And you''ll start to ask the question this whole series keeps returning
    to, the one your spreadsheet can''t answer: what does this actually cost you?


    This is not a budgeting book. It will not optimize your finances or hand you a
    system to white-knuckle your way to calm. There is no app here, no morning routine,
    no path to getting ahead of the wave for good. The flood is not a problem to be
    solved by working the problem harder — that''s the very habit that''s drowning
    you. What changes here is not your balance. It''s where you stand while you look
    at it.


    You are not failing. You are not behind. You have simply turned a careful, capable
    mind toward a question it was never built to settle: your own safety, measured
    in dollars, at one in the morning. You''re allowed to set the whole spreadsheet
    down and breathe before you ever touch a number again.


    Book 1 of the Second Mountain Press financial stress series.'
