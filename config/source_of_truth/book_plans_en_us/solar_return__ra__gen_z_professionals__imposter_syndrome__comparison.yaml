description:
  short_blurb: You open the app to kill thirty seconds and close it feeling further
    behind than when you started — the title someone just announced, the peer who
    answers like the fear never visits them. This is a book for the mind that turns
    everyone calmer-looking into proof you don't belong, and always finds itself a
    rung too low. It won't help you win the comparison. That's the point.
  long_description: 'You open the app to kill thirty seconds, and close it feeling
    further behind than when you started.


    Someone you graduated with just announced the role. Someone two years younger
    is on the panel. A coworker answered in the meeting like the answer was obvious,
    like the cold dread you carry has never once visited them. And by the time the
    phone goes face-down, a quiet verdict has already landed: everyone else got the
    manual, found the warmth, figured out the thing you keep missing — and you''re
    the one faking the part, ranked last in a race nobody else seems to know they''re
    running.


    This book is for that mind. The one wired to scan, to measure, to clock who''s
    ahead before you''ve even said hello. It''s for the early-career creative or knowledge
    worker who walks into every room already counting, and who is exhausted from a
    contest that never declares a winner because it was never built to.


    You''ll come to recognize the shape of it. The false alarm that reads someone
    else''s good news as a threat to your own standing. The overwhelm of a feed that
    floods you with a hundred finished lives at once. The spiral that takes one promotion
    post and runs it into a thousand reasons you''re behind. The shame underneath,
    certain the gap between you and them is proof of a defect only you can see. The
    grief for the years you''ll never get back from the measuring. And the watcher
    who never goes off duty, ranking you against every calmer face in the room, all
    day, on no one''s payroll.


    This is not a book that will help you win. It will not sharpen your standing or
    teach you to climb the ladder faster. It refuses, on purpose, to make you better
    at comparing — because the whole trap is that you''ve aimed something fast and
    sharp and beautiful in you at exactly the wrong target: your raw unedited insides,
    stacked against everyone else''s posted, lit, ten-second best. The calm you see
    in them is mostly the part they didn''t show you.


    You are allowed to stop keeping score. Not because you won. Because the warmth
    you''ve been chasing in everyone else''s life was banked in your own the whole
    time, waiting for you to look down instead of around.


    Book 2 of the Ember & Ash Publishing imposter syndrome series.'
