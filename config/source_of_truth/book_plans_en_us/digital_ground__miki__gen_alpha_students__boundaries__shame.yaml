title: It Makes Me Sound Difficult
subtitle: For when you've made yourself endlessly easy to be around because asking
  for anything feels like proof something's wrong with you
cover_tagline: You learned to be agreeable so no one would find the part you're hiding.
description:
  short_blurb: You'd rather sit through the whole thing than be the person who needs
    it to be different. Somewhere along the way you decided that having limits makes
    you cold, dramatic, difficult, and so you became endlessly easy instead. This
    is for the student carrying a quiet belief that wanting space is proof there's
    something wrong with them.
  long_description: 'You''ve gotten really good at being easy. Low-maintenance. Down
    for whatever. You read the room before you walk into it. You soften the text three
    times before you send it. You apologize for taking up space and then apologize
    for apologizing. And underneath all of it sits a belief you''ve never said out
    loud: that if you ever actually asked for what you needed — if you closed one
    door, said one real no — people would finally see the thing you''ve been covering
    for. That you''re difficult. Too much. Hard to love.


    This book is for you. Not the version you perform in the group chat. The one who
    learned, young, that a boundary made you the bad guy, so you stopped having them
    out loud and started managing everyone''s comfort instead. The shame isn''t loud.
    It''s the quiet engine under all the agreeableness — the reason ''no'' feels less
    like a sentence and more like a confession.


    Here you''ll come to recognize the belief for what it is: not a fact about you,
    but an old story you''ve been overworking to hide. You''ll feel where it lives
    in your body, the flush of being seen as the demanding one. You''ll start to tell
    the difference between being kind and disappearing. You''ll learn that the people
    who only liked the frictionless, always-yes version of you were never actually
    in the room with the whole of you — and that the ones who stay when you draw a
    line are the only ones who were ever really there. The door you''ve been afraid
    to close turns out to be yours. The threshold you flinch from — where do you draw
    the line — becomes a place you''re allowed to stand without being a worse person
    for it.


    This book will not coach you into ''confidence'' or hand you affirmations to repeat
    in the mirror. It won''t tell you your boundaries are your superpower, because
    that''s just the same pressure wearing a nicer outfit. It won''t optimize you
    into someone more palatable. There is no fix in here, because you were never broken
    — you were just convinced that needing anything was a defect to manage.


    Wanting space doesn''t make you difficult. It makes you a person with an inside.
    You''re allowed to have one. You''re allowed to let it show.


    Book 2 of the Present Tense Books boundaries series.'
