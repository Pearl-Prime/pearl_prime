title: Off the Clock, Still Carrying the Quarter
subtitle: For the burned-out executive whose mind keeps working the numbers long after
  hours
cover_tagline: Nothing is pressing on you anymore. You're still holding the weight.
description:
  short_blurb: You closed the laptop. You left the office. And your mind kept working
    anyway — replaying the meeting, rehearsing the conversation, scanning the team
    for the problem nobody's named yet. This is a book for the manager whose attention
    never eases, and who has forgotten what it feels like to set the watchfulness
    down and truly rest.
  long_description: 'There is a kind of tired that sleep does not touch. The day ends
    and you do not. The laptop closes and the mind keeps running — replaying the one-on-one
    that went sideways, drafting the email you will send at 6am, turning over the
    team in your head, searching for the resignation you can feel coming before anyone
    has said a word. You lie down and your attention stays braced, leaning into some
    pressure that has not arrived and may never. Everyone thinks you are calm because
    you look calm. They do not feel the part of you that has been holding its weight,
    without rest, for years.


    This book is for the manager who became the one who sees it coming. Somewhere
    along the way, catching problems early stopped being a skill and settled into
    your body as a permanent tension you cannot release. You read the team''s mood,
    the executive''s tone, the gap between what was said and what was meant. You are
    good at it — that is the trap. The watchfulness works often enough that you have
    mistaken it for the price of being responsible, when it has quietly become the
    thing wearing you down to the bedrock.


    What you will come to recognize here is that bracing is not foresight, and exhaustion
    is not the same as care. You will see how the scanning mind feeds on itself —
    how attention with no off-switch turns every quiet hour into a search for what
    is wrong, how a body kept under constant load forgets it was ever allowed to rest.
    You will learn the difference between watchfulness that protects and watchfulness
    that has simply forgotten how to ease. And slowly, you will feel what it has cost
    to carry a tension no one ever asked you to hold.


    This book will not teach you to scan smarter or worry more efficiently. The problem
    was never that your vigilance was poorly run. The problem is that it never lets
    up, and no method that keeps the pressure on will give your evenings back. There
    is no optimization here. There is only the slow, unfamiliar work of letting the
    load ease — of letting the quiet be quiet without you bracing against it, and
    trusting that the ground holds steady while you finally rest.


    You are not failing to relax. You taught yourself, year after year, to stay ready,
    because staying ready was how you kept everyone steady. That is not weakness.
    That is a weight you have carried so long you stopped feeling it as weight.


    You are allowed to set it down. The ground beneath you does not need you to hold
    it up.


    Book 3 of the Granite Ridge Publishing burnout series.'
