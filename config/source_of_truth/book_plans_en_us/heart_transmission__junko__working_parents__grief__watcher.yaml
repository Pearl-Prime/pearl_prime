title: Counting the Ones Still Here
subtitle: For the bereaved parent whose mind never goes off duty — checking the locks,
  listening for breathing in the dark, bracing for a loss that already came
cover_tagline: You stand in the doorway at 2am, counting the breaths, because once
  you learned the world can take someone overnight.
description:
  short_blurb: Since the loss, your mind never fully sits down. It checks the locks
    twice, listens at the children's doors, and reads catastrophe into every cough
    and quiet phone. This is a book for the grieving parent whose love turned into
    constant watching. It offers a gentle reminder that you cannot keep everyone safe
    by never resting, and that the vigilance, too, is grief.
  long_description: 'Since the loss, your mind never quite goes off duty. You stand
    in a doorway at 2am, watching for the rise and fall of a small chest, because
    somewhere along the way you learned that the world can take someone overnight
    and not warn you first. You check the locks twice. You read too much into a cough,
    a quiet phone, a text that takes too long to come back. You have become the watcher
    — the one who keeps an eye on the horizon for the next thing, so it can never
    blindside you the way the last thing did.


    This book is for you. For the bereaved mother or father whose love quietly rearranged
    itself into constant watching. For the parent who can''t fall asleep until everyone
    is accounted for, who runs the worst-case in their head while stirring the pasta,
    who confuses staying alert with keeping people alive. You are not paranoid. You
    are not too much. You are someone who was shown, once and unforgettably, that
    the unthinkable happens — and your heart decided it would never be caught unguarded
    again.


    You''ll come to recognize the disguise grief wears when it becomes vigilance.
    The hyperawareness that feels like devotion and drains you like a second, secret
    shift no one else can see. The bargain you''ve struck without noticing — that
    if you just watch closely enough, you can prevent the next loss. The way the scanning
    mind never delivers the safety it promises, only the next thing to scan. You''ll
    see how the watching keeps you from the very people you''re guarding, because
    a heart that is braced cannot also be fully present in the doorway, sharing the
    quiet, taking in the breath of a child who is, right now, alive and here.


    This is not a book about managing your fear into submission. There is no checklist
    here, no method for switching the watching off, no promise that the right routine
    will finally let you rest. It will not tell you that nothing bad will ever happen
    again — that was always a lie, and some part of you knows it, which is why the
    watching never stops. Vigilance is not a flaw to be corrected. It is grief that
    learned to face forward, love that braced itself against the door because it could
    not bear to lose again.


    What this offers instead is permission to set the watch down, even for a single
    breath. A voice that understands the terror underneath the hyperawareness and
    will not shame you for it. You cannot keep everyone safe by never resting. You
    were never the only thing standing between your children and the dark. And the
    love that learned to keep watch is allowed to soften again into something gentler
    — a hand resting on a sleeping back, a breath shared in a quiet room, presence
    in place of bracing.


    Count the ones still here, yes. And then, gently, let yourself be one of them.


    Book 2 of the Heart Transmission Press grief series.'
