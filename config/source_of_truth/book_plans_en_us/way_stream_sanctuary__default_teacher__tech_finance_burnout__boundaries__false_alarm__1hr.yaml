cover_tagline: Your body thinks the Slack ping is a tiger.
description:
  short_blurb: The notification lands and your heart is already pounding before you've
    read it. This is a one-hour reset for tech and finance professionals whose nervous
    system treats every message, every market move, every deadline like a threat to
    survival. It won't teach you to manage stress. It will teach you to tell a false
    alarm from a real one.
  long_description: 'It''s 9:47 on a Tuesday and your phone buzzes. You haven''t even
    read it yet, but your heart rate is already up, your jaw is already tight, your
    shoulders have climbed toward your ears, and your whole body has decided something
    is wrong. It''s a message from your manager. It says "got a sec?" That''s it.
    Three words. And you spend the next four minutes braced like you''re about to
    be fired — rehearsing, defending, scanning the last week for what you missed —
    until you find out it was a question about a calendar invite.


    This is for the people who live inside the alert: the on-call engineer sleeping
    next to a pager, the trader watching the tape, the analyst whose phone is wired
    straight into their cortisol. Your work taught your body that any signal could
    be the emergency — the outage, the margin call, the 11pm escalation, the all-caps
    subject line. So now it treats all of them as the emergency, all the time, with
    no setting in between. The alarm fires whether or not there''s a fire. You''ve
    lost the ability to tell the two apart, and you are worn down to the bone by a
    body that never once gets the all-clear, that stays braced through dinner, through
    the weekend, through the moments that were supposed to be off.


    Waystream doesn''t do positive thinking. In one hour you''ll learn to recognize
    the false alarm as a physical event — the exact spike that hits before your mind
    has even decided there''s a problem — and name it for what it is: an old alarm,
    not new danger. Then you go down into it rather than overriding it. You don''t
    breathe it away, hack your vagus nerve, or talk yourself out of it. You meet the
    part of you that learned, somewhere back there, that staying braced was the only
    thing keeping you safe — that vigilance was the job. And you come back able to
    ask one question you could never reach before, in the half-second the alarm goes
    off: is this an actual threat, or is this just the alarm?


    This book will not regulate your nervous system in a weekend, hand you a four-step
    breathing protocol, or pretend the pings stop coming. The deadlines are real.
    The escalations are real. Some messages genuinely are the emergency. What changes
    is that your body stops treating every Slack notification like a predator in the
    grass — that you can feel the surge rise and know, in the moment it happens, that
    you are not actually in danger right now.


    You are allowed to come off high alert. You are allowed to let your body learn,
    slowly, that most signals are not the emergency.'
