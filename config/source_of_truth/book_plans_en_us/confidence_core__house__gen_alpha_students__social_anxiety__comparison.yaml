title: They Cross the Doorway Like It's Nothing
subtitle: For the student frozen at the entrance while classmates walk in without
  a second thought
cover_tagline: They look calm walking in. You don't know what it costs them.
description:
  short_blurb: Everyone else seems to walk into the room like it's nothing, while
    you're doing math on how much you're falling behind socially. This is for the
    student who measures themselves against every easy, confident face — and never
    wins.
  long_description: 'They just walk in. They drop into a seat, say the thing, laugh
    at the right moment, and it costs them nothing — or so it looks from where you''re
    standing, frozen in the doorway, doing quiet math on how far behind you are.


    This book is for you: the student who measures yourself against everyone who looks
    effortlessly fine. Who scrolls through people your age who seem to have friends,
    confidence, and ease figured out, and feels the gap widen with every post. Who
    treats other people''s calm as a scoreboard you''re losing on. You''re not shallow
    for this, and you''re not the only one. You''ve just aimed a sharp, observant
    mind at the worst possible target: yourself, next to everyone else.


    It''s exhausting work, even though no one assigned it. You clock who got invited
    and who didn''t. You notice whose joke landed and whose didn''t, who looked comfortable
    and who stood a little apart, and you file yourself in the losing column every
    time. The scoring never stops, and it never leaves you feeling better — only further
    behind, only more certain that everyone else got a manual you never received.
    But the scoreboard was never measuring what you thought it was.


    Here you''ll come to recognize how comparison actually works — how it feeds on
    the outsides of people while ignoring their insides, how it counts every win that
    isn''t yours and none of the fear behind the faces you envy. You''ll see the difference
    between the person someone performs in public and the one they are walking home.
    You''ll notice how often you compare your loudest doubts to other people''s quietest
    highlight reels, and how rigged that contest has always been. Not so you can finally
    win it. So you can put it down.


    This book will not promise to make you the most confident one in the room. It
    won''t teach you to out-perform the people you envy or hand you a five-step plan
    to catch up. There''s no fix here, no leveling-up, no version of you that has
    to overtake everyone else before you''re allowed to feel okay. Nothing in these
    pages will help you win the comparison — and that''s the whole point. The contest
    was never real. You were never behind.


    You are allowed to stop scoring yourself against strangers. You are allowed to
    walk into the room as yourself, at your own pace, with no idea how you measure
    up — and be completely fine. The other side of the doorway was never a finish
    line. It was just the next room.


    Book 3 of the Threshold Books social anxiety series.'
