title: 'Overcoming Depression: After the Loss (1)'
subtitle: How Healthcare Rns Are Rewriting the Rules of Depression
cover_tagline: You stopped feeling it on purpose. Now it won't come back.
description:
  short_blurb: You learned to set the heaviness down to get through the shift — and
    somewhere along the way you set down everything else too. This is a book for nurses
    about the flat, grey weight that has no name and won't lift on command. It doesn't
    ask you to fix it. It asks you to stop pretending it isn't there.
  long_description: 'You clock out, you walk to your car, and you sit there in the
    lot with the engine off because you can''t remember why you were going home. The
    shift is over. The flat feeling isn''t. You used to call it tired. Tired goes
    away after sleep. This doesn''t.


    This book is for the nurse who has gotten very good at not feeling things during
    a code, during a family conversation, during the bad ones — and who is starting
    to notice that the off-switch is stuck. You set the heaviness down to keep working.
    You did it so well, so many times, that you set down the rest of you along with
    it. Now the colors are gone and you can''t find the dial that turns them back
    on.


    Oscar Bello, a hospital chaplain who has spent years sitting with depleted nurses,
    writes this without promising you''ll be overcoming depression by Tuesday. He
    works in three honest moves. First, recognition: naming the specific weight you''ve
    been calling burnout, exhaustion, or just-a-rough-stretch — because it is grief,
    and it has been accumulating one patient at a time. Second, descent: going down
    into it instead of managing it, instead of scheduling it around your next four-on.
    You will not be asked to journal it away or find the silver lining in a child
    who didn''t make it. Third, integration: coming back up able to feel the shift
    again — not lighter, exactly, but no longer numb to your own life.


    This book will not give you a morning routine. It will not tell you to be grateful
    you have a calling. It will not promise that the heaviness lifts if you breathe
    correctly, hydrate, or think positive on your commute. Depression in nurses is
    not a willpower problem and this book refuses to treat it like one. There is no
    optimization here, no protocol to run on yourself the way you run them on everyone
    else.


    What it offers instead is plain language for what is actually happening in your
    body and your days, language you can use the next time the lot goes quiet and
    the engine stays off. You learned to go numb to survive the work. You are allowed
    to come back. You are allowed to feel the weight you''ve been carrying without
    a name — and you are allowed to put some of it down on purpose, the way you should
    have been able to all along.'
