title: A Body That Never Drops Anchor
subtitle: For the manager whose nervous system stays braced at the rail even in calm
  water
cover_tagline: You can stand down now. There's no one at the door.
description:
  short_blurb: Some part of you has been on the bridge for years, scanning the horizon
    for the next escalation, the next dropped ball, the disaster that keeps not coming.
    This is for the manager whose body never quite trusts the all-clear — a steadying
    way to let the watch finally end. It won't sharpen your vigilance. It will help
    you set it down.
  long_description: 'Long after the office goes dark, some part of you is still on
    the bridge. Still scanning. You read the room before you enter it, hear the second
    meaning under what your VP didn''t say, catch the problem three weeks before it
    lands. It has made you good at your job. It is also why you can''t feel your own
    feet on the floor, why your eyes flick to your phone before it lights up, why
    even in a quiet house you are listening for something that isn''t there.


    This book is for the manager who lives at the top of the mast — the one whose
    nervous system has been standing watch for so long it forgot it was ever allowed
    to come down. The threats you scan for are real enough at work: the reorg whisper,
    the slipping deadline, the quiet quitter on the team. But your body has stopped
    distinguishing the meeting from the bedroom. It keeps watch in both. The horizon
    is empty and you are still searching it.


    You''ll come to recognize the watcher for what it is — not a character flaw, not
    even a habit of thought, but a body braced in a posture it can no longer release
    on its own. You''ll feel where the vigilance lives: the held breath, the eyes
    that never soften, the shoulders cocked like you''re about to be called on. And
    you''ll learn, without forcing it, how to signal to that exhausted lookout that
    the watch can end. How to come down off the mast and stand on the deck. How to
    let the scanning mind discover, slowly, that the ground is holding and nothing
    is coming over the rail.


    This will not make you more vigilant or teach you to monitor your own calm. It
    will not turn your nervous system into one more dashboard to check. There is no
    threat-assessment to ace here, no hyperawareness to perfect. The whole point is
    to stop watching for a change.


    What it offers is a harbor and a horizon that holds still. Water inside the breakwater
    that doesn''t have to be guarded. The lookout climbs down. The boat sits at anchor,
    and for once you are simply in it, not braced against the next wave you swore
    you saw coming.


    You are allowed to stop searching the water. You are allowed to let your eyes
    rest on something near and let your body believe the all-clear. The watch can
    end. You can come ashore.


    Book 2 of the Harbor Line Books somatic healing series.'
