title: The Good One Doesn't Need Anything
subtitle: For the woman who learned that having needs makes her difficult — and has
  been quietly overgiving to prove she's easy to love
cover_tagline: You decided long ago that needing things was the thing to hide.
description:
  short_blurb: Somewhere along the way you came to believe that a boundary is just
    a need wearing a coat — and that needs are what make a person hard to love. So
    you became the easy one, the low-maintenance one, the one who never asks. This
    is a book about the buried belief underneath all that overgiving, and what it
    costs to keep proving you don't need a thing.
  long_description: 'You don''t think of it as shame. You think of it as being considerate.
    Being the easy one. The friend who never makes it weird, the colleague who absorbs
    the extra, the daughter who doesn''t add to anyone''s plate. But underneath the
    considerateness is a quieter belief you''ve carried so long it feels like personality:
    that having a need is a flaw, that asking is a burden, that a boundary is just
    selfishness with better branding — and that if people saw how much you actually
    wanted, they''d love you less.


    This book is for the millennial woman who overgives in every relationship to cover
    a defect she''s sure is hers. You set no limits not because you have none, but
    because protecting them would mean admitting you matter enough to protect — and
    some old voice says you don''t. So you give and give, and call the resentment
    that builds up ''just being tired.''


    You''ll come to recognize how shame runs the whole thing from underneath. How
    ''I don''t want to be difficult'' is the thing you say right before you abandon
    yourself. How the apology arrives before the request, softening it into nothing.
    How being needed feels safe and having needs feels dangerous — and how that single
    asymmetry has quietly organized your whole life.


    We''ll sit with the belief itself, the buried one: that something about you is
    too much, and that the job of every relationship is to keep it hidden. Not to
    argue you out of it with affirmations, but to look at it plainly, in good light,
    across the table — which is the one place shame has never been able to survive.


    This book will not tell you to ''value yourself'' and call it solved. It won''t
    promise that the old voice goes silent, or hand you a confidence that erases the
    years you spent believing you were the problem. It will not turn your relationships
    into ledgers of what you''re owed. There is no fixing you here, because you were
    never the thing that needed fixing.


    What it offers is a chair that was always meant for you, and a way to say ''this
    is what I need'' across the table without first apologizing for the fact that
    you breathe. The good one was allowed to need things all along.


    Book 2 of the Two Chairs Press boundaries series.'
