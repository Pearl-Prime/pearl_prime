title: 'Social Anxiety: The False Alarm Response'
subtitle: A One-Hour Social Anxiety Reset for Working Parents
cover_tagline: It's just other people being normal. Your body is bracing like it's
  a tightrope.
description:
  short_blurb: The class group chat pings about drinks and your stomach drops before
    you've even read it. This one-hour reset for working parents shows you that the
    dread before a school-gate hello or a work mixer is a false alarm — sensation,
    not warning — and teaches you to feel it crash through and walk in anyway. The
    room was never the threat your body insists it is.
  long_description: 'The class WhatsApp pings and someone''s organizing drinks, and
    your stomach drops before you''ve even read it. Or there''s a work mixer on the
    calendar, or another parent waves you over at pickup, and your body reacts like
    you''ve been asked to walk a tightrope — racing heart, dry mouth, the sudden urgent
    need to be anywhere else. Nothing dangerous is happening. It''s just other people,
    being normal, and you are bracing like it''s a threat.


    Here the social anxiety isn''t really in your thoughts — it''s in your body, and
    the dread arrives before the reasoning does. You can know, intellectually, that
    the parent group is friendly and the colleagues are fine, and your nervous system
    sounds the alarm anyway, because to the oldest part of your brain a room full
    of people who might judge you reads as genuine danger. That''s the false alarm:
    a body braced for a threat that isn''t there.


    Calm down, breathe through it, rationalize the fear away — you''ve tried talking
    yourself down mid-spike and felt how little it does, so this book doesn''t ask
    you to. We go straight into the alarm and show you what it actually is: sensation,
    not warning. Down into the real moments — the held breath before you open the
    front door at the party, the hot face when someone turns to you in a group, the
    way your mind goes blank exactly when you need words — and we stay there, in language
    you can reach for the next time it hits, until the alarm stops dictating whether
    you show up.


    What you''ll learn is not how to make the fear stop. It''s how to feel it crash
    through you and walk in anyway — to let your heart slam and still say hello, still
    stay for one more drink, still stand in the playground crowd without bolting.
    The alarm and the avoidance come unhooked from each other.


    Ease in a crowd isn''t the promise, and neither is a body that stays quiet at
    social things, an end to the pre-event dread, or a sudden love of parties. You
    are a stretched-thin parent, not a personality to be fixed. The usable thing here
    is the half-second between the alarm going off and you backing out — long enough
    to choose to stay while the fear is still loud.


    The room was never the threat your body insists it is. You''re allowed to feel
    the alarm and walk in anyway.'
