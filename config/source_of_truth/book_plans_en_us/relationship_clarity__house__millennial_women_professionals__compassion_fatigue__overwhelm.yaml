title: The Day Everyone Needs You at Once
subtitle: For the woman who cares for a living and has nothing left to pour — when
  every person at the table is reaching for you and there is no more room
cover_tagline: You can love them all and still have nothing left to give today.
description:
  short_blurb: 'There is a particular kind of tired that no weekend fixes: the tired
    of being the one everyone reaches for. This is the book for the day when the messages,
    the meetings, the people you love, and the people you are paid to help all arrive
    at the same moment and your cup is already empty. It will not hand you a better
    system for giving more. It will pull up a chair and help you understand why there
    is no room left, and what it means to finally make some.'
  long_description: 'It is the kind of day where everyone needs you at once. The patient,
    the client, the kid, the team, the text that just lit up your phone again. You
    answered the first ten. You meant to get to the rest. And somewhere around the
    middle of the afternoon you stopped feeling anything at all — not because you
    stopped caring, but because the caring had nowhere left to go.


    This book is for you: the nurse, the therapist, the teacher, the manager, the
    one your family calls first. The woman who is good at holding everyone, and who
    has quietly run out of room. You are not too sensitive and you are not failing
    at your job. Your cup is empty because you have been pouring from it without anyone
    pouring back, and the flood of need does not pause to let you refill.


    Pull up a chair. We are going to sit with the overwhelm of compassion fatigue
    the way you would sit across a table from a friend who finally admitted she is
    drowning. We will name what actually happens when too much arrives at once — the
    numbness that feels like indifference, the snap of irritation at the people you
    love most, the dread of one more person needing one more thing. We will look honestly
    at why you keep saying yes, and what the yes is costing the part of you that needed
    someone to ask how you are doing.


    Nothing here will teach you to absorb more. There is no schedule that makes an
    empty cup full, no technique that lets you give from nothing. This is not a manual
    for becoming a more efficient caregiver. It is a conversation about the difference
    between a heart that is closed and a heart that is simply, honestly, out — and
    about what it looks like to set the cup down before it cracks, and to let someone
    sit across from you and tend to you for a change.


    You are allowed to not have enough today. You are allowed to be a person at the
    table and not only the one who serves it. The people who love you would rather
    have you here and human than everywhere and empty. Take the seat. This one is
    yours.


    Book 1 of the Two Chairs Press compassion fatigue series.'
