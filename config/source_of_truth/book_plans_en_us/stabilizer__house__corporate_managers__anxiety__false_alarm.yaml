title: The Alarm That Won't Stand Down
subtitle: For the manager bracing for a hit that never lands — when your body sounds
  the alert in a room where nothing is actually wrong
cover_tagline: Your body is braced for a wave. The harbor is calm. Both can be true.
description:
  short_blurb: You walk into a status meeting and your chest tightens like the building
    is on fire. Nothing is wrong, and your body refuses to believe it. This is the
    book for the leader whose alarm system keeps firing on a clear day — and who is
    tired of bracing for impact that never comes.
  long_description: 'It starts before anything happens. The calendar invite lands,
    or your name shows up on a thread, or a Slack notification lights up after hours
    — and your whole body braces, as if a wave is about to take the boat. Your heart
    goes first. Your jaw. The tight band across your chest. You scan the message twice
    for the bad news, and there isn''t any. There''s almost never any. And still the
    alarm won''t stand down.


    This book is for the manager whose nervous system treats a Tuesday like a threat.
    You''re not fragile — you''re responsible, and your body has decided that everything
    is your job to catch before it hits the team. So it keeps you braced at the rail,
    leaning into a swell that isn''t coming. It floods you for a meeting that turns
    out fine, for an email that was nothing, for a quiet that it can''t quite trust.
    You''ve learned to lead while bracing, to look composed while every system inside
    you is screaming weather that isn''t there.


    Here you''ll come to recognize the alarm for what it is — not a warning you have
    to obey, not proof that danger is coming, but a smoke detector that''s gotten
    too sensitive and goes off when you make toast. You''ll see how the false alarm
    fires in the body before the mind ever gets a vote. You''ll learn the difference
    between a real squall and a phantom one, and what it feels like when the boat
    stops pitching even though nothing about your job got easier. The harbor was never
    the absence of storms. It''s the breakwater that lets you stop bracing for every
    one.


    This is not a method for shutting the alarm off. You can''t argue a smoke detector
    into silence, and this book won''t pretend you can optimize your way to a flat
    line. There''s no protocol to perfect, no morning routine that makes you immune,
    no version of you that finally has it all handled. What there is, instead, is
    a way to let the alarm sound without fighting it — to feel the surge rise and
    not be swept off your feet by it. To stand on ground that holds while the alert
    runs its course and passes, the way weather does.


    You are allowed to be a steady leader and a person whose body still over-warns.
    You don''t have to earn calm by never feeling the alarm again. You only have to
    learn that you can be flooded and still on your feet, braced and still safe, alert
    and still home in the harbor.


    Book 1 of the Harbor Line Books anxiety series.'
