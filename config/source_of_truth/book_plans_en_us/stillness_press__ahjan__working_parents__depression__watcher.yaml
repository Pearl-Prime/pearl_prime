title: Still Scanning at Midnight
subtitle: For the parent who lies awake listening for the cough, the late text, the
  next thing about to go wrong — when years of never letting your guard down have
  hollowed out into grey
cover_tagline: You can keep everyone safe and still disappear inside it.
description:
  short_blurb: Some depression is what's left after years of never being able to switch
    off. When a parent's mind is always scanning — for the cough, the late text, the
    thing about to go wrong — that endless vigilance eventually hollows out into a
    grey, depleted flatness. This book is for the watcher who keeps everyone safe
    and is quietly vanishing inside the watching.
  long_description: 'The house is quiet. Everyone is breathing. And still, at midnight,
    your mind is awake and listening — for the cough that means a fever, the thing
    your kid said that you keep turning over, the budget, the next small thing in
    the dark that could go wrong. You''ve been listening like this so long you don''t
    remember how to let your attention rest. Even sleep feels like a risk you can''t
    quite afford. So you keep listening, and somewhere underneath all that watchfulness,
    the light in you goes dim.


    This book is for the parent whose mind never quite settles. The one who became
    the person who notices first and never got to hand it over — the one who anticipates
    everything, holds every contingency, keeps one ear open through the whole night,
    and pays for it with a flatness that has no off switch. What looks like depression
    here is often the long cost of staying braced: an attention that has been held
    tight against the dark for so many years that, eventually, it simply goes grey.
    You cannot stay this watchful forever. When you finally can''t hold the watching
    anymore, it doesn''t hand you peace. It hands you the flat grey hum.


    In these pages you''ll come to recognize how the watching became your resting
    state, and why the part of you that listens for danger genuinely believes the
    family will come apart the moment you close your eyes. You''ll see how vigilance
    and depression are not opposites but a sequence — how the same attentiveness that
    kept everyone safe is the attentiveness now wearing you thin. And you''ll find
    what it might mean to set the listening down for the length of one hour, and discover
    that the thing you were braced against does not, in fact, arrive the second you
    stop bracing.


    This book will not hand you a calming routine to perfect or tell you to simply
    trust that everything will be fine. It will not optimize your sleep or shame your
    worry. It will not turn letting go into one more discipline you have to master.
    There is no program here, because the watchful part of you does not need another
    task — it needs to be told, gently and truthfully, that it is allowed to rest.


    Nothing here will promise you that nothing bad will ever happen. That''s the point.
    But you were never meant to be the only thing standing between your family and
    the dark. You''re allowed to set the watching down for an hour and find that the
    lamp stays lit without you holding it.


    Book 3 of the Stillness Press depression series.'
