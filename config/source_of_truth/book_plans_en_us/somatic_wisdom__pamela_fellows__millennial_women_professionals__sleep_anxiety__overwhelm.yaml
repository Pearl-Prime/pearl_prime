title: Everything Arrives the Moment I Lie Down
subtitle: For the woman who holds the whole day together until bedtime, when it all
  floods in at once — a body-first way to make room to rest
cover_tagline: All day you had nowhere to feel it. So your body saved it all for the
  dark.
description:
  short_blurb: You kept it together all day, and the second your body went still the
    whole flood arrived — every task, every worry, every feeling you had no room for.
    This is for the woman who is drowning at bedtime, and it offers a slower, somatic
    way to let the day move through you so there is finally space to sleep.
  long_description: 'You made it through the day. You answered everything, carried
    everyone, kept the surface calm. And then you got into bed, your body finally
    went still — and all of it arrived at once. The unsent message. Tomorrow''s deadline.
    The thing you said in the meeting. A wave of feeling with no name and nowhere
    to go, crashing in the moment there was finally quiet enough to feel it. There
    is no room left in you to think, let alone sleep. You are not tired. You are flooded.


    This book is for the woman whose capacity is full long before her head hits the
    pillow. The one who is so good at holding it together that the holding only lets
    go at night, when it''s least welcome. You spend your days at the edge of what
    you can carry, and bedtime is when the dam you''ve been bracing all day finally
    gives. It feels like too much because it is too much — and it has been arriving
    with nowhere to land for longer than you''ve let yourself admit.


    Working from the body and never by force, you will come to recognize the flood
    for what it is: not a character flaw, not a failure to manage your time, but a
    nervous system that was given no room to discharge the day while it was happening.
    You''ll learn why stillness feels like a threat when you''ve spent twelve hours
    outrunning your own overwhelm. You''ll find where the day lives in your body —
    the held breath, the tight chest, the shoulders that never came down — and you''ll
    learn to let it move through you and out, slowly, instead of damming it up until
    dark. You''ll discover what it feels like to have space inside you again, the
    kind of room that has to exist before sleep can find you.


    This is not a productivity system for your nights. There is no brain-dump checklist
    to perfect, no morning routine to blame yourself for skipping, no optimization.
    This book will not ask you to manage the flood more efficiently or push through
    one more thing. The pushing is what fills you to the brim in the first place.


    What it offers instead is permission to stop catching everything. You were never
    meant to hold an entire day in a single body with no place to set it down. Tonight,
    you can begin to let some of it go.


    Book 2 of the Felt Sense Publishing sleep anxiety series.'
