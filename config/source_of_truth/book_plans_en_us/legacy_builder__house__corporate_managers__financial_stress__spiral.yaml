title: Running the Numbers at 3 A.M.
subtitle: For the manager whose mind turns one money worry into a thousand — when
  a single statement becomes a midnight chain of what-ifs that feeds itself
cover_tagline: It starts with one number. By 3 a.m. you've lost the house, the job,
  and twenty years you haven't lived yet.
description:
  short_blurb: One look at the account, and your mind is off — what if the bonus doesn't
    land, what if there's a round of cuts, what if you're still doing this at seventy.
    This is a book for the manager whose financial worry doesn't stay one worry; it
    multiplies in the dark. It won't talk you out of the spiral. It will show you
    where to step off it.
  long_description: 'It never stops at one. You check the balance before bed — just
    a glance — and the glance becomes a question, and the question becomes a forecast,
    and the forecast becomes a catastrophe you''re now living in real time at three
    in the morning. If the bonus slips, then the cushion thins, then a bad quarter,
    then the cuts you''ve signed off on for other people, then the house, then the
    look on your kids'' faces, then the version of you at seventy still staring at
    a screen. One thought became a thousand. And the worst part is how good you are
    at it — every link in the chain is plausible, because you build forecasts for
    a living, and your mind is just doing in the dark what it does all day.


    This book is for the manager whose money fear doesn''t sit still. The one who
    can''t take a single worry to bed without it breeding. The competent, careful
    person who mistakes the spiral for diligence — who believes that if they just
    think it through one more time, run the numbers once more, they''ll finally reach
    the bottom and be safe. You won''t. The spiral has no bottom. That''s not a flaw
    in your thinking; it''s the nature of the thing.


    We''ll move slowly through it. You''ll come to recognize the exact moment the
    first thought hooks the second, and how the pull gathers speed once it has you.
    You''ll see what the rumination is really costing — the hours, the sleep, the
    way you''re present for an imagined future and absent from the actual night around
    you. You''ll learn the difference between thinking and spiraling, between a problem
    you can act on at noon and a phantom you can only feed at three. And you''ll meet
    the question that quietly ends the chase: not how do I solve this, but what does
    this cost you — to keep running the numbers long after the numbers stopped answering.


    This is not a financial-planning book, and it is not a trick for out-arguing your
    own mind. It won''t promise that the right insight will finally make the spiral
    stop for good. You can''t think your way off a spiral; you can only notice you''re
    on one and step down. What changes here isn''t the worry. It''s your relationship
    to the pull — whether you follow it all the way down, or feel it start and stay
    where your feet actually are.


    You are not unstable, and you are not failing to cope. You''ve simply taken the
    careful forecasting mind that serves you all day and left it running all night,
    with nothing solid to work from and no hour when it is allowed to rest. You''re
    allowed to let the thought be just one thought, and let three a.m. stay dark,
    and go back to sleep.


    Book 2 of the Second Mountain Press financial stress series.'
