title: When Everything Arrives at Once
subtitle: For the woman whose plate is full and whose body has run out of room — finding
  ground when the flood of too-much leaves no space to think
cover_tagline: There's no more room. That's not a failing — it's information.
description:
  short_blurb: The notifications, the asks, the deadlines, the people who need you
    — it all arrives at once, and somewhere inside, something just goes white. This
    is a book for the woman whose capacity has been exceeded for so long she's forgotten
    it has a limit. It won't help you fit more in. It will help you feel the ground
    when the flood comes.
  long_description: 'It all comes in at once. The Slack pings and the calendar invites
    and the text from your mother and the thing you forgot and the thing you can''t
    forget, and somewhere behind your eyes something goes flat and loud at the same
    time. You are not thinking anymore. You are bracing against a tide. There is no
    room left — not in your schedule, not in your inbox, not in your chest.


    This book is for the woman whose capacity has been quietly exceeded for years.
    You''ve been told you''re so capable, so on top of it, so good in a crisis — and
    so you keep saying yes, keep absorbing, keep being the surface everything lands
    on. But your body knows what your calendar won''t admit: there is no more space.
    The overwhelm isn''t a character flaw. It''s a flood arriving at a shoreline that
    was never meant to hold this much.


    Here you''ll come to recognize overwhelm as a physical event before it is a mental
    one — the shallow breath, the buzzing limbs, the way the room seems to tilt toward
    you. You''ll learn that the flood is not a sign you''re failing to cope, but a
    sign your nervous system has run out of room and is trying to tell you so. And
    you''ll learn what to do with that — not how to expand your capacity endlessly,
    but how to find the ground when the water rises, how to feel your own two feet
    when everything is asking for you at once.


    This is not a productivity book wearing a softer coat. It will not teach you to
    optimize your overwhelm or hack your way to more bandwidth. There is no system
    here for absorbing more without breaking. The flood doesn''t need to be managed
    into submission. It needs you to come back to the ground, to let some of it pass
    through, to discover that you can be overwhelmed and still be standing.


    What you''ll find instead is the felt sense of room returning. One breath that
    goes all the way down. The simple, radical act of feeling the chair beneath you
    while the world keeps asking. The discovery that you do not have to hold all of
    it to be safe.


    You are allowed to be at capacity. You are allowed to let the flood pass without
    going under. Let your body remember it knows how to find the ground.


    Book 2 of the Felt Sense Publishing Anxiety series.'
