title: The Watchman Who Forgot How to Mourn
subtitle: For the founder who stays on guard so loss can never blindside them again
  — and can't understand why the grief still won't come
cover_tagline: You can't scan the horizon and weep at the same time.
description:
  short_blurb: Something was taken from you, and you swore it would never happen again
    — so you stayed on watch, reading the room, the runway, the next threat, on guard
    around the clock. But the grief you never let in didn't leave. It is standing
    outside the door you keep guarding. This is a quiet hour to finally let the watchman
    rest.
  long_description: 'You learned, the hard way, what happens when you don''t see it
    coming.


    So now you see everything. The shift in a key hire''s tone. The investor who goes
    quiet. The number that dipped half a point. The version of the story where it
    all falls apart again — you''ve run it a thousand times, so that this time you''ll
    be ready. You tell yourself this is just diligence. Founders stay alert. But somewhere
    under the vigilance is a loss you never finished feeling, and a vow you made over
    its body: never again. Never caught off guard. Never that exposed.


    This book is for the one who has turned grief into surveillance. For the founder
    who lost something real — a company, a partner, a person, a self — and responded
    by never standing down. You don''t break down anymore. You monitor. You scan the
    horizon for the next loss so faithfully that you never had to feel the last one.
    And you can''t understand why, in the rare quiet, something in you aches and won''t
    say what it wants.


    You''ll come to recognize the watchman for what he is — not a flaw, but a guard
    you posted at a moment of real pain, who never got the message that the danger
    has passed. You''ll see how the constant watching pretends to be protection while
    quietly costing you the very thing it''s guarding: your presence, your sleep,
    your capacity to be moved. You''ll notice that you cannot scan the perimeter and
    grieve at the same time — that the watching is precisely how the mourning gets
    postponed, year after year. And you''ll meet the loss that''s been standing patiently
    outside the door you keep guarding, asking only to be let in.


    This book will not make you more alert. It offers no system for spotting the next
    threat sooner, no resilience hack, no way to grieve efficiently and get back on
    watch. It will not promise that if you feel it all, you''ll finally be safe. Some
    things can be taken. That is true, and no amount of watching changes it.


    What it offers is the possibility of setting the watch down. The recognition that
    the awareness you''ve turned into endless scanning is, underneath, just awareness
    — open, quiet, already here, with nothing to defend. That you are not the watchman.
    You are the wide and undefended sky he has been pacing all this time, mistaking
    it for a wall. And in that openness, the grief you''ve been guarding against is
    finally allowed to arrive — not as the catastrophe you braced for, but as the
    tenderness that was trying to reach you all along.


    You can stop scanning the horizon now. There''s nothing out there that hasn''t
    already happened. Come down off the wall.


    Book 2 of the Awakening Press grief series.'
