title: Nothing Is Actually Wrong, So Why Am I Bracing
subtitle: For the mid-career parent whose body sounds the alarm every time they think
  about changing their job — when the only real danger is staying
cover_tagline: The threat isn't out there. It's the next chapter you keep refusing
  to write.
description:
  short_blurb: You open the job posting and your chest goes tight, as if you're about
    to step off a cliff instead of off a screen. Nothing has happened. No one is firing
    you, no one is calling about your mother, the deposit is paid. So why does wanting
    more from your work feel like a five-alarm fire? This is the book for the body
    that keeps bracing for a danger that never comes.
  long_description: 'You felt it again tonight. You were only reading a job description,
    only imagining the conversation, only letting yourself want something different
    from these last working years — and your whole body lit up like the house was
    on fire. Heart going. Jaw tight. That low hum that says run, even though you are
    standing perfectly still in your own kitchen with the dishwasher going and nobody
    in any actual danger.


    This is a book for you: the one in the middle of everything. Aging parents on
    one side, kids who still need you on the other, a job you''ve outgrown holding
    up the whole arrangement. You are not reckless. You have spent twenty-five years
    being the steady one. So when the thought of changing course sets off every alarm
    you have, you believe the alarm. You assume the fear is information. You stay.


    Here you''ll come to recognize the alarm for what it is. You''ll see how the body
    sounds the same siren for a real threat and for an imagined one — how the dread
    that floods you when you picture asking for more is a false alarm, not a verdict.
    You''ll learn to feel the spike in your chest and stay in the room anyway. You''ll
    meet the cliff in your own mind and discover that the edge you''ve been backing
    away from is not a fall. It''s a step. And you''ll keep returning to one quiet
    question that asks for almost nothing: what is one thing you could do before you
    feel ready?


    This book will not promise you a fearless leap. It won''t hand you a five-year
    plan, a side hustle, or a mantra that makes the fear disappear. The alarm may
    still go off. What changes is that you stop treating every false alarm as a closing
    door. You learn the difference between a body protecting you and a body lying
    to you, and you stop letting the second one decide the rest of your career.


    There is nothing wrong with you for bracing. You were built to brace. But you
    were also built to move, even afraid, even now, even with everyone still counting
    on you. The next chapter is not a danger. It''s a page you haven''t turned yet.


    You are allowed to want it. You are allowed to begin before the fear agrees.


    Book 1 of the Next Chapter Publishing courage series.'
