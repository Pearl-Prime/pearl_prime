title: Holding Your Insides to Their Outsides
subtitle: The scroll, the scan of the room, the quiet math that always leaves you
  short — a gentle hand for the woman who measures her unedited heart against everyone's
  curated surface
cover_tagline: You're holding their highlight reel against your unedited Tuesday.
description:
  short_blurb: You scroll, you scan the room, you watch your peers move through their
    lives looking calm and certain and ahead — and you come away sure that everyone
    got a manual you missed. This is a book for the woman who measures herself against
    everyone who looks fine, written to help her finally put the measuring down.
  long_description: 'You see it everywhere once you start looking. The colleague who
    seems unbothered in the meeting that wrecked you. The friend whose life looks
    composed and forward-moving on your screen. The woman across the office who appears
    to have the thing you''re still anxiously reaching for — the calm, the certainty,
    the sense of being on track. And every time, the same quiet math runs underneath:
    they have it together, and you, somehow, do not.


    This book is for you: the one who treats other people''s outsides as evidence
    against her own insides, who reads every curated life as proof she''s falling
    behind, who has turned a sharp and capable mind toward one cruel measurement —
    herself, against everyone else, always coming up short. You are not shallow for
    noticing. You are not failing. You''ve simply been weighing things that can never
    sit fairly on the same scale: their edited surface against your unedited interior.


    Here, you''ll come to recognize the comparison for what it is — not information,
    not an honest scoreboard, but a story your anxiety tells using other people as
    props. You''ll see how you came to trust the highlight reel over your own lived
    experience, how ''behind'' became a place you live instead of a fact you ever
    checked. You''ll learn what it feels like to set the measuring down — not by winning
    the comparison, not by finally getting ahead, but by noticing you''ve been grading
    your whole insides against strangers'' surfaces and choosing, gently, to stop.
    There''s a kind of warmth that only becomes possible when you stop holding yourself
    against everyone else: the warmth of just being where you actually are.


    This book will not help you win. It will not hand you a confidence formula, or
    teach you to curate a more impressive surface, or promise that you''ll someday
    be the one others measure themselves against. That''s still the same trap, just
    from the other side. Nothing here will help you come out ahead, because coming
    out ahead was never the way out.


    You don''t have to measure up to anyone to be allowed to feel okay. The calm you
    keep seeing in them is not the whole story, and the mess you feel in yourself
    is not the verdict you''ve made it. Set the measuring down. Your life is not a
    competition you''re losing — it''s just yours, and it''s enough.


    Book 6 of the Heart Transmission Press anxiety series.'
