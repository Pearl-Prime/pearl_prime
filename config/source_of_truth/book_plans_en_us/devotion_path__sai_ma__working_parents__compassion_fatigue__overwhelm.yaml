title: There Is Nothing Left to Pour
subtitle: For the working parent giving all day to everyone — children, work, the
  people who lean on you — until the cup runs dry and the asks keep coming
cover_tagline: Everyone reaches for you. The vessel has been empty for a long time.
description:
  short_blurb: You wake already behind, and by night you are poured out to nothing.
    This is a tender companion for the working parent whose days are an unbroken stream
    of other people's needs, written for the moment the cup runs dry and the reaching
    does not stop. It will not hand you a fuller schedule. It will sit with you in
    the emptiness and let you finally set the pitcher down.
  long_description: 'It arrives all at once. The alarm, the lunches, the email already
    glowing, the small voice needing you before your feet hit the floor. By the time
    you sit down at night — if you sit down — you are not tired in a way that sleep
    can reach. You are poured out. Emptied to the bottom. And still, from every direction,
    the reaching continues.


    This book is for the working parent who loves for a living and loves at home,
    and has run completely dry doing it. For the one who gives to the children, the
    job, the aging parent on the phone, the partner who needs just one more thing
    — and keeps tipping a pitcher that has nothing left in it. You are not failing
    to cope. You are a vessel that has been pouring for so long you''ve forgotten
    it was ever meant to be filled, too.


    In these pages you''ll come to recognize the particular shape of your overwhelm.
    The way too much arrives at once and leaves no room to think. The way you''ve
    learned to keep giving past empty, scraping the sides, because the need in front
    of you is real and yours always seems to come last. The numbness that feels like
    calm but is closer to a faucet left running over a dry well. The flood that has
    no shut-off, only you, holding it back with a body that is running on nothing.


    This is not a method. It will not promise you a system, a fuller cup by Friday,
    or a way to do all of it more efficiently. There is no optimizing your way out
    of a life that asks for more than any one person holds. Nothing here will help
    you give more. That is the mercy of it.


    What it offers instead is room. A spacious, unhurried hour that does not need
    anything from you. A voice that names the emptiness without rushing you to fix
    it, that lets the flood keep arriving while you, for once, are not the one bracing
    against it. Here you are not the pitcher. You are the one allowed, finally, to
    be held — to discover that the well in you can begin to fill again in the dark,
    without you forcing it, the moment you stop and let it.


    You are allowed to be empty. You are allowed to set it down. The needs will still
    be there tomorrow, and you do not have to carry them all tonight.


    Book 1 of the Open Vessel Press compassion fatigue series.'
