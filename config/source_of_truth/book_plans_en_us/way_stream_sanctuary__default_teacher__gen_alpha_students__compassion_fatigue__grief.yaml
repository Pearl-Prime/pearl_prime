title: 'The Cost of Caring: Living with What You''ve Lost'
subtitle: A Real Talk Guide to Compassion Fatigue for Gen Alpha Students
cover_tagline: You're the one everyone leans on. Nobody noticed the day you ran out.
description:
  short_blurb: You're the friend who holds everyone's hard stuff, the one people text
    at 2am. And somewhere in all that caring, you went numb — and quietly lost the
    part of you that used to feel things too. This book names the grief underneath
    compassion fatigue, written for the student who keeps giving until there's nothing
    left.
  long_description: 'You''re the one people come to. The friend who answers the 2am
    text, who reads the long paragraph and somehow knows what to say, who carries
    everyone''s breakups and panic and family stuff like it got assigned to you. And
    lately, when someone unloads, you feel... nothing. The caring that used to switch
    on by itself just isn''t there, and that scares you more than anything, because
    being the one who cares is practically your whole identity. So now you''re numb
    — and ashamed of being numb — on top of everything else you''re already holding.


    This book is for the student who gave until the well ran dry. Compassion fatigue
    isn''t proof you''ve turned into a bad friend; it''s what happens to the good
    ones who absorbed too much for too long while nobody poured anything back in.
    And underneath the numbness sits a loss almost nobody names out loud: you''ve
    lost the version of you who felt things easily, who didn''t flinch every single
    time the phone lit up. That''s real grief. You''ve just been filing it under personal
    failure.


    So we call it what it is first — not coldness, not a character defect, but grief
    wearing the mask of numbness. Then, instead of forcing the warmth to come back
    on command, you go down into the empty place on purpose. You''ll feel out what
    running on zero actually does to your body, notice the exact point where ''just
    be there for people'' curdled into erasing yourself, and learn to mourn the open-hearted
    giver you used to be without concluding you now have to slam the door on caring
    forever. What comes after is steadier: the ability to be there for someone and
    still remain a person — to feel with people instead of dissolving into them.


    This is not a book about giving more, or ''filling your own cup first'' with some
    tidy little routine. It won''t show you how to optimize your empathy or rebound
    fast so you can resume absorbing everyone''s pain. The open-hearted ease you''ve
    lost cost you something real, and acting like you can just reboot it is a chunk
    of why you feel so hollow.


    What you walk away with is language for the numbness and permission to stop performing
    a warmth you don''t currently have the fuel for. Grieve the version of you who
    never ran out. You can have a hard limit and still be a deeply good person — those
    were never opposites. The well ran dry. You''re still standing over it. Start
    from there.'
