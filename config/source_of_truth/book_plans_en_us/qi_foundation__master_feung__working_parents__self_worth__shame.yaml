title: The Armor You Wear to the School Pickup
subtitle: For the parent who overworks to cover a quiet belief that something is wrong
  with them — and is too tired to keep proving they belong
cover_tagline: You learned to perform being fine so well that you forgot it was a
  costume.
description:
  short_blurb: You don't think you're a fraud on purpose. You just learned, somewhere
    early, that being good enough meant covering the part of you that felt defective
    — and you got so good at the covering that you forgot you were doing it. This
    is a quiet book for the working parent who is exhausted from holding the armor
    on.
  long_description: 'There''s a moment in the car, in the few seconds before you open
    the door and walk into the meeting, or the school pickup, or your own kitchen,
    when you put it on. You straighten. You arrange your face. You become the version
    of you that is handling it. You don''t even notice anymore. It''s just what you
    wear.


    Underneath, there is an older belief you have never said out loud — that if anyone
    saw all the way down, they would find something wrong with you. Not a thing you
    did. A thing you are. So you cover it the only way you know how: you do more.
    You answer faster. You never drop the ball, and when you do, the shame is so total
    it takes your breath. You overwork not because you love the work but because the
    work is the armor, and you are terrified of what you''d be without it.


    This book is for the parent carrying that quiet weight to every room. The one
    who is praised for being so capable and feels, somewhere under the praise, like
    a held breath. The one whose worth has become a balance they top up by being needed,
    and who is so tired of topping it up.


    You''ll come to recognize how the mask was built, and why it once kept you safe.
    How the shame lives in the body — in the jaw, the held shoulders, the breath that
    never reaches the bottom of the lungs — long before it reaches a thought. How
    the defect you''ve been hiding was never a defect at all, but a wound dressed
    up as a flaw. And how worth, the real kind, was never something you earned on
    the surface. It was in the root the whole time, the way water waits in a well
    that refills from below, whether or not you''ve been good enough today.


    This is not a book that will help you perform better. It will not optimize you,
    or hand you a brighter mask, or teach you to declare a worth you don''t yet feel.
    It won''t fix you, because you were never broken — only braced. Nothing here asks
    you to earn your way back to yourself.


    You are allowed to set the armor down. Not forever, not all at once. Just here,
    for the length of this book, where no one is grading you and there is nothing
    to prove. You can stop holding your breath now.


    Book 1 of the Root & Meridian Press self worth series.'
