title: The Edge Was Never the Drop
subtitle: When your body floods with danger the second it's your turn to speak — and
  the small, honest move that gets the work out of you before the fear clears
cover_tagline: Your heart is racing for a fall that was never going to happen.
description:
  short_blurb: Right before you speak up, ask for more, or show the work, your whole
    system floods like you're about to step off a cliff. This is a book for the moment
    your body treats a meeting like a threat. It won't teach you to silence the alarm.
    It'll teach you to recognize it for what it is, so you can step before it clears.
  long_description: 'There''s a half-second, right before it''s your turn, when something
    in you braces. Your chest tightens. Your face goes warm. Your mind goes very quiet
    and very loud at the same time. You''re about to unmute, or raise your hand, or
    send the message you''ve already typed four times — and your whole body responds
    like you''re standing at the edge of something with a long way down.


    This is a book for that half-second.


    It''s for you if you''re early in your career and you keep noticing the gap between
    what you''re capable of and what actually leaves your mouth. The idea was good.
    You knew it was good. But the second the room turned toward you, an old alarm
    went off, and you waited for a pause that you let pass by.


    Here''s what you''ll come to recognize: that surge isn''t a verdict. It''s a false
    alarm — a smoke detector going off because you made toast, not because the building
    is burning. Your body learned, somewhere along the way, to treat being seen as
    a danger. So it does its job. It floods you. It tells you to wait until you feel
    ready. And the trouble is, the kind of moment you actually care about — the one
    where you finally make your mark — never feels safe enough to wait for.


    We''ll sit with the edge instead of fleeing it. You''ll learn to tell the difference
    between a real threat and a misfiring alarm. You''ll find the smallest honest
    move you can make while your heart is still going — one sentence, one send, one
    step before the fear has cleared. Not because the fear is wrong, but because the
    work inside you deserves to get out of you.


    This book will not promise to make you fearless. It won''t optimize your nervous
    system or hand you a five-step protocol to never feel this again. The alarm may
    always go off. That''s allowed. What changes is what you do in the seconds after
    it does.


    Think of it like a blank canvas. The first mark is always the most frightening,
    and it''s never the one that ruins anything. You''re allowed to begin before you''re
    ready. You were always allowed.


    The edge was never the drop. It was just the edge. And the step is smaller than
    the fall you''ve been bracing for.


    Book 1 of the Blank Canvas Books Courage series.'
