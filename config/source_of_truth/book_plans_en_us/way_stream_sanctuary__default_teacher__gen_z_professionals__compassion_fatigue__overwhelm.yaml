title: 'Compassion Fatigue: Too Many Things, Not Enough You'
subtitle: A Field Guide for Gen Z Professionals Navigating Compassion Fatigue
cover_tagline: Everyone needs you, all at once, and there's only one of you.
description:
  short_blurb: Too many people, too much need, no time to feel any of it. This is
    for young professionals in caring work drowning in demands they can't ethically
    drop. The problem isn't that you care too little. It's that the asks never stop,
    and this book finally names it.
  long_description: 'It''s the third crisis before lunch. One person needs you urgently,
    and behind them are four more, and your phone is buzzing, and somewhere in there
    is the thing you actually care about, the reason you took this job, buried under
    a tide of need that does not pause to let you breathe. Your chest is tight. You
    haven''t felt anything in hours. You''re just triaging.


    This is for you if you''re young in a caring profession, nursing, teaching, social
    services, support, frontline anything, and compassion fatigue, for you, shows
    up as overwhelm. Not an empty heart, a flooded one. Too many people needing too
    much, all at once, and no version of ''just say no'' that doesn''t feel like abandoning
    someone real. You can''t close the inbox when the inbox is human. So the demands
    stack, and you go under.


    First, recognition: this is overwhelm, and it is not proof you''re in the wrong
    field. It''s what happens when finite human capacity meets infinite human need
    with no buffer in between. Naming that matters, because you''ve been treating
    the flood as a sign you don''t care enough, when the truth is you care plenty
    and there is simply too much.


    Then we descend. Not a system to manage your caseload, the descent. We''ll get
    honest about what it does to a young nervous system to be everyone''s safety net,
    why the guilt of having limits is its own exhausting weight, and what''s actually
    happening in your body when every demand is urgent and every one of them is a
    person. You stop swimming against the current long enough to feel where you are
    in it.


    Then you come back, changed. Not with an emptier queue, the need doesn''t recede
    because you got healthier. You come back able to feel the difference between a
    real emergency and a manufactured one, able to let go of the demands that aren''t
    yours to carry without drowning in guilt, able to stand inside the flood of need
    without it pulling you under.


    This book will not promise you''ll get on top of the need. You won''t, and it
    won''t pretend otherwise. It won''t optimize your capacity so you can hold more
    people. There''s no framework here to help you absorb more demand, because absorbing
    more is exactly what''s drowning you. What it offers is the hard permission to
    let some asks go unanswered and stay standing.


    You cannot be everyone''s shore. You were never supposed to be. Start here, in
    the flood, and learn to stay on your feet.'
