title: 'Anxiety Relief: The Weight You Carry'
subtitle: A Field Guide for Corporate Managers Navigating Anxiety
cover_tagline: The role ended. The org moved on by Tuesday. You didn't.
description:
  short_blurb: A team got restructured, a project you built got killed, someone left,
    and you're expected to keep leading like nothing happened. This is a one-hour
    reset for the manager carrying a loss with nowhere to put it. It won't speed you
    up. It'll let you stop pretending you're fine.
  long_description: 'The reorg memo goes out at 9 a.m. By 9:15 your team as you knew
    it is gone, the person you mentored is on someone else''s org chart, and you''re
    on a call acting like a steady hand. Nobody scheduled time to grieve a team. So
    you don''t. And the anxiety you can''t explain shows up instead.


    This book is for the manager carrying a loss the workplace has no slot for. Maybe
    a layoff took people you hired. Maybe the product you spent two years on got shelved
    in a slide. Maybe a mentor left, or a version of your role quietly disappeared
    in a restructure. There was no funeral, no acknowledgment, just a Monday where
    you were supposed to be unchanged. The grief didn''t evaporate. It went underground
    and came back wearing the costume of dread.


    And you''re the one who''s supposed to absorb it for everyone else. You announce
    the change, you steady the people still reporting to you, you hold the line in
    the town hall, and somewhere in there the assumption sets in that the person delivering
    the loss isn''t allowed to be leveled by it. So you file your own grief under
    unprofessional and keep moving, and it sits there with nowhere to go, leaking
    out as a short fuse, a flat week, a tightness that doesn''t track to anything
    on your calendar.


    The next hour makes room. First, recognition: you name what you actually lost,
    out loud, without ranking it against "real" tragedy or apologizing for feeling
    it about work. Then descent. Instead of powering through or reframing it as a
    growth opportunity, you let yourself go down into the loss, the way grief actually
    wants to move, in waves, on no schedule. Then integration: you come back to the
    standups and the new org chart still carrying it, but no longer mistaking buried
    grief for free-floating anxiety.


    This will not promise closure by end of quarter. It won''t optimize your bounce-back
    or hand you a resilience framework that turns loss into a clean lesson. There''s
    no worksheet, no forced silver lining. Some of what''s gone is just gone.


    What it offers is honesty: that the tightness in your chest is grief that never
    got named, and that naming it is the thing that lets it move. You can lead a team
    and mourn one at the same time. You can keep the role and still let the loss be
    a loss.


    You''re allowed to be sad about work. It mattered, and so did the people. Start
    by saying what you lost.'
