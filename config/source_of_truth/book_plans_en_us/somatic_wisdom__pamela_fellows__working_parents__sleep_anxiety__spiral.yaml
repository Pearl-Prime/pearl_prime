title: It Started With One Worry at 2am
subtitle: For the parent caught in the downward pull of midnight rumination — one
  thought becoming a thousand, each one feeding the next
cover_tagline: One thought, then ten, then the whole night gone — and your body pulled
  down with it.
description:
  short_blurb: It begins with a single worry, and by 2am it has become a thousand,
    each thought handing you the next. This is a somatic, trauma-informed companion
    for the parent caught in the nighttime spiral — and a grounded way to step off
    the churn, not by arguing with it, but by letting your body find the floor beneath
    it.
  long_description: 'It starts small. One worry surfaces in the dark — about a child,
    a bill, a word you can''t take back — and before you''ve decided anything, it
    has handed you the next one, and the next. By 2am a single thought has become
    a thousand, each feeding the one behind it, pulling you down and down while your
    body tightens to keep up. You are exhausted. And you are wide, wide awake, watching
    your own mind gather speed.


    This book is for the parent the spiral comes for at night. In daylight you manage;
    you handle the next thing and the next, and there is always a task to anchor you.
    But in the quiet, with nothing to reach for, your mind turns inward and starts
    to feed on itself — rehearsing, replaying, forecasting every way it could go wrong.
    It feels like thinking, like problem-solving, like something you have to finish
    before you''re allowed to rest. It is none of those. It is a current, and it is
    taking you under.


    You''ll come to recognize the spiral for what it is: not insight, not preparation,
    but a loop with no exit that your tired mind mistakes for vigilance. You''ll feel
    how it grips the body — the clenched stomach, the breath that climbs and won''t
    drop, the pull downward that gathers speed the longer you stay inside it. And
    gently, you''ll learn that you don''t escape a spiral by out-thinking it, because
    the thinking is the spiral. You step off it by coming back into your body — by
    finding the weight of you on the bed, the ground beneath the churn, the one breath
    that is actually happening now.


    This is not a thought-stopping technique or a worry worksheet. There is nothing
    here to argue down, no script that finally wins the 2am debate. Nothing in these
    pages will ask you to think harder or analyze your way to calm. We won''t try
    to silence the mind or wrestle it quiet. We''ll drop beneath it instead — to the
    slow, steady ground the spiral can''t reach — and let the current run on without
    you while your body, at last, begins to rest.


    You are not weak for being pulled under, and you are not failing for lying awake.
    A spiral is strong, and you have been swimming against it alone, night after night,
    for a long time. Let this be where you stop swimming and find the floor again
    — where your feet meet something solid, the pull loosens, and the breath you''ve
    been holding finally lets go.


    Book 3 of the Felt Sense Publishing Sleep Anxiety series.'
