title: 'Grief: After the Loss (5)'
subtitle: A Field Guide for Working Parents Navigating Grief
cover_tagline: Compassionate leave ended. The grief didn't.
description:
  short_blurb: The world expected you back at the desk and back in the pickup line,
    as if the loss came with an expiration date. This one-hour reset is for the working
    parent grieving in stolen moments. It won't tell you it gets easier. It'll let
    you grieve without apologizing for still being in it.
  long_description: 'The casseroles stopped weeks ago. The condolence texts dried
    up. You''re back at the desk, back to packing lunches, back to saying "hanging
    in there" when someone asks — and the grief weighs exactly what it weighed the
    first week, except now you carry it alone, in the slivers between a meeting and
    a bedtime story. Everyone else got to move on. You didn''t. There are still people
    here who need dinner.


    This is for the parent stuck in the long middle of a real loss. Someone died,
    or something ended for good, and the world handed you a few days, maybe a week,
    then expected a functioning adult to walk back in. So you do. You show up to the
    job because the household needs the paycheck. You keep your face steady at pickup
    because your kids are reading it to find out whether they''re safe. And then,
    in the car, in the shower, in the ninety seconds before the alarm, it comes back
    in like water through a cracked hull. People mean it kindly when they tell you
    it gets easier. But easier isn''t what you''re missing. You don''t need the loss
    made smaller. You need it seen.


    That''s the whole orientation of this hour. It begins by naming the specific shape
    of a working parent''s grief — the mourning you keep having to interrupt because
    someone needs juice, the sorrow you take in fragments because there''s never room
    for the entire wave at once. Then, rather than coaching you to stay strong, it
    gives you leave to go down into it on purpose, inside the few unguarded windows
    you actually get, instead of bracing it at arm''s length around the clock. And
    then it helps you climb back out and keep going — keep parenting, keep working,
    keep living — not past the loss, never that, but able to carry it without being
    carried off.


    It will not sell you the five tidy stages you complete and graduate from. It won''t
    promise the ache thins out on a schedule, or that some clean morning you''ll wake
    up healed. That isn''t true, and you are finished being handed soft lies by people
    who already went back to their own intact lives. What it offers is the opposite
    of a fix: company down in the low place, and the steadying fact that you can be
    completely wrecked and still be a good parent, still be the one who shows up,
    still be here.


    You don''t have to be finished. You don''t have to perform being fine so the people
    around you can stop worrying and feel relieved. You are allowed to still be grieving
    long after the calendar decided you''d be over it. Read this in the parked car,
    in the last minute before you go in and put the face back on. One hour — to be
    the one who gets held, before you go back to holding everyone else.'
