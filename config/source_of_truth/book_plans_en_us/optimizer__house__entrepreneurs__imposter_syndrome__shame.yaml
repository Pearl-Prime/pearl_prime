title: They'll Find Out at Dawn
subtitle: For the founder who built something real and still works overtime to cover
  a defect only they can see
cover_tagline: You didn't get away with anything. You built it.
description:
  short_blurb: You're up before the team again, rehearsing the day so no one catches
    the thing you're sure is wrong with you. This is a book for the founder who treats
    the whole company as proof they're not quite enough — and who has never once let
    the proof be enough. It won't fix you, because you were never broken.
  long_description: 'It''s the hour before the inbox wakes, and you''re already at
    the table with the first coffee, running the day in advance. Not planning it.
    Defending it. Somewhere under the metrics and the offer letters and the room full
    of people who report to you, there is a quiet belief you''ve never said out loud:
    that something is wrong with you, that you''ve been getting away with it, and
    that one day — maybe today — they''ll find out.


    This book is for the founder who built something real and uses every bit of it
    as cover. You overdeliver so the gap won''t show. You answer at midnight so no
    one can call you a fraud by morning. You''ve turned a whole company into a costume,
    and the work is the seam you''re terrified will split.


    What you''ll come to recognize here is the shape of the thing itself. How shame
    disguises itself as standards. How the mask you built to feel safe became the
    most exhausting job you have. How the defect you''ve been overworking to hide
    was never a fact about you — it was a verdict you inherited and have been paying
    interest on ever since. You''ll see the cost of staying one step ahead of being
    seen, of meeting every dawn already braced. And you''ll feel, maybe for the first
    time in a long time, what it''s like to set the costume down before the day starts
    spending you.


    This book will not optimize you. It will not hand you a morning protocol, a founder''s
    mindset to install, or five habits to become the version of yourself you imagine
    would finally be allowed in the room. There is no fix here because there was never
    a break. The fresh start isn''t a better performance. It''s the moment you stop
    auditioning for a seat you already own.


    Nothing in these pages will help you cover better. That''s the point. You don''t
    need a thicker mask. You need to find out that the founder under it was the real
    one the entire time — and that the day will hold you whether or not you''ve earned
    it by 9am.


    You are allowed to begin again without first becoming someone else. You always
    were.


    Book 1 of the Daybreak Editions Imposter Syndrome series.'
