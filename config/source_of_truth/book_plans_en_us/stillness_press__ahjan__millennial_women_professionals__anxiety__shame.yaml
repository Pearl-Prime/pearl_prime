title: If They Saw the Real Me
subtitle: For the woman who overworks to paper over a flaw no one else can see — quietly
  certain that if anyone glimpsed who she really is, it would all come apart
cover_tagline: You're not anxious about the work. You're anxious that the work is
  the only thing hiding you.
description:
  short_blurb: Underneath the competence and the calm face is a quiet certainty that
    something is wrong with you — and a lifetime of overworking to make sure no one
    finds out. This is a tender hour for the woman who hides a flaw she's never named,
    written by someone who carried the same secret. It won't try to fix what's broken.
    It will ask whether it was ever broken at all.
  long_description: 'There''s a feeling underneath the achievements that the achievements
    never quite reach. A quiet, private certainty that something about you is wrong
    — not something you did, but something you are. So you work harder. You over-prepare,
    over-deliver, over-give, because as long as you''re producing, no one gets close
    enough to see the flaw you''re sure is there. The anxiety isn''t really about
    the deadline. It''s about what the deadline is covering for.


    This book is for you — the one who looks like she has it together precisely because
    she''s terrified of what''s underneath, who reads admiration as a near miss, who
    is exhausted not by the work but by the hiding. Shame is the most patient form
    of anxiety. It doesn''t shout. It just whispers, from underneath everything, that
    you are the problem and the only safety is to never be fully seen.


    In these pages you''ll come to recognize that whisper for what it is: not the
    truth about you, but an old belief that took root long before you could question
    it, and that you''ve been overworking to outrun ever since. You''ll learn the
    difference between guilt, which is about something you did, and shame, which lies
    and says you are what''s wrong. You''ll see how the hiding became a second full-time
    job, how the performance of being fine costs more than the flaw ever would, and
    how the thing you''ve been covering may not be a flaw at all — only a tender,
    ordinary part of being human that you were taught to be ashamed of.


    This is not a confidence program or a self-esteem method. There''s nothing here
    to optimize, no affirmations to perform, no version of you to finally become.
    You will not be told to love yourself harder as if that were one more task you''re
    failing. You''ll be kept company instead — by someone who has worked herself ragged
    to cover the same secret, and found that the relief came not from fixing the flaw,
    but from finally setting down the shovel and letting the light in.


    We''ll move gently, because shame cannot be argued with and only ever softens
    in the presence of something kind. You''ll spend time with the buried belief,
    close enough to actually look at it, and discover it''s smaller and older than
    the life you built on top of it. You''ll feel what it''s like to be seen — even
    a little — and not fall apart.


    Nothing here will ask you to confess, perform, or prove your worth. It asks only
    that you consider, for one quiet hour, that there may be nothing to hide. The
    shame can quiet. Not because you fixed what''s wrong with you, but because you
    let yourself see there was never anything wrong to begin with.


    You are allowed to be seen before you''re perfect. Begin there.


    Book 4 of the Stillness Press anxiety series.'
