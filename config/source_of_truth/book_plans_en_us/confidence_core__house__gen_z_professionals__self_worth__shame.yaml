title: The Version of You That Apologizes First
subtitle: For the young professional who overworks to cover a defect no one else can
  see — and quietly believes they have to earn the right to be here
cover_tagline: You've been paying off a debt you never actually owed.
description:
  short_blurb: Somewhere along the way you decided the real you wasn't enough, and
    you've been overworking ever since to make sure no one finds out. This is a book
    for the part of you that flinches before the room even responds. It won't talk
    you out of the feeling. It will walk you to the door where the feeling has been
    standing guard, and quietly let you past.
  long_description: 'You apologize before you''ve done anything wrong. You reread
    the email twice after you''ve already sent it. You volunteer for the thankless
    task because saying no feels like exposing the thing you''ve been hiding — the
    quiet, total certainty that if anyone really saw you, they''d know you don''t
    belong here.


    That certainty has a name, even if you''ve never said it out loud. It''s shame.
    Not the loud kind. The kind that lives underneath the competence, whispering that
    the competence is the only thing keeping you in the room.


    This book is for the young professional who works twice as hard to cover a defect
    no one else can actually see. You''re the one who got the job, hit the deadline,
    earned the nod — and still went home sure you''d fooled them for one more day.
    You treat your worth like a debt you''re forever paying down, and you''ve never
    once let yourself believe the account was already settled. So you keep working,
    not because the work is finished, but because stopping feels like standing exposed
    in a doorway with nothing left to hide behind.


    Here, you''ll come to recognize the shape of it. How shame turns every small mistake
    into evidence. How it dresses up as humility so you never question it. How it
    makes you overwork not toward something, but away from being found out. How it
    confuses the version of you that apologizes first for the whole of who you are
    — and convinces you the two were always the same person.


    This book will not fix you, because you were never broken. It won''t hand you
    a louder personality or teach you to perform a confidence you don''t feel. There''s
    no morning routine here, no mantra to drown out the voice. Nothing in these pages
    asks you to become more impressive than you already are.


    What it offers instead is quieter, and harder, and truer: the slow recognition
    that the defect you''ve been covering was never a defect at all — just a verdict
    you were handed and started carrying as fact. You don''t have to earn your way
    out of it. You just have to notice you''ve been standing at a threshold this whole
    time, certain you needed permission to cross, when the door was never locked.
    The room on the other side was always going to have a place for you. You were
    the only one asking you to prove it first.


    You can set the debt down. Not because you finally proved enough. Because it was
    never real, and the person it was charged to was never the fraud you feared.


    Book 1 of the Threshold Books self worth series.'
