title: 'Grief: After the Loss'
subtitle: A Field Guide for First Responders Navigating Grief
cover_tagline: You cleared the scene. You never cleared the loss.
description:
  short_blurb: There are people you couldn't save, and the job moved on while you
    didn't. This is an hour for the grief first responders carry without a funeral,
    without a name on the casualty list, without anyone ever asking if you were okay
    — the loss that doesn't leave because it was never given anywhere to go.
  long_description: 'You remember the ones you lost. Not the saves — the losses. The
    call where you did everything right and it didn''t matter. The face. The family
    in the doorway. The radio traffic that went quiet. And then dispatch put you back
    in service, and you took the next call, because that''s what you do. The grief
    didn''t get a moment. It got stacked on top of the last one, and the one before
    that, until you''re carrying a whole career of people you couldn''t save and there''s
    nowhere on the report to write any of it down.


    This hour is for first responders living with grief that has no ritual. Civilians
    get a funeral, a casserole, bereavement leave, someone to say I''m sorry for your
    loss. You get a debrief if you''re lucky and a ''you good?'' in the bay if you''re
    not, and then you go home and you''re supposed to be fine because they weren''t
    yours. But they were yours, in the worst hour of their lives, in the back of your
    rig, on the floor of a house you''ll never forget. The grief is real even though
    the world never gave you permission to feel it.


    We''re going to give you that permission here. First we name it — this is grief,
    the genuine article, not stress, not burnout, not weakness. Then we go down into
    it instead of around it, which is the exact opposite of what the job trained you
    to do. You learned to compartmentalize because you had to function, and that skill
    saved your career and quietly cost you something every single time. For one hour
    you don''t have to compartmentalize. We sit with the actual losses, the specific
    ones and the weight of all of them together, without turning it into a lesson,
    without rushing you toward ''closure'' that doesn''t exist for some of these.


    This book will not tell you to find meaning in it. It will not promise the grief
    lifts or fades or resolves. It will not hand you stages to march through or a
    worksheet to fill out. Some of these you carry for the rest of your life, and
    pretending otherwise has never helped you. What it offers instead is room — to
    feel the people you lost without having to be strong about them, and to stop spending
    energy pretending the weight isn''t there.


    You held it together so everyone else could fall apart. You were the steady one
    on the worst day of a stranger''s life, over and over, and nobody ever held it
    together for you. For one hour, let it be heavy. Let them have mattered. Set it
    down here. It''s allowed, and it''s about time.'
