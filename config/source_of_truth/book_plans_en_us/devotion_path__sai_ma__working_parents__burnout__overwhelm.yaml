description:
  short_blurb: Practical Tools to Regain Control When Life Feels Unmanageable get my energy back without quitting everything.
  long_description: |
    Practical Tools to Regain Control When Life Feels Unmanageable

    This book is for working parent of young kidss who I have nothing left and I can't stop. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.

    Chapter by chapter, you'll work with what when everything is too much really means in your body and mind, and how to work with it. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.

    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.

    Book 1 of the Devotion Path burnout series.
