title: Lying Awake on Ground That Won't Hold
subtitle: For the parent whose mind multiplies one worry into a sleepless thousand
cover_tagline: It started as one small thing. Now it's the whole worst version of
  everything.
description:
  short_blurb: It begins with one thought — small, ordinary, the kind you'd wave off
    by daylight. But it's 2am, and the dark has a way of pulling one worry into a
    thousand, each feeding the next, all the way down. This is a steady book for the
    working parent caught in the spiral that runs while the rest of the house sleeps.
  long_description: 'It always starts so small. A thing you said. A look the doctor
    gave. A number in the account. By daylight you''d wave it off. But it is 2am,
    and in the dark that one thought does not stay one thought. It catches. It pulls
    the next one in, and the next, and within minutes you are no longer worrying about
    the small thing — you are several worst-case scenarios deep, certain of catastrophes
    that haven''t happened, building the whole ruined future in your head while the
    house sleeps around you. And the more you try to think your way out, the faster
    it spins.


    This book is for the working parent who knows that downward pull from the inside.
    The spiral does not feel like worry. It feels like figuring it out, like being
    responsible, like the one rational mind staying on top of every threat to the
    people you love. That is the trap. The spiral disguises itself as diligence. It
    convinces you that if you just follow the thought one more turn, you''ll finally
    reach the bottom and be safe — but the bottom keeps dropping, because rumination
    doesn''t solve fear. It feeds it.


    Slowly, you will come to recognize the spiral for what it is — not a problem you
    are solving, but a body in fear borrowing the shape of thinking. You''ll feel
    where it grabs you and learn to notice the first turn before it becomes the thousandth.
    You''ll discover what happens when you stop trying to out-think the fall and instead
    let yourself land — when you let the ground come up to meet you instead of chasing
    the thought all the way down.


    This book will not give you better answers to your 2am questions. It will not
    help you finally solve the worry, because the worry was never the point. It will
    not tell you to just stop thinking, as if you had a switch. There is no bottom
    to reach here and no thought to follow to safety. The spiral is not proof that
    you are anxious or broken. It is the oldest part of you, trying with everything
    it has to keep your people safe, in the only way it knows in the dark.


    You do not have to follow it down tonight. The thought can keep falling. You are
    allowed to stay on the ground.


    Book 3 of the Held Ground Press Sleep Anxiety series.'
