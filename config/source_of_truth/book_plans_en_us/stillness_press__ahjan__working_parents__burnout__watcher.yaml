title: Someone Always Has to Be Watching
subtitle: For the parent whose mind never clocks out — scanning for the next fever,
  form, or fire to handle, unable to rest because something always needs watching
cover_tagline: Your body sat down hours ago. Your mind is still on duty.
description:
  short_blurb: You finally sit. Within seconds your mind is off again — did you sign
    the form, is that cough getting worse, did you reply to that email, what's tomorrow.
    This is a book for the parent whose attention never goes off duty, and who has
    forgotten what it feels like to fully arrive anywhere.
  long_description: 'You know the moment. The house is quiet, you''ve finally sat
    down, and instead of rest your mind starts its rounds. Did you sign the permission
    slip. Is that cough getting worse. Did you ever answer your boss. Is there milk
    for the morning. You''re not even worried, exactly — you''re scanning, the way
    you''ve scanned for years, because in a working parent''s life something always
    needs watching, and somewhere along the way you became the one who watches.


    This is the burnout that doesn''t look like collapse. It looks like vigilance.
    Your body stops, but your attention never does — perpetually three steps ahead,
    monitoring the household, the calendar, the kids, the job, bracing for the next
    thing the moment the last one is handled. You can''t remember the last time you
    were fully in a room instead of half-scanning the horizon of everything that might
    go wrong.


    This book is for the parent who never goes off duty. The one who lies awake running
    tomorrow''s logistics. The one whose mind treats a quiet evening as a threat,
    because quiet is just the gap before the next thing needs you.


    Here, you''ll come to recognize the watcher for what it is: not diligence, not
    good parenting, but a nervous system that has been on alert so long it has forgotten
    how to stand down. You''ll see how the scanning exhausts you even when nothing
    is wrong — how staying ready for everything means never being at rest for anything.
    You''ll learn to feel the difference between the watching that genuinely protects
    your children and the watching that only depletes you. And you''ll begin, gently,
    to let the guard come down for a moment, and discover that the world does not
    fall apart when you stop bracing for it.


    This book will not give you a better system for tracking it all. It will not teach
    you to manage your alerts, batch your worries, or stay on top of everything more
    efficiently. The vigilance was never the solution — it is the symptom. No amount
    of monitoring has ever made a tired mind feel safe enough to rest; it only gives
    the scanning more to do.


    What it offers instead is something the watcher has been waiting years to hear:
    that you are allowed to set the watch down. That the people you love are not held
    together by your unbroken attention. That stillness is not negligence, and rest
    is not a lapse — and that the alert, exhausted part of you that never sleeps was
    only ever trying to keep everyone safe, including the self you forgot to watch
    over.


    You can stop scanning now. Not forever. Just for this breath. And then the next.


    Book 3 of the Stillness Press burnout series.'
