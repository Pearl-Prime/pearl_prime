title: You Keep Waiting for the Next Loss
subtitle: When grief turns into bracing — checking your phone for bad news and holding
  the people you love too tightly to lose them
cover_tagline: Once you've lost someone, a part of you starts watching the door.
description:
  short_blurb: Since the loss, you can't fully rest. A part of you stays braced —
    checking that everyone you love is still alive, waiting for the next call, the
    next diagnosis, the next empty chair. This is a book for the grief that turned
    into vigilance, and the slow work of letting your hands unclench.
  long_description: 'Grief doesn''t always look like crying. Sometimes it looks like
    checking your phone the second it buzzes, certain it''s bad news. It looks like
    texting your mom ''you good?'' for the third time today. It looks like lying awake
    doing the math on everyone you love — their age, their health, the odds — as if
    holding them tightly enough in your mind could keep the next loss from happening.
    Since the day you learned the ground can open without warning, a part of you has
    refused to rest.


    This book is for you. For the young professional whose grief turned into watchfulness.
    You lost someone, and somewhere in the aftermath your heart made a quiet promise:
    never be caught unguarded again. So now you brace. You scan the faces of the people
    you love for the first sign that something is wrong. You hold them a little too
    tightly and a little too far away at once, because loving them fully means having
    more to lose. At work you''re the one who catches every problem early — and no
    one knows it''s because you''ve learned, in your body, that the worst thing arrives
    the moment you let your guard down.


    We''ll name gently what the watchfulness is really doing: trying to protect you
    from a grief that has already happened. You''ll come to recognize the quiet exhaustion
    of a heart that never lets itself unclench — the dread that wears the face of
    caring, the rehearsals of funerals that haven''t come, the way you can''t be present
    at dinner because part of you is busy bracing against losing it. You''ll see how
    the bracing keeps you at arm''s length from the very people you''re trying to
    hold close.


    This book will not hand you a way to control the uncontrollable. It won''t promise
    that if you do enough, no one else will leave. It won''t turn your vigilance into
    one more thing to be good at. There is no fix here, because the thing you''re
    bracing against — loss — is not a flaw to be corrected. It is the cost of having
    loved.


    What it offers is a hand laid gently over your clenched one. A quiet room where
    you can finally let your grip loosen for a moment and let the last loss land —
    the one you never let yourself fully feel, because you were too busy bracing for
    the next. You don''t have to hold the whole world still to keep it safe. You''re
    allowed to set the weight down, and rest.


    Book 2 of the Heart Transmission Press grief series.'
