title: 'The Seat You Earned: Carrying What You Can''t Say'
subtitle: A Field Guide for the Sandwich Generation Navigating Imposter Syndrome
cover_tagline: If they really knew, they'd take the seat back. So you never say it.
description:
  short_blurb: You've convinced yourself you don't really deserve to be where you
    are, and you carry that conviction in total silence because saying it out loud
    would make it real. This is a book about imposter syndrome as buried shame — the
    unspoken belief that you're a fraud, and the cost of never letting anyone hear
    it.
  long_description: 'Nobody knows. That''s the part that wears you down. On the outside
    you''re competent, capable, the one people bring their problems to. On the inside
    you''re sure it''s a performance, that you''ve fooled every one of them, and that
    the real you — the one who doesn''t actually deserve this seat — is one slip away
    from being seen. So you carry it alone. You''d never say it out loud. Saying it
    would make it true.


    That silence is shame, and it''s been lying to you the whole time.


    This book is for you — stretched between aging parents and growing kids, the one
    who clawed her way to a place she''s proud of and can''t admit she''s proud of
    it, because some buried part of you insists you don''t belong here and never did.
    You''ve treated that insistence as a private fact about yourself. It isn''t a
    fact. It''s shame, and shame stays alive precisely because you never say it anywhere
    the light can reach it.


    Recognition comes first: you''ll learn to hear the shame under the imposter feeling
    — to notice the moment "I might not be qualified" hardens into "I''m a fraud and
    no one can ever find out." Then you go down into it, the step nobody volunteers
    for. You won''t talk yourself up or recite your résumé at it. You''ll go to where
    the shame actually lives — the wordless verdict that the real you is fundamentally
    not enough — and stay there long enough to look straight at it. You don''t come
    out certain. You don''t come out cured. You come out no longer guarding the secret
    with your entire body, because you''ve finally seen the thing you were hiding.


    This keeps both feet on the ground, and it stays secular. No affirmations. No
    worksheets. No "just own your accomplishments," which treats years of buried shame
    like a confidence gap you can tick off a list. It will not promise to make you
    feel deserving — that belief was laid down long ago and won''t reverse because
    you read a chapter. It will not remake you into someone who never once suspects
    she snuck in.


    What it gives you is language for the thing you''ve never said — "this is shame,
    not the truth about whether I belong" — so the secret stops running you from the
    inside out. The imposter feeling still shows up. You just stop treating it as
    a confession you''re obligated to hide.


    The seat was earned, even on the days you can''t feel it. You can stop guarding
    a secret that was never true.'
