title: Off the Clock, Still on Alert
subtitle: For the nurse whose body never got the page that the shift is over — meeting
  the alarm that keeps firing when there's no longer anyone to save
cover_tagline: The code is over. Your body didn't get the message.
description:
  short_blurb: You spend your shift braced for the alarm that means someone is dying
    — and then you go home and your body keeps bracing anyway. This is a gentle, body-based
    companion for the nurse whose nervous system learned to stay ready and forgot
    how to stand down. This isn't one more thing to push through. It's a way to finally
    let your shoulders come down.
  long_description: 'You are in the grocery store, in the shower, in bed beside someone
    you love — and your chest is tight, your jaw is set, your whole body is leaning
    toward a door that isn''t going to open. There''s no monitor here. No call light.
    Nothing is wrong. And still some part of you is waiting for the sound that means
    run.


    This book is for the nurse whose alarm system never learned to go quiet. The one
    who can stay calm in an actual emergency and then come apart in a parking lot
    over nothing. You are not broken, and you are not weak. Your body did exactly
    what the work asked of it: it learned to stay ready, all the time, for years.
    The bracing kept you sharp on the unit. The problem is that nobody ever taught
    it how to come back down — and so it doesn''t.


    Here you''ll come to recognize the false alarm for what it is. Not danger. Not
    a sign you''re losing it. Just a nervous system firing on an old memory of how
    often the real thing came. You''ll feel where you hold it — the floor of the belly,
    the set of the jaw, the breath you take high in the chest and never quite finish.
    And you''ll learn, slowly and on your own timeline, how to signal to your body
    that the shift is over. That it''s allowed to come off alert. That the warmth
    is allowed to come back into the places that braced.


    This will not make you faster or tougher. It will not optimize you for the next
    twelve hours. There is no protocol here to master and no metric to hit. If anything,
    it asks you to do the one thing the job never lets you do: stop, and let your
    body catch up to the fact that, right now, in this moment, you are safe.


    Nothing here will help you push through. That has never been your problem. You
    push through for a living. What you''ve never been given is permission to come
    down — and that is what this book is for.


    You are allowed to set the alarm down. Even if you don''t yet believe it''s safe.
    Especially then.


    Book 1 of the Felt Sense Publishing anxiety series.'
