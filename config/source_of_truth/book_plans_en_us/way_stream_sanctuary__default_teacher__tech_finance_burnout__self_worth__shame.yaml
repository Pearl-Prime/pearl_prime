title: 'The Voice That Says Not Enough: Carrying What You Can''t Say (4)'
subtitle: How Tech Finance Burnout Are Rewriting the Rules of Self-Worth
cover_tagline: The voice that says "not enough" isn't the truth. It's the oldest thing
  you carry.
description:
  short_blurb: No promotion, no bonus, no shipped feature has ever quieted the voice
    that says you're not enough — because it was never about the work. In tech and
    finance, low self-worth is shame in a quarter-zip. This is a book about the buried
    belief, and how to finally name it.
  long_description: 'You hit the number. You got the title. You shipped the thing
    that was supposed to make it click — and for about a day, it almost did. Then
    the voice came back, the same as before: not enough. You''ve been trying to achieve
    your way past it for years, and it has cost you nothing to keep up with you, because
    the voice was never measuring your work.


    This book is for the people in tech and finance who can''t out-earn or out-perform
    the feeling of not being enough. The engineer with the staff title who still feels
    like they''re falling short. The analyst whose biggest year changed the number
    on the spreadsheet and nothing in the chest. The high achiever who has finally,
    quietly noticed that no external win ever turns the voice off.


    Ana Reyes names the real engine, and it isn''t ambition or standards. It''s shame.
    The voice that says not enough isn''t a performance review — it''s an old belief
    that something is fundamentally wrong with you, one you''ve been trying to disprove
    with promotions since long before this job existed. That''s why the wins don''t
    stick. You can''t fix a worth problem with a comp problem''s solution.


    The book goes down into that belief instead of throwing more achievement at it.
    You''ll get close to the thing under all the striving: the buried conviction that
    you have to earn the right to be enough, that without the next win you''re exposed
    as lacking. You''ll feel the shame of it directly, rather than sprinting from
    it toward the next milestone. That descent — staying with the not-enough long
    enough to see it was never true — is where it finally loosens. Named in plain
    words, the belief can''t hold its shape.


    Then you come back up able to be enough without a receipt. You''ll learn that
    your worth was never the prize at the end of the achievement — that it was there
    before the title, under the doubt, the whole time. You''ll stop running. Not because
    the voice is gone, but because you stopped believing it was telling the truth.


    This will not promise you permanent self-worth or a method for silencing the voice
    for good. It won''t bury the shame under accomplishments or teach you to recite
    your value until you believe it. There''s no morning affirmation here. There is
    only the honest work of carrying the thing you could never say — and then saying
    it, and discovering you were enough before you ever started proving it.


    The voice that says not enough is the oldest lie you carry. You don''t have to
    earn what was already yours.'
