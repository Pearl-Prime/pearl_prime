title: Everyone My Age Already Figured It Out
subtitle: For the student doing fine on paper who measures every day against a feed
  full of people who look like they were born sure of themselves
cover_tagline: You're holding your behind-the-scenes up against everyone's highlight
  reel.
description:
  short_blurb: 'You open the app and there it is again: someone your age who already
    knows what they''re doing, already got in, already seems sure. You close it feeling
    like you''re running late on a race nobody started. This book won''t help you
    win the comparison — that''s the whole point.'
  long_description: 'You open the app to escape the feeling, and the feeling is right
    there waiting for you.


    Someone your age announcing the internship. Someone''s little ''I can''t believe
    this is my life'' caption. Someone who, at seventeen, already moves through the
    world like they were handed the instructions you never got. You weren''t even
    looking for it. You just wanted to not think for a second, and instead you''re
    doing the math again — where you should be by now, how far behind you''ve fallen,
    how everyone else apparently got the memo.


    This book is for you — the student who''s actually doing okay, and can''t feel
    it, because okay isn''t the bar. The bar is everyone else, all at once, at their
    absolute best, on a screen built to show you nothing but their best. You''re not
    lazy and you''re not failing. You''ve just pointed a sharp, sensitive instrument
    at the wrong target: yourself, held up against a feed.


    Comparison is its own doorway into imposter syndrome. It isn''t the shame that
    hides or the spiral that loops or the alarm that fires for no reason. It''s the
    ruler — the constant, quiet measuring that always, somehow, comes back with the
    same answer: not enough, not yet, not like them.


    Chapter by chapter, you''ll come to recognize the measuring as it''s happening
    — the specific moment your stomach drops at a stranger''s good news. You''ll see
    what it costs to live as a number that''s always lower than someone else''s. You''ll
    learn why the comparison is rigged: that you are seeing edited, posted, best-case
    fragments and weighing your whole unedited inside against them. You''ll work with
    your body, in the room, phone face-down, in the actual moment the scroll turns
    on you — not through deleting the app forever, not through a gratitude list, not
    through becoming impressive enough to finally win.


    This book will not help you come out ahead. It will not optimize your life so
    the comparison finally lands in your favor. It will not turn you into someone
    who posts the caption other people ache over. There''s no fix here, because the
    comparison was never a problem to solve — it was a habit of pointing the instrument
    at yourself, and instruments can be set down.


    Nothing here will help you win. That''s the point. What it offers instead: you
    get to come back to your own life, the one happening off-screen, at its own pace,
    on no one''s timeline but yours. Not measured. Not ranked. Not behind. Just here,
    where you actually are.


    You''re allowed to stop running a race nobody else is actually in.


    Book 2 of the Present Tense Books imposter syndrome series.'
