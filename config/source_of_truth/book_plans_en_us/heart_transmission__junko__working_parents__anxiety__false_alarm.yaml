title: Meeting the Alarm With Tenderness
subtitle: For the working parent who braces all day for a danger that never arrives
  — learning to greet the alarm inside you with a soft hand instead of a fight
cover_tagline: The alarm is going off. Nothing is wrong. Both are true.
description:
  short_blurb: Your chest tightens at the school pickup line. Your heart races over
    an email that can wait. Somewhere inside, an old alarm keeps firing as if your
    children were in danger — when all that's really happening is another Tuesday.
    This is a quiet hand on that alarm, and a gentler way to live beside it.
  long_description: 'You feel it before you can name it. The breath that won''t go
    all the way down. The bracing in your shoulders as you buckle a car seat. A flood
    of dread while you stir the pasta, certain something is about to go wrong — and
    nothing is. The kids are fine. The day is ordinary. And still the alarm inside
    you is screaming.


    This book is for the working parent whose body has confused love with emergency.
    You are not broken. You are not overreacting. You are carrying a tender, ancient
    alarm system that was built to protect the people you would die for — and it has
    simply forgotten how to stand down. It fires at the slammed door, the unread text,
    the silence from the back seat. It mistakes a long to-do list for a threat to
    your young. It has been on duty so long it no longer remembers there is anything
    else to be.


    Here, in a voice meant to be read close and slow, you''ll come to recognize the
    false alarm for what it is: not a verdict on your sanity, but a frightened part
    of you doing its best with old instructions. You''ll learn to notice the first
    flicker of bracing before it becomes a flood. You''ll feel what it''s like to
    place a warm hand over the fear instead of fighting it — to say, gently, I see
    you, and we are safe right now. And you''ll begin to feel the difference, in your
    own chest, between a real danger and a body that simply loves too hard to tell
    the two apart.


    This is not a cure. It will not promise you a still, alarm-free life by Friday,
    and it will not hand you a system to optimize your own nervous system into submission.
    There is nothing here to win, no streak to keep, no calmer parent you must become
    before you''re allowed to rest. The bracing may visit again tomorrow, and the
    day after that. That''s allowed. Nothing here asks you to be finished.


    What you will have instead is a way of meeting it — the warmth of being understood
    by someone who has stood in that same dark kitchen, and a few honest minutes where
    the alarm can finally rest in your open hand. You''re not failing at calm. You''ve
    just been keeping watch so long you forgot anyone could keep watch beside you.


    Let the alarm be what it is. Then, breath by breath, let it soften.


    Book 1 of the Heart Transmission Press anxiety series.'
