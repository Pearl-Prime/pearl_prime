title: Watching for the Goodbye Before It Comes
subtitle: For the woman who scans every silence for the next loss — quieting the part
  of you that's already grieving a relationship that hasn't ended yet
cover_tagline: You've been saying goodbye to them for months. They're still here.
description:
  short_blurb: When you've lost someone before, your mind learns to watch — re-reading
    the message, decoding the pause, bracing for the leaving you're sure is coming.
    This is a book for the professional woman whose love has quietly turned into surveillance,
    and who is exhausted from grieving a person who is still sitting right across
    from her.
  long_description: 'You read the text again.


    Not because the words changed, but because somewhere between this morning and
    now they got shorter, and your mind has already built the whole ending out of
    one missing exclamation point. You watch the pauses. You catalog the tone. You
    sit across the table from someone you love and instead of being with them, you''re
    scanning them — for the flinch, the distance, the early sign of the goodbye you''re
    certain is on its way. You''re not paranoid. You''ve lost people before. Your
    mind just learned that if you watch closely enough, maybe next time it won''t
    blindside you.


    This book is for the woman whose grief showed up early and never sat down. The
    hypervigilant one. The one who can read a room at work in three seconds and reads
    her own relationship the same way — reading every pause for the leaving, rehearsing
    the loss, mourning a person who is still here and still hers. You think you''re
    protecting yourself. What you''re actually doing is grieving something that hasn''t
    happened, every single day, and missing the person in front of you while you brace
    for their absence.


    We''re going to put the watching down.


    You''ll come to recognize the shape of this particular grief — how loss that already
    happened to you got rewired into a lookout post, how the watcher mind dresses
    up as love and care when it''s really fear wearing their face. You''ll see what
    you''re actually scanning for, and how the searching itself creates the distance
    you''re so afraid of finding. You''ll notice the conversations you have alone
    in your head at 2am — the ones where they leave, where you say the perfect thing,
    where you survive it in advance — and what it costs to keep auditioning for a
    heartbreak that may never come. And you''ll learn, slowly, what it feels like
    to sit in the chair across from someone without standing guard.


    This book will not make you certain they''ll stay. There''s no method here to
    read minds, no system to predict the ending, no checklist that earns you a guarantee.
    It won''t tell you to stop caring. It won''t hand you hypervigilance dressed up
    as ''paying attention.'' It will only pull up the second chair, sit down where
    the lookout used to be, and keep you company while you let the watch finally go
    quiet — long enough to notice that the goodbye you''ve been bracing for hasn''t
    come, and the person you''ve been grieving is still right here.


    You don''t have to keep guarding the door. You''re allowed to be in the room.
    You''re allowed to have them while you have them.


    Book 2 of the Two Chairs Press grief series.'
