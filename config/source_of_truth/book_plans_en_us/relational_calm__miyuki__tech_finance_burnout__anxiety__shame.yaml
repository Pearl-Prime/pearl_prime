title: Working Twice as Hard to Cover the Flaw
subtitle: For the high-performer overworking to hide a flaw no one else can see —
  and the clean truth that there was never anything in you to fix
cover_tagline: You built a whole career to keep them from finding out.
description:
  short_blurb: 'Somewhere underneath the output is a quiet belief: that something
    is wrong with you, and that if you ever stopped proving otherwise, they would
    all find out. So you overwork, over-prepare, over-deliver — not to win, but to
    stay ahead of the shame. This is a book about the defect you think you''re hiding,
    and what happens when you stop running from it.'
  long_description: 'You do not say it out loud. You barely say it to yourself. But
    it is there, underneath the deadlines and the late nights and the relentless preparation
    — the belief that something is wrong with you, and that the work is the only thing
    keeping it hidden.


    This is shame. Not guilt over a thing you did, but the quiet conviction that you
    yourself are the flaw. So you overdeliver. You answer first, prepare most, never
    let them see you uncertain. From the outside it reads as drive. From the inside
    it is a long, exhausting effort to stay one step ahead of being found out. The
    anxiety is not really about the work. It is about what the work is covering.


    This book is for the high performer who feels like an impostor in a chair they
    earned. For the engineer, the founder, the analyst who is privately certain that
    everyone else belongs and they are getting away with something. For anyone who
    has confused overworking with being safe.


    In these spare pages you will come to recognize the shape of the shame you have
    been outrunning: where the belief came from, how it disguises itself as ambition,
    and the precise cost of building a life on the conviction that you are not enough
    as you are. You will see how the body carries it — the bracing, the held breath,
    the flinch before feedback. You will sit with the question underneath it all:
    what is your body trying to tell you, when being good is never quite enough to
    feel safe?


    Nothing here will help you finally earn your way out of the shame. There is no
    achievement that closes the gap, no reframe to optimize, no performance that makes
    it true. That is the point. This is not about proving you are enough. It is about
    setting the proving down and letting the buried belief come into the clean light,
    where it tends to be smaller than it felt in the dark.


    You do not have to keep covering it. You are allowed to be seen as you are.


    Book 4 of the Bare Form Books Anxiety series.'
