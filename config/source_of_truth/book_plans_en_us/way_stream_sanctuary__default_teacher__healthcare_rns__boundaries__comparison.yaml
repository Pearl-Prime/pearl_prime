title: 'The Line You Never Drew: When Other People''s Success Feels Like Your Failure'
subtitle: A Field Guide for Nurses Navigating Setting Boundaries
cover_tagline: The nurse who never says no is not the strongest one on the floor.
  She's the one closest to leaving it.
description:
  short_blurb: You watch the nurse three years behind you set a boundary that would
    have ended your career, and somehow it lands her a promotion. This is about the
    line between you and them that you keep measuring instead of drawing. It will
    not teach you to care less, only to stop using everyone else's limits as proof
    that yours don't count.
  long_description: 'It usually starts in the break room, or in the group chat, or
    in the half-second after someone else says "I''m not picking up that shift" and
    the world doesn''t end for them. You hear it and something in your chest tightens,
    because you would never. You''d have stayed. You''d have apologized for being
    asked. And now you''re doing the math again: she said no and got respected, you
    say yes and get scheduled. The line you never drew is the one everyone else seems
    to have drawn without you.


    If you read other people''s boundaries like a scorecard, this was written for
    you. The nurse who watches a colleague leave on time and feels it as a verdict.
    The one who has confused being needed with being good, and being available with
    being valuable, until the gap between you and the people who say no feels like
    the gap between failing and passing.


    First we name it plainly: comparison is not information about your worth. It''s
    a story your tired brain tells about a line you can''t see the back of. You don''t
    know what that nurse said no to last year, what it cost her, who she disappointed.
    You only see the clean result and measure your messy effort against it. We''ll
    go down into that — into the actual moment the comparison fires, in the hallway,
    mid-handoff, scrolling at 2 a.m. — and look at what''s underneath it instead of
    trying to talk you out of it. Usually it''s not envy. It''s grief for a limit
    you were never allowed to have.


    Then we come back up, but not to a finish line. You will not leave this book a
    person who never compares. You''ll leave it able to catch the comparison while
    it''s happening and recognize it as a flare, not a fact. The line between you
    and the nurse who said no is not a measure of your value. It''s just a line. You''re
    allowed to draw your own version of it, in your own handwriting, for reasons that
    have nothing to do with whether she did it first or better.


    Don''t expect a book about confidence or owning the room. Nothing here will turn
    you into someone who never flinches when a coworker protects her own time. The
    one promise is this: the next time success across the unit feels like a finger
    pointed at you, you''ll have words for what''s actually happening, and a way to
    stand in it without it deciding who you are.


    You''re allowed to stop grading yourself on a curve no one else is being graded
    on.'
