title: 'The Number in Your Head: Breaking the Thought Loop'
subtitle: A One-Hour Money Anxiety Reset for Professional Women
cover_tagline: One look at your bank app at midnight, and suddenly you're broke, alone,
  and homeless at sixty.
description:
  short_blurb: Money spirals start with one thought and end somewhere catastrophic.
    A single number becomes a thousand, each worse than the last, until you're lying
    awake rehearsing a future that hasn't happened. This is one hour to catch the
    loop and step off it.
  long_description: 'It starts with one glance at your phone before bed. The balance
    is lower than you remembered, and that''s all it takes. Within ninety seconds
    you''re not looking at a number anymore, you''re watching a movie: the emergency
    you can''t cover, the job you lose, the savings that evaporate, the version of
    you who''s sixty and alone and out of options. None of it has happened. All of
    it feels certain. This hour is for the professional woman whose mind takes one
    financial fact and spins it into an entire catastrophe before she''s even put
    the phone down.


    This is for you if the thoughts breed. One worry about the credit card becomes
    a worry about retirement becomes a worry about whether you''ve ruined your entire
    life, each link pulling the next, faster and faster, usually at the exact moment
    you''re trying to sleep. You know, in daylight, that it''s a loop. At 1 a.m. it''s
    a prophecy. You''ve tried to reason your way out, to argue each fear down with
    facts. It doesn''t work, because the spiral isn''t built out of facts, and you
    can''t logic your way out of a loop that was never logical.


    So we won''t try to win the argument. First you''ll recognize the spiral as a
    spiral, a mechanical thing your mind does, one thought triggering a thousand,
    not a real forecast of your actual future. Then you''ll go down to the still point
    underneath the spinning, the place the thoughts are launching from, instead of
    chasing each new fear down its rabbit hole. Then you''ll come back up able to
    watch a money thought arise without being yanked all the way to the worst-case
    ending.


    This book will not give you a financial forecast. It won''t promise that the right
    savings number will finally quiet the 1 a.m. thoughts, or that you can plan your
    way to certainty. It won''t tell you to just stop worrying. The spiral is real
    and it''s exhausting, and you''re not irrational for getting caught in it.


    What it offers is the part no money advice covers: how to feel the loop start
    and step off it, before one thought has multiplied into a thousand. You don''t
    have to silence the thoughts to stop being dragged by them. You don''t have to
    know your future is safe to put the phone down and sleep. You''re allowed to step
    off the spiral now, with the catastrophe still unwritten.'
