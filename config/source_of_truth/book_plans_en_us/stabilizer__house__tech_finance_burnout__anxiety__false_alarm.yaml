title: The Body That Never Got the All-Clear
subtitle: For the high-performer whose chest keeps bracing for a crash that never
  comes — learning to read the alarm instead of obeying it
cover_tagline: Your heart is racing in a quiet room. Nothing is wrong. Something still
  feels like it is.
description:
  short_blurb: You closed the laptop hours ago, but your body is still on call — chest
    tight, jaw set, scanning for a threat that isn't in the room. This is a steadying
    book for the tech-and-finance mind whose alarm system never got the all-clear,
    and a way to finally read what it's been trying to tell you instead of bracing
    against it.
  long_description: 'It''s late, and the apartment is quiet, and your heart is going
    like something is wrong. You check the dashboard. You check the markets. You check
    Slack one more time. Nothing is on fire. And still your chest is braced, your
    jaw is tight, your breath is sitting high and shallow — like part of you is waiting
    for a crash that the rest of you can''t even name.


    This is a book for the person whose body never got the all-clear.


    If you live in the world of standups and runway and the number in the brokerage
    app, you have trained yourself to feel the threat before it arrives. It made you
    good at your work. It also left an alarm ringing in a body that no longer knows
    the difference between a real emergency and a Tuesday. You are not broken, and
    you are not weak. You are a finely-tuned instrument that has been firing at shadows
    for so long you forgot the silence was ever an option.


    You''ll come to recognize the false alarm for what it is. The bracing that has
    nothing to brace against. The flood of too-much that arrives before you''ve even
    opened your eyes. The thought that splits into a thousand. The quiet certainty
    that the danger is you. The grief underneath the dread for a version of rest you
    can barely remember. The way you measure your own racing pulse against everyone
    who looks unbothered. The part of you that never stops scanning, even here, even
    now.


    This book will not teach you to override the alarm. It will not hand you a protocol,
    a morning stack, or one more thing to optimize. It will not promise that you''ll
    never feel it again. What it offers instead is the harbor — a place inside the
    breakwater where the boat stops pitching and you can finally hear what your body
    has been trying to say all along, not as an enemy, but as something on your side
    that simply got too good at its job.


    You are allowed to come in off the open water. You are allowed to let the alarm
    finish without leaping to answer it. You are allowed to be a person, and not a
    system that has to run.


    Book 1 of the Harbor Line Books anxiety series.'
