title: One Worry Becomes Ten Thousand
subtitle: For the founder whose mind takes a single what-if and builds the entire
  collapse out of it — and the still center waiting on the far side of the loop
cover_tagline: It started as one question. By 3am it had eaten everything.
description:
  short_blurb: 'It begins with a single what-if: one missed number, one cooling investor,
    one off look in a meeting. By the time you surface, it has become the layoffs,
    the failure, the version of you who could not hold it together. This is a book
    for the founder whose mind turns one fear into the entire collapse, and who needs
    the courage to stop feeding the loop.'
  long_description: 'It begins so small. One number comes in soft. One investor takes
    a day longer to reply. One person in the meeting glances at their laptop while
    you''re talking. And your mind, which is brilliant and tireless and exactly the
    instrument that built this company, takes that single thread and starts to pull
    — and by 3am the soft number has become the missed quarter has become the down
    round has become the layoffs has become the version of you who looked everyone
    in the eye and promised and then couldn''t hold it together.


    This book is for the founder who spirals. You know the feeling: one worry arrives
    and a thousand follow it down, each one borrowing the last one''s momentum, the
    whole descent feeling less like thinking and more like falling. You tell yourself
    you''re just being thorough. You tell yourself a good leader runs the scenarios.
    But somewhere the running stopped being planning and became a downward pull that
    feeds on itself, and you can no longer find the bottom of it.


    Here you''ll come to recognize the spiral for what it is — not foresight, not
    diligence, but a loop that mistakes its own speed for truth. You''ll see how it
    always starts at the place you care most about, and how the first thought is almost
    never the problem; it''s the tenth, and the hundredth, the ones the mind manufactures
    to keep the falling going. You''ll notice how the spiral promises that if you
    just think it through one more time you''ll finally feel safe, and how that bottom
    step never arrives. And you''ll begin to feel the thing the loop is spinning around:
    a still center that isn''t moving at all, that was never falling, that has been
    quietly here underneath every descent.


    This is not a book that will give you control over your thoughts, and it will
    not teach you to think positive. It won''t promise that the worries stop arriving
    — they will. What it offers instead is the recognition that you are not the spiral;
    you are the open space the spiral is happening in. You don''t have to chase every
    thought down to its imagined floor. You can let the loop spin without climbing
    onto it.


    The courage here is quieter than you expected. It isn''t the strength to think
    your way to certainty. It''s the willingness to stop pulling the thread — to let
    one worry be one worry, and to rest in the still place it was never able to touch.
    That place is already yours. It was never falling with you.


    Book 2 of the Awakening Press courage series.'
