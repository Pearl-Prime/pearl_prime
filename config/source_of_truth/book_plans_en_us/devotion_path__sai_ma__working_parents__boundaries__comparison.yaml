title: The Parents Who Seem to Hold It All
subtitle: For the working parent measuring their own depletion against everyone who
  looks like they have endless room to give
cover_tagline: You are comparing your empty cup to their closed door.
description:
  short_blurb: Other parents seem to say yes to everything and never run dry. You
    measure your exhaustion against their ease and always come up short. This is a
    quiet hour for the working parent who is losing a contest no one else is running.
    The fullness you envy is mostly something you cannot see.
  long_description: 'She brings the homemade thing to the class party, runs the fundraiser,
    answers every email by morning, and still seems to have room left over. He never
    looks tired. The other parents in the group chat say yes to all of it and never
    appear to reach a wall. And there you are, already scraped thin by noon, certain
    that everyone else was handed a larger cup and you are the only one who keeps
    running dry.


    This book is for the working parent who measures their own depletion against everyone
    who looks like they have endless room to give. The one who scrolls and tallies
    and always lands on the wrong side of the count. Who hears their own need to stop
    as proof of a deficiency, because clearly the other parents don''t need to stop,
    so why do you? You are not lazy and you are not failing. You have simply pointed
    a tender, exhausted heart at the wrong target: yourself, against a highlight reel
    of doors you cannot see closing.


    Here you will come to recognize the comparison for the trap it is. You will see
    how you weigh your inside against their outside, your empty cup against their
    carefully composed calm — and how the parents who seem to hold it all are almost
    always holding far less than they show, or paying a cost in private that the group
    chat never sees. You''ll begin to feel how the measuring itself drains the little
    you have left, and how the contest you''re losing is one no one else is even running.


    This book will not help you win the comparison or finally out-give the parents
    you envy. That''s the point. It will not optimize you into someone with a bottomless
    cup or teach you to match a fullness that was mostly a performance. There is no
    leaderboard of devotion, and the prize you''ve been straining toward does not
    exist.


    You are allowed to have the capacity you have. You are allowed to stop counting,
    to set down the measuring, and to let your own far edge be enough — not enough
    compared to anyone, just enough. The well refills in the dark, on its own quiet
    schedule, and never once asks how full the neighbor''s is.


    Book 3 of the Open Vessel Press boundaries series.'
