title: They're Going to Find Out
subtitle: For the capable woman who's certain she's bluffing at work — and overworks
  so no one sees the fraud she believes she is
cover_tagline: You didn't fool them. You earned it. You just can't feel the difference
  yet.
description:
  short_blurb: You got the role, the raise, the room — and somewhere underneath it
    you're sure it was a mistake they haven't caught yet. This is a book for the woman
    who works twice as hard to hide a defect that was never there, written by someone
    who knows that ache from the inside. It won't make you feel qualified. It'll help
    you stop staking your worth on the feeling.
  long_description: 'There''s a particular silence after the praise lands. Everyone
    in the meeting is nodding, the work is good, and the only person in the room who
    doesn''t believe it is you. You smile, you say thank you, and underneath you''re
    already bracing for the day the truth comes out: that you''ve been bluffing the
    whole time, that the real version of you is smaller and less capable than the
    one they keep promoting.


    This book is for that woman. The one who got the job and immediately assumed it
    was a fluke. The one who answers a compliment by listing everything she didn''t
    do. The one who works late not because the task demands it, but because effort
    feels like the only thing standing between her and the moment someone finally
    sees the fraud she''s certain she is.


    Here you''ll come to recognize the quiet workings of shame at work — not the loud,
    obvious kind, but the kind that hides. You''ll see the mask you put on every morning,
    and the exhausting cost of keeping it on. You''ll notice how you''ve built a whole
    career out of covering a flaw that was never actually there. You''ll feel the
    difference between a mistake you made and a person you decided you are. And slowly,
    in a voice that won''t rush you, you''ll start to loosen your grip on the belief
    that you have to earn the right to take up space.


    This book will not make you feel qualified. It won''t hand you a script that makes
    the fear go quiet on command, and it won''t tell you that your worth was a mindset
    problem all along. There''s no fixing yourself here, no five-step confidence formula,
    no pretending the next chapter of your career will only open once you finally
    feel ready. You may never feel entirely ready. That''s allowed.


    What it offers instead is something quieter and more durable: the room to set
    the mask down for a while, and to keep walking through doors you don''t yet feel
    you''ve earned. You are not a secret about to be discovered. You are a person
    who has been carrying a heavy, private story about herself, and you''re allowed
    to start writing a different one.


    You don''t have to deserve your own life before you live it.


    Book 1 of the Next Chapter Publishing Imposter Syndrome series.'
