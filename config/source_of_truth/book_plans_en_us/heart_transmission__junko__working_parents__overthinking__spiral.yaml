title: At 2am, the Loop Feeds on Love
subtitle: For the working parent lying awake turning one sentence into a hundred —
  where each worry breeds the next, and the spiral runs on the very love beneath it
cover_tagline: It started with one small thing. By 3am it was your whole life.
description:
  short_blurb: It begins with one thought — something you said, something you missed
    — and by 2am it has multiplied into a thousand, each one breeding the next, the
    whole future of your child somehow riding on a single dinner-table sentence. This
    is not a tool to stop the spiral. It is a warm hand reaching into the loop to
    sit beside you in it.
  long_description: 'It starts so small. One thought — a sharp word you said to your
    kid before bed, a meeting you handled badly, a thing you forgot to pack — and
    you tell yourself you''ll just think it through once. But once becomes twice,
    and the second thought hands you a third, and soon you are lying in the dark at
    2am with the whole future spread out above you: what this means about you as a
    parent, what it will do to your child in ten years, every way it could unravel.
    One small thing has become a thousand, and each one is feeding the next.


    You are not awake because you are weak. You are awake because you love them so
    much your mind cannot stop trying to protect them — even from dangers it has to
    invent to find.


    This book is for the working parent whose thinking spirals: down and down, faster
    and tighter, one worry breeding the next until you can no longer find the floor.
    You are not dramatic, and you are not doing this to yourself on purpose. You are
    caught in a loop that runs on the most tender fuel there is — the wish to get
    it right for the people you would give anything for. The spiral doesn''t pull
    you down despite your love. It pulls you down because of it.


    Here, in a voice meant to be read close and slow, you''ll come to recognize the
    spiral while you''re inside it — the moment the single thought begins to multiply,
    the pull that says think it through one more time. You''ll learn that you don''t
    have to chase every thought to its terrible end to keep your children safe. You''ll
    feel what it is to let a thought arrive and not seize it, to let the loop turn
    without climbing onto it — to lay a hand on your own racing chest and say, gently,
    not all of this is true, and none of it needs solving tonight. And slowly you''ll
    feel the difference between thinking and spinning, between caring for them and
    drowning in the dark on their behalf.


    This is not a cure. It will not switch off your mind by Friday, and it will not
    turn your own thoughts into a system to manage and optimize. There is nothing
    to win here, no perfect calm to reach before you''re allowed to sleep. The spiral
    may come back tomorrow night. That''s allowed. Nothing here asks you to be finished.


    What you''ll have instead is a way of meeting it — the warmth of being understood
    by someone who has watched a single thought become a thousand at 3am — and a few
    honest minutes where you can set the loop down and rest your open hands.


    You were never broken for thinking too much. You''ve just been loving them in
    the only language your tired mind knows how to speak.


    Let the thoughts come. Then, breath by breath, let them pass without you.


    Book 2 of the Heart Transmission Press overthinking series.'
