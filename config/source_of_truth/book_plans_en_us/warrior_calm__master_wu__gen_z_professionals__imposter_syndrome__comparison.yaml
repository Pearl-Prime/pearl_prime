cover_tagline: You're comparing your inside to their outside, and calling it the truth.
description:
  short_blurb: Everyone on the call sounds sure. Everyone in the feed got there faster.
    You scan the room for the person who'll expose you and find a dozen people who
    clearly belong more than you do. This is a steady book for the mind that measures
    itself against everyone who looks calm — and keeps losing a contest no one else
    knows they're in.
  long_description: 'Look around the room. Everyone seems to know exactly what they''re
    doing.


    The colleague who speaks first, easy and certain. The one your age with the title
    you don''t have yet. The feed full of people who started later and somehow arrived
    sooner. You take all of it in — the ease, the confidence, the belonging — and
    you measure yourself against it, and you lose. Again. You always lose, because
    the contest is rigged: you''re comparing the chaos you can feel inside to the
    calm you can only see on the outside.


    This book is for you. The young professional who walks into every room already
    ranked last in a competition no one else entered. The one who reads someone''s
    certainty as proof of their own fraudulence. The one whose imposter feeling isn''t
    really about the work — it''s about the gap between how steady everyone else looks
    and how unsteady you know you are.


    We''re not going to help you win the comparison. That''s the whole point.


    Instead, you''ll come to recognize the instrument you''ve been using. A high-performance
    mind, beautifully built for noticing, pointed at exactly the wrong target: yourself,
    ranked against people whose insides you will never see. You''ll see how comparison
    feeds the fraud feeling — every confident face becomes more evidence, every scroll
    another verdict. You''ll feel the cost of running the scoreboard all day: the
    way it strips the meaning out of your own work, the way it makes other people''s
    wins feel like your losses, the exhaustion of standing in a room and being somewhere
    else entirely, sizing yourself up. And you''ll learn what it is to plant your
    feet on your own ground — not the ground next to theirs — and stand there without
    measuring.


    This is the warrior''s calm. The stillness of someone who has stepped out of the
    contest. Not because they decided they''d won, but because they finally noticed
    there was never a real one to win.


    This book will not make you more impressive than the people you envy. It won''t
    optimize you into the most confident person in the room or hand you a way to finally
    come out ahead. Nothing here will help you win the comparison — because winning
    it was never the way out. Setting it down is.


    You are allowed to stop ranking yourself and just stand where you are. The room
    was never grading you.


    Book 2 of the Iron Gate Press imposter syndrome series.'
