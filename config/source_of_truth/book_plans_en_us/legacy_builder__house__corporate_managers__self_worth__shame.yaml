title: The One You Don't Let Anyone See
subtitle: What it costs to lead from behind a flawless front — and the worth that
  was waiting underneath it the whole time
cover_tagline: You built a self that never has to be found out. It's exhausting in
  there.
description:
  short_blurb: You're good at your job. You're also certain that if anyone saw the
    unsure person behind the title, the whole thing would come apart. This is a book
    for the manager who has spent years building a front so convincing no one would
    think to look behind it, and who is quietly worn out from holding it up.
  long_description: 'It is the small moment that gives it away. Someone praises the
    call you made, and instead of warmth you feel a flicker of dread — because now
    there is more to protect, more height to fall from, a higher bar you will have
    to clear before they notice you do not belong here. You have learned to nod, deflect,
    and move the meeting along. No one in that conference room has any idea what it
    costs you to look this composed.


    This book is for the manager who carries a buried belief into every room: that
    something is wrong with you, specifically, and that the job is to make sure no
    one ever finds out. You over-prepare so you cannot be caught short. You take the
    blame quickly and the credit slowly. You wear competence the way other people
    wear a good coat — a clean, convincing front — and underneath it you are bracing,
    always, for the day the front comes down in front of everyone.


    You will come to recognize how shame actually operates in a working life. How
    it disguises itself as high standards. How it turns a glass-walled office into
    a place where you can be seen but never truly known. How the question underneath
    all your striving — who are you trying to convince? — never finds an answer that
    satisfies it, because the audience you are performing for is not in the room.
    You will see the real cost of a self built entirely to pass inspection, and you
    will feel, perhaps for the first time in years, what it is to let the front rest
    for a moment and find that you are still standing.


    This book will not hand you more confidence, and it will not try to fix you. There
    is no five-step framework here for finally feeling worthy, because worth was never
    a problem to be solved. It will not promise that the doubt disappears. What it
    offers instead is quieter and more durable: the recognition that the unsure person
    you have been hiding is not a defect to be managed but the part of you that has
    been telling the truth all along — and that a working life can rest on something
    steadier than the daily labor of never being found out. This is the deeper foundation
    the title was never going to give you.


    The achievement was real. So is the tiredness of defending it. You are allowed
    to be a person in there, not just a performance that has to hold.


    Book 1 of the Second Mountain Press Self-Worth series.'
