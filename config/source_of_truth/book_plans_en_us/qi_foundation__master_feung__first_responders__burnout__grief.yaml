title: The Calls You Carry Home
subtitle: For the responder who has attended a hundred worst days and was never given
  one of their own to mourn — the ones you couldn't save, and the self you were before
  them
cover_tagline: Some of them never got out of the truck with you.
description:
  short_blurb: There is a kind of burnout that is really grief wearing a uniform.
    Not exhaustion, but accumulation — the weight of every call you couldn't fix,
    every loss you weren't allowed to feel because the next one was already coming.
    This is a quiet, unhurried place to finally set some of it down.
  long_description: 'You can name them, if you let yourself. The ones you reached
    too late. The faces you still see when a certain address comes over the radio.
    You learned a long time ago to keep moving — to clear the scene, write the report,
    get back in service — because grief is a luxury the shift doesn''t give you. So
    it didn''t go anywhere. It went down. It settled into the root and stayed.


    This book is for the first responder whose burnout is really an unwept accumulation
    of loss. The one who has attended a hundred worst days and was never given a single
    one of their own to mourn. You may not even call it grief. You call it tired,
    hollow, numb, done. But the body knows the difference between an empty well and
    a buried one, and yours has been carrying something it was never allowed to put
    down — including grief for the person you were before the job asked you to stop
    feeling.


    Here you''ll come to recognize how unmourned loss masquerades as fatigue, how
    the chest holds what the eyes were never permitted to release, and why no amount
    of rest refills a well that is dammed rather than dry. We''ll move slowly, the
    way grief asks to be moved through — not to extract a lesson from what you''ve
    seen, not to reframe it into resilience, but simply to let what has been stuck
    begin to flow again. To let the deep ground soften enough that something can finally
    pass through it and out.


    This is not a book that will help you get over anything. It will not close the
    file on the ones you carry or turn your losses into post-traumatic growth bullet
    points. There is no closure being sold here, no optimizing your way past the ache.
    Grief is not a problem to solve. It is a current that has been blocked, and all
    this book offers is a little room for it to move — at your pace, in your own time,
    with no one timing you.


    You are allowed to mourn them. You are allowed to mourn yourself. What flows again
    when the blockage clears was never weakness; it was the water the root needed
    all along.


    Book 2 of the Root & Meridian Press burnout series.'
