title: There Was No Room Left In You
subtitle: For the nurse running on empty when everything arrives at once — the shift,
  the charting, the codes, and a body that ran out of room to hold any more
cover_tagline: The flood did not break you. You were already full.
description:
  short_blurb: Some days the work does not come one thing at a time. It arrives all
    at once, and there is no room left in you to hold it. This book is for the nurse
    who has been carrying a full unit inside a body that emptied out shifts ago, and
    who needs the ground to stop tilting long enough to set something down.
  long_description: 'It is the third admission before lunch, and you have not had
    lunch. The call lights are stacking. The pager goes off while you are mid-sentence
    with a family who needs you to be calm, and your charge nurse is asking for the
    thing you forgot, and somewhere underneath all of it is the patient in 4 who is
    quietly getting worse. You are doing everything. You are holding all of it. And
    there is a moment, standing at the med cart, where the floor seems to tilt — not
    because anything new went wrong, but because there is simply no room left in you
    to hold one more thing.


    This is a book for that moment. For the registered nurse whose overwhelm is not
    a single crisis but a flood — too much arriving at once, capacity exceeded, no
    space left to think. You have been told to prioritize, to delegate, to manage
    your time, as if the problem were your method and not the weight itself. It was
    never your method.


    You will come to recognize the flood for what it is. You will see how your body
    started bracing before the shift even began, how you stopped feeling hunger and
    thirst because there was no room for them either, how ''I can take one more''
    became the whole architecture of who you are at work. You will feel the difference
    between a mind that is failing and a mind that is simply full past its banks.
    And slowly, on steady ground, you will learn what it is to let something be set
    down — not dropped, not abandoned, set down, with both hands, on purpose.


    This book will not teach you to hold more. It will not optimize your shift or
    hand you a system for doing the impossible with better efficiency. There is no
    productivity here. The whole point is that you were never meant to be a vessel
    with no bottom. The flood is not a flaw in you. It is what happens to anything
    full, when more keeps coming.


    You are allowed to be a person and not a reservoir. You are allowed to have a
    limit and to feel it without apology. The ground is still here, underneath the
    water. It held you before you learned to carry everything, and it is holding you
    now.


    Book 1 of the Held Ground Press Burnout series.'
