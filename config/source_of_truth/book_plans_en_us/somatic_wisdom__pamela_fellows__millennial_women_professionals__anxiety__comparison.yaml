title: Everyone Else Looks Like They've Figured It Out
subtitle: For the woman measuring her insides against everyone's outsides — and always
  coming up short of people who only look calm
cover_tagline: You're comparing your raw footage to everyone's highlight reel.
description:
  short_blurb: She seems so calm. So put-together. So unbothered by the things that
    are quietly unraveling you. This is a book for the woman who measures her anxious
    insides against everyone else's composed outsides — and always loses. It won't
    help you win the comparison. It will help you come home to a body that was never
    meant to be measured.
  long_description: 'She looks so calm. Across the table, across the feed, across
    the open-plan office — she has it together in a way you don''t, and you can feel
    the gap like a cold draft. You scan the room and everyone else seems steadier,
    surer, less likely to be coming apart at the seams the way you are underneath
    your very good blazer. You''re measuring again. And you''re losing, the way you
    always lose, because you''re comparing your raw footage to everyone else''s highlight
    reel.


    This book is for the woman who turns a sharp, high-functioning instrument on herself
    and finds herself wanting. You''re not vain and you''re not insecure in some small,
    fixable way. You''ve learned to take your own anxious, churning insides and hold
    them up against the smooth surfaces of everyone around you — and of course you
    come up short, because you''re seeing their outside and living your inside. The
    comparison isn''t truth. It''s a measurement taken with a broken ruler.


    Here you''ll come to recognize comparison as a body state before it''s a thought
    — the sink in the stomach, the tightening that says less than, the way your eyes
    start scanning for the gap before your mind even forms the words. You''ll learn
    that the people who look calm are not a verdict on you. You''ll learn that calm
    cannot be measured from the outside, and that the steadiness you''re chasing in
    them is something you can only ever find in your own felt sense, your own breath,
    your own ground.


    This is not a book that will help you finally come out ahead. It will not teach
    you to win the comparison, optimize your way to the front, or perform a calm that
    convinces the room. That''s the trap — pointing a high-performance instrument
    at the wrong target: yourself, against everyone else. There is no fixing here
    that makes you measure up. The comparison doesn''t end because you win it. It
    ends because you set the ruler down.


    What you''ll find instead is the felt sense of coming home to your own body —
    the one that was never meant to be graded against anyone. The breath that returns
    you to yourself. The quiet that comes not from being calmer than her, but from
    no longer needing to be.


    You are allowed to stop measuring. You are allowed to be exactly as you are, unranked,
    and still belong in the room. Let your body be the place you finally stop comparing
    from.


    Book 6 of the Felt Sense Publishing Anxiety series.'
