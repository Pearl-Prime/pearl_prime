title: The Day They Find Out
subtitle: For the founder who is sure they bluffed their way in — and is bracing,
  quietly, for the morning the mask finally slips
cover_tagline: You built something real. So why are you still waiting to be exposed?
description:
  short_blurb: You run the company, sign the checks, and lead the room — and underneath
    all of it you are certain you are a fraud who got lucky and hasn't been caught
    yet. This is a book for the founder carrying a secret they overwork to keep hidden.
    It will not help you prove you belong. It will help you stop needing the proof.
  long_description: 'There''s a moment you know well. The room is full, people are
    listening, the numbers are good — and a quiet voice underneath it all says: they
    have no idea who you really are.


    You''ve built something. You signed the lease, made the hires, closed the round,
    shipped the thing nobody believed in. And still you move through your own company
    like a guest who slipped past the door, certain that the day they find out you
    don''t actually know what you''re doing is already coming. So you work harder.
    You over-prepare. You never let them see the gap between the founder they think
    you are and the fraud you''re sure you are. The mask has gotten heavy. You''ve
    forgotten you''re the one holding it up.


    This book is for the founder who carries shame like a second job — the buried
    belief that something is fundamentally wrong with you, hidden under competence,
    deflected with achievement, never named out loud. You don''t think you have imposter
    syndrome. You think you''re an actual imposter. That''s the wound this book walks
    toward.


    You''ll come to recognize the shape of it. The mask you put on so early you stopped
    noticing the weight. The cost it quietly extracts — the praise that never lands,
    the wins that empty out by morning, the exhaustion of guarding a secret that was
    never as true as it felt. You''ll meet the hidden belief underneath the performance,
    the one that says your worth is conditional and one mistake from being revoked.
    And you''ll learn what it is to stand at that threshold without bracing — to let
    the fear be in the room and act anyway, the way a trained fighter meets what scares
    them: clear-eyed, grounded, with nothing left to prove.


    This book will not hand you confidence. It won''t help you finally feel like you''ve
    earned the chair, and it won''t make the doubt disappear. There is no script here
    for silencing the voice, no affirmation to repeat until it''s true. The aim is
    steadier and harder: to keep building while the doubt is still standing right
    beside you, and to stop treating it as a verdict.


    You are not a fraud who got lucky. You are someone who learned to hide so well
    that you started believing the hiding place was you. You can set the mask down
    now. The ground was always underneath it.


    Book 1 of the Iron Gate Press imposter syndrome series.'
