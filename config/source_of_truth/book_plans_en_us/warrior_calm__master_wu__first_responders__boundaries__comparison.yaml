title: Everyone Else Just Absorbs It
subtitle: For the first responder who measures their own breaking point against the
  crew who seem to take everything — and always comes up looking soft
cover_tagline: You're measuring your inside against their outside.
description:
  short_blurb: Look around the bay and everyone else seems to take it without flinching
    — the calls, the doubles, the things you can't unsee — while you're the one who
    needs a minute. So you say nothing and absorb more. This is a book about measuring
    your own limits against everyone who looks unbreakable, and always coming up short.
  long_description: 'You see it on every shift. The senior medic who shrugs off the
    call that''s still sitting in your chest. The partner who works the double and
    shows up the next day fine. The whole crew that seems to absorb whatever the job
    hands them and never once flinches. And then there''s you — needing a minute,
    needing the line, needing something they apparently don''t. So you keep quiet.
    You take more than you should. Because if everyone else can carry it, what does
    it say about you that you can''t?


    This is the comparison that runs underneath the boundary you never set. Not the
    loud kind. The quiet kind — the constant background math where you measure your
    own breaking point against everyone who looks unbreakable, and always come out
    the one who''s soft. You''ve built a whole private ranking of who can take what,
    and you''re convinced you''re near the bottom of it. So you absorb. You overextend.
    You set no limits, because limits are for people who can''t keep up, and you''d
    rather break in private than admit you have an edge they don''t.


    This book is for the first responder who scans the room and finds themselves wanting.
    For the one who''s sure the others are built sturdier, calmer, more capable —
    that their own need for a boundary is a defect everyone else outgrew. For the
    one who never says ''this is too much'' because it seems like no one else has
    to. You will come to recognize that you have been comparing your inside to their
    outside. That the calm you envy is, more often than not, the same suppression
    that''s quietly costing you. That the people who look like they absorb everything
    are usually just better at hiding the bill.


    This will not help you win the comparison. That''s the point. There is no version
    of you that finally out-absorbs the crew, no limit you can erase that makes you
    the unbreakable one. This book will not harden you into the person you think everyone
    else already is. What it offers is the way out of the contest entirely — the recognition
    that the line you need is not a mark against you, and that drawing it does not
    move you down the ranking. It takes you off the board.


    You were never behind. You were just looking at the wrong scoreboard. Put it down.
    The line you draw is yours, and it was never theirs to grade.


    Book 3 of the Iron Gate Press boundaries series.'
