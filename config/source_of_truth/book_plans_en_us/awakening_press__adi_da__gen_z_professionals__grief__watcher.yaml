title: The Part of You That Never Stopped Bracing
subtitle: For the grieving mind that won't settle — reading every quiet phone and
  every late reply as proof the next loss is already on its way
cover_tagline: You survived the worst news once. Now some part of you is always braced
  for the next.
description:
  short_blurb: After the loss, a part of your mind never softened. It checks that
    everyone you love is still breathing. It reads catastrophe into an unread text.
    This is a book for the anxious, hypervigilant grief that calls itself caution
    — and for the exhaustion of bracing against the world ever since the ground fell
    away. It won't tell you to relax. It will show you, gently, what is doing the
    watching.
  long_description: 'Your phone buzzes and your stomach drops before you''ve even
    looked. Someone you love takes too long to reply and a small, certain voice tells
    you the worst has happened again. You lie awake running the quiet inventory: who''s
    safe, who''s reachable, what you would do if. You call it being responsible. You
    call it caring. But somewhere you know you have not truly exhaled since the day
    the ground fell away beneath you.


    This is a book for you — the one whose grief didn''t soften into sadness but tightened
    into watching. You learned, in a single unforgettable moment, that the floor can
    open without warning. And so a part of your mind has been keeping a kind of vigil
    ever since, reading every silence as a warning and every goodbye as possibly the
    last, because once, unbearably, it was.


    You are young, and you are already tired in a way that sleep does not touch. You
    will come to recognize the full shape of this fear. The false alarms that go off
    in a perfectly calm room. The way dread floods in when too many small worries
    arrive at once. The single thought about losing someone that spirals into a thousand.
    The quiet shame of feeling like "too much," of needing the people you love to
    keep proving they''re still here. And beneath all of it, the unspoken hope that
    if you stay alert enough, you can keep loss from ever finding its way in again.


    This book will not tell you to stop worrying, because this fear did not come to
    ruin your life — it came to protect it, after the worst had already happened.
    It will not hand you a technique to switch the worry off like a faulty alarm.
    There is no fix here for a heart that learned its lesson too well, and no schedule
    for when you should feel safe.


    What you''ll find instead is a gentle turning of attention. Away from the dangers
    the fear keeps tracking, and toward what is doing the watching. Because the part
    of you that is exhausted from bracing is not the whole of you. There is an awareness
    behind it — open as the sky behind passing weather, unhurried, already here —
    that does not need to brace, because it was never the thing that could be lost.
    From there, the fear can begin to loosen its grip. Not because the world became
    safe, but because you remembered what in you was never in danger.


    You don''t have to keep watch tonight. You''re allowed to let the sky hold the
    weather for a while.


    Book 2 of the Awakening Press grief series.'
