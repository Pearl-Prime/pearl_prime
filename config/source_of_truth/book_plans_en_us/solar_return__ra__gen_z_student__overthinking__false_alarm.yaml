title: Nothing Is Wrong and You Still Can't Breathe
subtitle: For the student whose body sounds the alarm at 2 a.m. over a text, a grade,
  a tone you can't name — bracing for danger that never comes
cover_tagline: Your alarm is going off. There is no fire. There has not been one for
  a while.
description:
  short_blurb: You are safe and your chest does not believe it. This is for the overthinker
    whose body keeps firing the alarm over things that haven't happened and probably
    won't — the unread text, the look in a seminar, the deadline two weeks out. It
    will not talk you out of the feeling. It will sit with you until the warmth comes
    back.
  long_description: 'It comes on without warning. You are lying in bed, or halfway
    across the quad, or staring at a half-typed message, and suddenly your chest is
    tight and your hands are cold and some old part of you is absolutely certain that
    something is wrong. You scan for the fire. You can''t find it. And so the mind,
    helpful as ever, decides the fire must be you.


    This book is for the student whose alarm never quite quiets. You are not in danger
    and your body has not gotten the message. A professor''s flat reply, a friend
    who left you on read, a grade you haven''t seen yet — and the same surge arrives,
    the same bracing, as if the worst were already here. You have spent so long living
    at the edge of an emergency that calm itself can feel suspicious, like the quiet
    before something.


    Here you''ll come to recognize the false alarm for what it is. How the body confuses
    a hard feeling with a real threat. How overthinking is the mind trying to find
    a danger big enough to justify the dread — and how the search itself keeps the
    alarm ringing. You''ll learn what it feels like when the surge crests and breaks
    on its own, without you fixing anything, without you figuring it out. You''ll
    see that the absence of catastrophe is not luck you have to earn each day. It
    is just the truth your nervous system hasn''t caught up to yet.


    This book will not promise you a calm you can summon on command. It won''t hand
    you a breathing technique and call you fixed. It won''t pretend the alarm will
    never sound again — it will, because you are wired to care, and that wiring is
    not a defect. What it offers instead is recognition: a warm hand on a cold shoulder,
    a voice in the next room saying you''re alright, you''re alright, even when your
    body swears you aren''t.


    There is nothing to brace for tonight. You are allowed to let the alarm ring out
    and discover that nothing was coming. You are allowed to feel the warmth return
    to your hands. You are allowed, finally, to let the alarm go quiet.


    Book 1 of the Ember & Ash Publishing overthinking series.'
