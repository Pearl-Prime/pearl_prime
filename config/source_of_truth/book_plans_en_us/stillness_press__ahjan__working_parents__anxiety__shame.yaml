title: The Parent You're Afraid You Are
subtitle: For the parent overworking to cover a buried belief that something is wrong
  with them — meeting the shame underneath the anxiety
cover_tagline: You're not hiding a flaw. You're hiding a wound.
description:
  short_blurb: 'Underneath the over-functioning, the apologizing, the relentless trying,
    there is a quiet conviction you rarely say aloud: that something is fundamentally
    wrong with you, and if anyone saw the real you, they''d know. This book is for
    the parent whose anxiety is built on shame. It will not fix what was never broken.'
  long_description: 'You overwork. You over-apologize. You say yes when you are already
    empty, you reread the message you sent for a tone that wasn''t there, you lie
    awake replaying the moment you snapped at your child and let it stand in as proof.
    Proof of what you''ve believed for longer than you can remember: that something
    is wrong with you, deep down, and that all of this effort is the price of keeping
    it hidden.


    This is shame — not guilt, which says you did a bad thing, but shame, which whispers
    that you are a bad thing. For a parent it is especially cruel, because it takes
    the love you feel most fiercely and turns it into evidence against you. Every
    imperfect moment becomes a verdict. Every comparison becomes confirmation. And
    so you overdo, and overgive, and overperform, trying to cover a defect that was
    never actually there.


    This book is for you: the one who is sure they''re getting it wrong while doing
    more than anyone around them. The one who can''t accept the compliment, who flinches
    at their own reflection in the day''s small failures. The one who is so busy hiding
    the supposed flaw that they''ve never once been allowed to simply be seen. You
    are not defective. You absorbed a belief, somewhere, long ago, that you have been
    overpaying for ever since.


    Gently, you''ll come to recognize shame''s voice and tell it apart from the truth.
    You''ll feel how it lives in the body as a wish to disappear, a heat in the face,
    a bracing against being known. You''ll learn that the frantic doing is not a moral
    duty but a cover story, and that the wound underneath it does not heal by being
    worked harder — only by being met, the way you would meet a frightened child who
    believed they were unlovable. With light coming in slowly. With nothing required.


    This book will not promise to fix you, because you were never broken — and any
    book that claims to fix you only agrees with the shame. It won''t hand you a self-improvement
    plan to finally become acceptable, or turn your worth into one more thing to earn.
    There is no defect here to correct. There is only a tender, real un-learning of
    the belief that you are one.


    You are allowed to set the cover story down. You are allowed to be seen, unfinished,
    exactly as you are tonight, and to discover that nothing terrible happens when
    you are.


    That discovery is where the stillness begins.


    Book 4 of the Stillness Press anxiety series.'
