title: They Make Walking In Look Easy
subtitle: For the high schooler who clocks every classmate who strolls into the room
  like it's nothing — and decides, again, that they're the only one faking it
cover_tagline: You're watching everyone else exist like it's nothing.
description:
  short_blurb: Everyone else seems to have gotten the manual. They walk in, they talk,
    they exist in a room without rehearsing it first — and you're standing there doing
    math on how far behind you are. This is a book for the mind that turns every social
    situation into a scoreboard you're losing.
  long_description: 'You''re at the edge of it again, watching. Everyone else just
    walks in. They talk without scripting it. They laugh at the right time. They post
    the photo without checking it forty times. They exist in a room like it costs
    them nothing — and you''re standing there running the numbers on exactly how far
    behind you are, how late you are to a thing everyone else figured out in middle
    school.


    This book is for the high schooler who turned social life into a scoreboard. The
    one who can tell you, to the decimal, how much more natural everyone else is.
    You scroll and it''s evidence. You walk through the hallway and it''s a measurement.
    Somewhere you decided everybody got a manual for how to be a person, and you missed
    the day it was handed out, and now you''re just faking your way through, always
    a beat behind people who make it look like breathing.


    You''ll come to recognize what the comparison is actually doing. How you''re matching
    your inside — the bracing, the rehearsing, the dread — against everyone else''s
    outside, which is the only part you can see. How the calmest-looking kid in the
    room might be running the exact same math you are. You''ll feel how comparison
    disguises itself as honesty, like you''re just being realistic about where you
    rank, when really it''s a habit that feeds on you and calls itself the truth.
    And you''ll see what it costs to keep score in a game nobody else even knows is
    being played.


    Nothing here will help you win the comparison. That''s the point. There''s no
    chapter that makes you the easy one, the natural one, the one who walks in without
    the dread. Nobody is going to hand you the manual you think everyone else got,
    because there isn''t one, and the people you''re measuring against don''t have
    it either. No glow-up. No confidence to grind for. You are not a profile to optimize
    until you finally rank.


    What''s here is permission to put the scoreboard down. You''ll still catch yourself
    measuring — the habit is old and the feed never stops feeding it. But you''ll
    start to see the math for what it is: a comparison between your whole anxious
    interior and a hundred curated exteriors, a contest that was rigged before you
    ever stepped in. And you don''t have to win a game that was never real to begin
    with.


    You''re not behind. You''ve just been pointing a very sharp instrument at the
    wrong target: yourself, in a room full of people doing the same.


    Book 3 of the Present Tense Books social anxiety series.'
