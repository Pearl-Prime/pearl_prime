title: 'The Line You Never Drew: Carrying What You Can''t Say'
subtitle: How Tech and Finance Professionals Are Rewriting the Rules of Setting Boundaries
cover_tagline: You don't lack boundaries. You're protecting a belief you've never
  said out loud.
description:
  short_blurb: You can't set the limit because some part of you is sure that needing
    one means you're not cut out for this. In tech and finance, the boundary you never
    draw is guarding a quiet shame. This is a book about finally saying the thing
    you've been carrying.
  long_description: 'You typed the message. "I can''t take this on right now — my
    plate is full." You read it four times. Then you deleted it and wrote "yeah, I
    can make that work," because sending the first version felt like confessing something.
    Not that you were busy. That you were the kind of person who gets overwhelmed
    by a normal workload — which, you''re convinced, is a problem with you.


    This book is for the people in tech and finance who can''t set a boundary because
    of what they think the boundary reveals. The engineer who''d rather burn a weekend
    than admit the scope is too much. The associate who treats "I need help" as a
    status downgrade. The high performer carrying a buried belief that the limit isn''t
    a normal human limit — it''s evidence they don''t belong in the room.


    Ana Reyes names the real engine here, and it isn''t time management. It''s shame.
    The reason you can''t say no is that somewhere underneath, you''ve decided that
    needing a limit means something is wrong with you — that everyone else is handling
    what you can''t. So you keep saying yes to outrun the belief, and the belief gets
    heavier every time you do.


    The book goes down into that quiet place instead of papering over it. You''ll
    get close to the thing you''ve never said out loud: the fear that your capacity
    is the problem, that asking for room is admitting a flaw. You''ll feel the shame
    instead of performing your way out of it. That descent — staying with the belief
    long enough to actually look at it — is where it loses its grip. Shame can''t
    survive being named in plain words.


    Then you come back up able to hold a limit without it meaning anything about your
    worth. You''ll learn that "this is too much" is a fact, not a confession. That
    a boundary is information, not an indictment. That you can let someone see your
    edges and still be exactly as capable as you actually are.


    This will not promise you instant confidence or a way to never feel the shame
    again. It won''t reframe your limits into a strength you can put on a perf review.
    There''s no affirmation to repeat in the mirror. There is only the honest work
    of carrying what you couldn''t say — and then, finally, saying it.


    The limit was never proof of a flaw. You''re allowed to need it, out loud.'
