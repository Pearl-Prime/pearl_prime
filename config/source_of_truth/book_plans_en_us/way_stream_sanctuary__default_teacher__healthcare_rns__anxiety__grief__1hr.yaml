cover_tagline: You charted the time of death and went straight to your next patient.
  It's still in you.
description:
  short_blurb: You've watched people die and kept moving, because there was a call
    light and a med pass and no room to stop. This is the one-hour reset for the nurse
    carrying losses she was never given time to feel. Read it in a single sitting
    and set the weight down — not to forget, but to finally let it move.
  long_description: 'There''s a patient you still think about. Maybe a whole list
    of them. You were there at the end, you did everything right, and then you washed
    your hands, charted it, and walked into the next room to start a fresh assessment
    like nothing had happened. Because that''s the job. There is never a pause built
    in for what you just witnessed.


    This hour is for the nurse who has been collecting grief for years without anywhere
    to put it. Not just the deaths — the families who fell apart in the hallway, the
    ones who didn''t make it that you''ve quietly decided were somehow your fault,
    the version of yourself who started this work softer than you are now. You carry
    all of it, stacked and unspoken, and you''ve started to mistake the weight for
    who you are.


    The recognition is that this heaviness isn''t weakness and it isn''t burnout in
    the way the posters mean it. It''s grief that never got to finish. You felt it
    for ninety seconds in the supply room and then went back to work, and it''s been
    waiting in your body ever since, low and constant, dressed up as anxiety. The
    alarm tells you you''re broken. You''re not broken. You''re loaded.


    Then we go down into the weight, gently, instead of around it. Not to make you
    cry on command, not to process every loss out loud, not to fix what can''t be
    fixed — the patient is still gone, and no book changes that. But you can stop
    bracing against your own grief. You''ll learn to feel the heaviness as grief rather
    than as proof that something''s wrong with you, and to let it move through instead
    of compacting it down one more time. You come back able to recognize it the next
    time it rises mid-shift: that''s not anxiety, that''s something I lost.


    This book will not promise closure. It won''t tidy your losses into lessons or
    hand you a ritual to perform on your break. There''s no forced peace here, no
    tidy redemptive meaning, no pretending the death you saw was secretly beautiful.
    The work is plainer and more honest: feel the weight, name what it is, let it
    be heavy without letting it become you.


    What you get is a little air around the thing you''ve been carrying alone. You
    are allowed to grieve patients who were never yours to keep. You are allowed to
    set the weight down at the end of a shift and pick your life back up. The alarm
    calls it damage. It was love that didn''t get to land. You can let it land now.'
