title: Your Shoulders Won't Set the Shift Down
subtitle: For the first responder lying in a dark, quiet room while the body still
  braces for a radio that won't crackle — learning, in the hours before dawn, to let
  the day's weight finally leave the muscle
cover_tagline: The shift ended hours ago. Your body never got the message.
description:
  short_blurb: You came home, but the flood didn't. The sounds, the faces, the next
    thing and the next thing all land at once, and there's no floor left to stand
    on. This book doesn't drain the flood. It sits with you in it, and shows you where
    the ground still holds.
  long_description: 'It''s late, and you''re finally still — and that''s exactly when
    it comes. Not one thing. Everything. The call you ran today, the one from Tuesday,
    the report you didn''t finish, the look on a stranger''s face, all of it arriving
    at once with no order and no off switch. Your chest is tight. Your jaw is set.
    Your body is doing the work of a dozen shifts in a dark room where nothing is
    happening. You are not resting. You are drowning quietly, and you''ve learned
    to do it without making a sound.


    This book is for the paramedic, the firefighter, the EMT — the one who absorbs
    other people''s worst days for a living and then comes home to a body that won''t
    stop replaying them. The one who was trained to manage the scene but was never
    shown what to do when the scene moves in and takes up residence. If you''ve felt
    like your own nervous system is a room with too much furniture and no door, this
    was written for you.


    Chapter by chapter, you''ll come to recognize what overwhelm actually is in the
    body — not a character flaw, not poor coping, but a system that took in more than
    it could metabolize and is still, hours later, trying to. You''ll see why the
    flood arrives the moment you finally go still, why everything feels equally urgent
    at 3am, and how the body, given the smallest amount of room, knows how to begin
    setting the load down on its own. The practice asked of you is quiet. It fits
    in the cab of the rig, on the floor of the bunk room, in the dark before sleep.


    This book will not optimize you. It will not make you tougher, or faster, or hand
    you a morning routine to outrun the feeling. It will not promise the flood will
    never come again. There is no fix here, because you were never broken — only carrying
    more than any one body was built to hold alone.


    What it offers instead is this: a steady voice in the next room, the weight named
    and witnessed, and permission — finally — to stop bracing against your own life
    for one honest hour. You don''t have to hold all of it tonight. You can set it
    down here, on a floor that will bear it. It will still be morning when you wake.


    Book 1 of the Night Architecture Books somatic healing series.'
