title: The Person You Were Before the Kids
subtitle: For the parent grieving the friendships, the ambitions, and the unburdened
  self that quietly went still in the becoming — the loss underneath the love that
  no one let you mourn
cover_tagline: No one told you that becoming a parent was also a goodbye.
description:
  short_blurb: Some depression is grief that never got named. Underneath the love
    for your children can sit a quiet, unspoken loss — the person you were, the life
    you imagined, the version of yourself the years quietly took. This book gives
    that grief somewhere to go, so it stops coming out sideways as a flatness you
    can't explain.
  long_description: 'You love them. That was never in question. And still, on certain
    ordinary afternoons, something aches in a way you don''t have permission to feel
    — a low grey grief with no funeral, no card, no one to send flowers. You catch
    a song you used to love, or an old photo of yourself looking unburdened, and a
    door opens onto a loss you''ve never been allowed to name. Then you close it,
    because what kind of parent mourns the very life that gave them their children?


    This book is for the parent carrying a grief that has no language. Not regret
    — you would choose them again. But somewhere in the becoming, a self was set down
    and never picked back up: the friendships that thinned, the ambitions that quietly
    went still, the spontaneity, the body that was only yours, the future you''d half-drawn
    before it was redrawn for you. When a loss is real but unspeakable, it doesn''t
    disappear. It goes underground and surfaces as the flatness you keep calling depression
    — grief wearing a grey coat because you wouldn''t let it wear black.


    In these pages you''ll come to recognize the shape of what you''ve lost, and why
    naming it is not a betrayal of the people you love. You''ll see how unmourned
    grief settles into numbness — how the feelings you weren''t allowed to have didn''t
    leave, they just stopped moving, like water that has nowhere to run. And you''ll
    find what it means to let the old self be grieved properly, so it can finally
    rest, and you can stop carrying it as a weight you''re not even allowed to admit
    is there.


    This book will not tell you to count your blessings or remind you how lucky you
    are. It will not rush you toward gratitude or hand you a silver lining to swallow.
    It will not turn your grief into a project with milestones. There is no fix here,
    because grief is not a problem to be solved — it is a love with nowhere to go,
    and it asks only to be witnessed.


    Nothing here will give the old life back. That''s the point. But what is grieved
    can be laid down, and a self that has been properly mourned stops haunting the
    house. You''re allowed to miss who you were and still be exactly who they need.


    Book 2 of the Stillness Press depression series.'
