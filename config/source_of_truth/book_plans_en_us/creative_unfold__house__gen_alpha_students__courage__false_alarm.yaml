title: Your Heart Is Lying to You
subtitle: For the student who freezes before they speak — learning to tell a real
  danger from an alarm that fires over nothing at all
cover_tagline: It feels like a cliff. It is only a classroom.
description:
  short_blurb: Your hand is half-raised, your heart is slamming, and your whole body
    is screaming that something terrible is about to happen. It isn't. This is a book
    about the alarm inside you that goes off when there is nothing to be afraid of,
    and how to take one small step while it's still ringing.
  long_description: 'You know the moment. The teacher asks the question, the answer
    is right there, and your body decides you are in danger. Heart pounding. Face
    hot. A voice that won''t come out. By the time the alarm quiets, the moment is
    gone, and you tell yourself you''ll speak up next time. You always tell yourself
    next time.


    This book is for you — the one who looks calm on the outside and is bracing for
    impact on the inside. Not because anything is actually wrong, but because somewhere
    along the way your body learned to treat being seen like a threat to survive.


    Here is the thing nobody explained: that feeling is not a verdict. It is an alarm.
    And alarms go off for real fires and for burnt toast, and they ring exactly the
    same either way. You will come to recognize the difference. You will feel the
    false alarm fire before you raise your hand, before you post the thing, before
    you walk into the room — and you will learn that the alarm is not the same as
    the danger, and that you are allowed to move while it is still loud.


    We will sit at the edge together. The cliff that turns out to be a curb. The blank
    page your body swears is a test you''re about to fail. You''ll learn what the
    alarm is actually trying to protect, why it fires so easily for someone your age,
    and what one small mark you can make before the fear has finished talking.


    This book will not make you fearless. It won''t hand you a trick to delete the
    feeling or a five-step plan to never freeze again. The alarm is part of being
    a person who cares, and we are not going to rip it out of you. We are just going
    to stop letting it run the whole show.


    What you''ll find instead is permission. Permission to have a body that overreacts
    and a voice that shakes and a heart that lies, and to raise your hand anyway.
    To make the thing badly. To step before you feel ready, because ready is a feeling
    that mostly arrives after you move, not before.


    You are not broken. Your alarm is just sensitive, and sensitive is not the same
    as wrong. Let''s learn its language together, so the next time it goes off over
    nothing, you can hear it, thank it, and go ahead and speak.


    Book 1 of the Blank Canvas Books courage series.'
