title: She Makes It Look So Easy
subtitle: For the woman who measures herself against everyone who seems further ahead
  — and quietly comes up short every time
cover_tagline: You keep auditing your life against hers, and the verdict is always
  the same.
description:
  short_blurb: Everyone else seems to have it more figured out — the promotion, the
    ease, the life that photographs well. This is a book for the woman who measures
    herself against all of them and always loses. It won't help you win the comparison,
    because winning was never the way out.
  long_description: 'You open the app to rest for a minute, and there she is. Further
    along. More at ease. Doing the thing you''ve been telling yourself you''ll get
    to. And just like that, the quiet math starts — where she is, where you are, how
    far behind you''ve fallen without noticing.


    It''s not just the feed. It''s the colleague who got there younger. The friend
    whose life seems to assemble itself effortlessly. The woman across the room who
    makes it all look easy. You measure, and the verdict comes back the same every
    time: not enough. Not yet. Not like her.


    This book is for the woman who has turned a sharp, capable mind toward the steady
    cataloguing of her own shortfalls. Who can be genuinely happy for someone and
    gutted by them in the same breath. Who knows, intellectually, that comparison
    is a trap — and falls into it anyway, a dozen times a day, because the ache underneath
    is older than any feed.


    We''ll turn toward that ache instead of away from it. You''ll come to recognize
    the habit for what it is — not vanity, not weakness, but a worth you''ve quietly
    agreed to hold hostage to other people''s lives. You''ll feel the cost of it:
    how much of your one life gets spent watching someone else''s, how comparison
    promises a finish line and only ever moves it. You''ll see how the people you
    measure against are themselves edited, partial, mid-struggle — that you''ve been
    holding your own insides up against everyone else''s outsides. And underneath
    all of it, you''ll find the belief doing the real damage: that your worth is a
    rung on a ladder, something to be earned by passing the people ahead of you.


    This book will not help you win. There''s no strategy here for getting ahead,
    no quiet method for finally measuring up, nothing to win at all. That was never
    the way out. You can''t out-achieve a wound that says you don''t count unless
    you''re first. What''s offered instead is quieter and far more durable: the slow
    return to a worth that was never up for comparison, set back into your hands by
    one voice that isn''t keeping score.


    You are allowed to stop ranking yourself. You are allowed to be exactly where
    you are, and to be enough there.


    Book 2 of the Heart Transmission Press self worth series.'
