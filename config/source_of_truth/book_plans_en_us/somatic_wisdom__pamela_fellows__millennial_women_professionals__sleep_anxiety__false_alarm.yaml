title: The Alarm That Won't Switch Off at Night
subtitle: For the exhausted high-achiever whose body braces for danger the moment
  the lights go out — and a gentler way to tell it you're safe
cover_tagline: Your body isn't broken. It's still standing guard over a threat that
  ended hours ago.
description:
  short_blurb: You did everything right and your body answered by snapping wide awake
    the second the room went dark. This is for the woman whose nervous system treats
    bedtime like a threat — and it will show you, from the body and without force,
    how to let that old alarm finally stand down.
  long_description: 'It is the cruelest trick. You are flattened with tiredness all
    day, you finally lie down, and the instant the lights go out your body floods
    with a quiet, wordless alarm. Your jaw sets. Your shoulders climb toward your
    ears. Your heart picks up for no reason you can name, and some watchful part of
    you scans the dark for a danger that is nowhere in the room. You are bracing for
    something — and you couldn''t tell anyone what.


    This book is for the woman who is safe but cannot feel safe. The one who holds
    it together all day at a demanding job and then lies awake at 2am, certain her
    body has simply forgotten how to do the one thing it was built for. You are not
    weak. You are not failing at rest. Your nervous system is doing exactly what it
    learned to do — staying ready, staying on, treating the stillness of bedtime as
    the most dangerous moment of the day because that is when it finally has nothing
    left to manage.


    Working gently, from the body and never against it, you will come to recognize
    the false alarm for what it is. You''ll feel the difference between being safe
    and feeling safe — and learn why your mind already knows the room is fine while
    your body refuses to believe it. You''ll find the braced places you''ve been carrying
    for so long you stopped noticing them, and you''ll learn to bring warmth back
    to them, breath by breath, instead of bullying them into silence. You''ll come
    to understand the false alarm not as a malfunction to fix but as a frightened
    part of you that has been on watch far too long, and is finally allowed to rest.


    This is not a protocol. There is no tracker here, no perfect routine, no willpower
    required. Nothing in these pages will optimize your sleep or hand you a checklist
    to fail at. This book will not ask you to push through, override, or out-discipline
    your own body — because that is the very pressure that keeps the alarm ringing.


    What it offers instead is slower, and truer: a way to be in your body at night
    that doesn''t feel like a fight. Your body is not your enemy. It has been guarding
    you for years, faithfully, against a danger that is no longer here. Tonight, you
    can begin to let it know.


    Book 1 of the Felt Sense Publishing sleep anxiety series.'
