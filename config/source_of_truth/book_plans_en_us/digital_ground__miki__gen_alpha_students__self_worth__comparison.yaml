title: Your Life Looks Worse From Inside It
subtitle: For the student who opens the feed feeling fine and closes it a few inches
  smaller — because an ordinary, unposted Tuesday can't compete with everyone else's
  highlights
cover_tagline: You're grading yourself against a feed that was never real.
description:
  short_blurb: 'Open the app and there they are: people exactly your age who already
    seem to have the friends, the skin, the plan, the unbothered calm. You close it
    feeling a few inches smaller than before. This book is for the student who measures
    their behind-the-scenes against everyone else''s highlight reel and somehow always
    loses. It won''t help you win the comparison. That''s the whole point.'
  long_description: 'It''s late, and you''re scrolling. There''s the person your age
    who already has the internship, the relationship, the apartment that looks like
    a mood board. There''s the one who seems calm in a way you''ve never once felt.
    There''s the one who''s just... easy with themselves, like they got an instruction
    manual you didn''t. You started the night feeling fine. Twenty minutes in, you
    feel like you''re standing slightly behind your own life, watching everyone else''s
    start without you.


    This book is for you. The one who turned themselves into a measurement — who can''t
    see a person their age without instantly running the math on who''s ahead. You
    compare your messy inside to everyone else''s clean outside and call the gap proof.
    You refresh to feel something and it only ever takes something. You''re not vain
    and you''re not failing. You''ve just aimed a very precise instrument at the worst
    possible target: yourself, mid-scroll, in the dark.


    What you''ll come to recognize is how the comparison actually works — and how
    rigged the game was from the first frame. You''ll see the mask everyone''s wearing,
    including the ones who look most arrived. You''ll feel the exact cost of grading
    your whole worth on a curve set by a feed. You''ll find the belief hiding underneath
    the scrolling — that you''re behind, that everyone else got a head start, that
    there''s a timeline and you''re failing it — and you''ll watch it come apart,
    because it was never true. There''s no race. There''s no curve. There was never
    a line you were behind.


    Nothing in here will help you win. You won''t out-post them, out-glow them, or
    finally pull ahead. That''s the point. The comparison isn''t a contest you''re
    losing — it''s a lens, and you can set it down.


    And when you do set it down — when the phone goes face-down on the duvet and the
    feed stops feeding you other people — there''s this quiet that rushes in. The
    room is still here. Your breath is still here. The night didn''t go anywhere while
    you were grading yourself against strangers. It was just waiting for you to look
    up.


    What this book offers instead is the strange quiet of looking up from the feed
    and finding that your actual life — the unfiltered, unposted, ordinary one happening
    in this exact room — was never behind anyone''s. It was just yours. And it was
    always enough.


    You can stop running someone else''s numbers on yourself. You were never behind.
    You were just looking down.


    Book 2 of the Present Tense Books self worth series.'
