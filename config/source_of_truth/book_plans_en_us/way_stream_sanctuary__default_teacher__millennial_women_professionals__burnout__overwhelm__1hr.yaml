title: 'After the Flame: When Everything Is Too Much'
subtitle: A One-Hour Burnout Reset for Professional Women
cover_tagline: Everything is urgent, nothing is finished, and you're the one holding
  all of it.
description:
  short_blurb: When the inbox, the Slack pings, the deadlines, and the people who
    need you all hit at once, your nervous system stops being able to tell big from
    small. This is one hour to stop drowning in the pile and feel the ground under
    one single thing again.
  long_description: 'You open your laptop and the day comes at you all at once: forty-one
    unread, three meetings you''re underprepared for, a deliverable that was due yesterday,
    a text from your mom you haven''t answered in a week. Your chest tightens. You
    toggle between tabs without finishing anything, and the harder you try to get
    on top of it, the more it multiplies. This hour is for the woman who is unmistakably
    good at her job and is quietly going under, because there is simply too much,
    and it all wants her at the same time.


    This is for you if competence stopped being the problem a while ago. You can do
    any one of these things. It''s the all-at-once that flattens you, the way every
    task feels equally on fire, the way you can''t decide what to do first so you
    do a little of everything and finish none of it. You''ve tried better systems.
    You''ve tried waking up earlier. The pile doesn''t shrink, because the issue was
    never your method. It''s that you''re carrying more than any one person was built
    to hold and still expecting yourself to feel calm about it.


    So we''re not going to optimize the pile. First you''ll recognize what overwhelm
    actually is: not a character flaw, not poor time management, but a nervous system
    that''s lost the ability to sort big from small because everything is screaming
    at once. Then you''ll go down into it instead of bracing against it, and feel
    what''s underneath the buzzing. Then you''ll come back up able to put your hand
    on one real thing, not because the list got shorter, but because you did.


    This book will not give you a productivity system. It won''t promise inbox zero,
    or a color-coded method that finally makes it all manageable. It won''t tell you
    to just delegate, as if the problem were that you hadn''t thought of that. The
    flood is real, and you''re not failing for feeling it.


    What it offers is the part the productivity advice skips: how to stop white-knuckling
    the whole avalanche and let your system come down far enough to touch one thing
    at a time. You don''t have to get on top of all of it to stop drowning. You don''t
    have to feel calm about your workload to set the pile down for an hour. You''re
    allowed to stop holding everything at once, starting now.'
