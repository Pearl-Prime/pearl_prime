title: Too Much, and Nothing Left
subtitle: For the parent who runs every lunchbox and pickup on time and can't feel
  a single one of them — when the load stopped feeling heavy and started feeling like
  nothing at all
cover_tagline: You didn't burn out loud. You just went quiet.
description:
  short_blurb: There is a kind of depression that doesn't arrive as sadness — it arrives
    as a flat grey hum after years of holding everything at once. This is a book for
    the parent who is still doing it all and can't feel any of it. It won't ask you
    to do more; it will help you understand the numbness that came when there was
    no room left to feel.
  long_description: 'It doesn''t look like depression from the outside. The lunches
    get made. You answer the emails, you show up at pickup, you keep the whole quiet
    weather of the household moving. But somewhere along the way the load stopped
    feeling heavy and started feeling like nothing at all — a flat grey hum where
    the rest of you used to be. You tell people you''re tired. Tired isn''t the word.
    The word is closer to gone.


    This book is for the parent who has been at capacity for so long that capacity
    became the whole sky. The one who can''t point to a single catastrophe, only an
    unrelenting too-much that never let up long enough to be felt — the second job
    that begins when the first one ends, the night-waking, the mental list that never
    empties, the years of being needed without a single hour that was only yours.
    When too much arrives for long enough, the mind does something quiet and protective:
    it stops letting things land. The numbness you''re calling failure is the flood,
    gone still.


    In these pages you''ll come to recognize how overwhelm becomes flatness — how
    a self that has run at a flood line for years finally lets the water go grey and
    motionless, not because you''re weak but because feeling everything was no longer
    survivable. You''ll see how the grey is not the absence of love for your children;
    it is the cost of carrying that love with nothing underneath it. And you''ll find
    what it means to set one corner of the weight down, for one honest hour, without
    abandoning a single person who needs you.


    This book will not optimize your mornings. It will not hand you a routine, a gratitude
    practice, or one more thing to do well. There is no program here to fall behind
    on. It will not tell you that you''re lucky and should feel it. The flatness is
    not a character flaw to fix; it is information about a load no one was ever meant
    to carry alone, and information can be listened to instead of beaten.


    Nothing here asks you to feel more than you can. That''s the point. You''re allowed
    to be this empty and still be a good parent. You''re allowed to put the weight
    down for the length of one chapter and pick up only what is actually yours.


    Book 1 of the Stillness Press depression series.'
