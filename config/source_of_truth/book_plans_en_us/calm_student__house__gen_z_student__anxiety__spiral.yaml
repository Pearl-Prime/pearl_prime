title: One Thought, Then a Thousand, by 3am
subtitle: For the student who can't stop the loop — when a single worry splits into
  a hundred and pulls you down all night long
cover_tagline: It started with one thought. Now you've replayed the whole semester.
description:
  short_blurb: 'It started with one small worry, and by 3am it has become a thousand
    — every old embarrassment, every possible failure, every worst-case ending, all
    looping faster the harder you try to stop. This is a book about the spiral: the
    downward pull of rumination that feeds on itself, and how to step off it without
    winning the argument inside your head.'
  long_description: 'It started with one thought. Just one — maybe the way you answered
    a question in seminar, maybe a grade that wasn''t what you wanted. And then it
    split. One became two, two became ten, and somewhere around 2am you were no longer
    thinking about the one thing — you were replaying the whole semester, every misstep,
    every way it could all go wrong, the loop spinning faster the harder you tried
    to make it stop.


    This book is for you — the student who lies in the dark while your mind runs the
    same circuit a hundred times. The one who knows, intellectually, that this isn''t
    helping, and cannot for the life of you find the exit. You''re not overthinking
    because you''re weak-minded. You''re caught in a spiral, and a spiral is built
    to feed itself: every loop kicks up more fuel for the next.


    You''ll come to recognize the way the spiral works on you — how it disguises rumination
    as problem-solving, how it promises that if you just think it through one more
    time you''ll finally feel safe, how it always saves its loudest rounds for the
    moment your defenses are lowest, alone, late, with the clock on the wall ticking
    toward an exam you''ll be too wrecked to sit. You''ll see that the spiral is not
    the truth getting clearer. It''s the same thought, dressed in a thousand costumes.


    This book will not teach you to win the argument in your head. It won''t hand
    you a thought-stopping trick that makes the loop vanish on command, or promise
    you a mind that never spirals again. You can''t think your way out of a spiral;
    trying is how it keeps you. There''s no fix here, because the loop was never a
    problem to be solved — it''s a pull to step off of.


    What''s here instead is the quiet of stepping off the loop. The relief of letting
    a thought be just a thought, of letting it turn without you on it, of one slow
    breath at a time until the thousand becomes one again, and the one becomes quiet.


    You don''t have to follow the thought all the way down tonight. You''re allowed
    to let it loop without you. You can set it down and breathe.


    Book 3 of the Blue Exam Press anxiety series.'
