cover_tagline: Your body sounds the alarm at a lunch table. There's no actual fire.
description:
  short_blurb: Walking into class late, getting called on, joining a group already
    talking — your body floods with the same alarm it would use for real danger, over
    a completely ordinary social moment. This is a one-hour look at the false alarm
    under social anxiety, written for students whose nervous systems treat people
    like a threat.
  long_description: 'Someone says ''let''s go around the room.'' Instantly your heart
    is pounding, your hands are cold, your stomach drops, and you''re counting how
    many people are ahead of you before it''s your turn. Nothing is actually wrong.
    No one is in danger. But your body has gone into full emergency mode over the
    simple fact that you''re about to talk in front of people. By the time it''s your
    turn, the alarm is so loud you can barely hear yourself think.


    This book is for the student whose social anxiety isn''t really about thoughts
    or comparison — it''s the raw physical alarm that goes off around other people.
    The racing heart, the sweating, the urge to bolt, the feeling that everyone can
    see you panicking. That''s a false alarm: the exact same survival response that
    would fire if you were in genuine danger, except the only ''threat'' is a hallway,
    a group project, a table you have to walk up to and sit down at. Your body hasn''t
    learned that being seen isn''t the same as being unsafe.


    In one hour, we work directly with the alarm. First, recognize it — learn to identify
    the false alarm as a body event, not a sign that something is actually about to
    go wrong, so you stop treating the symptoms as a warning to flee. Second, go down
    into it — instead of fighting the racing heart or trying to hide it, turn toward
    the sensations and discover that the alarm rises, crests, and falls on its own,
    and that you can stay in the room while it does. Third, come back — not as someone
    whose body never sounds the alarm again, but as someone who knows the alarm is
    not an order.


    This will not promise to make the physical fear disappear. You will still feel
    your heart kick when you walk into a room full of people. This book will not hand
    you a trick to switch the alarm off on command, because the goal isn''t to stop
    the alarm — it''s to stop fearing it. There are no relaxation scripts to perfect,
    no forced calm, no acting like you''re chill when your whole body is buzzing.


    What changes is what the alarm is allowed to do. Right now it empties the room
    — you avoid, you leave, you don''t go. By the end of this hour, it can ring at
    full volume while you stay exactly where you are.


    There is no fire at the lunch table. There never was. Your body is just loud,
    and loud is not the same as in danger. You''re allowed to walk up and sit down
    with your heart slamming. The alarm doesn''t get to decide where you go.'
