title: The Parent I Thought I'd Be
subtitle: For the working parent grieving quietly under the burnout — mourning the
  patience, the presence, and the person you ran out of before anyone noticed
cover_tagline: No one tells you that burnout is also a kind of loss.
description:
  short_blurb: 'Underneath the exhaustion there is something you rarely let yourself
    feel: grief. For the parent you meant to be, the moments that blurred past, the
    version of you that had patience to spare. This is a book for the working parent
    who is not just tired, but quietly mourning, and has never been given permission
    to call it that.'
  long_description: 'Sometimes it catches you in the car, parked in the driveway,
    engine off, not ready to go in yet. A sudden ache you can''t quite name. Not anger,
    not stress, something heavier and older. It''s grief, though you may have never
    called it that, because who has time to grieve a life they''re still living?


    This is a book for the working parent carrying a loss no one acknowledges. You
    haven''t lost a person. You''ve lost the parent you thought you''d be, the one
    with patience that didn''t run dry by 6pm, who didn''t snap over spilled milk,
    who was present instead of just present in the room. You''ve lost moments that
    blurred past while you were managing logistics. You''ve lost a version of yourself
    that had something left over at the end of the day. Burnout took these quietly,
    one ordinary Tuesday at a time, and you never got to mourn them.


    Here you''ll come to recognize the grief that lives underneath the tiredness.
    How burnout isn''t only depletion, it''s a series of small bereavements you''ve
    been too busy to feel. How the guilt you carry is often grief wearing a costume,
    because grief had nowhere to go. How letting go of who you thought you''d be is
    not giving up, but the only way to actually be here for who your child is now.
    You''ll see why the ache shows up in the quiet after bedtime, in the pause before
    you walk through the door, in the stolen moments when you finally stop moving
    long enough to feel anything at all.


    This book will not promise to give you that parent back. It won''t tell you that
    with the right routine you''ll become endlessly patient and present. There is
    no recovery plan here that ends with you restored to a self that the season of
    your life cannot sustain. What it offers instead is the permission to grieve what
    burnout took, gently, in the few minutes that are yours, so the loss can finally
    move through you instead of sitting on your chest.


    You are allowed to miss who you were. That ache is love, not failure.


    Book 2 of the Stolen Moment Press working parents burnout series.'
