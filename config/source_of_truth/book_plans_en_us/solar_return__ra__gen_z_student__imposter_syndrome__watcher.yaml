title: Watching Yourself Get the Degree from Somewhere Far Away
subtitle: For the student who feels like a spectator at their own life — numb, behind
  glass, narrating the day instead of living it
cover_tagline: You're here, and somehow watching it all from the back row.
description:
  short_blurb: You're in the room, doing the work, saying the right things, and the
    whole time it feels like you're watching someone else do it from behind glass.
    This is for the student who has gone numb and far away, monitoring their own life
    instead of living it. It won't snap you back to feeling on command — it will gently
    walk you toward the part of you that's been waiting outside the window.
  long_description: 'You''re in the lecture and you''re also somewhere else. Your
    hand is taking notes, your face is doing the right things, and the real you is
    a few feet back and slightly above, watching a stranger who looks like you go
    through the motions of being a student. People say it must be exciting. You smile
    and agree and feel almost nothing, like there''s glass between you and your own
    life, and you can''t remember when it went up.


    This is for you — the student who has gone numb and far away. The one who narrates
    the day instead of living it, who watches themselves get the grade or give the
    presentation with a flat, distant detachment, who scans every room for what might
    go wrong and never quite arrives inside the moment. This watcher in you isn''t
    lazy or cold. It''s a guard that went on duty when being fully present started
    to feel too exposed, and forgot how to clock off. It keeps you safe by keeping
    you outside — monitoring threats that never come, at the cost of every good thing
    that does.


    You''ll come to recognize the watcher''s particular flavor of survival — the numbness
    that isn''t peace, the hypervigilance that never rests, the strange grief of achieving
    the thing you wanted and feeling nothing as it happens. You''ll see how imposter
    syndrome recruits this part of you: if you never fully show up, you reason, you
    can never fully be found out. You''ll learn the difference between watching your
    life and living it, and why the way back isn''t to force feeling but to make it
    safe enough to land.


    This book will not snap you back into your body on command. It won''t promise
    a technique that floods the numbness with feeling, or tell you to just be present
    as if presence were a switch you''ve been too lazy to flip. There''s no optimizing
    your way through dissociation, no fixing a part of you that has been working overtime
    to protect you. What there is, instead, is patience — a slow, warm walk toward
    the part of you standing outside the window, and an invitation, with no pressure
    attached, to come back in.


    The watcher can stand down. Not because you ordered it to, but because, a little
    at a time, it''s becoming safe enough to feel your own life happening to you again.


    Book 7 of the Ember & Ash Publishing Imposter Syndrome series.'
