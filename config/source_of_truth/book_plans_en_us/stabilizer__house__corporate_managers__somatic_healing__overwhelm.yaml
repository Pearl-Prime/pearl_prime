title: Your Body Closed the Laptop Hours Ago
subtitle: Somatic healing for the manager whose shoulders never come down — when too
  much has arrived at once and there's no room left in the body to feel it
cover_tagline: The day ended. No one told your nervous system.
description:
  short_blurb: You closed the laptop at nine, but your jaw is still set and your chest
    is still bracing for a Slack that isn't coming. This is for the manager carrying
    a full quarter in a body that ran out of room to hold it weeks ago — a steadying
    way back down into yourself that asks nothing more of you. It will not make you
    do calm well. It will let the tide go out.
  long_description: 'It is the end of the day and the laptop is finally closed, but
    your body never got the memo. Your shoulders are still up near your ears. Your
    jaw is set the way it sets in a budget meeting. There is a low hum in your chest,
    a bracing for some message that isn''t coming, and no amount of wine or scrolling
    reaches it. You are not in danger. Your body has not been told.


    This book is for the manager who runs the team, hits the number, and absorbs the
    overflow — the escalations, the reorg, the three priorities that all became urgent
    on the same Tuesday. Too much has been arriving at once for a long time now, and
    your body has been the warehouse for all of it. The flood didn''t go anywhere.
    It went into your neck, your back, the breath you keep forgetting to take all
    the way down.


    You''ll come to recognize the overwhelm not as a scheduling problem but as a physical
    one — capacity exceeded, a vessel taking on more than it can carry, riding low
    in the water. You''ll feel where the day is still being held: the gripped shoulders,
    the shallow breath stacked high in the chest, the gut that won''t unclench. And
    you''ll learn, slowly and without striving, how to let some of it drain out. How
    to come down out of the head, where the planning never stops, and back into the
    body, where the ground actually is.


    This is not a productivity system for your nervous system. It will not optimize
    your recovery or turn your breath into a metric. There is no morning protocol
    to fail at, no streak to keep. Nothing here asks you to do calm well, because
    doing it well is the very thing that wore you down.


    What it offers instead is a harbor. A place inside the breakwater where the water
    goes still even when the weather outside doesn''t. The boat stops pitching. The
    anchor line goes taut and holds, and for the first time in a long while you are
    not drifting toward tomorrow.


    You are allowed to be this tired. You are allowed to set the whole quarter down
    for the length of one slow breath and discover the world does not capsize. You
    don''t have to earn the rest. You just have to let the tide go out.


    Book 1 of the Harbor Line Books somatic healing series.'
