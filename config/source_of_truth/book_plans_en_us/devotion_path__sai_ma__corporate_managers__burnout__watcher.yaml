description:
  short_blurb: How to Create Distance from Anxious Thoughts and Find Clarity get my energy back without quitting everything.
  long_description: |
    How to Create Distance from Anxious Thoughts and Find Clarity

    This book is for mid-level manager running a cross-functional teams who I have nothing left and I can't stop. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.

    Chapter by chapter, you'll work with what the observer's mind really means in your body and mind, and how to work with it. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.

    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.

    Book 2 of the Devotion Path burnout series.
