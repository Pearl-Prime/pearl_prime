title: 'Social Anxiety: The False Alarm Response'
subtitle: A One-Hour Social Anxiety Reset for Founders
cover_tagline: It's a networking event, not a threat. Your body didn't get the memo.
description:
  short_blurb: 'Before the room, before the panel, before the conversation that could
    matter — your body floods like you''re in danger, when all that''s coming is people.
    This is the founder''s false alarm in social form: a nervous system that reads
    a crowd as a cliff. This book teaches you to recognize the alarm and walk in anyway.'
  long_description: 'It starts in the parking lot. Before you''ve shaken a single
    hand, your body is already mid-alarm — heart going, mouth dry, a low hum of dread
    for a room full of people who are not, by any measure, dangerous. It''s a conference,
    a pitch event, a dinner where the right conversation could change things. And
    your nervous system has filed it under threat. You''ll walk in performing ease
    over a body that''s braced for impact, certain everyone can see the alarm running
    underneath the smile.


    This book is for the founder whose social anxiety is, at root, a false alarm.
    The one who has to manage themselves through every networking event, every panel,
    every coffee that matters, because the body treats exposure as emergency. It''s
    not that you can''t talk to people — you can, you do, you''re good in the room
    when you have to be. It''s the cost. The bracing beforehand, the flooding during,
    the bone-tiredness after, all for a danger that never actually arrives.


    We start by naming exactly what fires — the physical signature of the social alarm,
    the precise founder-moments that trip it (the unstructured mingle, the warm intro
    you have to convert, the question from the audience), what the alarm thinks it''s
    protecting you from. Then we go down into it. Not to talk yourself calm, not to
    rehearse better lines, but to stay with the bracing long enough to learn its logic:
    that it fires on the possibility of judgment, that it has confused being perceived
    with being in peril, that it''s old wiring meeting a modern room. You''ll see
    how a founder''s life — always pitching, always on, always one impression from
    a yes or a no — keeps the social alarm permanently primed. And you''ll find the
    gap between the flood and the truth, the clean space where you can feel the alarm
    and know it''s lying.


    This is not an exposure-therapy worksheet or a charisma course. There are no scripts
    to memorize, no breathing drill to run in the bathroom, no morning routine to
    make you a calmer networker by next quarter. This book will not optimize your
    social nervous system or promise you a version of you that strides in untroubled.
    It won''t make the alarm go quiet. What it offers is recognition — feeling the
    flood begin and knowing it''s the false alarm, not the room. That knowing changes
    the walk-in. You stop obeying the dread. You go into the room still humming, and
    you stay.


    The room was never the danger. The alarm was just early, and wrong. You get to
    walk in anyway.


    Book of the Brave in the World — for Founders (One-Hour) series.'
