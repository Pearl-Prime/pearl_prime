title: 'The Weight Without a Name: The Weight You Carry'
subtitle: A One-Hour Depression Reset for the Sandwich Generation
cover_tagline: You're not depressed. You're carrying something you were never allowed
  to put down.
description:
  short_blurb: For the Gen Xer running between a parent's doctor's office and a teenager's
    slammed door, the flatness isn't a chemical betrayal. It's the weight of everything
    you've quietly absorbed and never named. This one-hour reset helps you recognize
    it, go down into it, and stand back up carrying it differently. No fixing, no
    fake morning routines, no reframes. Just the plain truth of what you are actually
    holding, and the words to name it.
  long_description: 'You wake up before the alarm again, and the first thing you feel
    isn''t fear. It''s nothing. A gray ceiling pressing down on a day you already
    know the shape of: the prescription to refill for your mother, the lunch nobody
    will eat, the email you''ve reread four times without answering. You keep calling
    it depression because there''s no other word handy. But sit with it for one honest
    hour and you''ll find it has a truer name. It''s grief. The slow, nameless grief
    of a generation that quietly became the shock absorber for everyone above them
    and everyone below.


    This hour is for the one in the middle. The forty-something who takes the late
    call from the care facility and then gets up at six to pack a backpack. The one
    whose father is becoming a stranger in one direction while a once-small kid becomes
    one in the other. Nobody handed you a script for mourning people who are still
    alive, or for the version of your own life you set down somewhere around the second
    hospital visit and never went back for.


    First you''ll recognize it: the difference between a mind that''s broken and a
    heart that''s been carrying too much, for too long, without permission to set
    any of it on the floor. Then you''ll go down into it. Not to wallow, not to fix
    it, but to finally feel the weight you''ve been numbing yourself against. That
    numbness was never the enemy. It was the only way you kept functioning when functioning
    was the whole job. And then you come back up. Same losses, same Tuesday, but no
    longer at war with your own exhaustion.


    This book will not promise to lift the weight. It won''t turn your grief into
    a project with milestones, and it won''t hand you a gratitude list or a reframe
    that makes a declining parent feel like a growth opportunity. What''s heavy is
    heavy because it matters, and you get to stop pretending otherwise.


    What you get instead is one unhurried hour and a handful of plain words to reach
    for the next time the flatness rolls in: at the kitchen sink, in the car outside
    work, in the silence after everyone is finally asleep. Words that let you say,
    even just to yourself, this is grief, not failure, and I am allowed to be tired
    in a way that sleep won''t fix.


    You don''t have to feel better by the last page. You only have to stop carrying
    this as though it were proof that something is wrong with you. It isn''t. You''re
    grieving in the middle of a life that won''t pause to let you, and that is not
    weakness. That is the cost of loving people from both directions at once. Set
    it down for an hour. Then pick it back up knowing exactly what it is.'
