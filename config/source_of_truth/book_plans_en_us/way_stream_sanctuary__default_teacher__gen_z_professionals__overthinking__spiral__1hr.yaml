title: 'The Thought That Won''t Leave: Escaping the Mental Loop'
subtitle: A One-Hour Overthinking Reset for Young Professionals
cover_tagline: One stray thought at lunch. By 11pm you've quit, gone broke, and ruined
  everything.
description:
  short_blurb: 'It starts with one small worry and twenty minutes later you''ve narrated
    your entire downfall. This is the one-hour edition of the overthinking work for
    young professionals: how a single thought becomes a thousand, and how to step
    off the loop without pretending it isn''t spinning.'
  long_description: 'It started so small. A coworker didn''t say hi in the kitchen.
    Now it''s three hours later and you''ve built a complete story: they''re annoyed,
    your manager knows, the project is slipping, you''re going to be the one they
    let go, and you''ll have to move back home. None of it happened. You watched it
    happen anyway, in high definition, while you were supposed to be working.


    This is for the young professional whose mind doesn''t worry once — it worries
    in chains. One thought hooks the next, each one slightly worse, until you''re
    standing at the bottom of a catastrophe you constructed from a single ambiguous
    moment. You''re new enough to the working world that you can''t yet tell a small
    thing from a career-ending thing, so the spiral treats everything as career-ending.
    By the time you notice, you''re already at the bottom, and the climb back up feels
    like work you don''t have the energy for.


    This is the one-hour edition. One sitting, no filler, and not a fix. The arc goes
    like this. First, recognition: you learn to catch the spiral while it''s spinning
    — the exact moment one thought becomes a chain — instead of waking up at the bottom
    wondering how you got there. Then, descent: instead of grabbing each thought to
    argue it down (which only adds links), you go down into the spinning itself and
    let it run without climbing aboard. You stop treating every link as a fact that
    demands a response. Then you come back, not thought-free, but able to see a single
    worry as a single worry instead of the first domino in your ruin.


    This book will not promise you''ll stop overthinking. It will not give you a thought-stopping
    technique, a worksheet, or a reason to feel bad for spiraling. It will not tell
    you to think positive — positive thinking is still you, gripping the wheel. The
    spiral is allowed to start. What changes is that you no longer have to ride it
    all the way down.


    Written in direct, grounded language by Ravi Chandra, this is for the version
    of you lying in bed at midnight, having mentally lived through getting fired over
    a Slack typo. You''ll learn what the loop is actually made of, and you''ll have
    a way to step off it the next time one thought tries to become a thousand.


    The thing in the kitchen meant nothing. The story was just a story. You don''t
    have to follow it to the end.'
