cover_tagline: It's not the balance you're afraid of. It's what you think it says
  about you.
description:
  short_blurb: The fear underneath your money anxiety isn't really about money — it's
    the quiet conviction that you're secretly behind, secretly a fraud, secretly the
    only one who hasn't figured it out. This is for the professional woman carrying
    that belief in silence. It won't fix your finances; it'll loosen shame's grip
    on them.
  long_description: 'You check your account and something tightens that isn''t really
    about the number. It''s the verdict that comes with it: you should be further
    along, everyone else has this handled, if people knew the real state of your finances
    they''d know the truth about you. You make good money and still feel like you''re
    getting away with something. That''s not a budgeting problem. That''s shame, and
    it''s been running your relationship with money for a long time.


    This book is for the professional woman who looks competent from the outside and
    feels fundamentally wrong on the inside. You have the job, the salary, the right
    answers in meetings — and a private belief that you''re a mess pretending to be
    an adult, one statement away from being found out. You don''t talk about money
    because talking about it might expose the thing you''re most afraid is true about
    you. So you keep it sealed, and sealed is exactly the condition shame needs to
    keep growing. The fear isn''t loud. It''s the quiet kind that has had years to
    convince you it''s simply the truth about who you are.


    Grace Adeyemi separates the financial fact from the verdict you''ve welded to
    it. You''ll learn to recognize shame''s specific voice — the way it turns a normal
    balance into evidence of a flaw, the way it isolates you so you assume you''re
    the only one, the way it speaks in absolutes about your character when all that
    actually happened is a number went up or down. Then you''ll go down into the belief
    itself instead of managing around it: where it came from, who it belongs to, whose
    voice it originally was, and how to stand inside an uncomfortable number without
    it meaning you''re broken. You come back able to look at your finances as numbers
    again, not as a confession.


    This is not a get-your-finances-together book. No net-worth tracker, no debt-payoff
    thermometer, no positive affirmations taped to your mirror. It will not promise
    that you''ll feel proud of your balance or that the right system will finally
    make you enough. The shame isn''t there because you failed. It''s there because
    somewhere you learned your worth was a number — and that was never true, no matter
    how early or how often you were taught it.


    Written in plain, secular, real-talk language for the woman who is done being
    told to love herself harder, and just wants to stop flinching every time money
    holds up a mirror. No mantras. No bypass. Just an honest look at the belief and
    a way to set it down.


    You were never the only one. And you were never what the number said.'
