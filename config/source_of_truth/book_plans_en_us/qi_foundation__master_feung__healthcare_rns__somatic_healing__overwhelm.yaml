title: You Carried It All Home in Your Body
subtitle: For the nurse whose shoulders never come down — when too much arrives at
  once and there's no room left inside you to put it
cover_tagline: Some shifts you don't leave at the door. You wear them home in the
  floor of your belly.
description:
  short_blurb: You spent the whole shift absorbing what the bodies in front of you
    couldn't hold, and now there's no room left in your own. This is a book for the
    nurse who comes home full to the brim and doesn't know how to set any of it down.
    It won't ask you to do one more thing — it offers your body a way to finally let
    the flood drain back into the ground.
  long_description: 'It comes all at once. Two admits, a rapid response, a family
    in the hallway, the call light that won''t stop, and somewhere in the middle of
    it your own breath goes shallow and stays there. You don''t notice. You can''t
    — there''s no room. By the time you''re in the car, your shoulders are still up
    by your ears and your jaw is set against a danger that has already passed, and
    the day is in you now, in the floor of your belly, in the tight band across your
    back. You carried it all home in your body.


    This book is for the nurse who absorbs everything and has nowhere left to put
    it. The one who can feel a patient''s panic in her own chest, who holds the unit
    together by holding her own breath, who walks in the door at home already so full
    there''s no capacity left to be a person. You are not weak and you are not doing
    it wrong. You have simply been catching what falls all day, and no one ever taught
    you how to set it down.


    What you''ll come to recognize, slowly, is that the overwhelm was never just too
    many tasks — it was too much arriving in a body that had no room to receive it.
    You''ll learn to feel where the flood is being held: the gripped diaphragm, the
    shoulders that forgot how to lower, the breath that stops at the top of the lungs
    and never reaches the floor. You''ll learn what it is to let the held charge drain
    downward, back into the ground, so the current can move again instead of pooling
    in your tissues. You''ll meet the threshold between the shift and the rest of
    your life, and learn to actually cross it — to let something move through the
    doorway and out, so you arrive home as more than the residue of the worst hour.


    This book will not make you more efficient. It will not optimize your recovery
    or hand you a protocol to power through. There is no hack here, no checklist,
    nothing that asks you to perform your own healing on top of everything else you
    carry. The flood does not get fixed. It gets a way out.


    You are allowed to come home empty. You are allowed to let it drain. You are allowed
    to take up the room inside yourself that you spend all day giving away.


    Book 1 of the Root & Meridian Press somatic healing series.'
