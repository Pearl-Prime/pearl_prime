title: One Thought, Ten Thousand Tabs
subtitle: For the analytical mind that turns a single worry into a runaway model —
  getting off the loop that feeds itself at 2am
cover_tagline: It started as one question. By 2am it had become a thousand.
description:
  short_blurb: It begins with one thought — a half-remembered comment, a number that
    looked off — and your mind, trained to model every outcome, runs it until it's
    a thousand. This is a steadying book for the analytical mind caught in the spiral,
    and a way off the loop that feeds itself in the dark.
  long_description: 'It started as a single thought. A comment in a meeting you can''t
    stop replaying. A line in the financials that looked slightly off. A reply that
    came back one word shorter than usual. And your mind — the same mind that''s so
    good at modeling every outcome, pricing every risk, running the scenario before
    anyone asks — takes that one thought and runs it. Branches it. Feeds it. By 2am
    it isn''t one question anymore. It''s ten thousand tabs, all open, all loading,
    and you are wide awake inside every one of them.


    This is a book for the spiral.


    The analytical gift that makes you good at your work is the same machinery that
    turns on you in the dark. You were trained to find the thread and pull it, to
    never leave a risk unexamined. But anxiety hijacks that strength and points it
    inward, and suddenly the thoroughness that pays you becomes a loop with no exit
    — each thought generating the next, the rumination convincing you it''s almost
    finished, almost safe, just one more pass and you''ll have it solved. You never
    have it solved. The spiral was never trying to solve anything. It was only trying
    to keep you scanning.


    You''ll come to recognize the whole family of it. The body braced for a verdict
    that isn''t coming. The flood of everything arriving at once. The shame that whispers
    the spiral is proof something is wrong with you. The grief for the quiet mind
    you used to be able to find. The comparison to people who seem to just let things
    go. The watcher behind it all, certain that if it stops looping, something terrible
    will slip through.


    This book will not teach you to think your way out of the spiral — you already
    know that road, and you know it has no end. It will not give you a thought-stopping
    technique to white-knuckle, or one more framework to optimize your own mind. It
    will not promise the loop will never start again. What it offers instead is the
    harbor: a way to step off the churning water and onto ground that holds, to let
    the thought finish its lap without you chasing it, to find the still place that
    was underneath the noise the whole time.


    You do not have to follow every thought to the end. Some loops are not meant to
    be solved. They''re meant to be left running while you walk, finally, to shore.


    Book 3 of the Harbor Line Books anxiety series.'
