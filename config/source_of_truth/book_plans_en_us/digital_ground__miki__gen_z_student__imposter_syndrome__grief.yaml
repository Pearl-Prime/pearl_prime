title: The Version of You That Had It Figured Out
subtitle: For the student grieving the certainty they used to have — when becoming
  who you're supposed to be means letting go of who you thought you were
cover_tagline: Nobody warned you that growing up would feel like a loss.
description:
  short_blurb: 'You used to be the one who had it together — the smart one, the sure
    one — and somewhere in becoming an adult, that person slipped away. This is a
    book about the quiet grief inside imposter syndrome: the self you''ve outgrown,
    the certainty you''ve lost, and what it means to let it go.'
  long_description: 'There was a version of you that had it figured out. Maybe in
    high school, maybe last year — the one who knew the answer, who belonged, who
    didn''t lie awake wondering if they were a fraud. And somewhere on the way to
    becoming whoever you''re supposed to be now, that person quietly went missing,
    and no one told you that you were allowed to miss them.


    This is grief, even though it doesn''t look like it. Not the kind with a funeral,
    but the kind that arrives sideways — a loss of certainty, of an old self, of the
    easy belonging you used to feel before everything got real. Imposter syndrome
    isn''t only fear of the future. Sometimes it''s mourning who you were before you
    started doubting, and the world that used to make sense.


    This book is for you — the student standing in the gap between who you were and
    who you''re becoming, grieving something you can''t quite name. The one who feels
    like a stranger in their own life. The one who scrolls back through old photos
    of a self that seemed so sure and wonders where they went. You''re not regressing.
    You''re losing something real, and loss is supposed to hurt.


    No one really warns you about this part of growing up. They tell you it''s exciting,
    a fresh start, the best years — and some of it is. But underneath the new city
    and the new people and the person you''re supposed to be becoming, there''s a
    quiet ache for the one you already were: the friendships that don''t need explaining,
    the certainty that you were good at this, the home that fit before you outgrew
    it. You''re allowed to want the future and miss the past in the same breath. That
    contradiction isn''t you being ungrateful. It''s just what it feels like to be
    in between.


    You''ll come to recognize the grief hiding inside the self-doubt — the way becoming
    someone new always means letting an old self go. You''ll learn that loss changes
    shape, showing up in random moments, in a campus hallway, in the middle of a lecture,
    long after you thought you''d moved on. You''ll find what it''s like to let the
    grief be there, phone face-down, feet on the ground, without rushing to fix it
    or fill it.


    This won''t give you back the person you were, and it won''t promise that the
    doubt is a phase you''ll simply outgrow. Some things you don''t get over. You
    carry them, and they change you, and that''s allowed.


    What''s true is that grieving who you were is not the same as failing at who you
    are. You can miss the old certainty and still be becoming someone real. And you''re
    allowed to let go — slowly, on your own time — of a self you''ve outgrown.


    Book 5 of the Present Tense Books imposter syndrome series.'
