title: Twelve Tabs and Not One Thought
subtitle: For the student frozen under a mountain of deadlines — when too much arrives
  at once and the part of you that decides just goes dark
cover_tagline: When everything is due, the mind doesn't race. It stops.
description:
  short_blurb: Six assignments, three group chats, two unread emails from professors,
    and you are sitting perfectly still, unable to start any of it. This is for the
    student who looks lazy from the outside and is actually drowning. It won't add
    another productivity system to the pile — it will help you find the one small
    place to put your hands when the flood has taken the floor out from under you.
  long_description: 'There are twelve tabs open and you can''t read a single one of
    them. The to-do list is so long it has stopped meaning anything. Everyone thinks
    you''re procrastinating, scrolling, wasting the day — but you know the truth,
    which is that you are completely overwhelmed and have gone somewhere blank and
    far away, and you cannot find the door back to starting.


    This is for you — the student buried under more than any one person can hold.
    The one with the syllabus that reads like a threat, the inbox that fills faster
    than you can answer it, the quiet certainty that everyone else is somehow keeping
    up and you alone have been crushed flat. Overwhelm doesn''t look like panic. It
    looks like stillness. It looks like a capable person staring at a wall because
    every single task feels equally enormous and there is no longer any room left
    inside to think.


    You''ll come to recognize the flood for what it is — not a character flaw, not
    laziness, not proof that you were never cut out for this. You''ll see how imposter
    syndrome turns up the volume on all of it: how the fear of being exposed makes
    you say yes to everything, take on everything, refuse to drop anything, until
    the load itself becomes the thing that buries you. You''ll learn what it feels
    like when capacity is genuinely exceeded, and why the answer is never to push
    harder through a closed door. You''ll find the single next thing — one, not twelve
    — and how to put your hands on it when the rest is roaring.


    This book will not hand you another productivity system. It won''t optimize your
    morning or color-code your calendar or promise that the right app will finally
    let you do it all, because doing it all was always the lie underneath the overwhelm.
    There''s no fix here for being a person with a limit. What there is, instead,
    is permission to have one — and a way to make a little room again when there seemed
    to be none left.


    The flood recedes. It always does. And when the water goes down, you''ll find
    the ground was there the whole time, waiting under your feet.


    Book 2 of the Ember & Ash Publishing Imposter Syndrome series.'
