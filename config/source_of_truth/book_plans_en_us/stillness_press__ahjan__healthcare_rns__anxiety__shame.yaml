description:
  short_blurb: >
    Something happens in your body the moment you're about to show the thing you hide. understand why this keeps happening to me.
  long_description: |
    Something happens in your body the moment you're about to show the thing you hide.
    
    This book is for floor RN on a cardiac unit, 6 years ins who the body is doing something and I don't understand why. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.
    
    Chapter by chapter, you'll work with why shame contracts the body and what releases the contraction. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.
    
    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.
    
    Book 4 of the Stillness Press anxiety series.

