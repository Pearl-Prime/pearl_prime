title: The Hollow You Grew Around
subtitle: For the manager working to bark over a defect no one else can see, meeting
  the quiet belief that lives in the heartwood
cover_tagline: You've covered it for years. The forest never asked you to.
description:
  short_blurb: You're good at the job, and you're certain it's only a matter of time
    before they see what you really are. This is a quiet book for the manager whose
    anxiety grows from a buried belief that something is fundamentally wrong with
    them — the defect you've spent a career overworking to hide.
  long_description: 'There''s a feeling you don''t say out loud. You''re competent,
    even admired, and underneath it sits a quiet certainty that it''s all cover —
    that if anyone looked closely enough they''d find the thing that''s actually wrong
    with you, the flaw you''ve been managing around your whole life. So you work harder.
    You over-prepare. You stay late not because the work demands it but because the
    staying keeps the feeling at bay for one more day.


    This book is for the manager whose anxiety grows from shame — from the buried
    belief that you are, at bottom, defective in some way other people are not. It''s
    a particular kind of fear, quieter than panic and far more permanent. It doesn''t
    spike and pass. It hums under everything, turning every mistake into evidence,
    every success into a near-miss you barely got away with, every bit of praise into
    something you''ll have to keep earning before they find out.


    Here you''ll come to recognize shame for what it is: not a fact about you, but
    a belief you absorbed so early it stopped feeling like a belief at all. You''ll
    see how the overwork is a covering, how the perfectionism is a hiding, and how
    the exhaustion underneath your competence is the cost of guarding a secret that
    was never true. Like a tree that grew around an old wound and kept on growing
    — whole, alive, never as damaged as the scar made it feel — you''ll begin to sense
    that the defect you''ve organized your life around may not be there at all.


    The voice here is the still forest: gentle, unhurried, and entirely without judgment
    — because shame cannot be shamed into leaving, and a mind already convinced it''s
    wrong does not need one more demand. There is nothing to fix in these pages, no
    self-improvement plan that would only confirm the verdict that you need improving.
    The forest does not ask the tree to be other than it is.


    What this book will not do is help you finally become good enough to silence the
    feeling. That race has no finish line, and running it harder is the trap. It won''t
    optimize the parts of you that you''ve decided are broken. It will only sit with
    you while you question, perhaps for the first time, whether anything was broken
    to begin with — and let the working-to-cover-it slowly become unnecessary.


    You are allowed to be seen. There was never as much to hide as you feared.


    Book 4 of the Still Forest Press anxiety series.'
