title: There Is No Room Left in You
subtitle: For the working parent carrying too much at once — when the flood arrives
  before dawn and the body has no shore left to stand on
cover_tagline: Everything is asking for you at the same time, and there is no you
  left to give.
description:
  short_blurb: You wake already behind, the day pouring in before your feet hit the
    floor — the lunches, the deadline, the text you forgot to answer, the small voice
    calling your name. This is a book for the working parent who has run out of room,
    not patience. It will not hand you a better system; it will help you find, underneath
    all the arriving, the one part of you that the flood can't reach.
  long_description: 'It starts before you''re even awake. The alarm, the small body
    climbing into bed, the list already assembling itself behind your eyes — the email
    you didn''t send, the form due today, the dentist, the dinner, the way someone
    said your name in a meeting. By 7am you''re not thinking anymore. You''re triaging.
    And somewhere under all of it is a tiredness that isn''t about sleep, a sense
    that there is simply no room left inside you for one more thing to arrive.


    This is a book for the parent who is good at carrying. You''ve gotten so capable
    that the load just keeps growing to meet you, and no one can see how close to
    the edge you are because you keep handling it. You are not disorganized. You are
    not weak. You have a flood coming in faster than any human could hold, and you''ve
    been trying to hold all of it with your bare hands.


    In these pages you''ll come to recognize overwhelm for what it actually is — not
    a failure of planning but a capacity that''s been exceeded, a well asked to give
    more than it holds. You''ll feel the difference between the demands that are real
    and the urgency your nervous system has wrapped around all of them. You''ll learn
    what it means to let your breath reach the lowest part of your lungs again, to
    feel the ground come up under you instead of bracing against the next wave. Not
    to do more. To make room.


    This book will not promise to help you get on top of it all. There is no getting
    on top of a flood. It won''t optimize your morning or hand you a color-coded system
    that becomes one more thing you fail at by Wednesday. It won''t ask you to wake
    earlier or want less or squeeze one more drop from a body that has nothing left.
    What it offers instead is quieter and more durable: a way to find the part of
    you that is not underwater, even now — the deep ground beneath the rising water,
    the root that holds when the surface is all motion.


    You are allowed to put something down. You are allowed to not have room. You are
    allowed to let the water be high and still feel your own feet on the floor.


    Book 1 of the Root & Meridian Press burnout series.'
