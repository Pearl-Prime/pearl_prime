title: The Coworkers Who Never Seem to Bend
subtitle: For the young professional sure everyone else gives endlessly without it
  costing them a thing
cover_tagline: They reply in seconds and never seem tired. You're sure the problem
  is you.
description:
  short_blurb: Your coworker answers at midnight without flinching. Your feed is full
    of people who do more and never seem to need less. So you decide your need for
    a boundary is just weakness everyone else outgrew. This is a steadying book for
    the mind that measures itself against everyone who looks fine — and an invitation
    to stop competing in a race you were never actually in.
  long_description: 'She replied in under a minute. It was 11:40pm. No ''sorry for
    the late hour,'' no visible hesitation — just an answer, easy, like availability
    costs her nothing. And you felt it land: that small, familiar drop. Everyone else
    seems fine with this. Everyone else can do more, need less, stay reachable, stay
    unbothered. So whatever it is in you that wants to close the laptop and disappear
    must be a flaw the rest of them already trained out.


    This is the quiet math you run all day. You measure your need for a limit against
    everyone who looks calm and capable — the coworker who never logs off, the founder
    on your feed romanticizing the grind, the friend who somehow does it all — and
    you always come up short. The comparison feels like information. It isn''t. It''s
    a measuring tape held in the dark, stretched between your worst night and everyone
    else''s brightest hour.


    This book is for the Gen Z professional who is convinced that everyone else figured
    out how to not need boundaries — who reads their own exhaustion as falling behind,
    who treats other people''s curated composure as proof of their own deficiency.
    You are not behind. You are not less resilient. You''re just comparing the inside
    of your life to the outside of everyone else''s, and calling the gap a verdict.


    Without giving you one trick to win the comparison, you''ll come to recognize
    the measuring itself as a kind of sleep — a dream in which you are forever ranked,
    forever short. You''ll learn to feel the comparison rise and let it pass like
    weather across a sky that does not compete with other skies. The steady awareness
    underneath the ranking was never in the race. It has nothing to prove and nowhere
    to fall behind. Standing at the threshold of your own no, you''ll notice you were
    never actually behind anyone. There was no line but the one you keep stepping
    over to chase someone else''s.


    This is not a book about keeping up or matching anyone''s pace. Nothing here will
    help you win the comparison — that is precisely the point. It offers no metric,
    no benchmark, no way to finally measure up, because the home you''re looking for
    was never on the leaderboard at all.


    Let the others seem fine. You can stop watching them and come back to what was
    never lost.


    Book 3 of the Awakening Press boundaries series.'
