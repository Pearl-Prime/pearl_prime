title: 'Setting Boundaries: Why Your Brain Cries Wolf (2)'
subtitle: How Working Parents Are Rewriting the Rules of Boundaries
cover_tagline: Saying no makes your whole body brace like something terrible is about
  to happen. Nothing is.
description:
  short_blurb: You went to set a limit, declining the meeting, leaving on time, telling
    your kid no, and your chest tightened, your face went hot, and you caved before
    the sentence was out. That's your alarm firing over a threat that isn't there.
    This book teaches you to feel the false alarm, let it pass, and hold the line
    anyway.
  long_description: 'You typed it out: ''I can''t take this on right now.'' Your finger
    hovers over send. Your heart is going like you''re about to step off a ledge.
    Your stomach drops. And before you know it you''ve deleted the line and replaced
    it with ''sure, no problem, happy to.'' Nobody was threatening you. Nobody raised
    their voice. The danger was entirely in your body, and your body won the argument
    before your mind got a vote.


    This is the working parent''s version of a false alarm: the surge of dread that
    arrives the instant you try to protect your own time. Declining the after-hours
    email. Leaving the office while others stay. Telling your kid the answer is no
    and meaning it past the second whine. Your nervous system reads each one as a
    threat, floods you with heat and urgency, and you fold to make the feeling stop.
    It works, too, which is the trap. The relief that comes the moment you cave teaches
    your body that the alarm was right, so next time it rings louder.


    This book is for you if your boundaries collapse not because you don''t know what
    you want, but because saying it lights up an alarm you can''t think your way past.
    We name what''s actually happening: the bracing, the heat climbing your neck,
    the apology already forming, the speed at which ''no'' becomes ''fine, I''ve got
    it.'' Then we go down into the surge instead of around it, learning to stay in
    your own skin while the alarm peaks and, crucially, while it passes, because it
    always passes. You don''t breathe it away or white-knuckle through. You let it
    move while you hold still, until you''ve felt enough times that the wave crests
    and breaks on its own that you stop mistaking it for an instruction. You come
    back able to hold a limit through the spike instead of caving the second it hits.


    This is not a confidence-hack book. It will not promise that boundaries will start
    to feel good, or that the alarm will stop firing if you just believe in yourself
    hard enough. The alarm may always show up; that''s not the problem this solves.
    What changes is that you no longer mistake it for a reason to abandon yourself.
    You feel it, you name it, you keep the line anyway, with your heart still pounding.


    Written in direct, real-talk language for the moment the dread hits and your thumb
    is over the backspace key. No breathing scripts to memorize, no morning routine,
    no telling you to manifest calm.


    The fear that you''re doing something wrong is not proof that you are. Let it
    ring. Hold the line anyway.'
