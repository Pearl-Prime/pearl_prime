title: The Part of You That Keeps the Lights On Late
subtitle: For the experienced professional who overworks to cover a defect no one
  else can see — and is quietly exhausted from carrying it
cover_tagline: You didn't bluff your way here. You're just still hiding the wrong
  thing.
description:
  short_blurb: If you've spent your whole career working twice as hard so no one finds
    out what you think is wrong with you, this book is for the part of you that never
    gets to rest. It won't tell you to be more confident or hand you a five-step fix.
    It will help you set down a story you were handed long before this job — and walk
    through the door you've been guarding instead of entering.
  long_description: 'There''s a version of you that stays up after everyone else has
    logged off. Not because the work demands it, but because somewhere a long time
    ago you learned that the only thing standing between you and being found out is
    how hard you''re willing to work to cover it. You over-prepare. You double-check
    the email you already checked. You take the praise and feel the small private
    flinch, because you know they''d think differently if they saw the real thing
    underneath.


    This book is for the person who has built a real career — decades of it — on top
    of a quiet belief that there is something defective in you that competence is
    meant to hide. You are somewhere in the middle of your own life: a parent who
    still needs you on the phone at odd hours, a kid who needs a signature before
    the bus, a job where you are now the experienced one in the room and still bracing
    for the question that exposes you. You are tired in a way sleep doesn''t fix.


    Walking through these chapters, you''ll come to recognize the shape of the thing
    you''ve been hiding. You''ll see the mask for what it is — not a lie, but a strategy
    a younger you invented to stay safe. You''ll feel the actual cost of keeping it
    on: the rest you never take, the credit you can''t receive, the way you''ve confused
    exhaustion with integrity. And slowly, you''ll start to notice that the defect
    you''ve been overworking to cover was never the truth about you. It was a story,
    handed to you, that you''ve been faithfully carrying ever since.


    This book will not make you more confident. It won''t optimize your morning, fix
    your inner critic in a weekend, or teach you to perform certainty you don''t feel.
    There is no hack here, and no finish line where the fear finally goes quiet for
    good. That''s not the work.


    The work is gentler and harder than that: to stop guarding the door and let yourself
    stand in the room you already belong in. To let the competence be real and yours.
    To let the part of you that keeps the lights on late finally turn them off.


    You were never the fraud you''ve been working so hard to hide. You can set that
    down now.


    Book 1 of the Next Chapter Publishing imposter syndrome series.'
