title: 'Anxiety Relief: Beyond the Highlight Reel'
subtitle: Beyond the Highlight Reel
cover_tagline: Everyone in that meeting looks like they have it figured out. They
  don't.
description:
  short_blurb: You manage a team, hit your numbers, and still scroll through a peer's
    promotion announcement feeling two steps behind. This is a one-hour reset for
    the manager whose alarm goes off every time someone else moves up. It won't make
    you stop noticing. It'll change what the noticing does to you.
  long_description: 'It''s the all-hands, and another manager gets the shout-out you
    were quietly hoping for. Your face stays neutral. Inside, the alarm trips: faster,
    sharper, you''re falling behind. By the time you''re back at your desk you''ve
    re-run your entire career against theirs and lost.


    This book is for the manager who is doing fine on paper and rattled underneath
    it. You hit your targets. You got the team. And still, every LinkedIn update,
    every peer who makes director first, every younger hire who seems to move faster
    sets off the same internal siren. You''re not lazy and you''re not failing. You''re
    measuring, constantly, against people whose insides you cannot see.


    The cruel part is that the job rewards it. You got here partly by tracking where
    you stood, by reading the org chart, by knowing who was rising. The same instinct
    that made you sharp now runs at 11 p.m. against a colleague''s announcement, and
    it can''t tell the difference between useful situational awareness and self-punishment
    dressed up as ambition. So it just keeps scoring, and you keep coming up short
    against a version of everyone else that doesn''t actually exist.


    Here''s what we do in the next hour. First, recognition: you name the comparison
    the moment it fires, in the room, in plain words you can actually use. Not "I
    have impostor syndrome" but "I just ranked myself against her and my chest went
    tight." Then descent. Instead of fixing the feeling with a pep talk or a five-year
    plan, you go down into it. You look at what the comparison is actually protecting
    and what it costs you to keep running the scoreboard. Then integration: you come
    back into the same meetings, the same feeds, the same ambitious peers, carrying
    it differently. The siren can sound without running the show.


    This will not promise you''ll stop comparing. You manage in a building organized
    around ranking people; the reflex isn''t a bug you can delete. It won''t optimize
    you into the calmest person in the room or hand you a morning routine that immunizes
    you by Q3. There''s no worksheet. There''s no "just be confident."


    What it offers is smaller and more usable: the alarm that says everyone is ahead
    of you is lying about what it knows, and you can hear it lie and keep your footing.
    You can want the promotion without the wanting eating you alive. You can watch
    a peer win and stay in your own body.


    You are allowed to be ambitious and unrattled at the same time. Start there.'
