title: Everyone Else Looks Like They've Got It Handled
subtitle: For the parent measuring their anxious insides against everyone else's calm
  outsides — at the school gate, on the feed, always coming up short
cover_tagline: You're comparing your inside to their outside. You will always lose.
description:
  short_blurb: Every other parent looks calm, capable, like they've figured out something
    you missed. This is a steady book for working parents trapped in comparison —
    and a way to put down the measuring stick you've been beating yourself with and
    find ground that doesn't depend on anyone else.
  long_description: 'They all seem to have it handled. The mom at drop-off who''s
    somehow showered and serene. The dad whose kids never melt down in the parking
    lot. The feeds full of calm, capable parents who clearly know a secret you were
    never told. You scan them all and you measure — their composure against your racing
    heart, their ease against your bracing — and you come up short every single time.
    You smile and say you''re great. Inside, you''re certain you''re the only one
    barely holding on.


    This book is for the working parent who lives by comparison. The one who measures
    an anxious inside against everyone else''s polished outside, who treats every
    other parent as evidence of their own falling-short, who is exhausted from a race
    no one else even knows they''re running. You are not less capable than they are.
    You''ve just been comparing the truth of your insides to the surface of theirs
    — and that''s a contest you were always going to lose.


    Here you''ll come to recognize how comparison feeds the anxiety. How the measuring
    never stops and never satisfies. How the calm you see on others is its own carefully
    kept surface, and how pointing your sharp, anxious attention at the gap between
    you and them only winds the bracing tighter. You''ll feel where the comparison
    lives in your body — the sinking stomach at the sight of the feed, the tight smile,
    the held breath — and you''ll begin to find ground that doesn''t move when someone
    else looks like they''re doing better. Not by winning the comparison. By stepping
    off the scale entirely.


    This is not a book that will help you keep up or finally come out ahead. Nothing
    here will make you the calm one at the gate or win you the race. That''s the point
    — the race itself is the trap, and there is nothing to push through or optimize
    to escape it. What''s here instead is quieter: a way to notice the measuring as
    it happens, to stop turning a high-strung instrument on yourself, and to stand
    on ground that is yours alone and doesn''t shift with anyone else''s surface.


    You don''t have to keep score against people whose insides you''ll never see.
    You are not behind. There is no line everyone else has crossed and you''ve missed.
    There''s just you, on solid ground, in a life that was never meant to be measured
    against the next one over.


    You''re allowed to stop comparing and simply stand where you are.


    Book 6 of the Held Ground Press anxiety series.'
