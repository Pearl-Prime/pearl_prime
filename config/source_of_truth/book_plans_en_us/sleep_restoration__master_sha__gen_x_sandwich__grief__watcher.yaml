title: Still Listening for a Sound That Isn't Coming
subtitle: For the caregiver whose body never stood down after the loss — still bracing
  at every buzz, still listening for a monitor that isn't there
cover_tagline: They're gone, but your body never got the message that it's allowed
  to stand down.
description:
  short_blurb: For months — maybe years — you slept with one ear open, half-listening
    for the call that meant something was wrong. The person you were watching is gone
    now, and still your body won't stand down. This is for the grieving mind that
    can't stop scanning a dark that no longer holds any threat.
  long_description: 'Your phone buzzes and your whole body braces before your mind
    catches up. It''s nothing — a notification, a wrong number. But for a year, maybe
    longer, every buzz could have been the call. The fall. The hospital. The night
    it finally happened. You learned to sleep with one ear open, half-awake, ready.
    Your body became a watchtower, and watchtowers don''t get to close.


    The person you were watching is gone now. And still, in the dark, you''re listening.
    For the monitor that isn''t plugged in anymore. For footsteps in a room that''s
    empty. For the sound that means you''re needed — a sound that isn''t coming, and
    isn''t ever coming again.


    This book is for you: the sandwich-generation caregiver whose grief wears the
    face of hypervigilance. The one who spent so long scanning for the next emergency
    that your nervous system forgot how to believe the emergency is over. The one
    who lies awake not weeping but watching, scanning the dark for a threat that has
    already done its worst and gone.


    Here, in the long hours before dawn, you''ll come to recognize what the watcher
    in you is really doing. How it kept you upright through the worst of it, and why
    it can''t tell that the worst is behind you now. How the grief hides underneath
    the vigilance, because as long as you''re listening for them, some part of you
    hasn''t yet said goodbye. How the body braces and braces because standing down
    would mean letting yourself feel that there''s no one left to brace for.


    This book will not tell you to relax, as if you could simply decide to. It will
    not call your vigilance a disorder to be corrected, or hand you a technique to
    switch off a mind that kept someone you loved alive a little longer. It will not
    rush you toward a calm you can''t yet feel. There is no off-switch here, and no
    fixing what was never broken — only worn down to the bone.


    What it offers instead is a steady presence beside you in the dark, and a few
    quiet ways to let your body learn, slowly, that the watch is over. Not by force,
    but by degrees. Permission to set the listening down for one night and trust that
    nothing will fall apart if you do. A structure to hold you while the part of you
    that was always on duty finally, gently, comes off it.


    You kept watch through the heavy hours so someone else could rest. Tonight, let
    the dark hold the watch. You''re allowed to stop listening. You''re allowed to
    rest.


    Book 2 of the Night Architecture Books grief series.'
