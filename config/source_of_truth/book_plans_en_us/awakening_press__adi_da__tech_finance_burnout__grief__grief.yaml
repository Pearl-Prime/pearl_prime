- The Year of Magical Thinking (Joan Didion) — because it shows a sharp, capable mind
  meeting grief on its own analytical terms and being undone anyway.
- When Things Fall Apart (Pema Chodron) — because it reframes the collapse as an opening
  rather than a failure to be fixed.
