title: A Grief No Spreadsheet Can Hold
subtitle: For the high performer facing a loss that will not yield to effort or analysis
cover_tagline: Some things you don't get over. You get quiet enough to carry them.
description:
  short_blurb: You have solved harder things than this. So why won't it move? This
    is a book for the achiever who met loss the only way they knew how, as a problem
    to fix, and found that grief does not negotiate, does not close out, and does
    not care how good you are at hard things.
  long_description: 'There is a particular kind of grief that comes to people who
    are very good at handling things. You handle the logistics. You handle the people
    who need you. You handle the calendar, the follow-ups, the part where everyone
    else falls apart. And somewhere underneath all that competent handling is a loss
    you have not actually touched, because touching it has no deliverable, no next
    step, no finish line you can sprint toward.


    This book is for you. For the one who treated a death, an ending, a leaving the
    same way you treat everything — as a problem to be solved, scoped, and closed.
    And who is quietly bewildered that it will not close.


    Here you will come to recognize what grief actually is, beneath the framework
    you were handed. You''ll see how the part of you that achieves keeps trying to
    convert sorrow into a task, and how that conversion is what keeps the ache stuck.
    You''ll meet the impulse to perform recovery — to look fine, to be the strong
    one, to get back to it — and feel, maybe for the first time, what it costs. And
    slowly, without forcing anything, you''ll notice that grief is not the enemy of
    who you are. It is the loosening of who you thought you had to be.


    There is no schedule for this, and that is the part the achiever in you cannot
    abide. So this book moves the way grief moves: in long quiet passes and sudden
    returns, circling the same ache without trying to resolve it. You are invited
    to slow to that pace. To stop measuring your progress. To let an afternoon go
    by where nothing is fixed and nothing is wrong with you for that.


    This book will not help you move on. It will not give you five stages, a timeline,
    or a single technique to make the missing smaller. It promises no closure, because
    closure was always the wrong word for what you are living. There is nothing here
    to optimize and nothing to win.


    What it offers instead is stranger and steadier: the discovery that beneath the
    loss, beneath even the one who is grieving, there is something the loss could
    not take. You don''t have to believe that yet. You only have to stop running long
    enough to find out.


    You are not failing at grief. You were never meant to be good at this. You were
    only ever meant to be honest, and slow, and here.


    Set the laptop down. Let it be loss.


    Book 1 of the Awakening Press grief series.'
