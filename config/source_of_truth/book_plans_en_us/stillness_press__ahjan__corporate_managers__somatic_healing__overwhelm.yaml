title: When There's No Room Left in You
subtitle: For managers carrying more than a body can hold — when everything arrives
  at once and there's nowhere left to put it
cover_tagline: It's not that you can't cope. It's that there's no room left to.
description:
  short_blurb: It all arrived at once — the asks, the pings, the people who need an
    answer now. And somewhere in the flood your body simply ran out of room. This
    is a quiet book for the manager who has been over capacity so long they forgot
    what spacious felt like.
  long_description: 'It all came at once. The escalation, the three Slack threads,
    the person at your desk, the thing you forgot, the thing you can''t forget. And
    somewhere underneath the doing, your body crossed a line — and now there''s a
    roar in you, a too-much, a feeling of being flooded with no shore in sight.


    This is overwhelm. Not weakness. Not a failure of time management. It is what
    happens when more arrives than a nervous system can metabolize, and the body,
    having no room left, starts to brace and flood and shut down all at once. You
    keep functioning. You answer the email. But inside, the water is up to the ceiling.


    This book is for the mid-level manager running the cross-functional team — the
    one everyone routes through, the one who absorbs everyone else''s urgency and
    has nowhere to set their own down. The body holds what the calendar can''t show.
    You''ve called it busy. You''ve called it a hard week that became a hard year.
    You may not remember the last time there was space inside you.


    You''ll come to recognize overwhelm as a body state, not a character flaw — the
    felt difference between a full life and a flooded one. You''ll learn where the
    flood lives in you, how it announces itself before your mind names it, and what
    actually makes room: not doing more, not doing it faster, but a slow return of
    capacity that begins with letting your body finish what it''s been holding mid-breath
    all day.


    This book will not clear your plate. It won''t hand you a productivity system
    or a way to optimize your way to calm — those are more things to do, and more
    is the problem. It will not pretend the flood can be scheduled away. The overwhelm
    is not a queue to be processed. It is a body asking, plainly, for room.


    What it offers is recognition, and a way down. Language for the moment the water
    rises. A practice small enough to happen between two meetings, on a crowded train,
    in the bathroom with the door shut — a way of letting some of the weight off the
    body before it asks for everything you have.


    You are not failing to keep up. You are a person who has been over capacity for
    a long time, and who is allowed to discover that there is still, underneath all
    of it, somewhere to stand.


    Book 2 of the Stillness Press somatic healing series.'
