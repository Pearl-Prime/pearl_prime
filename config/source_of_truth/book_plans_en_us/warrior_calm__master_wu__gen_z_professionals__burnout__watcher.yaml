description:
  short_blurb: Burnout isn't only the work — it's the watcher that won't stand down
    once the work is done. This is a steady book for the mind that keeps scanning
    for the next fire long after the office goes dark, and the body that has forgotten
    how to be off duty.
  long_description: 'The laptop is closed. The day is technically over. And still
    some part of you is on. Scanning. Bracing. Half-listening for the ping that means
    something''s wrong, mentally re-reading the message you sent, running the meeting
    again to check for the misstep. You lie down and your mind keeps its post at the
    gate, eyes open in the dark, certain that the moment you truly rest is the moment
    it all falls apart.


    This book is for the young professional who cannot find the off switch. For the
    one whose phone lives in their hand on weekends, who feels a jolt of dread at
    a manager''s ''can we talk?'', who has been vigilant for so long they''ve forgotten
    it''s even possible to set the watch down. You are not paranoid and you are not
    failing. Your alarm system learned, in a world of always-on work and instant accountability,
    that the safest thing was to never stop scanning — and now it doesn''t know how
    to believe the danger has passed, because the next one always comes.


    Here you''ll come to recognize the watcher for what it is. How the hypervigilance
    that once kept you sharp is now the thing draining you dry. You''ll see the cost
    in your body — the shoulders that never drop, the sleep that stays shallow, the
    way you brace for impact that never lands. And you''ll learn the discipline the
    watcher has never been offered: not how to scan more efficiently, but how to finally
    stand down. How to trust that the gate can hold without you white-knuckling it
    all night.


    This book will not make you more vigilant or better at staying ahead of every
    threat. It offers no system for monitoring your life with less effort, because
    the monitoring is the wound. There is nothing here that will help the watcher
    do its job — only the slow, steadying permission for it to rest.


    What it offers instead is the quiet that comes when the scanning stops. Not the
    false calm of pretending nothing matters. The trained calm of a sentry who has
    finally learned the difference between a real threat and a phantom one, and can
    lower their eyes without the world ending.


    The fire you keep watching for is not coming tonight. You are allowed to come
    off duty. The gate will hold while you sleep.


    Book 3 of the Iron Gate Press Burnout series.'
