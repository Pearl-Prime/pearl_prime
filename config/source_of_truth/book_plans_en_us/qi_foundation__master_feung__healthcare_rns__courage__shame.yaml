title: The Nurse Who Never Needs Anything
subtitle: For nurses who hide that they're struggling — when the courage you can't
  find is the courage to be seen as human
cover_tagline: You can hold the whole floor together and still believe you're the
  one thing wrong with it.
description:
  short_blurb: You are the one who never calls out, never complains, never lets them
    see you falter. And underneath it sits a quiet conviction that if they saw the
    truth of you, they'd know you don't belong here. This is a book for nurses who
    overwork to cover a defect that isn't real. It won't tell you to love yourself.
    It will help you set the mask down long enough to breathe.
  long_description: 'You are the dependable one. You pick up the shift. You never
    call out. You stay late to help the new grad, you absorb the family''s anger without
    flinching, you apologize for needing a bathroom break. And somewhere underneath
    all that competence sits a belief you have never said out loud: that you are not
    actually good enough to be here, and that staying useful is the only thing keeping
    anyone from finding out.


    This book is for the nurse who carries shame like a second uniform. Not guilt
    — guilt says you did something wrong. Shame says you are something wrong. It''s
    the voice that tells you the gratitude was a fluke, the praise was misplaced,
    and the real you — tired, uncertain, sometimes resentful, sometimes scared — is
    a person no one would want at the bedside. So you hide her. You overwork to cover
    her. And the harder you work, the more certain you become that the work is all
    you''re worth.


    Here you''ll come to recognize the defect you''ve been hiding for the invention
    that it is. You''ll see how shame recruits your strengths against you — how your
    reliability becomes a place to disappear, how needing nothing becomes proof of
    your value, how the very fact that you can carry it all convinces you that you
    must, forever, alone. You''ll feel where it has settled in the body: the held
    breath, the collapsed chest, the root that has gone dry from giving and giving
    and never once being allowed to receive.


    This is not a book about self-esteem. It will not hand you affirmations to repeat
    in the mirror or a worksheet of evidence that you''re enough. There is nothing
    here to fix, because you were never broken — only convinced, early and deeply,
    that your worth had to be earned shift by shift. Shame is not the truth about
    you. It is an old verdict, handed down before you could argue, that you have been
    quietly serving ever since.


    What you''ll find instead is slower and far more tender: how to let the mask come
    off in your own hands, in private, before you ever risk it with anyone else. How
    to let your breath reach the bottom again. How the courage you can''t seem to
    find is not the courage to be more impressive — it''s the courage to be seen as
    human, to need something, to let the well refill from below instead of scraping
    it dry to prove you deserve the water.


    You do not have to earn your place here. You were never the thing that was wrong.
    And you are allowed, finally, to be a person and not a performance.


    Book 3 of the Root & Meridian Press courage series.'
