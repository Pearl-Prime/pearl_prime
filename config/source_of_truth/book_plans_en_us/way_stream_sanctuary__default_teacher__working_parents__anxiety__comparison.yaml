title: 'The Alarm Is Lying: The Comparison Trap'
subtitle: A Field Guide for Working Parents Navigating Anxiety Relief
cover_tagline: Everyone else seems to be holding it together. They're not. And neither
  is the part of you doing the measuring.
description:
  short_blurb: You scroll past another parent who seems to have the lunches, the career,
    and the calm all figured out, and something in your chest tightens. This is a
    field guide for working parents whose anxiety speaks the language of comparison.
    It won't make you better than anyone. It'll show you why the measuring never stops,
    and how to set the measuring tape down.
  long_description: 'You''re standing at pickup, half-listening, when another parent
    mentions the thing their kid did, the trip they took, the promotion. And before
    you''ve decided to, you''re doing the math. Where you rank. What you''re behind
    on. What it says about you that you''re tired and they look fresh.


    This book is for the working parent who measures. The one who can''t open a phone,
    walk into a room, or hear about someone else''s week without instantly grading
    their own life against it. You''re not shallow. Comparison is the alarm''s favorite
    trick, because it always finds something, and it never tells you you''re enough.


    First, you''ll learn to name it in the moment it fires: that hot, sinking instant
    where someone else becomes the ruler you hold against yourself. Naming it is not
    the same as stopping it, and this book won''t pretend otherwise. Then you go down.
    Not around the feeling, into it: the old fear underneath the scorekeeping, the
    belief that love and worth are running low and someone else got there first. You''ll
    see how the comparison isn''t really about them. It''s a story your nervous system
    tells to explain a fear it can''t otherwise hold, the fear that you are failing
    the people who depend on you and everyone can see it but you.


    And then you come back up changed. Not winning. Not finally ahead. Just no longer
    needing the scoreboard to know where you stand. The other parent''s life stops
    being a verdict on yours. Your kid stops being evidence in a case you''re always
    losing. The phone stops being a courtroom you walk into a dozen times a day.


    This book will not make you the parent everyone envies. It won''t optimize your
    mornings, hand you a five-step plan, or promise that if you try hard enough you''ll
    come out on top. There is no top. That''s the point. What it offers instead is
    the moment the measuring tape goes slack in your hands and you realize you were
    never actually in a race, you were just exhausted from running one nobody else
    entered.


    Written in plain, grounded language you can actually use the next time the comparison
    hits at 8am with one shoe on and a kid in the car, this is real talk for the part
    of you that keeps checking the standings. You are allowed to stop keeping score.
    You are allowed to have a hard week without it meaning something is wrong with
    you. Put the tape down. The race was never real, and your kid never needed you
    to win it.'
