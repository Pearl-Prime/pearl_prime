title: Too Much Arriving at Once
subtitle: For the working parent whose body is bracing against a flood that never
  stops coming — when there's no room left to think, and resting feels like a thing
  other people get to do
cover_tagline: It isn't that you can't cope. It's that nothing has stopped long enough
  for you to set it down.
description:
  short_blurb: By the time the kids are asleep, your shoulders have been up near your
    ears for fourteen hours and you couldn't say when they went there. This is a book
    for the working parent who is not falling apart — who is, in fact, holding everything
    — and whose body has simply run out of room. It won't hand you a morning routine
    or ask you to push through. It will show you, gently, what the flood is doing
    in your body, and how to let the ground take even a little of the weight.
  long_description: 'It''s a Tuesday, and it''s only 7:15 in the morning, and already
    there is too much. The lunchbox and the missing shoe and the email that came in
    before you were awake and the small voice asking the same question for the fourth
    time. None of it is a crisis. All of it is arriving at once. And somewhere underneath
    your sternum, something pulls tight and stays tight, and you carry it into the
    car, into the meeting, into the night, until you''re standing at the counter hours
    later with your jaw set and your breath gone shallow, wondering why you can''t
    just put it down.


    This book is for you — the working parent of young children who is not failing,
    not weak, not behind. You are holding more than one body was built to hold, and
    your nervous system has done the only sane thing: it has braced. The tightness
    in your chest is not a flaw. It is a flood response. It makes complete sense.


    Gently, without a single worksheet, you''ll come to recognize what overwhelm actually
    is in the body — not a character problem but capacity exceeded, too much input
    and no margin left to process it. You''ll feel how the flood narrows your breath
    and steals the space between one demand and the next. You''ll learn what it is
    to let the ground beneath you take a fraction of the weight, even for ten seconds,
    even between meetings. You''ll begin to notice the moment the water starts rising,
    before it crests — not to stop it, but to stop fighting it alone.


    This book will not promise to make your life less full. It won''t optimize you,
    hack your stress, or hand you a routine to fail at by Thursday. It will not ask
    you to push through, and it will never ask you to override what your body is telling
    you. There is no fix here, and that is the point. You were never broken. You were
    flooded, and you didn''t know you were allowed to come up for air.


    The practices ask for almost nothing — a breath on the subway, one hand on a solid
    surface, a single exhale in the car before you go in. They meet you in the cracks
    of a day that has no cracks.


    You''ll walk away knowing what your body is doing and why it has every reason
    to do it. Not cured. Not finally calm. But no longer braced alone against the
    flood — and a little more able to feel the floor still holding you up.


    You are allowed to set some of it down. You always were.


    Book 1 of the Felt Sense Publishing somatic healing series.'
