title: The Exhaustion That Won't Let the Lights Go Out
subtitle: For the nurse worn down to the bone by a watch she can never set aside —
  when depression is the long, lightless tiredness of a mind that will not let the
  night close
cover_tagline: The shift ended hours ago. Something in you is still on guard.
description:
  short_blurb: You can leave the unit, but the unit never leaves you — the scanning,
    the double-checking, the part of you braced for the call that doesn't come. This
    is a book for the nurse whose depression is the bone-deep fatigue of a mind that
    never goes off duty. It won't tell you to relax. It will help that watchful part
    of you finally rest.
  long_description: 'The shift ended hours ago. You''re home, the lights are off,
    the floor is someone else''s problem now — and still, some part of you is on.
    Scanning. Replaying the handoff. Bracing for the page that won''t come. You lie
    in the dark running the night back, checking for the thing you missed, and the
    tiredness underneath it all isn''t the kind sleep fixes. It''s the exhaustion
    of a mind that has forgotten how to stand down.


    This book is for you: the nurse who is always, quietly, on watch. The one who
    can''t fully arrive anywhere because part of her is still monitoring — the patients,
    the charting, the catastrophe that didn''t happen. The one whose depression doesn''t
    look like sadness so much as a flat, wrung-out vigilance that never lets up. If
    you can''t remember the last time your mind was truly off duty, this is for you.


    In these pages you''ll come to recognize how depression in a caregiver can wear
    the face of hypervigilance: a nervous system that learned, for very good reasons,
    that letting its guard down was dangerous — and never learned how to stop. You''ll
    see the cost of being the one who catches everything. How the watching follows
    you home and calls itself responsibility. How the belief underneath — that if
    you stop scanning, something terrible will slip through — keeps you braced against
    a threat that, here, in the dark, is not coming. And you''ll begin to feel what
    it might be to let the watch end. To let something else hold the night while you
    rest.


    This is not a relaxation technique or a mindfulness drill to add to your day.
    It will not tell you to ''just switch off,'' optimize your nervous system, or
    hand you one more thing to monitor your progress on. There is no push-through
    here, and nothing that treats your exhaustion as a discipline problem. Nothing
    in this book asks you to stay alert.


    It asks the opposite: that for the length of these pages, you let the watch be
    over. That you let the room be safe enough to stop scanning. That the part of
    you that has been on guard for years be allowed, finally, to set the watch down.


    You are not paranoid and you are not failing. You are someone whose mind learned
    to keep everyone safe and was never told it could rest. The vigilance is not a
    flaw. It''s a watch that was never relieved.


    Let this be the relief. The dark will hold the night now.


    Book 3 of the Night Architecture Books depression series.'
