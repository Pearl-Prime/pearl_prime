title: Off Duty Was a Lie
subtitle: On the manager's mind that never clocks out — still scanning for the next
  escalation long after everyone else has gone home
cover_tagline: The day ended hours ago. Your mind never got the message.
description:
  short_blurb: You closed the laptop, but the watching didn't stop. Part of you is
    always half-listening for the next message, the next problem, the next thing only
    you can catch. This is a book for the manager who hasn't truly been off the clock
    in years.
  long_description: 'It''s late, and the house is quiet, and still some part of you
    is on. Listening for the buzz of the phone. Running tomorrow''s escalations before
    they''ve happened. Scanning the team, the numbers, the thousand small things that
    could go wrong, as if your attention is the only thing holding it all together.
    You closed the laptop hours ago. The watching never closed with it.


    This is the burnout of the mind that never goes off duty. Not the exhaustion of
    doing too much, but the deeper depletion of never being allowed to stop monitoring
    — of carrying a low hum of vigilance into dinner, into bed, into the few hours
    that were supposed to be yours.


    This book is for the manager who has become the perpetual watch. The one who catches
    what others miss, and pays for it in a nervous system that has forgotten how to
    stand down. The one who can''t fall asleep without a final scan, and wakes already
    braced.


    Here, you''ll come to recognize the watcher for what it is — a part of you that
    learned, somewhere along the way, that safety depended on never looking away.
    You''ll see how it disguises itself as responsibility, as diligence, as simply
    being good at your job, when underneath it is a mind that no longer believes it''s
    allowed to rest. You''ll begin to feel the difference between attention that serves
    you and vigilance that only drains you, and you''ll glimpse what it might be like
    to let the watch end when the day does.


    This book will not teach you to monitor more efficiently or to optimize your vigilance
    into something productive. It will not hand you a routine for switching off on
    command, as if your overworked nervous system were a device with a setting you''ve
    been too lazy to find. The watching was never a discipline problem. It was a part
    of you trying, exhaustingly, to keep everyone safe.


    What it offers instead is a way to thank that part and let it rest. A slow loosening
    of the grip. The settling that comes not from forcing the mind quiet, but from
    finally convincing it that nothing is coming, and it is allowed to stop looking.


    You are allowed to be off duty. The watch can end. Nothing is going to fall apart
    because you finally looked away.


    Book 3 of the Stillness Press burnout series.'
