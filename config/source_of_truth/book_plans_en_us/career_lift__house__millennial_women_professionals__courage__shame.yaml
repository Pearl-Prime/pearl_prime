title: The Voice You Swallow in the Meeting
subtitle: For the woman who shrinks her ambition to stay liked and calls it being
  a team player
cover_tagline: You learned to disappear so no one could find the flaw. They were going
  to promote you anyway.
description:
  short_blurb: 'When the stakes rise, you don''t lean in — you go small, you defer,
    you let the moment pass, all to protect a secret you''ve carried for years: the
    buried sense that something is wrong with you and you''ve only ever been faking
    the rest. This is a book for the woman whose courage is blocked by shame. It won''t
    tell you you''re enough on a mug. It''ll show you that the defect you''ve been
    hiding was never the thing holding you back — the hiding was.'
  long_description: 'The moment got bigger, so you got smaller.


    The room turned toward you and you handed the floor to someone else. The chance
    to lead came and you found a reason it should go to him. You''ve built a quiet,
    expensive talent for shrinking at exactly the moments that could move you forward,
    and you''ve called it humility, or being a team player, or not wanting to overstep.
    Underneath it is something you''ve never said out loud: a low, steady certainty
    that something is wrong with you, that your success has been a long act of getting
    away with it, and that the next big step is just a bigger stage to finally be
    found out on.


    This is a book for the woman whose career fear is really shame. Not nerves, not
    modesty — the buried belief that there''s a defect at your center, and that every
    promotion, every reach, every visible win raises the odds someone finally sees
    it. So you withdraw. You overprepare and underclaim. You make yourself small enough
    that no one looks too closely, and then you wonder why the door you wanted never
    opens for you.


    You''ll come to recognize shame by what it makes you do. The way you go quiet
    under pressure instead of louder. The credit you deflect because keeping it would
    mean believing you earned it. The way you''ve worked twice as hard to cover a
    flaw no one else can even see — and how exhausting it is to run a whole career
    as damage control. You''ll learn that shame can''t survive being said plainly
    to someone safe, that the thing you''re hiding is far smaller and more human than
    the hiding has made it, and that you don''t have to fix yourself before you''re
    allowed to take up room. You were never broken. You were just convinced you were,
    and you''ve been writing your career around the wound.


    This book will not hand you confidence like a slogan. It will not tell you that
    you''re already enough and leave you to perform that on command, and it will not
    pretend the shame lifts in a single brave afternoon. There''s no thinking your
    way out of believing you''re a fraud.


    What it offers is a way to stop overworking the cover story, to step forward as
    the unfinished, ordinary, genuinely-good-enough person you already are — and to
    let the next chapter belong to her, instead of to the version you kept hiding.


    Book 3 of the Next Chapter Publishing courage series.'
