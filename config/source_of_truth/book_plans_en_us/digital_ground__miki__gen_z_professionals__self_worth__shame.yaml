title: The Part of You That Keeps Working So Nobody Finds Out
subtitle: For the high-functioning twenty-something who is certain something is secretly
  wrong with them — and overdelivers so no one will look too closely
cover_tagline: You're not behind. You've just been hiding a defect that was never
  there.
description:
  short_blurb: 'There''s a quiet certainty you carry into every room: that if anyone
    really saw you, they''d find the thing that''s wrong. So you overdeliver, you
    say sorry first, you keep the camera angled just right. This is a book for the
    part of you that has been working overtime to make sure nobody finds out.'
  long_description: 'You reply to the message within four minutes. You apologize before
    anyone''s even annoyed. You keep your standup answer rehearsed and your follow-through
    perfect, and somewhere underneath all of it is a belief you''ve never said out
    loud: that there is something wrong with you, specifically, and the work is just
    to make sure no one ever sees it.


    That''s shame. Not the loud kind. The kind that runs so quietly you mistook it
    for your personality.


    This book is for the gen-z professional who looks, from the outside, like they
    have it handled. You''re the reliable one. The one who notices when the deck is
    off by a pixel. And you''re exhausted, because being the person who has it together
    is a full-time job on top of your actual job, and the second you stop performing,
    the old feeling is right there waiting: that you got in by accident, that you''re
    one dropped ball away from being found out, that the real you is the problem and
    the polished you is the cover story.


    You''ll come to recognize the mask for what it is — a thing you built young, in
    a feed that rewarded the highlight and punished the wobble. You''ll feel how much
    it costs to keep it up. You''ll get underneath it to the belief itself, the one
    that says the defect is you, and you''ll see, maybe for the first time, that the
    belief is not a fact. It''s a weather system you''ve been living inside. You''ll
    learn what your body does when the shame fires — the held breath, the heat in
    the face, the urge to over-explain — and what it feels like to stay in the room
    anyway, phone face-down, feet on the floor, nobody to perform for.


    This is not a book that''s going to optimize you. It will not give you a morning
    routine or a confidence hack or a way to finally earn the worth you think you''re
    missing. It refuses to, on purpose. Because the moment you try to fix the defect,
    you''ve agreed it''s there. Nothing here helps you cover it better. That''s the
    point.


    There is nothing wrong with you that needs hiding. There never was a defect —
    only a kid who learned that being seen was dangerous, and a grown-up still running
    the drill. You''re allowed to set it down. You''re allowed to be a person in a
    room instead of a brand on a screen. You can stop now.


    Book 1 of the Present Tense Books self worth series.'
