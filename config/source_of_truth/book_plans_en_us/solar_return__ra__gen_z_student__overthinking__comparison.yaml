title: They All Seem to Carry It Lighter
subtitle: For the student sure their classmates think half as hard and worry half
  as much
cover_tagline: They look so sure. You've never been more certain you're falling behind.
description:
  short_blurb: Everyone else seems to have figured something out that nobody told
    you. This is for the overthinker who measures their churning mind against every
    classmate who looks calm, sorted, ahead — and always loses. It won't help you
    catch up. That's the point.
  long_description: 'Open the phone and there they are: someone''s internship, someone''s
    relationship, someone''s effortless certainty about exactly what they''re doing
    with their life. You''re up at midnight with a mind that won''t quiet, and everyone
    on the screen looks calm, finished, sure. It seems like they all got a manual
    you never received — and so the thinking turns on the only target left: you, lit
    by a screen, certain you''re the one who''s behind.


    This book is for the student who measures themselves against everyone who looks
    fine. You take your loudest, most anxious inside and hold it up against their
    quietest, most curated outside, and call the gap a verdict. The classmate who
    answers so easily. The friend who seems to have it all sorted. The version of
    your peers that exists only in highlight reels and in your head at 1 a.m. You
    have turned a sharp, restless mind toward a contest you can only lose, and you
    run it again and again, looking for the proof that you''re behind.


    Here you''ll come to recognize comparison as the engine driving so much of the
    overthinking. How the mind builds a leaderboard nobody else is standing on. How
    ''everyone else has it handled'' is a story made of glimpses, and how your overthinking
    treats it as data. You''ll learn what it feels like to catch yourself mid-measurement
    and set the ruler down. You''ll see that the people who look calm are mostly just
    people you can''t see clearly. And you''ll find that your worth was never a ranking
    — that the warmth of your own life can''t be felt while you''re busy grading it
    against someone else''s.


    Nothing here will help you win the comparison. That''s the point. This book won''t
    give you a glow-up plan or a way to finally pull ahead. It won''t promise that
    if you measure yourself hard enough, you''ll be the one others envy. It refuses
    to enter you in the race at all. What it offers instead is the relief of stepping
    off the leaderboard — of being a person, in a life, rather than a rank in a feed.


    You are not behind. There was never a line, and there was never a manual. You
    are allowed to close the comparison and warm your hands at the small, real fire
    of your own life.


    Book 6 of the Ember & Ash Publishing overthinking series.'
