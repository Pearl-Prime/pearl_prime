title: The Part of You That Never Sits Down
subtitle: For the working parent whose mind is always on watch — scanning the room,
  the faces, the future for a threat that never comes
cover_tagline: Always scanning. Always on. Never quite off duty.
description:
  short_blurb: Some part of you is always scanning — the room, the faces, the next
    thing that could go wrong. This is a book for the working parent who can't put
    the watch down, and a slow way of letting the body believe it's finally safe enough
    to.
  long_description: 'Even now, some part of you is watching. Reading the room. Checking
    the faces for what might be wrong, the calendar for what might go sideways, the
    small sounds in the house for the one that means you''re needed. You can be sitting
    still and entirely on duty — a sentry that never got the message it could stand
    down. You don''t remember choosing it. It just became the way you move through
    a day.


    This book is for the working parent whose mind never goes off watch. The one who
    scans a playground for exits without meaning to, who feels the shoulders rise
    when a door opens, who lies down at night with the body still posted at the window
    of some old threat. Hypervigilance, someone may have called it. From the inside
    it just feels like the cost of being the one everyone depends on.


    Here you''ll come to recognize the watcher for what it is — not paranoia, not
    a personality flaw, but a nervous system that learned, early and well, that safety
    had to be earned by never looking away. You''ll feel where the watching lives
    in your body: the set of the jaw, the eyes that won''t soften, the breath held
    high in case. You''ll learn what it takes for that part of you to trust, for even
    a moment, that it can rest — that the room can be held by something other than
    your constant attention. Not by forcing yourself to relax. Not by white-knuckling
    your way to calm. By offering the watcher, at last, the one thing it has never
    been given: a sense that the ground is steady, and that it is allowed to set the
    post down.


    This is not a book that will switch off your vigilance or teach you to stop caring.
    It will not optimize your attention or hand you a discipline to finally master
    your own mind. There is nothing here to get right, and no effortlessly serene
    version of you waiting past the next technique.


    What it offers instead is recognition — a language for the watcher that you can
    reach for the next time you catch yourself scanning, in a meeting, at the dinner
    table, in the dark when the house is finally quiet and your body still won''t
    believe it. You''ll come to understand what your body is doing when it can''t
    stand down, and why, after everything it''s held, it makes complete sense.


    Not fixed. Not finished. Just a watcher that knows, now, it doesn''t have to do
    this alone — and a body learning, slowly, what it feels like to be off duty.


    Book 3 of the Stillness Press somatic healing series.'
