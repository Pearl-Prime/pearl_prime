title: You Can Feel It Before They Say It
subtitle: 'For the manager who carries the team: when your body sounds the alarm for
  a crisis that never comes'
cover_tagline: Nothing is on fire. So why is your chest still braced?
description:
  short_blurb: You read the room before you read your own chest — bracing for a crisis
    that, most days, never comes. This is a book about the false alarm that fires
    in the body of every manager who carries the people, and about what it costs to
    stay on call with no one on call for you.
  long_description: 'You read the room before you read your own chest.


    By the time you notice your heart is going, the meeting is already over. You''re
    in the hallway, or the parking garage, or finally home, and your body is still
    braced — scanning the team, the numbers, the one person who went quiet on the
    call, the email you haven''t answered. Nothing is on fire. Everyone is, technically,
    fine. And still some part of you is standing guard, certain that if you stop holding
    it all, something will fall.


    This book is for the manager who carries the people. The one who absorbs the room''s
    stress so the team doesn''t have to, who can feel a direct report''s bad week
    before they say a word, who has quietly decided that caring this much is just
    the cost of doing the job well. You are good at this. That''s the problem. The
    same nervous system that makes you a steady place for everyone else has started
    sounding an alarm that never fully shuts off — not because you''re failing, but
    because it has been on call for too long with no one on call for you.


    What you have is not a character flaw, and it is not weakness dressed up as empathy.
    It is a false alarm: a finely tuned threat-detection system firing in a room where
    there is no real danger, only the ordinary, endless weight of being responsible
    for other people. Your body learned to treat every flicker of someone else''s
    distress as a fire to put out. It has forgotten how to tell the difference between
    a crisis and a Tuesday.


    Chapter by chapter, this book does three things, and none of them is a fix. First,
    recognition — it names the alarm precisely enough that you can feel it start,
    the tightening in the chest, the reach for the phone, the reflex to manage one
    more feeling that isn''t yours. Then descent — it lets you go down into the cost
    you''ve been outrunning, the emptiness under the competence, the cup you keep
    pouring from and never refill, instead of bracing past it one more time. And finally
    integration — not a cure, not a morning routine, but a different relationship
    with a body that has been trying, all along, to get your attention.


    The practice this asks for is small enough to happen where your life actually
    happens: on a delayed flight with the laptop open, in the ninety seconds between
    back-to-back calls, in the car before you walk in the door and become available
    to everyone again. You won''t be asked to care less. You''ll be asked to notice
    when the alarm is firing for a danger that isn''t there — and to let that be information
    instead of an order.


    You will not finish this book repaired. The role will still ask too much. The
    people will still need you, and you will still, being who you are, want to show
    up for them. But you may stop mistaking your nervous system''s exhaustion for
    proof that you have to keep bracing. You may learn what your body has been saying
    under all that noise. And you may find that you can keep caring without disappearing
    into it.


    Book 1 of the Somatic Wisdom compassion fatigue series.

    '
