title: Even When the Kids Are Sleeping
subtitle: For the parent whose chest stays tight in the quiet house — when the children
  are safe in their beds and your body still hasn't gotten the message
cover_tagline: You haven't felt off-duty in years. You're still scanning.
description:
  short_blurb: Even when nothing is wrong, part of you is scanning — counting heads,
    reading faces, tracking the next thing that could go wrong, never standing down.
    This is a body-first companion for the parent whose hypervigilance never sleeps.
    It won't ask you to lower your guard before you're ready. It will help your body
    learn that it's safe enough, now, to rest the watch.
  long_description: 'The kids are asleep. The house is quiet. And you''re still scanning.
    Listening for the cough, the creak, the thing that''s about to need you. Even
    in stillness, part of you stands at the window of yourself, watching the road
    for trouble — counting heads at the park before you''ve consciously decided to,
    reading every face for the first sign something''s off, keeping a tally of every
    what-if that never quite ends. You can''t remember the last time you felt truly
    off duty. The watcher in you never sleeps, because somewhere it learned that the
    moment it does, that''s when something goes wrong.


    This book is for the parent who is always on guard. Who lies awake on alert in
    a safe, quiet house. Who can''t fully land in a good moment because part of them
    is already scanning the horizon for the next threat. Who is bone-tired in a way
    rest doesn''t touch — the specific exhaustion of vigilance that never gets to
    set itself down. The watcher isn''t your enemy. It''s the part of you that loves
    your children so fiercely it volunteered for a shift with no end. But it''s been
    on duty too long, guarding against dangers that mostly never come, and it has
    forgotten how to rest. You are not paranoid. You are over-prepared by a body that
    hasn''t been told the watch can ease.


    Here you''ll come to recognize the watcher in the body — the scanning eyes, the
    cocked-ear listening, the muscles that never fully release, the breath held just
    slightly, always, in case. You''ll learn that you cannot force the guard to drop
    and you don''t have to. You''ll feel what it is to send the watcher a different
    signal: not abandon your post, but you can rest here, I''ve got us, the danger
    isn''t now. The ground holds. The body softens by degrees. The watch can loosen
    without the world falling apart.


    This is not a method for switching off your vigilance. There''s no forcing yourself
    to relax, no white-knuckling your way to calm, no override. We will not tell you
    to just stop worrying about your kids — that instinct is love, and we honor it.
    And we will not flood a guarded nervous system with more than it can hold. Nothing
    here promises the scanning stops on command. The point is that your body can learn
    the difference between guarding and bracing — and rest the watch when the watch
    isn''t needed.


    You are allowed to stand down. You are allowed to let the floor hold the weight
    for a while. The vigilance will rise and the vigilance will ease, the way weather
    moves through, and you can learn to let the watch soften in a body that is, right
    now, safe enough. You don''t have to guard every moment to be a good parent. You''re
    allowed, finally, to come off duty — and rest.


    Book 7 of the Felt Sense Publishing anxiety series.'
