description:
  short_blurb: How to Recognize When Anxiety Is a False Alarm — and What to Do Instead stop waiting and start the thing I keep delaying.
  long_description: |
    How to Recognize When Anxiety Is a False Alarm — and What to Do Instead

    This book is for working parent of young kidss who I know what I need to do but I can't make myself do it. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.

    Chapter by chapter, you'll work with what when your mind screams danger really means in your body and mind, and how to work with it. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.

    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.

    Book 1 of the Devotion Path courage series.
