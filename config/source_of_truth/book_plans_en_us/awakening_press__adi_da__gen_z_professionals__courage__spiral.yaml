title: A Single Doubt That Branches Into Hundreds
subtitle: For the early-career mind that spirals through every version of the brave
  choice until none feels safe
cover_tagline: It started with one small worry. By 1am it had become your whole future.
description:
  short_blurb: 'It begins with a single thought — Did I say the wrong thing? — and
    by midnight it''s an avalanche: your competence, your career, your worth, all
    collapsing in a loop that feeds on itself. This book is for the young professional
    who spirals, and who is ready to recognize the one part of them that isn''t spinning.'
  long_description: 'It always starts so small. One offhand comment in a meeting.
    One reply that came back a little too short. One thing you didn''t say, or said
    badly. And then the door opens — and behind it is another door, and another, and
    by 1am you''ve walked through a thousand of them and arrived somewhere terrifying:
    maybe you''re not cut out for this, maybe they all see it, maybe this is who you
    are now.


    You didn''t decide to think any of that. The spiral decided for you.


    This book is for the young professional caught in the downward pull of rumination
    — the one whose mind, left alone for a moment, immediately goes looking for the
    worst version of every story. You are smart. That''s part of the trap. A sharp
    mind is very good at building elaborate disasters out of almost nothing, and yours
    has gotten dangerously fluent at it. People keep telling you to just stop overthinking,
    as if you hadn''t noticed, as if you weren''t trying.


    You''ll come to recognize the spiral as a process, not a truth — one thought reaching
    for the next, each one borrowing your attention to fund the next, the whole structure
    standing only because you keep believing it. You''ll see how it disguises rumination
    as problem-solving, and how the courage you''re waiting for never arrives at the
    bottom of the loop, because the loop has no bottom. And underneath all of it,
    you''ll begin to feel something the spiral can''t touch: the open, quiet awareness
    in which every thought is appearing and dissolving — the sky the storm is passing
    through.


    This is not a book about thinking better thoughts. It will not teach you to argue
    with the loop or replace the dark scripts with bright ones — that''s just more
    spinning. It will not make your mind go silent, manufacture confidence, or turn
    courage into a thing you finally earn after enough mental reps.


    What it offers is the recognition that you are not the thought, and you are not
    the thousand doors. You are the one noticing them open. And from that ground —
    steady, unhurried, already free of the loop — you can do the brave thing without
    first untangling every what-if.


    The avalanche keeps falling. You don''t have to be standing under it.


    Let the thought come. Watch it go. Move anyway.


    Book 2 of the Awakening Press courage series.'
