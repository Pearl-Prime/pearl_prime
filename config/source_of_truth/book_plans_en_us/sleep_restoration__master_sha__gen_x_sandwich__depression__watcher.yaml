title: Keeping Night-Watch Over Two Houses
subtitle: For the one whose ear stays tuned to a parent's room down the hall and a
  kid's door upstairs — and the slow gray weight of a mind that has forgotten how
  to be off-watch in the dark
cover_tagline: You can put the phone face-down. The watching doesn't stop.
description:
  short_blurb: Some part of you is still on call at 3am — listening down the hall,
    bracing for the phone, scanning for the disaster that hasn't come yet. This is
    for the mind that never clocks out, and the slow depression that sets in when
    nothing in you is ever allowed to rest. It won't tell you to relax. It will help
    you understand why you can't, and sit with you anyway.
  long_description: 'The house is quiet, but you''re not. Some part of you is still
    down the hall, listening for your father''s footsteps near the stairs he won''t
    stop using. Still half-waiting for the phone to light up with your kid or the
    care home or the brother who only calls with bad news. You''ve been on watch so
    long you''ve forgotten there was ever an off switch — and tonight, like most nights,
    you''re lying in the dark fully awake inside a body that desperately needs to
    rest.


    This book is for the one who never gets to stand down. For the person who became
    everyone''s emergency contact and can''t remember who''s listening for them. For
    the parent of a parent and a child at once, whose mind has turned into a watchtower
    that scans and scans and never finds the all-clear. For whoever is so braced for
    the next thing going wrong that they''ve stopped being able to feel the life happening
    right now.


    You''ll come to recognize how the watching and the depression feed each other
    in a life like yours. How a mind that never goes off duty burns through something
    that doesn''t grow back — until the hypervigilance hollows out into numbness,
    and the flatness you feel isn''t the absence of caring but the exhaustion of caring
    without rest for years. You''ll see why you can''t simply decide to relax, and
    why being told to is its own small cruelty. You''ll learn what it is to let the
    watch be set down in the quiet hours — not by forcing your guard to drop, but
    by letting the dark room hold the watching for a while, so the part of you that''s
    been standing sentry can finally sit.


    This will not teach you to silence your mind or optimize your way to calm. It
    will not hand you a breathing trick and call your vigilance a malfunction. The
    watching made sense; it kept people safe. There is nothing here to fix, and no
    need to be at peace before you''re allowed to lie down.


    You are allowed to be off duty for the length of one night. Nothing will fall
    because you stopped holding it for a few hours. Let the dark keep watch. You can
    close your eyes.


    Book 3 of the Night Architecture Books depression series.'
