title: 'Social Anxiety: The Hidden Weight of Shame'
subtitle: When You Feel Fundamentally Wrong — Social Anxiety for Entrepreneurs (The
  Hidden Weight of Shame)
cover_tagline: You're not afraid of the room. You're afraid the room will see what
  you already believe about yourself.
description:
  short_blurb: Your social anxiety isn't really about people — it's about being seen,
    because being seen means being found out. Underneath it is the buried belief that
    something is wrong with you. This is founder shame wearing a crowd, and this book
    takes you down to where it actually lives.
  long_description: 'You''d think it was the people. The crowd, the small talk, the
    eyes. But sit with it and it goes lower than that. What you actually dread is
    being seen — fully, without the deck and the title to stand behind — because somewhere
    you''re certain that what''s underneath isn''t good enough. The social fear is
    just the surface. The thing driving it is older: a belief that you''re defective,
    and that exposure is the moment everyone finds out.


    This book is for the founder whose social anxiety is shame in disguise. Not nervousness
    about talking, but the deeper conviction that the real you — the one without the
    company''s armor — is somehow wrong, miscast, less-than. You feel it most where
    you''re most exposed: the dinner where you can''t hide behind the pitch, the room
    where the conversation turns personal, the moment someone looks at you a beat
    too long and you''re sure they''ve clocked the defect. So you manage it. You perform,
    deflect, stay a little hidden, keep the conversation on the company so it never
    lands on you.


    We begin by naming it precisely — the felt grip of shame in social space, the
    exact founder-moments where the defect-belief flares and you shift into hiding,
    the difference between fearing people and fearing being known by them. Then we
    descend. Not to argue the shame away with proof of your worth, not to affirm yourself
    into ease, but to go down into the actual feeling and stay until the verdict softens
    back into sensation. You''ll see how shame disguises itself as social caution,
    how it drives the over-managing and the staying-behind-the-role, how it convinced
    you that being seen and being exposed are the same thing. And you''ll find what''s
    under the defect: not a flaw, but a fear you''ve been wearing as a fact since
    long before the company.


    This is not a social-confidence course or an affirmation deck. There are no scripts,
    no power poses, no reframes that turn your shame into charisma by the last page.
    This book will not optimize your social self or hand you a better persona to project.
    It won''t promise the shame lifts. What changes is that you stop mistaking the
    feeling for the truth about you. You learn to feel the defect-belief flare in
    a room and stay anyway — visible, unarmored, not hiding. To let yourself be seen
    without it being the end of you.


    Nothing is wrong with you. You''ve just been afraid the room would decide otherwise.
    You get to stop hiding from it.


    Book of the Brave in the World — for Founders (One-Hour) series.'
