title: 'The Alarm Is Lying: When Other People''s Success Feels Like Your Failure'
subtitle: A One-Hour Anxiety Reset for Tech & Finance Professionals
cover_tagline: Their promotion lands in your feed and something in your chest drops.
description:
  short_blurb: You are good at your job and it still never feels like enough, because
    someone is always one rung higher. This is a one-hour reset for tech and finance
    professionals who measure themselves against everyone and lose every time. It
    names the comparison loop for what it is and shows you how to step out of the
    ranking without pretending the ranking went away.
  long_description: 'A peer''s funding round shows up in your feed. Someone two years
    younger just made partner. You open the comp thread, the promo list, the leaderboard,
    and the same cold thing happens in your chest every single time. You''re not failing.
    By any outside measure you''re doing well. And it doesn''t touch the feeling,
    because in tech and finance there is always a number above your number and a person
    above your line.


    This is for the engineer who benchmarks against the staff promo they didn''t get,
    the analyst who reads the bonus pool like a scoreboard, the founder who can''t
    enjoy a good quarter because a competitor had a better one. The person who knows
    comparison is a trap and falls into it anyway, daily, while smiling in the standup.
    You hit your numbers and feel only the gap to the next person''s. You get the
    offer and immediately wonder what someone else got.


    Here''s what''s actually happening: your mind has confused your worth with your
    rank. So it never stops scanning, never stops measuring, never lets you arrive
    — because in a ranked field arrival is structurally impossible. There is always
    another tier, another round, another timeline that makes yours look slow. This
    book doesn''t argue you out of it. You can''t logic your way past a feeling that
    fast, and you''ve tried. Instead it has you recognize the exact moment the measuring
    starts, go down into what the comparison is actually protecting you from feeling,
    and come back able to hold your own life without holding it up against someone
    else''s.


    It will not tell you that you''re already enough and you should just believe it.
    It will not give you a gratitude practice or tell you to mute your feeds and call
    it handled. It will not promise the comparison voice goes silent — for people
    wired like you, in a field built on ranking, it probably won''t. What changes
    is that you stop taking its measurements as the truth about you.


    In about an hour you''ll have plain language for the loop: what fires it, what
    it costs you, and what to do the next time someone else''s win lands like your
    loss. Not a reframe you''ll forget by Monday. A way of standing in your own results
    without checking them against the room first, of reading the feed without it reading
    you.


    Your worth was never a percentile. You''re allowed to stop ranking yourself and
    still be ambitious, still be sharp, still want more. You just don''t have to bleed
    every time someone else gets theirs.'
