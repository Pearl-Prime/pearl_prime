title: What You Buried to Keep Working
subtitle: For the manager who never had time to grieve — the losses you walked past
  to make the meeting, and the flat grey weight that's really sorrow with nowhere
  to go
cover_tagline: You didn't stop grieving. You just scheduled over it.
description:
  short_blurb: Somewhere along the climb you learned to keep moving past the losses
    — the version of yourself you left behind, the things you let go to keep the job,
    the goodbyes you never properly said. This is a quiet book for the manager whose
    depression is really grief that was never allowed to land, and for the slow work
    of finally letting it.
  long_description: 'There was no good time to fall apart, so you didn''t.


    The loss came — a person, a marriage, a younger self who believed in something,
    a chapter that quietly closed — and there was a quarter to close too, a team that
    needed you, a calendar that didn''t blink. So you kept moving. You walked past
    the grief the way you''d walk past a closed door in a long hallway, and you told
    yourself you''d come back to it later. Later never came. And now, years on, you
    carry a grey, weightless heaviness you can''t explain — a flatness that looks
    like depression and lives where the mourning should have been.


    This book is for you. For the manager who has become an expert at scheduling over
    sorrow. For the one who let go of so much to get here and never let themselves
    feel any of it leave. For the person who suspects, somewhere underneath the numbness,
    that they are not broken so much as bereaved — and have simply never been given
    the room, or the permission, to know it.


    Come and walk slowly. In the forest, nothing is hurried out of season; what falls
    is allowed to fall, and the forest floor holds it until it becomes ground again.
    We will move at that pace. Without rushing, we will turn toward what you set down
    to keep working — the selves you outgrew and never said goodbye to, the people
    and possibilities that slipped past while you were being indispensable, the strange
    particular grief of getting everything you worked for and feeling the cost of
    it only now. You''ll come to recognize how unfelt loss doesn''t disappear but
    goes underground, surfacing as the very flatness you''ve been calling failure;
    how letting go is not the same as giving up; and why some weights only lift once
    you finally let yourself feel them leave.


    This is not a closure book. It will not hand you five stages, a timeline, or a
    tidy way to be done with what you''ve lost. It promises no fix and no optimizing
    your way past sorrow. There is nothing here to get over.


    There is only room — a clearing where the things you buried to keep working can
    finally be set on the forest floor, named, and grieved at the pace they always
    needed. You are allowed to mourn what you lost on the way here. You were always
    allowed.


    Book 2 of the Still Forest Press depression series.'
