title: What You've Been Holding So It Wouldn't Leave
subtitle: For the woman whose anxiety is grief that never got to land — letting the
  body release what it has gripped to keep from losing
cover_tagline: Some of the tension is just love with nowhere to go.
description:
  short_blurb: Sometimes anxiety isn't fear of what's coming — it's the white-knuckled
    grip on what's already gone, or going. This is a book for the woman whose tension
    is grief she never had time to feel. It won't rush you toward letting go. It will
    help your body finally set down what it's been holding so tightly it forgot it
    was holding at all.
  long_description: 'Some of the tension isn''t fear. It''s grief — held so long and
    so quietly that it learned to feel like anxiety instead. The version of your life
    that didn''t happen. The person who''s gone, or going. The self you were before
    all this, before the deadlines and the bracing. You never had the time to feel
    it, so your body did the only thing it knew: it gripped. It held on. It kept the
    loss from landing by never quite letting itself rest.


    This book is for the woman whose anxiety is grief in disguise. Not the obvious
    kind, with a funeral and a card — the quiet kind. The slow losses no one sends
    flowers for. The endings you metabolized in a single afternoon because there was
    a meeting at three. You''ve been calling it stress, calling it worry, calling
    it being wound too tight. But underneath the gripping is something that simply
    needs to be mourned and has not been allowed to.


    Here you''ll come to recognize grief as a held breath the body never finished
    — the clenched jaw, the throat that won''t open, the tension that has no object
    because its object is loss. You''ll learn that the grip is not weakness. It''s
    love with nowhere to go, devotion to something you weren''t ready to release.
    And you''ll learn what the body has been waiting for: not to be told to let go,
    but to be allowed to, slowly, in its own time, with something warm beside it.


    This is not a book about closure on a schedule. It will not rush you through stages
    or hand you a technique for getting over it efficiently. There is no protocol
    here for releasing on command, no bypass around the ache. The grip doesn''t loosen
    because you decide to move on. It loosens because your body, finally, feels safe
    enough to set the weight down.


    What you''ll find instead is the felt sense of release — not all at once, but
    a little. The breath that reaches the throat. The tears that were tension a moment
    ago. The unbearable, merciful softening of a place that has been holding on so
    long it forgot it was holding at all.


    You are allowed to grieve what you lost, even the quiet things. You are allowed
    to set it down and still keep the love. Let your body release at the pace of tenderness,
    not the pace of the day.


    Book 5 of the Felt Sense Publishing Anxiety series.'
