title: It Always Starts With One Number
subtitle: For the professional woman whose mind turns a single money worry into a
  thousand at 2am — when one glance at the balance writes the whole worst-case story
cover_tagline: One thought, and suddenly you are forty and out of options.
description:
  short_blurb: It starts with one number and ends with you imagining the worst version
    of your whole life. This is a book for the professional woman whose money worries
    multiply in the dark and feed on themselves. It will not argue you out of the
    spiral. It will show you where the pull begins, so you can stop being dragged
    down it.
  long_description: 'It starts small. You check the balance, or you remember the bill,
    or someone mentions their savings — and within a minute your mind has written
    the whole story. The lost job, the unpayable rent, the version of you at forty
    with nothing put away and no one to call. One number became a thousand, and now
    you are wide awake, arguing with a future that has not happened.


    This book is for the professional woman whose money worry does not stay a single
    worry. It multiplies. It spirals downward and feeds on itself, and it tends to
    come for you at the exact hour you are least equipped to fight it. You are not
    catastrophizing because you are weak or dramatic. You are caught in a pull that,
    once it starts, supplies its own fuel — each thought handing the next one a reason.


    You will come to recognize the spiral as a mechanism, not a prophecy. You will
    see how it always begins with one true thing and then races past the truth into
    invented disaster. Why the same loop runs at 2am that never quite runs at 2pm.
    Why trying to think your way to the bottom only digs it deeper, because the spiral
    does not want an answer — it wants you to keep falling. You will learn to feel
    the first turn of it, the moment one number reaches for the next, before the momentum
    has you.


    This book will not optimize you. It will not promise you''ll never worry about
    money again, and it will not hand you a thought-stopping trick or a mantra to
    recite while the floor drops. It will not pretend the underlying fear is irrational
    and tell you to calm down. The fear is real. What is not real is the bottomless
    story the fear keeps telling.


    What you will find instead is footing — a way to notice the pull as it begins
    and step off it, so a single worry can stay a single worry. You do not have to
    follow every thought all the way down. You are allowed to leave the story unfinished
    and put your feet back on the ground. The next page does not have to be the catastrophe
    your mind keeps drafting in the dark.


    Book 2 of the Next Chapter Publishing financial anxiety series.'
