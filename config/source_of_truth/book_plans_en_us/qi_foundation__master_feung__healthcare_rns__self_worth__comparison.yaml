title: Measuring Yourself Against the Steady One
subtitle: For the nurse sure every colleague on the unit carries it better than she
  does
cover_tagline: You're not behind. You've just been grading yourself against a story.
description:
  short_blurb: 'Through the glass at the nurses'' station, everyone else looks like
    they have it figured out: unhurried, unbothered, finished. You feel like the only
    one still scrambling, still doubting, still waiting to be found out. This is the
    book for the nurse who turned a brilliant instrument on the wrong target, herself,
    against everyone else.'
  long_description: 'You see her down the hall — the nurse who seems to move through
    the shift like water. Calm hands, easy charting, home on time. And without deciding
    to, you measure: her steadiness against your scramble, her certainty against your
    second-guessing, her finished day against the one you are still carrying out to
    the car. You always come up short. You have come up short so many times it has
    stopped feeling like a thought and started feeling like a fact.


    This book is for the registered nurse who has spent years grading herself against
    everyone who looks like they have it together. You scan the floor and you rank
    yourself, quietly, constantly — slower, softer, less sure than the ones who seem
    to belong. You read the room through glass and you never give yourself the benefit
    of the doubt you extend to every patient. And the cruel part is how good you are
    at it: you have taken a precise, high-functioning, deeply trained instrument and
    pointed it inward, at yourself, in the worst possible light.


    Here you will come to recognize that the comparison is not information — it is
    a habit your nervous system built to keep you safe in a place that always seemed
    to be measuring you. You will see how the highlight reel you measure against was
    never the whole of anyone, and how the standard you cannot reach was never real
    to begin with. You will feel how much of your energy has gone to a contest you
    cannot win and were never actually in. And underneath the ranking, slowly, in
    the body rather than the mind, you will meet the worth that was never up for comparison.


    This is not a book about winning. It will not help you become the nurse you envy,
    or finally measure up, or out-perform the doubt. There is no fix here, because
    the problem was never that you fell behind, only that you turned a beautiful instrument
    against your own root and let it run you dry. We are not going to give you a new
    standard. We are going to let the measuring go quiet, until the well refills from
    below and the breath reaches all the way down to the part of you that was never
    in the race.


    Nothing here will help you win the comparison. That is the point. You were never
    the one who came up short. You were the one still awake to how much it all mattered.


    You can stop grading yourself now. The floor was never the contest you thought
    it was.


    Book 2 of the Root & Meridian Press self worth series.'
