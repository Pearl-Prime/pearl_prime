title: Everyone Else Is Already Finished
subtitle: For the student scrolling through everyone who has it figured out — measuring
  an unfinished self against a feed full of people who look done
cover_tagline: You're comparing your rough draft to everyone else's final cut.
description:
  short_blurb: It feels like everyone else got there first — already talented, already
    sure, already a finished version of a person while you're still sketching. This
    is a book for the part of you that measures itself against the feed and always
    comes up short. It won't help you win the comparison, and that is exactly the
    point.
  long_description: 'You open the app and there they are. The one who''s already good
    at the thing you''re scared to even try. The one who looks effortlessly sure.
    The one whose life, whose grades, whose face, whose whole self seems finished
    — complete, posted, done — while you''re still down here in the rough draft of
    yourself, all eraser marks and unsure lines. And the thought lands the way it
    always does: everyone else is already there. You''re the only one still becoming.


    This book is for the student who measures. Who can''t open a feed without ranking
    themselves inside it. Who looks at other people''s highlight reels and quietly
    grades their own unfinished life against them — and always, always comes up short.
    You''re not vain and you''re not weak. You''ve just pointed something powerful
    — your attention, your sensitivity, your eye for what''s good — at exactly the
    wrong target: yourself, mid-sketch, held up against everyone else''s final cut.


    We''re going to look at the comparing gently. You''ll come to recognize what a
    feed actually is — not a roomful of finished people, but a wall of edited highlights,
    the one frame each person chose out of a thousand they hid. You''ll feel where
    the comparison lives in your body, the tightening, the small collapse. You''ll
    notice how it feeds on itself, each scroll proving the story it started with.
    And underneath it, you''ll meet the version of you that the comparison keeps you
    from ever seeing: not behind, not unfinished-as-in-failed, but unfinished the
    way every real work is before it becomes itself. Yours isn''t late. It''s still
    being made.


    This book will not help you win. It won''t make you more impressive than the people
    you''re watching, won''t get you to the front of a race that was never real, won''t
    optimize you into someone finally enough. There''s no leveling-up here. Nothing
    to catch up to. The whole frame — finished versus behind — is the thing we''re
    going to set down.


    You are allowed to be in progress. You are allowed to be the only one in the room
    who isn''t done, because no one is done, and the unfinished thing is not the loss.
    It''s the part where it''s still yours to make.


    Book 2 of the Blank Canvas Books Self-Worth series.'
