title: The Only One Still Asking to Be Let In
subtitle: For the student sure every classmate already belongs in a room they snuck
  into
cover_tagline: You're not behind. You're holding the wrong measuring stick.
description:
  short_blurb: 'She raised her hand and sounded brilliant. He already has an internship.
    Everyone''s group chat seems to understand the assignment you''ve read three times.
    This is a book for the student who measures themselves against every classmate
    who looks effortless — on the seminar floor and on the feed — and always lands
    at the same verdict: they belong, and I snuck in.'
  long_description: 'She answered the professor''s question like she''d written the
    syllabus. He mentioned his summer internship like it was nothing. The group chat
    is laughing about how easy the problem set was, and you''ve read it three times.
    You do the math you always do — them, then you — and you come up short, again.
    The verdict is automatic by now: everyone in this room belongs more than you do.


    This book is for you — the college student who can''t stop measuring. The one
    who walks into seminar and reads the room as a ranking, who scrolls a classmate''s
    perfect highlight reel at midnight and feels the gap widen, who has turned a high-performance
    mind into an instrument pointed at the wrong target: yourself, against everyone
    who looks like they were born sure.


    You''ll come to recognize how comparison manufactures the imposter feeling out
    of thin air. How you weigh your behind-the-scenes against everyone else''s edited
    front. How the feed hands you a thousand people who look effortless and never
    shows you their 2am. How ''they belong, I snuck in'' is not a fact you discovered
    but a number you generated, by comparing your inside to their outside. How the
    measuring never stops, because there is always someone ahead — that''s not a sign
    you''re failing, that''s just what a ranking does to a person. We''ll stay in
    the comparing moment, on the seminar floor and on the screen, and learn to set
    the measuring stick down.


    This is not a book that will help you win the comparison. It won''t teach you
    to out-achieve the classmate who intimidates you or to curate a feed that finally
    makes you the effortless one. There is no place high enough in the ranking to
    feel like you belong, because the ranking was always the problem. That''s the
    point. The point is not to come out on top. The point is to stand in the doorway
    of that lecture hall and stop measuring long enough to notice you''re already
    inside it — admitted, enrolled, here — and that belonging was never something
    you had to out-score anyone to earn.


    You are not behind the people who look effortless. You are holding a measuring
    stick that was never going to give you a number you could live with.


    You don''t have to win the comparison before you put it down. That was always
    the point.


    Book 6 of the Threshold Books imposter syndrome series.'
