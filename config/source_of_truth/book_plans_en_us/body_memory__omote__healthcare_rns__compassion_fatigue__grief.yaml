title: The Ones You Carry Home
subtitle: For the nurse holding years of unmourned loss — the patients, the codes,
  the parts of yourself the work quietly took
cover_tagline: You never got to grieve them. So you carried them. All of them.
description:
  short_blurb: No one gives a nurse time to mourn. There is a death at 0300 and an
    admission at 0315, and the bag gets zipped and the room gets turned over and you
    keep moving. This book is for the grief you were never allowed to put down — for
    the patients you carry, and for the version of you who used to feel everything.
    It will not rush you. It will help you finally set some of it down.
  long_description: 'You remember their faces. The ones whose hands you held when
    no family came. The code that did not work no matter what you did. The young one.
    The one who reminded you of your own mother. You zipped the bag and you turned
    the room and three minutes later you were taking report on someone new, and somewhere
    in there you learned to keep walking past your own grief because there was simply
    no time to stop.


    This book is for what you have been carrying ever since. For the losses that never
    got a funeral, never got a moment, never got so much as a held breath in a supply
    closet before the next light went off. And for the quieter loss underneath them
    all — the slow disappearance of the nurse you used to be, the one who cried in
    the car, who felt everything, who had not yet learned to go numb just to survive
    the shift.


    Here you will let the grief be real. You will come to recognize how much of your
    exhaustion is not burnout at all but bereavement — years of it, stacked and unspoken.
    You will see the cost of carrying the dead without ever being allowed to mourn
    them. You will feel where loss has settled into the body, into the shoulders,
    into the flat place behind your eyes. You will sit with the hardest truth gently:
    that to keep loving this work, some of what you are holding has to finally be
    set down. Not forgotten. Set down. And you will come to the question underneath
    the whole series — what do you need, before you can keep giving so much of yourself
    away?


    This book will not promise closure, or stages, or a tidy way through. It will
    not tell you to leave the profession, and it will not tell you to toughen up and
    stay. There is no optimizing grief, no productivity hack for loss, and this voice
    will never insult you by pretending there is. The work asked something enormous
    of you. That deserves to be named, not managed.


    What you will find instead is ground — a steady place to set the weight, one name
    at a time, so that it stops living only inside your tired body. Permission to
    mourn the patients no one let you mourn. Permission to grieve the self the work
    took. Permission to feel again, slowly, on solid ground that will hold you while
    you do.


    You carried them because no one ever showed you how to lay them down. You can
    begin to, here.


    Book 2 of the Held Ground Press compassion fatigue series.'
