title: I Miss the Mother I Used to Be
subtitle: For the working parent grieving the tender, patient self that all this caring
  quietly used up — and learning to let her go without losing yourself
cover_tagline: You didn't lose her all at once. She was poured out, a day at a time.
description:
  short_blurb: 'Somewhere in the years of giving, the warm and patient parent you
    meant to be went quiet, and you have been mourning her ever since without naming
    it. This is a tender companion for the working parent grieving the self that caregiving
    used up. It will not tell you to be grateful or to bounce back. It will sit with
    the loss, and call it what it is: love with nowhere left to go.'
  long_description: 'There was a version of you who knelt down to listen. Who had
    patience in her hands and softness in her voice, who imagined the kind of parent
    she would be and meant every word of it. You don''t quite know when she went quiet.
    There was no single day. She was poured out slowly — a bedtime at a time, a deadline
    at a time, a year of giving until the giving wore the tenderness thin. And now,
    in the rare still moment, you find you are grieving her. You just never had permission
    to call it grief.


    This book is for the working parent who is mourning who they used to be. For the
    one who snaps now where they once softened, who feels the love is still in there
    somewhere but can''t reach it through the exhaustion, who looks at their child
    or their work and aches for the openhearted person who started all this. You are
    not cold. You are not broken beyond repair. You are grieving — and grief, after
    all, is only love with nowhere left to go.


    In these pages you''ll come to recognize the loss you''ve been carrying unnamed.
    The quiet mourning for the energy you used to have. The guilt that hides inside
    the grief, whispering that you have no right to miss yourself when everyone is
    fed and the bills are paid. The way unspent tenderness curdles into numbness,
    not because you stopped loving but because there was never anywhere to put it
    down. The ache of loving people so steadily that you disappeared inside the loving.


    This is not a method, and it will not rush you. It will not tell you that everything
    happens for a reason, or that she''ll come back if you just try harder, or that
    you should be grateful for the very thing that emptied you. There is no fixing
    grief, and no timeline you owe anyone for it. Nothing here will hand the old you
    back.


    What it offers instead is a place to set the loss down and look at it gently.
    An unhurried hour that lets you grieve without apology — that honors the tender
    self you''ve been mourning instead of shaming you for missing her. Here you are
    not asked to recover her or replace her. You are allowed to love who you were,
    to let her go with the reverence she deserves, and to discover that the well of
    tenderness in you is not gone. It has only been waiting in the dark to be refilled,
    the way wells do, once you stop demanding it be full.


    You are allowed to grieve yourself. The love is not lost. It is just looking for
    somewhere, at last, to be poured.


    Book 2 of the Open Vessel Press compassion fatigue series.'
