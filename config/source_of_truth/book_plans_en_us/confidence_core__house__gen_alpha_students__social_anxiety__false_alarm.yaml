title: Your Body Thinks the Hallway Is on Fire
subtitle: For the student whose heart slams before a single word is said — learning
  to tell a real threat from a false alarm
cover_tagline: Nothing is wrong. Your alarm just hasn't read the room.
description:
  short_blurb: Your heart pounds before you've even reached the door. Your hands go
    cold for a class you've sat in a hundred times. This is for the student whose
    body keeps sounding an alarm when there's no fire — and who's ready to learn the
    difference.
  long_description: 'It starts before you even walk in. Your chest tightens in the
    hallway. Your mouth goes dry outside a classroom you''ve sat in all year. Some
    part of you is bracing for something — and you couldn''t name it if a teacher
    asked.


    This book is for you: the student whose body treats a group project like a cliff
    edge, whose heart races before raising a hand, who has learned to dread rooms
    full of perfectly ordinary people. You''re not dramatic and you''re not weak.
    You have an alarm system that''s doing its job a little too well — firing for
    things that were never actually dangerous.


    Maybe it shows up as a stomach that drops when the teacher''s eyes scan the room.
    Maybe it''s the breath you can''t quite catch in the lunch line, or the way your
    thoughts speed up and scatter the second someone says your name. You''ve probably
    been told to relax, to take it easy, to stop overthinking — as if you hadn''t
    already tried all of that a hundred times. The advice never landed because it
    was aimed at the wrong thing. The problem was never your effort. It was an alarm
    going off in a body that couldn''t tell the difference between danger and a doorway.


    Here you''ll come to recognize that alarm for what it is. You''ll see how your
    body floods before you''ve had a single real thought, how the dread arrives early
    and leaves slowly, how the mind scrambles to explain a fear the body already started.
    You''ll learn to feel the difference between a true threat and a false one — between
    the room that could actually hurt you and the room that only feels that way. Not
    so you can shut the alarm off forever. You can''t, and chasing that only makes
    it louder. But so that when it goes off, you know what it is, and you don''t have
    to obey it.


    This book will not promise to make you fearless. It won''t hand you a script for
    becoming the loud, easy person you think everyone else already is. There''s no
    fix here, no five-step cure, no version of you that has to be optimized before
    you''re allowed to feel okay. What''s here is steadier than that: a way to stand
    in the doorway while your heart is still pounding, and walk through anyway — not
    because the fear is gone, but because you finally understand it''s a false alarm.


    You are allowed to be afraid and fine at the same time. You are allowed to cross
    the threshold before you feel ready. The calmer version of you isn''t waiting
    on the far side of a personality transplant. They''re waiting one steady breath
    away.


    Book 1 of the Threshold Books social anxiety series.'
