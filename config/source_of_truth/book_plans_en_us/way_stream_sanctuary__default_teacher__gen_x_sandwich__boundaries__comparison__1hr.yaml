title: 'The Line You Never Drew: Measuring Yourself Against Everyone'
subtitle: A One-Hour Boundaries Reset for the Sandwich Generation
cover_tagline: You're not behind. You're carrying two generations and measuring yourself
  against people carrying neither.
description:
  short_blurb: 'You scroll past someone your age who seems to have it handled, and
    the math starts: they''re ahead, you''re failing. But you''re running your parents''
    doctor visits and your kid''s panic at midnight, and the people you''re measuring
    against aren''t. This is a one-hour reset for the moment comparison convinces
    you the line you can''t hold is a character flaw instead of a load nobody else
    is carrying.'
  long_description: 'It happens in a parking lot, or in the three seconds before you
    fall asleep. Someone your age looks rested. Their parents are fine. Their kids
    are launched. And the scoreboard in your head updates instantly: they''re managing,
    you''re drowning, and the difference must be you. You set the boundary on Tuesday
    and dropped it again by Thursday, and now even your failure to hold a line feels
    like proof that everyone else figured out something you missed.


    This book is for you, the one in the middle. The one taking the 7 a.m. call from
    the rehab facility and the 11 p.m. text from the dorm in the same day. The one
    who can''t say no to a parent who''s frightened or a kid who''s struggling, and
    then watches everyone who isn''t carrying that weight set limits like it''s nothing
    and call it discipline.


    First, you''ll name what''s actually happening: the comparison isn''t measuring
    your worth. It''s measuring two completely different loads and pretending they''re
    the same race. You''re scoring yourself on someone else''s course and then blaming
    yourself for the gap. Then you''ll go down into it instead of away from it, into
    why the people who seem to hold boundaries so easily are usually holding far less,
    and why the limit you can''t draw isn''t weakness, it''s a body that''s been on
    call for years and was never once told it could stand down. You''ll sit with the
    specific, ugly version of the comparison, the sibling who ''helps'' from three
    states away and still finds room to judge, the friend whose hardest decision this
    month was a paint color. You''ll notice how the comparison gets loudest on the
    days you have the least left. And you''ll come back able to see the difference
    clearly enough that the scoreboard loses some of its grip.


    This will not hand you a system for saying no. It won''t optimize your caregiving
    or turn your guilt into a tidy morning practice. There is no version of you that
    carries this load gracefully while everyone watches and approves, and chasing
    her is part of what''s wearing you down.


    What it will do is stop you from grading yourself on a curve built for people
    who aren''t in your life. The line you never drew isn''t missing because you''re
    weak. It''s missing because you''ve been holding everyone else''s line and forgot
    you were allowed one of your own. You can stop comparing your insides to their
    outsides. You''re not behind. You''re carrying more, and you''re allowed to put
    some of it down without anyone''s permission, including your own.'
