title: There Is No Room Left in Me
subtitle: For the working parent carrying too much at once — when the day floods in
  faster than your body can hold, and there's no quiet left to think
cover_tagline: It's not that you can't cope. It's that nothing is leaving.
description:
  short_blurb: By the time you sit down, the day has already filled every inch of
    you — the emails, the pickup, the small voice asking for one more thing while
    you're already three things behind. This is a book for the working parent whose
    body is holding more than any body was built to hold at once, and who has forgotten
    what empty even feels like. It does not hand you a system. It helps you put something
    down.
  long_description: 'It usually arrives all at once. You''re standing at the counter
    and the kettle is going and your phone is buzzing and someone is calling your
    name from the other room and there is a deadline behind your eyes, and your chest
    does this thing where it gets tight and small, and you think: there is no room
    left in me. Not one more inch. And still the day keeps arriving.


    This book is for the working parent who is not failing to cope — you are coping
    with far too much, all at the same time, and nothing is leaving. The flood comes
    in through every door at once: the job that doesn''t pause when the school nurse
    calls, the laundry that breeds in the dark, the mental list you carry that no
    one else can see and no one offered to help write. Your nervous system was built
    to handle a surge and then return to ground. Yours has forgotten there''s a ground
    to return to.


    You''ll come to recognize what overwhelm actually is in the body — not weakness,
    not poor planning, but a system holding the open tab of everything at once, with
    no moment given to close even one. You''ll feel where you brace, and learn that
    bracing is not strength; it is a held breath that forgot to finish. You''ll find,
    slowly, that the work is not to carry it better. The work is to let something
    land, and then let it leave.


    This is not a productivity book. It will not teach you to wake earlier, batch
    your tasks, or optimize the chaos into something efficient. It will not promise
    that the flood stops — your life is genuinely full, and naming that is the first
    honest thing here. There is no hack. There is no morning routine that fixes a
    body asked to hold too much for too long.


    What there is, is room. Small returns of it. The exhale you didn''t take. The
    shoulders that have been up near your ears since March, finally told they can
    come down. A few square feet of ground under your feet that belong only to you,
    even at 9:47 at night with the dishwasher running.


    You are allowed to set something down before you know how to carry it differently.
    You are allowed to make room before you have earned it. Start there.


    Book 1 of the Felt Sense Publishing burnout series.'
