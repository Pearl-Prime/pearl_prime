cover_tagline: Too many shifts, too many calls, all of it landing at once — at midnight.
description:
  short_blurb: The whole weight of the job waits until you lie down, then drops on
    you all at once. This is the one-hour sleep reset for the first responder who
    can't sleep because everything is too much. Not a way to do more. A way to stop
    carrying all of it in a single moment so your body can finally let go.
  long_description: 'All day you handle it. Call after call, hour after hour, you
    stay functional because you have to. Then the lights go out and it all arrives
    at once — every shift this week, the one that went bad, the thing at home you
    haven''t dealt with, the next set you''re already dreading — landing on your chest
    in the dark like the whole load was just waiting for you to stop moving. It''s
    too much, and you can''t sleep under the weight of it.


    This book is for you — the responder running on a deficit, holding more than any
    body is built to hold, whose mind picks bedtime to total it all up. The one who
    isn''t anxious about one thing but flattened by everything at once.


    First, recognition: overwhelm is not a sign you''re weak or falling behind. It''s
    what happens when a finite nervous system is asked to carry an infinite job, and
    the bill comes due the second you go horizontal. You are not failing to cope.
    You are out of room. There''s a difference between a person who can''t handle
    it and a person who has simply been handed too much, and feeling that difference
    is where this starts.


    Then the descent. You stop trying to sort it, plan it, or shrink the list — that''s
    just carrying the same load from a different angle. Instead you go down into the
    actual sensation of too-much in the body: the pressure on the sternum, the heaviness
    in the limbs, the wired-and-tired hum that won''t switch off. You let yourself
    feel the full weight without having to do a single thing about it tonight. You''re
    not solving the load. You''re setting it down by letting yourself feel how much
    it actually is. The body can''t release what the mind insists on holding — so,
    just for now, you stop holding.


    Integration is what carries into the next overloaded week: knowing the difference
    between a problem and a capacity, and letting your body off the hook at night
    even when the job isn''t done, because the job is never done.


    This will not promise you an empty plate, a system to handle it all, or a you
    who absorbs more without cost. You can''t optimize your way out of a load this
    size — and you were never supposed to carry it without it costing you something.
    What it offers is permission to stop carrying everything in one moment so sleep
    has room to come.


    You don''t have to hold all of it tonight. You can set it down and still be doing
    your job. One hour. Read it when it''s all too much.'
