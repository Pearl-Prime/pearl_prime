title: Thirty Saplings and One Failing Light
subtitle: For the teacher tending thirty growing needs by day and a silent house by
  dark, finding room to breathe when it all crowds in at once
cover_tagline: The flood was never proof you were failing. It was proof you were holding
  too much, alone.
description:
  short_blurb: By Tuesday the week has already overflowed its banks — the emails,
    the meetings, the thirty small faces that need you, the one at home who needs
    you more. This is for the educator whose mind has no shoreline left, who lies
    awake running a day that hasn't come. It will not teach you to carry more. It
    will help you find the one quiet place where you can finally set something down.
  long_description: 'It arrives all at once. The bell, the inbox, the parent who is
    upset, the lesson that didn''t land, the meeting that ran long, the child who
    needed more than you had — and somewhere underneath it all, your own life waiting
    for whatever is left. By the middle of the week you are not thinking anymore.
    You are bailing. And at night, when the house has finally gone still, your mind
    has not. It runs tomorrow before tomorrow has arrived, bracing, listing, never
    empty.


    This book is for you. For the teacher who is the one others lean on. For the helper
    whose capacity has been treated as bottomless for so long that you started to
    believe it too. You are not disorganized. You are not weak. You are a person being
    asked to hold more than any single set of hands can hold, and then to do it again
    tomorrow, and to smile while you do.


    Here, in the quiet of the still forest, the pace finally changes. You will come
    to recognize the flood for what it is — not a character flaw but a real thing
    arriving with real force, water with no banks to hold it. You''ll feel how the
    body sounds its alarm when there is simply too much, the tight chest, the hand
    already reaching for the phone. You''ll see the cost of being endlessly available,
    and the buried belief that rest must be earned before it is allowed. And slowly,
    the way a stirred pool goes clear once it is left alone, you''ll find that some
    things can be set down on the forest floor, which has always known how to hold
    what falls.


    This is not a system. There is no method here to help you carry more, faster,
    with better tools. Nothing in these pages will optimize you, and nothing will
    pretend the flood is your fault for not trying hard enough. The work of slowing
    a mind that moves too fast cannot itself be hurried.


    What you''ll find instead is space. A path that slows you. A voice that does not
    ask you to keep up. Permission, at last, to stop bailing for one held breath and
    let the quiet do the work you''ve been doing alone.


    You don''t have to hold all of it. Not tonight. Set one thing down.


    Book 1 of the Still Forest Press anxiety series.'
