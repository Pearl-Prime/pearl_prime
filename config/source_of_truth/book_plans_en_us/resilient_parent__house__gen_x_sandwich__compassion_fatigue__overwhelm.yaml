title: Pulled in Every Direction but Your Own
subtitle: For the sandwich-generation parent giving to a parent and a child with nothing
  left for themselves
cover_tagline: You filled every cup but yours, and now there is nothing left to pour.
description:
  short_blurb: Your mother's doctor, your kid's text, the work email, the dishwasher
    beeping — it all lands in the same five minutes, and somewhere in there, so do
    you. This is a book for the parent caught in the middle, giving from a cup that
    emptied a long time ago. It will not hand you a system. It will sit with you in
    the flood and help you find the one breath that is still yours.
  long_description: 'It happens in a single hour. Your phone lights up with your father''s
    pharmacy on one line and your daughter''s school on the other. The crockpot needs
    starting, the form was due yesterday, and your own body has been sending you signals
    you keep promising to deal with later. Everyone needs you at once, and there is
    no version of you left over to need anything back.


    This book is for the Gen X parent in the middle of the sandwich — raising kids
    who still depend on you while caring for parents who used to care for you. You
    are not disorganized. You are not weak. You are a person who has been pouring
    from an empty cup for so long you forgot the cup was ever yours to fill. Compassion
    fatigue is not a character flaw. It is what happens when the well runs dry and
    the bucket keeps coming down anyway.


    In these pages you will come to recognize the particular shape of being overwhelmed
    by love — not too little caring, but far too much arriving all at once, with no
    room left between the demands to think, to breathe, to be a person and not just
    a pair of hands. You will see the cost you have been quietly paying: the way you
    snap and then hate yourself for it, the calls you let go to voicemail, the part
    of you that has started to go numb just to get through the day. You will find
    a few honest minutes — in the parked car, in the quiet after bedtime, in the pause
    before you open the door — that belong to no one but you.


    This book will not optimize your day. It will not give you a morning routine or
    a color-coded calendar or one more thing to feel behind on. There is no fix here,
    because you are not broken. The flood is real, and you cannot drain an ocean by
    trying harder. What you can do is stop trying to hold all of it in your two hands
    at the same time, and learn — slowly, gently — that setting something down is
    not the same as letting someone fall.


    So set it down. The list will still be there. For the length of these pages, no
    one needs anything from you that you cannot give. You are allowed to be the one
    who is tended to, even if only for a moment. Especially then.


    Book 1 of the Stolen Moment Press compassion fatigue series.'
