title: Too Much, All at Once
subtitle: For the nurse whose body is still running the floor at home — when the flood
  comes in and there's no quiet left to feel it
cover_tagline: It all came in at once, and your body never got to put it down.
description:
  short_blurb: Some days the alarms, the charts, the families, and the codes all arrive
    faster than your body can hold them, and the flood doesn't drain when your shift
    ends. This is a book for the nurse whose nervous system is still carrying too
    much. It is written to help you set the weight down a little at a time, without
    one more thing to push through.
  long_description: 'It comes in all at once. Three call lights, a rapid response
    down the hall, a family at the desk, the pump beeping, and somewhere underneath
    it the thing you didn''t get to feel about the patient in 6 — and your body simply
    makes room by going numb, by speeding up, by clamping down on the breath so you
    can keep moving.


    Then you go home. And it''s still in there.


    This book is for the floor nurse whose body has been holding too much for too
    long — the one who can manage a crashing patient with steady hands but can''t
    fall asleep, can''t finish a sentence at dinner, can''t tell anymore where the
    shift ends and she begins. If your nervous system has started treating ordinary
    life like a unit that''s always one admission from collapse, you are not broken.
    You are flooded. There is a difference, and it matters.


    Gently, you''ll come to recognize what overwhelm actually is in the body — not
    a character flaw, not poor coping, but a system that took on more than it could
    metabolize and never got the quiet to finish. You''ll feel where the flood lives
    in you: the held breath, the braced shoulders, the hum that won''t switch off.
    You''ll learn what it means to let a little of it move through and drain, the
    way weather passes over and clears, instead of damming it behind one more push.


    Nothing here asks you to power through. There are no morning routines to optimize,
    no protocols to run on yourself, no intensity that floods you all over again.
    The practices are small enough for a supply closet, a parking lot, the three minutes
    before report — small enough for a body that already gives all day.


    This book will not promise to make the overwhelm stop. It will not hand you a
    fix or a finish line where you are finally healed and efficient. What it offers
    is slower and more honest: the felt understanding of what your body is carrying
    and why it makes such complete sense — so the flood has somewhere to go besides
    your chest, and the ground can take some of the weight you''ve been holding alone.


    You are allowed to set some of it down. You don''t have to carry the whole shift
    home.


    Book 1 of the Felt Sense Publishing somatic healing series.'
