title: 'Compassion Fatigue: When Everything Is Too Much'
subtitle: A Field Guide for Entrepreneurs Navigating Compassion Fatigue
cover_tagline: You became the load-bearing wall for everyone. No one's holding you.
description:
  short_blurb: 'For the founder who absorbs every person''s weight at once — the team''s
    stress, the user''s crisis, the investor''s nerves — until it floods. This is
    a secular field guide for the moment everyone''s needs hit at the same time: telling
    care that''s yours to carry from weight you absorbed by default, and staying in
    your own body. No delegation matrix, no promise the demands ease up.'
  long_description: 'Caring used to feel like one thing. Now it arrives all at once,
    from every direction. The engineer who went quiet in standup. The cofounder who
    is clearly not okay and won''t say it. The customer threatening to leave, the
    investor who needs hand-holding, the friend you keep canceling on because the
    company ate the evening again. You don''t just notice these things — you absorb
    them, each one landing in your chest until you are carrying the emotional weather
    of fifteen people at the same time. From the outside you look like the leader
    who really cares. Inside, you cannot find where your own feelings end and everyone
    else''s begin. This book is for the founder who became the place every hard feeling
    in the company goes to be held — team, users, investors, family — with no one
    holding any of it for them. The one whose chest is so crowded with other people''s
    fear and disappointment that there''s no room left to feel their own. You are
    not too sensitive, and you are not bad at boundaries. You are doing emotional
    labor for an entire organization with a heart that was only ever built for a handful
    of people, and when the caring has no off-valve it stops being care and becomes
    a flood. Here we name what is actually happening when you take on everyone at
    once: not a softness you should toughen up, but a caregiver absorbing far more
    than any one person can metabolize. Then we stop trying to power through it with
    one more act of selflessness, and we turn and face it instead — because the heaviness
    is telling you something true, and the instinct to fix every feeling in the room
    right now is exactly what keeps you underwater. You will start to feel the seam
    between what is genuinely yours to hold and what you picked up only because no
    one else would. From there, something loosens. You learn to stay close to the
    people you love without swallowing the full mass of what they feel, to be moved
    by someone''s pain without making it your own to carry home. This is not a leadership-skills
    book. There is no one-on-one template here, no delegation matrix, no framework
    for difficult conversations. It will not pretend the demands let up, because you
    are running a real company full of real people whose needs will never line up
    politely one at a time. What it gives you instead is honest language for the moment
    your heart floods, and a way to stay inside your own skin when everyone reaches
    for you at once — so you meet them from steadiness instead of getting dragged
    under. You cannot feel everyone''s feelings for them. You were never meant to,
    and setting that weight down is not the same as setting the people down.'
