title: Holding the Life You Didn't Choose
subtitle: For the working parent grieving the self they set down to raise a family
  — and the quiet anxiety of what had to be let go
cover_tagline: You can love this life and still mourn the other one.
description:
  short_blurb: 'No one warned you that becoming a parent would mean losing someone:
    the freer, lighter, unhurried you that existed before. The anxiety you feel is
    partly grief — for what was given up. This book makes room for that mourning,
    so love and loss can finally sit in the same lap.'
  long_description: 'Somewhere in the blur of the early years, you lost someone. Not
    a person you can name at a funeral — but a version of yourself. The one who slept
    in. Who said yes to last-minute plans. Who had a whole afternoon, and a body that
    wasn''t always being climbed on, and a future that felt wide open instead of fully
    booked. You love your children with a fierceness that would frighten you to measure.
    And still, quietly, in the spaces between, you are grieving.


    This book is for the working parent whose anxiety is braided through with loss.
    You may not have let yourself call it grief — it can feel forbidden to mourn anything
    when you have so much to be grateful for, when other people would give anything
    for the life you''re standing inside. But the tightness you carry is partly the
    weight of unmourned losses: the career pace you slowed, the friendships that thinned,
    the spontaneity, the solitude, the person you simply assumed you''d still get
    to be. What goes ungrieved doesn''t disappear. It settles in the body as a low,
    anxious hum that no amount of gratitude can quite hush.


    Here, in a voice that sits beside you rather than across from you, you''ll come
    to recognize the grief hidden inside your worry. You''ll learn that mourning what
    you''ve let go is not ingratitude — it''s honesty, and honesty is where any real
    peace begins. You''ll feel what it''s like to let two true things share one heart
    at the same time: I would choose this life again, and I miss the one I left. You''ll
    find that naming the loss out loud loosens its grip, and that some things must
    be set down, gently and with tenderness, before your hands are free to fully hold
    what is here now.


    This is not a method for moving on, and it will not promise to fill the empty
    seat where your old life used to sit. There is no optimized, fully-reconciled
    parent at the end of this — grief doesn''t graduate, and it was never meant to.
    The ache may return on a quiet afternoon, unbidden. That''s allowed.


    What you''ll have instead is permission to mourn without guilt, and the warmth
    of being understood by someone who knows that love and loss were never opposites
    at all. You''re allowed to miss who you were. That missing is just love, turned
    around to look backward.


    Book 5 of the Heart Transmission Press anxiety series.'
