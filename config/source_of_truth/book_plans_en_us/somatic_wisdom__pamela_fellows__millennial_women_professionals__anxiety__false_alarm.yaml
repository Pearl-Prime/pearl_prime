title: Your Body Sounds the Alarm Before You Do
subtitle: For the high-functioning woman whose chest braces every morning for a danger
  that never arrives — learning to listen to a nervous system that cries wolf
cover_tagline: The threat isn't real. The bracing is. Both can be true.
description:
  short_blurb: Your alarm goes off before your alarm clock does — a tight chest, a
    held breath, a low hum of dread with no name attached. This is a book for the
    woman whose body has been bracing for an emergency that keeps not coming. It won't
    talk you out of the fear. It will teach you to listen to it, and to feel the ground
    come back underneath you.
  long_description: 'You wake a few seconds before the alarm, already braced. Before
    your feet touch the floor, your chest has tightened around something you can''t
    name — a meeting, an email, a feeling that something is about to go wrong. Nothing
    is wrong. Not really. But your body didn''t get the memo, and by the time you''ve
    checked your phone, the day already feels like a threat.


    This book is for the woman whose nervous system sounds the alarm before she does.
    You''re not anxious because you''re weak or dramatic. You''re carrying an alarm
    system that has learned to fire early and often — a smoke detector that goes off
    when someone makes toast. For years you''ve tried to argue with it, push past
    it, out-perform it. It still wakes you at 3am with your heart going.


    Here you''ll come to recognize the false alarm for what it is: not a prophecy,
    but a body doing its oldest job. You''ll learn to feel the difference between
    a real danger and the echo of one — between the threat in the room and the bracing
    in your shoulders. You''ll meet the moment when the alarm fires and, instead of
    obeying it or fighting it, you''ll learn to put a hand on your own chest and ask
    the question your body has been waiting for: what are you actually trying to tell
    me?


    This is not a method for making the fear stop on command. It will not teach you
    to override your nervous system or white-knuckle your way to calm. There is no
    protocol here that bypasses the body, no breathing trick weaponized into one more
    thing to get right. The alarm doesn''t need to be defeated. It needs to be heard,
    and then, slowly, it needs to learn that you are safe.


    What you''ll find instead is the felt sense of the ground returning. The shoulders
    coming down from your ears. The breath that finally drops below your collarbones.
    The quiet that comes not from silencing the alarm, but from no longer being afraid
    of it.


    You are allowed to feel the alarm and stay. You are allowed to be braced and still
    be safe. Let your body find that out at its own pace.


    Book 1 of the Felt Sense Publishing Anxiety series.'
