title: The Person You Used to Be
subtitle: For the manager mourning a self that depression quietly took — the energy,
  the colour, the version of you who still wanted things
cover_tagline: No one died. So why does it feel like a funeral?
description:
  short_blurb: Depression doesn't only weigh on you. It takes things — the version
    of you who had ideas at midnight, who felt things fully, who wanted the promotion,
    the dinner, the morning. This is a book for the quiet grief of missing a self
    no one knew you lost.
  long_description: 'Somewhere along the way, you became someone you do not quite
    recognize. You still show up. You still deliver. But the person who used to have
    ideas in the shower, who felt the day in colour, who looked forward to things
    and cared how they turned out — that person seems to have left without saying
    goodbye. And there is a grief in that no one around you can see, because on paper
    nothing happened. Nobody died. You are simply mourning yourself.


    This is a book for the manager carrying a loss that has no funeral. You have not
    lost your job or your home or anyone you love. What you have lost is harder to
    name: the energy that used to come easily, the interest that used to make work
    feel like more than motion, the part of you that wanted things. And because it
    left slowly, in increments, you may not have noticed it as loss until you turned
    around one day and could not find it.


    Here you will come to recognize depression as a kind of grieving — and grief as
    something that has been asking, all along, to be felt rather than fixed. You will
    see why pretending the old self will simply return on its own keeps you stuck
    in a waiting room with no clock. Why the ache is not self-pity but a real bereavement
    that deserves the same gentleness you would offer anyone who had lost something
    they loved. And why the way back is not to force the old version of you to reappear,
    but to grieve what has gone honestly enough that something new has room to arrive.


    This book will not promise to give you back who you were. That version may not
    return, and the harder, truer work is learning to stop measuring every grey day
    against a brighter ghost. There is no five-step path to your old self, no optimisation
    that resurrects what depression dimmed. What there is instead is permission —
    to let go of what has already gone, to stop performing a recovery you do not feel,
    and to sit with the loss long enough that it stops being a wound you hide and
    becomes something you have actually lived through.


    You are allowed to mourn yourself. The grief is real because the loss was real.
    And letting yourself feel it is not giving up — it is the first honest step back
    toward a life that is yours again.


    Book 2 of the Stillness Press depression series.'
