title: The Flaw You Lead Around
subtitle: For the executive overworking to hide a private belief that they do not
  measure up
cover_tagline: You don't fear failing. You fear them finding out you were never enough.
description:
  short_blurb: You've delivered for years, and underneath all of it sits a quiet certainty
    that there's something wrong with you that the work has been covering. This is
    a book for the manager whose anxiety is really shame in a suit — the buried belief
    that you're not enough, and the exhausting performance built to hide it.
  long_description: 'From the outside you look like someone who has it handled. You''ve
    shipped, you''ve led, you''ve absorbed the hits and kept the team steady. And
    underneath all of it runs a current you''d never say aloud: that you''re not actually
    enough, that the competence is a cover, and that one day the right person will
    look closely and see what you''ve always known is there.


    This is not your anxiety talking. This is shame, wearing your anxiety like a suit.


    This book is for the manager whose dread isn''t really about the deadline or the
    board — it''s about being found out. You overprepare not because the work demands
    it but because preparation is the wall between you and exposure. You take feedback
    like a diagnosis. You can''t rest, because rest is when the covering slips. The
    achievement was never the point; the achievement was the disguise, and the disguise
    is exhausting to maintain.


    You''ll come to recognize shame underneath the anxiety. How it hides as high standards,
    as conscientiousness, as ''just caring about the work.'' How it turns every mistake
    into evidence about you rather than information about the task — proof of the
    verdict instead of a fact about the work. How the overwork is not ambition but
    concealment, a wall you keep raising because you cannot imagine being seen without
    it. And how something loosens when you stop treating the defect as fact and let
    the belief be examined in daylight — where it has never once been able to stand.


    This is not a confidence program. It will not coach you to feel like a leader
    or hand you affirmations to recite before the meeting. It does not promise the
    feeling that you''re not enough disappears on schedule. That belief is old, and
    it didn''t come from the office; it won''t be argued away in an afternoon.


    What it offers is the difference between a flaw and a feeling. The granite truth
    that you were never the defect you''ve been covering — that the thing you''ve
    been hiding was never the thing that was wrong. You can set the wall down. You
    can be seen and still be standing.


    You are not a fraud who got lucky. You are a capable person who learned, a long
    time ago, to hide. That''s a wound, not a verdict.


    Book 4 of the Granite Ridge Publishing anxiety series.'
