title: 'The Number in Your Head: When Everything Is Too Much'
subtitle: A One-Hour Money Anxiety Reset for Professional Women
cover_tagline: You earn good money. So why does every bill feel like a wave you can't
  get ahead of?
description:
  short_blurb: When the rent, the student loans, the credit card, the savings you
    don't have, and the salary that still isn't enough all crowd in at once, your
    mind floods and the numbers stop adding up. This is one hour to stop drowning
    in all of it and stand on one true thing.
  long_description: 'You open your banking app and immediately wish you hadn''t. The
    number''s fine, actually, but it doesn''t feel fine, because behind it sits the
    rent, the loan you''ve been paying since you were twenty-two, the card you swore
    you''d clear, the wedding you''re invited to, the retirement account that''s basically
    a rumor. It all arrives at once and your brain just whites out. This hour is for
    the professional woman who makes real money and still feels like she''s treading
    water with her face barely above the line.


    This is for you if the math isn''t even the hard part. You could sit down and
    budget. It''s that the moment you try, everything floods in together, every obligation
    and every what-if and every comparison to the friend who somehow owns a place,
    until you can''t think about any single piece of it clearly. So you close the
    app. You don''t look. And the not-looking has its own weight, sitting on your
    chest all day. You''ve tried spreadsheets. The flood doesn''t care about your
    spreadsheet, because the problem was never that you can''t add.


    So we''re not going to build you a budget. First you''ll recognize what''s actually
    happening: this is overwhelm, a nervous system underwater, not a failure of discipline
    or intelligence. Then you''ll go down into the flood instead of slamming the laptop
    shut, and feel the size of it without needing to solve it in the same breath.
    Then you''ll come back up able to put your hand on one real number, one true thing,
    because you''ve stopped trying to hold the whole ocean at once.


    This book will not give you a financial plan. It won''t promise a system that
    makes the money feel like enough, or thirty days to a debt-free life. It won''t
    tell you to just cut the lattes, as if your panic were a math error and not a
    flood. The pressure is real, and feeling underwater doesn''t make you bad with
    money.


    What it offers is the part every finance guru skips: how to bring your system
    down off the wave so you can look at one piece without drowning in all of it.
    You don''t have to have it all figured out to stop panicking. You don''t have
    to feel rich to set the whole weight down for an hour. You''re allowed to come
    up for air now, before you''ve solved a single thing.'
