title: 'The Seat You Earned: The Comparison Trap'
subtitle: A Real Talk Guide to Imposter Syndrome for Millennial Women Professionals
cover_tagline: Everyone in the room belongs. You're the clerical error.
description:
  short_blurb: You sit at the table you earned and spend the whole meeting ranking
    yourself against everyone in it. This book takes apart the comparison habit that
    keeps you certain you're the fraud.
  long_description: 'The meeting starts and you''re already running the math. She''s
    sharper than you. He''s more senior and it shows. That one talks like she''s never
    doubted herself a single day of her life. By the time it''s your turn to speak,
    you''ve quietly sorted the entire room into the people who belong and you — the
    rounding error, the one who slipped in on some clerical mistake nobody''s noticed
    yet.


    This book is for the professional woman who earned her seat and still can''t feel
    it underneath her, because she''s too busy measuring. The one who treats every
    accomplished colleague as fresh proof of her own fraudulence, who reads other
    people''s ease as evidence of her lack, who has turned the whole workplace into
    a leaderboard she is permanently, privately losing. The résumé says you''re qualified.
    The ranking in your head says you got lucky.


    First we name the mechanism: comparison is the engine imposter syndrome runs on.
    You can''t see anyone else''s doubt — only their surface — so you stack your unedited
    interior against their composed exterior and arrive, every time, at the same conclusion:
    you''re the only one in the room who''s faking it. But everyone there is doing
    some version of the identical math. You''ve simply decided, in advance, that you''re
    the one who comes out a fraud.


    Then we go beneath the scoreboard instead of trying to out-credential the feeling.
    Not by building the case for why you actually deserve to be there — that''s just
    more ranking, more scrambling for a higher rung — but by sitting with the deeper
    unease the comparing is covering: the suspicion that your worth is something you
    have to keep winning, again and again, against the people around you. We stay
    with that. It''s quieter than panic, and considerably harder to look at.


    What comes back isn''t certainty that you''re the smartest one at the table. It''s
    the slow loosening of the need to know where you rank at all. You catch yourself
    sorting the room and you let the sorting fall away. Your seat was never contingent
    on beating the people sitting in the other chairs.


    This won''t give you a confidence hack, a power pose, or a list of wins to recite
    when the doubt lands. It won''t promise you''ll feel like the most qualified person
    present. It will free you from needing to be.


    You earned the seat. You don''t have to keep out-scoring the room to be allowed
    to stay in it.'
