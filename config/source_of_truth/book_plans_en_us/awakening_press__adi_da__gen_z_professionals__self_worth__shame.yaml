title: The Thing You Think Is Wrong With You
subtitle: For the high-performer who overworks to cover a defect that was never there
  — waking up from the story that you are the problem
cover_tagline: You built a whole career on a lie about yourself.
description:
  short_blurb: Somewhere along the way you decided there was something wrong with
    you, and you've been working ever since to keep anyone from finding out. This
    is a book for the quiet shame that hides behind your competence — and for the
    morning you finally suspect the defect was never real.
  long_description: 'There''s a moment, usually late, when the work is done and the
    messages are answered and you still feel it: the low hum that says you got away
    with it again. That they almost saw. That if anyone looked closely enough, they''d
    find the thing — the flaw at the center of you that all the achievement is quietly
    covering.


    You''ve never said it out loud. You''re not even sure what it is. But you''ve
    organized your life around hiding it.


    This book is for you. For the one who over-delivers so no one asks questions.
    Who reads warmth as a setup and praise as a debt. Who feels, underneath the polished
    output, like a fraud who simply hasn''t been caught — and who carries that as
    proof of a defect rather than evidence of an exhausting belief.


    You''ll come to recognize how shame works from the inside. How it whispers that
    the problem is you, not the moment — so you brace, perform, and pre-apologize
    for taking up room. How it borrows the language of standards to keep you small.
    How the harder you work to cover the defect, the more real the defect comes to
    feel, until the covering is the only proof you have that it''s there.


    And then, slowly, you''ll begin to suspect something quietly radical: that the
    defect was never the truth of you. That it was a story — early, protective, and
    untrue — laid over a worth that no performance created and no failure can revoke.
    You are not the flaw you''ve been hiding. You are the awareness that has been
    ashamed, and awareness was never broken.


    This book will not fix you, because you were never the thing that needed fixing.
    It won''t optimize your self-image or hand you affirmations to recite at the mirror.
    It won''t promise that one more accomplishment will finally make the feeling stop
    — that''s the trap, not the way out. Nothing here will help you earn what you
    already are.


    What it offers instead is recognition. A way to set down the covering long enough
    to notice what it was covering: nothing missing. The light was on the whole time.
    You were just convinced you had to keep it hidden.


    You can stop bracing now. The person you were afraid they''d find was never there.


    Book 1 of the Awakening Press Self-Worth series.'
