title: Too Many Bills, Too Few Hours
subtitle: For the sandwich-generation parent carrying the mortgage, the tuition, and
  the nursing home all at once — when the money fear arrives faster than you can think
cover_tagline: It isn't one bill. It's all of them, arriving at the same hour.
description:
  short_blurb: You're holding up your parents, your kids, and yourself, and the bills
    don't take turns. This book is for the night the whole load lands at once and
    there's no room left in your head to think. It won't make the numbers smaller,
    but it will help you find the floor under your feet.
  long_description: 'It happens at the kitchen counter, usually after everyone else
    has gone to bed. The tuition deposit, the assisted-living invoice, the mortgage,
    the car that just made a sound it shouldn''t — they don''t line up politely. They
    land together. And somewhere in the middle of the math you''ve already done twice
    today, your chest goes tight and your mind goes blank, because there is simply
    too much arriving at once and nowhere left to put it.


    This book is for you — the one in the middle. The Gen X parent holding up a generation
    above and a generation below, with no one standing underneath to catch you. You
    are not bad with money. You are not failing. You are carrying a genuine, brutal
    squeeze that most advice pretends isn''t happening, and you are doing it while
    everyone assumes you''ve got it handled.


    You''ll come to recognize the shape of the overwhelm itself. The way the flood
    arrives all at once and your capacity simply runs out. The way one urgent bill
    makes every other bill feel urgent too. The way you keep waiting for a quiet week
    to finally sit down and "deal with the finances," and the quiet week never comes.
    You''ll learn to tell the difference between the true weight of what you carry
    and the panic the weight kicks up around it — because they are not the same thing,
    and the panic is heavier than the numbers.


    This book will not optimize your budget. It will not hand you a spreadsheet, a
    side hustle, or a mindset that makes the squeeze disappear. It won''t promise
    that if you just think correctly, the money will follow. The math is the math,
    and you already know it. What this offers instead is room — a way to set the whole
    load down for long enough to breathe, so you can pick up one thing at a time instead
    of all of it forever.


    You are allowed to be overwhelmed by something that is genuinely overwhelming.
    That''s not weakness. That''s an honest response to a real load. The next chapter
    doesn''t begin when the bills stop coming. It begins the moment you stop trying
    to hold all of them in the air at once.


    Book 1 of the Next Chapter Publishing financial anxiety series.'
