title: 'The Number in Your Head: Carrying What You Can''t Say'
subtitle: How Gen Alpha Students Are Rewriting the Rules of Financial Anxiety
cover_tagline: It's not the money you can't say out loud. It's what you think it means
  about you.
description:
  short_blurb: Everyone around you seems to have it handled, so you've gotten very
    good at not mentioning that you don't. This book is for the student carrying a
    quiet belief that being broke means something is wrong with them. It goes after
    the shame underneath the numbers, not the numbers themselves.
  long_description: 'There''s the money problem, and then there''s the thing you''d
    never say out loud about the money problem. You skip the dinner and blame a deadline.
    You let people assume your parents cover things. When the card declines, you laugh
    like it''s a glitch, then spend the rest of the day convinced everyone saw the
    real thing it pointed to: that you, specifically, are behind, less-than, not built
    for this the way everyone else apparently is.


    This book is for the student who has turned secrecy into a full-time second job.
    The one who knows their exact balance to the cent and would rather die than say
    it out loud. The one who has gotten expert at the workarounds: the venmo you delay,
    the round you skip by saying you''re not drinking tonight, the visit home you
    turn down with a story about midterms when the truth is you can''t afford the
    bus. The one watching classmates fly home for break, order without checking prices,
    talk easily about money like it''s weather, and quietly concluding the gap is
    a personal defect instead of a circumstance. If money has become a thing you carry
    alone because saying it feels like a confession, this was written for you.


    The engine here is shame: the buried belief that the empty account is evidence
    about your worth rather than your week. You''ll learn to separate the two: the
    actual situation, which is just numbers and timing, and the verdict you''ve quietly
    attached to it. You''ll recognize the move where shame makes you go silent and
    isolated exactly when you most need to say something. Then you go down into it,
    not to wallow but to look directly at the belief and notice it was installed,
    not earned. You come back able to hold the situation as a fact about your life
    instead of a sentence about your character.


    There is no debt-payoff plan in here, no side-hustle pitch, no toxic line about
    how rich people just believe in themselves harder. This book will not fix your
    finances and won''t pretend the shame is your fault for having. What it does is
    hand you language for the thing under the silence, so the next time the card declines
    or someone asks why you''re not coming, you can tell the truth about the money
    without telling yourself a lie about who you are.


    Being broke at this age is a condition, not a confession. You''re not behind on
    being a person. Put down the part you''ve been carrying in secret, and read.'
