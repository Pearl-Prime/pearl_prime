title: Everyone My Age Seems Further Along
subtitle: For the twentysomething early in their career who measures their worth against
  everyone who looks effortlessly ahead online — and always lands behind
cover_tagline: You keep scoring a race no one agreed to run.
description:
  short_blurb: You open the app and there it is again — the promotion, the launch,
    the life that looks two years ahead of yours. By the time you set the phone down,
    your own day has gone grey. This is a book for the mind that measures itself against
    everyone who seems further along, and quietly decides it's losing.
  long_description: 'It takes about four seconds. A post, a LinkedIn update, a photo
    of someone your age who seems to have it figured out — the title, the apartment,
    the ease. And something in you drops. You were fine a moment ago. Now your own
    work looks small, your pace looks slow, and the gap between you and everyone else
    feels like proof of something about who you are.


    This book is for the one who can''t stop measuring. Who turned a sharp, capable
    mind into an instrument that only ever points one way — at yourself, at the deficit,
    at how far behind you must be. You''re not vain and you''re not ungrateful. You
    learned early that your value was a ranking, and now you can''t see another person''s
    win without it quietly costing you your own.


    What we''ll sit with here is how the comparison actually works. How the people
    you measure against are a highlight reel you''ve cast as a verdict. How ''further
    along'' is a line you keep moving, so you never arrive. How the ache isn''t really
    about them — it''s the old belief that you''re only worth something relative to
    someone else, and there''s always someone else. We''ll trace the way that belief
    tightens your chest in the scroll, and what begins to loosen when you stop running
    a race no one else agreed to be in.


    Nothing here will help you win the comparison. You won''t get further along, faster.
    You won''t out-achieve the feeling. That''s the point — the relief was never on
    the other side of catching up. It''s in setting the measuring stick down and discovering
    that your worth was never a position in a line. It doesn''t move when someone
    else moves. It was never up for ranking at all.


    This is written the way one person hands something steadying to another — close,
    unhurried, without a scoreboard between you. No ''crush your goals,'' no comparison
    reframed as motivation. Just a voice beside you in a quiet room, naming the thing
    the feed keeps doing to you, and staying long enough for it to ease.


    You can stop counting how far behind you are. You were never behind. You were
    just looking at the wrong thing in the dark.


    Book 2 of the Heart Transmission Press self worth series.'
