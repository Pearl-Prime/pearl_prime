title: It Feels Like the Whole Thing Could Collapse
subtitle: For the founder whose body sounds the alarm over every email, every call,
  every decision — and the quiet discovery that most of the danger was never real
cover_tagline: Your nervous system thinks the company is a cliff edge. It is wrong.
description:
  short_blurb: You read the email and your chest goes tight before you have even understood
    the words. You walk into the room braced for an impact that never comes. This
    is a book for the founder whose alarm system fires all day over threats that are
    not there, and who is exhausted from being brave about things that were never
    actually dangerous.
  long_description: 'It usually starts in the body, before you have words for it.
    A notification lights up your phone and your stomach drops. A name appears in
    your inbox and your jaw sets. You walk into the funding meeting, the hard conversation,
    the all-hands, already braced — heart going, breath shallow, the whole system
    flooded and ready to run from a tiger that is, in fact, a calendar invite.


    This book is for the founder whose alarm never seems to switch off. You''re not
    reckless and you''re not weak. You built something real, and somewhere in the
    building, your nervous system decided that every decision was a cliff edge and
    every quiet stretch was the calm before something terrible. So you brace. You
    over-prepare. You feel the fear and call it courage, and you do the brave thing
    on legs that are shaking — and then you do it again tomorrow, and the bracing
    never seems to buy you any peace.


    Here you''ll come to recognize the difference your body keeps confusing: the gap
    between actual danger and the alarm about danger. You''ll see how the flooded
    feeling fires fastest exactly where the stakes feel highest, and how rarely the
    catastrophe it''s screaming about ever arrives. You''ll notice the way the alarm
    borrows the language of responsibility, so that staying braced starts to feel
    like the only adult option. And underneath all of it, in the place the alarm cannot
    reach, you''ll begin to feel something that was steady the whole time — a part
    of you that was never actually in danger, even on the worst day of the worst quarter.


    This is not a book that will make you fearless, and it won''t hand you a technique
    to power through. It promises no morning routine that finally fixes you, no reframe
    that turns the alarm off for good. The alarm will still fire; bodies do that.
    What changes is that you stop believing every blast of it, stop mistaking the
    firing for the truth, and start acting from the ground instead of from the panic.
    Real danger, when it comes, you''ll meet. The false alarms you''ll let ring without
    obeying.


    You don''t have to feel safe to be steady. You don''t have to build courage from
    scratch every morning. The steadiness is already here, beneath the weather of
    the body, and you are allowed to come home to it — even with the company still
    on the line, even with tomorrow still uncertain, even now.


    Book 1 of the Awakening Press courage series.'
