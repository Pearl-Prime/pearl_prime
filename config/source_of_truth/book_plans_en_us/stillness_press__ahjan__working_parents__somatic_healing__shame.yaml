title: The Thing You Tense Up to Hide
subtitle: For the working parent overworking to cover a defect no one else can see
  — and the quiet contraction in the body that gives it away
cover_tagline: You've been hiding it so long you can feel it in your shoulders.
description:
  short_blurb: There's a thing you've decided is wrong with you, and you've spent
    years overworking to cover it. This is a book for the working parent who carries
    that shame as a tightness in the body — and a way to let the contraction, at last,
    soften.
  long_description: 'There''s a moment your body knows before your mind does — the
    small contraction the instant you''re about to be seen too closely. A tightening
    in the chest, a held breath, a turning-inward to cover the thing you''ve decided
    is wrong with you. You''ve spent years overworking to hide it: being the parent
    who has it together, the one who never drops the ball, the one no one would suspect
    carries a quiet certainty of not being enough. The hiding has become so much a
    part of you that you feel it in your shoulders.


    This book is for the working parent who lives with shame. Not guilt over a thing
    you did, but the deeper, older belief that something is wrong with you — that
    if anyone saw underneath the competence, they''d see it too. The one who performs
    okayness all day and feels the contraction every time the mask slips.


    Here you''ll come to recognize shame for what it actually is in the body — not
    the truth about you, but a contraction that learned to fold you inward and call
    it safety. You''ll feel where it grips: the collapse in the chest, the eyes that
    drop, the breath that goes shallow the moment you''re exposed. You''ll learn what
    shame does to a nervous system, and what it takes for the contraction to loosen
    — not by proving yourself worthy, not by working hard enough to finally earn the
    okayness, but by bringing warmth to the very part of you that has only ever known
    it should be hidden. The body doesn''t release shame by being argued out of it.
    It releases when it is met without flinching.


    This is not a book that will fix you, because you were never broken. It will not
    optimize your self-worth or hand you affirmations to recite over a feeling that
    doesn''t believe words. There is nothing here to perform, and no flawless version
    of you to finally become acceptable.


    What it offers instead is recognition — a language for the contraction that you
    can reach for the next time it grips you, in a meeting where you feel exposed,
    at the school gate, in the dark with the day''s small failures replaying. You''ll
    come to understand what your body does when shame moves through it, and why, given
    all you''ve carried alone, it makes complete sense.


    Not fixed. Not finished. Just a little more room to be seen, and a body learning
    that the thing it has been hiding was never the problem.


    Book 5 of the Stillness Press somatic healing series.'
