title: The Cup Was Already Empty
subtitle: For the working parent who keeps pouring after the well ran dry — when everyone
  needs you at once and there is nothing left over for you
cover_tagline: You did not run out today. You ran out a long time ago, and kept giving
  anyway.
description:
  short_blurb: Everyone needed you at the same time, and you met all of it, and somewhere
    in the middle the well went dry and you didn't stop. This is a book for the working
    parent who is being asked to give from a cup nobody has filled in months. It will
    not hand you another thing to do — it will sit with you in the flood and show
    you the ground under it.
  long_description: 'It starts before you are even awake. The first cry, the first
    text, the day already arriving in pieces — your child, your job, the parent who
    needs a call, the person at 4pm who needs more than you have. You meet all of
    it. You are good at meeting all of it. And somewhere in the middle of the afternoon
    the well went dry, and you lowered the bucket again anyway, because that is what
    you do.


    This book is for the working parent who is drowning in everyone else''s needs
    and cannot find the edge of their own. The one who gives and gives and gives,
    and when someone asks how you are, can''t locate the answer. You are not disorganized.
    You are not failing to cope. You are pouring from a cup nobody has filled, and
    the overwhelm you feel is not a character flaw — it is the honest sound of a vessel
    scraping its own bottom.


    You will come to recognize the flood for what it is: not too many tasks, but too
    many people you love arriving at once with no room left in you to hold them. You''ll
    feel the specific weight of being everyone''s solid ground while your own ground
    shakes. You''ll notice the moment in the day when you stop being a person and
    become a function — and you''ll learn to find your way back from it, not by doing
    more, but by setting something down.


    This book will not optimize you. It will not teach you to give from a fuller heart
    or batch your caregiving or wake an hour earlier to fit yourself in. There is
    no system here, no five-minute fix, nothing to add to the list that is already
    crushing you. It asks one quiet question and stays with it: what do you need,
    before you can give?


    Nothing here will help you do more. That is the point. You were never meant to
    be a bottomless well. The water has to come from somewhere, and it has never once
    come from trying harder.


    You are allowed to be empty. You are allowed to set the bucket down at the edge
    of the dry well and sit there for a while, on ground that does not move, and let
    it be true that you have nothing left right now — without that meaning you have
    failed anyone. The refilling starts there, in the admitting, not in the pushing.


    Book 1 of the Held Ground Press Compassion Fatigue series.'
