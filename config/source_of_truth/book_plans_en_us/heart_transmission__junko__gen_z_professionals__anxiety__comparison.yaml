title: Everyone Else Looks Like They've Got It
subtitle: For the young professional measuring a private panic against everyone who
  seems calm and ahead — and always coming up short
cover_tagline: You're comparing your inside to everyone else's outside.
description:
  short_blurb: Their promotion, their certainty, their feed that looks like a life
    figured out — and here you are, scrolling, sure you're the only one quietly falling
    apart. This is a book for the mind that measures itself against everyone who looks
    calm and fine, and always loses. Nothing here will help you win the comparison.
    That's the point.
  long_description: 'It''s late, and you''re scrolling, and everyone else seems to
    have figured something out that you missed. The classmate with the title you don''t
    have. The person your age who looks so certain, so composed, so clearly ahead.
    You hold their highlight reel up against the anxious, unfinished feeling of being
    you — and you come up short every time. The strange cruelty of it is that you''re
    comparing your inside to their outside, and you''ve forgotten you can''t see theirs.


    This book is for you, early in a career that constantly invites you to measure
    yourself against everyone in the room. For the one who feels behind no matter
    how far they''ve come. For the person whose anxiety spikes not at their own life
    but at the glance sideways — the sense that everyone else is calm, sorted, fine,
    and you alone are scrambling underneath. You are not weak for feeling this. You
    have a sharp, capable mind, and it has been aimed at the one target it can never
    win against: yourself, compared to people you''ll never really know.


    Written close and without a trace of lecture, the way a friend talks you down
    from the spiral of someone else''s life, these pages help you see the comparison
    for the trap it is. You''ll feel how it lives on incomplete information, how it
    measures your messy whole against everyone''s curated part. You''ll notice how
    it dresses up as motivation while quietly eroding you. And you''ll come to recognize
    that the calm you envy in others is, more often than not, the same private panic
    you carry — just turned away from the camera.


    This is not a system for getting ahead or optimizing yourself into the lead. Nothing
    here will help you win the comparison, because the comparison was never winnable
    — that''s the point. There is no one to beat and nothing to prove. What''s offered
    instead is quieter and far kinder: a way to set the measuring down, to come back
    to the only life you can actually live, and to find that you were never as far
    behind as the scrolling told you. The ache eases the moment one honest person
    meets your eyes and you realize they were never as sure as they looked either.


    You don''t have to keep score against people you can''t really see. You''re allowed
    to stop measuring, and to simply be where you are.


    Book 6 of the Heart Transmission Press anxiety series.'
