title: The Loss You Never Got to Set Down
subtitle: For managers carrying an unmourned weight — the grief that hardened into
  tension because there was never time, and never permission, to feel it
cover_tagline: You kept going because you had to. Your body kept the rest.
description:
  short_blurb: Something was lost — a person, a version of your life, a future you'd
    counted on — and there was never a good time to grieve it, so you didn't. You
    led the meeting the next morning. This is a quiet book for the manager carrying
    an unmourned weight that turned, over the years, into a tightness they call anxiety.
  long_description: 'Something was lost. Maybe a person. Maybe a marriage, a version
    of your life, a future you had quietly counted on, a younger self you left behind
    to become who the job needed. And there was never a good time to grieve it — there
    was a deadline, a team depending on you, a meeting the next morning that you led
    with your voice steady. So you kept going. And the grief, with nowhere to go,
    didn''t leave. It went underground, into the body, and over the years it hardened
    into something you came to call stress, or tension, or anxiety.


    This is grief that was never allowed to be grief. It is not weakness and it is
    not the past being dramatic. It is loss that the body absorbed because the life
    around it had no room for mourning — and grief, unfelt, does not dissolve. It
    waits. It sits in the chest and the throat and the held breath, a weight you''ve
    carried so long you mistook it for your own posture.


    This book is for the mid-level manager who runs the cross-functional team and
    who has been, for years, the steady one — the person who holds it together so
    everyone else can fall apart, and who therefore never got to. The body holds what
    you were never given time to feel. You''ve called it being resilient. You''ve
    called it moving on. You may not have connected the tightness in your chest to
    a loss you never actually mourned.


    You''ll come to recognize grief as it actually lives in the body, distinct from
    the everyday anxiety it''s been masquerading as — the heaviness, the throat that
    closes, the unexpected swell that you''ve spent years swallowing back down. You''ll
    learn where your particular loss is held, and you''ll begin to understand that
    the anxiety was, in part, the pressure of grief with nowhere to go. And gently,
    at a pace your body sets, you''ll start to let some of it move — not to get over
    it, but to finally let it be felt, which is the only thing it ever asked.


    This book will not help you put it behind you, and it offers no five stages to
    complete on schedule, no closure to optimize toward. Grief is not a task to finish.
    It is a weight to be allowed to set down, slowly, in your own time, with witness
    instead of efficiency.


    What it offers is recognition, and permission — language for the loss your body
    has been carrying alone, and a practice gentle enough to meet it in the small
    moments: on a quiet train, late at night, in the unguarded minute when the wave
    comes and, for once, you let it.


    You are not still grieving because something is wrong with you. You are a person
    who was never given the time, and who is allowed, now, to take it.


    Book 6 of the Stillness Press somatic healing series.'
