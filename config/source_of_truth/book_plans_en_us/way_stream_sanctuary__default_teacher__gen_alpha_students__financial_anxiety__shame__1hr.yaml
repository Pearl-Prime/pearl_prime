title: 'The Number in Your Head: Carrying What You Can''t Say'
subtitle: A One-Hour Money Anxiety Reset for Students
cover_tagline: It's not just about money. It's the thing about yourself you can't
  say out loud.
description:
  short_blurb: Money anxiety as a student is rarely only about money — it's the secret
    belief that your family doesn't have enough, that you're behind, that there's
    something to hide. That shame is heavier than any bill. This is a one-hour read
    for the student carrying a money story they've never been able to say out loud.
  long_description: 'It''s the thing you go quiet about. When friends talk about trips,
    schools, plans that cost money you don''t have, something in you closes — and
    it isn''t anger, it''s shame. The quiet conviction that your situation is something
    to hide. That if people really knew the money picture at home, they''d see you
    differently. That everyone else got a head start you''ll never admit you missed.
    You''ve carried it so long it doesn''t even register as a thought anymore. It
    registers as a fact about you.


    It isn''t one. That''s the whole hinge of this book. The shame isn''t the truth
    about who you are — it''s a buried belief that something is wrong with you for
    circumstances you didn''t choose and were never responsible for. And as long as
    it stays buried and unspoken, it gets to keep running the show: deciding what
    you say, what you lie about, how far you stand from people who have more.


    This is for the student whose money anxiety lives in the body as shame — the one
    who deflects the second it comes up, who''d rather invent an excuse than say the
    words I can''t afford that, who experiences the gap between their life and everyone
    else''s as something they personally did wrong. Jonah Kim doesn''t offer pity
    and he doesn''t offer hustle. He has you do the one thing the shame is built to
    prevent: say it. Plainly, even if only to yourself first — I''ve been ashamed
    of this, and I''ve never told anyone. Then he walks you straight to the belief
    underneath it, the one quietly insisting your worth and your bank balance are
    the same number, and has you feel how much of you that belief has been steering.
    Nothing about your finances changes in these pages. What changes is that the shame
    becomes something you can see and hold, instead of something you simply are. You''ve
    been carrying a secret. You''re allowed to set part of it down.


    There are no abundance affirmations here, no get-rich visualization, no budgeting
    worksheet, no tidy story about how the struggle built your character. The book
    won''t tell you your situation is fine or that comparing yourself to others is
    silly and beneath you. It won''t promise the money changes. What it gives you
    is language for the thing you''ve never been able to say — so the shame stops
    being a fact about your character and turns back into what it always was: a weight
    you''ve been hauling that was never yours to begin with.


    The money story you''ve hidden doesn''t make you less than anyone. It makes you
    someone who''s been holding something heavy in silence. You''re allowed to put
    words to it. You''re allowed to stop treating your circumstances as a verdict
    on your worth. In an hour, the thing you couldn''t say can stop defining you in
    secret — and start being something you carry, quietly, in the open.'
