title: 'Grief: The Witnessing Practice'
subtitle: A Real Talk Guide to Grief for Young Professionals
cover_tagline: You keep checking how you're doing. Grief doesn't pass a performance
  review.
description:
  short_blurb: Since the loss, part of you won't stop monitoring — Am I doing this
    right? Am I crying too much, not enough, falling behind? This is for the young
    professional whose grief got tangled up with a mind that never stops grading it.
    It teaches you to set the watcher down and just be in it.
  long_description: 'Something is gone, and instead of simply grieving it, you''re
    also surveilling yourself doing it. Is this normal? Should I be over this by now?
    Why did I laugh today — does that mean I didn''t care enough? You take your own
    emotional temperature ten times a day and file a report. The loss was already
    heavy. Then the watching mind showed up to audit your handling of it, and now
    you''re carrying both.


    Your grief got tangled with hypervigilance. You came up tracking your own performance
    — grades, metrics, reviews, the running self-assessment that never once clocks
    out — so when loss arrived, the watcher did the only thing it knows how to do:
    it turned the lens on your grief and started keeping score. Are you sad correctly?
    Are you back to baseline fast enough? It''s exhausting in a way the loss alone
    wasn''t, because now you can''t even fall apart without somebody inside taking
    notes.


    Wren Adler won''t tell you there''s a right way to grieve or hand you a checklist
    to monitor yourself against — that''s the trap, not the cure. The work here is
    plainer. Recognition: catching the watcher grading your grief, seeing the self-surveillance
    as a thing your mind is doing on top of the loss, not part of the loss itself.
    Descent: setting the clipboard down and going into the grief without the running
    commentary — feeling it instead of evaluating it. Integration: learning to grieve
    without an audience, even the internal one, so the loss can move through you instead
    of getting stuck in inspection.


    This will not promise you a clean process or a passing grade or a date by which
    you''ll have grieved "successfully." There is no metric for this, and trying to
    hit one is exactly what''s keeping you stuck. What it offers instead is permission
    to stop watching — to grieve messily, non-linearly, without checking the mirror
    to see if you''re doing it right.


    You''ll learn to tell the difference between actual grief and the anxious monitoring
    of your grief. You''ll stop treating a laugh, or a good day, or a hard one, as
    evidence for or against how well you''re handling it. You''ll find that the loss
    asks to be felt, not assessed — and that you''re allowed to feel it without filing
    the report.


    Grief is not a performance. There''s no one grading it but the part of you that
    never learned to stop. Let that part rest. You can just be in this. Start the
    next time you catch yourself checking.'
