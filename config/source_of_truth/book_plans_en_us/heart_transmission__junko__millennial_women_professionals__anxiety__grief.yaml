title: What You're Still Bracing to Keep
subtitle: The full calendar, the white-knuckle grip, the worry that won't name itself
  — a close hand for the woman whose anxiety is really a goodbye she was never given
  room to say.
cover_tagline: Some of what you're anxious about is something you haven't yet let
  yourself lose.
description:
  short_blurb: 'Sometimes the anxiety isn''t about the future at all — it''s the white-knuckle
    grip on something already slipping away: a version of your life, a person, a self
    you were supposed to become. This is a book for the woman whose fear is really
    an unfinished goodbye, written to help her open her hand.'
  long_description: 'You''d call it anxiety, and you wouldn''t be wrong. But sit with
    it long enough and underneath the worry you might find something else — a tightness
    around something you''re trying not to lose. The relationship that''s quietly
    ending. The version of your twenties you didn''t get. The career you assumed you''d
    have by now. The person who is gone, or going. So much of the bracing isn''t about
    danger ahead. It''s the grip of a hand that won''t open, around something that
    is already leaving.


    This book is for you: the one who keeps the calendar full so there''s no quiet
    for the missing to fill, who reads loss as a problem she failed to prevent, who
    has been calling grief by the name anxiety because anxiety at least feels like
    something you can fix. You are not behind. You are not coping wrong. You are carrying
    a goodbye you were never given room to say, and the body holds an unwept loss
    as vigilance — bracing, always bracing, against a thing that has, in truth, already
    happened.


    Here, you''ll come to recognize the grief inside the anxiety for what it is —
    not weakness, not a wound that proves you can''t move on, but love with nowhere
    left to go. You''ll see how the worrying kept you busy enough to outrun the ache,
    how holding on so tightly became its own kind of suffering. You''ll learn what
    it feels like to let the loss be a loss — to stop bracing against what''s already
    gone and let it move through you the way grief is meant to, in waves, with someone
    sitting close. Letting go, you''ll find, is not the same as not caring. It''s
    the most tender thing two open hands can do.


    This book will not hand you the five stages to complete on schedule, or a closure
    exercise, or the promise that you''ll stop missing what you''ve lost. You won''t,
    not entirely, and that''s not failure — that''s love, keeping its shape. What''s
    offered here is the company to feel it: a warm room and an unhurried voice while
    you finally say the goodbye the busyness has been talking over.


    You don''t have to hold on to keep what mattered. It mattered. It will go on mattering
    with your hand open. Let what is leaving leave. You can grieve it and stay whole.


    Book 5 of the Heart Transmission Press anxiety series.'
