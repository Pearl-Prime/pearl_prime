title: The Parent I Thought I'd Be
subtitle: For the mother or father grieving the version of themselves depression took
  — and the love that is still there, with nowhere to land
cover_tagline: Grief is love with nowhere to go. It means you never stopped loving
  them — you only ran out of room to feel it.
description:
  short_blurb: There is a parent you meant to be. Present, warm, the one who got down
    on the floor and laughed easily. Depression took them quietly, and now you grieve
    them at the kitchen sink while the real children you love wait for someone who
    feels far away. This book is for the working parent mourning the self that loss
    buried alive. It will not tell you to be grateful for the hard parts. It will
    only help you grieve, so the love can finally find its way back.
  long_description: 'There is a parent you meant to be. You can still picture them
    — patient at bath time, laughing on the floor, fully there in the small ordinary
    moments instead of watching them from somewhere far behind your own eyes. Depression
    took that person quietly, without a funeral, and most days you grieve them alone
    at the kitchen sink while the children you love so much wait for someone who feels
    a long way off.


    This book is for you: the working parent who is mourning a living loss. Not only
    the energy that left, but the self that went with it — the easy warmth, the spontaneous
    yes, the feeling of being present for the life you fought so hard to build. No
    one named it as grief. They told you to count your blessings, that you have so
    much to be thankful for, as if love and loss could not live in the same chest
    at the same time. They can. They do. That is what these pages will finally let
    you say.


    We will not rush you. We will not tell you that everything happens for a reason
    or hand you a reason to be grateful before its time. Slowly, we will name the
    shape of this grief: the future you quietly buried, the small daily mournings,
    the ache of loving your children from behind glass. We will sit with the guilt
    that grief in depression always carries — the sense that you have no right to
    mourn when nothing was technically taken — and we will set that guilt down, gently,
    where it belongs.


    You will come to recognize that the numbness was never the absence of love. The
    love is still there. It is only grief now — love with nowhere to go, dammed up
    behind everything you have not been allowed to feel. And you will learn that grief,
    when it is finally witnessed instead of hurried, does not stay frozen. It moves.
    It softens. It finds the channel back toward the people in front of you.


    Nothing here will give you that parent back unchanged, because grief does not
    return us to who we were. There is no fixing a loss, no method for skipping the
    mourning. But there is being held while you grieve — and on the far side of being
    witnessed, a tenderness that can flow again, even toward the imperfect, exhausted,
    real parent you are now.


    You are allowed to mourn what depression took. You do not have to be grateful
    yet. You only have to grieve — and let the love, when it is ready, come home.


    Book 2 of the Open Vessel Press depression series.'
