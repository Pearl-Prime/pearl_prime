title: 'The Alarm Is Lying: After the Loss'
subtitle: How Managers Are Rewriting the Rules of Anxiety Relief
cover_tagline: You kept the team running through the loss. Nobody asked how you were
  still standing.
description:
  short_blurb: A role ended, a person left, a version of the job died — and you led
    straight through it without putting it down. This is an honest guide for managers
    carrying grief that anxiety has been standing in for, and finally letting the
    loss be a loss.
  long_description: 'Something ended and you didn''t get to stop. A restructure took
    half your team. A person you relied on walked out the door. The job you signed
    up for quietly became a different job, and you kept everyone moving because that''s
    what managers do — you held the line and never let yourself feel the floor give
    way.


    This book is for the manager who is grieving something and calling it stress.
    The loss might be obvious or it might be invisible to everyone but you: a direction
    the company abandoned, a teammate you''ll never manage again, the moment you realized
    the thing you built isn''t coming back. You''ve been treating the ache as a performance
    problem. It isn''t. It''s grief wearing the costume of anxiety.


    Recognition is the first turn, and it''s a hard one: that knot you''ve been managing
    is loss, not malfunction. The hypervigilance, the dread, the inability to settle
    — sometimes that''s a body that never got to mourn. You''ll learn to name what
    actually ended, out loud, in plain terms. Not to wallow. To stop pretending nothing
    died.


    Then the descent, which here means letting yourself go down into the loss instead
    of routing around it with more work. The instinct is to stay busy, stay useful,
    keep the team fine so you don''t have to feel it. This book asks the opposite
    — that you let the grief be grief, with no deadline and no fix. You don''t optimize
    a loss. You let it move through you, which it cannot do while you''re holding
    it at arm''s length and calling it a to-do.


    Integration is coming back changed, not cured. You carry what ended differently
    — it stops running as background panic because you finally let it be sadness instead.
    You lead from a steadier place, not because you''ve moved on, but because you
    stopped forcing yourself to. The loss becomes something you carry, not something
    that ambushes you in every quiet moment.


    This book will not give you closure on a schedule. It won''t tell you the loss
    happened for a reason, won''t hand you a gratitude exercise, and won''t dress
    grief up as growth. There''s nothing to optimize and nothing to be positive about.
    What changes is that you let the loss be real — and a real loss, finally felt,
    stops impersonating an emergency.


    You were never supposed to lead and grieve at the same time without anyone noticing.
    You''re allowed to set it down long enough to feel it.'
