title: 'The Alarm Is Lying: Measuring Yourself Against Everyone'
subtitle: How First Responders Are Rewriting the Rules of Anxiety Relief
cover_tagline: Everyone else seems to handle it. You have no idea what they're carrying
  home.
description:
  short_blurb: You measure yourself against the medic who never flinches, the cop
    who jokes after the worst calls, the partner who sleeps fine. This is a plain-spoken
    book about the anxiety that grows out of constant comparison on a job where weakness
    feels like a liability. No ranking. No catching up. Just an honest look at the
    scoreboard you never agreed to keep.
  long_description: 'You walked off the call shaking, and the guy next to you was
    already talking about lunch. So you filed it away where you file everything: he''s
    fine, you''re not, something must be wrong with you. That quiet verdict is where
    this book starts.


    It''s written for the first responder who has turned the job into a leaderboard.
    You clock how fast the others reset, how steady their hands look, how easily they
    laugh it off, and you come up short every single time. You never say any of it
    out loud, because on this job the last thing you want is to look like the one
    who can''t hack it. So you keep score in private, and somehow the score is always
    against you. The comparison runs under everything, a low hum you''ve stopped noticing
    but never stop paying for.


    This isn''t plain language because the topic is simple. It''s plain because you''ve
    been handed enough motivational noise for one lifetime, and noise is the last
    thing that helps at two in the morning. So the book starts by helping you catch
    the comparison in the act, the moment it fires, the instant your eyes go to someone
    else''s face to find out how you''re supposed to feel. You learn to hear the running
    commentary about who''s tougher for what it actually is: a habit, not a measurement.


    From there it goes underneath the habit instead of trying to win the argument
    with it. Not to the surface story about the calmer medic, but to the old fear
    driving it, the one that says you''re behind, you''re soft, you''ll be found out.
    You stop outrunning that fear and stay with it long enough to see it has no evidence,
    only volume. And then you come back to the same locker room, the same crew, the
    same calls, except the scoreboard has lost its grip. You stop borrowing other
    people''s outsides to grade your own insides.


    What this book won''t do is make you the calmest one on the truck, or hand you
    a routine to optimize your resilience, or promise you''ll stop noticing how other
    people carry it. That was never the work. The work is learning that their steadiness
    was never the measure of yours, and that the version of you that keeps losing
    the comparison was never standing on solid ground to begin with.


    What changes is the quiet. The constant low-grade audit of how you stack up starts
    to go silent, not because you finally won, but because you stopped playing a game
    no one else was even in.


    You were never behind. You were just the only one keeping score. You can put the
    scoreboard down now, and you don''t owe anyone an explanation for doing it.'
