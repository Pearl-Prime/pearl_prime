title: Too Many Rooms at Once
subtitle: For the nurse drowning in everything arriving at the same time — when the
  assignment, the alarms, and your own racing chest leave no room left to think
cover_tagline: Six call lights, four orders, one of you. And no floor under any of
  it.
description:
  short_blurb: Two admits, a discharge, a patient circling the drain, and three call
    lights going off at once — and somewhere underneath it all, your own chest, racing.
    Overwhelm isn't weakness; it's what happens when too much arrives at the same
    moment and there's no ground to stand on. This book is for the nurse who never
    has enough hands, and it will not add one more thing to your list.
  long_description: 'It all comes at once. The admit is rolling in while your post-op
    is dehiscing and the family in 12 wants an update and the call lights are stacking
    and the charge nurse is asking if you can take one more. You are one person. You
    have two hands. And the floor beneath you seems to tilt, because there is no version
    of the next hour where you do all of it, and your body knows it before your mind
    catches up.


    This is for the nurse who lives at capacity and then past it. Overwhelm is not
    a character flaw. It is not poor time management or a sign you weren''t cut out
    for this. It is the precise, physical experience of too much landing at the same
    moment — more than any body was built to hold at once — and the particular panic
    of having nowhere to set any of it down. Your thoughts scatter. Your breath climbs
    into your throat. You start three things and finish none, and then you blame yourself
    for that too.


    You are not failing. You are flooded. There is a difference, and feeling it changes
    everything.


    In these pages you''ll come to recognize overwhelm as a flood, not a verdict —
    a thing that rises and a thing that recedes, not proof of your inadequacy. You''ll
    learn what it is to find one square foot of solid ground in the middle of the
    surge: your feet on the floor, your weight in the chair, one real thing to hold
    while the rest waits. You''ll feel the difference between carrying everything
    and setting one thing down. You''ll discover that the room does not actually require
    you to hold it all up — that some of the weight was never yours, and the rest
    can be set down for a breath without the world ending.


    This book will not hand you a better system. It will not tell you to prioritize,
    as if you hadn''t been triaging since your first day. It will not teach you to
    do more with less or to find calm by squeezing it into the cracks of a shift that
    has no cracks. There is nothing here to fix and no nurse who needs fixing. What
    there is, instead, is a steady voice and the feel of solid ground returning under
    your feet — one square foot at a time, enough to stand on, enough to breathe.


    You do not have to carry all of it at once. You were never supposed to.


    Book 2 of the Held Ground Press anxiety series.'
