title: Nothing Left to Hold It With
subtitle: Coming home full to the brim — for the floor nurse whose body absorbed a
  whole shift it never got to feel, and now has no room left to set any of it down
cover_tagline: You carried all of it. You just never got to set it down.
description:
  short_blurb: By the time you get home, there's no room left in you. The shift poured
    in faster than you could feel it, and now it's all still here — in your chest,
    your shoulders, the breath that won't go all the way down. This is a book for
    the body that took on more than any body should, and was never given anywhere
    to put it.
  long_description: 'You don''t remember the moment it became too much, because there
    wasn''t one. It just kept arriving. The admit, then the rapid response, then the
    family in the hallway, then the call light, then the next, and the next, until
    somewhere in the middle of it you stopped catching up and started just absorbing
    — taking it into the body because there was nowhere else for it to go.


    Now it''s the small hours and you''re finally still, and you can feel how full
    you are. Not in your mind. In your chest, behind your eyes, in the shoulders that
    won''t come down from your ears. The flood hasn''t drained. It''s just gone quiet
    inside you, waiting.


    This is a book for the floor nurse whose capacity was exceeded a long time ago
    and who kept going anyway, because the unit doesn''t pause so you can feel things.
    It''s for the one who comes home and finds there''s no room left — no room to
    feel the day, no room to be touched, no room even to rest, because every space
    inside is already holding something.


    You''ll come to recognize the overwhelm not as weakness but as arithmetic: more
    came in than any nervous system can metabolize in a shift, and the body did the
    only thing it could — it held. You''ll feel where it''s been holding. You''ll
    learn what it is to let a single held thing move down through you and out into
    the floor, in the dark, while no one needs anything from you. Not the whole flood
    at once. Just one thing, and then the room it leaves behind.


    This book will not teach you to carry more. It will not make you resilient or
    efficient or unshakeable on the floor. It won''t hand you a routine to do at 5am
    before your shift. It asks for almost nothing — only that you stop, in the heavy
    hours, and let your body finally be as full as it has been, and then a little
    less full.


    Nothing here rushes you. Nothing treats your exhaustion as a problem in your attitude.
    There is no finish line where you are fixed.


    You were never too sensitive. You were just never given anywhere to put it down.
    You can start setting it down now.


    Book 1 of the Night Architecture Books somatic healing series.'
