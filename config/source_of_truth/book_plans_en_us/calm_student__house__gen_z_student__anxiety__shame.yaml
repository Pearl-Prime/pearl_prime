title: The Manual Everyone Else Seemed to Get
subtitle: For the student secretly sure something is wrong with them — overworking
  to cover a defect they're certain everyone will eventually see
cover_tagline: You're not behind on the work. You're sure you're behind as a person.
description:
  short_blurb: 'It''s not that you''re behind on an assignment — it''s the quiet,
    constant certainty that something is wrong with you, that everyone else got a
    manual you missed, and that if you don''t work twice as hard they''ll find out.
    This is a book about the shame underneath the anxiety: the hidden defect you''ve
    been overworking to cover, and what it''s like to finally set the shovel down.'
  long_description: 'Everyone else seems to know how to do this. How to email the
    professor without rewriting it nine times. How to walk into the seminar like they
    belong there. How to just be a student, the way the others apparently learned
    from a manual you never got handed. And underneath the deadlines and the dread,
    there''s a quieter thing you don''t say out loud: you''re pretty sure the problem
    isn''t the work. The problem is you.


    This book is for you — the student who overworks not to excel but to cover, who
    is convinced that the racing and the bracing are proof of some defect everyone
    else can see and you can''t quite hide. The one who reads a kind comment as pity
    and a bad grade as confirmation of what you already knew about yourself.


    You''ll come to recognize shame as the thing sitting under the anxiety — not the
    same as guilt, which says you did a bad thing, but the older, heavier belief that
    you ARE the bad thing. You''ll see how it hides: behind perfectionism, behind
    the deleted drafts, behind the way you''d rather be exhausted than exposed. You''ll
    see how it turns every blank first page into a test of your worth instead of just
    an assignment, and how the overworking was never really about the grade — it was
    about staying one step ahead of being found out.


    This book will not give you a confidence hack or a worksheet that finally makes
    you feel like enough. It won''t talk you into believing you''re great or argue
    you out of how you feel. There''s no fix here, because you were never the defect
    you''ve been hiding — there is nothing to repair, only something to stop believing.


    What''s here instead is the slow, disarming relief of being seen and not flinching.
    The permission to put down the shovel you''ve been using to bury yourself in work.
    The quiet recognition that you were never the only one without the manual — almost
    no one got it, and the ones who look like they did are bracing just like you.


    You are allowed to be a person who is still learning, not a defect working overtime
    to stay hidden. You can set the shovel down. You can breathe.


    Book 4 of the Blue Exam Press anxiety series.'
