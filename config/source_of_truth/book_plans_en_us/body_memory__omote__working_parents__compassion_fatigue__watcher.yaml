title: Always Listening for the Next Cry
subtitle: For the working parent whose mind never clocks off — scanning every face
  and every silence for the need that hasn't been spoken yet
cover_tagline: Everyone is finally asleep. You are still on watch.
description:
  short_blurb: The house is quiet, but you are not. Some part of you is still scanning
    — listening for the cry, reading the room, bracing for the next person who will
    need something you may not have. This is a book for the working parent whose vigilance
    never clocks out. It will not tell you to relax. It will show you the ground you
    can stand on while you finally let your guard down.
  long_description: 'Everyone is asleep. The house has finally gone still. And you
    are lying there with your eyes open, listening — for the cough that means a fever,
    the text that means a crisis, the small shift in someone''s voice that means they
    need you before they''ve even asked. The day is over. You are still on duty. You
    have been on duty for years.


    This book is for the working parent whose mind never goes off watch. The one who
    walks into a room and instantly reads everyone''s face. Who feels a need in the
    air before it''s spoken and has already started solving it. Who cannot rest, even
    when rest is finally possible, because some deep part of you is certain that the
    moment you stop scanning is the moment something falls. You are not anxious for
    no reason. You became the watcher because people genuinely needed watching — and
    now you cannot find the off switch.


    You will come to recognize the cost of standing guard over everyone''s wellbeing
    while no one is standing guard over yours. You''ll feel how the scanning has crept
    into your body — the shoulders that won''t drop, the breath that stays shallow,
    the way you flinch toward every sound. You''ll see how vigilance disguised itself
    as love, and how exhausting it is to be the one who notices everything. And you''ll
    begin to understand that monitoring the people you love is not the same as being
    close to them.


    This book will not teach you to manage your hypervigilance or download a calmer
    nervous system in ten minutes. It will not tell you to stop caring or hand you
    a breathing trick to deploy at the door. There is nothing here to optimize and
    no threat to finally outsmart. It asks the question that lives under all that
    watching: what do you need, before you can keep giving — and who is watching out
    for you?


    The ground does not need you to guard it. It holds whether you are vigilant or
    not. And so, it turns out, do most of the things you''ve been bracing against.


    You are allowed to come off watch. You are allowed to let your guard down onto
    ground that will not move, to trust for one hour that the people you love can
    be okay without your eyes on them — and to discover that the vigilance was never
    the love. The love is what''s left when you finally set the scanning down.


    Book 3 of the Held Ground Press Compassion Fatigue series.'
