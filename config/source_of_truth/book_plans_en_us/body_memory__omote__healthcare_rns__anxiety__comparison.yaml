title: The Other Nurses Make It Look Easy
subtitle: For the nurse measuring her racing chest against everyone on the unit who
  looks unbothered — and always coming up short
cover_tagline: Everyone else seems to have a handle on it. You're sure it's just you.
description:
  short_blurb: You watch the nurse across the hall move through the same chaos looking
    unbothered, and you're certain you're the only one whose chest is racing. Everyone
    else seems to have figured out how to carry this. You measure yourself against
    their calm and always lose. This book is for the nurse who's sure she's falling
    behind, and the comparison is one she was never going to win.
  long_description: 'Look around the unit and everyone else seems fine. The nurse
    across the hall handles a full assignment and a rapid response without breaking
    a sweat. The one at the next computer is laughing about something. They clock
    out and go home and you imagine they leave it all here, while you sit in your
    car with your chest still racing, certain that everyone else has figured out something
    you never will. They make it look easy. You are barely holding on. And the gap
    between the two feels like proof of everything you fear about yourself.


    This is for the nurse who measures herself against everyone who looks calm and
    always comes up short. Comparison is a quiet, relentless habit, and you have aimed
    it directly at yourself. You take in everyone else''s polished surface and weigh
    it against your own raw interior, and of course you lose — you are comparing how
    you feel on the inside to how they look on the outside. It is not a fair fight.
    It was never going to be. And the worst part is how reasonable it feels, how much
    it sounds like honest self-assessment instead of the quiet cruelty it actually
    is.


    You are not behind. You are looking at the outsides of people who are also bracing
    in their own parked cars, and calling your insides a failure by comparison.


    In these pages you''ll come to recognize comparison for what it is: a measurement
    taken against a surface, a race rigged so you can only lose. You''ll feel the
    difference between learning from someone and disappearing into the gap between
    you and them. You''ll learn what it is to stop ranking your own body against a
    unit full of people whose interiors you cannot see. You''ll feel your own weight
    on ground that does not compare you to anyone — that holds you the same whether
    you''re the calmest nurse on the floor or the one white-knuckling it through every
    shift.


    This book will not help you catch up. It will not teach you to project the ease
    the others seem to have or to win the comparison at last. That''s the point —
    there is no winning a race against everyone else''s surface, and nothing here
    will pretend otherwise. There is no nurse here to fix and no one you need to measure
    up to. What there is, instead, is a steady voice and solid ground beneath your
    own two feet — yours, unranked, unmeasured, enough.


    You were never falling behind. You were only ever looking at the wrong thing:
    yourself, against everyone else.


    Book 6 of the Held Ground Press anxiety series.'
