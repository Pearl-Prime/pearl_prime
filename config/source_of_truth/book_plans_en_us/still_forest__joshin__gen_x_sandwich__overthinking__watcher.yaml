title: Listening for Rot in Every Trunk
subtitle: For the one reading a parent's gait for the first sign of decline and a
  teenager's tone for what stays unsaid, never able to leave the watch
cover_tagline: You have been on guard so long you've forgotten what it feels like
  to not be watching.
description:
  short_blurb: You read your mother's face for the first sign of decline. You scan
    your kid's tone for what they aren't saying. You check the phone, the email, the
    silence — always watching for the thing that hasn't happened yet. This is the
    book for the mind that never clocks out. It will not ask you to lower your guard
    by force. It will show you, slowly, that the forest can keep watch so you don't
    have to.
  long_description: 'You are always watching. You catch the slight change in your
    father''s gait before he does. You hear what your teenager is not saying underneath
    what they say. You scan the room, the inbox, the unanswered text, the too-long
    silence, running a constant background check on everyone you love — because if
    you see the disaster coming, maybe this time you can stop it. You cannot remember
    the last time your guard was fully down. You are not sure you would know how to
    put it down even if the world let you.


    This is what years of being the one who holds it all together does. The watching
    never feels like a choice. It feels like love. It feels like the only thing standing
    between the people you love and everything that could go wrong.


    This book is for you — the hypervigilant heart of the family, the one whose mind
    never goes off duty, who monitors threats that almost never come and calls it
    responsibility. You will come to recognize the watcher for what it is: not your
    true self, but a sentry you posted long ago and never relieved, a part of you
    so devoted it has forgotten that exhaustion is not the same as safety. You will
    see how the scanning began, how it learned to mistake control for care, and how
    the very vigilance meant to protect your people has quietly kept you from being
    among them.


    We will not storm the watchtower or order the guard to stand down. That has never
    worked; it only makes the watcher dig in. Instead we will move at the pace of
    the old forest, where the trees keep their own slow watch and ask nothing of you
    — and we will let you discover, a little at a time, what it feels like to set
    the binoculars down and simply be in the clearing, held by something larger than
    your own attention. The pool goes clear when it stops being stirred. You go clear
    when you stop scanning the horizon.


    This book will not promise you control over what happens to the people you love.
    It cannot, and it would be a lie to try. It will not optimize your vigilance or
    turn your rest into another task to perform. It offers no hack for hyperawareness.


    What it offers is relief: the slow, almost forgotten permission to not be the
    one watching tonight. To trust the ground to hold what falls. To learn, at last,
    that you were never the only thing standing between your people and the dark —
    and to let that knowledge set you down among the trees, off duty, breathing, home.


    Book 3 of the Still Forest Press overthinking series.'
