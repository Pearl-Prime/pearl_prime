title: Off Shift but Still Scanning
subtitle: For the nurse whose vigilant mind never clocks out — when the grief you
  can't name keeps you monitoring a room that's already empty
cover_tagline: There is no one left to save, and you are still watching the monitor.
description:
  short_blurb: You learned to scan a room the second you walked in — every drip, every
    rhythm, every subtle change before it became a crisis. That vigilance saved lives.
    But it never learned to go off duty, and now it follows you home, watching for
    the next loss long after the last one is gone. This is a tender place to understand
    what your watchful mind is really grieving — and to let it finally rest.
  long_description: 'Even now, off shift, your eyes do it on their own. You walk into
    a room and you clock the exits, the breathing, the color of someone''s skin, the
    half-finished glass that could be a fall risk. At three in the morning you surface
    from almost-sleep already braced, listening for an alarm that isn''t there. You
    cannot remember the last time your mind was simply quiet. Some part of you is
    always on, always scanning, always waiting for the next thing to go wrong.


    This book is for the nurse whose watchfulness never learned how to stop.


    You were trained to it, and you were good at it. Catching the subtle decline,
    the change no one else saw — that vigilance was real, and it kept people alive.
    But underneath the skill, something else has been driving the scanning, and it
    has a quieter name. After enough losses, the watching stops being about the next
    patient. It becomes a way of standing guard over grief you were never given room
    to feel — because if you stay alert enough, fast enough, ready enough, maybe nothing
    more will be taken from you.


    You will come to recognize the exhaustion of a mind that never goes off duty:
    the way you monitor the people you love for symptoms, the dread that lives in
    your chest with no danger attached, the sleep that won''t come because some part
    of you is still on call for a unit that doesn''t need you tonight. You will see,
    gently, that the watcher is not your enemy. It is a grieving caregiver who never
    got to set the load down, still keeping watch over an empty chair.


    Here, this is not vigilance training and it is not a technique to optimize your
    nervous system. We will not teach you to scan smarter. We will sit beside the
    part of you that has been standing guard so long it forgot it was allowed to rest,
    and we will ask what it is really watching for. We will stay with the absence
    underneath it — and we will not hurry you toward calm before the grief has been
    seen.


    This book will not promise to switch the watching off, or hand you a tidier mind,
    or make you a more efficient version of yourself. It will not tell you the danger
    has passed when your body still believes otherwise.


    What it offers is the slow truth that you can finally stop guarding what is already
    gone. That the well only refills when the hands that have held everything are
    allowed to open. That you, too, are allowed to be off duty.


    The monitor is quiet. There is no one left to save tonight. You can rest now.


    Book 2 of the Open Vessel Press grief series.'
