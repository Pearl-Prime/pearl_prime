description:
  short_blurb: >
    You can't stop thinking about what might happen. stop measuring my worth by outcomes.
  long_description: |
    You can't stop thinking about what might happen.
    
    This book is for floor RN in a hospital units who I always end up back at 'I'm not enough'. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.
    
    Chapter by chapter, you'll work with why the mind loops back to the same thought and how to break the tightening. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.
    
    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.
    
    Book 3 of the Somatic Wisdom self worth series.

