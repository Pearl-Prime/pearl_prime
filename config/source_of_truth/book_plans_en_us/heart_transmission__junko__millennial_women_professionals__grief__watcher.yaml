title: Waiting for the Next Phone Call
subtitle: For the woman whose mind never stood down after the loss — scanning every
  silence for the next piece of bad news, unable to trust that anyone she loves is
  safe
cover_tagline: Once you've gotten the call that changes everything, you never quite
  hang up the phone.
description:
  short_blurb: Your phone buzzes and your stomach drops before you've even looked.
    Someone is late, and you've already pictured the worst. Since the loss, a part
    of you has been keeping watch around the clock, sure that if you just stay alert
    enough, you can keep it from happening again. This is a gentle book for the grieving
    mind that forgot how to rest.
  long_description: 'It happens before you can stop it. A text arrives after dark
    and your whole body goes cold. Someone you love doesn''t answer on the second
    ring and you''re already rehearsing the worst. You check that everyone''s home.
    You check again. You lie awake running the inventory of the people you can''t
    bear to lose, as if counting them keeps them.


    This is what grief does to the ones who survive it: it leaves a part of you keeping
    watch. After the loss, something in you went on high alert and never came back
    down. You learned, in the worst way, that the unthinkable does happen — that the
    ordinary morning can turn, that the phone can ring and rearrange your entire life.
    And so some quiet, exhausted part of you decided it would never be caught off
    guard again. It scans. It braces. It keeps watch over everyone you have left.


    This book is for you — the woman who keeps watch over everyone she loves now,
    without ever meaning to. You hold it together at work, sharp and reliable, while
    underneath you are bracing for news that never comes, paying a tax of dread on
    every good day. You can''t fully be with the people you love because you''re too
    busy bracing to lose them. You mistake the vigilance for caution, even for love.
    But keeping watch is not the same as being close.


    Here, we won''t tell you to stop worrying, or to think positive, or to trust that
    everything will be fine — because you already know that not everything is. Instead,
    we''ll sit with the watchful part of you. Gently, you''ll come to recognize what
    she''s really doing: trying to protect you from a pain that has already happened.
    You''ll see how the scanning steals the present to guard against the future. And
    you''ll begin to feel the difference between the love that wants to hold someone
    close and the fear that only wants to keep them always in sight.


    This is not a book about controlling life or eliminating risk. It offers no system
    for keeping everyone safe, because there isn''t one, and pretending otherwise
    is its own kind of cruelty. It won''t dress your dread up as devotion, or hand
    you a tidier way to keep worrying. It will not rush you off your watch before
    you feel ready to set it down.


    It offers something quieter. The chance to lay the phone face-down for one evening.
    To be in the room with the people who are still here, instead of guarding the
    door against the ones who might leave. You have kept watch long enough. You are
    allowed, breath by breath, to come back inside.


    Book 2 of the Heart Transmission Press grief series.'
