title: Never Once Sitting Down on the Forest Floor
subtitle: For the sandwich-generation mind that scans every room for the next emergency,
  where a depression hides inside a vigilance that never rests in the moss
cover_tagline: You can't rest because some part of you is still standing guard. It's
  exhausted too.
description:
  short_blurb: Some depression doesn't sit still — it watches. This is for the Gen
    X caregiver whose mind never goes off duty, scanning every face and phone for
    the next thing to go wrong, until the vigilance itself becomes the heaviness.
    It won't teach you to monitor better. It will help you understand the watcher,
    thank it, and let it finally come down off the wall and rest on the forest floor.
  long_description: 'Even now, reading this, part of you is listening. For the phone.
    For the cough down the hall. For the tone in a text that means a parent has fallen
    or a kid is in trouble or something, somewhere, is about to need you. You can''t
    remember the last time you were fully in a room instead of half-braced at the
    edge of it, scanning. People think you''re calm. You are not calm. You are on
    watch, and you have been on watch for years.


    This is a quieter face of depression, and an easy one to miss. Not the heaviness
    that keeps you in bed, but the heaviness of a mind that will not lie down — the
    relentless inner watchfulness of someone with too many people to keep alive. You
    learned, somewhere, that if you stopped scanning, something would slip through.
    So you never stop. And the exhaustion of never stopping has gone gray and settled
    in and started to feel like depression, because in the end it is one.


    This book is for you: the watcher in the middle. Generation X, holding the safety
    of a generation above and a generation below, certain that your attention is the
    only thing standing between the people you love and disaster. You will come to
    recognize the watcher for what it really is — not a flaw and not a failure of
    calm, but a frightened, loyal part of you that took on an impossible job and never
    got to set it down. You will see how the scanning feeds itself: every fear you
    brace for makes the bracing feel necessary, and the mind that searches for danger
    always finds enough to keep searching. And you will learn that you cannot out-watch
    your way to rest. The vigilance was never the safety. It was only the fear, working
    without end.


    Here, among old trees that have stood through every storm without once keeping
    guard, you will not be handed a sharper way to watch. Nothing in these pages will
    help you scan more closely or catch more of what might go wrong. Depression is
    not undone by tighter holding, and the forest does not keep watch — it simply
    endures, rooted and unhurried, and lets the night pass over it. There is no fix
    here, and no hidden switch you have been failing to find.


    What you will find is permission to let the watcher come down off the wall. To
    thank the part of you that never sits down, and to let it, at last, sit down.
    To trust the roots beneath you to hold while you stop holding. Not forever. Just
    for now. Just for one breath where nothing is being guarded.


    You are allowed to stop watching long enough to rest. Begin here, in the quiet.


    Book 3 of the Still Forest Press depression series.'
