title: The Part of You That Thinks You'll Be Found Out
subtitle: For the young professional who overworks to hide a feeling of not being
  enough — and calls it cowardice when it's really shame
cover_tagline: You're not afraid of failing. You're afraid they'll finally see you.
description:
  short_blurb: You don't avoid the brave thing because you're lazy. You avoid it because
    somewhere underneath, you believe that if you try and fail, they'll finally see
    what you've been hiding — that something is wrong with you. This is a warm, close
    book for the young professional whose missing courage is really buried shame,
    and who deserves to set down a weight they were never meant to carry.
  long_description: 'Here is the thought you don''t say out loud. "If I really go
    for it, and I''m not good enough, they''ll see."


    So you don''t go for it. You hedge. You over-prepare and under-ask. You stay one
    safe step back from the thing you actually want, and you call yourself a coward
    for it — quietly, cruelly, in a voice you''d never use on anyone else.


    But it was never cowardice. Underneath the held-back hand is something older and
    heavier: a buried belief that something is wrong with you, and that any real risk
    might expose it. You''re not afraid of failing. You''re afraid of being found
    out.


    This book is for you — the one who works twice as hard to feel half as worthy,
    who reads every silence as proof, who has spent years building a careful version
    of yourself so the unworthy one underneath never shows. You''re exhausted. Not
    from the work. From the hiding.


    There''s a tenderness waiting for you here, and it begins with naming the thing
    precisely: what you''ve been treating as a lack of nerve is shame. Shame doesn''t
    say "that was a mistake." Shame says "you are a mistake." And a person carrying
    that quiet sentence will, of course, avoid the spotlight. Of course you stay small.
    You''re protecting the most fragile part of yourself from a light you''re sure
    will reveal a flaw.


    You''ll come to recognize shame''s voice and tell it apart from your own. You''ll
    see how the overworking, the perfectionism, the not-asking were never weakness
    — they were a frightened part of you covering for a defect that was never actually
    there. You''ll learn to turn toward that part with the warmth it never got, because
    shame cannot survive being met with tenderness. It only survives the dark.


    This book will not give you ten steps to confidence or a routine to fix your self-worth.
    There is nothing in you that needs fixing. The defect you''ve been hiding does
    not exist; the belief in it does, and beliefs soften when they''re finally held.
    We won''t make you worthy. You already are. We''ll just help you stop hiding from
    people who would have loved the real you all along.


    You are allowed to be seen — trying, imperfect, fully here. You were never the
    flaw you were so afraid they''d find.


    Book 3 of the Heart Transmission Press courage series.'
