title: 'The Weight Without a Name: When Everything Is Too Much'
subtitle: A One-Hour Depression Reset for the Sandwich Generation
cover_tagline: It's not that you're falling apart. It's that everything arrived at
  once and never left.
description:
  short_blurb: When you're holding a parent's care, a kid's crisis, and a job inside
    the same hour, the heaviness isn't a personal defect. It's a nervous system buried
    under too much at one time. This one-hour reset helps you name the overwhelm,
    go down into it instead of bulldozing through it, and come back able to breathe
    in the middle of the pile. No life hacks, no color-coded system that first requires
    you not to be drowning. Just room around the weight.
  long_description: 'It isn''t even nine in the morning and the day has already collapsed
    onto you. Your mother''s pharmacy has you on hold. Your kid forgot the form that
    was due yesterday. Your phone is lighting up with work. And under all of it sits
    a heavy, dragging gray you''ve started calling depression, because how else do
    you explain feeling this flattened while you''re moving this fast? But slow down
    for one hour and you''ll see it isn''t a chemical flaw at all. It''s overwhelm.
    Too much, all at once, for too long, with nobody standing underneath you to catch
    what falls.


    This hour is for the person who is somehow the emergency contact for three generations.
    The Gen Xer who can run a household, manage a parent''s decline, and hold down
    a job, and who is quietly buckling, not because any one of those is too hard,
    but because all of them landed in the same body on the same day. You were never
    built to be the only adult in four people''s lives at once. Nobody is.


    First you''ll recognize the difference between a broken mind and a buried one:
    the way too many open loops stop registering as urgency and start reading as a
    dull, heavy nothing. Then, instead of doing what you always do, gritting your
    teeth and shoving through the pile until you''re hollow, you''ll go down into
    the overwhelm itself. You''ll feel how much you''re genuinely carrying, all of
    it, without immediately rushing to triage it into a to-do list. And then you come
    back up. Not to an empty plate, but with a little room around the weight, enough
    to take one breath that''s actually your own.


    This book will not promise to lighten your load, and it will not hand you a five-step
    morning ritual, because you already know the cruel joke of productivity advice
    when you''re sinking. It all assumes you have a spare hour and a calm mind to
    set it up. You have neither right now. So this asks nothing of the version of
    you that is already maxed out.


    What it offers is one honest hour and a few plain words you can actually use mid-pile:
    in the car between the care home and the school, in the locked bathroom, at eleven
    at night when the list is still moving. Words that let you name it on the spot,
    this is too much at once, and that is a real thing happening to me, not a verdict
    on how capable I am.


    You will not finish this book with a cleared deck. You''ll finish it able to stand
    inside the chaos without mistaking the sheer volume of it for proof of your own
    failure. The load is heavy because it is genuinely a lot, not because you are
    the problem. Put it down for one hour. Then step back in knowing the difference.'
