title: There's No Room Left in the Day
subtitle: For the parent who is needed everywhere at once — by the job, by the kids,
  by the house — and has run out of any space to think, let alone breathe
cover_tagline: It isn't that you can't cope. It's that no one ever built a pause into
  your day.
description:
  short_blurb: The work message lands the same moment your kid does. Dinner, the laundry,
    the form due tomorrow, the thing you forgot — it all arrives at once, all the
    time. This is a book for the parent who has run out of room, not for the one who
    needs to manage their time better.
  long_description: 'It usually starts before your feet hit the floor. You wake already
    counting — lunches, the early meeting, who has practice, the appointment you keep
    meaning to make. By the time you''re downstairs you''re behind, and you stay behind
    through the handoffs and the pickups and the dinner that someone is unhappy about,
    right up until the lights finally go out and the only quiet of your day arrives
    too late to use.


    This is the overwhelm that has nothing to do with weakness. You are not failing
    at this. You are a loving, capable person who has simply been handed more than
    any one mind can hold — a job that needs all of you and children who need all
    of you, at the same time, for years — until holding it has become the only thing
    you know how to do.


    This book is for the parent who is the place everything routes through. The one
    who keeps the whole household in their head. The one who can''t tell anymore whether
    they''re tired or just permanently braced for the next thing arriving before the
    last one has landed.


    Here, you''ll come to recognize overwhelm not as a personal shortcoming but as
    a simple matter of capacity exceeded — too much, arriving too fast, with no pause
    built in to let any of it settle. You''ll see how the flood feeds on itself: how
    an overfull mind loses the very spaciousness it needs to decide what actually
    matters, so a misplaced shoe and a missed deadline start to feel equally urgent,
    equally yours. You''ll notice the moment in your own day when the water rises
    past the banks. And you''ll learn what it feels like to step back from the edge
    of it, even for a breath, even with the dishes still in the sink.


    This book will not hand you a system to run your family faster. It will not optimize
    your mornings or color-code your week or teach you to do more in less time. The
    problem was never your efficiency. The problem is that there has been no room
    — and no system has ever made room by asking more of you.


    What it offers instead is quieter: permission to stop treating your own depletion
    as a backlog to clear. A way to set one thing down without first earning the right
    to. The understanding that the space you keep waiting to reach on the far side
    of all this was always meant to be made now, in the middle of it, not after the
    kids are grown.


    You are allowed to put something down. You don''t have to hold all of it. You
    never did.


    Book 1 of the Stillness Press burnout series.'
