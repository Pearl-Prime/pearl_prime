cover_tagline: You're comparing your whole inside to everyone else's highlight reel,
  and calling the loss a fact about you.
description:
  short_blurb: It feels like everyone else got handed a manual for being a person
    and you missed the day. You scroll, you measure, you do the quiet math of who's
    ahead — and you always land behind. This is a book for the student who can't stop
    comparing, written by a voice that won't try to help you win, because the contest
    was rigged from the start.
  long_description: 'Open the app and there it all is. Everyone looking like they
    figured out something you didn''t. The clear skin, the easy friends, the life
    that seems to glide along while yours snags on every small thing. You scroll,
    and without deciding to, you start doing the math — who is prettier, who is funnier,
    who is further along, who got invited and who didn''t. And the answer keeps landing
    in the same place. Behind. You, somehow, behind all of them at once.


    This book is for you. For the student who holds a whole self up against a feed
    of everyone''s best ten seconds and loses the contest every single time. Who reads
    a room for who is doing better. Who feels that small sinking pull when someone
    else gets the thing you wanted, and then feels ashamed for feeling it at all.
    You have come to believe everyone else got handed a manual for being a person,
    and you are the only one out here improvising in the dark.


    You will come to see the shape of what comparison actually does. The way it keeps
    a quiet tally going behind everything, turning every scroll into a scoreboard
    you never agreed to keep. What it really takes from you — the warmth it drains
    out of an ordinary day, the way it quietly turns other people''s good news into
    your loss. You will feel the moment you catch what you are truly doing: holding
    your own unedited, behind-the-scenes inside up against everyone else''s most flattering
    outside, and reading the gap as a verdict on your worth. And in the warm part
    of this book, something looser settles in — the strange relief of a race no one
    ever actually required you to run.


    This is not a glow-up. Nothing here will help you win the comparison, climb above
    anyone, or finally measure up, because there is no winning a contest that was
    never weighed fairly and was never yours to enter. A voice that promised you the
    top of the pile would just be handing you the same scoreboard with a kinder face.


    You do not have to come out ahead to be allowed to feel okay. You do not have
    to be the brightest thing in the room to deserve a place in it. Your worth was
    never up for the vote you keep holding at midnight. The ember in you does not
    dim when someone else''s flares up — it has been warm this whole time, kept alive
    under all that scrolling, waiting for you to turn back toward it.


    Put the measuring stick down. It was never measuring you in the first place.


    Book 2 of the Ember & Ash Publishing Self Worth series.'
