title: One Email, A Thousand Versions
subtitle: For the professional woman whose mind turns a single career decision into
  a hundred catastrophes before lunch
cover_tagline: You haven't sent it yet, and you've already lived every way it ends.
description:
  short_blurb: You have a decision to make about your career, and your mind has already
    played it forward into every disaster, then rewound and done it again. This is
    a book for the woman who can't tell the difference between thinking it through
    and being pulled under by it. It won't hand you a way to think your way out —
    it'll show you how to step out of the loop and take the action the spiral was
    built to delay.
  long_description: 'You were going to ask about the role. Then you started thinking.


    What if they say no. What if they say yes and you can''t do it. What if asking
    makes you look hungry, or arrogant, or like you don''t understand your place.
    What if you stay and regret it. What if you go and it''s worse. By the time you
    surface, an hour is gone, nothing has happened, and you are more tired than if
    you''d done the thing.


    This is a book for the woman whose career fear arrives as a spiral. One real question
    — should I go for it? — becomes a thousand, each one branching into the next,
    the whole machine running on the feeling that if you can just think hard enough
    you''ll find the angle where it''s finally safe to move. You won''t. The spiral
    isn''t trying to solve the decision. It''s trying to keep you from making it.


    You''ll come to recognize the loop by its shape. The way it dresses up as diligence
    — you''re just being thorough, just considering every outcome — while it quietly
    eats the day. The 2am rehearsals of conversations that never happen. The way one
    worry about a job becomes a referendum on your whole worth, your whole future,
    the part of your life you haven''t written yet. You''ll learn that the spiral
    feeds on the next thought, not the last one, so the exit is never another round
    of thinking. It''s the small, unglamorous action the loop exists to prevent: sending
    the imperfect email, asking the half-formed question, taking the step before you''ve
    rehearsed every reaction to it.


    This book will not teach you to think your way to certainty. There is no perfect
    analysis at the bottom of the spiral, no version of the future detailed enough
    to make the fear let go first. It will not promise you a calm, decided mind before
    you act. The deciding happens in the doing.


    What it offers is a way to notice the pull, set the loop down half-finished, and
    move while the questions are still unanswered — because they always will be, and
    your next chapter has been waiting on the other side of an action, not an answer.


    Book 2 of the Next Chapter Publishing courage series.'
