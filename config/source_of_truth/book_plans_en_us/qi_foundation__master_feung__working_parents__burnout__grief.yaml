title: The Person You Were Before the Kids
subtitle: For the working parent grieving a self they had to set down — the quiet
  loss inside a life you'd choose again
cover_tagline: You can love this life completely and still miss who you were inside
  it.
description:
  short_blurb: 'Somewhere between the night feeds and the deadlines, a version of
    you went quiet — the one who had time to think, to want things, to be more than
    needed. This is a book for the working parent carrying a grief no one names: the
    loss of yourself, inside a life you''d choose all over again. It won''t ask you
    to get her back. It will help you stop pretending you didn''t lose her.'
  long_description: 'No one warned you that you''d grieve. That somewhere in the years
    of giving — the night feeds, the early meetings, the endless logistics of keeping
    small people alive — a whole version of you would go quiet and you wouldn''t even
    get to say goodbye. You catch glimpses of her sometimes. An old photo. A song.
    A friend who knew you before. And something in your chest aches in a way you can''t
    explain to anyone, because how do you mourn a self you set down on purpose, inside
    a life you would choose again without hesitation?


    This is a book for the parent carrying a loss that has no funeral. You''re not
    depressed, exactly. You''re not ungrateful — God, you''d do it all again. But
    there''s a grief running underneath the gratitude, the grief of who you used to
    be: the one with time to think, with energy that was hers to spend, with a self
    that wasn''t yet divided among everyone who needs her. Burnout, for you, isn''t
    only exhaustion. It''s bereavement. You''ve been mourning while making lunches.


    In these pages you''ll come to recognize that grief as real and allowed — not
    a betrayal of your children, not a sign you chose wrong, but the honest cost of
    love this large. You''ll feel the difference between the things that are truly
    gone and the things that only went underground, waiting. You''ll learn what it
    means to let what''s finished be finished, to stop bracing against a loss that
    has already happened, so that something can finally begin to flow again from the
    root — slowly, on its own time, the way sap rises when the ground has thawed.


    This book will not promise to give you your old life back. It can''t, and it won''t
    pretend to. It won''t tell you to reclaim yourself in five steps or hustle your
    way to a self-care morning that fixes everything by Friday. It won''t rush your
    grieving or ask you to be grateful instead of sad, as though the two couldn''t
    live in the same chest. What it offers is the harder, truer thing: company in
    the loss, and a way to let the grief move through you instead of settling in your
    body as the heaviness you''ve mistaken for exhaustion.


    You are allowed to miss her. You are allowed to love this life and mourn the one
    you traded for it. You can hold both, and you don''t have to choose.


    Book 2 of the Root & Meridian Press burnout series.'
