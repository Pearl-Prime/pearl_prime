title: The Yes That Arrives Before You Do
subtitle: For the woman whose mouth says 'of course' while her whole body braces —
  learning to trust the alarm that fires a half-second before you agree to one more
  thing
cover_tagline: Your 'sure, no problem' got there before you did.
description:
  short_blurb: There's a flinch that happens a half-second before you say yes — a
    small bracing in the chest you've trained yourself to talk over. This is a book
    about learning to trust that flinch instead of overriding it. Because the alarm
    isn't being dramatic. It's telling you the truth a beat before your mouth does.
  long_description: 'Someone asks you for something, and you feel it before you decide
    anything — a tightening, a held breath, a quiet ''oh no'' somewhere under your
    ribs. And then you hear your own voice say ''of course, happy to.'' The yes arrives
    before you do. By the time the rest of you catches up, you''ve already agreed,
    already absorbed it, already promised away an evening you needed.


    This book is for the millennial woman who keeps a flawless face in meetings and
    across dinner tables while her body sets off an alarm no one else can hear. You''re
    not anxious for no reason. You''ve just learned to treat your own internal warning
    as static — something to push through, apologize for, override with a smile —
    instead of information arriving exactly on time.


    You''ll come to recognize how the false alarm of boundary-fear actually works
    on you. How the dread spikes before the conversation has even happened, so you
    say yes just to make the spike stop. How ''I''ll just handle it'' is the sound
    of an alarm being silenced rather than answered. How the people you fear disappointing
    are rarely the ones you''ve actually heard say a hard word — and how the fear
    is usually rehearsing a fallout that has never once come.


    We''ll sit with the moment between the ask and the answer. Not to script you,
    not to send you in braced for a fight, but to slow that half-second down enough
    that you can hear what your body already knows. The flinch isn''t fragility. It''s
    the most honest part of the exchange.


    This book will not hand you a phrase to memorize or teach you to go cold to stay
    safe. It won''t promise that the bracing disappears, or that the right words make
    the fear of being ''too much'' evaporate for good. There is no technique here
    that turns the people you love into problems to manage. The work is quieter than
    that, and kinder.


    What it offers instead is a chair pulled out, and a way to stay seated in your
    own limits while you say the true thing across the table — gently, plainly, without
    rehearsing the disaster first. You are allowed to trust the part of you that knew
    before you spoke.


    Book 1 of the Two Chairs Press boundaries series.'
