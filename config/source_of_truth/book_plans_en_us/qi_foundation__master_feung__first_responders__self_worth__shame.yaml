title: The Calls You Couldn't Save
subtitle: For the first responder who runs toward everything and still believes, deep
  down, that something is wrong with them
cover_tagline: You carry every face you couldn't save like a verdict on who you are.
description:
  short_blurb: You answer every call, hold every line, and absorb every loss without
    flinching — and somewhere underneath the uniform you have quietly decided you
    are the problem. This is a book for the responder who overworks to cover a defect
    no one else can see. It will not tell you to push harder; it will help you set
    down a weight you were never meant to carry.
  long_description: 'It usually finds you when the radio finally goes quiet. The shift
    is over. The reports are filed. Everyone called you a hero today, shook your hand,
    said they don''t know how you do it. And you are sitting in the dark replaying
    the one you couldn''t reach in time, certain that if anyone really saw you, they
    would see what you see: that under the competence and the calm, something is wrong
    with you, and you have been working twice as hard your whole life to keep it hidden.


    This book is for the firefighter, the paramedic, the dispatcher, the ER nurse,
    the officer who carries the buried belief that their worth is something they have
    to keep earning, and that the moment they stop running toward the fire, the truth
    about them will come out. You learned to outwork the shame. You volunteered for
    the worst calls, never said no, never admitted the toll, and told yourself the
    exhaustion was just the job. Underneath it has been a quieter labor: covering
    a defect you are sure lives at the center of you.


    You will come to recognize how shame disguises itself in the people who serve
    — how it wears the mask of dedication, how it turns every loss into evidence against
    you, how it keeps you bracing against the day you''ll be found out. You will see
    the cost of overriding your own needs for years, and you will feel what happens
    in the body when that bracing finally lets go. In the language of this work, the
    root has been drawn down to feed the surface for too long. This is about letting
    the well refill from below.


    This book will not fix you, because you were never broken. It will not optimize
    your resilience or hand you a system to perform your worth more efficiently. There
    is no call you can run, no life you can save, that will finally settle the question,
    and chasing that settlement is the trap. Nothing here will help you earn what
    was already yours. That is the point.


    What it offers instead is slower and more honest: the recognition that the defect
    you have been hiding was never there, that your worth does not rise and fall with
    the outcome of the last call, and that the deepest part of you can be allowed,
    at last, to rest on solid ground. You are permitted to be a person and not only
    a function. You are permitted to be enough when the pager is silent.


    Book 1 of the Root & Meridian Press self worth series.'
