title: The Defect You're Sure They'll Find
subtitle: For the achiever who overworks to hide a flaw that isn't real — and the
  courage of being seen as you are
cover_tagline: You built all of this to keep them from finding out about you.
description:
  short_blurb: You're good at your job, and you're terrified they're about to discover
    you shouldn't be. This is for the high achiever who has spent years overdelivering
    to bury a quiet certainty that something is wrong with them. The courage you've
    been chasing isn't a bigger win. It's the radical act of letting yourself be seen,
    defect and all — and finding there was no defect to begin with.
  long_description: 'There''s a moment that comes for you in the middle of a good
    day. A win lands, the team is grateful, the metrics are up — and somewhere beneath
    it a voice says: they don''t know yet. They haven''t found out about you. And
    so you do what you''ve always done. You work harder, ship more, stay later, smile
    in the meeting, and build one more layer over the thing you''re sure is hiding
    underneath.


    This book is for you: the operator, the founder, the one who has spent a whole
    career outrunning a private verdict that something at your core is defective —
    and who became excellent, in part, because excellence was the only thing that
    kept the verdict at bay.


    You were told courage means being confident, owning the room, believing in yourself.
    So you''ve performed confidence for years, and the shame is still there, untouched,
    because performance was never going to reach the place where it lives. The applause
    lands on the surface. The defect, you''re certain, is deeper than the applause
    can go.


    You''ll come to recognize the shame for what it is — not a true report on who
    you are, but an old conclusion you reached so long ago you stopped remembering
    it was a conclusion at all. You''ll see how it hides inside your work ethic, how
    it dresses itself as high standards, how the very drive the world admires is so
    often just a person trying not to be found out. And underneath the whole exhausting
    architecture, you''ll begin to feel the one thing shame insists you don''t have:
    a self that was never defective, only hidden — whole beneath the story of brokenness,
    the way the sky is whole beneath the clouds.


    This is not a book that will help you fix the flaw, build unshakeable self-esteem,
    or finally earn the worth you think you''re missing. The flaw was never real,
    and worth is not a thing you reach by achieving. Those are just more bricks in
    the wall. Instead, you''ll learn to set down the hiding — to let yourself be seen,
    plainly, as you are, and to discover that what you spent your life covering was
    never the problem.


    Courage here is not the nerve to prove you''re enough. It''s the far quieter willingness
    to stop hiding — to let someone see the part you were sure would end you, and
    to wake up to the truth that there was nothing to hide from at all.


    You don''t have to earn your way back to yourself. You never left.


    Book 3 of the Awakening Press courage series.'
