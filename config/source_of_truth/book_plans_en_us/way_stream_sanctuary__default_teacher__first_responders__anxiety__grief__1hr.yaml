title: 'The Alarm Is Lying: The Weight You Carry'
subtitle: Living with What You've Lost — Anxiety for First Responders (The Weight
  You Carry)
cover_tagline: Some calls you carry out with you. This is for the ones that never
  quite leave.
description:
  short_blurb: You don't get to grieve the ones you couldn't save — there's another
    call coming, and the job doesn't pause for it. This is the one-hour read for the
    first responder holding losses that never got mourned. It won't ask you to let
    go. It makes room for what you're already carrying.
  long_description: 'There are calls you carried out of the scene and never set back
    down. The one you worked and lost. The face you couldn''t un-see. The kid, the
    partner''s partner, the regular whose name you knew. The job doesn''t make space
    for it — you clear, you fuel up, you''re available again, and the next tone drops
    before the last one''s even cold. So the grief doesn''t get mourned. It gets stacked.
    And after enough years there''s a whole pile in there you''ve never been allowed
    to feel, sitting in your chest as something that looks like anxiety but is really
    loss that never had anywhere to go.


    This book is for the first responder carrying the dead and the unsaveable: the
    medic who remembers every one he lost, the firefighter who still smells the worst
    day of his career, the cop grieving a brother off the job, the dispatcher who
    heard it happen and couldn''t reach through the line. Grief in this work is strange
    because it''s chronic and it''s silent — you''re not supposed to fall apart over
    strangers, so you don''t, and the not-falling-apart becomes its own slow weight.
    The tightness you feel might not be fear at all. It might be everything you were
    never given a minute to mourn.


    In a single sitting we name it for what it is: grief that didn''t leave because
    it never got to. Then we go down into it — not to process it efficiently or close
    it out like a report, but to finally let it be felt, the way it should have been
    felt the night it happened. You''ll touch the loss without rushing past it to
    the next available, without bracing against it, without telling yourself it wasn''t
    yours to grieve because they weren''t yours to lose. And you come back not over
    it, but no longer holding your breath against it.


    This won''t promise you closure or tell you it''s time to let go. The ones you
    carry are part of you now; the work isn''t deleting them, it''s stopping the war
    against feeling them. There''s no stage chart here, no timeline you''re behind
    on.


    The alarm is lying when it tells you this grief is something wrong with you that
    you need to manage. It isn''t. It''s love and loss with nowhere to land, in a
    person who''s seen more endings than anyone should. You''re allowed to grieve
    the ones you couldn''t save. You always were.'
