title: The Person You Were Before This Job
subtitle: For the manager mourning what the work took — the energy, the years, the
  self you can't quite find your way back to
cover_tagline: Some of what burnout cost you isn't coming back. The grief you've been
  outrunning is allowed to land.
description:
  short_blurb: There's a version of you that existed before the always-on, before
    the role hollowed out the middle of your week and the middle of you. This is a
    tender book for the manager who is not only exhausted but quietly grieving — for
    what the work took, for who you used to be, for the things you'll have to release
    to ever feel steady again. It asks nothing of you but to finally let the loss
    be real.
  long_description: 'There''s a photo somewhere — a trip, a kitchen, a Tuesday that
    wasn''t spoken for — and the person in it has an ease in their face you don''t
    recognize anymore. You weren''t always like this. There was a version of you with
    energy left over at the end of the day, with friendships that didn''t run on rescheduling,
    with a relationship to your own life that wasn''t entirely about holding things
    together for everyone else. The job came in slowly and took it the way the tide
    takes a shoreline: not all at once, just a little more each season, until one
    day you looked up and the beach was gone.


    This book is for the manager who is not only burned out but grieving, even if
    you''d never use that word. Underneath the exhaustion is a loss you''ve been too
    busy to feel: the years that went to a company that would replace you in a fortnight,
    the relationships that thinned, the health that quietly slipped, the self who
    had room for things that weren''t urgent. You have been outrunning that grief
    because stopping to feel it seemed like a luxury you couldn''t afford. It isn''t
    a luxury. It''s the thing standing between you and solid ground.


    Here, we let it land. You''ll come to recognize the shape of what you''ve actually
    lost, separate from the noise of what''s still on your plate. You''ll see how
    much energy it costs to keep pretending nothing was taken. You''ll learn the difference
    between the losses you can still recover and the ones you must finally set down
    and release — and why the releasing, painful as it is, is the only thing that
    lets the boat stop pitching. This is grief work done gently, at the speed of still
    water, with someone sitting beside you who has felt the same loss and lived past
    it.


    This is not a book about bouncing back. It will not tell you that everything happens
    for a reason, or that burnout was secretly a gift, or that you''ll emerge stronger
    and more optimized than before. Some of what this took is simply gone, and you
    deserve to be told the truth about that rather than cheered past it. There is
    no five-step recovery here. There is only permission to mourn what you lost on
    the way to here.


    You are allowed to grieve a life while you''re still living it. You''re allowed
    to set down what isn''t coming back, and to find, in the letting go, the first
    steady ground you''ve stood on in years.


    Book 2 of the Harbor Line Books burnout series.'
