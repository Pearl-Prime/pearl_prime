title: One Thought, Then a Thousand
subtitle: For the woman whose mind takes a single worry and spins it all the way down
  — coming back to the body before the rumination feeds itself
cover_tagline: The thought isn't the problem. The falling is.
description:
  short_blurb: It starts with one thought. By 2am it's a thousand, each one pulling
    the next, the whole night spent falling down a staircase that has no bottom. This
    is a book for the woman whose mind turns a single worry into a spiral. It won't
    argue you out of the thoughts. It will help you feel your feet before the falling
    begins.
  long_description: 'It always starts so small. One thought — a thing you said, a
    thing you didn''t, a worry the size of a pebble. And then the second thought arrives,
    and the third, each one reaching down for the next, and before you know it you
    are not thinking anymore so much as falling, down and down through a staircase
    of what-ifs that has no bottom and no railing. It is 2am. Your body is exhausted.
    Your mind is sprinting.


    This book is for the woman who knows the spiral from the inside. Not ordinary
    worry — the pull. The way one anxious thought becomes the entrance to a thousand,
    the way rumination feeds on itself until you''ve replayed the same scene forty
    times and solved nothing. You are not overthinking because you lack discipline.
    You are caught in a loop your nervous system runs when it''s frightened and can''t
    find the ground.


    Here you''ll come to recognize the spiral as a body event, not just a mental one
    — the clenched stomach, the breath held high in the chest, the restless legs that
    want to run from a danger that lives only in your own head. You''ll learn that
    you cannot out-think a spiral, because thinking is the staircase. What stops the
    fall is lower down: the feet, the breath, the weight of you in the chair. You''ll
    learn to feel the first thought arrive and, instead of grabbing the next one,
    to put your hand on the ground.


    This is not a book about controlling your thoughts. It will not hand you a script
    to argue with your own mind at 2am, or a willpower trick to slam the door on the
    spiral. There is no fixing here, no overriding, no white-knuckling your way to
    a quiet head. The spiral doesn''t end because you win the argument. It ends because
    your body finally feels safe enough to stop running.


    What you''ll find instead is the felt sense of solid ground beneath a racing mind.
    The exhale that finally drops. The moment you notice you''re falling and, gently,
    find your feet again. Not a silenced mind — a settled body, and a mind that no
    longer has to carry the alarm alone.


    You are allowed to have the thought and not follow it down. You are allowed to
    come back to the ground as many times as it takes. Let your body be the thing
    that catches you.


    Book 3 of the Felt Sense Publishing Anxiety series.'
