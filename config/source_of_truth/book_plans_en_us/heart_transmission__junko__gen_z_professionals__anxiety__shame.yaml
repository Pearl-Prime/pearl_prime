title: The Thing You're Sure Is Wrong With You
subtitle: For the high achiever who overworks to hide a private defect no one else
  can see — when the anxiety is really shame in disguise
cover_tagline: What if they could see what you actually are?
description:
  short_blurb: You answer fast, deliver early, never let them down — and underneath
    it all sits a quiet certainty that something is wrong with you, and you're one
    mistake away from being found out. This is a book for the anxiety that is really
    shame in disguise. You don't have to keep covering it. There was never a defect
    — only a belief that learned to feel like one.
  long_description: 'It lives just beneath everything you do. You over-prepare, you
    reply within minutes, you take the harder task so no one can say you didn''t —
    and still there''s a low hum underneath it, a private conviction that if anyone
    looked closely enough, they''d find the thing that''s actually wrong with you.
    So you keep moving. You keep covering. And the anxiety you feel isn''t really
    about the deadline at all. It''s about being seen.


    This book is for you, early in a career that has become a place to prove you''re
    enough. For the one who reads every bit of feedback as a verdict, who feels like
    an impostor in a role you genuinely earned, who works twice as hard to outrun
    a feeling you can''t quite name. You are not flawed, and you are not fooling anyone
    who matters. You are carrying a belief you didn''t choose — that you, at the core,
    are the problem — and you have been overworking to keep it hidden for a very long
    time.


    Written to be read in private, the way you''d let one trusted person finally see
    you, these pages help you tell the difference between anxiety and the shame underneath
    it. You''ll feel how shame disguises itself as productivity, as perfectionism,
    as never quite resting. You''ll see how the hiding costs more than the thing you''re
    hiding ever could. And gently, without exposure or harsh fixing, you''ll come
    to meet the tender place that decided long ago it had to earn the right to exist
    — and begin to question whether that was ever true. Shame cannot survive being
    met with warmth; it only ever asked to be seen by someone who wouldn''t look away.


    This is not a system for becoming worthy. It will not give you a method to fix
    the defect, because there is no defect to fix. There''s nothing to optimize and
    no one to convince. What''s offered instead is the slow, warm work of being met
    as you already are: not despite the hidden thing, but in place of the lie that
    it was ever there. This is what passes, quietly, between two people when one of
    them stops performing — the unguarded moment in which you find you were never
    the problem at all.


    You don''t have to keep covering. You''re allowed to be seen, and to find that
    nothing falls apart.


    Book 4 of the Heart Transmission Press anxiety series.'
