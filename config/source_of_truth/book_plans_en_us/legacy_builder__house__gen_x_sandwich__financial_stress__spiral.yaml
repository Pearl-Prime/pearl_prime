title: The 2 A.M. Spreadsheet
subtitle: For the mind that turns one money worry into a thousand — when a single
  overdue bill becomes the whole story of how it all falls apart
cover_tagline: It started with one number. By 2 a.m. it was the end of everything.
description:
  short_blurb: It begins with one thought — the bill you forgot, the savings you don't
    have — and by the time you look up it has become a complete catastrophe with your
    name on the deed. This is a book for the person whose financial worry doesn't
    stay still; it multiplies in the dark. It won't argue you out of the spiral. It
    will show you how the spiral feeds itself, and where the quiet exit is.
  long_description: 'It never stays one thing. That''s the nature of the spiral. You
    notice a single overdue number — a bill, a balance, the retirement account you
    keep meaning to look at — and within minutes it has bred. Now you''re not behind
    on one payment, you''re going to lose the house, your kids will resent you, your
    mother''s care will fall through, and somewhere down the chain you''ve narrated
    your way to a future where everything you built comes apart and it''s all, somehow,
    your fault.


    This book is for you: the one whose mind won''t let a money worry sit still. You''re
    in the middle years, holding parents and children at the same time, and the financial
    pressure is real — but the spiral is something more than the pressure. It''s the
    way one thought becomes a thousand at two in the morning, each one pulling the
    next, the whole descent gathering speed while the rest of the house sleeps. By
    the time you surface, you''ve lived through a catastrophe that hasn''t happened
    and may never.


    You will come to recognize the workings of it here. The way rumination disguises
    itself as problem-solving — as if running the disaster one more time were the
    responsible thing to do. The way the spiral always travels downward and never
    once arrives at a plan. You''ll see how it feeds on the hours when you''re most
    tired and least able to fight it. And you''ll meet the belief at the bottom of
    the funnel: that if you just think about it hard enough, long enough, you can
    think your way to safety.


    This book will not balance your accounts or hand you a worry-free formula. It
    won''t tell you the catastrophe is impossible — you''re an adult; you know some
    risks are real. What it will do is help you tell the difference between a problem
    you can hold in daylight and a spiral that only exists in the dark. It will not
    promise to silence the two a.m. mind. It will show you that you don''t have to
    follow it all the way down.


    Because the spiral lies about one thing above all: that the worst version is the
    true one. It isn''t. The true thing is quieter. You are a person carrying a hard
    season with more steadiness than you give yourself credit for, laying a foundation
    under lives that depend on you, doing the long and unglamorous work of holding
    a family together. The funnel can''t see any of that. You can.


    You don''t have to win the argument with your own mind tonight. You just have
    to notice it''s a spiral, and step off. The numbers will still be there in the
    morning, smaller in the light. So will you.


    Book 2 of the Second Mountain Press financial stress series.'
