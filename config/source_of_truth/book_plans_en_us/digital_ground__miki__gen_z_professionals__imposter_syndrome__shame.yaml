title: They'd Take It Back If They Knew
subtitle: For the one who's sure they got in by accident — and has been overworking
  ever since to make sure nobody finds out who you really are
cover_tagline: You don't think you're great at this. You think you've gotten away
  with it.
description:
  short_blurb: There's a version of you that you keep just out of frame — the one
    you're certain would lose you the job if anyone ever saw it. This is a book for
    the quiet, constant work of covering a defect you're not even sure is real. It
    won't try to talk you out of the feeling. It'll just sit with you long enough
    to ask where it came from.
  long_description: 'Someone tells you you''re doing great, and instead of relief
    you feel a small drop in your stomach. Because they don''t know. If they knew
    how much you Google, how long that email actually took, how often you''re sure
    you''re about to be found out — they wouldn''t be saying it. You smile and say
    thank you and add it to the list of things you''ve gotten away with.


    This book is for you: early in a career that looks, from the outside, like it''s
    going fine. The one who reads competence into everyone else in the meeting and
    performance into yourself. The one who works late not because the work needs it
    but because the working is the cover. You don''t believe you''re good at this.
    You believe you''ve been lucky, and that luck is a thing that runs out.


    What you''ll come to recognize, slowly, is that the feeling has a name and a shape
    and a reason. It''s shame — not the loud kind, the structural kind. The buried
    conviction that there''s something wrong with you specifically, some defect everyone
    else got the instructions for, and that your whole life has quietly organized
    itself around keeping it hidden. You''ll watch the mask you wear at work and what
    it costs you to keep it on. You''ll notice the moment the story ''I''m a fraud''
    stops being a fact and starts being a feeling you can put down. You''ll feel,
    maybe for the first time, what it''s like to be in the room without bracing for
    the door.


    This is not a confidence book. It will not teach you to fake it, own it, or post
    about it. There is no morning routine here and nothing to optimize, because you
    are not a brand and your worth was never a metric. Nothing here will make you
    certain you deserve to be here — that''s not a thing certainty can fix. What it
    can do is stand next to you while you stop hiding from a defect that, looked at
    directly, turns out not to be there.


    You were never the only one in the room pretending. You were just the only one
    who believed everyone else was real.


    Book 1 of the Present Tense Books imposter syndrome series.'
