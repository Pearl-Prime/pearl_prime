title: 'The Line You Never Drew: What Shame Does to You'
subtitle: How Working Parents Are Rewriting the Rules of Setting Boundaries
cover_tagline: You don't think you're allowed to need a limit. So you keep paying
  with yourself instead.
description:
  short_blurb: 'Underneath every boundary you can''t set is a quieter belief: that
    a good parent, a good employee, a good person wouldn''t need one. This is a book
    about the shame that makes ''no'' feel like proof you''re failing. It won''t fix
    you, because you were never broken. It will show you the belief and help you put
    it down.'
  long_description: 'You said yes again. To the project, the carpool, the favor, the
    late pickup that wrecks your evening. Not because you had room, but because the
    thought of saying no came with a hot, familiar feeling: that needing a limit at
    all means something is wrong with you. A better parent wouldn''t be this stretched.
    A stronger person wouldn''t need to ask. So you swallow it and pay, again, with
    yourself, and tell no one how much it cost.


    This book is for the working parent whose boundaries fail at the root, not in
    the saying but in the believing you''re even allowed. You over-function at work
    so no one suspects you''re barely holding the home front together. You over-give
    at home so no one sees how depleted the job has left you. And underneath both
    runs the same buried verdict: that your needs are evidence of inadequacy, that
    a person who really had it together wouldn''t have to set a limit in the first
    place. So the limit never gets set, because setting it would mean admitting the
    thing you''re most afraid is true.


    We name the shame out loud, because it does its worst work unnamed. The flush
    when you decline. The apology that comes pre-attached to every limit, before you''ve
    even said what you need. The certainty that everyone else manages effortlessly
    what is quietly crushing you. Then we go down into where the belief was installed,
    the old equation between being good and being endlessly available, the lesson
    that love and approval were things you earned by saying yes. We stay with it long
    enough that you can see it for what it is: something you were taught, not something
    that''s true. You come back up able to set a limit without first building the
    case that you''ve earned the right to have one.


    This is not a self-improvement book. It will not optimize you into a person who
    finally deserves boundaries. There is no threshold of good-enough you have to
    clear first, no amount of giving that buys you permission to stop. The shift is
    that you stop treating your own needs as a character flaw and start treating them
    as the ordinary requirements of a person carrying a genuinely heavy load.


    Written in grounded, no-nonsense language for the moment ''no'' catches in your
    throat and the old feeling floods in. No affirmations, no gratitude lists, no
    pretending the shame isn''t there.


    You were never too much for needing a limit. You were taught to disappear politely
    and call it being good. You''re allowed to take up the room a real no requires.'
