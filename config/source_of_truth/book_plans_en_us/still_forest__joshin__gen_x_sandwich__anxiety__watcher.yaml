title: The Part of You That Never Lies Down
subtitle: For the hypervigilant mind that can't stop scanning for the next emergency
  — learning to rest at the edge of the clearing when the danger never comes
cover_tagline: Always listening at the tree line for a danger that never arrives.
description:
  short_blurb: Some part of you is always listening — for the next crisis, the next
    call, the thing about to go wrong — and it never settles, even when all is quiet.
    This is a book for the watchful one who has forgotten how to rest, and a slow
    way to let it lie down at the edge of the clearing.
  long_description: 'There is a part of you that never settles. Even now, even here,
    it is listening — for the phone, for a change in the faces around the table, for
    the next emergency before there is any sign of one. It has kept you ready for
    years: ready for a parent''s fall, a child''s trouble, the crisis that needs you
    the moment it arrives. It is the reason you are so steady when something truly
    goes wrong. It is also the reason you cannot, no matter how quiet the evening,
    fully come to rest. Something in you stays awake at the edge of the clearing,
    ears up, and you have forgotten there was ever a version of you that lay down.


    This book is for you: the watchful one, the person whose attention circles the
    safety of everyone they love and never quite comes to rest, the one whose body
    stays half-braced even on the stillest night because someone has to be ready and
    it has always been you. You are not paranoid. You are a creature that learned,
    long ago, that it was not safe to close its eyes, and was never told the danger
    had passed.


    Walk slowly here, and you will come to recognize something. That the watching
    is not keeping you safe so much as keeping you tired — that the threats it listens
    for, hour after hour, mostly never come, and the listening itself has become the
    thing wearing you down. You will learn what the deep forest knows about stillness:
    that a clearing is not unsafe for being quiet, that the old trees do not stay
    awake all night to keep standing, that safety can come not from watching harder
    but from being held by something larger and older than your own vigilance. You
    will begin to feel what it is to let the watchful part of you settle into the
    undergrowth and rest, even for an hour, even while the world goes on.


    This is not a book that will sharpen your senses or help you stay one step ahead
    of every possible trouble. It will not promise that nothing bad will ever happen,
    or that you will never need to be ready again. What it offers instead is stiller
    and more merciful: a clearing deep enough in the trees that the watchful one can
    finally lower its eyes, where you are not the only thing standing between the
    people you love and the dark, and where some older quiet can keep watch for a
    while so that you do not have to.


    Nothing here will help you watch more carefully. The watching was never the problem
    to solve — it was the cost you stopped noticing. The point is to discover that
    you are allowed, sometimes, to lie down at the edge of the clearing and close
    your eyes.


    You have kept watch a long time. The thing you keep listening for is rarely at
    the tree line. You are allowed to let the forest keep the watch, and rest.


    Book 7 of the Still Forest Press anxiety series.'
