title: The One Who Can't Say No
subtitle: For the founder secretly convinced that needing limits means there's something
  broken in you — and that staying endlessly available is how you hide it
cover_tagline: You've been overworking to cover a flaw that was never there.
description:
  short_blurb: 'Somewhere underneath the relentless availability is a quiet conviction:
    that a stronger person wouldn''t need boundaries, and that needing them is proof
    something is wrong with you. So you stay reachable, accommodating, indispensable
    — covering the defect by never letting anyone hit a limit. This book is for the
    founder ready to discover that the flaw you''ve been hiding was never real, and
    that what you are beneath the shame was never broken at all.'
  long_description: 'There''s a belief you''ve never said out loud, maybe not even
    to yourself. It goes something like this: a real founder — a strong one, a whole
    one — wouldn''t need to set limits. They''d just handle it. And the fact that
    you get overwhelmed, that you sometimes want to say no, that you have a breaking
    point at all — that''s the proof. Proof that something in you is weak, or broken,
    or not quite enough. So you hide it. You stay available. You become the one who
    always says yes, the one nobody can disappoint, because as long as no one ever
    hits your limit, no one will ever see the flaw you''re sure is there.


    This book is for the founder carrying that secret weight. You overwork not only
    because the company needs it, but because being indispensable is how you cover
    the defect. You apologize for things that aren''t your fault. You take on what
    isn''t yours. And underneath the competence the world sees, there''s a small,
    tired voice insisting that if people really knew you — knew how much you struggle
    to protect your own time, your own energy, your own no — they''d see what you''ve
    been hiding all along.


    You''ll come to recognize shame for the impostor it is. You''ll see how it disguised
    itself as humility, as work ethic, as ''just being a team player.'' How the hidden
    belief — that your worth is conditional, that you must earn your place by being
    endlessly useful — was installed in you so early you mistook it for the truth.
    And you''ll begin to feel the strange, loosening relief of seeing that the defect
    you''ve spent years covering does not actually exist. There is nothing to hide.
    There never was.


    This is not a book about fixing yourself, because you were never broken. It offers
    no framework for becoming the kind of person who ''finally'' deserves boundaries,
    no optimization of your self-worth, no work to do before you''re allowed to rest.
    That whole premise — that you must become better before you can stop hiding —
    is the dream this book is meant to wake you from.


    What you are, beneath the shame, beneath the reflex to overwork, beneath the founder
    who must never be caught with a limit, is already whole. The shame is just weather.
    You are the open sky it''s been passing through, mistaking the clouds for yourself.
    When you see that, the need to hide quietly falls away — not because you''ve earned
    your worth at last, but because you''ve remembered it was never in question.


    You are allowed to have a limit and still be exactly enough.


    Book 2 of the Awakening Press boundaries series.'
