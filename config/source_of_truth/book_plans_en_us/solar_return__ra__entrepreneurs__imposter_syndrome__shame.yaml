title: They're Going to Find Out You Faked It
subtitle: For the founder who keeps overworking to cover a defect no one else can
  find — tending the quiet shame that the success was luck and the bill is coming
  due
cover_tagline: You didn't get lucky. You just never let yourself feel warm about it.
description:
  short_blurb: You closed the round, shipped the product, signed the client — and
    somewhere underneath the relief is a cold certainty that you got away with something,
    and that one day the right person will look closely and see the fraud you've been
    hiding. This is the book for the part of you that has been overworking to cover
    a defect no one else can find, because you're terrified the defect is you.
  long_description: 'It happens right after the win. The deal closes, the launch lands,
    the board nods — and instead of warmth, a draft moves through your chest. They''re
    going to find out. Not what you did, but who you are underneath it: someone who
    has been faking competence so convincingly that the exposure, when it comes, will
    be total.


    This book is for the founder who carries shame the way you carry your phone —
    close, constant, barely noticed until it buzzes. You''re not lazy. You''re not
    failing. By every external measure you are succeeding, which is exactly the problem,
    because somewhere along the way you decided the success was luck and the bill
    is coming due. So you overwork. You over-prepare. You stay late in the dark office
    covering a defect you''re sure lives in you, and the covering itself becomes proof
    that the defect is real.


    You''ll come to recognize shame as the cold thing banked at the center of all
    of it — the buried belief that something is wrong with you, not your spreadsheet,
    not your pitch, you. You''ll see how it hides behind your competence and feeds
    on every achievement instead of being fed by it. You''ll feel the difference between
    the failure you can name and the wrongness you can''t, and understand at last
    why no win has ever once reached the cold place or warmed it for more than an
    evening.


    This is not a confidence book. It will not teach you to fake it harder, to power-pose
    your way past the fear, or to turn the shame into one more thing to manage before
    morning. There is no exposure coming that you need to outrun, and nothing here
    pretends otherwise. What''s here instead is slower and warmer: a way of sitting
    beside the cold place long enough to feel that it was never a defect at all. It
    was a fire someone let go out a long time ago, and you have been carrying the
    ash ever since, mistaking it for the truth about who you are.


    You don''t have to earn your way out of this. You don''t have to deserve the warmth
    before you let yourself feel it. The work you built is real, and so is the part
    of you that went cold building it — and both can be true at once while you let
    one of them, finally, begin to thaw.


    Book 1 of the Ember & Ash Publishing Imposter Syndrome series.'
