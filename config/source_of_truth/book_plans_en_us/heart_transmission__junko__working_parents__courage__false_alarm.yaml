title: The Body Says Danger, the Room Says Dinner
subtitle: For the working parent whose heart pounds before every hard conversation
  — learning to act while the alarm is still ringing
cover_tagline: Your hands shake at the kitchen table. Nothing here can hurt you. You
  are allowed to speak anyway.
description:
  short_blurb: You are about to say the small, true thing — and your whole body braces
    as if you're stepping off a ledge. But the room is just the kitchen, and the danger
    isn't real. This is a book for the working parent whose courage keeps getting
    overruled by a false alarm.
  long_description: 'You feel it before you''ve said a word. The conversation hasn''t
    even started — you''re just standing at the counter, or holding your phone, or
    watching your child''s face — and your chest goes tight, your pulse climbs, your
    hands go cold. Your body is certain something terrible is about to happen. And
    then nothing does. The room is just the kitchen. The danger was never real.


    This is a book for the working parent who lives with that false alarm. You are
    not fragile. You are running a finely tuned warning system at full volume over
    things that cannot actually hurt you: asking for what you need, naming a limit,
    letting yourself be seen wanting something. You brace for the cliff. You wait,
    every time, to feel ready — and the readiness never quite comes.


    Here, you''ll come to recognize the alarm for what it is. You''ll feel where it
    lives in your shoulders, your jaw, the breath you keep holding through the whole
    day. You''ll see the old belief underneath it — that to be safe you must stay
    small, agreeable, unnoticed — and you''ll feel, maybe for the first time in a
    long while, the gap between what your nervous system is screaming and what is
    actually true in the room with you. You''ll come to know the alarm so well that
    its ringing stops meaning stop, and starts meaning only this matters to me. You''ll
    learn that courage was never the absence of the pounding heart. It is the one
    small step you take while the heart is still pounding.


    This book will not make the alarm stop. It will not hand you a trick to feel calm
    on demand, or turn your tender, overloaded heart into something to manage. There
    is no fearless version of you waiting on the far side of the right technique.
    What''s offered instead is closer and quieter: a hand held out in the dark, the
    warmth of a presence that has sat where you are sitting, and the steady knowledge
    that you can move toward the thing you''ve been postponing while afraid — and
    find the floor holds.


    You are allowed to speak with a shaking voice. You are allowed to act before the
    fear has finished. The alarm can ring, and you can still reach out your hand.


    Book 1 of the Heart Transmission Press working parents courage series.'
