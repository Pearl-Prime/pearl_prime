title: A Real Life Never Photographs Well
subtitle: For the twenty-something holding a true, messy life up to everyone else's
  launch posts and calm faces — and always reading themselves as the one behind
cover_tagline: You're not behind. You're holding a measuring tape against a highlight
  reel.
description:
  short_blurb: 'Open the app and it''s all there: the promotion, the apartment, the
    launch, the friend who already seems sure of who they are. You close it feeling
    a half-step behind everyone you''ve ever met. This is a book for the mind that
    measures itself against the whole feed and always loses.'
  long_description: 'Someone you went to school with just posted the thing. The new
    title, the round, the ''so excited to announce.'' You tapped the heart. You meant
    it, mostly. And then you sat there in the blue light feeling like everyone your
    age got a manual you never received, and you''re still down here Googling how
    to do a thing they apparently just know.


    That''s comparison. And you are very, very good at it, because you grew up with
    a phone that turned everyone''s best moment into a scrollable feed and quietly
    taught you to grade yourself against all of it at once.


    This book is for the gen-z professional who can find the one person doing better
    in any room, on any timeline, in under a second. You''re not shallow and you''re
    not jealous in the cartoon way. You''re calibrated. You''ve just pointed a very
    precise instrument at a target it can never satisfy: yourself, measured against
    a thousand curated lives, none of which you actually live inside.


    You''ll come to recognize the move as it happens — the scroll, the flinch, the
    quiet math of how far behind you must be. You''ll feel what it''s costing you:
    the wins that don''t land because someone already won bigger, the way ''good enough''
    never gets to be enough. You''ll get underneath it to the belief doing the damage,
    the one that says your worth is a ranking and you are losing the ranking. And
    you''ll start to feel the difference between a life and a feed — the one you can
    touch, the breath between notifications, the floor under your feet that doesn''t
    care how anyone else''s quarter went.


    This is not a book that will help you win. No glow-up, no five-year plan, no way
    to finally come out on top of the comparison. It won''t give you that, on purpose.
    Because the only way to win a comparison is to keep playing it, and the game is
    rigged so that even first place spends the whole time looking up. Nothing here
    helps you climb the ranking. That''s the point.


    You were never behind. There is no manual everyone else got. There''s just your
    one actual life, happening in real time, in this room, and it stops being smaller
    the second you stop holding it up against the screen. You''re allowed to put the
    tape measure down. You''re allowed to be exactly as far along as you are. You
    can look up from the feed now.


    Book 2 of the Present Tense Books self worth series.'
