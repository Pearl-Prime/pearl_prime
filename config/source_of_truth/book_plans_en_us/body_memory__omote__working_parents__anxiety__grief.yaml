title: Mourning the Parent You Thought You'd Be
subtitle: For the parent grieving quietly underneath the worry — the time, the self,
  the calmer life you imagined, all slipping past in the rush
cover_tagline: Some of the anxiety is grief that never got to be felt.
description:
  short_blurb: 'Beneath the anxiety is a loss no one named: the time gone, the self
    you set aside, the parent you meant to be. This is a tender book for working parents
    carrying unspoken grief — and a way to finally let go of what was, so the bracing
    can soften and the ground can hold you again.'
  long_description: 'No one died, so you never called it grief. But it''s there, underneath
    the worry — in the photos of a baby who is suddenly seven, in the version of yourself
    you packed away when the second job and the third kid arrived, in the calm, present
    parent you swore you''d be before you were this tired. The anxiety hums on top
    of it, loud enough to drown it out. But some nights the loss surfaces anyway,
    and you don''t have a word for the weight in your chest, so you call it stress
    and keep moving.


    This book is for the working parent who is grieving and doesn''t know it. Mourning
    lost time, a lost self, the life you pictured that didn''t come to pass — all
    while showing up every single day. You are not ungrateful, and wanting to grieve
    does not mean you don''t love this life. It means something real was set down
    along the way, and it was never allowed to be mourned.


    Here you''ll come to recognize the grief hiding inside the anxiety. How loss that
    goes unfelt turns into bracing, into vigilance, into a body that won''t relax
    because it''s still holding something it was never permitted to release. You''ll
    feel where the unwept grief lives — the heaviness behind the sternum, the throat
    that tightens at the school play, the tears that arrive at the wrong moment —
    and you''ll begin to let the ground receive what you''ve been carrying clenched.
    Not by getting over it. By finally letting it move through you.


    This is not a book about silver linings or being grateful enough to feel better.
    There is nothing to push past here, no loss to reframe into a lesson before you''ve
    even been allowed to feel it. What''s here instead is slower and more honest:
    a way to name what was lost, to let yourself mourn it without guilt, and to let
    go of what must be released — so the grip the grief has on your body can ease
    and you can come back to the life that is actually here.


    You are allowed to grieve and to be grateful in the same breath. What you lost
    was real. Letting it be mourned does not betray what you have — it''s how the
    weight finally sets down, how the bracing softens, how the ground gets to hold
    you again. You don''t have to carry the unwept thing forever.


    You''re allowed to set it down and be held while you do.


    Book 5 of the Held Ground Press anxiety series.'
