title: The Green Dot Never Goes Dark
subtitle: For the exhausted professional whose mind never clocks out — always scanning
  for the next fire, the next message, the threat that never quite arrives
cover_tagline: The watch is over. You can finally take your eyes off the horizon.
description:
  short_blurb: Even when you stop working, you don't stop watching. The mind keeps
    scanning — the inbox, the on-call, the next thing about to go wrong — long after
    the threat is gone. This is a book for the hypervigilant professional who can't
    power down, and who has forgotten that the storm is no longer overhead.
  long_description: 'You close the laptop and your mind doesn''t close with it. It
    keeps scanning. Did that message land wrong. Is the deploy holding. What''s going
    to break on Monday, what did you miss, what''s coming that you haven''t braced
    for yet. You check your phone before you''re fully awake. You feel the phantom
    buzz. You sit at dinner and a part of you is still on watch, eyes on a horizon
    where a storm might be forming, even when the sky is clear. You haven''t been
    off duty in so long you''ve forgotten there''s an off.


    This book is for you: the operator in tech or finance whose vigilance was once
    a superpower and is now a cage. The one who got good — too good — at seeing the
    problem before it happened, at being reachable, at never being caught off guard.
    That weather-eye on the horizon once kept you safe and made you valuable, and
    you earned every bit of the trust it bought you. It also never lets you rest,
    because a mind that is always watching for the next emergency cannot tell that
    this moment is not one. To a storm-watch that never stands down, calm water and
    the lull before a squall feel exactly the same.


    What you''ll come to recognize here is that hypervigilance is not focus and it
    is not diligence — it''s a storm-warning that learned to stay sounding long after
    the weather cleared. You''ll see the mask of the person who''s always ''on top
    of it.'' You''ll feel the cost in a nervous system that braces around the clock,
    that reads every quiet as the pause before the next wave. And you''ll find the
    belief underneath the watching: that if you ever truly stopped scanning, everything
    would fall apart, and it would be your fault. You''ll begin to test, gently, whether
    that''s still true — and to notice how much of the horizon stays clear whether
    or not you are staring at it.


    This is not a book about productivity, or focus, or managing your notifications
    better. It will not teach you to monitor smarter. There is no protocol here for
    staying ahead of the storm. The work is the opposite — to let the watch end. To
    learn, in your body, that the breakwater is holding, that the boat has stopped
    pitching, and that you are allowed to take your eyes off the water and come below.


    You are allowed to stop scanning. You are allowed to be unreachable. The horizon
    will hold without you watching it.


    Book 3 of the Harbor Line Books burnout series.'
