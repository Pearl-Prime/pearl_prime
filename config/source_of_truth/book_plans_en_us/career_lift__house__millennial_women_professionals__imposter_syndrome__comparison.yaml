title: A Room You're Sure You Talked Your Way Into
subtitle: For the woman certain her seat at the table was a clerical error about to
  be caught
cover_tagline: You're comparing your inside to everyone else's outside, and calling
  the gap a verdict.
description:
  short_blurb: 'You walk into the room and immediately start measuring: she''s more
    polished, he''s more certain, they all clearly belong here in a way you don''t.
    This is a book for the woman who turns every colleague into evidence that she''s
    the impostor in the room. It won''t help you win the comparison, and that''s exactly
    the point.'
  long_description: 'You can feel it the moment you walk in. Everyone here seems to
    belong. They speak up without rehearsing it first. They take the credit without
    flinching. They look like people who have never once wondered if they were about
    to be found out — and there you are, scanning the room, quietly cataloguing every
    way you fall short of them.


    This book is for the woman who turns her colleagues into a measuring stick. The
    one who reads someone''s calm in a meeting as proof of her own fraudulence. The
    one who scrolls a peer''s promotion announcement and feels the floor tilt. The
    one who has decided that everyone else is composed and capable, and she is the
    single exception — the one who snuck in, the one who''s behind, the one who doesn''t
    really fit.


    Here you''ll come to recognize the comparison habit for what it is: not a clear-eyed
    read on where you stand, but a story pointed in exactly the wrong direction. You''ll
    see how you measure your messy, fully-known inside against everyone else''s edited
    outside, and then read the gap as a verdict. You''ll notice how the people you''ve
    cast as effortless are very likely watching someone else and feeling the same.
    You''ll feel what it''s like to step out of the ranking, even briefly, and stand
    in a room without weighing yourself against it.


    This book will not help you win the comparison. It won''t teach you to look more
    polished than the polished, and it won''t promise that once you finally measure
    up, the fraud-feeling will lift. There''s no fixing yourself here, no formula
    for becoming the most impressive person in the room, no suggestion that you simply
    haven''t tried hard enough to feel like you belong. The comparison was never the
    way out. Setting it down is.


    What it offers instead is gentler and harder to fake: the chance to stop borrowing
    your worth from how you stack up, and to keep walking into rooms you''re not yet
    sure are yours. You belong in this next chapter not because you''ve out-measured
    anyone, but because you''re already in it, doing the work, being honest about
    the fear.


    You were never behind. You were just looking at everyone else to find out where
    you stand.


    Book 2 of the Next Chapter Publishing Imposter Syndrome series.'
