title: More Than You Can Carry Before the Sun Is Up
subtitle: For the founder whose to-do list arrives all at once at dawn — when the
  whole company lands on your chest before your feet hit the floor
cover_tagline: The flood was never a failure of capacity. It was a signal you stopped
  being allowed to hear.
description:
  short_blurb: You wake and it's already too much — every fire, every Slack, every
    decision arriving in the same instant before the sky has even gone pale. This
    is a book for the founder drowning not in one big thing but in everything at once.
    It won't help you carry more. It will help you set some of it down before the
    day even starts.
  long_description: 'You know the feeling before you''re even fully awake. It''s barely
    light out, the house is still, and somehow the entire company has already landed
    on your chest. Every open loop, every unanswered message, every decision that
    only you can make — all of it arrives at once, in the same breath, before your
    feet have touched the floor. You haven''t done anything yet and you''re already
    behind.


    This book is for the founder who isn''t undone by one enormous problem but by
    the flood of small ones arriving together. You''re not bad at your job. You''re
    not weak. Your capacity isn''t broken. You''ve just been running a system designed
    to take on everything, with no valve, no quiet hour, no margin — and the flood
    you feel at dawn is what that costs.


    Here you''ll come to recognize overwhelm for what it actually is: not a personal
    failing but the predictable result of too much arriving with nowhere to put it
    down. You''ll see how the founder''s instinct to hold it all — every detail, every
    contingency, every fire — quietly became the thing that''s drowning you. You''ll
    notice the moment each morning when the volume spikes, and you''ll learn what
    it feels like to meet that moment without immediately reaching for the phone.
    Not to manage the flood faster. To stop standing under it. And slowly, morning
    by morning, to trust that the company can hold for the length of a single breath.


    This is not a productivity book. There is no system here for processing your inbox
    at superhuman speed, no framework for fitting more into the day, no protocol to
    optimize your mornings into a machine. Nothing here will help you carry more,
    because carrying more was never the answer. The point is the opposite — to find
    the one hour, the one before the inbox wakes and the world starts asking, that
    can belong to you and not to the company.


    You are allowed to wake up before the work does. You are allowed to let the day
    arrive slowly, to take one breath at first light before you take on everything.
    None of it has to be answered yet. The flood will still be there. But you don''t
    have to meet it already underwater.


    Begin again — gently, and before the sun is fully up.


    Book 1 of the Daybreak Editions burnout series.'
