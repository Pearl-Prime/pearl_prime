title: 'After the Flame: When Loss Reshapes Everything'
subtitle: A Field Guide for Professional Women Navigating Burnout Recovery
cover_tagline: Burnout isn't just exhaustion. It's grief for the version of you who
  could keep going.
description:
  short_blurb: 'You didn''t just run out of energy — you lost someone: the woman who
    used to thrive on the pace you now resent. This is a field guide for professional
    women who burned out and are quietly mourning who they were before. It won''t
    hand you back your old stamina. It will help you let her go and find out who''s
    standing here now.'
  long_description: 'There''s a moment, usually around 6 p.m. on a Tuesday, when you
    realize you don''t recognize the person doing your job. She used to be sharp.
    She used to want it. Now you''re answering the same emails she would have crushed
    in twenty minutes, and it''s taking everything you have not to put your head down
    on the desk.


    That''s not laziness. That''s grief.


    You burned out, and somewhere in the wreckage you started quietly mourning the
    version of yourself who could go and go and go. The one who said yes. The one
    everyone called ''so reliable.'' She''s gone, and nobody held a service for her,
    and you''ve been clocking in every morning pretending you''re still her — running
    her old playbook in a body that can''t run it anymore.


    This book moves the way grief actually moves. It starts by naming the loss out
    loud, because burnout is a kind of death you were never allowed to call a death.
    Then it goes down into the loss instead of around it — not to fix you, not to
    optimize your recovery into one more performance metric, but to let you feel the
    real size of what you gave away, and to whom. The descent is exactly where most
    advice abandons you. This one stays. And then it turns toward integration: not
    bouncing back, but coming back changed, carrying what that earlier version of
    you knew without having to become her again.


    Let''s be honest about what this is not. It will not hand you a 6 a.m. routine
    to get your edge back. It will not promise you''ll come out ''better than ever''
    or repackage your collapse into a comeback post for LinkedIn. There is no protocol
    in here for becoming productive again on a faster timeline. If what you want is
    to be re-optimized and sent back into the same grinder, this is the wrong book,
    and you''ll know it by the second chapter.


    What it offers is plainer and harder: language for a loss you''ve been carrying
    without a name. A way to grieve the self who burned out instead of resurrecting
    her and burning her down all over again. The recognition that the tiredness underneath
    your tiredness is mourning — that mourning has a shape, a weight, a direction
    — and that you can move through it instead of bracing against it forever.


    You are allowed to miss who you were. You are also allowed to not go back. Both
    of those can be true at the same desk, on the same Tuesday, in the same tired
    body that is, despite everything, still yours.


    Put down the eulogy you keep rewriting in your head. Come find out who''s actually
    here.'
