title: Always Watching the Monitor
subtitle: For the nurse whose scanning mind never clocks out — when the hypervigilant
  habit of catching everything follows you home and won't go off duty
cover_tagline: You're trained to catch the one thing everyone else misses. Even when
  there's nothing to catch.
description:
  short_blurb: On the unit, the part of you that scans for the early sign keeps people
    alive. The problem is it never clocks out — at the dinner table, in line, in bed,
    your mind keeps sweeping the room for the threat, monitoring for an emergency
    that isn't coming. This book is for the nurse whose watcher never goes off duty,
    and it will not ask you to lower your guard by force.
  long_description: 'You see the thing before anyone else does. The subtle change
    in color, the rhythm that''s a little off, the patient who''s ''just not right''
    before the numbers say so. That part of you — the watcher, scanning, always one
    step ahead of the emergency — is what makes you exceptional at the bedside. It
    is also the part that will not turn off. You''re at dinner and you''re tracking
    the exits. You''re in bed and you''re listening for a monitor that isn''t there.
    Your phone buzzes and your whole body is up and scanning before you''ve read the
    screen. The shift ended hours ago. The watcher is still on duty. It is always
    on duty.


    This is for the nurse whose hypervigilance came home and never left. You taught
    your mind to sweep a room for danger, to never be caught off guard, to catch the
    one thing everyone else missed — and your body learned the lesson so completely
    that it now scans your living room, your weekend, your sleep, for threats that
    are not coming. It cannot tell that you are off the clock. To the watcher, you
    are never off the clock.


    You are not paranoid. You are not ''too much.'' You are a body that learned to
    keep watch in a place that never let the watching end, and never got to learn
    that home is different.


    In these pages you''ll come to recognize the watcher for what it is: a protective
    part working overtime, scanning for danger in a life that, right now, in this
    room, holds none. You''ll feel the difference between vigilance that serves you
    and vigilance that has forgotten how to stand down. You''ll learn what it is to
    let the scanning soften — not to drop your guard recklessly, but to let your body
    register that the ground beneath you is solid, the room is safe, and nothing in
    it requires watching. You''ll feel your own weight settle into earth that is keeping
    watch for you, so the watcher can finally, even for a moment, rest.


    This book will not tell you to lower your guard or to stop being so alert. It
    will not shame the very vigilance that has saved lives. It will not try to force
    your attention into something more relaxed. There is no nurse here to fix and
    no instinct here to break. What there is, instead, is a steady voice and ground
    so solid it can hold the watch for a while — so the part of you that never stops
    scanning can learn, slowly, that it is allowed to stand down when there is nothing
    left to catch.


    The monitors are quiet. You can take your eyes off the screen.


    Book 7 of the Held Ground Press anxiety series.'
