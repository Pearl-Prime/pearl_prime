title: The Thing You're Sure Is Wrong With You
subtitle: For managers outrunning a private defect — the buried belief that you're
  not enough, and the body that flinches when you're nearly seen
cover_tagline: You've built a whole career on never being found out.
description:
  short_blurb: There's a thing you're sure is wrong with you. You've never named it,
    but you've spent a career making sure no one sees it — over-preparing, over-delivering,
    over-explaining. This is a quiet book for the manager whose body contracts at
    the edge of being known, and who is tired of the hiding.
  long_description: 'There''s something you''re sure is wrong with you. You''ve never
    quite put it into words, but you know its shape, and you''ve spent your whole
    life making sure no one else ever sees it. The over-preparing. The over-delivering.
    The way you brace, physically, in the half-second before you''re about to be truly
    seen — a contraction in the chest, a heat in the face, a pulling-in, as if the
    body is trying to make you smaller before anyone can find the thing out.


    This is shame. Not guilt — guilt says you did something bad. Shame whispers something
    worse and quieter: that you are the bad thing, the defect, the fraud who got this
    far by hiding. And it doesn''t live in your thoughts so much as in your body,
    in a flinch and a contraction so old you may have stopped feeling it as anything
    but who you are.


    This book is for the mid-level manager who runs the cross-functional team and
    is good at it — and who is privately certain that the competence is a costume,
    that the moment of exposure is always one mistake away. The body holds what shame
    won''t let you say. You''ve called it high standards. You''ve called it imposter
    syndrome. You may never have called it shame, because to name it felt like proving
    it true.


    You''ll come to recognize shame as a body state before it is a belief — the contraction,
    the gaze that drops, the urge to disappear. You''ll learn where it lives in you
    and what triggers the flinch, and you''ll begin to understand the cruel logic
    of why it made sense: that long ago, hiding the defect was how you stayed safe
    and stayed loved. And slowly, without forcing it, you''ll feel what happens when
    the contraction is met with something other than more hiding — when a part of
    you that has only ever braced for rejection gets, instead, to be witnessed and
    not flee.


    This book will not give you a confidence hack or a way to optimize your self-worth.
    Shame doesn''t yield to affirmations stacked on top of it, and it is not a flaw
    to be corrected. It is a tender, contracted part of you that learned to hide,
    and what it needs is not improvement but company — to be seen, gently, and to
    survive the seeing.


    What it offers is recognition, and a way to begin releasing the contraction. Language
    for the flinch. A practice small enough to do in the moment before you walk into
    the room you''ve been dreading, on the train, alone when the old certainty rises
    — a way of staying with your body instead of abandoning it the instant it braces.


    You are not the thing you''ve been hiding. You are a person who learned, young,
    that hiding was safety — and who is allowed, now, to find out what it''s like
    to stop.


    Book 5 of the Stillness Press somatic healing series.'
