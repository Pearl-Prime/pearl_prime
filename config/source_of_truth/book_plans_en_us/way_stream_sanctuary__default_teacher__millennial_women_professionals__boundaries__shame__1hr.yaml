title: 'The Line You Never Drew: When You Feel Fundamentally Wrong'
subtitle: A One-Hour Boundaries Reset for Professional Women
cover_tagline: You don't think your boundary is wrong. You think you are, for having
  one.
description:
  short_blurb: Somewhere you learned that needing limits means there is something
    defective in you. This is the one-hour book about the buried belief that a good
    person wouldn't have to say no. It won't argue you into self-esteem. It will go
    down to the place where having needs got tangled up with being bad, and loosen
    the knot.
  long_description: 'Someone asks for more than you have, and you hand it over, and
    underneath the yes sits a quiet conviction you would never say out loud to anyone:
    a better person wouldn''t even need to set the limit. The simple fact that part
    of you wants to push back feels like proof of something small and grasping and
    selfish in you. So you don''t push back. You give past the point of sense, and
    you over-give on top of that, trying to outrun the small thing by making sure
    no one — least of all you — ever catches it being there.


    This is for the professional woman who experiences her own boundaries as a defect
    in her character. It isn''t that you think the request is unreasonable; you can
    usually argue the other person''s side better than they can. It''s that wanting
    to decline at all makes you feel fundamentally wrong, as if needing a limit were
    direct evidence you aren''t as generous or capable or good as you are supposed
    to be by now. So you stay endlessly available and quietly depleted — not because
    you are unable to say the word no, but because saying it out loud would seem to
    confirm the very thing you are most afraid is true about who you are underneath.


    The work moves through three stages. First it gets named, carefully: the problem
    was never the boundary itself. It''s the shame that got soldered onto the boundary
    somewhere back in your history — the old, early belief that having needs is the
    same as being too much. Then, instead of frantically assembling the case for why
    you are actually a good and giving person, you stop arguing and go sit with the
    belief itself. Where it came from. How young you were when you first learned that
    your limits made you a burden someone had to manage. You let it be there without
    rushing in to fix or refute it. Then you come back up able to set a line and simply
    leave it at that — without quietly filing it away as one more entry in the long
    case against yourself.


    This will not coach you toward confidence or hand you a stack of affirmations
    to recite until the shame loosens its grip. It will not promise that you''ll feel
    worthy first and act second, in that tidy order. It won''t inform you that the
    feeling is irrational and expect the information to dissolve it, because shame
    has never once been argued out of a body. The shame is not a fact about you. It
    is a thing that was taught to you, early, by people who were likely taught it
    too.


    You are allowed to have limits without that meaning a single thing is wrong with
    you. The needing was never the flaw.'
