title: Everything Is Due Today
subtitle: For the high-performer drowning in a flood of inputs — when every channel
  is open, the queue never empties, and there's no room left to think
cover_tagline: The water is up to the dock. Come in off it.
description:
  short_blurb: Your inbox, your Slack, your calendar, your own racing mind — it all
    arrives at once now, and there is no shore where it stops. This is a book for
    the capable person whose capacity finally ran out, the one who keeps treating
    a flood like a to-do list. It will not help you process it faster. It will help
    you put the instrument down.
  long_description: 'It''s not that you can''t do the work. You''ve always been able
    to do the work. It''s that everything arrives at the same time now — the message
    and the deadline and the meeting and the ask and the second ask before you''ve
    answered the first — and there is no longer any moment in the day where the water
    goes down. You triage. You re-prioritize. You stay an hour later and the queue
    is exactly as full as when you started. Somewhere in there you stopped being a
    person with a job and became a thing that processes inputs, and you can''t remember
    when the line was crossed.


    This book is for you: the operator in tech or finance who has more capacity than
    almost anyone you know, and who has finally hit the floor of it. The one with
    the green Slack dot that never goes dark. The one who optimized everything and
    is now being optimized out of their own life. You are not lazy. You are not behind.
    You are flooded — and a flood is not a productivity problem, no matter how many
    times you''ve tried to outwork it.


    What you''ll come to recognize here is that overwhelm is not the same as having
    too much to do. It''s the moment the breakwater goes under — when there''s no
    longer a calm place inside the harbor for the next wave to break against, so every
    wave breaks against you. You''ll see the mask you wear that says you''ve got it
    handled. You''ll feel the cost of it in your body, in the shallow breath and the
    clenched jaw you''ve stopped noticing. And you''ll find, underneath the to-do
    list, the older belief that your worth is your throughput — the one quietly running
    the whole machine.


    This is not a system. There is no method here for clearing the queue faster, no
    framework, no morning routine that will finally make it all fit. Nothing in these
    pages will help you win the day. That''s the point. The flood does not recede
    because you got better at swimming. It recedes when you stop, and let the ground
    come back under you, and remember that you were a person before you were a capacity.


    You are allowed to not catch every wave. You are allowed to come in off the water.
    The harbor was always there.


    Book 1 of the Harbor Line Books burnout series.'
