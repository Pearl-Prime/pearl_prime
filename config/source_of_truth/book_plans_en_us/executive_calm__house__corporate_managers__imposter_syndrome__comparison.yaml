title: They Were Built for This and You Were Let In
subtitle: For the manager who measures themselves against every leader who seems to
  belong — and always comes up the one who slipped through
cover_tagline: Everyone at that table looks like they were made for the chair. You
  are sure you are the seat that should have stayed empty.
description:
  short_blurb: You look around the leadership table and see people who were clearly
    built for this — and you, somehow let in by mistake. This book does not try to
    win you the comparison or talk you into belonging. It sits with the leader who
    measures themselves against every calm, certain colleague and always loses, and
    shows you why you have been holding the truest measure you own against exactly
    the wrong stone.
  long_description: 'You scan the room before the meeting starts. You always do. The
    other VP who never seems rattled. The peer whose updates land so cleanly. The
    one who speaks last and somehow says the thing everyone needed. They look like
    they were built for this — shaped for the room, certain of the chair. And you
    sit among them quietly sure of one thing: you were the one let in by mistake.


    You do this constantly, and you are good at it. You can read a leadership team
    in seconds and locate, with precision, every way you fall short of the people
    who belong. You measure your hesitations against their composure, your scramble
    against their ease, your private doubt against the certainty they appear to feel.
    You always come up the same: the impostor at the table where everyone else is
    real.


    This book is for the manager who runs that comparison without rest — the one who
    has built a whole inner case for why every other leader was made for this and
    they alone slipped through. Not the person who occasionally feels outmatched,
    but the one who treats belonging as something everyone else was issued at birth
    and they have to keep faking.


    You will come to recognize the measuring itself, and how relentlessly accurate
    it feels while being entirely rigged. You will see what you cannot see from the
    outside of another person: that the composure you envy is a surface, that the
    leaders you compare yourself to are running some version of the same private arithmetic,
    that you have only ever matched your inside against their outside. You will sit
    with the belief underneath it — that you are the exception, the error, the one
    who got in — and find it does not survive being looked at directly.


    This book will not help you win the comparison. That is the point. It will not
    rank you above the others or hand you the certainty they seem to have. It will
    not optimize your standing or teach you to out-belong the room. There is no method
    here for finally measuring up, because the measuring was never going to end well,
    no matter how the numbers came out.


    What it offers instead is steadier ground. You have been holding the truest, most
    exacting measure you own against the wrong stone: yourself, from the outside,
    set against people you can only see the surface of. Set it down and the room does
    not change — but the one who has been comparing finally can.


    You were not let in by mistake. You were measuring a thing that cannot be measured,
    and losing on purpose. The chair was always yours.


    Book 2 of the Granite Ridge Publishing imposter syndrome series.'
