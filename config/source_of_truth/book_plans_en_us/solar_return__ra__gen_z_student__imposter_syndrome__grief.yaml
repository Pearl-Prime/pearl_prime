title: Mourning the Student You Thought You'd Be
subtitle: For the student grieving a version of themselves that didn't survive the
  first year — when the loss isn't a person, but a self you had to let go
cover_tagline: No one warned you that you'd have to grieve yourself.
description:
  short_blurb: You arrived as the smart one, the one who had it figured out, and somewhere
    in the first year that person quietly died and no one held a service. This is
    for the student grieving a self they thought they'd be. It won't rush you toward
    closure — it will let you mourn what was lost, and trust that something can still
    grow back green.
  long_description: 'You don''t talk about it because it sounds dramatic, but the
    truth is you''re grieving. Not a person. A version of yourself. The one who was
    always the smart one in the room, who had a plan, who knew exactly who they were
    going to be. Somewhere in the first months here, surrounded by people who seemed
    effortlessly more, that version of you quietly died — and there was no funeral,
    no card, no one to say they were sorry for your loss.


    This is for you — the student carrying a grief with no name. The one who feels
    the ache of a self that didn''t survive the transition, who misses the certainty
    they used to have, who looks at old photos and feels like they''re mourning a
    stranger they used to be. Grief from imposter syndrome doesn''t announce itself.
    It arrives sideways: in the middle of an ordinary Tuesday, in the sting of watching
    someone become the thing you thought you''d be, in the quiet realization that
    the person you were before you got here isn''t coming back.


    You''ll come to recognize grief in its strange, shape-shifting forms — how it
    hides as numbness, as irritation, as a heaviness you can''t explain. You''ll see
    how the loss of an old self-image is a real loss, worthy of real mourning, even
    though no one taught you that you''d have to do this. You''ll learn the difference
    between clinging to who you were and honoring it, between what was taken from
    you and what you might finally be ready to set down. You''ll find permission to
    grieve the future you''d already written, the one that quietly stopped being true.


    This book will not rush you toward closure. It won''t tell you to reframe the
    loss as a gift, or move you briskly through stages toward a tidy acceptance, because
    grief doesn''t work on a syllabus and you are not behind. There''s no fixing this,
    no optimizing your way past the ache. What there is, instead, is room — to miss
    what''s gone, to let it be a real loss, and to trust, without being hurried, that
    ground left bare by a burn is exactly where new green comes through.


    You are allowed to mourn the student you thought you''d be. And you are allowed,
    when you''re ready and not before, to become someone you haven''t met yet.


    Book 5 of the Ember & Ash Publishing Imposter Syndrome series.'
