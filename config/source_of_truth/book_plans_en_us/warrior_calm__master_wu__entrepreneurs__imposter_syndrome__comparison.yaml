title: Everyone Else Looks Like They Belong
subtitle: For the founder measuring a private panic against every peer who seems certain
  — and always coming up the fraud in the room
cover_tagline: You're reading their highlight reel as your verdict. It was never the
  same race.
description:
  short_blurb: Every other founder seems to know exactly what they're doing — funded,
    composed, sure they belong in the room. You watch them and quietly conclude you're
    the one who snuck in. This book won't help you win the comparison. That's the
    point.
  long_description: 'You''re in the room — the pitch, the panel, the founder dinner,
    the group chat — and everyone else looks like they belong there. They speak with
    a certainty you can''t fake. Their metrics sound cleaner. Their calm looks real.
    And you do the math you always do and come out the same way every time: you''re
    the one who got in by accident.


    You''ve turned comparison into a blade, and you''ve turned it on yourself. You
    scroll the funding announcements at night. You measure your messy middle against
    everyone else''s polished outside and call the gap evidence. Somewhere along the
    way, watching them became your way of grading you — and the grade is always the
    same: not enough, not real, not like the ones who actually belong.


    This book is for the founder whose imposter syndrome runs on comparison — the
    constant private accounting against every peer who looks composed, funded, and
    sure, the certainty that you''re the only fraud in a room full of the genuine
    article. You''re not lazy and you''re not failing. You''ve simply aimed a sharp
    eye at the wrong mark: yourself, measured against a reel you were never meant
    to see the back of.


    You''ll come to recognize the pattern. The way the scanning never rests, always
    finding the one person ahead. The cost it extracts — the wins that turn to dust
    the moment someone else''s win lands harder, the calm you perform so no one clocks
    the panic, the slow erosion of knowing your own ground. You''ll see the hidden
    belief feeding it: that worth is a ranking, that there''s a real founder and a
    fake one and you already know which you are. And you''ll learn what it is to stand
    in a room full of people who look certain and stay rooted anyway — not because
    you finally win the comparison, but because you stop entering it.


    This book will not help you come out ahead. It won''t rank you above the founders
    who intimidate you, and it won''t turn your envy into fuel. There''s no tactic
    here for finally feeling like the most legitimate person in the room. The aim
    is quieter and steadier: to set the measuring down, and stand on ground that doesn''t
    depend on anyone else losing.


    Nothing here will help you win the comparison. That''s the point. You were never
    behind. You were running a race that only you could see — and you can stop running
    it now.


    Book 2 of the Iron Gate Press imposter syndrome series.'
