title: The Empty Chair at the Head of the Table
subtitle: For the founder mourning the company they built — and quietly afraid that
  without it, there is no one left to be
cover_tagline: What you lost was real. So is what remains.
description:
  short_blurb: You built something, and then it was gone — the company, the partnership,
    the version of you that ran it. Everyone keeps telling you to start the next one.
    This is a quiet hour to stop pivoting and finally let the loss be real, and to
    meet what in you was never built and so can never be taken.
  long_description: 'There is a chair at the head of the table, and it is empty now.


    Maybe the company wound down. Maybe the cofounder walked away, or the board did
    the thing boards do, or the product you bled for simply didn''t make it. Maybe
    nothing dramatic happened at all — it just ended, the way a tide goes out, and
    you''re standing on the wet sand wondering where the water went. You poured years
    into it. It had your name on it, or at least your whole self. And now there''s
    a quiet in your days that you keep filling with new tabs, new decks, new reasons
    to be okay.


    This book is for you. For the founder who is grieving and won''t call it that.
    For the one who lost something that mattered and was told, kindly and relentlessly,
    to fail forward, to pivot, to find the lesson and move on. You will not be hurried
    here.


    You''ll come to recognize the shape of the absence — how loss doesn''t only take
    the thing, it takes the future you''d attached to it, and the self that future
    was for. You''ll see how ''I''ll just build the next one'' can be wisdom, and
    how it can also be a way to never set this one down. You''ll notice the strange
    guilt of mourning a business when people grieve people, and the quieter truth
    underneath it: that you were not grieving a balance sheet. You were grieving a
    way of being alive, a place you knew yourself, a chair that fit. You''ll sit with
    the question this loss keeps asking — what remains true when everything else shifts?
    — and you''ll let it stay a question.


    This book will not optimize your grief. It offers no five-step recovery, no reframe
    that turns the wound into a lesson you can pitch, no promise that this was secretly
    the best thing that ever happened to you. It will not help you win anything. It
    will not get you back to building faster.


    What it offers instead is stranger and steadier. A way to feel the absence without
    being swallowed by it. The slow recognition that you are not the venture — that
    you were here before it, awake behind it the whole time, and you are here still.
    The thing you built was real, and losing it is a real loss, and you are allowed
    to mourn it fully. And underneath the wreckage, something in you was never built.
    It can''t be acquired, can''t be wound down, can''t be taken in a term sheet.
    It was never lost. You''re only now turning to look at it.


    Sit down. The chair beside the empty one is for you.


    Book 1 of the Awakening Press grief series.'
