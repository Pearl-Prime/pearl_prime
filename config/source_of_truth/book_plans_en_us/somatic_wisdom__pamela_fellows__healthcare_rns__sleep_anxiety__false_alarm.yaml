title: Your Body Is Still Listening for the Call Light
subtitle: For the nurse whose nervous system never clocked out — bracing in the dark
  for an emergency that ended hours ago
cover_tagline: The shift is over. Your body didn't get the memo.
description:
  short_blurb: The alarm in your chest at 2am isn't a warning — it's an echo. After
    years of staying ready for the worst, your body learned to keep watch even in
    a quiet, safe room. This is a gentle, body-first way to let it finally stand down.
  long_description: 'The room is dark and the room is safe. The shift ended hours
    ago. And still your chest is tight, your jaw is set, and some part of you is half-listening
    for a monitor, a call light, the sound of someone needing you fast. Nothing is
    wrong. So why does your whole body insist that something is?


    This book is for the nurse whose alarm system never learned how to turn off. You''ve
    spent years being the calm one in the room while your own nervous system ran hot
    underneath — reading every change, staying a half-step ahead of the worst thing
    that could happen. That readiness kept your patients safe. Now it lies down beside
    you at night and won''t let go, firing in the quiet, bracing for danger that isn''t
    coming.


    You''ll come to recognize the false alarm for what it is: not a sign that you''re
    broken, and not a threat to outthink, but an old protector that doesn''t yet know
    the emergency is over. You''ll feel where it lives — the shoulders drawn up, the
    breath held high and shallow, the stomach clenched around nothing. And slowly,
    without forcing anything, you''ll learn to send your body a different signal:
    that this room is not the unit, that no one is coding, that it is allowed to come
    down off shift.


    This is not a protocol. There is no checklist to execute, no discipline to white-knuckle,
    no part of you to override. Nothing here will ask you to push through the fear
    or argue yourself out of it. We go the other way — toward the braced place, with
    warmth, until it softens on its own and the bed takes your weight.


    This book will not promise to fix you, because there is nothing in you that needs
    fixing. It won''t optimize your sleep or hand you one more thing to track and
    fail at. It will only help your body learn, breath by breath, that it is finally
    safe enough to set down the watch.


    You were trained to stay ready. No one ever taught you how to stop. You''re allowed
    to let the alarm fall quiet now. The night can hold this one without you.


    Book 1 of the Felt Sense Publishing sleep anxiety series.'
