title: The Person I Was Before the Job
subtitle: On mourning the energy, the ambition, and the self the work quietly used
  up — and learning what it means to let that version of you go
cover_tagline: You didn't lose your drive. You spent it. And no one told you it was
  running out.
description:
  short_blurb: Somewhere along the way, the work stopped giving back what it took.
    You can't find the person who used to care this much, and you're not sure you
    want them back. This is a book about the loss buried inside burnout, and what
    it asks you to finally release.
  long_description: 'There''s a particular kind of quiet that comes after the exhaustion.
    Not rest — something heavier. You look at the work you used to throw yourself
    into and feel almost nothing. The ambition that once pulled you out of bed has
    gone somewhere you can''t reach. And underneath it all is a grief you''ve never
    quite let yourself name: you miss who you used to be, and you''re afraid that
    person isn''t coming back.


    This book is for the manager who is mourning. Not a death anyone would recognize,
    but a real loss all the same — the loss of your own fire, your patience, your
    sense that the work meant something. The version of you that believed if you just
    gave enough, it would all be worth it.


    Most burnout books rush to restore you, to get you back to capacity, to return
    you to the race. This one will sit with you in the loss first, because the loss
    is real and it deserves to be felt.


    Here, you''ll come to recognize burnout as a kind of bereavement — grief for the
    energy that was spent and never replenished, for the years given to something
    that didn''t give them back, for the self who didn''t know to protect what it
    was pouring out. You''ll see how the numbness you feel isn''t emptiness but mourning,
    doing its slow work beneath the surface. And you''ll begin to understand the harder
    turn this grief eventually asks of you: not to win the old self back, but to let
    it go, so that someone quieter and more whole can take their place.


    This book will not promise to reignite your passion or restore your former productivity.
    It will not tell you that you''ll come back stronger, or that this was all secretly
    a gift. Some of what was lost is simply gone, and pretending otherwise only delays
    the grieving.


    What it offers is the company of a voice that understands. A way to let yourself
    mourn without calling it failure. The slow recognition that letting go of who
    you were is not giving up — it''s the only ground from which anything new can
    grow.


    You are allowed to grieve this. You don''t have to get the old self back to be
    whole. Let it rest. You can, too.


    Book 2 of the Stillness Press burnout series.'
