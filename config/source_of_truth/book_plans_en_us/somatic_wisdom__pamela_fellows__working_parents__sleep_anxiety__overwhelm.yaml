title: You Brought the Whole Day to Bed
subtitle: For the parent lying down already flooded — too much arriving at once, no
  room left to think, and sleep nowhere in reach
cover_tagline: You ran out of capacity hours ago. And here it all is, waiting in the
  dark.
description:
  short_blurb: You finally lie down, and the entire day comes with you — the lists,
    the worries, the everything-at-once that never had a moment to land. This is a
    somatic, trauma-informed companion for the flooded parent whose tank emptied long
    ago, and a slow way to let the day finish moving through your body so rest has
    room to arrive.
  long_description: 'You lie down, and it all comes with you. The unread messages.
    Tomorrow''s drop-off. The thing you forgot, the thing you said, the thing you
    still have to do. There was no pause between the last demand of the day and this
    moment — no gap where any of it could land and be done — so here you are in the
    dark, flooded, with too much arriving at once and no room left to think, let alone
    sleep.


    This book is for the parent who ran out of capacity hours ago and kept going anyway.
    All day, more keeps coming — needs and noise and decisions stacked on decisions
    — and there is never a pause wide enough to let any of it settle. By the time
    the house is quiet, your whole system is over the line: heart going, mind churning,
    skin almost too full to be touched. People call it stress. In your body, it feels
    like a flood with nowhere to drain, rising past the point where you can hold it
    and still rising.


    You''ll come to recognize that overwhelm is not weakness and not poor planning
    — it is a nervous system that took on more than any system was built to hold,
    with no time in between to let any of it move through. You''ll feel where the
    flood collects: the buzzing limbs, the shallow breath high in your chest, the
    sense of too-much pressing outward against your skin. And slowly, without adding
    one more task to the pile, you''ll learn to let the day move through and out of
    you — to find the ground beneath the flood and let your weight come down onto
    it, one breath at a time, until the water has somewhere lower to go.


    This is not a productivity system or a wind-down routine to perfect. There is
    nothing here to optimize, no better-managed evening to achieve, no calmer version
    of you that you are failing to be. Nothing in these pages will ask you to do more,
    hold more, or push through what is already too much. We won''t try to empty your
    mind by force. We''ll make room — the way the ground holds weight without straining,
    the way a wide field takes the rain — so the flood has somewhere to go and rest
    has somewhere to land.


    You are not failing because you couldn''t carry it all calmly. You carried more
    than was ever fair, for longer than anyone should, with no one beside you to hand
    it to. Let this be the place you finally get to set some of it down, and feel
    the ground take the weight you have been holding alone.


    Book 2 of the Felt Sense Publishing Sleep Anxiety series.'
