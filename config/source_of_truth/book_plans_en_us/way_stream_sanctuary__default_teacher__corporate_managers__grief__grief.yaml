title: 'Grief: The Weight You Carry'
subtitle: How Corporate Managers Are Rewriting the Rules of Grief
cover_tagline: You went back to work on Tuesday. The grief didn't get the memo.
description:
  short_blurb: Grief doesn't pause for your management responsibilities. You're running
    one-on-ones and approving budgets while something in you is broken open, and the
    company expects you back at full capacity. This is a book for the manager carrying
    a real loss through a job that has no language for it.
  long_description: 'You took the bereavement days. You came back. You sat down in
    the first meeting and someone said ''sorry for your loss'' and then immediately
    pulled up the roadmap, and you understood: the world expects this to be over now.
    So you nodded and you led the meeting. And the grief — which has no interest in
    your calendar — kept right on moving through you while you talked about Q3.


    This book is for the manager grieving in a place built to ignore it. Maybe it''s
    a parent, a partner, a friend. Maybe it''s a marriage, a pregnancy, a future you''d
    already half-built in your mind. Whatever it is, it''s real and it''s heavy, and
    you''re carrying it through standups and skip-levels and performance reviews while
    holding the unspoken belief that a good manager keeps their personal life out
    of the office. So you split yourself down the middle — competent on the outside,
    cracked open underneath — and the split is wearing you down faster than the grief
    itself.


    Three movements, and not one of them is closure. Recognition: you''ll learn to
    stop measuring your grief against what you think you''re ''allowed,'' and to name
    it at full size — even the parts that don''t make sense, even the relief mixed
    in with the loss. Descent: the part the workplace will never give you room for.
    Instead of managing your grief — scheduling it, containing it, keeping it professional
    — you go down into it. You let it be as big as it is. You stop trying to get to
    the other side on a timeline and let it move at the speed it actually moves. Integration:
    you come back up still carrying the loss, but no longer carrying it in secret,
    no longer spending half your energy hiding the crack.


    This is not a stages-of-grief worksheet. No five-step framework, no ''finding
    meaning in it'' so you can post about resilience, no quiet pressure to be done
    by some respectable date. Waystream won''t hurry you. And we are not going to
    tell you this loss is making you a wiser leader. Maybe it will and maybe it won''t
    — but that''s not the deal here. The deal is that you get to grieve like a human
    being who also happens to manage people.


    What you''ll get is plain language for the thing itself — words for what grief
    actually does in the body across an ordinary workday, and how to be with it when
    it ambushes you between meetings. You''ll learn the difference between healing
    and performing healing, between honoring a loss and being swallowed by it, between
    the grief and you.


    You don''t have to be over it to do your job. You don''t have to keep it out of
    the building. You''re allowed to set it down for the length of these pages — and
    you''re allowed to still be carrying it when you stand back up.'
