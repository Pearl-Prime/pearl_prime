title: Everyone Else Looks Like They Figured It Out
subtitle: For the student who measures their messy insides against everyone else's
  highlight reel and always comes up the one who's behind
cover_tagline: You're comparing your behind-the-scenes to their trailer.
description:
  short_blurb: Scroll, compare, feel behind, repeat. This is a book for the student
    who looks around the classroom and the feed and is certain that everyone else
    got a manual they never received. It won't help you win the comparison or finally
    come out on top. It will show you that the scoreboard you've been losing on was
    never measuring your worth in the first place.
  long_description: 'You look up, and everyone else seems fine. They have the friends,
    the grades, the skin, the confidence, the plan. They post like life is easy and
    walk the halls like they belong. And you''re standing there doing the math — them
    versus you — and the math always comes out the same. Behind. Less. Not quite.


    This book is for you — the student whose mind never stops measuring. You compare
    your insides to everyone else''s outsides, your hard days to their best photos,
    your private doubt to their public ease. You scroll and feel it get worse, and
    you scroll anyway. You walk into a room already ranking yourself, and you almost
    always lose. Not because you''re actually behind, but because you''ve aimed something
    sharp and accurate-feeling at exactly the wrong place: yourself, held up against
    a highlight reel that nobody could ever match.


    Here''s what you''ll start to recognize. Comparison feels like information, but
    it''s mostly a trick of angles. You only ever see the trailer of other people''s
    lives, never the bloopers, never the 2am. The classmate who looks like they figured
    it out is doing their own version of this math in their own head. And the version
    of you that you keep judging — the one who''s trying, who''s unsure, who''s still
    becoming — is not the loser of the contest. It''s just the only honest thing in
    the room.


    This book will not help you win. It won''t make you the one everyone else compares
    themselves to, and it won''t hand you a trick for finally feeling ahead. There''s
    no hustle here, no ''manifest your best self,'' no toxic shine. Nothing in here
    will help you come out on top of the comparison, because the comparison was never
    real. That''s the point. Your worth isn''t a ranking, and it was never up for
    a vote.


    What it offers instead is a way to step out of the scoreboard entirely. To stand
    in the doorway of who you''re actually becoming — not the polished one you''d
    need to win, just the real one — and walk through without checking whether you''re
    winning. You can''t lose a game you stopped agreeing to play.


    You are not behind. You are not the math. And the people who look like they figured
    it out are just better at the angle.


    Book 2 of the Threshold Books self worth series.'
