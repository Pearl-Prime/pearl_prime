title: It Was Never You That Needed Fixing
subtitle: The over-preparing, the over-apologizing, the bracing to be seen — a tender
  hand for the early-career woman whose anxiety hides a quiet belief that she herself
  is the flaw
cover_tagline: You don't fear being caught out. You fear being seen as you already
  believe you are.
description:
  short_blurb: 'Underneath the deadlines and the over-preparing is a quieter fear:
    that if anyone looked closely enough, they''d find the flaw you''ve spent your
    whole life covering. This is a book for the woman whose anxiety is really shame
    in disguise, written to help her set down the defect she''s been sure she carries.'
  long_description: 'Long before the meeting, you''re already rehearsing. Before the
    message sends, you''ve read it five times. You over-prepare, over-deliver, over-apologize
    — and underneath all of it runs a current so old you''ve stopped noticing it''s
    there: the conviction that there is something wrong with you, something the over-functioning
    is meant to hide. The anxiety you feel before being seen isn''t really about the
    task. It''s the fear that this will be the moment they finally notice.


    This book is for you: the one who reads competence as the price of being allowed
    in the room, who experiences a compliment as something to deflect before it''s
    withdrawn, who has built an entire capable life on top of a belief she''s never
    said out loud — that she is, at the root, not enough, and only hard work keeps
    the secret. You are not vain for caring this much. You are not broken. You learned,
    somewhere far back, that love had conditions, and you''ve been meeting them ever
    since with everything you''ve got.


    Here, you''ll come to recognize the shame underneath the anxiety for what it is
    — not a fact about you, not a flaw to be managed harder, but an old verdict you
    absorbed before you were old enough to question it. You''ll see how the overworking,
    the perfecting, the bracing-to-be-seen all grew up around that single buried belief
    like scar tissue around a splinter. You''ll learn what it feels like to bring
    the hidden part into the light of an unguarded moment and find that it is not
    a defect at all — only a tender, ordinary place that has never once been met with
    warmth. And warmth, it turns out, is the only thing shame cannot survive.


    This book will not hand you affirmations to recite into a mirror, or a confidence
    routine, or the promise that you''ll wake up one day finally sure you''re enough.
    You can''t out-perform shame; performing is how it keeps you. What''s offered
    here is something quieter and harder to fake: the experience of letting the thing
    you''re most sure is wrong with you be seen, gently, and not turned away from.


    You don''t have to fix yourself to be worthy of staying in the room. You were
    never the problem you''ve been working so hard to cover. Let the hand that''s
    been hiding it open. There''s nothing there that warmth can''t hold.


    Book 4 of the Heart Transmission Press anxiety series.'
