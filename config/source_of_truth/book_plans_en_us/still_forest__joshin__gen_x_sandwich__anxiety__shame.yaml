title: The Crack You Keep Covering
subtitle: For the one who is sure that everyone else is fine and the problem is them
  — meeting the quiet belief that you are the thing that's wrong
cover_tagline: You're convinced the flaw is you, and you've spent a lifetime hiding
  it.
description:
  short_blurb: 'Underneath the anxiety is a quieter, older belief: that something
    is wrong with you, and you must never let it show. This is a book for the part
    of you that has been hiding a crack you were sure was a fault line, and a slow
    walk toward setting the cover down.'
  long_description: 'It lives underneath everything, so familiar you have stopped
    noticing it: the quiet, bone-deep certainty that something is wrong with you.
    Not with your life — with you. That if people really saw the anxious, scrambling,
    never-quite-enough person behind your competence, they would finally understand
    what you have always known. So you cover it. You overwork, over-give, over-prepare.
    You are the most reliable person anyone knows, and you are exhausted from holding
    the cover in place over a crack you are certain is a fault line running straight
    through your center.


    This book is for you: the one who holds it all together precisely because you
    are so afraid of what would show if you didn''t, the caretaker who cares for everyone
    partly to outrun the suspicion that you are, underneath it all, the defective
    one. You are not. But you have believed it so long that the belief feels like
    simple fact, and the anxiety has become the sound of you working, endlessly, to
    keep it hidden.


    Walk slowly here, and you will come to recognize something. That the shame is
    not the truth about you — it is an old wound wearing the mask of truth, learned
    so early you mistook it for your own face. You will learn what the forest knows
    about what falls to its floor: that nothing landing there is judged. The fallen
    branch, the rotting leaf, the broken thing — the forest floor receives all of
    it without a flinch and makes ground of it. You will begin to feel what it is
    to bring the hidden, ashamed part of yourself into that kind of quiet, where it
    is not fixed and not hidden, only finally allowed to be seen.


    This is not a book about self-improvement. It will not help you become a better,
    more polished, less anxious version of yourself so that you finally measure up.
    There is no work here to do, no flaw to correct, no version of you to earn. It
    will not promise that the shame will dissolve the moment you read the last page.
    What it offers instead is gentler and more radical: a clearing where you can stop
    covering the crack long enough to discover it was never the fault line you feared,
    and that the light has been coming through it all along.


    Nothing here will help you fix what you think is wrong with you. There is nothing
    to fix, and trying to fix it is how the shame keeps you running. The point is
    to stop hiding from the forest, which was never looking for a reason to turn away.


    You are not the flaw you have been covering. You are the one who has been carrying
    it alone for far too long. You are allowed to set it down where something can
    hold it.


    Book 4 of the Still Forest Press anxiety series.'
