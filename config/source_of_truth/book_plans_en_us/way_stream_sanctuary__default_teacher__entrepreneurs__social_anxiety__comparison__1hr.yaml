title: 'Social Anxiety: Beyond the Highlight Reel (2)'
subtitle: A Real Talk Guide to Social Anxiety for Entrepreneurs
cover_tagline: Everyone else looks like they have it figured out. You're comparing
  your behind-the-scenes to their press release.
description:
  short_blurb: Every founder on your feed looks calmer, further along, more certain
    than you feel. You measure your messy inside against their polished outside and
    come up short every time. This is comparison — and it's lying to you with a curated
    dataset. This book takes you behind the reel and back to your own ground.
  long_description: 'You open the feed and there they are: the founder who just raised,
    the one whose launch went clean, the one who seems to move through rooms like
    none of this costs them anything. And something in you sinks. You''re working
    twice as hard for half the calm. Everyone else got the manual. You''re the only
    one improvising, the only one this scared, the only one whose insides don''t match
    the room. You know, intellectually, that you''re comparing your behind-the-scenes
    to their highlight reel. It doesn''t help. The sinking happens anyway.


    This book is for the founder who can''t stop measuring. The one who walks into
    the demo day, the investor dinner, the peer group, and immediately starts ranking
    — who''s further along, who''s more polished, who looks like they belong here
    in a way you''re sure you don''t. Comparison is the engine of your social anxiety:
    not fear of people exactly, but fear of how you stack up against them, certain
    you''ll come out underneath.


    We begin by naming it exactly — the specific moment the measuring starts, the
    felt drop when you lose the comparison, the way a founder''s world (public raises,
    public launches, public everything) hands you an endless supply of curated outsides
    to lose against. Then we go down into it. Not to defeat comparison with logic,
    not to remind yourself that everyone struggles, but to feel the sinking fully
    and see what it''s actually made of: an old habit of locating your worth out there,
    in the gap between you and someone else, instead of in here. You''ll see how the
    reel is built — selected, staged, survivor-biased — and how your anxiety treats
    it as a fair fight. And you''ll find your way back to your own ground, the only
    place the measuring can''t reach.


    This is not a self-esteem program or a digital detox. There''s no gratitude practice
    to make you content with your lane, no reframe that turns their win into your
    inspiration by the final page. This book will not optimize your confidence or
    promise you stop noticing what others have. It won''t make the feed less polished.
    What changes is that you stop mistaking the highlight reel for the whole film,
    and you stop using it to measure yourself. You learn to feel the comparison start
    and decline the contest, to stand on your own ground while everyone else''s looks
    better lit.


    You were never behind. You were looking at the wrong scoreboard. You get to put
    it down.


    Book of the Brave in the World — for Founders (One-Hour) series.'
