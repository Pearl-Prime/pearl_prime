cover_tagline: The part of you that scans the room never clocks out.
description:
  short_blurb: You watch everything — the monitor, the door, the patient's color,
    your own performance — and the watching follows you home. This is a real-talk
    guide for nurses on living with a hypervigilant mind that never stands down, and
    how to watch your thoughts without drowning in them.
  long_description: 'You notice everything. The subtle change in breathing before
    the alarm goes off. The family member who''s about to escalate. The supply that''s
    running low, the colleague who''s off today, the thing nobody else caught. On
    shift, that radar is the whole job. The problem is it doesn''t have an off switch
    — so it follows you to the break room, the car, the bed, where it turns inward
    and starts watching you.


    This book is for the nurse who is always on guard. Hypervigilance isn''t a flaw
    in you; it''s what the floor built. When missing a sign can mean someone codes,
    your mind learns to scan constantly, to never fully relax, to treat every quiet
    moment as the calm before something. But that watcher doesn''t know the shift
    is over. So it keeps scanning your own thoughts, your own choices, your own body,
    looking for the threat — and finding ''evidence'' everywhere, because that''s
    its job.


    The recognition: you are not your thoughts, and you are not even the watcher.
    You''re the one aware of both. The hypervigilant mind feels like you because it''s
    been running so long, but it''s a function — a smoke detector wired to stay on
    — not the whole of who you are. Once you can see the watcher instead of being
    fused to it, it stops being the only voice in the room.


    We go down into the watching itself. You''ll learn to observe the hypervigilant
    mind doing its thing — there it goes, scanning, flagging, bracing — without being
    pulled under by every thing it surfaces. That''s the line this book walks: watching
    your thoughts without drowning in them. Standing far enough back that the scan
    keeps running but no longer runs you. That''s the descent, and the integration
    is a strange relief: the watcher stays on, because it has to, but you''re no longer
    trapped inside it.


    This is not a cure for vigilance, and it shouldn''t be. The radar that exhausts
    you is the same one that saves lives. There''s no meditation quota here, no command
    to ''be present,'' no promise that you''ll someday feel relaxed and unbothered.
    This is about finding the place to stand so the watching doesn''t consume you.


    You''ve spent your career watching over other people. You''re allowed to watch
    your own mind the same way — with steady attention, without going down with every
    alarm it raises. The thought that won''t leave is just the watcher doing its job.
    You can let it work and still come up for air.'
