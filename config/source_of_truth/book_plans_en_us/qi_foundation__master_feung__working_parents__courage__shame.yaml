title: The Wrong Parent for This Child
subtitle: For the parent who secretly believes they're the one their kid got stuck
  with — courage as the willingness to be seen, flaws and all
cover_tagline: Everyone says you're a good parent. You're sure you've got them all
  fooled.
description:
  short_blurb: You watch the parents who seem to do it naturally and you feel the
    gap — the patience you don't have, the calm you can't fake, the certainty that
    somewhere a better version of you would have done this right. This is a book for
    the parent who carries a quiet, private verdict that they are the wrong one for
    the job, and who overworks every day to make sure no one finds out.
  long_description: 'Someone tells you you''re a good parent and you smile and say
    thank you and feel, underneath it, like a fraud. Because you know what''s in there.
    The patience you ran out of by Tuesday. The moment you wanted to be anywhere else.
    The way the other parents seem to do this from some steady place you''ve never
    once stood on.


    Somewhere along the way you reached a private verdict: that of all the people
    this child could have gotten, they got you — and that''s the flaw at the center
    of their life. You''ve never said it out loud. You overwork to make sure no one
    ever has to.


    This book is for the working parent who carries shame like a second job. The one
    who isn''t afraid of doing the wrong thing so much as being the wrong thing —
    the defect at the root that no amount of doing can fix. You cover it with effort.
    You volunteer for the thing, pack the perfect bag, never let them see you flinch,
    because if you do enough then maybe no one will look closely enough to see what
    you''re sure is there.


    Here you''ll come to recognize the shame for the imposter it is — not a fact about
    you, but an old belief that learned to wear your voice. You''ll see how it hides
    in the body: the shoulders that never drop, the breath held high in the chest,
    the deep ground you''ve never let yourself stand on because some part of you decided
    you hadn''t earned it. You''ll learn what it feels like when that buried verdict
    finally gets met with something other than more effort — when the root, the part
    you''ve been hiding, turns out to be the part that was never broken at all. Vitality
    doesn''t come from covering the flaw. It rises from the place you stopped defending.


    This book will not promise to make you the parent in the photos. It won''t optimize
    your performance or hand you a way to finally earn the love you already have.
    It won''t tell you the shame is irrational and then leave you alone with it. There
    is no fix here, because there was never anything to fix.


    What you''ll find is the quietest courage there is: to be seen. To let the child
    you''re so afraid of failing look straight at the real you — tired, imperfect,
    present — and to let that be enough. Not the parent you think you should have
    been. The one who stayed.


    You are not the wrong parent for this child. You''re the one who showed up, scared
    they weren''t enough, and showed up anyway. Let them see you. Let yourself come
    home to the ground.


    Book 3 of the Root & Meridian Press courage series.'
