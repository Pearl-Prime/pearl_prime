title: The Crack You're Sure the Light Shows Through
subtitle: For the founder convinced there's a flaw in them the next failure will expose
cover_tagline: 'You built the whole company to keep one secret: that something is
  wrong with you.'
description:
  short_blurb: You're convinced there's a flaw at the center of you, and you've built
    a business loud enough to keep anyone from seeing it. This is a book for the founder
    who works not to win but to stay ahead of being found out. It won't tell you to
    believe in yourself harder. It will sit with the part of you that never thought
    you were enough, and warm it.
  long_description: 'There''s a feeling you carry into every meeting, every pitch,
    every 1:1, and you''ve never said it out loud because saying it would make it
    true. The feeling is that something is wrong with you. Not your strategy. You.
    And the whole enterprise you''ve built — the hours, the standards no one asked
    for, the smile you put on when you''re hollowed out — exists to keep that flaw
    covered, to stay one step ahead of the day someone looks closely and sees what
    you''re sure is there.


    This book is for that founder. The one who reads their own wins as luck and their
    own losses as proof. The one who can''t accept the compliment because the compliment
    was given to the version of you that''s still hiding something. The one who is
    exhausted not by the work but by the covering — the second job, the unpaid one,
    of making sure no one ever catches the defect at the center of you.


    You''ll come to recognize the shape of it. How shame doesn''t shout; it whispers,
    in your own voice, that you got away with it again. How it turns a missed number
    into a character verdict. How it makes you overwork, over-deliver, over-apologize,
    all to outrun a sentence that was handed to you long before this company existed.
    You''ll see how often the thing you''re so sure is broken in you is the very place
    you''re most tender, most human, most worth tending.


    This book will not hand you back to yourself fixed. There is no protocol here,
    no morning routine that finally makes you enough, no reframe that optimizes the
    shame away. It will not tell you the flaw isn''t real and it will not tell you
    to push through it. It will do something quieter and harder: it will sit beside
    the part of you that never believed it belonged, and it will not flinch.


    You don''t have to earn your way out of this. You don''t have to perform your
    worth for one more quarter, or build one more thing to prove the bad thing wrong.
    You''re allowed to be a person whose value was never on the table to begin with
    — even on the days the business is failing, even on the days you are sure you
    are too.


    Let the covering rest. There''s an ember under all that ash, and it was never
    the flaw. It was you.


    Book 1 of the Ember & Ash Publishing self-worth series.'
