title: The 2am Cascade
subtitle: For the parent whose one small worry becomes a thousand by morning — courage
  as the choice not to follow the thought all the way down
cover_tagline: It started as a forgotten lunch. By 2am it was proof you're ruining
  them.
description:
  short_blurb: It begins with one thing — a comment from the teacher, a tantrum you
    handled badly, a screen-time line you keep crossing. By the time the house is
    dark and quiet, that one thing has branched into every way you might be failing
    them, all the way out to a future you can already see going wrong. This is a book
    for the parent who lies awake while a single worry teaches itself to multiply.
  long_description: 'It starts small. A look the teacher gave you at pickup. The way
    you snapped in the car. One thing — and you could almost let it go, except it''s
    2am now and the house is dark and your mind has found the loose thread and started,
    quietly, relentlessly, to pull.


    By the time the window goes grey you''ve followed that one worry through every
    branch it has: this means they''ll struggle, which means you missed the signs,
    which means you''re the parent who didn''t notice, which means — and on, and on,
    each thought feeding the next, the whole thing gathering speed in the dark.


    This book is for the working parent who spirals. The one who can trace a single
    ordinary moment all the way out to catastrophe and back, who knows the cascade
    by heart because they''ve ridden it a hundred nights. You''re not careless. You''re
    the opposite — so careful, so braced to catch the one thing you might miss, that
    your own mind has turned against you and made the watching into a fall.


    Here you''ll come to recognize the spiral as a shape, not a truth — the way one
    worry recruits the next until the pulling feels like thinking. You''ll see how
    the descent lives in the body before it lives in the words: the tightening, the
    shallow breath, the held ground that never lets the sap settle back down. You''ll
    learn what it feels like to step off the thread — not to win the argument with
    your own fear, but to let the breath reach the bottom of the lungs again and feel
    the floor come back underneath you. The well refills from below, in silence, when
    you finally stop bailing.


    This book will not promise you a quiet mind on demand. It won''t optimize your
    thinking or hand you a technique to never spiral again. It won''t tell you the
    worries are foolish — some of them are love wearing its most exhausting face.
    There is no fix here, and you don''t need one.


    What you''ll find is the courage the spiral was hiding: not the strength to stop
    the first thought, but the steadiness to not follow it down. To let one worry
    be one worry. To lie in the dark, afraid, and keep your roots in the ground while
    the branches do what branches do.


    You are not ruining them. You''re a parent whose care got loud in the quiet. It''s
    allowed to rest now, all the way down, until morning.


    Book 2 of the Root & Meridian Press courage series.'
