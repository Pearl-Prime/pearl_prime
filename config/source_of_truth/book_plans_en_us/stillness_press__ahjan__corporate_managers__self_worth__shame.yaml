title: The Part of You That Never Measures Up
subtitle: For the manager who delivers, leads, and over-performs — and still carries
  the quiet certainty that something is wrong with them
cover_tagline: The covering can come down now.
description:
  short_blurb: 'There is a belief you''ve carried so long you mistake it for the truth:
    that something is wrong with you, and that if anyone saw it clearly, the whole
    thing would come apart. So you''ve spent a career covering it — out-working, over-preparing,
    never letting the seam show. This book is for the moment you''re finally tired
    enough to set the covering down.'
  long_description: 'You are good at your job. People rely on you. And still, underneath
    all of it, there is a low and constant hum that says something is wrong with you
    — not with your work, with you — and that one day the right person will see it.


    So you cover. You over-prepare for the meeting you could lead in your sleep. You
    answer the message at 11pm so no one can call you slow. You take the blame quickly
    and the credit never, because being found out feels worse than being overlooked.
    From the outside it reads as drive. Inside, it has always felt like hiding.


    This book is for the high-performing manager who has built an entire career on
    top of a single buried conviction: that they are, at the root, not quite enough
    — and that the work is what keeps that defect out of sight. It is for the one
    who feels like an imposter in a corner office, who cannot take a compliment without
    bracing for the correction, who has confused exhaustion for integrity.


    You''ll come to recognize how shame actually moves through a working life. How
    it disguises itself as high standards. How it makes you read a neutral face as
    a verdict. How it turns one piece of feedback into evidence of everything you''ve
    always feared about yourself. How the very competence everyone praises became
    the wall you''ve been hiding behind — so well that even you forgot there was a
    person back there.


    This book will not fix you, because you are not broken. It will not optimize your
    mindset or hand you a morning routine to perform your way to self-worth — that''s
    just the old hiding in a calmer outfit. It won''t promise that the feeling disappears.
    What it offers instead is slower and more honest: a place to stop, to set down
    the covering for a few pages, and to feel — maybe for the first time in years
    — that the worth you''ve been trying to earn was never actually withheld.


    The defect you''ve been overworking to hide was never the truth about you. It
    was a story you learned young and have been over-qualifying for ever since.


    You can let the meeting end. You can let yourself be seen, plainly, and survive
    it. There is nothing here to prove, and there never was.


    Book 1 of the Stillness Press self worth series.'
