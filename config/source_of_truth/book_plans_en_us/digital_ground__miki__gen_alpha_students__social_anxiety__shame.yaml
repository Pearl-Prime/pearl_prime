title: The Part You'd Never Post
subtitle: For the high schooler who's sure something is wrong with them — and has
  spent years performing okay so nobody finds out
cover_tagline: You're not afraid of the room. You're afraid of what it'll see.
description:
  short_blurb: Somewhere along the way you decided the problem was you. Not the situation,
    not the nerves — you, specifically, at the core. So you perform. You curate. You
    stay a little quiet so the wrongness doesn't show. This is a book for the part
    of you that you've never let anyone see.
  long_description: 'It''s not really the party you''re afraid of. It''s that if you
    go, and you say the wrong thing, and your face does the thing it does, people
    will finally see it — the part of you you''ve been sure was wrong your whole life.
    So you stay quiet. You keep the camera off. You let people have the curated version
    because the real one feels like a defect you have to keep covered.


    This book is for the high schooler who decided, somewhere back there, that the
    problem wasn''t the situation — it was them. Not their nerves, not a bad day.
    Them, at the center, fundamentally. You''ve spent years building a version of
    yourself good enough to pass, and you''re exhausted from the performance, and
    the worst part is you can''t even tell anyone, because telling them would mean
    showing them the thing you''re hiding.


    You''ll come to recognize how shame disguises itself as social anxiety. The over-apologizing.
    The replaying of one awkward sentence for three days. The way you''d rather people
    think you''re cold than risk them seeing you try and fail. You''ll see how the
    belief that something''s wrong with you isn''t a fact you discovered — it''s a
    story you absorbed, young, before you had any way to argue back. And you''ll feel
    the difference between hiding a defect and protecting something tender that was
    never defective in the first place.


    This won''t fix you, because you were never the thing that needed fixing. There''s
    no chapter that makes you into someone with nothing to hide. Nobody here is going
    to tell you to love yourself, or build your confidence, or treat you like a personal
    brand with a visibility problem. That''s not what this is.


    What''s here is the slow undoing of one specific lie: that the realest part of
    you is the part that has to stay buried. You''ll still flinch. The shame won''t
    evaporate. But you''ll start to catch it in the act — naming it, instead of believing
    it — and the thing you were so sure you had to cover will start to look, from
    the inside, a lot more like a person than a flaw.


    The part you''d never post was never the problem. You just learned, too early,
    to keep it in the dark.


    Book 2 of the Present Tense Books social anxiety series.'
