title: The Fraud You're Sure You Are
subtitle: For the manager certain they don't belong in the room — when the anxiety
  is really a hidden belief that something is wrong with you
cover_tagline: You're not afraid of the work. You're afraid they'll find out about
  you.
description:
  short_blurb: 'Underneath the long hours and the over-preparing is a quieter fear:
    that you don''t actually belong here, and one day they''ll see it. This is a book
    for the manager whose anxiety is really shame in a suit — the buried belief in
    a personal defect, covered by relentless work. It won''t tell you to think positive.
    It will gently separate what you do from the verdict you''ve passed on who you
    are.'
  long_description: 'You over-prepare for the meeting nobody else prepares for. You
    answer the email at 10pm so no one can say you were slow. You take the feedback
    like a blow to the body, not the work. And underneath all of it runs a current
    you rarely say out loud: that you don''t really belong in this role, that you''ve
    somehow fooled everyone, and that it''s only a matter of time before they see
    what you see.


    This is not anxiety about the work. This is shame — the buried belief that something
    is wrong with you — wearing the work as its cover.


    This book is for the manager who looks, from the outside, entirely competent,
    and who privately suspects it''s all a performance one slip from collapse. You''re
    not afraid of the deadline. You''re afraid of being found out. So you overwork,
    because the work is the thing that keeps the defect hidden, and exhaustion feels
    safer than exposure. You feel it as the flinch when your name is mentioned, the
    certainty that the praise was a mistake, the way one piece of criticism can outweigh
    a year of doing well.


    Here you''ll come to recognize shame''s quiet architecture — how it convinces
    you the problem isn''t your work but you, how it turns achievement into mere evidence-gathering
    against an exposure that never comes, how it hides so well behind competence that
    no one, including you, calls it by its name. You''ll learn the difference between
    making a mistake and being one. And you''ll feel what it is to let yourself be
    ordinary in the room — not the fraud, not the prodigy, just a person doing the
    work — and to notice the ground is still there under you.


    This book will not coach you into confidence or hand you affirmations to recite
    until you believe them. It will not optimize your self-talk or turn your worth
    into a project to complete. There is no version of you that finally earns the
    right to belong by working hard enough — that bargain was rigged from the start.
    The shame is not a truth about you to overcome through performance; it''s an old
    verdict that was never accurate, and it deserves to be seen rather than outrun.


    What it offers is something quieter than confidence: the slow, steadying separation
    of what you do from who you are. When the defect you''ve been hiding turns out
    not to exist, there is nothing left to cover. And the hours you spent covering
    it come back to you.


    You are allowed to belong here without first becoming flawless. You are allowed
    to be seen and stay in the room.


    Book 4 of the Stillness Press anxiety series.'
