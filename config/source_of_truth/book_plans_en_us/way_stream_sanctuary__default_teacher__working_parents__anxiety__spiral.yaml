title: 'Anxiety Relief: Escaping the Mental Loop (3)'
subtitle: The Overthinking Spiral — Anxiety for Working Parents (Breaking the Thought
  Loop)
cover_tagline: One worry walks in. Ten minutes later you've planned the funeral. This
  is how the spiral works, and how to step off it.
description:
  short_blurb: A single thought walks in and minutes later you've followed it all
    the way to catastrophe. This is a guide for working parents rewriting the rules
    of anxiety relief by learning the spiral's mechanics. It won't tell you to just
    stop overthinking. It'll show you where the spiral starts and how to get off before
    it takes the whole night.
  long_description: 'It starts so small. Your kid has a cough. That''s it. That''s
    the whole thing. But by the time you''ve put them to bed you''ve followed the
    cough through pneumonia, the ER, the missed work, the boss who''s already annoyed
    with you, the job you''ll lose, the life that comes apart. One thought walked
    in and your mind built a thousand more on top of it, each one feeding the next,
    until you''re lying awake at midnight three disasters deep over a cough that''s
    already gone.


    This book is for the working parent whose mind spirals. The one for whom a single
    worry is never a single worry, it''s a doorway, and you always walk through, and
    the room on the other side is always on fire. You''re not crazy. You''re not overthinking
    because you''re weak-willed. Your mind has learned a pattern, a fast, well-worn
    track from one small thing to total catastrophe, and it runs that track automatically,
    usually at the exact moment you most need to sleep.


    You''ll learn to name it the instant it begins: this is a spiral. Not just a thought,
    a spiral, that recognizable mechanism where each thought hands off to a worse
    one. Catching it early, naming the pattern instead of arguing with each individual
    fear, is most of the battle, because you cannot out-reason a spiral one thought
    at a time, there''s always a next one. Naming it won''t stop the first thought
    from arriving, and this book won''t pretend it can.


    Then you go down, not down the spiral, but into what''s underneath it: the unbearable
    feeling of not being able to control whether the people you love are safe. The
    spiral is what your mind does instead of feeling that. So you''ll learn to turn
    toward the helplessness the thoughts are covering, to let it be there without
    immediately generating the next worst-case to escape it. The spiral loses its
    fuel when you stop running from the feeling at its center.


    And you come back changed. Not free of anxious thoughts, this book won''t promise
    a quiet mind. Changed in that a thought can arrive without becoming a thousand.
    You notice the track, you feel the pull, and you don''t have to ride it all the
    way down. The cough stays a cough. The night stays yours.


    This book will not teach you to stop overthinking, control your mind, or shut
    the thoughts off. That''s not possible and chasing it is part of the trap. What
    it offers instead is a way to step off the spiral while it''s turning, to let
    the first thought be the only thought. You are allowed to have a worried mind
    and not follow it into the fire every time. One thought is just one thought. You
    don''t have to build the thousand.'
