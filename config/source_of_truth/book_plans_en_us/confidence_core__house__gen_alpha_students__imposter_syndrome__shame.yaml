title: They're Going to Find Out About Me
subtitle: For the high-achieving student who reads every A as a near-miss, overprepares
  so no one catches them, and is sure the real them is one ordinary day from being
  exposed
cover_tagline: You built the whole disguise around a secret that was never true.
description:
  short_blurb: 'You did the work, you got the grade, and somewhere underneath it sits
    the quiet certainty that you fooled them all and the real you is about to be exposed.
    This is a book for the student who treats every success as evidence they got away
    with something. It won''t tell you that you''re amazing. It will tell you the
    truth: the defect you''ve been hiding was never there.'
  long_description: 'It usually arrives right after something good. You get the acceptance,
    the A, the nod from a teacher you respect — and instead of pride, a cold door
    swings open in your chest. They''re going to find out. Not about a mistake. About
    you.


    This book is for the student who has built an entire life around a secret: that
    underneath the grades and the polish, something is fundamentally wrong with you,
    and one day everyone will see it. You overprepare so no one catches you off guard.
    You laugh first so no one laughs at you. You read praise as proof you''ve gotten
    away with something again. You rehearse for the moment the floor drops out. And
    the strangest part is that none of it makes you feel safer — the better you perform,
    the more there seems to be to protect, and the more certain you become that you
    are one ordinary day away from being seen through. You''re exhausting yourself
    maintaining a person you''re terrified isn''t real.


    You''ll come to recognize how shame runs underneath all of it, quiet and constant.
    How the mask you wear to seem fine becomes the thing you can''t put down. How
    the cost of hiding shows up in your shoulders, your sleep, the way you can''t
    take a compliment without flinching. You''ll meet the belief sitting at the bottom
    of it — the buried I''m-not-enough you''ve never said out loud — and you''ll get
    to stand in front of it instead of running. Not to argue with it. Not to fight
    it. To look at it long enough to see that it was never the truth about you. It
    was a doorway you got stuck standing in, mistaking the threshold for the whole
    house.


    This is not a book that hands you affirmations to repeat in the mirror. It will
    not tell you to fake confidence until it''s real, or that you''re secretly brilliant
    and just need to own it. That kind of talk only adds another layer to the disguise.
    There is no fixing yourself here, no five steps to becoming impressive, because
    you were never broken to begin with. What''s here is steadier and quieter than
    that: a way to set down the weight you''ve been carrying to keep yourself covered,
    and find out that the person standing in the doorway — the one you were so sure
    wasn''t good enough — is the one who was real the whole time.


    You don''t have to earn your way out of this. You don''t have to perform your
    way to worthy. The door was never locked. You only have to cross.


    Book 1 of the Threshold Books imposter syndrome series.'
