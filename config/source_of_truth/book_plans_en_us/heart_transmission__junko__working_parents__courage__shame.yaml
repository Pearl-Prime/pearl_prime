title: A Braver Parent Wouldn't Be This Scared
subtitle: For the working parent who hides how frightened they are — and overworks
  to cover the belief that something is wrong with them
cover_tagline: You smile, you cope, you carry it all. No one knows you're terrified.
  You think that's the proof.
description:
  short_blurb: Somewhere along the way you decided that a good parent, a capable one,
    wouldn't be this afraid — so you hide it, and you overwork to cover it, and you
    stay small to keep from being found out. This is a book for the working parent
    carrying a secret shame about their own fear.
  long_description: 'No one knows. You hold it all together — the schedules, the meals,
    the brave face at drop-off — and underneath it runs a quiet, constant verdict:
    a real parent wouldn''t be this scared. A braver person would have spoken up by
    now. So you cover it. You overwork, you over-give, you stay small and agreeable,
    and you tell no one how often your courage fails you, because the fear feels less
    like a feeling and more like the truth about who you are.


    This is a book for the working parent carrying that buried shame. You are not
    broken, and you are not the only one. You''ve come to believe that needing courage
    is itself the flaw — that the fear is a defect to hide rather than a doorway to
    walk through. So you perform the capable version and grieve, privately, the braver
    one you think you should have been by now.


    Here, you''ll come to recognize the shame beneath the fear — the place where you
    stopped asking why am I scared and started believing what''s wrong with me. You''ll
    feel where the hiding lives in your body: the held breath, the bright voice, the
    work that never quite earns the rest you''re waiting for. You''ll see the old
    story that taught you to equate fear with failure. And you''ll feel something
    loosen as you learn the truth it has kept from you — that being afraid was never
    proof of a defect. It was only ever proof that you stood at the edge of something
    that mattered.


    This book will not give you a way to become fearless, or earn your way out of
    the shame by working harder, or finally fix the thing you''ve decided is wrong
    with you. Your tender, exhausted, over-covering heart was never a problem to solve.
    What''s offered is the opposite of the hiding: a hand held out to the part of
    you you''ve kept in the dark, and the slow warmth of being seen as you actually
    are — afraid, and still here, and braver than the story ever let you believe.


    You are allowed to be frightened and good at the same time. You are allowed to
    set it down. There is nothing wrong with you that courage was meant to cover.


    Book 3 of the Heart Transmission Press working parents courage series.'
