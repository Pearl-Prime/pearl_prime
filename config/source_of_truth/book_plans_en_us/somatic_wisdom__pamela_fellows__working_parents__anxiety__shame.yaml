title: The Good Parent They Don't Know You're Not
subtitle: For the working parent hiding a private verdict — when anxiety whispers
  that something is wrong with you, and you overwork to keep anyone from seeing it
cover_tagline: You're terrified they'll find out you're just holding it together.
description:
  short_blurb: 'Underneath the anxiety is a quieter, older belief: that something
    is wrong with you, and if you let up for a second, everyone will see it. This
    is a body-first companion for the parent who overworks to cover a defect they''re
    sure they''re hiding. It won''t tell you to love yourself harder. It will help
    you feel where the shame lives in your body — and let warmth back into it.'
  long_description: 'You said the sharp thing to your kid before school and you''ve
    been carrying it all day like a stone. Not just the moment — the meaning you made
    of it: that it''s proof. Proof of the thing you''ve always half-believed, that
    something in you is wrong, that you''re not the parent you''re supposed to be,
    that you''re a fraud holding it together with both hands and one day everyone
    will see. So you work harder. You overcompensate. You make sure no one ever catches
    you not coping. And the anxiety underneath it all is the alarm of someone guarding
    a secret defect.


    This book is for the parent who lives with that private verdict. Who reads ordinary
    struggle as personal failure. Who can take in any criticism as confirmation and
    no reassurance as true. Who is exhausted not only by the doing but by the hiding
    — the constant low effort of seeming fine. Who flinches at the word should. Shame
    isn''t the truth about you. It''s an old, heavy weather system you learned to
    live under, probably long before you were a parent, and it has been lying to you
    in your own voice. You are not the defect you''ve been covering. There is no defect.
    There is a tender place that got taught it was a flaw.


    Here you''ll come to recognize shame''s particular signature in the body — the
    heat in the face, the collapse in the chest, the way you want to fold inward and
    disappear. You''ll learn to meet that braced, hiding place not with more force
    but with warmth, the way you''d meet your own frightened child. You''ll feel what
    it is to stop overworking the cover story for a single breath, to let your body
    be seen by you, gently, without the verdict. Not to fix what''s wrong. To discover,
    slowly, in the body, that nothing is.


    This is not a method for becoming good enough. There''s no earning your way out,
    no fixing yourself, no mind over matter. We will not hand you affirmations to
    recite over a body that doesn''t believe them, and we will not pry open old wounds
    with no care for what spills out. Nothing here promises you''ll stop feeling the
    shame on command. The point is that you can stop believing it — and let a braced
    place finally warm.


    You are allowed to be a struggling, ordinary, good-enough parent and not a fraud.
    You are allowed to set the stone down. The shame will rise and the shame will
    ease, the way weather passes, and you can learn to bring warmth to the place it
    lives until that place stops feeling like a defect and starts feeling like you.
    You have nothing to hide. You never did.


    Book 4 of the Felt Sense Publishing anxiety series.'
