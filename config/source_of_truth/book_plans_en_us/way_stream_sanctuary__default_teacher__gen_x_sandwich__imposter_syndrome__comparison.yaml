title: 'The Seat You Earned: Measuring Yourself Against Everyone'
subtitle: How the Sandwich Generation Are Rewriting the Rules of Imposter Syndrome
cover_tagline: Everyone in the room seems sure they belong. You're sure you snuck
  in.
description:
  short_blurb: 'You scan the room and everyone looks like they earned their seat —
    except you, who somehow got in by accident and is one question away from being
    found out. This is a book about imposter syndrome as a comparison problem: you''re
    measuring your messy inside against everyone else''s confident outside, and losing
    every time.'
  long_description: 'You''re in the meeting, on the call, at the table you worked
    years to reach — and you''re doing the math. She sounds certain. He has the answer.
    Everyone here seems to belong in a way you don''t, like they got a confidence
    you missed the handout for. You''re convinced you''re the exception, the one who
    slipped through, and any minute now someone''s going to do the addition and realize
    you don''t add up.


    Here''s what''s actually happening: you''re comparing your private doubt to other
    people''s public surface. You can feel every hesitation in your own head. You
    can only see the polished outside of everyone else''s. That gap isn''t proof you
    don''t belong. It''s the oldest trick imposter syndrome plays.


    This book is for you — mid-career, mid-life, holding up a family on both ends,
    the one who finally earned the seat and can''t shake the feeling it was a clerical
    error. You''ve got real experience and a head full of people who supposedly have
    it more together. You measure yourself against their certainty and conclude you''re
    a fraud. You''re not. You''re comparing the wrong things.


    First, recognition: you''ll learn to catch the comparison the instant it fires
    — the look around the room, the silent ranking, the verdict that everyone else
    is real and you''re the imposter. Then you descend, because going down is the
    only way out. Not the surface sting of feeling like a fake. The thing under it
    — the belief that everyone else got an instruction manual for being a competent
    adult and you''ve been improvising the whole time. You sit in that instead of
    outrunning it. And you come back changed: the comparison still happens, but it
    no longer gets to decide whether you belong.


    This is straight talk, not a hype reel. No power poses. No worksheets. No "fake
    it till you make it," which just tells you to perform the confidence you''re already
    exhausted from faking. It will not promise to end the imposter feeling — that
    voice is practiced and won''t go quiet because you understand it. It will not
    turn you into someone who walks into every room certain she earned the chair.


    What it does is give you words for the move your mind makes — "I''m comparing
    my inside to their outside again" — right as it happens. The comparison fires,
    and you stop handing it the gavel.


    The seat was never a mistake. You''re allowed to belong here before you feel like
    you do.'
