title: Still Bracing for the Next Person Who Needs You
subtitle: For the helper who never clocks out inside — when your mind keeps scanning
  for whose crisis comes next, even at your own kitchen table
cover_tagline: You came home hours ago. Your mind is still on call.
description:
  short_blurb: You left work, but you never really left. Some part of you is always
    scanning — who is about to need something, what is about to go wrong, who you
    have not checked on. This is the book for the caregiver whose mind never goes
    off duty, even at her own table. It will not give you a sharper way to monitor
    everyone. It will help you understand why you cannot put the watching down, and
    what it would feel like to finally be off call in your own life.
  long_description: 'You are home. Dinner is on the table, the door is closed, no
    one has paged you in hours. And still some part of you is up in the watchtower,
    scanning. Who hasn''t texted back. Who seemed off today. What might go wrong tomorrow.
    Whose crisis is loading next. You are sitting at your own kitchen table and a
    quieter, tired part of you is still standing watch, the way it has learned it
    always must.


    This book is for you: the woman whose care for others turned into a kind of permanent
    surveillance. The nurse who reads every silence as a warning. The therapist carrying
    the caseload home in her chest. The manager, the friend, the daughter who cannot
    stop monitoring whether everyone around her is okay, because so much has felt
    like it was hers to catch. You are not paranoid and you are not controlling. You
    are exhausted from a vigilance that compassion fatigue installed and never turned
    off.


    Pull up a chair. We are going to look honestly at the watcher — the part of you
    that never clocks out, that scans the people you love for the next emergency,
    that mistakes hypervigilance for love. We will trace where she came from and why
    she will not sit down. We will talk about the toll of being on call inside your
    own life: the way you cannot be present at the table because you are bracing for
    what comes after it.


    Nothing here will sharpen your radar or help you catch more before it falls. There
    is no system for monitoring everyone more efficiently, no trick to keep more plates
    from dropping. This is not a manual for becoming an even better early-warning
    system for everyone else''s pain. It is a conversation about what it would mean
    to come down from the tower — to let the watch end, and to find out that the people
    you love can be okay without you scanning the horizon for them.


    You are allowed to be off duty. You are allowed to sit at the table without one
    ear on the next crisis. The world will not collapse because you finally stopped
    watching it for everyone. Take the chair. Let the watch end here.


    Book 3 of the Two Chairs Press compassion fatigue series.'
