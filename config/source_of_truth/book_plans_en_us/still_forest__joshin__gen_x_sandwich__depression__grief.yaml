title: All the Lives I Didn't Get to Keep
subtitle: For the midlife caregiver whose depression is really grief — for the parents
  fading, the years that went, and the self you set down to care for everyone
cover_tagline: Some of this heaviness was never depression. It was everything you
  weren't allowed to mourn.
description:
  short_blurb: 'Sometimes what looks like depression is grief that never had a place
    to go. This is for the Gen X caregiver mourning quietly in the middle of everything
    — a parent slipping away, the years that vanished into other people''s needs,
    the life you meant to live. It promises no closure and no moving on. It offers
    the forest floor: the patient ground that holds what falls and, in its own slow
    time, turns loss back into something that can root.'
  long_description: 'You didn''t notice when it started. There was no funeral for
    it. Just a slow accumulation — a parent who no longer remembers your name some
    days, a marriage that quietly changed shape, children who needed you so completely
    that the person you used to be got set down somewhere and never picked back up.
    You kept moving. You always keep moving. And somewhere along the way the moving
    started to feel like wading through gray water, and you called it depression,
    because depression was a word you had.


    But some of this was never depression. Some of it is grief — the unmarked kind,
    the kind no one brings a casserole for. The grief of a parent who is still alive
    but already leaving. The grief of years that went to other people. The grief of
    the life you imagined at thirty that quietly didn''t happen, and that you never
    let yourself mourn because there was always someone who needed dinner.


    This book is for you: the one in the sandwich, holding the old and the young while
    no one holds you. Generation X, competent and depended-upon, carrying losses you
    were never given permission to grieve out loud. You will come to recognize how
    much of the heaviness is sorrow that had nowhere to land — and how grief, denied
    a place, doesn''t disappear. It just goes gray and settles into the body and starts
    answering to a different name.


    Here, in the quiet of the trees, you will not be hurried toward closure. There
    are no five stages to march through, no acceptance to perform, no moving on that
    you owe anyone. The forest does not rush what is dying; it lets the leaf fall,
    and the floor receives it, and over a long patient season the loss becomes the
    ground that the next thing grows from. You will learn to let what fell, fall —
    and to trust that being held is not the same as being fixed.


    This book will not give you back what was taken. It will not promise that the
    grief ends, or that you come out the other side a brighter person. That is not
    what the forest does, and it is not what honest grief allows. What it offers instead
    is company in the mourning, and the slow recognition that you are allowed to put
    some of this down — that to release a thing is not to stop loving it.


    You are allowed to grieve, even here, even now, even while you keep caring for
    everyone else. Especially now.


    Book 2 of the Still Forest Press depression series.'
