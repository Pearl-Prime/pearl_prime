title: Something Was Lost in the Rush
subtitle: For the working parent carrying an unnamed grief — the loss underneath the
  anxiety, waiting under all the noise to finally be felt
cover_tagline: You're not anxious. You're grieving something you never had room to
  mourn.
description:
  short_blurb: Underneath the anxiety, something is missing — a loss you never had
    time to mourn. This is a book for the working parent carrying an unnamed grief
    in the body, and a way to let it move at last.
  long_description: 'Some nights it isn''t fear underneath the restlessness. It''s
    something heavier, quieter — a sense of something missing that you can''t quite
    name. The self you were before all this. The closeness you meant to keep. The
    version of this life you imagined, or the people and seasons that slipped past
    while you were holding everything together. You''ve been calling it anxiety because
    anxiety has a shape you can manage. But the body knows the difference, and the
    body has been waiting for you to feel what it''s actually carrying.


    This book is for the working parent carrying grief they never had room to mourn.
    The one who lost something — a person, a possibility, a former life — in the rush
    of providing and parenting and keeping on, and never got the pause to lay it down.
    The one whose anxiety, looked at closely, turns out to be loss with nowhere to
    go.


    Here you''ll come to recognize how unprocessed grief lives in the body and disguises
    itself as everyday dread. You''ll feel where the loss has settled — the heaviness
    in the chest, the ache behind the eyes you keep blinking back, the tightness that
    turns out to be held tears. You''ll learn that grief is not a problem to be solved
    but a movement that needs to be allowed; that what was never mourned doesn''t
    disappear, it waits, pressing up as restlessness until it''s finally felt. Not
    by getting over it. Not by being strong about it one more time. By making room,
    at last, for the body to grieve the way it has needed to all along — slowly, in
    waves, with nothing required of you but to let it move.


    This is not a book that will take the loss away or teach you to leave it behind
    on schedule. It will not optimize your grieving or hand you stages to complete.
    There is nothing here to get right, and no healed-over version of you who never
    has to feel it again.


    What it offers instead is recognition — a language for the grief beneath the anxiety
    that you can reach for the next time the heaviness rises, on the commute, after
    the children are asleep, in the quiet that finally lets the missing thing be felt.
    You''ll come to understand what your body has been carrying, and why, given all
    you never had time to mourn, it makes complete sense.


    Not fixed. Not finished. Just no longer alone with the loss, and a body allowed,
    at last, to let it move through.


    Book 6 of the Stillness Press somatic healing series.'
