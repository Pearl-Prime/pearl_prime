title: Too Much, All at Once
subtitle: For the early-career mind drowning in everything arriving at the same time
  — when there's no room left to even think
cover_tagline: It isn't that you can't cope. It's that it all came at once.
description:
  short_blurb: Seventeen tabs, four group chats, a to-do list that breeds overnight,
    and a feeling like the water is at your chin. This is a book for the moment when
    capacity is gone and there's no room left to think — when everything is urgent
    and you've stopped being able to tell what matters. You don't need to do more,
    faster. You need someone to help you find the surface.
  long_description: 'There''s a particular kind of full that has nothing to do with
    being busy. It''s the flood — when the messages and the deadlines and the unanswered
    things all crest at the same moment, and somewhere inside you a quiet voice just
    stops. You stare at the list and can''t pick a first thing. You open a tab and
    forget why. The room is loud even when it''s silent, because all of it is happening
    in you at once.


    This book is for you, somewhere in your twenties, carrying more than anyone can
    see — the job, the side thing, the texts you owe, the future everyone keeps asking
    about. For the one who looks organized and feels submerged. For the person who
    has so much arriving that there''s no space left over to feel like a person. You
    haven''t failed at handling your life. Your life simply asked for everything at
    once, and there is only one of you.


    Written the way a steady friend would talk you down — close, unhurried, never
    barking orders — these pages help you recognize overwhelm as its own distinct
    thing. Not laziness. Not weakness. A capacity that has been asked to hold more
    than any capacity can. You''ll feel the difference between the flood and the tasks
    underneath it. You''ll learn what it''s like to let the water level drop just
    enough to breathe, to put one thing down and then another, to discover that the
    room in you was never gone — only crowded. And you''ll feel what changes when
    someone simply sits with you in it, when the panic doesn''t have to be faced alone.


    This is not a productivity system. It will not hand you a method to fit more in,
    or teach you to optimize your overwhelm into output. There is nothing to hustle
    here. What you''ll find instead is gentler and more honest: permission to set
    things down, a way to find the floor beneath the flood, and the slow relief of
    being met as someone who is doing their best with far too much. There is room
    in you again — there was always going to be — once a little of the weight is passed,
    for a moment, into another pair of hands.


    You don''t have to carry all of it in the same breath. You''re allowed to take
    it one held hand at a time.


    Book 2 of the Heart Transmission Press anxiety series.'
