title: Your Heart Is Loud and Nothing Is Wrong
subtitle: For the teen whose body sounds the alarm before they've said a single word
  — when raising your hand feels like stepping off a cliff
cover_tagline: The alarm is real. The danger isn't. You can move anyway.
description:
  short_blurb: Your hand is halfway up and your whole body slams the brakes — heart
    pounding, ears hot, a flood of certainty that something terrible is about to happen.
    Nothing is actually about to happen. This book is for the teenager whose alarm
    system fires at ordinary moments and treats a question, a presentation, a hello
    like a threat. It won't tell you to push through. It'll show you what's burning
    and how to stand near the heat without running.
  long_description: 'It''s a normal Tuesday. The teacher asks a question you actually
    know the answer to. And before you can decide anything, your body has already
    decided for you — heart going, hands cold, a hot wave up your neck and a voice
    in your chest that says don''t, not this, something is wrong. Nothing is wrong.
    The room is safe. But try telling that to the part of you that''s already braced
    like you''re about to fall.


    This book is for the teenager who lives with a smoke alarm that goes off when
    there''s no fire. You''re not dramatic and you''re not weak. You have a fast,
    loud warning system that can''t tell the difference between real danger and the
    ordinary scary stuff of being fifteen — being seen, being called on, walking into
    a room where you don''t know if you belong. It sounds the same alarm for all of
    it. So you''ve learned to stay small, stay quiet, keep your hand down, and call
    it not caring when really it''s just easier than the flood.


    Chapter by chapter, you''ll come to recognize the false alarm for what it is.
    You''ll feel the way it grabs you before a single thought arrives, and learn that
    the racing heart is not a prophecy — it''s just heat, and heat passes. You''ll
    see how avoiding the scary thing teaches the alarm that it was right to panic,
    and how doing one small brave thing while you''re still shaking teaches it something
    new. There''s a question this whole book keeps coming back to, and it''s not ''how
    do I make the fear stop.'' It''s: what is one thing you can do before you feel
    ready?


    This book will not make you fearless. It won''t hand you confidence or a morning
    routine or a hack to silence the alarm forever. The alarm is part of how you''re
    built, and the goal was never to rip the wiring out. The goal is to stop believing
    the alarm every time it screams. To feel your heart go loud, notice that nothing
    is actually on fire, and take the step anyway — small, scared, real.


    You don''t have to wait until you feel safe to be brave. You were never going
    to feel safe first. You get to be brave with a loud heart. That''s the only kind
    of brave there is.


    Book 1 of the Ember & Ash Publishing courage series.'
