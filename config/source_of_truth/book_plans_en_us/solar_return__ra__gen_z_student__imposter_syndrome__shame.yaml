title: Sure They'll Find Out You Don't Belong
subtitle: For the student bracing for the day the acceptance gets revoked
cover_tagline: You're not afraid of failing. You're afraid they'll see.
description:
  short_blurb: It isn't that you think you might fail. It's that you're certain there
    is something fundamentally wrong with you, and that all your work is just a costume
    keeping everyone from seeing it. This is for the student carrying a secret defect
    that doesn't exist. It won't tell you to love yourself — it will sit with the
    part of you that's been hiding, and let a little light in.
  long_description: 'Here is the thing you''ve never said out loud: you don''t actually
    believe you earned any of it. The acceptance, the grades, the kind words from
    the professor who clearly hasn''t figured you out yet. Underneath all of it sits
    a quiet, total certainty that there is something wrong with you — something defective
    at the core — and that everything you do is a costume you wear so that no one
    will ever see it.


    This is for you — the student who works twice as hard not to succeed but to cover.
    The one who deflects every compliment, who is sure praise is just evidence you''ve
    fooled them again, who feels not the fear of failing but the deeper dread of being
    found out. Shame is different from doubt. Doubt says you might not be good enough.
    Shame says you are not enough, that the flaw is you, and that exposure is only
    a matter of time. It is the most isolating feeling there is, because its whole
    job is to keep you hiding.


    You''ll come to recognize shame''s particular voice — how it speaks in absolutes,
    how it turns ''I made a mistake'' into ''I am a mistake,'' how it makes you overwork
    not toward a goal but away from a defect that was never really there. You''ll
    see how it lives in the body: the heat in your face, the urge to disappear, the
    flinch when someone looks at you too closely. You''ll learn the difference between
    hiding the flaw and tending the person, and why bringing it into the light is
    the one thing shame can''t survive.


    This book will not tell you to love yourself. It won''t hand you affirmations
    to recite into a mirror, and it won''t pretend that a buried sense of unworthiness
    dissolves because someone on a page told you you''re worthy. There''s no fix here
    for the feeling, no optimization that makes you finally enough. What there is,
    instead, is company — a warm voice in the room with the part of you that has been
    certain it had to stay hidden, and a slow, patient unmaking of the belief that
    you are the defect.


    You were never the thing that needed covering. The fire was always there under
    the ash. You can stop guarding it so hard now.


    Book 4 of the Ember & Ash Publishing Imposter Syndrome series.'
