title: The Chair They Used to Sit In
subtitle: For the working parent grieving in the cracks of a full life — learning
  to let go of what loss took, without letting go of who you lost
cover_tagline: You don't have to be done grieving to be a good parent tonight.
description:
  short_blurb: There's a chair at your table that used to be theirs, and most days
    you set it without thinking. This is a book for the parent who has been carrying
    a loss between school drop-offs and bedtimes, with no quiet hour to actually feel
    it. It won't ask you to move on — only to finally sit down.
  long_description: 'Somewhere in your house there is a chair they used to sit in.
    Maybe it''s a literal one. Maybe it''s the side of the bed, the seat in the car,
    the spot on the couch your eyes still go to. You have a whole life arranged around
    the place where someone used to be, and you keep that life running — lunches packed,
    forms signed, small faces fed — while the loss waits in the next room for a quiet
    hour that never quite comes.


    This book is for the working parent who is grieving in the margins. For you, who
    lost someone and then went back to work on Monday because the world doesn''t pause
    for sorrow and neither do your kids. You have learned to feel it in the car between
    meetings, to fold it small enough to fit between a tantrum and a deadline, to
    answer ''I''m fine'' so the people who depend on you don''t have to carry it too.
    You are not okay, and you have been so capable about it that no one has thought
    to ask.


    What you''ll come to recognize here is that letting go was never the thing grief
    was asking of you. Not the way they meant it — not closure, not moving on, not
    making peace and putting them down. There is a difference between releasing what
    the loss took from you — the future you planned, the phone call you can''t make,
    the version of your life that had them in it — and releasing the person themselves.
    You can set down the first without ever setting down the second. You can let go
    of what is gone and keep who is gone. This book is about learning, slowly, which
    is which.


    We''ll sit with the guilt of the days you don''t think of them, and the ambush
    of the days you can''t stop. We''ll make room for the strange arithmetic of grieving
    while raising children — how you grieve in fragments because that''s all the time
    you''re given, and how those fragments still count.


    Nothing here will help you get over it. There is no plan, no stage to graduate
    from, no morning you wake up finished. That isn''t the goal, and pretending otherwise
    would be its own small betrayal. What this book offers instead is the other chair
    — pulled up, facing yours, and the unhurried company of someone who won''t flinch
    when you finally say it out loud.


    Sit down. The chair has been waiting, and so have you. You''re allowed to still
    be grieving. You''re allowed to still be here.


    Book 1 of the Two Chairs Press grief series.'
