title: Everyone Needs Something From You at Once
subtitle: For the parent caught between aging parents and growing kids — when the
  demands all arrive in the same hour and there's no room left to think
cover_tagline: Everyone is talking and none of it can wait.
description:
  short_blurb: It all lands at the same time — the school email, the pharmacy on hold,
    the kid who needs you now, the parent who needed you yesterday. This is a small
    book for the parent whose day has no gaps left in it, and who can't remember the
    last thought that was only theirs. It won't add a single task. It just makes a
    little room.
  long_description: 'It happens in a single hour. The school sends an email that needs
    answering. The pharmacy puts you on hold. One kid is crying in the next room and
    the other needs a permission slip signed by morning. Your mother calls, and you
    can hear in her voice that something has changed again. It all arrives at once,
    and there is no space between any of it — no pause to decide what matters, no
    quiet to think in. You just react, and react, and react, until the day is gone
    and you couldn''t tell anyone what you actually did.


    This book is for you. The one in the middle. The one raising children and steadying
    parents in the same week, sometimes the same afternoon. You are not disorganized
    and you are not weak. You are simply being asked for more than any one person
    can hold, all at the same time, with nothing left over — and your mind has started
    to flood because the flood is real.


    You''ll come to recognize the shape of the overwhelm. The way too much arriving
    at once isn''t a character flaw but a capacity problem — too many things, too
    few hands, no margin. The way you''ve started skimming your own life because there''s
    no time to read it. The way a full inbox of a mind makes even small choices feel
    impossible, and how the pile is loudest in the few minutes you finally get to
    yourself, in the car, in the dark, before you go back in.


    This is not a productivity book. There is no system here, no morning routine,
    no app, no five steps to a calmer you. Nothing in these pages will ask you to
    do more or be more or optimize a single thing. It will not promise to fix the
    load. The load is not yours to fix tonight.


    What it offers instead is smaller and truer: a way to set the flood down for the
    length of one stolen moment, without earning it first, without anyone noticing
    it''s gone. You don''t have to empty the whole list. You just have to find the
    one small pocket of quiet that is yours, and let yourself be in it.


    You are allowed to stop, even for a minute, even with everything undone.


    Book 1 of the Stolen Moment Press Sandwich Generation Burnout series.'
