title: Your Body Still Keeps the Door
subtitle: For the caregiver listening between two generations after midnight — a nervous
  system that won't lie down while a parent down the hall and a child upstairs might
  still need you
cover_tagline: The house is asleep. Something in you is still standing guard.
description:
  short_blurb: You lie down and the watching doesn't stop. Some part of you is still
    listening for the fall, the call, the door — long after everyone else has let
    go for the night. This is a book for the body that learned it could never fully
    stand down, and for the slow work of letting the guard set its weight on the ground.
  long_description: 'The house goes still and you don''t. You lie there listening
    — for your mother''s footsteps in the next room, for the phone that might ring
    from the care home, for the particular silence that means a teenager is awake
    and unwell. Everyone else has gone under for the night. Some part of you is still
    standing at the door, scanning the dark for the next thing that needs you.


    This book is for the one who never gets to be off duty. You are the person other
    people call when something goes wrong, and you have been that person for so long
    that your body has forgotten how to believe nothing will. You manage, you anticipate,
    you catch the problem before it lands — and the cost is a nervous system that
    treats rest itself as a risk, because to let go fully is to stop watching, and
    you learned a long time ago that watching is the only thing keeping it all from
    falling.


    In these pages you''ll come to recognize the watcher for what it is — not paranoia,
    not a character flaw, but a part of you that took on the job of keeping everyone
    safe and never got the message that it could rest. You''ll see why it gets loudest
    at night, in the hours when there''s nothing left to manage and nothing to do
    but brace. You''ll learn what the scanning is protecting, why it makes sense,
    and what it has cost the body to stay at its post for years on end. And you''ll
    begin to feel, in small moments, what it''s like to let the guard set its weight
    down — not by forcing it to stop, but by giving it, at last, a structure solid
    enough to lean on.


    This book will not promise to switch the watching off. It won''t optimize your
    sleep, install a routine, or talk you out of vigilance with a breathing trick.
    There is no being told to just relax, no toughness, no shame in still being awake.
    The practice it asks for is quiet enough to do lying down in the dark, with the
    part of you that''s still on watch.


    What it offers is recognition. A way to understand what your watchful body has
    been carrying on everyone''s behalf, and a slow, unhurried descent into what it''s
    been guarding — and a way to let it finally rest its weight on something that
    can hold it.


    You are not broken for being unable to stop scanning. You are a person who has
    been the foundation under other people''s safety for a very long time, and no
    one ever stood watch for you. Tonight, you can let something else hold the dark
    for a while.


    Book 2 of the Night Architecture Books somatic healing series.'
