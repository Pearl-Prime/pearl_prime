title: 'Grief: The Witnessing Practice'
subtitle: A Field Guide for Entrepreneurs Navigating Grief
cover_tagline: Grief turned your mind into a guard that won't let you feel it.
description:
  short_blurb: For the founder whose hypervigilant mind has started managing their
    grief instead of letting them have it. This is a field guide to the watcher that
    stands between you and your loss. It won't make your mind go quiet, but it will
    show you the space where the grief is allowed in.
  long_description: 'The loss happened, and instead of grief you got a project manager.
    Some part of your mind stepped in immediately and started handling it, scanning
    for what needs doing, tracking who you''ve told, monitoring whether you''re holding
    it together in front of the team, running constant threat-assessment on your own
    feelings before they can land. You haven''t actually cried. You''ve been too busy
    watching yourself not cry.


    This book is for the founder whose hypervigilant mind has quietly taken over the
    grieving, the way it took over everything else. You''re good at this, the watching.
    It''s the same vigilance that got the company built, the part of you that never
    stops scanning for the next problem. So when the loss hit, it did what it always
    does, it treated the grief like a risk to be contained, a fire to be managed before
    it could spread to the rest of your life. And now you''re stuck in a strange place,
    carrying something heavy you can''t quite reach, because the guard at the door
    won''t let it through.


    The real talk is that you cannot manage your way through a loss, and the watching
    is not protecting you, it''s keeping you out. The vigilance that scans and tracks
    and assesses is the very thing standing between you and the grief you actually
    need to feel. It is not weakness and it is not a flaw. It''s a part of you that
    learned, somewhere back there, that staying on watch was safer than letting anything
    land.


    First you name it, you notice the watcher for what it is, an anxious part of you
    that learned to handle everything and is now trying to handle the unhandleable.
    Then you go down underneath the management to the loss it''s guarding, not to
    fix the grief but to finally let it in, to feel the thing the watching has been
    holding at arm''s length this whole time. And then you find the space between
    you and the watcher, the gap where you can stop monitoring long enough for something
    real to move through you.


    This will not promise a quiet mind or a clean, well-run grieving process. It will
    not optimize your recovery or hand you a system for processing loss efficiently.
    There is no productivity angle, no version where the vigilance becomes the thing
    that gets you through, no way to win this by being better at it. What it offers
    is the recognition that the watcher is holding your grief at arm''s length, language
    for the moment you catch yourself managing instead of feeling, and the chance
    to set the guard down long enough to actually grieve.


    You are allowed to stop watching yourself. You are allowed to let the guard rest
    and let the loss finally reach you.'
