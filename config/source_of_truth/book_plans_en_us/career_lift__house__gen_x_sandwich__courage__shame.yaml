title: Braver People Don't Need a Book Like This
subtitle: For the mid-career parent who hides how scared they are of wanting more
  — convinced that needing courage at all is proof something is wrong with them
cover_tagline: The thing you're hiding isn't the fear. It's that you still want more.
description:
  short_blurb: You should be further along by now. Braver. Settled. The kind of person
    who just makes the change instead of circling it for a decade. So you hide the
    fear, overwork to cover it, and tell no one that at fifty you're still terrified
    to want more from your job. This is the book for the quiet belief that the problem
    isn't the leap — it's you.
  long_description: 'Here is the thing you don''t say out loud. By now, you should
    be braver than this.


    You should have it figured out. You''re not twenty-five. You''ve raised kids,
    carried parents, held a career together through every storm — and still, when
    you let yourself want something different from these working years, an old voice
    answers before you can: who do you think you are. People your age have it handled.
    Real grownups don''t need a book about courage. The fact that you do is, quietly,
    proof that something is wrong with you. So you hide it. You overfunction. You
    become so competent that no one would ever guess how scared you are, and you tell
    yourself the cover-up is just maturity.


    This book is for you: the one in the middle, holding everyone up, privately certain
    you are the one who fell behind. You are not behind. You''ve been spending your
    courage on other people for twenty-five years and calling the exhaustion a character
    flaw.


    Here you''ll come to recognize shame for the quiet operator it is. You''ll see
    how the belief that you''re defective hides inside your competence, how it disguises
    itself as humility and realism and being a team player. You''ll learn the difference
    between I made a fearful choice and I am a coward — between a decision you can
    change and a verdict you''ve been serving for years. You''ll feel how much of
    your hiding was never protection at all, only the long habit of believing the
    want itself was shameful. And you''ll keep meeting one question that asks nothing
    of your worthiness, only your next move: what is one thing you could do before
    you feel ready?


    This book will not promise to fix you, because you were never broken. It won''t
    make you over into someone braver or hand you the confidence you think the other
    adults were issued at birth. The old voice may still whisper that you should have
    known better by now. What changes is that you stop believing it has the standing
    to decide. You let the want be allowed. You let needing courage be human instead
    of damning.


    There is nothing wrong with you. There never was. You are a person who has been
    brave for everyone but yourself, and the next chapter is the one where you finally
    spend a little of that courage on your own life.


    You don''t have to earn the right to want more. You only have to take the step.


    Book 3 of the Next Chapter Publishing courage series.'
