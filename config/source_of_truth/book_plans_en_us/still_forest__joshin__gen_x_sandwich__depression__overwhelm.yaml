title: The Weight You Carry Up the Stairs
subtitle: For the sandwich-generation caregiver whose depression looks like too much
  arriving at once — a still place to set the load down before you climb
cover_tagline: When everyone needs you and the bed feels a mile away.
description:
  short_blurb: You are not lazy and you are not failing — you are flooded. This is
    for the Gen X caregiver whose depression doesn't look like sadness so much as
    a body that can no longer hold one more thing. It won't hand you a system to manage
    the flood. It will sit with you on the forest floor until the water goes still
    enough to see what is actually yours to carry.
  long_description: 'There is a moment, most evenings, when you stand at the bottom
    of the stairs and the climb feels impossible. Not your legs. Something heavier.
    The parent who called twice today. The kid who isn''t okay. The work that didn''t
    stop. The dishes, the meds, the messages, all of it arriving at once, until there
    is no room left in you to think — only the flood, and a body that has quietly
    given up trying to keep up with it.


    This book is for you: the one in the middle. Generation X, holding a generation
    above and a generation below, still functioning, still showing up, still answering
    every call — while inside something has gone gray and gone heavy and stopped feeling
    like much of anything. The world calls you reliable. It does not see that you
    are drowning in plain sight.


    Here, depression is not laziness and it is not weakness. It is overwhelm that
    has nowhere to go. Too much has arrived, for too long, with no time to set any
    of it down — and a mind that floods can''t tell the difference between what is
    urgent and what only feels that way. You will come to recognize the flood for
    what it is: not a flaw in you, but a load no one was ever built to carry alone.
    You will learn the difference between the weight that is truly yours and the weight
    you picked up out of habit and never put back down. And you will find that beneath
    the noise there is a stillness, like a forest pool that goes clear the moment
    it stops being stirred — not because the water vanished, but because, for once,
    nothing is churning it.


    This is not a productivity plan dressed up as self-care. There is no system here,
    no morning routine, no optimized version of you waiting on the far side of enough
    effort. Nothing in these pages will speed you up or ask you to do more. Depression
    is not a backlog to clear. The forest does not hurry the seasons, and it will
    not hurry you.


    What you will find instead is permission. Permission to be exactly this tired.
    Permission to set the load down at the bottom of the stairs and stand there, empty-handed,
    for as long as you need. And when you are ready — only then — permission to take
    one small step. Not the whole climb. Just the next stair.


    You are allowed to stop holding everything. Start here.


    Book 1 of the Still Forest Press depression series.'
