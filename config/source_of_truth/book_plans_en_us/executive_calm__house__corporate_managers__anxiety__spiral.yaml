title: A Single Doubt That Quarries the Whole Night
subtitle: For the executive whose one worry splits into a thousand by 3am
cover_tagline: It started with one thought. It never stops at one.
description:
  short_blurb: Your boss said 'let's talk Monday' and by midnight you've rehearsed
    your own firing, the severance conversation, and how you'll tell your family.
    This is a book for the manager whose mind takes a single thread and pulls it into
    a thousand — and who is tired of losing whole nights to a meeting that hasn't
    happened.
  long_description: 'It begins with almost nothing. A clipped reply. A meeting that
    got rescheduled with no reason. Your manager saying ''can we talk Monday'' and
    then going quiet for the weekend. By midnight the one thread has become a thousand
    — you''ve run the firing, the severance, the conversation at home, the months
    without income — and each thought hands you cleanly to the next, down and down,
    faster the more you try to think your way to the bottom.


    The spiral feels like problem-solving. It is the opposite of it.


    This book is for the manager whose mind takes a single ambiguous moment and metabolizes
    it into catastrophe. You are not a careless thinker — you are too good a thinker,
    a mind built for analysis now turned on a threat that doesn''t exist yet, generating
    worst cases with the same depth you bring to a real decision. The spiral feeds
    on your competence. The harder you work it, the deeper it goes.


    You''ll come to recognize the spiral from the inside. How it disguises itself
    as preparation, as responsibility, as facing reality. How each loop produces not
    an answer but the next loop, each one feeling like the one that will finally resolve
    it. How the body locks in — wired, sleepless, certain — while the mind insists
    it''s almost solved and the clock keeps moving toward morning. And how you get
    out not by thinking the thought through to its end, because it has no end, but
    by stepping off the path entirely and putting your weight back on the ground that
    is actually under you tonight.


    This is not a method to control your thoughts. It will not give you a thought-stopping
    trick or a way to argue every fear into submission. It does not promise the spiral
    never starts. The first thought will still come; that part isn''t yours to prevent.


    What it offers is the difference between starting the descent and following it
    all the way down. Bedrock you can return to when the mind goes looking for the
    next floor. The thought arrives. You don''t have to take the stairs.


    You are not unstable. You have a powerful mind that learned to point itself at
    the dark. It can learn to come back.


    Book 3 of the Granite Ridge Publishing anxiety series.'
