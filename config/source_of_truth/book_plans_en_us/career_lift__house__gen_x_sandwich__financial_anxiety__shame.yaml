title: I Should Be Further Along Than This
subtitle: For the sandwich-generation parent who hides the real numbers — quietly
  sure that being squeezed this hard at this age means something is wrong with you
cover_tagline: The squeeze you can survive. The shame you've kept secret.
description:
  short_blurb: You smile at the dinner party and never say how close to the edge you
    actually are. Underneath is the belief that someone your age should have figured
    this out by now — and that the gap is a defect you have to hide. This book is
    for that secret. It won't tell you you're doing fine. It will tell you the truth,
    which is better.
  long_description: 'There''s a number you don''t say out loud. Not to your friends,
    not to your spouse some nights, barely to yourself. It''s the real number — what''s
    actually in the accounts, what you actually owe, how close to the edge you actually
    are while you''re paying for your mother''s care and your kid''s college and the
    roof over all of it. And underneath the number is a quieter belief, the one that
    does the real damage: that a person your age should have this handled. That being
    squeezed this hard, this late, means something is wrong with you.


    This book is for you — the Gen X parent carrying the squeeze and the secret both.
    You''re the one who keeps the surface smooth. You pick up the dinner check you
    can''t quite afford so no one will know. You change the subject when retirement
    comes up. You overwork to cover a gap you''re convinced is a personal defect rather
    than a generational one. The exhaustion isn''t just the money. It''s the performance
    of being fine on top of the money.


    You''ll come to recognize the shame as its own quiet voice, working underneath
    the fear. The way it whispers that everyone else figured out something you missed.
    The way it turns a structural squeeze — stagnant wages, a retirement age that
    keeps receding, two generations leaning on one income — into a verdict about your
    worth. The way hiding the numbers makes them heavier, because now you''re carrying
    the debt and the lie about the debt. You''ll learn to tell the difference between
    the real arithmetic of your life and the story shame has wrapped around it, insisting
    the gap is who you are.


    This book will not flatter you. It will not tell you that you''re secretly doing
    great, or that a confidence trick will close the gap. It won''t hand you an affirmation
    to repeat until the numbers behave. The squeeze is real and the math is the math.
    What this offers instead is the thing shame can''t survive: the truth, said plainly,
    with no flinch — that you are not behind because you are broken, you are behind
    because the road got steeper for everyone who walks it where you do.


    You''re allowed to stop hiding the number. You''re allowed to be exactly where
    you are without it being a confession. The next chapter doesn''t begin when you
    finally measure up. It begins the moment you put down the secret you''ve been
    carrying and let the truth weigh what it actually weighs — which is less than
    the lie.


    Book 3 of the Next Chapter Publishing financial anxiety series.'
