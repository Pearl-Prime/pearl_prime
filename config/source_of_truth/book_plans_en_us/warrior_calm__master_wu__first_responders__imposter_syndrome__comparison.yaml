title: Forged for This — or So They Look
subtitle: For the first responder certain their colleagues were built for a job they
  are faking
cover_tagline: They look unshakable. You feel like the only one faking it.
description:
  short_blurb: 'Everyone on the crew seems to have been built for this — steady hands,
    dry humor, nothing rattles them. You watch them and run the math, and you always
    come out the one who doesn''t measure up. This is a grounded look at the comparison
    engine of imposter syndrome: the habit of judging your insides against everyone
    else''s outsides, and why you can never win it. The point isn''t to win. The point
    is to stop playing.'
  long_description: 'Look around the station. The whole crew seems carved from something
    you''re not. Steady hands on the worst calls. That easy, dark humor on the drive
    back. The senior guy who''s seen it all and doesn''t flinch. They look like they
    were born for this — and you''re standing there with your heart going, certain
    you''re the one weak link who somehow ended up in the uniform.


    So you run the math. You measure your shaking against their stillness, your doubt
    against their swagger, your worst moment against the highlight reel they let you
    see. And the math always comes out the same way: everyone else belongs, and you''re
    the impostor who got in by accident.


    This book is for the first responder who can''t stop comparing. The medic timing
    herself against the partner who never seems thrown. The probie sure that every
    other rookie caught on faster. The officer scrolling past colleagues who look
    promoted, decorated, unbothered — and feeling, every time, a little further behind.
    You point a sharp, high-performance instrument at the crew around you and use
    it to convict yourself.


    What you''ll come to recognize is the rigged comparison underneath it. You are
    matching your insides — the fear, the second-guessing, the replay of the call
    that went sideways — against their outsides, which are the only part of them you''ll
    ever see. Of course they look calmer. You''re comparing your raw footage to their
    final cut. And the job amplifies it: the culture rewards the unshaken face, so
    everyone wears one, so everyone privately assumes they''re the only one acting.


    We''ll look at why the scanning mind reaches for comparison in the first place,
    what it''s actually trying to protect, and how it quietly turns teammates into
    a scoreboard you''re always losing. We''ll separate the useful kind of learning-from-others
    from the corrosive kind that just measures and indicts. And we''ll find a different
    way to stand among people who look stronger than you feel — the trained calm of
    someone who has nothing left to prove to the room.


    This book will not help you win the comparison. That''s the point. It won''t make
    you the steadiest one on the crew or hand you the confidence you think everyone
    else was issued. It will not tell you to fake the unshaken face better. What it
    offers instead is the quiet relief of stepping off the scoreboard entirely — and
    standing your ground next to people you no longer have to beat.


    The calm you''re chasing in them was never the absence of fear. It was the willingness
    to stand in it. You already do that. You just keep forgetting to count yourself.


    Book 2 of the Iron Gate Press Imposter Syndrome series.'
