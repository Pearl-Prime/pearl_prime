title: More Than You Have Room For
subtitle: For the woman who holds it all together at work — when too much arrives
  at once and your body runs out of room before your mind admits it
cover_tagline: It isn't that you can't handle it. It's that there was never any room
  left.
description:
  short_blurb: There is a moment, somewhere between the third meeting and the unanswered
    text, when the volume of it all stops being a thought and becomes a feeling in
    your chest. This is a book about that moment — the flood, the bracing, the held
    breath you didn't notice you were holding. It won't help you carry more. It will
    help you understand the body that's been carrying it all along.
  long_description: 'It usually arrives all at once. The morning was already full,
    and then three more things landed before you''d finished the first, and somewhere
    in there your shoulders climbed toward your ears and your breath went shallow
    and high and you kept going anyway, because that''s what you do. By the time you
    sit down, the overwhelm isn''t a list anymore. It''s a pressure behind your sternum,
    a tightness you can''t talk your way out of, a sense that there is simply no more
    room.


    This book is for the woman everyone leans on. The senior manager who tracks the
    deadlines and the dentist appointments both. The one who looks composed in the
    meeting and then sits in the parked car a beat too long, hand to her chest, not
    sure why her body is still braced when the day is technically over. If your mind
    has been telling you to push through while your body has been quietly running
    out of capacity, you already know the feeling this book is named for.


    What you''ll come to recognize, slowly, is that overwhelm is not a character flaw
    and not a failure of discipline. It is your nervous system meeting more input
    than it has been given room to hold. The flood is real. The bracing makes sense.
    The shutdown that comes after — the blankness, the irritability, the sudden need
    to do nothing at all — is not weakness. It''s the body doing the only thing left
    to do when too much arrives and no one ever taught it how to let some of it move
    through.


    We''ll sit with the flood instead of fighting it. We''ll notice where it lives
    in you — the jaw, the chest, the breath that forgot to land. We''ll learn what
    it feels like to give the body a little room back, not as a technique to master
    but as something closer to permission. The practice this book asks for is small
    enough to happen on a subway, between two meetings, or at 3am when the list won''t
    quiet down.


    This is not a book that promises to help you carry more. It will not optimize
    your capacity or hand you a morning routine that finally gets you on top of it
    all. There is no getting on top of it. That''s part of what we''ll lay down. Nothing
    here will turn your calm into one more thing to perfect.


    What it offers instead is recognition — the quiet, steadying relief of understanding
    what your body is doing and why it has always made sense. You are not behind.
    You are not too much. You were simply never given room, and room is something
    you can begin, gently, to make.


    Book 1 of the Stillness Press somatic healing series.'
