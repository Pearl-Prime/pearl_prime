title: The Easy One
subtitle: For the one everyone calls chill and low-maintenance — when being the kid
  with no needs feels safer than risking that something is wrong with you for having
  them
cover_tagline: You're not easygoing. You just made yourself smaller than your needs.
description:
  short_blurb: 'You''re the easy friend. The one who''s down for anything, who never
    makes it weird, who has no needs. It feels like a personality — but underneath
    it''s a deal you made: hide what you want so no one finds out something''s wrong
    with you. This is a book about the shame buried under being agreeable, and how
    to stop earning your place by disappearing.'
  long_description: 'Somewhere along the line you became the easy one. The friend
    who''s always down. The one who doesn''t make a fuss, doesn''t need much, goes
    with whatever the group wants. People say it like a compliment — ''you''re so
    chill, you''re so low-maintenance'' — and you collect those words like proof you''re
    doing it right.


    But here''s what nobody sees: being easy isn''t your personality. It''s a deal
    you made a long time ago. Hide what you want. Don''t have needs anyone can see.
    That way no one finds out the thing you''re most afraid of — that there''s something
    wrong with you, and that if people saw the real, full, inconvenient size of you,
    they''d back away.


    This book is for you — the one who confuses being agreeable with being good. The
    one who feels a flash of hot embarrassment every time you almost ask for something,
    like wanting it at all is the embarrassing part. You over-explain. You apologize
    for taking up a seat. You''d rather quietly go without than risk being too much.


    We''re going to follow that feeling down to where it starts. You''ll come to recognize
    the shame underneath the easygoing mask — the buried belief that your needs are
    evidence of a defect, something to be managed and hidden rather than met. You''ll
    see how ''no'' got tangled up with ''bad,'' so that drawing any line at all feels
    like confessing you''re difficult. And you''ll start to understand that the smallness
    was never the real you. It was a cover you painted over yourself, layer after
    layer, until the actual colors went gray.


    This is not a book that''s going to hand you affirmations to repeat in the mirror.
    It won''t promise that one brave conversation fixes the way you flinch. Shame
    doesn''t lift on a schedule, and anyone who tells you to ''just love yourself''
    has never felt the specific dread of being seen wanting something. We''re not
    going to optimize you into a more confident person.


    What we''re going to do is gentler and slower and more honest than that. We''re
    going to let the easy one set something down. We''re going to find out what you
    actually want when no one''s grading you for having it.


    You are not a problem that learned to behave. You''re a whole person who got talked
    into taking up less room. You''re allowed to need things out loud. You''re allowed
    to be a little inconvenient and still belong here.


    Book 2 of the Blank Canvas Books boundaries series.'
