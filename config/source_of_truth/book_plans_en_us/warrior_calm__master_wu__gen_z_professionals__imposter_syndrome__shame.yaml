title: You Keep Waiting to Be Found Out
subtitle: For the young professional who hides the part of themselves they're sure
  is the problem — and overworks to keep anyone from seeing it
cover_tagline: The mask was never the strong part of you.
description:
  short_blurb: You're good at your job and certain it's a matter of time before everyone
    realizes you shouldn't be. So you cover, you over-prepare, you make sure no one
    ever sees the version of you that you've quietly decided is the real problem.
    This is a steady book for the part of you that's been holding the door shut for
    so long it forgot it could let go.
  long_description: 'There''s a specific kind of tired that comes from holding a door
    shut all day.


    You know it. You answer the message a little too fast so no one thinks you were
    unsure. You rehearse the thing before you say it, then say a smaller version.
    You stay late to be safe. From the outside it looks like drive. From the inside
    it''s a watch you never get to clock off from — guarding a belief you''ve never
    said out loud: that if they really saw you, they''d know.


    This book is for you. The one who got the job, the offer, the title — and decided
    it must be a mistake they haven''t caught yet. The one whose competence is real
    and whose certainty about being a fraud is somehow more real. You don''t think
    you have imposter syndrome. You think you''re the imposter the syndrome is named
    after.


    We''re not going to argue you out of it. You''ve already won every argument against
    yourself.


    Instead, you''ll come to recognize the shape of the thing you carry. The mask
    you built so early you mistook it for your face. The hidden belief underneath
    — that something is wrong with you, specifically, and the work is the cover. You''ll
    see the cost of holding the door: the rest you never take, the help you never
    ask for, the rooms you leave the second the praise starts because praise aimed
    at the mask feels like a lie you''re getting away with. You''ll learn what it
    is to stand in front of that belief without flinching, and what loosens in the
    body when you finally stop bracing to be exposed.


    This is the warrior''s calm. Not the armor. Not the performance of having it together.
    The quieter strength of someone who has set down what they were carrying and found
    they''re still standing.


    This book will not fix you, because you were never broken — only braced. It won''t
    make you more impressive or teach you to fake more confidence. It offers no trick
    for finally believing you''ve earned your seat. The point was never to win the
    case against yourself. The point is to stop holding the door.


    You are allowed to be seen and still be safe. You can put it down now.


    Book 1 of the Iron Gate Press imposter syndrome series.'
