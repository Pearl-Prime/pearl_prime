description:
  short_blurb: A Step-by-Step Method to Interrupt Spiraling Thoughts Before They Take Over stop waiting and start the thing I keep delaying.
  long_description: |
    A Step-by-Step Method to Interrupt Spiraling Thoughts Before They Take Over

    This book is for senior manager + primary household planners who I know what I need to do but I can't make myself do it. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.

    Chapter by chapter, you'll work with what breaking the thought loop really means in your body and mind, and how to work with it. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.

    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.

    Book 2 of the Devotion Path courage series.
