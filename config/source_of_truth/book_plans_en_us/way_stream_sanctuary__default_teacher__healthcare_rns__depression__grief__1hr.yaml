title: 'The Weight Without a Name: The Weight You Carry'
subtitle: A Real Talk Guide to Depression for Healthcare Rns
cover_tagline: You didn't burn out. You've been carrying the dead, one shift at a
  time.
description:
  short_blurb: For the nurse who keeps showing up flat, heavy, and quietly done. This
    one hour doesn't try to lift the weight off you. It finally names what the weight
    is made of, and shows you how to set part of it down without pretending it was
    never there.
  long_description: 'You clock out, you sit in the car, and you can''t make yourself
    turn the key. Not sad, exactly. Just flat. Heavy in a way that started somewhere
    back in the unit and followed you to the parking lot. You tell yourself it''s
    the schedule, the short-staffing, the charting that never ends. But underneath
    the tiredness there''s a quieter thing you don''t say out loud: somewhere along
    the way, you stopped feeling most of it on purpose, and now you can''t find where
    the off switch went.


    This hour is for the nurse who has gone grey. The one running on autopilot through
    report, who feels nothing at the bedside and then feels nothing at home either.
    Who has carried more death than anyone outside this work could begin to hold,
    and was expected to round on the next patient like the last bed didn''t just empty
    an hour ago. You don''t cry at the ones that get to you anymore. You''re not sure
    you can. If you''ve been calling it depression because there''s no other word
    for how leaden you''ve become, this is for you.


    Waystream calls this the grief engine, and it does three things, plainly, in the
    time it takes to drive home. Recognition: it names the heaviness as accumulated
    loss, not a personal defect or a sign you''re not cut out for the work. Every
    patient you couldn''t save, every family you watched come apart in a hallway,
    every shift you swallowed it whole so you could keep moving — none of it evaporated.
    It went into the weight you''re carrying right now. Descent: instead of handing
    you a coping checklist, it walks you down into the heaviness on purpose, slowly,
    because the only way the grief stops quietly running your life is to finally let
    it move through you instead of around you. Integration: you come back up able
    to feel the work again without it flattening you, knowing which part of the weight
    is genuinely yours to carry and which part was never yours and never should have
    been.


    This will not give you closure. It will not optimize your resilience or hand you
    a self-care routine to squeeze in between codes. There are no worksheets here,
    no morning rituals, no one telling you to find the silver lining in a patient''s
    death. What is happening to you is not weakness, and it is not fixed by being
    more positive or sleeping more or caring less. It is grief — ordinary, enormous,
    human grief — that simply never had anywhere to go.


    You are allowed to grieve the people you cared for. You were never supposed to
    carry them all in silence, and you can begin to put some of them down now.'
