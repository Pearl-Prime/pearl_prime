title: Mourning a Life You Never Got to Live
subtitle: For the young professional grieving the version of yourself, the future,
  and the certainty that quietly went missing — and learning what is yours to finally
  release
cover_tagline: Some of what you lost was never taken. It was only waiting for you
  to let it go.
description:
  short_blurb: No one died, and still something is gone. This book is for the depression
    that is really grief in disguise — for the self you were supposed to become, the
    future you were promised, the ease you can't remember losing. It won't rush you
    back to fine. It will sit with you in the loss until you can tell what's worth
    grieving from what was only ever a story you can lay down.
  long_description: 'You can''t point to what happened. No funeral, no breakup, no
    single bad day. And yet you keep moving through your life like someone walking
    the rooms of a house after everyone''s gone — touching the surfaces, half-expecting
    to find what isn''t there anymore.


    This is depression as grief. The slow, sourceless mourning that has no event attached
    to it. You are grieving the person you were sure you''d be by now. The future
    that got quietly rewritten. The version of adulthood you were promised and the
    ease you can''t remember setting down. It doesn''t look like sadness with a reason,
    so you don''t let yourself call it loss. You just carry it, and wonder why everything
    feels like an afterward.


    This book is for you: the Gen Z professional who did everything right and feels
    strangely bereaved. The one who is mourning timelines and selves and certainties
    no one else can see were lost. The one who has been told to be grateful, and so
    has never been allowed to actually grieve.


    You''ll come to recognize the texture of it. How grief without a name still moves
    through the body like grief. How some of what you lost was real and deserves to
    be honored — and how some of it was only ever a story about who you were supposed
    to be, a costume you can finally take off. How the ache of letting go and the
    relief of letting go are closer than you''ve been led to believe. Beneath the
    losses, something in you was never lost at all — the awareness that has been here
    through every version of you that came and went, untouched, already home.


    This book will not hurry you. It will not hand you five stages, or tell you closure
    is a finish line, or promise that on the far side of this you''ll be optimized
    and unbothered. There is no productivity in mourning, and this book refuses to
    pretend otherwise. It will not reframe your grief as a mindset you could fix.


    What it offers is the dignity of the loss, and then, gently, the difference between
    what is yours to keep grieving and what was only ever waiting to be released.
    Permission to mourn a life you never got to live. Permission to lay down the future
    that isn''t coming, not as defeat, but as the loosening of a grip you didn''t
    know you were holding.


    What you are is not any of the selves you''ve lost. And it is still here.


    Book 2 of the Awakening Press depression series.'
