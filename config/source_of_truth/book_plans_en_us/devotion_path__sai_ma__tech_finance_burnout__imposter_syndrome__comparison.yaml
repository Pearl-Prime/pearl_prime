description:
  short_blurb: How to Stop Measuring Your Worth Against Others and Build Real Confidence stop feeling like a fraud at work.
  long_description: |
    How to Stop Measuring Your Worth Against Others and Build Real Confidence

    This book is for senior engineer / PM at public tech companys who I'm going to be found out. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.

    Chapter by chapter, you'll work with what the comparison trap really means in your body and mind, and how to work with it. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.

    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.

    Book 2 of the Devotion Path imposter syndrome series.
