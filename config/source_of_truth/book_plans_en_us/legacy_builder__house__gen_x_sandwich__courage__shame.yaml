title: The One Who Was Supposed to Be Stronger
subtitle: For the caretaker who hides a private belief that they were never brave
  enough to begin with — and overworks to make sure no one finds out
cover_tagline: You've been covering for a flaw that was never really there.
description:
  short_blurb: 'Everyone treats you like the strong one, and you''ve never told them
    the truth: that underneath the competence is a quiet certainty that you''re the
    one who folds, the one who isn''t really brave, the one who''s been faking it
    all along. This is a book for the caretaker who has spent a lifetime overworking
    to hide that belief — and is ready to set it down.'
  long_description: 'There''s a story you''ve never said out loud. On the outside,
    you''re the capable one — the one the whole family calls when something breaks,
    the one who shows up, who handles it, who doesn''t fall apart. And underneath
    all of that, in a place you don''t let anyone see, you carry a quiet conviction
    that it''s a performance. That the real you is the one who freezes. The one who
    isn''t actually brave. The one who would be found out if anyone looked too closely.


    So you cover. You over-prepare so no one sees you hesitate. You say yes so no
    one sees you flinch. You carry more than your share, because as long as you''re
    indispensable, no one will ever notice the flaw you''re certain is there. And
    you call it being responsible. But it isn''t only that. It''s a lifetime of overworking
    to hide a single buried belief: that something is wrong with you, at the root,
    where courage was supposed to be.


    This book is for you — the one in the middle of every crisis, propping up a parent
    and a child and a household, who has never once let anyone see the part of you
    that''s afraid. You think your fear is proof of the defect. It isn''t. The fear
    is just fear. The defect was never real. What''s real is how long and how hard
    you''ve worked to outrun a verdict you handed yourself a long time ago, probably
    before you were old enough to argue with it.


    You''ll come to recognize the shame for what it is — not a true account of who
    you are, but an old conclusion you''ve been overpaying to keep hidden. You''ll
    see how hiding the fear became proof, in your mind, that the fear was shameful.
    You''ll notice how much of your competence has been armor, and how exhausting
    it is to be brave for everyone while believing you''re a fraud. And you''ll learn
    what it feels like to let one person see the afraid part of you — to stop performing
    courage and simply act, flaw and all, in full view.


    This book will not fix you, because there is nothing in you that needs fixing.
    It will not optimize you into someone finally worthy of the trust people already
    place in you. The belief that you were supposed to be stronger is not a problem
    to solve. It''s a heavy thing you''ve been carrying up the mountain, and you''re
    allowed to set it down.


    The people leaning on you were never leaning on a flawless person. They were leaning
    on you — the real one, afraid and showing up anyway. That was always enough. It
    was always the bravest thing in the room.


    Book 3 of the Second Mountain Press courage series.'
