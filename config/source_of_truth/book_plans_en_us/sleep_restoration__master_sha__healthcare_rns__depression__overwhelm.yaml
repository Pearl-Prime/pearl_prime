title: The Floor Was Never Meant to Hold This Much
subtitle: For the nurse carrying everyone's weight at once — when depression isn't
  sadness but a structure quietly buckling under the load
cover_tagline: You didn't break. You were never built to bear all of it alone.
description:
  short_blurb: Some nights the heaviness has no name — it's just everything, arriving
    at once, with no room left to think. This is a book for the nurse who holds the
    whole floor together and comes home to a weight that finally outpaced her. It
    will not hand you another task. It will sit with you in the dark and help you
    set the load down.
  long_description: 'It doesn''t always announce itself as depression. Some nights
    it''s just too much. The shift, the families, the charting, the calls you didn''t
    return, the body that won''t get under the covers — it all arrives at once, and
    there is no room left in you to think. You are not sad, exactly. You are submerged.
    The floor that held you for years has started to give, quietly, in a way no one
    at work would ever see.


    This book is for you: the nurse who carries the weight of everyone''s worst hours,
    then drives home to a heaviness she can''t name and can''t put down. The one who
    keeps functioning — charting flawlessly, catching what others miss — while something
    inside has slowly stopped bearing weight. If you''ve started to wonder whether
    this flatness is just who you are now, read on. It isn''t.


    In these pages you''ll come to recognize how depression in a caregiver so often
    wears the face of overwhelm: not a feeling but a capacity exceeded. You''ll see
    how the mask of competence becomes its own load. How the cost compounds in the
    body long before the mind admits it. How the belief underneath — that you should
    have managed this, that needing help is the failure — is the heaviest beam of
    all. And you''ll begin to understand what it means to let a wall be load-bearing
    again instead of asking yourself to hold up the whole structure alone.


    This is not a recovery plan. It will not optimize you, fix you, or hand you one
    more protocol to fail at. There is no resilience lecture here, no push-through,
    no ''self-care'' that''s really another task on the list. Nothing in this book
    asks you to be stronger.


    It asks something quieter: that for the length of these pages, you stop holding.
    That you let the night be dark. That you let the weight rest somewhere other than
    your own chest.


    You are not lazy and you are not failing. You have simply been the floor under
    too many lives, for too long, with no one underneath you. That is not a flaw in
    your character. It''s a flaw in how much you were asked to carry.


    Set it down here. Just for now. The dark will hold it, and you, until you''re
    ready to move again.


    Book 1 of the Night Architecture Books depression series.'
