title: 'The Number in Your Head: Escaping the Mental Loop'
subtitle: A Real Talk Guide to Financial Anxiety for Managers
cover_tagline: One unread email about budget. Forty-five minutes later you've mentally
  lost the house.
description:
  short_blurb: 'The spiral is when a single money thought breeds a thousand: one line
    item becomes the layoff becomes the foreclosure becomes the version of you who
    failed everyone. This book is about catching the loop while you''re inside it
    and stepping off, without pretending the first thought wasn''t real. No thought-stopping
    tricks, no positive affirmations, no toxic calm.'
  long_description: 'One word in a calendar invite does it. Restructuring. You''re
    gone before the meeting even loads. Inside a minute you''ve run the entire film:
    the cut, the severance, how many months the runway lasts, the conversation at
    the kitchen table, the kids'' school, the particular look on your face as you
    tell people you used to manage a team. None of it has happened. The invite is
    probably about parking. But the spiral doesn''t run on facts, it runs on openings,
    and at this hour you handed it one.


    This book is for the manager whose mind takes a single money thought and turns
    it into a thousand-step fall toward worst case. You''re good at scenario planning;
    it''s literally the job. And the same machinery that makes you sharp in a forecast
    review swivels around at 2 a.m. and renders your ruin in high definition. One
    genuine concern, a hundred invented consequences, and a body that can''t tell
    the difference and braces for all of them at once.


    Waystream isn''t a trick for switching the thought off. It shows you the architecture
    instead. A spiral is one thought recruiting the next, and the trap is that every
    new link arrives feeling like fresh information when it''s only the first fear
    in a new costume. You''ll learn to catch the loop from inside it, to feel the
    precise click where the second thought latches onto the first. Then comes the
    counterintuitive part: you don''t argue with the chain and you don''t try to outrun
    it. You climb down past all the branches to the one real fear they''re growing
    out of, and you stand there, with that single thing, and nothing else. The thousand
    consequences starve the instant you stop feeding them. You come back able to tell
    an actual problem from a catastrophe your own mind built to spec.


    This book will not repackage your worry as productivity and it will not coach
    you to think positive over the top of the dread. It won''t promise the spiral
    never fires again. It will not tell you to stop overthinking, which you''d obviously
    have done already if it worked like a switch. No forced calm anywhere in here.


    What you get is a way to spot the loop early and a way to step off it onto the
    one solid fact underneath, the place where something can actually be examined.
    Direct, secular, no spin. Written for a mind that runs fast and needs a real surface
    to set the speed down on.


    The first thought might even be true. The thousand after it are just momentum.
    You''re allowed to stop at one.'
