title: Too Much, and None of It Matters
subtitle: For the young professional drowning in a hundred small things while a gray
  flatness swallows the point of any of them
cover_tagline: The flood and the numbness are not enemies. They're the same exhaustion,
  wearing two faces.
description:
  short_blurb: 'You are buried under more than any one person can hold — and somehow
    it all feels pointless at the same time. This book is for the strange double weight
    of depression that arrives as overwhelm: a flooded inbox and a flooded chest,
    too much to do and no reason left to do it. It won''t help you get on top of the
    pile. It will help you set the whole thing down.'
  long_description: 'There are forty-one unread messages and you have read none of
    them. The to-do list has outgrown the screen. Three people are waiting on you
    and you are sitting very still, because the moment you move you''ll have to choose
    what to drown in first.


    This is what depression looks like when it wears the face of overwhelm. Not drama.
    Just too much arriving at once, into a self that has no room left to receive it
    — and underneath the flood, a flatness whispering that none of it matters anyway.
    You keep waiting to feel capable again. You keep treating the heaviness like a
    backlog you could clear if you just tried harder.


    This book is for you: the one who looks productive and feels submerged. The Gen
    Z professional who can answer every notification and still can''t find the floor.
    The one who has confused a crushed nervous system for a personal failing, and
    exhaustion for laziness.


    You''ll come to recognize the shape of it. How overwhelm and numbness are not
    opposites but the same depleted state — capacity exceeded, then capacity gone.
    How the flood is so loud precisely because you''ve been treating yourself as the
    thing that has to absorb all of it. How the one who notices there''s too much
    is not, itself, made of too much. There is a space in you the flood never actually
    reaches — the open sky the weather moves across without staining it.


    This book will not help you do more. It will not optimize your morning, stack
    your habits, or get you to inbox zero. There is no system here for getting on
    top of your life, because your life is not a pile to conquer. Nothing here treats
    your overwhelm as a productivity problem to solve, because it was never one.


    What it offers instead is permission to stop receiving everything as though your
    worth depended on holding it. Permission to let the hundred small things be a
    hundred small things, not a verdict on whether you''re enough. Permission to discover
    the stillness that was underneath the flood the whole time — not by clearing the
    flood, but by waking up to the one watching it rise.


    You are allowed to set it down. You were never the container for all of it.


    Book 1 of the Awakening Press depression series.'
