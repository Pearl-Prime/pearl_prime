title: Everyone Else Already Knows What They're Doing
subtitle: For the student stacking their private doubt against every classmate's edited
  highlight reel — and walking into every room sure they're the least qualified person
  in it
cover_tagline: You're comparing your behind-the-scenes to everyone else's highlight
  reel.
description:
  short_blurb: Everyone in the group chat seems to have it figured out — the internship,
    the plan, the easy confidence you can't fake. You measure yourself against all
    of them and you always lose. This is a book for the student who is sure they're
    the only one who doesn't belong here. It won't help you win the comparison. That's
    the point.
  long_description: 'You look around the lecture hall, the group chat, the feed, and
    it''s obvious: everyone else already knows what they''re doing. They have the
    internships, the answers, the easy way of speaking up. They''re not white-knuckling
    it the way you are. Somehow they all got a manual you never received, and you''re
    convinced it''s only a matter of time before someone notices you''re the one who''s
    behind.


    This book is for the student whose attention has narrowed to a single question
    — how do I measure up — and who always lands on the same answer: not enough. You
    scroll and you shrink. You hear about a classmate''s win and feel yourself drop
    a rung lower. You walk into the room already certain you''re the least qualified
    person in it. You''re running a comparison you can never win, because you''re
    holding your own private doubt up against everyone else''s public surface, the
    rehearsed and the filtered and the carefully chosen, and calling it a fair fight.


    You''ll come to recognize what that habit is actually doing to you. How comparison
    quietly feeds imposter syndrome — how the highlight reels you measure yourself
    against were edited, how the people who look effortless are often hiding the same
    cold drop you are, how the ranking you''re so sure of lives in your head and nowhere
    else. You''ll feel where the comparing shows up in your body: the bracing, the
    held breath before you check who''s ahead. And somewhere in the middle of this
    book you''ll get to set the whole question down — not because you finally came
    out on top, but because you stopped agreeing to the contest in the first place.


    This is not a book that will help you win. It will not give you a way to out-achieve
    the people you envy, or tricks to look as composed as they do. That would just
    hand you a faster way to lose, because there is always someone further ahead,
    always another room you haven''t entered yet. There is no leaderboard here and
    no climbing your way to the front of it. What''s here is something steadier: a
    way to stop holding yourself up against everyone else in the dark, and to notice
    that the doorway you keep thinking the rest of them already walked through is
    one you get to cross at your own pace — as yourself, not as a rank.


    You are not behind. You were never in the race you thought you were losing.


    Book 2 of the Threshold Books imposter syndrome series.'
