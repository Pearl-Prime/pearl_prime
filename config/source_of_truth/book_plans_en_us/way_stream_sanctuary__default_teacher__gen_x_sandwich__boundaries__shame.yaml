title: 'Setting Boundaries: What Shame Does to You'
subtitle: What Shame Does to You — Boundaries for Gen X Sandwich (What Shame Does
  to You)
cover_tagline: You can't say it out loud because part of you believes it's true.
description:
  short_blurb: There's a line you need to draw, but you can't, because saying it would
    mean admitting you have limits — and somewhere you decided that having limits
    means something is wrong with you. This is a book about the boundary you carry
    in silence and the buried shame that keeps it stuck there.
  long_description: 'There''s a sentence you''ve been swallowing for years. Maybe
    it''s "I can''t keep doing all of this." Maybe it''s "I need help with Mom." Maybe
    it''s just "no." You rehearse it in the shower and it dies in your throat at the
    table. Not because you don''t have the words. Because saying them would mean admitting
    you have a limit, and somewhere along the way you decided that your limits are
    proof of a defect — that a good daughter, a good parent, a good person wouldn''t
    need a line at all.


    That''s shame talking. Not the loud kind. The quiet kind that''s been with you
    so long you''ve stopped hearing it as a voice and started taking it as fact.


    This book is for you — pressed between the generation above and the one below,
    the person everyone assumes can absorb a little more. You''ve taken your inability
    to set a boundary and turned it into a character verdict. You figure you''re weak,
    or selfish, or just not built for this. You''re none of those things. You''re
    carrying a belief that having needs makes you defective, and that belief is what
    keeps your mouth shut.


    Recognition first: you''ll learn to hear the shame underneath the stuck boundary
    — to catch the exact moment "I can''t say this" slides into "because something''s
    wrong with me." Then you go down into it, which is the step almost everyone skips.
    You won''t argue with the shame or affirmation your way around it. You''ll go
    to where it actually lives — the old, wordless conviction that your limits disqualify
    you from being loved — and stay there long enough to see it plainly for what it
    is. What changes isn''t the shame disappearing. What changes is that you can hold
    the boundary and the shame in the same hand, and draw the line anyway.


    This stays on the ground, and it stays secular. No worksheets, no gratitude lists,
    no "speak your truth" that treats decades of silence like a missing skill. It
    will not promise to dissolve the shame — it''s been building for a long time and
    it won''t lift because a book disagreed with it. It will not turn you into someone
    who states her needs cleanly and never once wonders whether she''s allowed to
    have them.


    What it hands you is language for what''s actually in the way — "this isn''t weakness,
    this is shame I''ve carried a long time" — so the unsayable thing finally becomes
    sayable, even with your voice shaking.


    Your limits were never the flaw. You can say the thing out loud and let it be
    true.'
