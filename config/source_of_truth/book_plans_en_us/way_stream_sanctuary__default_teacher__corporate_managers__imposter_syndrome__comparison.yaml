title: 'The Seat You Earned: Measuring Yourself Against Everyone'
subtitle: A Real Talk Guide to Imposter Syndrome for Managers
cover_tagline: Everyone in the room looks like they belong. So do you. That's the
  part you can't see.
description:
  short_blurb: You measure your own competence against people who look effortless,
    and you always come up short — because you're comparing your doubt to their surface.
    This book is about how comparison feeds the feeling that you don't belong in your
    own role. No confidence hacks. Just a clear look at the impossible scoreboard
    you've been losing on.
  long_description: 'You''re in the leadership meeting and everyone else seems to
    have the answer before you''ve finished reading the slide. They speak in clean
    sentences. They don''t hedge. And you sit there certain that you''re the one who
    slipped through, the one who''ll eventually be found out — and the proof is right
    there in the room, in how much more they look like they belong. That comparison
    is the engine of the whole feeling, and it''s the thing this book takes apart.


    This is for the manager who got the role, does the role, and still privately believes
    everyone else is more qualified to hold it. You don''t doubt your work in the
    abstract. You doubt it the instant you set it next to someone who looks more certain,
    more polished, more native to the seat. The gap feels like data. It feels like
    the truth finally showing itself. It''s neither.


    Recognition first: comparison hands the impostor feeling its favorite weapon —
    your own visible doubt against everyone else''s invisible doubt. You see their
    composed exterior and your unedited interior, and you read the difference as a
    difference in belonging. But you have no access to their 2am, their second-guessing,
    their certainty that someone else in the room is the real one. You''re scoring
    a game where you can only see your own mistakes.


    Then we go down into it instead of papering over it. We get specific about the
    moment of measurement — who you compare yourself to, when, and what it actually
    feels like to decide, again, that they''re the genuine article and you''re the
    fluke. Not to argue you out of it with a list of your accomplishments. To stay
    in it long enough that you stop treating someone else''s surface as the standard
    you''re failing to meet.


    What you come back with isn''t certainty that you belong. It''s the ability to
    catch the comparison as it happens and recognize that you''re stacking your full
    inside against their edited outside. That catch is the loosening. The fraud feeling
    needs the scoreboard, and the scoreboard was rigged from the start.


    This book will not make you feel qualified or hand you a routine to ''build confidence.''
    It won''t promise the impostor voice goes quiet. You''ll still walk into rooms
    where everyone looks surer than you. You''ll just stop accepting that as a verdict
    on whether you earned your seat.


    You are allowed to belong here while still feeling like you don''t. The feeling
    was never the measurement.'
