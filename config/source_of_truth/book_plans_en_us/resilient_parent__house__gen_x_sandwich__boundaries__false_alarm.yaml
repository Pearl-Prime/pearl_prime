title: Before You Even Say No
subtitle: For the sandwich-generation parent whose whole body braces the second the
  phone lights up — when the alarm goes off before there's anything to be afraid of
cover_tagline: Your shoulders rose before you read the message. That's the false alarm,
  not the emergency.
description:
  short_blurb: You feel the dread before you know what it's about. Mom's name on the
    screen, your kid's door clicking shut, a text you haven't opened yet — and already
    your stomach has dropped and your jaw has set. This is a book for the parent whose
    body sounds the alarm long before there is anything to actually decide.
  long_description: 'The phone lights up with your mother''s name, and your whole
    body braces before you''ve even read the words.


    You know this feeling. Not the emergency itself — the bracing for one. The held
    breath in the driveway before you go inside. The way your shoulders climb when
    you hear footsteps on the stairs. You are not afraid of any single thing. You
    are afraid all the time, of nothing you can name, because for years now the next
    ask has always been coming, and your body learned to stay ready.


    This book is for the sandwich-generation parent caught between a parent who is
    fading and a child who still needs you, the one whose alarm never quite goes quiet.


    You''ll come to recognize the false alarm for what it is. How the dread arrives
    before the request does — and how you say yes just to make the dread stop, not
    because you ever decided to. How ''are you okay?'' from your mother lands in your
    chest like something sounding. How you brace for the blow-up that, most days,
    never comes. How the line you meant to draw dissolves the instant your body floods,
    because you can''t think clearly with the dread roaring. You''ll feel the cost
    of living pre-flinched, always one ask ahead of yourself. And slowly, in the warm
    middle of these pages, you''ll find the quiet underneath the alarm — the still
    pocket where you can tell a real emergency from an old echo, and answer from there
    instead.


    This book will not teach you to silence your feelings or to stop caring. It will
    not promise that the next call won''t come. There is no script here that makes
    you untouchable, no five-step system that makes the dread go still for good. That''s
    not the point. The point is the half-second you get back — between the phone lighting
    up and your hand reaching for it — where you remember the choice was always yours.


    Nothing here asks you to do more. You are already doing everything. This is the
    few stolen minutes where you get to do less, and find out you were never actually
    in danger.


    You''re allowed to feel the alarm and not obey it.


    Book 1 of the Stolen Moment Press boundaries series.'
