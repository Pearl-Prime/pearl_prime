title: Always Scanning the Room
subtitle: For the nurse whose eyes never leave the monitor — when the part of you
  that watches for danger has forgotten how to stand down
cover_tagline: You're off the clock. Your body never got the memo.
description:
  short_blurb: Years of catching the subtle change before the alarm sounded trained
    a part of you to scan, to brace, to watch for the thing about to go wrong, and
    it doesn't switch off when you leave the unit. This is a book for the nurse whose
    body is still on duty. It is written to help that watchful part feel, at last,
    that it is allowed to rest.
  long_description: 'You can feel it the moment you walk into any room: the exits,
    the faces, the one thing that''s off. At work it''s a gift — you caught the sat
    dropping before the monitor did, you read the family before they spoke, you knew
    which patient would be the long night. But the scanning doesn''t end at the time
    clock. It comes to the grocery store, the dinner table, the bed where you lie
    listening to a house that''s perfectly fine.


    This book is for the floor nurse whose nervous system never goes off duty — the
    one who startles at a phone buzz like it''s a code, who can''t relax in a quiet
    room because quiet, on the unit, always came before something. The hypervigilance
    that keeps your patients safe has quietly turned itself on you, and a part of
    you has been standing watch so long it has forgotten there was ever another way
    to be.


    Gently, you''ll come to know that watcher for what it is: not paranoia, not a
    problem to fix, but a part of you that learned the floor never forgives the nurse
    who looks away — and took the job of keeping you safe so seriously it never clocks
    out. You''ll feel where it lives in the body: the eyes that won''t soften, the
    breath held high in the chest, the back that won''t fully lean against the chair.
    And slowly, you''ll offer that watchful part the one thing it has never been given
    — the felt evidence that, right now, in this room, there is nothing it has to
    catch.


    There is no forcing here. No demand to drop your guard, no exposure that floods
    you, no protocol to white-knuckle through. The practices are quiet and small —
    for the locker room, the drive home, the moment before sleep — and they work by
    letting the body discover safety, not by ordering the mind to feel it.


    This book will not promise to switch the watcher off, and it would be a lie to
    try. The scanning kept you alive on hard nights; it deserves respect, not eviction.
    What it offers instead is rest in shifts — moments where the part that watches
    can finally set the weight down, lean back, and let the ground hold you while
    nothing at all goes wrong.


    You are allowed to stop guarding for a while. The room is safe, even on the nights
    your body has forgotten how to believe it.


    Book 2 of the Felt Sense Publishing somatic healing series.'
