title: More Than You Can Hold
subtitle: When you're the one every deadline, every direct report, and every fire
  routes through — and there's no room left to think, let alone breathe
cover_tagline: It isn't that you can't cope. It's that there was never any room left
  to.
description:
  short_blurb: The inbox refills faster than you can clear it. Three people need a
    decision, and you haven't finished the thought from the last one. This is a book
    for the manager who has run out of room, not for the one who needs to try harder.
  long_description: 'It usually arrives before the day even starts. You open your
    eyes and the day is already full — the standup, the escalation that didn''t resolve
    overnight, the three people waiting on you, the report you promised yourself you''d
    finish this time. By the time you sit down, you''re already behind, and you stay
    behind until the lights go out.


    This is the overwhelm that has nothing to do with weakness. You are not failing
    to cope. You are a capable person who has simply been handed more than any one
    mind can hold at once, for so long that holding it has become the only thing you
    know how to do.


    This book is for the manager who absorbs the overflow. The one everyone routes
    their problems through. The one who can''t tell anymore whether they''re tired
    or just permanently braced for the next thing arriving before the last one has
    landed.


    Here, you''ll come to recognize overwhelm not as a character flaw but as a simple
    matter of capacity exceeded — too much, arriving too fast, with no pause built
    in to let any of it settle. You''ll see how the flood feeds on itself: how an
    overfull mind loses the very spaciousness it needs to decide what actually matters,
    so everything starts to feel equally urgent, equally yours. You''ll notice the
    moment in your own day when the water rises past the banks, and you''ll learn
    what it feels like to step back from the edge of it, even briefly.


    This book will not hand you a system to process your life faster. It will not
    teach you to optimize your calendar or batch your worries or do more in less time.
    The problem was never your throughput. The problem is that there has been no room
    — and no system has ever made room by demanding more.


    What it offers instead is something quieter: permission to stop treating your
    own depletion as a backlog to clear. A way of setting one thing down without first
    earning the right to. The understanding that the space you keep waiting to find
    on the other side of all this was always meant to be made now, in the middle of
    it, not after.


    You are allowed to put something down. You don''t have to hold all of it. You
    never did.


    Book 1 of the Stillness Press burnout series.'
