title: Everyone Else Looks Like They've Got Runway
subtitle: For the high-achiever measuring their panic against everyone who seems calm
  and ahead — and always coming up behind
cover_tagline: They all look like they're handling it. You're sure you're the only
  one who isn't.
description:
  short_blurb: Everyone on the timeline looks calm and ahead — the funding announcements,
    the promotions, the colleagues who seem to carry it all without flinching — and
    you're sure you're the only one quietly coming apart. This is a steadying book
    for the high-achiever caught in comparison, and a way to stop measuring your inside
    against everyone else's outside.
  long_description: 'Open the app and they''re all there. The funding announcement.
    The promotion post. The peer who just exited, the one who never seems rattled
    in the meeting, the friend whose life looks composed and rising while yours feels
    like it''s quietly coming apart. You scroll, and the gap opens up — the certainty
    that everyone else has figured out something you missed, that they''re ahead,
    that they''re fine, and that you are the only one bracing through the day with
    your heart in your throat.


    This is a book for the mind that measures itself against everyone else and always
    comes up short.


    In tech and finance, comparison isn''t a personal weakness — it''s the water you
    swim in. Everything is a ranked list. Everything has a number, a multiple, a percentile.
    You were trained to benchmark, to find where you stand on the curve, and that
    instrument is so sharp and so automatic that you turn it, without meaning to,
    on yourself — pricing your own worth against the highlight reels of people whose
    private 2am you will never see. They look like they''ve got runway. You feel like
    you''re burning yours down. But you''re comparing your inside to their outside,
    and that race was never one you could win.


    You''ll come to recognize comparison''s whole family. The body braced because
    everyone else seems unbraced. The flood of everyone''s wins arriving at once.
    The spiral that turns one scroll into an hour of self-indictment. The shame that
    says the gap is proof of your defect. The grief for a time before you measured
    yourself this way. The watcher endlessly scanning the field to see who''s gaining
    on you.


    This book will not help you win the comparison — and that''s the point. It will
    not teach you to benchmark harder, optimize your standing, or finally get ahead
    enough to feel safe, because no number on that curve has ever made the bracing
    stop. It will not promise you''ll come out on top. What it offers instead is the
    harbor: a way to put down the instrument you''ve aimed at yourself, to stop pricing
    your life against the surface of everyone else''s, and to find the still water
    that isn''t ranked against anyone at all.


    You are not behind. You are comparing a storm you can feel to harbors you can
    only see from the outside. You are allowed to stop measuring, and simply come
    in.


    Book 6 of the Harbor Line Books anxiety series.'
