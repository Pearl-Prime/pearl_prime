title: Carrying the One You Couldn't Save
subtitle: For the nurse who has quietly convicted herself for an outcome that was
  never hers to control
cover_tagline: You weren't covering a mistake. You were covering yourself.
description:
  short_blurb: You learned a long time ago that if you were good enough, fast enough,
    careful enough, no one would look too closely and find you out. So you armored
    up and you never set it down. This is the book for the nurse who has spent a whole
    career proving she deserves to be kept, and is so tired of holding the line.
  long_description: 'It''s after midnight and you are still at the computer, charting
    a patient who was discharged hours ago, checking a number you already checked,
    because some part of you is certain that the day you let go is the day it all
    comes apart. You are not behind. You are bracing. You have braced for so long
    you have forgotten it is a thing your body is doing and not simply who you are.


    This book is for the registered nurse who learned, early and somewhere deep, that
    something is wrong with her, and that the way to stay safe is to cover it. You
    cover it with competence. With being the one who never drops the ball, never needs
    the break, never asks. You wear the armor onto the floor and you do not take it
    off in the parking lot, or at the kitchen table, or in the dark. And underneath
    all of it sits a quiet verdict you have never said out loud: that if anyone saw
    the real you, the unfinished you, you would not be forgiven.


    Here you will come to recognize the shape of that armor and what it has cost to
    carry. You will see how the over-functioning that everyone praises is the same
    thing that is hollowing you out from the inside. You will meet the moment a mistake
    — yours, or one you only feared — became proof of the flaw instead of simply a
    thing that happened. And slowly, in the body rather than the head, you will feel
    something your performance has been standing in for all along: that your worth
    was never the thing on trial.


    This is not a book about becoming a better nurse. It will not teach you to armor
    more efficiently or to forgive yourself on a schedule. There is no fix here, because
    you were never broken, only buried. In the language of this work, the root has
    been feeding the surface for so long that the well ran low. We are not going to
    drive you harder. We are going to let the ground hold what you have been holding,
    until the breath reaches all the way down again and something long blocked begins,
    quietly, to flow.


    Nothing here will make you worth keeping. You already are. That is the part the
    armor was built to hide.


    You can set it down now. Not all at once. Just enough to feel the floor underneath
    you.


    Book 1 of the Root & Meridian Press self worth series.'
