title: The Body That Won't Trust a Quiet House
subtitle: For the nurse whose vigilance keeps patients alive and then follows her
  home — a body braced at 3 a.m. over rooms where nothing, tonight, is wrong
cover_tagline: The shift ended hours ago. Something in you is still on watch.
description:
  short_blurb: You're home. The lights are off. And some part of you is still reading
    the room for the thing that's about to go wrong. The scanning that keeps your
    patients alive doesn't switch off when you walk out the doors — it turns inward,
    onto your own body, your own night. This is a book for the watcher in you that
    has forgotten how to stand down.
  long_description: 'There''s a part of you that never sleeps. It learned, somewhere
    in your first hard years on the floor, that catching the change early is the whole
    job — the subtle shift in color, the number trending the wrong way, the quiet
    before the crash. So it watches. It reads every room. It catches everything.


    And then your shift ends, and it doesn''t.


    Now you''re home in the dark, lying still, and the watcher is still on duty —
    only there are no monitors here, no patients, so it turns the scanning onto you.
    It tracks your own heartbeat and finds it too fast. It listens to the house. It
    rehearses what could go wrong tomorrow. It mistakes your own settling body for
    a warning sign and braces all over again. You are exhausted and you are wide awake,
    because some part of you is convinced that the moment you stop watching is the
    moment something slips.


    This is a book for the floor nurse whose hypervigilance has become the background
    hum of her whole life — at the bedside where it belongs, and at 3am where it does
    not. It''s for the one who can''t lower her guard even when there is nothing left
    to guard, who monitors threats that never come, who has forgotten what it feels
    like to be off the clock inside her own skin.


    You''ll come to recognize the watcher as something that was built to keep people
    alive — yours and theirs — and that does not know, on its own, how to step down.
    You''ll feel where it lives in the body: the held breath, the eyes that won''t
    soften, the alertness sitting just behind the sternum. And slowly, in the dark
    room where you are actually safe, you''ll learn what it is to let that part of
    you set its watch down for a few minutes at a time — to let the floor hold what
    you''ve been holding, and trust that nothing crashes when you do.


    This book will not make you less careful at work. It will not optimize your sleep
    or train your vigilance into a skill. It won''t tell you to simply relax, as if
    the watching were a habit and not a thing your body learned to survive. It asks
    only that you let the guard come down a little, here, where no one is coding,
    where the night can hold the watch for a while instead of you.


    You are allowed to stop scanning. Not forever. Just for now, in the dark, where
    it is finally safe to close your eyes.


    Book 2 of the Night Architecture Books somatic healing series.'
