title: It Only Feels Like a Cliff
subtitle: For the early-career heart that braces for danger every time it's about
  to be brave — when sending one email feels like stepping off an edge
cover_tagline: Your body is sounding the alarm. There is no fire.
description:
  short_blurb: You're about to do the brave thing — hit send, raise your hand, post
    the work — and your whole body floods like you're in danger. You're not. This
    is a book about the alarm that fires when there's nothing actually wrong, and
    how to take the step anyway, while your hands are still shaking.
  long_description: 'Your thumb is over the button. The message is fine — you''ve
    checked it nine times. But your heart is going like you''re about to walk into
    traffic, and some old part of you is certain that if you press send, something
    terrible happens.


    It won''t. It only feels like a cliff.


    This book is for the early-career creative or knowledge worker whose body treats
    every brave move like a threat to survival. You ask for the raise and your chest
    seizes. You pitch the idea and your voice goes thin. You apply for the thing you
    actually want and your stomach drops as if you''ve already been caught doing something
    wrong. You''ve started to believe you''re just not built for this — that braver
    people don''t feel the dread you feel.


    They do. You''ve just never been told what the dread actually is.


    Here you''ll come to recognize the false alarm for what it is: an old warning
    system doing its job too well, firing full-blast at an email when it was built
    for actual danger. You''ll learn the difference between a body that is in trouble
    and a body that is only bracing. You''ll feel where the alarm lives, what sets
    it off, and how it tries to keep you small in the name of keeping you safe. And
    you''ll find the one thing this brand believes more than any other — that courage
    was never the absence of the alarm. It''s the step you take while it''s still
    ringing.


    This book will not make the fear stop. It won''t optimize your nervous system
    or hand you a morning routine that finally fixes you. There is nothing here to
    fix. The alarm is not a defect; it''s a smoke detector that loves you and can''t
    tell toast from a house fire. You don''t need to silence it. You need to stop
    letting it have the final word.


    So here is your permission: you are allowed to be terrified and do it anyway.
    You are allowed to send the email with cold hands. The shaking is not a sign you''re
    failing. It''s the sign you''re standing at an edge that matters — and the smallest
    step, taken before you feel ready, is still the whole of courage.


    Book 1 of the Ember & Ash Publishing courage series.'
