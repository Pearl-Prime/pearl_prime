title: Replaying What You Said in Class
subtitle: For the student stuck in the 2am loop — when one comment in a seminar becomes
  a thousand reasons everyone now knows you're a fraud
cover_tagline: One thing you said. Replayed until it means you don't belong.
description:
  short_blurb: You said one thing in the seminar and now it's 2am and you've replayed
    it four hundred times, each loop adding fresh proof you've been exposed. This
    is a book about the spiral — one thought becoming a thousand — and how to step
    out of a loop that feeds on itself.
  long_description: 'You said one thing in class today. A half-formed answer, a question
    that came out wrong, a comment nobody else even remembers. And now it''s the middle
    of the night and you''ve replayed it four hundred times, and every replay adds
    something — a worse interpretation, a face you think you saw, more proof that
    this is the moment everyone finally clocked that you don''t belong.


    That''s the spiral. One thought goes in, and instead of passing through, it loops.
    It picks up speed. It pulls in everything else you''ve ever gotten wrong, and
    the more you think about it the worse it gets, and you can''t tell anymore whether
    you''re solving something or just drowning in it.


    This book is for you — the one whose mind won''t stop replaying. The student who
    lies awake re-running the conversation, who reads a one-word reply from a professor
    a hundred ways, who treats every awkward second as evidence in a case against
    yourself. You''re not overthinking because you''re weak. You''re caught in a loop
    that''s designed to feel productive while it eats you alive.


    The cruel trick of the spiral is that it feels like responsibility. It tells you
    that if you just think it through one more time, you''ll find the angle that makes
    it okay, or at least catch the disaster before it lands. So you keep going, past
    midnight, past tired, because stopping feels like letting your guard down. But
    the loop was never going to deliver. It doesn''t end with an answer. It ends when
    you finally fall asleep mid-thought and wake up with it still going, like a tab
    that kept playing audio all night.


    You''ll come to recognize the spiral the moment it starts turning — that pull
    where one thought becomes the next and the next. You''ll learn why the loop feels
    like figuring it out when it''s really just circling, and why you can''t think
    your way to the bottom of a thought that keeps regenerating. You''ll find what
    it''s like to put the phone face-down, notice the breath you''re actually taking,
    and let the loop keep spinning without climbing back on.


    This won''t give you a clear mind that never spirals again. It won''t argue you
    out of every thought or hand you the one reframe that ends rumination forever.
    You can''t out-think a loop, and trying is how you stay in it.


    What''s true is that the spinning is not the same as the truth. The thing you
    said was fine. The case against you was never real. And you''re allowed to step
    off the loop, put your feet on the floor, and let the night be quiet again.


    Book 3 of the Present Tense Books imposter syndrome series.'
