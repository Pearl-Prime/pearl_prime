title: The One Who's Secretly Failing
subtitle: For the parent who is sure everyone else has it together — and that if anyone
  looked closely, they'd see what's wrong with you
cover_tagline: 'You overwork to hide it: the quiet belief that something is wrong
  with you.'
description:
  short_blurb: 'Underneath the anxiety is a quieter belief: that something is wrong
    with you, and you have to work twice as hard so no one finds out. This is a tender
    book for working parents carrying secret shame — and a way to set down the defect
    you''ve been hiding and let yourself be held as you are.'
  long_description: 'You keep it hidden well. The packed schedule, the answered emails,
    the kids who look fine in the photos — all of it covering a belief you''d never
    say out loud: that something is wrong with you. That other parents have something
    you''re missing. That your anxiety isn''t just stress, it''s proof — evidence
    of the flaw you''ve spent years working hard enough to keep anyone from seeing.
    So you overdeliver. You apologize too much. You lie awake certain that one day
    they''ll all find out.


    This book is for the working parent who carries shame underneath the worry. Not
    guilt about a thing you did — the deeper, older ache that says the problem is
    you. You are not actually defective, and you are not the only one hiding this.
    You learned, somewhere far back, that love had to be earned by being good enough,
    and you have been paying that toll ever since, in a currency that never runs out.


    Here you''ll come to recognize how shame moves underneath the anxiety. How it
    hides in the overwork, the perfectionism, the desperate keeping-up. How it convinces
    you the exhaustion is the price of being acceptable. You''ll feel where it lives
    in your body — the collapsed chest, the held breath, the face that won''t quite
    meet the mirror — and you''ll begin to let the ground hold the part of you that
    has always felt too much, too needy, not enough. Not by fixing the flaw. By discovering
    there was no flaw to fix.


    This is not a book about building confidence or affirming your way to worthiness.
    You can''t out-perform shame; you''ve been trying, and it only asks for more.
    There is nothing here to push through and no better version of you to finally
    become. What''s here instead is gentler: a way to bring the hidden belief into
    the light without it destroying you, to stop overworking to cover a defect that
    was never there, and to let yourself be met — tired, imperfect, ordinary — and
    held anyway.


    You do not have to earn the right to be here. You were never the problem. The
    belief that you were is the wound, and it can be set down. The ground does not
    ask you to be good enough first. It just holds you. It was always willing to hold
    you, exactly as you are.


    You''re allowed to stop hiding now.


    Book 4 of the Held Ground Press anxiety series.'
