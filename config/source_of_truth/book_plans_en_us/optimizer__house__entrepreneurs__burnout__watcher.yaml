title: Still Working in the Dark Before Dawn
subtitle: For the founder whose mind keeps running the company in the hours that should
  be rest
cover_tagline: The watching kept the company alive. It's been quietly killing the
  person who runs it.
description:
  short_blurb: The laptop is closed but you're still on. Some part of your mind is
    always scanning — the next fire, the next failure, the thing you missed — running
    threat checks at dawn for dangers that never come. This is a book for the founder
    who can't get off duty, and a way back to a morning where your mind is finally
    allowed to stand down.
  long_description: 'It''s not even six and you''re already scanning. The laptop is
    closed, the house is quiet, no one needs anything yet — and still some part of
    your mind is sweeping the horizon for the next fire. The deal that might fall
    through. The hire who might quit. The number that might be down. The thing you''re
    certain you''ve forgotten. You are never not on duty, even now, even here, in
    the one hour that''s supposed to be yours.


    This book is for the founder whose burnout isn''t sluggishness but the opposite
    — a mind that never powers down, a watcher that keeps running long after the work
    is done. You built this hypervigilance for a reason. In the early days, catching
    every threat first was how the company survived, and you got very good at it.
    But the watcher doesn''t know the emergency is over. It scans at dawn the way
    it scans at midnight, monitoring for dangers that almost never come, and it''s
    been quietly exhausting the person it''s trying to protect.


    Here you''ll come to recognize the watcher as a part of you, not the whole of
    you — a guard you trained and then forgot to relieve. You''ll see how staying
    scanned and braced became your normal, until calm itself started to feel unsafe,
    like dropping your guard would let something through. You''ll learn what it feels
    like to notice the scanning without obeying it, to let the horizon stay quiet
    for one breath, and to discover that the company does not, in fact, fall apart
    when you stop watching it for sixty seconds.


    This is not a productivity book, and it is not a discipline. There is no system
    here for monitoring smarter, no framework for staying ahead of every risk, no
    optimization that turns your vigilance into a sharper weapon. Nothing here will
    help you scan better, because better scanning is not what you need — what you
    need is permission to let the watch end.


    You are allowed to be off duty. You are allowed to wake into a morning where nothing
    is wrong yet, and to let it be quiet before the inbox tells you otherwise. The
    watcher will still be there. But you can teach it, gently, that the sun is up
    and it can rest.


    Book 3 of the Daybreak Editions burnout series.'
