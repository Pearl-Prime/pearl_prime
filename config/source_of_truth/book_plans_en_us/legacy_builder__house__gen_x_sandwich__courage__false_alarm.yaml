title: The Alarm That Cried Cliff
subtitle: For the sandwich-generation caretaker whose body sounds the danger bell
  at every hard conversation — and the quiet art of stepping toward an edge that was
  never really a drop
cover_tagline: Your body keeps bracing for a fall that isn't coming.
description:
  short_blurb: Your hand is on the phone, the number is right there, and your whole
    body floods like you're about to step off a ledge. But the only thing waiting
    on the other end is a conversation. This is a book for the caretaker whose nervous
    system can no longer tell the difference between a real threat and a hard moment
    — and who is ready to learn the difference one small step at a time.
  long_description: 'You know the feeling before you have words for it. The phone
    is in your hand. The number is right there. And before you''ve said a single word,
    your chest tightens, your stomach drops, and some old part of you braces as if
    you''re standing at the very edge of a cliff. Then you put the phone down, and
    tell yourself you''ll do it tomorrow.


    There was no cliff. There never was. There was only a conversation you''ve been
    carrying for months — with your father''s doctor, with your sister about the money,
    with the boss who keeps passing you over. But your body didn''t get the memo.
    Somewhere along the way, holding everyone together taught your nervous system
    to treat every hard thing like a fall you might not survive.


    This book is for you: the one in the middle, with a parent who needs you on one
    side and a child who needs you on the other, who has become so good at scanning
    for danger that the alarm now goes off at the wrong things. You''re not a coward.
    You''re not broken. You are a deeply sensitive early-warning system that has been
    on watch for years, and it has started mistaking the ordinary edges of a brave
    life for ledges.


    You''ll come to recognize the false alarm for what it is — a body trying to protect
    you from a threat that lives only in the bracing. You''ll see how the flood arrives
    before the facts, how you''ve been reading your own racing heart as proof of danger
    instead of proof of caring. And you''ll learn what it feels like to take one honest
    step while the alarm is still ringing — to make the call, say the sentence, sign
    the form — and to watch the ground stay solid under your feet.


    This book will not switch off your alarm, and it will not teach you to feel ready.
    There is no breathing trick here that erases the dread, no morning routine that
    makes you fearless by Friday. The body will keep crying cliff. The work is not
    to silence it. The work is to step anyway, gently, and let the years of safe landings
    slowly teach it the truth.


    You are allowed to be afraid and to move at the same time. You always were. The
    edge you''ve been avoiding is not a drop. It''s just the next part of the climb
    — and you are far more ready than your body believes.


    Book 1 of the Second Mountain Press courage series.'
