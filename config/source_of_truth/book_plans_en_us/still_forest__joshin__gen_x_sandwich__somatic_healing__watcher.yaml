title: Listening for the Fall in the Night
subtitle: For the body that never goes off duty — scanning down the hall for the emergency
  that hasn't come, and won't stop coming
cover_tagline: Even asleep, you are still listening.
description:
  short_blurb: Part of you is always on watch — for the parent who might fall, the
    phone that might ring, the thing that might go wrong while your back is turned.
    This is a still book for the caretaker whose body has forgotten how to stand down.
    It will not tell you to stop caring. It will help you find the place beneath the
    watching where the forest is already quiet.
  long_description: 'You sleep with one ear open. You have for years now. Some part
    of you is always listening down the hall, toward your parent''s room, toward your
    teenager''s silence, toward the phone that might light up with the next thing
    to handle. Even when nothing is wrong, you are scanning for the moment it will
    be — bracing for the fall, the call, the crisis you have trained yourself to catch
    before it lands. The watching never fully stops. It just gets quieter, and then
    it gets so familiar you forget it''s there.


    This book is for you. For the one in the sandwich years, holding an aging parent
    on one side and growing children on the other, whose body has become a watch that
    never gets relieved. You are the one who notices first. The one who hears the
    change in a cough, reads the room before anyone speaks, keeps a running map of
    everyone''s needs in the back of your mind so nothing slips. It has kept your
    people safe. It has also kept your body on permanent alert, shoulders raised,
    eyes moving, never all the way home.


    Under the canopy, where the light comes down soft and the path slows your step,
    you will come to recognize the watcher for what it is. Not paranoia. Not a flaw.
    It is love that learned to keep watch, vigilance that was once needed and never
    told it could rest. You will feel where the watching lives in your body — the
    tightness behind the eyes, the breath held high in the chest, the muscles that
    stay ready even in sleep — and you will be shown how to let the watcher sit down
    for a while, not by forcing the guard to drop, but by letting the deep quiet of
    the forest do the watching for you.


    This book will not ask you to stop loving the people you watch over. It offers
    no trick to switch the vigilance off, no app to track your calm, no routine to
    optimize a worn-out mind into efficiency. The pool does not go clear by being
    commanded. It goes clear when the stirring stops.


    What these pages offer is a place to set the watch down — for an hour, for a breath
    — and trust that the forest floor has held what falls long before you arrived,
    and will go on holding it. The patient roots have kept their own watch for a hundred
    years. You were never meant to do it alone, or awake, forever.


    You can rest. The listening will still be there. It does not need you bracing
    for it to do its work.


    Book 2 of the Still Forest Press somatic healing series.'
