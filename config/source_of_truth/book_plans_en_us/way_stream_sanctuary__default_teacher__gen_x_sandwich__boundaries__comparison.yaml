title: 'The Line You Never Drew: Measuring Yourself Against Everyone'
subtitle: How the Sandwich Generation Are Rewriting the Rules of Setting Boundaries
cover_tagline: Everyone else seems to hold the line. You're the one who folds.
description:
  short_blurb: You measure your boundaries against people who don't carry what you
    carry, and you always come up short. This is a book about the line you keep failing
    to draw because you're comparing yourself to the wrong people. It won't make you
    better at saying no. It will show you why you've been keeping score against a
    game nobody else is playing.
  long_description: 'It happens in the parking lot after the family dinner, or in
    the car outside your kid''s school, or at 11pm scrolling through someone''s tidy
    little post about "protecting their peace." You think: how does everyone else
    hold a line I can''t even find? Your sister says no without flinching. The mom
    at pickup somehow has time. Somebody on your feed just announced she''s "stepped
    back to focus on herself," and you can''t remember the last hour that belonged
    to you.


    This book is for you — caught in the middle, aging parents on one side, kids who
    still need you on the other, a job that doesn''t pause for either. You''re not
    bad at boundaries. You''re worn down from measuring yourself against people who
    were never carrying your load in the first place, then reading the gap as a verdict
    on you.


    Recognition comes first: you''ll learn to catch the exact moment the comparison
    fires — the half-second where someone else''s life looks clean and yours looks
    like a failure of will. Then you go down into it, because that''s the only way
    through. Not the surface part, where comparison just stings. The part underneath,
    where you quietly decided that everyone else got issued some manual on being a
    person and your copy went missing. You''ll sit with that conclusion instead of
    sprinting past it to the next thing on your list. And then you come back up changed
    — not with a sharper no, but with the comparison loosened, so the line you draw
    is finally yours and not a tracing of someone else''s.


    This is plain talk, not a pep rally. No worksheets. No five-step framework for
    the perfect boundary script. No morning routine that fixes your life if you''d
    just get up an hour earlier. It will not promise that you''ll stop comparing —
    that reflex is older than this book and won''t vanish because you read it. It
    will not optimize you into someone who holds every line effortlessly while running
    a household and a caregiving schedule and a job that all want more than you have.


    What it will do is name the thing happening in your chest when you scroll, in
    words plain enough to use the next time it happens. So the comparison still arrives,
    but it stops getting the final say on whether you''re allowed to stop.


    You were never behind. You were holding your own full plate up against other people''s
    photographs, which is a contest you were always going to lose. You can put the
    measuring stick down.'
