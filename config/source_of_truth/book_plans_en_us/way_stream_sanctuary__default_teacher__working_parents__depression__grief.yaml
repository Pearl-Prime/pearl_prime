title: 'The Weight Without a Name: The Grief That Doesn''t Leave'
subtitle: A Real Talk Guide to Overcoming Depression for Working Parents
cover_tagline: Nobody died. So why does it feel like a funeral you can't stop attending?
description:
  short_blurb: For working parents carrying a depression that feels less like sadness
    and more like a quiet, ongoing loss. This is a grounded, secular look at the grief
    that hides inside burnout — the version of yourself you don't have time to mourn.
    No fixing, no forced gratitude, just the words for what's actually happening.
  long_description: 'It''s 9:40 p.m. The dishes are done, the lunches are packed,
    the last email is sent, and you''re sitting in the dark of the kitchen feeling
    something you can''t quite name — not crying, not exactly sad, just hollowed out,
    like part of you has been quietly missing for a long time and you only notice
    when everyone else is asleep.


    This book is for the working parent whose depression doesn''t look like depression.
    You show up. You perform. You laugh at the right moments. And underneath it runs
    a low, gray weight that grief is the closest word for — because what you''re carrying
    isn''t only chemistry, it''s loss. The version of you who had energy. The career
    you paused. The marriage you used to have time for. The person you were before
    you became everyone''s everything.


    Writing as Hannah Stern, Waystream Sanctuary names it in plain language: the weight
    without a name is often unspoken grief wearing the mask of "I''m just tired."
    First you''ll recognize it — the difference between burnout and the deeper loss
    living inside it. Then you''ll go down into it instead of scheduling around it:
    the descent that working parents are taught to skip, because going down feels
    like a luxury you can''t afford with small humans depending on you. And then you
    come back up — not cured, not optimized, but able to hold the weight without drowning
    in it.


    This is real talk. No morning routines you''ll abandon by Wednesday. No gratitude
    lists that feel like lying. No spiritual bypass that asks you to be grateful for
    the thing that''s crushing you. Just the words for what''s happening in your body
    and your day — the heaviness behind your eyes at the morning meeting, the effort
    it takes to sound fine on the phone — in language you can actually reach for the
    next time the hollowness shows up at 9:40 again.


    It will not promise you''ll "bounce back." You''re not a ball. It won''t tell
    you to fix yourself between meetings. It will not pretend depression is a productivity
    problem with a productivity solution, or that the right app will finally make
    you feel like yourself.


    What it offers is recognition — the strange relief of finally having a name for
    the weight, and permission to grieve what parenting and working have quietly cost
    you without that making you ungrateful, a bad parent, or broken.


    You''re allowed to put it down for a moment. Even you. Even now.'
