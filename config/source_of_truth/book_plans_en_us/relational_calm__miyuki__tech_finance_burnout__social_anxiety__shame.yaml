title: They'll Find Out I'm Not Good With People
subtitle: For the high-performer who hides a private verdict — that beneath the competent
  surface, something about you is wrong, and the work is just cover
cover_tagline: You overwork the surface so no one reaches the thing you believe is
  wrong underneath.
description:
  short_blurb: 'On paper you are excellent. Privately, you carry a verdict: that you''re
    fundamentally bad at this, at people, at being a person in a room — and that your
    competence is just a screen you keep polishing so no one sees behind it. This
    book sits with that buried belief. It does not argue the belief away; it lets
    the belief finally be set down.'
  long_description: 'You replay the meeting at midnight. Not the work — the moment
    you went quiet, the joke you didn''t land, the second your face did something
    you couldn''t control. And underneath the replay sits an older, quieter sentence
    you have believed for so long it feels like weather: there is something wrong
    with me, and one day they will see it.


    This book is for the tech or finance professional who has built an impressive
    surface over a private verdict. You deliver. You''re trusted with the hard problems.
    And you are quietly certain it''s a cover story — that the real you is awkward,
    too much or not enough, bad with people in some way that can''t be fixed, only
    hidden. So you overwork the surface. You let the output speak so you don''t have
    to. You mistake the silence for safety.


    You will come to recognize the shape of the shame. The way you flinch at warmth
    because it might reach the wrong room. The way a compliment slides off and a slight
    sinks in. The way you''d rather be seen as cold than be seen as trying and failing
    to belong. You will see how the hiding became a full-time job — and how exhausting
    it is to defend a self you''ve already decided is defective.


    Sit with that for a moment, because most of us never do. The verdict has been
    running underneath everything for so long that it has never once been set on the
    table and looked at in plain light. When you finally do, something quiet happens.
    It stops looking like a fact about you and starts looking like an old sentence
    you were handed and never questioned.


    This is not a confidence program. It will not give you affirmations to repeat
    or a reframe to recite until the feeling submits. It will not tell you that you
    are amazing. What it offers is plainer and harder to argue with: a clear-eyed
    look at the belief itself, where it came from, and the quiet possibility that
    it was never true — that there is nothing underneath to find out, that the room
    was empty of the verdict all along, and you were the only one holding it.


    You do not have to fix what is wrong with you. You can set down the thing you''ve
    been carrying and notice that nothing collapses. The room stays. The people stay.
    You stay.


    Book 2 of the Bare Form Books social anxiety series.'
