title: The Shift Doesn't End When You Clock Out
subtitle: For the nurse lying awake in a body still braced for the call bell — when
  the alarm in your chest keeps ringing long after the floor went quiet
cover_tagline: Your body is still on duty. No one told it the shift is over.
description:
  short_blurb: You came home hours ago. Your nervous system did not. This is for the
    nurse who lies flat in the dark, exhausted and wide awake, a body still bracing
    for an emergency that already ended — and who is ready to let it finally stand
    down.
  long_description: 'You clocked out. You drove home in the dark. You lay down. And
    your body did not get the message.


    Your heart is going like you''re still on the floor. Your ears are still half-listening
    for the call bell. Somewhere under the bone-tired, a part of you is braced — for
    the rapid response, the bed alarm, the patient who crashes the second you sit
    down. There''s no emergency in this room. Tell that to your chest.


    This book is for the nurse whose body never learned where the shift ends. You
    are not anxious for no reason. You taught your body, shift after shift, to come
    all the way awake the instant something goes wrong — and a body that loyal does
    not let down its guard just because you''re finally lying flat. The false alarm
    that fires at 3am is not a flaw. It''s the same readiness that kept your patients
    alive, still keeping watch over an empty room.


    You''ll come to recognize the bracing for what it is — not danger, but a body
    that hasn''t yet been told it''s safe. You''ll feel the difference between a real
    alarm and an echo of one. You''ll learn what it is to let the weight of the day
    come down through you and into the ground, instead of holding it an inch off the
    bed all night long. You''ll find that you don''t have to fight your own body into
    stillness, or win some war against the part of you that kept everyone safe. You
    only have to let it know the call is over, and that the ground will take the watch
    from here.


    This is not a sleep protocol. There''s no checklist here you can fail, no hygiene
    rules to perform like one more care plan with your name at the top. Nothing in
    these pages will optimize you or fix you, because you were never broken. You are
    a person who has held the line for everyone else, lying in the dark, asking for
    solid ground beneath you.


    Here is the ground. The shift is over. You are allowed to come down off it now.
    The part of you still standing watch can set the weight down at last — the floor
    will hold it, and hold you, until morning.


    Book 1 of the Held Ground Press sleep anxiety series.'
