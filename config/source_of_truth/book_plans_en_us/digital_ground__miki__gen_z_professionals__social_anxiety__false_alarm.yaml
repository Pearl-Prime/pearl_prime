title: Nobody in This Room Is a Threat
subtitle: What your nervous system is actually doing in the standup — and why it keeps
  sounding the alarm when nothing is wrong
cover_tagline: Your body called it an emergency. It was just a Tuesday standup.
description:
  short_blurb: Your heart is going like you're in danger, and you're sitting in a
    meeting about the Q3 deck. The threat your body keeps screaming about never actually
    arrives. This is a book about the false alarm that fires in rooms full of perfectly
    ordinary people — and what changes when you finally hear it for what it is.
  long_description: 'Your hand is on the door. Through the glass, everyone is already
    seated, already laughing at something, and your body has decided this is an emergency.
    Heart fast. Chest tight. The specific dread of being looked at. You walk in and
    say hello and the alarm keeps blaring under your skin the whole time, even though
    nothing is happening. It is a meeting. It is a Tuesday.


    This book is for you — the one who is good at the work and undone by the room.
    Early in your career, quietly competent on Slack, articulate in a doc, and somehow
    ambushed every single time other people are physically present. You brace for
    the introduction, the small talk, the moment someone turns and asks what you think.
    The danger your body insists is coming never arrives, and still it readies you
    for impact like clockwork.


    What you''ll come to recognize is that the alarm is not a verdict on you. It''s
    an old system doing its oldest job badly — reading a roomful of coworkers as a
    roomful of threats, firing the same chemicals your ancestors needed for actual
    predators, on a conference call. You''ll learn to feel the difference between
    a real signal and a false one. You''ll start to notice the bracing before it runs
    the whole meeting. You''ll meet the doorway you keep freezing in and find you
    can simply stand in it, alarm and all, and walk through anyway.


    This is not exposure therapy with a friendlier face. There are no worksheets,
    no networking scripts, no ''just put yourself out there.'' Nothing here will make
    you a more confident personal brand, and nothing here treats your quiet as a defect
    to be patched before the next all-hands. We are not going to make the feeling
    stop on command. The body''s alarm doesn''t take orders, and pretending it does
    is half of what''s exhausting you.


    What this book offers instead is recognition you can carry into the room. A way
    to name what''s happening in the moment it happens — bracing for something you
    can''t name, in a place where nothing is actually wrong. Not so you can win the
    meeting. So you can be in it, with your nervous system, and stop reading its noise
    as proof that you don''t belong.


    You are not in danger. You never were. You''re allowed to find that out slowly,
    one ordinary room at a time.


    Book 1 of the Present Tense Books social anxiety series.'
