title: 'Setting Boundaries: Carrying What You Can''t Say (3)'
subtitle: Understanding How Shame Works in Your Body and Mind — and How to Release
  It — Boundaries for Gen X Sandwich (The Hidden Weight of Shame)
cover_tagline: You can't say the resentment out loud, so you carry it. It's getting
  heavy.
description:
  short_blurb: You love them. You'd do it again. And some nights you sit in the dark
    furious at your own parent, your own kid, and that fury feels like proof you're
    a bad person — so you swallow it and keep going. The boundary you can't draw is
    buried under a belief that wanting one means something is wrong with you. This
    is a one-hour reset for what you can't say out loud, and the shame that keeps
    you carrying it.
  long_description: 'There''s a thing you cannot say. Maybe it''s that you''re relieved
    when your mother''s call goes to voicemail. Maybe it''s that some part of you
    wishes your adult kid would just figure it out so you could finally exhale. The
    thought arrives, and right behind it comes the verdict: a good daughter wouldn''t
    feel that, a good parent wouldn''t think that, so you must be broken in some private
    way you''ll never confess to anyone. So you don''t draw the line. You carry the
    unspoken thing instead, and it gets heavier every year you refuse to set it down.


    This is for the person in the squeeze, aging parents on one side and kids who
    still need you on the other, who has quietly confused having limits with being
    selfish, and being human with being bad. You''re not cold. You''re not failing
    them. You''re carrying a load that would make anyone resentful, and then punishing
    yourself for the resentment on top of carrying the load.


    You''ll name the shame first, plainly: that buried belief that needing a boundary
    means something is wrong with you is a lie you absorbed somewhere, not a truth
    you discovered. Then you''ll go down into it rather than around it, into the specific
    things you''ve never said out loud, the resentment you''ve mislabeled as proof
    of your own defectiveness, the way you''ve kept the line undrawn because drawing
    it would mean admitting you have a limit, and admitting a limit has come to feel
    like confessing a crime. You''ll let the unsayable thing be true for one hour
    without it turning you into a monster. And you''ll come back lighter, not because
    the load got smaller, but because you stopped also carrying the verdict you''d
    stapled to it.


    This won''t reframe your resentment into gratitude or coach you toward becoming
    a more cheerful caregiver. You don''t have to feel better about any of it. The
    work isn''t to fix what you feel, it''s to stop believing that feeling it makes
    you a worse person.


    The line you never drew isn''t missing because you''re selfish. It''s missing
    because somewhere you learned that good people don''t have limits, and you''d
    rather quietly break yourself than risk being a bad one. You''re not a bad person.
    You''re a person at capacity who was never once allowed to say so. You can set
    it down, the resentment, the shame, the unsaid thing. None of it means what you''ve
    spent years being afraid it means.'
