title: The Ones You Couldn't Save
subtitle: For the nurse whose anxiety is grief that was never given room — making
  space for the losses you carried home and never set down
cover_tagline: You called the time and kept moving. The grief has been waiting for
  you ever since.
description:
  short_blurb: Some of your anxiety isn't fear of what's coming. It's grief for what
    already happened — the patients you lost, the goodbyes there was no time to feel,
    the losses you carried out of the room and never set down. This is a tender, body-based
    companion for the nurse whose body is holding mourning it was never given room
    to do. It won't rush you past it. It will help you finally let it move.
  long_description: 'You called the time, and then you charted, and then you went
    to the next room, because that is what the shift required. There was no pause.
    No space to feel the weight of what just happened. And so the loss went somewhere
    — it didn''t disappear — it went into your body, and it has been sitting there,
    under the anxiety, for longer than you''ve let yourself notice. The tightness
    in your chest some mornings isn''t only fear of the day ahead. Some of it is everyone
    you couldn''t bring back, still waiting to be grieved.


    This book is for the nurse carrying losses she never had time to mourn. The one
    who has held strangers'' families through the worst moment of their lives and
    never once been given the room to fall apart over her own accumulating goodbyes.
    You are not unfeeling, and you are not weak for still carrying them. The job demanded
    that you keep moving, and you did — but a body cannot be asked to witness loss
    after loss without somewhere to put it, and yours has been holding all of it,
    alone, in the dark.


    Here you''ll come to recognize how much of your anxiety is grief that was never
    given room — the ache that lives beneath the bracing, the throat that tightens,
    the tears that arrive at strange times for no reason you can name. You''ll learn,
    gently and slowly, that grief isn''t something to push through or get over; it''s
    something to let move through a body that''s been clenched against it. You''ll
    make space for the goodbyes you never got to feel, and you''ll discover that what
    you''ve been calling anxiety has, underneath it, been a kind of love with nowhere
    to go.


    This will not give you closure on a list. There is no protocol here to file your
    losses away, because they were never paperwork. It asks something tenderer: that
    you stop bracing against the grief and let it soften, let it surface, let it finally
    be felt — so it no longer has to keep knocking from inside your chest.


    Nothing here will help you move on faster. The moving-on-fast is what trapped
    it. What you''ve never been given is permission to stop, and grieve, and let the
    warmth come back. That is what this book is for.


    You are allowed to mourn them now. All of them. The grief was only ever the size
    of how much you cared.


    Book 5 of the Felt Sense Publishing anxiety series.'
