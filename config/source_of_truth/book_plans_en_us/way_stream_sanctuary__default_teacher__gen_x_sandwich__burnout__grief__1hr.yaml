title: 'After the Flame: The Weight You Carry'
subtitle: A One-Hour Burnout Reset for the Sandwich Generation
cover_tagline: You're not just tired. You're grieving a version of your life that
  isn't coming back.
description:
  short_blurb: You're holding your parents' decline in one hand and your kids' needs
    in the other, and somewhere underneath the exhaustion is a grief nobody has named
    for you. This one-hour reset stops trying to recharge you and lets you finally
    feel the weight of what you've been carrying. Not so you can fix it — so you can
    stop pretending it isn't there.
  long_description: 'It hits you in the car outside your mother''s place, or after
    the third call from the school, or at 11 p.m. when the house is finally quiet:
    a heaviness that sleep doesn''t touch. You call it burnout, but burnout is what''s
    on top. Underneath is something older and quieter — grief. For the parent who
    used to take care of you and now forgets your name. For the version of midlife
    you thought you''d get. For the person you were before you became the one everyone
    leans on.


    This is for you — the one in the middle of the sandwich generation, caught between
    aging parents and kids who still need you, running on fumes and guilt and a to-do
    list that never ends. You don''t need another productivity hack. You need someone
    to name the loss you''ve been too busy to mourn.


    This is a one-hour reset, and it moves in three honest stages. Recognition: you
    learn to tell the difference between tired and grieving, and to see how much of
    your exhaustion is unwept loss wearing the mask of fatigue. Descent: instead of
    pushing through, you go down into the weight — the resentment you''re not allowed
    to feel, the goodbye you''re saying in slow motion, the love tangled up with the
    dread. You let it be heavy, because it is. Integration: you come back up not lighter,
    exactly, but more honest. Carrying the same load with less of the secret war against
    it.


    This book will not tell you that you''re stronger for the struggle, or hand you
    a morning routine, or promise that if you just breathe right the weight disappears.
    The weight is real. The people you''re caring for are really declining, and no
    amount of reframing changes that. What changes is not the circumstance — it''s
    how alone you feel inside it, how much of you is braced against your own sadness,
    and how much energy you''ve been spending pretending you''re fine to everyone
    who counts on you.


    In plain, no-nonsense language you can actually use the next time the heaviness
    lands, you''ll get words for what''s happening in your chest, and permission to
    stop performing okayness for one hour. You don''t have to be grateful and exhausted
    at the same time. You don''t have to grieve quietly so no one worries, or wait
    for some permission that is never going to arrive. You''re allowed to set this
    down for sixty minutes and feel exactly how heavy it has been — not to wallow,
    but because something you won''t let yourself feel only gets heavier. Start here.'
