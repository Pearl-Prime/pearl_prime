title: 'The Number in Your Head: When Everything Is Too Much'
subtitle: A Field Guide for Professional Women Navigating Financial Anxiety
cover_tagline: When the spreadsheet, the rent, the future, and the group chat all
  hit at once.
description:
  short_blurb: You make decent money and still feel like you're drowning in it. This
    is for the professional woman whose financial anxiety isn't about one number but
    about all of them arriving at the same time. It won't hand you a budget — it'll
    teach you what to do when everything is too much at once.
  long_description: 'You''re in a meeting and your brain is somewhere else entirely:
    the card that got declined for a second, the loan balance, the savings account
    that looks nothing like everyone else''s, the cost of the life you''re supposedly
    building. It''s not one worry. It''s all of them, stacked, arriving at the same
    moment, and the sheer volume of it makes your chest tight and your thinking go
    flat. You earn well enough that you feel guilty for panicking — and that guilt
    is just one more thing on the pile.


    This book is for the professional woman who is not bad with money. You''re the
    one others assume has it handled. You have the salary, the title, the deposits
    hitting on schedule. What you don''t have is room — every dollar already has somewhere
    to be, every decision feels like it touches ten others, and the mental tabs never
    close. This isn''t ordinary worry about whether you can pay a bill. It''s the
    specific dread of being asked to feel everything at once: the now, the next month,
    and the version of your life thirty years out, all demanding your attention in
    the same breath. This is overwhelm, specifically: not too little, but too much
    at once.


    Grace Adeyemi names what''s actually happening in your nervous system when the
    financial load goes past what you can hold. You''ll learn to recognize the exact
    moment your mind floods — the tells in your body before the thoughts even form,
    the shallow breath, the strange flat calm that is really a shutdown. Then, instead
    of trying to optimize your way out, you''ll go down into it: stop adding, stop
    solving, and let the pile become one thing at a time. Not because the rest disappears,
    but because you can only ever actually face one. You come back able to feel a
    single decision again instead of all of them at once.


    This is not a budgeting book. There are no spreadsheets to build at 11pm, no apps
    to download, no morning routine that fixes your relationship with money by Friday.
    It will not promise that the numbers get smaller or that you''ll finally feel
    on top of it. The pressure of your real financial life is real, and pretending
    otherwise would insult you. What changes is your capacity to be inside it without
    going under — to stay in the room with your own money instead of leaving your
    body every time it comes up.


    Written in plain, no-nonsense language you can actually use the next time your
    mind floods at your desk — direct, secular, warm but unsentimental. For the woman
    who is tired of being told to think positive when what she needs is a way to breathe
    through the next overwhelming hour.


    You are allowed to put some of it down. Not all of it. Just the part you were
    never meant to carry all at once.'
