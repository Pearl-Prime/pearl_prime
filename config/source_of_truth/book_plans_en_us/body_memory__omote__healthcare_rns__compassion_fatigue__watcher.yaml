title: Still Counting Respirations at 3am
subtitle: For the nurse whose mind never clocks out — scanning for the deterioration,
  bracing for the page, watching for the thing that already happened
cover_tagline: You left the unit hours ago. Your nervous system never got the message.
description:
  short_blurb: You are home. You are off. And you are lying in the dark replaying
    the assessment, certain you missed something, half-listening for a call bell that
    is not there. This book is for the part of you that never stops watching — the
    hypervigilant nurse-brain that kept patients alive and now will not let you rest.
    It will not tell you to relax. It will help that watchful part of you finally
    feel safe enough to stand down.
  long_description: 'You are off the clock. You are in your own bed. And your mind
    is still on the unit — running back through the shift, second-guessing the chart,
    certain you forgot to pass something on in report, half-hearing an alarm that
    is not ringing in any room you are in. You lie there counting an absent patient''s
    respirations. Your body is home. The watcher in you never left.


    This book is for that part of you — the scanner, the one who reads a room for
    danger before she has finished walking into it, the one who catches the subtle
    change three hours before the labs do. That vigilance is not a flaw. It is a deep,
    hard-earned knowing that has saved lives, including ones you will never know about.
    The trouble is that no one ever taught it how to turn off, and now it runs all
    night, on threats that are not there, in a home that is already safe.


    Here you will come to recognize the watcher for what it is — not anxiety to be
    medicated away, not weakness, but a survival skill that learned to never stand
    down because for years it could not afford to. You will see how the scanning followed
    you out the automatic doors and into your sleep, your days off, your kitchen table.
    You will feel where the body has been braced for a page that is not coming. You
    will learn what it means to let the ground hold the watch for a while — to let
    some part of you finally believe, in the muscles and not just the mind, that right
    now there is nothing to catch, no one to save, nothing to monitor. And you will
    meet the series'' quiet question from this angle: what do you need, before you
    can keep holding vigil for everyone else?


    This book will not hand you a sleep hack or tell you to simply stop worrying.
    It will not pathologize the very alertness that makes you good at your work, and
    it will never pretend you can optimize your nervous system into silence. The watching
    was earned. It deserves understanding, not a scolding.


    What you will find instead is steadiness. A way to thank the watcher for the lives
    it guarded and then, gently, give it permission to rest. Permission to be off-duty
    in your own body. Permission to stop scanning a room that holds no emergency.
    Permission to let solid ground keep watch so that you, at last, can sleep.


    The shift ended hours ago. You are allowed to come all the way home.


    Book 3 of the Held Ground Press compassion fatigue series.'
