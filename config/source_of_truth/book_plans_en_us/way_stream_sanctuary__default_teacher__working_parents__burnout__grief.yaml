title: 'After the Flame: The Grief That Doesn''t Leave'
subtitle: A Real Talk Guide to Burnout Recovery for Working Parents
cover_tagline: You didn't just burn out. You lost someone — the parent you used to
  be.
description:
  short_blurb: 'Burnout recovery talk skips the part nobody says out loud: you''re
    grieving. The version of you that had energy, patience, and a self outside the
    parenting and the job is gone, and no amount of rest brings that person back the
    way you keep hoping it will. This is a real-talk guide to the loss underneath
    the exhaustion — and what it means to stop mourning who you were and meet who
    you are now.'
  long_description: 'It happens in the car, usually. You''ve dropped them off, you''re
    alone for the first time all day, and instead of relief there''s a flat ache you
    can''t name. You used to be quick. You used to laugh at things. You used to have
    a whole inner life that wasn''t a to-do list with a face. That person is gone,
    and you keep waiting for a good night''s sleep or a quiet weekend to hand them
    back. It never does.


    This book is for the working parent who has been told they''re "burned out" and
    quietly knows that word is too small. You are not low on battery. You are grieving.
    Somewhere in the years of being needed at work all day and needed at home all
    night, the self you used to recognize slipped out the back, and nobody held a
    service for them — least of all you, because you didn''t have time.


    Here''s the work, and it isn''t gentle. First, recognition: naming the flat ache
    for what it is. Not laziness, not failure to "bounce back" — grief. The loss of
    a former self. Then the descent. Instead of rushing to rebuild the old you with
    productivity hacks and 5am routines, you go down into the loss. You let yourself
    actually miss that person. You feel the weight of what the caring cost you, without
    immediately reaching for the fix. This is the part everyone skips, and it''s the
    only part that changes anything. Then, slowly, integration: you come back up not
    restored, but reshaped. The old self doesn''t return. A truer one — one who knows
    exactly what depletion feels like and refuses to call it normal — takes the wheel.


    This book will not promise you''ll get your old energy back. It won''t optimize
    your mornings or hand you a recovery timeline. It will not tell you that grief
    is a phase you pass through on the way to being productive again. What it offers
    instead is the relief of finally naming the right thing, so you stop fighting
    the wrong battle — stop trying to rest your way out of a loss that needs to be
    felt, not fixed.


    Written in plain, unsentimental language you can actually use the next time the
    ache shows up in the car, this is grief work for people who don''t have time for
    grief and need it most.


    You are allowed to mourn the parent you used to be. That''s not weakness. That''s
    the beginning of meeting the one you''re becoming.'
