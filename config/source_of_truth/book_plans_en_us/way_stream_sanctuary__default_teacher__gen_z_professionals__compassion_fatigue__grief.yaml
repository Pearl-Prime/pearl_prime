title: 'Compassion Fatigue: Living with What You''ve Lost (1)'
subtitle: A Real Talk Guide to Compassion Fatigue for Gen Z Professionals
cover_tagline: You ran out of caring, and then you grieved the person who used to.
description:
  short_blurb: You got into this to help people, and now you feel nothing when they
    need you. This is a field guide for young professionals grieving the open-hearted
    version of themselves that compassion fatigue wore down. It is not a guilt trip.
    It is a way to mourn it honestly.
  long_description: 'There''s a moment you''ll recognize. Someone is telling you something
    hard, something that would have wrecked you two years ago, and you feel the place
    where the feeling should be, and it''s empty. You nod. You say the right thing.
    And underneath, a quiet panic: where did I go. What happened to the person who
    used to care this much.


    This book is for you if you''re young in a caring line of work, healthcare, social
    work, teaching, service, support, and compassion fatigue didn''t just tire you
    out, it took your heart''s range. You started with so much. You felt everything.
    And the well ran dry, and now there''s a numbness where the empathy used to live,
    and what you''re feeling isn''t burnout exactly. It''s grief. You''re mourning
    a version of yourself that the work quietly used up.


    We start with recognition, because no one gives you language for this: you lost
    something real. Not your skills, not your job. You lost the easy, open-hearted
    you, the one who hadn''t learned to armor up yet. That self is gone, and pretending
    otherwise is why you feel like a fraud in every kind interaction.


    Then we go down into it. Not a strategy to refill your empathy on schedule, the
    descent. We''ll sit with what it actually costs to absorb other people''s pain
    for a living when you''re barely out of school yourself, why the numbness was
    protection before it was a problem, and the specific sorrow of realizing you can''t
    give the way you used to. You let yourself grieve the giver you were.


    Then you come back, changed. Not as the bottomless well you started as, that version
    had no walls and that''s exactly why it drained. You come back as someone who
    can care with limits, who knows the difference between numbness and boundaries,
    who can feel again because they''re no longer bleeding out through every interaction.


    This book will not promise to restore your old capacity to feel everything. It
    won''t optimize your resilience so you can absorb even more. There''s no protocol
    here to make you an even more efficient vessel for other people''s suffering,
    because that''s the road that emptied you. What it offers is the permission to
    grieve what the caring took, and to stop apologizing for having a limit.


    You gave until there was nothing left. You''re allowed to mourn that, and to come
    back smaller and truer. Start here.'
