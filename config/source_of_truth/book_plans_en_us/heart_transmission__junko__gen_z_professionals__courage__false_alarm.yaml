title: Your Body Thinks the Meeting Is a Lion
subtitle: For the young professional whose nerve goes before they've even spoken —
  when raising your hand feels like stepping off a ledge that isn't there
cover_tagline: The danger isn't real. The fear is. You can be brave anyway.
description:
  short_blurb: Your heart slams before you've said a single word. The room is just
    a room, the email is just an email, and still your whole body braces like something
    is about to hurt you. This is a warm, close book for the young professional whose
    courage keeps getting hijacked by an alarm that fires when there's no real danger
    at all.
  long_description: 'You feel it before you understand it. The Slack message lands
    and your chest tightens. Your manager says "got a sec?" and your stomach drops
    like the floor gave way. You''re about to speak in the meeting and your heart
    is already pounding, your mouth already dry, your whole body braced for a blow
    that never comes.


    Nothing is actually threatening you. You know that. But your body didn''t get
    the message.


    This book is for you — the one who is not a coward, who cares deeply, who wants
    to do the brave thing, and who keeps getting stopped at the door by an alarm that
    goes off for no reason. You''ve been told to push through it, to fake confidence,
    to just send the message. And every time you override the fear with force, it
    comes back louder the next day.


    There''s a gentler way, and it starts with a small, freeing truth: the part of
    you that floods with fear before a hard conversation is not broken. It''s a frightened,
    loyal part of you that learned, long ago, to brace. It thinks the meeting is a
    lion. It is trying, clumsily and with its whole heart, to keep you safe.


    You''ll come to recognize that alarm for what it is — a body firing on an old
    memory, not a real warning. You''ll learn to feel the surge without obeying it,
    to place a hand on that frightened part of you the way you''d steady a friend,
    and to act while you''re still shaking. Not because the fear left. Because you
    stopped needing it to leave first. You don''t have to wait in the car until your
    hands go still; you can carry the trembling part of you in with you, gently, and
    walk through the door anyway.


    This book will not make you fearless. It will not hand you a script for confidence
    or a five-step system to conquer your nerves. There is nothing here to conquer.
    The pounding heart isn''t your enemy; it''s a part of you that has never once
    been met with warmth. So we''ll meet it. Quietly, the way you''d sit beside someone
    you love who is scared.


    You are allowed to be afraid and brave in the same breath. The two have always
    lived in the same room. You were never failing — you were just listening to an
    alarm no one ever taught you to soothe.


    Book 1 of the Heart Transmission Press courage series.'
