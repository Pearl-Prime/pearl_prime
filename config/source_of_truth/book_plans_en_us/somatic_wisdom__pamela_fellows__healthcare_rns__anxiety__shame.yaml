title: The Nurse Who Should Be Able to Handle It
subtitle: For the nurse hiding the anxiety behind competence — meeting the quiet belief
  that needing help means something is wrong with you
cover_tagline: You take care of everyone. You'd be mortified if they knew how much
  you're not okay.
description:
  short_blurb: You're the one who holds it together. The capable one, the steady one
    — and underneath it, a belief that if anyone saw how anxious you really are, they'd
    know something is wrong with you. This is a tender, body-based companion for the
    nurse who has been overworking to cover a defect that was never there. It won't
    ask you to perform okay. It will help you set the mask down.
  long_description: 'You are good at this. People trust you. You''re the nurse other
    nurses come to, the one who stays calm when it counts, who picks up the extra
    shift, who never lets it show. And somewhere underneath all of it lives a quiet,
    corrosive certainty: that the anxiety you carry is proof of a flaw — that a real
    nurse, a good one, wouldn''t feel this way — and that if anyone ever saw the whole
    of it, they would finally understand that something is wrong with you.


    This book is for the nurse who hides the anxiety behind competence. The one who
    has made herself indispensable partly so no one will look too closely. You are
    not defective, and you never were. Somewhere along the way you learned that your
    worth was your usefulness, that needing care was a liability in someone whose
    whole job is to give it, and so you buried the part of you that struggles and
    worked twice as hard to make sure it stayed buried. The overworking isn''t ambition.
    It''s a cover. And it''s exhausting in a way that has nothing to do with the hours.


    Here you''ll come to recognize shame as a thing the body holds, not a verdict
    that''s true — the heat that climbs the neck, the urge to disappear, the bracing
    in the chest that says don''t let them see. You''ll begin to feel the difference
    between the anxiety itself and the shame about having it, and you''ll learn that
    the second one, the hiding, is most of the weight. Gently, on your own timeline,
    you''ll practice letting warmth back into the places you''ve kept armored, and
    meeting the struggling part of you the way you''d meet a frightened patient —
    not with a fix, but with the simple radical act of staying.


    This will not make you more impressive. It will not help you perform okay more
    convincingly. It asks the opposite: that you stop covering, just for the length
    of a breath, and discover that the defect you''ve been hiding was only ever a
    nervous system asking to be cared for too.


    Nothing here will help you hold it together better. You hold it together for a
    living, and it''s costing you everything. What you''ve never been given is permission
    to be the one who isn''t okay. That is what this book is for.


    You are allowed to need care, too. The capable ones most of all.


    Book 4 of the Felt Sense Publishing anxiety series.'
