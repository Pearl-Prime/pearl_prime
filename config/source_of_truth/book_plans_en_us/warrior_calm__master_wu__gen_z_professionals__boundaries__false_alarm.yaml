title: The Yes That Leaves Before You Do
subtitle: For the young professional whose body says yes before the mind can think
  — learning to feel the false alarm of a request and let it pass without flinching
cover_tagline: Your hand was already typing 'sure' before you knew what they wanted.
description:
  short_blurb: Somewhere along the way, your nervous system decided every request
    was an emergency. A Slack ping, a 'quick favor,' a meeting that should've been
    an email — and your whole body braces like a door about to be kicked in. This
    is a book about the alarm that fires when there is no fire, and how to stand at
    your own threshold long enough to decide.
  long_description: 'You feel it before you understand it. The message arrives — ''hey,
    do you have a sec?'' — and your chest tightens, your stomach drops, your thumb
    is already moving. Yes. Of course. Happy to. The reply is sent before you''ve
    even weighed whether you wanted to send it. By the time your mind catches up,
    the yes has already left the building, and you''re left holding a commitment your
    body signed without you.


    This book is for the young professional whose alarm system can''t tell the difference
    between a real threat and a reasonable ask. The one who treats a delayed reply
    like a crime, who reads tone into a one-word message, who lies awake replaying
    a ''sure, no problem'' that cost more than it should have. You are not weak. You
    are not too sensitive. You have a finely tuned instrument firing at full volume
    — at shadows. Somewhere back there it learned that a request was a test, that
    a no was a risk, that the safest move was always to say yes fast and feel the
    cost later. It kept you liked. It also kept you exhausted.


    You''ll come to recognize the false alarm for what it is. The bracing in your
    shoulders when a name appears on screen. The way a small request lands in your
    body like danger. The reflex that mistakes someone''s mild preference for your
    emergency. The held breath while you wait to find out whether you''re in trouble
    for taking an hour to reply. You''ll learn what the warrior knows: that the breath
    before action is where you actually live, and that a held line is not a wall —
    it is a threshold you stand at, calmly, deciding who crosses.


    Nothing here will optimize you. There is no script that makes the dread disappear
    on command, no five-step system that turns you into someone who never feels the
    pull. The alarm may always fire first. That''s not the problem to solve. The work
    is learning to feel it fire and not move — to let the request sit in the open
    while your hands stay still, until the false danger passes and a real answer can
    arrive. Not the fast yes that protects everyone but you. The true one, the one
    that knows what it''s agreeing to.


    You are allowed to take the time. You are allowed to let it ring without answering.
    You are allowed to read a message, set the phone back down, and finish your dinner
    before you decide. The line you draw in a steady hand was never an act of aggression.
    It was always just you, finally standing your own ground.


    Book 1 of the Iron Gate Press Boundaries series.'
