title: A Body That Keeps Working After You Stop
subtitle: For the depleted parent whose system never gets the message that the day
  is finally done
cover_tagline: You put them to bed hours ago. So why is some part of you still standing
  guard?
description:
  short_blurb: Long after the house goes quiet, a part of you stays on — listening
    for the cough down the hall, replaying the meeting, scanning a day that's already
    over for the thing you forgot. This is a book for the working parent whose mind
    never clocks out. It won't teach you to monitor better. It will help you understand
    why the watching never stops — and how to finally let your guard down to the ground.
  long_description: 'The house is quiet. The kids are asleep, the doors are locked,
    tomorrow is as handled as it''s going to get. And still — some part of you is
    on. Listening for the cough down the hall. Replaying the thing you said in the
    meeting. Running the morning ahead like a checklist that won''t let you go. You
    lie down exhausted and your mind stands up, scanning, monitoring, bracing for
    a threat that never quite arrives but never quite leaves either. You can''t remember
    the last time you felt truly off duty.


    This is a book for the parent who is always watching. Not because you''re anxious
    by nature, but because somewhere along the way the stakes got high enough that
    staying alert started to feel like the only thing keeping it all from falling
    apart. You''ve become the smoke detector for an entire family — and a detector
    can''t sleep. The hypervigilance has soaked so far into you that you''ve stopped
    noticing it. You just call it being tired. You just call it your personality now.


    In these pages you''ll come to recognize the watcher for what it is — not a flaw,
    not paranoia, but a protector that got stuck in the on position and forgot how
    to stand down. You''ll feel the difference between the vigilance that''s actually
    needed and the scanning your body keeps running long after the danger has passed.
    You''ll learn what it means to let your shoulders drop from your ears, to let
    your breath sink past the shallow top of your chest to the lowest part of your
    lungs, to let the ground hold what you''ve been holding alone — so the part of
    you that never rests can finally, for a moment, set the watch down.


    This book will not promise to make you more on top of things. It won''t hand you
    a tracking system or teach you to monitor your stress the way you monitor everything
    else — that''s just the watcher in a new disguise. It won''t tell you to optimize
    your vigilance or do your alertness more efficiently. It won''t ask you to stay
    sharp. What it offers instead is the thing the watcher has never been given: permission
    to be off, trust that the floor will hold, and a slow way back to the deep ground
    where a body can finally stop bracing and let its own quiet energy return.


    You are allowed to come off duty. You are allowed to trust the locked door, the
    sleeping house, the ground beneath you. The watching can rest now. So can you.


    Book 3 of the Root & Meridian Press burnout series.'
