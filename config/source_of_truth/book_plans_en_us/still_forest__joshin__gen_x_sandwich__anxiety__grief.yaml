title: Bracing for a Tree Already Leaning
subtitle: 'For the one whose anxiety is really sorrow: the goodbyes long begun, the
  parent thinning to bare wood, the life that slipped off down another path'
cover_tagline: The dread underneath was grief, all along.
description:
  short_blurb: Sometimes the anxiety is not fear of the future but grief that hasn't
    been allowed to land. This is a book for the one bracing against a loss that is
    already underway, and a slow permission to let what's leaving finally be mourned.
  long_description: 'You call it anxiety, and it is — but lately, if you go quiet
    enough to feel it, there is something underneath the dread that is not about the
    future at all. It is about what is already going. The parent who is still here
    but no longer entirely themselves. The child who has grown and gone. The version
    of your life, and of your own body and your own years, that slipped away while
    you were busy holding everything together. The anxiety, you begin to suspect,
    is partly a way of bracing against a loss that has already started, and partly
    a grief you have never had a single quiet hour to feel.


    This book is for you: the one in the middle of the goodbyes, watching a parent
    fade while still packing lunches, mourning things you are not allowed to set down
    long enough to mourn. You have been so busy being strong for the people who need
    you that your own sorrow has had nowhere to go — so it waits in your chest, disguised
    as worry, pressing.


    Walk slowly here, and you will come to recognize something. That some of what
    you have been treating as anxiety to be managed is grief asking to be felt — and
    that grief, unlike fear, does not want to be fixed or calmed or argued out of
    you. It wants to be witnessed. You will learn what the forest knows about loss:
    that the falling leaf is not a tragedy the forest braces against but a thing it
    lets fall, and holds, and slowly takes back into the ground that everything new
    will grow from. You will begin to feel the difference between fighting a loss
    and grieving it, and how much lighter the second is to carry.


    This is not a book that will help you get over anything, get past it on a schedule,
    or convert your grief into a lesson and move briskly on. There is no stage to
    complete here, no closure to achieve, no silver lining you are required to find.
    It will not promise that the ache will be gone by the end. What it offers instead
    is stiller and kinder: a clearing where what is leaving can be mourned without
    apology, where your sorrow is not a problem to be solved but a love that has nowhere
    else to go, finally allowed to land on ground that can hold it.


    Nothing here will help you stop the loss or hurry through the grief. Loss cannot
    be stopped, and hurried grief only goes underground and calls itself anxiety.
    The point is to let yourself feel what you have been bracing against, in a place
    quiet enough to bear it.


    What you are losing was loved. The dread in your chest has been grief in a borrowed
    coat. You are allowed, at last, to set the bracing down and mourn.


    Book 5 of the Still Forest Press anxiety series.'
