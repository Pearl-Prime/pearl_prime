title: 'Imposter Syndrome: The Shame Response (1)'
subtitle: A Real Talk Guide to Imposter Syndrome for Working Parents
cover_tagline: You're sure that if they really saw you, they'd know you don't belong
  here.
description:
  short_blurb: 'Imposter syndrome isn''t humility, it''s shame: the buried conviction
    that you''re fundamentally not enough and one slip will expose it. This is a book
    about the working parent who is certain they fooled everyone into the role. It
    won''t tell you you''re brilliant. It will show you the old belief running the
    show and help you set it down.'
  long_description: 'You got the email. The promotion, the lead, the title you worked
    years for. And the first thing you felt, under the relief, was dread, because
    now there is further to fall when they finally figure out the truth. You''re convinced
    you fooled the interview, fooled your boss, fooled the entire room, and that a
    single missed deadline will pull the curtain back for good. The fact that you''re
    stretched thin between work and a kid who needs you only confirms it: a real professional
    wouldn''t be running this close to the edge, this often.


    This book is for the working parent whose imposter syndrome runs on shame, not
    modesty. Not ''I''m a little unsure of myself,'' but ''there is something fundamentally
    missing in me, and exposure is only a matter of time.'' You over-prepare so no
    one catches the gap you''re certain is there. You deflect every compliment because
    accepting it would feel like compounding the lie. And every time you''re pulled
    in half between the job and the family, the old verdict gets louder and more specific:
    not enough, never was, and now everyone''s about to know.


    We name the shame plainly, because it survives only by staying hidden. The way
    a compliment slides off you like it was meant for someone standing behind you.
    The certainty that everyone else is the real thing and you''re the costume that
    got hired by mistake. Then we go down into where that belief was first set, the
    early lesson that worth had to be continuously earned and could be revoked the
    instant you slipped. We stay with the root long enough that you can hear it for
    what it is: an old recording playing on a loop, not a current fact being established
    by today''s evidence. You come back up able to hold the role without bracing every
    morning for an exposure that never actually comes.


    This is not a confidence-affirmation book. It will not convince you that you''re
    secretly exceptional, or that the doubt will evaporate if you just list your wins
    on a notecard. There is no pile of proof you can assemble that finally satisfies
    shame, because shame was never really about the evidence. The shift is that you
    stop letting a buried belief audit your every move, and start standing in the
    seat as the person who, in plain fact, does the work.


    Written in direct, grounded language for the moment the email lands and dread
    arrives a half-second before pride. No affirmation cards, no gratitude journaling,
    no one telling you to just own it.


    You are not a fraud waiting to be caught. You''re a competent person carrying
    an old verdict that was never true. The seat is yours. Sit all the way down in
    it.'
