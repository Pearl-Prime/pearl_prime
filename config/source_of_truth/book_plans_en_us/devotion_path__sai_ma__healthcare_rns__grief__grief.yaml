title: The Losses You Never Counted
subtitle: For the nurse who charted the time of death and kept going — a tender place
  to finally grieve the patients you carried and were never given room to mourn
cover_tagline: You held the hand. You never got to hold the loss.
description:
  short_blurb: You have been present for more endings than anyone in your life will
    ever know, and you grieved almost none of them — because there was always another
    room, another chart, another patient who needed you whole. This is a tender, unhurried
    place to set down the losses you stacked behind your sternum and never counted.
    Nothing here will ask you to be strong, or grateful, or fine.
  long_description: 'You remember the room. Maybe more than one. The monitor going
    quiet, the family you walked to the small windowless space down the hall, the
    way you smoothed the blanket out of habit when there was no longer anyone to keep
    warm. And then you charted the time, and you washed your hands, and you went to
    your next patient, because that is the job, and the job does not stop to let you
    feel anything.


    This book is for the nurse who has been carrying it ever since.


    Not one loss. Years of them. The ones you barely knew and the ones you loved.
    The patient whose hand you held through the night because no one else came. The
    ones whose names you still remember and the ones whose faces blur together into
    a single ache you''ve never had language for. You grieved almost none of them
    out loud, because there was no time, and because somewhere along the way you learned
    that a good nurse keeps going.


    You will come to recognize that the grief did not disappear. It went where everything
    goes when there is nowhere to put it down — into your shoulders, your sleep, the
    strange flatness you feel at parties, the tears that arrive over nothing in the
    parking garage. You will learn the truth that no in-service ever told you: grief
    is simply love with nowhere left to go, and you have loved an enormous number
    of people who are gone. That is not a weakness in you. That is the size of what
    you carried.


    Here, you are the one being tended for once. You are the cup that has been poured
    out at every bedside and never refilled. We will sit with the empty chair, the
    absence, the question of what remains true when everyone you held has slipped
    away — and we will not rush you past a single one of them.


    This book will not give you closure. It will not tell you they are in a better
    place, or that it was their time, or that you should be grateful for the privilege
    of being there. It will not make you a more resilient employee. It will not hand
    back the ones you lost.


    What it offers instead is room. Room to count what was never counted. Room to
    let the well refill in the dark, slowly, the way it actually does. Room to set
    down a load you have been carrying alone for longer than you knew.


    You are allowed to grieve them now. All of them. You always were.


    Book 1 of the Open Vessel Press grief series.'
