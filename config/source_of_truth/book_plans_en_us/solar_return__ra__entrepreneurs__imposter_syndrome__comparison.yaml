title: Their Embers Look Like Bonfires From Here
subtitle: For the founder certain every other room is full of people who truly belong
cover_tagline: You're reading their highlight reel against your raw footage. Of course
  you're losing.
description:
  short_blurb: You scroll the launch announcements, the funding posts, the conference
    photos where everyone looks like they were born knowing how to do this, and you
    feel the gap open up between them and you. This is the book for the founder who
    keeps weighing a hidden, fraudulent feeling against everyone who looks like they
    belong, and who never once comes out ahead.
  long_description: 'You see them everywhere. The founder who raised twice what you
    did and seems unbothered by any of it. The peer on the panel speaking like certainty
    is her resting state. The feed full of people who look like they were issued the
    confidence you''ve spent years counterfeiting. And every time, the same quiet
    arithmetic runs underneath: they belong here, and you snuck in.


    This book is for the entrepreneur whose imposter syndrome speaks the language
    of comparison — who can build something genuinely good and still lose a whole
    day measuring it against everyone who looks calm, finished, and sure. You''re
    not arrogant and you''re not fishing for reassurance. You''ve simply set your
    own raw, unedited insides on one side of the scale and everyone else''s published
    highlight reel on the other, then called the result the truth about your worth.


    You''ll come to recognize how comparison feeds the fraud feeling instead of settling
    it — how every round you lose becomes more evidence that you don''t belong, and
    how the scale was weighted against you before you ever stepped on it. You''ll
    see the quiet sleight of hand: that you weigh your behind-the-scenes against their
    front-of-house, your private panic against their public ease. You''ll notice,
    too, that the calm you envy is mostly a thing you can''t see into — that the founder
    you''re sure has it all figured out is, in her own dark office, late, measuring
    herself against someone too.


    This is not a book about winning the comparison. It will not coach you to out-hustle
    the feed, to manifest a bigger raise, or to build the kind of success that finally
    makes you feel like you belong. That feeling doesn''t live on the far side of
    the next milestone, and chasing it there is a good part of how you got this cold
    in the first place. Nothing in these pages will help you come out ahead of anyone.
    That, quietly, is the point.


    What''s here instead is warmer and slower: a way to step off the scale entirely.
    To feel that belonging was never something the others were issued and you missed
    at the door — it''s just warmth, and you''ve been standing too far from the fire,
    too busy measuring, to let it reach your hands. You don''t have to win to deserve
    to be here. You''re already in the room. You built your own way in.


    Book 2 of the Ember & Ash Publishing Imposter Syndrome series.'
