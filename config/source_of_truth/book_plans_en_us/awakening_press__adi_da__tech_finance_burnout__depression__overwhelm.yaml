title: Too Much, and None of It Lands
subtitle: For the high-functioning mind drowning in everything at once — when the
  inbox never empties and the joy never arrives
cover_tagline: You are not failing to keep up. You're being asked to put it down.
description:
  short_blurb: Everything is arriving at once — the threads, the asks, the metrics
    that say you're winning — and somewhere under the flood, you've gone quiet and
    grey. This is a book for the high-performer whose capacity is gone and who can't
    say why nothing lands anymore. It won't help you clear the queue. It will help
    you notice the one in you the flood never reached.
  long_description: 'It''s late, and the laptop is still open. You''ve read the same
    message four times. By every number that''s supposed to matter — the title, the
    comp, the round that closed — you are doing fine, better than fine. So you can''t
    explain why this morning getting out of bed felt like lifting a weight off your
    own chest, or why the win you worked years for landed with the dull thud of nothing
    at all.


    This is a book for the mind that has too much arriving at once and no room left
    to feel any of it. For the one who learned that the answer to overwhelm is more
    bandwidth, more discipline, one more system — and who is finally, quietly, out
    of all three. You are not lazy. You are not failing to keep up. Your capacity
    didn''t break. It filled, and filled, and then the lights went down — and the
    flatness you''re calling failure is what a system does when it has been asked
    to carry more than any person was built to hold.


    Here, slowly, you''ll come to recognize the depression underneath the overload
    — not as a flaw in your wiring but as a flood: the way the asks stop being separate
    and become one grey wall of weight, the way you keep performing competence while
    something in you has lain down on the floor. You''ll see how the strategies that
    got you here — absorb more, respond faster, never let the queue win — are the
    very things keeping the water at your throat. And you''ll be shown, without being
    rushed, that there is a place in you the flood has never reached: still, unhurried,
    already here beneath the noise. Not a more optimized you. The you that was never
    the machine in the first place.


    This book will not help you clear the inbox. It will not give you a morning routine,
    a dopamine protocol, or a reframe that turns your healing into one more thing
    to crush. It promises no fix, because you are not broken — you are full, and what
    is full does not need to be repaired. It needs to be set down.


    So set it down here, for the length of these pages. Let the flood be a flood and
    stop swimming for a moment. There is more room in you than the queue ever let
    you feel. You don''t have to earn your way back to it.


    Book 1 of the Awakening Press Depression series.'
