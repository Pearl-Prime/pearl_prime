title: Everything Is Due and You Have No Room Left
subtitle: For the student buried under every deadline at once — when the to-do list
  is a wall and there's no space left to even think
cover_tagline: It all landed at the same time, and now there's nowhere to put it.
description:
  short_blurb: Five things are due, three of them tomorrow, and the moment you try
    to start one your mind whites out from the size of all the others. This is a book
    about the flood — too much arriving at once — and about finding a single square
    foot of room to stand in when your capacity is already gone.
  long_description: 'It all came at once. The midterm, the lab report, the shift you
    picked up, the group chat you''ve stopped opening, the form that was due yesterday.
    You sit down to start and your mind doesn''t pick a task — it tries to hold all
    of them at the same time, and the whole thing just whites out. Too much. There
    is no room left to even think.


    This book is for you — the student standing at the bottom of a week that arrived
    all on one day. The one who isn''t lazy and isn''t behind because you don''t care;
    you''re behind because the volume of it exceeded the size of you, and no amount
    of staring at the list makes the list any shorter.


    You''ll come to recognize overwhelm as its own distinct thing — not the same as
    being busy, not the same as being disorganized. It''s the flood. It''s the moment
    your capacity is simply exceeded. You''ll see how it freezes you precisely when
    you most need to move, how the size of everything collapses into a single immovable
    weight on your chest, how ''just make a schedule'' is useless advice to someone
    who has no floor left to build one on. And you''ll feel what it''s like to set
    the whole semester down for a moment — not abandon it, just put it on the desk
    and step back far enough to take one full breath.


    This book will not hand you a system to do more in less time. It will not teach
    you to power through, push harder, or squeeze the week into a tighter shape. The
    problem was never that you handle pressure badly. The problem is that too much
    landed at once, and you are a person, not a container with infinite room.


    What''s here instead is space. The relief of clearing one square foot to stand
    in. The permission to do the next single thing and let the rest stay where it
    is, no longer pretending you can carry all of it in your arms at the same time.


    You don''t have to hold the whole semester right now. You can put it down. You
    can pick up one corner of it, and only that, and breathe.


    Book 2 of the Blue Exam Press anxiety series.'
