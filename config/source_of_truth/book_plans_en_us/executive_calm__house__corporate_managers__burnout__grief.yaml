title: The Self the Title Quietly Cost You
subtitle: For the executive grieving the person they were before the role wore them
  down
cover_tagline: Some of what burned out is not coming back. The grief is allowed to.
description:
  short_blurb: Burnout is rarely just exhaustion. Underneath it is loss — the energy
    that doesn't return, the ambition that went quiet, the person you were before
    the role asked for everything. This is a book for the manager who is grieving
    what the job already took, and who has never once been given permission to.
  long_description: 'You don''t usually call it grief. You call it being tired, or
    being over it, or just not having it in you anymore. But grief is what it is.
    Somewhere in the years of carrying this role, something was spent that hasn''t
    come back — the spark that used to make the work feel like yours, the version
    of you that arrived early because you wanted to, the certainty that all of this
    was building toward something. You can''t point to a single day it left. You only
    know the seat it used to occupy is empty now, and you''ve kept showing up anyway,
    working over the absence like nothing is missing.


    This book is for the manager who is mourning and hasn''t been allowed to name
    it. You haven''t lost a person. You''ve lost a self — and the world has no ritual
    for that, no card, no week off, no one bringing food to the door. So you carried
    the loss the way you carry everything: privately, competently, while the meetings
    went on. This is for you.


    What you''ll come to recognize is that burnout has a grief underneath it, and
    the grief has to move before the recovery can. You''ll see what the job quietly
    took — not just your hours, but your appetite for things you once loved, your
    patience at home, the part of you that used to dream past the next quarter. You''ll
    learn the difference between what was stolen and what you are still gripping out
    of habit. And you''ll find that some of what burned out is not coming back, and
    that naming this plainly is not surrender. It is the first honest thing.


    This book will not promise to restore you to who you were. That person met a load
    they couldn''t sustain, and pretending otherwise is how the burning started. There
    is no method here for getting it all back, no reframe that turns the loss into
    a gift. There is only the slow work of grieving what is gone, releasing what you''ve
    outgrown, and discovering what is still standing once the grief has finally been
    let through.


    You are allowed to mourn the cost of a job you never stopped doing well. The grief
    is not a sign you failed at the work. It is the receipt for how much of yourself
    you put into it.


    Let it be a loss. That''s how it stops being a weight.


    Book 2 of the Granite Ridge Publishing burnout series.'
