title: The Alarm That Never Asked Permission
subtitle: For the young professional whose body braces for danger that never comes
  — when the threat is real but the moment is safe
cover_tagline: Nothing is wrong, and your whole body disagrees.
description:
  short_blurb: Your heart is pounding before the meeting that isn't a threat, your
    hands are cold reading a message that wasn't even unkind. This is a book for the
    body that keeps sounding an alarm long after the danger has passed — and for the
    part of you, tender and tired, that has been doing its best to keep you safe.
    You don't need to fight the alarm. You need to understand what it was trying to
    protect.
  long_description: 'It happens before you can name it. The phone lights up, the calendar
    pings, someone says "can we talk" with no punctuation, and your body is already
    three steps into an emergency that hasn''t arrived. Your chest tightens. Your
    breath goes shallow. And the strangest part is that nothing is actually wrong
    — there''s no tiger, no edge, no falling. Just a Tuesday, and a body convinced
    it''s the last one.


    This book is for you, in your early years of working and proving and trying to
    look like you belong. For the one who looks composed in the meeting while their
    pulse is somewhere up near their ears. For the person who flinches at a notification,
    who reads danger into a tone, who lies awake bracing for something they can''t
    quite name. You are not broken, and you are not overreacting. You have a finely
    made alarm system, and it has simply learned to fire at shadows.


    Spoken to you up close — the way you''d want a true friend to speak, not a clinician
    — these pages help you come to recognize the false alarm for what it is. You''ll
    feel how the body sounds its warning before the mind can vote. You''ll see how
    it confuses an email with an emergency, a deadline with a cliff. And underneath
    it all, you''ll meet the frightened, loyal part of you that has been standing
    guard for so long it forgot it was allowed to rest. There is a kind of tenderness
    in that, once you can see it — the way you might soften toward a child who startles
    at every sound, not because the world is dangerous, but because once, somewhere,
    it was.


    This is not a system. It will not teach you to silence the alarm or hack your
    nervous system or win against your own fear. There is nothing here to optimize.
    What''s offered instead is something quieter and more humane: a way to stay with
    yourself when the warning rings, to lay a hand on the frightened place the way
    you''d lay a hand on a friend''s shoulder in a hard moment, to let the body learn
    — slowly, without force — that this moment is not the one it was afraid of. The
    warmth comes back the way it always does, not by command, but by company.


    You were never meant to live braced. You''re allowed to be safe before your body
    believes it.


    Book 1 of the Heart Transmission Press anxiety series.'
