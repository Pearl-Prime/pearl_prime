title: How a Single Worry Catches and Spreads
subtitle: For the early-career mind where one small thought smolders into a sleepless
  blaze
cover_tagline: It started with one spark. Now you can't see the room for the smoke.
description:
  short_blurb: It begins with a single thought — small, almost reasonable. Twenty
    minutes later you're nine scenarios deep, rehearsing a conversation that may never
    happen, and you can't remember the spark that lit it. This is a book for the mind
    that spirals, and is exhausted from burning.
  long_description: 'One thought. That''s all it takes. A small one, almost reasonable
    — did that come across wrong? — and then it catches. By the time you notice, you''re
    nine moves ahead: what they think, what that means, what you should have said,
    what it says about you, how it always goes like this. You''re wide awake at 1am,
    feeding a fire you didn''t mean to light, and you can''t even find the first spark
    anymore.


    This book is for you: the Gen Z professional whose mind doesn''t worry so much
    as cascade. One worry becomes a thousand. Each thought throws a spark to the next,
    and the spinning feels like solving — like if you just think it through one more
    time, one more angle, you''ll finally put it out. So you stay up. You re-run the
    meeting. You draft the apology you don''t owe. And the fire only spreads.


    Here you''ll come to see the spiral for what it is: not problem-solving, but rumination
    wearing problem-solving''s clothes. You''ll learn to catch the moment one thought
    hands off to the next — the join, the spark-jump — before the whole thing is ablaze.
    You''ll come to recognize the lie at the center of the spiral, the promise that
    the next loop is the one that brings relief, when every loop has only ever brought
    more loop. You''ll learn how exhaustion masquerades as diligence, and how the
    smartest, most conscientious minds are exactly the ones that burn longest.


    This is not a book that will teach you to think faster or harder. It won''t hand
    you a thought-stopping trick or a five-step framework to argue your way out of
    the fire, because you cannot reason your way out of a spiral — reasoning is the
    fuel. It will not promise to make your mind go quiet on command, and it will not
    treat your overthinking as a glitch to patch. Your mind spirals because it cares,
    because it''s trying, because somewhere it learned that vigilance was love. That''s
    not a malfunction. It''s a fire that needs banking, not blame.


    What you''ll find is the slow skill of letting a thought arrive without chasing
    the next one — of standing at the edge of the spiral and not stepping in. You''ll
    learn that you can leave a thought unfinished and survive. That the loop will
    keep offering you the next lap, and you are allowed to decline.


    You don''t have to follow every spark to where it leads. You can let this one
    go out.


    Book 2 of the Ember & Ash Publishing Overthinking series.'
