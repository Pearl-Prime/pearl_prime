title: The Highlight Reel at the School Gate
subtitle: For the parent who measures a hard, ordinary day against the polished version
  everyone posts at pickup and on the feed — and keeps coming up short
cover_tagline: You are comparing your inside to their outside, and losing on purpose.
description:
  short_blurb: At pickup, in the group chat, on the feed, everyone else seems to be
    doing this with a grace you can't find in yourself. This is a book for the parent
    who is always quietly behind some invisible standard, and who has turned a sharp,
    capable mind against the one person it should be protecting. It won't help you
    finally measure up. That's the point.
  long_description: 'You see it everywhere. The other parent at drop-off who looks
    rested and unhurried. The feed full of birthday parties you''d never have the
    time or money to pull off. The friend who somehow works, cooks, exercises, and
    answers texts within the hour. And you, watching from inside your own tired life,
    doing the math you always do -- and coming out behind.


    This is a book for the working parent who measures. The one who can''t see another
    family without ranking yours against it. Who reads someone else''s ease as a quiet
    indictment of your own struggle. Who knows, somewhere, that comparison is a trap,
    and still walks into it a dozen times a day because the alternative -- just being
    where you are, as you are -- feels too exposed.


    We''ll slow down and look at what comparison actually is. Not a clear-eyed assessment,
    but a sleight of hand: you hold up the most polished surface of someone else''s
    life against the unedited inside of your own, and call the gap a truth about your
    worth. We''ll notice how it feeds on a scrolling mind, how it makes strangers
    into rivals you never agreed to compete with, how it turns a genuinely capable
    parent into someone who feels perpetually a step behind a finish line that keeps
    moving.


    Nothing here will help you win. There''s no system to finally pull ahead, no routine
    that makes you the calm one others measure themselves against. The wanting-to-win
    is the wound, and we''re not feeding it. We''re setting it down.


    What you''ll come to recognize instead is how much of your life you''ve been watching
    from the outside, narrating it as a competition you''re failing, when it was only
    ever yours to live. You''ll feel the difference between admiration that opens
    something and comparison that closes it. You''ll find that your worth was never
    a position in a ranking -- it doesn''t rise when you''re ahead or fall when you''re
    behind, because it was never on that scale at all.


    The other parents are not the proof of anything. They''re just people, doing this
    the only way they know how, probably measuring themselves against someone too.
    You can set the measuring down. You can stop pointing the sharpest part of your
    mind at yourself, in the dark, and let your own ordinary, sufficient life simply
    be the one you''re in.


    Book 2 of the Stillness Press self worth series.'
