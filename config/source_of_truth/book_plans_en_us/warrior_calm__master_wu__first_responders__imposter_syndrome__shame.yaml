title: They'll Find Out I Don't Belong Here
subtitle: For the first responder carrying a private verdict that they're a fraud
  in the uniform — and bracing for the day everyone finally sees it
cover_tagline: You wear the badge. You're still waiting to be exposed.
description:
  short_blurb: 'You earned the uniform, passed the test, ran the calls — and a quiet
    voice still insists you''re a fraud who got lucky. This is a steady, unflinching
    look at the shame underneath imposter syndrome: the buried belief that something
    is wrong with you, and the exhausting performance you put on to keep it hidden.
    No pep talk. Just a way to stop bracing for the day you get found out.'
  long_description: 'There''s a verdict you carry that nobody handed you. It says
    you don''t really belong here. That the others are the real ones — the real medic,
    the real firefighter, the real cop — and you''re the one who slipped through,
    who''s been getting away with it, who will eventually be seen for what you are.


    You''ve never said it out loud. You wouldn''t. You''ve built a whole second job
    out of making sure no one ever suspects it: arriving early, double-checking what
    you already know, laughing off the praise, deflecting the question before it lands.
    The performance is seamless. It''s also bleeding you dry.


    This book is for the first responder who looks competent from the outside and
    feels like an impostor from the inside. The paramedic who froze for half a second
    and has been paying interest on it for months. The firefighter who got the promotion
    and is sure it was a mistake. The dispatcher, the officer, the rookie and the
    twenty-year veteran who both lie awake rehearsing the moment they finally get
    exposed.


    What you''ll come to recognize is that this is not arrogance failing or confidence
    missing. It is shame — the oldest, quietest engine there is. Shame doesn''t say
    you made a mistake. It says you are the mistake. It takes a single shaky call
    and turns it into a sentence about your character. And because you can''t argue
    a feeling out of existence, you try to outwork it, out-prepare it, out-armor it
    — which only confirms to the shame that the threat was real.


    We''ll sit with how that verdict got written, why the job feeds it, and what it
    costs to keep covering a defect that was never actually there. We''ll look at
    the difference between honest accountability and the corrosive belief that you
    are fundamentally not enough. And we''ll find the kind of steadiness that doesn''t
    require you to feel certain first — the trained calm of someone who can stand
    in the doorway of a bad call, afraid, and stay.


    This book will not make you feel like you belong. It won''t hand you confidence
    or fix what you think is broken, because nothing here is broken. It will not tell
    you to toughen up or armor over. What it offers instead is harder and quieter:
    the ground under your boots, exactly as it is, and permission to stop performing
    a worth you already have.


    You don''t have to earn your place again every shift. You already paid for it.
    You can put the armor down.


    Book 1 of the Iron Gate Press Imposter Syndrome series.'
