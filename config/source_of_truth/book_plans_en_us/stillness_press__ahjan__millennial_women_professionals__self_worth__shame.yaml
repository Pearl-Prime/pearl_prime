title: The Part of You That Keeps Apologizing
subtitle: For the high-achieving woman who suspects something is wrong with her —
  and has spent a career overworking so no one finds out
cover_tagline: You weren't too much. You were carrying a verdict you never agreed
  to.
description:
  short_blurb: 'There is a quiet belief underneath the achievements: that if anyone
    looked closely enough, they''d find the flaw you''ve been covering for. This book
    is for the woman who has built a whole career out of staying ahead of being found
    out. It won''t tell you to love yourself harder. It will sit with you until you
    notice the verdict was never true.'
  long_description: 'It usually arrives in a small moment. A colleague pauses a beat
    too long before replying, a message goes unanswered, a meeting ends without the
    reassurance you were quietly waiting for — and something in your chest tightens
    around a familiar conclusion: I knew it. There''s something wrong with me, and
    now they can see it too.


    You''ve carried that conclusion a long time. Long enough that you''ve built a
    life designed to outrun it — the extra hours, the over-prepared answer, the apology
    that arrives before anyone has asked for one. From the outside it looks like drive.
    From the inside, you know it''s something closer to hiding.


    This book is for the woman who suspects, underneath everything she''s accomplished,
    that the accomplishment is a cover. Who reads praise as a near-miss and criticism
    as confirmation. Who has never quite believed she''s allowed to take up the room
    she''s standing in.


    With unhurried care, you''ll come to recognize the architecture of shame as it
    actually lives in your days. You''ll see how it disguises itself as high standards,
    so you mistake self-attack for ambition. You''ll feel the difference between guilt,
    which is about something you did, and shame, which whispers that the problem is
    what you are. You''ll notice the exhausting work of self-monitoring — the second
    self that watches you in every room, scoring you — and what begins to settle when
    you finally let that watcher rest. And you''ll sit with the buried, defining moment
    where you first decided the defect was yours to hide, and feel how much of your
    effort has gone, ever since, into proving a verdict that was handed to you and
    was never actually true.


    This book will not hand you affirmations to recite into the mirror. It will not
    turn your worth into a mindset to optimize or a confidence to perform. There is
    no exercise here that, done well enough, finally earns you a passing grade — because
    the grade was the illusion. Nothing here asks you to become more in order to be
    enough.


    What it offers instead is quieter and harder to undo: the slow recognition that
    the part of you that keeps apologizing was never the broken part. It was the part
    that believed it had to keep you safe. You can let it set the weight down now.


    You are not a flaw that learned to overcompensate. You are someone who was handed
    a verdict early and has been carrying it ever since — and verdicts, unlike worth,
    can be set down.


    Book 1 of the Stillness Press self worth series.'
