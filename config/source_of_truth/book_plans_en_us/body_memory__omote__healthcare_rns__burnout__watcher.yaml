title: Still Scanning the Room
subtitle: For the nurse whose mind never clocks out — checking, double-checking, bracing
  for the alarm even on your day off, because vigilance is the only way you've stayed
  safe
cover_tagline: You left the unit hours ago. Your body is still on the floor.
description:
  short_blurb: You can leave the hospital, but the scanning comes home with you. This
    book is for the nurse whose mind never goes off duty — replaying the shift, second-guessing
    the chart, braced for an alarm that isn't ringing — and who is exhausted from
    a vigilance that was supposed to keep everyone safe.
  long_description: 'You are home. You are off the clock. You are lying in a bed that
    is not a patient''s, in a room with no monitors, and your mind is still on the
    floor — running the shift back, checking whether you signed off on the insulin,
    certain you forgot something, bracing for an alarm that is not going to sound
    because you are not even there. A sound in the house jolts you upright before
    you are awake. Your shoulders have not come down from your ears in years. You
    are scanning a room that holds no threat, because scanning is the only thing that
    has ever kept the people in your care alive.


    This is a book for the watcher. For the registered nurse whose burnout wears the
    face of hypervigilance — the mind that never clocks out, monitoring for danger
    that has already passed or never comes, treating rest itself as a risk you cannot
    afford. You learned this on the unit, where missing one thing could cost a life,
    and the watchfulness kept you sharp and kept your patients safe. It was not a
    malfunction. It was a skill, and a survival, and it saved people. The cost is
    that no one ever told you how to set it down, and now it runs all the time, even
    here, where you are safe.


    You will come to recognize the scanning for what it is. You will see how your
    nervous system learned that letting your guard down is dangerous, how ''just checking
    one more time'' became the texture of your whole day, how you have been standing
    watch over your own life as though it were a crashing patient. You will feel the
    difference between alertness that protects and vigilance that devours. And slowly,
    on ground steady enough to trust, your body will begin to learn the thing it forgot:
    that it is allowed to stand down, that the threat is not in this room, that something
    solid is holding you so you do not have to hold yourself.


    This book will not give you a technique for switching off your mind on command,
    because your watchfulness is not a bug to disable. It will not optimize your vigilance
    or teach you to monitor more efficiently. It honors why you learned to scan, and
    then it offers your body the one thing the unit never could — a place safe enough
    to lower the guard.


    You are allowed to stop scanning. You are allowed to be off duty in your own body.
    The ground beneath you is keeping watch now, the way it always has, so you can
    finally rest.


    Book 3 of the Held Ground Press Burnout series.'
