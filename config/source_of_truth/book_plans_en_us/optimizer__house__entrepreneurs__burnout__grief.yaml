title: Mourning the Founder You Used to Be
subtitle: For the entrepreneur grieving the fire they had at the beginning — when
  the work you once loved became the thing you're recovering from
cover_tagline: Some of what burned out was never coming back. The morning starts when
  you stop waiting for it to.
description:
  short_blurb: There was a version of you who couldn't wait to get to work — who had
    the fire, the certainty, the all-night energy. That person is gone, and no one
    warns you that recovering from burnout means grieving them. This is a book about
    the loss underneath the exhaustion, and about what becomes possible only after
    you finally let it go.
  long_description: 'Somewhere in the early days, there was a version of you who woke
    up before the alarm because you couldn''t wait to get to the work. The fire was
    real. The certainty was real. You ran on it for years. And then, somewhere you
    can''t quite pinpoint, it went out — and what''s left is a founder who recognizes
    the company but no longer recognizes the person running it.


    No one tells you that burnout is also a grief. That underneath the exhaustion
    is a loss you haven''t been allowed to name, because the company still needs you
    and grief doesn''t fit on a calendar. This book is for the entrepreneur who isn''t
    just tired but is quietly mourning — the energy that''s gone, the version of themselves
    who had it, the love for the work that curdled into dread, the future you were
    so sure of that didn''t arrive.


    Here you''ll come to recognize the shape of what you''ve lost, and stop mistaking
    grief for a personal failure or a problem to fix faster. You''ll see how the founder
    you used to be became a ghost you keep trying to resurrect — pushing harder to
    feel the old fire, and burning what''s left of you in the attempt. You''ll learn
    the difference between recovering the person you were and releasing them, so the
    person you''re becoming has somewhere to stand. And you''ll find that letting
    go is not giving up. It''s the only thing that clears the ground.


    This is not a productivity book, and it is not a redemption arc. There is no protocol
    here for reigniting your passion, no system to get the old you back, no optimization
    that turns mourning into momentum. Nothing here will hand you back the fire, because
    some of what burned out is not coming back — and pretending otherwise is part
    of what keeps you exhausted.


    What it offers instead is permission. Permission to grieve the founder you were
    without betraying the company you built. Permission to wake in the quiet before
    the inbox stirs and feel the loss honestly, so that one morning, without forcing
    it, something new can begin in the cleared space.


    You don''t have to get that person back. You''re allowed to let the morning belong
    to who you are now.


    Book 2 of the Daybreak Editions burnout series.'
