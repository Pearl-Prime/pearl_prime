title: The Person You Were Going to Become
subtitle: For the high-achiever quietly mourning the self the work used up — and the
  future you sold yourself on
cover_tagline: Some of this isn't depression. It's grief you were too busy to feel.
description:
  short_blurb: 'Underneath the flatness is a loss no one let you name: the version
    of you who loved this once, the future you traded everything for, the years the
    work quietly took. This is a book for the high-achiever grieving in a life that
    looks like success. It won''t help you get over it. It will let you finally set
    it down.'
  long_description: 'You can''t point to the funeral. Nobody died. On paper you''ve
    lost nothing — you''ve gained, by every measure they hand out. And still there''s
    a heaviness you wake into, a greyness where the wanting used to be, a sense that
    something is over and you weren''t there to say goodbye to it.


    This is a book for the high-achiever carrying a grief that has no name and no
    permission. For the one who lies in bed looking at the ceiling and feels, underneath
    the numbness, the ache of a loss they''ve never been allowed to call a loss. Because
    some of what you''re calling depression isn''t a disorder. It''s mourning — for
    the version of you who used to love this work before it became a way of disappearing;
    for the future you sold yourself on at twenty-six that quietly stopped being real;
    for the years, the friendships, the ordinary Tuesdays the climb consumed while
    you weren''t looking.


    Here, without hurry, you''ll come to recognize the grief beneath the flatness
    — how loss that is never spoken doesn''t leave, it lowers, settling into the body
    as weight and the days as fog. You''ll see how you learned to skip the goodbye,
    to optimize past the ache, to treat sorrow like a sprint you could finish over
    a weekend. And you''ll be invited to do the one thing the climb never let you
    do: to let go. Not to get over it. To release your grip on the self you thought
    you''d be, and discover that the one grieving — the one who has been here the
    whole time, watching it all leave — was never the self that the work used up.
    It is older than your résumé and untouched by any of it. It cannot be lost, because
    it was never an achievement to begin with.


    This book will not help you move on, hit your milestones of healing, or turn your
    sorrow into a comeback story. It offers no five stages to complete and no fix,
    because grief is not a problem — it is love with nowhere left to go, and it deserves
    more than to be managed.


    So let it come, here, where nothing is required of you. Let the loss be real.
    What you are beneath it is not going anywhere.


    Book 2 of the Awakening Press Depression series.'
