title: Your Courage Reads as Danger to the Body
subtitle: For the parent whose nervous system treats every brave step as a threat
  to brace against
cover_tagline: Your child is fine. Your body didn't get the message.
description:
  short_blurb: The phone buzzes and your stomach drops before you've even read it.
    A cough in the next room, a teacher's email, a too-quiet car ride — and the alarm
    goes off again, full volume, for nothing. This is a book for the parent whose
    love has wired itself into a smoke detector that never sleeps, and who is starting
    to wonder where the courage went.
  long_description: 'You hear them cough once in the next room and you are already
    on your feet. The school number lights up your phone and your whole chest goes
    cold before you''ve answered. They''re ten minutes late and you have already,
    somewhere in your body, written the worst version of the story.


    You are not paranoid. You are a parent whose alarm system learned, somewhere along
    the way, that the stakes were everything — and then never learned how to stand
    down.


    This book is for the working parent who lives at a low, constant hum of dread.
    The one who looks calm at drop-off and is bracing inside for a danger that almost
    never comes. You''ve started to think courage is something other people have —
    some steadiness you lost when these small lives became your responsibility. You
    scan. You catastrophize. You feel the false alarm fire a dozen times a day, and
    you answer every one as if it were real, because what if this is the time it is.


    Here you''ll come to recognize the alarm for what it is: not weakness, not failure,
    but a body that loves so much it forgot how to rest. You''ll see how the bracing
    settled into your shoulders, your jaw, the breath that never quite reaches the
    bottom of your lungs. You''ll learn what it feels like when the ground returns
    underneath a false alarm — when the meridians that have been clenched for years
    begin, slowly, to soften and flow again. Not because the fear was foolish. Because
    you are allowed to set it down between the real moments.


    This book will not promise you a calm you can perform. It will not optimize your
    vigilance or hand you a morning routine to outrun the dread. It won''t tell you
    to stop worrying about the people you''d lie down in traffic for. There is no
    fix here, and no fix is needed.


    What you''ll find instead is this: courage was never the absence of the alarm.
    It was the slow, rooted work of staying — of living inside a body that braces,
    and learning to let it rest anyway. You can be afraid and steady at the same time.
    You can love this much and still breathe all the way down.


    You are not failing them. You are carrying something that matters, and your body
    has been keeping watch the only way it knew how. It''s allowed to come back to
    the ground now.


    Book 1 of the Root & Meridian Press courage series.'
