title: 'Setting Boundaries: Measuring Yourself Against Everyone'
subtitle: A Real Talk Guide to Boundaries for Gen Alpha Students
cover_tagline: Everyone else seems fine saying no. You're not behind. You just never
  learned where the line goes.
description:
  short_blurb: You scroll past people who look like they have it all figured out,
    and somewhere along the way you decided you're the only one who can't say no without
    feeling guilty. This is a straight-talk book for students about why comparison
    makes boundaries feel impossible, and how to stop measuring your limits against
    everyone else's feed. There are no worksheets here and no plan to fix you, just
    the slow work of learning to see the line that was always yours to draw.
  long_description: 'It usually hits in a group chat. Someone asks you to do the thing
    again, and you feel the no rise up in your chest, and then you scroll for half
    a second and see all the people who seem to handle this easily, who say yes to
    everything and still look fine, and you swallow it. You type sure. Again. You
    tell yourself everyone else can do this, so the problem must be you.


    This book is for the student who has turned setting limits into a comparison contest
    they are always losing. The one who looks at classmates, teammates, the kids online
    with the perfect calm, and decides that needing boundaries at all is proof you
    are weaker than everyone in the feed. If you have ever let someone copy your work,
    take your time, or push past your no because saying it felt like admitting you
    could not keep up, this was written for you. You are not the only one who can''t.
    You are just the only one watching yourself fail in real time while everyone else''s
    struggle happens off camera.


    Here is what we actually do. First we name it: the thing crushing you is not your
    boundaries, it is the scoreboard running in your head, the one where everyone
    else got the manual and you somehow didn''t. Then we go down into it instead of
    around it. We look at the highlight reel honestly, at how you are stacking your
    behind-the-scenes against everyone else''s edited best take, and why that math
    can never come out in your favor. We sit in the specific discomfort of being a
    person with limits in a world that performs having none, of being the one who
    needs a minute when the whole room is pretending they don''t. And then you come
    back up different, not because you fixed yourself, but because you stopped handing
    strangers the ruler for your own line.


    This book will not give you a script for the perfect no. It will not promise you''ll
    stop caring what people think, or that boundaries will suddenly feel easy, or
    that you''ll become the unbothered person you keep seeing on the screen. That
    person is not real. The edit is not the day, and nobody is as fine as their feed.


    What it will do is hand the line back to you. The one you never drew because you
    were too busy checking whether you were even allowed to want it. You are. It was
    always yours. You don''t need everyone else to go first, and you don''t need permission
    from a feed that was never telling you the truth.'
