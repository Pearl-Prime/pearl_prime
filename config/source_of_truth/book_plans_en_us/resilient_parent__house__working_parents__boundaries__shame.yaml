title: A Good Parent Wouldn't Need a No
subtitle: For the working parent who believes the limit they need is proof of a flaw
  — and overgives to cover a defect no one else can see
cover_tagline: You're sure a better parent wouldn't be this tired.
description:
  short_blurb: You don't just struggle to set a boundary — you're convinced that needing
    one means something is wrong with you. So you give past empty and hide the cost,
    sure that a good parent, a good worker, a good person wouldn't have a limit in
    the first place. This book is for the part of you that overworks to cover a defect
    that was never there.
  long_description: 'There''s a thought you''ve never quite said out loud. It lives
    underneath the late nights, the unanswered needs of your own, the way you say
    of course before anyone''s even finished asking. The thought goes something like
    this: a good parent wouldn''t need this. A good parent wouldn''t be this depleted,
    this resentful, this close to the edge over something so small. So you give past
    empty, and you hide how empty you are, because the alternative is admitting the
    flaw you''re certain is yours.


    This is for the working parent who carries boundaries as a shame, not a skill.
    The one who believes their own limit is evidence of a defect — that the need for
    rest, for room, for a no, is proof they''re failing at the one thing they''re
    supposed to be good at. You don''t overgive because you have nothing better to
    do. You overgive to cover something. To prove, one yes at a time, that you''re
    not the inadequate person you secretly fear you are.


    In the stolen minutes this book asks of you — the quiet after bedtime, the breath
    caught between one demand and the next — you''ll come to recognize how shame has
    been doing your negotiating for you. You''ll see how it disguises a perfectly
    human limit as a personal failure. You''ll feel the difference between I can''t
    do this and I''m bad for not being able to do this. And slowly, at your own pace,
    you''ll stand at the threshold of a no and discover that the defect you''ve been
    overworking to hide was never a defect at all. It was just a person, with edges,
    asking to be allowed to have them.


    This book will not fix you, because you were never broken. It won''t optimize
    your worth or hand you a cleaner, more deserving version of yourself to become.
    It won''t promise the shame goes silent. What it offers is the slow, unglamorous
    recognition that needing a boundary is not a flaw to be covered — it''s the most
    ordinary thing in the world, and it was always allowed.


    You do not have to be a perfect parent to deserve a limit. You do not have to
    earn your own rest. The few minutes you steal to read this are not selfish. They
    are yours. They always were.


    Book 2 of the Stolen Moment Press Boundaries series.'
