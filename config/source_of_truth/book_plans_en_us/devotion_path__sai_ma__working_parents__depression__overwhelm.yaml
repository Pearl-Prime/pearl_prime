title: The Cup That Won't Stop Overflowing
subtitle: For the depleted parent drowning in everything at once — when the day floods
  in faster than you can hold it and there is nothing left of you underneath
cover_tagline: You are not empty because you stopped caring. You are empty because
  no one ever refilled you.
description:
  short_blurb: Some mornings the day arrives all at once — the lunches, the emails,
    the small hands, the unanswered everything — and you go under before your feet
    hit the floor. This is a book for the working parent who keeps pouring from a
    cup that ran dry months ago and calls the numbness that follows a personal failing.
    It will not hand you a system. It will sit with you in the flood and remind you
    that you, too, were meant to be filled.
  long_description: 'It happens before you are even awake. The day floods in — the
    lunches that need making, the message you forgot to answer, the small voice already
    calling your name down the hall — and you are underwater before your feet touch
    the floor. You move through it anyway. You always do. But somewhere beneath the
    doing, there is a flatness now, a grey nothing where the feeling used to be, and
    you have started to wonder if you have simply run out.


    This book is for you: the working parent who keeps pouring from a cup that emptied
    long ago, who has confused depletion with failure and exhaustion with not caring
    enough. You are not failing. You are a vessel that has been poured out, over and
    over, with love and obligation and the relentless arithmetic of a full life —
    and no one, least of all you, ever stopped to fill it back up.


    Here we will not add one more thing to your day. There is no system, no morning
    routine, no five-step method waiting to demand the energy you do not have. Instead,
    slowly, we will name what overwhelm in depression actually is. The way too much
    arriving at once becomes a fog that looks like apathy. The way the flood drowns
    out the very feelings — joy, tenderness, even grief — that would tell you who
    you still are underneath. We will sit with the weight of it, the bone-tiredness
    of caring for everyone while quietly going hollow, and we will not call it weakness.


    You will come to recognize the difference between the surface that is flooding
    and the still place beneath it that the flood cannot reach. You will learn that
    the cup overflowing is not a problem to solve but a sign — that you were built
    to be filled, and have not been. We will not ask you to do more. We will ask,
    gently, what it might mean to be held for once instead of holding.


    Nothing here will fix you, because you are not broken — you are depleted, and
    depletion is not the same thing. There is no optimizing your way out of an empty
    well. The well refills in the dark, on its own time, when the hands that have
    carried everything are finally allowed to open.


    So set it down. Just for the length of these pages. The day will still be there,
    and so will the people you love. But for now, let someone pour something back
    into you.


    Book 1 of the Open Vessel Press depression series.'
