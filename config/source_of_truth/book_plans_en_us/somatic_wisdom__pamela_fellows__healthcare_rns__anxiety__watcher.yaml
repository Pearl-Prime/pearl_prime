title: The Part of You That Never Stops Scanning
subtitle: For the nurse whose eyes are always on the monitor — softening the hypervigilant
  mind that keeps watch for dangers that never come
cover_tagline: You see every threat coming. You can't remember how to stop looking.
description:
  short_blurb: Your eyes go to the monitor before you've decided to look. You scan
    every room, every face, every drip, always one step ahead of the thing that might
    go wrong. This is a body-based companion for the nurse whose hypervigilant mind
    never goes off duty — even when she's home, even when she's safe. It won't take
    your watchfulness away. It will help you let it rest.
  long_description: 'You walk into a room and your eyes have already swept it — the
    IV, the color, the rise and fall of a chest, the alarm that''s about to sound.
    You catch the thing before it happens, every time, because catching it is the
    job. But the scanning doesn''t stop when the shift does. You watch the road too
    hard. You read faces for trouble at the dinner table. Some part of you is always
    on the perimeter, monitoring for the emergency, and it has been so long since
    it stood down that you''ve forgotten you''re the one keeping it up.


    This book is for the nurse whose watcher never sleeps. The one whose hypervigilance
    saves lives at work and quietly runs her ragged everywhere else. You are not paranoid
    and you are not high-strung. You trained a part of your mind to scan for danger
    constantly because, for years, the danger was constantly real — and that part
    learned its job too well to simply quit when you clock out. The watching kept
    your patients safe. It''s keeping you, now, from ever fully arriving in your own
    life.


    Here you''ll come to recognize the watcher as a body that never came off alert
    — the eyes that dart, the shoulders that won''t drop, the breath held high and
    shallow against a threat that, right now, isn''t there. You''ll learn to thank
    that vigilant part instead of fighting it, because it has been trying to protect
    you all along. And gently, on its own timeline, you''ll begin to show it the difference
    between the unit and your living room, between on-duty and home, until it learns
    that it''s allowed — sometimes, in safe places — to lower its eyes and let the
    ground hold you instead.


    This will not dull the edge that makes you good at what you do. There''s no protocol
    here to switch off your awareness, and you wouldn''t want one. It asks something
    gentler: that you give the watcher permission to rest when the watching isn''t
    needed — so the same nervous system that keeps everyone safe finally gets to feel
    safe itself.


    Nothing here will help you watch more carefully. You already watch carefully enough
    for ten people. What you''ve never been given is permission to look away. That
    is what this book is for.


    You are allowed to put the watch down. The danger is not in this room. You can
    let your eyes close.


    Book 7 of the Felt Sense Publishing anxiety series.'
