title: The Crack You Don't Let Anyone See
subtitle: For the responder who hides the fear because real ones aren't supposed to
  feel it — meeting the buried belief that you're the only one breaking
cover_tagline: Everyone else seems built for this. You're sure you're the one who
  isn't.
description:
  short_blurb: You hold it together on every call and fall apart where no one can
    see. Underneath is a quiet certainty that the others are made of something you're
    not — and that if they knew how scared you really get, you'd lose the only thing
    you have. This is for the fear you've never said out loud.
  long_description: 'You showed up. You did the job. And on the drive home you felt
    the shake in your hands and the thing you never say to anyone — that you''re not
    sure you''re cut out for this. That the others seem built for it in a way you''re
    only pretending to be. That somewhere along the line everyone else got something
    you missed, and you''ve been covering for the gap ever since.


    This book is for the firefighter, the medic, the officer, the dispatcher carrying
    a fear they''ve never set down in front of another living soul. The ones who are
    certain that real responders don''t feel this — that the crack they''re hiding
    is proof of a defect, not a sign of being human in an inhuman job. You are not
    the only one. You are the one who learned, somewhere, that the fear was yours
    to hide, and you''ve been overworking to cover it ever since.


    You''ll come to recognize the shame for what it is. The buried belief that something
    is wrong with you specifically — not the call, not the cost, but you. The way
    you read your fear as a flaw in your making while you assume everyone else''s
    calm is real. The way you''d rather be exhausted than exposed. You''ll see how
    the hiding costs more than the fear ever did — and how the thing you''re most
    afraid to be seen feeling is the most ordinary thing on the crew.


    This is the still center in the storm, the warrior with nothing left to prove
    — least of all to the part of you keeping the verdict. There''s a cliff you stand
    at every time you imagine being honest. The work is one step toward it — what
    is one thing you can let yourself feel before you feel ready to be seen?


    This book will not make you bulletproof, and it will not tell you the fear was
    never there. There''s no fix here for being human, no protocol to optimize the
    shame away, no armor strong enough to make the hiding worth it. The fear is not
    the defect. The belief that you''re the only one carrying it is the wound — and
    the work is not to perform strength but to stop spending it all on the cover-up.


    You are not the weak link. You never were. You''re allowed to be afraid and to
    stay standing anyway — that was always what courage meant.


    Book 3 of the Iron Gate Press courage series.'
