title: 'The Alarm Is Lying: The Grief That Doesn''t Leave'
subtitle: After the Loss — Anxiety for Gen Alpha Students (The Weight You Carry)
cover_tagline: Some anxiety is grief wearing a disguise. This names what you lost.
description:
  short_blurb: Sometimes the anxiety isn't about the future at all. It's about something
    already gone — a person, a version of your life, the way things used to be — that
    you were never really allowed to mourn. This is an honest guide to the loss living
    underneath the worry.
  long_description: 'It doesn''t always announce itself as grief. Sometimes it shows
    up as a low, humming anxiety you can''t trace. A tightness when a certain song
    plays. A dread you feel walking into a house, a school, a group that isn''t the
    same anymore. You keep waiting to feel better and you don''t, because the thing
    underneath isn''t fear of what''s coming. It''s loss of what''s gone.


    This book is for the student carrying a loss the world told them to be over by
    now. Maybe someone died. Maybe your parents split and a whole version of home
    dissolved. Maybe you lost a friendship, a place, a future you were sure of, or
    the person you used to be before everything changed. And maybe nobody ever sat
    you down and called it what it was.


    Nina Vazquez says the quiet part plainly: grief and anxiety can feel almost identical
    from the inside, and when a loss goes unnamed, it doesn''t disappear — it leaks
    out sideways as worry, as restlessness, as an alarm that won''t switch off. You''re
    not anxious for no reason. You''re grieving in a body that was never given permission
    to.


    We name it — the actual loss, not the polished version you give people who ask
    if you''re okay. Then we go down into it, which is the part everyone skips, because
    going down into grief feels like it might swallow you. It won''t. You''ll learn
    the difference between mourning something and being broken by it, why "moving
    on" was always the wrong instruction, and how grief that gets felt moves differently
    than grief that gets managed. You come back from this changed — not fixed, not
    healed on a schedule, but able to carry what you lost without it running the whole
    show from underground.


    This is not a book that promises closure, or stages, or a date when it stops hurting.
    It won''t tell you they''re in a better place or that everything happens for a
    reason. It won''t rush you. It won''t optimize your healing.


    What it will do is give you words for a loss you may have been carrying silently
    for years — words you can finally say to yourself in the dark. You are allowed
    to grieve something everyone else has forgotten. You are allowed to still miss
    it. That''s not anxiety to be fixed. That''s love with nowhere to go, and it deserves
    to be named.'
