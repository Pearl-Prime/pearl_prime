title: Everything at Once, and It's Already Late
subtitle: For the working parent whose to-do list has no bottom — when too much arrives
  at the same time and there's no room left in you to hold any of it
cover_tagline: You're not behind. You're flooded.
description:
  short_blurb: There is a moment, usually after bedtime, when the day finally stops
    moving and you realize you never had a chance. The emails, the laundry, the form
    that was due, the dinner that has to happen again tomorrow. This is a book for
    the working parent who is not disorganized and not lazy, just buried under more
    than any one person was built to carry at once.
  long_description: 'It starts before your feet hit the floor. The day is already
    full when you wake into it, and by 8am you''re behind on things you haven''t even
    reached yet. The lunches, the drop-off, the meeting you didn''t prepare for, the
    text from school, the thing you said you''d handle. It all arrives at the same
    time, and there is no room left in you to think, only to react.


    This is a book for the working parent who is drowning in the volume of it. Not
    the parent who needs better habits or a cleaner calendar, but the one who has
    tried all of that and is still standing in the kitchen at 9pm with the counter
    full and nowhere to put any of it down. You are not failing at managing your life.
    Your life is asking more of you, all at once, than capacity allows, and your body
    has started to register that as a constant low alarm.


    Here you''ll come to recognize what overwhelm actually is. How it isn''t the same
    as having too much to do, but the feeling of it all landing at once, with no space
    between. How it floods out the part of you that can prioritize, so everything
    feels equally urgent and nothing feels possible. How the to-do list isn''t really
    a list anymore, it''s a tide, and you''ve been trying to bail it with a teaspoon.
    You''ll see why you freeze on the stair instead of getting up, and why that freeze
    is not weakness but a flooded system protecting itself.


    This book will not hand you a new system. It will not teach you to do more in
    less time, or wake earlier, or finally get organized. There is no productivity
    hack here, because the problem was never your productivity. What it offers instead
    is recognition, and a few stolen minutes you don''t have to earn, the small still
    pocket in a day that has no room in it, reclaimed without anyone noticing.


    You are allowed to not catch up tonight. The flood does not require you to be
    its match.


    Book 1 of the Stolen Moment Press working parents burnout series.'
