title: 'The Number in Your Head: When Everything Is Too Much'
subtitle: A One-Hour Money Anxiety Reset for the Sandwich Generation
cover_tagline: Your parents' bills, your kids' future, your own retirement — all due,
  all at once, all yours.
description:
  short_blurb: Mom's care costs more than anyone said it would, the kids' expenses
    never stop, and your own retirement is a question mark you can't look at directly.
    This one-hour reset meets you when the money math floods your brain, and helps
    you come down from the flood without pretending the numbers got smaller.
  long_description: 'You sit down to look at the money and within thirty seconds your
    chest is tight. There''s your mother''s care, more expensive every month than
    anyone warned you. There''s the kid who needs braces, or tuition, or just to eat.
    There''s your own retirement, which you''ve stopped opening the statement for.
    And there''s the quiet, sickening sense that the math doesn''t close — that you''re
    funding three life stages at once on one income, and your brain just floods and
    shuts the laptop.


    This is for you — the one in the squeeze of the sandwich generation, paying for
    the people above you and the people below you while your own future waits at the
    back of the line. This isn''t about being bad with money. You can add. The problem
    is that there''s genuinely too much landing on one set of shoulders, and the overwhelm
    is the honest signal of an impossible load.


    This is a one-hour reset, built in three stages. Recognition: you learn to catch
    the moment money overwhelm floods in — the held breath, the tight throat, the
    way every expense suddenly feels equally urgent and equally hopeless — before
    it drowns your ability to think. Descent: instead of spiraling into spreadsheets
    at midnight or slamming the whole thing shut, you go down into the too-much itself,
    and stop pretending you can out-calculate a nervous system that''s underwater.
    You let the load be as big as it actually is. Integration: you surface able to
    face one real number, one real decision, instead of the whole crushing pile at
    once.


    This book will not hand you a budgeting app, a side-hustle, or a promise that
    if you just optimize harder it all fits. You don''t have a discipline problem;
    you have a math-bigger-than-one-person problem, and no spreadsheet dissolves that.
    It won''t pretend the costs disappear. Your parents still need care. Your kids
    still need support. What changes is that you stop drowning in all of it at once
    and learn to come up for air and meet the money one piece at a time.


    In plain language you can reach for the next time the numbers flood you, you''ll
    get a way to name it — "I''m overwhelmed, not irresponsible" — and a way down
    from the flood that doesn''t require the bills to shrink. You don''t have to solve
    everyone''s financial future in one sitting. You''re allowed to let the wave of
    money panic crest and pass instead of fighting it. For one hour, set the whole
    impossible ledger down and let your mind clear. Start here.'
