title: 'The Number in Your Head: Escaping the Mental Loop'
subtitle: A One-Hour Money Anxiety Reset for Young Professionals
cover_tagline: One look at your balance, and your brain has already lost the apartment,
  the job, the whole life.
description:
  short_blurb: It starts with a single expense and ten seconds later you're broke,
    jobless, and dying alone — all without spending another cent. This is a one-hour
    money anxiety reset for the young professional whose mind turns one money thought
    into a thousand.
  long_description: 'It begins with one thought. The car needs a repair. And before
    you''ve even gotten the quote, your mind is off: that''s the emergency fund gone,
    which means if you lose your job you''re done, which means you can''t make rent,
    which means you''re moving back home at twenty-seven, which means everyone was
    right about you. Ten seconds. No new information. Just one money worry that fissioned
    into a thousand and took your whole nervous system with it. This book is for the
    young professional whose financial anxiety doesn''t stay a single concern, it
    spirals.


    The money spiral is a specific trap. It feels like planning, like you''re being
    responsible by gaming out every catastrophe, but it''s the opposite of useful.
    It takes one real, solvable expense and inflates it into a doomsday timeline you
    then have to live inside, heart pounding, at 2am, over a problem that hasn''t
    happened and probably won''t. You''re not being dramatic. Your mind has just learned
    to treat every dollar as a thread that, if pulled, unravels your entire future.
    And the more you try to think your way to the bottom of it, the deeper it goes.


    In one hour, this is a way out of the loop that doesn''t require you to win the
    argument with it. You''ll recognize the money spiral the instant it starts, that
    first innocent thought before it branches, and learn to feel the difference between
    actual planning and catastrophic free-fall. Then you''ll go down into the spiral
    instead of chasing it thought by thought, because you cannot out-reason a loop
    that generates a new worst-case faster than you can debunk the last one. And you''ll
    come back able to hold a real financial question without your mind hijacking it
    into the end of your life.


    This will not promise to make your money worries ''rational.'' It will not hand
    you a worksheet to argue the spiral down, or a planning system thorough enough
    to finally feel safe, because the spiral isn''t a thinking problem you can solve
    with more thinking. No morning routine. No reframe where catastrophizing is ''just
    being prepared.''


    What it will give you is the felt experience of a spiral losing its grip mid-flight,
    and the knowledge that you can step off the loop without resolving every imagined
    disaster on it. The repair is just a repair. You don''t have to follow the thought
    all the way down to the bottom of your life. You''re allowed to stop at the first
    floor. You''re allowed to put the thread down.'
