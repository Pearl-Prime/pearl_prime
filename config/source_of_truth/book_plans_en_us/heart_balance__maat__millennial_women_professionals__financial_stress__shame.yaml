title: The Number You Don't Say Out Loud
subtitle: For the woman who looks like she's doing fine — and hides what she actually
  owes, earns, and fears she'll never fix
cover_tagline: The figure you'd never let anyone see — and what it's quietly decided
  about you.
description:
  short_blurb: There's a number you carry that no one in your life knows — what you
    actually owe, what you actually have, how far behind you really feel. This is
    a book for the millennial woman who has turned money stress into a private verdict
    on her worth, and overworks to keep anyone from finding out. It won't tell you
    to fix the number. It will help you stop hiding from the one who carries it.
  long_description: 'There is a number you don''t say out loud. Maybe it''s what you
    owe. Maybe it''s what you don''t have. Maybe it''s the gap between the life you
    present and the balance you actually live with. Whatever it is, you''ve never
    told the whole truth of it to a single person — not your closest friend, not the
    partner who shares your bed, sometimes not even yourself, all the way. You keep
    it covered. And somewhere along the way the number stopped being a fact about
    your finances and became a verdict about you.


    This book is for the woman who has quietly decided that the money problem is proof
    of something wrong with her. Not bad luck. Not a brutal economy. A defect. You
    look composed — you''ve made sure of that — and underneath the composure you are
    working overtime to outrun a shame you''d be mortified to name. You give more,
    charge less, say yes when you mean no, achieve and achieve, all to cover a number
    you''re certain would make people see what you already believe: that you don''t
    measure up.


    You''ll come to recognize the shame for what it is. How a balance sheet quietly
    became a measure of your worth, and why the hiding costs more than the number
    ever could. You''ll see the difference between what you owe and what you are —
    that an ancient instrument meant to count coins was never built to weigh a human
    heart. You''ll learn what it feels like to let the number be true without letting
    it be a judgment, to set your worth on one side of the scale and your debt on
    the other and watch them refuse to balance, because they were never the same kind
    of thing. You''ll find that the defect you''ve been covering was never a defect.
    It was a fair person, in a hard season, carrying a weight alone.


    This book will not promise to erase the number or optimize your way to enough.
    It won''t tell you that money doesn''t matter or that a better mindset would make
    the shortfall disappear. The pressure is real, and so is the grief of it, and
    you deserve a book that respects both instead of papering over them.


    What it offers is the one thing the hiding has cost you: relief. A way to weigh
    your worth on its own terms, apart from the ledger. Permission to stop overworking
    the cover story and let the truth weigh exactly what it weighs — no more, and
    not a feather more than that.


    You are not the number. You never were. Let''s set it down where you can finally
    look at it without flinching.


    Book 3 of the Feather & Scale Press financial stress series.'
