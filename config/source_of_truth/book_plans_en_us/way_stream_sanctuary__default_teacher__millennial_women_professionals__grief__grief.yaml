title: 'Grief: When Loss Reshapes Everything'
subtitle: A Field Guide for Professional Women Navigating Grief
cover_tagline: Grief doesn't care that you have a deadline. It reshapes the whole
  landscape and waits for you to notice.
description:
  short_blurb: Something or someone is gone, and the world expects you back at your
    desk by Monday. This is a field guide for the professional woman grieving inside
    a life that won't pause for it. It won't rush you through stages. It'll walk down
    into the loss with you and let it change you.
  long_description: 'There''s a meeting at ten and you''re sitting in the parking
    garage with your hands at ten and two, unable to make yourself walk in, because
    grief came up out of nowhere again and flattened you. The world has decided you''ve
    had enough time. The casseroles stopped. The check-in texts thinned out. And you
    are still standing in the wreckage of something that ended, expected to function
    like the landscape didn''t just get rearranged.


    This book is for the professional woman grieving on a schedule that has no room
    for grief. The one who took the bereavement days, or didn''t, and came back to
    a job and a life that kept moving while something essential in her stopped. Maybe
    it''s a death. Maybe it''s a marriage, a pregnancy that didn''t hold, a parent
    slipping, a friendship that died without a fight. Maybe it''s a future you''d
    already half-built that quietly will not happen now. Whatever it is, the loss
    is real, and the pressure to be over it is relentless.


    Grace Adeyemi does not believe in tidy stages or grief on a timeline. First, recognition:
    this is not you being dramatic or weak or behind, this is loss doing exactly what
    loss does, which is reshape everything and refuse to be hurried. Then descent.
    Instead of helping you get past it or move on, this book walks down into the grief
    beside you, slow and unflinching, teaching you to feel where it lives in your
    body and to stop treating each wave as a setback to be managed before the next
    call. Then integration: not closure, not the loss neatly behind you, but a you
    reshaped by what happened, able to carry it into the rest of your life without
    being leveled by it every time it surfaces.


    This is not a five-stages plan and it is not a recovery arc. There is no timeline
    here, no milestone where you''re declared healed, no morning routine that processes
    loss while you sleep. It will not tell you they''re in a better place or that
    everything happens for a reason or that you''ll be back to yourself by spring.
    You won''t be back to yourself. This book won''t pretend the goal is to. What
    it offers instead is someone who will go down into the loss with you and stay
    there, and language you can actually use when grief ambushes you in a parking
    garage at 9:52, three minutes before you have to walk in and be fine.


    If you''ve been grieving in stolen moments, composing your face before the meeting,
    holding it together because the world stopped making room, this book makes room.
    You don''t have to be over it. You''re allowed to let it reshape you. Start here.'
