title: The Bug You Think Is You
subtitle: For the high-achiever overworking to hide a flaw they're sure is real —
  quieting the anxiety that whispers the problem is who you are
cover_tagline: You're not afraid of being found behind. You're afraid of being found
  out.
description:
  short_blurb: 'Underneath the performance is a quieter fear: that the problem isn''t
    the workload, it''s you — and that if anyone looked closely enough, they''d see
    the flaw you''ve been overworking to cover. This is a steadying book for the high-achiever
    carrying that hidden shame, and a way to stop hiding from yourself.'
  long_description: 'You can name every external thing you''re afraid of — the missed
    number, the bad review, the round that doesn''t close. But underneath all of it
    is a quieter fear you don''t say out loud, the one that runs the whole machine:
    that the problem isn''t the work at all. That it''s you. That somewhere in you
    there''s a defect, a bug in the core code, and the only reason no one has found
    it yet is that you''ve been working hard enough, fast enough, late enough to keep
    it covered.


    This is a book for the shame underneath the anxiety.


    The tech-and-finance world runs on visible output, and you learned early that
    to be valued you had to perform — that any gap, any not-knowing, any ordinary
    human limit might be the thing that exposes you. So you over-prepared. You stayed
    later. You answered faster. And the dread that drives all of it isn''t really
    fear of failing. It''s fear of being seen — of someone looking closely enough
    to find the flaw you''re certain is there, the one you''ve never let anyone near,
    the one you can barely look at yourself.


    You''ll come to recognize how the shame braids into everything else. The body
    bracing for the moment of exposure. The flood of work you take on to stay ahead
    of the verdict. The spiral that turns one mistake into proof of your defectiveness.
    The grief for the person who didn''t yet believe something was wrong with them.
    The comparison to colleagues who seem to move through the world without this weight.
    The watcher scanning every room for the face that''s about to see you clearly.


    This book will not help you finally fix the flaw, because the flaw is not the
    truth — and chasing it has only ever fed it. It will not hand you affirmations
    to paper over the dread, or another self-improvement project to prove your worth.
    It will not promise that you''ll suddenly feel enough. What it offers instead
    is the harbor: a place where you can come in off the open water and be a person
    rather than a performance, where the thing you''ve been hiding turns out to be
    ordinary, human, and not a bug at all.


    You are not a defect that learned to compensate. You are a person who was taught
    that being seen was dangerous, and you are allowed to be seen anyway. You are
    allowed to stop hiding from yourself.


    Book 4 of the Harbor Line Books anxiety series.'
