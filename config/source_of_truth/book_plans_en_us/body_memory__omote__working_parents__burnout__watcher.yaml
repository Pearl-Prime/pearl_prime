title: Still on Watch Long After the House Is Asleep
subtitle: For the burned-out parent whose body keeps guarding when the day is finally
  done
cover_tagline: Everyone else is asleep. The part of you on watch is not.
description:
  short_blurb: Even when nothing is wrong, some part of you is still on duty — listening
    for the cry, running the list, bracing for the thing you might have forgotten.
    This is for the working parent whose mind never fully clocks out, and who has
    begun to mistake exhaustion for vigilance. There is a way to let the watch end
    without anything falling apart.
  long_description: 'The house is quiet. The children are asleep. The doors are locked
    and tomorrow is, for now, still far away. And yet some part of you is still standing
    guard — listening for a sound that isn''t coming, running the list one more time,
    scanning the hours ahead for the one thing that might go wrong if you let yourself
    stop paying attention. You can''t remember the last time you were fully off duty.
    Some nights you''re not sure you''d even know how.


    This book is for the working parent whose mind never clocks out. The one who lies
    in the dark cataloguing everything still undone. The one who keeps everyone fed
    and safe and held together, and pays for it with a body that never quite gets
    the message that the danger has passed. You have become the watcher — alert, scanning,
    quietly certain that if you let your guard down for even a moment, something will
    slip through the gap you left.


    Here you''ll come to recognize that vigilance for what it actually is: not responsibility,
    not love, not proof that you care enough — but a body that learned to brace a
    long time ago and was never told it could stop. You''ll feel how the scanning
    mind keeps you depleted by keeping you forever ready for threats that, night after
    night, never come. You''ll see the real difference between the attention that
    genuinely protects your children and the endless watch that is quietly hollowing
    you out from the inside. And you''ll begin to feel what it might be like to let
    the ground keep watch for a while — to trust that you can set your guard down
    and the floor will still be there, holding, steady, not moving.


    This is not a book about discipline or tighter control. It will not tell you to
    monitor your thoughts more carefully or to manage your mind into stillness by
    force, because that is only one more shift added to an already endless watch.
    There is no trick for outworking hypervigilance. What''s here instead is something
    steadier underneath you: permission to finally come off duty, and the reminder
    that safety can be something the ground holds for you, not something you have
    to generate alone, by yourself, all night, forever.


    You don''t have to keep watch over everything to be a good parent. You''re allowed
    to set the scanning down. You''re allowed to let yourself be held by something
    solid that doesn''t move — so the part of you that has never once rested can,
    at last, for one whole night, stand down.


    Book 3 of the Held Ground Press burnout series.'
