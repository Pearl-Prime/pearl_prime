title: The Version of Me That Could Carry All of It
subtitle: For the burned-out builder grieving the self who used to thrive on the pressure
  — and the anxiety that comes from refusing to let that person go
cover_tagline: You keep reaching for someone who isn't there anymore.
description:
  short_blurb: There was a version of you who ran on the pressure, who answered every
    ping and loved the climb and never seemed to tire. They are gone, and you keep
    reaching for them anyway. This is a book about the quiet grief underneath your
    anxiety — the loss of the self who could carry all of it — and what it asks of
    you to finally let that person rest.
  long_description: 'You remember who you used to be. The one who thrived on the deadline.
    Who took the hard project and the impossible quarter and somehow always delivered.
    Who ran on adrenaline and ambition and never seemed to run out. You keep reaching
    for that person, asking them to show up the way they always did — and they do
    not come.


    This is grief, though you may never have called it that. The anxiety you feel
    is not only about the work ahead. It is about the self you are losing: the tireless
    one, the one who could carry all of it, the one whose identity was the carrying.
    Something has been taken — your old capacity, your old certainty, maybe your old
    love for the thing you built. And until you let it go, the body keeps bracing
    against a loss it has not been allowed to name.


    This book is for the builder running on empty who cannot admit the tank is gone.
    For the founder, the engineer, the operator mourning a former self while everyone
    still expects that self to deliver. For anyone whose anxiety is really the sound
    of refusing to grieve.


    In these spare pages you will come to recognize the loss underneath the dread:
    the person you were, the pace you can no longer keep, the story about yourself
    that no longer fits. You will see how clinging to that self keeps the alarm ringing,
    and how the body holds an unmourned loss like a stone in the chest. You will sit
    with the question it has been asking all along — what is your body trying to tell
    you, when it can no longer carry what it used to?


    Nothing here will help you get the old self back. There is no protocol to restore
    the former pace, no reframe to optimize the loss away. That is the point. This
    is not about recovering who you were. It is about letting that person rest in
    the clean light, and finding out, slowly, who remains when the carrying is set
    down.


    You do not have to keep reaching for them. You are allowed to let go.


    Book 5 of the Bare Form Books Anxiety series.'
