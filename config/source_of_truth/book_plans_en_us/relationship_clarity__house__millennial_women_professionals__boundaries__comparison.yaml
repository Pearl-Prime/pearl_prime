title: Everyone Else Seems to Say No So Easily
subtitle: For the woman watching other people set limits like it's nothing — and measuring
  her own swallowed yeses against their easy, guiltless boundaries
cover_tagline: She said no in one sentence. You'd have written three paragraphs and
  still said yes.
description:
  short_blurb: You watch other people decline things — calmly, in a sentence, without
    a follow-up apology — and something in you twists. They make it look effortless.
    You'd have over-explained, hedged, and caved. This is a book for the mind that
    measures its own boundaries against everyone who seems to have figured it out,
    and always comes up the weaker one.
  long_description: 'She said no like it was nothing. One clean sentence, no apology
    trailing behind it, no three-day guilt hangover. And you sat there doing the math
    you always do — how does she make it look so easy, why does it cost me so much,
    what is she made of that I''m not. By the time you finished comparing, you''d
    already said yes to the thing you didn''t want.


    This book is for the millennial woman who measures her own limits against everyone
    who seems to set theirs so cleanly. The coworker who leaves at five. The friend
    who ''just isn''t going to make it.'' The woman online with the calm caption about
    protecting her peace. They all look like they were handed an ease you missed,
    and every time you watch them, the verdict comes back the same: everyone else
    seems to say no so easily, and you''re the one still folding.


    You''ll come to recognize how comparison runs your boundary life from the cheap
    seats. How you study other people''s no''s for a technique you can copy, and find
    only proof that you''re behind. How ''she just has better boundaries'' quietly
    translates to ''she''s better than me.'' How you never actually see the cost their
    boundaries had — only the clean, finished version, edited down to a single confident
    line — and how you''ve been grading your messy, real, in-progress self against
    everyone else''s highlight.


    We''ll sit with the measuring itself. Not to win the comparison, not to make you
    the one who says no most impressively, but to set the scale down entirely — because
    a boundary borrowed to look like someone else''s never holds. Yours will sound
    like you: hesitant some days, kind, a little long-winded. That''s not a worse
    boundary. That''s a real one.


    This book will not turn you into the woman who declines things flawlessly. It
    won''t promise that the comparing stops, or hand you her exact sentence to perform.
    It will not make your relationships a contest you''re finally winning. Nothing
    here will help you come out ahead, because that was never the point.


    What it offers is your own chair, at your own table, and a way to say your own
    no — in your own words, at your own pace — without first checking how it measured
    up to hers. You were never behind. You were just looking at the wrong table.


    Book 3 of the Two Chairs Press boundaries series.'
