cover_tagline: It's not one big thing. It's forty small things, all at once, all yours.
description:
  short_blurb: The school called, the pharmacy called, your boss needs the thing,
    and your mom's appointment got moved, and it's only 9:40am. This is a secular,
    real-talk guide to overwhelm, the specific anxiety of too much landing at once,
    for the people holding two generations on one set of shoulders. It won't hand
    you a planner. It'll tell you the truth about capacity.
  long_description: 'It rarely arrives as a single crisis you could brace for. It
    arrives as volume. The texts stack up, the calls overlap, the kid needs a ride
    exactly when the pharmacy says your dad''s prescription needs a call-back exactly
    when work pings you, and the alarm in your chest goes off, not because any one
    thing is unsurvivable, but because all of it is happening in the same ten minutes
    and you only have one body. That''s overwhelm. Not weakness, not poor planning.
    Just more inputs than any human nervous system was built to hold.


    This book is for the person in the middle of the sandwich, where the inputs come
    from both directions at once. Your kids generate a life''s worth of logistics.
    Your parents generate a second one, increasingly urgent, full of pharmacies and
    portals and people who only have appointments at 10am on a workday. And you are
    the single point of failure for both. The world keeps suggesting you need a better
    system, a color-coded calendar, a productivity hack, as if the problem were your
    filing and not the sheer, crushing quantity of what you''re being asked to carry.


    So we don''t optimize. We do three things instead. Recognition: you learn to feel
    overwhelm arriving in the body before it becomes a meltdown, the early tightening,
    the tunnel vision, the snappishness, so you can name it, too much is landing at
    once. Then descent: instead of speeding up to outrun it, you go down into the
    overwhelm and let the system come back online, because you can''t think your way
    out of a flooded nervous system, you can only let the flood recede. And then you
    come back up, still with forty things to do, but no longer drowning while you
    do them, able to see the list instead of being buried under it.


    This will not give you a morning routine or promise to clear your plate, because
    your plate is not the problem and frankly your plate is not going to clear for
    years. What it offers is a way to be inside the too-much without the alarm running
    the show, so you can pick the next single thing and do it, and then the one after
    that.


    You are not behind. You are not bad at this. You are one person being asked to
    do the work of three, and the overwhelm is the honest signal of a real overload.
    Put down the planner. You don''t need a better system. You need permission to
    only have one pair of hands.'
