title: The Parent I Meant to Be
subtitle: For the working parent grieving who they were before the exhaustion — the
  patience, the presence, the self that burnout quietly took
cover_tagline: You're not just tired. You're mourning someone. It's you.
description:
  short_blurb: 'Somewhere in the long blur of doing everything, you lost the parent
    you meant to be — the one with patience, with presence, with something left over
    at the end of the day. This is a book for the working parent carrying a grief
    they''ve never been allowed to name: not for a person who died, but for the self
    the depletion took. It does not tell you to bounce back. It sits with you in the
    loss, and helps you let it move.'
  long_description: 'There''s a particular ache that comes when you snap at your kid
    over something small, and you see their face, and you think: that''s not who I
    wanted to be. You meant to be the patient one. The present one. The parent who
    knelt down and listened instead of saying ''in a minute'' for the fourth time
    while answering a work message. And somewhere in the long, blurred years of holding
    everything, that version of you went quiet. You don''t know exactly when. You
    just know they''re gone, and you miss them, and no one seems to understand that
    you are grieving.


    This book is for the working parent carrying a loss that has no funeral. Burnout
    did not just exhaust you — it took things. The energy you used to have for bedtime
    stories. The version of your relationship that had room in it for tenderness.
    The career you pictured, or the parent you pictured, before you understood you
    could not be both at full volume. The self who had a self. You''ve been told to
    be grateful, to keep going, to count your blessings. No one told you it was allowed
    to hurt this much.


    You''ll come to recognize grief as it actually lives in the body — the heaviness
    in the chest that isn''t sadness exactly, the throat that tightens around words
    you can''t say, the numbness that is not peace but a body that has braced against
    feeling for too long. You''ll learn that what you''re carrying is not ingratitude
    or weakness. It is mourning, real and reasonable, for something genuinely lost.


    This book will not tell you to bounce back. It will not promise the old you returns
    intact, or that you can optimize your way to renewal. It does not believe that
    grief is a problem to be solved or a stage to push through on a schedule. There
    is no fix here, because loss is not a malfunction.


    What there is, is permission to let it move. Grief held in the body doesn''t disappear
    when you ignore it; it just gets heavier. So you''ll be invited, gently, to feel
    the weight of what was taken — and to discover that letting it be there, finally,
    is what lets it begin to soften. Not gone. Carried differently.


    You are allowed to mourn the parent you meant to be. You are allowed to love them
    and miss them. And you are allowed, when you''re ready, to meet the parent you
    actually are — tired, changed, still here, still theirs.


    Book 2 of the Felt Sense Publishing burnout series.'
