title: It Feels Like They're About to Find Out
subtitle: For the college student whose body sounds the alarm in every lecture hall
  — bracing to be exposed in a room where nothing is actually wrong
cover_tagline: The danger you keep bracing for is not in the room.
description:
  short_blurb: Your heart is pounding before the professor has even said your name.
    Your body is convinced you're about to be caught — caught not knowing, caught
    not belonging, caught having fooled everyone to get here. This is a book for the
    student whose alarm system fires in a room where there was never any real threat,
    and who is ready to stop confusing the alarm for the truth.
  long_description: 'You walk into the seminar and something in your chest tightens
    before anyone has even looked at you. Your hands go cold. A voice you can''t quite
    locate says: today is the day they realize you don''t belong here. You scan the
    syllabus for the moment it all falls apart.


    But class ends. Nothing happens. And tomorrow your body does it all again.


    This book is for you — the college student whose internal alarm goes off in lecture
    halls, in office hours, in group projects, in every room where you''re sure you''re
    about to be exposed as the one who slipped through. You are not in danger. Your
    nervous system has just learned to treat belonging as a threat, and it keeps bracing
    for an exposure that never comes.


    You''ll come to recognize the false alarm for what it is. How the pounding heart
    arrives before any real evidence does. How the dread of being found out lives
    in your body long before it lives in any fact. How the question that gets called
    on someone else still leaves your face hot, as if the danger were yours. How you''ve
    been reading your own fear as proof, when fear was never proof of anything except
    that you care. We''ll stay with the moment the alarm fires — not to silence it,
    but to stop letting it decide what''s true about you.


    This is not a book that will teach you to fake calm you don''t feel. It won''t
    hand you a swagger to perform or an affirmation to recite into the mirror until
    you believe it. There is no trick here for winning the room. The point was never
    to win the room. The point is to stand in the doorway of that lecture hall and
    feel your own body sound the alarm — and walk in anyway, because you finally know
    the difference between a real threat and an old habit of bracing.


    You earned the seat. The acceptance wasn''t a clerical error. The alarm is loud,
    but loud is not the same as right.


    You don''t have to make the fear disappear before you cross the threshold. You
    only have to stop believing it knows something you don''t.


    Book 1 of the Threshold Books imposter syndrome series.'
