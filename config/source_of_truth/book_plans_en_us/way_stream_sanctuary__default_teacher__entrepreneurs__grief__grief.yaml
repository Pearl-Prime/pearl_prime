title: 'Grief: Living with What You''ve Lost'
subtitle: A Real Talk Guide to Grief for Entrepreneurs
cover_tagline: Something is gone and you still have a standup in ten minutes.
description:
  short_blurb: For the founder grieving while the company keeps demanding they show
    up. This is a field guide to loss that doesn't pause for your roadmap, whether
    you lost a person, a partner, a co-founder, or the future you were building toward.
    No five stages, no closure timeline, just honest company for the low place.
  long_description: 'Something is gone, and you have a standup in ten minutes. That''s
    the impossible math of grieving as a founder. The loss is enormous and the calendar
    does not care. People are waiting on you, decisions are stacking up, the company
    has no idea the floor just dropped out of your life, and you are expected to lead
    it through Tuesday like Tuesday is a normal day.


    This book is for the founder carrying a real loss while running a company that
    won''t hold still for it. Maybe it''s a death. Maybe it''s the co-founder who
    walked, the partnership that broke, the marriage that didn''t survive the building
    years, or the whole future you were certain you were running toward until it vanished.
    Whatever it was, it''s gone, and you''re grieving it in stolen moments between
    meetings, in the car, in the bathroom, with your face fixed back into ''fine''
    before the next call connects.


    The real talk is that grief is not a problem to be solved on a timeline, and it
    definitely does not run on your sprint cadence. There are no five tidy stages
    you can checklist your way through. There is no closure date you can put on the
    roadmap.


    First you name it plainly, you say what you lost without softening it into something
    more manageable. Then you let yourself go down into it, not as a productivity
    outage to recover from but as the honest weight of something that mattered, because
    grief is not weakness leaving the body, it''s love with nowhere left to go. And
    then you come back up changed, carrying the loss with you into the work instead
    of leaving it at the door and pretending you''re who you were before.


    This will not promise you''ll be over it by the next quarter. It will not hand
    you a grief-processing framework or tell you the loss was secretly a lesson that
    made you a stronger leader. There is no optimization here and no silver lining
    you''re being asked to find. What it offers is plainer: company for the low place,
    language for the days the grief ambushes you mid-meeting, and permission to lead
    as a person who is grieving rather than one pretending nothing broke.


    You are allowed to grieve and still run the company. You are allowed to put the
    performance down here and let the loss be exactly as large as it is.'
