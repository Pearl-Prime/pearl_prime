title: Your Body Is Holding the Whole Day
subtitle: For the burned-out high-performer whose chest stays tight long after the
  laptop closes — when everything arrives at once and there's no room left in your
  body to think
cover_tagline: The day ended hours ago. Your shoulders never got the message.
description:
  short_blurb: You handle more in a day than most people carry in a week, and your
    body has been keeping the receipts. This is a quiet, grounding companion for the
    high-performer who's running on a flooded nervous system — too much arriving at
    once, capacity long since exceeded, and a body that braces even in sleep. It won't
    ask you to do more. It asks you to come back down.
  long_description: 'By the time you close the laptop, your body has already absorbed
    the whole day. The pings that never stopped. The dread that arrived before the
    market did. The decisions stacked on decisions until there was no room left to
    think — only react. You handled it. You always handle it. And now it''s late,
    the house is quiet, and your chest is still tight, your jaw still set, your shoulders
    still up around your ears as if the flood might come back any second.


    This book is for you — the one everyone counts on. The high-performer in tech
    or finance whose competence has quietly cost them their own body. You''ve spent
    years overriding the signals: the clenched stomach during the standup, the held
    breath through the close, the way your hands shake a little when the day finally
    lets go. You''ve treated your nervous system like one more system to optimize,
    and it has finally stopped responding to the upgrades.


    Here, slowly, you''ll come to recognize what overwhelm actually is. Not a character
    flaw. Not weak time management. It''s a body that took on more than any body is
    built to hold, all at once, for years — and never got the all-clear. You''ll learn
    to feel the flood as it begins instead of only in the wreckage afterward. You''ll
    find the small, real ways a body comes back to ground: the exhale that''s longer
    than the inhale, the feet that remember the floor, the place inside the breakwater
    where the swell can''t reach you. You''ll stop confusing motion with safety.


    This book will not make you faster. It will not optimize your recovery or turn
    your healing into a new performance to win at. There is no protocol here to ace,
    no streak to keep. If you''re looking for one more thing to be good at, this isn''t
    it — and that''s exactly the point. A body that has been at sea for years doesn''t
    need to push harder against the water. It needs the harbor.


    You don''t have to carry the whole day in your body. You''re allowed to set it
    down — not tomorrow, not once everything''s handled, but here, in the next slow
    breath. The water inside the harbor is already still. You just have to let yourself
    drift in.


    Book 1 of the Harbor Line Books somatic healing series.'
