title: The Year Everyone Needed You at Once
subtitle: A parent, a teenager, and a job in the same braced body — and a way to let
  the flood down when it arrives faster than you can breathe
cover_tagline: Your shoulders have been up since the year it all began.
description:
  short_blurb: There came a year when your mother's care, your kids' lives, and your
    work all arrived in the same hour, and your body has been bracing ever since.
    This is a quiet book for the caretaker who has run out of room to think, who cannot
    remember the last time the load felt set down. It will not hand you a better system.
    It will help you feel the forest floor take some of the weight.
  long_description: 'It usually starts with a phone call. The one from the doctor,
    or the school, or the bank, and then another, and then three more before lunch,
    until the days stop arriving one at a time and begin arriving all at once, a flood
    with no banks. You are the one everyone calls. Your aging parent, your teenager,
    your boss, the people who depend on you depending on you — and somewhere underneath
    all of it is a body that hasn''t fully exhaled in years.


    This book is for you. For the one in the middle of the sandwich years, mid-forties
    to late fifties, holding more than two generations in a single chest. For the
    caretaker whose shoulders have been up around the ears since the diagnosis, the
    divorce, the layoff, the year it all landed together. You know the feeling that
    there is no more room — that one more request will be the one too many — and you
    have learned to keep moving anyway, because if you stop, who holds it all?


    Walking slowly, the way you do beneath old trees, you will come to recognize what
    overwhelm actually is. Not weakness. Not poor planning. It is a body past capacity,
    an alarm still ringing long after the first emergency passed, a nervous system
    that learned to brace and forgot how to unbrace. You will feel where the flood
    lives in you — the clenched jaw, the shallow breath, the gut that never quite
    settles — and you will be shown how to let a little of it down, not by managing
    harder, but by stopping the stirring so the water can go clear on its own.


    This book promises nothing it cannot keep. It will not optimize your morning.
    It will not make you calmer so you can carry more. It offers no hack, no fix,
    no five-minute routine to fold into a life that already has no folds left. The
    forest does not hurry the mind that needs to slow down, and neither will these
    pages.


    What it offers instead is room. An hour where you are not managing anyone. A place
    to set the weight on the forest floor that has always known how to hold what falls
    — leaves, branches, the whole slow year of it — and let the ground take its turn.


    You are not failing. You are flooded. There is a difference, and your body has
    been trying to tell you for a long time.


    Book 1 of the Still Forest Press somatic healing series.'
