title: 'The Seat You Earned: What Shame Does to You'
subtitle: A Field Guide for Millennial Women Professionals Navigating Imposter Syndrome
cover_tagline: It's not that you might get exposed. It's that you believe there's
  something to expose.
description:
  short_blurb: Imposter syndrome isn't humility — it's shame wearing a blazer. This
    book goes under the fear of being found out to the belief that there's something
    wrong with you in the first place.
  long_description: 'You got the promotion. The praise. The proof on paper that you
    are, by every external measure, good at this. And underneath all of it sits a
    quiet dread that has nothing to do with your work and everything to do with you:
    the certainty that if anyone ever looked closely enough, they''d find the flaw
    at the center. Not a skills gap. Something more fundamental. Something wrong with
    who you are that the achievement has only just been covering.


    This book is for the professional woman whose imposter syndrome was never really
    about competence. The one who is genuinely good at her job and still stands braced
    to be exposed, who reads each success as a near-miss before the discovery, who
    carries a private belief that she is fundamentally not enough and has quietly
    turned her entire career into a performance built to keep that hidden.


    First we name what''s actually running the show: this is shame, not modesty. The
    dread of being "found out" only makes sense if some part of you is convinced there''s
    something rotten to find. That conviction — that you are wrong at the root — came
    from somewhere long before this office, this title, this team. Imposter syndrome
    is just the tailored suit it puts on to come to work.


    Then we stop achieving and turn toward the belief itself. Not by stacking up more
    wins to drown out the dread — you''ve tried that, and it only ever resurfaces
    one rung higher — but by getting close enough to the conviction to see what it''s
    made of. To notice it was never a fact about you, only a story you absorbed before
    you had any say in the matter and have been frantically managing ever since. We
    don''t dismantle it with logic. We stop fleeing it. That''s what finally drains
    the charge out of it.


    What comes back isn''t bulletproof confidence. It''s the slow, almost anticlimactic
    realization that there was never anything down there to expose. You feel the old
    dread rise before a high-stakes moment and you recognize it now — not as a warning
    to heed, but as an old wound that has been doing the talking for far too long.


    This won''t give you talking points for your inner critic or a gratitude list
    for your accomplishments. It won''t promise the dread never visits again. It will
    end its authority to define you.


    There is no hidden flaw at your center. There never was one to find.'
