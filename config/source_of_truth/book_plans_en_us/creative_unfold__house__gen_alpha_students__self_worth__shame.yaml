title: The Version of You They Never Get to See
subtitle: For the student who hides the real, unfinished self behind perfect grades
  and a perfect feed — exhausted from covering up the part of you that was never the
  flaw
cover_tagline: You've been painting over the part of you that was the whole point.
description:
  short_blurb: There's a version of you that you keep behind the good grades, the
    right answers, the carefully posted self — the one you're sure people would leave
    if they ever saw it. This is a book for the part of you that's tired of holding
    the brush up to hide instead of make. It won't promise to fix you, because the
    thing you've been covering was never the flaw.
  long_description: 'There''s a feeling you''ve never quite said out loud. That if
    anyone saw the real version of you — the messy one, the one who doesn''t actually
    have it together, the one underneath the grades and the feed and the answer you
    always know — they''d quietly back away. So you cover for that version. You overdo
    the homework. You curate the post. You become the one who''s fine, the one who''s
    impressive, the one who never lets the seam show. And it works. That''s the worst
    part. It works, and you''re so tired.


    This book is for the student carrying a belief they didn''t choose and can''t
    remember agreeing to: that there is something wrong with them, specifically, that
    everyone else got the instructions for and they missed. Not a mistake you made.
    Something you are. You''ve built a whole life on top of hiding it — and the building
    is exhausting to hold up.


    We''re going to look at the cover-up gently, the way you''d look at an early sketch
    you were embarrassed by. You''ll come to recognize the mask for what it is — not
    your real face, just the layer you painted over the real one when you were too
    young to know you were allowed to be seen. You''ll feel where the shame actually
    lives in your body, the bracing, the flinch before anyone''s even looking. You''ll
    notice how much of your energy goes to proving you''re not the thing you secretly
    believe you are. And underneath all of it, you''ll meet the version you''ve been
    hiding — and find out it was never the defect. It was the picture. The whole point.
    The part that''s actually you.


    This book will not fix you, because you are not broken and there is nothing to
    repair. It won''t optimize you into someone more acceptable. It won''t hand you
    a brighter mask. There''s no glow-up here, no upgrade, no five steps to a more
    postable self. What''s underneath the cover-up isn''t a worse version. It''s the
    original. The one no one else could make, because no one else is you.


    You are allowed to be a draft. You are allowed to be seen mid-sketch, half-made,
    still figuring out your own hands. The unfinished thing is not the failure. It''s
    where everything real starts.


    Book 1 of the Blank Canvas Books Self-Worth series.'
