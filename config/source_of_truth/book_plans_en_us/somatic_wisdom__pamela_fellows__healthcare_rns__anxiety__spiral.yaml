title: Did I Chart That
subtitle: For the nurse replaying the shift at 2am — easing the loop of one worry
  becoming a thousand when the thought won't let the body sleep
cover_tagline: You closed the door. The shift followed you home anyway, and it's still
  talking.
description:
  short_blurb: It starts with one thought — did I chart that, did I catch that, did
    I miss something — and by 2am it has become a thousand. This is a gentle, body-based
    companion for the nurse whose mind replays the shift on a loop that feeds itself.
    It won't argue you out of the spiral. It will help your body step off the wheel
    that the thinking can't.
  long_description: 'It''s a single thought at first. Did I document that order. Did
    the night nurse catch what I flagged. Was that patient''s color off, and did I
    say something, and was it enough. One worry, reasonable enough — and then it forks,
    and forks again, and an hour later you are lying in the dark having mentally re-run
    the entire shift and lost every round. Your heart is going. Your stomach is tight.
    The thoughts are moving too fast to hold and too loud to leave, and the more you
    try to think your way to the bottom, the deeper the wheel turns.


    This book is for the nurse who lies awake litigating a shift that is already over.
    The one whose mind treats every small uncertainty like a thread that must be pulled
    until something unravels. You are not careless — the opposite. You care so precisely,
    and the stakes have been so real for so long, that your mind has learned it can
    never fully stand down. So at night, when there''s finally nothing to do, it does
    the only thing it knows: it scans, and it spirals.


    Here you''ll come to recognize the spiral as a body event, not just a thought
    event — the racing that lives in the chest, the churn in the belly, the way rumination
    is fed by a nervous system that won''t come off watch. You''ll learn that you
    cannot win the argument the spiral is having, because the spiral doesn''t want
    an answer; it wants to keep moving. So instead of chasing the thoughts, you''ll
    practice gently bringing your body back to ground beneath them — the weight of
    you in the bed, the long slow breath out, the warmth returning to a chest that''s
    been braced — until the loop loses the fuel it runs on.


    This will not give you certainty about the shift. There is no protocol here to
    guarantee you missed nothing, because that certainty was never available to anyone.
    It asks something kinder: that you stop demanding your mind solve, at 2am, what
    only the morning can answer, and let your body rest while it waits.


    Nothing here will help you think your way out. The thinking is the wheel. What
    you''ve never been given is permission to step off it without first reaching the
    bottom. That is what this book is for.


    You are allowed to let the thought be unfinished. The morning is allowed to hold
    what the night cannot.


    Book 3 of the Felt Sense Publishing anxiety series.'
