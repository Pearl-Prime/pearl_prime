cover_tagline: Your body is coding. The patient is fine. So are you.
description:
  short_blurb: Your heart is pounding, your hands have gone cold, and your brain is
    screaming that something is wrong — except the monitor is green and the shift
    is quiet. This is the one-hour reset for the nurse whose own alarm keeps firing
    with no real danger behind it. Learn, in a single sitting, to read the signal
    without obeying it.
  long_description: 'It hits you on a slow night, of all times. The unit is calm,
    your patients are stable, and your body decides to sound the alarm anyway — racing
    heart, tight chest, that electric certainty that you''ve missed something catastrophic.
    You scan the board. You recheck the orders. Everything''s fine. And still your
    system is convinced you''re about to lose someone.


    This hour is for the nurse who has spent years training her body to treat every
    beep as a threat — because on this job, sometimes it is. You are wired to respond.
    You catch the subtle change, the off rhythm, the wrong number. That instinct keeps
    people alive. But the same alarm that saves your patients has started firing inside
    you with nothing on the other end of it, and you''re left flooded with adrenaline
    over a danger that isn''t in the room.


    The recognition is this: a false alarm feels exactly like a real one. Your body
    can''t tell the difference between a deteriorating patient and a quiet Tuesday.
    The pounding heart is not evidence. The dread is not a diagnosis. Your nervous
    system is doing the thing it was built to do — it''s just doing it at the wrong
    time, on you.


    Then we go down into the sensation instead of fighting it. Not breathing exercises
    to make it stop, not logic to argue it away — those are just you trying to silence
    a smoke detector by yelling at it. Instead you''ll learn to stand inside the surge
    and let it be exactly as loud as it is, while you stay. You''ll learn the felt
    difference between assess the patient and your body misfiring, so the next time
    it grips you mid-shift you can say, plainly: this is a false alarm. The danger
    signal is misreading the room.


    This book will not promise to shut your alarm off. It can''t, and honestly you
    wouldn''t want it to — that hypervigilance is part of what makes you good. It
    won''t optimize your stress response or hand you a four-step grounding script
    to run in the med room. No forced calm, no pretending the floor isn''t genuinely
    frightening some nights.


    What changes is your relationship to the surge. You stop treating every spike
    of dread as proof and start treating it as weather — intense, real, passing. You
    can let your body sound the alarm and not have to evacuate. You are allowed to
    feel the danger signal fire and stay exactly where you are. The alarm is lying.
    You''re still here, and you''re okay.'
