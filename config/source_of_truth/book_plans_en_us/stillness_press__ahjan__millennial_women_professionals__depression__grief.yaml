title: Mourning a Self You Never Got to Become
subtitle: For the woman grieving the life she expected — when depression is the long
  ache of letting go of who you thought you'd be by now
cover_tagline: Some of what you lost was never a person. It still deserves to be grieved.
description:
  short_blurb: Not all grief has a funeral. Sometimes the loss is quieter — the version
    of your life you were sure you'd be living, the lightness you used to have, the
    self you thought you'd have grown into by now. This is a book for the woman whose
    depression is shaped like mourning, and who has never been given permission to
    grieve a loss no one else can see. It asks nothing of you but that you stop pretending
    nothing was lost.
  long_description: 'There was a life you thought you''d be living by now. Not a fantasy
    — a reasonable, ordinary future you were quietly counting on. And somewhere along
    the way it didn''t arrive, or it arrived hollowed out, and no one held a service
    for it. You went to work. You kept going. But something in you has been mourning
    for a long time, and you''ve never been allowed to call it grief.


    This book is for the woman whose depression feels like loss. Who can''t always
    say what she''s grieving — the relationship, the version of herself before she
    got so tired, the lightness that used to come easily, the self she was supposed
    to become by now. Who keeps waiting to feel better, not understanding that what
    she''s actually carrying is sorrow with nowhere to go. You are not ungrateful.
    You are not stuck. You are grieving something real, and grief that is never named
    doesn''t leave — it just goes gray and settles into the body as a weight you mistake
    for your own failure.


    You''ll come to recognize the losses hiding inside your heaviness — the ones with
    no obvious object, the future selves quietly mourned, the things you were never
    permitted to miss out loud. You''ll see how depression and grief wear the same
    flat face, and why trying to cheer yourself up has never reached the place that
    actually hurts. You''ll learn what it means to let something be over — not to
    get past it on a schedule, but to finally turn toward it and let it be the loss
    it always was. And in that turning, slowly, the weight begins to move.


    This book will not rush your grief or promise it ends. It offers no stages to
    complete, no closure to manufacture, no way to convert your loss into a lesson
    learned. It will not tell you to look on the bright side. What it offers instead
    is rare: the recognition that what you lost was worth losing, the permission to
    mourn it without explaining yourself, and a steady voice that will sit with you
    in the ache rather than hurry you out of it.


    You are allowed to grieve what no one else can see. You are allowed to miss the
    life that didn''t come. You are allowed, here, to set down the pretending and
    let it finally be loss.


    Book 2 of the Stillness Press depression series.'
