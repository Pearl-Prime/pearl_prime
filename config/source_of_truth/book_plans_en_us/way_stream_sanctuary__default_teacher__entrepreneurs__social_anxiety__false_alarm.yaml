title: 'Social Anxiety: The False Alarm Response (2)'
subtitle: How Entrepreneurs Are Rewriting the Rules of Social Anxiety
cover_tagline: Networking isn't a threat. Your body didn't get the memo.
description:
  short_blurb: Walk into the mixer, the conference, the dinner where you're supposed
    to work the room — and your body floods like you're in actual danger. This is
    a field guide for founders whose nervous system treats a roomful of people as
    a predator, and who've been reading that alarm as a reason to leave.
  long_description: 'You said yes weeks ago, and now you''re in the parking lot outside
    the conference, doing the math on whether anyone would notice if you skipped it.
    The badge, the lanyard, the room full of people you''re supposed to turn into
    intros — and your body has already cast its vote. Throat tight, face hot, that
    low hum that says leave. So you go in late and leave early. You find the one person
    you already know and stand with them. You call yourself an introvert and let that
    be the end of it.


    This book is for the founder who can close a deal over email and fall apart at
    the dinner after. The one who''s talked themselves out of the event that would''ve
    changed the quarter — the panel they didn''t volunteer for, the table they didn''t
    join, the founder they didn''t go say hello to because their pulse was already
    in their ears. Nothing about you is broken, and you are not bad at people. You''re
    carrying a threat detector calibrated for a savanna, and it keeps going off in
    hotel ballrooms.


    So you''ll start by catching it in the act — not the dread itself but the instant
    it arrives, the exact bodily tell that means your alarm just tripped, before you''ve
    turned it into a reason to bail. Then comes the part nobody teaches: you turn
    toward the sensation instead of sprinting from it. Not breathing it away, not
    powering through gritted teeth — actually feeling the heat and the hum as what
    they are, a chemical weather system passing through, with no information in them
    about whether these people will like you. The flood crests, and you''re still
    standing. Do that enough times and a gap opens between "my body is loud" and "I
    should go home."


    What this won''t do is turn you into the person working the room like it''s nothing.
    The alarm doesn''t have an off switch, and anyone promising you one is selling
    you something. It''ll trip in the next doorway too. The difference is whose hand
    is on the calendar — yours, or a panic that can''t tell a mixer from a mugging.
    No scripts taped inside your wrist, no bathroom pep talk, no performance to keep
    alive until the valet brings the car.


    Some future doorway has a flood with your name on it — a summit, an intro, a hand
    you meant to shake before your throat closed. Feel all of it, cross the threshold,
    and stay through the part that counts. Whatever your body was reporting about
    that room, it wasn''t the truth; it was just a false reading turned up to full
    volume.'
