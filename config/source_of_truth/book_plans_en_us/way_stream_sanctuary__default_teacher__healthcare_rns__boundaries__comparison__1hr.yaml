title: 'Setting Boundaries: The Comparison Habit (3)'
subtitle: How Healthcare Rns Are Rewriting the Rules of Boundaries
cover_tagline: She picked up the extra shift without blinking. You said no, and you've
  felt small ever since.
description:
  short_blurb: The nurse two beds down takes every overtime, charts faster, and never
    seems to need the break you fought for. This is a one-hour, no-fluff read for
    nurses who keep moving their own line because someone else can apparently survive
    without one. It won't tell you to admire her less. It'll show you why measuring
    your limit against hers is how you lost track of where yours actually was.
  long_description: 'It''s the staffing board at the start of shift. Someone''s name
    is on the open slot again, the one you turned down, and there''s a small drop
    in your stomach that has nothing to do with the patients waiting. She can do it.
    She picks up the doubles, floats without complaining, charts through lunch, and
    somehow walks out steady. And you, who finally said no to the third twelve in
    a row, feel like you got caught being weak.


    This one-hour read is for the nurse who has quietly turned every other person
    on the unit into a ruler. You don''t compare salaries or skill — you compare endurance.
    How much they can absorb before they crack, and whether you should be able to
    absorb that much too. So you move your own line. Again. Until you genuinely can''t
    tell anymore where it was, only that hers is always further out and you''re always
    behind it.


    We''re going to name what''s happening, in plain words you can use the next time
    it grabs you: comparison is not information. The fact that another nurse appears
    to need no boundary tells you nothing about where yours belongs — you can''t see
    her sleep, her marriage, the thing she''s running from by staying on the floor.
    You only see the surface, and you''ve been grading your insides against everyone
    else''s outsides.


    Then we go down into it instead of around it. We sit in the specific sting of
    watching someone get praised for the exact thing that''s burning you out, and
    we stop treating that sting as proof you''re failing. We follow it to what it
    actually is: a line you never drew, because drawing one felt like admitting you''re
    less than the nurse who didn''t.


    This book will not optimize you. It won''t make you faster, tougher, or more available.
    It will not teach you to stop noticing other people — you''re a nurse, noticing
    is the job. What it will do is unhook your limit from theirs, so that where you
    stop is a decision you made on purpose, not a number you backed into by losing
    a race nobody else knew you were running.


    You come back from this able to watch another nurse do more, and let that be true,
    without it meaning anything about you at all.


    The line was never supposed to match hers. It was supposed to be yours. You''re
    allowed to draw it where you actually end.'
