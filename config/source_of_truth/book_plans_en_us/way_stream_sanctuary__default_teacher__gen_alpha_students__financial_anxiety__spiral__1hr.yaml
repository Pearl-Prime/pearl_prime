title: 'The Number in Your Head: Escaping the Mental Loop'
subtitle: The Overthinking Spiral — Financial Anxiety for Gen Alpha Students (Breaking
  the Thought Loop)
cover_tagline: One thought about money at 1am. By 2am it's your whole future collapsing.
description:
  short_blurb: 'It starts with one small money thought — and then it''s everything:
    you''ll never afford it, you''ll be in debt forever, your whole life is already
    ruined. One worry becomes a thousand, and you can''t get out. This is a one-hour
    read about the money spiral, and how to stop free-falling when one thought multiplies
    in the dark.'
  long_description: 'It always starts small. One thought — that bill, that number,
    that thing you can''t afford — and then it''s moving. You''ll never have enough.
    You''ll be paying this off forever. You picked the wrong path, you''re already
    behind, your entire future is a disaster you can suddenly see in high definition
    at one in the morning. One worry splits into ten, ten into a hundred, and you''re
    lying there free-falling through every worst-case version of your life with nothing
    to grab onto.


    The trap is that in the moment it doesn''t feel like a spiral. It feels like clarity
    — like you''re finally seeing the truth about how bad things really are. That''s
    the part this book takes apart. What looks like seeing clearly is actually one
    real thought multiplying out of control in the dark, and the difference between
    those two things is everything.


    This is for the student whose brain takes a single money worry and runs it all
    the way to total ruin in under a minute — usually at night, usually alone. Jonah
    Kim''s approach is blunt and it works: you don''t try to think your way out, because
    reasoning with a spiral just feeds it more branches. Instead you learn to watch
    it happen. You catch the one true thing you''re actually scared of, and then you
    watch your mind stack a thousand fake certainties on top of it — and you let yourself
    feel the fear at the center without signing off on every catastrophe it grows.
    The grip loosens the moment you stop mistaking the spiral for the facts.


    You won''t find calming tricks dressed up as cures in here, no ''just think positive,''
    no budgeting exercise aimed at making the fear disappear, no claim that the money
    worry was never real to begin with. The book won''t promise the future is definitely
    fine, and it won''t promise you never spiral again. What it gives you is the catch
    — the ability to notice the multiplying as it begins, so one money thought stops
    automatically becoming a thousand, and you can plant your feet on the single true
    thing instead of falling through all the rest.


    A mind that spirals about money isn''t broken or dramatic. It''s a mind that takes
    a genuine fear and can''t stop it from breeding. You''re allowed to have the fear
    without believing every story it spins off. You''re allowed to stop the free-fall
    and find solid ground at 1am. After an hour with this, the spiral stops being
    the truth about your future and becomes something you can watch start — and step
    out of.'
