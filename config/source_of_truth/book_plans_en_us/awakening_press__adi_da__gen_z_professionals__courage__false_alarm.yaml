title: The Body That Cried Wolf
subtitle: For the young professional whose alarm goes off before every send, every
  speak-up, every door — and who keeps mistaking the alarm for the truth
cover_tagline: Your body is bracing for a tiger. There is no tiger. There's just an
  email.
description:
  short_blurb: Your nervous system can't tell the difference between a saber-toothed
    cat and an unread message from your manager. So it fires the same old alarm —
    chest tight, breath shallow, send button suddenly terrifying. This book is for
    the wide-awake twenty-something who has spent years obeying a false alarm, and
    is ready to learn what's actually steady underneath it.
  long_description: 'You felt it again this morning. The interview, the unmuted mic,
    the doorway of the room where the decision gets made — and before you''d even
    moved, your body sounded the alarm. Heart in the throat. Hands cold. A jolt of
    dread so physical it felt like proof that something was about to go very wrong.


    Nothing was about to go wrong. There was a meeting. There was a message. There
    was a person, probably as nervous as you.


    This book is for the young professional whose body keeps crying wolf. You are
    early in your career and you have already learned to flinch — to read danger into
    a quiet pause, a delayed reply, a face that didn''t smile. You''ve been told you''re
    anxious, that you lack confidence, that you should just feel the fear and do it
    anyway. None of that touched the real problem, which is this: you have been treating
    a false alarm as if it were the truth.


    You''ll come to recognize the alarm for what it is — an old, loyal, badly calibrated
    system, firing for a threat that isn''t in the room. You''ll see how it floods
    you before a hard conversation and convinces you the flood is a verdict on who
    you are. You''ll feel the way one ungrounded moment can convince the whole body
    it''s in danger. And slowly, you''ll find the part of you that notices the alarm
    without being swept into it — the still, unbothered awareness that was watching
    the panic the entire time and never once believed it.


    This is not a book about silencing the alarm. You can''t, and you wouldn''t want
    to. It will not make you fearless, hand you a confident persona, or turn courage
    into one more thing to optimize. It will not promise that the bracing stops.


    What it offers is older and quieter than that. It offers you the recognition that
    the one who is afraid is not all of who you are — and that you can feel the alarm
    screaming, and act anyway, not because you''ve conquered it, but because you finally
    know it isn''t you.


    You were never the fear. You were the open sky it kept moving across.


    Start there. Send the message from there.


    Book 1 of the Awakening Press courage series.'
