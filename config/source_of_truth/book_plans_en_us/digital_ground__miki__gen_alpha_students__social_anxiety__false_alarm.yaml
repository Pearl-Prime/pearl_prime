title: Nothing Even Happened
subtitle: For the high schooler whose body sounds the alarm before a single word is
  said — the dread outside the classroom door, the brace before you've even sat down
cover_tagline: Your heart is racing for a door you haven't opened yet.
description:
  short_blurb: You feel the dread before you've even walked in. Heart going, hands
    cold, that full-body brace — like something terrible is about to happen, except
    nothing is. This is a book for the version of you that gets the danger signal
    in a room where there's no danger at all.
  long_description: 'You''re standing outside the classroom and your body already
    knows. Heart fast. Palms cold. That bracing in your chest like you''re about to
    be hit — except you''re just about to walk in and sit down. Nobody''s said anything
    to you. Nothing has even happened yet. And still, the alarm is screaming.


    This book is for the high schooler whose nervous system fires before the moment
    does. The one who''s already rehearsing the worst thing in the bathroom mirror.
    The one who reads the group chat eleven times before typing and then deletes it.
    You''re not weak and you''re not dramatic. You''re carrying an alarm system that''s
    doing exactly what it was built to do — it''s just pointed at the wrong thing.
    It thinks a room full of your classmates is a room full of teeth.


    You''ll come to recognize the alarm for what it is. The way the false danger feels
    identical to real danger from the inside. The bracing before the party, the spiral
    before the presentation, the way one unanswered text becomes proof that everyone''s
    done with you. You''ll learn what your body is actually doing in those seconds
    — not so you can hate it, but so you can finally tell the difference between a
    threat and a feeling. Between the alarm and the thing it''s warning you about,
    which most of the time was never there.


    This won''t make the feeling stop. It can''t, and anything that promises it can
    is lying to you. There''s no breathing trick here that turns you into someone
    who walks into rooms easy. There''s no glow-up, no confidence hack, no version
    of you that you have to become before lunch. Nobody is going to tell you to just
    put yourself out there.


    What''s here instead is recognition. The next time your body sounds the alarm
    over nothing, you''ll know what it''s doing. You''ll know it''s old, and loud,
    and trying to protect you, and wrong. You''ll feel the heart and the cold hands
    and the bracing, and you''ll have a name for all of it. You''ll still feel it.
    But you won''t be alone inside it, and you won''t believe it the way you used
    to.


    You were never broken. The alarm just got loud before you were ready, and nobody
    told you that''s what it was.


    Book 1 of the Present Tense Books social anxiety series.'
