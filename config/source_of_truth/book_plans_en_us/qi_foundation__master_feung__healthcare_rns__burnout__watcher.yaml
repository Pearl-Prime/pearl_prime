title: Still Listening for the Alarm
subtitle: For the nurse whose mind never clocks out — scanning for the next crash
  long after the shift, the monitors, and the patients are gone
cover_tagline: You're home. Your nervous system never got the message.
description:
  short_blurb: Off the unit, in your own bed, some part of you is still counting respirations
    and waiting for the tone to change. The vigilance that keeps your patients alive
    doesn't switch off when you badge out, and it has been running you for years.
    This is a book for the nurse whose scanning mind never goes off duty. It will
    not make you stop caring. It will help the watch finally stand down.
  long_description: 'You''re at dinner, or in bed, or watching something with your
    eyes open and nothing going in, and a part of you is still on the unit. Still
    listening underneath the quiet for a monitor to change pitch. Still half-bracing
    for the overhead page, the rapid response, the thing about to go wrong. The shift
    ended hours ago. Nobody is crashing. And yet the watch is still posted, scanning
    a room that isn''t there, because the part of you trained to catch the early sign
    of trouble was never told it could rest.


    This book is for the nurse whose mind never comes off duty. The one who wakes
    at 3am already assessing, who can''t sit through a meal without one ear cocked
    for an emergency, who reads every silence as the calm before something. On the
    unit, that vigilance is a gift — it''s why your patients are safe, why you catch
    the subtle change before the numbers do. But hypervigilance doesn''t know how
    to clock out. It follows you home and keeps your whole system braced for a danger
    that, here, never comes. And a body that never stands down never gets to refill
    from the root.


    You''ll come to recognize the watcher for what it is — not anxiety to be ashamed
    of, not a flaw, but a survival skill that learned its job too well and forgot
    there was ever an off-duty. You''ll see how the scanning feeds itself, how rest
    started to feel like negligence, and what it costs the deep energy of the body
    to hold the line around the clock. You''ll learn the difference between the alertness
    your patients need from you and the relentless monitoring that is slowly draining
    the ground you stand on. And you''ll begin to let the breath drop all the way
    down — the signal a braced body finally believes.


    This book will not promise to switch off your awareness or turn you into someone
    who doesn''t care so much. It won''t optimize your vigilance or drill your nervous
    system into compliance. There is no hack here and no off switch. There is only
    the slow practice of letting the watch stand down when the danger is past, of
    teaching a body that has guarded for years that it is, for now, safe enough to
    let the ground hold the watching for a while.


    You are allowed to stop scanning. You are allowed to be off duty when you are
    off duty. The alarm is not sounding, and you do not have to be the one listening
    for it tonight.


    Book 3 of the Root & Meridian Press burnout series.'
