title: An Alarm With No Fire Behind It
subtitle: For the capable professional whose body braces before the standup, the off-site,
  the team lunch — an alarm ringing with no fire anywhere behind it
cover_tagline: Your body is sounding an alarm for a room that was only ever a room.
description:
  short_blurb: You can ship the work, close the deal, carry the project — and still
    feel your chest tighten the moment a meeting fills with people. This is a book
    for the high-functioning professional whose nervous system treats an ordinary
    room like a threat. It won't make you fearless. It will help you notice that the
    danger was never in the room.
  long_description: 'The meeting invite lands and something in you braces. Not your
    mind — your body, first. A tightening behind the sternum. A held breath you didn''t
    decide to hold. By the time you join the call or walk through the door, the alarm
    has already been ringing for an hour, and you have spent that hour managing it
    so well that no one can tell.


    This book is for the tech or finance professional who can build the thing, run
    the numbers, carry the quarter — and still feels the floor tilt when a room fills
    with colleagues. You are not fragile. You are not bad at people. You carry an
    alarm that keeps firing for a threat that isn''t there: the standup that is only
    a standup, the lunch that is only a lunch, the one-on-one with the manager who,
    in fact, is on your side. The signal is loud. The danger is absent. Both are true
    at once, and you have been living in the gap between them.


    You will come to recognize the false alarm for what it is. The way your breath
    leaves before a word is spoken. The way you read a quiet face as a verdict. The
    way your body rehearses for an attack that never comes, then files the calm afterward
    as proof you got away with something. You will see how good you''ve become at
    hiding the bracing — and what that hiding costs, hour after hour, in a body that
    never gets the all-clear.


    There is no trick here, and nothing to install. Just a slow, plain looking at
    what is actually happening in the room: a few people, some chairs, the ordinary
    light. The threat your body keeps announcing is not in any of it. It never was.


    This is not exposure therapy. It will not hand you a script, a power pose, or
    a breathing drill to deploy before you walk in. It will not promise that the fear
    disappears. What it offers is quieter and more durable: a way to stand in the
    room and feel the alarm without obeying it. To let the signal pass through you
    instead of running the meeting from inside it. To learn, slowly, in your own body,
    that nothing in this room was ever going to hurt you.


    Nothing here asks you to perform a calm you don''t feel. The bracing is allowed
    to be there. So are you. You do not have to earn your place in the room before
    you''re allowed to breathe in it.


    Book 1 of the Bare Form Books social anxiety series.'
