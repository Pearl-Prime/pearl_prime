title: The Nurse I Was Before This
subtitle: For the one who grieves the patients she lost and the version of herself
  the work quietly took — and is ready to stop carrying both
cover_tagline: Some of what you're tired from, you've been holding for years.
description:
  short_blurb: You learned to keep moving past the deaths because the next patient
    couldn't wait. But the grief didn't go anywhere — it went down, into the root,
    and it has been quietly draining you ever since. This is a book for the nurse
    mourning the people she couldn't save and the open-hearted person she used to
    be. It will not ask you to let go faster. It will help you finally set it down.
  long_description: 'There was a patient you think about more than the others. Maybe
    you held a hand at the end of a shift and then went straight back to the desk
    to chart, because there was no room in the day to feel it. Maybe you can''t even
    name which loss it was anymore — only that something in you closed a little each
    time, and at some point it stopped opening back up. You are tired in a way sleep
    doesn''t touch. That kind of tired is often grief that was never given anywhere
    to go.


    This book is for the nurse who has been quietly mourning for years and calling
    it burnout. The one who grieves the patients she lost, the families whose faces
    she still carries, and something harder to say out loud — the version of herself
    who walked in on the first day, soft and certain and full of why she came. The
    work asked her to keep moving, and she did, because that''s the job. But the losses
    didn''t dissolve. They settled into the deep ground of her, and a root that''s
    holding that much can''t carry sap to the surface anymore.


    You''ll come to recognize the weight you''ve been carrying as grief, not deficiency
    — accumulated, unmourned, pressed down by every shift that didn''t pause for it.
    You''ll see how the not-feeling that got you through is the same not-feeling that''s
    hollowing you out. You''ll learn what it means to grieve not only the people,
    but the nurse you were before the armor, and to understand that releasing what
    you''ve held is not abandoning anyone. It is what finally lets the well refill
    from below.


    This book will not rush you toward closure or hand you stages to complete. It
    won''t promise that letting go will make you a more efficient clinician or that
    healing is one more thing to achieve before your next stretch of nights. There
    is no fixing here, because grief is not a malfunction. There is only the slow,
    honest work of putting down what you were never meant to carry alone this long,
    and discovering that some of the heaviness was never yours to keep.


    You are allowed to mourn them. You are allowed to miss who you were. And you are
    allowed to let some of it go — not because it didn''t matter, but because you
    did, and you still do.


    Book 2 of the Root & Meridian Press burnout series.'
