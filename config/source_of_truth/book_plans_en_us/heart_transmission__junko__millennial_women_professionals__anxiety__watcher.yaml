title: She Came on Duty Years Ago
subtitle: The room read before you sit, the tone heard behind every email — a quiet
  relief for the woman whose watchful mind started keeping guard long ago and never
  heard the order to rest
cover_tagline: It's still scanning the horizon for a storm that never breaks.
description:
  short_blurb: There's a part of you that never stops watching — reading every face,
    bracing for every reply, scanning the horizon for trouble that almost never comes.
    This is a book for the woman whose vigilant mind never clocks out, written to
    help her let the watch stand down without feeling like she's dropping her guard.
  long_description: 'It''s always on. The part of you that reads the room before you''ve
    sat down, that hears the tone behind the email, that catches the flicker on a
    face and starts preparing for the worst. It scans your sent messages for what
    you said wrong. It keeps one eye on the exits, the deadlines, the mood of everyone
    around you. You may not even feel it as fear anymore — it''s just the hum you
    live inside, a sentry that came on duty years ago and never once heard the order
    to rest.


    This book is for you: the one everyone calls perceptive and intuitive, the one
    who sees trouble coming a mile off, who has confused constant vigilance with being
    responsible and exhaustion with being careful. You are not paranoid. You are not
    too much. You have a watchful, protective part that learned, somewhere back there,
    that safety meant never being caught off guard — and it has been faithfully scanning
    the horizon ever since for a storm that, almost always, never breaks.


    Here, you''ll come to recognize the watcher for what it is — not the truth about
    how dangerous your life is, not a job you must keep doing to stay safe, but a
    loyal guard that doesn''t know its shift ended long ago. You''ll see how being
    on alert became your normal, how you started mistaking the scanning for control.
    You''ll learn what it feels like to let the watch stand down for a moment — not
    by forcing the vigilance away, not by white-knuckling yourself into calm, but
    by offering that tireless sentinel something it has never been given: the felt
    sense that someone else has got it now, that it''s allowed to set the binoculars
    down and come inside. That warmth, that being-relieved-of-the-post, is what finally
    lets a watchful body rest.


    This book will not hand you a vigilance-reduction drill, a scanning-reduction
    protocol, or the promise that you''ll never read a room again. Your perceptiveness
    is a gift and it isn''t going anywhere. What''s offered here is rest for the part
    of you that has been standing guard alone for far too long.


    You don''t have to keep watch every second to be safe. The threat you keep bracing
    for is, almost always, not coming — and the part of you that''s been scanning
    for it is allowed, at last, to come off duty. Let the watch stand down. You can
    lower your guard and still be okay.


    Book 7 of the Heart Transmission Press anxiety series.'
