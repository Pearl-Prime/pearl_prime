title: The Good One
subtitle: For the woman who keeps the peace because she's afraid of what she'd be
  without it — when a boundary feels like proof you're selfish
cover_tagline: If you stop giving, who will you turn out to be?
description:
  short_blurb: 'Underneath every yes you didn''t mean is a quiet belief: that your
    worth is the giving, and a boundary would expose you as the selfish, too-much,
    never-enough person you''ve worked your whole life to outrun. This is a book about
    that belief. It won''t argue you out of the shame. It will help you set it on
    the scale and see, finally, how little it actually weighs.'
  long_description: 'You drew a line once — small, reasonable, fair — and the feeling
    that followed wasn''t relief. It was a flush of something hot and familiar: I''m
    selfish. I''m difficult. I''m too much. So you took it back, smoothed it over,
    made yourself easy again, and the feeling went quiet. That''s the trade you''ve
    been making for years without naming it.


    This book is for the woman everyone calls reliable, the one who became ''the good
    one'' so early she can''t remember choosing it — the senior manager who absorbs
    the extra work, the daughter and partner and friend who is always fine. Beneath
    the competence is a belief you rarely say out loud: that there is something wrong
    with you at the core, and that the giving is how you keep it covered. A boundary
    doesn''t just feel uncomfortable. It feels like letting the cover slip.


    On one side of the scale, a feather. On the other, the whole weight of being good
    enough — and you have spent your life convinced you don''t measure up unless the
    scale tips toward everyone else. Here you''ll come to recognize how shame and
    boundaries are tangled: how ''no'' gets read as ''I am bad,'' how disappointing
    someone feels like confirming a verdict that was passed on you long ago. You''ll
    see the difference between guilt, which is about a thing you did, and shame, which
    whispers that the thing you are is the problem. You''ll learn to hear that whisper
    without believing it.


    This book will not optimize you. It will not promise that one reframe will lift
    a lifetime of feeling like the defect in the room, or that you''ll wake up Tuesday
    finally believing you''re allowed to take. There is no fix here, because you were
    never broken in the way the shame insists. What there is, instead, is recognition
    — the relief of seeing the belief clearly enough that it stops running the whole
    show from the dark.


    You do not have to keep over-giving to earn a place you already have. Your worth
    was never the thing you do for people. It is not on the scale at all.


    The good one was always allowed to want something. She just never let herself
    find out.


    Book 2 of the Feather & Scale Press boundaries series.'
