title: One Thought, and Then a Thousand
subtitle: For the working parent caught in the loop — when a single worry tightens
  into a spiral the body can't think its way out of
cover_tagline: It starts with one thought. It never ends with one.
description:
  short_blurb: It starts with a single worry and tightens into a thousand. This is
    a book for the working parent whose mind loops back to the same thought at 3am
    — and a way out that the body finds when the thinking can't.
  long_description: 'It begins with one thought. A small one, sometimes — something
    you said, something you didn''t, the thing that might go wrong with the kids,
    the work, the future you can''t see. And then it pulls. One thought becomes the
    next becomes a thousand, each one tightening the last, the whole spiral feeding
    on itself until your chest is small and your breath is short and you are somewhere
    far from the room you''re actually in. You''ve tried to think your way out. The
    thinking is the trap.


    This book is for the working parent who spirals. The one who lies down bone-tired
    and watches the mind start its loop, returning again and again to the same worn
    groove. Who knows, in daylight, that the thought isn''t true, and finds that knowing
    does nothing at all when the spiral starts to turn at 3am.


    Here you''ll come to recognize the spiral for what it actually is — not a thinking
    problem to be out-argued, but a body in distress reaching for the only lever it
    trusts, looping because the loop feels like doing something about a fear it doesn''t
    know how to hold. You''ll feel where the spiral grips you below the neck, in the
    tightening you usually try to ignore. You''ll learn that the way out is not up
    through more thought but down into the body — that a spiral has to be met where
    it lives, in sensation, in breath, in the ground under you. Not by stopping the
    thoughts. Not by replacing them with better ones. By turning, gently, toward the
    tightening itself, and letting it loosen the way it can only loosen when it''s
    finally felt.


    This is not a book that will quiet your mind on command or teach you to control
    your thoughts. It will not optimize your rumination or hand you an affirmation
    to drown it out. There is nothing here to perfect, and no perpetually serene mind
    waiting once you learn the trick.


    What it offers instead is a door the spiral can''t follow you through — a language
    for the loop that you can reach for the next time it begins, between meetings,
    in the school pickup line, in the dark with the house asleep and the mind wide
    open. You''ll come to understand what your body is doing when it spirals, and
    why, given all it''s trying to manage, it makes complete sense.


    Not fixed. Not finished. Just no longer trapped inside the loop alone, and a body
    that knows, now, there''s a way down and out.


    Book 4 of the Stillness Press somatic healing series.'
