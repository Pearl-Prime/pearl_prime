title: The Alarm That Never Tells You Why
subtitle: For the high-achieving woman whose mind braces for danger that never arrives
  — and who is so tired of waiting for the other shoe to drop
cover_tagline: Your alarm is sounding. There is no fire. You are allowed to come back
  into the room.
description:
  short_blurb: You are not anxious because something is wrong. Your alarm is simply
    firing into an ordinary evening, and your mind is racing to find the threat that
    justifies the dread. This book sits with you inside that bracing, and helps you
    recognize a false alarm for what it is, without shame and without a single technique
    to master.
  long_description: 'It usually starts as a feeling, not a thought. A tightening in
    your chest at 9pm with nothing actually wrong. A held breath before you open an
    email. A sense that something is coming, even when the day was fine — and then
    your mind, helpful and relentless, races to find the danger that would explain
    the dread. So you replay the conversation. You draft the apology. You scan for
    the threat, because surely there is a threat. Why else would you feel like this?


    This book is for you: the woman everyone calls calm and capable, who carries an
    alarm inside her that never quite tells her why. You have built a whole life around
    staying one step ahead of a danger you cannot name. You overthink not because
    you are weak, but because some tender, frightened part of you learned, long ago,
    that bracing is how you keep yourself safe.


    Here, gently, you will come to recognize the false alarm for what it is. You will
    feel the difference between a real threat and a nervous system firing into an
    empty room. You will meet the moment before the spiral — the held breath, the
    bracing — and learn what it is actually asking for, which is rarely another plan
    and almost always a little company. You will come to see that the mind racing
    to explain your dread is not a wise advisor but a frightened one, and that it
    has been carrying this alone, without comfort, for far too long.


    This is not a book that will teach you to think faster or feel less. It will not
    hand you a system to manage your worry or a checklist to silence your mind. There
    is no technique here to master and then fail at by 10pm. The alarm will still
    sound sometimes — that is what alarms do. What changes is who you become when
    it does: someone who can rest an open hand over her own heart and say, gently,
    I am here, there is no fire, you can come back into the room.


    You do not have to find the danger to be allowed to rest. You do not have to earn
    the calm. You are allowed to set the bracing down, even now, even with nothing
    resolved — and you do not have to do it alone.


    Book 1 of the Heart Transmission Press overthinking series.'
