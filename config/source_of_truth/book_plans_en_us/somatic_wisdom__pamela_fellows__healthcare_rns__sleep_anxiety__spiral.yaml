title: What If I Missed Something
subtitle: For the nurse whose one 3am thought becomes a thousand — replaying the shift
  for the mistake she's sure she made
cover_tagline: It starts with one chart you can't quite remember. By 4am it's everything.
description:
  short_blurb: It begins with a single question — did I chart that, did I check that
    — and by 4am it's pulled the whole shift apart looking for the mistake you're
    certain you made. This is how to step out of the loop without arguing with it,
    and let the ground come back under you.
  long_description: 'It starts so small. One thought, near the edge of sleep: did
    I document that change? Did the dose look right? And before you can answer, the
    question has a hundred others behind it, each one pulling you further down — back
    through the shift, room by room, hunting for the mistake you''re suddenly sure
    you made. You know, somewhere, that you''re probably fine. The spiral does not
    care what you know. It just keeps turning, feeding on itself, and the more you
    reason with it the faster it goes.


    This book is for the nurse whose mind replays the shift at 3am looking for the
    thing she missed. Your attention to detail is real, and it has kept people safe
    — but at night, with nothing left to check and no one to confirm it, that same
    vigilance turns inward and starts circling. One uncertainty becomes a thousand.
    The loop tightens. And lying there in the dark, you can''t tell anymore whether
    you''re remembering a real moment or just frightening yourself with a story.


    You''ll come to recognize the spiral as a pull, not a truth — a downward current
    the thinking mind cannot out-swim, because thinking is the very thing feeding
    it. You''ll feel where it grips in the body: the held breath, the racing heart,
    the tension that says answer me, answer me, answer me. And instead of chasing
    the question to the bottom, you''ll learn to come back to the one place the spiral
    can''t reach — your own weight on the bed, the breath moving on its own, your
    feet, the floor, the ground that was under you the whole time.


    This is not a technique for winning the argument in your head. There''s nothing
    here to debate, no checklist to run one more time to finally feel certain, no
    thought to override with a better thought. Nothing will tell you to just stop
    ruminating — if it were that simple you would have, hours ago. We step out of
    the loop a different way: down and out of the mind, back into the body, where
    there is nothing to solve and the current finally loses its hold.


    This book will not promise to fix you or hand you certainty about every shift.
    It won''t optimize your mind or give the spiral one more thing to grab. It will
    only help you find your way out of the current — back to the ground, back to your
    breath, back to a night that can simply be a night.


    The loop is loud, but it isn''t the truth, and you don''t have to follow it down.
    The ground is still here. Let it hold you.


    Book 3 of the Felt Sense Publishing sleep anxiety series.'
