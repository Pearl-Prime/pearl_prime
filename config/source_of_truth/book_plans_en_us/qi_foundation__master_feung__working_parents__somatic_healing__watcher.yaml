title: The Part of You That Never Stops Scanning
subtitle: A path off watch for the working parent whose body stays half-ready in the
  quiet — still listening for the next sound, the next need, the danger that almost
  never comes
cover_tagline: You can lie down. You just can't get your body to believe it's allowed
  to.
description:
  short_blurb: Long after the house is quiet, some part of you is still on duty —
    ears tuned to the monitor, muscles half-ready, a low hum of watching that never
    fully switches off. This is a book for the parent whose nervous system forgot
    how to stand down. It is not a method to control the vigilance, but a way to let
    the body finally come off guard and feel the ground hold the watch for a while.
  long_description: 'The house is quiet. Everyone is safe, accounted for, breathing
    in the next room. And still, some part of you is awake at the door — listening.
    For the cough that might mean a fever. For the step on the stair. For the thing
    you forgot, the thing that could go wrong, the threat that has not come and very
    likely will not. Your eyes are closed but your body is sitting up. You''ve been
    on watch so long you no longer remember setting the post.


    This book is for the working parent who became the household''s alarm system and
    never found the off switch. The one whose shoulders are always slightly raised,
    whose gut tightens at a sound from the other room before the mind even registers
    it, who scans every room they enter for what might hurt the people they love.
    You call it being responsible. Being a good parent. And it is — but it has also
    quietly taken your body hostage, kept it braced and scanning through years that
    asked it to rest and it would not.


    What you''ll come to recognize is that the watcher in you is not broken and not
    your enemy. It''s a part that learned, somewhere along the way, that if it ever
    stopped scanning, something would be lost. It has been trying to keep your whole
    world safe with a body that needs to come off guard to survive. You''ll feel where
    the vigilance lives — the held breath, the cocked ear, the muscles that never
    quite let go. You''ll learn to send the breath low, beneath the watching, to the
    deep ground where the body remembers it is held too. You''ll discover what it
    is to let the floor keep watch for a few minutes so you don''t have to. To trust
    the root enough to come down off the wall.


    This is not a method for controlling your hypervigilance or a checklist for switching
    your mind off on command. It will not optimize your rest or teach you to monitor
    your nervous system like one more child to track. There''s no finish line where
    the watcher finally goes silent forever. The aim is gentler and more real: to
    let the part of you that never stands down feel, even briefly, that it is safe
    to.


    You don''t have to keep the whole world up alone tonight. You''re allowed to set
    the watch down. You''re allowed to be held by the ground that has been under you
    all along.


    Book 2 of the Root & Meridian Press somatic healing series.'
