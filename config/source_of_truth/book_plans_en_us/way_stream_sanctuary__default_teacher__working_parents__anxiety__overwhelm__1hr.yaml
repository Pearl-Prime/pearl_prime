title: 'The Alarm Is Lying: Drowning in Demands'
subtitle: A One-Hour Anxiety Reset for Working Parents
cover_tagline: It's not one thing. It's all of it, at once, with no edges.
description:
  short_blurb: The work deadline, the permission slip, the dishwasher, the text you
    forgot to answer, the kid who needs new shoes — and the alarm screaming that you're
    already too far behind to ever catch up. This is an hour for the working parent
    who isn't lazy or disorganized, just genuinely carrying more than one body can
    hold, and feeling it crush down all at once.
  long_description: 'It usually hits in the doorway. You walk in from work and before
    your coat is off, it''s all there at once — the unanswered messages, the dinner
    that isn''t made, the form due tomorrow, the laundry, the kid tugging your sleeve,
    the partner asking a question you can''t process. And your chest locks up, the
    alarm goes off, and the thought arrives fully formed: I can''t do all of this.
    There''s too much. I''m drowning.


    This book is for the working parent buried alive in demands that are all, individually,
    reasonable — and collectively, impossible. Who isn''t disorganized or weak, but
    is carrying the mental load of an entire household plus a job, and feeling it
    land as a single crushing weight. Who freezes when there''s the most to do, then
    hates themselves for freezing. Who hears "just prioritize" and wants to scream,
    because everything is the priority and that''s exactly the problem.


    We start by naming what overwhelm actually is: not too many tasks, but too much
    hitting your nervous system at once, with no separation between them. The brain
    can''t hold a hundred things, so it floods, and the flood feels like an alarm
    — danger, danger, you''re failing. We''re going to go down into that flood instead
    of fighting our way out with a better system. Because you don''t have a system
    problem. You have a too-much problem, and no planner ever fixed that.


    You''ll learn to feel the moment the demands collapse into one undifferentiated
    mass, and to recognize that as the alarm doing its thing — not as proof you''re
    inadequate. We''ll practice letting the weight be exactly as heavy as it is, without
    the second layer of panic about being unable to lift it. That second layer is
    the part we can actually set down.


    This won''t promise you a color-coded calendar or a morning routine that makes
    it all manageable. It won''t optimize your throughput or hand you a productivity
    hack, because the answer to drowning is not to swim faster. What it offers is
    the thing overwhelm steals: the ability to stand in the doorway with all of it
    bearing down and not have your body sound the siren — to feel the weight, set
    down the panic, and pick up one thing.


    You are not behind because you''re not trying hard enough. You''re overwhelmed
    because you are carrying too much, and that is real, and naming it is not a failure.
    An hour from now, the pile won''t be smaller. But the alarm on top of the pile
    — that, you can put down.'
