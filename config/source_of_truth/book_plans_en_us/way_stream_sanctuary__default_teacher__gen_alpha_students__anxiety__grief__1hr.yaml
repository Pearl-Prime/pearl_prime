title: 'The Alarm Is Lying: Living with What You''ve Lost'
subtitle: A One-Hour Anxiety Reset for Students
cover_tagline: Everyone expects you to be back to normal. You're still carrying it
  to school every day.
description:
  short_blurb: Someone or something is gone, and the world handed you about a week
    before it expected you to move on. This one-hour read is for students living with
    a loss while still showing up to class, tests, and group chats like nothing happened.
    It won't tell you to find the bright side. It'll make room for what you're actually
    carrying.
  long_description: 'Something is gone. Maybe it''s a person. Maybe it''s a friendship
    that just stopped one day with no explanation, a family that came apart, a whole
    version of your life you don''t get to walk back into. And the strange, almost
    cruel part is that the world simply kept moving. There were still assignments
    with due dates. People still asked if you were okay and so obviously wanted the
    answer to be a quick yes. You learned fast to say you''re fine and to carry the
    rest of it folded up in your chest, into every class and every ordinary hallway,
    by yourself.


    This is for the student grieving something while nobody around you seems to remember
    it''s still there. Who feels the floor drop out in the middle of a lesson for
    a reason no one in the room can see. Who is bone-tired from the performance of
    being okay, and isn''t sure there''s a single person you could actually be honest
    with about how heavy it still is.


    So let''s name what grief really is. It is not a problem with a solution, and
    it is not a mood you''re supposed to power through and graduate from. It is what
    love and attachment look like once the thing you loved is gone. The ache is not
    you failing to cope; the ache is the exact size of what mattered to you, made
    visible. The first move is to recognize it for what it is, the heaviness, the
    tears that arrive with no warning, the numbness that frightens you more than crying
    ever did, and to stop demanding of yourself that it already be over.


    Then, instead of trying to fix it or wait it out from a safe distance, you go
    down into it. You let yourself actually feel the loss rather than endlessly managing
    around the edges of it, because feeling it is the only route through that doesn''t
    leave the whole thing lodged in you, untouched, for years. And you come back up,
    not over it and not done, but able to carry it without it flattening you, with
    the thing you lost held close and present instead of locked in a room you never
    open.


    This hour will not promise you closure or a tidy timeline. It will not tell you
    they''re in a better place, that everything happens for a reason, or that a silver
    lining is waiting if you just look hard enough. No silver lining is required here,
    and there is no improved version of you that needs optimizing back to normal.
    Grief does not end on schedule. It changes shape over time, and so, slowly, do
    you.


    You are allowed to still be carrying this, however long it has been and whatever
    anyone around you expects by now. You do not have to be over it to keep getting
    up and living.'
