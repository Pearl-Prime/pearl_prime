title: The Version of Me They Hired
subtitle: For the quietly excellent young professional who's sure they're a fraud
  — and exhausted from painting over the version of themselves they're afraid everyone
  will find
cover_tagline: You built someone good enough to be here. Now you can't put them down.
description:
  short_blurb: Some mornings you put on a self the way you'd prime a canvas — smooth,
    clean, nothing showing through. You've gotten so good at covering the part of
    you that you're sure is the problem that you've forgotten there was ever a person
    underneath. This is a book for the secret fraud who overworks to hide a defect
    no one else can see.
  long_description: 'You know the exact moment it starts. You open your laptop, you
    square your shoulders, and you become the version of yourself that''s allowed
    to be in the room. The competent one. The one who has it together. By 9am you''re
    already painting over the other one — the one you''re certain is the real you,
    the flawed draft you''d never let anyone see.


    This book is for you: the quietly excellent young professional who is convinced,
    underneath all the praise, that something is fundamentally wrong with you. Not
    your work. You. You''re sure that if anyone saw the unedited version — the one
    who panics, who doesn''t know, who feels too much — they''d finally understand
    the mistake they made hiring you.


    So you armor up. You overwork. You answer the message at 11pm so no one suspects.
    You keep your camera off in the meeting so no one can read your face. You laugh
    in the glass conference room and go home hollowed out, wondering how much longer
    you can keep the good version standing up. Shame is a strange artist; it doesn''t
    tell you that you failed. It tells you that you are the failure, and the only
    safe thing to do is keep covering it over, one more coat, one more day.


    Here you''ll come to recognize the shape of it. The mask you reach for before
    you''re even awake. The cost of carrying someone you''re always performing. The
    buried belief — you are not enough as you actually are — that''s been driving
    every late night and every flinch. And slowly, gently, the strange relief of letting
    one honest mark stay on the canvas without sanding it off.


    This book will not give you a confidence routine. It will not help you fix the
    defect, because there is no defect to fix. It won''t optimize your self-worth
    into a metric you can finally hit, and it won''t turn the person underneath into
    a brand you have to maintain. Nothing here turns your becoming into another deliverable.


    What it offers instead is quieter and harder: the possibility that the self you''ve
    been hiding is not the rough draft. It''s the original. It was always the only
    part worth keeping — the one the armor was built to protect, not erase. You are
    allowed to be unfinished here. You were allowed all along.


    Book 1 of the Blank Canvas Books self worth series.'
