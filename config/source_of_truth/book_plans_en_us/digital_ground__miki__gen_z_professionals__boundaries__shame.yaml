title: The Difficult One
subtitle: For the one who overworks to prove they are not 'too much' -- and the quiet
  belief that wanting a limit makes you a problem
cover_tagline: You learned to disappear your needs before anyone could call them needy.
description:
  short_blurb: You say yes to the extra task, stay late, answer the weekend message
    -- not because you have the room, but because somewhere you decided that needing
    a limit makes you difficult, ungrateful, replaceable. This is for the part of
    you that overworks to cover a defect you have never actually proven exists. You
    are not too much. You were just taught that having needs is the same as being
    a burden.
  long_description: 'Someone asks for one more thing -- can you stay, can you cover,
    can you just handle this -- and you hear yourself say yes before you have even
    checked whether you have it to give. Not because you want to. Because saying no
    would confirm the thing you have been afraid of your whole life: that you are
    difficult. Ungrateful. Not a team player. Secretly too much, and one honest limit
    away from everyone finding out.


    This book is for you: the one who works twice as hard so no one can call you lazy,
    who says yes so no one can call you selfish, who has built an entire reputation
    as the easy one, the reliable one, the one who never makes it weird. You are exhausted
    in a way that does not show on the calendar. And underneath it all sits a belief
    so old you have stopped noticing it -- that your needs are a flaw you have to
    overwork to hide.


    Here is what you will come to recognize. The shame came first, and the over-functioning
    is just the bandage. You did not become a yes-machine because you love the work.
    You became one because somewhere, young, you learned that a person with needs
    is a person who gets left, and you have been paying that toll ever since -- in
    late nights, in swallowed nos, in the apology that lives in your throat before
    you have even done anything wrong. You will learn to feel the moment the shame
    fires, the heat of it, the urge to make yourself smaller and more useful, and
    you will learn that the smallness was never the price of being loved. It was just
    the price of believing a lie about yourself.


    This will not hand you a confidence affirmation or tell you to ''know your worth''
    like worth is a slogan you forgot to memorize. It will not optimize you into a
    more assertive personal brand, and it will not pretend that one well-delivered
    no undoes twenty years of hiding. There is no fix here for being a person who
    feels too much.


    What it offers is the chance to set the defect down and look at it -- to see that
    the thing you have been overworking to cover was never wrong with you in the first
    place. You are not the difficult one. You are just the one who finally got tired
    of pretending you do not need anything.


    You are allowed to be a person with limits and still be someone people want around.
    That was always true. No one told you.


    Book 2 of the Present Tense Books boundaries series.'
