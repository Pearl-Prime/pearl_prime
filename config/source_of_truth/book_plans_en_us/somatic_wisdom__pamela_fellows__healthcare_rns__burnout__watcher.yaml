title: Your Shoulders Still Carry the Shift
subtitle: For the nurse whose body won't come down off the floor — jaw set, hands
  braced, still holding the weight of twelve hours long after you've hung up your
  badge
cover_tagline: You came home hours ago. Your nervous system never got the message.
description:
  short_blurb: You're home, the house is quiet, and your body still won't believe
    the shift is over — listening for a monitor that isn't there, replaying every
    chart, braced for a call that never comes. This book is for the nurse whose vigilance
    never goes off duty. It won't tell you to relax. It will help your body finally
    believe it's safe to.
  long_description: 'The house is quiet. Everyone''s asleep. And you are lying there
    fully awake, listening — for an alarm, a call bell, the particular tone that means
    someone is crashing. There''s nothing to listen for. You''re home. But the part
    of you that spent twelve hours scanning for the next emergency never got the message
    that the shift is over, so it keeps scanning the dark, finding threats in the
    silence, refusing to stand down.


    This book is for the nurse whose mind never clocks out. The hypervigilance that
    makes you good at your job — the way you catch the subtle change before the numbers
    do, the way you''re three steps ahead of the worst thing that could happen — doesn''t
    switch off when you badge out. It follows you home. It sits at the foot of your
    bed. It replays the shift looking for the mistake you might have made, and it
    keeps your body braced for an emergency that already passed, or never came.


    You''ll come to recognize the watcher for what it is: not anxiety to be ashamed
    of, but a nervous system that learned, shift after shift, that letting its guard
    down is dangerous. You''ll feel how that bracing lives in the body — the shallow
    breath, the jaw that won''t unclench, the eyes that won''t quite close. And slowly,
    without being forced or talked out of anything, you''ll offer that vigilant part
    of you what it has needed all along: enough safety to set the watch down for a
    while.


    This is not a course in clearing your mind or thinking positive. You can''t willpower
    your way out of a body that''s convinced it''s still on the floor, and trying
    only adds one more thing to monitor. Nothing here asks you to override what you
    feel, push the alertness away, or perform calm you don''t have. Calm isn''t something
    you force. It''s something a safe-enough body remembers how to do.


    What it offers instead is the slow return of the ground beneath you. The felt
    sense that the danger is not in this room. Permission, at last, for the watcher
    to rest — so that your own quiet house can finally feel like a place you''re allowed
    to be off duty.


    You are allowed to stop scanning. Even now. Even with your eyes open in the dark.


    Book 3 of the Felt Sense Publishing Burnout series.'
