title: The Cup Was Never Bottomless
subtitle: For the nurse running on empty when every call light, every alarm, and every
  family lands at once — and there is no room left to feel
cover_tagline: You did not run dry because you cared too much. You ran dry because
  no one ever filled you.
description:
  short_blurb: There is a moment on every shift when it all arrives at the same second
    — the alarm, the call light, the family in the hallway, the order that was supposed
    to be in an hour ago — and something in you just goes quiet. This book is for
    the nurse who has been pouring from an empty cup for so long she forgot it was
    ever full. It will not teach you to do more with less. It will help you find solid
    ground again.
  long_description: 'It happens around hour nine. The monitor starts alarming, the
    call light is already blinking, a family member catches your sleeve in the hallway,
    and the charge nurse needs an answer now — all of it in the same half-second.
    And instead of the surge you used to feel, there is a strange flat quiet. You
    move. You handle it. But somewhere underneath, the part of you that became a nurse
    because you cared has gone very, very still.


    This book is for you — the one holding the whole floor up, the one everyone leans
    on, the one who has not had a full breath since report. You are not weak. You
    are not bad at your job. You are a person who has been giving from a cup that
    no one ever refilled, and a cup that is never filled does not run low. It runs
    dry.


    Here we will sit with the flood honestly. You will come to recognize the overwhelm
    for what it is — not too little grit, but too much arriving at once into a nervous
    system that has had no room to set anything down for years. You will see how ''just
    one more thing'' became your whole shift, and then your whole self. You will feel
    where the body has been bracing, and what begins to soften when you finally let
    the ground hold some of the weight instead of carrying every ounce in your own
    two hands. You will meet the quiet question underneath all of it: what do you
    need, before you can keep giving?


    This book will not hand you a morning routine or a breathing app or a list of
    ways to be more resilient. It will not tell you the answer is doing more, faster,
    with a better attitude. There is no optimizing your way out of an empty cup, and
    this voice will never pretend otherwise. The work is real. The shortage is real.
    Some of what is breaking you is not yours to fix alone, and you will not be shamed
    for that here.


    What you will find instead is permission. Permission to be a human being with
    limits and still be a good nurse. Permission to feel the overwhelm without it
    meaning something is wrong with you. Permission to set the cup down for one honest
    moment and let it be filled before you pour again.


    You were never bottomless. You were only treated as if you were. You are allowed
    to need things too.


    Book 1 of the Held Ground Press compassion fatigue series.'
