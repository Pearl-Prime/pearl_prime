title: 'Overcoming Depression: The Grief That Doesn''t Leave (6)'
subtitle: A Field Guide for Tech Finance Burnout Navigating Depression
cover_tagline: The numbers are fine. You are not. Start there.
description:
  short_blurb: For the high performer who can still hit every deadline but feels nothing
    when they do. This is a one-hour reckoning with the flat, grey weight that no
    promotion fixes — the grief of a self you've quietly lost. No optimization. Just
    honest words for what's actually happening.
  long_description: 'You closed the quarter. You shipped the thing. You got the message
    that said great work, and you felt nothing — not relief, not pride, not even tired
    in a way that means anything. Just a grey flatness that follows you from the standup
    to the parking garage to the bed you don''t want to get out of. From the outside
    you are performing. From the inside, something has gone missing, and you can''t
    name it, which is why it''s so heavy.


    This hour is for you: the engineer, the analyst, the operator, the one who built
    an entire identity on being the person who doesn''t break. The one who''s started
    running the math on your own life — how many years of this, what it was supposed
    to add up to — and come up short. You''re not failing. You''re grieving. You''ve
    lost a version of yourself you never got to say goodbye to: the one who used to
    care about this, who had a Sunday, who didn''t measure every hour against what
    it returned.


    Ana Reyes won''t tell you to be grateful or to optimize your recovery like it''s
    a sprint. This is recognition first — putting a true word on the weight so it
    stops being a vague personal failing and becomes a thing you can actually look
    at. Then descent: going down into the loss instead of out-working it, instead
    of treating the flatness as a bug to patch before Monday. Then integration — not
    fixed, not back to your old throughput, but no longer at war with what you feel.
    You come back changed, carrying it differently.


    This will not give you a morning routine or five habits of resilient leaders.
    It will not promise that you''ll feel motivated again by Tuesday or that your
    numbers will recover. There is no worksheet. There is nothing here to complete.
    The flatness is not a deficiency in your discipline, and you cannot grind your
    way out of grief — that''s the one thing the market never taught you.


    What you''ll find instead are plain words for the exact thing happening in your
    body and your mind: the heaviness, the static, the strange distance from your
    own life. Words you can reach for the next time the great-work message lands and
    the nothing rises up to meet it.


    You are allowed to have lost something real. You''re allowed to stop pretending
    the weight isn''t there just because no one on the org chart can see it. Sit down.
    You don''t have to carry this like it''s another deliverable.'
