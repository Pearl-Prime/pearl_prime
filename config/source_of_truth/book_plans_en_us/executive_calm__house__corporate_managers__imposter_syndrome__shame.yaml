title: The Fraud in the Corner Office
subtitle: For the leader who is sure they fooled everyone — and braces, every day,
  to be found out
cover_tagline: You did not get away with anything. You were simply good at the thing
  you cannot let yourself believe.
description:
  short_blurb: You run the meeting, deliver the number, take the praise — and underneath
    it all sits the quiet certainty that you are a fraud who has not yet been caught.
    This book does not try to argue you out of that feeling or coach you into confidence.
    It sits with the senior leader who has hidden the same secret for years and finally
    lets the mask come down.
  long_description: 'You read the announcement with your name on it and your stomach
    dropped. Not with pride — with the old, familiar dread that someone, somewhere,
    is about to realize they made a mistake promoting you.


    You have learned to carry this well. You run the room. You make the call when
    no one else will. You take the credit graciously and feel faintly sick doing it,
    because surely they would all think differently if they knew what you know: that
    you are not the steady, capable person the org chart says you are. That you got
    here on luck and long hours and a talent for looking certain. That one of these
    days the floor gives way.


    This book is for the leader who has been bracing for that day for a very long
    time. Not the person who feels nervous before a big presentation — the one who
    has built an entire career on top of the buried belief that something is fundamentally
    wrong with them, and has covered it with overwork ever since.


    You will come to recognize the mask for what it is, and the exhausting cost of
    holding it in place. You will see how shame works in someone like you — quietly,
    beneath the competence, turning every success into more evidence that you are
    getting away with something rather than proof that you are good. You will sit
    with the hidden belief itself, the one underneath the long hours, and find that
    naming it does not collapse you the way you always feared it would.


    This book will not hand you confidence. It will not optimize your presence or
    give you ten phrases to own the room. It will not promise that the feeling disappears.
    There is no technique here for finally earning the right to believe in yourself,
    because the right was never the problem.


    What it offers instead is steadier than that. The ground you have been standing
    on was bedrock the whole time. The fraud you have been hiding does not exist.
    And you are allowed to be exactly as capable as the record already shows — without
    first paying for it in shame.


    You are not a fraud who fooled them. You are a competent person who never let
    yourself feel competent. That is a different problem, and a far kinder one to
    live inside.


    Book 1 of the Granite Ridge Publishing imposter syndrome series.'
