title: 'The Alarm Is Lying: When Loss Reshapes Everything'
subtitle: A Field Guide for Professional Women Navigating Anxiety Relief
cover_tagline: Some doors close and don't reopen. This is for the ache the alarm keeps
  poking.
description:
  short_blurb: Something ended — a job, a relationship, a version of the life you
    assumed you'd have — and the anxiety underneath it won't settle. This is a field
    guide for professional women carrying a loss they've been too busy to feel. It
    won't rush you to closure. It will let you finally go down into what you lost.
  long_description: 'You are functional. You answer the emails, you make the meetings,
    you say "good, busy" when people ask. And underneath all of it there is a loss
    you have not had time to actually feel — a role that ended, a relationship that
    dissolved, a city you left, a future you were sure of that quietly stopped being
    true. The anxiety circles it like a guard dog that will not lie down.


    This book is for the professional woman who has been treating grief as a scheduling
    problem. You gave yourself a weekend. You went back to work. You assumed that
    staying productive would carry you through, and instead the loss went underground
    and turned into a low hum of dread you cannot explain. You are anxious and you
    are not sure why, and the why is grief you never let land.


    Here is what this book names plainly: anxiety is often grief that has not been
    allowed to be sad. When loss reshapes everything and you do not have room to feel
    it, your nervous system holds it as tension, as racing thoughts, as a vague sense
    that something terrible is about to happen. That is the alarm. And the alarm is
    lying about the future — the catastrophe it keeps warning you about already happened,
    and it was not the end of you.


    The arc is recognition, descent, and integration. First you let yourself see what
    you actually lost, in real terms, without minimizing it because other people have
    it worse. Then you go down — not to wallow, but to let the grief be grief instead
    of forcing it to masquerade as panic. You stop trying to think your way out of
    an ache that was never a thinking problem. You come back changed: still carrying
    the loss, but no longer braced against it every waking hour.


    This book will not promise to fix you or hand you closure on a deadline. It will
    not optimize your mourning into five tidy stages you can check off between meetings.
    Grief is not a project. It moves on its own clock, and your only job is to stop
    fighting it. What changes is that the anxiety loosens its grip once the sadness
    underneath it finally gets to be felt.


    No gratitude reframe. No "everything happens for a reason." No rushing you toward
    the lesson. Just honest language for the loss living under your alarm, so you
    can stop guarding it and start grieving it.


    What ended deserved to be mourned. You are allowed to go down into it now. You
    will come back up.'
