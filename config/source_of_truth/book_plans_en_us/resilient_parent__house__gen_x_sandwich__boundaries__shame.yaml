title: The One Who Never Needs Anything
subtitle: For the sandwich-generation parent who believes that wanting anything back
  makes them selfish — and has spent a lifetime overdoing it to prove otherwise
cover_tagline: You were never the difficult one. That was the whole problem.
description:
  short_blurb: 'You are the one who shows up. The reliable one, the capable one, the
    one who never makes it about herself. And underneath all of it sits a quiet, ancient
    belief: that if you ever stopped giving, they''d see what you really are. This
    is a book for the parent who has been overworking a single hidden shame her whole
    life.'
  long_description: 'Somewhere a long time ago, you decided that the way to be loved
    was to never need anything.


    So you became the good one. The capable daughter, the steady parent, the one who
    handles it. You answer every call. You absorb every mood. You say yes before the
    question is finished, and you call it love, and partly it is — but partly it''s
    something older and quieter. A belief that if you ever drew a line, ever said
    ''not this time,'' they would finally see the selfish, unlovable thing you''ve
    always feared you are.


    This book is for the sandwich-generation parent who has spent a lifetime overdoing
    it to outrun a shame she can''t quite name.


    You''ll come to recognize the belief that''s been running you. How ''I should
    be able to handle this'' is really ''something is wrong with me if I can''t.''
    How you over-give not from abundance but from terror of being found out. How a
    boundary feels less like a limit and more like a confession — proof of the defect
    you''ve worked your whole life to cover. You''ll watch the way you flinch at your
    own needs, apologize for taking up space, perform the endless competence that
    keeps the shame just out of sight. And in the warm turn of these pages, you''ll
    meet the cost of it — the exhaustion of carrying a self you believe you have to
    hide — and feel, maybe for the first time, that the line you were so afraid to
    draw is not evidence of your selfishness. It''s evidence that you''re a person.


    This book will not hand you affirmations to repeat until you believe them. It
    will not promise that the shame lifts in a weekend, or that you''ll wake up one
    morning finally feeling like enough. That''s not what this is. There is no fix
    here, because there was never anything in you that needed fixing — only a story
    you were too young to question when it first took hold.


    You don''t have to earn the right to rest. You don''t have to be useful to be
    allowed in the room.


    In the quiet after everyone''s asleep, when no one needs you and there''s no one
    left to please, this book sits with you and says the thing no one said back then:
    you were always good enough. The overworking was never the proof. It was the wound.


    Book 2 of the Stolen Moment Press boundaries series.'
