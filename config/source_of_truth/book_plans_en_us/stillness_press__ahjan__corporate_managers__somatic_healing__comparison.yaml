title: The Calm in the Room Is a Costume
subtitle: For the manager who reads every composed face across the table as proof
  they alone are unraveling — and learns the body beneath the table is bracing too
cover_tagline: They all look fine. You're sure you're the only one who isn't.
description:
  short_blurb: 'Everyone in the meeting looks calm, capable, fine. You''re the only
    one white-knuckling it — or so it feels. You measure your raw insides against
    everyone else''s composed outsides and lose every time. This is a quiet book for
    the manager who has aimed a high-performance instrument at exactly the wrong target:
    themselves.'
  long_description: 'Everyone else seems to have it together. You sit in the meeting
    and they look calm, capable, unbothered — and you''re aware of your own racing
    chest, your own braced shoulders, the effort it''s taking just to seem fine. So
    you measure. Their composed outside against your churning inside. And you lose,
    every single time, because it isn''t a fair comparison and a part of you knows
    it and does it anyway.


    This is comparison, and it is one of the most exhausting things a nervous system
    can do. It is not vanity or insecurity in the small sense. It''s a survival instinct
    — the constant ranking of where you stand, who''s ahead, whether you''re keeping
    up — turned relentlessly on yourself. And because you only ever see other people''s
    surfaces and always feel your own depths, the math is rigged. You come up short
    against people who are, behind their own composed faces, doing exactly what you''re
    doing.


    This book is for the mid-level manager who runs the cross-functional team and
    looks, to everyone else, like one of the calm ones — while privately certain that
    everyone around the table has figured out something you missed. The body holds
    what comparison costs. You''ve called it ambition. You''ve called it healthy competition.
    You may not have noticed how much of your day is spent scanning for where you
    rank, or how your body tightens with every measurement.


    You''ll come to recognize comparison as a body state, not just a habit of thought
    — the subtle bracing, the deflation, the way being around impressive people leaves
    you smaller in your own skin. You''ll learn where the measuring lives in you and
    what sets it off. And you''ll come to see the trick at the center of it: that
    you have pointed a high-performance instrument — the same sharp, evaluating mind
    that makes you good at your job — at the one target it can never assess fairly,
    which is yourself, from the inside.


    This book will not help you win the comparison. That is the point. It won''t give
    you a way to finally come out ahead, or to optimize yourself past everyone else,
    because the game itself is the wound. Comparison is not a contest to start winning.
    It''s an instrument to set down.


    What it offers is recognition, and a way back into your own body that doesn''t
    route through anyone else''s. Language for the moment the measuring starts. A
    practice small enough to do in the meeting, on the train home, at 3am when the
    ranking runs on its own — a way of coming home to yourself instead of standing,
    again, in someone else''s shadow.


    You are not behind, and you are not failing to measure up. You are a person who
    turned a powerful instrument on the wrong target, and who is allowed, finally,
    to put it away.


    Book 7 of the Stillness Press somatic healing series.'
