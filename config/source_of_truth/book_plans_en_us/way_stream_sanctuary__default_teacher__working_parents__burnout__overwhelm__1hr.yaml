title: 'After the Flame: Drowning in Demands'
subtitle: A One-Hour Burnout Reset for Working Parents
cover_tagline: It's not that you can't cope. It's that there's too much, and it's
  all at once.
description:
  short_blurb: 'For the working parent drowning in a day that never lets up — the
    emails, the lunches, the texts, the meeting that runs over into the pickup that
    runs into dinner. This is not a time-management book. It''s an hour to stop treating
    overwhelm like a personal failure and start meeting it as what it actually is:
    too much, hitting you all at once.'
  long_description: 'You know the moment. You''re answering a work message with one
    hand, signing a permission slip with the other, your kid is asking the same question
    for the fourth time, and somewhere a timer is going off — and your chest goes
    tight and your thoughts go white. Not because you''re weak. Because there is genuinely
    too much, arriving all at the same time, and a body can only hold so much before
    it floods.


    This hour is for the working parent who keeps thinking they just need a better
    system. The one who downloads another app, color-codes another calendar, and still
    ends every day feeling like they were hit by a wave they couldn''t see the top
    of. If you''ve been told you need to prioritize better while no one acknowledges
    that the load itself is crushing, this is the book that finally names it: you
    are not failing to cope. You are coping with too much.


    We start by naming overwhelm precisely — not as anxiety, not as laziness, but
    as the specific feeling of demands stacking faster than you can clear them. Then
    we go down into it instead of fighting to get on top of it. Here''s what the productivity
    advice misses: you can''t out-organize a flood while you''re underwater. So first
    we let you stop thrashing. You''ll learn to feel the moment the demands pile up
    and notice what your body does before the white-out — the tight chest, the held
    breath, the urge to do everything at once and therefore nothing. That noticing
    is the descent, and it''s the thing you can actually reach for next time it happens.


    What changes isn''t the size of your to-do list. That''s the integration, and
    it''s the honest part: the demands don''t shrink. You come back able to be inside
    the overwhelm without being swept off your feet by it — one thing, then the next,
    with the panic uncoupled from the workload.


    This book will not hand you a new planner, a five-step morning routine, or a promise
    that you''ll finally get it all done. There is no system here to optimize, no
    trick to make the day lighter than it is. It will not tell you the answer is doing
    more, faster. What it offers is permission — to admit the load is real, to stop
    blaming yourself for buckling under a genuinely impossible amount, and to find
    your feet in the middle of the wave instead of after it.


    You''re allowed to be overwhelmed without being broken. You''re allowed to take
    one hour, name what''s actually happening, and come up for air. Start there.'
