title: The Part of You That Never Clocks Out
subtitle: For the woman whose mind keeps scanning long after the workday ends — and
  how to teach a braced body that it is finally safe to settle
cover_tagline: The day is over. The scanning isn't. Some part of you is still braced,
  long after there's anything to brace against.
description:
  short_blurb: Even when the laptop is closed, some part of you stays alert — replaying
    the meeting, bracing for the email, scanning for the thing you might have missed.
    This book is for the woman whose vigilance never quite lets go, and who's beginning
    to understand that the exhaustion isn't coming from the work. It's coming from
    the watching.
  long_description: 'The workday ended hours ago. The laptop is shut. And still, some
    part of you hasn''t put it down — running the meeting back, drafting the reply
    you haven''t sent, combing the day for the loose thread that might unravel while
    you sleep. You lie down and your body stays braced, breath held high in your chest,
    your attention circling the edges of everything, waiting for a problem that never
    quite arrives. You are exhausted, and you cannot, for the life of you, come down.


    This book is for the woman whose alertness never ends with the day. The one who''s
    always a step ahead of the problem, always anticipating, always smoothing the
    thing over before it becomes a thing. It made you good at your work. It made you
    the person everyone leans on. And it is quietly wearing you down to the bone —
    because a body that never receives the signal that it''s safe to rest will keep
    burning through energy you no longer have to give.


    You''ll come to recognize the watching for what it is: not a flaw, not a personality
    trait, but a part of you that learned, somewhere along the way, that staying alert
    was how you stayed safe. You''ll feel where it lives in the body — the shallow
    breath, the tightness behind the eyes, the shoulders that won''t fully drop even
    when nothing is wrong. You''ll learn to notice the scanning without obeying it,
    and to offer your body the message it has been missing: the day is done, nothing
    here needs you right now, it''s safe to let go. Not by force. By degrees. The
    way a grey sky loosens and clears after a long, heavy afternoon.


    This is not a book about discipline or shutting your mind off. It won''t hand
    you a trick to silence your thoughts or a routine to perfect your evenings. You
    cannot think your way out of a body that''s braced; you can only, gently, show
    it that it''s safe to soften. That work is slower and kinder than any quick fix,
    and it''s the only thing that truly lasts.


    The watching kept you safe once. You don''t need it the way you once did. You''re
    allowed to let your guard soften, breath by breath, and discover that the ground
    holds you — that the world stays whole even when you stop holding it together
    yourself.


    Book 3 of the Felt Sense Publishing Burnout series.'
