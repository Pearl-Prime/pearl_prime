title: 'The Weight Without a Name: When Everything Is Too Much'
subtitle: A One-Hour Depression Reset for Founders
cover_tagline: It's not that you can't handle it. It's that all of it arrived at once.
description:
  short_blurb: Payroll, the board email, the thing that broke in production, the text
    you haven't answered in four days — and underneath all of it, a heaviness that
    makes every task feel like lifting wet sand. This is one hour for the founder
    who is drowning in too much and calling it failure.
  long_description: 'You know the moment. Forty browser tabs, three of them on fire,
    and a flat dread underneath that has nothing to do with any single tab. The runway
    math. The hire you have to make and the hire you have to let go. The investor
    who wants an update you don''t have. It''s not one crisis you could square up
    against — it''s everything, all at once, and somewhere in the pile you stopped
    being able to tell which thing actually needs you and which thing just feels loud.


    This is for the founder buried under too much, who has started to read the overwhelm
    as proof that they''re not built for this. You are not collapsing because you''re
    weak. You''re collapsing because the volume genuinely exceeds what any one nervous
    system processes at once, and you''ve been treating a flooding problem like a
    character flaw. The heaviness on top of it — the part where even small tasks feel
    impossible — isn''t laziness. It''s what a mind does when the inputs never stop
    and there''s never a moment where the water goes back down.


    The next hour moves in three turns. First, you name the overwhelm for what it
    is — not a to-do list that''s too long, but a state where everything has fused
    into one undifferentiated wall of too-much, and you learn to feel the difference
    between that wall and the actual tasks behind it. Then you stop frantically triaging
    and stop going numb, and instead let the overwhelm be exactly as big as it is,
    because the flailing against it is half of what keeps it spinning. Then you come
    back with the pile still there but no longer fused to your worth — able to pick
    up one thing without the entire mass coming attached to it.


    This book will not optimize your calendar. It will not give you a productivity
    system, an inbox-zero ritual, or a clever way to do more before 9 a.m. The promise
    here is the opposite of more. There''s no hack that makes too-much feel like the
    right amount, and the reflex to find one — to systems-design your way out of a
    flooding nervous system — is part of what dug the hole this deep.


    And no, the answer isn''t ''lower your standards'' or ''just say no'' like the
    whole thing is a boundaries problem you''ve been too soft to solve. This is plain,
    secular language for the exact texture of being flooded, so you have something
    real to reach for the next time the tabs multiply and the floor tilts under you.


    You''re allowed to be a capable person who is genuinely past capacity right now.
    Those two things have never been a contradiction. Start here.'
