title: I'm Watching Myself Get a Degree from Very Far Away
subtitle: For the student going through the motions behind glass — present for every
  class, absent from your own life, numb to a future you can't feel is yours
cover_tagline: You haven't dropped out. You've just gone quiet behind the glass.
description:
  short_blurb: You hand in the work. You show up to the seminar. You watch yourself
    do all of it from somewhere just behind your own eyes, like your life is a film
    about a student who belongs and you're only in the audience. This is a book for
    the one who has gone numb to cope with the doubt — who is present for everything
    and absent from all of it, and ready to come back into their own life.
  long_description: 'You turned in the essay. You sat through the lecture. You answered
    when called on, and the whole time you watched yourself do it from somewhere a
    few inches behind your own face — like you''re in the back row of a theater showing
    a film about a college student who belongs here, and you''re not the student,
    you''re the one watching.


    You haven''t dropped out. You''ve just gone quiet behind the glass.


    This book is for you — the college student who has dissociated to survive the
    imposter feeling. When the doubt got loud enough, you turned the volume down on
    everything, and now you''re numb. You go through the motions of a life you can''t
    feel is yours. The degree, the friends, the future — you can see them, but there''s
    a pane of glass between you and all of it, and you''ve started to wonder if you''ll
    ever feel anything from the inside again.


    You''ll come to recognize the watcher for what it is — not a flaw, but a defense.
    How numbness is the mind''s way of dimming a doubt it couldn''t turn off. How
    you went so far behind your own eyes to escape the fear of being exposed that
    you escaped your whole life along with it. How ''I don''t feel like I belong here''
    has quietly become ''I don''t feel like I''m here at all.'' How being checked
    out feels safer than being present, because if you''re not really here, you can''t
    really be caught. We''ll stay at the glass, gently, and find the seam where you
    can come back through — not all at once, just enough to feel one real thing.


    This is not a book that will help you function more efficiently from behind the
    glass. It won''t teach you to go through the motions more convincingly or to perform
    a presence you don''t feel. There is no version of watching your own life that
    will ever feel like living it. The point is not to cope better at a distance.
    The point is to stand in the doorway between the audience and your own life and
    step back in — to stop watching the student get a degree and become the one feeling
    the cold air of the quad, the weight of the book, the fact that you are actually,
    finally, here.


    You didn''t leave your life by mistake. You left to survive something. And you''re
    allowed to come back now.


    You don''t have to feel certain you belong before you return to your own life.
    You only have to come back close enough to feel it.


    Book 7 of the Threshold Books imposter syndrome series.'
