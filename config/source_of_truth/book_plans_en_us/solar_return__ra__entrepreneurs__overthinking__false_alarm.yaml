title: The Smoke Alarm That Never Sleeps
subtitle: For the founder whose body braces for a crisis that isn't coming — learning
  to tell a real fire from the alarm crying wolf
cover_tagline: Your body keeps calling fire in an empty, quiet room.
description:
  short_blurb: Your inbox is quiet, the numbers are fine, and nobody is angry with
    you. Still, your chest is tight, your jaw is set, and your whole body is braced
    for a blow that never lands. This is the book for the founder whose alarm system
    has forgotten how to stand down. It won't teach you to fight the fire. It will
    teach you to notice there isn't one.
  long_description: 'You check the dashboard one more time. Green. You re-read the
    email you already sent. Fine. The company isn''t on fire — and yet your body has
    been bracing all day for something it can''t name, a blow that never comes, a
    crisis that keeps not arriving.


    This book is for the founder whose alarm went off years ago and never reset. The
    one who built something real by staying ready for everything, and now can''t tell
    their nervous system that the danger has passed. You''re not paranoid and you''re
    not weak. You installed a smoke alarm sensitive enough to catch the first wisp
    of trouble — and it served you. The problem is it now screams at burnt toast.
    It mistakes a slow-paying client for ruin, a cool reply for catastrophe, a quiet
    Tuesday for the calm before something terrible.


    Here you''ll come to recognize the false alarm for what it is. The bracing in
    your shoulders before a call that goes fine. The 3am certainty that everything
    is collapsing, gone by daylight. The way your body floods with adrenaline over
    a Slack notification, then has nowhere to put it. You''ll learn the difference
    between the fire that needs you and the alarm that''s only crying wolf — not by
    arguing with the fear, but by letting your body finish the alarm it never got
    to complete.


    This book will not promise you calm on command. It won''t optimize your stress
    response or hand you a morning routine that makes the fear go away by 9am. There
    is no hack here, no productivity gain, nothing to grind toward. The relentless
    vigilance that exhausts you was trying to keep you safe, and you can''t shame
    it into silence. You can only show it, gently and repeatedly, that the room is
    not burning.


    What survives the false alarm isn''t a harder, more armored you. It''s the warmth
    that was always underneath — the founder who can feel their own pulse settle,
    who can sit in a quiet hour without reading it as a threat, who can finally let
    the fire bank low instead of blazing through the night.


    You don''t have to stay this braced. You were never the emergency. You were just
    the one who never got to hear the all-clear.


    Book 1 of the Ember & Ash Publishing overthinking series.'
