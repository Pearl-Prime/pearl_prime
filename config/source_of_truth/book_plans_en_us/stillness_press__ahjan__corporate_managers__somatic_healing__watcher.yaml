title: The Part of You That Never Goes Off Duty
subtitle: For managers whose mind is always scanning the room — reading every face,
  tracking every threat that never comes
cover_tagline: You've been on watch so long you forgot someone could relieve you.
description:
  short_blurb: You read the room before you enter it. You catch the shift in someone's
    tone, the email that's a little too short, the risk no one else clocked. Useful
    at work. Exhausting in a body that never gets to stand down. This is a quiet book
    for the manager whose guard never drops.
  long_description: 'You walk into the room already reading it. The faces, the postures,
    who''s annoyed, what''s about to go wrong, the risk nobody else has clocked yet.
    You catch the curt email, the meeting that got moved, the slight change in a voice
    on a call. At work they call it sharp. Strategic. Across the table from someone,
    lying in bed, it has another name: a part of you that never, ever goes off duty.


    This is the watcher. It is hypervigilance, and it is not paranoia or a personality
    quirk — it is a nervous system that learned, somewhere, that safety meant seeing
    it coming. So it scans. It monitors. It keeps the perimeter even when there''s
    no perimeter to keep, even when you''re with people who love you, even when you''re
    alone and there is nothing to watch for at all.


    This book is for the mid-level manager who runs the cross-functional team on exactly
    this gift — the early-warning system that catches problems upstream and never,
    ever gets to rest. The body holds what the role rewards. You''ve called it being
    on top of things. You''ve called it just paying attention. You may have forgotten
    that other people set the watch down and you don''t.


    You''ll come to recognize the watcher for what it is, and why it makes such sense
    given everything it''s been protecting you from. You''ll feel where the scanning
    lives in your body — the eyes, the held breath, the orientation toward the door.
    You''ll learn the difference between attention you choose and vigilance that has
    you. And you''ll begin to find the thing the watcher has been waiting for without
    knowing the word for it: relief. Permission to let the perimeter go unwatched
    for a single minute, because your body finally trusts that it can.


    This book will not make you less perceptive, and it won''t hand you a technique
    to switch the watching off like a light. That isn''t how it works, and the watcher
    is not an enemy to defeat. It is a loyal, tired part of you that has been standing
    guard for years and deserves to be told it can come in from the cold.


    What it offers is recognition, and a way to begin relieving the guard — language
    for the scanning, and a practice small enough to do in a meeting, on a platform,
    in the dark when you''re awake and the watcher is the only one still up.


    You are not too much. You are not impossible to be around. You are a person who
    has been on watch a long time, and who is allowed to find out what it feels like
    to be off it.


    Book 3 of the Stillness Press somatic healing series.'
