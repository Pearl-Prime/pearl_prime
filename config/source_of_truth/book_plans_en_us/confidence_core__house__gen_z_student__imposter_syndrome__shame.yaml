title: If They Knew the Real Me They'd Take It Back
subtitle: For the student who works twice as hard to cover a defect no one else can
  see — sure that underneath the grades is someone fundamentally not enough
cover_tagline: You're not afraid of being seen. You're afraid of being seen clearly.
description:
  short_blurb: It's not that you think you'll fail. It's that you're certain there
    is something wrong with you, underneath all of it, and that every good grade is
    just a better disguise. This is a book for the student who overworks to hide a
    defect they can't name — who believes the acceptance, the praise, the place would
    all be revoked if anyone saw who they really are.
  long_description: 'You got the grade and felt nothing but relief that the disguise
    held one more time. Because the fear was never that you''d fail. The fear is quieter
    and older than that: there is something wrong with you, something the transcripts
    can''t show, and you''ve been working twice as hard as everyone else just to keep
    it covered.


    You don''t think you fooled the admissions office about your test scores. You
    think you fooled them about you.


    This book is for you — the college student carrying shame underneath the imposter
    feeling. Not the loud fear of getting caught not knowing an answer, but the buried
    belief that the real you is fundamentally not enough, and that achievement is
    just the most convincing way to hide it. Shame isn''t ''I made a mistake.'' Shame
    is ''I am the mistake'' — and you''ve been overworking to cover it since long
    before this campus.


    You''ll come to recognize how shame and imposter syndrome braid together. How
    praise doesn''t land, because praise is for the disguise and the disguise isn''t
    you. How you keep the defect hidden by achieving louder. How being seen feels
    less like a gift and more like a risk — because what if they see clearly. How
    the hardest part isn''t the workload; it''s the exhaustion of holding a self you''re
    sure would be rejected if it ever stepped into the light. We''ll stay close to
    the covered place, gently, and ask the question shame never lets you ask: what
    if there was never a defect to hide.


    This is not a book that will help you perform a better version of yourself. It
    won''t hand you a more convincing mask or teach you to project a confidence that
    keeps the real you hidden a little longer. There is no achievement that will finally
    cover the thing you think is wrong with you, because the thing was never there.
    The point is not to become impressive enough to be safe. The point is to stand
    in the doorway with the disguise in your hand and let yourself be seen — clearly
    — and discover that the person underneath was someone who belonged all along.


    You were not admitted to a place where the real you doesn''t fit. You''ve just
    never let the real you walk in.


    You don''t have to fix the defect before you stop hiding. There was no defect.
    You only have to stop covering for a self that was never wrong.


    Book 4 of the Threshold Books imposter syndrome series.'
