title: I Replayed That Email Forty Times Last Night
subtitle: For the student whose one nervous thought becomes a thousand — looping a
  single message, a single class comment, into proof you don't belong
cover_tagline: One thought. Then a thousand. All of them saying the same thing about
  you.
description:
  short_blurb: You sent the email at 4pm and you have read it back in your head two
    hundred times since. One offhand comment in seminar, one professor's pause, and
    your mind builds an entire case for why they're onto you. This is a book for the
    student whose thoughts loop and feed themselves, turning a single moment into
    a midnight courtroom where you're always the fraud on trial.
  long_description: 'It''s past midnight and you are replaying the email again. Just
    the one line. You''re parsing the professor''s reply for the exact moment they
    started to suspect. You''ve run the seminar comment so many times you can''t tell
    anymore what you actually said and what you''ve added in the retelling.


    One thought walked in this afternoon. By now it''s a thousand, and every one of
    them says the same thing: they''re starting to see what you really are.


    This book is for you — the college student whose mind spirals. The one who takes
    a single neutral moment and turns it, by 2am, into a complete case for your own
    exposure. Rumination isn''t thinking it through. It''s the same thought wearing
    a thousand costumes, and the more you loop it, the more real the fraud feels.


    You''ll come to recognize the spiral for the engine it is. How replaying a moment
    feels like solving it, when really it''s just feeding it. How your mind mistakes
    circling for progress. How a single ambiguous email becomes a verdict only because
    you read it forty times in the dark. How the loop always lands in the same place
    — you don''t belong — not because it''s true, but because that''s the groove the
    thought was carved into. We''ll stay at the top of the spiral, in the moment it
    starts to pull, and learn the difference between a thought you''re having and
    a thought that''s having you.


    This is not a book that will teach you to think positive. It won''t hand you an
    affirmation to drown the loop or a mantra to recite until the spiral stops. There
    is no thought you can add that will finally win the argument with yourself. The
    point is not to out-think the spiral. The point is to stand in the doorway of
    another sleepless replay and recognize the loop as a loop — and to step out of
    the room instead of arguing in it one more time.


    The email was fine. The comment was fine. You are not on trial, no matter how
    many times the spiral convenes the court.


    You don''t have to win the loop before you put it down. You only have to stop
    mistaking the circling for the truth.


    Book 3 of the Threshold Books imposter syndrome series.'
