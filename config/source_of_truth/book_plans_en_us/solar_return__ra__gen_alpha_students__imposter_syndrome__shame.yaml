title: They're Going to Find Out I Don't Belong Here
subtitle: For the student who's sure the grades are luck and the praise is a mistake
  — quietly carrying the fear of being found out
cover_tagline: The A felt like a forgery. You are not the forgery.
description:
  short_blurb: You did the work, you got the grade, and somewhere underneath you're
    certain it was a fluke — that the real you is someone faking it well enough to
    fool everyone, for now. This is the book for the part of you that's been bracing
    to be exposed. It won't hand you confidence. It'll just sit with the shame until
    it stops running the whole show.
  long_description: 'You open the laptop to a high mark and feel almost nothing —
    except the quiet certainty that you got away with it again. Everyone else seems
    to actually be smart. You just figured out what the teacher wanted and performed
    it. And one day, in a seminar or a viva or a single cold-called question, they''ll
    see the gap between the student they think you are and the one you secretly are.
    So you over-prepare. You stay up. You answer carefully, never too much. You build
    a person who looks like she belongs and you wear her like a coat you''re afraid
    to take off.


    This book is for you — the one who reads the rubric a fourth time at midnight,
    who deletes the message before sending it, who hears ''you''re so smart'' and
    flinches because they don''t know. It''s for the student carrying a buried belief
    that something is fundamentally wrong with you, and that the work has only ever
    been hiding it.


    Gently, you''ll come to recognise the shape of that belief. How the mask got built,
    and what it costs to keep it on. How the shame whispers that the achievement was
    luck and the failure was the truth. How your body braces for an exposure that
    never comes — the held breath before you raise your hand, the heat in your face
    when someone reads your work aloud. You''ll meet the part of you that decided,
    somewhere back there, that being enough was something you had to earn at full
    volume, every single day, or lose it.


    Nothing here will optimise you. There''s no five-step routine, no script for faking
    confidence, no way to finally outwork the feeling. This book won''t help you prove
    you belong, because the proving was never the point — it was the trap. What it
    offers instead is warmth returning to cold hands. A doorway to stand in. The slow,
    unforced sense that the work was yours, the seat is yours, and you can stop bracing
    now.


    You''re not a fraud. You''re a person who learned to hide so well you started
    to believe the hiding was you. You''re allowed to be found — not found out, just
    found — exactly as you already are, here, in the light you were sure would expose
    you.


    Book 1 of the Ember & Ash Publishing Imposter Syndrome series.'
