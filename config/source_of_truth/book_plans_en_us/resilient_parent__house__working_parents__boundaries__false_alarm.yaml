title: The Yes That Costs You Everything
subtitle: For the working parent whose body braces before the word is even out of
  their mouth — the false alarm that turns every small ask into an emergency you must
  answer
cover_tagline: Your chest tightens before you've even said yes.
description:
  short_blurb: Someone asks for a little more of you and your whole system lights
    up like it's a crisis. You say yes before you've decided to, just to make the
    feeling stop. This is the book for the parent whose alarm goes off at the smallest
    request, and who has forgotten it's allowed to be quiet.
  long_description: 'It''s a Tuesday, and your phone buzzes. A text from the group
    chat. A coworker leaning into your doorway. Your kid calling your name from the
    other room while you''re already mid-something. And before you''ve even read the
    words, your chest has gone tight, your jaw has set, and a quiet voice inside is
    already saying yes, of course, no problem — anything to make the bracing stop.


    This is for the working parent whose body sounds the alarm before there''s anything
    to be alarmed about. The one who treats a small request like an emergency, who
    answers every demand as if saying no would bring the whole thing crashing down.
    You''ve started to confuse the spike of urgency with proof that the thing actually
    matters that much. It usually doesn''t. Your alarm system is just old, and loyal,
    and firing at shadows.


    In the stolen minutes you''ll spend here — the pause in the car before you go
    in, the quiet after the last small body is finally asleep — you''ll come to recognize
    the false alarm for what it is. You''ll feel how the yes leaves your mouth a half-second
    before your real answer does. You''ll notice the cost you''ve been quietly paying:
    the resentment you can''t explain, the depletion that sleep doesn''t touch, the
    sense that your own life is something you keep volunteering away. And you''ll
    learn what it feels like to let the alarm ring without leaping to answer it —
    to stand at the threshold of a request and ask, just once, where do I actually
    draw the line here?


    This book will not hand you a script for the perfect no. It won''t optimize your
    boundaries or turn you into someone who never flinches. It won''t promise that
    the bracing disappears. What it offers is smaller and truer: the recognition that
    the alarm is not an order, that a half-second of pause is yours to take, and that
    you are allowed to feel the spike and still choose your own answer.


    You don''t have to earn the right to hesitate. You don''t have to be calm to be
    allowed to say no. The few minutes you steal to read this are already a boundary
    — a small still pocket in a full day that belongs to no one but you.


    Book 1 of the Stolen Moment Press Boundaries series.'
