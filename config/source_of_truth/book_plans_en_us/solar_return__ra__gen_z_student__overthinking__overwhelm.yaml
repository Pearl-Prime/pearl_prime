title: Everything Is Due and You Cannot Move
subtitle: For the student drowning in tabs, deadlines, and a to-do list too long to
  begin — when the flood arrives all at once and there's no room left to think
cover_tagline: Thirty things, all at once, and not one place to put your hands.
description:
  short_blurb: Too much is arriving and your mind has run out of room. This is for
    the overthinker frozen at the start of an impossible week — every tab open, every
    deadline stacked, the list so long you can't begin any of it. It won't give you
    a system. It will help you find the small clearing where you can breathe.
  long_description: 'You sit down to start and there is nowhere to start. The reading,
    the email you''ve drafted four times, the deadline you moved and then moved again,
    the laundry, the call home, the thing you said you''d do for a friend — it all
    arrives in the same second, in the same crowded breath, and your mind, asked to
    hold it, simply floods. Not lazy. Not behind. Just full past the line where thinking
    is even possible.


    This book is for the student whose capacity got exceeded somewhere around Tuesday.
    You are not failing to manage your time. You have too much arriving and nowhere
    to set it down. Overthinking, for you, isn''t a single loop — it''s everything
    at once, a hundred half-thoughts shouting over each other until the noise itself
    becomes the thing you can''t get past. You open the laptop and freeze. You scroll
    instead, not because you don''t care but because caring this much, about this
    much, has nowhere to go.


    Here you''ll come to recognize the flood for what it is — capacity reached, not
    character revealed. You''ll see how the overwhelmed mind treats every task as
    equally urgent and equally on fire, so that choosing where to begin feels impossible
    because nothing will give you permission to put the rest down. You''ll learn what
    it feels like to find one small clearing in the smoke — not a method, not a system,
    just a single warm place to stand while the rest waits. You''ll discover that
    the flood crests. It always crests. And that you do not have to hold the whole
    year in your two hands at 1 a.m.


    This book will not tidy your week into five steps or hand you a planner that promises
    the flood won''t come. It won''t pretend that if you just plan harder, none of
    this would happen. It refuses to treat your overwhelm as a scheduling error. What
    it offers is the relief of being seen at capacity, and the quiet truth that you
    are allowed to do one thing, or no things, and still be someone who is doing their
    best.


    The flood will recede. You do not have to fight the whole tide tonight. You are
    allowed to set it all down, just here, just for now, and feel the room come back.


    Book 2 of the Ember & Ash Publishing overthinking series.'
