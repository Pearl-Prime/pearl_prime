title: A Good Parent Doesn't Need a No
subtitle: For the mother or father who works twice as hard to hide one quiet belief
  — that needing a limit at all means something is wrong with them
cover_tagline: You hid the limit because you thought it meant something was wrong
  with you.
description:
  short_blurb: 'Somewhere along the way you absorbed a quiet rule: a good parent,
    a good partner, a good employee doesn''t need anything. So you keep your limits
    hidden and work twice as hard to prove you don''t have any. This is a book for
    the person who carries their own needs like a defect, and is ready to set the
    secret down.'
  long_description: 'You don''t say it out loud, but you believe it. That a truly
    good parent wouldn''t need a break. That a truly devoted partner wouldn''t keep
    track of who''s more tired. That if you were just a little stronger, a little
    less needy, a little more capable, you wouldn''t have to ask for anything at all.
    So you don''t ask. You absorb. You take the early mornings and the late nights
    and the invisible second shift, and you tell yourself this is just what love looks
    like.


    This is a book for the working parent who carries their own needs like something
    shameful — a flaw to be covered, not a fact to be honored. You''re not afraid
    of the conversation because you might lose it. You''re afraid of it because asking
    for a limit feels like a confession: that you''re not endless, not selfless, not
    the bottomless well everyone seems to assume you are. And so you overwork. You
    over-give. You stay quiet about the thing you need most, because needing it at
    all feels like proof that something in you is broken.


    Here, you''ll come to recognize that belief for what it is — not a truth about
    your character, but an old, inherited rule you never agreed to. You''ll see how
    shame keeps the boundary buried: how it whispers that a real mother, a real father,
    a real provider wouldn''t have to say no. You''ll watch the way you hide your
    limits even from the people who love you, performing a tirelessness no human actually
    has. And you''ll begin to feel the difference between being selfless and being
    erased.


    This book will not fix you, because you are not broken. It offers no method for
    needing less, no plan for becoming a more tireless version of yourself. It will
    not teach you to whittle yourself down into someone who never reaches their edge.
    The edge is real. Everyone has one. Yours is not a defect.


    What it offers instead is a chair pulled up beside you, and a quieter possibility:
    that you could name a need at the table without apology. That you could say ''this
    is mine to keep'' and discover the room doesn''t fall in. That the people worth
    keeping will not love you less for being a person.


    You were never supposed to disappear into your own kindness. Wanting a limit doesn''t
    make you selfish. It makes you someone who finally believes they''re allowed to
    be here too.


    Book 2 of the Two Chairs Press boundaries series.'
