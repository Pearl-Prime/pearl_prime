title: 'The Number in Your Head: When You Feel Fundamentally Wrong'
subtitle: A One-Hour Money Anxiety Reset for Professional Women
cover_tagline: It's not the balance. It's the voice that says a competent woman would
  have this handled by now.
description:
  short_blurb: Money anxiety often isn't really about money. It's a buried belief
    that the state of your finances proves something is fundamentally wrong with you.
    This is one hour to separate the number from the shame you've welded to it.
  long_description: 'A coworker mentions her down payment and something in you curdles,
    not envy exactly, but a hot, familiar drop in your stomach that says: you should
    have this by now, what is wrong with you. You make good money. You have a real
    career. And still, the state of your accounts feels like evidence in a case against
    you, proof of some defect you''ve spent your whole life trying to hide. This hour
    is for the professional woman who carries her finances like a secret shame, certain
    that if anyone saw the full picture, they''d finally know she''s not who she pretends
    to be.


    This is for you if the anxiety isn''t about the numbers, it''s about what you''ve
    decided the numbers mean about you. The debt isn''t just debt, it''s character.
    The savings you don''t have isn''t a gap, it''s a verdict. You watch women your
    age who seem to have it together and you don''t think "different circumstances,"
    you think "better person." You''ve tried to fix the money to fix the feeling.
    It never works, because the shame was never actually about the money.


    So we won''t start with the spreadsheet. First you''ll recognize the real mechanism:
    a buried belief that something is fundamentally wrong with you, one that found
    a convenient home in your bank balance because numbers feel like proof. Then you''ll
    go down to where that belief actually lives, underneath the money story, and see
    how long you''ve been carrying it and where it really came from. Then you''ll
    come back up able to hold the number as just a number, a fact about your life,
    not a sentence passed on your worth.


    This book will not give you a wealth plan. It won''t promise that hitting a savings
    goal will finally make you feel like enough, or that the right budget will quiet
    the voice. It won''t tell you to just think positive about money. The shame is
    older and deeper than your finances, and you can''t out-earn it.


    What it offers is the part the money advice never touches: how to peel your sense
    of worth back off your balance sheet, so your finances can be a problem you solve
    instead of a person you''re ashamed of being. You don''t have to be richer to
    stop feeling fundamentally wrong. You don''t have to fix the number to set the
    shame down. You''re allowed to be a whole, good woman with messy finances, starting
    now.'
