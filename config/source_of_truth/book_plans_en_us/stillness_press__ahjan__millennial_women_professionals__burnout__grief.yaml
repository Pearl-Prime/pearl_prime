title: Mourning the Woman You Used to Be
subtitle: On grieving the energy, the ambition, and the open-hearted self that years
  of overwork quietly carried off — and what is still alive underneath
cover_tagline: Burnout isn't only tiredness. It's a loss you were never allowed to
  name.
description:
  short_blurb: No one told you that burnout would feel like grief, like mourning a
    person you used to be. The woman who cared, who had ideas, who looked forward
    to things, seems to be gone, and you don't know how to grieve someone who is still
    technically you. This book makes room for that loss, and for what comes after.
  long_description: 'You remember her. The version of you who had energy at the end
    of the day. Who texted friends back. Who cared about the work, not just survived
    it. Who made plans for the weekend and actually wanted to go. You''re not sure
    when she left. But you''ve started to grieve her, and you didn''t even know burnout
    could feel like this — like loss.


    This book is for the millennial woman who gave years of her aliveness to a career,
    a calling, a relentless pace — and is only now realizing how much it cost. You
    are not just tired. You are mourning. Mourning the spark, the ambition, the open-heartedness
    that used to come easily and now feels buried under something you can''t name.
    And grief for a living person, a former self, is a strange and lonely thing. There''s
    no funeral for who you used to be. So you carry it quietly and call it exhaustion.


    Here you will come to recognize the loss underneath the burnout. We''ll name what
    was actually taken — not just hours, but caring itself, the capacity to want things,
    the lightness you used to have. We''ll sit with the guilt of grieving something
    you chose, the confusion of missing a self who is still wearing your clothes,
    and the quiet fear that she might not be coming back. You''ll see that grief is
    not a problem to fix but a passage to move through — and that letting go of who
    you were is not giving up. It is how you make room for who comes next.


    This book will not promise to give her back to you, restored and intact. It will
    not tell you that a sabbatical or a gratitude list will resurrect the woman you
    were, because that would be a lie, and you''ve had enough of those. There is no
    productivity cure for grief. There is no optimizing your way back to a self that
    the last few years quietly changed.


    What there is, is permission to mourn. To stop pretending the loss isn''t a loss.
    To grieve her honestly — and, in the grieving, to discover that something is still
    alive underneath, waiting, unhurried, for you to stop performing long enough to
    feel it.


    You are allowed to miss who you were. That ache is not weakness. It is love, still
    here.


    Book 2 of the Stillness Press burnout series.'
