title: The Call You Keep Running
subtitle: For the responder who replays the one that went wrong — quieting the after-action
  loop that turns a single call into a thousand reruns
cover_tagline: You cleared the scene hours ago. Your mind keeps going back in.
description:
  short_blurb: There's one call you can't stop running. You've replayed it a hundred
    ways, each one ending different, each one ending worse. This is for the mind that
    turns a single moment into an endless after-action review — and the steadier ground
    beneath the loop.
  long_description: 'It''s the one you take home. You''ve run it again since you got
    off — the timing, the call you made, the half-second where it could have gone
    another way. You replay it forward and backward, and every version interrogates
    the one before it, and none of them let you out. You did the job. The job is over.
    Your mind is still on scene.


    This book is for the medic, the firefighter, the officer, the dispatcher whose
    worst calls don''t end when the report is filed. The ones who lie awake conducting
    an after-action review nobody asked for, where one decision becomes a thousand
    second-guesses, each thought breeding the next until you can''t find the bottom
    of it. You are not weak for replaying it. You are running a mind built to learn
    from danger — and it has caught on a loop that no amount of thinking will close.


    You''ll come to recognize the spiral for what it is. The way one image pulls in
    ten more. The way "what if" pretends to be problem-solving when it''s really just
    the same circle, tighter each time. The way the replay feels like it''s keeping
    you sharp when it''s only wearing the edge down. You''ll see how rumination disguises
    itself as responsibility — and how stepping off the loop is not the same as letting
    yourself off the hook.


    This is the still center in the storm, and the storm is inside your own head.
    There''s a cliff your thoughts keep circling. The work is not to think your way
    down it but to step back from the edge — what is one thing you can do, right now,
    before your mind feels finished?


    This book will not give you closure on the call, and it won''t promise that the
    loop disappears for good. There''s no technique here to think the thought away,
    no reframe that erases what happened. The replay is not a flaw in your character.
    It is a trained mind doing the only thing it knows how to do with a wound — and
    the work is to give it somewhere to stand other than the scene.


    You don''t have to solve the call to put it down. You ran it as well as anyone
    could. Let the loop turn without climbing back into it, and come back to the ground
    under your feet.


    Book 2 of the Iron Gate Press courage series.'
