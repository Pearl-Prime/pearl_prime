title: Your Body Is Still on the Monitor
subtitle: For the nurse who never clocks out inside — when the scanning won't stop
  and you keep bracing for an alarm that isn't going to sound
cover_tagline: You're home. Safe. So why is your nervous system still watching the
  door?
description:
  short_blurb: Your shift ended hours ago, but some part of you is still on the floor,
    still counting respirations, still waiting for the tone that means someone is
    crashing. This is a book for the nurse whose body refuses to go off duty. It won't
    tell you to relax — it will show you how to let the watcher in your nervous system
    finally stand down.
  long_description: 'You''re home. The door is locked, the lights are low, nothing
    is wrong. And still you''re listening. A beep from the kitchen and your stomach
    drops before your mind catches up. You scan the people you love for signs you''ve
    been trained to catch. You lie down and your eyes won''t close because some part
    of you is still on the floor, still tracking the rhythm strip, still braced for
    the tone that means someone is going down. Your shift ended hours ago. Your body
    is still on the monitor.


    This book is for the nurse whose vigilance never clocks out. The one whose nervous
    system learned that to look away for one second is to miss the thing that matters,
    and so it never looks away — not at the bedside, not at dinner, not at 3am. You''ve
    become so good at catching what''s wrong that you''ve forgotten how to register
    that, right now, nothing is. The scanning kept your patients safe. It is also
    quietly keeping you from ever coming to rest.


    What you''ll come to recognize is that the watcher in you is not a flaw to be
    defeated — it is a part that has been standing guard so long it doesn''t know
    it''s allowed to sit down. You''ll learn to feel where the vigilance lives in
    the body: the eyes that won''t soften, the held breath at the top of the chest,
    the fine tension under the skin that''s always ready to move. You''ll learn what
    it is to let the charge drain out of the watching, to feel the ground come up
    under you and signal to the deepest part of your system that the threat is not
    in this room. You''ll meet the threshold between the unit and your own life, and
    learn to let the guard actually cross it and stand down — so rest stops being
    one more thing your body won''t permit.


    This book will not optimize your recovery or teach you to hack your way to calm.
    It will not tell you to simply relax, as if you hadn''t tried. There is no protocol
    here for a more efficient nervous system. The watcher does not get overpowered.
    It gets, at last, relieved of its post.


    You are allowed to stop scanning. You are allowed to be somewhere safe and let
    your body know it. You are allowed, after everything you''ve kept watch over,
    to be the one who finally gets watched over.


    Book 2 of the Root & Meridian Press somatic healing series.'
