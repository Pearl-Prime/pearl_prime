title: 'The Number in Your Head: Escaping the Mental Loop'
subtitle: A Field Guide for the Sandwich Generation Navigating Financial Anxiety
cover_tagline: One overdue bill at 11pm, and by midnight you've buried both your parents
  and lost the house.
description:
  short_blurb: It starts with a single thought about money and ends, twenty minutes
    later, somewhere catastrophic. This is a book for the Sandwich Generation mind
    that turns one financial worry into a thousand at two in the morning. It won't
    tell you to stop worrying. It will show you how to step out of the loop without
    pretending the worry was nothing.
  long_description: 'You know the exact shape of it. You remember a bill, or a number,
    or an offhand thing the doctor said about your father, and that''s the first domino.
    By the second thought you''re projecting the cost out a year. By the fifth you''re
    imagining the assisted-living facility you can''t afford. By the time you surface
    it''s past midnight, you''ve mentally drained the savings, failed your kids, and
    watched the whole structure collapse — and not one cent has actually changed hands.
    The thought arrived, and the mind did what it always does. It spiraled.


    This book is for you — the one lying awake running the worst-case math at 2am.
    You''re holding up a parent and a child at once, which means you have more genuine
    financial unknowns than most people, and a mind that takes every one of them and
    runs it to the end of the world. You''re not irrational. You''re pattern-matching
    real risk. But somewhere the pattern-matching stopped protecting you and started
    torturing you, and you can''t tell anymore which thoughts are planning and which
    are just the loop feeding itself.


    First, we name the mechanism. A spiral isn''t the same as a problem. A problem
    has an edge — a thing you could write down, a call you could make. A spiral has
    no edge; it''s one thought spawning the next, each one a little worse, none of
    them a step toward anything. You''ll learn to feel the moment the loop starts:
    the speeding-up, the future-tense, the way the catastrophe always lives in some
    imagined month that isn''t here yet.


    Then, instead of fighting the thoughts or forcing them quiet, you go down into
    the loop with your eyes open. You stop trying to win the argument with your own
    mind at midnight. You learn to watch the spiral run without being dragged behind
    it — to let the thoughts spin while you stay on the ground. That''s the descent.
    Counterintuitively, the loop loses power when you stop sprinting away from it
    and simply let it turn while you keep breathing.


    What you come back with is not a quiet mind that never worries about money again.
    The unknowns are still unknown. What changes is that you can tell the difference
    now — between a thought that''s pointing at something you can do tomorrow, and
    a loop that just wants to keep you spinning. You can let the 2am version of the
    catastrophe pass through without booking the funeral. You can close your eyes
    before you''ve solved a future that hasn''t arrived.


    This book will not promise you certainty, a calm you can summon on command, or
    a mind that stops generating worst cases. That mind is yours and it''s trying,
    in its clumsy way, to keep everyone safe. But you don''t have to ride every loop
    to the bottom. You''re allowed to notice the spiral, leave it spinning, and go
    to sleep.'
