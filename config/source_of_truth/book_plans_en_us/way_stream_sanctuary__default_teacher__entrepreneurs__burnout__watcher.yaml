title: 'Burnout Recovery: The Space Between You and Your Anxiety'
subtitle: How to Create Distance from Anxious Thoughts and Find Clarity — Burnout
  for Entrepreneurs (The Observer's Mind)
cover_tagline: The on switch broke, and you've forgotten what off feels like.
description:
  short_blurb: 'For the founder whose mind has become a security guard that never
    clocks out — scanning the runway, replaying the all-hands, bracing for an email
    that hasn''t come. This is a secular guide to the hypervigilant mind: naming what
    the watcher costs, finding the gap between you and the anxiety, and letting the
    guard sit down. No cold-shower protocol, no promise the threats stop.'
  long_description: 'You''re lying in bed and your mind will not stand down. The day
    is over, the laptop is closed, and yet some part of you is still on watch — scanning
    the runway numbers, replaying the thing you said in the all-hands, bracing for
    the email that hasn''t come. You''ve started sleeping with one eye on the company,
    even in your dreams. People call you wired, driven, always on. What they don''t
    see is that the on switch broke, and you''ve forgotten what it felt like to actually
    be off. This book is for the founder whose mind has become a hypervigilant security
    guard that never clocks out. The one who can''t fully relax at their own kid''s
    birthday because part of them is still monitoring for the next threat to the business.
    The one whose nervous system treats a quiet quarter as the dangerous part. You
    are not paranoid, and you are not weak. You trained this watcher on purpose —
    early-stage survival rewards the founder who sees the problem first — and now
    it won''t power down even when there''s nothing left to guard. Here we name what
    the watcher is and what it costs: the constant low hum of threat-scanning that
    masquerades as diligence while it quietly burns you to the ground. We go down
    into it instead of trying to discipline it away, because you cannot out-vigilant
    your vigilance, and every attempt to force calm just gives the watcher one more
    thing to monitor. You''ll learn to notice the difference between the part of you
    that''s leading and the part that''s only standing guard. Then we come back —
    to a space between you and the anxiety, a small but real gap where you get to
    decide whether a thought deserves your whole body or just a glance. This is not
    a discipline book or a hustle manual. It will not hand you a cold-shower protocol
    or tell you to optimize your recovery so you can scan harder tomorrow. It will
    not promise the threats stop coming, because you are running a real company and
    some of them are real. What it offers instead is plain, usable language for the
    hypervigilant mind, and a way to let the guard sit down for a while without believing
    the whole thing will collapse the moment you stop watching. The company does not
    need you on watch every hour to survive. And neither, it turns out, do you.'
