title: Everyone Else Seems to Have It Together
subtitle: For the parent measuring a hard day against everyone who looks calm and
  capable — and always coming up short
cover_tagline: You measure your whole life against the smooth surface of everyone
  else's, and the well inside you never gets to refill.
description:
  short_blurb: Every other parent seems to have figured something out that you missed.
    They look calm at drop-off. Their kids look fed and content. Their work, their
    bodies, their houses — handled. You measure your own loud, leaking day against
    the smooth surface of theirs, and you always come up short. This is a book for
    the mind that compares, and never wins.
  long_description: 'At drop-off, it looks like everyone else got the instructions.
    The other parents seem rested. Their kids seem calm. Someone is laughing easily
    by the gate, coffee in hand, like none of this costs them anything. And you stand
    there with your unbrushed hair and your kid''s forgotten water bottle and the
    quiet, sinking certainty that you are the only one barely holding it together.


    So you measure. You can''t help it. You compare your day — the loud one, the one
    with the meltdown and the missed email and the dinner that didn''t happen — against
    the smooth, edited surface of everyone else''s, and the math always comes out
    the same. They have it together. You don''t. You scroll, and it gets worse. You
    see the milestones, the trips, the careers, the calm, and somewhere in you a verdict
    lands: behind. Less. Not measuring up.


    This book is for the working parent whose mind has turned into a scale that never
    rests. The one who can''t see another person''s life without ranking their own
    beneath it. The one who knows, intellectually, that they''re only seeing the highlight
    reel — and still feels the shortfall in their chest like a stone.


    You''ll come to recognize how comparison promises to motivate you and only ever
    drains you — drawing the sap up off the surface to feed a contest you can''t win.
    How the people you measure yourself against are not the calm you imagine; you
    are comparing your inside to their outside. How the ache to keep up is older than
    this, rooted in a long-ago lesson that worth was a ranking, not a given. And how
    there is another way to stand — fed from the root rather than ranked against the
    field, the way a tree doesn''t grow taller by resenting the one beside it.


    Nothing in this book will help you win the comparison. That is the point. It will
    not make you the most-together parent at the gate, or polish your life into something
    worth posting. It won''t fix you, because the problem was never that you''re behind
    — it''s that you''ve been running a race that has no finish line, against people
    who aren''t even in it.


    You are allowed to stop measuring. To let your own life be your own life, lived
    at the depth where no one else''s surface can reach it. You''re not falling behind.
    You have just spent your whole attention on the one comparison that can never
    come out ahead, when the worth you''re reaching for was waiting lower down, in
    the root, the whole time.


    Book 2 of the Root & Meridian Press self worth series.'
