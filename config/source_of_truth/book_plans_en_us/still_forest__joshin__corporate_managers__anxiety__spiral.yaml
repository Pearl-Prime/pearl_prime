title: A Worry That Follows the Roots Down
subtitle: For the manager whose mind turns a single worry into a long descent, learning
  to step off the root that only travels downward
cover_tagline: It begins with one thought. By midnight it is the whole forest, and
  it is dark.
description:
  short_blurb: It starts with one small worry, and by midnight it has become a hundred.
    This is a quiet book for the manager whose mind catches on a single thought and
    follows it all the way down — the rumination that feeds itself, the same loop
    walked at 2am, the descent that always finds another step.
  long_description: 'It begins so small. One thing someone said in a meeting. One
    reply that landed wrong. One decision you''re no longer sure of. You notice it
    the way you''d notice a single dark trail leading off the path — and then you
    follow it. One thought becomes three. Three become the whole night. By two in
    the morning you have rehearsed every version of the disaster, traced every way
    it reflects on you, and walked the same dark loop so many times the ground is
    worn.


    This book is for the manager whose mind spirals — who knows the descent intimately
    because you''ve made it a thousand times. The spiral is not new information. It
    rarely tells you anything the first lap didn''t. But it has a gravity, a downward
    pull, and once you''ve stepped onto it the next step always appears, and the next,
    each one feeling like thinking when it is really just falling.


    Here you''ll come to recognize the spiral as a path, not a truth. You''ll see
    how rumination disguises itself as problem-solving while solving nothing, how
    it feeds on your intelligence and your conscientiousness — the very strengths
    that make you good at the job — and how, the way you can simply stop descending
    a trail and stand still in the trees, you can step off the loop without finishing
    it. Not by winning the argument in your head. By recognizing that there is no
    argument to win, only a path that goes down, and that you are allowed to stop
    walking it.


    The voice here is the still forest: quiet, patient, slow enough to interrupt a
    mind moving fast in tightening circles. There is nothing to optimize in these
    pages, no thought-stopping drill to perform under pressure, no reframe to win
    the 2am debate. A spiraling mind cannot be out-argued, and trying only digs the
    loop deeper.


    What this book will not do is hand you the bottom of the spiral, where the worry
    finally resolves and you can rest. There is no bottom; that''s the nature of it.
    It won''t promise you a mind that never catches on a worry again. It will only
    help you notice the first step of the descent sooner, and remember, each time,
    that you can stand still in the trees and let the loop keep going without you.


    The thought can run. You don''t have to follow it down.


    Book 3 of the Still Forest Press anxiety series.'
