title: The Version of You That Could Rest
subtitle: For the burned-out high-performer mourning the calm they traded away — letting
  go of who you were before the dread moved in
cover_tagline: You didn't lose your edge. You lost the part of you that could put
  it down.
description:
  short_blurb: Somewhere along the climb you lost something you can't quite name —
    the ease, the off-switch, the version of you that could close the laptop and actually
    be done. This is a steadying book for the high-performer grieving what burnout
    took, and a gentle way to let go of who you were before the dread moved in.
  long_description: 'There''s a version of you that you can barely remember now. The
    one who could finish the day and actually be finished. Who didn''t check the markets
    from bed, didn''t feel the buzz of the phone in their chest, didn''t carry tomorrow''s
    standup into tonight''s dinner. Somewhere across the years of climbing — the raises,
    the rounds, the relentless leveling-up — that person quietly went missing, and
    you were too busy to notice they were gone. Now there''s a dread where their ease
    used to be, and underneath the dread, if you let yourself feel it, there''s grief.


    This is a book for what the anxiety took, and what you''ll have to release to
    move on.


    We don''t usually call it grief. In a world built on growth and optimization,
    loss doesn''t have a line item. But that''s what this heaviness is — mourning
    for a self who could rest, for relationships that thinned while you were heads-down,
    for years that blurred into one long quarter, for a nervous system that hadn''t
    yet learned to brace. The anxiety isn''t only fear of what''s ahead. Part of it
    is sorrow for what''s already behind, unmetabolized, waiting for you to finally
    feel it.


    You''ll come to recognize how the grief lives alongside everything else. The body
    still bracing for a threat, long after the cost has already landed. The flood
    you stayed in so you wouldn''t have to feel the loss. The spiral that''s easier
    than the sadness. The shame that says you have no right to mourn a life this privileged.
    The comparison to people who seem to have given up nothing. The watcher who keeps
    you scanning forward so you never have to look back.


    This book will not help you win the lost time back, or optimize your way past
    the sorrow. It will not rush you through it with silver linings, or promise that
    letting go won''t hurt. It will not hand you a fix, because grief is not a problem
    to be solved. What it offers instead is the harbor: a still place to set the loss
    down for a while, to let the boat stop pitching, to feel what you traded away
    without drowning in it — and, slowly, to find that something can grow in the cleared
    ground.


    You are allowed to grieve a life that looked, from the outside, like winning.
    You are allowed to miss who you were. And you are allowed to let that person go,
    gently, so the one you are now can finally come in to shore.


    Book 5 of the Harbor Line Books anxiety series.'
