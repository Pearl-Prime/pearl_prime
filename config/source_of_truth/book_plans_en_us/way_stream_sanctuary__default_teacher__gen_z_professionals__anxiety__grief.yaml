title: 'The Alarm Is Lying: After the Loss'
subtitle: A Field Guide for Young Professionals Navigating Anxiety Relief
cover_tagline: Some of your anxiety isn't fear. It's grief you never got the time
  off to feel.
description:
  short_blurb: Something ended — a person, a relationship, the version of your life
    you thought you'd have by now — and you went back to work on Monday like nothing
    happened. The anxiety that won't quit might be loss with nowhere to go. This book
    makes room for the grief underneath the alarm, without a single platitude about
    everything happening for a reason.
  long_description: 'You''re in a meeting and it ambushes you — a wave that has nothing
    to do with the agenda. Or you can''t sleep, can''t settle, carry a low hum of
    dread you can''t trace to anything. You took the bereavement days, or you didn''t,
    and either way the world expected you back at your desk fast. So you came back.
    But something in you is still standing at the edge of a loss it never got to feel
    all the way down.


    This book is for the young professional carrying grief in a workplace that has
    no slot for it. The one who lost a parent, a partner, a friendship, a future they''d
    already half-built in their head — and had to keep performing competence through
    it. You''re young enough that everyone assumes you''ll bounce back, deep enough
    into a career that you can''t just stop, and the unfelt loss is leaking out as
    anxiety you can''t name. If you''re white-knuckling your way through the workday
    with something heavy and unprocessed underneath, this is for exactly where you
    are.


    First you learn to recognize it: to tell the difference between anxiety that''s
    about the future and the kind that''s actually grief wearing anxiety''s clothes.
    Then you go down into it — not to fix the loss or get over it on schedule, but
    to finally let it be as big as it is. This is the descent, and it asks something
    of you: to stop managing the grief and let it move. It''s the hardest part and
    the only part that changes anything. You come back not healed-and-done, but carrying
    it differently — less as a threat, more as something true.


    What this book will not do: it will not tell you the loss was a lesson, that time
    heals all, or that you''ll be stronger for it. There''s no stage you''re failing
    to reach, no closure to optimize toward, no reframe that turns the absence into
    a gift. The grief will surface again, on its own schedule, in the middle of ordinary
    days. What''s different is that you''ll stop mistaking it for something broken
    in you.


    You are allowed to still be grieving while everyone around you has moved on. You''re
    allowed to feel it at your desk, in the elevator, on a Tuesday that was supposed
    to be normal. The loss was real. Letting yourself feel it is not weakness — it''s
    the only way through, and you get to take the time no one gave you.'
