title: The Grief You're Not Allowed to Have at Work
subtitle: For the young professional carrying a loss no one at the office can see
  — and being asked to let go before you've even understood what was taken
cover_tagline: You came back too soon. Everyone could tell except the people who needed
  to.
description:
  short_blurb: Something has been taken from you, and the world expected you back
    at your desk before the casseroles ran out. This is a book for the grief that
    doesn't fit on a calendar, doesn't resolve in five tidy stages, and doesn't care
    that you have a one-on-one at three. It won't help you get over it faster. It
    will help you stop trying to.
  long_description: 'You''re back. You answered the emails. You said "I''m doing okay,
    thanks for asking" so many times it stopped meaning anything. And underneath all
    of it, something enormous is sitting in your chest that nobody in this building
    has the language to name.


    This is a book for you — the one who lost someone, or something, and discovered
    there is no bereavement policy long enough for what actually happened to you.
    You are in your twenties. You were supposed to be building something. Instead
    you are learning, far too early, that things can simply be gone.


    You will come to recognize the strange, modern shape of this grief. The way it
    shows up not as one clean wave but as a flood that arrives at the worst moments
    and abandons you at the funeral itself. The way a part of you stands off to the
    side, watching yourself grieve, wondering if you''re doing it right or doing it
    enough. The way you measure your sorrow against everyone who looks like they''ve
    moved on, and feel a low, secret shame that you haven''t. The way the loss can
    feel less like a stage to pass through and more like a room you now live in.


    This book will not promise to walk you out of that room. There is no five-step
    exit here, no timeline, no reframe that turns your loss into a growth opportunity
    for your personal brand. Nothing in these pages will help you let go faster, because
    letting go was never something you could force, and the people telling you to
    were only trying to make their own discomfort end.


    What you''ll find instead is quieter, and stranger, and truer. That underneath
    the ache there is something in you that the loss did not touch — an awareness
    that was here before the person you''re mourning, and is here now, holding all
    of it. That grief, when you stop fighting it, is not a malfunction. It is love
    that has nowhere left to go, and it is allowed to stay as long as it needs.


    You don''t have to be healed by Monday. You don''t have to make this mean anything
    yet. You are allowed to set the performance down, here, in the only place that
    asks nothing of you.


    Book 1 of the Awakening Press grief series.'
