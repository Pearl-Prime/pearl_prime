title: The Part of You That You Hide
subtitle: For the teen who's sure something is wrong with them — when bravery feels
  like a thing other people are allowed and you are not
cover_tagline: You built a whole self to cover it. You can put the cover down.
description:
  short_blurb: 'Somewhere underneath everything, you carry a quiet certainty that
    there''s something wrong with you — and most of what you do is built to keep anyone
    from finding out. This book is for the teenager who hides the real thing and overworks
    to cover it. It won''t tell you to love yourself or fake it till you make it.
    It''ll sit with the part of you that you''ve been hiding, and tell you the truth:
    you were never the defect you think you are.'
  long_description: 'You can''t always name it, but you can feel it — a low, steady
    certainty that something about you is wrong. Not a thing you did. You. And so
    much of your life is quietly organized around that belief: the joking before anyone
    can laugh at you, the not-trying so no one sees you fail, the careful editing
    of everything before it leaves your hands, the exhausting work of seeming fine.
    Bravery, you''ve decided, is for the people who don''t have whatever it is you
    have. They get to step forward. You get to hide.


    This book is for the teenager who carries shame like a second backbone. The buried
    belief that you''re somehow too much or not enough, defective in a way everyone
    else got spared — and the enormous effort it takes to keep that hidden. You''re
    not actually broken. But you''ve been treating yourself like contraband for so
    long that the hiding feels like just who you are. It isn''t. It''s armor you put
    on young, for reasons that made sense, and it''s gotten very heavy.


    Chapter by chapter, you''ll come to recognize the shame underneath the strategies.
    You''ll see how the hiding costs you the exact things you most want — to be known,
    to try, to take up space — and how the belief that something''s wrong with you
    isn''t a fact you discovered but a story you absorbed. You''ll learn that courage
    here isn''t a big brave performance; it''s the small, terrifying act of letting
    one true thing show. There''s a question this book keeps returning to, and it
    isn''t ''how do I fix what''s wrong with me.'' It''s: what is one thing you can
    do before you feel ready — before you feel worthy of being seen?


    This book will not promise to make you finally good enough. There''s no glow-up,
    no self-love checklist, no version of you that earns its way out of shame by achieving
    hard enough. That road has no end and you''ve been running it long enough to know.
    What it offers instead is this: the possibility that there was never anything
    to cover in the first place. That the part of you you''ve been hiding is just
    a part of you — scorched, maybe, but not ruined. The kind of thing that grows
    back green.


    You don''t have to become someone else to be allowed in the room. You only have
    to stop believing you don''t belong there. Let one true thing show. Start there.


    Book 3 of the Ember & Ash Publishing courage series.'
