title: 'The 3am Mind: When Everything Is Too Much'
subtitle: A One-Hour Sleep Reset for the Sandwich Generation
cover_tagline: The day was too much. Now it's all in bed with you. Here's how to set
  it down.
description:
  short_blurb: You held it together all day, and now everything you carried is in
    bed with you at once. This one-hour sleep reset is for the night your mind floods
    with too much to ever sleep through. You'll learn to set the overwhelm down —
    not by solving it, but by stopping the pile-on.
  long_description: 'You made it through the day. You handled the call from the care
    facility, the kid''s meltdown, the work thing, the dinner, the laundry, the text
    you still haven''t answered. And now you''re horizontal in the dark and all of
    it arrives at once — every undone task, every unmade decision, every person depending
    on you — piled on your chest at the exact moment you can do nothing about any
    of it. There''s too much, and your mind has chosen now to show you all of it.


    This book is for you — the one running on the last fumes of a sandwiched life,
    parenting up and parenting down, whose brain saves the full inventory of everything
    for the moment your head hits the pillow. You''re not bad at winding down. You''re
    carrying a genuinely impossible load, and at night there''s no task to hide behind,
    so it all crashes in together.


    In about an hour, you''ll learn what to do when everything is too much at once.
    First, recognition: the specific texture of overwhelm — not one sharp worry but
    a flood, the sense that there are too many things and not enough of you. Then
    the descent. You won''t sort the pile or triage it into a list (that''s just overthinking
    with a clipboard). Instead you''ll go down underneath the flood to the feeling
    driving it — the simple, body-level too-much — and let it be exactly as big as
    it is without adding the next thing to it. The overwhelm grows by accumulation;
    the relief comes from stopping the pile-on. In the integration, you find you can
    let the whole heavy load exist without having to hold every piece of it tonight.


    This book will not promise to clear your plate or hand you a system that finally
    makes it all manageable. Your load is real and most of it isn''t going anywhere.
    It won''t optimize your life into something lighter than it is. What it offers
    is a way to lie down under a too-heavy day without the weight crushing the sleep
    out of you — to set it down for the night, knowing it''ll still be there, and
    choosing rest anyway.


    No brain-dump worksheet. No evening routine. No "count your blessings." Just honest
    words for what too-much feels like in the body and a way to stop adding to the
    pile at midnight.


    The day was too much. That''s the truth, and it doesn''t have to follow you under
    the covers. You''re allowed to set it down and sleep.'
