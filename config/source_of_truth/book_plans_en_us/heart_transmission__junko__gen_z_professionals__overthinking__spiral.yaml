title: When a Single Worry Eats the Night
subtitle: For the twentysomething whose late-night mind turns one small worry into
  the whole night — finding the quiet doorway out of the spiral that keeps feeding
  itself
cover_tagline: It started with one thought. It never stops at one.
description:
  short_blurb: It begins so small. One reply you shouldn't have sent. By 2am it has
    become every relationship you've ruined and every way you're falling behind. This
    is a tender guide for the mind that knows exactly how the spiral starts — and
    can never seem to find the door out.
  long_description: 'It starts with one thought. Just one. A thing you said in the
    meeting, a text left on read, a number on a screen. And if you could leave it
    there, you''d be fine. But you can''t leave it there. One thought becomes a question,
    the question becomes a search, and the search pulls in every other time you''ve
    felt this way, until you''re lying awake at 2am with a single worry that has somehow
    swallowed your entire life.


    This book is for you — the one who lies very still while the mind does loops in
    the dark. The one who has tried to think their way to the bottom of the spiral
    and discovered there is no bottom, only more thinking. You are not weak for getting
    caught in it. The spiral is seductive precisely because it feels like solving.
    Each lap promises that the next thought will be the one that finally makes you
    safe. It never is. The thinking is not the cure. The thinking is the thing.


    Here, we walk toward the doorway instead of deeper in. You''ll come to recognize
    how the spiral begins — the small snag, the first "but what if," the moment a
    feeling disguises itself as a problem to be solved. You''ll see how rumination
    borrows tomorrow''s fear and yesterday''s shame and calls it useful. You''ll feel,
    maybe for the first time, the difference between thinking about your life and
    actually living inside it. And you''ll learn that there is a threshold in every
    spiral — a quiet place where you can step out, not by winning the argument in
    your head, but by gently declining to have it.


    This is not a system, and it will not hand you a thought-stopping trick to deploy
    at midnight. There is no clever reframe here that ends rumination forever by Sunday.
    What there is, instead, is a warm hand on the door — a voice beside you in the
    dark saying: you don''t have to follow that thought all the way down. You can
    stay here, with me, in the room that is actually real.


    Nothing in these pages will help you out-think the spiral. You already know how
    that ends. What it offers is the slow, unguarded relief of stepping through the
    doorway — of discovering that the way out was never another thought, but the willingness
    to stop reaching for one.


    You are allowed to leave the loop unfinished. You are allowed to put the thought
    down and rest.


    Book 2 of the Heart Transmission Press Overthinking series.'
