title: Comparing Your Climb to Their Summit Photos
subtitle: For the sandwich-generation professional sure everyone else reached a peak
  they are still climbing toward
cover_tagline: You're not behind. You've just been grading yourself against people's
  highlight reels.
description:
  short_blurb: Everyone in the group chat seems to be aging their parents gracefully,
    raising unbroken kids, and still getting promoted — and you're the only one barely
    holding the line. This is a steady, unhurried book for the Gen X adult whose self-worth
    keeps leaking out through the comparison, measured against curated lives that
    don't exist. It won't help you win the comparison. It will help you put the measuring
    stick down for good.
  long_description: 'You open the phone for one quiet minute and there it is again
    — someone''s parent thriving, someone''s kid at the good school, someone your
    age who looks ten years lighter and just got the title you wanted. And the math
    runs itself before you can stop it: they have it handled, and you, somehow, don''t.


    You know better. You know the post is a highlight reel, that no one photographs
    the 2am worry or the medication schedule or the argument in the driveway. You
    know it, and the comparison still runs, because it''s been running your whole
    life. You''ve always measured your worth against the room — who''s further ahead,
    who''s more composed, who makes it look effortless — and you have spent decades
    coming up just short of a standard that keeps moving.


    This book is for you: the one in the squeezed middle of life, holding parents
    and children at once, watching everyone else seem to carry the same weight with
    a grace you can''t find in yourself. It''s for the person who can be genuinely
    happy for a friend and still feel, an hour later, quietly diminished.


    We''ll go slowly into how comparison actually works — how it takes the most capable
    instrument you own, your own attention, and points it at the wrong target: yourself,
    ranked against an imaginary scoreboard. You''ll come to recognize the people you
    measure against as composites of edited moments, not lives. You''ll see what the
    constant ranking has cost you across the years it has quietly run. And you''ll
    find that the worth you keep trying to win was never something other people could
    grant or withhold. There is a different view available from later in the climb
    — one where the question is no longer who is ahead of you on the path, but what
    you are quietly building with the one life that was only ever yours to live.


    This is not a book that will help you finally get ahead. It won''t teach you to
    optimize your life until it photographs better, and it makes no promise that you''ll
    one day measure up — because the measuring itself is the wound, not the gap. There''s
    no comparison to win here. That''s the point.


    You''ve spent a lifetime checking the scoreboard to find out if you''re okay.
    You''re allowed to stop. Everyone else only seems to have it handled — and your
    one life was never theirs to grade.


    Book 2 of the Second Mountain Press self worth series.'
