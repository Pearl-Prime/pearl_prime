title: The Tide Came In Faster Than You Could Bail
subtitle: For the manager carrying everyone's load at once — when too much arrives
  too fast and there's no room left to think
cover_tagline: You're not drowning because you're weak. You're drowning because no
  one ever told you to stop bailing.
description:
  short_blurb: Every request, every escalation, every name on your team arrives at
    the same moment, and the water keeps rising faster than you can move it. This
    is a steadying book for the manager whose capacity has been exceeded for so long
    they've forgotten there was ever a shoreline. It will not hand you a faster bucket
    — it will show you how to let the swell pass without going under.
  long_description: 'It starts before you''re even awake. The first message lands
    at 6:50am and by the time your feet hit the floor there are nine more, and a meeting
    that moved, and a name you have to follow up with, and the quiet dread of a calendar
    with no white space in it anywhere. You have built a life where everything arrives
    at once and all of it routes through you. You are the one who holds the line.
    And lately, the line is holding you up by the wrists.


    This book is for the manager whose capacity was exceeded a long time ago and who
    kept going anyway — because that''s what you do. You are not disorganized. You
    are not behind because you''re failing. You are bailing a boat in an open-sea
    swell with a coffee cup, and somewhere along the way you decided the rising water
    was a personal flaw instead of a flood.


    Here, we start where the overwhelm actually lives: in the felt moment when too
    much lands at once and the thinking part of you simply goes quiet under the weight
    of it. You''ll come to recognize how the flood took hold — the way one yes became
    a hundred, the way being capable became being the only one, the way you mistook
    a structural problem for a character defect. You''ll see the cost you''ve been
    paying in a currency you didn''t know you''d agreed to spend. And slowly, inside
    the breakwater, you''ll feel what it''s like when the boat stops pitching — not
    because the sea went flat, but because you finally found a way to stop taking
    every wave broadside.


    This is not a productivity book. It will not give you a better system, a faster
    inbox, or a method for doing more in less time. There is no optimization here
    and no white-knuckle plan to grind through one more quarter. Nothing in these
    pages will help you carry more. That is the entire point. The work is not to bail
    faster. The work is to stop believing the flood is yours to hold back alone.


    You are allowed to set the bucket down. You are allowed to let the water find
    its own level for one breath. The harbor was always there, just past the noise
    — and you were always allowed to steer for it.


    Book 1 of the Harbor Line Books burnout series.'
