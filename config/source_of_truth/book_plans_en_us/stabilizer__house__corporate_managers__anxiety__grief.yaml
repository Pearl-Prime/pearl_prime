title: What the Job Already Took
subtitle: For the manager grieving the version of themselves the work cost them —
  and learning what to finally set down
cover_tagline: Some things the tide takes. The harbor is where you stop chasing them.
description:
  short_blurb: 'Somewhere in the climb you lost something — a lighter self, a relationship,
    a version of your life you assumed you''d get back to. This is the book for the
    leader whose anxiety is grief in disguise: a refusal to let go of what''s already
    gone. It won''t tell you to bounce back. It will help you set it down.'
  long_description: 'It catches you at odd moments. An old photo, a song, a friend
    you haven''t called in two years — and something in your chest goes tight with
    a feeling that isn''t quite anxiety, though it wears the same coat. Somewhere
    back there you lost something. The version of you that slept. The relationship
    that quietly ended while you were making quarter. The life you told yourself you''d
    get back to once things calmed down, except things never calmed down, and you''re
    starting to understand they''re not going to. The job took something, and you''ve
    been holding the anxiety so you wouldn''t have to feel the loss.


    This book is for the manager whose anxiety is, underneath, a grief that hasn''t
    been allowed to land. You''re so used to bracing forward that you''ve never turned
    around to count what the climb cost you — the time, the people, the self you used
    to be before you became the one who holds everyone else. And because grief that
    isn''t felt doesn''t disappear, it sits in your body as a low alarm, a tightness,
    a refusal to let the boat come to rest, because resting would mean feeling what''s
    gone.


    Here you''ll come to recognize the grief underneath the worry — how anxiety can
    be the white-knuckled grip on something the tide already took, and how the body
    manufactures dread to avoid the quieter, heavier work of mourning. You''ll see
    why ''bouncing back'' was always the wrong instruction, why some losses aren''t
    problems to solve but weights to set down, and what it feels like when you finally
    stop sailing back toward a shore that isn''t there anymore. You''ll learn the
    difference between releasing what''s gone and abandoning it — and that letting
    go is not forgetting. It''s stopping the chase so the boat can finally rest in
    still water.


    This is not a book about resilience. It will not teach you to reframe the loss
    into a growth opportunity, to power through the mourning on a timeline, or to
    optimize your way back to who you were before — because grief doesn''t bounce,
    and a book that told you to would be asking you to brace against the one thing
    you most need to feel. There''s no five-step recovery here, no morning practice
    that returns what''s gone. What there is, instead, is permission to grieve, and
    a harbor still enough to do it in.


    You are allowed to mourn what the work cost you, even the parts you chose. You
    don''t have to keep the anxiety running to avoid the sorrow underneath it. You
    only have to let the tide be the tide — to set down what it took, and let the
    harbor hold you while you do.


    Book 5 of the Harbor Line Books anxiety series.'
