title: 'Grief: Stepping Back from the Storm'
subtitle: A Field Guide for Professional Women Navigating Grief
cover_tagline: You're not numb. You're standing guard over the grief, so it can't
  take you down mid-meeting.
description:
  short_blurb: When loss hits, your mind goes on high alert instead of breaking down.
    This is a field guide for the professional woman who manages her grief like a
    project so it can't ambush her at work. It won't tell you to let go. It'll show
    you the cost of standing guard, and how to set the watch down.
  long_description: 'Something is gone, and instead of falling apart, you got organized.
    You handled the arrangements. You answered every condolence with composure. You
    built a careful perimeter around the loss so it couldn''t catch you off guard
    in the wrong room, and you''ve been patrolling that perimeter ever since, scanning
    every conversation, every quiet moment, for the trapdoor that drops you into it.
    People think you''re coping beautifully. What you''re actually doing is standing
    guard.


    This book is for the professional woman who meets grief with vigilance instead
    of collapse. The one whose mind, when loss hit, didn''t shut down but spun up,
    tracking the threat of feeling it at the wrong time, in front of the wrong people,
    before the right deadline. You don''t let yourself cry in the car if you have
    a call after. You''ve learned exactly which songs, which photos, which times of
    day to route around. You call it being strong. You call it functioning. Underneath
    is a watcher working overtime to keep the grief boxed so it can''t take you down.


    Grace Adeyemi understands why you went on alert, and she doesn''t ask you to drop
    your guard before you''re ready. First, recognition: this hypervigilance around
    your own loss is not coldness and it''s not avoidance-as-failure, it''s a part
    of you trying to keep you upright in a world that gave you no safe place to break.
    Then descent. Instead of forcing you to surrender to the grief, this book turns
    toward the watcher first, helps you feel how tiring it is to guard a wound around
    the clock and ask what it''s afraid will happen if you stop. Then integration:
    not a defense torn down, but a watcher that can ease off the wall, that can let
    the grief come in its own time because some part of you finally believes you''ll
    survive feeling it.


    This is not a let-it-all-out plan and it is not a recovery timeline. There''s
    no exercise that disarms the vigilance on command, no permission slip that makes
    it safe to fall apart at 2pm on a Tuesday between calls. It will not promise catharsis
    or closure or a self that grieves freely from now on. The guarding came from a
    real lack of safety, and this book respects that. What it gives you instead is
    a way to recognize the sentry in yourself, the one posted over your own grief,
    and to relieve it for a few minutes at a time, the next time you notice you''re
    patrolling the loss instead of feeling it.


    If you''ve been praised for how composed you are while privately exhausted from
    holding the line, this book sees both. You don''t have to stand this post forever.
    The watch can come down, a little at a time. This book shows you how to take the
    first shift off.'
