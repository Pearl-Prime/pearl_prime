title: Your Phone Lit Up and So Did You
subtitle: 'For the always-reachable: learning to tell a real emergency from a screen
  doing its job, before your body answers for you'
cover_tagline: It was a Slack ping. Your whole body thought it was a fire.
description:
  short_blurb: The phone buzzes, and before you have even read it, your chest is tight
    and your thumb is already typing yes. This is for the part of you that treats
    every 'quick question' like a five-alarm fire. You are not high-strung. Your alarm
    just never learned the difference between danger and a notification.
  long_description: 'The phone buzzes on the table and something in you goes off before
    your eyes even reach the screen. Shoulders up. Stomach drop. A yes already forming
    in your mouth. By the time you actually read it -- ''hey, when you get a chance''
    -- the fire alarm in your body has been blaring for ten full seconds over a message
    that could have waited until tomorrow.


    This book is for you: the one who is always reachable, always braced, always one
    buzz away from a flood of cortisol over a yellow dot. You answer DMs at dinner.
    You feel the weekend message before you see it. You have learned to live with
    your nervous system permanently leaning toward the door, certain that if you do
    not respond right now, something will break -- a relationship, a reputation, the
    whole fragile sense that you are good at this.


    Here is what you will come to recognize. The alarm is real, but the danger almost
    never is. Your body cannot tell the difference between a manager who genuinely
    needs you and a notification doing exactly what it was designed to do, which is
    to grab you by the chest. You will learn what that false alarm actually feels
    like from the inside -- the catch in your breath, the way your hand reaches before
    your mind agrees -- and you will learn that the gap between the buzz and the answer
    is yours. It belongs to you. No one can take it without your hand reaching first.


    This will not teach you to silence everyone or ''just turn off notifications,''
    as if the problem were a setting and not a body that has been on call for years.
    It will not optimize your response time or turn your limits into a productivity
    hack. There is no script here for sounding firm, no five-step framework for becoming
    someone who does not feel it.


    What it offers instead is smaller and harder: the moment between the alarm and
    the reaction, and the chance to stand inside it long enough to ask whether anything
    is actually on fire. Most of the time, you already know.


    You are allowed to let it buzz. You are allowed to find out it can wait.


    Book 1 of the Present Tense Books boundaries series.'
