title: Everyone on the Unit Seems Fine
subtitle: For the nurse who thinks she's the only one barely holding on — easing the
  ache of measuring your anxious insides against everyone who looks calm
cover_tagline: They all look like they've got it. You feel like the only one coming
  undone.
description:
  short_blurb: You look around the unit and everyone else seems steady, unbothered,
    fine — and you feel like the only one quietly coming apart. This is a body-based
    companion for the nurse who measures her anxious insides against everyone else's
    calm outsides and always comes up short. It won't help you win the comparison.
    That's the point.
  long_description: 'You scan the station and they all look fine. The charge nurse
    is unflappable. The one who started the same year you did seems to have it handled.
    Everyone moves like the work isn''t quietly taking pieces of them, and you stand
    there with your heart going and your stomach in a knot, certain that you are the
    only one who isn''t built for this — that everyone else got some steadiness you
    missed, and that if they could see inside you, they''d know.


    This book is for the nurse who measures her insides against everyone else''s outsides.
    The one who compares her anxiety, which she feels in full, to their composure,
    which is all she can see — and always loses. You are not weaker than the people
    around you. You''re just doing the one thing that guarantees you''ll come up short:
    holding your own raw, unedited interior up against the calm, curated surface everyone
    else is showing, including you. They can''t see your bracing. You can''t see theirs.
    And so each of you walks the unit privately convinced you''re the only one barely
    holding on.


    Here you''ll come to recognize comparison as a body state, not a fact — the sink
    in the chest when someone else looks fine, the heat of not-enough, the way your
    nervous system reads their calm as evidence against you. You''ll learn that you
    have been pointing a precise, high-stakes attention — the same care that makes
    you a good nurse — at exactly the wrong target: yourself, measured against a standard
    nobody actually meets. And gently, you''ll practice coming back into your own
    body, your own ground, where the only nervous system you can actually tend is
    the one that''s yours.


    This will not help you win. There''s no protocol here to finally come out ahead
    of the people around you, because that race was never real and never had a finish
    line. It asks the opposite: that you set the measuring down, just for a breath,
    and let yourself be exactly as okay or not-okay as you are — without grading it
    against a room full of people doing the same hiding you are.


    Nothing here will help you measure up. That''s the whole point. What you''ve never
    been given is permission to stop measuring at all. That is what this book is for.


    You are allowed to be the most anxious one in the room and still belong in it.
    You always did.


    Book 6 of the Felt Sense Publishing anxiety series.'
