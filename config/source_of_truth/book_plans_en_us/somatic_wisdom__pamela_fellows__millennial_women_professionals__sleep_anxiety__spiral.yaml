title: One Thought, Then a Thousand, in the Dark
subtitle: For the bright, busy mind that turns a single 2am worry into a sleepless
  interrogation — and a gentler way down from the spiral
cover_tagline: It started with one small thought. By 3am it had become a case against
  your whole life.
description:
  short_blurb: One small worry at lights-out becomes a thousand by 3am, each thought
    pulling you further down. This is for the woman whose sharp mind turns on her
    the moment she lies down, and it offers a body-first way to stop feeding the spiral
    and find the ground beneath the noise.
  long_description: 'It always starts so small. One thought as you settle into the
    dark — a half-finished task, an offhand comment, a worry the size of a pebble.
    And then your mind, the same quick mind that serves you all day, takes that single
    thought and multiplies it. One becomes ten. Ten becomes a hundred. By 3am you
    are no longer worrying about one thing; you are running an interrogation, building
    a case against your decisions, your relationships, your entire life, each thought
    feeding the next in a downward pull you cannot find the bottom of. You are exhausted
    and wired, certain that if you could just think it all the way through, you could
    finally rest.


    This book is for the woman whose greatest strength becomes her nightly undoing.
    The analytical, capable mind that solves problems all day and then, in the dark,
    turns that same sharpness on itself with nothing left to solve. You don''t have
    a thinking problem. You have a nervous system in spin, using thought the way a
    body in danger uses adrenaline — to stay ready, to stay ahead, to never be caught
    off guard. The spiral isn''t keeping you safe. It only feels like it is.


    Working from the body, gently and without force, you will come to recognize the
    spiral for what it is: not a search for answers but a loop your mind runs when
    your body doesn''t feel safe enough to stop. You''ll learn why 3am thinking always
    pulls downward, and why the answer was never to think your way out. You''ll find
    the ground beneath the noise — the breath, the weight of your body on the bed,
    the felt sense of here-and-now that the spiral spins you away from. You''ll learn
    to feel the moment the loop begins to grip, and to come back down into your body
    before it carries you off, not by silencing your mind but by giving it somewhere
    solid to land.


    This is not a thought-stopping technique or a mental-discipline program. There
    is no method here for arguing with your thoughts, no checklist, no optimization.
    This book will not ask you to control your mind or win the argument it''s having
    at 3am. The fight is the fuel — the harder you wrestle the spiral, the faster
    it spins.


    What it offers instead is a way out that goes through the body, not the mind.
    You do not have to think your way to peace tonight. You only have to come back
    to the ground. It has been beneath you the whole time.


    Book 3 of the Felt Sense Publishing sleep anxiety series.'
