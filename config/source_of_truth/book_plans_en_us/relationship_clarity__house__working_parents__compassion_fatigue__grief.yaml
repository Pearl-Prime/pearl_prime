title: The Patient Parent the Exhaustion Took
subtitle: For the depleted parent grieving the warm, present self that compassion
  fatigue quietly wore away
cover_tagline: You didn't lose your love. You lost the room you used to feel it in.
description:
  short_blurb: There's a version of you that you miss — the patient one, the one who
    had warmth to spare. This is a book for the working parent grieving who they were
    before the well ran dry, and aching for the family they meant to be more present
    for. It won't tell you to get that person back. It sits with you in the loss and
    helps you let it be real.
  long_description: 'No one warned you that you could grieve someone who is still
    alive — yourself. The parent you meant to be is still in there somewhere: patient
    at bedtime, unhurried at the table, with a soft kind of attention you used to
    give freely. Lately you catch only glimpses, and the gap between who you wanted
    to be for them and who you have the capacity to be lands like a small, daily loss.


    This book is for the working parent carrying that quiet grief. The one who loves
    their kids and their partner no less than before, but who has watched compassion
    fatigue slowly hollow out the warmth, until the affection is still true but the
    feeling of it has gone faint. If you have looked at your child across the room
    and missed them while they were right there, you already understand. This was
    written for you.


    You''ll come to recognize what you''ve actually been mourning. Not your love —
    that never left — but the surplus you used to have, the easy patience, the version
    of family life you pictured before the years of pouring out. You''ll see how grief
    and compassion fatigue braid together: how giving care without end is its own
    slow loss, and how pretending you haven''t lost anything keeps the ache from ever
    softening. You''ll learn the difference between letting go of who you were and
    abandoning who you are.


    This book will not promise to give you that person back, or optimize you into
    a more present parent by Tuesday. It hands you no system, no five-step reset,
    no script to perform across the table. It will never suggest that you failed,
    or that your family is a problem to be fixed. There is no recovery plan here,
    because grief is not a malfunction. It''s love with nowhere to put itself.


    What there is, instead, is a chair pulled close, and someone willing to say the
    true and tender thing out loud: that it is okay to miss who you were. That mourning
    the parent you thought you''d be does not make you ungrateful for the one you
    are. That you can set down the impossible version and still love the real, tired,
    deeply human one — the one your kids actually have, who is still showing up.


    You are allowed to grieve. And you are allowed to still be here, loving them anyway.


    Book 2 of the Two Chairs Press compassion fatigue series.'
