title: Nothing Is Wrong But Your Whole Body Disagrees
subtitle: For the student whose alarm goes off before the exam, before the email,
  before anything has actually happened — and won't believe there's no fire
cover_tagline: The test is Thursday. Your body thinks it's now.
description:
  short_blurb: You're sitting at your desk and there is no real danger, but your heart
    is sprinting and your stomach has dropped like the floor gave out. This is a book
    about the alarm that fires when nothing is actually wrong — and about learning
    to recognize a false alarm for what it is, instead of believing it every single
    time.
  long_description: 'You open the laptop to start the reading and your body braces
    like something is about to hit. Heart going. Hands cold. That low hum under your
    ribs that says get ready, get ready — for what, you couldn''t say. The exam isn''t
    until Thursday. The email hasn''t even been sent. Nothing is wrong. But your whole
    body disagrees, and it''s very, very loud.


    This book is for you — the college student whose alarm goes off before there''s
    any fire. The one who walks into a normal Tuesday already flinching. You''re not
    dramatic and you''re not broken. You''re carrying a brilliant, ancient threat-detector
    that was built for lions and has decided that a syllabus, a group project, and
    an unread text all qualify.


    You''ll come to recognize the false alarm in all the places it hides. The 2am
    jolt awake when there''s nothing to do but lie there. The dread that arrives before
    you''ve even checked the grade. The way your body insists the danger is right
    now when the deadline is still days out. You''ll feel it most in the exam hall
    itself — the held breath before the first question, the heart going while you
    stare at the blue book and the clock on the wall. None of it means you''re in
    danger. It means the alarm is sensitive — and once you can see it firing, you
    stop having to believe it every single time.


    This book will not teach you to silence the alarm forever. It won''t optimize
    you, hand you a morning routine that finally fixes everything, or talk you out
    of having a body. There is no fixing here, because you were never broken. What''s
    here is recognition: the slow, steadying relief of naming the thing while it''s
    happening, of sitting at the desk and saying — out loud if you need to — this
    is a false alarm, and I am not actually in danger.


    You are allowed to feel the surge and not obey it. You are allowed to let your
    body be wrong about the lion. You can take one deep breath at the desk, and then
    the next one, and let the alarm ring itself out while you stay exactly where you
    are.


    Book 1 of the Blue Exam Press anxiety series.'
