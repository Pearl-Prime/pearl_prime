title: It's 2 A.M. and I'm Doing the Math Again
subtitle: For the sandwich-generation mind that turns one money worry into a thousand
  — running every worst case while the people you love sleep down the hall
cover_tagline: One number. Then a thousand. Then the sun comes up.
description:
  short_blurb: It starts with a single bill and ends with you bankrupt, your parents
    in crisis, and your kids' futures gone — all before sunrise, all in your head.
    This book is for the 2 a.m. mind that runs every worst case on a loop. It won't
    stop the thoughts. It will help you stop feeding them.
  long_description: 'It always starts small. One number. The credit card balance,
    the gap in the retirement account, the cost of the thing the dentist said your
    kid needs. And then it goes. Within a minute you''re not thinking about one bill
    anymore — you''re watching the whole house of cards come down. Your parents need
    more care than you can afford. Your kids graduate into nothing. You work until
    you die and it still isn''t enough. It''s 2 a.m., everyone you love is asleep
    down the hall, and your mind is running the math again — not to solve anything,
    but because it can''t find the brake.


    This book is for you — the Gen X parent whose worry doesn''t stay still. You''re
    the one in the middle, holding a generation on each side, and when you lie down
    the holding doesn''t stop. It just goes quiet and fast and catastrophic. You are
    not irrational. The pressures are real. But the spiral takes a real worry and
    multiplies it into a thousand imagined ones, and somewhere in that multiplication
    you lost the night.


    You''ll come to recognize the spiral as its own thing — separate from the money,
    separate from the truth. The way one thought hands you the next, each a little
    worse. The way the mind mistakes rehearsing the catastrophe for preventing it.
    The way 2 a.m. lies, presenting every worst case as the only case, with a certainty
    it will never have in daylight. You''ll learn what the spiral is actually feeding
    on, and what it means to stop being its fuel without pretending the underlying
    fears away.


    This book will not give you a calming technique that makes the thoughts vanish.
    It will not promise that the right plan, the right amount of saving, the right
    mindset will finally let you sleep. The worries that wake you are pointing at
    things that genuinely matter. What this offers is a way to stop following the
    worry down — to recognize the pull for what it is and step off the path before
    it takes the whole night, so the real concerns can wait for the daylight where
    you can actually do something about them.


    You don''t have to solve your entire financial future at 2 a.m. You never could.
    The next chapter isn''t written in the dark, in the loop, in the worst case. It''s
    written in the morning, one real step at a time, by a person who finally got some
    sleep.


    Book 2 of the Next Chapter Publishing financial anxiety series.'
