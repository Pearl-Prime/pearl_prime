title: 'What the Body Remembers: When Everything Is Too Much'
subtitle: A Real Talk Guide to Somatic Healing for the Sandwich Generation
cover_tagline: Your body kept the score while you kept everyone else alive.
description:
  short_blurb: The clenched jaw, the tight chest, the exhaustion that sleep won't
    fix — your body has been absorbing the overwhelm you never had time to feel. This
    is a real-talk somatic guide for the Sandwich Generation. It won't optimize your
    body; it'll help you finally listen to what it's been holding.
  long_description: 'Notice your shoulders right now. They''re probably up around
    your ears. Your jaw is tight. There''s a band across your chest you stopped feeling
    years ago because it never lets up long enough for you to notice it''s there.
    While you''ve been managing your mother''s appointments and your kid''s meltdowns
    and your own overflowing inbox, your body has been quietly holding all of it —
    every too-much moment you powered through without stopping to feel. The overwhelm
    didn''t disappear when the day ended. It moved into your muscles and set up house.


    This is for the Sandwich Generation, where there''s never a free minute to feel
    anything, so the feeling goes into the body instead — the gut that''s always braced,
    the breath that never reaches the bottom of your lungs, the bone-tiredness that
    sleep doesn''t touch no matter how early you go down.


    First you''ll recognize that these aren''t random aches or just getting older
    — they''re the physical residue of carrying too much for too long, the body keeping
    the record your schedule never had room for. Then you go down into it instead
    of pushing through: you learn to feel what''s actually held in the chest, the
    jaw, the gut, naming the overwhelm where it actually lives instead of overriding
    it one more time. Then you come back changed — not fixed or cured, but in honest
    contact with a body you''d gone numb to.


    This is secular somatic real talk — about the nervous system, not chakras or energy.
    No worksheets. No morning stretch routine to perfect and feel guilty about skipping.
    No telling you to love your body while it''s screaming at you. Sam Meridian writes
    plainly and without woo, the way you''d want to be spoken to when you''re this
    depleted.


    What this book will not do: it will not optimize, biohack, or fix your body, because
    it was never broken — it''s been doing exactly what overwhelmed bodies do to survive.
    It won''t add a wellness regimen to your impossible list. What it will do is name
    what your shoulders and chest and gut have been holding all these years, so the
    next time you catch your jaw clenched at the sink or your breath gone shallow
    on the stairs, you can meet it instead of ignoring it for one more day.


    Your body has been keeping you upright through all of it. You''re allowed to stop
    and feel what it''s carrying. Start here.'
