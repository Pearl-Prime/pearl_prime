title: A Calm House and a Mind on Guard
subtitle: For the working parent whose mind won't stand down even when the house is
  quiet — reading every face, inbox, and small mood for a threat that never comes
cover_tagline: Everyone else gets to put it down at night. You're still watching.
description:
  short_blurb: Even when the house is calm, some part of you is still watching — reading
    your child's face for a flicker of trouble, checking the inbox, scanning the room
    for a threat that never arrives. You don't remember the last time your mind let
    itself rest. This is a quiet invitation to let the watch be held, for a little
    while, by someone beside you.
  long_description: 'Everyone else seems able to put it down. They close the laptop,
    sit on the floor with the kids, let the evening just be an evening. You''re there
    too — but some part of you is still scanning. Reading your child''s face for the
    smallest flicker of something wrong. Half-listening for the cough that means a
    sick day. Glancing at your phone for the email that could detonate tomorrow. The
    house is calm and you are still watching, holding a horizon for a threat that,
    night after night, never actually comes.


    You don''t remember the last time your mind let itself rest. You''re not even
    sure you''d know how to let it.


    This book is for the working parent whose mind never stops watching — the ever-scanning
    attention that treats rest as a risk it cannot afford. You are not paranoid, and
    you are not controlling. You are keeping a watch you were never meant to keep
    alone, convinced that if you look away, even for a moment, the thing you''ve been
    guarding against will slip through. So you keep reading the faces and the inboxes
    and the quiet, certain that your attention is the only thing holding the danger
    back.


    Here, in a voice meant to be read close and slow, you''ll come to recognize the
    watchfulness in you for what it is — not vigilance you must keep up, but a frightened,
    loyal part of you that has forgotten it''s allowed to rest. You''ll learn that
    your children are not held safe by the tension in your shoulders or the never-ending
    scan. You''ll feel what it is to lower your eyes from the horizon for a few honest
    minutes, to let the watching be held by something larger than your own exhausted
    attention — to lay a hand on your own chest and say, gently, you can rest now;
    nothing is coming that you must catch. And slowly you''ll feel the difference
    between loving them and never once letting your eyes close.


    This is not a cure. It will not switch off your watchfulness by Friday, and it
    will not turn your own attention into one more thing to manage and optimize. There
    is nothing to win here, no perfect calm to reach before you''re allowed to close
    your eyes. The watching may begin again tomorrow. That''s allowed. Nothing here
    asks you to be finished.


    What you''ll have instead is a way of meeting it — the warmth of being understood
    by someone who has kept the same long vigil through the same dark nights — and
    a few honest minutes where you can set the scanning down and let your open hands
    simply rest in your lap.


    You were never failing to relax. You''ve just been keeping watch so long you forgot
    that someone could keep watch beside you.


    Let the watching soften. Then, breath by breath, let yourself be held too.


    Book 3 of the Heart Transmission Press overthinking series.'
