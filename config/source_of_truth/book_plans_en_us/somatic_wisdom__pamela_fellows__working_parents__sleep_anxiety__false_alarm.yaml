title: The House Is Quiet and Your Body Won't Believe It
subtitle: For the wrung-out parent whose nervous system stays on watch long after
  the kids are asleep — bracing in the dark for an emergency that never comes
cover_tagline: No one is crying. So why is your whole body still listening?
description:
  short_blurb: The kids are finally down, the house has gone still, and your body
    refuses to stand down. This is a somatic, trauma-informed companion for the parent
    whose alarm keeps firing in a room where nothing is actually wrong — and a slow,
    kind way to let safety reach your nervous system again.
  long_description: 'It''s late, and the house has finally gone quiet. The kids are
    asleep. Nothing is on fire. And still your chest is tight, your jaw is set, and
    some part of you is lying there in the dark, listening — braced for a cry, a thud,
    a need that hasn''t come and may not come at all.


    This book is for the parent whose body never quite got the message that the emergency
    is over. You spend your days on call, tuned to every sound, ready to move before
    you''ve even thought. So when the night finally clears and there is nothing left
    to manage, your nervous system doesn''t soften — it keeps scanning. The alarm
    goes off, loud and certain, in a room where there is no danger at all. You lie
    still and wait for it to pass, and instead it deepens, until being tired and being
    awake feel like the same unbearable thing.


    You''ll come to recognize that wakefulness for what it is: not a flaw, not a failure
    of willpower, but a false alarm. A protective system that learned to stay on watch
    and forgot how to step down. You''ll feel where you hold it — the braced shoulders,
    the breath that won''t drop past the top of your chest, the readiness that lives
    in your belly like a held breath of its own. And gently, without forcing anything,
    you''ll begin to show that vigilant part of you that the threshold has been crossed:
    the doors are locked, the small ones are breathing, the house is held, and it
    is allowed to set the watch down.


    This is not a sleep program. There is no tracker here, no protocol to optimize,
    no number to hit, no perfect routine you are failing to keep. Nothing in these
    pages will ask you to push through your tiredness or out-think your own body.
    We won''t try to win against the alarm or argue it into silence — we''ll turn
    toward it, the way you''d turn toward a frightened child in the next room, and
    stay close while it learns, breath by breath, that it is finally safe to rest.


    You are not broken, and you are not failing at sleep. Your body has simply been
    standing guard for a long time, for people it loves, and no one ever told it the
    night was over. Let this be where it begins to believe you — where the bracing
    softens, the breath drops, and a little warmth returns to a place that has been
    held tight for far too long.


    Book 1 of the Felt Sense Publishing Sleep Anxiety series.'
