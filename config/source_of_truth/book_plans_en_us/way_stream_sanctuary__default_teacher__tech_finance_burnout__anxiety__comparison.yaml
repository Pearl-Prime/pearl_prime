title: 'Anxiety Relief: Measuring Yourself Against Everyone (3)'
subtitle: A Real Talk Guide to Anxiety for Tech Finance Burnout
cover_tagline: Their promotion is not your verdict. Read this before you refresh LinkedIn
  again.
description:
  short_blurb: You watched someone two years younger close the round, take the title,
    hit the number you've been grinding toward — and something in your chest dropped.
    This is a book about the specific anxiety of measuring your life against everyone
    else's highlight reel, and what happens when you stop. It will not make you stop
    wanting things. It will stop the wanting from eating you alive.
  long_description: 'It''s the LinkedIn post. The all-hands where they named someone
    else. The college classmate''s exit, the analyst who made VP a cycle early, the
    Slack channel where everyone''s comp suddenly feels public. You read it and your
    stomach goes cold, and a voice that sounds exactly like your own says: you''re
    behind, you missed it, everyone is moving and you are not.


    This book is for the engineer, the trader, the founder, the analyst who has built
    a real career and still feels like they''re losing a race no one agreed to run.
    You are good at your job. You are also exhausted by the scoreboard you can''t
    stop checking — the one that updates every time someone else wins.


    Waystream books don''t talk you out of it. First you name what''s actually happening:
    this isn''t ambition, it''s an alarm, and the alarm has confused ''someone else
    got the title'' with ''you are in danger.'' Then you go down into it instead of
    around it. You look at the comparison clearly — whose life you''re measuring against
    (a stranger''s press release), what number you''ve decided means you''re safe,
    why hitting the last one didn''t quiet anything. That''s the descent, and it''s
    not comfortable, and it''s the only part that works. What comes back up is not
    a person who stopped caring about their work. It''s a person who can read the
    LinkedIn post and keep eating their lunch.


    This is not a book about gratitude lists or ''staying in your lane.'' It will
    not tell you to be happy for them, or to want less, or to find a morning routine
    that makes the feeling go away. The feeling is not a bug in your character. It''s
    the predictable result of a high-comparison field meeting a nervous system that
    treats every peer''s success as a threat assessment.


    No positivity. No hustle reframe. No pretending the money and the titles don''t
    matter — they do, and you''re allowed to want them. What you''ll get instead is
    plain language for the exact moment it hits, so the next time the post lands in
    your feed, you have something to do besides spiral into someone else''s life.


    You are allowed to want what you want without it costing you every quiet moment
    you have left. You can stop running a race that has no finish line and was never
    going to declare you the winner. Their success is information about them. It was
    never a verdict on you.'
