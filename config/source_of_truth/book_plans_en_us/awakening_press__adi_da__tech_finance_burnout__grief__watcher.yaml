title: Still Standing Guard Over an Old Loss
subtitle: For the high performer whose body keeps watch over a grief it never set
  down
cover_tagline: You think if you stop watching the loss, it will get worse. It won't.
  It will get quiet.
description:
  short_blurb: Some part of you is still wide awake. It circles the loss the way it
    once tracked every number, certain that easing its attention for even a moment
    would let something terrible through. This is a book about the grief you have
    been guarding instead of grieving, and the rest waiting on the other side of all
    that watching.
  long_description: 'After the loss, something in you came awake and would not lie
    back down. You may not have noticed the moment it happened. You only know that
    the mind has not rested since — that some part of you now circles the absence
    the same way it once tracked every risk and number, alert for the next thing that
    could go wrong. As if attention could keep anything else from being taken. As
    if staying braced were the same as staying safe.


    This book is for that wakeful, weary part of you, and for the person it has been
    trying to protect. For the one whose grief did not soften into sorrow but tightened
    into watching — replaying the last conversation, scanning for what you missed,
    certain that to ease your attention for even a moment would be to betray what
    you lost, or to let the ground give way again.


    Here you will come to recognize the watching for what it is: not a flaw, not weakness,
    but love that lost its object and turned into vigilance, pointed now at something
    it can neither prevent nor undo. You''ll see how the monitoring keeps the loss
    raw, how staying alert impersonates devotion, and how the refusal to let grief
    settle is its own quiet exhaustion. You''ll feel the difference between bracing
    against a loss and tending it. And you''ll begin to sense that the awareness doing
    all this watching is not itself anxious — that there is an openness in you, like
    the sky behind passing weather, that has not had to work this whole time.


    This book will not teach you to control your grief, manage your reactions, or
    force the watching to stop. There is no protocol here, no discipline to master,
    nothing to optimize. Force was never going to reach the place in you that is tired.


    What it offers is permission to let your attention come to rest. To discover that
    the loss does not require a guardian, and that the ground you were so certain
    would give way has been holding you the entire time. The weather of grief will
    still move through. You are simply invited to notice the sky it moves across —
    the part of you that was never in danger, that has been here, open and unhurried,
    all along.


    You are allowed to stop scanning. Nothing more is coming that your watching could
    have prevented. You can let your eyes close, and stay.


    Book 2 of the Awakening Press grief series.'
