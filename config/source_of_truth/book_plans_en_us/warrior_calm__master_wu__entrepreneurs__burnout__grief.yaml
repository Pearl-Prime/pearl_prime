title: What It Cost to Build This
subtitle: For the founder grieving the person they were before the company — the friendships,
  the body, the quiet years it took, and the version of the dream that isn't coming
  back
cover_tagline: You got what you wanted. You're allowed to miss what it took.
description:
  short_blurb: No one warns you that building something can be a kind of loss. The
    hours you'll never get back, the people who drifted, the self you mortgaged to
    make it real. This is a book for the founder who is not failing — but is quietly
    grieving, and doesn't have language for it yet.
  long_description: 'It catches you off guard. A photo from six years ago, before
    any of this. A friend''s name you haven''t called in two years. A version of the
    dream you no longer believe in, and the strange ache of admitting it. You built
    the thing. By every measure that''s supposed to matter, you won. So why does it
    feel like standing at the edge of something you''ve lost?


    This is a book for the entrepreneur carrying a grief no one names. Not the grief
    of failure — the grief of the price. The body you ran down. The relationships
    that thinned while you weren''t looking. The lighter, freer person you used to
    be, who you sometimes can''t find anymore under the weight of what you carry.
    And the quieter loss underneath it all: the company you thought you were building,
    the one that was supposed to feel different than this.


    You''ll come to recognize that what you''re feeling is not weakness or ingratitude.
    It is grief, and grief is what the strong feel when they finally stop bracing
    long enough to notice what''s gone. You''ll see the ways you''ve outrun it — staying
    busy so the loss can''t catch you, calling it stress when it''s really sorrow.
    You''ll learn the difference between what was taken from you and what you must
    now, with open hands, choose to release. And you''ll find that letting go of who
    you were is not a betrayal of what you built. It is how you keep building without
    being haunted.


    You will sit with the things you do not say out loud. That you sometimes resent
    the very thing you sacrificed for. That you would not undo it, and still you mourn
    it. That gratitude and grief can occupy the same chest at the same hour, and neither
    one cancels the other. None of this makes you ungrateful. It makes you honest.
    And honesty is the only ground solid enough to stand on once the numbness wears
    off and the ache asks to be felt instead of managed.


    This book will not give the years back. It will not optimize your grief into a
    tidy lesson or promise that the ache resolves by the final chapter. Some things
    are simply mourned. That is not a problem to be fixed; it is a passage to be walked.


    Written in the steady, unflinching voice of the warrior who has stood at his own
    losses and not looked away, this is permission to grieve what your dream cost
    you — and to keep going anyway, lighter for having finally set it down.


    What you''ve lost is real. So is the ground still under your feet.


    Book 2 of the Iron Gate Press burnout series.'
