title: The Calls Stack Faster Than You Clear Them
subtitle: For the first responder buried under emergencies with no space between
cover_tagline: You can carry impossible things. You were never meant to carry all
  of them at once.
description:
  short_blurb: The job taught you to handle anything. It never taught you what to
    do when everything lands on you at the same time. This is a steady place to set
    the flood down — not by doing more, but by making room to stand.
  long_description: 'The tones drop and you move. Another call stacks on the last
    one before you''ve cleared the first. The reports, the overtime, the kids'' schedules,
    the partner who says you''re never really home — it''s all live at once, all demanding
    the same thing from you, and somewhere in the middle of it you stopped being able
    to tell what''s urgent from what''s loud.


    This book is for the paramedic, the firefighter, the dispatcher, the cop, the
    ER nurse — the one trained to run toward what everyone else runs from, who can
    hold steady through a mass casualty but comes apart in the parking lot at the
    end of the shift. You are not weak. You are flooded. There is a difference, and
    the difference is everything.


    Overwhelm is not a sign that you can''t handle it. It''s a sign that too much
    has been asking for the same part of you at the same time, with no gap to set
    anything down. You''ll come to recognize how the body braces when the demands
    stack — the tight jaw, the held breath, the way your attention sprays across everything
    and lands on nothing. You''ll see why doing more only widens the flood, and why
    the answer was never speed. It was room. The breath before the next thing. The
    pause that doesn''t mean you''ve stopped caring — it means you''ve stopped drowning.


    This book will not hand you a system to do it all faster. It will not tell you
    to optimize your morning or download one more thing. It will not promise that
    the calls will slow down or the demands will ease, because they won''t, and you
    already knew that.


    What it offers is smaller and harder to take: the recognition that you can stand
    in the middle of too much and still find one square foot of ground that is yours.
    That you don''t have to meet every wave at once. That holding the line has never
    meant holding everything.


    You are allowed to put one thing down without putting the whole job down. You
    are allowed to take a breath that no one assigned you. Start there.


    Book 1 of the Iron Gate Press Burnout series.'
