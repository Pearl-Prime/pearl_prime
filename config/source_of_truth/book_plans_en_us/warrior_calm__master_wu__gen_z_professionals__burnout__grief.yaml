title: What It Cost to Get Here
subtitle: For the young professional grieving the years the grind quietly took — the
  friendships, the health, the version of you who still had something left
cover_tagline: Some of what burnout took is not coming back. That, too, is allowed
  to hurt.
description:
  short_blurb: Underneath burnout there is often a loss no one named — the time, the
    relationships, the self you spent to keep performing. This is a quiet, honest
    book about grieving what the grind took, and finally setting down what you were
    never going to get back.
  long_description: 'There''s a particular ache that arrives once the adrenaline finally
    drops. You make it through the deadline, the launch, the impossible quarter —
    and instead of relief there''s a strange, heavy grief. Because somewhere in all
    of it, something was lost. The friends you stopped texting back. The body that
    used to recover. The hobby, the easy laugh, the early-twenties self who hadn''t
    yet learned to measure their worth in output. You gave those away one small yes
    at a time, and no one ever told you the bill would come due like this.


    This book is for the young professional carrying a loss they''ve never been allowed
    to call a loss. For the one who achieved the things and feels emptier than before.
    You did everything right by the rules you were handed — you worked, you delivered,
    you didn''t complain — and the cost was real, and it deserves to be grieved instead
    of explained away or productivity-hacked into a lesson.


    Here you''ll come to recognize the grief that lives underneath your exhaustion.
    Not as weakness, not as ingratitude, but as the honest weight of what the grind
    took. You''ll let yourself name it — the relationships that thinned, the health
    you spent, the dreams you quietly shelved to keep up. And you''ll learn the warrior''s
    hardest discipline: not how to win it back, but how to release what is genuinely
    gone, so your hands are finally free to hold what''s still here.


    This book will not give you those years back. It promises no reframe that turns
    the loss into a tidy gift, no closure on demand, no way to optimize grief into
    a growth story. Some things were taken, and pretending otherwise is just one more
    weight to carry. What is released does not have to be earned or understood. It
    only has to be set down.


    What it offers instead is the permission to mourn — fully, without apology — and
    the quiet strength that lives on the other side of letting go. Not the toughness
    that pretends nothing happened. The deeper calm of someone who has looked at what
    it cost, grieved it honestly, and chosen to keep walking anyway.


    You are allowed to be sad about what this took from you. You are allowed to put
    it down. Grief is not the opposite of strength. Sometimes it is the bravest thing
    a tired person ever does.


    Book 2 of the Iron Gate Press Burnout series.'
