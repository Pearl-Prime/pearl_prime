title: Still On Duty in Your Own Body
subtitle: For the responder who clocks the exits and wakes at 0300 certain the tones
  have dropped — when the guard keeps standing watch long after the shift has ended
cover_tagline: You took the uniform off hours ago. Your nervous system never got the
  memo.
description:
  short_blurb: The hardest part of burnout isn't the work. It's that you never stop
    working — even at rest, your mind sits the watch, scanning for the next emergency
    that isn't coming. This is a grounded way to finally let the body stand down,
    for the responder whose guard has forgotten how to lower.
  long_description: 'You notice it at the dinner table. Your back is to the door and
    something in you will not settle until you''ve moved your chair. You clock the
    exits in the restaurant out of habit. You wake at 0300 fully alert, heart already
    going, certain for half a second that the tones have dropped — and then the silence,
    and the slow understanding that nothing is wrong and your body refuses to believe
    it. The shift ended hours ago. You are still on duty inside your own skin.


    This book is for the first responder whose nervous system has forgotten the way
    down. The dispatcher who can''t stop listening for trouble in an ordinary conversation.
    The officer, the medic, the firefighter whose hypervigilance kept them sharp on
    the worst nights and now will not switch off on the safe ones. Your watcher has
    been standing the post so long it no longer knows the difference between a real
    threat and a quiet room. That''s not paranoia. That''s a guard that was never
    relieved.


    What you''ll come to recognize here is how the scanning mind drains the root from
    above — how a body that never stands down never refills, no matter how many hours
    you lie still. We''ll get curious about the watch itself: what it''s been protecting,
    why it doesn''t trust the all-clear, and what it would take for the deep energy
    to come back up through ground that has finally been allowed to rest. You''ll
    learn that vigilance and recovery cannot share the same nervous system at the
    same moment, and that letting the guard down is not the same as being unsafe.


    This is not a book that will help you stay sharper or harden your edge. It will
    not teach you to manage your vigilance more efficiently or turn your alertness
    into peak performance. There is nothing here about optimizing your readiness.
    This is about the opposite — about giving the watcher, just for a while, permission
    to step down off the wall, so that something underneath you can begin, at last,
    to rise.


    You are allowed to stop scanning. The room is safe. The shift is over. You are
    allowed to let the ground keep watch for a while, and to feel what comes back
    up when it does.


    Book 3 of the Root & Meridian Press burnout series.'
