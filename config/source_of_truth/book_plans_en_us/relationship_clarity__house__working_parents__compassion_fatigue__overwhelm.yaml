title: There's No Room Left For Me
subtitle: For the working parent who pours out all day and comes home to find the
  well already empty — when caring for everyone has filled every inch and left no
  space to feel anything at all
cover_tagline: You gave everyone a piece of you. There was none left over for the
  love.
description:
  short_blurb: By the time you sit down across from the people you love, there is
    nothing left in the cup. This is a book for the working parent flooded by everyone's
    needs at once, who can't find a single quiet inch to hear themselves think. It
    won't add one more thing to your list — it pulls up a chair and lets you set the
    whole load down for a while.
  long_description: 'It usually hits in the doorway. You''ve been pouring all day
    — into the inbox, the carpool, the small hands that needed you, the meeting that
    ran long — and now you''re stepping into your own home and someone needs something
    else, and a quiet panic rises that you cannot name. There is no room left. Not
    on the calendar, not in your head, not in the part of you that used to have something
    to give the people right in front of you.


    This book is for the working parent who is not lazy and not failing, but flooded.
    The one who loves their family and still flinches when another need arrives, because
    the need lands on a person who has already been emptied. If you have sat at your
    own dinner table feeling far away from everyone you''d die for, this was written
    for you.


    You''ll come to recognize the shape of it. How compassion fatigue isn''t a lack
    of love but the cost of love spent without refill. How overwhelm makes everything
    urgent and nothing reachable, so you stand in the middle of your life unable to
    pick up any single piece of it. How the numbness you''re so ashamed of is the
    body doing the only thing it can when too much arrives at once — it stops letting
    more in. You''ll see why ''just be present'' feels like a slap, and why the answer
    was never to care harder.


    This book will not hand you a system. It will not optimize your mornings or hand
    you a script for the conversation across the table. It makes no promise that you''ll
    get more done, and it will never once suggest that you, or your marriage, or your
    tired and beautiful kids, are a problem to be managed. There is no fix here, because
    you are not broken.


    What there is, instead, is a second chair. A place to set the whole armful down
    and admit, without anyone keeping score, that you have been running on empty for
    longer than you''ve let on. Permission to be a person again before you are a provider
    — to take up a little of the room you''ve spent years giving away.


    You are allowed to be the one who needs something, too. Even now. Especially now.


    Book 1 of the Two Chairs Press compassion fatigue series.'
