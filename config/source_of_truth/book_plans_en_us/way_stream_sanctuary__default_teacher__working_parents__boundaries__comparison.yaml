title: 'Setting Boundaries: Beyond the Highlight Reel (4)'
subtitle: A Field Guide for Working Parents Navigating Boundaries
cover_tagline: Their family runs smoother because you can see their highlight reel
  and only your own backstage.
description:
  short_blurb: You say yes to the extra shift, the class snack sign-up, the group
    chat favor, because somewhere a parent who isn't drowning is doing all of it without
    complaint. This is a book about the boundary you never set because you were too
    busy measuring your insides against everyone else's outsides. It won't make you
    do more. It will show you where the comparison started and how to put the line
    back.
  long_description: 'It''s 9:40 at night. The dishwasher is running, one kid finally
    went down, and you''re scrolling another parent''s perfectly captioned soccer-tournament
    weekend while you mentally re-litigate the snack you forgot to send. You are not
    jealous, exactly. You''re auditing. Measuring the gap between their visible competence
    and your felt chaos, and calling the difference a boundary you should have been
    able to hold.


    This book is for the working parent who can''t say no because everyone else seems
    to be saying yes without breaking. The coworker who covers the late shift without
    flinching. The PTA parent who organizes the whole fundraiser and still makes the
    lunches. The friend whose kids are signed up for everything and who answers the
    group chat in seconds. You compare, you come up short, and you take on one more
    thing to close a gap that was never real. The yes isn''t generosity. It''s evidence
    you''re trying to submit, proof that you can keep up with people whose full picture
    you have never actually seen.


    We start by naming it. Comparison is not information about you; it''s a story
    your tired brain tells using incomplete data. You''re stacking your entire interior
    load, the 6 a.m. dread and the unanswered texts and the thing you forgot, against
    the two-second clip someone chose to post. Then we go down into where that habit
    was built, the early arithmetic of being ranked, measured, and found wanting,
    until comparing yourself became as automatic as breathing. We stay there long
    enough that you stop treating the verdict as truth and start recognizing it as
    a reflex, a groove worn so deep you mistook it for the road. And then we come
    back up with the one move it keeps you from making: the line you skip every time,
    the no you owe yourself before you owe anyone else a yes.


    This is not a productivity book. It will not teach you to out-organize the parent
    you envy or color-code your way into feeling like enough. There is no chart where
    you finally win the comparison and the boundary becomes easy. The goal is smaller
    and far more durable: to set a limit that holds because it''s yours, not because
    you proved you deserved one by matching someone else''s highlight reel.


    Written in plain, grounded language you can actually use the next time the gap
    opens up at 9:40 at night. No worksheets. No forced gratitude. No pretending you
    don''t feel what you feel.


    You were never behind. You were comparing your whole unfiltered life to a thumbnail
    somebody curated. Put the line back where it belongs, and stop paying admission
    to a race that doesn''t have a finish.'
