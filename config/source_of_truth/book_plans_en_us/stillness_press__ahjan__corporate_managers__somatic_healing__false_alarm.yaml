title: The Body That Won't Stand Down
subtitle: For managers whose nervous system keeps scanning for danger that never arrives
  — bracing all day for a threat with no name
cover_tagline: Nothing is wrong. Your body didn't get the message.
description:
  short_blurb: The meeting ended fine. The deadline moved. The email was nothing.
    So why is your chest still tight, your jaw still set, your whole body still braced
    for impact? This is a quiet book for the manager whose alarm system never learned
    how to turn off.
  long_description: 'Nothing is wrong. You''ve checked. The deadline moved, the meeting
    went fine, the email was nothing. And still your body is braced — jaw set, shoulders
    climbing, a low hum of readiness in your chest that no amount of evidence will
    switch off.


    This is the false alarm. It is the oldest, most loyal part of you doing exactly
    what it was built to do: scanning for the threat, getting ready early, refusing
    to be caught off guard. It served you once. It got you through the reorg, the
    bad quarter, the boss who was never satisfied. It just never learned that the
    danger has passed.


    This book is for the mid-level manager who runs the cross-functional team, hits
    the numbers, and looks composed in every room — while underneath, the body holds
    things the mind has long since filed away. You know the bracing. You may have
    stopped noticing you do it. You''ve called it stress, called it caffeine, called
    it just how I am.


    You''ll come to recognize what the alarm actually is, and why it makes such complete
    sense. You''ll feel the difference between real danger and an old echo of it.
    You''ll learn what it asks for when it fires — not to be argued with or pushed
    down, but to be met, slowly, until your body believes you that it is safe to set
    the weight down.


    This book will not make the feeling stop on command. There is no breathing trick
    here that ends it for good, no morning routine that finally fixes you, no mindset
    to optimize. The alarm is not a malfunction to eliminate. It is a part of you
    to come back into relationship with — and that takes a different kind of patience
    than the kind your job rewards.


    What it offers instead is recognition. Language for what is happening the next
    time it happens. A way down out of the readiness and back into the body you''ve
    been running on — something you can practice on the subway, in the ten minutes
    before a one-on-one, at 3am when you wake already alert.


    You are not broken. You are not weak. You are a person whose alarm has been on
    for a very long time, and who is allowed, finally, to begin teaching it that it
    can rest.


    Book 1 of the Stillness Press somatic healing series.'
