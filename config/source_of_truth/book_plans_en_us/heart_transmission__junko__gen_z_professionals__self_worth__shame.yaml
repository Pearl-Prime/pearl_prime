title: Exhausted From Holding It Down
subtitle: For the twentysomething a few years into their first real job, overworking
  to hide a flaw no one else can see — and a hand for the tiredness of keeping it
  covered
cover_tagline: You learned to overwork so no one would look too closely.
description:
  short_blurb: There is a part of you that you keep covered at the desk, in the meeting,
    in the group chat — a quiet certainty that if anyone saw the real you, they'd
    know something was wrong. So you work harder, smooth it over, stay one step ahead
    of being found out. This is a book for the hidden part, written close enough to
    reach it.
  long_description: 'It usually arrives in a small moment. A message you reread until
    the words blur. A compliment you can''t take in. A meeting you replay on the walk
    home, certain you gave yourself away. On the outside you''re capable, early in
    a career that''s going fine. Underneath, you carry the conviction that something
    is wrong with you — and that the whole point of working this hard is to make sure
    no one ever finds out.


    This book is for you. For the one who learned, somewhere young, that being enough
    was conditional. That love and belonging had to be earned, and could be lost.
    So you became useful, polished, ahead of the deadline — and you''ve been covering
    the same tender place ever since, in every job, every room, every thread.


    What we''ll sit with here is not a flaw to fix. It''s a belief you were handed
    before you could question it: that you are, at the core, a defect to be managed.
    We''ll trace how that belief learned to hide behind your competence. How the overwork
    was never really about the work. How the shame quiets not when you finally prove
    yourself, but when you let yourself be seen as you already are — and find that
    the warmth doesn''t withdraw. Not when you''ve earned it. Not once you''re impressive
    enough. Just when, for a moment, you let the cover slip and someone stays anyway,
    close, looking right at the part you were sure would send them away.


    Nothing here will help you perform your way to worthiness. There is no exercise
    that earns it, no version of you good enough to finally deserve it. That''s the
    heart of it. The thing you''ve been working to become, you already are — and the
    work was only ever the cover. We''ll set the cover down slowly, together, and
    see what''s been underneath the whole time. Not a defect. Just you, and the strange
    relief of being met there.


    This is written the way wisdom passes between two people who trust each other
    — close, unhurried, hand to hand. No stage, no clinic, no one keeping score of
    your progress. Just a voice in the next chair, saying the thing you''ve never
    let yourself say out loud, and staying.


    You don''t have to keep it covered here. Not the part you''re sure is wrong. Not
    in this room.


    Book 1 of the Heart Transmission Press self worth series.'
