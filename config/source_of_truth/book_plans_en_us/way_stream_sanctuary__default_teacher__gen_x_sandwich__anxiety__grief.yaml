title: 'Anxiety Relief: After the Loss (2)'
subtitle: A Gentle Guide to Moving Through Grief Without Forcing Yourself to 'Get
  Over It' — Anxiety for Gen X Sandwich (When Loss Reshapes Everything)
cover_tagline: You're grieving people who are still here, and no one warned you.
description:
  short_blurb: Watching a parent fade while still being someone's parent yourself
    is a particular kind of loss, the kind with no funeral and no permission to fall
    apart. This is a secular, unsentimental look at the grief threaded through your
    anxiety, written for the generation carrying it from both sides. It won't rush
    you. It'll just stop pretending the weight isn't there.
  long_description: 'Some of what you''re calling anxiety is actually grief that hasn''t
    been allowed to sit down. You''re watching your father forget your name some days.
    You''re noticing your mother get smaller. And at the same time you''re packing
    lunches, signing forms, being the steady one, because that''s the job in the middle.
    There''s no funeral for the parent who''s still alive but no longer quite themselves.
    There''s no casserole for the version of your life that''s quietly ending. So
    the loss has nowhere to go, and it comes out sideways, as the alarm that won''t
    switch off.


    This book is for you, the one grieving in the cracks of a normal day. The Sandwich
    Generation grieves on the move, in parking lots and bathrooms and the ninety seconds
    before you walk back into a room and put your face back on. You don''t get a leave
    of absence for anticipatory loss. There''s no bereavement policy for the slow
    kind, the kind that takes years and asks you to keep functioning the entire time.
    You''re losing your parents in slow motion while raising kids who are leaving
    you in slow motion too, and the weight of carrying both at once has a name, and
    the name is grief, not failure.


    We move through it in three turns. Recognition: you learn to tell grief apart
    from anxiety in your own body, because they wear similar clothes and the mix-up
    keeps you fighting the wrong thing, reaching for calm when what you actually need
    is to mourn. Then descent: you let the weight be weight. Not fixed, not reframed,
    not turned into a lesson or a gratitude exercise. Just felt, on purpose, in doses
    you can survive, because grief that''s allowed down into the body stops having
    to shout through the chest. And then you come back up, still carrying it, but
    carrying it instead of being crushed under it without knowing why.


    This is not a five-stages chart and it will not promise closure or a silver lining.
    Some of these losses don''t close; they just become part of how you''re built,
    a new weight you slowly learn to walk with. What it offers is permission, the
    permission no one in your life has the bandwidth to give you, to call this what
    it is and let it have a little room.


    You are allowed to grieve people who are still here. The weight you''ve been carrying
    was never anxiety to be managed. It was love with nowhere to put itself. Set it
    down, even for a minute. You''ve earned the minute.'
