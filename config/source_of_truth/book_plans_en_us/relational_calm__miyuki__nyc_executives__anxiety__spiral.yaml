title: A Single Sentence Becomes the Whole Night
subtitle: For the executive who runs every room with a steady hand, then lies awake
  while one sentence empties the night of everything but itself
cover_tagline: It started as one sentence. By the time the train came, it was the
  whole rest of your life.
description:
  short_blurb: You replay one line from the meeting, and within seconds it has become
    the reason for the layoff, the divorce, the unraveling of everything you've built.
    This is a book for the mind that takes a single thought and, without your permission,
    makes it a thousand. It will not teach you to think faster. It will show you how
    to set the first thought down before it has time to multiply.
  long_description: 'It begins with one thing. A look someone gave you in the 4pm
    meeting. A sentence you wish you''d said differently. By the time the elevator
    doors close, that one thing has found a second thing, and the second has found
    a third, and now you''re standing at the edge of the subway platform watching
    the express lights come up the tunnel, and somewhere in the last ninety seconds
    the whole rest of your life has quietly fallen apart inside your head.


    No one around you can tell. That''s the part that exhausts you most.


    This book is for the high-functioning mind that does not break down — it spirals.
    You run the company, the calendar, the room. You are the calm one. And underneath
    that, a single thought becomes a thousand before you''ve even noticed it left
    the station, each one pulling the next, the loop tightening, feeding on itself,
    going faster the harder you try to stop it.


    You will come to recognize the shape of it. The way the spiral always starts small
    and always ends at catastrophe. The way thinking harder only gives the loop more
    to hold. The way the bracing has become so constant you''ve forgotten it''s there
    — the held breath, the scanning, the quiet question underneath every meeting:
    what are you getting ready for? You''ll see how the same mind that built everything
    you have is the one that, left running in the dark, will take it apart one thought
    at a time.


    This is not a book about thinking better. There is no system here for managing
    your mind, no breathing trick to reach for, no mantra to drown out the noise with
    more noise. Nothing here will help you win the argument you''re having with yourself.
    That''s the point. You cannot out-think a spiral; you can only stop feeding it.
    What this book offers instead is quieter — a way to notice the first thought as
    it arrives, to set it down before it has time to find the second, and to let the
    room inside you go still again. Not empty. Just no longer crowded.


    You are not falling apart. You are not too much. You have only taken the part
    of you that reads every room and catches every signal, and turned it on yourself
    in the dark, where it had nothing left to do but multiply. You''re allowed to
    put it down. You''re allowed to let one thought be one thought, and then nothing,
    and then the train comes, and you get on, and it''s just a Tuesday after all.


    Book 1 of the Bare Form Books anxiety series.'
