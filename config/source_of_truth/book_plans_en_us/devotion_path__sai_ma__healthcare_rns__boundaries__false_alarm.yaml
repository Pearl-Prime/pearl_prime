title: The Yes That Leaves Before You Do
subtitle: For the nurse who agrees before she feels her own exhaustion — when the
  body braces for danger every time you reach for the word no
cover_tagline: Your mouth said yes before your body could ask you anything.
description:
  short_blurb: You say yes before you even know you've said it, because somewhere
    your body learned that the smallest no is a threat. This is a tender book for
    the nurse whose alarm system fires at the thought of one boundary, one disappointed
    face, one moment of being too much. It will not teach you to say no faster. It
    will help you feel safe enough to find out what you actually wanted.
  long_description: 'It is the end of your shift and someone asks for one more thing.
    You hear yourself say yes before you feel anything at all — before the ache in
    your feet reaches you, before you notice you haven''t eaten, before any part of
    you gets a vote. The yes leaves your mouth and goes ahead of you, and you follow
    it out the door the way you always do.


    This is a book for the nurse whose body sounds the alarm before her mind can speak.
    For the one who feels her chest tighten at the thought of saying no, as if a boundary
    were a danger to survive rather than a line to draw. You have learned, somewhere,
    that other people''s needs are emergencies and your own are negotiable. So you
    brace. You scan the room. You agree before the threat can land.


    Here you will come to recognize that alarm for what it is. You''ll feel how the
    body fires when there is no real danger — only a disappointed face, only a shift
    left uncovered, only the unbearable possibility of being too much. You''ll meet
    the false alarm gently, without trying to silence it, and you''ll begin to ask
    the question it never let you reach: where do you draw the line? Not as a wall
    against the people you love, but as the banks that let a river stay a river instead
    of flooding everything in its path.


    This book will not hand you a script. It will not teach you to say no in three
    confident steps or to armor yourself against the people who lean on you. It promises
    no fix, no faster reflex, no version of you that never flinches. The bracing is
    not a malfunction to correct. It is a story your body has been telling for years,
    and it deserves to be heard before it is asked to quiet.


    What it offers instead is room. Room to feel the cost of every reflexive yes.
    Room to stand at the threshold and not cross it for once. Room to discover that
    you are an open vessel meant to be poured out and refilled, not a well the whole
    ward can draw from until it runs dry. You are allowed to find out what you wanted
    before you answer.


    Book 1 of the Open Vessel Press boundaries series.'
