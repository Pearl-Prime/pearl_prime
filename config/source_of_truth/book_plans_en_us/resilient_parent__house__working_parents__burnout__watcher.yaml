title: The Shift That Never Quite Ends
subtitle: For the parent whose mind keeps working long after the kids are finally
  asleep
cover_tagline: Everyone's asleep. You're still on duty.
description:
  short_blurb: The house is quiet. Everyone is safe. And your mind is still running
    the perimeter, checking the calendar, replaying the day, bracing for tomorrow.
    This is a book for the working parent whose vigilance never powers down, the one
    doing the invisible work of tracking everything so nothing falls, even when there's
    nothing left to catch.
  long_description: 'The lights are off. The kids are breathing slow in the next room.
    Everyone is fine. And still, some part of you is awake at the controls, scanning.
    Did you sign the form. Is there milk. Is the meeting at nine or ten. Did your
    kid seem off today. Is something wrong that you missed. The day is over but you
    are not, because the part of you that watches never clocks out.


    This is a book for the working parent who carries the invisible job of keeping
    track of everything. You''re the one who knows where the shoes are, when the prescription
    runs out, which child needs the dentist, what''s due Friday. You hold the whole
    map in your head, and you can''t put it down, because if you stop watching, you''re
    sure something will fall. So the scanning continues into the night, long past
    any threat, monitoring a world that is, for this one moment, actually okay.


    Here you''ll come to recognize the watcher in you. How hypervigilance is not the
    same as caring, even though it feels inseparable from it. How burnout keeps the
    alarm system running on high alert even when there''s no fire, scanning for threats
    that never come. How the mental load isn''t just the doing, it''s the never-being-allowed-to-stop-tracking,
    the exhausting work of being the one who notices everything. You''ll see why you
    can''t fall asleep even when you''re desperate for it, why your mind grabs the
    next worry the moment one is resolved, and why rest feels unsafe when you''re
    the one holding it all together.


    This book will not teach you to monitor more efficiently or finally get on top
    of it all. It won''t promise that with the right planner your mind will quiet
    down on command. There is no system here that ends with you in perfect, watchful
    control, because the watching itself is the wound. What it offers instead is a
    way to let the perimeter go for a few stolen minutes, to set the map down where
    no one can see, and to let the part of you that''s been on duty all day finally,
    briefly, rest.


    You are allowed to stop scanning. The night does not need a guard.


    Book 3 of the Stolen Moment Press working parents burnout series.'
