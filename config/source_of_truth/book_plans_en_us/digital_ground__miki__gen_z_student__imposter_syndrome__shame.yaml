title: The Defect You're Sure They'll Find
subtitle: For the student grinding to cover a flaw that was never there — when imposter
  syndrome isn't fear of failing but the buried belief that something is wrong with
  you
cover_tagline: You're not afraid of being caught out. You're afraid of being seen.
description:
  short_blurb: It isn't really that you might fail. It's the quiet certainty that
    if anyone saw the real you, they'd know something was wrong. This is a book about
    the shame underneath imposter syndrome — the defect you've been overworking to
    hide — and the slow relief of finding out it was never there.
  long_description: 'It''s not actually the deadline. It''s not the grade, or the
    presentation, or the fear of getting it wrong. Underneath all of that, in a place
    you don''t say out loud, there''s a quieter belief: that something is wrong with
    you. That you''re not just unprepared — you''re defective, and the work, the achieving,
    the trying-twice-as-hard, has all been a way of covering it so no one finds out.


    That''s shame, and it''s the engine underneath the whole thing. Not the fear that
    you''ll fail at the task, but the certainty that you are the failure, and that
    being truly seen would confirm it. So you overwork. You hide the struggle. You
    perform the version of yourself you think is acceptable and you brace, always,
    against anyone getting close enough to see the rest.


    This book is for you — the student who looks fine and feels like a fraud all the
    way down. The one who can''t accept the compliment because they know what''s underneath.
    The one exhausted from covering, from the gap between the self you show in the
    seminar and the self you''re sure is the truth. You''re not actually defective.
    You learned, somewhere, to believe you were.


    You''ll come to recognize shame as separate from you — a belief you absorbed,
    not a fact about who you are. You''ll learn the difference between guilt, which
    says you did a bad thing, and shame, which says you are a bad thing, and why one
    can be repaired and the other just makes you hide. You''ll find what it''s like
    to set the performance down, even for a minute, and let yourself be in the room
    as you are.


    This won''t fix you, because there is nothing in you to fix. It won''t hand you
    self-esteem or teach you to love yourself in five steps. The whole premise — that
    you''re broken and need repairing — is the thing this book is here to question.


    What''s true is that the defect you''ve been hiding was never there to begin with.
    You don''t have to earn your way out of being wrong, because you were never wrong.
    And you''re allowed to stop covering, put the phone down, and let someone see
    you without the alarm going off.


    Book 4 of the Present Tense Books imposter syndrome series.'
