description:
  short_blurb: 'You snapped at your kid and the verdict came down instantly — bad
    parent, bad person. Anxiety often runs on a hidden engine of shame: a buried belief
    that you are fundamentally not enough, and one mistake is all the proof it needs.
    This is an hour for the working parent living under that sentence, and the quiet
    work of finally questioning it.'
  long_description: 'You raised your voice at bedtime, again. Or you missed the recital,
    or you fed them cereal for dinner, or you felt — for one honest second — like
    you couldn''t stand being a parent today. And the verdict landed before you could
    breathe: something is wrong with you. Not "that was a hard moment" — something
    is wrong with you, at the root, and you''ve just proven it one more time.


    This book is for the working parent whose anxiety is really shame in a louder
    costume. Who hears every parenting slip as evidence of a fundamental defect. Who
    keeps the harshest courtroom in the world running in their own head, where the
    smallest failure confirms a sentence handed down long before the kids ever arrived.
    The alarm in your chest isn''t only about danger. It''s about exposure — the dread
    that someone will finally see what you secretly believe about yourself.


    Shame is the belief that you are the problem — not that you did something wrong,
    but that you are something wrong. We''re going to find that belief where it actually
    lives, underneath the parenting guilt, and name it plainly. Then we go down into
    it, not to confirm it, but to look at it directly for maybe the first time. You''ll
    learn to feel the heat of shame rise — the flush, the urge to hide, the harsh
    inner voice — and recognize it as an old alarm, installed long ago, firing on
    a verdict that was never true.


    This won''t promise you''ll become the parent in the parenting books. It won''t
    hand you affirmations to recite in the mirror or a gratitude routine to paper
    over the wound, because the wound isn''t a lack of positive thinking — it''s a
    buried sentence that needs to be questioned, not shouted over. What it offers
    is something quieter and far more durable: the felt experience that you can make
    a mistake, even a real one, without it meaning you are broken.


    Your kid does not need a flawless parent. They need a present one — and presence
    is impossible when half of you is busy defending against a charge of being fundamentally
    bad. An hour from now, you''ll still mess up; everyone does. But the messing up
    won''t automatically prove the sentence anymore. The sentence, it turns out, was
    never the truth about you. It was just the loudest alarm in the building, and
    you''re allowed to stop believing it.'
