title: The Guard That Won't Come Off Duty
subtitle: For the first responder whose body holds the watch long after the shift
  has ended
cover_tagline: The danger passed hours ago. Somebody forgot to tell your nervous system.
description:
  short_blurb: You came off shift. Your body didn't. This is for the part of you that's
    still scanning the room, still bracing for the call that isn't coming — and a
    way to let it finally stand down without ever lowering who you are.
  long_description: 'You''re at the dinner table and you''ve already mapped the exits.
    A door slams two houses down and you''re up before you''ve decided to be. The
    shift ended hours ago, but the part of you that watches for the next bad thing
    never got the message. It''s still on. It''s always on. And you''re so used to
    it you forgot it was supposed to switch off.


    This book is for the first responder whose guard never drops. The cop who sits
    with their back to the wall on a day off. The paramedic who hears tones that aren''t
    there. The firefighter, the nurse, the dispatcher whose nervous system stayed
    locked in scan mode long after the danger passed — because the danger always came
    back, so why would it ever fully stand down.


    This is what burnout looks like for the watcher: not collapse, but a body that
    can''t unclench. Hypervigilance that follows you off the clock. Sleep that won''t
    come because some ancient part of you is still standing post. The exhaustion of
    guarding a world that isn''t, in this moment, trying to hurt you. You''ll come
    to recognize the watcher for what it is — not a flaw, not paranoia, but a guard
    that served you, kept you sharp, kept you alive, and was never told the watch
    was over.


    This book will not tell you to just relax, because you can''t, and being told
    to only proves the point. It will not promise to make you let your guard down,
    or hand you a technique to switch the vigilance off like a light. It will not
    try to fix a system that was doing exactly what it was trained to do.


    What it offers is something the watcher has never been given: the recognition
    that it''s allowed to rest. Not to disappear — you need it, and it isn''t going
    anywhere — but to stand down when there''s nothing to guard. To learn the difference
    between a threat and a memory of one. To find, even for an hour, the still center
    where you are not braced for anything at all.


    The watch kept you alive. You don''t have to fire it. You only have to let it
    rest when the post is quiet. You are allowed to be off duty all the way through.
    Start by letting it know the danger has passed.


    Book 3 of the Iron Gate Press Burnout series.'
