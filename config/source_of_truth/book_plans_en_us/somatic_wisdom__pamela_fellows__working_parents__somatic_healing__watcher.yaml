title: Teaching Your Body It's Safe to Land
subtitle: For the parent whose guard won't lower even when everyone is home and well
  — a gentle, breath-by-breath way to coax a long-braced body back to the ground
cover_tagline: Everyone is safe. So why is some part of you still standing guard?
description:
  short_blurb: The kids are asleep. The doors are locked. And still some part of you
    is up, listening, scanning, half-waiting for the sound that means you're needed.
    This is a book for the working parent whose nervous system never quite goes off
    duty — who can't remember the last time their body believed it was safe to stop
    watching. It won't tell you to relax or 'just be present.' It will show you why
    the watcher won't stand down, and how to let it rest its eyes without abandoning
    your post.
  long_description: 'Everyone is finally asleep. The house is quiet. The doors are
    locked, the stove is off, the children are breathing softly down the hall. By
    every reasonable measure, you are safe. And yet some part of you is still up —
    still listening, still scanning the dark for the sound that means a small person
    needs you, still braced for the thing that hasn''t happened and probably won''t.
    You can''t seem to call it off. You can''t remember the last time your body believed
    the day was actually over.


    This book is for you — the working parent whose mind never quite clocks out. The
    one who tracks every cough through the baby monitor, who reads the room before
    they''ve taken off their coat, who lies down exhausted and finds that the watching
    simply continues without them. You are not paranoid. You are not high-strung.
    Your nervous system has been keeping you and the people you love alive, and it
    has decided it cannot afford to look away.


    Gently, and without ever asking you to ''just relax,'' you''ll come to recognize
    the watcher for what it is: not anxiety to be defeated, but a part of you that
    took on the job of vigilance and never got told it could rest. You''ll feel where
    that scanning lives in your body — the held breath, the eyes that won''t soften,
    the shoulders that listen. You''ll learn what it is to thank that part instead
    of fighting it, and to let it set its weight down, for a moment, onto ground that
    can hold you both. You''ll begin to notice the difference between a real signal
    and an old habit of bracing — and to let your body, slowly, relearn what ''off
    duty'' feels like.


    This book will not promise to switch the watching off. It won''t optimize your
    hypervigilance into productivity or hand you a routine that turns rest into one
    more task. It will not ask you to override the part of you that loves so fiercely
    it cannot look away. There is no fix here, and that is the point. The watcher
    was never the enemy. It was just never relieved.


    The practices are small enough to do without anyone noticing — a softening of
    the eyes in a meeting, one slow breath while the monitor glows, a hand on your
    own chest in the dark. They meet you on duty, where you actually live.


    You''ll walk away knowing what your body is doing and why it has every reason
    to keep watch. Not cured. Not finally at ease. But able, now and then, to feel
    the ground take the watching — and to let the part of you that never clocks out
    close its eyes, just for a breath, knowing you are still here.


    You are allowed to rest your eyes. The love does not require you to never look
    away.


    Book 2 of the Felt Sense Publishing somatic healing series.'
