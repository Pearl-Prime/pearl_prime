title: The Defect You Keep Covering
subtitle: For the high-achiever who over-delivers to hide a private certainty — that
  needing a limit at all means something is wrong with them
cover_tagline: What if the flaw you've been hiding was never a flaw at all?
description:
  short_blurb: You don't say no because you're certain that needing space proves you're
    difficult, fragile, not built for this. So you over-deliver to cover it. This
    is a tender book for the buried belief that your own limits are a defect — and
    a quiet invitation to stop performing your way around a wound that was never true.
  long_description: 'You said yes again. Not because you had room, but because the
    alternative — letting them see that you needed room — felt unbearable. So you
    stayed late. You over-delivered. You made it look effortless, the way you always
    do, because somewhere underneath everything runs a quiet, certain sentence: if
    they knew I had limits, they''d know what''s wrong with me.


    That sentence is the engine of your exhaustion. Not the workload. The belief that
    your need for a boundary is a defect you have to keep covering — proof that you''re
    too sensitive, too much, not cut out for the version of yourself everyone seems
    to expect. So you work harder to hide it. And the hiding costs more than the work
    ever did.


    This book is for the Gen Z professional who learned early that being easy, being
    capable, being no trouble was the price of belonging — who treats every limit
    as evidence against themselves, who would rather burn out quietly than be seen
    as someone who couldn''t handle it. You are not difficult. You are not fragile.
    You have been hiding something that was never shameful in the first place.


    With great gentleness, you''ll come to see the shame for what it is: a story you
    were handed and mistook for a fact about you. You''ll learn to feel the flinch
    of being seen and not collapse into it — to stand at the threshold of an honest
    no and notice that the awareness watching the shame rise is itself untouched by
    it, clean, already whole. The defect you''ve been covering was a dream you took
    for the room you live in. You can wake up now. There is no flaw under there. There
    never was.


    This is not a book about building self-worth or fixing your confidence. It will
    not hand you affirmations or turn your healing into another performance to perfect.
    There is nothing here to achieve, because the wholeness you''re reaching for cannot
    be earned by trying harder — it is what you already are, beneath the story you''ve
    been working so hard to hide.


    You were never the defect. You were only the one who believed it. And belief,
    unlike a flaw, can be set down.


    Book 2 of the Awakening Press boundaries series.'
