title: Nothing's Wrong, But Your Body Won't Believe You
subtitle: It's 11:40pm and the room is perfectly safe, but your chest is still braced
  for an impact — a quiet hand for the woman whose alarm keeps ringing over nothing.
cover_tagline: Your body is keeping watch over a threat that already passed.
description:
  short_blurb: You're sitting in a meeting, in your kitchen, in your own bed, and
    everything is fine — and still your chest is bracing for impact. This is a book
    for the woman whose alarm system fires beautifully at nothing, written not to
    silence it but to sit beside it until it learns the danger is over.
  long_description: 'It happens when nothing is happening. You''re answering an ordinary
    email, or merging onto the highway, or lying down at the end of a day that went
    fine, and your body floods with a warning it can''t explain. The heart speeds.
    The breath goes shallow. Some ancient part of you braces for an impact that never
    comes. You scan the room for the threat and find only your kitchen, your inbox,
    your sleeping partner — and the fear doesn''t care. It rang the bell anyway.


    This book is for you: the one who looks composed in every meeting while a quieter
    alarm runs underneath, the one who has Googled her own symptoms at 2am, the one
    who has learned to function flawlessly with a body that never quite stands down.
    You are not fragile. You are not making it up. You have a tender, faithful alarm
    that has been firing at shadows for so long it forgot what a real emergency feels
    like.


    Here, you''ll come to recognize the false alarm for what it is — not a verdict,
    not a warning you must obey, but an old reflex doing the only job it knows. You''ll
    see how bracing became your resting state, how you started treating ordinary Tuesdays
    like things to survive. You''ll learn to meet the surge the way you''d meet a
    frightened friend: not arguing with her, not shoving her down, just staying close
    enough that she can feel you''re not afraid. Warmth, it turns out, is what tells
    a body the danger is over — and warmth is something you can hand yourself.


    This book will not make you fearless. It will not hand you a four-step protocol
    to perform before breakfast or promise that you''ll never feel the floor drop
    again. There is no danger to defeat here, because there was never really one in
    the room — only a faithful alarm that needs to be told, gently and often, that
    it can rest. What it offers instead is the felt sense of company: a voice in the
    next chair while your body finishes a sentence it started years ago.


    You don''t have to make the feeling go away to be safe. You only have to stop
    treating its arrival as proof that something is wrong with you. Let it come. Let
    it pass through. You can keep your hand open the whole time.


    Book 1 of the Heart Transmission Press anxiety series.'
