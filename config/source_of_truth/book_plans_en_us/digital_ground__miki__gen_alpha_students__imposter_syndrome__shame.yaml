title: They'll Find Out I Faked It
subtitle: For the kid who looks like they have it together — and is quietly sure that
  if anyone saw the real them, the whole thing would fall apart
cover_tagline: You're not hiding a mistake. You're hiding a person.
description:
  short_blurb: You did the work, you got the grade, and you still feel like you snuck
    in the back door. This is the quiet belief that the competent version of you is
    a costume, and that underneath it there's something wrong that you have to keep
    covered. This book doesn't try to talk you out of it. It turns the light on slowly
    enough that you can finally look.
  long_description: 'Someone praises your work and your whole body goes cold.


    Not warm. Not proud. Cold — because now they expect that again, and you''re certain
    you got it right by accident, and one day you''ll turn in the real you and they''ll
    see. You''ve gotten so good at the costume that almost no one knows there''s a
    costume. You answer ''how''d you do that'' with a shrug. You say ''oh it''s not
    that good'' before anyone else can. You overwork everything, not because you love
    it, but because the work is the only thing standing between you and the version
    of you you''re sure is the truth.


    This book is for you — the high schooler everyone thinks is fine. The one who
    got in, got picked, got the grade, and feels like a glitch in the system that
    hasn''t been caught yet. The one carrying a quiet, specific belief: not ''I made
    a mistake'' but ''something is wrong with me, and the work is how I keep it hidden.''


    That belief has a name. It''s shame, and it is the engine under imposter syndrome
    — different from the spiral that loops, different from the comparison that measures,
    different from the alarm that just fires. Shame is the part that''s convinced
    the problem isn''t what you did. It''s what you are.


    Chapter by chapter, you''ll come to recognize the mask you built and what it actually
    costs to wear it all day. You''ll notice the moment your body braces before someone
    can see you. You''ll meet the hidden belief underneath — the one you''ve never
    said out loud — and you''ll find out it isn''t a fact about you. It''s a thing
    you learned, in a feed that rewards the highlight reel and punishes the unfinished.
    You''ll work with your body, in the room, with the phone face-down, in the actual
    moment the feeling shows up — not through worksheets, not through a morning routine,
    not through becoming someone more impressive.


    This book will not make you confident. It will not optimize you. It will not hand
    you a script to fake it harder or a hack to feel worthy by Monday. There''s no
    fix here, because you were never broken — you were hidden, and hidden isn''t the
    same as broken.


    What it offers instead: you get to stop performing a self you don''t recognize.
    You get to be a real, unfinished person who is allowed to be seen. Not fixed.
    Not healed in some final, posted-about way. Just no longer alone with the thing
    you''ve been hiding.


    You''re allowed to put the costume down. Even just here. Even just for the length
    of this book.


    Book 1 of the Present Tense Books imposter syndrome series.'
