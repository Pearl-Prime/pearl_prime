title: Too Many Numbers at Once
subtitle: For the woman whose money fear arrives all at the same time — rent, loans,
  savings, someday — until there's no room left to think
cover_tagline: When the whole ledger lands on you in a single breath.
description:
  short_blurb: You opened one bill and somehow all of them came with it — the rent,
    the loans, the savings you don't have, the someday you can't picture. This is
    a book for the millennial woman whose financial stress doesn't trickle in but
    floods, arriving all at once until there's no room left in her chest to think.
    It won't hand you a budget. It will give you back the air.
  long_description: 'It usually starts with one number. You meant to check one thing
    — the balance, a single bill — and within seconds the whole weight is on you.
    Rent that climbed again. The loan that never seems to move. The savings everyone
    says you should have by now. The trip, the wedding, the someday you can''t afford
    to picture. None of it arrives in a line you can take one step at a time. It arrives
    all at once, a flood with no shore, and your mind goes white trying to hold it.


    This book is for the woman who looks capable from the outside and feels submerged
    from the inside. You have the job. You have the degree they congratulated you
    for. And still, most nights, you are standing in water up to your throat, doing
    the arithmetic of your whole life at once and finding there is no room left to
    think a single clear thought.


    You''ll come to recognize the flood for what it is. How overwhelm isn''t weakness
    — it''s what happens when too much real weight is set on the scale at one time,
    more than any heart was built to weigh in a single moment. You''ll see why the
    harder you grip every number at once, the less you can actually carry. You''ll
    learn what it feels like to set one thing down. Not to fix it. To set it down,
    on purpose, so your hands are free for the next thing. You''ll find that capacity
    isn''t a character trait you''re failing at — it''s a space that can be cleared,
    one held breath at a time.


    This book will not promise to make the money enough. It won''t optimize your spending
    or turn your dread into a side hustle or tell you the flood was only ever in your
    head. The water is real. The arithmetic is genuinely hard, and pretending otherwise
    would be its own kind of insult.


    What it offers is smaller and truer: a way to stand in the flood without drowning
    in it. A way to weigh one thing at a time instead of everything in one impossible
    breath. Permission to put the rest down, just for tonight, and find that the floor
    is still there under your feet.


    You are not behind. You are not failing. You have simply been asked to hold the
    entire scale at once, and no one can do that. Let''s set part of it down together.


    Book 1 of the Feather & Scale Press financial stress series.'
