title: It Felt Like Something Was Wrong
subtitle: For the working parent whose mind keeps insisting there's a danger to catch
  — when the day is ordinary and the children are safe and there is nothing, truly,
  to fix
cover_tagline: Your mind says check it again. There was never anything to check.
description:
  short_blurb: You re-read the text three times looking for the thing you got wrong.
    You lie awake certain you forgot something that matters. There is no danger here
    — only a tender, tired mind that has confused loving your children with bracing
    for a threat that never arrives. This is a gentle hand laid over that false alarm.
  long_description: 'It comes before the words for it. A drop in your stomach as you
    scroll past your kid''s teacher''s name in your inbox. The certainty, while you
    stir the dinner, that you have forgotten something — something important, something
    only you were holding — and you stop, spoon in hand, scanning the day for the
    danger. You re-read the message you already sent. You check the lock you already
    checked. You replay the doctor''s tone, the silence in the back seat, the look
    on your child''s face, hunting for the small wrong thing your mind swears is there.


    And it isn''t. The day is ordinary. The kids are fine. The danger your mind keeps
    insisting on simply never comes.


    This book is for the working parent whose thinking has learned to mistake love
    for emergency. You are not careless, and you are not losing your grip. You are
    carrying an old, faithful alarm that was built to keep small people safe — and
    somewhere along the way it began firing at unread emails and quiet hallways and
    the ordinary risk of a Tuesday. It tells you to check again. It tells you something
    is wrong. It has been awake so long it no longer knows how to believe that nothing
    is.


    Here, in a voice meant to be read close and slow, you''ll come to recognize the
    false alarm for what it is — not proof that you''ve failed, but a frightened,
    devoted part of you working from old instructions. You''ll learn to catch the
    first flicker of that bracing, the instant before it becomes a flood of checking
    and second-guessing. You''ll feel what it is to place a warm hand over the worry
    instead of obeying it — to say, gently, I hear you, and there is nothing to catch
    right now. And slowly, in your own chest, you''ll begin to feel the difference
    between a real danger and a heart that simply loves too hard to tell the two apart.


    This is not a cure. It will not hand you a quiet, certain mind by Friday, and
    it will not turn your own thinking into one more thing to manage and optimize.
    There is nothing to win here, no streak to protect, no calmer parent you must
    become before you''re allowed to rest. The false alarm may sound again tomorrow.
    That''s allowed. Nothing here asks you to be finished.


    What you''ll have instead is a way of meeting it — the warmth of being understood
    by someone who has stood in that same kitchen, spoon in hand, sure something was
    wrong — and a few honest minutes where the alarm can finally rest in your open
    palm.


    You were never failing to hold it all together. You''ve just been keeping watch
    so long you forgot the danger was a story your love kept telling.


    Let the alarm be what it is. Then, breath by breath, let it quiet.


    Book 1 of the Heart Transmission Press overthinking series.'
