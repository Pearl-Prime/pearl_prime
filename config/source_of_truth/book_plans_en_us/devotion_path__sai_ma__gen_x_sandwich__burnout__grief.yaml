description:
  short_blurb: A Gentle Guide to Moving Through Grief Without Forcing Yourself to 'Get Over It' get my energy back without quitting everything.
  long_description: |
    A Gentle Guide to Moving Through Grief Without Forcing Yourself to 'Get Over It'

    This book is for manager + parent + caregiver to aging parents who I have nothing left and I can't stop. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.

    Chapter by chapter, you'll work with what the weight you carry really means in your body and mind, and how to work with it. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.

    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.

    Book 3 of the Devotion Path burnout series.
