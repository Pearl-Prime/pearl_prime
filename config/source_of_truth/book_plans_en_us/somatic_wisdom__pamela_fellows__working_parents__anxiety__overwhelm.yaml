title: Too Much, All At Once, And It's Only Tuesday
subtitle: For the working parent at capacity — when every demand arrives at the same
  moment and there is no room left to breathe, let alone think
cover_tagline: Everything needs you right now, and there is none of you left.
description:
  short_blurb: The inbox, the dinner, the homework, the text you forgot to answer,
    the small voice asking one more thing — all of it arriving at once, and the floor
    going out from under you. This is a body-first companion for the parent who is
    past capacity and still being asked for more. It won't help you do more. It will
    help you find a small, solid place to stand inside the flood.
  long_description: 'It''s 6:10pm. The pasta is boiling over, your phone is buzzing,
    one kid is crying about a sock and the other needs a permission slip signed by
    tomorrow, and somewhere underneath all of it your laptop is still open with the
    thing you didn''t finish. It is too much. Not metaphorically — your body knows
    it as a physical fact, a rising water, a pressure behind the eyes, a hum that
    drowns out your own thinking. You are not weak. You are at capacity, and the demands
    keep arriving anyway.


    This book is for the parent who is carrying it all and feeling the carry. Who
    can''t find the bottom of the to-do list because there isn''t one. Who lies down
    at night with a body still buzzing from a day that asked for more than any nervous
    system was built to hold. Who has started to feel that the only options are to
    keep going until you break, or to break now. There is a third thing, and it isn''t
    doing more. It''s learning what overwhelm actually is in the body — and how to
    meet the flood without being swept away by it.


    Here you''ll come to recognize the moment the water starts rising, before it''s
    at your throat. You''ll feel where overwhelm grips you — the shallow breath high
    in the chest, the tightening, the way your attention scatters into a hundred open
    tabs. You''ll learn to find one solid thing: the floor under your feet, the breath
    that goes lower than the last one, the single next thing instead of all the things.
    Not to conquer the flood. To remember that you are standing in it, and the ground
    is still there.


    This is not a productivity system. There''s no optimizing, no life-hack to fit
    forty hours into a day, no push-through. We will not tell you the answer is to
    manage your time better while your body screams that the problem is the load,
    not your scheduling. Nothing here promises a calm, empty life — that life isn''t
    coming, and you don''t need it to. You need a way to be a person inside a full
    one.


    You are allowed to put something down. You are allowed to not finish. The flood
    will rise and the flood will pass, the way weather does, and you can learn to
    let it move through a body that has found its footing. You don''t have to hold
    the ocean back. You just have to find your feet.


    Book 2 of the Felt Sense Publishing anxiety series.'
