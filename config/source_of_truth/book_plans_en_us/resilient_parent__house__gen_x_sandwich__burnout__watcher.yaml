title: Always Listening for the Next Thing to Go Wrong
subtitle: For the parent who can never fully clock out — the mind that keeps scanning
  for the call, the fever, the fall, even in the rare quiet
cover_tagline: Even the silence feels like it's about to break.
description:
  short_blurb: Part of you is always on watch. Listening for the cry down the hall,
    the phone that rings at the wrong hour, the small sign that someone is about to
    need you. This is a small book for the parent whose mind never goes off duty —
    and for the radical idea that you're allowed to stop scanning for a few stolen
    minutes, and just be off.
  long_description: 'Some part of you is always listening. Even now, even in the rare
    quiet, you''re half-tuned to the hallway in case a child stirs, half-braced for
    the phone in case it''s the care home, the hospital, the bad-news hour. You scan
    faces for the change you''ve learned to catch early. You sleep with one ear open.
    You can''t remember the last time you were fully, genuinely off duty — because
    the watching is how you''ve kept everyone safe, and it has never once switched
    off.


    This book is for you. The one in the middle, keeping a child and a parent both
    in view at the same time, running a watch that never gets to rest. You are not
    paranoid and you are not controlling. You are simply the person who has learned,
    through real emergencies, that vigilance is love — and now the vigilance won''t
    let go, even when there''s nothing to catch.


    You''ll come to recognize the watcher in you. The part of the mind that treats
    every silence as the calm before something, that mistakes rest for danger because
    resting once meant missing something. The way you keep watch for trouble that
    almost never comes, and how the watching costs you the very quiet it''s standing
    guard over. The way it gets loudest in the stolen moments — the pause in the car,
    the minute after bedtime — when there''s finally nothing to do and your mind refuses
    to believe it.


    This is not a book about control, and it will not teach you to manage your mind
    into stillness. There''s no breathing trick here that promises to switch the alarm
    off for good, no worry to optimize away. It will not tell you to stop caring,
    and it will not promise that nothing bad will happen. It cannot undo the part
    of you that learned to stay ready.


    What it offers instead is something gentler: a way to let the watch stand down
    for the length of one stolen moment. To trust, for just a minute, that you can
    be off — that the world will hold while you set the watching down. To let a small
    pocket of quiet be quiet, instead of a warning.


    You are allowed to stop listening for a moment. You are allowed to be off duty,
    even briefly, even now.


    Book 3 of the Stolen Moment Press Sandwich Generation Burnout series.'
