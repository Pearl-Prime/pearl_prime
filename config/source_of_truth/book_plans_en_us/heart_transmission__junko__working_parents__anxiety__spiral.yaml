title: The 2am Thought That Multiplies
subtitle: For the working parent caught in the downward pull of one worry becoming
  a thousand — and the gentle way out of the loop
cover_tagline: One thought. Then a thousand. Then dawn.
description:
  short_blurb: 'It starts with one small worry about your child, your job, the thing
    you forgot — and by 2am it has bred into a thousand, each one pulling you further
    down. This book won''t argue with the spiral. It offers something quieter: a warm
    hand to hold as the pull lets go on its own.'
  long_description: 'It begins so small. A single thought — did I handle that right,
    is she okay, what if. And then it splits. One worry becomes three, three become
    a dozen, and soon you''re lying in the dark following a chain of what-ifs down
    a staircase with no bottom, certain that if you just think it through one more
    time you''ll finally feel safe. You never do. The spiral feeds on the thinking.
    The more you chase the bottom, the deeper the staircase grows.


    This book is for the working parent whose mind turns one fear into a thousand.
    You are not obsessive and you are not losing it. You have a caring, vigilant mind
    that learned somewhere that worry equals protection — that if it just runs the
    scenario enough times, it can keep the people you love from harm. It is trying
    to save you. It is only exhausting you, and stealing the very rest that would
    let you meet tomorrow whole.


    Here, in a voice that meets you in the dark without flipping on a harsh light,
    you''ll come to recognize the spiral by its feel: the false promise of one more
    loop, the way each answered worry quietly breeds two more questions. You''ll learn
    that you cannot out-think a spiral, and that you were never supposed to. You''ll
    discover what it''s like to stop wrestling the thought and simply notice it spinning
    — to let it turn without climbing on. You''ll feel the quiet that comes not from
    solving the worry, but from setting down the rope you''ve been hauling on all
    night.


    This is not a thought-control technique to master, and it will not promise you
    a mind that never spirals again. There is no streak to keep, no perfect calm you
    must reach, no optimized routine that ends rumination for good. The pull may come
    again tomorrow night, and find you tired. That''s allowed. You don''t have to
    win to be free of it.


    What you''ll have instead is a way to be with the spiral without being swept down
    it — the warmth of company in the dark, and the slow relief of a thought that
    loosens the very moment you stop chasing it. The loop will quiet. Not because
    you finally won the argument, but because you gently stopped having it.


    You don''t have to think your way to safety. You only have to let go of the next
    loop.


    Book 3 of the Heart Transmission Press anxiety series.'
