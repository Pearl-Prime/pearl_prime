title: 'After the Flame: Too Many Things, Not Enough You'
subtitle: How Millennial Women Professionals Are Rewriting the Rules of Burnout
cover_tagline: When everything is urgent, nothing is — and you're the one drowning
  between the two.
description:
  short_blurb: Burnout doesn't always look like exhaustion. Sometimes it looks like
    forty-one open tabs and no idea which one is on fire. This is a no-nonsense field
    guide for professional women whose burnout took the shape of too-much-at-once.
    It won't help you do it all faster — it'll help you stop trying.
  long_description: 'It''s not that you can''t handle your job. It''s that all of
    it is happening at the same time, in the same hour, in the same overloaded corner
    of your brain, and somewhere in the noise you''ve lost the ability to tell what
    actually matters from what''s merely loud.


    You open your laptop and your chest tightens before you''ve read a single word.
    The Slack badge is in the hundreds. There are three meetings you should have prepped
    for, a ''quick favor'' that wasn''t quick, and a whole personal life waiting in
    a folder you haven''t opened in days. You are not lazy and you are not incompetent.
    You are buried.


    For some women burnout arrives as a slow grey fade. Yours arrived as a flood —
    too many inputs, too many people wanting a piece of you, too many decisions stacked
    on decisions until the stack itself became the emergency. The overwhelm isn''t
    proof you''re failing. It''s proof your nervous system has been treating everything
    as equally urgent for so long that it has forgotten how to triage at all.


    So this book works in three passes. It starts by recognizing overwhelm as its
    own specific state — not weakness, not a time-management failure you can spreadsheet
    your way out of. Then it does the thing every productivity system refuses to do.
    It doesn''t reach for the to-do list. It turns you toward the flood instead of
    frantically damming it, because the reflex to immediately sort, rank, and conquer
    the chaos is the very same depleting reflex that pulled you under in the first
    place. And in the last pass it rebuilds your relationship with ''too much,'' until
    not everything has to be carried at once, by you, today.


    Let''s be clear about what this won''t do. There is no inbox-zero method in here.
    No matrix for sorting urgent-versus-important, no app, no five-minute hack to
    win back your calendar. This book will not make you more efficient at being overwhelmed.
    It has no interest in optimizing your overwhelm — it''s interested in getting
    you out of it.


    What it gives you instead is the one thing the systems can''t: permission to set
    it down. The plain recognition that ''too much at once'' is a real and nameable
    experience, that the panic riding underneath it is your body sounding a true alarm
    about an unsurvivable load, and that you do not have to earn the right to put
    some of it down by first proving you tried hard enough to carry all of it.


    You are not behind. You are not the bottleneck. You are a person who was handed
    more than any one person can hold — and you are allowed to loosen your grip.'
