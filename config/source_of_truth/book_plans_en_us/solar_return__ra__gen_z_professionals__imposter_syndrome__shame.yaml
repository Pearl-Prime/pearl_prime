title: The Part of You That You Keep Out of Frame
subtitle: For the early-career worker who is sure they got in by mistake — and that
  being truly seen would end it
cover_tagline: You didn't sneak in. You just never let the warmth of it be yours.
description:
  short_blurb: Someone tells you you're doing great, and instead of warmth you feel
    the floor drop, because now there's further to fall when they find out. This is
    a book about the shame that runs under every win — the quiet certainty that you,
    specifically, are the flawed one — and the slow relief of being seen and not burned.
  long_description: 'Someone praises your work, and your whole body goes cold instead
    of warm.


    That''s the tell. Not nerves, not butterflies — a colder thing. The offer is real.
    The title is real. And still, under your sternum, a small voice keeps the books
    on everything you''ve gotten away with: the email that took three hours, the answer
    you Googled, the night you stayed up so no one would see how hard it actually
    was. You smile and say thank you and add the praise to the pile of evidence you''re
    hiding. Because some part of you is sure that if they ever saw the real you —
    the one who doesn''t quite get it, the one barely holding the shape together —
    it would be over.


    This book is for that part. The one you keep just out of frame. It''s for the
    early-career creative or knowledge worker who has gotten so good at the cover
    that almost no one knows there''s a cover — and who is bone-tired from holding
    it up.


    You''ll come to recognize the shape of it. The false alarm that fires when there''s
    no real danger, just praise you can''t let in. The flood of over-preparing that
    leaves no room to feel anything but watched. The spiral that turns one offhand
    comment into a thousand at 2am. The grief, quiet and unnamed, for the version
    of you that never got to just be good at something without bracing. The reflex
    to scan every calmer-looking person in the room and rank yourself last. And underneath
    all of it, the oldest belief: that the defect is in you, specifically, and the
    achieving has only ever been a way to keep it covered.


    This is not a book that will fix you, because you were never broken — only banked,
    like a fire someone decided had gone out. It will not polish your confidence or
    hand you a script to fake it louder. It won''t make the cold drop stop on command.
    What it will do is sit close enough, and long enough, that you can finally look
    at the thing you''ve been guarding — and find out it was warmth the whole time,
    not a wound.


    You are allowed to be seen. Not the polished frame. You. The one who tried twice
    as hard and called it luck. That one gets to stay, and gets to be warm.


    Book 1 of the Ember & Ash Publishing imposter syndrome series.'
