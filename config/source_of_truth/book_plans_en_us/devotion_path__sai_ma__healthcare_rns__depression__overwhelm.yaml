title: When There Is Nothing Left to Pour
subtitle: When the flood of everyone's need has hollowed you out, and the nurse who
  tends the whole floor comes home with no vessel left for her own life
cover_tagline: You were never meant to be the cup that never empties.
description:
  short_blurb: You give and give until the giving runs you dry, and then you drive
    home to a life you have nothing left to feel. This is for the nurse whose depression
    looks like depletion — the flood of everyone's need arriving at once, with no
    room left inside for your own. It will not ask you to refill faster. It will ask
    you to set the cup down.
  long_description: 'It comes for you somewhere between the medication pass and the
    third call light, the moment you realize there is more arriving than you can hold.
    Another admission. Another family in the hallway. Another alarm. You meet it the
    way you always do — competently, kindly, completely — and somewhere in there the
    part of you that has its own life quietly goes under. You get home and you cannot
    decide what to eat. The texts go unanswered. The flood that emptied you all shift
    has left no room inside for anything that is yours.


    This book is for the nurse whose depression does not look like sadness. It looks
    like depletion. You are not collapsed in bed; you are doing everything, holding
    everyone, and feeling almost nothing underneath the competence. You have been
    the open vessel everyone reaches for so long that you forgot a vessel can run
    dry — and that when it does, the dryness is not a character flaw. It is an emptying
    that was never allowed to refill.


    Gently, without rushing you anywhere, you will come to recognize the shape of
    your own overwhelm: how the relentless arrival of need taught you to live with
    no inside left; how ''I''m fine'' became the thing you say while the well goes
    lower; how the flood does not stop because you are tired, and how you stopped
    expecting it to. You will be invited to do the one thing the work has trained
    out of you — to be the one who is held instead of the one who holds. To let the
    cup sit empty on the table without calling it failure. To trust that a well refills
    in the dark, slowly, when no one is drawing from it.


    This book will not optimize your resilience or hand you a self-care routine to
    perform between shifts. It will not promise you will feel full by Friday, or teach
    you to pour more efficiently. There is no fix here, because you were never broken
    — only poured out past what any person can give and never once refilled. Nothing
    in these pages will help you carry more.


    You are allowed to be empty. You are allowed to stop, even for the length of these
    words, and let yourself be tended the way you tend everyone else. The well does
    not refill because you forced it. It refills because, finally, you let it rest.


    Book 1 of the Open Vessel Press depression series.'
