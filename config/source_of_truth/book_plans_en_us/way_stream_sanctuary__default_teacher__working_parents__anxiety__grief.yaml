title: 'Anxiety Relief: The Weight You Carry (1)'
subtitle: Living with What You've Lost — Anxiety for Working Parents (The Weight You
  Carry)
cover_tagline: Some of it isn't anxiety. It's grief you never had time to put down.
description:
  short_blurb: Between the job and the kids and the calendar, you never stopped to
    grieve, so it sits in your chest dressed up as anxiety. This is a real talk guide
    for working parents carrying a loss that didn't get its due. It won't rush you
    to closure. It'll help you finally let the grief be grief.
  long_description: 'You don''t have time to fall apart. You have a 7am drop-off and
    a standup at 9 and a kid who needs you to be steady. So whatever you lost, the
    parent, the friend, the marriage, the version of your life you thought you''d
    have, you packed it away and kept moving. And now there''s this low, constant
    hum in your chest you keep calling anxiety, because anxiety is something you can
    manage between meetings. Grief is not.


    This book is for the working parent who never got to mourn. The one who absorbed
    a loss in the cracks of a packed life and has been treating the ache as a problem
    to fix instead of a grief to feel. You''re not anxious so much as unfinished.
    Something in you is still standing at a graveside the rest of your life never
    let you visit.


    You''ll learn to name what''s actually there: not anxiety, but grief wearing its
    clothes. That recognition matters, because you can''t soothe grief with the tools
    you use on worry, and you''ve been trying, and it hasn''t worked, and you blamed
    yourself. Naming it won''t bring back what''s gone. This book makes no such promise.
    What it does is let you stop fighting the wrong battle.


    Then you go down into it, which is the part you''ve been avoiding because you''re
    scared that if you start you won''t be able to function, won''t be able to parent,
    won''t be able to stop. So you''ll learn to go down in a way that fits a life
    with children in it: not a collapse, but a letting-in. Letting the loss be real.
    Letting yourself miss what you miss without immediately needing to be okay for
    everyone who depends on you.


    And you come back changed. Not over it, grief doesn''t end and this book will
    never tell you it does. Changed in that the loss can live in you without masquerading
    as something it isn''t. The ache softens from a constant alarm into something
    you can carry. You stop being afraid of your own sadness.


    This book will not give you closure, five stages, or a timeline. It won''t optimize
    your healing or promise you''ll be lighter by chapter ten. What it offers is permission,
    the permission your life never gave you, to grieve as a working parent: in pieces,
    in the car, in the ten minutes before everyone wakes up. You are allowed to still
    be sad. You are allowed to carry it. It was never anxiety. It was love with nowhere
    to go, and it deserved more than to be managed.'
