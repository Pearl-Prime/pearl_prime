title: Nothing Left by the Time You Get to You
subtitle: For the parent who pours out all day and reaches the end with an empty cup
cover_tagline: You didn't run out of love. You ran out of room.
description:
  short_blurb: By 6pm you've answered to a hundred people, and there's still dinner,
    homework, baths, and a small voice asking for you again. This is for the working
    parent who gives care all day and comes home to give more, quietly carrying nothing
    left. It won't hand you a system. It'll hand you a few minutes that are finally
    yours.
  long_description: 'It usually hits in the doorway. You''ve just walked in from a
    day of being needed — by your boss, your inbox, your phone, the person who wouldn''t
    stop talking — and before your coat is off, three more voices want you at once.
    Mom. Mama. Can you. The dog. The pan''s burning. And somewhere underneath it all,
    a flat, frightening thought you''d never say out loud: I can''t do this one more
    time tonight.


    This book is for the working parent whose day is a flood of other people''s needs,
    all arriving at the same time. Not the parent who doesn''t care — the one who
    cares so much, for so many, that there''s no room left inside to even hear yourself
    think. You''re not cold. You''re not failing your kids. You''re at capacity, and
    you''ve been at capacity for so long you forgot there was ever any other way to
    feel.


    Here you''ll come to recognize what overwhelm actually is: not a flaw in you,
    but the simple math of too much landing in too small a space. You''ll see how
    the flood works — how every demand feels equally urgent until you can''t tell
    the burning pan from the bedtime story, and how the mind goes numb not because
    it''s broken but because it''s protecting you. You''ll learn to find the one small
    still pocket in a full evening: the pause in the car before you go in, the ninety
    seconds behind the only locked door in the house, the breath you catch between
    one demand and the next. Not to do more with. To finally do nothing with.


    This book will not give you a routine. It will not optimize your evenings or promise
    you a calmer, more grateful version of yourself by Friday. There is no morning
    ritual here, no checklist, no one more thing to add to a life that is already
    too full. That''s the whole point. A depleted parent does not need another task.
    You need somewhere to set the load down for a minute, and someone to tell you
    that setting it down is allowed.


    Nothing here asks you to give more. It only asks you to notice how much you already
    give, and to take back a few minutes that no one will miss but you.


    You are allowed to be a person who ran out of room. That''s not the end of your
    tenderness. It might be the beginning of getting it back.


    Book 1 of the Stolen Moment Press compassion fatigue series.'
