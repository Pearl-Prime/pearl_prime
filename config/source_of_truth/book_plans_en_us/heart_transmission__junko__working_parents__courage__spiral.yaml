title: Ninety-Three Versions of the Conversation
subtitle: For the working parent who rehearses every catastrophe before they can act
  — and never reaches the step
cover_tagline: You have lived the worst outcome a hundred times tonight. You still
  haven't said the first word.
description:
  short_blurb: One worry becomes ten. Ten become a hundred. By the time you've played
    out every way the conversation could go wrong, you're too exhausted to have it
    at all. This is a book for the working parent whose courage drowns in the spiral
    before it ever gets its turn.
  long_description: 'It starts as one small thought. I should say something. And then
    it begins to multiply. What if they''re hurt. What if they''re angry. What if
    I make it worse. What if I''m the problem. By midnight you''ve lived the conversation
    ninety-three times, in ninety-three different disasters, and you still haven''t
    said a single word out loud. The spiral has done what it always does: it has worn
    the courage right out of you.


    This is a book for the working parent caught in that downward pull. You are not
    weak, and you are not lazy. You are running a brilliant, tireless mind on a loop
    that feels like preparation and is really just fear feeding itself. Every rehearsed
    catastrophe feels like protection. None of it ever gets you to the step. You stay
    at the edge, spinning, certain that if you can just think it through one more
    time you''ll finally feel ready to leap.


    Here, you''ll come to recognize the spiral as it begins — the first thought, the
    quickening, the familiar pull of the next worst case. You''ll feel how the rumination
    promises safety and delivers only more rumination. You''ll see the belief humming
    underneath it: that thinking is the same as doing, that you can plan your way
    out of being afraid. And you''ll learn the thing the spiral can never tell you
    — that courage doesn''t live at the bottom of the next thought. It lives in the
    one small action you take before the thinking is finished.


    This book will not give you a way to out-think the spiral or shut your mind off
    on command. It won''t promise calm, or a fix, or a quieter head as a reward for
    trying hard enough. Your overloaded, over-rehearsing heart is not a machine that
    needs better settings. What''s offered is gentler: a hand on your arm in the dark
    that says, you''ve thought about this enough — and a way to step off the wheel
    and into the smallest true thing you can actually do.


    You don''t have to follow the next thought down. You can let the conversation
    be imperfect. You can act before you''ve solved it, and discover the spiral was
    never the only way.


    Book 2 of the Heart Transmission Press working parents courage series.'
