title: The Version of College You Don't Get to Have
subtitle: For the student grieving what was lost — the easier years, the certain plan,
  the person you were before the anxiety arrived
cover_tagline: You're not just anxious. You're mourning who you were before.
description:
  short_blurb: 'Some of your anxiety isn''t fear of what''s coming — it''s grief for
    what''s already gone: the easier version of yourself, the plan that felt certain,
    the college experience you pictured and didn''t get. This is a book about the
    loss tangled inside the worry, and about what it means to finally let go of a
    version of things that was never going to be.'
  long_description: 'There''s a version of this you were supposed to have. The college
    years everyone promised — lighter, surer, the ones where you knew what you were
    doing and who you were going to be. And somewhere along the way, between the deadlines
    and the dread and whatever else this season took from you, that version quietly
    stopped being possible. You don''t always have words for it. But some of the weight
    you''re carrying isn''t fear of what''s ahead. It''s grief for what''s already
    gone.


    This book is for you — the student mourning something you can''t always name.
    Maybe it''s the self you were before the anxiety moved in. Maybe it''s a plan
    that fell through, a relationship that ended, a year you lost, a future you''d
    already decorated in your head. Maybe it''s just the easier person you assumed
    you''d get to keep being. Whatever it is, you''ve been treating the ache like
    a problem to fix, when it was never that. It''s a loss to be felt.


    You''ll come to recognize the grief threaded through the worry — how anxiety and
    mourning can wear the same face, how bracing for the future is sometimes just
    refusing to let go of the past, how you can be homesick for a version of your
    life that never actually arrived. You''ll see why no amount of trying harder closes
    the gap, because the gap is not a failure. It''s a loss, and a loss is not something
    you get past on a deadline. It''s something you grieve.


    This book will not promise to give the lost thing back, or hand you five steps
    to ''move on,'' or reframe your way around the ache. There is no fix here, because
    grief was never broken. What''s here is the permission to set down a version of
    things that was never going to be — gently, and in your own time, the way you''d
    close the last page of a long semester and just sit with the quiet of it being
    over.


    You are allowed to miss who you were. You are allowed to mourn the plan that didn''t
    happen, even while you keep walking toward the one that will. You can let it go
    without pretending it didn''t matter. You can breathe.


    Book 5 of the Blue Exam Press anxiety series.'
