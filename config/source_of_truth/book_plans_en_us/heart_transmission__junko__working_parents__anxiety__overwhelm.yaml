title: When the Whole Day Arrives in One Breath
subtitle: For the working parent with too much landing at once — finding a single
  still room inside the noise where you can set one thing down before the next
cover_tagline: There's no room left to think. Let's make a little.
description:
  short_blurb: The texts, the timers, the small voice asking for something while your
    phone rings and dinner burns — it all arrives at once, and there is simply nowhere
    left to put it. This book doesn't add one more task. It clears a small, warm room
    inside the flood, just big enough to breathe.
  long_description: 'It all comes at the same time. The work message marked urgent.
    The child tugging your sleeve. The pot boiling over. The calendar alert. The sense
    that you are being asked for more than there is of you — and that everyone, somehow,
    expects you to hold it without dropping a single thing.


    This book is for the working parent who has gone past capacity. Not lazy, not
    disorganized — flooded. You are pouring yourself out faster than anything can
    fill you, and the anxiety you feel isn''t weakness; it''s the honest signal of
    a vessel that has run dry while the demands keep arriving at the door. The mind,
    with no room left to set anything down, starts to roar. And the roar convinces
    you that the only way through is to move faster — when faster is exactly what
    emptied you.


    Here, in a voice that slows the moment down on purpose, you''ll come to recognize
    overwhelm not as a personal failure but as a flood that has filled the room where
    you used to be able to think. You''ll learn to feel the difference between everything
    is on fire and many things are merely loud. You''ll discover how to set down even
    one thing — not by managing it more cleverly, but by letting your hands open.
    You''ll find what it''s like to come back to a single breath while the world keeps
    knocking, and to trust, for once, that the knocking can wait the length of one
    slow exhale.


    This is not a productivity system in soft clothing. It will not promise you an
    empty inbox or a serene household or a version of you who finally has it all handled.
    There is no method here to optimize your capacity so you can absorb even more.
    The flood is real, and some days it will rise again past where you can hold it.
    That''s allowed. You are not the one who is supposed to be infinite.


    What you''ll have instead is a way to find one quiet room inside the noise — a
    warm, unhurried place where too much becomes, just for a moment, only this. The
    dishes will still be there when you open your eyes. So will the inbox. So, more
    whole than before, will you.


    You were never meant to hold it all at once. You only have to hold what''s in
    this breath.


    Book 2 of the Heart Transmission Press anxiety series.'
