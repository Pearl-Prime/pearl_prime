title: 'Setting Boundaries: Carrying What You Can''t Say (2)'
subtitle: Understanding How Shame Works in Your Body and Mind — and How to Release
  It — Boundaries for Gen Alpha Students (The Hidden Weight of Shame)
cover_tagline: You don't set the limit because part of you thinks you don't deserve
  one.
description:
  short_blurb: 'There''s a quiet belief underneath your blurry boundaries: that wanting
    space makes you difficult, that needing less makes you weak, that something about
    you is the problem. This one-hour read goes straight to the shame that keeps you
    from drawing the line, and shows you it was never the truth about you.'
  long_description: 'You let people take more than you actually have to give, and
    you tell yourself it''s just easier this way. But underneath the easier is something
    a lot heavier: a quiet belief that if you ever asked for space, set a limit, or
    said the words this is too much for me, people would finally see the thing you''re
    scared is true. That you''re too sensitive. Too needy. Too much work to be around.
    That there''s something just a little bit wrong with you that a boundary would
    put on display. So you swallow it and keep carrying the weight, because being
    overloaded feels safer than being found out. This book is for the student whose
    boundaries collapse under a shame they have never once said out loud.


    Shame is sneaky because it almost never feels like shame. It feels like the truth.
    It feels like you''re simply being realistic about how annoying and high-maintenance
    it would be to actually have needs and voice them. But the voice telling you a
    boundary would expose something broken in you is not reporting a fact. It''s an
    old belief you absorbed somewhere, from a comment, a relationship, a season when
    your needs genuinely were inconvenient to someone, and it has been quietly making
    your decisions ever since. It feels like insight. It is really just an echo.


    This is the one-hour edition, the spine of the work in a single sitting, written
    under the pen name Jonah Kim, and it moves through three turns. First the recognition,
    catching the buried belief that your needs make you a burden as it runs underneath
    every yes you didn''t mean. Then the descent, going down into it instead of working
    even harder to seem low-maintenance and easy, into the part where you let yourself
    actually feel the shame and look square at where it came from. Then the climb
    back, where you find you can hold a line without first auditioning, without proving
    you''ve somehow earned the right to have one.


    This won''t make you shame-proof or rewire how you feel about yourself in sixty
    minutes. It won''t promise that setting a limit suddenly feels deserved and clean,
    and it won''t hand you a way to never feel like too much ever again. The old belief
    may still whisper when you least expect it. What changes is that it stops being
    the thing that decides whether you get to take up space at all.


    You were never too much. You don''t have to be easy to deserve a limit, and a
    boundary is not a privilege you have to be good enough to earn before you draw
    it.'
