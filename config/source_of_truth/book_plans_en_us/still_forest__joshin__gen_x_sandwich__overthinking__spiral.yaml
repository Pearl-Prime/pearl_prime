title: A Single Seed at Midnight, a Thicket by Dawn
subtitle: For the late-night mind that takes one ordinary thought — a bill, a cough,
  a half-read text from your kid — and lets it grow into a thousand branching what-ifs
cover_tagline: It always starts with one small thought. By 3am it has become every
  disaster you've ever feared.
description:
  short_blurb: It begins with one ordinary worry — a bill, a cough, a thing your kid
    said — and within minutes it has branched into a hundred, each one feeding the
    next, pulling you down and down. This is the book for the mind that cannot stop
    following the thread. It will not hand you a thought to think your way out. It
    will show you how to step off the spiral and let the water go still.
  long_description: 'It starts so small. A line on the bank statement. The way your
    father paused on the stairs. A short text from your daughter that could mean nothing,
    or could mean everything. Just one thought — and then it forks, and forks again,
    until you are lying in the dark following a thousand branching what-ifs down into
    the same dark place you end up every night, certain that if you could just think
    it through one more time, you would finally be safe.


    You never are. The spiral does not lead to an answer. It leads to more spiral.


    This book is for you — the one whose mind takes a single worry and grows a forest
    from it, who lies awake rehearsing conversations that will never happen and funerals
    no one has died for, who knows the rumination is not helping and cannot, for the
    life of you, make it stop. You will come to recognize the spiral for what it is:
    not problem-solving, but a loop that feeds on itself, a tired mind mistaking motion
    for safety. You will see how each thought hands the next one fuel, how the downward
    pull disguises itself as diligence, and how the people who love you have learned
    the far-off look on your face when you have left the room without moving.


    We will not try to out-think the spiral; you have tried that for years, and it
    only grew stronger roots. Instead we will move at the pace of the deep forest,
    where you learn to notice the first thought before it branches — and let it drift
    down to the forest floor, unfollowed, the way one leaf falls without taking the
    whole canopy with it. We will let the stirred water go clear by doing the one
    thing the spiral cannot survive: nothing.


    This book will not promise to empty your mind or hand you a calm you have to perform.
    It offers no five-step system, no optimization, no trick that becomes one more
    thing to get right at midnight. It will not tell you the worries don''t matter
    — they come from how deeply you love.


    What it offers is the moment of choice you forgot you had: the small, quiet space
    between the first thought and the thousandth, where you can step off the path
    and simply stand among the trees. You do not have to follow this one down. You
    are allowed to let it fall.


    Book 2 of the Still Forest Press overthinking series.'
