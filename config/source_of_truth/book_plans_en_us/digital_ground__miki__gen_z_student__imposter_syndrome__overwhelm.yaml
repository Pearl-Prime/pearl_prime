title: Too Many Tabs Open
subtitle: For the student drowning in everything due at once — when the workload outruns
  your capacity and the screen just goes blank
cover_tagline: The to-do list got so loud you stopped being able to start.
description:
  short_blurb: Seven deadlines, a hundred open tabs, and somehow you're frozen, doing
    none of it. This is a book about the flood — when too much arrives at once and
    your brain just shuts the door — and why going blank isn't laziness.
  long_description: 'There are too many tabs open. The literal ones on your laptop,
    and the ones in your head — the essay, the reading, the email you haven''t answered,
    the thing due Friday you can''t even look at yet. It''s all arriving at the same
    time, and instead of doing any of it, you''re just sitting here, frozen, scrolling.


    It looks like procrastination. It feels like failing. But what''s actually happening
    is simpler and kinder than that: more is coming in than you have room to hold,
    and your brain has done the only thing it can with a flood — it''s shut the door
    and gone quiet.


    This book is for you — the student who used to be on top of it and now can''t
    find the bottom of the pile. The one who opens the document and closes it. The
    one whose group chat is going off about how much there is to do while you stare
    at the ceiling, capacity gone, certain everyone else is somehow handling the exact
    same load.


    Here''s the part no one tells you: the freeze isn''t a willpower problem, so willpower
    can''t fix it. You can sit at your desk for three hours with everything open and
    produce nothing, not because you don''t care but because a flooded brain can''t
    choose a starting point — every task feels equally urgent, which is its own kind
    of paralysis. And then the not-doing becomes its own weight, a second deadline
    stacked on the first, proof in your head that you''re falling behind while everyone
    else just gets on with it. They''re not, by the way. They just didn''t post the
    part where they sat frozen too.


    You''ll come to recognize overwhelm as a real limit being hit, not a character
    flaw. You''ll learn why the shutdown happens — how a brain that''s maxed out stops
    being able to think, and why pushing harder against it only makes the door heavier.
    You''ll find what it feels like to put the phone down, take one breath that''s
    only about this breath, and let the flood drain to a single next thing instead
    of all the things.


    This won''t turn you into someone who never gets overwhelmed. It won''t hand you
    a system, a planner, or a five-step morning routine that fixes your whole degree.
    The point was never to make you hold more.


    The point is that you were never supposed to carry all of it at once. The flood
    is real and so is the limit, and you''re allowed to set the rest down, find the
    ground under your feet, and do the one thing in front of you — and only that.


    Book 2 of the Present Tense Books imposter syndrome series.'
