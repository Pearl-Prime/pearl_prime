title: 'Overcoming Depression: The Grief That Doesn''t Leave (1)'
subtitle: A Field Guide for First Responders Navigating Depression
cover_tagline: Some of them you carry home. This is for the ones who never got off
  the truck.
description:
  short_blurb: You answered the call. You did the job. And then a piece of it followed
    you into the rest of your life and never left. This is an hour for the grief that
    doesn't show up on the run sheet — the kind that lives quietly under everything
    for a first responder who was never given the room to put it down.
  long_description: 'Somewhere along the way the color drained out. You still show
    up. You still run the calls, still clear the scenes, still come home and answer
    when someone talks to you. But you''re doing it from behind glass. Food doesn''t
    taste like much. The things that used to land — your kid''s game, a good shift,
    a day off — land soft, muffled, far away. People call it depression and maybe
    it is. But underneath the flatness there''s a name. A face. A call you never put
    down, that quietly took the color with it when it left.


    This hour is for first responders running on empty after a loss that never got
    grieved. Not the dramatic kind of empty — the gray kind. The medic who stopped
    feeling much of anything after a bad one and called it being a professional. The
    cop going through the motions a year after a death that nobody connected to how
    flat he went. The firefighter who can''t remember the last time something felt
    good. The dispatcher who heard it happen and has been operating at half-volume
    ever since. The job taught you to shut the feeling off mid-call so you could work.
    What nobody mentioned is that the switch can get stuck — and what gets stuck off
    isn''t just the grief, it''s everything.


    So we go after the thing under the numbness. We don''t dig for a feeling you''re
    supposed to perform; we find the loss the flatness is sitting on top of, the specific
    one, and we let it actually weigh something for an hour. That''s the part the
    job never let you do — there was always a next call. The flatness isn''t your
    personality and it isn''t permanent. It''s what happens when a grief gets sealed
    off and takes the good stuff down with it. Open that, even a crack, and the color
    starts bleeding back in around the edges.


    This is not a mood-tracking app or a list of habits that fix your brain in thirty
    days. It won''t tell you the emptiness means you''re broken, because it doesn''t.
    What it will do is connect the flat gray nothing back to the loss that caused
    it — and give you one honest hour to feel the person you''ve been numb about instead
    of around.


    You went quiet so you could keep working. Everybody needed you functional, so
    you functioned. For one hour, you don''t have to run at half-volume. Let it hurt
    a little. That''s not the depression getting worse — that''s the feeling coming
    back. Sit with it here. It''s safe to.'
