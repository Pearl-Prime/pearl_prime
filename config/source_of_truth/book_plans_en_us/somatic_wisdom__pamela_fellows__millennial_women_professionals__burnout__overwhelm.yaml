title: The Day Doesn't Fit Inside Me Anymore
subtitle: For the capable woman whose body has reached its edges — when the deadlines,
  the messages, and the asks all flood in at once and your nervous system has no shore
  left
cover_tagline: You didn't fail the day. The day arrived all at once, and your body
  had no more room.
description:
  short_blurb: There's a moment when the inbox, the calendar, the people who need
    you, and the dishes in the sink all reach you in the same breath — and your chest
    goes tight, and you can't find the first thread to pull. This is a book for the
    woman who keeps functioning while quietly drowning, written not to help you do
    more but to make room in a body that has none left.
  long_description: 'It usually arrives in the body before it arrives in words. Your
    chest tightens. Your breath climbs up into your shoulders. Three things are happening
    at once and then it''s seven, and somewhere in there you stop being able to find
    the first thing to do — so you freeze, or you move faster, and either way the
    flood keeps rising.


    This book is for the woman everyone calls capable. The one who holds it together
    at work, holds it together at home, answers the message, makes the appointment,
    remembers the thing nobody else remembered. From the outside you look like someone
    managing. Inside, you''ve run out of room. There''s too much arriving and nowhere
    left to put it, and you''ve started to wonder if the overwhelm is just who you
    are now.


    It isn''t. Overwhelm is not a character flaw and it''s not a scheduling problem
    you can solve with a better system. It''s a nervous system past its capacity,
    bracing against a flood it was never meant to hold all at once. So this book doesn''t
    start with your calendar. It starts with your body — with the held breath, the
    clenched jaw, the shoulders that have been up near your ears for so long you forgot
    they could come down.


    You''ll come to recognize the flood for what it is: not a moral test you keep
    failing, but a wave passing through a system that needs room to let it pass. You''ll
    learn to feel the ground under your feet again when everything above it is too
    much. You''ll find the difference between doing the next thing and bracing against
    all the things — and you''ll feel, maybe for the first time in a long while, a
    small amount of space open back up inside your own chest.


    This is not a productivity book. It will not teach you to fit more in, move faster,
    or optimize your way to calm. There is no morning routine here that will fix you,
    because you are not broken. What''s here is slower and kinder than that: a way
    to put some of it down, on purpose, and let your body discover it can.


    Nothing in these pages will help you carry more. That''s the point. You''ve been
    strong enough for long enough. You''re allowed to make room.


    Book 1 of the Felt Sense Publishing Burnout series.'
