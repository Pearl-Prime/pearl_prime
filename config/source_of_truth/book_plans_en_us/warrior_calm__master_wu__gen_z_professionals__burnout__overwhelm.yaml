title: The Day Breaks Over You Before You Stand
subtitle: For the young professional flattened by everything landing in the same moment
cover_tagline: When everything is urgent, nothing has room to breathe — least of all
  you.
description:
  short_blurb: Burnout doesn't always look like collapse. Sometimes it looks like
    a competent twenty-six-year-old answering forty things at once and slowly losing
    the ability to feel any of them. This is a steady, unhurried book for the mind
    that has run out of room.
  long_description: 'It is the sheer volume that''s breaking you. Not one crisis —
    all of it, arriving at once. The Slack pings layered over the calendar invites
    layered over the half-finished doc layered over the text you still haven''t answered.
    Your attention is sliced so thin there''s no whole piece of it left, and somewhere
    underneath the multitasking you''ve stopped being able to hear yourself think.


    This book is for the young professional who is good at their job and quietly drowning
    in it. For the one who looks capable from the outside — fast replies, full plate,
    hands on everything — while the inside has become a flooded room with the water
    still rising. You are not disorganized. You are not weak. You have simply been
    asked to hold more than any nervous system was built to hold, for longer than
    anyone should, and you kept saying yes because saying no felt like falling behind.


    Here you''ll come to recognize the flood for what it is. How overwhelm is not
    a backlog to clear but a capacity that''s been exceeded — and how clearing the
    list faster has only ever made the water rise higher. You''ll see the cost you''ve
    been paying in the body: the shallow breath, the jaw, the way you can''t sit through
    a meal or a conversation without the next thing pulling at you. And you''ll find
    the still center that doesn''t require the storm to stop first — the trained calm
    that lets you stand in the middle of too much and stop being swept by it.


    This book will not help you do more. It offers no system, no inbox-zero, no way
    to finally get on top of it all. There is nothing here that will make you a faster
    machine, because you were never meant to be one. The gate that holds does not
    hold by gripping harder. It holds because it is built to.


    What it offers instead is room. Permission to set one thing down without first
    earning the right to. The radical, steadying idea that you are allowed to be a
    person who cannot carry everything — and that this was never a failing in you,
    only proof that you are still alive under all of it.


    You don''t have to get on top of it tonight. You just have to stop letting it
    pull you under. Put the weight down. The floor is still here.


    Book 1 of the Iron Gate Press Burnout series.'
