title: Everyone Else Seems to Be Holding It Together
subtitle: For the one measuring a frayed life against everyone who looks calm — when
  you are sure you are the only one barely keeping up
cover_tagline: You're certain everyone else got the instructions you missed.
description:
  short_blurb: From the outside, everyone else seems to be managing midlife just fine
    — and you are sure you are the only one quietly coming apart. This is a book for
    the mind that measures itself against everyone who looks calm, and always comes
    up short.
  long_description: 'From where you stand, everyone else seems to have figured something
    out. Your friend whose parents are also aging looks composed. The coworker with
    kids the same age as yours seems unruffled. The people in the school pickup line,
    the neighbors, the smiling squares on your phone — they all appear to be carrying
    the same impossible load with a grace you cannot find anywhere in yourself. And
    so you do the math you always do, the quiet arithmetic of falling behind, and
    you come out where you always come out: the only one barely holding on, the one
    who somehow missed the instructions everyone else got.


    This book is for you: the one in the middle of life who measures a frayed, exhausting,
    behind-the-scenes existence against everyone else''s polished front, and always,
    always comes up short. You are not failing. You are comparing your unedited insides
    to the world''s edited outsides, and pointing a sharp, capable instrument — your
    own attention — at the one target guaranteed to make you feel small.


    Walk slowly here, and you will come to recognize something. That the calm you
    see on everyone else is a surface, and you have no idea what runs beneath it.
    That comparison is not measurement but a story, told in your own voice, in which
    you are always the one who is behind. You will learn what the forest knows about
    its trees: that no two grow at the same rate or reach the light by the same path,
    and not one of them is failing for being slower, more weathered, more bent by
    its particular wind. You will begin to feel what it is to stand among the others
    without ranking yourself against them.


    This is not a book that will help you win the comparison, finally catch up, or
    become the calm, together person you imagine everyone else already is. There is
    no benchmark here to hit and no one to overtake. It will not promise that you
    will stop noticing how others appear to cope. What it offers instead is quieter
    and more freeing: a clearing where the measuring can stop, where your weathered,
    particular life is not behind anyone''s, where you can put the sharp instrument
    down and let yourself simply be one tree among many in a forest that is not keeping
    score.


    Nothing here will help you win the comparison. That is the point. The race was
    never real, and the only way to leave it is to stop running it — not by getting
    ahead, but by stepping off the track entirely, into the trees, where no one is
    counting.


    You are not behind. You have just been measuring a forest by a yardstick it was
    never meant to fit. You are allowed to stop.


    Book 6 of the Still Forest Press anxiety series.'
