title: Mourning the Parent You Thought You'd Be
subtitle: For the parent grieving the calm life, the lost time, the self that anxiety
  took — and learning what must finally be released
cover_tagline: Some of this anxiety is grief that was never allowed to land.
description:
  short_blurb: 'Before the kids, before the worry took up residence, you imagined
    a different version of this — calmer, more present, more yourself. This book is
    for the parent carrying a quiet grief underneath the anxiety: for lost time, for
    the life you pictured, for who you were before. It will not rush you past it.'
  long_description: 'No one warned you there would be grief in it. You love your children
    beyond words, and still — there is a loss you carry that you rarely name. The
    version of yourself who slept easily. The unhurried mornings you imagined. The
    calm, present parent you were so sure you''d be, who keeps getting crowded out
    by a worried, depleted one you barely recognize. Somewhere along the way, something
    was taken, or set down, and never properly mourned. And grief that is never allowed
    to land doesn''t leave. It turns into a low, anxious ache that follows you through
    ordinary days.


    This is the grief underneath the anxiety. Not the dramatic kind with a funeral
    and a casserole, but the quiet, ongoing kind — for time you won''t get back, for
    the self you were before, for the spacious life that the relentless demands quietly
    replaced. It rarely gets spoken, because how do you grieve inside a life you chose
    and would choose again. And so it sits, unwept, and hums as worry instead.


    This book is for you: the one who feels a strange sorrow in the middle of a good
    day, the one who catches an old photo and has to look away. The one who is holding
    something heavy and hasn''t been allowed to call it loss. You are not ungrateful,
    and you are not failing to count your blessings. You are a person carrying real
    losses with no place to set them down — and the anxiety, in part, is the weight
    of grief that was never given its hour.


    Slowly, with no schedule and no pressure, you''ll come to recognize the grief
    hiding inside the worry. You''ll learn the difference between fearing the future
    and mourning what''s already gone. You''ll learn what it is to let something be
    finished — to release the self you thought you''d be, the life you pictured, the
    time that won''t return — not because it didn''t matter, but so your hands are
    free for the life that is actually here. Like setting something precious gently
    down, instead of carrying it forever.


    This book will not promise to make the loss not have happened, or rush you toward
    closure on a timeline. It won''t optimize your grief or turn letting go into one
    more task. Some things are gone, and they deserve to be mourned rather than managed.
    What can soften is the part of the anxiety that was only ever unwept grief, waiting
    to be felt.


    You are allowed to miss who you were. You are allowed to set it down. And in the
    quiet after, there is room again — for breath, for stillness, for the parent you
    actually are.


    Book 5 of the Stillness Press anxiety series.'
