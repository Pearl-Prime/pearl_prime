title: There Is No Room Left In Me
subtitle: For the nurse carrying more than any one body can hold — when the shift
  never ends and there's nowhere to put any of it down
cover_tagline: You ran out of room a long time ago, and no one noticed but you.
description:
  short_blurb: Some shifts don't end when you clock out — they just keep arriving,
    alarm after alarm, until there's no room left in you to feel any of it. This book
    is for the nurse who is full past the brim and still being asked to hold more.
    It won't add one more thing to your list. It will help you find, somewhere in
    your own tight chest, a little room to breathe.
  long_description: 'It arrives all at once. The call light, the page, the family
    at the desk, the order that should have been signed an hour ago — and underneath
    all of it, the patient in 4 whose face you will see tonight when you finally close
    your eyes. You are holding so much that you''ve stopped being able to feel where
    one thing ends and the next begins. There is simply no room left in you.


    This book is for the nurse who is flooded. Not lazy, not weak, not bad at the
    job — the opposite. You are good enough at it that everyone keeps handing you
    more, and you keep taking it, because that''s what you do. But capacity is not
    infinite, and a body that has been at the edge of its banks for months doesn''t
    need to be told to be more resilient. It needs somewhere to overflow that isn''t
    the drive home in the dark.


    You''ll come to recognize the flood for what it is: not a character flaw but a
    nervous system that has had too much arrive at once for too long, with no margin
    to recover between waves. You''ll feel how overwhelm lives in the body first —
    the held breath, the shoulders up by your ears, the clench you forgot wasn''t
    normal. And slowly, without forcing anything, you''ll find that there are small
    thresholds inside you where a little room opens. A breath that goes all the way
    down. A moment between tasks that belongs to you and not the floor.


    This is not a productivity system. It will not teach you to do more in less time,
    or to optimize your way back to the version of you who could carry it all. There
    is no carrying it all. That was never the job, even when it felt like it. Nothing
    here asks you to push through, override what you feel, or perform okayness for
    one more soul.


    What it offers instead is room. Permission to set something down. The felt sense,
    returning quietly, that you are a person and not a vessel — and that the flood
    does not get the final word about how much of you is left.


    You are allowed to take up space in your own life again. Even now. Even tired.
    Even full.


    Book 1 of the Felt Sense Publishing Burnout series.'
