title: 'The Weight Without a Name: When Loss Reshapes Everything'
subtitle: A Field Guide for Founders Navigating Overcoming Depression
cover_tagline: The company is fine. You are not. This is about that gap.
description:
  short_blurb: For the founder who built the thing and feels nothing standing inside
    it. This is a field guide to the flat, heavy, nameless depression that arrives
    after a loss you can't point to on the cap table. No fixing it, no optimizing
    your way out, just a way down and a way through.
  long_description: 'It''s a Tuesday and the metrics are green and you are sitting
    in your car in the parking lot because you cannot make yourself walk in. Nothing
    is wrong, exactly. That''s the part that scares you. The round closed, the team
    is hired, the dashboard is up and to the right, and somewhere in the last eighteen
    months a version of you went quiet and never came back.


    This book is for the founder carrying a weight that has no name and no line item.
    You lost something building this company. Maybe the marriage, maybe the friendships
    you stopped returning, maybe the person you were before every decision routed
    through you. You can''t grieve it out loud because, on paper, you won. So it sits
    in your chest as a flat gray nothing you''ve started calling ''just tired.''


    Here''s the real talk: that''s not burnout you can sleep off. That''s grief wearing
    a business casual disguise. The flatness is not the absence of feeling, it''s
    feeling that got too expensive to keep paying, so something in you quietly turned
    the lights down to save power. And the move is not to push through it, reframe
    it, or schedule a recovery sprint.


    First, you name it. You say the actual word for the actual loss, even if only
    to yourself in that parked car. Then you go down into it instead of around it,
    because the heaviness is not a malfunction to debug, it is the size of what mattered.
    You stop treating your own grief like a blocked deploy you have to clear before
    standup. You let it be as big as it actually is. And then, slowly, not on a timeline
    you control, you come back up carrying it differently, with the loss folded into
    you instead of pressing flat on top of you.


    This will not promise you your old energy back by Q3. It will not hand you a morning
    routine or tell you to be grateful you have problems other people would envy.
    There is no optimization here, no productivity angle, no version of you that comes
    out of this ''better'' in a way you can put in an investor update. What it offers
    is plainer and harder: permission to admit the weight is real, language for the
    next time it flattens you at your desk, a way to tell the difference between tired
    and grieving, and a way to keep building without pretending the cost was nothing.


    You are allowed to have lost something while everything looked like winning. You
    are allowed to put it down here, just for a while, and feel exactly how heavy
    it was.'
