title: More Arrived Than You Can Hold
subtitle: For the manager carrying everyone's weight at once — when the body floods,
  the inbox never empties, and there's no room left to feel a single thing
cover_tagline: The flood doesn't ask whether you have room for it.
description:
  short_blurb: Some days, too much arrives at once and your body floods before your
    mind can catch up — chest tight, breath shallow, every input landing on a system
    that's already past full. This is a book for the manager who has been the one
    who holds it together for so long they've forgotten what it costs the body to
    do that. It won't help you carry more. It will help you set some of it down.
  long_description: 'By 11am the requests have already stacked three deep, and somewhere
    underneath the calm voice you use on calls, your body has quietly gone into flood.
    Shoulders up. Breath gone shallow and high in the chest. A pressure behind the
    eyes that has nothing to do with the screen. You keep moving — you always keep
    moving — but there''s a part of you that exceeded its capacity hours ago and is
    still being asked to take on more.


    This book is for you: the one people lean on, the manager who absorbs the overflow
    so the team doesn''t have to feel it. The one who has confused being unflooded
    with being capable, and so has never let anyone see the water rising. You are
    not weak. You are not behind. You have simply been holding more than any single
    body was built to hold, for longer than anyone thought to ask about.


    Here we go slowly. We turn toward overwhelm not as a problem to be solved by Tuesday
    but as a flood that has a shape — and we learn, the way a forest floor learns
    to take the rain, what it means to let some of it move through you instead of
    bracing against all of it at once. You''ll come to recognize the moment the flood
    begins, before it crests. You''ll learn what your tightening jaw and your held
    breath have been trying to tell you. You''ll find that there is a stillness underneath
    the rush — a pool that goes clear the instant it stops being stirred — and that
    it has been waiting for you the whole time.


    This book will not help you do more. It will not hand you a faster reset or a
    tighter morning routine or one more practice to perfect. There is no optimizing
    here, and no finish line where you finally have it all under control. The point
    is not to expand your capacity so you can absorb a bigger flood. The point is
    to remember that you are allowed to have a limit — and to stop treating the reaching
    of it as a failure of character.


    You do not have to hold it all. You were never supposed to. Let this be the place
    where you finally put some of it down, and find that the ground holds.


    Book 1 of the Still Forest Press somatic healing series.'
