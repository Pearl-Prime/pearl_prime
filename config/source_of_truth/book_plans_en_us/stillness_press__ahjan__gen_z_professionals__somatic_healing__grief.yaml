description:
  short_blurb: >
    You're not sure what you're grieving — but something is missing. release what's been held in my body for years.
  long_description: |
    You're not sure what you're grieving — but something is missing.
    
    This book is for UX researchers who my body holds things my mind has been trying to forget. It doesn't promise to make the feeling stop. It names what's happening in language you can use the next time it happens.
    
    Chapter by chapter, you'll work with how unprocessed loss shows up as everyday anxiety. Not through exposure or worksheets or morning routines — through recognition, descent, and integration. The practice the book asks for can happen on a subway, between meetings, or at 3am.
    
    You'll walk away knowing what your body is doing and why it makes sense. Not fixed. Not healed in any final sense. But no longer alone with the pattern.
    
    Book 5 of the Stillness Press somatic healing series.

