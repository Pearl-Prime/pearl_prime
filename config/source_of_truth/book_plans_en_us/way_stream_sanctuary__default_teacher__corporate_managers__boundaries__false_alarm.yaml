title: 'Setting Boundaries: Misreading the Danger Signal'
subtitle: How to Recognize When Anxiety Is a False Alarm — and What to Do Instead
cover_tagline: Your body flags 'no' as danger. It isn't. It's just unfamiliar.
description:
  short_blurb: The moment before you set a boundary, your system lights up like something
    is about to go wrong. This book is about that false alarm — the spike of dread
    that makes a normal 'I can't take that on' feel like a threat. No exposure homework.
    Just a clear read on why your alarm fires and how to tell it apart from real risk.
  long_description: 'You''re about to say you can''t take the extra project. The words
    are right there. And then your chest tightens, your face goes warm, and some part
    of you is suddenly certain that this is a mistake — that you''re about to damage
    something you can''t get back. So you say yes. Again. Not because you decided
    to. Because the alarm went off.


    This is for the manager whose body treats every boundary like a hazard. You can
    run a tense meeting, deliver bad news, hold a hard review — but the second you
    have to protect your own time, your own bandwidth, your own weekend, your nervous
    system reacts like you''ve stepped off a ledge. The dread feels like information.
    It feels like proof you shouldn''t. This book is about why it isn''t.


    Recognition first: a false alarm is your threat-detection system misfiring on
    something that isn''t actually dangerous. Saying ''no, I don''t have room for
    that'' is not a fall. It''s not a betrayal. It''s not the end of your standing
    on the team. But the spike doesn''t know the difference between a real risk and
    an unfamiliar one, and ''I''m not used to this'' gets coded as ''this is unsafe.''
    The same wiring that once kept you alert to a boss''s mood or a household that
    could turn is now firing at a calendar invite.


    Then we go down into the alarm itself rather than scrambling to shut it off. We
    get specific about what it feels like in your particular body — the held breath,
    the over-explaining, the rushed yes that arrives before you''ve even finished
    thinking. We separate the two questions you''ve been answering as one: ''Is this
    uncomfortable?'' and ''Is this dangerous?'' Not to override the spike with willpower.
    To stay with it long enough to learn its shape, so the next time it fires you
    can recognize it as a sensation and not a sentence.


    What you come back with is the ability to feel the spike and still finish the
    sentence. The alarm can be loud and wrong at the same time. Once you know it''s
    an alarm, it stops being the deciding vote.


    This book will not teach you to feel calm before every hard conversation, and
    it won''t promise the dread disappears. You''ll still get the spike. You''ll just
    stop mistaking it for danger, and stop letting a misfire run your calendar.


    You''re allowed to set the limit while your body is still insisting you shouldn''t.
    The alarm doesn''t get the final word.'
