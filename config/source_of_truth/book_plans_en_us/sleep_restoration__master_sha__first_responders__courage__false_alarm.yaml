title: Off the Clock, Still on the Edge
subtitle: For the first responder whose body keeps bracing for the next call long
  after the shift is over — and why standing down takes its own kind of courage
cover_tagline: The truck is in the bay. Your body never got the word.
description:
  short_blurb: The call ended hours ago, but you're still wired to the seat, jaw set,
    listening for the tone. This is for the responder whose alarm system never learned
    how to switch off — who can run into anything but can't come home all the way.
    It won't tell you to relax. It will help you understand the part of you still
    standing watch over a danger that already passed.
  long_description: 'The shift ended at six. It''s almost two now, and you''re sitting
    in the dark with your boots still by the door, jaw tight, half-listening for a
    tone that isn''t going to sound. Nothing is wrong. That''s the strange part. The
    house is quiet, everyone is safe, and your body is still braced like the call
    is coming any second.


    This book is for the first responder whose alarm system never got the memo that
    the danger passed. You ran toward the thing everyone else ran from. You held it
    together when it counted. And now, off the clock, the same system that kept you
    sharp on scene won''t stand down — it fires at a slammed door, a phone buzz, the
    silence itself. People keep telling you to relax. They don''t understand that
    relaxing feels like dropping your guard with the worst still out there.


    You''ll come to recognize the false alarm for what it is: not weakness, not damage,
    but a body that learned to brace and was never shown how to un-brace. We''ll sit
    with the bracing instead of fighting it. You''ll feel the difference between the
    danger that''s real and the alarm that''s only an echo — the edge your nervous
    system still thinks you''re standing on when both feet are already on solid ground.
    You''ll learn that the courage it took to run in is not the courage you need now.
    Coming all the way home asks for something quieter, and harder: the nerve to set
    the watch down when no one has told you it''s safe to.


    This book will not switch off your alarm. It can''t, and anything that promises
    to is selling you something. There is no protocol here, no breathing trick that
    makes the next night easy, no way to optimize a system that has simply held the
    line too long. What there is, is company — a steady voice in the next chair who
    knows what 2am feels like when your body won''t believe the shift is over.


    You don''t have to earn the right to stand down. You don''t have to feel safe
    before you let your shoulders drop. The watch can keep itself for one night while
    you rest.


    Book 1 of the Night Architecture Books Courage series.'
