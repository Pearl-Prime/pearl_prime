title: The Company Is Fine. I Am Not Here.
subtitle: For the founder drowning in a thriving business — when everything is arriving
  at once and there is no one left inside to receive it
cover_tagline: The metrics are green. You went dark months ago.
description:
  short_blurb: Your company is doing better than ever and you have never felt less
    alive. This is for the founder who keeps running on a self that emptied out somewhere
    along the way, flooded by everything that needs you and unable to feel any of
    it. You will not find a way to handle more. You will find the one place in you
    that was never underwater.
  long_description: 'It arrives all at once. The Slack pings and the board deck and
    the hire you have to make and the thing you forgot and the person waiting on you,
    and underneath all of it a quiet that you cannot explain to anyone, because by
    every measure the company is fine. Better than fine. So why do you sit in the
    car in the garage with your hand on the wheel, unable to make yourself walk in?


    This book is for the founder who is drowning inside a success story. For the one
    who built something real and then went numb somewhere behind it, who answers every
    message and feels nothing, who performs aliveness all day and dreads the silence
    after. The world calls it depression and treats it like a malfunction. You have
    probably already tried to optimize it — better sleep, more discipline, a new morning
    routine — as if the flood could be managed by becoming a slightly better machine.


    Here we will go the other way. You will come to recognize that the overwhelm is
    not too much work; it is too much arriving at a self that has nothing left to
    receive it with. You will see how the founder-self you have been running — the
    one who has to hold all of it — is not actually who you are. You will feel, maybe
    for the first time in months, that there is a kind of awareness in you that the
    flood passes through without touching, the way weather moves across a sky and
    the sky is never wet. You will not be asked to do more. You will not be asked
    to feel grateful. You will be slowed down, on purpose, until you notice that something
    in you stayed awake while the rest of you went dark.


    This is not a productivity book and it will not give you a system. It promises
    no turnaround for your inner life, because your inner life was never broken —
    only buried. There is nothing here to optimize and no level to reach. The flatness
    is not your failure. It is a fog moving across something the fog cannot dim.


    You can put the wheel down now. You do not have to receive all of it. You only
    have to notice the one quiet place that was never underwater, and let yourself
    begin to come home to it.


    Book 1 of the Awakening Press depression series.'
