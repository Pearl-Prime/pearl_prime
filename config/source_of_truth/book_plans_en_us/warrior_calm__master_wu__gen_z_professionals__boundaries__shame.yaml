title: The Person Who Couldn't Say No
subtitle: For the young professional who believes a boundary makes them difficult
  — and overworks to stay liked, hiding the quiet certainty that needing limits means
  something is wrong with them
cover_tagline: You said yes again, and hated yourself a little more for it.
description:
  short_blurb: You don't just struggle to set a boundary. You believe, somewhere under
    everything, that needing one makes you the problem — selfish, high-maintenance,
    not a team player. So you say yes, and you overdeliver, and you stay late, and
    you carry a low private shame that no amount of being agreeable ever lifts. This
    is a book about that buried belief, and the line you're allowed to draw without
    apologizing for existing.
  long_description: 'There''s the no you couldn''t say — and then there''s what you
    told yourself about being the kind of person who would. Selfish. Dramatic. Not
    a team player. Difficult. The word lands quietly and you flinch from it, so you
    say yes instead, and you stay late, and you take the extra thing, and somewhere
    underneath it all you carry a small steady shame that being agreeable was supposed
    to fix and never does.


    This book is for the young professional who has confused having limits with having
    a flaw. The one who apologizes for asking, who over-explains a simple decline,
    who would rather absorb the cost than risk being seen as the person who ''made
    it weird.'' You''ve built a whole identity out of being easy to work with. And
    underneath the helpfulness sits a belief you''ve never said out loud: that if
    people knew how much you needed a boundary, they''d think less of you. That the
    limit is the defect. That you are.


    You''ll come to recognize where that belief actually lives. The flush of heat
    when you have to say no. The way you overwork to earn a place you already have.
    The instinct to disappear your own needs so completely that even you forget they''re
    there. You''ll learn what the warrior knows: that real strength has nothing to
    prove, that the gate which holds is not cruel — it simply knows what it''s for.
    A boundary is not a confession of selfishness. It is the shape of a person who
    has stopped treating their own existence as an imposition.


    This book will not make you shameless, and it will not hand you a personality
    where the flush never comes. There''s no affirmation that deletes a belief you''ve
    practiced for years. The heat may still rise when you hold a line. That''s not
    failure. The work is drawing the line anyway — letting the shame be present and
    the boundary be firmer than the shame, until one day you notice you said no and
    the floor did not open beneath you.


    You were never too much. You were a person with edges, taught to file them down.
    You''re allowed to have them back. You''re allowed to take up the room you actually
    occupy.


    Book 2 of the Iron Gate Press Boundaries series.'
