title: 'The Line You Never Drew: What Shame Does to You'
subtitle: What Shame Does to You — Boundaries for Millennial Women Professionals (What
  Shame Does to You)
cover_tagline: You think the boundary makes you difficult. The shame got there first.
description:
  short_blurb: Every time you hold a limit, an old belief whispers that you're selfish,
    too much, fundamentally hard to love. This book goes underneath the boundary problem
    to the shame running it.
  long_description: 'You held the line. You said the real thing — not the softened,
    over-apologized version, the actual no — and for one clean second it felt right.
    Then the flood came. Not regret about the decision itself. Something older and
    heavier underneath it: the sense that needing the limit at all means something
    is wrong with you. That a better woman, a warmer one, a more generous one, wouldn''t
    have had to draw it in the first place.


    This book is for the professional woman who can''t tell the difference between
    having a boundary and being a bad person. The one who over-explains every no,
    who apologizes for taking up room in her own life, who carries a low, private
    conviction that she is fundamentally too much — too demanding, too sensitive,
    too difficult to love — and treats every limit she sets as one more piece of evidence
    for the case against her.


    First we name what''s actually in the room: this is not a boundary problem. It''s
    shame. The belief that something is wrong with you at the core got installed long
    before this job, this colleague, this particular request — and it has gotten very
    good at disguising itself as "I''m just being considerate." But you''re not being
    considerate. You''re managing the fear of being found out, and calling it kindness.


    Then we turn and face the shame directly instead of arguing with it. Not to assemble
    proof that you''re secretly a good person — that only keeps you trapped in the
    courtroom, restating your defense — but to look straight at the belief and notice
    where it actually came from. Whose voice it first arrived in. How much of it was
    ever yours to begin with. We don''t talk it out of existence. We stop running
    from it long enough for it to lose its grip.


    What comes back is a strange, unfamiliar spaciousness. You set the limit and the
    shame still stirs — but you recognize it now as a visitor passing through, not
    a verdict being handed down. You stop building your boundaries as evidence that
    you''re not the thing shame keeps insisting you are.


    This won''t hand you affirmations for the bathroom mirror or a worksheet to reframe
    your inner critic. It won''t promise the shame disappears for good. It will end
    its authority to decide what you''re allowed to need.


    There is nothing wrong with you that a boundary would ever have to apologize for.'
