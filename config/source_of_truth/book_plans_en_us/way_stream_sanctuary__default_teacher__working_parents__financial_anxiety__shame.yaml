title: 'The Number in Your Head: What Shame Does to You'
subtitle: How Working Parents Are Rewriting the Rules of Financial Anxiety
cover_tagline: The quiet belief that a good parent would have figured this out by
  now.
description:
  short_blurb: 'Underneath the money worry is a sentence you''d never say out loud:
    that being behind means something is wrong with you. This is for the working parent
    ready to stop confusing a hard situation with a personal verdict.'
  long_description: 'It''s the way you go quiet when other parents talk about the
    trip, the lessons, the house they just bought. It''s checking the balance with
    the door closed so no one sees your face. It''s the thought that arrives at 2
    a.m. and lands like a fact: a real parent, a competent adult, would not be in
    this position. That''s not anxiety about money. That''s shame — and it''s been
    running the show longer than you''ve noticed.


    This book is for the working parent who has quietly decided that being financially
    stretched is evidence of a flaw in them. The one who hides the worry from a partner,
    a friend, their own kids. The one who can absorb a hard month but can''t shake
    the buried belief that the hard month is their fault, their character, their secret.


    We start by saying the sentence out loud, because shame only keeps its grip in
    the dark. You''ll learn to catch the exact move your mind makes — turning a circumstance
    ("this is expensive and I''m stretched") into an identity ("I am the kind of person
    who can''t manage"). They are not the same thing, and the gap between them is
    where you get your footing back.


    Then we go down into it rather than around it. Not pep talks in the bathroom mirror,
    not pretending you feel proud when you don''t. You''ll practice staying with the
    hot, ducking feeling for a few breaths without obeying it — letting it be a feeling
    that''s passing through, not a truth about who you are. Shame hates being looked
    at directly. So you look, and you keep breathing while you do.


    This book will not promise to make you feel like you have it all together. It
    won''t tell you to think positive until the money appears or to repeat that you
    are enough until you finally believe it. The stretch is real, and you already
    know it. What changes is that you stop adding a second, heavier weight on top
    of it — the private conviction that the stretch is a sentence handed down about
    your worth.


    You are a parent under real financial pressure. That is a circumstance, not a
    confession. Plenty of good, capable, loving parents are exactly where you are
    and have simply stopped telling anyone. You''re allowed to be one of them without
    it meaning anything about who you are. Set the verdict down. You were never the
    thing you were afraid you were.'
