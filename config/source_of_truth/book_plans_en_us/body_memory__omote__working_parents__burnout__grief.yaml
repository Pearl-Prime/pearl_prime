title: What This Cost You
subtitle: For the working parent grieving the self they had before — the energy, the
  patience, the person they used to be
cover_tagline: You didn't notice the moment it left. You only noticed it was gone.
description:
  short_blurb: No one tells you that burnout is also a loss. Somewhere in the years
    of holding everything together, a version of you slipped away — the one with patience,
    with spark, with something left over at the end of the day. This is for the working
    parent who is finally ready to grieve what burnout took, so they can stop reaching
    for a self that isn't coming back the same way.
  long_description: 'There is a particular ache that comes late, after the children
    are finally asleep and the house has gone still. Not panic. Not even exhaustion,
    exactly, though you are exhausted. Something heavier and quieter underneath all
    of it. A sense that someone is missing from your own life — and that the someone
    is you. The you who had patience to spare. The you who laughed easily, who had
    something left over at the end of a day, who wasn''t always running on the very
    last of everything you had.


    This book is for the working parent who is grieving and never had a name for it.
    You''ve been so busy surviving that you never stopped long enough to notice what
    the surviving cost. The spark that dimmed so gradually you can''t say when. The
    friendships that thinned to occasional texts. The version of yourself you keep
    reaching for and can''t quite reach, as if she slipped out of the room while you
    were doing the dishes and simply never came back.


    Here you''ll come to recognize burnout as a kind of loss — a real one, deserving
    of real grief — and loss as something that asks to be felt, not managed, not fixed,
    not hurried past. You''ll let yourself miss who you were before, without anyone
    telling you to be grateful for what you still have or to look on the bright side.
    You''ll feel the difference between the self that depletion took from you without
    asking and the self that you might, in time and gently, choose to set down on
    purpose. And you''ll begin to understand that grief is not the opposite of moving
    forward. More often it is the ground you have to stand on before you can move
    at all.


    This is not a book about bouncing back. It will not promise that the old you returns
    intact if you only try the right things in the right order, because that isn''t
    how loss works and some honest part of you already knows it. There is no optimizing
    your way out of mourning. What''s here instead is room — room to grieve what burnout
    took from you, plainly and without apology, so that it stops haunting the quiet
    edges of every ordinary evening.


    You are allowed to mourn the person you used to be. You are allowed to set down
    what cannot be carried forward into who you are becoming. The ground beneath you
    will hold the full weight of what you''ve lost for as long as it takes — while
    you learn, slowly, how to stand on it again.


    Book 2 of the Held Ground Press burnout series.'
