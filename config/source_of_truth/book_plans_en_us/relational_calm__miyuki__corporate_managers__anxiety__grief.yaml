title: The Manager You Used to Be Is Gone
subtitle: For the manager grieving the steadiness they lost — when anxiety took something
  quietly and no one noticed it leave
cover_tagline: Something was taken. No one marked the day it left.
description:
  short_blurb: You used to be the steady one. You used to sleep. Somewhere in the
    climb, anxiety quietly took the ease you didn't know you'd miss, and no one held
    a service for it. This is a book for the manager mourning a version of themselves
    that left without a goodbye.
  long_description: 'There''s a photo, or a memory, of you a few years ago — before
    this role, before the constant hum. You were lighter then. You could end the day
    and actually be done. You''re not sure when that left. There was no moment, no
    announcement. One day you simply noticed it was gone, and that you''d been carrying
    the absence ever since.


    This is grief, though anxiety rarely lets you call it that. Not the grief of a
    death, but the quiet loss of who you were before the bracing started — the steadiness,
    the easy sleep, the version of you that wasn''t always half-listening for the
    next problem. It was taken slowly, a little at a time, and because nothing dramatic
    happened, no one marked it. Least of all you.


    This book is for the manager mourning a self that left without a goodbye. The
    one who misses an ease they can barely remember, who feels foolish grieving something
    so hard to name. You''ve been told to be grateful for how far you''ve come, to
    focus forward — as if naming the loss were the same as being ungrateful for the
    climb.


    You''ll come to recognize that what you feel is grief, and that grief is the correct
    response to losing something real. You''ll see how anxiety took it quietly, how
    the busyness covered the missing, how some part of you has been holding a vigil
    for a person no one else knew was gone. And you''ll begin to feel what it is to
    let that version of you finally rest — not to get them back unchanged, but to
    stop carrying their absence like a held breath.


    This book will not teach you to bounce back to your old self. It has no resilience
    routine, no gratitude challenge, no plan to optimize your recovery. It will not
    promise to return what was taken, because some things are released, not retrieved.
    There is nothing here to optimize.


    What there is, is a quiet room and the space to let something go. A plain look
    at what anxiety quietly cost you, and permission to actually mourn it. You''re
    not ungrateful. You''re grieving — and you are allowed to set the weight of who
    you were down, and breathe in the room as it is now.


    Book 5 of the Bare Form Books anxiety series.'
