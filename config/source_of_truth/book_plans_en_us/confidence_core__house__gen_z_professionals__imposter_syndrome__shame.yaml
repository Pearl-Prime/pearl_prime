title: The Version of You They Hired
subtitle: For the young professional who's sure they slipped in by accident — and
  is exhausted from covering the defect they're certain everyone will eventually find
cover_tagline: You built a whole person to stand in the doorway so the real one wouldn't
  have to.
description:
  short_blurb: You're not behind because you're failing. You're tired because you've
    been running two jobs at once — the work, and the full-time performance of someone
    who deserves to be doing it. This book is for the young professional carrying
    a quiet, buried belief that they got in by mistake, and that any day now, someone
    will notice.
  long_description: 'There''s a particular kind of tired that no weekend fixes. It''s
    the tiredness of holding a door shut. Of arriving early, replying fast, double-checking
    the email you already checked, smiling at ''great work'' while the real you stands
    just behind the smile thinking: they don''t know yet. Any minute now, they''ll
    find out.


    This book is for the young professional who is certain, somewhere underneath everything,
    that they slipped in by accident. That there''s a defect in them — some missing
    thing everyone else got — and that the entire point of the job is to keep it hidden.
    You don''t think you''re modest. You think you''re a fraud who hasn''t been caught.


    We''re going to look at that belief directly, because you''ve been working around
    it for so long you''ve stopped noticing it''s there. You''ll come to recognize
    the mask you built to walk through the door — how early you learned to wear it,
    and what it costs you every single day to keep it on. You''ll see how the shame
    doesn''t actually protect you from being exposed; it just makes sure you never
    get to be in the room as yourself. You''ll notice the overwork for what it is:
    not ambition, but a tax you pay to feel allowed to stay.


    And then, slowly, something else. The quiet that comes when you stop bracing.
    The strange relief of letting one person see the unperformed version. The first
    full breath you take in a meeting because you''re no longer holding the door.


    This book will not teach you to fake confidence. It won''t hand you a posture,
    a power phrase, or a morning routine to optimize your way out of feeling like
    a fraud. There is nothing here about owning the room. The belief that something
    is wrong with you is not a bug to patch — it''s a story you were handed, and you
    can set it down without first proving you''ve earned the right to.


    You are not a mistake they''ll eventually correct. You are early in something,
    standing in the doorway, and being early is not the same as not belonging. The
    person they hired and the person you actually are were never two people. You just
    got used to introducing the wrong one.


    Nothing here asks you to become more impressive. The whole point is that you don''t
    have to. Step over the line as yourself. The room was always large enough.


    Book 1 of the Threshold Books imposter syndrome series.'
