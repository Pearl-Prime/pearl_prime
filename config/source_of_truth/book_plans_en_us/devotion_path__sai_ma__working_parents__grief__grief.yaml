title: Mourning in the Margins of a Full House
subtitle: For the parent grieving in stolen moments — between lunchboxes and bedtimes,
  with no room to fall apart
cover_tagline: You are not too much. You are only love, with nowhere left to put it.
description:
  short_blurb: Grief did not wait for a convenient week. It moved into your kitchen,
    your commute, your child's bedtime, and asked you to keep going anyway. This is
    a quiet companion for the parent who carries a loss through ordinary days, written
    for the ache itself — not its cure.
  long_description: 'It comes for you between the lunchbox and the car keys. You are
    buttering toast, answering a message, tying a small shoe, and then the loss is
    simply there again — sideways, uninvited, real. You smile at your child. You carry
    it into the day in a body no one at work knows is broken open. And you keep going,
    because that is what a parent does.


    This book is for you. For the mother and father who do not get a week to fall
    apart. For the one who grieves in the parking lot before walking in, who cries
    in the shower so the children won''t hear, who has been quietly told — in a hundred
    small ways — that it has been long enough now. It has not been long enough. There
    is no long enough.


    Here, grief is not a problem to be solved. It is love with nowhere to go. Everything
    you feel is the size of everything you lost, and that is not a malfunction — it
    is the truest thing about you. In these pages you will come to recognize the way
    grief moves through a working life: the flood that arrives at the worst possible
    moment, the thought that loops while you drive, the strange shame of still hurting,
    the comparison to everyone who seems to have moved on, the part of you that braces
    for the next blow that never quite comes. You will be met in each of these, gently,
    without being asked to be anywhere other than where you are.


    This is not a recovery plan. There are no stages to complete, no lesson you must
    extract, no gratitude demanded before its time. Nothing here will get you over
    it, because you were never meant to get over a love like that. Instead, you will
    be offered a place to set the cup down — just for a moment, just for tonight —
    and let yourself be held. The well refills in the dark, when no one is watching.
    So does the heart.


    You do not have to be done. You do not have to be okay for anyone. You are allowed
    to be a person who loves this much and lost this much and still made the toast.
    Let that be enough for tonight.


    Book 1 of the Open Vessel Press grief series.'
