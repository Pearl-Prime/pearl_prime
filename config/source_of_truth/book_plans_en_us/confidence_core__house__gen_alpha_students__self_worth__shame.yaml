title: The Part of You That You Hide
subtitle: For the student who keeps the volume turned down on themselves, quietly
  sure that if anyone met the real you, they would think less of you
cover_tagline: You're not too much. You were taught to take up less room.
description:
  short_blurb: There's a version of you that you keep tucked away, the one you're
    sure would embarrass you if it ever showed up at school. This is a book for the
    student who has decided, somewhere deep down, that something is wrong with them,
    and has been quietly covering for it ever since to keep anyone from finding out.
    It doesn't ask you to fix the thing you're hiding. It asks you to stop believing
    it was ever a defect.
  long_description: 'It usually happens quietly. The teacher hands back the test,
    or someone laughs a half-second too long at something you said, and a small voice
    inside goes: see, you knew it. You''re not good enough, and now they know too.
    You smile so nobody can tell. You get quieter. You start watching how you come
    across every minute of the day.


    This book is for you — the student who has quietly decided that the problem isn''t
    a thing you did, it''s a thing you are. You''ve got a part of yourself you keep
    hidden: the part that feels behind, or weird, or like a fraud who''s about to
    be found out. So you cover it. You perform the okay version. And it''s exhausting,
    because deep down you''re sure that if the real you ever showed up, people would
    think less of you.


    Here''s what you''ll start to recognize. Shame isn''t the truth about you — it''s
    a feeling that learned to talk like the truth. It tells you a single moment is
    your whole self. It tells you that being noticed is dangerous. It tells you to
    apologize for taking up space. And once you can hear it as a voice instead of
    a verdict, something loosens. You start to notice that the thing you hide isn''t
    a defect at all — it''s just the part of you that nobody made room for yet.


    This book will not promise to make you confident overnight, and it will not tell
    you to fake it until it''s true. There''s no hype here, no posters, no ''just
    believe in yourself.'' Nothing in here will make the hidden part of you disappear,
    because it was never the problem. That''s the point. You don''t have to earn your
    way back to being enough. You already were, before anyone graded it.


    What it offers instead is steadier. A way to stand in the doorway of who you''re
    becoming and look back at the kid who learned to shrink — with something a lot
    closer to kindness. You don''t have to walk through fixed. You just have to be
    willing to walk through as you are.


    You are not your worst day. You are not the thing you''ve been hiding. And you
    do not owe the room a smaller version of yourself.


    Book 1 of the Threshold Books self worth series.'
