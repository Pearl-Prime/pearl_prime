title: They're Going to Find Out
subtitle: For the student bracing to be exposed in a room they actually earned — when
  your body sounds the alarm and there's no real danger in sight
cover_tagline: Your body thinks the seminar is a threat. It isn't.
description:
  short_blurb: You walk into the room and your whole system locks up, sure that today
    is the day they realize you don't belong. This is a book about that alarm — the
    one that fires before anything has even happened — and why it has nothing to do
    with whether you're good enough.
  long_description: 'You haven''t said anything yet. The seminar hasn''t even started.
    But your heart is already going, your hands are cold, and there''s a voice underneath
    it all whispering that today might be the day someone finally figures out you
    don''t belong here.


    Nothing is wrong. That''s the strange part. No one has called you out. No one
    is watching you that closely. But your body has decided the room is dangerous,
    and it''s bracing for an impact that never actually comes.


    This book is for you — the one who got in, got the place, got the grade, and still
    walks around waiting to be exposed. The one whose nervous system treats every
    lecture hall, every email from a professor, every group project like a trap about
    to spring. You''re not paranoid and you''re not broken. You''ve just got an alarm
    system calibrated for a threat that isn''t in the room with you.


    You know the feeling before you have words for it. The way your stomach drops
    when a professor scans the room for someone to call on. The way a high mark feels
    less like proof you''re good and more like a deadline moving closer — one more
    thing you''ll now have to live up to before they catch the mistake. The way you
    over-prepare for things no one else seems to lose sleep over, because being ready
    feels like the only thing standing between you and being found out. That isn''t
    a character flaw. That''s an alarm doing its job too well.


    You''ll come to recognize the false alarm for what it is: a body misreading high
    stakes as high danger. You''ll learn the difference between being in trouble and
    just feeling like you are. You''ll see how the dread shows up before the thing
    you''re dreading — and how it lies about how the thing will go. You''ll find a
    way to put the phone face-down, feel your feet on the floor, and let the alarm
    ring without obeying it.


    This isn''t going to make you bulletproof. It won''t hand you confidence or teach
    you to fake it. There''s no trick here for never feeling the fear again, because
    the fear isn''t the problem — believing it is.


    What''s actually true is quieter than the alarm. You earned the seat. No one is
    coming to take it. The danger you keep bracing for isn''t on its way, and you''re
    allowed to stop standing guard against a knock that never comes.


    Book 1 of the Present Tense Books imposter syndrome series.'
