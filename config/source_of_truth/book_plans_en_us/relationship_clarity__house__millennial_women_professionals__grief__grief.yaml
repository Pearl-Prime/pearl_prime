title: The Chair Across From You Is Empty Now
subtitle: For the woman grieving a relationship she can't fix — learning to let go
  of someone without losing herself, one honest conversation at a time
cover_tagline: You can love a thing and still have to let it go.
description:
  short_blurb: Some relationships don't end in a fight. They end in a slow, quiet
    emptying — until one day the chair across the table is just a chair. This is a
    book for the professional woman who can manage a crisis at work but can't talk
    herself out of missing someone, and who is finally ready to grieve instead of
    fix.
  long_description: 'You keep setting the table for two.


    Not on purpose. It''s just muscle memory — the extra cup, the half-turn to share
    something funny, the conversation you start in your head before you remember there''s
    no one on the other end of it anymore. You''re good at endings on paper. You can
    close a deal, close a quarter, close a door. But this ending didn''t sign anything.
    It just left an empty chair across from you and a place still set, and you don''t
    know how to clear it.


    This book is for the woman who is competent everywhere except here. You hold it
    together all day — the calls, the deadlines, the people who lean on you — and
    then you come home to a silence shaped exactly like someone who used to fill it.
    Maybe the relationship ended. Maybe it''s still technically here but the person
    you loved already left it. Either way, something is gone, and the world keeps
    handing you checklists and silver linings when what you actually lost was a future
    you could see.


    We''re going to sit with that instead.


    You''ll come to recognize the shape of your own grief — the way it arrives as
    loss, the thing that was taken from you and the thing you have to choose to release,
    which are not the same and shouldn''t be confused. You''ll see how loving something
    has quietly come to feel like an obligation to keep it, and how letting go is
    not the same as not caring. You''ll notice the conversations you keep rehearsing
    — the apology you''re owed, the explanation you''ll never get — and what it costs
    to keep that chair set for a guest who isn''t coming. And you''ll learn, slowly,
    how to clear the place at the table without pretending it was never laid.


    This book will not give you closure. There''s no script here to win the breakup,
    no five steps to get over it by Friday, no reframe that turns the loss into a
    lesson and ties it off. It won''t tell you the ending was for the best. It won''t
    optimize your heartbreak. It will only pull up the second chair, sit down across
    from you, and stay while you say the true thing out loud — that it mattered, that
    it''s gone, and that you''re allowed to be undone by that for as long as you need
    to be.


    You don''t have to be fine yet. You don''t have to be grateful for what this taught
    you. You''re allowed to just miss it.


    Book 1 of the Two Chairs Press grief series.'
