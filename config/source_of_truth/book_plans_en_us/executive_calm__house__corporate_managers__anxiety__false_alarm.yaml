title: Braced for an Impact the Day Never Delivers
subtitle: For the executive whose body sounds the alert before a single thing has
  gone wrong
cover_tagline: Your alarm is working. There's just nothing burning.
description:
  short_blurb: Some mornings your chest is tight before a single thing has gone wrong,
    and the day still hasn't started. This is a book for the manager whose nervous
    system keeps firing the alarm for fires that never come — and who is exhausted
    from treating every surge of dread as proof that something is.
  long_description: 'The email is unread and already you''ve decided it''s bad. Your
    jaw is set before the meeting. Your heart is going at a pace the moment hasn''t
    earned, and some part of you is braced — shoulders up, breath shallow — for an
    impact you can''t name and that, most days, never lands.


    You are not in danger. Your body simply hasn''t been told that yet.


    This book is for the manager whose alarm system fires at full volume over a calendar
    invite. You carry real responsibility, and somewhere along the way your nervous
    system stopped distinguishing between a genuine threat and a Tuesday. The dread
    shows up the same either way: before the one-on-one, before the forecast call,
    before you''ve even opened the door. It doesn''t wait for evidence and it doesn''t
    ask permission. You''ve learned to push through it, to lead while bracing, to
    perform a steadiness you don''t feel — and to do it so well that no one around
    the table would ever guess what it costs you to sit there.


    You''ll come to recognize the false alarm for what it is. How it arrives as certainty
    — a flat conviction that something is wrong — rather than a thought you could
    argue with. How the body commits to the emergency before the mind has any evidence.
    How bracing for the worst feels like preparation when it is really just suffering
    in advance, paid out in full for a bill that rarely comes due. And how a quieting
    starts not by arguing with the alarm, but by letting it ring without obeying it.


    This is not a method for never feeling afraid. It will not optimize your nervous
    system or hand you a protocol to run before the board meeting. It will not promise
    that the dread stops. What it offers is steadier: the difference between an alarm
    and a fire, and the bedrock that holds when the alarm goes off and you choose,
    for once, not to run toward an emergency that isn''t there.


    There is ground under you that the alarm cannot reach. You can lead from it. You
    can feel the surge, name it, and let the day be ordinary when it is ordinary —
    which is most of the time.


    Nothing here asks you to be fearless. It asks you to stop trusting the alarm more
    than the room. That''s enough.


    Book 1 of the Granite Ridge Publishing anxiety series.'
