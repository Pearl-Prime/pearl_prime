title: The Lunchbox Still Gets Packed
subtitle: For the grieving parent who keeps the household running while quietly coming
  apart — making room for a loss that won't fit into the school morning
cover_tagline: You made breakfast for everyone this morning. No one saw you crying
  over the toaster.
description:
  short_blurb: Someone you loved is gone, and yet the lunches still get made, the
    shoes still get found, the bedtime stories still get read in a voice that doesn't
    crack until the door closes. This is a book for the parent grieving in the margins
    of a life that never paused. It won't ask you to be finished, only to let the
    love and the loss live in the same body for a while longer.
  long_description: 'There is a particular loneliness in grieving while you parent.
    The world expects the household to keep running, and so it does — your hands keep
    packing the lunchbox, finding the missing sock, signing the permission slip —
    while somewhere behind your ribs, something has gone very still. You cried over
    the toaster this morning and wiped your face before anyone came down. At the school
    gate, someone told you how well you''re holding up, and you nearly fell down where
    you stood.


    This book is for you. For the mother, the father, the parent who lost someone
    and never got the luxury of falling apart, because there were small people who
    still needed breakfast. For the one who grieves in twenty-minute windows after
    the house goes quiet, before someone calls out for water. For anyone carrying
    a loss in one hand and a child''s hand in the other, wondering how both can possibly
    be held at once.


    You''ll come to recognize the shapes grief takes when it has to share you with
    a household. The way it ambushes you in the cereal aisle and then politely waits
    while you do the school run. The guilt that you laughed at dinner, and the guilt
    that you didn''t. The exhausting performance of being fine for the children, and
    the strange grief of realizing they are grieving too, in their own small ways,
    and looking to you to show them how. You''ll find the unguarded moment named gently
    — the one where you stop bracing and simply let yourself miss the person, fully,
    the way love insists on being felt.


    This is not a book about stages. There is no checklist here, no closure to achieve,
    no timeline you are failing to keep. It will not tell you the person is in a better
    place, and it will not try to optimize your heartbreak into something more convenient
    for everyone around you. Grief is not a problem to solve. It is love with nowhere
    to go, and it deserves somewhere to go that isn''t a five-minute slot before the
    alarm.


    What this offers instead is company. A voice that has sat in the same dim kitchen
    at midnight and knows that you can be a good parent and a person who is hurting
    in the very same breath. You are not too broken to raise them. You are not failing
    them by grieving where they can sometimes see. The love and the loss can live
    together — and so can you.


    Let the lunchbox get packed. Let your heart be packed full too, of everything
    you still carry. You are allowed to do both.


    Book 1 of the Heart Transmission Press grief series.'
