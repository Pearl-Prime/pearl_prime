title: 'The Voice That Says Not Enough: When Other People''s Success Feels Like Your
  Failure'
subtitle: A Field Guide for Tech and Finance Professionals Navigating Building Self
  Worth
cover_tagline: Your worth was never a leaderboard. You just kept reading it like one.
description:
  short_blurb: You feel fine about your work until you see what someone else is doing,
    and then "not enough" arrives on schedule. In tech and finance, self-worth gets
    outsourced to comparison. This is a book about the voice that only says you're
    falling short when you're looking at someone else.
  long_description: 'You felt okay about your year — actually okay — right up until
    the promo list dropped and your name wasn''t on it but someone else''s was. In
    four seconds, fine became failure. The voice that says not enough didn''t come
    from inside your work. It came from the comparison, and it always does.


    This book is for the people in tech and finance whose sense of worth runs on a
    leaderboard. The engineer who''s proud of a feature until a teammate ships something
    flashier. The analyst whose bonus felt good until they heard someone else''s number.
    The one who can''t hold a steady sense of being enough because their worth keeps
    getting repriced the moment they look sideways.


    Ana Reyes names the engine directly, and it isn''t a worth problem — it''s comparison.
    The voice that says you''re not enough almost never fires when you''re alone with
    your own work. It fires when you''re measuring: their title, their comp, their
    velocity, their certainty. You''ve outsourced the question of whether you''re
    enough to a ranking you didn''t agree to and can''t win, because there''s always
    someone one rung up.


    The book goes down into that, instead of trying to talk you into self-esteem.
    You''ll sit in the exact moment the comparison strikes — the announcement, the
    number, the peer who seems to be pulling ahead — and feel the worth drain out
    of you in real time. Watching that happen, staying with the drop instead of scrambling
    to climb, is the work. Not winning the comparison. Feeling how your enough-ness
    got hooked to it in the first place.


    Then you come back up able to hold your worth without a scoreboard. You''ll learn
    the difference between an actual assessment of your work and the reflex that measures
    you against whoever''s winning today. You''ll catch the comparison earlier, before
    "they did better" becomes "I am less." You''ll start to be enough on a Tuesday
    when no one''s ahead and no one''s behind — just you, and your work, and nothing
    to rank.


    This will not promise you bulletproof self-esteem or a way to feel enough on command.
    It won''t hand you a list of wins to read when the voice gets loud. There''s no
    affirmation, no journaling prompt. There is only the honest work of noticing when
    your worth got plugged into someone else''s results — and unplugging it.


    Your worth was never up for ranking. The voice that says otherwise is just the
    comparison.'
