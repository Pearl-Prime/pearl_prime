title: The Number You Don't Say Out Loud
subtitle: For the manager who looks fully in control and is privately certain they're
  a fraud about money — when the fear isn't the balance, it's the buried belief that
  you should have figured this out by now
cover_tagline: Everyone assumes you have it handled. That assumption is the loneliest
  thing you carry.
description:
  short_blurb: From the outside you look like someone who has money figured out —
    the title, the team, the calm. Inside is a number you'd never say out loud and
    a quiet certainty that you're a fraud who got lucky. This is a book for the manager
    whose real financial stress isn't the balance; it's the shame underneath it. It
    won't fix your finances. It will let you put the mask down.
  long_description: 'You should have this handled by now. That''s the sentence underneath
    everything — not a thought you''d ever say at the table where they''re all watching
    you stay calm, but the one running quietly behind your eyes while you do. You
    have the title. You manage the budget everyone defers to. And you carry a number
    you would never read aloud — what you actually have, what you actually owe — alongside
    a conviction that if anyone saw it, they''d finally understand what you''ve suspected
    all along: that you got here on luck and nerve, and you''ve been one honest conversation
    away from exposure the whole time.


    This book is for the manager whose financial stress isn''t really about the money.
    It''s about you. The capable, respected person privately certain they''re a fraud
    — who overworks not to get ahead but to keep the mask from slipping, who treats
    every raise as a deeper debt of expectation, who hides the real ledger even from
    the people who love them. The one for whom ''how are the finances'' is the most
    frightening small-talk question in the world.


    We''ll go gently, because shame doesn''t yield to force. You''ll come to recognize
    the buried belief itself — the defect you''ve been quietly sure you have, the
    one all the achievement was meant to cover. You''ll see what hiding it actually
    costs: the intimacy you withhold because no one''s allowed close to the real number,
    the rest you can''t take because the mask requires maintenance, the years spent
    performing solvency instead of feeling safe. You''ll learn what it is to let the
    number be just a number — not a verdict on your worth — and to be seen at the
    exact place you were most afraid to be. And you''ll sit with the question that
    loosens shame''s grip: not how do I look more secure, but what does this cost
    you — to keep proving you''re not the fraud you''ve decided you are.


    This is not a book about fixing your finances, and it will not optimize your way
    to feeling worthy. There''s no achievement large enough to finally satisfy the
    belief, because the belief was never about the money — earning more has never
    once quieted it, and it won''t start now. What changes here isn''t your balance
    or your title. It''s whether you keep believing the number is a measure of you.


    You are not a fraud. You are a person who learned, somewhere, to mistake a balance
    for a verdict — and who has been overworking to outrun a sentence that was never
    true. You''re allowed to set the mask down, say the real number to one safe person,
    and discover that your worth was never written on that line.


    Book 3 of the Second Mountain Press financial stress series.'
