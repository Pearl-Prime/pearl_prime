title: Everyone Else Just Says No
subtitle: For the kid who scrolls past people who set limits like it's nothing — measuring
  your own frozen yes against everyone who looks like they were born knowing where
  the line is
cover_tagline: They're not braver than you. You just only see the part they post.
description:
  short_blurb: You watch other people say no like it's nothing — leave the chat, skip
    the thing, tell someone straight up — and you wonder what they have that you don't.
    It looks effortless on everyone but you. This is a book about measuring your shaky
    boundaries against everyone who looks like they were born knowing where the line
    is, and why that scoreboard was rigged from the start.
  long_description: 'You see it everywhere. The friend who just leaves the group chat
    when it gets toxic. The person who posts ''protecting my peace'' and actually
    seems to mean it. The kid in your class who says ''no, I don''t want to'' without
    their voice even shaking. And every time, the same quiet math runs in the back
    of your head: they can do it, so what''s wrong with me?


    It looks effortless on everyone but you. You''re the only one, apparently, who
    freezes. The only one whose ''no'' comes out as a yes. The only one keeping a
    private scoreboard of how far behind you are at something everyone else seems
    to have figured out years ago.


    This book is for you — the one who measures every shaky boundary against the highlight
    reel of people who look like they were born knowing where the line is. The one
    who scrolls past someone''s confident caption and feels a little smaller. You''re
    not weak for comparing. You''ve just pointed a sharp, sensitive instrument — your
    attention — at the worst possible target: yourself, against an audience you only
    ever see edited.


    We''ll take the scoreboard apart slowly. You''ll come to recognize what comparison
    actually is: not information, but a story you tell in the gap between your insides
    and someone else''s outsides. You''ll see that the people who look like naturals
    are showing you a finished piece and hiding every draft they ruined to get there
    — the no''s that came out wrong, the friendships that got weird, the times their
    voice shook too. You''ll start to understand that confidence isn''t a thing some
    kids have and you missed out on. It''s just a line, drawn badly, over and over,
    until it got steadier. Everyone starts with a blank page. You''re only comparing
    your first marks to their tenth.


    This is not a book that''s going to help you win the comparison. That''s the whole
    point. It won''t teach you to out-confident the confident kids or curate a ''protecting
    my peace'' caption of your own. There''s no level you reach where you stop noticing
    other people entirely, and anyone who promises that is selling you something.
    We''re not going to optimize you into the person at the top of your imaginary
    leaderboard.


    What we''re going to do is quietly walk you off the scoreboard altogether. Because
    the line isn''t theirs and it isn''t a competition. It''s yours, and it only has
    to be drawn where you actually are.


    You are allowed to be a beginner at this out loud. You''re allowed to draw a wobbly
    line and call it yours. You''re allowed to stop keeping score.


    Book 3 of the Blank Canvas Books boundaries series.'
