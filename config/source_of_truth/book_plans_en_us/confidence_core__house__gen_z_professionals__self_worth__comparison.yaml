title: A Doorway They Walked Through Years Ago
subtitle: For the young professional sure their peers arrived somewhere they cannot
  reach
cover_tagline: You're grading yourself on a scale built from everyone but you.
description:
  short_blurb: Everyone in the meeting, everyone on the feed, everyone your age seems
    to have crossed some threshold into being a real adult — and you're still standing
    in the doorway, sure you missed the briefing. This book is for the mind that measures
    itself against the whole room and always comes up short. It won't help you win
    the comparison, and that is exactly the point.
  long_description: 'You scroll, and there it is again. Someone your age announcing
    the promotion, the apartment, the launch, the life that looks like it was assembled
    by someone who actually knew what they were doing. You set the phone down feeling
    a little further behind than you did a minute ago.


    It happens in the meeting too. They speak up so easily. They seem to belong in
    a way you''re still rehearsing. You came in qualified and you''ll leave the room
    quietly recalculating, sure everyone else got a head start you somehow missed.


    This book is for the young professional who measures themselves against everyone
    who looks calm, capable, and already arrived — and always lands short. You''re
    not lazy. You''re not behind. You''ve just been holding yourself up against the
    most polished version of everyone else, on their best day, seen from the outside,
    and calling the gap a verdict on who you are. It was never a fair comparison.
    It was never even a real one.


    Here, you''ll come to recognize how the comparison actually works. How it only
    ever shows you their highlight and your backstage. How ''everyone else'' is a
    composite — a person who doesn''t exist, stitched together from a hundred people''s
    best moments. How comparison disguises itself as ambition so you never question
    it. How it can quietly convince you that belonging is a line others have already
    crossed and you, somehow, have not.


    This book will not help you win. It won''t turn you into someone who finally measures
    up, and it won''t hand you a comeback for the next time the feed makes you feel
    small. There''s no plan here for getting ahead. Getting ahead was never the problem,
    and it was never going to be the cure.


    What it offers instead is the slow loosening of the measurement itself. The recognition
    that you''ve been standing at a threshold you assumed everyone else already walked
    through long ago — and that the door was never the kind you have to qualify for.
    Your worth was never a ranking. It isn''t earned by pulling ahead and it can''t
    be lost by falling behind, because it was never on the scoreboard to begin with.
    The people you envy are standing in doorways of their own, just as unsure, just
    as sure everyone else got the briefing they missed.


    You can stop running someone else''s race. Not because you finally caught up.
    Because you were never actually in it — and the room you''ve been trying to qualify
    for has been open to you the whole time.


    Book 2 of the Threshold Books self worth series.'
