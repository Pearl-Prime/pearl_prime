title: Everyone in the Meeting Seems So Sure
subtitle: For the seasoned professional who measures themselves against every colleague
  who looks effortless — and always comes up the impostor
cover_tagline: You're reading their certainty and your own doubt. It was never a fair
  comparison.
description:
  short_blurb: If you sit in meetings cataloguing how composed everyone else seems
    while you wait to be exposed, this book is for the part of you that's always keeping
    score. It won't help you win the comparison or finally feel as polished as they
    look. It will show you why you've been measuring your inside against everyone
    else's outside — and let you step off the scale entirely.
  long_description: 'You can feel it the moment the meeting starts. Someone speaks
    with that easy authority, another fields a hard question without blinking, and
    a quiet tally begins running in the back of your mind: they belong here, and you''re
    still waiting to be found out. By the time you''ve packed up, you''ve ranked yourself
    against everyone in the room — their composure, their credentials, the careers
    that seem to have unfolded without the panic you carry — and you''ve come up,
    once again, the impostor.


    This book is for the person who has spent a whole career measuring themselves
    against everyone who looks calm and certain. You are mid-life and stretched thin
    — aging parents on one side, kids on the other, a role you''ve earned but never
    quite feel you''ve earned. You scroll the colleague''s promotion, the peer''s
    polished talk, the friend who ''has it together,'' and each one lands as proof
    of the same verdict: everyone else figured out something you missed.


    Across these chapters, you''ll come to recognize what you''ve actually been doing.
    You''ll see that you''ve been comparing your private, unedited interior — every
    doubt, every 2am replay — to the carefully composed surface other people show
    the room. You''ll notice how the scoreboard runs even when no one is keeping score
    but you, and how it always rigs the game so you lose. You''ll feel the cost of
    a lifetime spent watching everyone else instead of being where you are. And gradually
    you''ll understand that the people who ''seem so sure'' are, quite often, sitting
    in the same meeting running the very same tally about you.


    This book will not help you win the comparison. It won''t make you more impressive,
    more polished, or finally as composed as they appear. There is no technique here
    for coming out on top, because coming out on top was never the way out. That''s
    the point.


    The way out is to put down the scoreboard you''ve been carrying since long before
    this job — to stop reading other people''s surfaces as a verdict on your worth,
    and to turn, at last, toward the room you''re actually standing in. Toward the
    next chapter, where the only person you''re being measured against is no one at
    all.


    Nothing here will help you win. You can stop competing now.


    Book 2 of the Next Chapter Publishing imposter syndrome series.'
