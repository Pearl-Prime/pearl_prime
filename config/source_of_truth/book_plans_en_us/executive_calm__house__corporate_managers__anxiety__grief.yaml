title: The Weight You Were Never Allowed to Set Down
subtitle: For the manager carrying a loss the calendar never made room for — and the
  anxiety that grief in hiding becomes
cover_tagline: The world kept moving. You were never given the day to stop.
description:
  short_blurb: A parent, a marriage, a version of your career, the person you were
    before the title — something is gone, and you were back in meetings before you'd
    felt it. This is a book for the manager whose anxiety is grief that never had
    anywhere to go, and the permission to finally set the weight down.
  long_description: 'Something is gone. Maybe a parent, and you took two days and
    came back. Maybe a marriage, quietly, while the quarter went on without noticing.
    Maybe a version of yourself — the one with more ahead of them, the one who hadn''t
    yet learned what this job would cost. Whatever it was, the world did not pause
    for it. You were back on the call before the loss had finished landing, and the
    feeling that should have been grief got nowhere to go.


    So it went looking for another door. And it found anxiety.


    This book is for the manager carrying a loss the calendar never made room for.
    You are not anxious, exactly — you are bereaved, and grief with no outlet doesn''t
    disappear. It pressurizes. It becomes the tightness in your chest, the dread with
    no object, the restlessness that won''t say what it''s about. You''ve been treating
    the symptom and missing the wound, because somewhere you decided that to stop
    and feel it would be to let everything slip.


    You''ll come to recognize the grief underneath. How a loss that was never mourned
    keeps presenting as fear. How ''staying strong'' was really staying frozen — holding
    a weight you were never allowed to set down. How the body keeps the appointment
    the calendar refused to make. And how something eases not by getting over it,
    but by finally letting the loss be a loss, by carrying it like the heavy and honest
    thing it is instead of disguising it as one more thing to manage.


    This is not a method to move on. It will not give you stages to complete or a
    timeline to grieve on. It does not promise the ache resolves by the last page.
    Some weights you carry the rest of the way; that part is not a problem to be solved.


    What it offers is permission to put it down for now, and a steadier way to bear
    what stays. The bedrock truth that grief is not weakness and not a detour from
    the work — it is the cost of having loved something, and you are allowed to feel
    it. Even here. Even with this much to carry.


    You are not falling apart. You are finally feeling the thing you never had a day
    to feel. That''s not breakdown. That''s overdue.


    Book 5 of the Granite Ridge Publishing anxiety series.'
