title: One Thought, Then a Thousand, at 2am
subtitle: For the working parent whose mind won't stop turning — when a single worry
  about your child branches into every disaster by morning
cover_tagline: It started with one worry. Now you can't find the bottom.
description:
  short_blurb: It began as one small worry about your kid and now it's 2am and your
    mind has built a thousand worse versions of it, each one feeding the next. This
    is a body-first companion for the parent caught in the downward pull of rumination.
    It won't give you better arguments to win against your thoughts. It will help
    you step out of the current and back into your body.
  long_description: 'It started with one thought. A look the teacher gave you at pickup,
    maybe, or a cough that didn''t sound right. And then your mind took it and ran
    — to the next worry, and the one after that, each thought handing off to a darker
    one, until it''s 2am and you''ve followed the thread all the way to catastrophes
    that haven''t happened and probably won''t. You know it isn''t rational. Knowing
    has never once made it stop. The spiral doesn''t care what you know.


    This book is for the parent whose mind won''t go off duty. Who replays the conversation
    forty times looking for the thing they got wrong. Who lies in the dark mentally
    rehearsing every way tomorrow could go badly, as if worrying hard enough were
    a form of protection. Who wakes already mid-thought, the wheel already turning.
    The spiral feels like thinking, but it isn''t — it''s a body caught in a loop,
    mistaking rumination for vigilance, generating fear and then chasing it. You are
    not failing to think your way out. You were never going to. That''s not where
    the door is.


    Here you''ll come to recognize the spiral as it begins — the particular tightening,
    the speeding, the way the breath goes high and quick when the mind picks up speed.
    You''ll learn that you cannot out-argue a spiral, and you don''t have to. You''ll
    feel how to drop out of the racing head and into the slower body: the weight of
    you on the bed, the long exhale, the cool of the air, the ground that doesn''t
    spiral. The thoughts may keep turning for a while. You don''t have to ride them.


    This is not a method for controlling your thoughts. There''s no thought-stopping,
    no force, no white-knuckling your mind into silence. We will not tell you to simply
    think positive while your nervous system runs a threat loop it can''t switch off.
    Nothing here promises a quiet mind on demand. The point isn''t to win the argument.
    The point is to stop having it — to come down out of the storm and feel your feet
    on the floor.


    You are allowed to leave a thought unfinished. You are allowed to not solve it
    tonight. The spiral will turn and the spiral will tire, the way weather does,
    and you can learn to let it pass overhead while you rest in a body that is, right
    now, safe. You don''t have to follow it down. You just have to come back to the
    ground.


    Book 3 of the Felt Sense Publishing anxiety series.'
