title: It Doesn't Have to Be an Emergency
subtitle: For the young professional whose body sounds the alarm every time someone
  needs something — bracing for a fallout that never actually comes
cover_tagline: Your nervous system thinks every 'can you' is a fire. It isn't.
description:
  short_blurb: Someone asks for five minutes of your time and your whole chest goes
    tight, like you've already failed a test nobody scheduled. This is a book for
    the twenty-something whose body treats a simple 'no' as a threat to survival.
    It won't teach you to be assertive. It'll help you tell the difference between
    a real fire and a false alarm.
  long_description: 'A coworker drops a ''quick question'' into your DMs and your
    heart rate answers before you do. A friend asks if you''re free Saturday and you
    feel the floor tilt — not because you don''t love them, but because some part
    of you has already decided that saying no will end something. You scan their tone.
    You rehearse the apology. You say yes before you''ve even checked whether you
    have a yes to give.


    This book is for you — the young professional whose alarm system fires at the
    smallest ask, who has confused ''someone is disappointed in me'' with ''something
    terrible is about to happen.'' You''re early in a career, early in a life, still
    figuring out who you are when nobody''s watching, and your body has decided the
    safest move is to never take up space. So every boundary feels like a danger.
    Every ''I can''t'' feels like a door slamming.


    Here, you''ll come to recognize the false alarm for what it is. You''ll feel how
    the dread arrives before any actual threat does — how your body braces for a catastrophe
    that has, in fact, never once arrived. You''ll notice the way you read faces for
    evidence of a fallout that isn''t there. You''ll learn that the tightness in your
    chest is information about your history, not a forecast of your future. And slowly,
    you''ll start to feel the gap between the alarm and the truth — the small, quiet
    space where you get to choose instead of flinch.


    This is not a book that will make saying no easy. Nothing makes it easy. It won''t
    hand you a script that turns your fear into a power move, and it won''t tell you
    your boundaries are a brand. There''s no optimizing here, no leveling up, no five-step
    protocol for becoming someone who never gets nervous. The nervousness isn''t a
    bug in you to be patched.


    What''s here instead is a way to stand at the blank space of a decision and notice
    that the alarm went off — and that you are still safe. To let the false alarm
    ring without obeying it. To draw one line and watch the catastrophe not happen.


    You''re allowed to make a mark that takes up room. You''re allowed to let someone
    be a little disappointed and discover that the world stays standing. You''re allowed
    to be brand new at this.


    Book 1 of the Blank Canvas Books boundaries series.'
