title: 'Burnout Recovery: Too Many Things, Not Enough You'
subtitle: How Gen Z Professionals Are Rewriting the Rules of Burnout
cover_tagline: It's not that you can't handle it. It's that there's too much of it,
  all at once, forever.
description:
  short_blurb: Forty tabs, three Slacks, and a to-do list that breeds overnight. This
    is for young professionals drowning in demands who keep being told to just prioritize
    better. The problem isn't your system. The problem is the volume, and this book
    finally says so.
  long_description: 'You know the feeling at 9:14 a.m. The notifications have already
    stacked up before your coffee''s cool, and your chest does the thing, that tight,
    underwater pressure, like you''re behind on a day that hasn''t started. You''re
    not lazy. You''re not bad at this. There is just genuinely too much, and it never
    stops arriving.


    This is for you if you''re early in your career and the demands don''t queue politely,
    they flood. The job, the side hustle, the group chat, the inbox that refills the
    second you empty it, the quiet expectation that you''re always reachable. You''ve
    tried every app and method. You''ve color-coded. You''ve done the Sunday reset
    and the brain dump and the two-minute rule, and the water still rises, because
    the issue was never your filing. The issue is the volume, and no amount of personal
    organization shrinks a flood.


    First, recognition: this is overwhelm, and overwhelm is not a skill deficit. It''s
    what a nervous system does when too much hits it at once with no gaps. Naming
    that matters, because you''ve spent years treating a flood like a personal failing,
    blaming yourself for not swimming faster in a current built to drown you. The
    current is not a verdict on your character.


    Then we go down into it. Not a hack to clear the list, the descent. We''ll get
    specific about what it''s like to be young and online and infinitely available,
    why ''just say no'' lands like a joke when saying no costs you rent or your standing
    or the only role you could get, and what your body''s actually telling you when
    everything feels equally and impossibly urgent. You stop fighting the flood long
    enough to feel where you are inside it, which is the only place clarity has ever
    come from.


    Then you come back, changed. Not with a tidier inbox, the inbox doesn''t care
    about your healing. You come back able to tell the difference between real demands
    and the manufactured kind, able to let the unimportant ones fall without the guilt
    spiral that used to follow, able to stand in the noise without it owning your
    whole body. The volume doesn''t drop. Your relationship to it does.


    This book will not promise you''ll get on top of it all. You won''t, and it''ll
    stop trying to sell you that. It won''t optimize your throughput. There''s no
    system here to help you absorb more, because absorbing more is the trap that got
    you here. What it offers is the radical permission to let some of it hit the floor
    and stay there.


    You are allowed to not catch everything. You were never supposed to. Start here,
    in the noise, and learn to stand.'
