title: There's No Room Left in Me
subtitle: For the high-functioning woman whose body is past capacity — when too much
  arrives at once and there's nowhere left to put it
cover_tagline: Your body filled up hours ago. Nobody told you that you were allowed
  to stop.
description:
  short_blurb: Some days the inbox, the texts, the deadlines, and the low roar in
    your chest all arrive at the same moment, and your body simply runs out of room.
    This is a book for the woman who keeps performing competence while her nervous
    system quietly floods. It won't hand you another system to manage — it will help
    you feel where the flood lives and let some of it move.
  long_description: 'It usually doesn''t announce itself. One more message lands,
    one more person needs something, and somewhere behind your sternum a door you
    didn''t know was open slams shut. Your chest goes tight. Your thinking goes flat
    and fast at the same time. You answer the email anyway, voice level, hands steady,
    while inside there is no room left — no room to think, no room to feel, no room
    to be a person instead of a function.


    This book is for you: the one everyone counts on, the one who holds the plan for
    the household and the team and the group chat, the one who has gotten very good
    at looking fine while her body quietly exceeds its capacity. You may have been
    told you''re ''so organized,'' ''so on top of it.'' What no one sees is the flood
    underneath — the sense that everything is arriving at once and there is nowhere
    to put any of it.


    You''ll come to recognize overwhelm not as a character flaw or a time-management
    failure, but as a nervous system that has taken on more than it can hold and started
    bracing. You''ll learn what the flood actually is in the body — the rising pressure,
    the narrowed breath, the way attention scatters when there''s too much to track.
    You''ll find small, portable ways to make a little room again: ways that fit on
    a train, in a stairwell, in the ninety seconds before the next call. Not to clear
    your plate. To come back into your body while it''s still full.


    This book will not promise to make the overwhelm stop. It will not optimize your
    morning or hand you a tracker or tell you to do more, faster, calmer. There is
    no protocol here that overrides what your body is telling you. What''s offered
    instead is recognition — the relief of understanding what is happening and why
    it makes such complete sense — and the beginning of a different relationship with
    your own capacity. One where reaching your limit is information, not failure.


    You are not too much. You have simply been holding too much, for too long, with
    too little room to set any of it down. That''s not a flaw in you. That''s a body
    doing exactly what it was built to do, asking, finally, to be felt.


    You''re allowed to stop filling the room. You''re allowed to take up the room
    you''re in.


    Book 1 of the Felt Sense Publishing somatic healing series.'
