title: The Alarm That Won't Stop Ringing
subtitle: For the steady one bracing for a danger that never comes — when your body
  sounds the alarm and the forest is, somehow, still quiet
cover_tagline: Your body is ringing a bell for a fire that isn't there.
description:
  short_blurb: Your heart is pounding and nothing is wrong, and that is somehow the
    most frightening part. This is a book for the mind that stays braced for a catastrophe
    that never arrives, and a slow walk toward the part of you that can finally lower
    its hands.
  long_description: 'It comes without warning. You are doing something ordinary —
    driving home, answering an email, lying down at the end of a day that went fine
    — and suddenly your chest tightens, your breath shortens, and your whole body
    floods with the certainty that something is terribly wrong. You scan the room.
    You scan your life. Nothing is on fire. And still the alarm rings, loud and physical
    and impossible to argue with.


    This book is for you: the one everyone leans on, the one who holds the family
    together, the one whose own body has started sounding an alarm for a danger that
    never seems to arrive. You have spent years bracing for the next thing to go wrong
    — a parent''s fall, a child''s crisis, the call that changes everything — and
    somewhere along the way your nervous system stopped standing down. Now it treats
    a quiet Tuesday like a threat.


    Walk slowly here, and you will come to recognize something. That the racing heart
    is not a sign that you are broken. That the dread is not a prophecy. That your
    alarm system is not malfunctioning so much as exhausted — left on for so long,
    on behalf of so many people, that it has forgotten how to rest. You will learn
    to feel the false alarm for what it is: an old, faithful, frightened part of you
    that has been bracing far too long, and can at last be let off watch.


    This is not a book that will teach you to override the fear, breathe it away in
    four counts, or optimize your way to calm. There is no technique here to master
    and no morning routine to fail at. It will not promise that the alarm will never
    ring again. What it offers instead is stiller and stranger: a way of standing
    in the trees while the bell rings, no longer believing every clang means the worst,
    until the ringing has nothing left to feed on and the quiet of the forest comes
    back on its own.


    Nothing here will help you fight the alarm. That has never worked, and it is not
    the point. The point is to stop running toward a fire that isn''t there, and to
    let your body discover, at last, that the danger has passed.


    You are not in danger. You are just very, very tired of waiting for it. You are
    allowed to put your hands down.


    Book 1 of the Still Forest Press anxiety series.'
