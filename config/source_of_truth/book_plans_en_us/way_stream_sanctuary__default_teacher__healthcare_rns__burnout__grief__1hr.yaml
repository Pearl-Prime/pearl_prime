title: 'Burnout Recovery: The Weight You Carry (1)'
subtitle: A Field Guide for Healthcare Rns Navigating Burnout
cover_tagline: You didn't just get tired. You lost something, and nobody held a service
  for it.
description:
  short_blurb: 'Burnout isn''t only exhaustion — for a nurse, it''s a stack of losses
    no one ever named: the patients who didn''t make it, the version of you who still
    felt things on the way to your car. This one-hour reset doesn''t tell you to recharge.
    It helps you put the weight down by finally calling it what it is: grief.'
  long_description: 'It''s the drive home after a shift where someone died, and you
    realize you can''t remember their face anymore — and you''re not sure which part
    of that scares you. You''re a nurse. You''ve carried codes and family rooms and
    the ones who coded back, and somewhere in there you stopped letting yourself feel
    the going. People keep calling it burnout, like you''re a battery that ran low.
    Recharge, they say. Take a bath, take a walk, use your PTO. But you know it''s
    heavier than tired, and no amount of sleep touches it. Something has been quietly
    taken from you, shift after shift, and no one ever called it a loss.


    This hour is for the nurse who is grieving and doesn''t have a word for it. Not
    for the one who needs a self-care checklist. For the one who feels numb in the
    break room and then cries at a commercial in the parking lot and can''t explain
    the gap between those two things. For the one who has been told they''re strong
    so many times that they no longer know where to put the part of them that isn''t.


    First, you name it. Not stress — grief. The patients. The years. The version of
    you who flinched the first time and felt it all the way down, before you learned
    to stop. You let yourself see how much you''ve been carrying without ever being
    handed a place to set it down. Then you go down into it, instead of bricking it
    over with another double or another joke at the nurses'' station. You let the
    weight be exactly as heavy as it actually is, because pretending it''s light is
    the thing that''s been quietly crushing you. You don''t analyze it. You don''t
    fix it. You let it be true for one honest hour. And then you come back up — not
    cured, not "resilient," not suddenly ready to give more than you have. Just someone
    who finally told the truth about what this work has cost, and who can breathe
    a little easier for having said it out loud.


    This book will not promise to make you love nursing again, optimize your recovery,
    or hand you a routine to power through. It won''t tell you that you''re brave
    for never breaking. It will not ask you to be grateful for the lesson, or to find
    meaning in the ones you lost.


    What it offers is smaller and truer: permission to grieve what your job has asked
    you to bury, in the time it takes to drink one cup of coffee before the next shift.
    You''re allowed to have lost something real. You''re allowed to set it down right
    here. The weight was never proof that you were weak — it was proof that you were
    still paying attention. Put it down. From here, you carry only what you choose
    to.'
