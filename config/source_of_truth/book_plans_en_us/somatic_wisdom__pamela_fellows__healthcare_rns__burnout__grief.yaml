title: The Losses No One Sent Flowers For
subtitle: For the nurse grieving in a hallway between rooms — the patients, the version
  of you who started, and the love for this work you're afraid you've lost
cover_tagline: You've buried more than anyone knows, and you did it standing up.
description:
  short_blurb: Nurses grieve constantly and almost never out loud — the patient who
    didn't make it, the colleague who left, the bright-eyed person who started this
    career and isn't here anymore. This book is for the grief you've been carrying
    between rooms with no time to set it down. It won't rush you toward closure. It
    will simply, finally, let you mourn.
  long_description: 'There was no funeral for most of it. The patient you sat with
    at the end of your shift, who was gone by the start of your next one — and you
    had four others to chart, so you washed your hands and kept moving. The version
    of you who came into this work wide open, who cried in the supply closet the first
    time and meant it. The certainty that you were helping. You''ve lost so much,
    quietly, and the world keeps handing you a fresh assignment before the last loss
    has even landed.


    This book is for the nurse who is grieving and hasn''t been allowed to. Not the
    tidy, ceremonial grief the world makes room for — the other kind. The cumulative,
    unwitnessed losses that pile up in a body that never gets to stop and feel them.
    You have buried more than anyone knows, and you did it standing up, in scrubs,
    with a smile for the next family.


    You''ll come to recognize grief where you didn''t know to look for it: in the
    numbness that isn''t peace, in the irritability that surprises you, in the strange
    flatness where your love for this work used to be. You''ll feel how unmourned
    loss settles into the body and waits — the throat that tightens, the weight behind
    the sternum, the breath you don''t quite take. And gently, at your own pace, you''ll
    begin to let some of it move. Not to get over it. To finally honor it.


    This is not a stage-by-stage program for getting to acceptance on schedule. Grief
    is not a task to complete, and you are not behind. Nothing here will ask you to
    find the silver lining, to be grateful for the lesson, or to push the sorrow down
    so you can be functional by Monday. You''ve been functional. That was never the
    problem.


    What it offers instead is a place to set it down. The witness you never got. The
    slow, embodied permission to mourn what was taken and to release what you''ve
    been carrying for people who will never know your name — so that warmth can return
    to the places grief has held shut.


    You are allowed to grieve. All of it. Even now. Even the parts no one sent flowers
    for.


    Book 2 of the Felt Sense Publishing Burnout series.'
