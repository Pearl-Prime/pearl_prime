title: Still On Duty in the Dark
subtitle: For the first responder whose mind never stands down — when the scanning,
  listening, threat-checking part of you keeps working a shift that ended hours ago
cover_tagline: You're off the clock. Some part of you refuses to believe it.
description:
  short_blurb: The tones haven't dropped. Nothing is wrong. And still you're listening
    — to the hallway, to your own pulse, to a danger that never comes. This book doesn't
    tell the watcher to relax. It sits beside it in the dark and shows it, slowly,
    that the shift is over.
  long_description: 'It''s the middle of the night and you are wide awake, listening.
    Not to anything. To everything. The settle of the house, a car three streets over,
    the rhythm of your own heart — your body is sweeping the room for a threat it
    can''t find because there isn''t one. You are home. The doors are locked. You
    are safe. And the part of you that scanned every scene for the thing that could
    go wrong is still on duty, still standing post, refusing to be relieved.


    This book is for the paramedic, the firefighter, the EMT — anyone whose nervous
    system learned that staying alert kept people alive, and then was never told the
    shift had ended. The one who lies down to rest and instead keeps watch. The one
    who can read a room in two seconds and can''t, for the life of them, read it as
    safe. If hypervigilance has become the floor you live on instead of a tool you
    pick up and set down, you''ll recognize yourself in these pages.


    Chapter by chapter, you''ll come to understand the watcher for what it is: not
    paranoia, not a malfunction, but the most loyal part of you, doing the only job
    it was ever given. You''ll see why it won''t switch off when you tell it to, why
    the quiet hours somehow feel the least safe, and how the body — met gently, never
    forced — can learn that the danger has passed and the post can finally be left.
    The practice is small and portable. It belongs in the rig, in the bunk room, in
    the dark before sleep.


    This book will not make you hypervigilant about being hypervigilant. It offers
    no protocol to run, no drill to master, no way to win against your own watchfulness
    — because the watcher was never the enemy. There is nothing here to fix, only
    something faithful to thank, and slowly, to let rest.


    What you''ll find instead is a steady presence sitting with you through the long
    hours — the scanning named, the vigilance honored, and permission to let the watch
    be held by something other than you for one honest night. You don''t have to keep
    the whole house safe alone. You''re allowed to be the one who is kept, for a change,
    while the dark does you no harm.


    Book 2 of the Night Architecture Books somatic healing series.'
