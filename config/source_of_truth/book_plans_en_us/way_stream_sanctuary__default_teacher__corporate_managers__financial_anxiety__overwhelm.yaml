title: 'The Number in Your Head: When Everything Is Too Much'
subtitle: A Real Talk Guide to Financial Anxiety for Managers
cover_tagline: The spreadsheet isn't the problem. It's that there are eleven of them,
  and they're all yours.
description:
  short_blurb: You manage a team, a budget, a forecast, and a mortgage, and lately
    the money math runs on a loop you can't shut off. This is a plain-spoken book
    about what financial anxiety actually feels like when too much is landing at once,
    and what to do with your body when the whole stack tips over. No budgeting app,
    no five-year plan, no calm-down script.
  long_description: 'It''s 11:40 on a Tuesday night. The team''s compensation review
    is sitting in your inbox, your own raise didn''t land, the credit card statement
    is open in another tab, and your chest has that tight, humming feeling like a
    server fan that won''t spin down. You''re not in danger. Nothing is on fire. But
    your body is behaving as if everything is due at once, because in your head it
    is.


    This book is for the manager who holds the numbers for everyone else and quietly
    goes under on their own. All day you approve other people''s expenses, sign off
    on other people''s budgets, model next quarter with a steady face. Then you close
    the laptop and the personal money math arrives with no agenda, no deck, no one
    to hand a piece of it to. Eleven open tabs, four hours of sleep on offer, and
    a mind that keeps adding line items in the dark.


    Waystream doesn''t hand you a system, because a system is one more thing to manage.
    It starts by naming the actual state you''re in. This is overwhelm: too much landing
    faster than you can sort it, until the part of you that triages just quits and
    the whole pile floods at once. The first thing you''ll practice is catching that
    flood at the edge, the moment it starts, while there''s still an evening left
    to save. Then comes the part that runs against every instinct you have: instead
    of speeding up to clear the pile, you stop. You let it be a pile. You quit ranking
    the fears in order of likelihood and you put one hand on the single thing actually
    in front of you. That downward move, out of the scramble and into the one real
    obligation, is the whole method. You surface able to read the actual number instead
    of the static around it.


    Here is what this book will not do. It will not optimize your finances. It will
    not promise that the right tracker makes the feeling disappear. It will not tell
    you to wake at five and visualize your way to plenty. Your overwhelm is not a
    discipline problem and you will not be asked to out-work it.


    What it gives you instead is a name for what your body is doing when the stack
    tips, and a way to stand in the middle of it without being pulled under. Direct,
    secular, no soft lens. Written for someone competent who is tired of pretending
    the load is light.


    You''re allowed to be carrying more than anyone could hold neatly. You''re allowed
    to set most of it down for one night and lift exactly one piece. Start there.'
