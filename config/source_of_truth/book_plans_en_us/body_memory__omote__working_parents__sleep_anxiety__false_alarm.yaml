title: The House Is Quiet and You Are Still Braced
subtitle: For the parent whose body keeps sounding the alarm long after the kids are
  asleep and nothing is wrong
cover_tagline: Everyone is breathing. You checked. So why is your body still standing
  guard?
description:
  short_blurb: You did everything right. The children are asleep, the doors are locked,
    the day is done — and your body is lying in the dark, rigid and ready, certain
    of a danger it can't name. This is a steady, ground-level book for the working
    parent whose alarm system never got the message that the watch is over.
  long_description: 'It is late, and the house is finally quiet. You checked on them
    twice. Everyone is breathing. The doors are locked. And still your body is lying
    there in the dark, braced — heart going, jaw tight, listening for something you
    cannot name. There is no fire. There is no intruder. There is only you, exhausted
    past the bone, unable to convince the oldest part of yourself that the day is
    actually over.


    This book is for the working parent whose alarm system never stands down. You
    have spent the entire day on watch — catching the falling cup, hearing the cough
    through the wall, holding the whole fragile structure together. Of course your
    body learned to brace. Of course it forgot how to stop. The trouble was never
    that you can''t sleep. The trouble is that a nervous system trained to guard everyone
    all day does not believe, at midnight, that it is finally safe to set the watch
    down.


    Gently, you will come to recognize the false alarm for what it is. You''ll feel
    the difference between a real danger and an old habit of bracing that has long
    outlived its use. You''ll learn what it does to a body to be the one who is always
    ready — and what begins to soften when that body is finally, slowly, given the
    signal that the ground beneath the bed is holding, that it does not have to. There
    is a particular kind of tiredness that comes from being the one who never gets
    to stop, and a particular kind of relief, too, in learning that the floor will
    still be there to hold you whether or not you are awake to feel it.


    This book will not optimize your sleep. It will not hand you a checklist to fail
    at or a routine to perfect. It will not tell you to just relax — you of all people
    know how useless that is. There is no danger here to outrun and no version of
    you that needs to try harder. The bracing is not a flaw in you. It is a watch
    that was kept too long, by someone who loved too much, and it is allowed to end.


    You are not failing at rest. You are a body that learned to stand guard, being
    shown, breath by breath, that it can finally lie down on ground that will hold
    you while you do.


    Book 1 of the Held Ground Press Sleep Anxiety series.'
