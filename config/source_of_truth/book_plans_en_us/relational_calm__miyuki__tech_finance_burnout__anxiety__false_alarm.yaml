title: Nothing Is Wrong and I Can't Put It Down
subtitle: For the engineer whose chest braces all day for a threat that never arrives
  — when the dashboard is green and the body still won't believe it
cover_tagline: The alarm is going off in an empty room.
description:
  short_blurb: You closed the laptop hours ago, yet your body is still braced. Nothing
    is on fire — no outage, no margin call, no message you missed — but the chest
    stays tight, ready for a danger it can't name. This is a quiet book about the
    false alarm that runs underneath a high-functioning life, and what it might be
    trying to tell you.
  long_description: 'It starts before you notice it. A tightness in the chest as you
    open the standup channel. A held breath when the P&L loads. You scan the dashboard,
    the inbox, the bank balance, and everything is fine — and your body does not believe
    it for a second.


    This is the false alarm. The part of you that learned to brace for the worst and
    never learned how to stop. You have built a whole life on it: the early replies,
    the triple-checks, the sense that if you just stay alert enough, nothing will
    go wrong. From the outside it looks like diligence. From the inside it feels like
    standing in an empty room with the alarm going off.


    This book is for the engineer, the founder, the analyst whose nervous system treats
    a Slack ping like a fire and a quiet evening like the lull before one. For the
    person who is, by every external measure, doing well — and who cannot find the
    off switch on the dread. You are not broken. You are not overreacting. Your alarm
    is simply firing in a room where there is no longer any fire.


    In these spare pages you will come to recognize the shape of your own bracing:
    the chest, the breath, the reflexive reach for the phone. You will see how the
    alarm got installed, and why it keeps sounding long after the threat has passed.
    And you will sit with the one question it has been asking all along — what is
    your body trying to tell you? — without rushing to silence it.


    Nothing here will optimize your anxiety. There is no protocol, no five-step framework,
    no way to perform your way to calm. That is the point. This is not a tool to make
    you more productive. It is a quiet room where you are allowed to set the bracing
    down and notice that, for now, in this moment, nothing is actually wrong.


    You do not have to keep bracing. You are allowed to let the chest come down and
    rest in the quiet that is already here.


    Book 1 of the Bare Form Books Anxiety series.'
