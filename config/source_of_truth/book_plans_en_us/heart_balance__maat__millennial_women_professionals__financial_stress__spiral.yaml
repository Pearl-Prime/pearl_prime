title: It Always Starts With One Bill
subtitle: For the 2am mind that turns a single charge into a thousand futures — and
  can't stop running the math on a life
cover_tagline: One number, then a thousand, then the worst one twice.
description:
  short_blurb: One charge on the statement, and by 2am you've run the math on the
    rest of your life — the emergency you can't cover, the retirement you'll never
    reach, the version of you that ends up with nothing. This is a book for the millennial
    woman whose money worry doesn't stay one worry. It loops, it multiplies, it feeds
    on itself. It won't tell you to think positive. It will help you step off the
    wheel.
  long_description: 'It always starts with one bill. One charge you didn''t expect,
    one number slightly higher than you''d braced for. And if it stopped there you
    could sleep. But it never stops there. By 2am the single number has become a thousand:
    what if the car goes next, what if the rent climbs again, what if you lose the
    job, what if you''re forty and have nothing, what if you''re seventy and have
    nothing, what if this one bill is the first crack in a life that quietly comes
    apart. The thought feeds itself. Each answer you reach for becomes the next, worse
    question.


    This book is for the woman whose mind is sharp and will not switch off. You are
    not careless about money — you may be the most careful person you know. That''s
    exactly the problem. The same focus that makes you good at your work turns inward
    in the dark and runs the same terrified math over and over, certain that if you
    just think it through one more time you''ll finally feel safe. You never do. The
    spiral isn''t reasoning. It only feels like reasoning.


    You''ll come to recognize the loop for what it is. How one bill becomes a thousand
    futures, and why your mind mistakes that downward pull for diligence. You''ll
    see that the spiral has no bottom and was never meant to reach one — that it survives
    on the question you keep feeding it. You''ll learn what it feels like to let a
    thought be just one thought, weighed once and set down, instead of the first link
    in a chain that drags you under. You''ll find that you can step off the wheel
    without solving the thing the wheel was spinning about, because the spinning was
    never going to solve it anyway.


    This book will not tell you to think positive or replace your fears with affirmations.
    It won''t pretend the future is certain or the numbers don''t matter. Some of
    what you''re afraid of is real, and you deserve a book honest enough to say so
    rather than chant it away.


    What it offers is a way to tell the one true bill from the thousand imagined ones
    it summons. A way to weigh a worry once — fairly, fully — and then stop, instead
    of carrying its whole imagined lineage to bed. Permission to put the math down
    at night, knowing it will still be there, smaller, in the morning light where
    it belongs.


    You are not broken for spiraling. You are a careful mind doing the only thing
    it knows in the dark. Let''s teach it another.


    Book 2 of the Feather & Scale Press financial stress series.'
