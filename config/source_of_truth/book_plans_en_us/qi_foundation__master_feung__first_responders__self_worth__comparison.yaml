title: Everyone Else Seems Built for This
subtitle: For the responder who measures their worth against the calm ones in the
  bay — and always comes up short
cover_tagline: They walk out of the worst calls steady, and you wonder what they have
  that you don't.
description:
  short_blurb: You watch the others walk out of the same call unshaken, joking by
    the rig, and you decide quietly that they are built for this and you are not.
    This is a book for the first responder who measures their worth against everyone
    who looks calm and fine. It will not help you win that comparison — it will help
    you stop running the race no one else is even in.
  long_description: 'It happens in the bay after a bad one. The others are already
    laughing, refilling their coffee, ribbing each other like nothing touched them
    — and you are the one whose hands are still not quite steady, who can''t stop
    seeing it, who is privately taking inventory and coming up short. You decide,
    the way you have decided a hundred times, that everyone else is simply built for
    this work, that they have something you were issued less of, and that the gap
    between you and them is the truth about your worth.


    This book is for the paramedic, the firefighter, the officer, the dispatcher,
    the nurse whose mind never stops measuring — who scrolls past the colleague who
    made lieutenant, the partner who seems unbothered, the rookie who handles it better
    than you did, and turns each one into evidence that you don''t quite belong. You
    have turned a sharp, hard-won attention against the one person it was never meant
    to wound: yourself, held up against everyone who looks fine. And the people you
    compare yourself to are doing the same thing in the dark, where you can''t see
    it.


    You will come to recognize how comparison drains the root to chase the surface
    — how it disguises itself as standards, as drive, as keeping up; how it never
    once tells you the whole story of the person you are measuring against; how it
    keeps your worth dependent on a ranking that shifts with every shift. You will
    feel what changes in the body when you stop bracing against the others and let
    your breath reach all the way down. You will see that the calm you envy is often
    its own kind of armor, and that what you took for being built better was only
    being better at hiding.


    This book will not help you win the comparison. It will not optimize you into
    the unshaken one, or rank you higher, or close the gap, because the gap was never
    real and the race was never run. There is no version of you, calmer or faster
    or more decorated, who finally measures up — and the pursuit of that version is
    the thing that has been bleeding you dry.


    What it offers instead is the ground beneath the ranking: the recognition that
    your worth is not a position on a list, that the steadiness you long for grows
    from the root and not from comparison, and that you were never behind in a race
    that exists only in your own scanning mind. You are allowed to stop measuring.
    You are allowed to be enough exactly where you stand.


    Book 2 of the Root & Meridian Press self worth series.'
