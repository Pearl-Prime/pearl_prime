title: 'The Thought That Won''t Leave: The Witnessing Practice'
subtitle: A One-Hour Overthinking Reset for Young Professionals
cover_tagline: Part of you has been monitoring this conversation for threats the whole
  time. It never clocks out.
description:
  short_blurb: 'There''s a part of your mind that scans every room, every reply, every
    shift in someone''s tone — always on, never off. This is the one-hour edition
    of the overthinking work for young professionals: how to recognize the hypervigilant
    watcher, let it stand down, and stop living one step behind your own life.'
  long_description: 'You walk into the standup and within two seconds you''ve read
    the room — who''s tense, who''s quiet, whether your manager glanced at you a beat
    too long. You don''t decide to do this. A part of your mind is always running
    in the background, scanning for the first sign that something is wrong, the way
    airport security scans every bag. It''s exhausting, and you''ve done it so long
    you forgot it was running.


    This is for the young professional whose mind never fully stands down. You''re
    early in your career, in rooms where you don''t yet know the rules, so a part
    of you decided the only safe move is to watch everything — every tone, every typo
    in a reply, every meeting invite with no agenda. The watching feels like control.
    It feels like the thing keeping you safe. It''s also the reason you''re never
    actually here, because you''re always one step ahead, bracing.


    This is the one-hour edition. One sitting, no filler, and it is not a fix. The
    arc: first, recognition — you learn to see the watcher itself, to notice the part
    of you that''s been monitoring the room instead of being in it. Then, descent:
    instead of fighting the hypervigilance or shaming yourself for it, you go down
    underneath it to the fear it''s been guarding, and you let that be felt. Then
    you come back, and the watcher loosens its grip — not gone, because it was trying
    to protect you, but no longer the only thing you are.


    This book will not promise you''ll stop noticing things. It will not give you
    a mindfulness regimen, a body scan to perform every morning, or a reason to be
    grateful for your vigilance. It will not tell you to "just be present" — being
    told to relax has never once made you relax. The watcher is allowed to keep watching.
    What changes is that you stop mistaking the guard tower for home.


    Written in plain, unsentimental language by Ravi Chandra, this is for the version
    of you replaying your boss''s facial expression from a call, or lying awake having
    scanned a text for hidden meaning. You''ll learn to recognize the part of you
    that never clocks out — and you''ll have a way to let it rest, finally, in the
    room you''re actually in.


    The room is fine. You''re allowed to stop standing guard.'
