title: The Yes That Costs You
subtitle: For the first responder whose body braces every time they try to say no
  — when drawing a line trips the same alarm as a call
cover_tagline: Your alarm is firing. There is no fire.
description:
  short_blurb: You can run into a burning building, but you can't say 'I can't cover
    that shift' without your chest going tight. For a first responder, a boundary
    doesn't feel like a choice — it feels like a threat. This is a book about the
    alarm that fires when there is no danger, and how to stand at the line without
    bracing for the blast.
  long_description: 'The text comes in. Someone needs the shift covered. And before
    you''ve even read it all the way through, your thumb is moving, your chest is
    tightening, and you''re already typing yes. You tell yourself it''s just easier
    this way. But your body knows it isn''t easy. Your body braced the second you
    thought about saying no.


    This is the strange thing nobody warns you about. You can walk into the worst
    moment of a stranger''s life and stay steady. You can hold a scene together while
    everything falls apart. But ask you to draw one small line — to say ''not this
    time,'' to leave when your shift ends, to let the phone ring — and the same alarm
    that keeps you alive on a call starts screaming. The body that was trained to
    run toward danger has started reading your own limits as danger.


    This book is for the medic, the firefighter, the dispatcher, the nurse, the officer
    who says ''I''m fine'' as a reflex and means ''I can''t afford not to be.'' It''s
    for the one who confuses a boundary with a betrayal, who feels guilt arrive the
    instant they consider their own needs, who has mistaken a constant readiness for
    strength. You will come to recognize the false alarm for what it is — an old protector
    firing on a threat that isn''t there. You''ll feel the difference between the
    danger that earns your adrenaline and the discomfort that only borrows it. You''ll
    learn what it means to stand at the threshold, feel the alarm rise, and not move
    just because it told you to.


    This will not teach you to feel nothing. The alarm will still come. That''s not
    a malfunction to fix — it kept you alive. This book will not toughen you into
    armor or hand you a script for saying no without flinching. There is no trick
    here for never feeling the pull. What there is, is the slow work of learning that
    you can feel the bracing and hold your ground anyway. That the line you draw is
    not a wall against the people you serve. It''s the thing that lets you keep serving
    them without disappearing.


    You are allowed to feel the alarm and stay still. You are allowed to let it ring
    and not run. The line you hold is yours to hold.


    Book 1 of the Iron Gate Press boundaries series.'
