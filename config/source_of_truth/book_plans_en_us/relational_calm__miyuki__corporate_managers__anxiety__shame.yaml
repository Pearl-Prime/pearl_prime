title: The Day They Realize You Don't Know
subtitle: For the manager who feels like a fraud in the corner office — overworking
  to cover a defect they're sure is real
cover_tagline: You've never been found out. You're certain it's coming.
description:
  short_blurb: You got the promotion, the team, the title — and a private certainty
    that one day they'll all see you never deserved any of it. This is a book for
    the manager who works twice as hard to hide a flaw they can't name, and who reads
    competence in everyone but themselves.
  long_description: 'There''s a moment after a meeting goes well when, instead of
    relief, you feel the clock start. You pulled it off again. And somewhere underneath
    the relief is the quiet certainty that the next time, or the one after, is when
    they''ll finally see it — the thing about you that doesn''t belong here.


    This is shame, and it doesn''t announce itself as shame. It wears the mask of
    high standards. It looks like staying late, over-preparing, re-reading the message
    four times, saying yes when you''re empty — all to cover a defect you''re sure
    is real and sure is yours alone. Everyone else seems to belong in the room. You''re
    the one getting away with it.


    This book is for the manager who feels like a fraud in a job they earned. The
    one who hears praise and braces for the exposure, who treats their own competence
    as a lucky streak about to end. You''ve been told to fake it till you make it,
    to feel the fear and do it anyway — advice that quietly agrees there''s something
    to hide.


    You''ll come to recognize the difference between guilt, which says you did a bad
    thing, and shame, which whispers that you are the bad thing. You''ll see how the
    overworking is a cover story, how the buried belief got written long before this
    job, how you extend grace to everyone on your team and none to the person holding
    it together. You''ll notice how shame edits what you let yourself want — the question
    you don''t ask so you won''t look unsure, the credit you hand to luck, the way
    a compliment slides off while a single frown stays for a week. And you''ll begin
    to feel what it is to be in the room without the cost of pretending you deserve
    it.


    This book will not teach you to project more confidence. It has no power-pose,
    no affirmation script, no personal-brand audit. It will not promise to fix the
    flaw, because the flaw was never the truth about you. There is nothing here to
    optimize.


    What there is, is clean light. A plain look at the thing you''ve been hiding,
    and permission to set down the cover story you''ve carried into every room. You
    are not getting away with anything. You were never the defect you''ve been overworking
    to hide.


    Book 4 of the Bare Form Books anxiety series.'
