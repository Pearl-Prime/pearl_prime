title: Too Many Bodies in the Same Hour
subtitle: For the nurse whose compassion arrives faster than she can pour it — when
  the floor floods and there is no room left inside to feel anything at all
cover_tagline: You ran out of yourself somewhere around the third call light.
description:
  short_blurb: Some shifts, the need arrives all at once and there is simply more
    of it than there is of you. This is a tender companion for the nurse who has stopped
    feeling not because she stopped caring, but because caring kept coming faster
    than anyone ever poured back into her. It does not ask you to do more. It asks
    what you needed before you could give.
  long_description: 'It is the hour when everything arrives at once. Two call lights,
    a family in the hallway, a monitor alarming, the new admit rolling in, and somewhere
    underneath all of it a patient who just needed you to sit for thirty seconds —
    and you couldn''t. You moved past the door. You will carry that small moving-past
    home with you, the way you carry all of them.


    This book is for the registered nurse who is not burned out in the way the posters
    mean it. You still care. That is exactly the problem. The compassion still comes
    — it floods you faster than you can pour it out, until there is no room left inside
    to feel any of it, and you go quiet behind your own eyes just to make it through
    to the end of the shift. You are not cold. You are over-full. There is a difference,
    and almost no one names it.


    Here you will come to recognize the flood for what it is. How the alarm in your
    chest is not weakness but a vessel that has been asked to hold more than any vessel
    can. How the numbness that frightens you is your own depth protecting itself.
    How you learned, somewhere in nursing school or your first code, that your needs
    come last — and how that quiet arithmetic has slowly emptied the cup you keep
    trying to give from. You will sit with the recurring question this whole series
    turns on: what do you need, before you can give?


    This is not one more thing to do well. It is a place to set the load down. Page
    by page, breath by breath, it stays beside you while you remember that you were
    a person before you were a pair of hands — and that the person is still in there,
    waiting to be poured back into. You do not have to earn the refilling. You only
    have to stop pretending you do not need it.


    This book will not make you faster. It will not optimize your shift, hand you
    a resilience hack, or tell you to be grateful for the calling. It promises no
    fix, because you are not broken — you are depleted, and depletion is not a flaw
    to correct. There is no productivity here. There is only the slow refilling that
    happens in the dark, in the quiet, when you finally let your hands open.


    You are allowed to have needed something today. You are allowed to have needed
    it the whole time.


    Book 1 of the Open Vessel Press compassion fatigue series.'
