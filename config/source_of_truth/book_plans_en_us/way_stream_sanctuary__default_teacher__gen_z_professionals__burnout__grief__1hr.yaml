title: 'After the Flame: After the Loss'
subtitle: A Field Guide for Gen Z Professionals Navigating Burnout
cover_tagline: Burnout isn't just exhaustion. It's a loss you never got to name.
description:
  short_blurb: You expected to feel tired after burning out. You didn't expect to
    feel like something died. This is a one-hour reset for the young professional
    grieving the version of work, and the version of themselves, that flamed out and
    didn't come back.
  long_description: 'There''s a specific kind of quiet that comes after the burnout
    breaks. Not the busy kind. The hollow kind. You finally have a slow weekend and
    instead of relief you feel a strange ache, like you''re at a funeral for someone
    and you can''t figure out who. That someone is you. The you who used to care this
    much. The you who thought the late nights would add up to something. This book
    is for the young professional who burned hot, gave everything to the job, the
    team, the dream, and woke up on the other side to find a loss no one warned you
    about.


    Most burnout advice treats this like a battery problem. Rest more. Set boundaries.
    Recharge. But you already know it''s not about sleep, because you slept and you
    still feel emptied out. What you''re actually carrying is grief, the kind that
    has no ceremony, no casserole, no one asking how you''re holding up. You lost
    the relationship you had with your own ambition. You lost the certainty that hard
    work was a safe bet. Maybe you lost a job, or a team, or the future you''d already
    half-spent in your head.


    In one hour, this is a place to stop pretending that''s nothing. You''ll recognize
    the loss for what it is, in plain language you can actually use the next time
    the ache shows up at your desk. Then you''ll go down into it instead of scheduling
    around it, because the part of burnout that grinds is the refusal to let the old
    version finish dying. And you''ll come back, not optimized, not ''better,'' but
    lighter, with a clearer sense of what was actually yours and what the job borrowed
    and never gave back.


    This will not promise you a comeback arc. It will not hand you a five-step framework
    to bounce back stronger by Monday. There is no morning routine here, no productivity
    reframe, no gentle lie that this was secretly a gift. Some of what you gave is
    just gone, and pretending otherwise is half of why you''re stuck.


    What it will give you is permission to grieve a career season the way you''d grieve
    anything real, without performing recovery for anyone. You''re allowed to mourn
    the person who could run on fumes. You''re allowed to not want them back, and
    you''re allowed to feel the size of what that costs. Sit down. You don''t have
    to flame back up to be okay.'
