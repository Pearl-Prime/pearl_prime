title: The Body Braced for a Code That Never Comes
subtitle: For the nurse whose alarm never switches off — steady on the floor, but
  lying awake at 3am bracing for a danger that isn't in the room
cover_tagline: Off the clock, and still standing watch over an empty room.
description:
  short_blurb: You learned to brace because bracing kept people alive. But now the
    shift is over, the room is dark, and your body is still waiting for the alarm
    to sound. This is a steady, unhurried look at what it costs to live ready for
    an emergency that is no longer coming, and what it takes to finally let your guard
    down.
  long_description: 'It is the middle of the night and your body is doing the thing
    it always does. Heart a little too fast. Jaw set. Ears half-listening for a monitor
    that isn''t there. The shift ended hours ago, but no one told the part of you
    that stands watch. You are home, in the dark, safe by every measure that matters
    — and still braced for the code that never comes.


    This book is for the nurse whose alarm system never learned how to switch off.
    The one who is unshakable at the bedside and wide awake at 3am. You have spent
    years training your body to fire first and feel later, to catch the fall before
    it happens, to be ready. That readiness saved people. It is also the reason rest
    feels like a danger you can''t afford.


    Here you will come to recognize the false alarm for what it is. The dread that
    arrives without a reason. The flinch at a quiet phone. The way your chest tightens
    in a calm room because calm itself has started to feel like the moment before
    something breaks. You will see how courage, for you, was quietly redefined as
    never letting your guard down — and how much that definition has cost you.


    This is not a book that will teach you to power through, regulate faster, or talk
    yourself out of what your body already knows. There is no fix here, and no one
    is going to call your exhaustion a mindset problem. What there is, instead, is
    a steady voice in the next room and the slow, structural work of teaching a braced
    body that the emergency is over. That the floor beneath you will hold. That you
    are allowed to set the watch down.


    Real courage, it turns out, is not staying ready forever. It is letting yourself
    be unguarded in a safe and ordinary dark, and trusting that you will survive the
    feeling that rushes in when you finally stop bracing.


    You kept everyone else alive. You are allowed to be off duty now. The night is
    wide and quiet, and for once there is nothing in it that needs you. Let the room
    be dark. Let the watch end. Let the weight you have carried all shift settle onto
    a floor that was built to hold it, and rest.


    Book 1 of the Night Architecture Books Courage series.'
