title: There Was No Room Left for Me
subtitle: For the nurse carrying a full unit in her chest — when too much arrives
  at once and there is nowhere left inside to put it down
cover_tagline: You didn't run out of strength. You ran out of room.
description:
  short_blurb: By the third call light in four minutes, there is no version of you
    left that isn't already holding something. This is a book for the nurse whose
    whole self has become storage for everyone else's emergency, and who has forgotten
    that the well was ever meant to refill from below. It will not teach you to hold
    more. It will help you find the floor you've been pouring out from, and let it
    fill again.
  long_description: 'It comes all at once. Two admissions, a coding patient down the
    hall, the pump alarming, a family in the doorway who needs you to be steady, and
    a phone that will not stop. You triage it the way you always do — fast, clean,
    no wasted motion — and somewhere in the middle of it you notice there is no part
    of you left that isn''t already carrying something. Not your shoulders, not your
    breath, not the back of your mind. The flood arrived and you became the place
    it landed.


    This book is for the nurse who has turned her own body into a unit that is always
    full. The one who hasn''t taken a real breath since report. Who eats standing
    up, charts at 2am, and drives home unable to feel her own hands on the wheel because
    every room inside her is still occupied by someone else''s worst day. You are
    not failing to cope. You are at capacity, and capacity is a real and finite thing,
    and no one taught you that the answer to a flood is not a bigger bucket.


    You will come to recognize the overwhelm for what it is — not weakness, not a
    character flaw the resilience module can fix, but the felt sense of a system asked
    to receive more than it has anywhere to hold. You''ll see how you learned to keep
    absorbing, why stopping feels more dangerous than drowning, and what happens in
    the body when the breath never once reaches the lowest part of the lungs across
    an entire shift. You''ll learn the difference between draining the root to fuel
    the surface and letting the surface go quiet so the deep ground can fill again.


    This book will not promise to help you carry more. It will not optimize your shift,
    hack your recovery, or hand you a checklist to do between patients. There is no
    productivity here and no comeback. The point is not to expand your capacity so
    the flood has somewhere to go. The point is to find the floor beneath you — the
    place the water was always supposed to drain to and rise from — and to let it
    hold you, for once, instead of the other way around.


    You are allowed to be full. You are allowed to set something down before you understand
    where it goes. You do not have to make room for one more thing today.


    Book 1 of the Root & Meridian Press burnout series.'
