title: The Promotion Posts Aren't the Whole Story
subtitle: For the new hire scrolling past launch announcements and unbothered coworkers,
  sizing a private panic against everyone who looks like they've got it
cover_tagline: They all look so sure. You're the only one keeping score, and you're
  losing.
description:
  short_blurb: It feels like everyone your age already cracked the code — the coworker
    who never seems rattled, the friend posting the new title, the timeline of people
    arriving somewhere you can't reach. This is a book for the mind that turns other
    people into a scoreboard and always finds itself behind. It won't help you win
    the comparison. That's the point.
  long_description: 'You open the app and there it is again. Someone you graduated
    with, announcing the new role. A coworker in the meeting who answers like the
    answer was obvious, like the fear you feel never visits them. A feed full of people
    who look calm, settled, sure — and you, refreshing, doing the math on how far
    behind you must be. By the time you put the phone face-down the day already feels
    lost.


    This book is for you: early in a career that, by any outside count, is going fine,
    and yet you can''t stop measuring it against everyone else''s. The one who reads
    the room and assumes you''re the least qualified person in it. The one who hears
    ''we''re so glad you''re here'' and thinks of three coworkers who''d have deserved
    it more. You''re not lazy and you''re not failing. You''ve just pointed a very
    sensitive instrument at the wrong target — yourself, against a highlight reel
    that was never the whole story.


    What you''ll come to recognize is that comparison is not a character flaw, it''s
    a reflex — and a fully understandable one, given a feed engineered to show you
    everyone''s outsides and none of their insides. You''ll see how the scoreboard
    gets built and what it costs you to keep checking it. You''ll notice that the
    calm coworker has a 3am you''ve never seen, that the promotion post is the trailer
    and not the film. You''ll feel what it''s like to look up from the count and find
    that the room is just a room, and you are allowed to be standing in it.


    This is not a book about winning. It will not teach you to out-achieve the comparison,
    get ahead of the timeline, or curate a better feed of your own. There''s no morning
    routine here and nothing to optimize, because you are not a brand and your life
    was never in a race it could lose. Nothing here will make you feel like you''re
    ahead. That was never the goal. The goal is to set the scoreboard down — not because
    you finally beat it, but because you finally stop needing to.


    The people who look like they''ve figured it out are, almost all of them, also
    measuring themselves against you. Nobody is winning this. You''re allowed to leave
    the game first.


    Book 2 of the Present Tense Books imposter syndrome series.'
