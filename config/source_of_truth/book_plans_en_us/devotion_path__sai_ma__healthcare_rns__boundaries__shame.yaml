title: The Good Nurse Never Needs Anything
subtitle: For the nurse who overgives to outrun a quiet shame — the buried belief
  that having needs of your own is the thing wrong with you
cover_tagline: You learned to disappear into your usefulness, and called it being
  good.
description:
  short_blurb: 'Underneath the endless giving is a belief you''ve never said out loud:
    that needing anything is shameful, and being needed is the only way to be safe.
    This is a tender book for the nurse who overworks to cover a defect she''s sure
    is hers. It won''t help you give more. It will help you set down the shame you''ve
    been carrying as if it were care.'
  long_description: 'You are good at this. You are the one who stays late, who notices,
    who carries the things no one else will carry. And underneath all of it lives
    a belief you have never quite said aloud: that your own needs are the problem.
    That if you ever stopped being useful, people would finally see the thing you''ve
    been hiding — that something in you is wrong, and the giving is how you keep it
    covered.


    This is a book for the nurse who overgives to outrun shame. For the one who flinches
    at her own hunger, who feels selfish for being tired, who has built an entire
    life on being needed because being needed felt safer than being known. You learned,
    somewhere far back, that having needs made you too much, or not enough, or a burden.
    So you disappeared into your usefulness. You called it being good.


    Here you will come to recognize the shame for what it is — not a truth about you,
    but a wound dressed up as a virtue. You''ll feel how it hides behind your competence,
    how it whispers that rest must be earned and that love is something you pay for
    in shifts covered and favors granted. You''ll begin to separate the giving you
    choose from the giving you do to keep a buried defect out of sight. And you''ll
    come, slowly, to the threshold the shame has kept you from: the question of where
    you draw the line, and the quiet, firm permission to draw it.


    This book will not teach you to give better or to perform your boundaries with
    confidence. It promises no fix, no cure for the part of you that feels like too
    much. It will not ask you to be grateful for your wounds or to find the lesson
    in your depletion before you''re ready. The shame is not yours to overcome in
    a weekend. It is yours to set down, gently, when you are ready, the way you''d
    set down something you finally realized was never yours to carry.


    What it offers is reverence. For the broken-open. For the one who has poured herself
    out for everyone and called it devotion when some of it was fear. You are an open
    vessel, not a flaw to be hidden behind endless work. You were never the thing
    that was wrong. And you are allowed to be a person, not only a pair of hands.


    Book 2 of the Open Vessel Press boundaries series.'
