title: 'Setting Boundaries: The Comparison Habit (4)'
subtitle: A Real Talk Guide to Boundaries for Millennial Women Professionals
cover_tagline: Her plate looks fuller than yours. That is not a verdict on what you
  can carry.
description:
  short_blurb: You keep agreeing to things because someone else seems to handle more
    without flinching. This is the one-hour book about the boundary you never drew
    because you were too busy measuring your limits against everyone else's. It will
    not teach you to want less or do more. It will show you why the comparison runs,
    and how to set a line that is yours instead of theirs.
  long_description: 'She stays late without complaining. He answers Slack at 11pm
    and seems fine. The new hire took on two extra projects, and you said yes to a
    third before you''d even checked your own calendar, because if they can carry
    it, what does it say about you if you can''t.


    This is for the professional woman whose limits keep dissolving the moment she
    looks sideways. You don''t decide what you can hold based on what you actually
    have left at the end of a day. You decide based on the colleague who looks unbothered,
    the friend who runs a side business and a household, the curated version of everyone
    else you''ve assembled from their best-lit moments and their loudest wins. Measured
    against that composite, your real capacity always looks like weakness, like falling
    behind, like a problem to hide. So you never draw the line. You take the third
    project and the fourth, you answer the message you should have left until morning,
    and you call quietly drowning by a nicer name: keeping up, being a team player,
    not making it a thing.


    The work here moves in three turns. First it gets named plainly — the yes you
    gave wasn''t a free choice, it was a comparison you lost somewhere inside your
    own head before anyone even finished asking. Then, instead of trying to out-organize
    the feeling or earn your way past it, you go down underneath it. You look at the
    measuring itself: the habit of using other people''s surfaces as the ruler for
    your own insides, the way you''ve been running a race no one else even knows is
    happening, scoring yourself against runners who can''t see you and aren''t keeping
    time. You let yourself feel how tired that has made you. Then you come back up
    able to tell two things apart that used to blur together — what you can genuinely
    carry, and what you think you should be able to carry to match someone you have
    never actually seen clearly.


    This will not make you more efficient so you can finally pull even. It will not
    promise that if you optimize hard enough, the comparing goes silent and stays
    there. It won''t hand you a tighter script for sounding more capable than you
    feel in the moment. None of that is the point. Winning the comparison was never
    the point, because the comparison is rigged and you''d only have to win it again
    tomorrow. The point is to stop letting it set your limits at all — to notice it
    start, and to decline its math before it decides your week for you.


    You are allowed to draw the line at what is true for you, even when the person
    beside you appears to be holding more. Especially then.'
