title: 'The 3am Mind: The False Alarm Response'
subtitle: A Field Guide for Founders Navigating Sleep Anxiety
cover_tagline: It's 3am. Nothing is on fire. Your body didn't get the memo.
description:
  short_blurb: 'You wake at 3am and you''re instantly online — heart going, mind certain
    something is wrong with the company, body braced for a threat that does not exist
    in your dark bedroom. This is the false alarm at its worst hour: a founder''s
    nervous system sounding a siren no one ordered. This book teaches you to recognize
    the 3am alarm for what it is, so you stop mistaking a surge of adrenaline for
    a real emergency.'
  long_description: 'Three in the morning. You''re awake before you know why. There''s
    no sound, no fire, no actual problem in the room — just your heart already running
    and your mind already certain that something about the business is quietly falling
    apart. You reach for your phone to check, because surely the alarm is about something.
    It almost never is. This is the false alarm, and it has learned to wake you.


    This is for the founder whose body treats sleep like a watch shift. The stakes
    of what you''ve built are real, so your nervous system stopped trusting the off
    switch. Now the smallest residue — an unanswered email, a number that dipped,
    a meeting you can''t stop replaying — is enough to trip the siren in the dark,
    and the siren feels like proof. It isn''t proof. A pounding heart at 3am is not
    information about your runway. It''s a smoke detector going off because you breathed
    near the toaster.


    Devon Hale meets you in the actual moment, not in the daylight where it''s easy
    to be reasonable. Recognition first: you''ll learn to feel the 3am alarm fire
    and name it as alarm — the jolt awake, the urgency to check something, the absolute
    certainty that you''ve missed a catastrophe. Then the descent, which is not a
    sleep hack. Instead of obeying the surge — phone, dashboard, anxious mental audit
    of everyone you might have let down — you stay in the dark and let the alarm crest
    without acting on it. You stop bargaining with a body that was never going to
    be argued back to sleep. And you come back able to tell, even at 3am, the difference
    between a real problem and a nervous system doing its impression of one.


    This book will not promise you eight unbroken hours or a wind-down protocol to
    run before bed. It will not optimize your sleep, hand you a breathing script for
    the dark, or tell you the 3am dread means you''re not handling the pressure. There''s
    no worksheet. You may still wake at 3am — founders with real things on the line
    often do, and that alone isn''t the failure.


    What changes is what happens next. You''ll recognize the alarm instead of believing
    it. You''ll stop reaching for the phone to confirm a fire that isn''t there. You''re
    allowed to wake in the dark, feel the siren go off, and not get up to fight a
    building that isn''t burning.'
