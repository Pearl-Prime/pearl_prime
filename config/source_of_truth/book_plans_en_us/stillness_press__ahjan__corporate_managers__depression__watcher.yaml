title: The Mind That Never Clocks Out
subtitle: For the manager whose mind keeps circling at 2am — turning over everything
  that could go wrong while the rest of you goes flat and numb
cover_tagline: The house is dark and the work is done. So why won't your mind come
  to rest?
description:
  short_blurb: You can close the laptop, turn off the light, and lie down in the dark
    — and still some part of your mind keeps circling, bracing, turning over tomorrow
    before it has arrived. This is a book for the watchful mind that never quite settles,
    and for the flat exhaustion that comes from holding yourself tight for far too
    long.
  long_description: 'It is late. The house is dark, the work is long done, and you
    are lying perfectly still while some part of your mind goes on circling the room.
    Did that email land wrong. Is the project slipping. What did her tone mean. What
    are you missing. The part of you that keeps watch never quite settles — it stays
    awake long after everyone else has gone home, turning the same few worries over
    in the dark, bracing for a wave that, more often than not, never reaches the shore.
    And the cost of all that circling is a flatness, a depletion, a grey kind of numb
    that settles in when a mind has been held tight for too long.


    This is a book for the manager whose head will not go quiet. You are responsible
    for outcomes, for people, for the things that could go wrong on your watch — and
    so you have taught yourself to catch every problem before it arrives. It made
    you good. It also means you never fully land anywhere, because part of you is
    always back at the desk, turning things over. The restlessness and the heaviness
    are not separate problems. The endless circling is draining the very reserves
    that depression has already worn thin.


    Here you will come to recognize the watchful mind for what it is: not diligence,
    not character, but a nervous system that has forgotten it is allowed to rest.
    You will see how the constant looking-ahead disguises itself as responsibility
    while quietly hollowing you out. Why telling yourself to ''just switch off'' has
    never once worked — you cannot order water to go still. And how that watchful
    part of you, underneath all its bracing, is only trying to keep you safe, which
    means it cannot be argued away, only, slowly, reassured.


    This book will not teach you to control your thoughts or force your attention
    quiet. There is no fight to win here, and the struggling is part of what keeps
    you awake. What it offers instead is something gentler — a way to notice the circling
    without being pulled into it, to let a worry rise and move through without climbing
    aboard it, to give the tired, watchful part of you permission, for a few minutes
    at a time, to stop scanning the horizon and simply rest its eyes on the ground.
    Not the mind defeated. The mind, at last, allowed to settle, the way water settles
    when you finally stop stirring it.


    The wave you are bracing for is probably not coming. And even if something does
    arrive, you will meet it better rested than wrung out. You are allowed to let
    the watch down now.


    Book 3 of the Stillness Press depression series.'
