title: The Colleague Who Never Seems to Crack
subtitle: For the working parent who measures themselves against the unflappable ones
  at pickup and the desk that never seems to wobble — and a reminder that ease is
  rarely what it looks like
cover_tagline: You've been grading your insides against everyone else's outsides,
  and calling the gap a verdict.
description:
  short_blurb: You scroll, you scan the pickup line, you watch the unflustered coworker,
    and somehow they all seem to have figured out the thing you keep dropping. This
    is a book for the working parent whose sense of worth runs entirely on the comparison
    — and who is exhausted from a race they never agreed to enter. You're not behind.
    You're just measuring the wrong thing.
  long_description: 'There''s the parent at drop-off who looks like they slept. The
    colleague who answers calmly in the meeting while your heart is going. The friend
    whose kids, whose kitchen, whose calendar all seem to run on rails. You take a
    quick, private inventory a hundred times a day, and the math always comes out
    the same: everyone else has it handled, and you are the one barely holding the
    line.


    This book is for the mind that runs that math.


    You''ve been measuring your worth against people who look fine through a pane
    of glass — the conference-room window, the school gate, the lit rectangle in your
    hand at midnight. And comparison has a cruel kind of cleverness; it always finds
    the angle where you fall short. So you push harder, you perform calm you don''t
    feel, you try to close a gap that the comparing itself keeps opening. The exhaustion
    isn''t from the work. It''s from running a race nobody else even knows you''re
    in.


    We''ll slow that down together. You''ll come to recognize how the measuring works
    — how it takes everyone else''s polished outside and sets it against your unedited
    inside, then hands you the difference as a verdict on who you are. You''ll see
    the question underneath all of it, the one you''ve been answering for years without
    asking it out loud: who, exactly, are you trying to impress? You''ll feel where
    the comparing lives in your body, in the tightening when another parent walks
    in looking serene, in the breath you hold while you take the measurement. And
    you''ll begin to notice that the calm faces are armor too — that you''ve been
    comparing your whole weather to someone else''s photograph of a clear day.


    This is not a book that will help you win the comparison, and that is the entire
    point. It won''t rank you higher or teach you to out-calm the calm ones. It offers
    no method for finally coming out ahead, because the scoreboard was never measuring
    anything real about your worth. What it offers instead is the quiet possibility
    of stepping off it — of letting your worth stop depending on where you land against
    a roomful of strangers'' best angles.


    You are not behind. You were never in the race they''re running, and your enough-ness
    was never theirs to confer or withhold. Let this be the place you stop taking
    the measurement, and simply sit down in your own life, as it actually is, and
    find it was enough all along.


    Book 2 of the Heart Transmission Press self worth series.'
