title: 'Overcoming Depression: Living with What You''ve Lost (1)'
subtitle: A Field Guide for Gen Alpha Students Navigating Depression
cover_tagline: Some weeks you're not lazy. You're carrying something nobody named
  for you.
description:
  short_blurb: For the student who's still showing up but feels switched off inside
    — the homework done badly, the texts left on read, the quiet that won't lift.
    This is a real-talk guide to the kind of depression that feels like grief for
    a life you thought you'd have. No fixing. Just the truth about the weight, and
    how people learn to carry it without pretending it's gone.
  long_description: 'You sit down to start the assignment and your hands just stop.
    Not because you don''t care — because something in you has gone heavy and grey,
    and you don''t have a word for it, so you call yourself lazy and scroll until
    it''s 2 a.m. and you feel worse.


    This book is for the student carrying a weight without a name. You''re still going
    to class, mostly. You still answer in the group chat, mostly. But the version
    of yourself you expected to be by now — the one who had it together — is gone,
    and what''s left feels like mourning. That''s not weakness. That''s grief wearing
    the face of depression, and almost nobody told you the two could be the same thing.


    First, you''ll learn to recognize it. The flatness isn''t a character flaw or
    a willpower problem — it''s loss your body is registering before your mind has
    language for it: the loss of a future you''d already started living in, the loss
    of the person you were before things got hard. Naming it changes what you''re
    fighting.


    Then, instead of teaching you to fix it, this book teaches you to go down into
    it. Not to wallow — to stop spending all your energy clawing back up to ''fine.''
    You''ll learn what it''s like to let the heavy day be a heavy day, to stop apologizing
    to yourself for it, and to find that the bottom isn''t bottomless the way you
    feared. Something shifts when you stop running.


    And then you come back up changed — not cured, not optimized, not a productivity-hack
    version of you. Just someone who knows the shape of their own weight and isn''t
    terrified of it anymore.


    A quick word on what you won''t find in these pages. Nobody here is going to promise
    you''ll feel amazing by chapter eight. There''s no morning routine, no gratitude
    list, no ''just get up and move your body and watch it all lift.'' If your life
    has crossed into genuinely unsafe, the book says it plainly: go get a real human
    — a counselor, a doctor, an adult who can actually act — because that is something
    a book can never be. What''s left, once you strip out the false promises, is honest
    company for the days that have gone grey, and a way of seeing them that stops
    casting you as the problem.


    You don''t have to perform okay. You don''t have to know why yet. You''re allowed
    to set the weight down on the page for a while, and you''re allowed to still be
    a whole person while you carry it.'
