title: Logging Off Feels Like Falling Behind
subtitle: For the first-job kid who needs to put the phone face-down at night — but
  keeps measuring that need against a team that never seems to go quiet
cover_tagline: They reply at midnight and look fine. You reply at midnight and disappear
  a little.
description:
  short_blurb: Your coworker answers Slack at 11pm with a thumbs-up and seems totally
    fine. You answer at 11pm and feel something in you quietly go out. This is for
    the part of you that watches everyone handle the always-on pace and decides you
    are the weak one for needing it to stop. You are not behind. You are just comparing
    your insides to everyone else's notifications.
  long_description: 'Your coworker drops a reply in the channel at 11:14pm -- fast,
    breezy, a little thumbs-up emoji -- and they seem completely fine. Meanwhile you
    are lying in the dark having a full-body reaction to a message you have not even
    answered yet, doing the math: if they can do this and feel nothing, and you do
    this and feel like you are coming apart, then the problem must be you. You are
    the one who cannot hack it. You are the one who needs too much.


    This book is for you: the one who scrolls the team channel like it is a scoreboard,
    who watches everyone else stay reachable and relaxed and decides that your need
    for a limit is a defect they somehow do not have. You compare your exhaustion
    to their availability. You compare your raw, real, 11pm insides to the calm surface
    of people who are almost certainly faking it too. And every time, you come up
    short -- not because you are, but because you are measuring with a broken ruler.


    Here is what you will come to recognize. You are comparing the wrong things. You
    cannot see anyone else''s dread, their resentment, the way they too lie awake
    after the breezy reply -- you can only see the reply. So you stack your full interior
    weather against everyone else''s edited highlight, and of course you lose, because
    that is a game built to make you lose. Needing a boundary is not the thing that
    makes you behind. The comparison is the thing that makes you tired. You will learn
    to feel the exact moment your eyes leave your own life and land on someone else''s
    feed, and you will learn that nothing good has ever once arrived through that
    door.


    This will not teach you to win. It will not make you the person who answers at
    midnight and feels nothing, because that person is not a goal, that person is
    just better at hiding. It will not optimize your limits into a competitive edge
    or turn your peace into another thing to be the best at.


    What it offers instead is permission to stop keeping score -- to put the scoreboard
    face-down and find out what your life actually feels like when you are not ranking
    it against people who only exist to you as a green dot. The comparison was never
    going to end well. That is the point.


    You are allowed to need what you need, even if no one else seems to need it. Especially
    then.


    Book 3 of the Present Tense Books boundaries series.'
