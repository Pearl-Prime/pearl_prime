cover_tagline: It's not one big thing. It's forty small things, all due now.
description:
  short_blurb: The to-do list has a to-do list, two generations need you today, and
    the sheer volume of it has stopped feeling like busyness and started feeling like
    drowning. This is overwhelm — too much arriving at once with nowhere to put it.
    In one hour, learn what to do when everything is genuinely too much.
  long_description: 'It''s nine at night and you have not actually sat down since
    six this morning. A prescription needs refilling. A form is due tomorrow that
    you haven''t read. A sibling still hasn''t called back. A kid is hovering with
    a permission slip, and a parent asked you the same question four times today and
    will ask it a fifth before bed. Not one of these is a crisis. Every one of them
    is yours. And somewhere around the third unfinished thing, the load tipped from
    merely full into something else — a flat, ringing too-much where your mind goes
    white and you can''t even pick a place to begin.


    That white-out has a name, and the name is not weakness and it is not bad time
    management. Overwhelm is what any nervous system does when more keeps arriving
    than a human being could physically hold. You are the person everyone calls when
    something needs handling. You have become, without anyone ever deciding it, the
    only functioning adult in three different rooms. The plate isn''t full because
    you''re disorganized. The plate is full because the demands are real, the people
    are real, and there are simply too many of them aimed at one set of shoulders.


    The trap of overwhelm is that every task screams at the identical volume — the
    refill as loud as the deadline as loud as the kid — until the noise is so total
    that nothing can be heard and nothing gets done. This hour is about learning to
    stand inside that roar without being swept off your feet by it.


    The move is counterintuitive, so stay with it. You will not conquer the list.
    Instead you''ll let the whole shrieking pile sit there, unsolved, for sixty seconds,
    and discover that it does not actually collapse the moment you stop sprinting
    at it. You''ll feel the volume drop — not because anything got crossed off, but
    because you stopped demanding that you handle all of it in the next ten seconds.
    And once the noise comes down even a little, your thinking comes back online,
    and from there one real next thing becomes visible. Not the whole list. One thing.
    That alone is enough to break the freeze.


    What this will not do is sell you a system. No planner empties this plate; nothing
    empties this plate, because the load is not a productivity problem you''ve failed
    to crack. This book will never tell you that you''d be fine if you''d only colour-code
    your week. It hands you something better than control: a way to stay a person
    inside the flood instead of a machine grinding itself down trying to keep up.


    You can carry an impossible amount and still not be drowning in it. You can set
    the entire list down for one hour and still be someone who gets things done. Start
    tonight — with everything, every last item, still undone.'
