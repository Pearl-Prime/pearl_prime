title: Everyone Else Seems to Manage
subtitle: For the sandwich-generation parent measuring her depletion against the friends
  who somehow handle it all without complaining — and always coming up short
cover_tagline: They post the caregiving. You're living it. Of course you can't keep
  up with a highlight reel.
description:
  short_blurb: Everyone else seems to manage. Your friends care for their parents
    and raise their kids and still look rested, still say yes, still don't snap. And
    here you are, fraying, certain you're the only one who can't hold it together.
    This is a book for the parent who keeps measuring her limits against people who
    never show theirs.
  long_description: 'Everyone else seems to manage. You''re the only one drowning.


    That''s how it feels. Your friend visits her father three times a week and still
    makes it to spin class. Your sister handles your mother''s appointments without
    ever sounding tired. The other parents at pickup ask ''how do you do it all?''
    as if you have an answer, and you smile, because the truth — that you''re barely
    holding the line, that you said yes again when everything in you was screaming
    no — feels like a failing only you have.


    This book is for the sandwich-generation parent who measures her own depletion
    against everyone who looks like they''ve got it figured out, and always comes
    up short.


    You''ll come to recognize the comparison for the trap it is. How you weigh your
    worst, most exhausted hour against other people''s edited best. How ''she manages,
    so I should be able to'' becomes the stick you beat your own limits with. How
    watching everyone else say yes makes your own no feel like weakness instead of
    wisdom. You''ll see the way you hide your fraying so as not to lose the comparison
    — and how that hiding leaves you certain you''re uniquely failing, alone in a
    struggle that half the people around you are also hiding. And in the warm middle
    of these pages, you''ll feel the relief of setting the measuring stick down: of
    drawing your line where your life actually needs it, not where you imagine someone
    calmer would draw theirs.


    This book will not help you win the comparison. It won''t teach you to do more
    with less, or hand you the secret the rested ones supposedly know. That''s the
    point. There is no version of you that handles a fading parent and a needing child
    and the whole sandwiched middle without it costing something. The ones who look
    like they manage are paying too — just somewhere you can''t see.


    You are not behind. You are not the only one. You''ve just been holding your tired,
    unedited life up against everyone else''s good-enough day, and calling the gap
    a flaw.


    In the pause before you go back in, this book lets you stop comparing long enough
    to remember: the line goes where you need it. Not where she put hers.


    Book 3 of the Stolen Moment Press boundaries series.'
