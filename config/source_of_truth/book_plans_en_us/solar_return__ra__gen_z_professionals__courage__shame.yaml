title: The Brave Ones Aren't Better Than You
subtitle: For the early-career worker who hides the fear and overworks to cover it
  — when not being brave starts to feel like proof something's wrong with you
cover_tagline: You don't lack courage. You lack permission to be afraid.
description:
  short_blurb: Everyone else seems to speak up, ship the work, take the risk without
    flinching — and somewhere along the way you decided their ease is a thing you're
    missing. So you hide the fear, overwork to cover it, and quietly believe the freeze
    is a flaw in you. This is a book about the shame underneath the silence, and why
    the thing you've been hiding was never the problem.
  long_description: 'You watched someone in your cohort raise their hand and say the
    unfinished idea out loud, easy as breathing, and something in you went cold. Not
    envy exactly. More like a verdict. They can do that and you can''t, and the reason
    — you''ve decided — is that there''s something wrong with you that there isn''t
    with them.


    So you got good at hiding it. You over-prepare so no one sees the fear. You stay
    quiet and call it humility. You let the brave moment pass and tell yourself you''ll
    be ready when you''ve finally fixed whatever''s broken in you.


    This book is for the early-career creative or knowledge worker who has turned
    their fear into a secret, and the secret into proof of a defect. You don''t think
    you''re scared — you think you''re lacking. You believe the people who act bravely
    are simply made of something better, and that your hesitation is a private shame
    to be managed, covered, overworked into invisibility. You''re so busy hiding the
    fear that you never get to find out the fear was never the disqualifying thing.


    Here you''ll come to recognize shame for what it does: it takes a feeling everyone
    has and whispers that in you, specifically, it means something is wrong. You''ll
    see how the hiding costs more than the fear ever did. You''ll learn where the
    belief took root, how it disguises itself as standards and humility and not wanting
    to bother anyone, and how it keeps you performing instead of acting. And you''ll
    meet the conviction at the heart of this brand — that the brave ones are not better
    than you. They''re just not at war with the part of themselves that''s afraid.


    This book will not fix you, because you are not broken. It won''t hand you a confidence
    you have to earn first, or a self-worth contingent on finally becoming fearless.
    There is no defect here to repair. The fear was never the problem. The shame about
    the fear was the whole weight you''ve been carrying.


    So here is your permission: you can stop hiding now. You are allowed to be afraid
    and let it show and act anyway. You were never less than the brave ones. You were
    only more ashamed — and you can set that down.


    Book 3 of the Ember & Ash Publishing courage series.'
