title: The Limit You Keep Hidden
subtitle: For the high achiever who treats their own needs like a defect — over-delivering
  to cover an edge they're ashamed to have
cover_tagline: You hide the limit. The hiding is the exhaustion.
description:
  short_blurb: Somewhere you absorbed the idea that a real high performer doesn't
    have a limit — that needing rest, needing room, needing a no is proof something
    is wrong with you. So you cover it. You over-deliver to hide the edge you're ashamed
    to have. This is a book for the buried belief underneath your inability to set
    a boundary, and for the strange relief of discovering the defect was never real.
  long_description: 'You don''t experience it as shame. You experience it as a standard.
    Other people get to be tired, get to be at capacity, get to say ''that''s too
    much for me right now'' — but you, specifically, are supposed to be the one who
    can take it. So when the limit shows up, when your body says enough, you don''t
    honor it. You hide it. You stay later, reply faster, take on the thing nobody
    else will, and you tell yourself this is just who you are. Underneath, quieter
    than you''d ever admit, runs a different sentence: if they knew I had a limit,
    they''d know there''s something wrong with me.


    This book is for you: the one who has confused having needs with being defective.
    You set no boundaries not because you can''t, but because a boundary would reveal
    the edge you''ve spent your whole career covering. The overwork isn''t ambition.
    It''s concealment. And it is so familiar by now that you''ve stopped noticing
    it''s there.


    You''ll come to recognize the shame for what it is — not a fact about you, but
    a story you were handed and mistook for the truth. You''ll see how the buried
    belief that something is wrong with you turns every limit into a thing to hide.
    You''ll watch the way the old fear stirs when you imagine being seen at less than
    your fullest, and the spiral of self-justification that keeps you proving you''re
    worth the space you take up. You''ll feel the difference between a defect and
    a human edge — and you''ll begin to suspect the edge was never the problem.


    This is not a confidence program. There''s no reframe that will make you finally
    good enough, because the premise — that you weren''t — was never true. Nothing
    here will help you out-give the shame, and nothing will turn you into a person
    who needs nothing. That''s the trap you''re already in. What''s offered instead
    is stranger and freer: the recognition that the limit you''ve been hiding was
    never evidence against you. It was just the shape of a real person, showing.


    You are allowed to have a limit and still be whole. You are allowed to be seen
    at the edge of your capacity and not disappear. You are allowed to stop covering
    for a defect that was never there.


    Book 2 of the Awakening Press boundaries series.'
