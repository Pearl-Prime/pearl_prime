title: A Body Still Posted at the Edge
subtitle: For the manager whose body keeps scanning the treeline long after the workday
  ends, braced in a clearing that has been safe for hours
cover_tagline: The danger passed hours ago. Your body didn't get the message.
description:
  short_blurb: There's a part of you that never quite goes off duty — scanning the
    next message, the room, the silence after you speak, bracing for a threat that
    almost never comes. For the manager whose nervous system has been on watch so
    long it forgot how to stand down, this is a slow return to safety in the body.
    It won't make you more vigilant. It will show your body it's allowed to rest.
  long_description: 'The meeting ended an hour ago. You''re home, the door is locked,
    nothing is wrong — and still some part of you is up on the ridge, scanning. Reading
    the tone of an email three times. Bracing in the half-second before someone replies.
    Listening, even now, for the thing that might go wrong, the way you''ve listened
    for years. Your body never got the memo that the day is over. It is still standing
    watch over a forest where nothing is hunting you.


    This book is for you: the manager whose vigilance became so useful that no one
    — least of all you — ever questioned the cost of it. You catch the problem before
    it lands. You read the room before you enter it. You stay one move ahead. And
    underneath all that competence, a part of you has been gripping the railing for
    so long that letting go feels less like relief and more like danger. You are not
    paranoid. You are not too much. You are a warning that was set long ago and never
    told it was allowed to go quiet.


    Here we move at the pace of trust, not technique. We turn toward the watcher not
    as a flaw to be silenced but as a loyal, exhausted sentry that has been protecting
    you long past the end of any real threat — and we begin, slowly, the work of showing
    your body that the clearing is safe to sit in. You''ll come to recognize the scan
    as it starts. You''ll learn what the hypervigilance has been guarding, and from
    what. You''ll discover that stillness is not the same as being unprotected — that
    a pool goes clear not by watching the water but by letting it settle — and that
    some old, deep part of you can finally come down off the ridge.


    This book will not sharpen your watching or hand you a better way to stay one
    move ahead. There is no hack here for relaxing faster, no optimized routine to
    make your body better at standing down on schedule. It will not promise that the
    watching stops for good. The point is not to become more vigilant about your own
    vigilance. It is to let your body learn, in its own time, that it is allowed to
    rest in a safe room — and that resting is not the same as letting your guard fall.


    You are allowed to come down now. Nothing is hunting you here. Let the canopy
    close over, and let the watching, finally, be set down.


    Book 2 of the Still Forest Press somatic healing series.'
