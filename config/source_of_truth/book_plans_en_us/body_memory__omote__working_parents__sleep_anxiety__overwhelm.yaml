title: Everything Arrives the Moment You Lie Down
subtitle: For the parent flooded at lights-out by every undone thing — when there
  is no room left to think, let alone sleep
cover_tagline: The whole day, finally still — and now it all comes for you at once.
description:
  short_blurb: All day you held it. The schedules, the worries, the thousand small
    loads no one else carries. Then your head hits the pillow and the whole flood
    arrives at once, with no room left to breathe. This is a grounded book for the
    working parent who is not too anxious to sleep, but too full.
  long_description: 'You held it together all day. You don''t even know how. The lunches
    and the deadlines, the dentist appointment and the thing the teacher said, the
    worry about your mother, the bill you didn''t open. You carried all of it, and
    you kept moving, because there was no other option. And then the day finally goes
    quiet, your head finally hits the pillow — and all of it arrives at once. The
    flood. Everything you didn''t have room to feel comes rushing in the moment there
    is finally room.


    This book is for the working parent who isn''t lying awake because the mind is
    too anxious, but because it is too full. There was never a moment in the day to
    set anything down, so it all waited, and now it has come due at the worst possible
    hour. Your capacity is not infinite. You have been treating it as though it were.
    And the overwhelm that floods you at midnight is not weakness — it is the simple,
    physical truth of too much arriving with nowhere to go.


    Slowly, you will come to recognize the flood for what it is, and to feel the difference
    between carrying everything and being crushed by it. You''ll learn what it does
    to a body to never reach the bottom of the list — and what becomes possible when
    you stop trying to hold the whole weight at once and let the ground take some
    of it. Not all of it. Just enough that there is room, again, to breathe. Just
    enough that the load stops being the thing you drown in.


    This book will not give you a better system for getting it all done. It will not
    optimize your evening or promise you an empty mind. It will not tell you the answer
    is to simply do less, as though you hadn''t thought of that. There is no productivity
    hack here and nothing more to manage. The overwhelm is not a sign you are failing.
    It is a sign you have been holding far more than one person was ever built to
    hold, alone, in the dark.


    You are not too much. You have been carrying too much. And tonight, you are allowed
    to set even a little of it down onto ground that will not drop it.


    Book 2 of the Held Ground Press Sleep Anxiety series.'
