title: Your Body Thinks the Lecture Hall Is on Fire
subtitle: For the student whose heart pounds before a class that hasn't even started
  — when the alarm keeps firing and there's no real danger in the room
cover_tagline: The threat your body is bracing for was never coming.
description:
  short_blurb: You walk into the seminar and your pulse spikes like something is about
    to attack you, even though it's just a table and seven other tired people. This
    is for the student whose nervous system keeps screaming danger when the only thing
    on the syllabus is being seen. Nothing here will make you fearless — it will help
    you recognize a false alarm for what it is, and let your hands warm up again.
  long_description: 'Your hand is halfway up before the professor finishes the question,
    and then your heart slams into your ribs and your face goes hot and you put it
    back down. Nothing happened. No one attacked you. It was a question about the
    reading. And still your whole body braced like the lecture hall was on fire.


    This is for you — the student who feels the alarm go off before anything has even
    begun. The one whose chest tightens walking into the seminar room, whose stomach
    drops when an email subject line just says ''quick chat,'' who has learned to
    read a racing pulse as proof that something is wrong with you specifically. You''re
    not broken and you''re not weak. Your alarm system is doing exactly what it was
    built to do. It''s just pointed at the wrong thing.


    You''ll come to recognize the shape of a false alarm. The way dread arrives with
    no danger attached to it. The way your body floods with heat and adrenaline before
    a presentation that, even at its worst, ends with you sitting back down. You''ll
    learn the difference between a threat and the feeling of a threat — and how often,
    in a room full of people who all believe they''re the only fraud present, the
    feeling is all there is. You''ll learn why the alarm fires hardest not when you
    are failing but when you are most afraid of being seen, and what to do with cold,
    shaking hands when the bell keeps ringing and there is no fire.


    This book will not make you fearless. It won''t hand you a breathing trick that
    turns you into someone who strides into every room unafraid, and it won''t tell
    you the doubt is a mindset you should have outgrown by now. There''s no optimizing
    your nervous system into silence here. What it offers is quieter and more durable:
    the ability to feel the alarm, name it, and stay — to let the adrenaline crest
    and pass without believing every word it tells you about you.


    You are allowed to be here with a pounding heart. You are allowed to belong in
    the room your body swears you should flee. The warmth comes back to cold hands.
    It always does, once you stop running from the smoke.


    Book 1 of the Ember & Ash Publishing Imposter Syndrome series.'
