title: The Day Has Too Much in It
subtitle: For the manager carrying everyone while the inbox keeps filling and the
  flat grey weight makes even small things feel like too much
cover_tagline: It isn't that you can't cope. It's that there is no room left.
description:
  short_blurb: There is no single thing that is too much. It is everything, all at
    once, arriving faster than you can set it down — and somewhere underneath the
    flood, a flatness that has stopped wanting to try. This is a book for the manager
    who is still holding it all together and quietly going under.
  long_description: 'By the time you open the laptop, the day already feels lost.
    Forty messages overnight. Three meetings stacked before lunch. Someone needs a
    decision, someone needs reassurance, someone needs you to be fine. And underneath
    all of it is a heaviness that has nothing to do with the workload — a grey, flat
    tiredness that makes lifting even one small thing feel like more than you have.


    This is a book for the manager who is drowning quietly and on schedule. You are
    the one others lean on. You answer first, you absorb the hard news, you keep the
    room steady. And lately you have noticed that the steadiness costs more than it
    used to, that the colour has gone out of things, that you can move through an
    entire day on competence alone and feel almost nothing in it.


    Here you will come to recognize what overwhelm actually is when depression is
    in the room. Not weakness. Not a planning failure. It is a capacity that has been
    asked to hold too much for too long, with no pause built in to set anything down
    — and a low, flat current beneath it that has quietly stopped believing the effort
    is worth it. You will see how the flood and the flatness feed each other. How
    ''just prioritise'' lands like a cruelty when the problem was never the list.
    How the very reliability that makes you good at your work has left you with no
    ground of your own to stand on.


    This book will not help you clear your inbox. It will not optimise your morning
    or hand you a system to finally get on top of it all. There is no getting on top
    of it; that belief is part of the weight. What it offers instead is something
    quieter — a way to stop, in the middle of the flood, and find the small patch
    of solid ground that is always there underneath the noise. Room to breathe before
    you decide. Permission to set one thing down without the whole structure falling.


    You do not have to carry all of it at once. You were never built to. The day has
    too much in it, and that is not a verdict on you — it is simply true, and it can
    be met one honest breath at a time.


    Book 1 of the Stillness Press depression series.'
