title: Where the Door Back Out Is Hiding
subtitle: For the woman who takes a single worry at midnight and builds a whole catastrophe
  from it — and a gentle hand to help her find the way back into the quiet
cover_tagline: The spiral feeds on your attention. You do not have to keep handing
  it over.
description:
  short_blurb: It begins with one thought. By the third turn it has become a thousand,
    each one feeding the next, pulling you down into a worst-case story you never
    chose to write. This book meets you mid-spiral, not to yank you out, but to sit
    close until the pulling loses its grip and a door appears.
  long_description: 'It is almost always one small thing. A look someone gave you.
    A text left on read. A decision you cannot unmake. And then the second thought
    arrives, and the third, each one reasonable, each one urgent, and within minutes
    you are no longer thinking about the thing — you are falling through it, building
    a whole catastrophe out of a single ordinary moment, certain that if you just
    follow the thread far enough you will reach the bottom and finally feel safe.


    You never do. The spiral has no bottom. That is the cruel design of it: every
    thought you chase feeds the next, and the more attention you pour in, the faster
    it turns.


    This book is for you — the woman who lies awake at midnight while her mind churns
    one worry into a thousand, who can solve hard problems all day at work and cannot,
    for the life of her, stop the descent at night. You are not unstable. You are
    not too much. You have a quick, capable mind that learned, somewhere along the
    way, that thinking is how you stay in control — and now it cannot tell the difference
    between solving and spinning.


    Here you will come to recognize the spiral the moment it begins, before it has
    speed. You will feel the precise place where thinking-it-through becomes falling-through,
    and learn that the way out is not a better thought but a softer kind of attention.
    You will see how the loop survives only on the fuel you feed it, and what happens
    in the quiet when you stop reaching for the next turn. You will meet the frightened
    part of you that started the spiral in the first place — not to argue with it,
    but to keep it company until it no longer has to run.


    This is not a book that will teach you to win the argument with your own mind.
    It offers no thought-stopping tricks, no five-step system, no way to think your
    way into stillness. The spiral will still start sometimes; you will simply stop
    disappearing into it. What changes is that a door appears where there used to
    be only the long fall down — and you learn you were always allowed to walk through
    it.


    You do not have to reach the bottom to be allowed to stop. You do not have to
    resolve the thought to set it down. The next turn is always offered. You are allowed,
    tonight, to gently decline it.


    Book 2 of the Heart Transmission Press overthinking series.'
