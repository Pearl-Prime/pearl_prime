title: The Version of Me That Could Do This
subtitle: For the woman grieving the self who used to have boundless energy — burnout
  as a loss, and what the body has to release before it can recover
cover_tagline: You're not just tired. You're grieving the woman who never used to
  get this tired.
description:
  short_blurb: Burnout isn't only exhaustion. It's a loss — the quiet death of the
    version of you who could keep all the plates spinning, who said yes to everything,
    who didn't need this much rest. This book is for the woman mourning who she used
    to be, and learning that recovery begins not with pushing harder, but with letting
    that self go.
  long_description: 'No one warned you that burnout would feel like grief. You keep
    waiting to bounce back, to return to the woman who used to run on four hours of
    sleep and a coffee, who said yes before the question finished, who could carry
    it all and make it look effortless. And slowly it''s dawning on you that she isn''t
    coming back — and that something in your chest aches when you admit it.


    This book is for the woman in mourning for a self she hasn''t finished losing.
    You may not have words for it yet. It shows up as a heaviness behind the breastbone,
    a tightness in the throat, a tiredness that sleep doesn''t touch. You''re grieving
    the energy you used to have, the version of you who thrived on the pace, the future
    you''d quietly assumed would arrive if you just kept going. And under the grief,
    often, is the harder question: who am I if I can''t do it the way I used to?


    You''ll come to recognize that what you''re carrying isn''t only fatigue — it''s
    loss that hasn''t been allowed to move. Grief lives in the body, in the held breath
    and the braced shoulders and the throat that won''t quite let the tears come.
    You''ll learn to let it be there without rushing it or fixing it. You''ll feel
    the difference between collapse and release — between giving up and finally setting
    down something you were never meant to carry forever. And in the space that opens
    when you stop fighting the loss, you''ll begin to sense who you actually are now,
    underneath who you used to be.


    This is not a book about getting your old self back. It won''t promise to restore
    your former capacity or hand you a plan to be that version of you again. That
    woman did her best, and she earned her rest. What''s here instead is a way to
    honor the loss — to let your body grieve what burnout took, so that something
    quieter and more sustainable can grow in its place.


    You are allowed to mourn her. You are allowed to be tired in a way you''ve never
    been. And you are allowed to become someone new, slowly, from the ground up.


    Book 2 of the Felt Sense Publishing Burnout series.'
