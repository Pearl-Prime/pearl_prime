title: 'The Alarm Is Lying: The Space Between You and Your Anxiety'
subtitle: A Real Talk Guide to Anxiety Relief for Managers
cover_tagline: You scan every face in the room for the bad news before it's news.
  The watching never clocks out.
description:
  short_blurb: Part of you is always on duty — reading faces, bracing for the problem,
    watching for the threat that may never come. This is a grounded guide for managers
    on the hypervigilant mind that won't stand down, and the space you can find between
    you and the watching.
  long_description: 'There''s a part of you that never goes off shift. It reads your
    boss''s face for bad news before the meeting starts. It scans the team for the
    problem nobody''s named yet. It braces, mid-conversation, for the thing that might
    go wrong — and even at home, even on the weekend, it''s still up there on the
    tower, scanning a horizon that''s mostly empty. You''re not in danger. You''re
    just never not watching.


    This book is for the manager whose mind won''t stand down. Hypervigilance got
    you here — catching issues early, reading the room, staying three steps ahead.
    But the watcher doesn''t know how to stop. It treats a quiet Tuesday like a lull
    before something, every ambiguous signal like an incoming threat. You''re exhausted
    in a specific way: not from the work, but from the surveillance that runs underneath
    all of it.


    Recognition comes first, and it''s subtle: you are not the watcher. The hypervigilant
    scanning feels like just-you, like clear-eyed competence, like the only responsible
    way to lead. But it''s a part of you doing a job — guarding against threat — and
    it has confused its job with your whole identity. You''ll learn to notice the
    watching as something happening, not something you are. Naming that opens a gap
    that wasn''t there before.


    Then the descent. The reflex is to either obey the watcher — scan harder, prepare
    for everything — or fight it, which just makes it scan for the fight. Here you
    do neither. You go down into the watching itself and find the small space between
    you and it: the part that notices the vigilance is not the vigilance. You let
    the watcher keep watching without being run by it. You don''t fire the guard.
    You stop living inside the guard tower.


    Integration is leading from that space. The watcher still scans — it''s good at
    its job and you don''t need it gone — but there''s now a little daylight between
    you and the alert. You can let the team have a normal day without bracing it for
    catastrophe. You can be off the tower and still be a good manager. The vigilance
    becomes one part of you, not the whole sky.


    This book will not switch the watcher off. It won''t hand you a way to relax on
    command, won''t optimize your awareness, and won''t pretend the hypervigilance
    was a superpower you should be grateful for. There''s no off-switch and no forced
    calm. What changes is the space — between you and the watching — and from inside
    that space, the alarm finally has room to ease.


    You were never only the part that stands guard. You''re allowed to step back from
    the watch and still be safe.'
