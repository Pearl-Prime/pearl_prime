title: What You Can't Carry Anymore
subtitle: For the high-functioning woman grieving in private — still showing up flawless
  while quietly coming apart, and trying to figure out what she's finally allowed
  to set down
cover_tagline: You kept holding it because no one told you that you were allowed to
  put it down.
description:
  short_blurb: You answered the emails. You ran the meeting. You said you were fine,
    and you almost believed it. This is a quiet book for the woman who has been carrying
    a loss the way she carries everything — efficiently, invisibly, alone — and who
    is starting to understand that some things were never hers to hold up forever.
  long_description: 'There''s a particular silence that comes after the casseroles
    stop arriving and the messages thin out and the world quietly decides you should
    be doing better by now. Everyone has moved on. You went back to work. And somewhere
    between the inbox and the grocery list, you became very good at carrying it where
    no one could see.


    This book is for you — the capable one. The woman who managed the logistics, who
    held it together at the service, who learned early that the way through hard things
    is to stay useful and not make a scene. You have been treating your grief the
    way you treat everything else: contain it, fit it around the meetings, get it
    handled before anyone notices. And it isn''t working, because grief is not a task.
    It is a weight, and you have been holding it up with both arms for longer than
    anyone knows.


    Here, we won''t try to lift it off you. We''ll sit with it. Slowly, you''ll come
    to recognize the shape of what you''ve been carrying. The bracing — the way you
    steady yourself before someone says their name. The flatness you mistook for healing.
    The exhausting work of looking fine. The grief that lives not in dramatic tears
    but in a smaller, more relentless ache: the missing.


    And you''ll come to a harder, kinder truth. There is a difference between what
    you must carry and what you are simply afraid to set down. Some of this weight
    is love, and you will carry it gently for the rest of your life. But some of it
    is only the habit of bracing — the belief that if you let yourself feel it fully,
    you won''t get back up. You will. Letting something go is not the same as losing
    it twice.


    This book will not give you stages to pass through or a timeline to beat. It will
    not turn your loss into a lesson or hand you a silver lining you didn''t ask for.
    It will not tell you to be grateful, or strong, or done. There is nothing here
    to fix, and no version of you that grieves correctly.


    There is only this: a voice in the next chair, telling you the truth softly. You
    are allowed to still be grieving. You are allowed to come apart somewhere safe.
    And you are allowed, when you''re ready and not one moment before, to open your
    hands.


    Book 1 of the Heart Transmission Press grief series.'
