title: 'Grief: After the Loss (1)'
subtitle: A Real Talk Guide to Grief for Gen Z Professionals
cover_tagline: You took two days off. The loss is still here. It doesn't run on a
  work calendar.
description:
  short_blurb: Someone or something is gone, and the world gave you a long weekend
    and expected you back at full capacity. This is a field guide for the young professional
    grieving inside a life that won't pause for it. It won't tell you to heal on schedule
    — it gives you honest company for going through it.
  long_description: 'The loss happened, and then Monday came anyway. You logged back
    in with your camera off and a flat "hey" in the chat, and now you''re supposed
    to be productive while something inside you has caved in. Maybe it was a person.
    Maybe a relationship, a version of home, a future you were counting on. Whatever
    it was, it didn''t ask your manager''s permission to gut you, and it isn''t going
    to resolve by the time your bereavement days run out.


    You are grieving in plain sight and almost entirely alone — crying in the bathroom
    between meetings, given a card and a casserole the first week and total silence
    after, surrounded by friends who mean well but have never lost anything yet and
    don''t know what to say. You''re carrying something enormous through a world built
    for people who feel fine, and you''ve started to wonder if the way you''re grieving
    is wrong — too much, too long, too messy. It isn''t. There''s no correct way and
    no schedule, no matter what the productivity of your life implies.


    Wren Adler doesn''t offer stages to complete or a timeline to hit. Grief isn''t
    a project. The work here is older. Recognition: letting the loss be as big as
    it is, naming it without shrinking it to fit your calendar. Descent: going down
    into it instead of staying busy on top of it — because the grief you outrun at
    work just waits for you at 2 a.m. Integration: not closure, not moving on, but
    learning to carry what happened in a way that lets you keep living — changed,
    but here.


    This will not promise you''ll be "back to normal" by any date, or that there''s
    a right amount of time, or that doing it well means doing it quietly. There is
    no exercise that makes a real loss smaller. What it offers instead is honest,
    unsentimental company — plain language for what you''re inside of, and permission
    to grieve at the size and speed that''s actually yours, not the one the office
    assumes.


    You''ll learn to stop measuring your grief against how long the world thinks it
    should take. You''ll stop apologizing for still being in it. You''ll find you
    can fall apart and still show up — not because you''ve recovered, but because
    both are allowed to be true.


    You don''t owe anyone a tidy version of this. You don''t have to be done. Grief
    takes as long as it takes, and you''re allowed to take it. Close the laptop tonight
    and let it be exactly as heavy as it is.'
