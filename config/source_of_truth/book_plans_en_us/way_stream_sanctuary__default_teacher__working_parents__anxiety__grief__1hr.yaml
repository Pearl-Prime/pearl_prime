title: 'The Alarm Is Lying: The Grief That Doesn''t Leave'
subtitle: A One-Hour Anxiety Reset for Working Parents
cover_tagline: Some part of you is still grieving a life you can't say out loud you
  miss.
description:
  short_blurb: It isn't only the big losses. It's the version of yourself that existed
    before the kids, the friendships that went quiet, the slow morning that's gone
    forever. The alarm in your chest is often grief wearing the mask of anxiety —
    and you've been told to be grateful instead of allowed to mourn. This is an hour
    for the loss that doesn't leave, and the parent carrying it in secret.
  long_description: 'There''s a specific ache that hits at the strangest times. You''re
    packing the lunchboxes, or driving home from a long day, and something in your
    chest goes hollow. Maybe you lost someone, and the world expected you back at
    work in three days. Maybe what you lost is harder to name — the person you were
    before, the marriage you imagined, the slow Sunday that no longer exists, the
    friend who drifted while you weren''t looking. And underneath the anxiety, if
    you go quietly enough, it''s there: grief that never got a place to land.


    This book is for the working parent who is mourning something while still making
    breakfast. Who feels the loss surge up mid-task and shoves it down because there''s
    a meeting at nine and a child who needs you present. Who has been told, gently
    and not so gently, to count their blessings — as if gratitude and grief can''t
    live in the same chest. They can. They do. And the alarm you keep feeling is often
    grief that''s been denied a way out, banging on the walls.


    We''re not going to fix this. Grief isn''t a malfunction to be optimized; it''s
    love with nowhere to go. What we''re going to do is name it — the actual loss,
    the one you don''t let yourself say out loud — and then go down into it instead
    of managing it. Not to drown. To finally let it move. You''ll learn to recognize
    when the tightness in your chest isn''t fear of the future but mourning for something
    already gone, and how to be with that ache without abandoning the kid who needs
    you in ten minutes.


    This won''t promise closure. It won''t hand you five stages to march through or
    a morning practice to leave the loss behind, because the loss isn''t behind you
    — it''s woven into you, and that''s not a problem to solve. What it offers is
    permission: to grieve in the cracks of a packed life, to stop performing okay,
    to let the alarm be what it actually is so it can finally quiet down.


    You don''t have to be grateful instead of sad. You don''t have to be done. The
    loss that doesn''t leave was never supposed to leave — it was only ever waiting
    for you to stop running from it. An hour from now, the ache will still be there.
    But you''ll be carrying it instead of fleeing it, and that changes everything
    about how heavy it feels.'
