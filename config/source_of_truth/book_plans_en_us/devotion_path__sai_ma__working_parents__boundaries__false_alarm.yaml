title: The Flinch Before You Say No
subtitle: For the working parent whose body braces before the word comes — when every
  request feels like an emergency and saying no feels like danger
cover_tagline: Not every knock at the door is a fire.
description:
  short_blurb: Your phone lights up and your whole body tightens before you've even
    read the message. For the working parent who treats every request as an emergency,
    this is a gentle hour spent learning to tell a real fire from a false alarm. You
    are allowed to let the room stay quiet before you answer.
  long_description: 'It happens before you decide anything. The text arrives, the
    small voice calls from the next room, the manager adds one more thing to the list,
    and your body goes tight and ready as if something is on fire. You answer fast.
    You always answer fast. Saying no, or even not yet, sets off an alarm in your
    chest so loud that giving in feels like the only way to make it stop.


    This book is for the working parent whose nervous system has confused being needed
    with being in danger. The one who flinches toward the phone in a dark kitchen.
    The one who cannot let a request sit unanswered without a low dread rising, certain
    that this time the sky really will fall if they pause. You are not weak and you
    are not too sensitive. You have simply lived so long with your hand on the alarm
    that you''ve forgotten there''s a difference between a true emergency and the
    ordinary discomfort of someone wanting something you cannot give.


    Here you will come to recognize the false alarm for what it is. You will learn
    to feel the bracing arrive and let it pass through you without obeying it — to
    stand at the threshold of a request and ask, quietly, whether this is a fire or
    only a feeling. You''ll see how the dread tries to convince you that every limit
    is an abandonment, and how rarely that is true. Slowly, you will let your body
    learn what your heart already suspects: that the people you love can survive your
    pause. That a closed door is not a slammed one.


    This book will not hand you a script to recite or a technique to drill until you
    sound like someone else. It will not promise to make the fear vanish on cue or
    turn you into a person who never feels the flinch. There is no optimizing your
    way out of a body that learned to brace. There is only the slow, tender work of
    staying — of letting the alarm sound and not running toward the fire that isn''t
    there.


    You are allowed to wait before you answer. You are allowed to let the room stay
    quiet a moment longer. The cup in your hands does not have to be poured out the
    instant someone holds out their own.


    Book 1 of the Open Vessel Press boundaries series.'
