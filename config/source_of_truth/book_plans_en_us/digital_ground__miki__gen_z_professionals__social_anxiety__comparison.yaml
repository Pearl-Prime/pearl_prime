title: The Scoreboard Only You Can See
subtitle: For the young professional whose head keeps score the second they enter
  a room — and what changes when you finally set the tally down
cover_tagline: They looked so easy in there. You'll never know what it cost them.
description:
  short_blurb: Everyone else seems to walk into the room like it's nothing — easy,
    warm, already mid-laugh — while you stand in the doorway doing math on how far
    behind you are. This is a book for the mind that measures itself against everyone
    who looks calm and fine, and never wins. The point isn't to catch up. The point
    is to put the ruler down.
  long_description: 'You''re standing just inside the door and the meeting is already
    a warm, easy thing happening without you. Someone made a joke. Someone else has
    that loose, unbothered posture you have never once managed. And the calculator
    in your head is already running: they''re better at this, they''re ahead, you''re
    the only one who finds a room this hard. By the time you sit down you''ve lost
    a contest nobody else knew was being held.


    This book is for you — the one who scrolls the team''s effortless banter and reads
    it as a scoreboard. Early in your career and quietly convinced everyone else got
    an ease you missed. You watch your coworkers move through introductions and happy
    hours and camera-on calls like it costs them nothing, and you take that as proof
    you''re falling behind. The comparison is constant and it is rigged: you are weighing
    your loudest inside experience against their quietest outside, every single time.


    What you''ll come to recognize is that you have pointed a genuinely sharp instrument
    — your attention — at exactly the wrong target. You''re not actually measuring
    how social you are. You''re measuring a story about everyone else, built entirely
    from the outside of them, and then grading yourself against it in the dark. You''ll
    start to catch the calculation as it runs. You''ll see how little you actually
    know about what any of those easy-looking people are carrying. And you''ll find
    the doorway out isn''t winning the comparison — it''s noticing you were never
    required to enter it.


    This is not a guide to becoming more impressive. No networking hacks, no charisma
    drills, no ''here''s how to work the room'' so you can finally place. Nothing
    here will help you optimize yourself into the version that wins, because the winning
    was never available — that''s how comparison works. We''re not going to make you
    better than them. We''re going to question the entire scoreboard.


    What this book offers instead is the strange relief of stepping out of a race
    you didn''t agree to run. A way to name the comparison in the moment it starts,
    before it spends your whole afternoon. Not so you can come out ahead. So you can
    be in the room you''re actually in, as the person actually in it, and let everyone
    else look however they look.


    Nothing here will help you catch up. That''s the point. You were never behind
    — you were just measuring.


    Book 3 of the Present Tense Books social anxiety series.'
