title: The Body Sounds the Alarm Before You Know Why
subtitle: For the working parent braced against a danger with no name — when your
  chest tightens in the school pickup line and nothing is actually wrong
cover_tagline: Your body is shouting fire in a room that isn't burning.
description:
  short_blurb: Your heart is pounding in the carpool lane and there is no emergency
    — just the ordinary Tuesday and a body convinced something is about to go wrong.
    This is a gentle, body-first companion for the parent whose alarm keeps firing
    when there's no real danger. It will not talk you out of the feeling. It will
    help your nervous system learn, slowly, that it is safe to stand down.
  long_description: 'You''re third in the pickup line, hands at ten and two, and your
    whole body is braced. Heart fast. Jaw tight. A bright wire of dread running from
    your throat to your stomach, ready for something terrible — and there is nothing.
    The kids are fine. The afternoon is ordinary. But your body didn''t get the message,
    and it''s been like this for a while now: the alarm going off in rooms that aren''t
    burning.


    This book is for you. For the parent who lies awake cataloguing what could go
    wrong tomorrow. Who feels the surge of adrenaline at a normal email, a closing
    door, a child a half-second slow to answer. Who has been told to calm down so
    many times it has started to feel like a personal failing. It isn''t. Your alarm
    system is not broken — it is loud, and faithful, and firing at shadows because
    somewhere along the way it learned the world needs constant guarding. You are
    not overreacting. You are over-protected by a body that loves you clumsily.


    Here you''ll come to recognize the false alarm for what it is. You''ll feel where
    the bracing actually lives — the held breath, the locked shoulders, the belly
    that won''t soften. You''ll learn to meet the surge without arguing with it, to
    let your feet find the floor, to send your nervous system the slow signal it''s
    been waiting for: not now, not this, you can set it down. You''ll begin to tell
    the difference between a real threat and the echo of one, and that difference
    is where your afternoons come back to you.


    This is not a method for conquering anxiety. There is no white-knuckling here,
    no mind over matter, no pushing through. We will not override your body or flood
    it with intensity it can''t hold. Nothing in these pages will make the fear disappear
    on command, and that is not the point. The point is that a braced body can learn,
    gently, that the danger has passed — and you can be the steady presence that teaches
    it.


    You are allowed to feel this and still be okay. You are allowed to come down slowly.
    Let the engine tick. Let your shoulders drop a quarter inch. You don''t have to
    be ready for the worst to be a good parent. You just have to come home to your
    own body, one unhurried breath at a time.


    Book 1 of the Felt Sense Publishing anxiety series.'
