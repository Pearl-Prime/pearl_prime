title: 'Grief: The Weight You Carry'
subtitle: How Nurses Are Rewriting the Rules of Grief
cover_tagline: You charted the time of death and went back for your other patients.
description:
  short_blurb: Nobody gives you a minute to grieve the ones you lose — you clean the
    room, you chart it, you answer the next call light. This is a book for nurses
    about the losses that never got mourned and the weight they leave behind. It won't
    tell you to find closure. It'll let you finally feel what you never had time to.
  long_description: 'You called it. You charted the time. You helped the family to
    the door, you stripped the bed, and then you went back out because Room 4 needed
    pain meds and the night wasn''t over. You didn''t cry. There wasn''t a place to
    put it. So you put it nowhere, and you did it again the next week, and the week
    after that, for years.


    This book is for the nurse carrying a stack of deaths nobody ever let you grieve.
    Not the ones at home — the ones at work. The patient you got attached to. The
    kid. The slow decline you watched for a month and the sudden one you couldn''t
    stop. You were supposed to be professional, and you were, and the cost of being
    professional is a weight you''ve been hauling shift after shift with no name on
    it and no place to set it down.


    Oscar Bello sits with the depleted for a living — he is a hospital chaplain —
    and he writes this about the weight you carry: the literal accumulation of loss
    that the job asks you to absorb and never process. Recognition: naming each loss
    as a loss, as real grief, instead of part of the workload you were trained to
    step over. Descent: going down into the grief you skipped — not to wallow, but
    because the only way out of it is through, and you''ve been going around it for
    years. Integration: coming back able to hold these patients in memory without
    their weight pressing on every shift, present for the living because you finally
    mourned the dead.


    This book will not give you closure, and it will not pretend closure is the goal.
    It will not tell you the losses happened for a reason or that they made you stronger.
    It will not hand you a gratitude practice for the privilege of being there at
    the end. Grief in nurses is not a problem to solve or a phase to complete on schedule.
    There is no fixing the fact that they''re gone. This book does not try.


    What it offers is plain language and honest room for the losses you never had
    time to feel — words you can use the next time you call one and have to walk straight
    back into the unit. You learned to keep moving because the floor doesn''t stop
    for grief. You are allowed to grieve them now, all of them, the ones you remember
    and the ones whose faces have blurred. You are allowed to set the weight down.
    You carried it long enough.'
