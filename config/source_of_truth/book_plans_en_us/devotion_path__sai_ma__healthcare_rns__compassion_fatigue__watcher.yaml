title: Off the Clock, Still Scanning the Room
subtitle: For the nurse whose mind never clocks out — the one who watches everyone
  for the subtle change, counts exits, and cannot stop assessing even at her own kitchen
  table
cover_tagline: You stopped being on shift hours ago. No one told your nervous system.
description:
  short_blurb: You assess the stranger's color in the grocery line. You wake at 3am
    sure you forgot to chart something. You watch your own family for the subtle change
    that means decline. This is a tender companion for the nurse whose vigilance never
    goes off duty — and a way to let the watch, finally, be set down.
  long_description: 'You are at your own kitchen table and you are still working.
    Someone coughs and you clock it. A family member goes quiet and your stomach drops
    the way it does before a rapid response. You lie down and your mind walks the
    unit one more time — did you pass that off, did you document the allergy, is the
    patient in 12 going to make it through the night you are no longer there for.
    The shift ended hours ago. Your watching did not.


    This book is for the registered nurse whose vigilance never clocks out. The one
    trained, shift after shift, to catch the subtle change before it becomes the code
    — and who now cannot stop catching it, anywhere, in anyone, at any hour. You scan
    rooms for exits. You assess strangers'' breathing. You monitor the people you
    love for signs of a decline that isn''t coming. It kept your patients safe. It
    is slowly eating you alive, because a mind that never stands down can never be
    poured out and refilled — it only empties.


    Here you will come to recognize the watcher for what it is. How the hypervigilance
    you call professionalism is a nervous system that was never given the all-clear.
    How the part of you that scans is not your enemy but an exhausted sentry that
    was never relieved of duty. How you can honor everything that vigilance protected
    and still, gently, tell it the shift is over. You will sit with the question this
    whole series turns on: what do you need, before you can give? — and discover that
    what you need, first, is to be allowed to stop guarding.


    This book will not give you a hack to shut your brain off or a routine to optimize
    your downtime. It promises no fix, because the watcher is not a malfunction —
    it is devotion that forgot how to rest. There is no hustle here, no productivity,
    no demand that you be grateful for your own alertness. There is only the slow
    grace of setting the watch down and trusting the dark to hold what you cannot.


    You are allowed to be off duty. You are allowed to let the room go unwatched.
    Someone, somewhere, can hold the night for you now.


    Book 3 of the Open Vessel Press compassion fatigue series.'
