description:
  short_blurb: Your feed is a wall of founders who raised, scaled, and look completely
    fine — and somewhere in the scroll your own worth quietly evaporates. This is
    a book for the founder who's running a brutal scoreboard no one else can see.
    It won't help you win the comparison. That's the whole point.
  long_description: 'It happens in the gaps. Between calls, in the line for coffee,
    in the ninety seconds before sleep — your thumb finds the feed and there they
    all are. The founder who just announced the round. The one whose product looks
    finished and easy. The one your age, or younger, who seems to have figured out
    the thing you''re still bleeding over. And without deciding to, you do the math:
    where they are, where you are, how far behind that makes you. The number always
    comes back the same. Short.


    This book is for the founder running that scoreboard. The one who can have a good
    week and lose it the moment someone else has a better one. The one who reads a
    competitor''s launch as a verdict on their own worth, who can''t celebrate a win
    because someone is always a lap ahead, who has quietly decided that everyone else
    got an instruction manual and you got the version with pages missing.


    You''ll come to recognize the rigged game underneath it. How you compare the inside
    of your business — the doubt, the cash-flow nights, the half-built thing held
    together by your hands — to the outside of theirs, the announcement, the highlight,
    the calm face on the panel. How comparison dresses up as ambition but spends like
    a tax, taking a little of your worth every time you scroll. How the scoreboard
    never closes, never declares you enough, because being enough was never a score
    you could win.


    This book will not help you come out ahead. It will not give you a way to finally
    beat the comparison, turn your envy into fuel, or make the feed into motivation.
    There''s no reframe here that makes you the founder who''s winning. That''s not
    a flaw in the plan; that''s the plan. Because the only way out of a rigged game
    is to stop agreeing to keep score.


    You were never behind. You''ve just been holding the same bright, tireless attention
    that built this company up to the light beside other people''s — measuring your
    unfinished days against lives you''ll never see the full ledger of. You''re allowed
    to set the scoreboard down. You''re allowed to have a worth that doesn''t move
    when someone else raises, ships, or shines.


    The ember in you doesn''t burn brighter or dimmer based on the fire across the
    room. It was never in the running. Let it warm your own cold hands for once.


    Book 2 of the Ember & Ash Publishing self-worth series.'
