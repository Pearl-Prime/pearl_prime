title: 'Sleep Anxiety: Why Your Brain Cries Wolf (3)'
subtitle: A Field Guide for Working Parents Navigating Sleep Anxiety
cover_tagline: The house is quiet. Everyone's safe. So why is your body braced?
description:
  short_blurb: It's the middle of the night, everyone is asleep and accounted for,
    and your body is wide awake and braced for an emergency that isn't coming. For
    the working parent whose nervous system raises a false alarm in the dark, this
    is a one-hour reset for the 3am surge of dread.
  long_description: 'It''s 3am. The house is silent. Everyone you love is breathing
    in their beds. And you are flat on your back, heart going, body braced like something
    is about to happen, except nothing is happening and nothing is going to. The alarm
    went off in the dark and there is no fire anywhere in this house. There''s just
    you, awake, bracing against nothing.


    This book is for the working parent who can survive the day and then loses the
    night. You''re not lying there solving problems, not exactly. Your body simply
    decided the middle of the night is a threat and flooded you accordingly: the tight
    chest, the jolt of dread for no reason, the certainty that something is wrong
    that you cannot locate because it isn''t there. You''ve tried the sleep hygiene.
    You''ve tried lying very still and being reasonable with yourself. The alarm does
    not care that you''re being reasonable.


    We are not going to fix you, because nothing in you is broken. What wakes you
    is a false alarm: your threat system firing in an empty room, mistaking darkness
    and stillness for danger. In the next hour you''ll learn to recognize it for what
    it is the instant it hits, to name it in plain words at 3am when you have no patience
    for anything clever, and then to go down into the surge instead of fighting it,
    which is the only thing that has ever actually let it pass. Recognition. Descent.
    The slow loosening that comes when you stop bracing against your own body.


    There is no bedtime routine in here. No app, no breathing protocol with seven
    steps you''ll forget the moment the dread hits. This book will not promise you
    eight unbroken hours or a night you never wake, because you will wake, and the
    difference is what you do when you''re up. The aim is not to become a person who
    sleeps perfectly. It''s to become a person who can be awake at 3am without being
    at war.


    The alarm is not proof that something is wrong with your family or with you. It''s
    a body sounding off in the dark out of old habit. You don''t get back to sleep
    by forcing it. You stop fighting the wave and let it set you down. The next time
    you wake braced against nothing, you''ll know there''s no fire, and you''ll know
    how to stay.


    One hour. Read it before bed, or read it at 3am when you''re up anyway. You can
    stop bracing now.'
