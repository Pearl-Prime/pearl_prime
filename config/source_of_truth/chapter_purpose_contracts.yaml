# Canonical chapter purpose contracts per arc tier (Arc-First emotional escalation).
# chapter_index is 0-based. assign_chapter_purpose_contracts maps runtime arc + count to these jobs.
version: 1

tier_by_chapter_count:
  micro_book: [3, 5]
  short_book: [6, 8]
  standard_book: [8, 12]
  extended_book: [13, 18]
  deep_book: [19, 99]

arcs:
  micro_book:
    jobs:
      - chapter_index: 0
        emotional_job: recognition
        reader_promise: "The reader feels accurately named without being overwhelmed."
        forbidden_repeats: []
        required_escalation: "Open with recognition only — no practices yet."
        allowed_slot_types: ["HOOK", "SCENE", "STORY", "REFLECTION", "INTEGRATION", "COMPRESSION", "TEACHER_DOCTRINE"]
        max_exercises: 0
      - chapter_index: 1
        emotional_job: mechanism
        reader_promise: "The reader sees what the pattern does in real time."
        forbidden_repeats: ["recognition"]
        required_escalation: "Shift from naming to explaining the loop."
        allowed_slot_types: ["HOOK", "SCENE", "STORY", "REFLECTION", "EXERCISE", "INTEGRATION", "COMPRESSION", "TEACHER_DOCTRINE"]
        max_exercises: 1
      - chapter_index: 2
        emotional_job: practice
        reader_promise: "The reader leaves with one embodied move that fits the arc."
        forbidden_repeats: ["recognition"]
        required_escalation: "First concrete skill; keep exercises minimal and sequenced."
        allowed_slot_types: ["HOOK", "SCENE", "STORY", "REFLECTION", "EXERCISE", "INTEGRATION", "COMPRESSION", "TEACHER_DOCTRINE"]
        max_exercises: 2
      - chapter_index: 3
        emotional_job: integration
        reader_promise: "The reader senses how insight and body-state connect across days."
        forbidden_repeats: ["recognition", "mechanism"]
        required_escalation: "Weave prior beats without re-explaining the whole mechanism."
        allowed_slot_types: ["HOOK", "SCENE", "STORY", "REFLECTION", "EXERCISE", "INTEGRATION", "COMPRESSION", "TEACHER_DOCTRINE"]
        max_exercises: 1
      - chapter_index: 4
        emotional_job: resolution
        reader_promise: "The reader closes with a workable self-definition and next step."
        forbidden_repeats: ["recognition", "mechanism", "practice"]
        required_escalation: "Land the arc; avoid introducing new mechanisms."
        allowed_slot_types: ["HOOK", "SCENE", "STORY", "REFLECTION", "INTEGRATION", "COMPRESSION", "TEACHER_DOCTRINE"]
