series_title: Ritual of Small Things
series_logline: "For the reader whose anxiety makes the world feel too loud and sharp, who seeks safety in the meticulous repetition of tiny, controllable actions."
series_description: "A college student with severe sensory anxiety finds her world shrinking. Her journey back begins not with grand gestures, but by building a personal liturgy of tiny, comforting rituals: brewing tea at the same time each day, arranging three pebbles on her windowsill, tracing a specific pattern on her wrist. This is a series about constructing a safe self, one deliberate, loving action at a time."
