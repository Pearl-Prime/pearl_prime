series_title: Roots Upward
series_logline: "For the reader who feels they must apologize for taking up space, whose instinct is to make themselves smaller to avoid being a burden."
series_description: "A gentle, fantasy-tinged slice-of-life about a young dryad whose growth is stunted because she believes her very existence is an inconvenience to the forest. The story follows her as she learns, from other mythical creatures and the changing seasons, that taking up space, reaching for the sun, and having needs are not crimes, but the nature of being alive."
