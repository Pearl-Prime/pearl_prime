# --- marketing & catalog ---
series_description: |
  A stillness_press iyashikei series for josei readers living inside ongoing anxiety.
  Not a recovery story — a restoration practice. Long wordless sequences, earth-tone
  watercolor space, and near-zero ink fill create a visual grammar the body responds
  to before the brain does. Each chapter leaves the reader quieter than when they arrived.

series_title: "The Alarm Still Rings"
# Derives directly from reader_promise ("even when the alarm is still ringing").
# Captures somatic presence within ongoing anxiety — cozy_restoration, not escape.

series_logline: >-
  For when the anxiety hasn't stopped, and you need somewhere to be anyway.
# 13 words. Reader-benefit. No clinical language. Cozy_restoration while alarm is active.

positioning: >-
  For readers of Mushishi and Laid-Back Camp who also want a series that offers
  stillness as something you practice, not achieve.

audience: |
  She is 25-42, her body knows things her brain hasn't caught up to yet —
  the tight chest at the third email, the shoulder that doesn't drop.
  At 11pm she is not reading about anxiety; she is in it.
  She wants a series that does not explain what she already lives,
  but sits with her in it.

comp_titles:
  - "Mushishi (Yuki Urushibara)"
  - "Laid-Back Camp (Afro)"
  - "My Lesbian Experience With Loneliness (Nagata Kabi)"
  - "The Body Keeps the Score (Bessel van der Kolk)"

marketing_angle: |
  This series doesn't explain somatic healing — it practices it.
  Near-wordless pages (45% silent panels) and near-zero ink fill create
  a visual grammar your body responds to before your brain does:
  the pacing IS the restoration.

hook_lines:
  - "Still counts as progress."
  - "Your body already knows what you're carrying."
  - "Read this until your shoulders drop."

