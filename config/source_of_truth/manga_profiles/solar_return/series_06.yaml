series_title: Sunward Glance
series_logline: "For the reader who watches others chase their dreams with a dull envy, while their own aspirations feel like distant, cold stars."
series_description: "A shonen sports-adjacent manga about Kaito, a former competitive swimmer who quit due to pressure and now works as a lifeguard, merely watching the water. Ra, the quiet pool maintenance man, teaches him not about winning races, but about the physics of buoyancy, the warmth of sun on water, and the simple aspiration to float before you swim. It's about rediscovering the love of the medium, not the medal."
