reader_promise: "You will feel the profound, aching pull of wanting to surface, paired with the first fragile sense of solid ground beneath you."
marketing_angle: "A metaphorical and visually striking seinen story that personifies depression as a physical force, offering a unique, science-tinged path to understanding its weight and potential."
