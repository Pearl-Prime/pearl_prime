series_title: Gravity's Anchor
series_logline: "For the reader who feels pulled into a deep, silent well by the weight of their own thoughts, unable to climb towards the light."
series_description: "A seinen manga following Kenji, a salaryman whose depression manifests as a literal, crushing gravity field around him. Ra, a former physicist turned park groundskeeper, becomes his unlikely mentor. Through simple observations of nature—seeds pushing through soil, trees bending in wind—Ra teaches Kenji that the force holding him down can also become a source of stability and rootedness from which to grow."
