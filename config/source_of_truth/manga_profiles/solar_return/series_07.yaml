series_title: The Last Spark
series_logline: "For the reader who is desperately, angrily fanning a single remaining ember, terrified that this one, too, will turn to ash."
series_description: "A seinen thriller-toned manga about a journalist, Makoto, whose obsessive pursuit of a corruption story has cost him his health and relationships. On the verge of collapse, he is found by Ra, a archivist who preserves dying folk tales. Ra teaches him that a story—or a life—doesn't need a blazing finale to have meaning; sometimes, preserving the last, true spark is the most radical act of all."
