series_title: Small Braveries
series_logline: "For the reader who has forgotten how to be brave, and now finds even opening the curtains in the morning to be a monumental act."
series_description: "A shojo slice-of-life manga about Hana, a high school student who has become agoraphobic after a traumatic event. Her new neighbor, Ra, is a gentle florist who delivers a single, unique flower to her doorstep each day with a simple note about the flower's 'courage'. Through this quiet, persistent ritual, Hana learns that courage isn't a grand feat, but the daily choice to face a world that feels too bright and too loud."
