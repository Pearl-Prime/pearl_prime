series_title: The Unlit Path
series_logline: "For the reader who For the reader staring at a crossroads in the dark, paralyzed by the fear that every possible choice leads to another kind of exhaustion."
series_description: "A josei workplace manga about Akira, a mid-career professional who quit her toxic job and now wanders without direction. She meets Ra, a guide for night hikers, who teaches her to navigate not by artificial light or distant goals, but by the subtle, natural markers of the present moment—the feel of the path, the sound of water, the constellations. It's a story about finding your way when the map has burned."
