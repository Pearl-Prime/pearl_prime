series_title: The Other Shift
series_logline: For the reader who clocks out of their day job only to clock into the endless second shift of home and family.
series_description: "A seinen workplace/slice-of-life manga about a salaryman father who secretly works a few nights a week at a 24-hour laundromat. The rhythmic hum of the machines and the transient, anonymous company of night owls provide a stark, peaceful contrast to his demanding roles at the office and at home."
