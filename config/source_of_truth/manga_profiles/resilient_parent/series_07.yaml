series_title: What Was Left Behind
series_logline: "For the reader who grieves the hobbies, dreams, and friendships that quietly disappeared into the background of parenthood."
series_description: "A josei fantasy manga about a woman who discovers a hidden, dusty room in her own house that contains physical manifestations of her abandoned passions—a still-wet painting, a half-written song. To heal her fatigue, she must decide whether to carefully put these things to rest or find a way to reintegrate them."
market_demo: josei
genre_family: fantasy
emotional_engine: grief
reader_promise: "You will feel the aching sweetness of properly mourning lost versions of yourself, and the quiet power that comes from choosing how to remember them."
marketing_angle: "A fantasy of reckoning with the selves we leave behind. This series treats lost hobbies and dreams not as failures, but as artifacts to be respectfully curated, allowing for closure or rediscovery."
