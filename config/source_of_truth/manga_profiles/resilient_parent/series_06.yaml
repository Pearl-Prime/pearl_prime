series_title: The Silent Agreement
series_logline: For the reader who is tired of the unspoken expectation that they will always be the emotionally absorbent one in the family.
series_description: "A seinen mystery manga where a father, a therapist, notices his own compassion fatigue manifesting as a literal silence that falls over him at home. He begins to 'investigate' the source of this silence, tracing it through the unspoken dynamics and emotional labor patterns of his household, seeking a new 'truth' to restore his voice."
