reader_promise: "You will feel the chilling clarity of seeing invisible family dynamics mapped out, and the tense hope of disrupting them."
marketing_angle: "A domestic noir about emotional labor. This series uses the framework of a psychological mystery to deconstruct and interrogate the hidden contracts of care within a family, offering a path to renegotiation."
