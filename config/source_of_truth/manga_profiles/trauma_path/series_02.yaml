series_id: trauma_path_under_the_weight
brand_id: trauma_path
series_title: Under the Weight
series_logline: "For the reader whose depression feels less like sadness and more like a crushing, senseless gravity they cannot explain to anyone."
series_description: "A seinen manga about a freelance translator who has functioned through depression for so long he cannot remember what life without it feels like. His therapist specializes in depression as somatic phenomenon — stored grief, frozen energy, the body's version of giving up. The series uses the metaphor of translation throughout: learning to interpret the body's depression language, one phrase at a time."
market_demo: seinen
genre_family: healing
emotional_engine: grief_integration
reader_promise: "You will feel the strange, underwater recognition of someone who has finally been accurately described — and the tentative hope that description carries."
marketing_angle: "Depression as somatic phenomenon, not just mood disorder. For readers exhausted by motivational recovery narratives. The translator metaphor makes the psychological work feel like skilled craft."
