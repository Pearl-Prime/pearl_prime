series_title: Soft Ground
series_logline: "For the reader whose past has made the present feel like an unsafe place to exist in their own body."
series_description: "A josei manga about a social work student who begins therapy and discovers that her 'anxiety' is complex trauma — the nervous system responding to historical danger, not present threat. The story follows her EMDR and somatic work with a trauma-trained therapist, charting the nonlinear, fragmented process of trauma integration. The art uses fragmented panel structures that reassemble as healing progresses."
market_demo: josei
genre_family: healing
emotional_engine: cozy_restoration
reader_promise: "You will feel the specific, almost cellular relief of a body that is beginning — slowly, unevenly — to believe that the danger is over."
marketing_angle: "One of the few manga to depict EMDR and somatic trauma therapy with clinical accuracy and emotional honesty. For readers in trauma recovery who want to see their process reflected."
