series_title: The Inheritance
series_logline: "For the reader who recognizes their parent's trauma in their own responses and does not know how to stop the chain."
series_description: "A seinen manga about a 40-year-old man who begins therapy when his teenage daughter's anxiety mirrors his own too precisely. The work becomes epigenetic: tracing not just his own trauma but his father's — and the patterns passed without words, in behavior, in nervous systems synchronized to threat. A family systems therapist helps him be the generation that breaks the chain."
