series_title: The Gap Years
series_logline: "For the reader who lost years to survival mode and is now grieving time they cannot get back."
series_description: "A josei manga about a woman returning to university at 34 after a decade spent in a controlling relationship and its aftermath. The story is not about the abusive relationship — it is about the next chapter, the strange grief of lost potential, and the slow rebuilding of a self that was systematically dismantled. Her therapist specializes in post-traumatic growth without toxic positivity."
market_demo: josei
genre_family: healing
emotional_engine: grief_integration
reader_promise: "You will feel the bittersweet, forward-moving grief of someone who has stopped waiting to get the lost years back — and started building with what remains."
marketing_angle: "Survivor narrative that starts after the crisis ends — rare and deeply needed. For readers tired of trauma stories that climax at escape. The grief of lost time is central and honoured."
