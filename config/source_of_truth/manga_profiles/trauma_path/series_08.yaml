brand_id: trauma_path
series_title: Tidal Flat
series_logline: "For the reader who has processed the obvious trauma and is now confronted by the quieter damage underneath."
series_description: "A josei manga about a woman who completed three years of trauma therapy for childhood abuse, believed she was healed, and then discovered a second, quieter layer — the grief of neglect, the absence of attunement, the wounds with no named incident. Her therapist introduces the concept of 'developmental trauma' and they begin again, more slowly. The tidal flat is the landscape of what is revealed when the obvious water recedes."
market_demo: josei
genre_family: healing
emotional_engine: grief_integration
reader_promise: "You will feel the quiet shock of recognizing a wound you did not know you had — and the grace of finding it is also treatable."
marketing_angle: "For readers who have 'done therapy' and still feel something is missing. Developmental trauma is underrepresented in manga. This fills a gap for the therapy-literate audience."
