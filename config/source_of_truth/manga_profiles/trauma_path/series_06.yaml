series_id: trauma_path_between_sessions
brand_id: trauma_path
series_title: Between Sessions
series_logline: "For the reader who is in therapy but finds the week between sessions the longest, hardest part."
series_description: "An anthology josei manga structured around the days between therapy appointments. Each chapter is one 'between-sessions week' — the homework, the setbacks, the small breakthroughs, the moment when something the therapist said finally lands. The protagonist changes each arc, but the therapist's voice and somatic tools remain consistent throughout. A companion piece to the therapy experience."
market_demo: josei
genre_family: healing
emotional_engine: cozy_restoration
reader_promise: "You will feel the particular, valuable loneliness of therapeutic work being done — and the company of knowing someone else has sat in exactly that feeling."
marketing_angle: "The manga FOR people in therapy, not about whether to go. Fills a genuine gap: the between-sessions experience is underrepresented and deeply relatable."
