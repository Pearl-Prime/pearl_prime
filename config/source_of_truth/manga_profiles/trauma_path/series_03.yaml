series_title: The Witness
series_logline: "For the reader who can see their own pain clearly but cannot stop re-experiencing it from inside it."
series_description: "A josei manga about a documentary filmmaker who covers humanitarian crises and has accumulated vicarious trauma she has never processed. An IFS (Internal Family Systems) therapist helps her learn to be an internal witness — observing her traumatized parts without fusing with them. The manga's visual language alternates between first-person immersion and third-person observation, mirroring the therapeutic shift."
market_demo: josei
genre_family: healing
emotional_engine: cozy_restoration
reader_promise: "You will feel the extraordinary relief of learning to watch your own pain from a safe distance — and discovering that distance, far from being coldness, is what finally makes healing possible."
marketing_angle: "IFS therapy visualized through documentary filmmaker lens — distinctive and intellectually engaging. The observer-participant dynamic gives the story philosophical depth."
