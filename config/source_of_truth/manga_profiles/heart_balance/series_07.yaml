series_title: Lanterns for the Lost
series_logline: "For the reader who is grieving not just a person, but the future version of themselves that died with them."
series_description: "A lantern-maker crafts beautiful lights for festivals, but cannot make one to guide him through the fog of loss after his brother's death. Maat teaches him to craft 'memory lanterns'—not to banish the dark, but to see clearly what is within it: the love, the regret, the unfinished conversations. A poignant, visual exploration of carrying grief without being consumed by it. An anthology topic series."
