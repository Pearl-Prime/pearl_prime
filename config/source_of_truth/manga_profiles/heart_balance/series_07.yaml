genre_family: slice_of_life
emotional_engine: tenderness
reader_promise: "You will feel the gentle, illuminating warmth of honoring what was lost, allowing it to light your path forward instead of blinding you."
marketing_angle: "A deeply atmospheric and artistic take on grief. The process of lantern-making serves as a meditative, hands-on metaphor for the slow, careful work of processing loss."
