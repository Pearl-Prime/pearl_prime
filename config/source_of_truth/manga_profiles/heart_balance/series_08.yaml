series_title: Worth Unmeasured
series_logline: "For the reader who was taught their value is a score to be maxed out, and now audits their own humanity like a failing ledger."
series_description: "A brilliant, anxious data analyst applies her ruthless metrics to every aspect of her life—friendships, hobbies, her own emotions—and finds herself perpetually in deficit. Maat, appearing as a custodian in her office building, introduces her to the 'algorithm of the heart': qualitative, nonlinear, and inherently valuable. A shojo/josei crossover about deprogramming from capitalist self-worth."
