series_title: The Ink of Worth
series_logline: "For the reader who measures their value only by tangible output, and feels like a ghost when the work stops."
series_description: "A celebrated but burned-out calligrapher can no longer see the beauty in his own strokes, believing his worth evaporated with his creative block. Maat, posing as a humble ink-stone grinder, teaches him that value is not in the product but in the pressure, pause, and presence of the hand holding the brush. A seinen tale of artistic and personal restoration."
