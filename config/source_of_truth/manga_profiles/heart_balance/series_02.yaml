reader_promise: "You will feel the quiet, solid warmth of recognizing your being as sufficient, separate from your doing."
marketing_angle: "Appeals to productivity-culture burnout. Uses the visceral, meditative process of traditional calligraphy as a metaphor for rebuilding self-worth from the ground up, stroke by stroke."
