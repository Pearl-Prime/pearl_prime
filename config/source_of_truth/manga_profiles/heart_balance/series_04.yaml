series_title: Grief's Untended Garden
series_logline: "For the reader who has locked the door to a room of loss, pretending the hallway doesn't exist, yet smells the flowers decaying inside."
series_description: "A gardener inherits a sealed, wild garden—a metaphor for the grief she has refused to tend since her mother's death. Maat, as the previous groundskeeper, guides her not to 'fix' or 'clean' it, but to learn the language of its overgrowth, to sit with the thorny roses and understand that grief is a landscape, not a task. A josei anthology topic series."
market_demo: josei
genre_family: slice_of_life
emotional_engine: grief
reader_promise: "You will feel the paradoxical relief of finally turning the key, not to tidy the pain away, but to acknowledge its sprawling, living presence."
marketing_angle: "A deeply metaphorical and gentle approach to processing loss. Markets as 'horticultural therapy' in manga form, for anyone who has been told to 'move on' from grief."
