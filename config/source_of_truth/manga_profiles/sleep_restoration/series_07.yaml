series_title: The Grief Watch
series_logline: "For the reader whose insomnia is a silent vigil, who stays awake because sleeping feels like abandoning a memory or a person."
series_description: "A man who lost his partner finds he can only sleep in brief, fractured moments. Master Sha helps him understand this wakefulness as a form of somatic loyalty, a body keeping watch. Through rituals that honor the grief *in* the body, they slowly transform the vigil into a space where rest and memory can coexist. A tender exploration of embodied loss."
market_demo: seinen
genre_family: healing
emotional_engine: grief
reader_promise: "You will feel the permission to finally rest, not by letting go, but by learning how to carry your love in a way that allows you to sleep."
marketing_angle: Addresses the profound link between unresolved grief and sleep disruption with immense sensitivity. For readers who appreciated the emotional depth and handling of trauma in 'A Silent Voice'.
