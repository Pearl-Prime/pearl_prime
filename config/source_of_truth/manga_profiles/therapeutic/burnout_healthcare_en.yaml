series_notes: |
  Healthcare and caregiving burnout — compassion fatigue, the accumulated grief
  of bearing witness, the identity fracture when helping becomes harm.
  Grief engine: the reader mourns the version of themselves who entered the profession
  with a full cup.
  Vow hook: reader enters through a private promise made in a moment of crisis.
