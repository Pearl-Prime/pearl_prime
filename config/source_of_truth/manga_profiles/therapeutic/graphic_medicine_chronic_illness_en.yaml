series_notes: |
  Chronic illness — autoimmune, fibromyalgia, ME/CFS, the conditions that are invisible
  to others. The gap between appearance and experience is the core wound.
  Tenderness engine: the reader feels witnessed in suffering that typically goes unseen.
  Hidden truth hook: reader enters through the moment the gap between inside and outside
  becomes unbearable.
  Research basis: therapeutic_manga_wellness_market_research_2026_04_04.md §chronic_illness §somatic
  Reader promise anchors to craving: Tenderness (#3) + Named-ness (#11).
  EN-first. Skeleton locales await localization sprint.

