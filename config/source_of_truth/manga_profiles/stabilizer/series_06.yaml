series_title: Cold Current
series_logline: "For the reader whose anxiety spikes in winter — shorter days, heavier body, fewer reasons to leave the house."
series_description: "A seasonal seinen manga set across one winter in Hokkaido, following a fisherman dealing with seasonal depression compounding chronic anxiety. The story uses the rhythms of winter fishing — waiting, cold, sudden action, stillness — as a structural metaphor for nervous system regulation. A taciturn mentor figure embodies regulated presence without ever using therapeutic language."
