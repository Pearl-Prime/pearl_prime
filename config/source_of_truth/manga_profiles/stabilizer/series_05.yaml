series_title: Anchor Weight
series_logline: "For the reader who functions fine on the outside while quietly drowning in a body that will not stop bracing for impact."
series_description: "A josei manga about a high-functioning anxiety sufferer — a school librarian who appears effortlessly calm to everyone around her. The story follows her covert survival strategies and the slow realization that managing anxiety and healing from it are completely different things. A somatic therapist introduces her to grounding practices that feel counterintuitive and then, gradually, essential."
