series_title: Safe Signal
series_logline: "For the reader who grew up in chaos and cannot believe in their bones that the current calm is real."
series_description: "A seinen manga about a man in his 30s from a high-conflict family who has built a stable life but cannot stop waiting for it to collapse. The story follows his work with a somatic therapist learning to send his body 'safe signals' — that this, right here, is not a threat. The central tension is between his cognitive knowledge of safety and his body's refusal to believe it."
