genre_family: slice_of_life
emotional_engine: catharsis
reader_promise: You will feel the liberating dark laugh of quantifying your social fears and realizing the numbers are never as bad as you imagined.
marketing_angle: "Blends deadpan accounting humor with monster-of-the-week style struggles. A unique, pragmatic take on anxiety for readers who appreciate the raw, awkward honesty of 'My Lesbian Experience With Loneliness' but with a more analytical, male-coded lens."
