series_title: The Scriptwriter
series_logline: "For the reader who rehearses every conversation in their head, trying to pre-write a world that feels safe and predictable."
series_description: "A socially anxious screenwriter for a small TV studio starts scripting not just her shows, but imaginary dialogues for her own life. The manga blurs the line between her real awkward interactions and the 'perfect' scenes she writes, exploring the grief of letting go of control and accepting messy reality."
