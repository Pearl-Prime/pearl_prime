series_title: The Alarm Within
series_logline: "For the reader who knows their anxiety is a false alarm but cannot make their body stop screaming."
series_description: "A teacher-student josei manga in which Ahjan, a somatic therapist, guides Mio — a school nurse who handles everyone's crises — through the process of learning to read her own body's alarm signals. Each chapter focuses on one sensation, one trigger pattern, one small shift. The art maps internal states visually, showing how the nervous system's 'alarm' softens when it is met with understanding rather than suppression."
