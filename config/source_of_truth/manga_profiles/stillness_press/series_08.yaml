series_logline: "For the reader who is somewhere between 'I'm fine' and 'I'm falling apart' and cannot get a clear signal from either direction."
series_description: "A josei manga about a woman in her late 30s navigating perimenopause while also processing childhood emotional neglect — two nervous system disruptions arriving together. Ahjan appears as a somatic therapist who helps her separate the physiological from the historical, giving her language and tools for both. The story is honest about the complexity and refuses easy resolution."
