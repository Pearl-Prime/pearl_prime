series_title: The Still Point
series_logline: "For the reader who is always reacting and longs for the pause before the reaction — the place where choice lives."
series_description: "A seinen manga about a high-frequency trader whose job is pure reaction velocity. When a bad trade causes significant harm, he seeks out Master Wu's dojo not for fighting skills but for what he has heard described as 'the still point' — the fraction of a second between stimulus and response that can be trained to expand. The series is about converting reactive intelligence into responsive intelligence."
