series_title: The Weight of Empty
series_logline: "For the reader who is strong enough to carry everything but has never learned how to put it down."
series_description: "A seinen manga about a veteran police detective who has carried every case, every death, every unsolved loss for twenty years without knowing he was carrying them. Master Wu — his neighbor, a retired martial artist — begins teaching him about what the Japanese call 'mushin': the empty mind that is full presence. The series is about the discipline of release, which turns out to be harder than the discipline of endurance."
