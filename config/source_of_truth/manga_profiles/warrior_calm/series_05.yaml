reader_promise: "You will feel the counter-intuitive strength of a person learning to put things down — and discovering that empty hands can hold more than full ones."
marketing_angle: "For strong, stoic men in high-stakes professions who have never been offered a language for release. Master Wu's mushin teaching gives them one without compromising their identity."
