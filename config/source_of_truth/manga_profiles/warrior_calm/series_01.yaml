series_title: Iron Gate
series_logline: "For the reader who wants to be calm under pressure but freezes, panics, or explodes instead — and cannot figure out why discipline alone doesn't fix it."
series_description: "A teacher-student shonen manga in which Master Wu — a martial arts master who treats emotional regulation as a combat discipline — trains Riku, a young firefighter who falls apart under real crisis despite perfect drills. Iron Gate explores the difference between controlled training environments and genuine threat response, teaching nervous system regulation through physical practice. The title refers to the gate between trained composure and lived composure."
