# Manga Profile — Example 1: Iyashikei / Healing
# Series: Anxiety & Overwhelm Vol 1 (Stillness Press)
# Demonstrates: cozy_restoration emotional engine, iyashikei visual grammar,
#               josei-sophisticated female-reader grammar, restrained pacing

manga_profile_schema_version: "1.0.0"
status: draft
created_at: "2026-04-19"

# --- core identity ---
title_id: anxiety_overwhelm_vol1
brand_id: stillness_press

market_demo: josei
# josei: adult women readers. expects emotional precision, not dramatic escalation.
# grammar: grounded realism + restraint + earned emotional moments.

genre_family: healing
subgenre: "slice_of_life_anxiety_recovery"

emotional_engine: cozy_restoration
# cozy_restoration: reader returns to feel safe, restored, lighter.
# NOT catharsis (too dramatic), NOT aspiration (too forward-pointing).
# Each chapter leaves the reader calmer than when they arrived.

reader_promise: "You will feel like someone finally understands what exhaustion really is."

# --- serialization ---
serialization_engine: mood_based
# mood_based: chapters accumulate feeling, not plot momentum.
# No cliffhangers. Chapters can be read out of order without confusion.
# Each episode = one specific emotional territory explored slowly.

chapter_hook_family: almost_confession
# almost_confession: emotional disclosure stopped before completion.
# The reader leans forward because something real was almost said.
# Works for josei/iyashikei: tension without manufactured drama.

# --- visual grammar ---
visual_grammar: iyashikei_minimalism
# iyashikei_minimalism: generous negative space, watercolor wash,
# earth tones, soft ink linework. Maps to brand style "Contemplative Ink Wash".

line_weight_profile: light
# Light, fluid lines. No speed lines. No impact frames.

black_fill_ratio: 0.06
# Near-minimal black fill. Pages feel airy, open.

screentone_profile: minimal
# Selective tones for shadow only. No decorative patterns.

# --- pacing contract ---
words_per_page_target: 28
# Very low word density. Space IS the content.
# Dialogue is sparse, deliberate, each line considered.

silent_panel_ratio: 0.42
# 42% of panels are wordless. Silence is the primary emotional carrier.
# Validates against MDLG-07 (silence_density gate).

reaction_shot_frequency: medium
# Medium reaction shots — emotional expression matters, but held back.
# Restraint is the grammar. A single held expression does more than three reaction panels.

spread_frequency: rare
# Double-page spreads reserved for moments of breakthrough stillness only.
# Overuse would break the quiet accumulation rhythm.

narration_tolerance: minimal
# No caption boxes. No internal monologue explaining what the reader should feel.
# Show. Do not tell. This is the core josei/iyashikei grammar.
# MDLG-11 (restraint_over_exposition) validates this series against this contract.

# --- adaptation ---
adaptation_targets:
  - print
  - webtoon
# Print: right-to-left reading, traditional margins.
# Webtoon: vertical scroll with extended silent sequences between dialogue panels.

# --- operator notes ---
series_notes: |
  This series is for readers who have been told their anxiety is "not that bad."
  The visual grammar does the work: long silent sequences + sparse dialogue +
  restrained line work = the reader feels their own nervous system slow down.
  Do not add dramatic chapter hooks. The mood_based engine is intentional.
  The emotional engine (cozy_restoration) means readers finish each chapter
  feeling safer, not more activated.

compat_tags: []
# No compat tags — this profile is fully genre-specific. Variants must match.

# --- marketing & catalog ---
series_title: "After the Noise"
# Derives from iyashikei_minimalism + cozy_restoration: the noise has passed;
# the series IS the quiet that follows.

series_logline: >-
  Read this when the world is still loud and your body hasn't caught up yet.
# 15 words. Reader-benefit forward. No clinical language.

positioning: >-
  For readers of Mushishi who also want a series that understands
  what exhaustion actually feels like.

audience: |
  She is 29-38, works in a job that requires her to be on — meetings, emails,
  decisions — from 8am to whenever the inbox empties. At 11pm she is lying in
  bed with her phone, not sleeping, not quite awake, not knowing what she needs.
  She has been told her anxiety isn't that serious, and she has believed it,
  and she is tired of believing it.

comp_titles:
  - "Mushishi (Yuki Urushibara)"
  - "My Lesbian Experience With Loneliness (Nagata Kabi)"
  - "A Silent Voice (Yoshitoki Oima)"
  - "Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski, Amelia Nagoski)"

marketing_angle: |
  Unlike most healing content that explains exhaustion back to you, this series
  trusts the reader: long silent sequences, restrained dialogue, and watercolor
  space do the work — each chapter finishes and you feel lighter without
  knowing why. The iyashikei visual grammar IS the restoration.

hook_lines:
  - "For when your body quit before your calendar did."
  - "Quiet that actually stays quiet."
  - "The manga that understands what fine doesn't feel like."

launch_priority: P0
# P0: strongest marketing case. Burnout/healing is highest-search wellness
# category in josei market. Comp titles have proven commercial sales.
# Emotional engine clarity is high. Visual grammar is strongly differentiated.

main_character_name: Nao
# Gender-neutral. Grounded, not aspirational. Plausible for josei adult market.

main_character_role: "overextended project coordinator"
# Mirrors the reader: high-output job, adult woman, no glamour.
# "Overextended" is the cozy_restoration opposite-state made visible.

main_character_image_path: null
# RunComfy generation is Phase E — separate sprint.
