# Devotion Path manga — series profile (character_design instance)
#
# Brand:  devotion_path (Open Vessel Press) — teacher: Sai Ma
# Series topic: BURNOUT / grief (healing register) — a caregiver learning to
#   grieve and let the body rest. NOT a battle/perseverance arc.
# Genre register (LOCKED): HEALING / IYASHIKEI / devotional-emotional-drama.
#
# Schema: config/manga/character_design_template.yaml (v1.0)
# Vocabulary + solver rules: config/manga/character_design_axes.yaml

series_id: devotion_en_02
brand_id: devotion_path
locale: en_US
genre_family: healing
subgenre: iyashikei_grief_caregiver_arc
teacher: sai_ma

# Marketing fields (Lane-D character_design profiles lacked these; required by
# tests/test_manga_catalog_extractor.py::test_all_series_have_required_marketing_fields).
marketing_angle: "The quiet work of compassion after years of keeping an invisible ledger you never agreed to hold — a devotional slow-burn where the teacher holds space instead of fixing."
launch_priority: P2

character_design:
  series_id: devotion_en_02
  brand_id: devotion_path
  locale: en_US
  market_demo: josei
  genre_family: healing
  subgenre: iyashikei_grief_caregiver_arc
  character_id: amara_okafor
  character_role: protagonist
  drafted_by: pearl_editor
  drafted_at: "2026-06-17"
  source_descriptions:
    - "devotion_path topic: burnout -> grief; a hospice/care nurse carrying the grief of those she tends, learning compassion for herself"
    - "register: healing/iyashikei devotional-emotional-drama; the supernatural-healing thread is quiet (a felt presence after loss), never spectacle"

  axes:

    # AXIS 1 — face_shape
    # Heart_shaped — soft, warm caregiver face. Distinct from oval (Sai Ma),
    # angular_long (Kenji), soft_round (Lin).
    face_shape:
      value: heart_shaped
      lockout: yes
      mangaka_tradition: "Asano-soft heart-shape josei (warm jaw, narrow chin)"

    # AXIS 2 — eye_geometry
    # Large almond double-lid, standard spacing, moderate lashes — warm and
    # expressive WITHOUT crossing into shojo sparkle (size large + moderate
    # lashes is the warm-josei boundary; not extra_large / heavy_decorative).
    eye_geometry:
      size: large
      shape: almond
      spacing: standard
      lid_fold: double
      eyelash_density: moderate
      lockout: yes
      note: "large + moderate (not heavy_decorative) keeps her warm-expressive but still josei-adult, never shojo-teen"

    # AXIS 3 — nose_construction
    nose_construction:
      bridge_angle: short_upturned
      bridge_length: short
      tip_shape: rounded
      nostril_visibility: invisible        # softest, most shojo-adjacent reading
      lockout: yes

    # AXIS 4 — mouth_jaw
    mouth_jaw:
      resting_expression: neutral_soft
      jaw_width: narrow
      chin_shape: soft_pointed
      lip_shape: thin_upper_full_lower      # canonical josei lip
      lockout: yes

    # AXIS 5 — hair
    # Shoulder-length, side-right part, curtained fringe, curly, dark brown —
    # a softer, fuller silhouette than the rest of the cast.
    hair:
      length: shoulder
      parting: side_right
      fringe_style: curtain
      texture: curly
      color_signal: dark_brown
      signature_shape_note: "loose dark curls she tucks behind one ear when she steadies herself at a bedside — a recurring grounding gesture"
      lockout: yes

    # AXIS 6 — build (lockout off per template default)
    build:
      height_implied: average
      frame_density: average
      shoulder_ratio: average
      lockout: no

    # AXIS 7 — wardrobe_register
    wardrobe_register:
      era_signal: contemporary_2020s
      personality_encoding:
        - oversized_grey_cardigan            # worn over scrubs between shifts
        - scrubs_top_off_shift
        - canvas_tote_always                 # carries small comforts for patients
      formality: casual
      lockout: yes

    # AXIS 8 — posture_default (lockout off per template default)
    posture_default:
      energy: contained
      symmetry: slight_left_lean
      lockout: no

    # AXIS 9 — age_signaling
    age_signaling:
      apparent_age_decade: mid_30s
      visible_age_cues:
        - slight_under_eye_shadow            # the fatigue of sustained caregiving
        - faint_smile_lines
        - tired_around_eyes
      lockout: yes

    # AXIS 10 — skin_treatment (lockout off per template default)
    skin_treatment:
      texture: clean
      tone: warm_deep
      lockout: no

    # AXIS 11 — accessories
    # Grandmother's brass locket — her devotional/memory object; she holds it
    # when grief surfaces. High-leverage signature distinct from Sai Ma's beads.
    accessories:
      glasses: none
      jewelry: signature_piece
      signature_item: "grandmother's oval brass locket on a long chain — she presses it to her sternum when a patient passes; it carries a faded photo"
      lockout: yes

    # AXIS 12 — color_signal
    # Dusty rose + sage green — tender, living warmth.
    color_signal:
      palette_primary: dusty_rose
      palette_accent: sage_green
      palette_secondary: cream
      bw_register_note: "Amara reads as a soft mid-value; the brass locket is her single recurring darker accent at the chest"
      lockout: yes

  # ── Solver metadata ─────────────────────────────────────────────────────
  solver:
    individuation_axes_locked: 9
    last_validated: "2026-06-17"
    collision_check_passed: passed
    collision_check_against:
      brand_scope: devotion_path
      collisions_detected: []
