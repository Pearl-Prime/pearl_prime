# --- marketing & catalog ---
series_title: "The Alarm Is Lying"
series_title_en: "The Alarm Is Lying"

series_logline: >-
  For the knowledge worker whose body keeps mistaking Tuesday for danger.

series_description: |
  Mira Aoki — a UX researcher in her early thirties — moves through a normal
  working week as her nervous system insists, repeatedly, that something is
  wrong. Nothing is wrong. The alarm is lying. Across ten episodes she learns
  to notice the alarm, name it, and let it pass — without arguing with it.
  No dramatic arc. No villain. Just one woman, one kettle, one jade pendant,
  and the slow practice of staying.

marketing_angle: |
  Positioned for the josei adult market on WEBTOON Canvas + KDP. Anxiety as
  felt sensation, not pathology. Iyashikei visual register translated to
  en_US contemporary setting. Comp: A Bride's Story (Kaoru Mori) emotional
  rhythm meets Polar Bear Cafe (Aloha Higa) gentle daily-life pacing.

comp_titles:
  - "Yokohama Kaidashi Kikō (Hitoshi Ashinano) — contemplative-traveler register"
  - "Polar Bear Cafe (Aloha Higa) — gentle-everyday-slice register"
  - "Shōwa Genroku Rakugo Shinjū (Haruko Kumota) — adult character interiority"

platform_primary: "WEBTOON Canvas"
platform_secondary: "KDP / Apple Books"
format_note: "Digital-first vertical scroll. Print collected edition 220–240pp once Series 1 ships."

launch_priority: P1
