# ────────────────────────────────────────────────────────────────────────────
# V2 character_design — 12-axis individuation block
# Schema: config/manga/character_design_template.yaml
# Authority spec: docs/CHARACTER_INDIVIDUATION_PIPELINE_SPEC_2026-05-02.md
# Drafted: 2026-05-18 (Pearl_Int + Pearl_Dev, from chapter_script ep_001 descriptions)
# Solver status: pending (constraint_solver to run before any render)
# ────────────────────────────────────────────────────────────────────────────

character_design:
  series_id: stillness_en_01
  brand_id: stillness_press
  locale: en_US
  market_demo: josei
  genre_family: healing
  subgenre: iyashikei_anxiety_arc
  character_id: mira_aoki
  character_role: protagonist
  drafted_by: pearl_int_pearl_dev
  drafted_at: "2026-05-18"
  source_descriptions:
    - "chapter_script ep_001 main_characters.mira: long brown hair, soft features, prefers warm-tone clothing (cream sweater); recurring small jade pendant"
    - "chapter_script ep_001 role: protagonist (knowledge worker — UX researcher; mid-career; quietly anxious)"
    - "chapter_script ep_001 scene_palette: warm cream + soft dawn gold (primary), muted sage + pale terracotta (secondary), jade green pendant + smoke-detector LED through-line (accent)"

  axes:

    # AXIS 1 — face_shape
    # Differentiation from Saki (stillness_jp_01, heart_shaped): Mira is soft_round.
    # Soft_round signals the gentle josei iyashikei register without the angular
    # cheekbone signal that heart_shaped carries.
    face_shape:
      value: soft_round
      lockout: yes
      mangaka_tradition: "Ashinano-school iyashikei josei (rounded, low-contour, contemplative)"

    # AXIS 2 — eye_geometry
    # Medium almond double-lid, minimal lashes — modern josei early-30s.
    # Avoids shojo big-eye / heavy-lash convention; avoids gekiga small-eye austerity.
    eye_geometry:
      size: medium
      shape: almond
      spacing: standard
      lid_fold: double
      eyelash_density: minimal
      lockout: yes
      note: "double_lid + warm_light skin (axis 10) signals Japanese-American or East-Asian-coded ethnicity consistent with the surname Aoki, without locking ethnicity tighter than needed"

    # AXIS 3 — nose_construction
    nose_construction:
      bridge_angle: straight
      bridge_length: short
      tip_shape: rounded
      nostril_visibility: implied   # iyashikei register; not drawn (seinen) or prominent (gekiga)
      lockout: yes

    # AXIS 4 — mouth_jaw
    # Resting expression "neutral_soft" carries the "quietly anxious" interiority
    # without showing it externally. Forbidden bow_mouth (josei anti-pattern per template).
    mouth_jaw:
      resting_expression: neutral_soft
      jaw_width: narrow
      chin_shape: soft_pointed
      lip_shape: thin_upper_full_lower
      lockout: yes

    # AXIS 5 — hair
    # LONG (chapter_script signal), brown (not dark_brown_with_grey — she's 33,
    # not 40+). Side-left part + slight wave gives the "loose strands fall when
    # she's deep in thought" signal that doubles as anxiety tell on close-ups.
    hair:
      length: long_to_waist
      parting: side_left
      fringe_style: side_swept
      texture: slight_wave
      color_signal: brown
      signature_shape_note: "loose strands fall across the left cheek when she leans forward — recurring signal of mild rumination; in tea-beat panels, this strand catches window light"
      lockout: yes

    # AXIS 6 — build
    # Per template default — body silhouette is less individuating than face;
    # solver does not lock this hard. Small-narrow frame consistent with "soft features".
    build:
      height_implied: average
      frame_density: small
      shoulder_ratio: narrow
      lockout: no

    # AXIS 7 — wardrobe_register
    # Cream sweater (chapter_script signal) + warm-tone layering. Contemporary
    # 2020s contemporary office-adjacent. UX researcher = business_casual.
    wardrobe_register:
      era_signal: contemporary_2020s
      personality_encoding:
        - cream_knit_sweater          # the cream sweater is the chapter_script's named signature
        - warm_tone_layered_cardigan   # over the sweater on cooler-palette days
        - relaxed_fit_high_waist_pants
        - canvas_low_heel              # sturdy quiet shoe — not athletic, not formal
      formality: business_casual
      lockout: yes

    # AXIS 8 — posture_default
    # Contained (held-in anxiety), slight forward lean toward window/kettle/desk.
    posture_default:
      energy: contained
      symmetry: slight_left_lean
      lockout: no

    # AXIS 9 — age_signaling
    # 33 per chapter_script. Early_30s with no smile lines yet, but a slight
    # under-eye shadow (anxiety/insomnia signal — also matches ep_004's
    # "Wed-night insomnia" episode).
    age_signaling:
      apparent_age_decade: early_30s
      visible_age_cues:
        - slight_under_eye_shadow     # anxiety + insomnia tell
        - no_smile_lines_visible      # she rarely smiles full-face
        - smooth_brow_at_rest
        - youthful_skin_overall
      lockout: yes

    # AXIS 10 — skin_treatment
    skin_treatment:
      texture: clean
      tone: warm_light                # consistent with eye_geometry note
      lockout: no

    # AXIS 11 — accessories
    # THE JADE PENDANT is the highest-leverage individuation signal in the series.
    # Chapter_script explicitly names it as the visual through-line ("jade green
    # — pendant + smoke-detector LED — visual through-line"). It's also her
    # somatic grounding object — she touches it when regulating.
    accessories:
      glasses: none
      jewelry: signature_piece
      signature_item: "small jade pendant on slim leather cord — recurring visual through-line per scene_palette; she touches it when her nervous system spikes (regulation gesture); the green catches different light in each scene"
      secondary_signature_item: "ceramic mug (warm cream glaze) — paired with the kettle in tea-beat panels"
      lockout: yes

    # AXIS 12 — color_signal
    # Warm cream primary (chapter_script scene_palette.primary). Jade green
    # accent (the pendant). In B&W render, Mira is mid-grey-anchored — never
    # the highest-contrast figure in a panel; the pendant becomes a darker dot.
    color_signal:
      palette_primary: warm_cream
      palette_accent: jade_green
      palette_secondary: muted_sage
      bw_register_note: "Mira renders mid-grey-anchored, never high-contrast. Her cream wardrobe = pale grey value; jade pendant = the single darker accent dot per panel that the eye returns to"
      lockout: yes

  # ── Solver metadata ─────────────────────────────────────────────────────
  solver:
    individuation_axes_locked: 9
    # face_shape, eye_geometry, nose_construction, mouth_jaw, hair,
    # wardrobe_register, age_signaling, accessories, color_signal
    # (build, posture_default, skin_treatment intentionally `lockout: no` per template defaults)
    last_validated: pending
    collision_check_passed: pending
    collision_check_against:
      brand_scope: stillness_press
      collisions_detected: []

  # ── Render metadata ─────────────────────────────────────────────────────
  render:
    # Operator decision 2026-05-18: 3-model routing per archetype.
    # Authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    # The previous draft used target_base_model: animagine_xl_4_0 (per
    # character_individuation §2.4 iyashikei row). That row routes B&W
    # iyashikei; our series is COLOR iyashikei (cream/sage/jade palette),
    # so Animagine is wrong here. Replaced with engine_routing_strategy
    # below — engine_router.py dispatches per archetype.
    engine_routing_strategy: per_archetype
    engine_routing_authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    engines_in_play:
      - flux_schnell   # simple objects, backgrounds, decompression archetypes
      - flux_dev       # mid-shots, hands, animals, character-in-scene
      - qwen_image_pulid  # face close-ups (identity-critical)
    secondary_face_lock: pulid_flux_facenet
    lora_required: false
    lora_skip_reason: "10-episode series; spec §2.4 threshold for LoRA is 12+ chapters; PuLID-FLUX-FaceNet alone suffices"
    prompt_axis_priority:
      positive_prompt_axes:
        - face_shape
        - eye_geometry
        - hair
        - wardrobe_register
        - age_signaling
        - accessories
        - color_signal
      negative_prompt_axes:
        - mouth_jaw
      solver_only_axes:
        - skin_treatment
        - posture_default
        - build
        - nose_construction
    last_render_date: pending
    render_artifact_path: pending
    reference_sheet_path: pending
    # Will be populated by Phase C (reference sheet generation via Qwen+PuLID):
    # artifacts/manga/character_references/stillness_press/mira_aoki/{front,three_quarter,profile,expression_sheet}.png

