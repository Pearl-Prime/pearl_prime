# Style state for stillness_en_01 — the canonical 4-axis aesthetic.
# Per MANGA_LAYER_RENDER_CONTRACT_SPEC.md §6.12.
#
# Drives prompt-injection slots referenced by L0/L2/L3 templates:
#   {style_state.line_weight_clause}
#   {style_state.wash_softness_clause}
#   {style_state.tonal_density_clause}
#   {style_state.shading_aggression_clause}
#
# Class-A enforcement (V4 launch): prompt clauses injected verbatim into
# every layer prompt. Drift detector is class-C (advisory at V4); promotion
# to class-A via §6.12 trip-wire (≥80% correlation with operator rejection
# across ≥5 episodes × ≥200 panels).

schema_version: "1.0.0"
series_id: stillness_en_01
brand_id: stillness_press
genre: healing
sub_register: iyashikei_color

canonical_style:

  line_weight:
    primary: "soft pen-and-ink, variable 0.5-1.2px, warm uneven hand-inked"
    consistency_target: "not vector-perfect; intentional small irregularity"
    avoid:
      - "vector-flat 1px lines"
      - "razor-sharp digital ink"
      - "comic-style heavy outlines"

  wash_softness:
    primary: "soft watercolor wash, gentle 2-4px edge bleed at value transitions"
    avoid:
      - "hard cel-shading"
      - "vector flat fill"
      - "airbrush gradient"
      - "photographic crispness"

  tonal_density:
    primary: "low — 15-25% non-white coverage outside the subject zone"
    avoid:
      - "heavy hatching"
      - "dense screentone"
      - "high-pixel-density texture in negative space"

  shading_aggression:
    primary: "gentle — value range 180-240 for shadows on light skin, 80-140 for shadows on dark hair"
    avoid:
      - "dramatic chiaroscuro"
      - "high-contrast black/white shadows"
      - "stark anime cel-shadow blocks"

  panel_border_treatment:
    primary: "no rendered borders — vertical-scroll webtoon (composite assembled from layers, not framed)"
    avoid:
      - "thick comic gutters"
      - "boxed panel borders within the L0 render"

prompt_clauses:
  # The strings that get format_map'd into prompts.
  # Per slot_registry.yaml: all four are REQUIRED slots for L0 and L2 templates.
  line_weight_clause: "soft pen-and-ink linework, variable line weight 0.5-1.2px, warm uneven hand-inked aesthetic, not vector-perfect"
  wash_softness_clause: "soft watercolor wash with gentle 2-4px edge bleed, painterly continuity, no hard cel-shading"
  tonal_density_clause: "low tonal density, breathable negative space, no heavy hatching, no dense screentone"
  shading_aggression_clause: "gentle shading, low contrast, value range 180-240 on light skin, no dramatic chiaroscuro"

style_fingerprint:
  # Targets for the class-C drift detector when Phase B.2 implements it.
  # Targets are aspirational at V4 launch (telemetry collects baseline; thresholds set in Phase B.2 calibration).
  target_edge_density_pct: [3, 9]              # Canny edge pixels as % of frame
  target_grayscale_variance_normalized: [0.04, 0.12]
  target_stroke_width_px: [0.5, 1.2]
  target_mean_saturation: [0.20, 0.45]         # warm but muted iyashikei palette
  target_dominant_hue_band: [30, 80]           # warm cream-to-amber

authority:
  spec: docs/specs/MANGA_LAYER_RENDER_CONTRACT_SPEC.md §6.12
  genre_root: config/manga/drawing_tradition_per_genre.yaml (healing)
  exemplars:
    - "Yokohama Kaidashi Kikō (Hitoshi Ashinano) — watercolor warmth, breathable negative space"
    - "Aria (Kozue Amano) — soft pen-and-ink, dappled light, gentle wash"
    - "Polar Bear Café (Aloha Higa) — warm cream palette, low tonal density"
