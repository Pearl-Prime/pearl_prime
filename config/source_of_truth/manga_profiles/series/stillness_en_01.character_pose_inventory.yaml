# Character pose inventory for stillness_en_01.
# Per MANGA_LAYER_RENDER_CONTRACT_SPEC.md §6.3.A + §8.1.
#
# Each pose_id is a distinct rendered L2 layer (cached). The continuity_state
# of each panel declares `character_state.<character_id>.pose_id` — the
# validator (§6.3.A invariant 2) checks that the declared pose_id exists
# in this inventory.
#
# Pose IDs are deliberately small in vocabulary; cardinality budget per §6.8.

schema_version: "1.0.0"
series_id: stillness_en_01

characters:

  mira_aoki:
    # 12 poses for V4 launch; covers ep_001's confirmed beats + buffer for
    # ep_002-010 likely needs. Add only when archetype demands surface in
    # the chapter_script (§6.8 empirical caching).

    poses:

      - pose_id: front_portrait_seated_calm
        subject_type: character_face_only
        framing_row: CU
        description: >
          Mira seated upright at table; head + shoulders visible; gaze slightly
          downward; neutral mouth, relaxed brow; cream sweater visible at collar.

      - pose_id: front_portrait_seated_tense
        subject_type: character_face_only
        framing_row: CU
        description: >
          Same seated framing as above but with subtle tension: slight brow
          micro-furrow, jaw soft but set, gaze fixed slightly off-center.
          Same hair, same wardrobe, same identity hash as _calm.

      - pose_id: hands_wrapping_cup
        subject_type: character_hands_and_arms
        framing_row: ECU
        description: >
          Both hands wrapping a ceramic cup; fingers relaxed not gripped;
          wrists visible; sweater cuffs visible; tea-cup-warmth gesture.
          No face visible (face is a separate pose).

      - pose_id: hand_only_table
        subject_type: character_hand_only
        framing_row: ECU
        description: >
          Single hand resting on or near the table surface; fingers slightly
          curled; relaxed; sweater cuff at top of frame. Reaching variant
          declared separately.

      - pose_id: hand_only_reaching
        subject_type: character_hand_only
        framing_row: ECU
        description: >
          Hand extended forward (toward phone, cup, or off-frame object);
          fingertips visible; tension light.

      - pose_id: chest_breath_micro
        subject_type: character_chest_partial
        framing_row: MCU
        description: >
          Chest + sweater + collar visible; subtle fabric-fold tension
          indicating quickened or settling breath; no face.

      - pose_id: medium_seated_three_quarter
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira seated, three-quarter angle, head + upper body visible;
          hands resting on lap or holding something; full sweater + pendant
          visible; gaze neutral.

      - pose_id: full_figure_standing_at_window
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Full upper body standing facing or near window; one hand may rest
          on sill; cream sweater visible; soft natural posture.

      - pose_id: silhouette_back_at_window
        subject_type: character_silhouette_back
        framing_row: CU
        description: >
          Back-of-head + shoulders silhouette against bright window light;
          intentional left-edge bleed (per archetype_exception window_light_threshold);
          hair-tie or shoulder line readable.

      - pose_id: walking_thoughtful_medium
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira walking, three-quarter angle from camera, mid-stride; gaze
          slightly downward or middle-distance; cream sweater + scarf
          if cool weather; quiet pace.

      - pose_id: holding_phone_in_hand
        subject_type: character_hand_only
        framing_row: ECU
        description: >
          One hand holding a phone (face-up); thumb resting near screen;
          notification glow visible on hand skin.

      - pose_id: covering_face_with_hand
        subject_type: character_face_only
        framing_row: CU
        description: >
          Face partially visible behind one hand near forehead/temple
          (self-soothing gesture); other features readable; subtle weight
          in the gesture, not theatrical.

      # ── ep_002 extension (V5.1 dispatch unblock) ──────────────────
      # Per ws_ep002_v51_pose_library_extension_20260527.
      # New poses added empirically per §6.8: each is referenced by an
      # ep_002 beat (see artifacts/.../_extracted_beatsheet.yaml CANDIDATE
      # pose_id markers) or anticipated by the operator brief for the
      # jade_pendant L2 hand-only variants.
      # All descriptions hold the iyashikei aesthetic register: warm cream
      # + sage palette context, soft natural light, calm body language,
      # cohesive with stillness_en_01.scene_inventory.yaml descriptions.

      - pose_id: full_figure_walking_exterior
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira walking on a quiet morning sidewalk; three-quarter angle from
          camera, mid-stride, weight just shifted forward; cream sweater under
          charcoal jacket, jade pendant visible at neck; gaze middle-distance,
          shoulders soft; soft late-morning natural light from camera-left;
          warm-neutral street palette around her (cool concrete softened by
          warm low sun). Quiet pace, not hurried.

      - pose_id: medium_walking_hand_at_pendant
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira mid-stride, head-and-torso framing, right hand lifted to rest
          two fingers on the jade pendant at her sternum; left arm relaxed;
          cream sweater + charcoal jacket visible; gaze middle-distance,
          micro-attentive (the hand-at-pendant is a self-soothing
          ground-check, not a clutch); soft natural light from camera-left;
          warm palette, no urgency.

      - pose_id: full_figure_walking_interior
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira walking through an interior space (office lobby or corridor);
          three-quarter angle, mid-stride, calm pace; cream sweater + jacket
          visible, laptop or bag may rest at side; gaze middle-distance or
          softly forward; ambient light from interior window (cool concrete
          + warm window-light mix per K02 rig), no fluorescent overhead
          register. Posture upright but unforced.

      - pose_id: medium_standing_facing_camera
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira standing still, facing the camera at a slight three-quarter
          angle; head + upper body visible; hands relaxed at her sides or
          lightly clasped at the front; cream sweater + jacket; gaze
          middle-distance, jaw soft; an enclosed-space register implied
          (elevator interior, hallway) so the framing reads contained but
          not pressed. Soft warm interior light, no cold-blue.

      - pose_id: hands_clasped_on_lap
        subject_type: character_hands_and_arms
        framing_row: ECU
        description: >
          Both hands clasped together resting on her lap; fingers interlaced
          gently, knuckles paler than usual but not white; sweater cuffs +
          jacket hem visible at top of frame; no face. A held-tension
          gesture, but the iyashikei register holds: it's containment, not
          grip. Soft natural light, warm-neutral palette.

      - pose_id: full_figure_seated_tiny
        subject_type: character_full_figure
        framing_row: WIDE
        description: >
          Mira seated as a small element within a much larger frame (vast
          interior with window wall + city skyline behind); her figure
          occupies a modest portion of the composition, posture upright,
          calm; cream sweater + pendant readable even at distance; warm
          natural window light spilling across the wider scene. The
          miyazaki-ma register: she is held by the space, not dwarfed.

      - pose_id: medium_seated_at_table
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira seated at a small round meeting table; head + upper body
          visible; one hand may rest near the table edge or on a closed
          laptop, the other relaxed; cream sweater + pendant visible;
          gaze directed across the table (toward an off-frame interlocutor);
          soft window light from camera-left, warm-neutral meeting-room
          palette (sage + cream surfaces, not corporate-cold).

      - pose_id: face_close_seated_speaking
        subject_type: character_face_only
        framing_row: CU
        description: >
          Same seated framing as front_portrait_seated_calm but with mouth
          softly active mid-speech; lips parted in a quiet, considered
          register (not animated, not theatrical); eyes meeting the
          off-frame interlocutor; cream sweater visible at collar; jaw
          relaxed even mid-word. Same identity hash as _calm and _tense.

      - pose_id: full_figure_climbing_stairs
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira ascending a stairwell, three-quarter angle, one foot on a
          higher step, weight forward; cream sweater + jacket visible;
          gaze slightly downward or forward, brow softly squinting against
          harsh stairwell light; posture composed but quietly effortful.
          Per scene context the rig here is cool-grey-blue (harsh
          fluorescent); the iyashikei pose holds her gentleness against
          the cold light — the contrast is the point, not a register break.

      - pose_id: full_figure_threshold_door
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira at a threshold doorway pushing it open into late-afternoon
          golden light; three-quarter angle, one hand on the door bar,
          golden-hour sun spilling across her face and cream sweater;
          eyes softly squinting into the light, not pained but bright;
          jacket carried over arm or worn; the warm light landing on her
          IS the pendulation gesture. K05 afternoon-golden rig.

      - pose_id: full_figure_standing_at_railing
        subject_type: character_full_figure
        framing_row: WIDE
        description: >
          Mira standing at a rooftop railing, back-three-quarter view from
          camera; one hand resting lightly on the railing, the other at
          her side; cream sweater + jacket visible; gaze toward the
          middle-distance city sprawl; shoulders softening with each
          breath; golden-hour light from camera-right, warm sky palette.
          The long-drop register: stillness without strain.

      - pose_id: full_figure_standing_at_kitchen
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Mira standing at her own kitchen table in evening light; three-
          quarter angle, one hand extended toward a candle on the table
          (lighting motion), the other softly at her side; cream sweater
          visible, jade pendant returned to home register; gaze at the
          candle, calm and present; warm amber light from the candle and
          window combined, sage + cream kitchen palette. Home as
          completion, not retreat.

      - pose_id: reaching_for_jade_pendant
        subject_type: character_hand_only
        framing_row: ECU
        description: >
          Single hand extended toward the jade pendant resting at the
          sternum; fingertips approaching but not yet touching; cream
          sweater fabric visible at the wrist; the pendant's jade-green
          tone catches a fragment of soft natural light. A reaching
          gesture, not a snatch — the iyashikei ground-check before
          contact.

      - pose_id: gripping_jade_pendant
        subject_type: character_hand_only
        framing_row: ECU
        description: >
          Two or three fingers resting on the jade pendant — not a clutch,
          a contact-hold; fingertips visible against the warm jade-green
          stone; cream sweater fabric softly out of focus at the edge of
          frame; soft natural light catches the pendant's surface. The
          held-ground gesture: anchor, not anchor-as-clinging.

    # ── inventory metadata ──────────────────────────────────────────
    canonical_axes_hash_input: "sha256(canonical_json(character_design.axes))"
    canonical_axes_hash: "PENDING_compute_on_first_render"   # backfilled when
      # the render orchestrator first reads stillness_en_01.yaml and hashes
      # the 12-axis block. Stored back here to detect axes drift across edits.
    reference_image_path: null                # PuLID blocked; no reference image
    identity_lock_active: false               # per §15.A.2: hash-only structural check
    identity_lock_active_when:
      - "PuLID-FaceNet EVA-CLIP issue resolved AND reference_image_path set, OR"
      - "per-character LoRA trained on ai-toolkit AND lora_path declared"

  # ── ep_002 extension (V5.1 dispatch unblock) ────────────────────────
  # dr_morimoto authored per ws_ep002_v51_pose_library_extension_20260527.
  # Per OPD-149 (2026-05-26): secondary_character_face_close DEFINE accepted;
  # this block provides the dr_morimoto pose vocabulary the new archetype
  # requires (subject_actor=dr_morimoto binds PuLID to this character's
  # reference sheet, not Mira's).
  # Identity register per brief: calm professional research director, mid-50s,
  # warm cream cardigan or soft charcoal jacket, thin-frame glasses, gentle
  # but neutral expression — not warm-warm (no smile-display), not cold
  # (no austere read). The iyashikei meeting register: patient, present,
  # attentive.

  dr_morimoto:
    # 3 poses for V5.1 ep_002 launch; covers b16 (meeting establishing) +
    # b17/b22 (secondary_character_face_close default) + face-3/4 register
    # breadth for future episodes. Extend only when subsequent chapter_scripts
    # demand surface (§6.8 empirical caching).

    poses:

      - pose_id: face_close_seated_calm
        subject_type: character_face_only
        framing_row: CU
        description: >
          Dr. Morimoto seated across the meeting table, head + shoulders
          visible at close range; thin-frame glasses readable, gentle but
          neutral expression — neither warm-warm (no smile-display) nor
          cold (no austere set); warm cream cardigan or soft charcoal
          jacket visible at collar; gaze meeting the protagonist's,
          addressed-to-camera in the POV-from-Mira sense; soft window
          light from camera-left, warm-neutral palette. The iyashikei
          meeting register: patient, present, attentive. Default pose
          for the secondary_character_face_close archetype.

      - pose_id: medium_seated_at_table_facing
        subject_type: character_full_figure
        framing_row: MS
        description: >
          Dr. Morimoto seated at the small round meeting table, head +
          upper body visible at medium framing; posture upright but
          unforced, hands relaxed near the table edge or resting on an
          open laptop; warm cream cardigan or soft charcoal jacket
          visible; gaze across the table toward Mira (off-frame in the
          MS framing's narrative space); soft window light from camera-
          left, sage + cream meeting-room palette. The two-shot
          establishing register: composed, professional, calm.

      - pose_id: face_three_quarter_seated_calm
        subject_type: character_face_only
        framing_row: CU
        description: >
          Same seated framing as face_close_seated_calm but rotated to a
          three-quarter angle from camera; thin-frame glasses readable
          in profile, gentle neutral expression held; cream cardigan or
          charcoal jacket visible at collar; gaze directed toward an
          off-frame interlocutor at slight angle; soft window light from
          camera-left. Same identity hash as face_close_seated_calm —
          provides register breadth so the secondary_character_face_close
          archetype can vary across multi-instance episodes without
          becoming a talking-head montage anti-pattern.

    # ── inventory metadata ──────────────────────────────────────────
    canonical_axes_hash_input: "sha256(canonical_json(character_design.axes))"
    canonical_axes_hash: "PENDING_compute_on_first_render"   # backfilled when
      # the render orchestrator first reads stillness_en_01.yaml and hashes
      # dr_morimoto's character_design block (currently visual_anchor: pending
      # — see stillness_en_01.yaml minor_cast.dr_morimoto). Until then the
      # axes hash is a placeholder; structural validator only checks pose_id
      # existence (§6.3.A invariant 2), which this block satisfies.
    reference_image_path: null                # PuLID blocked; no reference image
    identity_lock_active: false               # per §15.A.2: hash-only structural check
    identity_lock_active_when:
      - "PuLID-FaceNet EVA-CLIP issue resolved AND reference_image_path set, OR"
      - "per-character LoRA trained on ai-toolkit AND lora_path declared"

  # minor cast pose inventories — author when ep_003+ scripts confirm them
  # mother:
  # kenji:
  # yara:

authority:
  spec: docs/specs/MANGA_LAYER_RENDER_CONTRACT_SPEC.md §6.3.A + §8.1
  character_design: config/source_of_truth/manga_profiles/series/stillness_en_01.yaml
