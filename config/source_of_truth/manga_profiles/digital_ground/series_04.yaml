series_title: Analog Rituals
series_logline: "For the reader who uses doomscrolling as a sleep aid, only to find themselves more wired and anxious in the blue-lit dark."
series_description: "Kaito, a freelance writer, has trained his brain to associate his phone with bedtime, leading to hours of restless scrolling. Miki introduces him to the deliberate slowness of analog rituals—brewing tea, mending clothes, sketching—to create a new, calming pre-sleep pathway that demands focused presence."
