series_title: Ambient Signal
series_logline: "For the reader who mistakes the constant low hum of digital anxiety for their own personality, believing they are just a 'nervous person.'"
series_description: "Miki works with Haruka, a quiet librarian who attributes her constant unease to her nature. Miki guides her to identify the 'ambient signal'—the background noise of news alerts, social comparison, and informational overload—and teaches her techniques to tune her personal receiver to a different, more peaceful frequency."
