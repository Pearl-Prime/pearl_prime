series_title: Negative Capability
series_logline: "For the reader who needs every situation resolved and is exhausted by how often life refuses to cooperate."
series_description: "A seinen manga about a game designer whose creative output requires tolerating ambiguity but whose personal life is locked in a constant, exhausting demand for resolution. A Stoic mentor introduces him to Keats's concept of negative capability — the capacity to remain in uncertainty without irritable reaching after fact or reason — as a Stoic practice. The story explores how creative genius and psychological stability are related skills."
