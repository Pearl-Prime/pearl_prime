series_title: A Safe House
series_logline: For the reader who is so exhausted from performing 'okayness' for their family that they have forgotten what their own face looks like at rest.
series_description: "A seinen workplace manga about a man in his 30s who manages his family's expectations while climbing the corporate ladder. After a panic attack, he starts visiting a unique 'Safe House' cafe run by Junko, where the only rule is 'no performing.' The series explores the slow, awkward, but healing process of taking off the relational mask and being authentically, quietly himself."
