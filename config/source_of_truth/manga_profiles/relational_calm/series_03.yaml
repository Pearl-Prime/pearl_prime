series_id: relational_calm_weight_of_light
brand_id: relational_calm
series_title: The Weight of Light
series_logline: "For the reader who feels unworthy of love unless they are constantly useful, productive, and solving problems for others."
series_description: "A shojo-tinged healing manga about a high-achieving university student who collapses from burnout. Junko, a nurse at the campus clinic, becomes her guide, using metaphors of light and weight to explore self-worth detached from achievement. The story unfolds in quiet conversations and small acts of simply 'being,' challenging the protagonist's core belief that her value is transactional."
market_demo: shojo
genre_family: healing
emotional_engine: grief
reader_promise: "You will feel the aching, beautiful release of grieving the person you thought you had to be, to make space for who you are."
marketing_angle: "A poignant deconstruction of 'girlboss' culture and academic burnout, framed as a gentle journey of self-discovery. Appeals to young women navigating immense pressure to perform."
