series_title: A Gentle Hand
series_logline: For the reader who longs to be cared for but has built such high walls that kindness now feels like a threat to their independence.
series_description: "A josei romance that subverts the genre, focusing on the protagonist's fear of intimacy rather than the pursuit of it. Miyuki, her neighbor and a retired gardener, teaches her about relationships through the metaphor of tending plants—some need space, some need support, all need consistent, gentle attention. The series is about unlearning the belief that needing others is a weakness."
