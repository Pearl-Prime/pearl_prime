reader_promise: "You will feel the terrifying, tender ache of letting someone see the fragile part of you that you've hidden for years."
marketing_angle: "A romance where the central conflict is internal, not external. It's for readers who find typical romance overwhelming and crave a story about earning trust in oneself first."
