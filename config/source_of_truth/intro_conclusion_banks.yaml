# Intro/Conclusion Chapter Template Banks (Format-Aware)
# Authority: Plan — Format-Aware Introduction & Conclusion Chapters
# Selection: deterministic hash (topic_id, persona_id, seed) → brand → format → persona → default
# Size variants: lean (~30w, micro books), short (~80w, 30-min books), full (~150-400w, standard+)
# Variables: {topic_display}, {persona_display}, {mechanism_alias}, {chapter_count}
# Anti-spam: SHA256 signature → 12% cap per brand/quarter + duplicate gate
# Fallback: if template lacks the needed size, resolver falls back: lean → short → full → content

schema_version: "2.0"

introduction:
  # ── Format-specific templates (override persona/default for specific formats) ──
  formats:
    F005:  # Scenario Rescue Kit (micro, 15 min)
      templates:
        - id: rescue_kit
          lean: "When {topic_display} hits, open to any chapter. Each one is a standalone reset."
          short: "When {topic_display} hits, open to any chapter. Each one is a standalone reset. No sequence required. Start wherever you are."
          full: |
            When {topic_display} hits, open to any chapter. Each one is a standalone reset.

            There is no sequence to follow. No chapter depends on the one before it. Start wherever you are. Use what helps. Come back when you need to.

            This is a rescue kit, not a curriculum.
    F001:  # 90-Day Transformation (extended)
      templates:
        - id: ninety_day
          lean: "Ninety days. One chapter per day. By day 90, the pattern will be visible."
          short: "Ninety days. One chapter per day. Each day builds on the last. By day 90, the pattern behind {topic_display} will be visible — not because you fought it, but because you watched it."
          full: |
            Ninety days. One chapter per day. That is the commitment this book asks of you.

            Each day builds on the last — not in a linear way, but in the way a spiral builds: you will return to the same themes with a slightly different vantage point each time. By day 90, the pattern behind {topic_display} will be visible — not because you fought it, but because you watched it long enough for it to show itself.

            You do not need to do this perfectly. You need to do it consistently. Start tomorrow. Or start now.
    F015:  # Sensory Regulation Library (micro, 15 min)
      templates:
        - id: sensory_library
          lean: "Five practices for {topic_display}. Use any one when you need it."
          short: "This is a sensory regulation library — five practices for {topic_display}. Each one stands alone. Use whatever matches the moment."
          full: |
            This is a sensory regulation library. Five practices, each designed to interrupt {topic_display} through your senses — sight, sound, breath, touch, movement.

            You do not need to do them in order. You do not need to do them all. When {topic_display} arrives, pick the one that matches the moment. Each practice takes less than three minutes.
    F012:  # Permission Slip Collection (micro, 20 min)
      templates:
        - id: permission_slips
          lean: "Fifty-two permissions. One for each week. Read the one you need today."
          short: "Fifty-two permissions — one for each week of the year. You do not need to read them in order. Open to the one that speaks to where you are today."
          full: |
            Fifty-two permissions. One for each week of the year.

            These are not affirmations. They are not mantras. They are permissions — things you already know you are allowed to feel, to do, to stop doing — but that {topic_display} has convinced you are not safe.

            You do not need to read them in order. Open to the one that speaks to where you are today. Read it once. Let it land. That is enough.

  # ── Default templates (used when no brand, format, or persona override matches) ──
  default:
    templates:
      - id: pattern_recognition
        title: "Introduction"
        lean: >-
          This book is about {topic_display} — not the version you read about, but the one that lives in your body.
        short: >-
          This book is about {topic_display}. Not the version you read about online.
          The version that lives in your body. Each chapter gives you one scene,
          one insight, one practice. There is nothing to fix. There is something to see.
        full: |
          This book is about {topic_display}. Not the version you read about online. The version that lives in your body — the one that shows up before you have words for it.

          Each chapter will take you through a single scene. You will recognize something. You will understand why it persists. You will feel your frame shift. And by the end, you will own something new — not as a concept, but as a lived experience.

          There is nothing to fix. There is something to see. Let's begin.

      - id: container_setting
        title: "Before We Begin"
        lean: >-
          This book is practices, not advice. Try them and notice what your body does.
        short: >-
          I have structured this as practices, not advice. Nervous systems do not change
          through ideas — they change through repetition and safety. Try the practices
          and notice what happens.
        full: |
          I have structured this as practices, not advice. Because nervous systems do not change through ideas. They change through repetition and safety.

          Everything here is designed to be used, not believed. You do not need to agree with anything in these pages for it to work. You just need to try the practices and notice what happens in your body when you do.

          This is not memoir. This is not motivation. This is a container — and you are already inside it.

      - id: body_first
        title: "Introduction"
        lean: >-
          Before we talk about {topic_display}, notice one place in your body holding tension right now. That noticing is the method.
        short: >-
          Before we talk about {topic_display}, feel something. Notice where you are sitting.
          Notice one place in your body holding tension. You do not need to release it.
          That noticing is the entire method of this book.
        full: |
          Before we talk about {topic_display}, I want you to feel something. Not think about it. Feel it.

          Notice where you are sitting. Notice the weight of this device in your hands, or the sound of this voice in your ears. Notice one place in your body that is holding tension right now. You do not need to release it. Just notice it.

          That noticing — that is the entire method of this book. We will go deeper. But it starts here, with what your body already knows.

      - id: no_fixing
        title: "Introduction"
        lean: >-
          There is nothing broken here. {topic_display} is a pattern, not a flaw. This book shows you the mechanism underneath it.
        short: >-
          There is nothing broken here. {topic_display} is not a flaw in your character.
          It is a pattern your nervous system learned for good reasons. This book shows
          you the mechanism underneath it — not to fix you, but to free up the energy
          you have been spending on a fight you were never going to win by force.
        full: |
          There is nothing broken here. There is something to see.

          {topic_display} is not a flaw in your character or a failure of willpower. It is a pattern — one your nervous system learned for good reasons, at a time when it made sense. The pattern is still running because nobody showed you the mechanism underneath it.

          This book will show you that mechanism. Not to fix you. To free up the energy you have been spending on a fight you were never going to win by force.

      - id: nervous_system
        title: "Introduction"
        lean: >-
          Your nervous system already knows what {topic_display} feels like. This book interrupts the program — not by force, but by attention.
        short: >-
          Your nervous system already knows what {topic_display} feels like — the tightening, the scanning, the bracing. What it does not know yet is that the program can be interrupted. Not by force. By a different kind of attention.
        full: |
          Your nervous system already knows what {topic_display} feels like. It knows the tightening, the scanning, the bracing. It has been running this program for longer than you have been naming it.

          What it does not know — yet — is that the program can be interrupted. Not by force. Not by willpower. By a different kind of attention. The kind you will practice in these {chapter_count} chapters.

          You do not need to understand this now. You just need to keep listening.

      - id: direct_address
        title: "Introduction"
        lean: >-
          You picked up this book because something in your body recognized {topic_display}. You were right.
        short: >-
          You picked up this book because something in you recognized the title. Not intellectually. Something in your body said: that is what I am carrying. You are right. And you are not alone in carrying it.
        full: |
          You picked up this book because something in you recognized the title. Not intellectually. Deeper than that. Something in your body said: that is what I am carrying.

          You are right. And you are not alone in carrying it. {topic_display} is one of the most common experiences {persona_display} face — and one of the least understood, because the people who carry it are usually the last to name it.

          This book will help you name it. And then it will help you do something more useful than naming: it will help you feel the difference between the pattern and you.

      - id: anti_guru
        title: "Introduction"
        lean: >-
          No affirmations. No morning routines. Just a way of seeing {topic_display} that gives you agency.
        short: >-
          This is not a self-help book in the way you might expect. No affirmations. No five-step plan. What it offers is a way of seeing {topic_display} that makes the pattern visible. That visibility is agency.
        full: |
          This is not a self-help book in the way you might expect. There are no affirmations. No morning routines. No promise that if you follow five steps, everything changes.

          What this book offers is simpler and harder: a way of seeing {topic_display} that makes the pattern visible. Once you can see it, you stop being inside it without knowing. That is not a cure. It is something better — it is agency.

          The chapters ahead are short. The practices are simple. The shift is quiet. But it is real.

      - id: mechanism_reveal
        title: "Introduction"
        lean: >-
          There is a pattern underneath {topic_display} — {mechanism_alias}. This book names it so you can see it.
        short: >-
          There is a pattern underneath {topic_display}. You may already sense it — the way your body tightens before your mind catches up. This book names that pattern: {mechanism_alias}. By the end, the pattern will still be there. But your relationship to it will be different.
        full: |
          There is a pattern underneath {topic_display}. You may already sense it — the way certain moments trigger the same response, the way your body tightens before your mind catches up, the way you have tried to think your way out of something that does not live in your thoughts.

          This book will name that pattern. We call it {mechanism_alias}. You will meet it in the first chapter and you will recognize it immediately. Not because I describe it well, but because your body has been living with it for years.

          By the end, the pattern will still be there. But your relationship to it will be different. That is the work.

      - id: permission
        title: "Introduction"
        lean: >-
          You have permission to put this down, skip a practice, or feel something unexpected. Try one practice before you decide.
        short: >-
          You have permission to put this book down at any point. You have permission to skip a practice or feel something you did not expect. {topic_display} does not respond well to pressure. Try one practice before you decide whether this is for you.
        content: |
          You have permission to put this book down at any point. You have permission to skip a practice. You have permission to feel nothing, or to feel too much, or to feel something you did not expect.

          {topic_display} is not a subject that responds well to pressure. So this book will not pressure you. It will offer you scenes, reflections, and practices. What you do with them is yours.

          The only thing I ask is that you try one practice before you decide whether this book is for you. Just one. And notice what your body does with it.

  personas:
    gen_z_professionals:
      templates:
        - id: gen_z_no_guru
          title: "Introduction"
          content: |
            This is not a guru book. There is no morning routine that will save you. No journaling prompt that undoes what {topic_display} has been doing to your nervous system since you started adulting.

            What this book does is simpler: it shows you the pattern. The one running underneath the doom-scrolling, the burnout, the thing where you are simultaneously exhausted and unable to stop. Once you see the pattern, you stop being trapped inside it without knowing.

            That is not a fix. It is a start. And for {persona_display}, a start is usually what has been missing.

        - id: gen_z_body_first
          title: "Introduction"
          content: |
            Your body already knows what {topic_display} feels like. It is the jaw tension before a meeting. The chest tightness when you open your laptop. The thing where you cannot sleep but you also cannot stop scrolling.

            This book is not going to explain {topic_display} to you. You already get it. What it is going to do is give you a way to work with it that does not require more willpower, more discipline, or more self-improvement content.

            Just practices. Short ones. And a way of seeing what is already happening in your body so it stops running the show.

    corporate_managers:
      templates:
        - id: exec_pattern
          title: "Introduction"
          content: |
            You are good at your job. That is part of the problem.

            {topic_display} does not happen to people who coast. It happens to people who perform, who deliver, who carry more than their title requires. And the pattern — {mechanism_alias} — is invisible precisely because it looks like competence from the outside.

            This book will make it visible. Not to undermine your performance. To show you where the cost is hiding, and what happens when you stop paying it unconsciously.

        - id: exec_no_theory
          title: "Introduction"
          content: |
            You do not need another framework. You have frameworks. What you need is to feel what {topic_display} is doing in your body while you are in the middle of using those frameworks.

            These {chapter_count} chapters are short, practice-based, and designed for people who do not have time to read slowly. Each one gives you something you can use in a meeting, on a commute, or in the three minutes between calls when your nervous system is screaming.

    healthcare_rns:
      templates:
        - id: rn_compassion
          title: "Introduction"
          content: |
            You spend your shifts holding other people together. This book is about what happens when nobody is holding you.

            {topic_display} in healthcare is not the same as {topic_display} in an office. The stakes are different. The fatigue is different. The guilt about feeling anything at all is different. This book knows that.

            The practices here are short — because your breaks are short. The language is direct — because you do not have patience for fluff. And the pattern we are going to look at is the one you already know but have not had time to name.

    working_parents:
      templates:
        - id: parent_split
          title: "Introduction"
          content: |
            There is a version of {topic_display} that only shows up when you are splitting yourself between a child who needs you and a world that also needs you. It is not the same as regular {topic_display}. It carries guilt. It carries identity. It carries the question: am I doing this right?

            This book is not going to answer that question. It is going to show you the pattern underneath it — {mechanism_alias} — and give you practices you can do while your kid is in the other room.

    educators:
      templates:
        - id: educator_giving
          title: "Introduction"
          content: |
            You teach other people how to grow. This book is about what happens when you forget to include yourself in that process.

            {topic_display} in education is quiet. It does not look like a crisis. It looks like Sunday night dread, or the feeling that you gave everything in the classroom and have nothing left for the drive home.

            These {chapter_count} chapters are built for people who give all day. Short practices. Clear patterns. No homework.

conclusion:
  default:
    templates:
      - id: pattern_persists
        title: "Conclusion"
        lean: >-
          The pattern has not disappeared. But you can see it now. That changes everything.
        short: >-
          The pattern has not disappeared. Patterns rarely do. But you are no longer inside it without knowing. You can name it. You can feel it arrive. That is the work.
        full: |
          You started this book carrying something. Not a problem to solve — a pattern to see. You have seen it now. Not once, but from several angles.

          The pattern has not disappeared. Patterns rarely do. But you are no longer inside it without knowing. You can name it. You can feel it arrive. And you have practiced responding differently — not perfectly, but differently.

          That is the work. Not the end of something. The beginning of a different relationship with what you carry.

      - id: door_open
        title: "Conclusion"
        lean: >-
          Take what landed. Leave what did not. The door stays open.
        short: >-
          Take what landed. Leave what did not. The door stays open. If you come back to one chapter, make it the one where you felt something shift.
        full: |
          Take what landed. Leave what did not. The door stays open.

          Nothing in this book needs to be believed. Nothing needs to be perfected. The practices work when you do them — not because they are magic, but because your nervous system responds to attention the way soil responds to water. Slowly. Reliably. Without needing your permission.

          If you come back to one chapter, make it the one where you felt something shift. That is your door.

      - id: body_knows
        title: "Conclusion"
        lean: >-
          Your body already registered the shift. You do not need to name it yet.
        short: >-
          Your body already registered the shift. Somewhere in these {chapter_count} chapters, something loosened. Not everything. But something. The body does not lie about relief.
        full: |
          Your body already registered the shift. You do not need to name it yet.

          Somewhere in these {chapter_count} chapters, something loosened. Not everything. But something. Your nervous system noticed — even if your mind is still cataloguing, evaluating, deciding whether it worked.

          It worked. Not because of anything I wrote. Because of what you practiced. The body does not lie about relief.

      - id: still_here
        title: "Conclusion"
        lean: >-
          You are still here. That means something. Trust the part of you that kept listening.
        short: >-
          You are still here. That means something. Something kept you listening, kept you practicing. That something is not willpower. It is the part of you that already knew {topic_display} was a pattern, not a permanent condition.
        full: |
          You are still here. That means something.

          You could have stopped at any chapter. You could have decided this was not for you. But something kept you listening, kept you practicing, kept you noticing. That something is not willpower. It is the part of you that already knew {topic_display} was a pattern, not a permanent condition.

          Trust that part. It is older and wiser than the pattern.

      - id: practice_continues
        title: "Conclusion"
        lean: >-
          The practices here are seeds. Return to the one that felt most natural. That is enough.
        short: >-
          The practices in this book are seeds. The one that felt most natural — return to it. Not as homework. As maintenance. {topic_display} will return. But now you have a practice that meets it without fighting it.
        full: |
          The practices in this book are not one-time events. They are seeds.

          The one that felt most natural — return to it. Not as homework. As maintenance. The way you stretch before running, or breathe before speaking. Small. Consistent. Unremarkable from the outside.

          {topic_display} will return. It always does. But now you have something you did not have before: a practice that meets it without fighting it. That is enough. That is actually everything.

      - id: quiet_close
        title: "Conclusion"
        lean: >-
          Something quieted. Not everything. But something. Stay with that.
        short: >-
          Something quieted. Not everything. But something. That quiet is not fragile. It is the quiet of recognition — seeing a pattern clearly enough that it loses some of its grip. Stay with that.
        full: |
          Something quieted. Not everything. But something.

          That quiet is not fragile. It is not dependent on this book, or on getting everything right, or on never feeling {topic_display} again. It is the quiet of recognition — of seeing a pattern clearly enough that it loses some of its grip.

          Stay with that. Even when the noise returns. The quiet is still underneath it.

      - id: agency_return
        title: "Conclusion"
        content: |
          You now have something you did not have when you started: a frame.

          Not a solution. Not a cure. A frame — a way of seeing {topic_display} that includes its mechanism, its cost, and the moments where it loosens. That frame is yours now. It does not depend on remembering every chapter or practicing every exercise.

          It depends on one thing: noticing. When {mechanism_alias} shows up again — and it will — you will notice it faster. That speed is freedom.

      - id: invitation
        title: "Conclusion"
        content: |
          This book was a beginning. Where you go from here is yours.

          You might return to these practices daily. You might forget them for months and then remember one during a difficult moment. Both are fine. The nervous system does not keep score the way the mind does.

          What matters is that you showed up for {chapter_count} chapters of honest looking. That took something. And whatever comes next, you carry that with you.

  personas:
    gen_z_professionals:
      templates:
        - id: gen_z_close
          title: "Conclusion"
          content: |
            You did not need another productivity hack. You needed to see the pattern. Now you see it.

            {topic_display} is not going to disappear because you read a book. But {mechanism_alias} is no longer invisible. And the next time it runs — in a meeting, at 2am, in the scroll — you will catch it faster. That is not nothing. That is actually the whole game.

    corporate_managers:
      templates:
        - id: exec_close
          title: "Conclusion"
          content: |
            You manage systems for a living. Now you have a system for managing this.

            Not a framework. Not a strategy deck. A felt sense of where {topic_display} lives in your body and what it does when it runs unchecked. The practices in this book are small enough to fit between meetings and powerful enough to change what happens inside them.

            Use them. Not because you should. Because you noticed they work.

    healthcare_rns:
      templates:
        - id: rn_close
          title: "Conclusion"
          content: |
            You hold space for other people every shift. This book held space for you.

            The practices here are not a replacement for rest, support, or systemic change. But they are yours — portable, quiet, usable in a break room or a parking lot. {topic_display} in your profession is not a personal failure. It is a structural reality. And the fact that you showed up for {chapter_count} chapters of honest looking means you are already doing the harder work.
