persona: nyc_executives
topic: grief
short_form: "the loss that didn't get a meeting"
descriptor: "Something that ended and there was no time, no space, no one to tell."
naming_moment: |
  Something ended and you didn't stop. The deadline was coming so you kept moving. There was a board meeting so you showed up. There was no appointment available on the calendar to acknowledge the loss. By the time you had time to feel it, it had already been filed away. The grief didn't get scheduled because there was no space. This is the loss that didn't get a meeting—the ending that happened in the margins, the thing you didn't have time to process because there was no time in the schedule to do it.
forms:
  possessive: "the loss's"
  verb_form: "losing without acknowledgment"
