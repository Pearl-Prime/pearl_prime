persona: nyc_executives
topic: depression
short_form: "the corner office with the view"
descriptor: "Having what was supposed to feel like enough and noticing it doesn't."
naming_moment: |
  You got the title. You got the office. You can see the skyline. This was the target. This was the thing that would make you feel different. And you are sitting in it and you feel the same as you did before. The emptiness that you thought success would fill is still there. The achievement didn't provide the internal shift you were expecting. This is the corner office with the view—the arrival at the destination and the discovery that the destination doesn't contain what you thought it would.
forms:
  possessive: "the corner office's"
  verb_form: "occupying the corner office"
