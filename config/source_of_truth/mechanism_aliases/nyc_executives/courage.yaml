persona: nyc_executives
topic: courage
short_form: "the board presentation of yourself"
descriptor: "Saying what you actually think in a room where positioning is the native language."
naming_moment: |
  You are in the board room and you have a thought that differs from the consensus. You know it is right. You also know that saying it is a move. In a room where everyone is positioning, saying something genuine is a risk. Vulnerability can be read as weakness. Honesty can be positioned against you. You run the calculation of whether it is worth it. This is the board presentation of yourself—the thing you actually think versus the thing you present, the courage it takes to be genuine in a room designed for positioning.
forms:
  possessive: "the board presentation's"
  verb_form: "presenting yourself"
