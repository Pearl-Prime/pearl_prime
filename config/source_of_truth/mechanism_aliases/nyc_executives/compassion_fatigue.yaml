persona: nyc_executives
topic: compassion_fatigue
short_form: "the relationship ROI filter"
descriptor: "When connection gets processed through a utility lens without meaning to."
naming_moment: |
  You are meeting someone new and you are automatically running the calculation. What can they do for me. What is the value in the relationship. Before you even know them, you are assessing utility. The habit of optimization extends to relationships. Connection becomes strategic. The professional lens is so strong that it applies even to potential friendships. This is the relationship ROI filter—the lens that assesses connection through a business frame, the calculation that happens automatically, the loss of spontaneous connection to strategic assessment.
forms:
  possessive: "the relationship ROI filter's"
  verb_form: "filtering relationships for ROI"
