persona: nyc_executives
topic: boundaries
short_form: "the 6am email culture"
descriptor: "The ambient expectation of availability that replaced the concept of off."
naming_moment: |
  Your boss sends an email at 6am and it lands in your inbox while you are still asleep. When you wake up, the email has already been sent. By the time you turn on your phone, it is fair game for comment. The expectation of immediate response has replaced the expectation of boundaries. The 6am email is normal. The weekend response is expected. The availability is ambient. This is the 6am email culture—the expectation of always-on, the redefinition of what being available means, the culture that has replaced the off-switch with a volume dial.
forms:
  possessive: "the 6am email culture's"
  verb_form: "emailing at 6am"
