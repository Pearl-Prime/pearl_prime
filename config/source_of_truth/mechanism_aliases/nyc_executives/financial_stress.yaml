persona: nyc_executives
topic: financial_stress
short_form: "the lifestyle momentum"
descriptor: "The number required to maintain keeps growing; the margin between it and income narrows."
naming_moment: |
  You are paying for the apartment and the school and the membership and the weekend house and the kids' activities. The number required to maintain this life is larger than it was before. The salary that felt like plenty five years ago barely covers the baseline now. The lifestyle expanded and now the lifestyle costs money to maintain. The margin between what you earn and what you need is tighter than it looks. This is the lifestyle momentum—the acceleration of required resources, the narrowing margin, the realization that the life you built requires more than you calculated.
forms:
  possessive: "the lifestyle momentum's"
  verb_form: "maintaining lifestyle momentum"
