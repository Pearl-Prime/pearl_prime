persona: entrepreneurs
topic: financial_stress
short_form: "the burn rate clock"
descriptor: "Watching personal and company runway simultaneously."
naming_moment: |
  You are watching two numbers simultaneously—how many months of company runway are left and how many months of personal savings exist. The company clock and the personal clock. You can make payroll if you don't take a salary. You can take a salary if you raise another round. You are tracking both timelines, calculating the overlap, understanding that they will eventually collide. This is the burn rate clock—the awareness of time converting to money and money converting to time, the dual countdown that structures every decision about spending and hiring and feature priority.
forms:
  possessive: "the burn rate clock's"
  verb_form: "watching the burn rate"
