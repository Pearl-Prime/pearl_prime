persona: entrepreneurs
topic: imposter_syndrome
short_form: "the doubt investor"
descriptor: "The presence in your cap table who never wires money, just shows up with questions."
naming_moment: |
  You are in the board meeting and your investor is asking the smart questions and you realize you don't have good answers. Not because the answers don't exist, but because somewhere you still believe the real founders would have thought of this already. The doubt investor is always in the room, always holding a small percentage of your confidence, never actually funding anything but voting on every decision. This is the presence that never leaves, the shareholder in your own mind, the voice suggesting that someone more qualified should be doing this.
forms:
  possessive: "the doubt investor's"
  verb_form: "doubting as an investor"
