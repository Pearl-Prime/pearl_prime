persona: entrepreneurs
topic: burnout
short_form: "the always-on mode"
descriptor: "The company runs on you, and you forgot you can be turned off."
naming_moment: |
  You notice the first email arrives at 6am without you sending it, and you realize you've become the company's operating system. The team doesn't start things until you're awake. Decisions wait for your input. Problems get routed to you. You are not managing the company anymore—you are its infrastructure, and infrastructure doesn't take days off or vacations or acknowledge fatigue. This is the always-on mode—the configuration that was supposed to be temporary, the power state that has no off switch, the slow understanding that you have been running at capacity for so long that you've forgotten what neutral feels like.
forms:
  possessive: "the always-on mode's"
  verb_form: "running always-on"
