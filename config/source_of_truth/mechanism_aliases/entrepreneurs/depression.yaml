persona: entrepreneurs
topic: depression
short_form: "the traction chart going flat"
descriptor: "When the metrics of building stop producing any feeling."
naming_moment: |
  The chart is still going up and you feel nothing. The milestone hits and there's no pleasure in it. The win lands and it registers as data, not as victory. You are running the same operations, hitting the targets, moving the metrics, but the internal response has flattened. The work that used to produce dopamine now produces only continuation. This is the traction chart going flat—the technical success that doesn't translate to felt experience, the numbers that climb while something internal stops moving upward.
forms:
  possessive: "the traction chart's"
  verb_form: "watching traction flatten"
