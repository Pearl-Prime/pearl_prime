persona: entrepreneurs
topic: compassion_fatigue
short_form: "the team weight"
descriptor: "Carrying your people's stress alongside your own until the carrying becomes the whole job."
naming_moment: |
  Your engineer is worried about the new product direction and you are absorbing that worry. Your designer is burnt out and you are feeling the weight of her burnout. Your operations person is stressed about hiring timeline and you are carrying that stress too. You are the container for your people's emotional state, and slowly the weight of holding it all becomes heavier than the work itself. This is the team weight—the collective stress you carry, the empathy that makes you porous to other people's fear, the burden of being the person who is supposed to have answers even when you are barely managing the questions.
forms:
  possessive: "the team weight's"
  verb_form: "carrying the team weight"
