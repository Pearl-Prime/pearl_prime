persona: entrepreneurs
topic: boundaries
short_form: "the founder identity trap"
descriptor: "You are the product; the product is you; there's no dividing line."
naming_moment: |
  Someone gives you feedback on the product and you feel it as feedback on yourself. The company fails and you are the failure. The company succeeds and you take it as proof of your worth. There is no perimeter between the thing you built and the person you are. Every criticism of the work lands on the person. Every setback is a personal setback. This is the founder identity trap—the complete fusion of self and creation, the configuration where there is no boundary, and therefore no way to fail at something without failing at everything.
forms:
  possessive: "the founder identity trap's"
  verb_form: "trapping identity in the founder"
