persona: entrepreneurs
topic: anxiety
short_form: "the runway calculator"
descriptor: "Constantly computing how much time is left before the math stops working."
naming_moment: |
  You sit in the funding meeting and the numbers land on the spreadsheet in front of you. Someone is speaking about burn rate and you are already three months ahead, already computing the depletion, already running the scenario where the wire doesn't come through and the math breaks. The background process never stops. Every meeting, every hire, every dollar spent activates the calculation in real time. This is the runway calculator—the constant arithmetic of survival, the permanent awareness that time converts to money, and money is the only thing that keeps the building standing.
forms:
  possessive: "the runway calculator's"
  verb_form: "calculating the runway"
