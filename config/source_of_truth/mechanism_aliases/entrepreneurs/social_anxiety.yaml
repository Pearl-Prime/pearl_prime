persona: entrepreneurs
topic: social_anxiety
short_form: "the pitch state"
descriptor: "The performance mode that activates whenever someone might be evaluating you."
naming_moment: |
  You walk into a conference and your nervous system shifts into a different mode. You are suddenly more alert, more curated, more deliberate in what you say and how you stand. The pitch state activates. You are not in this situation casually—you are in a room where people might be investors, might be customers, might be someone who matters. So you are performing the version of yourself that is built for that. This is the pitch state—the neural shift that happens when you realize you might be being evaluated, the performance configuration that runs on top of your regular self.
forms:
  possessive: "the pitch state's"
  verb_form: "entering the pitch state"
