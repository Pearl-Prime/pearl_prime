persona: entrepreneurs
topic: overthinking
short_form: "the pivot loop"
descriptor: "Cycling through stay/pivot/quit without landing on a decision."
naming_moment: |
  The revenue is flattening and you are rotating through the same three futures on loop. Stay and push harder—maybe the product just needs refinement. Pivot to the adjacent market—maybe the problem is distribution, not fit. Quit and return the capital—maybe someone else should be building this. You walk through each option daily, sometimes hourly, each one carrying weight, none of them fully wrong, all of them somehow incomplete. This is the pivot loop—the decision that never closes, the branching paths you keep choosing and unchosen simultaneously, the mental friction of unmade futures.
forms:
  possessive: "the pivot loop's"
  verb_form: "looping through pivots"
