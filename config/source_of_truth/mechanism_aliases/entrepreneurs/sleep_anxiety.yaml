persona: entrepreneurs
topic: sleep_anxiety
short_form: "the 2am scenario engine"
descriptor: "The mind that runs product, people, and cash flow scenarios after midnight."
naming_moment: |
  You are lying awake at 2am and your mind is running scenarios. What if the lead customer churns. What if the engineer leaves. What if the market shifts and the thing you built becomes uncompetitive. What if the burn rate accelerates. The scenarios activate when you are trying to sleep, when you are most vulnerable, when your defenses against worry are lowest. This is the 2am scenario engine—the mind that becomes a simulation laboratory at night, running worst-case models, playing out futures that feel possible because the rational filters have been suspended.
forms:
  possessive: "the 2am scenario engine's"
  verb_form: "running scenarios at 2am"
