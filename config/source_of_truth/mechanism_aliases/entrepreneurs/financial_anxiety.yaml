persona: entrepreneurs
topic: financial_anxiety
short_form: "the personal guarantee"
descriptor: "The math that is no longer abstract because your name is on it."
naming_moment: |
  You sign the loan document and your name is at the bottom with legal weight. The math was always there but now it is anchored to you specifically. If the company cannot pay, you can. Your house, your savings, your future earnings—these are now collateral in the equation. The anxiety was theoretical when it was about the company failing. It becomes real when it is about you personally being responsible. This is the personal guarantee—the moment when the business risk becomes your risk, when your name on the line makes the line real.
forms:
  possessive: "the personal guarantee's"
  verb_form: "guaranteeing personally"
