persona: entrepreneurs
topic: self_worth
short_form: "the valuation you set on yourself"
descriptor: "An internal number that fluctuates with your last outcome."
naming_moment: |
  The round closes at a good valuation and you feel more valuable. The investor passes and you feel marked down. The product launch doesn't go as planned and your internal stock price drops. You are running a constant valuation model on yourself, updating it in real time based on external signals. This is the valuation you set on yourself—the internal share price that updates with every transaction, every outcome, every piece of external feedback. A number that should be stable but instead rides the volatility of the market you are trying to create.
forms:
  possessive: "the valuation's"
  verb_form: "valuating yourself"
