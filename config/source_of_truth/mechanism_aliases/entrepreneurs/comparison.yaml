persona: entrepreneurs
topic: comparison
short_form: "the TechCrunch feed"
descriptor: "Everyone else's announcement landing in your inbox while you're still building."
naming_moment: |
  Your peer just announced their Series B and you are still iterating your MVP. Your colleague's product hit the front page of Hacker News and you are debugging. The news feed is constant delivery of evidence that others are winning while you are still working. This is the TechCrunch feed—the external broadcast of everyone else's progress delivered directly to your attention while you're trying to focus. The comparison that comes unsolicited, the metric of where you stand relative to everyone you know.
forms:
  possessive: "the TechCrunch feed's"
  verb_form: "feeding on comparisons"
