persona: entrepreneurs
topic: grief
short_form: "the kill decision"
descriptor: "What it costs to close something you built, even when it's right."
naming_moment: |
  You are sitting across from your co-founder and the data is clear—this thing you both built from nothing is not going to work. The decision to shut it down is correct. The metrics support it. The future points elsewhere. And still, there is grief. The version of the thing it could have been. The time spent that was supposed to compound into something. The identity you held as the person building this particular thing. This is the kill decision—the right call that carries its own weight, the closing of something you created, the revenue you stop and the future you release.
forms:
  possessive: "the kill decision's"
  verb_form: "killing what you built"
