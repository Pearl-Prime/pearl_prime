persona: entrepreneurs
topic: courage
short_form: "the bet you haven't placed yet"
descriptor: "The move you know is right, waiting on certainty that won't arrive."
naming_moment: |
  You know the pivot is correct. The data supports it, your intuition supports it, even your investors have hinted it might be necessary. And still you wait. You are waiting for certainty to arrive, for the last piece of evidence that makes it safe. The certainty never comes. The only thing that arrives is more time passing and the window slowly closing. This is the bet you haven't placed yet—the decision you know is right but haven't made, the move that would require committing without complete information, the courage that waits for a guarantee that won't come.
forms:
  possessive: "the bet's"
  verb_form: "placing the bet"
