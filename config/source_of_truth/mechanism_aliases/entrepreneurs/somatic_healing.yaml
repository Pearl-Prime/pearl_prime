persona: entrepreneurs
topic: somatic_healing
short_form: "the tension you built the company in"
descriptor: "The physical record of sustained high stakes, held in the body."
naming_moment: |
  You notice your shoulders are up around your ears. Your stomach is tight. You are clenching your jaw while you sleep. Your chest feels constricted when you think about the next round of fundraising. The body has been keeping score. The sustained high stakes of building a company—the constant small threat, the perpetual uncertainty, the weight of other people depending on your decisions—all of it is stored in your physical self. This is the tension you built the company in—the literal record in your nervous system of months or years of sustained activation, the way the body remembers what the mind has normalized, and the slow work of teaching it that you survived.
forms:
  possessive: "the tension's"
  verb_form: "holding the tension"
