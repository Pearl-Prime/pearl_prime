persona: gen_z_professionals
topic: imposter_syndrome
short_form: "the LinkedIn gap"
descriptor: "Comparison of personal reality against polished professional public personas."
naming_moment: |
  You open it to look for one thing. Now you're reading someone else's accomplishments — their title, their company, the thing they launched at 24. You have a job. It's fine. But theirs reads like a story that goes somewhere. The comparison is doing math you didn't ask it to do.

  LinkedIn curates the narrative. What appears is trajectory, achievement, momentum. What disappears is doubt, failure, the months of nothing. You're comparing your entire unedited self to someone's highlight reel, and the math tells you that you're behind.
forms:
  possessive: "the LinkedIn gap's"
  verb_form: "comparing"
