persona: gen_z_professionals
topic: burnout
short_form: "the side hustle that became everything"
descriptor: "Blurred boundaries between work, identity, and self-worth leading to exhaustion."
naming_moment: |
  You started it because you cared. Or because you needed to. Somewhere in there it stopped being a choice and became a status — always building, always producing, always proving something. The original reason is somewhere in there. It's just harder to find than it used to be.

  The hustle became the identity. Every hour is an opportunity to produce. The line between caring and performing dissolved. What was once a choice is now a grind that looks like passion but feels like proof.
forms:
  possessive: "the side hustle that became everything's"
  verb_form: "hustling"
