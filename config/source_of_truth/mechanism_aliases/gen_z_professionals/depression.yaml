persona: gen_z_professionals
topic: depression
short_form: "the unread message"
descriptor: "Emotional distance and disconnection growing over time from relationships."
naming_moment: |
  You know it's there. You've known for a while. You'll respond — you mean to — but each time you open it the distance feels bigger than it did yesterday. It's not that you don't care. It's that caring is taking more than you have right now.

  The message accumulates weight. Not from its content — from the growing gap between when it arrived and now. The energy to bridge that gap keeps climbing. The message sits, and the depression is the distance between intention and action.
forms:
  possessive: "the unread message's"
  verb_form: "disconnecting"
