persona: gen_z_professionals
topic: compassion_fatigue
short_form: "the empathy ceiling"
descriptor: "Reduced capacity to emotionally hold others' experiences over time."
naming_moment: |
  You care about people. That hasn't changed. But lately you notice the response is slower — someone tells you something hard and there's a beat before you can feel it, a processing delay that wasn't there before. The caring is still there. The bandwidth to carry it is running low.

  The empathy hasn't disappeared. It's been rationed. There's a ceiling now. You can feel the moment it hits — when another person's struggle arrives and you're already full. The caring is still real. The capacity is just no longer infinite.
forms:
  possessive: "the empathy ceiling's"
  verb_form: "carrying"
