persona: gen_z_professionals
topic: anxiety
short_form: "the twenty apps open"
descriptor: "Constant awareness of multiple notification channels demanding attention simultaneously."
naming_moment: |
  Your phone has sixteen apps that can notify you. Most of them do. At any given moment something is pinging — a message, a like, a calendar alert, a news push. You're not reading all of them. You're just managing the awareness that they exist. The managing takes more bandwidth than you'd think.

  The anxiety isn't about what the notifications say. It's about their existence. The open loop of potential urgency creates a perpetual state of low-level alert. Your attention is scattered before you've even opened a single app.
forms:
