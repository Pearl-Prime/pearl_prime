persona: gen_z_professionals
topic: comparison
short_form: "the curated feed"
descriptor: "Constant measurement of personal progress against polished online narratives."
naming_moment: |
  Everyone on your feed is doing something impressive. You know it's curated. You know no one posts their slow Tuesdays. You know this. And yet the gap between their highlight reel and your full footage keeps appearing, and it keeps feeling like a fact.

  Knowledge and feeling are operating on different frequencies. You intellectually understand the curation. You emotionally feel the gap. The feed has trained you to see everyone else's wins and your own mundane reality. The comparison is automated.
forms:
  possessive: "the curated feed's"
  verb_form: "measuring"
