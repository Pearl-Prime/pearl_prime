persona: gen_z_professionals
topic: social_anxiety
short_form: "the camera-on pressure"
descriptor: "Performance anxiety when visible on video calls and professional meetings."
naming_moment: |
  The meeting starts and your face is on a grid of faces. You're performing presentness — nodding at the right times, managing your expression, making sure you look engaged without looking like you're trying to look engaged. There's the meeting, and then there's the meta-meeting happening in your face. Both are exhausting.

  The camera collapses the distance between thought and visibility. You can't just think — you have to manage what the thinking looks like. The social anxiety has a new frontier: looking anxious on video, which becomes its own anxiety.
