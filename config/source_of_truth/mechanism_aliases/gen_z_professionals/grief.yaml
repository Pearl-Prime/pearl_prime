persona: gen_z_professionals
topic: grief
short_form: "the thing you didn't expect to miss"
descriptor: "Loss appearing intermittently through specific triggers and memories."
naming_moment: |
  You're fine, mostly. Then a song, a message, a particular time of year, and it's suddenly present — the shape of something that isn't there anymore. It's not constant. It's specific and intermittent, which somehow makes it harder to prepare for.

  Grief operates on a pattern you can't predict. It arrives without announcement in the middle of unrelated moments. The intermittence is harder to navigate than steady sadness — you can't build a schedule around something that shows up randomly.
forms:
  possessive: "the thing you didn't expect to miss's"
  verb_form: "grieving"
