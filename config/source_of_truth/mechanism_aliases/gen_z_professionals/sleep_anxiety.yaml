persona: gen_z_professionals
topic: sleep_anxiety
short_form: "the midnight algorithm"
descriptor: "Mind processing work and future planning instead of resting during sleep."
naming_moment: |
  The room is dark. Your phone is charging across the room, which you did on purpose. And your brain, without the phone to scroll, has opened its own tabs — the email you need to send, the thing you said in the meeting, the plan for something three weeks away. It runs the queue without being asked.

  The algorithm doesn't need the phone. It's internalized. The anxious loop continues offline. Sleep becomes another venue where productivity and worry compete for attention. Rest is a commodity you can't quite afford.
forms:
  possessive: "the midnight algorithm's"
  verb_form: "processing"
