persona: gen_z_professionals
topic: courage
short_form: "the hesitation before the post"
descriptor: "The pause when sharing a perspective or taking a professional risk."
naming_moment: |
  You know what you think. You even know how to say it. But before you commit — before the post goes live, before the message sends, before you raise your hand — there's a pause. What's the response going to be. Who's watching. What does it mean if you're wrong. The hesitation is fast. It still shapes everything.

  The hesitation is where risk lives. Everything published is permanent. Everything visible is subject to interpretation. The pause is the moment where courage might enter. Sometimes it does. Sometimes the post stays drafted, and the courage stays internal.
forms:
  possessive: "the hesitation before the post's"
  verb_form: "hesitating"
