persona: gen_z_professionals
topic: financial_anxiety
short_form: "the rent math"
descriptor: "Constant calculation of whether income adequately covers living expenses."
naming_moment: |
  You do it in your head. At the grocery store, on the commute, when the number in your account updates. The math isn't alarming — you're managing — but it's always running. What if rent goes up. What if hours change. What if the margin shrinks. The math never delivers a verdict of safe.

  The rent is due on a schedule you can't change. The variables are everywhere. You're running a calculation that has too many unknowns, and the peace of mind would require a margin you don't have.
forms:
  possessive: "the rent math's"
  verb_form: "calculating"
