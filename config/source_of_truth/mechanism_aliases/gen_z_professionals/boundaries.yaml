persona: gen_z_professionals
topic: boundaries
short_form: "the always-available default"
descriptor: "Professional expectation of responsiveness eroding personal time boundaries."
naming_moment: |
  The message comes in at 9pm. You see it. You're not on the clock. But the read receipt is already there, or will be, and not responding feels like a statement. So you respond. Then you're in it. The boundary was never announced — it just gradually stopped existing.

  The always-available default is the path of least resistance. Setting a boundary requires an announcement, an explanation, a risk. Not responding requires all of that. So you respond, and the boundary shifts. The expectation moves with you.
forms:
  possessive: "the always-available default's"
  verb_form: "responding"
