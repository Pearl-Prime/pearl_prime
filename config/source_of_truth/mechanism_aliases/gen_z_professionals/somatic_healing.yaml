topic: somatic_healing
short_form: "what the body remembered"
descriptor: "Physical stress responses revealing emotional processing the mind hasn't addressed."
naming_moment: |
  You were handling it. You told people you were fine and you meant it. Then your shoulders found their way up to your ears and stayed there, or your stomach did something before a certain kind of conversation, or you realized you'd been holding your breath. The body had a different account of things.

  The body doesn't participate in the performance. It keeps its own score. Tension, breath, the tightness that appears before you consciously feel anything — the body is the truth-teller while the mind is still rehearsing the narrative.
forms:
  possessive: "what the body remembered's"
  verb_form: "remembering"
