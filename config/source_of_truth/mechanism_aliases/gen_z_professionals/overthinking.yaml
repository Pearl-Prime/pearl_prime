persona: gen_z_professionals
topic: overthinking
short_form: "the infinite scroll"
descriptor: "Endless cycling through possible outcomes and interpretations without resolution."
naming_moment: |
  You open a question and start scrolling through answers. What's the right move here. What did that comment mean. What's the best way to handle this. The answers lead to more questions. There's no end of scroll — just new content loading as you reach the bottom.

  The scroll is infinite by design. Each potential answer opens new angles. The overthinking follows the architecture of the tools you use — there's always more to consider, always another layer to dive into.
forms:
  possessive: "the infinite scroll's"
  verb_form: "scrolling"
