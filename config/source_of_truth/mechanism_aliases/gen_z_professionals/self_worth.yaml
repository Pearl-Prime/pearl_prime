persona: gen_z_professionals
topic: self_worth
short_form: "the follower logic"
descriptor: "Self-evaluation fluctuating with metrics of social and professional visibility."
naming_moment: |
  The number went up. It doesn't feel like enough. The number went down. It feels like evidence. Somewhere in there you know the number doesn't mean anything. But it's hooked into something that doesn't know that yet.

  The logic is irrational and binding at the same time. You can see it's arbitrary. You can't quite disconnect from it. The number is a proxy, and the proxy is somehow more real than the thing it's supposed to measure.
forms:
  possessive: "the follower logic's"
  verb_form: "counting"
