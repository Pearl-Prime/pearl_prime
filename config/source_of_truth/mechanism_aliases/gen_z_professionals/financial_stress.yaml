persona: gen_z_professionals
topic: financial_stress
short_form: "the number you keep rechecking"
descriptor: "Repetitive verification of financial status as a means of locating stability."
naming_moment: |
  You open the app. You know what it says. You open it again three hours later. Not because you think it changed — just to confirm the math. The number is what it is. The rechecking is something else: a need to locate yourself, to verify you're still standing.

  The rechecking is a ritual. It's not about new information — it's about confirming what remains true. The number doesn't change. Your relationship to it does. The rechecking is the attempt to build certainty where the system offers none.
forms:
  possessive: "the number you keep rechecking's"
  verb_form: "rechecking"
