persona: educators
topic: compassion_fatigue
short_form: "the caring that emptied the tank"
descriptor: "Giving your attention and emotional presence until there's less of it available."
naming_moment: |
  You gave your attention to the students. You gave your emotional presence. You cared about their learning and their experience. And somewhere the tank got empty. The capacity that you thought was large has limits. You are less available now. The caring came at a cost to your own availability. This is the caring that emptied the tank—the emotional presence given, the attention provided, the caring that consumed the resource.
forms:
  possessive: "the caring's"
  verb_form: "caring until the tank is empty"
