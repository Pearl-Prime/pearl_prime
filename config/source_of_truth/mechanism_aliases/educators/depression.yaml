persona: educators
topic: depression
short_form: "the work that used to feel like meaning"
descriptor: "Doing it the same way, getting different internal results."
naming_moment: |
  You are teaching the same lessons. You are doing the same work. The teaching used to feel like meaning and now it feels like work. The internal translation has changed. The same action that used to produce purpose now produces only continuation. You are going through the teaching but the internal connection to why it matters has quieted. This is the work that used to feel like meaning—the teaching that still happens the same way but lands differently inside, the purpose that has become rote.
forms:
  possessive: "the work's"
  verb_form: "doing work that used to feel like meaning"
