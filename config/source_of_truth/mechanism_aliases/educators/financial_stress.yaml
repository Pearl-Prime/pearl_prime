persona: educators
topic: financial_stress
short_form: "the supply line"
descriptor: "The personal spending on classroom materials that doesn't show up in the official budget."
naming_moment: |
  The classroom needs supplies and the budget doesn't cover it. You provide the supplies. It comes out of your personal resources. Repeatedly. Over time, the amount is significant. The spending is normalized. You are funding the classroom out of pocket. The financial impact shows up in your budget but not in the official record. This is the supply line—the hidden cost of teaching, the resources you provide, the personal spending that keeps the classroom functioning.
forms:
  possessive: "the supply line's"
  verb_form: "supplying the supply line"
