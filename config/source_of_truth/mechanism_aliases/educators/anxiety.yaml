persona: educators
topic: anxiety
short_form: "the parent email you haven't opened"
descriptor: "The awareness of a communication that might contain something requiring response."
naming_moment: |
  There is an email from a parent and you have not opened it. The email is in your inbox and you are aware of it without reading it. The awareness is enough to activate anxiety. It might contain criticism. It might contain a request. It might contain something that requires your response. The unopened email holds potential threat. This is the parent email you haven't opened—the communication that exists in your awareness as potential problem, the unread message that produces anxiety by virtue of existing.
forms:
  possessive: "the parent email's"
  verb_form: "worrying about the parent email"
