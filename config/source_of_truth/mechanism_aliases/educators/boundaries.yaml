persona: educators
topic: boundaries
short_form: "the classroom that followed you home"
descriptor: "The work that doesn't respect the physical transition out of the building."
naming_moment: |
  You left the classroom and the classroom came with you. You are home and you are still thinking about it. The problems you are carrying. The students you are worried about. The lessons you need to prep. The building has a boundary but the work does not. You are no longer physically in the classroom but the work has not released you. This is the classroom that followed you home—the boundary that is crossed, the work that does not respect the transition, the psychological carrying of the job beyond the walls where you do it.
forms:
  possessive: "the classroom's"
  verb_form: "following you home"
