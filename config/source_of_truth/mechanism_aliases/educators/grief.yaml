persona: educators
topic: grief
short_form: "the year you can't get back"
descriptor: "The students you couldn't reach, the versions of things that didn't happen."
naming_moment: |
  The year is over and you are accounting for it. The students you couldn't reach. The lessons that didn't land. The connections that didn't form. The versions of the year that you imagined and that didn't materialize. The year has passed and it cannot be retrieved. The students move on. The year becomes history. This is the year you can't get back—the time spent, the outcomes that didn't happen, the students you couldn't help, the loss that is finalized by time.
forms:
  possessive: "the year's"
  verb_form: "losing the year"
