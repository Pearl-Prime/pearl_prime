persona: educators
topic: courage
short_form: "the lesson you're afraid to teach"
descriptor: "The subject matter, question, or conversation that needs to happen but carries risk."
naming_moment: |
  There is a topic that needs to be taught. There is a question that needs to be answered. There is a conversation that should happen. And there is risk. The risk of parent response. The risk of administrative concern. The risk of being misunderstood. You know the teaching is important. You also know that teaching it carries cost. This is the lesson you're afraid to teach—the curriculum that needs to happen, the knowledge that is important, the teaching that is risky.
forms:
  possessive: "the lesson's"
  verb_form: "teaching the lesson you're afraid to teach"
