persona: educators
topic: self_worth
short_form: "the student you couldn't reach"
descriptor: "The one that becomes the measure, even when the others did."
naming_moment: |
  Most of the students are learning. You reached most of them. But there is one you didn't reach. The one whose progress didn't happen. The one who remained distant. That student becomes the measure. That student becomes the way you know you are not good enough. The success with the others fades. The failure with the one becomes the definition. This is the student you couldn't reach—the measure you apply to yourself, the outcome that becomes the metric of your inadequacy, even when the others did.
forms:
  possessive: "the student's"
  verb_form: "failing to reach the student"
