topic: somatic_healing
short_form: "the posture the desk built"
descriptor: "The physical configuration accumulated from years of a certain kind of work."
naming_moment: |
  The person sits at the desk. For hours. For years. The body adapts. The shoulders come forward. The back rounds. The neck strains. The posture is built by the desk. The desk has shaped the body. When the person stands, the posture remains. This becomes the posture the desk built.
forms:
  possessive: "the posture the desk built's"
  verb_form: "desk-posture-holding"
