persona: tech_finance_burnout
topic: compassion_fatigue
short_form: "the ticket that stopped being a person"
descriptor: "When the human context behind the request stops landing."
naming_moment: |
  The person processes tickets. Each ticket is someone's request. At first, the human context matters. Over time, when the volume is high, the ticket becomes just data. The person behind the request stops mattering. The request is processed without the human context. This becomes the ticket that stopped being a person.
forms:
  possessive: "the ticket that stopped being a person's"
  verb_form: "ticket-depersonalizing"
