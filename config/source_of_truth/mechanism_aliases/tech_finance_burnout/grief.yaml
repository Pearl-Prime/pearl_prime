persona: tech_finance_burnout
topic: grief
short_form: "the deprecated function"
descriptor: "Something that used to work, that mattered, that isn't called anymore."
naming_moment: |
  The person wrote something. It worked. It was useful. Time passed. The system evolved. The function is deprecated. It still exists in the codebase. But it's not called anymore. Something that was essential became unnecessary. This becomes the deprecated function.
forms:
  possessive: "the deprecated function's"
  verb_form: "deprecation-grieving"
