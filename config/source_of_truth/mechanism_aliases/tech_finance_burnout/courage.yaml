persona: tech_finance_burnout
topic: courage
short_form: "the PR you haven't submitted"
descriptor: "The idea or objection sitting in draft, not pushed because the review feels risky."
naming_moment: |
  The person writes the PR. The code is ready. The idea is sound. But she doesn't push it. The review feels risky. What will people think? Will it be accepted? The PR sits in draft. The push doesn't happen. This becomes the PR you haven't submitted.
forms:
  possessive: "the PR you haven't submitted's"
  verb_form: "PR-draft-holding"
