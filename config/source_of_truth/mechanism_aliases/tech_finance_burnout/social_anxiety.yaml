persona: tech_finance_burnout
topic: social_anxiety
short_form: "the standup performance"
descriptor: "Saying what you worked on while monitoring how it reads to everyone in the call."
naming_moment: |
  The person attends standup. She reports her work. Simultaneously, she's monitoring how it reads. Is it enough? Is it impressive? Does it sound like she knows what she's doing? The performance and the observation run together. This becomes the standup performance.
