persona: tech_finance_burnout
topic: overthinking
short_form: "the infinite loop"
descriptor: "A process running on a question that has no exit condition."
naming_moment: |
  The person thinks about a decision. The thinking runs through one iteration. Then another. But there's no condition that will end it. No answer that will satisfy it. The loop continues. The exit condition doesn't exist. The processor keeps running. This becomes the infinite loop.
forms:
  possessive: "the infinite loop's"
  verb_form: "infinite-looping"
