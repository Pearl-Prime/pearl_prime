persona: tech_finance_burnout
topic: imposter_syndrome
short_form: "the merge conflict"
descriptor: "Your presence in the codebase doesn't seem to fit; someone will notice."
naming_moment: |
  The person makes a commit. The code works. But there's a sense that the code doesn't fit. Like a merge conflict. Someone will look at the codebase and realize: this doesn't belong. The conflict is invisible but present. This becomes the merge conflict.
forms:
  possessive: "the merge conflict's"
  verb_form: "merge-conflicting"
