persona: gen_x_sandwich
topic: comparison
short_form: "the parallel timeline"
descriptor: "The version of your life that took the other fork."
naming_moment: |
  The person remembers the choice point. Stay in the city or move home. Keep working or cut back. Marry this person or take more time. She made her choice. But there's a version of her life that exists in parallel—in the city, with the career, without the parent-care, with more sleep. She thinks about it. Not with regret exactly, but with a kind of measurement. This becomes the parallel timeline.
forms:
