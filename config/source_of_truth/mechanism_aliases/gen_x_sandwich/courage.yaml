persona: gen_x_sandwich
topic: courage
short_form: "the delayed move"
descriptor: "Knowing what needs to change, postponing it because the timing is never right."
naming_moment: |
  The person knows what needs to change. Leave the job, reset the boundary, have the conversation with her parent. But the timing is never right. Her kid has a school event. Her parent is between doctors. The work deadline is too close. The delay becomes a pattern. The knowing persists. The doing waits for the right moment that never quite arrives. This becomes the delayed move.
forms:
  possessive: "the delayed move's"
  verb_form: "delaying-the-move"
