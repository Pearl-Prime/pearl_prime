persona: gen_x_sandwich
topic: grief
short_form: "the quiet loss"
descriptor: "Losing parents while raising kids, grief with no room to land."
naming_moment: |
  The person's parent dies or becomes unreachable. The grief is real. But there's no time for it. Her kid needs to be picked up. The house needs to function. The parent-care transitions to end-of-life care. There's no moment to sit with the loss. The grief becomes something she carries while moving. It has no landing spot. This becomes the quiet loss.
forms:
  possessive: "the quiet loss's"
  verb_form: "quiet-loss-grieving"
