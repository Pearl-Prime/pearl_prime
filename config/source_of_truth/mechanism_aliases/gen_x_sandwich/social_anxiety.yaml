persona: gen_x_sandwich
topic: social_anxiety
short_form: "the performance of fine"
descriptor: "Presenting capable to everyone while something else is happening underneath."
naming_moment: |
  The person walks into a room. She is fine. She presents as fine. Inside, there's the weight, the tension, the unresolved thing about her parent or her kid or her job. But that's not what people see. They see capable. She's practiced the performance. The gap between the inside and outside is the work of the performance. This becomes the performance of fine.
