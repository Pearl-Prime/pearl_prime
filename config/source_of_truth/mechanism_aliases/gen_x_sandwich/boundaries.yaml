persona: gen_x_sandwich
topic: boundaries
short_form: "the responsible one trap"
descriptor: "Everyone assumed you'd handle it, you did, now it's just yours."
naming_moment: |
  The person was reliable. When something needed doing, she did it. A parent's appointment, a child's school issue, the holiday planning. Over time, these became her domain. Not through a conversation—through a series of moments where she was the one who stepped in. Now the assumption is set. She's the one who handles it. If she stops, the structure collapses. This becomes the responsible one trap.
forms:
