persona: gen_x_sandwich
topic: self_worth
short_form: "the provision equation"
descriptor: "Measuring worth by how much you're keeping together for everyone else."
naming_moment: |
  The person does the math internally. What's she holding? Her paycheck supports part of the house. She manages her parents' logistics. She knows her kid's schedule better than they do. She's the hinge. On a day when nothing breaks, she feels valuable. On a day when something does, she feels like she's failed. Worth becomes synonymous with provision. This becomes the provision equation.
forms:
  possessive: "the provision equation's"
  verb_form: "provision-calculating"
