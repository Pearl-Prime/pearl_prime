persona: gen_x_sandwich
topic: depression
short_form: "the invisible weight"
descriptor: "Carrying it without being able to name it to anyone who'd understand."
naming_moment: |
  The person carries something that has no name in the conversations around her. To her spouse: not serious enough. To her boss: not visible. To her parents: a burden they're already carrying. There's a weight, but nowhere to put it down. No one has reference for it. No one asks to hold it. It sits on her shoulders every morning. This becomes the invisible weight.
forms:
  possessive: "the invisible weight's"
  verb_form: "carrying-invisible-weight"
