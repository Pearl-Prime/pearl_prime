persona: gen_x_sandwich
topic: imposter_syndrome
short_form: "the wait-and-see hold"
descriptor: "Competence built over decades, but still waiting for someone to call it luck."
naming_moment: |
  The person has built something real. Twenty years of the right calls, the right moves, the right timing. But the internal narrative is still: it's been luck so far. Someone will eventually notice. The competence is real. The doubt is also real. She waits for the moment when someone looks at the record and says: you were just lucky. This becomes the wait-and-see hold.
forms:
  possessive: "the wait-and-see hold's"
  verb_form: "wait-and-see-holding"
