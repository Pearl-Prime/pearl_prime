persona: gen_x_sandwich
topic: somatic_healing
short_form: "the body's receipt"
descriptor: "The physical record of what was held, carried, and never put down."
naming_moment: |
  The person's body carries a record. The shoulders are held. The stomach is tight. The back has a pattern of tension that's become structural. These aren't dramatic symptoms. They're the body's receipt for what's been carried. The holding is normal. The body has adapted to holding. Healing begins when the body gets to put down what it's been gripping. This becomes the body's receipt.
forms:
  possessive: "the body's receipt's"
  verb_form: "receipt-carrying"
