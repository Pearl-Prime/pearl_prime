persona: gen_x_sandwich
topic: financial_stress
short_form: "the float"
descriptor: "Making it work but aware at every moment of the margin between working and not."
naming_moment: |
  The person has made it work. The bills get paid. The essentials are there. But she's aware of the margin. If the car breaks, there's a decision. If she needs to take time off, the math shifts. She's not in crisis. She's in the state of awareness that crisis is one unexpected thing away. This becomes the float.
forms:
  possessive: "the float's"
  verb_form: "floating"
