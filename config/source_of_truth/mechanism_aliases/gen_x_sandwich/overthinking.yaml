persona: gen_x_sandwich
topic: overthinking
short_form: "the contingency planner"
descriptor: "Mentally preparing for every scenario so nothing catches you off guard."
naming_moment: |
  The person runs through the day before it happens. If this goes wrong, then that. If she's late, then they'll think. If they find out, then the conversation will be. The mind is a pre-flight checklist that never gets cleared because there's always another contingency. The planning isn't careful—it's exhausting. It's the effort to make sure surprise never lands. This becomes the contingency planner.
forms:
  possessive: "the contingency planner's"
  verb_form: "contingency-planning"
