persona: gen_x_sandwich
topic: sleep_anxiety
short_form: "the 4am inventory"
descriptor: "The mind that decides 4am is the right time to audit everything unresolved."
naming_moment: |
  The person wakes. The clock says 4am. Her mind is already running. The parent's recent doctor report. The kid's college timeline. The work thing that landed on her desk. The house thing that needs fixing. The mind inventories all of it. There's no solution to offer at 4am, but the mind insists on running the audit. This becomes the 4am inventory.
forms:
  possessive: "the 4am inventory's"
  verb_form: "4am-inventorying"
