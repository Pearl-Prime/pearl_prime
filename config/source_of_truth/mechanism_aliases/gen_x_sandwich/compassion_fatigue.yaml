persona: gen_x_sandwich
topic: compassion_fatigue
short_form: "the care deficit"
descriptor: "Giving out more than is coming back, for long enough that the tank is low."
naming_moment: |
  The person gives. She gives to her parent. She gives to her kids. She gives to her job. She gives to her spouse in the way that holding everything together is a form of giving. The flow is one direction. What comes back is more need. Over time, the tank depletes. She's still giving, but from a place of depletion. This becomes the care deficit.
forms:
  possessive: "the care deficit's"
  verb_form: "care-deficit-living"
