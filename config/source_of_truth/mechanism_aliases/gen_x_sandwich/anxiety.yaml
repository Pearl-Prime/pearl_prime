persona: gen_x_sandwich
topic: anxiety
short_form: "the middle seat feeling"
descriptor: "The squeezed sensation of aging parents plus kids plus job, nowhere to decompress."
naming_moment: |
  The person sits at the table. On one side, a parent needs something. On the other side, a child needs something different. The job continues in the background, unpaused. There is no space between these demands. The feeling isn't that one problem is urgent—it's that the arrangement itself is permanent, squeezed, with no exit and no reprieve. This becomes the middle seat feeling.
forms:
  possessive: "the middle seat feeling's"
  verb_form: "sitting-in-the-middle-seat"
