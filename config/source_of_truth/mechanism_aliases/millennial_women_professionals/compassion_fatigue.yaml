persona: millennial_women_professionals
topic: compassion_fatigue
short_form: "the designated strong one problem"
descriptor: "The role that got assigned because you could handle it, until it became all you do."
naming_moment: |
  Someone discovered you could hold their problems. You could listen and help. You had capacity. You had wisdom. You could be relied on. And slowly, you became the container for everyone else's emotional load. People bring things to you. You receive them. You hold them. Your capacity was mistaken for unlimited capacity. The strong one role was assigned and you accepted it. Now it is all you do in these relationships. You are the person who absorbs. This is the designated strong one problem—the role that grew out of capability, the thing you became because you could, the burden that lives inside that strength.
forms:
  possessive: "the designated strong one's"
  verb_form: "being the designated strong one"
