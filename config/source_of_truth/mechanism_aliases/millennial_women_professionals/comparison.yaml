persona: millennial_women_professionals
topic: comparison
short_form: "the LinkedIn scroll"
descriptor: "Tracking where your peers landed and running the gap calculation."
naming_moment: |
  You are scrolling LinkedIn and your peer from college just got promoted to VP. Your friend from your previous job is launching her own company. Your work buddy is speaking at a conference. The feed is a constant stream of where everyone else is, and you are measuring your position against theirs. The gap calculation is automatic. How far behind are you. What did she do that you didn't. This is the LinkedIn scroll—the comparison engine that delivers evidence of other people's progress, the metrics you run in your head while looking at their announcements.
forms:
  possessive: "the LinkedIn scroll's"
  verb_form: "scrolling LinkedIn"
