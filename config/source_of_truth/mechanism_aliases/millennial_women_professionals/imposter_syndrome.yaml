persona: millennial_women_professionals
topic: imposter_syndrome
short_form: "the qualification gap"
descriptor: "Waiting for 100% before applying while others move at 60%."
naming_moment: |
  The job posting asks for seven qualifications. You have five. You don't apply because you are not qualified. Your colleague has four and applies anyway and lands the job. You watch him learn the rest on the job and you realize you have been calculating the bar differently. You have been waiting for completion before moving. He moved before completion and completed by moving. This is the qualification gap—the space between when you are ready by your measure and when you are ready by the world's measure, the pause you take that others don't, the application you don't submit.
forms:
  possessive: "the qualification gap's"
  verb_form: "calculating the qualification gap"
