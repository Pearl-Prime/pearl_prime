persona: millennial_women_professionals
topic: depression
short_form: "the competence mask"
descriptor: "Performing capable so consistently that no one knows, including sometimes yourself."
naming_moment: |
  You are in the meeting and you are present and you are solving problems. You are laughing at the right moments. You are answering the questions with confidence. And underneath the performance, nothing feels real. The competence is real but the feeling of being okay is not. You are doing the thing so well that even you sometimes forget that you are doing a thing. This is the competence mask—the version of yourself that functions perfectly, the performance that is so consistent that it becomes invisible, the thing you do so well that others cannot see it is a thing you are doing.
forms:
  possessive: "the competence mask's"
  verb_form: "masking competence"
