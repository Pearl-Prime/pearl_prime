persona: millennial_women_professionals
topic: financial_stress
short_form: "the breadwinner complexity"
descriptor: "Providing while navigating what that means in a context that didn't fully prepare for it."
naming_moment: |
  You are the primary earner in your household and you are managing the complexity of that. The cultural narrative didn't fully prepare you for this role. You are earning more than your partner or you are single supporting dependents or you are the safety net. The responsibility is real. The weight is yours. The narrative in your head says something about what women are supposed to be doing with their money and their time, and you are navigating a different reality. This is the breadwinner complexity—the role you are actually in, the financial responsibility that is yours, the gap between what you were trained for and what you are carrying.
forms:
  possessive: "the breadwinner complexity's"
  verb_form: "navigating breadwinner complexity"
