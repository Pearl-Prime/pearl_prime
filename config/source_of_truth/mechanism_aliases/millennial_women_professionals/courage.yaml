persona: millennial_women_professionals
topic: courage
short_form: "the table moment"
descriptor: "The thing you know needs saying, and what it costs to say it in that particular room."
naming_moment: |
  You are in the meeting and you know what needs to be said. No one else is saying it. The thought is sitting in your chest. Your mouth opens and closes. You are calculating the cost of saying it. What if they think you are difficult. What if they think you are not a team player. What if it damages the relationship you have been careful to build. The thing that needs saying and the cost of saying it are in direct proportion. This is the table moment—the knowing what needs to happen, the calculation of what it costs you specifically to be the one to say it.
forms:
  possessive: "the table moment's"
  verb_form: "speaking at the table"
