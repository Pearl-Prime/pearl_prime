persona: millennial_women_professionals
topic: grief
short_form: "the grief you scheduled for later"
descriptor: "Postponed for everyone else's timelines, still waiting for its turn."
naming_moment: |
  Something ended and you needed to grieve it. But the timing wasn't good. There were work things. There were people depending on you. There was no space in the schedule that wouldn't disrupt something else. So you scheduled the grief for later. Later never came, or when it came, there was more timing. The grief is still waiting for its appointment, still holding space in your body, postponed but not processed. This is the grief you scheduled for later—the loss that is waiting, the sadness you put in a drawer, the thing that happened that you haven't had time to feel.
forms:
  possessive: "the grief's"
  verb_form: "grieving later"
