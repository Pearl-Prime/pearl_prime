persona: millennial_women_professionals
topic: burnout
short_form: "the emotional labor ledger"
descriptor: "The invisible work that goes uncounted and uncompensated."
naming_moment: |
  You have smoothed tensions between team members. You have listened to your colleague's work anxiety at lunch. You have adjusted your communication style to make others feel comfortable. You have done the emotional management that made the team function. And none of it shows up on your performance review. The labor is invisible because it is supposed to look like it happens naturally, effortlessly. This is the emotional labor ledger—the work that you are doing off the books, the relational maintenance that is expected but not valued, the carrying that goes uncompensated because it is not supposed to be work.
forms:
  possessive: "the emotional labor ledger's"
  verb_form: "logging emotional labor"
