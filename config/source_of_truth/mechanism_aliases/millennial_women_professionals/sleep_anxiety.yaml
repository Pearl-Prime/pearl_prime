persona: millennial_women_professionals
topic: sleep_anxiety
short_form: "the list that runs at night"
descriptor: "The mental to-do list that activates when the house goes quiet."
naming_moment: |
  The house is quiet and your mind activates the list. The emails you didn't send. The follow-up conversations. The project deadlines. The relational maintenance. The things you said that you are re-examining. The list is always there but at night, when there are fewer external demands, it comes online. The background processes move to the foreground. This is the list that runs at night—the mental to-do that activates when the noise stops, the processing that happens after everyone else is asleep, the organizing that your mind does when you are trying to rest.
forms:
  possessive: "the list's"
  verb_form: "running the list at night"
