persona: millennial_women_professionals
topic: anxiety
short_form: "the performance appraisal that never ends"
descriptor: "The internal evaluation running even outside review season."
naming_moment: |
  You are in the grocery store and you are aware of how you are moving through the space. You are at dinner with friends and you are monitoring whether you are laughing the right amount. You are on the call and you are simultaneously doing the work and evaluating whether the work you are doing sounds confident enough. The appraisal is always running. There is a permanent observer in your consciousness evaluating your performance, your tone, your choices, your presence. This is the performance appraisal that never ends—the internal assessor that doesn't clock out, the evaluation that extends beyond the office into every room you enter.
forms:
  possessive: "the performance appraisal's"
  verb_form: "appraising your performance"
