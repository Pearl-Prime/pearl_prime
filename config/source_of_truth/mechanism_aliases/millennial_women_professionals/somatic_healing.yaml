persona: millennial_women_professionals
topic: somatic_healing
short_form: "the held posture"
descriptor: "The configuration of being professional, composed, and fine, and what it accumulates."
naming_moment: |
  You are holding the posture. Standing straight. Speaking at the right volume. Managing your face. Not taking up too much space. Not saying too much. Staying composed. This is the baseline configuration of being professional. It is also the configuration of not-quite-safe. The body knows the difference even if the mind has normalized it. After months or years of this posture, it is your baseline. Your shoulders live up by your ears. Your breathing is shallow. Your voice is small. This is the held posture—the configuration that you have been wearing so long that it feels normal, the way you have learned to fit into the space that was made for you.
forms:
  possessive: "the held posture's"
  verb_form: "holding the posture"
