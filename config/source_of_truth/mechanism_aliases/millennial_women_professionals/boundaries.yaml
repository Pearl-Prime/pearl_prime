persona: millennial_women_professionals
topic: boundaries
short_form: "the good girl reflex"
descriptor: "The yes that comes before the decision, trained in long before the workplace."
naming_moment: |
  Someone asks you to take on something and you say yes before you have thought about whether it fits. The yes is automatic. It was trained in before you had language for boundaries. Say yes to please. Say yes to be helpful. Say yes to be the kind of person people want around. By the time you realize you have overcommitted, the yes is already released into the world and retracting it feels like breaking a promise. This is the good girl reflex—the ancient programming that activates faster than your actual decision-making, the yes that comes from a version of you that was taught that worth lives in accommodation.
forms:
  possessive: "the good girl reflex's"
  verb_form: "reflexing good girl"
