persona: millennial_women_professionals
topic: financial_anxiety
short_form: "the gender pay math"
descriptor: "Knowing the number, knowing the gap, watching it compound."
naming_moment: |
  You looked up what the role pays for a man and you know the number. You know what it pays for you. You can feel the gap. You know that over a career, this difference compounds into a gap that is not just current salary but future earning potential, retirement savings, everything downstream. You are paid less for the same work and you are aware of it in concrete dollar terms. This is the gender pay math—the calculation you cannot unknow, the gap that grows larger every year, the compound effect that turns a single unfair salary into a lifetime of fewer resources.
forms:
  possessive: "the gender pay math's"
  verb_form: "calculating gender pay"
