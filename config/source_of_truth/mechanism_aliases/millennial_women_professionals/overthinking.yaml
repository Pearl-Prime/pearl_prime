persona: millennial_women_professionals
topic: overthinking
short_form: "the second-guess machine"
descriptor: "Replaying decisions to find the version where you got it more right."
naming_moment: |
  You said something in the meeting and now you are replaying it. You are running the footage back, examining the words you chose, the tone you used, whether it landed the way you meant. You are running counterfactuals—the version where you said nothing, the version where you said it differently, the version where you were braver. This is the second-guess machine—the replay function that keeps running, the search for the version of yourself you could have been in that moment, the fantasy that there was a better choice you didn't make.
forms:
  possessive: "the second-guess machine's"
  verb_form: "second-guessing yourself"
