persona: millennial_women_professionals
topic: self_worth
short_form: "the likability tax"
descriptor: "The cost of being direct, assessed differently than it would be for someone else."
naming_moment: |
  You state your opinion clearly and someone describes you as aggressive. A man states the same opinion and he is described as having conviction. You ask for what you want and there is friction. He asks and it is called negotiation. You are not doing anything wrong but the world is applying a different metric to the measurement. This is the likability tax—the hidden cost of directness when you are a woman, the assessment that assumes intent differently, the price that gets charged for the same behavior depending on who is performing it.
forms:
  possessive: "the likability tax's"
  verb_form: "paying the likability tax"
