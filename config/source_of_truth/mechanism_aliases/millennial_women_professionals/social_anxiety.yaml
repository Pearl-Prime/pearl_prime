persona: millennial_women_professionals
topic: social_anxiety
short_form: "the room read"
descriptor: "Monitoring how you're being received and adjusting in real time."
naming_moment: |
  You are in the meeting and you are simultaneously speaking and monitoring. You are tracking the energy in the room. Are they engaged or bored. Are you taking up the right amount of space or too much. Should you elaborate or wrap up. Your attention is divided between what you are saying and how it is landing. You are reading the room and adjusting your performance in real time based on the feedback you are sensing. This is the room read—the constant attunement to how you are being received, the adjustment you make in real time, the part of your attention that is always pointed outward, measuring.
forms:
  possessive: "the room read's"
  verb_form: "reading the room"
