persona: gen_alpha_students
topic: compassion_fatigue
short_form: "the borrowed weight"
descriptor: "Exhaustion from carrying others' emotional burdens over time."
naming_moment: |
  You're good at being there for people. You've always been. But lately you notice: you're carrying things after the conversation ends. Someone tells you something hard and it stays with you. Your concern for everyone is real — it's just getting heavier than it used to.

  The compassion hasn't diminished. The capacity to hold it has. Each person's weight stays with you, accumulating. The strength that once carried many is now struggling under the load.
forms:
  possessive: "the borrowed weight's"
  verb_form: "carrying"
