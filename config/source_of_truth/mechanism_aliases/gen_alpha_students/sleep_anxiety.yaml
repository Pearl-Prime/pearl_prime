persona: gen_alpha_students
topic: sleep_anxiety
short_form: "the 3am algorithm"
descriptor: "Mind processing worries and past moments during nighttime hours."
naming_moment: |
  It's 2:47am. There's nothing wrong. You don't have a test tomorrow, nothing bad happened today. But your brain has found things to process — the conversation from Tuesday, the thing you said in October, the decision you have to make in six months. It queues them up. You didn't ask it to. It runs anyway.

  The algorithm doesn't care that you're tired. It has content to run through and it will run it at 3am, at 4am, until you're watching the ceiling and trying not to let the spiral accelerate.
forms:
