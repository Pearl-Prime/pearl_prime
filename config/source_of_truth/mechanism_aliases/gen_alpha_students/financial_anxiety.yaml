persona: gen_alpha_students
topic: financial_anxiety
short_form: "the running tab"
descriptor: "Constant awareness of money affecting every small decision made."
naming_moment: |
  You're not in a crisis. But you're aware of the number. All the time. It sits in the back of every small decision — the coffee, the outing, the thing everyone else is doing. You do the math. You do it again. The math doesn't resolve.

  The tab is always open. Every choice is a calculation. You don't need to see the number to feel its weight — it's the constant background hum of what you can't quite afford to ignore.
forms:
  possessive: "the running tab's"
  verb_form: "calculating"
