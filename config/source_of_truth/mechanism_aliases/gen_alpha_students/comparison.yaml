persona: gen_alpha_students
topic: comparison
short_form: "the feed loop"
descriptor: "Continuous measurement of one's progress against curated social content."
naming_moment: |
  You open it to check one thing. Now you're seven profiles deep into someone's life from two years ago. You're not jealous exactly. You're just measuring — where they are, where you are, the math between. The math always comes back short.

  The loop runs automatically. One profile leads to the next, and each one is a data point in the calculation. By the time you stop, you've absorbed a dozen versions of what you're not.
forms:
  possessive: "the feed loop's"
  verb_form: "measuring"
