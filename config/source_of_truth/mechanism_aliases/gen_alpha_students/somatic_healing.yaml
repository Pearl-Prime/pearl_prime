topic: somatic_healing
short_form: "the body's version"
descriptor: "Physical sensations revealing emotional truths the mind hasn't articulated."
naming_moment: |
  You said you were fine. You believed it when you said it. Then you noticed — the tightness across your shoulders that appeared during that conversation, the way your stomach flipped before you knew you were nervous, the relief in your chest when the thing you were worried about was over. The body had its own read the whole time.

  The body is a translator. It speaks in tightness and release, in sensations that arrive before conscious thought. It knows what the mind is still rehearsing its way toward.
