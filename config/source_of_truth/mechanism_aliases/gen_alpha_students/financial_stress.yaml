persona: gen_alpha_students
topic: financial_stress
short_form: "the math that doesn't land"
descriptor: "Persistent awareness of financial instability despite managing day-to-day."
naming_moment: |
  You've done the numbers. You've done them three times. They don't resolve into anything that feels stable. Not a crisis — just a persistent low-level awareness that the margin is smaller than you want it to be, and that awareness follows you into unrelated moments.

  The math is clear. The clarity doesn't bring stability. You're standing on a floor you can calculate but can't quite trust. The margin is too thin for peace.
forms:
  possessive: "the math that doesn't land's"
  verb_form: "calculating"
