persona: gen_alpha_students
topic: boundaries
short_form: "the always-on setting"
descriptor: "Automatic yes-saying due to fear of disappointing others."
naming_moment: |
  Someone asks for something — a favor, a response, another thing. You say yes before you've decided. Not because you want to. Because saying anything else feels like a risk — they'll be upset, they'll like you less, something will break. The yes comes out automatically. Then you have to live with it.

  The boundary was never drawn. The default is to absorb, to accommodate, to agree. The yes protects the relationship in the moment and costs you later.
forms:
  possessive: "the always-on setting's"
  verb_form: "saying yes"
