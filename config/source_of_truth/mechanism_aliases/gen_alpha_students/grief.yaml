persona: gen_alpha_students
topic: grief
short_form: "the sudden absence"
descriptor: "Unexpected moments when loss becomes tangibly present."
naming_moment: |
  You're doing something completely ordinary — lunch, a song, the light at a certain time of day — and it's there. Not announced. Just present. The shape of what's missing, showing up in an unremarkable moment.

  Grief doesn't announce itself. It arrives in the middle of Tuesday, in a song that has nothing to do with it, in the way a room is lit. The ordinariness of the moment makes the absence sharper.
forms:
  possessive: "the sudden absence's"
  verb_form: "grieving"
