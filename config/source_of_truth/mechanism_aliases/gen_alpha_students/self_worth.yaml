persona: gen_alpha_students
topic: self_worth
short_form: "the like counter"
descriptor: "Self-evaluation tied to quantified social feedback and validation metrics."
naming_moment: |
  You post something. Then you watch it. Not casually — you're tracking. Who reacted, who didn't, how fast, what kind. The number goes up by two and feels like a B+. It goes up by twenty and feels like it still wasn't enough. The counter never settles at done.

  The number is a score, and you're always running. The metric was supposed to measure something external. It's become a measure of you.
forms:
  possessive: "the like counter's"
  verb_form: "counting"
