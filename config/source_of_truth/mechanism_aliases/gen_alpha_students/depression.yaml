persona: gen_alpha_students
topic: depression
short_form: "the gray filter"
descriptor: "A dampening of emotional intensity across all activities and moments."
naming_moment: |
  It's not sadness exactly. It's more like the contrast on everything got turned down. The things that used to feel like something — they're still there, you still do them — but they don't land the same way.

  The filter is constant and invisible. Life continues at the same pace with the same activities, but the signal has lost its resonance. What once mattered now feels distant, even while happening.
forms:
  possessive: "the gray filter's"
  verb_form: "filtering"
