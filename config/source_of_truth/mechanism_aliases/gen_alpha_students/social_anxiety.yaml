persona: gen_alpha_students
topic: social_anxiety
short_form: "the audience effect"
descriptor: "Internal simulation of how others will perceive your words before speaking."
naming_moment: |
  You're in the group project meeting. You have a thought. A good one, probably. But before it leaves your mouth, you've already run it through the room — how it'll sound, who'll react, whether someone will look at you sideways. By the time you finish the simulation, someone else has said it.

  The audience exists in your head before you speak. The filter of their judgment runs in parallel, and by the time it finishes, the moment has moved on.
forms:
  possessive: "the audience effect's"
  verb_form: "performing"
