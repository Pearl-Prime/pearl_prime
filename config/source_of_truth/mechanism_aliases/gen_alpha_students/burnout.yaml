persona: gen_alpha_students
topic: burnout
short_form: "the low battery that won't charge"
descriptor: "Persistent exhaustion that persists despite sleep and rest."
naming_moment: |
  You sleep. You wake up. You're still tired. Not in a stayed-up-too-late way. In a something-is-draining-that-sleep-can't-refill way. You do the things. They take more than they should. The charge is going somewhere you can't see.

  The battery indicator never shows full. Rest doesn't restore it. The drain is happening faster than any recovery can reach it.
forms:
  possessive: "the low battery that won't charge's"
  verb_form: "draining"
