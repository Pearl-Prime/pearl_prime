persona: gen_alpha_students
topic: imposter_syndrome
short_form: "the comment section in your head"
descriptor: "Immediate dismissal of achievements through internal criticism and doubt."
naming_moment: |
  You did well on something. Got the grade, got picked for the team, got the part. For about four seconds it feels good. Then the comment section opens. Who says you earned it? What if they find out you're not actually that? What if next time you can't?

  The achievement is real. The comment section that follows is louder. It doesn't matter what actually happened — the narrative in your head rewrites it into luck, mistake, or fraud.
forms:
  possessive: "the comment section in your head's"
  verb_form: "commenting"
