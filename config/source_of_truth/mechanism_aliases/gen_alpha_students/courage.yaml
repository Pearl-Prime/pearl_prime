persona: gen_alpha_students
topic: courage
short_form: "the weight before the step"
descriptor: "The gravitational pull felt before taking an action despite fear."
naming_moment: |
  The thing you want to do is visible. You can see it from here. The distance isn't even that far. But there's a weight — not fear exactly, more like the gravity between where you are and the first move. The step itself is small. The weight before it is something else.

  Courage isn't the absence of weight. It's stepping into it anyway. The weight doesn't disappear — it just becomes part of the movement, proof that it mattered enough to be heavy.
forms:
  possessive: "the weight before the step's"
  verb_form: "stepping"
