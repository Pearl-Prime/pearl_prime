persona: corporate_managers
topic: social_anxiety
short_form: "the leadership optics filter"
descriptor: "Monitoring how you're being read in every interaction, every room."
naming_moment: |
  The manager enters a room. Simultaneously, she's observing how she's being perceived. Is she coming across as confident? Credible? Strong? The observation is constant. It's not paranoia. It's the baseline awareness that every interaction is being read by someone. The filter is always on. This becomes the leadership optics filter.
forms:
  possessive: "the leadership optics filter's"
  verb_form: "optics-filtering"
