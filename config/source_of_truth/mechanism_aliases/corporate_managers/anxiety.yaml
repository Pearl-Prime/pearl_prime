persona: corporate_managers
topic: anxiety
short_form: "the quarterly review in your head"
descriptor: "Running performance assessments on yourself between every meeting."
naming_moment: |
  The person sits in a meeting. Someone makes a comment. Her mind immediately scores it: what did they mean by that? Was that a critique? The internal performance review activates. How did I come across? What did I say that landed wrong? The review is continuous. Between meetings, at her desk, before sleep. Every interaction is data for the assessment running in her head. This becomes the quarterly review in your head.
forms:
  possessive: "the quarterly review in your head's"
  verb_form: "head-reviewing"
