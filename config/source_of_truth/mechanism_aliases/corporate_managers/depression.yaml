persona: corporate_managers
topic: depression
short_form: "the reporting structure with no output"
descriptor: "Doing the work, producing the reports, feeling nothing register."
naming_moment: |
  The manager produces the report. Delivers the update. The metrics are there. The output is documented. But it doesn't register as real. The work gets done. The reports get filed. And there's a flatness underneath. Nothing seems to matter. The output is high. The feeling is low. This becomes the reporting structure with no output.
