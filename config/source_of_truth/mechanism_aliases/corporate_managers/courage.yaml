persona: corporate_managers
topic: courage
short_form: "the org risk calculation"
descriptor: "The thing you know needs saying, held back by the political cost of saying it."
naming_moment: |
  The manager knows something needs to be said. It's right to say. But the political cost is real. If she says it, she might be seen as not being a team player. The risk calculates in her mind. The thing stays unsaid. The knowing persists. This becomes the org risk calculation.
forms:
  possessive: "the org risk calculation's"
  verb_form: "org-risk-calculating"
