persona: corporate_managers
topic: compassion_fatigue
short_form: "the managed response"
descriptor: "Your concern for your people is real but you've learned to show a calibrated version."
naming_moment: |
  The manager cares about her team. But she's learned to show a managed version of that concern. Full concern would be visible as bias. Partial concern reads as professional. The real feeling gets calibrated down. The people get the managed version. This becomes the managed response.
forms:
  possessive: "the managed response's"
  verb_form: "managing-response"
