persona: corporate_managers
topic: somatic_healing
short_form: "the posture you hold in meetings"
descriptor: "The physical configuration of being composed, and what it costs."
naming_moment: |
  The manager sits in the meeting with a particular posture. Composed. In control. Her shoulders are set. Her expression is modulated. The body is configured to show leadership. The configuration stays on for hours. In the car, the shoulders finally drop. The posture was the price of being present as a leader. This becomes the posture you hold in meetings.
forms:
  possessive: "the posture you hold in meetings's"
  verb_form: "posture-holding"
