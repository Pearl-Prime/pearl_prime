persona: corporate_managers
topic: boundaries
short_form: "the open-door policy problem"
descriptor: "Available by design, unable to close the door without it meaning something."
naming_moment: |
  The manager keeps her door open. It signals accessibility. But the boundary is gone. Someone can interrupt at any moment. To close the door is to send a message: I'm not available. I'm upset. I'm working on something important. The open door is expected. The cost of the expectation is constant interruption. This becomes the open-door policy problem.
forms:
  possessive: "the open-door policy problem's"
  verb_form: "door-opening"
