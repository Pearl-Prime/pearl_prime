persona: corporate_managers
topic: sleep_anxiety
short_form: "the 5am pre-brief"
descriptor: "The mind that starts the workday before the alarm does."
naming_moment: |
  The manager wakes at 5am. Her mind is already running the day. The meeting at 8. The decision from yesterday that needs follow-up. The person who might challenge her. The mind is pre-briefing before anything has happened. Sleep ends and planning begins. This becomes the 5am pre-brief.
forms:
  possessive: "the 5am pre-brief's"
  verb_form: "5am-pre-briefing"
