persona: corporate_managers
topic: financial_anxiety
short_form: "the compensation math"
descriptor: "Knowing your number, comparing it to the market, running the delta."
naming_moment: |
  The manager knows her compensation. She also knows the market rate for her role. The delta is calculated. How much is she leaving on the table? The math runs continuously. It's not just curiosity. It's the baseline awareness that she's always potentially underpaid. This becomes the compensation math.
forms:
  possessive: "the compensation math's"
  verb_form: "compensation-calculating"
