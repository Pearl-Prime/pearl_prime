persona: corporate_managers
topic: comparison
short_form: "the benchmarking habit"
descriptor: "Measuring your trajectory against your peer group constantly and involuntarily."
naming_moment: |
  The manager learns about a peer's promotion. Immediately, the calculation starts. How long until her own? What's the gap? The peer has this credential, does she? The benchmarking is automatic. It runs in the background. She's not trying to measure. The measurement happens whether she wants it to or not. This becomes the benchmarking habit.
forms:
  possessive: "the benchmarking habit's"
  verb_form: "benchmarking"
