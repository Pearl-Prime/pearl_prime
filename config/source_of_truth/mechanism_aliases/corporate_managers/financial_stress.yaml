persona: corporate_managers
topic: financial_stress
short_form: "the lifestyle float"
descriptor: "Keeping up the appearance of stability while the actual math is tighter."
naming_moment: |
  The manager looks stable. The house, the expenses, the lifestyle suggest security. But the actual math is tighter than it appears. The appearance is maintained. The actual margin is smaller. She's aware of the gap between what people think her situation is and what it actually is. This becomes the lifestyle float.
forms:
  possessive: "the lifestyle float's"
  verb_form: "lifestyle-floating"
