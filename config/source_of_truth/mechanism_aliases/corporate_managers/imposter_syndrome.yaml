persona: corporate_managers
topic: imposter_syndrome
short_form: "the board meeting you didn't call"
descriptor: "The internal meeting where every chair holds someone with a concern about your qualifications."
naming_moment: |
  The manager sits in a real meeting. And simultaneously, in her mind, another meeting happens. In that meeting, every senior person she's ever worked with shows up. They're all discussing her. Whether she actually knows what she's doing. The internal board meeting runs alongside the real one. This becomes the board meeting you didn't call.
forms:
  possessive: "the board meeting you didn't call's"
  verb_form: "board-meeting-imagining"
