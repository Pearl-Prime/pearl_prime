persona: corporate_managers
topic: grief
short_form: "the meeting that never got scheduled"
descriptor: "The loss you couldn't process because the calendar never had room."
naming_moment: |
  Something significant happened. A loss. A disappointment. A change that matters. The manager knows it matters. But the calendar is full. The loss gets held while the meetings continue. There's never a moment to process it. The loss becomes another item that doesn't fit in the structure. This becomes the meeting that never got scheduled.
forms:
  possessive: "the meeting that never got scheduled's"
  verb_form: "unscheduled-meeting-grieving"
