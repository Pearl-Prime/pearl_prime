persona: corporate_managers
topic: burnout
short_form: "the org chart that ends with you"
descriptor: "Every escalation lands on your desk, nothing flows down."
naming_moment: |
  The manager looks at the org chart. Every arrow points up toward her. The problems come up. The decisions come up. The conflicts come up. Nothing is resolved before it reaches her desk. The structure is designed so everything escalates to her. She's the sink. There's no capacity. This becomes the org chart that ends with you.
forms:
  possessive: "the org chart that ends with you's"
  verb_form: "org-chart-ending"
