persona: corporate_managers
topic: self_worth
short_form: "the performance review you run on yourself"
descriptor: "Scoring yourself on metrics no one official assigned."
naming_moment: |
  The manager assigns herself metrics. Revenue impact. Team retention. Project delivery. Growth trajectory. She scores herself against these continuously. Some months she passes. Some months she fails. The review is internal and relentless. No one officially set these standards. She did. This becomes the performance review you run on yourself.
forms:
  possessive: "the performance review you run on yourself's"
  verb_form: "self-reviewing"
