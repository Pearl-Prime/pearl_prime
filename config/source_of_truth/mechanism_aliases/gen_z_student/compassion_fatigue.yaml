persona: gen_z_student
topic: compassion_fatigue
short_form: "the emotional RA"
descriptor: "Being the person everyone comes to — the floor therapist, the crisis responder — until there is nothing left to give."
naming_moment: |
  She is a resident advisor. Three students have come to her room tonight. One is crying about a breakup. One is anxious about grades. One just needs to talk. She listens to all three. By midnight her own chest is hollow. She has absorbed everyone's pain and has no one to give hers to. This becomes the emotional RA.
