persona: gen_z_student
topic: imposter_syndrome
short_form: "the admissions mistake"
descriptor: "The persistent belief that you were accepted by error and it is only a matter of time before someone notices."
naming_moment: |
  First week of college. The professor calls on him in a seminar of thirty students. He answers. It is correct. But in his chest there is a squeeze — the feeling that he got lucky, that the next question will expose him, that everyone else in this room belongs here more than he does. He has carried this feeling since the acceptance letter arrived. This becomes the admissions mistake.
