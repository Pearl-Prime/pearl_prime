persona: gen_z_student
topic: sleep_anxiety
short_form: "the 2 AM scroll"
descriptor: "Lying in bed with the phone as the last barrier between consciousness and the thoughts waiting in the dark."
naming_moment: |
  The dorm room is dark except for the phone screen. His roommate is asleep. He should be too — 8 AM lecture. But the phone is the only thing keeping the anxious thoughts at a distance. As long as he is scrolling, he is not thinking about tomorrow. The moment he puts the phone down, the thoughts will come. So he scrolls. 1 AM. 2 AM. 2:47 AM. This becomes the 2 AM scroll.
