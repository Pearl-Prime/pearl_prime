persona: gen_z_student
topic: overthinking
short_form: "the reply draft"
descriptor: "Rewriting the same text message fourteen times because each version reveals something you're not ready to show."
naming_moment: |
  He types the message. Deletes it. Types again. Shorter this time. Too short — reads cold. Adds an emoji. Removes it — too eager. He has been composing a three-sentence text for eleven minutes. The content is simple: confirming plans for tomorrow. But the stakes feel enormous. Every word is a test. Every punctuation mark a signal. This becomes the reply draft.
