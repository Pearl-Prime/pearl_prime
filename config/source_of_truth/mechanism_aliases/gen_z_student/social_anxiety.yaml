persona: gen_z_student
topic: social_anxiety
short_form: "the dining hall calculus"
descriptor: "The mental math of whether to eat alone, find someone to sit with, or skip the meal entirely."
naming_moment: |
  She stands at the entrance of the dining hall holding her tray. Scanning the room. There are people she recognizes but doesn't know well enough to sit with uninvited. There is an empty table in the corner. She calculates: sit alone and feel exposed, or approach a group and risk rejection. The calculus takes thirty seconds. She chooses the corner. This becomes the dining hall calculus.
