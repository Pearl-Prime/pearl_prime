persona: gen_z_student
topic: courage
short_form: "the raised hand"
descriptor: "The moment between having something to say and actually saying it — when every eye in the room becomes a judge."
naming_moment: |
  She knows the answer. She has read the chapter twice. But her hand stays in her lap. The professor waits. Someone else answers — incorrectly. She could correct them. The knowledge is there. But the gap between knowing and speaking feels like a canyon. The raised hand is not about the answer. It is about the willingness to be seen. This becomes the raised hand.
