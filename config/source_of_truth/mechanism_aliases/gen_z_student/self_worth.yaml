persona: gen_z_student
topic: self_worth
short_form: "the comparison feed"
descriptor: "Scrolling through other people's achievements and feeling your own shrink with every swipe."
naming_moment: |
  She opens Instagram between classes. Someone from high school just got a research fellowship. Someone else is studying abroad in Tokyo. A former classmate has 40K followers doing exactly what she wanted to do. Her own feed: a half-eaten dining hall salad and a screenshot of a B-minus. She locks her phone. The comparison has already done its work. This becomes the comparison feed.
