persona: gen_z_student
topic: grief
short_form: "the empty seat"
descriptor: "Losing someone while you're supposed to be starting your life — grief that has no room in the academic calendar."
naming_moment: |
  His grandmother died three weeks into the semester. The university gave him five days. He flew home, attended the funeral, flew back. Now he sits in lecture and the professor is explaining something about cellular biology and he is thinking about the way she used to hold his hand when they crossed the street. The grief has no designated slot in his schedule. There is no office hour for this. This becomes the empty seat.
