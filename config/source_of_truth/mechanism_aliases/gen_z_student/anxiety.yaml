persona: gen_z_student
topic: anxiety
short_form: "the exam that never ends"
descriptor: "Running a continuous performance review against every assignment, every social interaction, every future you haven't built yet."
naming_moment: |
  The student sits in the library at 11 PM. Three tabs open: the essay due tomorrow, the group chat she hasn't replied to, the internship application with a deadline she missed. Her chest is tight. She can feel her heartbeat in her throat. The anxiety is not about any single task. It is about the feeling that she is falling behind in every direction simultaneously. This becomes the exam that never ends.
forms:
  possessive: "the exam that never ends'"
  verb_form: "exam-looping"
