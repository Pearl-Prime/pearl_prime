persona: gen_z_student
topic: somatic_healing
short_form: "the tension backpack"
descriptor: "Carrying stress in the shoulders, jaw, and chest from a body that has been in survival mode since freshman orientation."
naming_moment: |
  She notices her shoulders are at her ears again. In the library, in the dining hall, in bed. The tension has become her default posture. Her jaw is clenched — has been since midterms. Her physiotherapist said it's stress. Her body is carrying the semester like a physical weight. She doesn't know how to put the backpack down. This becomes the tension backpack.
