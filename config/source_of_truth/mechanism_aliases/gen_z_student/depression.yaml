persona: gen_z_student
topic: depression
short_form: "the flat morning"
descriptor: "Waking up with no urgency, no interest, no feeling that the day contains anything worth getting up for."
naming_moment: |
  The alarm goes off at 8 AM. She stares at the ceiling. Class starts in forty minutes but her body has no intention of moving. Yesterday she skipped two lectures. The day before, three. The flatness is not sadness — it is the absence of any pull toward anything. Her roommate has already left. The room is quiet. She closes her eyes again. This becomes the flat morning.
