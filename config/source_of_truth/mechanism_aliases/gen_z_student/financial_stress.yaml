persona: gen_z_student
topic: financial_stress
short_form: "the ramen budget"
descriptor: "Making impossible calculations between rent, textbooks, food, and the unpaid internship that's supposed to build your future."
naming_moment: |
  She has $47 until Friday. Rent is covered but the textbook costs $89. She can't share — it's an access code. She eats ramen for the third night. Her internship is unpaid. Her parents think she's doing fine. The budget is a daily negotiation between survival and the appearance of having it together. This becomes the ramen budget.
