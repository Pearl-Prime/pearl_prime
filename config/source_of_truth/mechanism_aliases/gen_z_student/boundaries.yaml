persona: gen_z_student
topic: boundaries
short_form: "the open door policy"
descriptor: "Living in a shared space where privacy is negotiated and saying no feels like social suicide."
naming_moment: |
  Her roommate's friends are in the room again. It is 10 PM on a Wednesday. She has a paper due at midnight. She puts on headphones. She does not ask them to leave. She has never asked them to leave. The cost of setting a boundary in a shared dorm room feels higher than the cost of writing a paper with background noise. This becomes the open door policy.
