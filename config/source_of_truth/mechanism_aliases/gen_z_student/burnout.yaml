persona: gen_z_student
topic: burnout
short_form: "the semester wall"
descriptor: "Hitting the point where effort stops producing results and the body refuses to keep performing."
naming_moment: |
  Week twelve of the semester. He has been running on caffeine and deadlines since September. The assignment is open on his laptop but his hands won't type. His eyes slide off the screen. He has hit the wall — not from laziness but from a nervous system that has been in fight-or-flight for three months straight. This becomes the semester wall.
