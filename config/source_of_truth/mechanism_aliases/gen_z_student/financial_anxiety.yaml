persona: gen_z_student
topic: financial_anxiety
short_form: "the loan counter"
descriptor: "Watching the debt number grow while the degree isn't finished yet — the math that keeps you up at night."
naming_moment: |
  He checks his student loan balance on his phone. The number is five digits and climbing. He is two years from graduation. The monthly interest alone is more than he spends on food. He puts the phone face-down on his desk. The number stays in his mind. This becomes the loan counter.
