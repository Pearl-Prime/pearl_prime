persona: healthcare_rns
topic: comparison
short_form: "the staff board read"
descriptor: "Involuntarily tracking who handled things better, faster, with more composure."
naming_moment: |
  The nurse works with other nurses. During the shift, she's involuntarily reading who handled what. The other nurse managed the difficult patient more smoothly. The other nurse stayed composed when things went wrong. The comparison runs automatically. This becomes the staff board read.
forms:
