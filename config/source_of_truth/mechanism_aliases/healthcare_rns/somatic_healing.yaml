persona: healthcare_rns
topic: somatic_healing
short_form: "the twelve-hour body"
descriptor: "What gets held in legs, back, shoulders over a shift, and what stays after."
naming_moment: |
  The nurse works twelve hours. The body is in a particular configuration. Standing. Responding. Ready. The legs bear the weight. The back holds the posture. The shoulders carry the tension. After shift, some of it releases. Some of it stays. The body remembers. This becomes the twelve-hour body.
forms:
  possessive: "the twelve-hour body's"
  verb_form: "twelve-hour-holding"
