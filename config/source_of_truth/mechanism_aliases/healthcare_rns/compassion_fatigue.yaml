persona: healthcare_rns
topic: compassion_fatigue
short_form: "the chart that stopped being a person"
descriptor: "The protective distance the mind builds when the load is too much to carry personally."
naming_moment: |
  The nurse sees a patient. At first, the patient is a person. Over time, when the load is too heavy, the patient becomes a chart. The distance is protective. The mind detaches to manage the volume. The chart requires care. The person would require too much. This becomes the chart that stopped being a person.
forms:
  possessive: "the chart that stopped being a person's"
  verb_form: "chart-depersonalizing"
