persona: healthcare_rns
topic: sleep_anxiety
short_form: "the on-call brain"
descriptor: "Still listening for the pager at 3am even when you're off."
naming_moment: |
  The nurse is off-shift. Asleep at 3am. The brain is still listening. For the pager. For the bell. For the sound that signals emergency. She's not on-call. But the listening continues. Sleep is shallow because the listen is active. This becomes the on-call brain.
forms:
  possessive: "the on-call brain's"
  verb_form: "pager-listening"
