persona: healthcare_rns
topic: burnout
short_form: "the double shift your body is still running"
descriptor: "The physical debt that accumulates without a corresponding rest credit."
naming_moment: |
  The nurse works twelve hours. The body exhausts. She goes home. The body is still running. The next shift approaches. There's no point where the body has fully recovered. It accumulates. The debt becomes physical. The body is running two shifts for every one shift worked. This becomes the double shift your body is still running.
forms:
  possessive: "the double shift your body is still running's"
  verb_form: "body-double-shifting"
