persona: healthcare_rns
topic: courage
short_form: "the speak-up moment"
descriptor: "Knowing something should be said to a colleague or supervisor, and the weight before saying it."
naming_moment: |
  The nurse sees something. Something that should be addressed. A concern about patient safety. A colleague's capacity. She knows it should be said. The weight before saying it is significant. The hierarchy, the relationship, the potential consequence. The knowing and the delay create the moment. This becomes the speak-up moment.
forms:
  possessive: "the speak-up moment's"
  verb_form: "speak-up-delaying"
