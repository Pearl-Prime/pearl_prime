persona: healthcare_rns
topic: imposter_syndrome
short_form: "the wrong chart feeling"
descriptor: "The sense that someone is about to discover you filed yourself under the wrong name."
naming_moment: |
  The nurse makes a clinical decision. It's sound. But in the back of her mind, there's the sense that she's not actually qualified to make this decision. Someone will discover she filed herself under the wrong credentials. The decision is good. The doubt persists. This becomes the wrong chart feeling.
