persona: healthcare_rns
topic: self_worth
short_form: "the triage score you give yourself"
descriptor: "The internal assessment running on the same criteria as patient assessment."
naming_moment: |
  The nurse triages patients all day. By the end of the day, she's triaging herself. How well did I handle the load? How many patients got my full presence? The scoring is the same rubric. She grades herself the way she grades patients. This becomes the triage score you give yourself.
forms:
  possessive: "the triage score you give yourself's"
  verb_form: "self-triaging"
