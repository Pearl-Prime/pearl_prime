persona: healthcare_rns
topic: anxiety
short_form: "the code that hasn't cleared"
descriptor: "The alert-state that stays active past end of shift."
naming_moment: |
  The nurse ends shift. The code is cleared on the floor. But in her nervous system, it's still running. The alert-state persists. Home doesn't feel safe yet. She's still in the frequency of the emergency. The code has ended. The activation hasn't. This becomes the code that hasn't cleared.
