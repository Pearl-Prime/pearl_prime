persona: healthcare_rns
topic: overthinking
short_form: "the differential that won't resolve"
descriptor: "Running through every scenario after the fact, looking for the thing you might have missed."
naming_moment: |
  The nurse's shift ends. At home, her mind runs the differential. The patient's presentation. The vitals. The decision made. Was there something missed? Could it have been something else? The clinical thinking continues long after the shift. The scenario runs through multiple iterations looking for the missed piece. This becomes the differential that won't resolve.
forms:
  possessive: "the differential that won't resolve's"
  verb_form: "differential-running"
