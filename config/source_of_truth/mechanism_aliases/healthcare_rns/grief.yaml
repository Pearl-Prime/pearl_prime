persona: healthcare_rns
topic: grief
short_form: "the cumulative chart"
descriptor: "The record of losses that doesn't get discharged when you walk out the door."
naming_moment: |
  The nurse loses patients. Not all of them. Some. The loss accumulates. Each one adds to the chart. When she leaves work, the chart stays. The losses don't get discharged. They accumulate in the background. This becomes the cumulative chart.
forms:
  possessive: "the cumulative chart's"
  verb_form: "chart-accumulating"
