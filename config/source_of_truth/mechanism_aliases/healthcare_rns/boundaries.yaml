persona: healthcare_rns
topic: boundaries
short_form: "the on-call that became permanent"
descriptor: "The boundary between shift and life that quietly dissolved."
naming_moment: |
  The nurse was on-call. Then shift-work. Then the on-call mentality stayed. Even off-shift, she's still responding to the frequency of emergency. The boundary between being available and being off-duty dissolved. She's permanently in the response state. This becomes the on-call that became permanent.
