persona: healthcare_rns
topic: depression
short_form: "the flatline feeling"
descriptor: "Not dramatic, just the absence of amplitude; everything at the same low level."
naming_moment: |
  The nurse goes through the shift. The work is there. The patients are there. But there's no highs and lows. Everything is at the same low frequency. The things that used to spark something don't anymore. The flatline continues. Not crisis. Just flat. This becomes the flatline feeling.
forms:
  possessive: "the flatline feeling's"
  verb_form: "flatline-feeling"
