short_form: "the family update performance"
descriptor: "Explaining what you do to people who have no reference point for it."
naming_moment: |
  The nurse is at a family event. Someone asks what she does. She begins to explain. But the reference point isn't there. The person can't actually understand what the work is. The explanation becomes a performance. She's trying to bridge a gap that doesn't have a bridge. This becomes the family update performance.
