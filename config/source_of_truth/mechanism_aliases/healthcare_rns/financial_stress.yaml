short_form: "the PRN problem"
descriptor: "Income that varies, bills that don't, and the math between them."
naming_moment: |
  The nurse works PRN shifts. The income is what she needs. But the month varies. Some months there are more shifts. Some months fewer. The bills are stable. The math between them requires constant attention. This becomes the PRN problem.
