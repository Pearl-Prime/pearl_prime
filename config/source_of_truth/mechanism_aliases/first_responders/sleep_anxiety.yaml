persona: first_responders
topic: sleep_anxiety
short_form: "the 2am alert brain"
descriptor: "The nervous system still scanning at 2am because that's when things happen."
naming_moment: |
  You are awake at 2am and your nervous system is alert. It knows that calls come at night. It knows that 2am is a time when things happen. The nervous system is not fully sleeping because the nervous system knows it should not fully sleep. The alert state in the body does not respect the boundaries of sleep. This is the 2am alert brain—the nervous system that is conditioned to scan at times of vulnerability, the wakefulness that understands the specific logic of the job.
forms:
  possessive: "the 2am alert brain's"
  verb_form: "alerting at 2am"
