persona: first_responders
topic: financial_anxiety
short_form: "the disability math"
descriptor: "The calculation that exists underneath every high-risk moment."
naming_moment: |
  You are responding to a call and underneath the focus there is a calculation. What happens if something goes wrong and you are disabled. What is the financial impact. The disability math is always running in the background. The job carries risk. The risk could result in injury. The injury could mean you cannot work. The cannot-work means no income. The no-income means the financial structure breaks. This is the disability math—the calculation that underlies every call, the financial vulnerability that is specific to high-risk work.
forms:
  possessive: "the disability math's"
  verb_form: "calculating disability math"
