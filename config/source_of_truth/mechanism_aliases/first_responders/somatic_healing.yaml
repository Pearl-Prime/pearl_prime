persona: first_responders
topic: somatic_healing
short_form: "the hypervigilance hangover"
descriptor: "What stays in the body after the sustained alertness; the cost of being that ready for that long."
naming_moment: |
  The call is over. You are no longer on duty. But your body is still scanning. Your nervous system is still reading the environment for threat. The hypervigilance is still on. The body does not turn off because the body has learned that things can happen. The sustained readiness has left a mark. The body remembers. This is the hypervigilance hangover—what remains in the nervous system after the sustained alertness, the physical cost of years of being that ready, the nervous system that is still prepared even when you are not on a call.
forms:
  possessive: "the hypervigilance hangover's"
  verb_form: "experiencing hypervigilance hangover"
