persona: first_responders
topic: overthinking
short_form: "the incident replay"
descriptor: "Reviewing what happened, what was done, what might have been done differently."
naming_moment: |
  The call is over and your mind is replaying it. What happened. What you did. Whether you did it right. Whether you missed something. What you might have done differently. The replay loops. The call is preserved in your mind in high definition. You are running forensics on your own performance. This is the incident replay—the mind that processes the call by reviewing it, the analysis that keeps happening hours or days after the incident, the loop that is trying to extract learning or reassurance and often finds neither.
forms:
  possessive: "the incident replay's"
  verb_form: "replaying the incident"
