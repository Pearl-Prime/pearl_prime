persona: first_responders
topic: boundaries
short_form: "the code of silence"
descriptor: "The culture that says you handle it internally, which means you handle it alone."
naming_moment: |
  Something difficult happened and the code of silence is in effect. You do not talk about it outside the crew. You certainly do not talk about your feelings about it. You handle it internally. You do not let it affect your performance. You do not admit that it had impact. The culture says this is strength. What it actually means is you carry it alone. This is the code of silence—the boundary that is not about privacy but about isolation, the culture that frames processing as weakness, the mandate to handle it internally which means to handle it entirely alone.
forms:
  possessive: "the code of silence's"
  verb_form: "silencing yourself"
