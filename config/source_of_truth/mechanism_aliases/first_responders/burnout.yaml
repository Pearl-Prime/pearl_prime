persona: first_responders
topic: burnout
short_form: "the adrenaline deficit"
descriptor: "The long-term cost of running on surge chemistry as a baseline."
naming_moment: |
  You are used to running on adrenaline. The surge chemistry is your baseline. You are performing at capacity in states where others would be incapacitated. The cost is that when you are not in a call, your chemistry feels wrong. You are not activated, which feels like you are not engaged. The normal baseline feels flat. Over time, the cost of running on surge chemistry catches up. This is the adrenaline deficit—the burnout that comes from sustaining high-activation chemistry, the cost of building capacity in crisis and then expecting the body to function at normal arousal.
forms:
  possessive: "the adrenaline deficit's"
  verb_form: "running on adrenaline"
