persona: first_responders
topic: social_anxiety
short_form: "the civilian gap"
descriptor: "The distance between what you've seen and what people in your personal life can receive."
naming_moment: |
  You are with people who have not seen what you have seen. They are talking about things that feel small to you. The worry that feels big to them feels small in comparison to what you carry. The distance is not that they are shallow; it is that you have seen too much. The gap between the civilian experience and what you know is real. You cannot close the gap without letting them in. You cannot let them in because they are not built for what you are carrying. This is the civilian gap—the distance between your experience and theirs, the separation that exists underneath closeness.
forms:
  possessive: "the civilian gap's"
  verb_form: "experiencing the civilian gap"
