persona: first_responders
topic: anxiety
short_form: "the always-ready state"
descriptor: "The alert configuration that doesn't fully stand down after the call ends."
naming_moment: |
  The call is over and you are standing down from the activation. Your nervous system is designed to do this—activate in response to crisis, down-regulate when the crisis ends. Except your nervous system doesn't fully stand down. There is another call coming. There is always another call coming. The readiness gets interrupted but never completed. This is the always-ready state—the alert configuration that doesn't have time to fully reset before the next demand arrives, the nervous system that is habitually partial-way activated.
forms:
  possessive: "the always-ready state's"
  verb_form: "staying ready"
