persona: first_responders
topic: imposter_syndrome
short_form: "the hesitation before the call"
descriptor: "The moment of doubt after a decision, running the counterfactual."
naming_moment: |
  You make a decision and immediately you are wondering if it was right. Did you call it correctly. Is this the right approach. What if you are wrong. The hesitation is quick but it is there. You have been trained to decide and act but somewhere the doubt got embedded. You are running the counterfactual even as you are committed to the call. This is the hesitation before the call—the doubt that arrives alongside the decision, the counterfactual that runs parallel to your commitment, the question that doesn't prevent action but shadows it.
forms:
  possessive: "the hesitation's"
  verb_form: "hesitating before the call"
