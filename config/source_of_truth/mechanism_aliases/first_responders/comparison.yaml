persona: first_responders
topic: comparison
short_form: "the partner debrief"
descriptor: "Measuring your response against what someone else did in the same situation."
naming_moment: |
  You are debriefing the call with your partner and you are comparing your response to theirs. What they did. What you did. Who was faster. Who thought of something first. Who handled it better. The debrief becomes comparative. The learning is mixed with measurement. You are not just processing the incident; you are measuring yourself against your partner. This is the partner debrief—the comparison that happens in the context of team, the measurement that lives inside collaboration, the sense of yourself in relation to someone doing the same work in the same moment.
forms:
  possessive: "the partner debrief's"
  verb_form: "debriefing with your partner"
