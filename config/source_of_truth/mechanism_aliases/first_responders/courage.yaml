persona: first_responders
topic: courage
short_form: "the speak-up call"
descriptor: "Saying something needs to change in a culture that runs on not saying things."
naming_moment: |
  Something needs to change. The practice is unsafe. The culture is unsustainable. Something should be said. The culture is built on not saying things. Bringing it up is swimming against the current. The speak-up call is the thing that needs to happen and costs to happen. This is the speak-up call—the truth that needs saying, the risk of saying it in a system that does not welcome the saying.
forms:
  possessive: "the speak-up call's"
  verb_form: "speaking up"
