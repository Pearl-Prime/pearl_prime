persona: first_responders
topic: depression
short_form: "the post-incident flat"
descriptor: "The absence of feeling that follows sustained high-activation work."
naming_moment: |
  After a hard shift, you expect to feel something. Relief. Fatigue. Processing. Instead, there is flatness. The activation was so intense that the return to normal feels like numbness. The capacity to feel seems to have shut down. The emotional range has narrowed. The world feels muted. This is the post-incident flat—the absence of feeling, the depression that comes as a recovery state, the numbness that follows intensity.
forms:
  possessive: "the post-incident flat's"
  verb_form: "experiencing post-incident flatness"
