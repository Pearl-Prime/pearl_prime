short_form: "the overtime dependency"
descriptor: "The household budget that needs the extra hours to work."
naming_moment: |
  The household budget depends on the overtime. The base pay is not enough. The mortgage calculation includes the expected overtime income. The financial plan requires you to be working more than full-time. The dependency is built into the number. The budget cannot absorb a cut in overtime. The dependency makes the schedule non-negotiable. This is the overtime dependency—the budget structure that requires the extra hours, the financial reality that makes additional work mandatory.
