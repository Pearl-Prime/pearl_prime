persona: first_responders
topic: compassion_fatigue
short_form: "the numbering"
descriptor: "When you stop flinching; the protective distance the nervous system builds."
naming_moment: |
  The call comes and you respond the same way as you always do. You are not flinching anymore. The response has become automatic. The protective numbing has happened. The capacity to feel has been calibrated down. This is not about being cold; it is about the nervous system protecting itself. The repeated exposure has required protective distance. This is the numbering—the point at which the nervous system stops allowing the full experience of what you are witnessing, the protective calibration that comes from repeated exposure.
forms:
  possessive: "the numbering's"
  verb_form: "numbering yourself"
