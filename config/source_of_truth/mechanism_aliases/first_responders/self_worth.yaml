persona: first_responders
topic: self_worth
short_form: "the incident report on yourself"
descriptor: "The internal assessment written in the same format as the official one."
naming_moment: |
  After the incident, there is an official report. There is also an internal incident report that you write on yourself. Did you respond correctly. Did you miss something. Were you good enough in that moment. You are filing yourself against the same standard you use for the official case review. This is the incident report on yourself—the internal documentation, the assessment that uses the same rigor and criticism as the official one, the grading that happens in your own mind.
forms:
  possessive: "the incident report's"
  verb_form: "reporting on yourself"
