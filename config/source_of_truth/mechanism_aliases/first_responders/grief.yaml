persona: first_responders
topic: grief
short_form: "the cumulative ledger"
descriptor: "The calls you carry, not filed, not discharged, just added to the running total."
naming_moment: |
  There have been calls. There have been difficult calls. There have been calls where the outcome was not good. You are not talking about them. They are not being processed. They are accumulating. They are inside you, stored, compounded, adding to the weight. The ledger grows. This is the cumulative ledger—the tally that is not being reconciled, the calls that are filed in your body, the grief that keeps accumulating because there is nowhere to discharge it.
forms:
  possessive: "the cumulative ledger's"
  verb_form: "adding to the ledger"
