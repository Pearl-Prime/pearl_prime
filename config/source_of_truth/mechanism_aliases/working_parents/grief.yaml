persona: working_parents
topic: grief
short_form: "the version that didn't happen"
descriptor: "The life that ran alongside this one in your imagination, for a while."
naming_moment: |
  You imagined staying home. You imagined being fully present. You imagined a version of this that was not split. That version existed in your head for a while. At some point, you let it go. You made the choice or the choice was made for you. Now there is grief for the version that didn't happen, the life that existed in imagination, the presence you thought you would have that you don't. This is the version that didn't happen—the imagined future, the alternative life that you released, the what-could-have-been that you mourn.
forms:
  possessive: "the version's"
  verb_form: "grieving the version that didn't happen"
