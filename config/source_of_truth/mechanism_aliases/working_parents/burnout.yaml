persona: working_parents
topic: burnout
short_form: "the second job at 5pm"
descriptor: "The shift change that isn't a break, just a different set of requirements."
naming_moment: |
  You leave work and the second shift begins. The kids need homework help. There is dinner to make. There is laundry to manage. There are bedtimes to negotiate. The work doesn't end—it transforms. You are not getting a break between jobs; you are transitioning to a different set of demands at the same intensity. By the time the kids are asleep, you are empty. This is the second job at 5pm—the shift change that brings no rest, the transition from one set of demands to another, the burnout that comes from never actually stopping.
forms:
  possessive: "the second job's"
  verb_form: "working the second job"
