persona: working_parents
topic: somatic_healing
short_form: "the held breath"
descriptor: "The physical tension of sustained vigilance, and what it looks like to release it."
naming_moment: |
  You are holding your breath. Not literally, but your whole body is in a state of held anticipation. Something might go wrong. One of the kids might need you. Work might demand something. Your partner might need support. You are ready for any of it. The body is in a state of preparation. The shoulders are tight. The breath is shallow. The nervous system is running at alert. You have been ready for so long that ready feels like normal. This is the held breath—the physical tension of sustained vigilance, the body that has learned to stay ready, the release that would come if you believed it was safe to stop preparing.
forms:
  possessive: "the held breath's"
  verb_form: "holding your breath"
