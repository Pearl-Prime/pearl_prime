persona: working_parents
topic: boundaries
short_form: "the available by default setting"
descriptor: "Both jobs assume you're on; the setting was never changed."
naming_moment: |
  The work assumes you are available. The parenting assumes you are available. The setting was installed as default and you never changed it. You are on for work because that is what employment means. You are on for parenting because that is what being a parent means. The availability runs continuously across both domains. You are never actually off. This is the available by default setting—the assumption that you are always available, the configuration that was never renegotiated, the two roles that assume unconditional availability simultaneously.
forms:
  possessive: "the available by default setting's"
  verb_form: "defaulting to available"
