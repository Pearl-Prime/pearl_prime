persona: working_parents
topic: anxiety
short_form: "the mental load alarm"
descriptor: "The permanent background process tracking everything that might need attention."
naming_moment: |
  You are in a meeting and part of your attention is on the work. Another part is tracking whether you need to pick up groceries. Another part is wondering if your kid did their homework. Another part is monitoring the clock for pickup time. The mental load has multiple threads running simultaneously. It is not taking your attention away from work so much as it is occupying the background processes all the time. This is the mental load alarm—the permanent alert system, the background processes that never fully shut down, the awareness of all the things that might need attending.
forms:
  possessive: "the mental load alarm's"
  verb_form: "alarming with mental load"
