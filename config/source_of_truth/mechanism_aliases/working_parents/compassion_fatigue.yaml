persona: working_parents
topic: compassion_fatigue
short_form: "the last reserve"
descriptor: "Giving to kids, partner, job; realizing the supply isn't infinite."
naming_moment: |
  You are giving to your kids. You are showing up for your partner. You are performing at work. And there is nothing left over. The supply, which you thought was infinite or at least large, is finite. You are touching the bottom. The last reserves are being used. There is nothing left for yourself. This is the last reserve—the moment of realizing the supply has limits, the awareness that you are running on empty, the compassion that emptied the tank.
forms:
  possessive: "the last reserve's"
  verb_form: "tapping the last reserve"
