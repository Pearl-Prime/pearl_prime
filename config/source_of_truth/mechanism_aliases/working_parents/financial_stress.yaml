persona: working_parents
topic: financial_stress
short_form: "the provision pressure"
descriptor: "The weight of being responsible for a household that needs more than one person can easily provide."
naming_moment: |
  You are looking at the household expenses and you are carrying the weight of providing for them. One person's income. One person's earning capacity. Multiple human beings depending on that earning power. The provision pressure is the weight of being the safety net. If you cannot work, the household breaks. If you get sick, the household breaks. If you lose the job, the household breaks. This is the provision pressure—the weight of being responsible, the awareness of dependency, the financial vulnerability of being the primary or sole provider for multiple people.
forms:
  possessive: "the provision pressure's"
  verb_form: "pressing to provide"
