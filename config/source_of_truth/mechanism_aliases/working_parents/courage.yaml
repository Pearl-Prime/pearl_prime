persona: working_parents
topic: courage
short_form: "the ask for help problem"
descriptor: "The thing you need, held back by the story that you should be handling it."
naming_moment: |
  You need help. The thing you are juggling is too heavy. You could ask for it. And you don't. Because you are supposed to be able to handle this. You are supposed to be organized enough, strong enough, capable enough to manage your kids and your job and your household without asking. The story is old and it is in your bones. Asking for help means admitting you are not enough. So you hold it. This is the ask for help problem—the need that goes unspoken, the burden you carry because asking would mean admitting you cannot do it all alone.
forms:
  possessive: "the ask's"
  verb_form: "asking for help"
