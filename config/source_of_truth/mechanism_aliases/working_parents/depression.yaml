persona: working_parents
topic: depression
short_form: "the going through the motions"
descriptor: "Doing all of it, present for none of it, not sure when it changed."
naming_moment: |
  You are making dinner and you are not tasting it. You are in the soccer game and you are not watching it. You are on the work call and you are not thinking about it. You are going through all the motions and somewhere you stopped being present for any of it. The things you are doing feel hollow. The presence is gone. At some point, the automaticity took over and the engagement departed. This is the going through the motions—the doing without the presence, the functioning without the feeling, the performance of life while the actual living has gone quiet.
forms:
  possessive: "the going through the motions'"
  verb_form: "going through the motions"
