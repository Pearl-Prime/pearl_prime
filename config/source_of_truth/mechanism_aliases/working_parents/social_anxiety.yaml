persona: working_parents
topic: social_anxiety
short_form: "the parent performance"
descriptor: "The version of yourself you show at school pickup and class events."
naming_moment: |
  You are at school pickup and you are performing the parent version of yourself. You are put together. You are interested in the right way. You are saying the right things about your kids' development. You are not mentioning the yelling you did that morning. You are not mentioning the tension with your partner. You are performing the version of parenting that suggests you have it all under control. This is the parent performance—the curated version, the presentation you offer at the school gate, the difference between what happens at home and what appears at events.
forms:
  possessive: "the parent performance's"
  verb_form: "performing as a parent"
