persona: working_parents
topic: sleep_anxiety
short_form: "the 3am parent brain"
descriptor: "The mind that checks on everything at 3am even though nothing has changed."
naming_moment: |
  You wake up at 3am and your mind activates the check. Did I lock the door. Is the baby breathing. Did I pack the lunch. Did I respond to the email. Is the heat on. The check runs through all domains simultaneously. Your mind is doing a safety scan of the entire household. By 3am, you are fully awake and fully activated. The check keeps you up. This is the 3am parent brain—the mind that wakes up vigilant, the consciousness that runs through all the things, the wakefulness that is hard to recover from.
forms:
  possessive: "the 3am parent brain's"
  verb_form: "activating at 3am"
