persona: working_parents
topic: self_worth
short_form: "the split screen score"
descriptor: "The internal grade you give yourself for how you did at work and at home, simultaneously."
naming_moment: |
  You are grading yourself at work and you are also grading yourself at home. Today you did well at work but you had no patience with the kids. Yesterday you were fully present at home but you fell behind on a deadline. You are running dual scorecards. The day that goes well in one domain goes poorly in the other. You score yourself against standards that cannot both be met simultaneously. This is the split screen score—the internal grading that compares your performance across two incompatible demands, the simultaneous assessment that guarantees failure on at least one screen.
forms:
  possessive: "the split screen score's"
  verb_form: "scoring split screen"
