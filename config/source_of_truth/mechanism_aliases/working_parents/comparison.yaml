persona: working_parents
topic: comparison
short_form: "the other parent read"
descriptor: "Tracking other families as data points about whether your version is normal."
naming_moment: |
  You are at the school event and you are observing other parents. Which ones seem to have it together. Which ones are also juggling. How much are others working. How present are their kids. You are running data on other families, trying to understand whether your version of working and parenting is normal or failing. The comparison is constant. Other families are always evidence. This is the other parent read—the observation of how other people are doing it, the calculation of whether you are doing it right, the data-gathering that is supposed to bring reassurance but mostly brings more doubt.
forms:
  possessive: "the other parent read's"
  verb_form: "reading other parents"
