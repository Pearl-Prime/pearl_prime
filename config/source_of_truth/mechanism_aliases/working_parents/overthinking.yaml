persona: working_parents
topic: overthinking
short_form: "the risk assessment that never stops"
descriptor: "Running every parenting and work decision through every possible outcome."
naming_moment: |
  Your kid wants to sign up for a sport and you are running through every scenario. The time commitment. The cost. The what-if they hate it after three months. The what-if you miss a game. The what-if the coach is terrible. The what-if they get injured. The same risk assessment applies to work decisions. The risk-running is constant. You are always in scenario mode, always playing out possibilities, always calculating outcomes. This is the risk assessment that never stops—the constant scenario-running, the what-if machine that is always on, the calculation that never lands on a clear answer.
forms:
  possessive: "the risk assessment's"
  verb_form: "assessing risk"
