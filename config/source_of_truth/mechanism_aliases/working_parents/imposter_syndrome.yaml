persona: working_parents
topic: imposter_syndrome
short_form: "the good enough parent question"
descriptor: "The question that never gets answered, never stops being asked."
naming_moment: |
  You missed the school event because of work and you are asking if you are a good enough parent. You left work early for a sick kid and you are asking if you are a good enough employee. You are never doing enough of either. The good enough parent question activates in response to evidence that you are not doing all of parenting and all of work simultaneously. The question never gets answered because the evidence never stops arriving. This is the good enough parent question—the question that lives in the background, the assessment that never resolves, the doubt about whether you are actually doing either thing well enough.
forms:
  possessive: "the good enough parent question's"
  verb_form: "questioning good enough parenting"
