persona: working_parents
topic: financial_anxiety
short_form: "the childcare math"
descriptor: "The calculation that sometimes approaches the full value of one income."
naming_moment: |
  You are calculating what childcare costs and you realize it is nearly equal to what you earn. The economics are almost not there. The money you make is almost entirely consumed by the cost of someone else caring for your kids while you make it. The financial logic is barely working. You are working so that someone else can watch your kids while you work. This is the childcare math—the calculation that reveals the economic vulnerability, the thinness of the margin, the realization that the financial case is barely there.
forms:
  possessive: "the childcare math's"
  verb_form: "calculating childcare math"
