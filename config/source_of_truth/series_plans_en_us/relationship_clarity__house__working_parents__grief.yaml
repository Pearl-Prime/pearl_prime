reader_promise_family: A warm, unhurried place to sit with a loss that doesn't fit
  your schedule — where grief is not a task to finish but a guest to make room for,
  and where being a parent who is still grieving is allowed to be both true at once.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- It's OK That You're Not OK (Megan Devine) — refuses the fix-it script and sits with
  grief honestly, exactly the register this series lives in
- The Year of Magical Thinking (Joan Didion) — the unsparing, plainspoken interior
  of loss that keeps moving even when the world doesn't pause
- Bittersweet (Susan Cain) — makes room for longing and sorrow as part of a full life
  rather than a problem to be solved
