reader_avatar:
  age: 34-48
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is running,
    and you are standing in the kitchen in the dark with a dish towel in your hand,
    realizing you forgot to feel anything about the person you lost all day — and
    now that the house is quiet, it's all arriving at once, and you have to be up
    in nine hours.
  what_they_need: Permission to grieve in the margins of a life that won't pause for
    it; language for the loss they keep folding around their kids; and the relief
    of being met honestly instead of fixed.
  what_they_avoid: Stage-of-grief checklists, 'everything happens for a reason' comfort,
    productivity framing of healing, and anything that asks them to perform being
    okay for the people who depend on them.
series_voice_markers:
  register: warm, honest, relational; the calm of two chairs facing each other; gentle
    and direct about the conversation you keep avoiding, never clinical, never preachy,
    never hustle
  sentence_rhythm: plainspoken and unhurried; short declaratives that land like a
    hand on the shoulder, opening into longer sentences that follow a feeling all
    the way down; pauses where a kinder book would rush to reassure
  metaphor_family: two chairs facing each other, the empty chair at the table, the
    conversation you keep putting off, the door left ajar, what goes unsaid between
    people who love each other, sitting with someone instead of fixing them
_needs_authoring: false
