reader_promise_family: A quiet, unadorned companion for the manager whose mind won't
  stop turning a meeting over at midnight — no system to install, no calm to perform,
  just permission to set the thought down and let the room go quiet.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- Don't Believe Everything You Think (Joseph Nguyen) — strips overthinking down to
  a single recognizable mechanism instead of a toolkit
- The Untethered Soul (Michael A. Singer) — quiet, spacious voice that teaches the
  reader to step back from the inner narrator rather than argue with it
- Stop Overthinking (Nick Trenton) — names the exact rumination loop a busy professional
  lives in, plainspoken and without hustle
