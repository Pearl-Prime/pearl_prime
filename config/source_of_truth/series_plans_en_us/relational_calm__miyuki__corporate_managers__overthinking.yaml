  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 35-52
  where_they_are: It's 11:40pm. The house is finally still. You replayed the one-on-one
    from this afternoon four times on the drive home, and now you're lying in the
    dark rewriting the email you already sent, certain there was a better word, certain
    someone read your silence as a verdict.
  what_they_need: To recognize that the relentless turning-over is a tired alarm doing
    its job, not the truth about who they are — and to be allowed to stop managing
    the thought the way they manage everyone else.
  what_they_avoid: Productivity frameworks, 'communication hacks', mindfulness as
    one more KPI, performative composure, and any book that asks an already-crowded
    mind to do more.
series_voice_markers:
  register: spare, clear, unadorned — a quiet presence in the room with you, gentle
    and direct, never clinical, never preachy, never hustle
  sentence_rhythm: short declaratives that land and leave space; the pause after a
    sentence does as much work as the sentence; nothing crowded, nothing rushed
  metaphor_family: bare form and empty space — the room with nothing extra in it,
    the stillness between two people, the unsaid that settles, clean light, the breath
    in a quiet room, what remains when the clutter falls away
_needs_authoring: false
