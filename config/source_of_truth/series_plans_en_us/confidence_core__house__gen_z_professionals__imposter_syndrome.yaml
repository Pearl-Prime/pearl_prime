reader_avatar:
  age: 22 to 31
  where_they_are: 'It''s a Tuesday and you''re three months into the job everyone
    congratulated you for, sitting in a meeting where someone just said ''great point''
    and you felt your stomach drop because now they''ll expect you to have another
    one. Your laptop is open to a doc you''ve reread eleven times. Slack is green.
    You are nodding like you understand, and underneath the nodding is a quiet, full-time
    hum: any minute now, someone is going to realize they made a mistake hiring you.'
  what_they_need: To recognize that the feeling of being a fraud is not evidence of
    being one — and to learn what it actually costs to keep performing competence
    instead of inhabiting it. They need permission to be early in something without
    it meaning they don't belong in it.
  what_they_avoid: Fake-it-til-you-make-it advice, LinkedIn confidence theater, 'just
    own the room' coaching, manifestation, hustle-culture grind worship, and any voice
    that mistakes volume for belonging or tells them their doubt is a personal failing
    to optimize away.
series_voice_markers:
  register: encouraging, clear, steady; warm and direct; the voice of someone a few
    steps ahead who turned around to hold the door — believes in you completely without
    ever flattering you, never clinical, never preachy, never hustle
  sentence_rhythm: Plainspoken and unhurried, mostly mid-length declaratives that
    land on a clean beat. Occasional short sentences used like a hand on the shoulder.
    Builds in small, patient steps, the way you'd describe a room to someone standing
    just outside its door.
  metaphor_family: 'The threshold and the doorway: crossing from one room into the
    next, the first step over a drawn line, the held breath before you enter, who
    you become on the other side of a door you''ve been standing at for months. Never
    machinery, military, productivity hacks, or biohacking.'
_needs_authoring: false
