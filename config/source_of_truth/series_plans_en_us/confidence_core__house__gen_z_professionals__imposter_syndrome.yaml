reader_promise_family: You will learn to stand in the doorway of who you are becoming
  without first proving you deserve to be there. This series meets the young professional
  who is certain they slipped in by accident, and walks with them across the threshold
  from hiding to belonging — not by inflating who they are, but by setting down what
  they were never required to carry.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Mountain Is You (Brianna Wiest) — for readers ready to stop self-sabotaging
  their own competence, in a warm, non-clinical, self-reflective register.
- How to Do the Work (Nicole LePera) — for young readers who want to understand the
  inherited beliefs driving their self-doubt rather than just push through them.
- The Gifts of Imperfection (Brené Brown) — for the reader whose perfectionism and
  hiding are really about worthiness, met with permission instead of pressure.
