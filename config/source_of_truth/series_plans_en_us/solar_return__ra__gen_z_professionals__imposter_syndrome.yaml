reader_promise_family: We will not talk you out of feeling like a fraud, and we will
  not hand you a louder voice to drown it out. We sit with the early-career mind that
  is sure it got in by mistake — and we tend the small, real warmth that was there
  underneath the doubt the whole time, until you can warm your hands at it again.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Daily Stoic series (Ryan Holiday) — short, warm, returnable daily companionship
  for a restless professional mind, without the hustle gloss
- The Comfort Book / Reasons to Stay Alive (Matt Haig) — plainspoken, tender second-person
  company that names hard interior weather instead of fixing it
- How to Do the Work / self-worth lineage (Nicole LePera) — names the over-functioning
  and the hidden defect-belief that drive imposter feeling, for a younger professional
  reader
