reader_avatar:
  age: 22-29, early-career creative and knowledge workers — first real job, first
    promotion, first time being the one in the room whose answer counts
  where_they_are: It's 9:14pm and you're still at your laptop, rereading a Slack message
    you already sent, certain the wording gave you away. The offer was real. The title
    is real. And somewhere under your sternum a cold little voice keeps doing the
    math on when, exactly, they'll figure out they hired the wrong person.
  what_they_need: To hear that the dread under the achievement has a name and a shape,
    that the over-preparing and the midnight emails are a fire they've been feeding
    to stay safe — and that the warmth they keep performing for other people was always
    theirs to keep
  what_they_avoid: rah-rah motivation, hustle-culture pep talks, 'just own your worth'
    affirmations, LinkedIn-flavored confidence theater, and any voice that mistakes
    being loud for being warm
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone who has tended
    their own cold seasons and pulls a second chair up to the fire; affirming without
    hype, never a coach, never a clinician
  sentence_rhythm: plainspoken and close, short declaratives that land like a hand
    on the shoulder, then one longer breath that opens the feeling back up; tender
    but unflinching, never clipped, never breathless
  metaphor_family: ember and ash, the banked fire that looks dead but isn't, the slow
    rekindling, first light at the cold end of the night, warmth returning to numb
    hands, what survives a burn and grows back green — never machinery, military,
    productivity, or biohacking
_needs_authoring: false
