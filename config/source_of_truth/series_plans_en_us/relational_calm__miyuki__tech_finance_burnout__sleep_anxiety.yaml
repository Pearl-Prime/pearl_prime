reader_avatar:
  age: 31-46
  where_they_are: It's 2:14am on a work night. The laptop is shut, the apartment is
    silent, the partner beside them is breathing slow and even. They are flat on their
    back doing the math they swore they'd stop doing — the runway, the deck due Thursday,
    the number that didn't move this quarter. Their body is braced like something
    is about to happen, though nothing is. Tomorrow there's a standup at nine, and
    they already know how they'll feel walking into it.
  what_they_need: To understand that the same instrument that makes them good at their
    job — the scanning, the forecasting, the relentless readiness — is what's keeping
    them awake, and that they cannot out-perform their way to rest. They need to be
    met without being optimized, to feel the difference between a real threat and
    a false alarm, and to be given back the empty, undemanding stillness that work
    has crowded out of their nights.
  what_they_avoid: Sleep-optimization protocols, wearables that score their rest,
    '10 hacks for better sleep,' breathing techniques framed as productivity inputs,
    toxic positivity, anything that turns recovery into one more KPI to hit, and any
    book that treats their racing mind as a bug to be patched rather than a person
    to be heard.
series_voice_markers:
  register: Spare, clear, unadorned — a quiet presence in a dark room rather than
    a clinician at a desk. Gentle and direct; says only what is needed and then stops.
    Speaks to the reader as a tired, capable person, never a patient or a project.
    Never preachy, never hustle, never performatively calm.
  sentence_rhythm: Short, settled sentences with room around them. Plain words. Frequent
    full stops where another writer would push on. The prose breathes the way a quiet
    room breathes — pauses are part of the meaning, and nothing is crowded.
  metaphor_family: Bare form and empty space; the room with nothing extra in it; the
    breath in a quiet room; clean light coming up slow; the stillness between two
    people who don't need to speak; what remains when the clutter falls away; the
    doorway you can stand in without crossing. Never machinery, military, biohacking,
    or productivity imagery.
