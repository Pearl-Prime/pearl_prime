reader_promise_family: A spare, unhurried companion for the high-performing mind that
  goes quiet everywhere but the bedroom — books that strip away the optimizing, the
  tracking, the fixing, and simply sit with you in the dark until the alarm in your
  body learns it is safe to stand down. No protocols. No sleep hacks. Just clean light,
  an empty room, and permission to stop managing the night.
bestseller_hook_family: ''
emotional_engine: sleep_anxiety_recognition
comp_series:
- Don't Believe Everything You Think (Joseph Nguyen) — strips overthinking down to
  its barest mechanism and offers stillness instead of strategy, the same uncluttered
  register.
- The Power of Now (Eckhart Tolle) — a spare, present-tense voice that meets the racing
  mind with spaciousness rather than fixes, kin to this series' empty-room calm.
- Why We Sleep (Matthew Walker) — the definitive sleep-science shelf companion these
  readers already own; this series sits beside it as the human, unclinical counterpart
  for the anxious mind it leaves unaddressed.
