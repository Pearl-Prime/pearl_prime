reader_avatar:
  age: 28-38
  where_they_are: It's 11pm on a Sunday, the laptop is open to a job posting she's
    read four times, and the cursor is blinking in an empty cover-letter field. The
    Slack from her manager about 'taking point on the next one' is still unanswered
    in another tab. She is more qualified than she feels and she knows it, and she
    still can't make her hands type the first line.
  what_they_need: Permission to want more without having to perform certainty; a quiet,
    honest companion for the gap between who she is at work and who she suspects she
    could be; language for the fear so it stops running the room.
  what_they_avoid: Girlboss and grindset slogans, 'manifest your dream job,' LinkedIn-influencer
    triumph posts, anyone who tells her the fear is just a mindset she should have
    fixed by now, and toxic positivity that skips the part where this is genuinely
    hard.
series_voice_markers:
  register: encouraging, forward-looking, grounded; warm and practical, honest about
    the fear; the voice of a slightly-further-along friend who has sat in the same
    chair, never a clinician, never a hype coach
  sentence_rhythm: plainspoken declaratives that land, then open out; short sentences
    for the hard truths, longer ones to make room to breathe; second person throughout,
    present-tense intimacy
  metaphor_family: the next chapter and the turning page, the path that opens ahead,
    the step up that costs something, the room she hasn't entered yet, the draft she's
    still writing, what comes after the part she already knows
_needs_authoring: false
