reader_promise_family: You don't have to feel ready, fearless, or fully qualified
  to take the next step in your career. This series sits with the fear instead of
  shouting it down, and helps you move toward the work you want while the fear is
  still in the room.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Mountain Is You series (Brianna Wiest) — gentle, interior books for ambitious
  women undoing their own self-sabotage without hustle language
- Untamed and the Glennon Doyle catalog (Glennon Doyle) — honest, first-person permission
  to want more out loud, written for women who've outgrown the role they were handed
- Big Magic / The Daring Way-adjacent Brené Brown titles (Brené Brown) — courage and
  vulnerability reframed as the price of a bigger life, never as a personality flaw
