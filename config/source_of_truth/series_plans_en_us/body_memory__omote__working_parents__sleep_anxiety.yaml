reader_promise_family: 'For the working parent whose body won''t believe the day is
  over: a steady, ground-level voice that meets you at lights-out and stays — never
  to fix your sleep, only to help your nervous system finally feel held enough to
  set the day down.'
bestseller_hook_family: ''
emotional_engine: sleep_anxiety_recognition
comp_series:
- Good Inside (Dr. Becky Kennedy) — meets overwhelmed parents with steadiness instead
  of one more thing to do right
- The Body Keeps the Score adjacent (Bessel van der Kolk) — the body-holds-what-the-mind-can't
  lineage, made gentle and bedside
- Burnout (Emily & Amelia Nagoski) — names the unfinished stress cycle parents carry
  to bed, without hustle or shame
