reader_avatar:
  age: 32 to 47
  where_they_are: It's 11:40pm. The kids are finally asleep, the dishwasher is humming,
    tomorrow's lunches are made — and you are lying in the dark, rigid, heart going,
    certain something is wrong even though you just checked and everyone is breathing.
    You have to be up in six hours. You can feel them ticking down.
  what_they_need: To understand that a body that has spent all day on alert for everyone
    else doesn't switch off on command — and to be shown how to signal safety to it
    without pushing, performing, or one more thing to get right.
  what_they_avoid: Sleep-hacking checklists, 'just relax,' optimized bedtime routines
    that become one more chore to fail at, cheerful wellness positivity, and anything
    that treats their exhaustion as a discipline problem.
series_voice_markers:
  register: grounded, steady, holding; warm and plain, the voice of someone sitting
    on the edge of the bed in the dark who is not going anywhere — never clinical,
    never a sleep coach, never hustle
  sentence_rhythm: unhurried and weighted; short declaratives that land and settle,
    room to breathe between them, the pacing of a slow exhale rather than instruction
  metaphor_family: held ground and the earth beneath the bed, weight supported and
    set down, the body remembering it is safe, roots and steadiness, what holds when
    the day won't stop shaking — never machinery, optimization, or biohacking
_needs_authoring: false
