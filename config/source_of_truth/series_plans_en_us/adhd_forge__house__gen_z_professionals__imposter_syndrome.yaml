reader_promise_family: >
  You'll learn to catch the imposter voice in the act — the one that swears you only
  got here by accident and the room is about to find out — without trying to argue it
  away, hustle past it, or fix the wiring underneath. Two books, two different doors
  into the same fear. Each one meets that sinking certainty from a new angle, in
  language you can actually use the next time your name gets called and your stomach
  drops.
bestseller_hook_family: recognition_not_fix
emotional_engine: imposter_syndrome_recognition
comp_series:
- "The Imposter Cure (Jessamy Hibberd) — naming the fraud feeling without shame"
- "How to Keep House While Drowning (KC Davis) — function over performance, no fixing"
- "The Mountain Is You (Brianna Wiest) — the quiet self-sabotage underneath the success"
