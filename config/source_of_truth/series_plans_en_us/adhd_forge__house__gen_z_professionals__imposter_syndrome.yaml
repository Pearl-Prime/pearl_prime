reader_avatar:
  age: "24–33"
  where_they_are: >
    It's 11:40pm and they're still rereading the Slack message they sent six hours
    ago, certain the phrasing gave them away — twenty tabs open, the promotion they
    just got sitting in their inbox like an accusation, half-sure someone smarter
    was supposed to have this job.
  what_they_need: >
    Someone who treats the brain that hyperfocuses, masks, and over-delivers as
    wired differently rather than secretly inadequate — who names the fraud feeling
    out loud without handing them one more system to white-knuckle.
  what_they_avoid: >
    Confidence affirmations. 'Fake it till you make it' pep talks. Diagnostic
    checklists and ten-step frameworks that turn their own mind into one more
    project they're already behind on.
series_voice_markers:
  register: "direct, warm, real-talk; a sharp friend two years ahead of you, not a coach or a clinician"
  sentence_rhythm: "short, punchy lines that land like texts; the occasional longer sentence that slows down and sits with you"
  metaphor_family: "the open tabs, the lit screen, the group chat, the room, weather and tide — never machinery, military, or productivity-stack"
  second_person_default: true
_needs_authoring: false
