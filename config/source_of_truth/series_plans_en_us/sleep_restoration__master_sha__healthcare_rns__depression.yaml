reader_avatar:
  age: 32-55
  where_they_are: It's 4am after a long shift. The house is dark, the scrubs are in
    a pile by the door, and you are lying on top of the covers because getting under
    them feels like too much. You held three families together tonight. You charted,
    you reassured, you caught what the resident missed. And now, in the quiet, there
    is a heaviness pressing on your chest that has no name and no order to write for
    it — and a small, scared thought that maybe this is just who you are now.
  what_they_need: To be met without being assessed. To hear that the flatness and
    the heaviness are not a character flaw or a failure of resilience, but weight
    that was never set down. To be allowed to grieve the losses no one let you grieve,
    and to stop monitoring your own mind like a patient on a telemetry strip. A voice
    that holds the heavy hours with her instead of handing her a protocol.
  what_they_avoid: Resilience lectures and 'self-care' that's really one more task.
    Push-through toughness, 'you've got this' platitudes, and anyone who treats her
    exhaustion as a mindset problem. Toxic positivity. Anything that rushes her grief,
    optimizes her recovery, or treats rest and feeling as weakness she should have
    managed better.
series_voice_markers:
  register: Steady, nocturnal, quietly architectural — a calm presence who sits with
    you through the heavy hours, holds without fixing, and never once reaches for
    the chart. Never clinical, never a coach, never hustle.
  sentence_rhythm: Unhurried and grounded. Short declaratives that let weight land,
    opening into longer settling lines, then returning to a single quiet sentence
    — the cadence of someone speaking softly in a dark room so as not to startle you.
  metaphor_family: Night and the dark room; foundations and load-bearing walls; a
    heavy thing finally set down; the body settling toward rest; the long quiet hours
    before dawn; the structure that holds you while you let go. Never productivity,
    machinery, military, or biohacking.
_needs_authoring: false
