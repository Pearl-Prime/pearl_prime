reader_promise_family: 'For the nurse who holds everyone else through the night and
  has nothing left for the weight she carries home: a steady, nocturnal companion
  that sits with depression in the dark instead of trying to fix it — naming the flood,
  the unmourned losses, and the mind that never clocks out, and giving you permission
  to set the load down.'
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- Good Inside / How to Keep House While Drowning (KC Davis) — the same permission-not-pressure
  tone for people drowning under invisible weight, refusing the productivity frame.
- 'The Body Keeps the Score companion-readers like ''Burnout: The Secret to Unlocking
  the Stress Cycle'' (Emily & Amelia Nagoski) — names the body''s accumulated load
  in helpers and caregivers without shaming them.'
- Reasons to Stay Alive / Notes on a Nervous Planet (Matt Haig) — intimate, plainspoken,
  lived-from-inside depression writing that sits beside the reader instead of instructing
  them.
