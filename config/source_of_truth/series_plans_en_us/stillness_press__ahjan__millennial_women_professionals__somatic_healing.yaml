reader_avatar:
  age: 31 to 42
  where_they_are: It's a Tuesday and she's the one everyone counts on. A senior manager
    at a mid-size company, the person who remembers the dentist appointments and the
    quarterly deadlines both. She looks composed in the meeting, answers the Slack
    message at 9:40pm, and then sits in the parked car in the garage for a minute
    longer than she needs to, hand on her chest, not sure why her body feels like
    it's still bracing.
  what_they_need: Language for what is happening inside her that isn't 'just stress'
    and isn't a diagnosis to manage — a way to be with the held tension, the bracing,
    the loops, that doesn't ask her to perform calm or add one more practice to a
    life already full. She needs to feel accompanied, not coached.
  what_they_avoid: Hustle-culture reframes, 'optimize your mindset' productivity gloss,
    just-breathe platitudes, toxic positivity, and any book that turns healing into
    one more standard she's failing to meet. She is allergic to the word 'should'
    and to anyone who has clearly never sat in the feeling themselves.
series_voice_markers:
  register: Contemplative, spacious, grounded — the unhurried voice of someone who
    has sat in this himself and isn't in a rush to get you out of it. Never clinical,
    never a coach, never hustle. Present, like someone sitting beside you who has
    nowhere else to be.
  sentence_rhythm: Long settling sentences that open out, then a short one that lands
    and lets the silence in. Cadence built to be read slowly — on a train, between
    meetings, at 3am. Plenty of pauses. Nothing hurried.
  metaphor_family: Stillness and breath; settling water and silt sinking to the bottom
    of a glass; open ground; light coming slow through a window; the pause between
    an inhale and the next breath. Never machinery, never optimization, never the
    body as a system to debug.
_needs_authoring: false
