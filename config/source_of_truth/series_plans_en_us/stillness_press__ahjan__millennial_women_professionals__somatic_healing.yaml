reader_promise_family: 'You will learn to recognize what your body has been doing
  all along — not to fix it, optimize it, or finally get on top of it, but to stop
  being a stranger to your own nervous system. Each book is a doorway into the same
  quiet truth: the body has been keeping a record, and you can learn to read it without
  forcing it to stop.'
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational body-holds-trauma
  frame these readers already half-know
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — completing
  the stress response in the body, written for high-functioning women'
- When the Body Says No (Gabor Maté) — the cost of being the one who holds it all
  together, named with compassion rather than blame
