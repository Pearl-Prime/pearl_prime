reader_promise_family: 'For the high-performer the work hollowed out: a quiet, non-clinical
  companion that meets depression not as a problem to fix or optimize but as a fog
  you can finally stop fighting — pointing past the exhausted, achieving self toward
  what in you was never depleted, never broken, and never for sale.'
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — same invitation to step back from
  the relentless mental machinery and rest as the awareness underneath, in plain non-dogmatic
  language.
- When Things Fall Apart and the Shambhala Pocket Classics (Pema Chödrön) — meets
  the dark and the falling-apart with tenderness instead of a fix, the exact register
  a burned-out reader can tolerate.
- The Wisdom of Insecurity / This Is It (Alan Watts) — quietly radical, points past
  the achieving self toward what is already free, for the reader allergic to guru-speak
  and self-help cheer.
