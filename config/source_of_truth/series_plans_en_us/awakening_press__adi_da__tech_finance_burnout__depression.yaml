reader_avatar:
  age: 29-44
  where_they_are: It's a Tuesday at 8:40pm. The laptop is still open on the kitchen
    counter, three Slack threads unanswered, a calendar that says they're crushing
    it. They've been staring at the same email for twenty minutes and can't make their
    hands type. By every metric — comp, title, the round that closed — they are winning.
    So they cannot understand why getting out of bed this morning felt like lifting
    something off their own chest, or why nothing, not the win, not the weekend, not
    the people they love, lands anymore.
  what_they_need: To hear, without a diagnosis or a productivity hack, that the flatness
    is not a character flaw or a performance problem — and that there is something
    underneath the high-functioning machine they've become that the work never touched
    and can't take.
  what_they_avoid: Toxic positivity, 'just be grateful,' biohacking and morning-routine
    fixes, hustle-culture reframes that turn healing into one more KPI, guru-speak
    and 'raise your vibration' clichés, and clinical jargon that makes them feel like
    a case file.
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate not lofty, reverent without
    dogma; the voice of someone who has sat in the same fog and is not in a hurry
    to pull you out of it — never clinical, never preachy, never hustle
  sentence_rhythm: slow and unhurried, breath-paced; short declaratives that land
    like a hand on the shoulder, set against longer sentences that open like a window;
    lots of white space, room to exhale, never crowded
  metaphor_family: weight lifting off the chest, the body in bed beneath a ceiling,
    fog thinning to reveal a sky that was always there, waking from a dream you mistook
    for your life, the light already in the room before you named the dark, coming
    home to what was never lost
_needs_authoring: false
