reader_promise_family: You will not be coached into worthiness or taught to earn it.
  You'll be sat with, close, until you remember it was never in question — that the
  value you've been trying to prove was already yours, quietly, the whole time.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Gifts of Imperfection (Brené Brown) — the foundational text on worthiness over
  performance, written warm rather than clinical, for the same reader who overworks
  to hide a felt defect
- Radical Acceptance (Tara Brach) — meets self-judgment with tenderness instead of
  technique, the closest cousin in register to this series' heart-to-heart voice
- How to Do the Work (Nicole LePera) — the Gen Z self-worth shelf-mate this reader
  already owns, sharing the early-career audience while this series trades its program
  for presence
