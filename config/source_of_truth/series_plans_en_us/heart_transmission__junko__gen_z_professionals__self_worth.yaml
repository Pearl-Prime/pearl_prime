    max_books_per_brand_per_month: 2
reader_avatar:
  age: early-to-mid twenties, two or three years into the first real job
  where_they_are: It's a Tuesday night and you're still at your laptop, rereading
    the Slack message you sent four hours ago, certain you sounded stupid. Everyone
    replied with a thumbs-up. You believe none of them. The work is fine. You are
    sure, somewhere under the ribs, that you are not.
  what_they_need: to feel, even once, that their worth doesn't depend on the next
    review, the next launch, the next person's approval — and to be met there gently,
    not corrected
  what_they_avoid: self-help that turns the heart into a project — confidence drills,
    worthiness checklists, 'just believe in yourself' affirmations, and any voice
    that performs healing instead of offering it
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; the warmth of someone sitting
    close in a softly lit room, speaking to you and only you — never the brightness
    of a stage, never the cool of a clinic
  sentence_rhythm: unhurried and breath-paced; short tender lines that land and rest,
    opening into one longer sentence when something needs to be held, then returning
    to quiet
  metaphor_family: the heart and what passes between two of them — light handed from
    one palm to another, a held gaze in an unguarded moment, warmth shared in a quiet
    room, the open hand, what is transmitted without a single word
_needs_authoring: false
