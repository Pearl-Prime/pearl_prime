reader_promise_family: You are not a project to be finished or a brand to be optimized.
  Underneath the version of you that performs being fine, there is a person who was
  always allowed to be unfinished — and these books help you find your way back to
  them, one honest mark at a time.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Lazy Genius (Kendra Adachi) — warm, permission-giving anti-optimization voice
  for an overextended generation
- How to Do the Work (Nicole LePera) — interior, self-compassionate reframing of the
  beliefs running underneath the performance
- Real Self-Care (Pooja Lakshmin) — names the hustle-culture trap of treating your
  worth as output and refuses to sell another fix
