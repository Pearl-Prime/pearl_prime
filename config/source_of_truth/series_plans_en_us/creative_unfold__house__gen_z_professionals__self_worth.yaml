reader_avatar:
  age: 23 to 31
  where_they_are: It's 9:40pm and you're still at your laptop in a studio apartment,
    a half-eaten dinner going cold, refreshing the Slack channel where someone two
    years younger just got praised. Your camera was off all day in meetings so no
    one could see your face do the thing it does. Everyone in the glass conference
    room this afternoon looked like they belonged there. You laughed at the right
    moments. You went home and felt like a fraud who got away with it again.
  what_they_need: To stop treating their own worth as a deliverable — to feel, even
    for one quiet evening, that they are enough before they produce anything, and
    that the self they hide might be the only part worth keeping.
  what_they_avoid: '''Unleash your inner genius'' hype, LinkedIn-flavored confidence
    hacks, hustle-culture self-improvement, toxic positivity that tells them to just
    be grateful, and any book that turns their becoming into another KPI to hit.'
series_voice_markers:
  register: open, warm, encouraging, and unflinchingly honest; the voice of an older
    friend who's done the same job and survived it, sitting across from you with the
    laptops closed — never clinical, never preachy, never selling a hustle
  sentence_rhythm: conversational and uneven on purpose; short declaratives that land
    like a first brushstroke, then longer breathing lines that let a feeling open;
    questions left genuinely open instead of answered for you
  metaphor_family: the blank canvas and the first mark, the empty page, the draft
    you are allowed to ruin, color returning to something that went grey, the unfinished
    and the becoming, what wants to be made through you when you stop performing
_needs_authoring: false
