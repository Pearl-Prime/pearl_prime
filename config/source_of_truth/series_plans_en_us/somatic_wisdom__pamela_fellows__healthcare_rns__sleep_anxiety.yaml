reader_promise_family: 'For the nurse who can soothe everyone but herself at 2am:
  a body-first, trauma-informed way back to sleep that never asks you to push through,
  override, or out-discipline your own nervous system — only to let the braced places
  soften and the ground hold you again.'
bestseller_hook_family: ''
emotional_engine: sleep_anxiety_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational case that the
  body holds what the mind can't, and healing has to go through it, not around it
- Why We Sleep (Matthew Walker) — the cultural touchstone for sleep-deprived caregivers,
  here met with compassion instead of one more alarming statistic
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  completing the body''s stress response rather than willing it away, written for
  women running on empty in caregiving roles'
