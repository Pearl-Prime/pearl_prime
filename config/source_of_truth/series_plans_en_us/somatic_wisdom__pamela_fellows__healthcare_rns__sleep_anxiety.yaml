reader_avatar:
  age: 29-52
  where_they_are: It's 2:40am after a string of nights, or the dead middle of a day-sleep
    with the blackout curtains drawn. You did everything right — you're exhausted,
    the shift is over — and your body is lying flat but wide awake, jaw set, shoulders
    up near your ears, listening for a call light that isn't there.
  what_they_need: To feel safe enough in their own body to let go of the watch — a
    felt sense of the bed holding them, the breath lengthening on its own, the nervous
    system allowed to come down off shift instead of being ordered to.
  what_they_avoid: Sleep-hygiene checklists barked like orders, 'just stop thinking
    about it,' optimization and tracking, white-knuckle discipline, and anything that
    treats a body shaped by years of emergencies as a problem to override rather than
    a system to settle.
series_voice_markers:
  register: embodied, grounded, gently somatic and trauma-informed; the voice of a
    fellow nurse sitting on the edge of your bed in the dark — never a clinician at
    the foot of it, never hustle, never push-through
  sentence_rhythm: slow and breath-paced; short grounding sentences that let the body
    land between them, then a longer settling line that exhales; second person throughout,
    present-tense, the cadence of someone helping you down off high alert
  metaphor_family: the body's felt sense; breath and the weight of the bed; tension
    held in the jaw and shoulders and finally released; the nervous system settling
    like weather passing; the ground beneath the mattress; warmth returning to a braced,
    guarded place; coming down off shift
_needs_authoring: false
