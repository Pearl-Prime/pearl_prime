reader_promise_family: You can have a limit without owing anyone an apology for it.
  This series doesn't teach you to log off, perform calm, or become the chill low-maintenance
  person who needs nothing. It sits with you in the moment the 'no' rises in your
  chest and the panic rises right behind it, and it lets the no be allowed. Boundaries,
  here, are not walls you build against people. They are the ground you stand on so
  you can actually stay in the room.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Unfuck Your Boundaries (Faith G. Harper) — frank, body-aware, anti-clinical takes
  on limits that don't talk down to a younger reader
- How to Do the Work (Nicole LePera) — somatic, self-aware self-help that names the
  nervous-system roots of people-pleasing without grindset framing
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the modern boundary bestseller
  this series sits beside, reframed for a screen-native, always-on generation
