reader_avatar:
  age: Gen Alpha and the youngest of Gen Z — 16 to 22, in high school or the first
    years of college, raised inside the group chat
  where_they_are: It's 11:40pm. The group chat has 47 unread and someone just @'d
    you to 'confirm you're still in.' Your thumb is hovering over the text box. You've
    typed 'yeah for sure' and deleted it twice. You don't want to go. You also can't
    find a single way to say that which doesn't feel like setting off a bomb in a
    room full of people you have to see at 8am.
  what_they_need: Permission to want space without a 14-line justification. A way
    to feel the 'no' in their body as information instead of as a threat. To learn
    that being a little less available will not actually end them — and that the people
    who only liked the always-on version were never really in the room with them anyway.
  what_they_avoid: Boomer 'just put the phone down' advice. Grindset accounts that
    frame a boundary as a productivity hack. Toxic-positive 'protect your peace, queen'
    captions that turn a real, scary limit into an aesthetic. Anything that calls
    them a personal brand, treats their attention like inventory, or shames them for
    being online in the first place.
series_voice_markers:
  register: gen-z native, screen-literate, plainspoken and warm; the voice of a slightly-older
    friend who actually gets the internet — ironic without being cynical, never clinical,
    never a coach, never hustle
  sentence_rhythm: short sentences that land like sent texts; a long roll-on thought
    when the spiral builds, then one clean line that cuts through; lowercase intimacy
    in the felt moments, full stops where it counts; rhetorical questions you'd actually
    ask yourself at midnight
  metaphor_family: the phone face-down on the table, the read receipt, the door you're
    allowed to close, the breath between two notifications, ground under your feet,
    signal cutting through noise, the line you get to draw — never machinery, military,
    productivity, or self-optimization
_needs_authoring: false
