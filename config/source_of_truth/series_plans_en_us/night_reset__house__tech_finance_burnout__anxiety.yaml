reader_promise_family: >
  At 3am, awake, you'll learn to recognize what your wired-tight nervous system
  is actually doing — without trying to optimize it, fix it, or make it stop.
  Seven books, seven different doorways into the same long night. Each one meets
  the same restlessness from a new angle, in language you can use the next time
  the dark gets loud.
bestseller_hook_family: recognition_descent
emotional_engine: anxiety_recognition
comp_series:
- "Why We Sleep (Matthew Walker) — authoritative, humane on the sleepless body"
- "Unwinding Anxiety (Judson Brewer) — mechanism plus noticing register"
- "When Things Fall Apart (Pema Chödrön) — surrender, not solution"
platform_strategy:
  primary:
  - kdp_ebook
  - audible
  secondary:
  - apple_books
  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: "32–48"
  where_they_are: >
    It's 3:14am. The room is dark, the phone is face-down and glowing anyway, and
    they're running yesterday's decisions like a market that never closes — heart
    going, certain something is wrong and unable to name what.
  what_they_need: >
    Someone who treats the wired, sleepless body as intelligent rather than broken —
    who names the night without prescribing a routine to defeat it.
  what_they_avoid: >
    Sleep hygiene checklists. 'Optimize your recovery' biohacking. Anything that turns
    rest into one more performance metric to win.
series_voice_markers:
  register: "intimate, nocturnal, plainspoken; the voice of someone awake in the next room, not a clinician"
  sentence_rhythm: "short sentences dominant, the cadence of a quiet room; occasional long, slowing contemplative lines"
  metaphor_family: "night, the body, weather, tide, the lit screen in the dark — never productivity, machinery, or military"
  second_person_default: true
_needs_authoring: false
