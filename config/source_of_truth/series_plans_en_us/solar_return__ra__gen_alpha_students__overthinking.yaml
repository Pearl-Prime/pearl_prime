reader_avatar:
  age: '14 to 22 — the always-tracked generation: high schoolers, first-years, the
    ones who grew up graded, ranked, and watched, and never learned where the scoring
    stops'
  where_they_are: It's 1:14am. The assignment is half-done, three tabs are open, and
    you've just re-read a message you sent six hours ago for the ninth time. Your
    phone glows face-down on the duvet like a coal you can't stop touching. Everyone
    in the group chat went quiet an hour ago and you're still here, awake, running
    it all again.
  what_they_need: To be told that the loud, fast, scanning mind isn't a malfunction
    — it's a fire that nobody taught them to bank. They need a warm, plain voice that
    names the false alarms, the spirals, and the watcher without pathologizing them,
    and gives permission to stop running the night on high alert.
  what_they_avoid: Grindset productivity hacks, 'just think positive', manifest-it
    pep talks, anything that treats their mind like a machine to optimize or a problem
    to debug. They've been performance-coached their whole lives and they can smell
    hype from the first sentence.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone sitting on the
    floor of your room at 2am who has been exactly here, never a clinician and never
    a coach; tends the fire, doesn't push it
  sentence_rhythm: short, breath-paced sentences that slow the racing mind; long warm
    lines that open out like dawn, then a single short line that lands like an ember
    settling; second person throughout
  metaphor_family: ember and ash, the banked fire and the slow rekindling, first light
    over a cold room, warmth returning to numb hands, the doorway and the threshold,
    the turning of the year, what survives the burn and grows back green
_needs_authoring: false
