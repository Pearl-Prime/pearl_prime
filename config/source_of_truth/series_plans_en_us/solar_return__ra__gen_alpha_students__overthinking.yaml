reader_promise_family: We will not try to switch off your mind — that mind is bright,
  and it is yours. We will sit beside it in the dark, give it a name, and let it bank
  down to an ember instead of a wildfire, until thinking feels like warmth again and
  not a thing that burns you from the inside.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- Good Vibes, Good Life series (Vex King) — warm, permission-giving self-help that
  a young reader actually trusts, without the grindset
- The Comfort Book / companion volumes (Matt Haig) — short, tender, plainspoken entries
  for an anxious mind, a voice from the next room not the clinic
- Unfu*k Yourself series (Gary John Bishop) — direct, quietly fierce talk to a stuck
  young person, but we keep the warmth where Bishop keeps the edge
