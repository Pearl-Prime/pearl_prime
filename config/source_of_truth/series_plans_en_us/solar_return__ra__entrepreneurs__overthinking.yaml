  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 32-48
  where_they_are: It's 1am and the laptop is finally shut, but you're lying in the
    dark re-running the same Slack message, the same investor call, the same hire
    you're not sure about — your whole body still humming like a fire stoked too high,
    while everyone you know seems to be asleep, untroubled, fine.
  what_they_need: To understand that the relentless thinking is a fire that learned
    to keep itself lit to keep you safe, and to find a gentler way to bank it — so
    the same mind that builds the company stops burning down the founder.
  what_they_avoid: Hustle-culture pep talks, 'just optimize your morning routine'
    productivity hacks, manifestation, toxic positivity, and any voice that treats
    a tired founder like a machine that needs a faster processor.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone who has run the
    company and lain awake too, tending the reader back toward their own warmth rather
    than pushing; never clinical, never a coach, never a hype man
  sentence_rhythm: unhurried and breath-paced; short declaratives that land like settling
    embers, opening into a longer line when the warmth arrives; second person throughout,
    plainspoken, room to exhale between thoughts
  metaphor_family: ember and ash, banked fire and slow rekindling, dawn and first
    light, warmth returning to cold hands, the turning of the year, what survives
    the burn and grows back green — never machinery, military, productivity, or biohacking
_needs_authoring: false
