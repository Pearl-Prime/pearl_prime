reader_promise_family: For the founder whose mind never powers down — a warm, unhurried
  companion that helps you tell a real threat from a phantom one, bank the fire instead
  of burning it, and trust the quiet that comes after the thinking stops. No optimization.
  No grindset. Just the slow rekindling of a steadier inner voice.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- The Daily Stoic series (Ryan Holiday) — short, steadying daily entries for the over-responsible
  mind, though warmer and less martial here
- How to Do Nothing / resist-the-attention-economy lineage (Jenny Odell) — permission
  to stop optimizing yourself, reframed for the founder who can't switch off
- The Untethered Soul companion works (Michael A. Singer) — loosening the grip of
  the inner narrator, but grounded in an entrepreneur's specific 1am, not the abstract
  self
