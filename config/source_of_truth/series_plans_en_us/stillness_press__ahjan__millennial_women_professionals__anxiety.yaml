reader_avatar:
  age: 28 to 41, a millennial woman who built a capable professional life and is privately
    exhausted by how much effort it takes to seem calm
  where_they_are: It's 11:40pm on a Tuesday. The laptop is finally closed but her
    chest hasn't gotten the message — it's still braced, still scanning the day for
    the thing she got wrong. The apartment is quiet. Her body is not. She reaches
    for her phone not to do anything, just to outrun the feeling for a few more minutes.
  what_they_need: 'To be told the truth gently: that she isn''t broken, that the alarm
    going off inside her made sense once, and that there is a way to let the body
    settle that doesn''t require her to perform calm or earn rest.'
  what_they_avoid: Hustle-culture reframes, 'just optimize your morning routine,'
    breathing apps that become one more streak to maintain, toxic positivity, and
    anyone who turns her nervous system into a productivity project.
series_voice_markers:
  register: contemplative, spacious, grounded — an unhurried presence who has sat
    in this anxiety herself and is speaking softly from the next chair, never a clinician,
    never a coach, never selling a fix
  sentence_rhythm: unhurried and breath-paced; short declarative sentences that land
    and then leave silence; gentle repetition used like a hand on the shoulder; no
    urgency, no exclamation, room between thoughts the way there's room between breaths
  metaphor_family: stillness and settling water, breath and the pause between breaths,
    open ground, light moving through a window, weather passing over a landscape that
    stays — never machinery, productivity, military, or biohacking
_needs_authoring: false
