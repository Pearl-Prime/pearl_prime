reader_promise_family: You will not be optimized, fixed, or talked out of what you
  feel. You'll be met in it — and shown that the anxious mind, seen clearly and without
  shame, can finally come to rest. Each book is a single quiet hour with someone who
  has sat where you're sitting.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Headspace Guide series (Andy Puddicombe) — gentle, secular, non-prescriptive
  companionship with an anxious mind rather than a program to complete
- Real Calm (Tara Brach adjacent self-compassion titles) — body-aware writing that
  meets anxiety without shaming it
- When Things Fall Apart and the Shambhala pocket series (Pema Chödrön) — short, spacious,
  contemplative chapters that sit with difficult feeling instead of fixing it
