reader_promise_family: For the student who is quietly certain they don't belong here
  — that the grades are luck, the praise is a misread, and any day now someone will
  notice. These books don't hype you up or hand you a fix. They sit beside the part
  of you that feels like a fraud and, without forcing anything, let a little warmth
  back into it — until belonging stops being something you have to earn at full volume.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Subtle Art series / Mark Manson (Mark Manson) — plainspoken anti-hype self-help
  that refuses to cheerlead, which is the exact register Gen Alpha students trust
- Unfuck Yourself series (Gary John Bishop) — direct, warm-but-fierce talk to the
  inner critic without grindset gloss, a kindred 'voice in the room' tone
- The Body Keeps the Score and its readalikes (Bessel van der Kolk) — the somatic,
  you-are-not-broken lineage these books draw on for the felt, body-first treatment
  of shame
