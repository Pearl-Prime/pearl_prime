reader_avatar:
  age: '16 to 22 — older Gen Alpha and the seam where it meets Gen Z: late high school,
    AP and IB classes, college applications, first or second year of university'
  where_they_are: 'It''s almost 1am and the assignment is finished — actually good,
    maybe their best — but they''re rereading the rubric a fourth time, certain they''ve
    missed the obvious thing everyone else saw instantly. A group chat is lit up with
    people who ''barely studied.'' Their phone glows with someone''s acceptance post.
    They got in too, and still the thought won''t leave: they let me in by mistake,
    and the moment I open my mouth in seminar they''ll all know.'
  what_they_need: To be met as already enough — not coached, not optimized, not told
    to fake confidence until it's real. A voice that names the fraud-feeling out loud
    so it stops running in the dark, and lets them believe the work was theirs and
    the seat is theirs, without having to prove it one more time.
  what_they_avoid: Rah-rah 'you've got this' motivation, grindset and hustle TikToks,
    'just manifest your A,' productivity-bro optimization, toxic positivity, and any
    adult who turns their fear into a five-step morning routine. Anything performative
    that mistakes noise for warmth.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone a few years ahead
    who has felt exactly this and pulls up a chair instead of a whiteboard; affirming
    without hype, tending the ember rather than pushing the student; never clinical,
    never a coach, never hustle
  sentence_rhythm: second person throughout; mostly short, breath-paced sentences
    that land softly, opened up by the occasional longer line that lets a feeling
    unfold; plainspoken, contemporary, unhurried — built to be read at 1am, not performed
    at a pep rally
  metaphor_family: ember and ash, banked fire and slow rekindling, dawn and first
    light, warmth returning to cold hands, thresholds and the doorway you're standing
    in, the turning of the year, what survives the burn and grows back green — never
    machinery, military, productivity, or biohacking
_needs_authoring: false
