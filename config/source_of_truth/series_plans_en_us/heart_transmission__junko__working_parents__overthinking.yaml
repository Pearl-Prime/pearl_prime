reader_avatar:
  age: 32-46
  where_they_are: It is 2:11am. The house is finally quiet, the children are finally
    asleep, and you are wide awake on your back replaying a sentence you said to your
    kid at dinner — turning it over, building the worst version of where it leads,
    certain you have done some small permanent damage you won't see for years. Tomorrow
    you will function. Right now your mind will not close a single tab.
  what_they_need: to be told that a busy, catastrophizing mind is not a character
    flaw or a verdict on their parenting — and to feel what it is like to lay the
    thinking down for even a few honest minutes without earning it first
  what_they_avoid: clinical 'reframe your thoughts' worksheets, mindset hacks, optimize-your-brain
    productivity language, performative calm, and anyone who implies a good parent
    would simply think less
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; the voice of someone sitting
    close in the dark with you — warm, unhurried, never clinical, never preachy, never
    hustle
  sentence_rhythm: long unspooling sentences that mirror the mind's spiral, broken
    by short, steadying ones that land like a hand on the chest; tender repetition;
    spoken-aloud cadence meant to be read close and slow
  metaphor_family: the heart and what passes between two of them, light passed hand
    to hand, an open palm, the warmth of presence, the unguarded moment, breath shared
    in a quiet room, setting a heavy thing down — never machinery, military, productivity,
    or biohacking
_needs_authoring: false
