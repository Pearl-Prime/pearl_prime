reader_promise_family: You will not be handed a quieter mind to perform. You will
  be met inside the loud one — by a voice that has stood in the same dark hallway
  listening to its own head — and shown, breath by breath, how to set the thinking
  down for a moment and simply be the parent who is already enough.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- Good Inside (Dr. Becky Kennedy) — the same warm, non-shaming voice, turned here
  from the child's behavior toward the parent's own overthinking mind
- Burnout (Emily & Amelia Nagoski) — names the stress loop that won't complete; this
  series carries that compassion into the specific 2am rumination of parenting on
  empty
- Unwinding Anxiety (Judson Brewer) — maps the habit loop of the anxious mind, but
  where Brewer trains it, this series simply sits beside it with a hand open
