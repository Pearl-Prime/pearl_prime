reader_avatar:
  age: 30s to 50s
  where_they_are: Sitting in the car in the hospital parking garage after a twelve-hour
    shift, engine off, badge still clipped to your scrubs, unable to make yourself
    walk to the elevator or turn the key. You held a stranger's hand while she died
    at 4am and charted it like weather. There is nothing left to pour, and you have
    to do it all again in nine hours.
  what_they_need: Permission to be empty without it being a crisis. To grieve what
    this work has quietly taken. To be cared for in the same tender way you care for
    everyone else — and to believe, slowly, that the well can refill in the dark.
  what_they_avoid: Spiritual bypassing and 'everything happens for a reason'; resilience
    pep talks and self-care checklists that become one more shift; anyone who rushes
    grief, shames the broken-open, or asks for gratitude before its time; religious
    dogma and toxic positivity.
series_voice_markers:
  register: tender, devotional, spacious; reverent without dogma; the voice of someone
    who has knelt beside the same beds you have and is now kneeling beside you — never
    clinical, never preachy, never hustle
  sentence_rhythm: unhurried and breath-paced; short consecrating sentences set against
    longer ones that pool and hold; the cadence of someone sitting with you in silence
    rather than filling it
  metaphor_family: the open vessel; being poured out and held and refilled; grief
    as love with nowhere to go; the emptied cup; the well that refills in the dark;
    the sacred ordinary of the night shift; hands that finally open
_needs_authoring: false
