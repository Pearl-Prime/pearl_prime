reader_promise_family: You will be met in the depletion, not rushed out of it. No
  one here will tell you to be grateful, to bounce back, or to find the lesson. This
  is a place to set the cup down — to be the one who is held instead of the one who
  holds — until the well begins, quietly, to refill.
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- Wintering by Katherine May — honors fallow, depleted seasons instead of rushing
  past them, the way this series honors the emptied nurse
- The Book of Joy by the Dalai Lama and Desmond Tutu — reverent, non-dogmatic spiritual
  companionship that sits with suffering rather than fixing it
- Tattoos on the Heart by Gregory Boyle — tender devotional witness to broken-open
  people that never demands they perform their healing
