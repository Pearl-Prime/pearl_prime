reader_promise_family: 'For the nurse who has poured herself out for everyone but
  herself: a tender, unhurried companion that treats your boundarylessness not as
  a flaw to fix but as a wound to be held. No scripts to memorize, no assertiveness
  drills, no being told to ''just say no.'' Only the slow grace of learning that you
  are an open vessel meant to be refilled, not a well that owes the world every last
  drop.'
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — devotional, spacious interiority
  that meets the reader in surrender rather than strategy
- Radical Acceptance and the wider Tara Brach catalog — holds woundedness with reverence
  instead of rushing to fix it
- The Book of Boundaries (Melissa Urban) and adjacent over-giver self-help — boundary-centered
  work, but here softened into a tender, non-prescriptive register
