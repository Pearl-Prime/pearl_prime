reader_avatar:
  age: 28 to 52, a registered nurse, often the one everyone leans on at home too
  where_they_are: 'It is 7:14pm, your shift ended at 7, and you are still charting
    at the nurses'' station because a colleague asked you to cover one more thing
    and you heard yourself say yes before you even felt your own exhaustion. Your
    feet ache. Your phone has three texts asking when you''ll be home. You haven''t
    eaten. And somewhere underneath it all is a quiet, frightening thought you push
    back down: if I ever stopped giving, would there be anything left of me at all?'
  what_they_need: Permission to draw a line without bracing for punishment; to feel
    the cost of years of overgiving without being shamed for it; to discover that
    a boundary is not a wall against love but the shape that lets love stay; to be
    met as a person and not a function.
  what_they_avoid: Corporate 'self-care' that adds one more task; assertiveness scripts
    that feel like armor; spiritual bypassing and 'everything happens for a reason';
    toxic positivity; anything that frames her depletion as a personal failing or
    rushes her toward gratitude before she's allowed to grieve what the giving has
    cost.
series_voice_markers:
  register: tender, devotional, spacious; a voice of sacred surrender and being held;
    reverent without dogma; sits inside a nurse's specific exhaustion without diagnosing
    it; never clinical, never preachy, never hustle
  sentence_rhythm: unhurried and breathing; short declarative lines that land like
    a hand on the shoulder, opening into longer, flowing sentences that pour and refill;
    pauses where grief lives; cadence that slows the reader's pulse rather than quickening
    it
  metaphor_family: the open vessel emptied and refilled; the door and the threshold
    you keep crossing for everyone but yourself; hands that finally open; the cup
    poured out; the well that refills only in the dark; grief as love with nowhere
    left to go; the line drawn not as a wall but as the banks that let the river be
    a river
_needs_authoring: false
