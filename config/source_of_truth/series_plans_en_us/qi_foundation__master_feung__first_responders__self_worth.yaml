reader_promise_family: 'For the first responders the world calls heroes and who privately
  believe they are not enough — a grounded, unhurried return to worth that lives in
  the body and the roots, not in the next call answered or the next life saved. No
  fixing, no optimizing: only the steady refilling of a well that has been drawn down
  for years.'
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the trauma-and-body frame first
  responders trust, made gentler and worth-focused
- When the Body Says No (Gabor Mate) — names the cost of caretakers who override their
  own needs until the body speaks
- The Gifts of Imperfection (Brene Brown) — worthiness without earning it, for readers
  allergic to hustle and self-help gloss
