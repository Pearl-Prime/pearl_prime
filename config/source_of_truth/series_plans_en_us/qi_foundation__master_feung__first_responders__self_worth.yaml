reader_avatar:
  age: 28-52
  where_they_are: It is 2am at the kitchen table after a shift that did not go the
    way you needed it to. The pager is finally quiet. The house is asleep. You are
    still in your uniform pants, a cold cup of coffee in front of you, replaying the
    one thing you should have done faster, the one face you couldn't fix. Everyone
    thanked you today. You feel like a fraud who got lucky.
  what_they_need: To be met as a person and not a function; to find that their worth
    was never the sum of calls run or people saved; to feel the body's deep energy
    return after years of running on adrenaline and self-judgment; permission to be
    ordinary, human, and enough when the radio is silent.
  what_they_avoid: Pep talks, 'resilience hacks,' performative gratitude, anyone who
    tells them to push harder or be grateful they get to serve; toxic positivity;
    being told their exhaustion is a mindset problem; clinical detachment that treats
    them like a case file.
series_voice_markers:
  register: grounded, restorative, quietly vital; warm and unhurried; the voice of
    someone who has sat with you in the bay at the end of a hard shift, not a clinician
    with a clipboard
  sentence_rhythm: long, settling sentences that let the breath reach the bottom of
    the lungs, broken by short ones that land like a hand on the shoulder; cadence
    of someone slowing you down on purpose
  metaphor_family: roots and meridians, deep ground and rising sap, the well that
    refills from below, what flows again when a long-held blockage clears, vitality
    returning to the lowest part of the body, breath reaching the root
_needs_authoring: false
