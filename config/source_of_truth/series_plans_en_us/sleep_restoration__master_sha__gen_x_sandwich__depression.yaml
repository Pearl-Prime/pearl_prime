reader_promise_family: You are not broken and you are not behind. In the heavy hours,
  when everyone needs you and the weight of two generations rests on your chest, this
  series sits beside you in the dark and lets you set the load down — without rushing
  your grief, without demanding you feel better, without ever calling rest a failure.
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — quiet, interior, lets you watch
  the heaviness without becoming it
- When Things Fall Apart and the Pema Chödrön catalog (Pema Chödrön) — sits with grief
  and difficulty instead of rushing you out of it
- The Body Keeps the Score companion readers (Bessel van der Kolk lineage) — honors
  that exhaustion and depression live in the body, not just the mind
platform_strategy:
  primary:
  - kdp_ebook
  - audible
  secondary:
  - apple_books
  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: mid-40s to late 50s
  where_they_are: 'It''s 2:40 in the morning. You drove your mother home from the
    doctor today and your kid texted from the dorm that they need money again, and
    now you''re lying in the dark with the ceiling fan turning, too tired to sleep
    and too heavy to cry, doing the math on everyone you''re responsible for and coming
    up one person short: you.'
  what_they_need: to be told the flatness and the heaviness have a name, that holding
    everyone for this long would wear anyone down, and that they are allowed to be
    a person who needs holding too — permission to feel the weight instead of muscling
    past it
  what_they_avoid: push-through toughness, 'stay strong for the family' platitudes,
    sleep-hacking and optimization, toxic positivity, and anything that treats their
    exhaustion or their grief as a problem to be fixed before bedtime
series_voice_markers:
  register: steady, nocturnal, quietly architectural; a calm presence who sits with
    you through the long nights and holds without fixing — never clinical, never a
    coach, never hustle
  sentence_rhythm: unhurried and grounded; long settling sentences that let the weight
    come down, broken by short plain ones that land like a hand on the shoulder
  metaphor_family: night and the dark room, foundations and load-bearing structure,
    a weight finally set down, the body settling toward rest, the quiet hours before
    dawn — never productivity, machinery, military, or biohacking
_needs_authoring: false
