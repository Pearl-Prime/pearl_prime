reader_promise_family: You will learn to feel the line between yourself and the demands
  placed on you — not as a wall you build, but as a truth you were already living
  before you learned to override it.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Untamed and its companions (Glennon Doyle) — for readers reclaiming a self buried
  under everyone else's expectations, in an intimate first-person voice
- The Power of Now / A New Earth (Eckhart Tolle) — non-dogmatic awakening that points
  past the anxious, performing self without selling a system
- Set Boundaries, Find Peace and its follow-ups (Nedra Glover Tawwab) — the boundaries
  shelf this series sits beside, reframed from skills toward recognition
