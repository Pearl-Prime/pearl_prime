    max_books_per_brand_per_month: 2
reader_avatar:
  age: early 30s to late 40s
  where_they_are: It's 9:40 on a Tuesday night and the laptop is still open on the
    kitchen counter. A message came in an hour ago — a 'quick favor,' a 'when you
    get a sec' — and they've drafted three versions of a reply, deleted all three,
    and are now staring at the cursor. The right answer is no. They will type yes.
    They always type yes.
  what_they_need: To recognize that the inability to say no isn't a discipline problem
    — it's a place where they've stopped being able to feel themselves as separate
    from everyone's expectations. They need permission to draw a line without first
    earning it, justifying it, or apologizing for it.
  what_they_avoid: Boundary scripts and 'just say no' assertiveness drills that treat
    the fear as a skills gap; corporate-wellness language; anything that reframes
    rest as a productivity hack or self-care as another box to optimize.
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate not lofty; the voice of
    someone who has stood at the same threshold and stopped overriding it — never
    a clinician, never a coach, never selling a system
  sentence_rhythm: unhurried, with room to breathe between thoughts; short declaratives
    that land like a hand on the shoulder, then a longer line that opens the sky behind
    them; questions left genuinely open, never rhetorical traps
  metaphor_family: the door and the threshold; the line you can finally feel; waking
    from a dream of obligation; the open sky behind the weather of other people's
    needs; coming home to a self that was never actually for sale
_needs_authoring: false
