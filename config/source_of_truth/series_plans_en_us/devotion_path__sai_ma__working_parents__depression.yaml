reader_avatar:
  age: 30s to mid-40s
  where_they_are: It is 9:47pm. The kids are finally down, the dishwasher is humming,
    and you are sitting on the edge of the bed with one shoe still on, staring at
    the ceiling, unable to make yourself stand up and finish the night — flat, hollowed
    out, going through the motions of a life you love and cannot feel.
  what_they_need: To be told, by a voice that isn't trying to cheer them up, that
    the numbness is not a character flaw and the love did not leave — and to be given
    permission to set the weight down for one honest minute without it meaning they've
    failed their family.
  what_they_avoid: Spiritual bypassing, 'everything happens for a reason,' gratitude
    lists demanded too soon, hustle-culture self-improvement, clinical detachment,
    and any voice that mistakes their exhaustion for ingratitude or their flatness
    for not caring enough.
series_voice_markers:
  register: tender, devotional, spacious; reverent without dogma; the voice of someone
    who sits beside you in the dark kitchen and does not flinch at the flatness or
    rush the grief — never clinical, never preachy, never hustle
  sentence_rhythm: slow, breathing sentences with room between them; short declaratives
    that land like a hand on the shoulder, then a longer line that opens out; pauses
    where a fix would normally go
  metaphor_family: the open vessel and the cup emptied; being held, poured out, and
    refilled in the dark; grief as love with nowhere to go; the well that fills again
    when no one is watching; the sacred ordinary of a child's hand, a warm mug, an
    unmade bed; hands that finally open
_needs_authoring: false
