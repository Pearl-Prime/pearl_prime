reader_promise_family: You will not be rushed, fixed, or asked to be grateful before
  your time. You will be met in the depletion exactly as you are — a working parent
  carrying a depression no one around you can see — and held there, gently, until
  something in you remembers it is allowed to open and be refilled.
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- The Body Keeps the Score companion readers (Bessel van der Kolk) — why depletion
  lives in the body, met without clinical distance
- How to Keep House While Drowning (KC Davis) — care tasks reframed with radical gentleness
  for the parent who has nothing left
- When Things Fall Apart and the Pema Chödrön shelf (Pema Chödrön) — staying tenderly
  with what hurts instead of fixing or fleeing it
