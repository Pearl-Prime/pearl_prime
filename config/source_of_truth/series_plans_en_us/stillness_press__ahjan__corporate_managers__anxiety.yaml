reader_promise_family: 'You will not be handed one more system to optimize. You will
  be met in the exact moment your mind won''t settle — the meeting that hasn''t started,
  the inbox that won''t empty, the calm everyone else seems to manage — and shown
  that the anxiety running underneath your competence is not a flaw to fix but a signal
  to understand. Seven doorways into the same quiet truth: you are allowed to put
  the weight down, even here, even now.'
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Daily Stoic series (Ryan Holiday) — a calm, returnable daily companion for high-pressure
  professionals, though Stillness Press trades philosophy for felt emotional recognition
- Mindfulness for Beginners / the Jon Kabat-Zinn body of work (Jon Kabat-Zinn) — present-moment
  awareness without dogma, but voiced for the boardroom rather than the meditation
  cushion
- The Untethered Soul companion works (Michael A. Singer) — loosening identification
  with the anxious inner voice, reframed for the manager who can't switch the scanning
  off
