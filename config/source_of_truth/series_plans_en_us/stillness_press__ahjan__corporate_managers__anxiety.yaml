reader_avatar:
  age: 35 to 52
  where_they_are: It's 6:40am and they're awake before the alarm, already rehearsing
    the 9 o'clock with the VP, jaw tight, the day's threats lined up before their
    feet touch the floor — competent on the outside, braced on the inside, and quietly
    exhausted from holding it all together.
  what_they_need: Permission to stop performing calm and actually feel it; language
    for the dread that hides under high performance; a contemplative, unhurried way
    to loosen the grip without adding one more discipline to master or one more metric
    to hit.
  what_they_avoid: Hustle-culture reframes, 'optimize your mindset' productivity hacks,
    just-breathe platitudes, toxic positivity, and any book that turns stillness into
    another KPI they're failing to meet.
series_voice_markers:
  register: contemplative, spacious, grounded — a steady presence who has sat inside
    this same anxiety and speaks from the chair beside you, never from a podium; never
    clinical, never a coach, never hustle
  sentence_rhythm: unhurried and breath-paced; short declarative sentences that land
    and leave room, occasionally opening into one longer line that lets a feeling
    unspool before settling again
  metaphor_family: stillness and breath; settling water and silt sinking; open ground
    and level horizon; light through a window; the held breath finally let go; the
    pause between one thing and the next — never machinery, military, or biohacking
_needs_authoring: false
