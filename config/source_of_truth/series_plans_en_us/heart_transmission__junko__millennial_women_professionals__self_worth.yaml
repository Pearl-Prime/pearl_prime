reader_promise_family: You will be met, not measured. This series treats your worth
  as something already true — not a score to raise, a brand to build, or a problem
  to fix — and speaks to it the way one heart speaks to another, quietly and without
  conditions.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — interior, unhurried spiritual prose
  that frees the reader from the self they keep defending, without a single hack
- How to Do the Work / companion volumes (Nicole LePera) — speaks directly to high-functioning
  women carrying a hidden sense of not-enoughness, warmly rather than clinically
- The Gifts of Imperfection series (Brené Brown) — meets shame and worthiness head-on
  with tenderness, the emotional register this series lives in
