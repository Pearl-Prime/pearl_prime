reader_avatar:
  age: late twenties to late thirties
  where_they_are: It's a little after nine on a weeknight. The laptop is closed but
    she's still half-working in her head — replaying the meeting, rereading the message
    she sent, doing the quiet math on whether she's enough yet. She is competent,
    well-reviewed, the one others lean on. And she is privately certain that if anyone
    saw the whole of her, they'd find the place where she falls short.
  what_they_need: To stop earning her own right to exist. To feel, even for an evening,
    that her worth isn't contingent on output, on being chosen, or on outrunning the
    woman she keeps comparing herself to. A voice that sits with her rather than coaching
    her.
  what_they_avoid: Self-improvement framed as another performance review. Affirmations
    that feel like lying. 'Confidence hacks,' hustle dressed as healing, and the bright,
    brittle positivity that tells her to be grateful instead of letting her be honest.
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; the unhurried warmth of someone
    who has set the work down and is simply present with you, speaking close — never
    a clinician, never a coach, never a cheerleader
  sentence_rhythm: unhurried and breath-paced; mostly short to medium sentences with
    room between them, the occasional long line that opens like an exhale, frequent
    direct address that lands softly rather than instructs
  metaphor_family: the heart and what passes between two of them; light handed from
    one palm to another; the warmth of presence in a quiet room; the unguarded moment;
    what is transmitted without words; the open hand that asks for nothing back
_needs_authoring: false
