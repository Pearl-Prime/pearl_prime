reader_avatar:
  age: 29-44
  where_they_are: It is 11:40pm. The laptop is closed but the chest is not. They checked
    the dashboard one more time, then the bank balance, then Slack — nothing was on
    fire, and the body did not believe it. They are lying in the dark running tomorrow's
    standup, the runway math, the message they should have answered three hours ago,
    and the quiet certainty that everyone else in the org seems to be holding it together.
  what_they_need: To be met without being managed. A voice that names the exact texture
    of high-functioning anxiety — the bracing, the scanning, the second-guessing —
    and offers not another system but room. The recognition that the alarm in their
    body is not a performance problem, and that they are allowed to stop optimizing
    themselves for one hour.
  what_they_avoid: Self-optimization, productivity-hacked calm, communication frameworks,
    breathwork sold like a sprint, toxic positivity, hustle-culture reframes, and
    anything that adds one more tab to an already-overloaded mind.
series_voice_markers:
  register: spare, clear, unadorned; a quiet presence that says only what is needed;
    gentle and direct, never clinical, never preachy, never hustle — the voice of
    someone sitting with you in an empty room with the lights low
  sentence_rhythm: short declaratives with room to breathe between them; deliberate
    pauses; the occasional fragment used like a held breath, never as filler; nothing
    crowded, nothing rushed
  metaphor_family: bare form and empty space, the room with nothing extra in it, clean
    light, the breath in a quiet room, the stillness between two people, what remains
    when the clutter falls away — never machinery, military, productivity, or biohacking
_needs_authoring: false
