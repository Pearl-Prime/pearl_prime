reader_promise_family: 'For the high-performing tech and finance mind worn thin by
  anxiety: a spare, unhurried place to set the work down and meet the body underneath
  it. No optimization, no calm to perform — just a quieter room and the permission
  to stop bracing.'
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Let Them Theory (Mel Robbins) — a calm, permission-giving voice for over-functioning
  minds who try to control everything; readers of one find the other
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — meets exhausted high-achievers in the body rather than the planner, the same somatic
  doorway this series uses'
- Don't Believe Everything You Think (Joseph Nguyen) — spare, plainspoken pages on
  releasing the looping mind without a single productivity hack, shelved beside this
  series
