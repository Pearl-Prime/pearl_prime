reader_promise_family: You will be met where the self-doubt actually lives — weighed
  fairly, not fixed or cheered up. This series treats imposter syndrome not as a flaw
  to delete but as a heart that has been carrying too much credit for the bad and
  too little for the good. We help you set the weights back to true.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Imposter Cure (Jessamy Hibberd) — clinical-but-warm series on naming the fraud
  feeling without shaming the sufferer.
- How to Do the Work (Nicole LePera) — interior, self-witnessing tone that treats
  hidden beliefs as the real work, which this audience already reads.
- Burnout (Emily & Amelia Nagoski) — companionable, evidence-soft voice for overworked
  young professionals who distrust hustle advice.
