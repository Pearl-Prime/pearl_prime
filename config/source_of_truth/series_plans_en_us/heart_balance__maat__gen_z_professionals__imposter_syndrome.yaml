reader_avatar:
  age: 23-28
  where_they_are: 'It''s 9:14 on a Tuesday and the Slack notification just landed
    — a manager has tagged you in a thread, ''quick question.'' Before you''ve even
    read it, your chest has gone tight and your mind has already written the ending:
    this is the message where they realize you don''t actually know what you''re doing.
    You''re two years into the job everyone congratulated you for. You reread your
    own sent emails for typos that would expose you. You keep a private tally of every
    time you guessed and got lucky.'
  what_they_need: To stop treating every win as a fluke and every gap as proof of
    fraud. To feel the difference between being new and being a liar. A way to set
    down the over-correction without being told to 'just be confident' — language
    that honors how heavy the hiding has been.
  what_they_avoid: Hustle-culture self-improvement, LinkedIn affirmations, 'fake it
    till you make it,' anyone who says imposter syndrome is a sign you're destined
    for greatness, and any book that turns their pain into a productivity hack or
    a personal brand.
series_voice_markers:
  register: balanced, warm, discerning — a heart-centered voice about worth and limits;
    gentle but clear-eyed, never clinical, never preachy, never hustle. It weighs
    both sides of you fairly and refuses to flatter or scold.
  sentence_rhythm: Plainspoken and unhurried, with short declaratives that land like
    a hand set flat on a table. Longer reflective sentences open the door; a brief
    one closes it. Second person throughout, addressed to one reader at a desk, not
    a room.
  metaphor_family: the feather and the scale, weight and balance, the heart weighed
    against a feather, the fulcrum that holds, what you give and what you keep, the
    threshold and the doorway you keep standing in — never machinery, military, productivity,
    or biohacking.
_needs_authoring: false
