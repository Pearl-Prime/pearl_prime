reader_promise_family: A heart-centered way to carry money fear without letting it
  decide your worth — for the woman who has already done everything right and still
  lies awake doing the math. No budgeting cure, no manifestation, no shame. Just a
  fair, steady look at what financial stress is really costing you, and permission
  to set part of it down.
bestseller_hook_family: ''
emotional_engine: financial_stress_recognition
comp_series:
- The Financial Diet (Chelsea Fagan) — meets the same money-anxious millennial woman,
  but where TFD gives practical scripts, this series tends the emotional weight underneath
  them.
- Good Vibes, Good Life (Vex King) — shares the gentle self-worth register, but trades
  manifestation for an honest reckoning with real financial pressure.
- Burnout (Emily & Amelia Nagoski) — same compassionate, body-aware treatment of chronic
  stress in high-functioning women, narrowed here to the specific dread of money.
