reader_promise_family: For the educator whose mind never empties, the still forest
  does not hand you a faster way to carry everything. It slows the path until you
  can see what you've been carrying, and lets the quiet hold what you set down. You
  will not be optimized here. You will be met.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Anxiety Toolkit series (Alice Boyes) — practical anxiety relief for the over-functioning
  mind, but warmer and quieter here, without the worksheet pace
- Real Self-Care (Pooja Lakshmin) — names the difference between performed wellness
  and the real thing, the same refusal of optimization this series carries
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  for the depleted helper who gives until empty; this series meets the same reader
  earlier, before the collapse'
