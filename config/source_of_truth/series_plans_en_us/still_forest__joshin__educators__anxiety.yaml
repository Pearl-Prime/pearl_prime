  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 30s to 50s — a classroom teacher, often a decade or more in, the kind colleagues
    lean on
  where_they_are: It is 9:40 on a Sunday night and the lessons are planned, the inbox
    is at zero, the bag is packed by the door — and you are still wide awake, jaw
    tight, running tomorrow before tomorrow has arrived. The house is quiet. You are
    not.
  what_they_need: To recognize that the flood is real and not a failure of character;
    to find one moment of space inside a week that has none; to be allowed to set
    something down without first earning the right
  what_they_avoid: Self-optimization, 'quick calm' hacks, productivity systems dressed
    as wellness, performative mindfulness, toxic positivity, and any voice that hurries
    a mind already moving too fast
series_voice_markers:
  register: still, deep, woodland-quiet — the calm of a forest interior; unhurried
    and spacious, it lets silence do the work and never lectures the reader on how
    to feel
  sentence_rhythm: long, slow, breathing sentences set against short ones that land
    like a footstep on soft ground; pauses left open on purpose, the way a clearing
    leaves room
  metaphor_family: the still forest and its deep quiet — old trees and patient roots,
    light filtering through canopy, the path that slows you, the pool that goes clear
    when it stops being stirred, the forest floor that holds what falls
_needs_authoring: false
