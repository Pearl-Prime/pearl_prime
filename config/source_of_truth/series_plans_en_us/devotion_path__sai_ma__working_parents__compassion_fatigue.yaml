reader_promise_family: You will not be asked to give more, fix faster, or be grateful
  before you're ready. Here you are met as the emptied vessel you've become from caring
  for everyone — and held long enough to feel the well in you begin, quietly, to refill.
bestseller_hook_family: ''
emotional_engine: compassion_fatigue_recognition
comp_series:
- When Things Fall Apart (Pema Chödrön) — meets the reader in depletion without rushing
  them toward repair, the same permission-to-be-broken-open tone.
- Sacred Rest (Saundra Dalton-Smith) — names caregiver burnout in restorative, non-clinical
  language for people who give for a living.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — speaks
  directly to the over-extended caregiver, validating depletion before offering any
  way through.'
