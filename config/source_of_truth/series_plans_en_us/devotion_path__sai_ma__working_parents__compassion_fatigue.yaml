reader_avatar:
  age: 32-49
  where_they_are: It's the end of another day. The kids are finally down, the dishes
    are still in the sink, a work message is blinking on your phone, and you are sitting
    on the edge of the bed with your shoes still on, unable to move and unable to
    feel much of anything. You gave all day — to the children, to the job, to the
    parent who called — and there is nothing left over for you. You don't even know
    what you'd do with it if there were.
  what_they_need: To be told that the numbness isn't a moral failing. To have someone
    name the specific exhaustion of loving people for a living and at home, with no
    margin left. To be allowed to be empty without being rushed to fill back up, and
    to find that being held is itself a kind of refilling.
  what_they_avoid: Self-care checklists, 'pour from a full cup' platitudes that ignore
    that no one is pouring back, gratitude lectures, spiritual bypassing, 'everything
    happens for a reason,' anything that frames their depletion as a mindset problem
    or asks them to hustle their way back to wholeness.
series_voice_markers:
  register: tender, devotional, spacious; a voice of sacred surrender and being held;
    reverent without dogma; sits with depletion and grief rather than rushing them;
    never clinical, never preachy, never hustle
  sentence_rhythm: unhurried and breathing; short declarative lines that land like
    a hand set gently on the shoulder, opening into longer, pooling sentences; pauses
    honored, white space trusted, nothing crowded
  metaphor_family: the open vessel; the cup emptied and the well that refills in the
    dark; being held, poured out, and slowly poured back into; grief as love with
    nowhere to go; hands that finally open; the sacred ordinary of a kitchen at midnight
_needs_authoring: false
