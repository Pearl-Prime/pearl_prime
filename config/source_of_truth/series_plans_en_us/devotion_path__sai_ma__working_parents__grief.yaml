reader_avatar:
  age: 34-50
  where_they_are: It is 7:14 on a Tuesday morning and you are buttering toast that
    no one will finish, and the grief arrives the way it always does now — sideways,
    between the lunchbox and the car keys. You smile at your child. You answer the
    email. You carry it all day in a body that no one at work knows is broken open,
    and you do not have ten minutes alone until the house is finally dark.
  what_they_need: To be met exactly where they are — mid-task, mid-loss, mid-love
    — without being told to heal faster, find the lesson, or perform okayness for
    the people who depend on them. A voice that lets the grief be love with nowhere
    to go, and lets that be enough for tonight.
  what_they_avoid: Spiritual bypassing, 'everything happens for a reason,' religious
    dogma, toxic positivity, five-step closure plans, anyone who rushes grief or asks
    for gratitude before its time, and any book that treats a grieving parent as a
    problem to be optimized.
series_voice_markers:
  register: tender, devotional, spacious; reverent without dogma; the voice of someone
    who has sat in the same dark kitchen and is not afraid of your grief
  sentence_rhythm: unhurried and breath-paced; short declaratives that land like a
    hand on the shoulder, opening into longer lines that hold the ache, then resting
    again in white space — never clipped, never rushed
  metaphor_family: the open vessel, the cup emptied and refilled in the dark, grief
    as love with nowhere to go, hands that finally open, the well that fills when
    no one is watching, the sacred ordinary of buttered toast and bedtime, being held
    and poured out and held again
_needs_authoring: false
