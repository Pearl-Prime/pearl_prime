reader_promise_family: You do not have to be done grieving to be held. This series
  sits beside the working parent carrying loss through school runs and staff meetings,
  and asks nothing of you but to set the cup down for a moment. No timeline, no closure,
  no gratitude demanded before its time — only the slow grace of being poured out
  and, in the dark, quietly refilled.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- It's OK That You're Not OK (Megan Devine) — refuses the closure script and meets
  grief as something to be tended, not cured, in the same unhurried register
- The Wild Edge of Sorrow (Francis Weller) — frames grief as sacred and communal rather
  than a private failure, sharing this series' reverent-without-dogma posture
- Bittersweet (Susan Cain) — honors longing and loss as a doorway to meaning for readers
  who reject toxic positivity, a close tonal sibling for the devotional reader
