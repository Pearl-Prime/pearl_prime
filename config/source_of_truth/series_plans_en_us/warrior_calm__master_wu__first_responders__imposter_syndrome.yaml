reader_promise_family: 'For the first responder who runs toward what everyone else
  runs from, and still suspects they don''t belong in the uniform: a quiet, disciplined
  reckoning with the fear that you''ve been faking your competence — and the trained
  calm to stand your ground without armor, without bravado, without needing to feel
  certain first.'
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- On Combat (Dave Grossman) — the lived physiology and psychology of high-stakes performance
  under threat, written for people who actually go in
- The Body Keeps the Score (Bessel van der Kolk) — names what pressure and repeated
  exposure leave in the body, without shaming the one carrying it
- Emotional Survival for Law Enforcement (Kevin Gilmartin) — speaks directly to the
  responder's inner world, the hypervigilance, and the private cost of the badge
