reader_avatar:
  age: 28-48
  where_they_are: 'It''s the end of a shift. You''re sitting in the apparatus bay
    or the cab of the rig with your boots still on, replaying the one call where your
    hands shook and hoping nobody noticed. Everyone else is laughing about the runs
    like it was nothing. You smile along and think: one day they''re going to figure
    out I don''t actually know what I''m doing.'
  what_they_need: To recognize that the dread of being exposed is not evidence of
    incompetence — it's the cost of caring about a job where mistakes have weight;
    and to find a steadiness that holds under scrutiny without pretending, posturing,
    or burning themselves out to prove a worth that was never in question.
  what_they_avoid: Rah-rah motivation, 'embrace the suck' machismo, toughness-as-armor,
    anything that tells them to just be more confident, and anyone who has never had
    a life in their hands lecturing them about pressure.
series_voice_markers:
  register: grounded, disciplined, quietly strong — a warrior's calm that meets fear
    without flinching; steady and spare, the voice of someone who has stood in the
    doorway of a bad call and stayed; never clinical, never preachy, never hustle
  sentence_rhythm: short, load-bearing sentences with the cadence of measured breathing;
    plain words placed deliberately; pauses where a held breath would go; never rushed,
    never padded
  metaphor_family: the still center in the storm, the gate that holds, the breath
    before action, what is forged under heat and what holds; standing your ground;
    trained calm under pressure; the warrior with nothing left to prove — never machinery,
    productivity, or biohacking
_needs_authoring: false
