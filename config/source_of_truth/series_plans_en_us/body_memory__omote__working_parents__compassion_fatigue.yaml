reader_promise_family: You will not be told to give more, give better, or give from
  a fuller heart. You will be shown the ground under the giving — the place in you
  that runs dry, and what it actually takes to let it refill. These books stay with
  the working parent who has poured out for everyone and has nothing left for themselves,
  and they hold that emptiness without rushing to fix it.
bestseller_hook_family: ''
emotional_engine: compassion_fatigue_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — names caregiver depletion as a real physiological cost, not a willpower failure,
  the same ground these books stand on'
- The Book of Boundaries (Melissa Urban) — gives exhausted givers permission to stop
  pouring out, in a plain, non-shaming voice that matches this series' register
- Real Self-Care (Pooja Lakshmin) — rejects performative self-care and toxic positivity
  for working caregivers, the exact thing this avatar flinches from
