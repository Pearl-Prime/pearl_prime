reader_avatar:
  age: 32-48
  where_they_are: It is 9:40pm. The kids are finally down, the dishwasher is running,
    a colleague's text is still unanswered, and you are sitting on the edge of the
    bed with your shoes still on, unable to remember the last thing anyone did for
    you. You gave all day — to your children, your aging parent, your team, the person
    who needed you at 4pm — and the well came up dry hours ago, but you kept lowering
    the bucket anyway.
  what_they_need: Permission to be empty without it meaning they have failed; a way
    to feel the cost in their own body before it becomes resentment or numbness; the
    recognition that they cannot give from a cup nobody is filling, and that refilling
    it is not selfish but structural.
  what_they_avoid: Being told to 'practice self-care,' to 'just say no,' to relax
    on command, or to push through because their family needs them. They flinch from
    anything that adds one more task to the list, anything performatively calm, anything
    that treats their depletion as a mindset problem instead of a real and earned
    exhaustion.
series_voice_markers:
  register: grounded, steady, holding — the voice of someone who has sat with their
    own emptiness and is not afraid of yours; warm and plain, never clinical, never
    preachy, never a wellness pitch
  sentence_rhythm: short load-bearing sentences set down like stones, then a longer
    one that lets the breath out; pauses where the reader is meant to feel something
    rather than learn it; second person throughout, close enough to be the voice in
    the next room
  metaphor_family: the well that runs dry and what it takes to let it refill, the
    empty cup, weight carried and finally set down, solid ground under a shaking body,
    roots that hold in a storm, the earth that does not move when everything else
    does
_needs_authoring: false
