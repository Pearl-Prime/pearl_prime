reader_avatar:
  age: 29-52
  where_they_are: It's the drive home after a thirteen-hour shift and she is sitting
    in the parked car in her own driveway, engine off, unable to make herself walk
    inside yet. Her badge is still clipped to her scrubs. Somewhere in the day she
    stopped feeling things and she hasn't started again. The dishwasher needs unloading,
    a patient she couldn't save is still behind her eyes, and her phone is buzzing
    with the unit asking her to pick up tomorrow.
  what_they_need: To feel that the depletion has a name and a bottom — that what's
    gone can come back from underneath, not be forced up from a surface that's already
    scraped raw. Language that treats her exhaustion as real injury, not weakness.
    Permission to stop performing okayness.
  what_they_avoid: Self-care checklists, 'resilience training' the hospital mandates,
    hustle-wellness that says optimize your recovery so you can give more, toxic positivity,
    bubble-bath clichés, anything that asks her to manufacture energy she does not
    have or frames burnout as a personal failing to push through.
series_voice_markers:
  register: grounded, restorative, quietly vital; the voice of someone who has sat
    with depletion and respects it; warm and unhurried, never clinical, never preachy,
    never hustle; speaks to the body's deep energy and roots, not to the calendar
  sentence_rhythm: unhurried and breath-paced; longer settling sentences that exhale,
    broken by short ones that land like a hand on the shoulder; never clipped, never
    urgent, never a list of commands
  metaphor_family: roots and meridians; the well that refills from below; deep ground
    and rising sap; the blockage that finally clears so something flows again; breath
    reaching the lowest part of the lungs; vitality restored from the root upward;
    the field left fallow so it can bear again — never machinery, military, productivity,
    or biohacking
_needs_authoring: false
