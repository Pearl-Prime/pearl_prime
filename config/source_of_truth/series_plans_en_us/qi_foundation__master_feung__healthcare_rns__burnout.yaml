reader_promise_family: 'For nurses who have given until the well ran dry: a slow,
  grounded return of the deep energy your work has been drawing from. No optimization,
  no comeback story, no schedule hack. Just the quiet permission to let the root refill
  from below before you pour out one more time.'
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — for readers who already sense the
  depletion lives in the body, not the schedule, and want it taken seriously
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — the caregiver-burnout shelf this series sits beside, but slower and less prescriptive'
- How to Do Nothing (Jenny Odell) — kindred refusal of the optimize-yourself frame,
  granting permission to stop rather than do recovery better
