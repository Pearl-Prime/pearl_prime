reader_avatar:
  age: mid-40s to late 50s
  where_they_are: It's 1am and the house is finally quiet. You answered your mother's
    third call about the pills, signed the permission slip, paid the bill that wasn't
    supposed to come this month, and somewhere in there you ate standing up over the
    sink. Now you're lying in the dark doing the only math you ever do for yourself
    — the running tally of where you fell short today — and it never once comes out
    in your favor.
  what_they_need: to be told, by a voice that isn't trying to fix or motivate them,
    that their worth was never the thing they had to earn between everyone else's
    needs — and to feel the bone-deep relief of setting that ledger down for one night
  what_they_avoid: push-through toughness, 'you've got this' cheerleading, self-care
    framed as one more task, hustle-coded self-improvement, and anything that treats
    their exhaustion or their grief as a weakness to be managed
series_voice_markers:
  register: steady, nocturnal, quietly architectural — the voice of someone who has
    sat up through the heavy hours too and isn't going to rush you; holds without
    fixing, never clinical, never a coach
  sentence_rhythm: long settling sentences that let a weight come to rest, broken
    by short flat ones that land like a hand on the shoulder; patient, unhurried,
    built to be read at 1am
  metaphor_family: the dark room and the long night, foundations and what bears weight,
    a load finally set down, the body settling toward rest, the load-bearing wall
    that has held more than anyone checked on, the quiet hours before dawn
_needs_authoring: false
