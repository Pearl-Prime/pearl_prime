reader_promise_family: For the generation caught in the middle — aging parents on
  one side, children who still need you on the other — who lie awake at the end of
  impossible days wondering whether they're enough. These books don't hand you a fix
  or a productivity hack for your own worth. They sit with you in the dark and let
  you set the load down long enough to remember you were never the problem.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — interior, permission-giving spiritual
  non-fiction for readers exhausted by their own self-judgment
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the specific depletion of women carrying everyone, without a hustle fix'
- The Gifts of Imperfection (Brené Brown) — worthiness-as-it-is rather than worthiness-as-earned,
  in a warm non-clinical voice
