reader_promise_family: >
  You'll learn to recognize what your brain is actually doing when the worry
  switches on — not how to fix yourself, not how to be normal, just how to see
  the thing clearly enough that it loses its grip a little. Seven books, seven
  different ways the same anxiety shows up when your head already runs fast.
  Each one meets it from a new angle, in words you can actually use the next
  time it hits.
bestseller_hook_family: recognition_descent
emotional_engine: anxiety_recognition
comp_series:
- "Permission to Feel (Marc Brackett) — naming the feeling instead of fixing it"
- "How to ADHD (Jessica McCabe) — brain-true, never shaming, real-talk"
- "My Anxious Mind (Tompkins & Martinez) — anxiety for young readers, plain and kind"
platform_strategy:
  primary:
  - kdp_ebook
  - audible
  secondary:
  - apple_books
  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: "14–19"
  where_they_are: >
    It's 11:40pm, the assignment was due three hours ago, and they've reread
    the same instructions six times with the heart going and twelve tabs open,
    sure they're the only one in the group chat who hasn't started.
  what_they_need: >
    Someone who talks to a fast brain like it makes sense, not like it's broken —
    who names the worry without telling them to calm down, breathe, or just try harder.
  what_they_avoid: >
    Adults saying 'relax.' Self-help that sounds like a worksheet. Anything that
    treats them as a problem to manage instead of a person who already knows the feeling.
series_voice_markers:
  register: "young, plainspoken, real-talk; the voice of an older friend who gets it, never a counselor or a calm-down poster"
  sentence_rhythm: "short, fast, the rhythm of a racing head; broken by sudden quiet lines that land and stay"
  metaphor_family: "the lit screen at night, the body, school hallways, open tabs and notifications, the group chat — never clinical, corporate, or military"
  second_person_default: true
_needs_authoring: false
