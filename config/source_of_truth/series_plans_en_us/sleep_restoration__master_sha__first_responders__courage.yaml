reader_promise_family: For first responders who can run toward anyone's emergency
  but their own — a steady presence that sits with you through the long nights when
  the shift is over and the bracing won't stop, and helps you set the weight down
  without ever telling you to be stronger.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- On Combat (Dave Grossman) — the canonical read on what the body does under threat
  for people who run toward danger, the physiology this series speaks to in plain
  human terms
- The Body Keeps the Score (Bessel van der Kolk) — the touchstone for why the alarm
  stays on long after the event ends, translated here from clinic to bedside
- When Things Fall Apart (Pema Chödrön) — the same steady, unflinching company in
  the dark hours, the permission to stay with fear instead of conquering it
