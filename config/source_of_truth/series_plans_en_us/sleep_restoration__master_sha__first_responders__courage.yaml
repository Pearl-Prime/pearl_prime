reader_avatar:
  age: 32 to 55
  where_they_are: It's 2am and the house is finally quiet, but you're still sitting
    up in the dark, jaw tight, listening for a call that already ended hours ago —
    your body still braced for the next one, your courage all spent on everyone else
    and none of it left for yourself.
  what_they_need: To be met as someone strong who is also tired — to understand why
    the alarm won't switch off after the truck is back in the bay, to feel the difference
    between the courage it takes to run in and the courage it takes to stand down,
    and to set the load down for one night without earning it first.
  what_they_avoid: Push-through toughness, 'stay strong for the team' platitudes,
    anyone who treats fear as failure or rest as quitting, clinical PTSD language
    that turns them into a case file, and self-help that asks them to optimize a nervous
    system that has simply held the line too long.
series_voice_markers:
  register: steady, nocturnal, quietly architectural — a calm presence who sits with
    you through the heavy hours, talks to you the way one tired person talks to another
    at the end of a hard shift, holds without fixing, never clinical, never a coach,
    never hustle
  sentence_rhythm: plainspoken and unhurried; short declarative sentences that land
    like footsteps in an empty corridor, then a longer breath that lets the weight
    settle; pauses where most books would push
  metaphor_family: the dark room and the long night, foundations and what bears weight,
    the load finally set down, the body settling toward rest in the quiet hours before
    dawn, the structure that holds you while you let go — and, for the courage it
    asks, the single small step taken before you feel ready
_needs_authoring: false
