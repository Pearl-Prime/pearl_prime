  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 30s to 50s, a working or recently-retired first responder — paramedic, firefighter,
    police officer, ER nurse, or dispatcher
  where_they_are: It's 2am after a hard shift. The house is dark, everyone's asleep,
    and you're flat on your back staring at the ceiling with a weight pressing down
    on your chest that has no name and no off switch. You ran into other people's
    worst nights all day; now there's no one to run toward, and the heaviness just
    sits there.
  what_they_need: To be met without being assessed — to hear that the flatness and
    the weight are not a character failure or a sign you're broken, and that letting
    the load down is allowed, even for someone whose whole identity is being the one
    who holds it for everyone else
  what_they_avoid: Push-through toughness, 'stay strong, you've got this' platitudes,
    peer-support clichés, anything that frames the heaviness as weakness or rushes
    them to feel better before they've been allowed to feel it at all
series_voice_markers:
  register: steady, nocturnal, quietly architectural — a calm presence who sits with
    you through the heavy hours and the long nights, holds without fixing, never clinical,
    never a coach, never hustle
  sentence_rhythm: unhurried and grounded; short declaratives that land like a hand
    set on a shoulder, alternating with longer sentences that settle and breathe —
    the pace of someone speaking low in a dark room, leaving room between the words
  metaphor_family: the weight on the chest and the load set down, the dark room and
    the ceiling at 2am, foundations and what bears weight, the body settling toward
    rest, the quiet hours before dawn, the structure that holds you while you let
    go
_needs_authoring: false
