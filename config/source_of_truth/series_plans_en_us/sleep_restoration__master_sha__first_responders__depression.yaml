reader_promise_family: 'For first responders carrying depression: a steady nocturnal
  companion that sits with the weight instead of telling you to shake it off — no
  fix, no toughening-up, just a calm presence through the heavy hours until something
  in you can set the load down.'
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the trauma-and-body frame first
  responders trust, made personal and nocturnal rather than clinical
- Reasons to Stay Alive (Matt Haig) — first-person, plainspoken company in the dark
  that names depression without trying to cure it on the page
- When Things Fall Apart (Pema Chödrön) — sitting steadily with what hurts and letting
  it be, instead of forcing a fix or a feel-better
