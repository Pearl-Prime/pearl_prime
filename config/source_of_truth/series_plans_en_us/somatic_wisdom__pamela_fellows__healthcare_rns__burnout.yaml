reader_avatar:
  age: 28-52
  where_they_are: It's the drive home after a twelve-hour shift. The radio is off
    because even sound feels like too much. Your hands are still tight on the wheel
    from a code that didn't go your way, and you can't tell anymore whether you're
    sad or just empty. You'll walk in the door, microwave something, and not taste
    it. Tomorrow you do it again.
  what_they_need: To be met as a person and not a problem to fix — to feel her own
    exhaustion named without judgment, to find a way back into her body that is slow
    and safe, and to be allowed to grieve what the work has cost her without being
    told to just take a self-care day.
  what_they_avoid: Resilience trainings that blame her for not coping, wellness apps
    that add one more task, 'mind over matter' pep talks, anything that romanticizes
    the martyrdom of nursing, and any approach intense enough to crack open more than
    she can hold alone.
series_voice_markers:
  register: embodied, grounded, trauma-informed; the voice of a fellow nurse who has
    stood at the same med cart at 4am and is sitting beside you now, not lecturing
    from a podium
  sentence_rhythm: unhurried, breath-paced; short sentences that let a feeling land,
    then a longer one that holds it — room left between thoughts, the way you'd speak
    to someone who is very tired
  metaphor_family: the body's felt sense, breath and grounding, tension held and slowly
    released, the nervous system settling like weather after a storm, the solid ground
    under your feet, warmth returning to a place that has been clenched too long
_needs_authoring: false
