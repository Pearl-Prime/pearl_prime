reader_promise_family: Burnout recovery for nurses that begins in the body, not the
  to-do list — a felt-sense path back to yourself that never asks you to push through,
  optimize, or perform your way out of exhaustion.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational text for why recovery
  has to happen in the body, not just the mind
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  burnout in caregivers with warmth and somatic completion of the stress cycle'
- Trauma Stewardship (Laura van Dernoot Lipsky) — speaks directly to those who care
  for others until there's nothing left, without blame
