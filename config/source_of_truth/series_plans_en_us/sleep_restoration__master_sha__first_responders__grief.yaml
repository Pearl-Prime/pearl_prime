reader_avatar:
  age: 32-55
  where_they_are: It is 2:40am and the house is asleep and you are not. You ran a
    call today that didn't end the way calls are supposed to end, and now you're lying
    in the dark replaying it frame by frame — the doorway, the hands, the face you
    couldn't save. Your body is still on the truck. Tomorrow you'll put the uniform
    back on and do it again, and no one will ask how the last one landed.
  what_they_need: To grieve the losses the job hands them without being told to push
    through, debrief, and move on; to learn that the weight they carry is not weakness;
    to find a way to set some of it down at night so they can rest, and to feel witnessed
    by a voice that understands the cost of the work without trying to fix the person
    doing it.
  what_they_avoid: Push-through toughness, 'stay strong for the crew' platitudes,
    peer-support box-checking, anything that frames feeling as unfit for duty, sleep-hacking
    and biohacking, toxic positivity, and any voice that rushes grief or treats rest
    as a luxury they have to earn.
series_voice_markers:
  register: steady, nocturnal, quietly architectural — a calm presence who sits with
    you through the heaviest hours; holds the weight without trying to lift it off
    you; never clinical, never a coach, never a peer-support script; the voice of
    someone who understands the cost of standing in those doorways and coming home
    carrying the same dark.
  sentence_rhythm: measured and unhurried; short, load-bearing sentences set beside
    longer ones that settle slowly toward stillness; pauses where a breath belongs;
    never urgent, never clipped, never selling.
  metaphor_family: night and the dark room, the heavy hours before dawn, foundations
    and what a structure can bear, a load finally set down, the empty chair, the body
    settling toward rest, the structure that holds you while you let go — never productivity,
    machinery, military bravado, or biohacking.
_needs_authoring: false
