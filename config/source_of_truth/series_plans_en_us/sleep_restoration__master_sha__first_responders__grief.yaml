reader_promise_family: For the first responder who carries the dead and the dying
  home in their body — a steady, nocturnal companion for the grief that has no shift
  end, no debrief, and no place to go. We will not rush you, fix you, or ask you to
  be strong. We will sit with you in the heavy hours while you finally set some of
  it down.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- The Body Keeps the Score companion field (Bessel van der Kolk) — why trauma and
  grief live in the body of people who do high-stakes work, written for the carrier,
  not the clinician.
- It's OK That You're Not OK series (Megan Devine) — grief as something to be witnessed
  and lived with rather than fixed or scheduled, in a plainspoken, non-clinical voice.
- Bearing the Unbearable (Joanne Cacciatore) — a tender, non-clinical companion for
  carrying losses that cannot be solved or rushed, written for the person doing the
  carrying.
