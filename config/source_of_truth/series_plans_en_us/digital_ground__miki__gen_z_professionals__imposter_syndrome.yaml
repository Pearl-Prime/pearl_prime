reader_promise_family: We won't tell you to fake confidence or 'own the room.' We'll
  name the exact thing happening when you're sure you got in by accident — in language
  you can actually use the next time the feeling shows up, on the train, in the Slack
  thread, in the bathroom before the meeting.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- Unfu*k Yourself series (Gary John Bishop) — plainspoken, anti-platitude, talks to
  you like a friend who's done pretending
- The Imposter Cure (Jessamy Hibberd) — names the impostor pattern without shaming
  you for having it
- How to Do the Work (Nicole LePera) — somatic, recognition-first, meets the reader
  in the body rather than the to-do list
