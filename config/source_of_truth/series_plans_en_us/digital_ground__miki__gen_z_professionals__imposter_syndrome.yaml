reader_avatar:
  age: 23-29
  where_they_are: Two years into the first real job, sitting in a one-on-one while
    a manager says 'you're doing great,' and the whole time a quiet voice underneath
    is saying they have no idea — and if they did, they'd take it back
  what_they_need: To hear that the gap they feel between how competent they look and
    how competent they feel is the most ordinary thing in the world — and to be handed
    words for it that aren't a worksheet or a morning routine
  what_they_avoid: Boomer 'fake it till you make it' confidence advice, LinkedIn thought-leader
    pep talks, grindset content that says the cure for self-doubt is more output,
    and anything that treats them as a personal brand to optimize
series_voice_markers:
  register: gen-z native, screen-literate, plainspoken and warm; ironic without being
    cynical; the smart slightly-older friend who actually gets the internet and would
    never call you a high-performer
  sentence_rhythm: short declaratives that land like texts, then one longer breath
    that opens the room; second person throughout; fragments used only for effect,
    never as filler
  metaphor_family: the present moment, the body in the chair, the phone face-down
    on the desk, ground under your feet, the breath between notifications, the signal
    under the noise — never machinery, never the military, never self-optimization
_needs_authoring: false
