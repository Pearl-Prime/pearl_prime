reader_avatar:
  age: 47 to 58, the sandwich generation, caught between aging parents and children
    who still need them
  where_they_are: It is 6:40 on a weekday evening. You are standing at the kitchen
    counter with your mother's pill organizer in one hand and your phone in the other,
    a text from your kid's school still unread, dinner not started, and a low electric
    hum running under your ribs that has not switched off since you woke. Everyone
    in this house needs something from you, and the one thing you cannot find anywhere
    is the off switch for the part of you that is bracing for the next thing to go
    wrong.
  what_they_need: To stop being the steady one for a single hour and let something
    larger hold them; to learn that the anxiety is not a character flaw to be fixed
    but an exhausted alarm asking to be heard; to find a calm that does not require
    them to be more efficient, more positive, or more in control.
  what_they_avoid: Self-optimization and life-hacking, quick-calm tricks, ten-minute
    morning routines, performative mindfulness, hustle culture wearing a wellness
    costume, and the relentless cheerfulness of anyone who tells them to just breathe
    and choose joy while their actual life is on fire.
series_voice_markers:
  register: Still, deep, and woodland-quiet — the calm of a forest interior. Unhurried
    and spacious, it lets silence do the work and never rushes a mind that is already
    running. Never clinical, never preachy, never selling a shortcut. The voice of
    someone who has sat with you in the trees and is in no hurry to leave.
  sentence_rhythm: Long, slowing sentences that lengthen the reader's breath, set
    against short ones that land like a single footstep on soft ground. Pauses are
    built in. The cadence asks you to read slower than you want to, the way a forest
    path asks you to walk slower than the street did.
  metaphor_family: 'The still forest and its deep quiet: old trees and patient roots,
    light filtering down through the canopy, the path that slows you, the pool that
    goes clear the moment it stops being stirred, the forest floor that holds without
    judgment everything that falls. Never machinery, never the body as a system to
    optimize, never the language of performance.'
_needs_authoring: false
