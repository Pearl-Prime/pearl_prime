reader_avatar:
  age: 30s to mid-40s
  where_they_are: Parked in the driveway at 6:40pm with the engine off, dreading the
    second shift waiting inside, stealing ninety seconds of quiet before the door,
    the dinner, the bath, the no they already know they won't manage to say
  what_they_need: To understand why a small ask feels like an emergency, why their
    own limits feel like a flaw, and why everyone else seems to hold the line so easily
    — and to be given permission to have boundaries without it becoming one more thing
    to perfect
  what_they_avoid: Perfect-parent pressure, self-care-Sunday commercialism, hustle
    and optimization, toxic positivity, and anything that asks an already-depleted
    parent to add one more task or feel one more way they're falling short
series_voice_markers:
  register: warm, tender, knowing; the voice of someone who parents too and is sitting
    beside you in the quiet, not a clinician handing down a method
  sentence_rhythm: long unspooling sentences that mirror a tired mind, broken by short
    plainspoken lines that land like a hand on the shoulder; second person throughout
  metaphor_family: the stolen moment, the pause in the car before going in, the quiet
    after bedtime, breath caught between demands, the threshold and the line you draw
    at it, the small still pocket reclaimed without anyone noticing
_needs_authoring: false
