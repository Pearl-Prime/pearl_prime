reader_promise_family: 'For the working parent who can''t find the line: a tender
  companion that meets you in the few stolen minutes you get, names the exact reason
  your boundaries keep failing, and gives you permission to have edges — without adding
  one more task to a life that''s already full.'
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Set Boundaries Workbook / Set Boundaries, Find Peace (Nedra Glover Tawwab) — the
  defining boundaries voice for the audience this series serves
- Good Inside (Becky Kennedy) — the warm, non-shaming companion register that meets
  exhausted parents where they are
- Real Self-Care (Pooja Lakshmin) — the same refusal of commercial, add-one-more-task
  self-care that defines this imprint's promise
