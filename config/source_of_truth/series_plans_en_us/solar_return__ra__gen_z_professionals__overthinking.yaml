  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 23 to 31
  where_they_are: It's 11:47pm on a Tuesday and you're lying in the dark re-reading
    a Slack message you already sent, rewriting it in your head, deciding your manager's
    one-word reply means something, lining up tomorrow's worst case before it has
    any right to exist — phone face-down, brain wide open, the rest of the apartment
    asleep.
  what_they_need: To understand that the overthinking is not a character flaw but
    an alarm system that loves them and got too good at its job — and to learn, without
    shame and without a productivity hack, how to let it rest.
  what_they_avoid: Grindset gurus, 'just stop thinking about it,' 5am cold-plunge
    optimization content, toxic positivity, and any book that treats their mind like
    a machine to debug instead of a fire to tend.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone who has sat with
    their own racing mind at 2am and lived, not a clinician and not a coach
  sentence_rhythm: plainspoken and close; short declaratives that land like a hand
    on the shoulder, opening into one longer breath when tenderness is needed; second
    person throughout
  metaphor_family: ember and ash, banked fire and slow rekindling, dawn and first
    light, warmth returning to cold hands, the turning of the year, what survives
    the burn and grows back green
_needs_authoring: false
