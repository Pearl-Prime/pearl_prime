reader_promise_family: You will learn to recognize the overthinking mind by name —
  false alarm, spiral, watcher — and meet it with warmth instead of war, so the same
  sharp instrument that exhausts you can finally bank down to a steady, usable warmth.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- Don't Believe Everything You Think (Joseph Nguyen) — same core reframe that thought
  is not the enemy, met here with warmth instead of detachment
- The Anxiety Toolkit (Alice Boyes) — practical, kind, anti-shame help for the over-analyzing
  mind, written for people who run hot
- How to Keep House While Drowning (KC Davis) — gentle, non-judgmental, permission-first
  self-help that refuses to moralize struggle, in the tone Gen Z actually trusts
