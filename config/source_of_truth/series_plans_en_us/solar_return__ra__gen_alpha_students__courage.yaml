reader_avatar:
  age: 14 to 18, a high school student
  where_they_are: It's third period and the teacher asks who wants to go first. Your
    hand stays down. Your heart is already going like you ran here, even though you've
    been sitting still. The version of you in your group chat is funny and brave;
    the one in this chair can't make a sound. The bell hasn't rung and you're already
    exhausted from not raising your hand.
  what_they_need: To understand that the racing-heart, the can't-make-myself feeling,
    isn't proof they're broken or behind — it's a body doing its job badly, and they
    can move with it instead of waiting for it to stop. Permission to be scared and
    act anyway, in language a real teenager would actually use.
  what_they_avoid: Adults who say 'just be confident' or 'put yourself out there,'
    motivational-poster energy, grindset and hustle talk, anything that treats fear
    like a character flaw or a thing you fix with enough willpower and a 5am routine.
series_voice_markers:
  register: Warm, emboldening, quietly fierce — like an older sibling who's already
    been through the burn and won't lie to you about how scared you'll be; affirming
    without hype, tends the spark instead of yelling at it, never clinical, never
    a coach, never a hype account.
  sentence_rhythm: Plain, close, mostly short. Direct address. A blunt true sentence,
    then room to breathe. Builds slow and lands soft; never breathless, never a pep
    rally, never adult-talking-down.
  metaphor_family: Ember and ash, banked fire, the slow rekindling; dawn and first
    light; warmth returning to cold hands; the edge and the single step before you're
    ready; what survives the burn and grows back green. Never machinery, military,
    productivity, or biohacking.
_needs_authoring: false
