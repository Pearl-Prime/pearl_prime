reader_promise_family: Courage you can carry into a real room — not a hype speech,
  but a quiet, steady warmth that helps you do the brave small thing before you feel
  ready. Each book names one way fear shows up in a young life and stays beside you
  through it, so you stop waiting to feel fearless and start moving while you're still
  scared.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Self-Love Workbook for Teens (Shainna Ali) — meets the same high-school reader
  where shame and not-enoughness live, in plain warm language.
- Untangle Your Anxiety (Joshua Fletcher & Dean Stott) — names the false-alarm body
  without clinical distance, the way this series names courage.
- The Confidence Code for Girls (Katty Kay & Claire Shipman) — courage-and-action
  voice for young readers, action over feeling fearless first.
