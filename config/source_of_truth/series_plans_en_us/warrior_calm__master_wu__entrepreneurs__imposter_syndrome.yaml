reader_avatar:
  age: 32 to 48
  where_they_are: It's late, the office is empty, and you're staring at a term sheet,
    a press mention, or a Slack channel full of people who report to you — and a quiet
    voice is insisting that none of it is real, that you bluffed your way in, and
    that the day someone finds out is already on the calendar.
  what_they_need: Permission to keep building while the doubt is still in the room
    — a way to act from a steady center instead of waiting to feel like they deserve
    the chair before they sit in it.
  what_they_avoid: Hustle anthems, 'fake it till you make it,' affirmation scripts,
    anything that tells them to silence the fear by working harder or shouting louder,
    and any book that mistakes bravado for strength.
series_voice_markers:
  register: Grounded, disciplined, quietly strong — the voice of someone who has stood
    in the same fear and stopped running from it. Spare and steady, never clinical,
    never preachy, never a pep talk. A warrior's calm that meets doubt without flinching
    and without needing to win.
  sentence_rhythm: Short, weighted lines that land like footfalls, opening into one
    longer breath when the moment asks for it. Stillness between sentences. Nothing
    rushed, nothing padded — the pacing of someone who has learned that the breath
    before action is where the strength lives.
  metaphor_family: The still center inside the storm; the gate that holds under pressure;
    standing your ground; the breath before action; what is forged and what merely
    hardens; the warrior with nothing left to prove. Never machinery, optimization,
    productivity hacks, or biohacking.
_needs_authoring: false
