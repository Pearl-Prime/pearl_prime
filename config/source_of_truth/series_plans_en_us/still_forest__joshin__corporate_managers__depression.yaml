reader_promise_family: 'For the manager who holds everyone else together and goes
  home hollow: a forest-quiet companion that doesn''t try to fix your depression or
  optimize you out of it, but walks slowly enough to let you be witnessed in it —
  until the weight is named, the load is set down, and something in you can finally
  go still.'
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- The Power of Now series (Eckhart Tolle) — quiet, present-tense companioning of a
  suffering mind without a fix-it agenda
- When Things Fall Apart and related works (Pema Chödrön) — sitting with difficulty
  and groundlessness instead of escaping it
- The Comfort Book / Reasons to Stay Alive lineage (Matt Haig) — plainspoken, deeply
  human company for the depressed mind that refuses toxic positivity
