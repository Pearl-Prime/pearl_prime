reader_avatar:
  age: 38-55
  where_they_are: It's 9:40pm. The laptop is still open on the kitchen counter, the
    team is finally quiet on Slack, and you are lying on top of the covers in your
    work clothes, staring at the ceiling. You ran every meeting today. You were the
    steady one. And now there is nothing left — not sadness exactly, just a grey weight
    on your chest and the certainty that tomorrow you have to do it all again.
  what_they_need: To be met, not managed — to hear someone name the flat grey weight
    they carry without turning it into a problem to solve; permission to stop performing
    fine; one honest, unhurried place where being depressed isn't a performance review.
  what_they_avoid: Self-optimization and life-hacks, 'just be grateful' positivity,
    productivity dashboards for the soul, performative mindfulness, anything that
    treats a flattened mind as a sprint to win or a metric to move.
series_voice_markers:
  register: still, deep, woodland-quiet; the unhurried calm of a forest interior;
    plainspoken and spacious, never clinical, never preachy, never hustle; a voice
    that sits with you on the forest floor rather than coaching you off it
  sentence_rhythm: slow and breathing, with long unhurried sentences that open into
    clearings and short ones that land like a single footstep; pauses left deliberately
    empty so silence can do the work; never urgent, never a to-do list
  metaphor_family: the still forest and its deep quiet — old trees and patient roots,
    light filtering down through the canopy, the path that slows your pace, the pool
    that goes clear only when it stops being stirred, the forest floor that holds
    without judgment whatever finally falls
_needs_authoring: false
