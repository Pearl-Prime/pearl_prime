reader_avatar:
  age: "13–18"
  where_they_are: >
    It's the group chat at 11pm, everyone posting grades and acceptances and
    finished projects, and they're holding their phone in the dark, sure that
    everyone else actually gets it and they're just really good at pretending.
  what_they_need: >
    Someone who talks to them like a person, not a problem to be fixed — who names
    the fraud feeling out loud and treats it as something smart and survivable,
    not a flaw to be diagnosed.
  what_they_avoid: >
    Adults explaining their brain to them. Clinical labels. Cheesy 'believe in
    yourself' pep talks and anything that sounds like a worksheet.
series_voice_markers:
  register: "close, plainspoken, real-talk; the voice of an older friend who gets it, not a counselor or a teacher"
  sentence_rhythm: "short, direct lines; the rhythm of texting and talking; the occasional longer line that slows down and lands"
  metaphor_family: "school hallways, group chats, screens, performing for a crowd, masks and backstage — never clinical, never corporate, never machinery"
  second_person_default: true
_needs_authoring: false
