reader_promise_family: >
  You'll learn to recognize the voice that says you don't really belong here — the
  one certain you faked your way in and any minute now they'll all find out. Not
  to argue with it or beat it, but to see it for what it is. Two books, two doors
  into the same feeling. Each one walks up to that "I'm a fraud" voice from a
  different angle, in words that actually sound like you.
bestseller_hook_family: recognition_descent
emotional_engine: imposter_syndrome_recognition
comp_series:
- "The Self-Driven Child (William Stixrud & Ned Johnson) — pressure and the anxious student"
- "Untangled (Lisa Damour) — the inner life of a teenager, named without judgment"
- "How to Be a Person (Catherine Newman) — plainspoken, warm, real-talk for young people"
