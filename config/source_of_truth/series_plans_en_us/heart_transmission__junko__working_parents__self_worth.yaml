reader_promise_family: 'You do not have to earn the right to be enough. To the working
  parent measuring their worth by everything they produce and everyone they please,
  this series offers a quieter truth, passed heart to heart: the love was never something
  you had to win, and the warmth you give everyone else was always meant for you too.'
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Self-Love Experiment series (Shannon Kaiser) — warm, permission-giving books
  for readers who feel they must earn their worth, matched in tenderness if not in
  topic.
- The Untethered Soul and its companions (Michael A. Singer) — interior, presence-based
  work on the voice that judges from within, kin to this series' quiet inward turn.
- How to Do the Work / companion workbooks (Nicole LePera) — the self-worth-and-healing
  shelf this reader already browses, sharing the audience without the clinical register.
