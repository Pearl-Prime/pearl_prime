reader_avatar:
  age: 32 to 48
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is running,
    the laptop is open again because there's one more thing, and they're sitting in
    the half-dark of the kitchen wondering why doing everything still feels like not
    enough.
  what_they_need: To feel that their worth is not a verdict to be earned shift by
    shift, drop-off by drop-off; to set the armor down somewhere safe and discover
    they are still held; to receive a fraction of the patience they give their children
    and their colleagues.
  what_they_avoid: Cold technique and mindset hacks, performative spirituality, hustle-culture
    self-improvement, toxic positivity, and any book that turns the tender business
    of their own heart into one more system to optimize and one more standard to fall
    short of.
series_voice_markers:
  register: Intimate, heart-to-heart, quietly luminous; the voice of someone who has
    sat at that same kitchen table, speaking close and unhurried, never clinical,
    never preachy, never selling a fix.
  sentence_rhythm: Unhurried and breath-paced; short declarative lines of permission
    set against longer, gathering sentences that hold a felt moment; gentle direct
    address, the cadence of something said softly across a small table.
  metaphor_family: The heart and what passes between two of them; light handed from
    one palm to another; the warmth of presence; the unguarded moment; the open hand
    setting down what it gripped; the armor loosened; breath shared in a quiet room;
    never machinery, military, productivity, or biohacking.
_needs_authoring: false
