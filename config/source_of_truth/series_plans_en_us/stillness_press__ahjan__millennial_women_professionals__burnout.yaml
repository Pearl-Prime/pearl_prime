reader_avatar:
  age: early-to-late thirties
  where_they_are: It's a Tuesday night and she is still at the kitchen table with
    her laptop open, the dishes undone, three Slack notifications she hasn't opened,
    telling herself she'll feel like a person again once she catches up — knowing
    she has been telling herself that for two years and the catching up never comes.
  what_they_need: To hear that the exhaustion is real and not a character flaw; that
    she is allowed to be this tired; that rest is not a reward she has to earn back
    through one more good week. She needs a voice that lets her stop, not a system
    that helps her do more, faster, with a calmer face.
  what_they_avoid: Hustle-culture rebrands of self-care, '5am morning routine' fixes,
    productivity gurus who turn rest into a discipline, toxic positivity that tells
    her to be grateful, and any book that quietly implies the burnout is hers to solve
    by trying harder.
series_voice_markers:
  register: contemplative, spacious, grounded — the voice of someone who has been
    this depleted and is sitting beside you, not above you; never clinical, never
    a coach, never selling the next sprint
  sentence_rhythm: unhurried and breath-paced; short declarative sentences that land
    and leave room, occasionally opening into one longer line that exhales; built
    to be read slowly, with pauses the reader is allowed to take
  metaphor_family: stillness, breath, settling water, open ground, light through a
    window, the pause between — never machinery, optimization, military, or biohacking
_needs_authoring: false
