reader_promise_family: You will not be optimized, fixed, or coached out of your burnout.
  You will be met in it — by a quiet, unhurried voice that has sat in the same exhaustion
  and found that the way through is not more effort but permission to set the load
  down. Each book is a place to stop performing your way out of being tired.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — the
  definitive burnout book for women, sharing this series'' refusal to blame the exhausted
  person'
- How to Do Nothing (Jenny Odell) — a contemplative case against the attention-and-productivity
  machine that resonates with the same reader who is tired of being optimized
- Rest Is Resistance (Tricia Hersey) — permission-giving, anti-grind rest writing
  for depleted people who recoil from hustle self-help
