reader_promise_family: For the manager who has been carrying the whole load and calling
  it competence — a steady voice that lets the weight be named, and then set down,
  without ever asking you to perform recovery the way you've performed everything
  else.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  names burnout as a physiological load to complete, not a character flaw, which is
  the same premise this series rests on'
- The Mountain Is You (Brianna Wiest) — pairs a steady, non-clinical voice with the
  self-sabotage of high performers, close in tone and reader
- Dare to Lead (Brené Brown) — written for people who carry organizational weight
  and are tired of armoring up, the exact persona this series serves
