  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: late 30s to early 50s
  where_they_are: It's 9:40 on a Tuesday night. The house has gone quiet, the laptop
    is still warm, and you are sitting in the kitchen you renovated three years ago,
    staring at a calendar that is already full tomorrow. You are not crying and you
    are not panicking. You are simply too tired to stand up, and you cannot remember
    the last week that felt like enough.
  what_they_need: Permission to admit they are running on empty without it costing
    them their authority — language that treats burnout as load, not weakness, and
    a way back that doesn't require quitting, confessing, or becoming someone softer
    at work.
  what_they_avoid: Executive-performance hustle, 'optimize your recovery' productivity
    hacks, power-posing confidence theater, toxic positivity, and any book that treats
    a leader's exhaustion as a flaw to fix in secret.
series_voice_markers:
  register: steady, substantial, composed — the solidity of granite under pressure;
    spare and warm, written for people who carry weight and are tired of being told
    to carry it better
  sentence_rhythm: load-bearing and unhurried; short declaratives that land like set
    stone, opened occasionally by one longer sentence that holds more than it should
    — the prose equivalent of a structure that does not flex
  metaphor_family: granite and bedrock, the ridge that does not move, weight-bearing
    stone, the steady mass beneath the surface, what holds under load, the mountain
    that weathers every season
_needs_authoring: false
