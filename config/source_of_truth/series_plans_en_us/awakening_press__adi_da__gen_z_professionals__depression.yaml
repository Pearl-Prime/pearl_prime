reader_avatar:
  age: 23-29, early-career professional, raised online
  where_they_are: It's 11pm on a Tuesday. The laptop is finally closed, the Slack
    notifications have gone quiet, and you're sitting on the edge of your bed in a
    room you pay too much for, phone glowing in your hand, scrolling without reading.
    From the outside today went fine — you replied to everything, you smiled in the
    standup. Inside there's a flat gray ceiling pressing down that's been there so
    long you've stopped noticing it's not the sky.
  what_they_need: Permission to stop performing okayness. Language for a heaviness
    that isn't dramatic enough to name and won't lift no matter what they achieve.
    A way to relate to the dark without being told to fight it, fix it, or be grateful
    it isn't worse — and the dawning recognition that the one who notices the heaviness
    is not made of it.
  what_they_avoid: Spiritual bypassing and 'just raise your vibration' platitudes.
    Hustle-coded self-help that reframes depression as a motivation problem. Clinical
    flatness and symptom checklists. Toxic positivity. Anyone who confuses awakening
    with another thing to optimize and achieve.
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate not lofty; reverent without
    dogma; the voice of someone sitting in the dim room with you, not a clinician
    across a desk or a guru on a stage
  sentence_rhythm: unhurried; short declaratives that land and leave silence after
    them, occasionally opening into one long breath of a sentence; never rushed, never
    urgent, no exclamation, plenty of white space
  metaphor_family: waking from a dream, the open sky behind the weather, the light
    already present in the room, the loosening of a grip you didn't know you were
    holding, coming home to what was never lost
_needs_authoring: false
