reader_promise_family: You are not the gray weight you've been carrying. Beneath the
  flatness, the numbness, the quiet conviction that something in you is broken, there
  is an awareness that was never touched by any of it. This series doesn't try to
  fix your depression or argue you out of it. It walks beside you while you stop believing
  you are the dream you woke up inside of.
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- The Untethered Soul (Michael A. Singer) — same loosening of identification from
  the inner voice and the heaviness, written for the awakened-curious rather than
  the clinical
- When Things Fall Apart (Pema Chödrön) — meets the dark without trying to fix it,
  reverent and plainspoken about sitting in what hurts
- Reasons to Stay Alive (Matt Haig) — intimate first-person companionship for the
  young and depressed, the felt texture of the gray rather than a treatment plan
