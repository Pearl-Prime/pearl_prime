reader_promise_family: Courage you don't have to manufacture. Across these books you'll
  stop trying to build the nerve you think you're missing and come to recognize the
  steadiness that was already underneath the fear — the part of you that was never
  actually in danger, only convinced it was. Not braver. More awake to what's already
  here.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — same move of dis-identifying from
  the anxious voice and resting in awareness behind it, for readers who want depth
  without dogma
- When Things Fall Apart and the Pema Chödrön library (Pema Chödrön) — leaning toward
  fear instead of armoring against it, intimate and unflinching, no spiritual bypass
- Dare to Lead / Daring Greatly (Brené Brown) — courage reframed as vulnerability
  rather than fearlessness, speaking directly to high-achievers who hide their shame
