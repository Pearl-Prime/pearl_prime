reader_avatar:
  age: 29-44
  where_they_are: It's 1:47am and you're still on the laptop, slacking yourself a
    note so you don't forget the thing that will matter at 9am. The standup is in
    seven hours. The funding runway is a number you recalculate without meaning to.
    You closed the deck an hour ago and your chest still hasn't gotten the memo —
    it's braced for an impact that keeps not arriving.
  what_they_need: To recognize that the courage they're trying to build is not missing
    — that what they call cowardice is an alarm system that learned to fire in a world
    of pings and deadlines, and that beneath it is a steadiness they can return to
    without earning it first.
  what_they_avoid: Hustle-culture grit, 'just be confident' pep talks, anything that
    frames courage as one more KPI to optimize, guru-speak, manufactured fearlessness,
    and self-help that adds a new performance to fail at.
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate not lofty; the voice of
    someone who has sat in the same 2am dread and stopped fighting it — never clinical,
    never a pep talk, never hustle
  sentence_rhythm: long settling sentences that open the chest, broken by short ones
    that land like a hand on the shoulder; whitespace as breath; questions left genuinely
    open rather than rhetorically closed
  metaphor_family: waking from a dream you mistook for the world, the open sky behind
    the weather of thought, the steadiness beneath the alarm, the false floor giving
    way to solid ground, coming home to what was never lost — never machinery, military,
    or productivity language
_needs_authoring: false
