reader_promise_family: A warm, honest place to sit with the particular exhaustion
  of caring for everyone but yourself — these books don't hand you a system to manage
  your family better; they pull up a chair and tell the truth about compassion fatigue,
  gently and without blame, until you can finally hear yourself think across the table
  again.
bestseller_hook_family: ''
emotional_engine: compassion_fatigue_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  depletion-from-caregiving without blaming the caregiver, the same compassion this
  series extends to worn-out parents'
- How to Keep House While Drowning (KC Davis) — gentle, shame-free, 'you are not the
  problem' voice for people running on empty, a close cousin to the two-chairs register
- The Book You Wish Your Parents Had Read (Philippa Perry) — relational and plainspoken
  about love under strain, treating the family as people to be understood rather than
  a system to be managed
