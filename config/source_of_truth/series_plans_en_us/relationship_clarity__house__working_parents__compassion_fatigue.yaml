reader_avatar:
  age: 32-46
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is running,
    your partner is asking what's wrong and you say 'nothing' because the real answer
    would take an hour you don't have. You love them. You poured yourself out all
    day — at work, at pickup, at dinner — and now you're sitting on the edge of the
    bed with nothing left to give and a flat, guilty numbness where the love is supposed
    to be.
  what_they_need: To hear that the numbness is not a character flaw, that being depleted
    by caring is a real and nameable thing, and that they are still a good parent
    and a good partner even when the well has run dry. Permission to stop performing
    okay-ness across the table from the people they love.
  what_they_avoid: Self-care checklists, communication scripts that sound like a hostage
    negotiation, 'just be present' guilt, productivity-coded parenting hacks, and
    any book that treats their marriage or their kids as a problem to optimize.
series_voice_markers:
  register: warm, honest, relational — the calm of two chairs facing each other; gentle
    and direct about hard conversations; never clinical, never preachy, never hustle
  sentence_rhythm: unhurried and conversational; short plain sentences that land,
    then a longer breath that holds the feeling; the cadence of someone sitting across
    from you who is in no rush and has nowhere else to be
  metaphor_family: two chairs facing each other, the conversation you keep avoiding,
    the space between two people, what goes unsaid across the table, the door left
    open or closed, the cup poured out, the truth spoken plainly and kindly
_needs_authoring: false
