reader_avatar:
  age: 28 to 38
  where_they_are: It's 11:40pm. The laptop is finally closed but her chest hasn't
    gotten the message. She's lying in the dark replaying one sentence she said in
    the 2pm meeting, drafting tomorrow's apology she'll never send, while the person
    beside her sleeps and her phone glows 6% on the nightstand.
  what_they_need: To be told, by a voice that feels like a trusted friend and not
    a clinician, that the part of her that never stops bracing is not broken — and
    to be shown how to let one finger at a time come off the railing without being
    handed another performance to nail.
  what_they_avoid: Cold technique, mindset hacks, five-step morning routines, breathwork
    sold like a productivity upgrade, performative spirituality, and anyone who tells
    her to 'just be positive' about a body that has been on alert since she was twelve.
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; the warmth of someone who
    has sat where you sit, speaking close and unhurried — never clinical, never preachy,
    never hustle
  sentence_rhythm: short, breathing lines that slow the reader down; a long unspooling
    sentence when the feeling needs room, then a hand-on-the-shoulder fragment to
    land it; the cadence of being talked through something, not lectured at
  metaphor_family: the heart and what passes between two of them — light handed palm
    to palm, warmth held in a quiet room, the unguarded moment, the open hand, breath
    shared across a small table; never machinery, never the body as a system to optimize
_needs_authoring: false
