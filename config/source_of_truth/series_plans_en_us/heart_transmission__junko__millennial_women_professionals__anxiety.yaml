reader_promise_family: You will be met exactly where you are, heart to heart — not
  handed a system to fix yourself, but offered a quiet room where the anxious, overachieving
  part of you can finally set something down. Each book takes one doorway into the
  fear and stays there with you until it softens, the way warmth passes between two
  people sitting close.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — interior, voice-driven companionship
  with the anxious mind rather than a clinical fix
- How to Be Yourself / social-anxiety work (Ellen Hendriksen) — warm, deeply seen
  permission for the over-monitoring professional woman
- Good Morning, Monster–style narrative care (Catherine Gildiner) — the felt sense
  of being accompanied through fear by someone who has been there
