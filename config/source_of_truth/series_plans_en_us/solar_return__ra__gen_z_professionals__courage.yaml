reader_avatar:
  age: 22 to 29, early-career creative and knowledge workers
  where_they_are: It's 11:40pm and the email is written — three sentences asking for
    the thing you actually want — sitting in the draft folder with the cursor blinking
    over Send, and you've reread it nine times, and your chest is tight, and you tell
    yourself you'll do it in the morning when you feel more sure, knowing the morning
    will feel exactly like this.
  what_they_need: Language for the freeze that isn't a pep talk; permission to be
    scared and act anyway; one small, doable step sized for a body that doesn't feel
    ready; the relief of learning the fear is not a verdict on your worth.
  what_they_avoid: rah-rah motivation, hustle culture, 'just believe in yourself,'
    grindset gurus, manifesting, toxic positivity, anyone who treats fear as a character
    flaw to be willpowered away
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone who has stood
    on the same edge and stayed there with you; affirming without hype, tending the
    courage that's already in you rather than manufacturing more; never a coach, never
    a clinician, never hustle
  sentence_rhythm: plainspoken and close, short declaratives that land like a hand
    on the shoulder, broken by the occasional long breath of a sentence that lets
    the warmth in; questions left open, never rhetorical
  metaphor_family: the banked ember and the slow rekindling, the cliff edge and the
    single step taken before you're ready, warmth returning to cold hands, first light
    at the end of a long night, what survives the burn and grows back green — never
    machinery, military, or productivity
_needs_authoring: false
