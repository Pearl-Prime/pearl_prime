reader_promise_family: A warm, unhurried companion for the early-career moment right
  before the brave thing — not to push you off the edge, but to sit with you on it
  until your hands stop shaking and the next small step stops looking impossible.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Daring Way / Brené Brown's vulnerability work (Brené Brown) — names courage
  as something you do scared, not something you feel first
- The Comfort Book (Matt Haig) — short, warm, second-person companionship for the
  hard hours rather than a program to complete
- How to Do the Work / a gentler self-reckoning shelf (Nicole LePera) — the early-career
  reader's appetite for naming the pattern without being shamed for having it
