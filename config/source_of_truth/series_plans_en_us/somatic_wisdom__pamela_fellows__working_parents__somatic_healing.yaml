reader_promise_family: You will not be asked to push through, fix yourself, or out-think
  your own body. You'll be met where the tension actually lives — between the daycare
  drop-off and the inbox, in the held breath you didn't know you were holding — and
  shown, gently and without agenda, what your nervous system has been carrying. No
  protocol. No optimization. Just recognition, and the slow return of warmth to a
  braced place.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational text every somatic
  reader trusts; this series lives in its lineage but speaks at kitchen-counter range,
  not lecture range.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — same audience of depleted, over-functioning caregivers, same refusal to blame
  the sufferer for a nervous-system response.'
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the warm, plainspoken, non-clinical
  self-help register that working parents actually read at 9pm, paired here with a
  body-first lens.
