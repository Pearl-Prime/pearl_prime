reader_avatar:
  age: Early 30s to late 40s
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is running,
    and they're standing at the kitchen counter with one hand on the cold edge, realizing
    they've been holding their shoulders up near their ears since roughly 6am. They
    can't point to anything that went wrong today. Nothing went wrong. And yet their
    whole body is braced, jaw tight, chest shallow, as if waiting for a sound from
    the other room — and they don't understand why they can't just put it down.
  what_they_need: To understand what their body is doing and why it makes complete
    sense — in plain, kind language they can carry into the next hard moment. Permission
    to stop overriding the signal. A felt experience of the ground holding them, even
    for ten seconds, in a body that has forgotten it's allowed to rest.
  what_they_avoid: Push-through fixes, 'mind over matter,' cold clinical protocols,
    anything that treats their body like a malfunctioning machine to be optimized,
    morning routines that become one more thing to fail at, and any intensity that
    asks them to relive the worst of it to 'heal' it.
series_voice_markers:
  register: Embodied, grounded, gently somatic and trauma-informed — the voice of
    someone who sits beside you and notices your shoulders before you do; warm witness,
    never clinician, never coach, never hustle. Speaks from the body and to the body.
  sentence_rhythm: Breath-paced. Short sentences that let you exhale, set against
    longer ones that follow a sensation as it moves through the body. Frequent pauses.
    Nothing rushed — the rhythm itself models the settling it describes.
  metaphor_family: The felt sense; breath and grounding; tension held and slowly released;
    the nervous system settling like weather passing; the floor and the ground beneath
    you; warmth returning to a place that has been braced cold; the threshold and
    the doorway you can stand in without crossing yet.
_needs_authoring: false
