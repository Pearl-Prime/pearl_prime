    max_books_per_brand_per_month: 2
reader_avatar:
  age: early-to-mid twenties, first real salary or first stretch of gig income
  where_they_are: It's a Tuesday night and you've just opened the banking app for
    the fourth time, as if the balance might have changed since the last refresh.
    Rent clears Friday, the student loan auto-pays Monday, and the math doesn't leave
    room to breathe. Your friends are posting trips you can't afford and you're doing
    the silent arithmetic of how long you could last if one thing went wrong.
  what_they_need: to separate the genuine pressure of being underpaid and overcharged
    from the private verdict that they are bad with money, behind, or fundamentally
    not enough — and to find a steadier center that the next paycheck can't move
  what_they_avoid: budgeting-guru hustle, shame-coded 'cut the lattes' lectures, toxic
    abundance-mindset platitudes, and any advice that pretends the rent isn't actually
    high
series_voice_markers:
  register: balanced, warm, discerning — a heart-centered voice about money and worth
    that weighs the real cost fairly; gentle but clear-eyed, never clinical, never
    a finance bro, never preachy
  sentence_rhythm: measured and even, like a scale settling; short declaratives for
    the hard truths, longer steadying lines for the turn — pauses where a breath belongs,
    never urgent
  metaphor_family: the feather and the scale, weight and balance, the heart weighed
    against a feather, the fulcrum that holds, what you owe and what you're worth
    kept on separate pans
_needs_authoring: false
