reader_promise_family: A heart-centered way to carry money fear without letting it
  decide your worth — weighing the real weight of financial stress against the feather
  of who you are, so the number stops being the verdict.
bestseller_hook_family: ''
emotional_engine: financial_stress_recognition
comp_series:
- Good Vibes, Good Life series (Vex King) — accessible, worth-first self-help for
  a young audience that refuses hustle framing
- The Financial Diet (Chelsea Fagan) — money writing for young adults that names the
  emotional weight, not just the spreadsheet
- The Book of Boundaries adjacent work (Melissa Urban) — clear-eyed, compassionate
  limit-setting that honors the real cost of holding a line
