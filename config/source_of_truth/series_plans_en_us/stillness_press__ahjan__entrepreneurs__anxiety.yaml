reader_promise_family: |
  You'll learn to recognize what your anxious body is doing without needing to make it stop. 7 books across engines of the same underlying capacity — each one enters the work from a different angle.
bestseller_hook_family: recognition_descent
emotional_engine: anxiety_recognition
comp_series:
- Unwinding Anxiety (Judson Brewer) — mechanism + noticing register
- When Things Fall Apart (Pema Chödrön) — surrender register
- The Happiness Trap (Russ Harris) — ACT informal voice
platform_strategy:
  primary:
  - kdp_ebook
  - audible
  secondary:
  - apple_books
