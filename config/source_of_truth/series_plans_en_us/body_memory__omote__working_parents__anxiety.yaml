reader_avatar:
  age: 30s to mid-40s
  where_they_are: It's 6:40am. The lunchbox is half-packed, one kid is crying about
    the wrong socks, a work message just lit up the phone face-down on the counter,
    and your chest is already tight before the day has technically started. You are
    standing in the kitchen telling everyone it's fine in a voice that does not match
    the feeling in your body.
  what_they_need: To understand that the tightness, the bracing, the never-off scanning
    is the body keeping an old promise to keep everyone safe — and that they can be
    met with steadiness instead of one more thing to manage.
  what_they_avoid: Push-through toughness, 'just relax,' performative calm, productivity
    hacks, biohacking, toxic positivity, and any advice that adds another task to
    a person who is already carrying too much.
series_voice_markers:
  register: grounded, steady, holding; warm and plain, the voice of someone who sits
    down beside you on the kitchen floor instead of standing over you with a clipboard.
    Never clinical, never preachy, never hustle.
  sentence_rhythm: short, weight-bearing sentences that let you exhale between them;
    one clear idea set down at a time, with room around it; occasionally a longer
    sentence that carries you and then lets you go.
  metaphor_family: held ground and the earth beneath you; weight supported and set
    down; roots and steadiness; the body remembering it is safe; what holds when everything
    shakes; the ground that does not move. Never machinery, military, productivity,
    or biohacking.
_needs_authoring: false
