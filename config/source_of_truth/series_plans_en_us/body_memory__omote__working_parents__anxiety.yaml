reader_promise_family: You will not be asked to push through, fix yourself, or perform
  calm. On this page you get to set the weight down for a while and remember that
  the ground is still holding you, even on the days you are sure it isn't.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- Good Inside (Becky Kennedy) — meets overwhelmed parents with steadiness and zero
  shame, the same warm holding tone instead of another fix-it system.
- Burnout (Emily & Amelia Nagoski) — names the somatic stress cycle in the body and
  offers completion rather than push-through, the same body-first relief this series
  promises.
- The Book of Boundaries (Melissa Urban) — practical, grounded, never preachy permission-giving
  for depleted adults, sharing this series' register of holding without gripping.
