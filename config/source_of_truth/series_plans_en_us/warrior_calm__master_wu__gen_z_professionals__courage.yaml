reader_avatar:
  age: 22 to 29
  where_they_are: It's 8:54am and the meeting starts at 9. The cursor is blinking
    in a Slack draft you've rewritten four times. There's a comment you should make,
    a no you should say, a thing you actually think — and your thumb is hovering,
    your heart is going, and you can already feel yourself deciding to stay quiet
    and hate yourself for it later.
  what_they_need: A way to act before the fear clears — small, repeatable, unspectacular
    courage that doesn't require becoming a louder or harder person, and that treats
    their fear as information rather than a flaw to grind away.
  what_they_avoid: Hustle-culture grind, 'no pain no gain', toughness-as-armor, motivational
    shouting, toxic positivity, and any voice that mistakes noise, aggression, or
    confidence-faking for real strength.
series_voice_markers:
  register: Grounded, disciplined, quietly strong — a warrior's calm that meets fear
    without flinching. Steady and spare, strength without bravado; never clinical,
    never preachy, never hustle. The voice of someone who has stood at the edge enough
    times to speak to you softly from it.
  sentence_rhythm: Short, weighted sentences that land like footsteps. Plain words,
    few of them. A long breath of an opening line, then clipped certainty. Pauses
    where another book would push.
  metaphor_family: The still center in the storm, the gate that holds, standing your
    ground, the breath before action, the edge and the single step taken before you're
    ready, what is forged and what holds, the warrior with nothing left to prove —
    never machinery, productivity, or biohacking.
_needs_authoring: false
