reader_promise_family: You don't have to feel ready, fearless, or fixed to act. Courage
  is not the absence of fear but the trained calm that lets you take one honest step
  while the fear is still talking — and these books teach that calm to a generation
  told to hustle through it instead.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Daily Stoic series (Ryan Holiday) — short, disciplined, calm-under-pressure
  entries for readers who want steadiness over hype.
- Pema Chodron's fear-and-groundlessness books, e.g. When Things Fall Apart (Pema
  Chodron) — meeting fear with presence instead of fighting it, in a spare and humane
  voice.
- Untamed-adjacent courage-to-act memoirs like Daring Greatly (Brene Brown) — vulnerability
  and courage reframed as strength, for an audience raised on performance.
