reader_promise_family: 'You don''t have to become someone harder to protect what matters
  to you. Drawing a line is not the end of being kind, gentle, or open-hearted — it''s
  where the real you finally gets room to be made. These books treat the word ''no''
  as the first clean mark on a blank canvas: not a wall, but an edge that lets the
  picture begin.'
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- The Self-Esteem Workbook for Teens (Lisa M. Schab) — the same young-reader audience
  and gentle, do-it-with-me tone, but skills-and-worksheets where ours is narrative
  and felt-sense
- You Are a Badass (Jen Sincero) — proves the appetite for warm, plainspoken self-permission
  that isn't clinical, though ours drops the hustle and speaks to a far younger reader
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the definitive adult boundaries
  comp; ours is the version that meets you back when the group chat, not the workplace,
  was where you first learned to disappear
