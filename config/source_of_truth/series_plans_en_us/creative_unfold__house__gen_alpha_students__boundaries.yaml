reader_avatar:
  age: roughly 11 to 16 — middle and early high school, the youngest readers in the
    catalog, fluent in group chats and comment sections before they are fluent in
    their own limits
  where_they_are: It's 10:47pm and the group chat has been going for an hour, and
    there's a message you typed and deleted four times — the one where you say you
    can't, you don't want to, you're tired, please stop — and instead you send the
    thumbs-up. You lie back in the blue light of your phone with a feeling in your
    chest like you swallowed something the wrong way, and you tell yourself it's fine,
    it's just easier, it's not a big deal, while a small part of you keeps a tally
    of every time you disappeared so nobody would be mad.
  what_they_need: permission to take up space without being told they're 'too sensitive'
    or 'making it a thing'; words for the line they already feel but were taught not
    to name; proof that being liked and being honest are not opposites; an adult voice
    that talks WITH them, not down at them
  what_they_avoid: anything that sounds like a teacher, a 'be confident!' poster,
    or a parent who read one article; cringe slang from someone trying to be young;
    tough-love 'just don't care what people think' advice that ignores how much it
    actually costs to be left out at their age
series_voice_markers:
  register: open, warm, plainspoken; the voice of an older sibling who got out a few
    years ahead and doubled back to tell you what nobody told them — honest, a little
    funny, never preachy, never clinical, never a motivational poster
  sentence_rhythm: short and direct when it lands a truth, longer and looser when
    it's keeping you company; uses the second person like a hand on the shoulder;
    lets a single line stand alone when it needs to breathe
  metaphor_family: the blank canvas and the first mark, the edge of the page, the
    door and the threshold you get to stand in, the line you draw that lets the picture
    begin, color coming back into something that went gray, the draft you're allowed
    to ruin — never machinery, military, productivity, or hacking yourself
_needs_authoring: false
