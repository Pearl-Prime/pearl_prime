reader_promise_family: You are not a fraud who got lucky. You are a real person who
  learned to hide. This series won't coach you into confidence or optimize your mindset
  — it sits with you in the exact moment the feeling hits, names what's happening
  in your body and your feed, and stays until you're no longer alone with it.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — somatic, in-the-body language for
  distress instead of think-your-way-out advice
- Unfu*k Yourself (Gary John Bishop) — plainspoken, no-fluff register that talks to
  you like a real person, not a patient
- How to Do Nothing (Jenny Odell) — refuses the optimize-yourself frame and takes
  attention and the online self seriously
