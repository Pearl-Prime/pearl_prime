reader_promise_family: A heart-centered reckoning with your own worth — not a louder
  argument for why you're enough, but a quieter scale where your value stops depending
  on the verdict. We won't help you win the case for yourself; we'll help you set
  the case down.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The School of Life series (The School of Life) — calm, essayistic emotional education
  for thoughtful young adults, the same un-preachy register
- The Tara Brach RAIN / Radical Acceptance books (Tara Brach) — meeting your own unworthiness
  with recognition instead of repair
- Good Vibes, Good Life and its sequels (Vex King) — self-worth for a Gen Z readership,
  but where ours stays clear-eyed about cost rather than affirmational
