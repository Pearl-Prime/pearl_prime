  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 22-29
  where_they_are: It's 11:40pm on a Tuesday and they're still half-working — Slack
    open in one tab, a half-written reply in another, a third where they're reading
    a peer's launch announcement and feeling their stomach drop. The day technically
    ended hours ago. They did enough. They cannot feel that they did enough.
  what_they_need: To recognize the buried equation running underneath the overwork
    — worth = output, worth = approval, worth = never falling behind — and to feel,
    even once, that their value isn't a number waiting to be totaled at the end of
    the day.
  what_they_avoid: Affirmation-mirror self-love, hustle-culture pep talks, 'just believe
    in yourself,' anything that treats low self-worth as a confidence bug to be patched,
    and any book that's secretly one more thing to optimize.
series_voice_markers:
  register: balanced, warm, discerning — a heart-centered voice about worth and limits;
    gentle but clear-eyed, weighs things fairly without flattering you or scolding
    you; never clinical, never preachy, never hustle
  sentence_rhythm: even, weighted sentences that come to rest — a longer observed
    line, then a short one set down like the other half of a scale; pauses where you'd
    actually breathe
  metaphor_family: the feather and the scale, weight and balance, the heart weighed
    against a feather, equilibrium and the steady center, what you give and what you
    keep, the fulcrum that holds
_needs_authoring: false
