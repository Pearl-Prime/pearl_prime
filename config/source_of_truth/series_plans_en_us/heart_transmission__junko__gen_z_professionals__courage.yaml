reader_avatar:
  age: early-to-mid twenties; first or second real job out of school
  where_they_are: It's 8:52am and you're sitting in your car in the parking garage,
    hand on the door handle, watching coworkers walk in like it's nothing. You rehearsed
    what you'd say in the meeting all weekend. Now your chest is tight and you're
    telling yourself you'll speak up next time — the same next time you promised last
    week.
  what_they_need: permission to be afraid and act anyway; a warm, non-shaming way
    to understand the part of them that freezes, hedges, and stays small; proof that
    courage is something quietly built, not a personality trait other people were
    born with
  what_they_avoid: alpha-grindset bravado, 'just be confident' platitudes, fake-it-til-you-make-it
    performance, anything that treats their fear as a flaw to crush rather than a
    frightened part of them to understand
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous — wisdom passed directly from
    one heart to another, as if spoken close in a room with the door shut; warm and
    unhurried; never clinical, never preachy, never hustle
  sentence_rhythm: mostly short, breath-paced sentences that land softly, then occasionally
    open into one longer line that holds the reader; plain words; second person throughout;
    pauses where a kinder voice would pause
  metaphor_family: the heart and what passes between two of them, light passed hand
    to hand, the warmth of presence, the unguarded moment, what is transmitted without
    words, the open hand, breath shared in a quiet room — never machinery, military,
    productivity, or biohacking
_needs_authoring: false
