reader_promise_family: You don't have to feel fearless to do the brave thing. Courage
  isn't the absence of fear — it's the heart staying open while it's afraid. This
  series meets you in the exact moment your nerve fails and shows you that what you
  call cowardice is just a frightened part of you waiting to be met with warmth instead
  of force.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Gifts of Imperfection (Brené Brown) — meets the reader's fear and shame with
  warmth instead of correction, the same heart-to-heart register
- Radical Acceptance (Tara Brach) — pairs unflinching tenderness toward frightened
  parts of the self with permission rather than fixing
- Untamed (Glennon Doyle) — speaks straight to a young person's nerve in an intimate,
  unguarded voice that refuses hustle and performance
