reader_promise_family: You don't have to earn your place by being terrified of losing
  it. Each book takes one shape of imposter syndrome — the false alarm, the overwhelm,
  the spiral, the shame, the grief, the comparison, the watching — and meets you in
  the exact campus moment it shows up, without ever telling you to just be more confident.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- Good Vibes, Good Life series (Vex King) — plainspoken self-worth for a phone-native
  generation
- The Anxiety Workbook for Teens (Lisa M. Schab) — practical, non-clinical, meets
  young readers where the fear lives
- Unfuck Your Brain (Faith G. Harper) — frank, funny, science-honest mental-health
  writing in a voice this reader trusts
