reader_avatar:
  age: 18-24
  where_they_are: Second row of a lecture hall, laptop open to notes they're not taking,
    watching the people around them nod like they get it — certain that any second
    now someone will realize admissions made a mistake letting them in.
  what_they_need: To understand that feeling like a fraud is a nervous-system response
    to high stakes and visibility, not evidence that they actually are one — and to
    have language for it that sounds like a friend, not a wellness brand.
  what_they_avoid: Boomer self-help, LinkedIn-influencer 'fake it till you make it'
    energy, grindset advice, toxic positivity, anything that treats their degree as
    a personal brand to optimize or shames them for being anxious and online.
series_voice_markers:
  register: gen-z native, screen-literate, plainspoken and warm; ironic without cynicism
    — a smart slightly-older friend who actually gets the group chat and the seminar
    and never once says 'manifest' or 'crush it'
  sentence_rhythm: short declaratives that land like a text, then one longer breath
    that opens it up; second person throughout; fragments only inside dialogue, never
    as the prose backbone
  metaphor_family: the present moment, the body in the room, the phone face-down on
    the desk, ground under your feet, the breath between notifications, signal cutting
    through noise — never productivity, machinery, military, or self-optimization
_needs_authoring: false
