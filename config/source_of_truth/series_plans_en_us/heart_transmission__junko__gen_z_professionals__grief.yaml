reader_promise_family: You will not be asked to be done with what you've lost. Here,
  grief is met the way one heart meets another in a quiet room — without a timeline,
  without a fix, without being told to bounce back. Just a steady presence beside
  you while you carry what you carry, and the slow permission to let your hands open
  when they're ready.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- The Grief Series / It's OK That You're Not OK (Megan Devine) — refuses the fix-it
  model of grief and sits with loss honestly, the same permission this series offers
  a younger reader
- How to Carry What Can't Be Fixed (Megan Devine) — a companion-not-coach voice for
  the unfixable, mirroring this series' refusal of timelines and stages
- The Year of Magical Thinking (Joan Didion) — interior, unflinching first-person
  witness to loss that treats grief as something lived rather than solved
