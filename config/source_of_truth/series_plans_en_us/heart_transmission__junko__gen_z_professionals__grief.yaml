reader_avatar:
  age: 23 to 31
  where_they_are: It's a Tuesday and you're back at your desk three weeks after the
    funeral, replying to a Slack thread with a thumbs-up emoji while something in
    your chest stays very still. Everyone has stopped asking how you're doing. The
    casserole stage is over. You've used up the bereavement days HR allotted, and
    now you're supposed to be a person again — answering, performing, smiling on the
    standup camera — while you carry a hole nobody can see.
  what_they_need: To be told that what they're feeling is grief, that it has no deadline,
    and that they are allowed to keep loving someone who is gone. A voice close enough
    to sit with the absence instead of trying to talk them out of it.
  what_they_avoid: Five-stage frameworks that promise a finish line, 'everything happens
    for a reason' platitudes, productivity-flavored healing, toxic positivity, and
    anyone who treats their loss as a problem to optimize away.
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; the unhurried voice of someone
    who has sat with loss and pulled a chair close to yours, never a clinician and
    never a coach
  sentence_rhythm: unhurried and breath-paced; short sentences that land like a hand
    on the shoulder, opening into longer ones that hold a single image — then a pause,
    the way a room goes quiet after someone leaves it
  metaphor_family: the open hand, warmth passed between two people, light carried
    hand to hand, the empty chair, what remains in a room after a presence is gone,
    breath shared in a quiet space — never machinery, military, or productivity
_needs_authoring: false
