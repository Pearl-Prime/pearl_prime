reader_promise_family: You can find the courage to make the change you've been circling
  — not by becoming a different person, but by taking one honest step before you feel
  ready, even with everyone still counting on you.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- We Should All Be Millionaires / Rich AF money series (Rachel Rodgers) — career-courage
  for people told to stay small, though louder and more hustle-forward than this gentler
  sandwich-generation voice
- The Daily Stoic series (Ryan Holiday) — short, repeatable readings on facing fear
  and acting before you feel ready, with the steadiness this series shares but without
  the mid-career-parent specificity
- Untamed and its companion journal (Glennon Doyle) — permission-giving, second-person
  intimacy about wanting more from your one life, kin in tone to the closing-line
  voice here
