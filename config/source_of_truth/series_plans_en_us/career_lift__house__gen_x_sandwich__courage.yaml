  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 47-58, Generation X, mid-to-late career
  where_they_are: It's a Tuesday night, the dishwasher is running, your mother's pill
    organizer is half-filled on the counter, and your kid's college deposit is due
    Friday. You're sitting in the car in your own driveway twenty minutes after you
    got home, scrolling a job posting you'll never apply to, rehearsing the conversation
    with your boss you've rehearsed for three years and never had.
  what_they_need: Permission to want more from this chapter of work without being
    told to blow up their life, and a way to take one small, real step toward the
    change while still holding up everyone who leans on them.
  what_they_avoid: Girlboss and grindset hustle, 'manifest your dream job' affirmations,
    influencer hype, toxic positivity, and any advice that treats career fear at fifty
    as a mindset problem you should have outgrown.
series_voice_markers:
  register: Encouraging, forward-looking, grounded; the voice of a friend your age
    who has stood at the same edge — warm and practical, honest about the fear, never
    clinical, never preachy, never selling hustle.
  sentence_rhythm: Plainspoken and varied; short declaratives that land like a hand
    on your shoulder, opening into one longer sentence that walks the whole thought
    through before it lets you go.
  metaphor_family: The next chapter and the turning page, the path that opens ahead,
    the cliff edge and the single step taken before you feel ready, the room you have
    not entered yet, the draft of a life you are still writing.
_needs_authoring: false
