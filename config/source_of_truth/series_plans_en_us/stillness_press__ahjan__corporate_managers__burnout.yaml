reader_promise_family: A quiet, unhurried place to recognize burnout for what it is
  — not a performance problem to fix, but a depletion to be met honestly — so the
  manager carrying everyone can finally set something down.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — names depletion as a physiological state to be completed, not a willpower failure'
- How to Do Nothing (Jenny Odell) — a contemplative case against the attention economy
  that refuses to turn rest into another productivity hack
- 'Wintering: The Power of Rest and Retreat in Difficult Times (Katherine May) — honors
  fallow, depleted seasons as necessary rather than problems to be optimized away'
