reader_promise_family: Worth that holds when the title is gone — for the people who
  lead well and privately suspect it isn't enough. A steadier way to measure a working
  life, built on what you give and what you leave rather than what you out-earn or
  out-rank.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Second Mountain (David Brooks) — the foundational case that a life of contribution
  outlasts a life of achievement, written for the same person mid-career.
- Let Your Life Speak (Parker Palmer) — quiet, vocation-centered reflection on worth
  that doesn't come from title or output.
- How to Do the Work (Nicole LePera) — interior, self-worth-and-identity work that
  the achievement-driven reader takes seriously.
