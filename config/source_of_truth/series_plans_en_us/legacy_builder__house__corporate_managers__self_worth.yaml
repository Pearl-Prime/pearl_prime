reader_avatar:
  age: 38 to 55
  where_they_are: 'It''s 7:40pm and the office has emptied. You''re the last one on
    the floor, reflected in the dark conference-room glass — a person who ran four
    meetings today and was, by every visible measure, fine. You close the laptop and
    the question arrives the way it always does in the quiet: if they really knew
    how unsure you are in there, would any of this hold?'
  what_they_need: Permission to stop sourcing their worth from the next rung, and
    a quieter, more durable foundation underneath the role — one that survives a reorg,
    a younger hire, a title that finally stops climbing.
  what_they_avoid: Executive-coaching pep talks, 'build your personal brand', leadership
    hustle, anything that treats their worth as a performance metric to optimize,
    and the implication that they just need more confidence.
series_voice_markers:
  register: reflective, steady, plainspoken; the voice of a peer who climbed the same
    ladder and is now further up the mountain looking back — warm and substantive,
    never clinical, never a motivational keynote
  sentence_rhythm: measured and unhurried, with restrained intensity; longer reflective
    sentences that open a thought, broken by a short flat line that lands it — room
    left between thoughts to let a hard truth settle
  metaphor_family: the second mountain of purpose and the view from later in the climb;
    the deeper foundation under a built thing; planting trees whose shade you won't
    sit in; the long arc of a working life — never machinery, military, productivity,
    or empire
_needs_authoring: false
