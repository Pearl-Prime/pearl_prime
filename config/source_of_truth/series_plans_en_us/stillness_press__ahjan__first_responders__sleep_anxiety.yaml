reader_avatar:
  age: 26–48
  where_they_are: |
    Off-shift but still scanning. Eating dinner while their phone buzzes somewhere else in the house.
  what_they_need: |
    A voice that doesn't require them to explain what they've seen. Register that matches 'on duty'.
  what_they_avoid: |
    Self-care language. 'Talk to someone.' Anything that treats them as fragile.
series_voice_markers:
  register: intimate, persona-specific, no management-speak
  sentence_rhythm: longer, unhurried sentences — no punchy copy
  metaphor_family: night, water, animals settling — never productivity, mechanical, military
  second_person_default: true
  taboo:
  - No rewire-your-brain language
  - No morning-routine prescriptions
  - No therapy-as-solution closing
  - No religious framing
