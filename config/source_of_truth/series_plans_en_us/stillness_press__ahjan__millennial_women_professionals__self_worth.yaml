reader_avatar:
  age: late twenties to early forties
  where_they_are: It's a Tuesday night, the apartment is quiet, and she's still half-composing
    tomorrow's email in her head — replaying the meeting where she stayed silent,
    scrolling a feed of people who seem to have it handled, certain that if she just
    performed a little better, a little longer, the low hum of not-enough would finally
    go quiet.
  what_they_need: To recognize that her worth was never the thing being measured —
    to feel, even once, what it is to rest in a value that no promotion, no approval,
    and no comparison can add to or take away.
  what_they_avoid: Hustle-culture confidence hacks, 'manifest your worth' affirmations
    she doesn't believe, girlboss empowerment slogans, and any framework that turns
    self-acceptance into one more project to optimize and fall behind on.
series_voice_markers:
  register: contemplative, spacious, grounded — an unhurried presence who has sat
    in this same low hum herself and is not in any rush to fix you; never clinical,
    never a coach, never a cheerleader
  sentence_rhythm: unhurried and breath-paced; long settling sentences that open a
    thought, then a short one that lets it land — room left between, the way silence
    is left in a room
  metaphor_family: stillness and settling water, breath and the pause between, open
    ground, light coming through a window, the quiet of a room after everyone has
    gone — never machinery, productivity, scoreboards, or self-improvement
_needs_authoring: false
