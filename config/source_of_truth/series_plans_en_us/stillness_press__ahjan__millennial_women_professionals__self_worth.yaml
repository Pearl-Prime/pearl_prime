reader_promise_family: You will stop earning your way toward being enough and start
  meeting the worth that was never actually in question — not by fixing yourself,
  but by sitting down with the part of you that has been working overtime to prove
  it.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Gifts of Imperfection (Brené Brown) — the same turn from proving your worth
  to letting yourself be seen as you are, in a warmer and less clinical register
- Radical Acceptance (Tara Brach) — shares the contemplative, self-compassion-first
  approach to the belief that something is wrong with you, without the hustle gloss
- Self-Compassion (Kristin Neff) — for the same high-achieving reader who treats herself
  as a project; this series trades the exercises for a quieter, sit-with-it presence
