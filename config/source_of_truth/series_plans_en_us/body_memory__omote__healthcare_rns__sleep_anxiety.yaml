reader_promise_family: For the nurse whose body forgot how to come down off a shift.
  You will not be told to relax, optimize your sleep, or push through one more night.
  You'll be met where you lie awake — wired, watching the ceiling, the alarm bells
  of the unit still ringing in a body that no longer knows it's safe — and offered
  solid ground under you, so the part of you that has held everyone else can finally
  be held.
bestseller_hook_family: ''
emotional_engine: sleep_anxiety_recognition
comp_series:
- The Sleep Prescription series (Aric Prather) — clinical-but-warm sleep science for
  people whose stress keeps them up, minus the optimization tone.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the unfinished stress your body is still carrying and how to let it complete, beloved
  by overextended caregivers.'
- Why We Sleep (Matthew Walker) — the cultural touchstone every anxious-sleeper reaches
  for, but this series meets the nervous system, not the data.
