reader_avatar:
  age: 28-52
  where_they_are: It's 2:40am after a string of night shifts, or the first night off,
    and you are lying flat on your back in the dark — flat-out exhausted, eyes wide,
    heart going like you're still on the floor. The house is quiet. Your body is not.
    Somewhere underneath the tiredness a part of you is still listening for the call
    bell, still half-bracing for the rapid response, still doing the math on whether
    you charted everything. You have to be back in seven hours and you cannot find
    the bottom of the bed.
  what_they_need: To stop fighting their own nervous system. To understand that a
    body trained to stay up for emergencies is not broken — it's loyal, and it can
    be taught it's off the clock. Steady, plain company in the dark and a way to let
    the weight of the day come to rest, without one more protocol to perform.
  what_they_avoid: Sleep-hygiene checklists that read like a care plan they're now
    failing. 'Just relax' and 'have you tried magnesium.' Optimization, biohacking,
    hustle-rest, productivity-dressed-as-recovery, and any cheerful voice that has
    clearly never come off a code and tried to sleep an hour later.
series_voice_markers:
  register: grounded, steady, holding — the voice of a colleague who has worked the
    same nights and is sitting on the floor of the dark with you, not a clinician
    writing you up; warm and plain, holds without gripping, never preachy, never hustle
  sentence_rhythm: calm and weight-bearing; short declarative sentences that set something
    down and let it stay; longer settling lines that exhale; deliberate pauses, room
    to breathe between thoughts, nothing rushed or clipped
  metaphor_family: held ground and the earth beneath the body, weight supported and
    finally set down, roots, the floor that holds, gravity letting you sink, the body
    remembering it is safe — never machinery, monitors, military, productivity, or
    biohacking
_needs_authoring: false
