  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: "18–24"
  where_they_are: >
    It's 1am in a dorm room lit by a laptop, three tabs of an unstarted assignment
    open, the group chat still buzzing, and their chest is tight over something they
    can't even point to — pretty sure they're behind, pretty sure everyone else has
    it figured out.
  what_they_need: >
    Someone who talks to them like a smart friend who has actually felt this — who
    names the anxiety honestly instead of handing them a coping worksheet or a
    diagnosis.
  what_they_avoid: >
    Clinical jargon. Boomer 'just breathe' advice. Toxic productivity hacks. Anything
    that sounds like a pamphlet from the counseling center waiting room.
series_voice_markers:
  register: "warm, real-talk, a little dry; the voice of a friend texting you back at 1am, not a therapist or a textbook"
  sentence_rhythm: "short and direct, punchy; fragments allowed for emphasis; occasional longer line when the feeling needs room"
  metaphor_family: "campus and student life, screens and group chats, the body, weather — never clinical, military, or corporate-productivity"
  second_person_default: true
_needs_authoring: false
