reader_promise_family: >
  You'll learn to recognize what your anxious mind is actually doing — in class,
  in the group chat, at 2am scrolling — without trying to fix it, optimize it, or
  white-knuckle it into silence. Seven books, seven different doorways into the
  same restless feeling. Each one meets the anxiety from a new angle, in language
  that sounds like a friend who gets it, not a worksheet.
bestseller_hook_family: recognition_descent
emotional_engine: anxiety_recognition
comp_series:
- "Unfuck Your Brain (Faith G. Harper) — blunt, science-honest, zero condescension"
- "How to Keep House While Drowning (KC Davis) — gentle, shame-free, meets you where you are"
- "We're All Mad Here (Claire Eastham) — young, real-talk anxiety memoir, recognition over cure"
platform_strategy:
