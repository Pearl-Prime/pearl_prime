reader_promise_family: You will be met exactly where you are — a parent holding too
  much, with a body that won't stand down — and shown how to find a few square feet
  of stillness inside an ordinary day. No fixing, no optimizing, no one more thing
  to perfect. Just recognition, room to breathe, and permission to set the weight
  down for a moment.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Let Them Theory / The High 5 Habit (Mel Robbins) — for overwhelmed adults who
  want warmth and permission over another system, though Stillness Press trades the
  pep for quiet
- Good Inside (Dr. Becky Kennedy) — speaks to the same guilt-soaked working parent,
  but where Good Inside steadies the child, this series steadies the parent's own
  nervous system
- How to Do the Work / companion journals (Dr. Nicole LePera) — adjacent self-healing
  readership, minus the protocol-heavy 'do the work' framing this series deliberately
  refuses
