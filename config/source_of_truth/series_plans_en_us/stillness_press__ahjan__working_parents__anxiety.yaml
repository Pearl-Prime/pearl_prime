reader_avatar:
  age: 32-46
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is humming,
    and you are sitting on the edge of the bathtub with your phone in your hand, not
    looking at anything. Your jaw is tight. Tomorrow's to-do list is already running.
    You can't tell if you're tired or afraid, and there's no one to ask.
  what_they_need: To be told, by someone who clearly knows the inside of this, that
    the constant low hum of dread is not a character flaw and not theirs to solve
    before bed; a way to stand in the middle of an unmanageable day and find one breath
    of quiet that asks nothing back.
  what_they_avoid: Hustle-culture self-improvement, 'optimize your morning routine,'
    just-meditate platitudes, toxic positivity, parenting-guru shame, and anything
    that turns being calm into one more performance metric they're already failing.
series_voice_markers:
  register: contemplative, spacious, grounded; the unhurried voice of someone who
    has sat in this exact exhaustion themselves and is sitting beside you now — never
    clinical, never a coach, never selling a system
  sentence_rhythm: long settling sentences that open and slow the breath, then a short
    plain line that lands like a hand on the shoulder; pauses left deliberately on
    the page
  metaphor_family: stillness and breath, settling water, open ground, light coming
    through a window, the quiet pause between one thing and the next; never machinery,
    productivity, military, or biohacking
_needs_authoring: false
