reader_promise_family: A heart-centered way to understand why drawing a line costs
  you so much — and to weigh what you give against what you keep, without being told
  to just say no, harden up, or stop caring.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — names the relational cost of
  limits without shaming the people-pleaser, the same fair-weighing spirit this series
  carries.
- The Book of Boundaries (Melissa Urban) — script-rich and direct about saying no,
  where this series sits one layer beneath the script, in the body that flinches before
  the words come.
- How to Do the Work (Nicole LePera) — somatic, self-recognition-first healing for
  a young audience, matching this series' move from insight to felt change rather
  than worksheets.
