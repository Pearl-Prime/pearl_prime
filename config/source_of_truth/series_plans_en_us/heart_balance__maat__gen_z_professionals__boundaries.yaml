  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: early-to-mid twenties
  where_they_are: Slack is open in one tab, a half-typed reply that starts with 'No
    worries, happy to—' in another, and it's 11:40pm; they meant to log off two hours
    ago, the cursor still blinking after the word they can't bring themselves to delete.
  what_they_need: Language for what happens in their body when they betray their own
    limit — and permission to believe a line is allowed to cost something and still
    be worth drawing.
  what_they_avoid: People-pleasing platitudes, 'just say no' as if it were one syllable,
    girlboss boundary scripts, and anything that frames a limit as a power move while
    skipping the grief of disappointing someone they love.
series_voice_markers:
  register: balanced, warm, discerning — a heart-centered voice that weighs things
    fairly; gentle but clear-eyed, never clinical, never preachy, never hustle
  sentence_rhythm: measured and even, like a scale finding level; short declaratives
    that land, then a longer breath that holds the weight; pauses where the reader
    needs to feel the cost before moving on
  metaphor_family: the feather and the scale, the heart weighed against a feather,
    weight and balance, the fulcrum that holds, the door and the threshold, what you
    give and what you keep
_needs_authoring: false
