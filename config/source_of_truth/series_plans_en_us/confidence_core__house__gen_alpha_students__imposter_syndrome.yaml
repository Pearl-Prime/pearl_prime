reader_promise_family: You are not a fraud who got lucky — you are someone standing
  at the edge of who you are becoming, and this series will walk you to the threshold
  without pretending the doubt isn't real.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Confidence Code for Girls (Katty Kay & Claire Shipman) — speaks to young people
  about the gap between feeling capable and acting capable, without hype
- The Self-Esteem Workbook for Teens (Lisa M. Schab) — meets students plainly at the
  level of the belief that something is wrong with them
- The Gifts of Imperfection (Brené Brown) — names the hidden shame of not-enough and
  reframes it as the start, not the verdict
