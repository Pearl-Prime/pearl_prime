reader_avatar:
  age: 16-22
  where_they_are: It's the night before a presentation, or you just got the acceptance,
    or someone praised your work, and instead of pride you feel a cold drop in your
    stomach — the certainty that this is the time they finally find out you don't
    actually know what you're doing. You refresh your phone. Everyone else's life
    looks effortless. You screenshot the feeling and tell no one.
  what_they_need: To hear that the gap between how competent they feel and how competent
    they are is a known, nameable thing — not proof of fraud — and to be met as someone
    capable of crossing into a steadier self, without being told to just believe in
    themselves.
  what_they_avoid: Fake-it-til-you-make-it hype, 'you've got this queen' pep talks,
    hustle-culture grindset advice, toxic positivity, and any adult who mistakes loudness
    for confidence or talks down to them like a motivational poster.
series_voice_markers:
  register: encouraging, clear, steady; warm and direct without flattering; the voice
    of someone a few steps ahead who remembers exactly what the doorway felt like,
    never a clinician and never a hype coach
  sentence_rhythm: plainspoken and unhurried, short declarative lines that land, occasional
    longer sentence that opens a door then closes it gently; second person throughout
  metaphor_family: the threshold and the doorway, crossing from one room to the next,
    standing in the doorway before you walk through, the held breath before entering,
    who you become on the other side of a line
_needs_authoring: false
