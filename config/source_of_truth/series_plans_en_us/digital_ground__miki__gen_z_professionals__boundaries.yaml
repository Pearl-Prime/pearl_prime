reader_avatar:
  age: 23-31, first or second real job, lives in two-thirds of a shared apartment
    and the rest of a phone
  where_they_are: It is 9:47 on a Tuesday night. The laptop is closed but the work
    Slack is open on your phone, and the little green dot next to your manager's name
    is still on. A message came in eleven minutes ago -- 'hey, quick thing when you
    get a sec' -- and you have read it four times without answering. You are not working.
    You are just not not-working. Your thumb hovers, your jaw is tight, and you tell
    yourself you will reply after this episode, knowing you will reply now.
  what_they_need: Permission to have a limit without building a legal case for it.
    A way to feel the difference between someone actually needing them and a notification
    doing what notifications do. The radical idea that being reachable is not the
    same as being good.
  what_they_avoid: Boomer 'just turn it off' advice, influencer boundary scripts that
    sound like a hostage negotiation, anything that frames their exhaustion as a personal-brand
    problem, hustle culture, toxic positivity, and being told they are 'a snowflake'
    for wanting to log off at a human hour.
series_voice_markers:
  register: gen-z native and screen-literate, plainspoken and warm; ironic without
    cynicism -- a smart, slightly-older friend who actually understands what an unread
    DM does to your chest, never a coach, never corporate, never clinical
  sentence_rhythm: short declaratives that land like read receipts, then one longer
    sentence that exhales; second person throughout; lowercase intimacy over capital-letter
    authority; fragments only inside dialogue, never in the pitch
  metaphor_family: the phone face-down on the table, the green dot, ground under your
    feet, the breath between notifications, the door you are allowed to close, signal
    cutting through noise -- never machinery, military, or self-optimization
_needs_authoring: false
