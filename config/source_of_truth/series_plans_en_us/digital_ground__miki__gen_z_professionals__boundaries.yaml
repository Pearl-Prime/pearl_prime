reader_promise_family: You will stop treating your limits as a flaw to apologize for,
  and start feeling the difference between a real ask and a phone lighting up. Three
  doorways into the same threshold -- the body that braces, the part that hides, the
  eyes that compare -- each one ending where you finally take up the space you are
  standing in.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Unfu*k Yourself series (Gary John Bishop) -- blunt, modern, anti-platitude self-talk
  that respects the reader's intelligence
- The Anxiety Healer's Guide / Healing series (Alison Seponara) -- gentle, body-aware,
  somatic-first comfort without clinical distance
- How to Do the Work companions (Nicole LePera) -- nervous-system and self-betrayal
  framing aimed squarely at a younger, online audience
