reader_avatar:
  age: 13 to 19 — middle school, high school, first year away; old enough to feel
    the pressure, young enough that no one's told them it's allowed to put it down
  where_they_are: 'It''s late and the assignment is still open in one tab and three
    other people''s lives are open in the others — the straight-A one, the artist
    who''s somehow already famous, the friend who makes it all look effortless. You
    toggle between your half-finished page and the proof that everyone else has it
    figured out, and the quiet thought underneath it all is: there''s something wrong
    with me that they don''t have. You close the laptop without finishing. You''ll
    feel worse in the morning.'
  what_they_need: To hear, from a voice that isn't grading them, that their worth
    was never the score — that the unfinished, uncertain, still-becoming person they
    are tonight is not a problem to fix but a canvas no one's done with yet. Permission
    to be a draft. Proof that the feeling of not-enough is a story they were handed,
    not a fact about who they are.
  what_they_avoid: Adults who tell them to 'just believe in yourself' and 'unleash
    their potential.' Productivity hacks aimed at teenagers. Toxic positivity that
    skips the hard part. Anything that turns their becoming into a brand to build
    or an output to optimize. They can smell a motivational poster from across the
    room.
series_voice_markers:
  register: open, warm, honest, creative — the voice of an older art-room mentor who
    never grades you, talks to you like a whole person, and means it; never clinical,
    never preachy, never hustle, never the cheerful adult who's clearly trying
  sentence_rhythm: conversational and uneven on purpose — short lines that land, then
    a longer one that lets you breathe; built like someone thinking out loud beside
    you, not reading off a slide; permission woven in, never shouted
  metaphor_family: the blank canvas and the first mark, the empty page, the draft
    you're allowed to ruin, color coming back into a picture you'd given up on, the
    rough sketch under the finished thing, what wants to be made through you, the
    work no one else could make because they aren't you
_needs_authoring: false
