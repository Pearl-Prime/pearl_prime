reader_promise_family: You don't have to earn your way into being enough. Underneath
  every grade, every follower count, every version of yourself you've been performing,
  there's a person who was already worth keeping — and this series helps you find
  that person again, the way an artist finds the picture that was hiding in the blank
  page all along.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Self-Love Workbook for Teens series (Shannon Chavez) — meets the same teenage
  self-worth wound, but our series replaces worksheet exercises with a warm voice
  and the language of making rather than fixing
- You Are a Badass (Jen Sincero) — shares the empowerment lane, but ours trades the
  loud hype and hustle for an honest, art-room intimacy a Gen Alpha reader actually
  trusts
- The Gifts of Imperfection (Brené Brown) — same release of shame and worthiness,
  but written young and unfinished, in the voice of a mentor talking to the student
  who feels behind
