reader_avatar:
  age: late 30s to early 50s
  where_they_are: It's 9:40 on a Tuesday night. The laptop is finally closed, the
    house is quiet, and they are standing at the kitchen counter with a glass of water
    they don't remember pouring — jaw tight, shoulders somewhere up near their ears,
    a low hum in the chest that hasn't switched off since the 8am stand-up. They got
    through the day. They always get through the day. But their body is still braced,
    as if the meeting never ended.
  what_they_need: To feel safe enough to let the bracing go — to be met as a body,
    not a calendar; to learn that the tension they've been managing is information,
    not a flaw; to be allowed to slow down without being told to slow down.
  what_they_avoid: Self-optimization framed as healing, breathwork sold as a productivity
    hack, ten-minute 'reset' routines, performative mindfulness, anyone who tells
    them to 'just relax,' and any book that adds one more thing to the to-do list
    of being a better, calmer person.
series_voice_markers:
  register: still, deep, woodland-quiet — the unhurried calm of a forest interior;
    spacious, plainspoken, never clinical, never preachy; the voice of someone who
    has sat with their own clenched body and is in no rush to fix yours
  sentence_rhythm: long, slow sentences that open into space, broken by short ones
    that land like a footstep on soft ground; pauses built in; the pacing of walking
    a path that deliberately slows you down
  metaphor_family: the still forest and its deep quiet — old trees and patient roots,
    light filtering down through the canopy, the path that slows your stride, the
    pool that goes clear only when it stops being stirred, the forest floor that quietly
    holds whatever falls
_needs_authoring: false
