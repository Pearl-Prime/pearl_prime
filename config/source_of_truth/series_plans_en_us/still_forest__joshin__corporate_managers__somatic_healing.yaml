reader_promise_family: For the manager who has run on adrenaline so long they've forgotten
  what their own body feels like at rest — a slow return to the self that has been
  holding the weight all along, with no performance required and nothing to optimize.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational case that trauma
  and stress live in the body, written for readers who already suspect their tension
  is more than muscle
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — for
  the high-functioning exhausted who need to complete the stress response, not just
  understand it'
- When the Body Says No (Gabor Maté) — for the capable, over-responsible achiever
  whose body has been quietly absorbing the cost of holding everything together
