reader_promise_family: You do not have to be over it, get past it, or turn your loss
  into a lesson. This is grief met the way one heart meets another in a quiet room
  — slowly, gently, with nothing required of you but to keep breathing through it.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- It's OK That You're Not OK (Megan Devine) — the genre standard for refusing to pathologize
  or rush grief, met with steady companionship rather than fixes
- The Year of Magical Thinking (Joan Didion) — interior, literary grief told from
  inside the daze, honoring how loss scrambles an ordered, capable life
- Bittersweet (Susan Cain) — makes longing and sorrow legible as part of a full inner
  life rather than a malfunction to correct
