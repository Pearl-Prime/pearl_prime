reader_avatar:
  age: early thirties to early forties
  where_they_are: She is back at her desk eleven days after the funeral, a meeting
    invite blinking on the screen, mouthing 'I'm good, thanks' to a colleague who
    asked — while under the table her thumb worries the edge of a phone that will
    never light up with that person's name again.
  what_they_need: permission to still be grieving long after the world expected her
    to be fine, and a voice that sits with the loss instead of trying to fix it or
    fast-forward her through it
  what_they_avoid: five-stage frameworks, 'everything happens for a reason,' silver-lining
    reframes, grief 'productivity,' and anyone who treats mourning as a problem to
    be solved on a schedule
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; the warmth of someone sitting
    close in a dim kitchen at the end of a long day, never a clinician, never a coach,
    never brisk
  sentence_rhythm: unhurried and breath-paced; short plain sentences that land and
    rest, opening now and then into one longer, tender line before settling again
  metaphor_family: the heart and what passes between two of them, light handed from
    one palm to another, the warmth of a held hand, the empty chair, the unguarded
    moment, what stays after the words have stopped
_needs_authoring: false
