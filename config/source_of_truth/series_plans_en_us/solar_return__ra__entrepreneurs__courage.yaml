  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 29-46
  where_they_are: It's 6:40am and the launch goes live in three hours. You're sitting
    in the dark kitchen with cold coffee, the cursor blinking on the 'Publish' button,
    and your whole body has decided this is the moment to remind you of every way
    it could go wrong. Your hands are cold. You haven't told anyone how scared you
    are, because founders aren't supposed to be.
  what_they_need: To understand that the fear firing in their body is not a verdict
    on whether they should do the thing — to feel the difference between real danger
    and a nervous system bracing, and to be handed one true step they can take while
    still afraid.
  what_they_avoid: Hustle-porn, 'just push through it', grindset mantras, motivational
    shouting, 'manifest the outcome', and any coach who treats fear as a weakness
    to be overpowered instead of a signal to be understood.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone who has stood
    at the same edge and stayed beside you, not above you; affirming without hype,
    tending the ember rather than shouting at the fire; never clinical, never a coach,
    never hustle
  sentence_rhythm: short declaratives that land like banked coals, opening into one
    longer breath when the warmth returns; plainspoken, unhurried, a hand on the shoulder
    rather than a starting gun
  metaphor_family: ember and ash, banked fire and slow rekindling, the cliff edge
    and the single step, dawn and first light, warmth returning to cold hands, the
    turning of the year, what survives the burn and grows back green
_needs_authoring: false
