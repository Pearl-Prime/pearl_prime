reader_promise_family: You will not be pushed off the cliff. You will be met at the
  edge — the part of you that braces, spirals, and hides will be named with warmth
  until courage stops meaning fearlessness and starts meaning the next small, true
  step you can take before you feel ready.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Daring Way / Brené Brown's courage work (Brené Brown) — names vulnerability
  as the birthplace of courage rather than a flaw to hide
- The Practice series (Seth Godin) — speaks to the maker who must ship before they
  feel ready, without the hustle gloss
- When Things Fall Apart and related (Pema Chödrön) — meets fear and groundlessness
  with warmth instead of force, the same tend-don't-push register
