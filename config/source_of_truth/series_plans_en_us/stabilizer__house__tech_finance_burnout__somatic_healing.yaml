reader_avatar:
  age: 30s to mid-40s
  where_they_are: It's 11:40pm and the laptop is finally closed, but your jaw is still
    clenched and your shoulders are still up by your ears. The day ended hours ago
    and your body didn't get the message. You're successful on paper — the title,
    the comp, the calm Slack replies — and underneath it your chest is tight, your
    stomach is in a fist, and you can't remember the last time you felt your own feet
    on the floor.
  what_they_need: To understand that the tension, the bracing, the can't-sit-still
    is the body keeping score of years lived in fight-or-flight — and that the way
    out is downward, into the body, not another mental strategy. They need permission
    to stop performing calm and start actually feeling safe, one small somatic signal
    at a time.
  what_they_avoid: White-knuckle resilience, 'just push through,' biohacking your
    nervous system like a system to optimize, performative wellness, toxic positivity,
    and any advice that treats a depleted body as a productivity problem to solve.
series_voice_markers:
  register: steadying, warm, plainspoken; the voice of someone who has sat where you're
    sitting and isn't in a hurry — a hand on the shoulder, never a clinician's clipboard
    and never a coach's whistle
  sentence_rhythm: calm and unhurried, with the cadence of slow breath; longer settling
    sentences that let you exhale, broken by short anchoring lines that land like
    a boat touching the dock
  metaphor_family: the harbor and the anchor line — the breakwater that takes the
    swell so you don't, still water on the inside, the boat that stops pitching, the
    cleat that holds, the steady horizon, solid ground under a body that's been at
    sea
_needs_authoring: false
