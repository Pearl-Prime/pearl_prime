reader_promise_family: For the high-performer whose body never got the memo that the
  danger passed — a steady harbor where you stop bracing, stop scanning, and let the
  nervous system you've overridden for years finally come back to ground. No optimization,
  no powering through. Just the felt work of becoming someone the storm can't capsize.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational text on how trauma
  and chronic stress live in the body, written for the reader who's ready to stop
  thinking their way out
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the unfinished stress response stuck in the body and gives it somewhere to go, for
  the depleted high-achiever'
- 'Anchored: How to Befriend Your Nervous System Using Polyvagal Theory (Deb Dana)
  — warm, practical nervous-system regulation that meets the body where it is rather
  than demanding it perform calm'
