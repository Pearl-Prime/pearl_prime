reader_avatar:
  age: 44-56
  where_they_are: It's 9:40 at night. The kids are finally down, your mother's pill
    organizer is half-filled on the counter, and you're sitting in the car in the
    driveway you already pulled into ten minutes ago — engine off, not going in yet,
    just sitting in the only quiet you've had since 6am.
  what_they_need: to be seen as depleted without being handed a plan, and to be given
    permission to stop performing okay for the few minutes that are actually theirs
  what_they_avoid: perfect-parent pressure, self-care-Sunday commercialism, hustle-culture
    productivity hacks, toxic positivity, and anything that asks an already-emptied
    person to add one more task to the list
series_voice_markers:
  register: warm, tender, knowing; the voice of someone who has sat in the same dark
    car and isn't here to fix you — gentle and real, never saccharine, never clinical,
    never preachy
  sentence_rhythm: short breath-length sentences that mirror a tired mind, broken
    by the occasional long exhale of a clause; plain words, no jargon, room to land
  metaphor_family: the stolen moment, the pause in the car before going in, the quiet
    after bedtime, breath caught between demands, the small still pocket in a full
    day, what you reclaim without anyone noticing
_needs_authoring: false
