reader_promise_family: For the parent who is holding up both ends of the family at
  once, these are small books for the stolen minutes you get — not a system to follow,
  but a quiet voice that sees the depletion you've stopped mentioning and lets you
  set it down for a moment without earning it first.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  depletion in the body without shaming the person carrying it'
- How to Keep House While Drowning (KC Davis) — gentle, no-earn-it permission for
  people running on empty, exactly this register
- Real Self-Care (Pooja Lakshmin) — rejects the commercial self-care script the way
  this series does, for caregivers who keep coming last
