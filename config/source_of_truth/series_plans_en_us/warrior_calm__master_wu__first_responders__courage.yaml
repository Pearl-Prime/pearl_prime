reader_promise_family: For the first responders who run toward what everyone else
  runs from, and then can't put the fear down when the shift ends. Iron Gate Press
  meets you in the moment after the call, where courage isn't the absence of fear
  but the trained calm that holds inside it. No hardening, no hero talk, no fix that
  asks you to feel nothing. Just a steadier way to stand your ground when the alarm
  keeps sounding long after the truck is back in the bay.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Wim Hof Method series (Wim Hof) — same audience of people who train the body
  to stay calm under extreme stress, without the macho framing; readers cross over
  for grounded nervous-system steadiness.
- The Untethered Soul / The Surrender Experiment (Michael A. Singer) — for readers
  who want a quiet, non-clinical voice on watching fear pass without being run by
  it; matches the inner-stillness register.
- On Combat (Dave Grossman) — speaks directly to the responder/warrior nervous system
  and the after-action cost of the job; readers who respect its honesty about the
  body under threat will recognize this series.
