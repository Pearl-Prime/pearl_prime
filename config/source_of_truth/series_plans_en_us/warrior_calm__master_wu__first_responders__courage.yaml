reader_avatar:
  age: 28-52
  where_they_are: It's 2am and the pager finally went quiet hours ago, but you're
    sitting on the edge of the bed with your heart still going like there's a call
    coming. The house is asleep. The gear is hung up. There is nothing to respond
    to. And your body hasn't gotten the message — it's still braced, still scanning,
    still waiting for the tone.
  what_they_need: To understand that the alarm firing in the quiet doesn't mean they're
    broken or losing their edge — and to find a way to stand down that doesn't require
    them to feel less, care less, or armor up harder.
  what_they_avoid: Hustle-culture grind, 'suck it up' toughness, motivational shouting,
    toxic positivity, anything that treats their fear as weakness or sells armor as
    if it were strength — and anything that sounds like a clinician who has never
    been on a call.
series_voice_markers:
  register: grounded, disciplined, quietly strong — a warrior's calm that meets fear
    without flinching; the voice of someone who has stood the same ground, not a clinician;
    spare and steady, strength with nothing to prove
  sentence_rhythm: short, weighted lines that land like measured breaths; declarative
    and unhurried, with the occasional long sentence that opens then settles, mirroring
    the breath before action and the stand-down after
  metaphor_family: the still center in the storm, the gate that holds, the edge and
    the step before you feel ready, the breath before the door comes down, trained
    calm under pressure, what is forged and what holds — never machinery, productivity,
    or biohacking
_needs_authoring: false
