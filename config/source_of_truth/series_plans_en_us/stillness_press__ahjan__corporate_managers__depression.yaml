reader_promise_family: For the manager who keeps the team running while something
  in them has gone quiet — a series that meets depression as a weather you are living
  inside, not a performance problem to fix. No optimizing, no climbing out by force.
  Just an unhurried voice that has sat in this same grey and stayed, helping you recognize
  what is happening and find the smallest amount of ground to stand on.
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- The Mindful Way Through Depression (Williams, Teasdale, Segal, Kabat-Zinn) — gentle,
  non-striving companionship with low mood rather than a fix-it program
- Reasons to Stay Alive (Matt Haig) — first-person, plainspoken honesty about depression
  that comforts by naming, not by cheering up
- When Things Fall Apart (Pema Chödrön) — staying present with difficulty and groundlessness
  instead of escaping it, in a spacious contemplative voice
