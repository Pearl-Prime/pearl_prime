reader_avatar:
  age: 38-55
  where_they_are: It is Sunday evening and the laptop is open to a deck that is due
    Monday, but you have read the same slide four times and nothing has gone in. The
    house is quiet, your inbox is at 2,300, and you cannot remember the last time
    you felt anything but a low flat hum. You are good at your job. People rely on
    you. And you are sitting very still in the dark, wondering when the colour drained
    out of all of it.
  what_they_need: To hear, in a voice with no agenda, that the heaviness is real and
    has a shape — that they are not weak or broken for feeling it — and to be shown
    one honest, undramatic way to be with it that does not require pretending to be
    fine on Monday.
  what_they_avoid: Hustle-culture reframes, 'just shift your mindset', gratitude-journal
    cures, anyone who treats depression as a motivation deficit, and the bright cheerful
    self-help that makes them feel more alone for not bouncing back.
series_voice_markers:
  register: contemplative, spacious, grounded; an unhurried presence who has sat in
    this same grey and is not in a hurry to pull you out of it; never clinical, never
    a coach, never hustle
  sentence_rhythm: long settling sentences that slow the breath, broken by short plain
    ones that land like a hand on the shoulder; pauses left open rather than filled;
    no exclamation, no urgency
  metaphor_family: stillness and weather — grey light, settling water, fog and the
    ground beneath it, the pause between, a window you have stopped looking out of;
    never machinery, productivity, military, or biohacking
_needs_authoring: false
