reader_avatar:
  age: late 30s to early 50s
  where_they_are: It's 9:40pm and the laptop is finally closed, but the body hasn't
    gotten the message — jaw still set, shoulders still up near the ears, a low hum
    of tension in the chest that no glass of wine or scroll through the phone seems
    to reach. Tomorrow's standup is already running behind the eyes. The house is
    quiet. The body is not.
  what_they_need: To feel safe inside their own body again — to come down out of the
    head and back into the chest, the breath, the ground under their feet — without
    it becoming another project to manage or metric to hit.
  what_they_avoid: White-knuckle resilience, 'just push through one more quarter,'
    performative calm in the all-hands, wellness framed as optimization, breathwork
    sold like a productivity hack, anything that leaves an already-depleted person
    with one more thing to do well.
series_voice_markers:
  register: steadying, calm, anchoring — a harbor for a storm-tossed mind; warm and
    plain, speaking body-to-body rather than head-to-head; never clinical, never preachy,
    never hustle
  sentence_rhythm: Settling cadence — longer sentences that exhale and slow the reader
    down, broken by short ones that land like an anchor catching the seabed. Built
    to be read at the speed of a long breath, not a status update.
  metaphor_family: The harbor and the anchor line, still water inside the breakwater,
    the boat that finally stops pitching, ground that holds in a storm, the steady
    horizon, the body as a vessel that can ride out weather — never machinery, military,
    productivity, or biohacking.
_needs_authoring: false
