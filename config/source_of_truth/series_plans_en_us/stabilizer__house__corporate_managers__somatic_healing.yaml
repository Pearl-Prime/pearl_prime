reader_promise_family: For the high-functioning manager whose body has been carrying
  what the mind refused to feel — a steady harbor where the nervous system is finally
  allowed to come off duty, learning to let the tension drain out of the shoulders,
  jaw, and chest without performance, fixing, or one more thing to optimize.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational text on how stress
  and trauma live in the body, written for readers who suspect their tension is more
  than stress.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  for the depleted high-achiever who needs to physically complete the stress response,
  not just think their way calm.'
- 'Anchored: How to Befriend Your Nervous System Using Polyvagal Theory (Deb Dana)
  — accessible, body-first regulation for people who live in their heads and want
  to come home to the body.'
