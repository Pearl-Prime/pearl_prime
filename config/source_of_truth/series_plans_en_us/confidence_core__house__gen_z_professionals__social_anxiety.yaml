reader_avatar:
  age: 22 to 29
  where_they_are: Standing in the office kitchen with a mug they don't want, rehearsing
    a sentence they may never say, while two coworkers laugh about something they
    didn't catch — and the Slack message they sent an hour ago still has no reply,
    so they've reread it nine times looking for the mistake.
  what_they_need: To understand that the bracing, the rehearsing, the replaying, the
    comparing, and the quiet certainty that they're somehow doing personhood wrong
    are all one system — a social alarm that learned to overfire — and that they can
    meet a room without first defeating that alarm.
  what_they_avoid: Fake-it-til-you-make-it hype, networking-guru scripts, 'just put
    yourself out there' advice, boss-babe confidence cliches, toxic positivity, and
    any book that treats their quiet as a defect to be optimized into someone louder.
series_voice_markers:
  register: encouraging, clear, steady; warm and direct; meets you at the threshold
    of who you are becoming and believes in you without flattering; never clinical,
    never preachy, never hustle
  sentence_rhythm: plainspoken and grounded, with short declaratives that land like
    a hand on the shoulder, opening into one longer breath when naming what you've
    carried — then settling back to simple, so nothing feels performed
  metaphor_family: the threshold and the doorway; crossing from one room to the next;
    the first step over a line; the held breath before entering; who you become on
    the other side of a door you've been standing in front of for years
_needs_authoring: false
