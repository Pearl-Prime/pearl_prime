reader_promise_family: You will learn to stand in the doorway of a room, a meeting,
  a conversation, and walk through it as yourself — not by silencing the fear, but
  by no longer letting it decide who you get to be. No performance, no fixing, no
  becoming someone louder. Just a steadier way to cross from the person who hides
  to the person who arrives.
bestseller_hook_family: ''
emotional_engine: social_anxiety_recognition
comp_series:
- Unfuck Yourself series (Gary John Bishop) — direct, no-flattery self-talk for people
  tired of being talked at; matches the steady, warm-but-honest register without the
  hustle.
- The Highly Sensitive Person companion works (Elaine N. Aron) — reframes quiet, scanning
  sensitivity as a way of being rather than a defect to fix, the same anti-optimization
  stance.
- How to Be Yourself (Ellen Hendriksen) — social anxiety treated with compassion and
  specificity instead of 'just be confident' cliches, the closest tonal sibling for
  this persona.
