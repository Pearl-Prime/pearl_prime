reader_promise_family: For the high-performing manager who has spent years proving
  they are enough — a quiet, unhurried place to set the proving down and discover
  that your worth was never on the line. No optimizing, no fixing, no becoming a better
  version of yourself. Just the slow recognition that the person doing all that work
  is already whole.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Untethered Soul (Michael A. Singer) — for the reader who wants to loosen identification
  with the inner critic rather than coach it into compliance
- Radical Acceptance (Tara Brach) — same shame-to-self-compassion arc, contemplative
  rather than tactical, written for people who overwork to feel acceptable
- The Gifts of Imperfection (Brené Brown) — for high-achievers ready to trade 'good
  enough yet?' for plain worthiness, minus the worksheet culture
