  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 35 to 52
  where_they_are: It is 9:40pm and the team has gone home. You're still at your desk
    re-reading an email you already sent, certain you missed something, certain someone
    will finally notice that you're not as capable as they think. The office is dark
    except for your monitor. You did good work today and you cannot feel any of it.
  what_they_need: To learn that the relentless self-measurement is not the price of
    being good at their job, and that they can lead, deliver, and matter without first
    earning the right to exist. A voice that treats their worth as already settled
    rather than something to be performance-managed into being.
  what_they_avoid: Hustle-culture self-improvement, 'optimize your mindset' coaching,
    just-meditate platitudes, toxic positivity, gratitude-journal homework, and anything
    that quietly turns calm into one more KPI they're failing to hit.
series_voice_markers:
  register: contemplative, spacious, grounded; an unhurried presence who has sat in
    this exact place themselves — the over-functioning manager who finally stopped
    proving — never clinical, never a coach, never hustle
  sentence_rhythm: unhurried and breath-paced; short declarative sentences that land
    and leave room, occasionally opening into one longer flowing line before settling
    back; built to be read slowly at the end of a long day, with silences left intact
  metaphor_family: stillness, breath, settling water, open ground, light through a
    window, the pause between two thoughts; never productivity, machinery, military,
    scorecards, or biohacking
_needs_authoring: false
