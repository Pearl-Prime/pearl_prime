reader_avatar:
  age: 47-58, Generation X, often the family's quiet financial shock absorber
  where_they_are: It's a Tuesday night, past eleven. The dishwasher is running. You've
    got a spreadsheet open in one tab and your mother's pharmacy portal in another,
    and your kid just texted about the deposit for next semester. You do the subtraction
    one more time, the way you've done it a hundred times, as if this time the numbers
    might come out different. They don't. You close the laptop and sit in the kitchen
    with the hum of the fridge, doing the arithmetic of a life you can't seem to get
    ahead of.
  what_they_need: to be seen as more than a wallet with a pulse; to feel the difference
    between a hard season and a failed life; to lay down, for one honest hour, the
    belief that the squeeze is proof of their own inadequacy; to remember that the
    things they're holding up are worth holding
  what_they_avoid: get-rich-quick energy, budgeting apps that gamify their dread,
    'build generational wealth' sermons, net-worth-as-self-worth, anyone who's never
    been the one the whole family quietly depends on telling them to 'just cut the
    lattes'
series_voice_markers:
  register: reflective, steady, grown-up; the voice of someone a few years further
    up the same slope who turns around to talk to you — never a financial guru, never
    a cheerleader, never a clinician
  sentence_rhythm: plainspoken and unhurried, with room to breathe; short declaratives
    that land like a hand on the shoulder, then a longer line that lets the feeling
    settle; questions that don't demand an answer
  metaphor_family: the second mountain and the view from later in the climb; the deeper
    foundation poured under a house you can't see; planting trees whose shade you
    won't sit in; the long arc of a life measured in what outlasts you, never in machinery,
    metrics, or the market
