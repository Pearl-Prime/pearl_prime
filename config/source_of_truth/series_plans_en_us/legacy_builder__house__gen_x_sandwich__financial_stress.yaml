reader_promise_family: For the generation holding up two others at once — aging parents
  on one side, kids on the other, and a bank balance that never quite covers both.
  This series doesn't promise to fix your money. It promises to sit with you in the
  math at midnight and help you recognize that a life under this much financial pressure
  is still a life worth building — and that the foundation you're laying, mostly unseen,
  is realer than any number.
bestseller_hook_family: ''
emotional_engine: financial_stress_recognition
comp_series:
- The Second Mountain (David Brooks) — the namesake idea that a meaningful life is
  built on commitment and care, not the first mountain of acquisition
- Your Money or Your Life (Vicki Robin & Joe Dominguez) — reframes money as life energy
  rather than a scoreboard, the same refusal to measure a life in dollars
- The Soul of Money (Lynne Twist) — money as relationship and meaning rather than
  scarcity and shame, written in a warm, reflective register close to ours
