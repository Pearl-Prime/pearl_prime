reader_promise_family: 'For the nurse whose body never clocked out: a steady, nocturnal
  companion that sits with what you''ve been holding since your last shift — and lets
  you set it down, in the small hours, without being told to be strong, to optimize,
  or to heal on a schedule.'
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational text on how the
  body stores what the mind sets aside; this series translates that recognition into
  nights a nurse can actually use.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the unfinished stress that lives in caregivers'' bodies; shares this series'' refusal
  to call exhaustion a personal failing.'
- When the Body Says No (Gabor Maté) — on what chronic self-suppression costs the
  body of those who care for others; the same tenderness toward people who've spent
  themselves keeping everyone else alive.
