reader_avatar:
  age: 29-52, a floor RN working 12-hour rotations
  where_they_are: It's 2am and the shift ended hours ago, but your body is still on
    the unit — heart still quick, jaw still set, hand half-reaching for an alarm that
    isn't ringing. The house is dark and quiet and you are wide awake inside a body
    that won't believe it's safe to rest.
  what_they_need: Permission to feel how much your body has been carrying — every
    code, every loss, every double — and a way to let some of it go down and out,
    in the dark, without a worksheet or a morning routine.
  what_they_avoid: Self-care that sounds like another task, 'put your own oxygen mask
    on first' platitudes, resilience training, sleep hacks, and anything that treats
    your exhaustion as a mindset problem you should be able to push through.
series_voice_markers:
  register: Steady, nocturnal, quietly architectural — the voice of someone sitting
    up with you in the dark room, who has seen what the body holds and isn't frightened
    by it; holds without fixing, never clinical, never a coach.
  sentence_rhythm: Short, weight-bearing sentences set beside longer ones that settle
    and exhale; pauses where a breath would go; plain words carrying heavy things,
    the way you'd speak softly to someone who finally stopped pretending they were
    fine.
  metaphor_family: Night and the dark room, foundations and what bears a load, weight
    set down and the floor that holds it, the body settling toward the ground, the
    long hours before dawn, the structure that stays standing while you let go.
_needs_authoring: false
