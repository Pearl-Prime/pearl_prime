reader_promise_family: A felt-sense companion for nurses whose bodies have been holding
  what the shift wouldn't let them feel — naming what the nervous system is doing,
  in language you can use mid-shift, without one more protocol to push through.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational trauma-and-the-body
  text these readers already trust
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  names the unfinished stress response living in caregivers'' bodies'
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — same trusted-companion register
  for depleted helpers who give everything away
