reader_avatar:
  age: 28-52
  where_they_are: It's the drive home after a twelve-hour shift, hands still smelling
    of sanitizer, and you realize you've been gripping the wheel at a red light for
    no reason — heart going, jaw set, scanning the dark road like the next emergency
    is already coming.
  what_they_need: To understand that the bracing, the held breath, the body that won't
    stand down is not weakness or burnout failure — it is a nervous system that learned
    to survive the floor, and it can be met gently rather than overridden.
  what_they_avoid: Push-through fixes, 'self-care' that's one more task, cold clinical
    protocols they already run on patients all day, and any practice that floods or
    retraumatizes instead of settling them.
series_voice_markers:
  register: embodied, grounded, gently somatic and trauma-informed; the voice of a
    fellow nurse who finally sat down, speaking from the body and to the body — never
    clinical, never hustle, never 'mind over matter'
  sentence_rhythm: unhurried and breath-paced; short grounding sentences set against
    longer descending ones, with deliberate pauses that let a feeling land before
    the next line arrives
  metaphor_family: the body's felt sense, breath and grounding, tension held and released,
    the nervous system settling like weather passing, the ground holding you up, warmth
    returning to a place that has been braced for a long time
_needs_authoring: false
