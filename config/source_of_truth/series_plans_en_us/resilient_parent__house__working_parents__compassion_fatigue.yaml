reader_avatar:
  age: 30s to mid-40s
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is humming,
    and you're sitting on the closed lid of the toilet — the only door in the house
    with a lock — not hiding exactly, just stealing ninety seconds before someone
    calls your name again. You gave all day. You have nothing left and bedtime asks
    for more.
  what_they_need: To hear that the numbness isn't a character flaw, that running dry
    from caring too much is a real and named thing, and to be handed something small
    enough to hold in the few minutes they actually get — not a regimen, just permission
    and a place to set the load down.
  what_they_avoid: Perfect-parent pressure, 'self-care Sunday' commercialism, hustle-culture
    optimization, toxic positivity, and any book that asks an already-depleted person
    to add one more thing to the list.
series_voice_markers:
  register: warm, tender, knowing; the voice of someone who has sat on that same locked-bathroom
    floor — gentle and real, never saccharine, never clinical, never preachy, never
    hustle
  sentence_rhythm: short, breath-shaped sentences that land like the pause in the
    car before you go inside; plainspoken, unhurried, willing to stop mid-thought
    and just sit with you
  metaphor_family: the stolen moment, the few minutes that are yours, the quiet after
    bedtime, the pause in the car before going in, the breath caught between demands,
    the small still pocket in a full day, what you reclaim without anyone noticing
_needs_authoring: false
