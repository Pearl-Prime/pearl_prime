reader_promise_family: 'For the working parent who pours out care all day and has
  nothing left for themselves: not one more task, not a fix, not a finish line — just
  a few stolen minutes that are honestly yours, and the quiet recognition that what
  you''re carrying has a name.'
bestseller_hook_family: ''
emotional_engine: compassion_fatigue_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  depletion in caregivers without shaming them, and refuses the optimization trap'
- How to Keep House While Drowning (KC Davis) — meets the exhausted, care-saturated
  parent exactly where they are with radical gentleness, not productivity
- The Book You Wish Your Parents Had Read (Philippa Perry) — warm, plainspoken, deeply
  human writing for parents that trusts the reader instead of lecturing them
