reader_avatar:
  age: 35 to 52
  where_they_are: It's 6:40am. The team won't be online for two hours, but you're
    already at the kitchen table with your laptop and a cooling coffee, scrolling
    the channel for anything that broke overnight. Your shoulders are up near your
    ears. Nothing has happened yet. Something always feels like it's about to.
  what_they_need: To understand that the dread, the scanning, the racing mind, and
    the buried sense that they're getting away with something are all one thing wearing
    different masks — and to be met by a voice that strips the situation bare instead
    of handing them another system to run.
  what_they_avoid: Productivity hacks, 'communication frameworks', breathing apps
    with streaks, leadership-performance content, toxic positivity, and anyone who
    tells a tired manager to simply mindset their way out of it. Anything that adds
    more noise to a mind that is already too full.
series_voice_markers:
  register: spare, clear, unadorned; a quiet presence in the room with you, not a
    clinician and not a coach; gentle and direct; says only what is needed and then
    stops
  sentence_rhythm: short declaratives that land and leave space; an occasional longer
    line that opens, then a clean close; silence used on purpose; never breathless,
    never a list of hacks
  metaphor_family: bare form and empty space — the meeting room after everyone leaves,
    the unsaid that settles, clean light through a window, the breath in a quiet office,
    the desk cleared of everything but one thing, what remains when the noise falls
    away
_needs_authoring: false
