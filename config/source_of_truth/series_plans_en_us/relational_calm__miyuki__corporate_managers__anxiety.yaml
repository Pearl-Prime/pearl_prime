reader_promise_family: A quiet room for the manager whose body is always braced. Not
  one tool to calm down faster, not one more thing to optimize. Just the bare truth
  of what anxiety is doing under the competence you perform all day, said plainly,
  with nothing extra added to an already-crowded mind.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- Unwinding Anxiety (Judson Brewer) — meets the anxious, habit-looping mind with calm
  clarity instead of more pressure
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the body''s stress state in high-functioning people who keep performing through
  it'
- When the Body Says No (Gabor Maté) — takes the cost of held-in stress seriously
  without blaming the person carrying it
