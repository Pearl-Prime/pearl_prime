reader_avatar:
  age: 28-52
  where_they_are: It's 2am and the shift ended hours ago, but you're lying in the
    dark with your jaw set and your shoulders still up around your ears, replaying
    the call you couldn't save — your body braced as if the radio could go off again
    any second, even though the house is quiet and everyone you love is asleep down
    the hall.
  what_they_need: Permission to feel the toll in their body without being told to
    toughen up or debrief it away — and a slow, grounded way to let the held charge
    drain out through the floor so the deep, low energy can refill from below, the
    way it's supposed to between calls.
  what_they_avoid: Wellness that sounds like a pep talk, anyone who has never run
    a call telling them to 'just breathe,' optimization language, hustle, gratitude-journaling
    toxic positivity, and any approach that treats their hypervigilance as a personal
    failing instead of a body that did exactly what it was trained to do.
series_voice_markers:
  register: grounded, restorative, quietly vital; the voice of someone who has sat
    in the same parking lot after a bad call — warm, unhurried, plainspoken, never
    clinical and never a pep talk
  sentence_rhythm: long settling sentences that let the breath drop, broken by short
    ones that land like a hand on the shoulder; a tidal in-and-out that mirrors a
    nervous system finally letting down
  metaphor_family: roots and meridians, the body's deep energy returning, what flows
    again when a blockage clears, breath reaching the lowest part of the lungs, the
    well that refills from below, ground that finally holds the weight — never machinery,
    military readiness, productivity, or biohacking
_needs_authoring: false
