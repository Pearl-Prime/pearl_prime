reader_promise_family: 'For the ones who run toward what everyone else runs from:
  a way to let your body finally set down what it has been carrying — not by fixing
  you, but by helping the held energy move again from the root, so vitality can return
  to a nervous system that has been on call far too long.'
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the definitive case that trauma
  lives in the body, written for readers who already feel it in theirs
- Waking the Tiger (Peter A. Levine) — somatic release framed as completing what the
  body never got to finish, the through-line of this series
- What Happened to You? (Bruce D. Perry & Oprah Winfrey) — reframes the wound as a
  sane response to too much, never a defect to fix
