reader_avatar:
  age: 32-46
  where_they_are: It's 9:40pm. The dishes are half-done, a work message just lit up
    your phone, and a small voice down the hall is asking for water again. You are
    sitting on the bottom stair because it was the nearest place to stop, and you
    cannot remember the last time you felt like yourself.
  what_they_need: To hear that the exhaustion is real and not a character flaw — that
    they can stop bracing, stop scanning, stop measuring themselves against everyone
    who looks like they're coping, and feel solid ground under them for the first
    time in months.
  what_they_avoid: Push-through toughness, 'just relax,' productivity hacks for parents,
    hustle-positivity, self-help that adds one more thing to the to-do list, and any
    voice that talks down to a nervous system already shaking.
series_voice_markers:
  register: grounded, steady, holding — warm and plain, the voice of someone who sits
    down beside you on the bottom stair instead of standing over you; never clinical,
    never preachy, never hustle
  sentence_rhythm: short load-bearing sentences set against longer ones that exhale;
    pauses where a tired reader can rest; second person throughout, spoken not lectured
  metaphor_family: held ground and the earth beneath you, weight carried and finally
    set down, roots and steadiness, the body remembering it is safe, what holds when
    everything shakes — never machinery, military, productivity, or biohacking
_needs_authoring: false
