reader_promise_family: 'For the working parent running on empty: a steady voice that
  helps you recognize burnout without demanding you push through it, optimize it,
  or pretend you''re fine — only ground enough to set the weight down for a moment.'
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — names burnout as a physiological state to complete in the body, not a willpower
  failure'
- Real Self-Care (Pooja Lakshmin) — rejects performative wellness for working parents
  and centers boundaries over hacks
- How to Keep House While Drowning (KC Davis) — meets depleted caregivers with compassion
  instead of productivity shame
