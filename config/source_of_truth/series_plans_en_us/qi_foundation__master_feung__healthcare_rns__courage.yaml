reader_promise_family: For nurses who have spent themselves down to the root caring
  for everyone else, this series restores the quiet courage to be seen, to speak,
  and to stay soft — not by demanding more bravery, but by clearing what blocks the
  vitality that was always there.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Body Keeps the Score-adjacent somatic-recovery list by Bessel van der Kolk —
  why the body, not the willpower, is where courage is actually stored
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the depletion of caregivers without blaming them, the same refusal-to-shame stance'
- When the Body Says No (Gabor Mate) — for readers who already sense their over-giving
  is wearing a groove in the body, not just the schedule
