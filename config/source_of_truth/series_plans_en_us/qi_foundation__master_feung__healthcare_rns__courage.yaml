reader_avatar:
  age: 29-52
  where_they_are: It is 7:40pm and the shift ended forty minutes ago, but you are
    still in the car in the hospital parking garage, engine off, hands at ten and
    two, not driving. You held the floor for twelve hours. You caught the bad order,
    you held the dying man's wife while she shook, you charted through your own missed
    lunch. And now, alone, you cannot remember the last time anyone asked if you were
    okay — or the last time you would have told the truth if they did.
  what_they_need: permission to need things, a way to speak up that doesn't feel like
    risking everything, and proof that the steadiness they give away all day can also
    be turned, gently, toward themselves
  what_they_avoid: resilience workshops that blame the nurse for the system, 'self-care'
    reduced to a bath bomb, anyone who calls them a hero instead of asking how they
    are, and advice that adds one more thing to do at the end of an impossible day
series_voice_markers:
  register: grounded, restorative, quietly vital; the voice of a seasoned charge nurse
    who pulled you into the med room to tell you the truth — warm, unhurried, never
    clinical at you, never preachy, never hustle
  sentence_rhythm: steady and breath-paced; short declaratives that land like a hand
    on the shoulder, opening into longer lines that move the way a held breath finally
    reaches the bottom of the lungs
  metaphor_family: roots and meridians, the body's quiet energy returning, what flows
    again when a blockage clears, deep ground and rising sap, the well that refills
    from below, the lowest part of the breath, the edge and the single step before
    you feel ready
_needs_authoring: false
