reader_avatar:
  age: 31 to 47
  where_they_are: It's 6:14am and you're up before the team, before the Slack pings,
    holding the first coffee in a quiet house. The company is real, the revenue is
    real, the offer letter you signed for someone yesterday is real — and still there's
    a thin cold thread running under your ribs that says today might be the day they
    realize you've been making it up the whole time.
  what_they_need: To recognize the founder-self that overworks to stay one step ahead
    of being exposed, and to begin the day from steadiness instead of bracing — without
    being handed another framework, sprint, or morning protocol to optimize.
  what_they_avoid: Hustle gospel, 5am-grind theater, biohacking and morning-routine
    porn, productivity-as-virtue, and any toxic-positivity reframe that turns a fresh
    start into one more performance they could fail at.
series_voice_markers:
  register: fresh, hopeful, grounded; warm and clear; the quiet of daybreak before
    the world wakes — honest that a fresh start isn't about doing more, never clinical,
    never preachy, never hustle
  sentence_rhythm: plainspoken and unhurried; short declaratives that land like light
    coming up, opening into one longer breath when the feeling needs room, then settling
    again
  metaphor_family: daybreak and first light, the hour before the inbox wakes, the
    clean slate of morning, the horizon going pale, the day not yet spent, the breath
    taken at dawn, beginning again without forcing
_needs_authoring: false
