reader_promise_family: A fresh start that doesn't ask you to become more impressive
  — only to stop hiding the founder you already are, so you can meet the day before
  the inbox wakes without bracing to be found out.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Mountain Is You (Brianna Wiest) — self-sabotage and the hidden beliefs founders
  carry, in a warm non-clinical voice
- The Gifts of Imperfection (Brené Brown) — shame, worthiness, and letting go of who
  you think you should be
- How to Do the Work (Nicole LePera) — recognizing the patterns you run on autopilot
  and beginning again, gently
