reader_promise_family: A steady, honest companion for the Gen X squeeze — facing money
  fear about parents, kids, and a retirement that keeps moving without being told
  to hustle harder, manifest abundance, or pretend the numbers don't scare you.
bestseller_hook_family: ''
emotional_engine: financial_anxiety_recognition
comp_series:
- Financial Feelings (Lindsay Bryan-Podvin) — names money as an emotional, not just
  mathematical, problem for an anxious adult reader
- The Sandwich Generation Survival series (various, AARP-adjacent) — speaks to the
  exact dual-caregiving squeeze without finance-bro hype
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — validates
  the felt overwhelm of mid-life people stretched in every direction and stays warm,
  not clinical'
