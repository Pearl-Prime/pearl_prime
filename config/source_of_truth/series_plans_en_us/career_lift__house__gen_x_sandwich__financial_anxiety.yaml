  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 47 to 56
  where_they_are: It's a Tuesday night, the dishwasher is running, your kid's tuition
    deposit is due Friday, and your mother's assisted-living invoice came in the same
    mail. You're standing at the kitchen counter with your phone open to the banking
    app, doing the math you already did this morning, and the number hasn't changed.
  what_they_need: To be told the truth — that the squeeze is real, that they're not
    bad with money, and that they can keep moving through the fear instead of waiting
    for it to lift first.
  what_they_avoid: Hustle-culture pep talks, 'abundance mindset' coaching, finance
    bros, anyone under forty telling them to cut the lattes, and any voice that treats
    a genuine generational money squeeze as a personal failure of attitude.
series_voice_markers:
  register: encouraging, forward-looking, grounded; warm and practical, honest about
    the fear; the voice of someone a chapter or two ahead of you on the same road,
    not a financial advisor and not a guru
  sentence_rhythm: plainspoken and steady, mostly short to medium sentences with the
    occasional long breath; lands hard truths in simple words, then gives you room
    before the next one
  metaphor_family: the next chapter and the turning page, the path that opens ahead,
    the step up that costs something, the room you haven't entered yet, the draft
    you're still writing — never machinery, military, productivity, or biohacking
_needs_authoring: false
