reader_avatar:
  age: 30 to 42, mid-career professional women — senior manager, team lead, the one
    who runs the household calendar too
  where_they_are: It's 9:40pm. The kids are finally down, the laptop is open again,
    and a Slack message just came in that starts with 'so sorry to ask but' — and
    you can already feel yourself typing 'no problem, happy to' before you've even
    decided. Your jaw is tight. You said yes to three things today you didn't want,
    and you can't explain to anyone, least of all yourself, why the word 'no' felt
    physically impossible.
  what_they_need: To understand why a boundary feels like a betrayal in their body,
    to grieve what holding a line actually costs them, and to stop treating their
    inability to refuse as a character flaw they should have outgrown by now
  what_they_avoid: People-pleasing platitudes, 'just say no' scripts that ignore why
    no is so hard, guilt-tripping disguised as empowerment, hustle-culture self-optimization,
    toxic positivity, and any book that pretends drawing a line is free of grief
series_voice_markers:
  register: Balanced, warm, discerning — a heart-centered voice about worth and limits
    that weighs things fairly; gentle but clear-eyed, never clinical, never preachy,
    never hustle. The voice of someone who has paid the cost of a boundary herself
    and isn't going to pretend it was painless.
  sentence_rhythm: 'Measured and settling — longer reflective sentences that hold
    complexity, then a short true one that lands the weight. Cadence of a scale finding
    level: motion, motion, then stillness.'
  metaphor_family: The feather and the scale, weight and balance, the heart weighed
    against a feather, what you give and what you keep, the fulcrum that holds, equilibrium
    and the steady center — never machinery, military, productivity, or biohacking
_needs_authoring: false
