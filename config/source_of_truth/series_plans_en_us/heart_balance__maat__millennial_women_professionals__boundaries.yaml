reader_promise_family: A heart-centered field guide to the real weight of drawing
  a line — not how to say no faster, but how to feel what a boundary costs and choose
  it anyway, with your worth left intact on the scale.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the genre's anchor on relational
  limits, but this series stays with the felt cost a boundary exacts rather than the
  scripts
- The Book of Boundaries (Melissa Urban) — practical and direct on what to say; this
  series is the inner companion to that, for the woman who knows the words and still
  can't make her mouth form them
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  what over-giving does to a woman''s body; this series narrows that lens to the single
  moment a line is drawn'
