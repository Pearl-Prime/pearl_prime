reader_avatar:
  age: 29-55
  where_they_are: Sitting in her car in the hospital parking garage at the end of
    a twelve-hour shift, engine off, badge still clipped to her scrubs, hands resting
    on the wheel — not crying, just empty, because a patient she'd cared for all week
    died this afternoon and she charted the time and kept going, and now in the dark
    she finally has nothing left to do.
  what_they_need: Permission to grieve the losses no one acknowledged, to feel what
    she pushed past at the bedside, and to be held the way she has spent her whole
    career holding everyone else.
  what_they_avoid: Spiritual bypassing, 'they're in a better place,' 'it was their
    time,' resilience training that asks her to bounce back faster, gratitude journals
    demanded before the grief has even landed, and anyone who tells her that being
    a nurse means she should be used to this by now.
series_voice_markers:
  register: tender, devotional, spacious — a reverent voice that sits beside the exhausted
    caregiver in the dark and asks nothing of her; never clinical, never preachy,
    never a pep talk; the voice of someone who knows what it costs to hold a dying
    hand and chart the time and walk to the next room
  sentence_rhythm: unhurried and breath-paced, long tender clauses that open into
    space, then a short line that lands and lets her rest; pauses where grief needs
    them, never racing to the comfort
  metaphor_family: the open vessel poured out and waiting to be refilled, grief as
    love with nowhere to go, the cup emptied at every bedside, the well that refills
    only in the dark, the hands that have held so much and may finally open, the empty
    chair, the sacred ordinary of the night shift
_needs_authoring: false
