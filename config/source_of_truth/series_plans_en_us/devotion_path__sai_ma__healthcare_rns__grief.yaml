reader_promise_family: For the nurse who has carried more endings than anyone counted
  — a tender, unhurried place to set down the grief you were never given time to feel,
  where nothing rushes you and no one asks you to be strong.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- It's OK That You're Not OK (Megan Devine) — meets grief without trying to fix or
  rush it, the same refusal of toxic positivity this series lives by
- When Breath Becomes Air (Paul Kalanithi) — the interior life of a clinician facing
  mortality, the lived medical world these readers inhabit
- How to Carry What Can't Be Fixed (Megan Devine) — a companion for grief that is
  carried rather than cured, mirroring this series' tender-witness promise
