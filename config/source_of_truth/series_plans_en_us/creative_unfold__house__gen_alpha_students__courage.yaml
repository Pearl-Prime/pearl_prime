reader_promise_family: Courage is not the absence of fear; it is one small mark made
  before you feel ready. This series meets young creators at the edge of who they
  could be and walks them through every way fear disguises itself, never demanding
  the leap, only the next honest step.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Confidence Code for Girls (Katty Kay & Claire Shipman) — courage and bravery
  written directly for the teen who freezes before she speaks
- What Do You Do with a Problem? / a Chance? (Kobi Yamada) — the small-brave-step
  ethos and the edge-of-fear image, scaled up for older students
- Big Magic (Elizabeth Gilbert) — fear and creative courage as companions rather than
  enemies, for the maker who is scared to be seen
