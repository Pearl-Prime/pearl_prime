reader_avatar:
  age: 13 to 18, Gen Alpha and the youngest Gen Z, in middle and high school
  where_they_are: Sitting in class with their hand half-raised, the answer right there
    behind their teeth, watching the moment close while their heart slams and they
    tell themselves they'll speak up next time, they always tell themselves next time.
  what_they_need: Permission to be afraid and act anyway; a way to tell real danger
    from the alarm that fires over nothing; proof that the unfinished, imperfect,
    brave-enough version of them is allowed to exist out loud.
  what_they_avoid: Be-fearless hype, motivational-poster bravery, adults who say just
    believe in yourself, anything that treats their fear as a flaw to fix instead
    of a signal to understand.
series_voice_markers:
  register: open, encouraging, creative; warm and honest, never precious; the voice
    of someone a few years ahead who remembers exactly what the edge felt like, never
    a coach and never a clinician
  sentence_rhythm: short true sentences that land like a held breath, then a longer
    one that opens the room back up; plainspoken, image-led, room to think between
    the lines
  metaphor_family: the blank canvas and the first mark, the edge and the one step
    before you feel ready, the draft you are allowed to ruin, color returning to something
    that went grey, what wants to be made through you
_needs_authoring: false
