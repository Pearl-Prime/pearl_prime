reader_promise_family: You will learn to hold a boundary the way a gate holds — calmly,
  without slamming, without apology — so that protecting your work and your time stops
  feeling like an act of aggression and starts feeling like the quiet strength it
  actually is.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Boundaries (Henry Cloud & John Townsend) — the genre's anchor on saying no without
  guilt, here re-voiced for the solo founder whose boundary failures cost revenue
  and sleep.
- Essentialism (Greg McKeown) — the disciplined 'less but better' spine, but trained
  on protecting your line in real relationships rather than your calendar in the abstract.
- The Let Them Theory (Mel Robbins) — the same release of other people's reactions,
  reached through a quieter, steadier door than the high-energy delivery.
