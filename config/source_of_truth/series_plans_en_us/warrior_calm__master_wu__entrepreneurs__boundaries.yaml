reader_avatar:
  age: 32-48
  where_they_are: It's 9:40pm and you're still answering a client's 'quick question'
    that arrived at 6, because saying 'this can wait until morning' felt like a risk
    you couldn't take — and now you're resenting the very business you built, the
    laptop still open on the kitchen table you haven't eaten at.
  what_they_need: Permission to treat a boundary as protection rather than a threat
    — a steady, low-drama way to say no, hold a line, and stop over-explaining, without
    torching the relationship or their reputation.
  what_they_avoid: Hustle-culture grind, 'crush it' boundary scripts that sound like
    ultimatums, toughness-as-armor advice, and any framing that treats firmness as
    coldness or saying no as a personality flaw to fix.
series_voice_markers:
  register: grounded, disciplined, quietly strong; a warrior's calm that meets the
    fear of disappointing someone without flinching; steady and spare, strength without
    bravado; speaks to the founder, never down to them
  sentence_rhythm: short declaratives that land like footing being set, opening into
    one longer breath, then closing tight again; pauses where a reader would actually
    pause; never rushed, never padded
  metaphor_family: the gate that holds without slamming, the still center inside the
    storm of other people's urgency, standing your ground, the breath taken before
    you answer, trained calm under pressure, what is forged and what holds, the warrior
    who has nothing left to prove
_needs_authoring: false
