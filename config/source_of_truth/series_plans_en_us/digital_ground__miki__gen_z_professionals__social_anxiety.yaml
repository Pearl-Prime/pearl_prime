reader_promise_family: Naming social anxiety in language you can actually use the
  next time it happens — so the feeling stops being proof something is wrong with
  you and starts being something you can stand next to. No log-off cure, no networking
  hacks, no turning yourself into a more confident brand. Just recognition, and the
  relief of no longer being alone inside the pattern.
bestseller_hook_family: ''
emotional_engine: social_anxiety_recognition
comp_series:
- Unfuck Yourself series (Gary John Bishop) — plainspoken, profane, anti-platitude
  self-talk that meets a younger reader where they actually are.
- The Anxiety Workbook / How to Be Yourself adjacent shelf (Ellen Hendriksen) — social-anxiety-specific,
  warm and de-shaming rather than exposure-drill clinical.
- Burnout & Big Feelings shelf (Liz Fosslien & Mollie West Duffy) — illustrated, emotionally
  literate, built for early-career readers who live online and want feelings named,
  not fixed.
