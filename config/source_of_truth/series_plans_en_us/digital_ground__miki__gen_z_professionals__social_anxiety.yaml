reader_avatar:
  age: 22-29
  where_they_are: Standing just outside the conference room, hand on the door, watching
    everyone already seated and laughing through the glass — phone in the other hand
    because looking busy is easier than walking in. They've rehearsed the first thing
    they'll say four times and it already sounds wrong.
  what_they_need: To understand what their nervous system is actually doing in rooms
    full of people, and why it makes sense — without being told to 'just put yourself
    out there,' download a confidence app, or treat their personality as a problem
    to fix before the next standup.
  what_they_avoid: Boomer self-help and 'just log off' platitudes; LinkedIn-influencer
    confidence advice; grindset and networking-hack content; toxic positivity that
    tells them to fake it; anything that frames their quiet as a personal brand to
    optimize or shames them for living half their life on a screen.
series_voice_markers:
  register: Gen-Z native, screen-literate, plainspoken and warm; ironic without being
    cynical — a smart slightly-older friend who actually gets the group chat, the
    read receipt, the dread of the camera-on meeting; never clinical, never a coach,
    never hustle.
  sentence_rhythm: Short declaratives that land like texts, then one longer breath
    of recognition. Plain words. White space where a clinician would put a bullet
    list. The pacing of someone talking to you, not presenting at you.
  metaphor_family: The present moment and the body in the room; the phone face-down
    on the table; ground under your feet; the breath between notifications; the doorway
    you're standing in; signal cutting through noise — never productivity, machinery,
    military, or self-optimization.
_needs_authoring: false
