reader_promise_family: A trauma-informed, body-first way back to sleep for the high-functioning
  woman whose nervous system won't stand down at night — not another protocol to perfect,
  but a felt sense of safety she can finally feel in her own chest, where the bracing
  finally lets go.
bestseller_hook_family: ''
emotional_engine: sleep_anxiety_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational case that trauma
  and threat live in the body, not just the mind, which is exactly where this series
  meets sleeplessness.
- Why We Sleep (Matthew Walker) — names sleep as biological necessity rather than
  a discipline to win, dignifying the reader's struggle without shaming it.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — speaks
  to high-achieving women about completing the body''s stress response, the same nervous-system
  literacy this series brings to the bedroom.'
