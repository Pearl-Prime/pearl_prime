reader_avatar:
  age: late twenties to early forties
  where_they_are: It is 1:47am. She got into bed exhausted ninety minutes ago, did
    everything right — no screens, the lavender, the breathing app — and her body
    answered by going wide awake the instant the lights went off. She is lying on
    her back in the dark, jaw tight, shoulders pulled up toward her ears, running
    tomorrow's meeting on a loop, listening to her partner breathe slowly beside her
    and feeling like the only person in the house whose body forgot how to do this.
  what_they_need: To understand that her sleeplessness is a nervous system stuck in
    protection, not a personal failure or a willpower problem — and to be guided,
    gently and from the body, back into the felt experience of safety that has to
    come before sleep, not chased after it.
  what_they_avoid: Push-through sleep hacks, optimization and tracking culture, cold
    clinical sleep-hygiene checklists delivered like homework, anything that treats
    her body as a machine to be debugged or shames her for not 'just relaxing,' and
    intensity that drags her back through the very fear she's trying to settle.
series_voice_markers:
  register: embodied, grounded, gently somatic and trauma-informed; the steady voice
    of a felt-sense guide sitting beside her in the dark, speaking from and to the
    body — never clinical, never hustle, never telling her to try harder
  sentence_rhythm: slow and settling, like a long exhale; short grounding sentences
    that land in the body, then a longer one that opens room to breathe; pauses where
    the reader can feel the weight lift
  metaphor_family: the body's felt sense; breath and the ground beneath the bed; tension
    held in the jaw and shoulders, then released; the nervous system settling like
    weather passing; warmth returning to a braced place; the difference between being
    safe and feeling safe
_needs_authoring: false
