reader_promise_family: A warm, honest companion for the parent who keeps saying yes
  when they mean no — learning to set a boundary without slamming a door, to be both
  kind and clear across every table in your life.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Boundaries series (Henry Cloud & John Townsend) — the genre's anchor on saying no
  without guilt, but Two Chairs is warmer, more relational, and built for the specific
  exhaustion of working parents
- The Book of Boundaries (Melissa Urban) — sharp, script-forward boundary work; Two
  Chairs trades the scripts for a kinder, table-side voice that never sounds rehearsed
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — therapeutic and validating on
  limits in relationships; Two Chairs shares the heart but speaks parent-to-parent
  at the end of a long day
