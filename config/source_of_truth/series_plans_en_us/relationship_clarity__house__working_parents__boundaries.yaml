reader_avatar:
  age: 34-48
  where_they_are: It's 9:40 on a Tuesday night. The kids are finally down, the dishwasher
    is humming, and your phone lights up with one more 'quick favor' — from your boss,
    your mother, the class parent group. Your thumb hovers over the screen. You can
    already feel the 'sure, no problem' forming, the same one that will cost you the
    only forty minutes you had to yourself.
  what_they_need: Permission to want a limit, language for saying no that still sounds
    like love, and the relief of learning that a boundary is something you offer across
    the table, not a wall you build to keep people out.
  what_they_avoid: Communication 'hacks' and scripts that sound like a robot reading
    off a card, advice that frames their family as a project to manage, conflict-avoidance
    sold as 'keeping the peace,' and any voice that shames them for being tired.
series_voice_markers:
  register: warm, honest, relational; the steadiness of two chairs pulled close, facing
    each other; gentle and direct about the hard conversations, never clinical, never
    preachy, never hustle
  sentence_rhythm: conversational and unhurried; short declaratives that land like
    a held gaze, then a longer breath of recognition; the cadence of someone sitting
    with you, not lecturing at you
  metaphor_family: two chairs facing each other, the conversation you keep avoiding,
    the space between two people at a table, the word left unsaid, a door you can
    leave open or gently close, a kind truth spoken plainly
_needs_authoring: false
