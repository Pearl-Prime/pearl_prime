reader_promise_family: >
  You got in. You're doing the work. And some part of you is still bracing for the
  email that says it was all a mistake. This series doesn't argue you out of that
  feeling — it teaches you to recognize what your fast, easily-flooded brain is
  actually doing when the fraud-alarm goes off. Seven books, seven different ways
  the same feeling shows up between lectures, deadlines, group chats, and 2am.
  Each one meets it from a new angle, in language you can actually use the next
  time the floor drops out.
bestseller_hook_family: recognition_descent
emotional_engine: imposter_syndrome_recognition
comp_series:
- "The Comparison Cure (Lucy Sheridan) — naming the comparing mind without shame"
- "How to Keep House While Drowning (KC Davis) — gentle, function-first, anti-shame"
- "Permission to Feel (Marc Brackett) — naming the feeling as the first real skill"
