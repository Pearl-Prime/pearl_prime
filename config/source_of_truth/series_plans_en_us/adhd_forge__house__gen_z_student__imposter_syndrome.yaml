  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: "18–26"
  where_they_are: >
    It's 1:40am, three tabs of unstarted reading open, the seminar where they said
    nothing replaying on loop, and a group chat full of people who somehow seem to
    have it together — and the quiet certainty that everyone will eventually figure
    out they don't belong here.
  what_they_need: >
    Someone close to their own age who gets the ADHD-shaped version of this — the
    flooding, the freeze, the scramble — and names it straight, without turning it
    into a diagnosis, a hack, or a lecture about discipline.
  what_they_avoid: >
    Clinical checklists and "just plan your time better" advice. Anything that
    treats the way their brain works as a character flaw, or repackages belonging
    as one more thing to optimize.
series_voice_markers:
  register: "close, real-talk, peer-level; the voice of a slightly-older friend who's been exactly here, never a counselor or a coach"
  sentence_rhythm: "short and quick, the rhythm of a racing brain catching itself; occasional long line that slows down and lands soft"
  metaphor_family: "campus, screens and group chats, the body's static and flood, weather and tide — never machinery, military, or hustle-grind"
  second_person_default: true
_needs_authoring: false
