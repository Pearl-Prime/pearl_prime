reader_promise_family: A grounded, warrior's-calm reckoning with burnout for the Gen
  Z professional who has nothing left to give and refuses to be told to grind harder.
  Not a recovery plan, not optimization, not toxic positivity. Each book meets one
  face of the exhaustion exactly where it lives and lets you stop bracing.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — the
  definitive name-the-exhaustion comp for a depleted professional, treating burnout
  as a real physiological state rather than a willpower failure.'
- 'Can''t Even: How Millennials Became the Burnout Generation (Anne Helen Petersen)
  — speaks directly to the always-on, never-enough working life this reader recognizes,
  without prescribing more grind.'
- Wherever You Go, There You Are (Jon Kabat-Zinn) — the same plainspoken, non-clinical,
  presence-over-fixing register the series lives in, for a reader allergic to motivational
  noise.
