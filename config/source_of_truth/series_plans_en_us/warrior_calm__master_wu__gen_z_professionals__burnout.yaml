reader_avatar:
  age: 23-30
  where_they_are: It's 9:40 on a Tuesday night and the laptop is still open on the
    kitchen counter. The Slack dot is green because you never turned it off. You ate
    standing up, again. You keep telling yourself you'll feel human once this quarter
    ends, once this project ships, once you get the title — and some quiet part of
    you already knows that finish line moves every single time you reach it.
  what_they_need: To hear, from a steady voice that isn't selling anything, that the
    exhaustion is real and not a character flaw — and to be allowed to put something
    down without earning the right to first.
  what_they_avoid: Hustle-culture grind, 'rise and shine' motivation, productivity
    hacks dressed as healing, toughness-as-armor, and anyone who tells a depleted
    person that the answer is more discipline.
series_voice_markers:
  register: Grounded, disciplined, quietly strong — a warrior's calm that meets exhaustion
    without flinching. Spare and steady, strength without bravado; never clinical,
    never preachy, never hustle. The voice of someone who has stood their own ground
    and has nothing left to prove.
  sentence_rhythm: Short, weighted sentences that land like deliberate steps. Plain
    words. Pauses where a breath belongs. It never rushes you, because the rush is
    the thing it's trying to take off your back.
  metaphor_family: The still center in the storm; the gate that holds; standing your
    ground; the breath before action; what is forged and what holds; the warrior who
    has finally put the weapon down. Never machinery, never productivity, never biohacking.
_needs_authoring: false
