reader_promise_family: A grounded, unflinching companion for the founder running on
  empty — no relighting of the fire, no productivity rescue, just trained calm under
  pressure and permission to set the weight down before it sets you down.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — the definitive interior account of what depletion does to the body, met with steadiness
  rather than a productivity fix.'
- The Way of the Superior Man (David Deida) — a grounded, unhurried address to driven
  people that speaks to inner stillness rather than louder striving.
- Wherever You Go, There You Are (Jon Kabat-Zinn) — spare, plainspoken presence that
  meets the reader where they stand instead of where they think they should be.
