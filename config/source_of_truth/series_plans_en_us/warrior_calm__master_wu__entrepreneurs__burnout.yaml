reader_avatar:
  age: 32-48
  where_they_are: It's 11pm and the office is dark except for the laptop. The team
    went home hours ago. You're still answering the message that could have waited,
    because stopping feels more dangerous than the exhaustion. Your chest is tight,
    your jaw is set, and some part of you has been braced for so long you've forgotten
    what it felt like to stand at ease.
  what_they_need: To be met as someone strong who is simply spent — not coached, not
    optimized, not told to push through. To recognize the cost of the armor before
    it costs them the thing they built it to protect. To learn that putting the weight
    down is not surrender, and that calm under pressure is a trained skill, not a
    personality they failed to be born with.
  what_they_avoid: Hustle-culture grind, 'rise and grind' war cries, recovery framed
    as a productivity hack, biohacking and optimization stacks, toughness-as-armor,
    motivational shouting, and any voice that mistakes noise or aggression for real
    strength.
series_voice_markers:
  register: Grounded, disciplined, quietly strong — a warrior's calm that meets exhaustion
    without flinching. Steady and spare. Strength without bravado, never clinical,
    never preachy, never hustle. The voice of someone who has stood their own ground
    and is not here to make you fight harder.
  sentence_rhythm: Short, weight-bearing sentences that land like footsteps on solid
    ground. Longer steady lines that hold and release, then a spare line that stands
    alone. Stillness between thoughts. Nothing rushed, nothing shouted — the pacing
    of a held breath before action.
  metaphor_family: The still center in the storm, the gate that holds, standing your
    ground, the breath before action, trained calm under pressure, what is forged
    and what holds, the weight set down, the warrior with nothing left to prove. Never
    machinery, productivity, or biohacking.
_needs_authoring: false
