reader_promise_family: 'For the student whose mind never stops working: copy that
  meets the overthinker where the noise actually lives — late at night, mid-spiral,
  three drafts into a two-line text — and treats the racing mind not as a flaw to
  fix but as an ember to tend back toward warmth. Each book is a different doorway
  into the same room, naming one feeling underneath the overthinking and offering
  recognition instead of a productivity hack.'
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- Faith G. Harris-Green, the 'Unfuck Your Brain' / 'Unfuck Your Anxiety' books — plainspoken,
  anti-shame mental-health writing for a younger reader who distrusts polish
- Ellen Hendriksen, 'How to Be Yourself' and 'How to Be Enough' — practitioner warmth
  that names social-anxious overthinking without pathologizing the person
- Vex King, 'Good Vibes, Good Life' and 'Healing Is the New High' — Gen Z self-worth
  comps, but where those sell uplift, this series sells recognition and permission
  instead of a high
