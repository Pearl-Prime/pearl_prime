    max_books_per_brand_per_month: 2
reader_avatar:
  age: 18 to 24, undergraduate or just-graduated
  where_they_are: It is 1:47 a.m. and the laptop is still open. You finished the reading
    hours ago but your brain is replaying a five-second moment from a seminar this
    morning, looping it, scoring it, deciding what it means about you. The group chat
    went quiet after your last message and you have read it back four times. Tomorrow's
    to-do list has thirty things on it and you cannot start any of them because you
    are still up here, in your head, running the simulation again.
  what_they_need: To feel less alone in the loop, and to be told — without a lecture
    or a worksheet — that a mind this active is not broken; that the thinking can
    be set down without being conquered; that they are allowed to stop bracing.
  what_they_avoid: Hustle-culture motivation, grindset advice, 'just manifest calm,'
    five-step optimization frameworks, toxic positivity, clinical jargon, and anything
    that treats their overthinking as a personal failing to be productivity-hacked
    away.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone a year ahead
    of you who stayed up late too and lived; tends the reader rather than coaching
    them; never clinical, never hustle, never performative cheer
  sentence_rhythm: second person throughout; mostly short, breathing sentences with
    the occasional long one that unspools the way a 2 a.m. thought does; gentle repetition
    for warmth; lands hard on a plain line
  metaphor_family: ember and ash, banked fire and slow rekindling, dawn and first
    light, warmth returning to cold hands, the turning of the year, what survives
    the burn and grows back green — never machinery, military, productivity, or biohacking
_needs_authoring: false
