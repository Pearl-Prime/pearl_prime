  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 32-48
  where_they_are: It's almost midnight; the team has gone home, the dashboard is up
    on one screen and a competitor's funding announcement on the other, and they're
    sitting in the glow telling themselves that none of what they built actually counts
    — that they're getting away with something and everyone else got a manual they
    never received.
  what_they_need: To set down the armor of competence and discover that the awareness
    underneath the achievement was never the defect, never behind, and never on the
    leaderboard — a worth no win can grant and no comparison can take.
  what_they_avoid: Spiritual bypassing, guru-speak and 'raise your vibration' cliches,
    toxic positivity, hustle-culture mindset hacks, and anything that turns self-worth
    into one more milestone to chase or competitor to out-perform.
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate not lofty, reverent without
    dogma; the voice of someone who has sat in the same midnight glow, never a clinician
    and never a coach selling a system
  sentence_rhythm: long unhurried sentences that open a space, then a short plain
    line that lands the truth; gentle direct address, repetition used like breath,
    never clipped or punchy in the productivity sense
  metaphor_family: waking from a dream, the open sky behind the weather, the story
    printed across awareness, the armor set down, the leaderboard that was never real,
    coming home to what was never lost — never machinery, military, or biohacking
_needs_authoring: false
