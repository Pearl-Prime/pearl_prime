reader_promise_family: 'For the founder who built something real and still feels like
  a fraud inside it — a series that stops trying to make you enough and instead points
  past the verdict to the one who was never on trial. No fix, no optimization, no
  finally-beating-them: just the quiet recognition that your worth was never something
  to earn, win, or rank.'
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — the same pointing past the anxious,
  self-monitoring self to the awareness watching it, in plainspoken non-dogmatic prose
- The Power of Now / A New Earth (Eckhart Tolle) — loosening identification with the
  ego-story rather than improving it, which is exactly this series' move on self-worth
- Radical Acceptance / books by Tara Brach — meeting shame and unworthiness with presence
  instead of fixing them, intimate and reverent without spiritual bypassing
