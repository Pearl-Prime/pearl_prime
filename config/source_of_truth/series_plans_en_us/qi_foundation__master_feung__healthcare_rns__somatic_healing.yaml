reader_promise_family: For nurses whose bodies have quietly carried every shift home
  — a way back down into the ground of yourself, where the energy you've spent all
  day on everyone else finally turns toward the root and refills you from below. No
  optimizing, no powering through. Just the body remembering it is allowed to come
  back to rest.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational case that trauma
  and depletion live in the body and must be met there, not just thought through
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  names the unfinished stress response stuck in the nervous system of helping-profession
  women, our exact reader'
- When the Body Says No (Gabor Maté) — for caregivers whose chronic self-suppression
  eventually surfaces as physical cost, written with the same warmth toward the depleted
  helper
