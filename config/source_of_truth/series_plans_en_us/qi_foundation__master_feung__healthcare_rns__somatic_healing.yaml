reader_avatar:
  age: 29-52
  where_they_are: It's well past the end of your shift and you're sitting in the car
    in the hospital parking garage with the engine off, unable to make your hands
    turn the key, your shoulders still up around your ears, the alarm tones still
    ringing somewhere behind your eyes — home is fifteen minutes away and your body
    has not yet understood that it is allowed to stop.
  what_they_need: To feel the ground come back up under them — to let the held charge
    drain out of the shoulders and jaw and the floor of the belly, to breathe all
    the way down to the bottom of the lungs again, and to trust that the vitality
    they pour out at the bedside can flow back into their own roots without being
    earned.
  what_they_avoid: Self-care that sounds like another shift — wellness checklists,
    optimize-your-recovery hacks, gratitude that papers over exhaustion, energy-drink
    hustle, and anyone who tells a depleted nurse to simply do more, breathe better,
    or bounce back faster.
series_voice_markers:
  register: grounded, restorative, quietly vital; the steady voice of someone who
    has sat in the same parking garage, who speaks to the body and not at it, never
    clinical, never preachy, never hustle
  sentence_rhythm: unhurried and settling; long exhaled sentences that sink toward
    the floor, broken by short ones that land like a hand on the sternum; the cadence
    of breath reaching the lowest part of the lungs
  metaphor_family: roots and meridians, deep ground and rising sap, the well that
    refills from below, a blockage clearing so the current flows again, breath reaching
    the floor of the lungs, vitality returning from the root rather than drained from
    it
_needs_authoring: false
