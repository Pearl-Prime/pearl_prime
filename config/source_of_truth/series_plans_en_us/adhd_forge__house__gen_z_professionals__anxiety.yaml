reader_promise_family: >
  Your brain came with the alarm turned all the way up. This series will not
  teach you to turn it down — it will teach you to recognize what it's actually
  doing, in the exact moments it goes off: the locked-up afternoon, the racing
  chest, the certainty you've ruined something. Seven books, seven different ways
  the same wired mind sounds the alarm. Each one hands you language you can reach
  for the next time it fires, so you stop fighting your own wiring and start
  reading it.
bestseller_hook_family: recognition_descent
emotional_engine: anxiety_recognition
comp_series:
- "Unmasking Autism (Devon Price) — recognition over fixing, for the neurodivergent reader"
- "How to Keep House While Drowning (KC Davis) — gentle, shame-free, no productivity gospel"
- "Unfuck Your Brain (Faith G. Harper) — plain-talk on the anxious nervous system"
platform_strategy:
  primary:
