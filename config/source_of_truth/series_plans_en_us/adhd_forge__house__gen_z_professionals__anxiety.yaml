  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: "23–32"
  where_they_are: >
    Eleven tabs open, Slack going off, a half-finished task they've started six
    times — and under all of it a chest that won't unclench and a quiet, constant
    sense that everyone else got a manual they never received.
  what_they_need: >
    Someone who talks to them like a friend who gets it — who treats the loud,
    overreactive alarm in their head as wiring to understand, not a defect to
    correct, and never once reaches for a worksheet or a diagnosis.
  what_they_avoid: >
    Clinical language and self-diagnosis spirals. 'Just build a routine' advice.
    Productivity systems, morning-routine gospel, and anything that makes managing
    their own brain into one more thing they're failing at.
series_voice_markers:
  register: "warm, plainspoken, real-talk; a slightly-older friend who has the same wiring and zero judgment — never a clinician, never a coach"
  sentence_rhythm: "short, direct, conversational; fragments where they land; the occasional long line that names the feeling exactly, then a beat"
  metaphor_family: "the body and the false alarm, the lit phone, the open tab, the half-done thing, signal versus noise — never medical, never machinery-as-self, never night/sleep framing"
  second_person_default: true
_needs_authoring: false
