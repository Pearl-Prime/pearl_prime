  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 13-18, middle and high school students
  where_they_are: Standing just outside the cafeteria doorway with a tray going cold,
    scanning for one safe table, rereading a group-chat message you haven't sent because
    you already know how everyone will read it.
  what_they_need: To hear that the racing heart and the replayed conversations are
    not proof that something is wrong with them, and to be shown a quieter, steadier
    way to be around other people without performing a braver self.
  what_they_avoid: Fake-it-til-you-make-it pep talks, 'just put yourself out there'
    advice, alpha-confidence influencers, and any adult who makes social fear sound
    like a character flaw they could fix by trying harder.
series_voice_markers:
  register: encouraging, clear, steady; warm and direct, the voice of someone a few
    steps ahead who has stood in the same doorway and isn't going to rush you through
    it
  sentence_rhythm: short declarative lines that land, then one longer line that opens
    a little space; plainspoken, never lecturing, never breathless
  metaphor_family: thresholds and doorways, the held breath before you walk in, crossing
    from one room to the next, who you become on the other side of a line you thought
    you couldn't step over
_needs_authoring: false
