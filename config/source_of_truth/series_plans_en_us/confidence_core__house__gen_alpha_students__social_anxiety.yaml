reader_promise_family: You are not broken for finding people hard. There is a calmer
  version of you on the other side of this fear, and you get to walk toward them one
  steady step at a time.
bestseller_hook_family: ''
emotional_engine: social_anxiety_recognition
comp_series:
- The Anxiety Survival Guide for Teens (Jennifer Shannon) — teen-facing CBT framing
  of fear-as-false-alarm in a warm, non-clinical voice
- Untangle Your Anxiety (Joshua Fletcher & Dean Stott) — names the anxious cycle plainly
  and offers steadiness rather than a cure
- Stuff That Sucks (Ben Sedley) — meets young readers in real feeling without talking
  down or promising to fix them
