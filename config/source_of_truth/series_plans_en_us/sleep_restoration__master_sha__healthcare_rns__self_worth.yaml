reader_promise_family: For the nurse who gives everyone else the care she cannot give
  herself — a quiet, unhurried place to set the weight of the shift down in the dark,
  and to learn that her worth was never something she had to earn at the bedside.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the cost of caregiving on the body and gives women permission to complete the stress
  cycle rather than power through it.'
- The Gifts of Imperfection (Brene Brown) — the worthiness-not-earned throughline,
  written for the high-achiever who hides her not-enough underneath competence.
- Why Has Nobody Told Me This Before? (Julie Smith) — warm, plainspoken, evidence-aware
  comfort for an overloaded mind that needs steadying, not fixing.
