reader_avatar:
  age: 30s to 50s
  where_they_are: It is 2am. The shift ended hours ago, but you are lying in the dark
    replaying the patient in bed 7, the look the charge nurse gave you, the thing
    you should have caught sooner. Your body is still on the floor. The house is asleep
    and you are wide awake, certain that everyone else somehow goes home and lets
    it go.
  what_they_need: Permission to be a person and not a function. To feel that her worth
    does not rise and fall with the last shift, the last chart, the last patient outcome.
    A way to let the body come down off high alert and finally rest without earning
    it first.
  what_they_avoid: Self-care checklists, 'put your own oxygen mask on first' cliches,
    resilience training that asks her to absorb more, toxic positivity, anything that
    treats her exhaustion as a mindset problem or her feelings as a weakness she should
    push through.
series_voice_markers:
  register: Steady, nocturnal, quietly architectural — the voice of someone who has
    sat the night shift beside you and knows the silence after a hard one; holds without
    fixing, never clinical, never a coach, never asking you to be stronger.
  sentence_rhythm: Calm and unhurried, built to be read in the heavy hours. Short,
    settling sentences that let a held breath out. Occasionally a longer line that
    bears weight, the way a beam bears a ceiling, before the next short sentence sets
    it down.
  metaphor_family: Night and the dark room, foundations and what bears weight, the
    armor set down at the end of a shift, a load finally lowered to the floor, the
    body settling toward rest, the structure that holds you while you let go, the
    quiet hours before dawn.
_needs_authoring: false
