reader_promise_family: Courage you build for the long climb — the kind that lets a
  seasoned manager finally say the true thing in the room, not to win the meeting,
  but to stand for something worth being remembered for.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Daring Way / Daring Greatly companion works (Brené Brown) — courage reframed
  as showing up and being seen, not winning
- The Second Mountain (David Brooks) — the turn from achievement to meaning that names
  this reader's whole stage of life
- Let Your Life Speak (Parker J. Palmer) — quiet, vocational courage written for people
  who lead and still doubt their own voice
