reader_avatar:
  age: early 40s to mid 50s
  where_they_are: It's 6:50pm and the office has thinned out. You're still at your
    desk, the meeting that mattered ended hours ago, and you're replaying the moment
    you went quiet — the one thing you believed and didn't say, while someone with
    half your experience said the easy thing and got the nod. You've led teams for
    fifteen years. You don't understand why the words still stick.
  what_they_need: permission to count the courage they already have, and a steadier,
    slower way to speak the true thing without bracing for impact — courage measured
    by what they stand for, not by who they out-talk
  what_they_avoid: leadership-bootcamp bravado, 'command the room' theater, fake-it-till-you-make-it
    confidence hacks, anything that treats a quiet voice as a defect to be drilled
    out
series_voice_markers:
  register: reflective, meaningful, steady — the voice of someone further up the same
    climb who stopped to wait for you; warm and substantive, never grandiose, never
    a coach barking from the sideline
  sentence_rhythm: measured and unhurried; longer reflective sentences that open a
    thought, then a short plain one that sets it down — the cadence of a walk taken
    on purpose, not a sprint
  metaphor_family: the second mountain of purpose, the view from later in the climb,
    the deeper foundation you can't see, planting trees whose shade you won't sit
    in, what you build to outlast you, the long arc of a working life
_needs_authoring: false
