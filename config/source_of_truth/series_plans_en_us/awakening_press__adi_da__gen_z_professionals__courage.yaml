reader_promise_family: Courage isn't a thing you build, manufacture, or grind your
  way into. It's what's already steady underneath the fear — the open sky the weather
  keeps moving across. This series doesn't hand you a louder voice or a thicker skin.
  It walks you back to the ground you forgot you were standing on, and shows you that
  the part of you watching the fear was never afraid.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Power of Now / A New Earth (Eckhart Tolle) — the same loosening of identification
  with the anxious, thinking mind, in plainspoken non-dogmatic prose
- Untamed / Get Untamed (Glennon Doyle) — intimate, second-person courage that refuses
  performance and hustle, written for a younger reader finding her own voice
- Radical Acceptance / True Refuge (Tara Brach) — the spacious, compassionate turn
  toward fear instead of fixing it, treating the body's alarm as something to be met,
  not conquered
