reader_avatar:
  age: early-to-mid twenties
  where_they_are: It's 11pm on a Sunday and the laptop is still open. The Slack notification
    badge sits at the corner of the screen like a held breath. You've rewritten the
    same two-sentence message four times — to a manager, a recruiter, a person you
    respect — and your thumb is hovering over send, and your chest has done the thing
    again where it tightens for no reason you can name. The room is quiet. You are
    not in danger. Your body has not gotten the memo.
  what_they_need: to stop confusing the fear in their body with the truth about who
    they are; to find the steady, unbothered awareness underneath the racing — the
    part of them that was never the anxious one — and to act from there instead of
    waiting to feel brave first
  what_they_avoid: anything that sounds like a LinkedIn post, hustle-culture courage,
    'just believe in yourself,' fake confidence drills, gurus, manifestation language,
    and being told their very real fear is just a mindset problem they're failing
    to fix
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate not lofty; the voice of
    someone a few years ahead of you who has stopped performing and will tell you
    the truth without selling you anything; reverent without dogma, never clinical,
    never preachy, never hustle
  sentence_rhythm: short declaratives that land and leave room; a long, unhurried
    sentence that opens space, then a short one that sets it down; pauses used like
    breath; never breathless, never listicle-staccato
  metaphor_family: waking from a dream you didn't know you were in; the open sky behind
    the weather; the light that was already in the room; loosening the grip of a story;
    what you are underneath the noise; coming home to ground that was never lost —
    never machinery, military, productivity, or biohacking
_needs_authoring: false
