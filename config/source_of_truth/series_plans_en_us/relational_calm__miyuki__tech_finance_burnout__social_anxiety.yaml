reader_promise_family: A quiet room for the high-functioning professional whose social
  anxiety hides behind competence — three doorways into the same crowded mind, each
  stripping away the performance instead of polishing it, so you stop managing how
  you come across and start taking up the space you're already in.
bestseller_hook_family: ''
emotional_engine: social_anxiety_recognition
comp_series:
- Unwinding Anxiety (Judson Brewer) — names the loop and works with it instead of
  fighting it; same respect for the high-functioning, overthinking mind.
- 'How to Be Yourself: Quiet Your Inner Critic (Ellen Hendriksen) — the definitive
  social-anxiety companion for capable people who go silent in the room.'
- 'Quiet: The Power of Introverts (Susan Cain) — for readers who are tired of being
  told their stillness is something to fix.'
