reader_avatar:
  age: 28 to 44
  where_they_are: It's 8:54am and the all-hands starts in six minutes. You've muted
    yourself, turned the camera off, and you're rehearsing the one sentence you might
    have to say so it lands clean. Your calendar is green all afternoon and your chest
    is not. You closed a deal yesterday and you still can't picture walking into the
    team lunch.
  what_they_need: To understand that the dread isn't a character flaw or a skill gap
    — it's an alarm, a hidden belief, and a comparison habit doing exactly what they
    were built to do; and to find a way to be in a room without first earning the
    right to be there.
  what_they_avoid: Networking tips, 'executive presence' coaching, communication hacks,
    exposure-therapy boot camps, anything that treats their quiet as a bug to be fixed,
    and any book that confuses confidence with volume.
series_voice_markers:
  register: spare, clear, unadorned; a quiet presence that says only what is needed;
    gentle and direct, never clinical, never coaching, never hustle — the voice of
    someone sitting across an empty table who has nowhere else to be
  sentence_rhythm: short declaratives that land and stop; longer breath-lines that
    open and then settle; deliberate white space between thoughts, the way a near-empty
    room holds sound
  metaphor_family: bare form and empty space — the room with nothing extra in it,
    the stillness between two people, the unsaid that settles, clean light through
    a window, the breath taken in a quiet room, what remains when the clutter falls
    away
_needs_authoring: false
