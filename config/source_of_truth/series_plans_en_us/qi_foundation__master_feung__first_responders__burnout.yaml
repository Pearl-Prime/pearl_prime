reader_avatar:
  age: 29-52
  where_they_are: It's the end of a back-to-back, the bunker gear is still damp, and
    you're sitting in the parking lot of the station unable to make your hands turn
    the key. The radio chatter is finally quiet but your body hasn't gotten the message.
    You've given everything to the call all shift, and there is nothing left over
    for the drive home.
  what_they_need: To understand that burnout isn't weakness or a character flaw —
    it's a root that has run dry from being asked to give without ever being allowed
    to take back in. They need a way to stop bracing, to let the ground hold them,
    and to feel something quiet return from underneath.
  what_they_avoid: Hustle-culture resilience talks, 'just push through,' wellness
    checklists that become one more shift to work, toxic positivity, peer-support
    clichés, and anyone who treats their exhaustion as a performance problem to optimize.
series_voice_markers:
  register: grounded, restorative, quietly vital; warm and unhurried, never clinical,
    never preachy, never hustle — the voice of someone who has sat in the same parking
    lot and knows not to rush you
  sentence_rhythm: long, settling sentences that let the breath drop, broken by short
    plain ones that land like a hand on the shoulder; cadence slows the reader down
    rather than pushing them forward
  metaphor_family: roots and meridians, the well that refills from below, deep ground
    and rising sap, breath reaching the lowest part of the lungs, what flows again
    when a blockage clears, vitality restored from the root — never machinery, military
    cadence, productivity, or biohacking
_needs_authoring: false
