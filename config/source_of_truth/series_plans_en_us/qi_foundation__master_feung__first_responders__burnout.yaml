reader_promise_family: 'For the first responder running on empty: a grounded, unhurried
  way back to the body''s deep energy — not another demand to be stronger, but permission
  to let the well refill from below.'
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  exhaustion as an unfinished physiological cycle, not a willpower failure, the way
  this series treats a dry root'
- When the Body Says No (Gabor Maté) — locates chronic depletion in the body's quiet
  signals rather than the mind's effort, matching this series' somatic, root-level
  lens
- 'Rest: Why You Get More Done When You Work Less (Alex Soojung-Kim Pang) — reframes
  recovery as the source of vitality rather than a reward for output, the same permission
  this series extends to first responders'
