reader_avatar:
  age: late twenties to early forties
  where_they_are: It's 9:40pm and she's still at her laptop, refining a deck that
    was already good two hours ago, because good has never once felt like enough.
    The dishes are done, the team is asleep, and the only sound is the small voice
    that says if she stops now, someone will finally see she's been faking it.
  what_they_need: To recognize that the relentless proving is not ambition — it's
    a defense against a verdict she passed on herself a long time ago, and to learn
    she can set the instrument down without losing who she is.
  what_they_avoid: Pep talks, affirmations she doesn't believe, 'just love yourself'
    advice, anything that mistakes her self-worth wound for a confidence gap, and
    any book that treats slowing down as laziness rather than the hardest thing she'll
    do.
series_voice_markers:
  register: balanced, warm, discerning — a heart-centered voice that weighs worth
    and limits fairly; gentle but clear-eyed, never clinical, never preachy, never
    hustle
  sentence_rhythm: measured and unhurried, with a fulcrum in the middle — a longer
    observing clause that tips into a short, plain landing; pauses where a kinder
    friend would pause, never rushed toward reassurance
  metaphor_family: the feather and the scale, weight and balance, the heart weighed
    against a feather, equilibrium and the steady center, what you give and what you
    keep, the fulcrum that holds
_needs_authoring: false
