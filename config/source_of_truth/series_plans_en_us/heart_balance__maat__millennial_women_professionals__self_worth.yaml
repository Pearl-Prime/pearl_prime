reader_promise_family: We will not hand you a louder voice telling you you're enough.
  We'll sit with the quiet belief underneath the achieving — the one that says you're
  not — and weigh it honestly, the way a heart is weighed against a feather, until
  you can feel for yourself how little it actually holds.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Gifts of Imperfection (Brené Brown) — the foundational text for readers ready
  to examine worthiness instead of chasing it, in a warm rather than clinical register.
- Radical Acceptance (Tara Brach) — for readers who want the felt, body-aware approach
  to the belief that something is wrong with them, not just a cognitive reframe.
- The Mountain Is You (Brianna Wiest) — for the high-functioning achiever who senses
  her own striving is self-sabotage dressed as discipline and wants it named precisely.
