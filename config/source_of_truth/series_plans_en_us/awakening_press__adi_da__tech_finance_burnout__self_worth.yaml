reader_avatar:
  age: 32-48
  where_they_are: It's 11pm and the apartment is paid for and the title is impressive
    and they are sitting in the dark after another day of being competent, scrolling,
    feeling a quiet dread they can't name — as if a verdict is always pending and
    they are always one miss away from being found out.
  what_they_need: To recognize that the relentless proving is a strategy, not a self
    — and to feel, even once, the worth underneath it that doesn't depend on the next
    win.
  what_they_avoid: Spiritual bypassing, guru posturing, 'raise your vibration' cliches,
    toxic positivity, hustle-flavored self-help, and anything that quietly turns awakening
    into one more thing to achieve and optimize.
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate not lofty, reverent without
    dogma; the voice of someone who has set down the armor and is speaking softly
    across the table, never a clinician and never a coach
  sentence_rhythm: measured and unhurried, with restrained intensity; longer reflective
    lines that open into space, then a short plain sentence that lands like a hand
    on the shoulder
  metaphor_family: waking from a dream of who you had to be; the light already present
    behind the performance; the loosening of identification with the role; the open
    sky behind the weather of achievement; armor set down; coming home to what was
    never lost
_needs_authoring: false
