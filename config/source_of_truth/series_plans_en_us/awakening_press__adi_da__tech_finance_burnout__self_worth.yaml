reader_promise_family: You are not the performance. Beneath the armor you built to
  be worth something, there is a worth that was never earned and cannot be lost —
  and you can come home to it without quitting, without fixing yourself, without becoming
  anyone new.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Untethered Soul (Michael A. Singer) — points past the constructed self to the
  awareness underneath, the same loosening of identification this series works from
- Radical Acceptance (Tara Brach) — meets the shame and the trance of unworthiness
  with tenderness instead of fixing, the emotional register these books share
- The Gifts of Imperfection (Brené Brown) — speaks directly to the high-achiever's
  hidden belief that worth must be earned, the exact wound this series addresses
