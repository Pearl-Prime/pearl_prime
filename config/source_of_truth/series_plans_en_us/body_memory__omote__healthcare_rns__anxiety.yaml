reader_avatar:
  age: 28-52, a registered nurse (bedside, ICU, ER, med-surg, or charge), often several
    years in and quietly running on fumes
  where_they_are: Sitting in her car in the hospital parking garage at 7:48pm, badge
    still clipped on, engine off, hands at ten and two on a wheel she hasn't turned.
    The shift ended twenty minutes ago. Her chest is still braced like a monitor is
    about to alarm, and her phone is face-up on the seat in case the unit calls her
    back.
  what_they_need: To understand that the alarm in her body is a trained response,
    not a personal failing — and to feel her own weight settle into something that
    holds, so her nervous system can finally stand down when no one is coding.
  what_they_avoid: Push-through toughness, 'just relax,' self-care framed as another
    shift she's failing, toxic positivity, hustle-culture optimization, and anything
    that uproots a nervous system already shaking from the floor.
series_voice_markers:
  register: grounded, steady, holding — warm and plain, the voice of someone who has
    sat in that same parked car; never clinical, never preachy, never hustle; speaks
    to the nurse as a body, not a problem to be solved
  sentence_rhythm: short declaratives that land like a hand set flat on a table, opening
    into one longer breath of recognition, then settling back down; spacious, unhurried,
    never clipped or urgent
  metaphor_family: held ground and the earth beneath you, weight supported and set
    down, roots and steadiness, the body remembering it is safe, what holds when everything
    shakes — grounded against the hospital's alarms and fluorescent urgency, never
    borrowing the language of machines
_needs_authoring: false
