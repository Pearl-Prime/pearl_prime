reader_promise_family: 'For nurses whose bodies never came home from the shift: a
  steady, grounded voice that helps an over-trained nervous system remember it is
  allowed to be safe — without push-through toughness, performative calm, or one more
  thing to optimize.'
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational text on how the
  body stores what the mind survives, written for the nervous system, not the symptom
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  names the unfinished stress cycle in over-giving women and how the body completes
  it, in plain warm language'
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — steady, non-clinical guidance
  for chronic over-functioners who keep everyone else safe and forget themselves
