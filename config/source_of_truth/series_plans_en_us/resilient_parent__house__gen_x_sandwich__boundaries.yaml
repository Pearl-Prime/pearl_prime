reader_promise_family: 'You will not be taught to say no like a stranger in a workshop.
  You will be met in the narrow minutes you actually get — the pause in the driveway,
  the held breath between your mother''s phone call and your kid''s homework — and
  shown that the line you keep failing to draw was never a personality flaw. It was
  a survival skill that outlived the emergency. Each book opens one doorway into the
  same room: the moment you finally let yourself want something back.'
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the contemporary touchstone for
  boundary work, but written for the over-functioner who is also somebody's child
  and somebody's caregiver at once
- The Let Them Theory (Mel Robbins) — the same hunger to stop managing everyone, met
  with tenderness instead of a tagline, and aimed squarely at the squeezed middle
  generation
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  kindred in honoring depletion as real, but doorway-by-doorway and built for the
  few stolen minutes a sandwiched parent actually has'
