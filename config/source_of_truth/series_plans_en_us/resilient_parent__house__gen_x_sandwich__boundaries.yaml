reader_avatar:
  age: 47-58, Gen X, the sandwich generation — caring for aging parents while still
    raising teens or launching young adults
  where_they_are: Sitting in the parked car in their own driveway at 9:40pm, engine
    off, having just left their mother's apartment and not yet gone inside their own
    house, because the second they open that door someone needs something and this
    is the only thirty seconds all day that belongs to no one but them.
  what_they_need: Permission to have a limit without earning it first; language for
    the line that doesn't come out as an apology or an explosion; the relief of learning
    their over-functioning is a habit, not a duty.
  what_they_avoid: Boundary scripts that sound corporate or cold, 'just say no' advice
    that ignores a dying parent and a struggling kid, self-care commercialism, anything
    that adds one more obligation to a person who is already the obligation everyone
    else relies on.
series_voice_markers:
  register: warm, tender, knowing — the voice of someone who has also sat in that
    driveway; gentle and unhurried, never clinical, never preachy, never selling hustle
    or a perfect-parent fix
  sentence_rhythm: short, breath-paced lines that let a depleted reader rest between
    them; one true observation set down at a time, room left in the white space, never
    a list shouted at someone already overwhelmed
  metaphor_family: the stolen moment and the threshold — the pause in the parked car,
    the quiet after bedtime, the breath caught between two demands, the door you stand
    in deciding where the line goes; never machinery, military, productivity, or biohacking
_needs_authoring: false
