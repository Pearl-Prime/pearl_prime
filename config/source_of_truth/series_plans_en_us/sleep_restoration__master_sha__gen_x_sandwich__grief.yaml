reader_avatar:
  age: 45-58
  where_they_are: It's past midnight. The house is finally quiet — the kids asleep
    down the hall, the dishes done, the parent who needed you either gone now or fading
    in a room across town. You're lying in the dark with your eyes open, too tired
    to sleep and too full to rest, replaying the last conversation, the thing you
    should have said, the load you've been carrying for so long you forgot you set
    it down anywhere else.
  what_they_need: Permission to grieve on their own clock, in the only hours they
    have to themselves; a voice that holds the weight without trying to lift it off
    them; practices that help the body settle toward rest instead of bracing all night.
  what_they_avoid: Push-through toughness, 'stay strong for everyone' platitudes,
    sleep-hacking and optimization, toxic positivity, and anything that treats grief
    or exhaustion as a problem to solve quickly so they can get back to being useful.
series_voice_markers:
  register: Steady, nocturnal, quietly architectural — a calm presence who sits with
    you through the heavy hours, holds without fixing, never clinical, never a coach,
    never hustle.
  sentence_rhythm: Unhurried and load-bearing; short declaratives that land like a
    hand on the shoulder, set against longer sentences that breathe out slowly, mirroring
    a body settling toward rest.
  metaphor_family: Night and the dark room, foundations and what bears weight, a load
    finally set down, the body settling toward rest, the quiet hours before dawn,
    the structure that holds you while you let go.
_needs_authoring: false
