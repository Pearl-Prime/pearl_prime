reader_promise_family: A steady nocturnal companion for the sandwich generation carrying
  grief through the long nights — these books sit with you in the dark, name the loss
  exactly, and let you set it down without rushing it, without fixing it, and without
  asking you to be strong.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- It's OK That You're Not OK (Megan Devine) — refuses to rush or fix grief and meets
  the bereaved exactly where they are, the same promise this series makes at night.
- The Grief Recovery Handbook (John W. James & Russell Friedman) — practical, permission-giving
  companionship through loss for ordinary overwhelmed people rather than clinical
  theory.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — speaks straight to depleted midlife caregivers about a nervous system stuck in
  the on position, which is the watcher''s exact problem.'
