reader_avatar:
  age: 47 to 58
  where_they_are: It is 2:40am and you are lying on your back, eyes open, jaw tight,
    doing the math again — the parent who needs more care than you can give, the teenager
    who stopped talking to you, the work you brought home in your shoulders. The house
    is finally quiet. Your body is not.
  what_they_need: To understand what the tightness and the bracing actually are, why
    a body that has carried everyone else's weight learned to never let go, and how
    to let it begin to settle without being told to relax, breathe, or push through.
  what_they_avoid: Stay-strong platitudes, sleep hacks, morning routines, breath-counting
    apps, anything that treats their exhaustion as a discipline problem or rushes
    them past what they are actually carrying.
series_voice_markers:
  register: steady, nocturnal, quietly architectural — a calm presence who sits with
    you through the heavy hours; holds without fixing, never clinical, never a coach,
    never hustle
  sentence_rhythm: unhurried and plainspoken; short declaratives that land like a
    weight set down, then a longer line that lets the dark settle; second person throughout,
    the voice of someone awake in the next room
  metaphor_family: night and the dark room, foundations and what bears weight, a load
    finally set down, the body settling toward rest, the quiet hours before dawn,
    the structure that holds you while you let go
_needs_authoring: false
