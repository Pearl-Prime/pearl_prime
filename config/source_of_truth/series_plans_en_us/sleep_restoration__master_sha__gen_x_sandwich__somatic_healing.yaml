reader_promise_family: For the generation holding a job, their own kids, and their
  failing parents all at once — books that sit with the body that has been bracing
  for years and never got to set the weight down. Not a fix, not a protocol. A steady
  presence in the dark hours that names what your nervous system is carrying, in language
  you can use the next time it grips you.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the field-defining map of how unprocessed
  experience lives in the body, written for the lay reader carrying it
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  names the unfinished stress held in a depleted nervous system, for people too tired
  to be told to try harder'
- When the Body Says No (Gabor Maté) — the cost of a lifetime of holding it together
  for everyone else, in compassionate non-clinical prose
