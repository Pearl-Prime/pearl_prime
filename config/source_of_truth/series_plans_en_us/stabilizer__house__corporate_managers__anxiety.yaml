reader_avatar:
  age: 35-52
  where_they_are: It's 6:40am and you're already awake before the alarm, running the
    standup in your head before it happens — who's behind, what the VP will ask, the
    one number you can't make land. Your inbox has forty-one unread and you haven't
    opened your eyes. You're the one the team comes to when they're rattled, and you've
    gotten very good at looking like the calm one. Nobody knows your chest has been
    tight since Tuesday.
  what_they_need: To feel steady underneath the responsibility instead of white-knuckling
    it; to understand what their anxiety is actually doing without being told to 'manage'
    it like a project; permission to stop performing calm and actually find some;
    a way to lead a team without the cost being their own nervous system.
  what_they_avoid: Hustle-coded resilience, 'just push through,' productivity hacks
    aimed at their nervous system, performative calm and toxic positivity, anything
    corporate-wellness-flavored that adds one more KPI to a person already over capacity,
    advice that leaves a depleted leader more adrift than before.
series_voice_markers:
  register: steadying, calm, anchoring; warm and plain, the voice of someone who has
    sat in the same swell and isn't going to lie to you about it; never clinical,
    never preachy, never hustle; speaks to a competent adult who is tired, not a patient
    to be fixed
  sentence_rhythm: measured and grounded; longer settling sentences that let the breath
    out, broken by a short flat true one that lands like an anchor catching; never
    breathless, never listicle-staccato; the rhythm of water steadying inside a breakwater
  metaphor_family: the harbor and the anchor line; still water inside the breakwater;
    the boat that stops pitching; ground that holds in a storm; the steady horizon;
    what keeps you from drifting — never machinery, military, productivity, or biohacking
_needs_authoring: false
