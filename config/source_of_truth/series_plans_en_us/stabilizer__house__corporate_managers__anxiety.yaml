reader_promise_family: 'For the manager everyone leans on and no one steadies: a harbor
  for the anxious mind that has to keep deciding, keep delivering, keep holding the
  team together. Not another system to optimize yourself with — a place to stop pitching
  in the swell and feel the ground hold, so you can lead from steadiness instead of
  bracing.'
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- Unwinding Anxiety (Judson Brewer) — names the anxiety loop and how it feeds itself,
  for the high-functioning reader who can't think their way out
- Burnout (Emily & Amelia Nagoski) — speaks to depleted high-responsibility people
  and completing the stress cycle, not powering through it
- The Anxiety Toolkit (Alice Boyes) — practical and warm for the capable over-thinker
  who looks fine on the outside and is bracing on the inside
