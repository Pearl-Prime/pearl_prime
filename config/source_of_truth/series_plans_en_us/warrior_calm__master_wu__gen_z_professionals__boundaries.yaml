reader_promise_family: You will learn to hold a line without becoming hard — to meet
  the pressure to say yes with a calm that doesn't need to explain itself. Not armor,
  not aggression. The quiet, trained steadiness of someone who finally knows where
  they end and the work begins.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the standard-bearer for boundaries
  that protect without punishing, written for people-pleasers who fear conflict.
- The Courage to Be Disliked (Ichiro Kishimi & Fumitake Koga) — separates the task
  of living your life from the burden of others' approval, in a calm Socratic register.
- Boundary Boss (Terri Cole) — practical, warm guidance on the body's flinch before
  a yes and how to hold a line under relational pressure.
