reader_avatar:
  age: early-to-mid twenties; first or second job out of school
  where_they_are: It's 9:14 on a Tuesday night and a message just lit up the phone
    face-down on the table — 'hey, quick thing, you around?' Dinner's going cold.
    Their thumb is already typing 'yep!' before they've even read it. The exclamation
    point goes on automatically, like a reflex, like flinching.
  what_they_need: Permission to let a request sit. A way to feel the no in their body
    and not panic. Proof that a held line is not the same as letting someone down,
    and that calm is a kind of strength they were never taught to respect.
  what_they_avoid: Hustle-culture grind, 'rise and grind,' boss-babe boundary scripts
    barked like commands, anything that frames saying no as 'crushing it' or turns
    a soft skill into a power move. They've had enough of being told to toughen up
    by people who confuse loud with strong.
series_voice_markers:
  register: grounded, disciplined, quietly strong; a warrior's calm that meets fear
    without flinching; steady and spare, strength with nothing to prove; never clinical,
    never preachy, never hustle
  sentence_rhythm: short declaratives that land like footfalls, then one longer breath
    of a sentence that opens the chest; pauses where a held line would go; never breathless,
    never shouting
  metaphor_family: the gate that holds, the still center in the storm, standing your
    ground, the breath before action, the line drawn in steady hand, what is forged
    and what holds, the threshold you decide who crosses
_needs_authoring: false
