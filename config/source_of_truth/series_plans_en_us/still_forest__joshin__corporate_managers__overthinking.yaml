reader_avatar:
  age: 35 to 52
  where_they_are: It's 11:47pm. The laptop is closed but the meeting isn't over —
    you're still in it, re-running the thing you said in the stand-up, drafting the
    email you'll send at 7am, pre-arguing with a stakeholder who is, right now, asleep.
    The house is quiet. Your mind is not. You're tired in a way that sleep doesn't
    seem to reach, because the part of you that's exhausted is the part that won't
    stop working.
  what_they_need: Permission to stop managing the inside of their own head the way
    they manage a team — and a way back to a slower, deeper kind of attention where
    a thought can arrive and pass without being assigned, escalated, and tracked.
    They need to feel that a quiet mind is not an idle one.
  what_they_avoid: Self-optimization dressed up as wellness. Productivity hacks for
    the soul. 'Five quick ways to calm your mind in ninety seconds.' Performative
    mindfulness with a streak counter. Toxic positivity that tells them to just reframe
    it. Anything that hurries a mind that is already moving too fast and calls the
    hurrying a cure.
series_voice_markers:
  register: Still, deep, woodland-quiet — the calm of a forest interior. Unhurried
    and spacious; lets silence do the work. Warm but never soft-headed; speaks to
    a competent adult who is tired, not broken. Never clinical, never preachy, never
    hustle.
  sentence_rhythm: Long, settling sentences that slow the eye, set against short ones
    that land like a stone dropped into still water. Pauses are deliberate. The prose
    breathes the way a path through trees breathes — opening, narrowing, opening again
    — so the reading itself decelerates the reader.
  metaphor_family: 'The still forest and its deep quiet: old trees and patient roots,
    light filtering down through the canopy, the path that slows you, the pool that
    goes clear when it stops being stirred, the forest floor that holds whatever falls.
    Never machinery, never the military, never productivity or biohacking.'
_needs_authoring: false
