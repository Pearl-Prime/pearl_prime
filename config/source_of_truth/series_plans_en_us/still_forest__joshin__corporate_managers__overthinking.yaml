reader_promise_family: For the corporate manager whose mind never powers down — the
  over-responsible thinker who runs every scenario twice, rehearses tomorrow's meeting
  at midnight, and mistakes a tireless head for a strong one. This series doesn't
  teach you to think faster or optimize the noise. It walks you into the quiet of
  an old forest and lets the overthinking settle the way silt settles in a pool that
  finally stops being stirred — not solved, just stilled.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- The Power of Now collection (Eckhart Tolle) — for readers who want presence over
  technique, and a voice that quiets the analytical mind rather than feeding it more
  to do.
- Stop Overthinking series (Nick Trenton) — the same over-thinker reader, but where
  Trenton hands you tactics, this hands you a slower atmosphere and the permission
  to stop performing calm.
- How to Do Nothing (Jenny Odell) — for the high-functioning professional ready to
  question the optimization reflex and reclaim a kind of attention that isn't for
  sale.
