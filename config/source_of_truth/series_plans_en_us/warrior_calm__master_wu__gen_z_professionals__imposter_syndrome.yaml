reader_avatar:
  age: early-to-mid twenties; first real job, first promotion, first time being the
    youngest person in a room full of people who seem certain
  where_they_are: It's 9:14am and the meeting starts in fifteen minutes. You've already
    rehearsed the one thing you might say, then deleted it, then rewritten it. Your
    laptop is open to a doc you keep refreshing. Everyone on the call will sound like
    they've done this a hundred times, and you'll nod like you have too — while a
    small voice runs the whole hour reminding you that today might be the day they
    finally see through you.
  what_they_need: Steady ground under the fear. To recognize the mask they've been
    wearing without being shamed for it, and to feel — even once — that they could
    put it down and still be standing.
  what_they_avoid: Hustle-culture grind, 'fake it till you make it,' confidence as
    performance, motivational shouting, toxic positivity, and anyone who mistakes
    louder for stronger.
series_voice_markers:
  register: grounded, disciplined, quietly strong; a warrior's calm that meets fear
    without flinching; spare and steady; never clinical, never preachy, never hustle
  sentence_rhythm: short declaratives that land like footsteps, opened up by one longer
    breath of a sentence when the moment asks for it; pauses used as ground, not drama
  metaphor_family: the still center in the storm, the gate that holds, standing your
    ground, the breath before action, what is forged versus what merely shines, the
    warrior with nothing left to prove
_needs_authoring: false
