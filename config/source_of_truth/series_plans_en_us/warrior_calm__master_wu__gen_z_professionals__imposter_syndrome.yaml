reader_promise_family: You will learn to stand your ground inside a feeling that keeps
  telling you to run — not by proving you belong, but by no longer needing the proof.
  A trained, grounded calm for the young professional who is sure they've fooled everyone.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Daily Stoic series (Ryan Holiday) — short, disciplined daily practice that meets
  fear with composure rather than hype, for readers who want strength without bravado.
- The Let Them Theory / Mel Robbins library — plainspoken, permission-giving guidance
  for young professionals drowning in comparison and other people's opinions.
- Unfu*k Yourself series (Gary John Bishop) — blunt, grounded self-talk that cuts
  through the inner critic without motivational shouting or toxic positivity.
