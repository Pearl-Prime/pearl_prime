reader_avatar:
  age: 32-45
  where_they_are: Sitting in the parked car in the driveway with the engine ticking,
    the seatbelt still on, having driven the kids home but not yet able to walk inside
    — chest tight, jaw set, bracing for a threat that has no name, stealing ninety
    seconds before the next thing needs them.
  what_they_need: To feel their own body again and trust that the alarm can ease without
    a fight; a steady, unhurried voice that gives them permission to be a person,
    not just the one who holds everything together; small, doable somatic practices
    that fit inside a life with no spare hours.
  what_they_avoid: Push-through advice, 'mind over matter,' cold clinical protocols,
    hustle-coded self-improvement, and anything intense enough to retraumatize — they
    cannot afford to be broken open with no one there to catch them, and they're done
    overriding a body that's only trying to keep them safe.
series_voice_markers:
  register: Embodied, grounded, gently somatic and trauma-informed — a felt-sense
    guide who speaks from and to the body, the voice of someone who has sat in the
    same parked car, never clinical, never pushy, never hustle.
  sentence_rhythm: Unhurried and breath-paced; short grounding sentences that land
    and let you exhale, set against longer ones that follow a sensation from the throat
    to the belly to the floor; cadence that slows the reader down rather than driving
    them forward.
  metaphor_family: The body's felt sense, breath and grounding, tension held and released,
    the nervous system settling like weather passing, the ground beneath the feet,
    warmth returning to a braced place — never machinery, military, productivity,
    or biohacking.
_needs_authoring: false
