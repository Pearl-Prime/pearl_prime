reader_promise_family: A trauma-informed, body-first companion for the parent whose
  nervous system never clocks out — meeting anxiety as something to feel and settle
  through, not a problem to push past or out-discipline.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational trauma-informed,
  body-first frame these books translate into plain, parental, everyday language
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the unfinished stress living in the body and gives somatic ways to complete it,
  for depleted caregivers'
- Real Self-Care (Pooja Lakshmin) — rejects push-through, optimization self-help in
  favor of permission and boundaries, exactly the parent-reader these books serve
