reader_avatar:
  age: 30s to mid-40s
  where_they_are: It's 9:40pm. The dishes are done, the kids are finally down, and
    you're sitting on the edge of the bed with your phone in your hand, rehearsing
    the conversation you've needed to have for weeks — with your manager, your partner,
    your own mother. You type it. You delete it. Your heart is going like you're about
    to step off something. Tomorrow, you tell yourself. When things are calmer. When
    you feel ready.
  what_they_need: To be told, gently and without a single hack, that the pounding
    heart is not a stop sign — that you can act while afraid, that one true small
    step counts more than the brave version you keep waiting to become, and that needing
    courage does not mean you are failing at this.
  what_they_avoid: Pep talks. 'Just be confident' advice. Fearless-leader posturing
    and motivational shouting. Anything that treats their fear as a flaw to fix or
    their tender, overloaded heart as a performance to optimize.
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous — the voice of someone who
    has sat on that same edge of the bed and is speaking to you close, warm and unhurried;
    never clinical, never a coach barking from the sideline
  sentence_rhythm: unhurried and breath-paced; short, steadying sentences set beside
    longer ones that open like a held door; turns on a soft second-person address
    and lands often on a single quiet line
  metaphor_family: the edge and the one small step before you feel ready; a hand held
    out and taken in the dark; light passed from one palm to another; the unguarded
    moment; the warmth of presence in a quiet room; the open hand — never machinery,
    military, drill, or productivity
_needs_authoring: false
