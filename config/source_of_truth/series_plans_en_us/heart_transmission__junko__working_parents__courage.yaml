reader_promise_family: 'For the working parent who keeps waiting to feel ready: a
  hand held out in the dark that tells you the bracing, the racing, and the hiding
  are not proof you lack courage — they are the very edge where courage begins. We
  will not make the fear go away. We will sit close to it with you until you can take
  the one small step you have been postponing, and find you were braver than you knew.'
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Let Them Theory / The High 5 Habit (Mel Robbins) — same reader reaching for
  the courage to act before they feel ready, but warmer and less performance-driven
- The Gifts of Imperfection series (Brené Brown) — shares the courage-and-vulnerability
  core and the permission to be seen as you are, rendered here for the specific overload
  of parenting
- Burnout & related Nagoski work (Emily & Amelia Nagoski) — speaks to the same depleted,
  over-functioning reader, but turned toward courage and the body's alarm rather than
  stress cycles alone
