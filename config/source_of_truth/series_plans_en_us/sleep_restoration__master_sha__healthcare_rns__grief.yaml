reader_promise_family: For the nurse who carries every loss home in her body, a quiet
  companion through the long nights — a place to set down the grief no one at the
  bedside ever gave you room to feel, without being told to be strong, to move on,
  or to leave it at the door.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- It's OK That You're Not OK (Megan Devine) — the same refusal to rush or fix grief,
  meeting the griever where they actually are
- The Grieving Brain (Mary-Frances O'Connor) — grief as something the body and mind
  carry, told with tenderness rather than clinical distance
- When Things Fall Apart (Pema Chödrön) — a steady, unhurried voice that sits with
  you in the dark instead of pulling you out of it
