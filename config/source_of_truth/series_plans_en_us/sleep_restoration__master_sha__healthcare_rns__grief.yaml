reader_avatar:
  age: 29-55
  where_they_are: It's 3am on a night off and you're awake again, staring at the dark
    ceiling. The unit is hours behind you but your body hasn't gotten the message
    — you can still feel the weight of the patient who didn't make it this week, the
    family in the hallway, the empty bed you stripped and remade before the shift
    was even over. You held it together for everyone. Now the house is quiet and there's
    no one to hand it off to.
  what_they_need: Permission to grieve the losses the job never let them stop for;
    a steady, unhurried presence that lets the body finally set the weight down; language
    for a sorrow that lives underneath the competence, so rest can come without having
    to be fixed first.
  what_they_avoid: Self-care checklists and resilience training, 'you're so strong'
    platitudes, anything that frames grief as a problem to optimize or a weakness
    to push through, toxic positivity, sleep hacks, and anyone who tells a griever
    to hurry up and heal.
series_voice_markers:
  register: steady, nocturnal, quietly architectural — the voice of someone who will
    sit with you through the heavy hours and the long night, who holds the weight
    without trying to fix it; never clinical, never a coach, never 'stay strong'
  sentence_rhythm: unhurried and grounded; short declarative sentences that settle
    like a held breath let go, broken by longer lines that carry the ache; pauses
    where grief needs them, never racing the reader toward relief
  metaphor_family: the dark room and the long night, the empty chair and the stripped
    bed, foundations and what bears weight, a load finally set down, the body settling
    toward rest, the quiet hours before dawn, the structure that holds you while you
    let go
_needs_authoring: false
