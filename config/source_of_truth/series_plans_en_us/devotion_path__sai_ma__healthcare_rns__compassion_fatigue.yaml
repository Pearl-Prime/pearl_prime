reader_promise_family: You do not have to stop caring to stop drowning in it. This
  series sits beside the nurse whose compassion has been poured out faster than anyone
  ever refilled it — and offers not a fix or a hack, but a way to be held while the
  well slowly fills again in the dark.
bestseller_hook_family: ''
emotional_engine: compassion_fatigue_recognition
comp_series:
- The Heart of Caring (collected nurse essays) — When Breath Becomes Air-adjacent
  reflective writing that honors the spiritual weight of bedside work without prescribing
  optimization
- How to Keep House While Drowning (KC Davis) — same permission-first, shame-dissolving
  register for people running on empty
- It's OK That You're Not OK (Megan Devine) — the gold standard for refusing to rush
  grief or demand premature gratitude, which this series extends to caregivers
