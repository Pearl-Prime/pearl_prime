reader_avatar:
  age: 28-52, a registered nurse with anywhere from three to twenty-five years at
    the bedside
  where_they_are: It is the end of a twelve-hour shift that became fourteen. She is
    sitting in her car in the hospital parking garage with the engine off, badge still
    clipped to her scrubs, and she cannot make herself drive home yet — because the
    moment she pulls out, she becomes a person again, and she is not sure there is
    anyone left inside.
  what_they_need: To hear that the numbness is not a character flaw but the cost of
    caring without refill; to be allowed to grieve patients she was never given time
    to grieve; to feel held without being told to be grateful or resilient; permission
    to have needs of her own.
  what_they_avoid: Spiritual bypassing, 'everything happens for a reason,' resilience-training
    that blames her for breaking, gratitude journaling demanded before the grief is
    even named, toxic positivity, religious dogma, and anyone who tells her self-care
    is a bubble bath.
series_voice_markers:
  register: tender, devotional, spacious; reverent without dogma; the voice of someone
    who has knelt at the same bedsides and will sit in the dark with you rather than
    rush you toward the light; never clinical, never preachy, never hustle
  sentence_rhythm: unhurried and breath-paced; short declarative lines that land like
    a hand on the shoulder, opening into longer flowing clauses when naming what was
    lost; pauses honored, white space trusted, never crowded
  metaphor_family: the open vessel and the empty cup; the well that refills only in
    the dark; grief as love with nowhere left to go; hands that finally open; being
    poured out and slowly, mercifully refilled; the sacred ordinary of a quiet room
    after the code
_needs_authoring: false
