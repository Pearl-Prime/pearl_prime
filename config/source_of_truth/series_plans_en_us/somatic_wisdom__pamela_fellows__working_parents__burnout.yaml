reader_avatar:
  age: 33-48
  where_they_are: It is 9:47pm. The dishwasher is running, the lunches are half-made
    on the counter, and you are sitting on the edge of the bathtub in the dark because
    it is the only door in the house that locks. Your shoulders are somewhere up around
    your ears and have been for so long you forgot they could come down. You are not
    crying. You are too tired to cry. Tomorrow starts in nine hours and you cannot
    feel where it begins or where you end.
  what_they_need: To be told, by someone who clearly gets it, that the exhaustion
    living in their body is real and reasonable — and to be shown a way back to themselves
    that does not require more discipline, more waking up at 5am, or pretending they
    are fine.
  what_they_avoid: Hustle-coded self-care, 'just meditate' platitudes, morning-routine
    optimization, anything that adds one more task to the list, and any voice that
    implies they would not be this tired if they were simply doing it right.
series_voice_markers:
  register: Embodied, grounded, gently somatic and trauma-informed — the voice of
    a felt-sense guide who has sat where you are sitting, speaking from the body and
    to the body. Never clinical, never hustle, never one more thing to push through.
  sentence_rhythm: Slow and breath-paced. Short declaratives that land like an exhale,
    then a longer sentence that lets the shoulders drop. Frequent direct address.
    White space treated as part of the meaning — the pause is the point.
  metaphor_family: The body's felt sense; breath and grounding; tension held and released;
    the nervous system settling like weather clearing; the ground beneath you; warmth
    returning to a place that braced too long; thresholds and doorways you get to
    walk through slowly.
_needs_authoring: false
