reader_promise_family: A trauma-informed, body-first companion for depleted working
  parents — meeting burnout not as a productivity failure to fix but as a nervous
  system asking, finally, to be heard. No push-through, no optimization, just the
  slow return of the ground beneath you.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  burnout as an unfinished stress response held in the body, not a character flaw,
  exactly the felt-sense framing this series lives in.'
- The Body Keeps the Score (Bessel van der Kolk) — the foundational trauma-informed,
  body-first lens these books translate into plain, parent-sized language.
- Real Self-Care (Pooja Lakshmin) — dismantles performative, hustle-coded self-care
  for depleted caregivers and replaces it with something honest, the same promise
  this series makes.
