reader_avatar:
  age: early-to-mid twenties, three years into a first real career
  where_they_are: It's 11:47pm on a Tuesday and you're rereading a Slack message you
    already sent, hunting for the tone that might have ruined everything. The laptop
    is closed but your mind has it open. Tomorrow's standup is replaying before it
    has even happened.
  what_they_need: permission to stop interrogating themselves, and a warmer relationship
    with the part of them that won't stop checking — to feel met instead of managed
  what_they_avoid: cold technique, 'just stop thinking' advice, productivity-coded
    mindfulness, performative calm, and anyone who treats a tender mind like a bug
    to patch
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; the voice of someone who has
    sat where you're sitting and stayed in the room with you — warm, unhurried, never
    clinical, never preachy, never hustle
  sentence_rhythm: short lines that land softly, then a longer breath that opens;
    the cadence of someone speaking close in a quiet room, leaving space between thoughts
    the way you'd leave space for someone to cry
  metaphor_family: the heart and what passes between two of them, light passed hand
    to hand, the warmth of presence, the unguarded moment, an open palm, breath shared
    in a still room — never machinery, military, productivity, or biohacking
_needs_authoring: false
