reader_promise_family: You don't have to think your way to safety. There is a quieter
  way to meet a busy mind — not by silencing it, but by sitting close to it until
  it softens. Wisdom passed gently from one heart to another, for the young professional
  whose mind never clocks out.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- Unwinding Anxiety (Judson Brewer) — gently retrains the worry habit without shaming
  the worrier, the same met-not-managed spirit
- The Untethered Soul (Michael A. Singer) — teaches you to sit beside the inner voice
  instead of obeying it, in a warm contemplative register
- How to Do Nothing (Jenny Odell) — speaks to a young, over-optimized generation about
  reclaiming attention from the grind, without hustle
