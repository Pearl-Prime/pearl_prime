reader_avatar:
  age: 29-40
  where_they_are: It's 11pm on a Sunday and she's rereading the offer letter, the
    promotion email, the client's thank-you note — looking for the typo, the mistake,
    the moment they'll realize they picked the wrong person. Her laptop is warm on
    her thighs. By every external measure she is succeeding, and she is bracing, quietly,
    for the day it all gets taken back.
  what_they_need: To have the weight of what she's actually done placed honestly against
    the fear that she's a fraud — and to find that her competence survives the weighing.
    Permission to hold 'I earned this' and 'I'm terrified they'll find out' at the
    same time without one cancelling the other. A voice that respects her intelligence
    instead of cheerleading at it.
  what_they_avoid: Girlboss affirmations and 'fake it till you make it' slogans. Anyone
    who tells her to just own her power or stop doubting herself. LinkedIn-flavored
    confidence content. Toxic positivity that skips past the real cost of always overworking
    to cover a defect she can't prove is there. Being told her feelings are 'just'
    imposter syndrome, as if naming it dissolves it.
series_voice_markers:
  register: balanced, warm, discerning — a heart-centered voice about worth and limits;
    gentle but clear-eyed, weighs things fairly; never clinical, never preachy, never
    hustle
  sentence_rhythm: measured and even, like a scale settling; medium sentences that
    set two things side by side and let them rest, occasionally broken by a short
    line that lands like a counterweight dropping into the pan
  metaphor_family: the feather and the scale, weight and balance, the heart weighed
    against a feather, equilibrium and the steady center, what you give and what you
    keep, the fulcrum that holds — never machinery, military, productivity, or biohacking
_needs_authoring: false
