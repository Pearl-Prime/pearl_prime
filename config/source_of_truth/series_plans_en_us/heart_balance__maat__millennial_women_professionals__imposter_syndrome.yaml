reader_promise_family: An honest weighing of your own worth — the part of you that
  achieved this set on one side of the scale, the fear that you faked it on the other,
  held until they balance. No hype, no fixing, no being talked out of what you feel.
  Just a fair accounting that finally lets the competent, frightened woman you actually
  are stand in the same room as her own credentials.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Let Them Theory (Mel Robbins) — same successful-but-self-doubting woman, but
  Feather & Scale weighs the fear honestly instead of telling her to release it
- Maybe You Should Talk to Someone (Lori Gottlieb) — shares the warm, intelligent,
  non-clinical interior voice without the therapy-memoir frame
- The Gifts of Imperfection (Brené Brown) — adjacent on shame and worthiness, but
  pitched specifically to the high-achieving professional bracing to be found out
