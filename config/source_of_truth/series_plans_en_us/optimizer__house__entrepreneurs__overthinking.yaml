  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 30s to mid-40s
  where_they_are: It's 5:40am. The house is still dark and the coffee hasn't finished,
    and you're already three moves deep into a conversation that hasn't happened —
    re-running yesterday's call, drafting the reply you'll never send, deciding what
    a two-word Slack message really meant. The day hasn't started and you've already
    spent it.
  what_they_need: To recognize that the relentless analysis is the alarm misfiring,
    not the work — and to find one honest minute of stillness at the start of the
    day that they don't have to earn, optimize, or turn into a system.
  what_they_avoid: Biohacking and the 5am-grind gospel, morning-routine-porn, productivity-as-virtue,
    hustle dressed up as wellness, and any 'mindset' fix that turns a fresh start
    into one more thing to perform.
series_voice_markers:
  register: fresh, hopeful, grounded; warm and clear like the hour before the world
    wakes; honest that a fresh start isn't about doing more; never clinical, never
    preachy, never hustle
  sentence_rhythm: second person throughout; short declaratives that land, then a
    longer breath; the cadence of someone speaking quietly across the kitchen table
    at dawn, not lecturing
  metaphor_family: daybreak and first light, the hour before the inbox wakes, the
    clean slate of morning, the horizon going pale, the day not yet spent, the breath
    taken at dawn, beginning again without forcing
_needs_authoring: false
