reader_promise_family: A series for founders whose minds won't power down — meeting
  the overthinking not as a flaw to fix but as a misfired instrument, and offering
  the quiet of a morning before the inbox wakes instead of one more optimization.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- 'The Let Them Theory adjacent shelf — Mel Robbins (founders who can''t stop managing
  what isn''t theirs to manage) — why: same audience of high-functioning over-controllers,
  but Daybreak trades the pep talk for the quiet of morning.'
- 'Stillness Is the Key — Ryan Holiday — why: the same hunger for an unhurried mind
  in a striving life, reached through felt moments instead of philosophy lectures.'
- 'Four Thousand Weeks — Oliver Burkeman — why: kindred refusal of optimization-as-salvation
  for ambitious readers, but Daybreak meets them in the body''s alarm, not the calendar.'
