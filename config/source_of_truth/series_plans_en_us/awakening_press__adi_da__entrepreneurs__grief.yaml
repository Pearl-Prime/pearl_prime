reader_avatar:
  age: 32-52
  where_they_are: It's late, the office is empty, and you're sitting in front of the
    spreadsheet that no longer needs you — the company wound down, the partnership
    dissolved, the role you poured a decade into is gone. Everyone says you'll build
    the next one. You nod. You don't tell them that some mornings you reach for a
    phone that no longer rings, and you can't tell if you're grieving a business or
    a self.
  what_they_need: Permission to mourn what they lost without rushing to monetize the
    lesson; a way to feel the absence instead of out-running it; the recognition that
    they are not the venture, and that something in them remains whole underneath
    the wreckage.
  what_they_avoid: Hustle-culture 'fail forward' platitudes, LinkedIn-style redemption
    arcs, spiritual bypassing that skips the pain to reach the 'gift', toxic positivity,
    and any advice that treats grief as a problem to optimize away.
series_voice_markers:
  register: spacious, awakening, quietly radical; reverent without dogma, intimate
    not lofty; the voice of someone who has sat with their own empty chair and is
    not afraid of yours
  sentence_rhythm: unhurried, with room to breathe; short declaratives that land and
    then rest; questions left open rather than answered; pauses where a striver expects
    a solution
  metaphor_family: the empty chair, the absence that has a shape, waking from a dream
    of who you thought you were, the open sky behind the weather of loss, the light
    that was never extinguished, coming home to what was never built and so cannot
    be lost
_needs_authoring: false
