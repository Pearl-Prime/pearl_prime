reader_promise_family: For the founder who lost something that mattered and was told
  to pivot — a quiet place to let the loss be real, and to discover what in you was
  never built and so can never be taken.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- The Wild Edge of Sorrow (Francis Weller) — treats grief as sacred apprenticeship
  rather than a problem to fix, the same reverent-without-dogma register
- When Things Fall Apart (Pema Chodron) — meets collapse without spiritual bypassing,
  finding spaciousness inside the wreckage
- It's OK That You're Not OK (Megan Devine) — refuses the 'redemption arc' and gives
  permission to mourn, the anti-toxic-positivity stance this series shares
