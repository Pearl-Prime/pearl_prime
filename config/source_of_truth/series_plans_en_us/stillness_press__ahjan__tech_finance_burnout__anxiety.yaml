reader_avatar:
  age: 28–44
  where_they_are: |
    Slack still open after hours. Two monitors. Second cold coffee. Body is somewhere in San Francisco or New York.
  what_they_need: |
    Voice that acknowledges the compensation is good AND the body is paying a price.
  what_they_avoid: |
    Quit-your-job narrative. Meditation-app sales pitch. Golden handcuffs critique.
