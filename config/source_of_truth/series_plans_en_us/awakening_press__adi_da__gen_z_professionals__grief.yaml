reader_promise_family: You don't have to fix the grief or get over it on a schedule.
  These books sit beside you in the loss and help you recognize what was never actually
  lost — the awareness underneath the ache, the part of you that was whole before
  the story of who you should be by now.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- It's OK That You're Not OK (Megan Devine) — names grief as something to be tended,
  not cured, and refuses the timeline everyone else imposes
- When Things Fall Apart (Pema Chödrön) — meets the worst moments with spacious, non-fixing
  presence rooted in awakening rather than positivity
- The Untethered Soul (Michael A. Singer) — points past the anxious, narrating self
  to the quiet awareness underneath it, in plainspoken non-guru language
