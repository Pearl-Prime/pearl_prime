reader_avatar:
  age: early-to-mid twenties
  where_they_are: It's a Tuesday and you're back at your desk forty-eight hours after
    the funeral, answering Slack messages with a face that looks fine, while something
    enormous sits in your chest that nobody at work has the language to ask about.
  what_they_need: Permission to stop performing okayness, and a quiet way to be with
    loss that doesn't treat grief as a problem to optimize, a project to finish, or
    a sign that something is wrong with them.
  what_they_avoid: Five-stage frameworks, hustle-grief ('use the pain as fuel'), spiritual
    bypassing, anyone who says 'everything happens for a reason,' and the pressure
    to be healed in time for the next standup.
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate not lofty; the voice of
    someone who has sat in the same dark and isn't in a hurry to turn the lights on
  sentence_rhythm: long settling sentences that open out, then a short one that lands;
    pauses left in on purpose; never clipped, never clinical, never a checklist
  metaphor_family: the open sky behind passing weather, waking from a dream you mistook
    for everything, the light that was in the room the whole time, coming home to
    what was never lost, the loosening of a grip you didn't know you were holding
_needs_authoring: false
