reader_avatar:
  age: late 30s to mid 50s
  where_they_are: It is 1:40am. You closed the team's quarterly forecast hours ago,
    but now you're at the kitchen table with a different spreadsheet open — your own.
    The mortgage, the tuition that's coming, the cushion that used to feel like enough.
    The house is asleep. You manage millions at work and you can't make these four
    figures feel safe. The cursor blinks in a cell and you just sit there, the glow
    of the screen on your face, not typing anything.
  what_they_need: To stop confusing their net worth with their worth; to feel the
    fear without being run by it; to build a life that holds up from the inside, not
    just one that looks solvent from the outside.
  what_they_avoid: Get-rich playbooks, hustle and 'build your empire' bravado, budgeting
    apps that shame the spreadsheet they already stare at, toxic positivity, and anyone
    who measures a person's life in dollars.
series_voice_markers:
  register: reflective, steady, warm and substantive — the voice of someone further
    up the same climb who has stopped to wait for you; never clinical, never preachy,
    never a pep talk
  sentence_rhythm: measured and unhurried, plain declaratives that slow at the turn;
    short lines where the truth lands, longer ones where it's being shown; comfortable
    with a pause
  metaphor_family: the second mountain and the view from later in the climb; the deeper
    foundation under the visible house; planting trees whose shade you won't sit in;
    the ledger that can't tally a life; the long arc — never machinery, military,
    productivity, or biohacking
_needs_authoring: false
