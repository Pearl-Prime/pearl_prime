reader_promise_family: Steadier ground for the manager who holds the numbers all day
  and lies awake holding their own — a way to meet financial stress that doesn't measure
  your life by your balance, and doesn't pretend the fear isn't real.
bestseller_hook_family: ''
emotional_engine: financial_stress_recognition
comp_series:
- The Second Mountain (David Brooks) — the same conviction that a life of meaning
  is built after the first climb stops paying, reframed for the person who manages
  money for a living.
- When Things Fall Apart (Pema Chödrön) — staying present and tender inside fear rather
  than fixing or fleeing it, the same refusal to promise the fear away.
- Your Money or Your Life (Vicki Robin & Joe Dominguez) — separating money from self-worth
  and asking what a dollar actually costs you in life energy, the question this series
  keeps returning to.
