teacher_persona_score: 0.5   # ahjan × entrepreneurs = medium
composite_fit: 0.50   # medium overall

# ── Arc: 3 books across engines ──
arc:
  installment_1:
    book_id: stillness_press__ahjan__entrepreneurs__sleep_anxiety__false_alarm
    engine: false_alarm
    master_arc: config/source_of_truth/master_arcs/entrepreneurs__sleep_anxiety__false_alarm__F006.yaml
    duration: standard_book_60min
  installment_2:
    book_id: stillness_press__ahjan__entrepreneurs__sleep_anxiety__overwhelm
    engine: overwhelm
