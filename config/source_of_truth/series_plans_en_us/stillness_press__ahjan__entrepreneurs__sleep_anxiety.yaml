    duration: standard_book_60min
  installment_3:
    book_id: stillness_press__ahjan__entrepreneurs__sleep_anxiety__spiral
    engine: spiral
    master_arc: config/source_of_truth/master_arcs/entrepreneurs__sleep_anxiety__spiral__F006.yaml
    duration: standard_book_60min

reader_promise_family: >
  You'll learn to understand what your body is doing at 3am without needing to force sleep. 3 books across engines of the
  same underlying capacity — each one enters the work from a different angle.

bestseller_hook_family: recognition_descent
emotional_engine: sleep_anxiety_recognition

comp_series:
  - "Why We Sleep (Matthew Walker) — science foundation"
  - "The Sleep Book (Guy Meadows) — ACT-based surrender framing"
  - "Say Good Night to Insomnia (Gregg Jacobs) — CBT-I adjacent"

platform_strategy:
  primary: [kdp_ebook, audible]
  secondary: [apple_books, google_play, spotify_audiobooks]
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2

reader_avatar:
  age: "28–45"
  where_they_are: >
    3am at their desk. Customer dashboard open in one tab, bank account in another, nowhere to put what they're feeling.
  what_they_need: >
    Someone who knows what it feels like to be personally responsible for an outcome outside your control.
  what_they_avoid: >
    Hustle-culture framing. 'Build your morning routine.' Gratitude lists.

series_voice_markers:
  register: "intimate, persona-specific, no management-speak"
  sentence_rhythm: "longer, unhurried sentences — no punchy copy"
  metaphor_family: "night, water, animals settling — never productivity, mechanical, military"
  second_person_default: true
  taboo:
    - "No rewire-your-brain language"
    - "No morning-routine prescriptions"
    - "No therapy-as-solution closing"
    - "No religious framing"

main_character_name: Naomi
main_character_role: "founder of a 3-person company, 4 years in"
main_character_image_path: null
main_character_lora_id: naomi_sp_us
main_character_trigger_word: naomi_sp_us

