reader_promise_family: Your worth was never the thing that needed fixing. These books
  help you set down the performance and feel the ground that was under you the whole
  time.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- Unfck Yourself series (Gary John Bishop) — blunt, profane, anti-platitude self-talk
  that respects the reader's intelligence
- The Lazy Genius series (Kendra Adachi) — permission-first, anti-optimization, for
  people exhausted by doing it all 'right'
- How to Do the Work / companion guides (Nicole LePera) — somatic, nervous-system-literate
  self-worth work for a younger, online audience
