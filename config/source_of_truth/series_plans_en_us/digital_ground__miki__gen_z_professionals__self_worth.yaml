  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 24-31, the first fully-online generation now three or four years into real
    jobs
  where_they_are: It's 11:40pm on a Tuesday and you're still half-working, laptop
    warm on your knees, replaying the way your voice cracked in the standup, thumb
    already scrolling someone's launch announcement you'll pretend you didn't see.
  what_they_need: to feel that they are allowed to exist at a value that isn't tied
    to output, approval, or the highlight reel of everyone they follow
  what_they_avoid: boomer self-help, hustle-culture pep talks, 'just delete the app'
    advice, toxic positivity, and anyone who treats them as a personal brand to optimize
    instead of a person who is tired
series_voice_markers:
  register: gen-z native, screen-literate, plainspoken and warm; ironic without being
    cynical; a slightly-older friend who actually gets the internet and is not going
    to make you feel stupid for being on it
  sentence_rhythm: short declaratives that land like a held breath, broken by one
    long unspooling sentence that mirrors the spiral, then a return to the room; second
    person throughout
  metaphor_family: the present moment, the body in the room, the phone face-down on
    the cushion, ground under bare feet, the breath between notifications, signal
    cutting through noise — never productivity, machinery, military, or self-optimization
_needs_authoring: false
