reader_promise_family: >
  You'll learn to come back into a body that learned to ignore itself. 7 books across engines of the
  same underlying capacity — each one enters the work from a different angle.

bestseller_hook_family: recognition_descent
emotional_engine: somatic_healing_recognition

comp_series:
  - "The Body Keeps the Score (Bessel van der Kolk) — trauma-body foundational"
  - "Waking the Tiger (Peter Levine) — somatic experiencing"
  - "My Grandmother's Hands (Resmaa Menakem) — racialized somatic voice"

platform_strategy:
  primary: [kdp_ebook, audible]
  secondary: [apple_books, google_play, spotify_audiobooks]
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2

reader_avatar:
  age: "28–45"
  where_they_are: >
    3am at their desk. Customer dashboard open in one tab, bank account in another, nowhere to put what they're feeling.
  what_they_need: >
    Someone who knows what it feels like to be personally responsible for an outcome outside your control.
  what_they_avoid: >
    Hustle-culture framing. 'Build your morning routine.' Gratitude lists.

series_voice_markers:
  register: "intimate, persona-specific, no management-speak"
  sentence_rhythm: "somatic-pacing — sentences match breath"
  metaphor_family: "body sensations, weather-of-the-body, nature — never productivity, mechanical, military"
  second_person_default: true
  taboo:
    - "No rewire-your-brain language"
    - "No morning-routine prescriptions"
    - "No therapy-as-solution closing"
    - "No religious framing"

main_character_name: Jordan
main_character_role: "founder of a 3-person company, 4 years in"
main_character_image_path: null
main_character_lora_id: jordan_sp_us
main_character_trigger_word: jordan_sp_us

