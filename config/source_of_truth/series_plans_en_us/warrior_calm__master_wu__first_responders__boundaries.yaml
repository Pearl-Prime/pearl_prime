reader_promise_family: For first responders who have spent a career running toward
  what everyone else runs from — and have never once been taught how to stop. A grounded
  path to setting boundaries that meets the fear, the shame, and the silent comparison
  head-on, without armor, hustle, or another speech about resilience. You will not
  learn to need less. You will learn that the line you draw is what keeps you standing.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the definitive trauma text first
  responders trust; this series translates its truths into a working life lived on
  shift.
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the boundaries bestseller readers
  reach for first; this series carries that work into the specific world of people
  trained to override their own limits.
- Emotional Survival for Law Enforcement (Kevin Gilmartin) — the classic first-responder
  manual on the hypervigilance cycle; this series picks up where it ends, at the threshold
  of actually saying no.
