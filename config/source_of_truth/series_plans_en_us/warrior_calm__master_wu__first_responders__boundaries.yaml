reader_avatar:
  age: 28 to 52
  where_they_are: It's the end of a double, and your phone lights up with the group
    text asking who can pick up the shift nobody wants. Your thumb is already typing
    'yeah, I got it' before your brain catches up. You haven't slept right in days.
    Your back is against the wall of the apparatus bay and you tell yourself you're
    fine, because that's what you say, because everyone here is fine, because the
    one time you weren't fine someone looked at you a half-second too long.
  what_they_need: Permission to draw a line without it meaning they've gone soft.
    A way to feel the difference between real danger and the false alarm that fires
    every time they try to say no. Proof that the strongest people they know also
    have limits — they just learned to hold them quietly.
  what_they_avoid: Anything that sounds like a wellness seminar, a chaplain's pep
    talk, or a civilian who's never held a code telling them to 'practice self-care.'
    Toxic positivity. Being called fragile. Toughness-as-armor that just adds more
    weight. Motivational shouting. Anyone who mistakes the grind for strength.
series_voice_markers:
  register: grounded, disciplined, quietly strong — the voice of a senior medic who
    has seen it all and has nothing left to prove; steady and spare, plainspoken,
    never clinical, never preachy, never hustle; speaks to you like a partner on a
    long drive home, not a clinician across a desk
  sentence_rhythm: short declaratives that land like a steadied breath, broken by
    the occasional longer line that opens up and then closes again; built on the pause
    before action, the held line, the quiet after the call; never breathless, never
    barking
  metaphor_family: the gate that holds, the still center in the storm, standing your
    ground, the breath before action, the line drawn and kept, what is forged and
    what holds, the door you finally get to close — drawn from the firehouse, the
    rig, the threshold, never from machinery, productivity, or optimization
_needs_authoring: false
