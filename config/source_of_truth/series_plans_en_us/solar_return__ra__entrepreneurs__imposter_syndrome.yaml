reader_promise_family: For the founder who built something real and still feels like
  a fraud — a banked-fire companion that warms the part of you that's gone cold, without
  ever asking you to hustle harder or fake the confidence you don't feel.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Mountain Is You series (Brianna Wiest) — quiet, interior, refuses to bully the
  reader into change and trusts recognition over hustle
- The Untethered Soul companion works (Michael A. Singer) — sits with the inner voice
  instead of trying to defeat it, the same tending-not-fixing posture
- Daring Greatly / shame-resilience canon (Brené Brown) — names hidden shame in high-achievers
  with warmth and zero clinical distance, the emotional register this series fans
  toward
