  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 30s to mid-40s
  where_they_are: It's late, the office is dark except for one monitor, and you've
    just closed a deal — or shipped the thing, or signed the client — and instead
    of relief there's a cold draft in your chest that whispers they're going to find
    out you don't actually know what you're doing.
  what_they_need: To stop white-knuckling competence as if it could be taken back
    at any moment, and to feel the warmth of what they've already built without bracing
    for it to be exposed as luck.
  what_they_avoid: Rah-rah founder motivation, grindset mantras, 'fake it till you
    make it', confidence hacks, and any voice that treats their fear as a weakness
    to be optimized away rather than a cold place to be tended.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone who has sat in
    the same dark office and isn't here to coach you, only to keep the fire from going
    out
  sentence_rhythm: unhurried and tactile; short declarative lines that land like a
    hand on a cold shoulder, alternating with longer breaths that give the felt thing
    room to be true
  metaphor_family: ember and ash, banked fire and slow rekindling, dawn and first
    light, warmth returning to cold hands, what survives the burn and grows back green
    — never machinery, military, productivity, or biohacking
_needs_authoring: false
