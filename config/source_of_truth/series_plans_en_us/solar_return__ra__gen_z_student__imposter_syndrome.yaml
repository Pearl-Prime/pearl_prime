  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 18-24, undergraduate or first-year grad student
  where_they_are: It's 1am in the library basement, your acceptance email still open
    in another tab like proof you have to keep re-reading, and you're rewriting the
    same paragraph for the ninth time because if it isn't perfect someone will finally
    see you don't belong here.
  what_they_need: To hear that the gap between how qualified you feel and how qualified
    you are is the most ordinary thing in the room — and a warm, unhurried voice that
    helps the heat in your chest settle without telling you to just be confident.
  what_they_avoid: Hustle-culture pep talks, 'fake it till you make it', LinkedIn-influencer
    confidence hacks, toxic positivity, and anyone who treats their crushing self-doubt
    as a mindset they should have optimized away by now.
series_voice_markers:
  register: warm, emboldening, quietly fierce; the voice of an older student who has
    sat where you're sitting and is pulling up a chair, not a clinician and not a
    coach
  sentence_rhythm: plainspoken and unhurried; short declaratives that land like a
    hand on the shoulder, then a longer breath that lets the feeling settle before
    moving on
  metaphor_family: ember and ash, banked fire and slow rekindling, dawn and first
    light, warmth returning to cold hands, the turning of the year, what survives
    the burn and grows back green
_needs_authoring: false
