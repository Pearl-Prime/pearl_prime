reader_promise_family: You don't have to earn the right to be here, and you don't
  have to perform your way out of the doubt — these books sit with the Gen Z student
  who is certain they fooled everyone, and tend the ember of who you actually are
  until it catches again.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Imposter Cure (Dr. Jessamy Hibberd) — names the same fraud-feeling and dismantles
  it with warmth instead of shame
- The Mountain Is You (Brianna Wiest) — the same gentle, literary self-tending voice
  that meets self-sabotage without hustle
- Untamed (Glennon Doyle) — the same emboldening, quietly fierce permission to stop
  performing and trust who you actually are
