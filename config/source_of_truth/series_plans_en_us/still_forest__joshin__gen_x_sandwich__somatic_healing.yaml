reader_avatar:
  age: 47-57, Generation X, the sandwich years
  where_they_are: It's a Tuesday at 9:40pm. The dishwasher is running, your teenager's
    door is closed, and your phone is face-up on the nightstand in case the assisted-living
    number lights up again. You finally lie down, and your shoulders do not. They
    are still up around your ears, the way they've been since the diagnosis, since
    the divorce, since the year everyone started needing you at once. You can't remember
    the last time your body felt like it was yours.
  what_they_need: Permission to stop managing for one honest hour, and a way back
    into a body that has been a logistics hub for a decade — slow, wordless, with
    no app to download and no morning routine to optimize.
  what_they_avoid: Self-optimization, quick-calm hacks, performative mindfulness,
    toxic positivity, hustle culture, and anyone who tells a worn-out caretaker that
    the answer is a better system.
series_voice_markers:
  register: still, deep, woodland-quiet — the calm of a forest interior; unhurried
    and spacious, never clinical, never preachy, never hustle; the voice of someone
    who sat with you on the path and let the silence do the work
  sentence_rhythm: long unhurried sentences that slow the reader's own breath, broken
    by short ones that land like a single drop into a still pool; pauses where another
    book would push
  metaphor_family: the still forest and its deep quiet — old trees and patient roots,
    light filtering down through canopy, the path that slows your step, the pool that
    goes clear when it stops being stirred, the forest floor that holds what falls
_needs_authoring: false
