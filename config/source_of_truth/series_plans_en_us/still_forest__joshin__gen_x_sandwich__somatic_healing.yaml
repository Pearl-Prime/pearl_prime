reader_promise_family: You will be met in the body that has been carrying everyone,
  and shown how to set the load down for long enough to feel the forest floor hold
  what you've been holding alone.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — why the body holds what the mind
  keeps managing, made plain for the lay reader
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the caretaker''s depletion without prescribing one more thing to do'
- How to Do Nothing (Jenny Odell) — a quiet, anti-optimization case for reclaiming
  attention and rest from a culture that monetizes both
