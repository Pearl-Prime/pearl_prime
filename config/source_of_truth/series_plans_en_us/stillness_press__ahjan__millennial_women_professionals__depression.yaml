reader_promise_family: You don't have to feel better to be met here. These books sit
  beside the heaviness instead of trying to lift it off you — naming the particular
  shape of a depression that hides behind a working life, so you can stop performing
  okay and finally exhale.
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- Reasons to Stay Alive / Notes on a Nervous Planet (Matt Haig) — plainspoken, lived-in
  companionship for depression that refuses to perform recovery
- How to Be Sad (Helen Russell) — permission to feel low without rushing to fix it,
  written warmly rather than clinically
- The Comfort Book (Matt Haig) — short, spacious passages you can hold on a heavy
  night, meeting the reader rather than instructing her
