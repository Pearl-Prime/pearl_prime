reader_avatar:
  age: late twenties to late thirties
  where_they_are: It's a Tuesday night and she's still in her work clothes on the
    edge of the bed, phone glowing in her hand, having answered every message and
    met every deadline today while feeling like she's watching her own life from behind
    glass — the apartment quiet, the to-do list done, and nothing inside her that
    can name why she feels like this.
  what_they_need: To have the flat, colorless weight of high-functioning depression
    named without being told to fix it; permission to be tired in a culture that rewards
    her for hiding it; a steady, unhurried voice that treats her exhaustion as real
    instead of a productivity problem.
  what_they_avoid: Hustle-culture pep talks, 'just go for a walk and journal' checklists,
    anything that reframes her depression as a mindset to optimize, and the relentless
    positivity that makes her feel more broken for not bouncing back.
series_voice_markers:
  register: contemplative, spacious, grounded; the voice of someone who has sat in
    this same flat heaviness and come back to tell you it isn't a verdict — never
    clinical, never a coach, never hustle
  sentence_rhythm: unhurried and breath-paced; short declarative sentences that land
    and leave room, longer ones that move like settling water; deliberate pauses,
    no urgency, nothing that asks you to keep up
  metaphor_family: stillness and breath, settling water, weight and lightness, light
    through a window, the gray hour before color returns, open ground, the long pause
    between
_needs_authoring: false
