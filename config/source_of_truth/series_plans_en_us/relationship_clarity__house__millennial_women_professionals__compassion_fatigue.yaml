reader_promise_family: 'You have spent so long being the one who shows up for everyone
  else that you forgot you were allowed to sit down too. This series pulls up a chair
  across from the part of you that is running on empty, and stays there. No fixing,
  no fresh productivity system for your own heart — just the honest, gentle conversation
  about compassion fatigue you have been too tired and too needed to have. You will
  learn to recognize what the caring has cost you, and to let someone tend to you
  for once: you.'
bestseller_hook_family: ''
emotional_engine: compassion_fatigue_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — names the specific exhaustion of women who give care, and refuses to blame the
  caregiver for it'
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — warm, plainspoken relational
  self-help that treats boundaries as connection, not conflict
- How to Keep House While Drowning (KC Davis) — gentle, shame-free care for people
  running on empty, written like a kind friend at the table rather than an expert
