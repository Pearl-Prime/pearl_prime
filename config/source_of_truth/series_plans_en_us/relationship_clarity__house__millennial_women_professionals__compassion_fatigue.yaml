reader_avatar:
  age: 29 to 41, a millennial woman whose job and whole identity are built on caring
    for others — a nurse, therapist, teacher, social worker, team lead, or the family
    member everyone calls first
  where_they_are: It is 9:40pm and she is in the car in the driveway, engine off,
    unable to go inside yet. She gave at work all day, answered the group chat at
    lunch, took the call from her mother on the drive home, and somewhere in there
    she went numb. The people she loves are forty feet away through the front door
    and she cannot feel anything for them right now, and that is the part that scares
    her.
  what_they_need: Permission to be a person and not a resource. To hear that going
    numb is not the same as not caring — it is the bill coming due for caring without
    rest. A relationship with herself that runs both directions, where she is allowed
    to receive and not only give.
  what_they_avoid: Self-care checklists that become one more thing to fail at. Being
    told to 'set better boundaries' as if she had not tried. Toxic positivity that
    skips the loss. Anything that frames her exhaustion as a personal weakness instead
    of the honest cost of a heart that has been open too long with no one tending
    it back.
series_voice_markers:
  register: warm, honest, relational — the calm of two chairs facing each other; gentle
    and direct about the hard truth without ever scolding; the voice of a friend who
    has done this work and pulls a chair up close, never a clinician
  sentence_rhythm: conversational and unhurried; short plain sentences that land,
    then a longer one that opens the feeling; frequent direct address and pauses,
    the way you talk to someone across a kitchen table when neither of you is in a
    rush to fix it
  metaphor_family: two chairs facing each other; the conversation you keep avoiding;
    the empty cup you keep pouring from; the door left open or closed; the space between
    two people at a table; the truth said plainly and kindly; the seat at the table
    that is finally yours
_needs_authoring: false
