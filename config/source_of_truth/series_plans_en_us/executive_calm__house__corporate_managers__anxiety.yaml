reader_avatar:
  age: 38-55
  where_they_are: It's 6:40am and you're in the parking garage before anyone else,
    both hands still on the wheel, running the day's three hard conversations before
    you've had coffee — and the building hasn't even let you in yet.
  what_they_need: To be met as a competent adult under real load, not coached. Language
    that names what the body is doing during a board prep or a layoff round, permission
    to stop white-knuckling composure, and a steadier relationship to their own alarm
    system — ground that holds without a performance.
  what_they_avoid: Executive-performance hustle, 'optimize your leadership' frameworks,
    power-posing confidence theater, breathwork-as-biohack, toxic positivity, and
    anything that treats an executive's anxiety as a weakness to hide from the org
    chart.
series_voice_markers:
  register: steady, substantial, composed — the solidity of granite under pressure;
    spare and warm, written for someone who carries weight for a living and is tired
    of being handled
  sentence_rhythm: load-bearing declaratives that land and hold, broken by one short
    line that drops the floor out; the cadence of a calm person who doesn't rush to
    fill silence
  metaphor_family: granite and bedrock, the ridge that does not move, weight-bearing
    stone, the steady mass beneath the surface, what holds under load, the mountain
    that weathers every season — never machinery, military, productivity, or biohacking
_needs_authoring: false
