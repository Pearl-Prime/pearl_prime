reader_promise_family: Your anxiety is not a leadership defect to be managed out of
  you. Whatever doorway it comes through — the false alarm, the flood, the spiral,
  the shame, the grief, the comparison, the watching — there is steady ground underneath
  it that holds, and we will help you find it without asking you to perform calm you
  don't feel.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- 'Dare: The New Way to End Anxiety (Barry McDonagh) — a non-clinical, mechanism-first
  take on anxiety that respects a capable reader, which this series matches in tone
  but reframes for people who lead.'
- The Mountain Is You (Brianna Wiest) — interior, steady, self-sabotage-aware writing
  with an earth-and-elevation register adjacent to Granite Ridge's bedrock voice.
- When the Body Says No (Gabor Maté) — names what high-functioning, high-responsibility
  people carry in the body without ever shaming the achiever, the same posture this
  series takes toward the anxious executive.
