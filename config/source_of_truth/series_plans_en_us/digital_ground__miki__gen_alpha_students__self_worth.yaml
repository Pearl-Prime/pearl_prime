reader_avatar:
  age: 16 to 22 — late high school through the first years of college, the first generation
    that has never known a self that wasn't also a profile
  where_they_are: It's 1am and you're lying sideways across your bed, phone six inches
    from your face, watching someone your age who already seems to have it all figured
    out. You've read the same paragraph of the assignment four times. The group chat
    went quiet an hour ago and you're still not sure if you said something weird.
    Your thumb keeps moving on its own.
  what_they_need: To hear, in language that doesn't sound like a guidance counselor
    or a LinkedIn post, that their worth was never up for a vote — and that the constant
    low-grade audit of themselves is a thing happening TO them, not proof of what
    they are.
  what_they_avoid: Boomer self-help, anyone who says 'just delete the app,' grindset
    and hustle takes, toxic positivity, and any voice that treats them as a personal
    brand to optimize or shames them for being online at all.
series_voice_markers:
  register: gen-z native, screen-literate, plainspoken and warm; ironic without being
    cynical — the voice of a slightly-older friend who actually gets the internet
    and would never tell you to log off. Never clinical, never corporate, never a
    coach.
  sentence_rhythm: Short declaratives that land like texts, then one longer sentence
    that opens the chest. Fragments used on purpose, for breath. Direct address. The
    pacing of someone talking to you quietly at 1am, not reading from slides.
  metaphor_family: the present moment, the body in the room, the phone face-down on
    the duvet, ground under bare feet, the breath between notifications, signal cutting
    through noise, the screen going dark and your own face appearing in it — never
    productivity, machinery, military, or self-optimization.
_needs_authoring: false
