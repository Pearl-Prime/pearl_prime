reader_promise_family: We will not help you fix what you think is broken about you
  — because nothing is. These books sit with you in the exact moment your worth feels
  conditional, name the engine running underneath it, and hand back the quiet certainty
  that you were never the problem to begin with.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- Unfu*k Yourself series (Gary John Bishop) — blunt, plainspoken, anti-fluff self-talk
  that respects the reader's intelligence
- The Self-Love Workbook for Women / Teens series (Megan Logan) — accessible worth-and-shame
  work that meets younger readers without condescension
- How to Do the Work / companion library (Nicole LePera) — somatic, root-cause framing
  of self-worth that names the pattern instead of just hyping you up
