reader_avatar:
  age: late twenties to late thirties
  where_they_are: It is the night before something that matters — a conversation she
    keeps rehearsing, an email left in drafts, a decision everyone assumes she'll
    handle. She is lying in the dark with her phone face-down, capable on paper and
    quietly terrified, waiting to feel ready in a way she never quite does.
  what_they_need: To understand that the fear isn't proof she's not brave enough yet,
    to stop waiting for a confidence that isn't coming, and to find one small honest
    step she can take with her heart still pounding.
  what_they_avoid: Cold technique and mindset hacks, 'just be confident' pep talks,
    performative spirituality, toxic positivity that skips over the fear, and anything
    that turns becoming brave into one more performance to ace.
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; wisdom passed close, from
    one heart to another, as if spoken low across a kitchen table at night — warm,
    unhurried, and unguarded, never clinical and never a pep talk
  sentence_rhythm: short, breathing lines that settle; a longer turn when something
    is being seen for the first time, then a return to the simple plain sentence that
    lets it land
  metaphor_family: the edge and the small step before you feel ready; light passed
    hand to hand; the open palm instead of the clenched fist; the warmth of someone
    sitting close in the dark; what is transmitted between two hearts without words
_needs_authoring: false
