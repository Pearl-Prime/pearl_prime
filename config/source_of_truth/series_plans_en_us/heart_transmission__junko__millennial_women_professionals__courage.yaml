reader_promise_family: For the woman who looks composed and capable while bracing
  herself before every brave thing — a gentle, heart-to-heart companion that meets
  the fear honestly, never shames the hesitation, and shows that courage was never
  the absence of fear but the small step taken with the fear still in the room. No
  fixing, no optimizing — only the quiet permission to begin before you feel ready.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Gifts of Imperfection / Daring Greatly (Brené Brown) — names courage as showing
  up with the fear and shame still present, not after conquering them
- Untamed (Glennon Doyle) — intimate, first-person permission for high-achieving women
  to stop performing and act on what they actually want
- When Things Fall Apart (Pema Chödrön) — warm, unhurried wisdom that meets fear without
  trying to fix or optimize it away
