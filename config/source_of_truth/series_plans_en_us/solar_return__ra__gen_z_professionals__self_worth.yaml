reader_promise_family: You don't have to earn your way back to mattering. This series
  tends the worth that was never actually gone — quietly, without hype, without asking
  you to become someone louder first.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Self-Love Experiment series (Shannon Kaiser) — gentle, anti-hustle reframing
  of worth for an audience tired of being told to try harder
- Real Self-Care (Pooja Lakshmin) — names performative self-improvement and turns
  the reader back toward something quieter and truer
- How to Do the Work (Nicole LePera) — meets a younger, self-aware reader where they
  are and treats self-worth as something tended, not earned
