reader_avatar:
  age: 23-29
  where_they_are: It's 11pm on a Tuesday and you're still at your laptop, rereading
    a Slack message you sent six hours ago to see if it sounded stupid. You got the
    promotion, the followers, the 'you're killing it' texts — and you still feel like
    you're one bad quarter away from everyone finding out you don't actually know
    what you're doing.
  what_they_need: To feel that their worth isn't a score they have to keep defending
    — a steady warmth that doesn't depend on the next win, the next launch, the next
    person's approval.
  what_they_avoid: Grindset gurus, 'manifest your dream life' affirmations, hustle-culture
    pep talks, and anything that treats their self-doubt as a mindset bug to optimize
    away.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone who has sat in
    the same self-doubt and refuses to hand you a hack; tends the ember rather than
    blowing smoke
  sentence_rhythm: short, steady sentences that breathe; a slow build with the occasional
    one-line landing that lands like a hand on the shoulder; never breathless, never
    a TED-talk crescendo
  metaphor_family: ember and ash, banked fire and slow rekindling, dawn and first
    light, warmth returning to cold hands, the turning of the year, what survives
    the burn and grows back green
_needs_authoring: false
