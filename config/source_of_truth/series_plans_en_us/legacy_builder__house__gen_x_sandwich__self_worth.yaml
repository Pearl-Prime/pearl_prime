reader_avatar:
  age: 47 to 58
  where_they_are: 'It''s a Tuesday night and the house has finally gone quiet — a
    teenager''s door closed down the hall, a parent''s medication sorted into the
    weekly box on the counter, two unread work threads still glowing on the phone.
    They are standing at the kitchen sink, the only one still up, replaying the meeting
    where they spoke and no one really heard it, and underneath the fatigue is a thought
    they would never say out loud: after all of this, all these years of holding everyone,
    I still don''t feel like enough.'
  what_they_need: To recognize that the exhausting performance of being capable, indispensable,
    and impressive is a strategy built long ago to cover a fear that something is
    wrong with them — and to feel, even once, that their worth is not the sum of what
    they produce or how they compare. They need permission to be a person and not
    a project.
  what_they_avoid: Legacy-as-brand hustle, 'build your empire,' net-worth-as-self-worth,
    gurus who turn a midlife reckoning into a productivity sprint, relentless positivity
    that papers over the ache, and any book that treats their tiredness as a problem
    to be solved rather than a truth to be heard.
series_voice_markers:
  register: reflective, steady, warm and substantive — the voice of someone a little
    further up the same mountain, who has put their own armor down and is in no hurry;
    never clinical, never preachy, never hustle, never grandiose
  sentence_rhythm: measured and unhurried; long, gathering sentences that lay a foundation,
    then a short plain one that lands like a stone set in place — built to be read
    slowly, the way you'd talk on a porch after dark
  metaphor_family: the second mountain of meaning rather than achievement; the view
    from later in the climb; the deeper foundation under the visible house; trees
    planted for shade you won't sit in; the long arc of a single life — never machinery,
    military, productivity, or biohacking
_needs_authoring: false
