reader_promise_family: A steady, late-in-the-climb companion for the competent Gen
  X adult who has spent a lifetime proving they are worth something — and is quietly
  tired of carrying a worth that has to be earned again every morning. Each book walks
  one doorway into the same buried question (am I actually enough?), never to optimize
  the reader, only to let them set the armor down and find a worth that was never
  on trial.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Second Mountain (David Brooks) — the same conviction that the first-mountain
  life of status and achievement leaves a deeper hunger unmet, written for the reader
  living that turn.
- Falling Upward (Richard Rohr) — the midlife spiritual reckoning that the ego's early
  task of building a competent self must give way to something truer in the second
  half of life.
- The Gifts of Imperfection (Brené Brown) — a warm, non-clinical permission to stop
  earning worthiness and let yourself be seen as enough.
