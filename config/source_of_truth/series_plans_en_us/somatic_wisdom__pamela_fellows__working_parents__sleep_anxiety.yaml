reader_avatar:
  age: 32-46
  where_they_are: It's past midnight. The kids are finally asleep, the dishwasher
    is humming, and your body is bone-tired — but you're lying in the dark with your
    eyes open and your chest tight, listening to a house that has gone quiet, certain
    that the moment you drift off something will need you.
  what_they_need: to feel their own body soften without a protocol or a tracker; to
    understand that a wakeful, braced nervous system is not a character flaw but a
    system that learned to stay on guard; permission to stop performing rest and let
    it arrive.
  what_they_avoid: sleep-hacks and optimization, 'just relax' and mind-over-matter
    advice, cold clinical protocols, anything that shames their tiredness or asks
    them to override a body that is already overwhelmed.
series_voice_markers:
  register: embodied, grounded, gently somatic and trauma-informed; the voice of someone
    who has lain awake in the next room too, speaking to your body and not at your
    problem — never clinical, never hustle, never the cheerful fix
  sentence_rhythm: slow and breath-paced; short grounding sentences set against longer
    settling ones, with room to exhale between them, mirroring a nervous system coming
    down from high alert
  metaphor_family: the body's felt sense, breath and the ground beneath you, tension
    held and then released, the nervous system settling like weather after a storm,
    warmth returning to a place that had braced — never machinery, military, productivity,
    or biohacking
_needs_authoring: false
