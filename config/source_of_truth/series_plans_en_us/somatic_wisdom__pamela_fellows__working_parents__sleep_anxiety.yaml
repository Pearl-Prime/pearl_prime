reader_promise_family: 'For the exhausted parent who finally has a quiet house and
  still can''t sleep: a felt-sense companion that meets your wakeful body where it
  is, no push-through, no fixing — just the slow return of safety to a nervous system
  that has been on watch far too long.'
bestseller_hook_family: ''
emotional_engine: sleep_anxiety_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the trauma-informed, body-first
  frame these books extend into the specific hour of a parent's sleepless night
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  depletion in the body and the unfinished stress cycle without shame or hustle, the
  same register this series holds'
- Why Has Nobody Told Me This Before? (Julie Smith) — warm, plainspoken, do-this-tonight
  comfort for an anxious mind, matched here with a somatic, parent-specific voice
