reader_avatar:
  age: 32-52
  where_they_are: It is 6:40am and the metrics are green and the team is excited and
    you are sitting in the parked car in the garage, hand still on the wheel, unable
    to make yourself walk in — because some part of you went dark months ago and you
    have been running the company on autopilot, smiling on the calls, dreading the
    silence after.
  what_they_need: To hear, without being shamed for it, that the flatness is not failure
    and not weakness — and that the self who built the company is not the self they
    actually are. They need permission to stop performing aliveness long enough to
    notice that something underneath is still awake.
  what_they_avoid: Hustle-culture pep talks, 'high-performer burnout' rebrands, gratitude-journal
    toxic positivity, anything that treats their inner life as a system to optimize,
    and any spiritual book that asks them to 'raise their vibration' or pretend the
    darkness isn't real.
series_voice_markers:
  register: spacious, awakening, quietly radical; reverent without dogma; intimate,
    like someone sitting beside you in the dark who isn't afraid of it; never clinical,
    never preachy, never a turnaround memo
  sentence_rhythm: long, settling sentences that open room to breathe, punctuated
    by short bare lines that land like a hand on the shoulder; the pacing of someone
    slowing you down on purpose
  metaphor_family: weather moving across an unmoved sky, waking from a dream you mistook
    for your life, the light that was in the room before you switched anything on,
    loosening a grip you forgot you were holding, coming home to what was never actually
    lost
_needs_authoring: false
