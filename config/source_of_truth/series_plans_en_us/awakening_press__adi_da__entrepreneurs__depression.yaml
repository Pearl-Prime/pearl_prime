reader_promise_family: For the founder who is quietly numb behind a thriving company
  — a way of meeting depression not as a problem to be fixed or optimized away, but
  as a fog passing across a sky that was never the fog. You will not be handed a turnaround
  plan for your inner life. You will be shown the one thing in you that was never
  depressed, and was never the company either.
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- The Untethered Soul (Michael A. Singer) — for the same move of stepping back from
  the self that suffers to the awareness watching it, in plain non-dogmatic language
- When Things Fall Apart (Pema Chödrön) — for meeting the dark and the groundlessness
  directly rather than escaping it, with tenderness instead of fixing
- Lost Connections (Johann Hari) — for reframing depression as a meaningful signal
  in a high-pressure achievement life rather than a personal defect to medicate away
