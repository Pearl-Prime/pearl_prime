reader_promise_family: 'A steady presence for nurses who hold everyone else together:
  permission to feel the fear under the competence, to set the weight down at the
  end of a shift, and to find the quiet kind of courage that does not require you
  to be unbreakable.'
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- 'Burnout (Emily and Amelia Nagoski) — why: speaks to depleted caregivers about completing
  the stress cycle, but Night Architecture trades its science-explainer tone for a
  quieter, sit-with-you-in-the-dark voice'
- 'When the Body Says No (Gabor Mate) — why: validates that swallowed stress and unfelt
  emotion lodge in the body, a truth nurses live, told here as nightfall comfort rather
  than clinical case study'
- 'The Body Keeps the Score (Bessel van der Kolk) — why: names how the nervous system
  holds what the mind cannot, reframed for the night-shift reader who needs permission,
  not a trauma textbook'
