    max_books_per_brand_per_month: 2
reader_avatar:
  age: 29-52
  where_they_are: It is 4am and you have just come off a twelve-hour shift, sitting
    in your car in the hospital parking structure with the engine off, hands still
    not quite steady, unable to go inside and unable to cry, replaying the patient
    in bay four while everyone at work thinks you are the calm one.
  what_they_need: To know that the bracing, the numbness, and the dread are not flaws
    in you but the cost of staying steady for years, and that real courage is letting
    yourself feel again without it ending you.
  what_they_avoid: Push-through toughness, resilience pep-talks, self-care-Sunday
    platitudes, anything that calls their exhaustion a mindset problem or rushes them
    past grief, and any book that treats feeling as a weakness to be managed.
series_voice_markers:
  register: steady, nocturnal, quietly architectural; the voice of someone who sits
    with you in the dark hours and holds without fixing, never clinical, never a coach,
    never hustle
  sentence_rhythm: calm and load-bearing; mostly short, settled sentences with an
    occasional long one that lowers you gently, like weight easing onto a floor that
    can hold it; deliberate pauses, nothing rushed
  metaphor_family: night and the dark room, foundations and what bears weight, a load
    finally set down, the body settling toward rest, the quiet hours before dawn,
    the structure that holds you while you let go
_needs_authoring: false
