reader_promise_family: You will stop trying to earn a worth you were never missing
  — and recognize the one already here, beneath every performance review and every
  comparison.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — the same loosening of identification
  with the inner voice, made plain for a generation raised on metrics
- Radical Acceptance / works of Tara Brach (Tara Brach) — meets the reader in self-judgment
  without prescribing a fix, the tone this series lives in
- The Power of Now companion line (Eckhart Tolle) — points past the striving self
  to a presence already complete, without the dated mysticism
