reader_avatar:
  age: 23-29
  where_they_are: It's 8:47pm, the apartment is quiet, and you're still half-working
    — laptop warm on your knees, Slack notifications you've already read, refreshing
    a thread that decided nothing. You closed the day three hours ago and you're still
    scanning it for the thing you did wrong.
  what_they_need: To be met as a whole person who is already enough, not a project
    to optimize; language for the quiet, awakening recognition that their worth was
    never on the line; permission to set the measuring down without being told they're
    lazy or broken.
  what_they_avoid: Spiritual bypassing and guru-speak, 'raise your vibration' cliches,
    toxic positivity, hustle culture dressed as growth, and any book that turns self-worth
    into one more thing to achieve and fall short of.
series_voice_markers:
  register: spacious, awakening, quietly radical — intimate not lofty, reverent without
    dogma; the voice of someone who has stopped performing and is sitting beside you,
    not above you
  sentence_rhythm: unhurried; short declaratives that land and leave silence, then
    a longer breath that opens the sky behind the thought — patient, never urgent,
    never selling
  metaphor_family: waking from a dream, the light already present, the loosening of
    identification, the open sky behind passing weather, coming home to what was never
    lost
_needs_authoring: false
