reader_promise_family: You will be met exactly where you are — heart to heart, no
  fixing, no optimizing. Across seven doorways into the same anxious feeling, you'll
  come to recognize what your fear has been trying to say, and learn to stay close
  to yourself while it speaks.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- Good Vibes, Good Life (Vex King) — gentle, heart-forward self-help that meets young
  readers without lecturing them
- The Comfort Book (Matt Haig) — short, tender entries that sit beside the anxious
  mind instead of trying to fix it
- How to Do the Work (Nicole LePera) — names the patterns underneath anxiety in warm,
  accessible language for a younger audience
