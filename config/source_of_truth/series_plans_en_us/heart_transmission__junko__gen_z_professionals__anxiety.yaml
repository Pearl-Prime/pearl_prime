reader_avatar:
  age: 22 to 28, early in a career that was supposed to feel like arriving
  where_they_are: It's a Tuesday night, the laptop is finally closed, but the body
    hasn't gotten the message — chest tight, jaw set, one Slack notification replaying
    on a loop, scrolling a feed of people who seem to have it handled while the apartment
    stays quiet and the morning waits.
  what_they_need: To be spoken to like a person, not a problem — warmth without a
    lecture, a voice close enough to trust, and permission to stop performing okayness
    for one honest hour.
  what_they_avoid: Cold technique and clinical scripts, mindset hacks, hustle-coded
    'optimize your anxiety' advice, performative spirituality, and toxic positivity
    that tells them to just be grateful and breathe.
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous — the voice of someone who
    has sat with this exact feeling and is speaking to you up close, warm and unhurried,
    never clinical, never preachy, never hustle
  sentence_rhythm: unhurried and breath-paced; short, landing sentences set against
    longer ones that open like an exhale; second person throughout, the cadence of
    being spoken to gently in a quiet room
  metaphor_family: the heart and what passes between two of them — light handed from
    one palm to another, the warmth of presence, the unguarded moment, what is transmitted
    without words, the open hand, breath shared in a quiet room
_needs_authoring: false
