reader_avatar:
  age: 32-48
  where_they_are: Standing on the subway platform after a fourteen-hour day, watching
    the express lights come up the tunnel, replaying one sentence from a 4pm meeting
    for the ninetieth time — and somewhere in that replay it has already become the
    reason the quarter fails, the reason they're found out, the reason it all comes
    apart.
  what_they_need: A way to step out of the loop without being told to 'just let it
    go' — permission to stop performing composure, and a quiet, repeatable way to
    set a runaway thought down before it multiplies.
  what_they_avoid: Productivity systems for the mind, breathing 'hacks,' mantras that
    feel like denial, anything that adds one more thing to manage, and any book that
    mistakes a high-functioning executive for someone who can't see their own pattern.
series_voice_markers:
  register: spare, clear, unadorned; a quiet presence in the room beside you, never
    a clinician, never a coach, never a cheerleader — it says only what is needed
    and then goes quiet
  sentence_rhythm: short declaratives that land and stop; an occasional long sentence
    that runs the length of a spiral, then a single clause that cuts it off; white
    space used the way silence is used between two people
  metaphor_family: bare form and empty space — the room with nothing extra in it,
    the stillness between two people, clean light through a window, the unsaid that
    finally settles, what remains when the clutter falls away; never machinery, never
    the body-as-system, never optimization
_needs_authoring: false
