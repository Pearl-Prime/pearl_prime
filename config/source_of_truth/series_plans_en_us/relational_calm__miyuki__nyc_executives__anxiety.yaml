reader_promise_family: You will not be taught to think your way out of an overthinking
  mind. You will be shown how to put one thought down, then another, until the room
  inside you has space again — and learn that the calm you've been chasing was never
  something to achieve, only something to stop crowding out.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- Don't Believe Everything You Think (Joseph Nguyen) — strips overthinking down to
  its root and refuses to hand you a system to manage it
- The Untethered Soul (Michael A. Singer) — teaches you to watch the inner voice instead
  of obeying it, in plain, unhurried language
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the high-functioning person''s hidden cost without shaming them for carrying it'
