reader_avatar:
  age: late 30s to mid 50s
  where_they_are: It's 11:40pm in a high-floor apartment above a city that never fully
    goes dark. The deck is sent, the team is asleep, and you are sitting on the edge
    of the bed running the same conversation for the ninth time — the thing you said
    in the meeting, what it might have meant, what they might do, what you'll do then.
    Tomorrow you'll lead a room. Right now you can't lead yourself out of one sentence.
  what_they_need: To understand the spiral as a system rather than a flaw — to recognize
    the loop the moment it starts, to stop treating a racing mind as a character defect,
    and to find the steady ground underneath the performance without being told to
    slow down, breathe, or step back from a life they've built on purpose.
  what_they_avoid: Executive-performance hustle, 'optimize your leadership' language,
    power-posing confidence theater, toxic positivity, breathing-app gimmickry, and
    anyone who treats a leader's anxiety as a weakness to manage out of sight.
series_voice_markers:
  register: steady, substantial, composed — spare and warm, written for people who
    carry weight and are tired of being handled; never clinical, never preachy, never
    hustle
  sentence_rhythm: load-bearing and unhurried; short declaratives that land like set
    stone, opened up by one longer line that lets the reader exhale; no exclamation,
    no breathless lists
  metaphor_family: granite and bedrock — the ridge that does not move, weight-bearing
    stone, the steady mass beneath the surface, what holds under load, the mountain
    that weathers every season; never machinery, military, productivity, or biohacking
_needs_authoring: false
