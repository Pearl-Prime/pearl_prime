reader_promise_family: For the executive whose anxiety arrives as a spiral of thought
  no one else can see — a steady, granite-grounded recognition that the mind which
  runs the company can be the same mind that runs you into the ground, and that meeting
  it head-on is the most composed thing you will ever do.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- Unwinding Anxiety (Judson Brewer) — maps the loop of anxious thought as a habit
  the mind reinforces, for readers who want the mechanism, not a pep talk
- Dare (Barry McDonagh) — meets panic and spiraling worry without trying to suppress
  it, in a plainspoken voice that respects the sufferer's intelligence
- Why Has Nobody Told Me This Before? (Julie Smith) — calm, credible, non-clinical
  guidance for high-functioning people who keep their struggle out of view
