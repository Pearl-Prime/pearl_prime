reader_avatar:
  age: 29-44
  where_they_are: It's 9:40pm on a Tuesday and the laptop is still open on the kitchen
    counter. The Slack dot is green because it's always green. You closed the same
    Notion tab four times and reopened it four times. Your calendar tomorrow is a
    wall of color with no white space in it, and you already know you'll answer the
    6am message from the open seat in bed. You're not in crisis. You're just running
    on a reserve you can't find the bottom of, and somewhere underneath the to-do
    list a quieter voice keeps asking how much longer you can do this.
  what_they_need: Permission to be a person who has limits and is not broken for having
    them. A steadying, unhurried voice that names what burnout actually is without
    prescribing one more protocol. The felt sense that they can set the instrument
    down — the high-performance mind they've pointed at their own survival — and still
    be okay.
  what_they_avoid: Resilience-as-armor and 'just push through.' Optimization frameworks,
    morning-routine gospel, biohacking, and recovery repackaged as another performance
    to win. Toxic positivity, gratitude homework, and anything that leaves an already-depleted
    person owing more than they did before they opened the book.
series_voice_markers:
  register: Steadying, warm, and plain — the voice of someone who has weathered the
    same waters and now speaks low and unhurried, like a hand on your shoulder at
    the rail. Never clinical, never preachy, never a pep talk. It holds you without
    flattering you, and it never asks you to perform your recovery.
  sentence_rhythm: Mostly short, settled declaratives that let you breathe between
    them, broken by the occasional longer line that swells like a slow wave and sets
    back down. It slows where the reader is bracing. It never piles on. White space
    is part of the meaning.
  metaphor_family: 'The harbor and the anchor line: still water inside the breakwater,
    the boat that finally stops pitching, the long line that holds you to ground in
    a blow, the steady horizon you can find again, what keeps you from drifting. No
    machinery, no military, no productivity, no biohacking — only water, weather,
    ground, and the safe shape of a harbor.'
_needs_authoring: false
