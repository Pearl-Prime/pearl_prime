reader_promise_family: A harbor for the high-capacity mind that has run itself aground.
  We will not coach you back to peak performance or hand you a better system. We will
  help you stop pitching long enough to feel the ground under you again — to recognize
  burnout not as a failure of will but as a body and a self asking to come in off
  the water.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- The Let Them Theory / How to Do the Inner Work (Mel Robbins, Dr. Nicole LePera)
  — adjacent shelf of plainspoken, permission-giving self-help for over-functioners,
  but harder-charging where Harbor Line is steadying
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — the
  definitive popular burnout title; Harbor Line shares its ''you''re not the problem''
  stance but trades the science-explainer voice for an intimate, narrative one'
- Real Self-Care / Burnout (Pooja Lakshmin, MD) — names performative self-care and
  grind culture as the trap; Harbor Line lives in the same refusal but speaks to the
  tech-and-finance over-performer at the rail, not the clinic
