reader_avatar:
  age: 28 to 52
  where_they_are: It's 11:40pm, the shift ended forty minutes ago, and she's sitting
    in her car in the hospital parking structure with the engine off. Her hands are
    finally still but her chest isn't. The unit is behind her, but her body hasn't
    been told. Her shoulders are still up around her ears the way they've been since
    report, and she can't remember the last time she felt them come down.
  what_they_need: To understand that the alarm in her body is not a character flaw
    or a sign she isn't cut out for this — it's a nervous system that learned to stay
    ready, and can be taught, gently and on its own timeline, that it's allowed to
    come down. Practices she can do in a supply closet, a car, a break that got cut
    short.
  what_they_avoid: Self-care that sounds like another assignment. 'Just breathe' from
    someone who has never run a code. Bubble baths and gratitude lists. Anything that
    says push through, override it, mind over matter — she already pushes through
    for a living, and her body is the one keeping the receipt.
series_voice_markers:
  register: embodied, grounded, gently somatic; trauma-informed; speaks from and to
    a body that has been holding too much for too long; the voice of a colleague who
    finally sat down beside you, not a charge nurse and not a clinician with a worksheet
  sentence_rhythm: long settling sentences that let the breath out, broken by short
    ones that land like a hand on the shoulder; unhurried, never clipped; the pacing
    of someone who knows you don't rush a nervous system
  metaphor_family: the felt sense; breath and ground; tension held in the jaw, shoulders,
    the floor of the belly, and slowly released; the nervous system settling like
    weather passing; warmth returning to a place that braced; the body as something
    that kept you safe and is allowed, now, to rest
_needs_authoring: false
