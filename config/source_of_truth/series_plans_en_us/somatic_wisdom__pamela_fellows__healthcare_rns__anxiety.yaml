reader_promise_family: Body-based, trauma-informed companions for nurses whose nervous
  systems never clocked out — meeting the anxiety in the body that carries other people's
  emergencies, without one more protocol to push through.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational case that the
  body, not willpower, holds anxiety and trauma, written for the reader who lives
  that truth in her own chest.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily and Amelia Nagoski) —
  names that finishing a shift is not the same as finishing the stress, which is exactly
  the gap a nurse falls into nightly.'
- 'Anchored: How to Befriend Your Nervous System (Deb Dana) — polyvagal, gentle, body-first;
  treats the nervous system as something to be met and soothed rather than fixed or
  overridden.'
