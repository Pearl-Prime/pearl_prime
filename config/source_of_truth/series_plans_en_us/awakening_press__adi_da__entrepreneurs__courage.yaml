reader_promise_family: You will stop trying to manufacture courage and begin to recognize
  the steadiness that was already underneath the fear — the part of you that was never
  actually in danger, even when the whole venture felt like it was.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Untethered Soul (Michael A. Singer) — same loosening of identification with
  the anxious inner voice, made practical for someone under real-world pressure
- When Things Fall Apart (Pema Chodron) — leans into the felt experience of fear and
  groundlessness as a doorway rather than a problem to defeat
- The Sedona Method (Hale Dwoskin) — releasing the grip rather than building force,
  which is the spine of this whole series
