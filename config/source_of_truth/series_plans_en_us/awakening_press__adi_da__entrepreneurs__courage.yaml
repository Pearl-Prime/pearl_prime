  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 30s to 40s
  where_they_are: It is 2am and the company is technically still alive, but you are
    awake again, jaw tight, running the numbers and the conversations and the worst-case
    version of tomorrow's call — bracing yourself to do the thing you already know
    you have to do, and finding the tank empty.
  what_they_need: To feel the difference between real danger and a nervous system
    that treats every decision as a cliff edge — and to act from something steadier
    than the fear, without first having to feel fearless.
  what_they_avoid: Hustle-culture bravado, fake-it-til-you-make-it confidence hacks,
    guru certainty, anyone who tells them to just push through, and any version of
    courage that is one more thing to optimize and fail at.
series_voice_markers:
  register: spacious, awakening, quietly radical; intimate and grounded, the voice
    of someone who has built and nearly lost and stopped mistaking the fear for the
    truth; reverent without dogma, never clinical, never hustle, never preachy
  sentence_rhythm: long settling sentences that open room to breathe, broken by short
    ones that land like a hand on the shoulder; second person throughout; no exclamation,
    no jargon
  metaphor_family: waking from a dream of danger, the open sky behind the weather,
    the light already on in the room, the loosening of who you thought you had to
    be, coming home to a steadiness that was never gone
_needs_authoring: false
