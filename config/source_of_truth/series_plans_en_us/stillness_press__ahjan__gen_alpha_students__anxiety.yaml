reader_promise_family: >
  You'll learn to recognize what your anxious body is doing without needing to make it stop. 7 books across engines of the
  same underlying capacity — each one enters the work from a different angle.

bestseller_hook_family: recognition_descent
emotional_engine: anxiety_recognition

comp_series:
  - "Unwinding Anxiety (Judson Brewer) — mechanism + noticing register"
  - "When Things Fall Apart (Pema Chödrön) — surrender register"
  - "The Happiness Trap (Russ Harris) — ACT informal voice"

platform_strategy:
  primary: [kdp_ebook, audible]
  secondary: [apple_books, google_play, spotify_audiobooks]
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2

reader_avatar:
  age: "11–17"
  where_they_are: >
    Between classes in a bathroom stall. Phone glowing. Hasn't told anyone what they're feeling.
  what_they_need: >
    Words that feel like their own language, not translated from adult-speak.
  what_they_avoid: >
    Adult register. Worksheets. 'I used to feel this way when I was your age.'

series_voice_markers:
  register: "intimate, persona-specific, no management-speak"
  sentence_rhythm: "short sentences dominant, occasional long contemplative stretches"
  metaphor_family: "body, nature, weather — never productivity, mechanical, military"
  second_person_default: true
  taboo:
    - "No rewire-your-brain language"
    - "No morning-routine prescriptions"
    - "No therapy-as-solution closing"
    - "No religious framing"

main_character_name: Kira
main_character_role: "high school sophomore in a mid-sized school"
main_character_image_path: null
main_character_lora_id: kira_sp_us
main_character_trigger_word: kira_sp_us

