reader_promise_family: For the working parent whose cup is poured out for everyone
  but themselves, this series does not teach you to wall people off or harden your
  heart. It walks beside you as you learn that a boundary is not a rejection but an
  act of devotion — to your children, to the work, and at last to the self you keep
  leaving for last. No scripts to memorize, no guilt to muscle through. Just permission
  to keep something back, and the quiet faith that the people you love can be held
  by hands that have first been allowed to rest.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- The Book of Boundaries (Melissa Urban) — the genre-defining bestseller on boundaries
  as self-respect, but secular and prescriptive where this series is devotional and
  spacious
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the clinical-warm bestseller
  readers reach for first; this series offers the same permission without the therapy-room
  register
- Good Boundaries and Goodbyes (Lysa TerKeurst) — the faith-adjacent boundaries bestseller
  for tender readers; shares the reverent tone but this series carries no church and
  no doctrine
