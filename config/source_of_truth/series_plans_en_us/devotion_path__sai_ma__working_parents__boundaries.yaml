reader_avatar:
  age: 32-48
  where_they_are: It is 9:40pm. The kids are finally down, the work laptop is still
    open on the kitchen counter, and a Slack message just lit up the dark room. Your
    body flinches toward it before your mind can decide. You have given all day —
    to the children, to the manager, to the other parents in the group chat — and
    there is nothing left in the cup, yet your hand is already reaching to pour again.
  what_they_need: To believe, in their bones, that saying no to one more thing is
    not abandonment — that the line they are so afraid to draw is what makes the love
    sustainable. To feel held long enough to stop bracing. To learn that protecting
    their own depletion is itself a way of caring for everyone who depends on them.
  what_they_avoid: Boundary 'scripts' and assertiveness drills that make them sound
    like a stranger. Productivity framing that treats their exhaustion as a scheduling
    problem. Anything that shames them for having given too much, demands they feel
    grateful for the privilege of being needed, or implies a good parent never reaches
    their limit.
series_voice_markers:
  register: tender, devotional, spacious; reverent without dogma; the voice of someone
    who has sat in the same dark kitchen and is not in a hurry to fix you
  sentence_rhythm: long held breaths that open out, then a single short line that
    lands like a hand on the shoulder; cadenced and unhurried, never clipped, never
    clinical
  metaphor_family: the open vessel and the cup poured out; the door and the threshold;
    the line drawn in love; hands that finally open; the well that refills only in
    the dark; being held before being asked to hold
_needs_authoring: false
