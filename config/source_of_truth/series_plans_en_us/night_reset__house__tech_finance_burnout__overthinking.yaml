reader_promise_family: >
  You'll learn to recognize the overthinking mind for what it is at night — not a problem to be solved, but
  a system still running long after the workday ended. Three books into the same restless dark, each one
  entering the noise from a different angle.
bestseller_hook_family: recognition_descent
emotional_engine: overthinking_recognition
comp_series:
- "Chatter (Ethan Kross) — why the inner voice turns against you, mechanism-led"
- "Hello Sleep (Jade Wu) — acceptance-first, anti-effort register for the wired mind"
- "When Things Fall Apart (Pema Chödrön) — staying with the unsettled mind instead of fixing it"
platform_strategy:
  primary:
  - kdp_ebook
  - audible
  secondary:
  - apple_books
  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: "32–50"
  where_they_are: >
    Awake at 3am with the bedroom dark and the mind bright, re-running a decision they already made and a
    sentence they wish they hadn't sent, the same problem-solving engine that pays them all day refusing to
    clock out.
  what_they_need: >
    Someone who treats a fast, analytical mind as the thing it is — not a defect to medicate or a habit to
    discipline away — and names what it's actually doing when it won't go quiet at night.
  what_they_avoid: >
    "Just clear your mind" advice. Meditation-app cheerfulness. Productivity reframes. Diagnostic labels and
    anything that calls a sharp mind broken.
series_voice_markers:
  register: "calm, nocturnal, dry-warm, second person; the analytical mind spoken to in its own register, never clinical, never cheerful"
  sentence_rhythm: "short, precise sentences dominant, with occasional long settling stretches that slow a fast reader down"
  metaphor_family: "night, signal and noise, current, a system left running, dimming light — never machines as enemies, never military, never productivity"
  second_person_default: true
  taboo:
  - "No diagnostic or disorder language"
  - "No 'just stop thinking' or 'clear your mind' scolding"
  - "No cure, fix, or healed-forever promises"
  - "No productivity or optimization framing"
_needs_authoring: false
