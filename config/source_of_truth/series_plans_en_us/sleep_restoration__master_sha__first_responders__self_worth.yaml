reader_avatar:
  age: 29 to 52, career first responders and the recently retired or medically separated
    — firefighters, paramedics, EMTs, police officers, dispatchers, ER and trauma
    nurses, search-and-rescue, corrections, military medics
  where_they_are: It's well past midnight and the house is finally quiet. You ran
    three calls today that you handled clean, and you still feel like a fraud who's
    one bad shift from being found out. The gear is by the door. You're lying in the
    dark replaying the one thing you could have done better, certain that everyone
    else on the crew is built for this and you're just good at faking it — and the
    worth you can't feel is the thing keeping you awake.
  what_they_need: to be allowed to be a person and not a function; to separate what
    they do for a living from what they're worth as a human; to stop bracing for the
    moment someone discovers they're not as solid as they look; to put down the load
    long enough to rest without earning it first
  what_they_avoid: wellness-speak and resilience workshops, anything that calls them
    a hero to dodge the real conversation, push-through toughness, 'you've got this'
    platitudes, peer-support clichés, being told to be grateful, and any approach
    that treats rest or feeling as something you have to deserve
series_voice_markers:
  register: steady, nocturnal, quietly architectural; a calm presence in the next
    room who has sat with hard hours and isn't unsettled by yours — never clinical,
    never a coach, never a chaplain reaching for a verse, never the chief telling
    you to tough it out
  sentence_rhythm: plainspoken and unhurried, weighted toward the short declarative
    line; longer sentences settle slowly and then land on something small and true;
    the pacing of someone speaking quietly in the dark, leaving room between thoughts
    so you can breathe
  metaphor_family: night and the dark room, foundations and load-bearing structure,
    the weight you carry and the moment you set it down, the body settling toward
    rest, the long quiet hours before dawn, the building that stands whether or not
    anyone is inside it — never machinery, productivity, military hardware, or biohacking
_needs_authoring: false
