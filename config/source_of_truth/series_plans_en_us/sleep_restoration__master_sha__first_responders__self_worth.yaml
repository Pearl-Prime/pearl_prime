reader_promise_family: For the first responder who only feels worth a damn when they're
  useful — a steady, nocturnal companion that lets you set down the belief that your
  value is something you have to keep earning, and meets the person under the uniform
  without asking them to be strong about it.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- On Combat / On Killing (Dave Grossman) — the standard first responders already trust
  on what the job does to the nervous system, but kept at arm's length from the inner
  cost of worth and identity
- The Body Keeps the Score and adjacent trauma titles (Bessel van der Kolk) — names
  what the body holds after years of calls, where these books pick up the quieter
  question of what it does to your sense of self
- Permission to Feel (Marc Brackett) — gives readers language for the inner life,
  where this series brings that honesty specifically to the person under the uniform
  at 3am
