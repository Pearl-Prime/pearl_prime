reader_promise_family: 'For the high-performing mind that tried to manage its way
  through loss: a spacious, unhurried companion that lets grief be grief — not a problem
  to optimize, not a project to close out, but a doorway back to what in you was never
  lost.'
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- The Grief Recovery Handbook series (John W. James & Russell Friedman) — because
  it meets bereavement head-on without flinching, the way these books do, but ours
  speaks to the over-functioning professional in particular.
- The Pema Chodron canon, beginning with When Things Fall Apart (Pema Chodron) — because
  it treats the collapse of certainty as an opening rather than a failure, the same
  quietly radical posture our series takes.
- The Untethered Soul and The Surrender Experiment (Michael A. Singer) — because they
  point past the busy, monitoring self to the awareness underneath it, which is exactly
  the doorway this series walks the reader through.
