reader_avatar:
  age: 32-52
  where_they_are: It's a Tuesday night and the laptop is still open. You closed the
    deal, shipped the release, answered the thread — and there's a grief sitting in
    the room with you that none of it touched. You keep reaching for the next task
    because the task has a finish line and this doesn't.
  what_they_need: Permission to stop solving the loss. To feel it without converting
    it into a deliverable, and to discover that beneath the ache there is something
    steady that the loss could not take.
  what_they_avoid: Five-stages frameworks, grief 'hacks,' toxic positivity, anything
    that treats mourning as a backlog to clear or a KPI to recover, and any guru who
    promises to make it stop.
series_voice_markers:
  register: spacious, awakening, quietly radical; reverent without dogma; intimate,
    like someone sitting beside you in a dim room, never a clinician and never a coach
  sentence_rhythm: long open breaths broken by short true ones; lots of white space;
    the cadence of someone who is not in a hurry and is not going to rush you either
  metaphor_family: waking from a dream, the sky behind the weather, what remains when
    the story falls quiet, the light that was on the whole time, coming home to what
    was never lost — never machinery, dashboards, or optimization
_needs_authoring: false
