reader_promise_family: For the teacher whose body is still braced long after the last
  bell — a steady, grounded place to set down what the day asked you to carry, without
  being told to toughen up, push through, or just relax.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Anxiety Toolkit (Alice Boyes) — practical, non-shaming support for an over-activated
  mind, without hustle or hype.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the body''s stress response as something to complete and discharge, not muscle through.'
- The Body Keeps the Score (Bessel van der Kolk) — the foundational case that the
  body, not just the thoughts, holds what overwhelms us.
