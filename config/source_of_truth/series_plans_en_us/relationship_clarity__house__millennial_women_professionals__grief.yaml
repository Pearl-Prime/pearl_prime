reader_avatar:
  age: late 20s to early 40s
  where_they_are: It's 9pm and she's still at her desk because the apartment is too
    quiet now. The Slack notifications have stopped, the thread with him has gone
    cold, and she's reading their last real conversation for the fourth time tonight
    — looking for the exact word where it turned. Tomorrow she has a client call at
    eight and she'll be fine, she'll be sharp, she'll be the one everyone leans on.
    But right now there's an empty chair across the table and she doesn't know how
    to stop setting a place for someone who isn't coming back.
  what_they_need: Permission to grieve a relationship without a tidy diagnosis or
    a five-step plan. To hear someone say plainly that the loss is real, that loving
    a thing doesn't obligate her to keep it, and that she is allowed to put down the
    watching, the rehearsing, the managing — and just be a person who lost something
    that mattered.
  what_they_avoid: Closure checklists, 'communication hacks,' breakup scripts that
    sound like a customer-service flowchart, anyone telling her the ending was 'for
    the best,' and the bright, busy advice that treats heartbreak as a performance
    problem to optimize away.
series_voice_markers:
  register: warm, honest, relational; the calm of two chairs facing each other across
    a quiet table; direct about hard things and gentle about them at the same time;
    never clinical, never a pep talk, never the voice of someone who has it all sorted
    — the voice of someone who has sat in the same chair
  sentence_rhythm: unhurried and conversational, with short plainspoken sentences
    set against longer ones that follow a feeling all the way down; built to be read
    aloud at the pace of an honest conversation, with room to breathe between thoughts
  metaphor_family: two chairs facing each other, the empty place still set at the
    table, the conversation you keep rehearsing and never have, the door left open
    or finally closed, the things that went unsaid and the things that can't be unsaid,
    the silence that arrives where a voice used to be
_needs_authoring: false
