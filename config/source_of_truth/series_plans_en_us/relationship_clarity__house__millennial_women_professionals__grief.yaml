reader_promise_family: A warm, honest companion for the professional woman grieving
  a relationship — the one that ended, or the one quietly changing under her — who
  is tired of being told to communicate better and just wants to sit with what hurts
  without being handed a fix. These books pull up the second chair, name the loss
  plainly, and let her stop performing okay long enough to feel what is actually true.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- On Grief and Grieving (Elisabeth Kübler-Ross & David Kessler) — the gentle, plainspoken
  authority on living through loss without rushing it, applied here to the everyday
  grief of a relationship
- Attached (Amir Levine & Rachel Heller) — names the relational patterns professional
  readers recognize in themselves, the same self-aware audience these books speak
  to
- It's OK That You're Not OK (Megan Devine) — refuses the closure-and-optimism script
  and sits honestly in loss, the exact register and reader-promise this series shares
