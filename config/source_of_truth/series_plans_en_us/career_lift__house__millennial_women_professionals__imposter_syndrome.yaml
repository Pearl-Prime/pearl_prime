reader_avatar:
  age: late twenties to late thirties
  where_they_are: It's 9pm and she's still rereading the email she sent this morning,
    certain a smarter person would have phrased it better — and certain that, eventually,
    the room will figure out she's been bluffing this whole time.
  what_they_need: Permission to stop treating her own success as a clerical error,
    and a way to keep showing up to the next chapter of her career without first having
    to feel like she's earned the right to be there.
  what_they_avoid: Girlboss hustle, 'manifest your dream job' affirmations, influencer
    confidence theatre, and toxic positivity that pretends career fear is just a mindset
    she hasn't fixed yet.
series_voice_markers:
  register: encouraging, forward-looking, grounded; the voice of a slightly-further-along
    colleague who has felt the same fraud-fear and won't pretend it away — warm and
    practical, never clinical, never preachy, never hype
  sentence_rhythm: conversational and unhurried, with short declarative lines landing
    the hard truths; second person throughout, building toward an exhale rather than
    a crescendo
  metaphor_family: the next chapter and the turning page, the threshold and the doorway,
    the room you haven't walked into yet, the step up that costs something, the draft
    of yourself you're still writing
_needs_authoring: false
