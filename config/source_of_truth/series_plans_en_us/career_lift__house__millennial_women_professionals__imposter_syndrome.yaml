reader_promise_family: A warm, honest companion for the capable woman who keeps waiting
  to be found out — not a cure for the fear, but room to stop performing and turn
  the page on who she was told she had to be at work.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Imposter Cure (Dr. Jessamy Hibberd) — names the fraud-feeling without shaming
  the reader who has it.
- How to Be Yourself (Ellen Hendriksen) — warm, non-clinical work on social fear and
  the belief that you're about to be found out.
- The Gifts of Imperfection (Brené Brown) — shame, worthiness, and letting go of who
  you think you're supposed to be.
