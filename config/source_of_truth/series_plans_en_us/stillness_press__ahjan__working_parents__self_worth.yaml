reader_promise_family: A quiet, unhurried place to set down the belief that your worth
  has to be earned -- written for the parent who is doing enough, and has been all
  along, even on the days that don't feel like it.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- Self-Compassion (Kristin Neff) -- the closest peer on meeting your own harshness
  with warmth instead of correction, written for tired adults rather than clinicians.
- The Gifts of Imperfection (Brene Brown) -- names the worthiness wound directly and
  gives parents permission to be enough as they are.
- Real Love (Sharon Salzberg) -- a spacious, contemplative path back to your own worth
  that never turns calm into another task to perfect.
