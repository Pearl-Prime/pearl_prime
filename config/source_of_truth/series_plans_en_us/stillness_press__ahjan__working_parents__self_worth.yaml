reader_avatar:
  age: 32-46
  where_they_are: 'It''s 9:40pm. The kids are finally down, the dishwasher is running,
    and you''re standing in the kitchen in the dark, scrolling one more time -- not
    for anything in particular, just to not be alone with the day. Somewhere underneath
    the tiredness is a question you don''t say out loud: is this all I am, and is
    it even enough?'
  what_they_need: To be met, not coached. To hear that the relentless feeling of falling
    short is a story they learned, not a fact about who they are -- and to feel their
    worth settle without having to fix one more thing first.
  what_they_avoid: Hustle-culture pep talks, 'optimize your morning routine' advice,
    self-care reframed as one more to-do, toxic positivity, and anything that quietly
    suggests they'd be enough if they just tried a little harder.
series_voice_markers:
  register: contemplative, spacious, grounded -- the voice of someone who has sat
    with this exact ache themselves and is in no hurry to talk you out of it; never
    clinical, never a coach, never hustle
  sentence_rhythm: unhurried and breath-paced; short declarative lines that land and
    then leave room, set against longer settling sentences; pauses honored, never
    crowded
  metaphor_family: stillness and breath; settling water and silt; open ground; light
    coming through a window; the pause between one thing and the next -- never machinery,
    productivity, scoreboards, or self-improvement
_needs_authoring: false
