reader_avatar:
  age: 33-47
  where_they_are: It's 9:40pm, the kids are finally down, the dishwasher is humming,
    and you're standing in the dark kitchen with one hand on the counter — not because
    you're tired, exactly, but because your chest is tight, your jaw is clenched,
    your shoulders are somewhere up near your ears, and you can't actually remember
    the last time your body felt like it belonged to you instead of to the schedule.
  what_they_need: To feel the ground come back under them — to drop the breath low,
    unclench, and trust that they can refill from the root without abandoning anyone,
    instead of running on a nervous system that's been bracing for years.
  what_they_avoid: Energy-drink hustle, 'optimize your recovery' biohacking, performative
    self-care, toxic positivity, and any program that treats their exhausted body
    as one more project to manage on top of everything else.
series_voice_markers:
  register: grounded, restorative, quietly vital; the voice of someone who has sat
    with you on the kitchen floor — warm, unhurried, never clinical, never preachy,
    never hustle
  sentence_rhythm: long settling sentences that exhale toward the end, broken by short
    grounded ones that land like a foot finding the floor; it slows the reader's breath
    as it goes
  metaphor_family: roots and meridians, deep ground and rising sap, the well that
    refills from below, breath reaching the lowest part of the lungs, what flows again
    when a long-held blockage finally releases, vitality returning from the root rather
    than borrowed from the surface
_needs_authoring: false
