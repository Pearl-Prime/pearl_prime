reader_promise_family: For working parents who carry the whole household in their
  bodies — a way back to the root, where vitality refills from below instead of being
  drained from the surface to keep everyone else afloat.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the canonical case that the body,
  not the calendar, holds what we carry; this series brings that truth home to the
  exhausted parent
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  how depletion lives in the body and how to complete the cycle, the same somatic
  terrain in a warmer, parent-shaped register'
- Real Self-Care (Pooja Lakshmin) — refuses the performative, optimize-yourself wellness
  this reader is fleeing, and insists care start from the inside out
