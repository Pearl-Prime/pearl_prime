reader_promise_family: For the working parent running on empty, a series that doesn't
  ask you to do one more thing. Each book meets you in the few stolen minutes you
  actually get and helps you recognize what burnout has been doing to you, without
  a single demand to optimize, fix, or hustle your way back.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  burnout as a physiological state, not a willpower failure, with the same permission-giving
  warmth'
- How to Keep House While Drowning (KC Davis) — meets depleted, overwhelmed caretakers
  without shame and refuses to add to the to-do list
- Real Self-Care (Pooja Lakshmin) — explicitly rejects commercialized self-care and
  speaks to exhausted parents who are tired of being told to do more
