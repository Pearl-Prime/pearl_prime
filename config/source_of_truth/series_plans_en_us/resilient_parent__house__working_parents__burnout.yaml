  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 32-46
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is running,
    and you're sitting in the dark on the bottom stair because the couch felt like
    a commitment. Tomorrow's lunches aren't made. You keep meaning to get up. You
    don't.
  what_they_need: To be told, gently and without a checklist, that what they're feeling
    is burnout and not a character flaw, and to reclaim the few unwatched minutes
    that are actually theirs, without earning them first.
  what_they_avoid: Perfect-parent pressure, self-care-Sunday commercialism, hustle-culture
    rebrands of rest, toxic positivity, and any book that hands an exhausted parent
    a new system to maintain.
series_voice_markers:
  register: warm, tender, knowing; the voice of another parent who has sat on the
    same dark stair, never a clinician, never a coach, never the parent at pickup
    who has it all together
  sentence_rhythm: short and breath-shaped, the way you think in stolen minutes; longer
    sentences that exhale, then a short one that lands; plainspoken, never clever
    for its own sake
  metaphor_family: the stolen moment, the pause in the parked car before going in,
    the quiet after bedtime, the few minutes that are yours, breath caught between
    demands, the small still pocket in a full day, what you reclaim without anyone
    noticing
_needs_authoring: false
