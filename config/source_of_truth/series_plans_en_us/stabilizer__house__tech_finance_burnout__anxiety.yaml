reader_avatar:
  age: 28 to 45
  where_they_are: It's 11:47pm and the laptop is finally closed, but your chest hasn't
    gotten the message. You're lying in the dark doing the math again — runway, the
    raise, the number in the brokerage app you already checked twice today — and your
    heart is going like you're being chased, even though the apartment is quiet and
    nothing is actually wrong. Tomorrow there's a standup, and a one-on-one, and the
    same buzzing dread that's been your roommate for two years now.
  what_they_need: To understand that the alarm is not a character flaw or a failure
    of discipline — it's an instrument doing exactly what it was trained to do, pointed
    at the wrong target. They need to feel that they can stop bracing without losing
    their edge, and that calm is not something to be earned by hitting the next milestone.
  what_they_avoid: White-knuckle resilience and 'just push through.' Optimization
    framed as healing — habit stacks, cold plunges, another app, another protocol.
    Performative calm and toxic positivity. Anything that treats their exhaustion
    as a discipline problem and leaves them more depleted and more alone than before.
series_voice_markers:
  register: steadying, warm, plainspoken — the voice of someone who has sat in the
    same dark and isn't trying to fix you, only to keep you company until the water
    settles; never clinical, never a pep talk, never hustle dressed as healing
  sentence_rhythm: calm and unhurried, with the cadence of a slowing pulse — longer
    steadying sentences that let you exhale, broken by short, plain landings that
    hold; it slows the reader down on purpose
  metaphor_family: the harbor and the anchor line — still water inside the breakwater,
    the boat that stops pitching, the steady horizon, ground that holds in a storm,
    what keeps a person from drifting; never machinery, military, productivity, or
    biohacking
_needs_authoring: false
