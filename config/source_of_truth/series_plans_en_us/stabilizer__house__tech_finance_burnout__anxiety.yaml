reader_promise_family: A harbor for the high-performing mind that can model everything
  except its own peace. Each book takes one shape of anxiety the tech-and-finance
  life breeds — the false alarm, the flood, the spiral, the shame, the grief, the
  comparison, the endless watch — and helps you set down the instrument you've turned
  on yourself, until the pitching stops and the water inside the breakwater goes still.
  No optimization. No new system. Just ground that holds while the storm passes.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- Don't Believe Everything You Think (Joseph Nguyen) — short, plainspoken volumes
  that loosen the grip of the anxious mind without a protocol
- The Let Them Theory (Mel Robbins) — a single steadying reframe carried with warmth
  across a reader's whole anxious life
- Unwinding Anxiety (Judson Brewer) — meets the high-functioning, analytical reader
  who wants to understand the mechanism, not just be soothed
