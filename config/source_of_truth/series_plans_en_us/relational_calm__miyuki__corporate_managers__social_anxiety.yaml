reader_avatar:
  age: 32-50
  where_they_are: It is 8:52 in the morning and the team is filing into the conference
    room. You called this meeting. You are at the head of the table with your laptop
    open to an agenda you rewrote four times last night, and your heart is going as
    if something is about to happen — though nothing is, except that people are about
    to look at you and wait for you to begin. You smile. You say good morning in the
    steady voice you have practiced for years. Underneath it, you are bracing.
  what_they_need: To understand that the fear firing in safe rooms is not a character
    flaw or a leadership gap — it is an alarm misreading the room — and to be met
    without being managed; to stop treating their own nervous system as one more underperformer
    to coach; to feel, for once, like the steady voice and the bracing body can occupy
    the same room without one having to win.
  what_they_avoid: Communication hacks, executive-presence coaching, power-posing,
    fake-it-till-you-make-it, anything that frames their fear as a personal-brand
    problem to optimize, and self-help that adds five more techniques to a mind already
    running too many.
series_voice_markers:
  register: spare, clear, unadorned; a quiet presence that strips away the noise rather
    than adding to it; gentle and direct, addressed to one tired person in the next
    room, never to a conference hall; never clinical, never preachy, never hustle
  sentence_rhythm: short declaratives that land and leave space, set against the occasional
    longer line that opens and exhales; deliberate white space between thoughts; the
    unsaid given room to settle; no piled-up clauses, no exclamation, no jargon
  metaphor_family: bare form and empty space — the room with nothing extra in it,
    the threshold and the doorway you keep approaching, the stillness between two
    people, the unsaid that settles, clean morning light, the breath in a quiet room,
    what remains when the clutter falls away
_needs_authoring: false
