reader_promise_family: 'For the manager who looks composed in every room and is bracing
  the whole time: a quiet, unhurried companion that meets your social fear without
  trying to coach it away — no scripts, no performance, no more noise added to an
  already-crowded mind. Each book enters the same fear through a different door, and
  none of them asks you to perform calm. They ask you to set the performance down.'
bestseller_hook_family: ''
emotional_engine: social_anxiety_recognition
comp_series:
- The Let Them Theory / Mel Robbins single-volume (Mel Robbins) — names the exhausting
  habit of managing how others see you and hands it back, which is exactly the load
  these managers carry into every room
- Unfu*k Yourself series (Gary John Bishop) — direct, stripped-down, second-person
  address with no fluff, the same plainspoken register Bare Form Books reaches for
  without the swagger
- The Wisdom of Anxiety (Sheryl Paul) — treats anxiety as a signal to be met rather
  than a defect to be fixed, the same refusal-to-coach-it-away stance that defines
  this series
