reader_promise_family: You will learn to listen to your anxious body instead of overriding
  it — to feel the alarm, the flood, the spiral, the shame, the grief, the comparison,
  and the endless watching as messages from a nervous system trying to keep you safe,
  not as flaws to fix. Nothing here pushes through. Everything here helps you come
  back to the ground beneath you.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational case that anxiety
  lives in the body and heals through the body, not around it
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — written
  for depleted professional women who need to complete the stress response somatically,
  not just understand it'
- 'Anchored: How to Befriend Your Nervous System Using Polyvagal Theory (Deb Dana)
  — a warm, practical, body-first companion for learning to feel safe again instead
  of overriding the alarm'
