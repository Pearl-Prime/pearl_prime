reader_avatar:
  age: early 30s to early 40s
  where_they_are: It's a Tuesday night and she's still at her desk with three tabs
    of unsent emails open, jaw tight, shoulders up near her ears, telling herself
    she'll relax once this one last thing is handled — except there is always one
    last thing, and her chest has been bracing since the morning standup for a danger
    she can't actually name.
  what_they_need: A way to feel safe in her own body again that doesn't ask her to
    perform calm, hit a metric, or out-discipline her own nervous system — slow, somatic,
    trauma-informed, the felt sense of the ground coming back under her.
  what_they_avoid: Hustle-coded 'mind over matter' fixes, cold clinical protocols,
    optimization language, anyone who tells her to just breathe and push through,
    and anything that reawakens the intensity instead of softening it.
series_voice_markers:
  register: embodied, grounded, gently somatic and trauma-informed; the voice of a
    felt-sense guide who speaks from and to the body — a hand on the back, not a clipboard;
    never clinical, never hustle, never pushing through
  sentence_rhythm: slow and settling, with deliberate pauses; short declarative sentences
    that let the body catch up, opening into one longer breath-shaped line and returning
    to stillness — paced like an exhale
  metaphor_family: the body's felt sense; breath and grounding; tension held and released;
    the nervous system settling like weather after a storm; the ground beneath you;
    warmth returning to a place that has been braced for a long time
_needs_authoring: false
