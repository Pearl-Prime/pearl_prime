reader_promise_family: You will be met where you actually are — depleted, still showing
  up, with nothing left over — and offered not a harder way to cope but permission
  to set something down. No optimizing, no system, no becoming the calmer parent by
  trying harder. Just the quiet recognition that what you're carrying is too heavy
  for anyone, and the slow return of room to breathe in the middle of a life that
  won't pause.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — names burnout as an unfinished stress cycle, not a personal failing, for readers
  carrying too much'
- The Book You Wish Your Parents Had Read (Philippa Perry) — speaks to depleted, well-meaning
  parents with warmth instead of one more standard to fail
- How to Keep House While Drowning (KC Davis) — releases overwhelmed caregivers from
  moral judgment about not keeping up, replacing shame with gentleness
