reader_avatar:
  age: 32-46
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is running,
    and you're sitting on the edge of the bed with your phone in your hand, not even
    reading it — just staring at the unanswered work message you'll have to deal with
    before 8am. You meant to have something left over by now, for yourself, for your
    partner. There's nothing. There hasn't been in a long time.
  what_they_need: To hear that they are not failing at parenting or at work, that
    the exhaustion is not a character flaw, and that running on empty for years is
    a matter of capacity exceeded — not a deficit of love, discipline, or grit. They
    need permission to stop earning rest, and a way to find a little room without
    first clearing the impossible backlog of their life.
  what_they_avoid: Hustle-culture morning routines, 'optimize your family systems,'
    productivity-parenting hacks, just-meditate platitudes, toxic positivity about
    gratitude, and anything that turns recovering from burnout into one more thing
    they're behind on and failing to do well.
series_voice_markers:
  register: contemplative, spacious, grounded; an unhurried presence who has sat in
    this same depletion and is speaking quietly across the kitchen table, not from
    a stage or a clinic — never a coach, never a guru, never hustle
  sentence_rhythm: long, settling sentences that arrive at rest, broken by short plain
    ones that land like an exhale; the cadence of someone who has slowed down on purpose
    and is making room for the reader to slow down too
  metaphor_family: stillness, breath, settling water, open ground, light through a
    window at the end of the day, the pause between one demand and the next — never
    machinery, calendars, throughput, or biohacking
_needs_authoring: false
