reader_promise_family: You will learn to feel what your body has been holding, and
  to let it move through you — without forcing, fixing, or overriding the very system
  trying to protect you. Recognition before resolution; safety before change.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the canonical trauma-and-the-body
  reference these readers already trust
- Waking the Tiger (Peter Levine) — somatic experiencing as gentle, nervous-system-honoring
  release rather than re-exposure
- My Grandmother's Hands (Resmaa Menakem) — embodied, trauma-informed healing written
  in warm, non-clinical, body-first language
