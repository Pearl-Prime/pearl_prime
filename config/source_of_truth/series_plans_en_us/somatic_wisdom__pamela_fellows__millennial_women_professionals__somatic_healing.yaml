reader_avatar:
  age: early-to-late thirties
  where_they_are: It's 6:40pm and she's still at her desk with her shoulders up around
    her ears, jaw tight, a low hum of dread she can't trace to anything specific;
    she gets home, finally sits down, and her body still won't let go — like it's
    bracing for a hit that already landed years ago.
  what_they_need: to understand what her body is doing and why it makes sense; small,
    portable ways to come back into her body between meetings, on the train, at 3am;
    permission to stop treating her own nervous system as a problem to be solved
  what_they_avoid: push-through advice, 'mind over matter', cold clinical worksheets,
    breathwork bootcamps, anything that asks her to white-knuckle through or relive
    the worst of it to 'process' it
series_voice_markers:
  register: embodied, grounded, gently somatic; a felt-sense guide who speaks from
    and to the body, trauma-informed, never clinical and never hustle — the voice
    of someone who has sat with their own held tension and stopped fighting it
  sentence_rhythm: unhurried, breath-paced; short grounding sentences that let you
    land, then a longer one that widens out; frequent second-person address; pauses
    you can feel
  metaphor_family: the body's felt sense, breath and grounding, tension held and released,
    the nervous system settling like weather clearing, the ground beneath you, warmth
    returning to a braced place
_needs_authoring: false
