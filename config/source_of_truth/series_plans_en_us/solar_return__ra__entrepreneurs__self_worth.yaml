reader_promise_family: 'For the founder whose worth got fused to the business: a warm,
  unhurried companion that separates who you are from how the venture is doing — and
  tends the ember of your own value back to flame without a single line about growth,
  optimization, or grinding harder.'
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Gifts of Imperfection (Brené Brown) — names the shame-and-worthiness wound directly
  and gives permission to lay down the armor instead of working harder.
- Radical Acceptance (Tara Brach) — the same warm, non-clinical hand on the part of
  you that believes something is wrong with you, met with tenderness rather than a
  fix.
- The Mountain Is You (Brianna Wiest) — speaks to the high-achiever who self-sabotages
  from a buried sense of unworthiness, in a reflective tone close to Ember & Ash's
  own.
