  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 32-48
  where_they_are: 'It''s late, the laptop is finally closed, and you''re sitting in
    the dark of the office that doubles as your bedroom doing the math one more time
    — runway, the deal that went quiet, the founder on your feed who just raised again.
    The numbers are fine, or they''re not, but either way the feeling is the same:
    that if the business is struggling, then you are the thing that''s failing, and
    if it''s winning, you still don''t quite get to feel it.'
  what_they_need: To feel, in their body and not just as an idea, that they are a
    person worth tending separate from the venture — and to be met by a voice that's
    warm and a little fierce on their behalf, that lets them set the metrics down
    without telling them to hustle differently.
  what_they_avoid: Grindset, 'manifest the next round', founder-hustle mythology,
    toxic positivity, productivity hacks, and any voice that treats their worth as
    a KPI to be optimized.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of someone who has sat in
    the same dark office and refuses to let you confuse a hard quarter with a verdict
    on your soul; affirming without hype, tends rather than pushes, never a coach
    and never a clinician
  sentence_rhythm: second person throughout; mostly short, banked sentences that breathe,
    opening into one longer warming line when the truth needs room; plainspoken, unhurried,
    never a bullet-point pep talk
  metaphor_family: ember and ash, banked fire and slow rekindling, the dark before
    dawn and first light, warmth returning to cold hands, the turning of the year,
    what survives the burn and grows back green — never machinery, military, funnels,
    or biohacking
_needs_authoring: false
