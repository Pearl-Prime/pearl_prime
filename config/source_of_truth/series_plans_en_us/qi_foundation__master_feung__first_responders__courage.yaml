reader_promise_family: Courage you can return to from the root — not nerve borrowed
  from adrenaline, but a steady ground that refills from below, so the people who
  run toward the emergency can finally let something rise back up in themselves.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- Bessel van der Kolk's The Body Keeps the Score companion works — why bodies that
  have seen too much hold it low and need somatic, not cognitive, repair
- Brené Brown's Daring Greatly series — courage reframed as showing up vulnerable,
  not as armor
- Mark Nepo's The Book of Awakening — unhurried, root-deep daily attention for people
  worn thin by what they carry
