reader_promise_family: A still place to set down a manager's anxiety — not a faster
  way to manage it. Each book walks one doorway into the worry that follows you home,
  and asks nothing of you but to slow down enough to see it clearly.
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- The Daily Stoic series (Ryan Holiday) — short, returnable readings that meet an
  over-managing mind without demanding more of it
- The Untethered Soul / The Surrender Experiment (Michael A. Singer) — interior, unhurried,
  more concerned with seeing the mind than fixing it
- Wherever You Go, There You Are (Jon Kabat-Zinn) — plainspoken mindfulness without
  the wellness performance, for readers who distrust hype
