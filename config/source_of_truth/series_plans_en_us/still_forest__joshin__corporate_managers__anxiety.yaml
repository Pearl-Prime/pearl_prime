reader_avatar:
  age: late 30s to early 50s
  where_they_are: It's 6:40pm and the office has emptied, but you're still at your
    desk with one lamp on, re-reading a message you already answered, rehearsing tomorrow's
    standup, certain you've forgotten something you can't name. The building is quiet.
    Your mind is not.
  what_they_need: To stop performing calm and actually feel it — to understand the
    anxiety underneath the competence instead of out-working it, and to be met by
    a voice that doesn't hand them another system to run.
  what_they_avoid: Self-optimization, quick-calm hacks, performative mindfulness,
    toxic positivity, hustle culture, and any book that tries to hurry a mind that
    needs to slow down.
series_voice_markers:
  register: still, deep, woodland-quiet — the calm of a forest interior; unhurried
    and spacious, never clinical, never preachy, never hustle; a voice that lets silence
    do the work
  sentence_rhythm: long unhurried lines that open into space, then a short one that
    lands and lets the reader breathe; paced like a slow walk on a soft path, never
    urgent, never clipped
  metaphor_family: the still forest and its deep quiet — old trees and patient roots,
    light filtering through canopy, the path that slows you, the pool that goes clear
    when it stops being stirred, the forest floor that holds what falls
_needs_authoring: false
