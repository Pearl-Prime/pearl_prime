reader_promise_family: A quiet that does not require you to fix yourself first. For
  the mid-life mind caught between aging parents and growing kids, these books slow
  the overthinking instead of trying to silence it — meeting the worried mind in the
  deep stillness of a forest, where what you cannot solve is finally allowed to simply
  be held.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — same project of loosening the grip
  of the inner voice rather than winning an argument with it, in a quiet, non-clinical
  register
- Don't Believe Everything You Think series (Joseph Nguyen) — shares the core promise
  that the overthinking mind can be met and softened instead of forcibly stopped
- How to Do the Work / self-healing series (Nicole LePera) — speaks to the same mid-life
  reader doing the inner work alone at night, with warmth and without hustle
