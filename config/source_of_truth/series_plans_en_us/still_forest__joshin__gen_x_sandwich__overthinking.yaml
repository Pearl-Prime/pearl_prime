reader_avatar:
  age: 47-58, the sandwich generation
  where_they_are: It is past midnight on a weeknight. The dishwasher has finished
    its cycle, the kids' doors are shut, a parent's pill organizer is filled for the
    week, and the house is finally quiet — and that is exactly when the mind comes
    alive, running the numbers on the mortgage and the MRI results and the kid who
    didn't text back, turning one small worry over and over until the ceiling goes
    gray with morning.
  what_they_need: To be met as the competent, loving, exhausted person they are —
    not pathologized, not coached, not told to do more. They need permission to set
    the worried mind down without first defeating it, and a voice that moves slowly
    enough for a nervous system that has forgotten how to.
  what_they_avoid: Self-optimization and life-hack calm, performative mindfulness,
    toxic positivity, hustle-culture striving, breathing 'tricks' that become one
    more task to fail at, and any book that treats their overthinking as a defect
    to be eliminated rather than a tired, loyal part of them to be understood.
series_voice_markers:
  register: Still, deep, and woodland-quiet — the calm of a forest interior at dusk.
    Unhurried and spacious, it lets silence do the work; warm and plainspoken, never
    clinical, never preachy, never a single note of hustle. The voice of someone who
    has walked the same dark path and sat down beside you on it.
  sentence_rhythm: Long, slow, breathing sentences that open like a clearing, broken
    by short ones that land like a footstep on soft ground. Pauses you can feel. Nothing
    hurried, nothing clipped — the cadence of a mind being allowed to slow down rather
    than ordered to.
  metaphor_family: 'The still forest and its deep quiet: old trees and patient roots,
    light filtering down through the canopy, the path that slows your step, the pool
    that goes clear only when it stops being stirred, the forest floor that holds
    whatever falls. Never machinery, never military, never productivity or biohacking.'
_needs_authoring: false
