reader_promise_family: Your body has been carrying what your job taught you to override.
  This series doesn't ask you to fix it or feel better on a schedule — it teaches
  you to recognize what your nervous system is doing, name it in language you can
  use between meetings, and let what's been held begin to settle. Not a method. A
  way of coming back to the body you've been running on.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational trauma-and-body
  text these readers have heard of and want translated into something they can practice
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the unfinished stress response living in the body, for high-functioning professionals'
- When the Body Says No (Gabor Maté) — the cost of chronic self-override and held
  emotion, written for the capable people who never stop
