reader_avatar:
  age: 38-52
  where_they_are: It's 6:40pm and the office has gone quiet, but your shoulders are
    still up around your ears the way they've been since the 9am stand-up. You're
    scrolling Slack you don't need to read, jaw set, chest oddly tight, and you can't
    tell whether you're tired or afraid — only that you can't seem to land in your
    own body, and a part of you suspects it's been like this for years.
  what_they_need: To understand that the bracing, the clenching, the 3am alertness
    are not character flaws or weakness — they are a nervous system that learned to
    stay ready, and they can be worked with through recognition and slow descent rather
    than more discipline.
  what_they_avoid: Hustle-culture fixes and optimize-your-mindset advice; morning-routine
    evangelism; just-breathe platitudes that ignore the body; toxic positivity; anything
    that turns nervous-system regulation into one more KPI to hit and fail.
series_voice_markers:
  register: contemplative, spacious, grounded; the voice of someone who has sat in
    this themselves and is speaking to you quietly across a table — never clinical,
    never a coach, never selling you a transformation
  sentence_rhythm: unhurried; short declarative sentences that land and then leave
    room; an occasional long sentence that follows a sensation all the way down before
    it stops; deliberate white space, the way a held breath finally lets go
  metaphor_family: stillness and settling water, breath and the pause between breaths,
    open ground, light coming through a window late in the day, weight set down, the
    body as something you can finally return to — never machinery, never optimization,
    never the battlefield
_needs_authoring: false
