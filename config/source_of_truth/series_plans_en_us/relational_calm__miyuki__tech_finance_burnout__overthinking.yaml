reader_promise_family: A quiet room for the over-analyzing mind. We will not teach
  you to think faster or argue better. We will help you set the extra thinking down,
  see the bare shape of what is actually here, and let the silence between thoughts
  come back.
bestseller_hook_family: ''
emotional_engine: overthinking_recognition
comp_series:
- Don't Believe Everything You Think (Joseph Nguyen) — strips overthinking down to
  the thought beneath the thought; the same bare, anti-hack register.
- The Untethered Soul (Michael A. Singer) — quiet, spacious teaching about watching
  the mind instead of obeying it; matches the stillness this series promises.
- Stop Overthinking (Nick Trenton) — same core sufferer and search intent, but our
  series answers it with bare-form calm instead of technique stacking.
