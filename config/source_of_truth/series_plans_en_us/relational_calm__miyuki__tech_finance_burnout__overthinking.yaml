  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 29 to 44
  where_they_are: It is 11:40 on a Tuesday night. The laptop is shut but you are still
    in the meeting, replaying the one sentence you said wrong, drafting the Slack
    message you will not send, running the same loop you ran an hour ago. The room
    is dark and quiet and your mind is the only thing still working overtime.
  what_they_need: Permission to stop solving. A way to tell a real signal from a false
    one. Enough quiet to hear their own life again, without a single hack, framework,
    or optimization layered on top.
  what_they_avoid: Productivity systems, 'communication hacks', mindset hustle, forced
    positivity, and any book that treats their overthinking as one more thing to fix
    faster.
series_voice_markers:
  register: spare, clear, unadorned; a quiet presence in the room rather than a coach
    at a whiteboard; gentle and direct, never clinical, never preachy, never hustle
  sentence_rhythm: short declaratives that land and stop; the occasional long sentence
    that opens like a held breath, then a deliberate pause; plenty of white space,
    nothing crowded
  metaphor_family: bare form and empty space, the room with nothing extra in it, the
    stillness between two people, the unsaid that finally settles, clean light, the
    breath in a quiet room, what remains when the clutter falls away
_needs_authoring: false
