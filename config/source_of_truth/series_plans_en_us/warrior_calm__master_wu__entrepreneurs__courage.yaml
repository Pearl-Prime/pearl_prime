  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 32-48
  where_they_are: It's 11pm and the office is empty. The pitch is in nine hours, or
    the launch goes live Monday, or the offer letter is sitting unsent in drafts.
    You've read the deck four times. Your chest is tight, your jaw is set, and you've
    already rehearsed every way it goes wrong. Everyone thinks you're the brave one.
    You're sitting in the dark wondering when you'll feel ready enough to actually
    press send.
  what_they_need: To recognize that the fear at the edge is not a verdict on their
    readiness, and to find a steadier place to act from — one decision, one step,
    before the fear has fully cleared.
  what_they_avoid: Hustle-culture grind, 'no pain no gain' bravado, toughness-as-armor,
    pump-up motivation, toxic positivity, and anything that mistakes louder for braver.
series_voice_markers:
  register: grounded, disciplined, quietly strong — a warrior's calm that meets fear
    without flinching; steady and spare, the voice of someone who has stood at the
    edge themselves and is standing beside you, not above you; never clinical, never
    preachy, never hustle
  sentence_rhythm: short, weighted sentences with room to breathe between them; a
    steadying cadence, like a hand on the shoulder before the door opens; plain words,
    no jargon, the occasional long line that lands and then stops
  metaphor_family: the still center in the storm, the gate that holds, the edge and
    the single step, the breath before action, trained calm under pressure, what is
    forged and what holds, the warrior with nothing left to prove — never machinery,
    productivity, or biohacking
_needs_authoring: false
