reader_avatar:
  age: 28-52
  where_they_are: It is 3am after a back-to-back run of calls and you are lying flat
    in a dark room, off-shift, supposedly resting — but your jaw is set, your shoulders
    are still up around your ears, and your body is scanning the ceiling like a radio
    that won't switch off. You did the job. You're home. And still something in you
    is braced for the tones to drop.
  what_they_need: To understand that the bracing, the looping, the held breath are
    not weakness or damage but a nervous system that learned to survive — and to be
    met by a voice that holds that without trying to talk them out of it or hand them
    another protocol to run.
  what_they_avoid: Push-through toughness, 'stay strong for the crew' platitudes,
    sleep-hacking and optimization, toxic positivity, anything clinical that turns
    their body into a problem to be solved, and anything that rushes them past the
    grief they haven't had time to feel.
series_voice_markers:
  register: steady, nocturnal, quietly architectural — a calm presence who sits with
    you through the heavy hours after a shift; holds without fixing; never clinical,
    never a coach, never hustle
  sentence_rhythm: unhurried and plainspoken; short declaratives that land like a
    hand set on a shoulder, opening into longer settling lines that give the body
    room to exhale; second person throughout
  metaphor_family: night and the dark room, foundations and what bears weight, a load
    finally set down, the body settling toward rest, the long hours before dawn, the
    structure that holds you while you let go
_needs_authoring: false
