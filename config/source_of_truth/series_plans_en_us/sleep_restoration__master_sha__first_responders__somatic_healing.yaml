reader_promise_family: For the first responder whose body never fully clocks out —
  a steady, nocturnal companion that sits with what your nervous system has been holding
  since the last bad call, names it in language you can carry into the next shift,
  and asks nothing of you but to set the weight down for one honest hour. No toughening,
  no fixing, no rushing the grief out of you.
bestseller_hook_family: ''
emotional_engine: somatic_healing_recognition
comp_series:
- The Body Keeps the Score companion readers (van der Kolk-adjacent) — readers who
  want the somatic frame in a quieter, more personal register
- First, We Make the Beast Beautiful series-adjacent titles (Sarah Wilson) — anxiety
  memoir that sits beside the reader instead of prescribing
- When the Body Says No / trauma-and-the-nervous-system companion books (Gabor Maté-adjacent)
  — readers drawn to held bodies and unprocessed loss, not protocols
