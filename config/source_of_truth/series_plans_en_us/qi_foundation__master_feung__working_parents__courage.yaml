reader_promise_family: 'Courage, for the parent who is afraid and shows up anyway:
  not the absence of fear, but the slow return of deep ground beneath your feet —
  the well that refills from below, even on the days you give from empty.'
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- Good Inside (Becky Kennedy) — meets the same overwhelmed parent with warmth instead
  of optimization, naming the inner experience before the behavior
- The Book of Boundaries (Melissa Urban) — speaks to the exhausted caregiver in plain,
  permission-giving language without hustle or shame
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — body-first,
  anti-toxic-positivity, written for people running on empty who are tired of being
  told to push harder'
