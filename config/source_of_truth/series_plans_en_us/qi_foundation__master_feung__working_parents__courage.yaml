reader_avatar:
  age: 30s to mid-40s
  where_they_are: It is 6:14am. The lunch is half-made, one kid won't put shoes on,
    and you are already rehearsing the meeting you're late for — and underneath all
    of it runs a thin, constant current of fear that you are getting this wrong in
    some way you won't see until it's too late. You haven't sat down since you stood
    up. You won't until long after they're asleep.
  what_they_need: To understand that the courage parenting asks of them is not a feeling
    they're missing but a ground they can return to — and that the fear is not proof
    they're failing, only proof they're carrying something that matters.
  what_they_avoid: Energy-drink hustle and 'optimize your morning routine' advice;
    biohacking and performative wellness; toxic positivity that tells them to be grateful
    and present while they're running on three hours of sleep; anything that asks
    them to drain themselves further to look like they're coping.
series_voice_markers:
  register: grounded, restorative, quietly vital; warm and unhurried, the voice of
    someone who has knelt on the same kitchen floor at the same hour — never clinical,
    never preachy, never hustle
  sentence_rhythm: long settling sentences that let the breath reach bottom, broken
    by short ones that land like a hand on the back; patient, never rushed, the pace
    of sap rising rather than a clock
  metaphor_family: roots and meridians, deep ground and rising sap, the well that
    refills from below, breath reaching the lowest part of the lungs, vitality returning
    to a body that has been giving from the surface, what flows again when a long-held
    bracing finally lets go
_needs_authoring: false
