reader_avatar:
  age: 18-24, undergraduate or first-year grad student
  where_they_are: It's the second week of the semester and you're sitting in a lecture
    hall that feels three sizes too big for you, watching everyone else nod like they
    already understood the reading, while a single sentence loops behind your eyes
    — they're going to figure out I don't belong here. You got the acceptance, the
    scholarship, the spot. You still can't shake the feeling it was a clerical error.
  what_they_need: 'Permission to stop performing competence long enough to feel the
    truth: the doubt is not evidence. Plain, steady language that treats the fear
    seriously without pathologizing it, and a way to cross from bracing-to-be-exposed
    into simply being present in the work they actually earned.'
  what_they_avoid: Fake-it-til-you-make-it pep talks, 'manifest your confidence' affirmations,
    LinkedIn hustle energy, anything that tells them to fake a swagger they don't
    feel or that mistakes being loud for being secure. They've tried performing harder.
    It just made the gap between the mask and the face feel wider.
series_voice_markers:
  register: Encouraging, clear, steady — the voice of someone a few years ahead who
    remembers exactly what that lecture hall felt like and isn't going to lie to you
    about it. Warm and direct. Believes in you without flattering you. Never clinical,
    never preachy, never hustle.
  sentence_rhythm: Short declaratives that land like footsteps, opening into one longer,
    breathing sentence when something true needs room. Second person throughout. Plainspoken,
    never academic. Pauses where a real person would pause before saying the hard
    part.
  metaphor_family: Thresholds and doorways. The line on the floor you haven't crossed.
    The room you're standing outside of, hand on the frame. The held breath before
    you walk in. Who you become once you're on the other side. Crossing, entering,
    stepping through — never machinery, military, productivity, or biohacking.
_needs_authoring: false
