reader_promise_family: You will be met at the threshold of who you are becoming —
  the version of you that walks into the room without a script, without the certainty
  that you've fooled everyone, without waiting to be found out. Not louder. Not faker.
  Just here, on the other side of the doorway you've been standing in front of all
  semester.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Imposter Cure series adjacent — Dr. Jessamy Hibberd's work on imposter syndrome
  — because it names the fraud-feeling clinically; this series meets the same reader
  without the clinic, at the doorway instead
- Unfuck Your Brain (Faith G. Harper) — same plainspoken, non-preachy register for
  an anxious young reader, swapped for a steadier, warmer threshold voice
- The Self-Compassion companion works (Kristin Neff) — same insistence that you stop
  overworking to cover a defect you only imagine, reframed as crossing into who you're
  becoming rather than fixing who you are
