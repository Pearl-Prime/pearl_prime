reader_avatar:
  age: 11 to 17, middle and high school students of Gen Alpha
  where_they_are: It's almost midnight and the group chat is still going, the test
    is in the morning, and they're lying in bed scrolling through everyone else's
    highlight reel, replaying the one thing they said in class today that came out
    wrong, certain that everyone noticed and that it means something about who they
    really are.
  what_they_need: To hear, in plain language and without being talked down to, that
    their worth is not a score; that the feeling of being not enough is a feeling
    and not a fact; and that they are allowed to cross over into a steadier version
    of themselves without first fixing everything that feels broken.
  what_they_avoid: Adults who lecture, motivational-poster slogans, 'just believe
    in yourself' pep talks, anything that sounds like a teacher or a brand trying
    to be relatable, and the fake-it-til-you-make-it hype that tells them to perform
    a confidence they don't feel.
series_voice_markers:
  register: encouraging, clear, steady; warm and direct without flattering; speaks
    to a young person as a whole person, never clinical, never preachy, never hype;
    the voice of someone a few steps ahead at the doorway, holding it open
  sentence_rhythm: short, grounded sentences with room to breathe; plain words a fourteen-year-old
    uses; occasional one-line turns that land like a held breath before stepping through
  metaphor_family: the threshold and the doorway; crossing from one room into the
    next; the first step over a line on the floor; who you become on the other side;
    standing in the doorway before you walk through; the held breath before entering
_needs_authoring: false
