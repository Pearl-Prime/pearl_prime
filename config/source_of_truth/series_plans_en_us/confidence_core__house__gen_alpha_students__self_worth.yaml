reader_promise_family: 'You will learn to stand in the doorway of who you are becoming
  and recognize that your worth was never the thing being graded. Each book meets
  a student at the exact moment they decide something is wrong with them, and walks
  them back to the truth: you are not your worst day, your worst grade, or the version
  of you that everyone else seems to be winning at.'
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Self-Esteem Workbook for Teens (Lisa M. Schab) — plainspoken, non-clinical self-worth
  tools written directly for a young reader, not for the adult in the room
- You Are a Champion (Marcus Rashford) — a warm, encouraging voice that talks to kids
  as whole people about worth and self-belief without hustle or hype
- What Do You Say? (Rosalind Wiseman & Charlie Kuhn) — meets middle and high schoolers
  in their real social world of comparison, shame, and saying the wrong thing, with
  respect instead of lecture
