reader_promise_family: For the nurse who has spent a career proving she's worth keeping,
  a quiet return to the worth that was never in question — work that meets you in
  the armor, in the comparison, in the buried verdict that something is wrong with
  you, and lets the ground hold what your performance has been holding.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Body Keeps the Score (Bessel van der Kolk) — the foundational text on how survival
  lives in the body, which our somatic, root-level approach extends into self-worth.
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the over-functioning of caregiving women without shaming it, the same compassion
  our series carries onto the nursing floor.'
- The Gifts of Imperfection (Brené Brown) — meets shame and worthiness head-on with
  warmth instead of a fix, a kinship in register to what we offer the helping professions.
