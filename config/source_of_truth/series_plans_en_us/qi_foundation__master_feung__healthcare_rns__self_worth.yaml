reader_avatar:
  age: 31 to 52
  where_they_are: It's the end of a twelve-hour shift and she's still in the med room,
    charting a patient who already went home, double-checking a number she already
    triple-checked, because if she leaves and something is wrong it will be her name
    on it. The unit has emptied out. Through the glass she can see the charge nurse
    laughing at the desk, easy, finished, and she cannot remember the last time anything
    felt finished.
  what_they_need: To recognize that the over-functioning, the armor, the constant
    measuring against the nurse who seems to have it together is not who she is but
    what she built to survive — and to feel, in the body, that her worth was never
    the thing on trial.
  what_they_avoid: Anything that tells her to optimize her resilience, hustle her
    healing, or perform gratitude; bootstrap positivity that just adds another standard
    to fail; advice that drains the root to keep the surface running.
series_voice_markers:
  register: grounded, restorative, quietly vital; the voice of someone who has worked
    the floor and stopped pretending, speaking to you in the break room after everyone's
    gone — never clinical, never preachy, never hustle
  sentence_rhythm: unhurried and breath-led; short declaratives that land like a hand
    on the shoulder, opening into longer lines that follow the body down to the root
    before settling
  metaphor_family: roots and meridians, deep ground and rising sap, the well that
    refills from below, breath reaching the lowest part of the lungs, the blockage
    that finally clears and lets something flow again, vitality restored from the
    root upward
_needs_authoring: false
