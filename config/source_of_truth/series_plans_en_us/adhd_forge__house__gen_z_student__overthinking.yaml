reader_promise_family: >
  Your brain doesn't have an off switch, and you've stopped believing one exists.
  This series won't sell you the switch. Instead, across seven books, you'll learn
  to recognize what your loud, fast, looping mind is actually doing in the moment it
  does it — seven different doorways into the same overthinking, each one meeting you
  in the dorm room, the library carrel, the 2am scroll, in language that sounds like
  a friend who gets it and not a worksheet that doesn't.
bestseller_hook_family: recognition_descent
emotional_engine: overthinking_recognition
comp_series:
- "Unfuck Your Brain (Faith G. Harper) — irreverent, real-talk, science you can actually use"
- "How to Keep House While Drowning (KC Davis) — shame-free, meets you in the mess"
- "Detox Your Thoughts (Andrea Bonior) — naming the thought traps without the lecture"
