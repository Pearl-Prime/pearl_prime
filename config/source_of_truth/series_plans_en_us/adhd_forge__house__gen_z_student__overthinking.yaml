  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: "18–24"
  where_they_are: >
    It's 1:47am and they're lying in a twin XL bed, laptop hot on their chest, the
    same eleven-second thought looping for the hundredth time while the assignment
    they opened six hours ago still says page one.
  what_they_need: >
    Someone who talks to the loud, fast, looping mind like it makes sense — who names
    what's happening without diagnosing them, lecturing them, or handing them a system
    they'll abandon by Thursday.
  what_they_avoid: >
    Productivity bro advice. 'Just journal it out.' Anyone who calls them lazy, or any
    book that sounds like a clinic intake form or a parent who doesn't get it.
series_voice_markers:
  register: "warm, real-talk, literary-but-unpretentious; a slightly older friend who's been in the same dark dorm room and won't pretend they have it solved"
  sentence_rhythm: "fast and short when the mind races, then a sudden slow line that lands; fragments allowed; the rhythm of late-night texting, not a textbook"
  metaphor_family: "campus, screens, group chats, late-night rooms, weather, the body — never machinery, military, or clinical/diagnostic language"
  second_person_default: true
_needs_authoring: false
