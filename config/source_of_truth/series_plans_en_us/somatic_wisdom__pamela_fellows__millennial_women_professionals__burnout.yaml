reader_avatar:
  age: early-to-late thirties
  where_they_are: It's 6:40pm and she's still at the desk, jaw set, shoulders up by
    her ears, answering one more message she doesn't remember reading. The coffee
    went cold hours ago. She tells herself she'll rest this weekend, the way she told
    herself last weekend, and the weekend before that — and underneath the to-do list
    there's a quieter, scarier feeling she keeps not having time to feel.
  what_they_need: To be met as a body, not a problem to optimize — permission to stop
    performing recovery, a felt sense of the ground holding her, and a way to let
    years of held tension finally move instead of being managed.
  what_they_avoid: Hustle-coded 'reset your life in 30 days' systems, cold clinical
    burnout checklists, anything that says push through or mind-over-matter, and any
    practice that floods her with more intensity when she is already past capacity.
series_voice_markers:
  register: embodied, grounded, trauma-informed; a felt-sense guide who speaks from
    and to the body — the voice of someone who has sat on the same floor at the same
    hour, never a clinician, never a coach selling a transformation
  sentence_rhythm: unhurried and breath-paced; short declaratives that let a feeling
    land, then a longer settling sentence — the cadence of an exhale, with deliberate
    pauses where the body is invited to catch up
  metaphor_family: the felt sense; breath and grounding; tension held and released;
    the nervous system settling like weather passing; the ground beneath you; warmth
    returning to a braced place — never machinery, military, productivity, or biohacking
_needs_authoring: false
