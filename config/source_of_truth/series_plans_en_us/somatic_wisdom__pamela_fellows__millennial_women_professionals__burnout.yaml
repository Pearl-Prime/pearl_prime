reader_promise_family: 'Felt-sense recovery for the high-functioning woman who is
  running on empty: not another protocol to push through, but a way back into a body
  that has been bracing for years. Each book meets burnout through a different door
  and teaches the nervous system, gently, how to come down.'
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily Nagoski & Amelia Nagoski)
  — names burnout as a physiological cycle the body must complete, not a willpower
  problem'
- The Body Keeps the Score (Bessel van der Kolk) — the foundational case that healing
  lives in the body, in the same trauma-informed lineage these books speak from
- Burnout to Breakthrough (Eileen McDargh) — speaks directly to depleted high-achieving
  women without hustle framing, a near neighbor on the shelf
