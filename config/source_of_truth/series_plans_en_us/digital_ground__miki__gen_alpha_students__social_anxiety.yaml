reader_promise_family: We will not tell you to log off, touch grass, or just put yourself
  out there. We sit with you in the exact moment social anxiety hits — the group chat
  left on read, the seat you don't take, the party you're already rehearsing in the
  bathroom — and name what your body is doing in language you can actually use, without
  ever treating you like a problem to optimize or a brand to grow.
bestseller_hook_family: ''
emotional_engine: social_anxiety_recognition
comp_series:
- Insecure (TV adaptation companions) / What I Wish I Knew at 18 (Dennis Trittin)
  — peer-voiced guidance for the just-out-of-childhood reader who hates being lectured
- The Anxiety Survival Guide for Teens (Jennifer Shannon) — names the anxious-brain
  mechanism for high schoolers without clinical distance
- How to Be Yourself (Ellen Hendriksen) — social anxiety treated as a misfiring system,
  not a character flaw, in warm second person
