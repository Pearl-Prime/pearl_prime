reader_avatar:
  age: 14 to 18, high school, the first fully screen-native generation
  where_they_are: Standing at the edge of the cafeteria with a tray that's getting
    heavy, scanning for a table where you won't have to ask, while your phone buzzes
    with a group chat you can see everyone else is in.
  what_they_need: To understand that the dread before they say anything out loud isn't
    proof they're broken — it's an old alarm misfiring — and to have words for it
    that don't come from a 50-year-old guidance counselor or a TikTok telling them
    to fake confidence.
  what_they_avoid: Boomer self-help, 'just be yourself' platitudes, grindset confidence
    hacks, toxic positivity, and anyone who acts like being anxious online is a personal
    failure instead of a Tuesday.
series_voice_markers:
  register: Gen-z native, screen-literate, plainspoken and warm; the voice of a slightly-older
    friend who actually gets the internet — ironic without being cynical, never clinical,
    never a coach, never hustle
  sentence_rhythm: Short declaratives that land like texts, then one longer breath
    that opens up; second person throughout; fragments only when a teenager would
    actually pause there; no jargon, no worksheet voice
  metaphor_family: The present moment, the body in the room, the phone face-down,
    ground under your feet, the breath between notifications, signal cutting through
    noise — never productivity, machinery, military, or self-optimization
_needs_authoring: false
