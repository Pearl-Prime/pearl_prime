reader_avatar:
  age: 32-46
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is humming,
    and you're standing in the dark kitchen with a cold cup of tea you forgot to drink
    — running tomorrow's drop-off, the unsent work email, and the thing the pediatrician
    said, all at once, while your chest stays tight for no reason you can point to.
  what_they_need: To feel that someone understands the particular fear of being responsible
    for small humans while running on empty — and to be shown how to come back to
    themselves for a few honest minutes, without one more system to fail at.
  what_they_avoid: Clinical worksheets, 'optimize your morning' productivity gospel,
    hustle-coded calm, performative spirituality, and toxic positivity that tells
    them to just be grateful — anything that turns a tender inner life into one more
    thing to manage.
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous — the voice of someone who
    has sat where you sit, speaking close and unhurried; never clinical, never preachy,
    never hustle
  sentence_rhythm: warm and unhurried; short, steadying sentences set beside longer
    ones that open and breathe; a cadence you can read with a tight chest and feel
    it loosen
  metaphor_family: the heart and what passes between two of them, light handed from
    one palm to the next, the warmth of presence in a quiet room, the open hand, breath
    shared, what is transmitted without words — never machinery, military, productivity,
    or biohacking
_needs_authoring: false
