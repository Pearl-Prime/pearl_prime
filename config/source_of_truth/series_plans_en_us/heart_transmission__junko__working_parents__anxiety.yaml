reader_promise_family: 'For the working parent whose body never quite stands down
  — held close and told the truth: your anxiety is not a flaw in you, it is a tender
  part of you that has been on duty too long, and it can be met with warmth instead
  of war.'
bestseller_hook_family: ''
emotional_engine: anxiety_recognition
comp_series:
- Good Inside (Dr. Becky Kennedy) — the same close, non-shaming voice for overwhelmed
  parents, met here for the parent's own nervous system rather than the child's
- The Book of Calm series (Travis Hellstrom) — short, soothing, repeatable entries;
  this series matches the gentleness but anchors every page in a working parent's
  real evening
- Real Self-Care (Dr. Pooja Lakshmin) — shares the refusal of performative, optimize-yourself
  wellness; this series carries that refusal into the specific fear of parenting while
  depleted
