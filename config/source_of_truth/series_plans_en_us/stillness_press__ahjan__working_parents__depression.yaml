reader_avatar:
  age: 32-46
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is running,
    and you're sitting on the edge of the bed you haven't gotten into yet — phone
    in hand, not reading it. Tomorrow's lunches aren't made. You used to feel things
    about days like this; now there's just a flat grey hum where the feeling should
    be. You tell everyone you're tired. Tired isn't the word, but it's the one that
    doesn't lead to more questions.
  what_they_need: To hear that the numbness is not laziness or ingratitude — that
    a flattened, can't-feel-it depression is a real thing the mind does to survive
    a load that never lets up. To be met without being fixed, and to find one honest
    place to set the weight down for an hour without abandoning anyone.
  what_they_avoid: Hustle-culture pep talks, 'just be present with your kids' guilt,
    gratitude-journal homework, optimize-your-morning routines, toxic positivity,
    and any book that adds a self-improvement task to a life that is already at capacity.
series_voice_markers:
  register: contemplative, spacious, grounded; the unhurried voice of someone who
    has sat in the same grey themselves and is not in a hurry to pull you out of it
    — never clinical, never a coach, never hustle
  sentence_rhythm: long settling sentences that let a breath land, broken by short
    plain ones that tell the truth; the pace of someone speaking quietly across a
    kitchen table late at night, leaving room between the lines
  metaphor_family: stillness and weather — settling water, low grey light, the pause
    between, open ground, the weight you've been carrying, the lamp left on in a dark
    house — never productivity, machinery, military, or biohacking
_needs_authoring: false
