reader_promise_family: For the working parent who is quietly going under — not the
  loud kind of depression, but the grey, going-through-the-motions kind that hides
  behind packed lunches and a working smile. This series doesn't ask you to feel grateful
  or push through. It sits beside the part of you that has nothing left, and helps
  you recognize what the flatness has been protecting — without turning your own recovery
  into one more thing you're failing at.
bestseller_hook_family: ''
emotional_engine: depression_recognition
comp_series:
- Reasons to Stay Alive / Notes on a Nervous Planet (Matt Haig) — plainspoken, non-clinical
  companionship for depression that refuses to perform recovery
- The Comfort Book (Matt Haig) — short, spacious passages you can read when you have
  nothing left, made for the grey days rather than the good ones
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the exhaustion of carrying invisible labor without shaming the one carrying it'
