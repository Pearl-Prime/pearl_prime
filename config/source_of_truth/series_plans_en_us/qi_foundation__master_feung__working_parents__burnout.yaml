reader_promise_family: For the working parent running on empty, a way back to the
  root — not more output, but the deep, unhurried return of the energy that should
  have been yours all along.
bestseller_hook_family: ''
emotional_engine: burnout_recognition
comp_series:
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  depletion as a body-level cycle, not a willpower failure, the way this series does'
- How to Keep House While Drowning (KC Davis) — meets the exhausted parent with radical
  gentleness instead of one more system to fail at
- The Book of Boundaries (Melissa Urban) — for the reader who suspects the cost of
  being endlessly available is their own vitality
