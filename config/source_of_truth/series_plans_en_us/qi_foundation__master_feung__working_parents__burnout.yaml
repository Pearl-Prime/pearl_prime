  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 32-46
  where_they_are: It's 9:40pm. The kids are finally down, the dishwasher is groaning,
    and you're standing in the kitchen you just wiped clean with no idea what you
    came in for. There's a to-do list glowing on your phone and a deeper, wordless
    tiredness underneath it that sleep hasn't touched in months.
  what_they_need: To feel something at the very bottom refill — not a productivity
    reset, but permission to stop running the surface dry, and a slow, grounded way
    to let their own energy come back up from the root.
  what_they_avoid: Hustle culture, 'optimize your morning,' biohacking stacks, 5am
    cold plunges, anything that treats their exhaustion as a performance problem or
    asks them to squeeze one more drop from a body that has nothing left to give.
series_voice_markers:
  register: grounded, restorative, quietly vital; the voice of someone who has sat
    with their own depletion and come back, speaking low and unhurried across the
    kitchen table — never clinical, never a coach, never selling you a better version
    of yourself
  sentence_rhythm: long settling sentences that let the breath drop, broken by short
    ones that land like a hand on the shoulder; pauses where you'd actually exhale
  metaphor_family: roots and meridians, deep ground and rising sap, the well that
    refills from below, breath reaching the lowest part of the lungs, what flows again
    once a blockage clears, vitality returning from underneath rather than driven
    from above
_needs_authoring: false
