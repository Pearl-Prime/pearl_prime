reader_promise_family: |
  You'll learn to recognize what your anxious body is doing without needing to make it stop. Seven different shapes of the same underlying capacity: noticing-without-fixing.
bestseller_hook_family: recognition_descent
emotional_engine: anxious_recognition
comp_series:
- Unwinding Anxiety (Judson Brewer) — mechanism + noticing register
- When Things Fall Apart (Pema Chödrön) — surrender + non-reactivity register
- The Happiness Trap (Russ Harris) — ACT informal voice
platform_strategy:
  primary:
  - kdp_ebook
  - audible
  secondary:
  - apple_books
  - google_play
  - spotify_audiobooks
  launch_platform: kdp_ebook
  cadence:
    release_spacing_days: 14
    max_books_per_brand_per_month: 2
reader_avatar:
  age: 22–29
  where_they_are: |
    Lives alone or with roommates in a city. First real job (or between them). Wakes up to a racing mind. Already tried breathing apps — they didn't stick. Reads first thing in morning, last thing at night.
  what_they_need: |
    Someone who doesn't promise the anxiety will stop. Someone who makes sense of what the body is doing in a way that's neither medical nor spiritual.
  what_they_avoid: |
    Productivity framing. "Hack your anxiety." Toxic positivity. Prescriptive 5-step plans.
series_voice_markers:
  register: intimate, conversational, no management-speak
  sentence_rhythm: short sentences dominant, occasional long contemplative stretches
  metaphor_family: body, nature, weather — never productivity, mechanical, military
  second_person_default: true
  taboo:
  - No 'rewire your brain' language
  - No morning-routine prescriptions
  - No references to therapy as solution (it is ONE path among many)
  - No religious framing
