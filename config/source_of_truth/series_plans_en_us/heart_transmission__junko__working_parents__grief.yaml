reader_promise_family: You don't have to be done grieving to be a good parent. This
  series sits with the mother and father who lost someone and never got to fall apart
  — and it offers no schedule, no stages to complete, only the company of a voice
  that understands what it is to hold a loss in one hand and a child's hand in the
  other.
bestseller_hook_family: ''
emotional_engine: grief_recognition
comp_series:
- It's OK That You're Not OK (Megan Devine) — refuses the grief-stages script and
  meets loss as something to be carried, not cured
- The Year of Magical Thinking (Joan Didion) — the disorienting, ongoing aftermath
  of losing someone while life keeps demanding you function
- Bearing the Unbearable (Joanne Cacciatore) — tender, unhurried companionship for
  the bereaved that never rushes them toward 'better'
