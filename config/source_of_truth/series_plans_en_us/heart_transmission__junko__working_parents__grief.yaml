reader_avatar:
  age: 32-48
  where_they_are: It's 7:40am and you're packing a lunch with hands that still work
    even though the rest of you stopped a while ago. Someone is gone. The kids need
    their shoes. You smiled at the school gate yesterday and a parent said how well
    you're coping, and you wanted to lie down on the pavement. Tonight, after the
    house goes quiet, the grief will come and find you in the kitchen — and you'll
    have maybe twenty minutes before someone calls for water.
  what_they_need: Permission to grieve in the cracks of a life that won't pause for
    them — to be told the love and the loss can live in the same body as the lunchboxes
    and the bedtimes, and that they are not failing their children by being a person
    who is hurting.
  what_they_avoid: Stages-of-grief checklists, 'closure', toxic positivity, anyone
    who says the person is in a better place, and any book that treats their heartbreak
    as a problem to be optimized away before they're allowed back to normal.
series_voice_markers:
  register: intimate, heart-to-heart, quietly luminous; the voice of someone who has
    sat in the same dim kitchen at midnight, who speaks close and unhurried and never
    once reaches for a clipboard
  sentence_rhythm: tidal — long, gentle sentences that carry you out, then a short
    one that holds you; pauses left open the way grief leaves rooms open; never clipped,
    never clinical
  metaphor_family: the heart and what passes between two of them, light passed hand
    to hand, the warmth of a presence still felt in a doorway, the open hand that
    holds without gripping, breath shared in a quiet room, what love transmits without
    words — never machinery, never stages or systems
_needs_authoring: false
