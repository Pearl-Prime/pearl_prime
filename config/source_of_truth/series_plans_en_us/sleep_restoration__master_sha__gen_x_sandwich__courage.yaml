reader_promise_family: A steady presence in the dark hours that helps you find courage
  not by toughening up, but by letting something heavy be set down — so the brave
  thing becomes possible before you feel ready.
bestseller_hook_family: ''
emotional_engine: courage_recognition
comp_series:
- The Let Them Theory and adjacent Mel Robbins titles (Mel Robbins) — for readers
  who want courage reframed as a decision they can make tonight, not a personality
  they lack
- When Things Fall Apart and the Shambhala Pocket series (Pema Chödrön) — for the
  reader who needs fear met with steadiness and compassion rather than conquered
- The Comfort Book (Matt Haig) — short, humane, nocturnal companionship for the wide-awake
  mind that needs holding more than fixing
