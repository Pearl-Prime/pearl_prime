reader_avatar:
  age: Gen X, roughly 45 to 58 — the sandwich years, holding a parent's decline in
    one hand and a child's needs in the other
  where_they_are: It's past midnight. The house has finally gone quiet — the kids
    asleep, your mother's medication sorted for tomorrow, the work email half-answered.
    You're sitting on the edge of the bed with your shoes still on, and the brave
    thing you've been putting off for months is right there in the dark, and you cannot
    make yourself stand up and face it.
  what_they_need: To understand that courage is not a feeling they're missing but
    a single step they can take while still afraid — and to have someone sit with
    the fear instead of telling them to push past it
  what_they_avoid: Push-through toughness, 'just be brave' and 'stay strong' platitudes,
    hustle-culture grind, toxic positivity, and any book that treats fear or exhaustion
    as a character flaw to be optimized away
series_voice_markers:
  register: Steady, nocturnal, quietly architectural — a calm presence who sits with
    you through the heavy hours; holds without fixing, never clinical, never a coach,
    never hustle
  sentence_rhythm: Measured and unhurried, like a hand on a banister in the dark;
    short load-bearing sentences set against longer ones that settle; second person
    throughout, room left between the lines to breathe
  metaphor_family: Night and the dark room, the edge and the single step, foundations
    and what bears weight, a load finally set down, the body settling toward rest,
    the quiet hours before dawn, the structure that holds you while you let go
_needs_authoring: false
