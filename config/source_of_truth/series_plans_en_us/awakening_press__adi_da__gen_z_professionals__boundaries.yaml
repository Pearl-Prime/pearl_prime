reader_avatar:
  age: 23-29
  where_they_are: It's 9:47pm. The laptop is closed but the Slack notification badge
    is still glowing in your mind. A message came in twenty minutes ago and you haven't
    answered, and the not-answering is louder than the message. You're lying in bed
    rehearsing a reply that sounds chill, unbothered, like a person who has it together
    — already drafting the apology for a 'no' you haven't even decided to give.
  what_they_need: To feel, in the body and not just as an idea, that a limit is not
    an emergency — that there is an awake, steady part of them that does not flinch
    when someone is disappointed, and that this part was never the one doing the bracing.
  what_they_avoid: Anything that sounds like a guru, a productivity bro, or a LinkedIn
    carousel — 'protect your peace,' 'know your worth,' five scripts for saying no,
    the implication that a boundary is a power move or a personal brand. They've heard
    it. It bounced off.
series_voice_markers:
  register: spacious, awakening, quietly radical; the voice of someone a few years
    ahead who remembers exactly what the 9:47pm Slack dread felt like — intimate,
    never clinical, never preachy, never hustle; points past the panicked self to
    what is already steady underneath it
  sentence_rhythm: short declaratives that land like a hand on the shoulder, then
    one longer breath that opens the room; a recurring quiet return to the threshold
    image; questions left genuinely open rather than rhetorical
  metaphor_family: the door and the threshold, waking from a dream you mistook for
    the room, the open sky behind passing weather, the line you draw being something
    you already are rather than something you build, coming home to a quiet that was
    never lost
_needs_authoring: false
