reader_promise_family: You will stop treating your own limits as a malfunction to
  override, and begin to recognize the still, unbothered awareness that was never
  inside the urgency in the first place — the part of you that can say no without
  coming apart.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- The Untethered Soul series (Michael A. Singer) — same loosening of identification
  from the anxious inner voice, witnessed rather than obeyed
- How to Do Nothing / resistance-to-the-attention-economy lineage (Jenny Odell) —
  speaks to a younger reader exhausted by always-on availability without moralizing
  about it
- Set Boundaries, Find Peace (Nedra Glover Tawwab) — the closest topical comp on boundaries,
  but our series replaces the assertiveness-script frame with a contemplative, awakening
  one
