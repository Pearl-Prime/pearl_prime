reader_promise_family: You will stop bracing to be found out, and start trusting that
  the person who got this far is the real one — without a single productivity hack,
  performance fix, or pep talk about confidence.
bestseller_hook_family: ''
emotional_engine: imposter_syndrome_recognition
comp_series:
- The Daily Stoic series (Ryan Holiday) — short, grounded, voice-led entries a busy
  mid-career reader returns to without being lectured
- The Untethered Soul / The Surrender Experiment (Michael A. Singer) — interior, plainspoken
  work on the self-protective voice in the head rather than external achievement
- How to Do the Work series (Nicole LePera) — accessible, compassionate self-recognition
  framed around inherited stories, not optimization or hustle
