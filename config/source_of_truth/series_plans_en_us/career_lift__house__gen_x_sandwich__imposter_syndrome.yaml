reader_avatar:
  age: 47 to 58, Gen X, mid-to-senior in a career they quietly suspect they bluffed
    their way into
  where_they_are: 'It''s 6:40am. The inbox is already nineteen deep, your mother''s
    care coordinator left a voicemail, and your teenager needs a permission form signed
    before the bus. You have a leadership meeting at nine where you''ll be the most
    experienced person in the room and still wait for someone to ask the question
    that exposes you. You pour the coffee you won''t finish and think: how is everyone
    else so sure of themselves?'
  what_they_need: Permission to believe the competence is real and theirs — to set
    down the exhausting work of proving it, and recognize that the fear of being exposed
    is not evidence of fraud but the residue of a story they were handed long ago.
  what_they_avoid: Girlboss confidence theater, 'fake it till you make it', LinkedIn-influencer
    hype, manifestation, hustle culture, and any book that treats decades of real
    fear as a mindset problem you should have fixed by now.
series_voice_markers:
  register: encouraging, forward-looking, grounded; the voice of a peer who has been
    in the same nine-o'clock meeting and is honest about the fear without selling
    you out of it — warm, plainspoken, never clinical, never a hype reel
  sentence_rhythm: conversational and unhurried, with short declarative landings after
    a longer felt line; second person throughout; pauses where a reader needs to breathe,
    never a slide deck of bullet promises
  metaphor_family: the next chapter and the turning page, the doorway and the room
    you haven't entered yet, the threshold you keep standing on, the step up that
    costs something, the draft you are still writing — never machinery, military,
    productivity, or biohacking
_needs_authoring: false
