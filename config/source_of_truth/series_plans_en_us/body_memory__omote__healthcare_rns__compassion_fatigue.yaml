reader_promise_family: You will be met exactly where you are — emptied out from caring
  for everyone but yourself — and shown how to set the weight down without being told
  to care less. This series does not ask the nurse in you to toughen up, push through,
  or find the silver lining. It gives the part of you that has been holding everyone
  else a place to finally be held.
bestseller_hook_family: ''
emotional_engine: compassion_fatigue_recognition
comp_series:
- Trauma Stewardship (Laura van Dernoot Lipsky) — the foundational text on the cost
  of caring, written for helpers who absorb suffering for a living
- 'Burnout: The Secret to Unlocking the Stress Cycle (Emily & Amelia Nagoski) — names
  the depletion of caregivers without ever blaming them for it'
- When the Body Says No (Gabor Mate) — connects unspoken emotional cost to what the
  body finally does with it, in plain, humane language
