reader_avatar:
  age: 28-52
  where_they_are: It is 6:40am and you are sitting in your car in the hospital parking
    structure with the engine off, badge already clipped on, hands still on the wheel.
    You cannot remember the drive here. Inside, twelve more hours are waiting — the
    call lights, the families, the chart that is never caught up. You feel nothing,
    and the nothing scares you more than the exhaustion ever did.
  what_they_need: To hear that the numbness is not a character flaw but a wound from
    giving more than any human has to give — and to be shown, gently, how to come
    back into a body that has been on alert for years, without abandoning the work
    or the patients they still love.
  what_they_avoid: Self-care listicles, 'put your own oxygen mask on first' platitudes,
    resilience trainings that put the burnout back on them, anyone who says 'you just
    need a vacation,' and any voice that mistakes their compassion for a problem to
    be managed.
series_voice_markers:
  register: grounded, steady, holding; the voice of a fellow nurse who has stood at
    the same med cart at 3am and lived to feel again — warm and plain, never clinical,
    never the wellness-officer who has never run a code
  sentence_rhythm: calm and load-bearing; short declarative sentences that set something
    down, then a longer one that stays with you; pauses where a tired reader can breathe;
    never breathless, never a list of demands
  metaphor_family: the ground that holds, weight set down and supported, the well
    and the empty cup, roots and steadiness, the body remembering it is safe, what
    stays solid when everything in the unit is shaking
_needs_authoring: false
