reader_promise_family: You get to draw the line that protects the part of you that's
  still becoming — without apologizing for the space it takes, and without turning
  your worth into something you have to earn back every shift.
bestseller_hook_family: ''
emotional_engine: boundaries_recognition
comp_series:
- Set Boundaries, Find Peace series (Nedra Glover Tawwab) — the gold standard for
  boundary work that names the guilt instead of shaming it away
- Burnout (Emily & Amelia Nagoski) — speaks to the exhausted twenty-something whose
  body keeps the score the calendar won't
- Year of Yes (Shonda Rhimes) — the lived-experience, non-clinical voice of someone
  learning to say the word in real time
