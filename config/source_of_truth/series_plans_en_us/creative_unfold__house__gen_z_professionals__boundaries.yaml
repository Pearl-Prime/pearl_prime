reader_avatar:
  age: early-to-mid twenties
  where_they_are: It's 9:47pm and the message you wrote eleven minutes ago is still
    sitting in the draft box — 'Hey, I actually can't pick that up this weekend' —
    and your thumb is hovering, and you've already rewritten it four times to sound
    less like you mean it.
  what_they_need: permission to let 'no' be a complete sentence, and a way to feel
    the difference between guilt and danger before it runs the whole decision
  what_they_avoid: boss-energy boundary scripts, 'protect your peace' merch, hustle-culture
    self-optimization, and anyone who makes saying no sound easy when it has never
    once been easy
series_voice_markers:
  register: open, warm, plainspoken, creative; the voice of a slightly-older friend
    who also freezes when the group chat lights up — never a manager, never a coach,
    never clinical
  sentence_rhythm: short declaratives that land, then a longer breath that turns the
    knife gently; the rhythm of someone thinking out loud in the next room, not reciting
    a framework
  metaphor_family: the blank canvas and the first mark, the empty page, the line you
    draw to decide what the picture is, white space as a choice not a failure, the
    draft you're allowed to ruin, color returning to a life you'd let go grey
