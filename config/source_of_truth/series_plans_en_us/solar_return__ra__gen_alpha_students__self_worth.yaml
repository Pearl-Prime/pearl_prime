reader_promise_family: You are not the thing you've been told to fix. Under the version
  of you that performs, compares, and apologizes for taking up space, there is a worth
  that was never up for a vote — and it does not have to be earned back. This series
  tends that ember gently, without making you into a project, until you remember it
  was always lit.
bestseller_hook_family: ''
emotional_engine: self_worth_recognition
comp_series:
- The Self-Esteem Workbook for Teens (Lisa M. Schab) — the category leader for adolescent
  self-worth, but clinical and exercise-driven where this series is a warm voice in
  the dark
- Untangle Your Emotions (Jennie Allen) — shares the gentle, you're-not-broken register
  for naming hard feelings, aimed up at adults where this meets the Gen Alpha student
  where they actually are
- What Do You Say? (William Stixrud & Ned Johnson) — the trusted, non-hustle voice
  adults reach for to reach anxious young people, parent-facing where this speaks
  straight to the student
