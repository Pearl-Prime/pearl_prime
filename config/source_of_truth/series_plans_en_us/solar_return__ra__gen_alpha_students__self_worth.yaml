reader_avatar:
  age: 11 to 15 — middle and early high school, a Gen Alpha student who grew up with
    a phone in hand
  where_they_are: It's almost midnight and the room is dark except for the screen.
    They've been scrolling for an hour, watching everyone else's life look effortless,
    rereading a message they sent that got left on read, doing the quiet math of who
    likes them and who doesn't. Somewhere behind their ribs is a low feeling they
    can't name — that everyone else got a manual for being a person and they missed
    the day it was handed out.
  what_they_need: To be spoken to like a whole person, not a problem — to hear that
    the ache they feel isn't proof something is broken in them, and that their worth
    was never going to be decided by a count, a grade, a group chat, or a comparison
    they were always going to lose.
  what_they_avoid: Cheery adults who tell them to 'just believe in yourself,' worksheets
    that feel like more homework, anything that sounds like a teacher or a brand trying
    to sell them confidence, and the fake hype of 'you're literally so amazing' that
    they can feel is hollow.
series_voice_markers:
  register: warm, emboldening, quietly fierce — the voice of an older sibling sitting
    on the floor of your room at night, on your side without flattering you, naming
    the hard thing plainly and then staying; never a teacher, never a coach, never
    a brand
  sentence_rhythm: short, breathing sentences that land like embers settling; a long
    observational line that opens out, then a clipped one that holds you still; spoken
    cadence, second person, no jargon, room left between thoughts
  metaphor_family: ember and ash, banked fire kept alive overnight, cold hands finding
    warmth, the slow turn toward dawn and first light, what survives the burn and
    comes back green, the year turning back toward the sun
_needs_authoring: false
