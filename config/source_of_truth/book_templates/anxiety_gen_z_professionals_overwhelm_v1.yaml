  - chapter_number: 11
    title: "When It Gets Serious: Crisis Tools"
    arc_role: acute_crisis_tools
    emotional_temperature: hot
    thesis: "When anxiety becomes acute — panic, shutdown, dissociation — the tools change. This chapter is the one you might need most and hope to use least."
    sections:
      - section_id: opening_hook
        slot_type: HOOK
        job: "Open with the experience of a panic response or anxiety crisis — specific, physiological, honest about how terrifying it is in the moment"
        word_count_target: "120-150"
        example_beat: "Your heart is racing. You can't take a full breath. The room feels slightly wrong. You know rationally that you're not dying. Your body doesn't know that."

      - section_id: context_scene
        slot_type: SCENE
        job: "Distinguish acute anxiety from chronic anxiety — what it looks like, what triggers it for this demographic, what makes it different from everyday overwhelm"
        word_count_target: "180-220"
        example_beat: "Panic attacks. Shutdown. The kind of dissociation where you get to the end of the workday with no memory of it. These are different from overwhelm. They require different tools."

      - section_id: mechanism_explanation
        slot_type: REFLECTION
        job: "Explain the physiology of acute anxiety responses — panic, freeze, shutdown — without pathologizing them. These are nervous system states, not mental illness."
        word_count_target: "200-250"
        example_beat: "Panic is a sympathetic storm. Shutdown is dorsal vagal collapse. Neither is a psychiatric emergency in most cases — they're nervous system states with specific physiological profiles and specific physiological off-ramps."

      - section_id: body_practice_awareness
        slot_type: EXERCISE
        job: "Three acute regulation techniques: cold water, physiological sigh, grounding through five senses. Specific, research-supported, step-by-step."
        word_count_target: "200-250"
        example_beat: "Physiological sigh: two quick inhales through the nose, one long exhale through the mouth. Deflates the air sacs in the lungs. Activates the vagus nerve faster than any other breath pattern. It works in under thirty seconds."

      - section_id: story_character
        slot_type: SCENE
        job: "Show a character managing an acute anxiety response in a public work setting — the internal navigation, the imperfect containment, the recovery"
        word_count_target: "200-250"
        example_beat: "Jordan, mid-presentation, when the panic starts. Grips the table edge. Presses feet into the floor. Takes two quick inhales and one long out. Continues. Nobody knew."

      - section_id: reframe_or_doctrine
        slot_type: TEACHER_DOCTRINE
        job: "When to seek professional support: clear, non-stigmatizing, direct guidance on when self-regulation tools are not enough"
        word_count_target: "180-220"
        example_beat: "If acute anxiety is happening multiple times per week and interfering with your ability to function, this book is not enough. That's not a failure. That's information. Therapy, medication, or both — these are tools like any other."

      - section_id: reader_mirror
        slot_type: REFLECTION
        job: "Ask the reader to assess whether their anxiety is chronic-manageable or acute-escalating. Direct, non-judgmental, with a clear next step for each answer."
        word_count_target: "120-150"
        example_beat: "How often are you having responses that feel like what we described in this chapter? Once a month? Once a week? Every day? The frequency is a signal. Listen to it."

      - section_id: chapter_close_and_bridge
