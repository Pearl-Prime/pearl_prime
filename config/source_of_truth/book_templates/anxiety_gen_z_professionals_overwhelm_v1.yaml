# Arc shape summary (for operator go/no-go):
# Ch 1-2: Establish the problem + first foothold (physiological truth + first tool)
# Ch 3-4: Body-mind connection (somatic storage + nervous system regulation)
# Ch 5-6: Social/workplace dimension (co-regulation + rumination)
# Ch 7-8: Cognitive patterns + lifestyle ecology (catastrophizing + invisible habits)
# Ch 9-10: Building sustainable practice (design + long-term adaptation)
# Ch 11: Acute crisis tools (when self-regulation isn't enough)
# Ch 12: Integration — identity shift and what's now possible

# Operator fail-fast gate:
# Read chapters 1, 4, and 12.
# Ask: does the arc feel earned by chapter 12? Do the tools build on each other?
# Does this read like a book a 28-year-old burned-out UX designer would actually finish?
# If yes → authorize the wiring build.
# If no → the thesis is wrong and we saved 3 weeks.
