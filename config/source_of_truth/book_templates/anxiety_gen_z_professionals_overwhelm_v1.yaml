  - chapter_number: 9
    title: "Building Something That Actually Sticks"
    arc_role: habit_building
    emotional_temperature: warm
    thesis: "Most anxiety management tools fail not because they don't work but because they're designed wrong. The architecture matters as much as the practice."
    sections:
      - section_id: opening_hook
        slot_type: HOOK
        job: "Open with the specific experience of trying and abandoning anxiety tools — not because of discipline failure but because of design failure"
        word_count_target: "120-150"
        example_beat: "You downloaded the meditation app. You used it for eleven days. The streak died and you felt worse about yourself than before you started. This is not a willpower problem. This is a design problem."

      - section_id: context_scene
        slot_type: SCENE
        job: "Map the failure modes of typical anxiety management tools for gen-z professionals: too time-intensive, too visible, too identity-threatening"
        word_count_target: "180-220"
        example_beat: "The 20-minute meditation requires quiet you don't have. The journaling requires a morning you don't have. The therapy requires a financial stability many don't have. The tools weren't designed for this life."

      - section_id: mechanism_explanation
        slot_type: REFLECTION
        job: "Explain habit architecture: the role of implementation intentions, environmental design, and minimum viable practice in making things stick"
        word_count_target: "200-250"
        example_beat: "The research on habit formation is clear: the environment changes behavior faster than intention does. A practice that requires zero willpower in a low-willpower moment will outlast one that requires a lot of willpower in a high-willpower moment."

      - section_id: body_practice_awareness
        slot_type: EXERCISE
        job: "Design-your-own practice: a structured process for creating a personalized minimum viable nervous system practice that fits the reader's actual life"
        word_count_target: "200-250"
        example_beat: "What's the smallest thing you can do, at the moment you most need regulation, in the environment you're actually in? That's your practice. Not the ideal one. The real one."

      - section_id: story_character
        slot_type: SCENE
        job: "Show the character designing a practice that actually fits their life — not glamorous, not Instagram-worthy, functional"
        word_count_target: "200-250"
        example_beat: "Jordan's practice: three box breaths in the elevator before each floor change. That's it. Two minutes total, distributed across the day, requiring no change to her schedule."

      - section_id: reframe_or_doctrine
        slot_type: TEACHER_DOCTRINE
        job: "The minimum viable practice doctrine: a practice you actually do is infinitely more effective than a practice you aspire to do"
        word_count_target: "180-220"
        example_beat: "Perfect is the enemy of regulated. The most elegant nervous system practice is the one you do today, in the bathroom, in the elevator, before the call starts."

      - section_id: reader_mirror
        slot_type: REFLECTION
        job: "Ask the reader to commit to one minimum viable practice and identify the exact moment and location they will do it"
        word_count_target: "120-150"
        example_beat: "When will you do this? Where will you be? What will trigger you to remember? Not a general intention — a specific implementation intention."

      - section_id: chapter_close_and_bridge
        slot_type: INTEGRATION
        job: "Land the practice design principle. Bridge to identity — the deepest layer, who you are when the anxiety is quiet."
        word_count_target: "60-80"
        example_beat: "Building the practice is about behavior. The next chapter is about something deeper — who you are when the anxiety isn't in charge."

  - chapter_number: 10
    title: "Sustainable Regulation Across Time"
    arc_role: long_term_sustainability
    emotional_temperature: warm
    thesis: "Regulation is not a destination — it's a practice that changes with your life. The skill is adapting it, not perfecting it once."
    sections:
      - section_id: opening_hook
        slot_type: HOOK
        job: "Open with the experience of having a practice that worked, then a life change that disrupted it — and the learning in the disruption"
        word_count_target: "120-150"
        example_beat: "You had it working. Then you changed jobs. Or moved. Or the relationship ended. And the practice dissolved with the structure it was embedded in. This is not failure. This is information."

      - section_id: context_scene
        slot_type: SCENE
        job: "Map the life disruption points most common for gen-z professionals in their late 20s and how each one typically disrupts existing nervous system practices"
        word_count_target: "180-220"
        example_beat: "Job change. City move. Relationship change. Promotion into management. Layoff. Each one reorganizes the environmental scaffolding that a practice depends on. The practice needs to be rebuilt, not abandoned."

      - section_id: mechanism_explanation
        slot_type: REFLECTION
        job: "Explain neuroplasticity and practice adaptation: how the nervous system continues to change, how to rebuild after disruption, the rolling baseline concept"
        word_count_target: "200-250"
        example_beat: "Neuroplasticity means your nervous system continues to reorganize based on repeated inputs. A disruption is a reset, not an erasure. You rebuild faster than you built the first time."

      - section_id: body_practice_awareness
        slot_type: EXERCISE
        job: "The quarterly nervous system audit: a structured review process for assessing whether your current practice still fits your current life"
        word_count_target: "200-250"
        example_beat: "Four questions, once per quarter: What's my current baseline? Is my practice still accessible in my actual day? Where am I most dysregulated? What one change would address the most? That's the audit."

      - section_id: story_character
        slot_type: SCENE
        job: "Show the character rebuilding their practice after a major life disruption — what they kept, what they changed, the non-linear path"
        word_count_target: "200-250"
        example_beat: "Jordan, six months after a job change. Old practice didn't fit the new commute. Built a new one in two weeks by asking one question: when am I most activated in this new life? Answer: the 8am train. New practice: there."

      - section_id: reframe_or_doctrine
        slot_type: TEACHER_DOCTRINE
        job: "The adaptive practice doctrine: a practice that can't flex with your life will break. Build for adaptation, not optimization."
        word_count_target: "180-220"
        example_beat: "The goal is not a perfect practice. The goal is a relationship with your nervous system that you can maintain across the changes your life will inevitably bring."

      - section_id: reader_mirror
        slot_type: REFLECTION
        job: "Ask the reader what life change is most likely coming for them and how they might adapt their practice through it"
        word_count_target: "120-150"
        example_beat: "What change is coming? Promotion, move, relationship, family? You don't have to solve it now. You just have to know that your practice will need to shift with it."

      - section_id: chapter_close_and_bridge
        slot_type: INTEGRATION
