        job: "Land the acute/chronic distinction and the professional support signal. Bridge to integration — the final chapter about identity."
        word_count_target: "60-80"
        example_beat: "The last chapter is about something quieter: who you are when anxiety is not running the show. That person has always been there."

  - chapter_number: 12
    title: "Who You Are Without the Overwhelm"
