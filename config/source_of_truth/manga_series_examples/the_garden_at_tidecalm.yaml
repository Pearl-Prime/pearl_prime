# ── Character Roster ───────────────────────────────────────────────────
characters:
  sora_hashimoto:
    character_id: "sora_hashimoto"
    role: "protagonist"
    age: 17
    archetype_hook: "The girl who cannot stop — learning to stop"
    therapeutic_function: >
      Embodies anxiety as hypervigilance, restlessness, and avoidance-through-motion.
      Her arc is not curing anxiety but developing a different relationship to it.

    visual_archetype: >
      Short dark hair cut unevenly, clearly self-done, never quite the same length
      on both sides. Wiry, quick-moving build. Oversized dark olive jacket worn even
      in warm weather — sensory regulation garment. Hands perpetually active:
      picking at seams, fidgeting with found objects, never folded in lap.
      Posture: forward-leaning, coiled, feet slightly turned to the exit.
      Eyes: wide and scanning. Face: sharp features, used to looking for problems.
      Standard outfit: the jacket, dark jeans, worn-down sneakers.

    visual_evolution:
      volume_1: "Jacket always on. Hands always busy. Posture tense."
      volume_2: "Jacket off for first time (ch 12). Hands sometimes rest in soil."
      volume_3: "Jacket carried, not worn. Hands open. Posture occasionally still."

    signature_visual_element: >
      The jacket. Track it across volumes. Its presence or absence is the
      clearest external signal of Sora's internal state.

    relationships:
      - character_id: "uma_nakamura"
        relationship_type: "grandmother"
        emotional_dynamic: "initial friction, deepening acceptance across volumes"

      - character_id: "tarou_yamashiro"
        relationship_type: "mentor (師弟 pattern: reluctant student)"
        emotional_dynamic: "resistance, curiosity, eventual trust"
        appears_from: "chapter 10"

      - character_id: "hana_mori"
        relationship_type: "peer / foil"
        emotional_dynamic: "initial incomprehension, growing mutual respect"

    character_sheet_reference: "char_sora_hashimoto"  # for Workstream 5

  uma_nakamura:
    character_id: "uma_nakamura"
    role: "supporting — grandmother"
    age: 72
    archetype_hook: "The one who waits without waiting"
    therapeutic_function: >
      Models unconditional presence. Does not try to fix Sora. Her patience
      is not passive — it is an active ongoing choice readers will recognize.

    visual_archetype: >
      Round, soft face with laugh lines that appear whether she's laughing or not.
      White hair in a loose bun — some always escaping. Moves slowly and deliberately,
      as if every action has weight. Always doing something small with her hands:
      folding cloth, sorting seeds, making tea. Practical clothes — aprons, worn
      gardening trousers. Slightly stooped from years of garden work.

    signature_visual_element: >
      Always has something in her hands. Never idle, never rushed. The contrast
      with Sora's frantic fidgeting is immediate visual language.

    character_sheet_reference: "char_uma_nakamura"

  tarou_yamashiro:
    character_id: "tarou_yamashiro"
    role: "supporting — village herbalist / mentor"
    age: 58
    archetype_hook: "The one who stopped running (mirror of who Sora could become)"
    therapeutic_function: >
      Embodies successful integration of anxiety through practice, not cure.
      Was a city professional, left under unclear circumstances, now tends medicinal
      plants and offers no explanations unless asked three times.

    visual_archetype: >
      Weathered, lean, unhurried. Former city dweller — tells: good leather shoes
      now worn soft, a quality watch he no longer checks, glasses he moves to his
      forehead to look at things carefully. Slight city-to-village awkwardness
      at first meeting that has softened into something else. Dark grey hair,
      close-cropped beard. Dresses in layers appropriate to season.

    appearance_chapters: "chapter 10 onward (volume 2+)"

    character_sheet_reference: "char_tarou_yamashiro"

  hana_mori:
    character_id: "hana_mori"
    role: "supporting — neighbor, Sora's foil"
    age: 16
    archetype_hook: "Stillness as native state — and the cost of it"
    therapeutic_function: >
      Demonstrates that stillness is not the same as emptiness. Hana has
      her own interior difficulty — revealed slowly. Her calm is earned, not
      given. This prevents the series from presenting stillness as effortless
      or superior; it is a practice for everyone, differently.

    visual_archetype: >
      Tall, unhurried, comfortable in silences. Brown hair in pigtails —
      practical, not decorative. Oversized soft cardigan in muted colors.
      Soft canvas shoes, always slightly damp (she walks the shore in the
      morning). Can read while walking without tripping. Wide-set, thoughtful eyes.
      Her stillness shows in her spine — upright and easy at the same time.

    character_sheet_reference: "char_hana_mori"

# ── Setting Bible ──────────────────────────────────────────────────────
setting_bible:
  world_note: >
    Tidecalm is a fictionalized small Japanese coastal village. The story
    does not specify a real location. The aesthetic draws from Tohoku coastal
    architecture and plant life, combined with the visual palette of early-2000s
    digital iyashikei manga. Specificity is in texture and atmosphere, not
    in landmark accuracy.

  primary_location:
    name: "Tidecalm (Shizunami)"
    atmosphere: >
      Quiet but alive. The kind of quiet that has accumulated over decades.
      The sea is always audible — heard through walls, through garden soil,
      in the space between sentences — but rarely the visual focus. Fog
      is common until mid-morning. Light is soft and diffuse, even in summer.
      Colors are slightly muted by salt air. Time moves differently here.

    key_visual_descriptors:
      - "weathered wood and stone, softened at edges by weather and lichen"
      - "plants growing into walls, domesticating the hard surfaces"
      - "salt air mutes saturation — colors feel slightly washed"
      - "morning fog → afternoon clarity → dusk gold: three visual registers daily"
      - "small scale — nothing monumental; a village of human-sized things"

  locations:
    uma_garden:
      location_id: "uma_garden"
      name: "Uma's Garden"
      role: "primary setting, therapeutic container, main action space"

      physical_description: >
        Walled garden behind Uma's house. Stone walls on three sides,
        the house wall on the fourth. Roughly 20 meters square.
        Established planting with decades of accumulated growth:
        some beds organized, others overgrown. A wooden bench Uma built
        decades ago and never moved — now slightly listing. A stone water
        trough. An old tool shed with a door that swells in summer.
        The east corner has a gap in the wall: the sea is visible from
        this angle, and audible always.

      seasonal_evolution:
        volume_1_start: "Overgrown but not dead. Surprising pockets of bloom. Needs a human."
        volume_1_end: "Edges cleared. Structure beginning to appear beneath the chaos."
        volume_2: "Active tending visible. Some beds organized. Some deliberately wild."
        volume_3: "Seasonal and intentional. Harvest visible. Space has been claimed."

      visual_anchors:
        - "The stone walls — establishes enclosure and safety"
        - "The bench — key conversation location; changes character from vol 1 to 3"
        - "The east-corner sea gap — Sora's thinking spot; returns every volume"
        - "The tool shed — small, cluttered, smells like earth and metal; Uma's history is here"

      establishing_shot:
        description: "Wide shot from kitchen doorway looking out — full garden visible, walls framing, sky overhead"
        use: "Opens chapters. Readers track the garden's state through this recurring angle."
        setting_sheet_reference: "set_uma_garden_establishing"  # for Workstream 5

      detail_shots:
        - "stone wall texture with moss and lichen — recurring close-up"
        - "the bench surface, worn and slightly listing"
        - "the water trough — still water reflecting sky"
        - "soil close-ups: Sora's hands in dirt"
        setting_sheet_reference: "set_uma_garden_details"

    uma_house_kitchen:
      location_id: "uma_kitchen"
      name: "Uma's Kitchen"
      role: "transition space, warmth, where the real conversations happen sideways"

      physical_description: >
        Small, functional kitchen with a south-facing window that catches the best
        morning light. Herbs drying from the ceiling. Tea always in some stage of
        preparation. A wooden table with two regular chairs and one stool that
        appears when needed. The kitchen smells like dried herbs, damp wood, and something
        being cooked slowly. The window looks onto the garden.

      narrative_function: >
        Important conversations in this series happen in the kitchen — but they
        don't happen directly. Uma and Sora talk about other things while the real
        exchange occurs in parallel. The kitchen is where Sora first stops running
        long enough to sit.

      setting_sheet_reference: "set_uma_kitchen"

    village_path:
      location_id: "village_path"
      name: "The Path to the Harbor"
      role: "Sora's movement space; her thinking walk; transition between inner and outer"

      physical_description: >
        Narrow stone-and-dirt path, slightly overgrown on the edges, five minutes
        between Uma's house and the small village harbor. One-person wide.
        The sea becomes audible before it becomes visible. A small shrine marker
        at the halfway point that Sora ignores until volume 3.

      visual_function: >
        This walk appears in every volume. The path's visual rendering changes
        with Sora's internal state: tight and tunnel-like in volume 1, opening
        in volume 2, spacious and textured in volume 3.

      setting_sheet_reference: "set_village_path"

    tarou_herb_garden:
      location_id: "tarou_herb_garden"
      name: "Tarou's Medicinal Herb Plots"
      role: "secondary setting; 師弟 conversations; what organized intentional growing looks like"
      appears_from: "chapter 10"
      description: >
        Several small raised beds at the edge of the village, near a low stone wall
        facing southeast. Ordered but not sterile — the messiness is functional.
        Tarou's shed nearby is larger than Uma's, more organized. The beds smell
        strongly. This is a working garden, not a healing garden — the distinction
        matters and Sora notices it.

      setting_sheet_reference: "set_tarou_herb_garden"

# ── Recurring Visual Motifs ────────────────────────────────────────────
recurring_motifs:
  visual:
    garden_hands:
      motif_id: "garden_hands"
      description: "Close-ups of Sora's hands in soil, on tools, touching plants"
      symbolic_meaning: >
        Contact with the present moment. Anxiety lives in anticipation —
        hands in dirt are in now. Also: the hands that can't stop fidgeting
        finding a productive fidget. The transformation from anxious motion
        to present motion.
      appearance_schedule: >
        First appears chapter 3 (Sora doesn't notice she's doing it).
        Appears every chapter 4 onward. Gets closer and more detailed across volumes.
        Final volume: close-up of hands and seedling side by side.
      comfyui_prompt_note: "extreme close-up, manga panel, hands in dark soil, fingers spread, soil detail"

    morning_fog:
      motif_id: "morning_fog"
      description: "Soft diffuse fog over the garden before the day has decided what it is"
      symbolic_meaning: >
        Uncertainty as texture, not threat. Not-knowing as livable. The fog
        clears later — but it's not wrong while it's here. Permission to be
        in ambiguity without it being a problem.
      appearance_schedule: >
        Opens almost every chapter in volumes 1 and 2.
        Rare in volume 3 — the clarity has been earned, not given.
        When fog appears in volume 3, it means something specific.
      comfyui_prompt_note: "morning fog, soft diffuse light, coastal garden, pale white atmosphere, no shadows yet"

    the_jacket:
      motif_id: "the_jacket"
      description: "Sora's oversized dark olive jacket — worn, folded, held, or absent"
      symbolic_meaning: >
        The visual armoring. Worn when defended. Absent or folded when present.
        Readers will track this without being told to.
      tracking:
        volume_1: "Always on. Even indoors. Even in warm weather."
        volume_2_ch_12: "First time off. Sora doesn't notice she's taken it off until later."
        volume_2_onwards: "On and off. The choice becomes visible."
        volume_3: "Often carried over arm rather than worn. Occasionally left behind."
      comfyui_prompt_note: "oversized dark olive jacket detail, worn fabric, pockets, slightly rumpled"

    plant_close_ups:
      motif_id: "plant_close_ups"
      description: "Extreme close-ups of individual plants, textures, small growing details"
      symbolic_meaning: >
        Attention as practice. The small as worthy of focus. Presence as
        the act of looking at what is actually here. Counterpoint to Sora's
        scanning-for-threats gaze: these panels force the reader to look small.
      frequency: "At least one per chapter across entire series"
      variety: "Roots, leaf undersides, buds, seed casings, moss, lichen, insect detail"
      comfyui_prompt_note: "extreme close-up, manga panel, plant texture detail, leaf edge, soil grain, soft lighting"

    sea_sound_panels:
      motif_id: "sea_sound_panels"
      description: "Quiet panels with a single SFX notation for sea sound (shaa... or nami...)"
      symbolic_meaning: >
        The constant beneath the noise. The thing that continues regardless.
        Every episode of anxiety will pass; the sea continues. Not comforting
        through meaning — comforting through persistence.
      frequency: "At least one per chapter. Increases in volume 3."
      visual_treatment: "Wide or medium establishing shot, minimal panel content, SFX lettering at edge"
      comfyui_prompt_note: "manga panel, sea through stone gap or from garden, quiet, minimal, SFX space at panel edge"

    bench_state:
      motif_id: "bench_state"
      description: "Uma's garden bench in different states: empty, occupied, weathered"
      symbolic_meaning: >
        The bench is older than Sora. People have been sitting here for decades.
        Sitting here is joining something larger. The bench's increasing presence
        (and Sora's relationship to it) tracks her arc.
      tracking:
        volume_1: "Sora doesn't sit there. Looks at it."
        volume_2: "Sora sits at the edge, ready to leave."
        volume_3: "Sora sits in the middle. Sometimes stays after the thing she came for."

  thematic:
    slow_growth:
      motif_id: "slow_growth_rule"
      description: "Nothing happens suddenly. Change accumulates without announcement."
      narrative_rule: >
        No chapter ends with a breakthrough. No single conversation changes
        everything. Progress is only visible in retrospect — when volume 2
        readers look back at volume 1, they see how far Sora has come.
        This is intentional and non-negotiable.

    memory_as_gift:
      motif_id: "memory_as_gift_rule"
      description: "The garden's emotional memories are offerings, not impositions"
      narrative_rule: >
        When the garden surfaces a memory to Sora, she is never assaulted by it.
        The memory is present, possibly uncomfortable, but always handled with care
        in the narrative. This is a healing series, not a horror series.
        The past is allowed to exist. It doesn't attack.

    stillness_is_active:
      motif_id: "stillness_active_rule"
      description: "Stillness in this series is something you do, not something that happens"
      narrative_rule: >
        Uma and Hana and Tarou are not passive. When they are still, show them
        engaged — making small decisions, noticing, choosing where their attention
        goes. Stillness as absence of agency is a misrepresentation of the
        therapeutic intention. Show the active choice.

    the_garden_remembers:
      motif_id: "garden_memory_mechanic"
      description: "The series' central speculative element — the garden holds emotional echoes"
      mechanics: >
        The mechanism is never explained. It simply happens. When Sora works with
        a specific plant, she receives a fragment — not a full memory, not a vision,
        but an emotional texture. Like recognizing a feeling from across a room.
        The fragments are never of people she knows. They are from strangers who
        tended this garden before her. This is not frightening. It is simply true.

# ── Genre & Demographic Targeting ─────────────────────────────────────
genre_targeting:
  primary_genre: "iyashikei"
  secondary_genre: "slice_of_life"
  tertiary_genre: "psychological_light"

  demographic:
    primary: "josei (women 18-35)"
    secondary: "seishun / young adult (15-20)"
    tertiary: "anyone with anxiety history who reads manga"
    notes: >
      This series will cross-demographic. The iyashikei genre attracts broad
      readership. The explicit anxiety therapeutic framing will draw readers
      who don't normally read manga. Not marketed as therapy — marketed as story.

  psychographic:
    primary: "anxiety-adjacent readers seeking representation without drama"
    secondary: "burnout-adjacent urban professionals, 25-35"
    tertiary: "nature-seeking readers; slow-living adjacent audience"

  platform_fit:
    primary:
      - platform: "Webtoon"
        format: "webtoon_episode"
        rationale: "High iyashikei audience; reading direction LTR OK"
      - platform: "Kobo"
        format: "EPUB volume"
        rationale: "Primary print-alternative for adult female manga readers"
      - platform: "Kindle"
        format: "EPUB volume"
    secondary:
      - platform: "Print (limited)"
        format: "print_ready_pdf"
        rationale: "Niche collector market for Stillness Press brand"
