# ── Core Identification ────────────────────────────────────────────────
series_id: "garden_at_tidecalm_001"
brand_id: "stillness_press"
series_bible_id: "series_005_the_outsiders_room"
genre: "iyashikei"
locale: "en"
locked_date: "2026-04-17"
locked_by: "Pearl_Architect_v1"

# ── Marketing Identity ─────────────────────────────────────────────────
marketing_title: "The Garden at Tidecalm"
subtitle: "A Manga About the Memory in Growing Things"

logline: >
  A girl who cannot sit still discovers that an old coastal garden
  remembers everyone who ever tended it — and needs her to remember herself.

high_concept: >
  Sora is a 17-year-old who moves to her grandmother's seaside village
  after burning out on city life. She inherits a neglected garden she doesn't
  want. The garden holds emotional echoes of everyone who ever worked in it —
  grief, relief, love, exhaustion. As Sora tends each plant, those fragments
  surface unbidden. She learns, slowly, to sit with feelings that aren't hers —
  and eventually with the ones that are.

tagline: "Some places remember for you."

back_cover_blurb: >
  Sora doesn't do slow. She doesn't do quiet. She definitely doesn't do gardens.

  But the old plot behind her grandmother's house in Tidecalm has been waiting —
  and it turns out it has things to say. Not in words. In the particular ache
  of a root system that remembers drought. In the way a certain rosemary
  still smells like someone's hands.

  A manga about anxiety, presence, and the startling patience of growing things.

  For readers who loved Yotsuba&! and Flying Witch.

comparable_titles:
  - title: "Yotsuba&!"
    author: "Kiyohiko Azuma"
    shared_quality: "Grounded daily wonder; episodic warmth; no urgency; adult themes rendered gently"
    differentiator: "Garden at Tidecalm is explicitly anxiety-therapeutic; Yotsuba is ambient warmth"

  - title: "Flying Witch"
    author: "Chihiro Ishizuka"
    shared_quality: "Rural Japan; quiet magic; found-family atmosphere; life as enough"
    differentiator: "Garden adds memory mechanics and active therapeutic intention"

  - title: "Mushishi"
    author: "Yuki Urushibara"
    shared_quality: "Nature-embedded mystery; meditation on what persists; stillness as active state"
    differentiator: "Garden is slice-of-life scale, not supernatural thriller"

  - title: "A Silent Voice"
    author: "Yoshitoki Oima"
    shared_quality: "Emotional weight carried in gesture; internal states made visual"
    differentiator: "Garden is gentler, less dramatic; healing not redemption"

# ── Volume Plan ────────────────────────────────────────────────────────
volume_plan:
  chapters_per_volume: 8
  total_planned_volumes: 3
  total_planned_chapters: 24

  volumes:
    volume_1:
      arc_name: "Awakening Arc"
      chapter_range: "1-8"
      arc_summary: >
        Sora arrives resistant and restless. She begins tending the garden
        reluctantly — it's easier than talking to her grandmother. The first
        emotional memories surface: a child's excitement at finding a beetle,
        an old man's quiet pride in a straightened row. Nothing dramatic. By
        chapter 8, Sora has stopped fighting the slowness. She hasn't won
        anything. She has simply stopped.
      cover_mood: "cool morning light, overgrown, something waiting"
      therapeutic_focus: "noticing resistance; first contact with stillness; body beginning to regulate"
      wisdom_atom_primary: "pausation"
      chapter_beats:
        ch_01: "Arrival; the garden is a burden; first resistance"
        ch_02: "First involuntary pause (garden forces her still)"
        ch_03: "First memory fragment surfaces (the child with the beetle)"
        ch_04: "Sora tries to fix the garden fast; it resists her speed"
        ch_05: "Uma's non-interventionist approach observed; Sora frustrated"
        ch_06: "Hana introduced; stillness modeled without explanation"
        ch_07: "Heavier memory fragment (the old man's grief); Sora unsettled"
        ch_08: "End of arc: Sora sits still for the first time — on accident"

    volume_2:
      arc_name: "Deepening Arc"
      chapter_range: "9-16"
      arc_summary: >
        Heavier memories surface — grief, the particular loneliness of
        being misunderstood, unfinished love letters. Sora must sit with
        others' pain without running. Tarou the herbalist appears at chapter
        10, modeling someone who arrived at stillness through the same anxiety
        door. Sora begins to recognize herself in the garden's memory. The
        jacket comes off for the first time at chapter 12.
      cover_mood: "full summer, lush, the weight of green"
      therapeutic_focus: "containment; witnessing difficulty without escape; the body as information"
      wisdom_atom_primary: "return"
      chapter_beats:
        ch_09: "Summer: garden overwhelming; Sora considers leaving"
        ch_10: "Tarou introduced; first 師弟 encounter, not named as such"
        ch_11: "Memory of abandonment surfaces; Sora cannot sit with it"
        ch_12: "Jacket off — first time; chapter of accident and noticing"
        ch_13: "Sora asks Tarou how he stopped running; he doesn't answer directly"
        ch_14: "Uma's history surfaces — she was also a runner"
        ch_15: "Difficult memory: someone who died without being forgiven"
        ch_16: "End of arc: Sora plants something deliberately, for the first time"

    volume_3:
      arc_name: "Integration Arc"
      chapter_range: "17-24"
      arc_summary: >
        The garden blooms. Sora does not conquer her anxiety but learns to
        tend it — the way she tends the plants. With patience, repetition,
        and trust in slow growth. The final chapter is autumn: she plants
        something that won't bloom until spring. She won't know if she'll
        be here to see it. She plants it anyway.
      cover_mood: "autumn warmth, harvest, completion that opens"
      therapeutic_focus: "integration; choosing presence as ongoing practice; tending the self"
      wisdom_atom_primary: "impermanence"
      chapter_beats:
        ch_17: "Autumn begins; Sora stays when she could leave"
        ch_18: "First time Sora tells someone else what the garden memory said"
        ch_19: "Hana's stillness shown to have its own difficulty; not easy, earned"
        ch_20: "Uma's deepest memory surfaces; Sora sits with it for her"
        ch_21: "Sora's own memory of why she started running — shown for the first time"
        ch_22: "The garden in winter preparation; Sora learns to end things"
        ch_23: "Last conversation with Tarou; nothing is resolved, everything is workable"
        ch_24: "Final: autumn planting; the ending that doesn't close"

