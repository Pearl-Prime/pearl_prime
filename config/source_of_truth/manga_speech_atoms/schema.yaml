# MANGA SPEECH ATOM SCHEMA v1.0.0
# Speech atoms are reusable dialogue building blocks for manga panels.
# They encode not just the text template but the full rendering spec.
#
# Atom ID format: atom_{genre}_{archetype}_{emotion}_{intensity}_{nn}
#   e.g., atom_shonen_protagonist_determination_shouting_01
#
# Valid values for each field are documented inline below.
# See specs/manga_speech_atom_taxonomy.md for the full taxonomy,
# anti-repetition algorithm, and deterministic selection spec.

# ─────────────────────────────────────────────────────────────────────
# SCHEMA REFERENCE (comment block — not parsed as data)
# ─────────────────────────────────────────────────────────────────────
#
# atom_id: string
#   Format: atom_{genre}_{archetype}_{emotion}_{intensity}_{nn}
#
# genre: shonen | shojo | seinen | josei | kodomomuke | isekai |
#        horror | sports | slice_of_life | bl_gl | mecha
#
# archetype: protagonist | antagonist | mentor | rival | love_interest |
#            comic_relief | narrator | mysterious_stranger | ally |
#            villain | kuudere | tsundere
#
# emotion: determination | fear | love | anger | surprise | grief |
#          joy | confusion | awe | despair | resolve | embarrassment |
#          longing | contempt | hope
#
# intensity: whisper | calm | normal | excited | shouting |
#            screaming | internal
#
# text_template: string — may contain {stake}, {name}, {place}, {opponent}
#
# bubble_style: round_normal | spiky_emphasis | cloud_thought |
#               square_narration | whisper_dashed | scream_ultra |
#               electronic_sharp | drip_horror | shojo_soft
#
# font_override: null | bold_action | light_whisper | italic_internal |
#                all_caps_scream
#
# sfx_companion: null | string (e.g. "CRACK", "BA-DUMP", "WHOOSH")
#
# word_count_target: int (target rendered word count, not template length)
#
# tail_style: pointer | curved | dotless | broken
#
# position_hint: top_left | top_right | top_center | bottom_left |
#                bottom_right | bottom_center
#
# variants: list of 3–5 alternative texts for the same semantic slot
#
# forbidden_after: list of atom_ids that create tonal repetition if
#                  used immediately after this atom in the same chapter
#
# cooldown_chapters: int — minimum chapters before this atom can repeat.
#                    0 = no cooldown enforced.
#
# ei_emotion_mapping:
#   primary: shame | overwhelm | grief | false_alarm | spiral |
#            watcher | comparison
#   intensity_modifier: low | medium | high

# ─────────────────────────────────────────────────────────────────────
# ATOMS — SHŌNEN (12 atoms)
# ─────────────────────────────────────────────────────────────────────

atoms:

  # ── Shōnen · protagonist · determination ─────────────────────────

  - atom_id: atom_shonen_protagonist_determination_shouting_01
    genre: shonen
    archetype: protagonist
    emotion: determination
    intensity: shouting
    text_template: "I won't... I WON'T GIVE UP! Not while {stake} still needs me!"
    bubble_style: spiky_emphasis
    font_override: bold_action
    sfx_companion: null
    word_count_target: 12
    tail_style: pointer
    position_hint: top_right
    variants:
      - "I don't care how strong you are! I'll keep getting back up!"
      - "You haven't seen anything yet! I'm just getting started!"
      - "My body hurts... but my will... MY WILL WON'T BREAK!"
      - "This is everything I've got! DON'T YOU DARE LOOK AWAY!"
    forbidden_after:
      - atom_shonen_protagonist_determination_shouting_02
      - atom_shonen_protagonist_determination_shouting_03
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: shame
      intensity_modifier: high

  - atom_id: atom_shonen_protagonist_determination_shouting_02
    genre: shonen
    archetype: protagonist
    emotion: determination
    intensity: excited
    text_template: "Then I'll just have to become someone who CAN beat {opponent}. That's all there is to it."
    bubble_style: spiky_emphasis
    font_override: bold_action
    sfx_companion: null
    word_count_target: 18
    tail_style: pointer
    position_hint: bottom_right
    variants:
      - "Fine. I'll train harder. I'll get stronger. I'll come back and prove it."
      - "If the ceiling is that high, then I'll just have to grow taller."
      - "You think this stops me? It doesn't stop me. Nothing stops me."
    forbidden_after:
      - atom_shonen_protagonist_determination_shouting_01
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: shame
      intensity_modifier: high

  # ── Shōnen · protagonist · anger ─────────────────────────────────

  - atom_id: atom_shonen_protagonist_anger_shouting_01
    genre: shonen
    archetype: protagonist
    emotion: anger
    intensity: shouting
    text_template: "You think this is a GAME?! People are hurting because of what YOU did!"
    bubble_style: scream_ultra
    font_override: all_caps_scream
    sfx_companion: "CRACK"
    word_count_target: 14
    tail_style: broken
    position_hint: top_center
    variants:
      - "STOP TALKING AND LOOK AT WHAT YOU'VE DONE!"
      - "That's someone I cared about. Don't you DARE pretend it meant nothing!"
      - "You keep smiling while everyone else bleeds. I won't let that go unanswered."
      - "I'm not angry because I lost. I'm angry because you don't even feel it."
    forbidden_after:
      - atom_shonen_protagonist_anger_shouting_02
    cooldown_chapters: 1
    ei_emotion_mapping:
      primary: overwhelm
      intensity_modifier: high

  # ── Shōnen · protagonist · grief ─────────────────────────────────

  - atom_id: atom_shonen_protagonist_grief_whisper_01
    genre: shonen
    archetype: protagonist
    emotion: grief
    intensity: whisper
    text_template: "I couldn't... I couldn't protect {name}. I was right there and I couldn't..."
    bubble_style: whisper_dashed
    font_override: light_whisper
    sfx_companion: null
    word_count_target: 13
    tail_style: dotless
    position_hint: bottom_left
    variants:
      - "They trusted me. They really believed I'd come through. And I..."
      - "It doesn't hurt like I thought it would. It's just... empty."
      - "I keep reaching for them in my head. They're not there."
    forbidden_after:
      - atom_shonen_protagonist_grief_whisper_02
    cooldown_chapters: 3
    ei_emotion_mapping:
      primary: grief
      intensity_modifier: high

  # ── Shōnen · protagonist · joy ────────────────────────────────────

  - atom_id: atom_shonen_protagonist_joy_excited_01
    genre: shonen
    archetype: protagonist
    emotion: joy
    intensity: excited
    text_template: "WE DID IT! I can't believe we actually— WE ACTUALLY DID IT!!"
    bubble_style: spiky_emphasis
    font_override: bold_action
    sfx_companion: "HA"
    word_count_target: 11
    tail_style: pointer
    position_hint: top_center
    variants:
      - "Yes! YES! All that training — it was worth every second!"
      - "I want to cry. Is that weird? I really just want to cry right now."
      - "Don't ever tell me something like this is impossible again!"
    forbidden_after: []
    cooldown_chapters: 3
    ei_emotion_mapping:
      primary: false_alarm
      intensity_modifier: low

  # ── Shōnen · rival · contempt ────────────────────────────────────

  - atom_id: atom_shonen_rival_contempt_calm_01
    genre: shonen
    archetype: rival
    emotion: contempt
    intensity: calm
    text_template: "Effort. How quaint. As if effort alone could close the gap between us."
    bubble_style: round_normal
    font_override: null
    sfx_companion: null
    word_count_target: 14
    tail_style: curved
    position_hint: top_left
    variants:
      - "You work hard. I'll give you that. It changes nothing."
      - "I've watched you train. Every single day. And you're still here — below me."
      - "Passion is for people who have no talent. You should know that by now."
    forbidden_after:
      - atom_shonen_rival_contempt_calm_02
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: comparison
      intensity_modifier: high

  # ── Shōnen · rival · respect ─────────────────────────────────────

  - atom_id: atom_shonen_rival_respect_normal_01
    genre: shonen
    archetype: rival
    emotion: resolve
    intensity: normal
    text_template: "...You've gotten stronger. I won't pretend otherwise. Don't make me say it again."
    bubble_style: round_normal
    font_override: null
    sfx_companion: null
    word_count_target: 15
    tail_style: curved
    position_hint: bottom_left
    variants:
      - "I won't hold back next time. Consider that a compliment."
      - "That move — I didn't see it coming. It won't work twice, but still."
      - "You're not the same person I beat six months ago. I noticed."
    forbidden_after:
      - atom_shonen_rival_contempt_calm_01
    cooldown_chapters: 3
    ei_emotion_mapping:
      primary: comparison
      intensity_modifier: medium

  # ── Shōnen · mentor · wisdom ─────────────────────────────────────

  - atom_id: atom_shonen_mentor_resolve_calm_01
    genre: shonen
    archetype: mentor
    emotion: resolve
    intensity: calm
    text_template: "The training ends when you stop fearing your own limits. Not a moment before."
    bubble_style: square_narration
    font_override: null
    sfx_companion: null
    word_count_target: 14
    tail_style: dotless
    position_hint: top_left
    variants:
      - "Strength without wisdom is just violence waiting for a target."
      - "You keep looking at your hands like they've failed you. They haven't. Your mind has."
      - "Every time you quit in training, you practice quitting. Think about that."
    forbidden_after: []
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: watcher
      intensity_modifier: medium

  # ── Shōnen · mentor · warning ────────────────────────────────────

  - atom_id: atom_shonen_mentor_fear_normal_01
    genre: shonen
    archetype: mentor
    emotion: fear
    intensity: normal
    text_template: "If you go after {opponent} now, you won't come back. I need you to understand that."
    bubble_style: round_normal
    font_override: null
    sfx_companion: null
    word_count_target: 16
    tail_style: pointer
    position_hint: bottom_center
    variants:
      - "I've seen that look before. On someone I couldn't save. Don't make me watch it again."
      - "The anger is real. The plan isn't. Come back when you have one."
      - "Power is only a path if you survive long enough to walk it."
    forbidden_after: []
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: watcher
      intensity_modifier: high

  # ── Shōnen · villain · threat ────────────────────────────────────

  - atom_id: atom_shonen_villain_contempt_shouting_01
    genre: shonen
    archetype: villain
    emotion: contempt
    intensity: shouting
    text_template: "Look at you. Still fighting. I almost respect it. ALMOST."
    bubble_style: spiky_emphasis
    font_override: bold_action
    sfx_companion: "WHOOSH"
    word_count_target: 10
    tail_style: broken
    position_hint: top_right
    variants:
      - "I gave you a chance to stand down. You chose this. Remember that when it ends."
      - "Your resolve is admirable. Unfortunately, admirable doesn't win fights."
      - "Every time you get up, I break you a little more. How much more do you have?"
    forbidden_after:
      - atom_shonen_villain_contempt_shouting_02
    cooldown_chapters: 1
    ei_emotion_mapping:
      primary: overwhelm
      intensity_modifier: high

  # ── Shōnen · villain · monologue ─────────────────────────────────

  - atom_id: atom_shonen_villain_contempt_normal_01
    genre: shonen
    archetype: villain
    emotion: contempt
    intensity: normal
    text_template: "This world rewards the strong. I didn't make that rule. I just learned it before everyone else did."
    bubble_style: square_narration
    font_override: null
    sfx_companion: null
    word_count_target: 18
    tail_style: curved
    position_hint: top_left
    variants:
      - "You call me a villain. I call myself honest. The world IS this cruel — I'm just the one admitting it."
      - "Every person I've broken was given the same choice. They chose weakness."
      - "I had people who believed in me once. Belief doesn't stop blades."
    forbidden_after:
      - atom_shonen_villain_contempt_normal_02
    cooldown_chapters: 3
    ei_emotion_mapping:
      primary: spiral
      intensity_modifier: high

  # ── Shōnen · protagonist · anger (secondary) ─────────────────────

  - atom_id: atom_shonen_protagonist_anger_shouting_02
    genre: shonen
    archetype: protagonist
    emotion: anger
    intensity: screaming
    text_template: "ENOUGH!! I'm not listening to another word of your philosophy while people are DYING!"
    bubble_style: scream_ultra
    font_override: all_caps_scream
    sfx_companion: "BOOM"
    word_count_target: 15
    tail_style: broken
    position_hint: bottom_center
    variants:
      - "You want to explain yourself? Do it after you fix what you broke!"
      - "I'm done. Talking's done. THIS is my answer!"
    forbidden_after:
      - atom_shonen_protagonist_anger_shouting_01
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: overwhelm
      intensity_modifier: high

  # ─────────────────────────────────────────────────────────────────────
  # ATOMS — SHŌJO (12 atoms)
  # ─────────────────────────────────────────────────────────────────────

  # ── Shōjo · love_interest · love ─────────────────────────────────

  - atom_id: atom_shojo_love_interest_love_whisper_01
    genre: shojo
    archetype: love_interest
    emotion: love
    intensity: whisper
    text_template: "I keep looking for reasons to walk away. I can't find any. That terrifies me."
    bubble_style: shojo_soft
    font_override: light_whisper
    sfx_companion: null
    word_count_target: 15
    tail_style: curved
    position_hint: bottom_right
    variants:
      - "When you smile at me like that... I forget what I was worried about."
      - "I've been trying not to notice you. I've been failing every day."
      - "You're not what I planned for. You're better than what I planned for."
    forbidden_after:
      - atom_shojo_love_interest_love_whisper_02
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: false_alarm
      intensity_modifier: medium

  # ── Shōjo · love_interest · embarrassment ────────────────────────

  - atom_id: atom_shojo_love_interest_embarrassment_excited_01
    genre: shojo
    archetype: love_interest
    emotion: embarrassment
    intensity: excited
    text_template: "That's not— I wasn't STARING, I was just— the light was in my eyes, okay?!"
    bubble_style: shojo_soft
    font_override: null
    sfx_companion: "BA-DUMP"
    word_count_target: 14
    tail_style: curved
    position_hint: top_right
    variants:
      - "I don't blush! This is — this is a temperature thing. It's warm in here."
      - "Stop LOOKING at me like that. I can't think when you look at me like that."
      - "Okay, fine! Fine. Maybe I noticed. Maybe I noticed a lot. Happy now?!"
    forbidden_after: []
    cooldown_chapters: 1
    ei_emotion_mapping:
      primary: shame
      intensity_modifier: low

  # ── Shōjo · love_interest · longing ──────────────────────────────

  - atom_id: atom_shojo_love_interest_longing_calm_01
    genre: shojo
    archetype: love_interest
    emotion: longing
    intensity: calm
    text_template: "I wonder if you think about me when I'm not there. Probably not. That's fine."
    bubble_style: cloud_thought
    font_override: italic_internal
    sfx_companion: null
    word_count_target: 16
    tail_style: dotless
    position_hint: top_left
    variants:
      - "Every time you laugh at something I say, I lose a little more ground."
      - "I've memorized how you take your coffee. I shouldn't know that. I do."
      - "You left your scarf here. I was going to return it. I keep not returning it."
    forbidden_after: []
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: grief
      intensity_modifier: medium

  # ── Shōjo · protagonist · hope ───────────────────────────────────

  - atom_id: atom_shojo_protagonist_hope_normal_01
    genre: shojo
    archetype: protagonist
    emotion: hope
    intensity: normal
    text_template: "Maybe it won't work out. But the possibility of it working out — that's enough to try."
    bubble_style: shojo_soft
    font_override: null
    sfx_companion: null
    word_count_target: 17
    tail_style: curved
    position_hint: bottom_center
    variants:
      - "I don't need a guarantee. I just need a chance."
      - "Even if I'm scared, being scared and doing it anyway is still doing it."
      - "I've been waiting for the right time. There is no right time. This is the time."
    forbidden_after: []
    cooldown_chapters: 2
    ei_emotion_mapping:
      primary: false_alarm
      intensity_modifier: low

  # ── Shōjo · protagonist · grief ──────────────────────────────────

  - atom_id: atom_shojo_protagonist_grief_whisper_01
    genre: shojo
    archetype: protagonist
    emotion: grief
    intensity: whisper
    text_template: "I thought I was over it. Then I saw {name}'s handwriting on a card and I... I wasn't over it."
    bubble_style: whisper_dashed
    font_override: light_whisper
    sfx_companion: null
    word_count_target: 17
    tail_style: dotless
    position_hint: bottom_left
    variants:
      - "Grief doesn't feel like sadness. It feels like expecting a step that isn't there."
      - "I smile at the right moments. I laugh when I should. Inside I'm still standing in that hallway."
      - "It's not that I miss them every second. It's that I miss them at the wrong seconds."
    forbidden_after:
      - atom_shojo_protagonist_grief_whisper_02
    cooldown_chapters: 3
    ei_emotion_mapping:
      primary: grief
      intensity_modifier: high

  # ── Shōjo · protagonist · confusion ──────────────────────────────

  - atom_id: atom_shojo_protagonist_confusion_normal_01
    genre: shojo
    archetype: protagonist
    emotion: confusion
    intensity: normal
    text_template: "Why does it bother me that {name} smiled at someone else? That doesn't make sense."
    bubble_style: cloud_thought
    font_override: italic_internal
    sfx_companion: null
    word_count_target: 14
    tail_style: dotless
    position_hint: top_center
    variants:
      - "I said I don't have feelings for them. I believed it when I said it."
      - "My heart does this... thing. When they walk into a room. I don't know what to call it."
      - "I'm angry but I don't know at what. I think I'm angry at myself and blaming them."
    forbidden_after: []
    cooldown_chapters: 1
    ei_emotion_mapping:
      primary: spiral
      intensity_modifier: medium

  # ── Shōjo · tsundere · anger → vulnerability ─────────────────────

  - atom_id: atom_shojo_tsundere_anger_excited_01
    genre: shojo
    archetype: tsundere
    emotion: anger
    intensity: excited
    text_template: "It's not like I WANTED you to come! I just— nobody else was going to show up, obviously!"
    bubble_style: spiky_emphasis
    font_override: bold_action
    sfx_companion: null
    word_count_target: 16
    tail_style: pointer
    position_hint: top_right
    variants:
      - "I wasn't waiting for you! I happened to still be here. There's a difference!"
      - "Don't read into this! I just didn't want you to do something stupid alone!"
      - "Ugh, FINE. Yes. I was worried. For about two seconds. Don't make it weird."
    forbidden_after: []
    cooldown_chapters: 1
    ei_emotion_mapping:
      primary: shame
      intensity_modifier: medium

  - atom_id: atom_shojo_tsundere_love_whisper_01
    genre: shojo
    archetype: tsundere
    emotion: love
    intensity: whisper
    text_template: "...I'm glad you're okay. That's all. Don't make it into something it's not."
    bubble_style: shojo_soft
    font_override: light_whisper
    sfx_companion: null
    word_count_target: 14
    tail_style: curved
    position_hint: bottom_right
    variants:
      - "If something happened to you... I'd be... it would be inconvenient. For everyone."
      - "You're an idiot. A complete and total idiot. ...Please be more careful."
      - "I don't say things like this easily, so listen — you matter. Okay? That's it. Forget I said it."
    forbidden_after:
      - atom_shojo_tsundere_anger_excited_01
    cooldown_chapters: 3
    ei_emotion_mapping:
      primary: shame
      intensity_modifier: low

  # ── Shōjo · mentor · gentle_wisdom ───────────────────────────────

  - atom_id: atom_shojo_mentor_hope_calm_01
    genre: shojo
    archetype: mentor
    emotion: hope
    intensity: calm
    text_template: "You keep asking what's wrong with you. The better question is: what happened to you?"
    bubble_style: shojo_soft
    font_override: null
    sfx_companion: null
    word_count_target: 15
    tail_style: curved
    position_hint: top_left
    variants:
      - "Kindness toward yourself isn't weakness. It's the only way you'll have anything left to give."
      - "The girl who never cried wasn't brave. She was lonely. Don't confuse those two things."
      - "You protected everyone else. Who protected you?"
    forbidden_after: []
    cooldown_chapters: 3
    ei_emotion_mapping:
      primary: watcher
      intensity_modifier: medium

  # ── Shōjo · protagonist · love (direct declaration) ──────────────

  - atom_id: atom_shojo_protagonist_love_shouting_01
    genre: shojo
    archetype: protagonist
    emotion: love
    intensity: shouting
    text_template: "I LIKE YOU! I've liked you since the day in the rain and I can't keep pretending I don't!"
    bubble_style: shojo_soft
    font_override: bold_action
    sfx_companion: "BA-DUMP"
    word_count_target: 18
    tail_style: pointer
    position_hint: bottom_center
    variants:
      - "Please don't make me say it twice. I can barely get through saying it once."
      - "I know the timing is terrible. I know. I don't care about the timing anymore."
      - "If you don't feel the same way, that's okay. But I had to say it or I'd never breathe right again."
    forbidden_after:
      - atom_shojo_protagonist_love_shouting_02
    cooldown_chapters: 5
    ei_emotion_mapping:
      primary: shame
      intensity_modifier: high

  # ── Shōjo · love_interest · love (reciprocation) ─────────────────

  - atom_id: atom_shojo_love_interest_love_normal_01
    genre: shojo
    archetype: love_interest
    emotion: love
    intensity: normal
    text_template: "I've been trying to find the right words for months. I don't think they exist. So: me too."
    bubble_style: shojo_soft
    font_override: null
    sfx_companion: null
    word_count_target: 17
    tail_style: curved
    position_hint: bottom_right
    variants:
      - "I kept telling myself it was just friendship. Friendship doesn't look at someone the way I look at you."
      - "You're the first person I want to call when something happens. Good things, bad things — just you."
    forbidden_after: []
    cooldown_chapters: 4
    ei_emotion_mapping:
      primary: false_alarm
      intensity_modifier: low

  # ── Shōjo · protagonist · embarrassment ──────────────────────────

  - atom_id: atom_shojo_protagonist_embarrassment_normal_01
    genre: shojo
    archetype: protagonist
    emotion: embarrassment
    intensity: normal
    text_template: "Please just... pretend you didn't see that. I'm begging you. Forget every part of it."
    bubble_style: shojo_soft
    font_override: null
    sfx_companion: null
    word_count_target: 14
    tail_style: curved
    position_hint: bottom_left
    variants:
      - "I did not just say that out loud. Tell me I didn't just say that out loud."
      - "My face will return to normal color eventually. Probably. Maybe."
      - "New rule: I'm not allowed to speak when {name} is within ten meters."
    forbidden_after: []
    cooldown_chapters: 1
    ei_emotion_mapping:
      primary: shame
      intensity_modifier: low

  # ─────────────────────────────────────────────────────────────────────
  # ATOMS — SEINEN (10 atoms)
  # ─────────────────────────────────────────────────────────────────────

  # ── Seinen · protagonist · despair ───────────────────────────────

  - atom_id: atom_seinen_protagonist_despair_internal_01
    genre: seinen
    archetype: protagonist
    emotion: despair
    intensity: internal
    text_template: "I used to believe there was a version of this that ended well. I don't think I believe that anymore."
    bubble_style: cloud_thought
    font_override: italic_internal
    sfx_companion: null
    word_count_target: 19
    tail_style: dotless
