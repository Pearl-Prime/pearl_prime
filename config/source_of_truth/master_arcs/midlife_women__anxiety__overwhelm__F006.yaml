chapter_thesis:
  1: "What looks like being the reliable one is often the body carrying a load it never agreed to hold."
  2: "Each morning you meet someone else's need before your own trains your nervous system that your turn will not come."
  3: "The way you have been holding this family together is the same shape as what is crushing you."
  4: "Underneath the busyness is a belief: if you stop, everything you built for others will fall apart."
  5: "You are not failing at balance. You are carrying a decade of invisible labor no one counted."
  6: "The body knows the difference between rest and collapse. You have been calling exhaustion rest."
  7: "The people who need you are not the source of overwhelm — but their needs became the proof you used to dismiss your own."
  8: "There is a version of you that does not have to earn rest by finishing everyone else's list first."
  9: "The load was never the problem. The belief that only you could carry it was."
  10: "The steadiness everyone praises is the same skill keeping you from saying you are at capacity."
  11: "What you are calling a hard season has now been twenty years of hard seasons."
  12: "A better planner does not heal a nervous system that wakes up already heavy."
  13: "If you set one thing down, the world would not end. The overwhelm is not actually about their survival."
  14: "What you do to your body to stay dependable is the part of the role no one thanks you for."
  15: "The cost has come due. The heaviness arrives before your feet hit the floor now."
  16: "The relationship you need first is with the woman who stopped expecting anyone to notice she was drowning."
  17: "You were not built to hold everyone else's weight inside your own chest."
  18: "The smallest repair is one breath taken before the list begins."
  19: "You will reach for the old shape of endless capacity. Noticing is the new skill — not the failure."
  20: "What you carry forward is not a better system. It is permission to feel the heaviness without obeying it."
