chapter_thesis:
  1: "You kept moving through the changes so quickly you never named what you were losing."
  2: "Each ungrieved ending deposits something in the chest you have learned not to touch."
  3: "The grief you call nostalgia is the body still waiting for a goodbye it never received."
  4: "You believed mourning meant weakness — so you archived the girl you were instead of burying her."
  5: "The woman in the photograph is not coming back. Pretending otherwise is its own kind of exhaustion."
  6: "The throat tightens because something honest is trying to get through the performance of being fine."
  7: "You mourned what others could see. The private losses went unnamed and unreleased."
  8: "This body is not a betrayal. It is evidence that you have been living while change moved through you."
  9: "Grief is not regression. It is the nervous system finally accounting for what ended."
  10: "You smile at the old photos and call it fondness. The body calls it unfinished business."
  11: "The paths you did not take are not failures. They are endings you never got to acknowledge."
  12: "Staying busy after a loss is not resilience. It is a strategy to outrun what needs to be felt."
  13: "The parent you are becoming required letting go of a version of yourself no one held a funeral for."
  14: "What you are afraid to feel is not the sadness. It is how long you have been carrying it alone."
  15: "The cost arrives as a tight throat, a hollow afternoon, a body that will not perform fine anymore."
  16: "The relationship that needs repair first is the one between you and every ending you rushed past."
  17: "You are not losing yourself. You are meeting the woman who survived every change without a witness."
  18: "The smallest grief practice is naming one thing that ended — out loud, without fixing it."
  19: "You will reach for the old habit of moving on before feeling. Pausing is the new skill — not the failure."
  20: "What you carry forward is not the girl in the photo. It is the capacity to mourn without disappearing."
