chapter_thesis:
  1: "You keep the door open because closing it feels like abandoning people who depend on you."
  2: "Each yes you give past capacity teaches your body that your limits are negotiable."
  3: "The overwhelm is not proof you need better boundaries — it is proof you stopped believing yours counted."
  4: "Underneath the exhaustion is a belief: if you draw a line, the people you love will leave."
  5: "You are not bad at boundaries. You are drowning in a role that rewards having none."
  6: "The jaw clenches before the no arrives because your nervous system learned that refusal costs connection."
  7: "The people at your door are not the problem — but you taught them your threshold was always movable."
  8: "There is a version of you that can hold love and still close the door when the room is full."
  9: "The line was never the enemy. The belief that only endless availability equals love was."
  10: "The woman everyone calls selfless is the same woman who has not had an empty afternoon in years."
  11: "What you call being needed is often the shape of a boundary you never learned to keep."
  12: "A clearer calendar does not heal a body that flinches at the word no."
  13: "If you held one boundary today, the family would not collapse. The overwhelm is not about their survival."
  14: "What you do to stay available — the skipped meals, the held breath — is the cost no one sees."
  15: "The cost has come due. Your body closes doors before your mouth can now."
  16: "The relationship that needs repair first is the one between you and the woman who forgot she could say no."
  17: "You were not built to be the open door for every need that knocks."
  18: "The smallest boundary practice is one pause before the automatic yes."
  19: "You will reach for the old shape of endless availability. Noticing the reach is the new skill."
  20: "What you carry forward is not a harder edge. It is permission to close the door without closing your heart."
