schema_version: 1.0.0
genre: workplace_drama
strategy_count: 5
selection_algorithm: sha256_hash_seeded
topic_strategy_map:
  burnout: strategy_01
  financial_anxiety: strategy_02
  impostor_syndrome: strategy_03
  meaning: strategy_04
  self_worth: strategy_05
character_pool:
  protagonist:
  - Dana Reyes
  - Marcus Imani
  - Priya Venkat
  - Theo Brandt
  - Suni Okafor
  companion:
  - the night-shift janitor who has seen every department come and go
  - a soon-to-retire senior analyst with a quiet desk in the corner
  - the office's longtime facilities manager who knows the building better than its tenants
  - a former mentor now in a role no one can quite name
  - the temp who has worked at forty companies and is unimpressed by all of them
  setting:
  - a glass-walled open-plan office after the lights auto-dim
  - a corporate stairwell between floors where the elevators don't stop
  - an empty conference room with the projector still warm
  - a breakroom at the far end of the floor with a humming vending machine
  - a parking garage at the level where the cars have all gone home
strategies:
  strategy_01:
    name: The Role That Stayed Late
    archetype_template: the_role_that_ate_the_person
    description: Burnout externalized as the job title that has slowly consumed the person who holds it.
      {protagonist} stops being addressed by name and starts being addressed by function — the role answers
      emails, the role skips lunch, the role is the only thing left at the desk after dark. The turn is
      not rest as reward; it is the small, physical act of setting the role down and discovering a person
      is still underneath it. The institution does not slow. {protagonist} does.
    layer_1_plot_skeleton:
      variant_label: strategy_01_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}, well past the hour the floor was built for. {protagonist} is still here, the
          way the role is always still here. On the monitor, the same task list refreshes; the top item
          has been the top item for three days.'
        camera_hint: wide_establishing
        mood_hint: depletion
        is_carrier: true
      - beat: 2
        text: An email arrives addressed to the job title, not the name. {protagonist} answers as the
          title — clipped, efficient, capable. The reply is perfect. The hands that typed it are shaking
          very slightly and {protagonist} does not look at them.
        camera_hint: close_up
        mood_hint: automatic
        is_carrier: true
      - beat: 3
        text: '{companion} crosses the floor with a mop and a slow, unhurried gait, and pauses at the
          desk. ''They''ve had that chair filled for eleven years,'' they say, not unkindly. ''Different
          names. Same hours. The chair doesn''t notice when one of you leaves.'''
        camera_hint: medium_two_shot
        mood_hint: warning
        is_carrier: true
      - beat: 4
        text: '{protagonist} laughs it off and reaches for the next task — but the cursor blinks and nothing
          in them moves to meet it. The task is urgent. The urgency arrives at a body that has run out
          of the thing urgency is supposed to spend.'
        camera_hint: over_shoulder_screen
        mood_hint: hollow
        is_carrier: true
      - beat: 5
        text: The overhead lights reach their timer and click off in a long row, leaving only the monitor
          glow. {protagonist} sits inside the dim, not working, not leaving. For one held breath, no one
          is asking the role for anything. The silence has a shape, and the shape is shaped like a person.
        camera_hint: wide_low_light
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: '{protagonist} lifts the lanyard from around their neck — the badge, the photo, the printed
          title — and sets it on the desk beside the keyboard. The weight leaving the collarbone is almost
          nothing. It is also the first thing they have felt in weeks.'
        camera_hint: close_up_hands
        mood_hint: surrender
        is_carrier: true
      - beat: 7
        text: 'They look at the badge lying there, separate now: a name and a function, no longer the
          same object. ''You can stay,'' {protagonist} says quietly, to the badge, not to themselves.
          ''I''m going home.'' The role keeps its perfect posture on the desk. The person stands up.'
        camera_hint: close_up_badge
        mood_hint: release
        is_carrier: true
      - beat: 8
        text: '{companion} holds the stairwell door without a word as {protagonist} passes through it,
          coat over one arm, badge left behind for the morning. The to-do list is still unfinished on
          a dark screen above them. It will keep. So, it turns out, will they.'
        camera_hint: medium_doorway
        mood_hint: easing
        is_carrier: true
      - beat: 9
        text: Next morning, the floor fills, the lights snap on, the role is picked up and worn again
          — but {protagonist} arrives carrying coffee for two and stops at {companion}'s cart to say good
          morning by name. Same desk. Same hours. A person sits down in the chair this time.
        camera_hint: wide_morning
        mood_hint: renewal
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: The badge waits face-up on the desk all night, the printed title catching the glow of a screen
          no one is reading.
        ch2: '{companion}''s mop leaves a clean arc across the floor, and for a moment the empty chair
          looks exactly like what it is.'
        ch3: Somewhere in the building a server fan keeps the unfinished task list alive until morning,
          indifferent to who returns to meet it.
  strategy_02:
    name: The Number That Runs the Night
    archetype_template: the_number_that_runs_your_sleep
    description: Financial anxiety externalized as a single running figure — a balance, a burn rate, a
      projection — that has quietly taken over the protagonist's sleep, their meals, their sense of when
      rest is permitted. {protagonist} consults the number before they can breathe; the number decides
      the day. The turn is not the number getting bigger; it is closing the tab while the number is still
      unresolved, and learning that the night does not actually belong to it. The figure does not change.
      Its authority does.
    layer_1_plot_skeleton:
      variant_label: strategy_02_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}, 2 a.m. {protagonist} should be asleep. Instead the phone lights their face from
          below as a spreadsheet loads, and the cursor finds the one cell that matters: a figure in a
          small grey font that somehow runs everything.'
        camera_hint: close_up_underlit
        mood_hint: dread
        is_carrier: true
      - beat: 2
        text: They refresh it. The number holds. They refresh it again — as if attention could move it,
          as if checking were a kind of paying. The room is quiet except for the refresh, the refresh,
          the refresh. Sleep is not allowed until the figure says so, and the figure never says so.
        camera_hint: insert_screen
        mood_hint: compulsion
        is_carrier: true
      - beat: 3
        text: Across the dim {setting}, {companion} is packing up a worn bag, the last one out as usual.
          They glance at the bluish glow on {protagonist}'s face and the bag set of un-eaten lunch beside
          the keyboard. 'It'll be the same number at nine as it is now,' they say. 'You're just paying
          it overtime.'
        camera_hint: medium_two_shot
        mood_hint: recognition
        is_carrier: true
      - beat: 4
        text: '{protagonist} starts to explain the math — the timeline, the margin, the what-if — and
          the sentences come fast and detailed and airless, a case made to a judge who isn''t in the room.
          The number does not require the explanation. It was never listening. Only {protagonist} was.'
        camera_hint: over_shoulder
        mood_hint: spiraling
        is_carrier: true
      - beat: 5
        text: Mid-sentence, {protagonist} stops. The vending machine hums. The figure sits on the screen,
          unchanged, demanding nothing it can actually enforce. For a long moment {protagonist} simply
          lets it sit there, glowing, while the breath in their chest goes slow and even and entirely
          their own.
        camera_hint: wide_still
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: '{protagonist} reaches out and closes the tab. Not solved. Not smaller. Just — closed, the
          figure dropped back into the dark where it lives, no longer lit, no longer in the room. The
          screen returns to an ordinary blue. The night is suddenly very large and does not have a balance.'
        camera_hint: close_up_thumb
        mood_hint: release
        is_carrier: true
      - beat: 7
        text: '''It still has to be dealt with,'' {protagonist} says — to {companion}, steadier now. ''In
          the morning. At a desk. In daylight.'' Saying when robs the number of its 2 a.m. throne. It
          can have nine o''clock. It cannot have the dark anymore.'
        camera_hint: medium_two_shot
        mood_hint: resolve
        is_carrier: true
      - beat: 8
        text: They pocket the dark phone and pick up the untouched lunch to eat on the way out. {companion}
          walks beside them toward the exit, neither of them talking about money. The figure waits on
          a server somewhere, patient, demoted from a tyrant to a task.
        camera_hint: medium_walking
        mood_hint: easing
        is_carrier: false
      - beat: 9
        text: Morning. {protagonist} opens the spreadsheet at a lit desk, coffee steaming, the figure
          exactly where they left it. They look at it the way you look at any item on a list — plainly,
          with a plan, in the daytime it can have. Then they scroll past it to the next thing.
        camera_hint: wide_morning_desk
        mood_hint: renewal
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: The phone screen times out to black, and the figure goes with it, waiting on a server that
          does not keep the same hours {protagonist} used to.
        ch2: An untouched lunch sits in its container by the keyboard, and for once it leaves the building
          still warm enough to eat.
        ch3: Nine o'clock is on the clock by the door, hours away, holding the number the way a folder
          holds a paper — closed, and patient, and not in the bedroom.
  strategy_03:
    name: Any Minute Now
    archetype_template: waiting_to_be_found_out
    description: Impostor syndrome externalized as the posture of someone awaiting an audit that never
      arrives. {protagonist} performs competence while bracing for the footstep in the hall, the tap on
      the shoulder, the meeting invite that finally exposes them as not belonging. They over-prepare for
      an unmasking no one has scheduled. The turn is the empty doorway — the discovery, in stillness,
      that the person coming to find them out is not coming, because the only auditor is the one in their
      own chest. The doubt does not vanish. Its imagined enforcer does.
    layer_1_plot_skeleton:
      variant_label: strategy_03_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} arrives before anyone, lays out three backup versions of the work,
          and rehearses the answer to a question no one has asked yet. They sit facing the door. They
          always sit facing the door.'
        camera_hint: wide_establishing
        mood_hint: vigilance
        is_carrier: true
      - beat: 2
        text: Footsteps approach in the hall. {protagonist}'s hand stills over the keyboard; this could
          be it — the moment someone arrives to say there's been a mistake, you, here, all along. The
          footsteps pass. The breath {protagonist} was holding releases. The bracing does not.
        camera_hint: close_up_listening
        mood_hint: anticipation
        is_carrier: true
      - beat: 3
        text: '{companion}, sorting files at the next desk before they retire for good, watches {protagonist}
          flinch at a passing shadow. ''Forty years,'' they say mildly, ''and the audit you''re waiting
          for? It never sends a calendar invite. Mostly because it isn''t on anyone''s calendar but yours.'''
        camera_hint: medium_two_shot
        mood_hint: gentleness
        is_carrier: true
      - beat: 4
        text: '{protagonist} laughs it off and pulls up the credentials anyway — the record of every project,
          every sign-off, evidence assembled for a tribunal. The folder is thick. It has always been thick.
          It has never once been requested by anyone but the prosecutor living behind {protagonist}''s
          ribs.'
        camera_hint: over_shoulder_screen
        mood_hint: defensive
        is_carrier: true
      - beat: 5
        text: '{protagonist} turns, finally, to face the doorway head-on and wait for whoever is coming.
          The doorway is empty. The hallway beyond it is empty. The floor breathes its quiet machine-breath,
          and no one is in it, and no one is coming, and the stillness holds long enough for that to land.'
        camera_hint: wide_empty_doorway
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: Something in {protagonist}'s shoulders, braced for a tap that has never fallen, lowers by
          a degree. They look at the empty door and understand, without a word for it, that they have
          been guarding against a footstep that was always their own heartbeat in the hallway of their
          chest.
        camera_hint: close_up_shoulders
        mood_hint: dawning
        is_carrier: true
      - beat: 7
        text: '{protagonist} closes the thick folder of credentials — not deleting it, just closing it
          — the case for the defense set down because the trial was never convened. The three backup versions
          stay where they are. They were never needed. They were never going to be.'
        camera_hint: close_up_hands
        mood_hint: release
        is_carrier: true
      - beat: 8
        text: '{protagonist} turns their chair, for the first time, so it no longer faces the door. {companion}
          notices and says nothing, only nods, the way you nod at someone who has set down a weight they
          carried so long they''d stopped calling it heavy.'
        camera_hint: medium_two_shot
        mood_hint: easing
        is_carrier: true
      - beat: 9
        text: Later, a colleague does appear in the doorway — to ask {protagonist} for help, plainly,
          because they're the one who knows. {protagonist} answers without reaching for the folder, without
          the rehearsed defense. The footstep arrived. It was not an audit. It was just a door, and someone
          needing them.
        camera_hint: medium_doorway
        mood_hint: renewal
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: The thick folder of credentials sits closed on the desktop, a case prepared for a court that
          never opens.
        ch2: An empty doorway frames an empty hall, and the only footsteps in the building are the ones
          {protagonist} has stopped mistaking for a verdict.
        ch3: A chair turns a few degrees away from the door for the first time in years, and no one walks
          through to notice but the reader.
  strategy_04:
    name: Is This What I'm For
    archetype_template: is_this_what_i_am_for
    description: The hunger for meaning externalized as a deliverable that vanishes downstream into a
      system that never seems to need it. {protagonist} produces report after report, slide after slide,
      into an outbox that swallows everything and reflects nothing back — and the question is not 'is
      this good?' but 'is this what I am for?' The turn is the quiet, almost reckless act of following
      one deliverable to where it actually lands, and finding a single real face on the other end. The
      pointless-feeling work does not become important. {protagonist} finds the one place it was never
      pointless.
    layer_1_plot_skeleton:
      variant_label: strategy_04_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}, late afternoon. {protagonist} attaches the finished report to an email, sends
          it up the chain, and watches the message slide into the sent folder — the eighty-something report
          of the year, gone into the same silent place as all the others.'
        camera_hint: wide_establishing
        mood_hint: emptiness
        is_carrier: true
      - beat: 2
        text: No reply comes. No reply ever comes; the deliverable just disappears into the org chart
          like a coin into deep water, no splash, no ripple. {protagonist} stares at the outbox and feels
          the specific weightlessness of being very busy and entirely unsure what any of it is for.
        camera_hint: insert_screen
        mood_hint: hollow
        is_carrier: true
      - beat: 3
        text: '{companion}, the one person here who seems to do a job no flowchart can name, sets a coffee
          down beside {protagonist}. ''You ever follow one of those all the way down?'' they ask, nodding
          at the screen. ''Most people send a thing up a chain their whole career and never once see where
          it actually lands.'''
        camera_hint: medium_two_shot
        mood_hint: invitation
        is_carrier: true
      - beat: 4
        text: '{protagonist} starts to say it doesn''t matter, that it goes into a database, that no one
          reads it — and the words run thin even as they''re spoken, the way a case runs thin when the
          person making it has stopped believing the verdict. The report has to be for something. They
          simply have never gone and looked.'
        camera_hint: over_shoulder
        mood_hint: questioning
        is_carrier: true
      - beat: 5
        text: '{protagonist} walks the deliverable down — floor by floor, name by name, through the {setting}
          and out the other side of the building''s quiet machinery — and arrives at a door they''ve never
          opened, and stops. They don''t knock yet. They just stand in the hush of having followed the
          thing to its end, and breathe.'
        camera_hint: wide_corridor_still
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: Inside, one person sits with {protagonist}'s report open on their screen — actually open,
          marked up, leaned over. They look up, surprised, and say the report changed how a whole team
          did a thing last month, and they'd wondered who made it. The coin, it turns out, hit a bottom.
          Someone was standing there.
        camera_hint: medium_reveal
        mood_hint: recognition
        is_carrier: true
      - beat: 7
        text: '{protagonist} stands in the doorway with the quiet, unsteady feeling of a question answered
          sideways. The work did not become grand. It became located — it goes somewhere, to someone,
          and that one real face is not nothing. It might, in fact, be the entire point and always have
          been.'
        camera_hint: close_up_face
        mood_hint: dawning
        is_carrier: true
      - beat: 8
        text: Walking back up through the floors, {protagonist} passes their own desk and the outbox full
          of sent things, and the silence of it reads differently now — not a void, but a hallway, with
          rooms at the end of it, with people in the rooms.
        camera_hint: medium_walking
        mood_hint: easing
        is_carrier: true
      - beat: 9
        text: Next report, {protagonist} writes the same as always — but pauses, and pictures the one
          face at the far end of the chain, and finishes it for that person instead of for the outbox.
          Same task. Same silence after sending. A thread now runs through the silence to somewhere real.
        camera_hint: wide_desk
        mood_hint: renewal
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: The sent folder holds eighty-some reports in identical grey rows, and exactly one of them
          has a face at the other end now.
        ch2: A door {protagonist} never knew existed stands at the bottom of the building, light under
          it, someone inside reading.
        ch3: The outbox is as silent as ever after the next send — but the silence has a far wall now,
          and a room, and a name.
  strategy_05:
    name: The Performance Review
    archetype_template: the_ledger_that_scores_the_self
    description: 'Self-worth externalized as a perpetual internal performance review — {protagonist} keeps
      a private ledger, scoring themselves against metrics all day, every deliverable a line item, every
      pause a deduction. Their value rises and falls with the numbers like a stock they cannot stop watching.
      The turn arrives at the blank self-assessment field on the annual form: the cursor in an empty box,
      and the discovery that there is a self to assess that existed before any score and is not produced
      by it. The metrics stay. The verdict stops being the person.'
    layer_1_plot_skeleton:
      variant_label: strategy_05_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. On {protagonist}''s second monitor, always open, a private tally: tasks closed,
          hours logged, a running self-score that ticks up and down through the day like a number on an
          exchange. They check it the way you check a pulse you don''t trust.'
        camera_hint: wide_establishing
        mood_hint: scrutiny
        is_carrier: true
      - beat: 2
        text: A small task slips — a deadline moved, nobody's fault — and {protagonist} watches the internal
          number drop, and feels themselves drop with it, value and figure welded into one falling thing.
          A good metric is a good person. A bad metric is a verdict. There is no third reading on the
          board.
        camera_hint: close_up_screen
        mood_hint: harshness
        is_carrier: true
      - beat: 3
        text: '{companion}, the one who has worked everywhere and been impressed by nowhere, glances at
          the relentless little scoreboard on {protagonist}''s second screen. ''Funny thing about that
          number,'' they say. ''It can tell you what you did. It has never once been able to tell you
          what you''re worth. Different columns. Different ledgers entirely.'''
        camera_hint: medium_two_shot
        mood_hint: challenge
        is_carrier: true
      - beat: 4
        text: '{protagonist} argues the point — that output is the measure, that the score is just honesty,
          that slipping numbers mean a slipping person — and hears, underneath the words, how much they
          sound like a quarterly report defending a stock price. The case is fluent. The case is also
          the cage.'
        camera_hint: over_shoulder
        mood_hint: defensive
        is_carrier: true
      - beat: 5
        text: 'The annual self-assessment form is open in the other window, and {protagonist}''s eyes
          land on the first field: ''In your own words, describe your value to the team.'' The cursor
          blinks in the empty box. No metric autofills it. For a long, quiet moment {protagonist} just
          sits with the blank, and the blank does not have a number in it.'
        camera_hint: insert_blank_field
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: '{protagonist} looks from the blinking empty box to the falling scoreboard and back, and
          something uncouples. The box is asking for a person. The scoreboard only ever held a performance.
          They are not, it turns out, the same column — and the person in the box was never the one going
          up and down all day.'
        camera_hint: close_up_face
        mood_hint: dawning
        is_carrier: true
      - beat: 7
        text: '{protagonist} reaches over and minimizes the running tally — not deleting it, the metrics
          are real, the work is the work — just clearing it off the screen so it stops being the mirror
          they read their face in. The empty self-assessment box stays open, patient, waiting for words
          a number could never supply.'
        camera_hint: close_up_hands
        mood_hint: release
        is_carrier: true
      - beat: 8
        text: '''The score can stay on the form,'' {protagonist} says to {companion}, steadier. ''It just
          doesn''t get to be the answer to that.'' They tip their head at the blank field. {companion}
          almost smiles. The scoreboard goes on ticking somewhere, minimized, demoted from a verdict to
          a column.'
        camera_hint: medium_two_shot
        mood_hint: resolve
        is_carrier: true
      - beat: 9
        text: '{protagonist} starts typing in the empty box — not a metric, a sentence about the people
          they helped and the way they show up — and the work in the other window keeps producing its
          numbers, same as ever. The figures rise and fall. The person typing does neither. They were
          here before the score, and they remain.'
        camera_hint: wide_desk
        mood_hint: renewal
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: A minimized scoreboard ticks away in the taskbar, still counting, no longer the mirror anyone
          is looking into.
        ch2: The self-assessment box sits open with a blinking cursor, asking in plain words for the one
          thing the metrics could never measure.
        ch3: The day's numbers rise and fall on a hidden tab, indifferent, while a sentence that has nothing
          to do with them grows one word at a time.
anti_pattern_rules:
- forbidden_combination:
  - companion delivers a named diagnosis
  - the words burnout, anxiety, impostor, self-worth, or meaning spoken in dialogue
  - a beat that names the lesson
  - a self-help maxim quoted as the turn
  reason: 'The Golden Rule: the psychological content is the resolution LOGIC, never the stated subject.
    The reader came for the workplace drama. The moment a character says ''you''re burned out'' or ''this
    is impostor syndrome,'' the genre breaks and the manga becomes a pamphlet. The inner state must stay
    externalized as the office device (the role, the number, the audit, the deliverable, the review) and
    the turn must be a gesture or image, not an explanation.'
- forbidden_combination:
  - the company collapses or a villain-boss is exposed
  - a promotion, raise, or award as the resolution
  - the protagonist quits in a triumphant blaze
  - the external work problem gets solved to fix the inner state
  reason: Workplace_drama here is embedded wellness, not corporate revenge or wish-fulfillment. The shift
    is internal and the institution persists indifferently (seinen-adjacent register). Resolving the inner
    state by winning the external game (raise, promotion, exposing the bad boss, quitting heroically)
    teaches that worth is contingent on outcome — the exact wiring the topic is meant to loosen. The job
    stays the same; the protagonist's relationship to it is what turns.
