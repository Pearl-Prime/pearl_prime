schema_version: 1.0.0
genre: action_battle
strategy_count: 5
selection_algorithm: sha256_hash_seeded
topic_strategy_map:
  courage: strategy_01
  anger: strategy_02
  self_doubt: strategy_03
  protecting_others: strategy_04
  resolve: strategy_05
character_pool:
  protagonist:
  - Kaito Arashi
  - Rei Tachibana
  - Jin Kurosawa
  - Hana Sumeragi
  - Tetsu Onishi
  companion:
  - a scarred old swordmaster who teaches in fragments and never finishes a sentence
  - a retired champion who now sweeps the training hall and watches more than she speaks
  - a battle-worn elder who lost a hand and gained a stillness, speaking only when it counts
  - a quiet armorer who reads a fighter's heart by how they hold the blade
  - a wandering monk-fighter who answers questions with a single move, never a lecture
  setting:
  - a mountaintop training ground above the clouds at first light
  - a ruined coliseum reclaimed by grass, wind moving through the broken tiers
  - a rain-slicked rooftop arena over a sleepless neon city
  - a frozen river-crossing where every step cracks the ice
  - a lantern-lit dojo at the edge of a forest, paper walls trembling in the dark
strategies:
  strategy_01:
    name: The Strike Before the Fear Lands
    archetype_template: act_while_afraid
    description: 'Courage told as the battle device: courage is not the absence of fear but the strike
      thrown WHILE the hands are still shaking. The protagonist freezes at the edge of a fight that is
      plainly beyond them; the genre externalizes the inner state as the gap between the trembling guard
      and the blow that finally crosses it. The turn is never a pep-talk — it is a single committed movement
      made before the fear has finished arriving. Breath-then-strike rhythm; one held silent beat at the
      threshold; the chapter closes on the impact, not the outcome.'
    layer_1_plot_skeleton:
      variant_label: strategy_01_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}, first light. {protagonist} stands at the edge of the ground where a fight they
          did not choose is already waiting — a figure far stronger across the open space. Their drawn
          blade trembles, just slightly, at the tip.'
        camera_hint: wide_establishing
        mood_hint: dread
        is_carrier: true
      - beat: 2
        text: The opponent moves first. {protagonist} parries on instinct and is driven back three steps,
          boots skidding. The shaking in the hands is worse now, and they grip harder to hide it — which
          only makes it visible.
        camera_hint: medium_action
        mood_hint: trembling
        is_carrier: false
      - beat: 3
        text: '{protagonist} retreats behind a broken pillar, chest heaving, blade pressed flat to their
          own forehead. The thought is loud and simple: I cannot do this. The body has already decided
          to run before the mind admits it.'
        camera_hint: close_up
        mood_hint: fear
        is_carrier: true
      - beat: 4
        text: '{companion} speaks from the edge of the ground — not a rescue, not a lecture. ''The shaking
          isn''t the enemy. It means you understand exactly how much this costs. Cowards don''t shake.
          They''ve already left.'''
        camera_hint: medium_two_shot
        mood_hint: steadying
        is_carrier: true
      - beat: 5
        text: Silence. {protagonist} looks down at their own trembling hand for one long beat. They do
          not will it to stop. They simply close their fingers around the grip while it is still shaking,
          and breathe out.
        camera_hint: extreme_close_up
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: '{protagonist} steps out from behind the pillar — straight into the opening, before the
          fear has finished its sentence. The strike crosses the distance the moment the body would rather
          flee. Speed lines, the held breath released into the swing.'
        camera_hint: impact_zoom
        mood_hint: ignition
        is_carrier: true
      - beat: 7
        text: Blades lock. {protagonist} is still afraid — it is written all over their face — and they
          are pressing forward anyway, weight driving the guard back inch by inch. Courage is not on the
          face; it is in the forward foot.
        camera_hint: close_up
        mood_hint: defiance
        is_carrier: true
      - beat: 8
        text: The opponent gives a half-step. {protagonist} lands clean for the first time, and the recoil
          runs up arms that have stopped shaking — not because the fear is gone, but because there is
          no longer any room left in the hands for it.
        camera_hint: impact_zoom
        mood_hint: breakthrough
        is_carrier: false
      - beat: 9
        text: 'Final image: {protagonist} planted in the center of the ground, blade lowered, breathing
          hard, the fear still bright in their eyes and the body unmistakably standing IN the fight now.
          {companion} watches from the edge and says nothing. The strike has already answered the question.'
        camera_hint: wide_establishing
        mood_hint: resolve
        is_carrier: true
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: the trembling hand closing around the grip a heartbeat before the lunge
        ch2: a fighter stepping out from cover straight into a blow no one expected them to meet
        ch3: two blades locked, the afraid face pressing forward anyway
  strategy_02:
    name: The Fire That Protects, The Fire That Burns
    archetype_template: fire_that_protects_vs_consumes
    description: 'Anger told as the battle device: the same flame can shield or consume, and a technique
      that runs on rage will hollow out the one who wields it. The protagonist unlocks a furious power
      that wins — and the genre externalizes the inner state by showing the technique scorching its own
      user, the strikes growing wild, the heat turning inward. The turn is the moment the fighter aims
      the fire instead of being aimed by it — carried by a changed stance, not by a renunciation speech.
      Cost is always visible; the surge is followed by exhaustion and one breath of stillness.'
    layer_1_plot_skeleton:
      variant_label: strategy_02_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}, the air already charged. An enemy stands over someone {protagonist} could not
          protect in time — a cruelty done casually. Something in {protagonist} goes white-hot, and the
          blade in their hand begins, faintly, to smoke.'
        camera_hint: medium_action
        mood_hint: kindling
        is_carrier: true
      - beat: 2
        text: The rage becomes a technique. {protagonist} ignites — a roaring surge of force that throws
          the enemy across the ground. It works. It works beautifully. The first hit lands like a verdict.
        camera_hint: impact_zoom
        mood_hint: fury
        is_carrier: false
      - beat: 3
        text: But each swing comes wilder than the last, and the heat is no longer only going outward.
          Steam rises off {protagonist}'s own arms; the grip blisters; the strikes start missing as the
          fire eats the precision that aimed it.
        camera_hint: close_up
        mood_hint: consuming
        is_carrier: true
      - beat: 4
        text: '{protagonist} overextends, blind with it, and nearly cuts the very person they came to
          protect — stopping a hair short. The frozen blade hangs in the air between rage and the face
          it almost struck.'
        camera_hint: extreme_close_up
        mood_hint: horror
        is_carrier: true
      - beat: 5
        text: '{companion}, from the edge: ''That fire will defend everything you love or it will burn
          through you to get to one enemy. Same flame. You decide which by where you point it — not by
          how hard it roars.'''
        camera_hint: medium_two_shot
        mood_hint: warning
        is_carrier: true
      - beat: 6
        text: Stillness. {protagonist} lowers the smoking blade and simply breathes — one slow breath,
          then another — letting the wildfire bank down to a coal. Not extinguished. Banked. The roar
          in the ears finally quiets to a hum.
        camera_hint: close_up
        mood_hint: stillness
        is_carrier: true
      - beat: 7
        text: '{protagonist} rises into a new stance — lower, contained, the heat now held tight behind
          the guard instead of spraying off it. When the enemy charges, the fire goes out along ONE line:
          a single, deliberate, devastating strike.'
        camera_hint: impact_zoom
        mood_hint: focus
        is_carrier: true
      - beat: 8
        text: The blow lands clean and the enemy drops. {protagonist} stands steaming but unburned this
          time, arms steady — the fire spent on the target and not on themselves. The cost shows in their
          exhaustion, not in fresh self-inflicted scars.
        camera_hint: wide_establishing
        mood_hint: control
        is_carrier: false
      - beat: 9
        text: 'Final image: {protagonist} kneels beside the one they protected, blade set down and still
          faintly warm, the last of the heat curling off it into the cold air. {companion} watches the
          banked coal, not the won fight. The flame chose its direction.'
        camera_hint: wide_establishing
        mood_hint: tempered
        is_carrier: true
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: a rage-lit blade frozen a hair from the face it came to protect
        ch2: the wildfire stance dropping into one contained, deliberate line
        ch3: a fighter standing steaming but unburned, the fire spent outward at last
  strategy_03:
    name: The Stance That Would Not Hold
    archetype_template: am_i_strong_enough
    description: 'Self-doubt told as the battle device: ''am I strong enough'' lives in the hands, and
      a guard built on a shaking conviction collapses under the first real pressure. The protagonist knows
      the technique perfectly in practice and cannot make it hold against an opponent who keeps asking,
      with every blow, the question they cannot answer about themselves. The genre externalizes the inner
      state as a stance that keeps breaking from the inside, not from the enemy''s strength. The turn
      is carried by the body finding its base — the doubt is not argued away, it is out-stood.'
    layer_1_plot_skeleton:
      variant_label: strategy_03_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} faces a sparring opponent they have every reason to match — same
          school, same training. They set their guard, textbook-perfect. The opponent taps it once, almost
          gently, and it folds.'
        camera_hint: medium_action
        mood_hint: uncertainty
        is_carrier: true
      - beat: 2
        text: Again. The stance is flawless in shape and empty at the core; every time the pressure comes,
          {protagonist}'s weight drifts back onto the heels, the base dissolving. The opponent isn't breaking
          the guard — the guard is breaking itself.
        camera_hint: close_up
        mood_hint: faltering
        is_carrier: true
      - beat: 3
        text: '{protagonist} is driven to one knee, blade skidded away across the ground. The question
          is louder than the impact: maybe I was never actually strong enough. Maybe everyone has always
          been a step above me.'
        camera_hint: extreme_close_up
        mood_hint: doubt
        is_carrier: true
      - beat: 4
        text: '{companion} crouches to {protagonist}''s eye level at the edge of the ground. ''Your form
          is perfect. That''s not the leak. You''re holding the stance like you''re asking permission
          to be here. The ground doesn''t grant permission. It just holds whoever commits to it.'''
        camera_hint: medium_two_shot
        mood_hint: grounding
        is_carrier: true
      - beat: 5
        text: Silence. {protagonist} kneels with one palm flat on the ground, eyes closed, and just feels
          the weight of their own body pressing down into it. No technique. Only the simple fact of being
          here, taking up exactly this much space.
        camera_hint: close_up
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: '{protagonist} stands and resets — same textbook stance, but the weight has dropped through
          the heels into the soles, rooted. When the opponent tests it again, the guard does not fold.
          It moves the OPPONENT instead.'
        camera_hint: impact_zoom
        mood_hint: steadying
        is_carrier: true
      - beat: 7
        text: Now {protagonist} holds under a real exchange, the base unbroken, each blow met and returned.
          The doubt has not vanished — it flickers behind the eyes — but the stance no longer answers
          to it. The hands have stopped asking.
        camera_hint: medium_action
        mood_hint: conviction
        is_carrier: true
      - beat: 8
        text: A clean exchange ends with both fighters even, breathing hard, {protagonist} still standing
          exactly where they planted. The opponent gives a small nod. The question 'am I strong enough'
          was never settled by an answer — only by refusing to step back off the line.
        camera_hint: wide_establishing
        mood_hint: resolve
        is_carrier: false
      - beat: 9
        text: 'Final image: {protagonist} alone on the ground after, walking through the broken stance
          once more — slow, deliberate, the base holding every time. {companion} watches from the shadow
          and lets them be. The leak is sealed not by certainty but by commitment.'
        camera_hint: wide_establishing
        mood_hint: quiet_strength
        is_carrier: true
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: a flawless guard folding under the gentlest tap
        ch2: a palm pressed flat to the ground, feeling the simple weight of being here
        ch3: the stance that finally moves the opponent instead of breaking
  strategy_04:
    name: The Weight You Stand In Front Of
    archetype_template: whose_weight_you_carry
    description: 'Protecting others told as the battle device: the question is always whose weight you
      choose to carry, and the body becomes the shield. The protagonist has been fighting to win, alone,
      treating the people behind them as bystanders — until an attack aimed past them forces the choice
      to plant in the gap and take the blow meant for someone else. The genre externalizes the inner state
      as the act of stepping IN FRONT, the back turned to the enemy to cover the weak. The turn is carried
      by the body interposed, never by a vow declared aloud.'
    layer_1_plot_skeleton:
      variant_label: strategy_04_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}, a fight already in motion. {protagonist} battles a powerful enemy with cold
          efficiency, winning ground — and barely noticing the wounded ally crumpled in the dust a few
          paces behind them. The fight is, to {protagonist}, theirs alone.'
        camera_hint: wide_establishing
        mood_hint: isolation
        is_carrier: true
      - beat: 2
        text: '{protagonist} presses an opening, hungry for the finish — and leaves their flank open.
          The enemy reads it instantly and pivots, not toward {protagonist}, but toward the helpless one
          on the ground behind them.'
        camera_hint: medium_action
        mood_hint: alarm
        is_carrier: false
      - beat: 3
        text: Time stretches. {protagonist} sees the strike already on its way past them, toward someone
          who cannot move. The win is one clean step forward. The save is a hard pivot backward into the
          path of the blow. Two directions; one body.
        camera_hint: close_up
        mood_hint: reckoning
        is_carrier: true
      - beat: 4
        text: '{companion}''s voice cuts across the ground, low and certain: ''Strength that only ever
          covers itself isn''t strength. It''s just survival wearing armor. Decide right now whose weight
          your body is for.'''
        camera_hint: medium_two_shot
        mood_hint: summons
        is_carrier: true
      - beat: 5
        text: Stillness — a single suspended beat. {protagonist} stops reaching for the win. They turn
          their back fully on the enemy, putting themselves squarely between the blow and the fallen ally,
          arms spreading wide. No words. Just the body, offered.
        camera_hint: extreme_close_up
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: The strike lands on {protagonist}'s back. They take it standing, planted over the wounded
          one, refusing to fold. Pain blooms across their face — and underneath it, for the first time,
          something that is not alone. The weight has a name now.
        camera_hint: impact_zoom
        mood_hint: sacrifice
        is_carrier: true
      - beat: 7
        text: '{protagonist} straightens, ally now safe behind their heels, and turns back to the enemy
          — and the stance is utterly different. Lower. Wider. Anchored. A guard built to hold a doorway,
          not to chase a kill.'
        camera_hint: medium_action
        mood_hint: resolve
        is_carrier: true
      - beat: 8
        text: The enemy strikes again and meets a wall. {protagonist} no longer gives ground, because
          giving ground now means giving up the person behind them. The body that fought to win has become
          the body that holds the line.
        camera_hint: impact_zoom
        mood_hint: immovable
        is_carrier: false
      - beat: 9
        text: 'Final image: {protagonist} stands braced over the wounded ally, blade up, back broad against
          the dark, breathing through the pain and not moving one inch. {companion} watches the planted
          feet. The fight stopped being theirs alone the moment they turned to cover someone else.'
        camera_hint: wide_establishing
        mood_hint: guardian
        is_carrier: true
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: a fighter turning their back on the enemy to spread their arms over the fallen
        ch2: the blow landing on a back that refuses to fold
        ch3: a kill-chasing stance reshaped into a wall built to hold a doorway
  strategy_05:
    name: One More Time Than You Fall
    archetype_template: the_vow_that_outlasts_the_body
    description: 'Resolve told as the battle device: resolve is not a feeling but an arithmetic — rising
      one more time than you are put down. The protagonist faces an opponent who can knock them flat at
      will; the fight is not about landing the better blow but about whether they will stop getting up.
      The genre externalizes the inner state as the count of falls and rises, the body refusing to stay
      on the ground. The turn is carried by a rise made when staying down would be reasonable and merciful
      — and the vow lives in the legs, never in a monologue.'
    layer_1_plot_skeleton:
      variant_label: strategy_05_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}, late in a fight {protagonist} is losing. The opponent is simply better, and
          proves it — a single blow puts {protagonist} flat on their back, staring up at the sky. The
          first fall. It looks like the last.'
        camera_hint: wide_establishing
        mood_hint: defeat
        is_carrier: false
      - beat: 2
        text: '{protagonist} gets up. Gets knocked down. Gets up again. The opponent isn''t even pressing
          hard now — there''s no need. Each rise is slower than the last, and the ground is starting to
          look like the only honest option.'
        camera_hint: medium_action
        mood_hint: attrition
        is_carrier: true
      - beat: 3
        text: 'On the fifth fall {protagonist} stays down a beat too long, cheek in the dust, every muscle
          voting to quit. The thought arrives reasonably, almost kindly: no one would blame me for staying
          here. This is enough. This is plenty.'
        camera_hint: extreme_close_up
        mood_hint: exhaustion
        is_carrier: true
      - beat: 4
        text: '{companion}, from the edge, does not shout encouragement. ''Resolve isn''t how hard you
          can hit. Anyone can hit hard once. It''s the number. It''s whether you get up the time it stops
          making sense to.'''
        camera_hint: medium_two_shot
        mood_hint: weight
        is_carrier: true
      - beat: 5
        text: 'Silence. {protagonist} lies still, breathing into the dirt, and does not rally with a roar.
          One hand simply finds the ground and presses. The whole vow has shrunk down to a single question
          answered by the palm: again?'
        camera_hint: close_up
        mood_hint: stillness
        is_carrier: true
      - beat: 6
        text: '{protagonist} rises — the sixth time, the time it stopped being sensible — swaying, ruined,
          upright. They raise the blade with arms that should not be able to lift it. The opponent''s
          eyes change. This was the variable they could not knock down.'
        camera_hint: impact_zoom
        mood_hint: defiance
        is_carrier: true
      - beat: 7
        text: The opponent strikes to end it and {protagonist} takes the hit, falls — and is already pushing
          up before they have fully landed. Fall and rise have collapsed into one motion now. You cannot
          defeat someone who treats the ground as a place you pass through.
        camera_hint: medium_action
        mood_hint: indomitable
        is_carrier: true
      - beat: 8
        text: Worn down by a will that will not spend itself, the opponent's perfect rhythm finally cracks;
          their next blow comes a fraction late. {protagonist}, still standing only because they decided
          to, slips inside it. Resolve did not out-hit them. It out-lasted them.
        camera_hint: impact_zoom
        mood_hint: turning
        is_carrier: false
      - beat: 9
        text: 'Final image: {protagonist} stands swaying in the center of the ground, blade up, more fall
          than fighter, and entirely unwilling to go down again. {companion} watches the legs that keep
          choosing to hold. The count was the whole story: one more rise than falls.'
        camera_hint: wide_establishing
        mood_hint: resolve
        is_carrier: true
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: a hand finding the ground and pressing — again? — without a single word
        ch2: a ruined fighter rising the one time it stopped making sense
        ch3: fall and rise collapsed into a single unbreakable motion
anti_pattern_rules:
- forbidden_combination:
  - talk_no_jutsu_turn
  - moral_speech_at_climax
  - caption_names_the_feeling
  reason: 'The genre''s cardinal failure mode (action_battle bible §6.5): the psychological turn must
    be carried by the BODY and the BLADE — a held stance, a breath taken before the strike, who the fighter
    steps in front of — never a monologue that explains the lesson or a caption that says ''he was afraid
    / angry / unsure.'' The reader names the feeling; the fight states it. A turn resolved by a speech
    is forbidden.'
- forbidden_combination:
  - power_up_without_cost
  - escalation_without_silence_beat
  - mentor_death_as_default_escalation
  reason: 'Bible §2/§6: every escalation must land a visible cost and be preceded or followed by a breath/silence
    beat (silent panel % 10-20). A power surge with no exhaustion, no held silent panel, or a mentor killed
    merely to spike emotion reads as cheap spectacle and breaks the effort-reward reader contract.'
