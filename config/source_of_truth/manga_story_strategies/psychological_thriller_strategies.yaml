schema_version: 1.0.0
genre: psychological_thriller
strategy_count: 5
selection_algorithm: sha256_hash_seeded
topic_strategy_map:
  overthinking: strategy_01
  paranoia: strategy_02
  rumination: strategy_03
  control: strategy_04
  obsession: strategy_05
character_pool:
  protagonist:
  - Mara Voss
  - Eli Tanaka
  - Iris Halloran
  - Dane Okafor
  - Noa Reyes
  companion:
  - a retired night-shift detective who measures words like evidence
  - a forensic archivist who trusts only what can be timestamped
  - a sleep-clinic counselor with a slow, level voice
  - an old chess partner who never plays the obvious move
  - a courthouse stenographer who has heard every confession and judges none
  setting:
  - a glass-walled analytics office at 3 a.m., monitors the only light
  - a rain-streaked apartment with one mirror angled toward the door
  - a basement records vault that hums and never fully goes quiet
  - a 24-hour transit station where the same announcement loops
  - a fog-bound coastal town where every house can see every other house
strategies:
  strategy_01:
    name: The Case File That Keeps Revising Itself
    archetype_template: the_read_that_will_not_stop_revising
    description: OVERTHINKING externalized as the unreliable narrator's spiral. {protagonist} is a working
      analyst whose internal monologue reads like a case file being rewritten in real time — every reading
      corrected by a sharper, darker reading until the corrections themselves become the threat. The caption
      confirms; the art quietly contradicts. The turn is not a conclusion reached but the moment {protagonist}
      stops adding to the file and lets one page stay unrevised. Silence near the turn = the first unedited
      frame. No clean resolution; close on a livable gap.
    layer_1_plot_skeleton:
      variant_label: strategy_01_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} narrates the situation with total confidence — three sentences
          of clean deduction, a verdict reached. The caption is precise and certain. One detail in the
          frame does not agree with it, and {protagonist} does not see the detail.'
        camera_hint: false_clarity_medium
        mood_hint: certainty
        is_carrier: true
      - beat: 2
        text: A second reading overwrites the first. The same evidence, reinterpreted darker, faster —
          a marginal note that contradicts the verdict {protagonist} reached one panel ago. The handwriting
          in the caption is getting smaller.
        camera_hint: evidence_detail_insert
        mood_hint: revision
        is_carrier: false
      - beat: 3
        text: '{companion} sets down a coffee and says one short sentence about the actual, ordinary thing
          in front of them. {protagonist} hears it as a clue and immediately files it into the case. The
          reader sees it was just coffee.'
        camera_hint: anchor_two_shot
        mood_hint: deflection
        is_carrier: false
      - beat: 4
        text: 'The spiral accelerates: branching annotations crowd the panel margins, each correction
          spawning two more, the certainty of beat one now buried under footnotes. Distortion-CU — the
          frame fishbowls slightly around {protagonist}''s eyes.'
        camera_hint: distortion_cu_spiral
        mood_hint: vertigo
        is_carrier: true
      - beat: 5
        text: The cost lands. {companion}, who has watched this loop run before, says something shorter
          and more direct than usual — a line that reads as either steadying or as one more thing to analyze.
          {protagonist} cannot tell which, and that not-knowing is the wound.
        camera_hint: anchor_cost_close
        mood_hint: strain
        is_carrier: true
      - beat: 6
        text: '{protagonist} reaches the bottom of the page and there is no bottom — the file has revised
          itself into a place with no verdict left standing, every reading cancelling the last. The pen
          stops over the paper.'
        camera_hint: narration_void_insert
        mood_hint: exhaustion
        is_carrier: true
      - beat: 7
        text: '{protagonist} lifts the pen off the page. Does not write the next correction. The panel
          holds — the margin stays blank, the case file open and unfinished, and for the first time the
          caption box is empty. Silence.'
        camera_hint: held_blank_page_silence
        mood_hint: stillness
        is_carrier: true
      - beat: 8
        text: One ordinary fact is allowed to stay one fact. {protagonist} looks at the thing {companion}
          actually said, and lets it mean only what it meant — no gloss, no bracket. The line weight in
          the panel settles from wobble to even.
        camera_hint: settled_even_line_medium
        mood_hint: clearing
        is_carrier: true
      - beat: 9
        text: Ambiguous-livable close. CU on the closed notebook, or on {protagonist}'s hand resting flat
          on the cover. One reading remains unrevised on the page — not because it was proven, but because
          it was left alone. The reader holds what {protagonist} chose not to overwrite.
        camera_hint: ambiguous_close_cu
        mood_hint: quiet
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: the verdict from page one now buried under its own corrections
        ch2: a line of dialogue the protagonist filed as a clue that the reader knows was nothing
        ch3: the pen lifted off the page, the next correction unwritten
  strategy_02:
    name: Someone Has Been Reading Over My Shoulder
    archetype_template: the_watcher_who_shares_your_vantage
    description: PARANOIA externalized as the watcher. {protagonist} is certain they are being observed
      — a presence at the edge of every frame, a sense on the back of the neck, evidence that almost-but-never-quite
      resolves into a face. The threat is diffuse and possibly internal; the art and the caption disagree
      about whether anyone is there. The turn is the moment {protagonist} stops searching the room for
      the watcher and the watcher's vantage is revealed to rhyme with their own. Silence near the turn
      = the held breath when the looked-for confirmation does not come. No clean answer; the relief and
      the recognition arrive together.
    layer_1_plot_skeleton:
      variant_label: strategy_02_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} states it plainly in caption: someone is watching. They know the
          signs — the moved object, the angle of the mirror, the feeling. The art shows an ordinary room.
          The certainty is total and the proof is just out of frame.'
        camera_hint: over_the_shoulder_medium
        mood_hint: vigilance
        is_carrier: true
      - beat: 2
        text: First evidence. A door {protagonist} remembers closing stands open a hand's width; a reflection
          holds a shape a half-second too long. {protagonist} accounts for it as surveillance, confidently
          and too fast. The reader notes the speed.
        camera_hint: evidence_detail_insert
        mood_hint: suspicion
        is_carrier: false
      - beat: 3
        text: '{protagonist} sets a trap for the watcher — a hair across a drawer, a phone propped to
          record the empty room. They wait for the response that would confirm them. The waiting itself
          is the threat; the panel holds on nothing happening.'
        camera_hint: threatening_silence_hold
        mood_hint: dread
        is_carrier: false
      - beat: 4
        text: 'The watcher, glimpsed. Never whole — a presence felt, a wrongness at the periphery, the
          distinct sense of a vantage point trained on {protagonist}. Distortion-CU: the panel itself
          seems observed, framed from a corner no one is standing in.'
        camera_hint: distortion_cu_pov
        mood_hint: exposure
        is_carrier: true
      - beat: 5
        text: The cost on the anchor. {companion} appears in the doorway and {protagonist}'s body flinches
          toward threat before recognition catches up. {companion} says something short — care edged with
          their own fear of how far this has gone. {protagonist} cannot fully trust even this.
        camera_hint: anchor_cost_two_shot
        mood_hint: isolation
        is_carrier: true
      - beat: 6
        text: '{protagonist} reviews the recording. The empty room is empty. But the angle the watcher
          would need — to see what {protagonist} swears was seen — is exactly the angle {protagonist}
          has been standing at all night. The realization is not stated. Held in silence.'
        camera_hint: matched_vantage_silence
        mood_hint: recognition
        is_carrier: true
      - beat: 7
        text: '{protagonist} stops scanning the corners. Stands still in the middle of the room and simply
          breathes — does not hunt the watcher, does not confirm or deny it. One slow breath. Then another.
          The vignette around the panel loosens.'
        camera_hint: still_center_breath
        mood_hint: release
        is_carrier: true
      - beat: 8
        text: The pressure redistributes. The room is a room; the angles are just angles. {protagonist}
          lets the watched feeling be present without obeying it — neither dismissed nor surrendered to.
          The screentone warms a single degree, and this time the reader is allowed to half-trust it.
        camera_hint: loosening_environment_medium
        mood_hint: steadying
        is_carrier: true
      - beat: 9
        text: Ambiguous-livable close. CU on {protagonist}'s face, or on the mirror now angled away from
          the door. The sense of being seen has not vanished — it has been recognized as theirs to hold.
          One thing the reader understands about the vantage that {protagonist} has not said aloud.
        camera_hint: ambiguous_close_cu
        mood_hint: quiet
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: the trap set, the recording rolling on an empty room
        ch2: the body flinching from the one person who came to help
        ch3: the watcher's angle revealed to be the protagonist's own
  strategy_03:
    name: The Tape That Will Not Reach Its End
    archetype_template: the_loop_that_finally_runs_past_its_cut
    description: RUMINATION externalized as the loop that will not close — a single past moment {protagonist}
      replays on hard match-cuts, returning to the same image from a different door each time, certain
      that one more pass will finally extract the answer that releases them. The threat is the recursion
      itself; each replay is rendered as identical-but-degraded, the loop accruing visible cost. The turn
      is not solving the moment but letting the tape run past the point it always stops. Silence near
      the turn = the frame after the loop's usual cut, finally allowed to continue. No tidy meaning extracted;
      the loop simply opens.
    layer_1_plot_skeleton:
      variant_label: strategy_03_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} replays it again in caption — the sentence said, the look given,
          the door that closed. The account is exact, rehearsed smooth. A clock face in the frame match-cuts
          to a spiral worn into a doodle on the desk. They have been here before.'
        camera_hint: match_cut_loop_open
        mood_hint: fixation
        is_carrier: true
      - beat: 2
        text: The same scene from a new angle. {protagonist} re-enters the memory through a different
          door, hunting the frame they must have missed — the variable that, once found, will let the
          tape stop. Nothing new is there. The replay is slightly more worn than last time.
        camera_hint: replay_degraded_insert
        mood_hint: searching
        is_carrier: false
      - beat: 3
        text: '{companion} asks, plainly, what {protagonist} is going to do with the answer once they
          have it. {protagonist} has no use for it — only the need to reach it. The question does not
          fit anywhere in the loop, so it is discarded.'
        camera_hint: anchor_two_shot
        mood_hint: evasion
        is_carrier: false
      - beat: 4
        text: The loop tightens. The same three images cycle faster — sentence, look, closing door — the
          match-cuts coming harder, the panel grid itself starting to repeat its own borders. Distortion-CU
          on the frozen final frame the tape always stops at.
        camera_hint: distortion_cu_tightening
        mood_hint: compulsion
        is_carrier: true
      - beat: 5
        text: The cost lands. {companion}, who has heard this replay more times than either will count,
          says something shorter than before — that the moment is over for everyone except in this room.
          It lands two ways, and {protagonist} feels how much of the present the loop has eaten.
        camera_hint: anchor_cost_close
        mood_hint: weariness
        is_carrier: true
      - beat: 6
        text: '{protagonist} reaches the cut — the exact frame the tape always stops at, the door just
          closing — and for once does not rewind. The panel holds on the frame after it. Empty hallway.
          The thing that happens next is: nothing. The loop''s terminal silence, finally entered instead
          of escaped.'
        camera_hint: past_the_cut_silence
        mood_hint: stillness
        is_carrier: true
      - beat: 7
        text: The tape runs on into ordinary time. The closed door is just a closed door in an empty hall;
          there is no hidden frame, no withheld answer — only the after, which {protagonist} has never
          let themselves watch. The match-cut grammar dissolves into a single continuous panel.
        camera_hint: continuous_panel_release
        mood_hint: opening
        is_carrier: true
      - beat: 8
        text: '{protagonist} lets the moment be finished. Not understood — finished. The spiral doodle
          on the desk is left half-drawn, the line trailing off instead of closing the curl. The black-fill
          in the panel lightens.'
        camera_hint: unclosed_spiral_medium
        mood_hint: clearing
        is_carrier: true
      - beat: 9
        text: Ambiguous-livable close. CU on the half-finished spiral, or on {protagonist}'s hand turning
          the desk lamp off. The moment was never solved. It was only allowed to end. The reader holds
          the frame the loop never used to reach.
        camera_hint: ambiguous_close_cu
        mood_hint: quiet
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: the clock face match-cutting to the same worn spiral again
        ch2: the question the anchor asked that did not fit anywhere in the loop
        ch3: the tape, for once, running one frame past where it always stops
  strategy_04:
    name: The Protocol Is Running Me Now
    archetype_template: the_system_that_runs_its_operator
    description: CONTROL externalized as the system {protagonist} built to stay safe — a meticulous protocol
      of checks, contingencies, and rehearsed catastrophes rendered as tight, even, false-clarity linework.
      The protocol promised to manage the threat; the turn reveals the protocol IS the threat, a structure
      now operating {protagonist} rather than serving them. The art's clean grid cracks where the caption
      insists everything is under control. The shift is not seizing more control but the deliberate loosening
      of one grip-point. Silence near the turn = the held breath when a check goes deliberately undone
      and the feared collapse does not come.
    layer_1_plot_skeleton:
      variant_label: strategy_04_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} runs the sequence — locks checked, contingencies confirmed, the
          day pre-played for every failure. The caption is calm and total: nothing can go wrong that has
          not been accounted for. The linework is tight, even, almost too clean.'
        camera_hint: controlled_grid_medium
        mood_hint: command
        is_carrier: true
      - beat: 2
        text: A variable resists. Something small refuses to fit the protocol — an unanswered message,
          a changed schedule. {protagonist} manages it, but the management costs more than it should.
          The reader notes effort where there used to be ease.
        camera_hint: small_crack_close
        mood_hint: friction
        is_carrier: false
      - beat: 3
        text: '{companion} observes, mildly, how many checks the morning required. {protagonist} explains
          the system''s necessity, fluent and reasonable — every rule has a story, every story a near-miss
          it once prevented. The defense is airtight. The airtightness is the problem.'
        camera_hint: anchor_two_shot
        mood_hint: justification
        is_carrier: false
      - beat: 4
        text: 'The protocol metastasizes. New rules spawn to protect the old rules; the sequence that
          took minutes now governs hours, and {protagonist} serves it faithfully. Distortion-CU: the clean
          grid of the panel warps at one corner, a single line wobbling where it should hold.'
        camera_hint: distortion_cu_grid_warp
        mood_hint: constriction
        is_carrier: true
      - beat: 5
        text: The cost lands. {companion} names, in a shorter and more direct line than usual, the thing
          the protocol has quietly cost them both — a plan missed, a closeness rationed. It reads as either
          concern or accusation. {protagonist} feels the system tighten in response, defending itself.
        camera_hint: anchor_cost_close
        mood_hint: strain
        is_carrier: true
      - beat: 6
        text: '{protagonist} stands at the next check — the lock, the list, the rehearsal — and deliberately
          does not perform it. Leaves one grip open. The panel holds. The catastrophe the protocol always
          promised does not arrive. Only quiet, and a door left merely closed, not checked.'
        camera_hint: undone_check_silence
        mood_hint: stillness
        is_carrier: true
      - beat: 7
        text: Nothing collapses. The unchecked thing simply holds on its own, the way most things do.
          {protagonist} watches the feared outcome fail to materialize, and the rigid grid of the panel
          eases — lines softening from drafting-precise to merely steady.
        camera_hint: easing_grid_medium
        mood_hint: release
        is_carrier: true
      - beat: 8
        text: '{protagonist} lets one rule lapse on purpose, then sits in the unmanaged minute. Not abandoning
          the system — loosening a single hand. The black-fill that signaled cognitive constriction lightens
          across the page for the first time.'
        camera_hint: open_hand_medium
        mood_hint: clearing
        is_carrier: true
      - beat: 9
        text: Ambiguous-livable close. CU on the unchecked lock, or on {protagonist}'s hand uncurling
          from a fist. The protocol is not dismantled — one grip is simply open, and the world did not
          end. The reader holds the check that went, for once, undone.
        camera_hint: ambiguous_close_cu
        mood_hint: quiet
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: the minutes-long sequence that has quietly grown to govern hours
        ch2: the cost the anchor named, landing as concern or as accusation
        ch3: the one check deliberately left undone, and the collapse that does not come
  strategy_05:
    name: The Pattern I Cannot Stop Solving
    archetype_template: the_pattern_whose_solving_consumes_the_solver
    description: 'OBSESSION externalized as the deduction loop dressed as fixation. {protagonist} has
      found a pattern — a case, a person, a thread of evidence — that holds their full attention the way
      nothing else can, and each correct prediction it yields pulls them deeper. The craft trap is honored:
      every accurate read is immediately shadowed by the same logic producing a wrong one, so the skill
      and the distortion run on identical machinery. The cost on the anchor is visible. The turn is not
      solving the pattern but the moment {protagonist} chooses to set the unfinished thread down. Silence
      near the turn = the still frame where the next deduction is available and {protagonist} does not
      take it.'
    layer_1_plot_skeleton:
      variant_label: strategy_05_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} lays out the pattern — corkboard, threads, a sequence only they
          can see. The caption hums with the pull of it; this is the thing, the one worth everything else.
          The reader must feel the fascination, not judge it. One correct prediction has already proven
          the method works.'
        camera_hint: fixation_board_wide
        mood_hint: absorption
        is_carrier: true
      - beat: 2
        text: The method delivers again — a genuine, accurate read, the thread tightening into something
          real. The obsession is not empty; there is something here. Their judgment is sound. Only their
          relationship to the judgment has begun to slip.
        camera_hint: genuine_progress_insert
        mood_hint: exhilaration
        is_carrier: false
      - beat: 3
        text: The same logic, one panel later, produces a confident read that is plainly wrong — the reader
          can see it even as {protagonist} threads the next pin. Skill and distortion, the identical machine.
          {protagonist} does not notice the misfire; it looks exactly like the hit.
        camera_hint: mirrored_misfire_insert
        mood_hint: blindness
        is_carrier: true
      - beat: 4
        text: '{companion} says it straight, in a line shorter than {protagonist}''s monologue: they can
          see what this is doing to them. {protagonist} answers honestly — yes — and threads the next
          connection anyway. Acknowledgment without change. The board has grown to fill the wall.'
        camera_hint: anchor_cost_two_shot
        mood_hint: compulsion
        is_carrier: true
      - beat: 5
        text: The deepest entry. {protagonist} is closer to the pattern than to any person now, the room
          narrowed to corkboard and thread, every other obligation deprioritized one quiet sacrifice at
          a time. Distortion-CU on the convergence point where all the strings meet — and the pull of
          it.
        camera_hint: distortion_cu_convergence
        mood_hint: consumption
        is_carrier: true
      - beat: 6
        text: '{protagonist} reaches the place where the next deduction is right there — one thread from
          the answer they have paid so much to approach — and stops with their hand on the pin. Does not
          place it. The panel holds. The pattern stays one move short, in silence.'
        camera_hint: hand_on_pin_silence
        mood_hint: stillness
        is_carrier: true
      - beat: 7
        text: '{protagonist} steps back from the board instead of into it. The unfinished thread is left
          hanging — not because it was unsolvable, but because solving it was costing the wrong thing.
          The room widens around them; the narrowing frame opens.'
        camera_hint: stepping_back_wide
        mood_hint: release
        is_carrier: true
      - beat: 8
        text: '{protagonist} looks at {companion} — the relationship the obsession had been quietly spending
          — and lets the pattern keep its last secret. The corkboard stays half-solved on the wall. The
          black-fill eases; the line weight steadies from feverish to plain.'
        camera_hint: turning_toward_anchor_medium
        mood_hint: clearing
        is_carrier: true
      - beat: 9
        text: Ambiguous-livable close. CU on the single thread left hanging, or on {protagonist}'s hand
          setting the pin down on the desk. The pattern is not solved. It was set down. The reader holds
          the deduction {protagonist} chose not to make.
        camera_hint: ambiguous_close_cu
        mood_hint: quiet
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: the same method producing a hit and, a beat later, a wrong read that looks identical
        ch2: the honest 'yes' that changes nothing, the next thread already in hand
        ch3: the hand resting on the pin, the final deduction left unmade
anti_pattern_rules:
- forbidden_combination:
  - supernatural_threat
  - ghost_or_entity_as_source
  - external_villain_with_no_internal_logic
  reason: 'Once the dread has a supernatural or purely-evil external source, the contract flips to psychological
    horror or action: the menace stops being the protagonist''s own perception. The threat in this bank
    must stay human, systemic, or cognitive so the resolution can be the reader recognizing the distortion
    was partly self-made (craft bible §1, §6 failure modes 2 & 5).'
- forbidden_combination:
  - turn_stated_as_self_help
  - caption_names_the_feeling
  - I_realize_I_was_overthinking_line
  - moral_explained_in_speech
  reason: The genre promise dies the moment a caption says 'I realize now I was lying to myself' or names
    the inner state as a symptom — the unreliable narrator becomes reliable about their unreliability
    and the wellness content reads as a lecture. The turn must be carried by the device (the spiral resolving,
    the watcher dissolving, the loop closing) and shown through image and a silence beat, never told (craft
    bible §4, §6 failure mode 1; the Golden Rule).
