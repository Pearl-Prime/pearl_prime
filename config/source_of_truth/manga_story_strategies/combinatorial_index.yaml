# COMBINATORIAL INDEX v1.0.0
# ─────────────────────────────────────────────────────────────────────────────
# Maps how layer variants are indexed for each genre.
# A unique book = unique combination of (strategy × layer_1 × layer_2 ×
#                                        layer_3 × layer_4 × layer_5)
#
# COMBINATION MATH:
#   Each strategy has 3 variants per layer × 5 layers = 3^5 = 243 unique
#   layer combinations per strategy.
#   With 5 strategies per genre: 5 × 243 = 1215 unique outputs per genre
#   before any persona/topic/series_id variation is applied.
#
# SEED FORMULA:
#   seed = f"{series_id}:{arc_id}:{genre}"
#   Each layer is selected independently via SHA-256 derived index.
#   Same inputs always produce the same output (deterministic).
#   Different inputs reliably produce different outputs (distribution).
#
# ANTI-PATTERN ENFORCEMENT:
#   After layer selection, the anti_pattern_rules for the genre are checked.
#   If a forbidden combination is detected:
#     - BLOCKER severity: reselect the blocking layer using a fallback seed
#     - WARNING severity: log the combination; proceed with a warning annotation
# ─────────────────────────────────────────────────────────────────────────────

schema_version: "1.0.0"
index_version: "1.0.0"

# ─────────────────────────────────────────────────────────────────────────────
# GENRE STRATEGY COUNTS
# ─────────────────────────────────────────────────────────────────────────────
genre_strategy_counts:
  shonen: 5
  shojo: 5
  seinen: 5
  # Reserved for future expansion — set to 0 until strategy files are authored:
  iyashikei: 0       # Existing partial genre in story_architect.py — migrate to this system
  josei: 0           # Adult women's manga — related to shōjo but distinct register
  kodomomuke: 0      # Children's manga — simplest EI engagement; not yet designed
  isekai: 0          # Transported-to-another-world — hybrid genre; unique to manga
  horror: 0          # Horror manga — seinen-adjacent but with distinct dread engine
  sports: 0          # Sports manga — shōnen-adjacent but domain-specific
  slice_of_life: 0   # Iyashikei-adjacent but without the healing arc orientation
  bl_gl: 0           # Boys' Love / Girls' Love — relationship-primary; shōjo-adjacent
  mecha: 0           # Mecha manga — action + pilot psychology; seinen-adjacent

# ─────────────────────────────────────────────────────────────────────────────
# COMBINATION COUNTS
# ─────────────────────────────────────────────────────────────────────────────
combinations_per_genre:
  shonen:
    strategies: 5
    layer_variants_per_layer: 3
    layer_count: 5
    # 3^5 = 243 layer combinations × 5 strategies = 1215 per genre
    combinations_per_strategy: 243    # 3^5
    total_combinations: 1215          # 5 × 243
    note: "Before series_id + arc_id + persona variation; those multiply further"

  shojo:
    strategies: 5
    layer_variants_per_layer: 3
    layer_count: 5
    combinations_per_strategy: 243
    total_combinations: 1215

  seinen:
    strategies: 5
    layer_variants_per_layer: 3
    layer_count: 5
    combinations_per_strategy: 243
    total_combinations: 1215

# ─────────────────────────────────────────────────────────────────────────────
# LAYER VARIANT INDEXES
# Maps each genre + strategy + layer to its available variant labels
# for programmatic access without parsing the full strategy files.
# ─────────────────────────────────────────────────────────────────────────────
layer_variant_index:
  shonen:
    strategy_01:  # Tournament Arc
      layer_1: [tournament_standard, tournament_compressed, tournament_expanded]
      layer_2: [overwhelm_primary, shame_primary, comparison_primary]
      layer_3: [escalating_declaration, compressed_sparse, rival_dialogue_heavy]
      layer_4: [high_energy_grid, cinematic_widescreen, chaos_to_order]
      layer_5: [chapter_hook_cascade, slow_burn_reveals, rapid_escalation]

    strategy_02:  # Training Arc
      layer_1: [mentor_arc_standard, solo_discovery, rival_as_mentor]
      layer_2: [shame_to_grief_to_mastery, overwhelm_sustained, false_alarm_correction]
      layer_3: [mentor_sparse_weight, mentor_verbose_teacher, training_internal_monologue]
      layer_4: [repetition_and_variation, body_focus, environment_as_character]
      layer_5: [slow_build_earned_release, montage_acceleration, failure_loop]

    strategy_03:  # World-Threat Arc
      layer_1: [world_threat_standard, no_sacrifice_variant, pyrrhic_world_threat]
      layer_2: [overwhelm_grief_cascade, comparison_fracture, watcher_distance]
      layer_3: [ensemble_burden, protagonist_anchor, sacrifice_heavy_dialogue]
      layer_4: [scale_and_intimacy_contrast, ensemble_grid, threat_architecture]
      layer_5: [weight_accumulation, pressure_compression, aftermath_expansion]

    strategy_04:  # Rival Redemption Arc
      layer_1: [rival_redemption_standard, incomplete_redemption, failed_redemption]
      layer_2: [comparison_to_recognition, shame_mirror, watcher_sympathy]
      layer_3: [sparring_as_conversation, rival_monologue_anchor, silence_converts]
      layer_4: [mirror_composition_evolving, rival_pov_panels, convergence_geometry]
      layer_5: [friction_to_complement, escalating_encounters, quiet_resolution_extended]

    strategy_05:  # Origin/Backstory Arc
      layer_1: [origin_standard, single_flashback, unreliable_witness]
      layer_2: [watcher_to_integration, shame_origin, grief_for_myth]
      layer_3: [fragment_and_weight, interview_structure, letter_or_record]
      layer_4: [present_past_visual_contrast, seamless_bleed, photo_document_style]
      layer_5: [excavation_pace, revelation_acceleration, time_collapse]

  shojo:
    strategy_01:  # First Love Arc
      layer_1: [first_love_standard, uncompleted_confession, mutual_noticing]
      layer_2: [shame_exposure_arc, comparison_distance, false_alarm_love]
      layer_3: [internal_primary, dialogue_parallel, spoken_sparse]
      layer_4: [floating_close_backgrounds, documentary_grounded, season_arc]
      layer_5: [heartbeat_pacing, seasons_pacing, single_day]

    strategy_02:  # Misunderstanding Arc
      layer_1: [misunderstanding_standard, delayed_truth, mutual_misunderstanding]
      layer_2: [spiral_to_correction, shame_mechanism, comparison_sabotage]
      layer_3: [internal_spiral_external_silence, overexplanation_pattern, confrontation_direct]
      layer_4: [proximity_withdrawal_visual, thought_architecture, color_shift]
      layer_5: [spiral_then_release, slow_distance, rapid_correction]

    strategy_03:  # Rivals-in-Love Arc
      layer_1: [rivals_love_standard, competition_continues, one_sided_rivalry]
      layer_2: [comparison_to_wanting, shame_in_wanting, false_alarm_professionalism]
      layer_3: [competition_dialogue_shifts, argument_as_intimacy, silence_accelerates]
      layer_4: [parallel_to_converging, domain_visual_language, jealousy_chapter_dense]
      layer_5: [competition_cadence, escalating_density, competition_chapters_fast]

    strategy_04:  # Growing Up Arc
      layer_1: [growing_up_standard, one_remembers_more, return_to_place]
      layer_2: [grief_primary, comparison_trap, shame_of_change]
      layer_3: [past_and_present_voice, letters_or_messages, shared_vocabulary]
      layer_4: [warm_cold_warm_contrast, same_place_then_now, handwriting_memory]
      layer_5: [memory_and_present_rhythm, compressed_gap, extended_grief]

    strategy_05:  # Healing Arc
      layer_1: [healing_standard, mutual_healing, failed_test]
      layer_2: [shame_as_wound, grief_as_wound, false_alarm_distrust]
      layer_3: [minimal_loaded, healer_curious, shared_silence]
      layer_4: [intimate_quiet_close, exterior_interior, recurring_small_moment]
      layer_5: [breath_pacing, incremental_acceleration, test_chapters_quick]

  seinen:
    strategy_01:  # Descent Arc
      layer_1: [descent_standard, arrested_descent, witnessed_descent]
      layer_2: [shame_grief_watcher, watcher_throughout, spiral_descent]
      layer_3: [caption_unreliable_narrator, dialogue_sparse_grounded, internal_flood]
      layer_4: [environmental_descent, caption_visual_dissonance, time_skip_compression]
      layer_5: [controlled_then_slow, steady_descent, punctuated_stillness]

    strategy_02:  # Obsession Arc
      layer_1: [obsession_standard, obsession_devastation, obsession_transcendence]
      layer_2: [spiral_to_watcher, shame_of_obsession, clean_watcher]
      layer_3: [obsession_justification_eroding, no_justification, dialogue_as_mirror]
      layer_4: [narrowing_frame, fixation_object_visual, body_language_arc]
      layer_5: [deliberate_accumulation, compression, intercut_cost]

    strategy_03:  # Witness Arc
      layer_1: [witness_standard, active_witness, double_witness]
      layer_2: [watcher_primary, shame_of_witness, false_alarm_observer]
      layer_3: [observation_caption_sparse, observed_character_voice, journal_structure]
      layer_4: [framing_and_proximity, distance_then_close, negative_space_witness]
      layer_5: [pull_and_weight, single_long_approach, repeated_exposure]

    strategy_04:  # System Critique Arc
      layer_1: [system_critique_standard, failed_exposure, delayed_reckoning]
      layer_2: [shame_corruption_grief, watcher_throughout, spiral_disillusionment]
      layer_3: [institutional_voice_eroding, document_as_dialogue, two_voice_debate]
      layer_4: [institutional_aesthetics, inside_outside_contrast, document_visual]
      layer_5: [institutional_rhythm, documentation_chapters, escalating_personal]

    strategy_05:  # Redemption-Impossible Arc
      layer_1: [redemption_impossible_standard, confronted_by_harmed, no_repair_attempt]
      layer_2: [shame_grief_integration, watcher_shame, grief_primary]
      layer_3: [crime_weight_voice, defense_erosion, other_voice_included]
      layer_4: [past_weight_present_light, crime_flashback_restrained, consequence_architecture]
      layer_5: [weight_bearing_pace, linear_descent_pace, present_faster]

# ─────────────────────────────────────────────────────────────────────────────
# ANTI-PATTERN RULES (CONSOLIDATED)
# Full definitions live in each genre's strategy file.
# This section provides the enforcement matrix for the selection algorithm.
# ─────────────────────────────────────────────────────────────────────────────
anti_pattern_rules:
  shonen:
    - rule_id: SH_AP_01
      severity: blocker
      description: "World-Threat Arc + zero_dialogue prevents protagonist anchor"
      trigger_strategy: strategy_03
      trigger_layer: layer_4
      trigger_variant_pattern: "zero_dialogue"
      blocked_combination: [strategy_03, layer_4_zero_dialogue]

    - rule_id: SH_AP_02
      severity: warning
      description: "Tournament Arc + slow_burn_reveals kills pacing momentum"
      trigger_strategy: strategy_01
      trigger_layer: layer_5
      trigger_variant: slow_burn_reveals

    - rule_id: SH_AP_03
      severity: blocker
      description: "Training Arc + rival_dialogue_heavy wrong teacher for growth arc"
      trigger_strategy: strategy_02
      trigger_layer: layer_3
      trigger_variant: rival_dialogue_heavy

    - rule_id: SH_AP_04
      severity: blocker
      description: "Rival Redemption Arc requires EI engine — without it the shift is plot not character"
      trigger_strategy: strategy_04
      trigger_layer: layer_2
      trigger_variant: no_ei_engine  # hypothetical null variant

    - rule_id: SH_AP_05
      severity: warning
      description: "Origin Arc + rapid_escalation prevents reader integration of timelines"
      trigger_strategy: strategy_05
      trigger_layer: layer_5
      trigger_variant: rapid_escalation

    - rule_id: SH_AP_06
      severity: blocker
      description: "Any shōnen shame arc resolved through public triumph violates shame engine"
      trigger_strategy: any
      trigger_layer: layer_2
      trigger_variant_pattern: "triumphant_shame_resolution_via_public_victory"

    - rule_id: SH_AP_07
      severity: warning
      description: "World-Threat Arc sacrifice must be real and irreversible"
      trigger_strategy: strategy_03
      trigger_layer: layer_1
      trigger_variant: no_sacrifice_variant  # note: this variant requires different EI mapping

  shojo:
    - rule_id: SJ_AP_01
      severity: blocker
      description: "Healing Arc + action-heavy visual breaks intimate healing environment"
      trigger_strategy: strategy_05
      trigger_layer: layer_4
      trigger_variant_pattern: "high_action"

    - rule_id: SJ_AP_02
      severity: blocker
      description: "Any shōjo without thought bubbles violates inner-monologue genre contract"
      trigger_strategy: any
      trigger_layer: layer_3
      trigger_variant: spoken_sparse  # only valid with compensating image expression layer
      condition: "only_if_layer_4_is_not_expression_compensating"

    - rule_id: SJ_AP_03
      severity: warning
      description: "First Love Arc without shame engine loses vulnerability structure"
      trigger_strategy: strategy_01
      trigger_layer: layer_2
      trigger_variant_pattern: "no_shame"

    - rule_id: SJ_AP_04
      severity: blocker
      description: "Growing Up Arc must include grief completion — skipping it produces nostalgia not adult arc"
      trigger_strategy: strategy_04
      trigger_layer: layer_2
      trigger_variant_pattern: "grief_skipped"

    - rule_id: SJ_AP_05
      severity: blocker
      description: "Rivals-in-Love requires genuine competition — false competition collapses arc logic"
      trigger_strategy: strategy_03
      trigger_layer: layer_1
      trigger_variant: one_sided_rivalry  # valid but requires special handling — see strategy file
      condition: "requires_protagonist_pov_compensation"

    - rule_id: SJ_AP_06
      severity: warning
      description: "Misunderstanding Arc + rapid_correction prevents wrong-story accumulation"
      trigger_strategy: strategy_02
      trigger_layer: layer_5
      trigger_variant: rapid_correction

    - rule_id: SJ_AP_07
      severity: blocker
      description: "Shōjo splash pages must mark emotional revelation, not physical action"
      trigger_strategy: any
      trigger_layer: layer_4
      trigger_variant_pattern: "splash_on_action_or_combat"

  seinen:
    - rule_id: SE_AP_01
      severity: blocker
      description: "Descent Arc must not end in triumph — anti-victory convention"
      trigger_strategy: strategy_01
      trigger_layer: layer_2
      trigger_variant_pattern: "triumphant"

    - rule_id: SE_AP_02
      severity: blocker
      description: "Redemption-Impossible Arc cannot include forgiveness-given-by-harmed"
      trigger_strategy: strategy_05
      trigger_layer: layer_1
      trigger_variant_pattern: "forgiveness_given"

    - rule_id: SE_AP_03
      severity: blocker
      description: "No empowerment declarations in any seinen arc — shame engine prohibition"
      trigger_strategy: any
      trigger_layer: layer_3
      trigger_variant_pattern: "empowerment_declaration"

    - rule_id: SE_AP_04
      severity: blocker
      description: "Obsession Arc endpoint must hold ambiguity — clean resolution breaks arc logic"
      trigger_strategy: strategy_02
      trigger_layer: layer_1
      trigger_variant: obsession_standard  # valid only if endpoint variant is NOT clean_resolution
      condition: "endpoint_must_not_be_clean"

    - rule_id: SE_AP_05
      severity: warning
      description: "Witness Arc — protagonist saving the witnessed converts arc to heroism"
      trigger_strategy: strategy_03
      trigger_layer: layer_1
      trigger_variant: active_witness
      condition: "action_must_not_produce_rescue"

    - rule_id: SE_AP_06
      severity: blocker
      description: "System Critique Arc — system must persist; fundamental reform is blocker"
      trigger_strategy: strategy_04
      trigger_layer: layer_1
      trigger_variant: delayed_reckoning  # valid but system must still persist
      condition: "system_must_not_be_destroyed"

    - rule_id: SE_AP_07
      severity: warning
      description: "Seinen visual language must not use shōjo emotional backgrounds"
      trigger_strategy: any
      trigger_layer: layer_4
      trigger_variant_pattern: "shojo_emotional_backgrounds"

    - rule_id: SE_AP_08
      severity: warning
      description: "Seinen chapters end on weight not urgency — rapid cliffhangers contradict gravity"
      trigger_strategy: any
      trigger_layer: layer_5
      trigger_variant: rapid_escalation

# ─────────────────────────────────────────────────────────────────────────────
# GENRE DIFFERENTIATION MATRIX
# Describes how each genre produces unmistakably different books
# when processed through the same pipeline.
# ─────────────────────────────────────────────────────────────────────────────
genre_differentiation_matrix:
  # The three axes that most reliably distinguish the genres:
  axis_1_primary_narrative_engine:
    shonen:  "external conflict externalizes internal growth — you fight to become"
    shojo:   "internal relationship to another person is the story — all events are pretexts"
    seinen:  "internal monologue as unreliable narrator — protagonist and reader triangulate truth"

  axis_2_silence_function:
    shonen:  "silence = awe (after breakthrough), combat (during fight), aftermath"
    shojo:   "silence = heart-flutter, cherry-blossom pause, space after confession"
    seinen:  "silence IS the climax — the final answer to the question the arc posed"

  axis_3_victory_convention:
    shonen:  "triumph is possible and earned — but the growth is what matters, not the win"
    shojo:   "vulnerability survived is the victory — outcome of external relationship secondary"
    seinen:  "triumph is hollow or impossible — the arc's honesty about reality is the achievement"

  # Visual grammar differences (quick reference):
  visual_differentiators:
    shonen:
      panels_per_page: "4-6 (action), 2-3 (aftermath)"
      thought_vs_speech: "speech primary (8-15 words per bubble)"
      splash_triggers: "power breakthrough, fight climax, rivalry moment"
      backgrounds: "kinetic action lines, establishing environments"
      bubble_shapes: "jagged for impact, round for speech, small for thought"

    shojo:
      panels_per_page: "3-4 average"
      thought_vs_speech: "thought primary 3:1 ratio (12-25 words per bubble)"
      splash_triggers: "emotional revelation, confession, first noticing"
      backgrounds: "stars, petals, dissolved emotional space"
      bubble_shapes: "flowing ovals for thought, soft rounds for speech"

    seinen:
      panels_per_page: "4 average (more on managed stability, fewer on weight)"
      thought_vs_speech: "caption boxes primary (20-40 words), speech minimal"
      splash_triggers: "environmental revelation, scale of system, ambiguous endpoint"
      backgrounds: "architectural environments, cold geometry, ambient darkness"
      bubble_shapes: "long rectangle caption boxes, minimal speech bubbles"

  # EI engine distribution (which engines run hottest per genre):
  ei_engine_distribution:
    shonen:
      primary: [overwhelm, false_alarm]
      secondary: [comparison, shame]
      rarely_primary: [grief, watcher, spiral]
      note: "Shame resolves through action; grief is collectivized (sacrifice); watcher is the villain's trap"

    shojo:
      primary: [shame, comparison]
      secondary: [spiral, grief]
      rarely_primary: [overwhelm, false_alarm, watcher]
      note: "Shame is the vulnerability of wanting; comparison is the obstacle between self and connection"

    seinen:
      primary: [shame, grief, watcher]
      secondary: [spiral]
      rarely_primary: [overwhelm, false_alarm, comparison]
      note: "Shame in seinen is structural not acute; watcher is the mode of consciousness; grief is the honest endpoint"

# ─────────────────────────────────────────────────────────────────────────────
# SEED FORMULA (CANONICAL PYTHON PSEUDOCODE)
# This is the authoritative formula. story_architect.py should implement this.
# ─────────────────────────────────────────────────────────────────────────────
seed_formula: |
  # Python implementation — maps to _deterministic_int in story_architect.py
  import hashlib
  from typing import Any

  def select_strategy_and_layers(
      series_id: str,
      arc_id: str,
      genre: str,
      strategies_config: dict,
      layer_count: int = 5,
  ) -> dict[str, Any]:
      """
      Deterministic strategy and layer selection from seed components.

      Parameters:
          series_id:   Unique series identifier (e.g. "sai_ma_001")
          arc_id:      Arc identifier within the series (e.g. "arc_02")
          genre:       One of: shonen, shojo, seinen
          strategies_config: Loaded YAML config for the genre
          layer_count: Number of layers (always 5 in current spec)

      Returns:
          dict with keys: strategy, layers (list of variant_labels)
      """
      seed = f"{series_id}:{arc_id}:{genre}"

      def _pick(pool: list, suffix: str) -> Any:
          """Pick an item from pool deterministically."""
          h = int(hashlib.sha256(f"{seed}:{suffix}".encode()).hexdigest()[:8], 16)
          return pool[h % len(pool)]

      # Step 1: Select strategy
      strategy_ids = list(strategies_config["strategies"].keys())
      strategy_id = _pick(strategy_ids, "strategy")
      strategy = strategies_config["strategies"][strategy_id]

      # Step 2: Select one variant per layer
      layers = []
      for i in range(layer_count):
          layer_key = f"layer_{i+1}_variants"
          layer_variants = strategy[layer_key]
          # Each variant entry has a 'variant_label' key
          variant_labels = [v["variant_label"] for v in layer_variants]
          selected_label = _pick(variant_labels, f"layer{i}")
          layers.append({
              "layer_number": i + 1,
              "selected_variant": selected_label,
          })

      # Step 3: Anti-pattern check
      # Load anti_pattern_rules from combinatorial_index.yaml
      # For each rule where trigger_strategy matches selected strategy:
      #   Check if the blocked layer variant was selected
      #   If blocker severity: reselect that layer with fallback_seed = seed + ":fallback"
      #   If warning severity: annotate the output

      return {
          "seed": seed,
          "genre": genre,
          "strategy_id": strategy_id,
          "strategy_name": strategy["name"],
          "layers": layers,
          "anti_pattern_warnings": [],  # populated by anti-pattern check
      }

  # Integration with existing _deterministic_int:
  # The formula above is equivalent to calling:
  #   _deterministic_int(f"{series_id}:{arc_id}:{genre}:strategy", len(strategies))
  # for strategy selection, and:
  #   _deterministic_int(f"{series_id}:{arc_id}:{genre}:layer{n}", len(layer_variants))
  # for each layer.
  #
  # This maintains backward compatibility with the existing SHA-256 approach
  # while extending it to the 5-layer strategy system.

# ─────────────────────────────────────────────────────────────────────────────
# ANTI-PATTERN FALLBACK MECHANISM
# ─────────────────────────────────────────────────────────────────────────────
anti_pattern_fallback:
  description: >
    When a BLOCKER anti-pattern is detected, the blocking layer is reselected
    using a modified seed. The fallback seed appends ":fallback" to the
    original seed component for that layer, which produces a different
    hash-derived index. If the fallback selection also triggers a blocker,
    the first non-blocking variant in the pool is selected instead.
  max_fallback_attempts: 3
  fallback_seed_formula: |
    # For first fallback attempt:
    fallback_seed_1 = f"{seed}:layer{n}:fallback"
    # For second fallback attempt:
    fallback_seed_2 = f"{seed}:layer{n}:fallback2"
    # After 3 attempts: select first non-blocked variant in pool
  warning_annotation: >
    A warning annotation is added to the output when a fallback was triggered.
    The annotation includes: which rule was triggered, which variant was
    blocked, which fallback variant was selected.

# ─────────────────────────────────────────────────────────────────────────────
# GENRE EXPANSION PROTOCOL
# Instructions for adding new genres to this index
# ─────────────────────────────────────────────────────────────────────────────
genre_expansion_protocol:
  required_files:
    - "config/source_of_truth/manga_story_strategies/{genre}_strategies.yaml"
  required_schema_fields:
    - schema_version
    - genre
    - strategy_count
    - selection_algorithm
    - "strategies.*"  # at minimum 1 strategy with all 5 layers
    - anti_pattern_rules
  required_index_updates:
    - "genre_strategy_counts.{genre}: N"
    - "combinations_per_genre.{genre}: {...}"
    - "layer_variant_index.{genre}: {...}"
    - "anti_pattern_rules.{genre}: [...]"
    - "genre_differentiation_matrix: add genre to all three axes"
  minimum_strategies_before_activation: 3
  # A genre must have at least 3 strategies before it can be used in production.
  # Genres with 0 strategies are reserved; 1-2 are in development; 3+ are active.

  # Genre-specific design requirements before activation:
  design_requirements:
    iyashikei:
      description: "Healing/soothing slice-of-life — distinct from shōjo healing in its absence of romantic tension"
      key_difference_from_shojo: "No love interest; the healing is environmental and communal, not relational"
      suggested_ei_focus: [grief, watcher]
      suggested_strategies: [village_arrival, seasonal_rhythm, found_community, grief_processing, small_mastery]

    josei:
      description: "Adult women's manga — shōjo but with adult relationship complexity and less idealization"
      key_difference_from_shojo: "The relationship does not resolve in a tidy way; adult costs are present"
      suggested_ei_focus: [shame, grief, comparison]

    sports:
      description: "Sports manga — shōnen-adjacent but domain-specific; the sport is the language"
      key_difference_from_shonen: "The rival is not a metaphor; the sport itself carries the emotional content"
      suggested_ei_focus: [overwhelm, comparison, false_alarm]

    horror:
      description: "Horror manga — creates dread through what cannot be controlled or understood"
      key_difference_from_seinen: "The unreliable narrator in horror is the genre, not the protagonist"
      suggested_ei_focus: [false_alarm, watcher, spiral]

# ─────────────────────────────────────────────────────────────────────────────
# STRATEGY FILE REGISTRY
# Quick reference to all strategy files in this system
# ─────────────────────────────────────────────────────────────────────────────
strategy_file_registry:
  - path: "config/source_of_truth/manga_story_strategies/shonen_strategies.yaml"
    genre: shonen
    schema_version: "1.0.0"
    strategies: 5
    status: active

  - path: "config/source_of_truth/manga_story_strategies/shojo_strategies.yaml"
    genre: shojo
    schema_version: "1.0.0"
    strategies: 5
    status: active

  - path: "config/source_of_truth/manga_story_strategies/seinen_strategies.yaml"
    genre: seinen
    schema_version: "1.0.0"
    strategies: 5
    status: active

  - path: "config/source_of_truth/manga_story_strategies/combinatorial_index.yaml"
    type: index
    schema_version: "1.0.0"
    status: active

# ─────────────────────────────────────────────────────────────────────────────
# INTEGRATION NOTES FOR story_architect.py
# ─────────────────────────────────────────────────────────────────────────────
integration_notes:
  current_state: >
    story_architect.py (phoenix_v4/manga/series/story_architect.py) uses:
    - 3 genres: shonen, seinen, iyashikei
    - 3-stage arc: setup → rising → climax
    - 12 beats per stage
    - _deterministic_int for beat selection
    - Hardcoded _SETTINGS, _PROTAGONIST, _RIVAL dicts per genre

  migration_path:
    step_1: >
      Load combinatorial_index.yaml and genre strategy files at module init.
      Cache the loaded configs.
    step_2: >
      In build_story_architecture_internal(), call select_strategy_and_layers()
      to get strategy_id and layer variants for the series_id + arc_id + genre_id.
    step_3: >
      Use the selected strategy's plot skeleton beats (layer_1) as the beat pool
      for _generate_default_chapters(), replacing the current hardcoded _BEAT_TEMPLATES.
    step_4: >
      Pass the selected emotional skeleton (layer_2) to the chapter generator
      to set emotional_job per chapter — this feeds the EI dimension assignments.
    step_5: >
      Pass dialogue skeleton (layer_3) to the panel generator for speech atom
      archetype selection (integrates with manga_speech_atoms config).
    step_6: >
      Pass visual skeleton (layer_4) to the page layout generator for
      panels_per_page, bubble_density_curve, and splash_page positions.
    step_7: >
      Pass pacing skeleton (layer_5) to the chapter end hook generator for
      chapter end hook type selection.

  backward_compatibility:
    note: >
      The existing _deterministic_int function is fully compatible with the
      seed_formula in this index. No changes needed to the hash function.
      The migration adds the strategy/layer selection layer ABOVE the existing
      beat selection, not replacing it.
    shonen_genre_id: "shonen"  # existing genre_id string unchanged
    seinen_genre_id: "seinen"  # existing genre_id string unchanged
    iyashikei_migration: >
      iyashikei is not yet in this strategy system (0 strategies).
      Until iyashikei_strategies.yaml is authored, continue using the
      existing _BEAT_TEMPLATES for iyashikei. Once authored, migrate
      using the same pattern as shonen/seinen.
