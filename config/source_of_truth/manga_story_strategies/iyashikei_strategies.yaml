# IYASHIKEI / HEALING STORY STRATEGIES v1.0.0
# ─────────────────────────────────────────────────────────────────────────────
# Healing-register manga story strategies (iyashikei + supernatural-healing).
# Authority bible: docs/research/manga_craft/iyashikei_minimalism.md
#
# This is the DEVOTION lane register (Open Vessel Press / Sai Ma):
# HEALING / IYASHIKEI / devotional-emotional-drama + supernatural-healing.
# Grief, compassion, courage-as-inner-work. NOT shonen / battle.
#
# Each strategy is a 5-layer template. Combinatorial selection across layers
# produces 3^5 = 243 unique combinations per strategy, and 4 strategies yields
# up to 972 unique outputs per genre before persona/topic variation.
#
# Selection is hash-seeded from (series_id + arc_id + genre) via SHA-256.
# See combinatorial_index.yaml for the exact seed formula.
#
# IYASHIKEI GENRE CONTRACT (from craft bible §1, §6):
#   - The reader contract is RESTORATION OF BASELINE, not plot. A single raised
#     voice, cliffhanger, or villain breaks the contract permanently.
#   - Emotional labeling ("she felt sad") is the cardinal sin. The reader infers.
#     Interior is shown via environmental correlative (the empty second teacup).
#   - Canonical curve: baseline → gentle disruption (letter / stranger / storm)
#     → attunement → return to baseline AT A SLIGHTLY DEEPER RESONANCE.
#   - Chapter hook = "weather/season first": open on a meteorological or temporal
#     cue, THEN locate the character inside it. The hook is invitation to a mood,
#     never a question.
#   - Chapter ending = reflective silence or a small gift returned to baseline.
#     Never a cliffhanger, even a soft one.
#   - Silence is load-bearing: ≥35% of panels carry no dialogue.
#   - Supernatural-healing variant: the supernatural (a spirit, a mushi-like
#     presence, an unexplained light) is the GRIEF/COMPASSION made visible. It is
#     received and attuned-to, never fought or fully resolved. Mystery stays
#     partly unknowable.
#   - EI engines: grief (primary), tenderness, comfort, quiet_recognition.
# ─────────────────────────────────────────────────────────────────────────────

schema_version: "1.0.0"
genre: iyashikei
strategy_count: 4

selection_algorithm:
  method: sha256_hash_seed
  seed_components: [series_id, arc_id, genre]
  layer_selection: |
    For each layer 1-5, compute:
      layer_idx = hash(seed + f":layer{n}") % len(layer_n_variants)
    where seed = f"{series_id}:{arc_id}:{genre}"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 01: SEASONAL RETURN
# Archetype: baseline_disruption_attunement_baseline
# Core loop: weather opens → a small disruption arrives → the character attunes
#            rather than fixes → baseline returns one degree deeper.
# The canonical iyashikei curve. No antagonist. The "problem" is a feeling that
# needs to be received, not solved.
# ═════════════════════════════════════════════════════════════════════════════
strategies:
  strategy_01:
    name: "Seasonal Return"
    archetype_template: baseline_disruption_attunement_baseline
    description: >
      The canonical healing curve. The chapter opens on weather and locates the
      character inside it. A gentle disruption arrives — a letter, a stranger, a
      change in the light. The character does not fix it; they attune to it. By
      the close, baseline returns, but the reader (and the character) rest one
      degree deeper than where they began. There is no villain. The disruption
      is grief or longing wearing the clothes of an ordinary day.

    # ── LAYER 1: PLOT SKELETON ──────────────────────────────────────────────
    # Beats carry: text, camera_hint (iyashikei framing), mood_hint, is_carrier.
    # is_carrier = True means this beat must survive any condensation.
    # Framing vocabulary (craft bible §8): ELS / LS / MS / MCU / CU / insert /
    # environmental-insert. Mood vocabulary stays low-arousal.
    layer_1_plot_skeleton:
      variant_label: "seasonal_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            Open on the weather. {setting} under a turning sky — first cold of
            the season, or the cicadas gone quiet, or rain that arrives earlier
            than expected and without apology. No people yet. Just the world,
            breathing.
          camera_hint: environmental_establishing
          mood_hint: stillness
          is_carrier: true

        - beat: 2
          text: >
            {protagonist} appears inside the weather, mid-habit — setting out two
            cups, opening the shutters, sweeping the step. The body moves before
            the mind wakes. We learn who they are by what their hands do.
          camera_hint: medium_in_environment
          mood_hint: gentle
          is_carrier: true

        - beat: 3
          text: >
            A small wrongness. {protagonist} sets out the second cup, then
            remembers, and puts one back. The absence has a shape. We never name
            it. The empty place at the table says everything the caption won't.
          camera_hint: environmental_insert
          mood_hint: quiet_ache
          is_carrier: true

        - beat: 4
          text: >
            The disruption arrives the way weather arrives. {companion} enters —
            a stranger at the door, a letter on the step, a light that won't
            leave a window. They bring no threat. They bring a question
            {protagonist} has been not-asking.
          camera_hint: long_shot_arrival
          mood_hint: gentle_disruption
          is_carrier: true

        - beat: 5
          text: >
            {protagonist}'s first instinct is to tidy the feeling away — to
            offer tea, to change the subject, to be useful. The old armor of
            usefulness. {companion} lets the silence sit instead.
          camera_hint: close_two_shot
          mood_hint: tender_resistance
          is_carrier: false

        - beat: 6
          text: >
            They do something ordinary together — boil chestnuts, mend a net,
            walk to where the water is. The task is not the point. The being-
            beside is the point. The grief loosens its grip a quarter-turn.
          camera_hint: medium_shared_task
          mood_hint: attunement
          is_carrier: true

        - beat: 7
          text: >
            A wordless stretch. Wind in the eaves. Steam off the cups. A leaf
            deciding. {protagonist} stops performing okayness and simply is, for
            three panels, beside another person and the weather.
          camera_hint: environmental_breath
          mood_hint: stillness
          is_carrier: true

        - beat: 8
          text: >
            {protagonist} says one true thing — small, halting, unforced. Not a
            confession of the whole grief. Just the size of it that fits in a
            single breath. "I keep setting out the second cup." {companion} does
            not fix it. They nod.
          camera_hint: close_quiet_face
          mood_hint: opening
          is_carrier: true

        - beat: 9
          text: >
            {companion} leaves the way weather leaves — without ceremony.
            {protagonist} stands in the doorway. The light has changed. Nothing
            is resolved. Something has settled.
          camera_hint: long_shot_departure
          mood_hint: gentle
          is_carrier: true

        - beat: 10
          text: >
            Return to baseline, one degree deeper. {protagonist} sets out one
            cup now — on purpose, not from forgetting. They sit on the porch and
            watch the water change its mind about which stones to cover. The
            season turns. The reader exhales.
          camera_hint: environmental_closure_small_in_frame
          mood_hint: resonant_calm
          is_carrier: true

    layer_1_variants:
      - variant_label: "seasonal_standard"
        description: "Full 10-beat canonical curve as above"
      - variant_label: "seasonal_minimal"
        description: "Carrier beats only (1,2,3,4,6,7,8,9,10) — 9 beats, more silence"
      - variant_label: "seasonal_two_seasons"
        description: "Add a season-turn midpoint (beat 6b) — baseline tested twice, 11 beats"

    # ── LAYER 2: EMOTIONAL SKELETON ─────────────────────────────────────────
    layer_2_emotional_skeleton:
      variant_label: "grief_received"
      ei_engine_hottest: grief
      chapter_emotional_map:
        chapter_1:
          emotional_job: "Reader settles into baseline and feels the shape of an absence without it being named — grief as a quiet weather, not a wound on display"
          ei_dimension: grief
          intensity: 2  # scale 1-5; iyashikei never spikes past 3
        chapter_2:
          emotional_job: "The disruption invites the feeling closer — reader recognizes the instinct to tidy grief away rather than be with it"
          ei_dimension: tenderness
          intensity: 2
        chapter_climax:
          emotional_job: "Attunement, not resolution. The reader feels what it is to be accompanied in a feeling rather than rescued from it"
          ei_dimension: quiet_recognition
          intensity: 3
      progression_note: >
        Grief → Tenderness → Quiet Recognition. The arc never resolves the grief;
        it changes the reader's relationship to it. The intensity ceiling is 3 —
        any spike to 4-5 belongs to a different genre and breaks the contract.

    layer_2_variants:
      - variant_label: "grief_received"
        description: "Absence/loss as the quiet engine — the second cup arc"
      - variant_label: "compassion_offered"
        description: "Protagonist receives a hurting stranger into baseline — courage is the courage to stay present"
      - variant_label: "courage_as_inner_work"
        description: "The disruption is the character's own avoided feeling; the arc is turning toward it gently"

    # ── LAYER 3: DIALOGUE SKELETON ──────────────────────────────────────────
    layer_3_dialogue_skeleton:
      variant_label: "observational_sparse"
      avg_words_per_bubble: 4-12
      dialogue_to_caption_ratio: "70:30"  # craft bible §4
      speech_atom_sequence:
        - moment: "weather_caption_open"
          atom_archetype: observational_caption
          sample: "The cicadas had stopped sometime in the night."
          emotion: stillness
          intensity: 1
          delivery: caption_box_observational

        - moment: "habit_aside"
          atom_archetype: small_self_correction
          sample: "...Ah. One's enough now."
          emotion: quiet_ache
          intensity: 2
          delivery: small_soft_bubble

        - moment: "arrival_greeting"
          atom_archetype: weatherlike_arrival
          sample: "You've come about the light in the window."
          emotion: gentle
          intensity: 2
          delivery: rounded_standard_bubble

        - moment: "deflection_offered"
          atom_archetype: usefulness_as_armor
          sample: "Let me put the kettle on."
          emotion: tender_resistance
          intensity: 2
          delivery: rounded_standard_bubble

        - moment: "one_true_thing"
          atom_archetype: grief_sized_to_a_breath
          sample: "I keep setting out the second cup."
          emotion: opening
          intensity: 3
          delivery: small_soft_bubble

        - moment: "the_nod"
          atom_archetype: presence_not_fixing
          sample: "Then you should eat first."
          emotion: quiet_recognition
          intensity: 2
          delivery: rounded_standard_bubble

        - moment: "closure_caption"
          atom_archetype: observational_caption
          sample: "She watched the water change its mind about which stones to cover."
          emotion: resonant_calm
          intensity: 1
          delivery: caption_box_observational

      escalation_pattern: "Flat-with-one-gentle-rise: stays low, lifts once at the one-true-thing, settles back"
      key_signature_line: >
        "I keep setting out the second cup."
        — the whole grief, sized to a single breath, never explained

    layer_3_variants:
      - variant_label: "observational_sparse"
        description: "70:30 dialogue:caption, fragments and sensory nouns, one gentle rise"
      - variant_label: "near_wordless"
        description: "Caption-only atmospheric beats dominate; ≤4 spoken lines total"
      - variant_label: "companion_carries"
        description: "The visiting companion (mushi-keeper, elder) carries most lines; protagonist mostly listens"

    # ── LAYER 4: VISUAL SKELETON ─────────────────────────────────────────────
    layer_4_visual_skeleton:
      variant_label: "airy_irregular_grid"
      avg_panels_per_page: 2.5  # craft bible §2
      black_fill_ratio: 0.15    # deliberately airy; heavy black reads as threat
      silent_panel_ratio_target: 0.40
      caption_dense_pages:
        - position: ch1_p1
          bubble_density: caption_only
          note: "Weather hook — observational caption over an establishing landscape"
      action_silent_pages:
        - position: ch1_p3
          bubble_density: none
          note: "The empty second cup — environmental insert, no text"
        - position: ch_climax_breath
          bubble_density: none
          note: "Three panels of wind/steam/leaf — the wordless stretch before the one true thing"
      splash_pages:
        - position: ch1_p2
          trigger: "Establishing the place and season — character small in a wide landscape"
          style: quiet_landscape_spread
        - position: ch_close
          trigger: "Return to baseline — character on the porch, water and stones"
          style: small_in_frame_environmental
      bubble_density_curve:
        ch1: sparse           # weather, baseline, the absence
        ch_mid: medium        # the shared task, gentle exchange
        ch_breath: none       # the wordless stretch
        ch_close: very_sparse # one true thing, then silence
      recommended_bubble_styles:
        baseline_phase: rounded_standard
        observational_caption: caption_box_observational
        one_true_thing: small_soft_bubble
        closure: caption_box_quiet
      panel_height_note: >
        Irregular panel heights — iyashikei breathes. Avoid symmetric six-rectangle
        grids (craft bible §6.4: reads as institutional). Tall thin panels for sky,
        wide low panels for water and horizon.

    layer_4_variants:
      - variant_label: "airy_irregular_grid"
        description: "2.5 panels/page, irregular heights, ≥40% silent panels, low black-fill"
      - variant_label: "single_object_meditation"
        description: "Recurring insert of one object (the cup, the lamp, the chestnut) across pages as the emotional anchor"
      - variant_label: "landscape_led"
        description: "Each scene opens and closes on environment; human face shots are rare and brief"

    # ── LAYER 5: PACING SKELETON ─────────────────────────────────────────────
    layer_5_pacing_skeleton:
      variant_label: "weather_to_baseline"
      end_of_chapter_hooks:
        # NOTE: iyashikei "hooks" are anti-cliffhangers. They invite a mood and
        # return to baseline. A question-mark ending poisons the re-read value.
        ch1: small_wonder_close   # A wordless final panel — landscape, character small-in-frame
        ch_mid: loss_echo_close   # A returned object settling — the second cup, put away on purpose
        ch_close: small_wonder_close  # Reflective silence; the season one degree turned
      scene_transitions: bleed_only  # craft bible §3 — a nature element carries the eye scene-to-scene
      forbidden:
        - cliffhanger
        - villain_or_threat
        - raised_voice
        - mystery_fully_resolved
        - emotional_labeling_in_caption
      page_turn_reveals:
        - chapter: 1
          revealed_on_turn: "Not a shock — a softening. The turn reveals the empty second cup, quietly."

  # ═══════════════════════════════════════════════════════════════════════════
  # STRATEGY 02: THE VISITING PRESENCE (supernatural-healing)
  # Archetype: spirit_as_feeling_made_visible
  # A mushi-like / spirit presence appears. It is grief or longing made visible.
  # It is received and attuned-to, never fought. It departs partly unknowable.
  # ═══════════════════════════════════════════════════════════════════════════
  strategy_02:
    name: "The Visiting Presence"
    archetype_template: spirit_as_feeling_made_visible
    description: >
      The supernatural-healing register. An unexplained presence arrives — a thin
      gold light at a child's window, a visitor who arrives like weather, a small
      spirit that lingers near an old grief. The presence is not a monster and is
      never defeated. It is the feeling made visible. The work of the chapter is
      to receive it, sit with it, and let it go without forcing it to make sense.
      A Mushishi reader wants the mushi to remain partly unknowable (craft §6.10).

    layer_1_plot_skeleton:
      variant_label: "presence_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            Open on weather and place. {setting}, a season deep. Something in the
            light is fractionally wrong — a seam of gold where no lamp should be,
            hovering at the height of a child's eyes. The world is calm. The
            anomaly is calm too.
          camera_hint: environmental_establishing
          mood_hint: hushed_wonder
          is_carrier: true

        - beat: 2
          text: >
            {protagonist} — keeper, medium, shopkeeper, wanderer — notices it the
            way one notices a change in the air. No alarm. They have met
            presences before. This one is shaped like someone's missing.
          camera_hint: medium_in_environment
          mood_hint: gentle
          is_carrier: true

        - beat: 3
          text: >
            {companion} — the one who lives with the presence — describes it
            wrong, the way the grieving describe their grief: "the light that
            won't leave her window." {protagonist} listens for what is under the
            words.
          camera_hint: close_two_shot
          mood_hint: quiet_ache
          is_carrier: true

        - beat: 4
          text: >
            {protagonist} does not banish it. They approach it the way you
            approach a frightened animal or an old sorrow — slowly, sideways,
            without demand. The presence does not flee. It leans toward the
            warmth.
          camera_hint: long_shot_approach
          mood_hint: tender
          is_carrier: true

        - beat: 5
          text: >
            A wordless stretch with the presence. It is not threatening. It is
            lonely. The panels hold steam, dust motes, the gold seam pulsing
            like a slow heartbeat. {protagonist} simply stays.
          camera_hint: environmental_breath
          mood_hint: stillness
          is_carrier: true

        - beat: 6
          text: >
            {companion} confesses the real thing — the grief the presence is
            made of. Not all of it. The breath-sized piece. "I never said
            goodbye." The presence brightens, gently, as if it has been waiting
            to be acknowledged.
          camera_hint: close_quiet_face
          mood_hint: opening
          is_carrier: true

        - beat: 7
          text: >
            The work is not to make the presence leave. The work is to let it be
            seen. {protagonist} names what it is — softly, without certainty.
            "It came about the light that won't leave her window, not the child
            who won't sleep."
          camera_hint: medium_shared_task
          mood_hint: attunement
          is_carrier: true

        - beat: 8
          text: >
            The presence loosens. It does not vanish in a flash; it thins like
            morning fog, the way grief doesn't end but learns to hold less of the
            light. A degree of it stays. It always will.
          camera_hint: environmental_insert
          mood_hint: bittersweet_calm
          is_carrier: true

        - beat: 9
          text: >
            {companion} can sleep now — not because the grief is gone, but
            because it has been witnessed. {protagonist} gathers their pack the
            way weather gathers to move on.
          camera_hint: long_shot_departure
          mood_hint: gentle
          is_carrier: true

        - beat: 10
          text: >
            Return to baseline, one degree deeper, mystery intact. The last of
            the gold seam catches the morning. {protagonist} walks the road out,
            small in the frame. What the presence truly was stays, kindly,
            unknowable.
          camera_hint: environmental_closure_small_in_frame
          mood_hint: resonant_calm
          is_carrier: true

    layer_1_variants:
      - variant_label: "presence_standard"
        description: "Full 10-beat presence arc as above"
      - variant_label: "presence_minimal"
        description: "Carrier beats only — more silence around the presence"
      - variant_label: "presence_recurring"
        description: "The presence is one {protagonist} has met before — gentle continuity thread across chapters"

    layer_2_emotional_skeleton:
      variant_label: "grief_witnessed"
      ei_engine_hottest: grief
      chapter_emotional_map:
        chapter_1:
          emotional_job: "Reader feels hushed wonder, not fear — the supernatural here is tender, an unmet grief asking to be seen"
          ei_dimension: grief
          intensity: 2
        chapter_climax:
          emotional_job: "The reader feels what it is to have a sorrow witnessed rather than cured — relief that does not erase the loss"
          ei_dimension: quiet_recognition
          intensity: 3
      progression_note: >
        Hushed wonder → tenderness → quiet recognition. The supernatural is never
        antagonized. Intensity ceiling 3. The mystery is never fully explained.

    layer_2_variants:
      - variant_label: "grief_witnessed"
        description: "The presence is an unmet grief; witnessing is the healing"
      - variant_label: "compassion_offered"
        description: "The presence is a frightened other; the arc is offering it safety"
      - variant_label: "courage_as_inner_work"
        description: "The presence is the protagonist's own avoided sorrow, externalized as a gentle anomaly"

    layer_3_dialogue_skeleton:
      variant_label: "keeper_observational"
      avg_words_per_bubble: 4-12
      dialogue_to_caption_ratio: "70:30"
      speech_atom_sequence:
        - moment: "weather_caption_open"
          atom_archetype: observational_caption
          sample: "He arrived the way weather arrives: earlier than expected, without apology."
          emotion: hushed_wonder
          intensity: 1
          delivery: caption_box_observational
        - moment: "the_wrong_description"
          atom_archetype: grief_described_sideways
          sample: "It's the light that won't leave her window."
          emotion: quiet_ache
          intensity: 2
          delivery: rounded_standard_bubble
        - moment: "the_breath_sized_confession"
          atom_archetype: grief_sized_to_a_breath
          sample: "I never said goodbye."
          emotion: opening
          intensity: 3
          delivery: small_soft_bubble
        - moment: "the_naming"
          atom_archetype: presence_not_fixing
          sample: "You know more than I do. You should eat first."
          emotion: quiet_recognition
          intensity: 2
          delivery: rounded_standard_bubble
        - moment: "closure_caption"
          atom_archetype: observational_caption
          sample: "What it truly was stayed, kindly, unknowable."
          emotion: resonant_calm
          intensity: 1
          delivery: caption_box_observational
      escalation_pattern: "Flat-with-one-gentle-rise at the breath-sized confession"
      key_signature_line: >
        "I never said goodbye."
        — the grief the presence is made of, never elaborated

    layer_3_variants:
      - variant_label: "keeper_observational"
        description: "Keeper/medium carries quiet observational lines; 70:30 dialogue:caption"
      - variant_label: "near_wordless"
        description: "The presence is felt more than discussed; captions dominate"
      - variant_label: "child_and_keeper"
        description: "A child and the keeper share the lines; the grieving adult listens"

    layer_4_visual_skeleton:
      variant_label: "luminous_sparse"
      avg_panels_per_page: 2.5
      black_fill_ratio: 0.15
      silent_panel_ratio_target: 0.42
      action_silent_pages:
        - position: ch_mid_breath
          bubble_density: none
          note: "The presence pulsing — dust motes, steam, the gold seam, no text"
      splash_pages:
        - position: ch1_p2
          trigger: "The anomaly in the landscape — wide, calm, wrong-in-a-tender-way"
          style: quiet_landscape_with_anomaly
        - position: ch_close
          trigger: "Departure — keeper small on the road, last gold catching morning"
          style: small_in_frame_environmental
      bubble_density_curve:
        ch1: sparse
        ch_mid: none
        ch_close: very_sparse
      recommended_bubble_styles:
        observational_caption: caption_box_observational
        breath_sized_confession: small_soft_bubble
        closure: caption_box_quiet
      panel_height_note: >
        Use light, not heavy black, to render the supernatural. The presence is
        glow and gradient tone, never a hard-inked monster silhouette.

    layer_4_variants:
      - variant_label: "luminous_sparse"
        description: "Presence rendered in gradient tone and glow; airy, ≥40% silent"
      - variant_label: "single_object_meditation"
        description: "The window / lamp / seam recurs as the anchor across pages"
      - variant_label: "landscape_led"
        description: "Environment opens and closes each scene; the presence appears within weather"

    layer_5_pacing_skeleton:
      variant_label: "weather_to_baseline"
      end_of_chapter_hooks:
        ch1: small_wonder_close
        ch_mid: loss_echo_close
        ch_close: small_wonder_close
      scene_transitions: bleed_only
      forbidden:
        - cliffhanger
        - villain_or_threat
        - exorcism_or_combat
        - mystery_fully_resolved
        - emotional_labeling_in_caption
      page_turn_reveals:
        - chapter: 1
          revealed_on_turn: "The turn reveals the gold seam at a child's eye-height — gentle, not a jump-scare."

  # ═══════════════════════════════════════════════════════════════════════════
  # STRATEGY 03: THE OPEN HAND (compassion / receiving a hurting other)
  # Archetype: receive_the_difficult_guest
  # A visibly hurting, angry, or ambitious person arrives. The chapter is about
  # RECEIVING them into the baseline, not about their drama (craft §5).
  # ═══════════════════════════════════════════════════════════════════════════
  strategy_03:
    name: "The Open Hand"
    archetype_template: receive_the_difficult_guest
    description: >
      Compassion as the engine. A guest arrives carrying heat — grief that has
      curdled into irritation, a striving that won't rest, a sorrow that pushes
      others away. In any other genre this is a conflict. In iyashikei it is an
      invitation: the chapter is about receiving them into baseline, letting the
      place and the patience do their slow work. Courage here is the courage to
      stay open-handed in the face of someone else's pain.

    layer_1_plot_skeleton:
      variant_label: "open_hand_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            Open on weather and the rhythm of the place. {setting} keeps its
            small rituals — bread proofing, oars drying, the kettle's patience.
            Baseline, established and breathing, before anyone troubled enters.
          camera_hint: environmental_establishing
          mood_hint: stillness
          is_carrier: true
        - beat: 2
          text: >
            {companion} arrives carrying heat — clipped words, a tight jaw, the
            armor of someone braced against kindness. They are not a villain.
            They are a person whose grief has run out of soft places to land.
          camera_hint: medium_in_environment
          mood_hint: gentle_disruption
          is_carrier: true
        - beat: 3
          text: >
            {protagonist} does not meet the heat with heat. They offer the
            ordinary — a chair, the warm thing, the second cup that is not, this
            time, a wound but a welcome.
          camera_hint: close_two_shot
          mood_hint: tender
          is_carrier: true
        - beat: 4
          text: >
            {companion} bristles. Pushes the kindness away once, the way a
            frightened animal refuses the open hand. {protagonist} does not
            withdraw it. They simply leave it open, and wait.
          camera_hint: close_quiet_face
          mood_hint: tender_resistance
          is_carrier: true
        - beat: 5
          text: >
            A shared task neither asked for — the net, the dough, the walk to
            the water. The body does what the heart can't yet. Side by side,
            facing the same direction, the heat has nowhere to aim.
          camera_hint: medium_shared_task
          mood_hint: attunement
          is_carrier: true
        - beat: 6
          text: >
            A wordless stretch. {companion}'s shoulders drop a fraction. The
            place is doing its slow work — weather, rhythm, patience — on a
            person who forgot they were allowed to rest.
          camera_hint: environmental_breath
          mood_hint: stillness
          is_carrier: true
        - beat: 7
          text: >
            {companion} says the breath-sized true thing — the grief under the
            heat. "I haven't slept since." {protagonist} doesn't rush to soothe.
            They let it be heard. To be heard is most of it.
          camera_hint: close_quiet_face
          mood_hint: opening
          is_carrier: true
        - beat: 8
          text: >
            Nothing is solved. The striving will return; the grief will return.
            But for one afternoon {companion} was received exactly as they
            arrived, and the place held them. That holding is the whole gift.
          camera_hint: environmental_insert
          mood_hint: bittersweet_calm
          is_carrier: true
        - beat: 9
          text: >
            {companion} leaves softer than they came — not healed, but
            unclenched a quarter-turn. {protagonist} watches them go the way you
            watch weather clear.
          camera_hint: long_shot_departure
          mood_hint: gentle
          is_carrier: true
        - beat: 10
          text: >
            Return to baseline, one degree deeper. {protagonist} washes the two
            cups, sets one out for tomorrow's stranger. The place resumes its
            patience. The reader rests in the proof that kindness asks nothing
            back.
          camera_hint: environmental_closure_small_in_frame
          mood_hint: resonant_calm
          is_carrier: true

    layer_1_variants:
      - variant_label: "open_hand_standard"
        description: "Full 10-beat receiving arc as above"
      - variant_label: "open_hand_minimal"
        description: "Carrier beats only — the patience carried by silence"
      - variant_label: "open_hand_returning_guest"
