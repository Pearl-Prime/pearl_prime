  # ═══════════════════════════════════════════════════════════════════════════
  # STRATEGY 04: THE QUIET CROSSING (courage-as-inner-work)
  # Archetype: turn_toward_the_avoided_feeling
  # No external other is needed. The disruption is the character's own avoided
  # feeling; the arc is the gentle courage of turning toward it.
  # ═══════════════════════════════════════════════════════════════════════════
  strategy_04:
    name: "The Quiet Crossing"
    archetype_template: turn_toward_the_avoided_feeling
    description: >
      Courage reframed as inner work. There is no antagonist and barely a second
      character — only the protagonist, the place, and a feeling they have been
      walking around for a long time. The disruption is internal: an anniversary,
      a found object, a season that returns and brings the ache with it. The arc
      is the small, real courage of turning toward what one has avoided — not
      conquering it, but crossing the room to sit beside it.

    layer_1_plot_skeleton:
      variant_label: "crossing_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            Open on weather that returns. The same season, come around again.
            {setting} wears a familiar light, and the light carries something
            {protagonist} has spent a year not looking at directly.
          camera_hint: environmental_establishing
          mood_hint: stillness
          is_carrier: true
        - beat: 2
          text: >
            {protagonist} keeps busy. The rituals are a little too brisk today,
            the usefulness a little too useful. The body is managing a feeling
            the mind won't name.
          camera_hint: medium_in_environment
          mood_hint: quiet_ache
          is_carrier: true
        - beat: 3
          text: >
            A found object surfaces — a letter, a glove, a photograph in a drawer
            that wasn't being searched. {protagonist} almost puts it back. Almost
            walks on. The whole chapter lives in that almost.
          camera_hint: environmental_insert
          mood_hint: tender_resistance
          is_carrier: true
        - beat: 4
          text: >
            They set it on the table. They make the tea. They do not put the
            object away. The small courage is not a leap — it is the choice to
            stay in the room with the feeling for one more minute.
          camera_hint: close_quiet_face
          mood_hint: opening
          is_carrier: true
        - beat: 5
          text: >
            A wordless stretch. {protagonist} and the object and the weather.
            The ache is allowed, at last, to simply be in the room, neither fed
            nor fled.
          camera_hint: environmental_breath
          mood_hint: stillness
          is_carrier: true
        - beat: 6
          text: >
            They do one small honoring thing — refold the letter gently, set the
            glove by the window, place the photograph upright instead of face-
            down. The gesture says what no caption should: I am not pretending
            you weren't here.
          camera_hint: medium_shared_task
          mood_hint: attunement
          is_carrier: true
        - beat: 7
          text: >
            {protagonist} says the breath-sized true thing — aloud, to the empty
            room, which is to say to themselves. "I miss this version of the
            morning." It is not the whole grief. It is the size that fits.
          camera_hint: close_quiet_face
          mood_hint: opening
          is_carrier: true
        - beat: 8
          text: >
            Nothing is fixed. The ache does not dissolve. But it has been
            crossed-toward instead of fled, and that changes its weight. Grief
            that is sat-with takes up less of the air than grief that is run-from.
          camera_hint: environmental_insert
          mood_hint: bittersweet_calm
          is_carrier: true
        - beat: 9
          text: >
            {protagonist} returns to the day, the object now belonging instead
            of haunting. The rituals slow to their right pace. The light moves on
            across the floor.
          camera_hint: long_shot_in_environment
          mood_hint: gentle
          is_carrier: true
        - beat: 10
          text: >
            Return to baseline, one degree deeper. {protagonist} on the porch,
            small in the frame, watching the season do what seasons do. They have
            crossed a small, real distance today. The reader feels it as their
            own.
          camera_hint: environmental_closure_small_in_frame
          mood_hint: resonant_calm
          is_carrier: true

    layer_1_variants:
      - variant_label: "crossing_standard"
        description: "Full 10-beat inner-courage arc as above"
      - variant_label: "crossing_minimal"
        description: "Carrier beats only — the crossing held almost entirely in silence"
      - variant_label: "crossing_with_witness"
        description: "A quiet companion is present but says almost nothing — accompaniment without intrusion"

    layer_2_emotional_skeleton:
      variant_label: "courage_as_inner_work"
      ei_engine_hottest: grief
      chapter_emotional_map:
        chapter_1:
          emotional_job: "Reader recognizes the busyness that manages an unfaced feeling — the too-brisk rituals of avoidance"
          ei_dimension: grief
          intensity: 2
        chapter_climax:
          emotional_job: "Reader feels the quiet dignity of turning toward an ache instead of away — courage as a small crossing, not a conquest"
          ei_dimension: quiet_recognition
          intensity: 3
      progression_note: >
        Quiet ache → opening → quiet recognition. Courage is internal and gentle;
        the feeling is sat-with, never defeated. Intensity ceiling 3.

    layer_2_variants:
      - variant_label: "courage_as_inner_work"
        description: "Turning toward an avoided grief, alone"
      - variant_label: "grief_received"
        description: "An anniversary brings the ache; the work is to let it visit"
      - variant_label: "compassion_offered"
        description: "Self-compassion — the protagonist receives their own grief as they would a guest"

    layer_3_dialogue_skeleton:
      variant_label: "interior_sparse"
      avg_words_per_bubble: 4-10
      dialogue_to_caption_ratio: "60:40"  # more caption; a near-solo chapter
      speech_atom_sequence:
        - moment: "weather_caption_open"
          atom_archetype: observational_caption
          sample: "The same season had come around again, wearing the same light."
          emotion: stillness
          intensity: 1
          delivery: caption_box_observational
        - moment: "the_almost"
          atom_archetype: avoidance_caught
          sample: "(...Just put it back.)"
          emotion: tender_resistance
          intensity: 2
          delivery: soft_oval_thought
        - moment: "the_breath_sized_truth"
          atom_archetype: grief_sized_to_a_breath
          sample: "I miss this version of the morning."
          emotion: opening
          intensity: 3
          delivery: small_soft_bubble
        - moment: "the_honoring"
          atom_archetype: gesture_as_devotion
          sample: "(There. Upright. Where I can see you.)"
          emotion: quiet_recognition
          intensity: 2
          delivery: soft_oval_thought
        - moment: "closure_caption"
          atom_archetype: observational_caption
          sample: "The light moved on across the floor, and she let it."
          emotion: resonant_calm
          intensity: 1
          delivery: caption_box_observational
      escalation_pattern: "Flat-with-one-gentle-rise at the spoken true thing"
      key_signature_line: >
        "I miss this version of the morning."
        — said aloud to an empty room, the courage of naming a small grief

    layer_3_variants:
      - variant_label: "interior_sparse"
        description: "Thought-bubbles and captions carry it; ≤3 spoken-aloud lines"
      - variant_label: "near_wordless"
        description: "Almost entirely environmental correlative; one line aloud at most"
      - variant_label: "spoken_to_the_room"
        description: "The protagonist speaks softly aloud throughout, as one does when alone with a memory"

    layer_4_visual_skeleton:
      variant_label: "interior_irregular_grid"
      avg_panels_per_page: 2.5
      black_fill_ratio: 0.15
      silent_panel_ratio_target: 0.45  # highest — a near-solo interior chapter
      action_silent_pages:
        - position: ch_mid_breath
          bubble_density: none
          note: "Protagonist, object, weather — three panels, no text, the ache allowed to be"
      splash_pages:
        - position: ch1_p1
          trigger: "The returning season's light across a familiar interior"
          style: quiet_interior_with_light
        - position: ch_close
          trigger: "Porch, character small in frame, season turning"
          style: small_in_frame_environmental
      bubble_density_curve:
        ch1: very_sparse
        ch_mid: none
        ch_close: very_sparse
      recommended_bubble_styles:
        interior_thought: soft_oval_thought
        breath_sized_truth: small_soft_bubble
        observational_caption: caption_box_observational
        closure: caption_box_quiet
      panel_height_note: >
        The found object gets recurring insert panels — the emotional anchor.
        Use the moving light (across floor, table, wall) to mark interior time.

    layer_4_variants:
      - variant_label: "interior_irregular_grid"
        description: "Interior, irregular heights, ≥45% silent — the quietest layout"
      - variant_label: "single_object_meditation"
        description: "The letter / glove / photograph recurs as the anchor of the crossing"
      - variant_label: "light-across-the-room"
        description: "Moving light is the clock; scenes marked by where the sun has reached"

    layer_5_pacing_skeleton:
      variant_label: "weather_to_baseline"
      end_of_chapter_hooks:
        ch1: loss_echo_close
        ch_mid: small_wonder_close
        ch_close: small_wonder_close
      scene_transitions: bleed_only
      forbidden:
        - cliffhanger
        - villain_or_threat
        - dramatic_catharsis_spike
        - mystery_fully_resolved
        - emotional_labeling_in_caption
      page_turn_reveals:
        - chapter: 1
          revealed_on_turn: "The turn reveals the photograph set upright — a gesture, quietly, not a breakdown."

# ─────────────────────────────────────────────────────────────────────────────
# ANTI-PATTERN RULES (genre-specific; checked after layer selection)
# Mirrors the failure modes in the iyashikei craft bible §6.
# forbidden_combination keywords are matched case-insensitively against
# strategy_id + layer selection repr by story_strategy_loader.check_anti_patterns.
# ─────────────────────────────────────────────────────────────────────────────
anti_pattern_rules:
  - rule_id: iyashikei_no_villain
    forbidden_combination: [iyashikei, villain]
    severity: BLOCKER
    reason: >
      Introducing a villain or a threat that requires resolution breaks the
      iyashikei reader contract (craft bible §6.1). The disruption must be a
      feeling to attune to, never an enemy to defeat.
  - rule_id: iyashikei_no_cliffhanger
    forbidden_combination: [iyashikei, cliffhanger]
    severity: BLOCKER
    reason: >
      Even a soft cliffhanger ("...who could it be?") poisons the re-read value
      (craft bible §6.7). Chapters must return to baseline.
  - rule_id: iyashikei_no_emotional_labeling
    forbidden_combination: [iyashikei, emotional_labeling]
    severity: WARNING
    reason: >
      Emotional labeling in caption ("she felt lonely") is the cardinal sin
      (craft bible §4, §6.2). Show via environmental correlative instead.
  - rule_id: iyashikei_no_resolved_mystery
    forbidden_combination: [iyashikei, mystery_resolved]
    severity: WARNING
    reason: >
      A Mushishi reader wants the mushi to remain partly unknowable
      (craft bible §6.10). Do not fully explain the supernatural presence.

# ─────────────────────────────────────────────────────────────────────────────
# GENRE CONTRACT SUMMARY (machine-readable; consumed by story_architect and the
# bestseller QC gate as the healing-register craft targets)
# ─────────────────────────────────────────────────────────────────────────────
genre_contract:
  emotional_intensity_ceiling: 3        # 1-5 scale; iyashikei never spikes past 3
  silent_panel_ratio_floor: 0.35        # craft bible §2, §8
  words_per_page_band: [18, 45]         # craft bible §2
  hook_families: [small_wonder, loss_echo]   # weather/season-first, anti-cliffhanger
  chapter_curve: baseline_disruption_attunement_baseline
  cardinal_sins:
    - emotional_labeling_in_caption
    - cliffhanger_ending
    - villain_or_threat
    - raised_voice
    - fully_resolved_mystery
  carrier_principle: >
    Carrier beats encode the canonical curve (weather open → absence shown →
    gentle disruption → attunement → one-true-thing → return to baseline one
    degree deeper). These must survive any condensation.
