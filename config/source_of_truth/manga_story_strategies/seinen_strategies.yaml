# SEINEN STORY STRATEGIES v1.0.0
# ─────────────────────────────────────────────────────────────────────────────
# Each strategy is a 5-layer template. Combinatorial selection across layers
# produces 3^5 = 243+ unique combinations per strategy.
#
# SEINEN GENRE CONTRACT:
#   - Internal monologue is the primary engine (20-40 words, long caption boxes)
#   - The narrator is unreliable — reality and perception diverge; the reader
#     must triangulate truth from the gap between caption and image
#   - "Winning" produces hollow triumph or no triumph at all — anti-victory
#     convention is genre-defining, not optional
#   - Silence IS the climax — the final beat of a seinen arc is often
#     a silent panel or near-silent sequence
#   - Very low dialogue in climax chapters — the body, the environment,
#     and the white space carry the weight
#   - EI engines: shame (primary), grief, watcher, despair
#   - No empowerment arcs — transformation does not require approval or applause
#   - Ambiguity is not incompleteness — it is the answer; the reader holds
#     the unresolved tension alongside the protagonist
# ─────────────────────────────────────────────────────────────────────────────

schema_version: "1.0.0"
genre: seinen
strategy_count: 5

selection_algorithm:
  method: sha256_hash_seed
  seed_components: [series_id, arc_id, genre]
  layer_selection: |
    For each layer 1-5, compute:
      layer_idx = hash(seed + f":layer{n}") % len(layer_n_variants)
    where seed = f"{series_id}:{arc_id}:{genre}"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 01: DESCENT ARC
# Archetype: stable_ground_gives_way
# Core loop: apparent stability → hairline fracture → fracture widens →
#            protagonist cannot stop the descent → the bottom is not
#            a place of rescue — it is simply where they are
# ═════════════════════════════════════════════════════════════════════════════
strategies:
  strategy_01:
    name: "Descent Arc"
    archetype_template: stable_ground_gives_way
    description: >
      The descent arc does not require a villain. The system, the history,
      the protagonist's own established patterns — these are sufficient.
      The descent is not punishment. It is the logical conclusion of
      choices made under conditions the protagonist did not choose.
      The ambiguous bottom is not despair as a destination — it is simply
      honest about how far things go.

    # ── LAYER 1: PLOT SKELETON ──────────────────────────────────────────────
    layer_1_plot_skeleton:
      variant_label: "descent_standard"
      beat_count: 11
      beats:
        - beat: 1
          text: >
            Apparent stability — established with enough texture that the
            reader almost believes it. The protagonist's life has a shape.
            The shape is maintained through discipline or numbness or both.
            Something in the first pages is too controlled.
          camera_hint: controlled_surface_medium
          mood_hint: stability_as_maintenance
          is_carrier: true

        - beat: 2
          text: >
            First fracture — small. A thing that should be easily managed.
            The protagonist manages it. But the management required more than
            it should have. The reader notes the effort that wasn't there before.
          camera_hint: small_crack_close
          mood_hint: effort_where_there_was_ease
          is_carrier: true

        - beat: 3
          text: >
            The fracture spreads to an adjacent domain. Contained in domain A,
            it surfaces in domain B. The protagonist does not connect them.
            The reader might.
          camera_hint: adjacent_domain_fracture
          mood_hint: spreading_without_recognition
          is_carrier: false

        - beat: 4
          text: >
            The thing that was holding the stability is identified — not by
            the protagonist but structurally visible to the reader: it was
            always provisional. The base was not as solid as it appeared.
          camera_hint: structural_reveal_reader_only
          mood_hint: false_foundation_visible
          is_carrier: true

        - beat: 5
          text: >
            A relationship or role that defined the protagonist is changed
            or lost. Not dramatically — practically. A function that no longer
            functions. The protagonist continues the form of the role
            after its substance is gone.
          camera_hint: form_without_substance
          mood_hint: going_through_motions
          is_carrier: true

        - beat: 6
          text: >
            The protagonist attempts to arrest the descent — using the tools
            that built the stability originally. The tools no longer fit
            the problem. This is not visible to the protagonist yet.
          camera_hint: failed_control_attempt
          mood_hint: wrong_tool_right_purpose
          is_carrier: true

        - beat: 7
          text: >
            Acceleration — two domains failing simultaneously. The protagonist
            prioritizes and manages one. The other, unmanaged, destabilizes
            further. There is no right choice here. Both fail at different speeds.
          camera_hint: two_domain_crisis_parallel
          mood_hint: impossible_triage
          is_carrier: true

        - beat: 8
          text: >
            A person in the protagonist's orbit — not the protagonist — registers
            what is happening. They attempt to intervene. The intervention is
            genuine and wrong: it helps in the way a life raft helps someone
            drowning fifty feet from land. Not enough, too late, insufficient.
          camera_hint: inadequate_intervention
          mood_hint: witnessed_but_not_saved
          is_carrier: true

        - beat: 9
          text: >
            The bottom — not marked with drama. It is a Tuesday. It is
            unremarkable. The protagonist does something small that represents
            the furthest point of what they have become from what they were.
          camera_hint: bottom_as_ordinary
          mood_hint: profound_through_ordinary
          is_carrier: true

        - beat: 10
          text: >
            Aftermath — not recovery. The protagonist is still at the bottom
            or near it. But something has shifted: they have stopped
            maintaining the form of the old stability. There is less performance.
            This is not progress. It is honesty.
          camera_hint: aftermath_without_resolution
          mood_hint: less_pretense
          is_carrier: true

        - beat: 11
          text: >
            Final image: the protagonist in an environment, doing something
            ordinary. No conclusion. No lesson. No signal of where they go
            from here. The image holds the ambiguity. The reader holds the rest.
          camera_hint: ordinary_final_image
          mood_hint: open_ambiguous_ending
          is_carrier: true

    layer_1_variants:
      - variant_label: "descent_standard"
        description: "11-beat descent arc — bottom reached, no recovery; ambiguous aftermath"
      - variant_label: "arrested_descent"
        description: "Descent halted before the bottom — protagonist becomes aware in time to stop the fall, but not reverse it"
      - variant_label: "witnessed_descent"
        description: "A secondary character narrates/witnesses the protagonist's descent — unreliable narrator perspective"

    # ── LAYER 2: EMOTIONAL SKELETON ─────────────────────────────────────────
    layer_2_emotional_skeleton:
      variant_label: "shame_grief_watcher"
      ei_engine_hottest: shame
      chapter_emotional_map:
        chapter_1:
          emotional_job: >
            The stability is maintained through constant shame management —
            reader must feel the exhaustion of keeping the surface intact;
            the weight of not being seen is the setup
          ei_dimension: shame
          intensity: 3
        chapter_3:
          emotional_job: >
            The fracture spreading without recognition — watcher engine activates;
            protagonist observes their own behavior from a distance, cannot intervene
          ei_dimension: watcher
          intensity: 3
        chapter_6:
          emotional_job: >
            Failed control attempt — shame of being unable to manage what
            one was always 'able' to manage; the identity of competent
            self-management is breaking
          ei_dimension: shame
          intensity: 5
        chapter_climax:
          emotional_job: >
            The bottom is a grief moment — not for what was lost but for
            the person who existed before the descent began; that person
            is no longer accessible
          ei_dimension: grief
          intensity: 5
      progression_note: >
        Shame (managed) → Watcher (dissociation from self) → Shame (identity
        collapse) → Grief (for the pre-descent self). Seinen shame arcs do not
        resolve — they shift register from active shame to grief. The grief
        is not cathartic; it is simply the truth at the bottom.

    layer_2_variants:
      - variant_label: "shame_grief_watcher"
        description: "Standard descent emotional progression — shame, watcher dissociation, grief at bottom"
      - variant_label: "watcher_throughout"
        description: "Protagonist is dissociated from the beginning — watcher engine dominant; the descent is watched from inside"
      - variant_label: "spiral_descent"
        description: "Spiral engine drives the descent — each crisis produces a thought loop that accelerates the fall"

    # ── LAYER 3: DIALOGUE SKELETON ──────────────────────────────────────────
    layer_3_dialogue_skeleton:
      variant_label: "caption_unreliable_narrator"
      avg_words_per_bubble: 20-40
      caption_to_speech_ratio: "5:1"  # Seinen: caption boxes dominate
      speech_atom_sequence:
        - moment: "stability_caption"
          atom_archetype: unreliable_narrator_surface
          sample: >
            "I was managing well. That's not a performance — that is
            something I say to myself often enough that the difference
            between managing and appearing to manage had stopped being
            visible to me."
          emotion: self_deceived_stability
          intensity: 3
          delivery: long_caption_box_top

        - moment: "first_fracture_spoken"
          atom_archetype: deflection_competent
          sample: "I'll handle it. It's fine."
          emotion: managed_surface
          intensity: 2
          delivery: minimal_speech_bubble

        - moment: "fracture_spreading_caption"
          atom_archetype: unreliable_narrator_gap
          sample: >
            "The thing I noticed but filed under 'not urgent': I had
            started talking to myself differently. Not aloud. The
            internal register had shifted. I attributed this to stress.
            I was correct, technically."
          emotion: noting_without_acting
          intensity: 3
          delivery: caption_box_mid_panel

        - moment: "intervention_received"
          atom_archetype: inadequate_help_spoken
          sample: "I can see you're — are you alright? Do you need — "
          emotion: genuine_but_wrong_help
          intensity: 3
          delivery: uncertain_speech_bubble

        - moment: "protagonist_deflection_to_helper"
          atom_archetype: managed_reassurance
          sample: "I'm in the middle of something. Thank you, though. I mean that."
          emotion: polite_dismissal
          intensity: 2
          delivery: controlled_small_bubble

        - moment: "bottom_caption"
          atom_archetype: bare_account
          sample: >
            "I did [the small act]. It was a Tuesday. There wasn't a
            reason it was Tuesday rather than any other day.
            That's what I remember most: there was no reason."
          emotion: absent_affect_honesty
          intensity: 5
          delivery: long_caption_below_image

        - moment: "aftermath_caption"
          atom_archetype: less_performance
          sample: >
            "I stopped explaining it. To myself, I mean.
            I still had no answers. But I had stopped constructing
            plausible-sounding ones."
          emotion: aftermath_quiet_honesty
          intensity: 3
          delivery: final_caption_box

      escalation_pattern: >
        Captions carry the arc — spoken dialogue is sparse and managed throughout.
        The captions' language is controlled at the start and gradually loses its
        management as the arc progresses. By the bottom, the caption voice
        matches the image honestly for the first time.
        The gap between caption and image is the descent made visible.
      key_signature_line: >
        "The difference between managing and appearing to manage had stopped
        being visible to me." — first caption; sets the unreliable narrator
        immediately; returns as reference point at the bottom.

    layer_3_variants:
      - variant_label: "caption_unreliable_narrator"
        description: "Captions carry the arc; voice is unreliable early, corrects toward honesty at the bottom"
      - variant_label: "dialogue_sparse_grounded"
        description: "Very few captions; spoken dialogue sparse but load-bearing; images do most of the work"
      - variant_label: "internal_flood"
        description: "Internal monologue is overwhelming in volume — protagonist cannot stop the thought stream"

    # ── LAYER 4: VISUAL SKELETON ─────────────────────────────────────────────
    layer_4_visual_skeleton:
      variant_label: "environmental_descent"
      avg_panels_per_page: 4
      caption_box_density:
        ch1: heavy_top_heavy_bottom  # Captions frame the 'managed stability'
        ch6: heavy_contradicting     # Caption says one thing; image shows another
        ch9: minimal_honest          # The bottom — caption matches image
        ch11: absent                 # Final image — no caption at all
      dialogue_dense_pages:
        - position: ch8_p2
          bubble_density: sparse
          note: "The intervention — brief exchange, mostly white space around it"
      action_silent_pages:
        - position: ch1_p4
          bubble_density: none
          note: "The controlled surface — protagonist in their environment; only image"
        - position: ch9_p3
          bubble_density: none
          note: "The bottom moment — the small ordinary act; no caption; just the image"
        - position: ch11_p1
          bubble_density: none
          note: "Final image — nothing"
      splash_pages:
        # Seinen splash pages: environmental, not action or romance
        - position: ch1_p2
          trigger: "The apparent stability — seen from outside"
          style: controlled_environment_wide_cold
        - position: ch7_p3
          trigger: "Two domains failing simultaneously — visual split"
          style: parallel_collapse_diptych
        - position: ch11_p1
          trigger: "Final image — ambiguous aftermath"
          style: figure_in_environment_no_resolution
      bubble_density_curve:
        ch1: heavy_caption       # Unreliable narrator establishing
        ch2: medium_caption      # First fracture — caption explains away
        ch3: medium_caption      # Spreading — caption notes but misattributes
        ch4: sparse_caption      # Structure visible to reader; less internal narration
        ch5: medium_caption      # Form without substance — caption notes the form
        ch6: heavy_caption       # Failed control — caption volume peaks; most unreliable
        ch7: sparse              # Acceleration — visual weight; captions decrease
        ch8: sparse_speech       # Intervention — brief spoken exchange
        ch9: none                # The bottom — no text
        ch10: sparse_honest      # Aftermath — fewer captions, honest
        ch11: none               # Final image — silence
      recommended_bubble_styles:
        managed_captions: clean_rectangle_controlled_font
        unreliable_narrator_gap: italic_shifted_caption
        honest_captions: plain_unadorned_smaller
        minimal_speech: small_unemphasized_oval
        bottom_no_caption: absent
        final_no_caption: absent

    layer_4_variants:
      - variant_label: "environmental_descent"
        description: "Environment tracks the descent — spaces become smaller, more enclosed, less light"
      - variant_label: "caption_visual_dissonance"
        description: "Caption-image dissonance is explicit — what the caption says is visually contradicted on the same panel"
      - variant_label: "time_skip_compression"
        description: "Descent shown through time skips — same location, different date, visible deterioration"

    # ── LAYER 5: PACING SKELETON ─────────────────────────────────────────────
    layer_5_pacing_skeleton:
      variant_label: "controlled_then_slow"
      end_of_chapter_hooks:
        ch1: managed_surface_note    # Stability visible; something just slightly off
        ch2: fracture_unresolved     # First crack; managed but not fixed
        ch3: spreading_unnoticed     # Adjacent domain affected; protagonist hasn't connected it
        ch4: false_base_visible      # Reader sees the foundation; protagonist doesn't
        ch5: form_without_function   # The going-through-motions; quiet horror
        ch6: wrong_tool_used         # Failed control; the reader understands the mismatch
        ch7: triage_failing          # Two fronts; one abandoned; reader sees the choice
        ch8: intervention_insufficient # Help arrives; too small; protagonist turns away
        ch9: bottom_unmarked         # Tuesday. Ordinary. Over.
        ch10: less_pretense_noted    # Aftermath; something stripped away
        ch11: final_image_open       # No conclusion; simply: here

      page_turn_reveals:
        - chapter: 4
          hidden_until_turn: "Caption describes solid foundation — turn reveals: image shows the cracks in the base"
        - chapter: 6
          hidden_until_turn: "Protagonist deploying old solution — turn reveals: it no longer fits the problem"
        - chapter: 9
          hidden_until_turn: "The bottom approaching — turn reveals: it looks exactly like a normal Tuesday"

      silence_to_dialogue_ratio:
        setup_chapters: "30% silence / 10% spoken / 60% caption"
        rising_chapters: "40% silence / 5% spoken / 55% caption"
        climax_chapters: "80% silence / 5% spoken / 15% caption"
        # Note: climax chapters heavily silent — this is the genre contract

      climax_pacing_pattern: >
        Descent arc climax uses the absolute slowest pacing in the pipeline.
        Ch9 (the bottom): 2-3 panels/page. The ordinary Tuesday requires space.
        Ch10-11 aftermath: 2 panels/page maximum, possibly single-panel pages.
        There is no acceleration into the climax — the arc descends at
        the same speed throughout and simply arrives at the bottom.

    layer_5_variants:
      - variant_label: "controlled_then_slow"
        description: "Controlled pace maintains managed appearance; slows as performance drops; arrives slowly at bottom"
      - variant_label: "steady_descent"
        description: "Consistent pacing throughout — the descent has no acceleration, no dramatic moments, just persistence"
      - variant_label: "punctuated_stillness"
        description: "Descent chapters alternate with still chapters — still chapters are the protagonist trying to pause the fall"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 02: OBSESSION ARC
# Archetype: fixation_that_consumes_the_fixer
# Core loop: fixation identified → protagonist organizes their life around it →
#            cost becomes visible → protagonist pays the cost anyway →
#            devastation OR transcendence (the arc can end either way;
#            the method determines which — and transcendence in seinen
#            is not clean)
# ═════════════════════════════════════════════════════════════════════════════
  strategy_02:
    name: "Obsession Arc"
    archetype_template: fixation_that_consumes_the_fixer
    description: >
      The obsession is not the villain. It is the protagonist's most honest
      relationship — the thing they will choose above everything else when
      the moment comes. The question is not whether the obsession is
      rational. The question is: when the cost becomes total, do they continue?
      And if they continue, what does that make them? The arc doesn't judge.
      It shows.

    layer_1_plot_skeleton:
      variant_label: "obsession_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            The fixation introduced — not as pathology, but as fascination.
            Something about this thing has the protagonist's full attention
            in a way that nothing else has managed. The reader must
            understand the pull. Otherwise the rest of the arc is incomprehensible.
          camera_hint: fixation_reveal_close_protagonist
          mood_hint: attention_fully_given
          is_carrier: true

        - beat: 2
          text: >
            The life organized around the fixation — gradually, naturally.
            Priorities reordered. Other things deprioritized. No single
            dramatic sacrifice — an accumulation of small ones.
          camera_hint: life_reorganization_montage
          mood_hint: natural_gravitational_pull
          is_carrier: false

        - beat: 3
          text: >
            First significant cost — not final. A relationship, a commitment,
            an opportunity foregone. The protagonist registers it.
            Does not change course.
          camera_hint: cost_visible_protagonist_seen
          mood_hint: cost_absorbed
          is_carrier: true

        - beat: 4
          text: >
            Progress on the fixation — genuine. The obsession is not empty.
            There is something real here. What the protagonist is pursuing
            has value. This is important: their judgment is not wrong,
            only their relationship to the judgment.
          camera_hint: genuine_progress_fixation
          mood_hint: value_confirmed
          is_carrier: true

        - beat: 5
          text: >
            The spiral begins — progress activates more obsession, not less.
            Each step forward requires more, not less. The protagonist
            understands this and chooses anyway.
          camera_hint: spiral_entry_visible
          mood_hint: aware_choosing
          is_carrier: true

        - beat: 6
          text: >
            Major cost — something that cannot be recovered. The protagonist
            is told: this is the last chance to choose differently.
            They choose the fixation. The reader must not be able to say
            the choice was incomprehensible.
          camera_hint: point_of_no_return
          mood_hint: understood_choice
          is_carrier: true

        - beat: 7
          text: >
            Deepest entry — protagonist in the place/state the fixation
            required them to reach. They are fully committed. The cost
            is total. The proximity to the object of obsession is as close
            as it has ever been.
          camera_hint: deepest_immersion_obsession
          mood_hint: maximum_proximity_total_cost
          is_carrier: true

        - beat: 8
          text: >
            Devastation OR transcendence — or an ambiguous version of both.
            Devastation: the fixation costs the final thing and the protagonist
            is left with only the thing, which is no longer what it was
            in proximity. Transcendence: the protagonist becomes something
            beyond what the fixation was — but is no longer who they were.
          camera_hint: endpoint_ambiguous_or_clear
          mood_hint: final_cost_and_final_proximity
          is_carrier: true

        - beat: 9
          text: >
            Aftermath — without the active obsession. The protagonist exists
            in the space the obsession used to fill. The space is not empty.
            It is full of what was given for it.
          camera_hint: aftermath_without_fixation
          mood_hint: full_absence
          is_carrier: true

        - beat: 10
          text: >
            The thing remains — the object of obsession, whatever it is.
            The protagonist is changed by the pursuit, not by the attainment.
            Whether they have it or not is secondary to what having-pursued-it
            has made them.
          camera_hint: object_and_changed_protagonist
          mood_hint: cost_as_identity
          is_carrier: true

    layer_1_variants:
      - variant_label: "obsession_standard"
        description: "10-beat obsession arc with ambiguous devastation/transcendence endpoint"
      - variant_label: "obsession_devastation"
        description: "Endpoint is clearly devastation — the final thing lost, the object no longer what it was"
      - variant_label: "obsession_transcendence"
        description: "Endpoint is transcendence — protagonist becomes something beyond the original fixation, at full cost"

    layer_2_emotional_skeleton:
      variant_label: "spiral_to_watcher"
      ei_engine_hottest: spiral
      chapter_emotional_map:
        chapter_1:
          emotional_job: >
            The fixation's pull must be felt by the reader — not judged.
            The spiral engine is not active yet; this is the moment before
            the spiral, when the pull is still clean
          ei_dimension: overwhelm  # clean overwhelm of fascination
          intensity: 3
        chapter_3:
          emotional_job: >
            First cost — spiral engine begins; each cost activates more
            commitment, not less; the protagonist observes this in themselves
            and continues
          ei_dimension: spiral
          intensity: 4
        chapter_6:
          emotional_job: >
            Point of no return — protagonist watches themselves make the final
            choice; watcher engine observes the moment of irreversibility
          ei_dimension: watcher
          intensity: 5
        chapter_climax:
          emotional_job: >
            Devastation/transcendence — grief for what was paid; the cost
            fully visible in the aftermath silence
          ei_dimension: grief
          intensity: 5
      progression_note: >
        Fascination → Spiral (cost-choosing) → Watcher (observing the irreversible
        choice) → Grief (aftermath). The transition from spiral to watcher
        is the arc's emotional pivot: protagonist stops choosing and starts
        observing themselves having chosen.

    layer_2_variants:
      - variant_label: "spiral_to_watcher"
        description: "Spiral fuels the arc; watcher observes the point of no return; grief at aftermath"
      - variant_label: "shame_of_obsession"
        description: "The protagonist is ashamed of the fixation even as they choose it — shame and spiral intertwine"
      - variant_label: "clean_watcher"
        description: "Protagonist is dissociated from the beginning — they watch themselves pursue the obsession from inside"

    layer_3_dialogue_skeleton:
      variant_label: "obsession_justification_eroding"
      avg_words_per_bubble: 25-40
      caption_to_speech_ratio: "6:1"
      speech_atom_sequence:
        - moment: "fixation_articulated"
          atom_archetype: obsession_case_made
          sample: >
            "This is the thing. I know what other things feel like —
            adequate, pleasant, sufficient. This isn't that.
            This is the thing."
          emotion: certainty_of_fixation
          intensity: 4
          delivery: long_caption_box_precise

        - moment: "first_cost_noted"
          atom_archetype: cost_minimized
          sample: >
            "I told myself: this is a temporary cost. Once this phase
            is complete the balance will restore. I was aware this was
            possibly a lie."
          emotion: aware_self_deception
          intensity: 3
          delivery: caption_italicized_aware

        - moment: "someone_challenges"
          atom_archetype: intervention_refused
          sample: "You know what you're doing to yourself. You can see it."
          emotion: accurate_external_observation
          intensity: 4
          delivery: speech_bubble_plain

        - moment: "protagonist_response"
          atom_archetype: honest_confirmation
          sample: "Yes."
          emotion: acknowledgment_without_change
          intensity: 5
          delivery: single_word_caption

        - moment: "point_of_no_return_caption"
          atom_archetype: watcher_noting_choice
          sample: >
            "This was the moment. I was aware it was the moment.
            I made the choice anyway. I did not make it lightly.
            I made it completely."
          emotion: watcher_at_irreversibility
          intensity: 5
          delivery: long_caption_heavy_weight

        - moment: "transcendence_or_devastation_caption"
          atom_archetype: endpoint_account
          sample: >
            "I had it. Or I didn't. The difference between those two
            sentences had become, by then, academic."
          emotion: beyond_the_distinction
          intensity: 4
          delivery: final_long_caption

        - moment: "aftermath_silence"
          atom_archetype: empty_caption
          sample: "[no text — final pages]"
          emotion: post_cost_silence
          intensity: 5
          delivery: absent

      escalation_pattern: >
        Caption volume high and controlled early; becomes heavier and more honest
        as the arc progresses. The protagonist's caption voice cannot sustain the
        management; it simplifies toward honesty. The final pages are silent.
        The spoken dialogue is sparse throughout — only the intervention sequence
        breaks the caption dominance.
      key_signature_line: >
        "Yes." — single word response to "You know what you're doing to yourself."
        The most honest line in the arc. The entire obsession in one syllable.

    layer_3_variants:
      - variant_label: "obsession_justification_eroding"
        description: "Caption voice begins with justification framework; erodes to bare honesty at the endpoint"
      - variant_label: "no_justification"
        description: "Protagonist never justifies; the obsession is stated without defense from the first page"
      - variant_label: "dialogue_as_mirror"
        description: "Another character reflects the protagonist's own logic back at them; the dialogue is the protagonist's internal monologue made external"

    layer_4_visual_skeleton:
      variant_label: "narrowing_frame"
      avg_panels_per_page: 4
      caption_box_density:
        ch1: heavy_structured   # Fixation articulated clearly
        ch3: medium_managing    # Cost noted and managed
        ch6: heavy_aware        # Watcher at the point of no return
        ch8: sparse_honest      # Endpoint — few words, honest
        ch9: none               # Aftermath silence
        ch10: none              # Final image
      dialogue_dense_pages:
        - position: ch5_p3
          bubble_density: sparse
          note: "Intervention challenge — brief exchange; protagonist's 'Yes.' is the entire response"
      action_silent_pages:
        - position: ch7_p2
          bubble_density: none
          note: "Deepest immersion — protagonist at maximum proximity; pure image"
        - position: ch9_p1
          bubble_density: none
          note: "Aftermath — the space the obsession filled; empty"
        - position: ch10_p2
          bubble_density: none
          note: "Final image — protagonist and the object; or protagonist without it"
      splash_pages:
        - position: ch1_p3
          trigger: "The fixation in full — reader must feel the pull"
          style: fixation_object_wide_intimate
        - position: ch7_p3
          trigger: "Maximum proximity — deepest immersion"
          style: total_commitment_close_saturated
        - position: ch10_p2
          trigger: "Final image — aftermath"
          style: ambiguous_endpoint_quiet
      bubble_density_curve:
        ch1: heavy_caption      # Fixation articulated
        ch2: medium_caption     # Life reorganization
        ch3: medium_caption     # First cost noted and managed
        ch4: light_caption      # Progress — less narration; more showing
        ch5: sparse_plus_brief  # Spiral noted; brief intervention
        ch6: heavy_caption      # Point of no return — most loaded caption chapter
        ch7: none               # Deepest immersion — silent
        ch8: sparse_caption     # Endpoint — few honest words
        ch9: none               # Aftermath silence
        ch10: none              # Final image
      recommended_bubble_styles:
        fixation_captions: long_precise_rectangle
        managing_captions: medium_aware_slightly_italicized
        intervention_speech: plain_unadorned_observation
        protagonist_yes: single_word_full_weight
        watcher_captions: long_flat_honest
        endpoint_captions: minimal_plain
        silence: absent

    layer_4_variants:
      - variant_label: "narrowing_frame"
        description: "Visual frame narrows as obsession deepens — panels become more constrained and intimate"
      - variant_label: "fixation_object_visual"
        description: "The fixation object is depicted with more detail and presence than any character — visual hierarchy matches obsession"
      - variant_label: "body_language_arc"
        description: "Protagonist's body language tracks the obsession — posture, proximity, gesture tell the story alongside captions"

    layer_5_pacing_skeleton:
      variant_label: "deliberate_accumulation"
      end_of_chapter_hooks:
        ch1: fixation_established    # The pull felt; reader understands why
        ch2: accumulation_noted      # Life reorganization visible; no single dramatic moment
        ch3: cost_absorbed           # First significant cost paid; protagonist continues
        ch4: progress_confirmed      # The obsession has genuine value; complicates judgment
        ch5: spiral_named            # Progress activates more obsession; protagonist aware
        ch6: choice_made             # Point of no return; no ambiguity about what was chosen
        ch7: maximum_depth           # Deepest immersion; cut; no aftermath shown yet
        ch8: endpoint_ambiguous      # Devastation or transcendence; reader holds both
        ch9: absence_present         # What the obsession filled is now filled by its absence
        ch10: final_unchanged_object # The thing remains; the protagonist is different

      page_turn_reveals:
        - chapter: 3
          hidden_until_turn: "Cost described — turn reveals what was lost is more significant than protagonist's caption acknowledged"
        - chapter: 6
          hidden_until_turn: "Protagonist at the choice point — turn reveals: already past it; the caption is past tense"
        - chapter: 8
          hidden_until_turn: "Maximum immersion — turn reveals the endpoint; ambiguous whether devastation or transcendence"

      silence_to_dialogue_ratio:
        setup_chapters: "20% silence / 5% spoken / 75% caption"
        rising_chapters: "30% silence / 5% spoken / 65% caption"
        climax_chapters: "85% silence / 0% spoken / 15% caption"

      climax_pacing_pattern: >
        Obsession arc uses unique pacing inversion:
        Early chapters (ch1-4): 5 panels/page — the obsession requires density
        to show accumulation. Later chapters (ch5-7): 4 panels/page.
        Endpoint (ch8): 2-3 panels/page. Aftermath (ch9-10): 1-2 panels/page.
        The arc decelerates — the obsession took over every available space;
        its absence is felt as decompression.

    layer_5_variants:
      - variant_label: "deliberate_accumulation"
        description: "Pacing mirrors the accumulation — dense early, sparse at endpoint; the space of aftermath is earned"
      - variant_label: "compression"
        description: "Short arc — the obsession compressed into fewer pages; intensity over duration"
      - variant_label: "intercut_cost"
        description: "Each progress chapter intercut with cost chapter — the parallel structure makes the trade visible"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 03: WITNESS ARC
# Archetype: observer_drawn_into_the_observed
# Core loop: protagonist observes something they shouldn't → proximity creates
#            moral implication → they cannot look away → they are changed
#            by what they witnessed; the question is: to what end?
# ═════════════════════════════════════════════════════════════════════════════
  strategy_03:
    name: "Witness Arc"
    archetype_template: observer_drawn_into_the_observed
    description: >
      The witness arc is distinguished from the action arc by its refusal
      of agency. The protagonist does not solve, fix, or rescue. They watch,
      they are implicated, they are changed. The moral weight is not in
      what they do but in what witnessing makes them carry.
      Witnessing is not passive — it is a form of presence that has consequences.

    layer_1_plot_skeleton:
      variant_label: "witness_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            {protagonist} in their ordinary position — observer by nature or
            by circumstance. Something about the way they encounter the world
            establishes them as someone who watches more than acts.
          camera_hint: protagonist_positioned_as_watcher
          mood_hint: habitual_observation
          is_carrier: true

        - beat: 2
          text: >
            The thing to be witnessed enters the frame — obliquely.
            Not announced. {protagonist} notices it the way they notice
            everything: carefully, from a distance.
          camera_hint: oblique_entry_observed
          mood_hint: distanced_careful_attention
          is_carrier: true

        - beat: 3
          text: >
            Deeper access. Circumstances bring the protagonist into closer
            proximity to what they're observing than they intended.
            The distance that felt safe is closing.
          camera_hint: proximity_increasing
          mood_hint: safety_of_distance_eroding
          is_carrier: true

        - beat: 4
          text: >
            The moment of maximum moral clarity — protagonist understands
            what they are seeing, what it means, and that they cannot
            claim ignorance. They have not been made ignorant by circumstances.
            They now carry what they know.
          camera_hint: moral_clarity_close
          mood_hint: knowledge_as_weight
          is_carrier: true

        - beat: 5
          text: >
            The pull — protagonist cannot look away. Not because they
            are voyeuristic but because what they're witnessing refuses
            to release them. It requires something of them that they haven't
            agreed to give.
          camera_hint: cannot_look_away
          mood_hint: required_by_witnessing
          is_carrier: true

        - beat: 6
          text: >
            Attempt to disengage — protagonist tries to return to the
            observer position. It no longer holds. They have crossed the
            threshold that separates observation from participation.
          camera_hint: failed_disengagement
          mood_hint: threshold_crossed
          is_carrier: true

        - beat: 7
          text: >
            The drawn-in — protagonist is now part of what they were observing.
            Not the center. Not the agent. Still the witness. But inside
            the thing, not outside it.
          camera_hint: inside_the_observed
          mood_hint: witness_become_participant
          is_carrier: true

        - beat: 8
          text: >
            Something happens that the protagonist cannot prevent.
            They are present for it. They do not look away. The witnessing
            is complete — they have seen what there is to see.
          camera_hint: cannot_prevent_present
          mood_hint: helpless_witness
          is_carrier: true

        - beat: 9
          text: >
            Aftermath of witnessing — the protagonist carries it. Not
            as trauma narrative but as weight: they are heavier now.
            What they carry did not come with instructions for what to do with it.
          camera_hint: weighted_aftermath
          mood_hint: weight_without_instruction
          is_carrier: true

        - beat: 10
          text: >
            Final question: what is the witness for? The arc does not answer.
            The protagonist does not answer. The reader, who also witnessed,
            must hold the question.
          camera_hint: final_unanswered_question
          mood_hint: shared_witness_burden
          is_carrier: true

    layer_1_variants:
      - variant_label: "witness_standard"
        description: "10-beat witness arc — observer drawn in; what was witnessed is carried; question unanswered"
      - variant_label: "active_witness"
        description: "Protagonist attempts action based on witnessing — the act changes them but does not resolve the witnessed situation"
      - variant_label: "double_witness"
        description: "Protagonist is both the observer and is being observed by another — witnessing is mutual; weight is doubled"

    layer_2_emotional_skeleton:
      variant_label: "watcher_primary"
      ei_engine_hottest: watcher
      chapter_emotional_map:
        chapter_1:
          emotional_job: >
            Watcher engine established as protagonist's primary mode —
            observation is both safety and limitation; reader feels both
          ei_dimension: watcher
          intensity: 3
        chapter_3:
          emotional_job: >
            Distance closing — watcher position becoming untenable;
            anxiety of proximity without the protection of distance
          ei_dimension: overwhelm
          intensity: 3
        chapter_6:
          emotional_job: >
            Threshold crossed — watcher engine in crisis; observation mode
            cannot hold because the observed requires response
          ei_dimension: watcher
          intensity: 5
        chapter_climax:
          emotional_job: >
            The weight of witnessing — grief not for the self but for
            what was seen; the witness carries a grief that is not theirs
            but is now theirs
          ei_dimension: grief
          intensity: 5
      progression_note: >
        Watcher (functional) → Overwhelm (distance eroding) →
        Watcher (crisis of the mode) → Grief (carried weight).
        The watcher engine is both the protagonist's strength and
        the arc's central problem: observation without action has a cost.

    layer_2_variants:
      - variant_label: "watcher_primary"
        description: "Watcher engine throughout — the arc is about what it costs to watch and not act"
      - variant_label: "shame_of_witness"
        description: "Protagonist is ashamed of their observer position — shame activates when they understand they cannot be neutral"
      - variant_label: "false_alarm_observer"
        description: "Protagonist repeatedly discounts what they're seeing — false alarm engine as defense against the weight of witnessing"

    layer_3_dialogue_skeleton:
      variant_label: "observation_caption_sparse"
      avg_words_per_bubble: 20-35
      caption_to_speech_ratio: "8:1"  # Highest ratio — witness arc is almost entirely internal
      speech_atom_sequence:
        - moment: "observer_position_caption"
          atom_archetype: habitual_observer_self_account
          sample: >
            "I had always preferred watching to participating. This was not
            cowardice, I told myself. It was a form of care: staying out of
            things was a way of not making them worse."
          emotion: defended_observation
          intensity: 2
          delivery: long_opening_caption

        - moment: "something_noticed_caption"
          atom_archetype: careful_noting
          sample: >
            "I noticed it the way I notice most things — as data.
            Something was happening here that was unusual.
            I catalogued it and kept walking."
          emotion: distanced_noting
          intensity: 2
          delivery: caption_walking

        - moment: "moral_clarity_caption"
          atom_archetype: knowledge_landed
          sample: >
            "This was the moment I understood that I understood.
            There was no longer any ambiguity about what this was.
            I had seen it. I could not un-see it."
          emotion: weight_of_knowing
          intensity: 4
          delivery: heavy_caption_center

        - moment: "cannot_look_away_caption"
          atom_archetype: required_attention
          sample: >
            "I tried to leave. I came back. I tried again. This is not
            voyeurism. I want to be clear about that, at least to myself.
            It was something more like duty. Or horror. Or both."
          emotion: complex_compulsion
          intensity: 4
          delivery: caption_split_questioning

        - moment: "minimal_spoken_in_scene"
          atom_archetype: functional_minimal
          sample: '"I — " [left incomplete]'
          emotion: speech_that_fails
          intensity: 3
          delivery: incomplete_speech_bubble

        - moment: "aftermath_caption"
          atom_archetype: weight_accounted
          sample: >
            "I had seen it. That was all. That was also everything.
            There was no action I could have taken. I knew this.
            I also knew it didn't help."
          emotion: helpless_honesty
          intensity: 5
          delivery: final_long_caption

        - moment: "final_question_no_answer"
          atom_archetype: open_weight
          sample: "[no text — or: a single unanswered question in caption]"
          emotion: shared_burden
          intensity: 5
          delivery: absent_or_single_question

      escalation_pattern: >
        Caption voice is the entire arc. Spoken dialogue has one partial
        appearance (the incomplete "I —") which marks the moment the witness
        tried to act and couldn't. Captions move from managed observation
        to weight-of-knowing to helpless honesty.
      key_signature_line: >
        "I had seen it. That was all. That was also everything."
        — the final accounting; the witness's paradox; the line
        that makes the reader feel the genre contract.

    layer_3_variants:
      - variant_label: "observation_caption_sparse"
        description: "Almost entirely caption; speech nearly absent; the internal observer has no need for voice"
      - variant_label: "observed_character_voice"
        description: "The one being witnessed has dialogue; protagonist is mute observer; the observed speaks but is not heard by the protagonist"
      - variant_label: "journal_structure"
        description: "Captions framed as journal entries — dated, retrospective, the protagonist already knows the outcome"

    layer_4_visual_skeleton:
      variant_label: "framing_and_proximity"
      avg_panels_per_page: 4
      caption_box_density:
        ch1: heavy_top            # Protagonist's observer mode established
        ch4: heavy_center         # Moral clarity — captions in the middle of action
        ch8: heavy_bottom         # Cannot prevent — captions below the image
        ch10: none_or_single      # Final question or silence
      dialogue_dense_pages:
        # There are no dialogue-dense pages in the witness arc
        - position: none
          note: "No dialogue-dense pages — the arc has no multi-speech scenes"
      action_silent_pages:
        - position: ch5_p3
          bubble_density: none
          note: "Cannot look away — the pull; pure image, no caption"
        - position: ch8_p2
          bubble_density: none
          note: "The event that cannot be prevented — no caption; just the image"
        - position: ch10_p1
          bubble_density: none
          note: "Final image — the witness after"
      splash_pages:
        - position: ch2_p2
          trigger: "The observed enters the frame — full presence"
          style: observed_wide_entering
        - position: ch4_p3
          trigger: "Moral clarity — the understanding that they understand"
          style: protagonist_close_knowing
        - position: ch8_p3
          trigger: "What cannot be prevented — the moment itself"
          style: event_wide_protagonist_in_frame_small
        - position: ch10_p2
          trigger: "The final witness position — heavier, changed"
          style: protagonist_weighted_present
      bubble_density_curve:
        ch1: heavy_caption        # Observer position established
        ch2: medium_caption       # Something noticed; careful observation
        ch3: medium_caption       # Proximity increasing; observation annotated
        ch4: heavy_caption        # Moral clarity — most verbal chapter
        ch5: none_to_sparse       # Cannot look away — near silence
        ch6: sparse_caption       # Threshold crossed — less can be said
        ch7: sparse               # Inside the observed — minimal
        ch8: none                 # Cannot prevent — silent
        ch9: medium_caption       # Aftermath accounting
        ch10: none_to_single      # Final question or silence
      recommended_bubble_styles:
        observation_captions: precise_long_rectangular
        moral_clarity: heavy_centered_weight
        threshold_captions: shorter_less_certain
        partial_speech: incomplete_dissolving
        aftermath: honest_plain
        final_silence: absent

    layer_4_variants:
      - variant_label: "framing_and_proximity"
        description: "Visual language of framing — protagonist always positioned as observer; frame within frame"
      - variant_label: "distance_then_close"
        description: "Deliberately distant visual compositions early; forced close-ups as distance closes"
      - variant_label: "negative_space_witness"
        description: "The protagonist rendered small in large panels — scale emphasizes the observer's position within the witnessed"

    layer_5_pacing_skeleton:
      variant_label: "pull_and_weight"
      end_of_chapter_hooks:
        ch1: observer_position_set  # Protagonist as watcher established; reader in same position
        ch2: observed_entered       # The thing to witness entered the frame; no clarity yet
        ch3: distance_closing       # Proximity uncomfortable; observer position under pressure
        ch4: knowledge_heavy        # Moral clarity landed; reader and protagonist both carry it
        ch5: cannot_leave           # The pull demonstrated; chapter ends mid-attempt to disengage
        ch6: inside                 # Threshold crossed; no return to observer position
        ch7: drawn_in_fully         # Maximum participation in the observed; cut
        ch8: event_witnessed        # What cannot be prevented; chapter ends immediately after
        ch9: weight_named           # Aftermath; the carrying described
        ch10: question_unanswered   # Final; the reader holds what the protagonist holds

      page_turn_reveals:
        - chapter: 3
          hidden_until_turn: "Protagonist observing from distance — turn reveals: the observed has seen them"
        - chapter: 5
          hidden_until_turn: "Protagonist walking away — turn reveals: they turned around"
        - chapter: 8
          hidden_until_turn: "The event building — turn reveals it has already happened; protagonist in the aftermath"

      silence_to_dialogue_ratio:
        setup_chapters: "30% silence / 3% spoken / 67% caption"
        rising_chapters: "50% silence / 2% spoken / 48% caption"
        climax_chapters: "85% silence / 0% spoken / 15% caption"

      climax_pacing_pattern: >
        Witness arc climax is the most silent in the pipeline.
        Ch8 (the event): 2 panels — both without text.
        Ch9: 3 panels — captions only, no image action.
        Ch10: 1-2 panels — the final image, possibly silent.
        The witness arc earns its silence through the weight of what was seen.

    layer_5_variants:
      - variant_label: "pull_and_weight"
        description: "Pacing reflects the arc's structure — slow approach to the witnessed, deceleration at maximum proximity"
      - variant_label: "single_long_approach"
        description: "The approach to the witnessed takes most of the arc; arrival is brief; aftermath is the main event"
      - variant_label: "repeated_exposure"
        description: "The protagonist encounters the witnessed thing multiple times — each encounter adds weight to the final witnessing"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 04: SYSTEM CRITIQUE ARC
# Archetype: insider_who_cannot_unsee
# Core loop: protagonist integrated into the system → discovers the system's
#            internal logic is different from its stated purpose →
#            attempts to work from within → cost of knowing → exposure
#            attempt → pyrrhic victory at best; the system persists
# ═════════════════════════════════════════════════════════════════════════════
  strategy_04:
    name: "System Critique Arc"
    archetype_template: insider_who_cannot_unsee
    description: >
      The system is not evil — it is coherent. It has an internal logic
      that makes sense from inside. The protagonist is not a hero whistleblower;
      they are someone for whom the internal logic stopped being bearable.
      The pyrrhic victory is genre-defining: the protagonist may win their
      immediate objective and change nothing fundamental.

    layer_1_plot_skeleton:
      variant_label: "system_critique_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            The system introduced through the protagonist's competent integration
            into it. They are good at this. The system rewards them.
            The reader does not yet know whether the system deserves criticism.
          camera_hint: competent_insider_medium
          mood_hint: successful_integration
          is_carrier: true

        - beat: 2
          text: >
            First anomaly — not corruption, but inconsistency between the
            system's stated purpose and its operational reality. Small.
            Possibly explainable. {protagonist} files it.
          camera_hint: anomaly_noted_close
          mood_hint: explanable_inconsistency
          is_carrier: true

        - beat: 3
          text: >
            The internal logic revealed — protagonist gains access to the
            level where the system's actual operating principles are visible.
            The internal logic is coherent. This is what makes it concerning:
            it is not chaotic. It is planned.
          camera_hint: system_interior_revealed
          mood_hint: coherent_wrongness
          is_carrier: true

        - beat: 4
          text: >
            Attempt to work from within — protagonist uses the system's
            tools against its tendency. The attempt partially succeeds,
            which is the most dangerous outcome: it gives them hope that
            internal change is possible.
          camera_hint: internal_reform_attempt
          mood_hint: dangerous_partial_success
          is_carrier: true

        - beat: 5
          text: >
            The cost of knowing — the protagonist's integration into the
            system is now compromised by what they know. They can no longer
            operate as if they don't know. The knowledge is an instrument.
          camera_hint: knowledge_as_liability
          mood_hint: integration_compromised
          is_carrier: true

        - beat: 6
          text: >
            The system responds — not with hostility, but with logic.
            The protagonist's dissent is processed through the system's
            internal mechanisms. This is more unsettling than persecution:
            the system doesn't need to fight; it absorbs.
          camera_hint: system_absorption_response
          mood_hint: absorbed_not_opposed
          is_carrier: true

        - beat: 7
          text: >
            Exposure attempt — protagonist attempts to make visible what
            they cannot unsee. The exposure is real. The information is
            accurate. The response is real but insufficient.
          camera_hint: exposure_attempt_genuine
          mood_hint: accurate_but_insufficient
          is_carrier: true

        - beat: 8
          text: >
            Pyrrhic victory: the specific thing they exposed is addressed.
            Something is changed. The system acknowledges the correction.
            The structural logic that produced the thing remains.
            The victory is real and hollow simultaneously.
          camera_hint: hollow_victory_aftermath
          mood_hint: real_and_insufficient
          is_carrier: true

        - beat: 9
          text: >
            The protagonist's position after the pyrrhic victory: they
            are no longer in the system. Or they are in it differently.
            The ground they stood on no longer holds them the same way.
          camera_hint: displaced_position_aftermath
          mood_hint: neither_inside_nor_outside
          is_carrier: true

        - beat: 10
          text: >
            The system continues. The protagonist watches it continue.
            What they did mattered. What they did was not enough.
            Both things are true. The system does not require their validation.
          camera_hint: system_continuing_protagonist_outside
          mood_hint: irrelevance_of_individual_within_system
          is_carrier: true

    layer_1_variants:
      - variant_label: "system_critique_standard"
        description: "10-beat arc — pyrrhic victory; system persists; protagonist displaced"
      - variant_label: "failed_exposure"
        description: "The exposure fails entirely — protagonist's attempt absorbed and neutralized by the system"
      - variant_label: "delayed_reckoning"
        description: "The protagonist's exposure takes years to have effect; protagonist does not live to see it; the arc is the attempt"

    layer_2_emotional_skeleton:
      variant_label: "shame_corruption_grief"
      ei_engine_hottest: shame
      chapter_emotional_map:
        chapter_1:
          emotional_job: >
            The shame of competent integration — protagonist has participated in
            the system without questioning it; the early competence is the
            setup for later shame
          ei_dimension: shame
          intensity: 2
        chapter_3:
          emotional_job: >
            Internal logic revealed — the shame of understanding now that you
            were operating in a system whose real logic was always different;
            complicity without knowledge is still complicity
          ei_dimension: shame
          intensity: 4
        chapter_6:
          emotional_job: >
            System absorption — the protagonist sees themselves through the
            system's eyes; watcher engine: observing their own absorption
          ei_dimension: watcher
          intensity: 4
        chapter_climax:
          emotional_job: >
            Pyrrhic victory grief — winning without winning; the specific
            cost of partial success; grief for the systemic change that
            did not occur
          ei_dimension: grief
          intensity: 5
      progression_note: >
        Shame (complicity) → Shame (deeper complicity) → Watcher (system absorption) →
        Grief (systemic scale of the failure). System critique arcs in seinen
        end with grief at the systemic level — the individual's shame has
        been transcended into structural grief.

    layer_2_variants:
      - variant_label: "shame_corruption_grief"
        description: "Shame of complicity → watcher of absorption → grief at systemic scale"
      - variant_label: "watcher_throughout"
        description: "Protagonist is always slightly dissociated from their role; watcher engine is present from the beginning"
      - variant_label: "spiral_disillusionment"
        description: "Spiral engine — each discovery requires protagonist to re-examine what else they assumed; recursive disillusionment"

    layer_3_dialogue_skeleton:
      variant_label: "institutional_voice_eroding"
      avg_words_per_bubble: 18-35
      caption_to_speech_ratio: "4:1"
      speech_atom_sequence:
        - moment: "system_language_caption"
          atom_archetype: insider_competence_voice
          sample: >
            "The framework was designed to be efficient. I had been trained
            to think of this as a feature. I was good at it.
            I had not asked what it was efficient for."
          emotion: competent_unquestioned
          intensity: 2
          delivery: professional_caption_box

        - moment: "anomaly_spoken_dismissed"
          atom_archetype: institutional_dismissal
          sample: "That's an edge case. The framework handles edge cases. That's what the exceptions protocol is for."
          emotion: system_language_response
          intensity: 3
          delivery: smooth_institutional_speech

        - moment: "internal_logic_caption"
          atom_archetype: cannot_unsee
          sample: >
            "The internal logic was coherent. That was the problem.
            I kept looking for the chaos, the error. There was no error.
            It was operating exactly as designed."
          emotion: disturbing_coherence
          intensity: 4
          delivery: long_realization_caption

        - moment: "system_absorption_spoken"
          atom_archetype: institutional_reframe
          sample: "Your concerns have been noted. They've been forwarded to the appropriate channel. Thank you for your diligence."
          emotion: absorbed_without_engagement
          intensity: 4
          delivery: procedural_flat_speech

        - moment: "exposure_made"
          atom_archetype: direct_disclosure
          sample: "Here is what the framework actually does. Not what it says it does. What it actually does."
          emotion: documented_directness
          intensity: 5
          delivery: clean_declarative_speech

        - moment: "pyrrhic_victory_caption"
          atom_archetype: hollow_accounting
          sample: >
            "They corrected it. I want to be precise about this: they corrected it.
            The correction was real. The thing that produced it continued.
            I do not know what to do with this information."
          emotion: hollow_accurate_accounting
          intensity: 5
          delivery: careful_precise_hollow_caption

        - moment: "final_watching_caption"
          atom_archetype: systemic_acknowledgment
          sample: >
            "The system does not need me to be angry at it.
            It does not need me to validate it.
            It is already working."
          emotion: cold_structural_recognition
          intensity: 4
          delivery: final_flat_caption

      escalation_pattern: >
        Protagonist's voice begins in system language — competent, institutional.
        As the arc progresses, the voice sheds institutional vocabulary.
        By the exposure attempt, the protagonist speaks in their own voice.
        After the pyrrhic victory, the caption returns to precision
        but the precision is now honest, not institutional.
      key_signature_line: >
        "The system does not need me to be angry at it."
        — the final line of systemic recognition; the protagonist
        fully understands the scale of what they were trying to change.

    layer_3_variants:
      - variant_label: "institutional_voice_eroding"
        description: "Caption voice begins institutional; erodes to direct personal voice as the arc progresses"
      - variant_label: "document_as_dialogue"
        description: "The system speaks through official documents; the protagonist responds through actions; formal voice confrontation"
      - variant_label: "two_voice_debate"
        description: "Protagonist has one ally who also sees; two voices arguing for different responses to the same knowledge"

    layer_4_visual_skeleton:
      variant_label: "institutional_aesthetics"
      avg_panels_per_page: 4
      caption_box_density:
        ch1: medium_professional    # Institutional voice; confident captions
        ch3: heavy_discovery        # Internal logic reveal; heavy caption analysis
        ch6: medium_absorbed        # System absorption; captions shorter, less certain
        ch8: sparse_hollow          # Pyrrhic victory; captions almost honest
        ch10: minimal_structural    # Final watching; spare honest captions
      dialogue_dense_pages:
        - position: ch2_p3
          bubble_density: medium
          note: "Anomaly dismissed — institutional speech patterns; smooth and impenetrable"
        - position: ch7_p2
          bubble_density: medium
          note: "Exposure made — the one moment of direct confrontational speech"
      action_silent_pages:
        - position: ch6_p3
          bubble_density: none
          note: "System absorption — protagonist in the system's response; no commentary possible"
        - position: ch8_p4
          bubble_density: none
          note: "Pyrrhic victory — the specific thing changed; no celebration"
        - position: ch10_p2
          bubble_density: none
          note: "The system continuing — wide image; protagonist small in frame"
      splash_pages:
        - position: ch3_p3
          trigger: "Internal logic revealed — the coherent wrongness"
          style: system_architecture_cold_wide
        - position: ch7_p3
          trigger: "Exposure made — direct confrontation"
          style: protagonist_document_direct
        - position: ch10_p3
          trigger: "Final image — system continuing; protagonist outside"
          style: protagonist_small_system_large
      bubble_density_curve:
        ch1: medium_caption      # Institutional voice established
        ch2: medium_mixed        # First anomaly; dismissal
        ch3: heavy_caption       # Internal logic — most analytical chapter
        ch4: medium_mixed        # Internal reform attempt
        ch5: medium_caption      # Knowledge as liability
        ch6: sparse_absorbed     # System absorption; speech becomes system speech
        ch7: medium_spoken       # Exposure attempt — spoken moment
        ch8: sparse_hollow       # Pyrrhic victory — silence and honesty
        ch9: sparse_caption      # Displaced position
        ch10: minimal            # System watching; sparse final caption
      recommended_bubble_styles:
        institutional_voice: clean_professional_rectangle
        system_absorption_speech: flat_procedural_cold
        discovery_captions: dense_analytical_rectangle
        protagonist_direct_speech: plain_unadorned
        pyrrhic_victory_captions: spare_precise
        final_captions: minimal_structural

    layer_4_variants:
      - variant_label: "institutional_aesthetics"
        description: "Visual language adopts institutional aesthetics early — clean lines, ordered panels; disorder at exposure"
      - variant_label: "inside_outside_contrast"
        description: "Interior institutional spaces vs exterior private spaces — the protagonist's two visual registers"
      - variant_label: "document_visual"
        description: "Documents, forms, reports as visual elements — the system's language made physically present"

    layer_5_pacing_skeleton:
      variant_label: "institutional_rhythm"
      end_of_chapter_hooks:
        ch1: integration_smooth    # Competent insider; too smooth; note the ease
        ch2: anomaly_unresolved    # Filed but not dismissed; something is different
        ch3: coherence_horror      # Internal logic exposed; no chaos; worse
        ch4: partial_success_trap  # Internal reform partially worked; dangerous
        ch5: knowledge_liability   # Protagonist can't unknow; cannot operate same way
        ch6: absorption_noted      # System processes the dissent; absorbed, not opposed
        ch7: exposure_made         # Direct confrontation; response pending
        ch8: hollow_victory        # Correction made; structural logic unchanged; cut
        ch9: displaced_position    # Neither inside nor outside; provisional ground
        ch10: system_watching      # Final: the system continues

      page_turn_reveals:
        - chapter: 3
          hidden_until_turn: "Protagonist analyzing the anomaly — turn reveals: it's not an error; it's the design"
        - chapter: 6
          hidden_until_turn: "Institutional response to protagonist's dissent — turn reveals: fully absorbed into procedure"
        - chapter: 8
          hidden_until_turn: "Victory — turn reveals: the specific thing changed; wider shot shows what didn't"

      silence_to_dialogue_ratio:
        setup_chapters: "20% silence / 20% spoken / 60% caption"
        rising_chapters: "35% silence / 10% spoken / 55% caption"
        climax_chapters: "60% silence / 15% spoken / 25% caption"

      climax_pacing_pattern: >
        System critique climax is institutional in pacing —
        no dramatic acceleration, no rapid panel sequence.
        Exposure chapter (ch7): 4-5 panels/page — measured, direct.
        Pyrrhic victory (ch8): 3-4 panels/page.
        Final chapter (ch10): 2-3 panels/page.
        The pacing mirrors the system itself: it doesn't respond to
        the protagonist's urgency; it continues at its own speed.

    layer_5_variants:
      - variant_label: "institutional_rhythm"
        description: "Pacing mirrors institutional rhythm — steady, unresponsive to urgency; protagonist cannot accelerate it"
      - variant_label: "documentation_chapters"
        description: "Key chapters structured as documentation — the protagonist's evidence gathered; paced like reading a report"
      - variant_label: "escalating_personal"
        description: "Pacing increases as the protagonist's personal cost increases — the system stays slow; protagonist accelerates"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 05: REDEMPTION-IMPOSSIBLE ARC
# Archetype: past_crime_that_cannot_be_undone
# Core loop: protagonist carries a past crime they committed → attempts repair →
#            discovers the repair cannot undo the damage → must live with the
#            unrepairable → integration, not forgiveness
# ═════════════════════════════════════════════════════════════════════════════
  strategy_05:
    name: "Redemption-Impossible Arc"
    archetype_template: past_crime_that_cannot_be_undone
    description: >
      The crime is real. The protagonist committed it. The damage was real.
      The arc is not about whether the protagonist deserves forgiveness —
      forgiveness is not the arc's business. The arc is about living in
      a world where what was done cannot be undone, and discovering what
      that life looks like without the denial that the protagonist has
      been carrying. Integration is not closure. It is simply: continuing,
      with full knowledge.

    layer_1_plot_skeleton:
      variant_label: "redemption_impossible_standard"
      beat_count: 11
      beats:
        - beat: 1
          text: >
            {protagonist} in present, carrying something. Not visible yet.
            The weight is evident in their behavior — the choices they
            make that don't quite make sense without context.
          camera_hint: weight_carried_present
          mood_hint: unexplained_burden
          is_carrier: true

        - beat: 2
          text: >
            The past surfaces — not as flashback, but as consequence.
            Something in the present connects to something the protagonist
            did. The connection is not yet fully visible, but the reader
            feels the link.
          camera_hint: past_consequence_present
          mood_hint: unresolved_past
          is_carrier: true

        - beat: 3
          text: >
            The crime named — not revealed, but named. The protagonist
            acknowledges to themselves, fully, what they did. The reader
            learns what it is at this point. It was real. It was their choice.
          camera_hint: naming_alone_close
          mood_hint: full_acknowledgment
          is_carrier: true

        - beat: 4
          text: >
            Repair attempted — the protagonist tries to address the damage.
            Not to the affected person necessarily — but in the world.
            Good acts. Compensation. The logic of the attempt is sincere.
          camera_hint: repair_attempt_action
          mood_hint: sincere_attempt
          is_carrier: true

        - beat: 5
          text: >
            Contact with the consequences — the protagonist encounters
            someone or something that shows them what the damage produced.
            Not punitive. Just: the world with their act in it.
          camera_hint: consequence_visible_in_present
          mood_hint: damage_seen
          is_carrier: true

        - beat: 6
          text: >
            The repair is insufficient — not because the protagonist
            didn't try, but because repair cannot undo. The world does not
            have an undo function. This is not a failure of the protagonist.
            It is a property of reality.
          camera_hint: insufficiency_recognized
          mood_hint: reality_of_unrepairable
          is_carrier: true

        - beat: 7
          text: >
            The protagonist confronts the choice: continue attempting repair
            as if completion is possible, or accept that the damage is permanent
            and the question is only: what now? This is the arc's hardest beat.
          camera_hint: choice_confronted
          mood_hint: permanence_of_damage
          is_carrier: true

        - beat: 8
          text: >
            Denial stripped — the protagonist stops performing repair and
            starts inhabiting the knowledge of what cannot be undone.
            This is not resignation. It is the end of false hope.
          camera_hint: denial_stripped_close
          mood_hint: false_hope_ended
          is_carrier: true

        - beat: 9
          text: >
            Integration — not peace. The protagonist finds a way to carry
            the permanent knowledge and continue. Not because they've earned
            the right. Because the alternative is a life spent in the
            performance of unrealizable repair.
          camera_hint: integration_posture_medium
          mood_hint: carrying_without_performance
          is_carrier: true

        - beat: 10
          text: >
            An act in the present — not repair of the past, but something done
            in the present from the integrated state. It does not compensate.
            It is simply: a person who did that thing, doing this thing now.
          camera_hint: present_act_integrated
          mood_hint: present_action_post_integration
          is_carrier: true

        - beat: 11
          text: >
            Final: the past remains. The protagonist remains. Both are present.
            Neither cancels the other. This is the definition of integration:
            the past is not the enemy; it is not the excuse; it is simply
            part of what is.
          camera_hint: past_and_present_coexisting
          mood_hint: integration_not_resolution
          is_carrier: true

    layer_1_variants:
      - variant_label: "redemption_impossible_standard"
        description: "11-beat arc — repair attempted, repair insufficient, integration without resolution"
      - variant_label: "confronted_by_harmed"
        description: "Protagonist is directly confronted by the person/people they harmed; the arc includes that encounter"
      - variant_label: "no_repair_attempt"
        description: "Protagonist knows repair is impossible from the beginning; the arc is about finding integration without attempting the impossible"

    layer_2_emotional_skeleton:
      variant_label: "shame_grief_integration"
      ei_engine_hottest: shame
      chapter_emotional_map:
        chapter_1:
          emotional_job: >
            The weight visible before the cause — reader senses something
            wrong in the protagonist's self-management; the shame is
            the organizing force before the content is known
          ei_dimension: shame
          intensity: 3
        chapter_3:
          emotional_job: >
            The crime named internally — peak shame; the protagonist allows
            themselves full knowledge of what they did, which the armor
            of self-story had partially blocked
          ei_dimension: shame
          intensity: 5
        chapter_6:
          emotional_job: >
            The repair is insufficient — grief for the permanently altered
            world; the grief is not self-pity but acknowledgment
          ei_dimension: grief
          intensity: 5
        chapter_climax:
          emotional_job: >
            Integration — shame becomes context rather than identity;
            the protagonist does not stop being the person who did the thing;
            they become the person who did the thing and is still here
          ei_dimension: shame
          intensity: 3  # present but no longer the organizing force
      progression_note: >
        Shame (organizing force) → Shame (full acknowledgment, peak) →
        Grief (permanent damage) → Shame (integrated, diminished as identity).
        Seinen redemption arcs do not resolve shame through absolution —
        they diminish shame's identity-organizing power through integration.
        The shame is still there at the end. It is simply no longer the whole story.

    layer_2_variants:
      - variant_label: "shame_grief_integration"
        description: "Standard redemption-impossible emotional arc — shame peak then grief then integration"
      - variant_label: "watcher_shame"
        description: "Protagonist watches themselves having done the thing — watcher and shame intertwined throughout"
      - variant_label: "grief_primary"
        description: "Grief for the harmed is the primary engine; protagonist's shame is secondary to the acknowledgment of what was lost by others"

    layer_3_dialogue_skeleton:
      variant_label: "crime_weight_voice"
      avg_words_per_bubble: 22-40
      caption_to_speech_ratio: "6:1"
      speech_atom_sequence:
        - moment: "weight_carried_caption"
          atom_archetype: unexplained_burden_voice
          sample: >
            "I had developed a system for carrying it.
            Not the thing itself — the knowledge of the thing.
            The system was detailed and it worked most days."
          emotion: managed_burden
          intensity: 3
          delivery: long_managed_caption

        - moment: "crime_named_caption"
          atom_archetype: bare_acknowledgment
          sample: >
            "I had done [the crime]. I want to be precise here:
            I did it. It was my choice. The context was what it was.
            The context did not change what I did."
          emotion: undefended_acknowledgment
          intensity: 5
          delivery: long_caption_without_defense

        - moment: "repair_spoken"
          atom_archetype: compensation_act
          sample: "I'm trying to — I want to do something that matters. For what happened."
          emotion: sincere_inadequate_attempt
          intensity: 3
          delivery: halting_speech_bubble

        - moment: "consequence_witness_caption"
          atom_archetype: damage_visible
          sample: >
            "I saw what the damage had become. It had a shape now.
            It had a life in the world. My act was part of the architecture
            of someone else's history."
          emotion: damage_scale_registered
          intensity: 5
          delivery: heavy_consequence_caption

        - moment: "insufficiency_named_caption"
          atom_archetype: repair_limit_acknowledged
          sample: >
            "There isn't a version of repair that reaches this.
            I had been acting as if there was. I had been wrong to act that way.
            This was not a failure of effort."
          emotion: limit_acknowledged_not_giving_up
          intensity: 4
          delivery: precise_sad_caption

        - moment: "integration_attempt_spoken"
          atom_archetype: carrying_not_resolving
          sample: >
            "I'm not trying to make it right. That's not what this is.
            I'm trying to figure out how to be a person who did that
            and is still here."
          emotion: honest_forward_question
          intensity: 4
          delivery: careful_real_speech

        - moment: "final_caption"
          atom_archetype: past_present_coexisting
          sample: >
            "The past doesn't require my attention to remain true.
            It simply is. I am also simply something.
            We coexist. That's the best available description."
          emotion: integration_matter_of_fact
          intensity: 3
          delivery: final_plain_caption

      escalation_pattern: >
        The crime naming (ch3) is the caption peak — everything before builds
        to it; everything after manages its weight. The repair attempt is the
        only sustained spoken section. The arc ends in captions that are
        matter-of-fact rather than heavy — the integration is in the register
        change, not in the resolution.
      key_signature_line: >
        "I'm trying to figure out how to be a person who did that and is still here."
        — the most honest summary of the arc; spoken, not captioned;
        the only thing the protagonist says that is not managed.

    layer_3_variants:
      - variant_label: "crime_weight_voice"
        description: "Caption voice that bears the weight fully — precise, undefended, honest about the act"
      - variant_label: "defense_erosion"
        description: "Caption voice begins with defended language; defenses erode across the arc to bare honesty"
      - variant_label: "other_voice_included"
        description: "The affected person is given voice at one point — their account is accurate and not redemptive for the protagonist"

    layer_4_visual_skeleton:
      variant_label: "past_weight_present_light"
      avg_panels_per_page: 4
      caption_box_density:
        ch1: medium_managed      # Carried weight but managed
        ch3: heavy_bare          # Crime named — heaviest captions
        ch6: heavy_consequence   # Damage visible — weight of consequence
        ch9: sparse_integrated   # Integration — fewer words; different weight
        ch11: minimal            # Final coexistence
      dialogue_dense_pages:
        - position: ch4_p3
          bubble_density: sparse
          note: "Repair attempt — halting spoken attempt; sparse and effortful"
        - position: ch9_p2
          bubble_density: sparse
          note: "Integration spoken — the only real dialogue; honest and forward"
      action_silent_pages:
        - position: ch5_p3
          bubble_density: none
          note: "Consequence visible — the world with the act in it; no caption necessary"
        - position: ch8_p2
          bubble_density: none
          note: "Denial stripped — protagonist's face; no caption"
        - position: ch11_p2
          bubble_density: none
          note: "Final image — past and present coexisting; silent"
      splash_pages:
        - position: ch3_p3
          trigger: "Crime named — full acknowledgment"
          style: protagonist_alone_full_weight_no_drama
        - position: ch5_p4
          trigger: "Consequence in the world — what the damage became"
          style: world_with_damage_in_it
        - position: ch11_p3
          trigger: "Final coexistence — integration"
          style: ordinary_presence_heaviness_without_drama
      bubble_density_curve:
        ch1: medium_managed      # Carried; system in place
        ch2: medium_caption      # Past surfaces in consequence
        ch3: very_heavy_caption  # Crime named — peak caption weight
        ch4: sparse_spoken       # Repair attempt — halting speech
        ch5: heavy_caption       # Consequence witnessed — visual weight
        ch6: heavy_caption       # Insufficiency recognized
        ch7: medium_caption      # Choice confronted
        ch8: sparse_bare         # Denial stripped — minimal
        ch9: sparse_spoken       # Integration — spoken and spare
        ch10: sparse_caption     # Present act
        ch11: minimal_to_none    # Final coexistence
      recommended_bubble_styles:
        managed_captions: controlled_precise_rectangle
        bare_crime_caption: plain_unadorned_no_italics
        repair_speech: halting_soft_bubble
        consequence_captions: heavy_weighted_caption
        insufficiency_captions: precise_plain
        integration_speech: careful_direct_real
        final_captions: minimal_matter_of_fact

    layer_4_variants:
      - variant_label: "past_weight_present_light"
        description: "Visual weight shifts — past chapters heavier; integration chapters lighter; physical sense of carrying and setting down"
      - variant_label: "crime_flashback_restrained"
        description: "Single restrained flashback — the crime shown once, without dramatization; then never revisited"
      - variant_label: "consequence_architecture"
        description: "The damage depicted architecturally — it has a physical presence in the world of the story"

    layer_5_pacing_skeleton:
      variant_label: "weight_bearing_pace"
      end_of_chapter_hooks:
        ch1: weight_unexplained    # The burden visible; not yet named
        ch2: past_surfacing        # Consequence connection felt; not seen clearly
        ch3: crime_named           # Heaviest chapter; full acknowledgment; no aftermath yet
        ch4: repair_incomplete     # Attempt made; clearly insufficient already
        ch5: damage_visible        # Consequence in the world; chapter ends in it
        ch6: insufficiency_clear   # Repair cannot reach; this is not a failure
        ch7: choice_presented      # Continue the performance or stop; cut before decision
        ch8: denial_ended          # The false hope ended; chapter ends in the bare fact
        ch9: integration_beginning # Carrying without performance; forward motion possible
        ch10: present_act          # Act done from integrated state; no fanfare
        ch11: coexistence          # Final; both present; neither cancels the other

      page_turn_reveals:
        - chapter: 2
          hidden_until_turn: "Protagonist's behavior in present — turn reveals: this is a consequence of the past act"
        - chapter: 5
          hidden_until_turn: "Repair action taken — turn reveals the damage that exists despite it"
        - chapter: 8
          hidden_until_turn: "Performance of repair — turn reveals: the protagonist stopped. They are simply present."

      silence_to_dialogue_ratio:
        setup_chapters: "25% silence / 10% spoken / 65% caption"
        rising_chapters: "40% silence / 5% spoken / 55% caption"
        climax_chapters: "70% silence / 10% spoken / 20% caption"

      climax_pacing_pattern: >
        Redemption-impossible arc has unique pacing architecture:
        Ch3 (crime named): slowest chapter — 2-3 panels/page; maximum weight.
        Ch5 (consequence visible): second slowest — 3 panels/page.
        Ch8 (denial stripped): 2 panels/page; the bare fact requires space.
        Ch9-11: gradual return to 3-4 panels/page — not acceleration; normalization.
        The arc's pacing philosophy: the heaviest things move slowest.

    layer_5_variants:
      - variant_label: "weight_bearing_pace"
        description: "Pacing proportional to weight — heaviest chapters slowest; integration chapters slightly faster"
      - variant_label: "linear_descent_pace"
        description: "Consistent slow pace throughout — no variation; the constancy mirrors the permanence of the past"
      - variant_label: "present_faster"
        description: "Past-adjacent chapters slow; present-action chapters faster — the integration is shown through return to movement"

# ═════════════════════════════════════════════════════════════════════════════
# ANTI-PATTERN RULES — SEINEN
# ═════════════════════════════════════════════════════════════════════════════
anti_pattern_rules:
  - rule_id: SE_AP_01
    forbidden_combination:
      strategy: strategy_01  # Descent Arc
      layer_2_ei_dimension_at_climax: triumphant_emotional_job
    reason: >
      Seinen descent must not end in triumph. The genre contract requires
      the bottom to be the bottom — not a launching pad. Any emotional
      framing at the climax that reads as "triumph" or "earned victory"
      breaks the contract and produces a shōnen arc in seinen clothing.
    severity: blocker

  - rule_id: SE_AP_02
    forbidden_combination:
      strategy: strategy_05  # Redemption-Impossible Arc
      layer_1_variant_includes: forgiveness_given_by_harmed
    reason: >
      The forgiveness of the harmed is not available in this arc as a
      resolution mechanism. If the harmed person forgives the protagonist,
      the "impossible" component dissolves. The arc becomes a standard
      redemption arc. The entire point is the absence of external absolution.
    severity: blocker

  - rule_id: SE_AP_03
    forbidden_combination:
      strategy: any_seinen
      layer_3_variant: empowerment_declaration
    reason: >
      Seinen genre constraints (see engines/shame.yaml tone_constraints):
      "No triumphant speeches," "No empowerment monologues." A spoken
      declaration of personal empowerment breaks the narrative register.
      The protagonist may reach integration but they do not announce it
      to an audience.
    severity: blocker

  - rule_id: SE_AP_04
    forbidden_combination:
      strategy: strategy_02  # Obsession Arc
      endpoint: clean_resolution_obsession_resolved
    reason: >
      Obsession arcs in seinen end in devastation OR transcendence —
      neither of which is "clean resolution." If the obsession resolves
      cleanly (protagonist simply stops being obsessed; life normalizes),
      the arc has broken its own logic. The cost must be real and the
      endpoint must hold the ambiguity.
    severity: blocker

  - rule_id: SE_AP_05
    forbidden_combination:
      strategy: strategy_03  # Witness Arc
      layer_1_variant: protagonist_saves_the_witnessed
    reason: >
      The witness arc's genre contract is that witnessing carries moral
      weight without producing rescue. If the protagonist saves the
      witnessed, the arc becomes an action-heroism arc. The point is
      the impossibility of intervention — witnessing without power to change.
    severity: warning

  - rule_id: SE_AP_06
    forbidden_combination:
      strategy: strategy_04  # System Critique Arc
      ending: system_destroyed_or_fundamentally_reformed
    reason: >
      System critique arcs in seinen end in pyrrhic victory at best.
      If the system is destroyed or fundamentally reformed by the
      protagonist's efforts, the arc produces the opposite of its
      genre contract: individual heroism solving systemic problems.
      The system must persist.
    severity: blocker

  - rule_id: SE_AP_07
    forbidden_combination:
      strategy: any_seinen
      layer_4_variant: shojo_emotional_backgrounds
    reason: >
      Seinen visual language is environmental and architectural, not
      emotionally decorative. Stars, flower petals, floating hair
      compositions, and emotionally-reactive backgrounds are shōjo
      visual grammar. Using them in seinen produces a visual genre
      conflict that undermines the seinen register.
    severity: warning

  - rule_id: SE_AP_08
    forbidden_combination:
      strategy: any_seinen
      layer_5_pacing: rapid_chapter_cliffhangers_throughout
    reason: >
      Chapter cliffhangers in the shōnen tournament style produce
      forward momentum that contradicts seinen's accumulative gravity.
      Seinen chapters end on weight, not on urgency. The reader should
      be compelled to continue by the weight of what was said, not by
      the withholding of what comes next.
    severity: warning
