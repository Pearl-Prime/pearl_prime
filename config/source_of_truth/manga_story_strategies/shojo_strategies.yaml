# SHŌJO STORY STRATEGIES v1.0.0
# ─────────────────────────────────────────────────────────────────────────────
# Each strategy is a 5-layer template. Combinatorial selection across layers
# produces 3^5 = 243+ unique combinations per strategy.
#
# SHŌJO GENRE CONTRACT:
#   - Inner monologue is the primary narrative engine (thought bubbles >> speech)
#   - The relationship IS the plot — external events are pretexts for emotional
#     change in proximity to another person
#   - Silence carries romance; silence carries grief; silence is not absence
#   - Splash pages mark emotional revelation, NOT action
#   - Panel density: 12-25 words per bubble (vs shōnen 8-15)
#   - Starry backgrounds, cherry blossom panels, and floating-hair compositions
#     are the visual language of emotional peak, not decoration
#   - EI engines: shame (primary), comparison, love_as_wound, grief (secondary)
#   - "Love" in shōjo EI is not triumph — it is the most vulnerable exposure
#     of the self to the judgment of another
# ─────────────────────────────────────────────────────────────────────────────

schema_version: "1.0.0"
genre: shojo
strategy_count: 5

selection_algorithm:
  method: sha256_hash_seed
  seed_components: [series_id, arc_id, genre]
  layer_selection: |
    For each layer 1-5, compute:
      layer_idx = hash(seed + f":layer{n}") % len(layer_n_variants)
    where seed = f"{series_id}:{arc_id}:{genre}"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 01: FIRST LOVE ARC
# Archetype: noticing_to_confession_to_aftermath
# Core loop: unremarkable encounter → growing noticing → confession attempt →
#            aftermath of vulnerability regardless of outcome
# ═════════════════════════════════════════════════════════════════════════════
strategies:
  strategy_01:
    name: "First Love Arc"
    archetype_template: noticing_to_confession_to_aftermath
    description: >
      First love in shōjo is not about winning the person — it is about
      the discovery that you can feel this way, which means you are this
      person, which is terrifying. The confession is not the goal. The
      confession is proof of courage. The aftermath — received or rejected —
      is the actual arc.

    # ── LAYER 1: PLOT SKELETON ──────────────────────────────────────────────
    layer_1_plot_skeleton:
      variant_label: "first_love_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            {protagonist} and {love_interest} occupy the same space without
            registering each other. A small collision — literal or social.
            Nothing memorable. The reader notes it; {protagonist} doesn't.
          camera_hint: incidental_encounter_wide
          mood_hint: ordinary
          is_carrier: false

        - beat: 2
          text: >
            First noticing. Not attraction — recognition. Something specific
            about {love_interest} that doesn't fit any category {protagonist}
            has. The noticing surfaces as a question: "What kind of person
            does that?"
          camera_hint: observational_medium
          mood_hint: curiosity_awakened
          is_carrier: true

        - beat: 3
          text: >
            Growing proximity — imposed by circumstance. The heart begins
            its quiet catalog: what time they arrive, which seat they choose,
            the difference between their public face and the one they show
            when they think no one is looking.
          camera_hint: observation_montage_close
          mood_hint: tender_attention
          is_carrier: false

        - beat: 4
          text: >
            The internal acknowledgment — {protagonist} names it to themselves.
            Not aloud. Never aloud. The naming is almost unbearable because it
            makes it real, and real things can be lost.
          camera_hint: internal_moment_full_panel
          mood_hint: vulnerable_recognition
          is_carrier: true

        - beat: 5
          text: >
            A moment with {love_interest} that becomes the before/after line.
            Small: a shared laugh, a thing said in passing that landed wrong
            or right. The moment itself is unremarkable. What it does to
            {protagonist}'s chest is not.
          camera_hint: small_shared_moment_close
          mood_hint: tender_ordinary
          is_carrier: true

        - beat: 6
          text: >
            The comparison arrives: someone else who also notices {love_interest}.
            {protagonist} registers something sharp. Not jealousy — or maybe
            it is, but dressed in the language of concern. Either way, the
            self-surveillance begins.
          camera_hint: three_figure_triangle
          mood_hint: comparison_activates
          is_carrier: true

        - beat: 7
          text: >
            The approach: {protagonist} tries to close the distance between
            the observed and the connected. Clumsy, real, imperfect. The
            attempt fails or half-succeeds. The important thing is: they tried.
          camera_hint: approach_attempt_medium
          mood_hint: vulnerable_attempt
          is_carrier: true

        - beat: 8
          text: >
            Withdrawal and reconsideration. {protagonist} retreats and
            interrogates themselves — what do they actually want from this?
            The question is not strategic. It is genuine.
          camera_hint: alone_window_composition
          mood_hint: honest_self_examination
          is_carrier: true

        - beat: 9
          text: >
            The confession — or its equivalent. Not necessarily the
            three words. Could be a small act of honesty. What matters:
            the self is offered. The offer is made without guarantee.
          camera_hint: two_figure_facing_close
          mood_hint: offered_vulnerability
          is_carrier: true

        - beat: 10
          text: >
            The aftermath. Received or not — this is not the point. What
            {protagonist} discovers in the aftermath is that the act of
            offering changed something. They are slightly larger than they
            were. That is the payoff.
          camera_hint: aftermath_single_figure
          mood_hint: quiet_expansion
          is_carrier: true

    layer_1_variants:
      - variant_label: "first_love_standard"
        description: "10-beat arc — confession made and aftermath lived"
      - variant_label: "uncompleted_confession"
        description: "Protagonist prepares the confession but it is never delivered — the arc is about approaching the edge"
      - variant_label: "mutual_noticing"
        description: "Both parties are noticing — the dramatic irony of two people circling; POV alternates"

    # ── LAYER 2: EMOTIONAL SKELETON ─────────────────────────────────────────
    layer_2_emotional_skeleton:
      variant_label: "shame_exposure_arc"
      ei_engine_hottest: shame
      chapter_emotional_map:
        chapter_1:
          emotional_job: "The noticing feels like being caught doing something wrong — the shame of wanting is the entry point"
          ei_dimension: shame
          intensity: 2
        chapter_3:
          emotional_job: "Tender attention becomes overwhelming surveillance of self — comparison with who else sees them"
          ei_dimension: comparison
          intensity: 3
        chapter_6:
          emotional_job: "The self-examination is a spiral — 'Am I enough? What is enough? Who decided what enough is?'"
          ei_dimension: spiral
          intensity: 4
        chapter_climax:
          emotional_job: "The confession is the act of offering despite shame — offering is the cure for shame-as-hiding"
          ei_dimension: shame
          intensity: 5
      progression_note: >
        Shame (quiet) → Comparison → Spiral → Shame (confronted by action).
        Shōjo shame arcs resolve through the act of being seen, not through
        external validation. The confession's value is independent of the response.

    layer_2_variants:
      - variant_label: "shame_exposure_arc"
        description: "Shame as the primary EI engine — wanting is the wound; being seen is the cure"
      - variant_label: "comparison_distance"
        description: "The protagonist measures themselves against imagined competitors — comparison is the primary obstacle"
      - variant_label: "false_alarm_love"
        description: "Protagonist mistakes their feeling for something safer (friendship, admiration) — false alarm engine dominant"

    # ── LAYER 3: DIALOGUE SKELETON ──────────────────────────────────────────
    layer_3_dialogue_skeleton:
      variant_label: "internal_primary"
      avg_words_per_bubble: 15-25
      thought_bubble_to_speech_ratio: "3:1"  # Shōjo-specific ratio
      speech_atom_sequence:
        - moment: "first_noticing_internal"
          atom_archetype: internal_catalog
          sample: >
            "Why did I notice that? It was such a small thing. He just...
            pushed his glasses up and turned the page. That's nothing.
            Why can't I stop thinking about nothing?"
          emotion: bewildered_attraction
          intensity: 2
          delivery: thought_bubble_flowing_oval

        - moment: "ordinary_exchange_spoken"
          atom_archetype: deflection_through_ordinary
          sample: "Oh — sorry, I didn't see you there."
          emotion: careful_casualness
          intensity: 1
          delivery: small_speech_bubble_standard

        - moment: "comparison_arrives"
          atom_archetype: internal_comparison
          sample: >
            "She talks to him like she's not afraid of him. Why am I
            afraid? What am I even afraid of? It's not him. It's me.
            I'm afraid of myself."
          emotion: comparison_turned_inward
          intensity: 3
          delivery: thought_bubble_dense_italic

        - moment: "self_examination"
          atom_archetype: honest_internal_questioning
          sample: >
            "What do I actually want? Not — what do I think I should want.
            Not what would be appropriate. What do I actually want?"
          emotion: genuine_self_inquiry
          intensity: 4
          delivery: large_thought_bubble_panel_filling

        - moment: "approach_attempt_spoken"
          atom_archetype: vulnerable_ordinary
          sample: "I wanted to ask — you don't have to — I just wanted to know if you'd want to..."
          emotion: halting_vulnerability
          intensity: 4
          delivery: speech_bubble_broken_irregular

        - moment: "confession_core"
          atom_archetype: bare_offering
          sample: >
            "I know this might make things strange. I know that's a risk.
            But I think — I think being honest with you matters more to me
            than being safe."
          emotion: offered_vulnerability_steady
          intensity: 5
          delivery: clean_standard_quiet_bubble

        - moment: "aftermath_internal"
          atom_archetype: quiet_discovery
          sample: >
            "I said it. I actually said it. And whatever happens next —
            I'm still here. I didn't disappear."
          emotion: surprised_continuity
          intensity: 3
          delivery: caption_box_or_large_thought

      escalation_pattern: >
        Thought bubbles carry the escalation — internal volume grows across the arc
        while spoken dialogue stays minimal and careful. The confession breaks
        the pattern by being spoken, not thought.
      key_signature_line: >
        "Being honest with you matters more to me than being safe."
        — delivered at the confession moment; the only time the internal voice
        becomes a spoken voice.

    layer_3_variants:
      - variant_label: "internal_primary"
        description: "3:1 thought-to-speech ratio; internal monologue carries almost all emotional weight"
      - variant_label: "dialogue_parallel"
        description: "Equal thought and speech — internal monologue counterpoints spoken exchange, sometimes contradicting it"
      - variant_label: "spoken_sparse"
        description: "Minimal internal monologue — the unspoken is shown through expression and action, not text"

    # ── LAYER 4: VISUAL SKELETON ─────────────────────────────────────────────
    layer_4_visual_skeleton:
      variant_label: "floating_close_backgrounds"
      avg_panels_per_page: 4
      # Shōjo: fewer panels, more weight per panel; emotional backgrounds
      thought_bubble_panels:
        - position: ch4_p2
          density: panel_filling
          note: "Internal acknowledgment — thought bubble expands to fill most of the panel"
        - position: ch8_p3
          density: sequence_three
          note: "Self-examination — three consecutive thought bubble panels, no speech"
      action_silent_pages:
        - position: ch1_p3
          bubble_density: none
          note: "The incidental encounter — two figures passing; pure visual, no text"
        - position: ch5_p2
          bubble_density: none
          note: "The before/after moment — shared laugh; no dialogue needed"
        - position: ch9_p4
          bubble_density: none
          note: "Post-confession beat — the space after the words"
      splash_pages:
        # Shōjo splash pages: emotional revelation, never action
        - position: ch4_p3
          trigger: "Internal acknowledgment of feeling — the naming"
          style: starry_background_figure_floating_petals
          note: "Stars/flowers behind protagonist — joy and terror rendered simultaneously"
        - position: ch9_p2
          trigger: "The confession moment — the offering"
          style: close_two_figure_soft_line
          note: "Faces close; background dissolves to white or pattern; no dramatic geometry"
        - position: ch10_p4
          trigger: "The aftermath discovery — I didn't disappear"
          style: single_figure_light_expanding
      bubble_density_curve:
        ch1: sparse             # Incidental encounter — almost nothing said
        ch2: medium_thought     # Growing noticing — mostly internal
        ch3: medium_thought     # Tender attention — catalog of observations
        ch4: very_dense_thought # Internal acknowledgment — thought bubbles peak
        ch5: sparse             # Shared moment — let it breathe
        ch6: medium_thought     # Comparison arrives internally
        ch7: dense_mixed        # Approach attempt — internal and spoken mixed
        ch8: very_dense_thought # Self-examination — peak thought bubble density
        ch9: sparse_spoken      # Confession — sparse, spoken, weight per word
        ch10: medium_caption    # Aftermath — mostly caption boxes, quiet
      recommended_bubble_styles:
        observation_phase: small_oval_drifting
        growing_feeling: medium_thought_soft
        peak_internal: large_irregular_cloud
        ordinary_speech: small_round_standard
        approach_attempt: broken_speech_irregular
        confession: clean_quiet_rectangle_or_oval
        aftermath: caption_box_soft

    layer_4_variants:
      - variant_label: "floating_close_backgrounds"
        description: "Emotional backgrounds (stars, petals, dissolved space) at peak moments; close compositions throughout"
      - variant_label: "documentary_grounded"
        description: "No decorative backgrounds — realist visual style; emotions conveyed through expression and body language only"
      - variant_label: "season_arc"
        description: "Visual language tracks the season — cherry blossoms for first noticing, summer heat for the approach, autumn for aftermath"

    # ── LAYER 5: PACING SKELETON ─────────────────────────────────────────────
    layer_5_pacing_skeleton:
      variant_label: "heartbeat_pacing"
      end_of_chapter_hooks:
        ch1: unregistered_seed    # Encounter happens; protagonist doesn't register it; reader does
        ch2: noticing_cliffhanger # "What kind of person does that?" — question left open
        ch3: catalog_weight       # End on a specific detail — their handwriting, the way they turn pages
        ch4: naming_hook          # Internal acknowledgment made; chapter ends before any action follows
        ch5: before_after_line    # The small moment; chapter ends with protagonist's chest tight
        ch6: comparison_sting     # The sharp feeling; chapter ends before protagonist examines it
        ch7: attempt_cut          # Approach attempted; result unclear; chapter ends mid-moment
        ch8: question_answered    # Self-examination resolves to: "I'm going to say it"
        ch9: confession_white     # Page goes white/minimal after confession; reader in suspension
        ch10: continuity_landing  # Protagonist is still here; slightly larger; the arc closes quietly

      page_turn_reveals:
        - chapter: 2
          hidden_until_turn: "Protagonist watching incidentally — turn reveals the subject of observation looking back"
        - chapter: 6
          hidden_until_turn: "Comparison figure arrives — turn reveals who it is and what they represent"
        - chapter: 9
          hidden_until_turn: "Words building — turn reveals: already said. The confession happened; we're in the aftermath."

      silence_to_dialogue_ratio:
        # Shōjo: thought counts as non-silence; "silence" means no text at all
        setup_chapters: "30% silence / 40% spoken / 30% internal_monologue"
        rising_chapters: "20% silence / 30% spoken / 50% internal_monologue"
        climax_chapters: "40% silence / 40% spoken / 20% internal_monologue"
        # Note: confession chapter inverts the ratio — spoken rises, internal drops

      climax_pacing_pattern: >
        Confession chapter: slowest pacing in the arc — 2-3 panels per page.
        Each panel holds more white space than previous chapters.
        The reader must slow to match the protagonist's held breath.
        Post-confession aftermath: single-panel pages are permitted —
        the arc earns this visual weight.

    layer_5_variants:
      - variant_label: "heartbeat_pacing"
        description: "Pacing mirrors a heartbeat — regular, with deliberate acceleration at the confession and quiet after"
      - variant_label: "seasons_pacing"
        description: "Arc divided across seasons — each season's length reflects emotional duration"
      - variant_label: "single_day"
        description: "Entire arc compressed to one day — chapters are hours; intensity without temporal distance"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 02: MISUNDERSTANDING ARC
# Archetype: connection_fractured_by_incident_restored_by_truth
# Core loop: genuine connection → incident that creates false picture →
#            distance built on wrong foundation → truth arrives → work to
#            restore what was real
# ═════════════════════════════════════════════════════════════════════════════
  strategy_02:
    name: "Misunderstanding Arc"
    archetype_template: connection_fractured_by_incident_restored_by_truth
    description: >
      The misunderstanding is not a plot device — it is a test of whether
      the connection was built on something real or on a comfortable image.
      If the connection survives the truth arriving late, it was real.
      If it doesn't, the reader was watching the wrong thing the whole time.

    layer_1_plot_skeleton:
      variant_label: "misunderstanding_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            Genuine connection established — not rushed. Small accumulation:
            a joke that landed, a thing shared, a pattern of being in the
            same place that has started to feel deliberate even when it isn't.
          camera_hint: comfortable_proximity_medium
          mood_hint: warm_ordinary
          is_carrier: true

        - beat: 2
          text: >
            The incident. {protagonist} witnesses or receives incomplete
            information. What they see/hear is technically true but missing
            critical context. The mistake is understandable. That makes it worse.
          camera_hint: partial_view_framing
          mood_hint: wrongness_registered
          is_carrier: true

        - beat: 3
          text: >
            Immediate internal response: the story {protagonist} tells
            themselves about what they saw. The story is wrong. The reader
            may or may not know this yet. Either way: the wrong story
            is now load-bearing.
          camera_hint: internal_reconstruction
          mood_hint: spiraling_interpretation
          is_carrier: true

        - beat: 4
          text: >
            {protagonist} withdraws. Not dramatically — just slightly. A
            degree of coolness. The distance is enough to be felt by {love_interest}
            who doesn't know why. This not-knowing is its own pain.
          camera_hint: physical_distance_maintained
          mood_hint: cool_polite_pain
          is_carrier: true

        - beat: 5
          text: >
            {love_interest} notices the withdrawal. Does not ask directly.
            Tries to reach across the distance through small acts. The acts
            land wrong because {protagonist} is reading everything through
            the wrong story.
          camera_hint: reaching_across_distance
          mood_hint: miscommunication_in_motion
          is_carrier: true

        - beat: 6
          text: >
            The distance solidifies. Both characters are now behaving in ways
            that confirm the other's worst fear. The connection that was real
            is being dismantled by the absence of the truth.
          camera_hint: mirrored_withdrawal_two_panels
          mood_hint: mutual_wrong_story
          is_carrier: true

        - beat: 7
          text: >
            A third party — or a reencounter with the original incident
            context — introduces the missing piece. {protagonist} now has
            the information they needed. The wrongness of the story is visible.
          camera_hint: context_arrives_external
          mood_hint: correction_available
          is_carrier: true

        - beat: 8
          text: >
            Processing: {protagonist} must sit with the fact that they
            caused real harm based on a wrong story. The apology is
            not the hard part. The hard part is looking at their own
            pattern of story-building.
          camera_hint: alone_accounting
          mood_hint: self_examination_with_cost
          is_carrier: true

        - beat: 9
          text: >
            The truth is offered to {love_interest}. Not efficiently — halting,
            inadequate, real. The damage of the distance has to be
            acknowledged before what was real can be reached for.
          camera_hint: approach_with_accountability
          mood_hint: offered_repair
          is_carrier: true

        - beat: 10
          text: >
            The connection is restored — not repaired to what it was,
            because what it was could be fractured by a misunderstanding.
            What it becomes is sturdier: tested and known.
          camera_hint: two_figures_closer_than_before
          mood_hint: earned_closeness
          is_carrier: true

    layer_1_variants:
      - variant_label: "misunderstanding_standard"
        description: "Standard 10-beat arc — truth arrives from external context"
      - variant_label: "delayed_truth"
        description: "Truth arrives much later; significant relationship damage is done; repair is harder and less complete"
      - variant_label: "mutual_misunderstanding"
        description: "Both characters hold partial wrong stories about each other; revelation is simultaneous"

    layer_2_emotional_skeleton:
      variant_label: "spiral_to_correction"
      ei_engine_hottest: spiral
      chapter_emotional_map:
        chapter_1:
          emotional_job: "The ease of genuine connection — warmth without self-surveillance (the contrast that makes the spiral later matter)"
          ei_dimension: overwhelm  # positive overwhelm — the surprise of genuine connection
          intensity: 2
        chapter_3:
          emotional_job: "The spiral begins — protagonist interprets and reinterprets the incident; each cycle adds certainty to the wrong story"
          ei_dimension: spiral
          intensity: 4
        chapter_6:
          emotional_job: "Both characters living inside their respective wrong stories — comparison of what was vs. what is"
          ei_dimension: comparison
          intensity: 3
        chapter_climax:
          emotional_job: "The correction requires protagonist to see their own spiral mechanism — not just the content of the wrong story but the process"
          ei_dimension: spiral
          intensity: 5
      progression_note: >
        Warm ease → Spiral (activated by incident) → Comparison (what is vs. was) →
        Spiral (seen and named). The climax is the protagonist seeing
        their own spiral, not just the outcome of it.

    layer_2_variants:
      - variant_label: "spiral_to_correction"
        description: "Spiral engine throughout — the misunderstanding is a spiral event, not a static error"
      - variant_label: "shame_mechanism"
        description: "The protagonist's wrong story contains a shameful interpretation — shame about themselves drives the distance"
      - variant_label: "comparison_sabotage"
        description: "The protagonist compares themselves to whoever they misidentified as competition — comparison engine dominant"

    layer_3_dialogue_skeleton:
      variant_label: "internal_spiral_external_silence"
      avg_words_per_bubble: 15-25
      thought_bubble_to_speech_ratio: "4:1"
      speech_atom_sequence:
        - moment: "genuine_connection_spoken"
          atom_archetype: easy_real_exchange
          sample: "You always say that. No one else says that. How does your brain work?"
          emotion: easy_warmth
          intensity: 2
          delivery: soft_round_bubble_relaxed

        - moment: "incident_internal"
          atom_archetype: wrong_story_beginning
          sample: >
            "What — why were they — no. That's not. That's probably not
            what it looked like. Except it did look like that. It looked
            exactly like that."
          emotion: spiral_entry
          intensity: 3
          delivery: fragmented_thought_bubbles_three

        - moment: "withdrawal_surface"
          atom_archetype: careful_neutral
          sample: "Oh. Right. Sure."
          emotion: deliberate_flatness
          intensity: 2
          delivery: small_clipped_bubble

        - moment: "love_interest_reaching"
          atom_archetype: gentle_probe
          sample: "Did I — did something happen? You seem different."
          emotion: careful_concern
          intensity: 3
          delivery: soft_question_bubble

        - moment: "protagonist_deflection"
          atom_archetype: false_assurance
          sample: "I'm fine. Nothing happened. I'm just tired."
          emotion: closed_door
          intensity: 2
          delivery: flat_short

        - moment: "truth_arrives_internal"
          atom_archetype: wrong_story_exposed
          sample: >
            "The whole time. I was doing the whole thing the whole time.
            Building a case. Adding evidence. I had already decided and
            I was just finding proof."
          emotion: self_recognition_painful
          intensity: 5
          delivery: dense_thought_cascade

        - moment: "repair_attempt"
          atom_archetype: accountability_without_performance
          sample: >
            "I owe you an explanation. Not an excuse — an explanation.
            And I understand if that's not enough."
          emotion: steady_accountable
          intensity: 4
          delivery: clean_speech_bubble_careful

      escalation_pattern: >
        Internal spiral builds through ch2-6 while spoken dialogue decreases.
        The inversion: least spoken when most internally active.
        The repair attempt (ch9) breaks the pattern — spoken dialogue
        surges; internal thought drops to near-zero.
      key_signature_line: >
        "I had already decided and I was just finding proof."
        — the protagonist's internal recognition; the most important line
        in the arc, never said aloud.

    layer_3_variants:
      - variant_label: "internal_spiral_external_silence"
        description: "Spoken dialogue decreases as internal spiral increases — inverse correlation is the structure"
      - variant_label: "overexplanation_pattern"
        description: "Protagonist explains too much in spoken dialogue — the over-talking IS the evasion"
      - variant_label: "confrontation_direct"
        description: "Love interest directly addresses the withdrawal — forced spoken confrontation before natural resolution"

    layer_4_visual_skeleton:
      variant_label: "proximity_withdrawal_visual"
      avg_panels_per_page: 4
      thought_bubble_panels:
        - position: ch3_p2
          density: page_dominating
          note: "Wrong story construction — thought bubbles expand and multiply, crowding the visual space"
        - position: ch8_p2
          density: single_heavy
          note: "Self-recognition moment — one large thought bubble, no decorative elements"
      action_silent_pages:
        - position: ch1_p4
          bubble_density: none
          note: "Comfortable proximity — two figures, ordinary setting, no words needed"
        - position: ch4_p3
          bubble_density: none
          note: "The withdrawal — same visual composition as ch1_p4 but with added physical distance"
        - position: ch10_p4
          bubble_density: none
          note: "Restored closeness — same composition again, distance closed"
      splash_pages:
        - position: ch1_p5
          trigger: "The ease of genuine connection — before the incident"
          style: warm_comfortable_proximity
        - position: ch8_p4
          trigger: "Self-recognition — the spiral seen from outside"
          style: protagonist_alone_cold_light
        - position: ch10_p5
          trigger: "Earned closeness — not the same as before; better"
          style: two_figure_new_warmth
      bubble_density_curve:
        ch1: medium_mixed        # Easy connection — spoken and light internal
        ch2: sparse_incident     # Incident — almost no text; visual weight
        ch3: very_dense_thought  # Wrong story construction — internal overflow
        ch4: sparse_external     # Withdrawal — minimal spoken, cool
        ch5: sparse              # Love interest reaching — quiet attempts
        ch6: medium_thought      # Distance solidifying internally
        ch7: sparse              # Context arriving — external event, few words
        ch8: very_dense_thought  # Self-recognition — internal peak
        ch9: medium_spoken       # Repair — spoken surges for the first time
        ch10: medium_caption     # Restoration — quiet warmth
      recommended_bubble_styles:
        genuine_connection: round_relaxed_warm
        incident_processing: fragmented_angular_crowded
        withdrawal_speech: small_flat_clipped
        love_interest_speech: soft_questioning_round
        spiral_internal: irregular_cloud_dense
        self_recognition: single_heavy_oval
        repair_spoken: clean_steady_rectangle

    layer_4_variants:
      - variant_label: "proximity_withdrawal_visual"
        description: "Recurring visual motif: same composition with varying distance between figures"
      - variant_label: "thought_architecture"
        description: "Thought bubbles rendered architecturally — spirals, loops, mazes"
      - variant_label: "color_shift"
        description: "Warm tones in ch1, cooler tones ch3-6, gradual warmth returning ch9-10 (effective if colorized)"

    layer_5_pacing_skeleton:
      variant_label: "spiral_then_release"
      end_of_chapter_hooks:
        ch1: warmth_established     # Genuine connection felt; reader invested
        ch2: incident_planted       # The incomplete information seen; chapter ends without interpretation
        ch3: wrong_story_solidified # The spiral complete; protagonist certain of wrong thing
        ch4: distance_registered    # Love interest feels the withdrawal; reader knows why
        ch5: reaching_failing       # Love interest's attempt lands wrong; both characters in pain
        ch6: solidified_distance    # The furthest apart; no clear path back visible
        ch7: context_fragment       # Missing piece arrives — not fully explained yet; chapter ends
        ch8: self_recognition_hook  # The spiral seen; heaviest chapter ends quietly
        ch9: repair_offered         # Truth and accountability offered; response pending; cut
        ch10: restoration_quiet     # Not triumph — warmth returned, tested, real

      page_turn_reveals:
        - chapter: 2
          hidden_until_turn: "The incident — protagonist's view. Turn reveals: what actually happened (or: more context, not less)"
        - chapter: 5
          hidden_until_turn: "Love interest's reaching gesture — turn reveals protagonist's cold response"
        - chapter: 9
          hidden_until_turn: "Repair speech building — turn reveals love interest's face during the listening"

      silence_to_dialogue_ratio:
        setup_chapters: "25% silence / 35% spoken / 40% internal"
        rising_chapters: "20% silence / 20% spoken / 60% internal"
        climax_chapters: "35% silence / 45% spoken / 20% internal"

      climax_pacing_pattern: >
        The repair chapter is the only chapter where spoken dialogue
        dominates over internal monologue — this is the structural
        marker that the spiral has broken. Visual pacing: 3-4 panels/page.
        Final chapter: 2-3 panels/page — the warmth requires space.

    layer_5_variants:
      - variant_label: "spiral_then_release"
        description: "Pacing mirrors the spiral — chapters accelerate internally then the repair breaks the rhythm"
      - variant_label: "slow_distance"
        description: "Distance chapters given maximum space — the withdrawal is long and costly"
      - variant_label: "rapid_correction"
        description: "Truth arrives early and efficiently — the arc is about repair, not distance"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 03: RIVALS-IN-LOVE ARC
# Archetype: competition_proximity_jealousy_resolution
# Core loop: opposition in shared pursuit → forced proximity reveals person
#            behind competitor → jealousy surfaces the feeling that was hidden →
#            competition loses its point; connection becomes the goal
# ═════════════════════════════════════════════════════════════════════════════
  strategy_03:
    name: "Rivals-in-Love Arc"
    archetype_template: competition_proximity_jealousy_resolution
    description: >
      The rival is the person who forces the protagonist to be fully present
      because you cannot be careless around someone who is watching you that
      closely. The jealousy — when it arrives — is not about the competition.
      It is about the discovery that the competitor has become necessary.

    layer_1_plot_skeleton:
      variant_label: "rivals_love_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            {protagonist} and {rival} are established competitors in a shared
            domain. The competition is genuine — not a pretext. Both are
            serious. Both are excellent. The domain itself matters.
          camera_hint: parallel_pursuit_split_panel
          mood_hint: genuine_rivalry
          is_carrier: true

        - beat: 2
          text: >
            Forced proximity — project, circumstance, assignment. They must
            cooperate in the domain they compete in. Neither knows how to do
            this with someone they've measured themselves against.
          camera_hint: reluctant_proximity
          mood_hint: friction_plus_competence
          is_carrier: true

        - beat: 3
          text: >
            {protagonist} observes {rival} in an unguarded moment — not
            performing excellence, just existing. The observation is
            unexpected and unwelcome. It's harder to reduce someone to
            a competitor once you've seen them as a person.
          camera_hint: unguarded_rival_observation
          mood_hint: humanization_uncomfortable
          is_carrier: true

        - beat: 4
          text: >
            The rivalry sharpens — precisely because the person has been
            seen. The intensity is now double-loaded: competition and
            something else that doesn't have a name yet.
          camera_hint: charged_competition_scene
          mood_hint: doubled_intensity
          is_carrier: true

        - beat: 5
          text: >
            {rival} achieves something undeniably impressive. {protagonist}'s
            response is not the expected: not defeat, not professional envy.
            Something warm and immediate that catches them off guard.
          camera_hint: rival_triumph_protagonist_reaction
          mood_hint: surprising_warmth
          is_carrier: true

        - beat: 6
          text: >
            Jealousy — the classic shōjo trigger. Someone else moves close
            to {rival}. {protagonist} registers it as wrong in the body
            before the mind names it. The body is faster.
          camera_hint: triangle_jealousy_composition
          mood_hint: jealousy_as_recognition
          is_carrier: true

        - beat: 7
          text: >
            {protagonist} names it to themselves — what the jealousy
            means. The competition is not over. But the reason for
            competing has shifted: they want to be the person {rival} is
            serious about.
          camera_hint: alone_recognition_close
          mood_hint: reframing_the_goal
          is_carrier: true

        - beat: 8
          text: >
            The competition context produces a moment where one of them
            could win by undermining the other. Neither does. This is the
            evidence that the relationship has already changed.
          camera_hint: choice_moment_parallel
          mood_hint: integrity_over_victory
          is_carrier: true

        - beat: 9
          text: >
            The acknowledgment — not a confession, exactly. A recognition:
            "You're not my opponent anymore." What replaces competition
            is not clearly named. But the naming is not the point.
            The shift is the point.
          camera_hint: face_to_face_shift
          mood_hint: redefined_relationship
          is_carrier: true

        - beat: 10
          text: >
            The domain remains. The pursuit continues. But they pursue it
            together now, or in parallel without opposition. The competition
            that shaped them becomes the origin story of something else.
          camera_hint: side_by_side_forward
          mood_hint: competition_as_foundation
          is_carrier: true

    layer_1_variants:
      - variant_label: "rivals_love_standard"
        description: "Standard 10-beat rivals-in-love arc"
      - variant_label: "competition_continues"
        description: "The competition doesn't end — the arc is about maintaining rivalry while managing the feeling"
      - variant_label: "one_sided_rivalry"
        description: "Only protagonist was treating it as rivalry; the other was never competing — revelation recontextualizes everything"

    layer_2_emotional_skeleton:
      variant_label: "comparison_to_wanting"
      ei_engine_hottest: comparison
      chapter_emotional_map:
        chapter_1:
          emotional_job: "Comparison as clean professional fuel — no emotional complexity yet, just measurement"
          ei_dimension: comparison
          intensity: 2
        chapter_3:
          emotional_job: "Humanization of the rival makes comparison uncomfortable — you can't purely compete with a person"
          ei_dimension: comparison
          intensity: 3
        chapter_6:
          emotional_job: "Jealousy reveals the comparison has shifted register — no longer professional but deeply personal"
          ei_dimension: comparison
          intensity: 5
        chapter_climax:
          emotional_job: "The goal changes — being compared favorably is replaced by being wanted; comparison resolves into connection"
          ei_dimension: comparison
          intensity: 3  # diminished, integrated
      progression_note: >
        Comparison (clean professional) → Comparison (humanized uncomfortable) →
        Comparison (jealousy register — peak) → Comparison (resolved into wanting).
        The arc doesn't eliminate comparison — it transforms what is being compared.

    layer_2_variants:
      - variant_label: "comparison_to_wanting"
        description: "Comparison engine throughout — transforms from measurement to desire"
      - variant_label: "shame_in_wanting"
        description: "The protagonist is ashamed of wanting the rival — shame activates when competition shifts to feeling"
      - variant_label: "false_alarm_professionalism"
        description: "Protagonist mistakes jealousy for professional threat response — false alarm engine"

    layer_3_dialogue_skeleton:
      variant_label: "competition_dialogue_shifts"
      avg_words_per_bubble: 12-22
      thought_bubble_to_speech_ratio: "2:1"
      speech_atom_sequence:
        - moment: "rivalry_established"
          atom_archetype: measured_professional
          sample: "Your entry was strong. Not as strong as mine. But strong."
          emotion: competitor_acknowledgment
          intensity: 2
          delivery: clean_clipped_professional

        - moment: "cooperation_friction"
          atom_archetype: reluctant_coordination
          sample: "I'm not arguing with your method. I'm saying there's a better method."
          emotion: competitive_even_in_cooperation
          intensity: 3
          delivery: sharp_professional

        - moment: "unguarded_observation_internal"
          atom_archetype: unwelcome_humanization
          sample: >
            "Why is she laughing like that? She never laughs like that when
            she knows people are watching. Why am I noticing the difference?"
          emotion: observation_becoming_feeling
          intensity: 3
          delivery: thought_bubble_medium

        - moment: "surprising_warmth_internal"
          atom_archetype: warm_recognition
          sample: >
            "Oh. That was — she really is brilliant. I'm not even annoyed
            about it. I just think it's true and I want her to know
            I think it's true."
          emotion: admiration_without_competition
          intensity: 4
          delivery: large_thought_bubble_surprised

        - moment: "jealousy_spoken_accidentally"
          atom_archetype: unguarded_jealousy
          sample: "You seemed to be enjoying yourself. With Kenji."
          emotion: barely_controlled_jealousy
          intensity: 4
          delivery: clipped_too_casual

        - moment: "jealousy_self_recognition"
          atom_archetype: internal_naming
          sample: >
            "I sound jealous. I am jealous. When did I become someone
            who is jealous about this? When did she stop being a competitor
            and start being someone I — no. No, no, no."
          emotion: denial_then_recognition
          intensity: 5
          delivery: thought_cascade_fragmenting

        - moment: "redefinition_spoken"
          atom_archetype: shift_acknowledged
          sample: "I don't think I want to beat you anymore. I want to — I don't know what I want. But not that."
          emotion: honest_uncertain_redefinition
          intensity: 4
          delivery: halting_vulnerable_speech

      escalation_pattern: >
        Professional competition dialogue opens the arc — clean, clipped, controlled.
        As the arc progresses, thought bubbles increase while professional speech
        decreases. Jealousy breaks both patterns: unguarded speech AND
        cascading thought simultaneously.
      key_signature_line: >
        "I don't think I want to beat you anymore."
        — the line that names the shift; spoken out loud; cannot be taken back.

    layer_3_variants:
      - variant_label: "competition_dialogue_shifts"
        description: "Dialogue language shifts from professional to personal — the register change is the arc"
      - variant_label: "argument_as_intimacy"
        description: "The rivals argue passionately throughout — the argument IS the connection; volume and content both matter"
      - variant_label: "silence_accelerates"
        description: "Dialogue decreases as feeling increases — the more they feel, the less they speak"

    layer_4_visual_skeleton:
      variant_label: "parallel_to_converging"
      avg_panels_per_page: 4
      thought_bubble_panels:
        - position: ch3_p3
          density: medium_observation
          note: "Unguarded observation — thought bubble appears above protagonist watching rival"
        - position: ch7_p2
          density: cascade
          note: "Jealousy self-recognition — thought bubbles stack and fragment"
      action_silent_pages:
        - position: ch1_p2
          bubble_density: none
          note: "Parallel pursuit — two figures working in the same domain; split composition"
        - position: ch8_p3
          bubble_density: none
          note: "The choice moment — neither undermines the other; no words, just the choice"
      splash_pages:
        - position: ch5_p4
          trigger: "Rival's impressive achievement — protagonist's unexpected warmth"
          style: rival_in_moment_protagonist_watching_softly
        - position: ch6_p3
          trigger: "Jealousy trigger — the third figure arrives"
          style: triangle_jealousy_composition_stark
        - position: ch9_p3
          trigger: "The redefinition moment — shift acknowledged"
          style: face_to_face_new_register
      bubble_density_curve:
        ch1: medium_spoken       # Professional competition dialogue
        ch2: medium_spoken       # Cooperation friction — still professional
        ch3: medium_thought      # Humanization — internal observation
        ch4: medium_mixed        # Doubled intensity — competition + unnamed feeling
        ch5: sparse_surprised    # Surprising warmth — almost no text
        ch6: dense_mixed         # Jealousy — internal and accidental spoken
        ch7: very_dense_thought  # Self-recognition cascade
        ch8: none_to_sparse      # Choice moment — action over words
        ch9: medium_spoken       # Redefinition — spoken returns with new register
        ch10: medium_mixed       # Side by side — professional warmth mixed
      recommended_bubble_styles:
        professional_phase: clean_rectangular_clipped
        humanization: soft_observational_thought
        doubled_intensity: mix_of_sharp_and_soft
        jealousy_speech: casual_too_controlled
        jealousy_internal: fragmented_cascade
        redefinition: halting_soft_honest_speech

    layer_4_variants:
      - variant_label: "parallel_to_converging"
        description: "Visual compositions begin in parallel/split panels; gradually converge toward shared frame"
      - variant_label: "domain_visual_language"
        description: "The competitive domain (art, music, sport) heavily featured — it's the language they share before connection"
      - variant_label: "jealousy_chapter_dense"
        description: "The jealousy chapter is visually the densest in the arc — multiple figures, overlapping spaces"

    layer_5_pacing_skeleton:
      variant_label: "competition_cadence"
      end_of_chapter_hooks:
        ch1: competition_stakes    # Domain established; reader understands what's at stake professionally
        ch2: friction_productive   # Cooperation produces something better than either alone; uncomfortable truth
        ch3: humanization_note     # The unguarded moment; chapter ends before protagonist names what it means
        ch4: charged_tension       # Competition intensified; unnamed feeling underneath
        ch5: warmth_surprising     # Warm reaction to rival's success; no explanation given
        ch6: jealousy_planted      # The third figure; protagonist's reaction; cut before examination
        ch7: naming_hook           # Jealousy named; the competition goal reframed
        ch8: integrity_shown       # The choice not to undermine; evidence of change without announcement
        ch9: redefinition_hanging  # The shift acknowledged; no neat resolution yet
        ch10: forward_together     # Side by side; the competition as origin story visible

      page_turn_reveals:
        - chapter: 3
          hidden_until_turn: "Protagonist observing carefully — turn reveals: rival is unguarded, looking at something beautiful"
        - chapter: 5
          hidden_until_turn: "Rival achieves something — turn reveals protagonist's expression: warmth, not envy"
        - chapter: 8
          hidden_until_turn: "Opportunity to undermine — turn reveals: the choice to not"

      silence_to_dialogue_ratio:
        setup_chapters: "25% silence / 55% spoken / 20% internal"
        rising_chapters: "30% silence / 30% spoken / 40% internal"
        climax_chapters: "35% silence / 40% spoken / 25% internal"

      climax_pacing_pattern: >
        The jealousy chapter (ch6) is the pacing peak — most panels per page (5-6),
        most visual density. After this: deliberate deceleration.
        Ch7 self-recognition: 3-4 panels/page.
        Ch9-10: 3 panels/page maximum. The arc slows into its resolution.

    layer_5_variants:
      - variant_label: "competition_cadence"
        description: "Pacing mirrors competition rhythm — regular, structured, with single acceleration at jealousy"
      - variant_label: "escalating_density"
        description: "Pacing accelerates throughout — the rivals' proximity produces increasing intensity"
      - variant_label: "competition_chapters_fast"
        description: "Domain competition chapters use rapid pacing; character chapters slow; the contrast marks the shift"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 04: GROWING UP ARC
# Archetype: childhood_friendship_changed_by_time_reconnected_as_adults
# Core loop: childhood closeness → change/separation → loss of the original
#            connection → attempt to reconnect with new people they've become →
#            mature relationship formed from the rubble of the old one
# ═════════════════════════════════════════════════════════════════════════════
  strategy_04:
    name: "Growing Up Arc"
    archetype_template: childhood_friendship_changed_by_time_reconnected_as_adults
    description: >
      The loss is not of the person but of the version of the relationship
      that existed when both people were small. Reconnection requires grieving
      that version fully before the adult relationship can exist. The adult
      relationship cannot be built on nostalgia — nostalgia is a shape that
      no longer fits.

    layer_1_plot_skeleton:
      variant_label: "growing_up_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            Childhood friendship established through flashback — specific
            texture: a particular game, a particular place, the easy language
            of kids who have decided to trust each other completely.
          camera_hint: flashback_childhood_warm
          mood_hint: unconditional_ease
          is_carrier: true

        - beat: 2
          text: >
            Present: reencounter. Time has passed. The familiar face is
            different. The ease is gone. Both people hold the memory of
            the old version of this relationship and neither knows how to
            access it in the present.
          camera_hint: reencounter_present_tense
          mood_hint: familiar_strange
          is_carrier: true

        - beat: 3
          text: >
            The gap between memory and present is uncomfortable. Every
            attempt to access the old language fails — context is missing,
            references are lost, the shared world of childhood is inaccessible.
          camera_hint: awkward_proximity_adult
          mood_hint: failed_reunion_nostalgia
          is_carrier: true

        - beat: 4
          text: >
            {protagonist} grieves the lost version — not dramatically, but
            persistently. What was simple is now complicated. What was
            automatic is now effortful.
          camera_hint: alone_with_memory
          mood_hint: grief_for_the_past
          is_carrier: true

        - beat: 5
          text: >
            A glimpse of the current person — not the memory. Something
            {love_interest} does or says that could not have been the
            childhood version. It is unfamiliar. {protagonist} is drawn
            to the unfamiliarity.
          camera_hint: unexpected_adult_quality
          mood_hint: new_attraction
          is_carrier: true

        - beat: 6
          text: >
            The adult relationship begins to form — distinct from the
            childhood one. It is harder. It requires things the childhood
            friendship didn't. It is also more.
          camera_hint: adult_connection_forming
          mood_hint: complex_new_warmth
          is_carrier: true

        - beat: 7
          text: >
            The nostalgia reasserts — something triggers the memory of what
            was simpler. {protagonist} tries to fit the adult relationship
            into the childhood template. It doesn't fit. The dissonance is painful.
          camera_hint: nostalgia_trap_composition
          mood_hint: nostalgia_vs_present
          is_carrier: true

        - beat: 8
          text: >
            {protagonist} names what they're doing — trying to resurrect
            something that is gone. The grief is completed. What was real
            is honored. What is real now is different. Both things are true.
          camera_hint: grief_completion_internal
          mood_hint: completed_grief
          is_carrier: true

        - beat: 9
          text: >
            The adult relationship offered — for the first time without
            nostalgia as the frame. "I don't want to go back. I want to
            know you now. The person you are."
          camera_hint: present_offering_close
          mood_hint: present_tense_wanting
          is_carrier: true

        - beat: 10
          text: >
            New terms established — not the old friendship, not a recreation,
            but something built from what both people have become. The
            childhood connection is the foundation, not the destination.
          camera_hint: new_foundation_forward
          mood_hint: built_not_found
          is_carrier: true

    layer_1_variants:
      - variant_label: "growing_up_standard"
        description: "Standard 10-beat growing up arc — nostalgia grieved, adult relationship formed"
      - variant_label: "one_remembers_more"
        description: "The childhood was more important to one person than the other — asymmetry must be acknowledged"
      - variant_label: "return_to_place"
        description: "The reconnection happens in the physical place of childhood — location is the third character"

    layer_2_emotional_skeleton:
      variant_label: "grief_primary"
      ei_engine_hottest: grief
      chapter_emotional_map:
        chapter_1:
          emotional_job: "Childhood warmth established to maximize the contrast with grief — reader must feel what will be lost"
          ei_dimension: overwhelm  # positive overwhelm of remembered ease
          intensity: 2
        chapter_3:
          emotional_job: "The gap between memory and present activates grief — the person is there, the relationship is gone"
          ei_dimension: grief
          intensity: 4
        chapter_6:
          emotional_job: "New adult connection forming alongside grief — holding both simultaneously; comparison of old and new"
          ei_dimension: comparison
          intensity: 3
        chapter_climax:
          emotional_job: "Grief completed allows present to be received fully — grief resolution is the prerequisite for adult connection"
          ei_dimension: grief
          intensity: 5
      progression_note: >
        Warmth (past) → Grief (loss of the past) → Comparison (old vs new) →
        Grief (completed). Shōjo grief arcs differ from seinen — grief here
        is the gateway, not the destination.

    layer_2_variants:
      - variant_label: "grief_primary"
        description: "Grief as the gateway engine — must be completed before the new relationship can exist"
      - variant_label: "comparison_trap"
        description: "The present person is constantly measured against the memory — comparison is the obstacle, not the engine"
      - variant_label: "shame_of_change"
        description: "One or both have changed in ways they're not proud of — shame interweaves with grief"

    layer_3_dialogue_skeleton:
      variant_label: "past_and_present_voice"
      avg_words_per_bubble: 15-22
      thought_bubble_to_speech_ratio: "3:1"
      speech_atom_sequence:
        - moment: "childhood_dialogue"
          atom_archetype: easy_children_speech
          sample: "You know what I think? I think rules are mostly just habits that got too old to be argued with."
          emotion: childhood_philosophy
          intensity: 2
          delivery: round_soft_flashback_bubble

        - moment: "reencounter_awkward"
          atom_archetype: fallen_back_on_ordinary
          sample: "It's been — yeah. Long time. You look — yeah. Good."
          emotion: failed_reunion_fumble
          intensity: 2
          delivery: clipped_uncertain_adult

        - moment: "grief_internal"
          atom_archetype: loss_named
          sample: >
            "I keep waiting for it to feel easy again. The way it always felt easy.
            But it doesn't feel easy. It feels like talking to a stranger who has
            all my memories."
          emotion: grief_precise
          intensity: 4
          delivery: large_thought_bubble_sad

        - moment: "new_quality_noticed"
          atom_archetype: unfamiliar_recognition
          sample: >
            "She said that thing and it wasn't something she would have said before.
            I didn't know that version of her. I want to."
          emotion: new_curiosity
          intensity: 3
          delivery: surprised_thought_bubble

        - moment: "nostalgia_trap_spoken"
          atom_archetype: reaching_for_past
          sample: '"Remember when we used to — " [cut off] "We''re not those people anymore."'
          emotion: nostalgic_reach_refused
          intensity: 4
          delivery: interrupted_soft_speech

        - moment: "grief_completion_internal"
          atom_archetype: release
          sample: >
            "I think I've been trying to be eleven years old again and it's
            not possible and I think that's okay. We were wonderful then.
            We can be something else now."
          emotion: grief_released_gently
          intensity: 5
          delivery: large_caption_or_thought_quiet

        - moment: "present_offering"
          atom_archetype: present_tense_want
          sample: "I don't want to go back. I want to know you now. The person you are now."
          emotion: direct_present_wanting
          intensity: 4
          delivery: clean_speech_close_quiet

      escalation_pattern: >
        Childhood dialogue (warm, natural) → awkward adult dialogue (clipped,
        formal) → grief internal monologue (heavy, slow) → new curiosity →
        nostalgia trap → grief completion → present offering.
        The arc's spoken dialogue dips at its lowest when grief is highest
        then returns for the present-tense offering.
      key_signature_line: >
        "We were wonderful then. We can be something else now."
        — internal line, never spoken; this is the completion that allows
        the spoken "I want to know you now" to land.

    layer_3_variants:
      - variant_label: "past_and_present_voice"
        description: "Dialogue voice shifts between flashback (warm, easy) and present (effortful, adult)"
      - variant_label: "letters_or_messages"
        description: "Past relationship documented through written exchange — the gap between writing voices tracks the change"
      - variant_label: "shared_vocabulary"
        description: "A word or phrase from childhood recurs — its shifting meaning is the arc's throughline"

    layer_4_visual_skeleton:
      variant_label: "warm_cold_warm_contrast"
      avg_panels_per_page: 4
      thought_bubble_panels:
        - position: ch3_p3
          density: heavy_grief
          note: "The gap between memory and present — thought bubble holds both images simultaneously"
        - position: ch8_p2
          density: release_single
          note: "Grief completion — single large thought bubble, then white space"
      action_silent_pages:
        - position: ch1_p4
          bubble_density: none
          note: "Childhood memory — pure image, no caption (too precious for words)"
        - position: ch2_p2
          bubble_density: none
          note: "Reencounter first sight — the face, the recognition, no words needed yet"
        - position: ch10_p4
          bubble_density: none
          note: "New foundation — two people in the same space, newly"
      splash_pages:
        - position: ch1_p2
          trigger: "Childhood memory — the warmth of what was"
          style: memory_warm_soft_vintage_palette
        - position: ch4_p3
          trigger: "Grief for the past — protagonist with the absence"
          style: protagonist_alone_cold_contrast
        - position: ch10_p5
          trigger: "New terms — built not found"
          style: two_figures_new_warmth_adult
      bubble_density_curve:
        ch1: sparse_warm          # Childhood flashback — warmth, few words needed
        ch2: medium_awkward       # Reencounter — halting adult speech
        ch3: very_dense_thought   # The gap — grief internally processing
        ch4: sparse_grief         # Alone with grief — minimal
        ch5: medium_curious       # New quality noticed — tentative
        ch6: medium_mixed         # Adult connection forming
        ch7: dense_conflict       # Nostalgia trap — collision of voices
        ch8: sparse_release       # Grief completion — quiet
        ch9: medium_spoken        # Present offering — spoken rises
        ch10: medium_warm         # New terms — warmer than middle chapters
      recommended_bubble_styles:
        childhood_flashback: round_soft_pastel_adjacent
        adult_awkward: clipped_rectangular_adult
        grief_internal: heavy_oval_slow
        new_curiosity: light_surprised_thought
        nostalgia_trap: soft_speech_that_fades
        grief_completion: caption_quiet_large
        present_offering: clean_direct_speech

    layer_4_variants:
      - variant_label: "warm_cold_warm_contrast"
        description: "Visual warmth tracks the emotional temperature — warm in memory, cool in disconnection, warm again at resolution"
      - variant_label: "same_place_then_now"
        description: "Recurring visual locations — same composed shot of the same place in memory and present; change made visible"
      - variant_label: "handwriting_memory"
        description: "Physical documents from childhood appear as visual elements — notes, drawings embedded in panels"

    layer_5_pacing_skeleton:
      variant_label: "memory_and_present_rhythm"
      end_of_chapter_hooks:
        ch1: memory_established      # Childhood chapter ends in warmth; reader invested in what was
        ch2: gap_felt                # Reencounter ends on the awkwardness — how different it is
        ch3: grief_named             # The gap named internally; chapter ends before any action
        ch4: absence_held            # Alone with grief; chapter ends in the sitting-with
        ch5: new_quality_hook        # Unfamiliar quality noticed; chapter ends before pursuit
        ch6: adult_connection_forming # Something new building — uncertain warmth
        ch7: nostalgia_collides      # The trap sprung and failed; both people register it
        ch8: release_quiet           # Grief completed; lightest chapter ending in the arc
        ch9: present_offered         # Present-tense want stated; response pending
        ch10: built_not_found        # New terms; the arc closes on what was made, not recovered

      page_turn_reveals:
        - chapter: 2
          hidden_until_turn: "Who the protagonist was hoping to find — turn reveals who actually showed up"
        - chapter: 5
          hidden_until_turn: "New quality of love interest — turn reveals it's something the childhood version couldn't have had"
        - chapter: 8
          hidden_until_turn: "The grief — turn reveals the release: the single quiet thought"

      silence_to_dialogue_ratio:
        setup_chapters: "40% silence / 25% spoken / 35% internal"
        rising_chapters: "30% silence / 20% spoken / 50% internal"
        climax_chapters: "35% silence / 40% spoken / 25% internal"

      climax_pacing_pattern: >
        Growing up arc has the most variable pacing of the five shōjo strategies.
        Childhood chapter: 3 panels/page (slow, precious).
        Reencounter/grief chapters: 4-5 panels/page (more effortful).
        Grief completion ch8: 2-3 panels/page.
        Adult connection ch9-10: 3-4 panels/page — spacious but not precious;
        the new warmth is allowed to breathe without the ache of nostalgia.

    layer_5_variants:
      - variant_label: "memory_and_present_rhythm"
        description: "Pacing contrasts deliberately between memory chapters and present chapters"
      - variant_label: "compressed_gap"
        description: "Time gap between childhood and present compressed — the change is faster and more disorienting"
      - variant_label: "extended_grief"
        description: "Grief chapters given maximum space — ch3-5 paced very slowly; the loss honored through duration"

# ═════════════════════════════════════════════════════════════════════════════
# STRATEGY 05: HEALING ARC
# Archetype: wounded_heart_opened_by_incremental_trust
# Core loop: protagonist has been hurt → small kindness arrives unexpectedly →
#            the kindness opens a crack → protagonist tests whether to trust →
#            vulnerability survives the test
# ═════════════════════════════════════════════════════════════════════════════
  strategy_05:
    name: "Healing Arc"
    archetype_template: wounded_heart_opened_by_incremental_trust
    description: >
      The wound is real — not backstory flavor. It was shaped by someone.
      The healer is not therapeutic — they are simply present, consistently,
      without agenda. The healing happens through proximity, not intervention.
      The protagonist does the work; the healer provides the stable environment
      in which work is possible.

    layer_1_plot_skeleton:
      variant_label: "healing_standard"
      beat_count: 10
      beats:
        - beat: 1
          text: >
            {protagonist} in defended state — not visibly, but structurally.
            The defenses look like self-sufficiency, competence, cool distance.
            Reader sees the shape of the wound through the shape of the defense.
          camera_hint: protagonist_defended_posture
          mood_hint: defended_competence
          is_carrier: true

        - beat: 2
          text: >
            {healer} enters — not dramatically. A small kindness, offered
            without expectation of acknowledgment. {protagonist} is confused
            by the absence of agenda. What does this person want?
          camera_hint: small_kindness_medium
          mood_hint: unexpected_warmth
          is_carrier: true

        - beat: 3
          text: >
            {protagonist} tests {healer} — small provocations, small withdrawals.
            Looking for the moment the mask drops, the agenda surfaces.
            {healer} does not take the tests personally. This is itself
            the most disarming thing they could do.
          camera_hint: test_and_response
          mood_hint: testing_safety
          is_carrier: true

        - beat: 4
          text: >
            A crack. Something {healer} does or says that slips past the defense.
            Not a dramatic speech — something small. {protagonist} is startled
            by their own response. The defense was not complete.
          camera_hint: crack_in_defense_close
          mood_hint: undefended_moment
          is_carrier: true

        - beat: 5
          text: >
            The withdrawal that follows — reflexive, protective.
            {protagonist} pulls back harder after being cracked. This is
            normal. The wound protected itself. But the crack has already happened.
          camera_hint: reflexive_withdrawal
          mood_hint: defensive_retreat
          is_carrier: true

        - beat: 6
          text: >
            {healer} returns — does not address the withdrawal directly.
            Simply: continues to be present. This is the answer to the
            test: not pursuit, not demand, not hurt. Continued presence.
          camera_hint: healer_steady_return
          mood_hint: consistency_as_answer
          is_carrier: true

        - beat: 7
          text: >
            {protagonist} observes {healer} when unobserved — watching
            for the crack, the moment they give up, the performance that
            must be underneath the consistency. There is no performance.
            The consistency is actual.
          camera_hint: secret_observation
          mood_hint: looking_for_the_trick
          is_carrier: true

        - beat: 8
          text: >
            {protagonist} speaks — something real, something from beneath
            the defense. Not the wound fully named — but something more
            than the defended version would allow. A small truth.
          camera_hint: small_truth_offered_close
          mood_hint: first_real_offering
          is_carrier: true

        - beat: 9
          text: >
            {healer} receives the small truth without making it significant.
            Neither minimizing nor amplifying. Simply: received.
            This is what the protagonist needed and did not know how to ask for.
          camera_hint: quiet_reception_two_figure
          mood_hint: received_without_drama
          is_carrier: true

        - beat: 10
          text: >
            The healing is not complete. The wound is older than the arc.
            But the protagonist now knows what steady feels like. What
            trust, offered incrementally, received safely, can build.
            The foundation exists.
          camera_hint: protagonist_less_defended_forward
          mood_hint: open_not_healed
          is_carrier: true

    layer_1_variants:
      - variant_label: "healing_standard"
        description: "10-beat arc — wound defended, crack opened, small truth offered and received"
      - variant_label: "mutual_healing"
        description: "Both protagonists are wounded and healing each other simultaneously — neither is clearly healer or healed"
      - variant_label: "failed_test"
        description: "The healer fails one of the tests — makes a mistake — and has to repair the trust they built"

    layer_2_emotional_skeleton:
      variant_label: "shame_as_wound"
      ei_engine_hottest: shame
      chapter_emotional_map:
        chapter_1:
          emotional_job: "The defended state is shame-adjacent — the protagonist hides not because they're strong but because they learned that being seen was dangerous"
          ei_dimension: shame
          intensity: 3
        chapter_3:
          emotional_job: "The tests are shame-avoidance behaviors — if I find the flaw in the healer first, I won't be hurt by them finding mine"
          ei_dimension: shame
          intensity: 4
        chapter_6:
          emotional_job: "Healer's continued presence activates overwhelm — 'why are they still here? What do they see that makes them stay?'"
          ei_dimension: overwhelm
          intensity: 3
        chapter_climax:
          emotional_job: "The small truth offered is the act of allowing oneself to be seen — shame confronted by choosing to be visible"
          ei_dimension: shame
          intensity: 5
      progression_note: >
        Shame (defended) → Shame (testing) → Overwhelm (why are they still here?) →
        Shame (chosen visibility). The arc ends with shame met by choice,
        not resolved by external validation.

    layer_2_variants:
      - variant_label: "shame_as_wound"
        description: "Shame is the wound — the defense is against being seen and found wanting"
      - variant_label: "grief_as_wound"
        description: "The wound is grief — a loss that created the defended state; healing is allowing the grief to be witnessed"
      - variant_label: "false_alarm_distrust"
        description: "The wound is repeated betrayal — every kindness triggers false alarm; the arc is about recalibrating the threat detector"

    layer_3_dialogue_skeleton:
      variant_label: "minimal_loaded"
      avg_words_per_bubble: 12-20
      thought_bubble_to_speech_ratio: "5:1"  # Highest ratio in shōjo — most defended protagonist
      speech_atom_sequence:
        - moment: "defended_surface"
          atom_archetype: competent_deflection
          sample: "I'm fine. I don't need help. But — thank you."
          emotion: deflection_with_courtesy
          intensity: 1
          delivery: small_polite_bubble

        - moment: "small_kindness_received"
          atom_archetype: confused_internal
          sample: >
            "Why would she do that? People don't just do that. There must
            be something she wants. I should find out what it is before
            I let it matter."
          emotion: suspicious_warmth
          intensity: 3
          delivery: thought_bubble_analytical

        - moment: "test_administered"
          atom_archetype: small_provocation
          sample: "You don't have to keep doing this. I didn't ask you to."
          emotion: push_test
          intensity: 3
          delivery: clipped_warning

        - moment: "healer_response"
          atom_archetype: steady_undramatic
          sample: "I know. I wanted to."
          emotion: simple_consistent_presence
          intensity: 2
          delivery: small_clean_oval

        - moment: "crack_internal"
          atom_archetype: undefended_recognition
          sample: >
            "Nobody has ever just — said that. Without explaining why.
            Without making me feel like I owed something.
            Why does that make my chest hurt?"
          emotion: startled_vulnerability
          intensity: 5
          delivery: large_irregular_thought_bubble

        - moment: "small_truth_spoken"
          atom_archetype: first_real_disclosure
          sample: >
            "I'm not actually fine most of the time. I've gotten very good
            at it looking like fine. That's different."
          emotion: small_truth_offered
          intensity: 4
          delivery: quiet_careful_speech_real

        - moment: "healer_reception"
          atom_archetype: undramatic_receipt
          sample: "Yeah. I know."
          emotion: witnessed_without_amplification
          intensity: 3
          delivery: small_soft_simple

      escalation_pattern: >
        Minimal spoken dialogue throughout — the arc's emotional weight
        lives in thought bubbles. The small truth (ch8) is the only
        extended spoken moment in the arc. The healer's responses
        are always shorter than the protagonist's vulnerability —
        the asymmetry is deliberate and healing.
      key_signature_line: >
        "I know." — the healer's two-word response to the first real
        disclosure. Smallest possible response. Largest possible impact.

    layer_3_variants:
      - variant_label: "minimal_loaded"
        description: "5:1 thought-to-speech ratio; spoken dialogue is minimal but each line carries maximum weight"
      - variant_label: "healer_curious"
        description: "The healer asks questions — draws the protagonist out through gentle inquiry rather than presence alone"
      - variant_label: "shared_silence"
        description: "Most dialogue is non-verbal — the arc is built on what is communicated without words"

    layer_4_visual_skeleton:
      variant_label: "intimate_quiet_close"
      avg_panels_per_page: 3
      # Healing arc: fewest panels per page of all shōjo strategies
      # — each panel requires more contemplative space
      thought_bubble_panels:
        - position: ch2_p3
          density: suspicious_analytical
          note: "Small kindness received — thought bubble larger than the kindness itself"
        - position: ch4_p2
          density: crack_large
          note: "The crack — thought bubble consuming most of the panel; the defense is down"
      action_silent_pages:
        - position: ch1_p3
          bubble_density: none
          note: "Defended competence — protagonist alone; the defense visible in posture, not text"
        - position: ch6_p2
          bubble_density: none
          note: "Healer's continued return — single image; no words; the consistency IS the panel"
        - position: ch9_p3
          bubble_density: none
          note: "The receipt — healer's face receiving the small truth; no text needed"
      splash_pages:
        # Healing arc: most intimate splash pages of any shōjo strategy
        - position: ch4_p3
          trigger: "The crack — undefended moment"
          style: close_face_undefended_light_shift
        - position: ch8_p4
          trigger: "Small truth offered — the act of being seen"
          style: two_figure_intimate_close_quiet
        - position: ch10_p5
          trigger: "Foundation exists — protagonist less defended, facing forward"
          style: single_figure_open_posture
      bubble_density_curve:
        ch1: sparse_defended      # Defended protagonist — minimal speech, minimal thought shown
        ch2: medium_suspicious    # Small kindness — thought bubbles activate with suspicion
        ch3: medium_thought       # Testing — internal analysis
        ch4: very_dense_thought   # The crack — thought overwhelms
        ch5: very_sparse          # Withdrawal — almost nothing
        ch6: sparse               # Healer returns — minimal; the presence is visual
        ch7: medium_thought       # Watching for the trick
        ch8: sparse_spoken        # Small truth — rare spoken dialogue, quiet
        ch9: none_to_sparse       # Receipt — almost silent
        ch10: sparse_open         # Foundation — slightly more open, still quiet
      recommended_bubble_styles:
        defended_phase: small_precise_polite
        suspicious_thought: medium_analytical_cloud
        testing_speech: clipped_controlled
        healer_speech: minimal_clean_oval
        crack_thought: large_irregular_dissolved
        small_truth_speech: careful_real_rectangle
        receipt_speech: minimal_soft_two_words

    layer_4_variants:
      - variant_label: "intimate_quiet_close"
        description: "3 panels/page average; intimate close compositions; more white space than any other strategy"
      - variant_label: "exterior_interior"
        description: "Exterior settings mirror interior states — weather, light, space reflect the healing's progress"
      - variant_label: "recurring_small_moment"
        description: "The small kindness is repeated (coffee, a seat saved, a small thing) — recurring visual marks the consistency"

    layer_5_pacing_skeleton:
      variant_label: "breath_pacing"
      end_of_chapter_hooks:
        ch1: defended_shape        # The defense visible; reader sees what protagonist can't
        ch2: kindness_unresolved   # Small kindness given; protagonist's response pending
        ch3: test_passed           # Healer doesn't take the bait; chapter ends on the undrama of it
        ch4: crack_hanging         # The crack happened; chapter ends before protagonist decides what to do with it
        ch5: withdrawal_visible    # The pull-back; healer hasn't left yet
        ch6: consistency_shown     # Healer returned; no address of the withdrawal; quiet
        ch7: looking_for_trick     # Protagonist observing; chapter ends before they find nothing
        ch8: truth_offered         # Small truth given; reception pending
        ch9: received_quietly      # Receipt without drama; chapter ends in the stillness
        ch10: open_not_healed      # Foundation visible; wound still present; both things true

      page_turn_reveals:
        - chapter: 2
          hidden_until_turn: "Small kindness offered — turn reveals protagonist's internal response (not cool; startled)"
        - chapter: 4
          hidden_until_turn: "The defense in place — turn reveals the crack: protagonist's unguarded expression"
        - chapter: 9
          hidden_until_turn: "Small truth offered — turn reveals healer's two-word response"

      silence_to_dialogue_ratio:
        setup_chapters: "50% silence / 10% spoken / 40% internal"
        rising_chapters: "45% silence / 15% spoken / 40% internal"
        climax_chapters: "55% silence / 25% spoken / 20% internal"
        # Healing arc: highest silence ratio of all shōjo strategies
        # The silence IS the healing environment

      climax_pacing_pattern: >
        The entire healing arc runs at the slowest base pace of any shōjo strategy.
        3 panels/page throughout, with several single-panel pages.
        There is no pacing acceleration — the arc's emotional payload
        lives precisely in the refusal to rush.
        The small truth chapter (ch8): may include a single-panel full page
        to mark the act of being seen for the first time.

    layer_5_variants:
      - variant_label: "breath_pacing"
        description: "Slowest and most spacious pacing of any strategy — silence is structural"
      - variant_label: "incremental_acceleration"
        description: "Pacing gradually warms as the protagonist opens — chapters subtly denser as trust builds"
      - variant_label: "test_chapters_quick"
        description: "The testing phase (ch2-5) paced more rapidly — protagonist's guard up; faster beat; slows as trust forms"

# ═════════════════════════════════════════════════════════════════════════════
# ANTI-PATTERN RULES — SHŌJO
# ═════════════════════════════════════════════════════════════════════════════
anti_pattern_rules:
  - rule_id: SJ_AP_01
    forbidden_combination:
      strategy: strategy_05  # Healing Arc
      layer_4_variant: high_action_visual_skeleton
    reason: >
      Healing arcs are structurally intimate. Action-heavy visual layouts
      (5+ panels/page, kinetic compositions, impact lines) break the
      contained quiet in which healing occurs. The healer's consistency
      is proven through small moments — these cannot survive visual crowding.
    severity: blocker

  - rule_id: SJ_AP_02
    forbidden_combination:
      strategy: any_shojo
      layer_4_variant: zero_thought_bubbles
    reason: >
      Shōjo genre contract requires inner monologue as primary driver.
      Removing thought bubbles entirely produces a shōnen visual style
      transposed onto a shōjo arc — the result is inauthentic and fails
      to deliver the introspection that shōjo readers expect.
    severity: blocker

  - rule_id: SJ_AP_03
    forbidden_combination:
      strategy: strategy_01  # First Love Arc
      layer_2_variant: no_shame_engine
    reason: >
      First love in shōjo is structurally linked to the shame of wanting.
      An arc that removes shame produces a romance without vulnerability —
      an external plot event rather than an internal emotional arc.
    severity: warning

  - rule_id: SJ_AP_04
    forbidden_combination:
      strategy: strategy_04  # Growing Up Arc
      layer_2_variant: grief_skipped
    reason: >
      Growing Up arcs require grief completion as prerequisite to adult
      connection. Skipping grief produces a nostalgia arc — protagonist
      retrieves the childhood relationship rather than building an adult one.
      These are different books with different payoffs.
    severity: blocker

  - rule_id: SJ_AP_05
    forbidden_combination:
      strategy: strategy_03  # Rivals-in-Love
      layer_1_variant: competition_not_genuine
    reason: >
      If the competition is not genuine, the rivals-in-love arc collapses
      into a crush-with-obstacles arc. The domain must matter to both
      characters independently of the relationship — otherwise the
      jealousy and the redefinition have no structural weight.
    severity: blocker

  - rule_id: SJ_AP_06
    forbidden_combination:
      strategy: strategy_02  # Misunderstanding Arc
      layer_5_variant: rapid_escalation
    reason: >
      Misunderstanding arcs require time for the wrong story to accumulate
      credibility. Rapid escalation prevents the reader from feeling the
      weight of what was built on a wrong foundation. The reader must be
      invested in the connection BEFORE the misunderstanding — this
      requires space.
    severity: warning

  - rule_id: SJ_AP_07
    forbidden_combination:
      strategy: any_shojo
      layer_4_splash_page_trigger: action_or_combat_moment
    reason: >
      Shōjo splash pages mark emotional revelation, not physical action.
      Using a combat or physical action moment as splash page triggers a
      visual genre mismatch that signals shōnen to the reader. Splash pages
      must mark: first noticing, confession, grief landing, healing crack,
      or equivalent emotional peak.
    severity: blocker
