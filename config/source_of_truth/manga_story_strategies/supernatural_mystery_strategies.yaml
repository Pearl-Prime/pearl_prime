schema_version: 1.0.0
genre: supernatural_mystery
strategy_count: 5
selection_algorithm: sha256_hash_seeded
topic_strategy_map:
  grief: strategy_01
  guilt: strategy_02
  closure: strategy_03
  regret: strategy_04
  acceptance: strategy_05
character_pool:
  protagonist:
  - Yuki Amane
  - Sorano Mizuki
  - Haru Tsukishima
  - Rei Akizuki
  - Nao Shiraishi
  companion:
  - the shrine keeper who answers questions with older questions
  - the antiquarian who knows which objects still hold a voice
  - an elder medium who taught herself restraint before fluency
  - a soft-spoken familiar that deflates her self-seriousness
  - the night-watch caretaker who has seen the mist do this before
  setting:
  - a hillside shrine where the torii recedes into standing fog
  - an old wooden house with a genkan that will not stay dark
  - the still surface of a pond at the forest's edge after midnight
  - a shuttered classroom in a school emptied for the season
  - a riverside lantern path where the water runs the wrong way
strategies:
  strategy_01:
    name: What the House Keeps Setting Out
    archetype_template: the_unresolved_that_lingers
    description: Supernatural mystery carries grief as the spirit that cannot stop repeating one small
      act of love. The protagonist does not solve the haunting so much as witness it; the resolution logic
      is that grief is not a case to close but a weight to learn to carry, and the only mercy available
      is to let the act be completed once, gently, and then released. Opens on the trace, never the spirit.
      Closes on bittersweet departure and the mandatory aftermath beat where the residue is deposited.
      The feeling is never named in caption.
    layer_1_plot_skeleton:
      variant_label: strategy_01_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} finds two cups set out on the low table, still warm, though no
          one has lived here in years. The caption notes only the warmth, not what it means.'
        camera_hint: encounter_sign_insert
        mood_hint: dusk_liminal
        is_carrier: false
      - beat: 2
        text: They follow the small wrongnesses through the house — a second pair of slippers turned to
          face the door, a kettle filled for two. Each thing is an act of waiting, performed over and
          over by hands that will not stop.
        camera_hint: investigation_tracking_ms
        mood_hint: fog_transition
        is_carrier: false
      - beat: 3
        text: The spirit is there at last, not whole — an old woman at the table, partial as breath on
          glass, pouring tea for a chair that has been empty forty years. She does not see {protagonist}.
          She is only doing the one thing she knows how to keep doing.
        camera_hint: spirit_present_reveal
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 4
        text: '{companion} says the loss out loud — not to fix it, only to name who is gone. ''She is
          not lost. She is doing exactly what you would do. She is still setting the place.'''
        camera_hint: companion_two_shot_close
        mood_hint: dusk_liminal
        is_carrier: true
      - beat: 5
        text: The spirit's hand pauses over the second cup. For three panels there is no sound at all
          — only the steam rising, and a stillness that has been waited for across decades.
        camera_hint: silence_hold_sequence
        mood_hint: post_release
        is_carrier: true
      - beat: 6
        text: '{protagonist} does the small thing the dead are owed: they sit in the empty chair and let
          the tea be poured. They let the waiting arrive at the one it was for. The act completes itself
          for the first and last time.'
        camera_hint: ritual_completion_two_shot
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 7
        text: The old woman looks up, finally seen, and something in her shoulders lets go. She fades
          the way warmth leaves a cup — not taken, only finished. Peace and loss in the same panel.
        camera_hint: release_dissolve_cu
        mood_hint: post_release
        is_carrier: true
      - beat: 8
        text: Aftermath. {protagonist} alone in the quiet house, two cups on the table now gone cold.
          They do not look relieved. They sit a while with the empty room, because the room earned it.
        camera_hint: aftermath_solitary_ms
        mood_hint: post_release
        is_carrier: true
      - beat: 9
        text: Threshold close. {protagonist} steps out past the genkan into thinning fog, carrying the
          cold of the cup somewhere in the chest. The house behind them is just a house. The reader holds
          what was set out, and what was finally received.
        camera_hint: threshold_exit_wide
        mood_hint: fog_transition
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: two_cups_warm_in_an_empty_house
        ch2: the_chair_that_was_finally_filled
        ch3: a_cup_gone_cold_and_no_one_to_blame_for_it
  strategy_02:
    name: The Door That Will Not Stay Shut
    archetype_template: the_apology_that_was_never_made
    description: 'Guilt is externalised as a door that refuses to stay closed — a genkan, a sliding panel,
      a gate that opens again every time it is shut, because something unspoken is keeping it ajar. The
      protagonist''s investigation is really a search for the apology that was never delivered. The resolution
      logic is that guilt does not need punishment to be released, it needs the truth said aloud; once
      the door is allowed to be the thing it is, it can finally rest closed. Distinct from horror: the
      door is sorrow, not menace. Bittersweet release; mandatory aftermath.'
    layer_1_plot_skeleton:
      variant_label: strategy_02_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} slides the door shut and walks on. Behind them, with no wind and
          no hand, it slides open again. The caption marks only the sound of it, not what it wants.'
        camera_hint: encounter_sign_threshold
        mood_hint: dusk_liminal
        is_carrier: false
      - beat: 2
        text: They test it the patient way — latch it, weight it, wait. Each time, the door eases open
          the same hand's width, as if holding a place for someone who has not yet been let through.
        camera_hint: investigation_repeat_ms
        mood_hint: fog_transition
        is_carrier: false
      - beat: 3
        text: 'The spirit waits just inside the threshold — a young man who keeps almost stepping over
          and cannot. He asks, in the old grammar, the only thing he has left: ''Did he ever hear it?
          The thing I never said.'' He does not accuse. He waits.'
        camera_hint: spirit_present_threshold_cu
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 4
        text: '{companion} reads the weight {protagonist} is carrying without being told. ''A door stays
          open because something is owed across it. The owing is not yours — but you can carry the word
          he could not.'''
        camera_hint: companion_two_shot_close
        mood_hint: dusk_liminal
        is_carrier: true
      - beat: 5
        text: '{protagonist} stops trying to force the door. They stand at the threshold and simply stop
          — and in the held stillness, no sound, the spirit''s outline steadies, as if being still enough
          to be heard is the whole of it.'
        camera_hint: stillness_hold_threshold
        mood_hint: post_release
        is_carrier: true
      - beat: 6
        text: They carry the unspoken thing across — to the grave, to the living one who needed it, to
          the empty room that stood in for both. The apology is said in plain words at last, by someone,
          to someone. The owing is settled.
        camera_hint: ritual_delivery_ms
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 7
        text: The young man steps over the threshold he could never cross, lighter by exactly the weight
          of one sentence. He thins into the dusk. Released, and gone — the price of being released.
        camera_hint: release_crossing_dissolve
        mood_hint: post_release
        is_carrier: true
      - beat: 8
        text: Aftermath. {protagonist} reaches back and slides the door shut. This time it stays. They
          keep their hand on the frame a moment, feeling the new quiet of a thing that no longer needs
          to wait.
        camera_hint: aftermath_door_close_cu
        mood_hint: post_release
        is_carrier: true
      - beat: 9
        text: Threshold close. The door rests closed behind {protagonist} as they leave, the latch finally
          meaning what latches mean. The reader holds the sentence that was owed, and the cost of having
          to be the one to say it.
        camera_hint: threshold_exit_wide
        mood_hint: fog_transition
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: a_door_that_opens_itself_with_no_wind
        ch2: the_question_did_he_ever_hear_it
        ch3: a_latch_that_finally_holds
  strategy_03:
    name: What Was Promised at the Water
    archetype_template: what_the_dead_are_owed
    description: 'Closure is externalised as a spirit who waits at a threshold for a promise to be kept
      — a debt of presence, a vow made and interrupted by death. The protagonist''s case is to discover
      what was promised and to deliver it, because closure is not a feeling you grant yourself but a thing
      you do for the one still waiting. The resolution logic: the dead are owed the keeping of the word,
      and only the keeping lets the waiting end. Bittersweet — the promise kept is also the goodbye. Mandatory
      aftermath beat where the protagonist absorbs the residue.'
    layer_1_plot_skeleton:
      variant_label: strategy_03_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. A single paper lantern is lit at the water''s edge though the festival ended
          weeks ago, its flame steady in a place where flames should not last. {protagonist}''s caption
          notes the light, not the one waiting under it.'
        camera_hint: encounter_sign_insert
        mood_hint: dusk_liminal
        is_carrier: false
      - beat: 2
        text: They piece it together from what the place remembers — a worn meeting-stone, two names cut
          side by side, a path kept clear by feet that no longer touch it. Someone said they would come
          back here. Someone is still keeping the appointment.
        camera_hint: investigation_clue_tracking
        mood_hint: fog_transition
        is_carrier: false
      - beat: 3
        text: 'The spirit stands at the water as if she has stood there every night — a woman watching
          the path, asking the old question of the dark: ''You came. Did the other one come?'' She is
          not angry that the years passed. She only wants the promise honoured.'
        camera_hint: spirit_present_waiting_ms
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 4
        text: '{companion} names the shape of it. ''She is owed a kept word. Not comfort, not a reason.
          The word. Find who made it, and bring it here, or bring it for them.'''
        camera_hint: companion_two_shot_close
        mood_hint: dusk_liminal
        is_carrier: true
      - beat: 5
        text: '{protagonist} does not rush to answer her. They stand beside her at the water and wait
          too, in the same silence, for as long as it takes — and the lantern flame steadies, as if being
          waited-with is already part of what was owed.'
        camera_hint: silence_shared_vigil
        mood_hint: post_release
        is_carrier: true
      - beat: 6
        text: They keep the promise in the only way left — the living one is brought, or their words are
          carried, to the meeting-stone at last. The appointment, broken by death, is finally met. The
          debt of presence is paid.
        camera_hint: ritual_promise_kept_two_shot
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 7
        text: The woman turns from the path for the first time. She does not need to watch it anymore.
          She steps onto the water and the lantern goes out gently behind her — the appointment kept,
          and therefore over.
        camera_hint: release_onto_water_dissolve
        mood_hint: post_release
        is_carrier: true
      - beat: 8
        text: Aftermath. {protagonist} alone at the dark water, the spent lantern cooling in their hands.
          They feel the new emptiness of a place that no longer holds anyone — closure is also a kind
          of vacancy.
        camera_hint: aftermath_solitary_water
        mood_hint: post_release
        is_carrier: true
      - beat: 9
        text: Threshold close. {protagonist} sets the dead lantern down at the edge and walks the cleared
          path back, the way now belonging to no one. The reader holds the promise that was finally kept,
          and the goodbye that keeping it required.
        camera_hint: threshold_path_exit_wide
        mood_hint: fog_transition
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: a_lantern_that_will_not_go_out
        ch2: the_question_did_the_other_one_come
        ch3: a_cleared_path_that_now_belongs_to_no_one
  strategy_04:
    name: The Word She Held Until Morning
    archetype_template: the_unsaid_carried_across
    description: 'Regret is externalised as a spirit re-living the single moment of the thing left unsaid
      — a hand half-raised, a letter half-written, the doorway she turned back from. The loop repeats
      because the word never left her. The protagonist''s role is to be the carrier: to take the unsaid
      thing across the boundary to where it was meant to go. The resolution logic is that regret loosens
      not by undoing the past but by completing its one unfinished sentence at last. Spirits are sorrowful,
      never frightening. Bittersweet release; the aftermath beat is mandatory.'
    layer_1_plot_skeleton:
      variant_label: strategy_04_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. The same paper is on the desk every dawn — a letter begun, the brush set down
          mid-stroke, the ink never dry and never finished. {protagonist} notes only that it keeps returning,
          not the regret folded inside it.'
        camera_hint: encounter_sign_object_insert
        mood_hint: dusk_liminal
        is_carrier: false
      - beat: 2
        text: They watch the loop and learn its shape — a woman who reaches the doorway each night, lifts
          her hand to call after someone, and lets it fall. The same half-second of the unsaid, lived
          again and again.
        camera_hint: investigation_loop_observe
        mood_hint: fog_transition
        is_carrier: false
      - beat: 3
        text: 'The spirit notices {protagonist} between repetitions and asks the question the loop is
          made of: ''If I had said it — would it have changed the going?'' She does not want absolution.
          She wants the sentence finished.'
        camera_hint: spirit_present_question_cu
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 4
        text: '{companion} sees what is owed. ''The word never left her, so she cannot leave it. You cannot
          give her back the morning. But a word can still be carried, even now, even late.'''
        camera_hint: companion_two_shot_close
        mood_hint: dusk_liminal
        is_carrier: true
      - beat: 5
        text: '{protagonist} stops watching the loop and simply holds out a hand for the unfinished letter
          — no words, only the offer to carry it. In that one motionless beat the spirit''s repeating
          gesture goes still, mid-reach, for the first time.'
        camera_hint: silence_offered_hand
        mood_hint: post_release
        is_carrier: true
      - beat: 6
        text: They carry the unsaid thing to the one it was for — read aloud at a graveside, pressed into
          a living palm, spoken into the room that holds the memory. The sentence she could not finish
          is finished by another mouth. It arrives, late, and still it arrives.
        camera_hint: ritual_delivery_ms
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 7
        text: The woman lowers the hand she has been lifting for years — not in defeat, in completion.
          The brush-stroke on the letter dries at last. She thins into the morning light, lighter by the
          weight of one finished word.
        camera_hint: release_hand_lowers_dissolve
        mood_hint: post_release
        is_carrier: true
      - beat: 8
        text: Aftermath. {protagonist} alone with the now-finished letter, the ink finally dry under their
          thumb. They sit with the strange ache of a thing completed too late to have changed anything,
          and early enough to have mattered anyway.
        camera_hint: aftermath_letter_solitary
        mood_hint: post_release
        is_carrier: true
      - beat: 9
        text: Threshold close. {protagonist} leaves the quiet room as the first real daylight comes through,
          carrying the shape of the unsaid somewhere behind the sternum. The reader holds the sentence
          that was finally carried across — and the morning it could not be taken back to.
        camera_hint: threshold_dawn_exit_wide
        mood_hint: fog_transition
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: a_letter_that_is_never_dry_and_never_finished
        ch2: the_question_would_it_have_changed_the_going
        ch3: ink_gone_dry_at_last_too_late_and_not_too_late
  strategy_05:
    name: The Torii She Had Been Avoiding
    archetype_template: naming_the_thing_that_was_hers
    description: 'Acceptance is the through-line beat made into its own case: the spirit''s unfinished
      business turns out to be partly the protagonist''s own, a residue she has carried and never named.
      The genre device is naming the thing — the unseen finally given its true name is the unseen finally
      given rest. The resolution logic is that acceptance is not winning against the cost of perception
      but settling into a sustainable relationship with it; she stops trying to be free of what she carries
      and learns its weight as her own. The final threshold is hers to cross. Bittersweet, no triumph;
      the aftermath is the settling itself.'
    layer_1_plot_skeleton:
      variant_label: strategy_05_standard
      beat_count: 9
      beats:
      - beat: 1
        text: '{setting}. {protagonist} has walked past this torii a hundred times and never through it.
          Tonight the mist beyond it holds a shape that knows her name. The caption marks the pull in
          the chest, not what it is asking.'
        camera_hint: encounter_sign_threshold_wide
        mood_hint: dusk_liminal
        is_carrier: false
      - beat: 2
        text: 'The investigation turns inward against her will — the clues are her own: a memory she files
          under nothing, a residue she has been carrying so long she stopped feeling its weight. The case
          she keeps almost solving is herself.'
        camera_hint: investigation_inward_intercut
        mood_hint: fog_transition
        is_carrier: false
      - beat: 3
        text: 'The spirit beyond the torii wears a line of her own face. It asks, in the old grammar,
          the question she has refused for years: ''How long will you carry me unnamed?'' It is not a
          threat. It is the part of her that was never put down.'
        camera_hint: spirit_present_mirror_cu
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 4
        text: '{companion} does not solve it for her. ''I cannot name this one. Only the one carrying
          it can. A thing unnamed cannot rest — and neither can the one holding it.'''
        camera_hint: companion_two_shot_close
        mood_hint: dusk_liminal
        is_carrier: true
      - beat: 5
        text: '{protagonist} stops at the threshold and stops fighting the pull. For a long held silence
          she simply lets the thing be present — neither pushed away nor pulled closer — and the mist,
          for once, does not press. It just is, and so does she.'
        camera_hint: silence_threshold_acceptance
        mood_hint: post_release
        is_carrier: true
      - beat: 6
        text: She gives it its true name at last — quietly, only the right word, the one she has spent
          years not saying. Naming it does not make it leave her. It makes it bearable to keep. The unseen,
          named, finally settles.
        camera_hint: ritual_naming_cu
        mood_hint: deep_spirit
        is_carrier: true
      - beat: 7
        text: The spirit that wore her face inclines its head and steps back into the mist — not banished,
          not gone, returned to a place inside her she can now live beside. Rest, and the loss of pretending
          it was never there.
        camera_hint: release_settle_dissolve
        mood_hint: post_release
        is_carrier: true
      - beat: 8
        text: Aftermath. {protagonist} alone at the torii, the mist thinning, the carried weight no lighter
          but finally hers on purpose. She does not feel cured. She feels, for the first time, like someone
          who can keep doing this.
        camera_hint: aftermath_threshold_solitary
        mood_hint: post_release
        is_carrier: true
      - beat: 9
        text: Threshold close. {protagonist} stands at the torii with the choice she has avoided — to
          walk through, or not. The mist is present. We do not see her choose. The reader holds the named
          thing, and the settling that was never a victory.
        camera_hint: ambiguous_threshold_final_wide
        mood_hint: fog_transition
        is_carrier: false
    layer_5_pacing_skeleton:
      end_of_chapter_hooks:
        ch1: a_torii_she_has_never_walked_through
        ch2: the_question_how_long_will_you_carry_me_unnamed
        ch3: a_weight_that_is_finally_hers_on_purpose
anti_pattern_rules:
- forbidden_combination:
  - spirit_as_threat
  - jump_scare
  - body_horror
  - dread_without_context
  - menacing_pursuit
  reason: 'Supernatural mystery''s contract is mono no aware, not horror. Spirits are sad, not dangerous
    (lane bible failure mode #6). The moment a spirit threatens the protagonist''s physical safety the
    contemplative register collapses into the wrong genre and the wellness embed reads as fear rather
    than tenderness. This is also what keeps it distinct from the sibling psychological_horror bank, where
    the dread is the point.'
- forbidden_combination:
  - caption_names_the_feeling
  - spirit_explains_the_moral
  - codified_spirit_rulebook
  - clean_total_closure
  - skipped_aftermath_beat
  reason: 'The golden rule: the psychological content is the resolution logic, never stated. Captions
    must be somatic/observational (''the air by the threshold felt heavier than air should feel''), never
    ''she felt grief'' (the cardinal sin, failure mode #4). The turn is carried by the device and the
    silence, never a speech that explains it. Endings stay bittersweet (rest AND loss), never saccharine;
    and the aftermath beat is mandatory or the residue has nowhere to land.'
