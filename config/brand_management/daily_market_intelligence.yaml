# Daily Market Intelligence Loop
# Authority: Pearl_Marketing + Pearl_Research + EI v2
# Purpose: Continuously discover new market opportunities, trending topics,
#          new platforms, product ideas, and competitive intelligence.
# Feeds into: catalog planning, content mix decisions, new product development.

schema_version: "1.0"

# ── Daily Research Schedule ───────────────────────────────────────
# Runs daily via Pearl_Research agent. Results feed EI v2 learner.
daily_schedule:
  time_utc: "06:00"  # 6 AM UTC = before US market opens
  agents:
    - pearl_research   # deep web search
    - pearl_marketing  # positioning analysis
    - ei_v2            # pattern learning from findings

# ── Research Streams (run in parallel daily) ──────────────────────
research_streams:

  # Stream 1: Trending Topics & Personas
  trending_topics:
    description: "What topics are trending in self-help/wellness TODAY?"
    sources:
      - {type: "rss", feeds: "config/feeds/wellness_feeds.yaml"}
      - {type: "web_search", queries: ["self-help trending 2026", "wellness book trends", "mental health trending topics"]}
      - {type: "reddit", subreddits: ["selfhelp", "selfimprovement", "anxiety", "ADHD", "burnout", "meditation"]}
      - {type: "tiktok_trends", hashtags: ["#mentalhealth", "#nervousystem", "#healing", "#selfcare"]}
      - {type: "google_trends", terms: ["nervous system regulation", "somatic healing", "burnout recovery"]}
    output: "artifacts/market_intelligence/daily/{date}/trending_topics.json"
    action: "If new topic identified → add to candidate_topics queue for catalog planner"

  # Stream 2: Platform Discovery
  platform_discovery:
    description: "New platforms, new features, policy changes that affect us"
    sources:
      - {type: "web_search", queries: ["new audiobook platform 2026", "ebook platform launch", "podcast platform new"]}
      - {type: "web_search", queries: ["Google Play Books policy change", "TikTok books feature", "Spotify audiobook update"]}
      - {type: "web_search", queries: ["AI audiobook policy", "AI content publishing rules 2026"]}
    output: "artifacts/market_intelligence/daily/{date}/platform_changes.json"
    action: "If new platform found → add to platform_knob_tuning.yaml evaluation queue"

  # Stream 3: Competitive Intelligence
  competitive_intel:
    description: "What competitors are doing, new entries, pricing changes"
    sources:
      - {type: "web_search", queries: ["self-help audiobook bestseller new", "wellness ebook top selling"]}
      - {type: "platform_scan", platforms: ["google_play", "kobo", "apple_books"], categories: ["self-help", "wellness"]}
      - {type: "web_search", queries: ["indie self-help publisher success story", "self-published wellness author"]}
    output: "artifacts/market_intelligence/daily/{date}/competitive_intel.json"
    action: "If gap found → flag for Pearl_Marketing to evaluate new brand opportunity"

  # Stream 4: New Product Ideas
  product_ideas:
    description: "Creative product concepts from market signals"
    examples:
      - "learn tai chi for depression manga"
      - "recipe books for anxiety (comfort food + nervous system)"
      - "parent-child meditation duo books"
      - "ADHD-friendly micro-audiobooks (5 min, designed for attention spans)"
      - "somatic exercises for office workers (chair-based, no mat needed)"
      - "grief companion journal with audio prompts"
      - "sleep story series (fiction-meets-somatic for insomnia)"
    sources:
      - {type: "web_search", queries: ["innovative self-help format", "unique wellness book concept", "creative mental health content"]}
      - {type: "reddit", subreddits: ["selfpublish", "writingprompts", "meditation", "yoga"]}
      - {type: "amazon_search", categories: ["self-help", "health-fitness"], sort: "newest", filter: "4+ stars"}
    output: "artifacts/market_intelligence/daily/{date}/product_ideas.json"
    action: "If viable idea → add to product_backlog.yaml for Pearl_Architect review"

  # Stream 5: Per-Lane Market Signals (rotate through 13 lanes)
  lane_market_signals:
    description: "Market-specific intelligence for each brand lane"
    rotation: "round_robin"  # check 2 lanes per day, rotate through all 13
    lanes_per_day: 2
    per_lane_queries:
      - "{language} self-help bestseller {year}"
      - "{language} audiobook market {country}"
      - "{language} wellness content trending"
      - "mental health {country} youth {year}"
    output: "artifacts/market_intelligence/daily/{date}/lane_{lane_id}.json"
    action: "Update lane-specific catalog mix recommendations"

  # Stream 6: Companion Product Signals
  companion_signals:
    description: "What add-ons and bundles are working in the market"
    sources:
      - {type: "web_search", queries: ["book companion workbook bestseller", "audiobook companion app"]}
      - {type: "web_search", queries: ["self-help course bundle pricing", "wellness subscription model"]}
      - {type: "web_search", queries: ["B2B corporate wellness content library", "workplace mental health program"]}
    output: "artifacts/market_intelligence/daily/{date}/companion_signals.json"
    action: "Update companion_addon_strategy per brand"

# ── EI V2 Learning Integration ────────────────────────────────────
# Daily research feeds into EI v2's market awareness dimensions.
ei_v2_integration:
  # New signals get scored and weighted by EI v2
  signal_scoring:
    trending_topic_weight: 0.3      # how much to boost trending topics in catalog mix
    platform_change_urgency: 0.5    # how fast to react to platform policy changes
    competitive_gap_weight: 0.4     # priority for filling gaps competitors don't serve
    product_idea_threshold: 0.6     # minimum score to add to product backlog

  # EI v2 learner adapts catalog mix based on accumulated signals
  catalog_adaptation:
    min_signals_before_action: 3    # need 3+ signals before changing catalog mix
    adaptation_window_days: 7       # look at last 7 days of signals
    max_mix_shift_per_week: 0.10    # don't shift more than 10% of catalog mix per week

# ── Weekly Rollup ─────────────────────────────────────────────────
# Every Sunday, consolidate daily findings into weekly report.
weekly_rollup:
  day: "sunday"
  time_utc: "20:00"
  output: "artifacts/market_intelligence/weekly/{year}-W{week}/rollup.md"
  includes:
    - "Top 5 trending topics this week"
    - "Platform changes requiring action"
    - "Competitive gaps identified"
    - "New product ideas (scored)"
    - "Per-lane market updates"
    - "Recommended catalog mix adjustments"
    - "EI v2 adaptation recommendations"

# ── Product Backlog ───────────────────────────────────────────────
# New product ideas that need evaluation before entering the pipeline.
product_backlog_path: "artifacts/market_intelligence/product_backlog.yaml"
# Fields per idea:
#   - idea_id, description, source (which signal), date_identified
#   - market_fit_score (0-1, from EI v2)
#   - requires_new_atoms (bool — do we need to write new content?)
#   - requires_new_pipeline (bool — do we need new production capability?)
#   - estimated_effort (low/medium/high)
#   - status: candidate → evaluating → approved → in_production → launched → killed
