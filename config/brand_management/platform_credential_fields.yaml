# Platform Credential Fields — what each platform requires from brand admins
# Brand admins enter these on the portal setup page.
# Values are encrypted with Fernet (AES-128-CBC) and stored per brand.
# Pearl_Int decrypts when auto-uploading content.
# Admin never sees stored values after entry (vault pattern).

schema_version: "1.0"

platforms:
  amazon_kdp:
    display_name: "Amazon KDP"
    fields:
      - {name: "kdp_email", label: "KDP Account Email", type: "email", required: true}
      - {name: "kdp_author_page_url", label: "Author Page URL", type: "url", required: false}
      - {name: "kdp_marketplace", label: "Primary Marketplace", type: "text", required: true, placeholder: "amazon.com"}
    notes: "From KDP Bookshelf → Account. We use this to track your sales rank and reviews."
    dashboard_url: "https://kdp.amazon.com/en_US/bookshelf"

  webtoon_canvas:
    display_name: "WEBTOON Canvas"
    fields:
      - {name: "webtoon_username", label: "WEBTOON Username", type: "text", required: true}
      - {name: "webtoon_creator_id", label: "Creator Profile URL", type: "url", required: false}
    notes: "From WEBTOON → My Page → Settings"
    dashboard_url: "https://www.webtoons.com/en/creator"

  google_play:
    display_name: "Google Play Books"
    fields:
      - {name: "publisher_id", label: "Publisher ID", type: "text", required: true}
      - {name: "email", label: "Publisher Email", type: "email", required: true}
    notes: "From Google Play Partner Center → Account details"
    dashboard_url: "https://play.google.com/console/developers"

  youtube:
    display_name: "YouTube"
    fields:
      - {name: "channel_id", label: "Channel ID", type: "text", required: true}
      - {name: "channel_name", label: "Channel Name", type: "text", required: true}
    notes: "From YouTube Studio → Settings → Channel → Advanced settings"
    dashboard_url: "https://studio.youtube.com"

  tiktok:
    display_name: "TikTok"
    fields:
      - {name: "username", label: "TikTok Username", type: "text", required: true}
      - {name: "business_account_id", label: "Business Account ID", type: "text", required: false}
    notes: "From TikTok → Profile → Settings → Manage account"
    dashboard_url: "https://www.tiktok.com/creator#/analytics"

  instagram:
    display_name: "Instagram"
    fields:
      - {name: "username", label: "Instagram Username", type: "text", required: true}
      - {name: "business_account_id", label: "Business Account ID", type: "text", required: false}
    notes: "Must be a Business or Creator account"
    dashboard_url: "https://www.instagram.com/accounts/insights"

  line:
    display_name: "LINE Official Account"
    fields:
      - {name: "official_account_id", label: "Official Account ID", type: "text", required: true}
    notes: "From LINE Official Account Manager"
    dashboard_url: "https://manager.line.biz"
    lanes: [ja_JP, zh_TW, zh_HK, zh_CN]

  kobo:
    display_name: "Kobo Writing Life"
    fields:
      - {name: "publisher_id", label: "Publisher ID", type: "text", required: true}
    notes: "From Kobo Writing Life → Account"
    dashboard_url: "https://www.kobo.com/writinglife"

  apple_books:
    display_name: "Apple Books"
    fields:
      - {name: "itunes_connect_email", label: "iTunes Connect Email", type: "email", required: true}
      - {name: "apple_vendor_id", label: "Vendor ID", type: "text", required: true}
      - {name: "apple_team_id", label: "Team ID", type: "text", required: false}
    notes: "From iTunes Connect → Agreements, Tax, and Banking → Vendor ID. Fixed-layout EPUB3 must be uploaded directly — aggregators do not support fixed-layout."
    dashboard_url: "https://itunesconnect.apple.com"

  globalcomix:
    display_name: "GlobalComix"
    fields:
      - {name: "globalcomix_creator_id", label: "Creator ID", type: "text", required: true}
      - {name: "globalcomix_username", label: "Username", type: "text", required: true}
    notes: "From GlobalComix → Creator Dashboard → Settings"
    dashboard_url: "https://globalcomix.com/creator"

  spotify:
    display_name: "Spotify for Authors"
    fields:
      - {name: "author_profile_url", label: "Author Profile URL", type: "url", required: false}
    notes: "Distribution via INaudio to Spotify"
    dashboard_url: "https://podcasters.spotify.com"

  ximalaya:
    display_name: "Ximalaya (喜马拉雅)"
    fields:
      - {name: "publisher_id", label: "Publisher ID (发布者ID)", type: "text", required: true}
    notes: "China mainland only. Requires Chinese national operator."
    dashboard_url: "https://www.ximalaya.com/zhubo"
    lanes: [zh_CN]

podcast_platforms:
  spotify_podcast:
    fields: [spotify_show_id, spotify_rss_submitted]
    required_for: [en_us, es_latam, pt_br, de_de, fr_fr, ko_kr, ja_jp]
  apple_podcasts:
    fields: [apple_podcast_id, apple_rss_submitted]
    required_for: [en_us, es_latam, pt_br, de_de, fr_fr, ko_kr, ja_jp]
  youtube_podcast:
    fields: [youtube_channel_id, youtube_rss_submitted]
    required_for: [all]
  ximalaya_podcast:
    fields: [ximalaya_album_id, ximalaya_api_key]
    required_for: [zh_cn]
    note: "Mainland China: direct upload via API where required; label AI-generated audio per PRC rules."
  podbbang_podcast:
    fields: [podbbang_show_id, podbbang_rss_submitted]
    required_for: [ko_kr]
  noice_podcast:
    fields: [noice_show_id]
    required_for: [id_id]
