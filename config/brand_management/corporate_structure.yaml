# Corporate Structure — Legal entities per brand lane
# Authority: Global Brand Management System plan
# US: 24 individual non-profit church publication corps per brand
# Asia/EU: 1 corp per lane, all 24 brands as product lines

schema_version: "1.0"

global_mission: "To elevate people, especially the youth, helping them with their life challenges and aspirations."

# ── US Brand Lane (en-US) — Non-Profit Church Publications ───────
# Each brand has its own 501(c)(3) non-profit church
# Teacher brands: church aligns with teacher's tradition
# Non-teacher brands: church aligns with brand's wellness niche
us_model:
  entity_type: "501(c)(3) non-profit church publication"
  brands_per_corp: 1  # each brand has its own corp
  # Church names come from teacher_brand_map.yaml → church_name_us
  # Non-teacher church names: "{Brand Display Name} Fellowship"

