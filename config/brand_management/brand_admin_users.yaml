# ── Portal Access ─────────────────────────────────────────────────
# Each admin accesses their brand portal at:
#   catalog.phoenixprotocolbooks.com/{brand_id}
#
# Auth: magic link sent to admin_email
# Views:
#   /catalog — full catalog of all published titles
#   /weekly — current week's upload package
#   /weekly/{week_id} — specific week's package
#   /weekly/{week_id}/{platform} — platform-specific download
#
# Downloads: packaged by platform
#   /download/google_play — ebooks + metadata
#   /download/youtube — 10-min videos + thumbnails + metadata
#   /download/youtube_shorts — 60s portrait videos
#   /download/tiktok — 30-60s portrait videos
#   /download/instagram — 60s reels + captions
#   /download/line — 60-90s portrait (Japan/Taiwan/China only)
#
# All downloads are ZIP files containing platform-ready assets.
# Brand admins CANNOT modify content — read-only access.

# ── Plaid Revenue Collection ──────────────────────────────────────
# Monthly ACH: 4.8% from each brand admin's bank → Pearl Prime
#              4.8% from each brand admin's bank → 48 Social
# Brand admins authorize via Plaid Link (they connect their own bank).
# We never see their bank credentials — Plaid handles everything.
# Signed contracts authorize these recurring transfers.
plaid:
  client_id: ""              # PLAID_CLIENT_ID env var
  secret: ""                 # PLAID_SECRET env var
  environment: "sandbox"     # sandbox → development → production
  pearl_prime_bank:
    account_id: ""           # Pearl Prime receiving account (set in env)
    routing_number: ""
  forty_eight_social_bank:
    account_id: ""           # 48 Social receiving account (set in env)
    routing_number: ""
  monthly_percentage: 4.8    # 4.8% to each destination = 9.6% total
  transfer_day_of_month: 1   # 1st of each month
  minimum_transfer_usd: 1.00 # skip if amount < $1

portal:
  domain: "catalog.phoenixprotocolbooks.com"
  hosting: "cloudflare_pages"
  storage: "cloudflare_r2"
  auth_method: "magic_link"
  session_duration_hours: 168  # 7 days
  download_format: "zip"

  # ── Video Lifecycle ───────────────────────────────────────────────
  # MP4s are auto-uploaded to platforms by Pearl_Int + Pearl_GitHub.
  # After upload confirmation, MP4s are stored on Cloudflare R2 for
  # brand admin viewing during the week. At end of week (Sunday 23:59 UTC),
  # MP4 files are DELETED from R2 to save storage.
  # All other files (manifests, metadata, ebooks, thumbnails, captions)
  # persist indefinitely.
  video_lifecycle:
    auto_upload: true                    # Pearl_Int uploads to all platforms automatically
    upload_agents: ["pearl_int", "pearl_github"]
    storage_during_week: "cloudflare_r2" # viewable by brand admin during the week
    mp4_retention_days: 7                # delete MP4s after 7 days
    mp4_cleanup_schedule: "sunday_2359_utc"
    cleanup_pattern: "*.mp4"             # only MP4s — everything else persists
    persist_after_cleanup:
      - "*.json"      # manifests, metadata, platform variants
      - "*.csv"       # upload manifests
      - "*.epub"      # ebooks
      - "*.jpg"       # thumbnails, cover art
      - "*.png"       # thumbnails, cover art
      - "*.txt"       # prose, README
      - "*.srt"       # subtitles/captions
    upload_confirmation_required: true   # don't delete until platform confirms upload success
    cleanup_log: "artifacts/video/cleanup_log.jsonl"
  platforms_by_lane:
    en_US: [google_play, youtube, youtube_shorts, tiktok, instagram]
    ja_JP: [google_play, youtube, youtube_shorts, tiktok, instagram, line]
    ko_KR: [google_play, youtube, youtube_shorts, tiktok, instagram]
    zh_TW: [google_play, youtube, youtube_shorts, tiktok, instagram, line]
    zh_HK: [google_play, youtube, youtube_shorts, tiktok, instagram]
    zh_CN: [ximalaya, youtube_shorts, tiktok, instagram]  # no Google Play in China
    zh_SG: [google_play, youtube, youtube_shorts, tiktok, instagram]
    es_US: [google_play, youtube, youtube_shorts, tiktok, instagram]
    es_ES: [google_play, youtube, youtube_shorts, tiktok, instagram]
    fr_FR: [google_play, youtube, youtube_shorts, tiktok, instagram]
    de_DE: [google_play, youtube, youtube_shorts, tiktok, instagram]
    it_IT: [google_play, youtube, youtube_shorts, tiktok, instagram]
    hu_HU: [google_play, youtube, youtube_shorts, tiktok, instagram]
