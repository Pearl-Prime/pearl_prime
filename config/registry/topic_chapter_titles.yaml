# config/registry/topic_chapter_titles.yaml
# Phoenix Omega V4 — Topic Chapter Title Maps
# Thin topic layer: chapter titles + hook purposes per topic
# All 15 canonical topics including grief (for completeness)
#
# ch##.title     → chapter title (sounds like a real book chapter, not academic)
# ch##.hook_purpose → section_01 HOOK purpose line (for generator)
# Naming rules: specific mechanism, arc-role-matched, no prohibited terms
#
# Arc role reminder:
#   ch01=recognition  ch02=origin     ch03=pattern      ch04=mechanism
#   ch05=cost         ch06=turning_point ch07=first_practice ch08=difficulty
#   ch09=integration  ch10=relapse    ch11=identity     ch12=forward

---

