depth_modules:

  recognition_depth:
    description: "Makes early chapters feel emotionally accurate — naming patterns the reader already lives."
    chapter_affinity: [1, 2, 3]
    sources:
      - type: teacher_atom
        slot_types: [HOOK, SCENE]
        path_pattern: SOURCE_OF_TRUTH/teacher_banks/{teacher_id}/approved_atoms/{SLOT_TYPE}/*.yaml
        field: body
        total_available: 338
        avg_words: 27
      - type: persona_atom
        slot_types: [HOOK, SCENE]
        path_pattern: atoms/{persona_id}/{topic_id}/{SLOT_TYPE}/CANONICAL.txt
        total_available: 5817
        note: "Parsed into multiple atom blocks per file; effective per-pick length varies."
      - type: registry_variant
        section_types: [HOOK, SCENE]
        path_pattern: registry/{topic_id}.yaml
        variant_preference: [F2, F3, F4, F5]
        total_variants_aggregate: 1950
        avg_words: 37.0
    target_words_per_chapter: [200, 400]
    compatible_knobs:
      emotional_temperature: [neutral, warm]
      pacing_profile: [measured, slow]

  mechanism_depth:
    description: "Explains why the pattern runs — body-first and causal, not slogan-level."
    chapter_affinity: [3, 4, 5, 6, 8, 9]
    sources:
      - type: teacher_atom
        slot_types: [REFLECTION, COMPRESSION, TEACHING]
        total_available: 438
        avg_words: 36
      - type: registry_variant
        section_types: [REFLECTION, TEACHER_DOCTRINE]
        variant_preference: [F2, F3, F4, F5]
        total_variants_aggregate: 1929
        avg_words: 45.8
      - type: persona_atom
        slot_types: [STORY]
        path_pattern: atoms/{persona_id}/{topic_id}/*/CANONICAL.txt
        note: "Engine subdirs merge into STORY pool per phoenix_v4.planning.registry_resolver._load_persona_atoms"
    target_words_per_chapter: [300, 600]
    compatible_knobs:
      mechanism_depth: [light, medium, high]
      pacing_profile: [measured, slow]

  story_scene:
    description: "Human vividness — specific places, people, sensory detail."
    chapter_affinity: [1, 2, 3, 4, 7, 8]
    sources:
      - type: teacher_atom
        slot_types: [STORY, SCENE]
        total_available: 424
        avg_words: 120
      - type: persona_atom
        slot_types: [SCENE, STORY]
        path_pattern: atoms/{persona_id}/{topic_id}/*/CANONICAL.txt
      - type: registry_variant
        section_types: [SCENE, HOOK]
        variant_preference: [F2, F3]
        avg_words_scene: 46.5
    target_words_per_chapter: [200, 500]

  consequence_exposure:
    description: "Shows what the pattern costs — time, relationships, identity, health."
    chapter_affinity: [2, 3, 4, 5, 7, 8]
    sources:
      - type: teacher_atom
        slot_types: [REFLECTION, STORY]
        filter_note: "Prefer atoms whose body mentions cost, loss, price, debt, narrowing"
        total_available: 434
      - type: registry_variant
        section_types: [REFLECTION]
        filter_note: "Use purpose field in registry section metadata when present"
    target_words_per_chapter: [200, 400]

  somatic_detail:
    description: "Names body parts, sensations, and autonomic sequences."
    chapter_affinity: [3, 4, 5, 6, 7, 8, 9]
    sources:
      - type: exercise_atom
        source_path: SOURCE_OF_TRUTH/exercises_v4/approved
        file_count: 11
        avg_words: 420.2
      - type: teacher_atom
        slot_types: [EXERCISE]
        total_available: 237
        avg_words: 82
      - type: practice_library
        source_path: SOURCE_OF_TRUTH/practice_library/inbox
        exercise_count: 311
        loader: phoenix_v4.exercises.practice_library_loader.load_practice_library
    target_words_per_chapter: [100, 300]

  practice_scaffold:
    description: "Context, permission, instruction, observation, integration — not a bare imperative list."
    chapter_affinity: [5, 6, 7, 8, 9, 10, 11, 12]
    sources:
      - type: component_template
        source_path: config/pearl_practice/component_templates.yaml
        components:
          bridge: { lines: 12 }
          intro_mechanism: { pools: 9, lines_each: 12, total_lines: 108 }
          aha_observation: { pools: 9, lines_each: 12, total_lines: 108 }
          aha_permission: { lines: 12 }
          integration_takeaway: { pools: 9, lines_each: 12, total_lines: 108 }
          integration_closing: { lines: 12 }
      - type: phoenix_standard
        source_path: SOURCE_OF_TRUTH/exercises_v4/aha_noticing_phoenix_standard.yaml
      - type: phoenix_standard
        source_path: SOURCE_OF_TRUTH/exercises_v4/integration_phoenix_standard.yaml
    target_words_per_chapter: [200, 400]

  bridge_transition:
    description: "Pull-forward and thread-back between slots and chapters."
    chapter_affinity: all
    sources:
      - type: teacher_atom
        slot_types: [THREAD, INTEGRATION, PIVOT]
        total_available: 564
        avg_words: 21
      - type: component_template
        pool: bridge
        source_path: config/pearl_practice/component_templates.yaml
        lines: 12
      - type: exercise_bridge
        source_path: SOURCE_OF_TRUTH/exercises_v4/bridge_templates.yaml
    target_words_per_chapter: [60, 120]

  integration_landing:
    description: "Chapter landing — somatic close without preachiness."
    chapter_affinity: all
    sources:
      - type: phoenix_standard
        source_path: SOURCE_OF_TRUTH/exercises_v4/integration_phoenix_standard.yaml
      - type: teacher_atom
        slot_types: [INTEGRATION, TAKEAWAY]
        total_available: 364
        avg_words: 18
    target_words_per_chapter: [80, 150]

  witnessing_presence:
    description: "Being with, not fixing — holding grief, numbness, shame without rushing to technique."
    chapter_affinity: [1, 2, 3, 4, 5, 6]
    topic_restriction: [grief, depression, compassion_fatigue, burnout]
    sources:
      - type: teacher_atom
        slot_types: [PERMISSION, REFLECTION]
        total_available: 374
      - type: registry_variant
        section_types: [REFLECTION, HOOK]
        topic_note: "registry/grief.yaml variants are longest-form witnessing templates in pilot comparison"
        variant_preference: [F1, F2]
    target_words_per_chapter: [200, 500]

  persona_specificity:
    description: "Demographic and situational specificity — the reader feels named."
    chapter_affinity: [1, 2, 7, 8, 11, 12]
    sources:
      - type: persona_atom
        slot_types: [HOOK, SCENE, STORY]
        path_pattern: atoms/{persona_id}/{topic_id}/*/CANONICAL.txt
    target_words_per_chapter: [100, 300]

  teacher_voice:
    description: "Authorial doctrine, metaphor, and tradition — unmistakable voice."
    chapter_affinity: all
    sources:
      - type: teacher_atom
        slot_types: [COMPRESSION, TEACHING, HOOK, REFLECTION]
        total_available: 612
        avg_words: 31
      - type: registry_variant
        section_types: [TEACHER_DOCTRINE]
        total_variants_aggregate: 80
        avg_words: 34.5
    target_words_per_chapter: [100, 200]

# ─── Per-topic depth policy (all 15 registry topics) ───
topic_overrides:

  anxiety:
    depth_priority_early: [recognition_depth, story_scene, persona_specificity]
    depth_priority_mid: [mechanism_depth, somatic_detail, consequence_exposure]
    depth_priority_late: [practice_scaffold, integration_landing, bridge_transition]

  grief:
    depth_priority_early: [witnessing_presence, recognition_depth, story_scene]
    depth_priority_mid: [mechanism_depth, consequence_exposure, witnessing_presence]
    depth_priority_late: [practice_scaffold, integration_landing, persona_specificity]
    banned_early: [practice_scaffold, somatic_detail]
    # Spine: first real practice chapter_09; ch1–6 avoid "fix energy" (user depth spec).
    banned_chapters:
      practice_scaffold: [1, 2, 3, 4, 5, 6, 7, 8]
      somatic_detail: [1, 2, 3, 4, 5, 6]

  burnout:
