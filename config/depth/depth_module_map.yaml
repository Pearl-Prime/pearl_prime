# Depth module map — function-first index for EnrichmentSelect depth requests
# Authority: architecture + data inventory (not runtime — see docs/DEPTH_MODULE_PROTOCOL.md)
# Inventory snapshot: repo scan 2026-04-11 (see artifacts/audit/content_inventory_stats.md)

schema_version: 1
project_id: proj_state_convergence_20260328
description: >
  Maps depth functions to content sources. When a chapter is under the beatmap’s
  target word count, EnrichmentSelect (future) requests depth modules by function
  type. This file lists where material lives and measured availability.

repo_paths:
  teacher_banks_root: SOURCE_OF_TRUTH/teacher_banks
  teacher_atom_glob: "SOURCE_OF_TRUTH/teacher_banks/*/approved_atoms/{SLOT_TYPE}/*.yaml"
  persona_canonical_pattern: "atoms/{persona_id}/{topic_id}/{SLOT_TYPE}/CANONICAL.txt"
  persona_engine_story_pattern: "atoms/{persona_id}/{topic_id}/{engine}/CANONICAL.txt"
  registry_glob: registry/{topic_id}.yaml
  spine_fixtures: tests/fixtures/knob_apply/spines/{topic_id}_spine.yaml
  exercises_v4_approved: SOURCE_OF_TRUTH/exercises_v4/approved
  exercises_v4_bridge_templates: SOURCE_OF_TRUTH/exercises_v4/bridge_templates.yaml
  phoenix_standards:
    aha: SOURCE_OF_TRUTH/exercises_v4/aha_noticing_phoenix_standard.yaml
    integration: SOURCE_OF_TRUTH/exercises_v4/integration_phoenix_standard.yaml
  pearl_practice_components: config/pearl_practice/component_templates.yaml
  practice_library_inbox: SOURCE_OF_TRUTH/practice_library/inbox

