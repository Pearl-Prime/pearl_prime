# Machine-readable required status checks policy for main.
# This is the contract for workflows, docs, and live GitHub rulesets.
#
# Onboarding registry: scripts/ci/validate_onboarding_registry.py runs inside the
# required "Core tests" workflow on all PRs/pushes to main. Docs CI also runs
# the same validator when onboarding JSON/public proof paths change.
version: 2

# Canonical required checks for PR merge to main. This list MUST exactly equal the live
# "Protect main" ruleset's required_status_checks (scripts/ci/verify_github_governance.py
# --mode api asserts they match). Keep it minimal and non-path-filtered: a required check
# must report on EVERY PR to main or it deadlocks unrelated PRs, and deliberately-red phases
# (e.g. production-stack work where Core tests HARD_FAILs by design) must not block all merges.
#
# Held OUT of the gate on purpose (promote one to required_checks AND the ruleset only when it
# is BOTH non-path-filtered AND reliably green):
#   - "Core tests"    : green now, but HARD_FAILs by design during production-stack work
#   - "EI V2 gates"   : path-filtered (tests/test_ei_v2*) -- would deadlock non-EI PRs if required
#   - "Release gates" : currently RED on main (8/8 failure) -- fix before requiring
#
# 2026-04-17: "Change impact" removed after it stopped spawning jobs and blocked all merges.
# 2026-06-16: pared required_checks to the two non-path-filtered, reliably-green gates actually
#   enforced by the ruleset, and added "parse-sweep" (atoms CANONICAL.txt over-match guard).
required_checks:
  - "Verify governance"
  - "parse-sweep"

# At least one required check must be non-path-filtered (always reports). Both below are.
always_required:
  - "Verify governance"
  - "parse-sweep"

# Path-filtered checks may exist, but they are not canonical merge requirements.
path_filtered_optional:
  - "Teacher gates"
  - "Brand guards"
  - "EI V2 gates"

# Status checks repo automation intentionally treats as non-blocking.
non_blocking_checks:
  - "Workers Builds: pearl-prime"

# Legacy required-check contexts that must not remain in active rulesets.
forbidden_legacy_checks:
  - "change-impact"
  - "Change impact"

# Required contexts should come from GitHub Actions unless explicitly approved here.
allowed_required_integrations:
  - 15368
