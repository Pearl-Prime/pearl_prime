# Paid LLM API callers banned in production code paths (see allowed_llm_patterns.yaml).
version: 1
global_exempt_prefixes:
  - "tests/"
banned_patterns:
  anthropic_api_direct:
    regex: 'anthropic\s*\.\s*Anthropic\s*\(|Anthropic\s*\(\s*api_key\s*='
    reason: "Anthropic API is paid. Route via phoenix_v4.llm.router.route_llm (local) or operator Claude Code."
    exempt_paths:
      # Legacy slot engine AnthropicBackend — gated by config, not default path
      - "pearl_news/pipeline/slot_expansion_engine.py"
      # Operator tool for teacher content normalization — human-in-the-loop
      - "tools/teacher_mining/intake_normalize.py"
  anthropic_messages_create:
    regex: '\.messages\.create\s*\('
    reason: "Anthropic messages API is paid."
    exempt_paths:
      - "pearl_news/pipeline/slot_expansion_engine.py"
      - "tools/teacher_mining/intake_normalize.py"
  openai_api_cloud:
    # ACT-014: OpenAI Python package is the standard client for Ollama-compatible APIs.
    # Import alone is not a violation — only connections to cloud (api.openai.com / OPENAI_API_KEY).
    # All listed exemptions use OpenAI client pointed at local Ollama (QWEN_BASE_URL / GEMMA_BASE_URL).
    regex: '(from\s+openai\s+import\s+OpenAI|openai\.OpenAI\s*\()'
    reason: "OpenAI client must target local Ollama only (see line_allow_substrings and exempt_paths)."
    exempt_paths:
      - "phoenix_v4/llm/router.py"
      - "pearl_news/pipeline/llm_expand.py"
      - "pearl_news/pipeline/slot_expansion_engine.py"
      - "pearl_news/pipeline/slot_provider_qwen.py"
      - "scripts/localization/llm_client.py"
      - "scripts/research/run_research.py"
      - ".github/workflows/research-pipeline-run.yml"
      # SCOPED EXCEPTION (operator-approved 2026-07-21): the CJK
      # translation-quality program's DashScope Qwen3.7 Max / Qwen-MT
      # candidate client
      # (docs/agent_prompt_packs/20260721_zh_tw_translation_quality_program/)
      # goes through the EXISTING OpenAI-compatible-mode endpoint already
      # implemented in scripts/localization/llm_client.py
      # (DASHSCOPE_BASE_URL, called via the OpenAI Python SDK client class)
      # -- NOT the native DashScope SDK's synchronous chat classes (which
      # dashscope_paid_tier matches instead). That is why this exemption
      # lives here and not on dashscope_paid_tier. The immediate driving
      # use case is Mainland zh-CN translation (Qwen3.7 Max as primary
      # literary translator) -- NOT zh-TW-only, despite the pack's
      # directory name. This exemption is ONE file, cost-capped and
      # call-capped inside that module; every other DashScope/OpenAI-cloud
      # call site is still banned. Runtime stays gated by
      # PHOENIX_TRANSLATION_ALLOW_CLOUD=1 (off by default) in
      # scripts/localization/llm_client.py, unchanged by this entry.
      - "scripts/localization/translation_quality/candidates/dashscope_qwen_client.py"
    line_allow_substrings:
      - "ollama"
      - "11434"
      - "192.168.1.101"
      - "localhost"
      - "127.0.0.1"
      - "QWEN_BASE_URL"
      - "GEMMA_BASE_URL"
  google_genai:
    regex: 'google\.generativeai|genai\.GenerativeModel'
    reason: "Google AI API is paid."
    exempt_paths: []
  dashscope_paid_tier:
    # NOTE (2026-07-22): the CJK translation-quality program's DashScope
    # candidate client does NOT use this rule's native-SDK call shape --
    # it goes through the OpenAI-compatible-mode endpoint instead. See the
    # scoped exception on openai_api_cloud.exempt_paths above. This rule
    # is untouched/unexempted; any future native-SDK DashScope call site
    # is still fully banned.
    regex: 'dashscope\.(Generation|MultiModalConversation)'
    reason: "DashScope cloud SDK is paid."
    exempt_paths: []
  together_replicate_perplexity:
    regex: '(together|replicate|perplexity)\.(chat|completions|run|complete)'
    reason: "Third-party paid inference banned."
    exempt_paths: []
  cohere:
    regex: 'cohere\.Client\s*\('
    reason: "Cohere API is paid."
    exempt_paths: []
  mistral_api:
    regex: 'mistralai\.client\.MistralClient'
    reason: "Mistral API is paid."
    exempt_paths: []
  workflow_paid_key_injection:
    # Closes the gap where the audit only matched Python SDK call sites, not
    # GitHub Actions env injections of banned paid keys (CLAUDE.md LLM Tier Policy).
    # Tier-1 uses the Claude Code subscription CLI (no key); Tier-2 uses local
    # Gemma/Qwen on Pearl Star. Enforced key set = unambiguously paid, zero
    # legitimate workflow use. TOGETHER_API_KEY added 2026-07-10 (was the exact
    # violation in translate-bestseller-atoms.yml this gate was meant to catch;
    # see artifacts/qa/CI_WORKFLOW_BANNED_KEY_FIX_2026-07-10.md). DASHSCOPE_API_KEY
    # remains intentionally NOT listed: it is also the env var name used by 8
    # other workflows for legitimate Tier-2 Qwen access when QWEN_BASE_URL points
    # at Ollama, so a blanket ban here would need a per-workflow audit of actual
    # base_url resolution first, not a one-line regex change -- tracked as a
    # separate follow-up, not resolved by this fix.
    regex: '(CLAUDE_API_KEY|ANTHROPIC_API_KEY|OPENAI_API_KEY|GOOGLE_API_KEY|GEMINI_API_KEY|PERPLEXITY_API_KEY|COHERE_API_KEY|MISTRAL_API_KEY|REPLICATE_API_TOKEN|TOGETHER_API_KEY)\s*:\s*\$\{\{'
    reason: "Paid-LLM API key injected into a GitHub Actions workflow env. Banned paid keys must not be wired into .github/workflows/** (Tier-1 = Claude Code subscription CLI, no key; Tier-2 = local Gemma/Qwen). DashScope/Qwen Tier-2 keys are intentionally not listed (see comment above)."
