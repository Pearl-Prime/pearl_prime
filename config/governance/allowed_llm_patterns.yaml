# Documentation for operators — patterns explicitly approved for LLM routing.
# The audit scanner (audit_llm_callers.py) uses line_allow_substrings in banned rules,
# not this file directly. This file is human-readable documentation.
version: 1
allowed_patterns:
  gemma_via_ollama:
    regex: 'ollama.*?(gemma|gemma2|gemma3)'
    use_case: "Tier 2 English LLM — Gemma on Pearl Star Ollama (:11434)"
  qwen_via_ollama:
    regex: 'ollama.*?(qwen|qwen2|qwen3)'
    use_case: "Tier 2 CJK6 LLM — Qwen on Pearl Star Ollama (:11434)"
  phoenix_v4_router:
    path: "phoenix_v4/llm/router.py"
    use_case: "Canonical Tier 2 router. Imports OpenAI client pointed at Ollama, not openai.com."
  pearl_news_slot_engine:
    path: "pearl_news/pipeline/slot_expansion_engine.py"
    use_case: "Pearl News slot engine. OpenAI client pointed at Ollama for CJK6 + Gemma for EN."
