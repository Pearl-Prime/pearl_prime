  spotify:
    platform_id: spotify
    format_type: audiobook
    hard_min_seconds: 60
    hard_max_seconds: 86400
    sweet_spot_min_seconds: 14400   # was 18000 — bias the LOWER end (4–6 hr) for Spotify's casual 18–34 audience [S3][S6]
    sweet_spot_max_seconds: 21600   # 6 hr; 5–7 hr stays the cross-platform self-help default
    algo_notes: "Audiobook 4–6 hr bias (15 hr/mo at NORMAL speed → runtime scarce → shorter tryable; payout pro-rata on COMPLETED hours). Podcast 20–40 min (target 25–35; completion flat 10→45 min). Findaway ceased 2025-08-01 → INaudio + Spotify-for-Authors [S1][S3][S4][S7][A8]"
    monetization_threshold_seconds: 1200   # NOT a Spotify audiobook rule — Spotify discloses none; keep as an internal PODCAST-completion floor only [S5]
    podcast_sweet_spot_min_seconds: 1200   # 20 min
    podcast_sweet_spot_max_seconds: 2400   # 40 min (target 25–35) [S7][S8]
    sources: [S1, S3, S4, S5, S6, S7, S8]

  audible:
    platform_id: audible
    format_type: audiobook
    hard_min_seconds: 900   # technical floor only — NOT commercially sellable; real commercial floor = 3 hr (monetization_threshold) [A6][A7]
    hard_max_seconds: 86400
    sweet_spot_min_seconds: 18000   # 5 hr — VALIDATED self-help sweet spot [A4][A5]
    sweet_spot_max_seconds: 25200   # 7 hr
    algo_notes: "Self-help 5–7 hr. À-la-carte price is TIERED by finished hours (<1h $6.95 | 1–3h $14.95 | 3–5h $19.95 | 5–10h $24.95) → length sets royalty + consumption-pool weight. Shorts disadvantaged by credit/pool economics (NO official 'under-3hr' collection; a 33-min title = bottom tier, 'not worth a credit') [A1][A4][A6]"
    monetization_threshold_seconds: 10800   # 3 hr — the real go/no-go gate (VALIDATED) [A5][A6]
    royalty_model: "consumption_pool_2026-05-26 (excl 50% / non-excl 30%, weighted by à-la-carte price × engagement/completion) [A1]"
    sources: [A1, A4, A5, A6, A7]

