# ─── LADDER TIER → PLATFORM FIT (the cross-walk; NEW 2026-06-13) ─────────────
# Maps the merged honest 7-tier ladder (MARKETING_DURATION_TARGETS.md / PR #1550)
# to the surface each tier's LENGTH actually wins on. This is the missing SSOT:
# the ladder and the platform profiles above were never cross-walked before.
# verdict: win = the surface this tier is built for · marginal = listable-but-wrong-home · loser = structural miss
# Full reasoning + sources: DURATION_PER_PLATFORM_PLAN.md §1; meets/misses vs our REAL renders: DURATION_GAP_VERIFICATION.md §2.
ladder_tier_platform_fit:
  # en-US, words → audiobook_min(÷150) / print_pp(÷250)
  T1_quick_reset:   { words: 3500,  audio_min: 23,  print_pp: 14,  win: [podcast_episode, lead_magnet, youtube_shorts], marginal: [apple_ai_audiobook], loser: [kdp_full, audible, spotify_audiobook] }
  T2_mini:          { words: 4500,  audio_min: 30,  print_pp: 18,  win: [podcast_episode, lead_magnet],                marginal: [apple_ai_audiobook], loser: [kdp_full, audible, spotify_audiobook] }
  T3_short:         { words: 6000,  audio_min: 40,  print_pp: 24,  win: [podcast_episode, kdp_short_read],            marginal: [apple_ai_audiobook], loser: [audible, spotify_audiobook] }
  T4_one_hour:      { words: 9000,  audio_min: 60,  print_pp: 36,  win: [kdp_short_read, podcast_special],            marginal: [apple_ai_audiobook], loser: [audible, spotify_audiobook] }
  T5_standard:      { words: 22000, audio_min: 147, print_pp: 88,  win: [podcast_season],                             marginal: [kdp_short_read, audible, spotify_audiobook, apple_ai_audiobook], loser: [kdp_full] }
  T6_long_form:     { words: 30000, audio_min: 200, print_pp: 120, win: [audible_entry_3_5h, podcast_season],         marginal: [kdp_full, spotify_audiobook],                                    loser: [] }
  T7_complete:      { words: 52000, audio_min: 347, print_pp: 208, win: [kdp_full, audible, spotify_audiobook, apple_ai_audiobook, podcast_multiseason], marginal: [], loser: [] }
  notes: >
    Only T7 wins the flagship paid-book surfaces (full KDP 150–230pp + Audible 5–7h + Spotify 4–6h) simultaneously.
    T6 is the entry full-audiobook (Audible 3–5h tier). T1–T5 are podcast/short-read/lead-magnet/sample plays —
    structural losers as STANDALONE audiobooks (sub-3h Audible floor + bottom price tier). Our REAL renders are
    thin (~5k≈33min) to gold (~22k≈2.4h), so today NOTHING reaches T7 — the flagship 52k product is routed to the
    WRITING PROGRAM (real length, ≥70% completion, never padding). See CONTENT_LENGTH_TARGETS_FOR_WRITING_PROGRAM.md.

