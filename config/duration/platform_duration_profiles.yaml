# CDIS §4 — Platform duration profiles (hard bounds + sweet spots + notes).
# version 2 (2026-06-13, Pearl_Research): numbers validated/refreshed against 50+ current
# (2025–2026) cited sources + a tier→platform cross-walk added (ladder_tier_platform_fit).
# Provenance + every [K#]/[A#]/[S#]/[Y#]/[W#]/[C#] source key:
#   artifacts/research/duration_per_platform_20260613/PLATFORM_DURATION_SOURCES.md
# Plan + meets/misses verdict:
#   artifacts/research/duration_per_platform_20260613/{DURATION_PER_PLATFORM_PLAN,DURATION_GAP_VERIFICATION}.md
# DO-NOT-MERGE pending operator review of the platform-strategy/routing decision. CJK rows provisional
# (gate on a measured zh+ko render — Pearl Star CosyVoice2 currently off).
version: 2

platforms:
  youtube:
    platform_id: youtube
    format_type: video_long
    hard_min_seconds: 1
    hard_max_seconds: 43200
    sweet_spot_min_seconds: 480   # was 600 — 2026 educational/wellness sweet spot tightened to 8–15 min [Y6]
    sweet_spot_max_seconds: 900   # was 1200 — keep 1200 as extend-only ceiling gated on sustained ≥50% AVD [Y4][Y6]
    algo_notes: "8–15 min; watch-time × satisfaction layer (retention ≥50% AVD is the gate, raw watch-time alone 'dead' in 2026); mid-roll unlocks at 8 min"
    monetization_threshold_seconds: 480   # 8 min — VALIDATED unchanged 2026 [Y1][Y2]
    sources: [Y1, Y2, Y4, Y6]

  youtube_shorts:
    platform_id: youtube_shorts
    format_type: video_short
    hard_min_seconds: 1
    hard_max_seconds: 180   # was 60 — 3-min Shorts since 2024-10-15 [Y3]; the 1–3 min lane was unused at the old 60s cap
    sweet_spot_min_seconds: 15
    sweet_spot_max_seconds: 30   # 15–30s = completion-optimal (80%+); NOTE 30–60s = views-optimal (~22× vs <10s) [Y5]
    algo_notes: "15–30s completion-optimal; 30–60s views-optimal; hook = first ~15s; max 180s [Y3][Y5]"
    monetization_threshold_seconds: null
    sources: [Y3, Y5]

