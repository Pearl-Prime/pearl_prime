# CDIS §8 — Serialization cadence and series templates.
version: 1

episode_counts:
  manga_series_iyashikei:
    min_episodes: 36
    min_volumes: 6
    optimal_episodes: 60
    optimal_volumes: 10
    max_episodes: 200
  manga_series_shonen:
    min_episodes: 60
    optimal_episodes: 90
    max_episodes: 500
  webtoon_series:
    min_episodes: 25
    optimal_episodes: 50
    max_episodes: 250
  podcast_series:
    min_episodes: 6
    optimal_episodes: 18
    max_episodes: null
  video_series:
    min_episodes: 4
    optimal_episodes: 12
    max_episodes: null

cadence_by_platform:
  webtoon: {cadence: weekly, panel_drop: batch}
  kakao: {cadence: weekly}
  bilibili_comics: {cadence: weekly}
  youtube_long: {cadence: weekly_or_biweekly}
  youtube_shorts: {cadence: daily, uploads_per_day: [1, 3]}
  tiktok: {cadence: daily, uploads_per_day: [1, 3]}
  douyin: {cadence: daily, uploads_per_day: [1, 2]}
  instagram_reels: {cadence: daily}
  podcast: {cadence: weekly}
  podcast_micro: {cadence: weekdays}
  audiobook: {cadence: single_or_quarterly}

video_series_arc_template:
  season_episodes_min: 8
  season_episodes_max: 16
  setup_episodes: [1, 3]
  build_episodes: [4, 8]
  peak_ep_episodes: [9, 12]
  resolve_ep_episodes: [13, 16]
  between_seasons_weeks: [4, 8]
  bridge_shorts: [2, 3]

manga_serialization:
  weekly: {panels_typical: 50, chapters_per_volume: 6}
  biweekly: {panels_typical: 70}
  monthly: {panels_typical: 90}

iyashikei_overrides:
  max_breath_sequences: 6
  panels_per_page_typical: [3, 4]
