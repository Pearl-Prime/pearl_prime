# Social brand/author voice profiles — assembler lookup for deterministic_social.py
# Authority: docs/PEARL_SOCIAL_MEDIA_WRITER_AGENT_SPEC_2026-07-18.md § Brand/Author Vibe Extension
# Cap: SOCIAL-ATOM-BANK-VIBE-01
# Brand keys seeded from config/integrations/metricool_brands.yaml +
# config/brand_management/global_brand_registry_unified.yaml (real names only).
# Shape mirrors config/authoring/author_positioning_profiles.yaml (vulnerability_band /
# allowed_language / forbidden_language) plus social-specific display/CTA/sign-off fields.
#
# `universal` MUST reproduce pre-2026-07-21 assembler output when brand_id/author_id are unset.

schema_version: 1

