bio_blurb: >-
  Hana Tidecalm runs a small harbor on the edge of a town no one can quite find
  on a map. She brews tea that tastes like the moment before sleep and draws
  comics about the visitors who wash ashore — their stories of overwhelm, their
  slow permission to rest. Her pages have more silence than words, and that's
  the point.

