bio_blurb: >-
  陈星河是一位游历四方的修炼者，曾在昆仑山中闭关三年。他把突破境界时看到的景象画成
  漫画——那些星辰翻涌的画面，那些虚空中的寂静，那些从崩溃中重生的瞬间。他说，修炼
  的本质不是变强，而是学会在疲惫中找到自己。

