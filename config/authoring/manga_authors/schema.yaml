# Manga Author Identity System — Canonical Schema
# Version: 1.0
#
# Manga authors are EI (Enlightened Intelligence) character-authors.
# They are NOT pen name authors (pen_name_teacher_profiles.yaml).
# Each manga author IS a character in the genre world, with a name derived
# from the intersection of: manga genre x target persona demographics x
# locale x therapeutic topic x brand metadata.
#
# EI authorship is a feature: full disclosure, positioned as novel/transparent.

schema_version: "1.0"
schema_id: manga_author_profile

required_fields:
  - author_id          # snake_case unique identifier (e.g. "luna_wavecrest_en_us_001")
  - display_name       # locale-aware display name (e.g. "Luna Wavecrest" / "月影 靜" / "星河 悠")
  - genre_tie_in       # genre the author persona belongs to (iyashikei, seinen, shonen, josei, etc.)
  - ei_disclosure_text # full EI disclosure string, locale-appropriate
  - brand_id           # brand from brand_registry.yaml (e.g. "stillness_press")
  - target_demographic # primary persona demographic tag (e.g. "millennial_women_professionals")
  - visual_style_notes # how this author's "style" maps to brand visual DNA
  - bio_blurb          # 2-4 sentence character bio, in locale language

optional_fields:
  - locale             # BCP-47 locale tag (e.g. "en_US", "zh_TW", "ja_JP")
  - therapeutic_topic  # primary therapeutic topic (e.g. "anxiety", "burnout", "grief")
  - persona_archetype  # genre-world archetype (e.g. "wandering healer", "retired mecha pilot")
  - secondary_genres   # list of secondary genre affinities
  - name_origin_note   # explains how the name ties to genre world
  - created_at         # ISO 8601 timestamp
  - status             # active | deprecated | candidate

field_constraints:
  author_id:
    pattern: "^[a-z][a-z0-9_]{3,63}$"
    unique_across: "all manga author profiles"
  display_name:
    min_length: 2
    max_length: 64
    must_not_collide_with: "pen_name_teacher_profiles.yaml display_name values"
  genre_tie_in:
    enum:
      - iyashikei
      - seinen
      - shonen
      - shojo
      - josei
      - sports
      - horror
      - slice_of_life
      - cultivation
      - manhwa_psychological
      - webtoon_romance
      - isekai
      # -- reconciled genre shells appended 2026-06-20: mirror
      #    schemas/manga/series_plan.schema.json (v2.1) per
      #    MANGA_CATALOG_RECONCILIATION_SPEC §4.1; mecha per OQ-1 / D-9 --
      - dark_fantasy
      - psychological_horror
      - supernatural_mystery
      - sci_fi_cyberpunk
      - psychological_thriller
      - romance_josei_drama
      - workplace_drama
      - action_battle
      - sports_competition
      - historical_period
      - cultivation_martial
      - school_coming_of_age
      - mecha
      - manhwa
      - josei_essay_manga
  ei_disclosure_text:
    min_length: 20
    must_contain_concept: "created by AI / enlightened intelligence"
  brand_id:
    must_exist_in: "config/brand_registry.yaml brands.*"
  target_demographic:
    examples:
      - millennial_women_professionals
      - gen_z_professionals
      - tech_finance_burnout
      - anxious_millennials_urban
      - burnout_professionals
  visual_style_notes:
    min_length: 10
    should_reference: "brand visual DNA parameters"

anti_collision_rules:
  - rule: no_manga_author_name_matches_pen_name_author
    check: display_name NOT IN pen_name_teacher_profiles.yaml[*].display_name
  - rule: no_duplicate_name_within_brand
    check: "unique(display_name) per brand_id"
  - rule: no_duplicate_author_id
    check: "unique(author_id) across all manga author profiles"
