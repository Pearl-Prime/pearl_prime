      spiral: You keep re-deciding how to start because beginning badly feels worse than not beginning at all.
      overwhelm: You keep adding tasks to the front of the line because a started thing can finally be judged.
    destabilize_strategy:
      spiral: Planning the perfect approach has never gotten the thing done; it only postponed the verdict.
    grounded_reframe:
      spiral: Procrastination isn't laziness; it's a nervous system protecting you from a feeling, not a task.
  perfectionism:
    establish_mask:
      comparison: You polish endlessly because a finished thing can be ranked, and an unfinished one is still safe.
    reveal_hidden_belief:
