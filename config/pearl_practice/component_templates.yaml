# Universal permission phrases (rotate across all types)
aha_permission:
  - "Or not. Both are fine."
  - "Whatever came up is valid."
  - "There is no wrong answer."
  - "That is useful information."
  - "You do not have to interpret it."
  - "Nothing needs to change right now."
  - "Noticing is enough."
  - "What you feel is what you feel."
  - "You can set it down after this."
  - "Stay with it as long as it is useful."
  - "It does not have to make sense yet."
  - "That counts."

