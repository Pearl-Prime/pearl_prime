# Exercise Component Templates — 5 dimensions of variation
# Assembled at runtime: bridge[i] + intro_template(name, mechanism[j]) + description + aha_template(obs[k], perm[l]) + integration_template(takeaway[m], closing[n])
# 12 exercises per book, each picks unique indices to never repeat

schema_version: "1.0.0"

# ─────────────────────────────────────────────────────────────
# BRIDGE — invitation to pause (universal, not type-specific)
# Rotate 1 per chapter. Never repeat in same book.
# ─────────────────────────────────────────────────────────────
bridge:
  - "Try this before you move on."
  - "Pause here for a moment."
  - "Put the book down."
  - "Before you keep reading."
  - "Stop here."
  - "This one is for your body."
  - "Do this one out loud."
  - "Close the book for this."
  - "Just thirty seconds."
  - "Your body needs this one."
  - "This is the practice."
  - "Right now. Not later."

# ─────────────────────────────────────────────────────────────
# INTRO MECHANISMS — one fact about why (per exercise type)
# Template: "This is {exercise_name}. {mechanism}."
# ─────────────────────────────────────────────────────────────
intro_mechanism:
  body_awareness:
    - "Your body holds what your mind skipped."
    - "Attention is the first step."
    - "Notice before you fix."
    - "Your body already knows."
    - "The body keeps score in real time."
    - "Sensation is information, not a problem."
    - "Awareness changes what you feel."
    - "Your body speaks first. You listen second."
    - "You cannot fix what you cannot feel."
    - "The body is always doing something. Pay attention."
    - "Checking in costs nothing."
    - "Your nervous system updates when you notice it."
  sensory_grounding:
    - "Your senses are always in the present."
    - "When your mind spins, your body is still here."
    - "Sensation pulls you back."
    - "The room is real. Start there."
    - "Five senses. Any one will do."
    - "Your feet are on the floor right now."
    - "What you can touch is always available."
    - "Temperature is a fast anchor."
    - "Sound brings you back without effort."
    - "The present is the only place your senses work."
    - "Texture is enough to land."
    - "Your skin knows where you are."
  meditations:
    - "Not to empty your mind. Just to rest it."
    - "One thing to focus on. That is enough."
    - "Your breath is always available."
    - "Stillness is not doing nothing."
    - "You do not need silence for this to work."
    - "Thoughts will come. Let them pass."
    - "The practice is returning, not staying."
    - "A wandering mind is not a failing mind."
    - "Less effort works better here."
    - "You are already doing it by starting."
    - "Presence does not require perfection."
    - "The body rests when the mind gets a focal point."
  affirmations:
    - "Words to sit with. Not to force."
    - "Let them land where they can."
    - "You do not have to believe them yet."
    - "Say them. See what sticks."
    - "Repetition changes the wiring gradually."
    - "The resistance is where the work is."
    - "You are not performing. You are practicing."
    - "Words change what you reach for first."
    - "Belief is optional. Saying it is not."
    - "The mind follows the words over time."
    - "One true sentence is enough."
    - "Some of these will feel wrong. That is fine."
  reflections:
    - "Notice. Do not analyze."
    - "See what is already there."
    - "No right answer."
    - "Just look."
    - "Observation before interpretation."
    - "The honest answer is the useful one."
    - "What comes up quickly is often most true."
    - "You are not solving anything here."
    - "Reflection is not criticism."
    - "Stay curious. Drop the verdict."
    - "You are looking, not judging."
    - "What is present is data."
  self_inquiry:
    - "Hold the question. Do not answer it."
    - "Let it sit."
    - "Curiosity, not conclusion."
    - "The discomfort is the data."
    - "A good question does not need a fast answer."
    - "Sit with not-knowing."
    - "The question changes you before the answer does."
    - "What you avoid tells you something."
    - "Inquiry is not interrogation."
    - "You are allowed to be unsure."
    - "Some questions are meant to stay open."
    - "The answer that comes too fast is rarely the real one."
  integration_bridges:
    - "Connect what you read to what you do."
    - "Insight without action fades."
    - "The bridge is one step."
    - "Bring it with you."
    - "Reading changes nothing. Doing changes something."
    - "One small shift is a real shift."
    - "You already know what the step is."
    - "The gap between knowing and doing is small."
    - "Carry one idea into the next hour."
    - "Integration is not a big project."
    - "What you practice becomes what you do."
    - "The real work starts here."
  thought_experiments:
    - "No wrong answers."
    - "Follow where it goes."
    - "Your imagination knows things your logic does not."
    - "Play with this."
    - "A different frame changes everything."
    - "Try it on before you decide."
    - "Imagine without committing."
    - "What if changes what seems fixed."
    - "Thought experiments are free."
    - "Your mind will show you something useful."
    - "Exploring is not deciding."
    - "Give it the full thirty seconds."
  breath_regulation:
    - "Your breath changes your nervous system directly."
    - "The exhale is where the reset lives."
    - "Follow the count. Your body does the rest."
    - "This works whether you believe it or not."
    - "Slower breath, slower signal to the brain."
    - "The exhale activates the parasympathetic."
    - "Your lungs and your nervous system are connected."
    - "Breath is the only autonomic function you can control."
    - "Counting gives your mind something to do."
    - "One full exhale is enough to shift something."
    - "The body follows the breath, not the other way."
    - "You can do this anywhere, anytime."

