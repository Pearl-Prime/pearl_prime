# Pearl Practice — 5-Dimension Exercise Composition System
# Any exercise = dim1 + dim2 + dim3 + dim4 + dim5
# 12 exercises per book, each a unique combination

schema_version: "1.0.0"

# ─────────────────────────────────────────────────────────────
# DIM 1: CONTEXT TRIGGER — what happened / what's ahead
# Persona-specific. Each persona gets 12-15 contexts.
# ─────────────────────────────────────────────────────────────
dim1_context:
  corporate_managers:
    - "You have a meeting coming up."
    - "You just got off a difficult call."
    - "Your inbox is full."
    - "The deadline is tomorrow."
    - "Someone questioned your decision."
    - "You made a mistake at work."
    - "The reorg was just announced."
    - "You're sitting in traffic."
    - "The presentation is in ten minutes."
    - "You got passed over."
    - "Your team is struggling."
    - "The day is done but your body doesn't know."

  healthcare_rns:
    - "The shift is over."
    - "You lost a patient."
    - "The family is waiting for news."
    - "You've been on your feet for twelve hours."
    - "You just coded someone."
    - "The break room is empty."
    - "Another admission is coming."
    - "You witnessed something hard today."
    - "Your replacement is late."
    - "You carried someone's pain home."
    - "The alarm just went off again."
    - "You're in the parking lot and can't move."

  gen_z_professionals:
    - "Your Slack won't stop."
    - "Everyone online looks like they have it figured out."
    - "You compared yourself again."
    - "The job posting said three years experience."
    - "You don't know what you're doing."
    - "Your screen time report just hit eight hours."
    - "The group chat is stressing you out."
    - "You got a rejection email."
    - "You're doom scrolling and you know it."
    - "Sunday night dread is here."
    - "You don't want to go back tomorrow."
    - "Someone gave you feedback that stung."

  first_responders:
    - "The call just ended."
    - "You saw something you can't unsee."
    - "You're back in the truck."
    - "Shift change in five minutes."
    - "Your partner is having a bad day too."
    - "You just told a family the worst news."
    - "The adrenaline is wearing off."
    - "You're sitting in the station."
    - "You can't talk about what happened."
    - "Everyone is acting normal and you're not."
    - "Another call is coming in."
    - "You're home but you're not home."

  entrepreneurs:
    - "The numbers don't add up."
    - "Your co-founder disagrees."
    - "The investor said no."
    - "You're working alone at midnight."
    - "Cash runway is getting short."
    - "You haven't taken a day off in weeks."
    - "A competitor launched first."
    - "Your team is counting on you."
    - "The pitch is tomorrow."
    - "You don't know if this will work."
    - "You're pretending everything is fine."
    - "The decision is yours alone."

  working_parents:
    - "The kids are finally asleep."
    - "You forgot something important."
    - "Morning routine just fell apart."
    - "You're late again."
    - "Bedtime was a disaster."
    - "You yelled and you didn't mean to."
    - "There's no time for yourself."
    - "School called during your meeting."
    - "You feel like you're failing at everything."
    - "The house is a mess and you don't care."
    - "You haven't eaten today."
    - "Everyone needs something from you."

  nyc_executives:
    - "The board wants answers."
    - "Your calendar has no gaps."
    - "The quarterly numbers are out."
    - "You're performing confidence you don't feel."
    - "The market shifted overnight."
    - "Another dinner you'll miss."
    - "The elevator is closing and you're alone."
    - "Your assistant knows more about your life than you do."
    - "You forgot your kid's game."
    - "The flight is delayed and you can't stop."
    - "Three time zones in two days."
    - "You're successful and you're empty."

  gen_alpha_students:
    - "The test is tomorrow."
    - "You got a bad grade."
    - "Your friends are being weird."
    - "Social media made you feel small."
    - "You don't fit in."
    - "Your parents are fighting."
    - "You're in trouble and it's unfair."
    - "Everyone seems to know the answer but you."
    - "You feel invisible."
    - "The group project is stressing you out."
    - "You cried and you don't know why."
    - "You're tired of pretending to be fine."

  educators:
    - "The classroom was chaos today."
    - "A student said something that cut deep."
    - "Parent emails are piling up."
    - "You're grading at midnight again."
    - "You lost your patience today."
    - "The system is broken and you're still in it."
    - "Another initiative with no support."
    - "You care more than the institution does."
    - "A student is struggling and you can't fix it."
    - "The bell rang and you're not ready."
    - "You went home and couldn't stop thinking."
    - "You're questioning why you do this."

  tech_finance_burnout:
    - "You've been staring at screens for ten hours."
    - "The deploy broke at 2 AM."
    - "Your RSUs aren't worth what they promised."
    - "Sprint planning feels pointless."
    - "You got a ping from your manager at 11 PM."
    - "The codebase is a mess and nobody cares."
    - "You're golden handcuffed and miserable."
    - "Another all-hands that says nothing."
    - "Your eyes hurt."
    - "You can't remember the last time you went outside."
    - "The stock dropped and so did your mood."
    - "You automated everything except your feelings."

  gen_x_sandwich:
    - "Your parent needs help again."
    - "Your kid needs help too."
    - "You're the one holding it all together."
    - "The doctor called about your mom."
    - "College tuition and elder care in the same month."
    - "Nobody asks how you're doing."
    - "You're exhausted in a way sleep doesn't fix."
    - "You drove two hours to help and two hours back."
    - "Your spouse needs you too."
    - "You forgot to eat again."
    - "The guilt of not being enough for everyone."
    - "You're disappearing into other people's needs."

  millennial_women_professionals:
    - "You said yes when you meant no."
    - "You're the only woman in the room."
    - "Someone took credit for your work."
    - "You're smiling through it."
    - "The performance review didn't match your effort."
    - "You're exhausted from being excellent."
    - "Your body is telling you to slow down."
    - "You compared your life to hers again."
    - "The emotional labor is invisible."
    - "You're carrying the team and nobody sees it."
    - "You need rest but you feel guilty resting."
    - "You haven't cried in a while and you need to."

# ─────────────────────────────────────────────────────────────
# DIM 2: BODY SIGNAL — how the body is reacting (universal)
# ─────────────────────────────────────────────────────────────
dim2_body_signal:
  - "Your body already knows."
  - "Your shoulders are up."
  - "Your jaw is tight."
  - "Your chest feels heavy."
  - "Your hands are cold."
  - "Your stomach is clenched."
  - "Your breathing is shallow."
  - "You're holding your breath."
  - "Your back aches."
  - "Your face is hot."
  - "Your hands are shaking."
  - "Your throat is tight."
  - "Your legs feel restless."
  - "Your head is pounding."
  - "Your whole body is tense."

# ─────────────────────────────────────────────────────────────
# DIM 3: ENTRY POINT — how we begin (universal, from bank)
# ─────────────────────────────────────────────────────────────
dim3_entry:
  - "Close your eyes."
  - "Stand up."
  - "Sit down."
  - "Put both feet on the floor."
  - "Place your hands on your thighs."
  - "Look out the window."
  - "Find a wall and lean against it."
  - "Put your phone down."
  - "Lie down."
  - "Stop."

# ─────────────────────────────────────────────────────────────
# DIM 4: CORE TECHNIQUE — somatic method (bank sequences)
# Each technique is a sequence of bank sentences.
# ─────────────────────────────────────────────────────────────
dim4_technique:
  box_breathing:
    sentences:
      - {text: "Breathe in.", pause_s: 4}
      - {text: "Count to four.", pause_s: 4}
      - {text: "Breathe out.", pause_s: 4}
      - {text: "Count to four.", pause_s: 4}
      - {text: "Repeat three times.", pause_s: 15}

  extended_exhale:
    sentences:
      - {text: "Breathe in.", pause_s: 4}
      - {text: "Count to four.", pause_s: 1}
      - {text: "Breathe out.", pause_s: 6}
      - {text: "Count to six.", pause_s: 1}
      - {text: "Repeat five times.", pause_s: 20}

  body_scan:
    sentences:
      - {text: "Feel your feet.", pause_s: 5}
      - {text: "Feel your legs.", pause_s: 5}
      - {text: "Feel your stomach.", pause_s: 5}
      - {text: "Feel your chest.", pause_s: 5}
      - {text: "Feel your hands.", pause_s: 5}
      - {text: "Feel your face.", pause_s: 5}
      - {text: "Feel your whole body.", pause_s: 8}

  grounding_press:
    sentences:
      - {text: "Press your feet into the floor.", pause_s: 5}
      - {text: "Feel the pressure.", pause_s: 5}
      - {text: "Push harder.", pause_s: 4}
      - {text: "Hold it.", pause_s: 6}
      - {text: "Release.", pause_s: 8}

  progressive_tension:
    sentences:
      - {text: "Make fists.", pause_s: 3}
      - {text: "Squeeze tight.", pause_s: 4}
      - {text: "Hold it.", pause_s: 5}
      - {text: "Release.", pause_s: 8}
      - {text: "Feel the difference.", pause_s: 5}

  self_touch:
    sentences:
      - {text: "Place your hand on your chest.", pause_s: 6}
      - {text: "Feel your heartbeat.", pause_s: 8}
      - {text: "Hold it.", pause_s: 10}
      - {text: "You are here.", pause_s: 5}

  discharge:
    sentences:
      - {text: "Shake your hands.", pause_s: 4}
      - {text: "Shake your arms.", pause_s: 4}
      - {text: "Shake your whole body.", pause_s: 6}
      - {text: "Stop.", pause_s: 8}
      - {text: "Feel the stillness.", pause_s: 6}

  sensory_grounding:
    sentences:
      - {text: "Look around.", pause_s: 3}
      - {text: "Name one thing you see.", pause_s: 4}
      - {text: "Name one thing you hear.", pause_s: 4}
      - {text: "Name one thing you feel.", pause_s: 4}
      - {text: "You are here.", pause_s: 5}

  physiological_sigh:
    sentences:
      - {text: "Breathe in through your nose.", pause_s: 2}
      - {text: "Breathe in again on top of that.", pause_s: 2}
      - {text: "Now let it all out through your mouth.", pause_s: 6}
      - {text: "Repeat three times.", pause_s: 15}

  cold_grounding:
    sentences:
      - {text: "Find something cold.", pause_s: 3}
      - {text: "Hold it in your hands.", pause_s: 5}
      - {text: "Feel the cold.", pause_s: 6}
      - {text: "Notice the sensation.", pause_s: 5}
      - {text: "Let it wake you up.", pause_s: 5}

  vagal_humming:
    sentences:
      - {text: "Close your mouth.", pause_s: 2}
      - {text: "Hum.", pause_s: 6}
      - {text: "Feel the vibration in your chest.", pause_s: 5}
      - {text: "Hum again.", pause_s: 6}
      - {text: "Feel your throat.", pause_s: 5}
      - {text: "One more time.", pause_s: 8}

  butterfly_hug:
    sentences:
      - {text: "Cross your arms over your chest.", pause_s: 4}
      - {text: "Tap your left shoulder.", pause_s: 3}
      - {text: "Tap your right shoulder.", pause_s: 3}
      - {text: "Alternate slowly.", pause_s: 8}
      - {text: "Keep going.", pause_s: 8}
      - {text: "Stop.", pause_s: 6}

  grounding_walk:
    sentences:
      - {text: "Stand up.", pause_s: 3}
      - {text: "Take one step.", pause_s: 4}
      - {text: "Feel your foot hit the floor.", pause_s: 5}
      - {text: "Take another step.", pause_s: 5}
      - {text: "Slow down.", pause_s: 4}
      - {text: "Feel each step.", pause_s: 8}

  jaw_release:
    sentences:
      - {text: "Open your mouth wide.", pause_s: 4}
      - {text: "Hold it.", pause_s: 4}
      - {text: "Close slowly.", pause_s: 4}
      - {text: "Massage your jaw.", pause_s: 6}
      - {text: "Release.", pause_s: 6}

  orienting:
    sentences:
      - {text: "Slowly look to your left.", pause_s: 5}
      - {text: "Now slowly look to your right.", pause_s: 5}
      - {text: "Look up.", pause_s: 4}
      - {text: "Look down.", pause_s: 4}
      - {text: "Find one thing that is still.", pause_s: 6}

  stretching:
    sentences:
      - {text: "Raise your arms overhead.", pause_s: 4}
      - {text: "Stretch.", pause_s: 6}
      - {text: "Hold it.", pause_s: 5}
      - {text: "Lower your arms slowly.", pause_s: 5}
      - {text: "Feel the blood flow.", pause_s: 6}

  containment:
    sentences:
      - {text: "Imagine a container.", pause_s: 5}
      - {text: "Any shape. Any size.", pause_s: 4}
      - {text: "Put the feeling inside it.", pause_s: 6}
      - {text: "Close the lid.", pause_s: 5}
      - {text: "It is held. Not gone. Held.", pause_s: 8}

  pendulation:
    sentences:
      - {text: "Notice where the tension is.", pause_s: 5}
      - {text: "Now find a place that feels okay.", pause_s: 6}
      - {text: "Go back to the tension.", pause_s: 5}
      - {text: "Now back to the okay place.", pause_s: 6}
      - {text: "Move between them.", pause_s: 8}
      - {text: "Notice what happens.", pause_s: 8}

# ─────────────────────────────────────────────────────────────
# DIM 5: LANDING — how it ends (topic-specific)
# ─────────────────────────────────────────────────────────────
dim5_landing:
  anxiety:
    - "The alarm is just information."
    - "You are safe right now."
    - "Your body did its job."
    - "Nothing terrible happened."
  grief:
    - "That is enough."
    - "You showed up."
    - "The pain is proof you cared."
    - "There is no rush."
  burnout:
    - "The work will wait."
    - "Rest is not weakness."
    - "You have done enough today."
    - "You are more than your output."
  depression:
    - "You moved. That counts."
    - "Small is enough."
    - "You are still here."
    - "That took something. Honor it."
  self_worth:
    - "You matter."
    - "You are enough."
    - "You belong here."
    - "That is yours. Keep it."
  boundaries:
    - "That took courage."
    - "A boundary is not cruelty."
    - "You are allowed to say no."
    - "Your needs are real."
  imposter_syndrome:
    - "You earned this."
    - "You are not a fraud."
    - "Your work is real."
    - "You belong in that room."
  compassion_fatigue:
    - "This is not yours to hold."
    - "Caring has a cost. Honor it."
    - "You gave enough today."
    - "Refill before you pour."
  overthinking:
    - "The thought is not a fact."
    - "You can put it down."
    - "Your mind will quiet."
    - "Not every thought needs attention."
  courage:
    - "You did the hard thing."
    - "Fear is not a stop sign."
    - "You are braver than you feel."
    - "That was real."
  sleep_anxiety:
    - "Your body knows how to sleep."
    - "The day is over."
    - "You are safe in this bed."
    - "Let gravity hold you."
  financial_stress:
    - "The number is just a number."
    - "You are not your bank account."
    - "One step at a time."
    - "You can figure this out."
  financial_anxiety:
    - "The worry is not the truth."
    - "You have survived hard things."
    - "The math will still be there tomorrow."
    - "Your worth is not your net worth."
  social_anxiety:
    - "You don't owe anyone a performance."
    - "Being quiet is allowed."
    - "You showed up. That is enough."
    - "Not everyone is watching."
  somatic_healing:
    - "Your body is wise."
    - "The sensation is just information."
    - "You are safe to feel this."
    - "Trust what your body knows."
  default:
    - "You are here."
    - "That is enough."
    - "Nothing is broken."
    - "You showed up."
