# Pearl Practice — Pointer phrases for guided therapeutic audio.
# Inserted between exercise instructions to pace the practice.

schema_version: "1.0.0"

opening:
  - "Find a comfortable position."
  - "When you're ready, let your eyes close gently."
  - "Take a slow breath in. And let it go."
  - "There is nowhere else you need to be right now."
  - "Allow yourself to arrive in this moment."

transition:
  - "Now gently shift your attention."
  - "When you're ready, move on."
  - "Notice the shift."
  - "Let that settle."
  - "And now."

deepening:
  - "Go a little deeper."
  - "Let yourself sink into this."
  - "With each breath, soften a little more."
  - "You're doing beautifully."
  - "There is nothing to force."

grounding:
  - "Feel the ground beneath you."
  - "Notice where your body is supported."
  - "You are here. You are safe."
  - "Come back to the breath."
  - "Just this moment."

processing:
  - "Take a moment with that."
  - "Let this land."
  - "Really feel this."
  - "Stay here for a moment."
  - "There is no rush."
  - "Just notice what comes up."
  - "Whatever you feel is welcome."

completion:
  - "When you're ready, gently bring your attention back."
  - "Take one more breath."
  - "Slowly begin to return to the room."
  - "You did something brave just now."
  - "Carry this with you."

# Topic-specific pointers
anxiety_specific:
  - "The alarm is just information."
  - "You don't have to follow the thought."
  - "Your body is safe right now."
  - "Notice without reacting."

grief_specific:
  - "This is allowed."
  - "Your feelings are welcome here."
  - "There is no right way to grieve."
  - "Let the sadness be what it is."

somatic_specific:
  - "What does your body want to tell you?"
  - "Just track the sensation. Don't fix it."
  - "Where do you feel it most?"
  - "Breathe into that space."

depression_specific:
  - "You showed up. That matters."
  - "Small is enough."
  - "This heaviness is not permanent."
  - "One breath at a time."

burnout_specific:
  - "You have permission to stop."
  - "Rest is not weakness."
  - "Let the doing go."
  - "You've done enough today."
