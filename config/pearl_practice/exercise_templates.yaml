# -------------------------------------------------------------------
# BREATHING TECHNIQUE SPECS
# Exact second-by-second timing for named techniques.
# -------------------------------------------------------------------
breathing_techniques:
  physiological_sigh:
    description: "Double inhale through nose, long exhale through mouth"
    inhale_1_seconds: 2
    inhale_2_seconds: 1.5
    exhale_seconds: 4
    total_per_cycle: 7.5
    recommended_cycles: 2
    source: "Huberman Lab 2023, Cell Reports Medicine"

  box_breathing:
    description: "Equal inhale, hold, exhale, hold"
    inhale_seconds: 4
    hold_1_seconds: 4
    exhale_seconds: 4
    hold_2_seconds: 4
    total_per_cycle: 16
    recommended_cycles: 4
    source: "Navy SEAL tactical breathing protocol"

  four_seven_eight:
    description: "Extended exhale for parasympathetic activation"
    inhale_seconds: 4
    hold_seconds: 7
    exhale_seconds: 8
    total_per_cycle: 19
    recommended_cycles: 3
    source: "Andrew Weil MD"

  extended_exhale:
    description: "Simple 4-count in, 6-count out"
    inhale_seconds: 4
    exhale_seconds: 6
    total_per_cycle: 10
    recommended_cycles: 3
    source: "General parasympathetic activation research"

# -------------------------------------------------------------------
# PMR (Progressive Muscle Relaxation) SPECS
# -------------------------------------------------------------------
pmr:
  tense_duration_seconds: 5
  release_duration_seconds: 10
  muscle_groups_short:
    - feet_and_calves
    - hands_and_forearms
    - shoulders
    - face_and_jaw
  muscle_groups_full:
    - toes
    - calves
    - thighs
    - belly
    - hands
    - forearms
    - shoulders
    - neck
    - face_jaw
  source: "Meta-analysis 2026: Cohen's d = 1.74 on sleep quality"

# -------------------------------------------------------------------
# SSML PAUSE MAP (milliseconds)
# Map from pause_type to SSML break values.
# These are the raw values BEFORE modifiers.
# -------------------------------------------------------------------
ssml_pause_map:
  breathing_count: 3500
  breathing_aware: 4500
  body_awareness_specific: 6000
  body_awareness_open: 8000
  emotional_processing: 8000
  grounding_sensory: 3500
  movement: 4500
  permission_validation: 5000
  closing: 3500
  inter_sentence: 500

# -------------------------------------------------------------------
# TTS WORD AVOIDANCE LIST
# Words that TTS engines mispronounce or that break therapeutic tone.
# -------------------------------------------------------------------
tts_avoid_words:
  - word: diaphragm
    replacement: belly
  - word: sacrum
    replacement: lower back
  - word: sternum
    replacement: center of your chest
  - word: parasympathetic
    replacement: calming response
  - word: vagus
    replacement: calming nerve
  - word: titration
    replacement: a little at a time
  - word: dysregulated
    replacement: overwhelmed
  - word: somatic
    replacement: null  # omit entirely
  - word: mindfulness
    replacement: noticing

# -------------------------------------------------------------------
# INSTRUCTION STYLE MAP (persona -> topic overrides)
# Default style per persona is in persona profile above.
# These are topic-specific overrides where the default doesn't fit.
# -------------------------------------------------------------------
instruction_style_overrides:
  # Grief always uses invitation style regardless of persona
  grief:
    all_personas: invitation
  # Somatic healing always uses open_invitation
  somatic_healing:
    all_personas: open_invitation
  # First responders use direct even for emotional topics
  first_responder:
    all_topics: direct
  # NYC execs use direct for everything
  nyc_exec:
    all_topics: direct

# -------------------------------------------------------------------
# BODY AREA FOCUS BY TOPIC
# Which body areas to reference in instructions for each topic.
# -------------------------------------------------------------------
body_focus:
  anxiety: [chest, jaw, shoulders, hands, belly]
  grief: [heart_chest, throat, belly, eyes]
  depression: [fingers, toes, shoulders, general_awareness]
  burnout: [shoulders, jaw, forehead, lower_back]
  sleep_anxiety: [toes, calves, thighs, belly, chest, hands, arms, shoulders, face_jaw]
  social_anxiety: [hands, throat, chest, stomach, face]
  boundaries: [belly, chest, arms_hands, posture]
  self_worth: [heart_chest, belly, hands]
  compassion_fatigue: [chest, shoulders, belly, hands]
  overthinking: [feet, skin, head_neck, jaw]
  imposter_syndrome: [posture_spine, chest, feet, hands]
  financial_stress: [stomach, chest, throat, hands]
  courage: [chest, core, feet, spine]
  somatic_healing: [open_ended]  # let the person's body lead
  financial_anxiety: [hands, jaw, stomach, chest]
