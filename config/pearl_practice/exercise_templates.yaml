# Pearl Practice -- Exercise Templates & Timing Configuration
# Generated: 2026-04-06
# Source: artifacts/research/exercise_design_system_2026_04_06.md
#
# This file defines:
#   1. Base pause durations by instruction type
#   2. Topic intensity modifiers
#   3. Persona time-pressure modifiers
#   4. Exercise structure templates per topic
#   5. Persona-specific overrides (max duration, language, position)
#   6. TTS sentence writing constraints

# -------------------------------------------------------------------
# GLOBAL TTS SETTINGS
# -------------------------------------------------------------------
tts:
  target_wpm: 90            # Words per minute for therapeutic delivery
  max_sentence_words: 15
  ideal_sentence_words: 10
  min_sentence_words: 4
  default_instruction_style: soft_instruction  # direct | soft_instruction | invitation | open_invitation
  inter_sentence_pause_ms: 500

# -------------------------------------------------------------------
# BASE PAUSE DURATIONS (seconds)
# These are the starting values before topic and persona modifiers.
# -------------------------------------------------------------------
base_pauses:
  breathing_count: 3.5       # Count-based breathing (box, 4-7-8)
  breathing_aware: 4.5       # Awareness-only breathing (notice, follow)
  body_awareness_specific: 6.0  # "Notice your shoulders"
  body_awareness_open: 8.0      # "Notice what's present"
  emotional_processing: 8.0     # Sitting with a feeling
  grounding_sensory: 3.5        # Quick sensory anchor (feet, chair)
  movement: 4.5                 # Time to do a physical movement
  permission_validation: 5.0    # Letting a validating statement land
  closing: 3.5                  # Return to present, wrap up

# -------------------------------------------------------------------
# TOPIC INTENSITY MODIFIERS
# Multiply base_pauses by this factor.
# Higher = longer pauses (more emotional depth needed).
# -------------------------------------------------------------------
topic_modifiers:
  overthinking: 0.8
  social_anxiety: 0.9
  financial_stress: 1.0
  anxiety: 1.0
  burnout: 1.0
  imposter_syndrome: 1.0
  courage: 1.0
  financial_anxiety: 1.0
  boundaries: 1.1
  self_worth: 1.1
  depression: 1.1
  compassion_fatigue: 1.1
  sleep_anxiety: 1.2
  grief: 1.3
  somatic_healing: 1.4

# -------------------------------------------------------------------
# PERSONA TIME-PRESSURE MODIFIERS
# Multiply (base * topic_modifier) by this factor.
# Lower = shorter pauses (less time available).
# -------------------------------------------------------------------
persona_modifiers:
  first_responder: 0.6
  healthcare_rn: 0.7
  gen_alpha: 0.7
  gen_z: 0.8
  working_parent: 0.8
  corp_mgr: 0.8
  nyc_exec: 0.8
  tech_finance: 0.85
  entrepreneur: 0.85
  gen_x_sandwich: 0.9
  millennial_woman: 1.0

# -------------------------------------------------------------------
# POSITION-IN-SEQUENCE MODIFIERS
# Applied on top of the computed pause.
# -------------------------------------------------------------------
sequence_position_modifiers:
  opening: 0.8        # First 1-2 steps: shorter pauses to ease in
  deepening: 1.0      # Mid-exercise: full pause duration
  integration: 0.9    # Late exercise: slightly shorter
  final_close: 0.7    # Last sentence: brief return

# -------------------------------------------------------------------
# PERSONA PROFILES
# -------------------------------------------------------------------
personas:
  corp_mgr:
    max_duration_seconds: 150    # 2.5 minutes
    position: seated_desk
    language_register: direct
    instruction_style: soft_instruction
    avoid:
      - "Take as long as you need"
      - "Find a quiet place"
      - "Visualize a beach"
      - nurturing_tone
      - weakness_framing

  healthcare_rn:
    max_duration_seconds: 90     # 1.5 minutes between patients
    position: standing_or_seated
    language_register: clinical_warm
    instruction_style: soft_instruction
    avoid:
      - "You matter"
      - "Take a break"
      - long_preambles
      - heroes_language
      - privacy_assumption

  entrepreneur:
    max_duration_seconds: 150
    position: variable
    language_register: direct_results
    instruction_style: direct
    avoid:
      - "Slow down"
      - work_less_framing
      - "Balance"
      - therapy_framing

  first_responder:
    max_duration_seconds: 60     # 1 minute max
    position: standing_or_vehicle
    language_register: tactical
    instruction_style: direct
    avoid:
      - "Feel your feelings"
      - "Vulnerability is strength"
      - soft_pacing
      - mental_health_jargon

  gen_z:
    max_duration_seconds: 120
    position: seated_phone
    language_register: casual_warm
    instruction_style: soft_instruction
    avoid:
      - boomer_cliches
      - wellness_influencer_tone
      - clinical_language
      - "Put your phone down"

  gen_alpha:
    max_duration_seconds: 75     # ~1 minute
    position: seated_or_floor
    language_register: simple_warm
    instruction_style: soft_instruction
    avoid:
      - abstract_concepts
      - adult_vocabulary
      - condescension
      - "Calm down"
      - complex_multi_step

  gen_x_sandwich:
    max_duration_seconds: 150
    position: car_or_bed
    language_register: no_nonsense_empathetic
    instruction_style: soft_instruction
    avoid:
      - "Make time for yourself"
      - "Self-care isn't selfish"
      - uninterrupted_time_assumption
      - choosing_burnout_framing

  working_parent:
    max_duration_seconds: 120
    position: standing_kitchen_or_car
    language_register: warm_validating
    instruction_style: soft_instruction
    avoid:
      - "Find 10 minutes"
      - silence_requirement
      - "Prioritize self-care"
      - guilt_adding

  millennial_woman:
    max_duration_seconds: 240    # 4 minutes
    position: desk_or_mat
    language_register: warm_evidence
    instruction_style: invitation
    avoid:
      - gendered_assumptions
      - "Women are natural caregivers"
      - toxic_positivity
      - body_type_assumptions

  nyc_exec:
    max_duration_seconds: 120
    position: car_or_standing
    language_register: sharp_sophisticated
    instruction_style: direct
    avoid:
      - woo_woo_language
      - "Slow down"
      - quiet_room_assumption
      - long_windups
      - "Work-life balance"

  tech_finance:
    max_duration_seconds: 150
    position: seated_desk_standing
    language_register: analytical
    instruction_style: soft_instruction
    metaphor_domain: systems  # "reset", "reboot", "calibrate"
    avoid:
      - "Disconnect from screens"
      - generic_wellness
      - eyes_closed_assumption
      - "You're working too hard"

