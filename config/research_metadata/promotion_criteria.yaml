# Research KB → EI V2 Metadata Promotion Criteria
# Candidates generated by generate_persona_topic_candidates.py must pass all gates
# before promote_metadata_candidates.py can apply them to live config.
# Gate runner: check_metadata_promotion_gate.py

schema_version: "1.0"

# Minimum KB entries that must have contributed to the candidates
min_kb_entries_used: 5

# Maximum patches per candidate file (safety ceiling)
max_patches_per_run: 30

# Maximum new terms per individual patch
max_terms_per_patch: 20

# Candidate file status must be shadow_pending before promotion
require_shadow_status: true

# Minimum confidence threshold used in candidate generation
min_candidate_confidence: 0.65

# Gate: no unknown patch types allowed
allow_unknown_patch_types: false
