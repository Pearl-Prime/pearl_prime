# Video CTA Templates — Per-format freebie call-to-action specs
# Authority: Plan — End-to-End Video Production + Upload + Freebie CTAs
# Tokens: {workbook_label}, {slug}, {brand_id}, {url}, {topic_display}
# URL base: brand-admin-onboarding.pages.dev/free/{slug}

schema_version: "1.0"

# ── YouTube Long-Form (10 min, 16:9) ──────────────────────────────
youtube:
  cta_spoken_intro:
    timing: "120s"  # ~2 min mark, after first chapter content
    type: spoken
    template: >-
      This video has a free companion {workbook_label} with all the
      exercises and reflection prompts. Link in the description.
    voice: narrator  # uses channel's assigned voice
    overlay: false

  cta_end_card:
    timing: "last_10s"
    type: overlay
    template: "Free {workbook_label}: brand-admin-onboarding.pages.dev/free/{slug}"
    overlay_position: lower_third
    font_size: 36
    font_color: "#FFFFFF"
    bg_color: "#000000CC"
    bg_padding: 20

  cta_description:
    type: description_link
    template: |
      📖 Free {workbook_label}: https://brand-admin-onboarding.pages.dev/free/{slug}?utm_source=youtube&utm_medium=video&utm_campaign={brand_id}

      This video is about {topic_display}. Each chapter walks you through
      a single scene — recognition, mechanism, practice, integration.

      📚 Full audiobook available on Google Play Books and Apple Books.

  cta_pinned_comment:
    type: pinned_comment
    template: >-
      Get the free {workbook_label} for this book:
      brand-admin-onboarding.pages.dev/free/{slug}

# ── YouTube Shorts (60s, 9:16) ────────────────────────────────────
youtube_shorts:
  cta_overlay:
    timing: "last_5s"
    type: overlay
    template: "Link in bio 🔗"
    overlay_position: center_bottom
    font_size: 28
    font_color: "#FFFFFF"
    bg_color: "#000000AA"
    bg_padding: 16

  cta_description:
    type: description_link
    template: >-
      Free {workbook_label}: brand-admin-onboarding.pages.dev/free/{slug}?utm_source=youtube_shorts&utm_medium=short&utm_campaign={brand_id}

  cta_pinned_comment:
    type: pinned_comment
    template: >-
      📖 Free {workbook_label}: brand-admin-onboarding.pages.dev/free/{slug}

# ── TikTok (30-60s, 9:16) ────────────────────────────────────────
tiktok:
  cta_overlay:
    timing: "last_3s"
    type: overlay
    template: "Link in bio 📖"
    overlay_position: center_bottom
    font_size: 24
    font_color: "#FFFFFF"
    bg_color: "#000000AA"
    bg_padding: 14

  cta_bio_link:
    type: bio_link
    template: "brand-admin-onboarding.pages.dev/free/{slug}?utm_source=tiktok&utm_medium=video&utm_campaign={brand_id}"

  cta_caption:
    type: post_caption
    template: >-
      Free {workbook_label} in bio 📖 #mentalhealth #{topic_display}
      #nervousystem #selfhelp #healing

# ── Instagram Reels (60s, 9:16) ───────────────────────────────────
instagram:
  cta_overlay:
    timing: "last_5s"
    type: overlay
    template: "Free guide in bio ↗"
    overlay_position: center_bottom
    font_size: 26
    font_color: "#FFFFFF"
    bg_color: "#000000AA"
    bg_padding: 16

  cta_caption:
    type: post_caption
    template: >-
      Free {workbook_label} — link in bio 📖

      {topic_display} is a pattern, not a permanent condition.
      This video walks you through one chapter of the practice.

      #selfcare #{topic_display} #nervousystem #healing #somatic

  cta_bio_link:
    type: bio_link
    template: "brand-admin-onboarding.pages.dev/free/{slug}?utm_source=instagram&utm_medium=reels&utm_campaign={brand_id}"

# ── LINE (60-90s, 9:16, Japan/Taiwan) ─────────────────────────────
line:
  cta_overlay:
    timing: "last_5s"
    type: overlay
    # Japanese + Chinese variant
    template_ja: "無料ガイド：下のリンクから"
    template_zh: "免費指南：點擊下方連結"
    template_en: "Free guide: link below"
    overlay_position: center_bottom
    font_size: 24
    font_color: "#FFFFFF"
    bg_color: "#000000AA"
    bg_padding: 14

  cta_qr_code:
    enabled: true
    timing: "last_8s"
    position: bottom_right
    size_px: 150
    url_template: "brand-admin-onboarding.pages.dev/free/{slug}?utm_source=line&utm_medium=video&utm_campaign={brand_id}"
    margin: 20

  cta_message:
    type: push_message
    template_ja: "📖 無料の{workbook_label}はこちら: {url}"
    template_zh: "📖 免費{workbook_label}在這裡: {url}"
    template_en: "📖 Free {workbook_label}: {url}"
