# VCE §5 — Motion types, parameter schemas, speed limits (therapeutic annotations).

motion_types:
  parallax_scroll:
    params:
      - direction
      - layer_speeds
    max_speed_px_per_sec_l1: 30
    fps: 24
    therapeutic_use: depth_immersion
    ffmpeg_notes: crop+scale with timed x/y offset

  ken_burns:
    params:
      - start_rect
      - end_rect
      - easing
    max_zoom_pct_per_sec: 2
    fps: 24
    therapeutic_use: contemplation
    ffmpeg_notes: zoompan z expression

  particle_system:
    params:
      - count
      - speed
      - size
      - opacity
      - drift
    max_speed_px_per_sec: 60
    fps: 30
    therapeutic_use: atmosphere
    ffmpeg_notes: geq/noise overlay composite

  breathing_pulse:
    params:
      - scale_min
      - scale_max
      - bpm
    target_bpm: 6
    fps: 30
    therapeutic_use: respiratory_entrainment
    ffmpeg_notes: scale oscillation via periodic expr

  water_nature_loop:
    params:
      - loop_duration_s
      - blend_frames
    fps: 24
    therapeutic_use: fractal_regulation
    ffmpeg_notes: looped clip blend

  text_reveal:
    params:
      - chars_per_sec
      - fade_in_ms
    max_chars_per_sec: 15
    fps: 30
    therapeutic_use: reading_rhythm
    ffmpeg_notes: drawtext alpha enable

  camera_pan:
    params:
      - angle_deg
      - speed_deg_per_sec
      - easing
    max_speed_deg_per_sec: 5
    fps: 24
    therapeutic_use: scene_exploration
    ffmpeg_notes: zoompan x/y or crop slide

  scale_drift:
    params:
      - amplitude_pct
      - period_s
    amplitude_pct_max: 3
    period_s_default: 10
    fps: 24
    therapeutic_use: subtle_regulation
    ffmpeg_notes: scale periodic expr

static_budget:
  static_fraction_min: 0.70
  static_fraction_max: 0.80
  source: motion_policy.yaml
