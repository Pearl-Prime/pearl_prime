# VCE §6.2–§6.7 — Arc pacing, color temp keyframes, fractal targets, breath, nature, silence.

arc_section_pacing:
  HOOK:
    pct_start: 0
    pct_end: 15
    cut_interval_s_min: 2
    cut_interval_s_max: 4
    bpm_equiv_min: 15
    bpm_equiv_max: 30
    motion_budget_pct: 50
  BUILD:
    pct_start: 15
    pct_end: 55
    cut_interval_s_min: 4
    cut_interval_s_max: 6
    bpm_equiv_min: 10
    bpm_equiv_max: 15
    motion_budget_pct: 30
  PEAK:
    pct_start: 55
    pct_end: 70
    cut_interval_s_min: 8
    cut_interval_s_max: 12
    bpm_equiv_min: 5
    bpm_equiv_max: 7.5
    motion_budget_pct: 15
  RELEASE:
    pct_start: 70
    pct_end: 85
    cut_interval_s_min: 8
    cut_interval_s_max: 15
    bpm_equiv_min: 4
    bpm_equiv_max: 7.5
    motion_budget_pct: 10
  RESOLVE:
    pct_start: 85
    pct_end: 100
    cut_interval_s_min: 15
    cut_interval_s_max: null
    bpm_equiv_max: 4
    motion_budget_pct: 0

# §6.3 Color temperature arc — additive colorbalance after base grade preset
color_temp_arc:
  HOOK:
    colorbalance: "rs=0.1:gs=0.0:bs=-0.1"
  BUILD:
    colorbalance: "rs=0.0:gs=0.0:bs=0.0"
  PEAK:
    colorbalance: "rs=-0.05:gs=0.0:bs=0.05"
  RELEASE:
    colorbalance: "rs=0.02:gs=0.02:bs=0.0"
  RESOLVE:
    colorbalance: "rs=0.08:gs=0.03:bs=-0.05"

# §6.4 Fractal regulation (metadata targets for QC / planner)
fractal_regulation:
  HOOK:
    fd_min: 1.4
    fd_max: 1.6
    min_coverage_pct: 0
  BUILD:
    min_coverage_pct: 0
  PEAK:
    fd_min: 1.3
    fd_max: 1.5
    min_coverage_pct: 30
  RELEASE:
    fd_min: 1.3
    fd_max: 1.5
    min_coverage_pct: 50
  RESOLVE:
    fd_min: 1.2
    fd_max: 1.4
    min_coverage_pct: 70

# §6.5 Breathing pulse
breathing_pulse:
  target_bpm: 6
  cycle_s: 10
  inhale_s: 4
  hold_s: 2
  exhale_s: 4
  amplitude_pct_therapeutic_min: 2
  amplitude_pct_therapeutic_max: 4
  amplitude_pct_exercise_min: 5
  amplitude_pct_exercise_max: 8

# §6.6 Nature footage minimums (seconds)
nature_footage_minimums_s:
  therapeutic_short: 5
  therapeutic_mid_min: 15
  therapeutic_mid_max: 45
  therapeutic_long: 90
  motion_comic_per_chapter: 10
  lofi_stream: 0  # continuous treated separately
  exercise_video: 30

# §6.7 Strategic silence
strategic_silence:
  short_final_s_min: 2
  short_final_s_max: 3
  mid_release_s_min: 5
  mid_release_s_max: 10
  long_per_5min_s_min: 8
  long_per_5min_s_max: 15
  lofi_every_min_s: 20
  lofi_every_max_s: 30
  lofi_silence_s: 5
  exercise_between_sets_s_min: 3
  exercise_between_sets_s_max: 5
