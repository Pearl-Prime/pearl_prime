# Per-video color grading presets. One grade per video (not per-shot) for visual coherence.
# Applied as FFmpeg eq (or colorbalance/curves) on the final output. Select by emotional_arc or content_type.

presets:
  neutral:
    contrast: 1.0
    brightness: 0.0
    saturation: 1.0
  warm:
    contrast: 1.03
    brightness: 0.01
    saturation: 1.05
  cool:
    contrast: 1.0
    brightness: -0.01
    saturation: 0.92
  sunset:
    contrast: 1.02
    brightness: 0.02
    saturation: 1.08
  soft:
    contrast: 0.98
    brightness: 0.005
    saturation: 0.95

# Map emotional arc or content_type to preset name (renderer or timeline builder uses this).
# emotional_arc: hope -> warm; reflection -> cool; default -> neutral
default_preset: neutral

# ── P0 lut3d color grading (item 2) ─────────────────────────────────────────
# Set lut_path to a .cube file to apply lut3d grading on top of the eq preset.
# lut3d requires RGB input; run_render.py handles the yuv420p→rgb→yuv chain automatically.
# Leave lut_path as null or empty string to disable.
lut3d:
  enabled: false
  lut_path: "assets/luts/warm_therapeutic.cube"
