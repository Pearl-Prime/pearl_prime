# Per-brand video visual identity for YouTube, TikTok, IG Reels, Bilibili, Douyin.
# Each brand visually distinct at thumbnail scale on platform shelves.
# Wired to: brand_identity_system.yaml (colophon, colors, fonts),
#           brand_style_tokens.yaml (topic→palette), brand_platform_matrix.yaml.
schema_version: 1
last_updated: "2026-04-08"

# Audiobook video base style (from audiobook_style.yaml)
audiobook_base:
  background: "#000000"
  text_color: "#FFFFFF"
  text_font: serif
  waveform: true
  karaoke_subtitles: true

