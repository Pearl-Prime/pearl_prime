# Channel Registry — 24 Channels with isolated image banks, style identities, personas, and assembly profiles.
# Authority: docs/VIDEO_PIPELINE_SPEC.md §15
# Each channel: unique visual style, TTS voice, upload window, metadata template.
# No two channels share an image bank. No two channels share the same upload_window_offset_hours.
# Image bank path: assets/image_banks/{channel_id}/
# Prompt templates: config/video/image_prompt_templates.yaml keyed by style_id.
#
# Persona alignment follows config/catalog_planning/canonical_personas.yaml
# Topic groups follow config/catalog_planning/canonical_topics.yaml
# Emotional band follows config/video/brand_style_tokens.yaml → topic_to_band
#
# NOTE on anime/non-photorealistic channels:
# shared_negatives in prompt_constraints.yaml include "no anime style".
# Channels where override_shared_negatives: true will NOT include "no anime style" —
# they use style-specific negative lists defined in image_prompt_templates.yaml.

# ── TITLE TEMPLATES (6 distinct; max 4 channels per template) ─────────────────
title_templates:
  tmpl_heal:
    format: "How to {action} when {struggle} | {topic}"
    channels: [ch_001, ch_004, ch_009, ch_017]
  tmpl_question:
    format: "Why do I {question}? (honest answer)"
    channels: [ch_002, ch_006, ch_013, ch_022]
  tmpl_guide:
    format: "{number} ways to {outcome} — for {persona_descriptor}"
    channels: [ch_003, ch_005, ch_014, ch_021]
  tmpl_story:
    format: "The {topic} truth nobody talks about"
    channels: [ch_007, ch_010, ch_018, ch_023]
  tmpl_transform:
    format: "{struggle} to {outcome}: a {persona_descriptor}'s guide"
    channels: [ch_008, ch_011, ch_015, ch_019]
  tmpl_direct:
    format: "{action_verb} your {topic}: {benefit}"
    channels: [ch_012, ch_016, ch_020, ch_024]

