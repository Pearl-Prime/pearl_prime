# Pacing rules per content_type. Used by Shot Planner and Timeline Builder.
# min_duration_s / max_duration_s apply to segments; hook_timing drives first-shot rules.

content_types:
  therapeutic:
    min_duration_s: 3
    max_duration_s: 12
    hook_timing: "0-3s"
  short_mythbust:
    min_duration_s: 2
    max_duration_s: 8
    hook_timing: "0-2s"
  default:
    min_duration_s: 2
    max_duration_s: 10
    hook_timing: "0-3s"

# VCE §6.2 — arc section cut rhythm / motion budget (Edit rhythm entrainment).
# Referenced by run_animation_engine.py; therapeutic_video_rules.yaml has full table.
arc_section_pacing:
  HOOK:
    cut_interval_s: [2, 4]
    bpm_equiv: [15, 30]
    motion_budget_pct: 50
  BUILD:
    cut_interval_s: [4, 6]
    bpm_equiv: [10, 15]
    motion_budget_pct: 30
  PEAK:
    cut_interval_s: [8, 12]
    bpm_equiv: [5, 7.5]
    motion_budget_pct: 15
  RELEASE:
    cut_interval_s: [8, 15]
    bpm_equiv: [4, 7.5]
    motion_budget_pct: 10
  RESOLVE:
    cut_interval_s_min: 15
    bpm_equiv_max: 4
    motion_budget_pct: 0
