# VCE §8.1 / §8.4 — Encode targets and compliance copy for QC / platform adapter.

platforms:
  youtube:
    resolution:
      width: 1920
      height: 1080
    aspect: "16:9"
    max_duration_s: 43200
    video_codec: "h264_high"
    crf: 23
    container: mp4
    caption_types: [srt_sidecar, chapters]
    compliance_notes:
      - no_misleading_health_claims
      - therapeutic_structural_only

  youtube_shorts:
    resolution:
      width: 1080
      height: 1920
    aspect: "9:16"
    max_duration_s: 60
    video_codec: "h264_high"
    crf: 23
    container: mp4
    caption_types: [burnt_in]
    compliance_notes:
      - community_guidelines

  tiktok:
    resolution:
      width: 1080
      height: 1920
    aspect: "9:16"
    max_duration_s: 600
    video_codec: "h264_main"
    crf: 21
    container: mp4
    caption_types: [burnt_in, platform_auto]
    compliance_rules:
      mental_health:
        blocker: true
        no_suicide_self_harm_imagery: true
        no_diagnostic_claims: true

  instagram_reels:
    resolution:
      width: 1080
      height: 1920
    aspect: "9:16"
    max_duration_s: 90
    video_codec: "h264_main"
    crf: 21
    container: mp4
    caption_types: [burnt_in]
    compliance_notes:
      - meta_community_standards

  bilibili:
    resolution:
      width: 1920
      height: 1080
    aspect: "16:9"
    max_duration_s: 14400
    video_codec: "h264_high"
    crf: 20
    container: mp4
    caption_types: [zh_srt_required, ass_styled]
    compliance_rules:
      shenhe:
        zh_subtitles_mandatory: true
        no_sensitive_political_topics: true
        pre_review_queue: true

  douyin:
    resolution:
      width: 1080
      height: 1920
    aspect: "9:16"
    max_duration_s: 300
    video_codec: "h264_main"
    crf: 21
    container: mp4
    caption_types: [zh_burnt_in]
    compliance_rules:
      china:
        separate_api_not_tiktok: true
        icp_requirements: true
        content_review_lag_hours: [24, 72]

  webtoon:
    resolution:
      width: 800
      height: 1280
    aspect: variable_vertical
    max_duration_s: null
    video_codec: webp_sequence
    container: zip
    caption_types: [in_panel]
    compliance_rules:
      format:
        vertical_scroll_only: true
        max_panels_per_episode: 100

thumbnail_specs:
  youtube:
    width: 1280
    height: 720
    format: jpg
    max_bytes: 2097152
    variants: 3
  tiktok:
    source: first_frame
    text_overlay: true
    variants: 1
  bilibili:
    width: 1280
    height: 720
    format: jpg
    zh_overlay: true
    variants: 2
