# Upload Schedule — Weekly cadence for automated video publishing
# Authority: Plan — End-to-End Video Production + Upload + Freebie CTAs
# Each brand uploads 2-3 videos per day per platform, staggered across hours.

schema_version: "1.0"

# ── Cadence rules ─────────────────────────────────────────────────
cadence:
  uploads_per_day_per_platform: 3
  buffer_days_ahead: 14          # build 2 weeks of content ahead
  max_uploads_per_hour: 1        # never batch-upload within same hour
  weekend_factor: 0.5            # halve uploads on weekends
  holiday_pause: true            # pause uploads on detected holidays

# ── Platform upload windows (local time per brand locale) ─────────
# Staggered so no two platforms hit the same hour for one brand.
stagger_hours:
  youtube:        [8, 14, 20]    # 8am, 2pm, 8pm
  youtube_shorts: [9, 15, 21]    # offset +1h from long
  tiktok:         [10, 16, 22]   # offset +2h
  instagram:      [11, 17, 23]   # offset +3h
  line:           [12, 18]       # 2x/day only (Japan/Taiwan)

# ── Weekly math ───────────────────────────────────────────────────
# Given 15 new books per week per brand:
weekly_production:
  books_per_week: 15
  videos_per_book: 5             # youtube + shorts + tiktok + ig + line
  total_videos_per_week: 75      # 15 × 5
  per_platform_per_week: 15      # 75 / 5 platforms
  per_platform_per_day: 3        # 15 / 5 weekdays

# ── Priority order (when throttled) ──────────────────────────────
# If quota is hit or rate-limited, upload in this order:
priority_order:
  - youtube        # highest reach, longest content
  - youtube_shorts # algorithmic discovery
  - tiktok         # Gen Z reach
  - instagram      # brand awareness
  - line           # Japan/Taiwan community

# ── Content selection for shorts ─────────────────────────────────
# From a 10-min YouTube video, extract the best 60s for Shorts:
shorts_extraction:
  method: "peak_segment"         # pick segment with highest emotional intensity
  fallback: "first_chapter"      # if no peak analysis, use opening
  max_duration_s: 60
  min_duration_s: 30
  hook_required_in_first: 3      # first 3 seconds must have text/hook

# ── TikTok adaptation ────────────────────────────────────────────
tiktok_adaptation:
  max_duration_s: 60
  preferred_duration_s: 45
  cut_speed_multiplier: 1.3      # 30% faster cuts than YouTube Shorts
  text_overlay_required: true    # always show text (many watch muted)
  hashtag_limit: 5

# ── Instagram adaptation ─────────────────────────────────────────
instagram_adaptation:
  max_duration_s: 90
  preferred_duration_s: 60
  text_heavy: true               # captions throughout
  carousel_friendly: false       # single reel, not carousel (for now)

# ── LINE adaptation ──────────────────────────────────────────────
line_adaptation:
  max_duration_s: 90
  preferred_duration_s: 75
  pacing_multiplier: 0.85        # 15% slower than other platforms
  qr_code_in_video: true         # embed QR code pointing to freebie
  locale_aware: true             # Japanese vs Traditional Chinese CTAs
