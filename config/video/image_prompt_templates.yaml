dark_moody:
  style_id: dark_moody
  channel_id: ch_022
  display_name: "Dark/Moody"
  style_modifier: >
    dark moody digital illustration, deep shadow, rich near-black backgrounds,
    single dramatic light source, atmospheric and cinematic, emotional weight,
    muted palette — no warm cheer, only depth and gravity
  foreground: >
    A dark moody illustration of {subject} in deep {palette_1} with single dramatic
    light source in {palette_2}, heavy atmosphere, high shadow-to-light ratio,
    cinematic and weighty, no photorealism.
  background: >
    Background: near-black {palette_3} with soft atmospheric fog or smoke,
    depth without detail, gravity and space.
  lighting: >
    Lighting: single strong light from one edge, deep shadows filling 70% of frame,
    volumetric haze, cinematic and still, 9:16, highly detailed but soft.
  negative_overrides:
    - "no bright colors"
    - "no cheerful composition"
    - "no photorealism"
    - "no anime"
    - "no full face"
    - "no hard digital render look"
  topic_subject_hints:
    depression: "a figure in a dark room with a single bar of light from a cracked door"
    grief: "a dark silhouette at a window, city lights blurred behind, deep shadows"
    boundaries: "a dark stone wall with one torch — clear and unmovable"
    burnout: "a figure slumped at a desk, single lamp, everything else dark"

