surrealist:
  style_id: surrealist
  channel_id: ch_024
  display_name: "Surrealist"
  style_modifier: >
    surrealist digital painting, dreamlike and illogical scenes,
    Magritte or Dalí-inspired impossible juxtapositions, hyper-realistic rendering
    of impossible things, no cartoon — surrealism looks real but IS impossible
  foreground: >
    A surrealist painting of {subject} where {palette_1} and {palette_2} paint an
    impossible scene — real elements in wrong contexts, dreamlike lighting,
    Magritte-quiet or Dalí-dramatic, no full faces, uncanny and thought-provoking.
  background: >
    Background: surrealist landscape in {palette_3} — a room that is also outdoors,
    a sky that is also a floor, impossible depth, quiet and strange.
  lighting: >
    Lighting: hyper-real but sourceless — light comes from the wrong direction,
    objects cast shadows upward, dreamlike, 9:16, highly detailed but soft.
  negative_overrides:
    - "no cartoon"
    - "no anime"
    - "no flat color"
    - "no abstract — surrealism is rendered realistically"
    - "no full face"
  topic_subject_hints:
    overthinking: "a head open like a cabinet with many tiny desk drawers inside"
    imposter_syndrome: "a figure in a suit standing in front of a mirror showing an empty suit"
    depression: "a figure walking on the ceiling of a room that looks normal otherwise"
    financial_anxiety: "a wallet that opens to reveal an infinite empty corridor"
