# Image Prompt Templates — one per style, keyed by style_id from channel_registry.yaml
# Authority: docs/VIDEO_IMAGE_MASTER_PROMPT_SPEC.md; docs/VIDEO_PIPELINE_SPEC.md §15
#
# Each template has 3 parts (Flux T2I three-part format):
#   foreground: style + subject + composition
#   background: atmospheric abstract gradient
#   lighting: lighting + mood + "9:16, highly detailed but soft"
#
# Placeholders: {palette_1}, {palette_2}, {palette_3} → resolved from
#   brand_style_tokens.yaml → bands → {emotional_band} → topics → {topic} → palette
#   {subject}: resolved by shot planner from visual_intent
#   {style_modifier}: this file's style-specific modifier
#
# negative_overrides: replaces/augments shared_negatives for this style.
#   When channel override_shared_negatives: true, these are used INSTEAD of shared_negatives.
#   When override_shared_negatives: false, these are APPENDED to shared_negatives.
#
# topic_subject_hints: default subject vocabulary for topics on this channel.
# (Shot planner uses these as starting points before applying visual_intent_defaults.)

# ─────────────────────────────────────────────────────────────────────────────
# CALM & HEALING (ch_001–ch_006)
# ─────────────────────────────────────────────────────────────────────────────

soft_ghibli:
  style_id: soft_ghibli
  channel_id: ch_001
  display_name: "Soft Ghibli-esque"
  style_modifier: >
    soft Studio Ghibli-inspired watercolor illustration, hand-painted gouache texture,
    pastel skies, cozy detailed background, gentle paper grain, warm but muted palette,
    no full faces, dreamy stillness, contemplative mood
  foreground: >
    A soft Ghibli-esque watercolor illustration of {subject} in {palette_1} and {palette_2},
    gentle paper grain, cozy atmospheric detail, generous negative space, no faces, quiet mood.
  background: >
    Background: a soft watercolor wash of {palette_1} to {palette_3}, blended edges,
    no hard lines, cottagecore warmth, ethereal and slightly hazy.
  lighting: >
    Lighting: diffused morning light through a window, gentle and undramatic,
    soft shadows, warm-cool balance, 9:16, highly detailed but soft.
  negative_overrides:
    - "no photorealism"
    - "no sharp edges"
    - "no high contrast"
    - "no anime style"  # ghibli is NOT anime for our purposes; keep this
    - "no full faces"
    - "no busy background clutter"
    - "no forced brightness"
  topic_subject_hints:
    anxiety: "hands cupped around a teacup by a rain-streaked window"
    grief: "an empty chair with a soft knitted blanket beside a lamp"
    burnout: "a figure resting against a mossy hillside at dusk"
    depression: "a small figure under a large umbrella in soft rain"

minimalist_line_art:
  style_id: minimalist_line_art
  channel_id: ch_002
  display_name: "Minimalist Line Art"
  style_modifier: >
    minimalist single-color line drawing, clean thin strokes, generous white space,
    one or two line-weight weights, no fill or flat pastel fill only,
    architectural negative space, clarity-first composition
  foreground: >
    A minimalist line art illustration of {subject} in {palette_1} on white,
    clean thin strokes, generous negative space, no texture, no fill, single composition line.
  background: >
    Background: pure white or very pale {palette_3}, no gradient, no texture,
    absolute minimal — the line drawing is the entire focal point.
  lighting: >
    Lighting: flat, directionless light — no shadow, no volumetric haze,
    maximum clarity and space, 9:16, highly detailed but soft.
  negative_overrides:
    - "no color fills"
    - "no texture"
    - "no gradients"
    - "no shadow"
    - "no anime"
    - "no busy background"
    - "no photorealism"
    - "no shading"
  topic_subject_hints:
