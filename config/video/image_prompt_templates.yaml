cyberpunk_steampunk:
  style_id: cyberpunk_steampunk
  channel_id: ch_019
  display_name: "Cyberpunk/Steampunk"
  style_modifier: >
    cyberpunk-steampunk hybrid illustration, mechanical brass gears meets neon hologram,
    Victorian machinery with digital overlays, warm amber brass tones and cold neon blue,
    no photorealism — pure graphic art fusion, industrial but luminous
  foreground: >
    A cyberpunk-steampunk hybrid illustration of {subject} combining {palette_1} brass gears
    and {palette_2} neon holographic overlays, Victorian machinery meets digital data,
    layered industrial and luminous, no photorealism.
  background: >
    Background: {palette_3} industrial depth with faint gear patterns and neon grid overlay,
    steam-and-light atmosphere, depth without photography.
  lighting: >
    Lighting: warm brass ambient from below, cold neon from above, dramatic contrast
    between warm-mechanical and cool-digital, 9:16, highly detailed but soft.
  negative_overrides:
    - "no photorealism"
    - "no pastoral scenes"
    - "no watercolor"
    - "no soft colors"
    - "no anime"
    - "no full face"
  topic_subject_hints:
    financial_stress: "steampunk brass coin press meets neon digital banking interface"
    courage: "a mechanical brass figure stepping through a neon portal"
    financial_anxiety: "a brass clockwork gear machine with a neon display showing declining numbers"
    imposter_syndrome: "a mechanical puppet whose brass strings become neon-light freedom"

art_nouveau:
  style_id: art_nouveau
  channel_id: ch_020
  display_name: "Art Nouveau"
  style_modifier: >
    Art Nouveau illustration style, flowing organic lines, botanical floral motifs,
    elegant sinuous curves, Alphonse Mucha-inspired border frames,
    warm gold and dusty rose palette, decorative and beautiful, no photorealism
  foreground: >
    An Art Nouveau illustration of {subject} with flowing organic lines in {palette_1} and {palette_2},
    botanical floral motifs framing the composition, Mucha-style ornamental detail,
    elegant and decorative, no photorealism.
  background: >
    Background: ornamental {palette_3} Art Nouveau border with botanical vines,
    stylized floral wallpaper pattern, rich and decorative.
  lighting: >
    Lighting: warm diffused golden light, soft glow on ornamental details,
    gentle and luminous, 9:16, highly detailed but soft.
  negative_overrides:
    - "no photorealism"
    - "no geometric abstraction"
    - "no hard edges"
    - "no anime"
    - "no full realistic face"
    - "no modern design"
  topic_subject_hints:
    self_worth: "an Art Nouveau woman figure (back to viewer) crowned with botanical wreath"
    somatic_healing: "flowing organic body shape surrounded by healing botanical motifs"
    grief: "Art Nouveau willow branches draped over an ornate empty frame"
    compassion_fatigue: "two botanical hands reaching toward each other, ornate vine frame"

