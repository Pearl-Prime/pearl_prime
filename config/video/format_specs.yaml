# VCE §3 — Content format definitions (duration, resolution, platforms, therapeutic hooks).
# Keys match CLI --format: short | mid | long | motion_comic | lofi | exercise

formats:
  short:
    id: therapeutic_short
    duration_min_s: 15
    duration_max_s: 60
    resolution:
      width: 1080
      height: 1920
    aspect: "9:16"
    fps: 30
    audio:
      channels: stereo
      codec_aac_kbps: 128
    platforms_primary: [youtube_shorts, tiktok, instagram_reels, douyin]
    therapeutic_mechanisms:
      - hook_parasympathetic_compressed
    layer_mode: three_layer  # L1 + L3 + L5

  mid:
    id: therapeutic_mid
    duration_min_s: 120
    duration_max_s: 480
    resolution:
      width: 1920
      height: 1080
    aspect: "16:9"
    fps: 24
    audio:
      channels: stereo
      codec_aac_kbps: 192
    platforms_primary: [youtube, bilibili]
    therapeutic_mechanisms:
      - five_section_arc
    layer_mode: five_layer

  long:
    id: therapeutic_long
    duration_min_s: 900
    duration_max_s: 1800
    resolution:
      width: 1920
      height: 1080
    aspect: "16:9"
    fps: 24
    audio:
      channels: stereo
      codec_aac_kbps: 256
    platforms_primary: [youtube, bilibili]
    therapeutic_mechanisms:
      - multi_arc_chapters
    layer_mode: five_layer

  motion_comic:
    id: motion_comic
    duration_min_s: 180
    duration_max_s: 600
    resolution:
      width: 1920
      height: 1080
    aspect: "16:9"
    fps: 24
    audio:
      channels: stereo
      codec_aac_kbps: 192
    platforms_primary: [youtube, webtoon]
    therapeutic_mechanisms:
      - panel_breath_engine
    layer_mode: five_layer

  lofi:
    id: lofi_stream
    duration_min_s: 3600
    duration_max_s: 14400
    resolution:
      width: 1920
      height: 1080
    aspect: "16:9"
    fps: 15
    audio:
      channels: stereo
      codec_aac_kbps: 192
    platforms_primary: [youtube]
    therapeutic_mechanisms:
      - continuous_parasympathetic
    layer_mode: five_layer

  exercise:
    id: exercise_video
    duration_min_s: 300
    duration_max_s: 900
    resolution:
      width: 1080
      height: 1920
    aspect: "9:16"
    fps: 30
    audio:
      channels: stereo
      codec_aac_kbps: 192
    platforms_primary: [youtube, tiktok]
    therapeutic_mechanisms:
      - somatic_breathing_cues
    layer_mode: five_layer

default_format_key: short
