# ── PLATFORM CONTENT TYPE DEFINITIONS ─────────────────────────────────────────
# Reference for content_type values used above.

content_type_definitions:
  long_form:
    description: "16:9 landscape, >= 3 minutes, full-length episodes"
    primary_platforms: [youtube, bilibili]
    aspect_ratio: "16:9"
    min_duration_s: 180
  short_vertical:
    description: "9:16 vertical, <= 10 minutes, hook-first format"
    primary_platforms: [youtube_shorts, tiktok, instagram_reels, douyin]
    aspect_ratio: "9:16"
    max_duration_s: 600

# ── CREDENTIAL SUFFIX CONVENTIONS ────────────────────────────────────────────
# The credential_suffix is appended to all platform env var names.
# Example: YT_CLIENT_ID + _SP → YT_CLIENT_ID_SP
# See config/video/upload_config.yaml for base env var names.
#
# EN brands use 2-char suffixes (_SP, _CC, _ND).
# Locale brands use 4-6 char suffixes to avoid collisions.
# All suffixes registered at: docs/credentials_registry.yaml
