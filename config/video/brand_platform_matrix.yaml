  #           ch_012 (11), ch_017 (16), ch_018 (17), ch_020 (19), ch_022 (21)
  # ---------------------------------------------------------------------------
  stillness_press:
    credential_suffix: "_SP"
    locale: en_US
    channel_count: 9

    platforms:
      youtube:
        enabled: true
        daily_quota: 6          # Conservative YouTube ceiling (6 × 1,600 ≈ 9,600 units)
        content_type: long_form  # 16:9, landscape-first for long-form
        aspect_ratio: "16:9"
        max_duration_s: 43200
      youtube_shorts:
        enabled: true
        daily_quota: 9          # Up to 3 shorts per channel, 3 active channels/day
        content_type: short_vertical
        aspect_ratio: "9:16"
        max_duration_s: 60
      tiktok:
        enabled: true
        daily_quota: 9
        content_type: short_vertical
        aspect_ratio: "9:16"
        max_duration_s: 600
      instagram_reels:
        enabled: true
        daily_quota: 9
        content_type: short_vertical
        aspect_ratio: "9:16"
        max_duration_s: 90
      bilibili:
        enabled: false
        daily_quota: 0
        reason: "EN-only brand; no zh subtitle pipeline"
      douyin:
        enabled: false
