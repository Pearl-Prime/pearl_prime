# Brand × Platform × Daily Quota Matrix
# Authority: specs/VIDEO_CONTENT_ENGINE_DEV_SPEC.md §Stage-18
# Source truth: config/video/upload_config.yaml (credential suffixes, platform flags)
#               config/video/channel_registry.yaml (channels, upload_window_offset_hours)
#               config/brand_registry.yaml (brand definitions)
#
# This matrix is the single authoritative lookup for:
#   - which platforms are enabled per brand
#   - daily quota per brand per platform
#   - scheduling preferences (publish windows, stagger)
#   - content type preferences (format, aspect ratio)
#   - credential suffix used to compose env var names
#
# Quota semantics:
#   daily_quota is the MAX uploads across ALL channels for that brand on that platform.
#   Each channel contributes up to daily_upload_cap (3) from channel_registry.yaml.
#   The quota_manager enforces these cross-channel ceilings.
#
# Channel counts per brand (from channel_registry.yaml):
#   stillness_press:   8 channels (ch_001,004,006,009,012,017,018,020,022) → actually 9
#   cognitive_clarity: 12 channels (ch_002,003,005,007,008,010,011,013,016,019,021,023,024) → 13
#   norcal_dharma:     2 channels (ch_014, ch_015)
#
# Platform daily quotas below are conservative and well within API ceilings:
#   YouTube: 10,000 quota units/day (~6 uploads max); we cap at 6 for safety
#   TikTok: 20 videos/day API limit; we cap at 9 per brand (3 channels × 3)
#   Instagram Reels: 25 posts/day API limit; we cap at 9
#   Bilibili: 20 videos/day; disabled for EN brands (no zh content)
#   Douyin: 20 videos/day; disabled for EN brands (ICP requirements not met)

schema_version: 1
generated_from:
  - config/video/upload_config.yaml
  - config/video/channel_registry.yaml
  - config/brand_registry.yaml

