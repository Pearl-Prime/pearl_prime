# Layer Composition Intelligence Rules
# Authority: Plan — Intelligent Layer Composition
# Prevents nonsensical compositions (e.g., person floating on a table)
# Applied by run_layer_compositor.py when stacking L1 (background) + L3 (subject)

schema_version: "1.0"

# ── Framing types ─────────────────────────────────────────────────
# Used in composition_tags on each asset
framing_types:
  - extreme_close  # eyes, hands, single detail
  - close_up       # face, head and shoulders
  - medium         # waist up
  - medium_wide    # knees up
  - wide           # full body or full scene
  - panoramic      # landscape, no focal subject

subject_types:
  - none           # no identifiable subject (abstract, texture, gradient)
  - person         # human figure (any framing)
  - object         # single object (book, cup, plant, candle)
  - abstract       # geometric, pattern, artistic
  - text           # text-heavy image (quote card, title)
  - nature         # landscape, forest, ocean (no person)

# ── Composition rules ─────────────────────────────────────────────
# Evaluated in order. First match wins.
rules:

  # Rule 1: Person on person = REJECT (never stack two people)
  - name: "no_person_on_person"
    condition:
      L3_subject_type: "person"
      L1_subject_type: "person"
    action: "use_l3_fullframe"
    reason: "Two people overlaid creates visual confusion"

  # Rule 2: Person on scene with blocked zones → place in safe zone
  - name: "person_in_safe_zone"
    condition:
      L3_subject_type: "person"
      L1_has_blocked_zones: true
    action: "place_in_safe_zone"
    fallback: "use_l3_fullframe"
    reason: "Subject must not overlap furniture, objects, or other focal points"

  # Rule 3: Wide person on wide scene = REJECT (both compete for frame)
  - name: "no_wide_on_wide"
    condition:
      L3_framing: ["wide", "panoramic"]
      L1_framing: ["wide", "panoramic"]
    action: "use_l3_fullframe"
    reason: "Two wide shots overlap entirely — no visual separation"

  # Rule 4: Close-up on wide = OK (small subject on big background)
  - name: "closeup_on_wide"
    condition:
      L3_framing: ["extreme_close", "close_up"]
      L1_framing: ["wide", "panoramic"]
    action: "place_lower_third"
    scale_pct: 40
    reason: "Close-up is small enough to sit in corner of wide background"

  # Rule 5: Medium subject centered on environment = OK with offset
  - name: "medium_on_environment"
    condition:
      L3_framing: "medium"
      L1_subject_type: ["none", "nature"]
    action: "place_offset_center"
    offset_x_pct: 10   # slightly off-center for visual interest
    offset_y_pct: -5    # slightly above center
    reason: "Medium shot works on clean background with slight offset"

  # Rule 6: Abstract/text overlay = always OK at center with alpha
  - name: "abstract_overlay"
    condition:
      L3_subject_type: ["abstract", "text"]
    action: "overlay_center_alpha"
    alpha: 0.6
    reason: "Abstract and text overlays blend safely at any position"

  # Rule 7: Object on any background = OK at rule-of-thirds
  - name: "object_placement"
    condition:
      L3_subject_type: "object"
    action: "place_rule_of_thirds"
    position: "bottom_right"  # default; can be randomized
    scale_pct: 30
    reason: "Objects work at rule-of-thirds positions"

  # Rule 8: Nature on nature = blend (atmospheric doubling)
  - name: "nature_on_nature"
    condition:
      L3_subject_type: "nature"
      L1_subject_type: "nature"
    action: "overlay_center_alpha"
    alpha: 0.4
    reason: "Two nature shots create depth when blended softly"

  # Rule 9: Default — standard overlay at center
  - name: "default"
    condition: {}  # matches everything not caught above
    action: "overlay_center"
    reason: "Default centered overlay when no specific rule matches"

# ── Action definitions ────────────────────────────────────────────
actions:
  use_l3_fullframe:
    description: "Skip L1, use L3 as the entire frame"
    skip_l1: true

  place_in_safe_zone:
    description: "Place L3 within L1's first safe_overlay_zone"
    requires_safe_zones: true

  place_lower_third:
    description: "Scale L3 down and place in lower third of frame"
    y_anchor: "bottom"
    x_anchor: "center"

  place_offset_center:
    description: "Place L3 at center with slight offset for visual interest"

  overlay_center_alpha:
    description: "Overlay L3 at center with reduced alpha"

  place_rule_of_thirds:
    description: "Place L3 at rule-of-thirds intersection"
    positions:
      top_left: {x_pct: 33, y_pct: 33}
      top_right: {x_pct: 67, y_pct: 33}
      bottom_left: {x_pct: 33, y_pct: 67}
      bottom_right: {x_pct: 67, y_pct: 67}

  overlay_center:
    description: "Standard centered overlay (legacy behavior)"
