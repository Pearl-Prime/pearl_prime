# Weekly Production Queue Configuration
# Authority: Pearl_Research + Pearl_Marketing + EI v2
# Generates 15 titles per brand per week, indefinitely.
# Priority: STRONG configs first, then VIABLE.

schema_version: "2.0"

titles_per_brand_per_week: 15

# ── Weekly Mix (15 titles per brand) ────────────────────────────────
weekly_mix:
  series_installments: 2      # continuing active series (Book 2 this week, Book 3 next week)
  strong_standalones: 5       # highest confidence configs — primary revenue
  strong_micros: 3            # $0.99 review generators, cold-start funnels
  viable_standalones: 3       # testing new territory
  format_variations: 2        # same topic, different format (e.g., pocket guide of a standard book)

# ── Priority Ordering (what gets produced first) ────────────────────
priority_order:
  - STRONG_unproduced         # never-before-produced STRONG configs
  - STRONG_new_engine         # same topic+persona, different engine angle
  - STRONG_new_format         # same topic+persona, different format (micro → standard → deep)
  - VIABLE_unproduced         # never-before-produced VIABLE configs
  - VIABLE_new_engine         # same VIABLE topic+persona, different engine
  - INTELLIGENCE_NEW          # from daily market intelligence — new opportunities

# ── Engines (7 emotional engines from EI v2) ────────────────────────
engines:
  - spiral
  - shame
  - comparison
  - false_alarm
  - overwhelm
  - grief
  - watcher

# ── Variation Knobs (for expanding unique books per config) ─────────
variation_knobs:
  book_structure_ids: [1, 2, 3]        # different chapter orderings
  journey_shape_ids: [ascent, descent_ascent, spiral_up, plateau_break, wave]
  motif_ids: [body, breath, movement, stillness, voice, light, water]

# ── Series Management ───────────────────────────────────────────────
series_management:
  max_active_series_per_brand: 2
  installments_per_week: 1             # 1 per active series = 2 total
  series_length: [7, 10]              # books per series
  book_1_price: 0.99                  # cold-start hook
  book_2_plus_price: [3.99, 6.99]     # range for continuation books

# ── Duplication Prevention ──────────────────────────────────────────
duplication_prevention:
  check_production_history: true
  history_file: "artifacts/catalog/production_history.jsonl"
  same_topic_persona_engine_format_seed: NEVER_REPEAT
  same_topic_persona_different_engine: ALLOWED    # different emotional angle
  same_topic_persona_different_format: ALLOWED    # different product type

# ── Kill Rule (deprioritize underperformers) ────────────────────────
kill_rule:
  check_sales_after_days: 90
  min_sales_to_keep: 1
  action_on_kill: "deprioritize config — stop producing from this topic×persona×engine"

# ── Growth Engine (promote VIABLE → STRONG) ─────────────────────────
growth_engine:
  viable_to_strong_threshold: 50       # sales to promote VIABLE → STRONG
  new_topic_trigger: "daily_intelligence"
  topic_expansion_rate: "1 new topic per quarter max"

# ── Format Pricing (USD base, locale adjustments in catalog_generation_config.yaml) ──
format_pricing:
  micro_book_15: 0.99
  micro_book_20: 0.99
  short_book_30: 2.99
  standard_book: 3.99
  extended_book_2h: 9.99
  deep_book_4h: 17.99
  deep_book_6h: 24.99

# ── Runtime Format → Structural Format Compatibility ────────────────
# (Also defined in format_registry.yaml; duplicated here for queue logic)
runtime_structural_compat:
  micro_book_15: [F015, F003]
  micro_book_20: [F015, F003]
  short_book_30: [F003, F006, F007, F011]
  standard_book: [F006, F007, F010, F011, F014]
  extended_book_2h: [F004, F009, F010, F014]
  deep_book_4h: [F004, F009, F013]
  deep_book_6h: [F013]

# ── STRONG Clusters (from full_content_audit.md) ────────────────────
# These topic×persona combos are highest confidence — produce first.
strong_clusters:
  - { topic: anxiety, personas: [corporate_managers, millennial_women_professionals, tech_finance_burnout, gen_z_professionals] }
  - { topic: burnout, personas: [healthcare_rns, first_responders, tech_finance_burnout, entrepreneurs] }
  - { topic: sleep_anxiety, personas: [corporate_managers, millennial_women_professionals, working_parents, tech_finance_burnout] }
  - { topic: imposter_syndrome, personas: [gen_z_professionals, millennial_women_professionals, corporate_managers, entrepreneurs] }
  - { topic: social_anxiety, personas: [gen_z_professionals, gen_alpha_students, millennial_women_professionals] }
  - { topic: burnout, personas: [entrepreneurs, corporate_managers] }
  - { topic: somatic_healing, personas: [corporate_managers, millennial_women_professionals, healthcare_rns, working_parents] }
  - { topic: financial_anxiety, personas: [gen_z_professionals, millennial_women_professionals, entrepreneurs] }

# ── VIABLE Clusters ─────────────────────────────────────────────────
viable_clusters:
  - { topic: depression, personas: [working_parents, millennial_women_professionals, gen_x_sandwich] }
  - { topic: boundaries, personas: [millennial_women_professionals, working_parents, educators] }
  - { topic: compassion_fatigue, personas: [healthcare_rns, educators, first_responders] }
  - { topic: overthinking, personas: [corporate_managers, tech_finance_burnout, entrepreneurs] }
  - { topic: grief, personas: [gen_x_sandwich, working_parents, healthcare_rns] }
  - { topic: courage, personas: [first_responders, entrepreneurs, gen_z_professionals] }
  - { topic: self_worth, personas: [gen_z_professionals, gen_alpha_students, millennial_women_professionals] }

# ── Kill List (Never Build) ─────────────────────────────────────────
# Imported from catalog_generation_config.yaml
kill_list:
  topic_persona_kills:
    - { topic: financial_anxiety, persona: gen_alpha_students }
    - { topic: financial_stress, persona: gen_alpha_students }
    - { topic: compassion_fatigue, persona: gen_alpha_students }
    - { topic: compassion_fatigue, persona: entrepreneurs }
  format_locale_kills:
    - { format: deep_book_6h, locale: hu_HU }
    - { format: deep_book_4h, locale: hu_HU }
    - { format: extended_book_2h, locale: hu_HU }
  brand_locale_kills:
    - { brand: cosmic_edge, locale: hu_HU }
    - { brand: soul_repair, locale: de_DE }
    - { brand: vitality_path, locale: hu_HU }
