# Weekly Production Queue Configuration
# Authority: Pearl_Research + Pearl_Marketing + EI v2
# Generates 15 titles per brand per week, indefinitely.
# Priority: STRONG configs first, then VIABLE.

schema_version: "2.0"

titles_per_brand_per_week: 15

# ── Weekly Mix (15 titles per brand) ────────────────────────────────
weekly_mix:
  series_installments: 2      # continuing active series (Book 2 this week, Book 3 next week)
  strong_standalones: 5       # highest confidence configs — primary revenue
  strong_micros: 3            # $0.99 review generators, cold-start funnels
  viable_standalones: 3       # testing new territory
  format_variations: 2        # same topic, different format (e.g., pocket guide of a standard book)

# ── Lane-Specific Weekly Mix Overrides ─────────────────────────────
# Per global_manga_distribution_strategy.md:
# ALL lanes include manga content. Manga sells on Amazon KDP as graphic novels.
# WEBTOON Canvas 2026 supports 7 languages (EN, JA, KO, FR, ES, DE, TH).
lane_weekly_mix:
  ja_JP:
    # Manga-primary: 53% manga, 33% ebook
    manga_series_installments: 3    # webtoon serialization (LINE Manga, Piccoma)
    manga_standalone: 3             # tankōbon volumes (KDP JP)
    manga_micro: 2                  # short episodes
    ebook_series_installments: 1    # text series
    ebook_standalone: 3             # text standalone
    ebook_micro: 1                  # $0.99 text micro
    format_variations: 2
  ko_KR:
    # Manga-heavy: 40% manga, 47% ebook. Vertical scroll mandatory. (=15)
    manga_series_installments: 2    # Naver CANVAS webtoon
    manga_standalone: 2             # collected volumes (KDP KR)
    manga_micro: 2                  # short episodes
    ebook_series_installments: 2    # text series
    ebook_standalone: 4             # text standalone
    ebook_micro: 1                  # text micro
    format_variations: 2
  zh_TW:
    # Balanced: 33% manga, 53% ebook (=15)
    manga_series_installments: 2    # LINE Webtoon TW
    manga_standalone: 1             # Bookwalker TW
    manga_micro: 2                  # short episodes
    ebook_series_installments: 2    # text series
    ebook_standalone: 4             # text standalone (Readmoo)
    ebook_micro: 2                  # text micro
    format_variations: 2
  en_US:
    # Ebook-primary with manga: 13% manga, 73% ebook (=15)
    manga_series_installments: 1    # WEBTOON Canvas
    manga_standalone: 1             # KDP graphic novel EPUB
    manga_micro: 0                  # no micro manga
    ebook_series_installments: 1    # text series (permafree Book 1)
    ebook_standalone: 7             # text standalone (primary)
    ebook_micro: 3                  # $0.99 text micro
    format_variations: 2            # manga↔ebook cross-format
  fr_FR:
    # France #1 EU manga market: 20% manga, 67% ebook (=15)
    manga_series_installments: 1    # WEBTOON Canvas FR
    manga_standalone: 1             # KDP FR graphic novel
    manga_micro: 1                  # short episodes
    ebook_series_installments: 1    # text series
    ebook_standalone: 6             # text standalone
    ebook_micro: 3                  # text micro
    format_variations: 2
  # EU lanes: 13% manga, 73% ebook (all sum to 15)
  de_DE:
    manga_series_installments: 1
    manga_standalone: 0
    manga_micro: 1
    ebook_series_installments: 1
    ebook_standalone: 7             # text standalone
    ebook_micro: 3
    format_variations: 2
  es_ES:
    manga_series_installments: 1
    manga_standalone: 0
    manga_micro: 1
    ebook_series_installments: 1
    ebook_standalone: 7             # text standalone
    ebook_micro: 3
    format_variations: 2
  es_US:
    manga_series_installments: 1
    manga_standalone: 0
    manga_micro: 1
    ebook_series_installments: 1
    ebook_standalone: 7             # text standalone
    ebook_micro: 3
    format_variations: 2
  it_IT:
    manga_series_installments: 1
    manga_standalone: 0
    manga_micro: 1
    ebook_series_installments: 1
    ebook_standalone: 7             # text standalone
    ebook_micro: 3
    format_variations: 2
  hu_HU:
    manga_series_installments: 1
    manga_standalone: 0
    manga_micro: 1
    ebook_series_installments: 1
    ebook_standalone: 7             # text standalone
    ebook_micro: 3
    format_variations: 2
  # Asia default: 20% manga, 67% ebook (all sum to 15)
  zh_HK:
    manga_series_installments: 1
    manga_standalone: 1
    manga_micro: 1
    ebook_series_installments: 1
    ebook_standalone: 6
    ebook_micro: 3
    format_variations: 2
  zh_SG:
    manga_series_installments: 1
    manga_standalone: 1
    manga_micro: 1
    ebook_series_installments: 1
    ebook_standalone: 6
    ebook_micro: 3
    format_variations: 2
  # China: ebook-only (no manga platforms accessible)
  zh_CN:
    manga_series_installments: 0
    manga_standalone: 0
    manga_micro: 0
    ebook_series_installments: 2
    ebook_standalone: 8             # text standalone
    ebook_micro: 3
    format_variations: 2

# ── Priority Ordering (what gets produced first) ────────────────────
priority_order:
  - STRONG_unproduced         # never-before-produced STRONG configs
  - STRONG_new_engine         # same topic+persona, different engine angle
  - STRONG_new_format         # same topic+persona, different format (micro → standard → deep)
  - VIABLE_unproduced         # never-before-produced VIABLE configs
  - VIABLE_new_engine         # same VIABLE topic+persona, different engine
  - INTELLIGENCE_NEW          # from daily market intelligence — new opportunities

# ── Engines (7 emotional engines from EI v2) ────────────────────────
engines:
  - spiral
  - shame
  - comparison
  - false_alarm
  - overwhelm
  - grief
  - watcher

# ── Variation Knobs (for expanding unique books per config) ─────────
variation_knobs:
  book_structure_ids: [1, 2, 3]        # different chapter orderings
  journey_shape_ids: [ascent, descent_ascent, spiral_up, plateau_break, wave]
  motif_ids: [body, breath, movement, stillness, voice, light, water]

# ── Series Management ───────────────────────────────────────────────
series_management:
  max_active_series_per_brand: 2
  installments_per_week: 1             # 1 per active series = 2 total
  series_length: [7, 10]              # books per series
  book_1_price: 0.99                  # cold-start hook
  book_2_plus_price: [3.99, 6.99]     # range for continuation books

# ── Duplication Prevention ──────────────────────────────────────────
duplication_prevention:
  check_production_history: true
  history_file: "artifacts/catalog/production_history.jsonl"
  same_topic_persona_engine_format_seed: NEVER_REPEAT
  same_topic_persona_different_engine: ALLOWED    # different emotional angle
  same_topic_persona_different_format: ALLOWED    # different product type

# ── Kill Rule (deprioritize underperformers) ────────────────────────
kill_rule:
  check_sales_after_days: 90
  min_sales_to_keep: 1
  action_on_kill: "deprioritize config — stop producing from this topic×persona×engine"

# ── Growth Engine (promote VIABLE → STRONG) ─────────────────────────
growth_engine:
  viable_to_strong_threshold: 50       # sales to promote VIABLE → STRONG
  new_topic_trigger: "daily_intelligence"
  topic_expansion_rate: "1 new topic per quarter max"

# ── Format Pricing (USD base, locale adjustments in catalog_generation_config.yaml) ──
format_pricing:
  micro_book_15: 0.99
  micro_book_20: 0.99
  short_book_30: 2.99
  standard_book: 3.99
  extended_book_2h: 9.99
  deep_book_4h: 17.99
  deep_book_6h: 24.99

# ── Runtime Format → Structural Format Compatibility ────────────────
# (Also defined in format_registry.yaml; duplicated here for queue logic)
runtime_structural_compat:
  micro_book_15: [F015, F003]
  micro_book_20: [F015, F003]
  short_book_30: [F003, F006, F007, F011]
  standard_book: [F006, F007, F010, F011, F014]
  extended_book_2h: [F004, F009, F010, F014]
  deep_book_4h: [F004, F009, F013]
  deep_book_6h: [F013]

# ── STRONG Clusters (from full_content_audit.md) ────────────────────
# These topic×persona combos are highest confidence — produce first.
strong_clusters:
  # Tier 1: highest confidence, most atom coverage
  - { topic: anxiety, personas: [corporate_managers, millennial_women_professionals, tech_finance_burnout, gen_z_professionals, gen_z_student] }
  - { topic: burnout, personas: [healthcare_rns, first_responders, tech_finance_burnout, entrepreneurs, gen_z_student] }
  - { topic: sleep_anxiety, personas: [corporate_managers, millennial_women_professionals, working_parents, tech_finance_burnout, gen_z_student] }
  - { topic: imposter_syndrome, personas: [gen_z_professionals, millennial_women_professionals, corporate_managers, entrepreneurs, gen_z_student] }
  - { topic: overthinking, personas: [corporate_managers, tech_finance_burnout, entrepreneurs, gen_z_student] }
  # Tier 2: promoted from VIABLE — strong market demand
  - { topic: boundaries, personas: [millennial_women_professionals, working_parents, gen_z_student] }
  - { topic: self_worth, personas: [gen_z_professionals, gen_alpha_students, millennial_women_professionals, gen_z_student] }
  - { topic: depression, personas: [working_parents, millennial_women_professionals, gen_x_sandwich, gen_z_student] }
  - { topic: somatic_healing, personas: [corporate_managers, millennial_women_professionals, healthcare_rns, working_parents] }
  - { topic: social_anxiety, personas: [gen_z_professionals, gen_alpha_students, millennial_women_professionals, gen_z_student] }
  - { topic: grief, personas: [gen_x_sandwich, working_parents, healthcare_rns, gen_z_student] }
  - { topic: courage, personas: [first_responders, entrepreneurs, gen_z_professionals, gen_z_student] }
  - { topic: sleep_anxiety, personas: [gen_z_student, gen_alpha_students, gen_z_professionals] }
  - { topic: financial_anxiety, personas: [gen_z_professionals, millennial_women_professionals, entrepreneurs, gen_z_student] }
  - { topic: financial_stress, personas: [working_parents, gen_x_sandwich, entrepreneurs, gen_z_student] }
  - { topic: compassion_fatigue, personas: [healthcare_rns, educators, first_responders] }
  - { topic: adhd_focus, personas: [gen_z_professionals, gen_alpha_students, gen_z_student, entrepreneurs] }
  - { topic: mindfulness, personas: [corporate_managers, millennial_women_professionals, gen_z_student, working_parents, gen_z_professionals] }

# ── VIABLE Clusters ─────────────────────────────────────────────────
viable_clusters: []

# ── Kill List (Never Build) ─────────────────────────────────────────
# Imported from catalog_generation_config.yaml
kill_list:
  topic_persona_kills:
    - { topic: financial_anxiety, persona: gen_alpha_students }
    - { topic: financial_stress, persona: gen_alpha_students }
    - { topic: compassion_fatigue, persona: gen_alpha_students }
    - { topic: compassion_fatigue, persona: entrepreneurs }
  format_locale_kills:
    - { format: deep_book_6h, locale: hu_HU }
    - { format: deep_book_4h, locale: hu_HU }
    - { format: extended_book_2h, locale: hu_HU }
  brand_locale_kills:
    - { brand: cosmic_edge, locale: hu_HU }
    - { brand: soul_repair, locale: de_DE }
    - { brand: vitality_path, locale: hu_HU }
