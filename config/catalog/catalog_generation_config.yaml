# Catalog Generation Configuration
# Authority: Pearl_Research + Pearl_Marketing + EI v2
# Generates ~800 high-confidence catalog entries from brand x topic x persona x format constraints.

schema_version: "1.0"

# ── Locales ──────────────────────────────────────────────────────────
locales:
  en_US: { language: English, region: "United States", currency: USD, tier: primary }
  ja_JP: { language: Japanese, region: Japan, currency: JPY, tier: primary }
  ko_KR: { language: Korean, region: "South Korea", currency: KRW, tier: primary }
  de_DE: { language: German, region: Germany, currency: EUR, tier: primary }
  fr_FR: { language: French, region: France, currency: EUR, tier: primary }
  zh_TW: { language: "Traditional Chinese", region: Taiwan, currency: TWD, tier: secondary }
  zh_CN: { language: "Simplified Chinese", region: "China Mainland", currency: CNY, tier: secondary }
  zh_HK: { language: "Traditional Chinese", region: "Hong Kong", currency: HKD, tier: secondary }
  es_US: { language: "Latin American Spanish", region: "US Hispanic", currency: USD, tier: secondary }
  es_ES: { language: "Castilian Spanish", region: Spain, currency: EUR, tier: secondary }
  it_IT: { language: Italian, region: Italy, currency: EUR, tier: secondary }
  zh_SG: { language: "Simplified Chinese", region: Singapore, currency: SGD, tier: tertiary }
  hu_HU: { language: Hungarian, region: Hungary, currency: HUF, tier: tertiary }

