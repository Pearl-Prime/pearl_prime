# ── B1 (locale-native titles, on top of #790's #786 architecture) ───
# Non-en locales use formula-based templates (with `{voice_prefix}` and
# `{topic}` placeholders) instead of fixed base titles. Each locale has 5
# formula templates; combined with 12 brand voice prefixes × 17 topics ×
# 12 personas, this yields enough diversity to hold cap-3 per cluster.
#
# Tonal anchors per rubric:
#   - ja_JP: contemplative, understated. Hiragana-rich, 体言止め.
#   - zh_TW: emotional clarity, human tone. Traditional characters.
#   - zh_CN: structured, outcome-oriented. Simplified characters.
#
# Best-effort drafts authored without a native-fluency reviewer; revise
# entries by index if needed (no code change required).

title_templates_ja_JP:
  - { title: "{voice_prefix}{topic}の手当て",          subtitle_pattern: "{topic}を抜けるための、{voice_prefix}日々への手引き" }
  - { title: "{topic}を超えて、{voice_prefix}日々へ",  subtitle_pattern: "{topic}回復のための、しずかな歩み" }
  - { title: "{voice_prefix}{topic}回復の歩み",        subtitle_pattern: "{topic}が止まらないときの、{voice_prefix}手引き" }
  - { title: "{voice_prefix}{topic}との対話",          subtitle_pattern: "{topic}のあとに、{voice_prefix}静けさを取り戻す" }
  - { title: "{topic}のあとに、{voice_prefix}日々",    subtitle_pattern: "{voice_prefix}暮らしへの、{topic}回復の手引き" }

title_templates_zh_TW:
  - { title: "{voice_prefix}{topic}指引",             subtitle_pattern: "走出{topic}，邁向{voice_prefix}日子" }
  - { title: "穿越{topic}，走向{voice_prefix}時光",   subtitle_pattern: "{topic}復原途中的{voice_prefix}陪伴" }
  - { title: "{voice_prefix}步調，走出{topic}",       subtitle_pattern: "當{topic}停不下來時的{voice_prefix}指引" }
  - { title: "{voice_prefix}{topic}的同行",           subtitle_pattern: "{topic}復原中的{voice_prefix}日子" }
  - { title: "{topic}之後，{voice_prefix}日子",       subtitle_pattern: "{voice_prefix}生活，{topic}復原的同行者" }

title_templates_zh_CN:
  - { title: "{voice_prefix}{topic}指南",             subtitle_pattern: "走出{topic}，迈向{voice_prefix}日子" }
  - { title: "穿越{topic}，走向{voice_prefix}日子",   subtitle_pattern: "{topic}恢复期的{voice_prefix}陪伴" }
  - { title: "{voice_prefix}节奏，走出{topic}",       subtitle_pattern: "当{topic}无法停止时的{voice_prefix}指引" }
  - { title: "{voice_prefix}{topic}的同行",           subtitle_pattern: "{topic}恢复期的{voice_prefix}日子" }
  - { title: "{topic}之后，{voice_prefix}日子",       subtitle_pattern: "{voice_prefix}生活，{topic}恢复的同行者" }

