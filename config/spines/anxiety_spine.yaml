family_id: anxiety
family_name: "Anxiety / False Alarm"
adjacent_topics: [social_anxiety, sleep_anxiety, overthinking]
primary_mechanism: false_alarm
allowed_engines: [false_alarm, spiral, watcher, overwhelm, shame, comparison, grief]

reader_starting_state: >
  The reader's body is running an alarm they did not consciously set. They scan
  rooms before entering. They rehearse conversations that haven't happened. They
  check texts twice, prepare for the worst-case, avoid situations where they
  can't guarantee the outcome. They call this being responsible, being prepared,
  being realistic. They do not experience the alarm as a problem — they experience
  the world as a problem, and the alarm as the appropriate response to a world
  that requires constant vigilance. They are exhausted in a way they cannot
  explain, because explaining it would require naming the alarm, and naming it
  feels like admitting weakness.

reader_ending_state: >
  The reader can feel the alarm fire and recognize it as a signal, not a
  command. They have language for what is happening in their body when the alarm
  runs. They have practiced — in small increments, then harder ones — taking
  action while the alarm is active, without waiting for it to go quiet first.
  They know the alarm will return. They no longer interpret its return as evidence
  that something is wrong with them or that they failed. They understand the
  alarm as a feature of a nervous system that learned something, not a flaw in
  who they are. They are no longer organized around avoiding the alarm.

what_makes_this_family_different: >
  The anxiety spine must legitimize the body's response before asking the reader
  to change anything. Every other self-help structure — identify the problem, then
  fix it — triggers more alarm in this reader, because the alarm interprets "you
  need to change" as further evidence of threat. The false-alarm mechanism must
  be named in body terms, not cognitive terms, before any practice is introduced.
  Recognition must come before mechanism. Mechanism must come before action.
  The reader must feel seen by the body first, understood by the body first,
  before any request is made of the body. Chapter 5 is the earliest this spine
  can ask the reader to do anything, and even then it must be small, somatic,
  and framed as experiment, not correction.

chapters:
  chapter_01:
    number: 1
    role: recognition
    working_title: "The Alarm That Won't Stop Ringing"
    thesis: >
      There is a part of you that is always scanning — and you've been so good
      at living inside that scan that you've mistaken it for just being the kind
      of person you are.
    emotional_job: >
      The reader finishes this chapter feeling recognized without being named.
      Not "you have anxiety" — but "someone just described what my Tuesday
      morning feels like." The recognition is bodily and specific, not clinical.
      There is relief in being seen without being diagnosed.
    practical_job: >
      The reader can identify, for the first time, the specific texture of their
      own scanning behavior — the checking, the preparing, the pre-living of
      bad outcomes — and see it as a pattern with a shape, not just the weather
      they live inside.
    what_changes: >
      Before: "This is just how I am. This is being responsible."
      After: "Something in me is always running. I didn't know that was a thing
      I could notice."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not name the pattern "anxiety" in chapter 1. Let the reader arrive
        at the name. The name is a destination, not a starting point.
      - Do not offer reassurance. Reassurance is alarm management, not
        recognition.
      - Do not explain the mechanism yet. Recognition comes before mechanism.
      - Do not introduce any practice, exercise, or technique.
      - Do not use clinical framing or diagnostic language.
    recommended_enrichments:
      - Open with a scene that is completely ordinary — morning, car, inbox —
        but rendered in the nervous system's terms, not the story's terms.
      - Use a persona voice that is dry and specific, not warm and therapeutic.
      - The scene should be so precise that the reader thinks "how did they
        know about my specific version of this."
    claim_someone_could_argue: >
      Staying alert and prepared is genuinely adaptive — not everything that
      looks like scanning is a false alarm. A reader could argue that their
      vigilance has saved them, protected them, caught real problems before they
      became disasters.
    why_this_chapter_exists: >
      Without chapter 1, there is no trust. The reader must feel found before
      they will follow anywhere. If chapter 1 moves too fast toward explanation
      or correction, the reader's alarm system will identify this book as another
      thing that doesn't understand them and they will stop.
    what_comes_next: >
      The reader now knows the alarm has a shape. Chapter 2 asks: where did the
      alarm come from? The reader is ready to go backward in time because they
      are no longer defending the alarm — they are curious about it.

  chapter_02:
    number: 2
    role: origin
    working_title: "When The Alarm Made Sense"
    thesis: >
      The alarm didn't malfunction. It learned. At some point, staying alert was
      the correct strategy, and your nervous system became very, very good at it.
    emotional_job: >
      The reader finishes this chapter with something unfamiliar: compassion for
      the alarm. Not tolerance. Not resignation. Actual appreciation for a system
      that did its job when the job was real. This is the first moment of
      non-adversarial relationship with the alarm.
    practical_job: >
      The reader can trace — at least approximately — when their nervous system
      learned to run this particular pattern. They have a before and after, even
      if it is approximate. The alarm is no longer random; it has a history.
    what_changes: >
      Before: "Something is wrong with me — I'm always like this."
      After: "The alarm learned this. It had a reason. That's different from
      being broken."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not pathologize the origin. The alarm was a good solution to a real
        problem. Framing it as damage is inaccurate and shuts compassion down.
      - Do not ask the reader to revisit specific traumatic memories. The
        chapter asks for approximate origin, not forensic excavation.
      - Do not move to solutions. The reader has just learned the alarm is
        reasonable. This is not yet the moment to change it.
      - Do not introduce the false-alarm mechanism by name yet. Name it in
        chapter 3 or 4.
    recommended_enrichments:
      - Use a persona who learned their alarm in a context that is recognizable
        but not melodramatic — unpredictability, not catastrophe.
      - The scene should show the moment the alarm became a strategy, not just
        a response.
    claim_someone_could_argue: >
      Some readers will resist the origin framing — "I had a fine childhood,
      nothing happened to me." The chapter must account for ordinary sources of
      alarm: unpredictability, emotional unavailability, the ambient noise of
      adults who were themselves anxious.
    why_this_chapter_exists: >
      Without the origin chapter, the reader fights the alarm as an enemy.
      With it, they can begin to relate to the alarm as something that made
      sense once. That shift is what makes later chapters possible.
    what_comes_next: >
      The alarm has a history. Now it needs a name for what it is actually doing
      in the body. Chapter 3 introduces the pattern at the nervous system level.

  chapter_03:
    number: 3
    role: pattern_mapping
    working_title: "The Pattern Running Your Nervous System"
    thesis: >
      The alarm does not run randomly. It runs a specific sequence — scan, flag,
      prepare, check — and once you can see the sequence, you can see where you
      are inside it at any moment.
    emotional_job: >
      The reader finishes this chapter with a sense of structure where there was
      only noise. The alarm is not chaos — it is a pattern. That recognition is
      not relief exactly, but it is orientation. For the first time, the reader
      can locate themselves in the map.
    practical_job: >
      The reader can identify the specific steps of their own alarm sequence:
      what triggers it, what they check first, what preparation looks like for
      them, what temporary relief looks like, and why the relief never lasts.
      They have a map of their own alarm cycle.
    what_changes: >
      Before: "I just get anxious — it comes out of nowhere."
      After: "There's a sequence. I can see it. I know where I am in it right now."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not frame the pattern as a disorder. The pattern is a learned
        strategy, not a diagnosis.
      - Do not introduce the full false-alarm mechanism yet. This chapter shows
        the shape; the next chapter explains the body physiology.
      - Do not offer any way to interrupt the pattern yet. Observation precedes
        intervention.
      - Do not add complexity that makes the pattern feel overwhelming rather
        than mappable.
    recommended_enrichments:
      - Walk through the sequence step by step in diagram-in-words form with
        enough specificity that the reader recognizes their own variation.
      - Use a second-person narration style that paces through a specific
        scenario — arriving at a social event, opening an email, waiting for
        results — to show the sequence in motion.
    claim_someone_could_argue: >
      The reader could argue that their alarm is not a pattern — that it is a
      genuine, accurate response to genuinely unpredictable circumstances. This
      chapter must honor that possibility while demonstrating that the pattern
      persists even when the circumstances have changed.
    why_this_chapter_exists: >
      Without the pattern map, the mechanism chapter that follows has no
      scaffold. The reader needs to see the behavioral shape before they can
      understand why the nervous system runs it.
    what_comes_next: >
      The reader has the behavioral map. Now they need to understand what is
      happening in the body when the map runs. Chapter 4 is the physiology.

  chapter_04:
    number: 4
    role: mechanism
    working_title: "What The Alarm Actually Does To Your Body"
    thesis: >
      The sensations you experience when the alarm runs — the tightness, the
      racing, the inability to think straight — are not signs that something is
      going wrong. They are the alarm doing exactly what it was designed to do.
    emotional_job: >
      The reader finishes this chapter with a fundamentally different
      relationship to their physical sensations. The tightness in the chest, the
      shallow breath, the sense of unreality — these stop being evidence of
      danger and become readable as alarm output. There is a quiet shift from
      fear of the sensations to observation of them.
    practical_job: >
      The reader can name, in body terms, what happens when their alarm runs.
      They have a vocabulary for the physiological sequence: the activation,
      the fuel-for-running, the narrowed attention, the after-discharge. They
      understand why the alarm creates urgency and why urgency makes thinking
      harder.
    what_changes: >
      Before: "When this feeling starts, something bad is about to happen."
      After: "When this feeling starts, my alarm is running. That's the alarm.
      That's what it feels like from the inside."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not use clinical terminology for the physiology. No diagnostic
        vocabulary. Body language only.
      - Do not introduce the false-alarm distinction yet — that is the insight
        of chapter 6. Chapter 4 simply maps what the alarm does; it does not
        yet ask whether the threat is real.
      - Do not ask the reader to change anything about their physiological
        response. Observation only.
      - Do not make the physiology feel broken or pathological. The alarm is
        working correctly. That is the whole point.
    recommended_enrichments:
      - Walk through the alarm sequence in real time — what happens in the
        first thirty seconds, the next two minutes, the hour after.
      - Use a persona voice that is precise and matter-of-fact, not soothing
        or clinical. The tone should be "here is the mechanism, it makes sense."
    claim_someone_could_argue: >
      A reader who distrusts body-focused framing will argue that the problem
      is cognitive — bad thoughts, catastrophizing — not physiological. This
      chapter must demonstrate why the body runs first and thinking follows,
      not the reverse.
    why_this_chapter_exists: >
      Without body legitimacy, chapter 5's cost exposure and chapter 6's
      destabilization land on a reader who still believes the alarm is the
      problem to fight. Body legitimacy makes it possible to work with the alarm
      rather than against it.
    what_comes_next: >
      The reader knows what the alarm does in the body. Chapter 5 now asks:
      given all of this, what is the actual cost of living inside the alarm
      full-time?

  chapter_05:
    number: 5
    role: cost_exposure
    working_title: "What Living On Alert Actually Costs"
    thesis: >
      The alarm has a fee. Staying alert full-time is not free, and the cost
      is not just exhaustion — it is a narrowed life, a shortened present, a
      set of decisions made by the alarm rather than by you.
    emotional_job: >
      The reader finishes this chapter with a sense of loss that is honest but
      not crushing. They can see, perhaps for the first time, what the alarm
      has been trading away on their behalf — experiences they did not have,
      decisions they did not make, presence they did not access. The loss is
      real. It is also the first motivation to change something.
    practical_job: >
      The reader can inventory — briefly, without forensic depth — what living
      on constant alert has cost them in the specific domains of their life:
      what they've avoided, what they've over-prepared for, what they've been
      too distracted to be present for. This is also the chapter where the
      first small somatic practice arrives: one simple body-check exercise
      that asks nothing more than noticing.
    what_changes: >
      Before: "The alarm protects me. It's worth it."
      After: "The alarm is borrowing against something I didn't agree to spend."
    required_sections: [HOOK, SCENE, REFLECTION, PRACTICE]
    forbidden_moves:
      - Do not shame the reader for the costs they've incurred. The alarm
        made those choices. This is not a moral failure.
      - Do not make the cost inventory overwhelming or comprehensive. One
        domain. One honest look.
      - Do not rush to solutions in this chapter. The practice is a single
        small noticing exercise, not a technique for reducing the alarm.
      - Do not imply the reader has wasted their life. The framing is cost,
        not waste.
    recommended_enrichments:
      - The first practice should be somatic and tiny — a single breath with
        attention on where the alarm lives in the body right now.
      - Use a persona voice that has experienced the cost and is not angry
        about it — matter-of-fact, not accusatory.
    claim_someone_could_argue: >
      A reader who has used the alarm successfully — who believes their
      vigilance has genuinely kept them safe and made them competent — will
      push back on the cost framing. This chapter must account for what the
      alarm has provided before naming what it has taken.
    why_this_chapter_exists: >
      Without cost exposure, the reader has no motivation to try anything
      different. The alarm feels worth it. Chapter 5 creates the honest
      accounting that makes change feel worth attempting.
    what_comes_next: >
      The reader can see the cost. Chapter 6 is the turning point: the moment
      the book asks whether the alarm is calibrated to the present, or to
      something older.

  chapter_06:
    number: 6
    role: destabilization
    working_title: "Letting The Alarm Ring"
    thesis: >
      Every strategy you've used to manage the alarm — avoiding, preparing,
      checking, reassurance-seeking — has kept the alarm in charge. The alarm
      doesn't go quiet because you've satisfied it. It goes quiet because
      nothing confirmed the threat. The only way to teach the alarm is to let
      it run.
    emotional_job: >
      This chapter creates productive discomfort. The reader finishes it with
      their primary coping strategy under honest scrutiny — not attacked, but
      quietly revealed as the thing that maintains the alarm rather than
      resolving it. There is a moment of "I did not want to see that."
    practical_job: >
      The reader can identify their own primary alarm-management strategy —
      the one they rely on most — and understand, mechanically, why it cannot
      teach the alarm that the threat is not real. They understand the
      logic of why not acting on the alarm is the information the alarm needs.
    what_changes: >
      Before: "The way I manage the alarm is the reason it doesn't get worse."
      After: "The way I manage the alarm is the reason it keeps running."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not frame this as willpower or discipline. The reader does not need
        to resist the alarm through force.
      - Do not promise that letting the alarm run will feel manageable. It will
        not feel manageable. That is honest.
      - Do not introduce exposure practice yet — that is chapters 7-8. This
        chapter is the logic; those chapters are the practice.
      - Do not shame the avoidance or safety behaviors. They made sense as
        protection strategies. Name them accurately, not critically.
    recommended_enrichments:
      - Use the guard-dog metaphor — the dog cannot learn the
        neighborhood is safe if you always leave before it finishes checking.
    claim_someone_could_argue: >
      A reader could argue that their avoidance is genuinely protecting them
      from real consequences, not just alarm management. The chapter must
      acknowledge contexts where avoidance is correct — and then distinguish
      those from the alarm running the life.
    why_this_chapter_exists: >
      Without this chapter, the reader enters practice chapters without
      understanding why the practices require tolerating the alarm rather than
      reducing it. The logic of exposure rests entirely on the mechanism
      named here.
    what_comes_next: >
      The reader understands why the alarm cannot be satisfied into silence.
      Chapter 7 begins the actual practice: the smallest possible real-world
      experiments.

  chapter_07:
    number: 7
    role: practical_interruption
    working_title: "Small Exposures"
    thesis: >
      Practice begins where the alarm is a seven, not where it is a ten.
      You let it run at that manageable level, and you find out what actually
      happens next.
    emotional_job: >
      The reader finishes this chapter with something they haven't had in a
      long time: a small, earned piece of evidence. Not reassurance — evidence.
      They did something the alarm said not to do, and the alarm ran, and then
      it stopped, and the predicted catastrophe did not arrive. That is different
      from being told the catastrophe won't arrive.
    practical_job: >
      The reader has designed and attempted at least one small exposure — a
      situation where the alarm runs at a manageable intensity and they stay
      present without acting to reduce the alarm. They understand the
      sequence: alarm fires, they stay, alarm peaks, alarm drops, nothing
      catastrophic occurred.
    what_changes: >
      Before: "I need the alarm to go down before I can do the thing."
      After: "I can do the thing while the alarm is running. I just proved it."
    required_sections: [HOOK, SCENE, PRACTICE, REFLECTION]
    forbidden_moves:
      - Do not start with high-stakes exposures. The reader must succeed before
        they escalate.
      - Do not frame this as exposure therapy — no clinical scaffolding.
      - Do not imply the alarm will disappear after the exposure. It will return.
        The point is what the reader learns, not what the alarm does.
      - Do not rush to chapter 8's intensity. Chapter 7 is the success that
        makes chapter 8 possible.
    recommended_enrichments:
      - A practical hierarchy — three examples of small, medium, and difficult
        exposures in the reader's most common alarm domain.
      - A persona voice that reports the first exposure with honest awkwardness —
        "this felt terrible and also worked."
    claim_someone_could_argue: >
      A reader will argue that their alarm situations are categorically different
      — higher stakes, more real, not amenable to gradual exposure. The chapter
      must engage seriously with that resistance rather than dismissing it.
    why_this_chapter_exists: >
      This is the first place the reader earns their own evidence. Everything
      before was understanding. This chapter produces proof. Without it, the
      later chapters have no foundation of lived experience to build on.
    what_comes_next: >
      The reader has small evidence. Chapter 8 escalates into the harder version:
      what to do when the alarm is at full volume and the stakes feel real.

  chapter_08:
    number: 8
    role: practice_under_pressure
    working_title: "When The Alarm Screams"
    thesis: >
      There are moments when the alarm does not run at a manageable level. It
      screams. You can still stay present in those moments. Not comfortably —
      but present.
    emotional_job: >
      The reader finishes this chapter with a harder-won, more durable version
      of the confidence from chapter 7. They have not been told the hard moments
      are manageable. They have been prepared for the hard moments honestly —
      given a real account of what it is like to stay present when the alarm is
      at maximum — and they believe they can attempt it.
    practical_job: >
      The reader has a specific protocol for high-intensity alarm moments:
      a named physical anchor, a decision rule for whether to act or wait, and
      a post-alarm reflection practice. They have applied this to at least one
      scenario where the alarm was at significant intensity.
    what_changes: >
      Before: "When it's really bad, I have no choice but to give in to it."
      After: "I have a way through the bad moments. I don't have to wait for
      the alarm to stop before I can function."
    required_sections: [HOOK, SCENE, PRACTICE, REFLECTION]
    forbidden_moves:
      - Do not minimize the difficulty. High-intensity alarm moments are hard.
        Say so clearly.
      - Do not introduce too many techniques. One anchor. One decision rule.
        One reflection. More than that creates overwhelm during overwhelm.
      - Do not imply this is the last hard moment the reader will face. That
        promise would be dishonest and would set up chapter 10's relapse content
        as failure.
    recommended_enrichments:
      - A persona who reports a high-intensity moment with the protocol — what
        worked, what almost didn't, what the morning after felt like.
    claim_someone_could_argue: >
      A reader could argue that their alarm intensity is genuinely beyond what
      can be managed through presence — that their alarm level requires immediate
      action or relief. This chapter must take that seriously while distinguishing
      intensity from actual danger.
    why_this_chapter_exists: >
      Without a practice chapter for high-intensity moments, the reader will
      apply chapter 7's approach to everyday situations and be unprepared when
      the alarm spikes. Chapter 8 is the honest accounting for the hard cases.
    what_comes_next: >
      The reader has practiced with the alarm at low and high intensity. Chapter 9
      steps back to ask: what is the body actually learning through these
      experiences?

  chapter_09:
    number: 9
    role: somatic_legitimacy
    working_title: "When Your Body Learns It's Safe"
    thesis: >
      The alarm does not update through understanding. It updates through
      experience — specifically, through the repeated experience of the alarm
      running and the catastrophe not arriving. You are not teaching your mind
      new facts. You are teaching your nervous system a new prediction.
    emotional_job: >
      The reader finishes this chapter with a sense that something is actually
      changing — not just in their thinking but in the body's default setting.
      There is a quality of integration here: the practices of chapters 7-8
      are revealed as the mechanism of learning, not just coping.
    practical_job: >
      The reader understands why consistency of practice matters more than
      perfect execution. They can identify early signs that their nervous
      system is updating — subtle shifts in baseline, slightly longer time
      before the alarm engages, slightly faster return to baseline. They have
      a way to track these changes without over-measuring.
    what_changes: >
      Before: "I keep doing the practices but nothing is really changing."
      After: "The body is learning. The evidence is not dramatic — but it is real."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not promise dramatic change. The nervous system updates slowly and
        unevenly. Over-promising here sets up chapter 10's relapse framing
        as failure.
      - Do not make this chapter primarily cognitive — the learning described
        here is in the body, not the mind.
      - Do not skip the practices and move straight to integration. Chapter 9
        follows chapters 7-8 because the reader has done the work.
    recommended_enrichments:
      - A persona who notices the change in subtle, physical terms — not "I
        feel better" but "the drive to work was different this week."
    claim_someone_could_argue: >
      A reader whose alarm has not obviously changed will push back on the
      learning framing. This chapter must account for slow, uneven, non-linear
      change without dismissing that reader's experience.
    why_this_chapter_exists: >
      Without this chapter, the practices of 7-8 feel like management strategies
      rather than actual change. Chapter 9 reveals the deeper mechanism: the
      body is learning a new prediction. That reframe changes how the reader
      relates to practice going forward.
    what_comes_next: >
      The reader understands that change is happening at the body level. Chapter 10
      prepares them for the inevitable return of the alarm — and redefines what
      that return means.

  chapter_10:
    number: 10
    role: reframe
    working_title: "When The Alarm Comes Back"
    thesis: >
      The alarm will return. Not because you failed, not because you haven't
      done the work, but because your body remains responsive. The return
      of the alarm is information, not relapse.
    emotional_job: >
      The reader finishes this chapter with their biggest anticipated
      catastrophe reframed: "when this comes back, it means I failed" becomes
      "when this comes back, it means the alarm noticed something. I can check
      and decide." There is relief in losing the fear of the alarm's return.
    practical_job: >
      The reader has a protocol for alarm return: a quick check (is this a
      real signal or a misfire?), a decision about action, and a way to return
      to baseline faster because they have the pattern mapped. They understand
      the difference between a setback and a recurrence, and between a
      recurrence and a learning opportunity.
    what_changes: >
      Before: "If the alarm comes back, everything I've done has been pointless."
      After: "The alarm came back. I know what to do. This is not the same as
      where I started."
    required_sections: [HOOK, SCENE, PRACTICE, REFLECTION]
    forbidden_moves:
      - Do not frame alarm return as a test the reader must pass. That reframe
        still makes the alarm an adversary.
      - Do not minimize how discouraging alarm return feels. Acknowledge the
        frustration before offering the reframe.
      - Do not imply the reader will always handle the return well. The chapter
        is about having a way through, not guaranteeing the outcome.
    recommended_enrichments:
      - A persona who experiences alarm return at a high-stress moment — a
        medical scare, a work crisis — and uses the protocol with imperfect
        but real results.
    claim_someone_could_argue: >
      A reader could argue that the return of the alarm, especially after
      months of practice, is evidence that the approach doesn't work — that
      something more definitive is needed. This chapter must take that
      argument seriously before offering the reframe.
    why_this_chapter_exists: >
      Without this chapter, the reader is unprepared for the most predictable
      feature of working with a sensitive nervous system: the alarm will return.
      Chapter 10 turns that return from evidence of failure into readable
      information.
    what_comes_next: >
      The reader can handle alarm return. Chapter 11 asks the bigger question:
      who are they now, given all of this? How does this change what they
      call themselves?

  chapter_11:
    number: 11
    role: identity_fracture
    working_title: "Living With The Alarm On Low"
    thesis: >
      You are not going to become a person without an alarm. You are going to
      become a person who knows when the alarm is running and has a say in what
      happens next. That is a different person than you were, and it requires
      updating who you think you are.
    emotional_job: >
      The reader finishes this chapter with a quiet sense of becoming. Not
      a dramatic reinvention — a recognition that their relationship to the alarm
      has actually changed, and that the person who has that relationship is
      different from the person who arrived at chapter 1. There is something
      elegiac about this chapter: what is being left behind is real, even if
      it was also limiting.
    practical_job: >
      The reader can name, in specific terms, what has changed in their daily
      life and their relationship to the alarm. They can also name what has not
      changed — the alarm still fires, the sensitivity is still real. They
      understand integration as a continuous practice, not a completed state.
    what_changes: >
      Before: "I am an anxious person. This is what I am."
      After: "I am a person whose alarm runs. I know what that means now.
      That is not the same thing as being defined by it."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not promise a finished, alarm-free self. That would be dishonest
        and would immediately be contradicted by the reader's experience.
      - Do not make the identity shift sound like a graduation ceremony. It is
        quieter and more ongoing than that.
      - Do not rush past the grief of what is being released. Some readers have
        organized their entire identity around the alarm. Letting that go is real.
    recommended_enrichments:
      - A persona voice that reflects specifically on what they used to think
        being "anxious" meant, and what they think it means now.
    claim_someone_could_argue: >
      A reader could argue that the alarm is so central to who they are that
      changing their relationship to it would change them in ways they don't
      want. The chapter must honor that concern while distinguishing the alarm
      from the person.
    why_this_chapter_exists: >
      Without the identity chapter, the reader finishes the practice work with
      new skills but no new self-concept. The skills remain external tools
      rather than part of who they are. Chapter 11 integrates the work into
      identity.
    what_comes_next: >
      The reader knows who they are becoming. Chapter 12 is what life looks like
      from here — not a destination, but the direction.

  chapter_12:
    number: 12
    role: integration
    working_title: "The Life That's Possible Now"
    thesis: >
      This is not the chapter where everything gets better. This is the chapter
      where you understand what has actually changed, what the alarm is now,
      and what you can do with a life that is no longer run by it.
    emotional_job: >
      The reader finishes the book with a sense of forward movement that is
      honest rather than inflated. The alarm is still there. The reader is no
      longer organized around it. That is the actual outcome, and it is enough.
      There is something quietly expansive about the ending — not triumph, but
      space.
    practical_job: >
      The reader has articulated — in writing or in thought — three specific
      things that are different now. They have a maintenance practice they
      can sustain. They understand that the book is not the end of the work
      but a foundation for it. They know what to do when the hard moments come
      back.
    what_changes: >
      Before: "I am waiting to feel normal."
      After: "This is what living with the alarm on low looks like. I can do this."
    required_sections: [HOOK, SCENE, REFLECTION, FORWARD]
    forbidden_moves:
      - Do not end on triumph or conquest. The alarm did not lose. The reader
        became different. Those are not the same thing.
      - Do not make the ending feel like a completed arc. The reader's work
        continues. The book is a handoff, not a resolution.
      - Do not use any language that implies the alarm is behind them. The alarm
        is part of them, calibrated differently.
    recommended_enrichments:
      - Close with a scene that mirrors the opening of chapter 1 — same ordinary
        moment, different relationship to the alarm running inside it.
    claim_someone_could_argue: >
      A reader at the end could argue that they haven't changed enough — that
      the alarm still fires, still disrupts, still makes certain things
      impossible. The chapter must honor that the work is ongoing while
      affirming that something real has shifted.
    why_this_chapter_exists: >
      Without an honest ending chapter, the book leaves the reader without a
      landing place. Chapter 12 is the handoff: here is who you are now, here
      is what you have, here is where this goes next.
    what_comes_next: >
      The reader lives the life that is now available. They know how to return
      to the practices when the alarm escalates. The book is finished. The
      work is not.

sequencing_rules:
  must_come_before:
    - chapter_01 must precede all others — no recognition means no trust
    - chapter_02 must precede chapter_03 — origin precedes pattern map
    - chapter_04 must precede chapter_05 — body legitimacy precedes cost
    - chapter_04 must precede chapter_06 — mechanism precedes destabilization
    - chapter_06 must precede chapter_07 — logic of exposure precedes practice
    - chapter_07 must precede chapter_08 — small success precedes high intensity
    - chapters_07_and_08 must precede chapter_09 — practice precedes body-learning
    - chapter_09 must precede chapter_10 — integration before relapse reframe
    - chapter_10 must precede chapter_11 — relapse reframe before identity shift
    - chapter_11 must precede chapter_12 — identity before forward projection
  cannot_come_too_early:
    - No practice of any kind before chapter_05
    - The false-alarm mechanism (named explicitly) cannot come before chapter_06
    - Identity work cannot come before chapters_07_and_08 are complete
    - Cost exposure cannot come before body legitimacy (chapter_04)
  saved_for_late_book:
    - Identity fracture and self-concept revision (chapters 11-12)
    - Relapse reframe and alarm-return protocol (chapter_10)
    - Practice under high intensity (chapter_08)

tone_and_pacing:
  intensity_profile:
    - chapter_01: low — familiar, recognizing, safe
    - chapter_02: low-medium — warm, retrospective, softening
    - chapter_03: medium — orienting, mapping, slightly clinical
    - chapter_04: medium — precise, explanatory, body-level
    - chapter_05: medium-high — honest, confronting, first cost
    - chapter_06: high — destabilizing, revealing, necessary discomfort
    - chapter_07: medium — active, earned, specific, first relief
    - chapter_08: high — difficult, demanding, honest
    - chapter_09: medium — integrative, quieter, body-level validation
    - chapter_10: medium-high — honest, reframing, crucial
    - chapter_11: medium — reflective, elegiac, identity
    - chapter_12: low-medium — forward, spacious, honest

  trust_curve: >
    Trust is built in chapters 1-2 through precise recognition — the reader
    must feel seen before anything else is possible. Trust is spent carefully
    in chapters 5-6, when the book first challenges the reader's coping
    strategies. The spending is honest: "I know this is uncomfortable." Trust
    is rebuilt through the practice chapters (7-9), where the reader earns
    their own evidence. By chapter 10, the reader trusts the book enough to
    hear an uncomfortable truth about alarm return. Chapters 11-12 require
    the full accumulated trust to do identity work without defensiveness.

  action_timing: >
    First real practice arrives in chapter 5 and is intentionally small — a
    single somatic noticing exercise, not a technique for reducing the alarm.
    The first genuine exposure practice is chapter 7. High-intensity practice
    is chapter 8. Practice under relapse conditions is chapter 10.

  mechanism_timing: >
    The alarm pattern is introduced behaviorally in chapter 3. The body
    mechanism is introduced physiologically in chapter 4. The false-alarm
    logic — that the alarm can fire without real threat and be taught otherwise —
    is introduced conceptually in chapter 6. The body-learning mechanism
    (why practice changes the nervous system) is deepened in chapter 9.

  permission_timing: >
    Permission to be exhausted: chapter 1.
    Permission to trace where this came from: chapter 2.
    Permission to see the cost honestly: chapter 5.
    Permission to let the alarm run without acting: chapter 6.
    Permission to start small: chapter 7.
    Permission to have the alarm return without failure: chapter 10.
    Permission to be different without being fixed: chapter 11.

