family_id: grief
family_name: "Grief / Loss"
adjacent_topics: [loss_of_parent, loss_of_relationship, loss_of_identity, loss_of_future]
primary_mechanism: grief
allowed_engines: [grief, watcher]
forbidden_engines: [false_alarm, spiral, shame, comparison, overwhelm]

reader_starting_state: >
  The reader is waiting to feel normal again. They are functioning — going
  to work, answering messages, making dinner — but they are doing it from
  somewhere behind themselves. They have built a quiet rule that they may not
  have articulated: "don't let yourself feel this until you can feel it cleanly,
  until you can do it safely, until you are past the worst of it." They call this
  managing. They call it strength. They experience it as a kind of low-level
  absence, a numbness that is not peace, a distance that is not healing. They
  are waiting for the grief to be over. They do not know that waiting is the
  problem.

reader_ending_state: >
  The reader can carry the loss without waiting for it to end. They have stopped
  organizing their life around the project of getting past the grief. The
  connection to what was lost continues — it has changed in form, but it has
  not ended. The reader knows grief will return in waves, sometimes from
  unexpected angles, and that return is not failure and not evidence that
  something is wrong with how they've been doing this. They are living their
  life while carrying the loss, not after it.

what_makes_this_family_different: >
  This family must never feel like progress toward resolution. Every other
  structure in the library is organized around a problem being solved. Grief
  is not a problem to be solved. The arc moves from avoidance and management
  toward presence and integration — and integration is not the same as
  completion. Action arrives very late in this spine. The early chapters are
  almost purely witnessing. The author's relationship to the reader must feel
  like sitting beside them, not guiding them toward anything. Any chapter
  that feels like it is moving the reader toward being done with the grief
  has broken the family contract. The absence is present — not past. The book
  must hold that truth from chapter 1 to chapter 12 without flinching.

chapters:
  chapter_01:
    number: 1
    role: recognition
    working_title: "The Sentence Running Your Life"
    thesis: >
      There is a sentence underneath everything you're doing right now, and it
      goes something like this: "Once I'm past this, then I'll be okay." That
      sentence is not a plan. It is the thing keeping you from your own life.
    emotional_job: >
      The reader finishes this chapter feeling recognized in a way that may be
      uncomfortable. The recognition is not of their grief — they know their
      grief — but of the waiting strategy. The quiet, reasonable, invisible way
      they have been holding their life in suspension until grief passes. That
      recognition is precise and unwelcome and true.
    practical_job: >
      The reader can name the sentence — or their version of it — that has been
      running in the background. Not a clinical label. Not a category. A specific
      sentence. Something like: "When I'm through this, I'll be ready." Or "I
      just have to get past the anniversary." Or "Once I stop feeling this way
      every morning." The reader can locate where in their life they have been
      waiting.
    what_changes: >
      Before: "I am managing this well. I'm getting through it."
      After: "I have been waiting for this to be over. I didn't know I was
      doing that. I'm not sure I can keep not knowing it."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not define grief or name it clinically.
      - Do not move toward resolution in any way — no forward momentum, no
        "but there is a way through."
      - Do not offer reassurance that the waiting strategy is understandable.
        The recognition must be allowed to be uncomfortable.
      - Do not rush to the loss itself. Chapter 1 is about the sentence, not
        the event.
      - Do not use any language that implies the reader's way of coping is wrong.
        Name it precisely, without verdict.
    recommended_enrichments:
      - Open with a completely ordinary moment — a commute, a grocery store,
        a Sunday afternoon — rendered in the texture of someone who is present
        but not all the way there.
      - The author's voice should be quiet and close, not warm-therapeutic.
        Sitting beside, not in front of.
    claim_someone_could_argue: >
      A reader could argue that there is genuine wisdom in not letting the grief
      overtake their functioning — that managing it is appropriate and adaptive.
      This chapter must honor that argument seriously before showing where the
      cost accumulates.
    why_this_chapter_exists: >
      Without this chapter, the reader does not understand what the book is
      actually about. The book is not about grief as event. It is about grief
      as waiting — and the way the waiting forecloses the present. Without
      naming the sentence, the reader will read all twelve chapters as a guide
      to getting through the grief, which is the opposite of what this book does.
    what_comes_next: >
      The reader has named the sentence. Chapter 2 asks what is actually happening
      inside — not the managed version, but what the reader actually experiences
      when they let themselves notice.

  chapter_02:
    number: 2
    role: witnessing
    working_title: "What It Actually Feels Like Inside"
    thesis: >
      There is the grief you show — functional, managed, appropriate — and there
      is the grief that happens when no one is watching. This chapter is about
      the second one. It asks to be seen.
    emotional_job: >
      The reader finishes this chapter feeling witnessed. Not fixed. Not
      redirected. Witnessed. The author has sat with them in the private texture
      of the grief — the intrusive moments, the disorientation, the way certain
      ordinary things are unbearable, the way some moments are fine and that
      itself feels wrong — and named it without pathologizing it or rushing
      toward meaning.
    practical_job: >
      The reader can describe — even if only internally — what their private
      grief actually looks like. The version they don't show. Where in the day
      it surfaces. What form it takes. This is not an exercise; it is an act
      of permission to see clearly.
    what_changes: >
      Before: "I'm doing okay. I'm getting through it."
      After: "Here is what I actually carry. I've been carrying it alone."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not offer meaning for the grief. Not yet, not ever forcefully.
        This chapter witnesses only.
      - Do not categorize or describe the reader's grief experience as stages
        or phases.
      - Do not imply any grief experience is more valid than another. The reader
        who cries in the car is not more legitimate than the reader who feels
        nothing.
      - Do not move toward action or insight. Witnessing is the action. Naming
        is the practice.
      - Do not introduce the mechanism yet. This chapter is purely experiential.
    recommended_enrichments:
      - A scene that renders the private grief texture — not the most dramatic
        version but the most ordinary one — the mid-afternoon ambush, the
        song on a speaker in a restaurant.
      - A persona voice that describes the specific ways they managed to be
        functional and privately undone at the same time.
    claim_someone_could_argue: >
      A reader who has suppressed the private texture of their grief may resist
      this chapter — "I'm not like that, I've processed this, I'm actually fine."
      The chapter must allow for the reader who is genuinely functional while
      also gently holding space for what might be underneath.
    why_this_chapter_exists: >
      Without witnessing, every subsequent chapter is advice offered to someone
      who has not yet been seen. The reader will not be able to take in anything
      the book offers until the book has shown it understands what they are
      actually carrying, not just the surface version.
    what_comes_next: >
      The reader has been witnessed. Chapter 3 asks what the waiting strategy
      costs — not morally, but in terms of the life that is being deferred.

  chapter_03:
    number: 3
    role: cost_exposure
    working_title: "What The Waiting Costs"
    thesis: >
      The strategy of waiting to feel this until you can feel it safely is
      not free. It is costing you the present. Not the past — the present.
      The life you are postponing is not your future life. It is the one
      happening right now.
    emotional_job: >
      The reader finishes this chapter with a quiet but specific sense of loss
      about the cost of waiting — not guilt, not shame, but a honest accounting.
      "I have not been fully present for this period of my life" is a hard
      thing to see. The chapter holds that without making it a verdict.
    practical_job: >
      The reader can identify at least one specific domain — a relationship,
      a creative life, a daily presence — where the waiting strategy has meant
      partial absence. Not comprehensive inventory. One clear, specific domain.
    what_changes: >
      Before: "Managing this is the responsible thing to do."
      After: "Managing this has a cost. I can see what I've been not quite
      present for."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not make the cost feel like an indictment of the reader's choices.
        The waiting strategy made sense. It also has a cost.
      - Do not move toward action here. The reader is not ready. Cost exposure
        precedes any invitation to change.
      - Do not imply the reader has wasted time or missed irreplaceable moments
        in a way that creates further grief on top of grief.
      - Do not offer reassurance that the cost can be recovered. That would
        not be honest.
    recommended_enrichments:
      - A persona who realizes they have been half-present with someone who
        needed them fully — not through neglect but through the management
        strategy.
    claim_someone_could_argue: >
      A reader could argue that the management strategy has allowed them to
      continue functioning and being present for others — that without it they
      would have been non-functional. The chapter must honor this as real before
      examining what the strategy has also foreclosed.
    why_this_chapter_exists: >
      Without cost exposure, the reader has no internal motivation to examine
      the waiting strategy. The book can witness and name all it wants — but
      without the honest accounting of what the waiting costs, there is no
      question forming in the reader. This chapter creates the question.
    what_comes_next: >
      The reader sees the cost. Chapter 4 goes underneath the waiting strategy
      to find the belief that makes it feel necessary.

  chapter_04:
    number: 4
    role: hidden_belief
    working_title: "What You're Afraid Would Happen If You Stopped Managing"
    thesis: >
      Underneath the waiting strategy is a belief, rarely spoken: that if you
      let the grief in fully, you will fall apart in a way you cannot come back
      from. The strategy is not about control. It is about survival.
    emotional_job: >
      The reader finishes this chapter with their central fear made visible. Not
      pathologized — made visible. The fear that full grief is a floor with a
      trap door. That surviving the loss required keeping the grief at a manageable
      distance. The reader may feel exposed. That exposure is the work.
    practical_job: >
      The reader can name their specific version of the underlying belief:
      "If I really let myself feel this, I will..." — and finish that sentence
      honestly. The belief is articulated, not diagnosed.
    what_changes: >
      Before: "I keep the grief at a certain level because that's just how I am."
      After: "I keep the grief at a certain level because I believe something
      will happen if I don't. I know what I believe now."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not challenge the belief directly in this chapter. Name it. Do not
        debate it. The reader is not ready to have it questioned.
      - Do not offer evidence that the belief is wrong. That evidence belongs
        to chapter 8. Here the work is recognition.
      - Do not imply the belief is irrational. It formed in response to real
        experience. It made sense.
      - Do not promise that facing the grief fully will be survivable. The
        reader has to find that out, not be told it.
    recommended_enrichments:
      - A persona who can articulate the specific imagery attached to the belief
        — "I would never stop crying." "I would not be able to get up." "I would
        become someone who couldn't function."
    claim_someone_could_argue: >
      A reader could argue that the belief is correct — that their grief is
      actually overwhelming and requires management to avoid genuine dysfunction.
      The chapter must take seriously the difference between necessary
      management and the belief that grief is inherently unsurvivable.
    why_this_chapter_exists: >
      Without the hidden belief chapter, the book can describe the strategy and
      name the cost but cannot explain why the reader keeps choosing it. The
      belief is the engine. Without finding it, the reader has no way to
      examine it.
    what_comes_next: >
      The reader has the belief named. Chapter 5 moves into the body — what
      grief actually does physiologically, and why the body's response is
      not evidence that the belief is correct.

  chapter_05:
    number: 5
    role: somatic_legitimacy
    working_title: "Grief in the Body"
    thesis: >
      The body does not experience grief as an emotion. It experiences it
      as a physical event — waves, thresholds, exhaustion, the strange animal
      fact of missing someone. The body's response to loss is not dysfunction.
      It is a genuine, physiological response to the removal of something real.
    emotional_job: >
      The reader finishes this chapter with their body's grief response
      legitimized. Not managed, not explained away — recognized as real and
      appropriate. The reader who has felt exhausted, physically strange,
      unable to concentrate, is not broken. The body is doing what bodies do
      when they lose something they organized around.
    practical_job: >
      The reader can name the physical dimension of their grief — not diagnose
      it, but name it. Where in the body the grief lives. What it feels like
      in the first hour of the morning. What happens when the wave comes. They
      have language for the physical experience that is not medicalized and not
      euphemistic.
    what_changes: >
      Before: "Something is wrong with me physically. I can't concentrate.
      I'm always tired."
      After: "My body is responding to loss. This is what that looks like from
      the inside. It is not dysfunction."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not medicalize the physical response. The body's grief is not a
        symptom. It is a response.
      - Do not use the physical legitimacy to minimize the emotional experience.
        The body chapter does not explain the grief away — it adds a dimension.
      - Do not move toward somatic practice here. Chapter 9 introduces somatic
        tending. Chapter 5 is legitimacy only.
      - Do not imply the physical response will become manageable with the
        right approach. Some of it simply takes as long as it takes.
    recommended_enrichments:
      - A scene that renders the wave — not the peak, but the approach — the
        way the body registers it before the mind catches up.
      - Language for the absence as a physical event — the reaching for a phone
        to send a message to someone who is no longer there.
    claim_someone_could_argue: >
      A reader who has experienced somatic grief symptoms seriously — difficulty
      eating, sleeping, concentrating — may worry this chapter is normalizing
      something that requires medical attention. The chapter must hold the line
      between legitimate body grief and symptoms that warrant professional support.
    why_this_chapter_exists: >
      Without body legitimacy, the hidden belief chapter's fear ("I will fall
      apart") stays unchallenged in body terms. The reader needs to understand
      that what the body is doing is appropriate — not dysfunction — before they
      can begin examining whether the belief about falling apart is accurate.
    what_comes_next: >
      The reader understands the body's response. Chapter 6 introduces the
      mechanism: why the waves come when they do, and what the presence of
      the absence actually is.

  chapter_06:
    number: 6
    role: mechanism
    working_title: "The Absence Is a Presence"
    thesis: >
      The waves of grief are not random. They follow the pattern of what was
      lost — the moments when the lost person or thing would have been present.
      The absence is not empty. It has a shape. It shows up where the presence
      used to be.
    emotional_job: >
      The reader finishes this chapter with a shift in how they understand the
      waves. The grief that ambushes them at unexpected moments is not proof of
      disorder or delayed processing. It is the shape of the loss, showing up
      where the lost presence belonged. That reframe is both accurate and
      deeply consoling, without being falsely comforting.
    practical_job: >
      The reader can trace why specific moments, places, times of day, or
      ordinary events carry the grief. Not all grief moments — but at least
      one cluster. The wave has a logic. The logic is the shape of the
      relationship or the life that was lost.
    what_changes: >
      Before: "The grief comes out of nowhere and I can't predict it or
      control it."
      After: "The grief comes where the presence used to be. It's not random.
      The absence has a shape."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not use stage language or phase language of any kind. The waves do
        not indicate where in a sequence the reader is.
      - Do not imply that understanding the mechanism gives the reader control
        over the waves. It does not.
      - Do not rush to comfort. The mechanism chapter can be true and painful
        simultaneously. Let it be both.
      - Do not suggest the reader should anticipate or prepare for the waves.
        That is alarm-management thinking, not grief-integration thinking.
    recommended_enrichments:
      - A scene that shows the mechanism in real time — a specific ordinary
        moment (Thursday evenings, a certain restaurant, the way winter light
        falls) — that carries the loss specifically because that was when, or
        where, or how the presence showed up.
    claim_someone_could_argue: >
      A reader could argue that their grief does not follow this pattern — that
      it is genuinely random, unpredictable, not organized around the lost
      presence. The chapter must account for grief waves that seem truly
      unmoored while still offering the mechanism as a frame.
    why_this_chapter_exists: >
      Without the mechanism, the waves feel like evidence of disorder —
      something wrong with the reader's ability to process. With it, the
      waves become readable information. The chapter changes the reader's
      relationship to the waves without changing the waves themselves.
    what_comes_next: >
      The reader can read the waves. Chapter 7 turns outward: what does the
      grief do to the reader's relationships, and what can and cannot be
      said there?

  chapter_07:
    number: 7
    role: relational_consequence
    working_title: "The Unspeakable"
    thesis: >
      Grief changes relationships. Not because the people around you have
      failed, and not because you have failed — but because there is something
      about this loss that cannot be transferred in words, and that
      untranslatability creates a specific kind of loneliness.
    emotional_job: >
      The reader finishes this chapter feeling less alone in the specific
      loneliness of grief inside relationship. Not because the loneliness
      has been resolved — but because it has been named accurately. The gap
      between what they carry and what they can express to the people around
      them is real. They are not failing at communication. Some of this simply
      cannot be said.
    practical_job: >
      The reader can identify one or two relationships where the grief has
      created a specific kind of distance — not conflict, not failure, but the
      distance of the unspeakable. They understand that distance as a feature
      of grief in relationship, not as evidence of a broken relationship or a
      failure of intimacy.
    what_changes: >
      Before: "The people around me don't understand. I don't know how to
      explain it. Something is wrong with us."
      After: "Some of this cannot be explained. The loneliness inside the
      relationship is grief doing what grief does. It is not a verdict
      on the relationship."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not offer communication strategies for expressing grief to others.
        This chapter is not about improving communication — it is about
        legitimizing the limits of communication.
      - Do not imply that the people around the reader are failing them. They
        are limited in the same way anyone outside the loss is limited.
      - Do not rush to relational repair. The chapter names the distance.
        It does not resolve it.
      - Do not use the relational chapter to move toward action. Action
        comes in chapter 9.
    recommended_enrichments:
      - A scene that shows the gap — a conversation that went fine, that looked
        fine from outside, in which the reader was privately alone in a room
        with the loss.
    claim_someone_could_argue: >
      A reader could argue that their relationships have actually been a source
      of sustaining support — that they have not felt alone in this. The chapter
      must honor that experience while also addressing the specific loneliness
      that exists even in the most supportive relationships.
    why_this_chapter_exists: >
      Without the relational chapter, the book treats grief as purely an internal
      event. It is not. It lives in the spaces between people. And the
      loneliness of being inside a loss that others cannot fully enter is one
      of the most painful and least-named features of grief. This chapter names it.
    what_comes_next: >
      The reader has seen what the grief does to relationships. Chapter 8 is
      the destabilization: the waiting strategy is not neutral. Waiting for
      grief to end is itself the problem, and this chapter makes that unavoidable.

  chapter_08:
    number: 8
    role: destabilization
    working_title: "The Grief Doesn't End. The Waiting Is The Problem."
    thesis: >
      The sentence "once I'm past this, then I'll be okay" is organized around
      an ending that does not exist. Grief does not end. It integrates. The
      project of waiting for it to be over is not a temporary strategy — it is
      a permanent deferral. And that deferral is costing you the one life you have.
    emotional_job: >
      This chapter creates the productive collapse of the waiting strategy. The
      reader finishes it with the architecture of their primary coping strategy
      revealed as untenable — not wrong, not shameful, but untenable. The ground
      shifts. This is the most difficult chapter in the book. It must be done
      without cruelty.
    practical_job: >
      The reader understands, in specific terms, what it would mean to stop
      waiting. Not to stop grieving — to stop waiting for the grief to pass
      before they live. They can name what they have been deferring and why.
      They can see that the deferral is not a temporary state — it is a
      permanent structure unless something changes.
    what_changes: >
      Before: "I just have to get through this and then I can get back to
      my life."
      After: "There is no getting through it. There is only carrying it.
      I have been waiting for a door that isn't there."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not soften this chapter. The destabilization must land.
      - Do not offer comfort in the same breath as the disruption. The reader
        needs to sit with this.
      - Do not turn this into a motivational chapter. The destabilization is
        not "you can do this" — it is "the strategy isn't working."
      - Do not rush to the solution chapter. Chapter 8 ends in the recognition
        of the problem. Chapter 9 offers a different possibility.
    recommended_enrichments:
      - A persona who has spent two years waiting — and who sees clearly,
        in this chapter, what they have been waiting for and why the door
        will not open.
    claim_someone_could_argue: >
      A reader could argue that their grief is new — that they are not
      stuck in a waiting strategy, they are simply early in the grief and
      haven't yet had the chance to get stuck. The chapter must address
      this reader without invalidating the urgency for the reader who has
      been waiting for years.
    why_this_chapter_exists: >
      Without destabilization, the reader has no reason to change. They have
      been seen, legitimized, understood — but the waiting strategy is still
      available and it is still the most comfortable option. Chapter 8 removes
      the comfort without removing the reader's dignity.
    what_comes_next: >
      The waiting strategy has been revealed as untenable. Chapter 9 offers
      the first real alternative: not resolution, but tending.

  chapter_09:
    number: 9
    role: practical_interruption
    working_title: "Tending the Loss"
    thesis: >
      There is something you can do that is not about getting past the grief
      and is not about sitting inside it unchanged. It is about tending what
      remains — the connection, the absence, the self that is still here.
      It is small, and it is real, and it is available.
    emotional_job: >
      The reader finishes this chapter with something genuinely new: a small,
      concrete way of relating to the loss that is neither avoidance nor
      immersion. Not a technique for feeling better. A practice of tending. The
      emotional experience of this chapter is quiet, specific, and real —
      not inspired, not healed, but present in a way they may not have
      been before.
    practical_job: >
      The reader has one small, specific practice: a way of tending the loss
      that is honest about what it is and does not promise more than it can
      deliver. This might be a regular act of acknowledgment, a practice of
      noticing the absence without managing it, a specific ritual of connection
      to what remains. The practice is not universal — the reader adapts it to
      their specific loss and their specific life.
    what_changes: >
      Before: "There's nothing to do about it except wait."
      After: "I can tend this. Not fix it. Not finish it. Tend it."
    required_sections: [HOOK, SCENE, PRACTICE, REFLECTION]
    forbidden_moves:
      - Do not frame the practice as a way to feel better or speed the grief.
        It does not do either of those things.
      - Do not offer a universal practice. The reader must adapt the principle
        to their specific loss.
      - Do not make the practice feel like the resolution of the waiting
        strategy. It is the beginning of a different relationship to the loss,
        not the completion of it.
      - Do not overcrowd the chapter with multiple options. One principle.
        One practice. Adapted, not multiplied.
    recommended_enrichments:
      - A persona who finds a specific, unexpected form of tending — not the
        obvious memorial ritual but something more private and strange and true.
    claim_someone_could_argue: >
      A reader could argue that they have already tried rituals and memorials
      and deliberate acknowledgment, and that none of it has helped. The
      chapter must distinguish between tending as resolution-seeking and
      tending as ongoing relationship — and acknowledge the reader who has
      tried the former.
    why_this_chapter_exists: >
      Without this chapter, the book acknowledges the waiting strategy won't
      work and offers nothing in return. Chapter 9 is the first genuine
      alternative. It must be small, honest, and available. It cannot promise
      more than it can deliver.
    what_comes_next: >
      The reader has a practice of tending. Chapter 10 asks the harder question:
      who are they now? The loss has changed them, and that change requires
      attention.

  chapter_10:
    number: 10
    role: identity_fracture
    working_title: "Who Are You Now"
    thesis: >
      Significant loss changes the self. Not as metaphor — as fact. The person
      who existed inside the relationship, or the life, or the future that was
      lost is not fully intact. That is not failure. That is what loss does.
      The question is not how to get back to who you were. It is who you are now.
    emotional_job: >
      The reader finishes this chapter with permission to be changed — genuinely
      changed — by the loss. Not improved, not damaged, but different. There is
      a grief inside this chapter that is about the self: who you were in the
      relationship, in the future you imagined, in the life that included the
      lost thing. That grief is real and it deserves its own space.
    practical_job: >
      The reader can name, at least approximately, what specifically has changed
      in who they are. Not the global "I am not who I was" — the specific: the
      part of themselves that existed inside the lost relationship, the plans
      that required the lost future, the identity organized around what is no
      longer there. They have a name for the self-loss inside the larger loss.
    what_changes: >
      Before: "I just need to get back to who I was before this."
      After: "That version of me lived inside something that no longer exists.
      I have to find out who I am in what's here now."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not offer silver linings about personal growth through loss. The
        reader did not need this loss to grow.
      - Do not imply the changed self is better or more authentic. It is
        simply different.
      - Do not rush the identity chapter toward resolution. The reader does
        not need to know who they are by the end of this chapter.
      - Do not conflate the loss of the person or thing with the loss of self.
        Chapter 10 is specifically about the self-loss.
    recommended_enrichments:
      - A persona who realizes that a specific part of their daily identity —
        how they described themselves, what they looked forward to, what gave
        a certain week its shape — no longer applies and cannot be restored.
    claim_someone_could_argue: >
      A reader could argue that they are essentially the same person they were
      before the loss — that the loss has not changed their core identity, only
      their circumstances. The chapter must hold space for that reader while
      also examining what is genuinely different.
    why_this_chapter_exists: >
      Without the identity chapter, the book treats grief as something that
      happens to a stable, unchanged self. But significant loss changes the
      self that experiences everything else. Without naming that, the
      integration chapter cannot mean what it needs to mean.
    what_comes_next: >
      The reader has named the identity change. Chapter 11 is about integration
      — not resolution, but the ongoing practice of carrying the loss as part
      of who they now are.

  chapter_11:
    number: 11
    role: self_relation_shift
    working_title: "The Loss Is Part of You Now"
    thesis: >
      Integration is not resolution. You do not finish grieving and arrive
      somewhere without the loss. The loss becomes part of the self that
      continues. The person you are now includes what happened. That is not
      a consolation. It is the actual structure of what comes next.
    emotional_job: >
      The reader finishes this chapter with a shift in their relationship to
      the loss itself. Not acceptance in the managed sense — not "I am at
      peace with this" — but a recognition that the loss is not separate from
      who they are anymore. It is woven in. That is different from being
      defined by it, and it is different from being free of it.
    practical_job: >
      The reader understands what integration looks like as a lived practice.
      Not a completed state. A continuous, ongoing incorporation of the loss
      into the life. They can identify what integration has looked like for
      them so far — even in small ways, even imperfectly — and they understand
      that this is the form the work takes going forward.
    what_changes: >
      Before: "I need to get back to normal. I need to not have this be the
      center of everything."
      After: "This is part of me now. Not everything — part. I can carry it
      and be more than it."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Do not frame integration as the end of the grief. The grief continues.
        Integration is how it is carried, not that it ends.
      - Do not use language that suggests acceptance equals peace. Integration
        can coexist with ongoing pain.
      - Do not imply the reader should feel grateful for what the loss has
        given them. That framing is not available here.
      - Do not rush to the forward chapter. Chapter 11 is about integration
        in the present, not projection into the future.
    recommended_enrichments:
      - A persona who describes living with integration — not transformed,
        not resolved, but carrying — in a specific, ordinary moment.
    claim_someone_could_argue: >
      A reader could argue that they do not want the loss to be part of them
      — that integration sounds like surrendering to the loss rather than
      recovering from it. The chapter must take that argument seriously and
      distinguish integration from defeat.
    why_this_chapter_exists: >
      Without the integration chapter, the destabilization of chapter 8 and
      the practice of chapter 9 have no destination. The reader needs to
      understand what it looks like to carry this well — not well as in
      without pain, but well as in intact and present and alive.
    what_comes_next: >
      The reader understands integration. Chapter 12 is the forward — not an
      ending, but a beginning of the ongoing life that includes the loss.

  chapter_12:
    number: 12
    role: integration
    working_title: "Carrying the Grief, Living the Life"
    thesis: >
      This is not the chapter where the grief is behind you. This is the
      chapter where you understand that the grief is part of how you walk
      forward. The connection to what was lost continues — changed in form,
      not ended. This is not the same as being okay. It is being present.
    emotional_job: >
      The reader finishes the book with something quiet and true: the sense
      that they can live their life while carrying this. Not after it. Not
      despite it. While carrying it. The ending is not triumphant. It is
      spacious. There is room to breathe. The loss is real and the life is real
      and both are present.
    practical_job: >
      The reader has articulated — even briefly — what carrying the grief
      while living the life looks like for them specifically. They have the
      tending practice from chapter 9. They have the integration understanding
      from chapter 11. They understand that the waves will continue and that
      their return is not failure. They know what to do when the hard waves
      come.
    what_changes: >
      Before: "Once I'm past this, then I'll be okay."
      After: "I am not past this. I am carrying it. I am living anyway.
      That is enough."
    required_sections: [HOOK, SCENE, REFLECTION, FORWARD]
    forbidden_moves:
      - Do not end with triumph, resolution, or the sense that the reader
        has completed something.
      - Do not use language that implies the grief is behind them or that
        they are on the other side.
      - Do not offer comfort that is not earned. The comfort available here
        is specific and honest — you can carry this and live.
      - Do not imply that carrying the grief will become easy. It may become
        more familiar, but it will not become easy.
    recommended_enrichments:
      - Close with a scene that mirrors chapter 1 — the same ordinary moment,
        the same sentence available to them — but the relationship to it has
        changed. They are carrying the loss. They are also here.
    claim_someone_could_argue: >
      A reader at the end of the book could argue that the book has not
      offered enough — that they still do not know how to stop hurting, that
      the grief is still real and the life is still deferred. The chapter must
      honor that reader fully while offering the one honest thing available:
      the grief is real, the life is real, both are true, you can be in both.
    why_this_chapter_exists: >
      Without an ending, the book leaves the reader without a landing. But
      the ending must be honest. Chapter 12 is not a resolution. It is a
      recognition: this is what carrying looks like, and you are doing it.
    what_comes_next: >
      The reader lives the life that includes the loss. The connection to what
      was lost continues — changed in form, not ended. The book is finished.
      The carrying is not.

sequencing_rules:
  must_come_before:
    - chapter_01 must precede all — the sentence must be named before
      anything else is possible
    - chapter_02 must precede chapter_03 — witnessing before cost
    - chapter_03 must precede chapter_04 — cost before hidden belief
    - chapter_04 must precede chapter_05 — hidden belief before body
    - chapter_05 must precede chapter_06 — somatic legitimacy before mechanism
    - chapter_06 must precede chapter_07 — mechanism before relational
    - chapter_07 must precede chapter_08 — relational before destabilization
    - chapter_08 must precede chapter_09 — destabilization before practice
    - chapter_09 must precede chapter_10 — practice before identity
    - chapter_10 must precede chapter_11 — identity fracture before integration
    - chapter_11 must precede chapter_12 — integration understanding before forward
  cannot_come_too_early:
    - No practice of any kind before chapter_09 — early practice reads as
      fixing-energy and breaks the family contract
    - Destabilization cannot come before the reader has been fully witnessed
      (chapters 1-2 minimum)
    - Identity work cannot come before witnessing, cost, belief, body, and
      mechanism are complete
    - The forward projection cannot come before integration is named
  saved_for_late_book:
    - Identity fracture (chapter_10)
    - Integration and self_relation_shift (chapters_11-12)
    - Practical interruption (chapter_09) — arrives later here than in
      any other family

tone_and_pacing:
  intensity_profile:
    - chapter_01: low-medium — quiet, precise, recognizing, slightly uncomfortable
    - chapter_02: low — close, witnessing, present, no pressure
    - chapter_03: medium — honest, specific, cost without verdict
    - chapter_04: medium — exposing, gentle, naming not debating
    - chapter_05: medium — body-level, legitimate, precise
    - chapter_06: medium — clarifying, reframing, the waves now readable
    - chapter_07: medium — honest about loneliness, named not resolved
    - chapter_08: high — destabilizing, honest, necessary discomfort
    - chapter_09: medium-low — small, available, quiet relief
    - chapter_10: medium-high — identity, specific, unsentimental
    - chapter_11: medium — integrative, present, carrying
    - chapter_12: low-medium — spacious, honest, forward without triumph

  trust_curve: >
    Trust is built entirely through witnessing in chapters 1-2. The book earns
    nothing — it gives first. It sees the reader before it asks anything. Cost
    and hidden belief chapters (3-4) spend that trust carefully, always
    staying with the reader rather than in front of them. Body legitimacy (5)
    and mechanism (6) rebuild trust through accuracy. The relational chapter
    (7) deepens trust by naming the loneliness. Destabilization (8) is the
    hardest spend — it is only possible because of everything that came before.
    The practice chapter (9) restores trust by offering something real without
    overpromising. Identity and integration chapters (10-12) require the reader's
    full accumulated trust to do the hardest work.

  action_timing: >
    First and only real practice arrives in chapter 9. This is deliberately
    late — later than any other family. Everything before chapter 9 is
    witnessing, mapping, legitimizing, and destabilizing. Action before chapter
    9 would carry fixing-energy and break the spine's contract with the reader.

  mechanism_timing: >
    The absence-as-presence mechanism is introduced in chapter 6, after the
    reader has been witnessed (ch2), had their costs named (ch3), had their
    belief surfaced (ch4), and had their body response legitimized (ch5).
    The mechanism cannot be introduced before those foundations are in place —
    it would read as explanation before the reader has been seen, and
    explanation before witnessing is not tolerated by grief.

  permission_timing: >
    Permission to have been managing: chapter 1 (named, not judged).
    Permission to have a private grief no one sees: chapter 2.
    Permission to see the cost of waiting: chapter 3.
    Permission to name the underlying fear: chapter 4.
    Permission for the body's response to be real: chapter 5.
    Permission to not know why the waves come: chapter 6 (they have a
    logic now).
    Permission to feel alone inside relationships: chapter 7.
    Permission to stop waiting for the door: chapter 8.
    Permission to tend instead of manage: chapter 9.
    Permission to be genuinely changed: chapter 10.
    Permission for integration without resolution: chapter 11.
    Permission to carry the loss and live: chapter 12.

