family_id: social_anxiety
family_name: "Social Anxiety / Performance"
adjacent_topics: [anxiety, depression, perfectionism]
primary_mechanism: false_alarm
allowed_engines: [false_alarm, shame, comparison]

reader_starting_state: >
  The reader is present in social situations but not actually in them. They are
  managing an internal performance: monitoring how they're coming across, calculating
  what to say next before the current sentence is finished, watching themselves from
  a slight outside position. They often leave social situations exhausted and replay
  what they said, what they should have said, what others must have thought. They
  avoid social contexts when they can, or endure them with effort that is invisible
  to everyone around them. They believe the problem is that they are "not good at
  socializing" — that other people have a skill or an ease they were never given.
  They have likely been told to "put themselves out there more" and found this
  instruction baffling or demoralizing.

reader_ending_state: >
  The reader understands that social anxiety is not a social skill deficit — it
  is a threat-detection system that has learned to treat social exposure as danger.
  They can name the scanning pattern and the safety behaviors they've been using,
  and they understand how those behaviors maintain the problem rather than solving it.
  They have done at least one small exposure with the alarm running — not after the
  alarm passed, but through it. They have a different relationship with being seen:
  not fearless, but less obedient to the fear. They know the difference between
  their performance self and their relaxed self, and they have more access to the
  latter than they did at the start.

what_makes_this_family_different: >
  This family's readers are often secretly competent socially when they are not in
  threat-detection mode. In relaxed contexts, in small groups they trust, with close
  friends, they are present and even engaging. The performance self and the relaxed
  self are both real — and the book must name this gap explicitly. The false alarm
  is precise: not "danger everywhere" but "danger in social visibility." The shame
  mechanism means the book must legitimize being seen before it asks the reader to
  be visible. And the comparison mechanism means the reader is constantly measuring
  their interior experience against others' apparent ease — a comparison that will
  always produce unfavorable results. The book must not tell the reader they are
  more interesting than they think. That is condescending and will be rejected.

chapters:
  chapter_01:
    number: 1
    role: recognition
    working_title: "The Performance That No One Sees"
    thesis: >
      Social anxiety is not shyness and it is not introversion. It is a specific
      internal performance: monitoring, calculating, and self-observing in real
      time while trying to appear natural. The reader is in a room with everyone
      else and simultaneously running a separate, exhausting show inside their head.
    emotional_job: >
      Give the reader the precise recognition of being seen in their specific
      experience — not the general "social anxiety" label but the exact texture
      of the internal performance. The reader should feel: "This is exactly it.
      Someone finally described the inside."
    practical_job: >
      Name the scanning/performing pattern in concrete terms: the real-time
      monitoring of how they're coming across, the calculation of what to say,
      the self-watching from outside. Distinguish this from shyness (a preference
      for quiet) and introversion (energy depletion from social contact). Define
      it as a specific threat-response mode that activates in social visibility.
    what_changes: >
      Before: "I'm just not good at socializing. It's a personality thing."
      After: "I'm running a specific internal performance in social situations. That has a structure I can learn."
    required_sections: [HOOK, SCENE, RECOGNITION_MAP]
    forbidden_moves:
      - Conflating with shyness, introversion, or social awkwardness
      - Suggesting the performance is a choice
      - Offering any solution or reassurance in chapter 1
      - Saying or implying the reader is more interesting than they think
    recommended_enrichments:
      - A scene from inside the performance: specific, textured, from the reader's probable experience
      - The distinction between the performance self (social anxiety mode) and the relaxed self
      - An inventory of specific performance behaviors: monitoring, calculating, observing
    claim_someone_could_argue: >
      Some would argue that careful attention to social cues is simply good social
      intelligence — and that self-monitoring in social contexts is a sign of
      empathy and consideration, not anxiety.
    why_this_chapter_exists: >
      The reader has spent years with a label ("shy," "introverted," "socially anxious")
      that is either too general or too clinical. Precise recognition is the prerequisite
      for everything else — without it, the reader is being asked to fix something
      they haven't clearly seen.
    what_comes_next: >
      The performance has a specific physical texture. The reader needs to know
      what it feels like in their body before they can understand what's driving it.

  chapter_02:
    number: 2
    role: somatic_legitimacy
    working_title: "The Body's Alarm in a Room Full of People"
    thesis: >
      The physical experience of social anxiety — the heat, the constricted voice,
      the heart rate, the hyperawareness of your own hands — is not embarrassing
      weakness. It is a threat-response system activating as it was designed to.
      The body is not malfunctioning. It is treating social exposure as danger,
      and doing so with complete consistency.
    emotional_job: >
      Remove shame from the physical symptoms. The reader has spent years
      being embarrassed by their own body's responses in social situations.
      Legitimizing those responses as intelligent, consistent, and structurally
      explainable should provide a specific kind of relief.
    practical_job: >
      Map the somatic signature of social anxiety: the specific physical cascade
      that happens when the alarm activates in social contexts. Explain why the
      body produces these responses — not because the reader is weak or broken,
      but because the threat-detection system is running correctly in response
      to a signal it has learned to treat as danger.
    what_changes: >
      Before: "I blush when I talk to people and I hate myself for it."
      After: "My body activates a threat response in social contexts. That's not a flaw. That's a learned pattern."
    required_sections: [SOMATIC_MAP, MECHANISM_PREVIEW, LEGITIMACY_FRAME]
    forbidden_moves:
      - Suggesting awareness of the physical response will reduce it
      - Introducing any intervention at this stage
      - Using "grounding technique" language
      - Connecting the somatic response to brain chemistry in a way that feels pathologizing
    recommended_enrichments:
      - A precise physical description of the social alarm cascade
      - The specific embarrassment loop: alarm response becomes visible, visibility becomes a second alarm
      - Why the body reads social exposure as physical threat (evolutionary context, briefly)
    claim_someone_could_argue: >
      Some would argue that the physical symptoms of social anxiety are simply
      the result of poor social experience — that more exposure automatically
      reduces the body's response over time.
    why_this_chapter_exists: >
      The reader's relationship with their own body in social contexts is one of
      shame and self-management. Before any exposure work is possible, the body
      must be re-established as a legitimate reporter rather than an enemy.
    what_comes_next: >
      The body is running an alarm. Now we need to understand exactly what that
      alarm is: why social exposure triggers a false danger signal.

  chapter_03:
    number: 3
    role: mechanism
    working_title: "The Body Treating a Conversation Like a Threat"
    thesis: >
      The false alarm mechanism is precise: the threat-detection system learned,
      at some point, to treat social exposure — being seen, evaluated, judged —
      as a form of danger. Not metaphorically. The same system that responds to
      physical threat is activating in response to a conversation. This is not
      irrational. It is the application of a real protection mechanism to a
      context where it overshoots.
    emotional_job: >
      Replace the reader's narrative of personal inadequacy ("I'm bad at this")
      with a structural understanding ("my threat system learned the wrong domain").
      The reader should feel neither relieved nor fixed — but they should feel
      that what's happening to them makes structural sense.
    practical_job: >
      Name and describe the false alarm mechanism: how threat detection works,
      why social evaluation can register as threat, and how the system learns
      to overapply. Separate the false alarm (body) from the shame (the layer
      of meaning-making that follows the alarm). Show both as distinct
      mechanisms that compound each other.
    what_changes: >
      Before: "Something is wrong with me in social situations."
      After: "My threat-detection system is applying to social contexts. That's the false alarm. That's what we're working with."
    required_sections: [MECHANISM_DESCRIPTION, FALSE_ALARM_VS_SHAME, STRUCTURAL_LOGIC]
    forbidden_moves:
      - Presenting this as a brain disorder or clinical diagnosis
      - Suggesting the mechanism is irrational
      - Introducing any fix at this stage
      - Conflating false alarm with shame (they are distinct and must be kept separate)
    recommended_enrichments:
      - A step-by-step walk-through of one social alarm from trigger to aftermath
      - The separation: "false alarm" (body response) vs "shame" (meaning-making layer)
      - Why the system learned to treat social exposure as threat — without speculating about specific trauma
    claim_someone_could_argue: >
      Some would argue that social rejection is a genuine threat with real
      consequences — that the threat-detection system is not wrong to flag it,
      just perhaps over-responsive.
    why_this_chapter_exists: >
      Mechanism understanding is the prerequisite for every practical move in
      this book. Without it, exposure work is just "do it anyway." With it, the
      reader understands what they're doing and why it works.
    what_comes_next: >
      The mechanism is running in service of something the reader believes.
      That belief must be named.

  chapter_04:
    number: 4
    role: hidden_belief
    working_title: "Once I'm Confident Enough, I'll Show Up"
    thesis: >
      Social anxiety runs on a waiting belief: that there is a level of confidence,
      preparation, or readiness that, once reached, will make social visibility
      safe. This belief produces a trap — the threshold never arrives, and the
      waiting itself maintains the alarm. Confidence is not the prerequisite for
      showing up. It is often the result.
    emotional_job: >
      Create the specific discomfort of recognizing a belief that has organized
      years of behavior. The reader should feel the strange clarity of seeing
      something that was invisible because it was too close.
    practical_job: >
      Name the belief explicitly and trace its logic: "I'll be social when I'm
      confident. I'll be confident when I've had enough positive social experiences.
      I'll have positive social experiences when I show up more. I'll show up more
      when I'm confident." Show the loop. Show why confidence cannot be generated
      in the absence of the exposure it requires.
    what_changes: >
      Before: "I just need to be more confident and then I'll be able to do this."
      After: "I've been waiting for something that requires the thing I'm waiting to do first."
    required_sections: [BELIEF_EXPOSURE, LOOP_DIAGRAM, HISTORICAL_EVIDENCE]
    forbidden_moves:
      - Telling the reader confidence is "just a feeling" they can choose
      - Suggesting fake it till you make it
      - Making the reader feel stupid for holding this belief
      - Introducing exposure work before the belief has been fully named
    recommended_enrichments:
      - A timeline: "here is how many years this belief has organized your social life"
      - The specific way this belief feels logical — because it is, structurally, except for the order
      - What the belief costs in terms of experiences not entered
    claim_someone_could_argue: >
      Some would argue that building confidence through small social successes is
      exactly the right approach — and that the sequencing is appropriate, not a trap.
    why_this_chapter_exists: >
      The belief is the engine that keeps the reader in the waiting room.
      Until it's named, no amount of practical instruction will override the
      feeling that they're not ready yet.
    what_comes_next: >
      The belief organizes behavior. It produces specific costs. Those costs
      need an honest accounting.

  chapter_05:
    number: 5
    role: cost_exposure
    working_title: "What the Performance Has Cost"
    thesis: >
      The performance mode has a ledger. It costs the reader's presence in their
      own life: the conversations not entered, the relationships kept at arm's
      length, the experiences avoided, and the exhaustion of social situations
      that were survived rather than inhabited.
    emotional_job: >
      Land the cost with honesty rather than urgency. The reader should feel
      the weight of accumulated avoidance — not to create panic about wasted time,
      but to make the costs visible as a real accounting rather than an abstraction.
    practical_job: >
      Map the specific costs of performance-mode living: social fatigue, the
      relationships that stayed shallow because proximity was managed, the
      situations not entered, the gap between the life available to the relaxed
      self and the life being lived by the performance self. Include the ongoing
      cost of vigilance itself.
    what_changes: >
      Before: "Avoiding social situations is just how I manage. It's fine."
      After: "The management strategy has been costing me things I didn't fully count."
    required_sections: [COST_INVENTORY, SCENE, AVOIDANCE_LEDGER]
    forbidden_moves:
      - Making the reader feel they've wasted their life
      - Using cost exposure as motivation ("you need to fix this")
      - Rushing past the cost to solutions
      - Framing avoided situations as catastrophic losses
    recommended_enrichments:
      - The specific cost of managing every social situation as risk
      - A scene of a relationship kept at arm's length
      - The exhaustion cost: energy spent on performance versus energy available for presence
    claim_someone_could_argue: >
      Some would argue that a well-managed social life — selective and intentional
      rather than avoidant — is simply a different and equally valid way to live.
    why_this_chapter_exists: >
      The reader needs to want something different. Cost exposure provides the
      honest basis for wanting change without shaming the reader for current choices.
    what_comes_next: >
      Underneath the performance and the costs is a specific kind of fear:
      not of people, but of being seen by them. That fear has a name.

  chapter_06:
    number: 6
    role: shame
    working_title: "The Terror of Being Seen"
    thesis: >
      The false alarm is powered by something specific: the belief that being
      seen in social contexts means being found inadequate. Visibility is not
      neutral for the reader — it is exposure to judgment. And being found
      inadequate in that judgment is experienced as a form of social annihilation.
      This is the shame engine, and it doubles the cost of everything.
    emotional_job: >
      Legitimate the visibility terror without amplifying it. The reader should
      feel that being named in this specific fear is a form of being seen that
      is not threatening — that this is not a shameful thing about them, but
      a specific structure they have learned. The chapter must model the opposite
      of what it describes: being seen by the reader without judgment.
    practical_job: >
      Name the shame engine: the belief that visibility = judgment = inadequacy.
      Separate it clearly from the false alarm (which is body-level) — shame is
      the meaning-making layer. Show how shame doubles the original alarm: not
      just "social situations are dangerous" but "being seen as anxious in social
      situations is also dangerous." The loop within the loop.
    what_changes: >
      Before: "I'm afraid of what people will think of me."
      After: "I believe that being seen is being judged, and being judged might reveal something fatal. That's the shame engine."
    required_sections: [SHAME_MECHANISM, VISIBILITY_TERROR, DOUBLED_ALARM]
    forbidden_moves:
      - Telling the reader their fear of judgment is irrational
      - Minimizing the power of shame by explaining it too quickly
      - Suggesting shame is simply "low self-esteem" with an easy fix
      - Implying visibility is easy or safe before the work has been done
    recommended_enrichments:
      - The specific experience of being "caught" in anxiety in a social situation
      - The doubled alarm: alarm about the social context, then alarm about showing the alarm
      - What the reader fears others would conclude if they could see the internal performance
    claim_someone_could_argue: >
      Some would argue that the fear of negative evaluation is entirely rational —
      that social judgment has real consequences in professional and personal life,
      and that attending to it is not pathological.
    why_this_chapter_exists: >
      Without naming shame as a separate mechanism from the false alarm, interventions
      aimed at the alarm will leave the shame running — and the shame will rebuild
      the alarm. Both must be addressed. This chapter names the second mechanism
      so both can be worked with.
    what_comes_next: >
      The reader now has both mechanisms visible. The next step is to look at
      what they've been doing to manage them — and why that management has been
      making things worse.

  chapter_07:
    number: 7
    role: destabilization
    working_title: "Why What You're Doing Is Keeping It Going"
    thesis: >
      Safety behaviors — the moves the reader makes to reduce social risk — are
      not neutral coping strategies. They are active maintenance of the alarm system.
      Checking the phone, over-preparing for conversations, avoiding eye contact,
      arriving early to avoid being watched entering: each of these tells the
      alarm that the threat was real, and the alarm stays elevated.
    emotional_job: >
      Create the specific discomfort of recognizing that the very strategies that
      have felt protective are part of the mechanism that maintains the problem.
      This should land as uncomfortable clarity, not blame — the reader was doing
      what made sense, and it has been making things harder.
    practical_job: >
      Name and define safety behaviors specifically: checking phone in social settings,
      avoiding eye contact, over-preparing scripts for conversations, leaving early,
      drinking to manage the alarm, finding a task to perform at social events.
      Show the maintenance mechanism: safety behaviors signal to the alarm that
      the danger was real, so the alarm stays ready. Without safety behaviors,
      the alarm would have to recalibrate.
    what_changes: >
      Before: "Checking my phone at parties helps me manage the discomfort."
      After: "Checking my phone is one of the ways I've been teaching my alarm that parties are dangerous."
    required_sections: [SAFETY_BEHAVIOR_INVENTORY, MAINTENANCE_MECHANISM, UNCOMFORTABLE_CLARITY]
    forbidden_moves:
      - Suggesting the reader should immediately stop all safety behaviors
      - Shaming safety behaviors as weakness or avoidance
      - Presenting exposure as simple or easy at this stage
      - Introducing the exposure protocol before the reader understands the mechanism
    recommended_enrichments:
      - A specific inventory of common safety behaviors for social anxiety
      - The maintenance loop: safety behavior → alarm confirmation → elevated baseline
      - What happens to the alarm when safety behaviors are absent (temporarily worse before better)
    claim_someone_could_argue: >
      Some would argue that safety behaviors provide genuine comfort and that
      gradual reduction is unnecessarily uncomfortable when there are other ways
      to manage social anxiety effectively.
    why_this_chapter_exists: >
      The reader cannot understand what exposure work is doing until they
      understand why safety behaviors maintain the problem. This chapter is the
      necessary setup for chapter 8.
    what_comes_next: >
      If safety behaviors maintain the problem, the alternative is doing something
      small with the alarm running. Not after it passes. Not without it. With it.

  chapter_08:
    number: 8
    role: practical_interruption
    working_title: "One Small Thing With the Alarm Running"
    thesis: >
      Exposure that works is not about eliminating the alarm before entering the
      situation. It is about entering the situation with the alarm running and
      allowing the alarm to recalibrate on contact with reality. Small, specific,
      and somatic: the first step is not bravery. It is willingness to be in the
      room for sixty seconds with the discomfort present.
    emotional_job: >
      Make exposure feel accessible without minimizing its difficulty. The reader
      should feel neither "this is easy" nor "this is impossible" but rather
      "I can do something this small, and I understand why it matters."
    practical_job: >
      Define and describe one small exposure practice: specific, bounded, concrete.
      Walk through what it means to do it with the alarm running — not waiting
      for the alarm to pass, not using safety behaviors, just being in the moment
      with the discomfort present and not treating the discomfort as confirmation
      of danger. Explain what the alarm does when it contacts reality: it recalibrates.
    what_changes: >
      Before: "I can only do social situations when I feel ready."
      After: "I did something small with the alarm running. It was uncomfortable. The alarm recalibrated slightly."
    required_sections: [EXPOSURE_LOGIC, PRACTICAL_INSTRUCTION, SOMATIC_GUIDE]
    forbidden_moves:
      - Suggesting the alarm will go away if exposure is done correctly
      - Framing this as "just do it" or "push through the fear"
      - Making the exposure sound heroic or dramatic
      - Suggesting the reader start with a high-stakes situation
    recommended_enrichments:
      - A very small, specific exposure described in physical terms
      - What "the alarm recalibrating" actually feels like
      - The difference between enduring discomfort and allowing the alarm to run while continuing
    claim_someone_could_argue: >
      Some would argue that exposure therapy without clinical support is inappropriate
      and potentially harmful — that this work requires professional guidance.
    why_this_chapter_exists: >
      The reader needs a real, usable move that is grounded in the mechanism.
      Without practical instruction, the book ends in theory. Without the mechanism
      foundation of chapters 2-7, the instruction is meaningless.
    what_comes_next: >
      The exposure introduces something about the social comparison pattern:
      the reader has been measuring their insides against others' apparent outsides.
      That comparison needs to be named.

  chapter_09:
    number: 9
    role: comparison
    working_title: "Their Outside, Your Inside"
    thesis: >
      The social anxiety comparison trap is structurally unfair: the reader is
      comparing their internal experience — the alarm, the monitoring, the
      performance — to other people's visible surface. Other people's social ease
      may be equally performed. The comparison is not between selves; it is between
      the reader's backstage and everyone else's front stage.
    emotional_job: >
      Give the reader a specific, non-condescending way to understand the
      comparison they've been making. This should not land as "everyone is anxious
      really" (dismissive) but as a structural point about the categories being compared.
      The reader should feel the specific unfairness of the comparison they've been making.
    practical_job: >
      Name the comparison mechanism: measuring the experience of threat-detection
      mode against others' performed ease. Show why this comparison always produces
      unfavorable results — not because the reader is inadequate, but because they
      are comparing unlike things. Show how the comparison feeds the shame engine
      (visible inadequacy) and the false alarm (others don't seem threatened; maybe
      I'm the problem).
    what_changes: >
      Before: "Everyone else seems so comfortable in social situations. What's wrong with me?"
      After: "I've been comparing my internal experience to other people's external presentation. That's a structurally unfair comparison."
    required_sections: [COMPARISON_ANATOMY, BACKSTAGE_FRONT_STAGE, SHAME_CONNECTION]
    forbidden_moves:
      - Telling the reader everyone is anxious really (condescending and often untrue)
      - Suggesting the reader should stop comparing themselves to others
      - Using comparison to minimize the reader's actual difficulty
      - Making this chapter feel like a cognitive reframing exercise
    recommended_enrichments:
      - The specific experience of being in a social situation and reading others as at ease
      - What the reader's "front stage" actually looks like to others
      - The specific unfairness: comparing with-alarm-running self to apparent-ease-of-others
    claim_someone_could_argue: >
      Some would argue that social comparison is a fundamental human behavior
      that cannot be simply explained away — and that the solution isn't to
      understand the comparison differently but to actually develop social ease.
    why_this_chapter_exists: >
      The comparison mechanism is actively maintaining the shame engine. Without
      naming it structurally, the reader will continue measuring themselves against
      a fiction and finding themselves inadequate.
    what_comes_next: >
      The reader understands the mechanisms and has done one small exposure.
      Now they need to practice in the actual conditions that most activate the alarm.

  chapter_10:
    number: 10
    role: practice_under_pressure
    working_title: "The Situation That Most Activates the Alarm"
    thesis: >
      There is a specific type of social situation that most activates the reader's
      alarm — a particular context, a particular visibility, a particular kind of
      being-seen that concentrates the full force of the false alarm and the shame
      engine simultaneously. That situation is the real test. It is also where the
      most meaningful recalibration happens.
    emotional_job: >
      Acknowledge the reader's real conditions rather than an idealized version
      of the work. Build realistic confidence: not "this will be fine" but "you
      understand what is happening to you in that situation, and you know what
      to do with it."
    practical_job: >
      Walk through the reader's highest-activation social scenario in detail. Apply
      the full framework: name the false alarm, identify the safety behaviors at risk
      of activating, notice the comparison impulse, hold the shame mechanism. Show
      what doing one small thing with the alarm running looks like in that specific context.
    what_changes: >
      Before: "I know all this but when I'm in that situation it all goes out the window."
      After: "I've rehearsed this. I know what happens to me in that situation and I have something to do with it."
    required_sections: [HIGH_ACTIVATION_SCENE, FULL_FRAMEWORK_APPLICATION, REALISTIC_EXPECTATION]
    forbidden_moves:
      - Promising the high-activation situation will become easy
      - Introducing new concepts at this stage
      - Suggesting the reader avoid the high-activation situation
      - Framing partial success as failure
    recommended_enrichments:
      - The specific scenario: meeting new people, speaking in a group, being asked to perform
      - What the reader's internal experience looks like before, during, and after that scenario
      - What "partial success" looks like and why it counts
    claim_someone_could_argue: >
      Some would argue that confronting one's highest-activation scenarios is
      too ambitious for a self-directed book and requires clinical support.
    why_this_chapter_exists: >
      The reader's real conditions are the test. Without meeting them directly,
      the book remains theoretical. This chapter closes the gap between understanding
      and application in the actual contexts that matter.
    what_comes_next: >
      Having practiced under pressure, the reader is ready to address the
      identity question: the shift from performing to being present.

  chapter_11:
    number: 11
    role: self_relation_shift
    working_title: "From Performing to Being Present"
    thesis: >
      The reader has two social selves: the performance self (in threat-detection
      mode) and the relaxed self (in contexts of safety and trust). The performance
      self is not fake — it is a real response to a real alarm. But the relaxed
      self is also real, and the work of this book has been creating more conditions
      in which the relaxed self can appear. The identity shift is from "I am a
      person who performs socially" to "I am a person who sometimes has their alarm
      running in social contexts."
    emotional_job: >
      Give the reader access to a new self-description that is honest about the
      alarm without making it the whole story. The reader should feel that the
      relaxed self — the one they already know in small trusted contexts — is not
      separate from them but available to more situations than they realized.
    practical_job: >
      Name the gap between the performance self and the relaxed self specifically.
      Show what the relaxed self looks like — not idealized, but accurately described
      as something the reader already knows. Map the conditions under which the
      relaxed self appears, and show how those conditions can be expanded. Introduce
      the idea of presence as the state where neither performance nor alarm is running
      the show.
    what_changes: >
      Before: "I'm just not a social person. That's who I am."
      After: "I have a self that is present in social contexts when the alarm isn't running. I know that self. I'm going to build more access to them."
    required_sections: [TWO_SELVES_DESCRIPTION, RELAXED_SELF_MAPPING, PRESENCE_FRAME]
    forbidden_moves:
      - Suggesting the performance self will disappear
      - Implying the relaxed self is the "real" self and the performance self is false
      - Making this sound like a positive affirmation or an identity claim to adopt
      - Promising the reader access to the relaxed self in all situations
    recommended_enrichments:
      - A specific description of the reader's relaxed self: where they've seen them, what they're like
      - The specific conditions that allow the relaxed self to appear
      - What it means to recognize the alarm as an alarm rather than as reality
    claim_someone_could_argue: >
      Some would argue that the distinction between a performance self and a
      relaxed self is artificial — that what looks like a relaxed self is just
      a better-calibrated performance in a safer context.
    why_this_chapter_exists: >
      The reader began with the belief that they are simply "not good at socializing."
      This chapter offers a different identity: someone whose alarm runs in social
      contexts, and who is building more access to the self that exists when
      the alarm recalibrates. The shift is specific and honest, not aspirational.
    what_comes_next: >
      The reader knows who they are in both modes. The final chapter names
      who they are becoming — and what "being seen" means now.

  chapter_12:
    number: 12
    role: integration
    working_title: "Being Seen Without Performing for It"
    thesis: >
      The reader who finishes this book has not become fearless in social situations.
      They have become someone who knows what the alarm is, can name the safety
      behaviors before deploying them, has done something small with the discomfort
      present, and has more access to their relaxed self than they did. That is not
      a cure. It is something more durable: a different relationship with being seen.
    emotional_job: >
      Give the reader an honest, specific ending — not triumphant, but genuinely
      different from page one. The reader should feel the specific quality of having
      arrived at something real rather than having been promised something impossible.
    practical_job: >
      Integrate the full architecture: false alarm, shame, comparison, safety behaviors,
      exposure, identity. Name concretely what the reader carries forward. Describe
      what a social situation looks like now — not alarm-free, but navigated differently.
      Close with the specific quality of being seen without needing the performance.
    what_changes: >
      Before: "I am performing in every social situation and I don't know how to stop."
      After: "I know what the alarm is. I know what I'm doing when I perform. I have a different relationship with being seen. That's enough."
    required_sections: [INTEGRATION_SCENE, HONEST_ENDING, FORWARD_FRAME]
    forbidden_moves:
      - Promising the alarm will be gone
      - Using the word "overcome" or "conquer"
      - Making the ending feel like a graduation or a cure
      - Suggesting the reader is now socially confident
    recommended_enrichments:
      - A scene of the reader in a social situation: alarm present, not performing, more present
      - What the reader now knows about themselves that they didn't at the start
      - The specific feeling of being seen without running a performance for it
    claim_someone_could_argue: >
      Some would argue that "a different relationship with being seen" is too
      vague an ending — that readers need specific outcome metrics to know they've
      made progress.
    why_this_chapter_exists: >
      The reader began in the exhausting performance of social invisibility. They
      deserve an ending that is honest about ongoing difficulty and genuinely different
      in quality. This chapter closes the arc.
    what_comes_next: >
      There is no next. This is the close.

sequencing_rules:
  must_come_before:
    - somatic_legitimacy must precede mechanism (body first, then structure)
    - mechanism must precede hidden_belief (false alarm before the belief that waits for safety)
    - shame must precede destabilization (both mechanisms named before safety behaviors addressed)
    - destabilization must precede practical_interruption (safety behavior logic before exposure)
    - practical_interruption must precede comparison (one exposure before the comparison reframe)
    - comparison must precede self_relation_shift (structural unfairness before identity shift)
  cannot_come_too_early:
    - shame cannot appear before mechanism (chapter 3 before chapter 6)
    - practical_interruption cannot appear before chapter 7
    - self_relation_shift cannot appear before chapter 10
  saved_for_late_book:
    - integration must be the final chapter
    - practice_under_pressure must follow practical_interruption
    - self_relation_shift must come after comparison

tone_and_pacing:
  intensity_profile: [medium, medium, high, high, high, high, high, medium, medium, high, medium, low]
  trust_curve: >
    This reader is hypervigilant about being judged — even by a book. Trust is built
    through precision in chapters 1-3: naming their experience so accurately that
    the reader feels recognized rather than evaluated. Chapters 4-6 use that trust
    to name the belief, the cost, and the shame — the most difficult material.
    Chapters 7-9 shift toward the practical, with the safety behavior chapter as
    the most uncomfortable. Chapters 10-12 work from established trust toward
    integration. The tone throughout must never be upbeat, reassuring, or
    promotional — those registers will activate the reader's alarm.
  action_timing: >
    No exposure instruction before chapter 8. The false alarm, shame engine, and
    safety behavior mechanisms must all be fully in place before any exposure
    is introduced. Premature exposure instruction will be experienced as "just do it"
    advice and will be rejected.
  mechanism_timing: >
    The false alarm is introduced in chapter 3, the shame in chapter 6. Both must
    be in place before the destabilization chapter (7) and the practical chapter (8).
    The comparison mechanism in chapter 9 extends and refines the shame mechanism.
    All three are active threads through chapters 9-12.
  permission_timing: >
    Permission to have the alarm run (rather than managing it away) must come in
    chapter 8 — no earlier, or the reader will try to apply it without the necessary
    structural understanding. Permission to be seen without performing comes only
    in chapter 12, after the full integration.

prohibited_terms:
  global: [journey, transform, heal, self-care, wellness, mindfulness, empower,
           empowering, overcome, conquer, battle, fight, warrior, survivor, thrive,
           manifest, authentic self, best self, inner child, trigger warning,
           safe space, toxic, self-love, you've got this, be gentle with yourself]
  family_specific: [anxiety attack, panic attack, anxiety disorder, mental health,
                    coping mechanism, grounding technique, just be yourself,
                    people like you, you're more interesting than you think,
                    fake it till you make it, put yourself out there, push through it,
                    face your fears, social skills, you'll get used to it,
                    confidence, self-confidence, boost your confidence]
