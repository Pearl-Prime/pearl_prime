family_id: courage
family_name: "Courage / Acting Before the Fear Resolves"
adjacent_topics: [procrastination, perfectionism, visibility_anxiety, risk]
primary_mechanism: false_alarm
allowed_engines: [false_alarm, shame, spiral]

reader_starting_state: >
  Reader knows what they want to do. They have known for a while — sometimes
  years. They have a clear vision: the thing they want to start, the risk
  they want to take, the conversation they have been avoiding, the version
  of their life they can see from here. They also have a detailed list of
  reasons it might go wrong. Their body treats the thing they want as a
  threat — when they move toward it, the alarm fires, and they stop. They
  have been "working up to it" indefinitely, gathering more information,
  getting more prepared, waiting until conditions are better or the fear
  is smaller. They believe courage is a feeling they will have once they
  have prepared enough. They are waiting for the all-clear that will not
  arrive.

reader_ending_state: >
  Reader has acted before the fear resolved. Not once as a dramatic event,
  but as a practice — they have done the thing with the alarm running, and
  they have survived the alarm, and the survival has changed what they
  believe the alarm means. They understand that acting before the all-clear
  is the definition of this kind of action — not a workaround for courage
  but the thing itself. They have built a practice of tolerating alarm while
  moving. They know the catastrophic prediction chain (if I do this, then
  that, then disaster) is the spiral's architecture, not a reliable forecast.
  They are no longer waiting.

what_makes_this_family_different: >
  Unlike most families in this set, this family moves toward action
  relatively quickly — by ch04-05. The reader came for permission to act,
  and the book must give it — but not by dismissing the fear. The alarm must
  be understood and named BEFORE action, then the reader acts WITH the alarm
  running, not after it stops. The false alarm mechanism is central: the
  body treats the goal as a threat because it is novel, visible, and
  reversible-if-wrong — and the alarm fires on those features, not on
  actual danger. The shame engine is the visibility dimension: being seen
  failing is worse than not trying, and this keeps the reader from starting.
  The spiral engine is the catastrophic prediction chain: one step of
  failure logically leads to total collapse in the reader's imagination.
  All three must be named and understood before the action chapters can
  hold. Unlike the boundaries and depression families, this book can earn
  some energy and some forward motion — but it earns it through honesty
  about the fear, not through cheerleading.

chapters:
  chapter_01:
    number: 1
    role: recognition
    working_title: "The Thing You're Not Doing"
    thesis: >
      You know what it is. You have known for a while. There is a specific
      thing — a project, a conversation, a risk, a version of your life —
      that you are not doing, and you know you are not doing it. This
      chapter names that specific structure: not the general category of
      avoidance, but the precise form it takes when you know exactly what
      you want and cannot make yourself go toward it.
    emotional_job: >
      Create the specific relief of being named accurately without being
      judged. The reader has been calling themselves procrastinators, cowards,
      people who "just aren't cut out for this." This chapter names the
      pattern without the verdict.
    practical_job: >
      Establish a precise picture of the paralysis — not avoidance of
      something unpleasant, but avoidance of something the reader actively
      wants. The preparation loop: more research, more planning, more
      conditions that need to be met before starting. The timeline that
      keeps moving.
    what_changes: >
      Before: "I'm just not ready yet."
      After: "There is a specific pattern to my not-doing, and 'not ready'
      is the name the pattern gives itself."
    required_sections: [HOOK, PATTERN_PORTRAIT, RECOGNITION_PAUSE]
    forbidden_moves:
      - Labeling the reader as a procrastinator or implying a character assessment
      - Offering causes or explanations in this chapter
      - Implying the reader should feel urgency to change
      - Any version of "just do it"
      - Using "comfort zone" in any context
    recommended_enrichments:
      - The specific texture of the preparation loop: the sense of productively approaching the thing without actually doing the thing
      - 'The timeline: "I''ll start when..." and the way that condition keeps shifting'
      - The reader's awareness that they are not actually moving closer — and the specific discomfort of that awareness
    claim_someone_could_argue: >
      "If you knew what you wanted and chose not to do it for years, that's
      not a pattern — that's a decision. You've decided it matters less to
      you than you claim. The story about 'paralysis' is self-flattering."
    why_this_chapter_exists: >
      The reader needs to see their specific form of avoidance clearly
      before anything else can land. This chapter is the contract: I can
      see the thing you're not doing, I know the shape of the not-doing,
      and I'm not going to tell you it's fine or easy.
    what_comes_next: >
      Why the body treats what you want as a threat.

  chapter_02:
    number: 2
    role: somatic_legitimacy
    working_title: "Your Body Is Treating Your Goal Like a Threat"
    thesis: >
      The alarm that fires when you move toward the thing you want is real.
      It is not weakness, not cowardice, not evidence that you don't really
      want it. Your body has a mechanism for detecting novelty, visibility,
      and reversibility-if-wrong — and it treats those features as threat
      signals. Your goal has all three features. The alarm is not broken.
      It is working exactly as it was designed to work. The problem is that
      it cannot distinguish between a predator and a first draft.
    emotional_job: >
      Remove the shame from the physical experience of alarm. The reader
      has been interpreting the alarm as evidence about themselves — as
      proof they are not the kind of person who can do this kind of thing.
      This chapter offers a different account.
    practical_job: >
      Name the physical experience of the alarm on action: the specific
      sensations (chest tightening, increase in arousal, the pull to find
      a reason not to), the speed with which it arrives, the way it is
      indistinguishable from the alarm on actual danger. Explain why the
      body cannot distinguish between novelty-and-visibility and genuine
      threat.
    what_changes: >
      Before: "The fear means I'm not ready. When I'm ready, the fear will
      be smaller."
      After: "The alarm fires on the features of the goal, not on whether
      I'm ready. 'Ready' is not what the alarm is measuring."
    required_sections: [SOMATIC_PORTRAIT, MECHANISM_INTRODUCTION, LEGITIMACY_STATEMENT]
    forbidden_moves:
      - Suggesting the reader "manage" the alarm before acting
      - Implying the alarm will stop once the reader acts enough times
      - Using comfort zone language in any form
      - Framing the alarm as something to eliminate before action is possible
    recommended_enrichments:
      - The specific physical features of the alarm on action: what it feels like in the body, where it is located, how fast it arrives
      - The novelty-visibility-reversibility triad: why these three features reliably trigger the alarm
      - The reader's history of interpreting the alarm as information about readiness — and what that interpretation has cost in deferred action
    claim_someone_could_argue: >
      "If your body is reacting that strongly to something you want to do,
      maybe it's telling you something important. Bodies are wise. Maybe
      the alarm is right and you actually shouldn't do this."
    why_this_chapter_exists: >
      Without somatic legitimacy, the practical chapters are asking the
      reader to push through something they still believe means something
      about them. With it, the alarm is reframed as mechanism rather than
      verdict — and that shift makes acting-with-the-alarm possible rather
      than heroic.
    what_comes_next: >
      The false alarm itself — and the spiral of catastrophic prediction
      that the alarm produces.

  chapter_03:
    number: 3
    role: mechanism
    working_title: "The Alarm Was Wrong About the Cost"
    thesis: >
      The false alarm on action does not just produce fear — it produces
      a chain of prediction. If I do this, then X happens, then Y happens
      from X, then the whole thing collapses. Each link in the chain feels
      logical. The chain itself is the mechanism, not the prediction. The
      spiral is the body's way of making the alarm feel rational. The
      disaster at the end of the chain is real in the body. It has not
      happened.
    emotional_job: >
      Create recognition of the specific shape of the catastrophic prediction
      chain. The reader has experienced this chain but may not have seen its
      structure. Seeing the structure changes the experience of the chain —
      not eliminating it, but creating a slight distance from it.
    practical_job: >
      Name the spiral precisely: the trigger (moving toward the goal),
      the first prediction (something goes wrong), the amplification (that
      wrong thing leads to a worse thing), the catastrophe (the end-state
      is total collapse or humiliation). Explain why the spiral feels like
      rational planning and why it is not. Name the visibility shame
      component: the specific fear of being seen failing that is often
      worse than the fear of failing privately.
    what_changes: >
      Before: "I've thought through all the ways this could go wrong. The
      risks are real."
      After: "I can see the structure of the chain I've been running. The
      risks are possible. The chain that connects them to disaster is not
      prediction — it's the spiral's architecture."
    required_sections: [SPIRAL_PORTRAIT, CHAIN_ANATOMY, VISIBILITY_SHAME]
    forbidden_moves:
      - Dismissing the reader's concerns as irrational
      - Implying the spiral is always wrong (some risks are real)
      - Offering the antidote to the spiral in this chapter
      - Framing this as "negative thinking" that needs to be replaced with positive thinking
    recommended_enrichments:
      - A specific worked example of a spiral chain: trigger → prediction 1 → amplification → catastrophe, with the specific quality of each link
      - Visibility shame separately: the specific quality of the fear of being seen in the attempt — not just failing, but being seen failing
      - The difference between "this might not work" (accurate) and "if this doesn't work, everything collapses" (spiral)
    claim_someone_could_argue: >
      "Some of those predictions are accurate. Some risks really do cascade.
      Calling it a 'spiral' sounds like you're dismissing legitimate caution
      as pathology."
    why_this_chapter_exists: >
      The spiral and the visibility shame are the two mechanisms that keep
      the reader in the preparation loop longest. Naming them precisely —
      showing their architecture rather than dismissing their content —
      gives the reader the ability to see the mechanism operating in real
      time, which is the precondition for acting through it.
    what_comes_next: >
      Why waiting for the alarm to stop is the wrong strategy — and why
      it has never worked.

  chapter_04:
    number: 4
    role: destabilization
    working_title: "Waiting for the Fear to Pass Is the Wrong Strategy"
    thesis: >
      The fear will not pass before you act. Not because you are
      particularly anxious or underprepared, but because the alarm on
      novel, visible action does not resolve through preparation or time.
      It resolves through experience. And the experience requires the
      action. The strategy of waiting for the fear to pass is structurally
      designed to never complete.
    emotional_job: >
      Produce the specific discomfort of having the preparation strategy
      named as the wrong tool. The reader has invested significant time and
      identity in preparing carefully. This chapter does not dismiss the
      preparation — it shows why preparation cannot do the one thing the
      reader is asking it to do.
    practical_job: >
      Show the mechanics of why preparation doesn't resolve alarm: the alarm
      is triggered by action, not by unpreparedness. Additional preparation
      does not reduce the alarm on action — it defers the experience of the
      alarm while producing the feeling of progress. The preparation loop is
      productive-feeling avoidance.
    what_changes: >
      Before: "When I've prepared enough, I'll be ready."
      After: "The readiness I'm waiting for is not produced by preparation —
      it is produced by experience. And experience requires action."
    required_sections: [FAILED_STRATEGY_AUTOPSY, PREPARATION_LOOP_MECHANICS, WHAT_RESOLVE_ACTUALLY_REQUIRES]
    forbidden_moves:
      - Dismissing preparation as useless (it has value — it just can't do what the reader is asking it to do)
      - Creating hopelessness without clearly signaling that action is possible
      - Offering the action ask in this chapter (that is ch05)
      - Implying the reader has been foolish to prepare
    recommended_enrichments:
      - The specific way preparation produces the feeling of progress: the reader can honestly say they are working toward the thing, which reduces the pressure of not-doing, which reduces the urgency to act
      - The diminishing returns of preparation: each additional piece of preparation produces less reduction in alarm than the previous one
      - Brief signal: there is a strategy that works. It requires the alarm to be running when you start.
    claim_someone_could_argue: >
      "Preparation is not avoidance. People who don't prepare fail at higher
      rates. You're telling people to act before they're ready, which is
      how you get bad outcomes and confirm that the fear was right."
    why_this_chapter_exists: >
      This is the door that closes. The reader has been holding the
      preparation strategy as the path forward. This chapter names it as
      the path that maintains the current position. Without this chapter,
      the reader will continue to defer action because the preparation
      strategy still feels viable.
    what_comes_next: >
      The smallest possible version of the thing — the first action,
      with the alarm running.

  chapter_05:
    number: 5
    role: practical_interruption
    working_title: "The Smallest Possible Version"
    thesis: >
      You do not start with the full version of the thing. You start with
      the smallest version that is genuinely the thing — not a simulation,
      not a preparation, but the real thing at its smallest possible scale.
      The alarm will fire. You act anyway. The alarm running while you act
      is not a sign you did it wrong. It is the definition of what you
      are doing.
    emotional_job: >
      Offer the first genuine action ask with energy that is neither
      cheerleading nor minimizing. This is the chapter the reader came for.
      The tone is direct, clear, and slightly charged — not dramatic, but
      alive. Something is being asked here and the chapter should feel
      like it.
    practical_job: >
      Help the reader identify the smallest version of their specific
      thing that is genuinely the thing (not another preparation step).
      Name what "with the alarm running" means physically — the chest tight,
      the hands slightly activated, the pull to stop — and clarify that
      acting in that state is what the chapter is asking for. Give the reader
      specific language for the moment when the pull to stop is strongest.
    what_changes: >
      Before: "I'll start when conditions are better."
      After: "I started. The alarm was running. That is the record."
    required_sections: [SMALLEST_VERSION_IDENTIFICATION, ALARM_RUNNING_DESCRIPTION, THE_ASK]
    forbidden_moves:
      - Guaranteeing the action will produce a good outcome
      - Implying the alarm will be smaller than expected
      - Framing this as a "small win" to build confidence
      - Using motivational language to increase willingness to act
      - Any version of "just do it" or "leap of faith"
    recommended_enrichments:
      - The distinction between a preparation step and a genuine smallest version (a preparation step doesn't carry the alarm; the genuine smallest version does)
      - The specific experience of acting with the alarm running: what it feels like to keep moving when the body is saying stop
      - The one thing to do if the pull to stop wins: note that it won and start the smallest version again, without the performance of overcoming
    claim_someone_could_argue: >
      "If you have to white-knuckle your way through the thing, that's
      not skill — it's force. Real courage doesn't feel like that. You're
      describing an unpleasant experience and calling it success."
    why_this_chapter_exists: >
      This is the first action chapter. Everything before it has been
      preparation for this — the legitimacy, the mechanism, the
      destabilization. The smallest version is the entry point into the
      experience of acting-with-the-alarm, which is the only thing that
      actually reduces the alarm's veto power over action.
    what_comes_next: >
      What not acting has cost you — the accumulated cost of the years
      in the preparation loop.

  chapter_06:
    number: 6
    role: cost_exposure
    working_title: "The Accumulation of Not-Doing"
    thesis: >
      Not acting has had costs. Not the dramatic costs of missed
      opportunities — those are visible. The more significant cost is the
      accumulated weight of being in the preparation loop: the low-level
      expenditure of managing the gap between what you are doing and what
      you want to be doing, the effect of that gap on how you see yourself,
      the relationships and opportunities that have quietly closed while
      you were getting ready.
    emotional_job: >
      Let the cost land without weaponizing it. The reader has already started
      acting (ch05). The cost chapter comes after the first action — it is
      not motivation toward action but honest accounting of what the
      preparation loop cost. Placed here, it has a different quality: the
      reader is reading it as someone who has already started, not someone
      who is being pushed.
    practical_job: >
      Inventory the specific costs of the preparation loop: the energy
      expenditure of managing the gap, the identity cost of organizing
      yourself as "someone who is going to do this," the relational cost
      of the thing not done, the compounding effect of the wait on the
      size of the gap between now and the vision.
    what_changes: >
      Before: "I've been careful. The wait has been worth it."
      After: "The wait had costs I didn't name. Some of them I can recover.
      Some of them I can't. Both are worth knowing."
    required_sections: [COST_INVENTORY, COMPOUNDING_COST, HONEST_ACCOUNTING]
    forbidden_moves:
      - Using the cost to produce shame about the years of waiting
      - Implying the reader could have started sooner if they'd tried harder
      - Rushing to "but it's not too late!" reassurance
      - Framing the cost as motivation to act faster (the reader has already started)
    recommended_enrichments:
      - The identity cost specifically: organizing yourself as "someone who is going to do this" for years has its own specific weight
      - The gap compound: the longer the wait, the larger the distance between current state and vision feels, which makes the alarm larger, which makes action harder
      - What has already closed: specific, honest, without catastrophizing
    claim_someone_could_argue: >
      "You can't put a cost on careful preparation. The people who acted
      too soon, without adequate preparation, paid more in failed attempts
      and damaged credibility than any amount of preparation would have
      cost."
    why_this_chapter_exists: >
      Cost-exposure in this family comes after the first action — not
      as motivation to act, but as honest accounting from a new vantage
      point. The reader has done something. Now they can look at what the
      not-doing cost without the cost being used against them.
    what_comes_next: >
      The belief that has maintained the preparation loop — that readiness
      is a feeling that arrives before action.

  chapter_07:
    number: 7
    role: hidden_belief
    working_title: "Readiness Is a Feeling I'll Have When I'm Ready"
    thesis: >
      Underneath the preparation loop is a belief about the nature of
      readiness: that it is a feeling you will have once you have done
      enough preparation, and that the feeling, when it arrives, will make
      action natural and unscary. This belief is not malicious. It is also
      structurally false — because readiness in this context is not a
      feeling that precedes action but an experience that follows it.
    emotional_job: >
      Name the belief precisely and without dismissal. The reader has
      been running this belief as if it were a law of nature. Showing it as
      a belief rather than a law is gently destabilizing — and the reader
      has already acted (ch05), which means they already have some evidence
      against the belief's prediction.
    practical_job: >
      Surface the specific form the readiness belief takes in the reader's
      life: "I'll feel ready when I know more / have more practice / have
      done more research / have fixed the thing I know is wrong with the
      current version." Show the reader how the belief generates the
      preparation loop and maintains it indefinitely.
    what_changes: >
      Before: "I'll know when I'm ready."
      After: "The readiness I'm waiting to feel is produced by doing, not
      by preparing. I've been waiting for something that only doing can
      produce."
    required_sections: [BELIEF_EXCAVATION, READINESS_ANATOMY, EVIDENCE_FROM_EXPERIENCE]
    forbidden_moves:
      - Dismissing the belief as obviously wrong
      - Implying the reader should have known this sooner
      - Offering this chapter before the reader has done the ch05 action (the evidence from experience is important)
      - Framing readiness-as-feeling as pathological
    recommended_enrichments:
      - The specific "when I..." clause that the reader uses — and how it has shifted over time (the condition changes, the wait continues)
      - The evidence from ch05: the reader acted without the readiness feeling. What actually happened in their body and afterward?
      - The belief's logic: it IS true that preparation produces skill, and skill reduces some difficulty. The error is in thinking preparation produces the absence of alarm.
    claim_someone_could_argue: >
      "Readiness is a real thing. Surgeons feel ready before operating.
      Pilots feel ready before flying. The feeling of readiness is
      calibrated to actual competence. You're telling people to act before
      they're competent."
    why_this_chapter_exists: >
      The hidden belief is the maintenance mechanism of the preparation
      loop. It is why the loop continues even when the reader knows
      rationally that more preparation isn't necessary. Surfacing the
      belief and examining it — with the evidence of ch05 available —
      is the cognitive complement to the practical work of the early
      action chapters.
    what_comes_next: >
      How the not-doing has affected your relationships and your image
      of yourself.

  chapter_08:
    number: 8
    role: relational_consequence
    working_title: "What Not-Doing Has Done to Your Relationships"
    thesis: >
      The thing you're not doing has not stayed inside you. It affects
      how you show up in relationships — the low-level expenditure of
      managing the gap, the way it makes certain conversations difficult,
      the identity you have been presenting to the people who know you are
      working toward something. And it affects your relationship with
      yourself — the specific quality of being someone who has promised
      themselves something for a long time.
    emotional_job: >
      Bring the relational and self-relational dimensions of the preparation
      loop into view without adding shame. The reader is already dealing
      with the weight of the not-doing. This chapter's job is to name
      the relational dimension accurately so it can be seen clearly.
    practical_job: >
      Map the specific relational effects: the conversations about "when
      I do the thing" that have become habitual, the people who have stopped
      asking, the version of yourself you have been presenting in
      anticipation of the thing being done, the private relationship with
      yourself as someone who is going to do this — and the specific weight
      of having maintained that relationship for a long time.
    what_changes: >
      Before: "This is a private thing. It doesn't really affect anyone else."
      After: "The not-doing has been present in my relationships all along.
      I can see that now."
    required_sections: [RELATIONAL_MAP, SELF_RELATION_NOTE, THE_CONVERSATIONS_ABOUT_IT]
    forbidden_moves:
      - Framing the relational effects as motivation to act
      - Using guilt about relationships to push action
      - Implying the reader has damaged relationships by not acting sooner
      - Creating dramatic consequence where there is ordinary consequence
    recommended_enrichments:
      - The specific quality of the "when I do the thing" conversation — hopeful at first, then habitual, then something that happens without being examined
      - The private promise: the relationship with yourself as someone who will do this, and what maintaining that promise for years has cost
      - The people who have stopped asking: what that particular quiet costs
    claim_someone_could_argue: >
      "If your relationships are affected by your private ambitions, that's
      on you to manage. Other people shouldn't be waiting for you to become
      who you want to be. That's not their burden."
    why_this_chapter_exists: >
      The preparation loop has not been a private experience. This chapter
      makes the relational dimension visible — not as a new shame, but
      as a fuller picture of what has been happening. Seeing it fully
      is part of the integration that makes continued action sustainable.
    what_comes_next: >
      The action that scares you most — not the hardest, but the most
      personal.

  chapter_09:
    number: 9
    role: practice_under_pressure
    working_title: "The Most Personal Version"
    thesis: >
      There is a version of the action that scares you most. Not the
      version that requires the most skill — the version that is most
      personally exposed. Where your specific anxiety is greatest, where
      visibility shame is loudest, where the spiral's catastrophe is most
      precisely targeted at something you actually care about. This chapter
      goes there — not because suffering is the goal, but because avoiding
      the most personal version is exactly how the preparation loop
      re-establishes itself after the initial action.
    emotional_job: >
      Hold the weight of what is being asked without backing away from
      it. This chapter should feel like a challenge that is taken seriously,
      not minimized. The tone is steady and direct — not urgent, but clear
      about the stakes.
    practical_job: >
      Help the reader identify their most personally exposed version of
      the action — the one where visibility shame is highest, the spiral
      is most vivid, and the cost of being seen failing feels greatest.
      Prepare them for what the alarm will feel like in that context and
      give them a way to move through it that does not require the alarm
      to stop.
    what_changes: >
      Before: "I can do easier versions of this. The hardest version is
      different — I'm not ready for that yet."
      After: "I've done the version that scared me most. The alarm was
      running. I moved anyway. I know something now that I didn't know
      before."
    required_sections: [IDENTIFICATION_OF_MOST_PERSONAL, ALARM_PREPARATION, MOVING_THROUGH]
    forbidden_moves:
      - Guaranteeing success or a good outcome
      - Minimizing the difficulty of what is being asked
      - Suggesting the reader work up to this gradually (the chapter is the most personal version, now)
      - Framing this as a "final test" that graduates the reader
    recommended_enrichments:
      - The specific quality of the most-personally-exposed version: why visibility shame is loudest there, what the spiral predicts specifically for that version
      - The reader's tendency to find reasons the most personal version is "not quite right yet" — and how that tendency is the preparation loop re-emerging
      - What to do with the spiral in real time when doing the most personal version: naming it without following it
    claim_someone_could_argue: >
      "You're asking people to dive into the most terrifying version of
      something they've been avoiding for years. That's not courage coaching —
      that's exposure therapy without a therapist. This could cause real harm."
    why_this_chapter_exists: >
      The preparation loop always re-establishes itself at the edge of the
      most personally exposed territory. If the reader can act only at the
      edges — doing versions of the thing that feel safe — the loop has
      simply relocated. This chapter moves into the most important territory
      because that is where the practice becomes real.
    what_comes_next: >
      What the alarm predicted vs. what actually happened.

  chapter_10:
    number: 10
    role: reframe
    working_title: "The Alarm Was Wrong About the Cost"
    thesis: >
      The alarm predicted a specific disaster. The disaster was the logic
      of the spiral — the chain of bad outcomes that felt inevitable from
      inside the alarm. Now you have done the thing. The disaster did not
      happen, or it happened differently than predicted, or the version
      of it that happened was survivable in a way the alarm did not
      communicate. The alarm was wrong about the cost. That is information
      about the alarm's reliability as a forecasting mechanism.
    emotional_job: >
      Provide the specific cognitive shift that comes from comparing
      prediction to outcome. This is not triumphalism — it is
      calibration. The tone is matter-of-fact and slightly surprised:
      the alarm said one thing, the experience said another.
    practical_job: >
      Lead the reader through a structured comparison: what the spiral
      predicted, what actually happened, and what the gap between them
      tells the reader about the spiral's reliability. Do this for both
      the ch05 action and the ch09 action. Two data points rather than one.
    what_changes: >
      Before: "The alarm knows something about the risk that I need to
      respect."
      After: "The alarm knows that action is novel and visible. It doesn't
      know what will happen. The gap between its prediction and the outcome
      is the measure of its unreliability."
    required_sections: [PREDICTION_OUTCOME_COMPARISON, ALARM_RELIABILITY_ASSESSMENT, CALIBRATION_PRACTICE]
    forbidden_moves:
      - Claiming the alarm is always wrong (some risks are real)
      - Suggesting the reframe will eliminate future alarm
      - Turning this into celebration of overcoming fear
      - Framing this as evidence that the reader is now different or better
    recommended_enrichments:
      - The specific comparison: the spiral's predicted disaster vs. what actually happened — done honestly, without minimizing what was difficult
      - The calibration question: not "was the alarm wrong?" but "in what specific way was the alarm's cost-estimate off from the actual cost?"
      - The alarm's valid signal: it correctly identified that the action was novel and visible. Its error was in what it predicted from those features.
    claim_someone_could_argue: >
      "Maybe you got lucky. Maybe the alarm has been right before about
      real risks. You can't use two data points to conclude the alarm is
      unreliable."
    why_this_chapter_exists: >
      The reframe chapter cannot come before the experience. The reader
      needs to have done the thing, survived the alarm, and seen the gap
      between prediction and outcome before this chapter can land as
      calibration rather than reassurance. Placed here, after two actions,
      it is earned rather than claimed.
    what_comes_next: >
      The shift in how you relate to yourself — from someone who hasn't
      done the thing to someone who acts with the alarm running.

  chapter_11:
    number: 11
    role: self_relation_shift
    working_title: "From Waiting to Acting"
    thesis: >
      There is a specific difference in how you relate to yourself before
      and after you have done the thing with the alarm running. Not a
      permanent character shift — a specific change in the record. You
      are now someone who has acted before the all-clear arrived. That
      is a different record than you had before. The difference is not
      about what you feel but about what you have done.
    emotional_job: >
      Mark the shift in self-relation with precision rather than celebration.
      The reader has done something genuinely different. That deserves
      acknowledgment — not cheerleading, but the specific acknowledgment
      of someone who has seen clearly and named accurately.
    practical_job: >
      Help the reader articulate what has changed in their relationship to
      themselves — not as identity transformation, but as a different record.
      Give the reader language for "I am someone who acts with the alarm
      running" that is accurate without being grandiose. Address the
      impermanence: this does not mean the alarm is gone or that future
      actions will be easy.
    what_changes: >
      Before: "I am someone who is going to do this."
      After: "I am someone who has done this. The record includes the alarm
      and the action. Both are in it."
    required_sections: [RECORD_ACKNOWLEDGMENT, SELF_DESCRIPTION_SHIFT, IMPERMANENCE_NOTE]
    forbidden_moves:
      - Declaring a character transformation
      - Implying future actions will be easier because of what has been done
      - Using any version of "you've got this"
      - Framing the shift as permanent or stable — the alarm will return
      - Making this chapter about confidence or self-belief as a trait
    recommended_enrichments:
      - The specific quality of the shift: not "I am now courageous" but "the record of what I have done has changed"
      - The alarm's expected return: the next action will have the alarm. That is normal. The shift is in what the reader does with the alarm, not in whether it arrives.
      - The reader's tendency to discount the record of what they've done — and why the record matters
    claim_someone_could_argue: >
      "You've done the thing once or twice. That doesn't make you 'someone
      who acts with the alarm running.' It makes you someone who did it
      once. Character is pattern, not event."
    why_this_chapter_exists: >
      The self-relation shift chapter marks the change in how the reader
      experiences their own agency — not through claims about who they
      are but through the record of what they have done. Without this
      chapter, the actions of the preceding chapters exist as events
      without being integrated into a changed sense of self.
    what_comes_next: >
      The practice of acting before certainty — and what that makes
      possible.

  chapter_12:
    number: 12
    role: integration
    working_title: "Acting Before Certainty: What This Makes Possible"
    thesis: >
      The thing you were not doing is no longer the only version of the
      future available to you. You have acted before the all-clear arrived.
      You have survived the alarm. You have a record that includes both
      the alarm and the action. The practice of acting before certainty is
      not a single event — it is a capacity you have begun to develop, and
      it will be called on again. This chapter names what it makes possible.
    emotional_job: >
      Close the book with forward motion rather than completion. The reader
      has changed something. The alarm will return. The practice is ongoing.
      The tone is honest, alive, and slightly provisional — this is not the
      end but a different kind of beginning.
    practical_job: >
      Help the reader take stock of what has changed and what remains to be
      done. Give them a framework for the next time the alarm fires — not
      a technique, but a reference point: "I have done this before. The
      alarm running does not mean stop."
    what_changes: >
      Before: "I'll do the thing when I'm ready."
      After: "I know I am not waiting for the all-clear. I act before
      certainty. I know what the alarm feels like and I know I can move
      with it running."
    required_sections: [INTEGRATION_INVENTORY, WHAT_THIS_MAKES_POSSIBLE, REFERENCE_POINT_FOR_NEXT_TIME]
    forbidden_moves:
      - Declaring the reader transformed or graduated
      - Implying the alarm will not return
      - Using any version of "you've got this"
      - Ending with motivational energy that doesn't match what was honestly built
      - Making promises about what acting before certainty will produce
    recommended_enrichments:
      - The specific texture of what is now possible: not "anything is possible" but the specific things that the preparation loop was preventing
      - The reference point: a brief, usable description of what the reader now knows that they can return to when the next alarm fires
      - The ongoing nature of the practice: this is not a one-time achievement but a capacity, and capacities require use to remain available
    claim_someone_could_argue: >
      "Acting before certainty is how people make serious mistakes. Certainty
      exists for a reason. The people who've hurt others, who've failed
      badly, who've caused damage — they acted before certainty too. You're
      glorifying recklessness."
    why_this_chapter_exists: >
      The integration chapter does not end with triumph. It ends with an
      honest account of what has changed, what the practice requires going
      forward, and what is now within reach that was not before. The reader
      leaves not completed but changed — which is accurate.
    what_comes_next: >
      The next alarm. The reader knows what to do with it.

sequencing_rules:
  must_come_before:
    - somatic_legitimacy (ch02) must precede mechanism (ch03) — body first, structure second
    - mechanism (ch03) must precede destabilization (ch04) — spiral must be named before preparation loop is closed
    - destabilization (ch04) must precede practical_interruption (ch05) — the wrong strategy must be named before the right one is offered
    - practical_interruption (ch05) must precede cost_exposure (ch06) — action before accounting; the reader reads cost from the vantage of having started
    - practical_interruption (ch05) must precede hidden_belief (ch07) — the reader needs the experience before the belief chapter, because the experience is the evidence
    - practice_under_pressure (ch09) must precede reframe (ch10) — two data points before the calibration
    - reframe (ch10) must precede self_relation_shift (ch11)
  cannot_come_too_early:
    - cost_exposure cannot come before ch05 — using cost as a push toward action is the wrong sequence for this family
    - hidden_belief cannot come before the reader has acted (ch05+)
    - practice_under_pressure cannot come before ch07 — the hidden belief must be surfaced before the most personal action
  saved_for_late_book:
    - reframe (ch10) — requires two action experiences to be more than reassurance
    - self_relation_shift (ch11) — requires accumulated experience
    - integration (ch12) — must close the arc

tone_and_pacing:
  intensity_profile: [medium, medium, high, high, high, medium, medium, medium, high, medium, medium, medium]
  trust_curve: >
    This family earns trust quickly relative to the other families — the
    reader came for action and the book must deliver it. Trust is built
    by naming the alarm honestly (ch01-ch03) rather than dismissing it,
    and then giving the first action ask (ch05) earlier than the reader
    expects. The key trust-builder is that the book does not pretend the
    alarm is small or that action is easy — it takes the alarm seriously
    and then asks for action anyway. The late chapters (ch09-ch12) sustain
    medium intensity — the reader is in the practice phase and needs
    steadiness more than escalation.
  action_timing: >
    The first action ask arrives in ch05 — earlier than in any other family
    in the set. This is structural to the family: the reader came for
    action, and the book must give it. But it is preceded by four chapters
    of mechanism and legitimacy — the book earns the action ask by taking
    the alarm seriously before making any demand. The second, harder action
    ask arrives in ch09.
  mechanism_timing: >
    The mechanism (false alarm, spiral, visibility shame) arrives in ch03 —
    after recognition and somatic legitimacy but before destabilization.
    The reader needs the mechanism before they can see why preparation
    cannot solve it. The mechanism chapter is the architecture of the
    problem; destabilization is the closing of the wrong door.
  permission_timing: >
    Permission to act with the alarm running is given in ch04-ch05. Unlike
    the other families, permission in this family is primarily permission
    to act rather than permission to feel or be. It is explicit and early.
    Permission to have done it imperfectly arrives in ch10 (the
    calibration reframe).

