family_id: sleep_anxiety
family_name: "Sleep Anxiety / False Alarm at Rest"
adjacent_topics: [anxiety, overthinking, somatic_healing]
primary_mechanism: false_alarm
allowed_engines: [false_alarm, spiral, overwhelm]

reader_starting_state: >
  The reader lies awake watching the clock. They have tried sleep hygiene protocols,
  supplements, white noise, blackout curtains, and phone apps. The harder they try to
  sleep, the more awake they feel. Bedtime has become something they dread hours in
  advance. The bed itself has been converted into a performance arena where they either
  succeed at sleep or fail at it. They believe that if they could just find the right
  technique or the right combination of conditions, the problem would be solved. They
  don't know yet that the effort to solve it is the problem.

reader_ending_state: >
  The reader understands that sleep anxiety is driven by the effort to control an
  involuntary process — and that effort is the alarm, not the solution to it. They have
  stopped fighting sleeplessness and started working with their nervous system rather
  than against it. The bed is no longer a performance space. They can tolerate lying
  awake without the catastrophic spiral starting. Sleep does not feel like something
  they must earn or manufacture. They have a different relationship to the night — not
  mastery, but something more useful: non-resistance.

what_makes_this_family_different: >
  This is a false alarm problem in a very specific context: the bed, the night, the
  pre-sleep window. Unlike general anxiety, which plays out across many domains, sleep
  anxiety is spatially and temporally contained — which makes it both more tractable
  and more stubborn, because the reader returns to the exact trigger location every
  night. The reader's control strategies (tracking sleep, optimizing conditions,
  counting hours, following protocols) are the primary obstacle. Almost every tip the
  reader has already tried is making the alarm louder by treating sleep as something to
  be achieved through performance. The book must name these strategies as the problem
  before offering any alternative. It cannot offer a better sleep protocol — it must
  dismantle the protocol orientation entirely.

chapters:
  chapter_01:
    number: 1
    role: recognition
    working_title: "The Performance You Run Every Night"
    thesis: >
      The effort to make yourself sleep is the reason you can't sleep. You are not
      failing at sleep — you are succeeding at performing effort in a context that
      makes effort counterproductive.
    emotional_job: >
      Name the exhaustion of nightly effort without blame. Let the reader feel
      recognized before anything is explained. They are trying so hard. That is
      the problem. But naming it must feel like relief, not accusation.
    practical_job: >
      Establish the central paradox: sleep is an involuntary process, and effort
      is the enemy of involuntary processes. No how-to. Just the frame.
    what_changes: >
      Before: "I need to try harder / find the right technique."
      After: "I have been treating sleep like a performance. That is the setup I need to look at."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Offering any sleep tip or optimization
      - Blaming the reader for their effort
      - Promising that understanding this will fix the problem immediately
      - Any mention of sleep hygiene as a positive frame
    recommended_enrichments:
      - A specific scene of lying awake watching the minutes change on a clock
      - The internal monologue of effort ("just relax, just breathe, just stop thinking")
      - The irony of trying to stop trying
    claim_someone_could_argue: >
      Some readers will argue that effort is how they accomplish everything in life, so
      effort at sleep should work too. The chapter must hold that this is exactly the
      category error — sleep is not in the category of things effort helps.
    why_this_chapter_exists: >
      Without this chapter, the reader will read the rest of the book as a better
      set of techniques. The recognition that effort is the trap must come first,
      or nothing else lands correctly.
    what_comes_next: >
      Once the reader sees the performance, they need to understand why their body
      doesn't simply switch off when they want it to — which requires somatic legitimacy.

  chapter_02:
    number: 2
    role: somatic_legitimacy
    working_title: "Your Body Is Not Broken — It Learned"
    thesis: >
      A nervous system that won't downregulate on command is not malfunctioning. It is
      doing exactly what it learned to do: stay alert when alertness has been the
      required mode all day. You cannot discipline a nervous system into rest.
    emotional_job: >
      Remove the shame frame from the inability to sleep. The reader has been treating
      their body's wakefulness as a failure of discipline or willpower. This chapter
      reframes it as a learned response to a real pattern — not a character flaw.
    practical_job: >
      Introduce the concept of nervous system state as the context for sleep difficulty.
      The body carries the day's activation into the night. This is physiology, not
      pathology.
    what_changes: >
      Before: "Something is wrong with me — normal people can sleep."
      After: "My nervous system learned to stay active. That's what nervous systems do when staying active has been required."
    required_sections: [SCENE, MECHANISM_INTRO, REFLECTION]
    forbidden_moves:
      - Clinical or diagnostic language that pathologizes the reader
      - Suggesting the reader needs medical intervention (unless genuinely indicated — not this book's job)
      - Implying willpower could fix this if deployed correctly
      - Somatic jargon that distances rather than lands
    recommended_enrichments:
      - The contrast between a body that just ran a marathon trying to sleep vs. one that has been in a meeting all day trying to sleep — same physiology, different cause
      - The day-night continuum: what happens in the hours before bed shapes what happens in bed
    claim_someone_could_argue: >
      Someone could argue that people under equal stress sleep fine, so the issue
      must be individual weakness or poor habits. The chapter holds that the nervous
      system's response to accumulated activation is not a matter of character.
    why_this_chapter_exists: >
      Without somatic legitimacy, the reader will take the mechanism chapter as
      confirmation that they are broken. The body must be rendered non-pathological
      before its behavior is explained.
    what_comes_next: >
      Now that the body is legitimate, the reader is ready to understand the specific
      mechanism — what a false alarm at rest actually is and how it runs.

  chapter_03:
    number: 3
    role: mechanism
    working_title: "The Alarm That Has No Emergency"
    thesis: >
      The false alarm at rest is a mismatch: a threat-detection system operating at
      night-time in a body that is safe but doesn't register as safe. The system
      cannot tell the difference between a real threat and the thought of one. When
      you think "I need to sleep," the system reads urgency, not calm.
    emotional_job: >
      Make the mechanism feel demystifying rather than alarming. The reader should
      finish this chapter with a sense of "oh, that's what's happening" — not "I'm
      worse off than I thought."
    practical_job: >
      Explain the false alarm loop: urgency triggers alertness, alertness prevents
      sleep, the failure to sleep produces more urgency. Establish that the alarm
      is not evidence of a threat — it is the alarm itself that is the problem.
    what_changes: >
      Before: "I don't know why I can't sleep — I just can't."
      After: "I can see the loop. The alarm runs, the alarm prevents sleep, the failed sleep feeds the alarm."
    required_sections: [MECHANISM, SCENE, REFRAME_SEED]
    forbidden_moves:
      - Making the mechanism feel clinical or distant
      - Implying the reader caused the alarm through character failure
      - Over-explaining neurochemistry in a way that becomes another form of obsession
    recommended_enrichments:
      - The irony that "I need to sleep" is an alarm signal, not a sleep signal
      - The distinction between what the body needs (rest) and what the alarm produces (readiness)
    claim_someone_could_argue: >
      Someone will argue: if I know it's a false alarm, why can't I just turn it off?
      The chapter holds that knowledge alone does not disarm a threat-detection system —
      which sets up the rest of the book's work.
    why_this_chapter_exists: >
      The reader needs to see the loop as a system before they can work with any part
      of it. Without the mechanism chapter, interventions feel arbitrary.
    what_comes_next: >
      The mechanism describes what's happening. The next chapter asks: what belief is
      keeping the alarm funded?

  chapter_04:
    number: 4
    role: hidden_belief
    working_title: "The Rule You Never Agreed To"
    thesis: >
      Underneath the effort to sleep is a belief: if I try hard enough, I can make
      this happen. That belief is reasonable in most domains of life. In the domain
      of involuntary processes, it is the mechanism of the trap.
    emotional_job: >
      Illuminate the belief without shaming the reader for holding it. The belief
      is reasonable — it works in almost every other context. It just doesn't work
      here. And that makes it hard to see.
    practical_job: >
      Surface the hidden contract the reader has with sleep: that effort should
      produce outcome. Name the specific beliefs that carry this contract: "eight
      hours or I'm ruined," "if I'm not asleep by midnight," "I'll lose my mind
      if this continues."
    what_changes: >
      Before: "If I just try the right things in the right order, I'll sleep."
      After: "I have been operating from a belief that effort controls this. I can see that belief now. It is not a fact."
    required_sections: [BELIEF_EXCAVATION, SCENE, REFLECTION]
    forbidden_moves:
      - Telling the reader to simply drop the belief (as if that were possible at this stage)
      - Any suggestion that positive thinking will replace the belief
      - Minimizing the real exhaustion that makes the belief feel necessary
    recommended_enrichments:
      - The specific flavor of this belief in sleep context vs. work context: same belief, different results
      - What the belief is protecting the reader from (the fear underneath: that they have no control)
    claim_someone_could_argue: >
      Someone could argue: but I DO need sleep, and the consequences of not sleeping
      ARE real, so the urgency is justified. The chapter holds that urgency does not
      help and in fact worsens the situation — even when the need is genuine.
    why_this_chapter_exists: >
      Without naming the belief, the reader will keep running the same strategy
      with different tools. The belief is the operating system. It must be visible
      before anything else can change.
    what_comes_next: >
      Once the belief is visible, it needs to be destabilized — not replaced yet,
      but shown to be failing on its own terms.

  chapter_05:
    number: 5
    role: destabilization
    working_title: "Everything You've Tried Is Part of the Problem"
    thesis: >
      Sleep hygiene, tracking, apps, supplements, strict schedules, perfect conditions —
      every control strategy the reader has deployed is not the solution. It is a
      continuation of the same performance that is preventing sleep.
    emotional_job: >
      This is the chapter that will feel most threatening. The reader may feel angry
      or dismissed. The emotional job is to hold this uncomfortable truth with
      enough precision and compassion that the reader keeps reading instead of
      rejecting the claim.
    practical_job: >
      Systematically show how each common control strategy adds performance pressure.
      Tracking adds scorecard anxiety. Strict schedules add pass/fail. Apps add
      optimization loops. Supplements add dependency anxiety. The argument is not
      that these things are useless — it is that they are being used in a framework
      that makes them harmful.
    what_changes: >
      Before: "I just haven't found the right combination of techniques yet."
      After: "The techniques aren't failing because they're the wrong ones. They're failing because technique itself is the wrong category of response."
    required_sections: [PATTERN_EXPOSURE, SCENE, HONEST_ASSESSMENT]
    forbidden_moves:
      - Offering a better technique at the end of the chapter (this defeats the destabilization)
      - Being dismissive of the reader's genuine efforts
      - Promising that stopping the techniques will immediately produce sleep
    recommended_enrichments:
      - The specific experience of tracking: watching your sleep score on a device and feeling worse
      - The ritual escalation: how control strategies compound over time
    claim_someone_could_argue: >
      Someone will argue that sleep hygiene has research support, so how can it be
      wrong? The chapter holds that the research is real but the application is
      broken — for this reader, in this context, the hygiene framework adds pressure
      that makes the problem worse.
    why_this_chapter_exists: >
      Until the reader sees that their solutions are feeding the problem, they will
      keep adding solutions. The destabilization chapter creates the opening for a
      genuinely different approach.
    what_comes_next: >
      The cost of the alarm must be made concrete before the alternative can land.
      Chapter 6 turns from the mechanism to what it is actually taking from the reader.

  chapter_06:
    number: 6
    role: cost_exposure
    working_title: "What the Night Is Costing the Day"
    thesis: >
      The cost of sleep anxiety is not only the sleeplessness — it is the dread that
      starts at 3pm, the pre-bed rituals that never quite work, the morning inventory
      of how badly the night went, and the way the alarm at night has colonized the
      hours that are supposed to be awake.
    emotional_job: >
      Let the reader grieve the real losses without catastrophizing them. The dread,
      the lost evenings, the ruined mornings — these are real costs. Naming them
      clearly is both validating and clarifying: the reader can see the full shape
      of what they are dealing with.
    practical_job: >
      Map the full 24-hour cost structure of sleep anxiety: pre-bed dread, performance
      during the night, morning damage assessment, daytime fatigue amplified by anxiety,
      afternoon dread beginning again. The alarm is not contained to the bedroom.
    what_changes: >
      Before: "I just need to fix my sleep and everything will be fine."
      After: "This pattern is running across my whole day. Fixing 'sleep' isn't the right frame — the alarm is the problem, and it runs around the clock."
    required_sections: [MAPPING, HONEST_COST_ACCOUNTING, SCENE]
    forbidden_moves:
      - Using the cost inventory to catastrophize or amplify fear
      - Suggesting the reader is permanently damaged by the pattern
      - Turning the cost chapter into a motivation chapter ("you need to fix this!")
    recommended_enrichments:
      - The specific ritual of dreading bedtime while sitting on the couch at 9pm
      - The morning "how did I sleep?" inventory and its self-defeating logic
    claim_someone_could_argue: >
      Someone could argue: I function fine during the day, so the cost can't be
      that significant. The chapter holds that functioning and not being diminished
      are different things — and the reader knows the difference in their body.
    why_this_chapter_exists: >
      Cost exposure creates genuine motivation for change — not fear-based motivation,
      but clarity about what is actually being lost. Without it, the reader stays
      abstractly interested rather than personally invested.
    what_comes_next: >
      The cost is clear. Now the spiral chapter shows how the 2am mind amplifies
      that cost into catastrophe.

  chapter_07:
    number: 7
    role: relational_consequence
    working_title: "The 2am Chain: When the Spiral Runs"
    thesis: >
      At 2am, a thought about not sleeping becomes a thought about tomorrow, which
      becomes a thought about the week, which becomes a thought about everything.
      The catastrophic chain is not a sign of mental weakness — it is a predictable
      feature of an activated nervous system with nothing external to orient to.
    emotional_job: >
      Normalize the 2am spiral without making it permanent. The reader who lies awake
      running catastrophic chains has felt uniquely broken by this. Naming it as a
      pattern — and as a pattern with a specific structure — reduces its power.
    practical_job: >
      Map the specific architecture of the sleep-anxiety spiral: the trigger thought,
      the first catastrophic projection, the second, the way time feels infinite at
      2am, the way the spiral feeds the alarm which feeds the wakefulness. Distinguish
      this spiral from problem-solving (it feels like problem-solving; it is not).
    what_changes: >
      Before: "When I lie awake at 2am, my thoughts take over and I can't stop them."
      After: "I can see the structure of the spiral now. It is a pattern, not a prophecy. I don't have to follow it to the end."
    required_sections: [SPIRAL_MAP, SCENE, PATTERN_RECOGNITION]
    forbidden_moves:
      - Offering thought-stopping techniques (too soon, treats the spiral as a problem to solve with effort)
      - Dismissing the catastrophic thoughts as "just anxiety" without taking their content seriously
      - Implying the reader is irrational for running the spiral
    recommended_enrichments:
      - The specific taxonomy: sleep thought → tomorrow thought → week thought → career/relationship/health thought → existential thought
      - The way the spiral feels productive (as if you're solving something) while actually escalating activation
    claim_someone_could_argue: >
      Someone could argue: some of my 2am worries are legitimate — I AM behind on
      that thing, the situation IS serious. The chapter holds that the spiral is
      not wrong about content — it is wrong about context and timing. 2am is not
      when the situation gets clearer.
    why_this_chapter_exists: >
      The spiral is one of the most visceral experiences in this family. Readers who
      run it will feel recognized. Readers who don't will understand what others
      experience. Either way, naming it creates purchase for the interruption chapter.
    what_comes_next: >
      Now that the spiral is named and mapped, the practical interruption chapter
      can offer the one shift that changes the context — without adding effort.

  chapter_08:
    number: 8
    role: practical_interruption
    working_title: "Stop Trying to Sleep; Try to Rest"
    thesis: >
      The smallest possible change that disrupts the performance is this: relinquish
      the goal of sleep and replace it with the goal of rest. Rest does not require
      performance. Rest is available right now. Sleep may or may not follow — but
      the alarm cannot survive in a body that has genuinely stopped performing.
    emotional_job: >
      Make this feel like relief, not a new technique. The reader has been braced for
      another thing to do. This chapter must land as permission to stop — which is
      not passive; it requires a specific kind of active relinquishment.
    practical_job: >
      Define rest as a goal distinct from sleep. Offer the concrete shift: when lying
      awake, the aim is not sleep but the condition of the body — warmth, softness,
      stillness, breath. Give specific redirections for when the performance urge
      returns. This is not a technique — it is a change of aim.
    what_changes: >
      Before: "I'm lying here trying to sleep and failing."
      After: "I'm lying here resting. Sleep may or may not arrive. My job is not to produce it."
    required_sections: [THE_SHIFT, PRACTICE, WHAT_HAPPENS_WHEN_IT_WORKS]
    forbidden_moves:
      - Presenting this as a technique that will produce sleep (it might; it might not)
      - Adding steps or protocols that turn rest into a new performance
      - Promising sleep will follow within a specific timeframe
    recommended_enrichments:
      - The difference between rest and giving up (rest is intentional; giving up is defeat)
      - What "trying to rest" looks like vs. "letting the body rest" — the distinction matters
    claim_someone_could_argue: >
      Someone will argue: but I DO need to sleep, not just rest. Rest is not enough.
      The chapter holds that sleep is downstream of rest, not upstream — and that
      forcing sleep while bypassing rest is exactly the failed strategy.
    why_this_chapter_exists: >
      The practical interruption chapter delivers the core behavioral change — not as
      a trick, but as the logical consequence of everything that has come before it.
      Without chapters 1-7, this would read as naïve. With them, it reads as
      structurally sound.
    what_comes_next: >
      The shift has been offered. The reframe chapter follows to change how the
      reader interprets wakefulness itself.

  chapter_09:
    number: 9
    role: reframe
    working_title: "Lying Awake Is Not a Crisis"
    thesis: >
      The belief that a bad night is an emergency is not a fact about bad nights — it
      is an interpretation. Sleeplessness is survivable. The conviction that it is not
      is the primary fuel for the alarm, and the alarm is more damaging than the
      sleeplessness itself.
    emotional_job: >
      Give the reader permission to survive a bad night without treating it as a
      catastrophe. Not toxic positivity — the reader should not be told bad nights
      are fine. But the catastrophic interpretation needs to be separated from the
      experience.
    practical_job: >
      Provide a cognitive reframe: the night is finite, the body is more resilient
      than the alarm implies, the day after a bad night is survivable (evidence:
      every bad night the reader has had before). Distinguish between tired and
      damaged. Distinguish between one bad night and permanent inability to sleep.
    what_changes: >
      Before: "If I don't sleep tonight, tomorrow is ruined and I can't afford that."
      After: "Tonight is finite. A bad night is uncomfortable, not catastrophic. I have survived this before. I will survive it again."
    required_sections: [REFRAME, EVIDENCE, SCENE]
    forbidden_moves:
      - Toxic positivity ("a bad night is actually fine!")
      - Minimizing genuine fatigue
      - Suggesting the reader is being dramatic for finding it hard
    recommended_enrichments:
      - The reader's own history of survived bad nights (they have them — they're reading this book)
      - The specific catastrophic predictions that didn't come true after difficult nights
    claim_someone_could_argue: >
      Someone will argue: I've had bad nights that DID ruin the next day — meeting
      performance, emotional regulation, all of it. The chapter holds that the night
      made those things harder, not impossible, and the alarm made them harder still.
    why_this_chapter_exists: >
      The reframe changes the stakes of lying awake. If lying awake is no longer a
      crisis, the alarm has less to run on. This is not a cognitive trick — it is
      an accurate reappraisal of the actual danger level.
    what_comes_next: >
      With the reframe in place, the reader is ready to apply everything in the
      hardest conditions — the very bad night.

  chapter_10:
    number: 10
    role: practice_under_pressure
    working_title: "The Very Bad Night"
    thesis: >
      The night when the spiral is loudest, the alarm is strongest, and every
      reframe falls flat — that night is not a failure of the work. It is where
      the work actually lives. What to do when nothing is working is the most
      important practical knowledge in this book.
    emotional_job: >
      Prepare the reader for regression without framing it as defeat. Bad nights
      will happen after the reader has read this book. The chapter must make that
      not a disqualifying event but an expected part of the pattern.
    practical_job: >
      Provide a concrete protocol for the very bad night: what to do when the
      spiral starts at 2am, when the reframe won't land, when the body is flooded.
      This is not a rescue technique — it is a way of staying with the difficulty
      without escalating it. Includes: getting out of bed without defeat, the
      specific thought to return to, the one physical move that is always available.
    what_changes: >
      Before: "When I have a bad night, it means the work isn't working."
      After: "A bad night is information, not verdict. I know what to do with it now."
    required_sections: [THE_BAD_NIGHT_PROTOCOL, SCENE, WHAT_NOT_TO_DO]
    forbidden_moves:
      - Suggesting the reader should be able to prevent bad nights entirely
      - Offering a rescue technique that re-introduces performance pressure
      - Implying that a bad night means they need to start over
    recommended_enrichments:
      - The specific experience of waking at 3am and feeling the panic start
      - The moment when every strategy feels useless — and what that moment actually requires
    claim_someone_could_argue: >
      Someone could argue: if bad nights are going to keep happening, what's the
      point of all this work? The chapter holds that the difference is not between
      bad nights and no bad nights — it is between a bad night that spirals for six
      hours and one that settles in ninety minutes.
    why_this_chapter_exists: >
      Practice under pressure is the gap between conceptual understanding and
      embodied change. Without it, the reader's first bad night after reading the
      book will feel like proof the book failed.
    what_comes_next: >
      Having navigated the bad night, the reader is ready for the longer arc:
      rebuilding a relationship with the bed and night as places of rest, not
      performance.

  chapter_11:
    number: 11
    role: self_relation_shift
    working_title: "The Bed Is Not a Battleground"
    thesis: >
      The relationship the reader has with the bed — with the act of lying down, with
      the night itself — has become adversarial. Rebuilding it is not about relaxation
      techniques. It is about the slow process of the bed becoming associated with
      rest rather than performance, and that process takes time and a different
      orientation to the night.
    emotional_job: >
      Invite the reader into a gentler relationship with the nightly context — not
      through forced positivity, but through a gradual re-association that comes
      from repeatedly not-performing. This chapter asks the reader to let the bed
      become neutral before it becomes good.
    practical_job: >
      Describe the process of re-association: what it means to go to bed without an
      agenda, to lie down without checking for performance results. Offer the concept
      of neutral ground: a bed that is neither good nor bad is already a significant
      improvement from a bed that is a performance arena.
    what_changes: >
      Before: "I approach bedtime with dread and the bed with vigilance."
      After: "The bed is where I go when I'm tired. What happens after that is not my job to control."
    required_sections: [RE_ASSOCIATION, THE_NEUTRAL_BED, SCENE]
    forbidden_moves:
      - Promising the reader will come to love bedtime
      - Offering relaxation rituals as the mechanism (turns the rituals into performance)
      - Implying the reader should feel differently about the bed by effort of will
    recommended_enrichments:
      - What neutrality feels like — not warmth, not dread, just a place
      - The specific difference between going to bed to sleep and going to bed when tired
    claim_someone_could_argue: >
      Someone could argue: my bed is perfectly comfortable — the problem isn't the
      bed, it's my mind. The chapter holds that the bed has become conditioned to
      activate the performance response regardless of physical comfort, and that
      the conditioning is in the association, not the mattress.
    why_this_chapter_exists: >
      The relationship with the bed is the proximal trigger for the alarm. Changing
      it — even toward neutrality — changes the context in which the alarm runs.
      Without this chapter, the reader has concepts but not a changed context.
    what_comes_next: >
      The integration chapter closes the arc: what it means to have sleep return
      not as a victory but as a natural consequence of the work.

  chapter_12:
    number: 12
    role: integration
    working_title: "Sleep Returns When You Stop Chasing It"
    thesis: >
      Sleep does not return as a reward for doing the work correctly. It returns as
      a side effect of the nervous system finally having less alarm to run. The reader
      who gets here will not have a perfect sleep story — they will have a different
      relationship to the nights that are still hard.
    emotional_job: >
      Land the transformation without overpromising it. The reader who finishes this
      book should feel equipped, not cured. The equipping is real. The occasional
      bad night is still real. Both can be true.
    practical_job: >
      Describe what changes when the pattern shifts: the specific experience of
      noticing sleeplessness without the alarm spiking, of lying awake without the
      catastrophic chain running, of mornings that are not damage assessments.
      Give the reader language for what recovery actually looks like — incremental,
      non-linear, real.
    what_changes: >
      Before: "Sleep is something I must achieve, control, or earn."
      After: "Sleep is something that happens when the alarm is not in the way. My job is to stop maintaining the alarm."
    required_sections: [WHAT_INTEGRATION_LOOKS_LIKE, THE_ONGOING_PRACTICE, CLOSING_SCENE]
    forbidden_moves:
      - Promising the reader will never have a bad night again
      - Implying the work is finished and complete
      - Ending on a motivational note that feels like a new form of performance pressure
    recommended_enrichments:
      - The specific experience of a night that was not good but also did not spiral
      - What trust in the body feels like when it is new — tentative, not triumphant
    claim_someone_could_argue: >
      Someone could argue: I still have bad nights, so the book didn't work. The
      chapter holds that the question is not "do you have bad nights?" but "what
      happens in your body and mind when you do?" That is where the change lives.
    why_this_chapter_exists: >
      Integration closes the reader's arc without closing the story. Life continues.
      The nervous system continues. The difference is in what the reader brings to
      the nights that are still hard.
    what_comes_next: >
      The reader carries the frame into the nights ahead. The book does not end with
      an answer — it ends with a different question: not "will I sleep?" but
      "can I rest?"

sequencing_rules:
  must_come_before:
    - somatic_legitimacy must precede mechanism (body is not broken before body is explained)
    - mechanism must precede hidden_belief (the loop before the belief that funds it)
    - destabilization must precede cost_exposure (control strategies are the problem before the cost is enumerated)
    - practical_interruption must follow spiral (the spiral names the experience; the interruption addresses it)
    - reframe must precede practice_under_pressure (the reframe is the resource for the bad night)
  cannot_come_too_early:
    - practical_interruption (ch08) — must not appear before destabilization; readers will treat it as a technique
    - reframe (ch09) — must follow practical_interruption; reframe without behavioral shift is cognitive bypass
    - self_relation_shift (ch11) — requires all mechanism and practical work to be in place first
  saved_for_late_book:
    - integration (ch12) — cannot be rushed; requires the full arc to earn it
    - self_relation_shift (ch11) — the relational shift with the bed follows from behavioral change, not before it
    - practice_under_pressure (ch10) — only useful after the practical interruption has been offered

tone_and_pacing:
  intensity_profile: [medium, medium, medium, medium, high, medium, high, low, medium, high, medium, low]
  trust_curve: >
    Trust builds slowly. Chapters 1-3 must feel like recognition without prescription.
    The reader has been told what to do many times and it hasn't worked. The book earns
    trust by naming accurately before offering anything. The destabilization chapter (ch05)
    will test trust — some readers will want to close the book. The practical interruption
    (ch08) must feel earned rather than sudden. By ch10, the reader trusts enough to
    follow into difficult territory. Chapters 11-12 return to quieter register.
  action_timing: >
    First practical shift arrives at chapter 8. Nothing prescriptive before that.
    Chapters 1-7 are framing, naming, and preparing the reader for a change of
    orientation rather than a change of technique.
  mechanism_timing: >
    Core mechanism (false alarm loop) arrives at chapter 3. Supported by somatic
    legitimacy in chapter 2. Funded belief arrives at chapter 4. Mechanism is
    introduced and then returned to in different registers throughout.
  permission_timing: >
    First permission ("your body is not broken") at chapter 2.
    Second permission ("the techniques aren't working because technique is wrong")
    at chapter 5 — harder to receive.
    Third permission ("lying awake is survivable") at chapter 9.
    Final permission ("sleep returns on its own") at chapter 12.

