family_id: adhd_focus
family_name: "ADHD / Attention & Task Regulation / The Initiation Gap"
adjacent_topics: [overwhelm, procrastination, time_management, executive_function]
primary_mechanism: overwhelm
allowed_engines: [overwhelm, shame, comparison]

reader_starting_state: >
  Reader is a capable, often high-performing manager who knows exactly what needs to be done
  and cannot reliably get themselves to start. The task sits there — sometimes for hours,
  sometimes for days — while they answer easy emails, reorganize a folder, or do five other
  things instead. The stakes do not help; sometimes flat, low-stakes work is impossible to begin
  and sometimes a task so large or so consequential that it should feel urgent produces only a
  strange paralysis. They lose track of time and then lose track of having lost it. They are
  distractible in a way that feels involuntary. Privately they have concluded the problem is
  discipline — that other people simply make themselves do things and they have some deficiency
  of will. They are exhausted from the gap between knowing what to do and doing it, and from the
  effort of hiding that gap from the people who report to them.

reader_ending_state: >
  Reader can see that task initiation is a faculty in its own right — separate from knowing what
  to do, separate from caring about it, separate from competence — and that theirs works
  differently rather than weakly. They have felt the freeze in their body and recognized it as a
  regulation event rather than a verdict on their character. They understand how stakes and
  novelty and social consequence move their system, and they have begun externalizing structure
  so that starting no longer depends on summoning a faculty that isn't reliably available on
  demand. They have a beginning relationship with their own wiring that works with it rather than
  against it — not a solved problem, but a different stance than they arrived with.

what_makes_this_family_different: >
  This family requires de-stigmatization before any technique, because the reader arrives already
  convinced the problem is moral. Any tool offered too early will be heard as "another thing I'll
  fail to keep up with" and will confirm the shame. The mechanism — that initiation is a distinct
  executive faculty, regulated by interest, novelty, urgency, and stakes rather than by willpower
  — must be established at length before structure is introduced, or the structure becomes one
  more performance to fall short of. The comparison mechanism must be named specifically: managers
  watch peers start things effortlessly and rank themselves below them, which deepens the freeze.
  The shame engine compounds it: the more a task matters socially, the more consequence it
  carries, the harder it can be to begin — the opposite of what a willpower model predicts. Unlike
  generic procrastination (a timing or motivation problem) or simple time management (a planning
  problem), this family is about a wiring difference in how attention and initiation are regulated.
  That distinction is the entire point. The book must never pathologize the reader and must never
  imply the fix is to try harder.

chapters:
  chapter_01:
    number: 1
    role: recognition
    working_title: "The Gap Between Knowing and Doing"
    thesis: >
      Most managers who struggle here are not failing to understand their work and are not failing
      to care about it. They are stalling in a specific, repeatable place: the moment of starting.
      They know exactly what to do, they intend to do it, and a gap opens between the intention and
      the action that no amount of knowing seems to close. They didn't choose this gap. They often
      can't see it as a gap at all — they experience it as their own failure to simply begin.
    emotional_job: >
      Reader feels the precise shock of recognition — not the vague "I procrastinate too" of
      generic productivity advice, but the specific "someone has described the exact stall I live
      inside." The chapter must name the initiation gap with enough specificity that the reader
      stops and re-reads it.
    practical_job: >
      Name the gap: the reliable distance between knowing what to do and being able to start doing
      it. Show how it is not about knowledge (they know), not about caring (they care), and not
      about capability (they are capable). Distinguish the gap from ordinary procrastination,
      laziness, or poor planning — it persists even when the plan is clear and the will is present.
    what_changes:
      Before: "I know what I need to do. I just can't seem to make myself start. I have no discipline."
      After: "There is a specific place where I stall — the starting line. It isn't about knowing
        or caring. Something else is happening there, and I never named it."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Offering any technique or fix in chapter 1
      - Collapsing the initiation gap into ordinary procrastination (acknowledge overlap, don't merge)
      - Framing the gap as a discipline or willpower deficit (this is the belief the book dismantles)
      - Reassuring the reader the gap is fine before they understand what it is (too early)
    recommended_enrichments:
      - Opening scene of a manager staring at a task they fully intend to do, unable to begin
      - The strange specificity of the stall — easy adjacent tasks get done while the real one waits
      - How the gap feels like a personal failing rather than a regulation event
    claim_someone_could_argue: >
      Some would argue that the gap between knowing and doing is simply a lack of discipline that
      anyone could close by deciding to — that successful people are precisely those who make
      themselves start, and naming a special mechanism just gives the reader an excuse.
    why_this_chapter_exists: >
      The reader cannot work with the initiation gap until they can see it as a distinct event
      rather than a moral failure. Most managers with this pattern experience the stall as evidence
      of a character flaw, not as the output of a regulation system. Separating the gap from the
      self is the entire work of this chapter, and it is prerequisite for everything else.
    what_comes_next: >
      Chapter 2 explains the mechanism behind the gap — why initiation is a faculty separate from
      motivation and knowledge, and how interest, novelty, and stakes regulate it.

  chapter_02:
    number: 2
    role: mechanism
    working_title: "Initiation Is Its Own Faculty"
    thesis: >
      Starting a task is not the same act as knowing how to do it or wanting it done. It is a
      separate executive function — the capacity to convert intention into the first action — and
      in some brains it is regulated less by importance and more by interest, novelty, urgency, and
      stakes. This is a wiring difference, not a weakness. Understanding that initiation runs on
      a different fuel than motivation explains why "important" alone so often fails to start the engine.
    emotional_job: >
      Reader understands — factually rather than as comfort — that the gap has a mechanism. It is
      not a hole in their character; it is a faculty operating on a different logic than they were
      told it should. The emotion is more curious than relieved: an accurate account, not a pardon.
    practical_job: >
      Describe initiation as a distinct executive faculty and name what actually drives it: interest,
      novelty, urgency, challenge, and stakes — not abstract importance or stated priority. Show why
      a dull but critical task can be unstartable while a vivid trivial one launches instantly. Name
      the comparison component: how watching peers start effortlessly and ranking oneself below them
      is itself a fuel for the freeze. Do this without clinical lecturing or requiring a diagnosis.
    what_changes:
      Before: "If something is important enough, I should just be able to make myself do it."
      After: "Importance isn't the fuel my starting engine runs on. It runs on interest, novelty,
        urgency, stakes. That's a wiring difference, not a flaw."
    required_sections: [HOOK, MECHANISM_DIAGRAM, SCENE, REFLECTION]
    forbidden_moves:
      - Turning this into a clinical lecture or a diagnostic checklist
      - Suggesting the reader needs a formal diagnosis to make use of the mechanism
      - Making the wiring difference sound like a deficit or a disorder to be corrected
      - Resolving the mechanism with understanding alone (insight is not initiation)
    recommended_enrichments:
      - The specific way a dull-but-critical task stays frozen while a vivid trivial one launches instantly
      - How dopamine-driven prioritization sorts tasks by interest and urgency rather than importance
      - The comparison habit of measuring one's own starting against peers who start without friction
    claim_someone_could_argue: >
      Some would argue that everyone finds boring tasks hard to start and that calling initiation a
      separate faculty just dresses up ordinary reluctance — that mature professionals override
      reluctance by force of will and that is simply what work requires.
    why_this_chapter_exists: >
      Seeing the gap (ch01) without understanding its mechanism leaves it feeling like a fixed
      personal defect. The mechanism chapter makes the gap structural rather than characterological —
      a faculty with its own logic, not a hole in the self. This is the cognitive ground for
      everything that follows: the stall is not you; it is a regulation system running on fuel you
      did not choose.
    what_comes_next: >
      Chapter 3 moves from the cognitive to the somatic — what the initiation freeze actually does
      in the body, which is neither weakness nor avoidance but a learned regulation response.

  chapter_03:
    number: 3
    role: somatic_legitimacy
    working_title: "What the Freeze Feels Like in the Body"
    thesis: >
      The initiation stall is not only mental. It has a physiology: the heaviness, the foggy
      blankness, the restless reach for any other stimulus, the strange physical resistance to
      moving toward the task. These responses are not laziness and not avoidance in the moral sense.
      They are the body's regulation response to a task the system cannot get traction on. The body
      learned this. It can be worked with — but first it must be recognized, not overridden.
    emotional_job: >
      Reader recognizes the bodily experience of the freeze as something that has happened to them
      many times without ever being named. The relief of recognition — "that specific heaviness and
      foggy resistance has a name" — is different from intellectual understanding. The chapter
      legitimizes the physical experience without dramatizing it.
    practical_job: >
      Name the specific somatic signatures of the initiation freeze: the leaden heaviness, the
      mental fog that descends at the threshold, the almost physical aversion to opening the
      document, the restless pull toward email, snacks, or any smaller stimulus. Explain why this
      is a regulation response — the system seeking traction or stimulation — rather than evidence
      of weak character. Give the reader language to name the physical experience when it arrives.
    what_changes:
      Before: "When I sit down to start, I just go blank and end up doing something else. What is wrong with me?"
      After: "That fog and heaviness at the threshold has a name. It is a physical regulation
        response, not a verdict on my character. My body does this; it isn't proof I'm lazy."
    required_sections: [HOOK, SOMATIC_INVENTORY, SCENE, REFLECTION]
    forbidden_moves:
      - Treating somatic recognition as therapeutic processing (not the role of this book)
      - Suggesting the reader can think or push their way out of the freeze
      - Conflating the initiation freeze with ordinary tiredness or boredom (related but distinct)
      - Turning this chapter into a breathing exercise or a regulation protocol
    recommended_enrichments:
      - The distinction between the body's freeze response and the verdict that follows ("I'm lazy")
      - How the restless reach for stimulation is the system hunting for traction, not avoidance
      - The difference between the initiation freeze and ordinary fatigue or simple disinterest
    claim_someone_could_argue: >
      Some would argue that physical resistance to unpleasant work is just discomfort everyone
      feels, and that legitimizing it as a regulation response teaches people to indulge avoidance
      rather than push through the way functional adults are expected to.
    why_this_chapter_exists: >
      The reader who cannot distinguish the freeze in the body from a verdict about their character
      will keep reading the body's signal as proof of failure. This chapter does not eliminate the
      freeze — it names it precisely enough that the reader can notice it without immediately
      treating it as evidence of laziness. Without this chapter, every later technique will be
      overridden by the body's faster, shaming signal.
    what_comes_next: >
      Chapter 4 names the full cost of living in the initiation gap — the exhaustion, the hidden
      labor, and the toll of constantly managing around a faculty that won't come on demand.

  chapter_04:
    number: 4
    role: cost_exposure
    working_title: "The Hidden Cost of Always Pushing Uphill"
    thesis: >
      Living with an unreliable starting engine is metabolically and emotionally expensive. The
      reader has been pushing uphill against their own initiation for so long — and hiding it so
      well — that the exhaustion feels like baseline reality. Naming the cost is the first step
      toward imagining that it could be any different.
    emotional_job: >
      Reader contacts, perhaps for the first time, the real cost of the work they have been doing:
      the constant low-grade dread of unstarted tasks, the energy spent hiding the gap, the
      apologizing, the last-minute scrambles. Not as self-pity but as honest accounting. This has
      cost something real. The chapter creates space to acknowledge that without rushing to fix it.
    practical_job: >
      Name the specific costs: the cognitive load of carrying unstarted tasks like open tabs, the
      dread that accumulates around avoided work, the energy spent concealing the gap from a team,
      the relational cost of last-minute scrambles and missed-then-recovered deadlines, the way the
      reader discounts their own real competence because of how hard starting is. Quantify nothing,
      but make the cost vivid.
    what_changes:
      Before: "This is just how I work. Everyone leaves things to the last minute. I get it done eventually."
      After: "I've been doing a tremendous amount of invisible work just to function. It has been
        costing me things I didn't know I was spending — dread, energy, sleep, trust in myself."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Turning cost into pressure to fix the problem quickly
      - Reducing cost to career damage or productivity loss alone
      - Allowing the reader to use cost as fresh evidence against their character
      - Reassuring the reader that the cost is worth it because deadline-adrenaline makes them perform
    recommended_enrichments:
      - The specific dread of carrying an unstarted task across an entire weekend
      - How concealing the gap from a team is its own full-time second job
      - The baseline exhaustion that has been mistaken for personality or for being "bad at work"
    claim_someone_could_argue: >
      Some would argue that the last-minute pressure many of these managers run on actually produces
      good work — that the adrenaline of a deadline is a feature, and the cost is simply the price
      of a working system that should be left alone.
    why_this_chapter_exists: >
      The reader who doesn't see the cost clearly won't have sufficient reason to do the genuinely
      different work that follows — and may keep defending the deadline-adrenaline cycle as fine.
      Cost exposure also breaks the myth that the current way of operating is free: it has been
      expensive, and the reader deserves to know that without being blamed for it.
    what_comes_next: >
      Chapter 5 examines the core belief that keeps the reader pushing uphill: the conviction that
      the next burst of discipline, the next system, the next fresh start will finally fix it.

  chapter_05:
    number: 5
    role: hidden_belief
    working_title: "The Discipline That Never Arrives"
    thesis: >
      Underneath the struggle is a belief that functions like a promise: once I find enough
      discipline — the right willpower, the right system, the right Monday — the gap will close and
      I'll start things like everyone else. The problem is not that effort is bad; it is that this
      belief locates the solution in a faculty the reader's wiring doesn't supply on demand. The
      belief is structured so that every failure to start becomes proof of insufficient discipline
      rather than proof that discipline was never the missing ingredient.
    emotional_job: >
      Reader experiences the discomfort of recognizing a belief they have been living inside without
      knowing they held it. The emotion is something like waking up — not pleasant, but orienting.
      Not relief; recognition. They have been waiting for a willpower that was never coming.
    practical_job: >
      Name the discipline belief explicitly: "When I finally get disciplined enough, I'll just do
      things." Show its self-reinforcing structure: when the willpower push fails, the conclusion is
      never "willpower wasn't the issue" but always "I need more discipline." Name the specific forms
      the promise takes: the new app, the 5 a.m. routine, the clean-slate Monday, the productivity
      book. Show how the belief is built to be unfalsifiable — every stall reconfirms it.
    what_changes:
      Before: "I just haven't found enough discipline yet. The next system will be the one that sticks."
      After: "Every time I've tried to willpower my way across the gap, it's failed the same way.
        I've been treating a wiring difference as a discipline shortage."
    required_sections: [HOOK, SCENE, BELIEF_INVENTORY, REFLECTION]
    forbidden_moves:
      - Resolving the belief with a counterargument or a new system (too early)
      - Making this a chapter about motivation hacks or habit-building
      - Implying that effort is worthless or that the reader shouldn't try at all
      - Using "discipline" or "willpower" as a solution-noun the reader should acquire more of
    recommended_enrichments:
      - The specific experience of starting a shiny new system and watching it collapse within a week
      - How each failed willpower push is filed as more evidence of personal deficiency
      - The difference between a genuine wiring difference and the discipline shortage the reader assumes
    claim_someone_could_argue: >
      Some would argue that discipline is exactly the answer — that the reader who keeps failing to
      build it simply hasn't tried hard enough or wanted it badly enough, and that excusing the
      failure as wiring removes the one lever that would actually work.
    why_this_chapter_exists: >
      Without naming the discipline belief, the reader will keep treating the next willpower push as
      the potential solution and keep filing each failure as character evidence. This belief is the
      engine of the whole pattern. Once named and examined as a structural mistake — looking for the
      answer in the wrong faculty — the reader can stop running the loop and start asking a different
      question.
    what_comes_next: >
      Chapter 6 delivers the destabilizing evidence: more discipline has never closed the gap, and
      the proof is already sitting in the reader's own history.

  chapter_06:
    number: 6
    role: destabilization
    working_title: "The Evidence You Already Have"
    thesis: >
      The reader does not need to wait for more data on whether willpower closes the initiation gap.
      They already have years of it. Every failed system, every collapsed routine, every Monday that
      didn't fix it is evidence. The reader's own experience is the argument that the current
      strategy — find more discipline — is aimed at the wrong target.
    emotional_job: >
      Reader experiences productive disorientation — the specific feeling of having a cherished
      strategy exposed as ineffective. This is uncomfortable. It is also the first moment of genuine
      possibility in the book: if discipline was never the missing piece, then a different approach
      is not yet foreclosed.
    practical_job: >
      Walk the reader through their own evidence: the specific systems adopted and abandoned, the
      willpower pushes that worked for days and then collapsed, the pattern repeating regardless of
      how much they wanted it. Show the consistency in their own data. Do not require new evidence —
      help them read what they already have, without using it as another reason to feel ashamed.
    what_changes:
      Before: "I just haven't found the right system yet. The next one will be different."
      After: "I've been running this experiment for years. The results have been consistent. More
        discipline has never been what closes the gap. The hypothesis isn't supported by my own life."
    required_sections: [HOOK, EVIDENCE_REVIEW, SCENE, REFLECTION]
    forbidden_moves:
      - Leaving the reader without any forward orientation (destabilize, then partially stabilize)
      - Turning this into a meditation on futility or hopelessness
      - Suggesting that because willpower failed, nothing can help
      - Making the reader feel foolish for not having seen this sooner
    recommended_enrichments:
      - The specific cognitive move that protects the belief — "this system will be different"
      - How the mind discounts the long history of failed willpower and over-weights the next attempt
      - The strange comfort of the familiar discipline strategy even as it fails again
    claim_someone_could_argue: >
      Some would argue that persistence is a virtue and that abandoning the pursuit of discipline
      after years of trying is just giving up — that the breakthrough comes precisely to those who
      refuse to stop pushing.
    why_this_chapter_exists: >
      Naming the belief (ch05) is necessary but not sufficient. The reader needs to see it evaluated
      against their own evidence, not in the abstract. This chapter makes it personal and immediate.
      Without this confrontation, the reader will leave with an intellectual understanding of the
      belief and keep chasing the next system unchanged.
    what_comes_next: >
      Chapter 7 shows how the initiation gap shapes the reader's working relationships — the
      specific ways the stall, the scrambles, and the concealment affect the people around them.

  chapter_07:
    number: 7
    role: relational_consequence
    working_title: "Managing While Stalling"
    thesis: >
      When starting is unreliable, leadership becomes a quiet act of concealment. The reader is not
      only managing their team; they are managing the gap — covering the stalls, scrambling the
      recoveries, absorbing the dread so no one sees it. And the energy spent hiding the gap is
      energy not spent being present with the people they lead. The cost here is not only personal;
      it shapes how they show up as a manager.
    emotional_job: >
      Reader recognizes the relational dimension of the gap — the specific strain of leading others
      while privately fighting to start, the guilt of the deadline they pushed onto a teammate
      because they couldn't begin in time, the distance created by constant concealment. This should
      feel more tender than any previous chapter. The reader is not being criticized; they are being seen.
    practical_job: >
      Name the specific relational dynamics: the concealment that costs presence, the last-minute
      handoffs that strain the team, the difficulty modeling calm starting for reports who look to
      them, the comparison that flares when a peer manager ships effortlessly. Show how the shame
      of stalling makes the reader withdraw or overcompensate. Keep the frame on the wiring, not on
      a moral failing as a leader.
    what_changes:
      Before: "I manage fine. I always pull it together in the end and my team gets what they need."
      After: "I've been spending real energy hiding the gap from my team instead of being present
        with them. The scrambles land on other people. I want a way to lead that isn't built on concealment."
    required_sections: [HOOK, SCENE, REFLECTION]
    forbidden_moves:
      - Blaming the reader for being a bad manager
      - Implying the reader is incapable of leading well
      - Turning this into management tips or delegation techniques
      - Making the chapter only about deadlines and ignoring the relational toll of concealment
    recommended_enrichments:
      - The specific experience of pushing a deadline onto a report because the reader couldn't start in time
      - How concealing the gap from a team quietly erodes presence and trust over time
      - The comparison flare when a peer manager seems to start and ship without any friction
    claim_someone_could_argue: >
      Some would argue that results are what matter and a manager who delivers in the end is doing
      their job — that the private struggle to start is irrelevant as long as the work ships, and
      examining the relational cost is overthinking a non-problem.
    why_this_chapter_exists: >
      The relational cost of the initiation gap must be seen before the reader can value the work
      ahead as anything more than private productivity. The reader who understands the gap only as
      a personal-efficiency issue will not grasp why externalizing structure and working with the
      wiring matters for how they lead. Leadership is the lived arena where this pattern matters most.
    what_comes_next: >
      Chapter 8 opens the identity question directly: who are you as a worker and a manager if the
      problem was never discipline — if your brain simply runs on different fuel?

  chapter_08:
    number: 8
    role: identity_fracture
    working_title: "Who You Are If It Was Never Discipline"
    thesis: >
      The reader has explained themselves to themselves for years through the language of discipline
      and willpower: I am lazy, I am inconsistent, I am someone who can't get it together. If the gap
      was never a discipline failure, much of that self-concept loses its footing. The question of
      who you are when "undisciplined" is removed from the account is genuinely destabilizing, because
      so much of the reader's identity has been built on that explanation.
    emotional_job: >
      Reader sits with genuine uncertainty about their own identity in a way that is productive rather
      than threatening. The chapter does not demand an answer; it opens a question that needs to stay
      open for the later chapters to land. By the end the emotion is more curious than frightened —
      and quietly, for some, a grief for the years spent believing the wrong story.
    practical_job: >
      Help the reader separate willpower-based self-concepts (I'm lazy, I'm flaky, I lack discipline)
      from the actual facts of their wiring (initiation runs on different fuel; competence and care
      were never in question). Do not hand them a finished new identity — open the question of who
      they are once the discipline story is set down, and let it stay open.
    what_changes:
      Before: "I know who I am at work. I'm the smart one who just can't get it together — undisciplined."
      After: "'Undisciplined' was an explanation, not a fact. If it was never about willpower, I'm
        not sure who I am underneath that story. That uncertainty is new — and it's a relief and a grief at once."
    required_sections: [HOOK, IDENTITY_INVENTORY, SCENE, REFLECTION]
    forbidden_moves:
      - Handing the reader a finished new identity too early
      - Implying the "undisciplined self" was false and a flawless "real self" waits underneath
      - Making the identity fracture feel like a crisis without orientation
      - Turning this into a spiritual or philosophical identity question
    recommended_enrichments:
      - What remains of the self-concept when "lazy" and "undisciplined" are removed from the account
      - The specific strangeness of not knowing how to describe yourself without the discipline story
      - The grief of recognizing years spent believing a wiring difference was a character defect
    claim_someone_could_argue: >
      Some would argue that calling it wiring rather than discipline is just relabeling an excuse —
      that identity is built on the choices we make and the standards we hold, and removing
      responsibility for starting hollows out the very thing that makes someone reliable.
    why_this_chapter_exists: >
      The practical work of ch09-11 requires the reader to have already experienced the question of
      who they are without the discipline story as real and open — not as a threat, and not as
      something already answered. This chapter creates the opening the later chapters move through.
    what_comes_next: >
      Chapter 9 gives the reader their first practical tool: externalizing the start so that
      beginning no longer depends on summoning a faculty that isn't reliably available.

  chapter_09:
    number: 9
    role: practical_interruption
    working_title: "Externalizing the Start"
    thesis: >
      You cannot reliably summon initiation on command — not yet, and possibly not ever by will
      alone. What you can do is stop requiring yourself to. Instead of generating the start from
      inside, you can build it outside yourself: shrink the first action until it is too small to
      freeze on, attach the task to existing momentum, borrow urgency and accountability from the
      environment. The point is not more willpower; it is needing less of it to begin.
    emotional_job: >
      Reader experiences the concrete possibility of a different relationship to starting — not the
      arrival of reliable willpower, but a small, survivable way to begin that doesn't depend on a
      faculty that isn't there on demand. This is the first moment of genuine agency in the book.
    practical_job: >
      Introduce the specific practice of externalizing initiation: shrinking the first step to
      something almost embarrassingly small, lowering the activation threshold so the start is too
      small to freeze on, attaching the task to an existing routine or to body-doubling, and
      borrowing urgency and stakes from the environment rather than waiting to feel them. The
      practice is small and concrete. Do not oversell it; some days it will still be hard.
    what_changes:
      Before: "I keep waiting to feel ready to start, and then I wait, and then it's late."
      After: "I don't have to generate the start from inside anymore. I can make the first step so
        small I can't freeze on it, and build the start outside myself. Sometimes that's enough to move."
    required_sections: [HOOK, PRACTICE_DESIGN, SCENE, REFLECTION]
    forbidden_moves:
      - Implying the practice will eliminate the freeze or make starting effortless
      - Turning externalizing into one more rigid system the reader will fail to maintain
      - Making the practice sound like a willpower trick or a discipline upgrade in disguise
      - Claiming the practice will be easy or will feel immediately better every time
    recommended_enrichments:
      - The specific texture of shrinking a task until the first step is too small to freeze on
      - What externalizing looks like in concrete management situations — the report, the review, the deck
      - How the freeze physiology (ch03) still activates during the practice and can be moved through anyway
    claim_someone_could_argue: >
      Some would argue that externalizing the start is just another crutch — that relying on tiny
      steps and environmental scaffolding avoids building the internal discipline that adults need,
      and that the reader should be learning to start unaided.
    why_this_chapter_exists: >
      All the cognitive and somatic work of chapters 1-8 needs a practice — a specific, repeatable
      action the reader can take when the gap opens. Without this chapter, the book produces insight
      without any experience of something different. Externalizing the start is the experiential
      foundation for the reframe and the shift in self-relation that follow.
    what_comes_next: >
      Chapter 10 delivers the reframe: the gap is information about how your attention is regulated,
      not a verdict about your worth or your competence.

  chapter_10:
    number: 10
    role: reframe
    working_title: "A Regulation Difference, Not a Verdict"
    thesis: >
      The initiation gap is not a neutral judgment of your character or your capability. It is the
      output of a system that regulates attention and starting by interest, novelty, urgency, and
      stakes rather than by stated importance. The stall is data about how your attention is
      regulated — information you can work with — not a fact about your worth as a worker or a person.
    emotional_job: >
      Reader experiences the specific relief of having the gap recontextualized — not dismissed
      (which would feel patronizing) but accurately relocated. The freeze doesn't vanish; its meaning
      changes. This is different from "you're fine just as you are" — it is being given an accurate
      account of what the gap actually is and where it comes from.
    practical_job: >
      Reframe the gap from verdict to information: it reflects a regulation difference in how
      attention and initiation work; it predicts which tasks will be hard to start given their
      fuel profile; it says nothing about competence, care, or worth. Give the reader a specific way
      to hold a stall differently: "This is my regulation system showing me a low-fuel task" rather
      than "This proves I'm lazy."
    what_changes:
      Before: "I froze on it again. That just confirms I'm undisciplined and not cut out for this."
      After: "I froze on it again. That's my attention-regulation system meeting a low-fuel task.
        It's information about the task and my wiring, not a verdict on whether I'm capable or worthy."
    required_sections: [HOOK, REFRAME, SCENE, REFLECTION]
    forbidden_moves:
      - Telling the reader the gap is meaningless or that it doesn't matter (too dismissive)
      - Replacing the verdict with an affirmation about how capable they really are
      - Making this chapter feel like cognitive behavioral therapy
      - Turning the reframe into a quick fix or a one-line mantra that erases the work
    recommended_enrichments:
      - The specific cognitive move from "this proves what I am" to "this shows how my attention is regulated"
      - How interest, novelty, urgency, and stakes determine which tasks the system can start
      - What it means to hold a stall as information about wiring rather than as a verdict on worth
    claim_someone_could_argue: >
      Some would argue that reframing the stall as a regulation difference lets the reader off the
      hook — that sometimes failing to start really is a failure, and teaching people to read it as
      neutral information removes accountability that work legitimately requires.
    why_this_chapter_exists: >
      The reframe is the pivot of the entire book. Everything before it has been building toward it:
      the reader needed to see the gap (ch01), understand initiation as a faculty (ch02), feel its
      somatic dimension (ch03), name its cost (ch04), examine the discipline belief (ch05), confront
      its failure with their own evidence (ch06), see its relational cost (ch07), and fracture the
      identity built on "undisciplined" (ch08) before they could receive a reframe that actually
      lands. Delivered earlier, this chapter would be excuse-making. Delivered here, it is earned.
    what_comes_next: >
      Chapter 11 builds on the reframe by asking: what would it actually look like, day to day, to
      work with this wiring instead of against it?

  chapter_11:
    number: 11
    role: self_relation_shift
    working_title: "Working With the Wiring"
    thesis: >
      It is possible to relate to your own brain not as a defective version of someone else's but as
      a differently regulated system you can collaborate with. This is not an arrival; it is a
      practice. And it is built through the accumulation of small experiences of externalizing the
      start, noticing the freeze without shaming it, and arranging your work around how your
      attention actually runs rather than how you were told it should.
    emotional_job: >
      Reader senses the texture of a different way of being with their own brain — not as a concept
      but as something they have already touched in the moments of externalizing a start from ch09.
      The emotion here is quieter than hope: recognition of a workable ground that exists and can be
      returned to, even on the hard days.
    practical_job: >
      Name what working with the wiring looks like in specific moments: the freeze arrives, the body
      goes heavy, the reader names it rather than obeying the shame, shrinks the step, and moves. Over
      time this becomes a collaboration — not with an idealized neurotypical self, but with the actual
      brain they have, designing their days and tasks around its real fuel. Give the reader language
      for this ongoing practice without turning it into a rigid productivity regime.
    what_changes:
      Before: "Once I fix myself and finally work like everyone else, then I'll be okay."
      After: "I'm not going to be rewired into someone else. The work is learning to collaborate with
        the brain I have — arranging things around how it actually starts. I'm practicing that right now."
    required_sections: [HOOK, SCENE, PRACTICE_UNDER_PRESSURE, REFLECTION]
    forbidden_moves:
      - Claiming the shift is complete or that starting will become effortless
      - Using any of the family-specific prohibited terms (just focus, try harder, willpower, lazy)
      - Turning working-with-the-wiring into self-improvement toward becoming neurotypical
      - Making this chapter sound like a spiritual practice or a finished therapeutic achievement
    recommended_enrichments:
      - The specific experience of the freeze arriving during a high-stakes task and being worked with rather than obeyed
      - How the comparison habit continues but is no longer automatically believed
      - What "working with your wiring" means in practice — designing tasks and days around real fuel, not borrowed standards
    claim_someone_could_argue: >
      Some would argue that working with the wiring is just accommodating dysfunction — that the
      reader should be striving to start like everyone else, and that designing life around a
      difference entrenches limitation instead of pushing past it.
    why_this_chapter_exists: >
      The reframe of ch10 is cognitive. The shift to working with the wiring is embodied and
      practical. Without this chapter, the reader has a new way of thinking about the gap but not a
      new way of operating day to day. This chapter builds the bridge between intellectual reframe
      and lived practice.
    what_comes_next: >
      Chapter 12 integrates everything into a frame for ongoing life — not a conclusion, but an
      orientation toward what the reader is building and how to keep going.

  chapter_12:
    number: 12
    role: integration
    working_title: "Building Structure That Works With You"
    thesis: >
      A working relationship with your own attention — structure built around your wiring rather
      than against it — is not a state that arrives and stays. It is something built through practice,
      lost and returned to, maintained through the ongoing work of externalizing starts and noticing
      the freeze without shame. This is not the end of the initiation gap. It is the beginning of no
      longer being governed by the belief that the gap means something is wrong with you.
    emotional_job: >
      Reader closes the book with something solid rather than something inspiring. Not a peak
      experience but a sense of ground: I know what the work is, I have begun doing it, I know what it
      feels like when I'm working with my wiring and when I've slipped back into fighting it. The
      emotion is steady rather than elevated.
    practical_job: >
      Name what working-with-your-wiring is and what it is not: it is not the end of the freeze, not
      the arrival of reliable willpower, not becoming someone who starts effortlessly. It is the
      accumulated practice of externalizing the start, holding the stall as information rather than
      verdict, and building structure around how your attention actually runs. Give the reader a frame
      for the ongoing work that doesn't require them to be finished or fixed.
    what_changes:
      Before: "Once I finally fix this, I'll be a normal, disciplined manager."
      After: "This isn't something I finish. It's structure I keep building and returning to. I've
        already begun, and I'm working with my brain instead of against it. That matters."
    required_sections: [HOOK, INTEGRATION_MAP, SCENE, REFLECTION]
    forbidden_moves:
      - Any promise that the initiation gap will be eliminated or that willpower will finally arrive
      - Making working-with-your-wiring sound like permanent effortless productivity
      - Closing with affirmation or inspirational framing
      - Using any of the prohibited terms as the final note
    recommended_enrichments:
      - What the reader has built across the twelve chapters, named specifically
      - The gap revisited: it will open again; here is what you now have when it does
      - The specific quality of structure the reader is building — not a fix but an ongoing collaboration
    claim_someone_could_argue: >
      Some would argue that real change in attention and initiation requires clinical treatment —
      assessment, medication, sustained professional support — and that a book can at best create
      intellectual understanding without producing genuine change in how someone starts their work.
    why_this_chapter_exists: >
      The book must close by landing on something real. A chapter of inspiration would betray every
      honest thing the book has said. Integration names the actual situation: the reader has begun a
      practice, the practice continues, and that beginning is not nothing — it is everything the book
      can honestly give.
    what_comes_next: >
      The book is complete. The practice continues.

sequencing_rules:
  must_come_before:
    - Mechanism (ch02) must come after recognition (ch01) — the gap must be visible before its mechanism can be examined
    - Somatic legitimacy (ch03) must come after mechanism (ch02) — the freeze physiology is more tolerable after the faculty is understood
    - Cost exposure (ch04) must come before hidden belief (ch05) — reader must feel the weight before examining the belief
    - Destabilization (ch06) must come after hidden belief (ch05) — the belief must be named before evidence dismantles it
    - Identity fracture (ch08) must come after relational consequence (ch07) — relational cost makes identity work concrete
    - Reframe (ch10) must come after practical interruption (ch09) — embodied experience before cognitive reframe
    - Self-relation shift (ch11) must come after reframe (ch10) — cognitive ground required for the practical shift
  cannot_come_too_early:
    - Reframe cannot arrive before ch09 — it will register as excuse-making without the full preceding arc
    - Working-with-the-wiring language cannot appear before ch11 — too early and it becomes a platitude
    - Self-relation shift cannot arrive before practical interruption — reader needs embodied experience first
  saved_for_late_book:
    - Integration is always last
    - Self-relation shift is always second-to-last
    - Reframe and practical interruption must be late-middle (ch09-10)

tone_and_pacing:
  intensity_profile: [high, medium, high, medium, high, high, medium, high, medium, medium, medium, low]
  trust_curve: >
    This family requires careful, de-stigmatizing trust-building. The reader arrives already
    convinced the problem is moral, so the shame response will activate early and often. Trust is
    built through precision — when the reader encounters a description of the initiation gap that is
    more accurate than anything they've privately concluded, they trust. Trust is never built through
    reassurance and never through "try harder" framing. It is built through correct, non-pathologizing
    naming. The intensity front-loads in recognition, mechanism, and somatic legitimacy before
    dropping slightly for the cost chapter, then returning for destabilization. The back half is less
    intense but more demanding in a different register.
  action_timing: >
    First practice arrives at chapter 9. Before that, only recognition and examination. Premature
    technique would be heard as one more system to fail at and would confirm the shame driving the problem.
  mechanism_timing: >
    Mechanism arrives at ch02, immediately after recognition. This family needs to understand that
    initiation is a separate faculty with its own fuel before any somatic or cost work, because the
    cognitive frame makes the subsequent embodied work far less activating and shame-laden.
  permission_timing: >
    Permission to externalize the start rather than summon willpower arrives at ch09. Permission to
    relate to one's own brain as a differently regulated system arrives at ch11. Both must be earned
    through the preceding work.

