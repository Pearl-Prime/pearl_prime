family_id: compassion_fatigue
family_name: "Compassion Fatigue / Depletion"
adjacent_topics: [grief, caregiver_support, workplace_stress]
primary_mechanism: overwhelm
allowed_engines: [overwhelm, watcher, grief]

reader_starting_state: >
  The reader is in a caring role — professional caregiver, parent, the person in
  their family or friend group that everyone leans on. They used to care with genuine
  presence and find meaning in it. Now they care with numbness. They go through
  the motions of caring while feeling nothing, or feeling only a distant performance
  of what caring used to feel like. They feel guilty about the numbness. They have
  been told to take better care of themselves, to rest, to set boundaries — and
  this advice has felt hollow or impossible. They believe the problem is that they
  haven't rested enough. They are confused about who they are when they're not caring.

reader_ending_state: >
  The reader understands that what happened to them is not a rest deficit or a
  failure of discipline — it is a specific collapse in the relationship between
  their caring capacity and the demands placed on it. They have named the depletion
  without guilt. They have begun to practice receiving — not just ceasing to give,
  but actively learning to be on the receiving end of care. They have grieved the
  version of themselves that cared with ease. They have found a more sustainable
  relationship with their caring capacity — one that treats their capacity as a real
  resource with limits, not an inexhaustible feature of who they are.

what_makes_this_family_different: >
  Unlike depletion that comes from overwork or output, compassion fatigue is
  specifically the depletion of the capacity to care — to feel with, not just for,
  another person. The reader has often given more deeply and more consistently than
  almost anyone around them. The book must meet them with the same quality of care
  they extend to others. It cannot be a book that tells them to care less or protect
  themselves more — that framing will feel like a betrayal of their identity. Instead,
  it must make the case that caring from depletion is not caring at all — it is a
  performance of caring that costs everything and delivers increasingly little.
  The book must model the posture it recommends: receive the reader the way the
  reader has never been received.

chapters:
  chapter_01:
    number: 1
    role: recognition
    working_title: "When the Caring Stopped Landing"
    thesis: >
      Compassion fatigue is not caring less. It is caring the same amount — or more —
      while the caring stops reaching. The person in a depleted caring role does not
      become cold. They become numb, distant, performative. And they usually don't
      know this is happening until the numbness is advanced.
    emotional_job: >
      Give the reader the relief of being named precisely. Not "you're exhausted" —
      that's too generic. The specific experience: showing up, going through the
      motions, feeling nothing on the inside while looking functional on the outside.
      The reader should feel seen in a way they have not been seen before.
    practical_job: >
      Define compassion fatigue precisely: the collapse of caring presence, not
      caring action. Distinguish it from tiredness, from disliking the work, from
      resentment. Show the reader the specific shape of the pattern: the glass wall,
      the performance, the growing absence of the person who used to care with full
      presence.
    what_changes: >
      Before: "I'm tired. I just need a break. Maybe I'm not cut out for this."
      After: "This has a name. It is not a character flaw. It is a specific thing that happens to people who care."
    required_sections: [HOOK, SCENE, RECOGNITION_INVENTORY]
    forbidden_moves:
      - Using the word "burnout" (conflates with output depletion, not caring depletion)
      - Suggesting rest is the answer at this stage
      - Implying the reader chose or caused this
      - Introducing any solution or reframe in chapter 1
    recommended_enrichments:
      - A scene from inside the glass wall: caring from behind distance
      - A short inventory: specific behaviors of compassion fatigue, not tiredness
      - The distinction between "I don't care" (resentment) and "I can't reach the caring" (depletion)
    claim_someone_could_argue: >
      Some would argue that numbness in caring roles is a natural protective
      mechanism that healthy caregivers develop — a form of professional detachment
      that preserves function.
    why_this_chapter_exists: >
      Without precise recognition, the reader will apply the wrong remedies —
      rest, boundaries, attitude shifts — to a structural problem. Recognition is
      the prerequisite for everything that follows.
    what_comes_next: >
      The reader can name what they're experiencing. Now they need to know what
      it actually feels like in the body — because the body has been tracking this
      long before the mind acknowledged it.

  chapter_02:
    number: 2
    role: somatic_legitimacy
    working_title: "The Body Keeps the Caring Score"
    thesis: >
      The depleted caregiver's body knows what is happening long before the mind
      admits it. The specific physical signatures of caring depletion — the flatness,
      the heaviness, the dulling of sensation — are not weakness. They are the
      nervous system's attempt to protect what is left.
    emotional_job: >
      Legitimate the body's experience without making the reader feel broken or
      medicalized. The physical symptoms of compassion fatigue should be named as
      intelligent responses, not pathologies. The reader should feel less alone in
      what their body has been doing.
    practical_job: >
      Map the somatic signature of compassion fatigue: the specific qualities of
      depletion in a caring body as distinct from ordinary tiredness. Introduce the
      concept of the watcher engine in physical terms: the body's protective distance,
      the glass wall, the numbing. Explain why the body creates this distance —
      it's not failure, it's protection.
    what_changes: >
      Before: "I feel flat and heavy and I don't know why."
      After: "My body created distance to protect what was left. That's not a symptom — that's intelligence."
    required_sections: [SOMATIC_MAP, SCENE, PROTECTIVE_LOGIC]
    forbidden_moves:
      - Medicalizing the reader's symptoms
      - Suggesting somatic symptoms are a choice or a habit
      - Implying awareness of the body will fix the depletion
      - Introducing any intervention at this stage
    recommended_enrichments:
      - A physical description of the caring body before and during depletion
      - Why the watcher distance serves a real function
      - The difference between the body's depletion signal and depression
    claim_someone_could_argue: >
      Some would argue that emotional numbness in professional caregivers is a
      clinical symptom requiring medical treatment, not a book to read.
    why_this_chapter_exists: >
      The reader has been dismissing their body's signals as weakness or laziness.
      Legitimizing those signals in physical terms is the foundation for everything
      that comes after — especially the grief chapters.
    what_comes_next: >
      The body's signals make more sense when we understand the specific mechanism
      underneath them — the watcher pattern that the caring self develops to survive.

  chapter_03:
    number: 3
    role: mechanism
    working_title: "Caring From Behind Glass"
    thesis: >
      The watcher pattern is the mechanism at the center of compassion fatigue:
      the caring self learns to observe the person being cared for from a slight
      distance — enough to continue functioning, not enough to be fully present.
      This is not a moral failure. It is a structural adaptation that begins as
      protection and becomes a prison.
    emotional_job: >
      Make the specific experience of the watcher position recognizable without
      shaming it. The reader should understand that the glass wall was not chosen —
      it appeared as a survival response, and has now become the default mode.
    practical_job: >
      Name and describe the watcher mechanism in detail. Explain the structural
      logic: caring presence costs more than caring action, and when the capacity
      for presence is depleted, the watcher develops as a substitute. Show how
      the watcher pattern maintains the appearance of caring while costing the
      quality that matters most.
    what_changes: >
      Before: "I'm going through the motions but I don't know why I can't feel anything anymore."
      After: "My caring self stepped back to protect itself. That's the watcher. I understand what it's doing."
    required_sections: [MECHANISM_DESCRIPTION, SCENE, STRUCTURAL_LOGIC]
    forbidden_moves:
      - Presenting the watcher as a conscious choice or a bad habit
      - Introducing any fix or alternative to the watcher at this stage
      - Framing the watcher as permanent
      - Conflating the watcher pattern with depression or dissociation (though they can overlap)
    recommended_enrichments:
      - A scene of the reader caring through the watcher: accurate action, absent presence
      - The moment when the watcher first appeared and why
      - What the person being cared for experiences when they're with the watcher
    claim_someone_could_argue: >
      Some would argue that emotional distance is a professional skill in caring
      roles — that the best caregivers maintain appropriate detachment rather than
      full emotional presence.
    why_this_chapter_exists: >
      Without naming the mechanism, the reader has no way to understand what they're
      experiencing or what would actually address it. The watcher pattern is the
      structural heart of this book.
    what_comes_next: >
      The watcher developed in response to a demand — and underneath that demand
      is a belief that caregivers are trained to hold. That belief must be named.

  chapter_04:
    number: 4
    role: hidden_belief
    working_title: "I Should Be Able to Handle This"
    thesis: >
      Beneath the compassion fatigue is a belief that was deliberately installed:
      that a real caregiver does not run out. That needing to stop, to receive,
      to be cared for, is a sign of inadequacy. This belief is not natural —
      it was taught, reinforced, and rewarded. It is also the reason the depletion
      went unacknowledged for so long.
    emotional_job: >
      Give the reader permission to be angry — not at themselves, but at the
      system of beliefs they were trained in. This chapter should feel like the
      moment of seeing clearly what was done to them, not what they did to themselves.
    practical_job: >
      Name the belief: "A good caregiver handles whatever comes. A good caregiver
      doesn't run out. A good caregiver doesn't need to be cared for." Show where
      these beliefs come from — professional training, family systems, cultural
      expectations of caring roles. Show how these beliefs actively suppressed
      the early warning signals of depletion.
    what_changes: >
      Before: "I should be stronger. I should be able to handle this."
      After: "I was trained to believe that caring capacity is infinite. That belief was always wrong."
    required_sections: [BELIEF_ARCHAEOLOGY, SCENE, ORIGIN_STORY]
    forbidden_moves:
      - Asking the reader to simply "let go" of this belief
      - Blaming any specific institution or profession without nuance
      - Suggesting the belief was a personal weakness for holding it
      - Introducing alternatives before the belief is fully exposed
    recommended_enrichments:
      - Where this specific belief came from in the reader's life and training
      - The reward structure that reinforced it (praise for not stopping, respect for enduring)
      - What the reader lost by holding this belief: the early warning signals
    claim_someone_could_argue: >
      Some would argue that the expectation of resilience in caregivers is realistic
      and appropriate — that certain roles genuinely require sustained capacity
      and that acknowledging limits is a luxury many caregivers cannot afford.
    why_this_chapter_exists: >
      The reader cannot receive care for themselves as long as receiving care is
      coded as failure. The belief must be named and its origins exposed before
      any receiving practice can take hold.
    what_comes_next: >
      The belief has been suppressing not just behavior but awareness of cost.
      Now that the belief is named, the cost can be honestly accounted for.

  chapter_05:
    number: 5
    role: cost_exposure
    working_title: "What the Depletion Has Cost"
    thesis: >
      The cost of caring from the watcher position is not abstract. It costs the
      quality of the care delivered, the relationship with the person being cared
      for, the reader's own health and presence — and it costs the people who
      are trying to care for the reader, who cannot reach them either.
    emotional_job: >
      Land the cost without crushing the reader. This chapter must be honest
      without being punitive. The reader should feel the weight of what has been
      lost — and also understand that they did not choose this. The cost was
      accumulated, not inflicted.
    practical_job: >
      Map the specific costs of caring from depletion: reduced quality of presence
      (not just action), the way that watcher-mode caring lands differently on
      the person receiving it, the effect on the reader's body over time, the
      growing distance from their own life. Include the relational cost: people
      who love the reader and cannot get through the glass.
    what_changes: >
      Before: "At least I'm still showing up. At least I'm still doing it."
      After: "Showing up isn't the same as being present. And the cost of only showing up is real."
    required_sections: [COST_MAP, SCENE, HONEST_RECKONING]
    forbidden_moves:
      - Using cost exposure to motivate the reader to "do better"
      - Implying the reader failed those they cared for
      - Making the cost feel permanent or irreversible
      - Moving to solutions immediately after the cost lands
    recommended_enrichments:
      - A scene of someone receiving watcher-mode care and what they felt
      - The cost to the reader's own body over months or years
      - The closing of the gap between caring and being cared for in the reader's life
    claim_someone_could_argue: >
      Some would argue that imperfect presence is better than absence — that a
      depleted caregiver still provides more value than no caregiver at all.
    why_this_chapter_exists: >
      The reader needs to understand that what they're losing is not just their
      own wellbeing but the quality of what they're giving. This makes the case
      for change on grounds the reader can accept: not "you matter" (which they
      may not believe) but "what you give matters, and depletion affects it."
    what_comes_next: >
      The cost has been named. But what has been lost is not just function —
      something more has been lost. The caring self that used to exist. That
      deserves to be grieved.

  chapter_06:
    number: 6
    role: grief
    working_title: "Mourning the Caregiver You Were"
    thesis: >
      There was a version of this reader who cared with ease, with presence,
      with something that felt like genuine connection rather than performance.
      That version of them may not exist right now. And that loss — the loss
      of the caring self that felt things — is real and deserves grief, not
      guilt.
    emotional_job: >
      Give the reader permission to grieve a loss they have not been allowed
      to name. This chapter should feel like being handed back something that
      was taken: the right to mourn, the right to feel the weight of what has
      changed, without being told they are the problem.
    practical_job: >
      Name the specific loss: the caring self that was present, that felt things,
      that found meaning in the work. Distinguish grief (appropriate, legitimate,
      relational) from guilt (self-directed, punitive, not useful here). Show
      what it means to grieve a version of yourself — not as giving up on recovery
      but as honest accounting of what happened.
    what_changes: >
      Before: "I feel guilty that I'm not the same person I was."
      After: "I lost something real. That deserves grief, not guilt."
    required_sections: [NAMING_THE_LOSS, GRIEF_PERMISSION, DISTINCTION_FROM_GUILT]
    forbidden_moves:
      - Rushing past the grief to solutions or recovery
      - Suggesting grief has a timeline or a proper conclusion
      - Using grief as a motivational tool
      - Implying that grieving the past self means accepting permanent depletion
    recommended_enrichments:
      - A description of the earlier caring self: specific and particular, not idealized
      - The moment the reader noticed something had changed
      - The difference between mourning a past self and abandoning the future self
    claim_someone_could_argue: >
      Some would argue that mourning a previous version of yourself is self-indulgent
      when others still need to be cared for — that grief is a luxury in active
      caring roles.
    why_this_chapter_exists: >
      The reader cannot move toward a rebuilt caring self if they haven't
      acknowledged what was lost. Skipping grief produces either denial or a
      thin recovery that doesn't hold. This chapter is the emotional core of
      the book.
    what_comes_next: >
      Once the reader has grieved, they can look clearly at what they've been
      trying to fix — and confront why rest alone has not been enough.

  chapter_07:
    number: 7
    role: destabilization
    working_title: "Why Rest Hasn't Fixed It"
    thesis: >
      Rest repairs output depletion. It does not repair caring capacity.
      A caregiver who stops caring for two weeks and then returns to the same
      role with the same structure returns to the same depletion. What is
      required is not a break — it is a different relationship with the act
      of caring itself.
    emotional_job: >
      Validate that the rest advice was not wrong because the reader failed to
      do it right — it was wrong because it diagnosed the wrong problem. The
      reader should feel vindicated, not more defeated.
    practical_job: >
      Make the structural argument clearly: rest repairs output capacity, not
      caring presence. The watcher mechanism does not dissolve with vacation.
      Show what is actually required: the practice of receiving, a restructured
      relationship with caring capacity, and the belief revision from chapter 4.
      This is not harder than rest — it is different.
    what_changes: >
      Before: "I took time off and I still felt the same. Maybe I'm broken."
      After: "Rest addresses a different problem than the one I have. That's why it didn't work."
    required_sections: [DIAGNOSIS_CORRECTION, EVIDENCE_FROM_READER, WHAT_IS_ACTUALLY_REQUIRED]
    forbidden_moves:
      - Making rest sound useless (it has value, just not as a cure)
      - Implying the reader didn't rest enough or correctly
      - Introducing the full solution here — only point toward what's needed
      - Making this chapter feel hopeless
    recommended_enrichments:
      - The reader's experience of returning from rest and finding the watcher still in place
      - What rest actually repairs versus what it doesn't touch
      - The structural difference between output depletion and caring capacity depletion
    claim_someone_could_argue: >
      Some would argue that extended rest — months, not weeks — can repair
      compassion fatigue if the caregiver truly steps away from the role entirely.
    why_this_chapter_exists: >
      The reader has tried the obvious remedies. Without understanding why they
      haven't worked, they will either try harder at ineffective solutions or
      conclude that recovery is impossible. This chapter clears the way.
    what_comes_next: >
      If the problem is a collapsed relationship with caring, then we need to
      look at who the reader is outside of that role.

  chapter_08:
    number: 8
    role: identity_fracture
    working_title: "Who Are You When You're Not Caring?"
    thesis: >
      For many caregivers, the caring role is not just a function — it is the
      primary identity. When that identity is taken away, even temporarily,
      there is no self left that knows what it wants, what it needs, or what
      it feels. The identity question is not a luxury; it is the center of the
      problem.
    emotional_job: >
      Meet the reader in the specific discomfort of not knowing who they are
      outside the role. This is not a crisis of confidence — it is a structural
      absence. The reader should feel that this emptiness is normal and named,
      not evidence that they are shallow or wrong.
    practical_job: >
      Name the caring-as-identity pattern: how it formed, why it's common in
      people drawn to caring roles, and what it costs when the role is no longer
      available or sustainable. Begin to open space for a self that exists prior
      to and independently of the caring function.
    what_changes: >
      Before: "I don't know who I am when I'm not helping people."
      After: "There's a self underneath the role. I haven't met them in a long time. That's where I need to go."
    required_sections: [IDENTITY_ARCHAEOLOGY, SCENE, OPENING_SPACE]
    forbidden_moves:
      - Suggesting the reader "just needs hobbies"
      - Implying the caring identity was unhealthy or wrong to hold
      - Making this chapter feel like a personality critique
      - Rushing toward the answer to who they are outside the role
    recommended_enrichments:
      - The moment the reader realized the role had become the whole self
      - What is present in the reader when they are not caring for someone
      - The specific discomfort of receiving attention or care as a caring person
    claim_someone_could_argue: >
      Some would argue that having a purpose-driven identity — including caring
      as a core identity — is psychologically healthy and shouldn't be questioned.
    why_this_chapter_exists: >
      The reader cannot receive care if there is no self available to receive it.
      The identity chapter makes the practical chapter (receiving) structurally possible.
    what_comes_next: >
      There is a self beneath the role. And that self needs to learn something
      specific: how to receive. Not rest. Receive.

  chapter_09:
    number: 9
    role: practical_interruption
    working_title: "One Act of Receiving"
    thesis: >
      Receiving is a skill that depleted caregivers have systematically unpracticed.
      It is not passivity and it is not asking for help. It is the specific,
      somatic act of allowing care to arrive — to let it land in the body rather
      than redirect it or minimize it. It can be practiced in small, specific moments.
    emotional_job: >
      Make receiving feel accessible rather than overwhelming. The reader has likely
      spent years minimizing care directed at them. A small, specific practice of
      receiving should feel doable — even slightly uncomfortable in a productive way.
    practical_job: >
      Introduce one concrete receiving practice: specific, small, and somatic. Not
      "accept care from others" as a principle, but an actual discrete act — a moment
      in which care is offered and the reader practices not deflecting it, letting it
      land. Walk through exactly what this looks like and feels like in the body.
    what_changes: >
      Before: "I'm the one who takes care of things. I don't really need anyone to take care of me."
      After: "I tried receiving, even just once. It felt strange. That's the work."
    required_sections: [RECEIVING_CONCEPT, PRACTICAL_INSTRUCTION, SOMATIC_GUIDE]
    forbidden_moves:
      - Suggesting receiving is easy or natural for depleted caregivers
      - Framing this as "asking for help" (different skill, different obstacle)
      - Making receiving feel like a performance or a transaction
      - Introducing too many practices at once
    recommended_enrichments:
      - What deflection looks like in a caregiver: minimizing, redirecting, joking off
      - The specific somatic difference between deflecting care and letting it land
      - A very small receiving practice described in physical terms
    claim_someone_could_argue: >
      Some would argue that expecting someone in a caring role to focus on being
      cared for is self-indulgent — especially when others remain dependent on them.
    why_this_chapter_exists: >
      Receiving is the structural opposite of the watcher's protective distance.
      It is the first concrete move toward a rebuilt caring capacity — not rest,
      but actual contact. Without a practice here, the book ends in theory.
    what_comes_next: >
      Having introduced receiving, the book must now look honestly at what the
      watcher's presence has meant for those on the receiving end of the reader's care.

  chapter_10:
    number: 10
    role: relational_consequence
    working_title: "What the People You Care For Have Been Receiving"
    thesis: >
      The watcher's caring is not neutral. The people being cared for by someone
      in the watcher position feel the absence of presence — even when action is
      perfectly executed. This is not the reader's fault, but it is a real effect,
      and naming it honestly is part of the path back.
    emotional_job: >
      Hold the reader through a difficult truth without breaking them. This chapter
      must be honest without being punitive — the reader needs to understand the
      relational effect of watcher-mode caring without concluding they have failed
      everyone around them.
    practical_job: >
      Name what the people being cared for have actually been receiving: competent
      action without genuine contact. Describe what this experience is like for them:
      the strange sensation of being technically cared for but not quite reached.
      Connect this to the quality distinction introduced in chapter 5 and make it
      concrete in relational terms.
    what_changes: >
      Before: "At least I've been doing the things that needed to be done."
      After: "The people I care for have been getting my presence and my absence at the same time. That matters."
    required_sections: [RELATIONAL_TRUTH, SCENE_FROM_OTHER_SIDE, HONEST_ACCOUNTING]
    forbidden_moves:
      - Using this chapter to create guilt that motivates change (shame-based motivation)
      - Implying the relationships are damaged beyond repair
      - Presenting the people being cared for as victims of the reader
      - Staying with the hard truth so long that the reader cannot recover
    recommended_enrichments:
      - A scene written from the perspective of someone receiving watcher-mode care
      - The specific relational experience of competent care without presence
      - How the relationships can absorb and process this with honesty
    claim_someone_could_argue: >
      Some would argue that for people with limited choices — single parents,
      sole caregivers — acknowledging this relational cost is demoralizing and
      unhelpful, since they cannot step back regardless.
    why_this_chapter_exists: >
      The reader needs a complete picture of what is at stake — including for
      the people they care about. But this must arrive after the reader has the
      grief work and the receiving practice, so it lands as information, not
      condemnation.
    what_comes_next: >
      With the full picture visible, the reader is ready to look at what a
      different relationship with caring actually looks like — not less caring,
      but caring from a place that can sustain it.

  chapter_11:
    number: 11
    role: self_relation_shift
    working_title: "Caring for the Caring"
    thesis: >
      Sustainable caring requires that the caregiver extend to themselves the same
      quality of attention they give to others. Not self-care as a set of activities —
      but the actual posture of caring: noticing, responding, adjusting, and treating
      one's own capacity as a real and finite resource worthy of attention.
    emotional_job: >
      Make this feel like a genuine possibility rather than an instruction or a
      performance. The reader should feel something soften — not because they've
      been told to be gentler with themselves, but because they've arrived at this
      place through their own experience of the book.
    practical_job: >
      Describe what it means to care for one's own caring capacity: specifically,
      in practice, in the body. Not "check in with yourself" but the actual moves —
      noticing the watcher before it becomes the default, responding to early depletion
      signals, adjusting load in real conditions. Show what this looks like in a
      week, not an ideal.
    what_changes: >
      Before: "I know I need to take care of myself but I don't really know what that means."
      After: "I know how to notice my capacity and respond to it. Not perfectly. Consistently."
    required_sections: [POSTURE_DESCRIPTION, PRACTICAL_MOVES, REALISTIC_PICTURE]
    forbidden_moves:
      - Using the phrase "self-care" (globally prohibited and especially here)
      - Making this chapter sound like a wellness prescription
      - Suggesting the reader needs to stop caring for others in order to care for themselves
      - Offering a checklist or a program
    recommended_enrichments:
      - What "noticing your own capacity" actually looks like as a behavior
      - The specific early signals of watcher-mode onset that the reader can learn to catch
      - What adjusting in real conditions looks like when full rest isn't available
    claim_someone_could_argue: >
      Some would argue that asking caregivers to attend to their own capacity is
      simply impossible in roles with genuine and continuous demands — that this
      advice is only accessible to people with structural advantages.
    why_this_chapter_exists: >
      The book has named the problem and opened the grief and introduced receiving.
      Without a concrete description of what ongoing attention to one's caring
      capacity looks like, the reader finishes with insight but no architecture.
    what_comes_next: >
      The reader knows what caring for their caring capacity looks like. The final
      chapter asks: who is the caregiver who can do this?

  chapter_12:
    number: 12
    role: integration
    working_title: "The Caring Self, Rebuilt"
    thesis: >
      The caregiver who finishes this book is not the same caregiver who started it —
      not because they've been fixed, but because they've seen clearly what happened
      and made a different choice about how to hold their capacity. The rebuilt
      caring self is not the original one. It is something more honest.
    emotional_job: >
      Give the reader a resting place that honors the difficulty of what they've
      been through. This ending should feel earned, sober, and real — not
      inspirational. The reader should feel accompanied, not applauded.
    practical_job: >
      Integrate the full arc: the watcher, the belief, the grief, the receiving,
      the relational truth, the self-relation shift. Name the specific quality
      of caring from capacity versus caring from depletion. Give the reader a
      concrete image of what a week looks like when the caring self is tended to.
    what_changes: >
      Before: "I'm going through the motions. I'm not really here."
      After: "I know what caring from presence feels like. I know how to notice when I'm losing it. That's enough."
    required_sections: [INTEGRATION_SCENE, HONEST_ENDING, FORWARD_FRAME]
    forbidden_moves:
      - Promising that the watcher will never return
      - Using the word "thrive" or "flourish"
      - Making the ending feel like a graduation or a cure
      - Implying the reader is now complete or fully healed
    recommended_enrichments:
      - A scene of the reader caring from presence, specifically different from chapter 1's scene
      - What the reader carries forward: named in concrete terms
      - The difference between the caring self as rebuilt and the caring self as fixed
    claim_someone_could_argue: >
      Some would argue that "rebuilding the caring self" is too vague an endpoint —
      that the reader needs specific metrics or milestones to know they've arrived.
    why_this_chapter_exists: >
      The reader began in depletion and numbness. They deserve an ending that is
      honest about impermanence but genuinely different in quality. This chapter
      closes the arc.
    what_comes_next: >
      There is no next. This is the close.

sequencing_rules:
  must_come_before:
    - somatic_legitimacy must precede mechanism (body first, then pattern)
    - mechanism must precede hidden_belief (watcher must be named before its belief is excavated)
    - grief must precede destabilization (mourn before reorienting)
    - identity_fracture must precede practical_interruption (receiving requires a self to receive)
    - relational_consequence must come after practical_interruption (truth after tool)
  cannot_come_too_early:
    - grief cannot appear before cost_exposure (chapter 5 before chapter 6)
    - practical_interruption cannot appear before chapter 8
    - relational_consequence cannot appear before chapter 9
  saved_for_late_book:
    - integration must be the final chapter
    - self_relation_shift must come after relational_consequence
    - identity_fracture must come after grief

tone_and_pacing:
  intensity_profile: [medium, medium, high, high, high, high, high, medium, medium, high, medium, low]
  trust_curve: >
    This reader is often the most skeptical of care directed at themselves.
    Trust is earned by precision: naming their experience so accurately in chapters 1-3
    that they stop waiting to be misunderstood. Chapters 4-6 use that trust for
    difficult material: the belief, the cost, the grief. This is the emotional center.
    Chapters 7-9 turn toward what's required without minimizing the difficulty.
    Chapters 10-12 work from established trust on the hardest relational truths.
    The whole book must model the posture it recommends: receive the reader with care.
  action_timing: >
    No practical instruction before chapter 9. The structural understanding,
    the belief excavation, and the grief work must all precede any receiving practice.
    Premature instruction will be experienced as the hollow advice the reader has
    already received too much of.
  mechanism_timing: >
    The watcher mechanism is introduced in chapter 3 and referenced throughout.
    It is the structural spine. The reader must be able to name it — "the watcher is
    running right now" — as a live description at any point in the book.
  permission_timing: >
    Permission to grieve comes in chapter 6, after the cost is visible. Permission
    to receive comes in chapter 9, after the identity work. Permission to have a
    sustainable relationship with caring comes in chapter 11, after the relational
    truth. Permissions must be earned by the preceding chapters or they will feel
    manipulative.

prohibited_terms:
  global: [journey, transform, heal, self-care, wellness, mindfulness, empower,
           empowering, overcome, conquer, battle, fight, warrior, survivor, thrive,
           manifest, authentic self, best self, inner child, trigger warning,
           safe space, toxic, self-love, you've got this, be gentle with yourself]
  family_specific: [burnout, caregiver fatigue, emotional labor, set boundaries,
                    compassion satisfaction, recharge, fill your cup, put on your
                    own oxygen mask, just rest, take a break, establish limits,
                    learn to say no, prioritize yourself]
