family_id: depression
family_name: "Depression / Collapsed Energy and Distance from Aliveness"
adjacent_topics: [grief, burnout, numbness, anhedonia]
primary_mechanism: watcher
allowed_engines: [watcher, grief, overwhelm]

reader_starting_state: >
  Reader goes through the motions. Life happens at a distance — they can
  see themselves doing things, can narrate the events of their day, but the
  doing and the living feel disconnected. They remember caring about things.
  They cannot access caring now. They are functioning, or barely functioning.
  They have tried forcing themselves — starting small, pushing through,
  making lists, telling themselves to snap out of it — and the forcing has
  not worked, and the failure to respond to forcing feels like evidence of
  something deeply wrong. They are ashamed of the distance but cannot close
  it by deciding to. They are reading this book from behind the same glass
  through which they experience everything else.

reader_ending_state: >
  Reader understands the distance as the body's protective response to
  too-much-ness — not a character failure, not laziness, not evidence of
  permanent damage. They have found tiny points of contact with aliveness:
  not motivation, not meaning, just flickers of sensation that confirm the
  capacity is still there. They have stopped fighting the numbness — not
  because they have made peace with it, but because they have discovered
  that fighting it costs energy the system does not have. They have a
  different relationship with their own capacity: they work with what is
  actually there rather than commanding more. They know aliveness returns
  in flickers, not floods, and they know what to do with a flicker when
  it arrives.

what_makes_this_family_different: >
  This family must never feel like a pep talk. Not once. The activation
  asks must be microscopic — not "start with something small" as
  encouragement, but genuinely tiny as a structural requirement. The reader
  experiencing collapsed energy cannot "just start." Their capacity is
  genuinely reduced, and the book must take that seriously as a physical
  reality, not a motivational problem to be solved with the right framing.
  Meaning-making cannot come before any experience of aliveness has
  returned — to offer meaning while the reader is fully numb is to offer
  food to someone who cannot taste. The numbness must be legitimized as
  intelligent — as the body doing something sensible given what it has been
  through — before any alternative is offered. The watcher mechanism (observing
  your life rather than living it, the sense of being behind glass) is the
  central image of this family and must be named precisely and early.

chapters:
  chapter_01:
    number: 1
    role: recognition
    working_title: "Behind Glass"
    thesis: >
      There is a specific quality to the kind of distance you are
      experiencing — it is not sadness, exactly, and it is not emptiness,
      exactly. It is more like watching your life through glass. You are
      present for the events of your day, but you are not quite in them.
      You can see yourself doing things. You are not sure you are actually
      doing them.
    emotional_job: >
      Give the reader the relief of precise naming. The "behind glass"
      experience is often difficult to describe — people with it frequently
      say "I don't know how to explain it." When the book names it exactly,
      the reader feels seen. That is the only emotional job of this chapter:
      accurate recognition.
    practical_job: >
      Establish the specific phenomenology of the distance — not the
      diagnostic criteria, not the causes, just the lived texture of it.
      The narration-without-feeling, the gap between event and response,
      the sense that caring should be there but isn't, the way other people
      seem to inhabit their lives more fully.
    what_changes: >
      Before: "I don't know what's wrong with me. I feel nothing and I
      can't explain it."
      After: "There's a word for this specific quality of distance. Someone
      else has felt it carefully enough to describe it. I am not alone in
      this particular experience."
    required_sections: [HOOK, PHENOMENOLOGY, RECOGNITION_PAUSE]
    forbidden_moves:
      - Any diagnostic language or clinical framing
      - Offering causes or explanations in this chapter
      - Implying the reader should feel more than they do
      - Suggesting that naming it is the beginning of fixing it
      - Creating urgency to change
    recommended_enrichments:
      - The specific quality of the watcher state: narrating your own life, observing yourself from a slight distance, the flatness that isn't quite sadness
      - The way the distance applies even to things that used to reliably produce feeling
      - The reader's suspicion that something is wrong — and that the suspicion itself is somewhat muffled
    claim_someone_could_argue: >
      "Everyone feels disconnected sometimes. You're not special for
      feeling a little numb. The fact that you're analyzing it this much
      suggests you're overthinking rather than actually experiencing
      something unusual."
    why_this_chapter_exists: >
      Recognition is the entry point. Without it, the reader has no
      reason to believe the book understands their specific experience.
      This is a family where the reader's experience is frequently
      dismissed or misnamed — too many books have told them to "cheer up"
      or "focus on what you're grateful for." Precise naming without
      judgment earns the trust to continue.
    what_comes_next: >
      Why this is not laziness — what the body is actually doing and why.

  chapter_02:
    number: 2
    role: somatic_legitimacy
    working_title: "This Is Not Laziness"
    thesis: >
      The body conserves energy when it has been asked to handle more than
      it can. The reduced capacity, the difficulty starting, the heaviness
      — these are not evidence of weakness or laziness. They are the body
      doing something sensible: rationing what it has left. The problem is
      not that you are failing to try hard enough. The problem is that the
      system is genuinely depleted, and you have been treating depletion
      as a motivational problem.
    emotional_job: >
      Provide genuine relief from the shame of collapse. The reader has
      been calling themselves lazy, broken, difficult, dramatic. This
      chapter offers a different account of what is happening — not
      reassuring, but accurate. The relief here is not warm; it is the
      specific relief of having the mechanism explained in a way that
      fits the experience.
    practical_job: >
      Explain the energy conservation mechanism: when the system is
      overwhelmed, it reduces output across all domains. The reduced
      motivation, the difficulty with tasks that used to be easy, the
      way small things feel enormous — these are downstream of a system
      running on less than it needs, not evidence of character failure.
    what_changes: >
      Before: "I should be able to do this. I can't, so there's something
      wrong with me."
      After: "The system is conserving. That is different from being broken,
      and it requires a different response than pushing harder."
    required_sections: [MECHANISM_EXPLANATION, SHAME_COUNTER, CONSERVATION_LOGIC]
    forbidden_moves:
      - Using any clinical or diagnostic language
      - Implying the conservation is a problem to solve immediately
      - Offering any "just try this small thing" encouragement — that is ch08
      - Framing this as the beginning of recovery
      - Suggesting that understanding the mechanism will make it easier to act
    recommended_enrichments:
      - The specific ways the reader has been blaming themselves for the conserved state
      - The paradox of the pushing approach: forcing output from a depleted system costs more than it produces, which deepens the depletion
      - Brief acknowledgment: understanding this does not immediately change how you feel. It changes how you interpret what you feel.
    claim_someone_could_argue: >
      "If the body is 'conserving,' you still need to function. Bills
      still need to be paid. Children still need to be cared for. You
      can't just accept that you're depleted and stop trying."
    why_this_chapter_exists: >
      Without somatic legitimacy, every practical suggestion is experienced
      as another demand on a system that cannot meet demands. The reader
      needs to understand what is actually happening before they can engage
      with anything that asks them to do something differently.
    what_comes_next: >
      What the distance has cost you — the specific things you used to
      care about that you cannot access now.

  chapter_03:
    number: 3
    role: cost_exposure
    working_title: "What You Used to Care About"
    thesis: >
      The distance has costs. Not the costs other people can see — the
      reduced productivity, the canceled plans, the things left undone.
      The more significant cost is what you have lost access to: the
      things you used to care about, the quality of presence you used to
      bring to your life, the texture of experience that made things feel
      worth doing. This chapter names those losses specifically because they
      are frequently minimized, and minimizing them prolongs the distance.
    emotional_job: >
      Give the reader permission to mourn what the distance has cost them
      — not as a step toward fixing it, but as honest recognition of loss.
      The tone is not mournful or dramatic; it is sober and specific.
    practical_job: >
      Inventory the specific costs of the watcher state: the relationship
      with others (present but not arrived), the relationship with activities
      that used to produce satisfaction, the relationship with time (days
      that pass without any particular mark), the loss of a sense of forward
      motion.
    what_changes: >
      Before: "I'm just going through a rough patch. It's fine."
      After: "There are real things I have lost access to. I can name them.
      Naming them is not weakness — it is seeing clearly."
    required_sections: [LOSS_INVENTORY, MINIMIZATION_COUNTER, HONEST_ACCOUNTING]
    forbidden_moves:
      - Using the cost to create urgency for change
      - Implying the reader is responsible for the distance because they didn't act sooner
      - Rushing past the cost to "but here's what you can do"
      - Framing the loss as temporary ("you'll get it back") — you do not know this yet
    recommended_enrichments:
      - The specific texture of doing things you used to love from behind the glass — present for them but not in them
      - The cost to relationships: what the distance looks like to people who care about the reader, and the reader's awareness of this gap
      - The loss of the sense that anything is worth starting — not because nothing is worth doing, but because the anticipation-system is offline
    claim_someone_could_argue: >
      "You're dwelling on what you've lost instead of focusing on what
      you still have. Gratitude is the antidote to this — you're choosing
      to be miserable by focusing on absence."
    why_this_chapter_exists: >
      Cost-exposure in this family is different from other families. It
      is not motivational — the reader cannot be motivated out of collapsed
      energy. It is relational: the reader needs to be in honest contact
      with what the distance has cost them before the grief chapter (ch06)
      can do its work.
    what_comes_next: >
      The specific mechanism of the watcher state — what is actually
      happening when you observe your life rather than live it.

  chapter_04:
    number: 4
    role: mechanism
    working_title: "The Watcher"
    thesis: >
      The state of observing your life from a distance rather than living
      it — being the watcher rather than the participant — is a protective
      mechanism, not a personality trait. When the system is overwhelmed,
      the protective distance reduces the impact of experience on a system
      that cannot process impact right now. The watcher is doing something
      intelligent. The problem is that the watcher's protective distance
      also prevents access to the things that would restore capacity.
    emotional_job: >
      Illuminate the structure of the experience in a way that creates
      understanding without demanding anything. This chapter is cognitive
      and calm. The emotional tone is one of careful examination — not
      urgency, not hope, just the quiet of beginning to understand a thing.
    practical_job: >
      Name the watcher mechanism precisely: the observational distance, the
      narration-quality of experience, the way the watcher state reduces
      suffering (by reducing all affect, including positive affect), the
      way it creates the specific flatness the reader experiences. Name
      also what the watcher state costs: the reduction in access to
      pleasure, connection, interest, and the sense of presence.
    what_changes: >
      Before: "Something is wrong with me and I don't understand what."
      After: "I understand the mechanism. I am not broken — I am at a
      distance from my own experience, and I can see why the system went
      there."
    required_sections: [MECHANISM_EXPLANATION, WATCHER_PORTRAIT, PROTECTIVE_LOGIC]
    forbidden_moves:
      - Clinical or diagnostic framing
      - Implying the reader can simply choose to stop watching and start participating
      - Rushing to what to do about it
      - Treating the watcher state as purely pathological — it is protective AND costly
    recommended_enrichments:
      - 'The specific quality of the watcher''s narration: "I went to the store. I saw a dog. I thought, that''s a nice dog." — the flat third-person quality of it'
      - The paradox: the watcher state protects against overwhelm but also prevents access to whatever would help
      - The self-perpetuating quality: the distance prevents the tiny experiences of aliveness that would gradually restore capacity
    claim_someone_could_argue: >
      "Everyone has days where they feel like they're going through the
      motions. What you're describing is just adult life — the novelty
      wears off and you have to find meaning through discipline, not feeling."
    why_this_chapter_exists: >
      The mechanism chapter is the architecture of the reader's experience.
      Without it, the reader has symptoms without structure. With it, they
      have a map — not of how to fix it, but of what they are dealing with.
      That is a form of relief that does not require anything from the reader.
    what_comes_next: >
      The belief that maintains the distance — the trap of waiting to
      feel better before starting.

  chapter_05:
    number: 5
    role: hidden_belief
    working_title: "Once I Feel Better, I'll Start"
    thesis: >
      Underneath the distance is a quiet belief that most people in the
      watcher state share: once I feel better — once the motivation returns,
      once I can care again, once the glass lifts — then I will be able to
      engage. This belief is not unreasonable. It is also a trap, because
      the things that would gradually restore capacity require small
      engagement before the motivation to engage returns. The waiting
      perpetuates the waiting.
    emotional_job: >
      Name the trap with gentleness rather than accusation. The reader is
      not waiting because they are passive or lazy — they are waiting
      because it is a sensible interpretation of how motivation works.
      This chapter offers a different account without dismissing the logic
      of waiting.
    practical_job: >
      Explain the trap: motivation follows action in small increments, but
      only if the action is genuinely small enough for the current capacity.
      The reader has probably tried "starting with something small" and
      found that what felt small was still too large for the depleted system.
      This chapter addresses that directly — the action must be genuinely
      microscopic, not "small by normal standards."
    what_changes: >
      Before: "When I feel better, I'll be able to do things again."
      After: "The feeling better and the doing are not sequenced the way
      I thought — and the things I'm waiting to be able to do might be
      part of what restores the capacity to feel."
    required_sections: [BELIEF_EXCAVATION, TRAP_EXPLANATION, CAPACITY_CALIBRATION]
    forbidden_moves:
      - Turning this into "just start!" motivation
      - Implying the reader is choosing to wait unnecessarily
      - Offering an action ask in this chapter (that is ch08)
      - Suggesting the trap is easy to exit once named
    recommended_enrichments:
      - The specific failure mode: the reader has tried "starting with something small" and chosen something that felt small but was actually beyond current capacity — and the failure confirmed they weren't ready
      - The difference between motivation-as-prerequisite and capacity-as-constraint — two different problems
      - The temporal distortion in the watcher state: the sense that "when I feel better" is always available in theory and never arrives in practice
    claim_someone_could_argue: >
      "You're describing depression as a self-perpetuating loop and
      implying people can't break it without external intervention. That's
      defeatist. People improve through determination every day."
    why_this_chapter_exists: >
      The waiting-for-readiness belief is the mechanism of stuckness in
      this family. Until it is examined, every invitation to engage will
      be deferred. This chapter surfaces the belief so the reader can
      see it operating, which is a precondition for the tiny-action
      chapter (ch08) to have any effect.
    what_comes_next: >
      Permitted grieving — mourning the aliveness you had before this.

  chapter_06:
    number: 6
    role: grief
    working_title: "Mourning the Aliveness You Had"
    thesis: >
      Something that was present before is absent now. The quality of
      aliveness, the texture of experience, the sense of being fully in
      your life — these things were real, and their absence is a genuine
      loss. You are allowed to mourn that loss. Not as a strategy for
      recovery, not as a step in a process — just because the mourning
      is appropriate and the absence is real.
    emotional_job: >
      Create space for grief without any demand that the reader move
      through it efficiently or toward anything. This chapter has no
      agenda beyond the acknowledgment of loss. The tone is quiet and
      unhurried.
    practical_job: >
      Permit the reader to name specifically what they have lost access
      to — not as a cost inventory (that was ch03) but as genuine grief
      for a before-state that is not currently available. The distinction
      is emotional rather than logical: cost inventory is analytical,
      grief is relational.
    what_changes: >
      Before: "I shouldn't dwell on this. I should focus on getting better."
      After: "The mourning is allowed. I don't have to skip past it to
      get somewhere more productive."
    required_sections: [GRIEF_PERMISSION, BEFORE_PORTRAIT, MOURNING_SPACE]
    forbidden_moves:
      - Suggesting that grief leads to recovery or is "part of the process"
      - Moving toward hope or silver linings in this chapter
      - Treating the grief as something to complete and move past quickly
      - Implying the reader is choosing to grieve rather than act
      - Any version of "this too shall pass"
    recommended_enrichments:
      - The specific quality of grieving aliveness while still alive — the strange grief of being present for the absence of your own presence
      - The aliveness that was: not romanticized, but specific — the capacity to be genuinely interested, to feel anticipation, to be moved by ordinary things
      - The reader's tendency to suppress this grief because it feels self-pitying — and the cost of that suppression
    claim_someone_could_argue: >
      "Spending a chapter on grief is indulgent. If you're grieving your
      past aliveness, you're making things worse by dwelling in it. Grief
      prolongs the state it's mourning."
    why_this_chapter_exists: >
      In the depression family, grief is not a processing step — it is
      recognition of a real loss that has been frequently denied or minimized.
      Skipping the grief chapter means asking the reader to work toward
      restoration without acknowledging what was lost. The grief must be
      allowed before the reader can engage with the possibility of return.
    what_comes_next: >
      What happens when you try to force the distance away — and why that
      makes it worse.

  chapter_07:
    number: 7
    role: destabilization
    working_title: "Forcing It Makes It Worse"
    thesis: >
      The instinct when experiencing reduced capacity is to push harder —
      to will yourself into aliveness, to force motivation, to demand that
      the system perform at its previous level. This instinct is
      understandable and it backfires. Forcing output from a depleted
      system costs more than the forcing produces. The fight with the
      numbness is itself depleting. This chapter names why the most
      common response to the watcher state makes it harder to leave.
    emotional_job: >
      Produce the specific relief of having a failed strategy named clearly.
      The reader has been fighting the numbness and losing, and the losing
      has felt like another failure. Learning that the fight itself was the
      problem is both destabilizing (the strategy is wrong) and relieving
      (the failure wasn't evidence of how broken I am).
    practical_job: >
      Explain the forcing failure: what it looks like, why it doesn't work
      in this context, what it costs the system, and what the alternative
      is not (the alternative is not giving up — it is a different quality
      of engagement with what is actually there).
    what_changes: >
      Before: "I just need to push harder and I'll get through this."
      After: "Pushing harder from depletion costs more than it produces.
      I need a different strategy, not more force."
    required_sections: [FAILED_STRATEGY_AUTOPSY, FORCING_COST, WHAT_THIS_REQUIRES_INSTEAD]
    forbidden_moves:
      - Offering the alternative strategy in this chapter
      - Implying the reader was wrong to try
      - Creating hopelessness without signaling that something workable exists
      - Framing the depleted state as something that could have been avoided with better earlier choices
    recommended_enrichments:
      - The specific cycle: force → minor output → exhaustion → deeper depletion → stronger sense that forcing is necessary
      - The relationship between shame and forcing: the forcing is often an attempt to escape the shame of the watcher state by proving it wrong
      - The difference between acceptance of the state and resignation to it — brief, because ch11 will develop this more fully
    claim_someone_could_argue: >
      "You're telling people not to push themselves when they're struggling.
      That's the opposite of good advice. Everyone who has ever recovered
      from anything had to push through before they felt like it."
    why_this_chapter_exists: >
      The forcing strategy is the main obstacle to the tiny-contact approach
      in ch08. Until forcing is named as the wrong tool for this problem,
      the reader will experience the microscopic action asks as insufficient
      — they will want to do more and do it harder, which is exactly what
      makes things worse in this family.
    what_comes_next: >
      One tiny point of contact with sensation — not motivation, not
      meaning, just sensation.

  chapter_08:
    number: 8
    role: practical_interruption
    working_title: "One Point of Contact"
    thesis: >
      The system cannot be forced back into aliveness. But there are tiny
      moments of genuine contact with sensation that the depleted system
      can actually access — not motivation, not meaning, not joy, just
      the specific quality of physical sensation that confirms the capacity
      is still there. These moments of contact are not the beginning of
      recovery. They are simply real. And real is the starting point.
    emotional_job: >
      Offer the first practical ask with absolute respect for the reader's
      capacity. This chapter must not feel like a pep talk or a "just try
      this!" moment. The ask is genuinely microscopic — not "small" as
      reassurance, but actually tiny as a structural requirement.
    practical_job: >
      Identify what a genuine point of somatic contact looks like for
      the depleted system: the warmth of a mug, the temperature of water
      on hands, the weight of a blanket, a specific texture, the physical
      sensation of the floor under feet. Not meaning, not inspiration —
      just sensation. Give the reader a concrete way to find one.
    what_changes: >
      Before: "I can't feel anything. Everything is flat."
      After: "There is at least one thing I can actually sense. It is
      small. It is real. That is different from nothing."
    required_sections: [SOMATIC_CONTACT_EXPLANATION, CONCRETE_EXAMPLES, WHAT_THIS_IS_NOT]
    forbidden_moves:
      - Framing sensation-contact as "starting your recovery"
      - Suggesting the reader should feel encouraged by the small contact
      - Using the moment of contact to pivot to meaning or motivation
      - Implying the contact should lead to more contact
      - Any suggestion that the reader should "build on this"
    recommended_enrichments:
      - The difference between sensation (available at low capacity) and emotion (requires more capacity than the depleted system has)
      - Specific, concrete sensory options — not a list, but two or three described with enough specificity that the reader can actually do them
      - The quality of noticing without demanding: the contact is the thing, not a gateway to something else
    claim_someone_could_argue: >
      "This is the advice? Notice the warmth of a mug? This is what years
      of research on this state has produced? This is a band-aid on a
      structural problem."
    why_this_chapter_exists: >
      The tiny contact is not a cure. It is a demonstration that the
      capacity for sensation has not been permanently eliminated — and that
      working with what is actually available, rather than demanding
      what isn't, produces something real. This is the narrowest possible
      practical ask, and it is calibrated precisely for the reader's
      available capacity.
    what_comes_next: >
      A different way of understanding capacity — not as character, but
      as a fluctuating resource.

  chapter_09:
    number: 9
    role: reframe
    working_title: "Capacity Is Not Character"
    thesis: >
      The reduced capacity is not a character trait. It is not who you
      are — it is what you have available right now. The watcher state,
      the distance, the flatness — these are not evidence of what kind of
      person you are. They are a description of what the system has right
      now. That is not a subtle distinction. It is the difference between
      a permanent verdict and a current condition.
    emotional_job: >
      Provide the cognitive shift that allows the reader to stop reading
      their current state as identity. The emotional tone is matter-of-fact
      and un-dramatic — this is not a moment of revelation but of quiet
      reorientation.
    practical_job: >
      Distinguish between capacity-as-resource (fluctuating, influenced by
      conditions, not a fixed quantity) and character-as-identity (who you
      fundamentally are). Show the reader that what they have been reading
      as permanent verdict ("I am someone who can't feel things") is
      actually a description of current resource levels.
    what_changes: >
      Before: "This is who I am now. I used to be different, but this is
      who I've become."
      After: "This is what I have available right now. Capacity is not
      fixed. What I have now is not what I will always have."
    required_sections: [CAPACITY_FRAMEWORK, CHARACTER_COUNTER, CURRENT_VS_PERMANENT]
    forbidden_moves:
      - Offering false hope ("you'll definitely feel better")
      - Claiming the reframe itself will produce improvement
      - Implying the reader is responsible for having conflated capacity and character
      - Rushing to action on the basis of the reframe
    recommended_enrichments:
      - The specific way the reader has been treating their current capacity as a final assessment
      - The evidence that contradicts the permanent-verdict reading: the reader has felt differently before; capacity has changed in the past
      - The difference between "I am broken" and "the system is conserving" — same observable facts, different implications
    claim_someone_could_argue: >
      "If you tell people their collapsed state is just 'current capacity'
      and not who they are, you're minimizing a real and serious condition.
      Some people don't get better. This framing sets people up for
      disappointment."
    why_this_chapter_exists: >
      Without the capacity/character distinction, every practical suggestion
      reinforces the reader's sense that they are failing. With it, the
      reader can engage with tiny actions as working with what's there
      rather than as proof of what they lack.
    what_comes_next: >
      What the distance does to your relationships — and permission to
      name it honestly.

  chapter_10:
    number: 10
    role: relational_consequence
    working_title: "What the Distance Looks Like From Outside"
    thesis: >
      The watcher state has effects on relationships. The people in your
      life can probably see the distance even if they cannot name it.
      They may be interpreting it as disinterest, withdrawal, or rejection.
      Some of them may be pulling away. This chapter gives you language
      for the distance that you can actually use in your relationships —
      not to perform recovery you don't have, but to account for what is
      actually happening.
    emotional_job: >
      Address the relational dimension without adding shame. The reader
      is already aware the distance affects others. This chapter's job is
      to reduce the isolation of that awareness, not to add guilt about it.
    practical_job: >
      Give the reader a way to name the distance to the people in their
      life — specific language for "I am here but not fully here, and it
      is not about you." Address what to do with the people who respond
      to the distance with frustration or withdrawal.
    what_changes: >
      Before: "I'm letting people down but I can't explain why."
      After: "I have language for this that might help. I don't have to
      pretend to be more present than I am."
    required_sections: [RELATIONAL_PORTRAIT, LANGUAGE_OPTIONS, WHAT_THE_OTHER_PERSON_EXPERIENCES]
    forbidden_moves:
      - Implying the reader has caused relational damage by being in the watcher state
      - Suggesting the reader should "perform" more presence than they have
      - Framing relationships as a motivation for recovery
      - Offering advice on relationship repair in this chapter — that is not the chapter's scope
    recommended_enrichments:
      - What the distance looks like from the outside: someone present but not arrived, responsive but not connected
      - The other person's possible interpretations (rejection, deliberate withdrawal) and why those interpretations are understandable
      - The minimal viable account: not a full explanation of the reader's inner experience, but enough for the other person to understand it is not about them
    claim_someone_could_argue: >
      "If you're pulling away from people who care about you, you should
      use your relationships as an anchor to pull yourself back —
      reciprocate, show up, make the effort. Isolation makes it worse."
    why_this_chapter_exists: >
      The relational dimension of the watcher state is frequently either
      ignored (because the reader is too in their own experience to think
      about it) or used as a shame lever ("look what you're doing to
      the people who love you"). Neither serves the reader. This chapter
      addresses it practically and without shame.
    what_comes_next: >
      From fighting the numbness to working alongside it — a different
      relationship with the state itself.

  chapter_11:
    number: 11
    role: self_relation_shift
    working_title: "Working Alongside the Numbness"
    thesis: >
      There is a difference between accepting the numbness and being
      resigned to it. Acceptance is not surrender — it is ceasing to spend
      the system's remaining energy fighting a state that the fight cannot
      dissolve. Working alongside the numbness means taking it seriously
      as a current condition rather than treating it as an obstacle to
      overcome. The shift is in the relationship to the state, not in
      the state itself.
    emotional_job: >
      Offer a reorientation to the reader's relationship with their own
      experience that is neither hope nor despair. The tone is like a
      change in posture: not a different location, but a different way
      of inhabiting the same space.
    practical_job: >
      Show what "working alongside" looks like in practice: calibrating
      asks to actual capacity rather than demanded capacity, treating the
      fluctuations in the watcher state as information rather than as
      performance failures, noticing the flickers of sensation without
      demanding they become more than they are.
    what_changes: >
      Before: "I need to get past this so I can live my life."
      After: "I can work with what I have. Fighting the numbness costs
      energy I don't have. Working alongside it costs less."
    required_sections: [ACCEPTANCE_DISTINCTION, WORKING_ALONGSIDE_PORTRAIT, PRACTICAL_RECALIBRATION]
    forbidden_moves:
      - Framing acceptance as "making peace" with the state in a permanent way
      - Implying the shift in relationship will eliminate the watcher state
      - Using acceptance as a spiritual or mindfulness framework
      - Rushing past the difficulty of this shift — it is counterintuitive and hard
    recommended_enrichments:
      - The specific ways fighting the numbness has been costing the reader
      - What "working alongside" looks like day-to-day: responding to what is actually there rather than what should be there
      - The reader's resistance to this shift — because it can feel like giving up
    claim_someone_could_argue: >
      "This sounds like giving up. If you 'work alongside' the numbness,
      you're choosing it. You're choosing not to fight for your own
      wellbeing. That's not self-compassion — that's surrender."
    why_this_chapter_exists: >
      The shift from fighting to working-alongside is the deepest
      practical reorientation in this family. Without it, the reader will
      continue to use their depleted energy fighting the depletion, which
      is the core maintenance mechanism of the watcher state. This chapter
      redirects that energy.
    what_comes_next: >
      Aliveness returning in flickers — and what to do with a flicker.

  chapter_12:
    number: 12
    role: integration
    working_title: "Aliveness Returns in Flickers, Not Floods"
    thesis: >
      Aliveness does not return all at once. It arrives in small moments —
      a few seconds of genuine interest, a brief period where something
      actually lands, a moment where the glass seems thinner. These flickers
      are not harbingers of recovery. They are the thing itself. The reader
      who waits for the flood will miss the flickers. The reader who learns
      to recognize and receive a flicker has something real to work with.
    emotional_job: >
      Close the book with honesty rather than hope. Not hopelessness —
      but the specific kind of steadiness that comes from accurate
      expectation. The reader leaves with a clear picture of what to look
      for and what to do with it.
    practical_job: >
      Give the reader concrete guidance on recognizing a flicker (it is
      often very brief, often easy to dismiss, often feels underwhelming
      compared to what you remember aliveness being), receiving it (without
      demanding it continue or expand), and working with it (doing the
      thing you were doing when the flicker arrived, without trying to
      extract meaning or significance from it).
    what_changes: >
      Before: "I'll know I'm better when I feel like myself again."
      After: "I know what a flicker looks like. I know how to receive one
      without turning it into a performance. That is different from where
      I started."
    required_sections: [FLICKER_PORTRAIT, RECEIVING_PRACTICE, HONEST_CLOSE]
    forbidden_moves:
      - Promising the flickers will grow into floods
      - Ending on a note of triumph or "you've come so far"
      - Using any version of "you've got this"
      - Implying the watcher state is now behind the reader
      - Creating urgency to build on the flickers
    recommended_enrichments:
      - The specific quality of a flicker: brief, quiet, easy to dismiss, often arrives unbidden
      - What receiving looks like: not amplifying, not trying to sustain, just noticing that it was real
      - The long view: the capacity is still there. The flickers are evidence. That is enough.
    claim_someone_could_argue: >
      "You're telling people that 'flickers' are sufficient. That is
      a low bar for a human life. You're asking people to accept less
      than what they deserve."
    why_this_chapter_exists: >
      The integration chapter in this family is about calibrated expectation,
      not triumph. The reader needs to leave knowing what recovery actually
      looks like in this context — not a return to a previous state in one
      move, but small points of genuine contact that become more frequent
      over time. That is the honest account.
    what_comes_next: >
      The practice of receiving flickers continues. The capacity will
      fluctuate. The glass will be thicker on some days and thinner on
      others. The reader knows what they are looking for now.

sequencing_rules:
  must_come_before:
    - somatic_legitimacy (ch02) must precede all practical chapters — the system's depletion must be honored before any action is requested
    - cost_exposure (ch03) must precede grief (ch06) — the loss must be inventoried before it is mourned
    - mechanism (ch04) must precede hidden_belief (ch05) — the structure before the belief embedded in it
    - hidden_belief (ch05) must precede destabilization (ch07) — the waiting-trap must be named before forcing is addressed
    - destabilization (ch07) must precede practical_interruption (ch08) — forcing must be named as the wrong strategy before the tiny action is offered
    - practical_interruption (ch08) must precede reframe (ch09) — experience before cognitive reframe
  cannot_come_too_early:
    - grief (ch06) cannot come before cost_exposure (ch03) — grief without cost inventory is abstract
    - practical_interruption cannot come before ch06 — no action asks before the grief is permitted
    - relational_consequence cannot come before ch08 — the reader needs the practical experience first
    - self_relation_shift cannot come before ch10
  saved_for_late_book:
    - self_relation_shift (ch11) — requires accumulated experience and the relational chapter to land
    - integration (ch12) — must close the arc, never appear mid-book
    - grief (ch06) — positioned at the center of the arc, after cost inventory and before destabilization

tone_and_pacing:
  intensity_profile: [low, low, medium, medium, medium, medium, medium, low, medium, low, low, low]
  trust_curve: >
    This family requires the lowest intensity opening of any family in
    the set. The reader is reading from a depleted state. Anything that
    feels like too much — too much urgency, too much positivity, too much
    demand — will cause them to put the book down. The first three chapters
    must be very quiet. The middle section (ch04-ch07) can sustain medium
    intensity because the reader has been given the somatic legitimacy
    foundation. The final section must return to low intensity — the reader
    needs to be cared for, not energized.
  action_timing: >
    The first practical ask arrives in ch08 — the latest of any family
    in the set. It is preceded by recognition, somatic legitimacy, cost
    exposure, mechanism, hidden belief, grief, and destabilization. The
    action ask is genuinely microscopic. No earlier action should be
    offered — any earlier ask will be experienced as the same forcing
    the book has named as the wrong strategy.
  mechanism_timing: >
    The watcher mechanism arrives in ch04 — after recognition and somatic
    legitimacy but before the hidden belief and grief chapters. The reader
    needs to understand the mechanism before they can see the belief
    embedded in it, but not so early that they haven't yet been given
    the somatic legitimacy that makes the mechanism non-shaming.
  permission_timing: >
    Permission is the underlying current of the entire book — permission
    to be depleted, permission to not be motivated, permission to grieve,
    permission to have limits on what you can do. It is explicit in ch02
    (somatic legitimacy), ch06 (grief), and ch11 (working alongside).
    It should never be withheld.

