    atoms_root: "atoms/it-IT"
    translation_source_locale: en-US
    translation_output_root: "atoms/it-IT"
    quality_contracts_dir: "config/localization/quality_contracts/it-IT/"
    population_status: planned
    is_baseline: false
    rollout_phase: Phase 4 (Months 7–12)
    distribution_blocker: null
    tts_notes: >
      Primary: ElevenLabs eleven_multilingual_v2 (it-IT).
      Fallback: Google it-IT-Neural2-A.
    notes: >
      Italian (Italiano). EU locale. Strong audiobook and podcast market.
      Avoid clinical language in titles; wellness/self-development framing.
      Phase 4 brands: TBD (stabilizer_it, sleep_repair_it).

  # ─── HUNGARIAN ────────────────────────────────────────────────────────────

  hu-HU:
    description: >
      Hungarian — Hungary.
      Atoms stored in locale subdirectory (atoms/hu-HU/).
      ElevenLabs only — Google Neural2 does NOT support Hungarian.
    atoms_root: "atoms/hu-HU"
    translation_source_locale: en-US
    translation_output_root: "atoms/hu-HU"
    quality_contracts_dir: "config/localization/quality_contracts/hu-HU/"
    population_status: planned
    is_baseline: false
    rollout_phase: Phase 4 (Months 7–12)
    distribution_blocker: >
      MUST USE ELEVENLABS TTS ONLY. Google Neural2 does NOT have hu-HU support
      (only hu-HU-Standard voice available). Enforce ElevenLabs in CI.
    tts_notes: >
      PRIMARY (ONLY): ElevenLabs eleven_multilingual_v2 (hu-HU).
      NO FALLBACK TO GOOGLE. Google Neural2 has no hu-HU support.
      Standard Google voice hu-HU-Standard-A available but lower quality.
    notes: >
      Hungarian (Magyar). Smaller market but high per-capita audio consumption.
      ElevenLabs has Hungarian support; Google does not (Standard voice only).
      CRITICAL: Prioritize ElevenLabs for quality and compliance.
      Mental health stigma remains higher than Western Europe — wellness/
      self-development framing preferred over clinical language.
      Phase 4 brands: stabilizer_hu, sleep_repair_hu.

