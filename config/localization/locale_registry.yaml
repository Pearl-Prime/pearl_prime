# ─── DISTRIBUTION HARD RULES ────────────────────────────────────────────────
# Enforced by distribution layer — not just a recommendation.

distribution_rules:
  zh-CN_not_via_findaway: true          # Findaway does not reach mainland China
  zh-TW_not_in_US_storefront: true      # Traditional Chinese TW stays in TW
  zh-HK_not_in_US_storefront: true      # HK stays in HK
  en-US_not_in_TW_storefront: true      # US English stays in US
  hu-HU_use_elevenlabs_not_google: true # Google has no hu-HU Neural2 voice
  locale_mismatch_is_ci_failure: true   # locale mismatch between book and storefront = gate failure
