# Release thresholds for translation quality gate.
# Locale gate fails if any threshold is not met.
# Authority: config/localization/quality_contracts/README.md

schema_version: "1.0"

thresholds:
  min_glossary_coverage: 0.90
  min_golden_regression_pass: 1.0
  min_segment_count_per_locale: 6

  # Minimum teacher bank parity ratio for CJK6 locales.
  # 0.0 = advisory only (current state). Raise to 0.3+ when translation
  # pipeline is running consistently.
  min_teacher_bank_parity_cjk: 0.0

  # Minimum teacher bank parity ratio for EU locales.
  # EU translations are not yet started; keep at 0.0 until pipeline supports them.
  min_teacher_bank_parity_eu: 0.0

# Per-locale overrides (optional). Use when a specific locale has
# different quality expectations (e.g., hu-HU uses ElevenLabs-only TTS).
locale_overrides: {}
