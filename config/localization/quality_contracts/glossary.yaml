# Canonical glossary for translation quality.
# 10 core brand terms × 6 CJK locales = 60 entries, + 7 European/LatAm
# locales (es-US, es-ES, fr-FR, de-DE, it-IT, hu-HU, pt-BR) = 70 entries,
# added 2026-07-13 (WESTERN_LATAM_100PCT_CLOSEOUT) to close the
# European/LatAm glossary gap flagged in LOCALIZATION_PREP_14PACK_20260713.md.

schema_version: "1.0"

terms:
  # ── 1. nervous system ──────────────────────────────────────────────
  - id: nervous_system
    source_en: "nervous system"
    translations:
      ja-JP: "神経系"
      ko-KR: "신경계"
      zh-CN: "神经系统"
      zh-TW: "神經系統"
      zh-HK: "神經系統"
      zh-SG: "神经系统"
      es-US: "sistema nervioso"
      es-ES: "sistema nervioso"
      fr-FR: "système nerveux"
      de-DE: "Nervensystem"
      it-IT: "sistema nervoso"
      hu-HU: "idegrendszer"
      pt-BR: "sistema nervoso"
    context: >-
      The biological nervous system; used literally to describe the body's
      stress-response wiring. Always translate as the anatomical term, never
      as a metaphor for 'being nervous'.

  # ── 2. the alarm ──────────────────────────────────────────────────
  - id: the_alarm
    source_en: "the alarm"
    translations:
      ja-JP: "アラーム"
      ko-KR: "경보"
      zh-CN: "警报"
      zh-TW: "警報"
      zh-HK: "警報"
      zh-SG: "警报"
      es-US: "la alarma"
      es-ES: "la alarma"
      fr-FR: "l'alarme"
      de-DE: "der Alarm"
      it-IT: "l'allarme"
      hu-HU: "a riasztás"
      pt-BR: "o alarme"
    context: >-
      The body's threat-detection signal — a felt, somatic alarm, not a
      clock alarm. In CJK contexts prefer the emergency/warning sense.

  # ── 3. the mask ────────────────────────────────────────────────────
  - id: the_mask
    source_en: "the mask"
    translations:
      ja-JP: "仮面"
      ko-KR: "가면"
      zh-CN: "面具"
      zh-TW: "面具"
      zh-HK: "面具"
      zh-SG: "面具"
      es-US: "la máscara"
      es-ES: "la máscara"
      fr-FR: "le masque"
      de-DE: "die Maske"
      it-IT: "la maschera"
      hu-HU: "az álarc"
      pt-BR: "a máscara"
    context: >-
      A protective persona someone wears to hide vulnerability. Use the
      theatrical/figurative mask, not a medical or physical mask.

  # ── 4. the pattern ────────────────────────────────────────────────
  - id: the_pattern
    source_en: "the pattern"
    translations:
      ja-JP: "パターン"
      ko-KR: "패턴"
      zh-CN: "模式"
      zh-TW: "模式"
      zh-HK: "模式"
      zh-SG: "模式"
      es-US: "el patrón"
      es-ES: "el patrón"
      fr-FR: "le schéma"
      de-DE: "das Muster"
      it-IT: "lo schema"
      hu-HU: "a minta"
      pt-BR: "o padrão"
    context: >-
      A recurring behavioural or emotional loop the listener unconsciously
      repeats. Use the behavioural/psychological sense, not textile pattern.

  # ── 5. the strategy ───────────────────────────────────────────────
  - id: the_strategy
    source_en: "the strategy"
    translations:
      ja-JP: "戦略"
      ko-KR: "전략"
      zh-CN: "策略"
      zh-TW: "策略"
      zh-HK: "策略"
      zh-SG: "策略"
      es-US: "la estrategia"
      es-ES: "la estrategia"
      fr-FR: "la stratégie"
      de-DE: "die Strategie"
      it-IT: "la strategia"
      hu-HU: "a stratégia"
      pt-BR: "a estratégia"
    context: >-
      A coping mechanism the nervous system adopted to stay safe. Frame as
      a survival strategy, not a business or military strategy.

  # ── 6. the cost ────────────────────────────────────────────────────
  - id: the_cost
    source_en: "the cost"
    translations:
      ja-JP: "代償"
      ko-KR: "대가"
      zh-CN: "代价"
      zh-TW: "代價"
      zh-HK: "代價"
      zh-SG: "代价"
      es-US: "el precio"
      es-ES: "el precio"
      fr-FR: "le prix"
      de-DE: "der Preis"
      it-IT: "il prezzo"
      hu-HU: "az ár"
      pt-BR: "o preço"
    context: >-
      The emotional or relational price paid for maintaining a protective
      pattern. Not a financial cost — use the figurative/consequence sense.

  # ── 7. somatic ─────────────────────────────────────────────────────
  - id: somatic
    source_en: "somatic"
    translations:
      ja-JP: "身体的"
      ko-KR: "신체적"
      zh-CN: "躯体的"
      zh-TW: "身體的"
      zh-HK: "身體的"
      zh-SG: "躯体的"
      es-US: "somático"
      es-ES: "somático"
      fr-FR: "somatique"
      de-DE: "somatisch"
      it-IT: "somatico"
      hu-HU: "szomatikus"
      pt-BR: "somático"
    context: >-
      Relating to the body as felt from the inside — body-based sensation.
      Prefer the clinical/somatic-psychology term over colloquial 'physical'.

  # ── 8. watcher ─────────────────────────────────────────────────────
  - id: watcher
    source_en: "watcher"
    translations:
      ja-JP: "観察者"
      ko-KR: "관찰자"
      zh-CN: "观察者"
      zh-TW: "觀察者"
      zh-HK: "觀察者"
      zh-SG: "观察者"
      es-US: "el observador"
      es-ES: "el observador"
      fr-FR: "l'observateur"
      de-DE: "der Beobachter"
      it-IT: "l'osservatore"
      hu-HU: "a megfigyelő"
      pt-BR: "o observador"
    context: >-
      The part of awareness that can observe thoughts and feelings without
      being consumed by them. A mindfulness/witness-consciousness term.

  # ── 9. false alarm ─────────────────────────────────────────────────
  - id: false_alarm
    source_en: "false alarm"
    translations:
      ja-JP: "誤報"
      ko-KR: "오경보"
      zh-CN: "误报"
      zh-TW: "誤報"
      zh-HK: "誤報"
      zh-SG: "误报"
      es-US: "la falsa alarma"
      es-ES: "la falsa alarma"
      fr-FR: "la fausse alerte"
      de-DE: "der Fehlalarm"
      it-IT: "il falso allarme"
      hu-HU: "a téves riasztás"
      pt-BR: "o alarme falso"
    context: >-
      When the nervous system fires a threat response but there is no real
      danger. Keep the alarm/warning metaphor consistent with 'the alarm'.

  # ── 10. the thread ─────────────────────────────────────────────────
  - id: the_thread
    source_en: "the thread"
    translations:
      ja-JP: "糸"
      ko-KR: "실마리"
      zh-CN: "线索"
      zh-TW: "線索"
      zh-HK: "線索"
      zh-SG: "线索"
      es-US: "el hilo"
      es-ES: "el hilo"
      fr-FR: "le fil"
      de-DE: "der Faden"
      it-IT: "il filo"
      hu-HU: "a szál"
      pt-BR: "o fio"
    context: >-
      A thin connecting line between past experience and present reaction;
      the narrative thread that links protective patterns to their origin.
