# Golden segments for translation regression tests.
# Anchored to atoms/tech_finance_burnout/anxiety/{PIVOT,TAKEAWAY,THREAD,PERMISSION}/CANONICAL.txt
# so substring checks resolve against the live corpus.
#
# PERMISSION added 2026-07-09 (translation source-pack lane): this slot type has been
# named as translation-required since 2026-03-06 (see README.md "When enabling locales")
# and scripts/validate_translations.py / scripts/check_golden_translation.py already
# accept atom_type=PERMISSION, but no golden segment existed for it until now. The two
# segments below are anchored to real, already-translated corpus lines (not new
# translations authored for this PR) — see
# atoms/tech_finance_burnout/anxiety/PERMISSION/CANONICAL.txt and its locales/ subtree.

schema_version: "1.2"

segments:
  - id: pivot_01
    source_en: "The alarm without threat isn't what you were taught. It's what happens when your system runs a threat assessment on a sprint that isn't dangerous."
    atom_type: PIVOT
    expected:
      ja-JP: "アラームが脅威を伴わないのは、あなたが教えられてきたものとは違う。"
      ko-KR: ""
      zh-CN: "没有真实威胁的警报，并非你曾被教导的模样"
      zh-TW: "沒有威脅的警訊，不是你從前學過的樣子"
      zh-HK: ""
      zh-SG: ""

  - id: pivot_02
    source_en: "You've been managing the scanning like a task on your golden handcuffs. What if it's not a task? What if it's a message?"
    atom_type: PIVOT
    expected:
      ja-JP: "あなたはスキャンを、ゴールデン・ハンカフツのタスクのように管理してきました。"
      ko-KR: ""
      zh-CN: "你一直把这种持续扫描当作“金手铐”上待办清单里的一项任务来管理"
      zh-TW: "你一直把這種持續掃描，當成金手銬上待辦清單裡的一項任務來處理"
      zh-HK: ""
      zh-SG: ""

  - id: takeaway_01
    source_en: "The alarm without threat is not a flaw. It's a wound wearing your on-call like a name tag."
    atom_type: TAKEAWAY
    expected:
      ja-JP: "脅威のないアラームは欠点ではありません。"
      ko-KR: ""
      zh-CN: "无声警报并非缺陷"
      zh-TW: "沒有威脅卻響起的警報，不是缺陷"
      zh-HK: ""
      zh-SG: ""

  - id: takeaway_02
    source_en: "You're not struggling with anxiety. You're surviving it. Those require different skills."
    atom_type: TAKEAWAY
    expected:
      ja-JP: "あなたが「不安」と格闘しているわけではありません。"
      ko-KR: ""
      zh-CN: "你并非在与焦虑搏斗，而是在穿越它"
      zh-TW: "你不是在「與焦慮搏鬥」，而是在「活過焦慮」"
      zh-HK: ""
      zh-SG: ""

  - id: thread_01
    source_en: "You've named the alarm without threat. What the alarm without threat is protecting you from feeling is the layer beneath the sprint."
    atom_type: THREAD
    expected:
      ja-JP: "あなたは、脅しのないアラームと名付けました。"
      ko-KR: ""
      zh-CN: "你已为警报命名，却未施加威胁"
      zh-TW: "你已為那警訊命名，卻未伴隨威脅"
      zh-HK: ""
      zh-SG: ""

  - id: thread_02
    source_en: "The anxiety pattern was recognized. Where it first took root is a story older than your optimization."
    atom_type: THREAD
    expected:
      ja-JP: "不安のパターンは、すでに気づかれています。"
      ko-KR: ""
      zh-CN: "焦虑模式已被识别"
      zh-TW: "你已辨識出焦慮的模式"
      zh-HK: ""
      zh-SG: ""

  - id: permission_01
    source_en: "You are allowed to feel the alarm without threat without fixing it before the next sprint. Feeling it is not failing at it."
    atom_type: PERMISSION
    expected:
      ja-JP: "脅威を感じず、次のスプリントが始まる前にそれを解消しようとしなくてもいいのです。感じているだけで、すでに失敗しているわけではありません。"
      ko-KR: "당신은 다음 스프린트 전에 해결하려 하지 않아도 되는 경고 신호를 느낄 수 있습니다. 그걸 느끼는 것 자체가 실패가 아닙니다."
      zh-CN: "你完全可以感受到警觉，却不必觉得有威胁，也无需在下一次冲刺开始前就急着解决它。感受它，并不等于搞砸了。"
      zh-TW: "你可以感受到警訊，卻不需視其為威脅，也不必在下一次衝刺前急著解決它。感受它，並非等於搞砸了它。"
      zh-HK: "你可以感受到警訊，卻毋須視之為威脅，亦毋須在下一個衝刺階段開始前急於解決它。單是感受到它，並非代表你失敗了。"
      zh-SG: "你可以感受到警觉，却不必视之为威胁，也不必在下一次冲刺前急着解决它。感受它，并不等于搞砸了。"

  - id: permission_02
    source_en: "You are allowed to struggle with anxiety even when everyone at the optimization seems fine."
    atom_type: PERMISSION
    expected:
      ja-JP: "周囲のみんなが最適化のなかで平然としているときでも、不安と格闘していいのです。"
      ko-KR: "당신은 주변 모두가 최적화 과정에서 아무렇지 않은 듯 보일 때조차 불안을 겪으며 힘들어할 수 있습니다."
      zh-CN: "你完全可以为焦虑而挣扎，哪怕身边所有人在“优化”中看起来都游刃有余。"
      zh-TW: "即使周遭所有人看起來都適應良好，你依然可以正與焦慮苦苦掙扎。"
      zh-HK: "即使身邊所有人看似在優化過程中安然無恙，你依然可以正與焦慮苦苦掙扎。"
      zh-SG: "即使身边所有人看起来都游刃有余，你依然可以被焦虑困扰。"
