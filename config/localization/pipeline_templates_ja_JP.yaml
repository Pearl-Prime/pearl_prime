locale: ja-JP
locale_name: Japanese (Japan)
schema_version: 1
# Authored fresh in Japanese — not literal translations.
# Register: 葬送のフリーレン restraint × 蟲師 subtlety × 君の膵臓をたべたい emotional honesty.
# Audience: Gen Z Japanese professionals 20-32, anxiety/burnout context.
templates:
  "A Note on the Teachings of {teacher}": "{teacher}の教えについての覚書"
  "A companion {workbook_label} is available for this book at {url}. You may want to have it alongside you as you read.": "本書には{workbook_label}が用意されています。{url}からダウンロードできます。読みながら手元に置いておくと、より深く入っていけるはずです。"
  "Before moving on, give the body one concrete action. Insight without action evaporates by tomorrow.": "次へ進む前に、身体に一つだけ具体的な動きを与えてください。行動を伴わない気づきは、明日には蒸発してしまいます。"
  "Before the mind files this as 'done,' feel what is still open in the body. That openness is the real work.": "頭が「終わった」と片付けてしまう前に、身体の中でまだ開いているものを感じてください。その開きこそが本当の仕事です。"
  "Before the mind starts explaining, the body has already registered something. Trust that registration.": "頭が説明を始める前に、身体はもう何かを記録しています。その記録を信じてください。"
  "Before we talk about {topic}, I want you to feel something. Not think about it. Feel it.": "{topic}について話す前に、まず感じてほしいことがあります。考えるのではなく、感じてください。"
  "Before you go — if you want to take this further, a companion {workbook_label} is waiting for you at {url}.": "ここで終わりにする前に――もう一歩進みたいなら、{url}に{workbook_label}を用意しています。"
  "Begin where the weight settled. You will know the spot before you can explain it.": "重さが落ち着いた場所から始めてください。説明できるようになる前に、その場所はもう分かっているはずです。"
  "Begin with whatever your body is holding. You do not need to name it. Just locate it.": "身体が抱えているものから始めてください。名前をつける必要はありません。ただ、どこにあるかだけ確かめてください。"
  "Bridge from EXERCISE → INTEGRATION.": "EXERCISE から INTEGRATION への橋渡し。"
  "Bridge from HOOK/SCENE → MECHANISM.": "HOOK/SCENE から MECHANISM への橋渡し。"
  "Bridge from REFLECTION → STORY.": "REFLECTION から STORY への橋渡し。"
  "Bridge from STORY → EXERCISE.": "STORY から EXERCISE への橋渡し。"
  "But each link is a prediction, not a fact. The chain has never once been right about the final link.": "けれど一つひとつの環は予測であって、事実ではありません。この鎖が最後の環まで当たったことは、一度もありません。"
  "By the time you can explain the moment, the alarm has already chosen a meaning for it. That matters because the body is already obeying the prediction.": "その瞬間を言葉で説明できるようになった頃には、警報はすでに意味を選び終えています。問題はそこです――身体はもう、その予測に従って動いています。"
  "Chapter {n}": "第{n}章"
  # gen_z_professionals × anxiety — 12 chapter titles
  "The Alarm That Won't Stop Ringing": "鳴りやまないアラーム"
  "When The Alarm Made Sense": "そのアラームが理にかなっていた頃"
  "The Pattern Running Your Nervous System": "あなたの神経系を動かしているパターン"
  "What The Alarm Actually Does To Your Body": "そのアラームが、あなたの身体に実際にしていること"
  "What Living On Alert Actually Costs": "警戒の上で生きることが、実際に支払わせているもの"
  "Letting The Alarm Ring": "アラームを鳴らせておく"
  "Small Exposures": "小さな曝露"
  "When The Alarm Screams": "アラームが叫ぶとき"
  "When Your Body Learns It's Safe": "あなたの身体が「安全だ」と学びはじめるとき"
  "When The Alarm Comes Back": "アラームが戻ってくるとき"
  "Living With The Alarm On Low": "アラームの音量を下げて生きていく"
  "What Opens When You Stop Waiting": "待つことをやめたとき、ひらくもの"
  "Concepts dissolve under pressure. What remains is the story of how the pressure actually felt.": "概念は圧力の下で溶けていきます。残るのは、その圧力が実際にどう感じられたかという物語だけです。"
  "Derive a mechanism-explanation paragraph from REFLECTION content.": "REFLECTION の内容から、メカニズムを説明する段落を導出してください。"
  "Do not rush to the next thing. What just happened needs a few seconds to settle into the body.": "次に急がないでください。たった今起きたことが身体に落ちるには、数秒の時間が要ります。"
  "Do not skip ahead to the lesson. The body is still showing you where the lesson lives.": "結論まで飛ばさないでください。身体はまだ、その教えがどこに住んでいるかを見せている最中です。"
  "Extract a one-line thesis claim from REFLECTION prose.": "REFLECTION の文章から、一行のテーゼを抽出してください。"
  "Find the part of you that tightened during this chapter. That is your entry point.": "この章を読んでいる間に固くなった部分を見つけてください。そこが入口です。"
  "Fix common loc-var fallback collisions in SCENE prose.": "SCENE 文章における loc-var フォールバックの衝突を修正してください。"
  "For example, the cost shows up fastest in a story. Watch how the prediction arrives before the fact does.": "たとえば、その代償は物語の中でもっとも早く姿を現します。事実より先に予測のほうが到着する、その様子を見てください。"
  "For example, the quickest way to feel the mechanism is to watch it take hold in an ordinary moment.": "たとえば、メカニズムを感じる一番早い方法は、ありふれた瞬間にそれが食い込む様子をただ見ていることです。"
  "For example, watch where the sentence about identity gets written. It usually happens in a single beat.": "たとえば、アイデンティティについての一文がどこで書かれるか、注意して見てください。たいてい、たった一拍のあいだに起こります。"
  "For example, you can watch the pattern more clearly in somebody else's body before you can bear it in your own.": "たとえば、自分の身体で受け止める前に、他人の身体の中でなら、そのパターンをより鮮明に見ることができます。"
  "Generate a takeaway when TAKEAWAY slot is missing/placeholder.": "TAKEAWAY スロットが欠落またはプレースホルダーの場合、テイクアウェイを生成してください。"
  "Generate a thread-forward when THREAD slot is missing/placeholder.": "THREAD スロットが欠落またはプレースホルダーの場合、次章への糸を生成してください。"
  "Give the landing a moment. The nervous system integrates slower than the reading eye.": "着地に時間をあげてください。神経系は、読む眼よりもずっとゆっくり統合していきます。"
  "Here is the mechanism: {core} The nervous system does not distinguish between real threat and imagined threat. Both receive the same emergency response. This is why knowing better rarely helps.": "メカニズムはこうです――{core} 神経系は、本物の脅威と想像上の脅威を区別しません。どちらにも同じ緊急反応を返します。だから「分かっている」ことは、ほとんど助けにならないのです。"
  "Here is where the chapter stops talking about the pattern and lets you watch it happen.": "この章が、パターンについて語るのをやめ、それが実際に起きる様子を見せはじめる場所です。"
  "Here the chapter shifts from naming the pattern to witnessing it in motion.": "ここで章は、パターンに名前をつける段階から、それが動いている姿を目撃する段階へと移ります。"
  "Hold this sensation without naming it. The name will come, but the sensation is more honest.": "この感覚を、名前をつけずに抱えていてください。名前はあとから来ます。けれど感覚のほうが、ずっと正直です。"
  "I was not a direct student of {teacher}. I encountered their work through books, talks, and publicly available teachings. What follows is not an official interpretation of {teacher}'s work — it is an application.": "私は{teacher}の直弟子ではありません。著書、講演、公開されている教えを通じて、その仕事に出会いました。これから書くことは{teacher}の仕事の公式な解釈ではありません――一つの応用です。"
  "I was not a direct student of {teacher}. I encountered their work through books, talks, and publicly available teachings. What follows is not an official interpretation of {teacher}'s work — it is an application. I have done my best to honor the integrity of the original teachings while translating them into practical guidance for the challenges you may be facing.": "私は{teacher}の直弟子ではありません。著書、講演、公開されている教えを通じて、その仕事に出会いました。これから書くことは{teacher}の仕事の公式な解釈ではありません――一つの応用です。原典の教えの完全性を尊重しつつ、あなたが今直面しているかもしれない課題のための実用的な指針へと翻案する、その作業に最善を尽くしました。"
  "If something in these pages resonates with you, I encourage you to go to the source. Seek out {teacher}'s own words — their talks, their writings, their direct teachings. What I offer here is a bridge, not a destination. The real work lives in the original.": "このページのどこかがあなたの中で響いたなら、源流まで行ってみることをお勧めします。{teacher}本人の言葉を――講演を、著作を、直接の教えを――探してください。私がここで差し出しているのは橋であって、目的地ではありません。本当の仕事は原典の中に生きています。"
  "If something in these pages resonates with you, I encourage you to go to the source. Seek out {teacher}'s own words.": "このページのどこかがあなたの中で響いたなら、源流まで行ってみてください。{teacher}本人の言葉を探してみることをお勧めします。"
  "If these ideas spoke to you, go deeper. Seek out {teacher}'s original works. Listen to their talks. Sit with their words directly. The bridge this book offers is meant to lead you to the source, not to stand in its place.": "ここに書かれた考えがあなたに語りかけてきたなら、もっと深く入ってください。{teacher}の原著にあたり、講演を聴き、その言葉と直に座ってみてください。本書が差し出すのは橋であり、源流の代わりに立つためのものではありません。"
  "In practice, do not turn this into homework. Give the body one smaller, safer entry instead.": "実践においては、これを宿題にしないでください。代わりに、もっと小さく、もっと安全な入口を身体に与えてください。"
  "In practice, start smaller than insight. Start where the body is still holding the chapter.": "実践においては、気づきよりもさらに小さなところから始めてください。身体がまだ章を抱えている、その場所から始めてください。"
  "Introduction": "はじめに"
  "Knowing the pattern is not enough. The next step asks you to meet it with your body, not your mind.": "パターンを知っているだけでは足りません。次の一歩は、頭ではなく身体で、それと向き合うことを求めています。"
  "Let the chapter land in the body before it turns back into explanation.": "この章が再び説明に戻る前に、まず身体に着地させてあげてください。"
  "Let the practice be undersized. A small move completed is worth more than a large one imagined.": "実践は小さすぎるくらいでちょうどいい。やり切った小さな動きは、想像しただけの大きな動きよりも、ずっと価値があります。"
  "Notice one place in your body that is holding tension right now. You do not need to release it. Just notice it.": "いま身体のどこか一か所で緊張を抱えている場所に気づいてください。ほどく必要はありません。ただ、気づくだけで十分です。"
  "Notice the impulse to understand before you have finished feeling. That impulse is the pattern defending itself.": "感じ終わる前に理解しようとする衝動に気づいてください。その衝動こそ、パターンが自分自身を守ろうとしている動きです。"
  "Notice where you are sitting. Notice the weight of this device in your hands, or the sound of this voice in your ears.": "自分がどこに座っているかに気づいてください。手の中にあるこの端末の重さ、あるいは耳に届くこの声の響きに気づいてください。"
  "Notice where your body is bracing. Start there. Not with the thought — with the sensation.": "身体のどこが身構えているかに気づいてください。そこから始めてください。考えからではなく、感覚から始めてください。"
  "Now bring this from concept into sensation. The next step is deliberately small.": "ここで概念から感覚へと移してください。次の一歩は、意図的に小さくしてあります。"
  "Now notice what shifted before your mind starts summarizing it.": "頭が要約をはじめる前に、何が動いたかに気づいてください。"
  "Now watch what happens when the same pattern lands in a real body, in a real room.": "同じパターンが、実在する身体、実在する部屋に降りてきたとき、何が起こるか見てください。"
  "Now, I want you to notice something. Notice where your mind went. That is useful information.": "ここで、一つ気づいてほしいことがあります。自分の頭がどこへ行ったかに気づいてください。それは役に立つ情報です。"
  "Pause here. The body is still processing what the mind already moved past.": "ここで止まってください。頭がすでに通り過ぎたものを、身体はまだ処理している最中です。"
  "Place one hand where the tension is loudest. That contact is the first move.": "緊張がもっとも大きく鳴っている場所に、片手を置いてください。その接触が、最初の一手です。"
  "Remember this: {core} That is not a philosophy. That is what happened in this chapter.": "このことを覚えておいてください――{core} これは哲学ではありません。この章の中で実際に起きたことです。"
  "Resist the urge to evaluate. Let the experience sit without a grade.": "評価したくなる衝動に抵抗してください。経験には、点数をつけずに座らせてあげてください。"
  "Right here is where the chapter earns its weight. Not in the concept, but in the felt registration.": "この章が重さを獲得するのは、まさにここです。概念の中ではなく、感じられた記録の中で。"
  "Scan from your scalp to your feet. The first place that speaks up is where you begin.": "頭のてっぺんから足の裏まで、ゆっくり走査してみてください。最初に声を上げた場所が、始まりの場所です。"
  "Seen from the outside, the distortion gets harder to defend.": "外側から見ると、その歪みを擁護するのは難しくなります。"
  "Shame always makes the same move first: it turns a moment into an identity sentence.": "恥はいつも最初に同じ動きをします――一瞬を、アイデンティティに関する一文に変えてしまうのです。"
  "Shutdown rarely begins at the task. It begins where your system starts counting cost.": "シャットダウンが始まるのは、作業そのものではありません。あなたのシステムが代償を数えはじめた、その場所からです。"
  "So when the body tightens, do not solve the whole pattern here. Work with the place that braced first.": "ですから、身体がこわばったとき、ここでパターン全体を解こうとしないでください。最初に身構えた場所と、まず付き合ってください。"
  "So when the pattern surges, the next move is not to understand more. It is to make the first move cheaper.": "ですから、パターンが波立ったとき、次の一手は「もっと理解する」ことではありません。「最初の一手をもっと安く済ませる」ことです。"
  "Something just shifted in your chest or your throat. That shift is where the chapter actually begins.": "いま胸か喉のあたりで、何かが動いたはずです。その動きこそ、この章が本当に始まる場所です。"
  "Something loosened or something tightened. Either one is information worth keeping.": "何かがほどけたか、何かが締まったか。どちらにせよ、それは取っておく価値のある情報です。"
  "Start where you feel the most tension right now. Not where you think the tension should be — where it actually is.": "いま一番緊張を感じている場所から始めてください。緊張が「あるはず」の場所ではなく、実際にある場所から。"
  "Start with the breath that shortened when the chapter turned.": "この章が転換した瞬間に短くなった、その呼吸から始めてください。"
  "Start with the hand that hovered instead of moving. That freeze is the entry point.": "動く代わりに宙に浮いてしまった、その手から始めてください。その固まりこそが入口です。"
  "Start with the jaw that tightened while the story was unfolding.": "物語が展開している間にこわばった、その顎から始めてください。"
  "Start with the part of you that wanted to look away during the last section.": "前の節の途中で目をそらしたくなった、あなたのその部分から始めてください。"
  "Start with the place in your body that lifted while you were listening. That is where the practice begins.": "聴いている間に身体の中で持ち上がった場所から始めてください。実践はそこから始まります。"
  "Start with the pressure under the sternum. That is the part still bracing.": "胸骨の下の圧から始めてください。それがまだ身構えている部分です。"
  "Start with the shoulders that lifted before you even noticed the cost.": "代償に気づくよりも先に持ち上がっていた、その肩から始めてください。"
  "Start with the simplest true thing your body is telling you right now.": "いま身体が伝えてくる、もっとも単純で本当のことから始めてください。"
  "Start with the throat that keeps rehearsing and swallowing the same sentence.": "同じ一文を何度もリハーサルしては飲み込んでいる、その喉から始めてください。"
  "Stay with the moment a second longer. The pattern usually shows itself before the explanation does.": "もう一秒だけ、この瞬間に留まってください。パターンは説明よりも先に、自分の姿を見せることがほとんどです。"
  "Stay with what changed. Even if it only changed by one degree.": "変わったものに留まってください。たとえ一度だけの変化であっても。"
  "That noticing — that is the entire method of this book.": "その気づき――それが、本書の方法のすべてです。"
  "That pause is doing more than slowing you down. It is showing you how the pattern enters, which means the chapter can name it before it hardens.": "その間は、あなたを減速させているだけではありません。パターンがどう入ってくるかを見せています。だからこそ、固まる前に章はそれに名前をつけることができるのです。"
  "The afternoon light is flat and gray": "午後の光は平らで、灰色を帯びている"
  "The body already knows something the mind has not caught up with yet. Let it lead for a moment.": "身体は、頭がまだ追いついていない何かを、すでに知っています。少しの間、身体に先導させてください。"
  "The body is already behaving like the threat is real. This is where the chapter has to begin.": "身体はすでに、その脅威が本物であるかのように振る舞っています。この章は、そこから始まらなければなりません。"
  "The body learns through action, not agreement. Give it one move it can actually make right now.": "身体は同意ではなく、行動を通して学びます。いまこの瞬間に実際にできる一つの動きを、身体に与えてください。"
  "The body registers change in its own time. Give it that time before the next chapter begins.": "身体は自分の時間で変化を記録します。次の章が始まる前に、その時間をあげてください。"
  "The core mechanism is this: {core} Once the nervous system flags a moment as dangerous, it narrows perception to confirm the danger. Counter-evidence gets filtered out. The feeling becomes self-reinforcing.": "中核のメカニズムはこれです――{core} 神経系がある瞬間を「危険」と印をつけると、危険を裏付けるほうへ知覚が狭まります。反証はふるい落とされ、感覚は自分自身を強化しはじめます。"
  "The danger here is not the moment itself. It is the meaning shame races to stamp onto it, which means the injury often lands after the event.": "ここでの危うさは、瞬間そのものではありません。恥が急いでそこに押しつけようとする意味、それが危うさです。だから傷は、出来事のあとになって落ちてくることが多いのです。"
  "The exercise that follows is not meant to fix anything. It is meant to make the pattern visible in your body.": "これから続くエクササイズは、何かを直すためのものではありません。あなたの身体の中でパターンを見えるようにするためのものです。"
  "The explanation can only go so far. A story goes the rest of the way.": "説明が行けるところには、限界があります。残りの道のりは、物語が運んでくれます。"
  "The instinct to move past this moment quickly is itself data. Slow down and see what it protects.": "この瞬間を早く通り過ぎたいという本能、それ自体がデータです。速度を落とし、それが何を守ろうとしているか見てください。"
  "The next part is not instruction. It is evidence drawn from someone's lived experience.": "次に続くのは、指示ではありません。誰かの実際の経験から引き出された証拠です。"
  "The next pressure point is harder to admit: what happens when someone else's life starts writing your standards for you.": "次の圧点は、認めるのがもっと難しいものです――誰か他人の人生が、あなたの基準を代わりに書きはじめたとき、何が起こるか。"
  "The pattern gets clearest when you can see the price land on a real person.": "そのパターンがもっとも鮮明になるのは、代償が実在する人物の上に降りるのを見られるときです。"
  "The pattern underneath: {core} Your body responds to the prediction of danger with the same chemistry it would use for actual danger. That chemistry does not care whether the prediction is accurate.": "その下にあるパターン――{core} あなたの身体は、危険の予測に対して、本物の危険に使うのとまったく同じ化学反応で応えます。その化学は、予測が正確かどうかなど気にしません。"
  "The point is that anxiety predicts regret so loudly that it blocks useful decisions.": "肝心なのは――不安は後悔をあまりにも大声で予測するので、役に立つ決断のほうがかき消されてしまう、ということです。"
  "The point is that avoidance maps the edges of what you are not yet willing to see.": "肝心なのは――回避は、あなたがまだ見る覚悟のないものの輪郭を、知らぬ間に描き出している、ということです。"
  "The point is that awareness does not fix anything — it makes fixing unnecessary.": "肝心なのは――気づきは何かを直すのではなく、直すこと自体を不要にしてしまう、ということです。"
  "The point is that comparison uses someone else's exterior to judge your interior.": "肝心なのは――比較は他人の外側を尺度にして、あなたの内側を裁いてしまう、ということです。"
  "The point is that freedom does not need to be achieved — it needs to be recognized.": "肝心なのは――自由は達成されるべきものではなく、認識されるべきものだ、ということです。"
  "The point is that grief is not a problem to solve — it is a process to accompany.": "肝心なのは――悲しみは解くべき問題ではなく、寄り添うべき過程だ、ということです。"
  "The point is that ordinary moments carry the pattern more clearly than dramatic ones.": "肝心なのは――ドラマチックな瞬間よりも、ありふれた瞬間のほうが、パターンをずっと鮮明に運んでいる、ということです。"
  "The point is that overwhelm is a capacity signal, not a character flaw.": "肝心なのは――圧倒されることは性格の欠陥ではなく、容量の信号だ、ということです。"
  "The point is that perfection is not available, but movement is.": "肝心なのは――完璧は手に入りませんが、動きは手に入る、ということです。"
  "The point is that recognition replaces seeking — you stop looking and start seeing.": "肝心なのは――認識が求めることを置き換える、ということです。探すのをやめ、見はじめるのです。"
  "The point is that relationship is the mirror that reveals what you cannot see alone.": "肝心なのは――関係は、一人では見えないものを映し出す鏡だ、ということです。"
  "The point is that rest is not earned — it is required.": "肝心なのは――休息は稼ぐものではなく、必要とされているものだ、ということです。"
  "The point is that seeing the pattern clearly is the first step toward not being run by it.": "肝心なのは――パターンをはっきり見ることが、それに振り回されなくなる最初の一歩だ、ということです。"
  "The point is that seeing the pattern is the beginning of freedom from it.": "肝心なのは――パターンを見ることが、そこからの自由のはじまりだ、ということです。"
  "The point is that seeking is the activity that obscures what is already here.": "肝心なのは――求めることそれ自体が、すでにここにあるものを覆い隠している、ということです。"
  "The point is that shame says you are the problem, but shame is a pattern, not a verdict.": "肝心なのは――恥はあなた自身が問題だと告げますが、恥はパターンであって、判決ではない、ということです。"
  "The point is that the alarm fires on prediction, not evidence.": "肝心なのは――警報は証拠ではなく、予測に対して鳴る、ということです。"
  "The point is that the alarm is information, not instruction.": "肝心なのは――警報は情報であって、指示ではない、ということです。"
  "The point is that the body knows before the mind does — trust the body.": "肝心なのは――身体は頭よりも先に知っている、ということです。身体を信頼してください。"
  "The point is that the contraction is not who you are — it is what you do.": "肝心なのは――その収縮はあなた自身ではなく、あなたがやっていることだ、ということです。"
  "The point is that the feeling is real, but the story the feeling tells is often inaccurate.": "肝心なのは――感覚は本物ですが、その感覚が語る物語のほうは、しばしば正確ではない、ということです。"
  "The point is that the mechanism treats every decision like a permanent threat.": "肝心なのは――そのメカニズムは、すべての決断を恒久的な脅威として扱ってしまう、ということです。"
  "The point is that the part of you that watches is not the part that decides.": "肝心なのは――見ているあなたと、決めているあなたは、別の部分だ、ということです。"
  "The point is that the separate self is an activity, not an entity.": "肝心なのは――分離した自己は、実体ではなく、活動だ、ということです。"
  "The point is that vulnerability is not the risk — the armor is.": "肝心なのは――傷つきやすさはリスクではなく、その鎧のほうがリスクだ、ということです。"
  "The point is that what you are holding is costing more energy than you realize.": "肝心なのは――あなたが抱えているものは、自覚しているよりもずっと多くのエネルギーを使っている、ということです。"
  "The point is that what you are protecting yourself from is often less dangerous than the protection.": "肝心なのは――あなたが自分を守ろうとしている対象よりも、その防衛のほうが危険であることが多い、ということです。"
  "The point is that what you are seeking is already present before you start looking.": "肝心なのは――あなたが探しているものは、探しはじめる前から、すでにここにある、ということです。"
  "The point is that you can act inside uncertainty without waiting for it to resolve.": "肝心なのは――不確かさが解けるのを待たずに、その内側で動くことができる、ということです。"
  "The point is that you have been working harder than you realize to stay contracted.": "肝心なのは――縮こまっていつづけるために、あなたは自覚以上に懸命に働いている、ということです。"
  "The point is that your nervous system responds to predictions, not facts.": "肝心なのは――あなたの神経系は事実ではなく、予測に反応する、ということです。"
  "The recursion is infinite. Each layer creates a new layer to observe.": "再帰は無限です。一つの層が、観察するための次の層を生んでいきます。"
  "The shift from understanding to doing is where most chapters lose people. Stay with this one.": "理解から実行への移行――ここで多くの章は読者を失います。この章とは、ぜひ最後まで付き合ってください。"
  "The shift may be small. Small is not insignificant. Small is where lasting change begins.": "その変化は小さいかもしれません。小さいことは、取るに足らないこととは違います。続いていく変化は、いつも小さいところから始まります。"
  "The sting is not just what you saw. It is how fast your system turned it into a verdict, which means the pain starts before you can question the math.": "刺さるのは、見たものそのものだけではありません。あなたのシステムがそれを判決に変換した速度、それが刺さるのです。だから、その計算を問い直す前に、痛みはもう始まっています。"
  "Theory describes the shape. A story lets you feel the weight of it.": "理論はかたちを描きます。物語は、その重さを感じさせてくれます。"
  "There is a micro-flinch the body makes before the mind builds its story. That flinch is the trailhead.": "頭が物語を組み立てる前に、身体が見せる微細なひるみがあります。そのひるみが、登山道の入口です。"
  "This audiobook has a companion {workbook_label} with all the exercises ": "このオーディオブックには、すべてのエクササイズを収めた{workbook_label}が付属しています "
  "This audiobook has a companion {workbook_label} with all the exercises and reflection prompts.": "このオーディオブックには、すべてのエクササイズと振り返りの問いを収めた{workbook_label}が付属しています。"
  "This audiobook has a companion {workbook_label} with all the exercises and reflection prompts. You can get it free at {url}.": "このオーディオブックには、すべてのエクササイズと振り返りの問いを収めた{workbook_label}が付属しています。{url}から無料で入手できます。"
  "This audiobook has a companion {workbook_label}...": "このオーディオブックには、{workbook_label}が付属しています……"
  "This book applies {teacher}'s teachings to the specific experience of {persona} navigating {topic}.": "本書は、{teacher}の教えを、{topic}を渡り歩く{persona}という具体的な経験に適用したものです。"
  "This book applies {teacher}'s teachings to the specific experience of {persona} navigating {topic}. It does not replace the teacher's original work. Where I have adapted exercises or frameworks, I have done so with care and transparency. Any simplification is mine, not theirs.": "本書は、{teacher}の教えを、{topic}を渡り歩く{persona}という具体的な経験に適用したものです。本師の原典に取って代わるものではありません。エクササイズや枠組みを翻案した箇所は、慎重さと透明さをもって行いました。単純化された部分があれば、それは本師ではなく、私の責任です。"
  "This book drew from the teachings of {teacher} to offer you a practical path through {topic}. But what you have read here is only one application — shaped by my perspective and filtered through the specific challenges of {persona}.": "本書は{teacher}の教えに学びながら、{topic}を通り抜けるための実用的な道筋をあなたに差し出そうとしました。けれどここで読んだことは、たった一つの応用にすぎません――私の視点によって形づくられ、{persona}という具体的な困難を通してろ過されたものです。"
  "This book drew from the teachings of {teacher} to offer you a practical path through {topic}. But what you have read here is only one application.": "本書は{teacher}の教えに学びながら、{topic}を通り抜けるための実用的な道筋をあなたに差し出そうとしました。けれどここで読んだことは、たった一つの応用にすぎません。"
  "This is Body Scan.": "これはボディスキャンです。"
  "This is Breath Awareness.": "これは呼吸への気づきです。"
  "This is Cellular Awareness.": "これは細胞レベルの気づきです。"
  "This is Conflict De-escalation.": "これは衝突を鎮める実践です。"
  "This is Exercise.": "これはエクササイズです。"
  "This is Grounding Practice.": "これはグラウンディングの実践です。"
  "This is Journaling Prompt.": "これは書くことのための問いです。"
  "This is Meditation.": "これは瞑想です。"
  "This is Reflection.": "これは振り返りです。"
  "This is Self-Compassion Check.": "これは自己への慈しみを確かめる実践です。"
  "This is the turning point. Not a dramatic revelation. A quiet noticing.": "これが転換点です。劇的な啓示ではありません。静かな気づきです。"
  "This is where comparison does its quiet damage: it makes another person's surface feel like evidence against you.": "比較が静かに傷を残すのは、まさにここです――他人の表面を、自分に不利な証拠のように感じさせてしまうのです。"
  "This is why the freeze starts earlier than the choice: loss becomes imaginable before the decision does.": "凍りつきが、選ぶよりも先に始まる理由はここにあります――決断より前に、喪失のほうが先に想像できてしまうのです。"
  "Trim REFLECTION to the most thesis-relevant sentences.": "REFLECTION を、テーゼにもっとも関連する文に絞り込んでください。"
  "Underneath the feeling is a simple mechanism: {core} When the alarm runs the response, your nervous system treats uncertainty like danger and asks for impossible certainty. That is why ordinary moments feel heavy.": "その感覚の下にあるのは、単純なメカニズムです――{core} 警報が応答を仕切ると、神経系は不確かさを危険として扱い、不可能な確実さを要求しはじめます。ありふれた瞬間が重く感じられるのは、そのためです。"
  "Understanding without practice is just information. The body needs something to do with what it just learned.": "実践のない理解は、ただの情報です。たった今学んだことを、身体は何かに使う必要があります。"
  "We will go deeper. But it starts here, with what your body already knows.": "もっと深く入っていきます。けれど始まりはここです――あなたの身体がすでに知っていることから。"
  "What drives this: {core} The system was built for physical threats in open landscapes. It now runs in offices, apartments, and group chats. The mismatch between threat model and actual environment is the source of most suffering.": "これを動かしているのは――{core} このシステムは、開けた風景の中の物理的な脅威のために作られました。それが今、オフィスやワンルームやグループチャットの中で稼働しています。脅威モデルと実際の環境とのずれ、それが多くの苦しみの源です。"
  "What follows is not a metaphor. It is a report from someone who lived inside this pattern.": "これから書くことは、比喩ではありません。このパターンの内側で暮らした人からの報告です。"
  "What follows is not a test. It is an invitation to feel the mechanism while it is still warm.": "これから続くのは、テストではありません。メカニズムがまだ温かいうちに、それを感じるための招待状です。"
  "What looks like indecision is usually grief arriving before the decision does. That matters because the body treats the prediction like fact.": "優柔不断に見えるものは、たいてい、決断より先に到着している悲しみです。問題はそこです――身体は、予測を事実のように扱ってしまいます。"
  "What looks small on the screen can still feel expensive in the body. That matters because capacity gets spent before effort begins.": "画面の上では小さく見えるものも、身体の中では高くつくことがあります。問題はそこです――努力が始まる前に、容量はすでに使われています。"
  "What remains is not more explanation. It is the next place this pattern asks for your life.": "残されているのは、追加の説明ではありません。このパターンが、あなたの人生のどこを次に求めてくるか、その場所です。"
  "What remains is the harder part: how to choose when loss still feels louder than relief.": "残されているのは、より難しい部分です――喪失のほうがまだ救いより大きく響くとき、どう選ぶか。"
  "What remains is the moment after the alarm fires, when your body still wants to obey a prediction.": "残されているのは、警報が鳴ったあとの瞬間――あなたの身体がなお、予測に従いたがっているその時間です。"
  "What remains is the quieter cost: what repeated overload teaches you to stop asking for.": "残されているのは、もっと静かな代償です――繰り返される過負荷が、あなたに「もう求めるな」と教え込んでしまうもの。"
  "What remains is the sentence shame writes after the moment is over, when it tries to turn one event into identity.": "残されているのは、瞬間が過ぎ去ったあとに恥が書きつける一文――一つの出来事をアイデンティティに変えようとする、その文です。"
  "What remains is what the body remembers after the mind stops arguing.": "残されているのは、頭が議論をやめたあとに身体が覚えていることです。"
  "What you just felt is not a distraction from the point. It is the point arriving ahead of language.": "たった今あなたが感じたものは、本題から逸れたものではありません。言葉に先んじて到着した、本題そのものです。"
  "Whatever just moved in you does not need to be understood yet. It needs to be felt.": "あなたの中でいま動いたものは、まだ理解される必要はありません。感じられる必要があります。"
  "Words about the pattern only go so far. What follows is the pattern caught in the act.": "パターンについての言葉が行けるところには、限界があります。これから続くのは、現行犯で捉えられたパターンそのものです。"
  "You can see the mechanism better when it borrows someone else's future first.": "メカニズムをよりよく見るには、それがまず他人の未来を借りているところを見るのが一番です。"
  "You do not need to master this. You need to try it once and notice what happens.": "これを習得する必要はありません。一度試して、何が起こるかに気づくこと――それだけで十分です。"
  "You watch yourself performing, then watch yourself watching, then evaluate how well you stopped watching. ": "演じている自分を見て、見ている自分を見て、そして「見るのをやめられた度合い」を採点する。 "
