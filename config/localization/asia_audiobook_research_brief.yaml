platform_checklist:
  ja_JP:
    market_structure_note: "Dominated by domestic conglomerates. Audible Japan has distinct catalog and rankings from US."
    primary_platforms:
      - name: Audible Japan
        url_or_path: amazon.co.jp/audible
        navigation_notes:
          - "Navigate to Audibleオリジナル (Originals) and ベストセラー (Bestsellers)"
          - "Filter by 自己啓発 / 生き方 and 健康 / 美容"
          - "Rankings split between 総合 (Overall) and 会員限定 (Members Only) — capture both"
          - "Note if title is Audible限定 (Audible Exclusive)"
      - name: Rakuten Kobo Japan
        search_notes: "Search for オーディオブック, filter by ビジネス・自己啓発"
      - name: audiobook.jp
        notes: "Check for rankings"
    _source:
      file: artifacts/research/deepseek_bestseller_plan_2026_03_23.md
      section: "### 1. Japan (ja_JP)"
      extracted_at: "2026-03-31"
  ko_KR:
    market_structure_note: "Highest audiobook penetration in Asia. Split between three major domestic players."
    primary_platforms:
      - name: Naver Series
        url: series.naver.com
        notes:
          - "Select 오디오북 → 인기순 or 베스트"
          - "Filter 자기계발 and 건강"
      - name: "Millie's Library (밀리의 서재)"
        notes:
          - "Subscription service — may need free trial"
          - "Search 웰니스 or browse 에세이; look for 많이 듣는 오디오북"
      - name: Ridi (리디)
        notes:
          - "Sort by 인기순"
          - "Filter 자기계발 and 인문"
    key_insight: "Korean charts are usually real-time popularity (based on consumption), not just sales."
    _source:
      file: artifacts/research/deepseek_bestseller_plan_2026_03_23.md
      section: "### 2. South Korea (ko_KR)"
      extracted_at: "2026-03-31"
  zh_TW:
    market_structure_note: "Traditional Chinese. Mix of local players and Kobo."
    primary_platforms:
      - name: Kobo Taiwan
        url: kobo.com/tw/zh/audiobooks
        notes:
          - "Filter by 暢銷排行榜"
          - "Drill down 非文學 > 自我成長 or 健康生活"
      - name: Readmoo
        url: readmoo.com
        notes: "Search 有聲書, sort by 暢銷度"
      - name: PressPlay Academy
        notes: "Curated audio content"
    critical_keyword: 身心靈
    youtube_note: "Many Taiwanese wellness authors release audio chapters on YouTube. Check trending under Education."
    _source:
      file: artifacts/research/deepseek_bestseller_plan_2026_03_23.md
      section: "### 3. Taiwan (zh_TW)"
      extracted_at: "2026-03-31"
  zh_CN:
    market_structure_note: "Most complex. Standard Audible does not operate here. Dominated by super-apps."
    primary_platforms:
      - name: Ximalaya FM (喜马拉雅)
        url: ximalaya.com
        notes:
          - "Navigate to 排行榜 → 畅销榜"
          - "Filter 个人成长, 健康养生, 心理"
          - "Data as 播放量 — 10M+ plays = functionally a bestseller"
      - name: Dedao (得到)
        notes: "Search 健康 and 自我管理"
      - name: Lizhi FM (荔枝)
      - name: Qingting FM (蜻蜓FM)
        notes: "Secondary platforms"
    _source:
      file: artifacts/research/deepseek_bestseller_plan_2026_03_23.md
      section: "### 4. China (zh_CN)"
      extracted_at: "2026-03-31"
  zh_HK:
    market_structure_note: "Bilingual (Cantonese/Mandarin). Often grouped with Taiwan by distributors; preferences differ."
    primary_platforms:
      - name: Google Play Books
        notes: "Set region to Hong Kong, filter 有聲書, sort 暢銷商品"
      - name: Kobo Hong Kong
        notes: "Switch region to HK, filter 中文有聲書; 非文學 and 自我成長"
      - name: HyRead
        notes: "Used by public libraries"
    critical_note: "Run TWO searches — Traditional Chinese and English. Cross-reference lists."
    _source:
      file: artifacts/research/deepseek_bestseller_plan_2026_03_23.md
      section: "### 5. Hong Kong (zh_HK)"
      extracted_at: "2026-03-31"
  zh_SG:
    market_structure_note: "Trilingual (English, Mandarin, Malay). Smaller Chinese market; regional hub."
    primary_platforms:
      - name: Audible Singapore
        url: audible.com
        notes: "Set location to Singapore, filter Chinese, Best Sellers"
      - name: Kobo Singapore
        url: kobo.com/sg
        notes: "Audiobooks, Chinese, Bestsellers"
      - name: NLB via Libby
        notes: "Popular section — longest waitlists = demand indicator"
    key_insight: "Singapore Chinese market often imports Taiwanese (zh_TW) editions; note publishing origin."
    _source:
      file: artifacts/research/deepseek_bestseller_plan_2026_03_23.md
      section: "### 6. Singapore (zh_SG)"
      extracted_at: "2026-03-31"

synthesis_and_limits:
  cross_reference_bullets:
    - "Local originals vs translated Western titles (e.g. Atomic Habits)."
    - "Universal hits: titles across multiple platforms in same market = true bestsellers."
  metadata_dimensions:
    - Narrator (celebrity / author-narrated driver)
    - Format (full audiobook vs summary vs lecture series)
    - Price vs subscription (subscription markets: most listened charts more valuable)
  limitations:
    - "App-only data: Ximalaya and Millie's hide analytics behind mobile apps."
    - "Dynamic charts: scrape same time of day over 3 consecutive weeks."
    - "Monday 10:00 AM local time recommended for consistent capture."
  _source:
    file: artifacts/research/deepseek_bestseller_plan_2026_03_23.md
    section: "## Phase 3: Synthesis & Verification / ### Limitations & Workarounds"
    extracted_at: "2026-03-31"

