  ? 'Underneath the feeling is a simple mechanism: {core} When the alarm runs the response, your nervous system treats uncertainty like danger and asks for impossible certainty. That is why ordinary moments
    feel heavy.'
  : "在這種感覺之下是一個簡單的機制：{core} 當警報引發反應時，你的神經系統會將不確定性視為危險，並要求不可能的確定性。這就是為什麼平凡的時刻會感到沉重。  \n---"
  Understanding without practice is just information. The body needs something to do with what it just learned.: "沒有實踐的理解只是資訊。身體需要對剛學到的東西有所行動。  \n---"
  We will go deeper. But it starts here, with what your body already knows.: "我們將會更深入。但這一切從這裡開始，從你的身體已經知道的東西開始。  \n---"
  ? 'What drives this: {core} The system was built for physical threats in open landscapes. It now runs in offices, apartments, and group chats. The mismatch between threat model and actual environment
    is the source of most suffering.'
  : 驅動這一切的是：{core} 這個系統原本是為開放環境中的物理威脅而設計的。如今它運行在辦公室、公寓和群組聊天中。威脅模型與實際環境之間的不匹配是大多數痛苦的來源。
  What follows is not a metaphor. It is a report from someone who lived inside this pattern.: 接下來的內容不是隱喻，而是來自曾身處此模式中的人的報告。
  What follows is not a test. It is an invitation to feel the mechanism while it is still warm.: "接下來的不是測試。而是一個邀請，讓你在它還熱的時候去感受這個機制。  \n---"
  ? What looks like indecision is usually grief arriving before the decision does. That matters because the body treats the prediction like fact.
  : 看起來像是猶豫不決的，通常是悲傷在決定做出之前就到來了。這很重要，因為身體會將預測當作事實來處理。
  ? What looks small on the screen can still feel expensive in the body. That matters because capacity gets spent before effort begins.
  : "在螢幕上看起來微不足道的事物，仍可能在身體中感覺昂貴。這很重要，因為容量在努力開始之前就被消耗了。  \n---"
  What remains is not more explanation. It is the next place this pattern asks for your life.: 剩下的不是更多解釋。而是這個模式要求你生命中的下一個地方。
  'What remains is the harder part: how to choose when loss still feels louder than relief.': "剩下的問題更困難：當損失仍比緩解更響亮時，如何選擇。  \n---"
  What remains is the moment after the alarm fires, when your body still wants to obey a prediction.: "剩下的問題是警報響起後的那一刻，當你的身體仍想遵循預測。  \n---"
  'What remains is the quieter cost: what repeated overload teaches you to stop asking for.': 剩下的，是較為安靜的代價：重複的過載教會你停止索求的東西。
  What remains is the sentence shame writes after the moment is over, when it tries to turn one event into identity.: 剩下的問題是那一刻結束後，羞恥寫下的句子，當它試圖將一個事件轉化為身份。
  What remains is what the body remembers after the mind stops arguing.: "剩下的，是當心停止爭辯後，身體所記得的。  \n---"
  What you just felt is not a distraction from the point. It is the point arriving ahead of language.: "你剛感受到的並非與重點無關的分心。那是重點在語言之前到達。  \n---"
  Whatever just moved in you does not need to be understood yet. It needs to be felt.: 剛在你內心產生的變化，此刻尚無需理解。它需要被感受。
  Words about the pattern only go so far. What follows is the pattern caught in the act.: "關於模式的言詞只能到此為止。接下來的是模式被逮個正著。  \n---"
  You can see the mechanism better when it borrows someone else's future first.: 當它先借用他人的未來時，你會更清楚地看到機制。
  You do not need to master this. You need to try it once and notice what happens.: "你不需要掌握這個。你需要試一次並注意發生了什麼。  \n---"
