    pricing_posture: accessible
    notes: >
      Taiwan cultural context: filial piety, ancestor veneration,
      collective vs individual grief. Content must honor these.

  inner_security_tw:
    locale: zh-TW
    territory: TW
    display_name: "內在安全感"
    voice_identity:
      register: warm_boundaried
      pace: 0.90
      gender_default: female
