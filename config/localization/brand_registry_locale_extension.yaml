# brand_registry_locale_extension.yaml
# Locale and territory fields to add to every brand in brand_registry.
# Each brand is locked to ONE locale and ONE territory.
# A book inherits these from its brand. One brand = one market.
#
# POLICY:
# - en-US brands: 24 core brands (existing). Baseline catalog.
# - Non-US brands: Separate brand IDs per locale.
#   e.g. sleep_repair (en-US) ≠ sleep_repair_tw (zh-TW)
# - Brand IDs must be unique across all locales.
# - persona_affinity must reference personas valid for that locale.
#
# Authority: SYSTEMS_DOCUMENTATION §27

schema_version: 1

# ─── LOCALE BRAND NAMING CONVENTION ─────────────────────────────────────────
#
# en-US brands: existing names (sleep_repair, stabilizer, etc.)
# Other locales: {brand_name}_{locale_suffix}
#
# Locale suffixes:
#   zh-TW → _tw
#   zh-HK → _hk
#   zh-CN → _cn
#   zh-SG → _sg
#   ja-JP → _jp
#   ko-KR → _kr
#   es-US → _es_us
#   es-ES → _es_es
#   fr-FR → _fr
#   de-DE → _de
#   hu-HU → _hu

# ─── PHASE 1: TAIWAN (zh-TW) PILOT BRANDS ────────────────────────────────────
# 6 pilot brands. Highest-opportunity topics for Taiwan market.
# Expand to full 24 after pilot wave validates locale separation.

brands:

  # EN-US church/distribution-only brand (no teacher). See docs/CHURCH_BRAND_MAPPING.md.
  norcal_dharma:
    locale: en-US
    territory: US

  sleep_repair_tw:
    locale: zh-TW
    territory: TW
    display_name: "睡眠修復"
    voice_identity:
      register: gentle_authority
      pace: 0.82
      gender_default: female
      elevenlabs_voice_id: TBD          # assign after voice audition in zh-TW
      google_voice: cmn-TW-Wavenet-A
    persona_affinity:
      high:
        - anxious_insomniac_tw          # Taiwan-specific persona
        - burned_out_professional_tw
      medium:
        - gen_z_tw
    topic_coverage:
      - sleep_anxiety
      - nervous_system
      - racing_thoughts
    gtm_identity:
      emotional_job: "停止懼怕夜晚"     # Stop dreading the night
      functional_job: "不靠藥物入睡"    # Fall asleep without medication
      discovery_hook: "你不需要更努力嘗試入睡，你需要停止嘗試"
    pricing_posture: accessible
    notes: "Taiwan market. Traditional script. Mandarin TTS."

  stabilizer_tw:
    locale: zh-TW
    territory: TW
    display_name: "壓力穩定器"
    voice_identity:
      register: warm_professional
      pace: 0.90
      gender_default: female
