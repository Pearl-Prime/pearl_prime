      Crisis-moment content. Critical: keep sessions under 15 min.
      Taiwan market has growing awareness of panic disorder.

  gen_z_grounding_tw:
    locale: zh-TW
    territory: TW
    display_name: "Z世代落地"
    voice_identity:
      register: peer
      pace: 1.00
      gender_default: female
      google_voice: cmn-TW-Wavenet-A
    persona_affinity:
      high:
