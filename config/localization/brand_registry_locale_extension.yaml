    pricing_posture: mid_tier
    notes: "Taiwan burnout market. Significant demand in tech sector."

  panic_first_aid_tw:
    locale: zh-TW
    territory: TW
    display_name: "恐慌急救"
    voice_identity:
      register: steady_direct
      pace: 0.95
      gender_default: female
      google_voice: cmn-TW-Wavenet-A
    persona_affinity:
      high:
        - acute_anxiety_sufferer_tw
      medium:
        - gen_z_tw
        - burned_out_professional_tw
