# native_check_contract.yaml
# Schema authority for translation native-check on production paths.
# Every non-baseline translated atom must declare native_check: y | n.
# Production shipping requires native_check: y.
#
# Gate: scripts/ci/check_native_check.py
# CI: .github/workflows/locale-gate.yml (bootstrap transition),
#     scripts/run_production_readiness_gates.py gate #33

schema_version: 1

baseline_locale: en-US

# Locales that require native_check on translated production atoms.
# Sourced from locale_registry.yaml → locale_groups.all_locales minus baseline.
non_baseline_locales:
  - zh-CN
  - zh-TW
  - zh-HK
  - zh-SG
  - ja-JP
  - ko-KR
  - es-US
  - es-ES
  - fr-FR
  - de-DE
  - it-IT
  - hu-HU
  - pt-BR

# Allowed values for native_check (lowercase only).
allowed_values:
  - y
  - n

# Production shipping requires y. n = reviewed but not native-fit; blocks ship.
production_ship_value: y

# What native_check: y certifies (human or comparator-loop judgment).
y_criteria:
  - semantic_fidelity
  - idiomatic_fit
  - cultural_fit
  - persona_register_fit
  - emotional_temperature
  - typography_norms
  - no_calque

production_paths:
  teacher_banks:
    glob: "SOURCE_OF_TRUTH/teacher_banks/*/approved_atoms_localized/{locale}/**/*.yaml"
    field: native_check
    description: >
      Inline native_check on each localized teacher-bank atom YAML.

  atoms_locales:
    glob: "atoms/**/locales/{locale}/"
    sidecar: native_check.yaml
    description: >
      Per-locale directory sidecar listing variant keys (v01–v20) with y/n.
      Variant keys are parsed from CANONICAL.txt headers:
        ## SLOT vNN   (production atom format)
        --- variant: vNN   (accepted alternate)

atoms_sidecar_schema:
  schema_version: 1
  required_top_level:
    - variants
  variant_key_pattern: "^v\\d{2}$"
  variant_value_enum:
    - y
    - n

gate_modes:
  bootstrap_mode:
    description: >
      Transition mode for landing the contract while corpus is unannotated.
      Missing native_check emits warnings and exits 0.
      Invalid values still fail. native_check: n fails when production_only.
  production_only:
    description: >
      Ship gate. Fail on missing native_check or native_check: n.
      Only native_check: y passes. Use for companion translation PRs and
      production acceptance once Sequential gate 2 flips CI off bootstrap.
