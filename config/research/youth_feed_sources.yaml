# Youth and generational research — feed URLs and platform links.
# Used by research_feeds_ingest workflow or manual paste into Qwen3 prompts.
# See docs/research/continue_gen_research3.md and docs/research/RESEARCH_FEED_SOURCES.md.

schema_version: 1

# RSS feeds (fetch to artifacts/research/raw/ or youth_feed_snapshots/)
rss:
  # 2026-03-31 verified: unicef.org RSS (media_17653.xml, press-releases/rss, stories/rss, /rss) returns HTTP 403
  # Cloudflare "Attention Required" to scripted clients; urllib/curl and PearlNewsResearch UA blocked.
  # No stable machine-readable feed URL found for automated ingest — use Playwright/browser capture or manual paste.
  - id: unicef_news
    type: manual
    url: https://www.unicef.org/press-releases
    description: UNICEF press releases (human/browser capture only; RSS blocked 403)
    refresh: weekly
  # 2026-03-31 verified: youthenvoy/feed/ returns 200 HTML (Drupal portal), not RSS/XML.
  # news.un.org topic/youth RSS returns HTTP 200 with empty body (broken/empty feed on server).
  # Using official UN News topic feed for Culture and Education as youth-adjacent UN editorial RSS.
  - id: un_youth
    url: https://news.un.org/feed/subscribe/en/news/topic/culture-and-education/feed/rss.xml
    description: UN News — Culture and Education (RSS proxy; replaces UN Youth Envoy /feed/ HTML)
    refresh: weekly
  # Add more as needed, e.g.:
  # - id: pew_research
  #   url: https://www.pewresearch.org/feed/
  #   refresh: weekly

# Platforms where youth conversation lives (no API; manual paste or link list)
platforms:
  - name: TikTok
    importance: extremely_high
    note: Curate trend/comment snippets; paste into paste-and-extract prompts
  - name: Reddit
    importance: high
    note: Subreddit RSS or manual paste to youth_feed_snapshots/
  - name: YouTube
    importance: high
    note: Manual paste of comments or transcript
  - name: Discord
    importance: medium
    note: Manual paste of server summaries or quotes
  - name: Instagram
    importance: medium
    note: Manual paste or link list

# Optional: Teen Vogue Politics, Pew Youth, etc. (add url when available)
curated_links:
  - label: Teen Vogue Politics
    url: https://www.teenvogue.com/tag/politics
    refresh: manual
  - label: Pew Research
    url: https://www.pewresearch.org/topic/generations-age/generation-z/
    refresh: manual
