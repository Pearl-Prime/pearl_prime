# v32_qa_checklist.yaml
# QA Checklist for Rendered Books v3.2
#
# Comprehensive pre-publication quality checks for Writers Bible v3.2 rendered books.
# All items must pass before book moves to audio rendering or publication.
#
# Authority: Writers Bible v3.2, §QA_Framework

version: 3.2
config_type: qa_checklist
checklist_type: pre_publication
severity_levels: [critical, high, medium, low]

# ─── QA CHECKLIST SECTIONS ──────────────────────────────────────────────────

sections:

  # ─── 1. TEMPLATE HYGIENE (Critical) ───────────────────────────────────────
  template_hygiene:
    section_name: "Template Hygiene"
    section_severity: critical
    description: >
      Ensures no raw template markup or placeholder tags remain in rendered output.
      These are fatal errors that make the book unreadable.
    items:
      - item_id: TH_001
        check_name: "No raw [STORY] tags in output"
        severity: critical
        rule: "Search output for '[STORY]' string. Should return 0 matches."
        resolution: "Find and render all [STORY] blocks before QA."
        qa_gate: fail_on_any_match

      - item_id: TH_002
        check_name: "No raw [HOOK] tags in output"
        severity: critical
        rule: "Search output for '[HOOK]' string. Should return 0 matches."
        resolution: "Find and render all [HOOK] blocks."
        qa_gate: fail_on_any_match

      - item_id: TH_003
        check_name: "No raw [SCENE] tags in output"
        severity: critical
        rule: "Search output for '[SCENE]' string. Should return 0 matches."
        resolution: "Find and render all [SCENE] blocks."
        qa_gate: fail_on_any_match

      - item_id: TH_004
        check_name: "No [Placeholder:] text remaining"
        severity: critical
        rule: "Search for 'Placeholder:' or '[Placeholder'. Should return 0 matches."
        resolution: "Replace all placeholder text with actual content."
        qa_gate: fail_on_any_match

      - item_id: TH_005
        check_name: "No raw {{variable}} markup"
        severity: critical
        rule: "Search for '{{' or '}}' in rendered output. Should return 0 matches."
        resolution: "All dynamic variables must be interpolated or removed."
        qa_gate: fail_on_any_match

      - item_id: TH_006
        check_name: "No TODO or FIXME comments"
        severity: critical
        rule: "Search for 'TODO', 'FIXME', 'XXX', 'HACK'. Should return 0 matches."
        resolution: "Complete or remove all development comments."
        qa_gate: fail_on_any_match

      - item_id: TH_007
        check_name: "No incomplete section markers"
        severity: critical
        rule: "No '[TK]' (journalism 'to come'), '[sic]' without context, or '...' as placeholder."
        resolution: "Fill in or properly render all incomplete sections."
        qa_gate: fail_on_any_match

  # ─── 2. STRUCTURAL INTEGRITY (High) ─────────────────────────────────────
  structural_integrity:
    section_name: "Structural Integrity"
    section_severity: high
    description: >
      Verifies that the book's chapter structure, transitions, and flow
      meet the brand's structural_signature expectations.
    items:
      - item_id: SI_001
        check_name: "Chapter count matches structural_signature"
        severity: high
        rule: >
          Brand's structural_signature specifies avg_chapters: [min, max].
          Rendered book must have chapter count within this range.
        example: "stabilizer expects 4-6 chapters. Book has 5. PASS."
        resolution: "Adjust chapter count or merge/split sections."
        qa_gate: fail_if_out_of_range

      - item_id: SI_002
        check_name: "Bridge sentences present between major sections"
        severity: high
        rule: >
          Each transition between chapters or major sections requires a bridge
          sentence that signals the move and connects to the previous content.
        example: >
          "Now that you understand how your nervous system works, let's apply
          this to the moment when burnout hits hardest: the evening spiral."
        resolution: "Add explicit bridge sentences at all major section breaks."
        qa_gate: review_required

      - item_id: SI_003
        check_name: "Intro presence matches probability"
        severity: high
        rule: >
          Brand specifies intro_probability. If 0.7, intro should be present.
          If 0.3, intro is optional but acceptable.
        example: "night_reset intro_probability: 0.6. Intro present: PASS."
        resolution: "Add or remove intro as needed."
        qa_gate: conditional_pass

      - item_id: SI_004
        check_name: "Outro presence matches probability"
        severity: high
        rule: >
          Brand specifies outro_probability. Similar to intro check.
        example: "trauma_path outro_probability: 0.9. Outro present: PASS."
        resolution: "Add or remove outro as needed."
        qa_gate: conditional_pass

      - item_id: SI_005
        check_name: "Somatic slot presence matches probability"
        severity: high
        rule: >
          Brand specifies somatic_slot_probability. Check for somatic/body-based
          practices or reset moments. If 0.8, somatic slot should be present.
        example: "stabilizer somatic_slot_probability: 0.8. Somatic reset present: PASS."
        resolution: "Add grounding, breath, or body-awareness moment."
        qa_gate: conditional_pass

  # ─── 3. THESIS & MECHANISM (High) ──────────────────────────────────────
  thesis_and_mechanism:
    section_name: "Thesis & Mechanism"
    section_severity: high
    description: >
      Verifies that the book clearly states its thesis (why the listener should care)
      and explains the mechanism (how the promise will be delivered).
    items:
      - item_id: TM_001
        check_name: "Thesis derivation present"
        severity: high
        rule: >
          Thesis must be explicitly stated and derived from brand's gtm_identity
          (emotional_job and functional_job). Reader/listener should understand
          'why this matters to me' by end of intro.
        example: >
          Brand emotional_job: 'calm nervous system'
          Thesis should establish: Why nervous system matters, why this brand's
          approach is unique, why now.
        resolution: "Add explicit thesis statement in intro section."
        qa_gate: review_required

      - item_id: TM_002
        check_name: "Mechanism distillation present"
        severity: high
        rule: >
          Mechanism explains HOW the promise will be delivered. Should be
          clearly stated and understandable to target persona.
        example: >
          For stabilizer:
          Mechanism: "By learning to recognize your nervous system's signals
          and responding with specific somatic reset practices."
        resolution: "Add explicit mechanism explanation (usually mid-intro or early chapter 1)."
        qa_gate: review_required

      - item_id: TM_003
        check_name: "Mechanism steps are numbered or clearly delineated"
        severity: high
        rule: >
          If mechanism has multiple steps, they must be clearly numbered or
          otherwise visually distinct. Reader must be able to follow the logic.
        example: >
          "Here are the three shifts in nervous system understanding that
          change everything: 1) X, 2) Y, 3) Z"
        resolution: "Add visual structure (numbering, bold headers, line breaks)."
        qa_gate: review_required

  # ─── 4. EMOTIONAL VOCABULARY (High) ────────────────────────────────────
  emotional_vocabulary:
    section_name: "Emotional Vocabulary"
    section_severity: high
    description: >
      Verifies that emotional language matches brand's allowed_tokens and
      respects global constraints (e.g., max 12 'reset' tokens globally).
    items:
      - item_id: EV_001
        check_name: "Emotional tokens match brand's allowed_tokens"
        severity: high
        rule: >
          Count uses of brand's emotional_vocabulary.allowed_tokens.
          Example: stabilizer allows ["calm", "grounded", "regulation", "safety"].
          Verify that emotional language primarily draws from this set.
        resolution: "Replace out-of-vocabulary emotional language."
        qa_gate: review_required

      - item_id: EV_002
        check_name: "Global 'reset' token cap at 12"
        severity: high
        rule: >
          The word 'reset' (as emotional token) appears max 12 times across
          entire published catalog. Per book: max 1-2 unless brand exception
          (e.g., night_reset has per_brand_max: 1, meaning scarce even within book).
        resolution: "Reduce 'reset' usage or substitute with synonym (regulation, recalibration)."
        qa_gate: fail_on_overage

      - item_id: EV_003
        check_name: "Global 'clarity' token cap at 18"
        severity: high
        rule: >
          'Clarity' max 18 across entire published catalog.
          Per-book: max 2-3 typically.
        resolution: "Reduce 'clarity' usage or substitute with synonym (understanding, seeing clearly)."
        qa_gate: fail_on_overage

      - item_id: EV_004
        check_name: "Global 'calm' token cap at 24"
        severity: high
        rule: >
          'Calm' max 24 across entire published catalog. Most flexible token.
          Per-book: max 3-5.
        resolution: "Monitor but generally acceptable up to limit."
        qa_gate: warn_on_approach

  # ─── 5. FORBIDDEN TITLE TOKENS (Critical) ──────────────────────────────
  forbidden_tokens:
    section_name: "Forbidden Title Tokens"
    section_severity: critical
    description: >
      Checks that global forbidden_title_tokens do not appear in
      rendered text or titles.
    items:
      - item_id: FT_001
        check_name: "No 'guaranteed' language"
        severity: critical
        rule: >
          The word 'guaranteed' must not appear in output, subtitle, chapter heads,
          or marketing copy. Creates legal risk.
        resolution: "Replace with 'likely', 'possible', 'supported by research', etc."
        qa_gate: fail_on_any_match

      - item_id: FT_002
        check_name: "No 'instant' language"
        severity: critical
        rule: >
          The word 'instant' must not appear. Creates false expectation.
          (Transformation promises use '10 minutes after pressing play' instead.)
        resolution: "Replace with time-specific claim (e.g., '10 minutes') or remove."
        qa_gate: fail_on_any_match

      - item_id: FT_003
        check_name: "No 'cure' language"
        severity: critical
        rule: >
          The word 'cure' or medical/clinical claims must not appear.
          Creates regulatory risk and false claims.
        resolution: "Reframe as 'relief', 'regulation', 'learning to manage', etc."
        qa_gate: fail_on_any_match

  # ─── 6. WORD COUNT BUDGET (Medium) ─────────────────────────────────────
  word_count_budget:
    section_name: "Word Count Budget"
    section_severity: medium
    description: >
      Verifies that book meets minimum word count and respects maximum
      duration strategy constraints.
    items:
      - item_id: WC_001
        check_name: "Minimum word count met (3000 words baseline)"
        severity: medium
        rule: >
          Minimum 3000 words for quality depth. Exception: crisis-focused
          books (panic_first_aid_tw) may be 2500 min.
        resolution: "Expand content sections or add detail/examples."
        qa_gate: fail_if_below_minimum

      - item_id: WC_002
        check_name: "Maximum word count respects duration_strategy"
        severity: medium
        rule: >
          If brand is micro_sessions heavy (0.55+), max ~7000 words.
          If brand is deep_dives heavy (0.50+), max ~12000 words.
          Calculate: expected_audio_minutes = word_count / 130 (avg WPM).
        resolution: "Trim content or split into second book."
        qa_gate: fail_if_above_maximum

      - item_id: WC_003
        check_name: "Chapter word distribution is balanced"
        severity: medium
        rule: >
          No single chapter should be >40% of total word count.
          Should distribute roughly evenly across chapters (±20% variance acceptable).
        example: >
          5-chapter book, 5000 words: expect 800-1200 per chapter.
          A chapter with 2500 words would be unbalanced.
        resolution: "Redistribute content across chapters or split chapter."
        qa_gate: review_required

  # ─── 7. CHAPTER FLOW GATE (High) ───────────────────────────────────────
  chapter_flow_gate:
    section_name: "Chapter Flow Gate"
    section_severity: high
    description: >
      Verifies logical flow from chapter to chapter.
      Reader should not experience jarring transitions or logical non-sequiturs.
    items:
      - item_id: CF_001
        check_name: "Each chapter begins with context/bridge"
        severity: high
        rule: >
          First paragraph of each chapter (except Intro) should orient reader:
          either recap of previous content, or bridge to this chapter's focus.
        resolution: "Add contextual opening paragraph."
        qa_gate: review_required

      - item_id: CF_002
        check_name: "No chapter jumps in narrative logic"
        severity: high
        rule: >
          Each chapter should build on previous chapter logically.
          If Chapter 2 introduces a concept, Chapter 3 should reference or use it.
        resolution: "Reorder chapters or add explicit connectors."
        qa_gate: review_required

      - item_id: CF_003
        check_name: "Pacing is consistent within chapters"
        severity: high
        rule: >
          Paragraphs should not vary wildly in length within a single chapter.
          (Some variation is good; extreme variation (1-sentence + 20-sentence)
          is jarring).
        resolution: "Merge short paragraphs or break up long ones."
        qa_gate: review_required

      - item_id: CF_004
        check_name: "Closure moment in final chapter"
        severity: high
        rule: >
          Final chapter should return to thesis and closure/transformation.
          Reader should feel a sense of completion.
        resolution: "Add reflective/closing section in final chapter."
        qa_gate: review_required

  # ─── 8. VOICE & TONE CONSISTENCY (High) ────────────────────────────────
  voice_and_tone:
    section_name: "Voice & Tone Consistency"
    section_severity: high
    description: >
      Verifies that voice matches brand's voice_identity and tone
      is consistent throughout.
    items:
      - item_id: VT_001
        check_name: "Voice matches brand voice_identity"
        severity: high
        rule: >
          Brand specifies voice_identity (e.g., "f_us_31_45_warm" for stabilizer).
          Check that tone/register matches this identity throughout.
        example: >
          If brand voice is "warm and authority," check for:
          - Conversational but confident language
          - Personal examples but grounded in knowledge
          - Accessible language, not overly clinical
        resolution: "Re-voice sections that don't match."
        qa_gate: review_required

      - item_id: VT_002
        check_name: "Tense consistency (mostly present tense)"
        severity: high
        rule: >
          Most content should use present or present simple tense
          ('your nervous system responds' not 'will respond').
          Exception: past examples/stories can use past tense.
        resolution: "Adjust tense for consistency."
        qa_gate: review_required

      - item_id: VT_003
        check_name: "No unexpected voice breaks or shifts"
        severity: high
        rule: >
          Unless intentional (chaos_slot: voice_shift), voice should not
          suddenly become clinical, authoritarian, or informal.
        resolution: "Revert to baseline brand voice."
        qa_gate: review_required

  # ─── 9. RESEARCH & CLAIMS (High) ───────────────────────────────────────
  research_and_claims:
    section_name: "Research & Claims"
    section_severity: high
    description: >
      Verifies that factual claims are reasonable and sources are
      indicated where necessary.
    items:
      - item_id: RC_001
        check_name: "No false or unsubstantiated claims"
        severity: high
        rule: >
          Medical/scientific claims must be accurate or attributed
          (e.g., 'Research shows...' or 'Polyvagal theory suggests...').
        resolution: "Add attribution or remove/reframe claim."
        qa_gate: review_required

      - item_id: RC_002
        check_name: "Terminology is accurate for target audience"
        severity: high
        rule: >
          If using technical terms (amygdala, HPA axis, etc.), ensure
          they're correctly used. If unfamiliar to persona, briefly explain.
        resolution: "Add brief definitions for technical terms."
        qa_gate: review_required

  # ─── 10. ACCESSIBILITY (Medium) ────────────────────────────────────────
  accessibility:
    section_name: "Accessibility"
    section_severity: medium
    description: >
      Checks readability and accessibility for target audience.
    items:
      - item_id: AC_001
        check_name: "Sentences average 15-20 words"
        severity: medium
        rule: >
          Very long sentences (>30 words) can be hard to follow in audio.
          Some complex sentences acceptable; most should be digestible.
        resolution: "Break long sentences or simplify."
        qa_gate: review_required

      - item_id: AC_002
        check_name: "No unexplained jargon"
        severity: medium
        rule: >
          Technical terms should be explained on first use or avoided.
          Brand personas are informed but not specialists.
        resolution: "Define or replace jargon."
        qa_gate: review_required

      - item_id: AC_003
        check_name: "No cultural references too niche"
        severity: medium
        rule: >
          Cultural references should resonate with target persona broadly.
          Overly niche refs exclude readers.
        resolution: "Replace with broader reference or remove."
        qa_gate: review_required

  # ─── 11. ENGAGEMENT & MOMENTUM (Medium) ────────────────────────────────
  engagement:
    section_name: "Engagement & Momentum"
    section_severity: medium
    description: >
      Checks that content maintains reader interest and momentum.
    items:
      - item_id: EG_001
        check_name: "At least 1 chaos_slot per chapter"
        severity: medium
        rule: >
          Per chaos_slot.yaml, micro sessions need 4-6 chaos slots total,
          deep dives need 8-18. Distribute across chapters (1-2 per chapter).
        resolution: "Add metaphors, pattern breaks, or voice shifts."
        qa_gate: review_required

      - item_id: EG_002
        check_name: "Examples are specific and relatable"
        severity: medium
        rule: >
          Abstract examples ('some people...') are weaker than specific,
          relatable examples. At least 60% of examples should be specific.
        resolution: "Replace generic examples with persona-specific scenarios."
        qa_gate: review_required

  # ─── 12. AUDIO READINESS (High) ────────────────────────────────────────
  audio_readiness:
    section_name: "Audio Readiness"
    section_severity: high
    description: >
      Pre-flight checks for audio rendering. Content must be
      audio-native, not just text-native.
    items:
      - item_id: AR_001
        check_name: "No bullet points or lists without verbal intro"
        severity: high
        rule: >
          If using lists, intro line should signal: 'Here are three shifts...'
          In audio, bullets are invisible; must be verbally clear.
        resolution: "Add verbal introduction to any list-based content."
        qa_gate: review_required

      - item_id: AR_002
        check_name: "No references to 'below' or 'on page X'"
        severity: high
        rule: >
          Audio has no pages/sections. Cannot say 'see diagram below' or 'on page 3'.
        resolution: "Rewrite spatial references as temporal ('as I just said')."
        qa_gate: fail_on_any_match

      - item_id: AR_003
        check_name: "Dialogue is clearly marked (if included)"
        severity: medium
        rule: >
          If dialogue appears, speaker should be clear from context or explicit.
          Audio narrator must know who's speaking.
        resolution: "Add speaker labels or rewrite to clear narration."
        qa_gate: review_required

      - item_id: AR_004
        check_name: "Parenthetical asides are minimal and clarifying"
        severity: medium
        rule: >
          Audio readers will read parentheticals; only include if necessary.
          Excessive parentheticals create confusion.
        resolution: "Minimize or integrate parentheticals into main text."
        qa_gate: review_required

# ─── QA GATE OUTCOMES ────────────────────────────────────────────────────────

qa_gate_outcomes:
  fail_on_any_match:
    definition: "Found even one instance → FAIL. Must be resolved."
    examples: [TH_001, TH_002, TH_003, TH_004, TH_005, TH_006, FT_001, FT_002]

  fail_on_overage:
    definition: "Found more than threshold → FAIL."
    examples: [EV_002, EV_003]

  fail_if_out_of_range:
    definition: "Outside acceptable range → FAIL."
    examples: [SI_001]

  fail_if_below_minimum:
    definition: "Below min threshold → FAIL."
    examples: [WC_001]

  fail_if_above_maximum:
    definition: "Above max threshold → FAIL."
    examples: [WC_002]

  conditional_pass:
    definition: "Pass if condition met (e.g., intro_probability)."
    examples: [SI_003, SI_004, SI_005]

  review_required:
    definition: "Requires human review. Cannot auto-pass/fail."
    examples: [SI_002, TM_001, CF_001]

  warn_on_approach:
    definition: "No automatic fail, but flag if approaching threshold."
    examples: [EV_004]

# ─── QA SIGN-OFF ────────────────────────────────────────────────────────────

qa_sign_off_requirements:
  all_critical_items: "PASS (0 fails, 0 waivers)"
  all_high_items: "PASS or REVIEW_COMPLETE (documented decision)"
  all_medium_items: "PASS or WAIVER (documented reason)"
  all_low_items: "Best effort"
  reviewer_approval: "Required before audio rendering"
  approval_format: "✓ QA_PASS | brand_id | date | reviewer_name"
