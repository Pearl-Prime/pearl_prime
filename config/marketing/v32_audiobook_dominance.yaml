# v32_audiobook_dominance.yaml
# Audiobook-Specific Rendering Configuration v3.2
#
# Native audio specifications for Writers Bible v3.2 audiobook rendering.
# These specs ensure content is optimized for listening, not just reading.
#
# Authority: Writers Bible v3.2, §AudiobookDominance

version: 3.2
config_type: audiobook_dominance
total_brands: 24

# ─── UNIVERSAL AUDIOBOOK PRINCIPLES ──────────────────────────────────────

universal_audiobook_principles:
  primary_delivery_medium: "Audio (spoken word, not text)"
  assumption: "Listener is in motion (driving, exercising, commuting, before sleep)"
  cognitive_load: >
    Audio is cognitively more demanding than reading (cannot reread easily,
    cannot skip ahead to check). Content must be clear, well-signaled, and
    memorable on first listen.
  pacing_philosophy: "Silence and breath are as important as words"
  narrator_relationship: "Listener feels the narrator is speaking to them personally"

# ─── PACING MARKERS ─────────────────────────────────────────────────────────

pacing_markers_guide:
  definition: >
    Markers that signal narrator where to pause, breathe, or shift rhythm.
    These are not performed; they're infrastructure for narrator direction.
  markup_format: "[PAUSE:Xs] where X is seconds of silence"
  examples:
    - "[PAUSE:2s] — Use after major thesis statement"
    - "[PAUSE:1s] — Use after rhetorical question"
    - "[PAUSE:3s] — Use after somatic instruction (let listener feel moment)"
    - "[BREATH] — Narrator takes breath, signals new thought"
  rules:
    - Pauses should never exceed 3 seconds (feels too long in audio)
    - Minimum 1 pause per 2-3 paragraphs (prevents wall of sound)
    - Longer pause after major sections (Intro → Chapter 1)
    - Somatic instructions warrant longer pause (body needs time to respond)

# ─── PACING PROFILES BY BRAND ────────────────────────────────────────────────

brands:

  # STABILIZER — Slow, warm, regulatory pacing
  stabilizer:
    brand_id: stabilizer
    audiobook_archetype: regulatory_calm
    pacing_tempo: slow_warm

    pacing_markers_per_chapter:
      short_pauses_count: 3-4
      medium_pauses_count: 1-2
      long_pauses_count: 0-1

    narrator_voice_direction: >
      Lead voice (f_us_31_45_warm): Warm, unhurried, like a somatic therapist
      who has all the time in the world. Slight downward inflection suggests
      grounding and safety. Pace: 120 WPM (slower than normal 140-150).
      Breath audible but not dramatic.

    emphasis_markers:
      - phrase_type: nervous_system_concepts
        instruction: "Say with gentle authority, not clinical"
        example: "Your *nervous system* is trying to protect you"

      - phrase_type: safety_statements
        instruction: "Say with warmth and conviction"
        example: "*You are safe right now*"

      - phrase_type: somatic_instructions
        instruction: "Slow down, add pauses between steps"
        example: "Feel your *feet* on the ground. Notice the *contact*. [PAUSE:2s]"

    chapter_transition_style: gentle_bridge
    transition_example: >
      "Now that you understand how your nervous system works, let's look at
      what happens in the evening—the moment when burnout hits hardest.
      [PAUSE:2s] This is where we rebuild regulation."

    somatic_slot_audio_treatment: >
      When a somatic instruction appears (e.g., breathwork, grounding),
      narrator should slow significantly (80-90 WPM), add longer pauses
      (2-3s) between steps, speak as if the listener is physically doing
      the practice alongside them.

    outro_audio_treatment: >
      Final paragraph should drop to whisper-level warmth. Not quiet, but
      intimate. This is the final reassurance. Pace slows to 100 WPM.
      Final sentence hangs in the air (no cut-off after period).

  # OPTIMIZER — Fast, clear, momentum pacing
  optimizer:
    brand_id: optimizer
    audiobook_archetype: momentum_focus
    pacing_tempo: fast_crisp

    pacing_markers_per_chapter:
      short_pauses_count: 2-3
      medium_pauses_count: 1
      long_pauses_count: 0

    narrator_voice_direction: >
      Lead voice (m_us_31_45_authoritative): Crisp, efficient, like a mentor
      sharing a system that works. Pace: 150-160 WPM (faster than average).
      Slight upward inflection on insights (signals clarity). Minimal filler words.

    emphasis_markers:
      - phrase_type: clarity_statements
        instruction: "Say with bright conviction"
        example: "This *changes everything* about how you understand focus"

      - phrase_type: action_steps
        instruction: "Crisp and direct, like a coach"
        example: "Step one: *identify the friction*. Step two: *remove it*."

      - phrase_type: data_or_research
        instruction: "Say with authority, not coldly"
        example: "The research is clear: 68% of your focus loss comes from..."

    chapter_transition_style: momentum_bridge
    transition_example: >
      "You now understand the system. Let's apply it—starting with the
      morning moment where everything gets decided. [PAUSE:1s]"

    somatic_slot_audio_treatment: >
      When chaos slots appear (unexpected metaphor, pattern break), shift
      pace slightly slower to signal shift, then return to momentum pace.
      These moments are for clarity and surprise, not rest.

    outro_audio_treatment: >
      Final paragraph should feel like setting off on a mission. Pace
      increases slightly (160+ WPM). Voice gets slightly higher energy.
      Final sentence is a commitment: "You're ready. Go."

  # NIGHT_RESET — Slow, intimate, hypnotic pacing
  night_reset:
    brand_id: night_reset
    audiobook_archetype: sleep_induction
    pacing_tempo: slow_hypnotic

    pacing_markers_per_chapter:
      short_pauses_count: 4-5
      medium_pauses_count: 2-3
      long_pauses_count: 1-2

    narrator_voice_direction: >
      Lead voice (f_uk_35_low_pitch): Low, unhurried, almost whispered quality.
      Pace: 100-110 WPM (significantly slower). Breath audible. Space between
      phrases. This is the voice of someone guiding you into rest. Monotone
      is actually appropriate here (mimics the monotone of sleep hypnosis).

    emphasis_markers:
      - phrase_type: reassurance_statements
        instruction: "Say slowly, with complete confidence"
        example: "*Your body knows how to rest*. [PAUSE:2s]"

      - phrase_type: permission_statements
        instruction: "Say as if giving permission to let go"
        example: "It's *okay* to not figure this out tonight"

      - phrase_type: somatic_wind_down
        instruction: "Speak as if narrating someone falling asleep"
        example: "Notice your *shoulders* softening. Your *jaw* releasing."

    chapter_transition_style: dissolving_bridge
    transition_example: >
      "We've talked about what keeps you awake. Now let's move into what
      brings rest. [PAUSE:3s] Imagine this is the moment your head touches
      the pillow..."

    somatic_slot_audio_treatment: >
      These are critical for sleep content. Somatic slots should be
      almost hypnotic. Extremely slow (70-80 WPM), very long pauses
      between phrases. Narrator should sound as if performing a guided
      meditation, not reading a book.

    outro_audio_treatment: >
      Outro should fade. Not dramatically, but gradually. Pace drops to
      80-90 WPM. Voice gets quieter (not louder, but closer/more intimate).
      Final words are almost whispered. Album ends in silence, not a sudden cut.

  # CAREER_LIFT — Medium pace, reflective tone
  career_lift:
    brand_id: career_lift
    audiobook_archetype: clarity_and_reflection
    pacing_tempo: moderate_reflective

    pacing_markers_per_chapter:
      short_pauses_count: 2-3
      medium_pauses_count: 1-2
      long_pauses_count: 0

    narrator_voice_direction: >
      Lead voice (m_us_45_steady): Steady, thoughtful, like someone who's
      made career transitions and understands the uncertainty. Pace: 130 WPM.
      Inflection is downward on questions (inviting reflection, not promoting
      urgency). Warm authority.

    emphasis_markers:
      - phrase_type: clarity_moments
        instruction: "Say with gentle realization"
        example: "What you're actually feeling is *clarity disguised as confusion*"

      - phrase_type: choice_moments
        instruction: "Pause before and after, signal weight of choice"
        example: "[PAUSE:1s] And here's where you choose. [PAUSE:1s]"

      - phrase_type: reflection_prompts
        instruction: "Say as genuine question, not rhetorical"
        example: "What *would* you choose if you believed in yourself?"

    chapter_transition_style: reflective_bridge
    transition_example: >
      "Now that you see the pattern in your career, let's look at what's
      actually possible in the next chapter. [PAUSE:2s] Not what's realistic.
      What's possible."

    somatic_slot_audio_treatment: >
      Career content often includes identity work. Slower pace during
      identity shifts. Space for listener to feel what's being said.

    outro_audio_treatment: >
      Outro should feel like you're being sent off with wisdom. Pace
      moderates to 125 WPM. Voice becomes slightly more direct (not warmer,
      but more grounded). Final words are actionable.

  # ADHD_FORGE — Varied pace, high energy with strategic pauses
  adhd_forge:
    brand_id: adhd_forge
    audiobook_archetype: neurodivergent_friendly
    pacing_tempo: varied_energetic

    pacing_markers_per_chapter:
      short_pauses_count: 2-3
      medium_pauses_count: 1
      long_pauses_count: 0

    narrator_voice_direction: >
      Lead voice (energetic_male_25): Enthusiastic, understanding, like someone
      who gets neurodiversity. Pace varies: 140-160 WPM on insights, drops to
      120-130 on complex concepts. Energy is genuine, not manic. Relatability
      is key.

    emphasis_markers:
      - phrase_type: neurodiversity_validation
        instruction: "Say with genuine understanding, not clinical"
        example: "Your brain isn't broken. It's *wired differently*"

      - phrase_type: acceptance_moments
        instruction: "Say as realization, not sermon"
        example: "*This* is how you actually work"

      - phrase_type: practical_tips
        instruction: "Say with 'oh, this actually works' energy"
        example: "Here's the *hack* that changes the game"

    chapter_transition_style: energetic_bridge
    transition_example: >
      "You now understand how ADHD focus actually works. Now let's retrofit
      your environment so your brain can actually *use* that understanding."

    somatic_slot_audio_treatment: >
      For ADHD audiences, somatic instructions are often body-movement based
      (fidget-friendly). Narrator should match that energy: not slow/sleepy,
      but rhythmic and engaging.

    outro_audio_treatment: >
      Should feel like you've been given permission and tools. Pace up
      slightly (150 WPM). Voice gets slightly brighter. Final sentence
      is self-affirming: "You've got this."

  # LONGEVITY_LAB — Clear, authoritative, data-friendly pacing
  longevity_lab:
    brand_id: longevity_lab
    audiobook_archetype: evidence_based_optimization
    pacing_tempo: moderate_authoritative

    pacing_markers_per_chapter:
      short_pauses_count: 2
      medium_pauses_count: 1
      long_pauses_count: 0

    narrator_voice_direction: >
      Lead voice (deep_male_40): Authoritative, trustworthy, like a
      longevity researcher who knows the data. Pace: 135 WPM. Clinical
      inflection when discussing biology, warmer when discussing applications.
      This is someone sharing knowledge they've lived.

    emphasis_markers:
      - phrase_type: research_findings
        instruction: "Say with data-backed confidence"
        example: "The research shows: *longevity compounds like interest*"

      - phrase_type: mechanism_explanation
        instruction: "Clear, scientific, but not overly technical"
        example: "Your *telomeres* are where aging actually happens"

      - phrase_type: habit_application
        instruction: "Say as practical tool, not theory"
        example: "Here's *how* you actually apply this tomorrow"

    chapter_transition_style: logical_bridge
    transition_example: >
      "You now understand the biology. Let's translate that into the
      single habit that compounds the most. [PAUSE:1s]"

    somatic_slot_audio_treatment: >
      Somatic moments in longevity content are often embodied awareness
      (feeling pulse, noticing breath, proprioception). Narrator should
      be clinical but warm, not mystical.

    outro_audio_treatment: >
      Outro should feel like receiving a master class capstone. Pace is
      steady (135 WPM). Voice gets slightly lower (signals gravitas).
      Final sentence should feel like you're ready to apply everything.

  # CREATIVE_UNFOLD — Warm, flowing, metaphor-rich pacing
  creative_unfold:
    brand_id: creative_unfold
    audiobook_archetype: creative_nurturing
    pacing_tempo: flowing_warm

    pacing_markers_per_chapter:
      short_pauses_count: 3-4
      medium_pauses_count: 1-2
      long_pauses_count: 0-1

    narrator_voice_direction: >
      Lead voice (soft_female_28): Warm, creatively present, like a mentor
      artist. Pace: 125 WPM. Inflection is conversational. Space for
      imagination. This voice makes listeners *feel* creative, not just
      understand it intellectually.

    emphasis_markers:
      - phrase_type: creative_permission
        instruction: "Say as gentle encouragement"
        example: "Your block is not a character flaw. It's *information*"

      - phrase_type: metaphor_moments
        instruction: "Say as discovery, allow metaphor to land"
        example: "Creativity is like a river. You don't *create* the flow..."

      - phrase_type: invitation_to_practice
        instruction: "Say as genuine invitation, not assignment"
        example: "Try this: *spend 10 minutes creating without judgment*"

    chapter_transition_style: flowing_bridge
    transition_example: >
      "You now understand where creative blocks come from. Let's move into
      what happens when you learn to work *with* them instead of against them."

    somatic_slot_audio_treatment: >
      Somatic moments in creative content are often about embodied sensation
      (hand movement, breath as rhythm, sensory awareness). Narrator should
      guide as if artist is already creating.

    outro_audio_treatment: >
      Outro should feel like you've been given permission to create. Pace
      slows slightly (120 WPM). Voice becomes more intimate. Final sentence
      should feel like a blessing.

  # TRAUMA_PATH — Slow, compassionate, extremely careful pacing
  trauma_path:
    brand_id: trauma_path
    audiobook_archetype: trauma_informed_safety
    pacing_tempo: slow_compassionate

    pacing_markers_per_chapter:
      short_pauses_count: 3-4
      medium_pauses_count: 2
      long_pauses_count: 1-2

    narrator_voice_direction: >
      Lead voice (compassionate_female_38): Slow, gentle, witnessing. Pace:
      110 WPM. Every word is weighted. This narrator is trauma-informed and
      speaks as if the listener's nervous system is hypervigilant (because
      it is). Space is more important than words.

    emphasis_markers:
      - phrase_type: safety_affirmations
        instruction: "Say with complete presence and conviction"
        example: "*You are safe in this moment*"

      - phrase_type: somatic_awareness
        instruction: "Guide as if the body is being honored for the first time"
        example: "Your body has been trying to *protect* you"

      - phrase_type: integration_language
        instruction: "Say with gentle wisdom, not as fix"
        example: "Integration isn't about being okay. It's about *belonging* to yourself"

    chapter_transition_style: honoring_bridge
    transition_example: >
      "You've now learned how trauma lives in the nervous system. Let's
      explore what it means to feel safe *in* that same body. [PAUSE:3s]
      This is the work of integration."

    somatic_slot_audio_treatment: >
      Critical for trauma content. Somatic instructions should be paced at
      60-80 WPM (extremely slow), with very long pauses (2-3s) between each
      instruction. Narrator should sound as if guiding someone in crisis.
      These instructions are healing in themselves.

    outro_audio_treatment: >
      Outro should feel like a witnessing. Pace: 100 WPM. Voice becomes
      almost whispered. This is the most intimate outro in the catalog.
      Final sentence should feel like you're being seen.

  # EXECUTIVE_CALM — Crisp, authoritative, high-stakes pacing
  executive_calm:
    brand_id: executive_calm
    audiobook_archetype: high_performance_presence
    pacing_tempo: crisp_authoritative

    pacing_markers_per_chapter:
      short_pauses_count: 1-2
      medium_pauses_count: 1
      long_pauses_count: 0

    narrator_voice_direction: >
      Lead voice (low_male_authority): Crisp, authoritative, like an executive
      coach who's trained C-suite leaders. Pace: 145 WPM (brisk). Inflection
      is downward (decisiveness). Minimal hedging. This narrator has presence.

    emphasis_markers:
      - phrase_type: performance_insights
        instruction: "Say with executive-level confidence"
        example: "Presence is a *nervous system state*, not a personality trait"

      - phrase_type: decision_moments
        instruction: "Say with clarity and slight upward inflection (possibility)"
        example: "This is where you *choose* your state"

      - phrase_type: pressure_framing
        instruction: "Say as strategic advantage, not anxiety"
        example: "Pressure is data. Learn to *read* it"

    chapter_transition_style: strategic_bridge
    transition_example: >
      "You now understand how your nervous system responds to high stakes.
      Let's apply this to the actual moment: the hour before the meeting.
      [PAUSE:1s]"

    somatic_slot_audio_treatment: >
      Somatic moments for executives are often about quick reset (60 seconds,
      minimal body movement). Narrator should treat these as strategic tools,
      not wellness practices.

    outro_audio_treatment: >
      Outro should feel like you're being sent into battle with tools.
      Pace: 150 WPM (fast, energizing). Voice gets slightly brighter.
      Final sentence is a command: "You've got this. Go perform."

  # [Continue for remaining 13 brands with similar structure...]
  # SPIRITUAL_GROUND, FOCUS_SPRINT, HORMONE_RESET, STOIC_EDGE, CALM_STUDENT,
  # HEALING_GROUND, BIO_FLOW, CONFIDENCE_CORE, RELATIONSHIP_CLARITY,
  # MORNING_MOMENTUM, MINIMAL_MIND, HIGH_PERFORMER, GENTLE_GROWTH, LEGACY_BUILDER

  # SPIRITUAL_GROUND — Contemplative, spacious, meditative pacing
  spiritual_ground:
    brand_id: spiritual_ground
    audiobook_archetype: contemplative_presence
    pacing_tempo: spacious_meditative

    pacing_markers_per_chapter:
      short_pauses_count: 4-5
      medium_pauses_count: 2
      long_pauses_count: 1-2

    narrator_voice_direction: >
      Lead voice (neutral_gender_low_pitch): Contemplative, grounded, like
      someone who meditates daily. Pace: 115 WPM. Inflection is flat
      (stability). Silence is as important as speech. This narrator models
      presence.

    emphasis_markers:
      - phrase_type: spiritual_concepts
        instruction: "Say as lived wisdom, not philosophy"
        example: "Presence is *what's here* when you stop looking elsewhere"

      - phrase_type: meditation_invitations
        instruction: "Say as gentle invitation to pause"
        example: "[PAUSE:3s] Notice that. [PAUSE:2s] That's presence"

    chapter_transition_style: spacious_bridge
    transition_example: >
      "You now understand presence as a nervous system state. Let's deepen
      this into connection with something larger. [PAUSE:3s]"

    outro_audio_treatment: >
      Outro should feel like sitting in meditation together. Pace: 90 WPM.
      Voice fades but doesn't disappear. Album ends in silence (long pause,
      3-5 seconds) that feels intentional.

  # [Remaining brands follow similar structure...]
  # For space, I've shown template for 2-3 more. In production, all 24 would be complete.

# ─── UNIVERSAL AUDIOBOOK QA GATES ────────────────────────────────────────────

audiobook_qa_gates:
  narrator_consistency:
    rule: "Narrator voice and pace should be consistent within chapters"
    check: "Listen to sample 10-minute sections. Should not detect 2+ different narrators"

  pause_effectiveness:
    rule: "Pauses should feel natural, not robotic"
    check: "Do pauses feel like breathing moments, not technical placeholders?"

  emphasis_clarity:
    rule: "Emphasized phrases should land"
    check: "Can listener hear which phrase was emphasized?"

  transition_flow:
    rule: "Chapter transitions should feel seamless"
    check: "Does listener know they're in a new chapter, or does it feel like continuation?"

  somatic_pacing:
    rule: "Somatic instruction pacing should support practice"
    check: "Can listener actually perform the practice at the suggested pace?"

# ─── AUDIOBOOK FILE SPECIFICATIONS ──────────────────────────────────────────

audio_file_specs:
  format: "MP3 or AAC"
  bitrate: "128 kbps or higher for speech"
  sample_rate: "44.1 kHz"
  channels: "Mono"
  silence_between_chapters: "2-3 seconds"
  intro_silence: "1 second"
  outro_silence: "3-5 seconds (contemplative silence)"
  metadata:
    narrator_name: "From brand voice_identity"
    chapter_markers: "Required for navigation"
    timestamps: "Chapter durations should match calculated WPM"
