# ─── VALIDATION RULES ────────────────────────────────────────────────────────

validation_requirements:
  - Each brand_id must match canonical brand_archetype_registry.yaml
  - Promise must use "10 minutes after pressing play" framing
  - Emotional state must match brand's emotional_vocabulary (max 2-3 tokens)
  - Promise must be specific, not abstract (e.g., "grounded" vs "better")
  - Promise must be single sentence or short compound sentence
  - No use of forbidden_title_tokens (guaranteed, instant, cure)
