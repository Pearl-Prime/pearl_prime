# v32_transformation_promise.yaml
# Transformation Promise v3.2
#
# Core promise template: "10 minutes after pressing play, the listener will feel {specific_emotional_state}"
#
# Each brand has ONE canonical promise tied to its therapeutic focus.
# The emotional state MUST:
# - Match brand's primary emotional_vocabulary
# - Be specific and immediate (10 minutes, not abstract)
# - Reflect the brand's structural_signature and discovery_contract
# - Be differentiable from other brands' promises
#
# Authority: Writers Bible v3.2, §TransformationPromise

version: 3.2
config_type: transformation_promises
total_brands: 24

