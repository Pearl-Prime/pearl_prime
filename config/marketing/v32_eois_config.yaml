# v32_eois_config.yaml
# Emotional Outcome Intensity Score (EOIS) v3.2
#
# EOIS = Relief (1-5) + Urgency (1-5) + Identity Shift (1-5)
# Minimum 10/15 required to pass QA gate; capped by brand-specific ceilings.
#
# Each brand has therapeutic focus that determines ceiling constraints:
# - Anxiety/urgency brands: higher urgency ceiling (5)
# - Identity/growth brands: higher identity_shift ceiling (5)
# - Calm/somatic brands: higher relief ceiling (5)
# - Pragmatic brands: balanced ceilings (4-4-4)
#
# Authority: Writers Bible v3.2, §EOIS_Framework

version: 3.2
config_type: eois_brand_ceilings
total_brands: 24

global_eois_constraints:
  min_passing_score: 10
  max_possible_score: 15
  relief_scale: [1, 5]
  urgency_scale: [1, 5]
  identity_shift_scale: [1, 5]

# ─── 24 BRAND EOIS PROFILES ────────────────────────────────────────────────────

brands:

  # STABILIZER — Calm/somatic focus; relief ceiling high
  stabilizer:
    brand_id: stabilizer
    therapeutic_focus: nervous_system_regulation
    max_relief: 5
    max_urgency: 4
    max_identity_shift: 3
    rationale: >
      Burned-out professional seeking nervous system reset. Relief and
      regulation are primary; urgency is present but secondary. Identity shift
      minimal (already secure in roles). Ceiling relief at 5 because somatic
      work can justify deep relief scores.

  # OPTIMIZER — Focus/clarity; identity and urgency balanced
  optimizer:
    brand_id: optimizer
    therapeutic_focus: focus_and_momentum
    max_relief: 4
    max_urgency: 4
    max_identity_shift: 5
    rationale: >
      High-efficiency achiever. Identity-driven (becoming more skilled, focused).
      Urgency present (morning deadline pressure). Relief secondary. Identity
      ceiling at 5 because self-concept shift (from scattered to sharp) is core
      value proposition.

  # NIGHT_RESET — Calm/somatic; relief high, urgency moderate
  night_reset:
    brand_id: night_reset
    therapeutic_focus: sleep_and_calm
    max_relief: 5
    max_urgency: 5
    max_identity_shift: 3
    rationale: >
      Insomniac creative. High urgency (late-night spiral) + high relief (stop
      dreading night). Identity shift minimal (not seeking role change).
      Both relief and urgency ceiling at 5 due to acute somatic moment.

  # CAREER_LIFT — Clarity/choice; identity and urgency high
  career_lift:
    brand_id: career_lift
    therapeutic_focus: clarity_and_decision
    max_relief: 3
    max_urgency: 5
    max_identity_shift: 5
    rationale: >
      Mid-career stalled professional. High identity shift (new role/direction).
      High urgency (Sunday planning anxiety). Relief secondary. Urgency and
      identity at 5; relief at 3.

  # ADHD_FORGE — Acceptance/focus; identity and relief balanced
  adhd_forge:
    brand_id: adhd_forge
    therapeutic_focus: acceptance_and_focus
    max_relief: 4
    max_urgency: 5
    max_identity_shift: 5
    rationale: >
      Neurodivergent young adult. High urgency (afternoon crash). High identity
      shift (stop feeling broken, embrace ADHD-aligned strategies). Relief
      moderate (regulation vs. cure).

  # LONGEVITY_LAB — Evidence-based; urgency and identity balanced
  longevity_lab:
    brand_id: longevity_lab
    therapeutic_focus: biohacking_and_habit
    max_relief: 4
    max_urgency: 4
    max_identity_shift: 5
    rationale: >
      Longevity seeker (35-60). Identity shift highest (becoming optimization-
      minded). Urgency moderate (health research evening). Relief moderate
      (habits over acute relief).

  # CREATIVE_UNFOLD — Flow/confidence; identity shift high
  creative_unfold:
    brand_id: creative_unfold
    therapeutic_focus: creative_confidence
    max_relief: 4
    max_urgency: 3
    max_identity_shift: 5
    rationale: >
      Artistic student. Identity shift core (creative confidence, unlocking
      flow). Urgency low (reflective walk, not crisis). Relief moderate.

  # RESILIENT_PARENT — Calm/identity; relief and identity high
  resilient_parent:
    brand_id: resilient_parent
    therapeutic_focus: nervous_system_and_identity
    max_relief: 5
    max_urgency: 4
    max_identity_shift: 4
    rationale: >
      Overwhelmed parent. High relief (post-bedtime somatic reset). Moderate
      urgency (not crisis). Identity moderate (parent role already present, but
      seeking to feel like person again).

  # EXECUTIVE_CALM — Performance/presence; identity and relief
  executive_calm:
    brand_id: executive_calm
    therapeutic_focus: presence_under_pressure
    max_relief: 4
    max_urgency: 5
    max_identity_shift: 4
    rationale: >
      Corporate leader. High urgency (pre-board meeting). High identity
      (executive presence). Relief moderate (already regulated; seeking edge).

  # TRAUMA_PATH — Safety/integration; relief and somatic high
  trauma_path:
    brand_id: trauma_path
    therapeutic_focus: safety_and_integration
    max_relief: 5
    max_urgency: 4
    max_identity_shift: 4
    rationale: >
      Trauma recovery adult. High relief (feel safe in body). Moderate urgency
      (integration between sessions). Moderate identity (reclaiming embodied
      self). Relief at 5 due to somatic-focused work.

  # SPIRITUAL_GROUND — Presence/connection; relief and identity
  spiritual_ground:
    brand_id: spiritual_ground
    therapeutic_focus: presence_and_connection
    max_relief: 4
    max_urgency: 3
    max_identity_shift: 5
    rationale: >
      Spiritually curious professional. High identity (connection to larger
      self). Urgency low (morning meditation, not crisis). Relief moderate.

  # FOCUS_SPRINT — Momentum/focus; urgency and identity high
  focus_sprint:
    brand_id: focus_sprint
    therapeutic_focus: focus_without_burnout
    max_relief: 3
    max_urgency: 5
    max_identity_shift: 5
    rationale: >
      Startup founder. High urgency (late-night work pressure). High identity
      (founder identity, shipping, sustaining). Relief minimal (performance
      over calm).

  # HORMONE_RESET — Control/vitality; relief and identity moderate
  hormone_reset:
    brand_id: hormone_reset
    therapeutic_focus: bodily_control_and_vitality
    max_relief: 4
    max_urgency: 4
    max_identity_shift: 4
    rationale: >
      Women 35+. Relief moderate (somatic regulation). Urgency moderate (health
      research evening, not crisis). Identity moderate (feeling in control of
      body, but not role shift).

  # STOIC_EDGE — Mental toughness; identity and urgency high
  stoic_edge:
    brand_id: stoic_edge
    therapeutic_focus: mental_toughness
    max_relief: 3
    max_urgency: 5
    max_identity_shift: 5
    rationale: >
      Young male growth. High identity (mental toughness, emotional mastery).
      High urgency (gym drive, competition). Relief minimal (discipline over
      comfort).

  # CALM_STUDENT — Calm/focus; relief and urgency moderate
  calm_student:
    brand_id: calm_student
    therapeutic_focus: exam_calm_and_focus
    max_relief: 5
    max_urgency: 4
    max_identity_shift: 3
    rationale: >
      Gen Z student. High relief (stop spiraling). Moderate urgency
      (pre-exam evening). Low identity (already student; seeking regulation).

  # HEALING_GROUND — Somatic reset; relief high
  healing_ground:
    brand_id: healing_ground
    therapeutic_focus: midday_somatic_reset
    max_relief: 5
    max_urgency: 4
    max_identity_shift: 3
    rationale: >
      Chronic stress worker. High relief (lunch break reset, somatic
      regulation). Moderate urgency. Low identity (not seeking role change).

  # BIO_FLOW — Optimization; identity and urgency balanced
  bio_flow:
    brand_id: bio_flow
    therapeutic_focus: data_driven_optimization
    max_relief: 3
    max_urgency: 4
    max_identity_shift: 5
    rationale: >
      Biohacker. High identity (optimization self-concept). Moderate urgency
      (quantified self review). Low relief (optimization over relaxation).

  # CONFIDENCE_CORE — Safety/confidence; relief and urgency high
  confidence_core:
    brand_id: confidence_core
    therapeutic_focus: pre_social_calm
    max_relief: 5
    max_urgency: 4
    max_identity_shift: 4
    rationale: >
      Socially anxious adult. High relief (pre-event somatic calm). Moderate
      urgency. Moderate identity (feeling okay, not identity transformation).

  # RELATIONSHIP_CLARITY — Connection/co-regulation; relief moderate
  relationship_clarity:
    brand_id: relationship_clarity
    therapeutic_focus: co_regulation_and_repair
    max_relief: 4
    max_urgency: 4
    max_identity_shift: 5
    rationale: >
      Couples repair. High identity (partnership identity shift post-argument).
      Moderate urgency (post-conflict moment). Moderate relief (co-regulation
      over individual comfort).

  # MORNING_MOMENTUM — Clarity/momentum; urgency and identity high
  morning_momentum:
    brand_id: morning_momentum
    therapeutic_focus: morning_routine_and_readiness
    max_relief: 3
    max_urgency: 4
    max_identity_shift: 5
    rationale: >
      Early riser professional. High identity (set for the day, morning ritual).
      Moderate urgency (sunrise drive). Low relief (momentum over calm).

  # MINIMAL_MIND — Clarity/attention; relief and urgency moderate
  minimal_mind:
    brand_id: minimal_mind
    therapeutic_focus: attention_and_clarity
    max_relief: 4
    max_urgency: 4
    max_identity_shift: 4
    rationale: >
      Digital overwhelm adult. Relief moderate (doomscroll fatigue). Urgency
      moderate. Identity moderate (less scattered self-concept).

  # HIGH_PERFORMER — Confidence/edge; urgency and identity high
  high_performer:
    brand_id: high_performer
    therapeutic_focus: pre_call_confidence
    max_relief: 3
    max_urgency: 5
    max_identity_shift: 5
    rationale: >
      Competitive sales. High urgency (pre-call pressure). High identity
      (confident closer self-concept). Relief minimal (edge over comfort).

  # GENTLE_GROWTH — Safety/exploration; relief and identity moderate
  gentle_growth:
    brand_id: gentle_growth
    therapeutic_focus: safe_self_inquiry
    max_relief: 4
    max_urgency: 3
    max_identity_shift: 5
    rationale: >
      Therapy newcomer. High identity (unlocking authentic self). Low urgency
      (journaling time, not crisis). Relief moderate (safety in exploration).

  # LEGACY_BUILDER — Meaning/clarity; identity and identity shift high
  legacy_builder:
    brand_id: legacy_builder
    therapeutic_focus: midlife_reinvention
    max_relief: 3
    max_urgency: 4
    max_identity_shift: 5
    rationale: >
      45+ reinventor. High identity shift (next chapter meaning). Moderate
      urgency (life transition). Low relief (meaning over comfort).

# ─── QA GATES ────────────────────────────────────────────────────────────────

qa_gates:
  eois_pass_minimum: 10
  eois_pass_maximum: 15
  ceiling_overage_tolerance: 0
  # If any component exceeds brand max, fail QA unless explicitly waived

validation_rules:
  - brand_id must exist in canonical brand_archetype_registry.yaml
  - all three components (relief, urgency, identity_shift) must be provided
  - no component can exceed its brand max_*
  - sum must be >= 10 to pass
  - sum cannot exceed 15 by definition
