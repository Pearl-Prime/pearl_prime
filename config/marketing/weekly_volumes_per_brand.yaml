# Brand list: config/manga/canonical_brand_list.yaml — Path X canon (37 manga brands).
# Cap reconciliation: config/release_velocity/safe_velocity.yaml (read-only here).
#
# CONSUMER CONTRACT (per spec §3 OUTCOME-B):
#   - Operator-facing targets (exec catalog dashboard, brand admin weekly panels,
#     weekly packaging summaries) MUST read this file (joined with Surface 4
#     active-brand classifier) for "Table 6" numbers.
#   - Platform caps in safe_velocity.yaml remain HARD CONSTRAINTS — schedulers
#     and release tooling clamp effective throughput. If a marketing target
#     exceeds a platform cap, the consumer surfaces both numbers (target vs cap)
#     or fails validation in CI.
#   - Pipeline mix files (weekly_queue_config.yaml, manga lane YAMLs,
#     upload_schedule.yaml) remain MECHANICAL composition tools; their numeric
#     promises must align to this SSOT after a reconciliation pass.
#
# Spec deviation note (schema_version):
#   Spec §2.1 sample shows schema_version as a string ("1.0"); this file uses
#   integer 1 to match the consumer-side numeric gate authored alongside this
#   PR. Both encode V1 of the schema. Consumers must treat schema_version as
#   the major version indicator only; a future minor rev (e.g. 1.1) bumps
#   last_updated and adds optional fields, never removes them.
#
# Spec deviation note (row encoding):
#   Spec §2.4 shows an illustrative `volumes:` list; this file uses
#   `brand_targets:` as a MAP keyed by brand_id (with nested surface→weekly_target
#   map) for cleaner consumer joins on (brand_id × surface) and to keep this V1
#   baseline diff-stable across brand-list amendments. Spec §2.4 declares the
#   sample is "illustrative only"; the binding row grain (brand_id × locale ×
#   surface) is preserved by joining brand_targets[<brand_id>] against the
#   brand registry's locale fields downstream. Locale modeling will be added
#   in V1.1 (see future ws on locale-aware refinement).

schema_version: 1
last_updated: "2026-05-09"
owner_agent: "Pearl_Marketing"
source: "V1 baseline authoring per MARKETING_VOLUME_SSOT_V1_SPEC.md (no operator sheet yet; conservative starter values await operator Table 6 ratification)"
status: "draft"

# Reference (do not inline values; link only — safe_velocity.yaml remains the SSOT
# for platform caps and is intentionally read-only from this file's perspective).
safe_velocity_link:
  path: "config/release_velocity/safe_velocity.yaml"
  authority_doc: "docs/RELEASE_VELOCITY_AND_SCHEDULE.md"
  semantics: "Hard platform caps (Google Play Books, Findaway Voices, Ximalaya). Consumers MUST clamp marketing targets to lane-applicable caps; this file expresses MARKETING INTENT, not effective throughput. See spec §3 #2."

# Top-level reconciliation notes (provenance + safe_velocity acknowledgement).
notes: |
  V1 baseline conservative starter values (Pearl_Conductor 2026-05-09 autonomous
  wave; operator-authorized; defaults pre-approved). These rows encode marketing
  INTENT only; effective throughput is clamped by safe_velocity.yaml at the
  consumer (per spec §3 #2 and §4).

  Default per-surface allocation (uniform across all 37 Path X canon manga brands):
    - manga: 1/week  (primary content surface for Path X canon brands)
    - ebook, audiobook, podcast, video, shorts: 0/week
      (V1 baseline; awaits operator Table 6 ratification before non-zero
      commitments. Refinement tracked under follow-up workstreams.)

  Aggregate at this baseline:
    - manga: 37/week total  (no platform cap entry in safe_velocity.yaml; manga
      catalog cadence is governed by config/manga/japan_dual_track_config.yaml
      weekly_cap and config/manga/korea_webtoon_config.yaml weekly_cap as
      regional pipeline caps, not a global safe_velocity cap)
    - ebook, audiobook, podcast, video, shorts: 0/week aggregate
      (no commitments at V1; operator data populates these in V1.1)

  Cap reconciliation (per spec §3 and task instructions):
    - safe_velocity.yaml caps are platform-aggregate (Google/Findaway/Ximalaya);
      no per-brand row in this file currently exceeds any per-brand cap.
    - Aggregate ebook/audiobook = 0/week at V1 baseline; well within all
      platform caps (new_imprint and established tiers).
    - When operator ratifies non-zero ebook/audiobook targets, consumer-side
      cap clamping (per spec §3 #2 and §4) applies via lane-aware schedulers
      (config/release_velocity/lanes.yaml).

  Brand list provenance:
    - 37 brand_id keys derived from config/manga/canonical_brand_list.yaml
      (Path X canon, schema_version 1, last_updated 2026-04-27). Brand-list
      amendments propagate to this file via authoring follow-up; missing-brand
      and orphan-brand checks live in spec §5 #3 (recommended CI).

  Status:
    - status: draft (per spec §5 #4 — promotion to "active" requires Pearl_PM
      and operator acknowledgment, typically alongside operator Table 6
      ratification or a program amendment).

