scripts:
  - persona_id: millennial_women_professionals
    topic_id: anxiety
    scripts:
      - "I'm managing my anxiety well enough that no one can see it, but 'well enough' is a full-time job on top of my actual job."
      - "Everyone at work thinks I have it together because I learned to perform calm before the anxiety even hits."

  - persona_id: millennial_women_professionals
    topic_id: burnout
    scripts:
      - "I burned out quietly, so quietly that even I didn't notice until I did."
      - "The worst part is knowing exactly which optimization I missed, which would have prevented this."

  - persona_id: millennial_women_professionals
    topic_id: overthinking
    scripts:
      - "I've made success by thinking three steps ahead, so now my brain won't stop doing it and I'm exhausted by things that haven't happened."
      - "I analyze conversations for hours after, finding the micro-moment where I could have said something better."

  - persona_id: millennial_women_professionals
    topic_id: imposter_syndrome
    scripts:
      - "I know I got here because I worked harder than everyone else, but I still feel like I'm about to be exposed as someone who just works harder than everyone else."
      - "Promotions don't fix it — they just raise the bar for who I have to fake being."

  - persona_id: millennial_women_professionals
    topic_id: sleep_anxiety
    scripts:
      - "I can't sleep because I'm thinking about not being able to sleep, and that spiral is the most honest thing about me."
      - "Sleep is the one thing I can't optimize my way into, and that terrifies me more than actual insomnia."

  - persona_id: millennial_women_professionals
    topic_id: financial_stress
    scripts:
