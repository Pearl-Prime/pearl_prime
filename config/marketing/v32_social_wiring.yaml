      - title_1: "Decision Paralysis: How to Choose When Stuck"
      - title_2: "Overcome Choice Anxiety and Commit to Decisions"
      - title_3: "Decision Fatigue: Why You Can't Choose Anymore"
      - title_4: "How to Make Decisions Without Perfectionism"
      - title_5: "Breaking the Cycle of Endless Options"
      - title_6: "Decision Paralysis in Career, Relationships, and Life"
      - title_7: "How Fear Disguises Itself as Indecision"
      - title_8: "Clarity Without Certainty: Choosing Forward"
      - title_9: "When Your Brain Won't Let You Decide"
      - title_10: "Getting Unstuck From Decision Paralysis"
    viral_phrases:
      - phrase_1: "Paralysis isn't indecision. It's unprocessed fear."
      - phrase_2: "You don't need more information. You need permission to choose."
      - phrase_3: "Perfect decisions don't exist. Committed ones do."
    quote_cards:
      - quote_1: "The paralysis is the signal, not the problem."
      - quote_2: "Clarity comes after the choice, not before."
      - quote_3: "You already know. You're waiting for permission."
      - quote_4: "Indecision is often fear pretending to be fairness."
      - quote_5: "Every chosen path is the right one when you're committed."

