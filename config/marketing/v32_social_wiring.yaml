# v32_social_wiring.yaml
# Social Content Specs v3.2
#
# Per-brand specs for social platform content. Each brand has:
# - youtube_hooks: 5 hooks, 5-10 words each, designed to stop scroll
# - pinterest_titles: 10 titles, 40-60 chars each, searchable
# - viral_phrases: 3 phrases, <15 words, designed for sharing/quoting
# - quote_cards: 5 quotes, 5-15 words, visually standalone
#
# Authority: Writers Bible v3.2, §SocialWiring

version: 3.2
config_type: social_content_specs
brands_included: 8  # Top 8 brands for v3.2 MVP

# ─── TOP 8 BRANDS WITH FULL SOCIAL SPECS ────────────────────────────────────

brands:

  # 1. STABILIZER — "Calm nervous system" messaging
  stabilizer:
    brand_id: stabilizer
    platform_focus: calm_somatic_regulation
    youtube_hooks:
      - hook_1: "Your nervous system is screaming. Here's why."
      - hook_2: "5 minutes to reset your whole nervous system"
      - hook_3: "Why burnout doesn't mean you're broken"
      - hook_4: "The vagus nerve hack nobody talks about"
      - hook_5: "Feel calm when everything is chaotic"
    pinterest_titles:
      - title_1: "Nervous System Regulation Exercises for Burnout"
      - title_2: "Calm the Fight-or-Flight Response: Somatic Techniques"
      - title_3: "5-Minute Nervous System Reset for Stressed Professionals"
      - title_4: "How to Regulate Your Body When Overwhelmed"
      - title_5: "Vagus Nerve Exercises for Instant Calm"
      - title_6: "Burnout Recovery: Science-Based Nervous System Reset"
      - title_7: "Grounding Techniques That Actually Work for Anxiety"
      - title_8: "Somatic Practices for Chronic Stress Relief"
      - title_9: "Evening Wind-Down Routine for Nervous System Reset"
      - title_10: "Regulation Techniques: Feel Calm in Survival Mode"
    viral_phrases:
      - phrase_1: "Your nervous system doesn't need more willpower—it needs regulation."
      - phrase_2: "Burnout isn't a character flaw. It's a nervous system problem."
      - phrase_3: "Calm isn't about thinking positive. It's about nervous system safety."
    quote_cards:
      - quote_1: "Regulation before motivation."
      - quote_2: "Your nervous system knows what to do. Stop fighting it."
      - quote_3: "Burnout ends when the body feels safe."
      - quote_4: "Grounded doesn't mean fixed. It means resourced."
      - quote_5: "Calm is your nervous system's native state."

