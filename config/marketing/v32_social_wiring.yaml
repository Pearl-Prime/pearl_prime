# ─── VALIDATION RULES ────────────────────────────────────────────────────────

validation_rules:
  youtube_hooks_requirements:
    count: 5
    words_per_hook: [5, 10]
    principle: "Stop the scroll with emotional specificity"
  pinterest_titles_requirements:
    count: 10
    characters_per_title: [40, 60]
    principle: "Searchable, benefit-driven, specific"
  viral_phrases_requirements:
    count: 3
    words_per_phrase: [1, 15]
    principle: "Quotable, shareable, social-ready"
  quote_cards_requirements:
    count: 5
    words_per_quote: [5, 15]
    principle: "Standalone, visual, inspirational without being toxic"

