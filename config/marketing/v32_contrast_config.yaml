# v32_contrast_config.yaml
# Contrast & Juxtaposition Patterns v3.2
#
# Per-brand contrast/juxtaposition structures for creating dramatic effect
# and deepening reader understanding through "before/after" and "what you think
# vs. what's actually happening" patterns.
#
# Contrast is a powerful learning tool: the gap between expectations and reality
# creates memorable moments and drives insight.
#
# Authority: Writers Bible v3.2, §Contrast

version: 3.2
config_type: contrast_patterns
total_brands: 24

# ─── UNIVERSAL CONTRAST PRINCIPLES ──────────────────────────────────────────

universal_contrast_principles:
  purpose: >
    Create cognitive and emotional dissonance that resolves into insight.
    The gap between "what I thought" and "what's actually true" is where
    transformation lives.

  cognitive_mechanism: >
    Surprise + resolution = memorable learning. When expectations are violated
    and then explained, the new understanding sticks better than information
    delivered without contrast.

  emotional_mechanism: >
    Contrast creates emotional resonance. "I thought I was broken" vs.
    "I'm actually just dysregulated" reframes shame into information.

  architecture:
    - Establish expectation (what listener thinks is true)
    - Violate expectation (reveal what's actually true)
    - Resolve contrast (explain the gap, create understanding)

# ─── CONTRAST PATTERN TYPES ─────────────────────────────────────────────────

contrast_pattern_types:

  # PATTERN 1: BEFORE/AFTER FRAMING
  before_after_framing:
    description: >
      "You're [current state]. After this, you'll [transformed state]."
      Not making a promise, but reframing the journey from identity perspective.

    structure:
      step_1_acknowledge_current: "Here's where you are right now"
      step_2_name_the_gap: "Here's what feels impossible about that"
      step_3_reveal_shift: "Here's what shifts when you understand X"
      step_4_new_identity: "That's who you become"

    universal_examples:
      - current: "You're caught in the perfectionism trap"
        gap: "Every standard you set paralyzes you"
        shift: "When you understand paralysis is a nervous system state"
        new_identity: "You become strategic about standards instead of enslaved to them"

      - current: "You're struggling with people-pleasing patterns"
        gap: "Your nervous system believes safety = others' approval"
        shift: "When you learn autonomy is a nervous system state, not a character flaw"
        new_identity: "You can say no without guilt"

    emotional_resonance: >
      This pattern validates current struggle while opening possibility.
      It says "the thing you blame yourself for is actually a nervous system
      adaptation." This reframe is deeply moving.

  # PATTERN 2: MECHANISM REVEAL STRUCTURE
  mechanism_reveal:
    description: >
      "You thought X was happening. Here's what's actually happening."
      This pattern explains the hidden mechanism beneath surface behavior.

    structure:
      step_1_surface_observation: "Here's what you notice about yourself"
      step_2_attribution_error: "You've been interpreting this as Y"
      step_3_actual_mechanism: "But what's actually happening is Z"
      step_4_implication: "Which means..."

    universal_examples:
      - surface: "You can't fall asleep"
        attribution_error: "You think it's insomnia (a sleep disorder)"
        actual_mechanism: "It's your HPA axis stuck in threat-detection (hyperarousal)"
        implication: "Which means the solution isn't a sleep technique; it's safety"

      - surface: "You keep saying yes when you mean no"
        attribution_error: "You think you're weak or too nice"
        actual_mechanism: "Your nervous system learned approval = survival"
        implication: "Which means boundary work is nervous system retraining, not character change"

      - surface: "You're stuck in decision paralysis"
        attribution_error: "You think you're indecisive"
        actual_mechanism: "Your nervous system perceives all paths as dangerous (loss aversion)"
        implication: "Which means the solution is regulation, not more information"

    emotional_resonance: >
      This pattern is exonerating. It says "you're not broken; your system
      is protecting itself." The relief of being seen accurately is powerful.

  # PATTERN 3: WHAT YOU THINK VS. WHAT'S ACTUALLY HAPPENING
  what_you_think_vs_reality:
    description: >
      A direct contrast structure that names the false belief and reveals
      the truth. Often used in chaos slots (pattern breaks).

    structure:
      belief: "What you think is true"
      reality: "What's actually true"
      implication: "What changes because of this"

    universal_examples:
      - belief: "If I'm anxious, something is wrong"
        reality: "Anxiety is your nervous system's threat-detection system doing its job"
        implication: "The solution isn't to eliminate anxiety. It's to learn it's not accurate"

      - belief: "I need to feel ready before I can show up"
        reality: "Readiness is a side effect of showing up, not a prerequisite"
        implication: "Which means you can act without waiting for the feeling"

      - belief: "Perfectionism keeps me safe from failure"
        reality: "Perfectionism prevents you from ever trying hard enough to fail"
        implication: "Which means lowering standards is the path to actual achievement"

    emotional_resonance: >
      This pattern creates a moment of clarity. When the belief is exposed
      as false, the listener experiences a small "aha" that opens new possibility.

  # PATTERN 4: THEN VS. NOW (IDENTITY SHIFT)
  then_vs_now:
    description: >
      "Then, I believed X about myself. Now, I understand Y."
      This pattern documents the transformation within the listener's
      identity across the arc of the book.

    structure:
      then_identity: "Who you were/how you saw yourself"
      then_belief: "What you believed about yourself"
      now_identity: "Who you're becoming"
      now_belief: "What you understand about yourself"

    universal_examples:
      - then: "I thought I was broken because I couldn't focus"
        now: "I understand I'm neurodivergent and need different systems"

      - then: "I believed my worth came from others' approval"
        now: "I understand autonomy is a nervous system practice, and self-approval comes first"

      - then: "I thought burnout meant I wasn't strong enough"
        now: "I understand burnout is biological; regulation is the solution"

    emotional_resonance: >
      This pattern is integrative. It shows transformation as identity shift,
      not just behavior change. This is deeply satisfying.

  # PATTERN 5: WHAT DIDN'T WORK VS. WHAT DOES
  what_didnt_work_vs_what_does:
    description: >
      "You've tried X (it didn't work). Here's why. Now try Y instead."
      This pattern honors the listener's past efforts while opening new approaches.

    structure:
      past_strategy: "What you've already tried"
      why_it_didnt_work: "Why that approach failed (mechanism-based)"
      new_strategy: "Here's what actually works"
      why_it_works: "Why this approach is aligned with how your nervous system actually works"

    universal_examples:
      - past: "You tried willpower and positive thinking for anxiety"
        why_failed: "Your nervous system doesn't respond to thought-based interventions when in threat"
        new: "You learn nervous system reset techniques (somatic)"
        why_works: "Because you're addressing the system directly, not trying to think your way out"

      - past: "You've tried productivity hacks for your ADHD focus"
        why_failed: "You were trying to fight your neurodivergence instead of building systems that honor it"
        new: "You design your environment and tasks for how your brain actually works"
        why_works: "Because you're working with your wiring, not against it"

    emotional_resonance: >
      This pattern is validating. It says "you weren't doing it wrong; that
      approach just wasn't aligned with your system." This opens compassion
      for past struggle.

  # PATTERN 6: FEAR VS. REALITY
  fear_vs_reality:
    description: >
      "You're afraid of X. Here's what would actually happen."
      This pattern makes fear concrete and shows it's usually overestimated.

    structure:
      fear: "What you're afraid will happen"
      catastrophic_belief: "The story you tell about what that means"
      actual_reality: "What would probably actually happen"
      even_if: "And even if that happened..."

    universal_examples:
      - fear: "You're afraid saying no will destroy the relationship"
        catastrophe: "They'll hate you, leave, and you'll be alone"
        reality: "Most people respect boundaries; the relationship either deepens or wasn't solid to begin with"
        even_if: "And even if they were upset, your need for autonomy matters too"

      - fear: "You're afraid showing your creative work will be judged"
        catastrophe: "Critics will tear it apart and prove you're a fraud"
        reality: "Some will love it, some won't care, and it won't change your actual worth"
        even_if: "And even if you were judged harshly, the work still matters"

    emotional_resonance: >
      This pattern is grounding. It deflates catastrophic thinking by making
      it visible. The realization "it's not actually that bad" is liberating.

# ─── BRAND-SPECIFIC CONTRAST PATTERNS ────────────────────────────────────────

brands:

  # STABILIZER
  stabilizer:
    brand_id: stabilizer
    primary_contrast_pattern: mechanism_reveal

    before_after_framing:
      current_state: "You're exhausted, wired at night, can't regulate"
      gap: "You feel like you're failing at self-care"
      shift_understanding: "When you understand this is a nervous system dysregulation issue, not a willpower issue"
      new_identity: "You become someone who *knows how to regulate* instead of someone who *should be more disciplined*"

    mechanism_reveal:
      surface: "You collapse in the evening after work"
      attribution_error: "You think you lack resilience"
      actual_mechanism: "Your nervous system never came down from work stress; shutdown is protection"
      implication: "You need nervous system reset, not more rest days"

    fear_vs_reality:
      fear: "If I slow down, everything will fall apart"
      catastrophe: "My work will suffer, I'll look lazy, I'll lose my job"
      reality: "A regulated nervous system actually performs better; clarity improves work"
      even_if: "And even if performance dipped initially, the long-term is stronger"

  # OPTIMIZER
  optimizer:
    brand_id: optimizer
    primary_contrast_pattern: what_you_think_vs_reality

    what_you_think_vs_reality:
      belief_1:
        belief: "If I'm not productive every minute, I'm wasting time"
        reality: "Rest and recovery are *when your brain optimizes*"
        implication: "Which means scheduling downtime is strategic, not indulgent"

      belief_2:
        belief: "More information = better decisions"
        reality: "More information = decision paralysis (too many variables)"
        implication: "Which means you need to cut information, not gather more"

      belief_3:
        belief: "I need to feel motivated before I start"
        reality: "Motivation comes *after* momentum builds"
        implication: "Which means you start before you feel ready"

    what_didnt_work_vs_what_does:
      past: "You tried time management and app-based productivity systems"
      why_failed: "Because you were optimizing behavior, not optimizing your nervous system state"
      new: "You learn to optimize for focus-readiness (dopamine, friction reduction, environment)"
      why_works: "Because behavior optimization fails without nervous system optimization"

  # NIGHT_RESET
  night_reset:
    brand_id: night_reset
    primary_contrast_pattern: mechanism_reveal

    mechanism_reveal:
      surface: "You lie awake for hours with racing thoughts"
      attribution_error: "You think you have insomnia (a sleep disorder)"
      actual_mechanism: "Your nervous system is stuck in threat-detection mode (hyperarousal)"
      implication: "Which means sleep techniques won't work; nervous system regulation will"

    fear_vs_reality:
      fear: "If I can't sleep, tomorrow will be a disaster"
      catastrophe: "I'll be a zombie, I'll mess everything up, this will happen forever"
      reality: "One night of poor sleep is uncomfortable but not catastrophic; your body will recover"
      even_if: "And even if tomorrow is rough, the worst outcome is one bad day, not life-long insomnia"

    then_vs_now:
      then_identity: "I am an insomniac. This is who I am."
      then_belief: "My nervous system is broken and will never sleep normally"
      now_identity: "I'm someone learning to regulate my nervous system"
      now_belief: "Sleep is natural once the system feels safe"

  # CAREER_LIFT
  career_lift:
    brand_id: career_lift
    primary_contrast_pattern: before_after_framing

    before_after_framing:
      current: "You're stuck mid-career, unclear about your next move"
      gap: "You feel like you're falling behind or making the wrong choice"
      shift: "When you understand clarity comes *from* commitment, not before it"
      new_identity: "You become someone who *chooses directions* instead of someone waiting for the 'right' one"

    what_didnt_work_vs_what_does:
      past: "You've tried information gathering: researched careers, took assessments, asked mentors"
      why_failed: "More information creates more options, which creates more paralysis"
      new: "You identify your actual values and choose based on alignment, not certainty"
      why_works: "Because you're making a values-based choice, not an information-based one"

    fear_vs_reality:
      fear: "If I choose the wrong path, I'll regret it forever"
      catastrophe: "I'll be stuck in a job I hate with no way out"
      reality: "Most careers are more reversible than they feel; you can course-correct"
      even_if: "And even if you made a choice you grew out of, that choice taught you something"

  # THE_INNER_CRITIC_TRANSLATOR
  the_inner_critic_translator:
    brand_id: the_inner_critic_translator
    primary_contrast_pattern: what_you_think_vs_reality

    what_you_think_vs_reality:
      belief_1:
        belief: "That voice judging me is the truth about who I am"
        reality: "That voice is a protection mechanism from your past, not truth"
        implication: "Which means you can hear it without believing it"

      belief_2:
        belief: "If I'm not hard on myself, I'll become lazy and worthless"
        reality: "Self-compassion actually increases motivation and resilience"
        implication: "Which means being kind to yourself is strategic, not indulgent"

      belief_3:
        belief: "The critic is keeping me safe"
        reality: "The critic was protecting you from past threats that don't exist now"
        implication: "Which means you can thank it and choose a different voice"

    mechanism_reveal:
      surface: "You're constantly judging and criticizing yourself"
      attribution_error: "You think this is who you are (critical person)"
      actual_mechanism: "Your inner critic is a part of you protecting against perceived threat"
      implication: "Which means this is a dialogue to have, not an identity to fight"

  # THE_OVERWHELM_CIRCUIT_BREAKER
  the_overwhelm_circuit_breaker:
    brand_id: the_overwhelm_circuit_breaker
    primary_contrast_pattern: mechanism_reveal

    mechanism_reveal:
      surface: "You feel paralyzed and can't get started"
      attribution_error: "You think you're lazy or lack motivation"
      actual_mechanism: "Your nervous system is in shutdown (dorsal vagal state); your amygdala is running the show"
      implication: "Which means motivation won't help; nervous system reset comes first"

    what_you_think_vs_reality:
      belief: "Overwhelm means I have too much to do"
      reality: "Overwhelm means my nervous system is dysregulated (doesn't matter the task load)"
      implication: "Which means the solution is regulation, not fewer tasks"

    fear_vs_reality:
      fear: "If I stop and rest, everything will get worse"
      catastrophe: "Everything will pile up and become impossible"
      reality: "A regulated nervous system actually completes tasks faster and better"
      even_if: "And even if some things didn't get done, the quality of what does get done improves"

  # THE_PEOPLE_PLEASING_EXIT
  the_people_pleasing_exit:
    brand_id: the_people_pleasing_exit
    primary_contrast_pattern: before_after_framing

    before_after_framing:
      current: "You say yes when you mean no and lose yourself in relationships"
      gap: "You feel resentful, exhausted, and invisible"
      shift: "When you understand autonomy is a nervous system practice, not a character flaw"
      new_identity: "You become someone with *boundaries* instead of someone who's 'too nice'"

    fear_vs_reality:
      fear: "If I set a boundary, they'll be mad/hurt/leave"
      catastrophe: "I'll be alone and unloved"
      reality: "Some people might be unhappy. Healthy people respect boundaries."
      even_if: "And even if someone left, that reveals the relationship wasn't built on mutual respect"

    what_didnt_work_vs_what_does:
      past: "You've tried being nicer, more understanding, more flexible"
      why_failed: "Because the problem isn't how you relate; it's that you don't have boundaries"
      new: "You learn to set clear boundaries and tolerate others' discomfort"
      why_works: "Because you're protecting yourself while staying in relationship"

  # THE_PERFECTIONISM_PARADOX
  the_perfectionism_paradox:
    brand_id: the_perfectionism_paradox
    primary_contrast_pattern: what_you_think_vs_reality

    what_you_think_vs_reality:
      belief_1:
        belief: "My high standards keep me safe from failure and judgment"
        reality: "Your impossible standards prevent you from ever trying hard enough to succeed"
        implication: "Which means lowering standards is the path to actual achievement"

      belief_2:
        belief: "If I'm not perfect, it means I'm not good enough"
        reality: "Perfection is a moving target designed to paralyze, not a real standard"
        implication: "Which means 'good enough' is strategic, not a compromise"

    mechanism_reveal:
      surface: "You can't finish projects; you keep revising and perfecting"
      attribution_error: "You think you're a perfectionist (a character trait)"
      actual_mechanism: "Perfectionism is a nervous system protection; the standard is paralyzing on purpose"
      implication: "Which means the standard isn't the goal; completion is"

    before_after_framing:
      current: "You're paralyzed by impossible standards"
      gap: "You feel like you'll never be good enough"
      shift: "When you understand done > perfect in every meaningful way"
      new_identity: "You become someone who *ships* instead of someone who *perfects*"

  # THE_SHAME_SHIELD
  the_shame_shield:
    brand_id: the_shame_shield
    primary_contrast_pattern: then_vs_now

    then_vs_now:
      then_identity: "I thought the parts of me I'm hiding are shameful"
      then_belief: "If people knew, they'd reject me"
      now_identity: "I'm learning those parts are the most human"
      now_belief: "Visibility and connection heal shame"

    what_you_think_vs_reality:
      belief: "If I stay silent, nobody will judge me"
      reality: "Shame thrives in silence; visibility kills it"
      implication: "Which means speaking up is the cure, not the risk"

    fear_vs_reality:
      fear: "If I tell someone what I'm ashamed of, they'll judge me"
      catastrophe: "I'll be confirmed as bad/broken/unworthy"
      reality: "Shame thrives on isolation; connection and witness dissolve it"
      even_if: "And even if someone judged me, shame lives in my own internal judgment anyway"

  # [Additional brands follow similar pattern structure...]

  # DECISION_PARALYSIS_DECODER
  decision_paralysis_decoder:
    brand_id: decision_paralysis_decoder
    primary_contrast_pattern: mechanism_reveal

    mechanism_reveal:
      surface: "You can't make a decision; you keep researching and comparing"
      attribution_error: "You think you're indecisive (a character flaw)"
      actual_mechanism: "Your nervous system perceives all paths as dangerous (loss aversion); more info = more fear"
      implication: "Which means the solution is regulation and commitment, not information"

    what_you_think_vs_reality:
      belief: "If I gather enough information, the decision will become obvious"
      reality: "More information creates more options, which creates more paralysis"
      implication: "Which means you have enough information. The move is commitment."

    fear_vs_reality:
      fear: "If I choose wrong, my life will be ruined"
      catastrophe: "I'll regret it forever and be trapped"
      reality: "Most decisions are more reversible than they feel; you can course-correct"
      even_if: "And even if this path doesn't work out, you'll have learned something"

  # SOCIAL_ALARM_SILENCER
  social_alarm_silencer:
    brand_id: social_alarm_silencer
    primary_contrast_pattern: what_you_think_vs_reality

    what_you_think_vs_reality:
      belief_1:
        belief: "Everyone is judging me"
        reality: "Most people are focused on themselves; they're not analyzing you"
        implication: "Which means your fear is overestimating the threat"

      belief_2:
        belief: "I need to feel ready/confident before I can show up socially"
        reality: "Confidence comes *after* you show up and have positive experiences"
        implication: "Which means you go before you feel ready"

    mechanism_reveal:
      surface: "You avoid social events or feel terrified before them"
      attribution_error: "You think you have social anxiety (a personality trait)"
      actual_mechanism: "Your nervous system learned that social moments = threat; hypervigilance is the response"
      implication: "Which means regulation and exposure therapy (safe social experiences) heal this"

  # CONFIDENCE_CORE
  confidence_core:
    brand_id: confidence_core
    primary_contrast_pattern: before_after_framing

    before_after_framing:
      current: "You're anxious before social events and feel awkward"
      gap: "You feel like you don't belong"
      shift: "When you understand confidence is a regulated nervous system state"
      new_identity: "You become someone with *presence* instead of someone with *anxiety*"

    what_you_think_vs_reality:
      belief: "Confident people don't feel nervous"
      reality: "Confident people feel nervous but regulated; they can act anyway"
      implication: "Which means confidence isn't about not feeling fear; it's about moving forward despite it"

# ─── CONTRAST ARCHITECTURE RULES ────────────────────────────────────────────

contrast_architecture_rules:
  frequency: "1-2 major contrast moments per chapter (especially intro and mid-chapter pivot)"
  placement:
    intro: "Establish the false belief or surface observation"
    mid_chapter: "Reveal the actual mechanism or reality"
    outro: "Resolve the contrast into new identity or understanding"

  effectiveness:
    - Contrast should create cognitive dissonance (confusion momentarily)
    - Followed by resolution (clarity emerges)
    - Followed by relief (understanding lands)

  common_mistakes:
    - Using contrast without resolution (leaves reader confused)
    - Being too subtle (contrast doesn't register)
    - Being too heavy-handed (preaching instead of discovering)

# ─── VALIDATION ────────────────────────────────────────────────────────────

validation_rules:
  - Each brand must have at least 3 of the 6 contrast pattern types defined
  - Contrasts must serve understanding, not just create drama
  - Every contrast must have a clear resolution (not left hanging)
  - Contrast should never feel false or forced
  - Contrast should align with brand's emotional_vocabulary and voice_identity
