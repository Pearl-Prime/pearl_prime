# Archetype + content_type → default email_slot for feed builder
# Authority: docs/FUNNEL_EMAIL_AUTOMATION_MAP.md

schema_version: 1

defaults_by_content_type:
  somatic_exercise: e1
  assessment_html: e1
  guided_audio: bonus_pre_story
  story: e3
  book_offer: e4
  series_offer: e5
  checklist_pdf: post_e5

rules:
  - guided_audio must not use email_slot e1 or e2
  - story items must not include shop cta_url in body
  - book_offer requires pricing: paid

wf2_drip_priority:
  - guided_audio
  - assessment_html
  - checklist_pdf
