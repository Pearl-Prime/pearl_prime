# v32_chaos_slot.yaml
# Chaos Slot Configuration v3.2
#
# Chaos Slots: 4 techniques to break narrative predictability in rendered books.
# These interrupt the reader's pattern-matching brain and re-engage attention.
#
# 4 slot types:
# 1. unexpected_metaphor — Metaphor that reframes the moment
# 2. pattern_break — Structural or tonal shift that violates expectations
# 3. cultural_reference — Specific reference that resonates with persona
# 4. voice_shift — Narrator/POV change that brings surprise
#
# Each brand has a universal template + brand-specific overrides.
# Authority: Writers Bible v3.2, §ChaosSlot

version: 3.2
config_type: chaos_slots
total_brands: 24

# ─── UNIVERSAL CHAOS SLOT TEMPLATE ──────────────────────────────────────────

universal_template:
  chaos_slot_purpose: "Break reader pattern-matching and re-engage attention"
  chaos_slot_frequency: "1-2 per chapter (strategically placed)"
  placement_principle: "After highest-content-density moment or before major revelation"

  # ─── SLOT TYPE 1: UNEXPECTED METAPHOR ─────────────────────────────────────
  unexpected_metaphor:
    description: >
      A fresh metaphor that reframes the moment in an unexpected way.
      Should be tactile, sensory, and emotionally resonant. Avoid clichés.
    universal_examples:
      - "Your nervous system is a smoke alarm in a smoke-filled kitchen."
      - "Anxiety is like a security guard who showed up but never left the building."
      - "Shame is the silence that grows louder the more you avoid it."
      - "Perfectionism is building a house so carefully you never move in."
      - "Boundaries are the container that makes presence possible."
    construction_principle: >
      Start with concrete object/scenario. Add unexpected emotional
      dimension. Create resonance with brand's emotional_vocabulary.

  # ─── SLOT TYPE 2: PATTERN BREAK ──────────────────────────────────────────
  pattern_break:
    description: >
      Structural or tonal shift that violates reader expectations.
      Could be: sudden shortness, list-based clarity after narrative,
      technical data dump, dialogue when monologue expected, etc.
    universal_examples:
      - "Stop. Read this paragraph out loud."
      - "Here's what we know: You're afraid. Your body knows it. Your mind is lying."
      - "Number the ways you've been told to apologize for existing."
      - "Ask yourself three things nobody gets to answer."
      - "What if I told you that everything you learned about calm is wrong?"
    construction_principle: >
      Violate the established pattern (narrative length, tone, structure,
      POV). Make the violation meaningful, not random. Service the reader's
      understanding while surprising them.

  # ─── SLOT TYPE 3: CULTURAL REFERENCE ────────────────────────────────────
  cultural_reference:
    description: >
      Specific reference to media, history, science, or culture that
      resonates deeply with the brand's persona. Must be specific, not generic.
    universal_examples:
      - "Like PTSD hypervigilance, but in your nervous system daily."
      - "Your inner critic is auditioning for a role you never cast."
      - "Shame operates like a gaslighter in your own head."
      - "This is what neuroplasticity actually means: your brain doesn't get the final vote."
      - "The cave allegory: you're made of shadows. You're also the light."
    construction_principle: >
      Reference should be specific enough to create 'aha' moment for target
      persona. Not explaining the reference—assuming persona knows it.
      Serve emotional resonance, not intellectual performance.

  # ─── SLOT TYPE 4: VOICE SHIFT ───────────────────────────────────────────
  voice_shift:
    description: >
      Temporary shift in narrator voice, register, or POV.
      Could be: second person after first, technical after conversational,
      Imperative commands after gentle suggestions, etc.
    universal_examples:
      - "You. Right now. Stop reading and feel your breath."
      - "If you were your own body's therapist, what would you say?"
      - "Listen: Your nervous system is not your enemy."
      - "Here's what I need you to know more than anything else."
      - "The part of you that's afraid? Give it a name. Say it out loud."
    construction_principle: >
      Shift must have clear purpose (intimacy, urgency, distance,
      authority change). Maintain brand's voice_identity while shifting
      register. Return to baseline voice after chaos slot ends.

# ─── BRAND-SPECIFIC CHAOS SLOT OVERRIDES ────────────────────────────────────

brands:

  # STABILIZER — Somatic/safety focus chaos slots
  stabilizer:
    brand_id: stabilizer
    primary_chaos_type: pattern_break  # Prioritize structural breaks
    unexpected_metaphor:
      description: >
        Metaphors that use body sensations or grounded images.
        Focus on safety, regulation, natural rhythms.
      brand_specific_examples:
        - "Your nervous system is like a river. You can't stop the current. You can learn to swim."
        - "Regulation is not the absence of waves. It's knowing how to ride them."
        - "Burnout is like a smoke alarm that never turns off, wailing in an empty house."
        - "Calm is not the absence of feeling. It's feeling while grounded."
        - "Your body keeps score. Time to become its translator, not its critic."
    pattern_break:
      description: >
        Structural breaks that invite physical pausing or self-reflection.
      brand_specific_examples:
        - "Stop here. Put your hand on your heart. Feel it beating. You're here, now."
        - "Three things your nervous system needs: safety, predictability, belonging."
        - "What if regulation wasn't hard? What if you've been fighting the solution?"
        - "Your body knows. Have you asked it lately?"
        - "Pause. Breathe. This is not another thing to optimize."
    cultural_reference:
      description: >
        References to polyvagal theory, somatic psychology, neuroscience.
      brand_specific_examples:
        - "Your vagus nerve is the longest phone line to your nervous system."
        - "Polyvagal theory says: your system has three gears. Most of us are stuck."
        - "Somatic psychology calls this 'completion.' Your body knows what that is."
        - "The window of tolerance: science finally named where you function best."
        - "Neuroplasticity means: your nervous system rewires through safety and repetition."
    voice_shift:
      description: >
        Shifts to imperative (command), embodied second person, or gentle authority.
      brand_specific_examples:
        - "Feel your feet on the ground. Not metaphorically. Actually."
        - "If your nervous system could speak, what would it say right now?"
        - "Trust this: your body wants to be calm more than you do."
        - "Let me be direct: you've been taught to ignore the most important feedback you have."
        - "Your regulation is not my job. But I can show you where to look."

  # OPTIMIZER — Clarity/momentum focus chaos slots
  optimizer:
    brand_id: optimizer
    primary_chaos_type: cultural_reference  # Prioritize data/science refs
    unexpected_metaphor:
      description: >
        Metaphors using systems, momentum, clarity as primary dimensions.
      brand_specific_examples:
        - "Your dopamine system is like a thermostat. You've just been chasing heat."
        - "Focus is not willpower. It's friction reduction."
        - "Clarity is a system, not a revelation."
        - "Your morning is like the first 10 minutes of a movie. It sets everything."
        - "Momentum compounds like interest. Small consistent choices get exponential."
    pattern_break:
      description: >
        Quick numbered lists, data points, rapid-fire truths.
      brand_specific_examples:
        - "Three things killing your focus: reward delay, unclear priorities, neural fatigue."
        - "Here's the data: 68% of focus loss comes from task-switching cost, not effort."
        - "What you call procrastination is often: unclear next step + dopamine dip."
        - "Momentum breakdown: clarity 40% + environment 30% + momentum stacking 30%."
        - "One decision per morning. Two hours of deep work. Everything else is noise."
    cultural_reference:
      description: >
        References to neuroscience, productivity research, systems thinking.
      brand_specific_examples:
        - "Your DLPFC (prefrontal cortex) can only hold three competing priorities. Choose one."
        - "Temptation bundling: neuroscience's answer to motivation without willpower."
        - "Task-switching costs 23 minutes of cognitive reload time. Every time."
        - "Compound returns apply to focus too. One small daily system change = 365x."
        - "The mesocortical dopamine pathway: where clarity and drive actually live."
    voice_shift:
      description: >
        Shifts to mentor/coach voice, technical clarity, direct commands.
      brand_specific_examples:
        - "Stop chasing motivation. Build a system that doesn't need it."
        - "Your focus isn't broken. Your environment is too stimulating."
        - "What's the ONE clarity decision you're avoiding?"
        - "If you were coaching your best friend, what would you tell them?"
        - "The momentum question: are you building or are you maintaining?"

  # NIGHT_RESET — Sleep/calm focus chaos slots
  night_reset:
    brand_id: night_reset
    primary_chaos_type: voice_shift  # Prioritize intimate, late-night voice
    unexpected_metaphor:
      description: >
        Metaphors using darkness, rest, natural rhythms, night imagery.
      brand_specific_examples:
        - "Your racing mind at night is like a projector stuck on the worst scenes."
        - "Sleep is not a reward. It's a requirement. Treat it like one."
        - "Insomnia is your nervous system saying: you're still in danger. Here's why."
        - "Rest is not laziness. It's the reset button your body is begging for."
        - "Night is when your nervous system files away the day. You're trying to stop it."
    pattern_break:
      description: >
        Sudden calming down of pace, permission statements, release language.
      brand_specific_examples:
        - "You don't need to be fixed. You need to stop. That's it."
        - "Permission: Your racing thoughts are not a character flaw. They're a signal."
        - "What if tonight was just rest? No solving, no fixing, just rest?"
        - "Your insomnia has been trying to protect you. Time to say you're safe now."
        - "Let me be clear: you are allowed to sleep. That's not lazy."
    cultural_reference:
      description: >
        References to circadian rhythm, HPA axis, trauma neurobiology.
      brand_specific_examples:
        - "Your HPA axis (the stress axis) doesn't have an off switch. But it has a reset."
        - "Circadian rhythm isn't just about sleeping. It's about when your nervous system trusts."
        - "Hyperarousal in PTSD looks like insomnia. Same nervous system mechanism."
        - "Your pineal gland produces melatonin when you feel safe. Safety first, sleep second."
        - "The parasympathetic nervous system doesn't activate on demand. It activates on trust."
    voice_shift:
      description: >
        Shifts to intimate, almost whispered, one-on-one voice. Very personal.
      brand_specific_examples:
        - "I know it's 2 AM and you feel alone. You're not."
        - "What if I told you the thing you're afraid of has already passed?"
        - "Your body remembers safety. Let me show you where it lives."
        - "This is not another sleep hack. This is permission to rest."
        - "If only you knew how resilient you've already been..."

  # CAREER_LIFT — Clarity/choice focus chaos slots
  career_lift:
    brand_id: career_lift
    primary_chaos_type: unexpected_metaphor
    unexpected_metaphor:
      description: >
        Metaphors using paths, choices, direction, clarity.
      brand_specific_examples:
        - "Your career is not a ladder. It's a series of doors. You get to choose which ones."
        - "Indecision is your nervous system's way of saying: I can't see which path is safe."
        - "Your next move doesn't need to be perfect. It needs to be clear."
        - "The Sunday scaries are not about work. They're about clarity on choice."
        - "Feeling stuck means you can see the edges. That's clarity in disguise."
    pattern_break:
      description: >
        Breaking into questions, choice frameworks, decision permission.
      brand_specific_examples:
        - "The clarity question: What would you choose if you believed it would work?"
        - "Three directions. One choice. The permission to recommit every year."
        - "Stop asking 'is this right?' Start asking 'am I committed?'"
        - "Your fear isn't about the choice. It's about the identity shift."
        - "What if you're not stuck? What if you're transitioning?"
    cultural_reference:
      description: >
        References to career psychology, identity development, uncertainty.
      brand_specific_examples:
        - "Liminal space theory: you're not lost, you're in between chapters."
        - "Adult development says: the 30s-40s are when you stop being someone and choose who."
        - "Your nervous system doesn't like ambiguity. But clarity sometimes requires it."
        - "Quarter-life crisis is just your identity updating. That's growth."
        - "The choice point: this is where your values actually get defined, not just stated."
    voice_shift:
      description: >
        Shifts to mentor/guide voice, permission-giving, reframing.
      brand_specific_examples:
        - "Stop waiting for certainty. Certainty comes after commitment."
        - "If you were 70 and looking back, what would you wish you'd chosen?"
        - "Your career won't make you whole. But it will reflect who you are becoming."
        - "This decision matters less than you think. But your commitment to it matters everything."
        - "You're not changing paths. You're clarifying them."

  # DECISION_PARALYSIS_DECODER — Same approach with choice/paralysis focus
  decision_paralysis_decoder:
    brand_id: decision_paralysis_decoder
    primary_chaos_type: pattern_break
    unexpected_metaphor:
      description: >
        Metaphors about paralysis, invisible walls, permission to move.
      brand_specific_examples:
        - "Paralysis is not indecision. It's your nervous system's emergency brake."
        - "Fear disguises itself as thoughtfulness, then calls it paralysis."
        - "Your choices are like locked doors. But you have the keys. You're afraid to use them."
        - "Perfectionism is paralysis wearing a productivity costume."
        - "Every choice unmade is a vote for the status quo."
    pattern_break:
      description: >
        Naming the pattern, permission to move, breaking the freeze.
      brand_specific_examples:
        - "The paralysis pattern: information gathering → more uncertainty → deeper freeze."
        - "What if one imperfect choice > one perfect choice that never gets made?"
        - "Your indecision has never solved anything. Movement always does."
        - "The permission you're waiting for: this is it. This is it now."
        - "Paralysis ends when you're willing to be wrong."
    cultural_reference:
      description: >
        References to decision psychology, regret research, loss aversion.
      brand_specific_examples:
        - "Loss aversion says we fear loss 2x more than we value gain. Paralysis is loss aversion."
        - "Regret research: people regret inaction way more than wrong action."
        - "Decision paralysis is choice overload + loss aversion + perfectionism combined."
        - "The paradox of choice: more options = more paralysis, not more satisfaction."
        - "Commitment mechanism: once you decide, your brain stops evaluating alternatives."
    voice_shift:
      description: >
        Shifts to direct, almost commanding, break-the-spell voice.
      brand_specific_examples:
        - "Stop gathering information. You have enough."
        - "What would you choose if you believed in yourself?"
        - "The paralysis ends now. The choice doesn't have to be perfect."
        - "You're not indecisive. You're afraid. Different problem, different solution."
        - "I'm going to say this once: you're more ready than you think."

  # SOCIAL_ALARM_SILENCER — Same approach with social calm focus
  social_alarm_silencer:
    brand_id: social_alarm_silencer
    primary_chaos_type: voice_shift
    unexpected_metaphor:
      description: >
        Metaphors about alarms, social nervous system, safety in presence.
      brand_specific_examples:
        - "Your social alarm is a car horn that won't turn off."
        - "The spotlight effect: your brain is convinced the whole room is watching. They're not."
        - "Showing up is the courage. Feeling ready is a side effect, not a prerequisite."
        - "Social anxiety is not shyness. It's your nervous system predicting rejection it hasn't happened."
        - "Confidence isn't the absence of fear. It's regulated fear that can still show up."
    pattern_break:
      description: >
        Permission statements, reframing social moments, truth-telling.
      brand_specific_examples:
        - "What people actually think: 'I hope I don't look nervous.' (Same as you.)"
        - "The social truth: everyone is focused on themselves, not you."
        - "Awkwardness is just two nervous systems recalibrating. That's normal."
        - "You don't need to be the most interesting person. Just genuinely present."
        - "The intimacy you're seeking comes from being real, not from being perfect."
    cultural_reference:
      description: >
        References to social psychology, group neuroscience, belonging.
      brand_specific_examples:
        - "The social baseline theory: your nervous system syncs with others. Choose wisely."
        - "Mirror neurons: people feel your calm. Your regulation is contagious."
        - "Social anxiety is essentially a hyperactive threat-detection system."
        - "Belongingness is a biological need. Your system is responding to perceived threat."
        - "Co-regulation is the nervous system's way of learning safety. That's what connection is."
    voice_shift:
      description: >
        Shifts to intimate, compassionate, you're-safe voice.
      brand_specific_examples:
        - "Before you walk in, feel your feet on the ground. That's your anchor."
        - "What if people were actually rooting for you? What if they were?"
        - "Your nervous system learned something wasn't safe. Time to teach it something different."
        - "You're going to be fine. More than fine. You're going to be yourself."
        - "The people worth knowing want to know the real you, not the performing you."

  # THE_INNER_CRITIC_TRANSLATOR — Same approach with self-compassion focus
  the_inner_critic_translator:
    brand_id: the_inner_critic_translator
    primary_chaos_type: voice_shift
    unexpected_metaphor:
      description: >
        Metaphors about the critic, protection, befriending.
      brand_specific_examples:
        - "Your inner critic is a security guard from your childhood, still on duty."
        - "Self-judgment is a habit you were taught. It's not the truth about you."
        - "The critic's job was protection. But the dangers it's protecting against don't exist anymore."
        - "Compassion toward yourself isn't weakness. It's the most strategic move you can make."
        - "Your inner voice is not your identity. You're the one listening to it."
    pattern_break:
      description: >
        Direct addressing of the critic, compassion statements, reframing.
      brand_specific_examples:
        - "What would happen if you spoke to yourself like you speak to your best friend?"
        - "The critic is trying so hard to keep you safe. But you're already safe."
        - "Perfectionism was your protection. Now it's your prison."
        - "You're not broken. You're just carrying someone else's words."
        - "That voice in your head? You can notice it, thank it, and choose a different one."
    cultural_reference:
      description: >
        References to internal family systems, neurobiology of self-criticism.
      brand_specific_examples:
        - "Internal Family Systems calls it a 'part.' It's doing its job poorly because it's scared."
        - "Your amygdala learned to criticize to keep you safe. Your prefrontal cortex knows better."
        - "The default mode network (your inner critic) is loudest when you're not engaged."
        - "Self-compassion literally activates your parasympathetic nervous system. Physiology, not philosophy."
        - "The neuroscience is clear: kindness to yourself is more effective than criticism ever was."
    voice_shift:
      description: >
        Shifts to gentle confrontation, direct address to the critic, compassionate wisdom.
      brand_specific_examples:
        - "Inner critic, I hear you. You did your best. You can rest now."
        - "What if the voice judging you is the part most afraid?"
        - "Say this out loud: I am not my inner critic. I am the one listening."
        - "You've been taught that hating yourself is the path to changing. It's not."
        - "The kindness you give yourself is the kindness you'll give the world."

  # THE_OVERWHELM_CIRCUIT_BREAKER — Same approach with overwhelm/regulation focus
  the_overwhelm_circuit_breaker:
    brand_id: the_overwhelm_circuit_breaker
    primary_chaos_type: pattern_break
    unexpected_metaphor:
      description: >
        Metaphors about circuits, overwhelm as nervous system event, breaking spirals.
      brand_specific_examples:
        - "Overwhelm is your nervous system's circuit breaker activating. Good. Necessary."
        - "Your to-do list didn't cause this. Your nervous system state did."
        - "Overwhelm is information, not failure. Your system is telling you something."
        - "The shutdown after overwhelm is protection. Not laziness."
        - "You're not drowning in tasks. You're drowning in dysregulation."
    pattern_break:
      description: >
        Breaking down overwhelm, permission to pause, circuit breaker reframe.
      brand_specific_examples:
        - "Overwhelm is 90% nervous system, 10% actual task load."
        - "The circuit breaker protocol: pause, regulate, then (maybe) restart."
        - "What if nothing got done today and you were still okay?"
        - "Overwhelm breakdown: identify the actual feeling under the overwhelm (fear, doubt, anger)."
        - "You don't need more time. You need your nervous system regulated first."
    cultural_reference:
      description: >
        References to nervous system states, shutdown, capacity windows.
      brand_specific_examples:
        - "The window of tolerance: overwhelm happens when you leave it. Regulation brings it back."
        - "Shutdown is dorsal vagal activation. It's your system protecting you, not failing you."
        - "Cognitive overload is a nervous system event, not a willpower problem."
        - "Your nervous system has a capacity. Overwhelm is it telling you the truth."
        - "The freeze response isn't laziness. It's a nervous system survival mechanism."
    voice_shift:
      description: >
        Shifts to permission-giving, immediate relief, slowing down.
      brand_specific_examples:
        - "Stop. Breathe. This moment is safe. You're safe."
        - "What's the smallest possible next step? That's the only one."
        - "Your nervous system is screaming for regulation. Give it that before action."
        - "If you did nothing today, you would still be enough."
        - "Overwhelm is a teacher. Ask it what it's trying to tell you."

  # THE_PEOPLE_PLEASING_EXIT — Same approach with boundaries focus
  the_people_pleasing_exit:
    brand_id: the_people_pleasing_exit
    primary_chaos_type: pattern_break
    unexpected_metaphor:
      description: >
        Metaphors about boundaries, safety, autonomy, permission.
      brand_specific_examples:
        - "Boundaries are not walls. They're the container that makes connection possible."
        - "People-pleasing is your nervous system saying: 'I'm safe if they approve.'"
        - "Your no is not cruel. It's the only honest thing you can offer."
        - "Boundaries are love—toward others and toward yourself."
        - "The guilt you feel saying no? That's old conditioning, not truth."
    pattern_break:
      description: >
        Permission statements, boundary scripts, truth-telling about cost.
      brand_specific_examples:
        - "No is a complete sentence. No explanation required. No apology needed."
        - "If you keep saying yes when you mean no, your body will say no for you (anxiety, burnout, illness)."
        - "Boundary statements: 'I can't do that.' 'That doesn't work for me.' 'I need to decline.'"
        - "Everyone will survive your boundary. Some will have feelings. That's not your responsibility."
        - "Your needs matter exactly as much as theirs. Not less. Not after. Equally."
    cultural_reference:
      description: >
        References to attachment theory, nervous system safety, autonomy.
      brand_specific_examples:
        - "Anxious attachment says: my safety depends on their approval. Boundary work rewires that."
        - "The nervous system learns: I'm safe even when they're unhappy with me. That's boundary work."
        - "Self-abandonment is what happens when boundaries are missing."
        - "Autonomy is a basic psychological need. When it's violated, your nervous system knows."
        - "Co-dependence is what happens when boundaries and identity fuse. Separation is freedom."
    voice_shift:
      description: >
        Shifts to firm, permission-giving, you-deserve-this voice.
      brand_specific_examples:
        - "Say this out loud: my needs matter."
        - "What would you do if you knew nobody would be mad at you?"
        - "The person you're afraid of disappointing is not your responsibility."
        - "Your yes is only powerful if your no is real."
        - "You're allowed to protect your own peace."

  # THE_PERFECTIONISM_PARADOX — Same approach with perfectionism focus
  the_perfectionism_paradox:
    brand_id: the_perfectionism_paradox
    primary_chaos_type: cultural_reference
    unexpected_metaphor:
      description: >
        Metaphors about perfection, paralyzing standards, good-enough.
      brand_specific_examples:
        - "Perfectionism is building a house so carefully you never move in."
        - "Your impossible standards are the moat around your own castle."
        - "Perfect is the enemy. Done is the friend."
        - "The standard you hold yourself to is paralyzing you, not elevating you."
        - "Perfectionism is fear wearing a productivity costume."
    pattern_break:
      description: >
        Reframing perfect vs. done, permission to ship imperfect, breaking paralysis.
      brand_specific_examples:
        - "Done at 80% is infinitely better than perfect at 0%."
        - "Your best work comes from iteration, not perfection. Ship, then improve."
        - "Perfectionism is the thing stopping you, not the thing pushing you forward."
        - "What if the standard you're holding yourself to is actually unrealistic?"
        - "Permission: Good enough is the actual goal. Hit it and move on."
    cultural_reference:
      description: >
        References to perfectionism psychology, Brené Brown, shipping mindset.
      brand_specific_examples:
        - "Research says: perfectionism is a setup for failure, shame, and burnout. Every time."
        - "Brené Brown's research is clear: vulnerability beats perfection. Every time."
        - "Shipping beats perfecting. Always. The market decides, not you."
        - "The perfectionist's dilemma: the standard is impossible on purpose."
        - "High standards ≠ perfectionism. Perfectionism is when the standard is paralyzing."
    voice_shift:
      description: >
        Shifts to direct, confrontational, you're-sabotaging-yourself voice.
      brand_specific_examples:
        - "You're not protecting quality. You're preventing completion."
        - "What if shipping imperfect is actually the highest standard?"
        - "That impossible standard? You created it. You can uncreate it."
        - "Done is better. Not better is 'done.'"
        - "The world needs your 80% effort way more than it needs your 0% perfect."

  # THE_SHAME_SHIELD — Same approach with shame resilience focus
  the_shame_shield:
    brand_id: the_shame_shield
    primary_chaos_type: voice_shift
    unexpected_metaphor:
      description: >
        Metaphors about shame, hiding, visibility, reclaiming truth.
      brand_specific_examples:
        - "Shame is the story someone else wrote about you that you believed."
        - "The parts of you that you hide are the parts most hungry for connection."
        - "Your shame narrative isn't your story. It's a role you were cast into."
        - "Visibility is the antidote to shame. Hiding is what keeps it alive."
        - "You're not broken. You're just holding stories about being broken."
    pattern_break:
      description: >
        Permission to be seen, truth-telling, reclaiming narrative.
      brand_specific_examples:
        - "What you're hiding from the world is exactly what the world needs from you."
        - "Shame loses power the moment it's spoken aloud to someone safe."
        - "You are not the worst thing you've done. You are what you do with it."
        - "The shame spiral: hiding → isolation → deeper shame. Visibility breaks it."
        - "Your story is not your shame. Your story is what you do with it."
    cultural_reference:
      description: >
        References to shame neurobiology, Brené Brown, narrative therapy.
      brand_specific_examples:
        - "Neurobiology says: shame thrives in silence. Shame dies in connection."
        - "Narrative therapy reframes: you are not the problem. The story is the problem."
        - "Brené Brown's research: vulnerability and shame-resilience are the same skill."
        - "The amygdala codes shame as a threat. Connection resets the threat detector."
        - "Shame resilience is learned through witnessed experience. You need a safe person."
    voice_shift:
      description: >
        Shifts to intimate, you're-safe-with-me, I-see-you voice.
      brand_specific_examples:
        - "The part of you that you think is shameful? I see you. You're not shameful."
        - "What if the thing you're hiding is the thing someone is waiting to understand?"
        - "You're allowed to take up space. You're allowed to be imperfect and still belong."
        - "The silence you're keeping is louder than the truth ever could be."
        - "Your story matters. Your visibility matters. Your voice matters."

# ─── CHAOS SLOT ARCHITECTURE ────────────────────────────────────────────────

chaos_slot_architecture:
  per_chapter:
    micro_sessions_4_to_6_chapters:
      chaos_slots_per_chapter: 1
      total_chaos_slots: 4-6
    deep_dives_6_to_9_chapters:
      chaos_slots_per_chapter: 1-2
      total_chaos_slots: 8-18
  placement_rules:
    - Place after highest-content-density moment
    - Place before major revelation or pivot
    - Never place during narrative momentum (maintain read-through)
    - Spacing: minimum 2 paragraphs between chaos slot and surrounding major content

# ─── VALIDATION RULES ────────────────────────────────────────────────────────

validation_rules:
  - Each brand must have 4 chaos slot types fully defined
  - No chaos slot should feel random; all must service understanding
  - Cultural references must resonate with brand's target persona
  - Voice shifts must return to baseline brand voice_identity
  - Metaphors must be specific and sensory, not abstract
