on_disk_layout:
  note: >
    Zip archives unpack under template_expand/_extracted/<zip_basename_without_suffix>/ or
    template_expand2/_extracted/<zip_basename_without_suffix>/.
    The loader resolves index path, then _extracted/<archive_stem>, then _extracted/<library_id>.
    Preferred section files: chapter_{NN}/section_{NN}/variant_{F*}.yaml (YAML body in text/content/body/prose).
    Somatic v2 (v2_somatic): sections_somatic_v2/chapter_{NN}/section_{NN}_<type>/fN.yaml with key content.
