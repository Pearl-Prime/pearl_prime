# AI Policy Blockers — Manga Distribution Platforms
# Authority: artifacts/research/manga_vs_webtoon_economics_2026-04-25.md (PR #626)
# Updated: 2026-04-25
#
# Phoenix Omega ships AI-assisted manga (FLUX renders, additive enrichment).
# Some platforms ban or disqualify AI-generated content — submitting to them
# wastes effort, risks account suspension, and damages publisher relationships.
#
# This file is the SINGLE SOURCE OF TRUTH for which platforms can / cannot
# receive Phoenix Omega manga. New uploader/submitter scripts MUST consult
# this list and refuse to target any platform with status: BLOCKED.
#
# Validation: scripts/ci/check_blocked_platforms.py runs in CI and fails any
# PR that introduces a new uploader/submitter targeting a BLOCKED platform.

schema_version: 1

# Status values:
#   ALLOWED       — AI content explicitly permitted (with disclosure if required)
#   ALLOWED_GREY  — AI policy ambiguous / not enforced; ship with disclosure
#   BLOCKED       — AI content banned or disqualified; do not target
#   PARTNER_ONLY  — Self-pub channel closed; license/partnership only
#   UNKNOWN       — Status not yet researched; treat as BLOCKED until verified

platforms:

  # ─────────────────────────── ALLOWED ───────────────────────────
  amazon_kdp_comics:
    status: ALLOWED
    region: global
    disclosure_required: true
    royalty: "70% at $2.99-9.99; KU $0.0045-0.0050/page bonus"
    notes: |
      Primary lane for en_US, ja_JP collected volumes. AI permitted with
      disclosure. KDP Select gives 70% royalty + KU bonus.
    source: "manga_publishing_revenue_strategy.md §2.1"

  webtoon_canvas:
    status: ALLOWED_GREY
    region: global
    disclosure_required: true
    notes: |
      170M MAU, 7-language unified CANVAS 2026, $25 payout threshold.
      AI policy ambiguous but not banned. Ship with clear disclosure.
    source: "WEBTOON Entertainment S-1; PR #626 §1"

  comic_cmoa:
    status: ALLOWED
    region: ja_JP
    disclosure_required: true
    notes: |
      AI manga "My Dear Wife..." reached #1 in January 2026. Confirmed AI-friendly.
    source: "PR #626 §3"

  globalcomix:
    status: ALLOWED_GREY
    region: en_US
    disclosure_required: false
    notes: |
      AI-neutral. Kodansha distribution deal 2025.
    source: "PR #626 §3"

  google_play_books:
    status: ALLOWED
    region: global
    disclosure_required: false
    notes: "BISAC Comics & Graphic Novels accepted; AI not flagged."

  apple_books:
    status: ALLOWED
    region: global
    disclosure_required: false

  kobo:
    status: ALLOWED
    region: global
    disclosure_required: false

  # ─────────────────────────── BLOCKED ───────────────────────────
  tapas:
    status: BLOCKED
    region: en_US + global
    blocked_since: "2023-01-23"
    rationale: "AI content banned in Tapas content policy. Banned since Jan 2023, policy still in force as of Apr 2026."
    source: "PR #626 §en_US blocked_platforms"
    if_targeted: "Refuse upload. Suggest WEBTOON Canvas instead."

  shueisha_mangaplus:
    status: BLOCKED
    region: ja_JP
    rationale: |
      Shueisha disqualified AI manga from Jump Rookie contest Feb 2026.
      AI-hostile across all Shueisha submission channels including
      MangaPlus, Jump SQ, and JUMP TOON.
    source: "PR #626 §ja_JP blocked_platforms"
    if_targeted: "Refuse upload. Suggest Comic C'moA or KDP Japan."

  jump_toon:
    status: BLOCKED
    region: ja_JP
    rationale: "Shueisha-affiliated; same AI-hostile policy as parent. Launched May 2024."
    source: "PR #626 §ja_JP"
    if_targeted: "Refuse upload. Suggest LINE Manga Indies for vertical-scroll."

  jump_rookie:
    status: BLOCKED
    region: ja_JP
    rationale: "Shueisha contest. Disqualified AI submissions Feb 2026."
    source: "PR #626 §ja_JP"

  viz_media:
    status: BLOCKED
    region: en_US
    rationale: "Shueisha-affiliated US publisher. Inherits AI-hostile policy."
    source: "PR #626 §en_US"

  yen_press:
    status: BLOCKED
    region: en_US
    rationale: "AI-hostile editorial policy."
    source: "PR #626 §en_US"

  shogakukan:
    status: BLOCKED
    region: ja_JP
    rationale: "Major JP publisher with AI-hostile editorial stance."
    source: "PR #626 §ja_JP"

  # ──────────────────────── PARTNER_ONLY ─────────────────────────
  piccoma_smartoon:
    status: PARTNER_ONLY
    region: ja_JP + ko_KR
    rationale: |
      Not open for self-publishing. Licensed content only. Approach via
      publisher partnership AFTER independent audience is built on
      WEBTOON Canvas + KDP.
    source: "PR #626 §ja_JP partner_path_only"
    if_targeted: "Refuse direct submission. Document as partnership target for Wave 2."

  line_manga_originals:
    status: PARTNER_ONLY
    region: ja_JP
    rationale: |
      LINE Manga Indies (separate channel) accepts both formats and is
      open for direct submission — but the Originals/Studio channel is
      curated/partner-only.
    source: "PR #626 §ja_JP"

  kakao_page:
    status: PARTNER_ONLY
    region: ko_KR
    rationale: "Tapas's parent. Kakao-owned content channels closed for direct AI self-pub."
    source: "PR #626 §ko_KR"

  bilibili_comics:
    status: PARTNER_ONLY
    region: zh_CN
    rationale: "China platform; requires partnership + regulatory approval."
    source: "PR #626 §zh_CN"

  kuaikan_manhua:
    status: PARTNER_ONLY
    region: zh_CN

  # ─────────────────────────── ALLOWED_GREY ──────────────────────
  line_manga_indies:
    status: ALLOWED_GREY
    region: ja_JP
    disclosure_required: true
    rationale: |
      Direct submission channel. Accepts both B&W page and color vertical.
      AI policy not explicitly stated — disclose AI use in submission.
    source: "PR #626 §ja_JP"

  bookwalker:
    status: ALLOWED_GREY
    region: ja_JP
    disclosure_required: false
    rationale: "Kadokawa-owned aggregator. AI policy not explicit; ship via KDP first."

  pixiv_comic:
    status: ALLOWED_GREY
    region: ja_JP
    rationale: "Mixed: original Pixiv platform allows AI content; commercial submission tier may vary."

# ─────────────────────────────────────────────────────────────────
# Helpers for CI check + connector code
# ─────────────────────────────────────────────────────────────────

# Map filename / module patterns that look like uploaders/submitters.
# CI scans these patterns; if a PR adds a new file matching one and the
# code references a BLOCKED or PARTNER_ONLY platform without a
# `# AI_POLICY_BLOCKER_OK: <reason>` annotation, CI fails.
uploader_filename_patterns:
  - "scripts/publish/*_upload.py"
  - "scripts/publish/*_submit.py"
  - "scripts/manga/*_upload*.py"
  - "scripts/manga/*_publish*.py"
  - "scripts/release/*_upload*.py"

# Override / waiver markers (rare — must be approved in PR body).
# Files containing this comment opt out of the BLOCKED check for the
# named platform, e.g.:
#   # AI_POLICY_BLOCKER_OK: tapas (read-only catalog query, no upload)
allow_marker_pattern: "# AI_POLICY_BLOCKER_OK:"
