# ---------------------------------------------------------------------------
# §6 QUALITY GATES — every cover must pass these before shipping. Failed
# gates halt the renderer with a surfaced reason.
# ---------------------------------------------------------------------------
quality_gates:

  thumbnail_focal_clarity:
    automated: true
    method: "render at 100x160, run saliency map; require single peak >= 1.6x second peak"

  title_legible_at_thumbnail:
    automated: true
    method: "render at 100x160, OCR title; min confidence 0.7"

  color_count:
    automated: true
    method: "k-means cluster final RGB; require <= 3 dominant clusters at >5% area each"

  brand_palette_respected:
    automated: true
    method: "verify dominant cluster centers within delta-E 8 of brand palette hex"

  author_signature_color_present:
    automated: true
    method: "verify >=5% area within delta-E 8 of author signature_color"

  warm_white_not_pure:
    automated: true
    method: "any white cluster must be >= #F0EBE0 warmth, not pure #FFFFFF"

  no_ai_atmospheric_goo:
    automated: false
    manual: true
    method: "operator confirms no soft-gradient mush in imagery zone"

  shadow_consistency:
    automated: false
    manual: true
    method: "operator confirms light direction consistent on focal element vs background"

  no_pseudo_photorealism_smudge:
    automated: false
    manual: true
    method: "operator confirms edges crisp; not the schnell 4-step smudge"

  not_interchangeable_with_siblings:
    automated: false
    manual: true
    method: "operator places 4 covers from same brand side-by-side; can name each at thumbnail"

  emotional_one_word_read:
    automated: false
    manual: true
    method: "operator + 1 non-designer name same one-word register matching brand.one_word_read"

# ---------------------------------------------------------------------------
# §0 OBJECTIVE CRAFT CRITERIA — referenced by quality gates above. Encoded
# here so R7's render pipeline can surface specific failure reasons.
# ---------------------------------------------------------------------------
craft_criteria:
  focal_clarity_at_thumbnail:
    rule: "exactly one element occupies >= 40% of canvas; second element <= 25%"
    test_size: [100, 160]
  emotional_one_word_read:
    rule: "non-designer can name brand.one_word_read in <= 2 seconds"
  color_discipline_60_30_10:
    rule: "primary 60-70%, secondary 20-30%, accent ~10%; total <= 3 colors at >5% area"
  type_integration:
    rule: "type sits in pre-reserved negative-space zone; no matte panel over imagery"
  warm_off_white:
    rule: "no pure #FFFFFF; off-white >= #F0EBE0"
  ai_tells_to_avoid:
    - atmospheric_goo
    - pseudo_photorealism_at_edges
    - generic_register
    - focal_vagueness
    - composite_without_light_discipline
    - faux_handwritten_fonts
    - schnell_smudge
