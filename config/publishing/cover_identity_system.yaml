# ---------------------------------------------------------------------------
# §3 SERIES SCHEMAS — three continuity rules for when an author has multiple
# books. Default = rotating_accent. Use fixed_motif_varying_scale for
# explicit journey arcs. Use accumulating_mark for explicit numbered series.
# ---------------------------------------------------------------------------
series_schemas:

  rotating_accent:
    description: "Brand template, palette, motif focus, and type quirk fixed. Per-book accent color rotates within +/- 15deg hue of brand accent."
    use_when: "self-help backlist, independent topics, same author"
    permitted_accent_palette_size: [3, 5]

  fixed_motif_varying_scale:
    description: "Same focal motif on every book in series, at varying scale or composition (e.g., mountain from below / midway / summit)."
    use_when: "explicit journey or trilogy"

  accumulating_mark:
    description: "A single visual element accumulates across the series (band that fills, ring that closes, numbered seal)."
    use_when: "explicit numbered series (Vol I, II, III)"

  default: "rotating_accent"

