    typography:
      title_family: "DM Serif Display"
      title_case: "sentence"
      title_tracking: "+4%"
      author_family: "Inter"
      author_weight: "light"
      author_case: "lowercase"
    finish: "soft matte, slight grain, no gloss"
    one_word_read: "stillness"

  awakening_press:
