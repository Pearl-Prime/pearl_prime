# Cover Identity System — R6 four-layer differentiation contract.
#
# Source artifact:
#   artifacts/research/cover_quality_and_differentiation_framework_2026-05-03.md
#
# Consumer:
#   R7 will rewrite scripts/publish/render_kdp_cover.py to read this YAML
#   and produce per-book covers that respect:
#     §1 brand   — house style + palette + motif pool + typography
#     §2 author  — signature color + motif focus + type quirk (within brand)
#     §3 series  — continuity schema (rotating accent / fixed motif / numbered)
#     §4 book    — subject + micro-palette shift + register + title placement
#
# Why this exists:
#   R1 and R4 stopped at PER-GENRE archetypes. That makes every anxiety
#   book look the same and every grief book look the same. The 800-book
#   future-state will look like one giant template fill. This YAML adds
#   the four missing layers so each cover differentiates at brand /
#   author / series / book scale while still passing bestseller-quality
#   gates.
#
# Engine floor:
#   flux1-dev fp8 at 28 steps with dpmpp_2m + karras. Schnell at 4 steps
#   cannot deliver bestseller-grade output and the renderer must auto-
#   route to type-only fallback if the engine drops to schnell.
#
# Coordinate convention:
#   Title / subtitle / author / accent zones are owned by
#   config/publishing/bestseller_templates.yaml (R4). This file owns
#   identity, not geometry.

schema_version: 1
last_updated: "2026-05-03"

engine_floor:
  base_model: "flux1-dev-fp8.safetensors"
  sampler: "dpmpp_2m"
  scheduler: "karras"
  steps: 28
  cfg: 3.5
  fallback_on_lower_engine: "type_only"

# ---------------------------------------------------------------------------
# §1 BRANDS — 13 publisher imprints. Each brand commits to ONE inspiration
# publisher, ONE palette, ONE motif pool, ONE typography signature, ONE
# emotional one-word read. No two brands share the same one-word read.
# ---------------------------------------------------------------------------
brands:

  inner_light_press:
    inspiration: "Sounds True (atmospheric contemplative, 80% type 20% imagery)"
    palette:
      primary: "#0E1B33"     # deep dusk navy, 60-70%
      secondary: "#FAF1DD"   # warm cream, 20-30%
      accent: "#7AA3C7"      # calm sky-blue, 10%
