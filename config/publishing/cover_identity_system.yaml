      secondary: "#F5EFE3"   # parchment
      accent: "#E8B765"      # sunlit gold
    motif_pool: [sun, single_circle, mandorla, ascending_line]
    typography:
      title_family: "Cormorant Garamond"
      title_case: "small_caps"
      title_tracking: "+2%"
      author_family: "Cormorant Garamond"
      author_weight: "italic"
