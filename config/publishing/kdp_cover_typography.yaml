defaults:
  canvas_w: 1600
  canvas_h: 2560
  fonts:
    serif: assets/fonts/kdp_overlay/eb_garamond/EBGaramond-VariableFont_wght.ttf
    sans_serif: assets/fonts/kdp_overlay/inter/Inter-VariableFont_opsz_wght.ttf
    display: assets/fonts/kdp_overlay/playfair_display/PlayfairDisplay-VariableFont_wght.ttf
    script: assets/fonts/kdp_overlay/caveat/Caveat-VariableFont_wght.ttf
    noto_sans_jp: assets/fonts/kdp_overlay/noto_sans_jp/NotoSansJP-Bold.ttf
    noto_serif_jp: assets/fonts/kdp_overlay/noto_serif_jp/NotoSerifJP-Bold.ttf
  default_author_zone:
    position: bottom
    anchor: centered
    max_width_pct: 70
    max_height_pct: 6
    vertical_offset_pct: 90
  default_author_style:
    font_family: sans_serif
    font_weight: bold
    size_px_at_1600x2560: 78
    tracking_pct: 8
    case: upper
    color: auto
    shadow:
      offset_px:
      - 0
      - 2
      blur_px: 8
      color_alpha: 0.3
genres:
  anxiety:
    title_zone:
      position: top
      anchor: centered
      max_width_pct: 86
      max_height_pct: 22
      vertical_offset_pct: 8
    title_style:
      font_family: sans_serif
      font_weight: extra_bold
      size_px_at_1600x2560: 220
      tracking_pct: -1
      case: title
      color: auto
      shadow:
        offset_px:
        - 0
        - 4
        blur_px: 14
        color_alpha: 0.38
    subtitle_style:
      font_family: sans_serif
      font_weight: regular
      size_px_at_1600x2560: 92
      tracking_pct: 2
      case: title
      color: auto
      shadow:
        offset_px:
        - 0
        - 2
        blur_px: 8
        color_alpha: 0.3
    palette_hints:
      prefer_light_text_if_dark_zone: true
      hex_palette_fallback:
      - '#FAF6EE'
      - '#1E3A8A'
