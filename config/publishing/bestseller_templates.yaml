# Bestseller Cover Composition Templates — per-genre composition contract.
#
# Source: artifacts/research/bestseller_composition_templates_2026-05-03.md (R4).
# Consumer: scripts/publish/render_kdp_cover.py (R5 will rewrite the renderer
# to read this YAML and produce non-overlapping zone composites per genre).
#
# Why this file exists:
#   R1's typography YAML (kdp_cover_typography.yaml) gives font/weight/size
#   per genre but no explicit imagery_zone bbox, no flat-color flag, no
#   FLUX-bypass flag. R3's text overlay landed text on top of FLUX focal
#   elements because the renderer had no contract for "where the focal
#   element is" vs. "where the title goes." This YAML closes that contract.
#
# Coordinate convention:
#   Origin top-left. Canvas 1600x2560 (KDP self-help portrait).
#   All zones are [x_min_pct, y_min_pct, x_max_pct, y_max_pct] of canvas.
#   1% x = 16 px, 1% y = 25.6 px.
#
# Renderer logic (R5 to implement):
#   1. Look up genre -> template.
#   2. If templates[genre].imagery_zone is null: skip FLUX entirely.
#      Paint flat palette.primary.hex on full canvas. Composite type
#      into title/subtitle/author zones in palette.secondary.hex.
#   3. Else: call FLUX with the genre's flux_aspect ratio and the
#      per-genre prompt from artifacts/research/bestseller_composition_templates_2026-05-03.md
#      §11. Composite the FLUX output into imagery_zone of the canvas.
#      Paint palette.primary.hex into the rest of the canvas. Composite
#      type per zone bboxes.
#   4. Validate title legibility at 100x160 thumbnail before declaring
#      success.
#
# All overlap_rule values are "no_overlap" by deliberate choice — eliminates
# the matte/legibility bug class that broke Session-7 probes.

schema_version: 1
last_updated: "2026-05-03"
canvas:
  width: 1600
  height: 2560

universal_rules:
  min_title_pct_canvas_height: 14
  max_fonts_per_cover: 2
  max_colors_per_cover: 3
  safe_zone_margin_pct: 3
  thumbnail_legibility_test:
    width: 100
    height: 160
    min_ocr_confidence: 0.7
  vertical_separation:
    title_above_imagery_min_band_pct: 6
    title_below_imagery_min_band_pct: 8
  author_zone_max_y_pct: 96
  author_zone_min_y_pct: 88

