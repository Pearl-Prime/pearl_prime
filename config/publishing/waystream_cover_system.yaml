# ---------------------------------------------------------------------------
# PER-TOPIC SYMBOL VOCABULARY.
# motif = primitive glyph drawn by symbols.py. The glyph is repeated
# (count == installment, 1..7) in an arrangement seeded by book_id, so no two
# books share a pattern. Color is luminance-picked for HIGH CONTRAST.
# ---------------------------------------------------------------------------
topic_symbols:
  anxiety:           {motif: breath,   reads: "concentric calm"}
  courage:           {motif: rise,     reads: "upward chevron"}
  overthinking:      {motif: loop,     reads: "looping thought"}
  sleep_anxiety:     {motif: crescent, reads: "moon arc"}
  social_anxiety:    {motif: link,     reads: "two joined rings"}
  boundaries:        {motif: divider,  reads: "a line drawn"}
  burnout:           {motif: ember,    reads: "low flame"}
  compassion_fatigue: {motif: wane,    reads: "diminishing"}
  depression:        {motif: lowline,  reads: "weight on a low line"}
  financial_anxiety: {motif: bars,     reads: "uneven columns"}
  financial_stress:  {motif: jagged,   reads: "spike"}
  grief:             {motif: drop,     reads: "single mark / absence"}
  imposter_syndrome: {motif: offset,   reads: "gap between selves"}
  self_worth:        {motif: ring,     reads: "a whole circle"}
  somatic_healing:   {motif: stem,     reads: "rooted breath"}

# ---------------------------------------------------------------------------
# FLUX POOL PROMPTS — only image_families authors need a pool (10 of 20).
# schnell only. {N} images each, vary seed. No text / no people / no frame.
# ---------------------------------------------------------------------------
pool:
  negative: "text, words, letters, typography, title, watermark, signature, people, faces, hands, buildings, frame, border, ui, logo"
  count: 15
  prompts:
    lena_frost:    "abstract atmospheric book cover background, deep dusk navy sky over a warm cream lower field, a soft low horizon line of dawn light, subtle ink-wash texture, contemplative, minimal, fine-art, no text, no people"
    tomas_vidal:   "abstract atmospheric book cover background, deep slate-blue dusk sky over a darker sea, a single pale horizon line of cool light low in the frame, ink-wash texture, moody, fine-art, no text, no people"
    sam_meridian:  "abstract atmospheric book cover background, deep forest-charcoal green with a single low clearing of warm light emerging from shadow, ink-wash texture, grounded, moody, fine-art, no text, no people"
    daniel_cho:    "abstract atmospheric book cover background, deep teal and pine-green water under a dark sky, a single shaft of cool light on still water, ink-wash texture, calm, moody, fine-art, no text, no people"
    jonah_kim:     "abstract atmospheric book cover background, deep spruce green and warm clay, a single shaft of low golden light through dark fog, textured, grounded, moody, fine-art, no text, no people"
    nina_vazquez:  "abstract atmospheric book cover background, deep teal-navy sea under a dim sky, a low horizon with a single faint cool glow, ink-wash texture, moody, fine-art, no text, no people"
    theo_castellan: "abstract atmospheric book cover background, warm charcoal and soft amber tones, a single luminous arch of light emerging from shadow, textured paper grain, grounded, contemplative, minimal, fine-art, no text, no people"
    priya_raman:   "abstract atmospheric book cover background, deep wine and rosewood dusk, a single warm dawn glow behind dark low hills, ink-wash texture, tender, moody, fine-art, no text, no people"
    ravi_chandra:  "abstract atmospheric book cover background, deep aubergine dusk with a single warm marigold sun low on a dark horizon, ink-wash texture, contemplative, moody, fine-art, no text, no people"
