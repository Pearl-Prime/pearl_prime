# Waystream Sanctuary — Cover Template System (Pearl_Dev)
# ---------------------------------------------------------------------------
# Machine contract for the VARIED, per-author + per-topic cover system.
# One brand (way_stream_sanctuary), 20 author lines, 15 topics, 800 books.
#
# Design law (reconciles research craft vs. operator "make it varied"):
#   * Each SINGLE cover stays craft-clean: one focal element, <=3 colors,
#     <=2 fonts, ONE high-contrast topic mark. (research §0)
#   * VARIATION lives across the SYSTEM: template family + fonts + palette
#     per author; symbol vocabulary per topic; symbol COUNT/arrangement per
#     book (count == installment == series-accumulation mark, research Schema C).
#   * Symbol color is chosen at render time by background luminance to
#     GUARANTEE contrast (fixes the pilot's invisible light-blue mark).
#
# Sources of truth:
#   authors/topics  -> artifacts/waystream/waystream_800book_catalog_plan.csv
#   FLUX recipe     -> schnell only (flux1-dev BANNED); Pearl Star ComfyUI
#   research        -> artifacts/research/cover_quality_and_differentiation_framework_2026-05-03.md
schema_version: 1

brand:
  brand_id: way_stream_sanctuary
  imprint: "WAYSTREAM SANCTUARY"
  one_word_read: "steady"

canvas: {w: 1600, h: 2560}   # KDP 1.6:1

# Two content tracks (from the catalog): each author writes exactly one.
tracks:
  activation:   # lighter, dawn/sky/sea — the "calm the alarm / be brave" arc
    topics: [anxiety, courage, overthinking, sleep_anxiety, social_anxiety]
  ground:       # heavier, dusk/earth/ember — the "low places / limits / refill" arc
    topics: [boundaries, burnout, compassion_fatigue, depression, financial_anxiety,
             financial_stress, grief, imposter_syndrome, self_worth, somatic_healing]

# The layout LIBRARY. 4 use a FLUX image; 4 are image-free (zero GPU).
families: [full_bleed, inset_card, panel_bands, title_block,
           gradient_solo, framed, duotone_split, stripe_minimal, type_dominant]
image_families: [full_bleed, inset_card, panel_bands, title_block]

# ---------------------------------------------------------------------------
