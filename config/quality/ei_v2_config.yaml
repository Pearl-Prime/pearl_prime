marketing_sources:
  enabled: true
  source_path: marketing_deep_research
  use_marketing_lexicons: true
  use_marketing_safety_bans: true
  use_invisible_script_alignment: false
research_kb:
  enabled: true
  kb_path: artifacts/research/kb
  min_confidence: 0.65
  youth_anchor_weight: 0.08
  invisible_script_weight: 0.05
  contradiction_weight: 0.06
  shadow_metadata_enabled: true
  shadow_metadata_path: artifacts/ei_v2/metadata_candidates
  shadow_promotion_gate_path: config/research_metadata/promotion_criteria.yaml
safety_classifier:
  enabled: true
  mode: heuristic_plus
  medical_claim_threshold: 0.6
  promotional_threshold: 0.5
  clinical_language_threshold: 0.5
  marketing_compliance_weight: 0.2
  cache_enabled: true
  cache_path: artifacts/ei_v2/safety_cache.jsonl
llm_quality:
  enabled: false
  max_calls_per_book: 100
  max_calls_per_chapter: 10
  safety_classifier_mode: heuristic_plus
  cross_encoder_mode: heuristic
  fallback_on_budget_exceeded: heuristic
cross_encoder:
  enabled: true
  mode: heuristic
  model: null
  cache_enabled: true
  cache_path: artifacts/ei_v2/rerank_cache.db
  top_n: 5
domain_embeddings:
  enabled: true
  mode: weighted
  model: null
  persona_weight: 0.3
  topic_weight: 0.3
  thesis_weight: 0.4
  cache_enabled: true
  cache_path: artifacts/ei_v2/domain_embed_cache.db
tts_readability:
  enabled: true
  max_sentence_words: 35
  ideal_sentence_range:
  - 8
  - 25
  min_paragraph_breaks_per_500_words: 3
  rhythm_variance_min: 0.15
  problematic_tts_patterns:
  - \b\w{15,}\b
  - \([^)]{50,}\)
  - ;\s*\w+;\s*\w+;
semantic_dedup:
  enabled: true
  mode: ngram_plus_embedding
  ngram_n: 6
  ngram_overlap_threshold: 0.3
  semantic_similarity_threshold: 0.85
  cache_enabled: true
  cache_path: artifacts/ei_v2/dedup_cache.db
  # Shipped-book chapter uniqueness (EI v2 rigorous eval / spine pipeline).
  # Prose-first: penalize near-duplicate writing, not shared beat/structure.
  within_book_chapter:
    prose_ngram_weight: 0.70
    prose_char_weight: 0.30
    ngram_penalty_floor: 0.10
    ngram_penalty_scale: 3.0
emotion_arc:
  enabled: true
  mode: lexicon
  valence_lexicon_size: medium
  arc_deviation_warn: 0.3
  arc_deviation_fail: 0.6
book_structure:
  thesis_from_arc: true
  enforce_bestseller_beat_order: true
composite_weights:
  rerank: 0.3
  safety: 0.2
  domain_similarity: 0.15
  tts_readability: 0.15
  duration_fit: 0.2
hybrid:
  enabled: true
  override_margin: 0.12
  safety_block_threshold: 0.5
  dedup_block_threshold: 0.6
  arc_block_threshold: 0.5
  tts_block_threshold: 0.3
  duration_fit_block_threshold: 0.44
  scope: all
duration_fit:
  enabled: true
  mode: rule_based
  neutral_when_unscored: 0.62
  weights:
    therapeutic_fit: 0.4
    platform_fit: 0.35
    attention_fit: 0.25
  thresholds:
    pass: 0.6
    warn: 0.45
    fail: 0.44
dimension_gates:
  enabled: true
  fail_mode: block
  blocked_dimensions:
  - engagement
  - somatic_precision
  - uniqueness
  - cohesion
  - listen_experience
  dimension_gate_phase: 3
  uniqueness:
    # ACT-013: phrase-jaccard scoring; topic-vocab overlap is by design, not defect
    pass_threshold: 0.10
    warn_threshold: 0.15
    max_structural_repeats_per_chapter: 2
  engagement:
    min_hooks_per_chapter: 1
    min_tension_markers: 2
    require_pull_forward: true
    pass_threshold: 0.35
    warn_threshold: 0.2
  somatic_precision:
    # ACT-013: fixed 15-body-word target; proportional density overpenalised long-form
    min_somatic_words_per_chapter: 3
    min_somatic_density_per_100w: 1.5
    pass_threshold: 0.25
    warn_threshold: 0.15
  listen_experience:
    # ACT-013: short-sentence style (median ≤6 words) is intentional Phoenix pacing
    pass_threshold: 0.4
    warn_threshold: 0.25
    repetition_window_words: 200
    repetition_ngram_words: 4
  cohesion:
    min_cross_chapter_refs: 1
    pass_threshold: 0.35
    warn_threshold: 0.20
visual_therapeutic:
  enabled: true
  mode: heuristic
  dimensions:
    vt_parasympathetic:
      weight: 0.3
      warn_below: 0.4
      fail_below: 0.2
      target_threshold: 0.6
      inputs:
      - fractal_density
      - cool_palette_ratio
      - breath_sequence_count
      - panel_size_ratio
    vt_processing:
      weight: 0.25
      warn_below: 0.35
      fail_below: 0.15
      target_threshold: 0.6
      inputs:
      - gutter_compliance
      - sabido_completeness
      - beat_sequence_alignment
    vt_somatic:
      weight: 0.25
      warn_below: 0.35
      fail_below: 0.15
      target_threshold: 0.6
      inputs:
      - breath_validity
      - color_arc_monotonicity
      - fractal_hold_presence
      - tempo_compliance
      - silence_compliance
    vt_stealth:
      weight: 0.2
      warn_below: 0.7
      fail_below: 0.5
      target_threshold: 0.6
      blocker_threshold: 0.5
      forbidden_terms:
      - therapy
      - mindfulness
      - grounding
      - breathing exercise
      - meditation
      - wellness
      - self-care
      - healing journey
      - inner peace
      - mental health
      - calm down
      - relax your body
      - take a breath
      penalty_weight: 100
  composite:
    pass_threshold: 0.5
    target: 0.7
teacher_topic_persona_scores_path: config/catalog_planning/teacher_topic_persona_scores.yaml
learner:
  enabled: true
  feedback_path: artifacts/ei_v2/learner_feedback.jsonl
  params_path: artifacts/ei_v2/learned_params.json
  learning_window: 200
  ema_alpha: 0.15
  max_weight_delta: 0.05
  min_observations: 10
  auto_learn: true
manuscript_recurrence:
  enabled: true
  max_signature_recurrences: 3
  min_phrase_words: 8
exercise_governance:
  max_per_chapter_default: 2
  override_per_format:
    micro_book_15: 1
    micro_book_20: 1
    deep_book_6h: 3
