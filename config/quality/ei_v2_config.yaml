# Enlightened Intelligence V2 Configuration
# Runs parallel to V1 for A/B comparison. V1 remains authoritative.
# Enable/disable each dimension independently.
#
# Usage: python scripts/run_pipeline.py ... --ei-v2-compare
# Output: artifacts/ei_v2/ei_v1_v2_comparison.json + summary.txt
#
# ── Marketing integration (Option A locked: marketing_deep_research) ──
# When enabled + valid files: use marketing lexicons/bans. Missing/malformed file:
# fallback to built-in for that component with warning (no crash).
# One global switch (enabled: false) disables all marketing integration instantly.
marketing_sources:
  enabled: true
  # Repo-root directory: 02/03/04 YAMLs for EI lexicons. 03/04 symlink to config/marketing/* for canonical copy.
  source_path: marketing_deep_research
  use_marketing_lexicons: true
  use_marketing_safety_bans: true
  use_invisible_script_alignment: false

# ── Research KB integration (Gen Z / Gen Alpha research signals) ──
# When enabled + KB present: use research KB for youth anchors, invisible scripts,
# contradiction markers, and topic vocabulary in domain_embeddings.
# Missing/empty KB: fallback to built-in signals with warning (no crash).
# One global switch (enabled: false) disables all research KB integration instantly.
research_kb:
  enabled: true
  kb_path: artifacts/research/kb
  min_confidence: 0.65          # Only use entries with confidence >= this
  # Weights for research-derived signals in domain_embeddings (additive to existing)
  youth_anchor_weight: 0.08     # Boost when text contains research-derived youth anchors
  invisible_script_weight: 0.05 # Boost when text reflects known invisible scripts
  contradiction_weight: 0.06    # Boost for contradiction-surfacing content
  # Shadow metadata: when true, research runner can propose persona/topic metadata updates
  shadow_metadata_enabled: true
  shadow_metadata_path: artifacts/ei_v2/metadata_candidates
  shadow_promotion_gate_path: config/research_metadata/promotion_criteria.yaml

safety_classifier:
  enabled: true
  mode: heuristic_plus           # "heuristic_plus" (no deps) or "llm" (requires API)
  medical_claim_threshold: 0.6   # Score above this = flagged
  promotional_threshold: 0.5
  clinical_language_threshold: 0.5
  marketing_compliance_weight: 0.2   # Weight for marketing_compliance signal (0–1); no hardwired penalties
  cache_enabled: true
  cache_path: artifacts/ei_v2/safety_cache.jsonl

# ── LLM quality (opt-in master switch; budgets; mode hints for future wiring) ──
# Does not override safety_classifier.mode / cross_encoder.mode above unless the
# caller applies llm_quality.* when building runtime config.
llm_quality:
  enabled: false
  max_calls_per_book: 100
  max_calls_per_chapter: 10
  safety_classifier_mode: heuristic_plus
  cross_encoder_mode: heuristic
  fallback_on_budget_exceeded: heuristic

cross_encoder:
  enabled: true
  mode: heuristic                # "heuristic" (no deps) or "model" (requires model callback)
  model: null                    # Set to model name when using "model" mode
  cache_enabled: true
  cache_path: artifacts/ei_v2/rerank_cache.db
  top_n: 5                      # Max candidates to return from reranking

domain_embeddings:
  enabled: true
  mode: weighted                 # "weighted" heuristic or "model" with embed_fn
  model: null                    # Set to embedding model name when using external API
  persona_weight: 0.3            # Weight for persona context affinity
  topic_weight: 0.3              # Weight for topic coherence
  thesis_weight: 0.4             # Weight for core thesis alignment
  cache_enabled: true
  cache_path: artifacts/ei_v2/domain_embed_cache.db

tts_readability:
  enabled: true
  max_sentence_words: 35         # Sentences longer than this are penalized
  ideal_sentence_range: [8, 25]  # Sweet spot for TTS pacing
  min_paragraph_breaks_per_500_words: 3
  rhythm_variance_min: 0.15      # Below this = monotone pacing warning
  problematic_tts_patterns:      # Regex patterns TTS handles poorly
    - '\b\w{15,}\b'             # Very long words
    - '\([^)]{50,}\)'           # Long parentheticals
    - ';\s*\w+;\s*\w+;'        # Semicolon chains

semantic_dedup:
  enabled: true
  mode: ngram_plus_embedding     # "ngram_plus_embedding" or "full" (with embed_fn)
  ngram_n: 6                     # Word n-gram size for overlap detection
  ngram_overlap_threshold: 0.30  # Jaccard above this = flagged pair
  semantic_similarity_threshold: 0.85  # Embedding similarity above this = flagged
  cache_enabled: true
  cache_path: artifacts/ei_v2/dedup_cache.db

emotion_arc:
  enabled: true
  mode: lexicon                  # "lexicon" (built-in) or "model" (future)
  valence_lexicon_size: medium
  arc_deviation_warn: 0.3        # Deviation from expected valence triggers warning
  arc_deviation_fail: 0.6        # Deviation above this = fail

# ── Book structure (Pearl Prime) ──
# EI v2 uses chapter_thesis (from arc) and bestseller_structure for learning and assembly.
# known_slot_types include PIVOT, TAKEAWAY, PERMISSION, THREAD. Full defaults in config.py.
book_structure:
  thesis_from_arc: true
  # BG-PR-09: when true, assembly compile raises if slot order does not match assigned bestseller structure.
  # Default false for one release cycle; flip to true after plans are aligned.
  enforce_bestseller_beat_order: false

# Composite weights for V2 candidate selection (sum to 1.0 recommended)
# These are defaults; the learner can adjust them over time.
# CDIS §11.2: duration_fit added at 0.20; others scaled down.
composite_weights:
  rerank: 0.30                   # Cross-encoder relevance
  safety: 0.20                   # Safety inversed (1 - risk)
  domain_similarity: 0.15        # Domain-tuned thesis alignment
  tts_readability: 0.15          # TTS readability composite
  duration_fit: 0.20             # Content Duration Intelligence (registry / platform / persona)

# ── Hybrid V1+V2 selector ──
# Layered override: V1 picks, V2 scores, override only when clearly better.
hybrid:
  enabled: true
  override_margin: 0.12          # V2_best - V2_v1winner must exceed this
  safety_block_threshold: 0.5    # V1 winner blocked if safety risk > this
  dedup_block_threshold: 0.6     # V1 winner blocked if dedup sim > this
  arc_block_threshold: 0.5       # Block if arc deviation > this
  tts_block_threshold: 0.3       # Block if TTS composite < this
  duration_fit_block_threshold: 0.44  # Below duration_fit composite (CDIS §13)
  scope: "all"                   # "all", or list of format/persona/topic to limit

# ── Content Duration Intelligence (CDIS) §11.1 ──
duration_fit:
  enabled: true
  mode: rule_based
  neutral_when_unscored: 0.62   # hybrid selector: no per-candidate duration metadata
  weights:
    therapeutic_fit: 0.40
    platform_fit: 0.35
    attention_fit: 0.25
  thresholds:
    pass: 0.60
    warn: 0.45
    fail: 0.44

# ── Dimension enforcement gates ──
# Per-chapter quality minimums. FAIL = hard block; WARN = logged.
dimension_gates:
  enabled: true
  fail_mode: block               # "warn" (log only) or "block" (fail build)
  blocked_dimensions: [engagement, somatic_precision, uniqueness, cohesion, listen_experience]
  dimension_gate_phase: 3
  uniqueness:
    pass_threshold: 0.15
    warn_threshold: 0.30
    max_structural_repeats_per_chapter: 2
  engagement:
    min_hooks_per_chapter: 1
    min_tension_markers: 2
    require_pull_forward: true
    pass_threshold: 0.35
    warn_threshold: 0.20
  somatic_precision:
    min_somatic_words_per_chapter: 3
    min_somatic_density_per_100w: 1.5
    pass_threshold: 0.40
    warn_threshold: 0.25
  listen_experience:
    pass_threshold: 0.5
    warn_threshold: 0.3
    repetition_window_words: 200
    repetition_ngram_words: 4
  cohesion:
    min_cross_chapter_refs: 1
    pass_threshold: 0.40
    warn_threshold: 0.25

# ── Visual / implicit therapeutic (manga, illustrated, companion QC) ──
visual_therapeutic:
  enabled: true
  mode: heuristic
  dimensions:
    vt_parasympathetic:
      weight: 0.30
      warn_below: 0.40
      fail_below: 0.20
      target_threshold: 0.60
      inputs: [fractal_density, cool_palette_ratio, breath_sequence_count, panel_size_ratio]
    vt_processing:
      weight: 0.25
      warn_below: 0.35
      fail_below: 0.15
      target_threshold: 0.60
      inputs: [gutter_compliance, sabido_completeness, beat_sequence_alignment]
    vt_somatic:
      weight: 0.25
      warn_below: 0.35
      fail_below: 0.15
      target_threshold: 0.60
      inputs: [breath_validity, color_arc_monotonicity, fractal_hold_presence, tempo_compliance, silence_compliance]
    vt_stealth:
      weight: 0.20
      warn_below: 0.70
      fail_below: 0.50
      target_threshold: 0.60
      blocker_threshold: 0.50
      forbidden_terms:
        - therapy
        - mindfulness
        - grounding
        - breathing exercise
        - meditation
        - wellness
        - self-care
        - healing journey
        - inner peace
        - mental health
        - calm down
        - relax your body
        - take a breath
      penalty_weight: 100
  composite:
    pass_threshold: 0.50
    target: 0.70

# ── Teacher × topic × persona fit (optional) ──
# When set, EI v2 can use scores for adaptation hints and learning. See specs/TEACHER_UNIVERSAL_AND_SCORING_SPEC.md.
teacher_topic_persona_scores_path: config/catalog_planning/teacher_topic_persona_scores.yaml

# ── Learning system ──
# Adaptive weight/threshold tuning based on feedback.
learner:
  enabled: true
  feedback_path: artifacts/ei_v2/learner_feedback.jsonl
  params_path: artifacts/ei_v2/learned_params.json
  learning_window: 200           # Recent N observations for learning cycle
  ema_alpha: 0.15                # Exponential moving average decay
  max_weight_delta: 0.05         # Max weight shift per cycle
  min_observations: 10           # Min before any adjustment
  auto_learn: true               # Run learn() after each catalog calibration

# Whole-manuscript signature phrase recurrence (post dedup, warn-only telemetry)
manuscript_recurrence:
  enabled: true
  max_signature_recurrences: 3
  min_phrase_words: 8

# Per-chapter EXERCISE caps (composed spine + registry chapter path uses planner contracts when wired)
exercise_governance:
  max_per_chapter_default: 2
  override_per_format:
    micro_book_15: 1
    micro_book_20: 1
    deep_book_6h: 3
