# Bestseller Craft Gate — ONTGP (Orient / Name / Turn / Give / Pull) thresholds.
# Authority: docs/PEARL_PRIME_BESTSELLER_WRITING_OVERLAY_SPEC.md §4.
# Used by: phoenix_v4/quality/bestseller_craft_gate.py
#
# Each chapter is evaluated against five craft moves.  Scores are [0, 1].
# fail_below → hard block; warn_below → logged warning; above warn → PASS.

bestseller_craft:
  # Overall gate thresholds
  fail_below: 0.20
  warn_below: 0.40

  # Zone sizing (word spans for Orient/Pull; fractional positions for Name/Turn/Give)
  orient_word_span: 150
  pull_word_span: 100
  name_start_frac: 0.12
  name_end_frac: 0.45
  turn_start_frac: 0.22
  turn_end_frac: 0.58
  give_start_frac: 0.48

  # Per-move override thresholds (optional; defaults to global fail_below/warn_below)
  per_move:
    orient:
      fail_below: 0.20
      warn_below: 0.40
    name:
      fail_below: 0.20
      warn_below: 0.40
    turn:
      fail_below: 0.20
      warn_below: 0.40
    give:
      fail_below: 0.20
      warn_below: 0.40
    pull:
      fail_below: 0.20
      warn_below: 0.40

  # LLM tier (opt-in; requires callback wiring at runtime)
  llm_tier:
    enabled: false
    max_calls_per_chapter: 5

  # Gate enforcement mode
  enforcement:
    mode: block            # "block" (hard fail) or "warn" (log only)
    skip_short_chapters_below_words: 200   # chapters under this word count are skipped
