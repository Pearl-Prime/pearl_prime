version: 1
spec_anchor: "docs/specs/SCENE_ANCHOR_DENSITY_CAP_V2_SPEC.md"

# scene_anchor_density gate — per-chapter cap on the number of paragraphs in which
# any single >=4-word phrase may appear.
#
# Cap semantics: a phrase appearing in MORE THAN `cap` paragraphs of one chapter is
# flagged as a violation. cap=3 therefore means "a phrase may appear in up to 3
# paragraphs per chapter; 4+ paragraphs is a violation".
#
# Cap rationale (empirical, en_US catalog audit 2026-05-13, PR #1089):
#   - With cap=2 (legacy default), 168/200 BookSpecs failed at this gate.
#   - 156 of 168 failures had max paragraph_count = 3 (one paragraph over cap).
#      11 of 168 failures had max paragraph_count = 4.
#       1 of 168 failures had max paragraph_count = 5.
#   - The 156 paragraph_count==3 failures are dominated by natural rhetorical motifs
#     (e.g. "about who you are", "you say yes before") that legitimately recur in
#     well-structured chapter prose. cap=2 was over-tight for the standard_book runtime.
#   - Raising the default to cap=3 recovers ~91% catalog yield while still catching
#     the truly egregious 4+ paragraph repetitions (12 books).
#
# Authored plans (config/plans/*.yaml) may override per-chapter via scene_plan.scene_anchor_cap.
# The pipeline takes min(scene_plan caps) across chapters of a book, so any chapter that
# explicitly tightens the cap will tighten the whole book — preserving backward compat for
# the small set of hand-tuned plans.

default_cap_per_chapter: 3   # was 2 pre-2026-05-13; see PR fix(quality): scene_anchor_density yield recovery

# Reporting: the underlying algorithm enumerates all overlapping 4..8 word n-grams.
# A single 8-word recurring motif therefore produces up to 5 overlapping offender entries
# in the report (n-gram lengths 4,5,6,7,8 starting at the same anchor). Set
# `collapse_overlapping_ngrams: true` to keep only the longest member of each overlap chain
# in the per-chapter `offenders` list. This is a REPORTING change — the underlying decision
# (FAIL when any phrase exceeds cap) is unchanged.
collapse_overlapping_ngrams: true
