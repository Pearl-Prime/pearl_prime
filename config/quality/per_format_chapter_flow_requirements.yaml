    count: 8
    cue_density:
      v81: { thesis: 2, transition: 0 }
      v82: { thesis: 1, transition: 2 }
      v83: { thesis: 2, transition: 1 }
      v84: { thesis: 2, transition: 1 }
      v85: { thesis: 1, transition: 3 }
      v86: { thesis: 2, transition: 0 }
      v87: { thesis: 2, transition: 2 }
      v88: { thesis: 2, transition: 0 }
  PIVOT:
    file: atoms/gen_z_professionals/anxiety/PIVOT/CANONICAL.txt
    variants: [v44, v45, v46, v47, v48, v49]
