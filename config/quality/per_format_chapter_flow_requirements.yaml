      v31: { thesis: 1, transition: 4 }
      v32: { thesis: 1, transition: 3 }
      v33: { thesis: 3, transition: 4 }
      v34: { thesis: 2, transition: 1 }
      v35: { thesis: 1, transition: 1 }
    chapter_target_per_format:   # NEW field — per-format renumbered closer slot
      default: 12              # standard 12-chapter spine
      compact_book_5ch_15min: 5
      compact_book_5ch_20min: 5
      compact_book_8ch_30min: 8

# How to extend this file when a new runtime format lands
extension_protocol: |
  When adding a new compact runtime format:
  1. Declare compact_chapter_subset in config/format_selection/format_registry.yaml
  2. Add a new entry under runtime_formats: in this file with the renumbered
     chapter→original-spine mapping
  3. For each renumbered chapter, document required cues per the gate_cue_reference
     section
  4. If new wrapper atoms are needed (e.g., for a format with novel role placement),
     author them under pr_h_wrapper_atoms and add chapter_target_per_format mapping
  5. Re-run the chapter_flow gate smoke per docs/COMPACT_BOOK_FORMAT_SPECS_2026-05-04.md

# How chapter_target_per_format is consumed (informational)
# Currently the field is informational metadata in atom headers. Future
# enrichment_select.py work can read this field via the registry resolver
# to filter INTEGRATION variants by renumbered closer slot per format. PR-H
# ships the metadata convention; downstream consumer is a separate engineering PR.
chapter_target_per_format_consumer_status: informational_only_pr_h
