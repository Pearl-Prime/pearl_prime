# Book-pass gate thresholds scaled by chapter-count tier.
# Replaces hardcoded assumptions that all books are 8-12 chapters.
# Tier boundaries: micro (3-5), short (6-8), standard (8-12),
# extended (13-18), deep (19+).

book_pass:
  micro:  # 3-5 chapters
    min_distinct_bands: 2
    min_mechanism_depth: 2
    identity_stages_required: 2
    min_cost_intensity_peak: 3
    require_self_claim_final: true
    require_callback_completion: false
    min_bestseller_structures_distinct: 1
  short:  # 6-8 chapters
    min_distinct_bands: 3
    min_mechanism_depth: 3
    identity_stages_required: 3
    min_cost_intensity_peak: 3
    require_self_claim_final: true
    require_callback_completion: true
    min_bestseller_structures_distinct: 2
  standard:  # 8-12 chapters (current defaults)
    min_distinct_bands: 4
    min_mechanism_depth: 4
    identity_stages_required: 4
    min_cost_intensity_peak: 4
    require_self_claim_final: true
    require_callback_completion: true
    min_bestseller_structures_distinct: 4
  extended:  # 13-18 chapters
    min_distinct_bands: 4
    min_mechanism_depth: 4
    identity_stages_required: 4
    min_cost_intensity_peak: 4
    require_self_claim_final: true
    require_callback_completion: true
    min_bestseller_structures_distinct: 5
  deep:  # 19+ chapters
    min_distinct_bands: 5
    min_mechanism_depth: 4
    identity_stages_required: 4
    min_cost_intensity_peak: 4
    require_self_claim_final: true
    require_callback_completion: true
    min_bestseller_structures_distinct: 6

# Tier boundary definitions (chapter counts).
tier_boundaries:
  micro: [3, 5]
  short: [6, 8]
  standard: [9, 12]
  extended: [13, 18]
  deep: [19, 999]
