# anxiety_corporate_managers_scene_recognition_bank.yaml — corporate_managers × anxiety scene recognition bank
# 40 variants — collision_family distribution: undecidable_decision (7), struggling_team_member (6), dreaded_one_on_one (6), restructuring_signal (6), holding_it_together (7), performance_underneath (8)
bank_type: recognition
persona: corporate_managers
topic: anxiety

variants:
  - variant_id: acmr_001
    collision_family: undecidable_decision
    body: |
      The decision has to be made by Friday.
      You have the information you are going to get.
      You have read it three times and the answer has changed each time.

  - variant_id: acmr_002
    collision_family: undecidable_decision
    body: |
      You have made harder calls than this.
      You know what you would advise someone else to do.
      You are sitting at your desk at 6:45 pm and both options are still open.

  - variant_id: acmr_003
    collision_family: undecidable_decision
    body: |
      Either choice is defensible.
      You have written the brief that defends each one.
      You are the person who has to choose, and the briefs are not helping.

  - variant_id: acmr_004
    collision_family: undecidable_decision
    body: |
      You asked two people you trust.
      They gave you different answers.
      Both answers made sense.
      You are the tiebreaker and neither of their logics fully fits the thing in front of you.

  - variant_id: acmr_005
    collision_family: undecidable_decision
    body: |
      You know the decision you are leaning toward.
      You are delaying because making it official means owning what happens next.
      You are aware that you are delaying.
      That awareness is not closing the gap.

  - variant_id: acmr_006
    collision_family: undecidable_decision
    body: |
      The right call might become clear with more time.
      More time is not available.
      You are practicing making the call in your head,
      hearing the version where someone asks why you chose it.

  - variant_id: acmr_007
    collision_family: undecidable_decision
    body: |
      You have made the decision and walked it back twice.
      Each time you found something that seemed to undercut it.
      You are going to have to make it again in twenty minutes and this time it has to stay made.

  - variant_id: acmr_008
    collision_family: struggling_team_member
    body: |
      You can see that something is off.
      You have not found the way to name it that would let them receive it.
      The work is fine enough that you cannot point to it.
      The person is not fine.

  - variant_id: acmr_009
    collision_family: struggling_team_member
    body: |
      They are delivering.
      The numbers are there.
      Something in the meetings, in how they answer, tells you the delivery is costing them more than it should.
      You do not know what to do with what you can see.

  - variant_id: acmr_010
    collision_family: struggling_team_member
    body: |
      You asked how they were doing.
      They said fine.
      You do not think they are fine and you said okay anyway
      because you were not sure you were the right person to push further.

  - variant_id: acmr_011
    collision_family: struggling_team_member
    body: |
      You have been watching someone on your team pull back incrementally over the last two months.
      You have documented it in your head but not in writing.
      You are not sure if writing it would help them or hurt them.

  - variant_id: acmr_012
    collision_family: struggling_team_member
    body: |
      You want to support them.
      You also have targets and the targets do not have a column for this.
      You are trying to hold both and neither one is winning.

  - variant_id: acmr_013
    collision_family: struggling_team_member
    body: |
      The conversation would be easier if the performance were worse.
      Worse would have a language.
      This is harder to name, which is why you are still holding it two weeks later.

  - variant_id: acmr_014
    collision_family: dreaded_one_on_one
    body: |
      You have been carrying the thing you need to say into this one-on-one for three weeks.
      You have found a reason not to say it each time.
      Today's meeting is in forty minutes.

  - variant_id: acmr_015
    collision_family: dreaded_one_on_one
    body: |
      It will be fine.
      It has been fine in similar conversations.
      You are sitting in your car in the parking structure at 8:52 am
      running through the opening line again.

  - variant_id: acmr_016
    collision_family: dreaded_one_on_one
    body: |
      You have an agenda for the meeting.
      The thing that actually needs to be said is not on the agenda.
      You are deciding while you walk to the conference room whether today is the day.

  - variant_id: acmr_017
    collision_family: dreaded_one_on_one
    body: |
      You manage ten people.
      Nine of the one-on-ones feel functional.
      The tenth one, the one in two hours, is where you go quiet inside your own management.

  - variant_id: acmr_018
    collision_family: dreaded_one_on_one
    body: |
      You are not sure if the feedback you need to give will help or land wrong.
      You have thought about the framing enough that the framing has become its own problem.
      The meeting is tomorrow morning and you are doing it again tonight.

  - variant_id: acmr_019
    collision_family: dreaded_one_on_one
    body: |
      The one-on-one ended fine.
      You covered the agenda.
      The thing you needed to say is still unsaid and you are at your desk trying to decide
      if there is a different conversation or if this was the window.

  - variant_id: acmr_020
    collision_family: restructuring_signal
    body: |
      The email did not say much.
      Emails like that never say much.
      You have been reading it for context, for between-the-lines, for anything
      that would tell you how much to tell your team.

  - variant_id: acmr_021
    collision_family: restructuring_signal
    body: |
      You were in the meeting where the language shifted.
      You are not sure yet what the shift means.
      Your team is going to ask you what it means and you need an answer by tomorrow morning.

  - variant_id: acmr_022
    collision_family: restructuring_signal
    body: |
      Someone above you knows more than they have shared.
      You can tell by how they answered the question.
      You are the layer between that information and your team,
      and right now the information is not flowing down.

  - variant_id: acmr_023
    collision_family: restructuring_signal
    body: |
      Nothing has been announced.
      The thing that has not been announced is loud in the room anyway.
      You are in the all-hands nodding at the right moments
      and trying to look like you have more certainty than you do.

  - variant_id: acmr_024
    collision_family: restructuring_signal
    body: |
      The org chart changed once in the last year.
      The way people talk about the next quarter suggests it may change again.
      You are managing people who are waiting for you to know things you do not know yet.

  - variant_id: acmr_025
    collision_family: restructuring_signal
    body: |
      Your skip-level asked you to set time aside later this week for a conversation.
      No agenda.
      You have been treating that calendar invite like a code you need to break.

  - variant_id: acmr_026
    collision_family: holding_it_together
    body: |
      The project is behind.
      The team knows it is behind.
      You are in the meeting being the person who makes behind feel like still-manageable
      because one of you has to.

  - variant_id: acmr_027
    collision_family: holding_it_together
    body: |
      You are the one who does not visibly panic.
      That is part of the job.
      You do not know yet if it is something you chose or something that happened gradually.

  - variant_id: acmr_028
    collision_family: holding_it_together
    body: |
      Someone on your team got rattled in the meeting and you steadied them.
      You were rattled too.
      You will process that part later, in the car, or not at all.

  - variant_id: acmr_029
    collision_family: holding_it_together
    body: |
      You smiled through the announcement.
      You asked clarifying questions.
      You walked out of the room and stood in the stairwell for a minute
      before going back to your team.

  - variant_id: acmr_030
    collision_family: holding_it_together
    body: |
      Your direct report is frustrated.
      Their frustration is valid.
      You are absorbing it and giving back something steadier.
      You will need somewhere to put what you absorbed and you do not know where yet.

  - variant_id: acmr_031
    collision_family: holding_it_together
    body: |
      You are the person people come to when things feel uncertain.
      Today things feel uncertain to you.
      You are telling no one.
      You are not sure who you would tell.

  - variant_id: acmr_032
    collision_family: holding_it_together
    body: |
      You kept everyone calm.
      You said the right things.
      By the end of the day you were running on the version of yourself that knows how to do that,
      with nothing underneath it.

  - variant_id: acmr_033
    collision_family: performance_underneath
    body: |
      You are good at this job.
      The evidence is in the results.
      At 11 pm you are at your laptop running through the week looking for the place
      you are about to get it wrong.

  - variant_id: acmr_034
    collision_family: performance_underneath
    body: |
      During the day you move through decisions quickly.
      You have to — the pace requires it.
      At night the decisions come back and they are slower, heavier, more uncertain than they seemed at the time.

  - variant_id: acmr_035
    collision_family: performance_underneath
    body: |
      The version of you that runs meetings is confident.
      That version does not need reassurance.
      The version sitting in your kitchen at the end of the day is a different person
      and that person is reviewing the day line by line.

  - variant_id: acmr_036
    collision_family: performance_underneath
    body: |
      You have the title.
      You have the results.
      You are still doing the calculation in the back of your head
      that asks whether someone with more experience would have gotten here by a better route.

  - variant_id: acmr_037
    collision_family: performance_underneath
    body: |
      In the meeting you are authoritative.
      Between the meetings, in the transition, in the hallway,
      you are running the version of the meeting that could go wrong next time.

  - variant_id: acmr_038
    collision_family: performance_underneath
    body: |
      You made the call.
      It was the right call, or the best available call, which is what right usually means here.
      You are lying in bed and the call is still open on some background process
      that did not get the memo that the day ended.

  - variant_id: acmr_039
    collision_family: performance_underneath
    body: |
      You are performing competence in an environment that punishes visible uncertainty.
      You are also genuinely competent.
      The performance and the reality are close enough that you are not sure anymore
      which one is running at any given moment.

  - variant_id: acmr_040
    collision_family: performance_underneath
    body: |
      No one on your team knows you stayed awake past midnight thinking about the project.
      They do not need to know.
      You just need somewhere to put the gap between how it looks from the outside
      and how it feels from the inside.
