selector_note: >
  Mechanism bridge variants explain the anxiety-nervous system link without
  overclaiming, promising outcomes, or presenting as universal law. All claims
  use tendency, pattern, or common-response language. No "you will feel" promises.
  No miracle framing. Select by mechanism_depth to match the chapter's depth target.
  Three sentence-structure patterns are used: simple (S), compound (C), inverted (I).
  All three orderings of observation → mechanism → implication are present across the bank.

