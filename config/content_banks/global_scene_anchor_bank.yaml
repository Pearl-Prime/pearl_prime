# global_scene_anchor_bank.yaml
# Authority: docs/CONTENT_FRAGMENT_VARIATION_WRITER_SPEC.md §7
# Slot type: SCENE_ANCHOR
# Count: 20 variants
# Sensory family limits enforced: light ≤2, sound ≤2, temperature ≤2, texture ≤2, proprioception ≤2

selector_note: >
  Use this bank to open or ground any chapter with a brief, concrete scene fragment.
  The renderer may draw at most one variant per chapter from this bank. No single
  variant_id may appear more than once in the same book. Select by hashing chapter
  metadata (topic, chapter_index, book_id) to produce a stable, repeatable pick.
  Do not draw from this bank more than once per chapter. All variants are globally
  eligible (any topic, any persona, any secular or contemplative frame). If a
  variant's sensory family has already been used in a prior chapter of the same
  book, skip it and select the next eligible variant.

