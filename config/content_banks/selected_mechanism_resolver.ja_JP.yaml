        - "戦略的プランニングの体裁をまとった脅威スキャン"
        - "自分の神経系にまで適用されたプロダクション監視のマインドセット"
        - "まだ解けていない最適化変数として扱われる睡眠"
      selected_signal:
        - "深夜にダッシュボードを確認するあなたの一部は、オフラインになる方法を知らない。"
        - "身体は横になっているのに、オンコール当番だけが走り続けている。"
        - "目を閉じるたびに、インシデントの振り返り会議がまた始まる。"
        - "監視レイヤーにはメンテナンスウィンドウが与えられない。"
        - "あなたは、グレースフルシャットダウンを一度も許されないシステムだ。"

    overthinking:
      selected_mechanism:
        - "デューデリジェンスと取り違えられたプリモーテムのリハーサルループ"
        - "解決するより速く枝分かれしていく意思決定ツリー"
        - "終了条件を持たない二次的帰結のモデリング"
        - "コントロールの一形態として最悪シナリオへパターンマッチし続けること"
        - "停止関数のないまま走り続けるアナリスト脳のシミュレーション"
      selected_signal:
        - "あなたは、まだ起きてもいない会話にストレステストをかけ終えている。"
        - "タブを閉じたあとも、モデルだけが回り続けている。"
        - "すべての変数に重みを振り終えた。うまくいく方を除いて。"
        - "誰も仕様を頼んでいないのに、あなたはもうアーキテクチャ全体を組み上げてしまった。"
        - "繰り返し再生してしまうそのシナリオには、十七通りの分岐ルートがある。"

    social_anxiety:
