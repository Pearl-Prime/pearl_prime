        - "身体はずっとチケットを上げてくれているのに、あなたはそれを低優先度のまま放置してきた。"
        - "肩のこわばりは、パッチで直せるコンフィグのエラーではない。"
        - "ストレス反応のデータは持っている。でも、まだその反応そのものに会えていない。"
        - "身体をトラッキングすることと、身体に住まうことは、同じではない。"

    financial_anxiety:
      selected_mechanism:
        - "株式のボラティリティで訓練され、安定した給与にまで適用されてしまった脅威検出モデル"
        - "自分の安全に対する継続的な生存確認として走らせている純資産トラッキング"
        - "FAANGの報酬水準と「十分」という感覚のあいだの、決して閉じないギャップ"
        - "必要のない貸借対照表に、毎晩くり返されるランウェイ計算"
