        - "信頼区間にたどり着かないまま走り続ける聴衆モデリング"
      selected_signal:
        - "悪いデプロイを振り返るのと同じやり方で、会議を振り返ってしまう。"
        - "通話後の分析は、通話が終わる前から始まっている。"
        - "朝会で言ったあの一言を、夜十一時にバグ候補としてフラグ立てしている。"
        - "どの部屋も、自分の位置がよく分からないスタックランキングに変わってしまう。"
        - "あなたが話し終えたあとの沈黙は、今もまだ解釈され続けている。"

    somatic_healing:
      selected_mechanism:
        - "最低限動く程度に整備されるインフラとして扱われる身体"
        - "感じ取る前に認知レイヤーを経由させられる身体信号"
        - "回復にまで適用されるパフォーマンス指標 — 睡眠スコア、HRV目標値、レディネス数値"
        - "身体の声よりスケジュール遵守を優先してしまう習慣"
        - "情報になる前にコスト・ベネフィット分析を通される感覚"
