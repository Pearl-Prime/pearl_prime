# selected_mechanism_resolver.ja_JP.yaml
# REFLECTION アトムの {selected_mechanism} と {selected_signal} スロット用リゾルバ設定
# tech_finance_burnout および millennial_women_professionals 向け。
#
# selected_mechanism: 文中に差し込まれる名詞句/動名詞句。
#   「そのメカニズムは {selected_mechanism} だ。」
#   「その奥にあるのは {selected_mechanism} だ。」
#
# selected_signal: 締めの一打として使う完結した一文。
#   「{selected_signal}。監視レイヤーにはメンテナンスウィンドウが与えられない。」
#
# トーン:二人称、行動的・システム的 — 臨床的なラベルは使わない。
# 出典:ソマティック・エクスペリエンシング(Levine)、ポリヴェーガル理論(Porges)、
#       ACT、IFS、HRV/睡眠研究、インポスター現象研究、バーンアウト研究。
#
# 選択:以下のシードから決定論的にハッシュで選ぶ
#   seed = "{book_seed}:{persona}:{topic}:mechanism:{chapter_index}"
# 同じ書籍なら常に同じメカニズムが選ばれ、異なる書籍では変化する。

---

locale: ja_JP

resolver:

  tech_finance_burnout:

    sleep_anxiety:
      selected_mechanism:
        - "競争に備えるための準備として読み替えられた過覚醒"
