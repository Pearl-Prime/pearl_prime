    - "慢性的な負荷を恒常設定と取り違えてしまった神経系"
    - "見張っていた対象がとうに終わったあとも、走り続けてしまう警戒"
    - "もう住んでいない文脈から持ち越された、防衛的な身構え"
    - "なんとか乗り越えてきたものと、身体がまだ代謝しきれずにいるもののあいだのギャップ"
  selected_signal:
    - "シフトが終わったあとも、神経系が小さく差し出し続けるサインたち。"
    - "カレンダーより先に、肩がそれを知っていた。"
    - "休息は、状態としてではなくタスクとして届き続けてしまう。"
    - "認めたくないほど長いあいだ、深く吸い切れていなかった、その一息。"
    - "崩さずにいるための言葉には流暢なのに、その下にある言葉を、いまもまだ学んでいる。"
