        - "スプレッドシートは完璧なのに、不安はびくともしない。"
        - "ベスティングのスケジュールは暗記しているのに、神経系はまだ次の給料が噂話だと思っている。"
        - "自分が安全だと示すモデルを自分で組んだのに、そのモデルを信じられない。"
        - "ボーナスが入るたびに、足りないという基準値は元の位置に戻ってしまう。"

