# shame_genz_scene_recognition_bank.yaml — gen_z_professionals × shame/self_worth scene recognition bank
# 40 variants — collision_family distribution: went_quiet (7), credit_watched (6), draft_deleted (6), comparison_scroll (6), praise_deflected (6), mistake_carried (9)
bank_type: recognition
persona: gen_z_professionals
topic: shame_self_worth

variants:
  - variant_id: ssgr_001
    collision_family: went_quiet
    body: |
      You knew the answer.
      You felt it forming while someone else was still talking.
      By the time there was space to say it, you had decided not to.

  - variant_id: ssgr_002
    collision_family: went_quiet
    body: |
      You had a perspective that was different from the one in the room.
      You held it for the entire meeting.
      You walked out still holding it.

  - variant_id: ssgr_003
    collision_family: went_quiet
    body: |
      Someone said something that was not quite right.
      You saw it clearly.
      You let it stand because correcting it felt like claiming something you were not sure you were entitled to claim.

  - variant_id: ssgr_004
    collision_family: went_quiet
    body: |
      The question was asked generally, to the group.
      You had an answer.
      You waited for someone else to speak first.
      Someone else did.

  - variant_id: ssgr_005
    collision_family: went_quiet
    body: |
      You have replayed the moment you did not speak more times than the moments you did.
      It was not fear exactly.
      It was the specific calculation about whether your voice would be worth the space it would take up.

  - variant_id: ssgr_006
    collision_family: went_quiet
    body: |
      You were about to push back and then you looked at the expression on their face
      and decided the moment was not worth the risk.
      You still do not know if you were right.

  - variant_id: ssgr_007
    collision_family: went_quiet
    body: |
      It was a good idea and you knew it was a good idea.
      You said it quietly enough that only one person heard.
      They nodded and moved on and the idea went with them.

  - variant_id: ssgr_008
    collision_family: credit_watched
    body: |
      You watched someone get acknowledged for something you had started.
      You did not say anything.
      You are still working out whether not saying anything was gracious or something else.

  - variant_id: ssgr_009
    collision_family: credit_watched
    body: |
      The idea became theirs somewhere between when you said it informally and when they said it formally.
      There was no single moment you could point to.
      That is the part that has been sitting with you.

  - variant_id: ssgr_010
    collision_family: credit_watched
    body: |
      They thanked your colleague in the all-hands.
      Your colleague did the work.
      So did you.
      You watched your name not get called and you already knew it would not be.

  - variant_id: ssgr_011
    collision_family: credit_watched
    body: |
      The project was a success.
      Your contribution to it is visible in the outcome and invisible in the recap.
      You are not sure if raising that would make you the kind of person you want to be.

  - variant_id: ssgr_012
    collision_family: credit_watched
    body: |
      You built the thing.
      Someone else presented it.
      They were good at presenting it, and you were glad, and also something else that has no clean word.

  - variant_id: ssgr_013
    collision_family: credit_watched
    body: |
      You did not ask for credit because you were not sure you deserved the amount it would have required you to claim.
      The asking felt bigger than the contribution.
      That math has never quite worked out right.

  - variant_id: ssgr_014
    collision_family: draft_deleted
    body: |
      You wrote it, read it, and deleted it.
      Not because it was wrong.
      Because putting it out meant having an opinion in a place where someone could disagree with it.

  - variant_id: ssgr_015
    collision_family: draft_deleted
    body: |
      The post existed for about three minutes.
      Then you decided it was too much — too specific, too personal, too likely to be misread —
      and you took it back.

  - variant_id: ssgr_016
    collision_family: draft_deleted
    body: |
      You wrote the email to push back on something.
      You rewrote it until it no longer pushed back.
      Then you sent the version that agreed.

  - variant_id: ssgr_017
    collision_family: draft_deleted
    body: |
      You typed the thing you wanted to say and then held it.
      A minute passed. Then five.
      You closed the draft and you are not sure if that was wisdom or something smaller than wisdom.

  - variant_id: ssgr_018
    collision_family: draft_deleted
    body: |
      There is a draft in your folder that has been there for a week.
      It says the thing you mean.
      You open it sometimes and do not send it.

  - variant_id: ssgr_019
    collision_family: draft_deleted
    body: |
      You applied for the thing and then took the application down before anyone reviewed it.
      The timing felt bad.
      That is the reason you have been giving yourself.

  - variant_id: ssgr_020
    collision_family: comparison_scroll
    body: |
      You opened the app to check something unrelated.
      Ten minutes later you are looking at someone's accomplishments and running a quiet calculation
      about where that puts you.

  - variant_id: ssgr_021
    collision_family: comparison_scroll
    body: |
      Their work is good.
      You know it is genuinely good.
      You are also doing the math on whether it is better than yours and why that matters to you right now.

  - variant_id: ssgr_022
    collision_family: comparison_scroll
    body: |
      You are the same age and they are further ahead.
      You do not actually know what further ahead means.
      You are doing it anyway, quietly, with the phone in your lap.

  - variant_id: ssgr_023
    collision_family: comparison_scroll
    body: |
      Someone posted an update about a thing you had also been trying to do.
      They finished it.
      You closed the app and now you are thinking about it in a tab in the back of your mind.

  - variant_id: ssgr_024
    collision_family: comparison_scroll
    body: |
      The comparison is not useful.
      You know this.
      You are doing it anyway, and the fact that you know it is not useful
      does not make it stop.

  - variant_id: ssgr_025
    collision_family: comparison_scroll
    body: |
      You looked at their work and felt two things at the same time:
      something genuine and admiring,
      and something underneath it that you would rather not name in daylight.

  - variant_id: ssgr_026
    collision_family: praise_deflected
    body: |
      They said it was excellent work.
      You said thank you and then immediately listed the parts that were not quite right.
      They had not asked for the list.

  - variant_id: ssgr_027
    collision_family: praise_deflected
    body: |
      Someone praised you in public.
      Your face did the right thing.
      The rest of you spent the next hour looking for the version of the compliment that was smaller
      and more accurate.

  - variant_id: ssgr_028
    collision_family: praise_deflected
    body: |
      You received good feedback and your first thought was about the exception to the feedback.
      The exception was small.
      It was where your attention went anyway.

  - variant_id: ssgr_029
    collision_family: praise_deflected
    body: |
      You cannot hold the compliment.
      Not because you think they are wrong, exactly.
      Because believing it would require something you keep not quite arriving at.

  - variant_id: ssgr_030
    collision_family: praise_deflected
    body: |
      They told you the project was strong and you felt, for about four seconds, like it might be true.
      Then the four seconds ended.
      You are not sure where they went.

  - variant_id: ssgr_031
    collision_family: praise_deflected
    body: |
      You got the positive review and read it twice looking for the part
      that would tell you how much of it you actually earned.

  - variant_id: ssgr_032
    collision_family: mistake_carried
    body: |
      You made a mistake in a meeting six weeks ago.
      It was small. Nobody mentioned it again.
      You have mentioned it to yourself many times since.

  - variant_id: ssgr_033
    collision_family: mistake_carried
    body: |
      You know what you would do differently.
      You have known for a while.
      The knowing it does not seem to be the same as being done with it.

  - variant_id: ssgr_034
    collision_family: mistake_carried
    body: |
      It has been long enough that nobody else remembers.
      You remember with full sensory detail — the room, where you were sitting, the pause that followed.
      You return there sometimes without deciding to.

  - variant_id: ssgr_035
    collision_family: mistake_carried
    body: |
      The mistake was real.
      You corrected it.
      It is still in your body somewhere, a tightness that arrives when conditions are similar.

  - variant_id: ssgr_036
    collision_family: mistake_carried
    body: |
      The thing you did wrong was minor in the scheme of the project.
      It is not minor in the scheme of how you think about yourself.
      Those two scales have not aligned yet.

  - variant_id: ssgr_037
    collision_family: mistake_carried
    body: |
      You apologized.
      They said it was fine.
      You have been carrying the thing they said was fine ever since,
      the way you carry something that was never fully put down.

  - variant_id: ssgr_038
    collision_family: mistake_carried
    body: |
      You do not bring it up.
      You have not brought it up in months.
      It comes up anyway, when you are alone, in a version where you did it right the first time.

  - variant_id: ssgr_039
    collision_family: mistake_carried
    body: |
      Other people make mistakes and seem to release them.
      You have been studying how they do it.
      You have not found the mechanism yet.

  - variant_id: ssgr_040
    collision_family: mistake_carried
    body: |
      It is not the mistake itself.
      It is what the mistake seems to confirm.
      That is the part that has staying power.
