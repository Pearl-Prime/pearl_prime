# selected_mechanism_resolver.zh_TW.yaml
# zh_TW（台灣繁體中文）在地化版本，結構與 selected_mechanism_resolver.yaml 完全對應。
#
# selected_mechanism：可嵌入句中的名詞／動名詞片語。
#   「其中的機制是 {selected_mechanism}。」
#   「底下真正運作的是 {selected_mechanism}。」
#
# selected_signal：用來收束段落的完整句子。
#   「{selected_signal}。監控層從來沒有安排維護時段。」
#
# 語氣：第二人稱、行為／系統層次描寫，不使用臨床診斷標籤。
# 參考來源：身體經驗創傷療法（Levine）、多重迷走神經理論（Porges）、ACT、IFS、
#           心率變異／睡眠研究、冒牌者現象相關文獻、職業倦怠研究。
#
# 選擇方式：以
#   seed = "{book_seed}:{persona}:{topic}:mechanism:{chapter_index}"
# 為雜湊輸入，從清單中確定性挑選；同一本書永遠得到同一個機制，不同書之間會有變化。

