# anxiety_genz_practice_integration_bank.yaml
# Authority: docs/CONTENT_FRAGMENT_VARIATION_WRITER_SPEC.md §7
# Slot types: PRACTICE or INTEGRATION (per record)
# Minimum: 10 variants
# ontgp_move: "give" for all

selector_note: >
  Practice and integration variants for anxiety/gen_z_professionals. Every record
  includes one no-equipment, under-5-minute option. Access mode and duration are
  declared per record to allow format-aware selection. Deep-book-only records
  (duration_max_minutes: 10) are restricted to 4h and 6h runtime formats.
  Do not use breathwork, meditation, journaling, or body scan as the sole method.
  Each record must offer a distinct access mode so readers in different physical
  contexts can find an applicable option.

variants:

  - variant_id: api_001
    slot_type: PRACTICE
    body: >
      Before you reply to the next message that makes you tense,
      move it to drafts and wait two minutes.
      At the two-minute mark, decide whether the first version still says what you mean.
    topic_allowlist: ["anxiety"]
    topic_blocklist: []
    persona_allowlist: ["gen_z_professionals"]
    frame_allowlist: ["secular", "nervous_system", "workplace", "clinical"]
    frame_blocklist: ["buddhist", "christian", "law_of_attraction", "manifestation", "spiritual_bypassing", "trauma_focused"]
    runtime_allowlist: ["quick_book_15m", "quick_book_30m", "standard_book_1h", "deep_book_2h", "deep_book_4h", "deep_book_6h"]
    band: 2
    intensity: 2
    mechanism_depth: 1
    ontgp_move: give
    ei_v2_targets:
      practical_transfer: 0.9
      specificity: 0.8
      engagement: 0.7
    collision_family: digital_pause
    access_mode: [screen, seated, public]
    duration_max_minutes: 2
    signature_phrases: ["move it to drafts and wait two minutes"]
    forbidden_terms: ["Sit quietly for five minutes", "Take one situation that usually triggers you", "This week, return to one moment of clarity"]
    notes_for_selector: "2-minute screen practice. Screen access, seated, usable in public. No equipment."

