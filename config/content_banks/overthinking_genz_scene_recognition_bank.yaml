# overthinking_genz_scene_recognition_bank.yaml — gen_z_professionals × overthinking scene recognition bank
# 40 variants — collision_family distribution: conversation_replay (6), simple_decision (6), message_rewrite (6), late_night_spiral (6), pre_conversation_rehearsal (5), one_word_read (5), meeting_residue (6)
bank_type: recognition
persona: gen_z_professionals
topic: overthinking

variants:
  - variant_id: otgr_001
    collision_family: conversation_replay
    body: |
      You are in the shower and you are back in that conversation from Tuesday.
      You have found a better response, three hours too late.
      You try it out anyway, in the steam, to no one.

  - variant_id: otgr_002
    collision_family: conversation_replay
    body: |
      The conversation ended well.
      Everyone seemed fine.
      You are running it again looking for the part where they seemed less fine than they said.

  - variant_id: otgr_003
    collision_family: conversation_replay
    body: |
      You said the right thing.
      You have been revisiting the sentence for two days.
      There is a version of it you have decided was actually not quite right.

  - variant_id: otgr_004
    collision_family: conversation_replay
    body: |
      The thing you said in the meeting three days ago has come back.
      It finds you on the commute, in line at the coffee place, before you fall asleep.
      You have reworded it more times than you have thought about anything that happened after.

  - variant_id: otgr_005
    collision_family: conversation_replay
    body: |
      You laughed at something and then spent the next hour worried about how the laugh landed.
      Not the thing you said — the laugh.
      It felt too loud at the time.

  - variant_id: otgr_006
    collision_family: conversation_replay
    body: |
      The person who asked your opinion got an answer.
      They seemed satisfied.
      You have been rereading the answer in your head, finding the gap where you maybe said too much.

  - variant_id: otgr_007
    collision_family: simple_decision
    body: |
      You have been deciding which task to start for thirty-five minutes.
      They are all on the same list.
      None of them are difficult to understand.

  - variant_id: otgr_008
    collision_family: simple_decision
    body: |
      You have made this kind of choice before.
      You know what you usually do.
      Right now the usual answer does not feel sufficient, so you are looking for a better one.

  - variant_id: otgr_009
    collision_family: simple_decision
    body: |
      The decision is about lunch.
      You opened three apps.
      You are now rethinking whether you want lunch, whether the timing is right, and whether you actually have time.

  - variant_id: otgr_010
    collision_family: simple_decision
    body: |
      The options are genuinely similar in value.
      You know this.
      You are still turning them over, looking for the difference that would make the choice obvious.

  - variant_id: otgr_011
    collision_family: simple_decision
    body: |
      You decided an hour ago.
      The decision was fine.
      You have been revisiting whether it was fine.

  - variant_id: otgr_012
    collision_family: simple_decision
    body: |
      Someone else makes this kind of call in a few seconds.
      You have watched them do it.
      For you the few seconds turn into a full afternoon if you let them.

  - variant_id: otgr_013
    collision_family: message_rewrite
    body: |
      The message is eight words.
      You have rewritten it four times.
      Each version is technically correct and each version feels wrong in a slightly different way.

  - variant_id: otgr_014
    collision_family: message_rewrite
    body: |
      You typed it, deleted it, retyped a version, and are now looking at both in different windows
      trying to determine which one sounds less like you are asking for too much.

  - variant_id: otgr_015
    collision_family: message_rewrite
    body: |
      The email could be two sentences.
      It is currently four paragraphs.
      You are reading it again to cut it down, which is what you also said on the last pass.

  - variant_id: otgr_016
    collision_family: message_rewrite
    body: |
      You sent the message and immediately reopened the sent folder.
      Not to change anything.
      Just to read it again from the outside.

  - variant_id: otgr_017
    collision_family: message_rewrite
    body: |
      You know the tone you want.
      You have written four versions that each land slightly off from it.
      The draft has been open for forty minutes and the original thought was simple.

  - variant_id: otgr_018
    collision_family: message_rewrite
    body: |
      You are trying to write a message that sounds casual.
      You have revised it three times in pursuit of casual.
      It now sounds like a document.

  - variant_id: otgr_019
    collision_family: late_night_spiral
    body: |
      It is 2 am and you are working through a conversation that has not happened yet.
      You are on the fourth possible version of their response.
      The room is dark. You are very awake.

  - variant_id: otgr_020
    collision_family: late_night_spiral
    body: |
      Somewhere around midnight the thought arrives.
      It is never a new thought.
      But at midnight it feels bigger and more certain and more worth addressing than it did at noon.

  - variant_id: otgr_021
    collision_family: late_night_spiral
    body: |
      You put your phone down.
      You picked it back up to look at something that felt urgent.
      It was not urgent.
      You are now twenty minutes into a thread that started as one search.

  - variant_id: otgr_022
    collision_family: late_night_spiral
    body: |
      The thing you are turning over is not solvable tonight.
      You know this.
      You are turning it over anyway, the way your tongue finds a sore spot.

  - variant_id: otgr_023
    collision_family: late_night_spiral
    body: |
      You woke up at 3:15 with a sentence fully formed.
      It was an answer to something no one asked.
      You typed it into your phone so you would not forget it and now you are too awake to sleep.

  - variant_id: otgr_024
    collision_family: late_night_spiral
    body: |
      You have been replaying one moment from work for two hours.
      By this point you have run it forward, backward, and from the perspective of everyone in the room.
      The ceiling is not giving you new information.

  - variant_id: otgr_025
    collision_family: pre_conversation_rehearsal
    body: |
      The conversation is tomorrow.
      You have already had it twice, in your head, with yourself playing both parts.
      In one version it goes fine and in the other version you are already writing the follow-up email.

  - variant_id: otgr_026
    collision_family: pre_conversation_rehearsal
    body: |
      You are on the train and you are running your opening line.
      The conversation has not started.
      You have already practiced recovering from three possible responses.

  - variant_id: otgr_027
    collision_family: pre_conversation_rehearsal
    body: |
      You know what you want to say.
      You are also preparing the softer version for if that lands wrong,
      and the even softer version for if the softer version lands wrong.

  - variant_id: otgr_028
    collision_family: pre_conversation_rehearsal
    body: |
      You have imagined telling your manager something eleven times.
      You have not said it.
      Each rehearsal ends with a version of their face that you cannot resolve.

  - variant_id: otgr_029
    collision_family: pre_conversation_rehearsal
    body: |
      The conversation is a routine check-in.
      You have turned the agenda into a list and the list into a script
      because the silence when the script runs out is the part you cannot plan for.

  - variant_id: otgr_030
    collision_family: one_word_read
    body: |
      They responded with one word and you have been deciding what it means for twenty minutes.
      The word was fine.
      Fine is never just fine.

  - variant_id: otgr_031
    collision_family: one_word_read
    body: |
      The message had no punctuation at the end.
      There usually is.
      You are not sure what the absence of the period means but you are working on it.

  - variant_id: otgr_032
    collision_family: one_word_read
    body: |
      They replied quickly, which means one thing,
      or they replied quickly because they did not have time to think, which means another.
      You are holding both and neither is fully satisfying.

  - variant_id: otgr_033
    collision_family: one_word_read
    body: |
      The thumbs-up reaction arrived and you stared at it for a full minute.
      It could mean agreement.
      It could mean they read it and moved on.
      You cannot determine which and it matters to you more than you would like it to.

  - variant_id: otgr_034
    collision_family: one_word_read
    body: |
      They said sounds good and you cannot tell if they meant it
      or if sounds good is what people say when they want to end the conversation.

  - variant_id: otgr_035
    collision_family: meeting_residue
    body: |
      You have been carrying the thing you said in the meeting since Tuesday.
      Not a bad thing. A fine thing. A thing that landed, seemed received, got nodded at.
      It has been following you anyway.

  - variant_id: otgr_036
    collision_family: meeting_residue
    body: |
      The meeting ended an hour ago.
      You are still in the part where you made that comment and three people looked at you at once.
      Positively. You think positively.

  - variant_id: otgr_037
    collision_family: meeting_residue
    body: |
      There was a pause after you spoke and the pause could have been thoughtful
      or could have been them deciding how to respond
      or could have been nothing.
      You have been in the pause since the meeting ended.

  - variant_id: otgr_038
    collision_family: meeting_residue
    body: |
      You had a chance to say something and you let the moment pass.
      The thing you would have said was good.
      You have said it to yourself six times since, each time a little more polished than the last.

  - variant_id: otgr_039
    collision_family: meeting_residue
    body: |
      Someone interrupted you and finished the point.
      It was your point.
      You agreed with them in the moment and have been disagreeing internally since.

  - variant_id: otgr_040
    collision_family: meeting_residue
    body: |
      You did not speak in the meeting.
      You had something to add.
      You have been explaining to yourself why you did not add it for the last half hour.
