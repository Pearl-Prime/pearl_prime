# global_flow_glue_bank.yaml
# Authority: docs/CONTENT_FRAGMENT_VARIATION_WRITER_SPEC.md §7
# Slot type: FLOW_GLUE
# Minimum: 20 variants
# Legacy variants from _FLOW_GLUE_VARIANTS in phoenix_v4/rendering/book_renderer.py
# are included below, marked is_legacy: true.

selector_note: >
  Flow glue is injected between paragraph blocks to maintain logical continuity
  without summarizing. Select by content hash of the preceding paragraph to
  ensure stable, repeatable picks across renders. No single variant_id may appear
  more than twice in any single chapter. Prefer variants with different
  collision_family values from the preceding and following glue choices.
  Legacy variants are fully reusable but should not dominate a single chapter.

