    topic_blocklist: []
    persona_allowlist: []
    frame_allowlist: ["secular", "workplace", "clinical", "nervous_system", "contemplative", "buddhist", "comparative_religion"]
    frame_blocklist: []
    runtime_allowlist: ["quick_book_15m", "quick_book_30m", "standard_book_1h", "deep_book_2h", "deep_book_4h", "deep_book_6h"]
