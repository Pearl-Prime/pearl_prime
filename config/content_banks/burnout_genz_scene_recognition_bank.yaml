# burnout_genz_scene_recognition_bank.yaml — gen_z_professionals × burnout scene recognition bank
# 40 variants — collision_family distribution: open_office_drain (6), sunday_dread (6), task_inertia (6), review_exposure (5), slack_shutdown (5), meeting_depletion (6), performance_split (6)
bank_type: recognition
persona: gen_z_professionals
topic: burnout

variants:
  - variant_id: bsgr_001
    collision_family: open_office_drain
    body: |
      The office is loud in a way you stopped hearing a few weeks ago.
      You are watching your screen but the information is not reaching you.
      At some point the ambient noise started sounding like pressure instead of background.

  - variant_id: bsgr_002
    collision_family: open_office_drain
    body: |
      You got up to refill your water and stood at the kitchen counter for a full minute
      before you could remember what you were doing.
      The mug was already in your hand.

  - variant_id: bsgr_003
    collision_family: open_office_drain
    body: |
      Your headphones are on but nothing is playing.
      You put them on to block something out, but you are not sure what anymore.
      The silence in the headphones is the point.

  - variant_id: bsgr_004
    collision_family: open_office_drain
    body: |
      Three people have walked past your desk and asked if you are okay.
      You said yes each time, and you meant something close to it.
      You just cannot locate which part is okay and which part is not.

  - variant_id: bsgr_005
    collision_family: open_office_drain
    body: |
      The day is technically half over.
      You have done enough to count as present, enough to answer if someone asks.
      The things that would actually matter are still untouched.

  - variant_id: bsgr_006
    collision_family: open_office_drain
    body: |
      You are in a meeting you requested.
      You looked forward to it two weeks ago.
      Right now the words in the room feel like they are moving through something thick before they reach you.

  - variant_id: bsgr_007
    collision_family: sunday_dread
    body: |
      It is Sunday at four in the afternoon and you are already in Monday.
      Not preparing — just bracing.
      The weekend is technically still happening and you have already left it.

  - variant_id: bsgr_008
    collision_family: sunday_dread
    body: |
      You tried to rest this weekend and you did the things that used to work.
      On Sunday night the tiredness is the same as it was Friday evening,
      which was the same as the Sunday before.

  - variant_id: bsgr_009
    collision_family: sunday_dread
    body: |
      You are looking at tomorrow's calendar at 9 pm on a Sunday.
      You could not help it.
      You opened it to check one thing and now the whole week is visible and your jaw is tight.

  - variant_id: bsgr_010
    collision_family: sunday_dread
    body: |
      The Sunday feeling is not new.
      What is new is that it starts earlier each week,
      this time somewhere around lunch.

  - variant_id: bsgr_011
    collision_family: sunday_dread
    body: |
      You put your phone down at 8 pm and tried to read.
      By 8:15 you were drafting a to-do list for tomorrow in your head
      without deciding to.

  - variant_id: bsgr_012
    collision_family: sunday_dread
    body: |
      There is a work thing you are supposed to look forward to this week.
      You put it on the calendar yourself.
      On Sunday night you are already hoping it gets cancelled.

  - variant_id: bsgr_013
    collision_family: task_inertia
    body: |
      The task has been on the list for eleven days.
      It is not hard. You have done harder things.
      The cursor is on it and your hand has not moved.

  - variant_id: bsgr_014
    collision_family: task_inertia
    body: |
      You opened the document and read the first sentence four times.
      You understand every word.
      The second sentence is not happening yet.

  - variant_id: bsgr_015
    collision_family: task_inertia
    body: |
      You made a shorter list and then a shorter list inside the shorter list.
      The smallest version of the task is still sitting there.
      You are very good at making lists.

  - variant_id: bsgr_016
    collision_family: task_inertia
    body: |
      You told yourself you would start at two.
      It is 2:47 and you have rearranged your desktop and refilled the water bottle
      and opened the document without reading it.

  - variant_id: bsgr_017
    collision_family: task_inertia
    body: |
      The work you cannot start is not the most important thing on the list.
      The most important thing you handled.
      This is the one that stays open, untouched, small enough to do in an hour.

  - variant_id: bsgr_018
    collision_family: task_inertia
    body: |
      You have switched browser tabs eleven times in the last twenty minutes.
      Each tab was either the task or something else entirely.
      The task tab has been open the longest.

  - variant_id: bsgr_019
    collision_family: review_exposure
    body: |
      Your performance review is in three weeks and you already know what they will say
      about the one thing you did not finish.
      You have been building the explanation in your head during commutes.

  - variant_id: bsgr_020
    collision_family: review_exposure
    body: |
      You got good feedback in the review and spent the next day waiting for the qualifier
      that would make it make sense.
      It did not come.

  - variant_id: bsgr_021
    collision_family: review_exposure
    body: |
      The review form asks you to list your accomplishments from the last six months.
      You can find three things.
      You worked every single week and you can find three things.

  - variant_id: bsgr_022
    collision_family: review_exposure
    body: |
      The review is tomorrow and you have read your self-assessment four times
      looking for something that sounds more like the person you meant to be this year.
      You submitted it this morning anyway.

  - variant_id: bsgr_023
    collision_family: review_exposure
    body: |
      You have been performing for so long you are no longer sure what you would do
      if the performance were not required.
      The review asks how you are growing.
      You wrote something that sounded like an answer.

  - variant_id: bsgr_024
    collision_family: slack_shutdown
    body: |
      The Slack notification appeared and your body responded before you read it.
      Your shoulders went up, your breath shortened, and you did not open the app for twenty minutes.

  - variant_id: bsgr_025
    collision_family: slack_shutdown
    body: |
      You read the message, understood it, and closed the app.
      You will answer it.
      Right now answering it is not something your hands are willing to do.

  - variant_id: bsgr_026
    collision_family: slack_shutdown
    body: |
      There are eleven unread messages and you know who they are from.
      They are fine messages from fine people who need reasonable things.
      You have had the app closed for an hour.

  - variant_id: bsgr_027
    collision_family: slack_shutdown
    body: |
      You set yourself to Do Not Disturb an hour ago.
      You turned it off, checked, and turned it back on again.
      The checking felt necessary and the going back felt like giving up.

  - variant_id: bsgr_028
    collision_family: slack_shutdown
    body: |
      The green dot next to your name has been off for two hours.
      Your phone is face-up on the desk and every time it lights up
      you look at it without picking it up.

  - variant_id: bsgr_029
    collision_family: meeting_depletion
    body: |
      You walked out of the meeting and could not have told anyone what was decided.
      You were present. You answered when addressed.
      There is just nothing left of you that was tracking the content.

  - variant_id: bsgr_030
    collision_family: meeting_depletion
    body: |
      The meeting ended twelve minutes early and instead of relief
      you felt something closer to dread at the idea of opening the thing you were using the meeting to avoid.

  - variant_id: bsgr_031
    collision_family: meeting_depletion
    body: |
      You have four hours of meetings on Thursday and you have already pre-grieved them.
      It is Tuesday.

  - variant_id: bsgr_032
    collision_family: meeting_depletion
    body: |
      The last meeting ended at five and you sat in front of your screen for ten minutes
      before you could decide whether to close the laptop or answer one more thing.
      You answered one more thing.

  - variant_id: bsgr_033
    collision_family: meeting_depletion
    body: |
      You used to have ideas in meetings.
      You can remember the version of yourself that brought things up unprompted.
      In the last three you have mostly been waiting for them to end.

  - variant_id: bsgr_034
    collision_family: meeting_depletion
    body: |
      Someone thanked you for your contribution in the meeting today.
      You nodded.
      You could not feel what they were referring to.

  - variant_id: bsgr_035
    collision_family: performance_split
    body: |
      At work you are sharp, responsive, and on top of it.
      At home you sit down and nothing happens for a while.
      The gap between those two people has been widening for a few months.

  - variant_id: bsgr_036
    collision_family: performance_split
    body: |
      You perform availability.
      You are thorough in public and exhausted in private and the distance between them
      is the part of the day you cannot account for.

  - variant_id: bsgr_037
    collision_family: performance_split
    body: |
      You told a friend the job is going well.
      That is accurate.
      It is also the version of things you are able to say out loud.

  - variant_id: bsgr_038
    collision_family: performance_split
    body: |
      The version of you that shows up to work is together and competent.
      That version is also the only version anyone at work has met.
      You wonder sometimes whether they would recognize the one who came home after.

  - variant_id: bsgr_039
    collision_family: performance_split
    body: |
      You can do the job.
      You have been doing the job.
      Lately doing the job takes everything and leaves no excess,
      and you are not sure when that changed.

  - variant_id: bsgr_040
    collision_family: performance_split
    body: |
      The things you used to do after work — the ones that were yours —
      keep not happening.
      Not because you decided not to.
      Because by the time work is done there is nothing left to bring to them.
