---
# anxiety_genz_reflection_late_book_bank.yaml
# Authority: docs/CONTENT_FRAGMENT_VARIATION_WRITER_SPEC.md §7
# Slot type: REFLECTION
# Chapters 7–12 (band 3–4, intensity 3–4)
# Minimum: 10 variants (3 ch7–8 / 3 ch9–10 / 4 ch11–12)
# ontgp_move: varies across "name", "turn", "pull"

selector_note: >
  Late-book reflections assume the reader has completed meaningful prior work
  but is not resolved. Do not use in chapters 1–6. Select by chapter_index and
  reader_band to match band and intensity ranges. Each record asks exactly one
  thing. No moralizing. No assumptions about the reader's safety, relationship
  status, resources, or spiritual orientation.

