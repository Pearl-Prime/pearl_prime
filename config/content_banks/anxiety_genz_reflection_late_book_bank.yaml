    body: >
      Name the moment today when anxiety felt most like a fact rather than a prediction.
    topic_allowlist: ["anxiety"]
    topic_blocklist: []
    persona_allowlist: ["gen_z_professionals"]
    frame_allowlist: ["secular", "nervous_system", "workplace", "clinical"]
    frame_blocklist: ["buddhist", "christian", "law_of_attraction", "manifestation", "spiritual_bypassing", "trauma_focused"]
    runtime_allowlist: ["standard_book_1h", "deep_book_2h", "deep_book_4h", "deep_book_6h"]
    band: 2
    intensity: 3
    mechanism_depth: 2
    ontgp_move: name
    ei_v2_targets:
      specificity: 0.8
      engagement: 0.8
      somatic_precision: 0.6
    collision_family: fact_vs_prediction
    signature_phrases: ["anxiety felt most like a fact rather than a prediction"]
    forbidden_terms: ["Where in your life do you run", "Notice a thought that repeats itself", "What are you attached to"]
    notes_for_selector: "Ch7–8 band 2/name. Distinction between sensation and belief. Single question."

