---
# chapter_takeaway_deep_book_bank.yaml
# Authority: docs/CONTENT_FRAGMENT_VARIATION_WRITER_SPEC.md §7
# Slot type: CHAPTER_TAKEAWAY
# Minimum: 10 variants
# runtime_allowlist: deep_book_4h and deep_book_6h only
# topic_allowlist: [] — must work across anxiety, depression, imposter_syndrome, somatic_healing
# ontgp_move: "give" (3), "pull" (4), "turn" (3)

selector_note: >
  Chapter takeaways close deep-book chapters (4h and 6h formats only). They
  do not summarize the thesis verbatim, do not promise transformation, and do not
  leave the reader in activation. Each takeaway either gives the reader something
  concrete, pulls them toward the next chapter, or reframes something. Maximum
  35 words per body. Select by chapter position and desired ONTGP move. Confirm
  that next_chapter_function matches the actual next chapter's opening slot type.

variants:

