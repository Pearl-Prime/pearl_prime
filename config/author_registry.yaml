# Resolution rule (Option B): Author registry is for pre-intro/asset resolution only.
# Atoms remain persona/topic keyed. No author_id on atoms; no author-scoped atom pool.
# When --author is set: use this registry only to resolve bio, why_this_book, authority_position,
# audiobook_pre_intro (and author-level metadata). Atom selection is unchanged: persona_id + topic_id
# (and teacher when set). Authors sharing the same persona/topic (e.g. luna_hart and kai_nakamura
# on gen_z_professional × burnout) share the same story pool; voice separation is intro/outro and
# author assets only. brand_teacher_assignments stays for teacher resolution; this file is author-only.
#
# Pipeline use (when implemented):
# - If caller passes --author <author_id>, validate against this registry and set brand_id, persona_ids, topic_ids from here.
# - Resolve author assets (bio, why_this_book, audiobook_pre_intro, authority_position) from assets/authors/<author_id>/ or deli/ paths.
# - Do not filter or key atom pools by author_id; use existing persona/topic pools only.
