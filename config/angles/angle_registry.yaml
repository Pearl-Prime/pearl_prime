#     Any leaf field overrides the inherited value.
#   - Soft-deprecated v1 angles carry deprecated: true + successor_angle_id; books in flight
#     continue to resolve them, new books should use the successor.
#
# Arc-First remains authoritative. Angle chooses variant (arc_path when set).
# Journey content (core_mantras values, layer_progression.assertion text, named_object_by_topic
# values) is TODO — authored by Pearl_Editor as commissioned per angle × topic × persona.

