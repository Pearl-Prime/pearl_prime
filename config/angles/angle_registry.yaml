#   - Universal angles: full structural fields (arc_variant, framing_mode, chapter_1_role_bias,
#     integration_reinforcement_type) + display_name + core_frame + journey block.
#   - Topic-specific angles: declare parent_universal: <UNIVERSAL_ID>. Structural fields and
#     journey block are inherited from the parent chain (resolved by
