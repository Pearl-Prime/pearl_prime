# Angle Integration Layer (V4.7). Authority: DEV SPEC ANGLE INTEGRATION LAYER.
# angle_id -> structural narrative driver. Arc-First remains authoritative; angle chooses variant.
# arc_path: optional path (relative to repo root) to arc YAML when this angle is selected; omit to use CLI --arc.

angles:
  WRONG_PROBLEM:
    arc_variant: ARC_STANDARD_A_v2
    chapter_1_role_bias: destabilization
    integration_reinforcement_type: problem_inversion
    framing_mode: debunk
    # arc_path: config/source_of_truth/master_arcs/...  # set when variant arc exists

  MAP_PROMISE:
    arc_variant: ARC_STANDARD_A_v3
    chapter_1_role_bias: recognition
    integration_reinforcement_type: orientation
    framing_mode: framework

  HIDDEN_TRUTH:
    arc_variant: ARC_STANDARD_A_v4
    chapter_1_role_bias: destabilization
    integration_reinforcement_type: revelation
    framing_mode: reveal

  ONE_LEVER:
    arc_variant: ARC_STANDARD_A_v5
    chapter_1_role_bias: recognition
    integration_reinforcement_type: mechanism_focus
    framing_mode: leverage

# ── CatalogPlanner SSOT (FEATURE-KNOB-CATALOG-VARIATION-V1-01 P0-2) ───────────
# Maps catalog topic_id → angle_id declared under ``angles:`` above.
# CatalogPlanner consults this before series-domain heuristics; unmatched topics
# fall back to ``{topic_id}_general`` unless angle_strict=True on produce_single().
catalog_planner_resolution:
  version: 1
  topic_angle_map:
    relationship_anxiety: HIDDEN_TRUTH
    grief: WRONG_PROBLEM
    shame: ONE_LEVER
    self_worth: MAP_PROMISE
