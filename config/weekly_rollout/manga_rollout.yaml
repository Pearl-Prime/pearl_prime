# Manga weekly production lane (Pearl_Prime-aligned delivery: R2 + brand digest).
# Credentials: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET (see docs/INTEGRATION_CREDENTIALS_REGISTRY.md + podcast R2 pattern).
schema_version: 1
rollout_id: manga_weekly_v1

defaults:
  # Stillness Press image bank is 56 canonical slots per topic (see scripts/manga/stillness_press_image_bank.py).
  # Operators may raise this to 60 once banks are expanded.
  min_panel_images: 56
  books_per_week: 1
  genres_rotation: [shonen, shojo, seinen]
  signed_url_expiry_seconds: 604800
  r2_key_prefix_template: "{brand_id}/manga/{date}/"
  require_bubble_system: false
  comfyui_health_url_env: COMFYUI_URL
  pearl_star_ip_env: PEARL_STAR_IP

WEEKLY_ROLLOUT_CONFIG:
  prose_lane:
    enabled: true
    note: "Owned by scripts/build_weekly_brand_package.py + Pearl_Prime prose tooling — unchanged here."
  manga_lane:
    enabled: true
    books_per_week: 1
    genres: [shonen, shojo, seinen]
    formats: [manga_standard_book]
    require_image_bank_coverage: 56
    require_bubble_system: false
    # replay: CI-safe, uses image_bank. runcomfy|comfyui: Pearl Star / ComfyUI (see docs/MANGA_PRODUCTION_PIPELINE.md).
    image_backend: replay

brands:
  stillness_press:
    enabled: true
    default_persona: gen_z_professionals
    locale: en_US
    image_bank_root: image_bank/stillness_press
    manga_lane:
      books_per_week: 1
      topics_preference:
        - burnout
        - compassion_fatigue
        - anxiety
    digest:
      admin_email_key: admin_email
      # Relative to repo: artifacts written for operator / portal ingestion
      digest_out_dir: artifacts/weekly_digests
