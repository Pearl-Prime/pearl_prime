# Format registry for Stage 2 (Format Selector).
# Structural format IDs (F001–F015) and slot semantics are defined in Canonical Spec Part 2.
# Stage 3 MUST receive slot_definitions from FormatPlan; no internal default. This file is the authority.
# Allowed slot types: HOOK, SCENE, STORY, REFLECTION, EXERCISE, INTEGRATION, COMPRESSION (slot_08_compression; DEV SPEC 2),
# PIVOT, TAKEAWAY, THREAD, PERMISSION (bestseller structures; docs/BESTSELLER_STRUCTURES.md).

# Default beat (6-type) per chapter. Formats may override via slot_template (e.g. include COMPRESSION).
default_slot_definitions:
  - [HOOK, SCENE, STORY, REFLECTION, EXERCISE, INTEGRATION]

# Structural formats (beat map family). Authoritative definitions: Canonical Spec Part 2.
structural_formats:
  F001:
    name: "90-Day Transformation"
    tier: B
    chapter_range: [90, 90]
    typical_runtime: "extended_book_2h"
  F002:
    name: "Daily Practice Rituals"
    tier: B
    chapter_range: [30, 365]
    typical_runtime: "standard_book"
  F003:
    name: "Challenge Series"
    tier: A
    chapter_range: [7, 21]
    typical_runtime: "short_book_30"
  F004:
    name: "Somatic Body Journey"
    tier: A
    chapter_range: [12, 15]
    typical_runtime: "deep_book_4h"
  F005:
    name: "Scenario Rescue Kit"
    tier: C
    chapter_range: [10, 20]
    typical_runtime: "micro_book_15"
  F006:
    name: "Nervous System Ladder"
    tier: A
    chapter_range: [8, 12]
    typical_runtime: "standard_book"
    # Optional: slot_template with COMPRESSION (after REFLECTION, before EXERCISE). DEV SPEC 2.
    slot_template: [HOOK, SCENE, STORY, REFLECTION, COMPRESSION, EXERCISE, INTEGRATION]
  F007:
    name: "Shadow Work Series"
    tier: A
    chapter_range: [8, 12]
    typical_runtime: "standard_book"
  F008:
    name: "Micro-Habits Stacking"
    tier: B
    chapter_range: [52, 52]
    typical_runtime: "extended_book_2h"
  F009:
    name: "Parts Work (IFS)"
    tier: A
    chapter_range: [10, 15]
    typical_runtime: "deep_book_4h"
  F010:
    name: "Energy Management"
    tier: A
    chapter_range: [12, 16]
    typical_runtime: "standard_book"
  F011:
    name: "Relationship Repair"
    tier: A
    chapter_range: [8, 12]
    typical_runtime: "standard_book"
  F012:
    name: "Permission Slip Collection"
    tier: C
    chapter_range: [52, 52]
    typical_runtime: "micro_book_20"
  F013:
    name: "Before/During/After Crisis"
    tier: A
    chapter_range: [24, 24]
    typical_runtime: "deep_book_4h"
  F014:
    name: "Archetype Transformation"
    tier: A
    chapter_range: [10, 15]
    typical_runtime: "standard_book"
  F015:
    name: "Sensory Regulation Library"
    tier: C
    chapter_range: [5, 8]
    typical_runtime: "micro_book_15"

# Runtime formats (V4.5 duration classes). Orthogonal to structural.
# Each runtime declares compatible_structural_formats — the validator accepts
# any pairing where chapter_count_default falls in the structural format's
# chapter_range OR the structural format is in compatible_structural_formats.
#
# DURATION-DERIVATION-01 (docs/DURATION_DERIVATION_SPEC.md): a format's advertised
# duration is DERIVED, not hand-set. Per fully-specced format below:
#   fill_regime       NEW — one of cap | floor | midpoint (§3); selects the word_target rule.
#   word_target       = cap: cap_word_target||word_range[max]; floor: round(min*1.04);
#                       midpoint: round((min+max)/2)   (§4.1)
#   audiobook_minutes = round(word_target / tts_wpm)   tts_wpm=150  (config/duration_scorecard.yaml §4.2)
#   ebook_minutes     = round(word_target / ebook_wpm) ebook_wpm=230 (config/duration_scorecard.yaml §4.2)
# WPM constants are single-sourced from duration_scorecard.yaml (NOT re-declared here, §4.3) and
# applied by phoenix_v4/ops/duration_derivation.py. The 10 stub formats (Group A backfill below,
# no word_range) are intentionally NOT derived (§8). duration_minutes is DEPRECATED (§9): kept for
# back-compat, overwritten with the derived audiobook value so un-migrated readers still advertise
# the honest number. Do NOT hand-edit minutes — change word_range/fill_regime and re-derive.
runtime_formats:
  micro_book_15:
    duration_minutes: 23  # DEPRECATED — superseded by audiobook_minutes/ebook_minutes (DURATION-DERIVATION-01). Do not hand-edit; readers migrate per follow-up. Overwritten with derived audiobook value.
    chapter_count_default: 5
    word_range: [2500, 4500]
    fill_regime: midpoint  # DURATION-DERIVATION-01 §3.1 (audit regime=midpoint)
    audiobook_minutes: 23  # DERIVED round(3500/150); word_target=midpoint(2500,4500)=3500 (§4.2)
    ebook_minutes: 15      # DERIVED round(3500/230)
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F015, F003]
    # Spine compression to chapter_count_default (5): one chapter per narrative phase
    # (HARDSHIP/HELP/HEALING/HOPE) + closer. Same curation as compact_book_5ch_* (PR-D-SPINE-01).
    # Realizes the declared 5-chapter count in the spine path; renumbered 1..5 after subset.
    compact_chapter_subset: [1, 4, 7, 10, 12]
  micro_book_20:
    duration_minutes: 28  # DEPRECATED — superseded by audiobook_minutes/ebook_minutes (DURATION-DERIVATION-01). Do not hand-edit; readers migrate per follow-up. Overwritten with derived audiobook value.
    chapter_count_default: 6  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 5; Python value 6 preserved
    word_range: [3000, 5500]
    fill_regime: midpoint  # DURATION-DERIVATION-01 §3.1 (audit regime=midpoint)
    audiobook_minutes: 28  # DERIVED round(4250/150); word_target=midpoint(3000,5500)=4250 (§4.2)
    ebook_minutes: 18      # DERIVED round(4250/230)
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F015, F003]
    # Spine compression to chapter_count_default (6): one chapter per narrative phase
    # (HARDSHIP/HELP/HEALING/HOPE) with the HARDSHIP+HOPE bookends doubled — keeps
    # ch1=recognition and ch12=integration. ch3=pattern_mapping is the same 2nd-HARDSHIP
    # keeper as the 8ch subset (drops ch2=origin as most phase-overlapping). This is the
    # 5ch subset [1,4,7,10,12] + ch3. Realizes the declared 6-chapter count in the spine
    # path (PR-D-SPINE-01); renumbered 1..6 after subset. Without this the spine path
    # rendered the full 12-chapter spine (~7.2k words, +31..60% over [3000,5500] →
    # inflated F1 register-repetition). Sibling of micro_book_15's 5ch subset.
    compact_chapter_subset: [1, 3, 4, 7, 10, 12]
  short_book_30:
    duration_minutes: 40  # DEPRECATED — superseded by audiobook_minutes/ebook_minutes (DURATION-DERIVATION-01). Do not hand-edit; readers migrate per follow-up. Overwritten with derived audiobook value.
    chapter_count_default: 8  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 7; Python value 8 preserved
    word_range: [4500, 7500]
    fill_regime: midpoint  # DURATION-DERIVATION-01 §3.1 (audit regime=midpoint)
    audiobook_minutes: 40  # DERIVED round(6000/150); word_target=midpoint(4500,7500)=6000 (§4.2)
    ebook_minutes: 26      # DERIVED round(6000/230)
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F003, F006, F007, F011]
    # Spine compression to chapter_count_default (8): 2 chapters per phase + closer.
    # Same curation as compact_book_8ch_30min (PR-D-SPINE-01). Renumbered 1..8 after subset.
    compact_chapter_subset: [1, 3, 4, 6, 7, 9, 10, 12]
  one_hour_book:
    duration_minutes: 60  # DEPRECATED — superseded by audiobook_minutes/ebook_minutes (DURATION-DERIVATION-01). Do not hand-edit; readers migrate per follow-up. Overwritten with derived audiobook value.
    chapter_count_default: 8
    word_range: [8000, 10000]
    fill_regime: midpoint  # DURATION-DERIVATION-01 §3.1
    audiobook_minutes: 60  # DERIVED round(9000/150); word_target=midpoint(8000,10000)=9000 (§4.2). NEW first-class "1-Hour Book" tier — operator-approved (OPD-20260613-001); fills the ~45min→~2.5hr ladder gap. 1hr @ 150 WPM = exactly 9000 words (= standard_book floor).
    ebook_minutes: 39      # DERIVED round(9000/230)
    compatible_tiers: [A, B]
    compatible_structural_formats: [F003, F006, F007, F011]
    # Spine compression to chapter_count_default (8): 2 chapters per phase + closer
    # (same 8-chapter curation as short_book_30 / compact_book_8ch_30min). Higher word
    # budget yields richer chapters at the ~9000w target. Renumbered 1..8 after subset.
    compact_chapter_subset: [1, 3, 4, 6, 7, 9, 10, 12]


  standard_book_60min:
    chapter_count_default: 10
    word_range: [9000, 12000]
    fill_regime: midpoint  # stays at ~10,500w midpoint (9k–12k); avoids standard_book's cap-fill to 22k
    audiobook_minutes: 70  # DERIVED round(10500/150); word_target=midpoint(9000,12000)=10500
    ebook_minutes: 46      # DERIVED round(10500/230)
    compatible_tiers: [A, B]
    compatible_structural_formats: [F006, F007, F010, F011, F014]
    # Full 12-chapter spine (no compact_chapter_subset). Narrow 60-70 min / 9k-12k target.
    # 5,722 book plans declare this runtime_format_id. batch_waystream_epubs.py already
    # aliases it to standard_book for EPUB release; registered here so load_runtime_format()
    # does not KeyError during spine builds (fix for QA finding 2026-06-26).
  standard_book:
    duration_minutes: 147  # DEPRECATED — superseded by audiobook_minutes/ebook_minutes (DURATION-DERIVATION-01). Do not hand-edit; readers migrate per follow-up. Overwritten with derived audiobook value (was 55 — the historically wrong label; real audiobook ~143min/2h23m at 150 WPM per PR #1510 audit f27dafdb2).
    chapter_count_default: 10  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 12; Python value 10 preserved (most consequential — default canonical book runtime)
    word_range: [9000, 22000]  # DURATION-DERIVATION-01 §5: ceiling raised 18000→22000 so the systematic ~21.5k gold render (depth-fill target 20k, render ~21,454, 94% over old cap) stops tripping the word-range gate. Prior raise (bestseller-chord-audit-2026-05-17 Axis 4) was 13000→18000 so 12-chapter arcs (config/plans/anxiety_gen_z_professionals_6h.yaml et al) don't truncate ch 11-12 content to 0 in enrichment_select.py:1228 format_wmax cap. 10-chapter waves unaffected (still ~13000 effective via per-slot target_words). Mirrors PR #939's deep_book_6h ceiling raise (65K→72K) pattern. OPD-logged, operator-flagged (changes customer-facing advertised duration 55→147min).
    fill_regime: cap  # DURATION-DERIVATION-01 §3.1: gold/depth-fill pins to the ceiling (the $-makers path); 94% of gold over cap.
    cap_word_target: 22000  # DURATION-DERIVATION-01 §5: explicit cap override so word_target=22000 independent of future word_range edits (next clean step above the ~21.5k render, small headroom).
    audiobook_minutes: 147  # DERIVED round(22000/150); word_target=cap_word_target=22000 (§4.2). Reconciled label; was advertised 55 (−63% understated).
    ebook_minutes: 96       # DERIVED round(22000/230)
    compatible_tiers: [A, B]
    compatible_structural_formats: [F006, F007, F010, F011, F014]
  extended_book_2h:
    duration_minutes: 140  # DEPRECATED — superseded by audiobook_minutes/ebook_minutes (DURATION-DERIVATION-01). Do not hand-edit; readers migrate per follow-up. Overwritten with derived audiobook value (was 120).
    chapter_count_default: 14  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 15; Python value 14 preserved
    word_range: [17000, 25000]
    fill_regime: midpoint  # DURATION-DERIVATION-01 §3.1 (audit regime=midpoint)
    audiobook_minutes: 140  # DERIVED round(21000/150); word_target=midpoint(17000,25000)=21000 (§4.2)
    ebook_minutes: 91       # DERIVED round(21000/230)
    compatible_tiers: [A, B]
    compatible_structural_formats: [F004, F009, F010, F014]
  deep_book_4h:
    duration_minutes: 200  # DEPRECATED — superseded by audiobook_minutes/ebook_minutes (DURATION-DERIVATION-01). Do not hand-edit; readers migrate per follow-up. Overwritten with derived audiobook value (was 240; real ~217min, −11%, within ±15% band).
    chapter_count_default: 16  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 20; Python value 16 preserved
    word_range: [20000, 40000]
    fill_regime: midpoint  # DURATION-DERIVATION-01 §3.1 (audit regime=midpoint)
    audiobook_minutes: 200  # DERIVED round(30000/150); word_target=midpoint(20000,40000)=30000 (§4.2)
    ebook_minutes: 130      # DERIVED round(30000/230)
    compatible_tiers: [A]
    compatible_structural_formats: [F004, F009, F013]
  deep_book_6h:
    duration_minutes: 347  # DEPRECATED — superseded by audiobook_minutes/ebook_minutes (DURATION-DERIVATION-01). Do not hand-edit; readers migrate per follow-up. Overwritten with derived audiobook value (was 360; real ~368min, +2%, within ±15% band).
    chapter_count_default: 20  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 24; Python value 20 preserved
    word_range: [50000, 72000]  # Sprint-1: raised ceiling from 65K to 72K so depth fill hits 72K atoms; compose retains ~72% → ~52K final words (needed to clear the 50K floor after phrase dedup)
    fill_regime: floor  # DURATION-DERIVATION-01 §3.1/§3.2: fills to just above the floor (registry "~52K final, clear 50K floor"); word_target = round(min*1.04), not the raw floor.
    audiobook_minutes: 347  # DERIVED round(52000/150); word_target=floor=round(50000*1.04)=52000 (§4.2)
    ebook_minutes: 226      # DERIVED round(52000/230)
    compatible_tiers: [A]
    compatible_structural_formats: [F013]

