# Format registry for Stage 2 (Format Selector).
# Structural format IDs (F001–F015) and slot semantics are defined in Canonical Spec Part 2.
# Stage 3 MUST receive slot_definitions from FormatPlan; no internal default. This file is the authority.
# Allowed slot types: HOOK, SCENE, STORY, REFLECTION, EXERCISE, INTEGRATION, COMPRESSION (slot_08_compression; DEV SPEC 2),
# PIVOT, TAKEAWAY, THREAD, PERMISSION (bestseller structures; docs/BESTSELLER_STRUCTURES.md).

# Default beat (6-type) per chapter. Formats may override via slot_template (e.g. include COMPRESSION).
default_slot_definitions:
  - [HOOK, SCENE, STORY, REFLECTION, EXERCISE, INTEGRATION]

# Structural formats (beat map family). Authoritative definitions: Canonical Spec Part 2.
structural_formats:
  F001:
    name: "90-Day Transformation"
    tier: B
    chapter_range: [90, 90]
    typical_runtime: "extended_book_2h"
  F002:
    name: "Daily Practice Rituals"
    tier: B
    chapter_range: [30, 365]
    typical_runtime: "standard_book"
  F003:
    name: "Challenge Series"
    tier: A
    chapter_range: [7, 21]
    typical_runtime: "short_book_30"
  F004:
    name: "Somatic Body Journey"
    tier: A
    chapter_range: [12, 15]
    typical_runtime: "deep_book_4h"
  F005:
    name: "Scenario Rescue Kit"
    tier: C
    chapter_range: [10, 20]
    typical_runtime: "micro_book_15"
  F006:
    name: "Nervous System Ladder"
    tier: A
    chapter_range: [8, 12]
    typical_runtime: "standard_book"
    # Optional: slot_template with COMPRESSION (after REFLECTION, before EXERCISE). DEV SPEC 2.
    slot_template: [HOOK, SCENE, STORY, REFLECTION, COMPRESSION, EXERCISE, INTEGRATION]
  F007:
    name: "Shadow Work Series"
    tier: A
    chapter_range: [8, 12]
    typical_runtime: "standard_book"
  F008:
    name: "Micro-Habits Stacking"
    tier: B
    chapter_range: [52, 52]
    typical_runtime: "extended_book_2h"
  F009:
    name: "Parts Work (IFS)"
    tier: A
    chapter_range: [10, 15]
    typical_runtime: "deep_book_4h"
  F010:
    name: "Energy Management"
    tier: A
    chapter_range: [12, 16]
    typical_runtime: "standard_book"
  F011:
    name: "Relationship Repair"
    tier: A
    chapter_range: [8, 12]
    typical_runtime: "standard_book"
  F012:
    name: "Permission Slip Collection"
    tier: C
    chapter_range: [52, 52]
    typical_runtime: "micro_book_20"
  F013:
    name: "Before/During/After Crisis"
    tier: A
    chapter_range: [24, 24]
    typical_runtime: "deep_book_4h"
  F014:
    name: "Archetype Transformation"
    tier: A
    chapter_range: [10, 15]
    typical_runtime: "standard_book"
  F015:
    name: "Sensory Regulation Library"
    tier: C
    chapter_range: [5, 8]
    typical_runtime: "micro_book_15"

# Runtime formats (V4.5 duration classes). Orthogonal to structural.
# Each runtime declares compatible_structural_formats — the validator accepts
# any pairing where chapter_count_default falls in the structural format's
# chapter_range OR the structural format is in compatible_structural_formats.
runtime_formats:
  micro_book_15:
    duration_minutes: 15
    chapter_count_default: 5
    word_range: [2500, 4500]
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F015, F003]
  micro_book_20:
    duration_minutes: 20
    chapter_count_default: 6  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 5; Python value 6 preserved
    word_range: [3000, 5500]
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F015, F003]
  short_book_30:
    duration_minutes: 30
    chapter_count_default: 8  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 7; Python value 8 preserved
    word_range: [4500, 7500]
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F003, F006, F007, F011]
  standard_book:
    duration_minutes: 55
    chapter_count_default: 10  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 12; Python value 10 preserved (most consequential — default canonical book runtime)
    word_range: [9000, 13000]
    compatible_tiers: [A, B]
    compatible_structural_formats: [F006, F007, F010, F011, F014]
  extended_book_2h:
    duration_minutes: 120
    chapter_count_default: 14  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 15; Python value 14 preserved
    word_range: [17000, 25000]
    compatible_tiers: [A, B]
    compatible_structural_formats: [F004, F009, F010, F014]
  deep_book_4h:
    duration_minutes: 240
    chapter_count_default: 16  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 20; Python value 16 preserved
    word_range: [20000, 40000]
    compatible_tiers: [A]
    compatible_structural_formats: [F004, F009, F013]
  deep_book_6h:
    duration_minutes: 360
    chapter_count_default: 20  # AUTO-PLAN-SSOT-01-AMENDMENT Group B: was 24; Python value 20 preserved
    word_range: [50000, 65000]
    compatible_tiers: [A]
    compatible_structural_formats: [F013]

  # AUTO-PLAN-SSOT-01-AMENDMENT Group A backfill (10 formats):
  # These formats existed only in phoenix_v4/planning/book_structure_plan.FORMAT_CHAPTER_COUNTS.
  # Per amendment Action item 1, backfill `chapter_count_default` from Python.
  # Other registry fields (duration_minutes, word_range, compatible_tiers,
  # compatible_structural_formats) are intentionally absent — Python had only
  # the chapter_count value and these formats are not consumed by format_selector
  # (verified pre-refactor: 0 hits in format_selector.py / enrichment_select.py /
  # knob_apply.py). Operator may extend these entries with the other fields when
  # the formats become first-class runtime targets.
  five_min_practice:
    chapter_count_default: 5
  pocket_guide:
    chapter_count_default: 6
  ten_things_to_do:
    chapter_count_default: 8
  symptom_to_action_atlas:
    chapter_count_default: 8
  daily_text_audio_companion:
    chapter_count_default: 10
  crisis_cards:
    chapter_count_default: 6
  weekly_challenge_pack:
    chapter_count_default: 8
  faq_audiobook:
    chapter_count_default: 8
  myth_vs_mechanism:
    chapter_count_default: 8
  protocol_library:
    chapter_count_default: 10

  # Compact runtimes — purpose-built for short word bands with FEWER chapters
  # than the default short runtimes (which assume a 12-chapter spine compressed
  # into a small budget). Authority: docs/COMPACT_BOOK_FORMAT_SPECS_2026-05-04.md.
  # Beat sheets compress the 4-phase narrative arc (HARDSHIP/HELP/HEALING/HOPE)
  # into 5 or 8 chapters. Per-chapter word budget is larger than the
  # equivalent-runtime micro/short formats because there are fewer chapters
  # for the same word target.
  compact_book_5ch_15min:
    duration_minutes: 15
    chapter_count_default: 5
    word_range: [3000, 4500]
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F015, F003]
    # Spine compression: which chapters of the standard 12-chapter topic spine to keep.
    # 1-based original-spine indices. Picks one chapter per phase (HARDSHIP/HELP/HEALING/HOPE)
    # plus the closer (12=integration). After subset, chapters are renumbered 1..N for
    # downstream phase-mapping logic in _chapter_phase / story_planner.
    compact_chapter_subset: [1, 4, 7, 10, 12]
  compact_book_5ch_20min:
    duration_minutes: 20
    chapter_count_default: 5
    word_range: [4000, 5500]
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F015, F003]
    # Same spine compression as 5ch_15min — same narrative arc, more words per chapter.
    compact_chapter_subset: [1, 4, 7, 10, 12]
  compact_book_8ch_30min:
    duration_minutes: 30
    chapter_count_default: 8
    word_range: [5500, 7500]
    compatible_tiers: [A, B, C]
    compatible_structural_formats: [F003, F006, F007, F011]
    # Spine compression: 2 chapters per phase + closer. Drops origin (ch2),
    # cost_exposure (ch5), practice_under_pressure (ch8), identity_fracture (ch11)
    # — the chapters whose narrative role is most-overlapping with their phase peers.
    # Renumbered 1..8 after subset.
    compact_chapter_subset: [1, 3, 4, 6, 7, 9, 10, 12]
