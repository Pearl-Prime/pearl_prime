      url_template: "{base_url}/free/4-minute-body-scan/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "She'd been holding her breath for two years. She didn't know it."
    preview_text: "Not a dramatic realization. A slow, quiet one."
    body: |
      Josephine worked in emergency medicine. She was good at her job in the way that comes from staying calm when everything is moving fast — she'd learned to be steady, to not react, to keep her body controlled in high-stakes moments.

      That steadiness had a cost she didn't notice for a long time.

      A colleague mentioned during a break that she'd been doing breathwork and had realized she'd never been breathing fully. Josephine half-listened and then went back to her shift. But the comment stayed with her.

      A few days later, alone in her car, she took a deliberate full breath. Not her normal breath — a real one, chest and belly. And noticed that her usual breath was about half that depth. Had been, probably, for years.

      She started paying attention. She noticed that she held her breath slightly during difficult patient conversations. She noticed a specific tightness across her upper chest that was just always there, so constant she'd stopped registering it as notable. She noticed that at the end of a shift her jaw ached slightly from being held.

      She hadn't thought of herself as someone who was carrying tension. She thought of herself as someone who handled things well. Both of those things were true at the same time.

      She started doing five minutes of body awareness before bed. Not yoga, not breathwork, just — checking in. Noticing what was held. Breathing into it.

      She said she felt like she'd been introduced to a part of herself she'd been ignoring for a very long time.
