    subject: "Your 4-Minute Body Scan is ready — do it standing up"
    preview_text: "Feet on the floor. Scan from jaw to belly. Note what you find."
    body: |
      Your 4-Minute Body Scan is ready to download. But before you sit down to read it, try this version right now. It takes under two minutes.

      Stand up if you're sitting. Put both feet flat on the floor. Take one slow breath.

      Now scan. Start at your jaw. Is it clenched? Slightly pulled in? Soft? Just notice — don't try to change it.

      Move down to your shoulders. Where are they sitting right now? Up near your ears? Dropped forward? Locked?

      Move to your chest. Is your breathing shallow or full? Is there any tightness across your sternum or ribcage?

      Move to your belly. Is it braced? Held in? Or can you feel it move when you breathe?

      That's it. You just did a body scan.

      Write down one word for what you noticed in each area. Not to fix it. Just to have a record of what was there before you started paying attention.

      Most of us spend our days almost entirely in our heads. The body is running in the background, registering things, holding things — and we miss most of it because we're not looking. The scan is just a way to look. Download the full version below and try it daily for a week.
