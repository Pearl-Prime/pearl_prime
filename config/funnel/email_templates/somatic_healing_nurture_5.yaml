  e2_mechanism:
    delay_hours: 24
    subject: "Your tension isn't a problem. It's information."
    preview_text: "Your body is mapping something your mind hasn't caught up to yet."
    body: |
      There's a common instinct when you notice tension in your body: try to get rid of it. Stretch it. Breathe through it. Relax. And that can help — but it's not the whole picture.

      Tension is often the body's way of holding something that hasn't been processed yet. Not as a metaphor. As an actual physiological mechanism. When you experience something difficult — a conflict, a stressful decision, sustained pressure, a moment of fear — your body responds. Muscles tighten. Breathing changes. The nervous system activates.

      If that response doesn't get to complete — if you push through and move on and don't give it anywhere to go — the body holds it. Not forever. But until something gives it a chance to discharge.

      This isn't a flaw. It's just how the system works.

      The practice for this week: next time you notice a specific area of tension, don't immediately try to release it. Instead, put a hand there. Breathe into that area — imagine the breath going directly to where your hand is. Stay there for three breaths.

      You're not fixing anything. You're just making contact. Acknowledging what's there. The body tends to respond well to being noticed rather than managed.

      Try it once today. Notice what happens.
