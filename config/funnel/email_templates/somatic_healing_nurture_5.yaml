  e4_offer:
    delay_hours: 144
    subject: "A book about listening to what your body has already been saying"
    preview_text: "The tension, the held breath, the braced belly — it's all data."
    body: |
      Your body is not waiting for you to fix it. It's waiting for you to pay attention to it.

      Most people spend most of their lives in their heads — managing, planning, analyzing — while the body runs in the background holding tension, signaling stress, registering experiences that the mind moves past. At some point the gap between what the body is carrying and what the mind acknowledges becomes something you can't ignore.

      "Held by the Body" is a short book about closing that gap. It's part of The Body Knows Series.

      It covers why the body holds what it holds, what the common physical signals of stored stress actually mean, and how to work with what your body is telling you rather than around it. The practices inside are accessible — no special equipment, no prior experience with body-based work.

      It's written for people who are intellectually comfortable with self-awareness but unfamiliar with the physical layer of it. If you've always been more of a thinker than a feeler, this book is probably for you.

      $0.99. Short. Practical. Worth reading slowly, with breaks to try what it's describing.
