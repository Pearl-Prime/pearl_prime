      If "Jump Scared" connected, the rest of the Fear to Fire Collection covers specific kinds of courage that the first book introduces but doesn't fully unpack.

      Book 2: "The Identity Threshold" — specifically for decisions that require you to become a different version of yourself.
      Book 3: "Visible Risk" — courage in contexts where other people will see if you fail.
      Book 4: "The Long Commitment" — courage for decisions with no quick feedback loop, where you won't know for years.
