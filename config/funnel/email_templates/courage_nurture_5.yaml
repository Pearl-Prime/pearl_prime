    preview_text: "Step 1 is already harder than it looks"
    body: |
      Your Decision Map is ready — link below.

      One instruction before you open it: name the thing you've been avoiding.

      Not a category. Not "my career situation" or "that conversation." The specific thing. The exact decision or action that you already know you need to make and keep not making.

      Write it down. Or say it out loud if you're alone. Notice where you feel it in your body when you do — there's usually a location. Your chest, your stomach, somewhere in your throat. That physical sensation is not a problem. It's information about how much this matters.

      The Map is structured to take you from naming the thing to understanding what's actually in the way — not the practical obstacles, but the specific fear underneath. Most people know what they should do. The question is what's making the cost of not doing it feel lower than the cost of doing it.

      That's what the Map is for. Download it below.
