    body: |
      The book is "Jump Scared" and it's $0.99.

      12 chapters. Each one targets a specific pattern in the courage/fear dynamic — not the abstract version, but the practical one. What stops you at the threshold, why the alarm fires when the stakes are high, how to move before the fear resolves.

      Chapter 1 is the mechanism: how fear works at the moment of commitment and why it's not evidence of the wrong choice. Chapter 4 is about the identity problem — why the decision isn't just about what you'll do but who you'll become, and why that's actually what makes it hard. Chapter 7 covers the aftermath: what happens after you go, and why people are often unprepared for that part.

      Chapter 10 is about the edge — the place you can stay indefinitely because it feels like action without the risk of action. Chapter 12 is about the second decision: the one that comes after the first, when the fear doesn't disappear and you have to do the same thing again.

