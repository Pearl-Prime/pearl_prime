  e2_mechanism:
    delay_hours: 24
    subject: "The moment right before you commit — what's actually happening"
    preview_text: "Your body is doing its job. Your mind can still decide."
    body: |
      There's a specific moment that most people recognize: you're right at the edge of committing to something that matters, and your body fires an alarm. Heart rate goes up. Breathing changes. A wave of doubt or dread arrives, seemingly from nowhere.

      This is not evidence that you're making the wrong choice. This is your threat system doing its job. It detected significance — something that could go wrong, something with consequences — and it activated. That's the system working as designed.

      The important thing to understand is that fear at the threshold is not a veto. It's a signal. It's saying: this matters, and there's risk involved. Which is often exactly true of anything worth doing.

      Your body fires the signal. Your mind still gets to decide.

      Here's a practice for this week: describe in writing what it would look like to do the thing scared. Not confidently — scared. What would you actually do? What would the first 10 minutes look like? What would you say, where would you go, what would the practical sequence be?

      Mapping the action in detail makes it more concrete and less abstract, which tends to reduce the alarm signal and make the decision feel more navigable.
    cta:
      text: "Try this now"
      url_template: "{base_url}/free/decision-map/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "She stayed at the edge for two years before she jumped"
    preview_text: "And what finally made her go"
    body: |
      Lena had been running her own consulting business as a side project for two years while keeping her full-time job. The side project was doing well — well enough that the numbers made the decision obvious. She looked at them every few months, saw the same thing, and kept not doing it.

      She told herself she was waiting for the right moment. More savings, fewer variables, a sign that the conditions were right. The conditions kept improving. She kept waiting.

      What she noticed, eventually, was that she'd spent two years constructing reasons to stay at the edge. Not because the business wasn't ready — but because the edge felt like a place she could still belong to both worlds. Once she jumped, she'd have to be the person who jumped. That was a different identity than the one she'd been holding.

      The moment that changed things wasn't a realization or a breakthrough. It was a conversation with a client who mentioned, casually, that they assumed she did this full time. They'd assumed it for a year. She'd been the person who jumped in everyone else's mind already.

      She gave her notice two weeks later. Not because the fear was gone — it wasn't — but because staying at the edge had stopped feeling like safety and started feeling like its own kind of loss.
