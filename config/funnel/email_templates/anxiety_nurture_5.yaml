  e2_mechanism:
    delay_hours: 24
    subject: What your alarm system is actually doing
    preview_text: It's not broken — it's miscalibrated
    body: 'Here''s the thing nobody tells you about anxiety: the alarm isn''t malfunctioning.
      It''s doing exactly what it was designed to do. It''s just firing at the wrong
      targets.


      Your threat-detection system learned its settings early — probably when certain
      things actually were unpredictable or dangerous. It got calibrated to scan constantly,
      respond fast, and err on the side of caution. That was useful then. Now it''s
      sending red alerts about an email, a social situation, a number on a screen.


      The system isn''t broken. It''s just running a program that no longer fits the
      environment.


      Knowing that doesn''t make the alarm quieter immediately. But it changes your
      relationship to it. You stop trying to argue with the fear and start treating
      it like a sensitive smoke detector in a kitchen — something that needs recalibrating,
      not something to panic about.


      Here''s one thing to try today: the next time the alarm fires and there''s no
      real threat, say out loud — or in your head, if you''re not alone — "Alarm noted.
      No action required." Then take one slow breath.


      You''re not dismissing the feeling. You''re just not mobilizing for a threat
      that isn''t there.


      That''s the first step toward recalibration.

      '
    cta:
      text: Try this now
      url_template: '{base_url}/somatic_exercise_freebee_apps/ex13_body_scan.html?unlock=1&cid={{contact_id}}'
  e3_story:
    delay_hours: 96
    subject: She checked her phone 40 times before meetings
    preview_text: Not because she was distracted. Because her alarm wouldn't stop.
    body: 'Maya managed a team of eleven people at a logistics company. By every visible
      measure, she was doing well — promotions, good reviews, colleagues who respected
      her. She also checked her phone approximately 40 times before any meeting that
      involved her director.


      It wasn''t about the phone. She was scanning. Looking for early signals that
      something was about to go wrong — a cancellation, a shift in tone, some indication
      that the ground was about to move. She''d been doing it for so long she barely
      noticed anymore.


      What she noticed instead was that she was exhausted by 10am. That she couldn''t
      fully focus on anything because part of her attention was always posted at the
      door, watching.


      She started paying attention to when the scanning happened — not to stop it,
      just to see it. She noticed it was always tied to a specific kind of uncertainty.
      Situations where she couldn''t predict the other person''s reaction.


      She didn''t overhaul anything. She just started naming what was happening instead
      of acting on it automatically. Slowly, the scanning became less urgent. Not
      gone — less urgent.


      The meetings didn''t change. The director didn''t change. What changed was how
      much of her she was bringing to the watch.

      '
    cta:
      text: More on that Thursday →
