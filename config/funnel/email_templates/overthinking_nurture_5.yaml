    subject: "Your Thought Sorter result — here's what it means"
    preview_text: "The label changes what you do next"
    body: |
      Your Thought Sorter is ready — link below.

      Before you go through the full tool, here's the core exercise right now. Pick one thought that's been circling lately — the kind you keep returning to without resolving. Hold it in mind for a moment.

      Now label it. One of three categories: solve, process, or worry.

      Solve means there's an action that would actually address it and you haven't taken it yet. Process means something happened and you need to work through the feeling of it — there's no decision to make, just something to move through. Worry means it's about a future event that you can't control or predict, and no amount of thinking is going to resolve it.

      The label changes what you do next. Solve thoughts need a decision or an action. Process thoughts need space and sometimes another person. Worry thoughts need interruption — because there's no destination the loop can reach.

      Most overthinking is worry thoughts being treated like solve thoughts. The brain keeps running the analysis because it believes a solution exists. The Thought Sorter helps you stop looking for solutions to unsolvable questions.

      Download below.
    cta:
      text: "Open your Thought Sorter"
