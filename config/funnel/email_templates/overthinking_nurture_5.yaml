      The book is "Your Brain Is Not the Boss" and it's $0.99.

      12 chapters. Each one addresses a specific mechanism in the overthinking pattern — from the certainty-seeking loop to analysis paralysis to the rumination that replays past events that can't be changed.

      Chapter 1 is the mechanism: why the brain loops on unresolved questions and what actually interrupts it. Chapter 4 covers decision paralysis specifically — the version where the analysis keeps expanding because commitment feels permanent and dangerous. Chapter 6 is about rumination: the loop that runs backward over what already happened rather than forward over what might.

