  e2_mechanism:
    delay_hours: 24
    subject: "The loop that's looking for certainty you can't find"
    preview_text: "And why it won't stop until you give it something else"
    body: |
      The overthinking loop isn't running because your brain is broken or because you're a naturally anxious person. It's running because it's looking for a resolution — a conclusion, a guarantee, a clear answer — that doesn't exist yet.

      Your brain treats unresolved questions the same way it treats unfinished tasks: it keeps them active. It cycles back to them automatically, the way you can't stop thinking about a conversation you didn't finish or a decision you haven't made. The loop is an attention system doing its job.

      The problem is that certainty about the future isn't available. The loop can run indefinitely and never find what it's looking for, because what it's looking for isn't there. More analysis doesn't close the loop — it just extends it.

      What does interrupt the loop is naming what's happening. Not the content of the thoughts — the function. The loop is looking for certainty. Acknowledging that directly gives the attention system something to work with.

      Try this when the loop starts: say to yourself, "I notice I'm looking for certainty." Not a judgment. Just an observation. Then redirect to one thing in the immediate environment — something you can see or touch. You're not solving the uncertainty. You're giving the loop a place to land that isn't another circuit.
    cta:
      text: "Try this now"
      url_template: "{base_url}/free/thought-sorter/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "He analyzed the job offer for three weeks and nearly lost it"
    preview_text: "The loop had good intentions. Bad results."
    body: |
      Marcus got a job offer on a Tuesday. By Thursday, he had a spreadsheet with 11 variables, salary comparisons across six competitors, three conversations with people who'd worked at the company, and a list of 22 pros and 18 cons.

      He felt like he was being thorough. He was, technically. But at the end of week two, he had more information than he'd started with and less clarity. The loop had consumed all the new data and generated new questions. The more he analyzed, the more uncertain the decision felt.

      The offer deadline was extended once. When the company's HR rep called to ask where he stood, Marcus could hear in her voice that the extension wouldn't be extended again.

      He made the decision in the next 20 minutes, not because he'd reached certainty but because the loop had run long enough for him to see that certainty wasn't coming. He took the job.

      What he recognized afterward was that the spreadsheet had been useful for exactly the first three days. After that, it was the loop justifying its own continuation. Every new variable was the loop telling itself there was still something to solve.

      The decision he finally made wasn't better informed than the one he could have made at day four. It was just made.
    cta:
      text: "More on that Thursday →"
