      The book is called "The Collapse You Earned" — and it's $0.99.

      It covers seven mechanisms: the resentment buildup, the meaning drain, the loss of autonomy, the physical toll, the identity fusion (when you and the job become the same thing), the recovery signals, and the rebuild.

      It's not a productivity book. It's not about doing less so you can do more. It's about understanding what burnout actually takes from you — and what a real return looks like, not the performance of recovery.

      Each chapter is standalone. If you're in the middle of it right now, start with Chapter 3 (loss of autonomy) or Chapter 5 (identity fusion). If you're in the aftermath, Chapter 6 and 7 are where to go.

      The whole thing is about 35 minutes to read. $0.99 because getting it in your hands is the point.
