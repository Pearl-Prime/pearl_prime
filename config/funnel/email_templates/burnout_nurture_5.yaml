    body: |
      Your 5-Minute Energy Audit is ready — link below.

      Before you get into it, one prompt to start with right now. Don't overthink it.

      Ask yourself: what did I do yesterday that I resented doing?

      Not the thing you complained about. Not the task you were slow on. The thing you did while a part of you was quietly furious that you were doing it again.

      Write it down, or just hold it in mind. Don't try to solve it yet. The point isn't the answer — it's noticing how specific the resentment is. Burnout doesn't usually come from too much work in general. It comes from too much of the specific kind of work that costs you something you're not getting back.

      The Audit helps you see where your energy is actually going — which categories of demand are draining the tank and which are replenishing it. Most people are surprised by how clear it is once it's mapped out.

      Download it below and block five minutes this week to go through it.
