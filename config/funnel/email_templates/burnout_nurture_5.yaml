  e2_mechanism:
    delay_hours: 24
    subject: "The exhaustion that sleep can't fix"
    preview_text: "This is what burnout actually is"
    body: |
      There's a specific kind of tired that sleep doesn't touch. You know you got enough hours. You wake up and the weight is still there. You're not groggy — you're depleted in a way that has nothing to do with your body needing rest.

      That's not tiredness. That's burnout. And the difference matters because the fix is different.

      Tiredness responds to rest. Burnout responds to meaning, control, and recovery of the things that were taken — usually gradually, usually without your full permission. It builds slowly, and by the time most people notice it, they've been running on fumes for months.

      Here's something to try right now. Think about where you carry the job in your body. Not metaphorically — physically. Is it in your shoulders? Your jaw? The back of your neck? Somewhere in your chest or stomach?

      Place a hand there. Just notice it. You don't need to do anything with it. The awareness itself is useful — it tells you something about how long you've been holding this, and where it lives.

      The Audit you downloaded is designed to work with that — to match the physical signal to the specific drain so you can start addressing the right thing.
    cta:
      text: "Try this now"
      url_template: "{base_url}/free/energy-audit/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "He gave everything to a company that let him go"
    preview_text: "And what he rebuilt after"
    body: |
      Daniel had been at the same tech company for nine years. He wasn't someone who coasted — he was the person who stayed late, covered for others, said yes when the team needed him. He genuinely believed in what they were building.

      The layoff came on a Tuesday. Forty-five minutes' notice, a form email, and his access was gone by noon.

      For about three months afterward, he kept waking up at 6am ready to start his day. His body didn't know yet that there was nowhere to go. He'd make coffee, open his laptop, and sit there — not looking for jobs, just sitting. He didn't understand what he was waiting for.

      What he eventually figured out was that he'd outsourced his sense of direction entirely to the company. Every morning they'd told him what mattered. Without that, he didn't know how to generate the signal himself.

      He started small. One hour a day on something that was entirely his — not monetized, not networking, just his. A mechanical keyboard he'd been meaning to build. Some old code he'd wanted to clean up.

      It didn't feel like recovery at first. It felt pointless. But slowly the mornings stopped feeling like a void. He started being able to tell the difference between work he chose and work he owed.

      That difference turned out to be the whole thing.
