  e2_mechanism:
    delay_hours: 24
    subject: "Why willpower doesn't work when nothing tastes right"
    preview_text: "It's not a character flaw. It's a biology problem."
    body: |
      There's a very common piece of advice that goes: just make yourself do the thing and the motivation will follow. The problem is that this advice assumes your motivation system is intact and just needs a push.

      When you're in a low period, the system that generates the "this is worth doing" signal is running on reduced output. It's not a character problem. It's a biology problem — the feedback loop that makes action feel rewarding has gone quiet, which means the reward signal that normally follows action doesn't arrive, which makes the next action harder to start.

      The way through is not willpower. It's tiny action. Specifically: action so small that it doesn't require motivation to complete. You're not trying to feel like doing it. You're trying to move before the feeling shows up.

      Here's one for right now: decide one thing you'll do in the next 10 minutes. Not today. Not this week. The next ten minutes. Write it down or say it out loud.

      It can be absurdly small. Make tea. Open a window. Text one word back to someone. The size doesn't matter. The act of deciding and then doing is the signal your system is waiting for.
    cta:
      text: "Try this now"
      url_template: "{base_url}/free/momentum-kit/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "She went through the motions for a year before something shifted"
    preview_text: "It wasn't dramatic. It was one small thing."
    body: |
      Claire had a life that, by most measures, was fine. Stable job. Good people around her. Nothing catastrophic. She just couldn't feel any of it. She went to work, came home, ate dinner she didn't taste, slept, and did it again. The year had a kind of grey sameness to it that she couldn't explain to anyone because nothing was wrong in a way she could point to.

      She didn't tell many people. It was too hard to describe without sounding like she was complaining about a life other people would be grateful for.

      The small thing happened on a Saturday morning. She'd been lying in bed for two hours when she noticed the light coming through the gap in the curtains. Not beautifully — just practically, the way you notice a lamp is on. She got up and opened the curtains.

      She didn't feel better. But she'd done the one thing.

      She started giving herself one small thing per day. Not a goal. Not a step toward anything. Just one deliberate small action, usually the first one that crossed her mind that she could actually do.

      The grey didn't lift in a week or a month. But it started to have variation. There were patches of something different — not happiness, just texture. Small differences in a day that had been completely flat.

      That texture was where the change began.
    cta:
      text: "More on that Thursday →"
      url_template: null

