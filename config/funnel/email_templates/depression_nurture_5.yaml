    body: |
      The book is called "Still Breathing" and it's $0.99.

      Seven chapters. No urgency language, no promises about transformation, no timeline. Just a clear look at what's actually happening when everything feels flat, and what small things have been shown to create movement.

      Chapter 1 covers the biology — the feedback loop that goes quiet and why motivation follows action rather than preceding it. Chapter 3 is about the grey period specifically: what it is, how it's different from sadness, and why it often goes unnamed. Chapter 5 is about other people — how to handle connection when you have nothing to give. Chapter 6 is specifically for the low periods that come after something that looked like progress.

      The book is not going to fix anything by itself. But it might make things slightly clearer, and clarity is a kind of traction.

      $0.99. That's it.
