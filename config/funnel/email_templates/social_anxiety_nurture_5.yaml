    subject: "Your Social Energy Toolkit is ready — do this before your next social thing"
    preview_text: "Three breaths and one intention. That's it."
    body: |
      Your Social Energy Toolkit is ready. Download it below — everything inside is designed to be practical and fast, not theoretical.

      Here's the first thing to try, before the next social situation you have coming up. Could be a work meeting, a dinner, a party, a phone call you've been putting off. Doesn't matter the size.

      Two minutes before it starts: three slow, deliberate breaths. Not performative. Actually slow down. Then answer this question out loud or in writing: "What's one thing I actually want from this?"

      Not "survive it." Not "seem normal." What do you actually want? A good conversation with one person. To feel like yourself by the time you leave. To say one honest thing. Pick something real.

      That one intention does something useful. It gives your attention somewhere to land that isn't "how am I coming across?" The self-monitoring loop that makes social situations exhausting — checking your face, your voice, what they're thinking of you — has less room to run when you have something concrete to focus on.

      You don't have to feel confident. You just need one small target. The toolkit will give you more tools to work with. Start here.
