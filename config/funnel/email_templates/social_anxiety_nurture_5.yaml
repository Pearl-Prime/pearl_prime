  e2_mechanism:
    delay_hours: 24
    subject: "When your face goes hot in a meeting — here's what's actually happening"
    preview_text: "Your alarm fired. That's not the same as failing."
    body: |
      If you've ever felt your face get hot, your mind go blank, or your chest tighten in a social situation — and then spent the next hour replaying it — here's something worth knowing.

      That physical response isn't evidence that you're bad at social situations. It's your nervous system's threat alarm going off. The alarm is calibrated to detect danger. In social contexts, especially ones where you're being evaluated or observed, it can read "people are looking at me" as equivalent to "I am in danger." The response is automatic. It fires before your conscious mind has time to assess whether there's an actual threat.

      The problem is what happens next. Most people interpret the alarm going off as proof that something went wrong — that they failed, or that they're fundamentally awkward, or that everyone noticed. That interpretation is what keeps the loop running.

      The alarm isn't proof of anything except that you're in a situation your nervous system flagged. That's all.

      This week: when you feel the alarm fire in a social moment, try saying internally — "Alarm noted." Then take one slow exhale. You're not trying to make the feeling disappear. You're just putting a label on it so it doesn't become a story.

      Alarm noted. Exhale. That's the whole move.
    cta:
      text: "Get the full tool set"
      url_template: "{base_url}/free/social-energy-toolkit/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "She left every party early for two years. Then one thing changed."
    preview_text: "Not a confidence story. A clarity story."
    body: |
      Priya was 26 and working her first real job in a city where she didn't know many people. She had friends — good ones — but she left every social thing early. Parties, work happy hours, even dinners she'd been looking forward to for days.

      She didn't think of herself as someone with a problem. She thought of herself as someone who preferred smaller things. Which was true, but it wasn't the whole story.

      What was really happening: she'd feel fine going in, then about 45 minutes into any social event the noise and the watching-herself would build until leaving felt like the only option. She'd get home and feel relieved, and then feel ashamed of the relief, and then spend too long on her phone trying to feel less alone.

      A friend mentioned offhandedly that she used to do the same thing until she realized she'd been treating every alarm as a verdict. Priya turned that over for a few days.

      She started paying attention to when the alarm fired versus when she was actually having a bad time. They weren't the same thing. The alarm fired at minute 40 almost every time, whether or not she was enjoying herself. It was a pattern, not a signal about that specific evening.

      She stopped treating it like a verdict. She stayed a little longer. Not every time. But some of the time.

      The early exits got less automatic.
    cta:
      text: "More on that Thursday →"
