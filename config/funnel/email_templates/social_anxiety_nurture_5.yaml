  e4_offer:
    delay_hours: 144
    subject: "A book for people who want to show up — but the showing up is hard"
    preview_text: "Not a guide to being outgoing. A guide to being yourself in rooms that feel difficult."
    body: |
      Showing up socially when your nervous system is working against you takes more energy than most people realize. You're doing the thing — the conversation, the event, the meeting — and simultaneously managing an internal alarm system that keeps flagging situations as high-stakes.

      "Brave Enough to Show Up" is written for that exact experience. It's part of The Brave Room Series.

      It's not a book about becoming an extrovert or getting comfortable with being the center of attention. It's about understanding why certain social situations cost so much energy, what the alarm response is actually doing, and what it looks like to participate in your own life even when the alarm fires.

      The tools are practical. The framework is clear. It doesn't require you to change who you are — it just gives you more information about what's happening so you can make better choices in the moment.

      $0.99. Short enough to finish in one sitting. Some people find it useful to read it before a stretch of events they're nervous about.
