    subject: "Your 8-Minute Wind-Down is ready — start with this tonight"
    preview_text: "Before you close the laptop: write every open loop."
    body: |
      Your 8-Minute Wind-Down protocol is waiting for you. Download it below.

      Tonight, before anything else in the protocol, do this first.

      About 30 minutes before you want to be in bed: open a notebook or a blank document. Set a timer for five minutes. Write every open loop in your head. Every task that isn't done. Every thing you need to remember. Every worry that's sitting in your queue. Every "I should probably follow up on that."

      Don't organize it. Don't prioritize it. Just get it out of your head and onto the page. When the timer goes off, close the notebook or the document. You're not solving anything tonight. You're just taking it out of active memory so your brain isn't on standby trying to hold it all.

      This isn't glamorous. It doesn't feel like it should work. But your brain keeps open loops running in the background the same way a computer keeps tabs open — it takes up space, uses energy, and stays alert for the moment you might need it.

      The mind dump closes the tabs. Everything else in the wind-down works better once that part is done.

      Download the full protocol. Start tonight.
