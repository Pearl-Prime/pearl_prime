    subject: Your Capacity Audit is ready — start with this one question
    preview_text: One thing you need that you haven't asked for.
    body: 'Your Capacity Audit is waiting for you. Go ahead and download it now —
      the link is below.


      Before you open it, do this first.


      Grab something to write with. Write this at the top of a blank page:


      "One thing I need right now that I haven''t asked for."


      Then write the answer. Don''t think about whether it''s reasonable. Don''t edit
      it. Don''t make it smaller so it sounds less demanding. Just write what''s true.


      Most people who work in caregiving roles — formally or informally — are so practiced
      at reading what other people need that they''ve gone quiet about their own needs.
      Not because they don''t have them. Because asking started to feel selfish somewhere
      along the way. Because you''re the one who handles things.


      The audit will help you see where your capacity is actually sitting right now,
      not where you think it should be. But that one sentence — what you need that
      you haven''t asked for — is the real starting point.


      That''s your first exercise. One sentence. That''s it for today.

      '
    cta:
      text: Download The Capacity Audit
      url_template: '{base_url}/free/compassion-fatigue-audit/'
  e2_mechanism:
    delay_hours: 24
    subject: Why caring too much costs you more than you think (it's physiological)
    preview_text: Your nervous system doesn't know the difference between their pain
      and yours.
    body: 'There''s a reason extended caregiving feels physically exhausting — not
      just emotionally draining, but body-tired in a way that sleep doesn''t fully
      fix.


      Here''s what''s happening. Your nervous system is built to mirror the people
      around you. When someone you care for is in pain, distress, or fear, your body
      responds as if a version of that is happening to you. It''s not a character
      flaw. It''s how human connection works at a neurological level.


      The problem is that this mirroring has no built-in off switch. If you''re in
      caregiving mode most of your waking hours — professionally, or for a family
      member, or both — your nervous system doesn''t get to fully reset. The load
      accumulates. The tank drops. What used to feel like purpose starts to feel like
      weight.


      The antidote isn''t to care less. It''s to build time where your nervous system
      gets to stop mirroring.


      This week''s exercise: block one hour where you are explicitly not available
      to help anyone. Not a guilty secret hour. A scheduled hour you tell people about.
      Turn off notifications. Don''t check in. Don''t be on call. Let that hour be
      a data point about what it feels like to not be in service mode.


      Notice what comes up. That''s useful information.

      '
    cta:
      text: Go deeper on the exercise
      url_template: '{base_url}/somatic_exercise_freebee_apps/app22_tonglen.html?unlock=1&cid={{contact_id}}'
  e3_story:
    delay_hours: 96
    subject: She gave everything. Then she forgot she was allowed to need things.
    preview_text: A nurse, twelve-hour shifts, and the day something shifted.
    body: 'Marlena had been an ICU nurse for nine years when she started having trouble
      sleeping.


      Not the kind of insomnia that comes from stress. The kind where she''d wake
      at 3am with a list of names running through her head. Patients. Family members
      she''d spoken to in waiting rooms. Her mother, who was three states away and
      getting slower on the phone.


      She told herself she was fine. She was good at her job. Her patients got excellent
      care. Her team trusted her. She was a person who handled things.


      At her annual physical, her doctor asked a routine question: "What do you do
      for yourself?" Marlena started listing things — she walked sometimes, she cooked
      on weekends — and then stopped. She realized she was describing things she used
      to do. She couldn''t remember the last time she had.


      She wasn''t someone who complained. That had always felt like a point of pride.
      But sitting in that exam room she recognized that she''d quietly moved herself
      off the list of people who were allowed to need things.


      She started small. She told one colleague the truth about how tired she was.
      She booked a weekend away — alone, which felt strange and then felt like water.


      She said later that the hardest part wasn''t being depleted. It was admitting
      it was real.

      '
    cta:
      text: More on that Thursday →
      url_template: null
  e4_offer:
    delay_hours: 144
    subject: A book for the people who take care of everyone else
    preview_text: What happens when the well is empty — and how to not get there.
    body: 'If you''ve been in any kind of sustained caregiving role — for patients,
      for family, for a team — you know that it doesn''t announce itself when you''re
      running low. You just keep going. Until the day you can''t quite remember why
      you started, or you snap at someone who didn''t deserve it, or you realize you
      haven''t felt genuinely rested in months.


      "Caring Until There''s Nothing Left" is a short, practical book for people in
      that territory. It''s part of the Empty Well Collection.


      It covers the specific patterns that drain people who are wired to help: the
      identity that''s built entirely around being useful, the discomfort of receiving
      care, the way caregivers learn to read everyone''s needs except their own.


      It''s not about stepping back from caregiving. It''s about understanding what''s
      happening when caring starts to cost more than it should — and what to do about
      it before the tank hits empty.


      It''s $0.99. Short enough to read in one sitting. You can start tonight.

      '
    cta:
      text: Get it for $0.99
      url_template: '{book_1_store_url}'
