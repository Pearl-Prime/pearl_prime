  e4_offer:
    delay_hours: 144
    subject: "A book for when earning more didn't make you feel more secure"
    preview_text: "Financial stress that doesn't respond to financial fixes needs a different tool."
    body: |
      Financial advice is built on the assumption that financial stress is a financial problem. More income, better budgeting, the right investment strategy — and the stress resolves.

      For a lot of people, that's true. For a lot of other people, the stress is still there after the income improves, the debt clears, the emergency fund lands. The stress was never really about the number.

      "Worth More Than Your Balance" is a short book for the second group. It's part of The Money Peace Series.

      It covers what happens when financial stress is operating as an inherited pattern rather than a response to current circumstances — and what it takes to update that pattern. The book is practical and clear. It doesn't require you to go deep into your past if you don't want to. It gives you enough to start distinguishing your actual financial situation from the story your stress keeps telling you about it.

      $0.99. Short. No financial jargon. Worth more than its price, which feels like an appropriate thing to say here.
    cta:
