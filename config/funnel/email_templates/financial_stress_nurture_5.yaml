    subject: "Your Financial Stress Audit is ready — answer prompt 1 right now"
    preview_text: "What is the first money memory you have?"
    body: |
      Your Financial Stress Audit is ready to download below.

      But before you even open the file, do the first prompt right now. Don't think about it too long. Just answer it.

      What is the first money memory you have?

      Not the first time you had a job or the first time you managed a budget. The earliest memory — a feeling, a moment, a scene. Maybe it's watching a parent stress over bills. Maybe it's being told "we can't afford that" in a way that had weight to it. Maybe it's something you watched without fully understanding at the time.

      Write one paragraph. Just get it down.

      Most financial stress doesn't start with your current account balance. It starts somewhere earlier — a set of early observations that became a framework you've been running on ever since. The audit is built to help you map that framework so you can see it clearly instead of just feeling it.

      You can't revise a map you can't see. That first memory is the starting point.

      Write the paragraph. Then download the audit and keep going from there.
    cta:
      text: "Download The Financial Stress Audit"
      url_template: "{base_url}/free/financial-stress-audit/"

  e2_mechanism:
    delay_hours: 24
    subject: "The story your financial stress is telling — and how to test it"
    preview_text: "One counter-fact can crack the whole narrative open."
    body: |
      Here's the thing about financial stress: it narrates. It doesn't just make you feel bad — it tells you a story about why you feel bad, and the story usually sounds very convincing.

      "I'll never get ahead." "I always end up back at zero." "No matter what I do, something comes up." "Other people can do this. I can't."

      The narrative runs separately from your actual financial situation. It can persist when things are stable. It can ramp up even when nothing has changed. That's the sign you're not dealing with a financial problem — you're dealing with a story that has become very good at looking like one.

      The way to test a story is to challenge one part of it.

      This week's exercise: take your worst-case financial narrative — the one you wrote down in the audit — and write one counter-fact. One true thing that contradicts a piece of it. Not a positive affirmation. A factual statement. "The story says I always end up at zero, but three years ago I paid off X." "The story says I can't manage money, but I have been paying this bill on time for Y months."

      One fact. That's it. You're not trying to talk yourself out of the stress. You're just introducing a piece of data the narrative left out.
    cta:
      text: "Try the counter-fact exercise"
      url_template: "{base_url}/free/financial-stress-audit/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "He kept earning more. He still felt broke."
    preview_text: "The number went up. The stress didn't."
    body: |
      Marcus had been running his consulting business for six years. The revenue grew every year. He had clients, he had systems, he had a reputation in his field.

      He also felt, most of the time, like he was one slow quarter from everything falling apart.

      He'd grown up in a household where money was tight and unpredictable — his parents ran a small business, and the income swung. Good months felt temporary. Bad months felt permanent. He learned early that financial stability was something you couldn't trust, that the floor could drop at any moment.

      As an adult, he ran that same operating system. The slow quarters were stressful — understandably. But so were the good quarters. There was always something to brace for.

      He didn't trace any of this to his childhood for a long time. He thought of himself as a realistic businessperson who understood risk. He wasn't wrong about the risk — the stress was just calibrated to a world that no longer existed, to a specific experience of scarcity that had been accurate when he was nine years old and completely unverifiable against his current situation.

      He started asking a different question: not "what could go wrong" but "what was the original source of this particular dread?" It took a few months. It didn't dissolve the stress. But it gave him somewhere to put it that wasn't his business.
