  e4_offer:
    delay_hours: 144
    subject: "A book about loss — if you're ready for it"
    preview_text: "No timelines, no stages. Just an honest look at what missing someone actually feels like."
    body: |
      There's no right time to read a book about grief. If you've opened this email, you get to decide whether now is a time that might be useful.

      "The Shape of Missing" is a short book about what it's actually like to carry a significant loss — the non-linear nature of it, the way it shifts over time without ever fully resolving, the moments when it catches you sideways, the specific weight of a grief that has no witnesses.

      It's part of the Still Standing Series.

      This book doesn't offer stages or timelines. It doesn't tell you how grief should go or when it should ease. It's written for people who are past the acute part and still navigating the long, quieter stretch — when life has resumed around the loss and yet the loss is still fully present.

      If that's where you are, it might be useful company. If now isn't the right time, that's fine too. It will be there.

      $0.99. Short. Written with care for how fragile this particular territory is.
