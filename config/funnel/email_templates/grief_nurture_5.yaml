  e2_mechanism:
    delay_hours: 24
    subject: "If you laughed this week — that's not a betrayal"
    preview_text: "It's proof you're still here. They'd know the difference."
    body: |
      A lot of people who are grieving describe a particular kind of guilt that catches them off guard: the guilt of laughing.

      Something funny happens. A friend says something ridiculous. A memory surfaces that used to make you and the person you lost both crack up. And you laugh — genuinely, for a second — and then you feel terrible about it.

      As if laughing means you've forgotten. As if being briefly okay means you didn't love them enough, or aren't taking this seriously, or have moved on in some way that isn't allowed yet.

      The guilt is real, even when the logic underneath it doesn't hold. Laughing while grieving is not a contradiction. It's evidence that you're still fully human, that the parts of you that respond to joy haven't switched off along with everything else. The person you lost — the actual person, who knew you — would recognize the laugh. They'd probably be glad it's still in you.

      Here's a small exercise, entirely optional, only if it feels right: write one thing that happened this week that they would have laughed at. Not because you have to. Just because keeping that conversation alive, even in writing, even privately, is one way of holding them without being crushed by the holding.

      One thing. Even if it makes you cry while you write it.
    cta:
      text: "A few more thoughts on this"
      url_template: "{base_url}/free/letter-you-didnt-get-to-send/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "She carried it alone for two years. Then she found words."
    preview_text: "Not a recovery story. Just a story about the weight shifting slightly."
    body: |
      Nadia lost her mother when she was 31. Her mother had been sick for a while, which everyone told her meant she was prepared. She was not prepared.

      In the months after, she functioned. She went back to work. She answered messages. She said "I'm doing okay" enough times that she started to believe it was true. She was good at managing — it was something her mother had admired in her, actually. She kept managing.

      She didn't talk about it much. Not because she didn't want to, but because she couldn't locate the words that felt true. "She was my best friend" was accurate but inadequate. "I miss her every day" was accurate and also meaningless in its genericness. She had no language for the specific texture of this particular loss — her mother's specific laugh, the particular silence of not being able to call her on the drive home from work.

      A year and a half after the funeral, she wrote a letter. Not to anyone. Just into a notebook, to her mother, describing a Wednesday in November.

      She didn't feel better afterward. But she felt less alone. As if the grief had gone from a wordless pressure inside her chest to something that had a shape she could look at.

      It didn't resolve. The missing didn't stop. But it became something she was carrying in her hands rather than something she was buried under.
    cta:
      text: "More on that Thursday →"
