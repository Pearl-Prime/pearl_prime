    subject: "Your letter template is ready — write the first sentence only"
    preview_text: "Just the first sentence. That's enough for today."
    body: |
      The letter template is ready to download. The link is below.

      When you open it, you'll find prompts to help you start. Some of them you may want to use. Some may not fit. Take what's useful and leave the rest.

      But here is the only instruction for today: write the first sentence.

      Not the whole letter. Not a complete thought. Just the first sentence of something you'd say to the person you lost, if you still had the chance to say it.

      You might know immediately what that sentence is. You might sit with it for a while before it arrives. You might write something and cross it out and try again. All of that is fine.

      Some people find that the first sentence is easy and everything after it is hard. Some people find that just the act of beginning — putting the name of that person at the top of a page — is the thing that takes all the courage.

      Wherever you are with it, one sentence is enough. You don't have to finish the letter today. You don't have to finish it at all. The template is just a starting place, not a task to complete.

      Take your time. Download it when you're ready.
