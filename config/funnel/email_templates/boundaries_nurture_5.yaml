  e2_mechanism:
    delay_hours: 24
    subject: "Why saying no makes your body panic"
    preview_text: "It's not rudeness. It's a very old protection."
    body: |
      Most people who struggle to say no don't struggle because they're too nice. They struggle because no was, at some point, actually dangerous.

      Not dramatically dangerous — but dangerous enough. A child who learns that saying no leads to withdrawal, anger, punishment, or being labeled difficult builds a rule: keep the peace, stay agreeable, don't risk the relationship. That rule gets stored not as a thought but as a reflex. By adulthood, it fires automatically — long after the original environment is gone.

      When you try to say no now, your body is running that old program. The panic in your chest, the sudden need to over-explain, the compulsion to soften the word until it barely means anything — those are the rule activating. They're not about the current situation. They're about the one where the rule was written.

      Here's a small practice: stand in front of a mirror and say, "I can't do that." Watch your face. Notice what happens in your body. Don't try to look calm — just observe.

      Most people are surprised by how much happens in response to those four words. That's the signal you're working with. It needs to know the current environment is different before it'll stop firing.
    cta:
      text: "Try this now"
      url_template: "{base_url}/free/boundary-script-kit/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "She said yes to everything until she had nothing left"
    preview_text: "And the moment she finally said no"
    body: |
      Fatima was a department lead, a mother of two, and the person in her extended family who handled things when things needed handling. She had become indispensable through a kind of compound interest — each yes made the next one easier to request.

      She didn't think of herself as someone without limits. She thought of herself as capable. The word "no" just kept not coming out.

      The moment she finally said it was unremarkable from the outside. Her sister asked her to plan a family event — the third in six months — and Fatima said, "I can't do it this time." No explanation. No softening. She was genuinely surprised the words came out.

      What surprised her more was what happened next: silence on the phone, a quick "oh, okay," and then the conversation moved on. The thing she'd been bracing for — the withdrawal, the disappointment, the rupture — didn't materialize. Or it did, briefly, and then it passed.

      She described the next few days as strange. She kept waiting for consequences that didn't arrive. And slowly, the waiting itself started to quiet down.

      She didn't become someone who said no easily after that. But she had a reference point. Evidence that the rule was old and that the world had changed around it.
