    subject: Your Money Check-In is ready — write this down before you open it
    preview_text: What's the worst-case scenario your money anxiety runs most often?
    body: 'Your Money Check-In is ready to download. Link is below.


      Before you open it, do this first.


      Take a piece of paper — not a notes app, actual paper if you have it — and write
      down the worst-case money scenario that plays in your head most often. The specific
      one. Not a vague sense of dread, but the actual story your mind runs.


      Is it: "I''ll run out of money and won''t be able to pay rent." Is it: "I''ll
      never be financially stable no matter how much I earn." Is it: "Something will
      go wrong and I''ll lose everything I''ve built." Is it something else entirely.


      Write it in one or two sentences. Be specific.


      You''re not doing this to solve it. You''re doing it to name it. Financial anxiety
      is remarkably good at staying shapeless — a persistent hum in the background
      that colors every money decision you make without ever stating its case clearly.
      Getting it into a sentence on paper is the first step toward being able to examine
      it rather than just live inside it.


      Write the scenario. Then download the check-in. The first section will ask you
      to revisit what you wrote.

      '
    cta:
      text: Download The Money Check-In
      url_template: '{base_url}/free/financial-anxiety-check-in/'
  e2_mechanism:
    delay_hours: 24
    subject: Your anxiety about money isn't a financial analysis — it's something
      older
    preview_text: The numbers can be fine. The feeling doesn't care.
    body: 'Here''s something that surprises a lot of people: financial anxiety doesn''t
      run on your actual financial situation.


      It runs on a story. And the story is usually much older than your current bank
      balance.


      You might be earning well. You might have savings. You might, by any reasonable
      measure, be in a solid financial position. And still feel a low-grade dread
      when you check your account, still avoid looking at your statements, still feel
      like you''re one bad month away from something terrible.


      That gap — between what the numbers say and what the feeling says — is the signal.
      It tells you the anxiety isn''t a response to your finances. It''s a response
      to something you learned a long time ago about what money means, what losing
      it means, what not having enough means about you.


      The exercise for this week: trace the belief back. Finish this sentence in writing:
      "I learned that money was _____ when I was around _____ years old, because _____."


      You might write more than one version. You might find a memory you haven''t
      thought about in years. You might draw a blank and then have something surface
      at 2am. That''s fine. You''re not solving anything. You''re just locating the
      source of the story so you can stop mistaking it for current fact.

      '
    cta:
      text: Go deeper on the trace exercise
      url_template: '{base_url}/somatic_exercise_freebee_apps/ex04_extended_exhale.html?unlock=1&cid={{contact_id}}'
  e3_story:
    delay_hours: 96
    subject: She made six figures and checked her account eight times a day
    preview_text: The number in her account kept growing. The fear didn't.
    body: 'Daniela was a senior engineer at a tech company. She''d negotiated a strong
      salary. She had a 401k, an emergency fund that actually had money in it, and
      no credit card debt.


      She also checked her bank account between eight and twelve times a day.


      Not to manage anything. Not because anything was wrong. Just to confirm, again,
      that the number was still there. That the floor hadn''t dropped out.


      She knew it didn''t make logical sense. She''d done the math. She was fine.
      But fine and feeling fine were completely different things, and no amount of
      spreadsheet work closed the gap.


      She talked about it with a friend who asked a question she hadn''t expected:
      "When did you first feel that way about money? Not recently — earlier." Daniela
      thought about it for a long time. She came back to her family''s financial situation
      when she was about nine, to the specific tension that lived in her house around
      bills, to the way her mother would go quiet when the mail came.


      She hadn''t made that connection before. She''d been treating the anxiety as
      information about her present situation. It wasn''t. It was a map drawn in 1998
      that she''d never stopped using.


      She didn''t stop checking her account immediately. But she started noticing
      when the urge hit — and asking what story was running.

      '
    cta:
      text: More on that Thursday →
      url_template: null
  e4_offer:
    delay_hours: 144
    subject: A book for when the numbers are fine but the fear isn't
    preview_text: What's underneath financial anxiety — and what to do with it.
    body: 'If you''ve ever done everything "right" financially and still felt like
      you were one bad month from catastrophe, this book is written for that experience.


      "The Money Knot" is a short book about the emotional layer underneath financial
      anxiety — the beliefs, the inherited stories, the relationship between money
      and safety that most of us developed before we had any control over our circumstances.


      It''s part of the Worth Beyond Balance Collection.


      The book doesn''t replace financial planning. It addresses what financial planning
      can''t reach: the part of your nervous system that''s still running a script
      that has nothing to do with your current situation.


      It covers why the anxiety persists even when the numbers improve, how to locate
      the story underneath the dread, and what it looks like to update a belief that
      was formed in childhood and carried into adulthood without revision.


      $0.99. Concise. No jargon. Written for people who are smart enough to know their
      fear isn''t rational — and frustrated that knowing that doesn''t make it go
      away.

      '
    cta:
      text: Get it for $0.99
