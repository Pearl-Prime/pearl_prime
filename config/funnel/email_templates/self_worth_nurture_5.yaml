  e2_mechanism:
    delay_hours: 24
    subject: "The comparison trap — and how to step out"
    preview_text: "It's not a character flaw. It's a habit."
    body: |
      Comparison is automatic. Your brain is running social calculations constantly — where you rank, how you measure up, whether you're falling behind. This isn't a flaw in your character. It's a very old function that evolved to help you stay in the group and keep pace with threats.

      The problem is that the comparison mechanism doesn't know the difference between a relevant benchmark and an irrelevant one. It will compare your salary to your colleague's, your body to a stranger's on a screen, your relationship to someone else's highlight reel. It assigns all of them the same weight, which means you're constantly losing races you didn't enter.

      Knowing this doesn't stop the comparisons. But it creates a gap between the thought and the response.

      Here's one practice to try today: catch one comparison thought. Just one. It might be about someone else's success, their appearance, the life they seem to have. When you catch it, name it — "there's a comparison" — and let it pass without adding a verdict about what it means about you.

      You don't need to argue with it. Just don't hand it the gavel.
    cta:
      text: "Try this now"
      url_template: "{base_url}/free/worth-inventory/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "She achieved everything and still felt like nothing"
    preview_text: "The promotion didn't fix it. Here's what did."
    body: |
      Priya had the title, the apartment, the relationship. She'd been promoted twice in three years at a firm she'd worked very hard to get into. By her own accounting, she had everything she'd told herself she needed.

      She also felt, most days, like she was one mistake away from being found out.

      The promotion didn't touch it. Neither did the good performance review that followed, or the recognition from her manager at the all-hands. Each win would land for maybe 48 hours and then the baseline returned — slightly elevated vigilance, a low-grade sense that the ground wasn't fully solid.

      She started noticing that her sense of worth had become entirely conditional. It spiked with external signals and drained in the absence of them. There was no internal reservoir — just a constant cycle of earning and losing.

      She couldn't point to a single moment when things shifted. It was more gradual than that. She started paying attention to what felt solid inside a day that had nothing remarkable in it — not a win, not recognition, just an ordinary Tuesday. There were things there. Small ones. They'd just been invisible next to the bigger signals.

      She didn't stop caring about her work. She just stopped needing it to tell her who she was.
    cta:
      text: "More on that Thursday →"
