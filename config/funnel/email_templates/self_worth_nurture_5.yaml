    body: |
      The book is called "Worthy Without Proof" and it's $0.99.

      It has 12 chapters — each one targeting a specific layer of the worth pattern. Chapter 1 is about the conditional worth cycle: how you build a sense of value that depends entirely on external inputs. Chapter 4 covers the comparison mechanism from Email 2 in much more depth. Chapter 7 is specifically for the pattern where accomplishment stops landing — where you achieve something and feel nothing.

      Chapter 10 is about the body component: what low worth feels like physically and why that matters for changing the pattern. Chapter 12 is the integration piece — what it looks like when worth stops being something you earn.

      The book takes about 35 minutes to read. It's not a program with steps to complete. It's a set of lenses — ways of seeing the pattern more clearly so you can start working with it instead of running from it.

