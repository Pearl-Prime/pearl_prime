    subject: "Your Worth Inventory is ready"
    preview_text: "Do this before the day starts"
    body: |
      Your Worth Inventory is ready — link below.

      Before you dive in, one exercise to try right now. It's simple and it's probably harder than it sounds.

      Write down three things about yourself that have nothing to do with what you produce.

      Not "I'm good at my job." Not "I worked hard this week." Not anything that requires an output, an outcome, or someone else's approval. Three things that would still be true about you if you stopped performing entirely.

      Most people stall on this. Not because there's nothing there — but because the muscle for recognizing non-productive value has been underused for a long time. We get very good at tracking output. We don't get much practice tracking existence.

      The Inventory helps with this. It's structured to surface the patterns you've built around worth — where you feel it, what triggers the loss of it, what you've been chasing in its place.

      Download it below and try to give it your first twenty minutes before the day's noise takes over.
