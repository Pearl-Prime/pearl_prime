    subject: "Your Evidence Log is ready — fill 3 rows"
    preview_text: "The imposter voice doesn't have a rebuttal to a list"
    body: |
      Your Evidence Log is ready — link below.

      Before you get into it, one instruction: write down one thing you actually know how to do.

      Not "I'm decent at" — something you genuinely know. No caveats. No "but I'm still learning" or "compared to some people." A thing you have learned, practiced, and can do. It could be technical, interpersonal, creative, logistical — doesn't matter. Just one thing, stated plainly.

      The imposter voice thrives on vagueness. It likes abstract self-assessments because they're harder to argue with. "I don't really belong here" is difficult to disprove because it's not specific enough to test. A concrete list of what you actually know is harder to dismiss.

      That's the logic behind the Evidence Log. It's not a pep talk. It's a record — something you can look at when the voice is loud and has nothing factual to stand on.

      Download it below and fill at least three rows before the end of the day.
    cta:
      text: "Open your Evidence Log"
