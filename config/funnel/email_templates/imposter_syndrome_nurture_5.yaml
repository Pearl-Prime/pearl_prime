  e2_mechanism:
    delay_hours: 24
    subject: "Why the imposter voice gets louder when you're succeeding"
    preview_text: "It's protecting you from a fall that probably won't happen"
    body: |
      Here's something counterintuitive: the imposter voice doesn't get quieter as you succeed. For most people, it gets louder. A promotion, a new role, a bigger audience, a significant responsibility — and suddenly the voice is more insistent than it's been in years.

      This isn't random. The voice is running a risk calculation. The higher the stakes, the further the potential fall. And falling — being exposed, being wrong, losing the room — is what it's trying to prevent.

      It's not evidence of incompetence. It's evidence that something matters to you and your threat system is on alert.

      Here's an observation practice to try this week: notice when the voice fires and what triggered it. Not what it says — that part's less interesting. What preceded it. Was it before a meeting? After getting positive feedback? When you were about to take on something new?

      Most people find the trigger pattern is consistent. Once you see it, you can separate the voice from the situation — and start treating it as a data point about your nervous system rather than a verdict about your qualifications.
    cta:
      text: "Try this now"
      url_template: "{base_url}/free/evidence-log/#exercise2"

  e3_story:
    delay_hours: 96
    subject: "She was promoted twice and still waited to be 'figured out'"
    preview_text: "Here's what actually changed the pattern"
    body: |
      Ren was a senior analyst at a fintech company. She'd been there four years, had strong reviews, and had been promoted twice. She also kept a mental list of everything she didn't know and quietly believed that anyone paying close enough attention would eventually land on the obvious conclusion: she was in over her head.

      She didn't talk about this. It was too embarrassing. People came to her with questions and she answered them. She gave presentations and they went well. The gap between her visible performance and her internal experience was something she managed alone.

      What she noticed eventually was that the voice had never once been right. Not in a provable way. No one had ever "figured her out." The thing she'd been bracing for for four years hadn't happened.

      She started keeping track — not to celebrate herself, just to test the voice. Was the dread ever accurate? In twelve months of paying attention, it wasn't. Not once.

      She didn't become suddenly confident. The voice didn't disappear. But it started to feel more like noise than signal. Something that fired automatically rather than something worth acting on.

      She stopped reorganizing her life around a risk that had never materialized.
