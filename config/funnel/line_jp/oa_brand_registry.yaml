# ===========================================================================
# Routing — friend-add → brand assignment (primary 12-OA model)
# ===========================================================================
routing_primary:
  description: "Each OA is brand-pure — friend-add metadata only confirms entry-point analytics. No cross-brand routing decision needed."
  primary_signal: oa_channel_id                  # the channel the user added IS the brand
  attribution: utm_source / utm_medium / utm_campaign on entry-point URL

# ===========================================================================
# Routing — friend-add → hub + brand assignment (fallback hybrid model)
# ===========================================================================
routing_fallback:
  primary_signal: entry_point_metadata           # ad / QR / referral source
  fallback_signal: liff_quiz_postback_data       # if user takes the LIFF quiz, brand affinity is captured
  hub_default_signal: rich_menu_first_tap        # if neither, infer from first rich-menu tap

# ===========================================================================
# Cross-brand handoff (primary model)
# ===========================================================================
# A reader on 静心社 may show 直見堂 interest. Soft consent recommendation only:
# m6b_cross_sell can include a single rich message suggesting another brand's
# add-friend QR. Do NOT auto-share userId across OAs (LINE OA TOS prohibits
# without explicit consent).
cross_brand_handoff:
  trigger: m6b_cross_sell
  mechanism: rich_message_with_brand_oa_friend_add_qr
  consent_required: true
  attribution_carryover: utm_source=line_oa_${source_brand}
