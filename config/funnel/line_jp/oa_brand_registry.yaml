# ===========================================================================
# Cost budget — primary 12-OA model
# ===========================================================================
cost_budget_jpy_per_month:
  primary_model:
    description: "12 brands × LINE OA Standard tier"
    monthly_combined_floor: 180000              # research §1 cites Standard ~¥15k/OA
    sticker_set_one_time_per_brand: 6400        # 12 × ¥6,400 = ¥76,800 launch
    sticker_set_total_one_time: 76800
    notes: |
      Standard tier required (per research §1) for any brand with ≥3 broadcast
      messages/week. Light tier (¥5k/mo) is too constrained — caps broadcast at
      ~15k/mo per OA, which is hit quickly once a brand's friend list grows past
      ~5k. Standard tier offers expanded quota and is the working assumption.
      Premium / Pro tiers exist for very high-volume; not needed at launch.
  fallback_model:
    description: "3 hub OAs × Standard tier (only if 12-OA budget unavailable)"
    monthly_combined_floor: 45000
    sticker_set_one_time_per_hub: 6400
    sticker_set_total_one_time: 19200
    cost_savings_vs_primary: 0.75
    rationale_loss: |
      75% cost saving. Costs: brand voice fidelity (per-brand variants required in
      messages.ja_JP.yaml; reader sees one OA persona, not 12); friend-list pooling
      (cross-brand intent-segmentation harder); rich-menu real estate (1 menu serving
      4–5 brands' tools). Acceptable bridge; not the recommended end state.

# ===========================================================================
# FALLBACK MODEL — Hybrid 3-hub (kept for reference + degraded-launch path)
# ===========================================================================
# Brands' `fallback_hub` field above maps each brand to a hub. Use this section
# only if launching in fallback mode.
fallback_hubs:
  - hub_id: iyashikei
    oa_display_name_ja: "やわらぐ毎日"
    oa_display_name_en: "Yawaragu Mainichi"
    oa_bio_variant_default: bio_v3_quiet
    rich_menu_id: rich_menu_iyashikei_v1
    line_oa_tier_target: standard
    primary_topics: [sleep, somatic, burnout_recovery, grief]
    member_brands: [stillness_press, somatic_wisdom, body_memory, sleep_restoration, relational_calm]

  - hub_id: cognitive
    oa_display_name_ja: "あたまの整え方"
    oa_display_name_en: "Atama no Totonoekata"
    oa_bio_variant_default: bio_v2_direct
    rich_menu_id: rich_menu_cognitive_v1
    line_oa_tier_target: standard
