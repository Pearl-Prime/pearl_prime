# Recommendation flipped from hybrid 3-hub to per-brand 12-OA after Pearl_Research review
# (artifacts/research/japan_line_freebie_funnel_market_research_2026-04-29.md §7.5).
# Reasons: per-brand voice integrity, narrower friend-add CPA, 12-list throttling hedge,
# rich-menu real estate per brand. Cost floor ~¥180k/mo combined at Standard tier.
#
# Authority: docs/JAPAN_LINE_FREEBIE_FUNNEL_PLAN_2026-04-29.md §6
# Brand source of truth: config/catalog_planning/locale_brand_names.yaml
# Topic source of truth:  config/catalog/market_catalog_registry.yaml (japan)

