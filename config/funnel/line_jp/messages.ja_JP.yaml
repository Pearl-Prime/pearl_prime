oa_bio_variants:
  - id: bio_v1_warm
    text: "忙しい毎日に、ふっと息を整える小さな習慣を、すこしずつお届けします。"
  - id: bio_v2_direct
    text: "考えすぎる頭をほどく、短いワークを毎日ひとつ。読むより、試すLINEです。"
  - id: bio_v3_quiet
    text: "騒がしい一日のなかに、すこしの静けさを置いていく場所です。"
  - id: bio_v4_practical
    text: "整えるための具体的な手順を、1メッセージにひとつだけ。余計な情報は送りません。"
  - id: bio_v5_inviting
    text: "よければ友だちに。夜の自分に味方をひとつ増やす、ささやかな招待状です。"
