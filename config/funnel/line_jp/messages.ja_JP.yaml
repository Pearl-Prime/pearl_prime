schema_version: 1
locale: ja_JP
generated: "2026-04-29"
authority: docs/JAPAN_LINE_FREEBIE_FUNNEL_PLAN_2026-04-29.md
register_notes: |
  ネイティブ日本語で書き起こしたLINE OAコピー。翻訳調を排し、整える習慣・Diamond 1分間シリーズ・サンマーク社のウェルネス系LINE OAを参考にした、温度感のあるです・ます調。
  医療的断定（治る／効きます／必ず）は使わず、「整える／ととのう／やわらげる／楽になる」のレジスターに揃える。
  段落は2〜3行で改行し、壁打ち感を避ける。CTAは12字以内。リンクや画像はLINE側で差し込むため本文にURLは入れない。
  3つのハブ（iyashikei／cognitive／transformation）に共通文をまとめ、12ブランドはvoice tintで上書きする構成。

# ───────────────────────────────────────────────────────────────────────
# Hub-level shared messages
# ───────────────────────────────────────────────────────────────────────
hubs:

  # ─── iyashikei hub ───
  # 静心社 / 体知社 / 体記堂 / 夜の設計社 / 素形堂
  iyashikei:
    welcome_day_0: |
      友だち追加、ありがとうございます。
      ここでは、忙しい日々のあいだに「ふっと一息つく」ための小さな習慣を、すこしずつお届けしていきますね。

      さっそく、今日のひとつめ。
      椅子に座ったまま、足の裏を床にぺたっとつけてみてください。
      そのまま、ゆっくり3回だけ呼吸する。──ただ、それだけです。

      お腹のあたりに、ほんのすこし「重さ」が戻ってくる感じがしたら、今日はもう十分。
      明日も、別のかたちでお会いしましょう。
      # (suggest sticker: gentle bow)
      [CTA: 受け取る]

    exercise_2_day_1: |
      昨日はおつかれさまでした。
      今日のひとつは、「目」を休ませるワークです。

      手のひらをこすって、すこしあたためたら、そっと両目にあててみてください。
      30秒ほど、暗いあたたかさのなかで呼吸する。
      画面を見つめつづけた目に、これだけで体感が変わるはずです。
      # (suggest sticker: warm hands)

    story_day_3: |
      先日、ある読者の方からこんなお便りをいただきました。

      「夜、布団に入ってからも頭のなかの会議が止まらなくて、ずっと眠れずにいました。
      でもある晩、足の裏を意識しながら3回呼吸するだけ、というのを試してみたんです。」

      「気がついたら朝でした。劇的なことは、なにも起きていない。ただ、ひさしぶりに『朝が来た』という感覚があったんです。」

      派手な変化ではなくて、こういう小さな“戻ってきた感じ”を、私たちは大切にしたいと思っています。
      あなたの体にも、きっと似た瞬間があったはずです。

    soft_pitch_day_7: |
      この一週間、いくつかの小さなワークをご一緒してきましたね。
      もし「もうすこし深く、自分のペースで取り組んでみたい」と感じてくださっていたら、ひとつご紹介させてください。

      これまでお届けしてきた呼吸や身体感覚のワークを、章ごとにじっくりまとめた一冊があります。
      LINEでは扱いきれない、夜の習慣や週末のリセットまで含めたものです。
      よければ、ためし読みからどうぞ。
      [link card: book preview]
      [CTA: ためし読み]

    hard_pitch_day_14: |
      ここまで読んでくださって、ありがとうございます。

      今週末まで、LINE友だちのみなさんに、書籍の特別クーポンをお渡ししています。
      書店ではなかなか出ない割引なので、もし気になっていたら、このタイミングで手元に置いていただけたらうれしいです。

      無理にすすめるものではありません。
      ただ、夜の自分にひとつ味方が増える、くらいの気持ちで選んでみてください。
      [link card: coupon redeem]
      [CTA: クーポンを使う]

    post_purchase_thanks: |
      ご購入ありがとうございます。
      この本が、あなたの一日のどこかに、ちいさな“間”をつくれますように。

      読みおえた頃、もしよければ、ひとことだけ感想を聞かせてください。
      同じように疲れている誰かに、いちばん届くのはあなたの言葉です。
      # (suggest sticker: bow / thank you)
      [CTA: 感想を送る]

    cross_sell_day_21: |
      最近の読み心地はいかがですか。

      もしあの本が、あなたの夜にすっと入ってきていたなら、隣に置きたくなりそうな本を3冊だけ並べてみました。
      朝のリセット、週末のゆるめ方、そして眠りそのものを整える一冊。
      気になるものを、ひとつだけ選ぶつもりで覗いてみてください。
      [link card: carousel — morning / weekend / sleep]
      [CTA: 3冊を見る]

    re_engage_day_60: |
      ごぶさたしています。
      季節がすこし変わって、肩のあたりが冷えやすくなる頃ですね。

      今日はひとつだけ、短いワークを置いていきます。
      湯船でも椅子の上でもいいので、両肩をぐっと上げて、ストンと落とす。3回くりかえしてみてください。
      ──またお会いできたらうれしいです。

    block_confirmation: |
      LINEの上のメニューから、いつでもブロックしていただいて大丈夫です。
      無理に続けていただくものではないので、合わないと感じたときは、どうぞ気軽にどうぞ。

      また気が向いたとき、戻ってきていただけたらうれしいです。

  # ─── cognitive hub ───
  # 直見堂 / 今此処社 / 羽と秤社 / 氣根社
  cognitive:
    welcome_day_0: |
      友だち追加、ありがとうございます。
      ここでは「考えすぎる頭をすこし休ませる」ためのワークを、短くお届けしていきます。

      さっそく今日のひとつ。
      手元のものをひとつ選んで、そのかたち・色・温度を、5秒だけ言葉にしてみてください。
      声に出さなくても大丈夫です。

      頭のおしゃべりが止まらないとき、感覚に戻る入口は、いつもこのくらいシンプルです。
      [CTA: 受け取る]

    exercise_2_day_1: |
      今日のは「ラベルを貼って手放す」ワークです。
      いま頭に浮かんでいる考えに、「計画」「心配」「思い出」などの一語をつけてみてください。

      ラベルを貼ったら、それ以上は追いかけない。
      たいていの思考は、名前をつけられただけで、すこし軽くなります。

    story_day_3: |
      先週、ひとりの読者の方からこんな話をうかがいました。

      「会議のまえに頭がぐるぐる回って、心臓まで重くなる癖がありました。
      ある日、ノートに『これは“予行演習”という思考』とだけ書いてみたんです。」

      「不思議なことに、書き終えたあとは、本当の会議のほうが軽く感じられました。
      なくなったわけじゃない。でも、自分と少しだけ距離ができた感じがしたんです。」

      考えが消えるのを待つより、ひとつ名前をつけて置いておく。
      それくらいの距離のとり方が、いちばん体に馴染みます。

    soft_pitch_day_7: |
      この一週間、頭の中を整理するための小さな手順をいくつかお渡ししました。
      もし「もうすこし体系立てて学びたい」と思ってくださっていたら、一冊だけご紹介させてください。

      LINEで送った“ラベル貼り”や“思考に距離をとる”話を、もっと丁寧にひとつずつ追いかけた本です。
      気軽にためし読みからどうぞ。
      [link card: book preview]
      [CTA: ためし読み]

    hard_pitch_day_14: |
      ここまでお付き合いくださって、ありがとうございます。

      LINE友だち限定で、書籍のクーポンをお渡ししています。期限は今週末まで。
      頭の中を整える道具を、机の上に1冊置いておく。──そういう使い方を想定して書かれた本です。

      合うかどうかは、ためし読みでまず確かめてみてください。
      [link card: coupon redeem]
      [CTA: クーポンを使う]

    post_purchase_thanks: |
      ご購入ありがとうございます。
      考えすぎる夜に、すこし手数を減らしてくれる相棒になりますように。

      読みおえたら、ぜひひとこと感想を聞かせてください。
      似た悩みのある誰かにとって、あなたの一行がいちばんのヒントになります。
      [CTA: 感想を送る]

    cross_sell_day_21: |
      読み心地はいかがでしたか。

      頭の使い方を整える本を、あの一冊の隣に置きたくなりそうな順番で3冊並べました。
      意思決定、集中、そして「やめる」技術──気になるものから、軽く覗いてみてください。
      [link card: carousel — decide / focus / unhook]
      [CTA: 3冊を見る]

    re_engage_day_60: |
      ごぶさたしています。
      季節の変わり目は、頭のなかも忙しくなりがちですね。

      今日はひとつだけ。
      いま気になっていることに、一語だけラベルを貼ってみてください。
      ──それだけで、今日の自分にすこし余白が戻ります。

    block_confirmation: |
      LINEのメニューから、いつでもブロックしていただいて構いません。
      合わないと感じる時間に、無理に居ていただくつもりはありません。

      気が向いたら、また戻ってきてくださいね。

  # ─── transformation hub ───
  # 鉄門社 / 燼と灰社 / 開器社
  transformation:
    welcome_day_0: |
      友だち追加、ありがとうございます。
      ここでは「立て直す」ための短いワークを、毎回ひとつだけお届けします。

      さっそく今日のひとつ。
      両足を肩幅に開いて、息をゆっくり吸いながら背骨をまっすぐ伸ばす。
      吐きながら、肩の力だけストンと抜く。──これを3回。

      派手なリセットではありません。
      でも、自分の軸がここにある、という感覚が戻ってきたなら、今日はもう十分です。
      # (suggest sticker: standing tall)
      [CTA: 受け取る]

    exercise_2_day_1: |
      今日のは「火を絞る」ワークです。
      胸のあたりに、いま燃えているものをイメージしてください。怒りでも焦りでも構いません。

      その火を消そうとせず、炎の高さを「指1本分だけ低くする」と決めて、ゆっくり吐いてみる。
      手放すのではなく、扱うほうへ。──体の使い方が、すこし変わります。

    story_day_3: |
      ある読者の方が、こんな話を送ってくださいました。

      「仕事の修羅場が続いて、家では家族にあたり、夜は眠れない。そんな時期がありました。
      ある朝、玄関の鏡のまえで、ただ一度だけ深く呼吸して家を出る、というのを始めたんです。」

      「3週間ほどで、何かが大きく変わったわけじゃありません。
      でも、夜になっても“まだ自分のターン”が残っている、という感覚が戻ってきました。」

      崩れたあとに立て直すのは、大きなジャンプより、こういう一歩のくり返しです。
      あなたの一歩は、もうじゅうぶんに始まっています。

    soft_pitch_day_7: |
      この一週間、立て直すための短いワークをいくつかご一緒しました。
      もし「もう一段、自分に必要な順番でやりたい」と思っていたら、一冊だけご紹介させてください。

      朝・昼・夜のリズムごとに、何をどの順で立て直すかをまとめた本です。
      まずは、ためし読みから覗いてみてください。
      [link card: book preview]
      [CTA: ためし読み]

    hard_pitch_day_14: |
      ここまで読んでくださって、ありがとうございます。

      LINE友だち限定で、書籍のクーポンを今週末までお渡ししています。
      派手な変化を約束する本ではありませんが、毎日の地ならしを助けてくれる一冊です。

      自分の軸を、机の上に1冊置く。──そんなイメージで選んでもらえたらうれしいです。
      [link card: coupon redeem]
      [CTA: クーポンを使う]

    post_purchase_thanks: |
      ご購入ありがとうございます。
      きょうから一冊、あなたのとなりに味方が増えます。

      読みおえたら、ひとことでも感想を送っていただけたらうれしいです。
      同じ場所で立て直そうとしている誰かに、その言葉が届きます。
      [CTA: 感想を送る]

    cross_sell_day_21: |
      最近の調子はいかがですか。

      あの一冊の隣に置くつもりで、3冊並べました。
      朝の立ち上がり、感情の扱い方、そして長い回復のつくり方──気になるものを、ひとつだけ。
      [link card: carousel — morning / emotion / recovery]
      [CTA: 3冊を見る]

    re_engage_day_60: |
      ごぶさたしています。
      季節がひとつ進みましたね。

      今日はひとつだけ。
      胸のまえで両手をぎゅっと握って、3秒数えたら、いっぺんにひらく。
      ──それだけで、今日の体は、すこし違う場所から始められます。

    block_confirmation: |
      LINEのメニューから、いつでもブロックしていただいて大丈夫です。
      タイミングが合わない時期は、誰にでもあります。

      また気が向いたとき、戻ってきていただけたらうれしいです。

# ───────────────────────────────────────────────────────────────────────
# Per-brand variants — override hub-level for brand-defining touches
# ───────────────────────────────────────────────────────────────────────
brands:

  # === iyashikei hub ===

  stillness_press:  # 静心社 — 静かで余白のある声
    welcome_day_0: |
      静心社のLINEに、友だち追加いただきありがとうございます。
      ここでは、騒がしい一日のなかにすこしの「静けさ」を置いていく、それだけのことをします。

      今日のひとつ。
      椅子に深く腰かけて、息を吐ききるところから始めてみてください。
      吸うのは、そのあと自然にやってきます。

      ──静かさは、つくるものではなくて、戻ってくる場所です。
      また明日、お会いしましょう。
      # (suggest sticker: still candle)
      [CTA: 受け取る]

    exercise_2_day_1: |
      今日は「音を聞く」だけのワークです。
      いる場所のいちばん遠くにある音と、いちばん近い音を、それぞれ一度だけ意識してみてください。

      評価せず、追わず、ただ聞く。
      頭のおしゃべりが、すこしだけうしろに下がります。

    soft_pitch_day_7: |
      この一週間、静けさに戻るための短いワークをご一緒してきました。
      もしご縁があれば、静心社の一冊をそっと置かせてください。

      派手な答えはなく、むしろ「答えを急がない」ための本です。
      よければためし読みからどうぞ。
      [link card: book preview]
      [CTA: ためし読み]

  somatic_wisdom:  # 体知社 — 身体ファースト・やわらかい声
    welcome_day_0: |
      体知社のLINEに、友だち追加ありがとうございます。
      ここでは、頭で考えるまえに「体が知っていること」に戻るワークを、すこしずつお届けします。

      今日のひとつ。
      右手を、そっと胸に置いてみてください。
      手のひらの下に、自分の鼓動を感じるまで、ゆっくり呼吸する。──30秒で十分です。

      体は、すでに知っています。
      私たちは、ただ思い出すだけ。
      # (suggest sticker: hand on heart)
      [CTA: 受け取る]

    exercise_2_day_1: |
      今日は「ため息を、ちゃんと吐く」ワークです。
      口を半分くらい開けて、「はぁ〜」と長めに吐いてみてください。3回でじゅうぶんです。

      ため息は、体が出してくれる小さなリセット信号。
      我慢せず、出させてあげてくださいね。

    story_day_3: |
      ある読者の方から、こんなお便りをいただきました。

      「肩のこわばりが、自分の感情だと気づいたのは、最近のことでした。
      胸に手をあてて呼吸する、というだけのワークを、毎晩1分だけ続けたんです。」

      「ある夜、ふと『あ、私、怒ってたんだ』と気づきました。
      気づいたら、肩からすっと力が抜けていったんです。」

      体は、頭よりずっと先に答えを知っています。
      私たちは、聞き役にまわるだけでいい。

  # === cognitive hub ===

  cognitive_clarity:  # 直見堂 — 直接的・感傷を排した声
    welcome_day_0: |
      直見堂のLINEに、友だち追加ありがとうございます。
      ここでは、ものごとを「ただ、見る」ためのワークを、短くお届けします。

      今日のひとつ。
      いま気になっていることをひとつ思い浮かべて、「事実」と「私の解釈」を、頭のなかで2行に分けてみてください。

      ──たいていの問題は、解釈のほうにあります。
      事実だけを見ると、必要な動きはひとつかふたつしか残りません。
      [CTA: 受け取る]

    exercise_2_day_1: |
      今日のワークは「物語を、いったん降ろす」です。
      自分について最近よく語っているストーリーを、ひとつ思い出してみてください。

      そして、それを「ただの一文」に短くしてみる。
      たいていの物語は、短くなるほど、力を失います。

    soft_pitch_day_7: |
      この一週間、考え方の手数をすこし減らすワークをご一緒しました。
      もし役に立つ瞬間があったら、直見堂の一冊をご紹介させてください。

      飾りを減らし、見るべきものを見る。──そのための地味で確実な手順をまとめた本です。
      [link card: book preview]
      [CTA: ためし読み]

  qi_foundation:  # 氣根社 — 古層・根のある声
    welcome_day_0: |
      氣根社のLINEに、友だちになっていただきありがとうございます。
      ここでは、体の根を整える、古くからの「気」のはたらきを、毎回ひとつだけお届けします。

      今日のひとつ。
      足の裏を地面にしっかりつけて、丹田(おへその下)を意識しながら、ゆっくり3呼吸。
      根が下に向かって伸びていくところを、軽く想像してみてください。

      ──気は、騒ぐものではなく、深まるものです。
      [CTA: 受け取る]

    exercise_2_day_1: |
      今日は「手のひらの気」のワークです。
      両手をすり合わせてあたため、胸の前で、手のひらどうしを5cmほど離してください。

      そのあいだに、ふっと押し合うような感覚があれば、それが今日の合図です。
      ない日も、もちろんあります。それも、立派な観察です。

  # === transformation hub ===

  body_memory:  # 体記堂 — 体の記憶・やわらかく寄り添う声
    welcome_day_0: |
      体記堂のLINEに、友だち追加ありがとうございます。
      ここでは、体に残っている記憶を、すこしずつ味方にしていくためのワークをお届けします。

      今日のひとつ。
      両手で、自分の二の腕をやさしくさすってみてください。子どもをあやすときの、あの速さで。

      声をかけるなら、ひとことだけ。「よくここまで来たね」。
      ──からだは、ちゃんと聞いています。
      # (suggest sticker: gentle self-hug)
      [CTA: 受け取る]

    exercise_2_day_1: |
      今日は「体に、おはようを言う」ワークです。
      朝の最初に、足の裏・お腹・胸・喉・額の順に、軽く手を置きながら名前を呼んであげてください。

      ──久しぶりに会う、自分という友だちに。
      ことばより先に、体が答えてくれます。

    story_day_3: |
      ある読者の方から、こんなお便りをいただきました。

      「過去のつらかった出来事を思い出すたび、胃のあたりがぎゅっと縮む癖がありました。
      ある日、その縮んだ胃に手を置いて、ただ『ここにいるよ』と言ってみたんです。」

      「変化はゆっくりでした。でも、ある朝、目が覚めたときに、お腹がふわっとしていたんです。
      ──体が、安心してもいいと判断した瞬間でした。」

      記憶は消えなくていい。
      ただ、いまの体が、すこし違うかたちで持ち直してくれるだけで、十分です。

  sleep_restoration:  # 夜の設計社 — 夜の声・ひそやかで整った声
    welcome_day_0: |
      夜の設計社のLINEに、友だちになっていただきありがとうございます。
      ここでは、眠りに向かう時間を「設計する」ための小さなワークを、夜にお届けしていきます。

      今日のひとつ。
      ベッドに入ったら、足先から順番に、力を入れてはふっと抜く。
      ふくらはぎ、太もも、お腹、肩、顔──それぞれ一度ずつで大丈夫です。

      眠りは、追いかけると逃げる。やってくる準備だけ、こちらでつくっておきましょう。
      # (suggest sticker: crescent moon)
      [CTA: 受け取る]

    exercise_2_day_1: |
      今日のは「明日のことを、夜に持ち込まない」ワークです。
      寝る前に、明日いちばん最初にやることを、紙に1行だけ書いてください。

      頭の中で繰り返しているリストを、紙に渡してしまう。
      ──そのぶん、夜は夜のために空きます。

    story_day_3: |
      ある読者の方から、こんな夜のお便りをいただきました。

      「眠れない夜に、頭の中で会議の続きをしてしまう癖がありました。
      ある晩、寝る前に『明日の最初の一歩』を1行だけメモしてから布団に入ってみたんです。」

      「眠りそのものは、すぐには変わりませんでした。
      でも、布団のなかが“仕事の続き”ではなく、“眠るための場所”に戻った感じがあったんです。」

      眠りは、小さな設計から戻ってきます。
      [link card: night ritual preview]

    soft_pitch_day_7: |
      この一週間、眠りに向かう時間の整え方を、ご一緒してきました。
      もしいまが「もうすこし丁寧に夜を扱いたい」というタイミングなら、夜の設計社の一冊をご紹介させてください。

      消灯前の30分を、どう設計するか。──地味ですが、きちんと効く順番をまとめた本です。
      [link card: book preview]
      [CTA: ためし読み]

    hard_pitch_day_14: |
      ここまで夜のおしゃべりに付き合っていただいて、ありがとうございます。

      LINE友だち限定の書籍クーポンを、今週末までお渡ししています。
      眠れない夜の予備として、机のすみに1冊置いておく──そんな使い方を想定した本です。

      合うかどうかは、ためし読みで先に確かめてみてください。
      [link card: coupon redeem]
      [CTA: クーポンを使う]

    post_purchase_thanks: |
      ご購入、ありがとうございます。
      今夜から、眠りの設計図がひとつ、手元に増えますね。

      読みおえた頃、ひとことでも感想を聞かせてください。
      眠れない夜を抱える誰かに、いちばん届くのはあなたの言葉です。
      [CTA: 感想を送る]

    re_engage_day_60: |
      ごぶさたしています。夜が長くなる季節ですね。

      今日はひとつだけ。
      寝る前に、両手のひらで顔をやさしく覆って、3呼吸。
      ──それだけで、今日の夜のスタート地点が、ほんのすこし変わります。

  # === remaining brands — welcome_day_0 (brand-defining) ===

  digital_ground:  # 今此処社 — 現代的・スマートでクリーンな声
    welcome_day_0: |
      今此処社のLINEに、友だち追加ありがとうございます。
      画面の多い毎日のなかに、「今ここ」に戻る短いボタンを置いていきますね。

      今日のひとつ。
      スマホをいったん伏せて、手のひらの上で5秒だけ、自分の呼吸を数えてみてください。
      アプリは閉じなくていいです。意識だけ、画面のうしろから戻す。

      ──通知は、また鳴ります。それでいい。
      まず1回、自分の現在地に戻りましょう。
      [CTA: 受け取る]

  heart_balance:  # 羽と秤社 — 詩的・軽やかな声
    welcome_day_0: |
      羽と秤社のLINEに、友だちになっていただきありがとうございます。
      ここでは、心の重さを「羽より重くしない」ための、軽いワークをお届けします。

      今日のひとつ。
      胸のなかにいま乗っているものを、ひとつだけ言葉にしてみてください。
      重ければ重いほど、声に出すと軽くなります。

      ──秤の片側に羽を置く。それだけで、傾きはじめます。
      [CTA: 受け取る]

  relational_calm:  # 素形堂 — 簡素で地に足のついた声
    welcome_day_0: |
      素形堂のLINEに、友だち追加ありがとうございます。
      ここでは、人とのあいだの「余計なもの」をすこし減らすための、地味なワークを置いていきます。

      今日のひとつ。
      最近もやっとした人との場面を、ひとつ思い出してください。
      そして、その出来事を「飾りなしの一文」で短く言いかえてみる。

      ──素のかたちに戻すと、たいていは思っていたより小さい。
      [CTA: 受け取る]

  warrior_calm:  # 鉄門社 — 律された、しかし優しい声
    welcome_day_0: |
      鉄門社のLINEに、友だち追加ありがとうございます。
      ここでは、内側の静けさを「鍛える」ための短いワークを、ひとつずつ渡していきます。

      今日のひとつ。
      背筋をまっすぐに立てて、息を4秒吸う、4秒止める、6秒吐く。
      これを3セット。──走らずに、ただ立つための呼吸です。

      ──強さは、力むことではなく、揺れないこと。
      [CTA: 受け取る]

  solar_return:  # 燼と灰社 — 燃えつきの先、しずかな熾火の声
    welcome_day_0: |
      燼と灰社のLINEに、友だち追加ありがとうございます。
      ここでは、燃えつきたあとに残る「あたたかい熾(おき)」を、すこしずつ思い出していくためのワークをお届けします。
      もう一度燃えあがらせるためではなく、絶やさないために。

      今日のひとつ。
      胸のおくに、灰のなかでまだ赤い小さな熾火をイメージしてください。
      息をふっと一度だけ、そっと送ります。
      消さず、燃やさず、ただ「ある」ことを確かめるように。

      ──力をふりしぼらなくていい日があること、覚えておいてくださいね。
      [CTA: 受け取る]

  devotion_path:  # 開器社 — ひらいて受けとる、まっすぐな声
    welcome_day_0: |
      開器社のLINEに、友だち追加ありがとうございます。
      ここでは、自分という「うつわ」をすこしひらいて、やさしさやよろこびをきちんと受けとるための短いワークをお届けします。

      今日のひとつ。
      胸のまんなかに、両手のひらをかさねて置いてください。
      手のひらを、なにかを受けとるかたちに、ふっとひらく。
      そして、心のなかでひとことだけ。「きょうも、よくきたね」。

      ──ひらく、というのは、力をぬいて、迎え入れること。
      [CTA: 受け取る]

