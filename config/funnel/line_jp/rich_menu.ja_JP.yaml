# LINE Rich Menu — ja_JP
#
# The rich menu is LINE's persistent bottom dock — always visible to friends.
# 6×4 grid (2,500×1,686 px) or 3×2 grid (2,500×843 px). Each cell links to a
# postback action, URI, or LIFF endpoint. Cell label microcopy ≤ 6 JP chars.
#
# Authority: docs/JAPAN_LINE_FREEBIE_FUNNEL_PLAN_2026-04-29.md
# Schema:    config/funnel/line_jp/funnel_definition.yaml (rich_menu_id refs)
#
# Three rich menus, one per hub. The menu can swap to a stage-specific variant
# (e.g., during nurture vs after purchase); v1 ships with a single per-hub menu.

schema_version: 1
locale: ja_JP
generated: "2026-04-29"

# ---------------------------------------------------------------------------
# Shared cell vocabulary (≤ 6 JP chars per label)
# ---------------------------------------------------------------------------
# Reusable cell definitions referenced by the per-hub menus below.
shared_cells:
  cell_today_tip:
    label_ja: "今日のヒント"
    label_chars: 6
    action_type: postback
    postback_data: "rich_menu:today_tip"
    intent: "Daily 1-line wellness tip — fast hit; encourages re-open."

  cell_free_guide:
    label_ja: "無料ガイド"
    label_chars: 5
    action_type: uri
    uri_template: "https://liff.line.me/{liff_id}/quiz/{topic}"
    intent: "Re-take or revisit the quiz → tailored PDF freebie."

  cell_recommended:
    label_ja: "おすすめ本"
    label_chars: 5
    action_type: postback
    postback_data: "rich_menu:recommended_books"
    intent: "Show 3 hub-curated book carousels (link cards)."

  cell_about_author:
    label_ja: "著者について"
    label_chars: 6
    action_type: postback
    postback_data: "rich_menu:about_author"
    intent: "Author bio or brand origin story; brand-tinted message."

  cell_faq:
    label_ja: "よくある質問"
    label_chars: 6
    action_type: postback
    postback_data: "rich_menu:faq"
    intent: "FAQ flex message: refunds, delivery, support hours."

  cell_contact:
    label_ja: "お問い合わせ"
    label_chars: 6
    action_type: postback
    postback_data: "rich_menu:contact"
    intent: "Hand-off to human support (operator-staffed window)."

  cell_coupon:
    label_ja: "クーポン"
    label_chars: 4
    action_type: postback
    postback_data: "rich_menu:coupon"
    intent: "Show active LINE-native coupon (if any) for current hub."

  cell_member_only:
    label_ja: "メンバー限定"
    label_chars: 6
    action_type: postback
    postback_data: "rich_menu:member_only"
    intent: "Buyer-only content unlocked after purchase (gated by tag)."

  cell_listen:
    label_ja: "音声で聴く"
    label_chars: 5
    action_type: postback
    postback_data: "rich_menu:audio_library"
    intent: "Audio guides for somatic / sleep / qi hubs (where relevant)."

  cell_settings:
    label_ja: "通知設定"
    label_chars: 4
    action_type: postback
    postback_data: "rich_menu:notification_prefs"
    intent: "Frequency / quiet-hours preferences. Soft opt-down before block."

# ---------------------------------------------------------------------------
# Rich Menu — Hub 1 (Iyashikei) — 3×2 grid, 6 cells
# ---------------------------------------------------------------------------
# Reader register: slow, evening, body-aware. Cells emphasize tools + rest.
rich_menus:
  - rich_menu_id: rich_menu_iyashikei_v1
    hub_id: iyashikei
    grid: "3x2"
    layout:
      - position: "1,1"
        ref: cell_today_tip
      - position: "2,1"
        ref: cell_free_guide
      - position: "3,1"
        ref: cell_listen
      - position: "1,2"
        ref: cell_recommended
      - position: "2,2"
        ref: cell_member_only
      - position: "3,2"
        ref: cell_settings
    chat_bar_text: "メニュー"

# ---------------------------------------------------------------------------
# Rich Menu — Hub 2 (Cognitive) — 3×2 grid, 6 cells
# ---------------------------------------------------------------------------
# Reader register: direct, knowledge-worker. Cells emphasize tools + clarity.
  - rich_menu_id: rich_menu_cognitive_v1
    hub_id: cognitive
    grid: "3x2"
    layout:
      - position: "1,1"
        ref: cell_today_tip
      - position: "2,1"
        ref: cell_free_guide
      - position: "3,1"
        ref: cell_recommended
      - position: "1,2"
        ref: cell_faq
      - position: "2,2"
        ref: cell_member_only
      - position: "3,2"
        ref: cell_settings
    chat_bar_text: "メニュー"

# ---------------------------------------------------------------------------
# Rich Menu — Hub 3 (Transformation) — 3×2 grid, 6 cells
# ---------------------------------------------------------------------------
# Reader register: warmer, devotion / courage. Cells emphasize community + path.
  - rich_menu_id: rich_menu_transformation_v1
    hub_id: transformation
    grid: "3x2"
    layout:
      - position: "1,1"
        ref: cell_today_tip
      - position: "2,1"
        ref: cell_free_guide
      - position: "3,1"
        ref: cell_about_author
      - position: "1,2"
        ref: cell_recommended
      - position: "2,2"
        ref: cell_coupon
      - position: "3,2"
        ref: cell_contact
    chat_bar_text: "メニュー"

# ---------------------------------------------------------------------------
# Rich Menu variants (future — not in v1)
# ---------------------------------------------------------------------------
# Stage-aware menu swaps (e.g., post-purchase menu replaces 'おすすめ本' with
# '購入履歴' and surfaces 'メンバー限定' more prominently). Defer to Phase 2.
future_variants:
  - id: rich_menu_iyashikei_v2_post_purchase
    parent: rich_menu_iyashikei_v1
    swap_cells:
      - replace_position: "1,2"     # おすすめ本
        with_label_ja: "購入履歴"
        action_postback: "rich_menu:purchase_history"
    eligibility_tag: "buyer_*"
  - id: rich_menu_re_engage
    parent: rich_menu_iyashikei_v1
    swap_cells:
      - replace_position: "3,1"     # 音声で聴く
        with_label_ja: "復帰特典"      # "return reward"
        action_postback: "rich_menu:re_engage_offer"
    eligibility_tag: "inactive_60d"
