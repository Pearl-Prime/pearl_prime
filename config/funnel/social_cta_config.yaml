    medium: "Free Nervous System Reset → calm the alarm in 90 seconds → link in bio"
    hashtags: ["nervoussystem", "anxietyrelief", "breathwork", "highfunctioninganxiety", "mentalhealth"]
    platform_priority: ["tiktok", "instagram", "youtube_shorts"]
    hook_examples:
