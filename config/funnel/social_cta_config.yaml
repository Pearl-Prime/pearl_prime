# config/funnel/social_cta_config.yaml
# Per-topic CTA text for 48 Social post generation.
# Consumed by: 48 Social content engine, manifest.json builder, caption generator
# Authority: docs/FULL_FUNNEL_PLAN.md, docs/48_SOCIAL_GHL_BRAND_ADMIN_SPEC.md
# Source of truth for CTAs: config/funnel/freebie_to_book_map.yaml → social_cta block
# Last updated: 2026-04-10

schema_version: 1

# How 48 Social uses this config:
# 1. For each book being repurposed, look up topic_id
# 2. Pull the social_cta block for that topic
# 3. Append CTA text to post caption (per post_type mapping below)
# 4. Set bio link to freebie landing page URL
# 5. Use platform-appropriate hashtag set

base_freebie_url: "https://brand-admin-onboarding.pages.dev/free"

# CTA text by post type (universal, overridden per topic below)
post_type_cta_defaults:
  quote_card:
    caption_suffix: "Free guide in bio ↗"
    image_overlay: "Free {freebie_name} → link in bio"
  micro_practice:
    caption_suffix: "Get the full practice free → link in bio"
    image_overlay: "Free {freebie_name}"
  hook_post:
    caption_suffix: "This is from our new book. Free guide in bio ↗"
    image_overlay: null
  carousel:
    last_slide_text: "Want the full guide? Free → link in bio"
    caption_suffix: "Swipe to the end 👆 Free guide in bio"
  video_clip:
    caption_suffix: "Free {freebie_name} → link in bio 📖"
    video_overlay_last_3s: "Link in bio 🔗"
  story_reel:
    caption_suffix: "Free guide → link in bio"
    story_sticker: "Link in bio ↗"
  thread:
    final_post: "Full free guide: {freebie_url}"
  engagement:
    caption_suffix: "Which resonates? Free guide → bio"

# Per-topic CTA overrides
