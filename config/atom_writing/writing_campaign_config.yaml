# writing_campaign_config.yaml
# Configuration for the Phoenix Omega atom writing campaign.
# Used by: scripts/atom_writing/run_writing_campaign.py
#
# IMPORTANT: Set ANTHROPIC_API_KEY in environment before running.

# ─── MODEL SETTINGS ─────────────────────────────────────────────────────────

model: claude-sonnet-4-6
max_tokens: 4096
temperature: 0.7    # some creativity for prose variety

# ─── CONCURRENCY ─────────────────────────────────────────────────────────────

# Max parallel API calls. Each call generates one persona/topic/slot combo.
# Anthropic rate limits: adjust based on your tier.
#   Tier 1: max_concurrent_tasks: 2
#   Tier 2: max_concurrent_tasks: 5
#   Tier 3+: max_concurrent_tasks: 10
max_concurrent_tasks: 5

# ─── DEFAULTS ────────────────────────────────────────────────────────────────

variants_per_slot_default: 6

# ─── OUTPUT PATHS ────────────────────────────────────────────────────────────

# Atom output directory (relative to repo root or absolute)
output_dir: atoms/

# Teacher story output directory
teacher_output_dir: SOURCE_OF_TRUTH/teacher_banks/

# Campaign progress log (JSONL, append-only)
log_file: artifacts/atom_writing/campaign_log.jsonl

# ─── VALIDATION ──────────────────────────────────────────────────────────────

# If true, validate generated content before writing to disk.
# Invalid content is logged but not written.
validate_before_write: true

# ─── CAMPAIGN TARGETS (reference) ───────────────────────────────────────────
# These are informational — actual targets are in run_writing_campaign.py TASKS.
#
# Task 1: pivot_takeaway_thread_permission
#   4 personas x 15 topics x 4 slots x 13 variants = 3,120 variants
#
# Task 2: new_topics
#   10 personas x 5 new topics x 6 slots x 6 variants = 1,800 variants
#
# Task 3: teacher_stories
#   11 teachers x ~15 new stories each = ~165 stories
#
# Task 4: exercise_compression_gap
#   corporate_managers EXERCISE target: 200
#   first_responders COMPRESSION target: 200
#   Spread across 15 topics each = 400 total
#
# Task 5: engine_atoms_new_topics
#   10 personas x 5 topics x 7 engines x 5 variants = 1,750 variants
#
# ESTIMATED TOTAL: ~7,235 new atom variants
