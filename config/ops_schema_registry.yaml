# Ops Dashboard — JSON Schema registry (single source of truth for artifact contracts).
# Prevents schema sprawl, untracked format evolution, version conflicts.
# CI: scripts/ci/validate_ops_artifacts.py validates artifacts against these schemas.
# Any schema change requires: version bump, registry update, docs/SCHEMA_CHANGELOG.md entry.

ops_schema_registry:
  wave_candidates:
    current_version: "1.0"
    schema_path: "schemas/wave_candidates.schema.json"
    artifact_pattern: "wave_candidates_*.json"

  wave_optimizer_solution:
    current_version: "1.0"
    schema_path: "schemas/wave_optimizer_solution.schema.json"
    artifact_pattern: "wave_optimizer_solution_*.json"
    artifact_subdir: "wave_optimizer"

  wave_optimizer_infeasible:
    current_version: "1.0"
    schema_path: "schemas/wave_optimizer_infeasible.schema.json"
    artifact_pattern: "wave_optimizer_infeasible_*.json"
    artifact_subdir: "wave_optimizer"

  book_quality_summary:
    current_version: "1.0"
    schema_path: "schemas/book_quality_summary_v1.schema.json"
    artifact_pattern: "book_quality_summary_*.json"

  story_atom_lint_summary:
    current_version: "1.0"
    schema_path: "schemas/story_atom_lint_v1.schema.json"
    artifact_pattern: "story_atom_lint_summary_*.json"

  book_transformation_summary:
    current_version: "1.0"
    schema_path: "schemas/book_transformation_summary_v1.schema.json"
    artifact_pattern: "book_transformation_summary_*.json"

  memorable_line_summary:
    current_version: "1.0"
    schema_path: "schemas/memorable_line_summary_v1.schema.json"
    artifact_pattern: "memorable_line_summary_*.json"

  book_quality_bundle:
    current_version: "1.0"
    schema_path: "schemas/book_quality_bundle_v1.schema.json"
    artifact_pattern: "book_quality_bundle_*.json"

  wave_candidates_enriched:
    current_version: "1.0"
    schema_path: "schemas/wave_candidates_enriched_v1.schema.json"
    artifact_pattern: "*_candidates_enriched.json"
    artifact_subdir: "waves"

  memorable_line_registry_snapshot:
    current_version: "1.0"
    schema_path: "schemas/memorable_line_registry_snapshot_v1.schema.json"
    artifact_pattern: "memorable_line_registry_snapshot_v1.json"

  memorable_line_registry_violations:
    current_version: "1.0"
    schema_path: "schemas/memorable_line_registry_violations_v1.schema.json"
    artifact_pattern: "memorable_line_registry_violations_*.json"

  catalog_health_summary:
    current_version: "1.0"
    schema_path: "schemas/catalog_health_summary_v1.schema.json"
    artifact_pattern: "catalog_health_summary_*.json"

  series_quality_report:
    current_version: "1.0"
    schema_path: "schemas/series_quality_report_v1.schema.json"
    artifact_pattern: "series_quality_report_*.json"

