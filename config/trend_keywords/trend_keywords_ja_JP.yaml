# config/trend_keywords/trend_keywords_ja_JP.yaml
# Japan locale trend keyword config for SerpApi scraping
# SerpApi country_code: JP | Google domain: google.co.jp | Language: ja
# Research source: Rakuten AI + DeepSeek + Web Search (2026-03-23)

locale: ja_JP
serpapi_params:
  engine: google
  google_domain: google.co.jp
  gl: jp
  hl: ja

