# Tier 3: Persona-specific keywords — checked 2 per day, rotating by persona.
# Budget: 2 searches/day = 14/week.
# These probe how specific persona segments search for self-help content.
# Authority: docs/TREND_FEED_INTEGRATION_STRATEGY.md
# Last updated: 2026-03-22

version: "1.0"

rotation_size: 2
rotation_strategy: persona_cycle  # cycles through persona groups

persona_groups:

  nyc_exec:
    keywords:
      - "executive burnout recovery"
      - "high achiever anxiety"
      - "work life balance impossible"
      - "leadership and mental health"

  new_mom:
    keywords:
      - "postpartum anxiety help"
      - "mom burnout real"
      - "identity loss after baby"
      - "touched out overwhelmed"

  gen_z_student:
    keywords:
      - "therapy is too expensive alternatives"
      - "social media anxiety detox"
      - "imposter syndrome college"
      - "emotional dumping boundaries"

  midlife_transition:
    keywords:
      - "midlife crisis or awakening"
      - "empty nest depression"
      - "reinventing yourself at 50"
      - "purpose after kids leave"

  caregiver:
    keywords:
      - "compassion fatigue caregiver"
      - "caregiver burnout guilt"
      - "boundary setting with aging parents"
      - "losing yourself while caring for others"
