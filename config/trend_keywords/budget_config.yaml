# SerpApi Budget Configuration
# Free tier: 250 searches/month. Hard-stop at 245 (5-search safety margin).
# Monthly average: 4.35 weeks/month → 57 searches/week ceiling.
# Authority: docs/TREND_FEED_INTEGRATION_STRATEGY.md
# Last updated: 2026-03-22

version: "1.0"

serpapi:
  monthly_limit: 250
  hard_stop: 245          # stop all searches when monthly count reaches this
  safety_margin: 5        # = monthly_limit - hard_stop
  weekly_ceiling: 57      # 250 / 4.35 weeks per month

  # Per-tier daily/weekly allocation
  tiers:
    tier1_primaries:
      searches_per_day: 8
      searches_per_week: 56   # 8 × 7 — but Google Trends accepts up to 5 keywords per query
      actual_api_calls_per_day: 2   # 8 keywords ÷ 4 per batch = 2 calls
      actual_api_calls_per_week: 14
      notes: "Batch keywords into groups of 4-5 per SerpApi call to save budget."

    tier2_rotation:
      searches_per_day: 5
      searches_per_week: 35
      actual_api_calls_per_day: 1   # 5 keywords in 1 batch
      actual_api_calls_per_week: 7
      notes: "Round-robin rotation, 5 per day."

    tier3_persona:
      searches_per_day: 2
      searches_per_week: 14
      actual_api_calls_per_day: 1   # 2 keywords in 1 batch
      actual_api_calls_per_week: 7
      notes: "Cycle through persona groups."

    tier4_emerging:
      searches_per_week: 10
      check_day: sunday
      actual_api_calls_per_week: 2  # 10 keywords in 2 batches of 5
      notes: "Weekly cultural discovery batch."

  # Total actual API calls per week: 14 + 7 + 7 + 2 = 30
  # Total actual API calls per month: ~130 (well under 250 limit)
  # This leaves ~120 searches/month for ad-hoc queries and Exploding Topics fallback checks.

  batch_optimization:
    enabled: true
    max_keywords_per_call: 5   # SerpApi Google Trends supports up to 5 comparison keywords
    notes: >
      SerpApi Google Trends engine accepts comma-separated keywords (up to 5).
      Batching 5 keywords per call reduces actual API usage by ~80%.
      Example: "EMDR,somatic therapy,breathwork,nervous system regulation,inner child healing"
      counts as 1 API call, not 5.

  budget_guard:
    state_file: "artifacts/feeds/.serpapi_budget_state.json"
    reset_day: 1           # reset on 1st of each month
    log_every_call: true
    warn_at_pct: 80        # warn when 80% of hard_stop used
    block_at_pct: 100      # block when hard_stop reached
