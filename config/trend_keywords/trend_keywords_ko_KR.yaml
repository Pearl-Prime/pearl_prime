# config/trend_keywords/trend_keywords_ko_KR.yaml
# South Korea locale trend keyword config for SerpApi scraping
# SerpApi country_code: KR | Google domain: google.co.kr | Language: ko
# Note: Naver (naver.com) is primary search engine — supplement with Naver Trends
# Research source: Rakuten AI + DeepSeek + Web Search (2026-03-23)

locale: ko_KR
serpapi_params:
  engine: google
  google_domain: google.co.kr
  gl: kr
  hl: ko
naver_supplement: true  # Also monitor Naver DataLab trends

