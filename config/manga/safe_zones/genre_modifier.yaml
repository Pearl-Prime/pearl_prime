# Genre modifiers — per genre tweaks applied AFTER framing + subject resolution.
# Per MANGA_LAYER_RENDER_CONTRACT_SPEC.md §5.5.
#
# Genre overrides are scope-targeted: framing_overrides only apply when the
# subject inherits from that framing; subject_overrides only apply when the
# subject_id matches; composite_additions apply universally.
#
# Precedence (later wins): base < framing < subject < GENRE < archetype_exception

schema_version: "1.0.0"
type: "genre_modifier"
modifiers:

  healing:
    framing_overrides: {}
    subject_overrides: {}
    composite_additions:
      composite_rule.negative_space_min_pct: 40

  slice_of_life:
    framing_overrides: {}
    subject_overrides: {}
    composite_additions:
      composite_rule.negative_space_min_pct: 30

  dark_fantasy:
    framing_overrides:
      CU:
        margin.top: 7
        margin.bottom: 3
        margin.left: 12
        margin.right: 12
      MCU:
        margin.top: 8
        margin.bottom: 9
        margin.left: 17
        margin.right: 17
    subject_overrides: {}
    composite_additions:
      archetype_flag.dramatic_bleed_allowed: true

  psychological_horror:
    framing_overrides:
      CU:
        margin.top: 15
        margin.bottom: 0
    subject_overrides: {}
    composite_additions:
      framing_dutch_angle.margin_all_bonus: 5

  mecha:
    framing_overrides:
      LS:
        subject_zone_pct: [50, 95]
    subject_overrides:
      object_macro:
        margin.top: 8
        margin.bottom: 8
        margin.left: 8
        margin.right: 8
    composite_additions: {}

  romance:
    framing_overrides: {}
    subject_overrides: {}
    composite_additions:
      framing_CU.eye_height_alignment: rule_of_thirds_upper

  fantasy_adventure:
    framing_overrides:
      LS:
        subject_zone_pct: [40, 95]
      MS:
        subject_zone_pct: [55, 90]
    subject_overrides: {}
    composite_additions: {}

  comedy:
    framing_overrides:
      CU:
        margin.top: 18
      MCU:
        margin.top: 20
    subject_overrides: {}
    composite_additions:
      composite_rule.expression_burst_zone: outside_subject_zone_within_canvas
