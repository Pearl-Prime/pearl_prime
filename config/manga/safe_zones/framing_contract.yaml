# Framing contracts — per camera distance / framing type.
# Per MANGA_LAYER_RENDER_CONTRACT_SPEC.md §5.3.
# Inherits implicitly from base_contract.

schema_version: "1.0.0"
type: "framing_contract"
contracts:
  CU:
    subject_zone_pct: [65, 80]
    margin: {top: 10, bottom: 5, left: 17.5, right: 17.5}
    notes: "close-up: face + shoulders; forehead has air; shoulders may crop at the very bottom edge intentionally"

  MCU:
    subject_zone_pct: [55, 75]
    margin: {top: 12, bottom: 13, left: 22.5, right: 22.5}
    notes: "mid-close-up: chest + face; used when chest+arm gesture matters"

  MS:
    subject_zone_pct: [50, 90]
    margin: {top: 5, bottom: 5, left: 25, right: 25}
    notes: "medium: full upper body, knees-up; most common character framing"

  LS:
    subject_zone_pct: [35, 95]
    margin: {top: 2, bottom: 0, left: 32.5, right: 32.5}
    notes: "long shot: full body; feet may align with bottom edge; head has 2% air"

  ELS:
    subject_zone_pct: null
    margin: null
    notes: "extreme long: figure < 1/3 frame; character is part of L0 background, NOT a separate L2 layer"

  ECU:
    subject_zone_pct: [75, 80]
    margin: {top: 10, bottom: 10, left: 12.5, right: 12.5}
    notes: "extreme close-up: macro of object/eye/hand; subject IS the panel; tight tolerances OK"

  insert:
    subject_zone_pct: [65, 75]
    margin: {top: 12.5, bottom: 12.5, left: 17.5, right: 17.5}
    notes: "overhead / top-down view; object(s) center-frame"
