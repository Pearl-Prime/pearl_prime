# CROSS-GENRE OBSERVATIONS
# ════════════════════════════════════════════════════════════════════════════

cross_genre_observations:

  pepper_and_carrot_fragility:
    finding: "Pepper&Carrot is the only CC manga-styled work usable in shipped product. It appears across multiple genres because it's the only fully-permissive option."
    risk: "Single point of failure — relies on one artist's continued CC posture"
    mitigation: "don't lean on it as primary anchor; treat as 'color/mood reference' only"

  kitazawa_rakuten_2026_pd_entry:
    finding: "Kitazawa Rakuten's 2026-01-01 PD entry is the single most consequential new asset for this corpus"
    operator_action: "commission high-quality scans of Tokyo Puck (1905-1915) issues from Saitama Municipal Cartoon Art Museum and contribute to Wikimedia Commons under PD-Japan-50 to lock in PD status"

  synthetic_internal_only_dependency:
    finding: "synthetic_internal_only row appears in every genre because the Manga109-s clause-5 pathway is the only legally clean way to get modern-manga-styled reference imagery"
    operational_dependency: "If Manga109-s access is ever revoked or its terms change, Phoenix's entire reference-corpus strategy needs replanning"
    mitigation:
      - "cache the current Manga109-s license text under artifacts/research/ for archival"
      - "document the training provenance per-LoRA"
      - "build at least one fallback LoRA trained on PD-only material (Hokusai Manga + ukiyo-e) per genre"

  publisher_samples_uniformly_empty:
    finding: "publisher_samples row is empty for every genre because no major Japanese publisher has a public educational / promotional / press allowance Phoenix can rely on without per-title licensing"
    operator_action: "skip publisher-copyrighted material entirely; rely on PD anchors + Phoenix-trained LoRAs"

