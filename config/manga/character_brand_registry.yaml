# Manga Character → Brand Registry
# Authority: Big View Phase 3
# Sources:
#   config/manga/manga_brand_series_plan.yaml     (brand→teacher→genre)
#   config/manga/teacher_character_prompts.yaml   (visual character specs)
#   config/catalog_planning/brand_teacher_matrix.yaml
#
# Each brand entry defines:
#   teacher_character: the primary teacher-derived manga protagonist
#   supporting_cast:   recurring non-teacher characters (student, guide, foil)
#   visual_style:      genre + style archetype (links to teacher_character_prompts.yaml)
#   market_variants:   locale-specific name/design overrides

schema_version: "1.0"
generated: "2026-04-22"
authority: "Big View Phase 3"

# ── CHARACTER ARCHETYPES (shared across brands) ──────────────────────────────
# Reusable supporting cast templates. Brand can instantiate with local names.

supporting_archetypes:
  student_seeker:
    role: protagonist_learner
    description: "Young adult (25-35) in burnout/transition. The reader stand-in."
    design_notes: "Modern clothing, tired eyes that slowly gain clarity across the series."
    emotional_arc: "overwhelm → encounter teacher → practice → integration"

  skeptic_friend:
    role: foil
    description: "The protagonist's pragmatic friend who doubts the teachings."
    design_notes: "Business attire, arms crossed posture early; opens up by vol 3."
    emotional_arc: "resistance → grudging curiosity → quiet conversion"

  elder_guide:
    role: mentor_secondary
    description: "An older character who bridges teacher wisdom and everyday life."
    design_notes: "Warm, weathered face. Often found in domestic/nature settings."
    emotional_arc: "stable throughout; the reader's comfort anchor"

  community_member:
    role: ensemble
    description: "A recurring background character who shows parallel healing journey."
    design_notes: "Diverse appearance. Background story revealed gradually."
    emotional_arc: "mirrors protagonist arc with a one-chapter offset"


