purpose: >-
  Canonical taxonomy for manga-oriented catalog planning, generation, QA, and
  adaptation in Phoenix Omega. This file defines market demos, genre families,
  subgenres, emotional engines, serialization engines, visual grammars, reader
  promises, and adaptation targets so manga is treated as a native story system
  rather than a surface art style.

market_demos:
  - id: shonen
    label: Shonen
    default_reader_drives:
      - aspiration
      - rivalry
      - momentum
      - belonging
    notes: >-
      Usually youth-facing and momentum-driven, but should not be reduced to
      action only. Can include sports, comedy, mystery, and emotional growth.

  - id: shojo
    label: Shojo
    default_reader_drives:
      - longing
      - tenderness
      - recognition
      - emotional_becoming
    notes: >-
      Often relationship-centered and emotionally sensitive. Requires strong
      support for restraint, social signaling, and softness as narrative force.

  - id: seinen
    label: Seinen
    default_reader_drives:
      - tension
      - complexity
      - obsession
      - reflection
    notes: >-
      Adult-targeted umbrella spanning thriller, realism, psychological drama,
      workplace conflict, philosophy, horror, and mature genre hybrids.

  - id: josei
    label: Josei
    default_reader_drives:
      - emotional_truth
      - intimacy
      - realism
      - identity_rebuild
    notes: >-
      Adult-targeted relational and life-stage storytelling. Should not be
      flattened into generic romance. Often depends on subtle social and
      emotional texture.

  - id: kodomo
    label: Kodomo
    default_reader_drives:
      - play
      - clarity
      - curiosity
      - warmth
    notes: >-
      Child-facing manga with strong clarity, simple emotional readability, and
      playful pacing.

genre_families:
  - id: battle
    label: Battle
    ite_profile_ref: shonen  # primary match; seinen also applicable for adult battle titles
    common_demos: [shonen, seinen]
    default_emotional_engines: [aspiration, rivalry, conviction]
    default_serialization_engines: [cliffhanger_escalation, tournament_ladder, quest_progression]
    default_visual_grammars: [kinetic_action, impact_contrast]

  - id: romance
