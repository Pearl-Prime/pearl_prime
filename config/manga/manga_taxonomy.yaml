visual_grammar_aliases:
  healing_iyashikei:
    base: sparse_atmosphere
    overlays:
      - everyday_warmth
      - symbolic_reflection

notes:
  - >-
    This taxonomy is intended to be extended, not frozen. New subgenres and
    archetype templates should be added when supported by catalog demand and QA.
  - >-
    Phoenix should avoid using market demo alone as a generation control. At
    minimum, market_demo + genre_family + emotional_engine + serialization_engine
    + visual_grammar should be resolved together.
  - >-
    Reader promise is not decorative metadata. It should influence hooks,
    chapter-end logic, visual emphasis, and adaptation packaging.

reconciliation_notes:
  reconciled_at: "2026-04-19"
  reconciled_against:
    - config/manga/genre_ite_profiles.yaml
    - config/manga/style_archetypes.yaml

  genre_family_gaps:
    # Genre families in manga_taxonomy.yaml with no matching ITE profile in genre_ite_profiles.yaml.
    # These are candidates for new ITE profile creation.
    - id: slice_of_life
      note: >-
        No slice-of-life ITE profile. Iyashikei partially covers healing subtype.
        A general slice_of_life profile is needed for kodomo and shojo-everyday titles.
    - id: mystery
      note: >-
        No mystery or psychological-thriller ITE profile. Seinen demo covers some overlap.
        A mystery/suspense ITE profile should be created.
    - id: workplace
      note: >-
        No workplace ITE profile. Manhwa covers some overlap but is format-keyed, not genre-keyed.
        A josei-workplace ITE profile is needed for adult-female workplace titles.
    - id: food
      note: >-
        No food ITE profile. Cultivation covers craft progression but not food specifically.
        A food/culinary ITE profile is needed for shokugeki-style titles.
