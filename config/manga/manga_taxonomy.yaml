emotional_engines:
  - id: aspiration
    label: Aspiration
    promise: feel stronger and keep moving

  - id: rivalry
    label: Rivalry
    promise: become invested in challenge, growth, and comparison

  - id: conviction
    label: Conviction
    promise: feel moral and emotional momentum

  - id: longing
    label: Longing
    promise: feel ache, anticipation, and emotional pull

  - id: tenderness
    label: Tenderness
    promise: feel softness, care, and emotional warmth

  - id: emotional_recognition
    label: Emotional Recognition
    promise: feel seen in subtle inner experience

  - id: emotional_truth
    label: Emotional Truth
    promise: feel the realism and honesty of adult emotional life

  - id: identity_rebuild
    label: Identity Rebuild
    promise: experience the slow reconstruction of selfhood

  - id: dread
    label: Dread
    promise: stay tense and uneasy

  - id: obsession
    label: Obsession
    promise: get pulled into fixation and escalation

  - id: suspicion
    label: Suspicion
    promise: keep searching for what is hidden or wrong

  - id: restoration
    label: Restoration
    promise: feel soothed, repaired, and more settled

  - id: quiet_recognition
    label: Quiet Recognition
    promise: find meaning in small moments and understated change

  - id: wonder
    label: Wonder
    promise: feel awe and imaginative possibility

  - id: grief
    label: Grief
    promise: feel loss, tenderness, and human weight

  - id: team_belonging
    label: Team Belonging
    promise: feel connection through shared struggle

  - id: comfort
    label: Comfort
    promise: feel safe, nourished, and emotionally held

  - id: craft_pride
    label: Craft Pride
    promise: enjoy mastery, detail, and earned competence

  - id: play
    label: Play
    promise: feel delight, looseness, and comic release

  - id: absurdity
    label: Absurdity
    promise: laugh through contrast, escalation, and surprise

  - id: release
    label: Release
    promise: discharge tension through humor or catharsis

  - id: helplessness
    label: Helplessness
    promise: intensify vulnerability and danger

  - id: curiosity
    label: Curiosity
    promise: keep searching for answers and patterns

  - id: responsibility
    label: Responsibility
    promise: feel the weight of choices and duty

  - id: competence
    label: Competence
    promise: enjoy capable decision-making under pressure

  - id: becoming
    label: Becoming
    promise: witness transformation into a new self

  - id: emotional_misread
    label: Emotional Misread
    promise: stay engaged through ambiguity and social uncertainty

serialization_engines:
  - id: cliffhanger_escalation
    label: Cliffhanger Escalation
    chapter_logic: each chapter intensifies danger, desire, or uncertainty

  - id: slow_burn_relationship
    label: Slow-Burn Relationship
    chapter_logic: progress occurs through small shifts in trust, closeness, and misreading

  - id: emotional_misread_chain
    label: Emotional Misread Chain
    chapter_logic: plot and feeling move through mistaken signals, withheld truths, and partial recognition

  - id: episodic_comfort
    label: Episodic Comfort
    chapter_logic: each unit offers its own emotional completion while deepening attachment to place and cast

  - id: quest_progression
    label: Quest Progression
    chapter_logic: forward movement through external milestones and internal growth

  - id: tournament_ladder
    label: Tournament Ladder
    chapter_logic: staged competition with rising challenge, skill display, and rivalry

  - id: ensemble_rotation
    label: Ensemble Rotation
    chapter_logic: emotional and plot focus rotates across multiple cast members

  - id: mystery_reveal_chain
    label: Mystery Reveal Chain
    chapter_logic: each chapter answers one question while opening a deeper one

  - id: procedural_case_loop
    label: Procedural Case Loop
    chapter_logic: recurring case structure creates competence rhythm and variation

  - id: ritual_daily_life
    label: Ritual Daily Life
    chapter_logic: repeated actions gain significance through subtle emotional change

  - id: training_payoff_cycle
    label: Training Payoff Cycle
    chapter_logic: effort, adjustment, and earned demonstration repeat at increasing stakes

  - id: dread_escalation
    label: Dread Escalation
    chapter_logic: certainty declines while danger and unease rise

  - id: reflective_progression
    label: Reflective Progression
    chapter_logic: insight accumulates through observation, memory, and internal reframing

  - id: political_escalation
    label: Political Escalation
    chapter_logic: social and institutional pressures intensify across factions and decisions

  - id: gag_reset_loop
    label: Gag Reset Loop
    chapter_logic: recurring comic premise resets while relationships and tone deepen over time

visual_grammars:
  - id: kinetic_action
    label: Kinetic Action
    style_archetype_ref: power_progression  # direct match in style_archetypes.yaml
    traits:
      - dynamic_panel_angles
      - speed_lines
      - impact_frames
      - high_movement_readability

  - id: impact_contrast
    label: Impact Contrast
    style_archetype_ref: dark_psychological  # partial match; heavy B&W contrast, dark shadows
    traits:
      - black_white_extremes
      - explosive_moments
      - compressed_setup_then_release

  - id: decorative_romance
    label: Decorative Romance
    style_archetype_ref: webtoon_vertical_romance  # closest match; soft shading, romantic aesthetic
    traits:
      - emotional_ornament
      - gaze_emphasis
      - floral_or_symbolic_motifs
      - soft_space_management

  - id: intimate_realism
    label: Intimate Realism
    style_archetype_ref: hyper_clean_cinematic  # closest match; detailed, polished, cinematic
    traits:
      - body_language_precision
      - facial_microexpression
      - environment_as_social_context
      - restrained_camera

  - id: grounded_realism
    label: Grounded Realism
    style_archetype_ref: null  # no direct archetype; closest is hyper_clean_cinematic but lacks gritty realism variant
    traits:
      - spatial_clarity
      - realistic_proportion
      - low_exaggeration
      - object_attention

  - id: sparse_atmosphere
    label: Sparse Atmosphere
    style_archetype_ref: cozy_iyashikei  # closest match; soft, minimal, healing aesthetic
    traits:
      - negative_space
      - quiet_beats
      - low_balloon_density
      - environment_breathing_room

  - id: dread_contrast
    label: Dread Contrast
    style_archetype_ref: dark_psychological  # direct match; high contrast, heavy ink, dark shadows
    traits:
      - unsettling_crops
      - harsh_shadows
      - visual_emptiness
      - distorted_focus

  - id: body_horror_expressionism
    label: Body Horror Expressionism
    style_archetype_ref: dark_psychological  # closest match; psychological, high contrast
    traits:
      - anatomical_instability
      - visual_discomfort
      - texture_intensity
      - psychological_physical_merge

  - id: sports_motion_clarity
    label: Sports Motion Clarity
    style_archetype_ref: power_progression  # closest match; dynamic action, speed lines
    traits:
      - readable_body_mechanics
      - momentum_traces
      - competition_state_clarity
      - repeated_skill_visualization

  - id: ornate_fantasy
    label: Ornate Fantasy
    style_archetype_ref: null  # no fantasy-ornate archetype in style_archetypes.yaml (gap)
    traits:
      - worldbuilding_detail
      - costume_emphasis
      - ceremonial_or_magical_motifs
      - spectacle_panels

  - id: sensory_closeup
    label: Sensory Closeup
    style_archetype_ref: null  # no sensory/food-closeup archetype in style_archetypes.yaml (gap)
    traits:
      - texture_focus
      - appetite_or_craft_detail
      - object_reverence
      - pleasure_emphasis

  - id: everyday_warmth
    label: Everyday Warmth
    style_archetype_ref: cozy_iyashikei  # close match; warm tones, rounded shapes, gentle
    traits:
      - approachable_faces
      - cozy_environments
      - humor_softness
      - routine_as_affection

  - id: symbolic_reflection
    label: Symbolic Reflection
    style_archetype_ref: null  # no symbolic/essay archetype in style_archetypes.yaml (gap)
    traits:
      - metaphor_panels
      - inner_state_externalization
      - poetic_objects
      - contemplative_spacing

