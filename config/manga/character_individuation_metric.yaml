# whether two characters in the catalog are visually distinguishable. Consumed
# by the constraint solver (per `docs/CHARACTER_INDIVIDUATION_PIPELINE_SPEC_2026-05-02.md`)
# and the QA harness (gates Phase 2 of production campaign).
