# Iyashikei archetype scene_context clauses — v0.6.1 prompt-injection slots.
#
# Per docs/specs/MANGA_LAYER_RENDER_CONTRACT_SPEC.md §8.1 v0.6.1.
#
# Each archetype declares the scene context Qwen needs to render the character
# coherently. Empirical finding from B-test #1/#2 (2026-05-19):
#   Qwen's scene-prior is load-bearing — it requires archetype-appropriate
#   grounding to produce a high-quality character. Negative prompts barely
#   suppress it. Therefore: SPECIFY the scene per archetype; let Qwen render
#   it; rembg extracts the subject downstream (per archetype.cutout_policy).
#
# Companion file to iyashikei.yaml (kept separate so v0.6.1 additions don't
# require touching the 19 archetype blocks in the authority file). The
# orchestrator loads both files and merges by archetype_id at render-prompt
# compile time.
#
# Each entry:
#   scene_context_clause      — REQUIRED L2 slot (slot_registry v0.6.1)
#   attached_props_clause     — REQUIRED L2 slot (props the character interacts with)
#   background_blur_clause    — OPTIONAL L2 slot (override for default)
#   cutout_policy             — REQUIRED for archetypes with L2 layer; per spec §8.1 v0.6
#     model                   — u2net_human_seg | birefnet-portrait
#     keep_attached_props     — list of prop_ids preserved by the cutout (u2net_human_seg only)
#     alpha_matting           — true (mandatory per spec §8.1 v0.6)
#     alpha_matting_foreground_threshold / _background_threshold
#     character_extraction_coverage_min_pct
#     background_bleed_max_pct — archetype-level override on spec's 5% default
#
# Routing logic (operator-directed, empirical-evidence-anchored):
#   subject_type=character_face_only / silhouette_back / pet_only
#     → birefnet-portrait, no attached_props (tight character-only extraction)
#   subject_type=character_hands_only / hands_and_arms / chest_partial / hand_only
#     → u2net_human_seg, keep_attached_props declared (prop-contact archetypes)
#   subject_type=character_full_figure / full_figure_walking / full_figure×2
#     → u2net_human_seg + higher background_bleed tolerance (subject fills frame; edge contact
#       at feet/ground plane is legitimate, not contamination)
#   subject_type=character_ELS_in_L0 OR archetype has no L2_char
#     → NO L2 cutout; character is part of L0 OR L2 layer not used

schema_version: "1.0.0"
genre: healing
companion_to: config/manga/panel_templates/iyashikei.yaml
authority_spec: docs/specs/MANGA_LAYER_RENDER_CONTRACT_SPEC.md §8.1 v0.6.1
empirical_evidence: artifacts/manga/stillness_press__ahjan__en_US__anxiety__the_alarm_is_lying/experiments/v4_b_test/ (B-test #1 + #2)

archetypes:

  # ── CLUSTER 1: GROUNDING ───────────────────────────────────────────────

  tea_beat_close_up:
    subject_type: character_hands_only
    scene_context_clause: "soft morning kitchen, warm window light from camera-left, gentle wooden table edge visible at the bottom of frame"
    attached_props_clause: "subject's hands wrapping a warm ceramic cup with gentle steam curling upward"
    cutout_policy:
      model: u2net_human_seg
      keep_attached_props: [cup]
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.40   # ECU + small subject area
      background_bleed_max_pct: 5                    # hands+cup tight; default

  kettle_steam_macro:
    # No L2 layer — object-only archetype (kettle is L3). See iyashikei.yaml §7.1 row.
    subject_type: null
    scene_context_clause: "soft morning kitchen at the stove, warm directional backlight from camera-left, wooden counter texture suggested"
    attached_props_clause: "ceramic kettle in the foreground (the panel subject), no character visible"
    cutout_policy: null

  morning_routine_sequence:
    subject_type: character_full_figure
    scene_context_clause: "soft morning kitchen vignettes, warm window light, wooden table and modest counter visible"
    attached_props_clause: "subject moving through small morning gestures — kettle, cup, soft sweater visible at edges of frame"
    cutout_policy:
      model: u2net_human_seg
      keep_attached_props: [kettle, cup]
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.55
      background_bleed_max_pct: 8                    # full figure tolerates more edge contact

  window_light_threshold:
    subject_type: character_silhouette_back
    scene_context_clause: "threshold between interior and exterior, diffuse backlight from a window at camera-right, soft sage-cream wall on the left"
    attached_props_clause: "no attached props; the character's silhouette against window light is the subject"
    cutout_policy:
      model: birefnet-portrait                       # tight silhouette extraction
      keep_attached_props: []
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.45    # silhouette tends to be smaller
      background_bleed_max_pct: 5
      archetype_exception_note: "window_light_threshold per archetype_exception permits LEFT edge contact (subject_must_not_touch_edge: false); validator handles via safe_zone_row override"

  # ── CLUSTER 2: SOMATIC ─────────────────────────────────────────────────

  character_quiet_face:
    subject_type: character_face_only
    # v0.6.3 (post-B-test-#3 2026-05-20): v0.6.2's "fill the frame" overcorrected —
    # Qwen interpreted literally and rendered subject edge-to-edge, violating
    # safe_zone margins. Pivot to composition-intent language that ALIGNS with
    # margin clause rather than contradicts it.
    scene_context_clause: "centered portrait, subject occupies center of frame with breathing room on all sides, soft warm-cream wall texture behind, no furniture or kitchen visible — wall and window light suggestion only, shallow depth of field, subject does not touch frame edges"
    attached_props_clause: "subject's face is the panel; no objects, no held items, no surrounding scene structure"
    cutout_policy:
      cutout_engine: toonout                         # Phase 1 opt-in (per V5 spec §13)
      model: u2net_human_seg                         # rembg fallback if toonout weights unavailable
      keep_attached_props: []
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.50
      background_bleed_max_pct: 5                    # tightened from 15 (toonout claims 99% PA per V5 §13)
      bleed_tolerance_rationale: "tightened to 5% under cutout_engine=toonout; reverted to 15 under rembg fallback"

  character_face_micro_tension:
    subject_type: character_face_only
    # v0.6.3 (post-B-test-#3 2026-05-20): align with margin clause not against it
    scene_context_clause: "centered portrait, subject occupies center of frame with breathing room on all sides, subtle tension cues in eyes and jaw — micro-furrow at brow, soft warm-cream wall texture behind, no furniture or kitchen visible — wall and window light suggestion only, shallow depth of field, subject does not touch frame edges"
    attached_props_clause: "subject's face is the panel; no objects or held items; subtle tension reading in expression only"
    cutout_policy:
      cutout_engine: toonout                         # Phase 1 opt-in (per V5 spec §13)
      model: u2net_human_seg                         # rembg fallback if toonout weights unavailable
      keep_attached_props: []
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.50
      background_bleed_max_pct: 5                    # tightened from 15 (toonout claims 99% PA per V5 §13)
      bleed_tolerance_rationale: "tightened to 5% under cutout_engine=toonout; reverted to 15 under rembg fallback"

  chest_breath_micro:
    subject_type: character_chest_partial
    scene_context_clause: "soft interior context behind subject's chest and shoulders, warm low-key light, implied seated posture (chair-back or sweater fabric visible)"
    attached_props_clause: "no props; subject's chest and breath are the focus"
    cutout_policy:
      cutout_engine: toonout                         # Phase 1 opt-in (per V5 spec §13)
      model: u2net_human_seg                         # rembg fallback if toonout weights unavailable
      keep_attached_props: []
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.50
      background_bleed_max_pct: 5

  hand_table_micro:
    subject_type: character_hand_only
    scene_context_clause: "wooden table surface in soft warm light, subject's hand resting on or near the table"
    attached_props_clause: "table surface visible, optionally a small prop the hand is near (cup, journal, or phone face-down)"
    cutout_policy:
      cutout_engine: toonout                         # Phase 1 opt-in (per V5 spec §13)
      model: u2net_human_seg                         # rembg fallback if toonout weights unavailable
      keep_attached_props: [cup, journal, phone]     # optional — present per panel's continuity_state
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.40    # ECU framing; hand smaller in frame
      background_bleed_max_pct: 7                    # table edge legitimately at bottom of frame

  # ── CLUSTER 3: COMPANION ───────────────────────────────────────────────

  pet_companion_micro:
    subject_type: character_pet_only
    # v0.6.2 (post-3-model-matrix 2026-05-20): birefnet-portrait unviable; isnet-anime
    # bleeds worst (46.89% on B-test #2). Pivot to: tight positive-framing prompt
    # where the pet itself dominates the frame, leaving rembg almost no scene to bleed.
    # Animal subjects fail u2net_human_seg (HUMAN-only); use isnet-general-use which
    # is mid-bleed (26.98%) but extracts non-human subjects.
    # v0.6.3 (post-B-test-#3 2026-05-20): align with margin clause not against it
    scene_context_clause: "centered close-up of small companion animal (cat curled OR finch perched), animal occupies center of frame with breathing room around silhouette, soft floor or windowsill texture suggestion only at edges, no full furniture or scene structure visible, subject does not touch frame edges"
    attached_props_clause: "the pet is the panel subject; subject's human hand or lap fragment optionally visible at the very edge as a small anchor"
    cutout_policy:
      model: isnet-general-use                       # only model in matrix that extracts non-human subjects
      keep_attached_props: []
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.40
      background_bleed_max_pct: 15
      bleed_tolerance_rationale: "elevated pending tighter-framing re-render; target <=10% post B-test-3 (2026-05-20)"
      note: "pet_companion uses isnet-general-use (non-human-capable). u2net_human_seg is HUMAN-only; birefnet-portrait deferred per CPU-unviability."

  food_preparation_overhead:
    subject_type: character_hands_and_arms
    scene_context_clause: "overhead view of a wooden table or kitchen surface, soft daylight from a window above-right, warm cream + sage palette"
    attached_props_clause: "subject's hands-and-arms working with food items (bowl, knife, fresh vegetables, bread) arranged in the rule-of-thirds composition"
    cutout_policy:
      model: u2net_human_seg
      keep_attached_props: [bowl, knife, food_array, plate]
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.55
      background_bleed_max_pct: 10                   # overhead view: table fills frame; high tolerance

  shared_meal_table_medium:
    subject_type: character_full_figure_x2          # multi-character; V4 single-pass fallback per §15.B.1
    scene_context_clause: "small wooden kitchen table set for two, warm window light from camera-left, soft sage wall behind"
    attached_props_clause: "two place settings — bowls, cups, gentle steam — subject(s) seated facing each other"
    cutout_policy:
      model: u2net_human_seg                         # supports multi-human segmentation
      keep_attached_props: [bowl_x2, cup_x2, food]
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.65    # two characters fill more of safe zone
      background_bleed_max_pct: 10
      v4_launch_fallback: "V4 launch: shared_meal renders single-pass V3.1 per §15.B.1. cutout_policy here is Phase 2 target."

  # ── CLUSTER 4: ENVIRONMENTAL ───────────────────────────────────────────

  sparse_establishing_wide:
    # No L2 layer — environmental archetype (L0 only).
    subject_type: null
    scene_context_clause: "wide establishing shot of the panel's location (room, kitchen, garden, café corner — context-driven), soft daylight, breathable negative space"
    attached_props_clause: "no specific props or characters in foreground; the space itself is the subject"
    cutout_policy: null

  dappled_light_hand:
    subject_type: character_hand_only
    scene_context_clause: "wooden floor, windowsill, or lap surface, soft dappled tree-leaf shadows playing across the surface, warm midday or morning light"
    attached_props_clause: "subject's hand or hands resting on the surface, with dappled-light shadows falling across the skin"
    cutout_policy:
      model: u2net_human_seg
      keep_attached_props: []
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.40
      background_bleed_max_pct: 7                    # surface edge tolerated; dappled shadow is part of subject

  seasonal_anchor_object:
    # No L2 layer — object-only archetype (L3).
    subject_type: null
    scene_context_clause: "soft interior context appropriate to the season (windowsill in spring sunlight, table with autumn-toned plate, etc.), warm daylight"
    attached_props_clause: "a single seasonal object (one fallen petal, one autumn-toned cup, one summer ice glass) center-frame, no character"
    cutout_policy: null

  walking_in_thought_medium:
    subject_type: character_full_figure_walking
    scene_context_clause: "quiet residential walking path, soft mid-morning daylight, suggestion of low garden walls and one tree's overhang"
    attached_props_clause: "subject walking three-quarter view from camera, mid-stride, no held objects, cream sweater and quiet posture"
    cutout_policy:
      model: u2net_human_seg
      keep_attached_props: []
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.50
      background_bleed_max_pct: 12                   # walking shot: feet near bottom edge + ground plane legitimate

  phone_notification_macro:
    subject_type: character_hand_only             # actually "hand holding phone" — same model needs
    scene_context_clause: "subject's lap or table surface in soft interior light, phone is the focal point of the foreground"
    attached_props_clause: "smartphone face-up showing a notification banner with text obscured (blurred or generic shape), subject's hand optionally holding it"
    cutout_policy:
      model: u2net_human_seg
      keep_attached_props: [phone]
      alpha_matting: true
      alpha_matting_foreground_threshold: 240
      alpha_matting_background_threshold: 10
      character_extraction_coverage_min_pct: 0.40
      background_bleed_max_pct: 7                    # lap or table edge tolerated

  long_drop_decompression:
    # No L2 layer — atmospheric L4 only.
    subject_type: null
    scene_context_clause: "wide atmospheric view (sky, water, distant landscape, or empty room) — meditative breathing space, very low tonal density"
    attached_props_clause: "no props or character; pure atmosphere"
    cutout_policy: null

  miyazaki_ma_pause:
    # Character is ELS in L0 per §7.1 — no separate L2.
    subject_type: character_ELS_in_L0
    scene_context_clause: "extreme wide landscape or interior pause — the moment of stillness between beats; sky, trees, or empty hallway; warm or neutral natural light"
    attached_props_clause: "no props; the character may be tiny in the distance (ELS) or absent entirely"
    cutout_policy: null                              # character baked into L0; no extraction

  pendulation_pair_visual_rhyme:
    # Visual-rhyme archetype — uses L0 (and any L2/L3) from the partner panel.
    subject_type: null
    scene_context_clause: "same scene as the rhyme-partner panel (deliberately recurring composition); the only differences are subtle prop_state or temporal evolution"
    attached_props_clause: "same props as the partner panel, but in their later-state form (cup empty if was full, light slightly lower, etc.)"
    cutout_policy: null                              # composes from partner's cached layers
