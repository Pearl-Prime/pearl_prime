# ════════════════════════════════════════════════════════════════════════════
# TOP-8 PRIORITY GENRES (full A–H spec, 5–8 mangaka per genre)
# ════════════════════════════════════════════════════════════════════════════

genres:

  # ── 1. HEALING / IYASHIKEI ─────────────────────────────────────────────────
  healing:
    status: top_8_deep
    label: "Healing / Iyashikei"
    operator_role: "tentpole working register — 15/22 stillness_press dashboard rows"

    A_line_tradition:
      line_weight_profile: variable_quiet
      stroke_economy: high
      construction_lines: hidden
      inking_pressure: low_and_even
      exemplar_attributes:
        - "uniform medium-thin line with light tapering at termini (Ashinano, Yokohama Kaidashi Kikou)"
        - "near-mechanical line regularity allowing watercolor wash overlay (Amano, ARIA)"
        - "slight drybrush on foliage (Ishizuka, Flying Witch — rural iyashikei dialect)"

    B_ink_density_tonal_grammar:
      black_fill_ratio: "5–15%"
      black_fill_floor_rule: "iyashikei pages routinely run sub-10% black coverage; Ashinano sometimes drops below 5%"
      screentone_strategy: minimal_large_area_gradient
      halftone_to_solid_black_ratio: "3:1 toward halftone"
      hatching_style: parallel_sparse_observational
      white_space_treatment: "40–60% of every page white or near-white; YKK establishing pages push 65%+"

    C_body_language_expression:
      face_proportions: anime_realistic_soft
      expression_frequency_cap: low
      expression_vocabulary: [soft_smile, neutral_content, gentle_surprise, peaceful_eyes_closed, gentle_sadness]
      pose_vocabulary: [standing, sitting, walking, observing, holding_cup]
      hand_drawing: anatomical_individual_finger_separation

    D_panel_framing:
      camera_distance_distribution: "60% medium / 25% wide-establishing / 15% close-up — almost no extreme close, almost no extreme long"
      page_rhythm: regular_grid_4_to_6_panels
      background_detail_density:
        landscape: high
        interior: empty_or_light_screentone
      speed_lines_impact_frames: forbidden

    E_color_treatment:
      palette: warm_earth_plus_cool_dawn
      saturation_range: "30–50%"
      color_anchor_mangaka: kozue_amano
      register: gansai_watercolor_layered_transparent

    F_forbidden_drift_patterns:
      - "speed_lines, motion_lines, action_lines, motion_blur"
      - "chiaroscuro, dramatic_lighting, rim_light"
      - "screaming, crying, exaggerated_expression, open_mouth_shouting, large_sweat_drops"
      - "impact_frame, halftone_burst, manga_effect_lines"
      - "8+ panel pages, shattered_glass overlapping panels"

    G_mangaka_exemplars:
      - name: Hitoshi Ashinano
        works: ["Yokohama Kaidashi Kikou (1994–2006)", "Kabu no Isaki (2008–2017)"]
        url: "https://en.wikipedia.org/wiki/Yokohama_Kaidashi_Kikou"
        note: "ink-sparse, watercolor-cover iyashikei; the genre's foundational anchor"
      - name: Kozue Amano
        works: ["ARIA (2002–2008)", "Amanchu! (2008–2024)"]
        url: "https://en.wikipedia.org/wiki/Kozue_Amano"
        note: "the genre's color anchor; gansai watercolor over mechanical-uniform line"
        career_phases:
          - phase: bright_watercolor_aria
            era: "2002–2008"
            characteristic: "ARIA register: lightest line, brightest gansai wash"
          - phase: amanchu_continuing
            era: "2008–2024"
            characteristic: "slightly bolder line, broader expression range"
      - name: Chihiro Ishizuka
        works: ["Flying Witch (2012–)"]
        url: "https://en.wikipedia.org/wiki/Flying_Witch"
        note: "rural-Aomori iyashikei + supernatural-lite; slightly drybrush hatching"
      - name: Afro
        works: ["Laid-Back Camp / Yuru Camp (2015–)"]
        url: "https://en.wikipedia.org/wiki/Laid-Back_Camp"
        note: "outdoor iyashikei, detailed gear, signature thick eyebrows"
      - name: Atto
        works: ["Non Non Biyori (2007–2021)"]
        url: "https://en.wikipedia.org/wiki/Iyashikei"
        note: "rural school iyashikei; SOL/iyashikei boundary case"
      - name: Aoki Ume
        works: ["Hidamari Sketch (2004–)"]
        url: "https://en.wikipedia.org/wiki/Hidamari_Sketch"
        note: "yonkoma iyashikei; intersection with comedy register"
      - name: Tsukumizu
        works: ["Girls' Last Tour / Shoujo Shuumatsu Ryokou (2014–2018)"]
        url: "https://en.wikipedia.org/wiki/Girls%27_Last_Tour"
        note: "iyashikei despite post-apocalyptic setting; quiet line, vast empty space"
      - name: Umi Sakurai
        works: ["A Man and His Cat / Ojisama to Neko (2018–)"]
        url: "https://theconversation.com/iyashikei-healing-manga-comforts-readers-with-attention-to-small-joys-237117"
        note: "modern iyashikei in the Amano lineage; small-joys exemplar"

    H_token_mapping:
      animagine_xl_4_0:
        positive: "masterpiece, absurdres, scenery, outdoors, soft lighting, gentle expression, slice of life, peaceful, sky, detailed background, year 2024"
        negative: "lowres, worst quality, low score, action lines, motion blur, screaming, exaggerated expression"
        empirical_status: validated_by_audit  # audit PR #803 found Animagine 4.0 base alone covers iyashikei
        citation: "https://huggingface.co/cagliostrolab/animagine-xl-4.0"
      qwen_image:
        positive: "soft watercolor anime illustration of a quiet seaside afternoon, gentle smile, warm earth palette, sparse linework, large white space, peaceful atmosphere"
        negative: "harsh lines, dramatic shadows, motion lines, intense expression, dark colors"
        empirical_status: validated_by_research
        citation: "https://github.com/QwenLM/Qwen-Image"
      flux_schnell:
        positive: "serene watercolor manga page, sparse pen-and-ink, soft pastel wash, calm everyday scene, ample white space"
        negative: "dramatic shading, action panels, speed lines, harsh contrast"
        empirical_gap: "FLUX-schnell at 4 steps tends to over-saturate iyashikei wash; smoke-test at 4 vs 8 steps recommended"

  # ── 2. DARK_FANTASY ────────────────────────────────────────────────────────
  dark_fantasy:
    status: top_8_deep
    label: "Dark Fantasy"
    operator_role: "2/22 dashboard failures (jp_07, jp_08); operator-flagged drift = 'looks like a fantasy book cover'"

    A_line_tradition:
      line_weight_profile: variable_brush_pen_heavy
      stroke_economy: very_low
      construction_lines: hidden_but_anatomy_worked_through
      inking_pressure: dynamic_brush_driven
      exemplar_attributes:
        - "minute crosshatching with high variety of hatching directions (Miura)"
        - "hatching follows surface plane (Miura's principle: 'lines go the same angle as the plane of Guts' face')"
        - "Doré + Escher + Bosch lineage of engraving-density backgrounds"
        - "sumi-e washy brush register as alternative pole (Inoue Vagabond)"

    B_ink_density_tonal_grammar:
      black_fill_ratio: "35–60%"
      screentone_strategy: sparse_hand_stippled_pre_1998_or_digital_post_1998
      halftone_to_solid_black_ratio: "1:1.5 toward solid black"
      hatching_style: dense_crosshatch_plus_chiaroscuro_plus_doré_parallel
      white_space_treatment: "paper-white as brightest highlight in etching-style tonal pyramid"

    C_body_language_expression:
      face_proportions: seinen_realist_or_gekiga
      expression_frequency_cap: low
      expression_vocabulary: [stoic, worry_lines, scarred, controlled_grief, bracketed_extreme_rage, death_mask]
      pose_vocabulary: [weighted, grounded, low_center_of_gravity, weapon_stance]
      hand_drawing: highly_anatomical_knuckle_tendon_visible

    D_panel_framing:
      camera_distance_distribution: "intimate-medium-close + heavy over-the-shoulder; wide reserved for armies/landscapes"
      page_rhythm: "long quiet sequences punctuated by full-bleed gore"
      background_detail_density: very_high_engraving_level
      speed_lines_impact_frames:
        speed_lines: sparse_brush_smear_afterimage_hatching
        impact_frames: full_bleed_silhouette_with_white_flash

    E_color_treatment:
      palette: muted_earth_blood_red_deep_blue
      saturation_range: "20–40% with red accents at 60–80%"
      color_anchor_mangaka: miura_for_painted_oil_density
      register: oil_paint_color_inserts_or_sumi_brush_grayscale

    F_forbidden_drift_patterns:
      - "concept art, key visual, painterly, oil painting, frank frazetta, larry elmore, wayne reynolds"
      - "western fantasy book cover, paperback cover, dnd art, magic the gathering"
      - "full color airbrush, gradient background, soft lighting, hero pose splash art"
      - "smooth gradient shading on monsters (must be crosshatched surfaces)"
      - "chibi/SD deformation in serious sequences"

    G_mangaka_exemplars:
      - name: Kentaro Miura
        works: ["Berserk vols 1–13 (1989–1997)", "Berserk vols 14–35 (1998–2010)", "Berserk vols 36–41 + Duranki (2011–2021)"]
        url: "https://en.wikipedia.org/wiki/Kentaro_Miura"
        note: "the foundational dark-fantasy anchor; Doré/Escher/Bosch lineage"
        career_phases:
          - phase: hand_hatched_pre_digital
            era: "1989–1997"
            characteristic: "hand-hatched, screentone-light, brush-heavy"
          - phase: digital_tone_assistant_pipeline
            era: "1998–2010"
            characteristic: "digital tone introduction; same line philosophy at higher density"
            citation: "https://www.skullknight.net/forum/index.php?threads/new-digital-art-techniques-in-berserk.15089/"
          - phase: late_painted_inserts
            era: "2011–2021"
            characteristic: "more painted insert pages, color experimentation"
      - name: Takehiko Inoue
        works: ["Slam Dunk (1990–96)", "Vagabond (1998–)"]
        url: "https://en.wikipedia.org/wiki/Takehiko_Inoue"
        note: "dark-fantasy brush-pole reference (Vagabond only — Slam Dunk is sports register)"
        career_phases:
          - phase: slam_dunk_sports_pen
            era: "1990–1996"
            characteristic: "NOT dark-fantasy register; bright shonen line with speed-line vocabulary"
          - phase: vagabond_sumi_brush
            era: "1998–present"
            characteristic: "traditional Japanese ink-brush/sumi-e — washy, expressive; the sumi-pole anchor for dark-fantasy"
      - name: Makoto Yukimura
        works: ["Vinland Saga (2005–)"]
        url: "https://en.wikipedia.org/wiki/Vinland_Saga"
        note: "cleaner line than Miura but same heavy-blacks ink philosophy; Norse historical-fantasy"
      - name: Junji Ito
        works: ["Uzumaki (1998–99)", "Tomie (1987–2000)", "Gyo (2001–02)"]
        url: "https://longstrideillustration.com/junji-ito-techniques/"
        note: "horror-adjacent dark fantasy; Tachikawa G-nib for irregular hatching"
        cross_genre_link: psychological_horror
      - name: Mohiro Kitoh
        works: ["Shadow Star Narutaru (1998–2003)", "Bokurano (2003–09)"]
        url: "https://en.wikipedia.org/wiki/Mohiro_Kitoh"
        note: "stark, low-tone, psychological-horror dark fantasy; bridges to mecha cluster"
        cross_genre_link: mecha
      - name: Mochizuki Minetarō
        works: ["Dragon Head (1994–99)"]
        url: "https://en.wikipedia.org/wiki/Mochizuki_Minetar%C5%8D"
        note: "catastrophe / claustrophobic horror; low-tone, high-ink-density"
      - name: Akihito Tsukushi
        works: ["Made in Abyss (2012–)"]
        url: "https://medium.com/@Naumande/the-visual-art-of-made-in-abyss-c65557c790c1"
        note: "soft-seinen-fantasy alternative to Berserk; round character + watercolor BG"

    H_token_mapping:
      animagine_xl_4_0:
        positive: "monochrome, greyscale, manga, comic, dark fantasy, dense crosshatching, heavy shadows, ink, seinen manga, armor, sword, year 2005, masterpiece, high score"
        negative: "western comics, dnd, fantasy book cover, frank frazetta, oil painting, painterly, full color, gradient background, soft lighting, airbrush, 3d, cg, photorealistic, hero pose splash art"
        recommended_lora: "DARK FANTASY XL v1.1 (audit PR #803 — cross-test on Animagine 4.0 required; if degraded, build Phoenix-native)"
        lora_url: "https://civitai.com/models/1223108/dark-fantasy-xl"
        lora_license_status: "🟡 — Civitai 6-flag panel verification required"
      qwen_image:
        positive: "Anime illustration of a black and white seinen manga page in the Berserk tradition: armored swordsman in heavy crosshatched ink, dense Dore-style hatching on cloak and armor, paper-white highlights with crosshatched midtones, no screentone, dramatic chiaroscuro"
        negative: "photo, cg, 3d, color, painterly, oil painting, fantasy book cover, soft lighting"
        empirical_gap: "Qwen-Image base lacks explicit Berserk cluster; smoke-test seinen + gekiga keywords as anchors"
      flux_schnell:
        positive: "monochrome manga panel, black and white ink, dense crosshatching, dark fantasy seinen manga, armored warrior, heavy blacks, hatching shadows, no color"
        negative: "color, painterly, 3d, western comic, fantasy book cover, blurry"
        empirical_gap: "FLUX-schnell at 4 steps frequently smooths crosshatch into mid-grey wash; smoke-test 4 vs 8 steps + duplicate `dense ink crosshatching` keyword"

  # ── 3. PSYCHOLOGICAL_HORROR ────────────────────────────────────────────────
  psychological_horror:
    status: top_8_deep
    label: "Psychological Horror"
    operator_role: "2/22 dashboard failures (jp_11, jp_12); operator-flagged drift = 'horror with same line economy as healing'"
    subgenre_split_recommendation:
      rationale: "horror has TWO opposing poles (Ito-sparse vs Maruo-dense) with opposite line-density grammars; one config cannot reliably trigger both. Split into _sparse and _dense subgenre configs."
      configs:
        psychological_horror_sparse: "Ito-pole; sparse-to-escalating; cosmic-horror cross"
        psychological_horror_dense: "Maruo-pole; uniform-dense; gothic-romance/ero-guro cross"
        gekiga_middle: "Umezu/Hino; captured by either config + `gekiga` tag"

    A_line_tradition:
      line_weight_profile: bipolar_sparse_or_dense
      stroke_economy: bipolar
      construction_lines: hidden_non_decorative
      inking_pressure_dynamics:
        ito_pole: "neat in normalcy → frayed/jittery as dread escalates"
        maruo_pole: "uniform-pressure throughout, engraved consistency"
      exemplar_attributes:
        - "Ito: starts neat, escalates to panicked hatching as dread builds (dental-technician training shows in flesh detail)"
        - "Maruo: thin precise ukiyo-e-derived line + German New Objectivity chiaroscuro"
        - "Umezu/Hino gekiga middle: dramatic slow mood-build, dialog-light"

    B_ink_density_tonal_grammar:
      black_fill_ratio: "30–60% — opposite of iyashikei's 5–15% floor"
      screentone_strategy: heavy_patterned_dread_stippling
      halftone_to_solid_black_ratio:
        ito_pole: "70% hatching/screentone, 30% solid black"
        maruo_pole: "40% solid black, 60% precise crosshatch"
      hatching_style: cross_hatching_mandatory_in_both_poles
      white_space_treatment: "compressed; when present, threatening (Uzumaki's spiral-cloud sky inverts iyashikei's empty-as-restful)"

    C_body_language_expression:
      face_proportions: realistic_elongated_gekiga
      expression_frequency_cap: dread_restraint
      expression_vocabulary: [flat_affect, slack_jawed, eyes_hollow_at_peak, mouth_elongated_at_peak]
      expression_rule: "pages of frozen affect → single peak panel of distortion (NOT continuous gentle expression like healing)"
      pose_vocabulary: [stillness, frozen, statuesque, doll_stiff, wrong_angled_loose_limb_hino]
      hand_drawing: over_articulated_or_doll_stiff

    D_panel_framing:
      camera_distance_distribution: uncomfortable_in_between_distances_plus_extreme_close_at_peak
      page_rhythm: dread_escalation_lovecraftian
      background_detail_density: dense_architectural_or_unsettling_sparse
      speed_lines_impact_frames:
        speed_lines: forbidden
        impact_frames: replaced_by_dread_frames_full_page_reveal_dense_screentone

    E_color_treatment:
      palette: cold_desaturated_green_black_with_blood_red_accent_only
      saturation_range: "10–30% base; 60%+ red accents only"
      color_anchor_mangaka: ito_for_cold_green_viz_deluxe_palette
      forbidden_palette: [pastel_pink, sparkle_highlight, warm_sunlight, bright_color]

    F_forbidden_drift_patterns:
      - "smooth line, healing-mode wispy/feathered strokes"
      - "iyashikei white space, soft lighting, peaceful atmosphere"
      - "sparkle effects, blush stickers, big-eye shojo proportions"
      - "speed lines, impact frames"
      - "warm backgrounds, cottagecore, sunny"

    G_mangaka_exemplars:
      - name: Junji Ito
        works: ["Tomie (1987–2000)", "Uzumaki (1998–99)", "Soichi", "Hellstar Remina (2005)"]
        url: "https://en.wikipedia.org/wiki/Junji_Ito"
        note: "master of escalating-line-deterioration as panic indicator; sparse-pole anchor"
        career_phases:
          - phase: early_tomie_shojo_horror_magazine
            era: "1987–2000s"
            characteristic: "sparser, cleaner shojo-adjacent line (Tomie ran in Monthly Halloween shojo-horror)"
          - phase: post_2010_expansion
            era: "2010–"
            characteristic: "denser screentone use, fully developed cross-hatch dread vocabulary"
      - name: Suehiro Maruo
        works: ["Mr. Arashi's Amazing Freak Show / Shōjo Tsubaki (1984)", "The Strange Tale of Panorama Island (2008, Edogawa Ranpo adaptation)", "Ultra-Gash Inferno"]
        url: "https://en.wikipedia.org/wiki/Suehiro_Maruo"
        note: "ero-guro engraver — Taisho woodblock + German New Objectivity in thin uniform line; dense-pole anchor"
      - name: Kazuo Umezu
        works: ["The Drifting Classroom (1972–74)", "Reptilia/Hebi Onna (1960s)", "Cat Eyed Boy (1967)"]
        url: "https://en.wikipedia.org/wiki/Kazuo_Umezu"
        note: "god of horror manga; shojo-aesthetic + folk-horror imagery hybrid; gekiga-middle anchor"
      - name: Hideshi Hino
        works: ["Panorama of Hell (1982)", "Hell Baby (1982)", "Bug Boy (1975)"]
        url: "https://www.popmatters.com/116412-masters-of-horror-manga-kazuo-umezu-and-hideshi-hino-2496128691.html"
        note: "childlike rounded line undercut by abject body horror"
      - name: Daijiro Morohoshi
        works: ["Yōkai Hunter (1974)", "Mud Men (1975–82)", "Ankoku Shinwa (1976)"]
        url: "https://en.wikipedia.org/wiki/Daijiro_Morohoshi"
        note: "surrealist-horror via Dalí/Bosch/de Chirico; folkloric cosmic dread"
      - name: Shigeru Mizuki
        works: ["Hakaba Kitarō kashibon (1950s–60s)", "Showa: A History of Japan (1988–89)"]
        url: "https://en.wikipedia.org/wiki/Shigeru_Mizuki"
        note: "yōkai canon-builder; horror-adjacent with comic-grotesque blend"
        career_phases:
          - phase: kashibon_kamishibai_era
            era: "1950s–early 60s"
            characteristic: "rough rental-comic line, traveling-paper-drama framing"
          - phase: late_memoir_era
            era: "1988–89+"
            characteristic: "photo-traced realism beside cartoonish Mizuki figures"
      - name: Hiroaki Samura
        works: ["Blade of the Immortal (1993–2012)"]
        url: "https://en.wikipedia.org/wiki/Hiroaki_Samura"
        note: "horror-adjacent gekiga; charcoal-textured ink density"
      - name: Kanako Inuki
        works: ["Presents (1990s)", "School Zone"]
        url: "https://en.wikipedia.org/wiki/Kanako_Inuki"
        note: "horror-shojo hybrid; bridge case for Umezu lineage"

    H_token_mapping:
      animagine_xl_4_0:
        positive_ito_pole: "monochrome, greyscale, manga, horror, sketch, ink (medium), cross-hatching, screentone, gekiga, comic, year 2007, masterpiece, high score"
        positive_maruo_pole: "monochrome, dense linework, ero guro, gekiga, etching, taisho era, masterpiece"
        negative: "iyashikei, soft lighting, sparkle, bloom, pastel, healing, shoujo, blush, sunny, lens flare, low contrast"
        empirical_caveat: "ero guro may push NSFW gating — pair with `sensitive` rating tag, not `explicit`"
        recommended_loras_to_explore:
          - "https://civitai.com/models/79155/junji-ito-style-sdxl-now-supported"
          - "https://civitai.com/models/126608/sdxl-horror-style"
        lora_license_status: "🟡 — verify Civitai 6-flag commercial settings"
      qwen_image:
        positive_ito_pole: "A monochrome manga panel in the style of Junji Ito horror manga, dense crosshatch shading, screentone dread, escalating linework, no color"
        positive_maruo_pole: "Black and white ero-guro manga in the style of Suehiro Maruo, thin precise lines, Taisho woodblock influence, chiaroscuro, etched texture"
        negative: "NOT a healing iyashikei scene, NOT soft pastel"
        empirical_caveat: "Qwen has weaker booru-tag parsing than Animagine; prefer prose. `screentone halftone` literal token produces faded grayscale; supplement with `high contrast black ink, no grey wash` (https://lilting.ch/en/articles/manga-bw-workflow-test-draft)"
      flux_schnell:
        positive: "Junji Ito horror manga panel, monochrome ink illustration, dense cross-hatching, screentone dread shading, gekiga style, high contrast black and white, no color, oppressive atmosphere"
        no_negative_prompts_available: true
        counter_bias_workaround: "add `avoid soft pastel, avoid sunlit warmth` as positive descriptors per FLUX workaround syntax"
        empirical_gap: "FLUX-schnell tends to add color drift even with `monochrome`; recommend post-process desaturation in pipeline or grain LUT"

  # ── 4. MECHA ───────────────────────────────────────────────────────────────
  mecha:
    status: top_8_deep
    label: "Mecha"
    operator_role: "single most-flagged failure across cookbook + community-audit + this PR; operator-flagged drift = 'framed like Western concept art / no mecha visible'"

    A_line_tradition:
      line_weight_profile: variable_uniform_on_plates_tapered_on_cables
