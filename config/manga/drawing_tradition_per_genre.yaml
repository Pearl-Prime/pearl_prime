# Per-Genre Drawing-Tradition Spec — Phoenix Omega Manga Cookbook Companion
#
# Status: AUTHORITY (new, this PR — research-only).
# Schema version: 1.0
# Created: 2026-05-02
# Branch: agent/manga-drawing-traditions-research-20260502
#
# Purpose:
#   The cookbook PR (#802) established WHICH tokens trigger each genre on FLUX/SDXL/
#   Pony. This spec adds the layer the cookbook lacks: WHAT each genre's drawing
#   tradition actually LOOKS like — line, ink, expression, panel framing, palette,
#   mangaka exemplars — and how those visual properties map onto the
#   commercially-clean base stack from audit PR #803 (Qwen-Image / Animagine XL 4.0
#   / FLUX-schnell). The cookbook YAML follow-up PR will populate its
#   `drawing_tradition:` block per genre by referencing this file.
#
# Tier-weighted depth per operator's I1+ override:
#   - Top-8 priority genres = full A–H spec (5–8 mangaka exemplars each)
#   - 17 deferred genres = schema-complete stubs (all A–H sub-blocks present;
#     populated only with `status: deferred_phase2` + 1-line scope note + 2–3
#     named mangaka anchors). The cookbook follow-up PR fills content; structural
#     rework is forbidden.
#
