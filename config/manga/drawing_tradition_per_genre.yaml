      inking_pressure: architectural_draftsman
      exemplar_attributes:
        - "fine even line over dense schematic detail (Shirow, Appleseed/GitS — uses straight-edge rules and french curves)"
        - "subtle/spartan figure line + dense purposeful background line (Otomo Akira)"
        - "gritty weathered zimmerit-style hatching on armor skirts (Kondo Gundam 0079)"

    B_ink_density_tonal_grammar:
      black_fill_ratio: "25–45% — high; mecha cast deep cockpit shadows, joint cavities, intake voids"
      screentone_strategy: heavy_patterned_3_to_5_densities_per_panel
      halftone_to_solid_black_ratio: balanced
      hatching_style: parallel_following_curved_armor_plane
      white_space_treatment: "rare and load-bearing — chrome highlights, cockpit glass glare"

    C_body_language_expression:
      face_proportions:
        pilot: seinen_realist_or_shonen_realist_hybrid
        mech_separately_drawn: rigid_industrial
      expression_frequency_cap: pilot_relaxed_in_cockpit_mech_rigid
      pose_vocabulary:
        mech: [stance, kneel, thruster_burn]
        pilot: [seated_in_cockpit, casual_off_duty]
