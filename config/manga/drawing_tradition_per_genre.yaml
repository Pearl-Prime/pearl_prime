        - "clean high-contrast line weight that survives speed-line overlay (Oda)"
        - "anatomical realism under exaggerated motion (Murata)"

    B_ink_density_tonal_grammar:
      black_fill_ratio: "15–35%"
      black_fill_floor_rule: "battle pages need legibility at speed — never drop below ~15% or impact frames read flat"
      screentone_strategy: speed_line_and_impact_burst
      halftone_to_solid_black_ratio: "1:1"
      hatching_style: radial_speed_lines
