# Panel layout template — Color Vertical Webtoon (WEBTOON Canvas / SMARTOON / Piccoma)
# Per Phoenix Omega catalog format-aware production (PR #626 §production_weight).
# Drives the format-aware render queue: when a series_plan declares
# panel_layout_template = this file, the renderer produces 800px-wide
# vertical strip output suitable for WEBTOON Canvas / Piccoma submission.

schema_version: "1.0.0"
template_id: "vertical_scroll_webtoon"
format: "color_vertical_webtoon"

# ── Strip geometry ──────────────────────────────────────────────────────────
strip_width_px: 800             # WEBTOON Canvas requirement
strip_segment_height_max_px: 1280   # one stacked segment max before split
total_episode_height_target_px: 12000  # ~30-50 panels stacked
file_size_target_mb: 9.5
file_size_hard_cap_mb: 20

# ── Panel composition ───────────────────────────────────────────────────────
panels_per_episode_target: [30, 50]    # min, max — Canvas convention
silent_panel_ratio_target: 0.20         # 20% silent (no dialogue) panels
reaction_shot_frequency: "high"
gutters_px: 12                          # vertical separation between panels
edge_to_edge_panels_allowed: true       # webtoon strength

# ── Color + render ──────────────────────────────────────────────────────────
color_mode: "full_color"
render_backend: "flux_schnell"          # Pearl Star ComfyUI primary
character_consistency: "ip_adapter_or_lora"   # reuse 289 portraits + IP-Adapter
panel_aspect_default: "9:16"            # tall, mobile-native

# ── Reading direction ──────────────────────────────────────────────────────
reading_direction: "vertical_scroll_top_to_bottom"

# ── Scene + dialogue constraints ───────────────────────────────────────────
words_per_balloon_target: [8, 18]       # webtoon mobile-readability
balloons_per_panel_max: 2
sound_effect_density: "moderate"        # less than page manga, more than self-help
text_min_font_size_px: 14               # mobile readability requirement
text_recommended_font_size_px: 18

# ── Episode pacing ─────────────────────────────────────────────────────────
hook_panel: 1                           # episode 1: must hook in first scroll
cliffhanger_required: true              # webtoon retention pattern
cliffhanger_at_panel_position: "end"

# ── Compatible target platforms (intersect with ai_policy_blockers.yaml) ──
compatible_platforms:
  - webtoon_canvas
  - amazon_kdp_comics    # collected-volume PDF compilation also acceptable
  - globalcomix
  - line_manga_indies    # accepts both formats
incompatible_platforms:
  - bw_only_print_manga  # this template is color-only

# ── Genre fit (from PR #626 genre_weight_per_format) ───────────────────────
strong_genre_fit:
  - romance_fantasy
  - action_fantasy
  - isekai
  - melodrama
  - shojo
  - manhwa
  - webtoon_romance
medium_genre_fit:
  - horror
  - iyashikei_color
  - shonen
weak_genre_fit:
  - seinen_psychological     # works better in B&W
  - cultivation              # works better in B&W

# ── Notes for renderer / illustrator ───────────────────────────────────────
notes: |
  Mobile-first reading experience. Optimize for thumb-scroll cadence:
  big emotional beats, clean silhouettes, generous gutters between scenes.
  Each scroll-span (≈1280px segment) should land an emotional beat or
  narrative reveal — flat scroll-spans lose retention.
  Source: PR #626 platform_research §webtoon — "Piccoma frames SMARTOON
  as a distinct reading experience, not just manga in another color mode."
