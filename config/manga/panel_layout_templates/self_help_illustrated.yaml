# Panel layout template — Direct Self-Help Illustrated
# Per Phoenix Omega catalog format-aware production (PR #626 §production_weight).
# Small slice (2-5% per market) — Adam J. Kurtz / Mari Andrew / Gemma Correll
# illustrated-self-help market. Distinct from manga catalog: directly marketed
# as self-help, not genre fiction.
#
# This is NOT manga — it's a separate format that ships through Pearl Prime
# audiobook/ebook channels alongside the wellness book catalog. Included here
# because the rendering pipeline can produce illustrated-essay output using the
# same character-portrait reuse system.

schema_version: "1.0.0"
template_id: "self_help_illustrated"
format: "direct_self_help_illustrated"

# ── Page geometry ───────────────────────────────────────────────────────────
trim_size_inches: [5.5, 8.25]            # Andrews McMeel illustrated self-help standard
bleed_mm: 0                              # often no bleed in illustrated-essay format
print_dpi: 300

# ── Composition ─────────────────────────────────────────────────────────────
pages_per_book_target: [120, 200]        # short-form illustrated essay
illustrations_per_page_avg: 1            # one illustration accompanies one essay-page
text_dominant: true                      # text is primary, illustration supports
silent_pages_allowed: true               # full-page illustration no text OK

# ── Color + render ──────────────────────────────────────────────────────────
color_mode: "full_color_or_duotone"
render_backend: "flux_schnell"
character_consistency: "loose"           # essay illustrations don't require LoRA-grade consistency

# ── Reading direction ──────────────────────────────────────────────────────
reading_direction: "left_to_right_horizontal"

# ── Compatible target platforms ────────────────────────────────────────────
compatible_platforms:
  - amazon_kdp_comics      # KDP self-help/illustrated category
  - google_play_books
  - apple_books
  - kobo
incompatible_platforms:
  - webtoon_canvas         # not manga / not webtoon
  - piccoma_smartoon
  - line_manga_indies

# ── Marketing positioning (different from manga!) ─────────────────────────
bisac_codes:
  primary:
    - "SEL027000"          # Self-Help / Stress Management
    - "ART016000"          # Art / General Cartooning & Comic Strips
    - "HUM015000"          # Humor / Form / Comic Strips & Cartoons
target_audience: "illustrated self-help readers (Kurtz / Andrew / Correll market)"
comp_titles_real:
  - "Things Are What You Make of Them (Adam J. Kurtz)"
  - "Am I There Yet? (Mari Andrew)"
  - "All My Friends Are Dead (Avery Monsen)"
notes: |
  This format is NOT marketed as manga. It is illustrated self-help — the
  same lane as Andrews McMeel illustrated-essay catalog. Include in manga
  catalog production weight so the renderer can produce it from the same
  Pearl Star pipeline, but ship through the wellness-book distribution
  channels (KDP self-help category), not manga channels.
  Slice size capped 2-5% per market per PR #626 §self_help_slice.
