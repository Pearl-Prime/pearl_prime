# Panel layout template — B&W Traditional Page Manga (yokoyomi)
# Per Phoenix Omega catalog format-aware production (PR #626 §production_weight).
# Drives the format-aware render queue: when a series_plan declares
# panel_layout_template = this file, the renderer produces page-based B&W
# manga output suitable for KDP Comics / Bookwalker / Comic C'moA / LINE
# Manga Indies submission.

schema_version: "1.0.0"
template_id: "bw_page_rtl"
format: "bw_page_manga"

# ── Page geometry ───────────────────────────────────────────────────────────
trim_size_inches: [6.0, 9.0]            # KDP graphic novel standard
trim_size_mm_alternate: [128, 182]      # JP B6 tankōbon standard
bleed_mm: 3
safe_zone_mm: 5
page_aspect: "2:3"
print_dpi: 300

# ── Panel composition ───────────────────────────────────────────────────────
pages_per_chapter_target: [18, 22]      # genre-typical
panels_per_page: [3, 7]                  # variable, layout-driven
silent_panel_ratio_default: 0.20
spread_frequency: "rare"                 # 1 per 4-6 chapters at peaks
panel_layout_style: "variable_grid"      # not fixed grid; emotional pacing

# ── Color + render ──────────────────────────────────────────────────────────
color_mode: "bw_with_screen_tones"
render_backend: "flux_schnell_bw_postprocess"   # color render → B&W convert + tone
character_consistency: "ip_adapter_or_lora"
panel_aspect_default: "variable"

# ── Reading direction ──────────────────────────────────────────────────────
reading_direction: "right_to_left_horizontal"
spine_position: "right"                  # standard JP / KDP manga binding

# ── Scene + dialogue constraints ───────────────────────────────────────────
words_per_balloon_target: [12, 18]      # print readability
balloons_per_panel_max: 3
sound_effect_density: "high"             # JP onomatopoeia tradition
text_min_font_size_pt: 7                 # print convention
typography: "calligraphic_sfx_plus_sans_dialogue"

# ── Chapter pacing ─────────────────────────────────────────────────────────
chapter_hook_required: true
page_turn_dramatic_beats: 2              # plant emotional reveals on right-page
chapter_close_pattern: "decompression_or_cliffhanger"

# ── Compatible target platforms ────────────────────────────────────────────
compatible_platforms:
  - amazon_kdp_comics
  - bookwalker            # status: ALLOWED_GREY
  - comic_cmoa            # status: ALLOWED (AI manga proven at #1 Jan 2026)
  - line_manga_indies     # accepts both formats
  - globalcomix
incompatible_platforms:
  - webtoon_canvas        # vertical scroll not page-format
  - piccoma_smartoon      # color vertical only

# ── Genre fit (PR #626) ────────────────────────────────────────────────────
strong_genre_fit:
  - seinen
  - iyashikei
  - shonen
  - horror
  - cultivation
  - josei_essay_manga
medium_genre_fit:
  - shojo
weak_genre_fit:
  - webtoon_romance       # better as vertical scroll

# ── Notes for renderer / illustrator ───────────────────────────────────────
notes: |
  Traditional manga craft. Page composition is the unit, not panels.
  Right-to-left flow: high-impact panels go top-right, page-turn reveals
  go end-of-spread (right page bottom-right panel). Screen tones for
  shading, not gradient — JP printing economy + reader expectation.
  Source: PR #626 §ja_JP "Oricon top sellers remain overwhelmingly B&W
  page manga (Jujutsu Kaisen, ONE PIECE vol. 108 = 1.55M copies in 2024)."
