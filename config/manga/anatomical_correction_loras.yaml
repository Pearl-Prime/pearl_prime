# Anatomical correction roster — Phoenix Omega (hands, face, eyes, post-process)
#
# Research session: Pearl_Research — 2026-05-07 — P0-3 operator gap (anatomy stack).
# Authority: mirrors tier semantics + checklist pattern from
#   artifacts/research/community_lora_roster_2026-04-29.yaml
#
# License tier convention:
#   🟢 commercial-clean — OSS or known-clean commercial path AND Civitai/HF flags
#        + base model permit shipped product use (verified on source page).
#   🟡 commercial-conditional — needs per-page Civitai 6-flag review, AGPL network
#        compliance, BFL FLUX terms, unknown training data, or base-model caveat.
#   🔴 non-commercial-blocked — NC license, Pony commercial block, IP/celebrity
#        risk, or explicit commercial contract required (e.g. inswapper default).
#
# Every entry: verify source page before bundling into production graphs.

schema_version: "1.0"
audit_date: "2026-05-07"
research_doc: artifacts/research/anatomical_correction_audit_2026-05-07.md
scope: anatomical_correction

