    source_url: https://github.com/deepinsight/insightface
    asset_type: onnx_face_swap
    license_tier: 🔴
    license_caveat: |
      InsightFace policy: inswapper-series commercial requires contact/licensing.
      Default Phoenix stance: BLOCK until enterprise contract referenced in audit trail.
    notes: >
      Operator audit item — commercial-clean default: NO unless enterprise
      contract is executed and archived.

# ── Per-integration quick reference (see research MD for prose) ──────────────
integration_notes:
  animagine_xl_4_0:
    layer_order: |
      Genre/register LoRA → anatomy/detail correction (negative embed OR negative-stack LyCORIS
      OR light positive hand LoRA) → tiny face/eye LoRAs → (optional) ADetailer pass.
    default_first_pass: |
      Negative Hands XL embed + selective Better hands LoRA only if QA flags systematic errors.
  qwen_image:
    default_first_pass: |
      Prompt + regional inpaint; defer community LoRAs until explicitly Qwen-tagged assets clear 🟡 gate.
  flux_schnell:
    default_first_pass: |
      Hand Detail FLUX & XL (260852) as canonical substitute for "flux-hand-fix"; retune strength vs schnell schedule.

# ── Engineering checklist (same intent as community_lora_roster) ───────────
license_verification_checklist:
  required_per_asset:
    - "Open source URL; record modelVersionId + file hash after download"
    - "Confirm Civitai six commercial-permission toggles (or HF / ModelScope equivalent)"
    - "Confirm base model commercial path (Animagine, Qwen-Image, BFL FLUX, etc.)"
    - "Record training-data IP risk statement if present"
    - "If AGPL tool in graph, capture compliance owner + source-offer process"
  blockers:
    - "Any ambiguous NC or missing commercial flag → keep 🟡; do not recommend in default graphs"

