# Prop evolution enums — declares the legal state-transition graph per prop type.
# Per MANGA_LAYER_RENDER_CONTRACT_SPEC.md §6.2.
#
# Reachability semantic (V1 — deterministic):
#   prop_state[N+1] is reachable from prop_state[N] iff:
#     - identical, OR
#     - the two values are adjacent (index distance ≤ 1) in the declared list
#
# This means cup: empty -> half is OK; empty -> full is NOT (must pass through half).
# Adjacent semantics enforce "one beat = one state change" without auxiliary graphs.

schema_version: "1.0.0"
type: "prop_evolution"
prop_types:

  cup:
    states:
      - empty
      - half
      - full
      - tipped_spilled

  kettle:
    states:
      - off_burner
      - on_burner_just_lit
      - on_burner_boiling
      - off_burner_residual_steam

  phone:
    states:
      - face_down
      - face_up_dark
      - face_up_notification
      - in_hand_being_read

  journal:
    states:
      - closed
      - open_to_blank_page
      - open_to_written_page
      - closed_with_pen_visible

  plant:
    states:
      - normal
      - wilting
      - watered_normal
