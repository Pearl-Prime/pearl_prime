schema_version: "1.0.0"
registry_id: manga_production_line_agents_v1
status: unwired
wiring_reason: >-
  This registry defines production-line role contracts, but no runtime router
  currently consumes it. Keeping the status explicit prevents documentation-only
  agent roles from being reported as active production wiring.
wiring_roadmap: >-
  Wire this registry when the production-line agent router resolves role inputs,
  outputs, acceptance tests, and failure handoffs from this file; remove
  status: unwired only after that non-test runtime consumer and call-path tests land.
roles:
  manga_editor:
    job: "Own scope, genre promise, doctrine subtlety, and release-quality story decisions."
    inputs: [series_brief, audience, genre_blueprint, story_doctrine_contract]
    outputs: [editorial_brief, approved_story_scope, revision_decisions]
    contract: "No unresolved story/doctrine blocker enters production."
    acceptance_tests: [genre_engine_present, subtle_embed_nonlecture, chapter_hooks_present]
    failure_handoff: manga_writer
  manga_writer:
    job: "Author manga-native beats, dialogue, visual carriers, and chapter propulsion."
    inputs: [editorial_brief, story_architecture, mode_vessel]
    outputs: [story_plan, beat_plan, writer_handoff]
    contract: "Every beat has purpose, delta, and trace IDs."
    acceptance_tests: [trace_ids_complete, anti_lecture_pass, hook_cliffhanger_pass]
    failure_handoff: manga_story_doctor
  manga_story_doctor:
    job: "Repair incoherent arcs, weak escalation, overt teaching, and non-diegetic modes."
    inputs: [story_plan, doctrine_report, editorial_notes]
    outputs: [revised_story_plan, repair_log]
    contract: "Repairs preserve genre causality and doctrine subtlety."
    acceptance_tests: [story_doctrine_gate, emotional_escalation_gate]
    failure_handoff: manga_editor
  manga_panel_director:
    job: "Translate story beats into camera, panel purpose, reading order, and structural templates."
    inputs: [story_plan, genre_blueprint, structural_template_registry]
    outputs: [panel_plan, page_rhythm_plan]
    contract: "Planned beat and panel purpose remain traceable."
    acceptance_tests: [panel_count_consistency, template_resolves, reading_order_valid]
    failure_handoff: manga_story_doctor
  manga_layer_art_director:
    job: "Own layer roles, support surfaces, selected-component recovery, and composition sidecars."
    inputs: [panel_plan, layer_plan, raw_v5_output]
    outputs: [reviewed_layers, structural_plan, assembly_manifest]
    contract: "layer_00 is preview only; selected roles are honest."
    acceptance_tests: [l0_purity, l2_purity, l2_quality, support_zone]
    failure_handoff: manga_panel_director
  manga_letterer:
    job: "Create readable bubbles, SFX, locale shaping, vertical text, and furigana."
    inputs: [dialogue, lettering_plan, locale, safe_zones]
    outputs: [lettered_panels, lettering_report]
    contract: "No silent locale or writing-mode fallback."
    acceptance_tests: [lettering_locale_match, bubble_readability, jlreq_gate]
    failure_handoff: manga_layout_artist
  manga_layout_artist:
    job: "Compose pages and webtoon flow with unambiguous reading order."
    inputs: [final_panels, page_plan, lettering_report]
    outputs: [completed_pages, webtoon_strip, layout_report]
    contract: "Every output panel maps to the planned panel and remains readable."
    acceptance_tests: [panel_count_match, reading_order, gutter_and_crop]
    failure_handoff: manga_panel_director
  manga_qa_reader:
    job: "Run technical QA and blind-read scorecards without inventing approval."
    inputs: [completed_episode, proof_packet, comparator_rubric]
    outputs: [gate_reports, blind_read_scorecard, blocker_list]
    contract: "Human approval is separate from automated validation."
    acceptance_tests: [technical_gates, blind_read_bar, scorecard_complete]
    failure_handoff: manga_pm
  manga_pm:
    job: "Coordinate branches, PRs, proofs, dependencies, approvals, and release decisions."
    inputs: [lane_closeouts, master_ledger, release_runbook]
    outputs: [master_ledger, final_verdict, release_decision]
    contract: "GREEN only when all scoped evidence and approvals are present."
    acceptance_tests: [all_prs_merged, closeouts_current, final_integrator]
    failure_handoff: manga_editor
