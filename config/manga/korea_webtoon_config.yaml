# Korea Webtoon Track Pipeline Configuration
# Authority: Big View Phase 3
# Sources:
#   config/catalog/market_catalog_registry.yaml  (korea: 30% webtoon / 50% ebook / 20% audiobook)
#   config/manga/character_brand_registry.yaml   (digital_ground brand = primary Korea brand)
#   config/manga/manga_brand_series_plan.yaml    (digital_ground genre: manhwa)
#
# Korea is a webtoon-native market. Content is optimised for vertical-scroll
# platforms (Kakao Page, Naver Webtoon, Ridi) with full-colour episodes.
# Unlike Japan (manga partnership), Korea uses a direct-upload model.

schema_version: "1.0"
authority: "Big View Phase 3"

market:
  market_id: korea
  locale: ko_KR
  language: ko
  currency: KRW

# ── TRACK SPLIT ──────────────────────────────────────────────────────────────
track_split:
  webtoon_pct: 30
  ebook_pct: 50
  audiobook_pct: 20

# ── WEBTOON TRACK ────────────────────────────────────────────────────────────
webtoon_track:
  track_id: webtoon_vertical
  format: vertical_scroll_full_colour

  platforms:
    - id: kakao_page
      upload_url_hint: "https://kakaopage.com/creators"
      format: vertical_scroll
      episode_length_panels: [40, 55, 80]   # (min, opt, max)
      weekly_cap: 2   # episodes per brand per week
      monetisation: freemium_unlocked
      notes: "Primary Korea webtoon platform; strong on drama and romance adjacents"

    - id: naver_webtoon
      upload_url_hint: "https://comic.naver.com/webtoon"
      format: vertical_scroll
      episode_length_panels: [35, 50, 70]
      weekly_cap: 1
      monetisation: fast_pass
      notes: "Naver: slower approval, higher quality bar, stronger global spillover"

    - id: ridi
      upload_url_hint: "https://ridibooks.com/"
      format: vertical_scroll
      episode_length_panels: [30, 45, 65]
      weekly_cap: 2
      monetisation: coin_purchase
      notes: "Ridi: ebook-adjacent, strong on romance and slice-of-life"

    - id: google_play_kr
      notes: "Secondary — webtoon files converted to fixed-layout ebook for Google Play KR"

  # Episode pipeline
  episode_pipeline:
    atom_bridge_enabled: true
    atom_mapping_strategy: episode_to_atom  # same pattern as Japan
    episode_word_count_est: 600             # webtoon dialogue is tighter than manga
    episode_to_ebook_ratio: 12              # 12 episodes → 1 ebook equivalent

    cadence: weekly   # Korea webtoon readers expect weekly (faster than Japan bi-weekly)
    translation_pipeline: qwen_cjk6  # Korean via CJK6 Qwen lane

    episode_metadata_required:
      - episode_number
      - series_id
      - brand_id
      - teacher_id
      - topic_id
      - persona_id
      - atom_id
      - title_ko
      - title_en
      - synopsis_ko
      - synopsis_en
      - panel_count
      - release_week
      - platform_id

  # Primary brand for Korea webtoon (digital_ground is manhwa-native)
  primary_brand: digital_ground
  secondary_brands:
    - cognitive_clarity   # seinen maps well to Korean adult webtoon demographic
    - somatic_wisdom      # shojo maps to romance/healing webtoon market
    - heart_balance       # shojo, emotional resonance

  all_brands_eligible: true


# ── VISUAL SPEC FOR VERTICAL FORMAT ─────────────────────────────────────────
visual_spec:
  format: vertical_scroll
  canvas_width_px: 720   # Kakao standard
  panel_height_px_range: [200, 600]
  colour_mode: full_colour  # Korea = full colour (vs Japan traditional B&W manga)
  text_direction: top_to_bottom
  speech_bubble_style: rounded_korean
  font_stack:
    primary: "Noto Sans KR"
    fallback: "Apple SD Gothic Neo, sans-serif"

  # Webtoon-specific pacing differences from manga
  pacing_notes: >
    Korean webtoons use a "panel-per-beat" rhythm — each panel is one emotional
    beat, not one action beat. Breath sequences are 3-5 full-width vertical panels
    of nature/space imagery. Chapter hooks (pull panels) at bottom of each episode.


# ── EBOOK + AUDIOBOOK TRACKS (non-webtoon) ──────────────────────────────────
ebook_track:
  platforms: [yes24, ridi, kakao_page_ebook, apple_books_kr, google_play_kr]
  translation_pipeline: qwen_cjk6
  locale_override: ko_KR
  price_multiplier: 0.95  # Korean ebook market slightly price-sensitive
  weekly_cap: 6

audiobook_track:
  platforms: [kakao_mini, naver_audiobook, melon_podcast, spotify_kr]
  tts_voice_pipeline: elevenlabs_ko  # ElevenLabs Korean voice
  locale_override: ko_KR
  weekly_cap: 2


# ── ATOM-TO-EPISODE BRIDGE ────────────────────────────────────────────────────
atom_webtoon_bridge:
  enabled: true
  count_episodes_as_atoms: true  # mirrors Japan bridge setting

  atom_to_episode:
    use_atom_topic: true
    use_atom_persona: true
    use_atom_keywords: true
    use_atom_exercises: true

  episode_to_atom:
    extract_dialogue_hooks: true
    extract_visual_metaphors: true
    extract_breath_sequences: true


# ── WEEKLY PRODUCTION TARGET ─────────────────────────────────────────────────
weekly_production_target:
  webtoon_episodes_per_brand: 1    # weekly cadence (primary = digital_ground)
  ebook_titles_per_brand: 3
  audiobook_titles_per_brand: 1
  total_per_brand: 5
