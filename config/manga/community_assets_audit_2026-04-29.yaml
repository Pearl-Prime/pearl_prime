# Community Assets Audit — Phoenix Omega manga image-generation
#
# Status: PHASE 1 (operator-approved 2026-04-29).
# Phase 2 dimensions are scaffolded with status: deferred_phase2.
#
# Authority scope: research artifact. Provides candidate inventory, license
# tier flags, and fork/wrap/build calls for downstream engineering decisions.
# Does NOT modify any production config; runcomfy_batch.py and workflow JSONs
# are out-of-scope for this PR (separate follow-up).
#
# License tier convention:
#   🟢 commercial-clean    — MIT/Apache/BSD, RAIL++-M with explicit commercial
#                            allowance, CC-BY, or Civitai with all 3 commercial
#                            flags ON.
#   🟡 commercial-conditional — commercial OK with caveat (attribution required,
#                              specific dependency carries a different license,
#                              or AGPL contamination risk for wrapper code).
#   🔴 non-commercial      — explicit NC tag, or undocumented / unknown.
#
# All dates are last_updated where the upstream surface declared one. Where
# none was visible we mark "not_listed" rather than guess.

schema_version: "1.0"
audit_date: "2026-04-29"
phase: 1
phase_1_scope:
  - base_diffusion_model_for_manga
  - character_consistency_tool
  - manga_style_loras_per_genre  # 4 genres deep: mecha, dark_fantasy, fantasy_adventure, healing-control
  - comfyui_workflows
  - comfyui_custom_nodes
  - lora_training_tools
  - rakuten_and_qwen_specific_finds
phase_2_deferred:
  - prompt_libraries_and_cookbooks
  - datasets_for_finetuning_or_reference
  - post_processing_and_lineart_cleanup
  - qa_and_drift_detection
  - panel_layout_and_speech_balloons
  - orchestration_and_batch
  - manga_style_loras_per_genre  # remaining 21 of 25 canonical genres

# ── Grounding observations (from PNG inspection + workflow JSON read) ──────
grounding_observations:
  workflow_uses_schnell_at_dev_settings:
    file: config/comfyui_workflows/manga_covers/flux_character_portrait_template.json
    finding: |
      Workflow loads flux1-schnell-fp8.safetensors but runs KSampler at
      steps=24, cfg=4.0, sampler=euler, scheduler=normal — these are FLUX.1-dev
      settings. Schnell is distilled and spec'd for ~4 steps, cfg=1.0. Running
      Schnell at Dev settings produces unpredictable register (oscillates
      between B&W manga line and over-saturated painted illustration).
    cross_ref: "Cookbook PR §0 (schnell-vs-dev) — same finding."
    severity: high
  no_character_consistency_in_workflow:
    finding: |
      The 7-node workflow has CheckpointLoaderSimple, two CLIPTextEncode,
      EmptyLatentImage, KSampler, VAEDecode, SaveImage. No LoRA loader, no
      IP-Adapter, no PuLID, no ControlNet, no CharacterReferenceImage path.
      Character consistency is structurally absent.
    severity: high
  training_inference_base_mismatch:
    finding: |
      brand_lora_plans.yaml training_defaults.base_model = "FLUX.1-dev" while
      protagonist_loras[*].base_model = "flux1-schnell-fp8" and the inference
      workflow uses flux1-schnell-fp8. Per Black Forest Labs the FLUX.1-dev
      license is non-commercial and derivatives (LoRAs) inherit that
      restriction — and dev-trained LoRAs underperform when applied at
      schnell inference. Double-fault.
    cross_ref: "https://huggingface.co/black-forest-labs/FLUX.1-dev/blob/main/LICENSE.md"
    severity: critical
  png_inspection_summary:
    method: "Read tool multimodal inspection of 3 failed + 5 working main_character.png outputs"
    failures_inspected:
      - path: assets/manga_catalog/stillness_press/stillness_jp_07/main_character.png
        intended_genre: "TBD (per brief, on the failure list)"
        observation: |
          Painted ink-wash portrait, green hair, washi-paper aesthetic with
          calligraphy stamps. Hybrid CN/JP ink-painting register, NOT manga line
          art. Style hallucination — base model summoning training-data residue.
      - path: assets/manga_catalog/stillness_press/stillness_jp_28/main_character.png
        intended_genre: "TBD"
        observation: |
          Clean B&W manga linework with ribbon and books. Technically a
          competent shojo-register output — debatable why this is on the
          failure list. May be misclassified or genre-mismatch with prompt.
      - path: assets/manga_catalog/stillness_press/stillness_press_mecha_us/main_character.png
        intended_genre: mecha
        observation: |
          Female pilot in olive flight-suit with goggles holding a small radio.
          Reads as RETRO 80s ANIME AVIATION (Porco-Rosso-adjacent) — the
          aesthetic register is right but **no mecha asset is visible**.
          Diagnosis: asset-absence, not stylistic drift. A mecha-specific
          LoRA (Super Robot Diffusion XL or equivalent) would close this.
    working_inspected:
      - path: assets/manga_catalog/stillness_press/stillness_press_romance_us/main_character.png
        observation: "Color slice-of-life café scene; competent."
      - path: assets/manga_catalog/stillness_press/stillness_press_dark_fantasy_us/main_character.png
        observation: |
          Green-shaded character in vine-overgrown forest. Actually IS dark-
          fantasy-flavored. May be miscategorized as failure — verify with
          cookbook PR's drift autopsy.
      - path: assets/manga_catalog/stillness_press/stillness_jp_22/main_character.png
        observation: "Clean B&W shojo manga, schoolgirl with pink accent. Working."
      - path: assets/manga_catalog/stillness_press/stillness_press_essay_us/main_character.png
        observation: "Lineart-only sketchy register, woman at window, yellow accent. Working."
      - path: assets/manga_catalog/stillness_press/stillness_press_window_season/main_character.png
        observation: "Color illustration with calligraphy character — CN register, register-mismatch."
    register_oscillation_pattern: |
      Outputs alternate between B&W manga line (jp_22, jp_28, essay_us) and
      full-color painted illustration (jp_07, mecha_us, dark_fantasy_us,
      window_season). No style lock — confirms no LoRA-locked register and
      Schnell-at-Dev-settings drift.

# ── Dimension 1: base diffusion model ──────────────────────────────────────
audit_dimensions:

  - dimension: base_diffusion_model_for_manga
    label: "Base diffusion model best for manga (Phoenix-commercial constraint)"
    status: phase_1_complete
    candidates:
      - id: flux-schnell
        source_url: https://huggingface.co/black-forest-labs/FLUX.1-schnell
        license_text: "Apache 2.0"
        license_tier: 🟢
        last_updated: "2024-08-01"
        commercial_use: "yes — unrestricted"
        manga_quality_assessment: |
          Mid. FLUX is photo-leaning by training mix and underperforms on
          B&W manga register without a heavy style LoRA. Phoenix's current
          stack uses this model.
        critical_caveat: |
          Workflow currently runs Schnell at 24 steps cfg 4.0 — these are
          Dev settings. Schnell is spec'd for 4 steps cfg 1.0. Fix this
          first before drawing any conclusion about Schnell's manga capability.
      - id: flux-dev
        source_url: https://huggingface.co/black-forest-labs/FLUX.1-dev
        source_url_license: https://bfl.ai/legal/non-commercial-license-terms
        license_text: "FLUX.1 [dev] Non-Commercial License v2.0"
        license_tier: 🔴
        last_updated: "2024-08-01"
        commercial_use: |
          NO unless via BFL paid API or self-hosted commercial license
          (https://bfl.ai/pricing/licensing). Derivatives — including LoRAs
          trained on this model — inherit the non-commercial restriction.
        phoenix_use: |
          brand_lora_plans.yaml currently lists FLUX.1-dev as training
          base. This is a license violation for any commercial output.
          MUST be migrated.
      - id: animagine-xl-4.0
        source_url: https://huggingface.co/cagliostrolab/animagine-xl-4.0
        license_text: "CreativeML Open RAIL++-M"
        license_tier: 🟢
        last_updated: "2025-02-13"  # 4.0 Opt variant added
        commercial_use: "yes — modification + commercial use both permitted"
        manga_quality_assessment: |
          High for anime-register; SDXL-architecture fine-tune trained on
          8.4M anime images with native Danbooru tag prompting (1girl,
          masterpiece, score tags, rating tags, year tags). Out-of-the-box
          covers shojo, shonen, seinen, josei registers. Known weak on
          complex hand poses.
        recommended_role: |
          PRIMARY base for Phoenix manga catalog. Migrate from FLUX-schnell
          unless schnell+heavy-style-LoRA shows competitive output in side-
          by-side test. Anime-native register reduces the LoRA stack burden
          per genre.
      - id: pony-diffusion-v6-xl
        source_url: https://huggingface.co/LyliaEngine/Pony_Diffusion_V6_XL
        license_text: "Modified Fair AI Public License 1.0-SD"
        license_tier: 🔴
        last_updated: "2024"
        commercial_use: |
          NO commercial inference on monetized services without explicit
          permission from PurpleSmartAI (contact@purplesmart.ai). Civitai
          and HuggingFace have explicit grants; Phoenix would not.
        notes: "Ecosystem is large but blocked by license for Phoenix."
      - id: noobai-xl
        source_url: https://huggingface.co/Laxhar/noobai-XL-1.0
        license_text: "Restrictive — prohibits commercialization including derivative models or model-generated products"
        license_tier: 🔴
        commercial_use: "NO. Hard stop."
        notes: "Strong technical capability, completely blocked for Phoenix."
      - id: illustrious-xl
        source_url_general: https://civitai.com/articles/8642/ilxl-illustrious-xl-nai-xl-noobai-xl-model-comparison
        license_tier: 🔴
        commercial_use: |
          Generated images are not commercial-OK if not edited (see Civitai
          comparison article). Most popular community LoRAs (incl. Super
          Robot Diffusion XL) are built on Illustrious — meaning even where
          the LoRA's own license is permissive, the base model blocks
          downstream commercial use.
      - id: qwen-image
        source_url: https://github.com/QwenLM/Qwen-Image
        source_url_blog: https://qwen.ai/blog?id=qwen-image-2512
        license_text: "Apache 2.0"
        license_tier: 🟢
        last_updated: "2026-02-10 (Qwen-Image-2.0); 2025-Q4 (Qwen-Image-2512 — Finer Details)"
        architecture: "20B MMDiT"
        commercial_use: "yes — unrestricted (Apache 2.0 base)"
        manga_quality_assessment: |
          Strong AND first-class CJK text rendering. Released with explicit
          support for "professional typography rendering... including PPTs,
          posters, COMICS, and more." Generates manga where dialogue and
          per-frame composition can be specified — directly relevant to
          Phoenix's speech-bubble integration (which FLUX/SDXL handle
          poorly). Qwen-Image-Edit-2511 ships with selected popular LoRAs
          integrated (see ColorManga, Multiple-Angles-LoRA on ModelScope).
        ecosystem_supplement:
          - id: qwen-image-i2l
            description: "One-image-to-LoRA — 'zero-barrier' character/style LoRA training from a single reference image."
            url: https://www.modelscope.cn/learn/3343
            why: |
              Directly attacks the per-character-LoRA cost wall at 800-
              config catalog scale. If validated, rewrites Phoenix's cast-
              LoRA budget. (Verify claim with in-house bench before
              committing.)
          - id: qwen-image-edit-2511-multiple-angles-lora
            url: https://www.modelscope.cn/models/fal/Qwen-Image-Edit-2511-Multiple-Angles-LoRA
            why: "Multi-angle character generation — solves panel-to-panel character consistency."
          - id: colormanga-qwen-lora
            url: https://civitai.com/models/1985245/colormanga
            why: "Manga colorization LoRA designed for Qwen-Image base."
        notes_jp_cn_finding: |
          Surfaced by the JP/CN subagent scan as the highest-value English-
          ecosystem miss. CN community is forking from FLUX → Qwen-Image
          for complex text rendering and Chinese typography. ModelScope
          hosts the active LoRA pack.
    recommendation: qwen-image (PRIMARY) + animagine-xl-4.0 (SECONDARY) for genres outside Qwen's strength
    recommendation_change_note: |
      Initial recommendation was animagine-xl-4.0 alone. Updated post-JP/CN
      subagent finding: Qwen-Image (Apache-2.0 + CJK text + i2L one-shot
      LoRAs) is a stronger primary for Phoenix's commercial-manga use case
      because (a) it also covers ja_JP/zh_TW/zh_CN/ko_KR locales which are
      a known Phoenix expansion lane (per protagonist_loras locale fields),
      and (b) the i2L workflow could collapse the per-character LoRA cost.
      Animagine 4.0 stays in the recommendation as the fallback for genres
      where Qwen-Image's training register is weaker (specifically, classic
      shojo-line, kinetic shonen, and the heaviest manga-line-art register
      where SDXL anime fine-tunes still lead).
    fork_wrap_build: fork
    rationale: |
      Animagine XL 4.0 is the only commercial-clean (🟢) anime-native base.
      FLUX-schnell is also 🟢 but photo-leaning and requires a heavy manga
      LoRA stack to reach Animagine's out-of-box register. The current
      Phoenix-on-FLUX path is a legal problem (dev training + non-commercial
      license inheritance) and a quality problem (Schnell-at-Dev settings).
      Migrating the manga catalog to Animagine XL 4.0:
        1. Resolves the licensing ambiguity in one move.
        2. Aligns base model with the Danbooru tag schema the community
           prompt cookbooks already use.
        3. Unlocks the SDXL/Animagine LoRA ecosystem (vastly larger than
           FLUX manga LoRAs as of 2026-04-29).
    fallback_path: |
      If Animagine migration is blocked for any reason: keep FLUX-schnell,
      retrain LoRAs on Schnell via ostris/FLUX.1-schnell-training-adapter,
      fix workflow to 4 steps cfg 1.0, and accept the heavier per-genre
      style-LoRA training burden.
    use_case_specific_picks:
      bw_print_manga: animagine-xl-4.0 + manga-lineart helper LoRA
      color_webtoon: animagine-xl-4.0 base
      kinetic_action: animagine-xl-4.0 + Super-Robot-Diffusion-style mecha LoRA (license-verify required)
      iyashikei_minimal: animagine-xl-4.0 base (no LoRA needed; covered)
      mecha_specific: animagine-xl-4.0 + custom Phoenix mecha LoRA (community LoRAs are Illustrious-locked)

# ── Dimension 2: character consistency ─────────────────────────────────────
  - dimension: character_consistency_tool
    label: "PuLID vs InstantID vs FaceID vs LoRA-per-character"
    status: phase_1_complete
    candidates:
      - id: pulid-flux-with-facenet
        source_url_main: https://github.com/ToTheBeginning/PuLID
        source_url_comfyui: https://github.com/lldacing/ComfyUI_PuLID_Flux_ll
        license_text: "Apache-2.0 (PuLID + ComfyUI_PuLID_Flux_ll)"
        license_tier: 🟢  # via FaceNet loader path
        last_updated_pulid: "2024-10-31 (v0.9.1)"
        last_updated_comfyui_node: "2025-02-18"
        commercial_use: |
          Use the PulidFluxFaceNetLoader (VGGFace2-trained FaceNet via
          facenet-pytorch). Avoid the default PulidFluxInsightFaceLoader —
          AntelopeV2 is from InsightFace's face-recognition stack which is
          non-commercial unless InsightFace commercial license purchased.
        flux_compatibility: native (FLUX.1-dev + FLUX.1-schnell)
        animagine_compatibility: |
          PuLID v1.1 supports SDXL → applies to Animagine XL 4.0. Use
          cubiq/PuLID_ComfyUI native node for SDXL path.
        multi_character: yes (left/right reference image ordering)
        community_consensus_2026: |
          PuLID-FLUX widely cited as the FLUX-native character consistency
          tool. Comparative testing shows InstantID > FaceID > PuLID on
          face-similarity benchmarks but PuLID requires lighter resources
          and "preserves artistic integrity better" per multiple workflow
          authors.
      - id: instantid
        source_url: https://github.com/InstantID/InstantID
        license_text: "Apache-2.0 code, but model weights tied to InsightFace AntelopeV2"
        license_tier: 🔴
        commercial_use: |
          Effectively NO. Code is Apache-2.0 but the face encoder requires
          InsightFace's non-commercial AntelopeV2 weights. Authors
          acknowledged the conflict but no FaceNet-equivalent shipped as
          of 2026-04-29.
        notes: "Highest face-similarity score but blocked for Phoenix."
      - id: ip-adapter-faceid
        license_tier: 🔴
        commercial_use: |
          Same InsightFace dependency issue. Disqualified.
      - id: lora-per-character
        approach: |
          Train a small character LoRA per protagonist using ai-toolkit on
          FLUX-schnell or Animagine XL 4.0.
        license_tier: 🟢
        cost: |
          ~10-25 min on H100, ~20-45 min on A100, ~$1-3 self-hosted
          per character. 8-15 reference images per character.
        notes: |
          Highest fidelity, fully Phoenix-controlled IP, license-clean.
          Weakness: doesn't generalize to one-shot character introduction
          mid-narrative; requires pre-training each named character.
    recommendation_combined: |
      Hybrid: train LoRA-per-protagonist for the named cast (already
      planned in brand_lora_plans.yaml — 14 protagonist LoRAs). Use
      PuLID-FLUX-with-FaceNet for one-shot characters that don't warrant
      full LoRA training.
    fork_wrap_build:
      lora_per_character: build (Phoenix is already on this path)
      pulid_with_facenet: fork (lldacing/ComfyUI_PuLID_Flux_ll, drop-in)
    rationale: |
      Both paths are 🟢 commercial-clean. LoRA-per-character is already
      Phoenix's chosen strategy and is the right call for the named cast.
      PuLID+FaceNet adds a one-shot path for ephemeral characters without
      retraining; the integration cost is one custom node + one Loader
      swap in workflow JSON.

# ── Dimension 3: per-genre LoRAs (4 genres deep — Phase 1) ─────────────────
  - dimension: manga_style_loras_per_genre
    label: "Community LoRAs by genre register (Phase 1: failure-genres + control)"
    status: phase_1_partial  # 4 of 25 genres covered
    by_genre:
      mecha:
        candidates:
          - id: super-robot-diffusion-xl
            source_url: https://civitai.com/models/124747
            base_model_compat: Illustrious-XL v0.1 (SDXL architecture)
            last_updated: "2024-10-26"
            license_tier: 🟡
            license_caveat: |
              LoRA itself defaults to Civitai permissive flags but base
              model (Illustrious) has commercial restrictions on outputs.
              Cannot ship Phoenix-commercial without verifying this LoRA
              works on Animagine XL 4.0 (also SDXL — should transfer with
              quality variance).
            trigger_words: "SRS, MRS, RRS, FRS, RARS, NJRS, MECHA-BACK-UNIT, MECHA-HUGE-ARMS, MECHA-QUAD-LEGS, MECHA-TANK-LEGS, MECHA-WINGS, ROBOTANIMESTYLE (22+ total)"
            recommended_strength: 0.6-0.8
            coverage: "Gundam / EVA / Armored Core / Battle Tech style mecha"
            notes: |
              Standout breadth — multi-style mecha coverage. The Phoenix
              fix-priority pick. Test against Animagine XL 4.0 first;
              if degraded, train a Phoenix mecha LoRA on Animagine.
          - id: gundam-personnel-mobile-suit-style
            source_url: https://civitai.com/models/256541
            base_model_compat: SD 1.5
            license_tier: 🟡
            last_updated: "older"
            notes: "Older base; documented for completeness only."
          - id: zeon-pilot-pony-sdxl
            source_url: https://civitai.com/models/564031
            base_model_compat: Pony Diffusion V6 XL
            license_tier: 🔴
            notes: "Pony base blocks commercial use. Disqualified."
        recommendation: super-robot-diffusion-xl
        fork_wrap_build: fork (verify Animagine compat) OR build (train Phoenix mecha LoRA on Animagine 4.0)
        notes_to_engineering: |
          Mecha is the failure-genre most-likely-to-stay-broken with public
          LoRAs because the comprehensive options (Super Robot Diffusion,
          Gundam-specific) are all Illustrious/Pony/SDXL-locked. Phoenix
          should plan for an in-house mecha LoRA on Animagine 4.0 if the
          fork-test fails.
      dark_fantasy:
        candidates:
          - id: dark-fantasy-xl-v1.1
            source_url: https://civitai.com/models/1223108/dark-fantasy-xl
            base_model_compat: SDXL 1.0
            last_updated: "2025-04-04"
            license_tier: 🟡  # Civitai default flags assumed allow but page didn't enumerate
            trigger_words: "dark fantasy art style"
            notes: "Painterly/illustration register; Animagine-compatible."
          - id: dark-gothic-fantasy-3.01
            source_url: https://civitai.com/models/293532
            base_model_compat: SDXL
            license_tier: 🟡
          - id: dark-fantasy-sdxl-alpha
            source_url: https://civitai.com/models/127127
            base_model_compat: SDXL
            license_tier: 🟡
            notes: "Older alpha; documented for completeness."
        recommendation: dark-fantasy-xl-v1.1
        fork_wrap_build: fork (with license-flag verification per LoRA page)
      fantasy_adventure:
        candidates:
          - id: animagine-xl-4.0-base
            source_url: https://huggingface.co/cagliostrolab/animagine-xl-4.0
            base_model_compat: SELF (this IS the base)
            license_tier: 🟢
            notes: |
              Animagine 4.0's training corpus heavily covers shonen/shojo
              fantasy adventure register (8.4M anime images). The base
              model alone covers fantasy_adventure / isekai out of the box.
              No LoRA needed for this genre — promote it as a "no LoRA
              required" lane in Phoenix's catalog plan.
          - id: anyanimagine-xl
            source_url: https://civitai.com/models/1190951/anyanimagine-xlfor-lora-training
            base_model_compat: Animagine fork
            last_updated: "2025"
            license_tier: 🟢
            notes: |
              Modified Animagine optimized for further LoRA training (less
              style baked in). Useful if Phoenix wants to layer a custom
              fantasy-style LoRA without fighting the default register.
          - id: lineart-anime-redmond
            source_url: https://civitai.com/models/127018/lineaniredmond-linear-manga-style-for-sd-xl-anime-style
            base_model_compat: SDXL (universal manga lineart helper)
            license_tier: 🟡
            notes: |
              Use to push fantasy_adventure outputs toward B&W manga line
              art register when needed for print delivery.
        recommendation: animagine-xl-4.0-base (no LoRA) + lineart-anime-redmond as optional helper
        fork_wrap_build: wrap (use the base directly; helper LoRA optional)
      healing:
        # ── CONTROL GENRE — already producing acceptable outputs ──
        candidates:
          - id: animagine-xl-4.0-base
            source_url: https://huggingface.co/cagliostrolab/animagine-xl-4.0
            license_tier: 🟢
            notes: |
              Iyashikei / healing register is naturally covered by the
              Animagine 4.0 base model — soft anime aesthetic, warm palette,
              gentle posing all default. Confirms control-genre status.
              Phoenix's current iyashikei outputs (jp_22, romance_us) work
              for the same reason — base model covers this lane.
          - id: studio-ghibli-redmond
            source_url: https://civitai.com/models/137562/studioghibliredmond-studio-ghibli-lora-for-sd-xl
            base_model_compat: SDXL / Z-Image-Turbo / FLUX.Klein / QWEN-IMAGE
            last_updated: "2026-02-19"
            license_tier: 🔴
            license_caveat: |
              Creator explicitly states "non-commercial, fan-made creation,
              intended solely for entertainment purposes" + Ghibli IP
              acknowledged. Disqualified for Phoenix commercial.
          - id: ghibli-style-xl
            source_url: https://civitai.com/models/359367
            base_model_compat: SDXL
            license_tier: 🔴
            notes: |
              "Trained on a Ghibli Studio publicly available dataset" —
              same IP risk regardless of LoRA license. Document for
              completeness, do not recommend.
        recommendation: animagine-xl-4.0-base (no LoRA needed)
        fork_wrap_build: wrap
        control_genre_finding: |
          Healing is the genre that confirms the audit's central thesis:
          for genres well-covered by anime base models, Phoenix doesn't
          need a LoRA at all. The "build a per-genre LoRA roster" reflex
          is over-engineering for genres in the base model's training
          density. The genres that DO need a LoRA are mecha and dark
          fantasy (which sit outside Animagine's default density).

