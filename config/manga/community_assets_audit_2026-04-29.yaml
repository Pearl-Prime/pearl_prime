# ── Top-line operator decisions ────────────────────────────────────────────
operator_decisions_surfaced:
  best_base_model: "qwen-image (primary) + animagine-xl-4.0 (secondary)"
  best_base_model_rationale: |
    Qwen-Image (Apache 2.0, 20B MMDiT, 2026): commercial-clean, first-class
    CJK text for speech bubbles, ModelScope LoRA pack, Qwen-Image-i2L for
    one-shot character LoRAs. Animagine XL 4.0 (RAIL++-M, SDXL): commercial-
    clean, anime-native, larger SDXL/Animagine LoRA ecosystem for genres
    outside Qwen's strongest register (kinetic shonen, classic B&W manga line).
    Both 🟢. Operator picks one as primary based on locale priority — Qwen
    if ja_JP/zh_*/ko_KR locales matter (they do, per protagonist_loras
    locale fields), Animagine if en_US-only is acceptable.
  best_character_consistency: "hybrid — LoRA-per-protagonist (build) + PuLID-FLUX-with-FaceNet (fork) for one-shots"
  best_comfyui_workflow_to_fork: |
    Primary: anime-style consistent character (PuLID + OpenPose + Janus) — comfyui.org/en/unlock-anime-style-characters-with-ai
    Multi-character secondary: PuLID Flux II RunComfy template
  best_lora_training_pipeline: "ai-toolkit (ostris, MIT, FLUX-schnell native)"
  failure_genre_lora_recommendations:
    mecha: "fork super-robot-diffusion-xl (Illustrious) → cross-test on Animagine 4.0; if degraded, train Phoenix mecha LoRA"
    dark_fantasy: "fork dark-fantasy-xl-v1.1 (SDXL) — verify Civitai license flags per page"
    fantasy_adventure: "no LoRA needed — Animagine XL 4.0 base covers this register"
    healing_control: "no LoRA needed — confirms thesis (base model density covers this lane)"
  schnell_vs_dev_finding_cross_referenced: yes  # cookbook PR §0
