# ── Dimension 6: LoRA training tools ───────────────────────────────────────
  - dimension: lora_training_tools
    label: "Best free LoRA training pipeline for FLUX-schnell + Animagine in 2026"
    status: phase_1_complete
    candidates:
      - tool: ai-toolkit (ostris)
        source_url: https://github.com/ostris/ai-toolkit
        license: MIT
        license_tier: 🟢
        flux_schnell_supported: yes (config: train_lora_flux_schnell_24gb.yaml)
        flux_dev_supported: yes
        animagine_sdxl_supported: yes
        multi_aspect_ratio: yes
        difficulty: medium
        vram_target: 24GB
        notes: |
          PRIMARY recommendation. FLUX-schnell native via ostris's
          schnell-training-adapter (https://huggingface.co/ostris/FLUX.1-schnell-training-adapter).
          MIT license = no contamination. ~1085+ commits, actively maintained.
      - tool: kohya_ss / sd-scripts
        source_url: https://github.com/bmaltais/kohya_ss
        license: Apache-2.0
        license_tier: 🟢
        flux_supported: "yes (since v24+)"
        difficulty: medium-high
        notes: |
          PRIMARY co-recommendation. Industry standard, deep config
          surface. Use when ai-toolkit's defaults don't suffice.
      - tool: FluxGym
        source_url: https://github.com/cocktailpeanut/fluxgym
        license: MIT
        license_tier: 🟢
        backend: "Kohya sd-scripts under a Gradio UI"
        flux_schnell_support: |
          "Supported but suboptimal results" per project README.
        difficulty: low
        vram_target: 12-20GB
        notes: |
          Onboarding tool — useful for non-engineers to train protagonist
          LoRAs without CLI. For schnell-native training, use ai-toolkit
          directly until FluxGym's schnell support matures.
      - tool: SimpleTuner
        source_url: https://github.com/bghira/SimpleTuner
        license: AGPL-3.0
        license_tier: 🟡  # AGPL contamination risk
        notes: |
          Capable but AGPL — if Phoenix imports/wraps SimpleTuner and
          distributes the wrapper externally, the wrapper inherits AGPL.
          Internal-only use is OK. AVOID unless a SimpleTuner-only
          feature is materially needed.
      - tool: OneTrainer
        source_url: https://github.com/Nerogar/OneTrainer
        license: AGPL-3.0
        license_tier: 🟡
        notes: |
          AGPL same as SimpleTuner. Furkan Gözükara's comparative review
          concludes "no benefit of using OneTrainer for FLUX training
          instead of using Kohya" — text encoder training disabled by
          design. Skip.
    recommendation: ai-toolkit (primary) + kohya_ss (advanced-config fallback)
    fork_wrap_build: fork
    avoid_agpl_unless: |
      A specific SimpleTuner/OneTrainer feature is materially required
      (e.g., a training mode the others don't support). Document the
      reason if the choice is made.
    expected_training_specs_per_character_lora:
      reference_image_count: 8-15
      training_time_h100: "10-25 min"
      training_time_a100: "20-45 min"
      cost_self_hosted_runpod: "$1-3 per character"

