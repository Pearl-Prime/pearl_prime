schema_version: "1.0.0"
contract_id: manga_story_doctrine_v1
required_trace_fields:
  - series_id
  - episode_id
  - chapter_id
  - panel_id
  - beat_id
  - doctrine_id
episode:
  require_genre_engine: true
  min_chapters: 1
  min_visual_embed_beats: 1
  min_craft_carriers: 1
chapter:
  require_opening_hook: true
  require_closing_hook: true
  require_emotional_delta: true
  max_consecutive_exposition_beats: 1
craft_carriers:
  accepted:
    - metaphor
    - analogy
    - parable
    - recurring_object
    - embodied_choice
    - relationship_repair
    - failed_coping_strategy
  parable_profile_gated: true
anti_lecture:
  prohibited_phrases:
    - "the lesson is"
    - "you must understand"
    - "here are the steps"
    - "what you need to do is"
    - "let me explain how life works"
  max_instructional_sentences_per_beat: 2
mode:
  supported: [teacher, music]
  require_vessel_when_declared: true
  require_handoff_preservation: true
