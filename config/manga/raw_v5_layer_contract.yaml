schema_version: "1.0.0"
contract_id: raw_v5_layer_contract_v2
truth:
  layer_00: model_preview_only
  layer_01: environment_support_plate
  layer_02: isolated_foreground_subject_candidate
  layer_03: isolated_prop_or_subject_recovery_candidate
prompt_contract:
  positive:
    - "Return separable RGBA layers with one semantic role per layer."
    - "layer_01 must contain only the environment and support surfaces."
    - "layer_02 must contain one complete isolated foreground subject with visible support/contact anatomy."
    - "layer_03, when requested, must contain one isolated prop or recovery subject only."
  negative:
    - "no floating objects"
    - "no partial chairs or tables in the foreground subject layer"
    - "no ladder or background fragments in layer_02"
    - "no invisible legs or missing support anatomy"
    - "no cockpit, hangar, room, or environment in layer_02"
    - "no merged subject-plus-environment cutout"
telemetry:
  required_fields:
    - raw_layer_role_confidence
    - contamination_suspected
    - candidate_layer_for_subject
    - raw-v5-layer-roles
certification:
  contaminated_status: not-green
  fallback: selected_component_structural_assembly
  auto_certify_raw_roles: false
