# mc_endurance_checklists.yaml — machine-usable MC endurance checklists per canonical genre.
#
# status: unwired
#   (Lane 07 of the 2026-07-24 manga process uplift pack wires this into
#   config/manga/story_excellence_gates.yaml + excellence_gate.py and flips this
#   marker. Until then check_manga_wiring.py treats this file as declared-unwired.)
#
# SOURCE OF TRUTH: artifacts/research/manga_mc_endurance_study_2026-07-24.md
#   Every item carries a `source:` anchor of the form
#   "mc_endurance_study#<family>/<section>" pointing at that study's family section
#   (sections: exemplars, traits(=1), endurance(=2), bond(=3), anti(=4), wellness(=5)).
#
# SCHEMA (stable keys — Lane 07 consumes these; do not rename):
#   schema_version: "1.0"
#   families:
#     <canonical_genre_id>:            # exactly the 25 ids of canonical_genre_list.yaml,
#                                      # matching story_excellence_gates.yaml::genre_core_evidence
#       must_have:                     # list of {item, source} — MC fails the genre without these
#       should_have:                   # list of {item, source} — strong-default expectations
#       anti_patterns:                 # list of {item, source} — presence = defect
#       endurance_mechanics:           # list of {item, source} — what carries 100+ episodes
#   Each `item` is ONE testable sentence (a reviewer or gate can answer yes/no
#   against a series plan / chapter script).
#
# Consumers (target): phoenix_v4/manga/story_quality/excellence_gate.py (Lane 07),
#   Pearl_Editor QA pass (Lane 07 §Editor pass), series planners (advisory).

schema_version: "1.0"
status: unwired
last_updated: "2026-07-24"
source_study: artifacts/research/manga_mc_endurance_study_2026-07-24.md

families:

  battle:
    must_have:
      - item: "The MC states a concrete external goal that is unreachable within any single arc."
        source: "mc_endurance_study#battle/endurance"
      - item: "The MC has one moral competence already maxed at series start while physical competence is visibly inadequate."
        source: "mc_endurance_study#battle/traits"
      - item: "Every power gain is paid for with a visible, persistent cost on the MC's body or bonds."
        source: "mc_endurance_study#battle/endurance"
      - item: "The MC loses the first meaningful fight of the arc before winning the last one."
        source: "mc_endurance_study#battle/bond"
    should_have:
      - item: "The MC carries a merchandisable visual token and a repeatable verbal signature."
        source: "mc_endurance_study#battle/bond"
      - item: "Each arc adds one bonded ally whose own wound can host a future arc."
        source: "mc_endurance_study#battle/endurance"
      - item: "Witness characters (rival/team) carry the emotional read of the MC's fights instead of MC interior monologue."
        source: "mc_endurance_study#battle/bond"
    anti_patterns:
      - item: "Power escalation continues past the established conceptual ceiling."
        source: "mc_endurance_study#battle/anti"
      - item: "A villain is defeated by persuasion speech alone more than once in the series."
        source: "mc_endurance_study#battle/anti"
      - item: "The meet-lose-train-win formula repeats a fourth time with no structural variation."
        source: "mc_endurance_study#battle/anti"
      - item: "A second mentor dies primarily to escalate the MC's emotion."
        source: "mc_endurance_study#battle/anti"
    endurance_mechanics:
      - item: "Renewable goal ladder: each arc mints a reachable sub-goal under the unreachable series goal."
        source: "mc_endurance_study#battle/endurance"
      - item: "Relationship engine: team accretion supplies future arc hosts."
        source: "mc_endurance_study#battle/endurance"
      - item: "Cost-accounted capability ladder keeps stakes meaningful at any power level."
        source: "mc_endurance_study#battle/endurance"
      - item: "Serial arcs deliver at least one complete fight beat per volume."
        source: "mc_endurance_study#battle/endurance"

  romance:
    must_have:
      - item: "The MC has one quietly excellent domain competence outside the relationship that the love interest is first to see accurately."
        source: "mc_endurance_study#romance/traits"
      - item: "Every volume delivers a net proximity gain after its misunderstanding or setback."
        source: "mc_endurance_study#romance/bond"
      - item: "The series ending is planned to rhyme with the MC's self-authorship, not an institution beat."
        source: "mc_endurance_study#romance/traits"
      - item: "Long runs are chained as multiple relationship arcs or life-stages, never one stretched courtship."
        source: "mc_endurance_study#romance/endurance"
    should_have:
      - item: "A vocation or domain-competence B-plot ladder renews independently of relationship states."
        source: "mc_endurance_study#romance/endurance"
      - item: "Rivals receive rehabilitation arcs and convert into ensemble members."
        source: "mc_endurance_study#romance/endurance"
      - item: "Comedic release beats appear every few pages against the earnest register."
        source: "mc_endurance_study#romance/traits"
    anti_patterns:
      - item: "The central confession lands before the delay engine has banked at least one full arc."
        source: "mc_endurance_study#romance/anti"
      - item: "The love interest's interiority stays fully withheld past mid-run."
        source: "mc_endurance_study#romance/anti"
      - item: "Physical aggression is framed as romantic."
        source: "mc_endurance_study#romance/anti"
      - item: "The MC has no interests or life outside the romance."
        source: "mc_endurance_study#romance/anti"
    endurance_mechanics:
      - item: "Delay engine converts relationship states in small irreversible increments."
        source: "mc_endurance_study#romance/endurance"
      - item: "Domain-competence ladder (vocation roles) supplies renewable rungs beyond scarce romance states."
        source: "mc_endurance_study#romance/endurance"
      - item: "Rival rotation converts threats into cast."
        source: "mc_endurance_study#romance/endurance"

  healing:
    must_have:
      - item: "Each chapter completes one small encounter or exchange even at minimal stakes."
        source: "mc_endurance_study#healing/anti"
      - item: "The MC's feelings stay un-named on the page; emotion lands belatedly or somatically."
        source: "mc_endurance_study#healing/bond"
      - item: "The MC holds one small, deep domain competence exercised calmly per episode."
        source: "mc_endurance_study#healing/traits"
      - item: "Conflict arrives as weather or time, never as a villain to defeat."
        source: "mc_endurance_study#healing/traits"
    should_have:
      - item: "A recurring ritual object anchors calm compositions across episodes."
        source: "mc_endurance_study#healing/bond"
      - item: "The MC functions as a professional visitor to other people's stories, refreshing cast per chapter."
        source: "mc_endurance_study#healing/endurance"
      - item: "Volumes are structured as seasonal cycles with return-with-difference, not escalation."
        source: "mc_endurance_study#healing/endurance"
    anti_patterns:
      - item: "Chapters pass with no completed exchange (contemplative pacing that stagnates)."
        source: "mc_endurance_study#healing/anti"
      - item: "Feelings are explicitly named or therapized on the page."
        source: "mc_endurance_study#healing/anti"
      - item: "Arc-scale stakes are imported to force escalation."
        source: "mc_endurance_study#healing/anti"
    endurance_mechanics:
      - item: "Episodic world-supplied encounters renew indefinitely without goal pressure."
        source: "mc_endurance_study#healing/endurance"
      - item: "Slow serial sediment (grief/time understanding) accumulates beneath episodic surface."
        source: "mc_endurance_study#healing/endurance"
      - item: "Regret cadence: about one softly-landing missed-connection beat per episode."
        source: "mc_endurance_study#healing/bond"

  dark_fantasy:
    must_have:
      - item: "The MC's wound is the active story engine, not backstory decoration."
        source: "mc_endurance_study#dark_fantasy/traits"
      - item: "Each stage costs the MC something that is never returned."
        source: "mc_endurance_study#dark_fantasy/endurance"
      - item: "The antagonist has coherent reasons a reader could genuinely consider."
        source: "mc_endurance_study#dark_fantasy/traits"
      - item: "Warmth pockets (campfire beats) recur against the grave register."
        source: "mc_endurance_study#dark_fantasy/traits"
    should_have:
      - item: "A carried object doubles as the wound made visible."
        source: "mc_endurance_study#dark_fantasy/bond"
      - item: "The MC carries or protects someone, generating chapters between battles."
        source: "mc_endurance_study#dark_fantasy/endurance"
      - item: "The MC's stated want is designed to expire and convert into a discovered need."
        source: "mc_endurance_study#dark_fantasy/endurance"
    anti_patterns:
      - item: "Violence or misery appears without thematic consequence (grimdark for shock)."
        source: "mc_endurance_study#dark_fantasy/anti"
      - item: "Suffering is shown in extended detail for reader reaction rather than character consequence."
        source: "mc_endurance_study#dark_fantasy/anti"
      - item: "The MC cannot be genuinely diminished (protagonist immunity)."
        source: "mc_endurance_study#dark_fantasy/anti"
      - item: "A clean battle-genre victory erases previously paid costs."
        source: "mc_endurance_study#dark_fantasy/anti"
    endurance_mechanics:
      - item: "Irreversibility ladder: reader investment compounds in accumulated scar tissue."
        source: "mc_endurance_study#dark_fantasy/endurance"
      - item: "Want-to-need conversion lets the MC survive the premise expiring."
        source: "mc_endurance_study#dark_fantasy/endurance"
      - item: "Small appetites keep escalation meaningful at any power level."
        source: "mc_endurance_study#dark_fantasy/endurance"

  sports:
    must_have:
      - item: "The MC is visibly worse than rivals at fundamentals early, with one freak asset."
        source: "mc_endurance_study#sports/traits"
      - item: "The MC loses meaningful matches on a recurring cadence, and at least one beloved arc ends in a loss."
        source: "mc_endurance_study#sports/bond"
      - item: "Every capability gain is earned inside drill, choke, or match — never granted."
        source: "mc_endurance_study#sports/wellness"
      - item: "Rivalry functions as love language with witness structure, not enmity."
        source: "mc_endurance_study#sports/traits"
    should_have:
      - item: "Opponents borrow one arc of interiority each (losing-team POV)."
        source: "mc_endurance_study#sports/endurance"
      - item: "In-match time-dilated monologue is the interiority spike zone."
        source: "mc_endurance_study#sports/bond"
      - item: "Jersey number and named signature move anchor the MC visually and verbally."
        source: "mc_endurance_study#sports/bond"
    anti_patterns:
      - item: "The MC never loses a meaningful match (undefeated syndrome)."
        source: "mc_endurance_study#sports/anti"
      - item: "Battle-genre superpowers dissolve the sport's physics."
        source: "mc_endurance_study#sports/anti"
      - item: "A timeskip advances the MC's career without paying development panels."
        source: "mc_endurance_study#sports/anti"
      - item: "The team exists only to serve the MC's growth."
        source: "mc_endurance_study#sports/anti"
    endurance_mechanics:
      - item: "The bracket ladder (tournament to pro to world) renews opponents and stakes indefinitely."
        source: "mc_endurance_study#sports/endurance"
      - item: "Opponent-as-one-arc-protagonist refreshes emotional stakes without changing the MC."
        source: "mc_endurance_study#sports/endurance"
      - item: "Physical-ceiling realism (aging, injury) fuels late-run material."
        source: "mc_endurance_study#sports/endurance"
