character_design:
  series_id: cognitive_clarity_seinen
  brand_id: cognitive_clarity
  locale: en_US                       # OPERATOR-CONFIRM: kenjin_cc teacher LoRA is locale-agnostic; cognitive_clarity_seinen lane has no locale field and joshin_guide ships 11 locales — en_US chosen as the design-reference locale
  market_demo: seinen                 # OPERATOR-CONFIRM: kenjin spans TWO lanes — cognitive_clarity_seinen (ACTIVE brand-genre lane, market_demo seinen, teacher: kenjin, he is the POV lead) AND cognitive_clarity_joshin_guide ("Kenjin's Empty Bowl", market_demo josei, he is the mentor). seinen chosen because it is kenjin's own active lead-role lane and maximizes solver distance from josei Mira. Confirm this is the canonical demo for his character sheet.
  genre_family: mystery               # OPERATOR-CONFIRM: paired with the seinen lane choice (genre_family: mystery, subgenre psychological_self_inquiry per cognitive_clarity_seinen.yaml). If operator prefers the josei mentor framing, this becomes slice_of_life.
  subgenre: psychological_self_inquiry
  character_id: kenjin
  character_role: teacher_mentor      # OPERATOR-CONFIRM: roshi/tea-master mentor figure. In the seinen lane the named protagonist is "Kenji" (the analyst-reader surrogate); kenjin is the austere teacher-authority. Confirm whether his sheet is authored as recurring mentor (assumed) vs series protagonist.
  drafted_by: pearl_program_orchestrator_autofill
  drafted_at: "2026-06-12"
  source_descriptions:
    - "brand_lora_plans.yaml character_loras.kenjin.notes: 'Japanese-American male, austere bearing, roshi authority (Soto Zen)' (trigger_word kenjin_cc, ip_adapter_weight 0.83, style_ref cognitive_clarity)"
    - "brand_lora_plans.yaml brand_style_loras.cognitive_clarity.notes: 'High contrast monochrome with selective warmth' (trigger_word style_cc)"
    - "cognitive_clarity/series_02.yaml (cognitive_clarity_joshin_guide) series_title 'Kenjin's Empty Bowl'; series_description: 'Mentor Kenjin, a humble tea master, guides her through the simple, repetitive art of preparing matcha — a practice where the goal is not to achieve, but to be present.'"
    - "brands/cognitive_clarity_seinen.yaml: teacher kenjin; visual_grammar polished_seinen; line_weight_profile medium; black_fill_ratio 0.20; market_demo seinen / genre_family mystery / subgenre psychological_self_inquiry; emotional_engine wonder"

  axes:

    # AXIS 1 — face_shape
    # DERIVED from 'austere bearing, roshi authority, elder' (brand_lora). The
    # gekiga/seinen-realist angular_long carries the ascetic high-contour signal
    # of a disciplined Zen master. DISTINCT from Mira's soft_round (iyashikei).
    face_shape:
      value: angular_long             # OPERATOR-CONFIRM: angular_long (gekiga/seinen-realist) inferred from 'austere/roshi'; brand_lora gives bearing not literal face geometry
      lockout: yes
      mangaka_tradition: "Inoue Vagabond-style angular (Musashi adult) — sumi-brush seinen; ascetic high-contour suits a Soto Zen roshi"

    # AXIS 2 — eye_geometry
    # DERIVED: austere elder male, seinen-restrained. small + hooded + single-lid
    # + minimal lash = the disciplined, half-lowered 'soft-focus zazen gaze'.
    # DISTINCT from Mira's medium/almond/double-lid/minimal. seinen-legal (no
    # heavy_decorative — satisfies forbidden 'heavy_eyelash_in_seinen').
    eye_geometry:
      size: small                     # OPERATOR-CONFIRM: small (asano_late_period / gekiga-restraint) inferred for austere seinen elder
      shape: hooded                   # OPERATOR-CONFIRM: hooded (half-lowered meditative lid) inferred from roshi bearing
      spacing: standard
      lid_fold: single                # OPERATOR-CONFIRM: single-lid (monolid family) inferred for older Japanese-American male; not stated in brand_lora
      eyelash_density: minimal
      lockout: yes
      note: "small + single-lid + hooded reads as the half-lowered zazen gaze; warm_medium skin (axis 10) keeps the Japanese-American coding without locking ethnicity tighter than brand_lora states"

    # AXIS 3 — nose_construction
    # DERIVED: seinen-drawn register (polished_seinen, black_fill 0.20) — a
    # rendered, dignified nose, not the iyashikei 'implied' of Mira.
    nose_construction:
      bridge_angle: straight          # OPERATOR-CONFIRM: straight dignified bridge inferred; brand_lora silent on nose
      bridge_length: long             # OPERATOR-CONFIRM: long bridge for the elongated ascetic face
      tip_shape: narrow               # OPERATOR-CONFIRM: narrow tip inferred for austere register
      nostril_visibility: drawn       # seinen register per cognitive_clarity_seinen visual_grammar (polished_seinen) — DISTINCT from Mira's 'implied'
      lockout: yes

    # AXIS 4 — mouth_jaw
    # DERIVED: 'austere bearing' -> resting neutral_firm, thin lips, a defined
    # but not heavy jaw. DISTINCT from Mira's neutral_soft / soft_pointed /
    # thin_upper_full_lower. No bow_mouth (n/a for seinen male anyway).
    mouth_jaw:
      resting_expression: neutral_firm  # OPERATOR-CONFIRM: neutral_firm (composed austerity) inferred from 'austere bearing'
      jaw_width: medium                 # OPERATOR-CONFIRM: medium-defined jaw inferred; not square (not a gekiga strongman), not narrow
      chin_shape: square                # OPERATOR-CONFIRM: square chin for grounded elder authority
      lip_shape: thin_both              # OPERATOR-CONFIRM: thin_both (ascetic restraint) inferred
      lockout: yes

    # AXIS 5 — hair
    # DERIVED DIRECTLY from 'roshi authority (Soto Zen)' — Soto Zen ordained
    # priests/roshi traditionally SHAVE the head. This is the single strongest
    # silhouette ID and is maximally DISTINCT from Mira's long brown wavy hair.
    # grey_at_temples signaled at the (shaved) hairline for the elder cue.
    hair:
      length: shaved                  # DERIVED (not guessed): Soto Zen roshi shaved head per brand_lora 'roshi authority (Soto Zen)'
      parting: no_part_swept_back     # n/a on a shaved head; nearest allowed value
      fringe_style: no_fringe
      texture: straight               # texture of the close stubble where present
      color_signal: grey_at_temples   # OPERATOR-CONFIRM: grey stubble at the shaved hairline as elder cue; brand_lora says 'roshi' (elder) but not literal grey
      signature_shape_note: "clean-shaven Soto Zen roshi scalp — the bare-skull silhouette is the instant ID; faint grey stubble at the temples and the nape; in profile the unbroken skull line catches the cognitive_clarity selective-warmth rim-light"
      lockout: yes

    # AXIS 6 — build (lockout: no per template default)
    build:
      height_implied: average         # OPERATOR-CONFIRM: average height inferred; brand_lora silent
      frame_density: small            # OPERATOR-CONFIRM: lean/spare ascetic frame inferred from 'austere'
      shoulder_ratio: average
      lockout: no

    # AXIS 7 — wardrobe_register
    # DERIVED from 'roshi (Soto Zen)' + 'humble tea master' (joshin_guide). Plain
    # dark Zen monastic robe (samue / kesa-over-koromo) — ceremonial-plain. The
    # tea-master role adds the matcha-ritual implements as worn signature.
    # DISTINCT from Mira's contemporary_2020s cream-knit business_casual.
    wardrobe_register:
      era_signal: contemporary_2020s  # OPERATOR-CONFIRM: present-day monastic (robes are timeless); set contemporary so he reads as a living teacher, not a period piece
      personality_encoding:
        - plain_dark_zen_robe_koromo        # DERIVED: Soto Zen roshi monastic robe
        - rakusu_or_simple_kesa_over_robe    # OPERATOR-CONFIRM: rakusu (lay/priest bib-kesa) vs full kesa drape — pick one for consistency
        - dark_samue_work_robe_for_tea_prep  # DERIVED from 'humble tea master' matcha-preparation role
        - tabi_and_simple_zori               # OPERATOR-CONFIRM: traditional split-toe sock + sandal inferred
      formality: ceremonial            # OPERATOR-CONFIRM: ceremonial (monastic/tea-ritual) chosen over 'formal'; confirm vs a plainer 'casual' samue default
      lockout: yes

    # AXIS 8 — posture_default (lockout: no per template default)
    # 'austere bearing' -> contained, upright, symmetric (seiza/zazen spine).
    posture_default:
      energy: contained
      symmetry: symmetric             # upright centered zazen spine — DISTINCT from Mira's slight_left_lean
      lockout: no

    # AXIS 9 — age_signaling
    # DERIVED from 'roshi authority' — a roshi is an elder master. 60s with full
    # elder cues. MAXIMALLY DISTINCT from Mira's early_30s youthful skin.
    age_signaling:
      apparent_age_decade: 60s        # DERIVED: 'roshi' connotes an elder master; 60s chosen (OPERATOR-CONFIRM exact decade — 60s vs 50s vs 70s_plus)
      visible_age_cues:
        - full_crow_feet
        - deep_nasolabial_fold
        - grey_at_temples             # consistent with axis 5 stubble
        - jowl_softening              # OPERATOR-CONFIRM: light jowl softening; kept subtle to preserve the ascetic-lean read
      lockout: yes

    # AXIS 10 — skin_treatment (lockout: no per template default)
    skin_treatment:
      texture: weathered              # OPERATOR-CONFIRM: weathered (years of discipline) inferred; brand_lora silent
      tone: warm_medium               # Japanese-American coding, consistent with eye_geometry note
      lockout: no

    # AXIS 11 — accessories
    # UNIQUE high-leverage signature (NOT Mira's jade pendant). DERIVED from the
    # 'humble tea master / matcha ritual' identity in joshin_guide ("Kenjin's
    # Empty Bowl"): the empty matcha bowl + bamboo chasen whisk is HIS through-line
    # object — the title literally names the bowl. juzu (Buddhist prayer beads)
    # reinforce the Soto Zen roshi reading.
    accessories:
      glasses: none
      jewelry: signature_piece
      signature_item: "a plain dark-glazed matcha chawan (tea bowl) held in both hands, paired with a bamboo chasen whisk — his regulation/teaching object and the literal title image of 'Kenjin's Empty Bowl'; the bowl is shown empty as often as full (the 'empty cup' motif). UNIQUE to kenjin; does NOT reuse Mira's jade pendant"
      secondary_signature_item: "juzu (Buddhist wrist mala / prayer beads, dark wood) on the right wrist — Soto Zen roshi marker"  # OPERATOR-CONFIRM: wrist juzu inferred from roshi identity; brand_lora names role not beads
      lockout: yes

    # AXIS 12 — color_signal
    # DERIVED from brand style LoRA 'High contrast monochrome with selective
    # warmth' (style_cc). Charcoal/near-black primary with a single warm accent
    # (the tea — matcha green warmed, or the bowl's amber glaze). MAXIMALLY
    # DISTINCT from Mira's warm_cream primary / jade accent.
    color_signal:
      palette_primary: charcoal       # DERIVED from style_cc 'high contrast monochrome'
      palette_accent: ochre           # OPERATOR-CONFIRM: warm ochre/amber as the 'selective warmth' accent (tea / bowl glaze / rim-light); alt would be a muted matcha-green — confirm warm vs green
      palette_secondary: slate
      bw_register_note: "kenjin renders HIGH-contrast-anchored (the opposite pole from Mira's mid-grey): dark robe = deepest black mass on the page (black_fill_ratio 0.20 lane), shaved scalp + face = the brightest selectively-warm highlight. The single warm accent dot is the tea/bowl, not a pendant. He is the highest-contrast figure in frame — visually inverse to Mira"
      lockout: yes

  # ── Solver metadata ─────────────────────────────────────────────────────
  solver:
    individuation_axes_locked: 9
    # face_shape, eye_geometry, nose_construction, mouth_jaw, hair,
    # wardrobe_register, age_signaling, accessories, color_signal
    # (build, posture_default, skin_treatment intentionally `lockout: no` per template defaults)
    last_validated: pending
    collision_check_passed: pending
    operator_confirmation: required
    collision_check_against:
      brand_scope: cognitive_clarity
      cross_brand_scope: all_core12
      collisions_detected: []
      notes: "Must clear same-brand 5-locked-axis threshold vs cognitive_clarity protagonist_loras (daisuke/sho/ren — all young ~26-29 Japanese male analysts, glasses, short dark hair, contemporary attire) and cross-brand 7-locked-axis threshold vs Mira (stillness_press). kenjin is separated from the CC young-analyst cohort on face_shape, eye_geometry, hair(shaved), wardrobe_register(monastic), age_signaling(60s), accessories(tea bowl), color_signal — far clear of both thresholds."

  # ── Render metadata ─────────────────────────────────────────────────────
  render:
    # Operator decision pattern mirrors stillness_en_01: per-archetype 3-model routing.
    engine_routing_strategy: per_archetype
    engine_routing_authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    engines_in_play:
      - flux_schnell      # simple objects, backgrounds (tea room, empty space) — L0/L1
      - flux_dev          # mid-shots, hands preparing matcha, character-in-scene
      - qwen_image_pulid  # face close-ups (identity-critical) — L2
    secondary_face_lock: pulid_flux_facenet
    lora_required: false
    lora_skip_reason: "Per brand_lora_plans.yaml kenjin is a character_loras entry with ip_adapter_weight 0.83 (PuLID/IP-Adapter face-lock), NOT a trained safetensors LoRA — no kenjin entry exists in protagonist_loras (only daisuke/sho/ren_cc_jp are trained for cognitive_clarity). Per MANGA_LAYER_RENDER_CONTRACT_SPEC §15.A.2, named recurring cast lock via PuLID-FLUX-FaceNet with LoRA DEFERRED (LoRA-training is a separate Pearl Star ComfyUI commission gated on the PuLID-vs-LoRA decision; CHARACTER_INDIVIDUATION_PIPELINE_SPEC threshold is 12+ chapters)."
    prompt_axis_priority:
      positive_prompt_axes:
        - face_shape
        - eye_geometry
        - hair
        - wardrobe_register
        - age_signaling
        - accessories
        - color_signal
      negative_prompt_axes:
        - mouth_jaw
      solver_only_axes:
        - skin_treatment
        - posture_default
        - build
        - nose_construction
    last_render_date: pending
    render_artifact_path: pending
    reference_sheet_path: pending
    # Phase C reference-sheet target (Qwen+PuLID 4-view):
    # artifacts/manga/character_references/cognitive_clarity/kenjin/{front,three_quarter,profile,expression_sheet}.png