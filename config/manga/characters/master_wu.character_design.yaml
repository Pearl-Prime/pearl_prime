character_design:
  series_id: warrior_calm_cultivation
  brand_id: warrior_calm
  locale: en_US                       # OPERATOR-CONFIRM: master_wu is the brand's cross-locale recurring teacher-mentor; warrior_calm series span en_US + ko_KR and neither the brand profile nor series_01 carry a locale field. en_US chosen as the canonical CORE-12 design locale (matches the Mira gold template); confirm whether a ko_KR design variant is also wanted.
  market_demo: shonen
  genre_family: cultivation
  subgenre: panic_composure_warrior
  character_id: master_wu             # brand_lora_plans.yaml has NO character_name for this teacher, so teacher_id is used as character_id per instruction
  character_role: teacher_mentor      # OPERATOR-CONFIRM: warrior_calm series have their own protagonists (Riku/Haruto); master_wu is the brand's recurring teacher-author/mentor, NOT a single-series protagonist. Confirm role label.
  drafted_by: pearl_program_orchestrator_autofill
  drafted_at: "2026-06-12"
  source_descriptions:
    - "brand_lora_plans.yaml character_loras.master_wu: trigger_word wu_wc; style_ref warrior_calm; notes: 'Chinese male, martial composure, controlled power in stillness'; ip_adapter_weight 0.82"
    - "brand_lora_plans.yaml brand_style_loras.warrior_calm: trigger_word style_wc; notes: 'Dynamic martial ink with controlled stillness'"
    - "manga_profiles/brands/warrior_calm_cultivation.yaml: market_demo shonen; genre_family cultivation; subgenre panic_composure_warrior; visual_grammar fantasy_ornate; line_weight_profile heavy; black_fill_ratio 0.30; emotional_engine rivalry; reader_promise 'You will discover that calm is not weakness — it is the sharpest weapon.'"

  axes:

    # AXIS 1 — face_shape
    # Chinese male martial master, "controlled power in stillness" -> hard squared
    # architecture. Square (Hara/Hokuto gekiga-seinen) is the maximal-distance pick
    # from Mira's soft_round and from a soft qigong-elder oval (master_feung kin) or
    # a "luminous calm" healer (master_sha kin).
    face_shape:
      value: square      # OPERATOR-CONFIRM: brand_lora only says "Chinese male, martial composure"; square jaw is a guessed best-fit for the hard-martial register vs an oval/elongated alternative.
      lockout: yes
      mangaka_tradition: "Hara Tetsuo-style square (Hokuto no Ken) — gekiga seinen masculine, heavy square jaw + prominent brow ridge"

    # AXIS 2 — eye_geometry
    # Small, sharp_angular (tsurime), narrow spacing, single lid, minimal lash —
    # martial intensity / disciplined gaze. The deliberate inverse of Mira's
    # medium+almond+double+minimal. shonen-mature register; no shojo big-eye.
    eye_geometry:
      size: small               # OPERATOR-CONFIRM: martial-intensity guess; not stated in brand_lora.
      shape: sharp_angular      # OPERATOR-CONFIRM: tsurime "controlled-power" read; guessed.
      spacing: narrow
      lid_fold: single          # OPERATOR-CONFIRM: monolid/single-fold reads as Chinese-coded + austere; guessed.
      eyelash_density: minimal
      lockout: yes
      note: "single lid + warm_medium weathered skin (axis 10) signals Chinese-coded ethnicity per brand_lora 'Chinese male'; sharp_angular tsurime carries the martial 'controlled power' intensity without anger"

    # AXIS 3 — nose_construction
    # Gekiga-prominent: long bridge, drawn nostrils, narrow tip.
    # Direct contrast to Mira's iyashikei 'implied' nose.
    nose_construction:
      bridge_angle: prominent   # OPERATOR-CONFIRM: gekiga-prominent guess for martial-realist register.
      bridge_length: long
      tip_shape: narrow
      nostril_visibility: drawn  # OPERATOR-CONFIRM: drawn (seinen) vs prominent (gekiga); guessed drawn.
      lockout: yes

    # AXIS 4 — mouth_jaw
    # Disciplined hard-set resting mouth (neutral_firm), square jaw, square chin,
    # thin both lips. "Calm is the sharpest weapon" -> composed, never slack.
    mouth_jaw:
      resting_expression: neutral_firm
      jaw_width: square          # OPERATOR-CONFIRM: square jaw_width consistent with axis-1 square face; guessed.
      chin_shape: square
      lip_shape: thin_both
      lockout: yes

    # AXIS 5 — hair
    # Black, swept-back with NO fringe, straight, mid-back length GATHERED INTO A
    # WARRIOR TOPKNOT — the silhouette-ID signal (a martial topknot reads instantly
    # distinct from Mira's long brown side-part wavy curtain). Grey at the temples is
    # carried in age_signaling (axis 9), not as base color.
    hair:
      length: mid_back
      parting: no_part_swept_back
      fringe_style: no_fringe
      texture: straight
      color_signal: black        # OPERATOR-CONFIRM: black base + grey-temple cue (axis 9) guessed for an elder martial master; could be grey_at_temples base instead.
      signature_shape_note: "black hair drawn back into a high warrior topknot bound with a dark cord; a few loose strands at the temple show grey — the topknot silhouette is the instant character-ID and reads as martial discipline; in motion-beat panels the bound tail snaps with the strike then settles, visualizing 'controlled power in stillness'"
      lockout: yes

    # AXIS 6 — build
    # Tall, broad, athletic — a martial master's frame. lockout:no per template
    # default (build is low-leverage / diffusion-unreliable), but described for prompt
    # reinforcement.
    build:
      height_implied: tall       # OPERATOR-CONFIRM: martial-master frame guessed; brand_lora silent on build.
      frame_density: athletic
      shoulder_ratio: broad
      lockout: no

    # AXIS 7 — wardrobe_register
    # "Dynamic martial ink" brand + cultivation/fantasy_ornate visual grammar ->
    # a dark layered martial robe (cross-collar changshan / training hanfu over
    # wrapped trousers), wide knotted waist-sash, cloth arm-wraps. Far from Mira's
    # contemporary cream knit. era = fantasy_setting (cultivation register).
    wardrobe_register:
      era_signal: fantasy_setting   # OPERATOR-CONFIRM: cultivation/fantasy_ornate lane -> fantasy_setting vs pre_industrial historical; guessed fantasy_setting.
      personality_encoding:
        - dark_crosscollar_martial_robe   # changshan/training-hanfu silhouette — the brand's martial-ink signature garment
        - wide_knotted_waist_sash          # the crimson sash is the wardrobe's single color note (see axes 11 + 12)
        - cloth_forearm_wraps              # practical martial wraps; read as discipline
        - flat_cloth_martial_shoes
      formality: ceremonial            # OPERATOR-CONFIRM: martial-master robe reads ceremonial/formal vs casual training-gi; guessed ceremonial.
      lockout: yes

    # AXIS 8 — posture_default
    # "Controlled power in stillness" -> rooted, grounded, contained. Symmetric
    # horse-stance readiness rather than a lean. lockout:no per template default.
    posture_default:
      energy: contained
      symmetry: symmetric
      lockout: no

    # AXIS 9 — age_signaling
    # Elder martial master in his 50s: grey at the temples, weathered brow, measured
    # crow's feet. Maximal age-distance from Mira's early_30s. Distinguishes him from a
    # younger martial protagonist (Riku) and reads as earned authority.
    age_signaling:
      apparent_age_decade: 50s     # OPERATOR-CONFIRM: "elder martial master" inferred from 'controlled power / mentor'; brand_lora gives no explicit age. Could be 60s.
      visible_age_cues:
        - grey_at_temples
        - weathered_skin
        - measured_crow_feet
        - deep_set_disciplined_brow
      lockout: yes

    # AXIS 10 — skin_treatment
    # Weathered, warm_medium, with one discipline scar. lockout:no per template
    # default (skin is low-leverage in heavy-ink B&W).
    skin_treatment:
      texture: weathered           # OPERATOR-CONFIRM: weathered + scar guessed for a martial master; not in brand_lora.
      tone: warm_medium
      lockout: no

    # AXIS 11 — accessories
    # SIGNATURE ITEM (highest-leverage, UNIQUE — deliberately NOT Mira's jade pendant):
    # a black-lacquered, bamboo-wrapped iron training staff (his weapon-that-is-never-
    # drawn-in-anger), paired with a knotted CRIMSON waist-sash. The staff is the
    # reader-memory signature; the sash is the single color through-line that carries
    # into the B&W high-contrast register.
    accessories:
      glasses: none
      jewelry: signature_piece
      signature_item: "black-lacquered iron training staff wrapped in aged bamboo cord, carried across the back or planted upright at his side — the weapon he never draws in anger; it is the visual through-line of 'calm is the sharpest weapon' and his reach-for-it-then-pause is the recurring composure gesture"   # OPERATOR-CONFIRM: staff invented as the unique signature (must NOT reuse Mira's jade pendant); confirm prop choice vs e.g. a single jade-knuckle ring or a tea-and-sword pairing.
      secondary_signature_item: "knotted crimson waist-sash — the one chromatic note on an otherwise charcoal figure; it frays slightly at the tail (years of training)"
      lockout: yes

    # AXIS 12 — color_signal
    # Charcoal primary, BURGUNDY/crimson accent (the sash), slate secondary. In B&W
    # render Wu is the HIGHEST-contrast figure in the panel (heavy black robe, brand
    # black_fill_ratio 0.30) — the deliberate inverse of Mira's mid-grey-anchored
    # low-contrast register, and far from her warm_cream/jade palette.
    color_signal:
      palette_primary: charcoal
      palette_accent: burgundy       # the crimson sash; OPERATOR-CONFIRM accent hue (burgundy vs terracotta crimson) — guessed.
      palette_secondary: slate
      bw_register_note: "Wu renders as the HIGHEST-contrast figure in any panel — charcoal robe = near-solid black mass (brand black_fill_ratio 0.30), face/staff catching the rim light; the crimson sash = the single mid-dark accent the eye anchors to. This is the inverse of Mira Aoki's mid-grey low-contrast anchoring."
      lockout: yes

  # ── Solver metadata ─────────────────────────────────────────────────────
  solver:
    individuation_axes_locked: 9
    # LOCKED (9): face_shape, eye_geometry, nose_construction, mouth_jaw, hair,
    # wardrobe_register, age_signaling, accessories, color_signal
    # (build, posture_default, skin_treatment intentionally lockout: no per template defaults)
    last_validated: pending
    collision_check_passed: pending
    operator_confirmation: required
    collision_check_against:
      brand_scope: warrior_calm
      cross_brand_scope: CORE-12
      collisions_detected: []

  # ── Render metadata ─────────────────────────────────────────────────────
  render:
    # Per-archetype 3-model routing (engine_router.py dispatches per archetype).
    engine_routing_strategy: per_archetype
    engine_routing_authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md   # OPERATOR-CONFIRM: this authority path (carried from the Mira gold template) is NOT present on this branch — resolve/repoint before render.
    engines_in_play:
      - flux_schnell      # simple objects, backgrounds, decompression archetypes
      - flux_dev          # mid-shots, hands, the staff, character-in-scene action
      - qwen_image_pulid  # face close-ups (identity-critical)
    secondary_face_lock: pulid_flux_facenet
    lora_required: false
    lora_skip_reason: "brand_lora_plans.yaml defines a character LoRA (trigger wu_wc, ip_adapter_weight 0.82) but training is the standard Pearl Star ComfyUI commission and is deferred; like most named recurring cast, master_wu ships on PuLID-FLUX-FaceNet face-lock first, with LoRA training added only if face-consistency across the heavy-ink action register proves insufficient."
    prompt_axis_priority:
      positive_prompt_axes:
        - face_shape
        - eye_geometry
        - hair
        - wardrobe_register
        - age_signaling
        - accessories
        - color_signal
      negative_prompt_axes:
        - mouth_jaw
      solver_only_axes:
        - skin_treatment
        - posture_default
        - build
        - nose_construction
    last_render_date: pending
    render_artifact_path: pending
    reference_sheet_path: pending
    # Phase C reference sheet target (Qwen+PuLID):
    # artifacts/manga/character_references/warrior_calm/master_wu/{front,three_quarter,profile,expression_sheet}.png