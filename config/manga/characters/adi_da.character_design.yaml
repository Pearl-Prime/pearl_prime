character_design:
  series_id: bright_presence_tw_seinen_01   # OPERATOR-CONFIRM: no series YAML exists yet for this TW-only brand; placeholder id (mirrors bright_presence_tw_seinen profile title_id). Confirm canonical series_id when the zh_TW series file is created.
  brand_id: bright_presence_tw
  locale: zh_TW                              # brand markets: [zh_TW] (Taiwan-exclusive teacher-mode brand 朗在出版)
  market_demo: seinen                        # from manga_profiles/brands/bright_presence_tw_seinen.yaml: market_demo: seinen
  genre_family: mystery                      # brand profile genre_family: mystery (subgenre nondual_contemplative_dark); registry also tags the character lane 'philosophical_dark' / style_archetype 'dark_psychological'
  subgenre: nondual_contemplative_dark       # from brand profile subgenre
  character_id: adi_da_figure                # from character_brand_registry.yaml: teacher_character.character_id: adi_da_figure
  character_role: teacher_radical_witness    # from character_brand_registry.yaml: role: teacher_radical_witness
  drafted_by: pearl_program_orchestrator_autofill
  drafted_at: "2026-06-12"
  source_descriptions:
    - "brand_lora_plans.yaml adi_da: trigger_word 'adi_da_bptw'; ip_adapter_weight 0.86; style_ref stillness_press; notes 'Adi Da teacher-mode (zh_TW bright_presence_tw); train dedicated assets before production renders'"
    - "character_brand_registry.yaml bright_presence_tw.teacher_character: display_name 'Adi Da'; role teacher_radical_witness; signature_elements ['high contrast black and white with golden highlight', 'intense piercing eyes', 'seated authority — king on throne quality', 'fierce compassion — not anger but absolute uncompromise']; setting_affinity ['abstract radiant light breaking through darkness', 'throne-like simple seat', 'shadow and light threshold']"
    - "teacher_character_prompts.yaml#adi_da: style_archetype dark_psychological; positive 'seinen manga character, bold confident ink lines, high contrast black and white with selective golden highlight, intense piercing eyes that see through everything, powerful presence seated but radiating authority like a king on a throne, expression is fierce compassion not angry but absolutely uncompromising, dramatic lighting from above creating sharp shadows... style of Berserk portraits meets philosophical manga like Buddha by Osamu Tezuka'; negative 'cute, pastel, chibi, comedic, action battle, speed lines, flat colors, simple background'"
    - "teacher_registry.yaml adi_da: pronouns he/him; ei_profile 'Enlightened Intelligence' (EI); years_teaching 30; tradition_phrase 'a teacher of radical devotion and prior freedom for over 30 years'; 'the Bright is already present before any effort to find it'"
    - "manga_profiles/brands/bright_presence_tw_seinen.yaml: emotional_engine wonder; reader_promise 'You will see what was always already here, before the seeking began'; visual_grammar symbolic_reflection; black_fill_ratio 0.25; screentone_profile minimal; line_weight_profile variable"

  axes:

    # AXIS 1 — face_shape
    # Differentiation from Mira Aoki (stillness_press, soft_round josei): Adi Da is
    # angular_long — the gekiga/sumi-brush seinen sage face that carries the
    # "Berserk portraits meets Buddha by Tezuka" register and "king on a throne"
    # authority named in the character prompt. Inoue Vagabond-style angular_long.
    face_shape:
      value: angular_long
      lockout: yes
      mangaka_tradition: "Inoue Vagabond-style angular (Musashi adult) — sumi-brush seinen; carries the throne-authority + fierce-compassion gravitas"

    # AXIS 2 — eye_geometry
    # "Intense piercing eyes that see through everything" (character prompt) =>
    # small + hooded + narrow spacing + single lid + minimal lash: the gekiga/
    # seinen austere gaze. Diametric to Mira's medium almond double-lid josei eye.
    # Compliant with forbidden_combinations: seinen forbids heavy_decorative lashes; minimal is used.
    eye_geometry:
      size: small
      shape: hooded
      spacing: narrow
      lid_fold: single
      eyelash_density: minimal
      lockout: yes
      note: "'intense piercing eyes that see through everything' (teacher_character_prompts) — gekiga austere gaze; hooded+single-lid reads the seinen radical-witness register, NOT Mira's soft josei double-lid"

    # AXIS 3 — nose_construction
    # Gekiga prominent: long aquiline bridge, drawn-prominent nostrils — Hara/Otomo
    # seinen-realist register consistent with bold ink lines + dramatic top lighting.
    nose_construction:
      bridge_angle: aquiline      # OPERATOR-CONFIRM: bridge form not specified in brand_lora; chosen to match gekiga/seinen 'bold confident ink lines' + dramatic shadow register
      bridge_length: long         # OPERATOR-CONFIRM: derived from angular_long face + seinen-realist convention
      tip_shape: narrow
      nostril_visibility: drawn   # seinen register (vs Mira's 'implied' iyashikei)
      lockout: yes

    # AXIS 4 — mouth_jaw
    # "Fierce compassion — not anger but absolute uncompromise" => neutral_firm
    # resting (not frown, not smile), square jaw/chin for the throne-authority mass,
    # thin both lips (austere, restrained). bow_mouth is a josei anti-pattern and N/A here.
    mouth_jaw:
      resting_expression: neutral_firm   # OPERATOR-CONFIRM: 'fierce compassion, absolute uncompromise' read as firm-not-frowning; confirm vs slight_frown if the operator wants a sterner default
      jaw_width: square
      chin_shape: square
      lip_shape: thin_both
      lockout: yes

    # AXIS 5 — hair
    # Highest-leverage silhouette lever and the cleanest separator from Mira's
    # long_to_waist wavy brown hair: a SHAVED dome — the ascetic radical-witness /
    # Tezuka-Buddha sage silhouette. Reads instantly as 'renunciate sage', far from
    # any other catalog lead. color set to the closest allowed value for an elder's
    # grey stubble shadow (no 'shaved/none' color token exists in the axis vocabulary).
    hair:
      length: shaved
      parting: no_part_swept_back   # nominal (no hair to part); set to satisfy schema
      fringe_style: no_fringe
      texture: straight             # nominal (shaved); set to satisfy schema
      color_signal: grey_at_temples # OPERATOR-CONFIRM: elder shaved scalp w/ grey stubble shadow; 'grey_at_temples' is the nearest allowed value (no 'shaved/none' color token exists)
      signature_shape_note: "fully shaved scalp — the renunciate radical-witness dome (Tezuka-Buddha / ascetic sage). In top-lit close-ups the bald crown catches the single golden highlight; the silhouette alone identifies him at panel scale"
      lockout: yes

    # AXIS 6 — build
    # Per template default (build is low-leverage, solver does not lock). Tall, broad,
    # 'powerful presence... radiating authority' => large seated mass on the throne-seat.
    build:
      height_implied: tall          # OPERATOR-CONFIRM: 'powerful presence radiating authority' read as tall/broad; build axis is lockout:no so non-binding
      frame_density: broad
      shoulder_ratio: broad
      lockout: no

    # AXIS 7 — wardrobe_register
    # Timeless robed sage (NOT contemporary). 'King on a throne' + 'radiant light
    # breaking through darkness' setting => ceremonial robe/shawl, pre_industrial
    # (timeless) era. Diametric to Mira's contemporary_2020s business_casual.
    wardrobe_register:
      era_signal: pre_industrial    # OPERATOR-CONFIRM: era not specified; 'timeless robed sage' has no 'timeless' enum — pre_industrial is the nearest allowed value (no modern markers). Confirm vs alternate_history/fantasy_setting.
      personality_encoding:
        - heavy_draped_dark_robe         # OPERATOR-CONFIRM: garment specifics inferred from 'throne authority' + dark_psychological register; brand_lora gives no wardrobe
        - asymmetric_shoulder_shawl
        - bare_chest_or_open_collar_beneath
        - simple_unadorned_cloth_belt
      formality: ceremonial
      lockout: yes

    # AXIS 8 — posture_default
    # 'Powerful presence seated but radiating authority like a king on a throne' —
    # contained, symmetric, frontal enthroned stillness. lockout:no per template.
    posture_default:
      energy: contained
      symmetry: symmetric
      lockout: no

    # AXIS 9 — age_signaling
    # 'Over 30 years teaching' + ancient throne-authority + Tezuka-Buddha elder
    # register => 60s elder with full visible age cues. Far from Mira's early_30s.
    age_signaling:
      apparent_age_decade: 60s        # OPERATOR-CONFIRM: exact decade not stated; '30 years teaching' + elder-sage 'king on a throne' authority read as 60s. Confirm vs 50s/70s_plus.
      visible_age_cues:
        - full_crow_feet
        - deep_nasolabial_fold
        - jowl_softening
        - weathered_brow              # carved gravitas under dramatic top light
      lockout: yes

    # AXIS 10 — skin_treatment
    # Weathered elder skin under hard top-lighting. lockout:no per template (skin is
    # low-leverage; in this near-B&W brand it reads via shading not tone).
    skin_treatment:
      texture: weathered
      tone: warm_medium               # OPERATOR-CONFIRM: ethnicity unspecified in all sources (real-world Adi Da was Caucasian-American; teacher-character rendered as unplaceable elder sage). warm_medium chosen as an ambiguous/non-locking tone. CONFIRM intended ethnicity/skin tone.
      lockout: no

    # AXIS 11 — accessories
    # UNIQUE high-leverage signature — deliberately NOT Mira's jade pendant. A worn
    # dark seed-bead (rudraksha-style) mala wrapped at the right wrist is his somatic/
    # devotional through-line ('radical devotion'); paired with the recurring single
    # ring/halo of golden light that breaks through the darkness behind the throne
    # (the brand's named 'selective golden highlight'). No glasses.
    accessories:
      glasses: none
      jewelry: signature_piece
      signature_item: "worn dark seed-bead mala (rudraksha-style) wrapped twice at the right wrist — the radical-devotion / Enlightened-Intelligence through-line; he closes a hand around it in moments of transmission. Distinct from Mira's jade pendant in material, placement, and meaning."  # OPERATOR-CONFIRM: mala is inferred from 'radical devotion' tradition; confirm the exact devotional object.
      secondary_signature_item: "single ring/halo of golden light breaking through the darkness behind/above the throne — the brand's named 'selective golden highlight' rendered as a recurring environmental signature that frames him"
      lockout: yes

    # AXIS 12 — color_signal
    # Brand-named 'high contrast black and white with selective golden highlight' +
    # black_fill_ratio 0.25 => charcoal primary, ochre/gold accent. Diametric to
    # Mira's warm_cream/jade. This is a near-B&W brand; the bw_register flips Mira's
    # rule: Adi Da is the HIGHEST-contrast figure in the panel (deepest blacks).
    color_signal:
      palette_primary: charcoal
      palette_accent: ochre           # the 'selective golden highlight' (gold/amber); ochre is the nearest allowed palette value
      palette_secondary: slate
      bw_register_note: "Adi Da is the HIGHEST-contrast figure in every panel — deepest black robe + sharp top-lit highlights (black_fill_ratio 0.25, brand register). The single ochre/gold light-ring is the lone warm accent against otherwise monochrome darkness. This deliberately inverts Mira's mid-grey-anchored low-contrast rule."
      lockout: yes

  # ── Solver metadata ─────────────────────────────────────────────────────
  solver:
    individuation_axes_locked: 9
    # LOCKED (lockout: yes): face_shape, eye_geometry, nose_construction, mouth_jaw,
    # hair, wardrobe_register, age_signaling, accessories, color_signal
    # (build, posture_default, skin_treatment intentionally lockout: no per template defaults)
    last_validated: pending
    collision_check_passed: pending
    operator_confirmation: required
    collision_check_against:
      brand_scope: bright_presence_tw
      note: "bright_presence_tw is a single-teacher brand (adi_da only); supporting cast (Wei, Chen, The Hermit) are separate registry entries, not teacher leads. Primary cross-brand collision target is Mira Aoki (stillness_press) per the shared style_ref."
      collisions_detected: []

  # ── Render metadata ─────────────────────────────────────────────────────
  render:
    # Engine dispatch per archetype (engine_router.py), matching stillness_en_01.
    # Authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    engine_routing_strategy: per_archetype
    engine_routing_authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    engines_in_play:
      - flux_schnell      # simple objects, backgrounds (throne-seat, light threshold)
      - flux_dev          # mid-shots, hands (mala-grip), character-in-scene
      - qwen_image_pulid  # face close-ups (identity-critical piercing-eyes shots)
    secondary_face_lock: pulid_flux_facenet
    lora_required: false
    lora_skip_reason: "Named recurring teacher-cast default per MANGA_LAYER_RENDER_CONTRACT_SPEC §15.A: identity is locked via PuLID-FLUX-FaceNet from the 4-view reference sheet; per-character LoRA (ai-toolkit) is DEFERRED to V4 and gated on either PuLID becoming operational OR LoRA training, and is currently blocked. brand_lora_plans defines a future asset (trigger 'adi_da_bptw', 1500 steps, ip_adapter_weight 0.86, style_ref stillness_press) to train only when this TW-only brand reaches production — note: 'train dedicated assets before production renders'."  # OPERATOR-CONFIRM: brand_lora_plans schedules a dedicated LoRA for this teacher; confirm whether to train now (TW-exclusive launch) or hold PuLID-only like Mira.
    prompt_axis_priority:
      positive_prompt_axes:
        - face_shape
        - eye_geometry
        - hair
        - wardrobe_register
        - age_signaling
        - accessories
        - color_signal
      negative_prompt_axes:
        - mouth_jaw
      solver_only_axes:
        - skin_treatment
        - posture_default
        - build
        - nose_construction
    last_render_date: pending
    render_artifact_path: pending
    reference_sheet_path: pending
    # Phase C (reference sheet via Qwen+PuLID) will populate:
    # artifacts/manga/character_references/bright_presence_tw/adi_da_figure/{front,three_quarter,profile,expression_sheet}.png