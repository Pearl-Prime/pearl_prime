character_design:
  series_id: qi_foundation_quiet_hands   # OPERATOR-CONFIRM: bound to the P0 anchor series (series_01, "Quiet Hands"); Feung is the recurring teacher across all qi_foundation series, so this id is the lead series, not the only one
  brand_id: qi_foundation_cultivation
  locale: en_US                          # OPERATOR-CONFIRM: anchor locale; qi_foundation series ship 11 locales (ja_JP/ko_KR/zh_TW/zh_CN/fr_FR/en_US/de_DE/es_ES/it_IT/pt_BR/hu_HU) — design is locale-stable, en_US is the reference render
  market_demo: josei
  genre_family: healing
  subgenre: qigong_somatic_restoration   # OPERATOR-CONFIRM: derived label; qi_foundation series_01/02 carry emotional_engine cozy_restoration/tenderness with no explicit subgenre field — mirrors gold-template subgenre slot
  character_id: master_feung
  character_role: teacher                 # recurring named teacher-character (NOT protagonist): qi_foundation series_01 "learns from Master Feung that the body holds the key"; protagonists are the students (Mika, Anya). Per manga author-system: EI teacher-characters, full disclosure.
  drafted_by: pearl_program_orchestrator_autofill
  drafted_at: "2026-06-12"
  source_descriptions:
    - "brand_lora_plans.yaml character_loras.master_feung.notes: 'Chinese male, elder presence, qigong practitioner posture'"
    - "brand_lora_plans.yaml character_loras.master_feung: trigger_word 'feung_qf', style_ref qi_foundation_cultivation, ip_adapter_weight 0.82, reference_images_needed [front_portrait, three_quarter_view, profile_view, expression_sheet]"
    - "brand_style_loras.qi_foundation_cultivation.notes: 'Traditional Chinese brushwork influence' (trigger style_qf)"
    - "qi_foundation/series_01.yaml (Quiet Hands, P0): Master Feung teaches somatic hand/breath qi practice; role = teacher-mentor to the burnt-out-creative protagonist"

  axes:

    # AXIS 1 — face_shape
    # Differentiation from Mira Aoki (soft_round, iyashikei-josei): Master Feung is
    # angular_long — gekiga / sumi-brush elder gravitas. The long low-contour face
    # with visible bone structure reads "weathered Chinese qigong elder" and sits
    # at the opposite pole from Mira's rounded josei softness on the primary axis.
    face_shape:
      value: angular_long
      lockout: yes
      mangaka_tradition: "Inoue Vagabond-style angular_long (Musashi adult) — sumi-brush seinen elder; pairs with the brand's 'Traditional Chinese brushwork influence' style register"

    # AXIS 2 — eye_geometry
    # Small, hooded, single-lid, minimal lashes — aged East-Asian male in the
    # Asano late-period / gekiga register. Maximally distinct from Mira's
    # medium-almond-DOUBLE-lid. Hooded + single-lid + small all diverge from her.
    eye_geometry:
      size: small
      shape: hooded
      spacing: standard
      lid_fold: single
      eyelash_density: minimal
      lockout: yes
      note: "small + single_lid + hooded signals an aged Chinese male per brand_lora 'Chinese male, elder'; the heavy upper-lid hood reads decades of practice/squint. Far from Mira's medium-almond-double. Forbidden-combo safe (no extra_large / heavy_decorative on this josei-register teacher)."

    # AXIS 3 — nose_construction
    # Seinen-elder nose: straight long bridge, drawn nostril — visible bone, the
    # opposite of Mira's short rounded implied iyashikei nose.
    nose_construction:
      bridge_angle: straight
      bridge_length: long
      tip_shape: pointed
      nostril_visibility: drawn        # seinen-elder register; brushwork style draws the nose, unlike Mira's 'implied'
      lockout: yes

    # AXIS 4 — mouth_jaw
    # Composed elder authority: neutral_firm resting line, medium-square jaw,
    # rounded chin softened by age, thin-both lips. The firm-but-not-frowning
    # mouth carries "settled qigong stillness" without sternness. Bow_mouth
    # forbidden for josei-register — not used.
    mouth_jaw:
      resting_expression: neutral_firm
      jaw_width: medium
      chin_shape: rounded
      lip_shape: thin_both
      lockout: yes

    # AXIS 5 — hair
    # THE ELDER SILHOUETTE SIGNAL. White-signaled, very_short crown swept back +
    # the qigong-elder LONG WHITE BEARD as the recurring silhouette ID (the
    # "Goku-spike / Frieren-twin-tail" equivalent for this character). This is
    # categorically distinct from Mira's long brown wavy side-part. The beard is
    # the reader's instant recognition handle.
    hair:
      length: very_short
      parting: no_part_swept_back
      fringe_style: no_fringe
      texture: straight
      color_signal: white_signaled
      signature_shape_note: "very short white crown swept straight back + a long flowing white beard (chest-length, slight wave) and long white moustache — the beard is the primary silhouette ID; it lifts slightly in qi-breath / exhale beats. OPERATOR-CONFIRM: beard length/style (chest-length flowing vs shorter sage-trim) is a guess from 'elder presence' — not specified in brand_lora."
      lockout: yes

    # AXIS 6 — build
    # lockout: no per template default (build less individuating; diffusion bases
    # collapse undescribed build to default-slim — reinforced via wardrobe + posture).
    # Wiry-spare elder frame, upright from decades of standing qigong (zhan zhuang).
    build:
      height_implied: average
      frame_density: small
      shoulder_ratio: average
      lockout: no

    # AXIS 7 — wardrobe_register
    # Traditional Chinese cultivation/qigong robe (daopao / changshan), loose
    # sleeves, cloth sash, soft cloth shoes. Era reads timeless-traditional, NOT
    # Mira's contemporary_2020s cream knit. The flowing robe silhouette is itself
    # a separator and supports the 'Traditional Chinese brushwork' brand style.
    wardrobe_register:
      era_signal: pre_industrial      # OPERATOR-CONFIRM: timeless-traditional Chinese register chosen over contemporary; if the qi_foundation house style places Feung in a MODERN studio (the students are contemporary office workers), this may need contemporary_2020s + a tai-chi practice uniform instead
      personality_encoding:
        - loose_sleeved_grey_daopao_robe      # traditional Daoist/qigong cultivation robe
        - dark_cloth_waist_sash
        - wide_legged_under_trousers
        - soft_black_cloth_shoes
      formality: ceremonial            # OPERATOR-CONFIRM: 'ceremonial' chosen for the traditional robe; 'casual' would fit a relaxed everyday-teacher read
      lockout: yes

    # AXIS 8 — posture_default
    # lockout: no per template default (posture varies per panel; needs OpenPose
    # not text tokens). Rooted, vertically-settled qigong stance — centered, weight
    # dropped, an upright stillness distinct from Mira's contained slight-left-lean.
    posture_default:
      energy: contained
      symmetry: symmetric
      lockout: no

    # AXIS 9 — age_signaling
    # THE SINGLE LARGEST SEPARATOR FROM MIRA. Feung is an elder (60s+); Mira is
    # early_30s. Full elder cue stack: crow's feet, nasolabial fold, jowl
    # softening, grey/white — the literal inverse of Mira's youthful, no-smile-line
    # face. Guarantees distinctness even if another axis drifted.
    age_signaling:
      apparent_age_decade: 60s         # OPERATOR-CONFIRM: 'elder presence' is qualitative; 60s vs 70s_plus is a guess — pick the decade you want him to read
      visible_age_cues:
        - full_crow_feet
        - deep_nasolabial_fold
        - jowl_softening
        - grey_at_temples
        - weathered_hands              # qigong hands are a teaching focus (series_01 'Quiet Hands') — hands carry visible age
      lockout: yes

    # AXIS 10 — skin_treatment
    # lockout: no per template default (skin tone implied via shading; build-the-
    # knowledge-gap axis). Weathered warm-medium tone consistent with an aged
    # outdoor-practicing Chinese elder.
    skin_treatment:
      texture: weathered
      tone: warm_medium
      lockout: no

    # AXIS 11 — accessories
    # UNIQUE HIGH-LEVERAGE SIGNATURE — deliberately NOT Mira's jade pendant.
    # A carved dark-bamboo breath-flute (xiao) slung across the back on a plain
    # cord: thematically a qi/breath instrument (on-brand for a qigong teacher),
    # silhouette-distinct, and his somatic teaching prop (he uses its long single
    # note to pace the student's breath). No other CORE-12 teacher carries it.
    accessories:
      glasses: none
      jewelry: none
      signature_item: "carved dark-bamboo breath-flute (xiao) worn across the back on a plain hemp cord — a qi/breath instrument used to pace the student's exhale; the long single note recurs as a teaching beat. OPERATOR-CONFIRM: the flute is invented from the qigong/breath theme — brand_lora names no signature object; alternatives if you prefer: a smooth river-stone qi-gourd, a worn wooden practice staff, or a string of dark wooden mala beads at the wrist."
      secondary_signature_item: "a single weathered gourd water-flask on the sash"
      lockout: yes

    # AXIS 12 — color_signal
    # Slate primary + ochre accent — ink-and-earth, reading directly off the brand
    # 'Traditional Chinese brushwork influence'. Cool slate robe + warm ochre sash/
    # earth accents. Opposite of Mira's warm_cream + jade_green. In B&W he renders
    # HIGH-contrast (dark robe, white beard) — the elder anchor of any panel, where
    # Mira renders deliberately mid-grey.
    color_signal:
      palette_primary: slate
      palette_accent: ochre
      palette_secondary: muted_brown
      bw_register_note: "Master Feung renders HIGH-contrast: dark slate robe as the deep-black mass, the white beard/hair as the brightest highlight against it — he is the high-contrast anchor figure in a panel (the inverse of Mira's deliberately mid-grey, never-highest-contrast register). Ink-brush black-fill on the robe folds reinforces the brand's brushwork style."
      lockout: yes

  # ── Solver metadata ─────────────────────────────────────────────────────
  solver:
    individuation_axes_locked: 9
    # face_shape, eye_geometry, nose_construction, mouth_jaw, hair,
    # wardrobe_register, age_signaling, accessories, color_signal
    # (build, posture_default, skin_treatment intentionally `lockout: no` per template defaults)
    last_validated: pending
    collision_check_passed: pending
    operator_confirmation: required
    collision_check_against:
      brand_scope: qi_foundation_cultivation
      same_brand_note: "Master Feung is the ONLY teacher-character on qi_foundation_cultivation — no same-brand teacher kin to collide with at the 5-locked-axis same-brand threshold."
      cross_brand_watch:
        - "master_wu (warrior_calm): Chinese male, martial composure — separated from Feung by age (Feung 60s elder vs Wu martial-prime), accessory (breath-flute vs none), and wardrobe (cultivation robe vs martial register). Cross-brand threshold is 7 locked axes."
        - "master_sha (sleep_restoration): Chinese male, healing/luminous calm — separated by age band, color_signal (slate/ochre vs sleep_restoration luminous-night), and the beard-flute silhouette."
        - "Mira Aoki (stillness_press, cross-brand): differs on ALL 9 locked axes (face/eye/nose/mouth/hair/wardrobe/age/accessory/color) — maximally far."
      collisions_detected: []          # no on-disk character_design instances exist yet for any other teacher; solver to re-run when kin instances land

  # ── Render metadata ─────────────────────────────────────────────────────
  render:
    # Per-archetype routing (operator decision pattern, mirrors gold template).
    # Authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    engine_routing_strategy: per_archetype
    engine_routing_authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    engines_in_play:
      - flux_schnell       # simple objects, backgrounds, decompression archetypes
      - flux_dev           # mid-shots, hands (qigong teaching-hands), robe drape, teacher-in-scene
      - qwen_image_pulid   # face close-ups (identity-critical — elder face + beard)
    secondary_face_lock: pulid_flux_facenet
    ip_adapter_weight: 0.82            # per brand_lora_plans.master_feung
    lora_required: false
    lora_skip_reason: "Per brand_lora plan, Feung's character LoRA (feung_qf) is a Pearl Star ComfyUI commission that is DEFERRED — no trained .safetensors exists yet. Named recurring teacher-cast run on PuLID-FLUX-FaceNet single/4-view conditioning until the LoRA is trained; the 4 reference_images_needed (front/three_quarter/profile/expression_sheet) feed PuLID. Re-evaluate LoRA once reference sheet is rendered and the series passes the 12+ chapter / cross-format consistency threshold."
    prompt_axis_priority:
      positive_prompt_axes:
        - face_shape
        - eye_geometry
        - hair                # beard is the strongest positive token
        - wardrobe_register
        - age_signaling
        - accessories
        - color_signal
      negative_prompt_axes:
        - mouth_jaw
      solver_only_axes:
        - skin_treatment
        - posture_default
        - build
        - nose_construction
    last_render_date: pending
    render_artifact_path: pending
    reference_sheet_path: pending
    # Will be populated by Phase C (reference sheet generation via Qwen+PuLID):
    # artifacts/manga/character_references/qi_foundation_cultivation/master_feung/{front,three_quarter,profile,expression_sheet}.png