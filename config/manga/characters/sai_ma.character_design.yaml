character_design:
  series_id: devotion_path_shonen
  brand_id: devotion_path
  locale: en_US   # OPERATOR-CONFIRM: extended roster is TW-only/auxiliary (zh_TW bright_presence-adjacent); brand-genre lane template carries no locale, so en_US is a placeholder — set to zh_TW if this character renders for the Taiwan auxiliary lane
  market_demo: shonen
  genre_family: supernatural_everyday
  subgenre: devotion_compassion_surrender
  character_id: sai_ma
  character_role: teacher_guide   # devotional teacher-figure / recurring guide, not a single-series protagonist (brand-genre lane teacher per devotion_path_shonen.yaml)
  drafted_by: pearl_program_orchestrator_autofill
  drafted_at: "2026-06-12"
  source_descriptions:
    - "brand_lora_plans.yaml character_loras.sai_ma.notes: 'Indian female, bhakti devotion radiance, flowing presence' (trigger_word saima_dp; ip_adapter_weight 0.85; training_steps 1800; style_ref devotion_path)"
    - "brand_lora_plans.yaml brand_style_loras.devotion_path.notes: 'Flowing ornamental warmth with devotional motifs' (style_dp)"
    - "manga_profiles/brands/devotion_path_shonen.yaml (teacher: sai_ma): market_demo shonen, genre_family supernatural_everyday, subgenre devotion_compassion_surrender, emotional_engine tenderness, visual_grammar fantasy_ornate, line_weight_profile medium, black_fill_ratio 0.15, screentone_profile decorative, reader_promise 'You will feel what devotion actually is — not performance, but opening.'"
    - "teacher_brand_author_roster.yaml open_vessel_press (teacher sai_ma): 'Bhakti devotion. Warm female-dominant voices. Purple/blush covers. Receiving energy.' topic_spread: compassion_fatigue, grief, self_worth, boundaries, depression, somatic_healing"

  axes:

    # AXIS 1 — face_shape
    # Indian female bhakti devotional teacher. OVAL (devotional-serene, balanced)
    # deliberately departs from Mira Aoki's soft_round (kodomomuke iyashikei
    # register). Oval carries the composed darshan-giving radiance of a mature
    # guide without the angular gekiga signal.
    face_shape:
      value: oval   # OPERATOR-CONFIRM: oval chosen for serene devotional-guide read; brand_lora gives ethnicity/role but not face geometry
      lockout: yes
      mangaka_tradition: "Adachi-school oval adapted to fantasy_ornate devotional register (composed, balanced, contemplative)"

    # AXIS 2 — eye_geometry
    # LARGE almond double-lid with MODERATE (not heavy_decorative) lashes — a
    # luminous 'darshan' gaze that reads as bhakti radiance/devotional warmth.
    # Larger than Mira's medium+minimal; shonen market_demo so josei
    # shojo-eye forbidden_combination does NOT bind, but lashes held to
    # moderate so she reads serene-devotional, not sparkle-shojo. Deep brown iris.
    eye_geometry:
      size: large   # OPERATOR-CONFIRM: large for devotional radiance / open receptive gaze; not a brand_lora-stated value
      shape: almond
      spacing: standard
      lid_fold: double
      eyelash_density: moderate   # OPERATOR-CONFIRM: moderate (not heavy_decorative) to keep serene-mature register
      iris_note: "deep warm brown; soft inner light in close-ups (tenderness emotional_engine)"
      lockout: yes
      note: "large+almond+double_lid + warm_medium skin (axis 10) reads South-Asian/Indian-coded consistent with brand_lora 'Indian female'; distinct from Mira's medium+minimal early-30s josei eye"

    # AXIS 3 — nose_construction
    # Straight medium bridge, rounded tip, nostril implied — fits fantasy_ornate
    # decorative register (not seinen-drawn, not gekiga-prominent).
    nose_construction:
      bridge_angle: straight   # OPERATOR-CONFIRM: nose geometry fully derived; brand_lora silent
      bridge_length: medium    # OPERATOR-CONFIRM
      tip_shape: rounded       # OPERATOR-CONFIRM
      nostril_visibility: implied
      lockout: yes

    # AXIS 4 — mouth_jaw
    # Resting SLIGHT_SMILE — the serene devotional half-smile of an opening/
    # receiving presence (vs Mira's neutral_soft 'held-in anxiety'). FULL_BOTH
    # lips for warmth. shonen market_demo, so josei bow_mouth ban does not apply,
    # but bow_mouth still avoided (full_both chosen instead).
    mouth_jaw:
      resting_expression: slight_smile   # OPERATOR-CONFIRM: serene devotional half-smile inferred from 'tenderness'/'receiving energy', not stated
      jaw_width: medium                  # OPERATOR-CONFIRM
      chin_shape: rounded                # OPERATOR-CONFIRM
      lip_shape: full_both               # OPERATOR-CONFIRM: full_both for warmth; bow_mouth deliberately avoided
      lockout: yes

    # AXIS 5 — hair
    # FLOOR_LENGTH, CENTER part, STRAIGHT, BLACK — 'flowing presence' (brand_lora)
    # rendered as the longest, most flowing silhouette in the roster. This is the
    # sharpest single separation from Mira (long_to_waist, side_left, slight_wave,
    # brown). Center-part + floor-length straight black = devotional-ascetic +
    # ornamental-flow signal; loose, never tied.
    hair:
      length: floor_length     # 'flowing presence' (brand_lora) — longest silhouette in roster
      parting: center          # OPERATOR-CONFIRM: center part inferred for devotional symmetry; brand_lora says only 'flowing'
      fringe_style: curtain    # OPERATOR-CONFIRM: soft curtain framing inferred
      texture: straight        # OPERATOR-CONFIRM: straight chosen to contrast Mira's wave; could be slight_wave
      color_signal: black
      signature_shape_note: "floor-length unbound black hair that moves like cloth in devotional/decorative panels (fantasy_ornate); never tied back — the flow itself is the silhouette signal of 'opening/receiving'"
      lockout: yes

    # AXIS 6 — build
    # Per template default — build is low-leverage; solver leaves unlocked.
    # Average height/frame; flowing-presence silhouette carried by hair+wardrobe.
    build:
      height_implied: average   # OPERATOR-CONFIRM
      frame_density: average    # OPERATOR-CONFIRM
      shoulder_ratio: average   # OPERATOR-CONFIRM
      lockout: no

    # AXIS 7 — wardrobe_register
    # CEREMONIAL devotional flowing garment (sari/shawl drape) with ornamental
    # devotional motifs (style_dp: 'flowing ornamental warmth with devotional
    # motifs'). NOTE: the era_signal allowed_values list is Japanese/Western only
    # and has NO South-Asian/devotional-traditional token — contemporary_2020s is
    # a forced placeholder; the real register is timeless-devotional.
    wardrobe_register:
      era_signal: contemporary_2020s   # OPERATOR-CONFIRM: allowed-values list lacks any South-Asian/devotional/timeless era token; this is a forced placeholder — true register is 'timeless devotional', consider extending the axis vocabulary
      personality_encoding:
        - flowing_draped_sari_or_shawl        # OPERATOR-CONFIRM: garment type inferred from 'Indian female' + 'flowing'/'ornamental' (not explicitly stated)
        - devotional_motif_border_embroidery   # ties to style_dp 'devotional motifs'
        - bare_feet_or_simple_sandals           # OPERATOR-CONFIRM: ascetic-devotional default
        - draped_shawl_over_one_shoulder
      formality: ceremonial
      lockout: yes

    # AXIS 8 — posture_default
    # Open, receptive, symmetric — 'receiving energy' (roster). Solver leaves
    # unlocked (posture varies per panel). Hands often open / palms-up.
    posture_default:
      energy: neutral            # OPERATOR-CONFIRM: serene-open, between contained and energetic
      symmetry: symmetric        # OPERATOR-CONFIRM: symmetric for devotional centeredness (vs Mira's slight_left_lean)
      gesture_note: "open hands / palms-up receptive gesture recurs (devotional 'receiving' read)"
      lockout: no

    # AXIS 9 — age_signaling
    # 40s mature devotional teacher/guide — radiant maturity, the opposite end of
    # the age spread from Mira (early_30s). Faint laugh lines from the resting
    # slight_smile; no heavy aging (radiance, not weariness).
    age_signaling:
      apparent_age_decade: 40s   # OPERATOR-CONFIRM: 40s inferred for mature devotional-teacher gravitas; brand_lora gives no age
      visible_age_cues:
        - smile_lines_visible        # from the habitual serene half-smile
        - no_full_crow_feet
        - youthful_radiant_skin_overall
        - smooth_brow_at_rest
      lockout: yes

    # AXIS 10 — skin_treatment
    # warm_medium tone consistent with 'Indian female' (brand_lora) and South-Asian
    # coding from the eye axis. Clean texture. Solver leaves unlocked (B&W-implied).
    skin_treatment:
      texture: clean
      tone: warm_medium   # OPERATOR-CONFIRM: warm_medium chosen for Indian-coded tone; could be warm_deep — confirm depth
      lockout: no

    # AXIS 11 — accessories
    # SIGNATURE ITEM = RUDRAKSHA MALA (108-bead prayer beads) — the highest-leverage
    # devotional individuation signal and a UNIQUE object (explicitly NOT Mira's
    # jade pendant). She tells the beads / holds them when transmitting tenderness;
    # it is her somatic devotional through-line. Plus a small bindi/tilak as a
    # secondary recurring forehead mark.
    accessories:
      glasses: none
      jewelry: signature_piece
      signature_item: "rudraksha mala — 108-bead prayer-bead strand worn at the neck and told through the fingers when she transmits/receives (devotional grounding gesture); the recurring visual through-line of the character, distinct from any pendant"   # OPERATOR-CONFIRM: rudraksha mala is a best-guess devotional object fitting 'bhakti'; confirm exact devotional item (mala vs tulsi beads vs none)
      secondary_signature_item: "small bindi / tilak forehead mark (devotional motif, ties to style_dp)"   # OPERATOR-CONFIRM: bindi/tilak inferred, confirm cultural specificity desired
      lockout: yes

    # AXIS 12 — color_signal
    # LAVENDER primary + DUSTY_ROSE accent = the roster's 'Purple/blush covers'.
    # Mustard/gold secondary for the devotional-warmth/ornamental-gilt motif
    # (style_dp 'flowing ornamental warmth'). Cleanly distinct from Mira's
    # warm_cream + jade_green. In B&W: soft mid-tone with decorative screentone,
    # mala beads = the recurring dark accent dots.
    color_signal:
      palette_primary: lavender        # roster 'purple covers'
      palette_accent: dusty_rose       # roster 'blush covers'
      palette_secondary: mustard       # OPERATOR-CONFIRM: mustard/gold for devotional ornamental warmth (style_dp); confirm vs ochre
      bw_register_note: "soft mid-tone figure with decorative screentone (brand black_fill_ratio 0.15, screentone_profile decorative); the rudraksha mala beads read as the recurring string of small dark accent dots the eye returns to; flowing hair carries the largest soft-grey mass"
      lockout: yes

  # ── Solver metadata ─────────────────────────────────────────────────────
  solver:
    individuation_axes_locked: 9
    # locked: face_shape, eye_geometry, nose_construction, mouth_jaw, hair,
    # wardrobe_register, age_signaling, accessories, color_signal
    # (build, posture_default, skin_treatment intentionally lockout: no per template defaults)
    last_validated: pending
    collision_check_passed: pending
    operator_confirmation: required
    collision_check_against:
      brand_scope: devotion_path
      cross_brand_scope: all_teachers
      collisions_detected: []

  # ── Render metadata ─────────────────────────────────────────────────────
  render:
    # Per-archetype engine routing (operator decision pattern, mirrors gold template).
    # Authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    engine_routing_strategy: per_archetype
    engine_routing_authority: docs/specs/MANGA_V3_3_MODEL_ROUTING_SPEC.md
    engines_in_play:
      - flux_schnell        # simple objects, backgrounds, decompression archetypes
      - flux_dev            # mid-shots, hands, devotional drape, character-in-scene
      - qwen_image_pulid    # face close-ups (identity-critical darshan gaze)
    secondary_face_lock: pulid_flux_facenet
    lora_required: false
    lora_skip_reason: "brand_lora_plans defines a character LoRA (saima_dp, 1800 steps, ip_adapter_weight 0.85) but sai_ma is on the EXTENDED/auxiliary roster (TW-only / bright_presence-adjacent); LoRA training is deferred and PuLID-FLUX-FaceNet face-lock alone is the production path until a dedicated LoRA commission is approved. Most named recurring cast use PuLID-FLUX-FaceNet with LoRA deferred."   # OPERATOR-CONFIRM: confirm LoRA deferral for this auxiliary-roster teacher vs commissioning saima_dp now
    prompt_axis_priority:
      positive_prompt_axes:
        - face_shape
        - eye_geometry
        - hair
        - wardrobe_register
        - age_signaling
        - accessories
        - color_signal
      negative_prompt_axes:
        - mouth_jaw
      solver_only_axes:
        - skin_treatment
        - posture_default
        - build
        - nose_construction
    last_render_date: pending
    render_artifact_path: pending
    reference_sheet_path: pending
    # Phase C reference sheet (Qwen+PuLID):
    # artifacts/manga/character_references/devotion_path/sai_ma/{front,three_quarter,profile,expression_sheet}.png