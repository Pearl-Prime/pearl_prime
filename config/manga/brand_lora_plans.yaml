    series_id: cogclar_jp_01
    brand_id: cognitive_clarity
    locale: ja_JP
    style_lora: style_cc
    trigger_word: "daisuke_cc_jp"
    character_name: "大輔"
    character_description: >
      Japanese male, 26, data analyst, angular face, glasses, short dark hair, tired-analytical expression, workplace-casual attire
    portrait_prompt: >
      manga portrait, josei genre, daisuke_cc_jp character, three-quarter view,
      upper body, Japanese male, 26, data analyst, angular face, glasses, short dark hair, tired-analytical expression, workplace-casual attire, contemplative expression,
      contemplative ink wash style, soft variable-weight brush linework,
      warm parchment cream background, watercolour wash shading,
      no text, no typography, no letters
    negative_prompt: >
      text, watermark, ugly, deformed, extra fingers, bad anatomy,
      bright neon, harsh contrast, western comic, 3d render,
      dramatic action pose, glamour, overly stylised
    reference_views:
      - front_portrait
      - three_quarter_view
      - profile_view
      - expression_neutral
      - expression_contemplative
      - expression_gentle_smile
      - expression_series_emotion
      - full_body_pose
      - body_partial_hands
      - body_partial_feet
    training_steps: 1500
    rank: 16
    alpha: 16
    base_model: flux1-dev-fp8
