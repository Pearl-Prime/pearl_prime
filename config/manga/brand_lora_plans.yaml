# Validation checklist (run after training)
validation:
  consistency_test_count: 20  # generate 20 images, check character recognizable
  cross_format_test:
    - cover_art
    - manga_panel
    - video_thumbnail
    - social_media_post
  acceptable_face_similarity: 0.85  # CLIP-based face similarity threshold
