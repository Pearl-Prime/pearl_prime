# Per-brand style LoRA (cohesive visual identity across all brand outputs)
brand_style_loras:
  stillness_press:
    trigger_word: "style_sp"
    training_images: 20  # curated brand-style exemplars
    training_steps: 2000
    notes: "Warm watercolor wash + ink line consistency; include forest-naturalism plates for alternate covers"

