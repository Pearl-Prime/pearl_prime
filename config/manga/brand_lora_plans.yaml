# LoRA training plans for character and brand style consistency.
# Each teacher gets a character LoRA; each brand gets a style LoRA.
# Trained on Pearl Star ComfyUI (FLUX.1-dev base model).
# Output: ~/content_bank/loras/{brand_id}/
schema_version: 1
last_updated: "2026-04-08"

training_defaults:
  base_model: "FLUX.1-dev"
  vae: "ae.safetensors"
  rank: 16
  alpha: 16
  learning_rate: 0.0001
  optimizer: "AdamW8bit"
  batch_size: 1
  gradient_accumulation: 4
  resolution: 1024
  output_root: "~/content_bank/loras"

trigger_word_convention: "{teacher_id}_{brand_suffix}"
# Examples: ahjan_sp (Stillness Press), joshin_cc (Cognitive Clarity)

brand_suffixes:
  stillness_press: sp
  cognitive_clarity: cc
  norcal_dharma: nd
  somatic_wisdom: sw
  qi_foundation: qf
  digital_ground: dg
  heart_balance: hb
  relational_calm: rc
  warrior_calm: wc
  sleep_restoration: sr
  body_memory: bm
  solar_return: so
  devotion_path: dp

# Per-teacher character LoRA (face/body consistency across all visual media)
character_loras:
  ahjan:
    trigger_word: "ahjan_sp"
    reference_images_needed:
      - front_portrait
      - three_quarter_view
      - profile_view
      - expression_sheet  # 4 expressions: neutral, contemplative, gentle_smile, teaching
    training_steps: 1500
    ip_adapter_weight: 0.85
    style_ref: stillness_press  # inherits brand art style
    notes: "South Asian male, warm expression, contemplative bearing"

  joshin:
    trigger_word: "joshin_cc"
    reference_images_needed: [front_portrait, three_quarter_view, profile_view, expression_sheet]
    training_steps: 1500
    ip_adapter_weight: 0.83
    style_ref: cognitive_clarity
    notes: "Japanese-American female, precise gaze, zen authority"

