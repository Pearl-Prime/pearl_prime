# ── Series count rule ────────────────────────────────────────────────────────
# Per (brand, genre) cell with allocation > 0%, the materializer emits
# series_count rows where:
#   series_count = max(1, round(allocation_pct / 10))
# Examples:
#   45% → 5 series; 30% → 3 series; 14-15% → 1-2 series; 5-9% → 1 series; 1-4% → 1 series
series_count_rule:
  formula: "max(1, round(allocation_pct / 10))"
  rounding: standard  # 0.5 rounds to even per Python round()
