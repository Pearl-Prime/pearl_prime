# Teacher manga character prompts — img2img style transfer (registry-aligned teacher ids).
# Authority: config/manga/style_archetypes.yaml, SOURCE_OF_TRUTH/teacher_banks/
# Used by: scripts/image_generation/manga_teacher_batch.py
#
# Each teacher has:
#   - positive: manga-style prompt (prepended with shared prefix)
#   - negative: style-specific negatives (appended with shared negatives)
#   - style_archetype: closest match from style_archetypes.yaml
#   - ip_adapter_weight: face preservation strength (0.7-0.95)
#   - img2img_denoise: latent space denoise strength (0.65-0.85)

schema_version: 1
last_updated: "2026-04-06"

shared_prefix: "img2img, manga character sheet, front-facing portrait and 3/4 view, high quality, detailed face, manga proportions"
shared_negative: "low quality, blurry, deformed, extra fingers, bad anatomy, watermark, text, logo, 3d render, photograph"

teachers:

  ahjan:
    display_name: "Ahjan"
    style_archetype: cozy_iyashikei
    ip_adapter_weight: 0.85
    img2img_denoise: 0.78
    positive: >-
      seinen manga character, soft ink linework, warm earth-toned watercolor wash,
      gentle eyes with depth and stillness, monastic simplicity, simple robes or
      clean modern clothing, expression is calm present quietly radiating warmth,
      subtle golden light aura around the figure, background soft bokeh of temple
      garden, meditation hall, or misty forest path with dappled light,
      Studio Ghibli meets Vagabond contemplative scenes,
      high detail face, clean linework
    negative: >-
      chibi, exaggerated, action pose, bright neon, horror, dark shadows,
      speed lines, battle aura

