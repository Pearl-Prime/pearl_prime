schema_version: 1
# Manga Brand Series Plan — per-brand serialization strategy
# Based on: docs/MANGA_SERIES_PORTFOLIO_RESEARCH.md industry benchmarks
# Respects: config/catalog_planning/diversity_guards.yaml (max 30% per topic/persona)
# Teachers per brand: config/catalog_planning/teacher_brand_lane_assignments.yaml

# Industry baseline (from research):
#   Weekly Shonen Jump: 18-22 active series simultaneously
#   Small indie publisher: 4-6 active series
#   Webtoon indie creator: 1-3 active series
#   Survival rate: ~50% survive 30 chapters (1 year at weekly cadence)
#   Our scale: 12 global teacher brands × ~3-5 active series each ≈ 48 active series at peak;
#   Taiwan adds one extra teacher-mode brand (Adi Da only) — see bright_presence_tw.

global_defaults:
  # Per-brand portfolio sizing (small publisher benchmark)
  active_series_target: 4          # maintain 4 active series simultaneously
  new_series_per_year: 5           # launch 5, expect 3-4 to survive 30 chapters
  # Long-run series catalog depth per teacher brand (owner band; simultaneous caps below).
  target_series_catalog_min: 6
  target_series_catalog_max: 18
  survival_rate_target: 0.70       # 70% survival at 30-chapter mark (above indie avg)
  min_chapters_before_decision: 10 # minimum viability window before cancellation
  decision_point_chapters: 30      # full survival assessment at 30 chapters

  # Chapter cadence (default: bi-weekly — sustainable for solo creator model)
  chapters_per_series_per_month: 2  # bi-weekly
  max_chapters_before_volume: 10    # collect 10 chapters → 1 volume
  volumes_per_year_target: 6        # 3 series × 2 volumes = 6 volumes/year

  # Series rotation
  max_dormant_months: 3            # pause after 3 months if engagement drops; rotate in new series
  overlap_new_old_weeks: 2         # new series starts 2 weeks before old wraps
  max_active_series: 6             # hard cap — never run more than 6 simultaneously

  # Simultaneous language release
  simultaneous_languages: [english_global, japan, korea]  # launch same-day in all 3
  language_rollout_delay_weeks: 4                          # other lanes follow 4 weeks later

  # Diversity constraints (mirrors diversity_guards.yaml)
  max_topic_concentration: 0.30    # no single topic > 30% of active chapters this week
  max_series_per_topic: 2          # no more than 2 active series on same topic

# ── BRAND SERIES PLANS ──────────────────────────────────────────────────────
# Ordered by english_global teacher brand, then mapped to all lanes.
# Lane-specific brands (stillness_press_de, etc.) inherit the same series plan
# but start offset by 4 weeks from english_global launch.

brands:
  # ── 1. STILLNESS PRESS (teacher: ahjan) ──────────────────────────────────
  stillness_press:
    teacher: ahjan
    primary_lane: english_global
    genre: iyashikei          # healing/calming — highest breath_sequences (4+/chapter)
    active_series_target: 3
    new_series_per_year: 4
    chapters_per_series_per_month: 2  # bi-weekly (sustainable, iyashikei readers patient)
    max_chapters_before_volume: 10
    volumes_per_year_target: 6

    topic_allocation:
      anxiety: 1 series          # primary: ahjan's core teaching
      sleep_anxiety: 1 series    # secondary: strong platform search volume
      somatic_healing: 1 series  # rotating third slot (somatic healing is iyashikei-native)
      # Also rotates: boundaries, depression, grief, courage (forest-simplicity strands merged here)

    webtoon_format:
      enabled: true
      platform_cadence:
        english_global: weekly    # Webtoon/Tapas US — weekly expected
        japan: bi_weekly          # LINE Manga — bi-weekly acceptable for iyashikei
        korea: weekly             # Naver/Kakao — weekly cadence expected

    series_rotation:
      max_dormant_months: 3
      overlap_new_old_weeks: 2

  # ── 2. COGNITIVE CLARITY (teacher: joshin) ───────────────────────────────
  cognitive_clarity:
    teacher: joshin
    primary_lane: english_global
    genre: seinen              # adult psychological depth — readers expect complexity
    active_series_target: 4
    new_series_per_year: 5
    chapters_per_series_per_month: 3  # tri-weekly (seinen readers engage more frequently)
    max_chapters_before_volume: 12
    volumes_per_year_target: 8

    topic_allocation:
      overthinking: 1 series     # cognitive clarity flagship
      imposter_syndrome: 1 series
      burnout: 1 series
      boundaries: 1 series       # rotating fourth slot

    webtoon_format:
      enabled: true
      platform_cadence:
        english_global: bi_weekly
        japan: bi_weekly
        korea: bi_weekly

    series_rotation:
      max_dormant_months: 2      # seinen readers churn faster — rotate sooner
      overlap_new_old_weeks: 1

  # ── 3. SOMATIC WISDOM (teacher: pamela_fellows) ──────────────────────────
  somatic_wisdom:
    teacher: pamela_fellows
    primary_lane: english_global
    genre: shojo               # body-centered healing maps to shojo's emotional vulnerability
    active_series_target: 3
    new_series_per_year: 4
    chapters_per_series_per_month: 2
    max_chapters_before_volume: 10
    volumes_per_year_target: 5

    topic_allocation:
      somatic_healing: 1 series  # flagship
      compassion_fatigue: 1 series
      self_worth: 1 series

    webtoon_format:
      enabled: true
      platform_cadence:
        english_global: bi_weekly
        japan: bi_weekly
        korea: weekly             # shojo audience strong on Naver/Kakao

    series_rotation:
      max_dormant_months: 3
      overlap_new_old_weeks: 2

  # ── 5. QI FOUNDATION (teacher: master_feung) ─────────────────────────────
  qi_foundation_cultivation:
    teacher: master_feung
    primary_lane: english_global
    genre: cultivation         # xianxia/cultivation — long series, loyal readers
