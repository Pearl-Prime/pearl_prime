    new_series_per_year: 3     # cultivation: fewer new series, longer runs
    chapters_per_series_per_month: 4  # weekly (cultivation readers expect frequency)
    max_chapters_before_volume: 16
    volumes_per_year_target: 6

    topic_allocation:
      burnout: 1 series
      anxiety: 1 series
      self_worth: 1 series

    webtoon_format:
      enabled: true
      platform_cadence:
        english_global: weekly
        japan: weekly
        korea: weekly
        taiwan: weekly            # cultivation popular in Chinese-speaking markets

    series_rotation:
      max_dormant_months: 2      # cultivation readers abandon quickly if paused
      overlap_new_old_weeks: 3

  # ── 6. DIGITAL GROUND (teacher: miki) ────────────────────────────────────
  digital_ground:
    teacher: miki
