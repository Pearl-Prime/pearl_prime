# ── PROJECTION WIRING ───────────────────────────────────────────────────────
# The manga_chapters allocation in annual_projection_targets.yaml (e.g. 10% for
# english_global, 25% for japan) is distributed across active series as follows:
#
#   weekly_manga_chapters_budget = annual_target × manga_chapters_pct / 52
#
#   Per-series allocation = budget / active_series_target
#   (distributed round-robin across active series for the week)
#
#   Series arcs are tracked in projection_planner.py → series_plan[].
#   The projection_planner assigns which series gets chapters each week
#   based on: launch_week, run_weeks, dormancy schedule.
#
# This ensures:
#   1. manga_chapters total matches annual target ±5%
#   2. Each series gets consistent chapter pacing per its plan
#   3. Topic diversity: diversity_guards.yaml max 30% per topic enforced
#      across the weighted chapter count, not just title count

projection_integration:
  manga_chapters_split_method: round_robin_active_series
  respect_diversity_guards: true
  max_topic_pct_of_weekly_chapters: 0.30
  dormant_series_receives_zero_chapters: true
  new_series_launch_burst: 2         # 2 chapters in launch week (mirrors projection_planner.py)
