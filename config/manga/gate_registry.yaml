# Manga QC gate ids (referenced by revision_queue.issue.gate_id).
# Authority: specs/AI_MANGA_PIPELINE_SUMMARY.md (QC Agent, 30 gates across 5 categories)
# Last updated: 2026-04-01

gates:
  # ── Structural gates ──────────────────────────────────────────────
  - gate_id: MANGA_GATE_STORY_HANDOFF
    stage_owner: transmission_split
    severity: BLOCKER
    description: series/story_architecture_handoff.json exists and validates against schema.

  - gate_id: STRUCT.CHAPTER_SCRIPT_VALID
    stage_owner: chapter_writer
    severity: BLOCKER
    description: chapter_script_writer_handoff.json validates against schema; all required fields present.

  - gate_id: STRUCT.PANEL_COUNT_MATCH
    stage_owner: chapter_visual
    severity: BLOCKER
    description: panel_prompts panel count equals chapter_script panel count.

  - gate_id: STRUCT.PANEL_ID_UNIQUE
    stage_owner: chapter_visual
    severity: BLOCKER
    description: Every panel_id in chapter is unique and consistent across artifacts.

  - gate_id: STRUCT.PAGE_TYPE_CONSISTENT
    stage_owner: chapter_writer
    severity: MAJOR
    description: page_type field consistent with panel contents (silent pages have zero text).

  - gate_id: STRUCT.BEAT_SHEET_COVERAGE
    stage_owner: chapter_writer
    severity: MAJOR
    description: Chapter script covers all beats listed in the writer handoff entry.

  # ── Visual gates ──────────────────────────────────────────────────
  - gate_id: MANGA_GATE_IMAGES_ALL_OK
    stage_owner: chapter_image_gen
    severity: BLOCKER
    description: Every panel in panel_images_manifest has status ok with path and dimensions.

  - gate_id: VISUAL.PROMPT_STRUCTURE
    stage_owner: chapter_visual
    severity: BLOCKER
    description: Visual prompt artifacts include one compiled prompt per panel with composition notes and continuity tags.

  - gate_id: VISUAL.TOKEN_BUDGET
    stage_owner: chapter_visual
    severity: MAJOR
    description: Positive prompt token count <= 120 and negative prompt token count <= 60.

  - gate_id: VISUAL.LEXICON_COMPLIANCE
    stage_owner: chapter_visual
    severity: MAJOR
    description: All camera, action, mood terms come from style_bible lexicons; no freeform terms.

  - gate_id: VISUAL.CHARACTER_REFS
    stage_owner: chapter_visual
    severity: MAJOR
    description: Every named character panel includes LoRA reference from character_model_sheets.

  - gate_id: VISUAL.DRIFT_CHECK
    stage_owner: chapter_qc
    severity: MAJOR
    description: Panel style measurements within drift thresholds versus anchor panels (every 10 panels).

  - gate_id: VISUAL.NO_NEW_MEANING
    stage_owner: chapter_visual
    severity: BLOCKER
    description: Visual agent 7-point violation checklist passes (no symbolic props, weather changes, extra characters, etc.).

  - gate_id: VISUAL.TEACHING_PANEL_EXPRESSION
    stage_owner: chapter_visual
    severity: MAJOR
    description: If a teaching atom defines panel_expression, the visual prompt compiler preserves it.

  # ── Silence gates ─────────────────────────────────────────────────
  - gate_id: SILENCE.PROMPT_PURITY
    stage_owner: chapter_visual
    severity: BLOCKER
    description: Silent panels have silence_compliance=true with zero text-requesting terms; full prohibition list in negative prompt.

  - gate_id: SILENCE.PANEL_PURITY
    stage_owner: chapter_lettering
    severity: BLOCKER
    description: Silent panels produce silence_confirmed=true empty lettering entries; no text leaked.

  - gate_id: SILENCE.RENDERED_PURITY
    stage_owner: chapter_qc
    severity: BLOCKER
    description: OCR scan of final_page_composite silent panels confirms composite_text_detected=false.

  - gate_id: SILENCE.STRUCTURE
    stage_owner: chapter_writer
    severity: BLOCKER
    description: Silent panel intent is machine-visible; five-beat silence protocol enforced.

  - gate_id: SILENCE.GUARD_ADJACENCY
    stage_owner: chapter_writer
    severity: MAJOR
    description: silence_guard set on last 2 panels before and first 2 panels after silent pages (page-local counting).

  - gate_id: SILENCE.POST_SILENCE_REENTRY
    stage_owner: chapter_lettering
    severity: MAJOR
    description: Post-silence first bubble is smallest/lightest/shortest in chapter with first_after_silence=true.

  # ── Lettering gates ───────────────────────────────────────────────
  - gate_id: MANGA_GATE_LETTERING_SILENCE
    stage_owner: chapter_lettering
    severity: BLOCKER
    description: Lettering silence_confirmed matches dialogue presence on panels.

  - gate_id: LETTER.FULL_PANEL_COVERAGE
    stage_owner: chapter_lettering
    severity: BLOCKER
    description: Every panel_id in chapter has exactly one lettering entry; no panel absent.

  - gate_id: LETTER.TEXT_HASH_MATCH
    stage_owner: chapter_lettering
    severity: BLOCKER
    description: SHA-256 hash on every text element matches original chapter_script text verbatim.

  - gate_id: LETTER.SFX_WEIGHT_REDUCTION
    stage_owner: chapter_lettering
    severity: MAJOR
    description: SFX within 3 panels of silence has weight reduced per tier table.

  - gate_id: LETTER.GUARD_DENSITY
    stage_owner: chapter_lettering
    severity: MAJOR
    description: silence_guard panels have max 2 bubbles, font -15%, padding +20%.

  # ── Layout gates ──────────────────────────────────────────────────
  - gate_id: MANGA_GATE_LAYOUT_PAGES
    stage_owner: chapter_layout
    severity: BLOCKER
    description: final_page_composite contains expected page PNGs for each script page.

  - gate_id: LAYOUT.READING_DIRECTION
    stage_owner: chapter_layout
    severity: MAJOR
    description: Page layout matches reading direction (RTL/LTR/vertical scroll) from series config.

  - gate_id: LAYOUT.Z_ORDER
    stage_owner: chapter_layout
    severity: MAJOR
    description: Text overlay z-ordering correct (background panel > bubbles > SFX > captions).

  # ── Transmission gates ────────────────────────────────────────────
  - gate_id: TRANSMISSION.HANDOFF_CLEAN
    stage_owner: transmission_split
    severity: BLOCKER
    description: Writer handoff contains zero carrier_beat, atom, hiding_place, or somatic_target annotations.

  - gate_id: TRANSMISSION.INTERNAL_RECORD_COMPLETE
    stage_owner: transmission_split
    severity: MAJOR
    description: Internal record preserves all carrier annotations for QC verification.

  - gate_id: TRANSMISSION.STEALTH_DIALOGUE
    stage_owner: chapter_qc
    severity: BLOCKER
    description: No forbidden therapeutic terms in dialogue or captions (ITE T-04 cross-check).

  # ── Bestseller story-substance gates (chapter_qc — HARD_FAIL) ─────
  # Emitted by phoenix_v4/manga/qc/bestseller_gate.py and enforced in
  # phoenix_v4/manga/runner/chapter_runner.py::_stage_qc, which raises
  # BestsellerGateError (HARD_FAIL) on any BLOCKER finding here in the production
  # quality profile (set MANGA_QC_NONBLOCKING=1 to downgrade to advisory for
  # CI/triage). Listed per specs/AI_MANGA_PIPELINE_SUMMARY.md section 8 — the gate
  # registry is the single source of truth; any gate_id not listed is not enforced.
  - gate_id: MANGA.BESTSELLER.SUBSTANCE
    stage_owner: chapter_qc
    severity: BLOCKER
    description: Chapter has authored story body, not a canned skeleton — enough panels and pages, no unfilled stub or placeholder markers (TODO, TBD, FIXME, HOOK, unfilled template slots), no verbatim-repeated or low-variety templated panels, and a non-empty close.

  - gate_id: MANGA.BESTSELLER.HEALING_REGISTER
    stage_owner: chapter_qc
    severity: BLOCKER
    description: Healing/iyashikei-profile chapters avoid the craft-bible section 6 cardinal sins — no emotional labeling in caption or narration, no cliffhanger or question endings, and no villain/threat/battle language that breaks the healing contract.

  # ── Craft register gates (chapter_qc) ─────────────────────────────
  # Native severity MAJOR, but bestseller_gate.evaluate_bestseller_gate runs each
  # of these and PROMOTES its finding to BLOCKER in the production profile, so they
  # too can HARD_FAIL the chapter pipeline. Listed here so every gate_id the
  # bestseller gate can emit is known to the registry (SSOT). Emitters:
  # hook_gate.py / pacing_gates.py / restraint_gate.py / yearning_gate.py.
  - gate_id: MANGA.CHAPTER.HOOK
    stage_owner: chapter_qc
    severity: MAJOR
    description: Chapter-end final panel/note signals the profile's chapter_hook_family. Promoted to BLOCKER by the bestseller gate in production.

  - gate_id: MANGA.SILENCE.DENSITY
    stage_owner: chapter_qc
    severity: MAJOR
    description: Silent-panel ratio is within the profile's silent_panel_ratio target plus/minus 0.15. Promoted to BLOCKER by the bestseller gate in production.

  - gate_id: MANGA.GENRE.AUTHENTICITY
    stage_owner: chapter_qc
    severity: MAJOR
    description: Words-per-page is within the profile's genre band (explicit pacing words_per_page_band, or words_per_page_target plus/minus 30%). Promoted to BLOCKER by the bestseller gate in production.

  - gate_id: MANGA.RESTRAINT.EXPOSITION
    stage_owner: chapter_qc
    severity: MAJOR
    description: Josei/shojo/romance chapters keep explicit emotional narration at or below 25% of panels — emotion is shown (gesture/silence/action), not labeled. Promoted to BLOCKER by the bestseller gate in production.

  - gate_id: MANGA.YEARNING.PACING
    stage_owner: chapter_qc
    severity: MAJOR
    description: Longing/romance chapters defer resolution — resolution language stays at or below 15% of panels (no premature confession, kiss, or closure), sustaining yearning. Promoted to BLOCKER by the bestseller gate in production.
