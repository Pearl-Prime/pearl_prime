# Forbidden Tokens Registry — Phoenix Omega Manga Pipeline V2 (Phase A.7)
#
# Status: AUTHORITY (new, this PR — V2 Phase A).
# Schema version: 1.0
# Created: 2026-05-07
# Branch: agent/manga-v2-phase-a-individuation-20260507
#
# Purpose:
#   The prompt builder (scripts/manga/character_individuation/prompt_builder.py)
#   consumes this registry to populate the negative-prompt slot at panel-build
#   time. Two layers:
#     - universal: tokens forbidden across every panel render (hard quality
#       baseline + register guards that apply to all manga panels)
#     - per_genre: tokens forbidden only within a specific genre (avoids
#       register oscillation when the prompt body is genre-specific)
#
# Derived from:
#   - genre_prompt_cookbook_v2.yaml::universal_negative (KDP-cover-targeted
#     but the quality + photorealism guards transfer cleanly to panels)
#   - docs/COMFYUI_FLUX_MANGA_PROMPTING_RESEARCH_2026-04-29.md §3 (per-genre
#     drift autopsy) — register oscillation was the structural defect cited
#     across stillness_press anxiety dashboard PNGs
#   - artifacts/research/dashboard_22_failure_diagnosis_2026-05-02.md (visual
#     evidence of attractor / register collapse)
#   - cap entry MANGA-LAYERED-PIPELINE-V2-01 §A7 (this file's authoring slot)
#
# Authoring rules (Phase A baseline — Phase C may extend):
#   - universal: only tokens that compromise commercial-viable quality OR
#     break the manga-panel register at every genre. Not character-specific.
#   - per_genre: only tokens that pull a genre toward another genre's
#     register (e.g., "neon cyberpunk lighting" forbidden in healing).
#   - Phase C may add per-character forbidden lists once character_design
#     instances are filled (operator + brand owner per character_design YAML
#     authoring task A4).

schema_version: "1.0"
last_updated: "2026-05-07"
authority: "MANGA-LAYERED-PIPELINE-V2-01 §A7 (cap entry), CHARACTER_INDIVIDUATION_PIPELINE_SPEC_2026-05-02.md §2.3"

# ── Universal forbidden tokens (every panel render) ──────────────────────────
universal:
  quality_floor:
    - low quality
    - blurry
    - jpeg artifacts
    - watermark
    - signature
    - cropped
    - out of frame
    - duplicate
  anatomy_floor:
    - extra fingers
    - missing fingers
    - malformed hands
    - extra limbs
    - missing limbs
    - distorted face
    - asymmetric eyes
  text_lock:
    # Manga PANELS may carry SFX (composited later by bubble_render); FLUX
    # rendering text in-image creates fake glyphs. PIL composites real text.
    # Per memory feedback_cover_text_overlay_two_stage: imagery only at FLUX layer.
    - text
    - typography
    - letters
    - words
    - speech bubbles
    - dialogue text
  unwanted_modes:
    # The "everyone-ai-photoreal" attractor that broke the V1 stillness_press
    # dashboard per dashboard_22_failure_diagnosis. Pull toward manga register.
    - photograph
    - photorealistic
    - 3d render
    - cgi
    - octane render
    - unreal engine
    - blender render

# ── Per-genre forbidden tokens (only when that genre is the active context) ──
per_genre:
  healing:
    # iyashikei gets pulled into shojo-sparkle or seinen-grim attractors.
    - sparkle
    - shojo decoration
    - heavy shading
    - dramatic chiaroscuro
    - violence
    - blood
    - intense action
  iyashikei:
    - sparkle
    - shojo decoration
    - heavy shading
    - dramatic chiaroscuro
    - violence
    - blood
  dark_fantasy:
    # dark_fantasy gets pulled to generic-fantasy or shonen-action.
    - bright cheerful
    - kodomomuke style
    - sparkle
    - cute mascot
  psychological_horror:
    - bright cheerful
    - kodomomuke style
    - sparkle
    - cute mascot
    - cartoon violence  # horror is implied/somatic, not graphic-cartoon
  mecha:
    # mecha gets pulled to anime-cute-robot.
    - kodomomuke
    - cute robot
    - chibi mech
    - sparkle
  romance:
    # romance gets pulled to either shojo-sparkle or seinen-explicit.
    - explicit
    - heavy shading
    - dramatic chiaroscuro
    - violence
  slice_of_life:
    - violence
    - intense action
    - dramatic chiaroscuro
    - sparkle
  fantasy_adventure:
    # fantasy_adventure gets pulled to dark_fantasy register without guards.
    - grimdark
    - heavy chiaroscuro
    - blood
    - explicit violence
  comedy:
    - dramatic chiaroscuro
    - heavy shading
    - violence
    - blood
  cultivation:
    # cultivation gets pulled to generic-fantasy without xianxia anchors.
    - western fantasy
    - medieval european
    - knight armor
  battle:
    - sparkle  # battle is gritty even in shonen-base
    - kodomomuke
    - chibi
  mystery:
    - bright cheerful
    - sparkle
    - kodomomuke
  workplace:
    - sparkle
    - dramatic chiaroscuro
    - violence
    - cosplay
  essay:
    - dramatic action
    - heavy shading
    - violence
  memoir:
    - dramatic action
    - violence
    - sparkle
  graphic_medicine:
    - dramatic action
    - violence
    - sparkle
    - exaggerated cute
  supernatural_everyday:
    # iyashikei-with-spirits — keep the everyday register; reject horror.
    - blood
    - graphic violence
    - jump scare
    - body horror
  school:
    - explicit
    - violence
    - blood
  family:
    - explicit
    - violence
    - blood
  food:
    - violence
    - blood
    - dramatic chiaroscuro
  sports:
    - sparkle
    - kodomomuke
  procedural:
    - sparkle
    - kodomomuke
  historical:
    - cyberpunk
    - neon
    - modern technology
  sci_fi_cyberpunk:
    - medieval
    - magical fantasy
    - traditional fantasy elements
  social_issue:
    - sparkle
    - dramatic action
    - violence  # implication-only register
  battle_internal:
    - external violence
    - graphic combat
    - sparkle  # internal-conflict register
  horror:
