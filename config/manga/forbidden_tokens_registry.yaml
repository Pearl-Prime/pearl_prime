    - sparkle
    - kodomomuke

# ── Demographic-axis forbidden tokens (rules from character_design_axes) ─────
# These mirror the forbidden_combinations in character_design_axes.yaml::
# solver_rules. Solver enforces at character_design level; prompt builder
# enforces at token level for belt-and-braces coverage.
per_market_demo:
  josei:
    - shojo sparkle
    - heavy_decorative eyelashes
    - bow mouth
    - extra_large eyes
  seinen:
    - heavy_decorative eyelashes
    - shojo sparkle
    - cute mascot
  kodomomuke:
    - explicit
    - violence
    - blood
    - dramatic chiaroscuro
  shonen:
    - explicit
    # shonen tolerates action; "violence" is normal context. Lighter list.
  mature:
    # adult-mature register; no demographic forbids (operator gate).

# ── Per-base-model token-style adapter notes ─────────────────────────────────
# The prompt builder uses these to pick the right negative-prompt syntax:
#   animagine_xl_4_0 — Danbooru tag style; comma-separated negatives are best
#   qwen_image      — natural-language; rewrite as prose ("avoiding X, Y, Z")
#   flux_schnell    — limited negative-prompt support; cap at 8-10 tokens
base_model_adapter:
  animagine_xl_4_0:
    style: danbooru_tags
    join: ", "
    cap_tokens: 30
  qwen_image:
    style: natural_language_prose
    prefix: "avoiding "
    join: ", "
    cap_tokens: 20
  flux_schnell:
    style: terse_tags
    join: ", "
    cap_tokens: 10  # FLUX-schnell at 4 steps responds poorly to long negatives
