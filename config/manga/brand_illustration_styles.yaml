      accent: "#8B7355"  # warm sepia accent (rare)
      background: "#FAFAFA"
    line_weight: bold
    shading: screen_tone_halftone
    background_treatment: stark_white_with_ink_splash
    typography_style: geometric_sans
    mood_reference: "Vinland Saga clarity + Honey and Clover warmth in key panels"
    locale_variants:
