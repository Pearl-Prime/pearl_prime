# Per-brand illustration style definitions for manga, covers, and visual content.
# Each brand has a unique art style — NO sharing between brands.
# Locale variants inherit base style with cultural adjustments.
# Authority: brand_identity_system.yaml (palettes), teacher_character_prompts.yaml (base prompts).
schema_version: 1
last_updated: "2026-04-08"

shared_negative: "low quality, blurry, deformed, extra fingers, bad anatomy, watermark, text overlay, logo, 3d render, photograph, stock photo"

brands:
  stillness_press:
    teacher: ahjan
    style_name: "Contemplative Ink Wash"
    archetype_base: cozy_iyashikei
    prompt_template: >
      seinen manga, soft ink linework, warm earth-toned watercolor wash,
      contemplative mood, generous negative space, paper texture grain,
      Studio Ghibli meets Vagabond, {subject}
    negative_prompt: "bright neon, harsh shadows, action lines, speed effects, chibi"
    color_palette:
      primary: ["#64748B", "#D4A574"]  # slate, warm gold
      accent: "#B8860B"
      background: "#F5F0E8"  # warm parchment
    line_weight: medium
    shading: watercolor_wash
    background_treatment: atmospheric_gradient
    typography_style: handwritten_serif
    mood_reference: "Vagabond contemplative panels + watercolor landscapes"
    locale_variants:
      jp: { cultural_note: "standard manga conventions, right-to-left reading" }
      kr: { cultural_note: "webtoon vertical scroll, left-to-right" }
      fr: { cultural_note: "bande dessinée panel density, Franco-Belgian spacing" }

  cognitive_clarity:
