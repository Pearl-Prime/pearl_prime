schema_version: "1.0.0"
artifact_type: serial_spine
series_id: stillness_press__en_US__psychological_thriller__series01
catalog_title: "The Room Reads You Back"
genre: psychological_thriller
mode: teacher
pilot_ref: artifacts/manga/pilots/wave1/the_room_reads_you_back__ep_001.chapter_script.yaml
spine_source: artifacts/manga/pilots/SERIAL_ENGINE_SPINES_5VOL.md

serial_engine: body_confesses_before_mouth
long_arc_spine: >-
  Can Mara read the witness instead of the lawyer when every case attacks her method at
  a new failure point — and when the Ledger's replicable model and the Mirror's weaponized
  tells aim the instrument back at the people who taught it?
renewable_unit: >-
  One case per volume with a new tell channel — muted footage, phone breathing,
  deposition typos — where the body confesses to its truth, not her theory.
escalation_axis: >-
  Adversary competence and method inversion — each case jams the instrument at a new
  failure point, ending with the method aimed at Voss and Mara herself.
shell_law: >-
  Thrillers escalate by adversary competence and method inversion — each case attacks
  the method at a new failure point. The body confesses before the mouth; logic alone
  loses.
binge_mechanism: >-
  Case cliffs + method-vs-model war + drip-fed origin; each volume's case closes but
  its implication opens the next.

volume_arcs:
  - volume: 1
    title: "The Tell"
    logline: >-
      Hadley conviction wobbles — tell real but pointed at a different crime; the Ledger
      behavioral-analytics unit arrives as replicable rival instrument.
    status: authored
  - volume: 2
    title: "The Still Man"
    logline: >-
      Null case — suspect with no tells; stillness is the tell; Mara beats the Ledger
      by one beat but cannot show her work.
    status: planned
  - volume: 3
    title: "The Mirror"
    logline: >-
      Adversary reads bodies too and feeds false alarms until Mara's instrument jams;
      Voss benched by software rollout.
    status: planned
  - volume: 4
    title: "The Instrument Breaks"
    logline: >-
      Case adjacent to Mara's own history — why she scans exits; Ledger flags her blind
      spot; data and body become complementary instruments.
    status: planned
  - volume: 5
    title: "The Witness Who Taught Me"
    logline: >-
      Voss's cold case — his tell on the page since ep_001; Mara reads the one body she
      never watched; new case file and her throat moves at the photo.
    status: planned

