serial_engine: breakthrough_ladder_rank_politics
long_arc_spine: >-
  Shen Yan vowed to climb the Ninefold Gate sect's whole ladder without leaving
  the First Gate — but every forced opening bills the body, Wei Long's five rings
  mock him, and the Autumn Ascent roll decides who exists.
renewable_unit: >-
  One gate, one ring, one public verdict — breakthrough logic tested on the
  tournament clock.
escalation_axis: >-
  Forcing ruptures → demotion → foundation reforging → invisible art → doctrine
  war. Stillness is a power mechanic with ladder consequences, never a mood.
shell_law: >-
  Cultivation MAY escalate classically (ladder, tournament, sect politics) but
  every arc Yan gives something up; unbracing is the power system.
binge_mechanism: >-
  Ring-hum progression + roll verdicts + rival stroll + inner-vision channel maps.

volume_arcs:
  - volume: 1
    title: "Struck From the Roll"
    logline: >-
      Public qi-deviation on the Ascent; demotion to the lowest gate; vow to
      climb without leaving the first gate.
    status: authored
  - volume: 2
    title: "The School of Iron"
    logline: >-
      Tournament arc vs pill-merchant clan; pain re-braces mid-bout; shared
      teacher lineage with Wei Long revealed.
    status: planned
  - volume: 3
    title: "Settling Under Pain"
    logline: >-
      Inverse training — unclench around injury; Master Ku's frailty shown not
      said; Wei's forced openings bill him.
    status: planned
  - volume: 4
    title: "The Invisible Art"
    logline: >-
      Federation scoring cannot see settling; Yan must win so cleanly stillness
      becomes visible.
    status: planned
  - volume: 5
    title: "The Two Roads"
    logline: >-
      Wei's body gives out; succession duel with the Iron Master; nationals wait.
    status: planned

