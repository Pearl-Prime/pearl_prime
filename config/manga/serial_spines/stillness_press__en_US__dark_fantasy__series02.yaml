schema_version: "1.0.0"
artifact_type: serial_spine
series_id: stillness_press__en_US__dark_fantasy__series02
catalog_title: "The Forest Beneath the Skin"
genre: dark_fantasy
mode: teacher
pilot_ref: artifacts/manga/pilots/the_forest_beneath_the_skin__ep_001.chapter_script.yaml
spine_source: artifacts/manga/pilots/SERIAL_ENGINE_SPINES_5VOL.md

serial_engine: bestiary_meeting_depth_age
long_arc_spine: >-
  Rin's inner realm is a dark-fantasy map of somatic creatures that cannot be cut
  — only met — while the Iron Wardens offer a civilization of bracing that works
  until it dies, and the Keeper's sealed region waits unpaid.
renewable_unit: >-
  One un-cuttable creature per arc, met in a new region of the body-realm; walls
  are bracing; meeting is the only combat.
escalation_axis: >-
  Depth and age — older regions, older wounds, war of doctrines about walls. Map
  gets darker as it gets truer.
shell_law: >-
  Dark fantasy escalates by depth/age, not stakes-in-general. Meeting scenes are
  stillness boss-fights; wall-fall blooms follow each true meeting.
binge_mechanism: >-
  Bestiary collection + map completion + order-war + first-wall mystery.

volume_arcs:
  - volume: 1
    title: "The Warden Who Would Not Sleep"
    logline: >-
      The Vigil returns with every storm; realm map introduced; Iron Warden patrol
      offers a stronger wall at volume close.
    status: authored
  - volume: 2
    title: "The Marsh of the Swallowed Voice"
    logline: >-
      Choir Under the Water — unsaid words; Iron Wardens drain the marsh as public
      works; first doctrinal clash meeting vs draining.
    status: planned
  - volume: 3
    title: "The Borderlands"
    logline: >-
      Shared march ignites Ember Fields; Smolder-Hound; every relationship is a
      border between realms.
    status: planned
  - volume: 4
    title: "The Iron March"
    logline: >-
      Inside Commander Sela's fortress-realm; Vigil becomes mount; blight inside
      perfect walls.
    status: planned
  - volume: 5
    title: "The First Wall"
    logline: >-
      Deep Root original wound; Keeper's sealed Quiet; weather returns realm-wide.
    status: planned

