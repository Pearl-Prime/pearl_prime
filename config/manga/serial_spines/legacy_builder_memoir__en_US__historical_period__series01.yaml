schema_version: "1.0.0"
artifact_type: serial_spine
series_id: legacy_builder_memoir__en_US__historical_period__series01
catalog_title: "The Last Letter Home"
genre: historical_period
mode: teacher
pilot_ref: artifacts/manga/pilots/wave2/the_last_letter_home__ep_001.chapter_script.yaml
spine_source: artifacts/manga/pilots/wave2/README.md

serial_engine: war_paper_machinery_grief_clock
long_arc_spine: >-
  In Hōsen's letter-writer shop, every casualty list and returned bundle names
  someone the town already knows — and Fumi's brother is still with the Eighth
  on the Mukden clock when the paper arithmetic closes in.
renewable_unit: >-
  One letter, one list, one censor bar — the war's paper machinery closing on
  named people each episode.
escalation_axis: >-
  Lists → censor bars → returned bundles → posthumous letters → drawer of the
  unclaimed. Dramatic irony: victory lanterns over casualty boards.
shell_law: >-
  Historical escalates by era-force and paper arithmetic — never modern grief
  vocabulary. Grief is carried at the hand's pace, never cured.
binge_mechanism: >-
  Mukden clock + list-reading ritual + drawer mystery + dictation-as-duel returns.

volume_arcs:
  - volume: 1
    title: "The Character for Return"
    logline: >-
      Fumi blots 帰 rushing a widow's letter; the locked drawer opens on a
      posthumous bundle — the war's arithmetic enters the shop.
    status: authored
  - volume: 2
    title: "The Censor's Black Bar"
    logline: >-
      Field-post censorship hides what clerks already know; Fumi copies lists
      slower on purpose while the town cheers.
    status: planned
  - volume: 3
    title: "The Returned Bundle"
    logline: >-
      Whole bundles come back unclaimed; the shop becomes a ledger of names the
      town refuses to read aloud.
    status: planned
  - volume: 4
    title: "Mukden Week"
    logline: >-
      The offensive clock tightens; telegraph traffic doubles; Gensai's drawer
      gains weight faster than Fumi can grind ink.
    status: planned
  - volume: 5
    title: "The Letter That Waits"
    logline: >-
      Shinji's name on a list — or not — and a letter that must be written at
      the paper's pace, not Fumi's fear.
    status: planned

named_pressures:
  - id: mukden_clock
    kind: system
    label: Russo-Japanese War telegraph/casualty clock toward Mukden
    introduced_volume: 1
  - id: casualty_lists
    kind: system
    label: Posted telegraph name lists under victory lanterns
    introduced_volume: 1
  - id: censor_bars
    kind: system
    label: Field-post censorship blacking out lines
    introduced_volume: 2
    arc_note: ep_002 plants first bar across a line Fumi already read.
  - id: locked_drawer
    kind: mystery
    label: Paulownia drawer of returned letters
    introduced_volume: 1
  - id: gensai_pace
    kind: relationship
    label: Master hands that refuse hurry — relationship debt to slowness
    introduced_volume: 1

rivals: []

set_piece_registry:
  - id: ink_grinding
    label: Ink ground at the stone's pace
    renewal_rule: New stone rhythm each volume; always before the letter lands.
  - id: blotted_character
    label: A character ruined by rushing, then rewritten whole
    renewal_rule: New kanji each case; 帰 is V1 emblem.
  - id: dictation_duel
    label: Held brush while a voice fails
    renewal_rule: New relationship each volume; same held-brush grammar.
  - id: list_reading
    label: Fumi reading casualty syllables like sutra
    renewal_rule: Lists grow longer; reading slows intentionally.
  - id: drawer_open
    label: Locked drawer opened on returned mail
    renewal_rule: Once per volume; contents escalate.
