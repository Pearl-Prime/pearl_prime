series_id: stillness_press__en_US__action_battle__series01
catalog_title: "The Blade That Stopped Trying"
genre: action_battle
mode: teacher
pilot_ref: artifacts/manga/pilots/wave1/the_blade_that_stopped_trying__ep_001.chapter_script.yaml
spine_source: artifacts/manga/pilots/SERIAL_ENGINE_SPINES_5VOL.md

serial_engine: settled_strike_ladder
long_arc_spine: >-
  Can Jun's unbraced body strike truer than every forcing style on the ladder — and
  can settling survive when crowd, pain, and the scoreboard cannot see the art — while
  Kazu's iron wins today and bills his body tomorrow?
renewable_unit: >-
  One bout per arc in a new arena context — home circle, qualifier crowd, tournament
  bracket, federation mat — where the settled strike must be re-earned after bracing
  returns.
escalation_axis: >-
  The unbracing ladder — each volume Jun gives something up (crowd comfort, pain
  tolerance, visible power, forfeit pride) while opponents escalate forcing modalities
  and Kazu's iron fractures accumulate.
shell_law: >-
  Battle manga may escalate classically — ladder, tournament, style war — but this
  engine inverts the shonen power curve: every arc Jun gives something up. Power-ups
  are subtractions; doctrine is earned in defeat.
binge_mechanism: >-
  Ladder + rivalry + style-war + the injustice engine of an art the scoreboard cannot
  see.

volume_arcs:
  - volume: 1
    title: "The Strike You Cannot Force"
    logline: >-
      Settled strike works in the home circle and shatters under crowd and qualifier
      stakes; Tessen-ryū prodigy Kazu demolishes a friend at volume close.
    status: authored
  - volume: 2
    title: "The School of Iron"
    logline: >-
      Tournament arc vs Tessen; Jun loses the final when pain re-braces her mid-bout;
      Sensei and Iron Master shared one teacher — two griefs from one deathbed.
    status: planned
  - volume: 3
    title: "The Settling Under Pain"
    logline: >-
      Inverse training — unclench around injury; Sensei collapses into real frailty;
      Kazu's accumulating fractures surface — his brace is billing him.
    status: planned
  - volume: 4
    title: "The Invisible Art"
    logline: >-
      Federation scoring rewards visible power; settling looks like doing nothing;
      Jun must win so cleanly that stillness becomes visible.
    status: planned
  - volume: 5
    title: "The Two Roads"
    logline: >-
      Kazu's body gives out mid-final; succession duel with the Iron Master who
      re-finds settledness; dojo passes to Jun — inheritance of tempo, not power.
    status: planned

