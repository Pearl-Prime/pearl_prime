# Cross-Genre Blending Rules — Phoenix Omega Manga Cookbook Companion
#
# Status: AUTHORITY (new, this PR — research-only).
# Schema version: 1.0
# Created: 2026-05-02
#
# Purpose:
#   When a series sits across two genres (operator's stillness_jp_07 dark_fantasy +
#   somatic_fantasy iyashikei; jp_16 isekai + healing; mecha + iyashikei "After the
#   Cockpit" hypothetical), the cookbook needs a deterministic rule for which
#   genre's drawing tradition wins on which axis. This file specifies that rule
#   for the 20 most common cross-genre pairs.
#
# Token-weighting cross-reference (cited HuggingFace + sd_embed):
#   - Animagine XL 4.0 (SDXL-base) — supports `(token:1.2)` syntax via
#     lpw_stable_diffusion_xl pipeline. Most expressive of the three.
#     https://huggingface.co/docs/diffusers/using-diffusers/weighted_prompts
#   - FLUX-schnell — supports weighting via sd_embed
#     `get_weighted_text_embeddings_flux1` (added Aug 2024) but HF docs note
#     "prompt weighting doesn't necessarily help for newer models like Flux"
#     — weight values >1.3 often produce no visible change. Cap at 1.3 effective.
#     https://github.com/xhinker/sd_embed
#   - Qwen-Image — Qwen2.5-VL text encoder (T5-family bidirectional), no
#     documented `(token:weight)` syntax; responds to natural-language
#     emphasis ("strongly emphasizing X", "with prominent Y") rather than
#     parenthetical weights. Rewrite as prose.
#     https://github.com/QwenLM/Qwen-Image
#
# Cross-references (SHA-pinned):
cross_references:
  cookbook_research:
    path: docs/COMFYUI_FLUX_MANGA_PROMPTING_RESEARCH_2026-04-29.md
