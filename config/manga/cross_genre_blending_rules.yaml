  # ── 1. healing + slice_of_life — WORKING REGISTER ──────────────────────────
  healing_plus_slice_of_life:
    operator_status: working_anchor
    drawing_tradition_wins: slice_of_life
    expression_palette_wins: healing_iyashikei
    token_weighting:
      animagine: "(soft pastel:1.2), (gentle line art:1.15), domestic scene, slice of life manga, calm composition"
      qwen_prose: "soft pastel palette emphasized, with gentle line art and a calm domestic composition"
    why_it_works: "both registers share compositional DNA (mid-shot, daily-life, low ink density); minimal conflict — operator's stable case"
    failed_blend_mode:
      name: moe_drift
      pattern: "slice_of_life leans into fanservice eye-render"
      corrective: "weight down (big eyes:0.7), weight up (natural proportions:1.2)"
    working_anchor_mangaka:
      - { name: "Kiyohiko Azuma", works: ["Yotsuba&!"], url: "https://en.wikipedia.org/wiki/Yotsuba%26!" }
      - { name: "Kozue Amano", works: ["ARIA"], url: "https://en.wikipedia.org/wiki/Aria_(manga)" }

