schema_version: 1

gates:
  - gate_id: "MANGA.PROMPT.STRUCTURE"
    severity: "BLOCKER"
    description: "Visual prompt artifacts must include one compiled prompt per panel with composition notes and continuity tags."
  - gate_id: "MANGA.PROMPT.TOKEN_BUDGET"
    severity: "MAJOR"
    description: "Positive prompt token count must remain <= 120 and negative prompt token count <= 60."
  - gate_id: "MANGA.TEACHING.PANEL_EXPRESSION"
    severity: "MAJOR"
    description: "If a teaching atom defines panel_expression, the visual prompt compiler must preserve it in prompt composition."
  - gate_id: "MANGA.SILENCE.STRUCTURE"
    severity: "BLOCKER"
    description: "Silent panel intent must remain machine-visible so silence-specific QC can run later."
  - gate_id: "MANGA.CHAPTER.HOOK"
    severity: "MAJOR"
    description: "Chapter final beat should match the series profile's chapter_hook_family. Requires manga_profile to be loaded for the series."
    stage_owner: "chapter_qc"
  - gate_id: "MANGA.SILENCE.DENSITY"
    severity: "MAJOR"
    description: "Silent panel ratio should be within ±0.15 of the profile's silent_panel_ratio target."
    stage_owner: "chapter_qc"
  - gate_id: "MANGA.GENRE.AUTHENTICITY"
    severity: "MAJOR"
    description: "Dialogue density (words per page) should be within ±30% of the profile's words_per_page_target."
    stage_owner: "chapter_qc"
  - gate_id: "MANGA.RESTRAINT.EXPOSITION"
    severity: "MAJOR"
    description: "Romance and josei/shojo chapters must show emotional moments through action/gesture/silence rather than narration-heavy exposition. Triggered for market_demo=josei|shojo or genre_family=romance."
    stage_owner: "chapter_qc"
  - gate_id: "MANGA.CATALOG.HOMOGENEITY"
    severity: "MAJOR"
    description: "No two active manga_profiles may share (emotional_engine + chapter_hook_family). Run via scripts/manga/check_catalog_homogeneity.py."
    stage_owner: "catalog_review"
