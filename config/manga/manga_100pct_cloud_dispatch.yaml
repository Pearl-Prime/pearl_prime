mission: Move manga from NOT_GREEN to honestly GREEN only if real evidence supports it.
foundation:
  pr_number: 5597
  expected_head_sha: dcd860650edd6b7c5e4e5cd5d54c658cbca51237
  expected_base_sha: b507f3029e2aa7e5d9adfdb258b16d17910dc4fe
