absolute_rules:
  - Do not claim manga 100% until all proof, story, image, layout, queue, catalog, and blind-read evidence exists.
  - Do not invent approvals, goldens, proof roots, merge SHAs, or live Pearl Star outputs.
  - If a lane is blocked, write the blocker and next action.
  - Every lane must produce a closeout artifact under artifacts/analysis/ and proof artifacts under artifacts/qa/ where applicable.
  - Final GREEN can only be set by the final integrator and truth auditor after all prerequisites are merged and verified.
  - Do not run implementation lanes against an unmerged foundation PR.
agents:
  Pearl_ArtPipeline:
    maps_to_lanes: [A, B, E]
    goal: Real Pearl Star layered manga proof.
    tasks:
      - Generate real iyashikei and mecha manga panels through the production Pearl Star/V5 structural path.
      - Never use layer_00.png as an assembly input.
      - Prove L0/L2/L3 roles, clean support zones, scale, grounding, and that the final composite differs from preview.
      - Fix tiny, floating, and seated-pilot defects.
      - Write a proof root under artifacts/qa/ and a closeout under artifacts/analysis/.
    output_tags:
      - manga-live-layered-proof
      - manga-pearlstar-rerender
      - manga-layered-default
  Pearl_Story:
    maps_to_lanes: [C, J]
    goal: Story doctrine production wiring.
    tasks:
      - Wire manga bestseller story doctrine, genre story, subtle embed, metaphor, analogy, and parable or manga-native equivalent into production call paths.
      - Keep the renderer manga-native; do not import book prose rendering blindly.
      - Cover hook, escalation, cliffhanger, and contract trace IDs.
      - Add fail-closed tests and proof artifacts.
    output_tags:
      - manga-story-doctrine
      - manga-genre-story
      - manga-subtle-embed
      - manga-contract-trace
  Pearl_Mode:
    maps_to_lanes: [D]
    goal: Teacher and music modes end to end.
    tasks:
      - Verify and fix mode plumbing from series_plan through emit to apply_mode_vessel.
      - Prove teacher output changes and music output changes on the default manga path.
      - Add regression tests proving omission or bypass fails.
    output_tags:
      - manga-teacher-mode
      - manga-music-mode
      - manga-mode-plumbing
  Pearl_LetteringLayout:
    maps_to_lanes: [F]
    goal: Production lettering, layout, and JLREQ proof.
    tasks:
      - Integrate vertical and furigana runtime into the actual lettering path.
      - Prove vertical text, ruby or furigana, SFX, bubble readability, PASS-B reading graph, and spread layout.
      - Use an approved font or document the blocker.
      - Add tests and a visual proof packet.
    output_tags:
      - manga-jlreq-vertical-furigana
      - manga-spread-layout-solver
      - manga-passb-reading-graph
  Pearl_ProofOps:
    maps_to_lanes: [G, H, M]
    goal: Real production evidence and repeatable operations.
    tasks:
      - Run a full episode batch and build a proof packet from real roots.
      - Populate plan-to-output traceability.
      - Prove enqueue, worker pickup, retry, timeout and zombie handling, and artifact storage.
      - Ensure no committed generated JSON contains /Users paths.
      - Write release-readiness evidence.
    output_tags:
      - manga-proof-wave
      - manga-proof-packet-root
      - manga-queue-repeatability
      - manga-release-readiness
  Pearl_Catalog:
    maps_to_lanes: [L]
    goal: Catalog, brand, and 14-global-market verification.
    tasks:
      - Find all catalog plans, brand plans, and global-market plans.
      - Verify what exists versus what is claimed.
      - Produce an exists, claimed, and missing matrix with blockers.
      - Add gates where claims are unsupported.
    output_tags:
      - manga-global-market-count
      - manga-catalog-coverage
      - manga-brand-plan-coverage
      - manga-market-matrix
  Pearl_QA:
    maps_to_lanes: [I]
    depends_on:
      - Pearl_ArtPipeline
      - Pearl_Story
      - Pearl_Mode
      - Pearl_LetteringLayout
      - Pearl_ProofOps
      - Pearl_Catalog
    goal: Blind-read final bar.
    tasks:
      - Wait until all implementation and proof agents are green and their PRs are merged.
      - Build the blind-read packet and real judge scorecards.
      - Record real human or operator approval only if present.
      - Mark blocked when approval or scorecards are missing.
    output_tags:
      - blind-read-bar
      - operator-approval
      - judge-scorecards
final_auditor:
  name: Pearl_Auditor
  config: config/manga/manga_100pct_truth_audit.yaml
  tasks:
    - Read all closeouts, proof roots, PRs, merge SHAs, test logs, and final-verdict files.
    - Verify files and SHAs rather than trusting summaries.
    - Correct false claims and emit exact blockers and next actions.
    - Return GREEN only when every configured evidence surface passes.
