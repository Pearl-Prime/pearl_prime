format_adaptation_grammars_version: "1.0.0"
updated_at: "2026-04-20"

# Format adaptation grammars define compositor behavior for each output format.
# Each format has its own layout logic, pacing overrides, and export parameters.
# Used by: phoenix_v4/manga/runner/dag_order.get_compositor_for_format()

formats:

  print:
    format_id: print
    display_name: "Print (Tankōbon / Collected Edition)"
    reading_direction: right_to_left
    page_dimensions:
      width_mm: 128
      height_mm: 182
      bleed_mm: 3
    panel_grid: variable
    page_turn_axis: horizontal
    spread_enabled: true
    compositor_class: PrintCompositor
    export:
      format: pdf
      color_space: cmyk
      dpi: 600
    pacing_overrides:
      spread_frequency: profile_default  # print supports spreads where webtoon does not
    lettering_notes: |
      SFX: right-to-left gutter placement. Speech bubbles: tail toward speaker.
      Bleed panels allowed on chapter openers.

  webtoon:
    format_id: webtoon
    display_name: "Webtoon (Vertical Infinite Scroll)"
    reading_direction: top_to_bottom
    page_dimensions:
      width_px: 800
      height_px: variable  # strips stack vertically
    panel_grid: vertical_strips
    page_turn_axis: vertical
    spread_enabled: false
    compositor_class: WebtoonCompositor
    export:
      format: png_strip
      color_space: rgb
      dpi: 72
    pacing_overrides:
      spread_frequency: never  # spreads become tall vertical panels
      words_per_page_target_multiplier: 0.85  # tighter strips need tighter text
    lettering_notes: |
      SFX: placed below panel action, not in gutter. Bubble tails: top or side.
      No horizontal panel chains — vertical composition only.

  motion_comic:
    format_id: motion_comic
    display_name: "Motion Comic (Timeline Beat / Kinetic Panels)"
    reading_direction: left_to_right
    page_dimensions:
      width_px: 1920
      height_px: 1080
      aspect_ratio: "16:9"
    panel_grid: timeline_beat
    page_turn_axis: horizontal
    spread_enabled: true
    compositor_class: MotionComicCompositor
    export:
      format: mp4
      color_space: rgb
      fps: 24
      audio_track: optional
    pacing_overrides:
      silent_panel_ratio_multiplier: 1.20  # motion holds silence longer — it reads as breath
      reaction_shot_frequency: high  # reaction shots animate well; increase density
    timeline_beat_notes: |
      Each panel is a keyframe. Motion: parallax on bg/fg layers, ken-burns on stills.
      Dialogue appears word-by-word. SFX: kinetic typography, synchronized to audio cue.
      Chapter hook beat: hold 2s on final panel before cut to black.

  vertical_short_teaser:
    format_id: vertical_short_teaser
    display_name: "Vertical Short Teaser (9:16 Autoplay / Shorts / Reels)"
    reading_direction: top_to_bottom
    page_dimensions:
      width_px: 1080
      height_px: 1920
      aspect_ratio: "9:16"
    panel_grid: single_panel_sequence
    page_turn_axis: vertical
    spread_enabled: false
    compositor_class: VerticalTeaserCompositor
    export:
      format: mp4
      color_space: rgb
      fps: 30
      duration_target_seconds: 30
      duration_max_seconds: 60
      audio_track: required
    pacing_overrides:
      words_per_page_target_max: 12  # autoplay = minimal text; no time to read
      silent_panel_ratio: 0.60  # most panels are pure image for scroll-stop
      spread_frequency: never
    teaser_notes: |
      Scope: 6-10 panels max from chapter hook. Hook panel must appear within first 3s.
      SFX: animated text overlay. Subtitles required for accessibility + muted play.
      End frame: series title + CTA ("read now on [platform]").
      Audio: lo-fi/ambient bed that matches emotional_engine of profile.
