# ════════════════════════════════════════════════════════════════════════════
# AXIS PATTERN VOCABULARY (PR-A Batch 1 Leg 1 deliverable, 2026-05-03)
# ════════════════════════════════════════════════════════════════════════════
# 5-8 named patterns per axis with mangaka exemplar + token mapping per pattern
# + common-drift-mode. See artifacts/research/character_individuation_literature_2026-05-03.md
# (will land with PR-A Batch 2 — narrative companion with full citations).
#
# Token-mapping methodology: Animagine XL 4.0 uses Danbooru tag-based prompts;
# Qwen-Image and FLUX-schnell accept natural-language phrasing. Where Animagine's
# Danbooru-canonical tag exists, it's cited per the Danbooru tag-group wiki:
#   https://danbooru.donmai.us/wiki_pages/tag_groups
# Where empirical literature is empty for a specific pattern × base combination,
# entry is tagged `empirical_status: smoke_test_recommended`.

axis_patterns:

  face_shape:
    1A_adachi_oval:
      mangaka_exemplar: "Mitsuru Adachi (Touch, Cross Game, H2)"
      url: "https://en.wikipedia.org/wiki/Mitsuru_Adachi"
      animagine_tokens: "1boy/1girl, oval face, soft jawline, high cheekbones, medium eyes, almond eyes, tareme"
      qwen_flux_phrasing: "soft oval face with gentle jawline"
      common_drift_mode: "Without `oval face`, Animagine drifts to `round face` (kodomomuke) for `tareme` characters"
    1B_hara_square:
      mangaka_exemplar: "Tetsuo Hara (Hokuto no Ken)"
      url: "https://www.tcj.com/taniguchi-jiro-and-his-gekiga-years/"
      animagine_tokens: "square jaw, broad jaw, sharp eyes, sanpaku, scar, muscular"
      qwen_flux_phrasing: "rectangular face with a heavy square jaw and prominent brow ridge"
      common_drift_mode: "All 3 bases over-soften the jaw without explicit `broad jaw`; FLUX-schnell additionally smooths cheekbones at <28 steps"
    1C_toriyama_round:
      mangaka_exemplar: "Akira Toriyama (early Dragon Ball Goku, Dr. Slump)"
      url: "https://en.wikipedia.org/wiki/Manga_iconography"
      animagine_tokens: "round face, big eyes, chibi (careful), cartoon style"
      common_drift_mode: "Animagine's `round face` paired with adult tags pulls baby-face features; pair with `young adult`"
    1D_asano_heart_soft:
      mangaka_exemplar: "Inio Asano (Goodnight Punpun Aiko, Solanin)"
      url: "https://mangabrog.wordpress.com/2014/07/06/inio-asano-interview-reality-is-tough-so-read-this-manga-about-cute-girls-and-feel-better/"
      animagine_tokens: "heart-shaped face, soft jaw, narrow chin, mature female, slight under-eye shadow"
      common_drift_mode: "Animagine collapses heart-shaped to `round face` at chin-narrow descriptor without `narrow chin`"
    1E_clamp_elongated:
      mangaka_exemplar: "CLAMP (xxxHolic Yūko adult, Cardcaptor Sakura adult forms)"
      animagine_tokens: "long face, elongated face, slender, tall, very long hair, hime cut, large eyes, dense eyelashes"
      common_drift_mode: "FLUX-schnell flattens elongated proportions back to default at low steps"
    1F_otomo_compact_realist:
      mangaka_exemplar: "Katsuhiro Otomo (Akira — Kaneda, Tetsuo)"
      url: "https://en.wikipedia.org/wiki/Manga_iconography"
      animagine_tokens: "realistic, oval face, small eyes, sharp nose, scar across face"
      empirical_status: smoke_test_recommended
    1G_inoue_vagabond_angular_long:
      mangaka_exemplar: "Takehiko Inoue (Vagabond Musashi adult, Real)"
      animagine_tokens: "long face, angular jaw, sharp cheekbones, intense eyes, sumi-e style, ink wash"
      empirical_status: smoke_test_recommended
      common_drift_mode: "`sumi-e style` is loosely supported in Animagine 4.0; weaker on FLUX-schnell"
    1H_yotsuba_azuma_soft_round:
      mangaka_exemplar: "Kiyohiko Azuma (Yotsuba&!, Azumanga Daioh)"
      animagine_tokens: "round face, soft jaw, big eyes, child, cheerful, simple style"

  eye_geometry:
    leverage_note: "single highest-leverage axis — sub-attributes: size / shape / spacing / lid_fold / eyelash_density"
    danbooru_tag_group_url: "https://danbooru.donmai.us/wiki_pages/tag_group%3Aeyes_tags"
    2A_adachi_medium_almond_double_moderate:
      mangaka_exemplar: "Mitsuru Adachi (Touch, Cross Game)"
