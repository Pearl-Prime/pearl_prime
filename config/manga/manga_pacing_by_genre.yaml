# Aliases — map manga_profile.genre_family values to pacing keys
# Any genre_family NOT listed here is treated as unmapped (no pacing contract enforced).
genre_family_aliases:
  battle: battle
  romance: romance
  workplace: workplace
  healing: healing
  mystery: mystery
  horror: horror
  sports: sports
  essay: essay
  memoir: memoir
  social_issue: social_issue
  supernatural_everyday: supernatural_everyday
  school: school
  fantasy: fantasy
  graphic_medicine: graphic_medicine
  gag: gag
  # The following use the closest genre alias
  sci_fi: sci_fi_cyberpunk  # NEW per 2X.2 — proper standalone entry now exists
  procedural: workplace    # workplace pacing with episodic structure
  club_hobby: healing      # iyashikei adjacent
  food: healing            # healing + sensory close-ups
  historical: historical_period  # NEW per 2X.2 — proper standalone entry now exists
  survival: battle         # high-stakes, kinetic
  revenge: mystery         # tension-escalation pattern
  delinquent: battle       # escalation + rival pattern

  # ── Phase 2X.2 strategic-shell aliases — map new strategic slugs to proper pacing keys
  dark_fantasy: dark_fantasy
  mecha: mecha
  sci_fi_cyberpunk: sci_fi_cyberpunk
  historical_period: historical_period
  cultivation_martial: cultivation_martial
  # Pre-existing pacing rows cover these strategic slugs; alias for explicit mapping
  psychological_horror: horror
  supernatural_mystery: supernatural_everyday
  psychological_thriller: mystery
  romance_josei_drama: romance
  workplace_drama: workplace
  action_battle: battle
  sports_competition: sports
  school_coming_of_age: school
  iyashikei: healing
  isekai: fantasy
