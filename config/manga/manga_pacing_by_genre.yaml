    narration_tolerance: minimal
    sfx_usage: heavy_comedic
    background_density: minimal
    reference_corpus:
      - "Gintama"
      - "Azumanga Daioh"
      - "Daily Lives of High School Boys"
    arc_cadence:
      episodes_per_arc_range: [1, 25]
      episodes_per_arc_median: 1
      arc_pattern: fixed
      season_unit: 9  # chapters per volume (WSJ convention; 4-koma volumes differ)
      first_major_shift_by: null  # no status-quo-shift convention in this family (see notes)
      arc_cadence_confidence: medium
      arc_cadence_sources:
        - "Gintama — Wikipedia, 704 ch; episodic + periodic serious arcs (en.wikipedia.org/wiki/Gin_Tama, accessed 2026-07-24)"
        - "Benizakura Arc — Gintama Wiki (gintama.fandom.com/wiki/Benizakura_Arc, accessed 2026-07-24)"
        - "Azumanga Daioh — Wikipedia, 4-koma school-year cycle (en.wikipedia.org/wiki/Azumanga_Daioh, accessed 2026-07-24)"
      notes: >-
        Status quo is sacred: baseline is 1-ch (or 1-page) episodic units; long-runners spike a
        5-25-ch 'serious arc' every ~50-100 ch (Gintama Benizakura ch 89-97) then reset.
        School-cycle gag (Azumanga) uses the 3-year calendar as macro-shape with graduation as the
        only shift, at the very end.

