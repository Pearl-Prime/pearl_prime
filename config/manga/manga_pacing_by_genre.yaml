      notes: >-
        Role/zone arcs (a job, a stratum, a case) of 3-25 ch; case-grammar titles (GitS: 12
        episodic ch with 3-ch convergence) sit at the short end. First systemic rupture ranges ch
        9-60 (Alita Motorball entry ch ~13; Akira awakening mid-series) — plan by ch ~30.

  historical_period:
    label: "Historical / Period (Vinland Saga/Bride's Story register)"
    words_per_page_range: [50, 100]
    words_per_balloon_max: 22
    silent_panel_ratio_range: [0.20, 0.35]
    reaction_shot_frequency: medium
    spread_frequency: periodic_era_defining
