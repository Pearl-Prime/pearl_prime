      - irreversible_loss
      - antagonist_clarity
      - environmental_breath
    narration_tolerance: high
    sfx_usage: restrained_impact
    background_density: dense_atmospheric
    reference_corpus:
      - "Berserk"
      - "Vagabond"
      - "Vinland Saga"
      - "Frieren: Beyond Journey's End"
    arc_cadence:
      episodes_per_arc_range: [10, 90]
      episodes_per_arc_median: 45
      arc_pattern: escalating
      season_unit: 9  # episodes per volume (Young Animal / Afternoon convention)
      first_major_shift_by: 55
      arc_cadence_confidence: high
      arc_cadence_sources:
