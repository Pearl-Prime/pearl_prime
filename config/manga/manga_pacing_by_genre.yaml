      - surprising_admission
      - reader_mirror
      - reframe_moment
    narration_tolerance: generous
    sfx_usage: minimal
    background_density: simple
    reference_corpus:
      - "My Lesbian Experience with Loneliness"
      - "My Solo Exchange Diary"
      - "Inside Mari"
    arc_cadence:
      episodes_per_arc_range: [1, 12]
      episodes_per_arc_median: 1
      arc_pattern: fixed
      season_unit: 8  # essay-chapters per volume
      first_major_shift_by: null  # no status-quo-shift convention in this family (see notes)
      arc_cadence_confidence: low
      arc_cadence_sources:
        - "My Lesbian Experience with Loneliness — Wikipedia, single-volume essay units (en.wikipedia.org/wiki/My_Lesbian_Experience_with_Loneliness, accessed 2026-07-24)"
        - "My Solo Exchange Diary — Wikipedia, diary-entry chapters (en.wikipedia.org/wiki/My_Solo_Exchange_Diary, accessed 2026-07-24)"
      notes: >-
        LOW CONFIDENCE: corpus is 1-2 volume works; no 100-episode long-runner evidence exists for
        this family. Unit = one essay/diary entry (1 ch); volume = thematic arc (8-12 entries).
        Shifts are retrospective (pre-narrated), not plotted. Serial extrapolation for Lane 06 is
        inference, flagged in handoff.

  memoir:
    label: "Memoir / life reflection"
    words_per_page_range: [70, 160]
    words_per_balloon_max: 50
    silent_panel_ratio_range: [0.20, 0.40]
    reaction_shot_frequency: low
    spread_frequency: very_rare
    page_turn_triggers:
      - emotional_honesty
      - surprising_admission
      - reframe_moment
      - revelation
    narration_tolerance: generous
    sfx_usage: minimal
    background_density: moderate_realist
    reference_corpus:
      - "My Lesbian Experience with Loneliness"
      - "The Summit of the Gods"
    arc_cadence:
      episodes_per_arc_range: [6, 15]
      episodes_per_arc_median: 10
      arc_pattern: fixed
      season_unit: 8  # chapters per volume
      first_major_shift_by: 5
      arc_cadence_confidence: low
      arc_cadence_sources:
        - "My Lesbian Experience with Loneliness + sequels — Wikipedia (accessed 2026-07-24)"
        - "The Summit of the Gods — Wikipedia, 5 vols, expedition arcs (en.wikipedia.org/wiki/The_Summit_of_the_Gods, accessed 2026-07-24)"
      notes: >-
        LOW CONFIDENCE: thin long-serial evidence. Life-phase / expedition arcs of 6-15 ch; the
        premise-defining rupture sits in the opening chapters (by ~ch 5) and the rest excavates
        it. 100-episode memoir = stacked life-phase arcs with retrospectives (craft-bible vols
        8/16/24 rhythm is consistent, unproven at bar).

  social_issue:
    label: "Social issue / josei realism"
    words_per_page_range: [60, 100]
    words_per_balloon_max: 30
    silent_panel_ratio_range: [0.25, 0.45]
    reaction_shot_frequency: medium
    spread_frequency: rare
    page_turn_triggers:
      - revelation
      - status_shift
      - grief_beat
      - ambiguous_line
    narration_tolerance: moderate
    sfx_usage: minimal
    background_density: realist
    reference_corpus:
      - "A Silent Voice"
      - "Princess Jellyfish"
      - "Blue Period"
    arc_cadence:
      episodes_per_arc_range: [6, 25]
      episodes_per_arc_median: 14
      arc_pattern: escalating
      season_unit: null  # mixed: ~9 ch/vol weekly (A Silent Voice) vs ~4 ch/vol monthly (Blue Period)
      first_major_shift_by: 10
      arc_cadence_confidence: medium
      arc_cadence_sources:
        - "A Silent Voice — Wikipedia, 62 ch / 7 vols; time-skip after ch 6 (en.wikipedia.org/wiki/A_Silent_Voice_(manga), accessed 2026-07-24)"
        - "Blue Period — Wikipedia, exam arcs across vols 5-7 (en.wikipedia.org/wiki/Blue_Period_(manga), accessed 2026-07-24)"
      notes: >-
        Inciting rupture is FRONT-loaded (A Silent Voice elementary prologue ends ch 6; Blue
        Period commits to art by ch 5), then life-stage arcs of 10-25 ch escalate toward an
        institutional test (exam, film screening, hospital). Opposite of battle: the status-quo
        shift opens the story.

  supernatural_everyday:
    label: "Supernatural everyday"
    words_per_page_range: [50, 90]
    words_per_balloon_max: 25
    silent_panel_ratio_range: [0.25, 0.45]
    reaction_shot_frequency: medium
    spread_frequency: rare
    page_turn_triggers:
      - wonder_reveal
      - arrival
