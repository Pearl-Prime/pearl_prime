        Journey-segment arcs (a layer, a city, a trial) of 5-25 monthly chapters; monthly
        serialization means each chapter is 40-60 pages, so episode-count ranges are lower than
        weekly genres at equal story mass. First irreversible loss/reveal by ch ~16 (FMA Hughes)
        to ~ch 30.

  battle_internal:
    label: "Internal battle / philosophical"
    words_per_page_range: [70, 110]
    words_per_balloon_max: 28
    silent_panel_ratio_range: [0.20, 0.35]
    reaction_shot_frequency: medium
    spread_frequency: rare
    page_turn_triggers:
      - vow
      - betrayal
      - revelation
      - realization_beat
    narration_tolerance: moderate
