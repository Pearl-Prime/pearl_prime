        - "Frieren — Wikipedia, First-Class Mage Exam arc ~ch 36-60 (en.wikipedia.org/wiki/Frieren:_Beyond_Journey%27s_End, accessed 2026-07-24)"
      notes: >-
        Saga-block arcs of 45-90 ch after a short 9-15-ch establishing arc; the first status-quo
        DESTRUCTION (Vinland ch 54 Askeladd's death + timeskip; Berserk Eclipse closing the Golden
        Age) is the genre's signature move and lands by ~ch 55 in the verified corpus (Frieren
        runs quieter: 10-25-ch arcs).

