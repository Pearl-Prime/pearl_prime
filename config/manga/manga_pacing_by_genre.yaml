      notes: >-
        Long-breath opponent/era arcs (25-80 ch) where the true fight is interior; extended
        non-combat stretches (Vagabond farming arc ~30 ch) are canonical, not filler. First
        reframe of the vow (renaming, first true defeat) by ch ~30.

