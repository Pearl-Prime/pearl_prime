      - hidden_truth_glimpse
    narration_tolerance: moderate
    sfx_usage: atmospheric
    background_density: moderate_ornate
    reference_corpus:
      - "Mushishi"
      - "Natsume's Book of Friends"
      - "xxxHolic"
    arc_cadence:
      episodes_per_arc_range: [1, 5]
      episodes_per_arc_median: 2
      arc_pattern: fixed
      season_unit: 5  # case-chapters per volume (monthly convention)
      first_major_shift_by: null  # no status-quo-shift convention in this family (see notes)
      arc_cadence_confidence: high
      arc_cadence_sources:
        - "Mushishi — Wikipedia, ~50 standalone cases (en.wikipedia.org/wiki/Mushishi, accessed 2026-07-24)"
        - "Natsume's Book of Friends — Wikipedia, 1-4 ch cases, 29+ vols (en.wikipedia.org/wiki/Natsume%27s_Book_of_Friends, accessed 2026-07-24)"
        - "xxxHolic — Wikipedia, 213 ch case grammar (en.wikipedia.org/wiki/XxxHolic, accessed 2026-07-24)"
      notes: >-
        Case-of-the-chapter grammar (1-4 ch); serial threads (Reiko's past, exorcist clans)
        resurface every ~8-12 cases without breaking status quo. Relationship depth is a gradient,
        not a shift — plan first-100 as ~50-70 cases with 3-4 thread-surfacing clusters.

  school:
    label: "School / youth"
    words_per_page_range: [50, 85]
    words_per_balloon_max: 22
    silent_panel_ratio_range: [0.20, 0.40]
    reaction_shot_frequency: high
    spread_frequency: rare
    page_turn_triggers:
      - almost_confession
      - ambiguous_line
      - arrival
      - misread_signal
    narration_tolerance: moderate
    sfx_usage: decorative
    background_density: moderate
    reference_corpus:
      - "Ao Haru Ride"
      - "Kimi ni Todoke"
      - "My Love Story!!"
    arc_cadence:
      episodes_per_arc_range: [3, 10]
      episodes_per_arc_median: 5
      arc_pattern: seasonal_cycle
      season_unit: 4  # chapters per volume (monthly shojo convention)
      first_major_shift_by: 50
      arc_cadence_confidence: medium
      arc_cadence_sources:
        - "Kimi ni Todoke — Wikipedia, couple formed ch 48-49 (en.wikipedia.org/wiki/Kimi_ni_Todoke, accessed 2026-07-24)"
        - "My Love Story!! — Wikipedia, 26 monthly ch (en.wikipedia.org/wiki/My_Love_Story!!, accessed 2026-07-24)"
        - "Ao Haru Ride — Wikipedia, school-event arc structure (en.wikipedia.org/wiki/Ao_Haru_Ride, accessed 2026-07-24)"
      notes: >-
        Arcs are school-calendar events (entrance, culture festival, exams, summer trip,
        graduation) of 3-8 ch riding a yearly cycle; the calendar, not the plot, sets cadence.
        Relationship-status shift by ch ~50 (earlier when the couple forms in act one, e.g. My
        Love Story!! ch 3).

  fantasy:
    label: "Fantasy / isekai adventure"
    words_per_page_range: [70, 120]
    words_per_balloon_max: 25
    silent_panel_ratio_range: [0.15, 0.30]
    reaction_shot_frequency: medium
    spread_frequency: periodic
    page_turn_triggers:
      - revelation
      - arrival
      - betrayal
      - impossible_task
      - vow
    narration_tolerance: moderate
    sfx_usage: moderate
    background_density: ornate_detailed
    reference_corpus:
      - "Fullmetal Alchemist"
      - "Made in Abyss"
      - "Witch Hat Atelier"
    arc_cadence:
      episodes_per_arc_range: [5, 25]
      episodes_per_arc_median: 12
      arc_pattern: escalating
      season_unit: null  # mixed: 4 ch/vol (monthly mega-chapters, FMA) to 8 ch/vol (Made in Abyss)
      first_major_shift_by: 16
      arc_cadence_confidence: medium
      arc_cadence_sources:
        - "Fullmetal Alchemist — Wikipedia, 108 monthly ch / 27 vols; Hughes death ch 15-16 (en.wikipedia.org/wiki/Fullmetal_Alchemist, accessed 2026-07-24)"
        - "Made in Abyss — Wikipedia, layer-per-arc structure (en.wikipedia.org/wiki/Made_in_Abyss, accessed 2026-07-24)"
