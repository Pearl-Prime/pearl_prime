      - "Berserk (contemplative arcs)"
    arc_cadence:
      episodes_per_arc_range: [25, 80]
      episodes_per_arc_median: 45
      arc_pattern: escalating
      season_unit: 9  # chapters per volume (weekly seinen convention)
