    narration_tolerance: minimal
    sfx_usage: motion_heavy
    background_density: clarity_focused
    reference_corpus:
      - "Slam Dunk"
      - "Haikyuu!!"
      - "Blue Lock"
      - "Kuroko's Basketball"
    arc_cadence:
      episodes_per_arc_range: [5, 45]
      episodes_per_arc_median: 18
      arc_pattern: escalating
      season_unit: 9  # chapters per tankobon volume (Weekly Shonen Jump convention)
      first_major_shift_by: 40
      arc_cadence_confidence: high
      arc_cadence_sources:
        - "Haikyu!! — Wikipedia, 402 ch; tournament/match structure (en.wikipedia.org/wiki/Haikyu!!, accessed 2026-07-24)"
        - "Slam Dunk — Wikipedia, 276 ch; Sannoh match spans multiple volumes (en.wikipedia.org/wiki/Slam_Dunk_(manga), accessed 2026-07-24)"
        - "Blue Lock — Wikipedia, selection-phase arcs (en.wikipedia.org/wiki/Blue_Lock, accessed 2026-07-24)"
      notes: >-
        Unit = match; container = tournament. Match length scales with stakes: practice matches
        5-10 ch, mid-tournament 10-25, climax matches 30-45 (Slam Dunk's Sannoh ~6 volumes). First
        major tournament entry (= first status-quo shift) by ch ~30-45.

  essay:
    label: "Essay / memoir"
    words_per_page_range: [80, 180]
    words_per_balloon_max: 60
    silent_panel_ratio_range: [0.15, 0.35]
    reaction_shot_frequency: low
    spread_frequency: very_rare
    page_turn_triggers:
