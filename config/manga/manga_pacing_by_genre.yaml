      arc_cadence_confidence: medium
      arc_cadence_sources:
        - "Vagabond — Wikipedia, 327 ch / 37 vols; Yoshioka and Kojiro mega-arcs (en.wikipedia.org/wiki/Vagabond_(manga), accessed 2026-07-24)"
