      - "Mobile Suit Gundam: The Origin"
      - "Knights of Sidonia"
      - "Eureka Seven"
    arc_cadence:
      episodes_per_arc_range: [2, 15]
      episodes_per_arc_median: 8
      arc_pattern: escalating
      season_unit: 6  # chapters per volume (monthly serialization, 5-7 typical)
      first_major_shift_by: 30
      arc_cadence_confidence: medium
      arc_cadence_sources:
