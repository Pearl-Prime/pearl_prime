      - "Stitches"
      - "El Deafo"
    arc_cadence:
      episodes_per_arc_range: [8, 21]
      episodes_per_arc_median: 12
      arc_pattern: fixed
      season_unit: null  # single-book form; no serialized volume convention
      first_major_shift_by: 3
      arc_cadence_confidence: low
      arc_cadence_sources:
        - "Stitches — Wikipedia, single-volume memoir (en.wikipedia.org/wiki/Stitches_(book), accessed 2026-07-24)"
        - "El Deafo — Wikipedia, ~21 chapter units (en.wikipedia.org/wiki/El_Deafo, accessed 2026-07-24)"
        - "Mom's Cancer — Wikipedia, episodic strips -> book (en.wikipedia.org/wiki/Mom%27s_Cancer, accessed 2026-07-24)"
