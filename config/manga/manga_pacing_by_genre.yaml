schema_version: "1.0.0"
authority: config/manga/manga_pacing_by_genre.yaml
created: "2026-04-20"
status: active

description: |
  Genre-family pacing contracts. Define the expected rhythm of each manga lane.
  Individual titles (manga_profile) carry their own pacing fields and may deviate
  within ±25% of these ranges without triggering MDLG-08 (genre_authenticity gate).
  Ranges outside ±25% trigger a MAJOR issue.

  Research basis: manga_genre_writing_styles_2026_04_04.md + per-profile empirical
  data from 37 active brand profiles. Reference corpus titles listed per family.

genre_pacing:
  battle:
    label: "Battle shonen"
    words_per_page_range: [80, 120]
    words_per_balloon_max: 18
    silent_panel_ratio_range: [0.10, 0.25]
    reaction_shot_frequency: high
    spread_frequency: periodic
    page_turn_triggers:
      - revelation
      - new_rival
      - power_reveal
      - cliffhanger_action
      - vow
    narration_tolerance: minimal
    sfx_usage: heavy
    background_density: medium
    reference_corpus:
      - "One Piece"
      - "Demon Slayer"
      - "Jujutsu Kaisen"
      - "My Hero Academia"
    arc_cadence:
      episodes_per_arc_range: [6, 60]
      episodes_per_arc_median: 26
      arc_pattern: escalating
      season_unit: 9  # chapters per tankobon volume (Weekly Shonen Jump convention)
      first_major_shift_by: 100
      arc_cadence_confidence: high
      arc_cadence_sources:
        - "Story Arcs — One Piece Wiki (onepiece.fandom.com/wiki/Story_Arcs, accessed 2026-07-24)"
        - "Demon Slayer: All Manga Arcs in Order & Chapters — ComingSoon (comingsoon.net/guides/news/1786665, accessed 2026-07-24)"
        - "Shibuya Incident Arc — Jujutsu Kaisen Wiki (jujutsu-kaisen.fandom.com/wiki/Shibuya_Incident_Arc, accessed 2026-07-24)"
        - "Paranormal Liberation War Arc — My Hero Academia Wiki (myheroacademia.fandom.com/wiki/Paranormal_Liberation_War_Arc, accessed 2026-07-24)"
      notes: >-
        Arcs lengthen as the run matures (KnY 9->44, MHA ~10->54, OP <20 -> 100+); late-run
        mega-arcs (Dressrosa 102, Wano ~148) are outliers beyond the planning range. Arc ends
        align only partially with volume edges; saga ends align better. First 100 chapters ~5-8
        arcs; first status-quo shift lands ch 66-101 (KnY 66, JJK 79, MHA 92-94, OP 100).

  romance:
    label: "Shojo romance"
    words_per_page_range: [40, 75]
    words_per_balloon_max: 22
    silent_panel_ratio_range: [0.25, 0.45]
    reaction_shot_frequency: high
    spread_frequency: rare
    page_turn_triggers:
      - almost_confession
      - gaze_exchange
      - misread_signal
      - emotional_rupture
      - ambiguous_line
    narration_tolerance: moderate
    sfx_usage: decorative
    background_density: sparse_plus_decorative_motifs
    reference_corpus:
      - "Fruits Basket"
      - "Ao Haru Ride"
      - "Kimi ni Todoke"
      - "Strobe Edge"
    arc_cadence:
      episodes_per_arc_range: [4, 20]
      episodes_per_arc_median: 9
      arc_pattern: fixed
      season_unit: 4  # chapters per volume (monthly shojo magazine convention)
      first_major_shift_by: 50
      arc_cadence_confidence: medium
      arc_cadence_sources:
        - "Kimi ni Todoke — Wikipedia chapter/volume list (en.wikipedia.org/wiki/Kimi_ni_Todoke, accessed 2026-07-24)"
        - "Fruits Basket — Wikipedia, 136 ch / 23 vols (en.wikipedia.org/wiki/Fruits_Basket, accessed 2026-07-24)"
        - "Ao Haru Ride — Wikipedia, 49 ch / 13 vols (en.wikipedia.org/wiki/Ao_Haru_Ride, accessed 2026-07-24)"
      notes: >-
        Ladder-rung arcs (school event / rival / confession attempt) stay roughly constant in size
        while stakes escalate; arcs are written to close at tankobon boundaries (~4 monthly
        chapters). Relationship-status shift (couple formed) by ch ~48-50 in long-runners (Kimi ni
        Todoke ch 48-49), ch ~25 in mid-length titles.

  workplace:
    label: "Josei workplace"
    words_per_page_range: [60, 100]
    words_per_balloon_max: 28
    silent_panel_ratio_range: [0.30, 0.50]
    reaction_shot_frequency: medium
    spread_frequency: very_rare
    page_turn_triggers:
      - realization
      - status_shift
      - restrained_revelation
      - ambiguous_line
    narration_tolerance: generous
    sfx_usage: minimal
    background_density: realist
    reference_corpus:
      - "My Lesbian Experience with Loneliness"
      - "Princess Jellyfish"
      - "Honey and Clover"
      - "What Did You Eat Yesterday"
    arc_cadence:
      episodes_per_arc_range: [1, 15]
      episodes_per_arc_median: 8
      arc_pattern: fixed
      season_unit: 5  # chapters per volume (monthly josei magazine convention)
      first_major_shift_by: 30
      arc_cadence_confidence: medium
      arc_cadence_sources:
        - "What Did You Eat Yesterday? — Wikipedia, episodic 1-ch units (en.wikipedia.org/wiki/What_Did_You_Eat_Yesterday%3F, accessed 2026-07-24)"
        - "Princess Jellyfish — Wikipedia, 17 vols (en.wikipedia.org/wiki/Princess_Jellyfish, accessed 2026-07-24)"
        - "Honey and Clover — Wikipedia, 10 vols / 64 ch (en.wikipedia.org/wiki/Honey_and_Clover, accessed 2026-07-24)"
      notes: >-
        Episodic baseline (chapter = one meal / one client / one deadline) with serial threads of
        8-15 ch surfacing periodically (Princess Jellyfish redevelopment threat, Honey and Clover
        life-stage turns). Purely episodic titles (WDYEY) defer status-quo shifts far beyond ch
        100.

  healing:
    label: "Iyashikei / healing"
    words_per_page_range: [20, 50]
    words_per_balloon_max: 20
    silent_panel_ratio_range: [0.35, 0.60]
    reaction_shot_frequency: low
    spread_frequency: periodic
    page_turn_triggers:
      - small_recognition
      - environmental_shift
      - seasonal_marker
      - quiet_moment_conclusion
    narration_tolerance: moderate
    sfx_usage: atmospheric
    background_density: rich_plus_quiet
    reference_corpus:
      - "Yotsuba!"
      - "Barakamon"
      - "Flying Witch"
      - "Non Non Biyori"
      - "Laid-Back Camp"
    arc_cadence:
      episodes_per_arc_range: [1, 5]
      episodes_per_arc_median: 2
      arc_pattern: seasonal_cycle
      season_unit: 8  # chapters per volume (monthly seinen/shonen SoL convention)
      first_major_shift_by: null  # no status-quo-shift convention in this family (see notes)
      arc_cadence_confidence: high
      arc_cadence_sources:
        - "Yotsuba&! — Wikipedia, standalone monthly chapters (en.wikipedia.org/wiki/Yotsuba%26!, accessed 2026-07-24)"
        - "Laid-Back Camp — Wikipedia, trip units 2-5 ch (en.wikipedia.org/wiki/Laid-Back_Camp, accessed 2026-07-24)"
        - "Barakamon — Wikipedia, 18 vols episodic + competition threads (en.wikipedia.org/wiki/Barakamon, accessed 2026-07-24)"
      notes: >-
        No status-quo-shift convention: the loop is the product. Units are vignettes (1-2 ch) and
        trips/festivals (2-5 ch) hung on a seasonal calendar that resets yearly. Plan first-100 as
        ~3-4 season wheels with demographic (not plot) drift; craft-bible seasonal-cycle claim
        confirmed.

  mystery:
    label: "Seinen psychological / mystery"
    words_per_page_range: [80, 140]
    words_per_balloon_max: 32
    silent_panel_ratio_range: [0.20, 0.35]
    reaction_shot_frequency: medium
    spread_frequency: rare
    page_turn_triggers:
      - dread_reveal
      - ambiguous_line
      - hidden_truth_glimpse
      - unsettling_image
    narration_tolerance: generous
    sfx_usage: minimal_plus_dread_coded
    background_density: realist_high
    reference_corpus:
      - "Monster"
      - "20th Century Boys"
      - "Pluto"
    arc_cadence:
      episodes_per_arc_range: [8, 40]
      episodes_per_arc_median: 18
      arc_pattern: escalating
      season_unit: 9  # chapters per volume (seinen biweekly convention)
      first_major_shift_by: 55
      arc_cadence_confidence: medium
      arc_cadence_sources:
        - "Monster — Wikipedia, 162 ch / 18 vols (en.wikipedia.org/wiki/Monster_(manga), accessed 2026-07-24)"
        - "20th Century Boys — Wikipedia, 249 ch / 22 vols (en.wikipedia.org/wiki/20th_Century_Boys, accessed 2026-07-24)"
        - "Pluto — Wikipedia, 65 ch / 8 vols, act-per-robot (en.wikipedia.org/wiki/Pluto_(manga), accessed 2026-07-24)"
      notes: >-
        Investigation-block arcs (a location, an era, a suspect) of 8-25 ch early, widening to
        30-40 as conspiracies compound; Pluto's 8-act case grid is the compact model. First
        irreversible reframe (fugitive status, Bloody New Year's Eve) lands ch ~15-55.

  horror:
    label: "Horror / dread"
    words_per_page_range: [30, 80]
    words_per_balloon_max: 20
    silent_panel_ratio_range: [0.35, 0.55]
    reaction_shot_frequency: low
    spread_frequency: periodic
    page_turn_triggers:
      - uncanny_reveal
      - distorted_image
      - body_horror_cut
      - ominous_image
    narration_tolerance: moderate
    sfx_usage: heavy_plus_dread_coded
    background_density: dense_oppressive
    reference_corpus:
      - "Uzumaki"
      - "Tomie"
      - "Junji Ito short form"
    arc_cadence:
      episodes_per_arc_range: [1, 3]
      episodes_per_arc_median: 1
      arc_pattern: fixed
      season_unit: 10  # stories per collected volume (anthology convention)
      first_major_shift_by: null  # no status-quo-shift convention in this family (see notes)
      arc_cadence_confidence: high
      arc_cadence_sources:
        - "Uzumaki — Wikipedia, 19 ch, episodic until 3-ch convergence (en.wikipedia.org/wiki/Uzumaki, accessed 2026-07-24)"
        - "Tomie — Wikipedia, ~20 standalone episodes (en.wikipedia.org/wiki/Tomie, accessed 2026-07-24)"
        - "Junji Ito Collection listings — Junji Ito Wiki (junjiitomanga.fandom.com, accessed 2026-07-24)"
      notes: >-
        Anthology-of-dread model: 1-ch standalones sharing a motif/town, with a terminal
        convergence arc (Uzumaki's final 3 of 19 ch). A 100-episode horror plan is ~85-92
        standalones + escalating convergence, not serialized arcs; no early status-quo shift
        convention.

  sports:
