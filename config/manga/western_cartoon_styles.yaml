# Western cartoon / doodle illustration styles for en_US illustrated self-help pilot.
# Register: Adam J. Kurtz, Mari Andrew, Gemma Correll — NOT manga prompt templates.
# Authority: artifacts/qa/US_ILLUSTRATED_SELF_HELP_PILOT_2026-07-08.md
# Consumer: scripts/ci/check_western_lane_format.py (Phase A); Pearl Star dispatch (Phase B).

schema_version: "1.0.0"
status: active
lane: western_intent_led
product_shape: illustrated_self_help_picture_books
art_register: western_cartoon_doodle_self_help

shared_negative: >-
  manga screentone, anime eyes, speed lines, chibi, webtoon vertical scroll,
  japanese onomatopoeia, 3d render, photograph, watermark, logo overlay

brands:
  stillness_press:
    style_name: "Doodle Humor Essay"
    comp_register: "Gemma Correll anxiety doodles + Adam J. Kurtz handwritten margins"
    prompt_template: >
      western cartoon doodle illustration, loose hand-drawn linework, warm humor,
      anxiety-as-character metaphor, handwritten margin notes, cream paper texture,
      self-help essay companion art, left-to-right reading, {subject}
  digital_ground:
    style_name: "Workplace Doodle"
    comp_register: "Mari Andrew burnout sketches + notification UI doodles"
    prompt_template: >
      western workplace cartoon, flat doodle style, midnight blue and cyan accents,
      notification icons as visual metaphors, burnout humor, clean sans margins,
      digital-native self-help essay art, {subject}
  cognitive_clarity:
    style_name: "Confessional Field Guide"
    comp_register: "Adam J. Kurtz field notes + Mari Andrew thought-loop diagrams"
    prompt_template: >
      western confessional cartoon essay, diagrammatic doodles, looping thought arrows,
      minimal black ink on off-white, overthinking field-guide illustrations,
      witty handwritten captions, {subject}
  healing_ground:
    style_name: "Warm Illustrated Essay"
    comp_register: "Mari Andrew warm body sketches + midday reset palette"
    prompt_template: >
      western warm cartoon essay, soft rounded doodles, cream and sunlit yellow palette,
      somatic reset imagery, gentle body-awareness sketches, gift-book illustration tone,
      {subject}
  calm_student:
    style_name: "YA Campus Doodle"
    comp_register: "Gemma Correll campus anxiety + YA exam-stress doodles"
    prompt_template: >
      western YA campus cartoon, youthful doodle linework, light blue and navy palette,
      exam-anxiety humor, backpack and hallway motifs, counselor-friendly tone,
      {subject}
