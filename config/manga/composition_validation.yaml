# Structural Composition MVP — validation profile (runtime legality layer)
# Layer: STRUCTURAL_COMPOSITION_MVP (separate from PANEL_TYPE_SYSTEM_V1)
# Authority: artifacts/qa/MANGA_CANON_SCENE_ASSEMBLY_CHECKLIST.md (doctrine singleton)
# Status: CONFIG-EXISTS + CODE-WIRED when consumed by scripts/manga/structural_composition.py
schema_version: "1.0.0"
profile_id: structural_composition_mvp_v1
scope:
  archetypes:
    - seated_table_scene
    - standing_room_scene
  notes: "First scope only. Do not treat absence of other archetypes as pass."

# THRESHOLD-001 bindings (checklist) — invent nothing beyond these named keys
thresholds:
  seated_contact_px_tolerance:
    authority_path: config/manga/composition_validation.yaml
    authority_key: thresholds.seated_contact_px_tolerance
    current_value: 6.0
    units: px
    enforcement_status: bound
  standing_contact_px_tolerance:
    authority_path: config/manga/composition_validation.yaml
    authority_key: thresholds.standing_contact_px_tolerance
    current_value: 8.0
    units: px
    enforcement_status: bound
  max_uniform_scale:
    authority_path: config/manga/composition_validation.yaml
    authority_key: thresholds.max_uniform_scale
    current_value: 3.0
    units: ratio
    enforcement_status: bound
  max_rotation_deg:
    authority_path: config/manga/composition_validation.yaml
    authority_key: thresholds.max_rotation_deg
    current_value: 15.0
    units: degrees
    enforcement_status: bound
  min_uniform_scale:
    authority_path: config/manga/composition_validation.yaml
    authority_key: thresholds.min_uniform_scale
    current_value: 0.15
    units: ratio
    enforcement_status: bound

# Categories that may appear in a structural support graph (unknown → hard fail)
known_node_categories:
  - support_surface
  - character
  - prop
  - occluder
  - contact_shadow

# Relations in scope for MVP
known_relations:
  - seated_on
  - standing_on
  - resting_on
  - held_by
  - occluded_by

# TRANSFORM-001: only uniform scale + bounded rotation; no non-uniform squash
allowed_transform_ops:
  - translate
  - uniform_scale
  - rotate
forbidden_transform_ops:
  - non_uniform_scale
  - perspective_warp
  - free_deform

# Horizon-ratio G3 is NOT acceptance canon (checklist SCALE-001 conflict note)
acceptance_canon:
  universal_horizon_ratio_law: false
  note: "G3 horizon math remains implementation debt in composition_grammar.py; structural MVP uses support/contact graph + shared transform, not horizon-as-universal-law."

# Lettering honesty (do not claim rewires)
lettering_status:
  live_assembler_path: phoenix_v4/manga/chapter/bubble_render.py::render_bubbles_onto_panel
  richer_v2_exists: phoenix_v4/manga/chapter/bubble_render_v2.py
  v2_on_assembler_call_path: false
  compiled_safe_zone_qc: scripts/manga/validate_layer.py::check_lettering_safe_zones_clear
  structural_mvp_rewired_lettering: false
