    when_not_to_use:
    - B&W crosshatch without smoke-test PASS
    failure_risks:
    - stipple blob without register anchors
    - prompt_extend dilution
    source_refs:
    - S1
    - S2
    - S3
    - S4
  qwen_image_layered:
    role: layer_decomposition
    prompt_grammar: edit_mode_prose_per_layer
    workflow: scripts/image_generation/comfyui_workflows/qwen_image_layered_decompose.json
    when_to_use:
    - L0/L2/L3 bank generation
    - layer isolation edits
    when_not_to_use:
    - final proof without per-layer visual QA
    failure_risks:
    - layer bleed
    - INTERIM presented as REAL
    source_refs:
    - S4
  flux_schnell:
    role: color_background_fallback_only
    prompt_grammar: short_front_loaded_clauses
    when_to_use:
    - color webtoon env plates
    - food color glam with smoke-test
    when_not_to_use:
    - B&W manga panels
    - mecha L2
    - character faces
    - monochrome seinen
    engine_config:
      steps: 4
      cfg: 1.0
      sampler: euler
      scheduler: simple
    failure_risks:
    - stipple noise at wrong steps/cfg
    - register ablation
    - typography hallucination
    source_refs:
    - S11
  animagine_xl_4_0:
    role: bw_register_fallback
    prompt_grammar: booru_tags_hybrid
    when_to_use:
    - Qwen smoke FAIL on crosshatch/mecha/screentone
    - tag-native B&W genres
    when_not_to_use:
    - primary path without smoke-test
    - natural-language-only prompts
    failure_risks:
    - shojo average-face attractor
    - needs anti-shojo negative stack
    source_refs:
    - S13
    - S17
forbidden_patterns:
  global:
  - manga catalog cover quality
  - inline no text in positive prompt
  - American setting for en_US locale
  - concept art
  - key visual
  - flux_schnell steps>4 for panels
  - style_id without genre_tradition tokens
  - byte-only PASS without visual inspect
  genre_specific:
    mecha:
    - soft iyashikei atmosphere in positive
    - watercolor wash
    - gradient sky
    - photorealistic mech
    healing:
    - speed lines
    - impact frame
    - chiaroscuro
    dark_fantasy:
    - full color in positive
    - oil painting
    - western comic
    psychological_horror:
    - iyashikei
    - pastel
    - sparkle
