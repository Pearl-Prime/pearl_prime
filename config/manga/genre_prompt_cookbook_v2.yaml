book_genre_map:
  ahjan_anxiety: anxiety
  joshin_anxiety: anxiety
  pamela_fellows_anxiety: anxiety
  omote_sleep_anxiety: sleep_anxiety
  master_sha_grief: grief
  sai_ma_grief: grief
