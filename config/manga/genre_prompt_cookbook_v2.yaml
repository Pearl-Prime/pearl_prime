  adi_da_self_worth: self_worth
  miyuki_overthinking: overthinking  # per OPD-111 — was junko_overthinking
  miki_imposter_syndrome: imposter_syndrome
  ra_imposter_syndrome: imposter_syndrome
  master_feung_burnout: burnout
  master_wu_courage: courage
