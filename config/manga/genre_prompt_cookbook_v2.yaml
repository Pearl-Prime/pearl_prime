# Genre Prompt Cookbook v2 — KDP Self-Help Cover Regeneration
#
# This cookbook is the single source of truth for FLUX positive + negative
# prompts when regenerating the 11 non-fragment KDP self-help book covers
# (anxiety, sleep_anxiety, grief, boundaries, self_worth, overthinking,
# imposter_syndrome, burnout, courage) at 1600x2560 portrait.
#
# CRITICAL DESIGN RULE — FROM PR #802 §0/§2/§8:
#   The deployment's negative-prompt CLIPTextEncode node is the ONLY place
#   negations belong. Appending "no text, no typography, no letters" to the
#   positive prompt is actively harmful — FLUX's CLIP-L + T5-XXL embed
#   "no text" close to "text", so the negation actually amplifies the
#   negated concept in the latent.
#
#   Therefore EVERY positive prompt in this cookbook is pure positive
#   tokens. ALL negations live in `universal_negative` below, which is
#   piped to the negative CLIPTextEncode slot by the cookbook v2 compose
#   helper.
#
# CRITICAL DESIGN RULE — FROM R1 (artifacts/research/kdp_bestseller_cover_analysis_2026-05-02.md §12):
#   Bestseller self-help covers in our 9 genres do NOT depict faces or
#   full human figures. The dominant archetypes are object-still-life
#   (a single hand, feather, leaf, stone, moon, mountain) or pure
#   typography on flat color (boundaries, imposter_syndrome). FLUX
#   cannot reliably render readable text on covers — typography is
#   composited later by `scripts/publish/render_kdp_cover.py` (R3).
#
#   Therefore every genre's subject_prompt below is OBJECT- or
#   COMPOSITION-driven, never figure-driven. "no faces, no human figures,
#   no people" is in `universal_negative` to prevent FLUX from inserting
#   them anyway.
#
# This cookbook targets KDP self-help trade paperback aesthetics. It is
# NOT the manga-panel cookbook from PR #802 (genre_prompt_cookbook.yaml),
# which targets sequential-art register for stillness_press manga panels.
# Different surface, different prompt rules.

schema_version: 3
last_updated: "2026-04-30"

authority:
  - "PR #802: docs/COMFYUI_FLUX_MANGA_PROMPTING_RESEARCH_2026-04-29.md (negation rule §8, sampler §2.4, weight syntax §2.3)"
  - "R1: artifacts/research/kdp_bestseller_cover_analysis_2026-05-02.md §12 (per-genre archetypes, lock-in tokens, no-figure rule)"
  - "R4: artifacts/research/bestseller_composition_templates_2026-05-03.md §11 (aspect-ratio-aware imagery prompts; type-dominant FLUX bypass)"
  - "PR #807: H1=A engine config — flux1-dev fp8 / 28 steps / cfg 3.5 / dpmpp_2m / karras"

# Engine config (operator-facing reminder; not consumed by compose helper).
# R5 (2026-04-30): Per-genre `imagery_aspect_ratio` is the FLUX canvas aspect
# for the imagery patch — it matches the imagery_zone bbox in
# `config/publishing/bestseller_templates.yaml`, NOT the 1600x2560 final
# cover. Type-dominant genres set imagery_aspect_ratio: null and bypass
# FLUX entirely (rendered as flat color by render_kdp_cover.py).
engine:
  base_model: "flux1-dev-fp8.safetensors"
  sampler: "dpmpp_2m"
  scheduler: "karras"
  steps: 28
  cfg: 3.5
  width: 1600
  height: 2560
  imagery_aspect_ratio:
    anxiety:           "1.40:1"   # 1216x870
    sleep_anxiety:     "1.04:1"   # 640x614 (square-ish)
    grief:             "0.75:1"   # 384x512 (slightly portrait)
    boundaries:        null       # FLUX-bypassed (type-dominant)
    self_worth:        null       # FLUX-bypassed (type-dominant)
    overthinking:      "1.82:1"   # 1120x614 (wide)
    imposter_syndrome: null       # FLUX-bypassed (type-dominant)
    burnout:           "0.85:1"   # 480x563 (slightly portrait)
    courage:           "2.40:1"   # 1600x666 (wide horizontal)

# ---------------------------------------------------------------------------
# Universal layout register — applied after every genre's subject + style
# block. Reinforces composition WITHOUT using "no X" / "without X" patterns.
# Pure positive-token reinforcement. Negatives live in universal_negative.
# ---------------------------------------------------------------------------
universal_register: >-
  KDP portrait composition, 1600x2560 portrait aspect, illustrated trade
  paperback book cover, single dominant focal element, bold cinematic
  composition, generous breathing room at top of frame for title overlay,
  generous breathing room at bottom of frame for author byline, modern
  bestseller aesthetic, professional book cover illustration, high
  production value, painterly, editorial book cover photography aesthetic,
  clean uncluttered background

# ---------------------------------------------------------------------------
# Universal negative prompt — ALL negations live here.
# Tag-style, ~40 tokens. Per PR #802 §2.5 negatives on FLUX work when
# short, tag-style, in the real negative slot, at cfg >= 3.0.
# Per R1 §12 includes faces / human figures / stock photo / AI-look.
# ---------------------------------------------------------------------------
universal_negative: >-
  text, words, letters, typography, kanji, hiragana, katakana, chinese
  characters, watermark, signature, logo, frame, border, faces, human
  figures, people, person, hands of a person, body parts, low quality,
  blurry, jpeg artifacts, grainy, distorted anatomy, deformed face,
  asymmetric eyes, extra limbs, mutated hands, extra fingers, cartoonish,
  chibi, oversaturated, harsh contrast, busy composition, cluttered,
  multiple subjects, collage, photo realistic skin pores, stock photo,
  generic stock photography, placeholder art, amateur illustration, AI
  generated look, midjourney aesthetic

# ---------------------------------------------------------------------------
# Per-genre prompt blocks (R1-tuned, 2026-05-02).
#
# Schema:
#   archetype:        2-3 word archetype name from R1 §1-§9
#   palette:          R1 palette description (color register)
#   composition:      single-line composition rule (object-driven)
#   subject_prompt:   pure positive token block — the central image,
#                     OBJECT-driven, NO figures
#   style_modifiers:  editorial / lighting / texture tokens
#   lock_in_tokens:   exactly the 3 strongest tokens per R1 §12 table
#   revisit_after_r1: false (this cookbook IS the post-R1 tuning)
# ---------------------------------------------------------------------------
genres:

  anxiety:
    archetype: "single hand on cool blue"
    palette: >-
      cool blue and cream palette, indigo to sky gradient, low chroma
      with one warm accent at the focal point; the eye should rest, not
      jolt
    composition: >-
      single hand emerging from soft shadow at lower-center, fingers
      relaxed, light catching the edge; vast open negative space above
      for title overlay; minimalist editorial framing
    # R5 (2026-04-30): rewritten per R4 §11. Aspect-ratio aware: FLUX
    # canvas is the imagery_zone bbox (1216x870 = 1.40:1), NOT 5:8.
    subject_prompt: >-
      single open hand emerging from soft indigo shadow at lower edge of
      frame, hand fills lower 60% of frame, cream-cool-blue palette,
      painterly cinematic illustration, soft directional light from upper
      left, contemplative still life register, generous negative cream
      space at top of frame
    style_modifiers: >-
      low-key editorial book cover photography, soft volumetric morning
      light, cool blue and cream palette, minimalist contemporary
      bestseller aesthetic, depth of field with quiet background
    lock_in_tokens: ["single hand emerging from soft shadow", "cool blue and cream palette indigo to sky gradient", "low-key editorial photography calm minimalist"]
    revisit_after_r1: false

  sleep_anxiety:
    archetype: "crescent moon on indigo"
    palette: >-
      deep navy to cream gradient, midnight indigo dominant, soft pale
      gold or cream accent for the moon; quiet luminous register, no
      harsh contrast
    composition: >-
      single crescent moon high in upper-third of frame on a deep indigo
      field, soft halated glow, vast quiet sky below for title overlay
      placement; balanced atmospheric still composition
    # R5 (2026-04-30): rewritten per R4 §11. Imagery zone is square-ish
    # (640x614 = 1.04:1) — moon centered upper third of the small zone,
    # with a faint star scatter to fill the otherwise sparse square.
    subject_prompt: >-
      single luminous crescent moon centered upper third of square frame,
      deep indigo gradient field, painterly cinematic illustration, soft
      pale gold glow around crescent, faint star scatter, calm midnight
      register, unbroken sky composition, fills 50% of frame
    style_modifiers: >-
      atmospheric night photography aesthetic, deep navy to cream
      gradient, soft moonlit glow, quiet luminous register, restful
      bestseller cover aesthetic, depth of field minimal grain
    lock_in_tokens: ["crescent moon on indigo field soft glow", "deep navy to cream gradient midnight palette", "quiet atmospheric night composition soft natural light"]
    revisit_after_r1: false

  grief:
    archetype: "single feather on cream"
    palette: >-
      dusty sage and off-white palette, low chroma, soft natural light;
      warmth must be earned, never bright; predominantly cool with a
      single soft warm note
    composition: >-
      single small still object (feather, leaf, or smooth stone) resting
      on cream or dusty sage field, soft natural overhead light, quiet
      shadow; generous calm negative space; atmospheric still life
    # R5 (2026-04-30): rewritten per R4 §11. Imagery zone is small and
    # slightly portrait (384x512 = 0.75:1), so the feather is small and
    # intentional within the zone — the bulk of the cream cream-field
    # comes from the canvas background outside the imagery zone.
    subject_prompt: >-
      single small dusty-sage feather resting at lower-center of cream
      off-white field, feather is small and intentional within generous
      empty space, painterly still life illustration, soft natural light,
      low chroma, literary contemplative register, feather fills 40% of
      frame width
    style_modifiers: >-
      atmospheric still life photography, soft natural light, dusty sage
      and off-white palette, low chroma contemplative register, minimal
      grain, depth of field with calm background
    lock_in_tokens: ["single feather (or leaf, or stone) on cream field", "dusty sage and off-white palette low chroma", "atmospheric still life soft natural light contemplative"]
    revisit_after_r1: false

  boundaries:
    archetype: "bold flat color, terracotta and cream"
    palette: >-
      bold flat color block, terracotta and cream, high contrast and
      saturated; pure solid tone throughout, premium typography
      bestseller register where the type is the cover
    composition: >-
      bold flat color background filling the canvas, single thin clean
      geometric line dividing the field horizontally, generous negative
      space at top and bottom for title overlay; type-dominant editorial
      graphic
    # R5 (2026-04-30): FLUX-bypassed; rendered as flat color via R5
    # renderer. Per R4 §11 + bestseller_templates.yaml:templates.boundaries
    # imagery_zone is null → render_kdp_cover.py paints palette.primary.hex
    # over the full canvas and composites type only.
    subject_prompt: null
    style_modifiers: >-
      editorial graphic design, high contrast flat color treatment,
      premium minimalist poster aesthetic, clean vector-flat color
      blocking, pure solid tone, contemporary self-help typography
      bestseller register
    lock_in_tokens: ["bold flat color field terracotta and cream", "single thin geometric line dividing canvas", "editorial graphic design high contrast solid tone"]
    revisit_after_r1: false

  self_worth:
    archetype: "warm earth tone field"
    palette: >-
      warm earth tone background, terracotta or ochre dominant, soft
      golden-hour highlight; humanist warmth, premium minimal register;
      no figures, generous breathing room
    composition: >-
      warm earth tone field filling the canvas, soft golden-hour light
      gradient from upper area, generous negative space throughout for
      title takeover; humanist minimalist composition
    # R5 (2026-04-30): FLUX-bypassed; rendered as flat color via R5
    # renderer (templates.self_worth.imagery_zone is null).
    subject_prompt: null
    style_modifiers: >-
      premium minimalist editorial photography, warm earth tone palette,
      soft golden-hour gradient, humanist warmth, generous negative
      space, contemporary self-help bestseller cover aesthetic
    lock_in_tokens: ["warm earth tone background terracotta or ochre", "soft golden-hour light premium minimal aesthetic", "humanist warmth generous negative space"]
    revisit_after_r1: false

  overthinking:
    archetype: "tangled line resolving"
    palette: >-
      cool gray and off-white palette with a single warm accent;
      controlled cool register, the warm accent rewarding the eye for
      following the line resolution
    composition: >-
      single tangled line in upper-third resolving downward into a clean
      curve in the lower-half, single warm accent at the resolution
      point, vast negative space framing; editorial line illustration
      register
    # R5 (2026-04-30): rewritten per R4 §11. Imagery zone is wide
    # (1120x614 = 1.82:1) — line begins as tangled knot at left and
    # resolves into clean horizontal sweep at right. Single small
    # electric-blue accent dot near the resolution point.
    subject_prompt: >-
      single continuous black ink line on cool gray off-white field,
      line begins as tangled knot at left and resolves into clean
      horizontal sweep at right, monochrome editorial line illustration,
      single small electric-blue accent dot near the resolution point,
      generous negative space, painterly minimalist register, line fills
      70% of frame width
    style_modifiers: >-
      editorial line illustration, minimalist clean register, cool gray
      and off-white palette, single warm accent, contemporary self-help
      bestseller cover aesthetic, vector-clean line work
    lock_in_tokens: ["single tangled line resolving to clean curve", "cool gray and off-white single warm accent", "editorial line illustration minimalist clean"]
    revisit_after_r1: false

  imposter_syndrome:
    archetype: "hot coral flat color"
    palette: >-
      hot coral or magenta flat color field, fully saturated, premium
      feminist palette; high-energy editorial register; pure solid tone
      throughout, type-dominant cover surface
    composition: >-
      hot coral or magenta flat color field filling the canvas, single
      bold geometric mark or clean shape, generous negative space
      throughout for confident type takeover; high-energy editorial
      graphic
    # R5 (2026-04-30): FLUX-bypassed; rendered as flat color via R5
    # renderer (templates.imposter_syndrome.imagery_zone is null).
    subject_prompt: null
    style_modifiers: >-
      premium editorial graphic design, hot coral or magenta saturated
      palette, high-energy bestseller register, clean vector-flat
      treatment, pure solid tone, modern feminist self-help cover
      aesthetic
    lock_in_tokens: ["hot coral or magenta flat color field", "bold confident composition single geometric mark", "high-energy editorial graphic premium feminist palette"]
    revisit_after_r1: false

  burnout:
    # Fragment-only book in inventory (master_feung_burnout) but cookbook
    # carries the genre for completeness so future regen can use it.
    archetype: "single wilting symbol on dusty"
    palette: >-
      muted dusty rose or sage and cream, low chroma; warmth without
      heat, suggesting embers cooling rather than flames; quiet
      restorative palette
    composition: >-
      single small wilting still object (leaf, dimmed bulb, half-empty
      teacup) at lower-center on muted dusty field, soft natural light,
      vast quiet negative space above; still quiet recovery composition
    # R5 (2026-04-30): rewritten per R4 §11. Imagery zone is small and
    # slightly portrait (480x563 = 0.85:1) — leaf hangs from a thin stem
    # with a single amber highlight on the leaf tip.
    subject_prompt: >-
      single small wilting leaf hanging from a thin stem, dusty-rose
      and cream palette, painterly still life illustration, soft
      directional light from upper right, low-energy contemplative
      register, leaf fills 50% of frame, generous negative space,
      single amber highlight on the leaf tip
    style_modifiers: >-
      atmospheric still life photography, muted dusty palette, soft
      natural light, low-energy quiet register, restorative recovery
      memoir bestseller aesthetic, depth of field with calm background
    lock_in_tokens: ["single wilting leaf (or dimmed bulb) on dusty palette", "muted dusty rose or sage and cream", "still quiet composition soft natural light low-energy"]
    revisit_after_r1: false

  courage:
    # Fragment-only book in inventory (master_wu_courage) but cookbook
    # carries the genre for completeness so future regen can use it.
    archetype: "mountain on warm earth"
    palette: >-
      warm earth-tone palette, terracotta and amber, golden-hour glow;
      grounded humanist warmth, never aggressive; the moment of
      threshold rendered in light
    composition: >-
      single mountain silhouette OR open horizon line in the lower-third,
      warm golden-hour light gradient above, vast quiet sky for title
      takeover; grounded composition with clear directional implication
    # R5 (2026-04-30): rewritten per R4 §11. Imagery zone is full-width
    # wide horizontal (1600x666 = 2.40:1) — mountain silhouette runs
    # across the full lower frame with a distant single sun-mark above
    # the highest peak.
    subject_prompt: >-
      wide horizontal mountain silhouette across full lower frame,
      terracotta and cream palette, painterly cinematic landscape
      illustration, soft golden hour glow above the ridgeline, distant
      single small sun-mark above the highest peak, grounded humanist
      register, mountain fills 60% of frame height in lower portion,
      generous warm cream sky above
    style_modifiers: >-
      cinematic editorial landscape photography, warm earth-tone palette,
      golden-hour glow, grounded humanist register, modern resilience
      bestseller cover aesthetic, depth of field minimal grain
    lock_in_tokens: ["warm earth-tone palette terracotta and amber", "single mountain silhouette OR open horizon", "humanist warmth golden hour grounded composition"]
    revisit_after_r1: false

# ---------------------------------------------------------------------------
# Per-book overrides.
#
# Most books should inherit their genre's prompt cleanly. Use this section
# only when a specific book needs tone away from its genre default.
#
# Schema:
#   <book_id>:
#     subject_prompt_override: >- ...   # replaces the genre subject_prompt
#     style_modifiers_override: >- ...  # replaces the genre style_modifiers
#     lock_in_tokens_override: [..]     # replaces genre lock_in_tokens
#     note: "why this override exists"
# ---------------------------------------------------------------------------
book_overrides: {}

