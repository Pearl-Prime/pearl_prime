    description: >-
      Readers search by genre (psych horror / romance / mecha / cultivation).
      Wellness embeds inside genre shells (CJK_CATALOG_PLAN §1 genre-shell revenue gap).
    locales: [ja_JP, zh_CN, zh_TW, zh_HK, ko_KR]
