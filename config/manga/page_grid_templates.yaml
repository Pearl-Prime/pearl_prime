# Page Grid Template Library — multi-panel page layouts (manga frame engine)
#
# Status: AUTHORITY (new, this PR — LANE A frame engine)
# Schema version: 1.0
# Date: 2026-06-17
# Author: Pearl_Dev
# Subsystem: manga_pipeline
#
# WHAT THIS FILE IS
# -----------------
#   The named multi-panel PAGE template library consumed by the frame/gutter
#   renderer (phoenix_v4/manga/chapter/page_frame.py). Each template is a set of
#   panel bounding-boxes in normalised page space (0.0 .. 1.0, origin top-left),
#   keyed by (panel_count, page_type). Genre profiles tune gutter width, border
#   stroke and outer margin so that the SAME bbox library reads as shonen (tight,
#   dynamic) or iyashikei/healing (calm, generous whitespace, larger panels).
#
#   Until this file existed the renderers tiled panels edge-to-edge
#   (page_compose.py horizontal strip) or stacked them with whitespace
#   (webtoon_compose.py) and config/manga/panel_layout_templates/*.yaml were
#   INERT (no renderer read panels_per_page / page_aspect / variable_grid).
#   This library + page_frame.py make the layout config consequential.
#
# WHAT THIS FILE IS NOT
# ---------------------
#   - NOT per-panel render contracts — that is config/manga/panel_templates/*.yaml
#     (aspect_hint / framing / composition tokens). This file only positions
#     already-rendered panel PNGs into framed cells.
#   - NOT the webtoon gutter table — vertical-scroll pacing gutters live in
#     phoenix_v4/manga/chapter/webtoon_compose.py (GUTTER_PX_BY_BEAT).
#
# AUTHORITY CHAIN
# ---------------
#   - specs/MANGA_LAYOUT_AGENT_SPEC.md §4 (Page Layout Grammar), §5 (Reading
#     Direction), §6 (Page Types: standard/splash/double_spread/silent)
#   - config/manga/page_and_layout_enums.yaml (page_type / reading_direction)
#   - config/manga/panel_templates/iyashikei.yaml genre_rules
#     (negative_space_min_pct: 40 → healing profile maps to bigger panels /
#      wider gutters)
#
# COORDINATE CONVENTION
# ---------------------
#   bbox = [x, y, w, h] as fractions of the *content area* (the page minus outer
#   margins). 0,0 = top-left. The renderer insets each bbox by half the gutter on
#   every side, so two adjacent cells whose fractional boxes touch end up with a
#   full gutter between them. Reading order of the list = LTR reading order; the
#   renderer mirrors x for RTL (right_to_left) pages so list index 0 is still the
#   first panel read.

schema_version: "1.0.0"
template_library_id: "page_grid_templates_v1"

# ── Page geometry defaults (overridable by panel_layout_template yaml) ────────
# Master canvas long-edge in px; aspect from page_aspect "W:H". These produce a
# 2:3 print page at 300dpi-ish working resolution (1600x2400). The renderer
# downsamples for delivery elsewhere.
page_defaults:
  page_aspect: "2:3"            # width:height
  long_edge_px: 2400            # height for portrait pages
  background_rgb: [255, 255, 255]

# ── Genre profiles ───────────────────────────────────────────────────────────
# Profiles select a *layout family* and tune the frame cosmetics. healing /
# iyashikei deliberately prefers calmer templates (fewer, larger, contemplative
# panels), wider gutters and a lighter border so the page breathes (≥40% negative
# space target from iyashikei.yaml genre_rules).
genre_profiles:

  default:
    layout_family: standard
    gutter_px: 48               # ~60px @ true 300dpi, scaled to 2400px master
    border_stroke_px: 8         # MANGA_LAYOUT_AGENT_SPEC §4.4 line_weight 8
    border_rgb: [0, 0, 0]
    outer_margin_px: 90         # ~bleed+safe inset
    cell_fill: crop             # crop|contain — how panel fits its cell
    max_panels_per_page: 6

  shonen:
    layout_family: standard
    gutter_px: 36               # tighter, faster read
    border_stroke_px: 10        # heavier ink
    border_rgb: [0, 0, 0]
    outer_margin_px: 80
    cell_fill: crop
    max_panels_per_page: 6

  seinen:
    layout_family: standard
    gutter_px: 48
    border_stroke_px: 8
    border_rgb: [0, 0, 0]
    outer_margin_px: 90
    cell_fill: crop
    max_panels_per_page: 6

  # healing register — Open Vessel Press / devotion_path / Sai Ma and the
  # stillness/somatic family. Calmer cadence, more air, larger panels.
  healing:
    layout_family: iyashikei
    gutter_px: 96               # generous whitespace between cells
    border_stroke_px: 5         # soft thin border (not heavy shonen ink)
    border_rgb: [40, 40, 40]    # near-black, softened
    outer_margin_px: 150        # wide quiet margin
    cell_fill: contain          # never crop away contemplative negative space
    max_panels_per_page: 4      # fewer, bigger panels per page

  iyashikei:                    # alias of healing
    layout_family: iyashikei
    gutter_px: 96
    border_stroke_px: 5
    border_rgb: [40, 40, 40]
    outer_margin_px: 150
    cell_fill: contain
    max_panels_per_page: 4

  devotional:                   # devotion_path emotional-drama / supernatural-healing
    layout_family: iyashikei
    gutter_px: 88
    border_stroke_px: 6
    border_rgb: [30, 30, 30]
    outer_margin_px: 140
    cell_fill: contain
    max_panels_per_page: 4

  horror:
    layout_family: standard
    gutter_px: 30               # claustrophobic
    border_stroke_px: 9
    border_rgb: [0, 0, 0]
    outer_margin_px: 70
    cell_fill: crop
    max_panels_per_page: 6

# ── Genre family aliasing ────────────────────────────────────────────────────
# Map brand/series genre strings onto a profile above.
genre_alias:
  shonen: shonen
  cultivation: shonen
  action: shonen
  battle: shonen
  seinen: seinen
  josei_essay_manga: seinen
  iyashikei: iyashikei
  healing: healing
  iyashikei_color: iyashikei
  slice_of_life: iyashikei
  devotional: devotional
  devotion: devotional
  devotion_path: devotional
  supernatural_healing: devotional
  horror: horror
  shojo: default
  manhwa: default

# ── Layout families ──────────────────────────────────────────────────────────
# A family maps panel_count → an ordered list of cell bboxes. Index 0 = first
# panel in LTR reading order. The renderer picks family[panel_count]; if a count
# is missing it falls back to the largest defined count <= panel_count and lets
# the renderer overflow remaining panels onto a follow-on page.
#
# "standard" = denser, more rectangular shonen/seinen grids.
# "iyashikei" = calmer; fewer panels, more asymmetry and breathing room, larger
#               contemplative hero panels, intentional empty/atmospheric bias.

layout_families:

  # ════════════════════════════════════════════════════════════════════════
  standard:

    1:
      - { id: full, bbox: [0.0, 0.0, 1.0, 1.0] }

    2:
      # two stacked landscape panels
      - { id: top,    bbox: [0.0, 0.0, 1.0, 0.5] }
      - { id: bottom, bbox: [0.0, 0.5, 1.0, 0.5] }

    3:
      # wide establisher on top, two beats below
      - { id: hero,        bbox: [0.0, 0.0, 1.0, 0.46] }
      - { id: lower_left,  bbox: [0.0, 0.46, 0.5, 0.54] }
      - { id: lower_right, bbox: [0.5, 0.46, 0.5, 0.54] }

    4:
      # classic 2x2
      - { id: tl, bbox: [0.0, 0.0, 0.5, 0.5] }
      - { id: tr, bbox: [0.5, 0.0, 0.5, 0.5] }
      - { id: bl, bbox: [0.0, 0.5, 0.5, 0.5] }
      - { id: br, bbox: [0.5, 0.5, 0.5, 0.5] }

    5:
      # wide top, 2x2 below (irregular)
      - { id: banner, bbox: [0.0, 0.0, 1.0, 0.34] }
      - { id: m_tl,   bbox: [0.0, 0.34, 0.5, 0.33] }
      - { id: m_tr,   bbox: [0.5, 0.34, 0.5, 0.33] }
      - { id: m_bl,   bbox: [0.0, 0.67, 0.5, 0.33] }
      - { id: m_br,   bbox: [0.5, 0.67, 0.5, 0.33] }

    6:
      # 2 cols x 3 rows (MANGA_LAYOUT_AGENT_SPEC §4.1 3x2 portrait emphasis)
      - { id: r1l, bbox: [0.0, 0.0,  0.5, 0.3333] }
      - { id: r1r, bbox: [0.5, 0.0,  0.5, 0.3333] }
      - { id: r2l, bbox: [0.0, 0.3333, 0.5, 0.3334] }
      - { id: r2r, bbox: [0.5, 0.3333, 0.5, 0.3334] }
      - { id: r3l, bbox: [0.0, 0.6667, 0.5, 0.3333] }
      - { id: r3r, bbox: [0.5, 0.6667, 0.5, 0.3333] }

  # ════════════════════════════════════════════════════════════════════════
  iyashikei:
    # Healing register: ≤4 panels, larger cells, asymmetric breathing layouts.
    # Generous empty bias comes from the wide gutters + outer margin + "contain"
    # fit in the genre profile, plus deliberately uneven splits here.

    1:
      - { id: full, bbox: [0.0, 0.0, 1.0, 1.0] }

    2:
      # large contemplative hero up top, smaller grounded beat below — uneven
      # split (0.62 / 0.38) reads as a held breath then a quiet exhale.
      - { id: hero,   bbox: [0.0, 0.0,  1.0, 0.62] }
      - { id: ground, bbox: [0.0, 0.62, 1.0, 0.38] }

    3:
      # tall hero on the (reading-)leading side, two small stacked beats beside.
      - { id: hero,      bbox: [0.0, 0.0, 0.62, 1.0] }
      - { id: beat_top,  bbox: [0.62, 0.0, 0.38, 0.5] }
      - { id: beat_bot,  bbox: [0.62, 0.5, 0.38, 0.5] }

    4:
      # wide weather-hook banner, big environmental hero, two small grounding
      # beats — note the hero (m_hero) is intentionally larger than the pair.
      - { id: banner, bbox: [0.0, 0.0,  1.0, 0.26] }
      - { id: m_hero, bbox: [0.0, 0.26, 0.6, 0.74] }
      - { id: g_top,  bbox: [0.6, 0.26, 0.4, 0.37] }
      - { id: g_bot,  bbox: [0.6, 0.63, 0.4, 0.37] }

# ── Page-type overrides ──────────────────────────────────────────────────────
# These are page_type values from page_and_layout_enums.yaml. They override the
# family/panel-count lookup.
page_type_rules:

  splash:
    # full-bleed single image, NO border, NO gutter (spec §6.2)
    force_single_cell: true
    border: false
    gutter_px: 0
    outer_margin_px: 0

  double_spread:
    # two facing pages as one composition (spec §6.3): doubles width, adds a
    # center spine gutter. Cells laid across the full spread.
    spread: true
    center_gutter_px: 60

  silent:
    # minimal/zero text; extend gutters for breathing room (spec §6.4)
    gutter_multiplier: 1.6
    border: true

  standard:
    border: true
