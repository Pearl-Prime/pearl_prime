# Machine-readable genre story engines — architect + bestseller gate authority.
# Sourced from: MANGA_READER_PROMISES.md, MANGA_GENRE_AGENT_SPEC.md,
# docs/research/manga_craft/*, manga_story_strategies banks.
#
# Governed genres MUST NOT fall back to story_architect._BEAT_TEMPLATES.
# Strategy banks remain the beat prose source; this file defines enforcement.

schema_version: "1.0"
last_updated: "2026-07-07"

# Canonical keys match config/source_of_truth/manga_story_strategies/{key}_strategies.yaml
engines:
  psychological_horror:
    aliases: [horror, psych_horror]
    craft_bible: docs/research/manga_craft/psychological_horror.md
    reader_fantasy: "exquisite unease I can close the book on"
    core_engine: "dread accumulates through wrongness the body registers before the mind names it"
    escalation_pattern: "ordinary detail → wrong angle → presence sensed → integration by staying"
    signature_pleasures: [false_clarity_caption, art_text_disagreement, silence_as_threat]
    serial_pressure: "each chapter widens the gap between what is seen and what is named"
    allowed_beat_families: [dread, wrongness, vigilance, presence, flinch, integration]
    illegal_beat_families: [healing_renewal, dawn_stillness, tea_ritual, generic_wound_turn]
    required_marker_groups:
      - min_hits: 2
        markers: [dread, wrong, presence, dark, shadow, flinch, shouldn't, not normal, still in the]
    generic_failure_avoid:
      - "Dawn light, stillness before the day"
      - "The world breathes"
      - "small choice — turns left"
      - "exhale. The room holds the echo"

  psychological_thriller:
    aliases: [thriller, psych_thriller, mystery_thriller]
    craft_bible: docs/research/manga_craft/psychological_thriller.md
    reader_fantasy: "I will feel pulled forward, unable to stop reading"
    core_engine: "obsession loop — pattern recognition that turns on the protagonist"
    escalation_pattern: "clue → model misfit → paranoia spike → body confesses first"
    signature_pleasures: [data_as_threat, mirror_reveal, held_breath_before_reveal]
    serial_pressure: "each chapter adds one data point the protagonist cannot unsee"
    allowed_beat_families: [clue, pattern, paranoia, model, reveal, body_confession]
    illegal_beat_families: [healing_renewal, dawn_stillness, tea_ritual]
    required_marker_groups:
      - min_hits: 2
        markers: [pattern, model, clue, data, file, screen, notes, prediction, reads, shoulder]
    generic_failure_avoid:
      - "Dawn light, stillness before the day"
      - "unexpected kindness from a stranger"

  dark_fantasy:
    aliases: [dark_fantasy]
    craft_bible: docs/research/manga_craft/dark_fantasy.md
    reader_fantasy: "grief and cost carried by a living world that refuses force"
    core_engine: "land-as-witness; doctrine through observation never advice"
    escalation_pattern: "refusal of land → cost named → small kept act"
    signature_pleasures: [living_land_pulse, token_silence, warm_ground_palm]
    serial_pressure: "the land remembers what the protagonist tries to forget"
    allowed_beat_families: [land_refusal, cost, token, keeper, grief_weight]
    illegal_beat_families: [healing_renewal, dawn_stillness, office_metric]
    required_marker_groups:
      - min_hits: 2
        markers: [land, wood, forest, mist, token, blade, keeper, ground, refuses, names]
    generic_failure_avoid:
      - "Dawn light, stillness before the day"

  action_battle:
    aliases: [battle, action, shonen]
    craft_bible: docs/research/manga_craft/action_battle.md
    reader_fantasy: "I will feel capable of becoming more than I am"
    core_engine: "power ladder — strike cost, rival pressure, public mastery stakes"
    escalation_pattern: "freeze → trembling guard → committed strike while afraid → cost named"
    signature_pleasures: [breath_then_strike, guard_lock, forward_foot]
    serial_pressure: "each bout raises the visible cost of forcing vs settling"
    allowed_beat_families: [strike, guard, opponent, bout, training, cost, trembling]
    illegal_beat_families: [healing_renewal, dawn_stillness, tea_ritual, office_calendar]
    required_marker_groups:
      - min_hits: 2
        markers: [strike, guard, blade, bout, opponent, parry, training, trembling, blow, foot]
    generic_failure_avoid:
      - "Dawn light, stillness before the day"
      - "The world holds still. What needed to happen has happened"

  sports_competition:
    aliases: [sports]
    craft_bible: docs/research/manga_craft/sports_competition.md
    reader_fantasy: "performance under public eyes with a ladder to climb"
    core_engine: "competition ladder — trial, opponent pressure, form before time"
    escalation_pattern: "choke → unclench → tempo refound → honest second effort"
    signature_pleasures: [feet_on_track, whistle_not_start, second_lap_honest]
    serial_pressure: "each meet moves one rung on the ladder or exposes the choke"
    allowed_beat_families: [race, lap, track, whistle, relay, score, form, choke]
    illegal_beat_families: [healing_renewal, dawn_stillness, tea_ritual]
    required_marker_groups:
      - min_hits: 2
        markers: [track, lap, race, whistle, relay, spikes, coach, score, blocks, form]
    generic_failure_avoid:
      - "Dawn light, stillness before the day"

  romance_josei_drama:
    aliases: [romance, josei, shojo]
    craft_bible: docs/research/manga_craft/shojo_romance.md
    reader_fantasy: "proximity charge with delay engine and emotional ambiguity"
    core_engine: "delay engine — almost-contact, social risk, unhurried partner model"
    escalation_pattern: "guard → proximity → almost → rest shared unforced"
    signature_pleasures: [two_cups_counter, read_left_on_purpose, unhurried_knock]
    serial_pressure: "each chapter moves one rung on the vulnerability ladder"
    allowed_beat_families: [proximity, delay, almost, counter, cafe, partner, guard_slip]
    illegal_beat_families: [healing_renewal, dawn_stillness, training_ground]
    required_marker_groups:
      - min_hits: 2
        markers: [counter, cafe, cup, partner, proximity, almost, unhurried, read, knock, apron]
    generic_failure_avoid:
      - "Dawn light, stillness before the day"
      - "Wide morning interior"

  workplace_drama:
    aliases: [workplace]
    craft_bible: docs/research/manga_craft/workplace_drama.md
    reader_fantasy: "institutional pressure made legible — competence friction and status stakes"
    core_engine: "labor conditions as plot — calendar, badge, role eating the person"
    escalation_pattern: "perform competence → metric peak → custodian names cycle → sustainable pace"
    signature_pleasures: [glass_office, calendar_no_white, badge_click, night_shift_witness]
    serial_pressure: "each chapter names one institutional cost the protagonist was performing past"
    allowed_beat_families: [office, calendar, badge, meeting, dashboard, shift, role, deadline]
    illegal_beat_families: [healing_renewal, dawn_stillness, training_ground, tea_ritual]
    required_marker_groups:
      - min_hits: 2
        markers: [office, calendar, badge, meeting, dashboard, shift, desk, email, floor, conference]
    generic_failure_avoid:
      - "Dawn light, stillness before the day"
      - "quiet mountain village"

  cultivation_martial:
    aliases: [cultivation, martial]
    craft_bible: docs/research/manga_craft/shonen_encouragement.md
    reader_fantasy: "legible ladder — gate, breakthrough, humiliation, sect pressure"
    core_engine: "body-first cultivation — force ruptures, settling opens the lower gate"
    escalation_pattern: "force qi → rupture/refusal → master names pause → one slow correct motion"
    signature_pleasures: [meridian_refusal, stone_token_warm, dantian_before_mind]
    serial_pressure: "each cycle raises the gate or the humiliation of forcing"
    allowed_beat_families: [qi, meridian, gate, sect, breakthrough, dantian, humiliation]
    illegal_beat_families: [healing_renewal, dawn_stillness, office_metric, tea_ritual]
    required_marker_groups:
      - min_hits: 2
        markers: [qi, meridian, gate, sect, dantian, cultivation, breakthrough, training wraps, force]
    generic_failure_avoid:
      - "Dawn light, stillness before the day"

# Substrings from legacy _BEAT_TEMPLATES — BLOCK if found in governed-genre output.
legacy_generic_template_markers:
  - "Wide establishing shot of"
  - "Dawn light, stillness before the day"
  - "SILENCE: The world breathes"
  - "Something has shifted"
  - "Neither acknowledges the gap"
  - "The room holds the echo"
  - "The story ends where the reader begins"
  - "Not resolved. Not healed. Awake."
