# Authority chain:
#   - Strategic input (canonical):     docs/GENRE_PORTFOLIO_PLAN.md
#   - Reconciliation spec (governing): specs/MANGA_CATALOG_RECONCILIATION_SPEC.md (PR #682)
#   - This file (canonical list):      config/manga/canonical_brand_list.yaml
#   - Series/topic plan (consumer):    config/manga/manga_brand_series_plan.yaml
#
# Operator decision 2026-04-27 (Path X): manga and book pipelines are intentionally
# distinct. See docs/PEARL_ARCHITECT_STATE.md BR-CANON-01 (Path X cap entry).
#
# DO NOT MODIFY config/brand_registry.yaml or config/brand_management/global_brand_registry.yaml
