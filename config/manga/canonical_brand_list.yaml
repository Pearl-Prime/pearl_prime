#
# Schema:
#   schema_version: 1
#   total_brands: 37
#   tiers: flagship | core | niche  (per GENRE_PORTFOLIO_PLAN.md tier sections)
#   brands: <brand_id>:
#     tier:                flagship | core | niche
#     demographic:         josei | seinen | shonen | shojo | manhwa
#     primary_topic:       single canonical psychological/wellness topic (anchor)
#     secondary_topics:    list of additional wellness topics carried by the brand
#     notes:               human-readable one-line summary (from GENRE_PORTFOLIO_PLAN.md ##### header)
#
# Demographic taxonomy (manga reader-segment convention):
#   josei     — adult women
#   seinen    — adult men
#   shonen    — boys / young men
#   shojo     — girls / young women
#   manhwa    — Korean webtoon (digital-native; demographic non-binary)

