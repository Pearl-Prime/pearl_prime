    # Legacy 10 slugs retained until 2X.4 atomic.
    iyashikei:        { master: color_vertical_webtoon, flatten: [] }
    seinen:           { master: color_vertical_webtoon, flatten: [] }
    shonen:           { master: color_vertical_webtoon, flatten: [] }
    shojo:            { master: color_vertical_webtoon, flatten: [] }
    horror:           { master: color_vertical_webtoon, flatten: [] }
    cultivation:      { master: color_vertical_webtoon, flatten: [] }
    manhwa:           { master: color_vertical_webtoon, flatten: [] }
    webtoon_romance:  { master: color_vertical_webtoon, flatten: [] }
    isekai:           { master: color_vertical_webtoon, flatten: [] }
    josei_essay_manga: { master: color_vertical_webtoon, flatten: [] }
    # NEW per spec §4.1 — CN cultivation/xianxia primary; webtoon-vertical-romance secondary.
    dark_fantasy:           { master: color_vertical_webtoon, flatten: [] }
    psychological_horror:   { master: color_vertical_webtoon, flatten: [] }
    supernatural_mystery:   { master: color_vertical_webtoon, flatten: [] }
    sci_fi_cyberpunk:       { master: color_vertical_webtoon, flatten: [] }
    psychological_thriller: { master: color_vertical_webtoon, flatten: [] }
    romance_josei_drama:    { master: color_vertical_webtoon, flatten: [] }
    workplace_drama:        { master: color_vertical_webtoon, flatten: [] }
    action_battle:          { master: color_vertical_webtoon, flatten: [] }
    sports_competition:     { master: color_vertical_webtoon, flatten: [] }
    historical_period:      { master: color_vertical_webtoon, flatten: [] }
    cultivation_martial:    { master: color_vertical_webtoon, flatten: [] }   # CN primary
