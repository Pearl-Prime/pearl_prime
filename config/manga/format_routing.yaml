    mecha:                  { master: color_vertical_webtoon, flatten: [] }

  ko_KR:
    # ko_KR is webtoon-native (Naver/Kakao). Per spec D-18 (OQ-5 b):
    # render now, distribution_status=hold_pending_market_clearance pending
    # Korea AI Act enforcement clarity (post-Jan 2027). All genres are
    # color_vertical_webtoon master; no flatten exports needed (KR readers
    # consume webtoon-native; print is irrelevant).
    iyashikei:              { master: color_vertical_webtoon, flatten: [] }
    seinen:                 { master: color_vertical_webtoon, flatten: [] }
