# ── target_platforms by (locale, master_format) ────────────────────────────
# Only ALLOWED + ALLOWED_GREY platforms surface here. PARTNER_ONLY platforms
# go to pending_partner_targets[] for documentation, not target_platforms[].
target_platforms_by_locale_format:
  en_US:
    color_vertical_webtoon: [webtoon_canvas, amazon_kdp_comics, globalcomix]
    bw_page_manga:          [amazon_kdp_comics, globalcomix]
    color_page_manga:       [amazon_kdp_comics, globalcomix, kobo, apple_books]
    direct_self_help_illustrated: [amazon_kdp_comics, kobo, apple_books, google_play_books]

  ja_JP:
    color_vertical_webtoon: [line_manga_indies, bookwalker]
    bw_page_manga:          [bookwalker, comic_cmoa, line_manga_indies, amazon_kdp_comics]
    color_page_manga:       [bookwalker, amazon_kdp_comics]
    direct_self_help_illustrated: [bookwalker, amazon_kdp_comics, kobo, apple_books]

  zh_TW:
    color_vertical_webtoon: [webtoon_canvas, line_manga_indies, bookwalker]
    bw_page_manga:          [bookwalker, amazon_kdp_comics]
    color_page_manga:       [bookwalker, amazon_kdp_comics]
    direct_self_help_illustrated: [bookwalker, amazon_kdp_comics, kobo, apple_books]

  zh_CN:
    # zh_CN per D-19 (OQ-6 c): GRAY-ZONE distribution with full AI disclosure.
    # KDP Comics is ALLOWED globally; Bilibili/Kuaikan/Tencent are GRAY (pushed
    # with AI disclosure metadata; account termination risk under PRC Generative
    # AI Service Measures 2023). R-zh_CN-distribution=HIGH risk in spec.
    color_vertical_webtoon: [amazon_kdp_comics, bilibili_comics, kuaikan_manhua, tencent_comics]
    bw_page_manga:          [amazon_kdp_comics]
    color_page_manga:       [amazon_kdp_comics]
    direct_self_help_illustrated: [amazon_kdp_comics, kobo]

  ko_KR:
    # ko_KR per D-18 (OQ-5 b): rendered + held pending Korea AI Act clarity.
    # No distribution targets until policy resolves. Pre-staged platforms in
    # pending_partner_targets_by_locale below for ready-to-ship state.
    color_vertical_webtoon: []
    bw_page_manga:          []
    color_page_manga:       []
    direct_self_help_illustrated: []

# ── pending_partner_targets by locale (documented intent only) ─────────────
pending_partner_targets_by_locale:
  en_US: []
  ja_JP: [piccoma_smartoon, line_manga_originals]
  zh_TW: [line_manga_originals]
  zh_CN: [tencent_comics_premium, kuaikan_premium]   # gray-zone primary push (above) is preferred over premium-only deals
  ko_KR: [naver_webtoon, kakao_webtoon, line_webtoon_kr]   # held per D-18; ready when AI Act clarifies

# ── connector_lane by (locale, master_format) ─────────────────────────────
# Per PR #631 Decision 1.1: three WEBTOON connectors needed, not one.
connector_lane_by_locale_format:
  en_US:
    color_vertical_webtoon: unified_canvas
    bw_page_manga:          print_only
    color_page_manga:       print_only
    direct_self_help_illustrated: print_only

  ja_JP:
    color_vertical_webtoon: line_manga_indies
    bw_page_manga:          print_only
    color_page_manga:       print_only
    direct_self_help_illustrated: print_only

  zh_TW:
    color_vertical_webtoon: unified_canvas    # zh-TW IS in unified CANVAS
    bw_page_manga:          print_only
    color_page_manga:       print_only
    direct_self_help_illustrated: print_only

  zh_CN:
    # Per D-19 GRAY-ZONE: gray_zone_with_disclosure connector lane added.
    # AI-disclosure metadata required per series.
    color_vertical_webtoon: gray_zone_with_disclosure
    bw_page_manga:          partner_required
    color_page_manga:       partner_required
    direct_self_help_illustrated: print_only

  ko_KR:
    # Per D-18 RENDER+HOLD: no active connector until Korea AI Act resolution.
    color_vertical_webtoon: hold_pending_market_clearance
    bw_page_manga:          print_only
    color_page_manga:       print_only
    direct_self_help_illustrated: print_only

# ── panel_layout_template by master_format ────────────────────────────────
panel_layout_template_by_format:
  color_vertical_webtoon:        config/manga/panel_layout_templates/vertical_scroll_webtoon.yaml
  bw_page_manga:                 config/manga/panel_layout_templates/bw_page_rtl.yaml
  color_page_manga:              config/manga/panel_layout_templates/color_page.yaml
  direct_self_help_illustrated:  config/manga/panel_layout_templates/self_help_illustrated.yaml

# ── style → master_format override (when style strongly suggests a format) ─
# Style tags from MANGA_FULL_CATALOG_PLAN.md "Style" column.
style_overrides:
  cozy_iyashikei:                 # cozy iyashikei works in both; prefer webtoon master
    keep_default: true
  dark_psychological:             # seinen psychological is print-first in JP, webtoon-OK elsewhere
    locale_specific:
      ja_JP: bw_page_manga
      en_US: color_vertical_webtoon
      zh_TW: color_vertical_webtoon
      zh_CN: color_vertical_webtoon
  power_progression:              # Solo Leveling tier — webtoon master always
    force_master: color_vertical_webtoon
  hyper_clean_cinematic:          # premium color webtoon
    force_master: color_vertical_webtoon
  webtoon_vertical_romance:       # definitionally vertical
    force_master: color_vertical_webtoon
  social_media_simulacra:         # mobile-native
    force_master: color_vertical_webtoon
