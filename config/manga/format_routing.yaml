# Phoenix Omega — Format routing for the catalog rebuild generator.
# Maps (locale, genre, style) → (master_format, flatten_exports, target_platforms,
#                                  connector_lane, panel_layout_template).
#
# Source-of-truth refs:
#   - artifacts/research/manga_vs_webtoon_decision_matrix_2026-04-25.yaml (PR #626 weights)
#   - artifacts/research/webtoon_master_reference_2026-04-25.md (PR #631 — three connectors,
#     webtoon-as-master)
#   - config/publishing/ai_policy_blockers.yaml (only ALLOWED + ALLOWED_GREY platforms surface here)
#
# Used by scripts/manga/generate_series_plans_from_catalog.py.

schema_version: "1.0.0"
authority_doc: "artifacts/research/webtoon_master_reference_2026-04-25.md"

# ── Default format per (locale, genre) — covers most cases ─────────────────
# Per PR #631 Decision 4: webtoon is master, B&W is flatten-export.
# So master_format defaults to color_vertical_webtoon for nearly every cell;
# flatten_exports adds bw_page_manga where the genre has a strong B&W tradition.
defaults_by_locale_genre:
  en_US:
    # Legacy 10-slug allow-list (kept until 2X.4 atomic flip per spec D-20).
    iyashikei:        { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    seinen:           { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    shonen:           { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    shojo:            { master: color_vertical_webtoon, flatten: [] }
    horror:           { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    cultivation:      { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    manhwa:           { master: color_vertical_webtoon, flatten: [] }
    webtoon_romance:  { master: color_vertical_webtoon, flatten: [] }
    isekai:           { master: color_vertical_webtoon, flatten: [] }
    josei_essay_manga: { master: direct_self_help_illustrated, flatten: [] }
    # NEW per spec §4.1 — strategic 13 additions to support 15-slug allow-list.
    dark_fantasy:           { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    psychological_horror:   { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    supernatural_mystery:   { master: color_vertical_webtoon, flatten: [] }
    sci_fi_cyberpunk:       { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    psychological_thriller: { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    romance_josei_drama:    { master: color_vertical_webtoon, flatten: [] }
    workplace_drama:        { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    action_battle:          { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    sports_competition:     { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    historical_period:      { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    cultivation_martial:    { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    school_coming_of_age:   { master: color_vertical_webtoon, flatten: [] }
    mecha:                  { master: color_vertical_webtoon, flatten: [bw_page_manga] }

  ja_JP:
    # JP is the only market where B&W is genuinely co-equal commercially.
    # Per PR #626: 40% color webtoon / 45% B&W / 13% color page / 2% self-help.
    # We still default to webtoon as master (cheaper to flatten) but flatten_exports
    # is denser here. Legacy 10 slugs retained until 2X.4 atomic.
    iyashikei:        { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    seinen:           { master: bw_page_manga, flatten: [] }   # seinen psychological is print-first
    shonen:           { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    shojo:            { master: color_vertical_webtoon, flatten: [color_page_manga] }
    horror:           { master: bw_page_manga, flatten: [] }   # horror works strongest in B&W in JP
    cultivation:      { master: color_vertical_webtoon, flatten: [bw_page_manga] }
    manhwa:           { master: color_vertical_webtoon, flatten: [] }
    webtoon_romance:  { master: color_vertical_webtoon, flatten: [] }
