# Canonical Genre List — Reconciliation map between Manga Taxonomy + Pacing
#
# Status: DERIVED (not a new authority).
# Upstream authorities (do not modify those via this file):
#   - config/manga/manga_taxonomy.yaml      — 16 genre_families + subgenres + engines
#   - config/manga/manga_pacing_by_genre.yaml — 21 pacing contracts + alias map
#   - config/manga/genre_ite_profiles.yaml  — ITE profiles per genre id
#
# Generated: 2026-04-28
# Purpose:
#   Single reconciliation artifact for callers that need the *union* of genre
#   ids across taxonomy + pacing, with alias resolution. Specifically:
#     - brand × genre allocation matrices (manga catalog plan)
#     - cross-locale catalog planning that needs every lane enumerated once
#     - alias-to-canonical lookups (e.g. cultivation_martial → cultivation)
#
# Authority scope: this file owns the *reconciliation/alias map* only.
# When taxonomy or pacing changes, regenerate or update this file to match —
# do NOT use this file to override them.
#
# A pre-flight repo audit on 2026-04-28 confirmed no prior canonical genre
# union/alias authority existed; this file fills that gap. The three pre-existing
# genre files above each cover a different domain (taxonomy structure,
# pacing contracts, ITE profiles) and are not duplicated here.
#
# Reconciliation method:
#   1. Take the union of taxonomy genre_family ids and pacing genre keys.
#   2. Where a taxonomy id and a pacing id describe the same lane (e.g. comedy / gag,
#      cultivation / cultivation_martial, historical / historical_period,
#      fantasy_adventure / fantasy), keep one canonical id and record the other as
#      `alias_of` so callers can resolve either label to the same row.
#   3. Where a pacing-only id is its own distinct lane (mecha, dark_fantasy,
#      sci_fi_cyberpunk, supernatural_everyday, school, memoir, social_issue,
#      graphic_medicine, battle_internal), give it its own canonical row.
#   4. Tag every row with which source(s) it appears in (`source_taxonomy`,
#      `source_pacing`) and an optional `parent_family` for hierarchy.
#
# Discrepancy note:
#   The dev brief calls out "17 canonical genre families" in manga_taxonomy.yaml.
#   manga_taxonomy.yaml currently declares 16 entries under `genre_families:`
#   (battle, romance, slice_of_life, horror, mystery, sports, fantasy_adventure,
#   workplace, food, family, procedural, essay, healing, historical, comedy,
#   cultivation). The 17th is presumably one of the subgenres (e.g. iyashikei
#   was historically counted as its own family). All 16 declared families are
#   marked must_include=true here. If owner intends 17, surface which subgenre
#   should be promoted and we will update.
#
# must_include rule:
#   Per dev brief — every taxonomy genre_family AND the user-specified set
#   (mecha, horror, fantasy_adventure incl. isekai, dark_fantasy, sci_fi_cyberpunk)
#   must be must_include=true.

schema_version: "1.0"
last_updated: "2026-04-28"
reconciliation_basis:
  - config/manga/manga_taxonomy.yaml
  - config/manga/manga_pacing_by_genre.yaml

