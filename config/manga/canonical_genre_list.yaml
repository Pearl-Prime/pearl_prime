# ── Taxonomy fallback for genres without manga_taxonomy.yaml entries ────────
#
# manga_taxonomy.yaml::genre_families covers 16 entries. The 9 pacing-only
# canonical genres (mecha, dark_fantasy, sci_fi_cyberpunk, supernatural_everyday,
# school, memoir, social_issue, graphic_medicine, battle_internal) plus
# `cultivation` (which has visual_grammars but no emotional_engines in
# taxonomy) need engine data so manga catalog rows can resolve
# default_visual_grammars / default_emotional_engines / default_serialization_engines.
#
# Provided here as fallback ONLY. When manga_taxonomy.yaml is extended to
# include these, the generator will prefer the taxonomy entry and fall back
# to this block only for the residual gaps.
#
# Engine choices below are derived from the pacing row's reference_corpus
# + canonical reader-promise framing per genre.
taxonomy_fallback:
  cultivation:
    default_emotional_engines: [aspiration, conviction, mastery]

  mecha:
    default_emotional_engines: [awe, dread, isolation]
    default_visual_grammars: [heavy_machine_detail, kinetic_action]
    default_serialization_engines: [cliffhanger_escalation, ensemble_rotation]

  dark_fantasy:
    default_emotional_engines: [melancholy, conviction, philosophical_dread]
    default_visual_grammars: [dense_atmospheric, ornate_fantasy, dread_contrast]
    default_serialization_engines: [quest_progression, philosophical_arc]

  sci_fi_cyberpunk:
    default_emotional_engines: [existential_anxiety, wonder, alienation]
    default_visual_grammars: [mechanical_environmental, dense_information_layered]
    default_serialization_engines: [mystery_reveal_chain, existential_arc]

  supernatural_everyday:
    default_emotional_engines: [wonder, quiet_recognition, melancholy]
    default_visual_grammars: [sparse_atmosphere, symbolic_reflection, ornate_fantasy]
    default_serialization_engines: [ritual_daily_life, episodic_wonder]

  school:
    default_emotional_engines: [longing, identity_becoming, belonging]
    default_visual_grammars: [everyday_warmth, decorative_romance]
    default_serialization_engines: [slow_burn_relationship, ensemble_rotation]

  memoir:
    default_emotional_engines: [reflection, emotional_truth, vulnerability]
    default_visual_grammars: [symbolic_reflection, sparse_atmosphere, intimate_realism]
    default_serialization_engines: [reflective_progression]

  social_issue:
    default_emotional_engines: [emotional_truth, grief, identity_rebuild]
    default_visual_grammars: [grounded_realism, intimate_realism]
    default_serialization_engines: [ensemble_rotation, slow_burn_revelation]

  graphic_medicine:
    default_emotional_engines: [reflection, body_awareness, hope]
    default_visual_grammars: [moderate_clean, intimate_realism]
    default_serialization_engines: [reflective_progression, episodic_education]

  battle_internal:
    default_emotional_engines: [conviction, philosophical_provocation, reflection]
    default_visual_grammars: [sparse_realist, kinetic_internal]
    default_serialization_engines: [reflective_progression, vow_arc]
