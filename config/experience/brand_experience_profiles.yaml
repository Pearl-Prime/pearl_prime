# Brand Experience Profiles — per-brand dominant experience, caps, and overrides.
# Authority: specs/EXPERIENCE_LAYER_ANTI_SPAM_SPEC.md §7
# 26 brands from author_registry.yaml + editorial_programs.yaml.
# Each brand gets a center-of-gravity profile; not a hard lock.
# Brands without an entry use global caps from experience_wave_controls.yaml.

schema_version: 1

