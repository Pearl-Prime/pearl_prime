# Church brands: distribution-only, no experience profile needed.
# Listed here so network-level caps correctly count them in the denominator.
# Authority: ADR-002-distribution-only-church-brand.md, EXPERIENCE_LAYER_ANTI_SPAM_SPEC.md section 8
network_participation:
  yuan_miao_church: { participant: true, distribution_only: true }
  liberation_way: { participant: true, distribution_only: true }
  flowing_arts: { participant: true, distribution_only: true }
  sacred_light: { participant: true, distribution_only: true }
  witness_path: { participant: true, distribution_only: true }
  still_ground: { participant: true, distribution_only: true }
  resonance_healing: { participant: true, distribution_only: true }
  dragon_vein: { participant: true, distribution_only: true }
  wisdom_body: { participant: true, distribution_only: true }
  bright_fire: { participant: true, distribution_only: true }
  truth_witness: { participant: true, distribution_only: true }
  sacred_way: { participant: true, distribution_only: true }
  source_soul: { participant: true, distribution_only: true }
  dakini_joy: { participant: true, distribution_only: true }

# Network-level caps (across ALL brands in a release window)
# Church brands with distribution_only: true count in the denominator but
# do not require per-dimension experience profiles.
network_experience_caps:
  max_same_experience_tuple_share: 0.15
  min_distinct_delivery_experiences: 4
  min_distinct_reader_intents: 4
