# Generated from config/catalog_planning/brand_identity_system.yaml — podcast cover automation.
schema_version: 1
global_specs:
  canvas_size: 3000x3000
  safe_zone_px: 150
  format: JPEG
  quality: 95
  color_space: RGB
  dpi: 72
  mobile_test_size: 60x60
platform_overrides:
  spotify:
    min_px: 1400
    max_px: 3000
    formats:
    - jpeg
    - png
  apple_podcasts:
    min_px: 1400
    max_px: 3000
    formats:
    - jpeg
    - png
    dpi: 72
  kkbox:
    min_px: 800
    max_px: 2500
    max_filesize_kb: 2048
cjk_typography:
  ja-JP:
    primary_font: Noto Serif JP
    fallback_font: M PLUS 1p
    min_size_pt: 48
    text_direction: horizontal
    furigana: false
  ko-KR:
    primary_font: Pretendard
    fallback_font: Noto Sans KR
    min_size_pt: 44
  zh-CN:
    primary_font: Source Han Sans SC
    fallback_font: Noto Sans SC
    min_size_pt: 44
  zh-TW:
    primary_font: Source Han Sans TC
    fallback_font: Noto Sans TC
    min_size_pt: 44
  zh-HK:
    primary_font: Source Han Sans HC
    fallback_font: Noto Sans HK
    min_size_pt: 44
positioning_variants:
  somatic_companion:
    background_modifier: warm_shift(+10)
    texture: organic
    colophon_opacity: 0.4
  research_guide:
    background_modifier: cool_shift(+5)
    texture: geometric
    colophon_opacity: 0.7
  elder_stabilizer:
    background_modifier: darken(15%)
    texture: minimal
    colophon_opacity: 0.5
