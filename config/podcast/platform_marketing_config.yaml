# Derived from brand_podcast_plans markets + public platform docs (see docs/PODCAST_PLATFORM_MARKETING_RESEARCH.md).
schema_version: 1
platforms:
  spotify:
    categories:
      primary: Health & Fitness
      secondary: Mental Health
    description_max_chars: 4000
    tags_enabled: false
    chart_factors:
    - completions
    - follows
    - consistency
    docs: https://creators.spotify.com/resources/create/dos-donts-showart
  apple:
    categories:
      primary: Health & Fitness
      subcategory: Mental Health
    description_max_chars: 4000
    ratings_reviews: true
    chart_factors:
    - new_follows
    - completions
    - ratings
    docs: https://podcasters.apple.com/support/5516-episode-art-template
  youtube:
    categories:
    - Education
    - People & Blogs
    tags_enabled: true
    chapter_markers: true
    shorts_clips: true
  ximalaya:
    categories:
    - 个人成长
    - 情感生活
    - 人文
    pricing_tiers:
    - free
    - 9.9_cny
    - 99_cny
    - 199_cny
    paid_model: knowledge_fee
    tipping_enabled: true
    note: 'Mainland compliance: disclose synthetic voices where required by platform/regulator.'
