title_formulas:
  en-US: '{series_name} | {brand_name}'
  ja-JP: '{series_name}【{brand_name}】'
  ko-KR: '{series_name} | {brand_name}'
  zh-CN: 「{series_name}」— {brand_name}
  zh-TW: 《{series_name}》| {brand_name}
  es-US: '{series_name} | {brand_name}'
launch_playbook:
  pre_launch:
    weeks_before: 2
    actions:
    - submit_to_platforms
    - publish_trailer
    - seed_social_clips
    trailer_duration_s:
    - 180
    - 300
  launch_week:
    episodes_to_drop: 3
    timing:
      en-US: Tuesday 5:00 AM EST
      ja-JP: Monday 6:00 AM JST
      ko-KR: Monday 7:00 AM KST
  growth:
    clips_per_episode:
    - 3
    - 5
    cross_promo_after_week: 4
