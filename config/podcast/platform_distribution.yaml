# Podcast Platform Distribution Configuration
# Authority: Pearl_Architect + Pearl_Research
# How episodes get from our pipeline to listener ears.
#
# STRATEGY: Self-host RSS on Cloudflare R2 (zero egress cost),
# submit RSS feed URL once per show to each platform.
# Only zh-CN (Ximalaya) and ko-KR (Podbbang) require direct upload.

schema_version: 1

# ─── SELF-HOSTED RSS INFRASTRUCTURE ─────────────────────────────────────────

hosting:
  audio_storage:
    provider: cloudflare_r2
    bucket: phoenix-podcast
    base_url: "https://podcast.phoenix-omega.com"
    path_template: "{brand_id}/{locale}/{series_id}/{episode_id}.mp3"
    cost: "$0/month (R2 zero egress, 10GB free tier)"
    notes: >
      Same R2 infrastructure as music bank. MP3s served via Cloudflare CDN.
      Public bucket with custom domain. S3-compatible API for upload.

  rss_hosting:
    provider: cloudflare_r2                # static XML files on R2
    path_template: "{brand_id}/{locale}/{series_id}/feed.xml"
    content_type: "application/rss+xml"
    notes: >
      One RSS feed per series per brand per locale.
      Generated by scripts/podcast/generate_podcast_feed.py.
      Updated (regenerated + re-uploaded) each time a new episode publishes.

  artwork_storage:
    provider: cloudflare_r2
    path_template: "{brand_id}/{locale}/{series_id}/artwork.jpg"
    spec:
      size: 3000x3000                     # universal safe max
      format: JPEG
      color_space: RGB
      dpi: 72
    notes: "One artwork per series. Generated from book cover pipeline."

# ─── RSS FEED SPECIFICATION ─────────────────────────────────────────────────

rss_spec:
  version: "2.0"
  namespaces:
    itunes: "http://www.itunes.com/dtds/podcast-1.0.dtd"
    podcast: "https://podcastindex.org/namespace/1.0"
    atom: "http://www.w3.org/2005/Atom"
    content: "http://purl.org/rss/1.0/modules/content/"
    spotify: "http://www.spotify.com/ns/rss"

  channel_tags_required:
    - tag: "atom:link"
      attr: 'rel="self" type="application/rss+xml"'
      source: "feed URL"
    - tag: "title"
      source: "series_title from series_templates.yaml"
    - tag: "description"
      source: "series description, max 4000 bytes"
    - tag: "link"
      source: "brand website URL"
    - tag: "language"
      source: "locale_registry.yaml → tts_locale_code (e.g., en-us, es-us, ja)"
    - tag: "itunes:category"
      value: "Health &amp; Fitness"
      subcategory: "Mental Health"
    - tag: "itunes:explicit"
      value: "false"                      # all Phoenix content is clean
    - tag: "itunes:image"
      source: "artwork URL on R2"
    - tag: "itunes:author"
      source: "teacher name or brand name"
    - tag: "itunes:type"
      value: "serial"                     # serialized seasons, not episodic
    - tag: "podcast:locked"
      value: "yes"                        # prevent unauthorized import

  channel_tags_recommended:
    - tag: "itunes:owner"
      children: ["itunes:name", "itunes:email"]
    - tag: "podcast:guid"
      notes: "UUIDv5 from feed URL, namespace ead4c236-bf58-58c6-a2c6-a6b28d128cb6"
    - tag: "spotify:countryOfOrigin"
      source: "locale_registry.yaml → region"

  item_tags_required:
    - tag: "title"
      source: "chapter title"
    - tag: "enclosure"
      attrs:
        url: "MP3 URL on R2"
        length: "file size in bytes"
        type: "audio/mpeg"
    - tag: "guid"
      attr: 'isPermaLink="false"'
      source: "UUID generated at episode creation — NEVER CHANGE"
      notes: "Changing GUIDs causes duplicate episodes and ranking loss"

  item_tags_recommended:
    - tag: "pubDate"
      format: "RFC 2822 (e.g., Wed, 06 Jul 2026 13:00:00 PDT)"
    - tag: "description"
      source: "chapter summary"
    - tag: "itunes:duration"
      format: "HH:MM:SS"
    - tag: "itunes:episode"
      source: "chapter number"
    - tag: "itunes:season"
      value: "1"                          # season = book
    - tag: "itunes:episodeType"
      values: ["full", "trailer", "bonus"]
    - tag: "itunes:image"
      source: "episode-specific artwork (optional, falls back to show)"
    - tag: "podcast:transcript"
      attr: 'type="text/vtt"'
      source: "generated from atom text"

# ─── ID3 TAGS (embedded in MP3) ────────────────────────────────────────────

id3_tags:
  version: "ID3v2.3"                      # most compatible
  required:
    TIT2: "episode title (chapter title)"
    TPE1: "artist (teacher name or brand)"
    TALB: "album (series title)"
    TRCK: "track number (episode number)"
    TCON: "Podcast"                       # genre
    TYER: "release year"
    COMM: "episode description"
    APIC: "embedded artwork (300x300+ JPEG)"
  optional:
    CHAP: "chapter markers if segments are time-stamped"
  notes: >
    ID3 tags serve as fallback when episodes are downloaded outside RSS.
    Mobile apps display ID3 metadata when RSS context is unavailable.
    Always set BOTH RSS tags AND ID3 tags.

# ─── AUDIO OUTPUT SPECS (universal) ────────────────────────────────────────

audio_output:
  format: MP3
  codec: libmp3lame
  bitrate: 128kbps                        # CBR (constant bit rate)
  sample_rate: 44100
  channels: mono                          # speech-optimized
  loudness:
    target_lufs: -16                      # industry standard (Apple + Spotify)
    tolerance_lu: 1                       # ±1 LU acceptable
    true_peak_dbtp: -1.0                  # max true peak
  max_file_size_mb: 200
  notes: >
    -16 LUFS is the safe universal target. Spotify normalizes to -14 LUFS
    internally but accepts -16. Apple specifies -16 LUFS. Producing at -16
    ensures consistent playback across all platforms.

# ─── PLATFORM DISTRIBUTION MAP ─────────────────────────────────────────────

platforms:

  # ── RSS-BASED PLATFORMS (submit feed URL once, auto-ingest) ────────────

  spotify:
    method: rss_ingestion
    submission_url: "https://podcasters.spotify.com"
    submit_once: true                     # submit RSS URL once per show
    auto_ingest: true                     # new episodes auto-appear
    crawl_frequency: "~hourly (varies)"
    ping_supported: false
    audio_accepted: [mp3, wav, m4a]
    bitrate_recommended: "160 kbps"
    loudness_normalized_to: -14           # Spotify's internal target
    artwork: "1400x1400 to 3000x3000, JPEG/PNG"
    notes: >
      No upload API. RSS-only for episode delivery.
      Spotify normalizes audio to -14 LUFS internally.
      Our -16 LUFS output is fine — Spotify will normalize up slightly.

  apple_podcasts:
    method: rss_ingestion
    submission_url: "https://podcasters.apple.com"
    submit_once: true
    auto_ingest: true
    crawl_frequency: "varies (hours to days)"
    ping_supported: false
    audio_accepted: [mp3, aac]            # AAC preferred by Apple
    bitrate_recommended: "96-128 kbps mono"
    loudness_target: "-16 LUFS ±1 dB"
    true_peak_max: "-1 dB FS"
    artwork: "1400x1400 to 3000x3000, JPEG/PNG, RGB, 72 dpi"
    notes: >
      No upload API for free podcasts. RSS-only.
      Overcast and Castro auto-index from Apple — listing here
      gets you on both automatically within 1-2 days.

  youtube_podcasts:
    method: rss_ingestion                 # OR YouTube Data API v3
    submission_url: "YouTube Studio > Create > New Podcast > Submit RSS"
    submit_once: true
    auto_ingest: true                     # creates static-image videos from audio
    alternative_method: youtube_data_api_v3
    api_upload_quota: "~6 uploads/day (default 10,000 units, 1,600 per upload)"
    notes: >
      Two paths: (1) RSS ingestion — YouTube auto-creates videos with static artwork.
      (2) YouTube Data API — upload video files directly (for custom visuals).
      RSS ingestion is simpler. API is for video podcast variants (pt-BR, en-US).
      No ads allowed in RSS-ingested content (host-read sponsorships OK).

  amazon_music:
    method: rss_ingestion
    submission_url: "https://podcasters.amazon.com/submit-rss"
    submit_once: true
    auto_ingest: true
    audio_accepted: [mp3]
    artwork: "1400x1400 to 3000x3000, JPEG/PNG"

  iheart:
    method: rss_ingestion
    submission_url: "https://podcasters.iheart.com"
    submit_once: true
    auto_ingest: true
    approval_time: "up to 14 days"
    geographic_restriction: "US, CA, MX, AU, NZ only"
    artwork: "1400x1400+, JPEG/PNG"

  pocket_casts:
    method: rss_ingestion
    submission_url: "https://pocketcasts.com/submit"
    submit_once: true
    auto_ingest: true
    indexing_time: "up to 12 hours"

  deezer:
    method: rss_ingestion
    submission_url: "https://podcasters.deezer.com"
    submit_once: true
    auto_ingest: true
    crawl_frequency: daily
    audio_accepted: [mp3, flac, wav]      # NOT m4a (may cause disabling)
    artwork: "1400x1400, PNG"
    inactivity_policy: "stops checking after 180 days of no new episodes"
    notes: "Important for fr-FR market. French company, strong local presence."

  kkbox:
    method: rss_ingestion
    submission_url: "https://podcast.kkbox.com/podcasters"
    submit_once: true
    auto_ingest: true
    crawl_frequency: hourly
    notes: "Important for zh-TW market."

  ivoox:
    method: rss_ingestion
    submission_url: "https://ivoox.com/upload-podcast_u.html"
    submit_once: true
    auto_ingest: true
    notes: >
      Key platform for es-ES market. Integrated with Spotify Open Access
      as of March 2025. Also provides hosting.

  noice:
    method: rss_ingestion                 # OR dashboard upload
    submission_url: "https://studio.noice.id"
    submit_once: true
    auto_ingest: true                     # RSS feed import supported
    audio_accepted: [mp3]
    max_file_size_mb: 500
    artwork: "800x800 to 2500x2500, max 2 MB"
    notes: "Key platform for id-ID market. RSS import + manual upload both work."

  podbbang:
    method: rss_ingestion                 # ingests RSS feeds
    notes: >
      Key platform for ko-KR market (~70% domestic share).
      Ingests RSS feeds. Exact submission process requires Korean-language
      account setup. Spotify-Naver partnership (late 2025) may provide
      additional distribution path.

  # ── DIRECT UPLOAD PLATFORMS (no RSS, must upload per episode) ──────────

  ximalaya:
    method: direct_upload                 # NOT RSS
    upload_url: "https://www.ximalaya.com"
    api_available: false                  # no public API
    requires:
      - "Chinese phone number or passport for account"
      - "Platform-hosted content (no external links)"
      - "内容审核 (content review) per CAC regulations"
      - "AI-generated audio must be labeled (March 2025 rule)"
      - "Psychology content requires formal credentials (Oct 2025)"
    upload_process: "web dashboard upload per episode"
    automation: >
      No API. Consider browser automation (Playwright/Selenium) or
      explore Xiaoyuzhou (小宇宙) which accepts RSS as alternative.
    notes: >
      zh-CN ONLY platform. 303M MAU, 73% market share.
      Most complex distribution — manual or semi-automated only.
      Xiaoyuzhou (Cosmos) accepts RSS and is a viable alternative
      for reaching Chinese podcast listeners.

  # ── HOSTING PROVIDERS WITH APIs (optional intermediary layer) ──────────

  hosting_providers_with_api:
    notes: >
      We self-host on R2, but these providers offer APIs if we want
      managed distribution, analytics, or dynamic ad insertion later.

    transistor_fm:
      api_quality: "BEST — clean S3 presigned URL workflow"
      auth: "API key via x-api-key header"
      upload_flow:
        - "GET /v1/episodes/authorize_upload?filename=X → presigned S3 URL"
        - "PUT audio file to presigned upload_url"
        - "POST /v1/episodes with show_id + audio_url"
        - "PATCH /v1/episodes/:id/publish"
      rate_limit: "10 requests per 10 seconds"
      docs: "https://developers.transistor.fm/"

    spreaker:
      api_quality: "EXCELLENT — widest format support"
      auth: "OAuth 2.0 Bearer token"
      upload_flow:
        - "POST /v2/shows/{SHOW_ID}/episodes with title + media_file"
      formats: [mp3, mp4, wav, flac, ogg, aac, wma, 3gp, amr, ra, asf]
      docs: "https://developers.spreaker.com/api/"

    buzzsprout:
      api_quality: "GOOD — simple token auth"
      auth: "Token token=YOUR_TOKEN"
      upload_flow:
        - "POST /api/{podcast_id}/episodes.json with audio_url or audio_file"
      docs: "https://github.com/buzzsprout/buzzsprout-api"

    podbean:
      api_quality: "GOOD — OAuth 2.0, 3-step"
      auth: "OAuth 2.0"
      upload_flow:
        - "Get access token"
        - "Upload audio → receive media_key"
        - "Publish episode with media_key"
      docs: "https://developers.podbean.com/podbean-api-docs/"

    libsyn:
      api_quality: "FTP ONLY — no REST API"
      upload_method: "FTP/FTPS to ftp.libsyn.com"
      path: "/{show-slug}/dropbox/"
      notes: "Upload via FTP, publish via dashboard. Semi-automated."

# ─── PLATFORM-PER-LOCALE MATRIX ────────────────────────────────────────────

locale_platform_map:
  en-US: [spotify, apple_podcasts, youtube_podcasts, amazon_music, iheart, pocket_casts]
  es-US: [spotify, apple_podcasts, amazon_music]
  es-ES: [spotify, apple_podcasts, ivoox, deezer]
  fr-FR: [spotify, apple_podcasts, deezer]
  de-DE: [spotify, apple_podcasts, amazon_music]  # audible_de via separate path
  it-IT: [spotify, apple_podcasts, deezer]
  hu-HU: [spotify, apple_podcasts]
  ja-JP: [spotify, apple_podcasts, amazon_music, youtube_podcasts]
  ko-KR: [spotify, podbbang, apple_podcasts]  # naver_audio_clip TBD
  zh-TW: [spotify, apple_podcasts, kkbox]  # soundon/firstory for hosting if needed
  zh-HK: [spotify, apple_podcasts]
  zh-CN: [ximalaya]                       # xiaoyuzhou as RSS alternative
  zh-SG: [spotify, apple_podcasts]
  id-ID: [spotify, noice, apple_podcasts]  # expansion market
  pt-BR: [spotify, youtube_podcasts, deezer, apple_podcasts]  # video-first

# ─── SUBMISSION WORKFLOW ────────────────────────────────────────────────────

submission_workflow:
  one_time_setup:
    description: "Do once per show (brand × locale × series)"
    steps:
      - "Generate RSS feed XML with show metadata"
      - "Upload show artwork to R2"
      - "Upload RSS feed to R2"
      - "Submit RSS URL to each platform in locale_platform_map"
      - "Wait for approval (Apple: hours-days, iHeart: up to 14 days)"
      - "Record show IDs per platform in show_registry"

  per_episode:
    description: "Do each time a new episode publishes"
    steps:
      - "Render episode MP3 (TTS + music + mix + normalize)"
      - "Set ID3 tags"
      - "Upload MP3 to R2"
      - "Regenerate RSS feed XML with new <item>"
      - "Upload updated feed.xml to R2"
      - "RSS platforms auto-ingest within hours"
      - "For zh-CN: manual upload to Ximalaya"

  automation_level:
    rss_platforms: "FULLY AUTOMATED — update feed, platforms crawl"
    ximalaya: "MANUAL or PLAYWRIGHT AUTOMATION"
    youtube_api: "SCRIPTABLE via YouTube Data API (for video variants)"

# ─── RELEASE CADENCE + ANTI-SPAM RULES ─────────────────────────────────────
#
# Research-backed cadence rules. Authority: Pearl_Research 2026-04-09.
# Key finding: NO platform penalizes batch uploads of unique content.
# The risk is strategic (lost chart momentum), not technical (spam flags).

cadence_rules:

  # ── RSS CRAWL FREQUENCIES ─────────────────────────────────────────────────

  platform_crawl_frequency:
    youtube:        "every ~5 minutes"
    spotify:        "every ~5-7 minutes (episode appears within hours, up to 24h)"
    apple_podcasts: "every ~2.1 hours average (adaptive — less for dormant feeds)"
    amazon_music:   "12-24 hours"
    overcast:       "every ~4 minutes (supports WebSub/Podping)"
    deezer:         "daily"
    kkbox:          "hourly"
    notes: >
      Spotify and Apple do NOT support WebSub/Podping — they poll on
      their own schedule. YouTube is fastest (5 min). Amazon is slowest.
      Practical implication: publish to RSS at least 24h before the
      intended listener-facing release date to ensure all platforms have it.

  # ── UPLOAD LIMITS (anti-spam) ─────────────────────────────────────────────

  platform_upload_limits:
    spotify:
      hard_limit: null                    # no published cap
      spam_triggers:
        - "mass publishing identical/indistinguishable content"
        - "duplicate audio fingerprints"
        - "SEO-stuffing titles"
        - "mass uploads from new/unverified accounts"
      safe: >
        10 unique episodes at once is fine. Spotify removed 75M spam
        tracks in Sept 2025 but targets duplicates, not legitimate volume.
    apple_podcasts:
      hard_limit: null
      notes: "No documented frequency limit. RSS crawl is adaptive."
    youtube_api:
      hard_limit: "6 uploads/day (default 10,000 unit quota, 1,600/upload)"
      quota_increase: "available via Google audit process"
    amazon_music:
      hard_limit: "10 podcasts per account profile"
      per_episode_limit: null
    ximalaya:
      hard_limit: "unknown — no English documentation"

  # ── RECOMMENDED RELEASE CADENCE ───────────────────────────────────────────

  recommended_cadence:

    standard_episode:
      primary: weekly                     # industry consensus for wellness
      rationale: >
        Weekly is the consensus winner. 46% of all podcasts publish weekly.
        Weekly gives 10 separate discovery opportunities per season vs 1
        for batch. Apple charts favor shows with steady new-follower signals
        over 24-72h windows — weekly maximizes chart shots.

    micro_episode:
      primary: daily                      # for podcast_short format
      rationale: >
        Daily micro-episodes (2-5 min) work for meditation brands.
        Headspace Radio publishes weekdays. Daily Calm publishes daily.
        High completion rates offset frequency concerns.

    season_launch:
      strategy: hybrid                    # 2-3 episodes at launch, then weekly
      launch_batch: 3                     # give new listeners enough to binge
      then: weekly                        # drip remaining 7+ episodes
      rationale: >
        Hybrid model: drop 2-3 episodes on launch day (enough to hook),
        then weekly drip. Recommended by podcast growth consultants.
        Gets binge benefit + sustained chart presence.

    batch_release_full_season:
      allowed: true                       # no platform blocks it
      recommended: false                  # strategically inferior
      rationale: >
        One discovery moment vs 10. Kills weekly chart momentum.
        No recurring listener habit formed. Top wellness podcasts
        (Huberman, Jay Shetty, 10% Happier) all drip weekly.

  # ── FREQUENCY → ENGAGEMENT TRADEOFF ──────────────────────────────────────

  frequency_data:
    daily:
      per_episode_downloads: lower        # ~500/episode (diluted)
      total_weekly_downloads: comparable  # volume compensates
      listener_churn: higher
      sustainable: "only for well-resourced teams or micro-format"
    three_per_week:
      per_episode_downloads: moderate
      listener_retention: "70% prefer multi-weekly shows but completion drops"
    weekly:
      per_episode_downloads: highest      # ~2,000/episode for same audience
      listener_retention: highest
      chart_performance: best
    biweekly:
      per_episode_downloads: "comparable to weekly"
      notes: "works for 45+ min episodes where listeners need digest time"

  # ── OPTIMAL DURATION BY PLATFORM ──────────────────────────────────────────

  optimal_duration:
    spotify:
      sweet_spot_min: [15, 25]            # highest completion (73% under 30 min)
      notes: "Under 30 min shows highest retention on Spotify"
    apple_podcasts:
      sweet_spot_min: [20, 40]
      notes: "Completion rate is a ranking signal — shorter = higher completion = better rank"
    youtube:
      sweet_spot_min: [20, 40]
      critical_warning: >
        Static-image podcast uploads lose 90-95% of audience within 90 seconds.
        YouTube algorithm interprets this as poor content. MUST have video
        (faces, movement, visuals) or at minimum animated waveform + dynamic text.
      notes: >
        Long-form (30+ min) seeing 35-45% better promotion in 2025-2026.
        Chapter markers increase completion by 33%.
    general_wellness:
      micro: [5, 15]                      # daily meditation/affirmation
      standard: [15, 25]                  # weekly therapeutic episode
      deep_dive: [25, 40]                 # interview or multi-topic

  # ── ALGORITHM SIGNALS (what platforms reward) ─────────────────────────────

  algorithm_signals:
    spotify:
      rewards:
        - "consistent 6-8 week release schedule (3x algorithmic placement)"
        - "high completion rate"
        - "first 72 hours after release are critical"
    apple_podcasts:
      rewards:
        - "new followers gained in last 24-72 hours (chart driver)"
        - "completion rate (weighted more heavily in 2026)"
        - "regular publishing schedule"
      does_not_affect_charts:
        - "ratings and reviews (Apple confirmed)"
    youtube:
      rewards:
        - "retention rate (70% retention beats high views with 10% retention)"
        - "long-form conversation content (30+ min, 35-45% more promotion)"
        - "chapter markers (+33% completion)"
      penalizes:
        - "static image uploads (90-95% drop in 90s)"
        - "low engagement regardless of view count"

# ─── PHOENIX PODCAST VELOCITY CAPS ─────────────────────────────────────────
#
# Mirrors config/release_velocity/safe_velocity.yaml for books.
# Conservative caps to avoid platform friction during ramp-up.

podcast_velocity:
  phase_1_pilot:
    duration_weeks: 12
    episodes_per_brand_per_week: 1        # weekly drip
    max_brands_active: 3                  # pilot with 3 brands
    total_episodes_per_week: 3
    notes: "Pilot phase. 1 brand × 1 series × weekly. Validate pipeline."

  phase_2_expansion:
    duration_weeks: 24
    episodes_per_brand_per_week: 1
    max_brands_active: 10
    total_episodes_per_week: 10
    micro_episodes_per_brand_per_week: 5  # daily podcast_short for meditation brands
    notes: "Expand to 10 brands. Add daily micro-episodes for Sleep Repair."

  phase_3_full_scale:
    duration_weeks: null                  # ongoing
    episodes_per_brand_per_week: 1
    max_brands_active: 37                 # all brands
    total_episodes_per_week: 37
    micro_episodes_per_brand_per_week: 5
    notes: >
      Full scale. 37 brands × weekly episodes. Platform caps not a concern
      for podcasts (unlike books where Ximalaya caps at 10/week).
      YouTube API quota may need increase if producing video variants
      for all brands (6/day default = 42/week, sufficient for 37 brands).
