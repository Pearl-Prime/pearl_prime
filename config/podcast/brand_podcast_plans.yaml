# Brand Podcast Plans — Per-Market Configuration
# Authority: Pearl_Architect
# Maps each market lane to podcast production parameters.
#
# RULE: Each plan derives from locale_registry.yaml (distribution),
# brand_archetype_registry.yaml (brand identity), and tts/engines.yaml (voice).
# Podcast is a render format — same atoms, same arcs, different output.

schema_version: 1

# ─── GLOBAL DEFAULTS ─────────────────────────────────────────────────────────

defaults:
  format: podcast_episode
  episode_length_min: 18                  # target: 18 minutes
  release_cadence: weekly
  tts_provider: elevenlabs
  tts_model: eleven_multilingual_v2
  music_style: ambient
  rss_distribution: true
  video_variant: false                    # set true for markets with video demand
  episodes_per_series: 10                 # ~10 chapters per book average
  series_per_brand_year: 4               # 4 books/seasons per brand per year

# ─── MARKET PLANS ────────────────────────────────────────────────────────────

markets:

  # ── TIER 1: LAUNCH FIRST ──────────────────────────────────────────────────

  es_latam:
    locale: es-US                         # neutral LATAM Spanish
    priority_rank: 1
    platforms: [spotify, apple_podcasts, amazon_music]
    format: [podcast_episode, podcast_short]
    episode_length_min: 20
    release_cadence: twice_weekly
    content_framing: >
      Bienestar y desarrollo personal. Not clinical — growth and healing journey.
      "Crecimiento interior" framing. Mexico-neutral accent.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: es-US
      voice_gender: female                # warm, conversational
      notes: "Neutral LATAM Spanish. Avoid Castilian markers."
    music_style: ambient                  # warm ambient, Latin-influenced subtle
    monetization: free_with_ads           # Spotify ad insertion
    series_per_brand_year: 6
    episodes_per_series: 10
    estimated_total_episodes_year: 60     # per brand
    estimated_audio_hours_year: 18
    video_variant: false
    special_requirements:
      - "Spotify dominates 90% — optimize for Spotify discovery"
      - "Consider Spotify-exclusive early access window"
      - "MX neutral Spanish; avoid country-specific slang"

  pt_br:
    locale: pt-BR                         # not in locale_registry yet — expansion
    priority_rank: 2
    platforms: [spotify, youtube_podcasts, deezer, apple_podcasts, amazon_music]
    format: [podcast_episode, podcast_short]
    episode_length_min: 22
    release_cadence: weekly
    content_framing: >
      Saude mental, autoconhecimento, bem-estar, inteligencia emocional.
      Warm storytelling. Humor accepted (see: E Noia Minha? format).
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: pt-BR
      voice_gender: female
      notes: "Brazilian Portuguese. Natural, warm, conversational."
    music_style: ambient
    monetization: free_with_ads
    series_per_brand_year: 4
    episodes_per_series: 10
    estimated_total_episodes_year: 40
    estimated_audio_hours_year: 15
    video_variant: true                   # REQUIRED — Brazil is video-first
    special_requirements:
      - "Video podcast ESSENTIAL — YouTube + Spotify video"
      - "pt-BR not yet in locale_registry — add before launch"
      - "Video format: static branded image + waveform animation acceptable"
      - "Consider YouTube-first strategy (37% share)"

  en_us:
    locale: en-US
    priority_rank: 3
    platforms: [youtube_podcasts, spotify, apple_podcasts, amazon_music, iheart]
    format: [podcast_episode, podcast_short]
    episode_length_min: 20
    release_cadence: weekly
    content_framing: >
      Normalized therapy culture. Science-backed, conversational, warm.
      Aspirational self-improvement framing. Direct clinical language ok.
    voice_strategy:
      primary_provider: elevenlabs
      voice_id: Rachel                    # current default voice
      voice_gender: female
      notes: "Warm, intimate, peer-to-peer. Not clinical."
    music_style: ambient
    monetization: free_with_ads
    series_per_brand_year: 6
    episodes_per_series: 10
    estimated_total_episodes_year: 60
    estimated_audio_hours_year: 20
    video_variant: true                   # YouTube is #1 platform
    special_requirements:
      - "YouTube is dominant platform (37.7%) — video variant essential"
      - "Saturated market — differentiation through production quality"
      - "Apple Podcasts Subscriptions for premium episodes"
      - "Consider daily podcast_short for meditation brands"

  ko_kr:
    locale: ko-KR
    priority_rank: 4
    platforms: [spotify, podbbang, naver_audio_clip, apple_podcasts, kakao_page]
    format: [podcast_episode, podcast_short]
    episode_length_min: 18
    release_cadence: weekly
    content_framing: >
      힐링 (healing) framing. Warm, narrative-driven, personal storytelling.
      Burnout, perfectionism, social anxiety highly relevant.
      Avoid clinical therapy language with older audiences.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: ko-KR
      voice_gender: female
      notes: "Warm, empathetic. Natural Korean prosody critical."
    music_style: ambient                  # K-healing aesthetic, clean ambient
    monetization: free_with_ads
    series_per_brand_year: 4
    episodes_per_series: 10
    estimated_total_episodes_year: 40
    estimated_audio_hours_year: 12
    video_variant: false
    special_requirements:
      - "Podbbang upload required (70% domestic share)"
      - "Naver Audio Clip integration (Spotify-Naver partnership)"
      - "Webtoon crossover potential — explore manga→podcast path"
      - "빨리빨리 culture → consider shorter episodes (15 min)"
      - "Massive whitespace in wellness podcasting"

  ja_jp:
    locale: ja-JP
    priority_rank: 5
    platforms: [spotify, apple_podcasts, amazon_music, youtube_podcasts]
    format: [podcast_episode, podcast_short]
    episode_length_min: 15
    release_cadence: weekly
    content_framing: >
      Frame as 自律神経 (autonomic nervous system) regulation, リラクゼーション,
      NOT メンタルヘルス. Indirect, gentle, practical. Shinrin-yoku, zen,
      mindfulness framing. Avoid therapy-speak entirely.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: ja-JP
      voice_gender: female
      notes: "丁寧語 (teineigo) REQUIRED. Soft, calm, polite register."
    music_style: ambient                  # nature sounds, onsen, lo-fi
    monetization: free_with_ads
    series_per_brand_year: 4
    episodes_per_series: 8                # shorter series (Japan prefers concise)
    estimated_total_episodes_year: 32
    estimated_audio_hours_year: 8
    video_variant: false
    special_requirements:
      - "High production quality expected — invest in audio polish"
      - "ASMR-adjacent quality for practice segments"
      - "Politeness register non-negotiable"
      - "Shorter episodes (15 min) — Japan commute culture"
      - "Massive whitespace — no major wellness podcast exists"
      - "Audible JP is separate market worth exploring"

  # ── TIER 2: LAUNCH SECOND ─────────────────────────────────────────────────

  id_id:
    locale: id-ID                         # not in locale_registry — expansion
    priority_rank: 6
    platforms: [spotify, noice, apple_podcasts]
    format: [podcast_episode]
    episode_length_min: 20
    release_cadence: weekly
    content_framing: >
      Kesehatan mental, self-improvement. Inclusive, narrative-driven.
      Stigma reduction is an active cultural theme.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: id-ID
      notes: "Natural Bahasa Indonesia. Warm, inclusive."
    music_style: ambient
    monetization: free_with_ads
    series_per_brand_year: 3
    episodes_per_series: 10
    estimated_total_episodes_year: 30
    estimated_audio_hours_year: 10
    video_variant: false
    special_requirements:
      - "id-ID not in locale_registry — add before launch"
      - "Noice platform upload required (local leader)"
      - "Gen-Z primary audience"
      - "Highest engagement rate globally (59% listen 1+ hr/week)"

  de_de:
    locale: de-DE
    priority_rank: 7
    platforms: [spotify, apple_podcasts, amazon_music, audible_de, podimo]
    format: [podcast_episode]
    episode_length_min: 22
    release_cadence: weekly
    content_framing: >
      Evidence-based, science-grounded. Stressbewältigung, Burnout, Achtsamkeit.
      Secular nervous-system/neuroscience angle. NO spiritual framing.
      Credentialed (Dr./Prof.) positioning preferred.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: de-DE
      voice_gender: female
      notes: "Structured, warm but not overly casual. Professional."
    music_style: minimal                  # less ambient than other markets
    monetization: premium_subscription    # Podimo + Audible exclusives viable
    series_per_brand_year: 4
    episodes_per_series: 10
    estimated_total_episodes_year: 40
    estimated_audio_hours_year: 15
    video_variant: false
    special_requirements:
      - "Audible DE exclusive market worth exploring"
      - "Podimo premium tier (1M+ subscribers)"
      - "Science credibility CRITICAL — cite research in episodes"
      - "Evidence-based framing non-negotiable"

  es_es:
    locale: es-ES
    priority_rank: 8
    platforms: [spotify, ivoox, apple_podcasts]
    format: [podcast_episode]
    episode_length_min: 20
    release_cadence: weekly
    content_framing: >
      Bienestar, desarrollo personal. Castilian Spanish distinct from LATAM.
      Video podcast growing fast (70% increase). Wellness category is open.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: es-ES
      notes: "Castilian Spanish (vosotros, c/z distinction)."
    music_style: ambient
    monetization: free_with_ads
    series_per_brand_year: 4
    episodes_per_series: 10
    estimated_total_episodes_year: 40
    estimated_audio_hours_year: 13
    video_variant: true                   # 2nd fastest-growing EU video podcast
    special_requirements:
      - "iVoox integration with Spotify Open Access (March 2025)"
      - "Castilian content identity — do NOT mix with LATAM"
      - "Video podcast variant for YouTube Spain"
      - "86% recurrent listeners — high engagement market"

  fr_fr:
    locale: fr-FR
    priority_rank: 9
    platforms: [apple_podcasts, spotify, deezer]
    format: [podcast_episode]
    episode_length_min: 25
    release_cadence: weekly
    content_framing: >
      Développement personnel. Intellectual, philosophical framing accepted.
      Stoic/existentialist alongside somatic approaches. Expert-backed, curious.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: fr-FR
      voice_gender: female
      notes: "Warm, intellectually curious tone."
    music_style: ambient
    monetization: free_with_ads
    series_per_brand_year: 4
    episodes_per_series: 10
    estimated_total_episodes_year: 40
    estimated_audio_hours_year: 17
    video_variant: false
    special_requirements:
      - "Deezer is local champion — ensure distribution"
      - "Longer episodes (25 min) — French prefer long-form"
      - "Philosophical framing is a differentiator"
      - "BD audio crossover potential for future exploration"

  # ── TIER 3: LAUNCH LATER ──────────────────────────────────────────────────

  zh_cn:
    locale: zh-CN
    priority_rank: 10
    platforms: [ximalaya, xiaoyuzhou, apple_podcasts]
    format: [podcast_episode]
    episode_length_min: 25
    release_cadence: weekly
    content_framing: >
      个人成长 (personal growth), 情绪管理 (emotional management).
      身心灵 (mind-body-spirit) frame. NOT clinical therapy.
      Sleep aids, meditation, stress management.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: zh-CN
      evaluate_alternative: cosyvoice2    # evaluate for Chinese quality
      notes: "Mandarin (Putonghua). Warm, calming. Sleep content tone."
    music_style: ambient                  # 古风 (classical Chinese) ambient option
    monetization: zhishifufei             # 知识付费 model on Ximalaya
    pricing_rmb: "99-199 per series"
    series_per_brand_year: 4
    episodes_per_series: 12               # longer series for paid content
    estimated_total_episodes_year: 48
    estimated_audio_hours_year: 20
    video_variant: false
    rss_distribution: false               # NOT RSS — platform-specific upload
    special_requirements:
      - "NOT RSS — Ximalaya direct upload required"
      - "Chinese phone/passport required for creator account"
      - "内容审核 (content review) — all audio reviewed by platform"
      - "Since Oct 2025: psychology content requires formal credentials"
      - "AI-generated audio MUST be labeled per March 2025 regulations"
      - "知识付费 model: RMB 99-199/series, 50-70% revenue share"
      - "Peak listening: before sleep (38%) — optimize for nighttime"
      - "Findaway NOT available — see locale_registry distribution_rules"

  zh_tw:
    locale: zh-TW
    priority_rank: 11
    platforms: [spotify, apple_podcasts, kkbox, soundon, firstory]
    format: [podcast_episode]
    episode_length_min: 20
    release_cadence: weekly
    content_framing: >
      身心靈 framing, influenced by Japanese self-care culture.
      Conversational, casual tone. NOT lecture-style 知識付費.
      Warm, peer-to-peer. Therapy stigma lower than Mainland.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: zh-TW
      notes: "Taiwan Mandarin flavor. Warm, casual."
    music_style: ambient
    monetization: free_with_ads
    series_per_brand_year: 3
    episodes_per_series: 10
    estimated_total_episodes_year: 30
    estimated_audio_hours_year: 10
    video_variant: false
    special_requirements:
      - "Standard RSS distribution works (via SoundOn/Firstory)"
      - "Content distinctly different from zh-CN — never mix"
      - "竹科 tech worker commute audience"
      - "KKBOX distribution (local music/audio platform)"

  hu_hu:
    locale: hu-HU
    priority_rank: 12
    platforms: [spotify, apple_podcasts]
    format: [podcast_episode]
    episode_length_min: 18
    release_cadence: weekly
    content_framing: >
      Wellness and self-development framing. NOT clinical mental health.
      Higher stigma than Western Europe. Self-improvement angle.
    voice_strategy:
      primary_provider: elevenlabs        # MANDATORY — Google has no hu-HU Neural2
      voice_locale: hu-HU
      notes: "ElevenLabs only. Google Neural2 not available for Hungarian."
    music_style: ambient
    monetization: free_with_ads
    series_per_brand_year: 2
    episodes_per_series: 8
    estimated_total_episodes_year: 16
    estimated_audio_hours_year: 5
    video_variant: false
    special_requirements:
      - "ElevenLabs ONLY — no Google Neural2 for hu-HU"
      - "Tiny market (70+ total podcasts) but total whitespace"
      - "Low production volume — test market for pipeline validation"
      - "Wellness category completely open"

  zh_hk:
    locale: zh-HK
    priority_rank: 13                     # lowest — small Cantonese market
    platforms: [apple_podcasts, spotify]
    format: [podcast_episode]
    episode_length_min: 18
    release_cadence: biweekly             # slower cadence for small market
    content_framing: >
      Bilingual wellness. Mixes Western therapy + Chinese traditions.
      Cantonese-dominant local content.
    voice_strategy:
      primary_provider: elevenlabs
      voice_locale: zh-HK
      notes: "Cantonese voice required. yue-HK TTS."
    music_style: ambient
    monetization: free_with_ads
    series_per_brand_year: 2
    episodes_per_series: 8
    estimated_total_episodes_year: 16
    estimated_audio_hours_year: 5
    video_variant: false
    special_requirements:
      - "Cantonese TTS required (not Mandarin)"
      - "Very small addressable market"
      - "Low priority — consider bundling with zh-TW distribution"

# ─── PRODUCTION TOTALS ───────────────────────────────────────────────────────

estimated_totals:
  total_markets: 13
  total_episodes_year_all_markets: ~451   # sum of per-market estimates
  total_audio_hours_year: ~168
  notes: >
    Per-brand estimates. Multiply by number of active brands per market
    for total production volume. With 37 brands × 4 series avg × 10 episodes
    = 1,480 episodes/year at full scale. Phased rollout recommended.

# ─── PILOT PLAN ──────────────────────────────────────────────────────────────

pilot:
  market: es_latam                        # #1 priority market
  brand: stillness_press                  # anchor brand
  topic: anxiety                          # highest-demand topic
  persona: millennial_women_professionals # largest persona segment
  series: "The Room Full of People"       # from series_templates: social_anxiety_arc
  episodes: 10
  format: podcast_episode
  tts_voice: elevenlabs_es_us_female
  release_cadence: weekly
  launch_target: "pilot validation phase"
  success_metrics:
    - "10 complete episodes assembled from existing atoms"
    - "RSS feed generated and validated"
    - "Submitted to Spotify and Apple Podcasts"
    - "Average episode length within 15-25 min range"
    - "Loudness meets -16 LUFS target"
    - "Brand intro/outro music generated"
