# config/practice/validation.yaml
# Schema and safety checks for practice items. Used by normalize + validate scripts and practice_safety_lint.
#
# Schema versioning per specs/PRACTICE_ITEM_SCHEMA.md §5:
#   v1 (legacy) — `blocks` field only; `components` absent/null
#   v2 (current) — `components` field added (5-slot × {full, lean}); `blocks` retained for back-compat
# Cap entry EXERCISE-COMPONENT-SCHEMA-LIFT-01 (2026-06-10) introduces v2.

version: 2

required_top_level_fields:
  - practice_id
  - source
  - content_type
  - duration_seconds
  - text
  - version

# Per-version additional requirements
required_top_level_fields_by_schema_version:
  1:
    - blocks
  2:
    # v2 retains blocks for back-compat AND requires components for non-manual sources
    - blocks
    - components

# When source ∈ {library_34, ab_tady_37} at schema version 2,
# `components` must be non-null with full 5-slot × {full, lean} shape.
# When source == manual at any version, `components` may be null (legacy escape hatch).
components_required_for_sources:
  - library_34
  - ab_tady_37

enums:
  source:
    - library_34
    - ab_tady_37
    - manual
  content_type:
    - affirmations
    - body_awareness
    - gratitude_practices
    - integration_bridges
    - meditations
    - reflections
    - self_inquiry
    - sensory_grounding
    - thought_experiments
    - breath_regulation
    - grounding_orientation
    - body_awareness_scan
    - somatic_release_discharge
    - nervous_system_downregulation
    - nervous_system_upregulation
    - vagal_stimulation_sound
    - self_contact_touch
    - emotional_processing_completion
    - embodied_intention_direction
    - integration_return_to_baseline
  schema_version:
    - 1
    - 2

duration_seconds:
  min: 30
  max: 1200

text:
  min_chars: 120
  max_chars: 12000

# v2 components schema enforcement (per specs/PRACTICE_ITEM_SCHEMA.md §2.5)
components_schema:
  enabled: true
  required_slots:
    - bridge
    - intro
    - description
    - aha
    - integration
  required_variants:
    - full
    - lean
  # Per-slot prose-length caps (chars; whitespace-normalized; lean expected to be ~1/3 of full)
  slot_char_limits:
    bridge:
      full: { min: 80, max: 400 }
      lean: { min: 20, max: 120 }
    intro:
      full: { min: 80, max: 500 }
      lean: { min: 20, max: 120 }
    description:
      full: { min: 120, max: 1200 }
      lean: { min: 40, max: 400 }
    aha:
      full: { min: 80, max: 700 }
      lean: { min: 30, max: 250 }
    integration:
      full: { min: 60, max: 500 }
      lean: { min: 20, max: 200 }
  # tts_rhythm + banned_phrases checks apply to every component string independently
  apply_safety_lint_per_slot: true
  apply_tts_rhythm_per_slot: true

banned_phrases:
  - "cure"
  - "guarantee"
  - "diagnose"
  - "treat"
  - "medication"
  - "doctor"
  - "therapy will"
  - "this will fix"
  - "you will be healed"
  - "always works"
  - "never fail"
  - "instant results"
  - "stop taking"
  - "replace your medication"
  - "ignore your doctor"

tts_rhythm:
  enabled: true
  max_avg_sentence_words_warn: 18
  max_long_sentence_ratio_fail: 0.30
  max_questions_per_item_fail: 4

optional_fields:
  intensity_band:
    min: 1
    max: 5
  allowed_topics:
    max_items: 2000
  allowed_personas:
    max_items: 2000
  tags:
    max_items: 50
