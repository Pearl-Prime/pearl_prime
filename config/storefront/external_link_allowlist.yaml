# config/storefront/external_link_allowlist.yaml
#
# Per PEARL_PRIME_STOREFRONT_V1_SPEC.md §14.5 + §AMENDMENT-2026-06-04.3 §14.
#
# Curated allow-list of legitimate non-CTA external links that pass the
# `scripts/ci/check_external_buy_links.py` guard.
#
# Use cases (legitimate, NOT paid-content CTAs):
#   - Brand-bio "Find us on Spotify Podcasts" discovery links (content marketing
#     surface — NOT a buy-now CTA)
#   - "Follow on TikTok / Twitter / Instagram" social profile discovery
#   - Documentation source citations (e.g., "per KDP docs at kdp.amazon.com" in
#     marketing strategy research artifacts — pure citation, not a CTA the
#     reader is asked to act on)
#   - Database schema or column-name examples that reference platform names
#     (e.g., `platform ENUM('bookwalker','amazon_jp','line_pay')` in
#     LINE handoff docs — not a URL CTA, just a column-value example)
#
# Use cases that are NEVER allowed (these unify to storefront, no exceptions):
#   - "Buy on Amazon" / "Get on Audible" / "Buy on Kobo" / "Read on WEBTOON"
#   - Amazon, Audible, Kobo, Apple Books, Google Play, WEBTOON, Honto,
#     BookWalker, cmoa.jp, audible.co.jp, amzn.to, geni.us affiliate links
#     pointed at *our* paid content
#
# Schema (each entry):
#   - file_path:   <repo-relative path; required>
#     line_no:     <integer; optional — if present, allows only that line>
#     matched_url: <exact URL substring or regex; required>
#     reason:      <human-readable justification; required>
#     added_by:    <operator handle / Pearl_PM / Pearl_Marketing>
#     added_at:    <ISO date>
#
# Initial state: EMPTY. Operator extends as legitimate non-CTA external links
# are identified during sweep.

schema_version: 1
last_updated: '2026-06-06'

allowlist: []
