# Brand Admin Handoff Configuration
# ====================================
# Controls the weekly per-brand handoff packet generation.
# Used by scripts/release/export_brand_admin_data.py
# and brand-wizard-app/public/brand_handoff_dashboard.html

version: "1.0"

# ---------------------------------------------------------------------------
# Weekly schedule
# ---------------------------------------------------------------------------
schedule:
  generation_day: "MON"          # Packets built first thing Monday
  delivery_window_hours: 4       # Admin must receive within 4h of generation
  upload_deadline_day: "WED"     # Target: all titles uploaded by Wednesday
  review_cadence_days: 7

# ---------------------------------------------------------------------------
# Output paths
# ---------------------------------------------------------------------------
output:
  base_dir: "artifacts/admin_handoff"
  # Final structure: artifacts/admin_handoff/<YEAR>-W<WW>/<brand_id>/
  files:
    admin_data: "admin_data.json"
    catalog_this_week: "catalog_this_week.csv"
    qa_summary: "qa_summary.json"
    manga_status: "manga_status.json"
    readme: "HANDOFF_README.md"

# ---------------------------------------------------------------------------
# Platform weekly upload caps (mirrors build_admin_packets.py)
# ---------------------------------------------------------------------------
platform_caps:
  google_play: 15
  amazon_kdp: 10
  apple_books: 10
  rakuten_kobo: 5       # Japan/APAC only
  audible: 5
  findaway: 20

# ---------------------------------------------------------------------------
# QA gate health thresholds
# ---------------------------------------------------------------------------
qa_thresholds:
  green_min_pass_rate: 90.0     # ≥90% pass rate → green
  yellow_min_pass_rate: 70.0    # 70–89% → yellow
  # <70% → red
  regression_window_hours: 48   # How far back to scan for regressions

# ---------------------------------------------------------------------------
# Manga handoff settings
# ---------------------------------------------------------------------------
manga:
  include_in_packet: true
  status_fields:
    - chapters_published
    - chapters_in_review
    - chapters_in_production
    - next_publish_date
  asset_cost_estimate: true      # Include GPU cost estimate in packet
  markets_with_manga:
    - japan
    - korea
    - taiwan
    - hong_kong
    - singapore

# ---------------------------------------------------------------------------
# Per-brand overrides
# ---------------------------------------------------------------------------
# brand_overrides:
#   stillness_press:
#     platform_caps:
#       google_play: 10    # Throttle this brand to avoid spam flags
#   digital_ground:
#     manga:
#       include_in_packet: false  # No manga pipeline for this brand yet

# ---------------------------------------------------------------------------
# Admin packet dashboard settings
# ---------------------------------------------------------------------------
dashboard:
  show_top_titles: 5             # Top titles shown in dashboard cards
  show_failing_qa: 3             # Max failing QA items shown per brand
  show_manga_chapters: 3         # Upcoming chapters shown per brand
  enable_download_button: true   # Wire the CSV/JSON download in brand_admin.html
  download_format: "json"        # json | csv | zip

# ---------------------------------------------------------------------------
# Notification stubs (wired via Pearl_PM in future phases)
# ---------------------------------------------------------------------------
notifications:
  enabled: false
  channels:
    - type: "slack"
      webhook_env: "SLACK_WEBHOOK_BRAND_OPS"
      events: ["packet_ready", "regression_detected", "upload_deadline_missed"]
    - type: "email"
      recipients_env: "BRAND_ADMIN_EMAILS"
      events: ["packet_ready"]

# ---------------------------------------------------------------------------
# Known brands (used for --all scope when registry is unavailable)
# ---------------------------------------------------------------------------
brands:
  - stillness_press
  - cognitive_clarity
  - somatic_wisdom
  - qi_foundation
  - digital_ground
  - heart_balance
  - relational_calm
  - warrior_calm
  - sleep_restoration
  - body_memory
  - solar_return
  - devotion_path
  - bright_presence_tw
