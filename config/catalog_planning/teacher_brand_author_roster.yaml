        Vera Osei is a grief doula and somatic therapist. She writes about the
        body's wisdom in loss — what the shoulders know, what the jaw holds,
        what the hips remember. Polyvagal grief without clinical distance.
      portrait_preset: warm_intimate
      cover_style: "Cream gradient, shoulder/spine line illustration, espresso type"

