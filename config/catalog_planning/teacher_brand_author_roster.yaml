      portrait_preset: radiant
      cover_style: "Cream, golden-rose gradient accent, Playfair Display title"

    - author_id: ben_archer
      display_name: "Ben Archer"
      positioning: research_guide
      voice_id: IKne3meq5aSn9XLyUdCD   # Charlie — deep, confident
