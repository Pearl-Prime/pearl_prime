# ═══════════════════════════════════════════════════════════════════════════

clear_seeing_books:
  teacher: kenjin
  author_count: 6

  authors:
    - author_id: ada_park
      display_name: "Ada Park"
      positioning: research_guide
      voice_id: 21m00Tcm4TlvDq8ikWAM   # Rachel — neutral, clean
      voice_settings: { stability: 0.75, similarity_boost: 0.75, style: 0.1 }
      topics: [overthinking, anxiety]
      personas: [tech_finance_burnout, millennial_women_professionals]
      bio: >
        Ada Park is a cognitive scientist who stopped studying thoughts and
        started studying the one who watches them. Her books use Zen inquiry
        to dissolve thought loops — not manage them.
      portrait_preset: scientific
      cover_style: "White background, single black word, enso colophon"

    - author_id: joel_crane
      display_name: "Joel Crane"
      positioning: elder_stabilizer
      voice_id: N2lVS1w4EtoT3dr4eOWO   # Callum — measured, transatlantic
      voice_settings: { stability: 0.70, similarity_boost: 0.75, style: 0.1 }
      topics: [self_worth, boundaries]
      personas: [corporate_managers, gen_x_sandwich]
      bio: >
        Joel Crane sat zazen for thirty years before he wrote a word. His books
        are spare — sometimes a single question per chapter. He writes about
        the boundary between what you are and what you think you are.
      portrait_preset: stoic_minimal
      cover_style: "Black background, white lowercase serif, maximum 4 words"

    - author_id: hana_lee
      display_name: "Hana Lee"
      positioning: somatic_companion
      voice_id: cgSgspJ2msm6             # Jessica — playful, warm
      voice_settings: { stability: 0.50, similarity_boost: 0.70, style: 0.3 }
      topics: [social_anxiety, imposter_syndrome]
      personas: [gen_z_professionals, gen_alpha_students]
      bio: >
        Hana Lee writes Zen for people who'd never set foot in a temple. Her
        books ask one question: if you can see the imposter, who is the one
        seeing? Accessible, funny, and completely uninterested in being spiritual.
      portrait_preset: youthful_peer
      cover_style: "White background, oversized black question mark"

    - author_id: marcus_stone
      display_name: "Marcus Stone"
      positioning: research_guide
      voice_id: pNInz6obpgDQGcFmaJgB   # Adam — deep, stable
      voice_settings: { stability: 0.80, similarity_boost: 0.75, style: 0.1 }
      topics: [burnout, depression]
      personas: [tech_finance_burnout, entrepreneurs]
      bio: >
        Marcus Stone is a former Wall Street risk analyst who applied inquiry
        practice to the narrative structures that drive corporate burnout.
        His books strip the story from the suffering and ask: what remains?
      portrait_preset: authority
      cover_style: "Black background, steel grey type, razor-thin white line"

    - author_id: yuki_tanabe
      display_name: "Yuki Tanabe"
      positioning: somatic_companion
      voice_id: XrExE9yKIg1WjnnlVkGX   # Matilda — expressive
      voice_settings: { stability: 0.60, similarity_boost: 0.75, style: 0.15 }
      topics: [grief, courage]
      personas: [healthcare_rns, gen_x_sandwich]
      bio: >
        Yuki Tanabe grew up between Kyoto and San Francisco. She writes about
        the grief that Zen doesn't talk about — the kind that sits in your
        throat when you can't name what you lost.
      portrait_preset: contemplative
      cover_style: "Black background, single white kanji-inspired mark"

    - author_id: elliot_vane
      display_name: "Elliot Vane"
      positioning: research_guide
      voice_id: wViXBPUzp2ZZixB1xQuM   # Ryan — American male
      voice_settings: { stability: 0.65, similarity_boost: 0.70, style: 0.2 }
      topics: [financial_stress, sleep_anxiety]
      personas: [entrepreneurs, corporate_managers]
      bio: >
        Elliot Vane writes about the 3 AM thoughts that feel like facts.
        A behavioral economist turned inquiry practitioner, his books show
        that the story your mind tells at night is just that — a story.
      portrait_preset: grounded
      cover_style: "Dark grey, white condensed type, no imagery"

