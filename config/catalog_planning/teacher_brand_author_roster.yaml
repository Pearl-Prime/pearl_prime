# Teacher Brand Author Roster — 12 brands × 5-9 authors = 91 authors
# Authority: brand_identity_system.yaml, PEN_NAME_AUTHOR_SYSTEM.md
#
# Each author has:
#   - Unique ElevenLabs voice (never reused across brands)
#   - Positioning profile (somatic_companion / research_guide / elder_stabilizer)
#   - Primary topics (2-4 from 15 canonical)
#   - Primary personas (2-3 from 10 canonical)
#   - Cover art style aligned with brand palette
#   - Voice settings tuned to content type
#
# VOICE RESEARCH:
#   Meditation/somatic: stability 0.6-0.75, style 0.0-0.1, warm/gentle voices
#   Executive/authority: stability 0.70-0.85, style 0.1-0.3, clear/commanding
#   Gen Z/casual: stability 0.40-0.55, style 0.3-0.5, young/conversational
#   Grief/trauma: stability 0.55-0.70, style 0.1-0.2, unhurried/compassionate
#
# KDP COVER SPECS: 1600×2560 ebook, 3200×3200 audiobook square
# Each author's cover art uses brand palette + author portrait preset

schema_version: 1

# ═══════════════════════════════════════════════════════════════════════════
#  01. STILLNESS PRESS — Ahjan (contemplative Buddhism, alarm recognition)
#      Brand palette: slate #4A5568 + cloud #E2E8F0 + gold accent #C9A227
#      7 authors
# ═══════════════════════════════════════════════════════════════════════════

stillness_press:
  teacher: ahjan
  author_count: 12

  authors:
    - author_id: lena_thorne
      display_name: "Lena Thorne"
      positioning: somatic_companion
      voice_id: EXAVITQu4vr4xnSDxMaL   # Bella — soft, calm
      voice_settings: { stability: 0.65, similarity_boost: 0.75, style: 0.1 }
      topics: [anxiety, sleep_anxiety]
      personas: [millennial_women_professionals, healthcare_rns]
      bio: >
        Lena Thorne spent fifteen years as an ICU nurse before the panic attacks
        made her stop. What she found wasn't a cure — it was a way to see the
        alarm for what it was. She writes about nervous system recognition for
        people who help others for a living.
      portrait_preset: warm_intimate
      cover_style: "Slate gradient, single gold brushstroke, Cormorant Garamond lowercase"

    - author_id: daniel_voss
      display_name: "Daniel Voss"
      positioning: research_guide
      voice_id: onwK4e9ZLuTAKqWW03F9   # Daniel — British authority
      voice_settings: { stability: 0.75, similarity_boost: 0.75, style: 0.15 }
      topics: [burnout, imposter_syndrome]
      personas: [tech_finance_burnout, corporate_managers]
      bio: >
        Daniel Voss is a behavioral neuroscientist who left academia when he
        realized the research on alarm systems was more useful outside the lab.
        His books translate contemplative neuroscience into tools for burned-out
        professionals who need to understand WHY before they can let go.
      portrait_preset: authority
      cover_style: "Cloud white base, slate type, gold accent line"

    - author_id: mira_santos
      display_name: "Mira Santos"
      positioning: somatic_companion
      voice_id: pMsXgVXv3BLzUgSXRplE   # Serena — soft compassion
      voice_settings: { stability: 0.60, similarity_boost: 0.75, style: 0.1 }
      topics: [grief, self_worth]
      personas: [gen_x_sandwich, working_parents]
      bio: >
        Mira Santos writes for the people holding everyone else together.
        After losing her mother while raising two children alone, she discovered
        that grief and self-worth share the same nervous system architecture.
        Her books are for the ones who forgot to grieve because there was no time.
      portrait_preset: contemplative
      cover_style: "Slate-to-white gradient, single leaf motif, warm gold title"

    - author_id: kai_okafor
      display_name: "Kai Okafor"
      positioning: research_guide
      voice_id: TxGEqnHWrfWFTfGW9XjX   # Josh — young American male
      voice_settings: { stability: 0.50, similarity_boost: 0.70, style: 0.35 }
      topics: [social_anxiety, overthinking]
      personas: [gen_z_professionals, gen_alpha_students]
      bio: >
        Kai Okafor is a Gen Z mindfulness researcher who calls overthinking
        exactly what it is: an alarm system running a program you didn't install.
        His books skip the incense and go straight to the neuroscience of why
        your brain won't shut up — and what you can see once it quiets.
      portrait_preset: youthful_peer
      cover_style: "Dark slate, large white type, no ornament, gold period"

    - author_id: ruth_alder
      display_name: "Ruth Alder"
      positioning: elder_stabilizer
      voice_id: ThT5KcBeYPX3keUQqHPh   # Dorothy — warm storytelling
      voice_settings: { stability: 0.70, similarity_boost: 0.75, style: 0.15 }
      topics: [boundaries, compassion_fatigue]
      personas: [healthcare_rns, first_responders]
      bio: >
        Ruth Alder was a hospice chaplain for twenty-two years. She writes about
        the boundaries that keep caregivers alive — not the walls that keep
        people out, but the ground that keeps you standing when everyone around
        you is falling.
      portrait_preset: legacy_wisdom
      cover_style: "Parchment base, slate calligraphic element, gold title"

    - author_id: sam_meridian
      display_name: "Sam Meridian"
      positioning: research_guide
      voice_id: Yko7PKHZNXotIFUBG7I9   # Matthew — warm male
      voice_settings: { stability: 0.65, similarity_boost: 0.75, style: 0.2 }
      topics: [somatic_healing, depression]
      personas: [entrepreneurs, millennial_women_professionals]
      bio: >
        Sam Meridian bridges contemplative practice and clinical somatic work.
        After a decade of silent retreats and a master's in somatic psychology,
        Sam writes for people who know meditation alone isn't enough — but
        don't know what else to try.
      portrait_preset: grounded
      cover_style: "Soft slate, anatomical line detail, gold accent"

    - author_id: noor_ibrahim
      display_name: "Noor Ibrahim"
      positioning: somatic_companion
      voice_id: oWAxZDx7w5VEj9dCyTzz   # Grace — gentle female
      voice_settings: { stability: 0.60, similarity_boost: 0.75, style: 0.1 }
      topics: [courage, financial_anxiety]
      personas: [entrepreneurs, gen_x_sandwich]
      bio: >
        Noor Ibrahim writes about the alarm that fires around money — the one
        that sounds like "not enough" even when the numbers say otherwise.
        Drawing on contemplative economics and nervous system science, her
        books help readers see that financial anxiety is rarely about finance.
      portrait_preset: radiant
      cover_style: "Gold-to-slate gradient, clean Cormorant title, single line"

    - author_id: tara_woodfield
      display_name: "Tara Woodfield"
      positioning: elder_stabilizer
      voice_id: ThT5KcBeYPX3keUQqHPh
      voice_settings: { stability: 0.70, similarity_boost: 0.75, style: 0.1 }
      topics: [boundaries, burnout]
      personas: [gen_x_sandwich, working_parents]
      bio: >
        Tara Woodfield lived at a forest monastery for six years before returning
        to raise her daughter. She writes about renunciation as a parent — what
        you can put down even when you can't leave.
      portrait_preset: legacy_wisdom
      cover_style: "Parchment base, forest green botanical line, bark brown serif"

    - author_id: rowan_beck
      display_name: "Rowan Beck"
      positioning: research_guide
      voice_id: onwK4e9ZLuTAKqWW03F9
      voice_settings: { stability: 0.75, similarity_boost: 0.75, style: 0.1 }
      topics: [anxiety, overthinking]
      personas: [tech_finance_burnout, millennial_women_professionals]
      bio: >
        Rowan Beck is an environmental psychologist who studies why people feel
        calmer in forests. His books translate forest-tradition principles into
        evidence-based simplicity practices for overstimulated professionals.
      portrait_preset: grounded
      cover_style: "Deep forest background, parchment title band, pressed leaf motif"

    - author_id: mae_rivers
      display_name: "Mae Rivers"
      positioning: somatic_companion
      voice_id: oWAxZDx7w5VEj9dCyTzz
      voice_settings: { stability: 0.60, similarity_boost: 0.75, style: 0.1 }
      topics: [grief, compassion_fatigue]
      personas: [healthcare_rns, first_responders]
      bio: >
        Mae Rivers is a former wildfire chaplain who found the forest tradition
        after losing colleagues in the field. Her books are for people who
        carry others' grief and forgot how to put it down.
      portrait_preset: contemplative
      cover_style: "Forest green gradient, single tree silhouette, parchment title"

    - author_id: silas_grant
      display_name: "Silas Grant"
      positioning: elder_stabilizer
      voice_id: ODq5zmih8GrVes37Dizd
      voice_settings: { stability: 0.75, similarity_boost: 0.75, style: 0.05 }
      topics: [self_worth, depression]
      personas: [entrepreneurs, gen_x_sandwich]
      bio: >
        Silas Grant is a retired teacher who spent two decades walking before
        dawn. He writes short books — sixty pages, maybe seventy — about what
        remains when you stop trying to be more.
      portrait_preset: legacy_wisdom
      cover_style: "Parchment, bark brown small type, white space dominant"

    - author_id: iris_tam
      display_name: "Iris Tam"
      positioning: somatic_companion
      voice_id: LcfcDJNUP1GQjkzn1xUU
      voice_settings: { stability: 0.60, similarity_boost: 0.75, style: 0.1 }
      topics: [somatic_healing, sleep_anxiety]
      personas: [millennial_women_professionals, working_parents]
      bio: >
        Iris Tam teaches body-based simplicity — contemplative approaches to
        sleep, eating, and movement. Her books are for people who want less
        but don't know where to start letting go.
      portrait_preset: warm_intimate
      cover_style: "Parchment, forest green accents, hand-drawn botanical border"

