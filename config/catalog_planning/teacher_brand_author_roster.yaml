      topics: [boundaries, compassion_fatigue]
      personas: [healthcare_rns, first_responders]
      bio: >
        Helen Cross was an ER nurse for twenty-six years. She now trains
        healthcare workers in somatic boundary-setting — the body's way of
        saying "I've given enough" before the mind catches up.
      portrait_preset: legacy_wisdom
      cover_style: "Warm cream, hand illustration, espresso serif, rose border"

