# Market × Topic Fit Registry
#
# Authority: Pearl_Research (analysis) → Pearl_PM (acceptance)
# Generated: 2026-06-27   |   OPD-20260627-001
# Purpose: answer "do we have the right topics for each market?" — the last
#          analytical gate (besides the spec) on the worldwide catalog fan-out.
#
# ─────────────────────────────────────────────────────────────────────────────
# WHAT THIS FILE IS
# -----------------
# For each of the 14 markets it declares, against the 17 canonical topics in
# config/catalog/catalog_generation_config.yaml::topics:
#   - fit:      which canonical topics FIT (reuse-eligible for localization),
#               with a fit_score (0.0–2.0) and a tier label.
#   - suppress: which canonical topics are LOW-FIT for that market (with reason).
#   - net_new:  which net-new LOCAL topics are warranted (rationale + source +
#               confidence). net-new topics are CANDIDATES — they require new
#               title/hook/keyword banks before generation, so they are gated
#               separately from the reuse-eligible canonical set.
#
# The 17 canonical topics (catalog_generation_config.yaml::topics):
#   adhd_focus, anxiety, boundaries, burnout, compassion_fatigue, courage,
#   depression, financial_anxiety, financial_stress, grief, imposter_syndrome,
#   mindfulness, overthinking, self_worth, sleep_anxiety, social_anxiety,
#   somatic_healing
#
# The 14 markets (market_catalog_registry.yaml::markets, keyed by market_id):
#   us, japan, korea, germany, france, taiwan, china, hong_kong, spain, latam,
#   brazil, italy, singapore, hungary
#
# ─────────────────────────────────────────────────────────────────────────────
# SUPPRESSION MECHANISM — how this file gates topic availability
# -------------------------------------------------------------
# TODAY (the problem):
#   - catalog_generation_config.yaml::topics is GLOBAL — the same 17 topics are
#     declared once and treated as available in every locale.
#   - description_templates.yaml::market_topic_weights holds per-market BOOST
#     multipliers (e.g. ja_JP grief 1.5) but is LOADED-AND-UNUSED in
#     scripts/catalog/generate_full_catalog.py (read at L1059, never applied to
#     scoring) — so today it neither boosts nor suppresses anything.
#   - scripts/catalog/generate_pearl_prime_book_script_catalog.py scores every
#     (teacher, topic, persona) tuple and, when a pair is undeclared, falls back
#     to teacher_topic_persona_scores.yaml::default_score = 0.5
#     (see composite_score() L390-412). 0.5 is "neutral / not suppressed", so
#     every topic is effectively AVAILABLE EVERYWHERE at neutral weight. There is
#     no per-market topic gate at all.
#
# THE CONTRACT this file defines (consumed by the fan-out, Prompt 5):
#   For market M and canonical topic T, the effective per-market topic weight is:
#       w(M,T) = fit[M].topics[T].fit_score          if T listed in fit
#              = SUPPRESS_FLOOR (default 0.0)         if T listed in suppress
#              = neutral_default (0.5)                if T listed in neither
#   Generation rule:
#       - w == 0.0  → DO NOT BUILD T in M (hard suppress; topic dropped from grid)
#       - 0 < w < suppress_threshold (default 0.35) → DEPRIORITIZE (tail only,
#                    no hero/series-Book-1 slots)
#       - w >= 1.0  → eligible for hero/series anchoring (replaces the dead
#                    market_topic_weights boost path)
#   This file SUPERSEDES description_templates.yaml::market_topic_weights as the
#   per-market topic signal: every weight in the old map is carried forward here
#   as a fit_score, and the gate adds the missing "suppress" leg the boost map
#   never had. Wiring it (passing this map into composite_score / the catalog
#   grid builder) is a CODE change, governed separately — this is the data SSOT.
#
# net_new topics are NOT auto-built: they have no title_templates / topic_hooks /
# keyword_templates banks yet. They feed Prompt 2's volume table and Prompt 5's
# authoring backlog; building them requires authoring those banks first.
#
# ─────────────────────────────────────────────────────────────────────────────
# FIT TIERS / SCORES
# ------------------
#   core     fit_score 1.30–1.60  market-defining; anchor heroes + series here
#   strong   fit_score 1.10–1.25  above-neutral demand; series-eligible
#   moderate fit_score 0.85–1.00  reuse-eligible at neutral; standalones/tail
#   (below moderate → goes in `suppress`, not `fit`)
#
# CONFIDENCE on net_new / suppress:
#   high   = backed by cited research or an operator-ratified plan section
#   med    = backed by directional research + repo plan, register-fit inferred
#   low    = INFERRED from adjacency / analogy; NO demand data — validate before build
#
# Seed provenance: every fit_score >= 1.10 that mirrors
# description_templates.yaml::market_topic_weights is tagged `seed: weights`.
# ─────────────────────────────────────────────────────────────────────────────

schema_version: "1.0"
generated: "2026-06-27"
opd_ref: "OPD-20260627-001"
supersedes: "description_templates.yaml::market_topic_weights (per-market topic signal)"

gating:
  neutral_default: 0.5        # mirrors teacher_topic_persona_scores.yaml::default_score
  suppress_floor: 0.0         # weight assigned to topics in a market's suppress list
  suppress_threshold: 0.35    # below this = deprioritize (tail only); 0.0 = hard drop
  hero_threshold: 1.0         # at/above this = eligible for hero + series Book-1 slots
  net_new_requires_banks: true  # net_new topics need title/hook/keyword banks before build

canonical_topics:
  - adhd_focus
  - anxiety
  - boundaries
  - burnout
  - compassion_fatigue
  - courage
  - depression
  - financial_anxiety
  - financial_stress
  - grief
  - imposter_syndrome
  - mindfulness
  - overthinking
  - self_worth
  - sleep_anxiety
  - social_anxiety
  - somatic_healing

