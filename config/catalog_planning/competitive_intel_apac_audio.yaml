strategic_recommendations_summary:
  items:
    - "Launch Order: Japan first (most mature market, highest willingness to pay), then South Korea (trend-driven adoption), then Taiwan (growing but needs more market education)"
    - "Content Localization: Full native-language narration with cultural adaptation — not just translation. Integrate local wellness concepts (自律神経, 힐링, traditional Chinese medicine)."
    - "Pricing: Premium in Japan (¥2,000–3,000 per title or Audible subscription), subscription-focused in Korea (platform partnerships), competitive in Taiwan (align with Kobo Plus NT$199 ecosystem)"
    - "Distribution: Multi-platform — don't rely on single distributor. Secure placement on dominant platforms per market plus Apple Books/Google Play for maximum reach."
    - "Marketing: Influencer-led in Japan, trend/community-driven in Korea, content-marketing/bookstore-community in Taiwan. Free chapter/trial in all markets."
    - "Format: Modular 15-minute sessions, engaging narration (consider dialogue format), companion PDF/workbook as premium value-add."
    - "B2B Channel: Corporate wellness programs as parallel revenue stream in all markets."
    - "First-Mover Advantage: No Asian-language polyvagal/vagus nerve audiobooks currently exist. Move quickly to establish category leadership."
  _source:
    file: artifacts/research/rakuten_ai_market_research_2026_03_23.md
    section: "## Strategic Recommendations Summary"
    note: "Numbered list items 1–8 as written in source."
