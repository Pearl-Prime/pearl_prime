executive_summary_narrative:
  paragraphs:
    - >-
      Audiobooks are rising in popularity across East Asia, offering new opportunities
      for wellness content.
    - >-
      The audiobook market in Japan, South Korea, and Taiwan is experiencing robust growth
      and presents a promising landscape for wellness content focused on nervous system
      regulation, polyvagal theory, and somatic exercises. Each market shows increasing
      consumer interest in self-improvement and mental wellness topics amid high-stress
      lifestyles. Japan's audiobook industry is the most mature — by 2022 Japan was reported
      as the world's second-largest audiobook market. South Korea's tech-savvy population
      is rapidly embracing audio formats. Taiwan's audiobook segment, though smaller, is
      expanding quickly as major publishers and platforms invest in audio content.
  _source:
    file: artifacts/research/rakuten_ai_market_research_2026_03_23.md
    section: "## Executive Summary"
    note: "First two paragraphs under Executive Summary."
    extracted_at: "2026-03-31"

