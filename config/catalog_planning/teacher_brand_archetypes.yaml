# Teacher Mode Brand Archetypes — 12 brands, each owned by 1 teacher.
# Authority: config/catalog_planning/teacher_brand_lane_assignments.yaml
#            artifacts/research/teacher_market_validation_matrix_2026_04_04.md
#
# Same structure as brand_archetype_registry.yaml (24 standard brands).
# These 12 + those 24 = 36 brands per lane.
#
# RULE: Each teacher brand has a UNIQUE persona × topic × emotional_job
# grouping that does NOT overlap with any standard brand.
# The teacher's tradition/background DEFINES their angle.

schema_version: 1

teacher_brand_archetypes:

  # ── 01 STILLNESS PRESS (Ahjan) ─────────────────────────────────────────
  - brand_id: stillness_press
    teacher: ahjan
    display_name: "Stillness Press"
    tradition: "Contemplative Buddhism — inner light, karma yoga, Dharmakaya"
    gtm_identity:
      persona: trauma_sensitive_meditator
      age_range: [28, 55]
      emotional_job: "see the alarm for what it is"
      functional_job: "nervous system literacy through contemplative practice"
      primary_moment: panic_recognition
    discovery_contract:
      keyword_clusters:
        primary: ["alarm system anxiety", "meditation for trauma", "inner light practice"]
        secondary:
          - "impermanence acceptance"
          - "contemplative grounding"
          - "self-compassion meditation"
          - "forest meditation"
          - "simple living"
          - "letting go practice"
          - "monastic wisdom"
          - "renunciation"
          - "retreat at home"
    unique_angle: >
      The alarm is lying. Your nervous system learned to protect you, but now
      it fires when there's no threat. Ahjan teaches you to SEE the alarm
      without obeying it. Not mindfulness-as-relaxation — mindfulness as
      recognition of the pattern you live inside. A parallel strand speaks to
      simplicity and forest refuge: what remains when you stop adding — enough
      already exists.
    anti_spam_differentiation:
      vs_stabilizer: "Stabilizer calms the nervous system. Stillness Press teaches you to SEE the alarm — recognition before regulation."
      vs_trauma_path: "Trauma Path is safety-first clinical. Stillness Press is contemplative Buddhist — the alarm is a teacher, not an enemy."
      vs_spiritual_ground: "Spiritual Ground seeks connection. Stillness Press sees through the self that seeks."
      vs_minimal_mind: "Minimal Mind is digital detox. Stillness Press can speak to existential simplicity — renouncing the need to keep adding."

  # ── 02 COGNITIVE CLARITY (Joshin) ──────────────────────────────────────
  - brand_id: cognitive_clarity
    # Doctrine-aligned with SOURCE_OF_TRUTH/teacher_banks/joshin/doctrine/doctrine.yaml:
    # Shingon Esoteric Buddhism (Mikkyo); Sokushin Jobutsu — Buddhahood in this
    # body; ritual technology for digital natives. Zen framing and "pure heart /
    # non-separation language" are explicitly prohibited (Joshin is Shingon esoteric,
    # not Zen).
    teacher: joshin
    display_name: "Cognitive Clarity"
    tradition: "Shingon Esoteric Buddhism (Mikkyo) — Sanmitsu (three mysteries: body, speech, mind), Sokushin Jobutsu (Buddhahood in this body), ritual technology for digital natives"
    gtm_identity:
      persona: overthinking_knowledge_worker
      age_range: [25, 50]
      emotional_job: "interrupt the thought-loop with embodied ritual"
      functional_job: "Shingon ritual technology to disrupt mental spirals without negating the mind"
      primary_moment: thought_spiral
    discovery_contract:
      keyword_clusters:
        primary: ["Shingon practice", "stop overthinking", "ritual meditation"]
        secondary: ["mudra and mantra", "esoteric Buddhism for modern life", "Sokushin Jobutsu"]
    unique_angle: >
      The problem isn't the thoughts. The problem is the thinking-only
      mode that has no body to anchor to. Joshin's Shingon practice uses
      Sanmitsu — body (mudra), speech (mantra), mind (visualization) —
      to interrupt the spiral with embodied ritual, not with negation.
      Mikkyo for digital natives.
    anti_spam_differentiation:
      vs_optimizer: "Optimizer manages focus for productivity. Cognitive Clarity uses Shingon ritual to disrupt the spiral entirely."
      vs_spiritual_ground: "Spiritual Ground explores. Cognitive Clarity practices — Mikkyo ritual technology, body-speech-mind together."

  # ── 03 SOMATIC WISDOM (Pamela Fellows) ─────────────────────────────────
  - brand_id: somatic_wisdom
    teacher: pamela_fellows
    display_name: "Somatic Wisdom"
    tradition: "Western Somatic Therapy — polyvagal, embodiment, nervous system science"
    gtm_identity:
      persona: high_functioning_perfectionist
      age_range: [28, 50]
      emotional_job: "trust the body's intelligence"
      functional_job: "polyvagal-informed somatic exercises for perfectionists"
      primary_moment: performance_collapse
    discovery_contract:
      keyword_clusters:
        primary: ["polyvagal theory exercises", "somatic experiencing", "perfectionism recovery"]
        secondary: ["embodiment practice", "nervous system reset science", "body-based therapy"]
    unique_angle: >
      Your body already knows the answer. Pamela teaches the science of why
      your body holds what your mind won't touch. Polyvagal-informed, evidence-based,
      designed for people who need to understand WHY before they can let go.
    anti_spam_differentiation:
      vs_stabilizer: "Stabilizer regulates. Somatic Wisdom educates — WHY the body holds it, not just HOW to release it."
      vs_trauma_path: "Trauma Path prioritizes safety. Somatic Wisdom prioritizes understanding — for perfectionists who need the science."
      vs_bio_flow: "Bio Flow optimizes. Somatic Wisdom heals — the body as teacher, not machine."

  # ── 04 QI FOUNDATION (Master Feung) ────────────────────────────────────
  - brand_id: qi_foundation
    teacher: master_feung
    display_name: "Qi Foundation"
    tradition: "Chinese Internal Arts — Qigong, Taiji, meridian cultivation"
    gtm_identity:
      persona: energy_depleted_professional
      age_range: [30, 60]
      emotional_job: "rebuild from the root"
      functional_job: "qi cultivation for chronic depletion"
      primary_moment: chronic_fatigue_acceptance
    discovery_contract:
      keyword_clusters:
        primary: ["qigong for energy", "qi cultivation", "taiji for stress"]
        secondary: ["meridian healing", "dantian breathing", "internal arts"]
    unique_angle: >
      You're not tired because you work too hard. You're tired because your
      foundation was never built. Master Feung teaches the architecture of
      energy — root, center, flow. Qigong as infrastructure, not relaxation.
    anti_spam_differentiation:
      vs_longevity_lab: "Longevity Lab optimizes biology. Qi Foundation cultivates energy — the Chinese tradition, not the biohacker's."
      vs_stabilizer: "Stabilizer calms. Qi Foundation builds — a foundation that doesn't need calming."

  # ── 05 DIGITAL GROUND (Miki) ───────────────────────────────────────────
  - brand_id: digital_ground
    teacher: miki
    display_name: "Digital Ground"
    tradition: "Japanese Mindfulness — forest bathing, modern presence, digital-age awareness"
    gtm_identity:
      persona: doomscrolling_gen_z
      age_range: [16, 28]
      emotional_job: "exist without the phone"
      functional_job: "presence practice for the always-online generation"
      primary_moment: identity_through_feed
    discovery_contract:
      keyword_clusters:
        primary: ["mindfulness for gen z", "digital anxiety", "forest bathing"]
        secondary: ["phone addiction", "social media detox", "shinrin-yoku"]
    unique_angle: >
      Your identity isn't in the feed. Miki teaches Gen Z how to find ground
      in a world designed to keep you scrolling. Japanese forest bathing meets
      digital-age awareness. Not anti-tech — pro-presence.
    anti_spam_differentiation:
      vs_minimal_mind: "Minimal Mind is digital detox for adults. Digital Ground is identity work for Gen Z — who you are without the phone."
      vs_calm_student: "Calm Student manages exam stress. Digital Ground addresses the deeper crisis — identity dissolution."

  # ── 06 HEART BALANCE (Maat) ────────────────────────────────────────────
  # Doctrine-aligned with SOURCE_OF_TRUTH/teacher_banks/maat/doctrine/doctrine.yaml:
  # Naqshbandi Sufi (Hazrat Inayat Khan lineage). Egyptian goddess/mythology
  # framing is explicitly prohibited.
  - brand_id: heart_balance
    teacher: maat
    display_name: "Heart Balance"
    tradition: "Naqshbandi Sufi — path of the heart, qalb (heart-knowing), dhikr (remembrance), fanaa (dissolution), Hazrat Inayat Khan lineage"
    gtm_identity:
      persona: shadow_work_seeker
      age_range: [28, 55]
      emotional_job: "speak what the heart knows"
      functional_job: "Sufi heart-path practice for the buried truth the qalb already senses"
      primary_moment: suppressed_truth_surfacing
    discovery_contract:
      keyword_clusters:
        primary: ["shadow work practice", "inner truth", "qalb heart-knowing"]
        secondary: ["dhikr practice", "Sufi heart path", "Naqshbandi tradition"]
    unique_angle: >
      The heart already knows what you're afraid to say. Ma'at teaches the
      Sufi path of the heart — the qalb that senses what the mind defended
      against, the dhikr that remembers what the contract left out. Not
      positivity. Not fixing. Recognition.
    anti_spam_differentiation:
      vs_gentle_growth: "Gentle Growth explores safely. Heart Balance demands truth — the qalb doesn't wait for you to be ready."
      vs_spiritual_ground: "Spiritual Ground seeks. Heart Balance recognizes — the heart-knowing, not the curiosity of the seeker."

  # ── 07 RELATIONAL CALM (Junko) ─────────────────────────────────────────
  - brand_id: relational_calm
    teacher: junko
    display_name: "Relational Calm"
    tradition: "Japanese Zazen — radical acceptance, beginner's mind, wabi-sabi, relational harmony"
    gtm_identity:
      persona: shame_carrying_people_pleaser
      age_range: [25, 50]
      emotional_job: "stop performing okayness"
      functional_job: "shame dissolution through radical acceptance"
      primary_moment: relational_mask_exhaustion
    discovery_contract:
      keyword_clusters:
        primary: ["shame healing", "people pleasing recovery", "radical acceptance"]
        secondary: ["wabi-sabi living", "beginner's mind", "relational anxiety"]
    unique_angle: >
      You've been performing "fine" so long you forgot what real feels like.
      Junko teaches through Zen's radical acceptance — this moment, including
      your shame, is already complete. Nothing to fix. Spare, precise, no extra words.
    anti_spam_differentiation:
      vs_relationship_clarity: "Relationship Clarity repairs couples. Relational Calm heals the self-in-relationship — shame, not conflict."
      vs_confidence_core: "Confidence Core builds showing up. Relational Calm stops performing — the mask itself is the problem."

  # ── 08 WARRIOR CALM (Master Wu) ────────────────────────────────────────
  - brand_id: warrior_calm
    teacher: master_wu
    display_name: "Warrior Calm"
    tradition: "Chinese Martial/Spiritual — Wu Wei, composure under fire, warrior presence"
    gtm_identity:
      persona: high_stakes_performer
      age_range: [22, 45]
      emotional_job: "stay composed when everything is on fire"
      functional_job: "martial-arts-derived composure under extreme pressure"
      primary_moment: crisis_freeze_or_fight
    discovery_contract:
      keyword_clusters:
        primary: ["panic attack composure", "crisis calm", "warrior mindset"]
        secondary: ["wu wei", "tao of stress", "martial arts meditation"]
    unique_angle: >
      When the panic hits, your body goes to war. Master Wu teaches the
      warrior's paradox — the fiercer the pressure, the stiller you become.
      Not suppression. Not breathing exercises. Composure as martial art.
    anti_spam_differentiation:
      vs_executive_calm: "Executive Calm is boardroom steady. Warrior Calm is battlefield still — for when steady isn't enough."
      vs_stoic_edge: "Stoic Edge builds mental toughness. Warrior Calm dissolves the fight — Wu Wei, not willpower."
      vs_high_performer: "High Performer builds confidence. Warrior Calm builds composure — different thing entirely."

  # ── 09 SLEEP RESTORATION (Master Sha) ──────────────────────────────────
  - brand_id: sleep_restoration
    teacher: master_sha
    display_name: "Sleep Restoration"
    tradition: "Chinese Healing — energy medicine, restoration, sleep as sacred repair"
    gtm_identity:
      persona: chronic_insomnia_sufferer
      age_range: [30, 60]
      emotional_job: "stop dreading the bed"
      functional_job: "energy medicine approach to chronic sleep disruption"
      primary_moment: midnight_dread
    discovery_contract:
      keyword_clusters:
        primary: ["chronic insomnia natural", "sleep energy healing", "sleep restoration"]
        secondary: ["TCM for sleep", "qi and sleep", "night energy practice"]
    unique_angle: >
      You don't have a sleep problem. You have an energy architecture problem.
      Master Sha teaches that sleep is sacred repair — not something you force
      but something your energy system enables when properly cultivated.
    anti_spam_differentiation:
      vs_night_reset: "Night Reset is hypnotic wind-down. Sleep Restoration rebuilds the energy architecture — fixing the system, not the symptom."

  # ── 10 BODY MEMORY (Omote) ────────────────────────────────────────────
  - brand_id: body_memory
    # Doctrine-aligned with SOURCE_OF_TRUTH/teacher_banks/omote/doctrine/doctrine.yaml:
    # Japanese spiritual-historical navigation; Yamato-gokoro (Japanese spirit)
    # awakening; sacred geography; Project Phoenix lineage. Noh theater as
    # primary framing and "omote/surface" as primary concept are prohibited.
    teacher: omote
    display_name: "Body Memory"
    tradition: "Yamato-gokoro awakening — Japanese spiritual-historical navigation, sacred geography, Project Phoenix lineage; grief held in the land of the body"
    gtm_identity:
      persona: unprocessed_grief_carrier
      age_range: [30, 65]
      emotional_job: "let the body remember what the spirit-history carries"
      functional_job: "grief-as-sacred-geography practice in the Yamato-gokoro lineage"
      primary_moment: grief_stored_in_body
    discovery_contract:
      keyword_clusters:
        primary: ["body grief processing", "somatic grief", "body memory healing"]
        secondary: ["Yamato-gokoro awakening", "sacred geography practice", "Project Phoenix lineage"]
    unique_angle: >
      The grief lives in your shoulders. Your hips. Your jaw. Omote teaches
      that the body is its own sacred geography — the land where ancestral
      and personal grief settle and wait. Yamato-gokoro awakening reads that
      geography. Not talk therapy. Not technique. The body as the territory
      the spirit-history still inhabits.
    anti_spam_differentiation:
      vs_trauma_path: "Trauma Path is clinical safety. Body Memory is Yamato-gokoro awakening — the spirit-history reading the body's own terrain."
      vs_somatic_wisdom: "Somatic Wisdom explains why. Body Memory navigates where — the body's sacred geography of grief."

  # ── 11 SOLAR RETURN (Ra) ──────────────────────────────────────────────
  # Doctrine-aligned with SOURCE_OF_TRUTH/teacher_banks/ra/doctrine/doctrine.yaml:
  # nondual witnessing awareness; I AM consciousness inquiry; Ra Netjer tradition
  # (the name does not establish doctrine). Egyptian / African spiritual framing
  # is explicitly prohibited.
  - brand_id: solar_return
    teacher: ra
    display_name: "Solar Return"
    tradition: "Nondual witnessing awareness — I AM consciousness inquiry, witness practice, costume-dropping (releasing performed identity), clarity as kindness"
    gtm_identity:
      persona: burnout_survivor_rebuilding
      age_range: [30, 50]
      emotional_job: "find the witness the burnout could not touch"
      functional_job: "I AM inquiry for the awareness that watched the burning and was not consumed"
      primary_moment: post_burnout_emptiness
    discovery_contract:
      keyword_clusters:
        primary: ["burnout recovery meaning", "post-burnout rebuilding", "finding purpose after burnout"]
        secondary: ["I AM inquiry", "witness recognition", "costume-dropping practice"]
    unique_angle: >
      Burnout exhausts the costumed self — the version of you that was
      performing employability, availability, and steadiness. Ra teaches
      the recognition that the witness behind the burning was never the
      one being burned. Not recovery as restoration. Not reframing as
      alchemy. Recognition that what watched the collapse was untouched
      by it.
    anti_spam_differentiation:
      vs_stabilizer: "Stabilizer recovers from burnout. Solar Return recognizes the witness the burnout never reached."
      vs_career_lift: "Career Lift gets unstuck. Solar Return asks: what if being stuck was the costume, not the self?"

  # ── 12 DEVOTION PATH (Sai Ma) ─────────────────────────────────────────
  - brand_id: devotion_path
    teacher: sai_ma
    display_name: "Devotion Path"
    tradition: "Indian Bhakti — devotion, divine feminine, surrender, unconditional love"
    gtm_identity:
      persona: love_exhausted_caregiver
      age_range: [30, 60]
      emotional_job: "receive the love you keep giving away"
      functional_job: "devotional practice for caregivers who forgot to include themselves"
      primary_moment: compassion_fatigue_break
    discovery_contract:
      keyword_clusters:
        primary: ["compassion fatigue recovery", "self-devotion", "caregiver burnout spiritual"]
        secondary: ["bhakti practice", "divine feminine", "surrender meditation"]
    unique_angle: >
      You've been giving love to everyone except yourself. Sai Ma teaches
      the bhakti path — devotion turned inward. Not self-care as another task.
      Surrender as the doorway to receiving what you've been pouring out.
    anti_spam_differentiation:
      vs_resilient_parent: "Resilient Parent builds coping. Devotion Path opens receiving — the problem isn't capacity, it's direction."
      vs_spiritual_ground: "Spiritual Ground explores. Devotion Path surrenders — not seeking, but being found."
