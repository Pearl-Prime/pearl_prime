# Per-brand × per-lane series/episode plans for manga and illustrated content.
# Lane intensity: HEAVY (3 series teacher / 2 series standard), MEDIUM (1 series + one-offs), LIGHT (one-off art only).
# Wired to: series_templates.yaml (angles), series_roadmap_registry.yaml (band_curves),
#           brand_illustration_styles.yaml (art_style_ref).
#
# MANGA MODE:
#   teacher — brand has a teacher character. Exactly 1 series uses teacher/student theme
#             (teacher_student_series: true). Other series are regular.
#   regular — brand has no teacher. All series are character-driven, no teacher figure.
schema_version: 1
last_updated: "2026-04-08"

lane_intensity:
  heavy: [japan, korea, france, china, taiwan]  # 3 series per brand
  medium: [latam, brazil, indonesia]             # 1 series + one-off art
  light: [english_global, dach, spain, italy, hungary]  # one-off illustration packages

# Episode production estimates (for planning)
panel_estimates:
  standard_episode: 46   # panels per manga episode
  short_episode: 28      # panels for anthology/short episodes

