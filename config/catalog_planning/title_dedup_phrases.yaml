# Title-dedup phrase tables — B2 / Issue #777 follow-up
#
# Used by `scripts/catalog/generate_pearl_prime_book_script_catalog.py` when
# a row is NOT the per-(locale, topic, template_idx) flagship. Cap rule:
# at most 1 flagship row per (locale, topic, template_idx) keeps the existing
# template title. All other rows synthesize a variant title from the tables
# below using a deterministic SHA-256 seed of (locale|brand|topic|persona).
#
# Title formula:
#     title    = "{brand_voice_phrases[brand][i]}, {persona_signal_phrases[persona][j]}"
#     subtitle = subtitle_pattern (brand-tinted, topic-injected)
#
# Indices i, j derived from sha256(seed) — see generator.
#
# All phrases authored deterministically (no LLM). Each phrase is a complete
# noun-clause that can sit as the first or second half of a two-clause title.
# Tonal anchors come from each brand's archetype (`brand_archetype_registry.yaml`)
# and each persona's lived context.
#
# Authority: this file. Schema-version pinned. Do not delete entries; add
# behind a new index to preserve deterministic seed → phrase mapping.

schema_version: "1.0"

