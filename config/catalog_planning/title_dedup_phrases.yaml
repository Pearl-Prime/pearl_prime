# Subtitle patterns for variant rows (when no flagship template subtitle).
# Indexed deterministically by sha256(seed). {topic} is interpolated from
# the catalog's topic field (display-cased).
variant_subtitle_patterns:
  - "A {brand_descriptor} Path Through {topic}"
  - "{brand_descriptor} Practice for {topic} Recovery"
  - "How {brand_descriptor} Works When {topic} Won't Stop"
  - "A Guide to {topic} for {persona_descriptor}"
  - "{topic} Recovery for {persona_descriptor}"
  - "When {topic} Meets {brand_descriptor}"

