# Platform-specific knob tuning for catalog planning.
# Authority: docs/PLATFORM_ALGORITHM_RESEARCH_2026.md
# Consumed by: variation_selector, format_selector, wave_optimizer
#
# Each platform profile specifies preferred knob values that maximize
# algorithmic discoverability and listener retention on that platform.
#
# 2026-06-13 (Pearl_Research) — ROUTING CORRECTION. The audiobook-surface
# preferred_runtimes were authored on the OLD wrong "standard_book = 55 min" label
# and routed 2.3–2.5 hr books to Audible/Spotify while stating ideal_runtime_hours: 5.
# PR #1550 corrected the label (standard_book → 147 min / 2.45 hr); this file was never
# reconciled. Re-routed so each surface gets a runtime that REACHES its stated ideal:
# only deep_book_4h (3.3 hr, T6) + deep_book_6h (5.8 hr, T7) clear the Audible 3-hr floor.
# Tier→platform cross-walk + sources: artifacts/research/duration_per_platform_20260613/
# {DURATION_PER_PLATFORM_PLAN,DURATION_GAP_VERIFICATION}.md. DO-NOT-MERGE pending operator review.

schema_version: "1.0"
last_updated: "2026-06-13"   # was 2026-04-04 (Pearl_Research routing correction)

platform_profiles:
  # ── Western Audiobook Platforms ──────────────────────────────────────
  audible:
    preferred_runtimes: [deep_book_6h, deep_book_4h]  # was [standard_book, extended_book_2h] (2.45h/2.3h, BELOW the 3h floor); only these reach ideal_runtime_hours:5 [A4][A6]
    preferred_formats: [F006, F003, F004, F009]
    preferred_structures: [promise_engine, gladwell_spiral, brene_brown, van_der_kolk]
    preferred_journey_shapes: [recognition_to_agency, linear_rise]
    max_runtime_hours: 6  # beyond 10h kills completion
    ideal_runtime_hours: 5  # self-help sweet spot
    chapter_duration_min: 15
    chapter_duration_max: 30
    completion_target: 0.70
    opening_investment: high  # first 10-20 min is make-or-break
    release_window: Q1  # January peak
    anti_spam_strictness: moderate
    notes: "50% market share. Sales velocity + completion rate drive ranking."

  spotify:
    preferred_runtimes: [deep_book_4h, deep_book_6h, standard_book]  # was [short_book_30, standard_book, micro_book_20] (28–45 min, far below 4–6h); standard_book ONLY as a podcast-season source, not a standalone audiobook [S4][S6]
    preferred_formats: [F003, F006, F015]
    preferred_structures: [atomic, myth_killer, permission_slip, case_file]
    preferred_journey_shapes: [crisis_landing, scaffold_deepen]
    max_runtime_hours: 6
    ideal_runtime_hours: 4  # was 3 — bias 4–6h lower-end for Spotify's casual 18–34 audience; 15hr/mo at normal speed favors tryable-but-still-full [S1][S3][S6]
    chapter_duration_min: 10
    chapter_duration_max: 20
    completion_target: 0.70
    opening_investment: high
    release_window: Q1
    anti_spam_strictness: tightening  # new spam filter 2025
    notes: "Graph neural net cross-domain from music/podcast. AudioBoost for cold-start."

  apple_books:
    preferred_runtimes: [deep_book_6h, deep_book_4h, standard_book]  # was [standard_book, extended_book_2h]; pay-per-sale so length=value not payout, but full AI-narrated audiobook wants the fuller tiers [P1][P5]
    preferred_formats: [F006, F004, F009]
    preferred_structures: [promise_engine, gladwell_spiral, zoom_lens]
    preferred_journey_shapes: [recognition_to_agency, wave_three_peaks]
    max_runtime_hours: 8
    ideal_runtime_hours: 5
    completion_target: 0.65
    opening_investment: high
    anti_spam_strictness: moderate
    digital_narration: english_only  # Apple Digital Narration = free AI, ENGLISH ONLY, self-development genre-eligible; CJK NOT AI-narrated [P1][P6]
    notes: "Editorial curation + flat 70% per-sale (length=price-justification, NOT a read-through payout lever). Asia storefront ≈ Japan only (no KR/zh). Metadata accuracy critical."

  google_play:
    preferred_runtimes: [deep_book_6h, deep_book_4h, standard_book]  # was [standard_book, short_book_30]; full ebook + auto-narrated audiobook want the fuller tiers [P2][P4]
    preferred_formats: [F006, F003]
    preferred_structures: [promise_engine, atomic, gladwell_spiral]
    max_runtime_hours: 6
    anti_spam_strictness: strictest  # rejects identical ISBNs
    auto_narration_languages: [en, es, fr, de, hi, pt-BR]  # Google auto-narration is NOT available for ja/ko/zh — CJK audiobooks human/other-pipeline only [P2][P3]
    notes: "70% ebook / 52% auto-narrated audiobook, flat per-sale. Reaches JP/KR/HK/TW EBOOKS (broader Asia ebook reach than Apple). Popularity + downloads; strictest anti-duplicate."

  kobo:
    preferred_runtimes: [deep_book_6h, deep_book_4h]  # was [standard_book, extended_book_2h]; Kobo Plus = subscription read-through, so length×completion is a payout lever (like KU/Audible)
    preferred_formats: [F006, F004]
    preferred_structures: [promise_engine, brene_brown, van_der_kolk]
    completion_target: 0.65
    notes: "Kobo Plus subscription (read-through). Editorial + engagement signals. Strong JP market."

  findaway:
    preferred_runtimes: [deep_book_6h, deep_book_4h]  # was [standard_book, short_book_30]
    preferred_formats: [F006, F004, F009]
    notes: "STALE: Findaway Voices CEASED 2025-08-01 → succeeded by INaudio (wide distro) + Spotify for Authors (direct Spotify). Update the distribution wiring before relying on this profile. [A8][S4]"

  # ── Chinese Platforms ────────────────────────────────────────────────
  ximalaya:
    preferred_runtimes: [micro_book_15, micro_book_20, short_book_30]
    preferred_formats: [F015, F003, F005]
    preferred_structures: [case_file, zoom_lens, atomic]
    preferred_journey_shapes: [crisis_landing, scaffold_deepen]
    max_runtime_hours: 1  # episode format, not full audiobook
    ideal_runtime_minutes: 20  # 10-30 min episodes
    chapter_duration_min: 5
    chapter_duration_max: 15
    completion_target: 0.80  # shorter = higher completion
    content_moderation: strict  # government compliance required
    pricing_model: freemium
    notes: "303M MAU, 70%+ CN audiobook market. Episode format. Tencent acquired 2025."

  wechat_read:
    preferred_runtimes: [standard_book, short_book_30]
    preferred_formats: [F006, F003]
    preferred_structures: [gladwell_spiral, promise_engine]
    notes: "Social reading. WeChat friends' activity influences discovery."

  netease_cloud:
    preferred_runtimes: [standard_book]
    preferred_formats: [F006]
    notes: "Premium tier (Vinyl Membership). Quality-focused."

  dedao:
    preferred_runtimes: [short_book_30, standard_book]
    preferred_formats: [F003, F006]
    notes: "Premium knowledge platform. Quality-gated, expert content."

  # ── Korean Platforms ─────────────────────────────────────────────────
  naver_audiobook:
    preferred_runtimes: [short_book_30, micro_book_20]
    preferred_formats: [F003, F015]
    preferred_structures: [case_file, myth_killer, atomic]
    preferred_journey_shapes: [crisis_landing]
    ideal_runtime_minutes: 90  # "90-minute compact" trend
    notes: "Naver Search SEO critical. 90-min compact format trending."

  kakao_page:
    preferred_runtimes: [micro_book_15, micro_book_20]
    preferred_formats: [F015, F001]
    preferred_structures: [the_letter, contrast_engine, case_file]
    serialization_preferred: true
    notes: "'Wait for Free' model. Serialized > complete books."

  # ── Japanese Platforms ───────────────────────────────────────────────
  audible_jp:
    preferred_runtimes: [standard_book, extended_book_2h]
    preferred_formats: [F006, F004, F009]
    preferred_structures: [van_der_kolk, ancestor, zoom_lens, gladwell_spiral]
    preferred_journey_shapes: [scaffold_deepen, recognition_to_agency]
    voice_quality: premium  # seiyuu culture demands top-tier narration
    notes: "Japan 2nd-largest audiobook market. Fiction 80%. Voice actor quality paramount."

  audiobook_jp:
    preferred_runtimes: [standard_book]
    preferred_formats: [F006, F007]
    preferred_structures: [van_der_kolk, ancestor, zoom_lens]
    voice_quality: premium
    notes: "Similar to Audible JP. Literary quality valued."

# ── Locale → Platform Mapping ──────────────────────────────────────────
locale_platform_defaults:
  en-US: [audible, spotify, apple_books, google_play, kobo, findaway]
  zh-TW: [google_play, apple_books, kobo, spotify, findaway]
  zh-HK: [google_play, apple_books, kobo, spotify, findaway]
  zh-CN: [ximalaya, wechat_read, netease_cloud, dedao, apple_books]
  zh-SG: [google_play, apple_books, kobo, spotify, findaway]
  ja-JP: [audible_jp, audiobook_jp, google_play, apple_books, kobo, spotify]
  ko-KR: [naver_audiobook, kakao_page, google_play, apple_books, kobo, spotify]
  es-US: [audible, spotify, apple_books, google_play, kobo]
  es-ES: [audible, spotify, apple_books, google_play, kobo]
  fr-FR: [audible, spotify, apple_books, google_play, kobo]
  de-DE: [audible, spotify, apple_books, google_play, kobo]
  it-IT: [audible, spotify, apple_books, google_play, kobo]
  hu-HU: [google_play, apple_books, kobo, spotify]
