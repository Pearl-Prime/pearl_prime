# Teacher Wrapper Templates
# Slot variables: {TEACHER_NAME}, {TRADITION}, {TRADITION_SHORT},
#                 {PRACTICE_NAME}, {TEACHING_LINEAGE}
# Authority: Big View Phase 2
# Used by: content atom wrapper injection, description_templates pipeline

# ── Named mode ──────────────────────────────────────────────────────────────
# Teacher name is used explicitly. Use when brand strategy allows named
# attribution (≤3 named-teacher books per brand per week per platform).

named:
  # DEFERRED-LANE register_verdict (2026-06-15, composer-register-flip): every intro_wrapper
  # pattern + variant below was previously an ellipsis ("...") continuation lead-in. The composer
  # splices an ellipsis-terminated intro INLINE onto the following doctrine atom
  # (teacher_wrapper.join_wrapped: a "..."-ending prefix joins with a single space; a complete
  # sentence keeps a paragraph break). That inline splice was the documented root of the register
  # F2 residual (#1589 diagnostic note CONFIG-CAUSE #2): the dangling ellipsis collapsed to a
  # dangling-preposition tail ("...the path begins with." → F2.B) and the doctrine atom's lowercase
  # opening spliced onto it as a fragment ("and somatic approach...", "the foundation of
  # contemplative..." → F2.C). Reworded to COMPLETE, self-contained sentences (period-terminated,
  # no trailing preposition/article, no mid-clause ellipsis) so join_wrapped emits each intro as its
  # own clean paragraph and no splice artifact can form. Sibling to the F2.A colon-tail reword
  # already on main (variant 7). Voice + slot variables preserved; pool size unchanged (11 variants).
  intro_wrapper:
    pattern: "According to {TEACHER_NAME}, {TEACHING_LINEAGE} begins with one honest look at what you have been avoiding."
    variants:
      - "In {TEACHER_NAME}'s framework, the path begins with one honest look at what you keep avoiding."
      - "Drawing on {TEACHER_NAME}'s {TEACHING_LINEAGE} approach, the first move is to feel the body before you explain it."
      - "{TEACHER_NAME} describes this as the foundation of {TRADITION_SHORT}: meeting the moment as it actually is."
      # Additive +7 sibling variants per ws_teacher_wrapper_intro_variants_diversification_20260518.
      # Diversifies the pool 4 → 11 to dilute scene_anchor_density collisions in chapters that
      # wrap multiple substance slots in named mode (TEACHER-MODE-WRAPPER-SEMANTICS-01 wrapper-line-budget).
      # All variants are tradition-neutral so they remain doctrinally compatible across the teacher roster
      # (Tantric, Zen, Theravada, Taoist, bhakti, somatic-therapist, integration-mystic).
      - "What {TEACHER_NAME} returns to again and again is this one thing: presence before strategy."
      - "For {TEACHER_NAME}, the work begins in the body, not the idea."
      - "Sit with {TEACHER_NAME}'s {TEACHING_LINEAGE} long enough and one thread emerges clearly."
      # DEFERRED-LANE register_verdict (2026-06-15): was "...is precise: ..." then "...precise, and it
      # begins..." — both ellipsis/colon tails risked the F2.A colon-period artifact and the inline-splice
      # F2.B/F2.C residual. Now a complete sentence; voice ("precise") preserved.
      - "{TEACHER_NAME}'s reading of this is precise, and it begins with the body."
      - "Where {TEACHER_NAME} departs from the usual framing is exactly here."
      - "Across {TEACHER_NAME}'s {TRADITION_SHORT} work, the through-line is steady and plain."
      - "What {TEACHER_NAME} keeps pointing toward is the next honest move."
    slot_requirements: [TEACHER_NAME, TEACHING_LINEAGE]

  exercise_wrapper:
    pattern: "{TEACHER_NAME}'s {PRACTICE_NAME}"
    variants:
      - "A practice from {TEACHER_NAME}: {PRACTICE_NAME}"
      - "{PRACTICE_NAME} (as taught by {TEACHER_NAME})"
    slot_requirements: [TEACHER_NAME, PRACTICE_NAME]

  conclusion_wrapper:
    # Reworded to complete sentences alongside the intro_wrapper block (same register_verdict lane).
    # Conclusion suffixes are appended as their own closing paragraph (join_wrapped suffix branch),
    # so the inline-splice F2.B/F2.C risk does not apply here; completing the clause additionally
    # forecloses any F2.B dangling-preposition hit if a downstream pass normalizes "..." to ".".
    pattern: "As {TEACHER_NAME} reminds us, {TRADITION_SHORT} is not a destination but a way of returning."
    variants:
      - "{TEACHER_NAME}'s {TEACHING_LINEAGE} points toward a single truth you can practice today."
      - "The {TRADITION_SHORT} tradition, as {TEACHER_NAME} frames it, invites one more honest breath."
    slot_requirements: [TEACHER_NAME, TRADITION_SHORT, TEACHING_LINEAGE]

# ── Generalized mode ─────────────────────────────────────────────────────────
# Teacher name is NOT used. Use teachings and tradition.
# Preferred for 65–70% of catalog output.
#
# Anti-patterns (never use in generalized mode):
#   ✗ "Master X says…"
#   ✗ "I came across this teacher"
#   ✗ "According to [named individual]…"
#
# Required replacements:
#   ✓ "According to [Tradition]…"
#   ✓ "I came across the work of [Tradition]"
#   ✓ "The [Tradition] tradition holds…"

generalized:
  # Same register_verdict reword as the named block: every intro is now a complete, period-terminated
  # sentence so join_wrapped emits it as a clean paragraph and the doctrine-atom inline splice cannot
  # form a dangling-preposition (F2.B) or lowercase-fragment (F2.C) artifact. Generalized mode is
  # 65-70% of catalog output, so this is the highest-volume fix.
  intro_wrapper:
    # Pattern uses "holds that" (not "teaches that") so the two high-volume stems do
    # not share the same 5-gram prefix when TRADITION resolves to "the contemplative
    # tradition" — book_quality_gate counts 4–6-grams book-wide (cap 12).
    pattern: "{TRADITION} holds that the path begins with one honest look at what is actually here."
    variants:
      - "{TRADITION} teaches that change starts with what you can feel right now."
      - "Within the {TRADITION_SHORT} lineage, practitioners have long known that the body leads."
      - "{TRADITION_SHORT} teaching met the problem where ordinary advice stopped helping."
      - "{TRADITION_SHORT} practice holds that presence comes before strategy."
      # Additive variants (phrase-density rotation lane 2026-07-08): diversify the
      # generalized pool so composite-doctrine wrapper prefixes spread under the
      # book-wide cap without sharing high-volume n-gram clusters.
      - "Across {TRADITION_SHORT} teaching, the first move is to feel the body before you explain it."
      - "What {TRADITION_SHORT} practitioners keep rediscovering is simple: start where you actually are."
      - "The {TRADITION_SHORT} lineage has long pointed here first — one honest look, then the next step."
    slot_requirements: [TRADITION]

  exercise_wrapper:
    pattern: "A practice drawn from {TRADITION}"
    variants:
      - "Drawn from {TRADITION_SHORT} practice: {PRACTICE_NAME}"
      - "The {TRADITION} approach to {PRACTICE_NAME}"
      - "A {TRADITION_SHORT} technique: {PRACTICE_NAME}"
    slot_requirements: [TRADITION]

  conclusion_wrapper:
    pattern: "{TRADITION} invites us to return to what is essential."
    variants:
      - "At the heart of {TRADITION_SHORT} is a simple, recurring invitation to begin again."
      - "{TRADITION} does not ask for perfection — only honest presence."
      - "What the {TRADITION} lineage keeps pointing toward is the next honest move."
    slot_requirements: [TRADITION, TRADITION_SHORT]

# ── Composite mode ───────────────────────────────────────────────────────────
# No specific teacher, no specific tradition. Draws from multiple sources.
# Use for ~10–15% of catalog — universal/cross-tradition books.

composite:
  # Same register_verdict reword: complete sentences, no ellipsis-splice or dangling-preposition risk.
  intro_wrapper:
    pattern: "Across traditions and lineages, one insight recurs in every honest account."
    variants:
      - "Whether rooted in Eastern or Western practice, the teaching is the same at its core."
      - "From contemplative traditions worldwide, this principle emerges again and again."
      - "The research, the ancient practices, and the lived experience all point the same way."
    slot_requirements: []

  exercise_wrapper:
    pattern: "A cross-tradition practice"
    variants:
      - "A practice found across many traditions"
      - "An exercise drawn from contemplative and somatic research"
    slot_requirements: []

  conclusion_wrapper:
    pattern: "What the evidence and traditions converge on is this one steady truth."
    variants:
      - "Across cultures and centuries, the invitation is the same as it always was."
      - "Whether ancient or modern, the path circles back to the present moment."
    slot_requirements: []


