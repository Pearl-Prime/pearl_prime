      display_font: "Spectral"
      body_font: "Karla"
      cover_template: "premium_soft"
      texture: "silk_weave"
      mood: "Devotional warmth, feminine grace, receiving energy"
      cover_style: >
        Soft purple-to-white gradient or lotus white base. Subtle floral
        or lotus element. Blush pink accent. Spectral serif, elegant.
        Feels like being held without being told what to do.


