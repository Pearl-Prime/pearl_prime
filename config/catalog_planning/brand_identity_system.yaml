# Phoenix Omega — Complete Brand Identity System
# Authority: teacher_brand_lane_assignments.yaml, teacher_brand_archetypes.yaml
#
# 37 brands × 12 lanes = 444 brand instances worldwide.
# This file defines the English Global (base) identity for each brand.
# Locale variants inherit base identity + locale suffix + translated tagline.
#
# NAMING RESEARCH SOURCES:
#   Shambhala, Parallax Press, Sounds True, Snow Lion, Editora Sextante
#   Pattern: mythic/cultural reference > navigation metaphor > nature + qualifier
#   Avoid: trendy wellness words (mindful, zen, calm, glow)
#   Audiobook-first: sensory/voice words signal format (Sounds True model)
#
# VISUAL SYSTEM:
#   Each brand needs: colophon mark, 2 primary colors + 1 accent, 1 display font,
#   1 body font, cover template, texture/pattern. Minimum 5 assets to launch.

schema_version: 1

# ═══════════════════════════════════════════════════════════════════════════
#  TEACHER MODE BRANDS (13)
# ═══════════════════════════════════════════════════════════════════════════

teacher_brands:

  # ── 01 STILLNESS PRESS ─────────────────────────────────────────────────
  stillness_press:
    teacher: ahjan
    display_name: "Stillness Press"
    tagline: "When the alarm won't stop, learn to see it"
    description: >
      Stillness Press publishes contemplative works rooted in Buddhist inner-light
      tradition. Every title teaches nervous system literacy — not relaxation, but
      recognition. Founded on Ahjan's principle that the alarm is information,
      not an enemy.
    brand_identity:
      colophon: "Bell silhouette (single stroke, no fill)"
      primary_colors: ["#4A5568", "#E2E8F0"]     # slate + cloud white
      accent_color: "#C9A227"                      # warm gold
      display_font: "Cormorant Garamond"           # elegant serif
      body_font: "Source Sans Pro"
      cover_template: "minimalist_gradient"
      texture: "ink_wash_subtle"
      mood: "Contemplative, spacious, unhurried"
      cover_style: >
        Muted slate-to-white gradient. Single calligraphic element centered.
        Title in warm gold Cormorant Garamond. No photos. No faces.
        Feels like the moment after the bell stops ringing.

  # ── 02 CLEAR SEEING BOOKS ─────────────────────────────────────────────
  cognitive_clarity:
    teacher: joshin
    display_name: "Clear Seeing Books"
    tagline: "The mind was never the problem"
    description: >
      Clear Seeing Books publishes Zen inquiry works that dissolve thought loops
      rather than manage them. Joshin's direct-pointing method: if you can see
      the thinker, you are not the thinker. No stories. No strategies. Just seeing.
    brand_identity:
      colophon: "Enso circle (single brush stroke, open at top)"
      primary_colors: ["#1A1A2E", "#FFFFFF"]       # near-black + pure white
      accent_color: "#718096"                       # steel grey
      display_font: "EB Garamond"
      body_font: "Inter"
      cover_template: "bold_monochrome"
      texture: "rice_paper_grain"
      mood: "Spare, direct, nothing extra"
      cover_style: >
        Black or white background. One word or phrase in enormous type.
        No imagery. No decoration. The cover IS the teaching — nothing to
        hold onto. Enso colophon small, bottom right.

  # ── 03 NORCAL DHARMA PRESS ────────────────────────────────────────────
  norcal_dharma:
    teacher: ajahn_x
    display_name: "NorCal Dharma Press"
    tagline: "Enough already exists"
    description: >
      NorCal Dharma Press publishes Thai Forest tradition works on simplicity,
      renunciation, and the sufficiency of what remains when you stop adding.
      Ajahn X's teaching: the forest has one lesson — enough already exists.
      Church-affiliated distribution channel.
    brand_identity:
      colophon: "Single tree silhouette (bodhi leaf shape)"
      primary_colors: ["#2D3B2D", "#F5F0E8"]       # deep forest + parchment
      accent_color: "#8B7355"                        # bark brown
      display_font: "Libre Baskerville"
      body_font: "Lora"
      cover_template: "earth_tones"
      texture: "pressed_leaf"
      mood: "Forest silence, unadorned, monastic"
      cover_style: >
        Deep forest green or parchment base. Minimal botanical line drawing.
        Title in Libre Baskerville, lowercase. Feels like a book you'd find
        in a forest monastery library.

  # ── 04 FELT SENSE PUBLISHING ──────────────────────────────────────────
  somatic_wisdom:
    teacher: pamela_fellows
    display_name: "Felt Sense Publishing"
    tagline: "The body already knows"
    description: >
      Felt Sense Publishing bridges Western somatic therapy and polyvagal science
      for high-functioning perfectionists. Pamela Fellows teaches the science of
      WHY the body holds what the mind won't touch. Evidence-based. Body-first.
    brand_identity:
      colophon: "Spiral (golden ratio, single line)"
      primary_colors: ["#F7F3EE", "#5C4A3A"]       # warm cream + espresso
      accent_color: "#C47A8A"                        # dusty rose
      display_font: "Playfair Display"
      body_font: "Nunito Sans"
      cover_template: "warm_soft"
      texture: "linen_weave"
      mood: "Clinical warmth, embodied intelligence, trustworthy"
      cover_style: >
        Warm cream linen background. Anatomical illustration detail (hand, spine,
        rib cage) in fine line. Dusty rose accent. Playfair Display title.
        Feels like a therapy office bookshelf — not clinical, not woo.

  # ── 05 ROOT & MERIDIAN PRESS ──────────────────────────────────────────
  qi_foundation:
    teacher: master_feung
    display_name: "Root & Meridian Press"
    tagline: "Rebuild from where it starts"
    description: >
      Root & Meridian Press publishes Chinese internal arts — Qigong, Taiji,
      meridian cultivation. Master Feung teaches that you're not tired because
      you work too hard; you're tired because your foundation was never built.
      Energy as architecture, not supplement.
    brand_identity:
      colophon: "Dantian dot within circle (三丹田 reference)"
      primary_colors: ["#5D4E37", "#E8D5A3"]       # earth brown + warm sand
      accent_color: "#C9A227"                        # old gold
      display_font: "Noto Serif"
      body_font: "Noto Sans"
      cover_template: "earth_tones"
      texture: "bamboo_paper"
      mood: "Rooted, ancient-modern bridge, architectural"
      cover_style: >
        Warm earth tones. Meridian line diagram or taiji symbol abstracted
        as geometric art. Gold accents. Noto Serif for cross-locale consistency.
        Feels like a practitioner's manual, not a coffee table book.

  # ── 06 PRESENT TENSE BOOKS ────────────────────────────────────────────
  digital_ground:
    teacher: miki
    display_name: "Present Tense Books"
    tagline: "You exist beyond the feed"
    description: >
      Present Tense Books publishes mindfulness works for the generation that
      grew up online. Miki teaches presence in a world designed to keep you
      scrolling. Japanese forest bathing meets digital-age awareness. Not anti-tech.
      Pro-presence.
    brand_identity:
      colophon: "Pine needle cluster (3 needles, Japanese style)"
      primary_colors: ["#0F172A", "#E0F2FE"]       # midnight blue + ice blue
      accent_color: "#22D3EE"                        # cyan glow
      display_font: "Space Grotesk"
      body_font: "DM Sans"
      cover_template: "dark_minimal"
      texture: "pixel_grain_subtle"
      mood: "Digital-native calm, nocturnal, screen-glow aesthetic"
      cover_style: >
        Dark midnight blue base. Single glowing element — a tree, a breath,
        a moment. Cyan accent like a notification you actually want.
        Space Grotesk type. Feels native to the phone but pointing beyond it.

  # ── 07 FEATHER & SCALE PRESS ──────────────────────────────────────────
  heart_balance:
    teacher: maat
    display_name: "Feather & Scale Press"
    tagline: "What the heart already knows"
    description: >
      Feather & Scale Press publishes Egyptian wisdom tradition works on truth,
      balance, and shadow integration. Maat's teaching: the heart is weighed
      against the feather of truth. Your shadow honored equally with your light.
    brand_identity:
      colophon: "Feather on one side of a scale (Ma'at weighing)"
      primary_colors: ["#1E1B4B", "#FEF3C7"]       # deep indigo + papyrus gold
      accent_color: "#F59E0B"                        # amber
      display_font: "Cinzel"
      body_font: "Crimson Text"
      cover_template: "sacred_cosmic"
      texture: "papyrus_subtle"
      mood: "Ceremonial, truthful, ancient-weight"
      cover_style: >
        Deep indigo or black background. Gold geometric element — scale, feather,
        eye of truth. Cinzel capitals. Amber accents. Feels like opening a
        book that has been waiting for you specifically.

  # ── 08 BARE FORM BOOKS ────────────────────────────────────────────────
  relational_calm:
    teacher: junko
    display_name: "Bare Form Books"
    tagline: "Nothing extra. Nothing missing."
    description: >
      Bare Form Books publishes Zen-rooted works on radical acceptance and shame
      dissolution. Junko's teaching: this moment, including your shame, is already
      complete. Spare, precise, no extra words. Wabi-sabi as publishing philosophy.
    brand_identity:
      colophon: "Single horizontal brush stroke (一 — ichi, 'one')"
      primary_colors: ["#FAFAF9", "#44403C"]       # warm white + stone grey
      accent_color: "#A8A29E"                       # ash
      display_font: "Cormorant Infant"
      body_font: "IBM Plex Sans"
      cover_template: "calm_minimal"
      texture: "washi_paper"
      mood: "Wabi-sabi, imperfect, complete"
      cover_style: >
        Almost entirely white or stone grey. One small imperfect element —
        a crack, a single stroke, an off-center dot. Cormorant Infant in
        lowercase. Maximum 6 words visible. The emptiness is the design.

  # ── 09 IRON GATE PRESS ────────────────────────────────────────────────
