# Locale-Specific Brand Display Names — 36 brands × 12 lanes
# Authority: teacher_brand_lane_assignments.yaml, brand_identity_system.yaml
#
# NAMING RESEARCH:
#   JP: suffix 社/出版/堂; kanji: 安心癒静穏和光泉森風
#   KR: suffix 사/출판사/북스; words: 마음 치유 힐링 고요 빛 숲
#   ZH-TW: suffix 出版/文化; chars: 心靈療癒安靜光泉圓和
#   ZH-CN: suffix 出版/文化; chars: 心灵疗愈静心安心正念
#   PT-BR: prefix Editora; words: pensamento consciência serenidade caminho luz
#   DE: suffix Verlag; words: Seele Stille Heilung Ruhe Licht Quelle
#   FR: prefix Editions; words: sérénité lumière souffle sagesse éveil
#   ES: prefix Editorial; words: serenidad despertar sendero equilibrio
#   IT: suffix Editore; words: serenità luce armonia respiro risveglio
#   HU: suffix Kiadó; words: lélek csend fény béke forrás
#   LATAM: prefix Editorial; neutral LATAM Spanish, not Castilian

schema_version: 1

