# Series templates for Stage 1 (Catalog Planner).
# Links domain → series → angles. Authoritative format IDs live in Canonical Spec Part 2.
# All series have non-empty angles (required for naming engine; see del_intake_planner).

series:
  # ─── ANXIETY CLUSTER ──────────────────────────────────────────────────────

  social_anxiety_arc:
    domain: anxiety_cluster
    description: "Social interaction anxiety patterns"
    series_title: "The Room Full of People"
    series_subtitle: "How to Show Up When Every Room Feels Like a Test"
    search_keywords:
      - social anxiety
      - social phobia
      - fear of people
    persona_affinity:
      high:
        - nyc_exec
        - nyc_executives
        - gen_z_la
        - healthcare_worker
      medium:
        - burned_out_professional
    target_installments: 8
    angles:
      - at_work
      - on_dates
      - public_speaking
      - at_parties
      - online
      - with_authority_figures
      - in_new_groups
      - after_conflict

  panic_response_arc:
