  # ─── TOPIC-BASED SERIES (engine-agnostic, for full catalog) ───────────────
  # These match topic_id values used by generate_full_catalog.py.
  # The naming engine falls back to series_id = topic_id when no
  # explicit series is assigned. These entries ensure proper SEO keywords
  # instead of raw engine names in titles.
  #
  # Added 2026-03-19: series_title + series_subtitle fields for reader-facing
  # series naming. Per MARKETING_ANTI_SPAM_ALIGNMENT_PLAN §6: each series gets
  # a human-readable title and subtitle, not just an internal series_id.
  # Pipeline wiring (run_pipeline.py) resolves series_name_runtime from these.

  anxiety:
    domain: anxiety_cluster
    description: "General anxiety patterns and nervous system regulation"
    series_title: "The Alarm Is Lying"
    series_subtitle: "Paths Through the Noise Your Nervous System Made"
    # series_subtitle_mode: controls subtitle treatment for ALL books in this series.
    # none = punchy standalone titles, short = colon-joined tagline, long = separate subtitle field.
    # When absent, mode is derived deterministically from series_id + brand strategy.
    # NOTE: When --location is used, mode should allow subtitle so both engine angle
    # AND location can appear. Use "none" only for non-location runs.
    series_subtitle_mode: long
    search_keywords:
      - anxiety relief
      - calm anxious mind
      - nervous system regulation
    persona_affinity:
      high: [gen_z_professionals, corporate_managers, entrepreneurs]
      medium: [healthcare_rns, working_parents]
    target_installments: 8
    angles:
      - racing_thoughts
      - physical_symptoms
      - anticipatory_dread
      - nighttime_anxiety
      - workplace_anxiety
      - social_situations
      - decision_paralysis
      - chronic_worry

