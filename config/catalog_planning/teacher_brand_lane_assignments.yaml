# ─── ASSIGNMENT SUMMARY ──────────────────────────────────────────────────

summary:
  rule: "1 teacher per brand. Everywhere. Simple."
  taiwan_teacher_mode_exception: >
    Taiwan (zh-TW) carries 13 teacher-mode brands: the usual 12 locale-suffixed rows
    plus bright_presence_tw (Adi Da only). Adi Da does not appear on other lanes.

  brand_lanes: 12
  brands_per_lane_default: 36   # 24 standard + 12 teacher (non-Taiwan lanes)
  brands_per_lane_taiwan: 37    # 24 standard + 13 teacher
  total_brand_instances: 433    # 11 × 36 + 1 × 37

  # ── TEACHER MODE BRANDS (12 per lane; 13 on Taiwan) ─────────────────────
  # Each publishes content from ONE teacher. The brand IS that teacher's voice.
  # Each has a unique persona × topic × emotional_job grouping.
  # Full archetypes: config/catalog_planning/teacher_brand_archetypes.yaml
  teacher_mode_brands:
    count_per_lane_default: 12
    count_per_lane_taiwan: 13
    total: 145                  # 11 × 12 + 13
    base_names:
      - stillness_press       # ahjan        — alarm recognition + forest simplicity / renunciation strands
      - cognitive_clarity     # kenjin       — overthinking_knowledge_worker / zen inquiry (OPD-105: was joshin)
      - somatic_wisdom        # pamela_fellows — high_functioning_perfectionist / polyvagal science
      - qi_foundation         # master_feung — energy_depleted_professional / qi cultivation
      - digital_ground        # miki         — doomscrolling_gen_z / presence without phone
      - heart_balance         # maat         — shadow_work_seeker / truth and balance
      - relational_calm       # miyuki       — shame_carrying_people_pleaser / radical acceptance (OPD-111)
      - warrior_calm          # master_wu    — high_stakes_performer / composure under fire
      - sleep_restoration     # master_sha   — chronic_insomnia_sufferer / energy medicine
      - body_memory           # omote        — unprocessed_grief_carrier / body-centered grief
      - solar_return          # ra           — burnout_survivor_rebuilding / fire as initiation
      - devotion_path         # sai_ma       — love_exhausted_caregiver / devotion turned inward
      - bright_presence       # adi_da       — Taiwan lane only (locale row: bright_presence_tw)

  # ── STANDARD MODE BRANDS (24 per lane) ─────────────────────────────────
  # No teacher association. Persona/archetype-driven content.
  # Automated pipeline: atoms, pen name authors, no teacher voice.
  # Full archetypes: config/catalog_planning/brand_archetype_registry.yaml
  standard_mode_brands:
    count_per_lane: 24
    total: 288                # 12 lanes × 24
    base_names:
      - stabilizer            # burned_out_professional — regulatory calm
      - optimizer             # high_efficiency_achiever — momentum focus
      - night_reset           # insomniac_creative — sleep induction
      - career_lift           # mid_career_stalled — clarity & reflection
      - adhd_forge            # neurodivergent_young_adult — varied energetic
      - longevity_lab         # longevity_seeker — evidence-based optimization
      - creative_unfold       # artistic_student — creative nurturing
      - resilient_parent      # overwhelmed_parent — feel like a person again
      - executive_calm        # corporate_leader — high-performance presence
      - trauma_path           # trauma_recovery_adult — trauma-informed safety
      - spiritual_ground      # spiritually_curious — contemplative presence
      - focus_sprint          # startup_founder — sustain without burning
      - hormone_reset         # women_35_plus — in control of body
      - stoic_edge            # young_male_growth — mental toughness
      - calm_student          # gen_z_student — stop spiraling
      - healing_ground        # chronic_stress_worker — midday reset
      - bio_flow              # biohacker — optimize and feel good
      - confidence_core       # socially_anxious — feel okay showing up
      - relationship_clarity  # couples_repair — repair and reconnect
      - morning_momentum      # early_riser — set for the day
      - minimal_mind          # digital_overwhelm — feel less scattered
      - high_performer        # competitive_sales — confident under pressure
      - gentle_growth         # therapy_newcomer — safe exploring
      - legacy_builder        # 45_plus_reinventor — meaning in next chapter

  lane_suffixes:
    english_global: ""        # no suffix (base brand name)
    dach: "_de"
    france: "_fr"
    spain: "_es"
    italy: "_it"
    latam: "_latam"
    brazil: "_br"
    japan: "_jp"
    korea: "_kr"
    taiwan: "_tw"
    china: "_cn"
    hungary: "_hu"

  # Teacher-mode instances: 12 on each non-Taiwan lane; 13 on Taiwan (Adi Da extra).
  teacher_reach: "145 teacher-mode brand rows (11 lanes × 12 + Taiwan × 13); Adi Da only on Taiwan"
  standard_reach: "24 standard brands × 12 lanes = 288 standard-brand pairs"
  total_reach: "433 brand instances worldwide (11×36 + Taiwan×37)"
