# Teacher × Brand × Platform Lane Assignments
# Authority: Owner directive 2026-04-07
#
# RULE (simple, universal):
#
# 1 TEACHER PER BRAND. Everywhere. No exceptions.
#
# On english_global and lanes 2–9, 11–12: 12 teacher brands (+ 24 standard = 36 per lane).
# Taiwan (lane 10): 13 teacher brands (+ 24 standard = 37) — extra brand bright_presence_tw (Adi Da only).
# Same brand name can appear in multiple lanes (e.g. stillness_press_tw),
# but each brand-instance only ever promotes 1 teacher.
#
# Regional lanes need 36 brands each (12 teacher + 24 standard), except Taiwan: 37 (13 + 24).
# That's fine — the brand admin for each handles promotion.
# Former duplicate forest/simplicity brand merged into stillness_press (ahjan).
#
# Each brand's teacher gets ALL content:
#   audiobooks, manga, video, exercises, freebies — everything.

schema_version: 2

# ─── PLATFORM LANE DEFINITIONS ────────────────────────────────────────────
#
# Each lane is a group of platforms where the SAME catalog is visible.
# Publishing Teacher X on Brand A in Lane 1 means NO other brand in Lane 1
# can publish Teacher X.

# ─── 12 GLOBAL BRAND LANES (addressable markets) ────────────────────────
#
# A "lane" = an addressable market where a brand can build audience.
# 1 teacher per brand per lane. 12 teacher brands + 24 standard = 36 brands per lane
# (Taiwan: 13 + 24 = 37 — see summary).
# 11 lanes × 36 + 1 lane × 37 = 433 total brand instances.
#
# Sources: docs/AUDIOBOOK_LOCALE_CATALOG_MARKETING_PLAN.md,
#          docs/GLOBAL_PERSONA_MARKETING_PLAN.md,
#          research/2026-03-30_europe-latam-persona-topic-market-fit.md

brand_lanes:

  # ── 1. ENGLISH GLOBAL ─────────────────────────────────────────────────
  english_global:
    markets: [US, UK, Canada, Australia, New_Zealand, Ireland, South_Africa]
    locales: [en-US]
    language: English
    platforms: [amazon_kdp, audible_us, google_play_books, apple_books, kobo, spotify_findaway]
    market_size: "$200-350M US self-help audiobook"
    notes: "Biggest lane. Catalog visible across all English-speaking markets."

  # ── 2. DACH ────────────────────────────────────────────────────────────
  dach:
    markets: [Germany, Austria, Switzerland]
    locales: [de-DE]
    language: German
    platforms: [audible_de, amazon_kdp, google_play_books, apple_books, kobo, thalia, storytel]
    market_size: "$705M projected 2030"
    notes: "Largest EU audiobook market. Evidence-based framing required. Audible.de separate from US."

  # ── 3. FRANCE ──────────────────────────────────────────────────────────
  france:
    markets: [France, Belgium_FR, Switzerland_FR]
    locales: [fr-FR]
    language: French
    platforms: [audible_fr, amazon_kdp, google_play_books, apple_books, kobo, storytel]
    market_size: "$330M (23.7% CAGR)"
    notes: "2nd largest manga market outside Japan. Francophone Belgium + Swiss French included."

  # ── 4. SPAIN ───────────────────────────────────────────────────────────
  spain:
    markets: [Spain]
    locales: [es-ES]
    language: "Castilian Spanish"
    platforms: [amazon_kdp, google_play_books, apple_books, kobo, storytel]
    market_size: "57% global Spanish-language audiobook share"
    notes: "Castilian narration. Distinct from LATAM Spanish."

  # ── 5. ITALY ───────────────────────────────────────────────────────────
  italy:
    markets: [Italy]
    locales: [it-IT]
    language: Italian
    platforms: [audible_it, amazon_kdp, google_play_books, apple_books, kobo, storytel]
    market_size: "Fastest-growing EU ebook (11.35% CAGR)"
    notes: "3rd largest EU manga market."

  # ── 6. LATIN AMERICA ──────────────────────────────────────────────────
  latam:
    markets: [Mexico, Colombia, Argentina, Chile, Peru, Ecuador, Venezuela, Central_America]
    locales: [es-419, es-MX]
    language: "Latin American Spanish"
    platforms: [amazon_kdp, google_play_books, apple_books, kobo, spotify_findaway]
    market_size: "$1.21B Spanish audiobook market (45.7% growth)"
    notes: >
      Neutral LATAM Spanish narration (not Castilian). Mexico dominant.
      es-US Hispanic listeners prefer LATAM Spanish. 40%+ webtoon CAGR.

  # ── 7. BRAZIL ──────────────────────────────────────────────────────────
  brazil:
    markets: [Brazil]
    locales: [pt-BR]
    language: "Brazilian Portuguese"
    platforms: [amazon_kdp, audible_br, google_play_books, apple_books, kobo, spotify_findaway, tocalivros, ubook]
    market_size: "6th largest book market globally. +64% audiobook subscriptions (2024)"
    notes: >
      Highest global anxiety prevalence (9.3%, 18.6M people).
      Spiritual/devotional self-help outperforms secular (Café com Deus Pai = #1).
      Opportunity score: 9/10.

  # ── 8. JAPAN ───────────────────────────────────────────────────────────
  japan:
    markets: [Japan]
    locales: [ja-JP]
    language: Japanese
    platforms: [audible_jp, audiobook_jp, amazon_kdp, google_play_books, apple_books, kobo_jp, spotify_findaway]
    market_size: "$426.5M audiobook market"
    notes: "Audible JP separate from US. Strongest manga culture. Record karoshi/MH claims."

  # ── 9. KOREA ───────────────────────────────────────────────────────────
  korea:
    markets: [South_Korea]
    locales: [ko-KR]
    language: Korean
    platforms: [naver_series, millie, kakao_page, ridi, yes24, google_play_books, apple_books, spotify_findaway]
    market_size: "$3.6B digital MH market projected 2035. $1.54B webtoon (18.2% CAGR)"
    notes: "Domestic platforms dominate. Healing (힐링) is dominant wellness keyword."

  # ── 10. TAIWAN ─────────────────────────────────────────────────────────
  taiwan:
    markets: [Taiwan]
    locales: [zh-TW]
    language: "Traditional Chinese (Mandarin)"
    platforms: [readmoo, books_com_tw, kkbox, google_play_books, apple_books, kobo]
    market_size: "$596M mental health market. 40% insomnia prevalence"
    notes: "Readmoo dominant. Tech sector burnout (竹科). KKBox for audio."

  # ── 11. CHINA ──────────────────────────────────────────────────────────
  china:
    markets: [Mainland_China, Hong_Kong, Singapore]
    locales: [zh-CN, zh-HK, zh-SG]
    language: "Simplified + Traditional Chinese"
    platforms: [ximalaya, wechat_read, netease_cloud, dedao, kuaikan, bilibili_comics, qq_comics]
    market_size: "$140B sleep economy projected 2030. 500M+ sleep-disordered"
    notes: >
      Completely isolated (Great Firewall). MCN agent required for mainland.
      HK + SG reachable via Ximalaya branches. One lane covers all three.

  # ── 12. HUNGARY ────────────────────────────────────────────────────────
  hungary:
    markets: [Hungary]
    locales: [hu-HU]
    language: Hungarian
    platforms: [google_play_books, apple_books, kobo, spotify_findaway]
    market_size: "Small but high per-capita audio consumption. Minimal competition."
    notes: "No Audible presence. Underserved = low competition = easy ranking."

