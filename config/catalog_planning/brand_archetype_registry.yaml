# Brand Archetype Registry v1.1
# Canonical schema for 24 en-US brand archetypes. Doctrine-locked; CI-enforced.
# Authority: specs/BRAND_ARCHETYPE_VALIDATOR_SPEC.md
# Use with: brand_registry_locale_extension.yaml (locale-specific brands), brand_teacher_matrix.yaml (teachers per brand).

version: 1.1
registry_type: brand_archetype
total_brands: 25

global_constraints:
  max_mid_form_ratio: 0.25
  required_fields:
    - brand_id
    - admin_id
    - gtm_identity
    - discovery_contract
    - structural_signature
    - duration_strategy
    - emotional_vocabulary
    - voice_identity
    - cover_art_identity
    - pricing_posture
  forbidden_title_tokens:
    - guaranteed
    - instant
    - cure
  emotional_token_global_caps:
    reset: 12
    clarity: 18
    calm: 24
  emotional_token_global_caps_source:
    note: >-
      No external citation — internal engineering defaults for emotional-token quotas.
      Batch 1 (RCG-001–RCG-005) did not validate these numerics.
  max_mid_form_ratio_source:
    note: >-
      No external citation — internal guardrail for mid-form mix in duration_strategy.
      Batch 1 (RCG-001–RCG-005) did not cite this ratio.
  archetype_sketch_demographics_source:
    note: >-
      No external citation — internal brand-facing sketches (age_range, emotional_job,
      functional_job, primary_moment). Production persona IDs and economics: unified_personas.md
      (revenue column is provisional internal SAM per RCG-001).

brand_archetypes:
  # 01 — Stabilizer
  - brand_id: stabilizer
    admin_id: "01"
    gtm_identity:
      persona: burned_out_professional
      age_range: [25, 45]
      primary_moment: evening_wind_down
      emotional_job: calm nervous system
      functional_job: somatic regulation
    discovery_contract:
      primary_channels: [google_play_search]
      keyword_clusters:
        primary: ["nervous system regulation", "burnout recovery"]
        secondary: ["vagus nerve", "somatic calm"]
    structural_signature:
      avg_chapters: [4, 6]
      intro_probability: 0.7
      outro_probability: 0.9
      somatic_slot_probability: 0.8
    duration_strategy:
      micro_sessions: 0.55
      deep_dives: 0.35
      mid_form: 0.10
    emotional_vocabulary:
      allowed_tokens: ["calm", "grounded", "regulation", "safety"]
      quota_exceptions:
        reset: { per_brand_max: 1 }
    voice_identity:
      lead_voice: f_us_31_45_warm
      support_voices:
        - m_uk_31_45_calm
        - f_us_18_30_bright
    cover_art_identity:
      style_pool: ["minimalist_gradient"]
      color_palette: ["muted_blue", "warm_sand"]
    pricing_posture:
      micro_sessions: [3.99, 5.99]
      deep_dives: [17.99, 24.99]
      discount_ratio: 0.20

