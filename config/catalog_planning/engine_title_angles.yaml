# Engine → human-readable title angle phrases.
# Authority: EXPERIENCE_LAYER_ANTI_SPAM_SPEC §16 (metadata consistency)
#
# Problem this solves: The naming engine uses engine_id (e.g. "false_alarm", "spiral")
# as raw keywords in titles when no series_template match is found. These internal
# taxonomy names must NEVER appear in reader-facing metadata.
#
# This file maps each engine_id to:
#   - primary_phrase: the main angle phrase used in titles/subtitles
#   - alt_phrases: 3-5 alternative phrasings for title diversity
#   - subtitle_hook: a reader-facing promise clause specific to this engine's approach
#   - title_tone: the emotional register (calm, urgent, empowering, reflective, precise)
#
# The naming engine should use primary_phrase (or a seeded alt_phrase) wherever
# it would currently use angle_id.replace("_", " ").

schema_version: 1

engine_angles:

  false_alarm:
    primary_phrase: "When Your Mind Screams Danger"
    alt_phrases:
      - "The False Alarm Response"
      - "Why Your Brain Cries Wolf"
      - "When Fear Lies to You"
      - "Misreading the Danger Signal"
    subtitle_hook: "How to Recognize When Anxiety Is a False Alarm — and What to Do Instead"
    title_tone: empowering

