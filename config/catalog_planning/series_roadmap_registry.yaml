  - social_belonging
  - identity_validation
  - crisis_management
  - deep_dive

primary_mechanism_ids:
  - nervous_system_safety
  - shame_reduction
  - comparison_release
  - grief_integration
  - overwhelm_containment
  - false_alarm_reframe
  - watcher_softening
  - spiral_grounding

band_curve_ids:
  - gentle_rise
  - two_peak
  - crisis_landing
  - steady_build
  - wave_cycle

duration_classes:
  - short
  - mid
  - full
