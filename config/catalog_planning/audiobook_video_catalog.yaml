# Audiobook Video Catalog Plan — 13 Teachers × 13 Locales × 24 Channels
# Authority: artifacts/catalog/PHOENIX_OMEGA_MASTER_CATALOG_PLAN.md
# Depends: config/release_velocity/video_cadence.yaml, config/video/audiobook_style.yaml
#
# This config wires the audiobook video pipeline (render_audiobook.py) into the
# global production catalog. Every audiobook gets video derivatives. Every video
# goes through the balanced upload cadence system.

