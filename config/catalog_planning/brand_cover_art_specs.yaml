# Per-brand cover art generation specs for ComfyUI on Pearl Star.
# 4 formats per brand. Each brand visually distinct at thumbnail scale.
# Wired to: brand_identity_system.yaml (colors, colophon, cover_template),
#           brand_lora_plans.yaml (trigger words), brand_illustration_styles.yaml (art style).
schema_version: 1
last_updated: "2026-04-08"

formats:
  kdp_ebook:
    width: 1600
    height: 2560
    aspect: "5:8"
    notes: "Amazon KDP standard. Title top-third, teacher figure center, colophon bottom."
  audiobook_square:
    width: 3200
    height: 3200
    aspect: "1:1"
    notes: "ACX/Findaway/Spotify. Teacher face prominent, title large, brand colophon."
  manga_cover:
    width: 800
    height: 1200
    aspect: "2:3"
    notes: "Webtoon/manga series cover. Dynamic composition, series title, episode badge."
  social_thumb:
    width: 1080
    height: 1080
    aspect: "1:1"
    notes: "YouTube/IG/TikTok thumbnail. High contrast, readable at 120px scale."

generation_defaults:
  steps: 25
  guidance: 3.5
  sampler: euler
  scheduler: normal
  backend: comfyui  # COMFYUI_URL env var

# ─────────────────────────────────────────────────────────────────────────────
# Cover prompt authoring rules — TEXT-FREE FLUX renders + PIL typography overlay
# Lineage: PR #1025 (Phase 2 P0 negative-prompt fix) + PR #1043 V1.1 smoke regression
# Operator memory note: feedback_cover_text_overlay_two_stage
# ─────────────────────────────────────────────────────────────────────────────
# Two-stage cover architecture:
#   Stage 1 (FLUX): renders imagery only — NO title, NO author name, NO subtitle
#   Stage 2 (PIL):  composites typography downstream from per-format slot data
#
# AUTHORING RULES (apply to every cover positive_prompt for all brands):
#   1. NEVER quote literal series titles or book titles inside positive_prompt
#      (FLUX will hallucinate them as embedded typography — see PR #1043 smoke
#      where "The Season After", "Mirror Crush", "Salary Story Hour" leaked).
#   2. Use {title_area} / {colophon_area} placeholders ONLY — these are typography
#      slot descriptions ("upper negative space for typography"), not text content.
#   3. Describe series concept via emotional throughline / palette / composition,
#      NOT via title quotation.
#
# NEGATIVE PROMPT PARITY (every cover render must include this block):
text_free_negative_prompt: >
  text, letters, words, watermark, signature, typography, logo, caption,
  title text, book title text, embedded title, lettering, calligraphy,
  signage, captions, subtitles, font glyphs, latin alphabet typography,
  text characters, font, signs, writing, typography characters
# ─────────────────────────────────────────────────────────────────────────────

brands:
