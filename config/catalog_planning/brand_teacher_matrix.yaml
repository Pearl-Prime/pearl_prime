# Brand × Teacher matrix for Teacher Mode portfolio planning.
# Authority: specs/TEACHER_PORTFOLIO_PLANNING_SPEC.md
#            config/catalog_planning/teacher_brand_lane_assignments.yaml
#
# RULE: 1 primary teacher per brand per platform lane.
# See teacher_brand_lane_assignments.yaml for full lane mapping.
#
# This file defines the GLOBAL WEST lane brands (the primary lane).
# Each brand here has ONE primary teacher who gets all content.

defaults:
  max_books_per_wave: 12
  release_spacing_days: 14
  max_books_per_brand_per_month: 40

# ─── GLOBAL WEST BRANDS (1 teacher each) ─────────────────────────────────
# These publish on: Google Play, Apple Books, Kobo, Spotify, KDP, Audible US

brands:
  stillness_press:
    primary_teacher: ahjan
    teachers: [ahjan]
    topic_focus:
      - anxiety
      - self_worth
      - impermanence
      - alarm_systems
      - pausing
      - forest_refuge
      - simplicity
      - renunciation
    content: [audiobooks, manga, video, exercises, freebies]

  cognitive_clarity:
    primary_teacher: kenjin
    teachers: [kenjin]
    topic_focus: [zen, direct_pointing, sitting, koans, self_inquiry]
    content: [audiobooks, manga, video, exercises, freebies]

  somatic_wisdom:
