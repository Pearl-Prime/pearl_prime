# Teacher × topic and teacher × persona fit scores.
# Authority: specs/TEACHER_UNIVERSAL_AND_SCORING_SPEC.md
# Every teacher can teach every topic and persona; scores guide volume and format.
# Missing (teacher, topic) or (teacher, persona) → default_score (0.5).

schema_version: "1.0"
default_score: 0.5   # When a pair has no score
composite_formula: average   # average | min | weighted
score_bands:
  strong: { min: 0.7, max: 1.0 }   # Full allocation; any format
  medium: { min: 0.4, max: 0.7 }   # Normal allocation; standard formats
  weak:   { min: 0.0, max: 0.4 }   # Fewer books; prefer shorter formats

# Format preference when score is in weak band
weak_fit_prefer_shorter_format: true
weak_fit_max_books_per_triple: 1   # Cap books per (teacher, topic, persona) when weak

# Per-teacher topic and persona scores (0.0–1.0). Omit topic/persona = use default_score.
teachers:
  ahjan:
    topic_scores:
      anxiety: 0.9
      self_worth: 0.9
      shame: 0.85
      grief: 0.85
      compassion_fatigue: 0.8
      boundaries: 0.85
      courage: 0.8
      depression: 0.75
      financial_stress: 0.8
      burnout: 0.7
      # ... other topics default to 0.5
      # P0/P1 backfill 2026-04-29 (Issue #777 — adhd_focus, mindfulness, educators + ahjan extras)
      adhd_focus: 0.74    # P0 — focus practice fits stillness, mainstream-topic conservative band
      financial_anxiety: 0.78    # P1 — anxiety extension; stillness brand handles anxiety subtypes
      imposter_syndrome: 0.78    # P1 — self-worth (existing 0.9) adjacent
      mindfulness: 0.85    # P0 — stillness IS mindfulness (canonical for stillness_press brand)
      overthinking: 0.85    # P1 — canonical stillness territory (anxiety 0.9 anchor)
      sleep_anxiety: 0.78    # P1 — anxiety extension
      social_anxiety: 0.78    # P1 — anxiety extension
      somatic_healing: 0.72    # P1 — adjacent (somatic_healing is more pamela_fellows/omote canonical)
    persona_scores:
      tech_finance_burnout: 0.85
      healthcare_rns: 0.8
      gen_z_professionals: 0.85
      millennial_women_professionals: 0.8
      # ... other personas default to 0.5

      # P0/P1 backfill 2026-04-29 (Issue #777 — adhd_focus, mindfulness, educators + ahjan extras)
      corporate_managers: 0.78    # P1 — high-stress demographic, stillness brand fit
      educators: 0.78    # P0 — high-stress professional fit (general wellness)
      entrepreneurs: 0.78    # P1 — high-stress demographic
      first_responders: 0.78    # P1 — high-stress; stillness has frontline applications
      gen_alpha_students: 0.62    # P1 — weak fit (younger demographic), allow strong-topic crossover only
      gen_x_sandwich: 0.78    # P1 — high-stress sandwich-generation demographic
      gen_z_student: 0.78    # P1 — mirrors gen_z_professionals (existing 0.85), slightly lower for student
      working_parents: 0.78    # P1 — high-stress parent demographic
