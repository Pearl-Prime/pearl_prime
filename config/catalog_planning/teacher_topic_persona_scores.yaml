# Teacher × topic and teacher × persona fit scores.
# Authority: specs/TEACHER_UNIVERSAL_AND_SCORING_SPEC.md
# Every teacher can teach every topic and persona; scores guide volume and format.
# Missing (teacher, topic) or (teacher, persona) → default_score (0.5).

schema_version: "1.0"
default_score: 0.5   # When a pair has no score
composite_formula: average   # average | min | weighted
score_bands:
  strong: { min: 0.7, max: 1.0 }   # Full allocation; any format
  medium: { min: 0.4, max: 0.7 }   # Normal allocation; standard formats
  weak:   { min: 0.0, max: 0.4 }   # Fewer books; prefer shorter formats

# Format preference when score is in weak band
weak_fit_prefer_shorter_format: true
weak_fit_max_books_per_triple: 1   # Cap books per (teacher, topic, persona) when weak

# Per-teacher topic and persona scores (0.0–1.0). Omit topic/persona = use default_score.
teachers:
  ahjan:
    topic_scores:
      anxiety: 0.9
      self_worth: 0.9
      shame: 0.85
      grief: 0.85
      compassion_fatigue: 0.8
      boundaries: 0.85
      courage: 0.8
      depression: 0.75
      financial_stress: 0.8
      burnout: 0.7
      # ... other topics default to 0.5
    persona_scores:
      tech_finance_burnout: 0.85
      healthcare_rns: 0.8
      gen_z_professionals: 0.85
      millennial_women_professionals: 0.8
      # ... other personas default to 0.5

  maat:
    topic_scores:
      anxiety: 0.75
      self_worth: 0.9
      shame: 0.85
      grief: 0.8
      boundaries: 0.85
      courage: 0.8
    persona_scores: {}   # All default 0.5

  adi_da:
    topic_scores:
      anxiety: 0.85       # contraction observation directly addresses anxiety
      self_worth: 0.8     # prior freedom + the Bright as inherent nature
      shame: 0.75         # contraction as self-protection, not moral failure
      grief: 0.85         # loss as dissolution of the separate self's boundaries
      boundaries: 0.8     # relationship as mirror; contraction vs openness
      burnout: 0.7        # seeking/striving as exhaustion of the self
      depression: 0.7     # contraction as withdrawal; Bright as what remains
      overthinking: 0.8   # seeking-mind loop; recognition stops the loop
      courage: 0.65       # vulnerability as absence of contraction
      compassion_fatigue: 0.65  # service practice + conductivity
      # financial_stress, financial_anxiety, sleep_anxiety, social_anxiety,
      # imposter_syndrome, somatic_healing: default 0.5 (weaker doctrinal fit)
    persona_scores:
      gen_z_professionals: 0.75       # seeking/achievement critique resonates
      tech_finance_burnout: 0.7       # striving/seeking loop directly addressed
      millennial_women_professionals: 0.7  # relationship-as-mirror teaching
