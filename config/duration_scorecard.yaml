# Duration Adherence Scorecard — config
# Read-only measurement: how well pipeline outputs hit planned duration/word-count targets.
# Follows platform_health_scorecard.yaml pattern.

duration_adherence_scorecard:
  # Composite weights (must sum to 1.0)
  weights:
    word_adherence: 0.30
    duration_adherence: 0.25
    slot_budget_adherence: 0.20
    chapter_adherence: 0.15
    arc_fidelity: 0.10

  # Grade thresholds (composite score)
  grades:
    A: 0.90
    B: 0.80
    C: 0.70
    D: 0.60
    # Below D = F

  # Per-slot word budget ceilings (from WRITER_SPEC §12)
  slot_word_ceilings:
    HOOK: 36
    SCENE: 50           # ~10 words/beat × 5 beats typical
    STORY: 400          # varies by tier; use 400 as generous ceiling
    REFLECTION:
      S: 220
      A: 200
      B: 180
      C: 120
      D: 80
    EXERCISE: 60        # ~10 words/instruction × 6 instructions typical
    INTEGRATION:
      min: 80
      max: 200
    COMPRESSION: 150
    PIVOT: 40
    TAKEAWAY: 20
    PERMISSION: 30
    THREAD: 25

  # TTS WPM estimate (standard audiobook pace)
  tts_wpm: 150

  # Ebook reading-edition WPM (DURATION-DERIVATION-01, docs/DURATION_DERIVATION_SPEC.md §4.3).
  # Single source of truth for the ebook word->minute conversion; consumed by
  # phoenix_v4/ops/duration_derivation.py (audiobook uses tts_wpm above). 230 = the
  # conventional reading rate the duration audit used.
  ebook_wpm: 230

  # Duration tolerance (±% of target considered "adherent")
  duration_tolerance_pct: 10

  # Worst offenders list size
  worst_offenders_count: 10

  # Output directory
  output_dir: artifacts/ops
