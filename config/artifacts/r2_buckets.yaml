# Phoenix Omega — Cloudflare R2 bucket layout
# Single source of truth for bucket names + key conventions.
# Read by scripts/artifacts/r2_sync.py and scripts/artifacts/setup_r2.sh.
#
# Free tier: 10 GB storage, 1M class A ops/mo, 10M class B ops/mo, $0 egress.
# Phoenix Omega Layer 2 sized to fit comfortably inside free tier:
#   - 96 books × ~50 MB rendered = ~4.8 GB
#   - 289 character portraits × ~2 MB = ~580 MB
#   - QA-run snapshots: rotated, capped at ~1 GB total
#   - Total target: ~6.5 GB sustained, with 3.5 GB headroom

schema_version: "1.0.0"

# ── Account scope ───────────────────────────────────────────────────────────
# Account ID is read from $CLOUDFLARE_ACCOUNT_ID at runtime; never committed.
endpoint_url_template: "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"

# ── Buckets ─────────────────────────────────────────────────────────────────
# One bucket, prefixed namespaces. Cheaper to manage than per-namespace buckets,
# and R2 free tier counts buckets toward an undocumented limit.
buckets:
  artifacts:
    name: "phoenix-omega-artifacts"
    description: |
      Canonical store for binary artifacts produced by Phoenix Omega
      pipelines. Repo holds only manifests with sha256 + R2 keys.
    public: false                          # signed URLs only; never public
    cors_allowed_origins:                  # for direct upload from Codespaces
      - "https://*.github.dev"
      - "https://*.app.github.dev"
      - "https://github.com"
    lifecycle_rules:
      - prefix: "qa_runs/"
        expire_days: 30                    # rotate QA snapshots monthly
      - prefix: "tmp/"
        expire_days: 1                     # scratch namespace

# ── Key conventions ────────────────────────────────────────────────────────
# All keys follow: <namespace>/<series_or_run>/<asset>
# Manifest in repo points at exact keys — no prefix scans at runtime.
namespaces:
  manga_rendered_books:
    prefix: "manga/rendered_books/"
    pattern: "manga/rendered_books/{series_id}/{book_id}/{asset_filename}"
    examples:
      - "manga/rendered_books/stillness_press__ahjan__gen_z__anxiety/ep_001/page_01.png"
      - "manga/rendered_books/stillness_press__ahjan__gen_z__anxiety/ep_001/cover.png"
    produced_by: ["pearl-star", "codespaces"]
    consumed_by: ["uploader_kdp_comics", "uploader_webtoon_canvas"]

  manga_portraits:
    prefix: "manga/portraits/"
    pattern: "manga/portraits/{character_id}/{variant}.png"
    examples:
      - "manga/portraits/hana_tidecalm/main.png"
      - "manga/portraits/hana_tidecalm/profile_3q.png"
    produced_by: ["pearl-star"]
    consumed_by: ["panel_compositor", "dashboard_renderer"]

  pearl_prime_qa_runs:
    prefix: "qa_runs/"
    pattern: "qa_runs/{date}/{run_id}/{book_id}/{asset_filename}"
    examples:
      - "qa_runs/2026-04-25/draft-profile-100/book_007/full_book.epub"
    produced_by: ["pearl-star", "github-actions"]
    consumed_by: ["pearl_editor"]
    lifecycle: "rotated 30d via lifecycle_rules"

  brand_assets:
    prefix: "brand/"
    pattern: "brand/{brand_id}/{asset_type}/{filename}"
    examples:
      - "brand/stillness_press/logo/primary.svg"
      - "brand/stillness_press/cover_templates/manga_kdp.psd"
    produced_by: ["operator", "pearl-star"]
    consumed_by: ["uploader_kdp_comics", "uploader_webtoon_canvas"]

  tmp:
    prefix: "tmp/"
    pattern: "tmp/{session_id}/{filename}"
    description: "Scratch namespace, auto-purged after 24h"
    produced_by: ["any"]
    consumed_by: ["any"]
    lifecycle: "expire 1d"

  social_media_voice_bank:
    prefix: "social_media/voice_bank/"
    pattern: "social_media/voice_bank/{run_id}/mp3/{locale}/{persona}/{topic}/{atom_id}.mp3"
    examples:
      - "social_media/voice_bank/20260719/mp3/en-US/corporate_managers/anxiety/EVG-ENUS-ANXI-CORP-SS-01.mp3"
    produced_by: ["pearl-star"]
    consumed_by: ["tiktok_reel_assembly", "pearl_marketing"]
    notes: "Evergreen social atom CosyVoice MP3 bank; selection via config/tts/social_media_voice_matrix.yaml"

# ── Authentication mode ────────────────────────────────────────────────────
# R2 supports two auth modes:
#   1. Cloudflare API token (account-level) — used by wrangler CLI
#   2. R2 access keys (S3-compatible) — used by boto3 / Phoenix Omega scripts
#
# Phoenix Omega uses mode 2 because it's identical on Codespaces,
# GitHub Actions, and Pearl Star (no node CLI required on the rig).
auth:
  mode: "s3_compatible"
  required_env:
    - CLOUDFLARE_ACCOUNT_ID
    - R2_ACCESS_KEY_ID
    - R2_SECRET_ACCESS_KEY
  optional_env:
    - R2_BUCKET_OVERRIDE              # for testing against a separate bucket
  obtain_creds_at: "https://dash.cloudflare.com/?to=/:account/r2/api-tokens"

# ── Local cache ────────────────────────────────────────────────────────────
# Codespaces / Pearl Star can cache pulled artifacts under artifacts/r2_cache/
# (gitignored). r2_sync.py respects sha256 — re-pull only if stale.
local_cache:
  dir: "artifacts/r2_cache/"
  max_size_gb: 5                        # well under Codespaces 15 GB cap

# ── Manifest convention ────────────────────────────────────────────────────
# Every artifact set in the repo lives as a YAML manifest under:
#   artifacts/manifests/<namespace>/<series_or_run>/<set_id>.yaml
# Schema: schemas/artifacts/manifest.schema.json
manifests:
  dir: "artifacts/manifests/"
  schema: "schemas/artifacts/manifest.schema.json"
