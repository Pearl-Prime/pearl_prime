# topic_engine_bindings.yaml
# Phoenix Omega V4 — Topic Engine Bindings
# Hard gate: which engines/roles are allowed per topic
# Aligned with Full Story Completion Spec engine routing

---

anxiety:
  allowed_engines:
    - false_alarm
    - spiral
    - watcher
    - overwhelm
    - shame
    - comparison
    - grief
  required_roles:
    - recognition
    - mechanism_proof
    - turning_point
    - embodiment
  optional_roles: []
  forbidden_engines: []
  forbidden_roles: []
  notes: "Full engine set. Body reacts without danger, thought chains, detachment, saturation, self-as-problem, relative position, absence made present."

boundaries:
  allowed_engines:
    - shame
    - comparison
    - false_alarm
  required_roles:
    - recognition
    - mechanism_proof
    - turning_point
    - embodiment
  optional_roles: []
  forbidden_engines:
    - spiral
    - watcher
    - overwhelm
    - grief
  forbidden_roles: []
  notes: "Limit-setting blocked by exposure fear, measuring against others' limits, body alarm on saying no."

financial_stress:
  allowed_engines:
    - overwhelm
    - spiral
    - shame
  required_roles:
    - recognition
    - mechanism_proof
    - turning_point
    - embodiment
  optional_roles: []
