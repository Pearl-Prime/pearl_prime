# Fixed benchmark copy for fair narrator comparisons (same text across voices).
# Locale keys: en-US (default). Extend with ja-JP, zh-TW when localized audio ships.
# Authority: specs/ONBOARDING_TTS_EXAMPLES_AND_AUTHOR_VOICE_ALIGNMENT_SPEC.md (when merged).

locales:
  en-US:
    comfort: >-
      Take a slow breath. You are not behind. Whatever today asked of you,
      you are here now, and that is enough for this moment.
    authority: >-
      This work is grounded in research and long experience with people under
      real stress. When a practice is recommended here, it is because it has
      held up when life was loud.
    instruction: >-
      Place both feet flat. Inhale for four counts. Hold gently for four.
      Exhale for six. Repeat three times, then notice what changed in your shoulders.
    hope: >-
      Change rarely arrives as a lightning bolt. It comes as a small clearing,
      then another. You are allowed to move at the pace your nervous system can trust.
    cta: >-
      When you are ready, start with one short chapter. You can close the book
      and return anytime. The next step is smaller than you think.
