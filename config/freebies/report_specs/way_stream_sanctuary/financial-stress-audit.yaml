schema_version: 1
brand_id: way_stream_sanctuary
source_page_slug: financial-stress-audit
topic: financial_stress
freebie_id: journal_reflection_v1
quiz_id: financial_stress_audit
completion_copy: You completed the audit.
report_title: Your Financial Stress Report
report_sections:
- id: completion_reflection
  purpose: Acknowledge the completed tool and mirror the user's effort.
- id: answer_pattern
  purpose: Summarize answer themes without exposing raw private text in previews.
- id: somatic_signal
  purpose: Name a possible body cue.
- id: nervous_system_cue
  purpose: Offer one regulation-oriented next cue.
- id: psychological_reflection
  purpose: Frame the pattern as reflective, not diagnostic.
- id: spiritual_question
  purpose: Offer a gentle inquiry without deterministic prediction.
- id: next_week_reflective_forecast
  purpose: Which security action may calm the story without shaming you.
- id: recommended_practice
  purpose: Do one practical step, then stop rehearsing the worst case for ten minutes.
insight_logic:
  inputs:
  - answers_json
  - score
  - score_band
  - result_summary
  method: Combine score/result bands with answer themes; if answers are sparse, use the completion state
    and topic default.
delivery_opening: You completed the audit. Here is the Waystream report your tool unlocked.
cta_copy: Send my personalized report
claims_boundary: Educational and reflective only; not clinical advice, not therapy replacement, and no
  healing, financial result, or medical promise.
