# Post-capture nurture asset mix — PDF budget and workbook gates.
# Authority: docs/FUNNEL_EMAIL_AUTOMATION_MAP.md + freebie build plan.

schema_version: 1

pre_purchase:
  pdf_slot_target_ratio: 0.35
  pdf_allowed_types:
    - checklist_pdf
    - identity_sheet_pdf
    - conversation_scripts_pdf
  pdf_allowed_slots:
    - bonus_pre_story
    - bonus_post_series
  workbook_allowed: false
  forbidden_pre_purchase_types:
    - companion_workbook_pdf
    - journal_pdf
    - thirty_day_tracker_pdf
    - environment_guide_pdf

post_purchase:
  buyer_tag_required: true
  buyer_tag: buyer
  workbook_types:
    - companion_workbook_pdf
    - journal_pdf
    - thirty_day_tracker_pdf
    - environment_guide_pdf

email_slot_defaults:
  e1: [somatic_html_tool, assessment_html]
  e2: [somatic_html_tool]
  bonus_pre_story: [guided_audio, checklist_pdf, identity_sheet_pdf]
  e3: []
  e4: []
  e5: []
  bonus_post_series: [checklist_pdf, identity_sheet_pdf, conversation_scripts_pdf]
  post_purchase: [checklist_pdf, identity_sheet_pdf, companion_workbook_pdf, journal_pdf]

# Reference WF1 pre-purchase sequence for PDF ratio gate (~35% budget)
reference_pre_purchase_sequence:
  - { slot: e1, format: interactive }
  - { slot: e2, format: somatic }
  - { slot: bonus_pre_story, format: pdf }
  - { slot: e3, format: story }
  - { slot: e4, format: offer }
  - { slot: e5, format: catalog }
  - { slot: bonus_post_series, format: pdf }
