# Freebie selection rules — Phase 1: hard rules only, deterministic.
# Authority: specs/PHOENIX_FREEBIE_SYSTEM_SPEC.md
# No density logic, no wave math, no reseed. Phase 3 = anti-spam/density/CTSS.

# Rule 1 — Companion: attach companion_workbook_pdf when book_duration_minutes >= 60
companion_rule:
  min_duration_minutes: 60
  freebie_type: companion_workbook_pdf
  mandatory: true

# Rule 1b — Companion workbook TYPE classification
# Authority: specs/COMPANION_WORKBOOK_CATALOG_SPEC.md §2
# Freebie planner resolves companion_workbook_type: full | light_guide | none
# and emits platform content fields from config/freebies/companion_workbook_platform_content.yaml
companion_workbook_type_rules:
  full:
    min_duration_minutes: 90
    domains: [shame_cluster, grief_cluster, anxiety_cluster]
    # For series: only specific installments get full workbooks
    required_installments_full: [1, 3, 5]  # null = all installments eligible
    description: "Full 80–120 page workbook; marketed as bundle; separate platform listing"

  light_guide:
    min_duration_minutes: 60  # 60–89 min, OR ≥90 min but domain not in full list
    domains: [spiritual_general, leadership_general]
    description: "30–50 page practice guide; download freebie; not a separate platform listing"

  none:
    # Books shorter than 60 min, or in narrative/primer domains
    domains: [narrative_spiritual, topic_primers]
    description: "No companion workbook"

# Rule 2 — Somatic: if book has >= 1 EXERCISE slot, attach exactly one somatic_html_tool
somatic_rule:
  freebie_type: somatic_html_tool
  max_per_book: 1
  trigger_slot: EXERCISE

# Rule 3 — Assessment: if engine in anxiety | burnout | shame, attach assessment_html
assessment_rule:
  freebie_type: assessment_html
  engines: [shame, false_alarm, spiral, overwhelm, watcher, comparison, grief]
  max_per_book: 1

# Rule 4 & 5 — Persona prioritization (which compatible freebie to pick)
# executive → prefer tool_style: structured; gen_z → prefer tool_style: interactive
persona_priorities:
  structured: [nyc_executives, healthcare_rns, educators]
  interactive: [gen_z_professionals, gen_alpha_students]

# Slug formula: {topic}-{persona}-{primary_freebie} (e.g. burnout-gen_z_professional-breath_reset)
# Primary freebie = first in bundle (deterministic sort by freebie_id).

# --- Phase 3 (scale hardening) ---
anti_cluster:
  identical_bundle_ratio_max: 0.40
  identical_cta_ratio_max: 0.50
  identical_slug_pattern_ratio_max: 0.60

# --- Series-aware (V4 Immersion Ecosystem); planner receives series_context ---
series_aware:
  guided_audio:
    anti_cluster: true
    max_per_series: 1
  companion_workbook_pdf:
    # Full workbook only on installments 1, 3, 5 — others get light_guide per duration rule
    required_installments_full: [1, 3, 5]
