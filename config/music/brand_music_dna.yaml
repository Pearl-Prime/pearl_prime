# Brand Music DNA — 24 Unique Sonic Signatures for Anti-Spam
# Each channel gets a unique combination of 7 parameters that transforms base tracks
# into brand-specific audio that defeats platform fingerprint matching.
#
# Authority: artifacts/research/therapeutic_music_bank_system_2026_04_06.md
# See also: config/video/channel_registry.yaml, config/music/exercise_music_mapping.yaml
#
# DESIGN CONSTRAINTS:
# 1. No two brands share the same (key_offset + bpm_multiplier) combination
# 2. Brand families (calm_healing, bold_dynamic, abstract_symbolic, hybrid_experimental)
#    share broad tonal tendencies but differ in specifics
# 3. Every parameter must be subtle enough to preserve therapeutic intent
# 4. Every parameter must be strong enough to defeat Shazam-class fingerprinting
# 5. The combination of all 7 parameters makes collision probability negligible

schema_version: "1.0.0"

# ─────────────────────────────────────────────────────────────────────────────
# FFmpeg TRANSFORM TEMPLATE
# Applied to every base track to produce the brand-specific version.
# ─────────────────────────────────────────────────────────────────────────────
#
# ffmpeg -i base.mp3 \
#   -af "asetrate=44100*{pitch_factor}, \
#        atempo={tempo_factor}, \
#        equalizer=f={eq_low_freq}:t=q:w=1.5:g={eq_low_gain}, \
#        equalizer=f={eq_mid_freq}:t=q:w=1.0:g={eq_mid_gain}, \
#        equalizer=f={eq_high_freq}:t=q:w=1.5:g={eq_high_gain}, \
#        aecho={reverb_delay}:{reverb_decay}:60:0.3, \
#        stereotools=balance_i={stereo_balance}:sbal={stereo_width}" \
#   -i texture_overlay.mp3 \
#   -filter_complex "[0:a][1:a]amix=inputs=2:weights=10 {texture_weight}" \
#   output.mp3

# ─────────────────────────────────────────────────────────────────────────────
# BRAND DNA DEFINITIONS
# ─────────────────────────────────────────────────────────────────────────────

brands:

  # ── CALM & HEALING (ch_001-006) ──────────────────────────────────────────

  ch_001:
    channel_name: "Soft Ghibli-esque"
    brand_id: stillness_press
    style_family: calm_healing
    key_offset_semitones: 0      # C reference (no shift)
    bpm_multiplier: 1.00         # no tempo change
    eq_profile:
      low_freq_hz: 80
      low_gain_db: 2             # warm low-end boost
      mid_freq_hz: 1200
      mid_gain_db: 1             # gentle presence
      high_freq_hz: 6000
      high_gain_db: -1           # soft rolled-off highs
    reverb:
      delay_ms: 80
      decay: 0.45                # medium room, warm
    stereo:
      width: 1.1                 # slightly wider than center
      balance: 0.0               # centered
    texture_overlay: "vinyl_warm"
    texture_weight: 0.08         # very subtle
    notes: "Warm, cozy, slightly vintage. Ghibli-inspired pastoral warmth."

  ch_002:
