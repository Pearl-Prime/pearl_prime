# ─────────────────────────────────────────────────────────────────────────────
# VOLUME MIXING — exercise music sits UNDER the voice
# ─────────────────────────────────────────────────────────────────────────────

mixing:
  music_volume_db: -18  # music sits well below voice
  voice_volume_db: 0    # reference level
  ducking:
    enabled: true
    attack_ms: 200      # fade music down when voice starts
    release_ms: 800     # fade music back up when voice pauses
    duck_amount_db: -6  # additional reduction during speech
  fade_in_ms: 3000      # music fades in at start of exercise
  fade_out_ms: 5000     # music fades out at end

# ─────────────────────────────────────────────────────────────────────────────
# R2 PATH TEMPLATE
# ─────────────────────────────────────────────────────────────────────────────

r2_path_template: "exercises/{music_group}/{topic}/{temperature}/{brand_id}/track.mp3"
r2_base_url: "https://music.phoenix-omega.com"
fallback_path: "base/contemplative/anxiety/neutral/base.mp3"
