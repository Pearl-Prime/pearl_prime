    breath: { breath_swell_rate_per_min: 6, key_preference: "G minor Dorian" }
    grounding: { bpm_offset: 0, key_preference: "D Dorian" }
    contemplative: { key_preference: "per temperature profile" }
    affirming: { bpm_offset: +2, key_preference: "Bb major", warmth_boost_db: 3 }

  compassion_fatigue:
