# Pearl Practice — Exercise Type x Topic → Music Profile Mapping
# Each exercise type maps to a music_group, which determines base sonic characteristics.
# The topic x temperature then selects the specific harmonic/tonal profile from
# config/music/therapeutic_music_prompts.yaml.
#
# Authority: artifacts/research/therapeutic_music_bank_system_2026_04_06.md
# See also: config/pearl_practice/exercise_dimensions.yaml

schema_version: "1.0.0"

# ─────────────────────────────────────────────────────────────────────────────
# MUSIC GROUPS — exercise types with similar sonic needs share a music group.
# Each group defines base characteristics that are then colored by topic/temp.
# ─────────────────────────────────────────────────────────────────────────────

music_groups:

  stillness:
    description: "No pulse, pure drone/texture, minimal. For exercises focused on deep internal awareness."
    exercise_types:
      - body_awareness
      - self_inquiry
    base_characteristics:
      bpm: null  # no rhythmic pulse
      texture: "ultra-smooth continuous drone, warm blanket quality"
      instruments_allow:
        - deep warm pad
        - sine-wave layers
        - room-tone hum
        - gentle reverb tail
        - distant shimmer
      instruments_avoid:
        - drums
        - percussion
        - rhythmic elements
        - chimes
        - bells
        - melodic phrases
        - plucked strings
      frequency_emphasis: "low (80-300 Hz body resonance), theta 4-8 Hz undertone"
      dynamic_range_db: 3  # nearly flat — no swells, no movement
      loop_crossfade_ms: 5000  # extra-long crossfade for imperceptible loop

  breath:
    description: "Breath-synced swells, specific cycle timing. For exercises that regulate breathing."
    exercise_types:
      - breath_regulation
    base_characteristics:
      bpm: null  # no beat; use breath-rate swell instead
      breath_swell_rate_per_min: 6  # ~10s inhale/exhale cycle
      texture: "slow swelling pads synced to breath cycle, predictable, no surprises"
      instruments_allow:
        - warm synth pad
        - soft sine layers
        - sub-bass breath pulse
        - gentle LFO pad
      instruments_avoid:
        - drums
        - percussion
        - melodic hooks
        - rhythmic complexity
        - sudden changes
        - bright leads
      frequency_emphasis: "low-mid (100-500 Hz body resonance), theta-alpha 6-12 Hz"
      dynamic_range_db: 6  # gentle swell for breath sync
      loop_crossfade_ms: 3000

  grounding:
    description: "Earthy, steady, anchoring. For exercises that connect to the present moment and physical body."
    exercise_types:
      - sensory_grounding
      - integration_bridges
    base_characteristics:
      bpm: 62  # default; overridden by topic
      bpm_range: [58, 78]
      texture: "steady earthy presence, grounded low-end, subtle organic textures"
      instruments_allow:
        - earth-tone drone
        - muted plucked strings
        - warm pad
        - gentle bass tone
        - soft nature-adjacent texture
        - clear warm overtones
      instruments_avoid:
        - bright leads
        - prominent melody
        - anything demanding attention
        - chaotic textures
      frequency_emphasis: "low-mid grounding (100-800 Hz), alpha 8-13 Hz"
      dynamic_range_db: 4
      loop_crossfade_ms: 3000
    # Integration bridges get slightly higher BPM and brighter tone
    exercise_overrides:
      integration_bridges:
        bpm_offset: +6  # gently activating for re-entry
        brightness_boost_db: 1.5  # slightly brighter overtones

  contemplative:
    description: "Spacious, open, non-directive. For exercises requiring sustained present-moment awareness or creative imagination."
    exercise_types:
      - meditations
      - reflections
      - thought_experiments
    base_characteristics:
      bpm: 62  # default; heavily overridden by topic x temperature
      bpm_range: [40, 80]
      texture: "continuous ambient wash, spacious, open, non-directive"
      instruments_allow:
        - warm pads
        - distant bells
        - gentle drones
        - soft reverb tails
        - floating FM bells
        - dreamy pluck
      instruments_avoid:
        - verse-chorus structure
        - lyrical content
        - sharp transients
        - rhythmic loops
      frequency_emphasis: "full spectrum, topic-dependent"
      dynamic_range_db: 5
      loop_crossfade_ms: 4000
    # Reflections get warmer, more intimate tone
    exercise_overrides:
      reflections:
        bpm_offset: -2  # slightly slower, more spacious
        warmth_boost_db: 2  # more intimate, room-temperature
        instruments_add:
          - soft vinyl texture
          - distant muted piano
      # Thought experiments get dreamier, more floating quality
      thought_experiments:
        bpm_offset: -4  # dream pace
        instruments_add:
          - floating FM bell
          - dreamy harp pluck
          - shimmer layer
        instruments_remove:
          - earth-tone drone  # too grounding for imagination
          - heavy bass  # too anchoring
        frequency_shift: "mid-high emphasis (500-6000 Hz floating quality)"

  affirming:
    description: "Warm, gently uplifting, supportive. For exercises that reinforce positive self-statements."
    exercise_types:
      - affirmations
    base_characteristics:
      bpm: 72  # default; overridden by topic
      bpm_range: [65, 82]
      texture: "warm, gently uplifting, golden/bright quality, subtle harmonic shimmer"
      instruments_allow:
        - warm pad
        - soft piano harmonics
        - light bells
        - gentle bass
        - golden shimmer
      instruments_avoid:
        - dark textures
        - dissonance
        - heavy bass
        - mournful tones
        - sad/minor drones
      frequency_emphasis: "mid-high warmth (300-4000 Hz), alpha-beta 10-15 Hz"
      dynamic_range_db: 4
      loop_crossfade_ms: 3000

# ─────────────────────────────────────────────────────────────────────────────
# EXERCISE TYPE → MUSIC GROUP LOOKUP (convenience index)
# ─────────────────────────────────────────────────────────────────────────────

exercise_to_music_group:
  breath_regulation: breath
  body_awareness: stillness
  sensory_grounding: grounding
  meditations: contemplative
  affirmations: affirming
  reflections: contemplative
  self_inquiry: stillness
  integration_bridges: grounding
  thought_experiments: contemplative

# ─────────────────────────────────────────────────────────────────────────────
# TOPIC x MUSIC GROUP MODIFICATIONS
# These modify the base music group characteristics when paired with a topic.
# The temperature profile comes from therapeutic_music_prompts.yaml.
# ─────────────────────────────────────────────────────────────────────────────

topic_modifiers:

  anxiety:
    stillness: { frequency_shift: "theta 4-7 Hz emphasis", key_preference: "E minor" }
    breath: { breath_swell_rate_per_min: 6, key_preference: "E minor → F Lydian" }
    grounding: { bpm_offset: -2, key_preference: "A minor pentatonic" }
    contemplative: { key_preference: "per temperature profile" }
    affirming: { bpm_offset: -3, warmth_boost_db: 2, key_preference: "F major" }

  grief:
    stillness: { frequency_shift: "delta-theta 2-5 Hz", key_preference: "Eb minor" }
    breath: { breath_swell_rate_per_min: 5, key_preference: "Ab minor" }
    grounding: { bpm_offset: -5, key_preference: "F minor Dorian" }
    contemplative: { key_preference: "per temperature profile" }
    affirming: { bpm_offset: -5, key_preference: "Db major", warmth_boost_db: 3 }

  burnout:
