# PHASE-2 POPULATION (additive, 2026-06-12) — wiring contract + worked commented examples
# Authored under cap MUSIC-ONBOARDING-SONG-KIT-V1-01 (docs/PEARL_ARCHITECT_STATE.md), spec §5.
# Companion doc: config/music/youtube_freebie_bridge.README.md (the wiring README).
#
# CREDENTIAL REALITY (verified against docs/INTEGRATION_CREDENTIALS_REGISTRY.md §13 on 2026-06-12):
#   §13 "YouTube — Video publishing (per brand: SP, CC, ND)" Status = "Missing — credentials not
#   yet provisioned". Env vars YT_CLIENT_ID_{SP,CC,ND} / YT_CLIENT_SECRET_* / YT_REFRESH_TOKEN_*
#   are DOCUMENTED but NOT provisioned; consumed by scripts/video/uploaders/youtube.py via
#   workflow video-daily-publish.yml. THEREFORE: no live YT upload/poll is wired here. The actual
#   publish path is operator/Pearl_Int + Pearl_Marketing RUNTIME work, GATED on provisioning those
#   creds first. This file remains a non-secret routing map only (anti-drift #4).
# ============================================================================================

# --- WIRING CONTRACT -------------------------------------------------------------------------
# How a published YouTube video routes a viewer into the EXISTING freebie funnel (m1..m5):
#
#   1. PUBLISH (Phase-2 runtime, creds-gated): Pearl_Marketing/Pearl_Int uploads the song's
#      YouTube asset (lyric video / companion visualizer / behind-the-song / preview clip) via
#      scripts/video/uploaders/youtube.py. YouTube returns an 11-char video_id.
#   2. KEY: the operator (or runtime) adds a bridge_entry whose composite identity is
#      {album_slug}/{landing_url} (see route_key below). album_slug ties the entry to the release
#      wave; landing_url is the server-relative freebie capture page the YT link points at. The
#      pair is UNIQUE per entry — it is the join key between "a YouTube video" and "a freebie".
#   3. DESCRIPTION + PINNED-COMMENT EMAIL-GATE (the routing surface): the published video's
#      DESCRIPTION first line and its PINNED COMMENT both carry the same call-to-action + the
#      bridge entry's `landing_route` as an absolute https URL (origin + landing_route). That URL
#      is the email-gate landing page. Copy for the gate is NOT stored here — it is sourced from
#      the referenced m1..m5 template's `copy_blocks` (e.g. m1 CTA "Get my song", social_share),
#      with {album_slug}/{landing_url}/{track_title}/{artist_name} placeholders filled at render.
#   4. CAPTURE: the viewer clicks the description/pinned link -> lands on `landing_route` ->
#      hits `email_gate.capture_step` = email_capture_before_download_link (mirrors the m1..m5
#      `gating_step`) -> submits email.
#   5. HANDOFF: on capture, the funnel delivers the freebie named by `freebie_template_id` (one of
#      the five m1..m5 template_ids, reused VERBATIM) and the m1..m5 template's own
#      cross_link_targets take over (e.g. m1 -> preview_clip_30s_v1 / lyric_poster_pdf_v1 /
#      sample_ep_bundle_v1). The bridge does NOT re-implement that downstream sequencing — it only
#      delivers the viewer to the correct gate. Existing funnel owns the rest.
#
# COPY SOURCING RULE (no paid LLM): any auto-generated YT title/description copy is English ->
#   Claude subagents (Pearl_Writer) or CJK6 -> Qwen; unattended/scheduled -> Gemma/Qwen-Ollama
#   (CLAUDE.md Tier policy; scripts/ci/audit_llm_callers.py). This file stores ZERO generated copy.
#
# ROUTE-KEY CONTRACT (the {album_slug}/{landing_url} join key):
#   route_key:            "{album_slug}/{landing_url}"  — the composite uniqueness key per entry.
#     album_slug:         release-wave slug; matches the {{album_slug}} placeholder used in the
#                         m1/m3 copy_blocks (e.g. m1 body line "...points at {{album_slug}}...").
#     landing_url:        the server-relative freebie capture route (== `landing_route`); matches
#                         the {{landing_url}} placeholder in m1 social_share. NO file:// (anti #4).
#   Two bridge_entries MUST NOT share the same {album_slug}/{landing_url} pair. video_id MAY repeat
#   across entries only if one video legitimately fronts two distinct (album, freebie) routes.

# Per-entry schema ADDENDUM (fields used by the worked examples below, atop the header schema):
#   route_key:            "{album_slug}/{landing_url}" composite — see ROUTE-KEY CONTRACT above.
#   album_slug:           release-wave slug (mirrors {{album_slug}} in m1/m3 copy_blocks).
#   description_gate:
#     yt_description_cta_ref:  m1..m5 path whose copy_blocks.CTA / .social_share seed the YT
#                              description first-line + pinned-comment CTA (copy NOT inlined here).
#     gate_landing_https:      "{origin}{landing_route}" — the absolute https the YT link resolves
#                              to at runtime; origin is env/site-config, never hardcoded here.

