# --- VALIDATION CONTRACT (for the Phase-2 ws loader/validator; documented, not executed here) --
# A bridge_entry is VALID iff ALL hold:
#   - brand_id          ∈ active brand_ids of config/music/music_brand_registry.yaml (status != inactive)
#   - freebie_template_id ∈ { companion_track_download_v1, preview_clip_30s_v1, sample_ep_bundle_v1,
#                             lyric_poster_pdf_v1, behind_the_song_interview_v1 }   (m1..m5 template_ids)
#   - email_gate.capture_step == "email_capture_before_download_link"
#   - landing_route matches ^/[A-Za-z0-9/_-]+$  (server-relative; NO file:// ; NO scheme)
#   - route_key == "{album_slug}/{landing_route-without-leading-slash}" AND is unique across entries
#   - song_kit_family (if present) ∈ family_ids of config/music/song_kit_topic_families.yaml
#   - youtube_video_id is null UNTIL §13 YouTube creds are provisioned (then 11-char [A-Za-z0-9_-])
#   - NO secrets/tokens anywhere in the entry (OAuth lives only in YT_* env vars from Keychain)
