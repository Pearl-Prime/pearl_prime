# Manga Character Voice Bank — character voices for manga video dialogue
# Authority: docs/VOICE_PERSONA_TOPIC_RESEARCH.md, config/manga/teacher_character_prompts.yaml
# (alias docs/VOICE_MEDIUM_PERSONA_TOPIC_RESEARCH.md redirects — reconciled 2026-07-19)
# Date: 2026-04-09
# Each teacher's manga character needs:
#   - narrator: steady, measured audiobook narrator voice
#   - teacher_character: matches manga personality
#   - student_1: primary student/listener character
#   - student_2: secondary supporting character
#   - inner_monologue: reflective variant of teacher voice
# CosyVoice2 preferred for all manga voices (better character cloning)
# ElevenLabs BANNED for ja-JP

schema_version: 1

