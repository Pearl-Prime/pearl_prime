# Voice-Persona-Topic Scoring Matrix
# Determines voice parameter modulation based on content positioning, topic, and persona.
# Authority: docs/VOICE_PERSONA_TOPIC_RESEARCH.md
# Follows teacher_topic_persona_scores.yaml pattern (score_bands, composite_formula).
schema_version: "1.0"
last_updated: "2026-04-08"

# ─── Positioning Profile Voice Params (VoiceProfile ranges) ─────────────────

positioning_profile_voice_params:
  somatic_companion:
    description: "Warm, present, co-regulating. Lived experience voice."
    stability: [0.60, 0.75]
    similarity_boost: [0.65, 0.80]
    style: [0.05, 0.15]
    prosody_rate_percent: [92.0, 100.0]   # slightly slower
    prosody_pitch_percent: [96.0, 100.0]  # slightly lower
    break_after_ms: [380, 450]
    pace_bpm: [125, 140]
    warmth: [0.70, 0.90]

  research_guide:
    description: "Clear, authoritative, evidence-based. Professor who cares."
    stability: [0.75, 0.90]
    similarity_boost: [0.70, 0.85]
    style: [0.10, 0.30]
    prosody_rate_percent: [100.0, 110.0]  # efficient
    prosody_pitch_percent: [98.0, 102.0]  # neutral
    break_after_ms: [300, 360]
    pace_bpm: [140, 155]
    warmth: [0.40, 0.60]

  elder_stabilizer:
    description: "Steady, unhurried, wise. Earned authority through experience."
    stability: [0.70, 0.75]
    similarity_boost: [0.68, 0.78]
    style: [0.08, 0.20]
    prosody_rate_percent: [88.0, 96.0]    # deliberate
    prosody_pitch_percent: [94.0, 98.0]   # lower
    break_after_ms: [400, 500]
    pace_bpm: [120, 135]
    warmth: [0.60, 0.80]

# ─── Topic Voice Adaptations (all 15 canonical topics) ──────────────────────

topic_voice_adaptations:
  grief:
    bpm: [120, 130]
    pause_ms: [420, 500]
    pitch_shift: -0.05
    warmth: 0.90
    notes: "Slowest pace, longest pauses. Do not rush grief."

  depression:
    bpm: [125, 135]
    pause_ms: [400, 460]
    pitch_shift: -0.03
    warmth: 0.80
    notes: "Slow, steady, non-pathologizing. Non-judgmental pace."

  anxiety:
    bpm: [130, 140]
    pause_ms: [340, 380]
    pitch_shift: 0.00
    warmth: 0.70
    notes: "Calm and steady. Not too slow — anxious listeners lose patience."

  burnout:
    bpm: [130, 135]
    pause_ms: [350, 400]
    pitch_shift: -0.02
    warmth: 0.75
    notes: "Acknowledging, pragmatic. Slightly slower than anxiety."

  sleep_anxiety:
    bpm: [120, 130]
    pause_ms: [400, 480]
    pitch_shift: -0.04
    warmth: 0.85
    notes: "Near-ASMR pace. Down-regulate before sleep."

  overthinking:
    bpm: [135, 145]
    pause_ms: [320, 360]
    pitch_shift: 0.00
    warmth: 0.60
    notes: "Brisker. Matches mental pace, then models slowing."

  boundaries:
    bpm: [135, 145]
    pause_ms: [320, 360]
    pitch_shift: 0.02
    warmth: 0.55
    notes: "Direct, clear. Firmness in voice supports boundary content."

  self_worth:
    bpm: [130, 140]
    pause_ms: [360, 400]
    pitch_shift: 0.00
    warmth: 0.75
    notes: "Warm, affirming. Not saccharine. Steady belief energy."

  imposter_syndrome:
    bpm: [130, 140]
    pause_ms: [340, 380]
    pitch_shift: 0.01
    warmth: 0.65
    notes: "Slightly knowing. 'I see you' without condescension."

  social_anxiety:
    bpm: [128, 138]
    pause_ms: [360, 400]
    pitch_shift: -0.01
    warmth: 0.75
    notes: "Gentle, non-threatening. Slightly slower for safety."

  courage:
    bpm: [135, 145]
    pause_ms: [320, 360]
    pitch_shift: 0.02
    warmth: 0.60
    notes: "Grounded warmth. Forward energy. Not cheerleading."

  compassion_fatigue:
    bpm: [125, 135]
    pause_ms: [380, 430]
    pitch_shift: -0.02
    warmth: 0.85
    notes: "Unhurried. Caretaker needs to feel cared for."

  somatic_healing:
    bpm: [125, 135]
    pause_ms: [380, 440]
    pitch_shift: -0.03
    warmth: 0.85
    notes: "Body-oriented pacing. Long pauses for sensation tracking."

  financial_anxiety:
    bpm: [132, 142]
    pause_ms: [340, 380]
    pitch_shift: 0.00
    warmth: 0.60
    notes: "Pragmatic, non-shaming. Clear, actionable tone."

  financial_stress:
    bpm: [132, 142]
    pause_ms: [340, 380]
    pitch_shift: 0.00
    warmth: 0.55
    notes: "Similar to financial_anxiety. Slightly more direct."

