# ─── Composite Scoring ──────────────────────────────────────────────────────

composite_scoring:
  weights:
    positioning: 0.35
    topic: 0.35
    persona: 0.30
  formula: weighted_average
  score_bands:
    strong: { min: 0.70, max: 1.00 }
    viable: { min: 0.45, max: 0.70 }
    weak: { min: 0.00, max: 0.45 }

# ─── CosyVoice2 Parameter Mapping ──────────────────────────────────────────

cosyvoice2_param_mapping:
  stability: "reference_audio_selection"      # steadier speaker → higher stability
  similarity_boost: "voice_cache_quality"     # better reference → higher similarity
  style: "reference_audio_expressiveness"     # expressive reference → higher style
  prosody_rate_percent: "speed"               # maps to CosyVoice2 speed param
  prosody_pitch_percent: "pitch"              # maps to CosyVoice2 pitch param
  break_after_ms: "silence_insertion"         # post-processing: insert silence between sentences
  warmth: "reference_audio_selection"         # warmer speaker reference → higher warmth
  notes: >
    CosyVoice2 does not have direct stability/warmth API params.
    These are controlled by reference audio selection — the cloned voice
    inherits the tonal quality of the reference. The scoring matrix guides
    which reference audio to use for each brand/topic/persona combination.
