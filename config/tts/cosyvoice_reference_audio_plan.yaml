reference_audio_requirements:
  duration_seconds: [5, 10]
  format: "WAV mono 16-bit 16kHz or higher"
  quality: "Clean recording, no background noise, no reverb, no music"
  content: "Natural speech matching the archetype characteristics"
  storage: "~/content_bank/cosyvoice_references/{archetype_id}.wav"

training_workflow:
  1_record: "Record or source 5-10s reference audio per archetype"
  2_cache: "POST /api/v3/voices/ with reference audio → get voice_id"
  3_test: "POST /api/v3/cross-lingual/with-cache with test text → verify quality"
  4_register: "Add voice_id to brand_narrator_voice_map.yaml"
