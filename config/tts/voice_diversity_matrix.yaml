# Voice Diversity Matrix — anti-spam verification for all voice assignments
# Authority: docs/VOICE_MEDIUM_PERSONA_TOPIC_RESEARCH.md
# Date: 2026-04-09
# Verifies:
#   - No two voices in same locale have cosine similarity > 0.90 (CTSS threshold)
#   - Each brand has minimum 3 acoustically distinct voices
#   - Each topic has at least 2 different voice archetypes
#   - Gender balance per locale (min 40% each)

schema_version: 1

# ─── DIVERSITY THRESHOLDS ─────────────────────────────────────────────────

thresholds:
  ctss_cosine_max: 0.90          # Max allowed cosine similarity between any two voices in same locale
  warning_cosine: 0.70           # Warn if cosine similarity exceeds this
  min_voices_per_brand: 3        # Minimum acoustically distinct voices per brand across locales
  min_archetypes_per_topic: 2    # Minimum different voice archetypes per topic
  min_gender_ratio: 0.40         # Minimum gender representation per locale
  min_timbre_classes: 3          # Minimum distinct timbre classes per locale
  min_pace_clusters: 3           # Minimum distinct pace clusters per locale

# ─── VERIFICATION METHOD ──────────────────────────────────────────────────

verification_pipeline:
  step_1_extract_embeddings:
    tool: ECAPA-TDNN or x-vector model
    input: 5-second reference audio per voice
    output: 192-dim speaker embedding per voice
  step_2_pairwise_distance:
    metric: cosine_distance
    scope: all voices within each locale
    flag_threshold: 0.70
    block_threshold: 0.90
  step_3_cluster_analysis:
    tool: DBSCAN
    min_clusters_per_locale: 3
    purpose: verify even distribution across embedding space
  step_4_report:
    output: per-locale diversity score + flagged pairs

