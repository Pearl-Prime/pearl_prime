schema_version: 1
authority: docs/PEARL_PRIME_BESTSELLER_WRITING_OVERLAY_SPEC.md

# Operator-agreed chapter structure (2026-05-20 reaffirmation, OPD-124):
canonical_chapter_sequence:
  - slot_role: hook
    description: "Opens the chapter with recognition; 1-2 atoms max"
    slot_types: [HOOK]
  - slot_role: scene_or_section
    description: "1-2 scene atoms OR 1 section_content atom; max 2 scenes if same archetype (per OPD-114)"
    slot_types: [SCENE]
  - slot_role: first_section_content
    description: "The chapter's core teaching/insight in expository prose (REFLECTION + INSIGHT + COMPRESSION)"
    slot_types: [REFLECTION, COMPRESSION, PIVOT]
  - slot_role: named_story
    description: "ONE substantial named-character story (LONG atom preferred per OPD-122; introduced by story_introduction bridge per OPD-123)"
    slot_types: [STORY]
  - slot_role: teacher_insight
    description: "Teacher's voice deepening the chapter (TEACHER_DOCTRINE for teacher_mode; COMPOSITE_TEACHER_DOCTRINE for regular mode; multiple per chapter ok per OPD-126)"
    slot_types: [TEACHER_DOCTRINE, COMPOSITE_TEACHER_DOCTRINE]
  - slot_role: exercise
    description: "Full 5-part exercise (intro + description + guidance + aha + integration per OPD-113)"
    slot_types: [EXERCISE]
  - slot_role: close
    description: "Chapter-close that ties back to angle (ANGLE_CALLBACK per OPD-116/117 — already implemented)"
    slot_types: [INTEGRATION, TAKEAWAY, THREAD, PERMISSION, ANGLE_CALLBACK]

# Slots that may appear before hook (angle journey) or between roles without breaking order checks.
prefix_slot_types: [ANGLE_DEFINITION, ANGLE_CALLBACK]

deviations_allowed:
  micro_book_15: collapse_scene_section_allowed
  standard_book: all_7_required
  extended_book_2h: all_7_required
  deep_book_4h: all_7_required
  deep_book_6h: all_7_required

long_form_runtime_formats:
  - standard_book
  - extended_book_2h
  - deep_book_4h
  - deep_book_6h
