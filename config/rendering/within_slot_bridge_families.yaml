# Within-slot bridge families
#
# Purpose: provide 1-sentence transition prose between consecutive atoms
# that land in the SAME canonical slot at long runtimes (deep_book_6h
# stacks up to ~8 atoms per slot after OPD-109 Phase 1 cap reduction).
#
# Defect ref: docs/diagnostics/OPD-109_RENDERING_LAYER_DIAGNOSIS_2026-05-18.md
# Operator reference: artifacts/qa/BLIND_10_VERDICT_2026-05-18.md Book 3
#
# OPD-109 Phase 1.1 (2026-05-19): variant counts expanded ~3x and rotation
# state added in chapter_composer._bridge_within_slot. Each shape now has
# 10-13 variants instead of 4-5. The renderer prefers variants not yet used
# in the book and never reuses a variant within a single chapter.
#
# OPD-112 (2026-05-20): every variant tagged with `next_atom_expectation:`
# so the bridge selector refuses bridges that promise content the next
# atom does not actually deliver. Operator symptom: "this is Ahjan's
# framework" followed by content that did not sound like an Ahjan
# teaching. See chapter_composer._classify_atom + _bridge_within_slot
# for the filter logic. Categories:
#   teacher_teaching, named_story, mechanism_paragraph, body_anchor,
#   reflective_pivot, scene_vignette, practical_takeaway, any
# A missing field defaults to "any" (backward-compatible — never break
# an un-annotated YAML; the filter just treats the bridge as universal).
#
# Selection: deterministic, keyed by (chapter_index, slot_type, atom_pair_index)
# tiebreaker. Rotation state is a per-render counter keyed by (slot_type,
# shape_key, variant_idx). No paid LLM calls. Templates are static strings;
# no substitution slots beyond what the renderer already emits.
# Reading level: 8th grade (operator preference OPD-100).
#
# Schema:
#   slot_families:
#     <SLOT_TYPE>:           # canonical slot type uppercase
#       <shape_label>:       # rotation bucket (e.g. "noticing_continuation")
#         - text: "<sentence>"
#           next_atom_expectation: <category>   # OPD-112 — content-class
#                                               # promised by this bridge
#           stems: [<stem-1>, ...]   # anti-reuse stems
#           roots: [<root-1>, ...]   # anti-reuse roots
#
# 8 families cover the high-volume slot types from the OPD-109 audit:
#   STORY, REFLECTION, EXERCISE, INTEGRATION, TEACHER_DOCTRINE,
#   SCENE, COMPRESSION, HOOK
#
# Variant authorship rules (OPD-109 Phase 1.1):
#   - Each variant has a GENUINELY DIFFERENT sentence structure or rhythmic
#     shape — not just synonym substitution.
#   - Within one shape, no two variants share the same opening 3 words.
#   - 8th-grade reading level; no jargon, no metaphor stacks.
#   - One sentence preferred; two if rhythm requires.

