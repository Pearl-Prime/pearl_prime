# Within-slot bridge families
#
# Purpose: provide 1-sentence transition prose between consecutive atoms
# that land in the SAME canonical slot at long runtimes (deep_book_6h
# stacks up to ~8 atoms per slot after OPD-109 Phase 1 cap reduction).
#
# Defect ref: docs/diagnostics/OPD-109_RENDERING_LAYER_DIAGNOSIS_2026-05-18.md
# Operator reference: artifacts/qa/BLIND_10_VERDICT_2026-05-18.md Book 3
#
# Selection: deterministic, keyed by (chapter_index, slot_type, atom_pair_index).
# No paid LLM calls. Templates are static strings; no substitution slots
# beyond what the renderer already emits. Reading level: 8th grade (OPD-100).
#
# Schema:
#   slot_families:
#     <SLOT_TYPE>:           # canonical slot type uppercase
#       <shape_label>:       # rotation bucket (e.g. "noticing_continuation")
#         - text: "<sentence>"
#           stems: [<stem-1>, ...]   # anti-reuse stems
#           roots: [<root-1>, ...]   # anti-reuse roots
#
# 8 families cover the high-volume slot types from the OPD-109 audit:
#   STORY, REFLECTION, EXERCISE, INTEGRATION, TEACHER_DOCTRINE,
#   SCENE, COMPRESSION, HOOK
#
# Each family has 4-5 variants per shape; 3 shapes per family minimum
# → ~12 variants per family → enough to cover 7-atom slot with no repeats.

schema_version: 1

