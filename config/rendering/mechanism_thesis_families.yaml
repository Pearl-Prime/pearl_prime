    reversal_explanation:
      - text: "Practice can look unimpressive while still being neurologically significant."
        stems: ["practice unimpressive but neurologically significant"]
        roots: ["practice", "neurologically"]
    implication_line:
      - text: "So consistency matters more than intensity."
        stems: ["consistency matters more than intensity"]
        roots: ["consistency", "intensity"]
    evidence_based_explanation:
      - text: "Measure change by recovery time, not by never being triggered."
        stems: ["measure change by recovery time"]
        roots: ["change", "recovery", "triggered"]
    quiet_explanatory_compression:
      - text: "Repetition teaches safety."
        stems: ["repetition teaches safety"]
        roots: ["repetition", "safety"]
  integration:
    causal_explanation:
      - text: "Integration happens when new responses survive ordinary stressors."
        stems: ["integration happens when responses survive stressors"]
        roots: ["integration", "responses", "stressors"]
    systems_model:
      - text: "The loop is still present, but it no longer monopolizes interpretation."
        stems: ["loop present no longer monopolizes interpretation"]
        roots: ["loop", "interpretation"]
    body_model:
      - text: "Recovery curves shorten as the body learns quicker downshift paths."
        stems: ["recovery curves shorten as body learns downshift"]
        roots: ["recovery", "body", "downshift"]
    pattern_recognition:
      - text: "You notice earlier, interrupt earlier, and return faster."
        stems: ["notice earlier interrupt earlier return faster"]
        roots: ["notice", "interrupt", "return"]
    cost_explanation:
      - text: "Less anticipatory load frees attention for relationship and work."
        stems: ["less anticipatory load frees attention"]
        roots: ["anticipatory", "attention", "relationship"]
    reversal_explanation:
      - text: "Stability here is dynamic, not rigid."
        stems: ["stability here dynamic not rigid"]
        roots: ["stability", "dynamic", "rigid"]
    implication_line:
      - text: "So progress appears as easier recovery, not perfect calm."
        stems: ["progress appears as easier recovery"]
        roots: ["progress", "recovery", "calm"]
    evidence_based_explanation:
      - text: "You can verify this in how quickly everyday friction stops dominating the day."
        stems: ["verify in quickly friction stops dominating day"]
        roots: ["friction", "day", "verify"]
    quiet_explanatory_compression:
      - text: "Range increases. Reactivity reduces."
        stems: ["range increases reactivity reduces"]
        roots: ["range", "reactivity"]
  resolution:
    causal_explanation:
      - text: "Resolution comes from reliable regulation plus realistic expectation."
        stems: ["resolution from reliable regulation and expectation"]
        roots: ["resolution", "regulation", "expectation"]
    systems_model:
      - text: "The system remains protective, but leadership shifts back to choice."
        stems: ["system remains protective leadership shifts to choice"]
        roots: ["system", "leadership", "choice"]
    body_model:
      - text: "The body still signals risk, but it no longer dictates every decision."
        stems: ["body signals risk no longer dictates decision"]
        roots: ["body", "risk", "decision"]
    pattern_recognition:
      - text: "The same cue now leads to pause instead of automatic obedience."
        stems: ["same cue leads to pause not obedience"]
        roots: ["cue", "pause", "obedience"]
    cost_explanation:
      - text: "Residual fear remains, but total life-cost drops as flexibility rises."
        stems: ["residual fear remains total life-cost drops"]
        roots: ["fear", "life-cost", "flexibility"]
    reversal_explanation:
      - text: "Completion here means workable, not flawless."
        stems: ["completion means workable not flawless"]
        roots: ["completion", "workable", "flawless"]
    implication_line:
      - text: "So tomorrow needs steadiness, not certainty."
        stems: ["tomorrow needs steadiness not certainty"]
