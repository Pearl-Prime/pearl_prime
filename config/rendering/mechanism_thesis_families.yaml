        roots: ["responses", "repeated", "embodied"]
    systems_model:
      - text: "Practice updates prediction faster than explanation alone."
        stems: ["practice updates prediction faster than explanation"]
        roots: ["practice", "prediction", "explanation"]
    body_model:
      - text: "Small physiological shifts signal safety and reduce escalation velocity."
