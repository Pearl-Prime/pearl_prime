        stems: ["enough signal to continue"]
        roots: ["signal", "continue"]

mechanism_families:
  recognition:
    causal_explanation:
      - text: "Once the nervous system marks a moment as dangerous, perception narrows toward confirming data."
        stems: ["perception narrows toward confirming data"]
        roots: ["nervous system", "perception", "data"]
    systems_model:
      - text: "The system was built for physical threats. It now runs in offices and group chats."
        stems: ["system built for physical threats now runs in offices"]
        roots: ["system", "threats", "offices"]
    body_model:
      - text: "The body responds to prediction with the same chemistry it uses for actual danger."
        stems: ["body responds to prediction with same chemistry"]
        roots: ["body", "prediction", "chemistry"]
        topic_keywords: ["alarm", "false alarm"]
    pattern_recognition:
      - text: "Seeing the pattern clearly does not stop it. But it lets you choose a different response."
        stems: ["seeing pattern clearly lets you choose response"]
        roots: ["pattern", "choose", "response"]
    cost_explanation:
      - text: "The cost is not the moment itself. It is how much energy the system spends predicting the moment."
        stems: ["cost is energy spent predicting"]
        roots: ["cost", "energy", "predicting"]
    reversal_explanation:
      - text: "What looks like self-protection is often the pattern protecting itself from examination."
        stems: ["pattern protecting itself from examination"]
        roots: ["self-protection", "pattern"]
    implication_line:
      - text: "That means the body can mobilize before the facts arrive."
        stems: ["body can mobilize before facts"]
        roots: ["body", "facts", "mobilize"]
    evidence_based_explanation:
      - text: "You can see it most clearly where it lands in an ordinary hour."
        stems: ["see it where it lands in ordinary hour"]
        roots: ["ordinary", "hour"]
    quiet_explanatory_compression:
      - text: "The mechanism is automatic. Understanding it does not stop it. But it changes what obedience costs."
        stems: ["mechanism automatic understanding changes obedience costs"]
        roots: ["mechanism", "obedience", "costs"]
  mechanism:
    causal_explanation:
      - text: "A trigger is interpreted, chemistry escalates, and attention narrows. The sequence is fast and repeatable."
        stems: ["trigger interpreted chemistry escalates attention narrows"]
        roots: ["trigger", "chemistry", "attention"]
    systems_model:
      - text: "An old survival model runs in modern social environments and misprices risk."
        stems: ["old survival model runs in modern social environments"]
        roots: ["survival", "social", "risk"]
    body_model:
      - text: "Muscle tension, breath shift, and vigilance rise before conscious interpretation catches up."
        stems: ["tension breath shift vigilance rise before interpretation"]
        roots: ["muscle", "breath", "vigilance"]
    pattern_recognition:
      - text: "The loop repeats because each alarmed response becomes new evidence for the next alarm."
        stems: ["alarmed response becomes evidence for next alarm"]
        roots: ["loop", "alarm", "evidence"]
    cost_explanation:
      - text: "Energy is spent on prevention, so less remains for connection, curiosity, and execution."
        stems: ["energy spent on prevention less remains"]
        roots: ["energy", "prevention", "connection"]
    reversal_explanation:
      - text: "Control attempts can intensify threat signals because the body reads forced control as danger."
        stems: ["control attempts intensify threat signals"]
        roots: ["control", "threat", "danger"]
    implication_line:
      - text: "So the fastest intervention is usually physiological, not argumentative."
        stems: ["fastest intervention physiological not argumentative"]
        roots: ["intervention", "physiological"]
    evidence_based_explanation:
      - text: "Notice how fast this pattern appears in inboxes, meetings, and unsent replies."
        stems: ["pattern appears in inboxes meetings unsent replies"]
        roots: ["inboxes", "meetings", "replies"]
    quiet_explanatory_compression:
      - text: "The mechanism is not mysterious. It is rehearsed."
        stems: ["mechanism not mysterious it is rehearsed"]
        roots: ["mechanism", "rehearsed"]
  deepening:
    causal_explanation:
      - text: "Repeated anticipation trains the body to live in pre-impact mode."
        stems: ["anticipation trains body to live in pre-impact mode"]
        roots: ["anticipation", "body", "mode"]
    systems_model:
      - text: "The loop optimizes for avoiding social pain, not for preserving long-term capacity."
        stems: ["loop optimizes for avoiding social pain"]
        roots: ["loop", "social pain", "capacity"]
    body_model:
      - text: "Chronic bracing elevates baseline stress and narrows emotional range."
        stems: ["chronic bracing elevates baseline stress"]
        roots: ["bracing", "stress", "range"]
    pattern_recognition:
      - text: "The same protective move repeats across contexts and gets mistaken for personality."
        stems: ["protective move repeats across contexts"]
        roots: ["protective", "contexts", "personality"]
    cost_explanation:
      - text: "The tax accumulates in sleep, concentration, and social availability."
        stems: ["tax accumulates in sleep concentration social availability"]
        roots: ["tax", "sleep", "concentration"]
        topic_keywords: ["overwhelm"]
    reversal_explanation:
      - text: "What feels like caution can become self-constriction when it never powers down."
        stems: ["caution becomes self-constriction"]
        roots: ["caution", "self-constriction"]
    implication_line:
      - text: "That is why relief can feel unfamiliar at first."
        stems: ["relief can feel unfamiliar at first"]
        roots: ["relief", "unfamiliar"]
    evidence_based_explanation:
      - text: "You can track the burden in small avoidance decisions throughout the day."
        stems: ["track burden in small avoidance decisions"]
        roots: ["burden", "avoidance", "day"]
    quiet_explanatory_compression:
      - text: "The pattern grows expensive quietly."
        stems: ["pattern grows expensive quietly"]
        roots: ["pattern", "expensive"]
  reframe:
    causal_explanation:
      - text: "Protection strategies persist because they once reduced risk fast."
        stems: ["protection strategies persist because once reduced risk"]
        roots: ["protection", "risk"]
    systems_model:
      - text: "Adaptations built for one context keep running even after context changes."
        stems: ["adaptations built for one context keep running"]
        roots: ["adaptations", "context"]
    body_model:
      - text: "The body favors familiar stress over unfamiliar safety until safety is practiced."
        stems: ["body favors familiar stress over unfamiliar safety"]
        roots: ["body", "familiar", "safety"]
    pattern_recognition:
      - text: "Naming function before fault reduces shame and increases usable agency."
        stems: ["naming function before fault reduces shame"]
        roots: ["function", "fault", "shame"]
    cost_explanation:
      - text: "Without reframe, the same behavior gets interpreted as moral failure."
        stems: ["without reframe behavior interpreted as moral failure"]
        roots: ["reframe", "failure"]
    reversal_explanation:
      - text: "The loop is not evidence you cannot change. It is evidence the loop has been well-practiced."
        stems: ["loop evidence it has been practiced"]
        roots: ["loop", "change", "practiced"]
    implication_line:
      - text: "When function is visible, revision becomes possible."
        stems: ["when function visible revision possible"]
        roots: ["function", "revision"]
    evidence_based_explanation:
      - text: "Look for this in moments where judgment softens and options widen."
