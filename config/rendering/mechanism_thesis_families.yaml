    reframe_sentence:
      - text: "What feels like discipline is often exhaustion wearing duty."
        stems: ["exhaustion wearing duty"]
        roots: ["exhaustion", "duty"]
    contrast_claim:
      - text: "The pattern protects you and taxes you at the same time."
        stems: ["pattern protects and taxes"]
