            roots: ["hand", "chest", "exhale"]
      integration:
        gentle_directive:
          - text: "Begin where the breath is easiest, not where it is perfect."
            stems: ["begin where breath is easiest"]
            roots: ["breath", "begin"]
      resolution:
        body_first_entry:
          - text: "Start with one steady inhale and one unforced release."
            stems: ["start with one steady inhale and release"]
            roots: ["inhale", "release"]
    grounding:
      recognition:
        concrete_invitation:
          - text: "Place both feet on the floor and name what supports your weight."
            stems: ["place both feet on floor"]
            roots: ["feet", "floor", "weight"]
      mechanism:
        body_first_entry:
          - text: "Start with contact points before you interpret the feeling."
            stems: ["start with contact points before interpret feeling"]
            roots: ["contact", "feeling"]
      deepening:
        small_entry:
