schema_version: 1
# De-injection 2026-07-05: default OFF on spine/production path. Set true or
# PHOENIX_EXERCISE_WRAPPER_FAMILIES=1 for A/B re-enable.
exercise_wrapper_families: false

wrapper_types:
  setup_sentence:
