regional_lenses:
  china:
    core_archetype: emotional_self_regulation
    platform_bias: [douyin, xiaohongshu, wechat]
    copy_posture: "Practical regulation toolkit; avoid political/religious sensitivity and unsupported clinical claims."
  hong_kong:
    core_archetype: strategic_professional_boundaries
    platform_bias: [instagram_reels, youtube_shorts, linkedin, xiaohongshu]
    copy_posture: "Boundary-setting as professionalism; bilingual minimalism when localized."
  singapore:
    core_archetype: no_fluff_career_agility
    platform_bias: [linkedin, instagram, youtube_shorts, tiktok]
    copy_posture: "Concrete career utility, direct structure, low-fluff claims."
  japan:
    core_archetype: quiet_precision_and_x_youtube_line
    platform_bias: [x, youtube, instagram, line]
    copy_posture: "Concise, mobile-readable, calmer and less argumentative."
  taiwan:
    core_archetype: relational_facebook_line_xhs_ptt
    platform_bias: [facebook, line, instagram, xiaohongshu, ptt]
    copy_posture: "Traditional Chinese, slightly higher context, community discussion."
  korea:
    core_archetype: youtube_naver_kakao_ig_search
    platform_bias: [youtube, naver, kakao, instagram]
    copy_posture: "Search-aware, fast hook for video, native Korean review required before release."
