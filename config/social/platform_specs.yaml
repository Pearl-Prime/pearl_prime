schema_version: 1
registry_type: deterministic_social_platform_specs
verified_as_of: "2026-07-18"
publish_policy:
  draft_only: true
  manual_review_required: true
  auto_publish_allowed: false
  live_publishing_authorized: false
official_refresh:
  status: partial
  note: "Official/primary surfaces refreshed where reachable; platform contracts remain dry-run and review-gated."
  sources:
    instagram_graph_api:
      url: "https://developers.facebook.com/documentation/instagram-platform/instagram-graph-api/reference/ig-user/media"
      claim: "Image aspect ratio range and image alt text support."
    meta_carousel:
      url: "https://www.facebook.com/business/help/1114358518575630"
      claim: "Carousel card count and supported aspect ratios."
    linkedin_document_ads:
      url: "https://business.linkedin.com/advertise/ads/sponsored-content/document-ads/specs"
      claim: "Document file types, size, page count, and layout guidance."
    tiktok_in_feed:
      url: "https://ads.tiktok.com/help/article/tiktok-auction-in-feed-ads?redirected=2"
      claim: "9:16 recommended vertical video, duration, file size, and format constraints."
    pinterest_specs:
      url: "https://help.pinterest.com/en/business/article/pinterest-product-specs"
      claim: "2:3 / 1000x1500 image recommendation and text limits."
    youtube_shorts:
      url: "https://support.google.com/youtube/answer/15424877?hl=en"
      claim: "Square or vertical videos up to three minutes classify as Shorts."
    x_media:
      url: "https://docs.x.com/x-api/media/quickstart/best-practices"
      claim: "Supported image types and image/GIF size caps."
    bluesky_posts:
      url: "https://docs.bsky.app/docs/advanced-guides/posts"
      claim: "Up to four images per post, per-image alt text, and image blob size cap."
    google_business_photos:
      url: "https://support.google.com/business/answer/6103862?co=GENIE.Platform%3DDesktop&hl=en"
      claim: "JPG/PNG photo guidelines, 720x720 recommended resolution, 5 MB cap."
surfaces:
  instagram_feed_portrait:
    platform: instagram
    surface: feed_portrait
    media_kind: image
    canvas: {width: 1080, height: 1350}
    aspect_ratio: "4:5"
    formats: [jpg, jpeg, png]
    max_file_mb: 8
    max_media_items: 1
    carousel_items: {min: 2, max: 10}
    safe_zone_pct: {left: 0.07, right: 0.07, top: 0.07, bottom: 0.15}
    text_envelope: {headline_words: 12, body_words: 38, overlay_words: 55}
    caption: {max_chars: 2200, hashtags_min: 5, hashtags_max: 15, first_comment_allowed: true}
    alt_text_required: true
    native_copy_mode: emotional_saveable
    kpi_priority: [saves, shares, carousel_completion, profile_visits]
  instagram_carousel:
    platform: instagram
    surface: carousel
    media_kind: image_carousel
    canvas: {width: 1080, height: 1350}
    aspect_ratio: "4:5"
    formats: [jpg, jpeg, png]
    max_file_mb: 8
    max_media_items: 10
    carousel_items: {min: 2, max: 10}
    safe_zone_pct: {left: 0.07, right: 0.07, top: 0.07, bottom: 0.13}
    text_envelope: {headline_words: 12, body_words: 34, overlay_words: 45}
    caption: {max_chars: 2200, hashtags_min: 5, hashtags_max: 15, first_comment_allowed: true}
    alt_text_required: true
    native_copy_mode: emotional_saveable
    kpi_priority: [saves, shares, completion, follows]
  facebook_feed:
    platform: facebook
    surface: feed_post
    media_kind: image
    canvas: {width: 1200, height: 1200}
    aspect_ratio: "1:1"
    formats: [jpg, jpeg, png]
    max_file_mb: 10
    max_media_items: 10
    carousel_items: {min: 2, max: 10}
    safe_zone_pct: {left: 0.07, right: 0.07, top: 0.07, bottom: 0.12}
    text_envelope: {headline_words: 12, body_words: 45, overlay_words: 60}
    caption: {max_chars: 5000, hashtags_min: 1, hashtags_max: 3, first_comment_allowed: true}
    alt_text_required: true
    native_copy_mode: community_discussion
    kpi_priority: [comments, shares, link_clicks]
  linkedin_document_slide:
    platform: linkedin
    surface: document_carousel_slide
    media_kind: document_slide
    canvas: {width: 1080, height: 1350}
    aspect_ratio: "4:5"
    formats: [jpg, jpeg, png, pdf]
    max_file_mb: 100
    max_media_items: 10
    document: {max_pages: 300, recommended_pages_max: 10, supported_types: [pdf, doc, docx, ppt, pptx]}
    safe_zone_pct: {left: 0.08, right: 0.08, top: 0.08, bottom: 0.10}
    text_envelope: {headline_words: 11, body_words: 42, overlay_words: 56}
    caption: {max_chars: 3000, hashtags_min: 3, hashtags_max: 5, first_comment_allowed: true}
    alt_text_required: true
    native_copy_mode: professional_evidence
    kpi_priority: [dwell_time, saves, comments, click_through]
  linkedin_feed_portrait:
    platform: linkedin
    surface: feed_image
    media_kind: image
    canvas: {width: 1080, height: 1350}
    aspect_ratio: "4:5"
    formats: [jpg, jpeg, png]
    max_file_mb: 8
    max_media_items: 1
    safe_zone_pct: {left: 0.08, right: 0.08, top: 0.08, bottom: 0.10}
    text_envelope: {headline_words: 12, body_words: 44, overlay_words: 58}
    caption: {max_chars: 3000, hashtags_min: 3, hashtags_max: 5, first_comment_allowed: true}
    alt_text_required: true
    native_copy_mode: professional_evidence
    kpi_priority: [dwell_time, comments, click_through]
  pinterest_pin:
    platform: pinterest
    surface: standard_pin
    media_kind: image
    canvas: {width: 1000, height: 1500}
    aspect_ratio: "2:3"
    formats: [jpg, jpeg, png]
    max_file_mb: 20
    max_media_items: 1
    safe_zone_pct: {left: 0.08, right: 0.08, top: 0.07, bottom: 0.12}
    text_envelope: {headline_words: 11, body_words: 34, overlay_words: 44}
    caption: {max_chars: 500, hashtags_min: 2, hashtags_max: 5, first_comment_allowed: false, title_max_chars: 100}
    alt_text_required: true
    native_copy_mode: searchable_saveable
    kpi_priority: [saves, search_impressions, outbound_clicks]
  tiktok_reels_shorts_vertical:
    platform: tiktok_reels_shorts
    surface: vertical_short
    media_kind: video_or_storyboard
    canvas: {width: 1080, height: 1920}
    aspect_ratio: "9:16"
    formats: [mp4, mov, jpg, png]
    max_file_mb: 500
    max_media_items: 1
    duration_s: {min: 3, max: 180, l0_target_min: 15, l0_target_max: 45}
