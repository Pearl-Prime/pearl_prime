<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pearl Prime — Brand Director Operations</title>
  <style>
    :root {
      --bg: #0e0a06; --card: #1a1410; --card2: #201810; --border: rgba(180, 83, 9, 0.22);
      --amber: #b45309; --amber2: #d97706; --cream: #faf6f0; --muted: rgba(250, 246, 240, 0.45);
      --green: #22c55e; --yellow: #facc15; --blue: #60a5fa; --purple: #a78bfa;
      --font: "Segoe UI", system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      --mono: ui-monospace, "DM Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--cream); line-height: 1.55; min-height: 100vh; }
    header { border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; background: linear-gradient(180deg, #120c08, var(--bg)); display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; font-weight: 600; color: var(--amber2); }
    header .subtitle { font-size: 0.75rem; color: var(--muted); font-family: var(--mono); }
    .page { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .top-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .brand-name { font-size: 1.25rem; font-weight: 700; color: var(--cream); }
    .week-badge { font-family: var(--mono); font-size: 0.7rem; background: rgba(180,83,9,0.2); color: var(--amber2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; }
    .btn { padding: 7px 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--cream); font-size: 0.78rem; cursor: pointer; transition: all .15s; }
    .btn:hover { background: rgba(180,83,9,0.25); border-color: var(--amber2); }
    .btn.primary { background: rgba(180,83,9,0.35); border-color: var(--amber2); color: var(--amber2); font-weight: 600; }
    .btn.primary:hover { background: rgba(180,83,9,0.55); }
    .btn.sm { padding: 4px 11px; font-size: 0.72rem; }
    .actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { font-family: var(--mono); font-size: 0.65rem; padding: 3px 9px; border-radius: 10px; border: 1px solid; }
    .badge-green { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }
    .slots-summary { background: rgba(180,83,9,0.10); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; font-size: 0.8rem; }
    .slots-summary .lbl { font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .slots-summary .chip { font-family: var(--mono); font-size: 0.72rem; color: var(--cream); background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 11px; }
    .slots-summary .chip b { color: var(--amber2); }
    .real-files { background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 1.5rem; }
    .rf-head { font-size: 0.85rem; font-weight: 700; color: var(--green); }
    .rf-note { font-size: 0.7rem; color: var(--muted); margin: 3px 0 10px; }
    .rf-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 6px 0; border-top: 1px solid rgba(34,197,94,0.12); }
    .rf-plat { font-family: var(--mono); font-size: 0.66rem; color: var(--cream); min-width: 132px; }
    .rf-link { font-family: var(--mono); font-size: 0.7rem; color: var(--green); text-decoration: none; border: 1px solid rgba(34,197,94,0.4); border-radius: 5px; padding: 3px 9px; }
    .rf-link:hover { background: rgba(34,197,94,0.15); }
    .rf-kb { color: var(--muted); }
    .platform-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1.1rem; overflow: hidden; }
    .platform-head { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .platform-icon { font-size: 1.2rem; }
    .platform-name { font-size: 0.95rem; font-weight: 600; }
    .platform-count { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
    .platform-dls { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .platform-body { padding: 12px 16px 14px; }
    .mode-tag { font-family: var(--mono); font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
    .mode-bulk { color: var(--green); border-color: var(--green); background: rgba(34,197,94,0.08); }
    .mode-single { color: var(--yellow); border-color: var(--yellow); background: rgba(250,204,21,0.07); }
    .mode-rss { color: var(--blue); border-color: var(--blue); background: rgba(96,165,250,0.08); }
    .howto { background: rgba(0,0,0,0.28); border: 1px solid rgba(180,83,9,0.16); border-radius: 7px; padding: 10px 13px; margin-bottom: 12px; }
    .howto > summary { font-size: 0.66rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: .07em; color: var(--amber2); cursor: pointer; list-style: none; outline: none; }
    .howto > summary::-webkit-details-marker { display: none; }
    .howto > summary::before { content: "▾ "; color: var(--muted); }
    .howto:not([open]) > summary::before { content: "▸ "; }
    .howto ol { margin: 9px 0 0; padding-left: 1.3rem; }
    .howto li { font-size: 0.76rem; color: var(--cream); margin: 5px 0; }
    .title-list { list-style: none; }
    .title-list li { padding: 8px 0; border-bottom: 1px solid rgba(180,83,9,0.1); display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
    .title-list li:last-child { border-bottom: none; }
    .title-num { font-family: var(--mono); color: var(--muted); font-size: 0.65rem; min-width: 18px; align-self: flex-start; padding-top: 2px; }
    .title-text { flex: 1; }
    .title-sub { display: block; font-size: 0.66rem; color: var(--muted); }
    .format-badge { font-size: 0.6rem; font-family: var(--mono); padding: 1px 7px; border-radius: 10px; border: 1px solid; white-space: nowrap; }
    .fmt-ebook { border-color: var(--blue); color: var(--blue); }
    .fmt-audiobook { border-color: var(--purple); color: var(--purple); }
    .fmt-episode { border-color: var(--yellow); color: var(--yellow); }
    .fmt-manga { border-color: var(--amber2); color: var(--amber2); }
    .history-list { list-style: none; }
    .history-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 9px; cursor: pointer; transition: all .15s; }
    .history-row:hover { border-color: var(--amber2); background: rgba(180,83,9,0.12); }
    .history-week { font-family: var(--mono); font-weight: 600; color: var(--amber2); min-width: 96px; }
    .history-meta { font-size: 0.75rem; color: var(--muted); flex: 1; }
    .history-go { font-size: 0.72rem; color: var(--amber2); }
    .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.1rem; }
    .book-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    .book-cover { display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 700; font-size: 0.95rem; color: #fff; line-height: 1.3; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
    .book-cover--text { min-height: 150px; padding: 14px; }
    .book-cover--img { aspect-ratio: 5 / 8; padding: 0; background: #0a0a0f; overflow: hidden; }
    .book-cover--img img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .book-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .book-title { font-size: 0.85rem; font-weight: 600; }
    .book-sub { font-size: 0.68rem; color: var(--muted); font-style: italic; }
    .book-desc { font-size: 0.72rem; color: var(--muted); flex: 1; }
    .book-angle { font-size: 0.66rem; font-family: var(--mono); color: var(--amber2); border-top: 1px solid rgba(180,83,9,0.15); padding-top: 7px; }
    .section-title { font-size: 0.85rem; font-weight: 600; color: var(--cream); margin: 0 0 1rem; }
    .viewing-note { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); margin-bottom: 1rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
<header>
  <div>
    <h1 id="ui-h1">Brand Director Operations</h1>
    <div class="subtitle" id="ui-sub">Pearl Prime · weekly content packet</div>
  </div>
</header>

<div class="page">
  <div class="top-bar">
    <span class="brand-name" id="brand-name">…</span>
    <span class="week-badge" id="week-label">—</span>
    <span class="badge badge-green" id="ui-handoff">Weekly handoff</span>
    <div class="actions">
      <button class="btn primary" id="ui-dlall" onclick="downloadAll()">⬇ Download all packets</button>
      <button class="btn" id="ui-history" onclick="showView('history')">🕘 Review History</button>
      <button class="btn" id="ui-catalog" onclick="showView('catalog')">📚 View Catalog</button>
      <a class="btn" id="ui-weekly-os" href="brand_admin_weekly_os.html">📅 Weekly OS</a>
    </div>
  </div>

  <div id="view-weekly">
    <div class="viewing-note hidden" id="history-note"></div>
    <div class="slots-summary" id="slots-summary"></div>
    <div class="viewing-note" id="ui-files-note"></div>
    <div id="real-files"></div>
    <div id="platforms"></div>
  </div>

  <div id="view-history" class="hidden">
    <div class="top-bar" style="margin-bottom:1rem">
      <h3 class="section-title" id="ui-history-h" style="margin:0">Review History</h3>
      <div class="actions"><button class="btn sm" id="ui-history-back" onclick="showView('weekly')">← Back to this week</button></div>
    </div>
    <p class="viewing-note" id="ui-history-intro">Every weekly packet since this brand launched. Click a week to reopen its packet.</p>
    <ul class="history-list" id="history-list"></ul>
  </div>

  <div id="view-catalog" class="hidden">
    <div class="top-bar" style="margin-bottom:1rem">
      <h3 class="section-title" style="margin:0"><span id="ui-catalog-h">Full Catalog —</span> <span id="catalog-brand"></span></h3>
      <div class="actions"><button class="btn sm" id="ui-catalog-back" onclick="showView('weekly')">← Back to this week</button></div>
    </div>
    <p class="viewing-note" id="catalog-count"></p>
    <div class="catalog-grid" id="catalog-grid"></div>
  </div>
</div>

// ── ISO-week helpers ──────────────────────────────────────────────────────
function isoWeek(d) {
  const t = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(t.getFullYear(), 0, 4);
  const wn = 1 + Math.round(((t - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  return `${t.getFullYear()}-W${String(wn).padStart(2,"0")}`;
}

  const out = [], now = new Date();

  while (d <= now) { const l = isoWeek(d); if (!out.includes(l)) out.push(l); d = new Date(d.getTime() + 7*86400000); }
  return out.reverse();
}
function currentWeekLabel() { return isoWeek(new Date()); }
function weekLabelFor(idx){ const h = weekHistory(); return (idx==null) ? currentWeekLabel() : h[idx]; }

// ── Deterministic catalog ───────────────────────────────────────────────────
function slug(s){ const x = String(s).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); return x || "title"; }
function isbnFor(i){ return "978" + String(1000000000 + i * 7919).slice(0,10); }
function priceFor(i){ const lo = i % 3 === 0; if (CURRENCY === "jpy") return lo ? "500" : "700"; if (CURRENCY === "twd") return lo ? "150" : "220"; if (CURRENCY === "cny") return lo ? "25" : "35"; return lo ? "4.99" : "5.99"; }
function audioPrice(){ return CURRENCY === "jpy" ? "1500" : CURRENCY === "twd" ? "350" : CURRENCY === "cny" ? "45" : "9.99"; }

function buildCatalog() {
  if (REAL_CATALOG && REAL_CATALOG.length) {
    return REAL_CATALOG.map((b, i) => ({
      title: b.title, subtitle: b.subtitle || "", desc: b.desc || "", angle: b.angle || "",
      longDesc: b.long_desc || b.desc || "", author: b.author || "", cover: b.cover || "",
      isbn: b.isbn || "PENDING", price: b.price || priceFor(i), audioP: b.audioPrice || audioPrice(),
      keywords: (b.keywords && b.keywords.length) ? b.keywords : CAT.keywords,
      cats: (b.bisac && b.bisac.length) ? b.bisac : CAT.cats,
      hue: COVER_HUES[i % COVER_HUES.length],
    }));
  }
  return CAT.titles.map((title, i) => ({
    title, subtitle: "", desc: CAT.descs[i % CAT.descs.length], angle: CAT.angles[i % CAT.angles.length],
    longDesc: CAT.descs[i % CAT.descs.length], author: "",
    isbn: isbnFor(i), price: priceFor(i), audioP: audioPrice(),
    keywords: CAT.keywords, cats: CAT.cats, hue: COVER_HUES[i % COVER_HUES.length],
  }));
}
function buildPacket(weekIdx) {
  const cat = buildCatalog(), n = cat.length;
  const start = (weekIdx * WEEKLY_EBOOKS) % n;
  const ebooks = [];
  for (let i = 0; i < WEEKLY_EBOOKS; i++) ebooks.push(cat[(start + i) % n]);
  const audiobooks = ebooks.slice(0, WEEKLY_AUDIOBOOKS);
  const episodes = ebooks.slice(0, WEEKLY_EPISODES).map((b, i) => ({...b, epNum: weekIdx * WEEKLY_EPISODES + i + 1}));
  // Manga / webtoon: one chapter per week (matches devotion_path weekly cadence).
  const manga = ebooks.slice(0, WEEKLY_MANGA).map((b, i) => ({...b, epNum: weekIdx * WEEKLY_MANGA + i + 1}));
  return { ebooks, audiobooks, episodes, manga };
}
function packetFor(idx){ const h = weekHistory(); const realIdx = (idx==null) ? 0 : idx; return buildPacket(h.length - 1 - realIdx); }
function feedFor(pkt, p){ return pkt[p.feed] || []; }

// ── Downloads ──────────────────────────────────────────────────────────────
function dl(name, text, mime) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], {type: mime || "text/plain"}));
  a.download = name; a.click();
}
function row(arr, sep){ return arr.map(v => sep === "\t" ? String(v) : `"${String(v).replace(/"/g,'""')}"`).join(sep || ","); }
function buildMetadataFile(p, week, pkt) {
  const items = feedFor(pkt, p), pc = `price_${CURRENCY}`;
  const langTag = CURRENCY === "jpy" ? "ja-JP" : CURRENCY === "twd" ? "zh-TW" : CURRENCY === "cny" ? "zh-CN" : "en-US", pub = BRAND.label;
  const au = b => b.author || pub;                 // narrating teacher, else the imprint (composite)
  const stem = b => b.file_stem || b.book_id || slug(b.title);
  const ef = b => `${stem(b)}.epub`, cf = b => `${stem(b)}.jpg`;
  if (p.dlType === "gp_booklist") {
    // Google Play Books bulk book-list (tab-delimited flat file) — full metadata.
    const head = ["identifier","title","subtitle","contributor","description","language",pc,"publisher","bisac_1","bisac_2","bisac_3","maturity_rating","content_file","cover_file"];
    const rows = items.map(b => [b.isbn||"PENDING", b.title, b.subtitle, au(b), b.longDesc||b.desc, langTag, b.price, pub, ...pad(b.cats,3), "EVERYONE", ef(b), `${stem(b)}_frontcover.jpg`]);
    return {name:`google_play_booklist__${BRAND.id}__${week}.txt`, text:[head, ...rows].map(r => row(r,"\t")).join("\n"), mime:"text/plain"};
  }
  if (p.dlType === "kdp_csv") {
    // Amazon KDP — the fields a director copy-pastes into the Kindle eBook form.
    const head = ["title","subtitle","author","publisher","description","language","keyword_1","keyword_2","keyword_3","keyword_4","keyword_5","keyword_6","keyword_7","category_1","category_2","category_3",pc,"ai_text","ai_images","ai_translation","manuscript_file","cover_file"];
    const rows = items.map(b => [b.title, b.subtitle, au(b), pub, b.longDesc||b.desc, langTag, ...pad(b.keywords,7), ...pad(b.cats,3), b.price, "Yes","Yes","No", ef(b), cf(b)]);
    return {name:`kdp_metadata__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
  if (p.dlType === "ebook_csv") {
    // Apple Books / Rakuten Kobo — web-form fields + the files to attach.
    const head = ["title","subtitle","author","publisher","description","language","category",pc,"isbn","epub_file","sample_file","cover_file"];
    const rows = items.map(b => [b.title, b.subtitle, au(b), pub, b.longDesc||b.desc, langTag, (b.cats&&b.cats[0])||CAT.cats[0], b.price, b.isbn||"PENDING", ef(b), `${stem(b)}_sample.epub`, cf(b)]);
    return {name:`${p.id}_metadata__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
  if (p.dlType === "audiobook_csv") {
    const head = ["title","author","narrator","publisher","isbn","description","category",pc,"digital_voice","audio_files","cover_file"];
    const rows = items.map(b => [b.title, au(b), LANG==="ja"?"AI音声":LANG==="zh-Hant"?"AI語音":LANG==="zh-Hans"?"AI语音":"Digital voice (AI)", pub, b.isbn||"PENDING", b.longDesc||b.desc, (b.cats&&b.cats[0])||CAT.cats[0], b.audioP||audioPrice(), "Yes", `${stem(b)}/01_opening.mp3; ${stem(b)}/chapters/*.mp3; ${stem(b)}/99_closing.mp3; ${stem(b)}/retail_sample.mp3`, `${stem(b)}_cover.jpg`]);
    return {name:`${p.id}_audiobooks__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
  if (p.dlType === "podcast_csv") {
    const head = ["episode_number","episode_title","publish_date","description","explicit","audio_file"];
    const rows = items.map(b => [b.epNum, `Ep ${b.epNum}: ${b.title}`, week, b.longDesc||b.desc, "No", `${BRAND.id}_ep${String(b.epNum).padStart(3,"0")}.mp3`]);
    return {name:`podcast_episodes__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
  if (p.dlType === "manga_csv") {
    // Webtoon / manga — the fields a director copy-pastes into a Webtoon Canvas /
    // LINE Manga / Piccoma episode, plus the rendered files to attach (the
    // vertical strip .png for webtoon, the manga .pdf for print/KDP).
    const head = ["chapter_number","chapter_title","publish_date","description","genre","webtoon_strip_file","manga_pdf_file"];
    const rows = items.map(b => [b.epNum, `Ch ${b.epNum}: ${b.title}`, week, b.longDesc||b.desc, "Healing / Iyashikei", `${BRAND.id}_ch${String(b.epNum).padStart(3,"0")}_webtoon.png`, `${BRAND.id}_ch${String(b.epNum).padStart(3,"0")}_manga.pdf`]);
    return {name:`webtoon_manga_chapters__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
}
function dlPacket(pid) {
  if (isPacketBlocked()) return;
  const week = weekLabelFor(currentWeekIdx), pkt = packetFor(currentWeekIdx);
  const p = PLATFORMS.find(x => x.id === pid);
  const f = p && buildMetadataFile(p, week, pkt);
  if (f) dl(f.name, f.text, f.mime);
}
function downloadAll() {
  if (isPacketBlocked()) return;
  const week = weekLabelFor(currentWeekIdx), pkt = packetFor(currentWeekIdx);
  const head = ["channel","format","title","id","description",`price_${CURRENCY}`,"week","brand"];
  const rows = [head];
  PLATFORMS.forEach(p => feedFor(pkt, p).forEach(b =>
    rows.push([p.label, T.fmt[p.feed], (p.feed==="episodes"?`Ep ${b.epNum}: ${b.title}`:p.feed==="manga"?`Ch ${b.epNum}: ${b.title}`:b.title), (b.isbn||b.epNum||""), b.desc, (b.price||audioPrice()), week, BRAND.label])));
  dl(`all_packets__${BRAND.id}__${week}.csv`, rows.map(r => row(r)).join("\n"), "text/csv");
}

// ── Renders ───────────────────────────────────────────────────────────────
function renderWeekly() {
  const idx = currentWeekIdx, week = weekLabelFor(idx), pkt = packetFor(idx);
  document.getElementById("brand-name").textContent = BRAND.label;
  document.getElementById("week-label").textContent = week;

  const note = document.getElementById("history-note");
  if (idx == null) note.classList.add("hidden");
  else { note.classList.remove("hidden"); note.innerHTML = `${T.viewingPast(week)} &nbsp;·&nbsp; <a href="#" onclick="goThisWeek();return false" style="color:var(--amber2)">${T.jumpCurrent}</a>`; }

  const ebookStores = PLATFORMS.filter(p => p.feed === "ebooks").map(p => p.label).join(T.storeSep);
  const audioStore = (PLATFORMS.find(p => p.feed === "audiobooks") || {}).label || "";
  const podStore = (PLATFORMS.find(p => p.feed === "episodes") || {}).label || "";
  document.getElementById("slots-summary").innerHTML =
    `<span class="lbl">📦 ${T.thisWeek}</span>` +
    `<span class="chip">${T.toStores(pkt.ebooks.length, T.ebookNoun, ebookStores)}</span>` +
    (audioStore ? `<span class="chip">${T.toStores(pkt.audiobooks.length, T.audiobookNoun, audioStore)}</span>` : "") +
    (podStore ? `<span class="chip">${T.toStores(pkt.episodes.length, T.episodeNoun, podStore)}</span>` : "");

  document.getElementById("platforms").innerHTML = PLATFORMS.map(p => {
    const items = feedFor(pkt, p);
    const fmtClass = p.feed === "audiobooks" ? "fmt-audiobook" : p.feed === "episodes" ? "fmt-episode" : p.feed === "manga" ? "fmt-manga" : "fmt-ebook";
    const noun = p.feed === "audiobooks" ? T.audiobookNoun : p.feed === "episodes" ? T.episodeNoun : p.feed === "manga" ? T.mangaNoun : T.ebookNoun;
    const titles = items.map((b, i) => {
      const label = p.feed === "episodes" ? `Ep ${b.epNum}: ${b.title}` : p.feed === "manga" ? `Ch ${b.epNum}: ${b.title}` : b.title;
      const sub = b.subtitle ? `<span class="title-sub">${esc(b.subtitle)}</span>` : "";
      return `<li><span class="title-num">${i+1}.</span><span class="title-text">${esc(label)}${sub}</span><span class="format-badge ${fmtClass}">${T.fmt[p.feed]}</span></li>`;
    }).join("");
    return `<div class="platform-card">
      <div class="platform-head">
        <span class="platform-icon">${p.icon || "📦"}</span>
        <span class="platform-name">${p.label}</span>
        <span class="mode-tag ${p.modeClass}">${p.mode}</span>
        <span class="platform-count">${T.countThisWeek(items.length, noun)}</span>
        <span class="platform-dls"><button class="btn sm primary" ${isPacketBlocked()?"disabled style=\"opacity:.45;cursor:not-allowed\"":""} onclick="dlPacket('${p.id}')">${p.dlLabel}</button></span>
      </div>
      <div class="platform-body">
        <details class="howto" open>
          <summary>${T.howto(p.label)}</summary>
          <ol>${p.steps.map(s => `<li>${s}</li>`).join("")}</ol>
        </details>
        <ul class="title-list">${titles}</ul>
      </div>
    </div>`;
  }).join("");

  // Real production files — actual rendered books/assets, when this brand has them.
  const rfEl = document.getElementById("real-files");
  if (REAL_DELIVERY && REAL_DELIVERY.weeks) {
    const wk = REAL_DELIVERY.latest_week || Object.keys(REAL_DELIVERY.weeks).sort().pop();
    const plats = REAL_DELIVERY.weeks[wk] || {};
    const groups = Object.entries(plats).map(([pk, files]) => {
      const links = (files || []).filter(f => !/\.(md|cue)$/i.test(f.file))
        .map(f => `<a class="rf-link" href="${f.url}" download>⬇ ${esc(f.file)} <span class="rf-kb">${f.kb}KB</span></a>`).join(" ");
      return links ? `<div class="rf-group"><span class="rf-plat">${DELIV_PLAT[pk] || pk}</span>${links}</div>` : "";
    }).join("");
    rfEl.innerHTML = groups
      ? `<div class="real-files"><div class="rf-head">✅ ${T.realFiles} — ${wk}</div><div class="rf-note">${T.realFilesNote}</div>${groups}</div>`
      : "";
  } else { rfEl.innerHTML = ""; }
  applyPacketBlockUi();
}

function renderHistory() {
  const h = weekHistory();
  document.getElementById("history-list").innerHTML = h.map((wk, i) => {
    const tag = i === 0 ? T.thisWeekTag : T.weeksAgo(i);
    return `<li class="history-row" onclick="openWeek(${i})">
      <span class="history-week">${wk}</span>
      <span class="history-meta">${T.historyMeta(WEEKLY_EBOOKS, WEEKLY_AUDIOBOOKS, WEEKLY_EPISODES, tag)}</span>
      <span class="history-go">${T.openPacket}</span>
    </li>`;
  }).join("");
}

function renderCatalog() {
  const cat = buildCatalog();
  document.getElementById("catalog-brand").textContent = BRAND.label;
  document.getElementById("catalog-count").textContent = T.catalogCount(cat.length);
  document.getElementById("catalog-grid").innerHTML = cat.map(b => `
    <div class="book-card">
      <div class="book-cover ${b.cover ? "book-cover--img" : "book-cover--text"}"${b.cover ? "" : ` style="background:linear-gradient(150deg,hsl(${b.hue} 55% 28%),hsl(${(b.hue+30)%360} 60% 16%))"`}>${b.cover ? `<img src="${esc(b.cover)}" alt="${esc(b.title)}" loading="lazy" onerror="const p=this.parentElement;p.classList.remove('book-cover--img');p.classList.add('book-cover--text');p.style.background='linear-gradient(150deg,hsl(${b.hue} 55% 28%),hsl(${(b.hue+30)%360} 60% 16%))';p.textContent=this.alt;this.remove();">` : esc(b.title)}</div>
      <div class="book-body">
        <div class="book-title">${esc(b.title)}</div>
        ${b.subtitle ? `<div class="book-sub">${esc(b.subtitle)}</div>` : ""}
        <div class="book-desc">${esc(b.desc)}</div>
        ${b.angle ? `<div class="book-angle">▸ ${esc(b.angle)}</div>` : ""}
      </div>
    </div>`).join("");
}

// ── View switching ──────────────────────────────────────────────────────────
function showView(name) {
  ["weekly","history","catalog"].forEach(v => document.getElementById("view-" + v).classList.toggle("hidden", v !== name));
  if (name === "history") renderHistory();
  if (name === "catalog") renderCatalog();
  window.scrollTo(0, 0);
}
function openWeek(i) { currentWeekIdx = (i === 0) ? null : i; renderWeekly(); showView("weekly"); }
function goThisWeek() { currentWeekIdx = null; renderWeekly(); }

// ── Chrome + boot ────────────────────────────────────────────────────────────
function setText(id, txt){ const e = document.getElementById(id); if (e) e.textContent = txt; }
function applyChrome() {
  document.documentElement.lang = LANG;
  document.title = "Pearl Prime — " + T.h1;
  setText("ui-h1", T.h1); setText("ui-sub", T.sub); setText("ui-handoff", T.handoff);
  setText("ui-dlall", T.dlAll); setText("ui-history", T.history); setText("ui-catalog", T.catalog);
  setText("ui-weekly-os", T.weeklyOs);
  setText("ui-history-h", T.reviewHistory); setText("ui-history-back", T.back); setText("ui-history-intro", T.historyIntro);
  setText("ui-files-note", T.filesNote);
  setText("ui-catalog-h", T.fullCatalog); setText("ui-catalog-back", T.back);
}
function humanize(id){ return id.replace(/_(en_us|es_us|es_es|pt_br|zh_tw|zh_hk|zh_cn|zh_sg|ja_jp|ko_kr)$/,"").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase()); }
async function boot() {
  const qid = new URLSearchParams(location.search).get("brand");
  const id = qid || BRAND.id;
  const lane = (id.match(/_([a-z]{2}_[a-z]{2})$/) || [])[1] || "en_us";
  // Lane suffix → market + language. Traditional (zh-Hant) and Simplified
  // (zh-Hans) are distinct scripts and never interchangeable.
  if (lane === "ja_jp") { MARKET = "jp"; LANG = "ja"; CURRENCY = "jpy"; PLATFORMS = PLATFORMS_JP; CAT = CAT_JA; }
  else if (lane === "zh_tw" || lane === "zh_hk") { MARKET = "tw"; LANG = "zh-Hant"; CURRENCY = "twd"; PLATFORMS = PLATFORMS_TW; CAT = CAT_ZH_HANT; }
  else if (lane === "zh_cn" || lane === "zh_sg") { MARKET = "cn"; LANG = "zh-Hans"; CURRENCY = "cny"; PLATFORMS = PLATFORMS_CN; CAT = CAT_ZH_HANS; }
  else { MARKET = "us"; LANG = "en"; CURRENCY = "usd"; PLATFORMS = PLATFORMS_US; CAT = CAT_EN; }
  T = CHROME[LANG];
  applyChrome();
  let bridge = {};
  try { const r = await fetch("brand_admin_brands.json", {cache:"no-store"}); if (r.ok) bridge = await r.json(); } catch (_e) {}
  const info = bridge[id] || {};
  BRAND = { id, label: info.d || humanize(id) };
  const wos = document.getElementById("ui-weekly-os");
  if (wos) wos.href = "/brand_admin_weekly_os.html?brand=" + encodeURIComponent(id);
  const base = id.replace(/_(en_us|es_us|es_es|pt_br|zh_tw|zh_hk|zh_cn|zh_sg|ja_jp|ko_kr)$/, "");
  // Pull the brand's REAL catalog (book plans are en_US only, so US/English view only).
  REAL_CATALOG = null;
  if (LANG === "en") {
    try { const r = await fetch(`brand_catalogs/${base}.json`, {cache:"no-store"}); if (r.ok) { const j = await r.json(); if (j && j.books && j.books.length) REAL_CATALOG = j.books; } } catch (_e) {}
  }
  // Pull the brand's REAL rendered files (only brands with rendered output have a feed).
  REAL_DELIVERY = null;
  try { const r = await fetch(`brand_deliveries/${base}.json`, {cache:"no-store"}); if (r.ok) { const j = await r.json(); if (j && j.weeks) REAL_DELIVERY = j; } } catch (_e) {}
  try { const r = await fetch("brand_admin_weekly_packets.json", {cache:"no-store"}); if (r.ok) PACKET_BRIDGE = await r.json(); } catch (_e) {}
  PACKET_BLOCK = packetBridgeStatus(id);
  renderWeekly();
}
boot();
</script>
