<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pearl Prime — Brand Director Operations</title>
  <style>
    :root {
      --bg: #0e0a06;
      --card: #1a1410;
      --card2: #201810;
      --border: rgba(180, 83, 9, 0.22);
      --amber: #b45309;
      --amber2: #d97706;
      --cream: #faf6f0;
      --muted: rgba(250, 246, 240, 0.45);
      --green: #22c55e;
      --yellow: #facc15;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, "DM Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--cream); line-height: 1.5; min-height: 100vh; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      background: linear-gradient(180deg, #120c08, var(--bg));
      display: flex; align-items: center; gap: 1rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: var(--amber2); }
    header .subtitle { font-size: 0.75rem; color: var(--muted); font-family: var(--mono); }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .top-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .brand-name { font-size: 1.25rem; font-weight: 700; color: var(--cream); }
    .week-badge {
      font-family: var(--mono); font-size: 0.7rem; background: rgba(180,83,9,0.2);
      color: var(--amber2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px;
    }
    .btn { padding: 7px 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--card);
           color: var(--cream); font-size: 0.78rem; cursor: pointer; transition: all .15s; }
    .btn:hover { background: rgba(180,83,9,0.25); border-color: var(--amber2); }
    .btn.primary { background: rgba(180,83,9,0.35); border-color: var(--amber2); color: var(--amber2); font-weight: 600; }
    .btn.primary:hover { background: rgba(180,83,9,0.55); }
    .btn.sm { padding: 4px 11px; font-size: 0.72rem; }
    .actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Badges ── */
    .badge { font-family: var(--mono); font-size: 0.65rem; padding: 3px 9px; border-radius: 10px; border: 1px solid; }
    .badge-green { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }

    /* ── Upload-slots summary strip ── */
    .slots-summary {
      background: rgba(180,83,9,0.10); border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 1.5rem; font-size: 0.8rem;
    }
    .slots-summary .lbl { font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .slots-summary .chip { font-family: var(--mono); font-size: 0.72rem; color: var(--cream); background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 11px; }
    .slots-summary .chip b { color: var(--amber2); }

    /* ── Per-platform delivery cards ── */
    .platform-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 1.1rem; overflow: hidden;
    }
    .platform-head {
      padding: 13px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .platform-icon { font-size: 1.2rem; }
    .platform-name { font-size: 0.95rem; font-weight: 600; }
    .platform-count { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
    .platform-dls { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .platform-body { padding: 12px 16px 14px; }
    .mode-tag { font-family: var(--mono); font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
    .mode-bulk { color: var(--green); border-color: var(--green); background: rgba(34,197,94,0.08); }
    .mode-single { color: var(--yellow); border-color: var(--yellow); background: rgba(250,204,21,0.07); }
    .mode-rss { color: var(--blue); border-color: var(--blue); background: rgba(96,165,250,0.08); }

    /* ── How-to instructions ── */
    .howto { background: rgba(0,0,0,0.28); border: 1px solid rgba(180,83,9,0.16); border-radius: 7px; padding: 10px 13px; margin-bottom: 12px; }
    .howto > summary { font-size: 0.66rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: .07em; color: var(--amber2); cursor: pointer; list-style: none; outline: none; }
    .howto > summary::-webkit-details-marker { display: none; }
    .howto > summary::before { content: "▾ "; color: var(--muted); }
    .howto:not([open]) > summary::before { content: "▸ "; }
    .howto ol { margin: 9px 0 0; padding-left: 1.2rem; }
    .howto li { font-size: 0.74rem; color: var(--cream); margin: 4px 0; }
    .howto .note { font-size: 0.67rem; color: var(--muted); margin-top: 8px; font-style: italic; }
    .howto code { font-family: var(--mono); font-size: 0.69rem; color: var(--amber2); background: rgba(0,0,0,0.35); padding: 1px 5px; border-radius: 3px; }

    /* ── Title list ── */
    .title-list { list-style: none; }
    .title-list li {
      padding: 8px 0; border-bottom: 1px solid rgba(180,83,9,0.1);
      display: flex; align-items: center; gap: 10px; font-size: 0.8rem;
    }
    .title-list li:last-child { border-bottom: none; }
    .title-num { font-family: var(--mono); color: var(--muted); font-size: 0.65rem; min-width: 18px; }
    .title-text { flex: 1; }
    .format-badge { font-size: 0.6rem; font-family: var(--mono); padding: 1px 7px; border-radius: 10px; border: 1px solid; white-space: nowrap; }
    .fmt-ebook { border-color: var(--blue); color: var(--blue); }
    .fmt-audiobook { border-color: var(--purple); color: var(--purple); }
    .fmt-episode { border-color: var(--yellow); color: var(--yellow); }

    /* ── History view ── */
    .history-list { list-style: none; }
    .history-row {
      display: flex; align-items: center; gap: 12px; padding: 13px 16px;
      background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 9px;
      cursor: pointer; transition: all .15s;
    }
    .history-row:hover { border-color: var(--amber2); background: rgba(180,83,9,0.12); }
    .history-week { font-family: var(--mono); font-weight: 600; color: var(--amber2); min-width: 96px; }
    .history-meta { font-size: 0.75rem; color: var(--muted); flex: 1; }
    .history-go { font-size: 0.72rem; color: var(--amber2); }

    /* ── Catalog view ── */
    .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.1rem; }
    .book-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    .book-cover {
      height: 150px; display: flex; align-items: center; justify-content: center; text-align: center;
      padding: 14px; font-weight: 700; font-size: 0.95rem; color: #fff; line-height: 1.25;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .book-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .book-title { font-size: 0.85rem; font-weight: 600; }
    .book-desc { font-size: 0.72rem; color: var(--muted); flex: 1; }
    .book-angle { font-size: 0.66rem; font-family: var(--mono); color: var(--amber2); border-top: 1px solid rgba(180,83,9,0.15); padding-top: 7px; }

    .section-title { font-size: 0.85rem; font-weight: 600; color: var(--cream); margin: 0 0 1rem; }
    .viewing-note { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); margin-bottom: 1rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Brand Director Operations</h1>
    <div class="subtitle">Pearl Prime · weekly content packet</div>
  </div>
</header>

<div class="page">

  <!-- Top bar -->
  <div class="top-bar">
    <span class="brand-name" id="brand-name">…</span>
    <span class="week-badge" id="week-label">—</span>
    <span class="badge badge-green">Weekly handoff</span>
    <div class="actions">
      <button class="btn primary" onclick="downloadAll()">⬇ Download all packets</button>
      <button class="btn" onclick="showView('history')">🕘 Review History</button>
      <button class="btn" onclick="showView('catalog')">📚 View Catalog</button>
    </div>
  </div>

  <!-- ════════ WEEKLY VIEW ════════ -->
  <div id="view-weekly">
    <div class="viewing-note hidden" id="history-note"></div>
    <div class="slots-summary" id="slots-summary"></div>
    <div id="platforms"></div>
  </div>

  <!-- ════════ HISTORY VIEW ════════ -->
  <div id="view-history" class="hidden">
    <div class="top-bar" style="margin-bottom:1rem">
      <h3 class="section-title" style="margin:0">Review History</h3>
      <div class="actions"><button class="btn sm" onclick="showView('weekly')">← Back to this week</button></div>
    </div>
    <p class="viewing-note">Every weekly packet since this brand launched. Click a week to reopen its packet.</p>
    <ul class="history-list" id="history-list"></ul>
  </div>

  <!-- ════════ CATALOG VIEW ════════ -->
  <div id="view-catalog" class="hidden">
    <div class="top-bar" style="margin-bottom:1rem">
      <h3 class="section-title" style="margin:0">Full Catalog — <span id="catalog-brand"></span></h3>
      <div class="actions"><button class="btn sm" onclick="showView('weekly')">← Back to this week</button></div>
    </div>
    <p class="viewing-note" id="catalog-count"></p>
    <div class="catalog-grid" id="catalog-grid"></div>
  </div>

</div><!-- /page -->

<script>
"use strict";

// ════════════════════════════════════════════════════════════════════════
// Single-brand Brand Director Operations. Brand is FIXED from ?brand=<unified_id>
// via the shared bridge JSON (brand_admin_brands.json). No brand switching.
//
// Per-platform delivery + instructions reflect the REAL 2026 upload mechanics
// (researched per platform). Each retail channel gets ONE download (its metadata
// packet) + step-by-step "how to upload". Titles/metadata are deterministic
// placeholders shaped like the real handoff packet, pending the real catalog feed.
// ════════════════════════════════════════════════════════════════════════

const LANE_MARKET = {en_us:"us",es_us:"us",es_es:"spain",pt_br:"brazil",zh_tw:"taiwan",zh_hk:"hong_kong",zh_cn:"china",zh_sg:"singapore",ja_jp:"japan",ko_kr:"korea"};

// Distribution channels. ebooks fan out to all 3 ebook stores; audiobooks → INaudio;
// serialized audio → the podcast channel. `feed` selects which weekly list a card shows.
const PLATFORMS = [
  {
    id:"google_play", label:"Google Play Books", icon:"▶", feed:"ebooks", noun:"ebooks",
    mode:"Bulk upload", modeClass:"mode-bulk", dlLabel:"⬇ Book-list + files",
    steps:[
      "Sign in to <b>Google Play Books Partner Center</b> → <b>Book Catalog</b>.",
      "<b>Advanced options → Upload book list</b> → choose the <code>google_play_booklist.txt</code> from this packet.",
      "<b>Advanced options → Upload content files</b> → drag in the EPUBs + cover images (each file named with its ISBN).",
      "<b>View uploaded lists</b> → fix any errors → set each book to <b>For sale</b>."
    ],
    note:"Bulk — all titles in one go. The book-list and the EPUB/cover files are two separate uploads; Google joins them by filename, so every file must be named with its ISBN."
  },
  {
    id:"amazon_kdp", label:"Amazon KDP", icon:"📖", feed:"ebooks", noun:"ebooks",
    mode:"One title at a time", modeClass:"mode-single", dlLabel:"⬇ Copy-paste CSV + files",
    steps:[
      "KDP Bookshelf → <b>+ Create → Kindle eBook</b>.",
      "<b>Copy-paste</b> one row from <code>kdp_metadata.csv</code> (title, description, 7 keywords, 3 categories).",
      "Answer the <b>AI-content question: Yes</b> for text, <b>Yes</b> for the cover image. Upload that title's EPUB + cover.",
      "Set price → <b>Publish</b>. Repeat for the next title."
    ],
    note:"KDP has no bulk upload — it's one title at a time. The CSV is just your copy-paste source; you attach the EPUB + cover by hand. Max 10 new titles per week."
  },
  {
    id:"apple_books", label:"Apple Books", icon:"", feed:"ebooks", noun:"ebooks",
    mode:"One title at a time", modeClass:"mode-single", dlLabel:"⬇ Metadata + files",
    steps:[
      "Sign in at <b>authors.apple.com</b> → <b>Submit a New Book</b> (any browser — no Mac needed).",
      "Upload the title's <b>EPUB + sample + cover</b>.",
      "<b>Copy-paste</b> the metadata from <code>apple_books_metadata.csv</code>; set price + territories → <b>Submit</b>.",
      "Repeat for the next title."
    ],
    note:"One at a time via the web portal. True bulk needs Apple's Mac-only Transporter (technical) or an aggregator — ask us if you ever need it."
  },
  {
    id:"inaudio", label:"Voices by INaudio", icon:"🎧", feed:"audiobooks", noun:"audiobooks",
    mode:"One title at a time", modeClass:"mode-single", dlLabel:"⬇ Audio + metadata",
    steps:[
      "Sign in at <b>inaudio.com</b> → <b>Add new audiobook</b> (this is Findaway Voices, rebranded).",
      "Copy-paste the metadata; <b>tick “digital voice narration”</b> (required — our audio is AI).",
      "Upload the cover, then the audio in order: <b>opening credits → chapters → closing credits → retail sample</b>.",
      "Set price + territories → <b>Submit</b>."
    ],
    note:"This is where audiobooks go — NOT Google Play. Audible rejects AI narration, so leave Audible unticked. Audio = per-chapter MP3, 192 kbps CBR, 44.1 kHz."
  },
  {
    id:"podcast", label:"Podcast · Spotify + Apple", icon:"🎙", feed:"episodes", noun:"episodes",
    mode:"Weekly episode (RSS)", modeClass:"mode-rss", dlLabel:"⬇ Episode sheet + MP3",
    steps:[
      "Log in to your podcast host (<b>Spotify for Creators</b>).",
      "<b>New Episode</b> → upload this week's MP3 (128 kbps, 44.1 kHz).",
      "Copy-paste the episode <b>title, number, and description</b>; set the publish date → <b>Publish</b>.",
      "The RSS feed updates automatically — <b>Apple Podcasts + Spotify</b> pick it up within hours. No resubmission."
    ],
    note:"Show setup + submitting the RSS feed to Apple/Spotify is a one-time step (already done). Each week you just add the episode."
  },
];

const CATALOG_START = new Date(2026, 4, 4); // 2026-05-04 (~W18) — drives Review History reach-back
const WEEKLY_EBOOKS = 8, WEEKLY_AUDIOBOOKS = 3, WEEKLY_EPISODES = 2;

let BRAND = {id:"devotion_path_en_us", label:"Open Vessel Press"};
let currentWeekIdx = null; // null = this week; else index into weekHistory()

// ── ISO-week helpers ──────────────────────────────────────────────────────
function isoWeek(d) {
  const t = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(t.getFullYear(), 0, 4);
  const wn = 1 + Math.round(((t - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  return `${t.getFullYear()}-W${String(wn).padStart(2,"0")}`;
}
function weekHistory() {
  const out = [], now = new Date();
  let d = new Date(CATALOG_START.getTime());
  while (d <= now) { const l = isoWeek(d); if (!out.includes(l)) out.push(l); d = new Date(d.getTime() + 7*86400000); }
  return out.reverse();
}
function currentWeekLabel() { return isoWeek(new Date()); }
function weekLabelFor(idx){ const h = weekHistory(); return (idx==null) ? currentWeekLabel() : h[idx]; }

// ── Deterministic catalog (placeholder shaped like the real packet) ───────
const TITLES = [
  "The Open Vessel","Returning to Stillness","Devotion Without Religion","The Unhurried Heart",
  "Emptiness as Refuge","The Ground That Holds You","Surrender Is Not Defeat","The Quiet That Remains",
  "Becoming Transparent","The Grace of Enough","Resting in What Is","The End of Seeking",
  "Tender Awareness","The Sacred Ordinary","Letting the Bottom Fall Out","Home Before Thought",
  "The Mercy of Slowness","Nothing to Fix","The Field of Allowing","Trust the Unfolding",
  "The Wordless Yes","Soft Front, Strong Back","The Permission to Pause","Faith Without Certainty",
];
const DESCS = [
  "A contemplative path back to presence — short chapters for the overwhelmed.",
  "Burnout recovery without dogma: rest as a spiritual practice, not a reward.",
  "Devotion stripped of religion — for the spiritually homesick.",
  "Nervous-system stillness for people who can't stop bracing.",
  "Letting go when control was the only thing that kept you safe.",
  "Identity rebuild after everything you organized your life around fell away.",
];
const ANGLES = ["For the spiritually weary","Burnout recovery · no dogma","Nervous-system rest","Identity rebuild after collapse","Overthinkers welcome","Grief-literate stillness"];
const KEYWORDS = ["spiritual practice","mindfulness for burnout","contemplative living","letting go","inner stillness","devotion without religion","nervous system regulation"];
const COVER_HUES = [18, 32, 268, 200, 150, 340];

function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); }
function isbnFor(i){ return "978" + String(1000000000 + i * 7919).slice(0,10); }

function buildCatalog() {
  return TITLES.map((title, i) => ({
    title,
    desc: DESCS[i % DESCS.length],
    angle: ANGLES[i % ANGLES.length],
    isbn: isbnFor(i),
    price: (i % 3 === 0) ? "4.99" : "5.99",
    hue: COVER_HUES[i % COVER_HUES.length],
  }));
}

// Weekly packet: ebooks rotate through the catalog so each week differs. Audiobooks
// are the audio renditions of the first few; episodes are this week's serialized audio.
function buildPacket(weekIdx) {
  const cat = buildCatalog(), n = cat.length;
  const start = (weekIdx * WEEKLY_EBOOKS) % n;
  const ebooks = [];
  for (let i = 0; i < WEEKLY_EBOOKS; i++) ebooks.push(cat[(start + i) % n]);
  const audiobooks = ebooks.slice(0, WEEKLY_AUDIOBOOKS);
  const episodes = ebooks.slice(0, WEEKLY_EPISODES).map((b, i) => ({...b, epNum: weekIdx * WEEKLY_EPISODES + i + 1}));
  return { ebooks, audiobooks, episodes };
}
function packetFor(idx){ const h = weekHistory(); const realIdx = (idx==null) ? 0 : idx; return buildPacket(h.length - 1 - realIdx); }
function feedFor(pkt, p){ return pkt[p.feed] || []; }

// ── Downloads ──────────────────────────────────────────────────────────────
function dl(name, text, mime) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], {type: mime || "text/plain"}));
  a.download = name; a.click();
}
function row(arr, sep){ return arr.map(v => sep === "\t" ? String(v) : `"${String(v).replace(/"/g,'""')}"`).join(sep || ","); }

// Build the platform-correct metadata file (the thing the director copy-pastes/uploads).
function buildMetadataFile(pid, week, pkt) {
  const p = PLATFORMS.find(x => x.id === pid);
  const items = feedFor(pkt, p);
  if (pid === "google_play") {
    // tab-delimited book-list: filename (=ISBN) joins to the separately-uploaded EPUB/cover
    const head = ["identifier","title","contributor","description","language","price_usd","content_file","cover_file"];
    const rows = items.map(b => [b.isbn, b.title, BRAND.label, b.desc, "en", b.price, `${b.isbn}.epub`, `${b.isbn}_frontcover.jpg`]);
    return {name:`google_play_booklist__${BRAND.id}__${week}.txt`, text:[head, ...rows].map(r => row(r,"\t")).join("\n"), mime:"text/plain"};
  }
  if (pid === "amazon_kdp") {
    const head = ["title","subtitle","author","description","keyword_1","keyword_2","keyword_3","keyword_4","keyword_5","keyword_6","keyword_7","category_1","category_2","category_3","price_usd","ai_text","ai_images","manuscript_file","cover_file"];
    const rows = items.map(b => [b.title, b.angle, BRAND.label, b.desc, ...KEYWORDS, "Religion & Spirituality","Self-Help","Body, Mind & Spirit", b.price, "Yes","Yes", `${slug(b.title)}.epub`, `${slug(b.title)}.jpg`]);
    return {name:`kdp_metadata__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
  if (pid === "apple_books") {
    const head = ["title","author","publisher","description","language","category","price_usd","isbn","epub_file","sample_file","cover_file"];
    const rows = items.map(b => [b.title, BRAND.label, BRAND.label, b.desc, "EN", "Religion & Spirituality", b.price, b.isbn, `${slug(b.title)}.epub`, `${slug(b.title)}_sample.epub`, `${slug(b.title)}.jpg`]);
    return {name:`apple_books_metadata__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
  if (pid === "inaudio") {
    const head = ["title","author","narrator","isbn","description","category","price_usd","digital_voice","audio_files","cover_file"];
    const rows = items.map(b => [b.title, BRAND.label, "Digital voice (AI)", b.isbn, b.desc, "Religion & Spirituality", "9.99", "Yes", `${slug(b.title)}/01_opening.mp3; ${slug(b.title)}/chapters/*.mp3; ${slug(b.title)}/99_closing.mp3; ${slug(b.title)}/retail_sample.mp3`, `${slug(b.title)}_cover.jpg`]);
    return {name:`inaudio_audiobooks__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
  if (pid === "podcast") {
    const head = ["episode_number","episode_title","publish_date","description","explicit","audio_file"];
    const rows = items.map(b => [b.epNum, `Ep ${b.epNum}: ${b.title}`, week, b.desc, "No", `${BRAND.id}_ep${String(b.epNum).padStart(3,"0")}.mp3`]);
    return {name:`podcast_episodes__${BRAND.id}__${week}.csv`, text:[head, ...rows].map(r => row(r)).join("\n"), mime:"text/csv"};
  }
}
function dlPacket(pid) {
  const week = weekLabelFor(currentWeekIdx), pkt = packetFor(currentWeekIdx);
  const f = buildMetadataFile(pid, week, pkt);
  if (f) dl(f.name, f.text, f.mime);
}
function downloadAll() {
  const week = weekLabelFor(currentWeekIdx), pkt = packetFor(currentWeekIdx);
  const head = ["channel","format","title","isbn_or_ep","description","price_usd","week","brand"];
  const rows = [head];
  PLATFORMS.forEach(p => feedFor(pkt, p).forEach(b =>
    rows.push([p.label, p.noun.replace(/s$/,""), (p.feed==="episodes"?`Ep ${b.epNum}: ${b.title}`:b.title), (b.isbn||b.epNum||""), b.desc, (b.price||"9.99"), week, BRAND.label])));
  dl(`handoff_all_packets__${BRAND.id}__${week}.csv`, rows.map(r => row(r)).join("\n"), "text/csv");
}

// ── Renders ───────────────────────────────────────────────────────────────
function renderWeekly() {
  const idx = currentWeekIdx, week = weekLabelFor(idx), pkt = packetFor(idx);
  document.getElementById("brand-name").textContent = BRAND.label;
  document.getElementById("week-label").textContent = week;

  const note = document.getElementById("history-note");
  if (idx == null) { note.classList.add("hidden"); }
  else { note.classList.remove("hidden"); note.innerHTML = `Viewing past week <b style="color:var(--amber2)">${week}</b> &nbsp;·&nbsp; <a href="#" onclick="goThisWeek();return false" style="color:var(--amber2)">→ jump to current week</a>`; }

  // Summary strip — what's going where this week
  document.getElementById("slots-summary").innerHTML =
    `<span class="lbl">📦 This week</span>` +
    `<span class="chip"><b>${pkt.ebooks.length}</b> ebooks → Google Play · KDP · Apple</span>` +
    `<span class="chip"><b>${pkt.audiobooks.length}</b> audiobooks → INaudio</span>` +
    `<span class="chip"><b>${pkt.episodes.length}</b> episodes → Podcast</span>`;

  // Per-platform cards
  document.getElementById("platforms").innerHTML = PLATFORMS.map(p => {
    const items = feedFor(pkt, p);
    const fmtClass = p.feed === "audiobooks" ? "fmt-audiobook" : p.feed === "episodes" ? "fmt-episode" : "fmt-ebook";
    const fmtLabel = p.feed === "audiobooks" ? "audiobook" : p.feed === "episodes" ? "episode" : "ebook";
    const titles = items.map((b, i) => {
      const label = p.feed === "episodes" ? `Ep ${b.epNum}: ${b.title}` : b.title;
      return `<li><span class="title-num">${i+1}.</span><span class="title-text">${label}</span><span class="format-badge ${fmtClass}">${fmtLabel}</span></li>`;
    }).join("");
    return `<div class="platform-card">
      <div class="platform-head">
        <span class="platform-icon">${p.icon || "📦"}</span>
        <span class="platform-name">${p.label}</span>
        <span class="mode-tag ${p.modeClass}">${p.mode}</span>
        <span class="platform-count">${items.length} ${p.noun} this week</span>
        <span class="platform-dls"><button class="btn sm primary" onclick="dlPacket('${p.id}')">${p.dlLabel}</button></span>
      </div>
      <div class="platform-body">
        <details class="howto" open>
          <summary>How to upload to ${p.label}</summary>
          <ol>${p.steps.map(s => `<li>${s}</li>`).join("")}</ol>
          <div class="note">${p.note}</div>
        </details>
        <ul class="title-list">${titles}</ul>
      </div>
    </div>`;
  }).join("");
}

function renderHistory() {
  const h = weekHistory();
  document.getElementById("history-list").innerHTML = h.map((wk, i) => {
    const tag = i === 0 ? "this week" : `${i} week${i>1?"s":""} ago`;
    return `<li class="history-row" onclick="openWeek(${i})">
      <span class="history-week">${wk}</span>
      <span class="history-meta">${WEEKLY_EBOOKS} ebooks · ${WEEKLY_AUDIOBOOKS} audiobooks · ${WEEKLY_EPISODES} episodes · ${tag}</span>
      <span class="history-go">Open packet →</span>
    </li>`;
  }).join("");
}

function renderCatalog() {
  const cat = buildCatalog();
  document.getElementById("catalog-brand").textContent = BRAND.label;
  document.getElementById("catalog-count").textContent = `${cat.length} titles in catalog`;
  document.getElementById("catalog-grid").innerHTML = cat.map(b => `
    <div class="book-card">
      <div class="book-cover" style="background:linear-gradient(150deg,hsl(${b.hue} 55% 28%),hsl(${(b.hue+30)%360} 60% 16%))">${b.title}</div>
      <div class="book-body">
        <div class="book-title">${b.title}</div>
        <div class="book-desc">${b.desc}</div>
        <div class="book-angle">▸ ${b.angle}</div>
      </div>
    </div>`).join("");
}

// ── View switching ──────────────────────────────────────────────────────────
function showView(name) {
  ["weekly","history","catalog"].forEach(v =>
    document.getElementById("view-" + v).classList.toggle("hidden", v !== name));
  if (name === "history") renderHistory();
  if (name === "catalog") renderCatalog();
  window.scrollTo(0, 0);
}
function openWeek(i) { currentWeekIdx = (i === 0) ? null : i; renderWeekly(); showView("weekly"); }
function goThisWeek() { currentWeekIdx = null; renderWeekly(); }

// ── Boot: resolve the fixed brand from the bridge, then render ──────────────
function humanize(id){ return id.replace(/_(en_us|es_us|es_es|pt_br|zh_tw|zh_hk|zh_cn|zh_sg|ja_jp|ko_kr)$/,"").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase()); }
async function boot() {
  const qid = new URLSearchParams(location.search).get("brand");
  const id = qid || BRAND.id;
  let bridge = {};
  try { const r = await fetch("brand_admin_brands.json", {cache:"no-store"}); if (r.ok) bridge = await r.json(); } catch (_e) {}
  const info = bridge[id] || {};
  BRAND = { id, label: info.d || humanize(id) };
  renderWeekly();
}
boot();
</script>
</body>
</html>
