<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Admin — Weekly Work (v2)</title>
<!-- CSS tokens: brand_handoff_dashboard.html :root L8-24 -->
<style>
:root{--bg:#0e0a06;--card:#1a1410;--border:rgba(180,83,9,.22);--amber:#b45309;--amber2:#d97706;--cream:#faf6f0;--muted:rgba(250,246,240,.45);--green:#22c55e;--red:#ef4444;--font:"Segoe UI",system-ui,-apple-system,sans-serif;--mono:ui-monospace,"DM Mono",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--cream);line-height:1.5;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:1rem 1.5rem;background:linear-gradient(180deg,#120c08,var(--bg));display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
header h1{font-size:1.1rem;font-weight:600;color:var(--amber2)}
.subtitle{font-size:.75rem;color:var(--muted);font-family:var(--mono)}
.back{color:var(--amber2);text-decoration:none;font-size:.85rem}
.back:hover{text-decoration:underline}
main{max-width:960px;margin:0 auto;padding:1.5rem}
.banner{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:6px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.85rem;color:#fca5a5}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--amber2)}
.card h2{font-size:1rem;color:var(--cream);margin-bottom:.35rem}
.card .summary{font-size:.78rem;color:var(--muted);margin-bottom:.5rem;min-height:2.4em}
.chips{display:flex;flex-wrap:wrap;gap:.35rem}
.chip{font-family:var(--mono);font-size:.55rem;padding:2px 8px;border-radius:12px;border:1px solid var(--border);color:var(--amber2)}
.week-bar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.week-bar button{background:var(--card);border:1px solid var(--border);color:var(--cream);padding:.35rem .75rem;border-radius:4px;cursor:pointer;font-family:var(--mono);font-size:.75rem}
.week-bar button:hover{border-color:var(--amber2)}
.week-label{font-family:var(--mono);font-size:.9rem;color:var(--amber2)}
section{margin-bottom:2rem}
section h3{font-size:.95rem;color:var(--amber2);margin-bottom:.75rem;border-bottom:1px solid var(--border);padding-bottom:.35rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:.55rem .65rem;text-align:left;border-bottom:1px solid var(--border)}
th{font-family:var(--mono);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
tr.dim td{color:var(--muted);opacity:.65}
.btn-dl{display:inline-block;background:rgba(180,83,9,.2);border:1px solid var(--border);color:var(--amber2);padding:.35rem .85rem;border-radius:4px;text-decoration:none;font-family:var(--mono);font-size:.7rem}
.btn-dl:hover{background:rgba(180,83,9,.35)}
.btn-dl.disabled{opacity:.4;pointer-events:none;border-style:dashed}
.history-toggle{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:4px;cursor:pointer;font-size:.8rem;margin-bottom:.5rem}
.history-list{list-style:none}
.history-list li{margin:.35rem 0}
.history-list a{color:var(--amber2);text-decoration:none;font-family:var(--mono);font-size:.8rem}
.ext-links{display:flex;gap:1rem;flex-wrap:wrap}
.ext-links a{color:var(--amber2);font-size:.85rem}
.loading{color:var(--muted);padding:2rem;text-align:center}
.empty{padding:1rem;color:var(--muted);font-size:.85rem;background:var(--card);border-radius:6px;border:1px dashed var(--border)}
</style>
</head>
<body>
<header>
<div>
    <h1 id="page-title">Brand Admin — Weekly Work</h1>
    <p class="subtitle" id="page-sub">37 global brands · pick a brand for this week's downloads</p>
  </div>
</header>
<main id="app"><p class="loading">Loading…</p></main>
<script>
(function(){
  var API = (function(){
    try{ var q = new URLSearchParams(location.search).get('api_base'); if(q) return q.replace(/\/$/,''); }catch(e){}
    if(typeof window.__BRAND_ADMIN_API_BASE==='string') return window.__BRAND_ADMIN_API_BASE.replace(/\/$/,'');
    return 'http://127.0.0.1:8000';
  })();

  function qs(){ return new URLSearchParams(location.search); }
  function nav(params){
    var p = qs();
    Object.keys(params).forEach(function(k){
      if(params[k]==null) p.delete(k);
      else p.set(k, params[k]);
    });
    location.search = p.toString();
  }
  function esc(s){
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function apiFail(){
    return '<div class="banner">Start the API: <code>PYTHONPATH=. python3 scripts/run_server.py</code><br>Then reload with <code>?api_base=http://127.0.0.1:8000</code> if needed.</div>';
  }

  function fetchJson(path){
    return fetch(API + path, {cache:'no-store'}).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    });
  }

  function axisChips(axes){
    var m = {book:'book', manga:'manga', music:'music'};
    return (axes||[]).map(function(a){
      return '<span class="chip">'+esc(m[a]||a)+'</span>';
    }).join('');
  }

  function renderPicker(){
    document.getElementById('page-title').textContent = 'Pick a brand';
    document.getElementById('page-sub').textContent = 'Global brands (manga canon · 37 slots)';
    fetchJson('/api/brand_admin/brand_index').then(function(idx){
      var brands = idx.manga || [];
      if(!brands.length){
        document.getElementById('app').innerHTML = '<div class="empty">No brands in manga canon.</div>';
        return;
      }
      return Promise.all(brands.map(function(b){
        return fetchJson('/api/brand_admin/brand/'+encodeURIComponent(b.brand_id)+'/planned_volumes')
          .catch(function(){
            return {brand_id:b.brand_id, summary_line:'Plan unavailable', axes_present:[b.axis]};
          })
          .then(function(pv){ return {brand:b, pv:pv}; });
      })).then(function(rows){
        var h = '<div class="grid">';
        rows.forEach(function(row){
          var b = row.brand, pv = row.pv;
          h += '<div class="card" data-brand="'+esc(b.brand_id)+'">';
          h += '<h2>'+esc(b.name || b.brand_id)+'</h2>';
          h += '<div class="summary">'+esc(pv.summary_line || '—')+'</div>';
          h += '<div class="chips">'+axisChips(pv.axes_present || ['manga'])+'</div>';
          h += '</div>';
        });
        h += '</div>';
        document.getElementById('app').innerHTML = h;
        document.querySelectorAll('.card').forEach(function(el){
          el.addEventListener('click', function(){
            nav({brand: el.getAttribute('data-brand'), week: null});
          });
        });
      });
    }).catch(function(){
      document.getElementById('app').innerHTML = apiFail();
    });
  }

  function weekNav(week, dir){
    var m = week.match(/^(\d{4})-W(\d{2})$/);
    if(!m) return week;
    var y = parseInt(m[1],10), w = parseInt(m[2],10) + dir;
    if(w < 1){ y--; w = 52; }
    if(w > 52){ y++; w = 1; }
    return y+'-W'+String(w).padStart(2,'0');
  }

  function renderBrand(brandId, week){
    document.getElementById('page-title').textContent = brandId.replace(/_/g,' ');
    var path = '/api/brand_admin/brand/'+encodeURIComponent(brandId)+'/weekly';
    if(week) path += '?week='+encodeURIComponent(week);
    Promise.all([
      fetchJson('/api/brand_admin/brand/'+encodeURIComponent(brandId)+'/planned_volumes'),
      fetchJson(path)
    ]).then(function(res){
      var pv = res[0], wk = res[1];
      document.getElementById('page-sub').textContent = pv.summary_line || '';
      var h = '<a class="back" href="?" onclick="event.preventDefault();location.search=\'\';">← Back to brands</a>';
      h += '<div class="week-bar" style="margin-top:1rem">';
      h += '<button type="button" id="prev-w">← Prev</button>';
      h += '<span class="week-label">Week '+esc(wk.week)+'</span>';
      h += '<button type="button" id="next-w">Next →</button>';
      if(wk.package_status) h += '<span class="subtitle">Package: '+esc(wk.package_status)+'</span>';
      h += '</div>';

      h += '<section><h3>This week\'s downloads</h3>';
      if(!wk.platform_rows || !wk.platform_rows.length){
        h += '<div class="empty">No platform rows.</div>';
      } else {
        h += '<table><thead><tr><th>Platform</th><th>This week</th><th></th></tr></thead><tbody>';
        wk.platform_rows.forEach(function(row){
          var cls = row.deemphasized ? ' class="dim"' : '';
          h += '<tr'+cls+'><td>'+esc(row.platform)+'</td><td>'+esc(row.blurb)+'</td><td>';
          if(row.download_url){
            h += '<a class="btn-dl" href="'+esc(API+row.download_url)+'" download>Download</a>';
          } else {
            h += '<span class="btn-dl disabled">Not packaged yet</span>';
          }
          h += '</td></tr>';
        });
        h += '</tbody></table>';
      }
      if(wk.build_hint && !wk.package_zip_url){
        h += '<p class="empty" style="margin-top:.75rem">'+esc(wk.build_hint)+'</p>';
      }
      h += '</section>';

      h += '<section><button type="button" class="history-toggle" id="hist-toggle">History</button>';
      h += '<ul class="history-list" id="hist-list" style="display:none">';
      (wk.history_weeks||[]).forEach(function(w){
        h += '<li><a href="?brand='+encodeURIComponent(brandId)+'&week='+encodeURIComponent(w)+'">Week '+esc(w)+'</a></li>';
      });
      if(!(wk.history_weeks||[]).length) h += '<li class="subtitle">No prior weeks on disk</li>';
      h += '</ul></section>';

      h += '<section><h3>External dashboards</h3><div class="ext-links">';
      h += '<a href="brand_handoff_dashboard.html" target="_blank" rel="noopener">Brand dashboard</a>';
      h += '<a href="content_inventory.html" target="_blank" rel="noopener">Content inventory</a>';
      h += '</div></section>';

      document.getElementById('app').innerHTML = h;
      document.getElementById('prev-w').onclick = function(){ nav({brand:brandId, week:weekNav(wk.week,-1)}); };
      document.getElementById('next-w').onclick = function(){ nav({brand:brandId, week:weekNav(wk.week,1)}); };
      document.getElementById('hist-toggle').onclick = function(){
        var el = document.getElementById('hist-list');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
      };
    }).catch(function(){
      document.getElementById('app').innerHTML = apiFail();
    });
  }

  var brand = qs().get('brand');
  var week = qs().get('week');
  if(brand) renderBrand(brand, week);
  else renderPicker();
})();
</script>
</body>
</html>
