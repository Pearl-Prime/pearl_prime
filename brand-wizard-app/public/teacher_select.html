<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100vh;font-family:"DM Sans",sans-serif;background:#0e0a06;color:#faf6f0;overflow:hidden}
:root{--acc:#b45309;--acc2:#d97706;--serif:"Cormorant Garamond",serif;--mono:"DM Mono",monospace}

.layout{display:flex;height:100vh;padding-top:36px}

/* Sidebar */
.sidebar{width:200px;min-width:200px;background:rgba(0,0,0,.3);border-right:1px solid rgba(180,83,9,.1);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:12px 12px 10px;border-bottom:1px solid rgba(180,83,9,.08)}
.sidebar-header h2{font-family:var(--serif);font-size:1rem;font-weight:300;color:var(--acc2)}
.sidebar-nav{flex:1;padding:6px 0}
.nav-item{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{background:rgba(180,83,9,.05)}
.nav-item.active{background:rgba(180,83,9,.08);border-left-color:var(--acc2)}
.nav-item .icon{font-size:1rem;width:22px;text-align:center}
.nav-item .name{font-size:.7rem;font-weight:500;color:rgba(250,246,240,.6)}
.nav-item .count{margin-left:auto;font-family:var(--mono);font-size:.4rem;color:rgba(250,246,240,.15)}
.nav-item.active .name{color:var(--acc2)}

/* Main scrollable panel */
.main{flex:1;overflow-y:auto;padding:24px 32px}

/* Section 1: Teacher header/bio */
.teacher-header{margin-bottom:20px}
.teacher-header h2{font-family:var(--serif);font-size:1.8rem;font-weight:300;color:#f5d0a9}
.teacher-header .meta{font-family:var(--mono);font-size:.5rem;letter-spacing:.07em;color:rgba(250,246,240,.2);margin-top:3px}
.teacher-header .tradition-block{margin-top:10px;padding:12px 16px;background:rgba(180,83,9,.04);border-left:2px solid var(--acc);border-radius:0 6px 6px 0}
.teacher-header .tradition-block p{font-size:.8rem;color:rgba(250,246,240,.5);line-height:1.6}

/* Stats */
.stats{display:flex;gap:18px;margin:16px 0;flex-wrap:wrap}
.stat{text-align:center}
.stat .num{font-family:var(--mono);font-size:1.2rem;color:var(--acc2)}
.stat .lbl{font-family:var(--mono);font-size:.38rem;letter-spacing:.07em;text-transform:uppercase;color:rgba(250,246,240,.18);margin-top:1px}

/* Section 2: Pearl News samples */
.samples{margin-top:16px}
.samples h3{font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:12px}
.sample-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.sample-card{background:rgba(255,255,255,.02);border:1px solid rgba(180,83,9,.08);border-radius:7px;padding:14px 16px}
.sample-card .topic-label{font-family:var(--mono);font-size:.42rem;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.sample-card .topic-label .dot{width:4px;height:4px;border-radius:50%;background:var(--acc)}
.sample-card .attribution{font-size:.7rem;color:rgba(250,246,240,.3);margin-bottom:6px;font-style:italic}
.sample-card .body{font-size:.75rem;color:rgba(250,246,240,.5);line-height:1.65}

/* Audio slot */
.audio-slot{margin-top:16px;padding:12px 14px;background:rgba(180,83,9,.03);border:1px dashed rgba(180,83,9,.12);border-radius:6px;display:flex;align-items:center;gap:10px}
.audio-slot .icon{font-size:1.2rem;opacity:.4}
.audio-slot .text{font-size:.65rem;color:rgba(250,246,240,.25)}

/* Actions */
.actions{margin-top:18px;display:flex;gap:8px;flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:.55rem;letter-spacing:.05em;text-transform:uppercase;padding:8px 20px;border-radius:4px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;border:none}
.btn-primary{background:var(--acc);color:#faf6f0}
.btn-primary:hover{background:var(--acc2)}
.btn-secondary{background:transparent;color:var(--acc2);border:1px solid rgba(180,83,9,.25)}
.btn-secondary:hover{border-color:var(--acc2)}

/* Section divider */
.section-divider{margin:28px 0;border:none;border-top:1px solid rgba(180,83,9,.08)}

/* Section 3: Cover cards grid */
.covers-section h3{font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:12px}
.cover-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.cover-card{aspect-ratio:3/4;border-radius:8px;border:1px solid rgba(180,83,9,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .2s;cursor:pointer;overflow:hidden}

.cover-card img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.cover-card .cover-icon{font-family:var(--mono);font-size:.9rem;font-weight:700;color:#f5e6c8;letter-spacing:.1em}
.cover-card .cover-label{font-family:var(--serif);font-size:.95rem;color:#f5e6c8;text-align:center;padding:0 10px}
.cover-card .cover-subtitle{font-family:var(--mono);font-size:.6rem;color:rgba(250,246,240,.25)}

/* Section 4: Book reader */
.book-section{margin-top:8px}
.book-reader-toggle{background:rgba(255,255,255,.03);border:1px solid rgba(180,83,9,.1);border-radius:8px;padding:12px 20px;cursor:pointer;font-family:var(--mono);font-size:.75rem;color:var(--acc2);transition:all .2s;margin-bottom:4px}
.book-reader-toggle:hover{background:rgba(180,83,9,.06)}
.toggle-icon{font-family:var(--mono);margin-right:8px;font-weight:700}
.book-reader{border:1px solid rgba(180,83,9,.08);border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:24px}
.book-content{max-height:500px;overflow-y:auto;padding:32px 40px;background:rgba(0,0,0,.2);font-family:var(--serif);font-size:1.05rem;line-height:1.8;color:#f5e6c8}
.book-content p{margin-bottom:.6em;text-indent:0}
.book-content h3.chapter-heading{font-family:var(--serif);font-size:1.4rem;font-weight:600;color:var(--acc2);margin:2em 0 .8em;padding-top:1em;border-top:1px solid rgba(180,83,9,.08)}
.book-content h3.pre-intro-heading{font-family:var(--serif);font-size:1.2rem;font-weight:500;color:rgba(250,246,240,.4);margin-bottom:1em;font-style:italic}
.book-content br{display:block;height:.3em}
.book-content::-webkit-scrollbar{width:8px}
.book-content::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
.book-content::-webkit-scrollbar-thumb{background:rgba(180,83,9,.15);border-radius:4px}
.book-content::-webkit-scrollbar-thumb:hover{background:rgba(180,83,9,.3)}
.book-loading{padding:24px;text-align:center;font-family:var(--mono);font-size:.7rem;color:rgba(250,246,240,.2)}

@media(max-width:700px){
  .sidebar{display:none}
  .cover-grid{grid-template-columns:repeat(2,1fr)}
}
</style>

// Book content cache
const bookCache={};
let cur=T[0].id;

function init(){
  const nav=document.getElementById("sidebar-nav");
  nav.innerHTML=T.map(t=>`<div class="nav-item${t.id===cur?' active':''}" onclick="show('${t.id}')" id="nav-${t.id}"><span class="icon">${t.icon}</span><span class="name">${t.name}</span><span class="count">${t.total}</span></div>`).join("");
  // Check hash for deep link
  if(location.hash){const h=location.hash.slice(1);if(T.find(x=>x.id===h))cur=h;}
  show(cur);
}

function show(id){
  cur=id;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  const el=document.getElementById("nav-"+id);
  if(el){el.classList.add("active");el.scrollIntoView({block:"nearest"});}

  const t=T.find(x=>x.id===id);
  if(!t)return;
  const m=document.getElementById("main-content");
  m.scrollTop=0;

  // News cards
  const cards=t.news.map(n=>`<div class="sample-card"><div class="topic-label"><span class="dot"></span>${n.topic}</div><div class="attribution">${n.attr}</div><div class="body">${n.body}</div></div>`).join("");

  // Topic tags
  const tags=t.topics.map(tp=>`<span style="font-family:var(--mono);font-size:.4rem;letter-spacing:.05em;padding:2px 6px;border-radius:3px;border:1px solid rgba(180,83,9,.12);color:rgba(250,246,240,.3)">${tp.replace(/_/g," ")}</span>`).join(" ");

  // Cover cards
  const coverCards=t.covers.map(c=>{
    const bg=`background:linear-gradient(135deg,${t.brandColor}22,${t.brandDark}88)`;
    const inner=c.img
      ?`<img src="${c.img}" alt="${t.name} cover"><div class="cover-label">${t.brand}</div><div class="cover-subtitle">${c.label}</div>`
      :`<div class="cover-icon">${c.icon||""}</div><div class="cover-label">${t.brand}</div><div class="cover-subtitle">${c.label}</div>`;
    return `<div class="cover-card" style="${bg}">${inner}</div>`;
  }).join("");

  m.innerHTML=`
    <!-- Section 1: Teacher Bio -->
    <div class="teacher-header">
      <h2>${t.icon} ${t.name}</h2>
      <div class="meta">${t.brand} \u00B7 ${t.tradition}</div>
      <div class="tradition-block"><p>${t.bio || (t.name + ' teaches from the ' + t.tradition + ' tradition. ' + t.focus + '.')} ${tags}</p></div>
    </div>

    <!-- Section 2: Book Covers -->
    <div class="covers-section">
      <h3>Book Covers &amp; Formats</h3>
      <div class="cover-grid">${coverCards}</div>
    </div>

    <hr class="section-divider">

    <!-- Section 3: Inline Book Reader -->
    <div class="book-section">
      <h3 style="font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:12px">Read Book (${t.words} words)</h3>
      <div class="book-reader" style="display:block">
        <div class="book-content" id="book-content-${t.id}">
          <div class="book-loading">Loading book content...</div>
        </div>
      </div>
    </div>`;

  if(window.i18n)window.i18n.applyTranslations();
  // Auto-load book content (inline reader)
  loadBookContent(t.id);
}

function loadBookContent(teacherId){
  const container=document.getElementById("book-content-"+teacherId);
  if(bookCache[teacherId]){
    container.innerHTML=bookCache[teacherId];
    return;
  }
  fetch("teacher_showcase.html")
    .then(r=>r.text())
    .then(html=>{
      const parser=new DOMParser();
      const doc=parser.parseFromString(html,"text/html");
      const section=doc.getElementById(teacherId);
      if(section){
        const bookEl=section.querySelector(".book-content");
        if(bookEl){
          bookCache[teacherId]=bookEl.innerHTML;
          container.innerHTML=bookEl.innerHTML;
        }else{
          container.innerHTML='<div class="book-loading">No book content available for this teacher.</div>';
        }
      }else{
        container.innerHTML='<div class="book-loading">No book content available for this teacher.</div>';
      }
    })
    .catch(()=>{
      container.innerHTML='<div class="book-loading">Could not load book content.</div>';
    });
}

init();
</script>
