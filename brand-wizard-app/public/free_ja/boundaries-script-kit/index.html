<!DOCTYPE html>
<html lang="ja-JP">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>境界線のひとことキット | Phoenix Omega</title>
  <meta name="description" content="8つの場面。8つの、ちょうどよいひとこと。コピーして、使って、終わり。Phoenix Omega からの無料ツール。">
  <meta property="og:title" content="境界線のひとことキット — 無料ツール">
  <meta property="og:description" content="8つの場面。8つの、そのまま使えるひとこと。Phoenix Omega からの無料ツール。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0F;
      --surface: #13131A;
      --accent: #3B82F6;
      --text: #F0EFE8;
      --secondary: #8B8A82;
      --border: rgba(240,239,232,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 48px;
    }

    h1 {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: clamp(1.8rem, 5.5vw, 2.7rem);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .subtitle {
      color: var(--secondary);
      font-size: 15px;
      margin-bottom: 40px;
    }

    .capture-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      margin-bottom: 40px;
    }

    .capture-card h2 {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .capture-card p { color: var(--secondary); font-size: 14px; margin-bottom: 24px; }

    .form-row { display: flex; flex-direction: column; gap: 12px; }

    input[type="text"], input[type="email"] {
      background: rgba(240,239,232,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: var(--secondary); }
    input:focus { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 24px;
      width: 100%;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.88; }

    #tool-section { display: none; }
    #tool-section.visible { display: block; }

    .tool-intro {
      margin-bottom: 28px;
    }

    .tool-intro h2 {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tool-intro p { color: var(--secondary); font-size: 14px; }

    .script-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .script-card:hover { border-color: rgba(59,130,246,0.3); }

    .scenario-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--secondary);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .scenario-title {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .script-text {
      background: rgba(59,130,246,0.08);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .copy-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-copy {
      background: transparent;
      border: 1px solid rgba(59,130,246,0.4);
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 13px;
      padding: 8px 16px;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-copy:hover {
      background: rgba(59,130,246,0.1);
      border-color: var(--accent);
    }

    .copy-confirm {
      font-size: 12px;
      color: var(--secondary);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .copy-confirm.show { opacity: 1; }

    .cta-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 12px;
      padding: 32px 28px;
      margin-top: 64px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cta-banner p {
      font-size: 14px;
      color: var(--secondary);
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    .cta-banner h3 {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .btn-cta {
      display: inline-block;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 24px;
      text-decoration: none;
      transition: opacity 0.2s;
      align-self: flex-start;
    }

    .btn-cta:hover { opacity: 0.88; }

    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--secondary);
      text-align: center;
    }
  </style>
  <!-- GA4 — owner: replace G-PLACEHOLDER with real measurement ID from Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PLACEHOLDER');
    // Capture UTM params for attribution
    (function(){
      var params = new URLSearchParams(window.location.search);
      var utm = {};
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(function(k){
        if(params.get(k)) utm[k] = params.get(k);
      });
      if(Object.keys(utm).length) sessionStorage.setItem('funnel_utm', JSON.stringify(utm));
    })();
  </script>
</head>
<body>
<div class="page-wrap">

  <div class="wordmark">Phoenix Omega — 静心社</div>

  <h1>境界線のひとことキット</h1>
  <p class="subtitle">8つの場面。8つの、ちょうどよいひとこと。コピーして、使って、終わり。</p>

  <div class="capture-card" id="capture-section">
    <h2>無料のひとことキットを使う</h2>
    <p>登録不要。ひとことは、ブラウザの中ですぐに表示されます。</p>
    <form id="capture-form">
      <div class="form-row">
        <input type="text" placeholder="お名前（任意）" autocomplete="given-name">
        <input type="email" placeholder="メールアドレス" required autocomplete="email">
        <button type="submit" class="btn-primary">無料で境界線のひとことを使う</button>
      </div>
    </form>
  </div>

  <div id="tool-section">
    <div class="tool-intro">
      <h2>ひとこと</h2>
      <p>これは、そのまま完成した一文です。このまま使っても、出発点にしても。</p>
    </div>

    <div id="scripts-list"></div>
  </div>

  <div class="cta-banner">
    <p>もっと深く整えたい方へ</p>
    <h3>『品よく断る』集：私を救った、あの「いいえ」 — ¥150</h3>
    <a class="btn-cta" href="https://pearlprime.shop/ja-JP/book/stillness_press/boundaries_corporate_managers_ahjan" rel="noopener">第1巻を ¥150 で読む</a>
  </div>

  <footer>Phoenix Omega — 静心社 からの無料ツール</footer>
</div>

<script>
  const scenarios = [
    {
      label: '場面 01 — 家族',
      title: '行きたくない集まりへの、家族からの誘い。',
      script: '「大切に思っているよ。でも、今回は行けないんだ。」'
    },
    {
      label: '場面 02 — 仕事の過負荷',
      title: '自分のキャパシティを超える量を、引き受けるよう求められている。',
      script: '「今、手一杯です。ひとつだけ引き受けるとしたら、どれが優先ですか？」'
    },
    {
      label: '場面 03 — 感情の受け止め',
      title: '今の自分に出せる以上のものを、相手が必要としている。',
      script: '「あなたのことは大切に思ってる。でも、今これを受け止められる状態じゃないんだ。」'
    },
    {
      label: '場面 04 — 何度もの依頼',
      title: 'もう断ったのに、また同じことを頼まれている。',
      script: '「最初に断ったときと、気持ちは変わっていません。」'
    },
    {
      label: '場面 05 — 直前の依頼',
      title: 'ろくに余裕もないのに、来てくれて当然という空気がある。',
      script: '「お引き受けするには、ちょっと急すぎます。」'
    },
    {
      label: '場面 06 — 罪悪感への揺さぶり',
      title: 'こちらの境界線が、がっかりした態度で揺さぶられている。',
      script: '「がっかりさせてしまったのは分かります。それでも、答えは「いいえ」です。」'
    },
    {
      label: '場面 07 — 求めていない助言',
      title: '頼んでもいない意見を、相手が差し出してくる。',
      script: '「これについては、意見を求めていないんです。」'
    },
    {
      label: '場面 08 — くり返される侵害',
      title: '一度引いた境界線が、また越えられた。',
      script: '「これで二度目です。次もあれば、少し距離を置かせてもらいます。」'
    }
  ];

  document.getElementById('capture-form').addEventListener('submit', function(e) {
    e.preventDefault();
    // GA4 lead_submit
    if (typeof gtag === 'function') {
      gtag('event', 'lead_submit', {
        event_category: 'funnel',
        event_label: 'boundaries-script-kit',
        topic: 'boundaries',
        locale: 'ja-JP',
        value: 0
      });
    }

    document.getElementById('capture-section').style.display = 'none';
    document.getElementById('tool-section').classList.add('visible');
  });

  const list = document.getElementById('scripts-list');

  scenarios.forEach(function(s, i) {
    const card = document.createElement('div');
    card.className = 'script-card';

    const confirmId = 'confirm-' + i;

    card.innerHTML = `
      <div class="scenario-label">${s.label}</div>
      <div class="scenario-title">${s.title}</div>
      <div class="script-text">${s.script}</div>
      <div class="copy-row">
        <button class="btn-copy" onclick="copyScript(this, '${s.script.replace(/'/g, "\\'")}', '${confirmId}')">ひとことをコピー</button>
        <span class="copy-confirm" id="${confirmId}">クリップボードにコピーしました</span>
      </div>
    `;

    list.appendChild(card);
  });

  function copyScript(btn, text, confirmId) {
    // Strip surrounding quote marks (ASCII or Japanese corner brackets)
    const clean = text.replace(/^["「]|["」]$/g, '');
    navigator.clipboard.writeText(clean).then(function() {
      const el = document.getElementById(confirmId);
      el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, 2000);
    }).catch(function() {
      const el = document.getElementById(confirmId);
      el.textContent = '長押しでコピーしてください';
      el.classList.add('show');
    });
  }
</script>
</body>
</html>
