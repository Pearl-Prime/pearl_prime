<!DOCTYPE html>
<html lang="ja-JP">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4分のボディスキャン — Phoenix Omega</title>
  <meta name="description" content="あなたの体は、ずっと何かを伝えようとしています。4分。4つのゾーン。経験はいりません。">
  <meta property="og:title" content="4分のボディスキャン — Phoenix Omega">
  <meta property="og:description" content="4分。4つのゾーン。経験はいりません。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0A0F; color: #F0EFE8; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; font-weight: 300; line-height: 1.8; min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 48px 20px 60px; }
    .brand-tag { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #8B8A82; margin-bottom: 32px; }
    h1 { font-family: 'Cormorant Garamond', 'Noto Serif JP', serif; font-size: clamp(30px, 5.5vw, 46px); font-weight: 500; line-height: 1.3; color: #F0EFE8; margin-bottom: 16px; }
    .subhead { color: #8B8A82; font-size: 16px; margin-bottom: 40px; }
    .card { background: #13131A; border-radius: 12px; padding: 32px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label.field-label { display: block; font-size: 14px; color: #8B8A82; margin-bottom: 8px; }
    input[type="text"], input[type="email"], textarea {
      width: 100%; background: #1A1A24; border: 1px solid #2A2A3A; color: #F0EFE8;
      border-radius: 8px; padding: 12px; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #3B82F6; }
    textarea { resize: vertical; min-height: 80px; line-height: 1.7; }
    .btn { background: #3B82F6; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; width: 100%; }
    .btn:hover { background: #2563EB; }
    #tool-section { display: none; }
    .error-msg { color: #EF4444; font-size: 13px; margin-top: 8px; display: none; }

    /* Body silhouette zone indicator */
    .zone-map {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
    }

    .zone-segment {
      border-radius: 8px;
      transition: all 0.4s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      letter-spacing: 0.08em;
      font-weight: 500;
      color: #8B8A82;
      border: 1px solid #1E1E28;
      background: #13131A;
      text-align: center;
      padding: 0 4px;
    }

    .zone-segment.active {
      background: #1E2D4A;
      border-color: #3B82F6;
      color: #3B82F6;
    }

    .zone-segment.done {
      background: #0D2010;
      border-color: #22C55E;
      color: #22C55E;
    }

    .zone-head { width: 90px; height: 56px; border-radius: 50%; }
    .zone-torso { width: 130px; height: 52px; }
    .zone-belly { width: 120px; height: 48px; }
    .zone-legs { width: 110px; height: 64px; border-radius: 0 0 12px 12px; }

    /* Timer */
    .timer-display { text-align: center; margin: 24px 0; }
    .timer-ring { position: relative; width: 140px; height: 140px; margin: 0 auto 16px; }
    .timer-ring svg { transform: rotate(-90deg); }
    .bg-circle { fill: none; stroke: #1E1E28; stroke-width: 6; }
    .progress-circle { fill: none; stroke: #3B82F6; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 376.99; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
    .timer-time { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Cormorant Garamond', 'Noto Serif JP', serif; font-size: 38px; font-weight: 500; color: #F0EFE8; }

    .zone-label { font-size: 11px; letter-spacing: 0.2em; color: #3B82F6; margin-bottom: 6px; }
    .zone-title { font-family: 'Cormorant Garamond', 'Noto Serif JP', serif; font-size: 26px; font-weight: 500; color: #F0EFE8; margin-bottom: 16px; }
    .zone-instruction { font-size: 15px; color: #8B8A82; line-height: 1.9; background: #1A1A24; border-radius: 8px; padding: 18px; margin-bottom: 20px; }
    .notice-prompt { font-size: 14px; color: #F0EFE8; margin-bottom: 10px; }

    .btn-row { display: flex; gap: 12px; margin-top: 20px; }
    .btn-outline { flex: 1; background: transparent; border: 1px solid #2A2A3A; color: #F0EFE8; border-radius: 8px; padding: 12px; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; font-size: 14px; cursor: pointer; transition: border-color 0.2s; }
    .btn-outline:hover { border-color: #3B82F6; }
    .btn-primary-sm { flex: 1; background: #3B82F6; color: white; border: none; border-radius: 8px; padding: 12px; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary-sm:hover { background: #2563EB; }

    .completion-msg { text-align: center; padding: 36px 0; }
    .completion-msg .big { font-family: 'Cormorant Garamond', 'Noto Serif JP', serif; font-size: 28px; font-weight: 500; color: #F0EFE8; margin-bottom: 10px; }
    .completion-msg .small { color: #8B8A82; font-size: 15px; }

    .cta-banner { background: linear-gradient(135deg, #13131A 0%, #1A1A2E 100%); border: 1px solid #2A2A3A; border-radius: 12px; padding: 32px; margin-top: 40px; text-align: center; }
    .cta-label { font-size: 11px; letter-spacing: 0.2em; color: #8B8A82; margin-bottom: 12px; }
    .cta-title { font-family: 'Cormorant Garamond', 'Noto Serif JP', serif; font-size: 24px; font-weight: 500; color: #F0EFE8; margin-bottom: 8px; line-height: 1.4; }
    .cta-subtitle { color: #8B8A82; font-size: 14px; margin-bottom: 24px; }
    .cta-btn { display: inline-block; background: #3B82F6; color: white; border: none; border-radius: 8px; padding: 12px 32px; font-family: 'DM Sans', 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; text-decoration: none; }
    .cta-btn:hover { background: #2563EB; }
    footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid #1E1E28; text-align: center; font-size: 13px; color: #8B8A82; }
  </style>
  <!-- GA4 — owner: replace G-PLACEHOLDER with real measurement ID from Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PLACEHOLDER');
    // Capture UTM params for attribution
    (function(){
      var params = new URLSearchParams(window.location.search);
      var utm = {};
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(function(k){
        if(params.get(k)) utm[k] = params.get(k);
      });
      if(Object.keys(utm).length) sessionStorage.setItem('funnel_utm', JSON.stringify(utm));
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="brand-tag">Phoenix Omega — 静心社</div>
    <h1>あなたの体は、ずっと何かを伝えようとしています。</h1>
    <p class="subhead">4分。4つのゾーン。経験はいりません。</p>

    <div id="form-section" class="card">
      <p style="font-size:15px; color:#8B8A82; margin-bottom:24px;">完全版のボディスキャン・プロトコルと、『体は知っている』集の考え方をお届けします。</p>
      <div class="form-group">
        <label class="field-label" for="name">お名前</label>
        <input type="text" id="name" placeholder="お名前">
      </div>
      <div class="form-group">
        <label class="field-label" for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>
      <p id="form-error" class="error-msg">お名前と有効なメールアドレスを入力してください。</p>
      <button class="btn" onclick="submitForm()">4分のボディスキャンを使う</button>
    </div>

    <div id="tool-section">
      <div class="card">
        <!-- Zone map -->
        <div class="zone-map">
          <div class="zone-segment zone-head" id="seg-0">あご・顔</div>
          <div class="zone-segment zone-torso" id="seg-1">肩・胸</div>
          <div class="zone-segment zone-belly" id="seg-2">おなか・背中</div>
          <div class="zone-segment zone-legs" id="seg-3">脚・足</div>
        </div>

        <div id="zone-content"></div>
      </div>

      <div class="cta-banner">
        <div class="cta-label">もっと深く整えたい方へ</div>
        <div class="cta-title">体は知っている 集：<br>体に、抱かれて</div>
        <div class="cta-subtitle">第1巻を ¥150 で</div>
        <a href="https://pearlprime.shop/ja-JP/book/stillness_press/somatic_healing_corporate_managers_ahjan" rel="noopener" class="cta-btn">本を読む — ¥150</a>
      </div>
    </div>

    <footer>Phoenix Omega — 静心社 からの無料ツール</footer>
  </div>

  <script>
    const zones = [
      {
        label: "ゾーン 1 / 4",
        title: "あご・顔",
        instruction: "歯のくいしばりをほどく。上あごについていた舌を、そっと落とす。眉のあいだをやわらげる。ここで、何に気づきますか？",
        prompt: "このゾーンで、何を見つけましたか？"
      },
      {
        label: "ゾーン 2 / 4",
        title: "肩・胸",
        instruction: "肩を、耳から遠ざけるように落とす。胸へ、ひと息吸い込んで――広がるのを感じる。ここで、こわばっているのはどこですか？",
        prompt: "このゾーンで、何を見つけましたか？"
      },
      {
        label: "ゾーン 3 / 4",
        title: "おなか・腰",
        instruction: "片手を、おなかに当てる。やわらかいですか、それとも、こわばっていますか？今、腰のあたりの感覚は、どんな質感ですか？",
        prompt: "このゾーンで、何を見つけましたか？"
      },
      {
        label: "ゾーン 4 / 4",
        title: "脚・足",
        instruction: "脚の重みを感じる。足が床にふれている、その接点を感じる。ここには、何がありますか？",
        prompt: "このゾーンで、何を見つけましたか？"
      }
    ];

    const circumference = 2 * Math.PI * 60;
    let currentZone = 0;
    let timerInterval = null;
    let secondsLeft = 60;

    function submitForm() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!name || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('form-error').style.display = 'block';
        return;
      }
            // GA4 lead_submit
      if (typeof gtag === 'function') {
        gtag('event', 'lead_submit', {
          event_category: 'funnel',
          event_label: 'somatic-body-scan',
          topic: 'somatic_healing',
          locale: 'ja-JP',
          value: 0
        });
      }
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('tool-section').style.display = 'block';
      renderZone(0);
    }

    function renderZone(idx) {
      currentZone = idx;
      secondsLeft = 60;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

      // Update segments
      for (let i = 0; i < 4; i++) {
        const seg = document.getElementById('seg-' + i);
        seg.classList.remove('active', 'done');
        if (i < idx) seg.classList.add('done');
        if (i === idx) seg.classList.add('active');
      }

      const z = zones[idx];
      const isLast = idx === 3;

      document.getElementById('zone-content').innerHTML = `
        <div class="zone-label">${z.label}</div>
        <div class="zone-title">${z.title}</div>

        <div class="timer-display">
          <div class="timer-ring">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle class="bg-circle" cx="70" cy="70" r="60"/>
              <circle class="progress-circle" id="prog-circle" cx="70" cy="70" r="60"/>
            </svg>
            <div class="timer-time" id="timer-time">1:00</div>
          </div>
        </div>

        <div class="zone-instruction">${z.instruction}</div>

        <div class="notice-prompt">${z.prompt} <span style="color:#8B8A82;">（任意）</span></div>
        <textarea id="zone-note" placeholder="気づいたこと…"></textarea>

        <div class="btn-row">
          <button class="btn-outline" id="start-btn" onclick="startTimer()">このゾーンを始める</button>
          <button class="btn-primary-sm" onclick="nextZone()">${isLast ? 'スキャンを終える' : '次のゾーンへ'}</button>
        </div>
      `;
    }

    function updateCircle() {
      const circle = document.getElementById('prog-circle');
      if (!circle) return;
      const progress = secondsLeft / 60;
      circle.style.strokeDashoffset = circumference * (1 - progress);
    }

    function startTimer() {
      if (timerInterval) return;
      const btn = document.getElementById('start-btn');
      btn.textContent = '進行中…';
      btn.disabled = true;

      timerInterval = setInterval(() => {
        secondsLeft--;
        const secs = secondsLeft % 60;
        document.getElementById('timer-time').textContent = `0:${secs.toString().padStart(2, '0')}`;
        updateCircle();
        if (secondsLeft <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          if (currentZone < 3) setTimeout(() => nextZone(), 800);
          else setTimeout(() => showCompletion(), 800);
        }
      }, 1000);
    }

    function nextZone() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (currentZone < 3) renderZone(currentZone + 1);
      else showCompletion();
    }

    function showCompletion() {
      for (let i = 0; i < 4; i++) {
        const seg = document.getElementById('seg-' + i);
        seg.classList.remove('active');
        seg.classList.add('done');
      }
      document.getElementById('zone-content').innerHTML = `
        <div class="completion-msg">
          <div class="big">スキャンは、これで完了です。</div>
          <div class="small">見つけたものは、情報です。ただ、それだけのこと。</div>
        </div>
      `;
    }
  </script>
</body>
</html>
