<!DOCTYPE html>
<html lang="ja-JP">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>思考の仕分け | Phoenix Omega</title>
  <meta name="description" content="止まらない思考のループが本当に求めているものを、8つの質問で仕分けます。Phoenix Omega からの無料ツール。">
  <meta property="og:title" content="思考の仕分け — 無料の考えすぎ診断">
  <meta property="og:description" content="そのループは、問題解決・感情の処理・自分を守るため、どれ？ 8つの質問。ひとつの明確な答え。Phoenix Omega からの無料ツール。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0F;
      --surface: #13131A;
      --accent: #3B82F6;
      --text: #F0EFE8;
      --secondary: #8B8A82;
      --border: rgba(240,239,232,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 48px;
    }

    h1 {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: clamp(1.8rem, 5.5vw, 2.7rem);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .subtitle {
      color: var(--secondary);
      font-size: 15px;
      margin-bottom: 40px;
    }

    .capture-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      margin-bottom: 40px;
    }

    .capture-card h2 {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .capture-card p { color: var(--secondary); font-size: 14px; margin-bottom: 24px; }

    .form-row { display: flex; flex-direction: column; gap: 12px; }

    input[type="text"], input[type="email"] {
      background: rgba(240,239,232,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: var(--secondary); }
    input:focus { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 24px;
      width: 100%;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.88; }

    #tool-section { display: none; }
    #tool-section.visible { display: block; }

    /* PROGRESS */
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 36px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .q-count {
      font-size: 12px;
      color: var(--secondary);
      letter-spacing: 0.06em;
      margin-bottom: 20px;
    }

    /* QUESTION CARD */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      margin-bottom: 24px;
      display: none;
    }

    .question-card.active { display: block; }

    .question-text {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-label {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(240,239,232,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .option-label:hover {
      background: rgba(59,130,246,0.07);
      border-color: rgba(59,130,246,0.3);
    }

    .option-label input[type="radio"] { display: none; }

    .option-label.selected {
      background: rgba(59,130,246,0.12);
      border-color: var(--accent);
    }

    .option-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(59,130,246,0.4);
      flex-shrink: 0;
      margin-top: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .option-label.selected .option-dot {
      background: var(--accent);
      border-color: var(--accent);
    }

    .option-label.selected .option-dot::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
    }

    .option-text { font-size: 14px; line-height: 1.6; }

    .q-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--secondary);
      cursor: pointer;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 10px 20px;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-back:hover { border-color: var(--text); color: var(--text); }

    .btn-qnext {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 24px;
      transition: opacity 0.2s;
    }

    .btn-qnext:hover { opacity: 0.88; }
    .btn-qnext:disabled { opacity: 0.4; cursor: not-allowed; }

    /* RESULT */
    .result-card {
      display: none;
      background: var(--surface);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 12px;
      padding: 32px 28px;
    }

    .result-card.visible { display: block; }

    .result-type-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 10px;
    }

    .result-headline {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .result-body {
      color: var(--secondary);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .result-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .additional-result {
      margin-bottom: 16px;
    }

    .add-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--secondary);
      margin-bottom: 6px;
    }

    .add-text {
      font-size: 14px;
      line-height: 1.6;
    }

    .btn-restart {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--secondary);
      cursor: pointer;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 10px 20px;
      margin-top: 8px;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-restart:hover { border-color: var(--text); color: var(--text); }

    .cta-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 12px;
      padding: 32px 28px;
      margin-top: 64px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cta-banner p {
      font-size: 14px;
      color: var(--secondary);
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    .cta-banner h3 {
      font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .btn-cta {
      display: inline-block;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 13px 24px;
      text-decoration: none;
      transition: opacity 0.2s;
      align-self: flex-start;
    }

    .btn-cta:hover { opacity: 0.88; }

    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--secondary);
      text-align: center;
    }
  </style>
  <!-- GA4 — owner: replace G-PLACEHOLDER with real measurement ID from Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PLACEHOLDER');
    // Capture UTM params for attribution
    (function(){
      var params = new URLSearchParams(window.location.search);
      var utm = {};
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(function(k){
        if(params.get(k)) utm[k] = params.get(k);
      });
      if(Object.keys(utm).length) sessionStorage.setItem('funnel_utm', JSON.stringify(utm));
    })();
  </script>
</head>
<body>
<div class="page-wrap">

  <div class="wordmark">Phoenix Omega — 明晰社</div>

  <h1>思考の仕分け</h1>
  <p class="subtitle">8つの質問。ひとつの明確な手がかり。ループが本当に求めているもの。</p>

  <div class="capture-card" id="capture-section">
    <h2>無料診断を受ける</h2>
    <p>2分ほど。登録不要。結果はあなたのブラウザの中で表示されます。</p>
    <form id="capture-form">
      <div class="form-row">
        <input type="text" placeholder="お名前（任意）" autocomplete="given-name">
        <input type="email" placeholder="メールアドレス" required autocomplete="email">
        <button type="submit" class="btn-primary">無料で思考の仕分けを受ける</button>
      </div>
    </form>
  </div>

  <div id="tool-section">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="q-count" id="q-count">質問 1 / 8</div>

    <div id="questions-wrap"></div>

    <div class="result-card" id="result-card">
      <div class="result-type-label" id="result-type-label"></div>
      <div class="result-headline" id="result-headline"></div>
      <div class="result-body" id="result-body"></div>
      <div id="additional-results"></div>
      <button class="btn-restart" onclick="restartQuiz()">最初からやり直す</button>
    </div>
  </div>

  <div class="cta-banner">
    <p>もっと深く整えたい方へ</p>
    <h3>ループ・ブレイカー集『あなたの脳は、上司ではない』— ¥150</h3>
    <a class="btn-cta" href="https://pearlprime.shop/ja-JP/book/stillness_press/overthinking_corporate_managers_ahjan" rel="noopener">第1巻を ¥150 で読む</a>
  </div>

  <footer>Phoenix Omega — 明晰社 からの無料ツール</footer>
</div>

<script>
  document.getElementById('capture-form').addEventListener('submit', function(e) {
    e.preventDefault();
    // GA4 lead_submit
    if (typeof gtag === 'function') {
      gtag('event', 'lead_submit', {
        event_category: 'funnel',
        event_label: 'overthinking-thought-sorter',
        topic: 'overthinking',
        locale: 'ja-JP',
        value: 0
      });
    }

    document.getElementById('capture-section').style.display = 'none';
    document.getElementById('tool-section').classList.add('visible');
    renderQuestions();
  });

  const questions = [
    {
      text: '今、止められない思考のループは、何についてのものですか？',
      options: [
        { letter: 'A', text: '解決しなければいけないこと' },
        { letter: 'B', text: '感じきる必要があること' },
        { letter: 'C', text: '防ごうとしていること' }
      ]
    },
    {
      text: 'そのループは、どのくらい続いていますか？',
      options: [
        { letter: 'A', text: '数時間' },
        { letter: 'B', text: '数日' },
        { letter: 'C', text: '数週間、あるいはそれ以上' }
      ]
    },
    {
      text: '恐れている結末を思い浮かべると、それはどう感じられますか？',
      options: [
        { letter: 'A', text: '具体的ではっきりしている' },
        { letter: 'B', text: '漠然としているが、重い' },
        { letter: 'C', text: 'すべてが崩れていきそう' }
      ]
    },
    {
      text: '前にも同じことを考えて、解決したことはありますか？',
      options: [
        { letter: 'A', text: 'はい、いつも解決する' },
        { letter: 'B', text: 'ときどき' },
        { letter: 'C', text: 'いいえ、完全には止まらない' }
      ]
    },
    {
      text: 'そのループは、どんな感覚を与えてくれますか？',
      options: [
        { letter: 'A', text: '前に進めている感じ' },
        { letter: 'B', text: '用心できている感じ' },
        { letter: 'C', text: '行き詰まっているのに、止められない' }
      ]
    },
    {
      text: 'そのループが求めている、たったひとつのものは？',
      options: [
        { letter: 'A', text: '答え' },
        { letter: 'B', text: '許し' },
        { letter: 'C', text: '安全' }
      ]
    },
    {
      text: 'ループがいちばん大きくなるとき、あなたはたいてい何をしていますか？',
      options: [
        { letter: 'A', text: '仕事をしようとしている' },
        { letter: 'B', text: '眠れずに横になっている' },
        { letter: 'C', text: '大事なことに取りかかろうとしている' }
      ]
    },
    {
      text: '今、ループをいちばん静めてくれるものは何ですか？',
      options: [
        { letter: 'A', text: 'もっと多くの情報' },
        { letter: 'B', text: '話せる相手' },
        { letter: 'C', text: 'とにかく決めてしまうこと' }
      ]
    }
  ];

  const results = {
    A: {
      type: '問題解決のループ',
      headline: 'あなたのループは、問題を解こうとしています。',
      body: '必要なのは、これ以上の思考ではなく、明確な次の一歩です。これが片づけば終われる――そう思える決断や成果をひとつ書き出して、不完全でもいいから実行してみてください。'
    },
    B: {
      type: '感情を処理するループ',
      headline: 'あなたのループは、感情を処理しようとしています。',
      body: '必要なのは、表に出すこと――書く、話す、体を動かす。このループは答えを探しているのではありません。あなたが抱えているものを、どこかに置く場所を探しているのです。'
    },
    C: {
      type: '自分を守るループ',
      headline: 'あなたのループは、あなたを守ろうとしています。',
      body: '必要なのは、安全の合図――呼吸、体、グラウンディング。あなたの神経系は警戒しています。この瞬間は乗り越えられる、という証拠を与えてあげてください。'
    }
  };

  let answers = [];
  let currentQ = 0;

  function renderQuestions() {
    const wrap = document.getElementById('questions-wrap');
    wrap.innerHTML = '';
    answers = new Array(questions.length).fill(null);

    questions.forEach(function(q, i) {
      const card = document.createElement('div');
      card.className = 'question-card' + (i === 0 ? ' active' : '');
      card.id = 'qcard-' + i;

      let optHtml = q.options.map(function(opt) {
        return `
          <label class="option-label" id="opt-${i}-${opt.letter}" onclick="selectOption(${i}, '${opt.letter}', this)">
            <input type="radio" name="q${i}" value="${opt.letter}">
            <div class="option-dot"></div>
            <span class="option-text">${opt.text}</span>
          </label>
        `;
      }).join('');

      const isLast = i === questions.length - 1;

      card.innerHTML = `
        <div class="question-text">${q.text}</div>
        <div class="options-list">${optHtml}</div>
        <div class="q-nav">
          ${i > 0 ? `<button class="btn-back" onclick="goBack(${i})">&larr; 戻る</button>` : '<span></span>'}
          <button class="btn-qnext" id="qnext-${i}" onclick="nextQ(${i})" disabled>${isLast ? '結果を見る' : '次へ &rarr;'}</button>
        </div>
      `;

      wrap.appendChild(card);
    });
  }

  function selectOption(qIndex, letter, labelEl) {
    // Deselect all
    questions[qIndex].options.forEach(function(opt) {
      const el = document.getElementById('opt-' + qIndex + '-' + opt.letter);
      if (el) el.classList.remove('selected');
    });
    labelEl.classList.add('selected');
    answers[qIndex] = letter;
    document.getElementById('qnext-' + qIndex).disabled = false;
  }

  function nextQ(fromIndex) {
    if (!answers[fromIndex]) return;

    document.getElementById('qcard-' + fromIndex).classList.remove('active');

    const next = fromIndex + 1;
    if (next >= questions.length) {
      showResult();
      return;
    }

    document.getElementById('qcard-' + next).classList.add('active');
    currentQ = next;
    updateProgress(next);
    document.getElementById('q-count').textContent = '質問 ' + (next + 1) + ' / ' + questions.length;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goBack(fromIndex) {
    document.getElementById('qcard-' + fromIndex).classList.remove('active');
    const prev = fromIndex - 1;
    document.getElementById('qcard-' + prev).classList.add('active');
    currentQ = prev;
    updateProgress(prev);
    document.getElementById('q-count').textContent = '質問 ' + (prev + 1) + ' / ' + questions.length;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updateProgress(qIndex) {
    const pct = Math.round((qIndex / questions.length) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function showResult() {
    // Count A, B, C
    const counts = { A: 0, B: 0, C: 0 };
    answers.forEach(function(a) { if (a) counts[a]++; });

    const max = Math.max(counts.A, counts.B, counts.C);
    const winners = Object.keys(counts).filter(function(k) { return counts[k] === max; });

    const qWrap = document.getElementById('questions-wrap');
    qWrap.style.display = 'none';

    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('q-count').style.display = 'none';

    const resultCard = document.getElementById('result-card');

    if (winners.length === 1) {
      const r = results[winners[0]];
      document.getElementById('result-type-label').textContent = r.type;
      document.getElementById('result-headline').textContent = r.headline;
      document.getElementById('result-body').textContent = r.body;
      document.getElementById('additional-results').innerHTML = '';
    } else {
      // Mixed — show all with primary highlighted
      document.getElementById('result-type-label').textContent = '混在するループ';
      document.getElementById('result-headline').textContent = 'あなたのループは、ひとつ以上のレベルで働いています。';
      document.getElementById('result-body').textContent = '下のそれぞれの合図が、今あなたの中にあります。いちばん今の自分に当てはまるものから始めてください。';

      const addWrap = document.getElementById('additional-results');
      addWrap.innerHTML = '<hr class="result-divider">';
      winners.forEach(function(w) {
        const r = results[w];
        const div = document.createElement('div');
        div.className = 'additional-result';
        div.innerHTML = `<div class="add-label">${r.type}</div><div class="add-text">${r.body}</div>`;
        addWrap.appendChild(div);
      });
    }

    resultCard.classList.add('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function restartQuiz() {
    document.getElementById('result-card').classList.remove('visible');
    document.getElementById('additional-results').innerHTML = '';
    document.getElementById('q-count').style.display = 'block';
    document.getElementById('q-count').textContent = '質問 1 / 8';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('questions-wrap').style.display = 'block';
    currentQ = 0;
    renderQuestions();
  }
</script>
</body>
</html>
