<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="page.title">Brand Admin -- Pearl Prime</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/icons.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:"DM Sans",sans-serif;background:#0e0a06;color:#faf6f0;overflow-x:hidden}
:root{--acc:#b45309;--acc2:#d97706;--serif:"Cormorant Garamond",serif;--mono:"DM Mono",monospace;--bg:#0e0a06;--card:rgba(255,255,255,.03);--border:rgba(180,83,9,.15);--dim:rgba(250,246,240,.35);--mid:rgba(250,246,240,.6);--hi:rgba(250,246,240,.9);--green:#4ade80;--red:#f87171}

/* -- Top Bar -- */
#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(14,10,6,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;z-index:100;backdrop-filter:blur(10px)}
#topbar h1{font-family:var(--serif);font-size:1rem;font-weight:300;color:var(--acc2)}
.pill{font-family:var(--mono);font-size:.55rem;color:var(--acc2);border:1px solid var(--border);padding:3px 12px;border-radius:14px;letter-spacing:.04em}
#topbar .progress-text{margin-left:auto;font-family:var(--mono);font-size:.55rem;color:var(--dim);letter-spacing:.04em}
.nav-pills{display:flex;gap:4px;margin-left:16px}
.nav-pill{font-family:var(--mono);font-size:.5rem;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s;border:1px solid transparent;background:none}
.nav-pill:hover{color:var(--hi);background:rgba(180,83,9,.08)}
.nav-pill.active{color:var(--acc2);background:rgba(180,83,9,.14);border-color:var(--border)}
.nav-pill.locked{opacity:.3;cursor:not-allowed}

/* -- Main Progress Bar -- */
#main-progress{position:fixed;top:48px;left:0;right:0;z-index:99;padding:12px 20px;background:rgba(14,10,6,.95);border-bottom:1px solid var(--border)}
.progress-phases{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.phase-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.5rem;color:var(--dim);transition:all .3s;flex-shrink:0}
.phase-dot.active{border-color:var(--acc2);color:var(--acc2);box-shadow:0 0 12px rgba(180,83,9,.3)}
.phase-dot.done{border-color:var(--green);background:rgba(74,222,128,.15);color:var(--green)}
.phase-line{flex:1;height:2px;background:var(--border);position:relative}
.phase-line .fill{height:100%;background:var(--acc2);transition:width .4s}
.phase-label{font-family:var(--mono);font-size:.45rem;color:var(--dim);letter-spacing:.06em;text-transform:uppercase}
.phase-label.active{color:var(--acc2)}
.phase-label.done{color:var(--green)}
.bar-track{height:6px;background:rgba(180,83,9,.1);border-radius:3px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;transition:width .5s ease}
.pct-text{font-family:var(--mono);font-size:.65rem;color:var(--acc2);margin-top:4px;text-align:right}

/* -- Container -- */
.container{max-width:900px;margin:0 auto;padding:140px 20px 80px}

/* -- Phase Section -- */
.phase-section{display:none}
.phase-section.visible{display:block}
.phase-title{font-family:var(--serif);font-size:1.8rem;font-weight:300;color:var(--acc2);margin-bottom:6px}
.phase-sub{font-family:var(--mono);font-size:.55rem;color:var(--dim);letter-spacing:.06em;margin-bottom:28px}

/* -- Checklist Card -- */
.check-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.check-card:hover{border-color:rgba(180,83,9,.3)}
.check-card.completed{border-color:rgba(74,222,128,.2)}
.check-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.check-box{width:24px;height:24px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:transparent;transition:all .2s;flex-shrink:0;cursor:pointer}
.check-box.done{border-color:var(--green);background:rgba(74,222,128,.15);color:var(--green)}
.check-num{font-family:var(--mono);font-size:.55rem;color:var(--dim);width:16px;flex-shrink:0}
.check-label{font-size:.85rem;color:var(--hi);flex:1}
.check-time{font-family:var(--mono);font-size:.45rem;color:var(--dim);letter-spacing:.04em}
.check-arrow{color:var(--dim);font-size:.7rem;transition:transform .2s}
.check-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
.check-body.open{display:block}

/* -- Action Button -- */
.action-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(180,83,9,.18);border:1px solid var(--border);color:var(--acc2);font-family:var(--mono);font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;padding:8px 18px;border-radius:6px;cursor:pointer;transition:all .15s;text-decoration:none;margin:6px 4px 6px 0}
.action-btn:hover{background:rgba(180,83,9,.35);border-color:var(--acc2);transform:translateY(-1px)}
.action-btn.big{padding:12px 28px;font-size:.6rem;background:linear-gradient(135deg,rgba(180,83,9,.25),rgba(217,119,6,.2));border-color:var(--acc)}
.action-btn.big:hover{background:linear-gradient(135deg,rgba(180,83,9,.4),rgba(217,119,6,.35))}

/* -- Prefill -- */
.prefill{background:rgba(0,0,0,.25);border:1px solid rgba(180,83,9,.1);border-radius:6px;padding:10px 12px;margin:8px 0}
.prefill-label{font-family:var(--mono);font-size:.42rem;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.prefill-row{display:flex;align-items:center;gap:8px}
.prefill-val{flex:1;background:rgba(0,0,0,.3);border:1px solid rgba(180,83,9,.08);border-radius:4px;padding:7px 10px;font-family:var(--mono);font-size:.65rem;color:var(--hi);line-height:1.45;white-space:pre-wrap;word-break:break-all}
.copy-btn{flex-shrink:0;background:rgba(180,83,9,.15);border:1px solid var(--border);color:var(--acc2);font-family:var(--mono);font-size:.42rem;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:rgba(180,83,9,.3)}
.copy-btn.copied{background:rgba(22,163,74,.2);border-color:rgba(22,163,74,.4);color:var(--green)}
.coord-build-badge{font-family:var(--mono);font-size:.48rem;letter-spacing:.04em;margin-top:8px;color:var(--dim)}
.coord-build-badge.current{color:var(--green)}
.coord-build-badge.stale{color:var(--acc2)}
.coord-build-badge.missing{color:var(--red)}
.coord-build-badge.loading{opacity:.6}
.admin-dl-spinner{display:inline-flex;align-items:center;margin-right:6px;vertical-align:middle}
.admin-dl-spinner svg{animation:admin-dl-spin .8s linear infinite}
@keyframes admin-dl-spin{to{transform:rotate(360deg)}}
.action-btn:disabled{opacity:.55;cursor:not-allowed;pointer-events:none}

/* -- Warn / Note -- */
.warn{border-left:3px solid #dc2626;background:rgba(220,38,38,.06);padding:8px 14px;border-radius:0 6px 6px 0;margin:8px 0;font-size:.72rem;color:var(--mid);line-height:1.55}
.warn strong{color:var(--red)}
.note{border-left:3px solid var(--acc);background:rgba(180,83,9,.06);padding:8px 14px;border-radius:0 6px 6px 0;margin:8px 0;font-size:.72rem;color:var(--mid);line-height:1.55}

/* -- Upload Card (Phase 2) -- */
.upload-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px}
.upload-card h3{font-family:var(--serif);font-size:1.1rem;font-weight:400;color:#f5d0a9;margin-bottom:10px}
.upload-steps{font-size:.75rem;color:var(--mid);line-height:1.7;padding-left:18px;margin:8px 0}
.upload-steps li{margin-bottom:4px}
.upload-progress{font-family:var(--mono);font-size:.55rem;color:var(--dim);margin-top:10px}
.title-checks{margin-top:10px}
.title-check{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.72rem;color:var(--mid);cursor:pointer;user-select:none}
.title-check:hover{color:var(--hi)}
.mini-box{width:16px;height:16px;border:1.5px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:transparent;flex-shrink:0}
.mini-box.done{border-color:var(--green);background:rgba(74,222,128,.12);color:var(--green)}

/* -- Day Card (Phase 3) -- */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin:16px 0}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s}
.day-card:hover{border-color:rgba(180,83,9,.3)}
.day-card.today{border-color:var(--acc2);box-shadow:0 0 16px rgba(180,83,9,.1)}
.day-card.done-day{border-color:rgba(74,222,128,.2)}
.day-name{font-family:var(--mono);font-size:.45rem;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:2px}
.day-title{font-family:var(--serif);font-size:1rem;font-weight:400;color:#f5d0a9;margin-bottom:8px}
.day-actions{list-style:none;padding:0}
.day-actions li{font-size:.72rem;color:var(--mid);padding:3px 0;display:flex;align-items:center;gap:6px;cursor:pointer}
.day-actions li:hover{color:var(--hi)}

/* -- Quick Links -- */
.quick-links{display:flex;flex-wrap:wrap;gap:6px;margin:20px 0;justify-content:center}
.qlink{font-family:var(--mono);font-size:.45rem;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);border:1px solid var(--border);padding:6px 14px;border-radius:6px;text-decoration:none;transition:all .15s}
.qlink:hover{color:var(--acc2);border-color:var(--acc);background:rgba(180,83,9,.08)}

/* -- Brand Picker -- */
#picker{display:none;min-height:100vh;padding:80px 20px 40px;text-align:center}
#picker.show{display:block}
#picker h1{font-family:var(--serif);font-size:2.2rem;font-weight:300;color:var(--acc2);margin-bottom:6px}
#picker .sub{font-family:var(--mono);font-size:.55rem;color:var(--dim);letter-spacing:.08em;margin-bottom:32px}
.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;max-width:1100px;margin:0 auto;text-align:left}
.brand-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .2s}
.brand-card:hover{border-color:var(--acc);background:rgba(180,83,9,.06);transform:translateY(-2px)}
.brand-card h3{font-size:.82rem;font-weight:500;color:#f5d0a9;margin-bottom:3px}
.brand-card .focus{font-size:.62rem;color:var(--dim);line-height:1.4}
.brand-card .teacher-tag{font-family:var(--mono);font-size:.4rem;color:var(--acc2);border:1px solid var(--acc);padding:1px 6px;border-radius:3px;margin-top:5px;display:inline-block}

/* -- Celebration Overlay -- */
#celebration{display:none;position:fixed;inset:0;z-index:200;background:rgba(14,10,6,.85);align-items:center;justify-content:center;flex-direction:column;gap:16px}
#celebration.show{display:flex}
#celebration h2{font-family:var(--serif);font-size:2rem;font-weight:300;color:var(--green)}
#celebration p{font-family:var(--mono);font-size:.6rem;color:var(--dim)}

/* -- Locked overlay -- */
.locked-overlay{position:relative}
.locked-overlay::after{content:"Complete previous phase to unlock";position:absolute;inset:0;background:rgba(14,10,6,.8);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.6rem;color:var(--dim);border-radius:10px;letter-spacing:.04em}

@media(max-width:600px){
  #topbar{flex-wrap:wrap;height:auto;padding:8px 12px;gap:6px}
  .nav-pills{margin-left:0}
  .container{padding-top:160px}
  .day-grid{grid-template-columns:1fr}
  .brand-grid{grid-template-columns:1fr 1fr}
}
</style>

// ── Helpers ──
function slug(n){ return n.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/_+$/,''); }
function keywords(b){ return b.tp.map(t=>KW[t]||t).join(', '); }
function desc(b){ let s=`${b.d}. ${b.f}.`; if(b.tm&&b.t) s+=` Guided by ${b.t}.`; return s; }
function bio(b){ let s=b.d+' -- '+b.f.split(',')[0]; if(b.tr) s+='. '+b.tr+' wisdom.'; else s+='. Practical tools.'; return s.length>150?s.substring(0,147)+'...':s; }

function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='COPIED'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='COPY'; btn.classList.remove('copied'); },1500);
  });
}
function T(k,fb){return (window.i18n&&typeof window.i18n.t==='function'&&window.i18n.t(k)!==k)?window.i18n.t(k):fb;}
function prefill(label,val){
  const eid='pf_'+Math.random().toString(36).substr(2,6);
  return `<div class="prefill"><div class="prefill-label">${T('pf.'+label,label)}</div><div class="prefill-row"><div class="prefill-val" id="${eid}">${val}</div><button class="copy-btn" onclick="copyText(document.getElementById('${eid}').textContent,this)">${T('wos.copy','COPY')}</button></div></div>`;
}

// ── Phase calculation ──
function calcPhase(){
  const s=bs();
  const setupDone=SETUP.every(st=>s.setup[st.id]);
  const uploadDone=UPLOADS.every(u=>s.upload[u.id+'_all']);
  if(uploadDone && setupDone) return 3;
  if(setupDone) return 2;
  return 1;
}
function setupPct(){ const s=bs(); const done=SETUP.filter(st=>s.setup[st.id]).length; return Math.round((done/SETUP.length)*100); }
function uploadPct(){ const s=bs(); const done=UPLOADS.filter(u=>s.upload[u.id+'_all']).length; return Math.round((done/UPLOADS.length)*100); }
function weekPct(){ const s=bs(); const days=['MON','TUE','WED','THU','FRI','SAT','SUN']; const done=days.filter(d=>s.weekly[d]).length; return Math.round((done/7)*100); }

function overallPct(){
  const sp=setupPct(), up=uploadPct(), wp=weekPct();
  return Math.round((sp*0.33+up*0.34+wp*0.33));
}

// ── Render progress ──
function renderProgress(){
  const s=bs(), phase=calcPhase(), sp=setupPct(), up=uploadPct(), wp=weekPct(), op=overallPct();
  // Phase dots
  const pd1=document.getElementById('pd1'), pd2=document.getElementById('pd2'), pd3=document.getElementById('pd3');
  pd1.className='phase-dot'+(sp>=100?' done':' active');
  pd2.className='phase-dot'+(up>=100?' done':(sp>=100?' active':''));
  pd3.className='phase-dot'+(wp>=100?' done':(up>=100&&sp>=100?' active':''));
  // Phase labels
  document.getElementById('pl1').className='phase-label'+(sp>=100?' done':' active');
  document.getElementById('pl2').className='phase-label'+(up>=100?' done':(sp>=100?' active':''));
  document.getElementById('pl3').className='phase-label'+(wp>=100?' done':(up>=100&&sp>=100?' active':''));
  // Phase lines
  document.getElementById('pf1').style.width=sp+'%';
  document.getElementById('pf2').style.width=up+'%';
  // Overall bar
  document.getElementById('bar-fill').style.width=op+'%';
  document.getElementById('pct-text').textContent=op+(window.i18n?window.i18n.t('wos.pctSuffix'):'% complete');
  // Top progress
  const curPhase=sp<100?1:(up<100?2:3);
  document.getElementById('top-progress').textContent=(window.i18n?window.i18n.t('wos.phaseOf').replace('{n}',curPhase):'Phase '+curPhase+' of 3')+' -- '+op+'%';
  // Nav pills
  document.querySelectorAll('.nav-pill').forEach(p=>{
    const ph=parseInt(p.dataset.phase);
    p.classList.remove('locked','active');
    if(ph===2 && sp<100) p.classList.add('locked');
    else if(ph===3 && (sp<100||up<100)) p.classList.add('locked');
  });
  const activePh=document.querySelector('.phase-section.visible');
  if(activePh){
    const phNum=activePh.id.replace('phase','');
    document.querySelectorAll('.nav-pill').forEach(p=>{
      if(p.dataset.phase===phNum && !p.classList.contains('locked')) p.classList.add('active');
    });
  }
}

function brandAdminApiBase(){

  if(typeof window.__BRAND_ADMIN_API_BASE==='string')return window.__BRAND_ADMIN_API_BASE.replace(/\/$/,'');

function hasExplicitApiBase(){
  try{if(new URLSearchParams(window.location.search).get('api_base'))return true;}catch(e0){}

}
function currentIsoWeek(){
  var d=new Date();
  var thu=new Date(d.getFullYear(),d.getMonth(),d.getDate()+3-(d.getDay()+6)%7);
  var w1=new Date(thu.getFullYear(),0,4);
  var wn=1+Math.round(((thu-w1)/86400000-3+(w1.getDay()+6)%7)/7);
  return thu.getFullYear()+'-W'+String(wn).padStart(2,'0');
}

function stopCoordBadgePolling(){
  if(_coordBadgePollTimer){clearTimeout(_coordBadgePollTimer);_coordBadgePollTimer=null;}
}
function scheduleCoordBadgePoll(){
  stopCoordBadgePolling();
  _coordBadgePollTimer=setTimeout(function(){
    _coordBadgePollTimer=null;
    if(!document.hidden)refreshCoordinationBuildBadge(true);
    scheduleCoordBadgePoll();
  },60000);
}
function startCoordBadgePolling(){
  refreshCoordinationBuildBadge(false);
  // Static mode has no backend to poll — the bridge is fetched once at init.
  if(!hasExplicitApiBase())return;
  scheduleCoordBadgePoll();
  if(!window.__coordBadgeVisBound){
    window.__coordBadgeVisBound=true;
    document.addEventListener('visibilitychange',function(){
      if(!document.hidden)refreshCoordinationBuildBadge(true);
    });
  }
}
function refreshCoordinationBuildBadge(fromPoll){
  var el=document.getElementById('coord-build-badge');
  if(!el)return;
  // Static mode (Pages, no api_base): reflect the committed packet from the bridge.
  if(!hasExplicitApiBase()){
    var pk=currentPacket();
    if(pk){
      var co=pk.coordination||{};
      var ready=pk.headline_axes_ready||pk.axis_count_ready||0;
      el.className='coord-build-badge current';
      el.textContent='Week '+(pk.week||PKTS.week||'')+' package ready · '+ready+'/4 axes';
      return;
    }
    var bl=currentBlocked();
    el.className='coord-build-badge missing';
    el.textContent=bl?'No package yet — pending catalog reconciliation':'No package for this brand';
    return;
  }
  if(!fromPoll){el.className='coord-build-badge loading';el.textContent='Last built: checking…';}
  fetch(brandAdminApiBase()+'/api/brand_admin/coordination-status',{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      var st=String(data.status||'MISSING').toUpperCase();
      var prev=_coordBadgeLastStatus;
      _coordBadgeLastStatus=st;
      el.className='coord-build-badge '+st.toLowerCase();
      el.textContent='Last built: '+(data.relative||'never')+' · '+st;
      if(fromPoll&&prev==='MISSING'&&st==='CURRENT'&&!_coordBadgeBuildToastShown){
        _coordBadgeBuildToastShown=true;
        if(typeof toast!=='undefined')toast.info('Weekly package built — refresh to download latest');
      }
    })
    .catch(function(){
      _coordBadgeLastStatus=null;
      el.className='coord-build-badge missing';
      el.textContent='Last built: unavailable · start python3 scripts/run_server.py';
    });
}
function downloadAdminPacket(ev){
  if(_adminPacketDownloading)return;
  if(!brandId){if(typeof toast!=='undefined')toast.error('Select a brand first.');return;}
  var btn=(ev&&ev.currentTarget)||document.getElementById('admin-packet-dl-btn');
  // Static mode (Pages, no api_base): serve the real packet manifest from the bridge as a
  // downloadable blob. The full multi-axis zip is LFS/backend-served — surfaced via the
  // api_path when an operator runs scripts/run_server.py (?api_base=...).
  if(!hasExplicitApiBase()){
    var pk=currentPacket();
    if(!pk){
      var bl=currentBlocked();
      if(typeof toast!=='undefined')toast.error(bl?('No package yet — '+(bl.reason||'pending catalog reconciliation')):('No package for '+brandId+'.'));
      return;
    }
    try{
      var dl=pk.download||{};
      var manifest={brand_id:brandId,packet_dir:pk.packet_dir,week:pk.week,week_monday:pk.week_monday,
        package_type:pk.package_type,axes:pk.axes,axis_count_ready:pk.axis_count_ready,
        headline_axes_ready:pk.headline_axes_ready,cost_usd:pk.cost_usd,
        full_package:{filename:dl.filename,size_bytes:dl.size_bytes,
          note:'Full multi-axis zip is served by the brand-admin API. Run scripts/run_server.py and open this page with ?api_base=http://127.0.0.1:8000 to download it.'},
        source:'brand_admin_weekly_packets.json (static bridge)'};
      var a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([JSON.stringify(manifest,null,2)],{type:'application/json'}));
      a.download=(pk.packet_dir||brandId)+'_'+pk.week+'_manifest.json';
      a.click();
      URL.revokeObjectURL(a.href);
      if(typeof toast!=='undefined')toast.success('Downloaded '+(pk.packet_dir||brandId)+' Week '+pk.week+' manifest ('+(pk.headline_axes_ready||0)+'/4 axes ready)');
    }catch(e){ if(typeof toast!=='undefined')toast.error('Could not build manifest download.'); }
    return;
  }
  var week=currentIsoWeek();
  var url=brandAdminApiBase()+'/api/brand_admin/download/'+encodeURIComponent(brandId)+'/'+encodeURIComponent(week);
  _adminPacketDownloading=true;
  setAdminDownloadButtonLoading(btn,true);
  fetch(url)
    .then(function(r){
      if(r.status===404){var e=new Error('404');e._toastMsg='No package for '+brandId+'/'+week+'. Has Monday cron run?';throw e;}
      if(r.status===500){return r.json().catch(function(){return{};}).then(function(){var e=new Error('500');e._toastMsg='Build pipeline failed. Check Monday cron logs.';throw e;});}
      if(!r.ok){var e=new Error('HTTP');e._toastMsg='Download failed (HTTP '+r.status+')';throw e;}
      return r.blob();
    })
    .then(function(blob){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=brandId+'_'+week+'.zip';
      a.click();
      URL.revokeObjectURL(a.href);
      if(typeof toast!=='undefined')toast.success('Downloaded '+brandId+'_'+week+'.zip');
    })
    .catch(function(e){
      var msg=e&&e._toastMsg;
      if(!msg)msg=e&&(e.message||String(e));
      if((e instanceof TypeError)||(e&&e.name==='TypeError')||/Failed to fetch|NetworkError|Load failed|fetch/i.test(String(msg))){
        msg='Server unreachable. Is the API running?';
      }
      if(typeof toast!=='undefined')toast.error(msg);
    })
    .finally(function(){
      _adminPacketDownloading=false;
      setAdminDownloadButtonLoading(btn,false);
    });
}

// ── Render Phase 3: Weekly ──
function renderPhase3(){
  const el=document.getElementById('phase3'), s=bs();
  const locked=setupPct()<100||uploadPct()<100;
  let h=`<div class="phase-title" data-i18n="phase3.title">Phase 3: Weekly Rhythm</div><div class="phase-sub">${locked?'Complete Phases 1 & 2 to unlock.':'Your repeating weekly workflow. Check off each day.'}</div>`;
  if(locked){ h=`<div class="locked-overlay">${h}<div style="height:200px"></div></div>`; el.innerHTML=h; return; }

  h+=`<div style="font-family:var(--mono);font-size:.55rem;color:var(--dim);margin-bottom:12px">This week: ${weekPct()}% complete</div>`;
  h+=`<div class="day-grid">`;
  const today=new Date().toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
  WEEK.forEach(w=>{
    const done=s.weekly[w.day];
    const isToday=today.startsWith(w.day.substring(0,3));
    h+=`<div class="day-card ${isToday?'today':''} ${done?'done-day':''}">
      <div class="day-name">${w.day}</div>
      <div class="day-title">${w.title}</div>
      <div class="day-actions">`;
    w.tasks.forEach(tk=>{
      h+=`<li>${tk.t}`;
      if(tk.url) h+=` <a class="action-btn" href="${tk.url}" target="_blank" style="font-size:.4rem;padding:3px 8px;margin:0">${tk.btn} &#8599;</a>`;
      h+=`</li>`;
    });
    h+=`</div>
      <div style="margin-top:8px"><label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.65rem;color:var(--mid)">
        <input type="checkbox" ${done?'checked':''} onchange="toggleWeekly('${w.day}')"> Day complete
      </label></div>
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

// ── Toggle handlers ──
function toggleSetup(id){
  const s=bs(); s.setup[id]=!s.setup[id]; save();
  const wasDone=setupPct();
  renderPhase1(); renderPhase2(); renderProgress();
  if(wasDone>=100 && setupPct()>=100) celebrate('Phase 1 Complete','Upload phase unlocked!');
}
function toggleUpload(tid,uid,total){
  const s=bs(); s.upload[tid]=!s.upload[tid];
  // Check if all titles for this platform done
  let allDone=true;
  for(let i=1;i<=total;i++) if(!s.upload[uid+'_t'+i]) allDone=false;
  s.upload[uid+'_all']=allDone;
  save();
  const wasDone=uploadPct();
  renderPhase2(); renderProgress();
  if(wasDone>=100 && uploadPct()>=100) celebrate('Phase 2 Complete','Weekly rhythm unlocked!');
}
function toggleWeekly(day){
  const wasDone=weekPct();
  const s=bs(); s.weekly[day]=!s.weekly[day]; save();
  renderPhase3(); renderProgress();
  if(wasDone<100 && weekPct()>=100){
    // Phase 3 (final) complete -> hand off to the brand director operations dashboard for this brand.
    celebrate('Weekly Rhythm Complete','Opening brand operations…');
    setTimeout(function(){ window.location.href='brand_handoff_dashboard.html?brand='+encodeURIComponent(brandId); },1500);
  }
}
function toggleBody(id){
  const body=document.getElementById(id);
  const arr=document.getElementById('arr_'+id);
  body.classList.toggle('open');
  if(arr) arr.style.transform=body.classList.contains('open')?'rotate(180deg)':'';
}

// ── Phase navigation ──
function showPhase(n){
  const sp=setupPct(), up=uploadPct();
  if(n===2 && sp<100) return;
  if(n===3 && (sp<100||up<100)) return;
  document.querySelectorAll('.phase-section').forEach(s=>s.classList.remove('visible'));
  document.getElementById('phase'+n).classList.add('visible');
  document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.nav-pill[data-phase="${n}"]`).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Celebration ──
function celebrate(title,sub){
  const el=document.getElementById('celebration');
  el.querySelector('h2').textContent=title;
  el.querySelector('p').textContent=sub;
  el.classList.add('show');
}
function dismissCelebration(){
  document.getElementById('celebration').classList.remove('show');
  // Auto-advance to next phase
  const sp=setupPct();
  if(sp>=100 && uploadPct()<100) showPhase(2);
  else if(sp>=100 && uploadPct()>=100) showPhase(3);
}

// ── Brand Picker ──
function renderPicker(){
  const el=document.getElementById('picker');
  el.classList.add('show');
  document.getElementById('main-wrap').style.display='none';
  let h=`<h1 data-i18n="picker.title">Brand Admin</h1><p class="sub" data-i18n="picker.subtitle">Select a brand to begin</p><div class="brand-grid">`;
  for(const [bid,b] of Object.entries(B)){
    h+=`<div class="brand-card" onclick="selectBrand('${bid}')">
      <h3>${b.d}</h3>
      <div class="focus">${localizeFocus(b.f)}</div>
      ${b.tm?`<span class="teacher-tag">${b.t}</span>`:''}
    </div>`;
  }
  h+='</div>';
  el.innerHTML=h;
}
function selectBrand(bid){
  history.replaceState(null,'','?brand='+bid);
  initBrand(bid);
}
function resetBrand(){
  history.replaceState(null,'','?');
  document.getElementById('main-wrap').style.display='none';
  renderPicker();
}

// ── Init ──
function initBrand(bid){
  if(!B[bid]){ renderPicker(); return; }
  brandId=bid; brand=B[bid]; load();
  document.getElementById('picker').classList.remove('show');
  document.getElementById('picker').style.display='none';
  document.getElementById('main-wrap').style.display='block';
  document.getElementById('brand-pill').textContent=brand.d;
  renderPhase1(); renderPhase2(); renderPhase3(); renderProgress();
  // Auto-show correct phase
  const sp=setupPct();
  if(sp>=100 && uploadPct()>=100) showPhase(3);
  else if(sp>=100) showPhase(2);
  else showPhase(1);
}

async function init(){
  try{ const r=await fetch('brand_admin_brands.json',{cache:'no-store'}); if(r.ok){ const j=await r.json(); if(j&&Object.keys(j).length) B=j; } }catch(_e){}
  // Static weekly-packet bridge (second bridge; sibling of brand_admin_brands.json).
  try{ const rp=await fetch('brand_admin_weekly_packets.json',{cache:'no-store'}); if(rp.ok){ const jp=await rp.json(); if(jp&&jp.brands) PKTS=jp; } }catch(_e2){}
  const p=new URLSearchParams(window.location.search);
  const bid=p.get('brand');
  if(bid && B[bid]) initBrand(bid);
  else renderPicker();
}
init();
</script>
