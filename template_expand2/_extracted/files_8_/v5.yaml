content: |
  Remember that quiet confidence in the body?

  Here's where it lives:

  **In the body's knowledge that it can hold discomfort.**

  Not because the body likes it.

  Not because the body is good at it.

  But because **the body has done it**.

  Over and over.

  The body has felt anxious and moved anyway.

  The body has felt uncertain and showed up anyway.

  The body has felt unready and acted anyway.

  And every time —

  The body proved to itself:

  **I can be here with this.**

  Not "I can make this leave the body."

  But:

  **I can stay present while this is in me.**

  That's the confidence in the body.

  Not loud.

  Not flashy.

  Just... steady in the tissues.
