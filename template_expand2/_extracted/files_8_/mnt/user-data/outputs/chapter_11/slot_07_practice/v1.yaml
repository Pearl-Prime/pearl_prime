content: |
  Here's the new story you tell about yourself:

  *"I feel anxiety."*

  *"And I act anyway."*

  Not:

  *"I used to be anxious, but now I'm not."*

  Not:

  *"I overcame my anxiety."*

  But:

  *"I feel anxiety. And I show up anyway."*

  And that story?

  **That's who you are now.**

  Not someone who doesn't feel anxious.

  **Someone who feels anxious and lives anyway.**

  This is what you practice now:

  When the old story tries to return — *"You can't do this"* — you notice it.

  And you tell the new story instead:

  *"I feel anxious. And I'm doing it anyway."*

  Not fighting the old story.

  Just... telling a truer one.
