content: |
  Here's the new story the body tells:

  *"I feel anxiety in this body."*

  *"And I move anyway."*

  Not:

  *"I used to feel anxious, but this body is calm now."*

  Not:

  *"I overcame what the body felt."*

  But:

  *"I feel anxiety in this body. And I show up anyway."*

  That story?

  **That's who this body is now.**

  Not a body that stopped feeling anxious.

  **A body that feels anxious and lives anyway.**

  Here's what the body practices:

  When the old story rises in the tissues — *"This body can't"* —

  Notice it.

  And let the body tell the new story:

  *"I feel anxious. And I'm moving anyway."*

  Not fighting the old sensation-story.

  Just living a truer one in the body.
