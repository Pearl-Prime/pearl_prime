content: |
  Here is the new story you tell:

  *"I feel anxiety."*

  *"And I act anyway."*

  Not:

  *"Once I was anxious, but no longer."*

  Not:

  *"I conquered my anxiety."*

  But:

  *"I feel anxiety. And I appear anyway."*

  This story?

  **This is who you are now.**

  Not one who ceased to feel anxiety.

  **One who feels anxiety and lives regardless.**

  This is what you practice:

  When the old narrative rises — *"You cannot"* —

  You notice it.

  And you speak the new story instead:

  *"I feel anxious. And I am moving anyway."*

  Not battling the old words.

  Simply speaking truer ones.
