content: |
  Here's the new story:

  *"I feel anxiety."*

  *"And I act anyway."*

  Not:

  *"I used to be anxious, but not anymore."*

  Not:

  *"I beat my anxiety."*

  But:

  *"I feel anxiety. And I show up anyway."*

  That story?

  **That's who you are now.**

  Not someone who stopped being anxious.

  **Someone who's anxious and lives anyway.**

  Here's the practice:

  When the old story pops up — *"You can't do this"* — catch it.

  Then tell the new one:

  *"I feel anxious. Doing it anyway."*

  You're not fighting the old story.

  Just telling a more accurate one.
