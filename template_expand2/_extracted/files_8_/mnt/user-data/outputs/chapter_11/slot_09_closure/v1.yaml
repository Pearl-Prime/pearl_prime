content: |
  Here's what's different now:

  **You don't need permission anymore.**

  You don't need to feel ready.

  You don't need to feel calm.

  You don't need to feel confident.

  You just... act.

  Because you know:

  **The version of you that's anxious is allowed to act.**

  Not "once you're not anxious."

  **Now.**

  So here's who you're becoming:

  Not someone who doesn't feel anxious.

  **Someone who feels anxious and acts anyway.**

  Not someone who overcame anxiety.

  **Someone who learned to live with it.**

  Not someone who's "fixed."

  **Someone who's learning.**

  And that person —

  The one who shows up while anxious —

  The one who keeps going even when they slip —

  The one who doesn't need to feel ready first —

  **That's you.**

  Not someday.

  **Now.**
