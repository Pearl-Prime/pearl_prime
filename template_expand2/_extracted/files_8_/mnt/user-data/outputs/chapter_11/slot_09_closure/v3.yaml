content: |
  Here is what has changed:

  **Permission is no longer required.**

  Not the permission of readiness.

  Not the permission of calm.

  Not the permission of confidence.

  You simply... act.

  Because you understand:

  **The anxious version of you has permission to move.**

  Not "once the anxiety departs."

  **In this moment.**

  So here is who you are becoming:

  Not one who ceased to feel anxiety.

  **One who feels anxiety and moves anyway.**

  Not one who conquered anxiety.

  **One who learned to live alongside it.**

  Not one who is "healed."

  **One who is learning.**

  And that one —

  The one who appears while anxious —

  The one who continues even after stumbling —

  The one who does not require readiness first —

  **That is you.**

  Not in some future.

  **Now.**
