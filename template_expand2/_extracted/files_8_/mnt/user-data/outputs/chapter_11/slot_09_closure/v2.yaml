content: |
  Here's what's different now:

  **You don't need permission.**

  Don't need to feel ready.

  Don't need to feel calm.

  Don't need to feel confident.

  You just... do it.

  Because you know:

  **The anxious version of you is allowed to act.**

  Not "when you're calm."

  **Now.**

  So here's who you're becoming:

  Not someone who stopped being anxious.

  **Someone who's anxious and acts anyway.**

  Not someone who beat anxiety.

  **Someone who learned to live with it.**

  Not someone who's "fixed."

  **Someone who's learning.**

  That person —

  The one who shows up while anxious —

  The one who keeps going when they slip —

  The one who doesn't need to feel ready —

  **That's you.**

  Not someday.

  **Right now.**
