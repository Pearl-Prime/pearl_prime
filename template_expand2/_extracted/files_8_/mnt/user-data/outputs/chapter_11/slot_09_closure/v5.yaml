content: |
  Here's what's different in the body now:

  **The body doesn't need permission.**

  Doesn't need to feel ready.

  Doesn't need to feel calm.

  Doesn't need to feel confident.

  The body just... moves.

  Because the body knows:

  **The anxious body is allowed to move.**

  Not "when the sensations stop."

  **Now.**

  So here's who you're becoming in the body:

  Not a body that stopped feeling anxious.

  **A body that feels anxious and moves anyway.**

  Not a body that overcame anxiety.

  **A body that learned to live with it.**

  Not a body that's "fixed."

  **A body that's learning.**

  And that body —

  The one that shows up while anxious —

  The one that keeps going even when it slips —

  The one that doesn't need to feel ready first —

  **That's this body.**

  Not someday.

  **Now.**
