content: |
  In the final chapter, we'll talk about what happens from here in the body.

  Because this isn't the end.

  **It's the beginning.**

  The body has learned to move while anxious.

  The body has built the new pattern.

  The body has shifted how it knows itself.

  And now —

  **The body gets to live.**

  Not perfectly.

  Not without anxiety.

  But... **fully.**

  While anxious.

  The old story said this body couldn't.

  The new story says it can.

  And the body has proven which one is true.
