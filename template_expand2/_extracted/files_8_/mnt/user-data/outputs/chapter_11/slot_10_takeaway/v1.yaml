content: |
  In the final chapter, we're going to talk about what happens from here.

  Because this isn't the end.

  **It's the beginning.**

  You've learned how to act while anxious.

  You've built the new pattern.

  You've shifted your identity.

  And now —

  **You get to live.**

  Not perfectly.

  Not without anxiety.

  But... **fully.**

  While anxious.

  The old story said you couldn't.

  The new story says you can.

  And you've proven which one is true.
