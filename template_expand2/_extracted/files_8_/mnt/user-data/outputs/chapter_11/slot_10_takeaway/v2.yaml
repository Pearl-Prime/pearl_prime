content: |
  In the final chapter, we'll talk about what happens from here.

  Because this isn't the end.

  **It's the beginning.**

  You've learned to act while anxious.

  You've built the new pattern.

  You've shifted your identity.

  And now —

  **You get to live.**

  Not perfectly.

  Not anxiety-free.

  But... **fully.**

  While anxious.

  Old story: you couldn't.

  New story: you can.

  And you've proven which one's real.
