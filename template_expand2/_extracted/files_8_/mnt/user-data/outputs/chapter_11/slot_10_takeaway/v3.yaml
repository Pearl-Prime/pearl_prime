content: |
  In the final chapter, we will speak of what comes next.

  Because this is not an ending.

  **It is a beginning.**

  You have learned to act while anxious.

  You have woven the new pattern.

  You have shifted how you know yourself.

  And now —

  **You get to live.**

  Not perfectly.

  Not free of anxiety.

  But... **fully.**

  While anxious.

  The old story declared you could not.

  The new story says you can.

  And you have proved which speaks the truth.
