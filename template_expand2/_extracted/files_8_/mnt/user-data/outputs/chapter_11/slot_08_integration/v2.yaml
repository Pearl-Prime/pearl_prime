content: |
  You might notice something:
  
  **Other people are seeing you differently.**
  
  Not dramatically.
  
  But in small ways:
  
  Asking your opinion more.
  
  Inviting you to stuff.
  
  Reaching out first.
  
  Seeming... closer.
  
  Maybe someone texted something like: "you've been around more lately. it's nice."
  
  Maybe your roommate said: "You seem... different? In a good way."
  
  Maybe people started asking what you think in conversations where you used to just sit there.
  
  You're still anxious. They have no idea.
  
  They just know you're there.
  
  Not because you changed who you are.
  
  Because **you started actually showing up**.
  
  And when you show up —
  
  People notice.
  
  They don't know you're anxious.
  
  They just know **you're there**.
  
  Present.
  
  Engaged.
  
  Real.
  
  That draws people in.
  
  Not because you became someone else.
  
  Because **you became more you**.
