content: |
  Notice something in how others respond to your body:
  
  **They see you differently now.**
  
  Not in big ways.
  
  In small, felt ways:
  
  They ask your opinion more.
  
  They invite you.
  
  They reach out first.
  
  They come closer.
  
  Maybe someone said: "hey, you've been around more lately. it's nice."
  
  Maybe your roommate noticed: "You seem... different? In a good way."
  
  Maybe people started asking what you think in conversations where your body used to just sit, quiet.
  
  You're still anxious. They don't feel that.
  
  They feel your presence.
  
  Not because your body changed.
  
  But because **your body started showing up**.
  
  And when your body shows up —
  
  People feel it.
  
  They don't feel your anxiety.
  
  They feel **your presence**.
  
  Here.
  
  Engaged.
  
  In the room.
  
  And that draws people toward you.
  
  Not because you became a different body.
  
  But because **you became more present in the body you have**.
