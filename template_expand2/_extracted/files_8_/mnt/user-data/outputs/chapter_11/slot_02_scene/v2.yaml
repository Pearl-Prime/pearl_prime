content: |
  Here's what happened:
  
  You did something while anxious.
  
  Not because the anxiety left. Not because you finally felt ready.
  
  Because you just... did it anyway.
  
  Hands probably shaking. Voice probably wobbly. Chest probably tight the whole time.
  
  But you did it.
  
  And then your brain immediately tried to explain it away:
  
  *"That was a fluke."*
  
  *"That one was easy."*
  
  *"Doesn't count."*
  
  But something cracked.
  
  You did the thing the old story said you couldn't do.
  
  And now the story doesn't fit anymore.
