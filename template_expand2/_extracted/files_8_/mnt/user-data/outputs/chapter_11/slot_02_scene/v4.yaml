content: |
  Here's what happened when you acted while anxious:
  
  You executed an action despite anxiety being present.
  
  Not because anxiety resolved. Not because readiness arrived.
  
  Because you decided to proceed regardless.
  
  Observable symptoms were likely present: hand tremor, voice instability, chest constriction.
  
  You proceeded anyway.
  
  Then your cognitive system attempted dismissal:
  
  *"Non-representative event."*
  
  *"Low difficulty level."*
  
  *"Exclude from pattern."*
  
  But evidence registered.
  
  The existing narrative no longer fit.
  
  You had executed an action the narrative claimed was impossible.
  
  The story lost explanatory power.
