content: |
  Think about the last time you did something while anxious.
  
  Not because the anxiety went away. Not because you finally felt ready.
  
  But because you decided: *"I'm doing this anyway."*
  
  Maybe your hands were shaking. Maybe your voice wobbled. Maybe your chest was tight the whole time.
  
  But you did it.
  
  And afterward, your brain tried to dismiss it:
  
  *"That was just one time."*
  
  *"It was easy that time."*
  
  *"It doesn't count."*
  
  But something shifted.
  
  Because you just did the thing the old story said you couldn't.
  
  And now you know: the story was wrong.
