content: |
  Feel your way back to the moment when everything shifted.
  
  Not a dramatic breakthrough in the body. Not a sudden release.
  
  Just... movement. While the body was anxious.
  
  You decided: *"I'm moving anyway."*
  
  And the body moved.
  
  Hands shaking. Voice unsteady in the throat. Heart slamming against ribs.
  
  But the body did it.
  
  And then the mind tried to dismiss it:
  
  *"Doesn't count."*
  
  *"That was easy."*
  
  *"The body got lucky."*
  
  But the body felt the crack.
  
  Something shifted in the tissues.
  
  You had moved the way the old story said you couldn't.
  
  And now the body knows: the story was wrong.
