content: |
  Remember that quiet confidence?

  Here is its source:

  **The knowledge that you can bear discomfort.**

  Not because it pleases you.

  Not because you have mastered it.

  But because **you have lived through it**.

  Again and again.

  You have felt anxiety and moved anyway.

  You have felt uncertainty and arrived anyway.

  You have felt unready and acted anyway.

  And each time —

  You proved to yourself:

  **I can be in this.**

  Not "I can escape this."

  But:

  **I can remain while this is present.**

  That is the confidence.

  Not loud.

  Not bright.

  Just... steady.
