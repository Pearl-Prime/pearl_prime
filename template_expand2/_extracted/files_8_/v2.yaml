content: |
  Remember that quiet confidence thing?

  Here's where it actually comes from:

  **Knowing you can handle discomfort.**

  Not because you enjoy it.

  Not because you're naturally good at it.

  Because **you've done it**.

  Again and again.

  Felt anxious, acted anyway.

  Felt uncertain, showed up anyway.

  Felt unready, did it anyway.

  Every time:

  Proof to yourself:

  **I can handle this.**

  Not "I can make it stop."

  But:

  **I can be here while it's happening.**

  That's the confidence.

  Not loud.

  Not showy.

  Just... there.
