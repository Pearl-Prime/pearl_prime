    title: Introduction - Before We Begin
    sections:
      section_01:
        section_id: ch00_sec01
        section: 1
        type: HOOK
        purpose: Something has been running your life
        scene_type: null
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch00_sec01_hook_f1
          variant_number: 1
          variant_family: F1
          content: "Something has been running your life.\n\nYou might not know what it\
            \ is yet.\n\nBut you feel it.\n\nIn the moments where things don't go the way\
            \ you want—again.\n\nIn the gap between who you are and who you want to be.\n\
            \nIn the quiet frustration of watching the same pattern play out, for reasons\
            \ you can't quite name.\n\nSomething is in charge.\n\nAnd it isn't you.\n\n---"
          fingerprint:
            char_count: 361
            paragraph_count: 9
            sentence_count: 9
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: The feeling
          section_type: HOOK
          scene_type: null
          location_tokens: []
      section_02:
        section_id: ch00_sec02
        section: 2
        type: REFLECTION
        purpose: You've tried things
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch00_sec02_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "You've tried things.\n\nThe advice. The techniques. The telling yourself\
            \ to just be different.\n\nMaybe you've read books. Watched videos. Made promises\
            \ to yourself.\n\nSome of it helped—for a while.\n\nBut here you are.\n\nStill\
            \ stuck in the same loop.\n\nStill bumping into the same wall.\n\nStill wondering\
            \ why this keeps happening.\n\nHere's the thing—\n\nYou've been solving the\
            \ wrong problem.\n\n---"
          fingerprint:
            char_count: 378
            paragraph_count: 11
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: The feeling
          section_type: REFLECTION
          scene_type: null
          location_tokens: []
      section_03:
        section_id: ch00_sec03
        section: 3
        type: REFLECTION
        purpose: What if everything you believed was backwards
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch00_sec03_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "What if I told you that everything you've been doing to fix this—\n\
            \nHas been making it worse?\n\nWhat if the thing you thought was the problem—\n\
            \nIsn't actually the problem at all?\n\nWhat if there's something running underneath,\
            \ something you've never questioned—\n\nAnd that's the real trap?\n\nI know\
            \ how that sounds.\n\nBut stay with me.\n\nBecause once you see it, you can't\
            \ unsee it.\n\nAnd everything starts to make sense.\n\n---"
          fingerprint:
            char_count: 398
            paragraph_count: 11
            sentence_count: 9
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: The feeling
          section_type: REFLECTION
          scene_type: null
          location_tokens: []
      section_04:
        section_id: ch00_sec04
        section: 4
        type: SCENE
        purpose: Recognition moment
        scene_type: internal
        min_variants_required: 5
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch00_sec04_scene_f1
          variant_number: 1
          variant_family: F1
          content: "Think about the last week.\n\nWas there a moment where you did the\
            \ thing you said you wouldn't do?\n\nA moment where you didn't do the thing\
            \ you said you would?\n\nA moment where you watched yourself repeat a pattern\
            \ you thought you'd outgrown?\n\nAnd in each of those moments, there was something\
            \ driving it.\n\nSomething underneath. Something automatic.\n\nYou've been\
            \ living with it for a long time.\n\nBut what if you've misunderstood what\
            \ it actually is?\n\n---"
          fingerprint:
            char_count: 421
            paragraph_count: 9
            sentence_count: 8
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: The feeling
          section_type: SCENE
          scene_type: internal
          location_tokens: []
      section_05:
        section_id: ch00_sec05
        section: 5
        type: REFLECTION
        purpose: The cost has been invisible
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch00_sec05_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "The cost of this has been invisible.\n\nYou don't measure the energy\
            \ spent fighting yourself.\n\nYou don't count the moments lost to the loop.\n\
            \nYou don't notice the version of yourself that keeps getting pushed aside.\n\
            \nBecause life goes on.\n\nYou adapt. You cope. You keep moving.\n\nBut something\
            \ stays stuck.\n\nA quiet, persistent gap between where you are—\n\nAnd where\
            \ you know you could be.\n\n---"
          fingerprint:
            char_count: 374
            paragraph_count: 10
            sentence_count: 9
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: The feeling
          section_type: REFLECTION
          scene_type: null
          location_tokens: []
      section_06:
        section_id: ch00_sec06
        section: 6
        type: REFLECTION
        purpose: This isn't what you think it is
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch00_sec06_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "This isn't what you think it is.\n\nI'm not going to give you another\
            \ technique to try.\n\nI'm not going to tell you to just try harder.\n\nI'm\
            \ not going to promise that you'll never struggle with this again.\n\nBecause\
            \ that would be a lie.\n\nAnd you've heard enough of those.\n\nWhat I'm going\
            \ to show you is something different.\n\nSomething that might surprise you\
            \ at first.\n\nSomething that changes the game entirely.\n\nNot because it\
            \ fixes you.\n\nBut because there was never anything to fix.\n\n---"
          fingerprint:
            char_count: 445
            paragraph_count: 12
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: The feeling
          section_type: REFLECTION
          scene_type: null
          location_tokens: []
      section_07:
        section_id: ch00_sec07
        section: 7
        type: REFLECTION
        purpose: A note before we go deeper
        scene_type: null
        min_variants_required: 3
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch00_sec07_reflection_f1
          variant_number: 1
          variant_family: F1
          content: "Before we go any further—\n\nThis is yours.\n\nYou can pause whenever\
            \ you need to.\n\nYou can come back to parts that hit.\n\nYou can take your\
            \ time.\n\nThere's no test. No grade. No one watching to see if you do it right.\n\
            \nJust you.\n\nAnd whatever brought you here.\n\nIf something feels like too\
            \ much—step back.\n\nIf something feels like exactly what you needed to hear—sit\
            \ with it.\n\nYou're in charge of this.\n\nMaybe for the first time in a while.\n\
            \n---"
          fingerprint:
            char_count: 393
            paragraph_count: 13
            sentence_count: 12
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: The feeling
          section_type: REFLECTION
          scene_type: null
          location_tokens: []
      section_08:
        section_id: ch00_sec08
        section: 8
        type: INTEGRATION
        purpose: The invitation
        scene_type: null
        min_variants_required: 5
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch00_sec08_integration_f1
          variant_number: 1
          variant_family: F1
          content: "So here's the invitation:\n\nCome find out what's actually been running\
            \ the show.\n\nCome see what you've never thought to question.\n\nCome understand\
            \ why nothing has worked—and what actually will.\n\nIt won't be comfortable.\n\
            \nYou might recognize yourself in ways that sting.\n\nBut on the other side\
            \ of that recognition—\n\nIs something you've been waiting for.\n\nA way out\
            \ of the loop.\n\nNot by fighting harder.\n\nBy seeing clearer.\n\nAnd those\
            \ are very different things.\n\nLet's begin.\n\n---"
          fingerprint:
            char_count: 437
            paragraph_count: 14
            sentence_count: 12
          location_tokens: []
        metadata:
          persona: Gen Z
          topic: The feeling
          section_type: INTEGRATION
