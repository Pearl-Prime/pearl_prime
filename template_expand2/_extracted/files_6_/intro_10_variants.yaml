        - variant_id: ch00_sec06_reflection_f3
          variant_number: 3
          variant_family: F3_STRAIGHT_TALK
          content: "I'm not here to motivate you.\n\nI'm not here to give you another strategy that works for three weeks and then fades.\n\nI'm here to show you something you've missed.\n\nSomething that, once you see it, makes everything else click into place.\n\nThis isn't about trying harder.\n\nIt's about seeing clearer.\n\nAnd that changes everything.\n\n---"
