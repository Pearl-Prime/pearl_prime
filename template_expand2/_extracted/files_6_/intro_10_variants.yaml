            sentence_count: 7
          location_tokens: []
        - variant_id: ch00_sec06_reflection_f8
          variant_number: 8
          variant_family: F8_PSYCHOLOGICAL
          content: "This isn't about becoming someone different.\n\nIt's about understanding who you already are—and why you do what you do.\n\nThe pattern you've been fighting has a function. It developed for a reason.\n\nUnderstanding that reason doesn't mean accepting the behavior.\n\nIt means finally having leverage.\n\nBecause you can't change what you don't understand.\n\nAnd you're about to understand.\n\n---"
