          variant_number: 1
          variant_family: F1_MYSTERIOUS
          content: "This isn't what you think it is.\n\nI'm not going to give you another technique to try.\n\nI'm not going to tell you to just try harder.\n\nI'm not going to promise that you'll never struggle with this again.\n\nBecause that would be a lie.\n\nAnd you've heard enough of those.\n\nWhat I'm going to show you is something different.\n\nSomething that might surprise you at first.\n\nSomething that changes the game entirely.\n\nNot because it fixes you.\n\nBut because there was never anything to fix.\n\n---"
