        - variant_id: ch00_sec06_reflection_f5
          variant_number: 5
          variant_family: F5_METAPHOR
          content: "You've been handed maps before.\n\nMaps that promised to lead you out.\n\nBut they were maps of the wrong territory.\n\nThis is different.\n\nThis isn't a new map.\n\nThis is showing you that you've been reading the legend wrong.\n\nOnce you see how to read it correctly—\n\nThe path was there all along.\n\n---"
          fingerprint:
            char_count: 291
            paragraph_count: 9
            sentence_count: 8
          location_tokens: []
        - variant_id: ch00_sec06_reflection_f6
          variant_number: 6
          variant_family: F6_POETIC
          content: "This is not another voice telling you to try.\n\nYou have tried.\n\nThis is not another hand offering tools.\n\nYou have tools.\n\nThis is something else.\n\nA window.\n\nA way of seeing that turns the locked room into an open door.\n\nNot because the room changed.\n\nBut because you finally saw where the door was.\n\n---"
          fingerprint:
            char_count: 298
            paragraph_count: 10
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec06_reflection_f7
          variant_number: 7
          variant_family: F7_SCIENCE
          content: "This isn't about adding more interventions.\n\nIt's about understanding the mechanism.\n\nOnce you see how the pattern actually operates—what triggers it, what maintains it, what it's responding to—you're no longer fighting blind.\n\nYou're working with the system instead of against it.\n\nThat's not a technique.\n\nThat's a paradigm shift.\n\nAnd it makes everything else work better.\n\n---"
          fingerprint:
            char_count: 358
