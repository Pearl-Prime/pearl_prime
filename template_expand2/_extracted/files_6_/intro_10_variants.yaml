          variant_number: 9
          variant_family: F9_SOMATIC
          content: "This isn't about thinking differently.\n\nIt's about living in your body differently.\n\nThe pattern you've been struggling with isn't just a mental habit. It's stored in your nervous system. Your muscles. Your breath.\n\nWhat I'm going to show you works with the body, not just the mind.\n\nBecause that's where the change actually has to happen.\n\nAnd when it does—it lasts.\n\n---"
