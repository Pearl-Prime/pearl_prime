      section_04:
        section_id: ch00_sec04
        section: 4
        type: SCENE
        purpose: Recognition moment
        scene_type: internal
        min_variants_required: 10
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch00_sec04_scene_f1
          variant_number: 1
          variant_family: F1_MYSTERIOUS
          content: "Think about the last week.\n\nWas there a moment where you did the thing you said you wouldn't do?\n\nA moment where you didn't do the thing you said you would?\n\nA moment where you watched yourself repeat a pattern you thought you'd outgrown?\n\nAnd in each of those moments, there was something driving it.\n\nSomething underneath. Something automatic.\n\nYou've been living with it for a long time.\n\nBut what if you've misunderstood what it actually is?\n\n---"
          fingerprint:
            char_count: 421
            paragraph_count: 9
            sentence_count: 8
          location_tokens: []
        - variant_id: ch00_sec04_scene_f2
          variant_number: 2
          variant_family: F2_PEER
          content: "Be honest with yourself for a sec.\n\nThis week—was there a moment where you just... did the thing again?\n\nOr didn't do the thing you told yourself you would?\n\nAnd in that moment, it probably didn't even feel like a choice. It just happened.\n\nThat's not you being weak.\n\nThat's the pattern running.\n\nAnd until you see how it works, it's going to keep happening.\n\n---"
          fingerprint:
            char_count: 351
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec04_scene_f3
          variant_number: 3
          variant_family: F3_STRAIGHT_TALK
          content: "Let's get specific.\n\nIn the past seven days, how many times did you catch yourself in the pattern?\n\nHow many times did you watch it happen—knowing you'd regret it—and still couldn't stop?\n\nThat's not weakness.\n\nThat's a system running on autopilot.\n\nAnd autopilot doesn't care about your intentions.\n\nIt only cares about what it was programmed to do.\n\n---"
          fingerprint:
            char_count: 341
            paragraph_count: 8
            sentence_count: 8
          location_tokens: []
        - variant_id: ch00_sec04_scene_f4
          variant_number: 4
          variant_family: F4_COACH
          content: "Let's do a quick audit.\n\nThink about the last week. Where did you fall off?\n\nWhere did the pattern win?\n\nI'm not asking so you can beat yourself up. I'm asking because that moment—that exact moment—is data.\n\nIt tells us where the system is running.\n\nAnd when we know where it runs, we know where to intervene.\n\nThis isn't about shame. It's about strategy.\n\n---"
          fingerprint:
            char_count: 355
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec04_scene_f5
          variant_number: 5
          variant_family: F5_METAPHOR
          content: "Picture yourself standing at a fork in the road.\n\nOne path is the choice you wanted to make.\n\nThe other is the choice you always make.\n\nYou meant to take the first path. You planned for it. You promised yourself.\n\nBut something in you reached for the wheel—and turned it the other way.\n\nAgain.\n\nThat something has a logic. A reason.\n\nAnd we're about to find out what it is.\n\n---"
          fingerprint:
            char_count: 365
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec04_scene_f6
          variant_number: 6
          variant_family: F6_POETIC
          content: "Remember the moment.\n\nThe one where you stood at the edge of doing differently—\n\nAnd something pulled you back.\n\nIt did not ask permission.\n\nIt did not explain.\n\nIt simply moved, and you moved with it,\n\nAnd afterward, the familiar taste of frustration.\n\nThat moment holds the answer.\n\nNot as failure—as evidence.\n\n---"
          fingerprint:
            char_count: 311
            paragraph_count: 10
            sentence_count: 8
          location_tokens: []
        - variant_id: ch00_sec04_scene_f7
          variant_number: 7
          variant_family: F7_SCIENCE
          content: "Your last relapse into the pattern—think about it.\n\nThere was probably a trigger. A cue your nervous system recognized.\n\nThen a cascade: neurochemical, automatic, faster than conscious thought.\n\nBy the time your prefrontal cortex caught up, the action was already in motion.\n\nThis isn't moral failure.\n\nThis is how conditioned responses work.\n\nAnd understanding the mechanism is the first step to interrupting it.\n\n---"
          fingerprint:
            char_count: 388
            paragraph_count: 7
            sentence_count: 8
          location_tokens: []
        - variant_id: ch00_sec04_scene_f8
          variant_number: 8
          variant_family: F8_PSYCHOLOGICAL
          content: "Think about the last time the pattern showed up.\n\nWhat were you feeling right before it happened?\n\nNot the surface feeling—the deeper one. The one underneath.\n\nWas there discomfort you were trying to escape? A tension you needed to release? Something you didn't want to feel?\n\nThe pattern isn't random.\n\nIt's a response to something.\n\nAnd that something is what we need to understand.\n\n---"
          fingerprint:
            char_count: 365
            paragraph_count: 7
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec04_scene_f9
          variant_number: 9
          variant_family: F9_SOMATIC
          content: "Think about the last time it happened.\n\nNot the story—the sensation.\n\nWhat did your body do right before the pattern kicked in?\n\nDid your chest tighten? Your breath shorten? Your jaw clench?\n\nDid you feel a surge—or a numbness?\n\nThe pattern starts in the body before it reaches the mind.\n\nThat's where we need to look.\n\n---"
          fingerprint:
            char_count: 318
            paragraph_count: 8
            sentence_count: 8
          location_tokens: []
        - variant_id: ch00_sec04_scene_f10
