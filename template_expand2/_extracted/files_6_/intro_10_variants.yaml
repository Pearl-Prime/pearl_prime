        - variant_id: ch00_sec06_reflection_f4
          variant_number: 4
          variant_family: F4_COACH
          content: "This isn't a pep talk.\n\nI'm not going to tell you to believe in yourself and charge forward.\n\nThat kind of motivation burns out fast.\n\nWhat I'm going to give you is different.\n\nIt's insight. Clarity. A new lens on a problem you've been looking at wrong.\n\nOnce you see it the right way?\n\nYou won't need motivation.\n\nYou'll have something better: understanding.\n\n---"
          fingerprint:
