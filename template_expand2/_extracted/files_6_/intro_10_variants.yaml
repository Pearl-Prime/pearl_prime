sections:
  chapter_00:
    chapter: 0
    title: Introduction - Before We Begin
    sections:
      section_01:
        section_id: ch00_sec01
        section: 1
        type: HOOK
        purpose: Something has been running your life
        scene_type: null
        min_variants_required: 10
        story_eligible: false
        location_aware: false
        variants:
        - variant_id: ch00_sec01_hook_f1
          variant_number: 1
          variant_family: F1_MYSTERIOUS
          content: "Something has been running your life.\n\nYou might not know what it is yet.\n\nBut you feel it.\n\nIn the moments where things don't go the way you want—again.\n\nIn the gap between who you are and who you want to be.\n\nIn the quiet frustration of watching the same pattern play out, for reasons you can't quite name.\n\nSomething is in charge.\n\nAnd it isn't you.\n\n---"
          fingerprint:
            char_count: 361
            paragraph_count: 9
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec01_hook_f2
          variant_number: 2
          variant_family: F2_PEER
          content: "Okay, real talk.\n\nYou know that thing you keep doing? The one you swore you'd stop? Or that thing you keep not doing, even though you know you should?\n\nYeah. That.\n\nIt's not random. It's not because you're lazy or broken or just bad at life.\n\nThere's something else going on.\n\nSomething underneath that you probably haven't looked at yet.\n\nAnd honestly? That's why you're still stuck.\n\n---"
          fingerprint:
            char_count: 378
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec01_hook_f3
          variant_number: 3
          variant_family: F3_STRAIGHT_TALK
          content: "Let's cut to it.\n\nYou have a pattern. It's been running for years. And you haven't been able to break it.\n\nNot because you haven't tried. You've tried plenty.\n\nBut trying harder isn't the answer. Neither is beating yourself up about it.\n\nThe answer is seeing what's actually driving the pattern.\n\nBecause until you see it, you can't change it.\n\nSimple as that.\n\n---"
          fingerprint:
            char_count: 341
            paragraph_count: 8
            sentence_count: 11
          location_tokens: []
        - variant_id: ch00_sec01_hook_f4
          variant_number: 4
          variant_family: F4_COACH
          content: "You're here because something isn't working.\n\nAnd that's not a failure—that's awareness.\n\nMost people sleepwalk through their patterns forever. They never stop to ask why.\n\nBut you did. You're here.\n\nThat means you're ready for something different.\n\nNot different advice. Not different willpower.\n\nA different way of seeing what's actually been happening.\n\nLet's get to work.\n\n---"
          fingerprint:
            char_count: 365
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec01_hook_f5
          variant_number: 5
          variant_family: F5_METAPHOR
          content: "Imagine you've been driving a car for years.\n\nYou think you're steering. You think you're choosing the direction.\n\nBut every time you try to turn, the wheel pulls back to the same old road.\n\nYou've blamed the car. You've blamed the road. You've blamed yourself.\n\nBut you never thought to look under the hood.\n\nThere's something in the engine you've never seen.\n\nAnd it's been choosing the direction this whole time.\n\n---"
          fingerprint:
            char_count: 398
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec01_hook_f6
          variant_number: 6
          variant_family: F6_POETIC
          content: "There is a current beneath your days.\n\nYou feel it pulling when you try to move.\n\nYou feel it holding when you try to change.\n\nIt has no name, but it has a shape—\n\nThe shape of every promise unkept.\n\nEvery pattern repeated.\n\nEvery version of yourself left waiting.\n\nThis current has been steering.\n\nAnd you have been swimming against it, exhausted, wondering why you never reach the shore.\n\n---"
          fingerprint:
            char_count: 378
            paragraph_count: 10
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec01_hook_f7
          variant_number: 7
          variant_family: F7_SCIENCE
          content: "Your brain has been running a program.\n\nIt's an old program—written years ago, probably before you had any say in it.\n\nAnd like any outdated software, it's creating bugs in your life.\n\nRepeated behaviors you can't seem to stop. Responses that fire before you can think. Patterns that resist every conscious effort to change them.\n\nThis isn't a character flaw.\n\nIt's neurology.\n\nAnd understanding how it works is the first step to updating the code.\n\n---"
          fingerprint:
            char_count: 421
            paragraph_count: 7
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec01_hook_f8
          variant_number: 8
          variant_family: F8_PSYCHOLOGICAL
          content: "There's a part of you that you've been at war with.\n\nYou might call it your saboteur. Your shadow. The version of you that keeps getting in the way.\n\nBut what if that part isn't your enemy?\n\nWhat if it's been trying to protect you—in ways that made sense once, but don't anymore?\n\nWhat if the war itself is the problem?\n\nThis isn't about defeating that part.\n\nIt's about understanding what it's really been doing.\n\n---"
          fingerprint:
            char_count: 398
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec01_hook_f9
          variant_number: 9
          variant_family: F9_SOMATIC
          content: "Your body knows something your mind hasn't caught up to yet.\n\nYou feel it in the tightness that shows up before you even think.\n\nIn the impulse that moves faster than intention.\n\nIn the way your system braces, or shuts down, or revs up—before you've decided anything.\n\nThis isn't just in your head.\n\nIt's in your chest. Your gut. Your shoulders.\n\nAnd until you learn to listen to what's happening there, you'll keep wondering why you can't think your way out.\n\n---"
          fingerprint:
            char_count: 432
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec01_hook_f10
          variant_number: 10
          variant_family: F10_WARM
          content: "I want you to know something before we start.\n\nWhatever brought you here—whatever pattern you've been struggling with—it doesn't mean something is wrong with you.\n\nYou're not broken. You're not weak. You're not behind.\n\nYou're human.\n\nAnd being human means carrying things you didn't choose. Running programs you didn't write.\n\nThis isn't about fixing yourself.\n\nIt's about finally understanding what's been happening.\n\nAnd letting that understanding set something free.\n\n---"
          fingerprint:
            char_count: 421
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        metadata:
          persona: Universal
          topic: Self-help introduction
          section_type: HOOK
          scene_type: null
          location_tokens: []
      section_02:
        section_id: ch00_sec02
        section: 2
        type: REFLECTION
        purpose: You've tried things
        scene_type: null
        min_variants_required: 10
        story_eligible: true
        location_aware: false
        variants:
        - variant_id: ch00_sec02_reflection_f1
          variant_number: 1
          variant_family: F1_MYSTERIOUS
          content: "You've tried things.\n\nThe advice. The techniques. The telling yourself to just be different.\n\nMaybe you've read books. Watched videos. Made promises to yourself.\n\nSome of it helped—for a while.\n\nBut here you are.\n\nStill stuck in the same loop.\n\nStill bumping into the same wall.\n\nStill wondering why this keeps happening.\n\nHere's the thing—\n\nYou've been solving the wrong problem.\n\n---"
          fingerprint:
            char_count: 378
            paragraph_count: 11
            sentence_count: 11
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f2
          variant_number: 2
          variant_family: F2_PEER
          content: "Look, I know you've tried stuff.\n\nYou're not new to this. You've googled. You've journaled. You've probably got a notes app full of plans that lasted about three days.\n\nAnd some of it actually worked—until it didn't.\n\nSo now you're skeptical. Fair.\n\nBut here's the thing: it's not that you tried the wrong hacks.\n\nIt's that you were hacking the wrong thing.\n\nThe real issue isn't where you've been looking.\n\n---"
          fingerprint:
            char_count: 385
            paragraph_count: 8
            sentence_count: 11
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f3
          variant_number: 3
          variant_family: F3_STRAIGHT_TALK
          content: "You've tried willpower. Didn't stick.\n\nYou've tried discipline. Fell off.\n\nYou've tried apps, books, podcasts, advice from people who seemed to have it figured out.\n\nAnd here's what happened: temporary progress, then back to baseline.\n\nThat's not because you're undisciplined.\n\nIt's because all those solutions were aimed at the surface.\n\nThe real driver was never touched.\n\nThat's what we're going after.\n\n---"
          fingerprint:
            char_count: 378
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f4
          variant_number: 4
          variant_family: F4_COACH
          content: "You've put in effort. Real effort.\n\nYou've shown up. You've tried strategies. You've pushed through when it was hard.\n\nAnd it still didn't hold.\n\nThat's not a reflection of your commitment.\n\nThat's feedback.\n\nThe system you were using wasn't built for the problem you actually have.\n\nSo let's stop repeating the same plays.\n\nTime for a different game plan.\n\n---"
          fingerprint:
            char_count: 341
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f5
          variant_number: 5
          variant_family: F5_METAPHOR
          content: "You've been bailing water from a boat with a hole in it.\n\nEvery technique you tried—every strategy, every promise to yourself—was another bucket.\n\nAnd you bailed hard. You really did.\n\nBut the water kept coming back.\n\nBecause you were never shown where the hole was.\n\nYou were just handed buckets.\n\nThis isn't about bailing faster.\n\nIt's about finding the hole.\n\n---"
          fingerprint:
            char_count: 345
            paragraph_count: 9
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f6
          variant_number: 6
          variant_family: F6_POETIC
          content: "You have tried to build bridges out of advice.\n\nYou have tried to climb out on ladders made of willpower.\n\nYou have lit matches in the dark and called them flashlights.\n\nAnd still—\n\nThe same ground. The same walls. The same sky pressing low.\n\nIt is not that you didn't try.\n\nIt is that no one showed you where the door was.\n\nThey only gave you tools to decorate the room.\n\n---"
          fingerprint:
            char_count: 348
            paragraph_count: 8
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f7
          variant_number: 7
          variant_family: F7_SCIENCE
          content: "The interventions you've tried weren't failures—they were just incomplete.\n\nMost advice targets the prefrontal cortex: the planning, reasoning part of your brain.\n\nBut the patterns you're stuck in? They're running on deeper hardware. Subcortical. Automatic. Faster than thought.\n\nYou can't out-think a system that operates below thinking.\n\nThat's why willpower keeps losing.\n\nTo change the pattern, you have to reach the level where it actually lives.\n\n---"
          fingerprint:
            char_count: 421
            paragraph_count: 7
            sentence_count: 8
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f8
          variant_number: 8
          variant_family: F8_PSYCHOLOGICAL
          content: "Every attempt you've made was sincere.\n\nAnd every time it didn't work, a part of you took it personally. Stored it as evidence. Whispered: maybe this is just who I am.\n\nBut those attempts weren't failing because of you.\n\nThey were failing because they only addressed the conscious mind.\n\nAnd the pattern you're dealing with isn't fully conscious.\n\nIt's running in a part of you that doesn't respond to logic or lectures.\n\nWe have to speak its language.\n\n---"
          fingerprint:
            char_count: 431
            paragraph_count: 7
            sentence_count: 9
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f9
          variant_number: 9
          variant_family: F9_SOMATIC
          content: "You've tried thinking your way through this.\n\nYou've analyzed. Strategized. Made deals with yourself in your head.\n\nBut here's what probably happened:\n\nYour body didn't get the memo.\n\nThe tension still showed up. The impulse still fired. The old response still moved through you before your plan had a chance.\n\nThat's because thinking alone can't reprogram the body.\n\nAnd this pattern? It lives in the body.\n\n---"
          fingerprint:
            char_count: 385
            paragraph_count: 8
            sentence_count: 10
          location_tokens: []
        - variant_id: ch00_sec02_reflection_f10
          variant_number: 10
          variant_family: F10_WARM
          content: "You've really tried.\n\nI know you have.\n\nAnd every time something didn't work, it probably felt like your fault. Like you just needed more discipline. More focus. More something.\n\nBut that's not the truth.\n\nThe truth is: you were given the wrong map.\n\nYou followed directions that were never going to lead where you needed to go.\n\nThat's not a personal failing.\n\nThat's just what happens when no one shows you the real terrain.\n\n---"
          fingerprint:
            char_count: 398
            paragraph_count: 9
            sentence_count: 11
          location_tokens: []
        metadata:
          persona: Universal
          topic: Self-help introduction
          section_type: REFLECTION
          scene_type: null
