        - variant_id: ch00_sec06_reflection_f2
          variant_number: 2
          variant_family: F2_PEER
          content: "This isn't another self-help thing.\n\nI'm not gonna give you a morning routine or a productivity hack or a list of affirmations.\n\nThat stuff has its place. But that's not what this is.\n\nThis is about seeing something you've never seen before.\n\nSomething that's been running the show while you were busy trying to fix the symptoms.\n\nOnce you see it?\n\nThe game changes.\n\n---"
