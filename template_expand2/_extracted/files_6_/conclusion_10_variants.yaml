          content: "The change that follows isn't loud.\n\nIt doesn't announce itself.\n\nIt shows up as:\n\nLess arguing with yourself.\n\nShorter loops.\n\nEarlier movement.\n\nFewer negotiations before action.\n\nNot because you forced them.\n\nBut because something stopped blocking the way.\n\n---"
