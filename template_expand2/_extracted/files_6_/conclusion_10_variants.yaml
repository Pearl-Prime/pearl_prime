          content: "There's no final arrival point here.\n\nNo permanent state you have to maintain.\n\nJust moments.\n\nMoments where the old pattern offers itself.\n\nAnd moments where you see it—\n\nAnd choose differently.\n\nNot perfectly.\n\nJust differently.\n\n---"
