          variant_number: 5
          variant_family: F5_METAPHOR
          content: "The chains don't fall off all at once.\n\nThey loosen.\n\nOne link. Then another.\n\nYou don't hear them drop. You just notice, one day, that you're moving more freely.\n\nThe weight is still there—but it's lighter.\n\nThat's what freedom actually feels like.\n\n---"
