          content: "The shift won't look like you think.\n\nThere's no moment where you suddenly feel fixed.\n\nIt's subtler than that.\n\nYou'll notice you're moving faster. Recovering quicker. Spending less time stuck in the loop.\n\nNot zero time. Less time.\n\nThat's how progress looks.\n\n---"
