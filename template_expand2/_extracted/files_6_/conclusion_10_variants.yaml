          variant_number: 10
          variant_family: F10_WARM
          content: "You've worked so hard.\n\nPlease know that wasn't wasted.\n\nEvery attempt taught you something—even the ones that didn't work.\n\nBut now your effort has somewhere to land.\n\nNot more effort. Better aimed effort.\n\nAnd that makes all the difference.\n\n---"
