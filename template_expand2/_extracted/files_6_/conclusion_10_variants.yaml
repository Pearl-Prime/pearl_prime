          variant_number: 6
          variant_family: F6_POETIC
          content: "Freedom does not announce itself.\n\nIt arrives as absence.\n\nThe absence of hesitation where hesitation lived.\n\nThe absence of war where war raged.\n\nThe absence of a weight you forgot you were carrying.\n\nYou will not feel it arrive.\n\nYou will only notice it has been here.\n\n---"
