          content: "Growth isn't a destination.\n\nIt's a relationship—with yourself, with your patterns, with what arises.\n\nThat relationship requires ongoing attention.\n\nNot obsessive attention. Just presence.\n\nChecking in. Noticing. Adjusting.\n\nThe work doesn't end.\n\nBut it does get lighter.\n\n---"
