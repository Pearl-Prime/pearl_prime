            paragraph_count: 7
            sentence_count: 6
          location_tokens: []
        - variant_id: chFinal_sec05_reflection_f8
          variant_number: 8
          variant_family: F8_PSYCHOLOGICAL
          content: "You've been efforting against yourself for a long time.\n\nAnd effort against self doesn't work. It creates internal war.\n\nWhat works is understanding.\n\nWhen you understand the part that was driving the pattern, you stop fighting it.\n\nAnd when you stop fighting, the energy that was going to war becomes available for something else.\n\n---"
          fingerprint:
            char_count: 321
            paragraph_count: 6
            sentence_count: 5
          location_tokens: []
        - variant_id: chFinal_sec05_reflection_f9
          variant_number: 9
          variant_family: F9_SOMATIC
          content: "Your body has been working hard.\n\nBracing. Pushing. Trying to override signals that wouldn't stop coming.\n\nThat's exhausting.\n\nBut now you're not fighting the body. You're listening to it.\n\nAnd when you listen, the body doesn't have to shout.\n\nEffort becomes easier when it's not a war.\n\n---"
