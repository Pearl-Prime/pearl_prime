          variant_number: 2
          variant_family: F2_PEER
          content: "Don't expect fireworks.\n\nThe change isn't dramatic like that.\n\nIt's more like... noticing one day that the thing that used to take you out for a week now only takes an hour.\n\nOr realizing you did the thing without all the negotiation beforehand.\n\nIt's quiet. But it's real.\n\nAnd it adds up.\n\n---"
