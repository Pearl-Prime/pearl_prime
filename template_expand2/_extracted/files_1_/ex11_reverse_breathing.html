<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverse Breathing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@300;400&family=Inter:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--inhale:#C47A5A;--exhale:#5A8EC4;--bg:#0C0A10;--text:#DDD7CC;--muted:#5D5955}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none}
  .wrap{z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.2rem;max-width:400px;padding:0 1rem}
  h1{font-family:'Spectral',serif;font-weight:300;font-size:1.9rem;letter-spacing:.04em}
  .sub{font-size:.7rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;text-align:center}
  .body-area{position:relative;width:200px;height:280px}
  svg.body-svg{width:100%;height:100%}
  .belly-wall{transition:d .3s}
  .arrow{opacity:0;transition:opacity .4s,transform .3s}
  .arrow.show{opacity:.7}
  .label-in{fill:var(--inhale)}.label-out{fill:var(--exhale)}
  .note{font-size:.65rem;color:var(--muted);text-align:center;letter-spacing:.04em;font-style:italic;min-height:2.4rem;line-height:1.5}
  .phase-area{text-align:center}
  .pn{font-family:'Spectral',serif;font-size:1.4rem;font-weight:300;letter-spacing:.08em}
  .pc{font-size:2rem;font-weight:300;opacity:.7}
  .bar{width:100%;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
  .bf{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,var(--inhale),var(--exhale))}
  .info-row{display:flex;gap:2rem;font-size:.8rem;color:var(--muted)}
  .info-row strong{color:var(--text);font-weight:500}
  .controls{display:flex;gap:1rem}
  .btn{padding:.55rem 1.6rem;border:1px solid rgba(255,255,255,.1);border-radius:100px;background:rgba(255,255,255,.03);color:var(--text);font-size:.8rem;cursor:pointer;transition:all .3s;font-family:inherit}
  .btn:hover{background:rgba(255,255,255,.08)}
  .btn.pri{background:rgba(196,122,90,.15);border-color:rgba(196,122,90,.3)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Reverse Breathing</h1>
  <p class="sub">Contract belly on inhale · Expand on exhale<br>Opposite of normal diaphragmatic breathing</p>
  <div class="body-area">
    <svg class="body-svg" viewBox="0 0 200 280">
      <!-- torso outline -->
      <path d="M60 30 C60 30 55 80 55 130 C55 180 60 240 100 260 C140 240 145 180 145 130 C145 80 140 30 140 30" 
        fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>
      <!-- diaphragm line -->
      <line x1="60" y1="110" x2="140" y2="110" stroke="rgba(255,255,255,.06)" stroke-width="1" stroke-dasharray="4"/>
      <text x="150" y="113" fill="rgba(255,255,255,.15)" font-size="8">diaphragm</text>
      <!-- belly wall (animated) -->
      <path id="bellyWall" class="belly-wall" d="M65 140 Q100 140 135 140" 
        fill="none" stroke="rgba(255,255,255,.2)" stroke-width="2"/>
      <!-- arrows -->
      <g id="arrowIn" class="arrow">
        <path d="M30 155 L55 145" stroke="var(--inhale)" stroke-width="1.5" fill="none" marker-end="url(#ah)"/>
        <text x="10" y="160" class="label-in" font-size="9">IN</text>
      </g>
      <g id="arrowOut" class="arrow">
        <path d="M55 145 L30 155" stroke="var(--exhale)" stroke-width="1.5" fill="none" marker-end="url(#ah2)"/>
        <text x="8" y="160" class="label-out" font-size="9">OUT</text>
      </g>
      <defs>
        <marker id="ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0 0 L6 3 L0 6" fill="none" stroke="var(--inhale)" stroke-width="1"/>
        </marker>
        <marker id="ah2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0 0 L6 3 L0 6" fill="none" stroke="var(--exhale)" stroke-width="1"/>
        </marker>
      </defs>
      <!-- chest area indicator -->
      <ellipse id="chest" cx="100" cy="80" rx="25" ry="18" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    </svg>
  </div>
  <div class="note" id="note">Belly draws inward as you breathe in, expands as you breathe out</div>
  <div class="phase-area">
    <div class="pn" id="pn">Ready</div>
    <div class="pc" id="pc"></div>
  </div>
  <div class="bar"><div class="bf" id="bf"></div></div>
  <div class="info-row">
    <span>Breaths <strong id="bc">0</strong></span>
    <span>Remaining <strong id="rem">6:00</strong></span>
  </div>
  <div class="controls">
    <button class="btn pri" id="sb" onclick="toggle()">Begin</button>
    <button class="btn" onclick="doReset()">Reset</button>
  </div>
</div>
<script>
const INH=5,EXH=5,CYCLE=10,SESSION=360;
let running=false,paused=false,t=0,total=0,lastTs=0,breaths=0,lastP='',aCtx=null;
function audio(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx}
function tone(f,d=.3){try{const x=audio(),o=x.createOscillator(),g=x.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,x.currentTime);g.gain.linearRampToValueAtTime(.07,x.currentTime+.05);g.gain.exponentialRampToValueAtTime(.001,x.currentTime+d);o.connect(g);g.connect(x.destination);o.start();o.stop(x.currentTime+d)}catch(e){}}
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

function tick(ts){
  if(!running||paused)return;
  if(!lastTs)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;t+=dt;total+=dt;
  if(total>=SESSION){end();return}
  const ct=t%CYCLE;
  const isIn=ct<INH;
  const frac=isIn?ct/INH:(ct-INH)/EXH;

  // Reverse: inhale = belly contracts (inward), exhale = belly expands (outward)
  const bulge=isIn?(-15*Math.sin(frac*Math.PI/2)):(15*Math.sin(frac*Math.PI/2));
  document.getElementById('bellyWall').setAttribute('d',
    'M65 140 Q100 '+(140-bulge)+' 135 140');

  // Chest: inhale = expands (normal)
  const chestR=isIn?(25+8*Math.sin(frac*Math.PI/2)):(25+8*Math.cos(frac*Math.PI/2));
  document.getElementById('chest').setAttribute('rx',chestR);

  document.getElementById('arrowIn').classList.toggle('show',isIn);
  document.getElementById('arrowOut').classList.toggle('show',!isIn);

  const cur=isIn?'in':'out';
  if(cur!==lastP){
    tone(isIn?350:260);
    if(cur==='in'&&lastP==='out'){breaths++;document.getElementById('bc').textContent=breaths}
    lastP=cur;
  }
  document.getElementById('pn').textContent=isIn?'Inhale — Contract Belly':'Exhale — Release Belly';
  document.getElementById('pc').textContent=Math.ceil(isIn?INH-ct:EXH-(ct-INH));
  document.getElementById('note').textContent=isIn?
    'Draw belly IN toward spine as air fills chest':'Let belly soften and expand outward as you release';
  document.getElementById('bf').style.width=(total/SESSION*100)+'%';
  document.getElementById('rem').textContent=fmt(Math.max(0,SESSION-total));
  requestAnimationFrame(tick);
}

function toggle(){
  const b=document.getElementById('sb');
  if(!running){running=true;paused=false;t=0;total=0;lastTs=0;breaths=0;lastP='';
    document.getElementById('bc').textContent='0';b.textContent='Pause';requestAnimationFrame(tick);
  }else if(!paused){paused=true;lastTs=0;b.textContent='Resume'}
  else{paused=false;lastTs=0;b.textContent='Pause';requestAnimationFrame(tick)}
}
function doReset(){
  running=false;paused=false;t=0;total=0;lastTs=0;breaths=0;lastP='';
  document.getElementById('sb').textContent='Begin';document.getElementById('bc').textContent='0';
  document.getElementById('rem').textContent=fmt(SESSION);document.getElementById('pn').textContent='Ready';
  document.getElementById('pc').textContent='';document.getElementById('bf').style.width='0';
  document.getElementById('note').textContent='Belly draws inward as you breathe in, expands as you breathe out';
  document.getElementById('bellyWall').setAttribute('d','M65 140 Q100 140 135 140');
}
function end(){running=false;document.getElementById('sb').textContent='Begin';document.getElementById('pn').textContent='Complete';document.getElementById('pc').textContent='';tone(528,.8)}
</script>
</body>
</html>
