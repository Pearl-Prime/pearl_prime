<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three-Part Breath · Dirga</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Source+Sans+3:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#080b12;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.2rem;padding:1.5rem;width:100%;max-width:440px}
h1{font-family:'Playfair Display',serif;font-weight:300;font-size:2rem;letter-spacing:.06em}
.sub{font-size:.72rem;color:#4b5563;letter-spacing:.2em;text-transform:uppercase;margin-top:-.6rem}
canvas{display:block;width:220px;height:340px}
.info{text-align:center}
.ph{font-family:'Playfair Display',serif;font-size:1.2rem;letter-spacing:.1em;transition:color .4s}
.ct{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:300}
.cy,.tm{font-size:.7rem;color:#4b5563;letter-spacing:.12em}
.legend{display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap}
.lg{display:flex;align-items:center;gap:.3rem;font-size:.65rem;color:#6b7280;letter-spacing:.1em;text-transform:uppercase}
.ld{width:8px;height:8px;border-radius:50%}
.ctrls{display:flex;gap:1rem}
.btn{font-family:'Source Sans 3',sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:.6rem 1.6rem;border:1px solid rgba(255,255,255,.1);border-radius:100px;background:rgba(255,255,255,.03);color:#e2e8f0;cursor:pointer;transition:all .25s}
.btn:hover{background:rgba(255,255,255,.07)}
.btn.pri{border-color:rgba(139,92,246,.35);background:rgba(139,92,246,.08)}
.btn-s{padding:.4rem .9rem;font-size:.68rem}
.done{display:none;flex-direction:column;align-items:center;gap:1.2rem;text-align:center;animation:fu .8s}
.done.show{display:flex}.main.off{display:none}
.done h2{font-family:'Playfair Display',serif;font-weight:300;font-size:1.7rem}
.done p{color:#6b7280;font-size:.85rem;line-height:1.7;max-width:340px}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.snd{position:fixed;top:1rem;right:1rem;z-index:10;width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:#6b7280;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<button class="snd" id="sndBtn">🔔</button>
<div class="wrap">
<h1>Three-Part Breath</h1>
<div class="sub">Dirga Pranayama · 7 minutes</div>
<div class="main" id="mainV">
<div class="legend">
<div class="lg"><div class="ld" style="background:#f59e0b"></div>Belly</div>
<div class="lg"><div class="ld" style="background:#10b981"></div>Ribs</div>
<div class="lg"><div class="ld" style="background:#8b5cf6"></div>Chest</div>
</div>
<canvas id="cv" width="440" height="680"></canvas>
<div class="info">
<div class="ph" id="ph">Ready</div>
<div class="ct" id="ct">—</div>
<div class="cy" id="cy"></div>
<div class="tm" id="tm">7:00</div>
</div>
<div class="ctrls"><button class="btn pri" id="goBtn">Begin</button><button class="btn btn-s" id="rstBtn" style="display:none">Reset</button></div>
</div>
<div class="done" id="doneV">
<h2>Seven Minutes Complete</h2>
<p>By filling belly, ribs, then chest — and releasing chest, ribs, then belly — you used your full lung capacity. Most people only breathe into the top third.</p>
<p style="opacity:.6;font-style:italic">Your diaphragm remembers this fullness.</p>
<button class="btn pri" id="agBtn">Again</button>
</div>
</div>
<script>
const CYCLES=15,DUR=420,INH=14,EXH=14;
const COLORS=[['#f59e0b','rgba(245,158,11,'],['#10b981','rgba(16,185,129,'],['#8b5cf6','rgba(139,92,246,']];
const NAMES=['Belly','Ribs','Chest'];
class Aud{constructor(){this.c=null;this.on=true}init(){if(!this.c)this.c=new(window.AudioContext||window.webkitAudioContext)()}t(f,d){if(!this.on||!this.c)return;const o=this.c.createOscillator(),g=this.c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,this.c.currentTime);g.gain.linearRampToValueAtTime(.06,this.c.currentTime+.15);g.gain.setValueAtTime(.06,this.c.currentTime+d-.2);g.gain.linearRampToValueAtTime(0,this.c.currentTime+d);o.connect(g);g.connect(this.c.destination);o.start();o.stop(this.c.currentTime+d)}toggle(){this.on=!this.on;return this.on}}
const au=new Aud();
const cv=document.getElementById('cv'),c=cv.getContext('2d'),W=cv.width,H=cv.height;
function torsoPath(){c.beginPath();c.moveTo(220,60);c.bezierCurveTo(220,60,175,85,148,130);c.bezierCurveTo(115,190,105,290,112,390);c.bezierCurveTo(118,440,125,500,135,560);c.bezierCurveTo(145,600,170,625,220,635);c.bezierCurveTo(270,625,295,600,305,560);c.bezierCurveTo(315,500,322,440,328,390);c.bezierCurveTo(335,290,325,190,292,130);c.bezierCurveTo(265,85,220,60,220,60);c.closePath()}
const zones=[{y0:430,y1:590},{y0:260,y1:430},{y0:110,y1:260}];
function draw(fills){
c.clearRect(0,0,W,H);
c.save();torsoPath();c.clip();
for(let i=0;i<3;i++){if(fills[i]<=0)continue;const z=zones[i],fh=(z.y1-z.y0)*fills[i],fy=z.y1-fh;const gr=c.createLinearGradient(0,fy,0,z.y1);gr.addColorStop(0,COLORS[i][1]+'.45)');gr.addColorStop(1,COLORS[i][1]+'.12)');c.fillStyle=gr;c.fillRect(80,fy,280,fh)}
c.restore();
torsoPath();c.strokeStyle='rgba(255,255,255,.1)';c.lineWidth=1.5;c.stroke();
c.setLineDash([4,6]);c.strokeStyle='rgba(255,255,255,.05)';c.lineWidth=1;
for(const z of zones.slice(1)){c.beginPath();c.moveTo(105,z.y1);c.lineTo(335,z.y1);c.stroke()}
c.setLineDash([]);
c.font='500 11px "Source Sans 3"';c.textAlign='right';
for(let i=0;i<3;i++){const y=(zones[i].y0+zones[i].y1)/2+4;c.fillStyle=fills[i]>.2?COLORS[i][0]:'rgba(255,255,255,.12)';c.fillText(NAMES[i],410,y)}
}
let state='idle',cycle=0,isIn=true,phS=0,pa=false,pO=0,pT=0,sS=0;
const ph=document.getElementById('ph'),ct=document.getElementById('ct'),cy=document.getElementById('cy'),tm=document.getElementById('tm');
const goBtn=document.getElementById('goBtn'),rstBtn=document.getElementById('rstBtn'),mainV=document.getElementById('mainV'),doneV=document.getElementById('doneV');
function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
function setUI(){const col=isIn?'#8b5cf6':'#f59e0b';ph.textContent=isIn?'Inhale — Fill Up':'Exhale — Release';ph.style.color=col;ct.style.color=col;cy.textContent=(cycle+1)+' / '+CYCLES}
function start(){au.init();state='active';cycle=0;isIn=true;pa=false;pO=0;phS=performance.now();sS=performance.now();goBtn.textContent='Pause';goBtn.classList.remove('pri');rstBtn.style.display='inline-block';doneV.classList.remove('show');mainV.classList.remove('off');setUI();au.t(220,INH);tick()}
function tick(){if(state!=='active'||pa)return;const now=performance.now(),dur=isIn?INH:EXH,el=(now-phS-pO)/1e3,prog=Math.min(1,el/dur);
let f=[0,0,0];if(isIn){const t=prog*3;f=[Math.min(1,t),Math.min(1,Math.max(0,t-1)),Math.min(1,Math.max(0,t-2))]}else{const t=prog*3;f=[Math.max(0,1-Math.max(0,t-2)),Math.max(0,1-Math.max(0,t-1)),Math.max(0,1-t)]}
draw(f);ct.textContent=Math.ceil(Math.max(0,dur-el));
const sr=Math.max(0,DUR-(now-sS)/1e3);tm.textContent=fmt(sr);
if(el>=dur){if(isIn){isIn=false;setUI();au.t(174,EXH)}else{cycle++;if(cycle>=CYCLES){finish();return}isIn=true;setUI();au.t(220,INH)}pO=0;phS=performance.now()}
requestAnimationFrame(tick)}
function finish(){state='done';mainV.classList.add('off');doneV.classList.add('show')}
function reset(){state='idle';pa=false;pO=0;goBtn.textContent='Begin';goBtn.classList.add('pri');rstBtn.style.display='none';ph.textContent='Ready';ph.style.color='';ct.textContent='—';ct.style.color='';cy.textContent='';tm.textContent='7:00';doneV.classList.remove('show');mainV.classList.remove('off');idleL()}
function toggleP(){if(!pa){pa=true;pT=performance.now();goBtn.textContent='Resume';goBtn.classList.add('pri')}else{pO+=performance.now()-pT;pa=false;goBtn.textContent='Pause';goBtn.classList.remove('pri');tick()}}
goBtn.onclick=()=>{if(state==='idle')start();else if(state==='active')toggleP()};
rstBtn.onclick=reset;document.getElementById('agBtn').onclick=()=>{reset();start()};
document.getElementById('sndBtn').onclick=()=>{au.init();document.getElementById('sndBtn').textContent=au.toggle()?'🔔':'🔇'};
function idleL(){if(state!=='idle')return;const t=Date.now()/2000,b=.05+Math.sin(t)*.03;draw([b,b*.6,b*.3]);requestAnimationFrame(idleL)}idleL();
</script>
</body>
</html>
