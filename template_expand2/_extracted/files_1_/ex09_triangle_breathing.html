<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Breathing — 4·6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&family=Manrope:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--inhale:#6EB5D0;--hold:#B89FD4;--exhale:#7BC4A0;--bg:#080B14;--text:#DDD7CC;--muted:#5B5752}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none}
  .wrap{z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.4rem}
  h1{font-family:'Fraunces',serif;font-weight:300;font-size:2rem;letter-spacing:.04em}
  .sub{font-size:.72rem;color:var(--muted);letter-spacing:.13em;text-transform:uppercase}
  .tri-area{position:relative;width:280px;height:260px}
  svg.tri-svg{width:100%;height:100%}
  .tri-path{fill:none;stroke:rgba(255,255,255,.07);stroke-width:1.5}
  .tri-progress{fill:none;stroke:var(--inhale);stroke-width:2.5;stroke-linecap:round;transition:stroke .4s}
  .dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--inhale);box-shadow:0 0 20px rgba(110,181,208,.5);transform:translate(-50%,-50%);z-index:2;transition:background .4s,box-shadow .4s}
  .vertex-lbl{position:absolute;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:color .3s}
  .vertex-lbl.active{color:var(--text)}
  .center-info{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:40px}
  .pn{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:300;letter-spacing:.08em}
  .pc{font-size:2rem;font-weight:300;opacity:.7}
  .info-row{display:flex;gap:2rem;font-size:.8rem;color:var(--muted)}
  .info-row strong{color:var(--text);font-weight:500}
  .controls{display:flex;gap:1rem}
  .btn{font-family:'Manrope',sans-serif;padding:.55rem 1.6rem;border:1px solid rgba(255,255,255,.1);border-radius:100px;background:rgba(255,255,255,.03);color:var(--text);font-size:.8rem;cursor:pointer;transition:all .3s}
  .btn:hover{background:rgba(255,255,255,.08)}
  .btn.pri{background:rgba(110,181,208,.15);border-color:rgba(110,181,208,.3)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Triangle Breathing</h1>
  <p class="sub">Inhale 4s · Transition · Exhale 6s</p>
  <div class="tri-area">
    <svg class="tri-svg" viewBox="0 0 280 260">
      <path class="tri-path" d="M140 30 L260 220 L20 220 Z"/>
      <path class="tri-progress" id="triProg" d="M140 30 L260 220 L20 220 Z"
        stroke-dasharray="700" stroke-dashoffset="700"/>
    </svg>
    <div class="dot" id="dot"></div>
    <span class="vertex-lbl" id="v0" style="top:8px;left:50%;transform:translateX(-50%)">Start</span>
    <span class="vertex-lbl" id="v1" style="bottom:8px;right:5px">Hold</span>
    <span class="vertex-lbl" id="v2" style="bottom:8px;left:5px">Release</span>
    <div class="center-info">
      <span class="pn" id="pn">Ready</span>
      <span class="pc" id="pc"></span>
    </div>
  </div>
  <div class="info-row">
    <span>Cycle <strong id="cn">0</strong> / <strong>10</strong></span>
    <span>Elapsed <strong id="el">0:00</strong></span>
  </div>
  <div class="controls">
    <button class="btn pri" id="sb" onclick="toggle()">Begin</button>
    <button class="btn" onclick="doReset()">Reset</button>
  </div>
</div>
<script>
// Triangle: top(140,30) → bottom-right(260,220) → bottom-left(20,220)
const V=[[140,30],[260,220],[20,220]];
const SIDES=[
  {name:'Inhale',dur:4,color:'#6EB5D0',shadow:'rgba(110,181,208,.5)',v:'v0'},
  {name:'Hold',dur:0.5,color:'#B89FD4',shadow:'rgba(184,159,212,.5)',v:'v1'},
  {name:'Exhale',dur:6,color:'#7BC4A0',shadow:'rgba(123,196,160,.5)',v:'v2'},
];
const TOTAL_DUR=SIDES.reduce((a,s)=>a+s.dur,0);
const CYCLES=10;
let running=false,paused=false,si=0,st=0,cyc=0,total=0,lastTs=0,lastSi=-1,aCtx=null;

function lerp(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t]}
function audio(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx}
function tone(f,d=.3){try{const x=audio(),o=x.createOscillator(),g=x.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,x.currentTime);g.gain.linearRampToValueAtTime(.07,x.currentTime+.05);g.gain.exponentialRampToValueAtTime(.001,x.currentTime+d);o.connect(g);g.connect(x.destination);o.start();o.stop(x.currentTime+d)}catch(e){}}
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

// Calculate total path length
const triPath=document.querySelector('.tri-path');
const pathLen=700; // approximate

function tick(ts){
  if(!running||paused)return;
  if(!lastTs)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;st+=dt;total+=dt;

  const side=SIDES[si];
  if(si!==lastSi){
    tone([396,320,285][si]);
    document.querySelectorAll('.vertex-lbl').forEach(v=>v.classList.remove('active'));
    document.getElementById(side.v).classList.add('active');
    lastSi=si;
  }

  const frac=Math.min(st/side.dur,1);
  const from=V[si],to=V[(si+1)%3];
  const[x,y]=lerp(from,to,frac);
  const dot=document.getElementById('dot');
  dot.style.left=x+'px';dot.style.top=y+'px';
  dot.style.background=side.color;dot.style.boxShadow='0 0 20px '+side.shadow;

  // Progress along triangle
  let totalFrac=0;
  for(let i=0;i<si;i++)totalFrac+=SIDES[i].dur/TOTAL_DUR;
  totalFrac+=frac*(side.dur/TOTAL_DUR);
  document.getElementById('triProg').style.strokeDashoffset=pathLen*(1-totalFrac);
  document.getElementById('triProg').style.stroke=side.color;

  document.getElementById('pn').textContent=side.name;
  document.getElementById('pc').textContent=side.dur>1?Math.ceil(side.dur-st):'';
  document.getElementById('el').textContent=fmt(total);

  if(st>=side.dur){
    st=0;si++;
    if(si>=3){si=0;cyc++;document.getElementById('cn').textContent=cyc;
      document.getElementById('triProg').style.strokeDashoffset=pathLen;
      if(cyc>=CYCLES){end();return}
    }
  }
  requestAnimationFrame(tick);
}

function toggle(){
  const b=document.getElementById('sb');
  if(!running){running=true;paused=false;si=0;st=0;cyc=0;total=0;lastTs=0;lastSi=-1;
    document.getElementById('cn').textContent='0';b.textContent='Pause';requestAnimationFrame(tick);
  }else if(!paused){paused=true;lastTs=0;b.textContent='Resume'}
  else{paused=false;lastTs=0;b.textContent='Pause';requestAnimationFrame(tick)}
}
function doReset(){
  running=false;paused=false;si=0;st=0;cyc=0;total=0;lastTs=0;lastSi=-1;
  document.getElementById('sb').textContent='Begin';document.getElementById('cn').textContent='0';
  document.getElementById('el').textContent='0:00';document.getElementById('pn').textContent='Ready';
  document.getElementById('pc').textContent='';document.getElementById('triProg').style.strokeDashoffset=pathLen;
  document.querySelectorAll('.vertex-lbl').forEach(v=>v.classList.remove('active'));
  const dot=document.getElementById('dot');dot.style.left=V[0][0]+'px';dot.style.top=V[0][1]+'px';
}
function end(){running=false;document.getElementById('sb').textContent='Begin';document.getElementById('pn').textContent='Complete';document.getElementById('pc').textContent='';tone(528,.8)}

document.getElementById('dot').style.left=V[0][0]+'px';document.getElementById('dot').style.top=V[0][1]+'px';
</script>
</body>
</html>
