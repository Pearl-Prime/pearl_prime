<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5-4-3-2-1 Grounding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bitter:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--see:#6AADCF;--touch:#CF9B6A;--hear:#8FCF6A;--smell:#CF6A9B;--taste:#B86ACF;--bg:#0A0D14;--text:#DDD7CC;--muted:#585450}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;user-select:none}
  .wrap{z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.2rem;max-width:420px;padding:1.5rem 1rem;width:100%}
  h1{font-family:'Bitter',serif;font-weight:300;font-size:1.8rem;letter-spacing:.04em}
  .sub{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-align:center}
  .senses{display:flex;flex-direction:column;gap:.6rem;width:100%}
  .sense-card{border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:.8rem 1rem;display:flex;align-items:center;gap:.8rem;transition:all .4s;background:rgba(255,255,255,.02);cursor:pointer}
  .sense-card.active{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04)}
  .sense-card.done{opacity:.35}
  .sense-icon{font-size:1.4rem;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sense-info{flex:1}
  .sense-title{font-size:.82rem;font-weight:500;letter-spacing:.04em}
  .sense-prompt{font-size:.68rem;color:var(--muted);margin-top:2px}
  .sense-dots{display:flex;gap:4px}
  .dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.15);transition:all .3s;cursor:pointer}
  .dot.filled{background:currentColor;border-color:currentColor}
  .breath-strip{width:100%;height:40px;border-radius:8px;background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:center;gap:.8rem;font-size:.75rem;color:var(--muted)}
  .breath-orb{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.08);transition:transform 4s ease-in-out}
  .breath-orb.big{transform:scale(1.8)}
  .breath-label{min-width:50px;text-align:center}
  .bar{width:100%;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
  .bf{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,var(--see),var(--taste))}
  .info-row{display:flex;gap:2rem;font-size:.78rem;color:var(--muted)}
  .info-row strong{color:var(--text);font-weight:500}
  .controls{display:flex;gap:1rem}
  .btn{font-family:'DM Sans',sans-serif;padding:.5rem 1.4rem;border:1px solid rgba(255,255,255,.1);border-radius:100px;background:rgba(255,255,255,.03);color:var(--text);font-size:.78rem;cursor:pointer;transition:all .3s}
  .btn:hover{background:rgba(255,255,255,.08)}
  .btn.pri{background:rgba(106,173,207,.15);border-color:rgba(106,173,207,.3)}
</style>
</head>
<body>
<div class="wrap">
  <h1>5 · 4 · 3 · 2 · 1</h1>
  <p class="sub">Tap each dot as you notice something. Move through all senses.</p>
  <div class="senses" id="senses"></div>
  <div class="breath-strip">
    <div class="breath-orb" id="orb"></div>
    <span class="breath-label" id="bl">Breathe</span>
  </div>
  <div class="bar"><div class="bf" id="bf"></div></div>
  <div class="info-row">
    <span>Progress <strong id="prog">0</strong> / 15</span>
  </div>
  <div class="controls">
    <button class="btn" onclick="resetAll()">Reset</button>
  </div>
</div>
<script>
const SENSES=[
  {name:'See',count:5,icon:'👁',color:'var(--see)',prompt:'Name 5 things you can see right now'},
  {name:'Touch',count:4,icon:'✋',color:'var(--touch)',prompt:'Notice 4 things you can physically feel'},
  {name:'Hear',count:3,icon:'👂',color:'var(--hear)',prompt:'Listen for 3 distinct sounds'},
  {name:'Smell',count:2,icon:'👃',color:'var(--smell)',prompt:'Identify 2 things you can smell'},
  {name:'Taste',count:1,icon:'👅',color:'var(--taste)',prompt:'Notice 1 taste in your mouth'},
];

let filled=SENSES.map(s=>0);
let aCtx=null;
function audio(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx}
function tone(f,d=.15){try{const x=audio(),o=x.createOscillator(),g=x.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,x.currentTime);g.gain.linearRampToValueAtTime(.06,x.currentTime+.03);g.gain.exponentialRampToValueAtTime(.001,x.currentTime+d);o.connect(g);g.connect(x.destination);o.start();o.stop(x.currentTime+d)}catch(e){}}

function render(){
  const el=document.getElementById('senses');
  el.innerHTML='';
  let totalFilled=0,totalDots=0;
  SENSES.forEach((s,si)=>{
    totalDots+=s.count;totalFilled+=filled[si];
    const active=si===SENSES.findIndex((_,i)=>filled[i]<SENSES[i].count);
    const done=filled[si]>=s.count;
    const card=document.createElement('div');
    card.className='sense-card'+(active?' active':'')+(done?' done':'');
    let dots='';
    for(let d=0;d<s.count;d++){
      dots+=`<div class="dot${d<filled[si]?' filled':''}" style="color:${s.color}" data-s="${si}" data-d="${d}"></div>`;
    }
    card.innerHTML=`<div class="sense-icon" style="background:${s.color}22;color:${s.color}">${s.icon}</div>
      <div class="sense-info"><div class="sense-title" style="color:${done?'var(--muted)':s.color}">${s.name} ${s.count}</div>
      <div class="sense-prompt">${s.prompt}</div></div><div class="sense-dots">${dots}</div>`;
    el.appendChild(card);
  });
  document.getElementById('prog').textContent=totalFilled;
  document.getElementById('bf').style.width=(totalFilled/totalDots*100)+'%';
  if(totalFilled>=totalDots){
    document.getElementById('bl').textContent='Grounded ✦';
    tone(528,.6);
  }
  // Click handlers
  el.querySelectorAll('.dot:not(.filled)').forEach(dot=>{
    dot.onclick=()=>{
      const si=+dot.dataset.s;
      if(filled[si]<SENSES[si].count){filled[si]++;tone(400+si*60);render()}
    };
  });
}

// Breath animation
let breathIn=true;
setInterval(()=>{
  const orb=document.getElementById('orb');
  breathIn=!breathIn;
  orb.classList.toggle('big',breathIn);
  document.getElementById('bl').textContent=breathIn?'Inhale':'Exhale';
},4000);

function resetAll(){filled=SENSES.map(s=>0);render();document.getElementById('bl').textContent='Breathe'}
render();
</script>
</body>
</html>
