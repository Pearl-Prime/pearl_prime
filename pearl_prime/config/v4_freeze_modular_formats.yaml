version: "1.0"
v4_freeze_enabled: true
default_output_format: pocket_guide

# V4 freeze: only these output formats are allowed for pipeline generation.
# Chapter count remains Arc-First in run_pipeline; this config controls slot shape + runtime hint.
output_formats:
  five_min_practice:
    name: "5-Minute Practice"
    runtime_format_id: micro_book_15
    slot_template: [HOOK, SCENE, REFLECTION, EXERCISE, TAKEAWAY, INTEGRATION, THREAD]
    target_word_range: [350, 650]
  pocket_guide:
    name: "Pocket Guide"
    runtime_format_id: short_book_30
    slot_template: [HOOK, SCENE, REFLECTION, EXERCISE, TAKEAWAY, INTEGRATION, THREAD]
    target_word_range: [200, 450]
  ten_things_to_do:
